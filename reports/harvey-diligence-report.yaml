    claim_text: Harvey remains an active private legal-AI company and still qualifies for unicorn-style private-company diligence, but public valuation anchors conflict between a current $8B CB Insights row and March 2026 $11B references.
    claim_source: CB Insights unicorn list; Wikipedia unicorn list; Harvey March 2026 financing announcements
    claim_date: null
    mapped_chapter_ids:
      - I
