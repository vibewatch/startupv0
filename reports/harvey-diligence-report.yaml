report_metadata:
  report_title: Harvey Startup Diligence Research Report
  target_company: Harvey
  website: https://www.harvey.ai/
  known_aliases:
    - Harvey AI
    - Harvey AI Corporation
  sector: Enterprise Tech / Legal AI / professional-services workflow software
  geography: United States (San Francisco) with global law-firm and in-house deployments
  company_stage: Private venture-backed late-stage legal AI company / unicorn
  research_date: 2026-06-18
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Reviewed public company pages, legal/security pages, product pages, customer stories, newsroom items, financing announcements, Wikipedia, CB Insights, and selected competitor pages on 2026-06-18 UTC.
    - Treated company-authored statements as evidence that Harvey makes the claim, not as independent validation of revenue quality, performance, or legal compliance.
    - Used sampled public search-result pages only to document limited litigation/trademark search coverage; marked legal/IP absence claims as inconclusive or not_publicly_verifiable where appropriate.
    - Did not bypass paywalls, private systems, logins, or closed data-room materials.
  included_jurisdictions:
    - United States
    - Singapore
    - Italy
    - European Union
    - Australia
    - Switzerland
    - Global public web
  excluded_topics:
    - No private financial statements, board decks, cap table, debt schedules, customer contracts, HR files, or insurance policies were available.
    - No exhaustive court-docket, trademark-registry, or regulator-database review was completed beyond sampled public web searches and company-authored disclosures.
    - No customer-reference calls, source-code review, or red-team testing was performed in this run.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow assignment for Harvey diligence report
      type: workflow_request
      date_received: 2026-06-18
      notes: Provided target metadata, website, alias hypothesis, and user-preferred $8B CB Insights unicorn-list valuation context.
founder_claims:
