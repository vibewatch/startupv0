executive_summary:
  overall_assessment: Harvey screens as an active late-stage private legal-AI company with unusually strong public traction, deep blue-chip backing, visible enterprise controls, and a broad product stack. The biggest underwriting gaps remain financial quality, revenue concentration, cap-table detail, model/vendor dependence, and the unresolved public valuation mismatch between CB Insights ($8B) and March 2026 company/Wikipedia-linked $11B references.
  investment_or_diligence_thesis: Harvey’s public case rests on legal-domain focus, workflow execution via agents, strong logo traction, and rapid geographic expansion. Confirmatory diligence should focus on whether growth quality, retention, margin profile, legal-data governance, and multi-model/vendor economics justify the pace of repricing and a potentially platform-level valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Harvey publicly supports a multi-product legal-workflow platform story spanning Assistant, Vault, Knowledge, Agents, and embedded integrations.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
        - EC-012
        - EC-013
        - EC-014
    - founder_claim_id: FC-004
      summary: Harvey has publicly disclosed a financing path from a $21M Series A through a 2026 $200M round at an $11B valuation headline.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-005
        - EC-006
        - EC-007
        - EC-008
    - founder_claim_id: FC-003
      summary: Named customer and partner evidence spans law firms, in-house teams, and workflow integrations, including PwC, Faegre Drinker, HSBC, NBCUniversal, Docusign, and Datasite.
      evidence_claim_ids:
        - EC-018
        - EC-019
        - EC-020
        - EC-021
        - EC-022
        - EC-025
  biggest_risks:
    - risk_id: R-001
      summary: Public valuation anchors conflict sharply ($8B current CB Insights row versus $11B March 2026 company/Wikipedia-linked references), raising repricing and source-reconciliation risk.
    - risk_id: R-002
      summary: No public audited financials, revenue, burn, runway, cap-table, or debt schedules were found; underwriting still depends on private records.
    - risk_id: R-003
      summary: Logo traction is strong, but revenue concentration, renewal quality, pricing realization, and gross-margin durability are not publicly disclosed.
    - risk_id: R-004
      summary: Harvey’s workflow performance depends on cloud, model-provider, retrieval, and integration partners, which adds operational and negotiating leverage risk.
  key_evidence_gaps:
    - Audited financial statements, management reports, revenue bridge, gross margin, cash burn, runway, and deferred-revenue/backlog detail.
    - Fully diluted cap table, investor rights, SAFEs/notes, debt, warrants, and any secondary/share-transfer activity supporting current valuation.
    - Top-customer ARR, churn/renewal, concentration, discounting, implementation economics, and contract terms.
    - Product accuracy, hallucination, uptime, cost-to-serve, and model-routing benchmarks under real enterprise workloads.
    - Litigation/regulatory schedules, IP filings/assignments, insurance, and material commercial/vendor contracts.
  recommended_next_steps:
    - Open a finance and cap-table data room and reconcile all public valuation and round-history statements to signed primary documents.
    - Run customer-quality diligence on top law-firm, in-house, and asset-management accounts, including expansion, renewal, churn, and ROI evidence.
    - Commission technical diligence covering model routing, retrieval quality, vendor dependence, cloud/security architecture, and incident history.
    - Have counsel review IP ownership, privacy/cyber terms, regulator exposure, insurance, and any pending or threatened disputes.
