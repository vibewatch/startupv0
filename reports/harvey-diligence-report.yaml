diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, and monthly KPI packs.
    why_it_matters: Without audited and management financials, there is no underwriting-grade view of revenue quality, burn, or runway.
    suggested_source_or_request: Company CFO / finance data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, debt instruments, SAFEs/notes, warrants, and investor-rights schedule.
    why_it_matters: Needed to reconcile valuation, liquidation preferences, and governance control.
    suggested_source_or_request: Company counsel / cap-table software export.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Per-product availability, SLA, pricing, model-routing policy, and benchmark accuracy data.
    why_it_matters: Public product pages do not establish unit economics or production reliability.
    suggested_source_or_request: Product team, security portal, and customer contracts.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, ARR concentration, renewal rates, backlog, and churn cohorts.
    why_it_matters: Customer-quality and concentration are central to sustaining a premium valuation.
    suggested_source_or_request: Revenue analytics export and top-customer schedule.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Vendor spend concentration and contractual commitments across cloud, models, data, and integrations.
    why_it_matters: Third-party dependencies may compress margin or create switching costs.
    suggested_source_or_request: Vendor contract summary and spend analysis.
    priority: medium
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss data and customer substitution patterns versus incumbents.
    why_it_matters: Public feature comparisons do not reveal whether Harvey wins durable category share.
    suggested_source_or_request: Sales ops and customer-reference package.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Quota, compensation, pipeline conversion, CAC, and payback data.
    why_it_matters: GTM efficiency is a major value driver for late-stage software companies.
    suggested_source_or_request: CRO / sales ops reports.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D budget, roadmap milestones, benchmark methodology, and model-provider cost structure.
    why_it_matters: Public R&D claims need to be tied to measurable execution and sustainable economics.
    suggested_source_or_request: CTO / product and engineering materials.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Actual employee headcount by function/location, attrition, and hiring plan.
    why_it_matters: Workforce scale and stability affect implementation capacity and cost structure.
    suggested_source_or_request: HRIS export and workforce plan.
    priority: medium
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.D
    missing_information: Compensation plans, benefit plans, stock plans, and retention arrangements.
    why_it_matters: Late-stage retention and dilution dynamics can materially affect execution and cap table.
    suggested_source_or_request: HR / compensation committee materials.
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation schedule, threatened-claims list, and outside-counsel letter.
    why_it_matters: Sampled web searches do not replace counsel-confirmed litigation disclosure.
    suggested_source_or_request: Company counsel and litigation schedule.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Trademark, patent, copyright, open-source, and assignment schedules.
    why_it_matters: IP ownership and licensing are central to long-term defensibility and compliance.
    suggested_source_or_request: IP counsel memo and registry extracts.
    priority: high
