      - section_id: VIII.C
        title: Environmental and employee safety issues and liabilities
        checklist_question_ids:
          - VIII.C.1
          - VIII.C.2
        summary: As a software/mobile AI company, environmental exposure appears limited publicly; employee safety and distributed-office compliance remain non-public.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VIII.C-F1
            finding: Public operations are software, app, AI and office/hybrid work oriented.
            evidence_claim_ids:
              - EC-001
              - EC-009
              - EC-016
            risk_ids:
              - R-008
          - finding_id: VIII.C-F2
            finding: No public environmental or workplace-safety liabilities were found in reviewed company materials.
            evidence_claim_ids:
              - EC-025
            risk_ids:
              - R-011
        hidden_risks:
          - Hybrid/on-site roles in multiple jurisdictions can create workplace-safety, contractor and employment-compliance obligations.
        evidence_gaps:
          - Office leases, workplace incidents, workers compensation, local safety policies and environmental questionnaires are not public.
        follow_up_questions:
          - Provide EHS/workplace-safety policies, incident logs, office leases, workers-comp claims and local employment compliance review.
