executive_summary:
  overall_assessment: Speak has credible public evidence of unicorn financing, strong consumer-language app traction, a differentiated speaking-first AI narrative, OpenAI/Accel investor validation and active B2B expansion. The investment case remains highly diligence-dependent because current ARR, margins, retention, customer concentration, cap table, AI supplier economics, privacy posture, IP/data rights and legal/insurance status are not public.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if data-room materials validate ARR quality, cohort retention, gross margin after model/platform costs, enterprise repeatability, privacy/audio-data compliance, cap-table economics and a durable product moat against AI-native and incumbent competitors.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: The $78M Series C at $1B valuation is directly stated by Speak and aligned with the provided unicorn-list context.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-003
      summary: Product availability, ratings, app-store presence and subscription model are corroborated by Google Play and Apple App Store.
      evidence_claim_ids:
        - EC-001
        - EC-011
        - EC-012
    - founder_claim_id: FC-007
      summary: Founder identities, YC history, team locations and public hiring are supported by YC, Accel, careers and Ashby sources.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-014
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: Current financial performance, ARR quality, margins, burn and concentration are not publicly verifiable.
    - risk_id: R-004
      summary: AI model/cloud dependency may affect quality, data rights, cost, latency and supplier leverage.
    - risk_id: R-006
      summary: Speech/user-content data, minors, subscriptions and international privacy obligations create legal/regulatory exposure.
  key_evidence_gaps:
    - Audited financial statements, current ARR/MRR, gross margin, burn, cash runway, retention and customer concentration.
    - Cap table, financing documents, investor rights, board governance and liquidation preference waterfall.
    - OpenAI/Azure/cloud, app-store/payment, customer and content/vendor contract terms.
    - Privacy/security evidence, subprocessors, DPIAs, incident logs, data retention/deletion controls and country legal opinions.
    - Full litigation docket, insurance, IP/data-rights schedules, HRIS, compensation, attrition and org chart.
  recommended_next_steps:
    - Open financial/legal/security/HR data room and reconcile public ARR/funding claims to underlying records.
    - Run customer references and cohort analysis for consumer and enterprise segments by country/language/platform.
    - Review OpenAI/Azure/model contracts, cloud costs, data-processing terms and fallback architecture.
    - Commission privacy/IP/regulatory counsel review for speech/user-content data, minors, auto-renewals and international operations.
    - Benchmark product efficacy, latency, WER, retention and competitive win/loss versus Duolingo and AI-speaking tutor alternatives.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence strongly supports Speak’s funding milestones and unicorn valuation, but financial statements, current ARR quality, burn, margins and cap structure remain non-public.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-008
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-006
      - EC-007
      - EC-020
      - EC-021
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-004
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public record contains dated ARR/subscriber signals, app-store monetization indicators and funding context, but no audited financial statements or quarterly P&L.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Series B materials stated double-digit million ARR and nearly 100,000 paying subscribers; no current audited ARR is public.
            evidence_claim_ids:
              - EC-006
              - EC-020
            risk_ids:
              - R-001
              - R-003
          - finding_id: I.A-F2
            finding: Google Play confirms monthly/annual in-app subscription monetization, but not revenue level.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-003
        hidden_risks:
          - Private-company revenue may be concentrated by platform, country, consumer cohorts or early enterprise accounts.
        evidence_gaps:
          - Audited income statements, balance sheets, cash-flow statements, monthly ARR/MRR bridge, billings, gross margin and cash burn are not public.
        follow_up_questions:
          - Provide audited/management financials for FY2023-FY2026 YTD, monthly ARR/MRR, cash, debt, revenue-recognition policy and cohort revenue by platform/country.
        table_ids:
          - T-002
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-006
          - EC-011
          - EC-020
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources imply aggressive international and B2B expansion, but no board-approved plan, budget, runway or hiring model is public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
