risk_register:
  - risk_id: R-001
    risk_title: Unaudited private financials and ARR quality
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public sources disclose financing and partial ARR/subscriber signals, but audited financial statements, current ARR, margins, burn, retention and customer concentration are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Open accounting data room; reconcile ARR to billing, cash, contracts and GAAP revenue.
  - risk_id: R-002
    risk_title: Valuation step-up and execution risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation reportedly doubled from $500M to $1B in roughly six months; growth must justify a premium private-market mark.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.C
      - V.E
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Test downside cases, runway, burn multiple, forward ARR and financing terms.
  - risk_id: R-003
    risk_title: Consumer subscription churn and paid-conversion risk
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: App-store downloads and high ratings do not prove durable paid conversion, low churn or sustainable CAC.
    impacted_chapter_ids:
      - II
      - III
      - V
    impacted_section_ids:
      - II.A
      - III.C
      - V.C
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request cohort retention, conversion, refund, churn, CAC and LTV by country and platform.
  - risk_id: R-004
    risk_title: AI model/cloud dependency and inference-cost risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: OpenAI/Azure access and GPT-4/Whisper usage may be central to product quality and cost structure.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.E
      - VI.A
      - VIII.F
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Review supplier contracts, fallback models, cost curves, latency SLOs and data-processing terms.
  - risk_id: R-005
    risk_title: Competitive pressure from scaled incumbents and AI-native tutors
    risk_category: market
    severity: high
    likelihood: high
    description: Speak competes with Duolingo and multiple AI conversation/tutor startups with overlapping claims.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Run win/loss calls, pricing comparisons, feature benchmarks and CAC channel analysis.
  - risk_id: R-006
    risk_title: Privacy, speech data, minors and international regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Speech/audio, user content, contact info, identifiers, minors restrictions and country-specific notices create a multi-jurisdiction compliance burden.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.G
      - VIII.C
      - II.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request DPIAs, DPA templates, subprocessors, retention/deletion controls, age-gating, incident history and legal opinions.
  - risk_id: R-007
    risk_title: Enterprise GTM proof gap
    risk_category: customer
    severity: medium
    likelihood: medium
    description: B2B claims cite 200+ customers/brands but public materials do not name customers, ACV, retention or seat usage.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - V.B
      - V.D
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request named customer list, top contracts, references, pipeline, quota attainment and expansion/churn metrics.
