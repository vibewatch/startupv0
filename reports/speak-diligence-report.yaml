diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited income statements, balance sheets, cash-flow statements, monthly ARR/MRR bridge, billings, gross margin and cash burn are not public.
    why_it_matters: Needed to fully answer checklist I.A.1, I.A.2, I.A.3, I.A.4, I.A.5, I.A.6 and validate annual and quarterly financial information for the past three years.
    suggested_source_or_request: Provide audited/management financials for FY2023-FY2026 YTD, monthly ARR/MRR, cash, debt, revenue-recognition policy and cohort revenue by platform/country.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: No operating model, pipeline forecast, CAC/LTV budget, hiring plan, runway or scenario cases were public.
    why_it_matters: Needed to fully answer checklist I.B.1, I.B.2, I.B.3, I.B.4, I.B.5, I.B.6, I.B.7, I.B.8 and validate financial projections.
    suggested_source_or_request: Provide board-approved 2026-2028 operating plan, monthly budget-to-actuals, cash runway, hiring plan, CAC/LTV assumptions and downside cases.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.C
    missing_information: Full cap table, charter, investor rights, board composition, debt/SAFEs and option-plan history are not public.
    why_it_matters: Needed to fully answer checklist I.C.1, I.C.2, I.C.3, I.C.4, I.C.5 and validate capital structure.
    suggested_source_or_request: Provide pro forma cap table, financing documents, side letters, liquidation waterfall, option pool, SAFEs/notes/debt and board approvals.
    priority: high
  - gap_id: G-004
    chapter_id: I
    section_id: I.D
    missing_information: Debt, tax, payment processor, app-store economics, cloud commitments and banking information are not public.
    why_it_matters: Needed to fully answer checklist I.D.1, I.D.2, I.D.3 and validate other financial information.
    suggested_source_or_request: Provide debt schedules, tax filings, platform-fee analysis, refund/chargeback history, cloud commitments and banking/cash controls.
    priority: medium
  - gap_id: G-005
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, conversion, gross margin, efficacy studies, uptime, roadmap and accessibility/security details are not public.
    why_it_matters: Needed to fully answer checklist II.A.1, II.A.2, II.A.3, II.A.4, II.A.5, II.A.6 and validate description of each product.
    suggested_source_or_request: Provide product analytics, pricing/tier mix, efficacy studies, benchmark results, roadmap, release history, uptime and support metrics.
    priority: medium
  - gap_id: G-006
    chapter_id: III
    section_id: III.A
    missing_information: Top consumer cohorts, paid versus free usage, NPS, retention and application-level revenue are not public.
    why_it_matters: Needed to fully answer checklist III.A and validate top customers by application.
    suggested_source_or_request: Provide top cohorts by country/language/use case, paid-user counts, retention curves, app-store revenue, NPS and refunds.
    priority: medium
  - gap_id: G-007
    chapter_id: III
    section_id: III.B
    missing_information: Investor rights, supplier terms, customer references and named strategic partnerships are not public.
    why_it_matters: Needed to fully answer checklist III.B and validate strategic relationships.
    suggested_source_or_request: Provide investor-rights summary, OpenAI/Azure contracts, named strategic partnerships, top B2B customers and reference contacts.
    priority: medium
  - gap_id: G-008
    chapter_id: III
    section_id: III.C
    missing_information: Top customer/account revenue, app-store platform mix, enterprise ACV and churn are not public.
    why_it_matters: Needed to fully answer checklist III.C and validate revenue by customer.
    suggested_source_or_request: Provide revenue by top 20 customers/accounts, app-store platform, country, product, cohort and enterprise logo retention.
    priority: high
  - gap_id: G-009
    chapter_id: III
    section_id: III.D
    missing_information: Churned strategic customers, terminated supplier contracts and investor disputes are not public.
    why_it_matters: Needed to fully answer checklist III.D and validate significant relationships severed within the last two years.
    suggested_source_or_request: Provide churned/lost top customers, severed partnerships, supplier termination notices and post-mortems for the last 24 months.
    priority: medium
  - gap_id: G-010
    chapter_id: III
    section_id: III.E
    missing_information: Top supplier spend, cloud contracts, app-store economics, DPAs and termination rights are not public.
    why_it_matters: Needed to fully answer checklist III.E and validate top suppliers.
    suggested_source_or_request: Provide supplier spend by vendor, OpenAI/Azure agreements, app-store terms analysis, DPAs, SLAs and fallback plans.
    priority: high
  - gap_id: G-011
    chapter_id: IV
    section_id: IV.A
    missing_information: No public market-share, CAC, win/loss, feature benchmark or pricing comparison sufficient to prove moat.
    why_it_matters: Needed to fully answer checklist IV.A.1, IV.A.2 and validate competitive landscape by market segment.
    suggested_source_or_request: Provide competitive win/loss, market share by country, CAC by channel, pricing tests, feature benchmarks and churn reasons.
    priority: medium
  - gap_id: G-012
