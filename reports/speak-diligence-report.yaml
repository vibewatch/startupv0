report_metadata:
  report_title: Speak Diligence Research Report
  target_company: Speak
  website: https://www.speak.com/
  known_aliases:
    - Speakeasy Labs, Inc.
    - Speakeasy Labs
    - Speakeasy Labs Korea Co., Ltd.
    - "Speak: Language Learning"
  sector: AI language learning, speech AI, consumer edtech, and enterprise language training
  geography: United States / San Francisco headquarters with public hubs in San Francisco, Seoul, Tokyo, Taipei and Ljubljana
  company_stage: Private venture-backed unicorn
  research_date: 2026-06-01
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source review only using company pages, financing posts, investor pages, app-store listings, market databases, news, job-board API, legal notices and competitor pages.
    - Treat company/investor traction claims as partially verified unless corroborated by independent app-store or news sources.
    - Mark financial statements, contracts, cap table, litigation, insurance, HR, IP and security matters as gaps when not public.
  included_jurisdictions:
    - United States
    - South Korea
    - Japan
    - Taiwan
    - Slovenia
    - European Union
    - Brazil
    - Global app-store markets
  excluded_topics:
    - Non-public financial statements and accounting workpapers
    - Private cap table and financing documents
    - Customer contracts and supplier agreements
    - Paid databases beyond public snippets
    - Full PACER/state/international docket search
    - Security audits, source code, model weights and private data rooms
    - Employee records and compensation files
  user_provided_materials:
    - material_id: UM-001
      title: Orchestrator-provided public unicorn-list/CB Insights row for Speak
      type: public market-list extract
      date_received: 2026-06-01
      notes: Reported $1B valuation, joined 2024-12-10, United States/San Francisco, Enterprise Tech, investors Khosla Ventures, OpenAI Startup Fund and Founders Fund; valuation corroborated by Speak Series C.
