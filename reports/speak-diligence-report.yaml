  - figure_id: F-009
    title: Speak diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of material diligence risks across financial, competitive, technical, legal and team areas.
    purpose: Prioritize follow-up diligence before investment reliance.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Unaudited private financials and ARR quality
          severity: high
          likelihood: unknown
          rationale: Public sources disclose financing and partial ARR/subscriber signals, but audited financial statements, current ARR, margins, burn, retention and customer concentration are not public.
          evidence_claim_ids: &a1
            - EC-006
            - EC-020
            - EC-021
          source_ids:
            - SRC-005
            - SRC-002
            - SRC-012
        - risk_id: R-002
          label: Valuation step-up and execution risk
          severity: high
          likelihood: medium
          rationale: Public valuation reportedly doubled from $500M to $1B in roughly six months; growth must justify a premium private-market mark.
          evidence_claim_ids: &a2
            - EC-002
            - EC-004
            - EC-020
          source_ids:
            - SRC-002
            - SRC-022
            - SRC-003
            - SRC-005
        - risk_id: R-003
          label: Consumer subscription churn and paid-conversion risk
          severity: medium
          likelihood: unknown
          rationale: App-store downloads and high ratings do not prove durable paid conversion, low churn or sustainable CAC.
          evidence_claim_ids: &a3
            - EC-001
            - EC-006
            - EC-011
          source_ids:
            - SRC-001
            - SRC-005
            - SRC-010
        - risk_id: R-004
          label: AI model/cloud dependency and inference-cost risk
          severity: high
          likelihood: medium
          rationale: OpenAI/Azure access and GPT-4/Whisper usage may be central to product quality and cost structure.
          evidence_claim_ids: &a4
            - EC-013
            - EC-022
            - EC-023
          source_ids:
            - SRC-013
            - SRC-005
            - SRC-003
        - risk_id: R-005
          label: Competitive pressure from scaled incumbents and AI-native tutors
          severity: high
          likelihood: high
          rationale: Speak competes with Duolingo and multiple AI conversation/tutor startups with overlapping claims.
          evidence_claim_ids: &a5
            - EC-019
          source_ids:
            - SRC-020
            - SRC-021
        - risk_id: R-006
          label: Privacy, speech data, minors and international regulatory exposure
          severity: high
          likelihood: medium
          rationale: Speech/audio, user content, contact info, identifiers, minors restrictions and country-specific notices create a multi-jurisdiction compliance burden.
          evidence_claim_ids: &a6
            - EC-012
            - EC-017
            - EC-018
          source_ids:
            - SRC-011
            - SRC-017
            - SRC-019
            - SRC-018
        - risk_id: R-007
          label: Enterprise GTM proof gap
          severity: medium
          likelihood: medium
          rationale: B2B claims cite 200+ customers/brands but public materials do not name customers, ACV, retention or seat usage.
          evidence_claim_ids: &a7
            - EC-003
