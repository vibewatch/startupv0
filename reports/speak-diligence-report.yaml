          - EC-025
      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids:
          - VIII.D
        summary: Speak owns/controls public service IP under its terms, but detailed patents, trademarks, model/data licenses, curriculum rights and open-source compliance are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.D-F1
            finding: Global terms state Speak/licensors reserve service and materials rights and define user content.
            evidence_claim_ids:
              - EC-017
            risk_ids:
