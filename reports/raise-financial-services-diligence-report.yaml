report_metadata:
  report_title: Raise Financial Services Startup Diligence Report
  target_company: Raise Financial Services
  website: https://www.raiseholding.co/
  known_aliases:
  - Raise
  - Raise Fintech Ventures Pvt. Ltd.
  - Raise Securities Private Limited
  - Dhan
  - DhanHQ
  - Upsurge.club
  - Filter Coffee
  - Fuzz AI
  sector: Financial Services / technology-led investing, brokerage, wealth, and financial infrastructure
  geography: India / Maharashtra
  company_stage: Private unicorn / growth-stage fintech platform
  research_date: '2026-05-31'
  analyst: GitHub Copilot diligence agent
  report_version: '1.0'
  currency: USD for valuation; INR for Indian brokerage pricing unless otherwise noted
  time_zone: Asia/Kolkata
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
  - Built an existing-report exclusion list from reports/*-diligence-report.yaml and selected this uncovered company from the fetched CB Insights unicorn list.
  - Verified public unicorn eligibility using CB Insights plus active company/product pages; no private data room, management interview, customer call or counsel docket search was available.
  - Used company-owned pages, customer/security/regulatory pages and public market-database sources; treated company claims as verified only for existence of the public statement unless independently corroborated.
  - Marked financial, cap-table, customer concentration, legal, HR, security and regulatory details as not_publicly_verifiable where private records are required.
  included_jurisdictions:
  - India
  - Maharashtra
  - SEBI/NSE/BSE/MCX/CDSL operating context
  excluded_topics:
  - Non-public financial statements, cap table, debt schedules, board minutes and investor-rights documents
  - Private customer contracts, supplier contracts, HR files, security audit reports, incident logs and regulator correspondence
  - Counsel-led litigation, sanctions, bankruptcy, lien, IP assignment and regulatory-enforcement searches
  user_provided_materials:
  - material_id: UPM-001
    title: Workflow request for three random unicorn diligence reports
    type: workflow_request
    date_received: '2026-05-31'
    notes: No pitch deck, financial model, data room, founder response or customer reference materials were provided.
founder_claims:
- founder_claim_id: FC-001
  claim_text: Raise Financial Services is an active private unicorn with latest known valuation of $1.20 billion.
  claim_source: CB Insights unicorn list and active public company pages
  claim_date: '2025-10-06'
  mapped_chapter_ids:
  - I
  mapped_section_ids:
  - I.B
  - I.C
  verification_status: partially_verified
  confidence: high
  evidence_claim_ids:
  - EC-001
  - EC-008
  contradiction_summary: CB Insights verifies list inclusion and valuation estimate; definitive corporate status and financing terms require company/counsel records.
  diligence_follow_up:
  - Request financing documents, cap table, legal entity chart, shareholder register, debt schedule and current valuation support.
- founder_claim_id: FC-002
  claim_text: Raise Financial Services offers the publicly marketed product family described on its company website.
  claim_source: Company website/product pages
  claim_date:
  mapped_chapter_ids:
  - II
  - VI
  mapped_section_ids:
  - II.A
  - VI.B
  verification_status: verified
  confidence: high
  evidence_claim_ids:
  - EC-002
  - EC-003
  contradiction_summary:
  diligence_follow_up:
  - Request product usage telemetry, roadmap, customer adoption by SKU, uptime/SLA data and gross margin by product/service line.
- founder_claim_id: FC-003
  claim_text: Raise Financial Services has public customer, partner, security or regulatory proof points that support commercial activity.
  claim_source: Company customer/security/regulatory pages
  claim_date:
  mapped_chapter_ids:
  - III
  - V
  - VIII
  mapped_section_ids:
  - III.A
  - V.B
  - VIII.G
  verification_status: partially_verified
  confidence: medium
  evidence_claim_ids:
  - EC-005
  - EC-006
  - EC-007
  contradiction_summary: Public proof points are company-curated or disclosure-level and do not prove revenue concentration, customer retention, control effectiveness or regulatory clean history.
  diligence_follow_up:
  - Run customer references, regulator/counsel checks and controls testing before underwriting.
- founder_claim_id: FC-004
  claim_text: Core operating financials, customer concentration, cap table, legal matters, HR metrics and detailed contractual economics are not publicly verifiable.
  claim_source: Public-source diligence gap log
  claim_date: '2026-05-31'
  mapped_chapter_ids:
  - I
  - III
  - VII
  - VIII
  mapped_section_ids:
  - I.A
  - III.C
  - VII.B
  - VIII.A
  verification_status: not_publicly_verifiable
  confidence: high
  evidence_claim_ids:
  - EC-009
  contradiction_summary:
  diligence_follow_up:
  - Open a private data room covering financials, contracts, customers, cap table, HR, security, legal and regulatory records.
executive_summary:
  overall_assessment: Raise Financial Services appears eligible for this run as an uncovered active private unicorn based on the CB Insights current unicorn list and active public company sources. Public evidence supports a real operating business and product footprint, but investability remains dominated by private financial quality, customer/revenue concentration, controls, legal/regulatory posture, cap-table economics and execution proof.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The public unicorn valuation ($1.20 billion) and product/customer/regulatory signals justify further review, but no transaction should rely on the public record without audited financials, customer references, cap table, control artifacts and counsel-led searches.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: CB Insights lists Raise Financial Services as a $1.20 billion unicorn.
    evidence_claim_ids:
    - EC-001
  - founder_claim_id: FC-002
    summary: Company-owned sources verify the public product positioning and product family.
    evidence_claim_ids:
    - EC-002
    - EC-003
  - founder_claim_id: FC-003
    summary: Public customer, partner, security or regulatory proof points support commercial activity, subject to private validation.
    evidence_claim_ids:
    - EC-005
    - EC-006
    - EC-007
  biggest_risks:
  - risk_id: R-001
    summary: Audited financials, active client counts, revenue quality, cap table, debt, and valuation bridge are not public.
  - risk_id: R-002
    summary: Active client counts, revenue concentration, churn, NPS and cohort durability are not public.
  - risk_id: R-003
    summary: Regulated brokerage, depository, research, exchange, and grievance obligations create high compliance and operational-control risk.
  key_evidence_gaps:
  - Audited financial statements, ARR/bookings, gross margin, cash, burn, debt and working capital schedules
  - Cap table, investor rights, option pool, notes/warrants, liquidation waterfall and board approvals
  - Top customer/client revenue, retention, churn, NPS, cohort and concentration data
  - Sales funnel, CAC, payback, quota, pipeline, marketing spend and channel mix
  - Roadmap, engineering velocity, incidents, uptime/SLA and product-margin data
  - Employee census, org chart, attrition, compensation, hiring plan and key-person agreements
  recommended_next_steps:
  - Request audited financials, cap table and valuation bridge before underwriting valuation.
  - Run customer/client references and top-customer concentration diligence.
  - Review security, privacy, legal, regulatory and insurance materials with counsel and technical specialists.
  - Validate product usage, roadmap, uptime/SLA, unit economics and GTM efficiency with primary operating data.
