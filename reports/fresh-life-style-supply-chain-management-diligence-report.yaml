risk_register:
  - risk_id: R-001
    risk_title: Sparse public financial disclosures and valuation support
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence supports unicorn-list and round-history screening, but audited financials, revenue, margins, cash/debt, forecasts and valuation bridge are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Do not rely on headline valuation until audited financials, KPI pack, capitalization, debt and financing documents are reviewed.
  - risk_id: R-002
    risk_title: Customer and revenue concentration unknown
    risk_category: customer
    severity: high
    likelihood: high
    description: Aggregate counts of 5,000+ corporate clients and 1.08M shops do not reveal top-customer revenue, contract terms, retention, churn, receivables or margin contribution.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request top 15 customers, revenue by customer, contract terms, NRR/GRR, churn, AR aging, customer references and severed-relationship schedule.
  - risk_id: R-003
    risk_title: China cold-chain logistics operating, regulatory and competitive exposure
    risk_category: operational
    severity: high
    likelihood: medium
    description: Cold-chain logistics requires reliable network density, temperature control, vehicle/warehouse execution, food-safety compliance and competition against large logistics providers.
    impacted_chapter_ids:
      - II
      - III
      - IV
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - IV.A
      - V.A
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Review operating KPIs, safety/regulatory permits, service-level history, supplier agreements, win/loss and market-share evidence.
  - risk_id: R-004
    risk_title: New Hope/subsidiary governance and related-party risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Public sources state New Hope affiliation/subsidiary status, but ownership, governance rights, related-party contracts, transfer pricing and board control are not disclosed.
    impacted_chapter_ids:
