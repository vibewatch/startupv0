diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, KPI pack and route/branch economics.
    why_it_matters: Public valuation cannot be underwritten without revenue, margin, cash, debt and working-capital quality.
    suggested_source_or_request: Company CFO/accountant data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, financing documents, preferences, option pool, warrants, debt and leases.
    why_it_matters: Ownership, liquidation preferences and liabilities determine actual economic value.
    suggested_source_or_request: Company counsel/investor documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue, contracts, AR aging, churn, NRR/GRR and customer references.
    why_it_matters: Aggregate customer counts do not prove revenue quality or concentration risk.
    suggested_source_or_request: Company sales/finance data room and customer calls.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Top supplier, fleet, warehouse, fuel/energy and technology vendor contracts.
    why_it_matters: Cold-chain performance and margins depend on supplier reliability and concentration.
    suggested_source_or_request: Operations/procurement data room.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC, payback, quota attainment, pipeline and channel mix.
    why_it_matters: Growth could be inefficient despite public scale anchors.
    suggested_source_or_request: GTM leadership and CRM export.
    priority: medium
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D organization, IP ownership, technology architecture, deployment metrics and roadmap.
    why_it_matters: AI/IoT and vehicle R&D claims are not enough to prove defensibility.
    suggested_source_or_request: CTO/product data room and IP counsel.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.A
    missing_information: Management bios, org chart, HRIS, compensation, turnover and incentive plans.
    why_it_matters: Execution risk and governance cannot be assessed from parent affiliation alone.
    suggested_source_or_request: HR and legal data room.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Verified legal dockets, regulatory permits/actions, insurance, IP register and material-contract schedule.
    why_it_matters: Legal/regulatory exposures are material in cold-chain logistics and expansion.
    suggested_source_or_request: Company counsel, China/Singapore legal searches.
    priority: high
