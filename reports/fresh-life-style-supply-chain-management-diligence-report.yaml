executive_summary:
  overall_assessment: Fresh Life Style appears to be an active China-based private unicorn in food cold-chain supply-chain logistics based on CB Insights public data and DealStreetAsia/CB excerpts. Public evidence supports category, financing, New Hope affiliation, branch/customer-scale and Singapore-expansion screening claims, but core underwriting remains unresolved because financials, cap table, customer concentration, unit economics, governance, legal/regulatory posture and HR data are not public.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A credible thesis depends on proving profitable cold-chain network density, durable top-customer retention, clean valuation/cap-table terms, arms-length New Hope governance, scalable technology/operations and manageable China/Singapore regulatory/legal exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists the company as a $1.57B China/Chengdu Consumer & Retail unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: CB Insights describes the company as a cold-chain supply-chain provider for food industry sourcing-to-delivery services.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: Public reporting supports large scale anchors of 5,000+ corporate clients, 1.08M shops and 100+ branches, though only partially verified.
      evidence_claim_ids:
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Sparse public financial disclosures and valuation support.
    - risk_id: R-002
      summary: Customer/revenue concentration, renewals and margin by customer are unknown.
    - risk_id: R-003
      summary: China cold-chain logistics operating, regulatory and competition exposure.
    - risk_id: R-004
      summary: New Hope/subsidiary governance and related-party risk.
    - risk_id: R-005
      summary: Singapore/overseas expansion execution risk.
    - risk_id: R-008
      summary: Legal, IP, insurance and regulatory diligence gaps.
  key_evidence_gaps:
    - Audited financial statements, KPI pack, route/branch economics, cash/debt and forecast model.
    - Current cap table, financing documents, valuation bridge, option pool, debt/lease schedules and related-party arrangements.
    - Top-customer revenue, contracts, retention/churn, AR aging and independent customer references.
    - Supplier/warehouse/fleet/vendor contracts, service-level performance and regulatory/safety records.
    - Management bios, org chart, headcount, compensation, turnover and incentive plans.
    - Legal dockets, IP ownership, insurance, material contracts and China/Singapore regulatory compliance package.
  recommended_next_steps:
    - Run finance/cap-table diligence before relying on headline valuation or public funding totals.
    - Complete revenue-quality diligence using customer-level revenue, contracts, retention cohorts and reference calls.
    - Commission China/Singapore legal, regulatory, IP, insurance and related-party contract review.
    - Validate operating model through branch/route P&Ls, supplier contracts, service KPIs and safety records.
    - Review New Hope governance, related-party economics and Singapore partnership terms.
