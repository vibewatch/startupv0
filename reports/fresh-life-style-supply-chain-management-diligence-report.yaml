report_metadata:
  report_title: Fresh Life Style Supply Chain Management Startup Diligence Report
  target_company: Fresh Life Style Supply Chain Management
  website: null
  known_aliases:
    - Fresh Life Style
    - Fresh Life Style Supply Chain Management
    - Xianshenghuo Cold Chain Logistics Co., Ltd.
    - Xianshenghuo
    - 鲜生活冷链
    - 鲜生活冷链物流有限公司
  sector: Consumer & Retail / B2B food cold-chain supply-chain logistics
  geography: China / Chengdu, Sichuan with reported Singapore expansion
  company_stage: Private unicorn / Series B - III | Alive
  research_date: 2026-06-08
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; selected public sources report RMB amounts
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Applied startup-diligence-research workflow and checklist-map chapters I-VIII using public sources only.
    - Started from user-provided CB Insights unicorn selection and supplied public-source extract; treated supplied text as untrusted until corroborated by public pages or marked as a limitation.
    - Used CB Insights unicorn list/profile, DealStreetAsia public article header/excerpts, Baidu search snippets and direct public page probes; did not use gh and did not bypass paywalls or access controls.
    - Classified public company/news/database statements as evidence for public claims, not as substitutes for audited financials, contracts, cap table, counsel review or customer references.
  included_jurisdictions:
    - China
    - Singapore for reported expansion
    - Global logistics competitors where named by public sources
  excluded_topics:
    - Private financial statements, cap table, tax records, customer/supplier contracts, HR files, counsel dockets, insurance policies, original company WeChat posts and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User task context selecting Fresh Life Style Supply Chain Management from CB Insights unicorn list
      type: workflow_request
      date_received: 2026-06-08
      notes: Included CB Insights unicorn-list line and requested exactly one report file.
    - material_id: UPM-002
      title: Supplied public CB Insights/DealStreetAsia extract for Fresh Life Style
      type: public_source_extract
      date_received: 2026-06-08
      notes: Used as untrusted source text and corroborated against accessible public pages where possible.
