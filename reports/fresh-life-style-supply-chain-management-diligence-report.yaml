      - III
      - VII
      - VIII
    impacted_section_ids:
      - I.C
      - III.B
      - VII.A
      - VIII.F
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request legal ownership chart, shareholder agreements, board minutes, related-party contracts, settlement policies and independence controls.
  - risk_id: R-005
    risk_title: Overseas expansion execution risk
    risk_category: market
    severity: medium
    likelihood: medium
    description: Public reporting indicates Singapore expansion, but partner identity, economics, regulatory requirements, local execution and early performance are not verified.
