executive_summary:
  overall_assessment: Proceed to focused confirmatory diligence. Public evidence supports Huntress as an active private cybersecurity unicorn with credible product, channel and team signals, but core underwriting facts remain private.
  investment_or_diligence_thesis: Huntress appears to be a late-stage managed-cybersecurity platform benefiting from SMB/MSP demand, transparent pricing, 24/7 SOC positioning, product breadth and acquisition-led expansion. The diligence case depends on validating ARR quality, partner/customer concentration, competitive durability, SOC/product efficiency and legal/privacy controls.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Series D page supports $150M raised at a $1.55B valuation.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Product pages support a platform spanning EDR, ITDR, SIEM and SAT.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-010
        - EC-011
    - founder_claim_id: FC-003
      summary: Partner and MSP pages support a material MSP/reseller channel motion.
      evidence_claim_ids:
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Valuation/ARR without audited financial quality, cap-table and cash/debt proof.
    - risk_id: R-002
      summary: Unknown customer, MSP partner concentration, churn and retention.
    - risk_id: R-003
      summary: Intense MDR/EDR/SIEM competition and pricing pressure.
  key_evidence_gaps:
    - Audited financials, exact ARR, gross margin, burn, runway, cash/debt and forecast model.
    - Cap table, investor preferences, option pool, warrants, notes and ownership schedule.
    - Top-customer/partner concentration, NRR/GRR, churn, contracts and reference calls.
    - SOC/product efficacy, architecture, security reports, incident history and product-level economics.
    - Legal/IP assignments, patent/trademark schedule, insurance, litigation and regulatory correspondence.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on the $1.55B headline valuation.
    - Conduct customer/partner calls and request concentration/churn/NRR evidence.
    - Benchmark pricing, win/loss and technical efficacy against MDR/EDR/SIEM competitors.
    - Have counsel and security specialists review privacy, SOC 2, pentest, IP, contracts, insurance and litigation materials.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports Huntress as an active private unicorn with strong funding and product-scale signals, but audited financials, ARR quality, cap table terms, cash/debt and tax/accounting policies are private.
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-025
      - EC-026
      - EC-001
      - EC-011
      - EC-023
      - EC-004
      - EC-016
      - EC-017
    risk_ids:
      - R-001
    sections:
