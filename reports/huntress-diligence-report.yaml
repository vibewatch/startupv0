        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources provide funding, pricing, ARR-adjacency and endpoint scale signals, but audited financial statements, AR aging, backlog and management reports are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
