risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation durability
    risk_category: financial
    severity: high
    likelihood: medium
    description: Huntress has a public $1.55B valuation and scale signals, but exact ARR, audited revenue, gross margin, cash, debt, burn, retention and cap-table economics are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Obtain audited financials, management accounts, ARR bridge, cash/debt schedule, forecast model, cap table and financing documents.
  - risk_id: R-002
    risk_title: Customer and MSP-channel concentration unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public case studies and partner pages validate channel/product usage, but revenue concentration, partner churn, end-customer ownership and renewal cohorts are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
      - V.B
      - V.C
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request top-customer/partner revenue schedule, customer contracts, NRR, GRR, churn reasons and independent references.
  - risk_id: R-003
    risk_title: Crowded MDR/EDR/SIEM market and pricing pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Large security platforms and MSP-focused MDR vendors market overlapping 24/7 SOC and MDR offerings; Huntress publishes transparent per-unit prices that may anchor buyer expectations.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Run win/loss calls, pricing benchmark, feature-benchmark and churn analysis versus CrowdStrike, Arctic Wolf, Blackpoint, Sophos and other MDR vendors.
  - risk_id: R-004
    risk_title: Acquisition and roadmap execution risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Level Effect, Curricula and Inside Agent broaden the platform, but integration quality, roadmap delivery, cross-sell and retention of acquired talent are not publicly verifiable.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Review product roadmap, acquired-code integration, retention packages, roadmap burndown and product attach-rate cohorts.
  - risk_id: R-005
    risk_title: Privacy, telemetry and regulatory exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Huntress handles broad security telemetry and may collect suspicious files; this creates privacy, DPA, retention, subprocessor and incident-response obligations.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.G
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Have counsel and security reviewers inspect DPA, subprocessor list, retention controls, SOC 2, pentest findings and incident history.
  - risk_id: R-006
