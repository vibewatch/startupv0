            finding: Public scale signals exist, but most annual/quarterly financial checklist items require private records.
            evidence_claim_ids: &a1
              - EC-002
              - EC-003
              - EC-025
              - EC-026
            risk_ids:
              - R-001
        hidden_risks:
          - Headline endpoint and valuation metrics may obscure churn, discounting, support cost and revenue-recognition risk.
        evidence_gaps:
          - Audited income statements, balance sheets, cash flows, AR aging, backlog, management reports, revenue by product/channel/geography.
        follow_up_questions:
          - Provide audited financials, management accounts, ARR bridge, AR aging, backlog and revenue breakdown by product, channel and geography.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids: *a1
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Financing and public pricing support growth context, but detailed forecasts, assumptions, capital needs and scenario planning are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
