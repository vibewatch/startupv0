report_metadata:
  report_title: Huntress Startup Diligence Report
  target_company: Huntress
  website: https://www.huntress.com/
  known_aliases:
    - Huntress Labs
    - Huntress Labs Incorporated
    - Huntress Labs, Inc.
  sector: Managed cybersecurity, MDR, EDR, identity threat detection, SIEM and security awareness training for SMBs/MSPs
  geography: United States-based company with remote/global team and international data-transfer posture
  company_stage: Private unicorn / late-stage venture-backed cybersecurity company
  research_date: 2026-06-07
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company-owned sources for funding, product, pricing, partner, careers, privacy, trust-center and case-study evidence.
    - Used public legal/search sources including CourtListener and Justia snippets for litigation/IP screening.
    - Used competitor-owned pages to map MDR/EDR/SIEM competitive overlap.
    - Treated company-owned claims as claim evidence, not audited proof of financial, technical or customer-performance metrics.
    - No private records, paywalled content circumvention, management interviews or customer calls were used.
  included_jurisdictions:
    - United States
    - United Kingdom and Europe for Inside Agent/data-transfer references
    - Public global markets referenced by company materials
  excluded_topics:
    - Non-public financial statements, cap table, bank statements, tax returns, HRIS, customer contracts, security reports, code repositories, board minutes and legal counsel letters were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for standard-depth Huntress startup diligence report
      type: workflow_request
      date_received: 2026-06-07
      notes: No pitch deck, data room, financial model or founder responses were provided.
