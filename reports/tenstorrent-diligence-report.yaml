executive_summary:
  overall_assessment: Tenstorrent appears to be an active private AI hardware unicorn with public evidence for a large Series D, commercial hardware products, open-source software strategy and strategic investors. Core diligence depends on silicon execution, manufacturing capacity, customer commitments, gross margin, IP ownership, export-control exposure and cap-table terms.
  investment_or_diligence_thesis: Proceed to deep technical, supply-chain and customer diligence before underwriting a financing or acquisition thesis; public evidence supports status and activity but not shipment quality, backlog, revenue, margin or customer concentration.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support Tenstorrent's private-unicorn screening status at $2.6B.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-012
    - founder_claim_id: FC-002
      summary: Company-owned sources support active product positioning in AI hardware, RISC-V processors, accelerators, systems and open-source AI software stack.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-005
      summary: Public team or technical signals are consistent with an active operating company.
      evidence_claim_ids:
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Capital-intensive silicon execution and manufacturing supply chain
    - risk_id: R-006
      summary: Revenue, backlog and customer commitments are not public
    - risk_id: R-004
      summary: Export-control, IP and strategic-investor dependencies require counsel review
  key_evidence_gaps:
    - Audited financial statements, KPI exports, cash/debt, burn/runway and forecast model.
    - Current cap table, preferences, debt, option pool, securities filings and financing documents.
    - Top-customer or top-partner revenue, contracts, renewals, churn and independent references.
    - CAC, payback, pipeline source mix, sales productivity and pricing/discount waterfall.
    - Legal, security/privacy/safety, IP, supplier and material-contract schedules.
  recommended_next_steps:
    - Run revenue-quality and financial diligence before relying on the public valuation headline.
    - Request customer/partner contracts, cohort metrics and independent reference calls.
    - Have counsel and technical specialists review IP, regulatory, security, safety and material-contract artifacts.
    - Benchmark against direct competitors using buyer interviews, win/loss data and pricing evidence.
