report_metadata:
  report_title: Tenstorrent Startup Diligence Report
  target_company: Tenstorrent
  website: https://tenstorrent.com/
  known_aliases:
    - Tenstorrent
    - Tenstorrent Inc.
    - TensTorrent (CB Insights spelling variant)
  sector: AI hardware, RISC-V processors, accelerators, systems and open-source AI software stack
  geography: Canada / United States with global semiconductor ecosystem
  company_stage: Private unicorn / late-stage AI hardware company
  research_date: 2026-05-27
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and excluded matching slugs.
    - Fetched current unicorn-list sources from CB Insights and Wikipedia using curl/Jina reader, then selected uncovered candidates with shuf.
    - Used company-owned pages, funding announcements, public profiles, customer/product pages, search result pages and reputable news or market databases.
    - Treated company-authored claims as verified for the existence of the public statement only unless independently corroborated.
    - No private data room, management interview, customer calls, legal docket export, cap table, SOC report or contract schedule was available.
  included_jurisdictions:
    - Canada / United States
    - United States public web sources where relevant
    - Global market databases and English-language public sources
  excluded_topics:
    - Private financial statements, cap table, board materials, customer calls, legal docket exports, security reports, tax records, supplier contracts and HRIS exports were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-27
      notes: No pitch deck, data room, financial model, founder responses or customer references were provided.
