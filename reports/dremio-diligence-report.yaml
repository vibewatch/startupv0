executive_summary:
  overall_assessment: "Dremio qualifies only for pre-close private-unicorn diligence: public sources support a $2B headline valuation and active product/customer footprint, but SAP announced an agreement to acquire Dremio with expected Q3 2026 close. Core financial, customer, legal and transaction facts remain private."
  investment_or_diligence_thesis: The diligence thesis is that Dremio owns a strategically relevant open lakehouse/AI data layer around Iceberg, Polaris and Arrow with credible enterprise customer proof points. Underwriting depends on acquisition status, financial quality, retention, product moat and legal/security verification.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public financing and market database sources support $2B headline valuation subject to SAP acquisition caveat.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-004
    - founder_claim_id: FC-002
      summary: Dremio publicly markets active Cloud and Enterprise products around Iceberg, Polaris and Arrow.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-007
        - EC-008
        - EC-017
        - EC-018
        - EC-019
    - founder_claim_id: FC-004
      summary: Public customer case studies include Amazon, Shell and NetApp.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Pending SAP acquisition/event risk
    - risk_id: R-003
      summary: Financial quality, burn and runway opacity
    - risk_id: R-004
      summary: Customer concentration and retention unknown
    - risk_id: R-005
      summary: Competitive intensity from Databricks, Snowflake, Starburst and cloud platforms
    - risk_id: R-006
      summary: Open-source commoditization and ecosystem dependency
  key_evidence_gaps:
    - SAP acquisition agreement, consideration, regulatory status and closing conditions.
    - Audited financial statements, ARR/NRR/churn bridge, gross margin, cash, burn, debt and runway.
    - Fully diluted cap table, liquidation preferences, warrants/SAFEs, option pool and valuation support.
    - Top-customer concentration, contracts, renewal dates, retention cohorts and reference calls.
    - Product benchmarks, security reports, roadmap, technical debt and support/implementation metrics.
    - Counsel-led litigation, IP, OSS license, privacy, material-contract and corporate-record review.
  recommended_next_steps:
    - First confirm whether the SAP acquisition has closed or creates exclusivity/change-of-control constraints.
    - Do not rely on $2B valuation until financials, cap table, preferences and current fair value are reviewed.
    - Run customer and technical diligence against public Amazon/Shell/NetApp claims and non-marketed references.
    - Benchmark Dremio against Databricks, Snowflake, Starburst and cloud-native alternatives with win-loss data.
    - Complete legal, security, privacy, IP, OSS and material-contract review with counsel before investment reliance.
