report_metadata:
  report_title: Dremio Startup Diligence Report
  target_company: Dremio
  website: https://www.dremio.com/
  known_aliases:
    - Dremio Corporation
    - Dremio Cloud
    - Dremio Enterprise
    - Dremio Sonar
    - Dremio Arctic
    - Project Nessie
  sector: Enterprise data lakehouse, analytics and AI data infrastructure software
  geography: United States / global enterprise software
  company_stage: Private unicorn / growth-stage enterprise data platform with announced pending SAP acquisition
  research_date: 2026-05-29
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prepared one public-source diligence report for Dremio only; no private data room, founder interview or customer calls were available.
    - Prioritized market databases, financing announcements, company product/customer/legal pages, Apache/open-source project pages and competitor product pages.
    - Treated company-published performance, customer and compliance claims as evidence that the public claim exists, not as independent audit of the claim.
    - Direct Dremio website access was blocked in this environment for some pages; public text-reader access was used only to inspect public pages, while source URLs cite original publishers.
    - No gh CLI, safeoutputs, PR, issue or non-report repository outputs were used.
  included_jurisdictions:
    - United States
    - Global enterprise markets referenced in public materials
    - European/privacy jurisdictions referenced in public DPA and privacy materials
  excluded_topics:
    - Private financial statements, cap table, board materials, contracts, customer calls, security reports, counsel letters, regulatory correspondence, HR records and non-public transaction documents.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Dremio diligence report
      type: workflow_request
      date_received: 2026-05-29
      notes: No pitch deck, data room, financial model, founder response or customer reference materials were provided.
