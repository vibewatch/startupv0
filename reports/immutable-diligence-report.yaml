  - founder_claim_id: FC-006
    claim_text: Immutable operates with serious compliance, privacy, and security
      controls suitable for a game-growth and digital-asset platform.
    claim_source: Immutable trust page and legal terms
    claim_date: 2025-12-01
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.F
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-019
    contradiction_summary: Public posture pages and contract terms signal control
      intent, but no third-party audit pack, regulator correspondence, or
      security incident log was reviewed.
    diligence_follow_up:
      - Request SOC/ISO materials, privacy impact assessments, sub-processor
        list, DPA templates, Wells-notice correspondence, and outside-counsel
        memos.
executive_summary:
  overall_assessment: Track with high-priority financial, customer-reference,
    regulatory, and team diligence before relying on the still-cited US$2.5B
    valuation.
  investment_or_diligence_thesis: Immutable shows credible public evidence of a
    differentiated full-stack gaming platform spanning growth tooling, identity,
    chain, and developer infrastructure, but the business remains a private
    company with opaque economics, restructuring signals, and non-trivial
    legal/compliance history that could materially change the risk-reward
    profile.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Multiple public headlines still anchor Immutable around a US$2.5B
        valuation and current company materials support an Australian operating
        base.
      evidence_claim_ids:
        - EC-001
        - EC-020
    - founder_claim_id: FC-002
      summary: Immutable currently documents a broad platform across Audience,
        Passport, Chain, Checkout, Orderbook, Indexer, Hub, and SDKs.
      evidence_claim_ids:
        - EC-003
        - EC-016
        - EC-017
    - founder_claim_id: FC-005
      summary: Public sources identify an active leadership and engineering bench led
        by James Ferguson, Robbie Ferguson, Alex Connolly, and named engineering
        managers/directors.
      evidence_claim_ids:
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Public sources do not validate revenue quality, margins, burn, or runway.
    - risk_id: R-005
      summary: Digital-asset compliance obligations and the 2024-2025 SEC sequence
        create material legal/regulatory diligence needs.
    - risk_id: R-007
      summary: Repeated restructuring headlines raise execution and retention concerns
        against a broad product scope.
  key_evidence_gaps:
    - Audited financial statements, current budget/forecast, cash/debt schedule,
      and product/customer revenue bridge.
    - Fully diluted cap table, option plan, debt/SAFE instruments, and any
      post-Series-C valuation resets or secondary transactions.
    - Customer concentration, renewal terms, churn, NRR/GDR, and reference calls
      across top studios/publishers.
    - Security/privacy audit artifacts, sub-processor list, incident history,
      and outside-counsel regulatory memos.
    - HRIS export, attrition history, compensation plans, and complete
      legal/litigation schedules.
  recommended_next_steps:
    - Open a data room covering financials, cap table, customer cohorts, vendor
      contracts, security/legal artifacts, and HR records.
    - Run legal counsel workstreams on token-law history, Wells-notice closure
      details, IP ownership, sanctions/KYC, and litigation searches.
    - Run customer-reference, vendor-reference, and management-reference calls
      focused on renewals, reliability, roadmap credibility, and support
      quality.
    - Validate whether the public US$2.5B headline valuation remains relevant
      after any 2023-2025 restructuring or private-market resets.
    - Test product-level economics and usage by module, especially Passport,
      Chain, Audience, and any legacy Immutable X / zkEVM transition
      obligations.
