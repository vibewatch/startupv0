report_metadata:
  report_title: Immutable Startup Diligence Report
  target_company: Immutable
  website: https://www.immutable.com/
  known_aliases:
    - Immutable X
    - Immutable zkEVM
    - Immutable Pty Ltd
    - Immutable zk Pty Ltd
    - Immutable Passport
    - Immutable Chain
    - Immutable Audience
  sector: Gaming growth platform and web3 gaming infrastructure
  geography: Australia headquarters / global game-studio and player markets
  company_stage: Private unicorn / growth-stage gaming infrastructure company
  research_date: 2026-06-14
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; A$ where source headlines used Australian dollars
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Reviewed required skill assets first, then used public company pages,
      docs, legal pages, The Org public profiles, Google News RSS headline
      queries, and competitor homepages.
    - Preferred company-owned pages for product and legal claims, then used
      third-party headline coverage only where direct articles or filings were
      inaccessible or paywalled.
    - Used public internet evidence only and marked private-company items as
      not_publicly_verifiable where no reliable public support existed.
    - Treated company marketing pages and case studies as proof that the
      statements exist, not as independent proof of revenue quality, customer
      health, or control effectiveness.
  included_jurisdictions:
    - Australia
    - United States
    - Global gaming and digital-asset markets referenced by company materials
  excluded_topics:
    - No private financial statements, cap table, customer contracts, HRIS
      export, security audit pack, board materials, or legal data room were
      available.
    - No paywall bypassing was attempted; some news sources were used only at
      headline level through Google News RSS.
  user_provided_materials:
    - material_id: UPM-001
      title: User task brief for Immutable diligence report
      type: workflow_request
      date_received: 2026-06-14
      notes: Included website, aliases/products, and scoping context about Australian
        unicorn status and public valuation references.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Immutable is an Australian private unicorn still publicly anchored
      around a US$2.5B valuation.
    claim_source: Public funding headlines and current company legal/careers materials
    claim_date: 2026-03-06
    mapped_chapter_ids:
      - I
      - VII
    mapped_section_ids:
      - I.C
      - I.D
      - VII.B
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-020
    contradiction_summary: AFR used A$3.5B wording for the March 2022 round while
      USD-denominated coverage used US$2.5B; this report treats those as
      currency variants rather than separate valuations.
    diligence_follow_up:
      - Request the latest cap table, shareholder register, liquidation
        preferences, and any secondary-transaction history.
      - Confirm whether any later internal marks, down-rounds, or structured
        financings supersede the public 2022/2026 valuation anchor.
  - founder_claim_id: FC-002
    claim_text: Immutable operates a full-stack gaming platform spanning audience
      growth, identity, chain infrastructure, payments, trading, and developer
      tooling.
    claim_source: Immutable homepage and docs
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.B
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-003
      - EC-016
      - EC-017
    contradiction_summary: null
    diligence_follow_up:
      - Request product-level GMV, revenue, attach rate, and customer-adoption
        data by module.
      - Validate migration status for legacy Immutable X / zkEVM footprints and
        associated customer obligations.
  - founder_claim_id: FC-003
    claim_text: Immutable Passport and Chain materially reduce onboarding friction
      with gasless transactions, mainstream sign-in, and broad player reach.
    claim_source: Immutable Passport and Chain product pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - V
    mapped_section_ids:
      - II.A
      - V.A
      - V.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-005
    contradiction_summary: The product claims are public, but independent
      user/adoption validation and conversion-quality evidence were not
      reviewed.
    diligence_follow_up:
      - Request cohort-level onboarding funnels, wallet-creation conversion,
        retention, fraud loss, and transaction-failure metrics.
  - founder_claim_id: FC-004
    claim_text: Immutable has meaningful go-to-market traction with hundreds of game
      studios and at least one flagship publisher relationship with quantified
      performance outcomes.
    claim_source: Immutable homepage, about page, Ubisoft partnership/case study
    claim_date: 2026-03-01
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.B
      - V.A
      - V.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-018
    contradiction_summary: Public logos and company-authored case studies do not
      verify revenue concentration, retention, support quality, or willingness
      to renew.
    diligence_follow_up:
      - Request top-customer ARR, contract terms, pipeline conversion,
        retention, and at least three publisher reference calls.
  - founder_claim_id: FC-005
    claim_text: Immutable maintains an active engineering and product organization
      with current SDKs, APIs, and named technical leaders.
    claim_source: Immutable docs and The Org public pages
    claim_date: 2026-06-13
    mapped_chapter_ids:
      - VI
      - VII
    mapped_section_ids:
