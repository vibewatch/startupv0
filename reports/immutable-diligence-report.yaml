          severity: high
          likelihood: medium
          rationale: The best public valuation anchor remains a 2022 Series C / 2026
            headline reference around US$2.5B, but current cap-table economics,
            preferences, and any secondary resets are not public.
          evidence_claim_ids: &a34
            - EC-001
            - EC-020
          source_ids:
            - SRC-016
            - SRC-002
            - SRC-006
            - SRC-008
        - risk_id: R-003
          label: Customer concentration and revenue-quality uncertainty
          severity: high
          likelihood: medium
          rationale: Public traction is visible, but revenue concentration, logo
            monetization, support quality, churn, and renewal health are
            unverified and may be skewed toward a small number of flagship
            titles or partners.
          evidence_claim_ids: &a35
            - EC-007
