      - VII.C
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-016
    contradiction_summary: null
    diligence_follow_up:
      - Request engineering velocity metrics, incident history, architecture
