risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and missing KPI disclosure
    risk_category: financial
    severity: high
    likelihood: high
    description: No audited financial statements, revenue bridge, margin data,
      cash/debt schedule, or customer-concentration report were publicly
      available in reviewed sources.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
      - V.D
      - V.E
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Obtain audited financials, monthly board pack,
      ARR and margin bridge, cash/runway schedule, and top-customer
      concentration analysis.
  - risk_id: R-002
    risk_title: Valuation staleness and opaque capital structure
    risk_category: financing
    severity: high
    likelihood: medium
    description: The best public valuation anchor remains a 2022 Series C / 2026
      headline reference around US$2.5B, but current cap-table economics,
      preferences, and any secondary resets are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request the latest capitalization table,
      preference stack, debt or SAFE schedules, and any subsequent valuation
