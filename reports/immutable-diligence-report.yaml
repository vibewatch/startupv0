            - EC-018
            - EC-021
          source_ids:
            - SRC-005
            - SRC-001
            - SRC-002
            - SRC-023
        - risk_id: R-004
          label: Strategic breadth and product-focus execution risk
          severity: medium
          likelihood: medium
          rationale: Immutable now spans growth tooling, AI workflows, identity, wallet,
            chain, payments, orderbook, indexing, and legacy migration tasks,
            raising execution complexity and focus risk versus single-wedge
            competitors.
          evidence_claim_ids: &a36
            - EC-003
            - EC-015
            - EC-016
            - EC-017
          source_ids:
            - SRC-001
            - SRC-010
            - SRC-020
            - SRC-021
            - SRC-022
            - SRC-019
