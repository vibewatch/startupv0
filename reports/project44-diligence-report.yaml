executive_summary:
  overall_assessment: "Eligible public unicorn report: project44 has credible public unicorn and financing evidence and a
    large supply-chain visibility platform narrative, but the investability question turns on private financial quality,
    customer concentration, data-network durability, AI proof and legal/IP review."
  investment_or_diligence_thesis: project44 could be a category-scale enterprise logistics software asset if its
    carrier/event network and Decision Intelligence products translate into durable ARR and retention; public evidence
    supports scale claims more than quality of revenue, margins or defensible AI economics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and financing snippets support private-unicorn status above $1B.
      evidence_claim_ids:
        - EC-001
        - EC-003
        - EC-010
    - founder_claim_id: FC-002
      summary: Public snippets support the $202M 2021 and $420M 2022 financing events.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-007
      summary: Leadership page verifies founder-CEO Jett McCandless and named executives.
      evidence_claim_ids:
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and stale valuation risk remain high without financials, cap table and current marks.
    - risk_id: R-002
      summary: Network data quality and integration dependency could undermine platform value if active coverage is overstated.
    - risk_id: R-003
      summary: AI-agent and ROI claims may outpace adoption, accuracy and measurable customer proof.
    - risk_id: R-004
      summary: Competitive litigation/IP disputes need counsel-led review.
  key_evidence_gaps:
    - Audited and management financials, ARR bridge, churn, NRR, CAC and gross margin
    - Current cap table, debt, liquidation preferences and secondary share transactions
    - Top-customer revenue concentration, contracts, SLAs and reference calls
    - Data coverage, uptime, API/event quality and carrier active-status definitions
    - AI model governance, product adoption and ROI methodology
    - Counsel-reviewed litigation/IP/regulatory docket analysis
  recommended_next_steps:
    - Run finance, customer and legal data-room request list before any investment decision.
    - Conduct customer references focused on ROI, switching costs and renewal intent.
    - Review security reports, data-rights contracts and incident history.
    - Have counsel assess FourKites/MyCarrier/SMC3 matters and IP ownership.
    - Stress-test valuation against current ARR, growth, margin and freight-cycle scenarios.
