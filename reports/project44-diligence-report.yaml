report_metadata:
  report_title: project44 Startup Diligence Report
  target_company: project44
  website: https://www.project44.com/
  known_aliases:
    - project44
    - Project44
    - p44
    - Movement by project44
  sector: Enterprise supply-chain visibility and decision intelligence software
  geography: United States; headquartered in Chicago with global network claims
  company_stage: Private unicorn / growth-stage enterprise software
  research_date: 2026-05-18
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: America/Chicago
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Existing-report exclusion list and CB Insights unicorn candidate selection
    - Company-owned product, about, security, carrier and leadership pages
    - Search-result snippets for financing, eligibility and legal sweeps
    - No paid data-room, docket, patent or private-market database access
  included_jurisdictions:
    - United States federal and state legal/regulatory issues identified in public snippets
    - Global privacy/data-transfer issues where company pages claim international operations
  excluded_topics:
    - No non-public data room
    - No customer or management interviews
    - No paid legal docket, patent, tax, lien or corporate registry searches
    - No security testing or private control reports
    - No audited financial statements, cap table or board materials
  user_provided_materials: []
