risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and stale valuation risk
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources disclose funding and selective ARR/headcount claims, but not audited financials, burn,
      margins, retention, debt or valuation changes after 2022.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a67
    mitigation_or_diligence_request: Request audited/management financials, ARR bridge, gross margin by product, cash
      runway, debt instruments and valuation marks.
  - risk_id: R-002
    risk_title: Network data quality and integration dependency
    risk_category: technical
    severity: high
    likelihood: medium
    description: The value proposition depends on carrier, telematics, API and event data quality at global scale; public
      metrics do not prove active coverage or data accuracy.
    impacted_chapter_ids:
      - II
      - III
      - VI
    impacted_section_ids:
      - II.A
      - III.B
      - III.E
      - VI.A
    evidence_claim_ids: *a68
    mitigation_or_diligence_request: Review data-quality dashboards, uptime, coverage by lane, contractual data rights and customer escalations.
  - risk_id: R-003
    risk_title: AI-agent and ROI claims may outpace proof
    risk_category: product
    severity: high
    likelihood: medium
    description: Autopilot and Decision Intelligence claims are strong but require proof of adoption, model performance,
      human oversight and repeatable economics.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
    evidence_claim_ids: *a69
    mitigation_or_diligence_request: Request product analytics, AI evaluation methodology, customer references and roadmap delivery milestones.
  - risk_id: R-004
    risk_title: Competitive litigation and IP dispute exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Public snippets identify competitor disputes involving FourKites, MyCarrier and SMC3; litigation can create
      cost, distraction and reputational risk.
    impacted_chapter_ids:
      - VIII
      - IV
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - IV.A
    evidence_claim_ids: *a70
    mitigation_or_diligence_request: Run counsel-led docket review, pleadings analysis, reserve assessment and IP-ownership review.
  - risk_id: R-005
    risk_title: Security, privacy and cross-border data exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Global logistics data flows and customer integrations heighten privacy, cybersecurity and vendor-risk
      exposure despite public certification claims.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.G
      - VIII.F
      - II.A
    evidence_claim_ids: *a71
    mitigation_or_diligence_request: Verify SOC 2/ISO scopes, data map, subprocessors, breach history and privacy impact assessments.
  - risk_id: R-006
    risk_title: Customer concentration and ROI representativeness unknown
    risk_category: customer
    severity: medium
    likelihood: high
    description: Public customer outcomes are selective and do not disclose revenue concentration, churn, NRR or performance
      distribution.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a72
    mitigation_or_diligence_request: Request top-customer revenue, cohorts, churn, NRR, contract terms and reference calls.
  - risk_id: R-007
    risk_title: Freight-cycle and logistics budget cyclicality
    risk_category: market
    severity: medium
    likelihood: medium
    description: Supply-chain software budgets can be pressured by freight downturns, margin compression and shipper
      cost-reduction cycles.
    impacted_chapter_ids:
      - IV
      - V
      - I
    impacted_section_ids:
      - IV.A
      - V.A
      - I.B
    evidence_claim_ids: *a73
    mitigation_or_diligence_request: Stress-test plan against freight volumes, customer budgets and price pressure.
  - risk_id: R-008
    risk_title: Founder/key-person and leadership-turnover opacity
    risk_category: team
    severity: medium
    likelihood: unknown
    description: A founder-led company depends on executive continuity, but board, compensation, succession and turnover
      data are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.C
      - VII.G
    evidence_claim_ids: *a74
    mitigation_or_diligence_request: Review org chart, retention plans, executive churn and succession documents.
