    verification_status: partially_verified
    confidence: high
    source_ids: [SRC-CLY-005]
    quoted_evidence: [{source_id: SRC-CLY-005, quote: "To obtain the external audit reports and pen test documents, an NDA must be signed first", location: "Trust Center"}]
    analyst_interpretation: Public trust posture is credible but report contents and exceptions are not publicly reviewable.
