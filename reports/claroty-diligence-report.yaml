  - evidence_claim_id: EC-CLY-010
    claim: Public IPO-related snippets indicated Claroty may be preparing for an IPO, but no completed IPO was found.
    evidence_summary: Reuters/MarketScreener-style search notes referenced IPO preparation, not a completed listing.
    evidence_type: independent_news
    verification_status: partially_verified
    confidence: medium
    source_ids: [SRC-CLY-009]
    quoted_evidence: [{source_id: SRC-CLY-009, quote: "IPO reports were possible/prep only, not completed IPO.", location: "research notes"}]
    analyst_interpretation: Supports private-company eligibility and potential IPO-readiness diligence.
