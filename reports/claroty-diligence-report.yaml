report_metadata:
  report_title: Claroty Startup Diligence Report
  target_company: Claroty
  website: https://claroty.com/
  known_aliases: [Claroty, Claroty Ltd., Claroty Inc.]
  sector: Enterprise technology, cyber-physical systems security, OT/IoT/IoMT security
  geography: United States headquartered in New York with Israeli origins and global enterprise markets
  company_stage: Private unicorn / late-stage cybersecurity company
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Reviewed public unicorn-list data, company pages, platform pages, trust center, leadership page, case studies, financing coverage, IPO-preparation snippets and public web search notes.
    - Treated company-owned claims as evidence that the product, leadership and certifications are publicly represented; requested private verification for ARR quality, customer contracts, security audit reports and cap table.
    - Did not rely on inaccessible pages as substantive evidence; inaccessible or 404 pages are recorded as limitations.
  included_jurisdictions: [United States, Israel, global enterprise/public-sector markets]
  excluded_topics:
    - Non-public customer contracts, ARR cohort exports, SOC 2 report text, penetration-test reports, incident records, board minutes, cap table, option pool and counsel letters.
  user_provided_materials:
    - material_id: UPM-CLY-001
      title: Workflow request and candidate-selection context
      type: workflow_request
      date_received: 2026-05-25
      notes: Claroty was selected at random from uncovered private-unicorn candidates after excluding existing report slugs.
founder_claims:
  - founder_claim_id: FC-CLY-001
    claim_text: Claroty is an active private unicorn in enterprise technology/cybersecurity.
    claim_source: CB Insights candidate row and public financing coverage
    claim_date: 2024-03-06
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.A]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: [EC-CLY-001, EC-CLY-002]
    contradiction_summary: Public sources disagree on valuation anchors; CB Insights lists $3B while SecurityWeek reports a $2.5B valuation was reported by Globes but not confirmed by Claroty.
    diligence_follow_up: [Request latest cap table, round documents, primary-vs-secondary proceeds and 409A/common-stock valuation.]
  - founder_claim_id: FC-CLY-002
    claim_text: Claroty surpassed $100M ARR in 2023 and works with 20% of Fortune 100 companies.
    claim_source: SecurityWeek funding coverage
    claim_date: 2024-03-06
    mapped_chapter_ids: [I, III, V]
    mapped_section_ids: [I.A, III.A, V.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-CLY-003]
    contradiction_summary: The claim is public and credible but not supported by audited statements or customer-contract schedules in public sources.
    diligence_follow_up: [Request ARR waterfall, logo list, contract values, NRR/GRR, churn, multi-year commitments and pipeline conversion.]
  - founder_claim_id: FC-CLY-003
    claim_text: Claroty provides a platform purpose-built for cyber-physical systems across industrial, healthcare, commercial and public-sector environments.
    claim_source: Claroty company and platform pages
    claim_date: null
    mapped_chapter_ids: [II, IV, VI]
    mapped_section_ids: [II.A, IV.A, VI.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-CLY-004, EC-CLY-005]
    contradiction_summary: Public product claims are consistent, but performance benchmarks and deployment success rates are not public.
    diligence_follow_up: [Request product roadmap, deployment metrics, integration list, win/loss analysis and ARR by module.]
  - founder_claim_id: FC-CLY-004
    claim_text: Claroty has mature trust/compliance posture including SOC 2 Type 2, ISO 27001:2022, ISO 27701:2019, C5, CSA STAR, HIPAA, GDPR and SOCI representations.
    claim_source: Claroty Trust Center
    claim_date: null
    mapped_chapter_ids: [VI, VIII]
    mapped_section_ids: [VI.A, VIII.A]
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids: [EC-CLY-006]
    contradiction_summary: Trust Center says external audit reports and penetration-test documents require an NDA, so public diligence cannot inspect the reports.
    diligence_follow_up: [Request audit reports, management responses, pen-test summaries, exceptions, subprocessor list and incident history.]
executive_summary:
  overall_assessment: Claroty has credible public evidence of late-stage scale, a strong CPS/OT cybersecurity positioning, named enterprise case studies and a public trust posture, but valuation, ARR quality, customer concentration, gross retention, deployment economics and audit-report exceptions remain private.
  investment_or_diligence_thesis: Claroty merits continued diligence as a category leader candidate in cyber-physical systems security; investment reliance should wait for ARR cohort validation, customer contract review, technical/security diligence and legal/compliance review.
  strongest_verified_claims:
    - founder_claim_id: FC-CLY-003
      summary: Company pages verify Claroty targets industrial, healthcare, commercial and public-sector CPS environments with asset inventory, exposure management, network protection, secure access and threat detection.
      evidence_claim_ids: [EC-CLY-004, EC-CLY-005]
    - founder_claim_id: FC-CLY-004
      summary: Trust Center lists multiple compliance certifications and notes audit/pen-test reports are available under NDA.
      evidence_claim_ids: [EC-CLY-006]
    - founder_claim_id: FC-CLY-002
      summary: SecurityWeek reports Claroty exceeded $100M ARR in 2023 and claimed usage by 20% of Fortune 100 companies.
      evidence_claim_ids: [EC-CLY-003]
  biggest_risks:
    - risk_id: R-CLY-001
      summary: Valuation support is mixed and current share economics are private.
    - risk_id: R-CLY-002
      summary: ARR quality, customer concentration and deployment economics are not public.
    - risk_id: R-CLY-003
      summary: Mission-critical CPS environments create product-liability, incident-response and compliance stakes.
  key_evidence_gaps:
    - Audited financials, ARR waterfall, retention/churn and customer concentration.
    - Current cap table, preference stack, debt/credit terms and IPO-readiness materials.
    - SOC 2/ISO audit reports, penetration tests, incident logs and subprocessor/data-flow inventory.
    - Legal schedule, IP ownership assignments and pending litigation/regulatory correspondence.
  recommended_next_steps:
    - Request financial, customer and technical data rooms before relying on ARR or valuation claims.
    - Conduct customer calls across industrial, healthcare, commercial and public-sector segments.
    - Review security audit reports and incident-response history under NDA.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports major funding and ARR-scale claims, but valuation anchors conflict and current financial quality is not public.
    founder_claim_ids: [FC-CLY-001, FC-CLY-002]
    evidence_claim_ids: [EC-CLY-001, EC-CLY-002, EC-CLY-003]
    risk_ids: [R-CLY-001, R-CLY-002]
    sections:
      - section_id: I.A
        title: Financing, valuation and public ARR signals
        checklist_question_ids: [I.A.public_financials, I.C.funding_history]
        summary: Claroty's public financing profile is strong, but investors need direct records to reconcile CB Insights' $3B valuation row with SecurityWeek's $2.5B reported-but-unconfirmed valuation and to validate ARR quality.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: CLY-I-F1
            finding: CB Insights candidate data lists Claroty at a $3B valuation and first-unicorn date of June 17, 2021.
            evidence_claim_ids: [EC-CLY-001]
            risk_ids: [R-CLY-001]
          - finding_id: CLY-I-F2
            finding: SecurityWeek reported March 2024 strategic growth funding of $100M, total investment of $735M and a reported $2.5B valuation that Claroty declined to confirm while confirming an up-round.
            evidence_claim_ids: [EC-CLY-002]
            risk_ids: [R-CLY-001]
          - finding_id: CLY-I-F3
            finding: SecurityWeek reported Claroty exceeded $100M ARR in 2023.
            evidence_claim_ids: [EC-CLY-003]
            risk_ids: [R-CLY-002]
        hidden_risks: [Valuation markdown/downside since 2024, Debt or structured capital terms, ARR quality masked by services or multi-year prepayments.]
        evidence_gaps: [Audited financial statements, ARR waterfall, cap table, preference stack, debt terms, bookings/pipeline and board-approved plan.]
        follow_up_questions: [What is current ARR, NRR, GRR, gross margin, cash runway and valuation support as of the latest month close?]
        table_ids: [T-CLY-I-1, T-CLY-I-2]
        figure_ids: [F-CLY-I]
        evidence_claim_ids: [EC-CLY-001, EC-CLY-002, EC-CLY-003]
  - chapter_id: II
    title: Products
    chapter_summary: Claroty publicly markets a CPS protection platform with asset inventory, exposure management, network protection, secure access, threat detection and flexible cloud/on-prem deployment.
    founder_claim_ids: [FC-CLY-003]
    evidence_claim_ids: [EC-CLY-004, EC-CLY-005]
    risk_ids: [R-CLY-003, R-CLY-004]
    sections:
      - section_id: II.A
        title: Platform capabilities and pricing opacity
        checklist_question_ids: [II.A.product_matrix, II.B.pricing]
        summary: Public product pages clearly describe modules and deployment modes, but pricing, module attach rates, implementation times and support economics are not public.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: CLY-II-F1
            finding: Platform page describes asset inventory, exposure management, network protection, secure access and threat detection.
            evidence_claim_ids: [EC-CLY-005]
            risk_ids: [R-CLY-003]
          - finding_id: CLY-II-F2
            finding: Claroty says the platform can be deployed in the cloud or on-premise, with xDome as SaaS and CTD as on-premise.
            evidence_claim_ids: [EC-CLY-005]
            risk_ids: [R-CLY-004]
        hidden_risks: [Complex deployments could lengthen sales cycles, OT asset discovery errors could impair customer trust, On-prem support may pressure gross margin.]
        evidence_gaps: [Pricing model, module ARR, deployment duration, support ticket volume, incident SLAs and product gross margin by deployment mode.]
        follow_up_questions: [What percentage of ARR is xDome SaaS versus CTD on-premise, and what are implementation costs by segment?]
        table_ids: [T-CLY-II-1, T-CLY-II-2]
        figure_ids: [F-CLY-II]
        evidence_claim_ids: [EC-CLY-004, EC-CLY-005]
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence includes case studies across healthcare, data centers and industrial customers plus a reported Fortune 100 penetration claim; concentration and contract economics remain private.
    founder_claim_ids: [FC-CLY-002, FC-CLY-003]
    evidence_claim_ids: [EC-CLY-003, EC-CLY-007]
    risk_ids: [R-CLY-002, R-CLY-006]
    sections:
      - section_id: III.A
        title: Customers, segments and partnerships
        checklist_question_ids: [III.A.customer_list, III.C.partners, III.E.suppliers]
        summary: Public case studies show named/partly named enterprise deployments, while SecurityWeek reports 20% Fortune 100 usage; customer concentration, ACV and renewal quality are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: CLY-III-F1
            finding: Claroty's case-study page names Ohio State University Wexner Medical Center, PHSA/FHA, Phlow, Hydrovolt and a global data center platform.
            evidence_claim_ids: [EC-CLY-007]
            risk_ids: [R-CLY-002]
          - finding_id: CLY-III-F2
            finding: SecurityWeek reports Claroty claims usage by 20% of Fortune 100 companies.
            evidence_claim_ids: [EC-CLY-003]
            risk_ids: [R-CLY-002]
        hidden_risks: [Large-account concentration, partner/channel conflict, deployment stalls in regulated environments.]
        evidence_gaps: [Customer list, ACV distribution, top-10 ARR share, renewals, product usage logs, channel partner contracts and reference-call permissions.]
        follow_up_questions: [How much ARR is concentrated in the top 10 customers and partners, and what is NRR by segment?]
        table_ids: [T-CLY-III-1, T-CLY-III-2]
        figure_ids: [F-CLY-III]
        evidence_claim_ids: [EC-CLY-003, EC-CLY-007]
  - chapter_id: IV
    title: Competition
    chapter_summary: Claroty competes in OT/CPS cybersecurity against specialist OT-security vendors and broader security-platform vendors extending into industrial, IoT and healthcare environments.
    founder_claim_ids: [FC-CLY-003]
    evidence_claim_ids: [EC-CLY-004, EC-CLY-005, EC-CLY-008]
    risk_ids: [R-CLY-004]
    sections:
      - section_id: IV.A
        title: Competitive positioning and category risk
        checklist_question_ids: [IV.A.competitor_matrix, IV.B.competition_basis]
        summary: Public positioning emphasizes purpose-built CPS breadth and analyst recognition; competitive durability depends on protocol coverage, integrations, deployment success and budget consolidation.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: CLY-IV-F1
            finding: "Company page describes four verticals: industrial, healthcare, commercial and public sector."
            evidence_claim_ids: [EC-CLY-004]
            risk_ids: [R-CLY-004]
          - finding_id: CLY-IV-F2
            finding: Platform page says Claroty consolidates remote access, vulnerability management and threat detection into a single platform.
            evidence_claim_ids: [EC-CLY-005]
            risk_ids: [R-CLY-004]
        hidden_risks: [Security-suite vendors may bundle comparable capabilities, OT specialists may compete on depth, Gartner/analyst position may not translate into win rates.]
        evidence_gaps: [Win/loss data, competitive displacement metrics, ARR by competitor replaced, pricing pressure and renewal discounting.]
        follow_up_questions: [Against which vendors does Claroty most often win or lose, and why?]
        table_ids: [T-CLY-IV-1, T-CLY-IV-2]
        figure_ids: [F-CLY-IV]
        evidence_claim_ids: [EC-CLY-004, EC-CLY-005, EC-CLY-008]
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Claroty appears to sell enterprise CPS-security solutions through direct, partner and industry-specific motions; channel economics and pipeline quality are not public.
    founder_claim_ids: [FC-CLY-002, FC-CLY-003]
    evidence_claim_ids: [EC-CLY-003, EC-CLY-004, EC-CLY-007]
    risk_ids: [R-CLY-002, R-CLY-004]
    sections:
      - section_id: V.A
        title: GTM signals and enterprise pipeline
        checklist_question_ids: [V.A.channels, V.B.marketing_signals]
        summary: Public site navigation surfaces demo requests, case studies, partner programs, events and resources, but sales productivity, CAC payback and pipeline conversion are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: CLY-V-F1
            finding: Public site includes request-a-demo, partner, technology alliance, channel partner and case-study surfaces.
            evidence_claim_ids: [EC-CLY-004, EC-CLY-007]
            risk_ids: [R-CLY-004]
          - finding_id: CLY-V-F2
            finding: $100M+ ARR claim suggests scaled enterprise GTM but not current pipeline health.
            evidence_claim_ids: [EC-CLY-003]
            risk_ids: [R-CLY-002]
        hidden_risks: [Long regulated-enterprise sales cycles, Partner dependency, Public-sector procurement delays.]
        evidence_gaps: [Pipeline, bookings, sales productivity, channel mix, CAC payback, partner-sourced ARR and win rates.]
        follow_up_questions: [What is the conversion funnel from demo request to closed ARR by segment and channel?]
        table_ids: [T-CLY-V-1, T-CLY-V-2]
        figure_ids: [F-CLY-V]
        evidence_claim_ids: [EC-CLY-003, EC-CLY-004, EC-CLY-007]
  - chapter_id: VI
    title: Research and Development
    chapter_summary: Claroty's R&D credibility is supported by platform breadth, Team82 threat research, vulnerability disclosure resources and named technology leadership, but roadmap, engineering productivity and IP ownership remain private.
    founder_claim_ids: [FC-CLY-003, FC-CLY-004]
    evidence_claim_ids: [EC-CLY-005, EC-CLY-006, EC-CLY-009]
    risk_ids: [R-CLY-003, R-CLY-005]
    sections:
      - section_id: VI.A
        title: Product development, Team82 and security controls
        checklist_question_ids: [VI.A.r_and_d_team, VI.B.pipeline]
        summary: Company navigation and leadership pages indicate threat research, vulnerability disclosure, CTO/CIO roles and multiple discovery methods, but detailed roadmap and engineering health are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: CLY-VI-F1
            finding: Platform page lists discovery methods including Claroty Edge, passive monitoring, safe queries, project file analysis and ecosystem enrichment.
            evidence_claim_ids: [EC-CLY-005]
            risk_ids: [R-CLY-003]
          - finding_id: CLY-VI-F2
            finding: Trust Center lists audit/certification posture but says audit reports and pen tests require NDA.
            evidence_claim_ids: [EC-CLY-006]
            risk_ids: [R-CLY-005]
        hidden_risks: [Undisclosed audit exceptions, R&D complexity across cloud/on-prem, Protocol coverage debt, Vulnerability disclosure liability.]
        evidence_gaps: [Roadmap, release cadence, engineering org, IP assignments, patent portfolio, audit exceptions, pen-test findings and vulnerability SLA metrics.]
        follow_up_questions: [What technical debt, security audit exceptions and roadmap items are material to renewals and win rates?]
        table_ids: [T-CLY-VI-1, T-CLY-VI-2]
        figure_ids: [F-CLY-VI]
        evidence_claim_ids: [EC-CLY-005, EC-CLY-006, EC-CLY-009]
  - chapter_id: VII
    title: Management and Personnel
    chapter_summary: Claroty publicly lists a deep executive team and board, including CEO Yaniv Vardi, CFO/COO Udi Bar Sela, CTO Amir Preminger and investors/directors from Team8, Bessemer, SoftBank, MoreVC, Standard Investments, Rockwell Automation and SE Ventures.
    founder_claim_ids: [FC-CLY-001]
    evidence_claim_ids: [EC-CLY-009]
    risk_ids: [R-CLY-005]
    sections:
      - section_id: VII.A
        title: Leadership, board and workforce signals
        checklist_question_ids: [VII.A.management_roster, VII.B.headcount]
        summary: Leadership depth is visible, but tenure, founder operating roles, attrition, headcount distribution and compensation liabilities need private diligence.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: CLY-VII-F1
            finding: Leadership page lists CEO Yaniv Vardi, CSO Grant Geyer, CPO Gil Gur Arie, CFO/COO Udi Bar Sela, CMO Upa Campbell, CRO James Love, CCO Shira Bar Yosef, CLO Yuval Fessler, CTO Amir Preminger, CIO Yuval Zilberman and CHRO Natalie Katester Boimer.
            evidence_claim_ids: [EC-CLY-009]
            risk_ids: [R-CLY-005]
          - finding_id: CLY-VII-F2
            finding: Board page includes co-founders and investors/directors, creating both governance strength and potential investor-rights complexity.
            evidence_claim_ids: [EC-CLY-009]
            risk_ids: [R-CLY-001]
        hidden_risks: [Founder role transition, Complex investor rights, Executive retention risk before IPO/liquidity.]
        evidence_gaps: [Org chart, headcount trend, employee attrition, option refresh needs, employment agreements and board/investor rights.]
        follow_up_questions: [What are current headcount, attrition, executive retention arrangements and board consent rights?]
        table_ids: [T-CLY-VII-1, T-CLY-VII-2]
        figure_ids: [F-CLY-VII, F-CLY-VII-HC]
        evidence_claim_ids: [EC-CLY-009]
  - chapter_id: VIII
    title: Legal and Related Matters
    chapter_summary: Public sources did not confirm an IPO, acquisition or shutdown; legal diligence should focus on security/compliance audit evidence, customer/regulatory obligations, IP ownership and IPO-preparation reports.
    founder_claim_ids: [FC-CLY-004]
    evidence_claim_ids: [EC-CLY-006, EC-CLY-010, EC-CLY-011]
    risk_ids: [R-CLY-001, R-CLY-003, R-CLY-005]
    sections:
      - section_id: VIII.A
        title: Legal status, compliance and regulatory exposure
        checklist_question_ids: [VIII.A.lawsuits_against, VIII.C.ip, VIII.F.regulatory_actions]
        summary: Public evidence indicates compliance claims and possible IPO preparation, but no completed IPO; audit reports, open matters, IP schedules and regulatory correspondence remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: CLY-VIII-F1
            finding: Trust Center lists certifications and says external audit reports and pen-test documents require NDA.
            evidence_claim_ids: [EC-CLY-006]
            risk_ids: [R-CLY-005]
          - finding_id: CLY-VIII-F2
            finding: IPO-related snippets described possible preparation rather than a completed IPO, supporting private-company eligibility.
            evidence_claim_ids: [EC-CLY-010]
            risk_ids: [R-CLY-001]
        hidden_risks: [Undisclosed security incidents, Critical-infrastructure contractual liability, Export-control/public-sector compliance, Investor rights triggered by IPO process.]
        evidence_gaps: [Legal open-matter schedule, IP assignment records, regulatory inquiries, customer indemnities, incident history, DPA/subprocessor list and IPO-readiness documents.]
        follow_up_questions: [What material legal, compliance, security or regulatory matters have been reserved, disclosed or remediated?]
        table_ids: [T-CLY-VIII-1, T-CLY-VIII-2]
        figure_ids: [F-CLY-VIII]
        evidence_claim_ids: [EC-CLY-006, EC-CLY-010, EC-CLY-011]
tables:
  - table_id: T-CLY-I-1
    title: Public funding and valuation evidence
    chapter_id: I
    section_id: I.A
    purpose: Summarize public financing anchors and conflicts.
    columns: [{name: date, description: Date}, {name: event, description: Event}, {name: public_evidence, description: Evidence}, {name: diligence_gap, description: Gap}]
    rows:
      - row_id: CLY-I-1A
        values: {date: "2021-06-17", event: "Unicorn-list anchor", public_evidence: "CB Insights row lists $3B valuation and first-unicorn date", diligence_gap: "Round documents and valuation support"}
        evidence_claim_ids: [EC-CLY-001]
        source_ids: [SRC-CLY-001]
      - row_id: CLY-I-1B
        values: {date: "2024-03-06", event: "$100M strategic growth funding", public_evidence: "SecurityWeek says total funding reached $735M and reported $2.5B valuation was not confirmed by Claroty", diligence_gap: "Security terms, proceeds, debt/private-credit components and current valuation"}
        evidence_claim_ids: [EC-CLY-002]
        source_ids: [SRC-CLY-002]
    evidence_claim_ids: [EC-CLY-001, EC-CLY-002]
    source_ids: [SRC-CLY-001, SRC-CLY-002]
    notes: Treat $2.5B and $3B as public valuation anchors, not audited fair value.
  - table_id: T-CLY-I-2
    title: Public ARR and financial quality requests
    chapter_id: I
    section_id: I.A
    purpose: Separate ARR claim from data-room requirements.
    columns: [{name: metric, description: Metric}, {name: public_signal, description: Signal}, {name: verification_status, description: Status}, {name: request, description: Request}]
    rows:
      - row_id: CLY-I-2A
        values: {metric: "ARR", public_signal: "Exceeded $100M ARR in 2023 per SecurityWeek", verification_status: partially_verified, request: "ARR waterfall, new/expansion/churn, invoiced vs recognized revenue"}
        evidence_claim_ids: [EC-CLY-003]
        source_ids: [SRC-CLY-002]
      - row_id: CLY-I-2B
        values: {metric: "Runway/burn", public_signal: "$100M strategic growth funding in 2024", verification_status: partially_verified, request: "Cash balance, burn, debt and forecast"}
        evidence_claim_ids: [EC-CLY-002]
        source_ids: [SRC-CLY-002]
      - row_id: CLY-I-2C
        values: {metric: "Gross margin", public_signal: "No public gross-margin evidence", verification_status: not_publicly_verifiable, request: "SaaS/on-prem/services gross margin by product"}
        evidence_claim_ids: [EC-CLY-011]
        source_ids: [SRC-CLY-011]
    evidence_claim_ids: [EC-CLY-002, EC-CLY-003, EC-CLY-011]
    source_ids: [SRC-CLY-002, SRC-CLY-011]
    notes: ARR quality is the central financial diligence item.
  - table_id: T-CLY-II-1
    title: Product capability matrix
    chapter_id: II
    section_id: II.A
    purpose: Map public platform capabilities.
    columns: [{name: capability, description: Capability}, {name: public_evidence, description: Evidence}, {name: diligence_gap, description: Gap}]
    rows:
      - row_id: CLY-II-1A
        values: {capability: "Asset inventory", public_evidence: "Platform page calls asset inventory critical and describes multiple discovery methods", diligence_gap: "Accuracy, false positives and deployment scope"}
        evidence_claim_ids: [EC-CLY-005]
        source_ids: [SRC-CLY-004]
      - row_id: CLY-II-1B
        values: {capability: "Exposure management", public_evidence: "Platform page says it scopes CPS assets to prioritize vulnerabilities and exposures", diligence_gap: "Remediation outcomes and vulnerability SLA"}
        evidence_claim_ids: [EC-CLY-005]
        source_ids: [SRC-CLY-004]
      - row_id: CLY-II-1C
        values: {capability: "Network protection and secure access", public_evidence: "Platform page describes segmentation policy and secure third-party access", diligence_gap: "Integration costs and access-control exceptions"}
        evidence_claim_ids: [EC-CLY-005]
        source_ids: [SRC-CLY-004]
      - row_id: CLY-II-1D
        values: {capability: "Threat detection", public_evidence: "Platform page says alerts integrate with SIEM, SOAR, EDR and SOC technologies", diligence_gap: "Detection efficacy and alert fatigue"}
        evidence_claim_ids: [EC-CLY-005]
        source_ids: [SRC-CLY-004]
    evidence_claim_ids: [EC-CLY-005]
    source_ids: [SRC-CLY-004]
    notes: Product descriptions are public company claims.
  - table_id: T-CLY-II-2
    title: Pricing and deployment model diligence
    chapter_id: II
