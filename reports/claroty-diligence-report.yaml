evidence_claims:
  - evidence_claim_id: EC-CLY-001
    claim: CB Insights candidate data listed Claroty as a United States enterprise-tech unicorn headquartered in New York, valued at $3B with first-unicorn date June 17, 2021.
    evidence_summary: Candidate row captured from public unicorn-list workflow.
    evidence_type: market_database
    verification_status: partially_verified
    confidence: medium
    source_ids: [SRC-CLY-001]
    quoted_evidence: [{source_id: SRC-CLY-001, quote: "Claroty | $3 | 6/17/2021 | United States | New York | Enterprise Tech | Bessemer Venture Partners, MoreVC, Team8", location: "candidate row"}]
    analyst_interpretation: Supports private-unicorn eligibility but conflicts with later reported unconfirmed valuation.
    limitations: Secondary market database, not round documents.
    associations: {chapter_id: I, section_id: I.A, founder_claim_ids: [FC-CLY-001], table_ids: [T-CLY-I-1], figure_ids: [F-CLY-I], risk_ids: [R-CLY-001]}
  - evidence_claim_id: EC-CLY-002
    claim: SecurityWeek reported Claroty raised $100M strategic growth funding in March 2024, bringing total investment to $735M, with a reported $2.5B valuation that Claroty declined to confirm while confirming an up-round.
    evidence_summary: Funding article includes financing participants, use of proceeds, total investment and valuation caveat.
    evidence_type: independent_news
    verification_status: verified
    confidence: high
    source_ids: [SRC-CLY-002]
    quoted_evidence: [{source_id: SRC-CLY-002, quote: "raised another $100 million at a reported valuation of $2.5 billion", location: "article headline/subhead"}, {source_id: SRC-CLY-002, quote: "brings the total investment secured by the firm to $735 million", location: "article body"}]
    analyst_interpretation: Strong public funding evidence; valuation remains not company-confirmed.
    limitations: Does not disclose security terms, primary/secondary split or current valuation.
    associations: {chapter_id: I, section_id: I.A, founder_claim_ids: [FC-CLY-001], table_ids: [T-CLY-I-1], figure_ids: [F-CLY-I], risk_ids: [R-CLY-001]}
  - evidence_claim_id: EC-CLY-003
    claim: SecurityWeek reported Claroty exceeded $100M ARR in 2023 and claimed its solutions are used by 20% of Fortune 100 companies.
    evidence_summary: Article provides ARR and Fortune 100 penetration claims.
    evidence_type: independent_news
    verification_status: partially_verified
    confidence: medium
    source_ids: [SRC-CLY-002]
    quoted_evidence: [{source_id: SRC-CLY-002, quote: "Claroty claims its solutions are used by 20% of Fortune 100 companies, and boasts exceeding $100 million in ARR in 2023.", location: "article body"}]
    analyst_interpretation: Material scale signal; private ARR/customer schedules are needed.
    limitations: No ARR waterfall, customer contracts or retention metrics.
    associations: {chapter_id: I, section_id: I.A, founder_claim_ids: [FC-CLY-002], table_ids: [T-CLY-I-2], figure_ids: [F-CLY-V], risk_ids: [R-CLY-002]}
  - evidence_claim_id: EC-CLY-004
    claim: Claroty says it secures industrial, healthcare, commercial and public-sector cyber-physical systems.
    evidence_summary: Company page describes mission and vertical coverage.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-CLY-003]
    quoted_evidence: [{source_id: SRC-CLY-003, quote: "We empower industrial, healthcare, public sector, and commercial organizations to secure all cyber-physical systems in their environments", location: "What We Do"}]
    analyst_interpretation: Verifies public vertical positioning.
    limitations: Does not validate market share or customer outcomes.
    associations: {chapter_id: II, section_id: II.A, founder_claim_ids: [FC-CLY-003], table_ids: [T-CLY-IV-2], figure_ids: [F-CLY-IV], risk_ids: [R-CLY-004]}
  - evidence_claim_id: EC-CLY-005
    claim: Claroty's platform includes asset inventory, exposure management, network protection, secure access, threat detection, multiple discovery methods and cloud/on-prem deployment.
    evidence_summary: Platform page lists modules, benefits, integrations and deployment choices.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-CLY-004]
    quoted_evidence: [{source_id: SRC-CLY-004, quote: "Combining deep asset visibility, threat detection, exposure management, and network protection, the Claroty Platform can be deployed on-premise or in the cloud", location: "Platform page"}]
    analyst_interpretation: Verifies platform breadth; implementation performance is private.
    limitations: Product efficacy, pricing and deployment economics are not independently tested here.
    associations: {chapter_id: II, section_id: II.A, founder_claim_ids: [FC-CLY-003], table_ids: [T-CLY-II-1, T-CLY-II-2], figure_ids: [F-CLY-II], risk_ids: [R-CLY-003, R-CLY-004]}
  - evidence_claim_id: EC-CLY-006
