risk_register:
  - risk_id: R-CLY-001
    risk_title: Valuation and capital structure support are not public
    risk_category: financial
    severity: high
    likelihood: medium
    description: CB Insights lists $3B while SecurityWeek reports a $2.5B valuation was reported but not confirmed; full capital structure, preferences and current fair value are private.
    impacted_chapter_ids: [I, VIII]
    impacted_section_ids: [I.A, VIII.A]
    evidence_claim_ids: [EC-CLY-001, EC-CLY-002, EC-CLY-010]
    mitigation_or_diligence_request: Request cap table, round docs, debt/credit terms, board valuation support and latest 409A.
  - risk_id: R-CLY-002
    risk_title: ARR quality, retention and concentration are not public
    risk_category: financial
    severity: high
    likelihood: medium
    description: $100M+ ARR and Fortune 100 penetration claims are public but not supported by cohort exports, contracts, churn or top-customer concentration in public sources.
    impacted_chapter_ids: [I, III, V]
    impacted_section_ids: [I.A, III.A, V.A]
    evidence_claim_ids: [EC-CLY-003, EC-CLY-007]
    mitigation_or_diligence_request: Request ARR waterfall, NRR/GRR, customer-contract schedule, top-10 ARR share and reference calls.
  - risk_id: R-CLY-003
    risk_title: Product reliability in critical CPS environments
    risk_category: operational
    severity: high
    likelihood: medium
    description: Claroty operates in industrial, healthcare, commercial and public-sector environments where misconfiguration, detection gaps or access-control failures can carry high consequences.
    impacted_chapter_ids: [II, VI, VIII]
    impacted_section_ids: [II.A, VI.A, VIII.A]
    evidence_claim_ids: [EC-CLY-004, EC-CLY-005]
    mitigation_or_diligence_request: Review incident logs, SLAs, product-liability terms, deployment QA and customer escalation records.
  - risk_id: R-CLY-004
    risk_title: Competitive and pricing pressure in OT/CPS security
    risk_category: market
    severity: medium
    likelihood: medium
    description: Specialist OT-security competitors and broader security-suite vendors can challenge pricing, bundling and renewals.
    impacted_chapter_ids: [IV, V]
    impacted_section_ids: [IV.A, V.A]
    evidence_claim_ids: [EC-CLY-004, EC-CLY-005, EC-CLY-008]
    mitigation_or_diligence_request: Request win/loss, pricing-discount, competitive-displacement and renewal data.
  - risk_id: R-CLY-005
    risk_title: Security audit exceptions and incident history require NDA
    risk_category: regulatory
    severity: high
    likelihood: unknown
    description: Trust Center lists certifications but audit reports and pen tests are not public, leaving scope, exceptions and remediation unknown.
    impacted_chapter_ids: [VI, VIII]
