    confidence: medium
    source_ids: [SRC-CLY-003]
    quoted_evidence: [{source_id: SRC-CLY-003, quote: "Claroty Named a Leader in 2026 Gartner Magic Quadrant for CPS Protection Platforms", location: "Company page awards/resources"}]
    analyst_interpretation: Supports category credibility but not financial quality.
