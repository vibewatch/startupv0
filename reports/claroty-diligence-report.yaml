    associations: {chapter_id: IV, section_id: IV.A, founder_claim_ids: [], table_ids: [T-CLY-V-2], figure_ids: [F-CLY-V], risk_ids: [R-CLY-004]}
  - evidence_claim_id: EC-CLY-009
    claim: Claroty's leadership page lists its executive team, board and Team82/threat research navigation.
    evidence_summary: Leadership page provides named executives and directors; site navigation exposes Team82, threat intelligence and vulnerability disclosure resources.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-CLY-008]
    quoted_evidence: [{source_id: SRC-CLY-008, quote: "Yaniv Vardi Chief Executive Officer", location: "Executive Team"}, {source_id: SRC-CLY-008, quote: "Udi Bar Sela Chief Financial Officer and Chief Operating Officer", location: "Executive Team"}]
    analyst_interpretation: Leadership roster is visible; compensation and retention require private review.
    limitations: Reporting relationships and tenure were not fully validated.
