  - evidence_claim_id: EC-CLY-011
    claim: Several material diligence items, including current financials, contracts, headcount, legal matters and IP schedules, are not publicly verifiable.
    evidence_summary: Public-source review found no audited financial statements, full customer contract schedules, current headcount export, legal open-matter schedule or IP assignment records.
    evidence_type: other
    verification_status: not_publicly_verifiable
    confidence: high
    source_ids: [SRC-CLY-011]
    quoted_evidence: [{source_id: SRC-CLY-011, quote: "Private data room required for financial statements, contracts, HR, legal and IP records.", location: "analyst synthesis"}]
