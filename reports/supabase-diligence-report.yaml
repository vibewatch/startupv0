executive_summary:
  overall_assessment: "Supabase is eligible for a private-unicorn diligence report: public evidence verifies active/private status and a company-announced $100M Series E at a $5B pre-money valuation. Product, developer-community and open-source traction are strong, while audited financials, cap table, revenue quality, customer concentration, legal schedules and enterprise contract economics remain the core diligence gaps."
  investment_or_diligence_thesis: The diligence thesis is a high-growth, developer-led Postgres platform with substantial open-source/community distribution and expanding enterprise packaging; the investment case depends on whether community adoption converts into durable paid ARR with healthy infrastructure margins and manageable reliability/privacy obligations.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Latest public valuation around $5B is verified by Supabase Series E announcement and independent news snippet.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-002
      summary: Private-company eligibility is supported by YC Active and LinkedIn Privately Held evidence.
      evidence_claim_ids:
        - EC-004
        - EC-012
    - founder_claim_id: FC-003
      summary: Product positioning as a Postgres developer platform is supported by YC, LinkedIn and Supabase materials.
      evidence_claim_ids:
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation step-up cannot be underwritten without private ARR/burn/cap-table evidence.
    - risk_id: R-006
      summary: Customer concentration and logo-to-revenue quality are not public.
    - risk_id: R-009
      summary: Shared-responsibility and customer misconfiguration risk can create product, support and reputational exposure.
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, gross margin, burn, runway and debt instruments.
    - Fully diluted cap table, option pool, secondary sale terms and investor rights.
    - Top-customer revenue, contracts, renewal/churn cohorts and independent references.
    - Security reports, incident history, SOC/ISO evidence, subprocessors and litigation/regulatory schedules.
  recommended_next_steps:
    - Open financial/cap-table data room and reconcile $5B valuation to ARR, NRR, burn and gross margin.
    - Run technical architecture and reliability review focused on Postgres scale, RLS defaults, incidents and cloud dependencies.
    - Conduct counsel-led litigation/IP/privacy diligence including USPTO/TSDR, dockets, DPA/subprocessor review and insurance.
    - Perform customer diligence with top accounts, churned accounts and enterprise pipeline conversion cohorts.
