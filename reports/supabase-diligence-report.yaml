report_metadata:
  report_title: Supabase Startup Diligence Research Report
  target_company: Supabase
  website: https://supabase.com
  known_aliases:
    - Supabase, Inc.
    - supabase/supabase
  sector: Enterprise Tech / Developer Tools / Open Source Databases
  geography: United States / San Francisco Bay Area; globally distributed
  company_stage: Private unicorn / late-stage venture-backed
  research_date: 2026-05-21
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public company sources: website, pricing, docs, blogs, careers and customer stories"
    - "Technical sources: GitHub API/repository metadata"
    - "Third-party and directory sources: YC, LinkedIn, news/search snippets and public search results"
    - "Legal/regulatory surface scan: DPA, trademark search snippets, lawsuit/status/regulatory searches"
  included_jurisdictions:
    - United States
    - Global public web
    - EU/UK privacy context via public DPA
    - AWS regions listed by Supabase docs
  excluded_topics:
    - No paywalled bypasses
    - No private data room access
    - No non-public personal contact details
    - No gh CLI usage
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights unicorn tracker selection for Supabase
      type: user_context
      date_received: 2026-05-21
      notes: "User supplied tracker facts: slug supabase, valuation $5B, United States/San Francisco, Enterprise Tech; treated as untrusted and verified against public sources where possible."
