risk_register:
  - risk_id: R-001
    risk_title: Valuation step-up and financial quality opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: Latest public $5B pre-money valuation follows a reported $2B Series D within months, while audited financials, ARR, burn and debt are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.D
    evidence_claim_ids: *a193
    mitigation_or_diligence_request: Request audited financial statements, board packages, ARR bridge, burn, runway, debt, option pool and round documents.
  - risk_id: R-002
    risk_title: Usage-based pricing and gross-margin sensitivity
    risk_category: financial
    severity: medium
    likelihood: medium
    description: Pricing exposes Supabase to infrastructure cost, support and egress variability; realized margins are not public.
    impacted_chapter_ids:
      - I
      - II
    impacted_section_ids:
      - I.B
      - II.A
    evidence_claim_ids: *a194
    mitigation_or_diligence_request: Request gross margin by product/tier, cloud COGS, egress exposure and pricing cohorts.
  - risk_id: R-003
    risk_title: Technical roadmap complexity around Postgres storage and scale
    risk_category: technical
    severity: high
    likelihood: medium
    description: Oriole/pluggable-storage and decoupled compute/storage ambitions are strategically valuable but carry integration and reliability risk.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a195
    mitigation_or_diligence_request: Request R&D roadmap, incident history, architecture review, migration plans and performance benchmarks.
  - risk_id: R-004
    risk_title: Open-source governance and issue backlog
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Large public repo traction and open issues imply community scale and support burden.
    impacted_chapter_ids:
      - VI
    impacted_section_ids:
      - VI.A
    evidence_claim_ids: *a196
    mitigation_or_diligence_request: Review maintainer coverage, security response SLAs, contributor license controls and backlog aging.
  - risk_id: R-005
    risk_title: Developer-community claims may not convert into paid revenue
    risk_category: market
    severity: medium
    likelihood: medium
    description: Stars, community members and developer counts are strong top-of-funnel signals but not proof of paid conversion or retention.
    impacted_chapter_ids:
      - V
      - IV
    impacted_section_ids:
      - V.A
      - IV.A
    evidence_claim_ids: *a197
    mitigation_or_diligence_request: "Request funnel metrics: free-to-paid conversion, activation, NRR, churn, CAC and cohort retention."
  - risk_id: R-006
    risk_title: Customer concentration and reference quality are unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Customer logos and case studies are public, but revenue concentration, contract terms, churn and implementation satisfaction are not.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
      - III.C
    evidence_claim_ids: *a198
    mitigation_or_diligence_request: Request top-25 customer revenue schedule, contracts, renewals, churn cohorts and independent reference calls.
  - risk_id: R-007
    risk_title: Rapid distributed hiring and people-process scaling
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public headcount signals range from 280+ team members to 357 visible LinkedIn employees across many countries.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.G
    evidence_claim_ids: *a199
    mitigation_or_diligence_request: Request HRIS export, attrition, regretted loss, offer acceptance, compensation bands and country-by-country employer-of-record setup.
  - risk_id: R-008
    risk_title: Remote global operating compliance
    risk_category: operational
    severity: medium
    likelihood: medium
    description: 100% distributed workforce with no offices creates employment law, tax, security and coordination diligence requirements.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
    evidence_claim_ids: *a200
    mitigation_or_diligence_request: Review EOR/PEO arrangements, tax nexus, security training, device management and travel/offsite policies.
  - risk_id: R-009
    risk_title: Shared-responsibility misconfiguration risk
    risk_category: product
    severity: high
    likelihood: medium
    description: Customers retain responsibility for data, RLS, secrets, access management and production readiness; customer mistakes can become reputational or support incidents.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids: *a201
    mitigation_or_diligence_request: Review security-advisor adoption, default configurations, education, support tickets and incident root causes.
  - risk_id: R-010
    risk_title: Cloud-region and infrastructure dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Supabase projects use AWS regions and one primary region per project, creating dependency on underlying cloud availability and data-residency design.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.E
    evidence_claim_ids: *a202
    mitigation_or_diligence_request: Request supplier agreements, cloud spend, credits, redundancy architecture and customer data-residency commitments.
  - risk_id: R-011
    risk_title: Privacy and data-processing obligations
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: DPA shows continuous processing of customer and end-user data for database/tooling services, requiring privacy controls and subprocessor governance.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a203
    mitigation_or_diligence_request: Request SOC/ISO reports, DPA signatures, BAA flow, subprocessors, DPIAs, transfer-impact assessment and breach history.
  - risk_id: R-012
    risk_title: Litigation search incompleteness
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: No clear public lawsuits were surfaced, but public web search is not a substitute for docket and counsel confirmation.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
    evidence_claim_ids: *a204
    mitigation_or_diligence_request: Have counsel run PACER/state/international docket searches and obtain litigation schedule.
  - risk_id: R-013
    risk_title: Trademark chain and brand protection
    risk_category: legal
    severity: low
    likelihood: medium
    description: Public search shows Supabase-related trademark records, including potentially prior records; ownership/assignment should be verified.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.D
    evidence_claim_ids: *a205
    mitigation_or_diligence_request: Review USPTO/WIPO/TSDR status, assignments, oppositions and open-source trademark policy.
  - risk_id: R-014
    risk_title: Reliability/SLA exposure
    risk_category: operational
    severity: medium
    likelihood: medium
    description: A public status page exists, but incident history and enterprise SLA economics are not public.
    impacted_chapter_ids:
      - VIII
      - III
    impacted_section_ids:
      - VIII.G
      - III.E
    evidence_claim_ids: *a206
    mitigation_or_diligence_request: Request status history export, SLA credits, incident postmortems and enterprise support metrics.
