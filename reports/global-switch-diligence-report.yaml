report_metadata:
  report_title: Global Switch Public-Source Startup Diligence Report
  target_company: Global Switch
  website: https://www.globalswitch.com/
  known_aliases:
    - Global Switch
    - Global Switch Holdings Limited
  sector: Carrier-neutral data centres, digital infrastructure, AI and high-performance compute infrastructure
  geography: London, United Kingdom with Europe and Asia-Pacific data-centre footprint
  company_stage: Corporate Minority-II private unicorn / mature private data-centre operator alive per CB Insights
  research_date: 2026-05-19
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD for unicorn-list valuation and GBP for operating financials unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Built the target from a current CB Insights unicorn tracker snapshot after excluding existing report slugs.
    - Prioritized CB Insights, Global Switch-owned website pages, public annual reports, ESG/security pages and reputable public news.
    - Treated company-authored claims as verified only for the existence of the public statement unless supported by annual reports or independent sources.
    - No private data room, management interview, customer reference call, lender pack, board materials or counsel schedule was available.
  included_jurisdictions:
    - United Kingdom
    - Netherlands
    - Germany
    - France
    - Spain
    - Hong Kong
    - Singapore
    - Malaysia
    - Thailand
    - Asia-Pacific sustainability context
  excluded_topics:
    - Private customer contracts, customer identities, customer revenue concentration, lender agreements, detailed cap table, lease documents, legal dockets and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-19
      notes: No pitch deck, data room, management presentation, customer list or founder responses were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Global Switch is a private unicorn candidate with a latest known valuation of approximately $11.10B and remains alive/private.
    claim_source: CB Insights unicorn tracker and company profile
    claim_date: 2026-05-19
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.B, I.C]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001]
    contradiction_summary: null
    diligence_follow_up:
      - Request current ownership, shareholder rights, debt documents and valuation support because the public unicorn signal is a market-database estimate.
  - founder_claim_id: FC-002
    claim_text: Global Switch provides large-scale carrier- and cloud-neutral data centres across Europe and Asia-Pacific.
    claim_source: CB Insights profile and Global Switch website
    claim_date: null
    mapped_chapter_ids: [II, III, IV, V]
    mapped_section_ids: [II.A, III.E, IV.A, V.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-002]
    contradiction_summary: null
    diligence_follow_up:
      - Validate contracted capacity, customer logos, renewal terms, power availability and service-level performance by site.
  - founder_claim_id: FC-003
    claim_text: Global Switch has public annual reports showing revenue, EBITDA, debt, capex, capacity and renewable-energy metrics.
    claim_source: Global Switch annual reports page and 2024/2025 annual reports
    claim_date: 2026-03-16
    mapped_chapter_ids: [I, III, VIII]
    mapped_section_ids: [I.A, I.D, III.E, VIII.F]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-003, EC-004, EC-010]
    contradiction_summary: null
    diligence_follow_up:
      - Reconcile annual-report figures to lender packages, management accounts, site-level NOI, customer contract schedules and debt covenants.
  - founder_claim_id: FC-004
    claim_text: Global Switch supports AI/high-performance workloads through liquid-cooling options and is an NVIDIA preferred partner.
    claim_source: Global Switch homepage
    claim_date: null
    mapped_chapter_ids: [II, VI]
    mapped_section_ids: [II.A, VI.B]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: [EC-005]
    contradiction_summary: Public website verifies the claim is made, but not customer adoption, technical certification scope or economics.
    diligence_follow_up:
      - Request liquid-cooling deployments, customer references, NVIDIA partner documentation, reliability results and capex/payback model.
  - founder_claim_id: FC-005
    claim_text: Global Switch has sustainability and security programs including renewable-energy targets, PUE targets and ISO/PCI certifications.
    claim_source: Global Switch ESG and security pages; Digital News Asia sustainability-accord article
    claim_date: 2026-04-06
    mapped_chapter_ids: [VIII]
    mapped_section_ids: [VIII.C, VIII.G]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-006, EC-007, EC-008]
    contradiction_summary: Public pages verify commitments and certifications, but certificate scopes, audit findings, water use and site-level compliance require review.
    diligence_follow_up:
      - Request current certificates, ESG assurance, site-level energy/water data, security audit reports and incident logs.
executive_summary:
  overall_assessment: Global Switch is an unusual unicorn target because it is a mature, asset-heavy data-centre operator rather than a conventional venture-stage startup; public evidence nonetheless supports private/unicorn eligibility, operating scale and current relevance to AI infrastructure.
  investment_or_diligence_thesis: The diligence question is whether Global Switch's scarce urban power/capacity footprint and AI-ready redevelopment program justify the private valuation after accounting for debt, capex, customer concentration, power/ESG constraints and complex ownership.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Global Switch as alive at Corporate Minority-II stage with $6.255B raised; the unicorn tracker snapshot selected Global Switch at $11.10B valuation.
      evidence_claim_ids: [EC-001]
    - founder_claim_id: FC-003
      summary: Public annual reports disclose 2025 revenue of GBP 466.2m, EBITDA of GBP 210.9m, 3.6x net debt to EBITDA, GBP 5.2bn investment-property valuation, 488 MVA utility supply and 252 MW saleable capacity.
      evidence_claim_ids: [EC-003, EC-004]
    - founder_claim_id: FC-002
      summary: Company and CB Insights sources describe a carrier/cloud-neutral data-centre portfolio in Amsterdam, Frankfurt, London, Madrid, Paris, Hong Kong and Singapore, with Johor and Bangkok noted as coming soon.
      evidence_claim_ids: [EC-002]
  biggest_risks:
    - risk_id: R-003
      summary: Debt, FX and refinancing exposure are material; 2025 annual report discloses 3.6x net debt to EBITDA and a GBP 64.2m FX loss primarily on euro-denominated debt.
    - risk_id: R-001
      summary: Power availability, electricity price pass-through, grid constraints, PUE and renewable-energy commitments are central to future growth and regulatory exposure.
    - risk_id: R-005
      summary: Ownership, shareholder liquidity and valuation support require private documents despite the public unicorn tracker valuation.
  key_evidence_gaps:
    - Customer contracts, top-customer concentration, churn, renewal pricing and service-level performance.
    - Full debt stack, covenant package, maturity schedule, hedging policy and lender consent requirements.
    - Site-level power commitments, utility contracts, PUE, water consumption, carbon/renewable assurance and development permits.
    - Cap table, shareholder rights, related-party transactions, board minutes and any active liquidity/sale process.
  recommended_next_steps:
    - Reconcile annual-report financials to site-level customer, power, capex, debt and covenant schedules.
    - Perform technical diligence on power capacity, liquid cooling, uptime, security controls and AI/high-density deployment readiness.
    - Review ESG/regulatory compliance by jurisdiction, including energy, water, permitting, safety and data-centre-specific obligations.
    - Verify ownership, investor rights, debt refinancing risk and valuation bridge against the public $11.10B unicorn signal.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Global Switch has unusually rich public financial disclosure for a private unicorn, including annual reports, but customer-level economics, financing terms and cap-table details remain private.
    founder_claim_ids: [FC-001, FC-003]
    evidence_claim_ids: [EC-001, EC-003, EC-004, EC-010, EC-011]
    risk_ids: [R-003, R-005, R-010]
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids: [I.A.1, I.A.2, I.A.3, I.A.4, I.A.5, I.A.6]
        summary: Public annual reports disclose 2024 and 2025 revenue, EBITDA, profit before tax, property valuation, capex, power/capacity and renewable-energy metrics; quarterly results and site-level statements are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: 2025 revenue increased 6.8% to GBP 466.2m while EBITDA decreased 1.1% to GBP 210.9m; 2024 revenue was GBP 436.6m and EBITDA GBP 213.2m.
            evidence_claim_ids: [EC-003]
            risk_ids: [R-003, R-010]
          - finding_id: I.A-F2
            finding: Annual-report figures are public, but customer schedules, site-level NOI, power pass-through and covenant calculations need data-room reconciliation.
            evidence_claim_ids: [EC-003, EC-011]
            risk_ids: [R-001, R-003]
        hidden_risks: [Power-cost pass-through volatility, customer churn masked by aggregate revenue, covenant pressure, valuation sensitivity to cap rates.]
        evidence_gaps: [Quarterly management accounts, site-level revenue/NOI, customer contracts, debt covenants, cash-flow forecast.]
        follow_up_questions: [Provide site-level monthly financials, debt covenant model, top-customer schedule and cash-flow bridge for 2024-2026.]
        table_ids: [T-001]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-003, EC-004, EC-011]
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids: [I.B.1, I.B.2, I.B.3, I.B.4, I.B.5, I.B.6, I.B.7, I.B.8]
        summary: Public annual-report commentary references momentum for 2026 and new business secured, but board-approved forecasts are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: 2025 annual report states 2025 sales successes were back-ended and provide momentum for revenue growth in 2026.
            evidence_claim_ids: [EC-003]
            risk_ids: [R-006]
        hidden_risks: [Forecast may depend on timely redevelopment, power delivery, customer fit-outs and refinancing.]
        evidence_gaps: [Management forecast, capex plan, contracted backlog, power delivery dates, sensitivity analysis.]
        follow_up_questions: [Provide board-approved forecast and sensitivity cases for contracted MW, pricing, capex, debt cost and power costs.]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-011]
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids: [I.C.1, I.C.2, I.C.3, I.C.4, I.C.5]
        summary: CB Insights reports a large capital raise history and last raise, but current shareholder rights and debt terms are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights lists Corporate Minority-II Alive stage, $6.255B raised and $2.77B last raised approximately eight years ago.
            evidence_claim_ids: [EC-001]
            risk_ids: [R-005]
          - finding_id: I.C-F2
            finding: 2025 annual report discloses 3.6x net debt to EBITDA and weighted average bond cost of debt of 1.7%, but full debt maturity/covenant schedules require data-room review.
            evidence_claim_ids: [EC-004, EC-011]
            risk_ids: [R-003]
        hidden_risks: [Shareholder liquidity pressure, refinancing risk, debt covenant constraints, undisclosed related-party arrangements.]
        evidence_gaps: [Cap table, shareholder agreements, lender agreements, debt maturity schedule, hedging policy.]
        follow_up_questions: [Provide current cap table, shareholder rights, debt documents, covenant model and hedging/FX policy.]
        table_ids: [T-002]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-001, EC-004, EC-011]
      - section_id: I.D
        title: Other financial information
        checklist_question_ids: [I.D.1, I.D.2, I.D.3]
        summary: Public reports disclose valuation, capex and capacity metrics; tax, guarantees, leases and off-balance-sheet commitments need document review.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: 2025 highlights include GBP 5.2bn investment property valuation, GBP 265.1m capex and 252 MW saleable capacity.
            evidence_claim_ids: [EC-004]
            risk_ids: [R-006, R-010]
        hidden_risks: [Capex overruns, property valuation sensitivity, lease or utility commitments.]
        evidence_gaps: [Property valuation reports, capex project ledger, tax filings, guarantees, utility commitments.]
        follow_up_questions: [Provide property valuation reports, capex budgets, utility contracts, tax schedule and guarantees.]
        table_ids: [T-003]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-011]
  - chapter_id: II
    title: Products
    chapter_summary: Global Switch's product is high-power, carrier/cloud-neutral data-centre capacity, increasingly marketed for AI and high-performance compute.
    founder_claim_ids: [FC-002, FC-004]
    evidence_claim_ids: [EC-002, EC-005, EC-007]
    risk_ids: [R-001, R-006, R-008]
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids: [II.A.1, II.A.2, II.A.3, II.A.4, II.A.5, II.A.6]
        summary: Public sources describe large-scale data centres, carrier/cloud neutrality, liquid-cooling options, security/certifications and global power/capacity; customer-specific SLAs and pricing are private.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Global Switch website describes secure, scalable infrastructure, liquid cooling for powerful AI/HPC workloads and locations across Europe/APAC.
            evidence_claim_ids: [EC-002, EC-005]
            risk_ids: [R-001, R-006]
          - finding_id: II.A-F2
            finding: Security page states ISO 27001 and PCI DSS across all sites and lists ISO 9001, 14001, 27001, 45001 and 50001 management certifications.
            evidence_claim_ids: [EC-007]
            risk_ids: [R-008]
        hidden_risks: [High-density product-market fit, liquid-cooling deployment risk, uptime/SLA credits, power constraints, customer fit-out delays.]
        evidence_gaps: [Customer SLAs, uptime record, liquid-cooling installed base, pricing, contract terms, site-level certification certificates.]
        follow_up_questions: [Provide product/pricing matrix, site SLAs, certification packs, uptime history and liquid-cooling deployment references.]
        table_ids: [T-004, T-005]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-002, EC-005, EC-007, EC-011]
  - chapter_id: III
    title: Customer Information
    chapter_summary: Global Switch publicly names customer categories rather than customer identities; the central diligence gap is customer concentration, contract duration and renewal economics.
    founder_claim_ids: [FC-002, FC-003]
    evidence_claim_ids: [EC-002, EC-003, EC-004, EC-011]
    risk_ids: [R-001, R-002, R-006]
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids: [III.A]
        summary: CB Insights says customers range from system integrators to government organizations; Global Switch says it powers leading enterprises and innovators, but no top-customer schedule is public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Public sources identify customer categories and use cases, but not top accounts, ARR/MRR, contracted MW or churn.
            evidence_claim_ids: [EC-002, EC-011]
            risk_ids: [R-002]
        hidden_risks: [Hyperscaler concentration, government contract renewal risk, customer credit risk, fit-out delays.]
        evidence_gaps: [Top customer schedule by revenue/MW, contract duration, renewal history, churn, SLA credits.]
        follow_up_questions: [Provide top 20 customers by revenue/MW, contract terms, renewal pipeline and service credits.]
        table_ids: [T-006]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-002, EC-011]
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids: [III.B]
        summary: Public evidence shows an NVIDIA preferred-partner signal and Asia-Pacific sustainability accord participation, but partner economics are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: The homepage displays an NVIDIA Preferred Partner logo; Digital News Asia lists Global Switch among SDIA signatories.
            evidence_claim_ids: [EC-005, EC-008]
            risk_ids: [R-004, R-006]
        hidden_risks: [Partner status may not translate into revenue; voluntary sustainability commitments may create reputational obligations.]
        evidence_gaps: [NVIDIA partner agreement, joint pipeline, SDIA commitments, partner-generated revenue.]
        follow_up_questions: [Provide strategic partner agreements and revenue/pipeline attribution.]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-005, EC-008, EC-011]
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids: [III.C]
        summary: Revenue by customer is not public; only aggregate revenue and capacity metrics are disclosed.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Annual reports disclose aggregate revenue but not customer revenue concentration.
            evidence_claim_ids: [EC-003, EC-011]
            risk_ids: [R-002]
        hidden_risks: [Customer concentration hidden in aggregate figures.]
        evidence_gaps: [Customer revenue, MW commitments, remaining contract term, renewal probabilities.]
        follow_up_questions: [Provide revenue and contracted capacity by customer/site for the past three years.]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-011]
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids: [III.D]
        summary: Public annual report commentary references customer capacity returned at contract conclusion in 2024, but individual customer relationships are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.D-F1
            finding: 2024 annual report states EBITDA decrease was driven in part by return of some capacity by customers at contract conclusion.
            evidence_claim_ids: [EC-003]
            risk_ids: [R-002, R-006]
        hidden_risks: [Large customer departures could be obscured by redevelopment and repricing narrative.]
        evidence_gaps: [Lost customer names, returned MW, reasons, replacement economics.]
        follow_up_questions: [Provide churn/returned-capacity log and replacement pricing by site.]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-011]
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids: [III.E]
        summary: Utility power, grid access, equipment vendors, construction contractors, carriers and security providers are likely critical suppliers; top supplier exposure is not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Public annual reports disclose 488 MVA utility power supply and 252 MW saleable capacity; supplier/utility contracts are not public.
            evidence_claim_ids: [EC-004, EC-011]
            risk_ids: [R-001, R-006]
        hidden_risks: [Utility/grid constraints, equipment lead times, contractor performance, carrier/network concentration.]
        evidence_gaps: [Utility contracts, power reservations, construction contracts, equipment vendor dependencies.]
        follow_up_questions: [Provide top supplier/utility list, contract terms, redundancy and contingency plans.]
        table_ids: [T-007]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-011]
  - chapter_id: IV
    title: Competition
    chapter_summary: Global Switch competes in a capital-intensive data-centre market where power access, location, connectivity, density, ESG performance and customer trust drive differentiation.
    founder_claim_ids: [FC-002]
    evidence_claim_ids: [EC-002, EC-005, EC-009]
    risk_ids: [R-001, R-004, R-006]
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids: [IV.A.1, IV.A.2]
        summary: CB Insights identifies competitors including Aligned Data Centers, AirTrunk, Cassava Technologies, Etix Everywhere, Centersquare and others; market positioning depends on urban power, carrier neutrality and AI-ready capacity.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Public competitor set includes hyperscale, colocation and regional data-centre operators; Global Switch publicly emphasizes urban internet hubs, carrier/cloud neutrality and flexible infrastructure.
            evidence_claim_ids: [EC-002, EC-009]
            risk_ids: [R-001, R-006]
        hidden_risks: [Competitors with newer campuses, cheaper power or hyperscaler anchor demand may undercut returns.]
        evidence_gaps: [Win/loss data, pricing by MW, occupancy by site, power cost competitiveness, market share.]
        follow_up_questions: [Provide market share, win/loss, pricing and occupancy benchmark by city.]
        table_ids: [T-008, T-009]
        figure_ids: [F-005]
        evidence_claim_ids: [EC-002, EC-005, EC-009]
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Global Switch appears to use a direct global sales motion for enterprise, hyperscale, network and partner accounts; productivity and pipeline data are private.
    founder_claim_ids: [FC-002]
    evidence_claim_ids: [EC-002, EC-005, EC-011]
    risk_ids: [R-002, R-006]
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids: [V.A.1, V.A.2, V.A.3, V.A.4]
        summary: The company describes a global sales team giving access to space and power availability across the portfolio; sales pipeline and conversion are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: Global Switch About page says it operates a global sales team for space and power availability decisions.
            evidence_claim_ids: [EC-002]
            risk_ids: [R-002]
        hidden_risks: [Pipeline may be concentrated in few AI/hyperscale opportunities; sales cycles and fit-outs can be long.]
        evidence_gaps: [Pipeline by stage/MW, conversion rates, sales productivity, customer acquisition cost, customer references.]
        follow_up_questions: [Provide sales pipeline, contracted backlog, lost deals and sales productivity for 2024-2026.]
        table_ids: [T-010, T-011]
        figure_ids: [F-006]
        evidence_claim_ids: [EC-002, EC-005, EC-011]
      - section_id: V.B
        title: Major Customers
        checklist_question_ids: [V.B.1, V.B.2, V.B.3]
        summary: Major customer names and revenue concentration are not public in reviewed sources.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: V.B-F1
            finding: Public sources describe categories rather than named major customers.
            evidence_claim_ids: [EC-002, EC-011]
            risk_ids: [R-002]
        hidden_risks: [Single-customer or hyperscaler concentration.]
        evidence_gaps: [Top-customer list, references, contract renewal schedule.]
        follow_up_questions: [Provide major customer schedule and reference availability.]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-002, EC-011]
      - section_id: V.C
        title: Principal avenues for generating new business
        checklist_question_ids: [V.C]
        summary: New business likely comes from direct enterprise/hyperscale sales, partner/connectivity ecosystem and redevelopment of existing sites for high-density capacity.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.C-F1
            finding: 2025 annual report reports 38.8 MW of new business secured and says sales successes provide momentum for 2026.
            evidence_claim_ids: [EC-003, EC-004]
            risk_ids: [R-006]
        hidden_risks: [Back-ended new sales may not convert to revenue on expected timelines.]
        evidence_gaps: [Contracted backlog schedule, fit-out timelines, customer credit, cancellation rights.]
        follow_up_questions: [Provide backlog by site/customer, expected revenue start dates and cancellation terms.]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-004, EC-011]
      - section_id: V.D
        title: Sales force productivity model
        checklist_question_ids: [V.D.1, V.D.2, V.D.3, V.D.4]
        summary: Sales force productivity is not public; data-centre sales productivity should be evaluated by MW contracted, revenue signed and cycle time.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: V.D-F1
            finding: Public sources do not disclose sales headcount, quota, cycle time or productivity.
            evidence_claim_ids: [EC-011]
            risk_ids: [R-002]
        hidden_risks: [A small number of large deals may create volatile sales productivity.]
        evidence_gaps: [Sales team roster, quota attainment, pipeline conversion, deal cycle time.]
        follow_up_questions: [Provide sales productivity dashboard and compensation plan.]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-011]
      - section_id: V.E
        title: Ability to implement marketing plan with current and projected budgets
        checklist_question_ids: [V.E]
        summary: Budget adequacy depends on capex, redevelopment and customer fit-out funding; annual reports provide capex but not forward budget detail.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.E-F1
            finding: 2025 annual report discloses GBP 265.1m of capex invested, but future development budget and funding sources are not fully public.
            evidence_claim_ids: [EC-004, EC-011]
            risk_ids: [R-003, R-006]
        hidden_risks: [Capex funding may be constrained by debt or shareholder liquidity priorities.]
        evidence_gaps: [Approved capex budget, committed funding, contingency, procurement contracts.]
        follow_up_questions: [Provide capex pipeline, approved budgets, sources of funds and contingency analysis.]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-011]
  - chapter_id: VI
    title: Research and Development
    chapter_summary: R&D appears to center on redevelopment, densification, liquid cooling, high-density power and operational sustainability rather than software-style product R&D.
    founder_claim_ids: [FC-004]
    evidence_claim_ids: [EC-004, EC-005, EC-006, EC-011]
