risk_register:
  - risk_id: R-001
    risk_title: Power availability, energy price and PUE constraints
    risk_category: operational
    severity: high
    likelihood: medium
    description: Data-centre growth depends on scarce power, power pricing, pass-through mechanics, energy efficiency and renewable-energy procurement.
    impacted_chapter_ids: [I, III, IV, VIII]
    impacted_section_ids: [I.A, III.E, IV.A, VIII.C]
    evidence_claim_ids: [EC-004, EC-006]
    mitigation_or_diligence_request: Review utility contracts, power reservations, PUE/water data, renewable procurement and sensitivity to power cost.
  - risk_id: R-002
    risk_title: Customer concentration and contract renewal opacity
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public sources do not disclose top-customer revenue, MW concentration, renewal schedule, churn or SLA credits.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, III.C, V.B]
    evidence_claim_ids: [EC-002, EC-011]
    mitigation_or_diligence_request: Obtain top-customer schedule, contract terms, renewal pipeline, churn and SLA credit history.
  - risk_id: R-003
    risk_title: Debt, FX and refinancing risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: 2025 annual report discloses 3.6x net debt to EBITDA and a GBP 64.2m FX loss primarily on euro-denominated debt.
    impacted_chapter_ids: [I, VIII]
    impacted_section_ids: [I.C, VIII.F]
    evidence_claim_ids: [EC-003, EC-004, EC-011]
    mitigation_or_diligence_request: Review debt maturity ladder, covenants, hedging policy, lender consents and refinancing cases.
  - risk_id: R-004
    risk_title: ESG, water and climate regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Data-centre environmental scrutiny is increasing; public ESG targets need site-level evidence and assurance.
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.C, VIII.G]
    evidence_claim_ids: [EC-006, EC-008]
    mitigation_or_diligence_request: Review site-level PUE, water, carbon, permits, regulator correspondence and ESG assurance.
  - risk_id: R-005
    risk_title: Ownership, shareholder liquidity and valuation complexity
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: Public unicorn valuation and total-raised signals do not disclose current ownership, rights, related-party matters or any liquidity process.
    impacted_chapter_ids: [I, VII]
    impacted_section_ids: [I.C, VII.D, VII.E]
    evidence_claim_ids: [EC-001, EC-011]
    mitigation_or_diligence_request: Review cap table, shareholder agreements, board minutes and valuation support.
  - risk_id: R-006
    risk_title: Redevelopment and AI/high-density execution
    risk_category: technical
    severity: medium
    likelihood: medium
    description: AI/HPC and liquid-cooling growth depends on capex delivery, engineering, permits, equipment lead times and customer fit-out execution.
    impacted_chapter_ids: [II, V, VI, VII]
    impacted_section_ids: [II.A, V.C, VI.B, VII.A]
    evidence_claim_ids: [EC-004, EC-005]
    mitigation_or_diligence_request: Review project plan, customer pre-commitments, permits, equipment supply and technical validation.
  - risk_id: R-007
    risk_title: Mature operator vs startup comparability
    risk_category: other
    severity: informational
    likelihood: high
    description: Global Switch qualifies under the unicorn-list source but is a mature infrastructure operator, making venture-style startup comparisons less useful.
    impacted_chapter_ids: [I, IV]
