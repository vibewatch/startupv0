evidence_claims:
  - evidence_claim_id: EC-001
    claim: Global Switch is an alive private unicorn candidate with $6.255B raised and $11.10B latest known valuation in the selected public tracker.
    evidence_summary: CB Insights profile lists founded 1998, Corporate Minority-II Alive, $6.255B total raised and $2.77B last raised; tracker snapshot lists Global Switch at $11.10B valuation.
    evidence_type: market_database
    verification_status: verified
    confidence: high
    source_ids: [SRC-001, SRC-002]
    quoted_evidence:
      - source_id: SRC-001
        quote: "Corporate Minority - II | Alive; Total Raised $6.255B; Last Raised $2.77B."
        location: CB Insights Global Switch profile
      - source_id: SRC-002
        quote: "Global Switch ... $11.10 ... 12/22/2016 ... United Kingdom ... Enterprise Tech."
        location: CB Insights unicorn tracker snapshot
    analyst_interpretation: Public market-database evidence supports eligibility; valuation and terms require primary documents.
    limitations: Market-database figures may lag current ownership/debt/valuation.
    associations: {chapter_id: I, section_id: I.C, founder_claim_ids: [FC-001], table_ids: [T-002], figure_ids: [F-002, F-011], risk_ids: [R-005, R-010]}
  - evidence_claim_id: EC-002
    claim: Global Switch operates carrier- and cloud-neutral data centres across Europe and Asia-Pacific, with listed locations in Amsterdam, Frankfurt, London, Madrid, Paris, Hong Kong and Singapore and coming-soon Johor/Bangkok.
    evidence_summary: CB Insights and Global Switch pages describe data-centre services across Europe/APAC; homepage lists data-centre locations.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-001, SRC-003, SRC-004]
    quoted_evidence:
      - source_id: SRC-004
        quote: "All our data centres are carrier and cloud neutral."
        location: Global Switch About page
      - source_id: SRC-003
        quote: "Amsterdam, Frankfurt, London, Madrid, Paris, Hong Kong, Singapore Tai Seng, Singapore Woodlands, Johor - Coming Soon, Bangkok - Coming soon."
        location: Global Switch homepage
    analyst_interpretation: Public evidence supports the footprint and neutrality claim; site-level economics remain private.
    limitations: Does not verify occupancy, revenue or current operational status for each site.
    associations: {chapter_id: II, section_id: II.A, founder_claim_ids: [FC-002], table_ids: [T-004, T-006, T-009, T-010, T-011, T-012, T-013, T-014, T-015], figure_ids: [F-003, F-005, F-007, F-009], risk_ids: [R-001, R-006]}
  - evidence_claim_id: EC-003
    claim: Global Switch annual reports disclose public operating-financial results including revenue, EBITDA and profit-before-tax trends for 2024 and 2025.
    evidence_summary: 2025 annual report says revenue increased 6.8% to GBP 466.2m and EBITDA decreased 1.1% to GBP 210.9m; 2024 annual report says revenue was GBP 436.6m, EBITDA GBP 213.2m and profit before tax GBP 64.0m.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-006, SRC-007]
    quoted_evidence:
      - source_id: SRC-006
        quote: "reported revenue for 2025 increased by 6.8% ... to GBP 466.2 million ... EBITDA for 2025 decreased by 1.1% ... to GBP 210.9m."
        location: Global Switch 2025 Annual Report
      - source_id: SRC-007
        quote: "reported revenue for 2024 decreased by 9.5% ... to GBP 436.6 million ... EBITDA is broadly in line with 2023."
        location: Global Switch 2024 Annual Report
    analyst_interpretation: Strong public evidence for aggregate financials; customer/site detail and debt covenant calculations remain private.
    limitations: Annual reports are company disclosures and need audit/lender reconciliation.
    associations: {chapter_id: I, section_id: I.A, founder_claim_ids: [FC-003], table_ids: [T-001], figure_ids: [F-001, F-006, F-011], risk_ids: [R-003, R-010]}
  - evidence_claim_id: EC-004
    claim: Global Switch discloses 2025 capacity, capex, debt and renewable-energy metrics relevant to data-centre diligence.
    evidence_summary: 2025 annual report highlights show GBP 5.2bn property valuation, GBP 265.1m capex, 3.6x net debt to EBITDA, 488 MVA utility supply, 252 MW saleable capacity, 38.8 MW new business and 88.0% renewable energy purchased.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-006, SRC-007]
    quoted_evidence:
      - source_id: SRC-006
        quote: "GBP 5.2bn Investment property valuation ... GBP 265.1m Capital expenditure ... 3.6x Net debt to EBITDA ... 488 MVA Utility power supply ... 252 MW Saleable capacity ... 38.8 MW New business."
        location: Global Switch 2025 Annual Report highlights
      - source_id: SRC-007
        quote: "GBP 436.6m Revenue ... GBP 213.2m EBITDA ... 488 MVA Utility power supply ... 90.7% Renewable energy purchased."
        location: Global Switch 2024 Annual Report highlights
    analyst_interpretation: Strong aggregate operating indicators, but detailed site/customer/project data are private.
    limitations: Highlights do not include complete debt, customer or project schedules.
    associations: {chapter_id: I, section_id: I.D, founder_claim_ids: [FC-003], table_ids: [T-002, T-003, T-007, T-009, T-010, T-011, T-013, T-015, T-018], figure_ids: [F-003, F-004, F-006, F-011], risk_ids: [R-001, R-003, R-006]}
  - evidence_claim_id: EC-005
    claim: Global Switch publicly markets AI/HPC readiness, liquid-cooling options and NVIDIA preferred-partner status.
    evidence_summary: Homepage shows NVIDIA Preferred Partner logo and states a full suite of liquid-cooling options is available across the data-centre portfolio for AI and high-performance workloads.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: medium
    source_ids: [SRC-003]
    quoted_evidence:
      - source_id: SRC-003
        quote: "A full suite of liquid cooling options is now available across our data centre portfolio, capable of meeting the demands of the most powerful AI and high-performance workloads."
        location: Global Switch homepage
    analyst_interpretation: Public claim supports AI/HPC positioning, but deployment details and economics are not public.
    limitations: Company-authored marketing claim; no customer deployments verified.
    associations: {chapter_id: II, section_id: II.A, founder_claim_ids: [FC-004], table_ids: [T-004, T-009, T-010, T-011, T-012, T-013, T-014], figure_ids: [F-003, F-005, F-007, F-011], risk_ids: [R-006]}
  - evidence_claim_id: EC-006
    claim: Global Switch has public ESG commitments including renewable electricity by 2030, PUE targets and SBTi-approved emissions targets.
    evidence_summary: ESG page states commitment to purchasing 100% renewable energy by 2030, PUE below 1.2 in Europe and 1.4 in APAC for new developments, SBTi-approved targets and ISO management systems.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: medium
    source_ids: [SRC-008]
    quoted_evidence:
      - source_id: SRC-008
        quote: "committed to purchasing 100% renewable energy by 2030, and achieving annualised PUE of less than 1.2 in Europe and 1.4 in Asia-Pacific for new developments."
        location: Global Switch ESG page
    analyst_interpretation: Public commitment evidence is strong; site-level performance and assurance should be reviewed.
    limitations: Company-authored page; no independent assurance report reviewed.
    associations: {chapter_id: VIII, section_id: VIII.C, founder_claim_ids: [FC-005], table_ids: [T-005, T-018], figure_ids: [F-007, F-011], risk_ids: [R-001, R-004]}
  - evidence_claim_id: EC-007
    claim: Global Switch publicly describes multi-layered security and ISO/PCI certifications across data centres.
    evidence_summary: Security page describes staff/contractor vetting, MFA access controls, CCTV, mantraps, 24/7/365 guarding, cyber tools, regular testing and ISO 27001/PCI DSS plus ISO management certifications.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: medium
    source_ids: [SRC-009]
    quoted_evidence:
      - source_id: SRC-009
        quote: "We maintain ISO 27001 and PCI DSS certifications across all sites."
        location: Global Switch Security page
      - source_id: SRC-009
        quote: "All Global Switch data centres are certified with ... ISO 9001 ... ISO 14001 ... ISO 27001 ... ISO 45001 ... ISO 50001."
        location: Global Switch Security page
    analyst_interpretation: Supports public security/certification claims; requires certificate and audit review.
    limitations: Audit findings and incident history not public.
    associations: {chapter_id: VIII, section_id: VIII.G, founder_claim_ids: [FC-005], table_ids: [T-004, T-005, T-007, T-015, T-019], figure_ids: [F-003, F-008, F-009, F-010, F-011], risk_ids: [R-008, R-009]}
  - evidence_claim_id: EC-008
    claim: Global Switch is publicly named as a signatory to a non-binding APAC data-centre sustainability accord.
    evidence_summary: Digital News Asia reports 11 operators including Global Switch signed SDIA, a non-binding accord with voluntary targets for energy efficiency, clean energy use, water consumption and circular economy practices.
    evidence_type: independent_news
    verification_status: verified
    confidence: medium
    source_ids: [SRC-010]
    quoted_evidence:
      - source_id: SRC-010
        quote: "The accord is non-binding ... Signatories include ... Global Switch ..."
        location: Digital News Asia article
    analyst_interpretation: Independent news supports accord participation; voluntary nature limits legal enforceability but adds reputational expectations.
    limitations: Full accord text and obligations were not reviewed.
    associations: {chapter_id: VIII, section_id: VIII.C, founder_claim_ids: [FC-005], table_ids: [T-018], figure_ids: [F-010], risk_ids: [R-004]}
  - evidence_claim_id: EC-009
    claim: Global Switch competes with data-centre operators including Aligned Data Centers, AirTrunk, Cassava Technologies, Etix Everywhere, Centersquare and others.
    evidence_summary: CB Insights competitor list names several competing data-centre and infrastructure companies.
    evidence_type: market_database
    verification_status: verified
    confidence: medium
    source_ids: [SRC-001]
    quoted_evidence:
      - source_id: SRC-001
        quote: "Competitors of Global Switch include Aligned Data Centers, AirTrunk, Cassava Technologies, Etix Everywhere, Centersquare and 7 more."
        location: CB Insights Global Switch profile
    analyst_interpretation: Supports the competitive landscape; not a complete market share analysis.
    limitations: Competitor taxonomy may be incomplete.
    associations: {chapter_id: IV, section_id: IV.A, founder_claim_ids: [], table_ids: [T-008], figure_ids: [F-005], risk_ids: [R-001, R-006]}
  - evidence_claim_id: EC-010
    claim: Global Switch publishes an annual-report archive including 2016-2025 annual reports and a latest 2025 report.
    evidence_summary: Annual reports page links to the latest annual report and archive entries for 2025 through 2016.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-005]
    quoted_evidence:
      - source_id: SRC-005
        quote: "VIEW OUR LATEST ANNUAL REPORT ... Annual Report 2025 ... Annual Report 2024 ... Annual Report 2023 ... Annual Report 2016."
        location: Global Switch Annual Reports page
    analyst_interpretation: Public financial-report archive is a diligence strength compared with many private unicorns.
    limitations: Archive access does not replace data-room detail.
    associations: {chapter_id: I, section_id: I.A, founder_claim_ids: [FC-003], table_ids: [], figure_ids: [F-002, F-010], risk_ids: [R-010]}
  - evidence_claim_id: EC-011
    claim: Customer contracts, customer concentration, cap table, debt agreements, litigation schedules, insurance, headcount and detailed regulatory records are not publicly verifiable from reviewed sources.
    evidence_summary: Reviewed public sources provide aggregate and marketing disclosures but not private records needed for complete diligence.
    evidence_type: other
    verification_status: not_publicly_verifiable
    confidence: high
    source_ids: []
    quoted_evidence: []
    analyst_interpretation: Absence of public evidence is not evidence of a problem; it defines follow-up requests.
    limitations: Public-source review only.
    associations: {chapter_id: I, section_id: I.C, founder_claim_ids: [], table_ids: [T-002, T-006, T-014, T-016, T-017, T-019], figure_ids: [F-001, F-004, F-006, F-008, F-009, F-011], risk_ids: [R-002, R-003, R-005, R-009, R-010]}
