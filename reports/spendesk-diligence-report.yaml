report_metadata:
  report_title: Spendesk Startup Diligence Report
  target_company: Spendesk
  website: https://www.spendesk.com/
  known_aliases:
    - Spendesk
    - Spendesk SAS
    - Spendesk Financial Services
    - SFS
  sector: Fintech spend management, procurement, corporate cards, accounts payable, expenses, travel and finance operations software
  geography: France / Europe with international customers and operations
  company_stage: Private unicorn / growth-stage fintech and spend-management platform
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: EUR unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public web sources only, prioritizing company-owned pages, investor pages, customer stories, security/legal pages, public market lists and competitor-owned pages.
    - Treated company-published claims as verified only for existence of the public statement unless corroborated by independent or investor sources.
    - Used reader/archived URLs where direct HTTPS access was blocked or rate-limited.
    - No private data room, management interview, customer call, counsel search, regulatory extract, or security assurance package was available.
  included_jurisdictions:
    - France
    - European Union
    - United Kingdom
    - Germany
    - Spain
    - United States where public office/customer/investor materials reference activity
  excluded_topics:
    - Non-public financial statements, current cap table, board materials, customer contracts, regulatory correspondence, litigation docket reports, security reports, employee records and tax files.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Spendesk public-source diligence report
      type: workflow_request
      date_received: 2026-05-23
      notes: No founder responses, pitch deck, model, data room or customer materials were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Spendesk is a private French fintech unicorn valued around €1B+ in public sources.
    claim_source: Planète Grandes Écoles, Wikipedia, Spendesk funding release
    claim_date: 2022-08-23
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
    contradiction_summary: null
    diligence_follow_up:
      - Request executed financing documents, current cap table, preference stack, option pool, debt schedule, and latest 409A/valuation support.
  - founder_claim_id: FC-002
    claim_text: Spendesk serves thousands of finance teams and hundreds of thousands of users.
