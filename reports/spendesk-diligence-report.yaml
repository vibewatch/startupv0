    contradiction_summary: Customer and user counts are company-published and do not disclose active status, revenue concentration, churn, or cohort quality.
    diligence_follow_up:
      - Request customer master, active-seat methodology, ARR by account, churn/NRR cohorts, and reference list.
  - founder_claim_id: FC-003
    claim_text: Spendesk offers an all-in-one spend management, procurement, cards, invoice, expense, travel, and reporting platform.
    claim_source: Spendesk product, platform, launch, and investor pages
    claim_date: null
    mapped_chapter_ids:
