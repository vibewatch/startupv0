risk_register:
  - risk_id: R-001
    risk_title: Private financial quality unresolved
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public sources do not disclose audited financial statements, ARR, gross margin, cash, debt, retention, or budget-to-actuals.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Obtain full finance data room, KPI pack, bank/debt schedules, and auditor/accountant support.
  - risk_id: R-002
    risk_title: Valuation and preference stack could diverge from public unicorn headline
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation and funding headlines do not reveal liquidation preferences, option pool, down-round protection, debt, or current valuation support.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Review cap table, financing docs, board approvals, current valuation report, and all debt or warrant instruments.
  - risk_id: R-003
    risk_title: Customer quality and concentration are hidden
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Customer counts, logos, and case studies do not disclose ARR concentration, active usage, renewals, churn, NRR, or severed relationships.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Request top-customer ARR, contracts, renewal status, churn cohorts, and independent reference calls.
  - risk_id: R-004
    risk_title: Spend management competition is crowded
    risk_category: market
    severity: high
    likelihood: high
    description: Pleo, Payhawk, Moss, Soldo, Navan, Ramp, banks, ERP suites, and AP tools create pricing and differentiation pressure.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Run win/loss analysis, buyer calls, pricing benchmarks, and retention comparison against direct competitors.
  - risk_id: R-005
    risk_title: Product expansion execution risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Procurement, travel, AI, SFS, AP, cards, and reporting broaden the platform but add implementation and support complexity.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Review roadmap, module attach, implementation times, support backlog, uptime, and product P&L by module.
  - risk_id: R-006
    risk_title: Payment institution compliance risk
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Regulated payment activity increases operational, capital, safeguarding, AML, SCA, partner, and regulatory-exam obligations.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Counsel should verify license scope, ACPR correspondence, Visa terms, safeguarding controls, and PSD3 readiness.
  - risk_id: R-007
    risk_title: Pricing and monetization opacity
    risk_category: financial
    severity: medium
    likelihood: unknown
    description: Quote-based pricing and add-ons obscure ARPA, discounting, packaging power, CAC payback, and expansion economics.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.B
      - V.A
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Request price book, discount waterfall, ARR by package, expansion cohorts, and sales productivity metrics.
  - risk_id: R-008
    risk_title: Security and privacy assurance remains private
    risk_category: technical
    severity: high
    likelihood: medium
    description: Public security controls are positive but do not substitute for SOC/ISO scope review, pen-test results, incident history, or vendor risk files.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.E
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Request ISO certificate scope, SOC reports if any, pen-test summaries, incident logs, DPIAs, subprocessor list, and cyber insurance.
  - risk_id: R-009
    risk_title: AI control and accuracy risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: AI validation of financial documents can create audit, error, bias, and explainability questions if controls are weak.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.G
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Review model governance, human review, exception rates, false positives, training data boundaries, and audit trails.
  - risk_id: R-010
    risk_title: Leadership transition and retention risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Recent executive-chair, CFO, CCO, CPO, and CTO appointments indicate organizational change that may help or disrupt execution.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.C
      - VII.G
    evidence_claim_ids: *a43
    mitigation_or_diligence_request: Interview leadership, review org chart, retention plans, turnover, option grants, and succession planning.
  - risk_id: R-011
    risk_title: Public-source selection bias
    risk_category: other
    severity: medium
    likelihood: high
    description: Most detailed traction, customer, security, and roadmap evidence is company-published, creating a risk that negative facts are absent from public materials.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - III.A
      - VIII.A
    evidence_claim_ids: *a44
    mitigation_or_diligence_request: Supplement with data-room review, independent customer calls, counsel searches, and technical/security diligence.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts, ARR, gross margin, cash flow and cohort metrics.
    why_it_matters: Public metrics cannot underwrite revenue quality or profitability.
    suggested_source_or_request: Finance data room and accountant/auditor support.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, preferences, options, warrants, debt, notes and off-balance-sheet liabilities.
    why_it_matters: Public unicorn valuation may mask economics.
    suggested_source_or_request: Legal/finance financing records.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Module-level ARR, usage, margin, attach rate and roadmap status.
    why_it_matters: Suite breadth can hide uneven product economics.
    suggested_source_or_request: Product analytics and product P&L.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Top customer ARR, renewal calendar, churn/NRR cohorts and reference calls.
    why_it_matters: Customer quality and concentration are core value drivers.
    suggested_source_or_request: Customer master, contracts and references.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing benchmarks and market share.
    why_it_matters: Competition could compress growth and margins.
    suggested_source_or_request: CRM exports, buyer calls and competitor analysis.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, sales cycle and pipeline coverage.
    why_it_matters: GTM efficiency determines profitable growth durability.
    suggested_source_or_request: Sales capacity model and CRM cohort data.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap cost, AI accuracy, incident history and reliability metrics.
    why_it_matters: Product expansion and AI claims introduce execution/control risk.
    suggested_source_or_request: Roadmap, model governance and SRE dashboards.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS headcount history, turnover, compensation and equity grants.
    why_it_matters: Recent leadership changes increase people diligence importance.
    suggested_source_or_request: HRIS, option ledger and executive interviews.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: License scope, regulatory correspondence, safeguarding, AML/SCA controls and PSD3 plan.
    why_it_matters: Payment institution compliance can create severe operational/regulatory exposure.
    suggested_source_or_request: Counsel review and regulatory documentation.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, security assurance reports, incident logs and claims history.
    why_it_matters: Finance data and payment operations require strong cyber/insurance coverage.
    suggested_source_or_request: Security/insurance data room.
    priority: high
