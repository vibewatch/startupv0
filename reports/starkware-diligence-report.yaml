risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation support gap
    risk_category: financial
    severity: high
    likelihood: high
    description: StarkWare is private and public sources do not disclose audited financials, revenue, margin, burn, cash, debt, tax or runway; the $8.0B valuation cannot be underwritten publicly.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited financials, management accounts, bank/debt schedules, tax positions, ARR/revenue bridge, revenue recognition policies and valuation support.
  - risk_id: R-002
    risk_title: Financing, token and preference-stack overhang
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public unicorn valuation coexists with undisclosed equity/token rights, investor protections, employee options and STRK/foundation economics.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - I.D
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request cap table, option/warrant/note schedules, investor side letters, token allocation/treasury, foundation/company agreements and transfer restrictions.
  - risk_id: R-003
    risk_title: Customer/revenue concentration unknown
    risk_category: customer
    severity: high
    likelihood: high
    description: Public customer logos and L2 metrics do not disclose paying customer revenue, top-account concentration, churn, retention, pricing or contract renewals.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - V.D
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request top-15 customer revenue, signed contracts, churn/cohort data, pipeline, reference calls and product-level gross margin.
  - risk_id: R-004
    risk_title: Protocol security, bridge and centralization risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Starknet/StarkEx rely on complex validity proofs, bridges, sequencers, provers and upgrades; L2BEAT flags no exit window, permissioned roles and an outage.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Run independent security/architecture review, audit remediation review, incident-history review and decentralization milestone testing.
  - risk_id: R-005
    risk_title: Token, securities, sanctions/AML and cross-border regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: STRK distribution, fees, governance, future staking and cross-chain token liquidity create regulatory ambiguity across jurisdictions.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - VIII.G
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request legal memos on token status, sanctions/AML/geofencing, exchange listings, staking, governance, tax, consumer protection and foundation/company roles.
  - risk_id: R-006
    risk_title: Competition and pricing pressure in Ethereum scaling
    risk_category: market
    severity: medium
    likelihood: high
    description: StarkWare competes with other ZK/optimistic rollups and app-chain/zkVM providers; differentiation may erode as tooling and proof systems mature.
    impacted_chapter_ids:
      - IV
      - V
      - VI
    impacted_section_ids:
      - IV.A
      - V.A
      - VI.B
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Benchmark win/loss, cost, reliability, developer adoption, liquidity and enterprise economics against zkSync, Scroll, Polygon, Arbitrum, Optimism and emerging zkVM stacks.
  - risk_id: R-007
    risk_title: Key-person and R&D talent concentration
    risk_category: team
    severity: medium
    likelihood: medium
    description: Technical moat appears tied to cryptography/prover expertise and public founder/researcher credibility; current management/org chart and retention are not public.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.A
      - VII.C
      - VII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request current org chart, management bios, retention plans, succession/key-person coverage, attrition and compensation/equity plans.
  - risk_id: R-008
    risk_title: IP, open-source and trademark chain-of-title risk
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Open-source Cairo/Stwo assets and trademarks are public, but proprietary IP assignments, patent strategy, license compliance and dependency obligations are not public.
    impacted_chapter_ids:
