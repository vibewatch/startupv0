    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official IP schedule, invention assignments, patent strategy, trademark records and OSS SBOM/license review.
    why_it_matters: IP ownership and license compliance underpin defensibility.
    suggested_source_or_request: Request counsel-prepared IP schedule and OSS compliance memo.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Counsel-certified litigation, claims, regulatory, insurance and material-contract schedules.
    why_it_matters: Public docket snippets are incomplete and material liabilities may be private.
    suggested_source_or_request: Request counsel letters, official docket searches, insurance policies and contract matrix.
    priority: high
  - gap_id: G-010
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC, quota, pipeline conversion, marketing ROI and implementation capacity.
    why_it_matters: Commercial scalability cannot be underwritten from product/community signals.
    suggested_source_or_request: Request GTM dashboard, bookings pipeline, quota attainment and CAC/payback analysis.
    priority: medium
