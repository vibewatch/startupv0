report_metadata:
  report_title: StarkWare Startup Diligence Report
  target_company: StarkWare Industries Ltd.
  website: https://starkware.co/
  known_aliases:
    - StarkWare
    - StarkWare Industries
    - Starknet
    - StarkEx
    - Cairo
    - SHARP
    - Stwo
    - STONE PROVER
  sector: Enterprise Tech / blockchain infrastructure / zero-knowledge proof scaling
  geography: "Israel (CB Insights: Netanya) with global Ethereum, Starknet and Web3 ecosystem exposure"
  company_stage: Private unicorn / growth-stage blockchain infrastructure company with public token ecosystem exposure
  research_date: 2026-06-14
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used public sources only: StarkWare/Starknet owned pages, product pages, careers pages, docs, GitHub repositories, L2BEAT, Wikipedia unicorn table, trademark aggregator records, CourtListener search results and user-provided CB Insights extract."
    - Treated company-authored product, customer and careers statements as evidence that the statements are made, not independent proof of revenue, retention, margins, security or market share.
    - "Eligibility screen: user-provided CB Insights extract identifies StarkWare as a private unicorn; current StarkWare pages and repositories show activity; no public IPO, acquisition or shutdown evidence was identified in reviewed sources, but this is not a legal status certificate."
    - Marked financial statements, cap table, revenue by customer, contracts, tax, insurance, HRIS, counsel letters, security remediations and detailed regulatory records as not_publicly_verifiable where private data-room records are required.
  included_jurisdictions:
    - Israel
    - United States public securities/legal/IP search surfaces where accessible
    - Ethereum mainnet / global Starknet ecosystem
    - Global Web3 users, developers and token markets
  excluded_topics:
    - No private financial model, audited financial statements, cap table, board materials, investor rights, token treasury, employee files, customer contracts or legal schedule were available.
    - No paywalls, private systems, wallet deanonymization, private contact details or non-public personal information were used.
    - SEC and court/regulatory searches were limited to publicly accessible pages; inaccessible or bot-blocked systems are recorded as diligence gaps rather than inferred.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow assignment and CB Insights Global Unicorn Club extract for StarkWare
      type: workflow_request_and_unicorn_status_source
      date_received: 2026-06-14
      notes: "Provided company selection context and CB Insights fields: private unicorn, valuation $8.0B, date joined 2021-11-17, country Israel, city Netanya, industry Enterprise Tech, investors Sequoia Capital, Paradigm and Pantera Capital."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: StarkWare is an eligible private unicorn with a public $8.0B valuation anchor and Israel/Netanya headquarters context.
    claim_source: User-provided CB Insights Global Unicorn Club extract; Wikipedia unicorn list row
    claim_date: 2021-11-17
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-006
    contradiction_summary: The unicorn/valuation anchor is public-source supported, but current valuation, capitalization, liquidity preference stack and private-company legal status require company/counsel confirmation.
    diligence_follow_up:
      - Request cap table, current valuation support, financing documents, option/token schedules, debt instruments and counsel confirmation that StarkWare remains private and not subject to sale/IPO process.
  - founder_claim_id: FC-002
    claim_text: StarkWare develops STARK-based blockchain scaling infrastructure through Starknet, StarkEx, Cairo, SHARP and prover technology.
    claim_source: StarkWare homepage, StarkEx page, StarkWare GitHub repositories
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.A
      - VI.B
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-011
      - EC-012
      - EC-017
    contradiction_summary: null
    diligence_follow_up:
      - Commission independent architecture, security, performance and reliability review before underwriting technical differentiation.
  - founder_claim_id: FC-003
    claim_text: StarkWare has public customer/partner traction through StarkEx customers and Starknet ecosystem/token activity.
    claim_source: StarkWare customer testimonials, Starknet Foundation materials, L2BEAT
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.B
      - III.C
      - V.A
      - V.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
      - EC-007
      - EC-008
      - EC-009
    contradiction_summary: Public logos, token activity and L2 usage do not disclose StarkWare company revenue, retention, customer concentration or enforceable contract economics.
    diligence_follow_up:
      - Request revenue by customer/product, signed customer/partner contracts, churn, cohort usage, top dApp economics and customer references.
  - founder_claim_id: FC-004
    claim_text: The public technical moat includes open-source Cairo/Stwo repositories, trademarks and ongoing STARK research.
    claim_source: GitHub repositories, StarkWare homepage/news, TrademarkElite
    claim_date: null
    mapped_chapter_ids:
      - VI
      - VIII
    mapped_section_ids:
      - VI.A
      - VI.B
      - VIII.D
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-013
      - EC-017
    contradiction_summary: Public repositories and trademarks support activity and brand ownership signals; patent coverage, assignment chains, proprietary licenses and audit remediation are not public.
    diligence_follow_up:
      - Request IP schedule, invention assignments, OSS dependency/SBOM review, license matrix, patent strategy, audit reports and remediation tracker.
  - founder_claim_id: FC-005
    claim_text: Public information is sufficient to underwrite StarkWare financial quality and the $8B valuation.
    claim_source: Analyst test against public-source diligence checklist
    claim_date: null
    mapped_chapter_ids:
      - I
      - III
      - VIII
    mapped_section_ids:
      - I.A
      - I.B
      - III.C
      - VIII.F
    verification_status: not_publicly_verifiable
    confidence: high
    evidence_claim_ids:
      - EC-019
    contradiction_summary: Public evidence is not sufficient for valuation underwriting because audited financials, revenue, burn, customer contracts, cap table and legal schedules are absent.
    diligence_follow_up:
      - Do not rely on public valuation without a full data room and management/counsel/accountant confirmations.
executive_summary:
  overall_assessment: StarkWare appears eligible for public-source diligence as an active private unicorn in zero-knowledge blockchain infrastructure. Public evidence supports active products, recognizable StarkEx customers, Starknet token/ecosystem activity, open-source R&D and a $8.0B valuation anchor, but the investment case cannot be underwritten from public data alone.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A credible thesis depends on proving that StarkWare can convert STARK technical depth and Starknet/StarkEx adoption into durable, compliant company economics while reducing technical centralization, token/regulatory, bridge/security and competitive L2 risks.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: StarkWare publicly documents Starknet, StarkEx, Cairo and STARK prover infrastructure.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-011
        - EC-012
    - founder_claim_id: FC-003
      summary: Public customer testimonials name Immutable, Sorare, dYdX, rhino.fi and ApeX, and L2BEAT shows current Starknet operating metrics.
      evidence_claim_ids:
        - EC-005
        - EC-009
    - founder_claim_id: FC-004
      summary: Open-source repositories and trademark records support public technical/IP activity.
      evidence_claim_ids:
        - EC-011
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, ARR/revenue, gross margin, burn, cash, debt, backlog and runway are not public.
    - risk_id: R-004
      summary: L2BEAT flags technical/centralization risks including no exit window for unwanted upgrades, permissioned roles and a 2026 outage.
    - risk_id: R-005
      summary: STRK token economics, cross-chain token use, staking/governance and global user access create regulatory and compliance diligence needs.
  key_evidence_gaps:
    - Audited financial statements, management accounts, ARR/revenue, gross margin, burn, cash, debt, backlog, tax positions and runway.
    - Capitalization, option/warrant/note schedules, investor rights, token treasury/allocation, foundation/company economics and current valuation bridge.
    - Customer revenue, top-account concentration, signed StarkEx/Starknet commercial agreements, churn, retention and customer references.
    - Security audits, incident history, key-management controls, bridge/prover/sequencer runbooks and decentralization milestones.
    - Counsel-reviewed legal schedule covering token, securities, sanctions/AML, IP, open-source, employment, privacy, litigation, insurance and material contracts.
  recommended_next_steps:
    - Run finance/cap-table/token-treasury diligence before relying on the $8.0B valuation anchor.
    - Conduct independent technical/security review of Starknet, StarkEx, SHARP/Stwo, bridges, sequencer/prover operations and incident response.
    - Validate top customers, partner economics, revenue recognition, retention and commercial pipeline through contracts and reference calls.
    - Have counsel review token/regulatory, sanctions/AML, litigation, IP/open-source, data/privacy and cross-border operational exposure.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources support unicorn/valuation anchors and token/network signals, but company financial statements, revenue, runway, cap table, debt, tax, customer economics and projections are private.
    founder_claim_ids:
      - FC-001
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-007
      - EC-009
      - EC-019
    risk_ids:
      - R-001
      - R-002
      - R-003
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or management financial statements were public. Only network/protocol metrics and product descriptions provide indirect signals.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Financial statements, backlog, AR aging and product/geography revenue breakdowns require private records.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-001
              - R-003
          - finding_id: I.A-F2
            finding: L2BEAT network operations are useful operating context but not company revenue.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-003
        hidden_risks:
          - Protocol activity could mask weak company monetization or high support/prover costs.
        evidence_gaps:
          - Audited income statements, balance sheets, cash flows, footnotes, management reports, revenue breakdowns, backlog and AR aging.
        follow_up_questions:
          - Provide audited and management financial statements for 2023-2026 YTD plus revenue by product, customer, channel and geography.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-019
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public projections were found. Public growth drivers are Starknet/StarkEx adoption, STRK ecosystem and STARK R&D, but predictability and financing assumptions are private.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: Projected revenue, capex, working capital and financing assumptions are not public.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-001
              - R-002
          - finding_id: I.B-F2
            finding: STRK fee/governance/staking plans are public but economic contribution to StarkWare is not.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-002
              - R-005
        hidden_risks:
          - Crypto-cycle volatility, token incentives and protocol fees could make forecasts less predictable than product activity suggests.
        evidence_gaps:
          - Three-year quarterly plan, scenario sensitivities, token/equity economics, foreign exchange and regulatory assumptions.
        follow_up_questions:
          - Provide board-approved model with downside/base/upside cases and reconciliation to protocol metrics.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-019
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Investor names and valuation anchors are public, but share count, option/warrant/note schedules, preference stack, debt and token allocations are not public.
        verification_status: partially_verified
        confidence: medium
