diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts, revenue by product/customer, gross margin, burn, cash, debt and tax positions.
    why_it_matters: Required to underwrite valuation, runway and financial quality.
    suggested_source_or_request: Request audited statements, trial balances, revenue schedules, bank/debt/tax records and board financial package.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, investor rights, option/warrant/note schedules, token treasury/allocation and foundation/company economics.
    why_it_matters: Determines ownership, dilution, control, liquidation preference and token/equity value capture.
    suggested_source_or_request: Request capitalization and token schedules plus financing documents and side letters.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer/product, top-customer concentration, contracts, churn, retention, backlog and reference access.
    why_it_matters: Public logos and network metrics do not verify durable revenue.
    suggested_source_or_request: Request top-15 customer schedule, contracts and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Independent security audits, incident history, key-management controls, bridge/sequencer/prover runbooks and SLAs.
    why_it_matters: Technical failure could create customer losses, reputational harm and legal exposure.
    suggested_source_or_request: Request audit reports, remediation tracker, incident postmortems, architecture review and DR plan.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Token/regulatory legal opinions covering STRK, staking, governance, sanctions/AML, tax and cross-chain liquidity.
    why_it_matters: Token and global-access risks could affect operations, listings and investor returns.
    suggested_source_or_request: Request counsel memos, policies and regulator correspondence.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D roadmap cost/timing, benchmarks and decentralization milestones.
