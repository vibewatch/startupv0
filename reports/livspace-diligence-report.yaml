        figure_ids: []
        evidence_claim_ids: [EC-004]
      - section_id: VII.C
        title: Board and Governance
        summary: Investor roster is public, but board seats, veto rights, committees, related-party approvals and governance documents are private.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VII.C-F1
            finding: KKR, Ingka, TPG, Goldman Sachs and other investors are public signals, not board-control evidence.
            evidence_claim_ids: [EC-002, EC-004]
            risk_ids: [R-005]
        hidden_risks: [Protective provisions or investor conflicts may affect exits, financing and strategic decisions.]
        evidence_gaps: [Board roster, shareholder agreement, reserved matters and related-party approvals.]
        follow_up_questions: [Provide governance documents and board materials.]
