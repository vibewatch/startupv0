risk_register:
  - risk_id: R-001
    risk_title: Unit economics and cash conversion opacity
    description: Public sources do not disclose project-level contribution margin, CAC/payback, warranty/rework cost, refunds, deposits, vendor payables, cash, burn or runway.
    severity: high
    likelihood: high
    evidence_strength: high
    diligence_priority: high
    evidence_claim_ids: [EC-003, EC-008]
    mitigation_or_diligence_request: Request audited financials, cohort-level unit economics, working-capital reports and cash runway.
  - risk_id: R-002
    risk_title: Distributed quality and fulfillment execution
    description: The value proposition depends on designers, vendors, manufacturers and contractors across many cities, creating execution, SLA, warranty and brand-risk exposure.
    severity: high
    likelihood: medium
    evidence_strength: medium
    diligence_priority: high
    evidence_claim_ids: [EC-003, EC-005]
    mitigation_or_diligence_request: Review vendor contracts, quality KPIs, rework/refund cohorts and customer references.
  - risk_id: R-003
    risk_title: Cyclical and competitive demand
    description: Home interiors and renovation are discretionary and locally competitive; public scale does not prove durable CAC/payback or pricing power.
    severity: medium
    likelihood: medium
    evidence_strength: medium
    diligence_priority: high
    evidence_claim_ids: [EC-006, EC-011]
    mitigation_or_diligence_request: Analyze city-level win/loss, CAC, conversion, pricing and market-share data.
  - risk_id: R-004
    risk_title: Expansion execution beyond core markets
    description: Public expansion plans across APAC, MENA and Australia may consume capital before operations, brand trust and vendor controls mature.
    severity: medium
    likelihood: medium
    evidence_strength: medium
    diligence_priority: medium
    evidence_claim_ids: [EC-007]
    mitigation_or_diligence_request: Review market-launch budgets, actuals, milestones and acquisition integration.
  - risk_id: R-005
    risk_title: Stale valuation and cap-table complexity
    description: The latest public unicorn valuation marker is from 2022 and does not reveal current marks, liquidation preferences, debt or ownership.
    severity: high
    likelihood: unknown
    evidence_strength: high
    diligence_priority: high
    evidence_claim_ids: [EC-001, EC-002, EC-008]
    mitigation_or_diligence_request: Request current cap table, financing documents, preference stack and valuation support.
  - risk_id: R-006
    risk_title: Legal, privacy, consumer and labor compliance
    description: Consumer renovation services, digital lead flows, designer/contractor networks and multi-country operations create legal and regulatory exposure not resolved by public pages.
    severity: medium
    likelihood: unknown
    evidence_strength: medium
    diligence_priority: high
    evidence_claim_ids: [EC-006, EC-010, EC-012]
    mitigation_or_diligence_request: Obtain counsel letters, compliance memos, privacy/security materials, labor audits and dispute schedules.
  - risk_id: R-007
    risk_title: Technology defensibility and IP ownership
    description: Proprietary technology is central to the story, but architecture, automation depth, IP assignments, licenses and security posture were not public.
    severity: medium
    likelihood: medium
    evidence_strength: medium
    diligence_priority: medium
    evidence_claim_ids: [EC-003, EC-007, EC-012]
    mitigation_or_diligence_request: Run technical, IP and security diligence including software composition analysis.
  - risk_id: R-008
    risk_title: Governance and key-person dependency
    description: Founder history is public but current roles, board control, succession and executive depth need verification.
    severity: medium
    likelihood: medium
    evidence_strength: medium
    diligence_priority: medium
    evidence_claim_ids: [EC-004, EC-009]
    mitigation_or_diligence_request: Review current management roster, board governance, employment agreements and succession plans.
diligence_gaps:
  - gap_id: G-001
    gap: Audited financials, revenue, margin, cash runway, project unit economics and working-capital schedules are not public.
    related_risk_ids: [R-001]
    priority: high
  - gap_id: G-002
