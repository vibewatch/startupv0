      - section_id: VIII.D
        title: Regulatory Compliance
        summary: Consumer protection, privacy, advertising, warranty, labor, tax and construction/contractor compliance are material but not fully public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.D-F1
            finding: The consumer-service and contractor network model requires multi-jurisdiction compliance review.
            evidence_claim_ids: [EC-006, EC-010]
            risk_ids: [R-006]
        hidden_risks: [Advertising, warranty, privacy, worker classification or local contractor rules could create enforcement or refund exposure.]
        evidence_gaps: [Compliance policies, regulatory correspondence, permits/licenses and audit reports.]
        follow_up_questions: [Provide regulatory compliance memo and jurisdiction-by-jurisdiction permits.]
