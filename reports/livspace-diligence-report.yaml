        title: Data Privacy and Security
        summary: Public pages link to privacy/policy surfaces, but actual data flows, vendor DPAs, security controls and incidents were not verified.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.E-F1
            finding: Digital lead generation, accounts, calculators and project workflows likely process consumer personal data across multiple vendors and jurisdictions.
