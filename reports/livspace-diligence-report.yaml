        figure_ids: []
        evidence_claim_ids: [EC-002, EC-004]
      - section_id: VII.D
        title: Personnel and Hiring
        summary: Livspace self-reports 2,000+ expert designers; total employees, attrition, contractor mix and hiring plan are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VII.D-F1
            finding: Designer scale is a positive operating signal but requires reconciliation to full-time employees, contractors and active designers.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-002]
        hidden_risks: [Contractor-heavy delivery could produce inconsistent quality, compliance and customer experience.]
        evidence_gaps: [Headcount by function/region, attrition, contractor agreements, hiring plan and employee engagement.]
        follow_up_questions: [Provide HRIS exports, contractor roster and attrition analysis.]
        table_ids: [T-014]
        figure_ids: []
        evidence_claim_ids: [EC-005]
      - section_id: VII.E
        title: Compensation and Incentives
        summary: Compensation, equity grants, sales commissions, designer incentives and vendor incentive structures are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VII.E-F1
            finding: Incentive design is critical because sales, design and vendor teams can optimize for bookings rather than project margin or quality.
