        confidence: medium
        key_findings:
          - finding_id: VII.A-F1
            finding: Livspace's About page lists Anuj Srivastava as co-founder/chairman and Ramakant Sharma as co-founder/CEO, while the 2022 release used then-current CEO/COO titles.
            evidence_claim_ids: [EC-004, EC-009]
            risk_ids: [R-008]
        hidden_risks: [Role-title drift may indicate governance changes or simply outdated pages; confirm current authority.]
        evidence_gaps: [Current officer list, board roster, committee charters, employment agreements and succession plan.]
        follow_up_questions: [Provide current management roster, board minutes and delegation of authority.]
        table_ids: [T-013]
        figure_ids: [F-007]
        evidence_claim_ids: [EC-004, EC-009]
      - section_id: VII.B
        title: Founders and Key Employees
        summary: Founder biographies cite Google, Myntra, IIT Kanpur, London Business School and ISB backgrounds, but references and employment agreements were not reviewed.
