            risk_ids: [R-007]
        hidden_risks: [Contractor-created designs, software and content may have incomplete assignments or license restrictions.]
        evidence_gaps: [Trademark/patent schedule, software inventory, open-source review, design/content rights and IP assignments.]
        follow_up_questions: [Provide IP schedule, assignment chain and software composition analysis.]
        table_ids: [T-016]
        figure_ids: []
