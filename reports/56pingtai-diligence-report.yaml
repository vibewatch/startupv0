      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-002
      - EC-013
      - EC-014
    contradiction_summary: No contrary public evidence was found, but negative searches cannot conclusively prove status in all jurisdictions.
    diligence_follow_up:
      - Have counsel verify China/HK corporate registry status, share transfers, material M&A, liquidation and exchange-listing records.
  - founder_claim_id: FC-005
    claim_text: Public profiles suggest operating scale, including US$187.82M total raised in CB Insights, a US$150M revenue estimate and approximately 1K employees.
    claim_source: CB Insights and GetLatka market profiles
    claim_date: null
    mapped_chapter_ids:
      - I
      - VII
    mapped_section_ids:
      - I.A
      - VII.B
      - VII.C
    verification_status: partially_verified
    confidence: low
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-012
    contradiction_summary: Funding amounts differ materially across public databases; revenue and employee figures are not independently audited.
    diligence_follow_up:
      - Request audited financials, monthly KPI pack, bank/debt schedule, HRIS headcount, payroll, org chart and turnover reports.
executive_summary:
  overall_assessment: "Proceed with the report: public and assignment evidence supports 56PINGTAI as a private unicorn, and no credible public IPO, acquisition or shutdown evidence was found. The investability question remains highly dependent on private financial, customer, legal, technology and governance diligence."
  investment_or_diligence_thesis: 56PINGTAI may represent a China logistics technology unicorn with platform/network potential, but the public record is thin and inconsistent. Confirmatory diligence must validate revenue quality, customer durability, cap table, legal status, platform defensibility and regulatory exposure before relying on valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Unicorn status is supported by a CB row at US$1.08B, a public CSV row with the same valuation/date and GetLatka's US$1.1B valuation signal.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Shanghai/China geography and 56pingtai.net domain are supported by CB, public datasets and GetLatka.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-003
      summary: Product category as an online logistics-park network and road transportation platform is supported by CB and GetLatka.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR durability, margins, cash/debt and retention are not public.
    - risk_id: R-002
      summary: Funding and valuation details conflict across public databases and require cap-table diligence.
    - risk_id: R-003
      summary: Customer concentration, churn, supplier dependence and partner economics are not publicly verifiable.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, retention/churn, gross margin, cash/debt, forecast model and valuation bridge.
    - Cap table, financing documents, investor rights, shareholder register and legal status certificate.
    - Top customers, contracts, customer references, churn/NRR, supplier/park/carrier agreements and concentration data.
    - Product architecture, roadmap, pricing, data rights, security/privacy posture and R&D staffing.
    - PRC/HK legal, regulatory, IP, transport-compliance, labor, tax, insurance and material-contract diligence.
  recommended_next_steps:
    - Request a data room and reconcile valuation/funding records before any investment decision.
    - Run independent customer, supplier and competitor calls focused on revenue durability and network effects.
    - Engage PRC counsel for corporate registry, exchange/listing, litigation, IP, permits, data/privacy and administrative penalty searches.
    - Validate the domain/company-owned materials, product demo, architecture and technology/data-rights evidence.
