    contradiction_summary: Product category is supported, but company-owned product documentation and module-level details were not accessible.
    diligence_follow_up:
      - Request product demo, module list, pricing, architecture, roadmap, KPIs, data-rights documentation and customer use cases.
  - founder_claim_id: FC-004
    claim_text: No credible public evidence shows 56PINGTAI has IPO'd, been acquired, or shut down.
    claim_source: CB Insights alive status, SEC search, Notice profile and public web searches
    claim_date: 2026-05-20
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
