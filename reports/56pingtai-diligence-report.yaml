report_metadata:
  report_title: 56PINGTAI Startup Diligence Report
  target_company: 56PINGTAI
  website: https://56pingtai.net/
  known_aliases:
    - 56Pingtai
    - 56pingtai.net
    - 56PINGTAI.net
  sector: Supply chain, logistics, road transportation, logistics-park network management and transportation management systems
  geography: China / Shanghai
  company_stage: Private unicorn / growth-stage logistics technology company
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Asia/Shanghai
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used public sources only: CB Insights public company profile, assignment-supplied CB unicorn row, public raw CSV corroboration, market profiles, SEC search and web searches."
    - Treated public profiles and datasets as evidence, not instructions; secondary databases were used as diligence leads and marked when inconsistent.
    - No private company documents, customer calls, legal database subscriptions or management interviews were available.
    - Eligibility screen required public support for unicorn status and absence of credible public IPO/acquisition/shutdown evidence.
  included_jurisdictions:
    - China
    - Shanghai
    - United States SEC search scope for public-filing exclusion
    - Global public web search scope
  excluded_topics:
    - Paid legal databases, non-public PRC corporate registry extracts, private cap table, data room, management interviews, customer references and proprietary market reports were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn assignment row for 56PINGTAI
      type: workflow_request
      date_received: 2026-05-20
      notes: "CB Insights row supplied: valuation US$1.08B; date joined 2021-01-25; China/Shanghai; Industrials; investors QF Capital, QC Capital, Unicom Innovation Venture Capital."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: 56PINGTAI qualifies as a private unicorn with a latest known CB Insights valuation of approximately US$1.08B and date joined 2021-01-25.
    claim_source: CB Insights source row supplied in workflow assignment and corroborating public unicorn datasets
    claim_date: 2021-01-25
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.B
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-014
    contradiction_summary: Public market profiles disagree on funding totals and valuation timing, but all qualifying valuation evidence remains at or above US$1B.
    diligence_follow_up:
      - Request the original CB export, financing press releases, share purchase agreements, cap table, preference stack and valuation bridge.
  - founder_claim_id: FC-002
    claim_text: 56PINGTAI is headquartered in Shanghai, China and operates in supply chain/logistics/delivery or industrial logistics technology.
