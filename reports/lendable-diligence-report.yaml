report_metadata:
  report_title: Lendable Startup Diligence Research Report
  target_company: Lendable
  website: https://www.lendable.co.uk/
  known_aliases:
    - Lendable Ltd
    - Feather Media Ltd
    - Zable
  sector: Financial Services / Consumer credit fintech
  geography: United Kingdom / London
  company_stage: Private unicorn / growth equity-backed fintech
  research_date: 2026-05-23
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: GBP and USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from existing reports and selected this target from CB Insights current unicorn list.
    - Reviewed public company pages, investor/news/database sources, and accessible legal/regulatory/security pages.
    - Marked private financial, customer, cap-table, legal and personnel materials as not publicly verifiable rather than estimating them.
  included_jurisdictions:
    - United Kingdom
    - United States public web
    - Global public web
  excluded_topics:
    - No private data room access
    - No paywall bypassing
    - No non-public personal contact details
    - No exhaustive official docket or regulator search
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn selection row from CB Insights-derived candidate list
      type: workflow_context
      date_received: 2026-05-23
      notes: "Selected row: Lendable, slug lendable, valuation $4.58B, country United Kingdom, city London, sector Consumer credit fintech."
