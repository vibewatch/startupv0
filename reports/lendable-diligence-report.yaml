executive_summary:
  overall_assessment: Lendable is eligible for this private-unicorn screen based on the selected CB Insights current unicorn-list row and active public web presence. Public evidence supports product positioning and selected funding/market claims, but underwriting-grade conclusions require private financials, cap table, customer concentration, legal/regulatory, technical and personnel records.
  investment_or_diligence_thesis: The diligence thesis is a high-growth consumer credit fintech company whose public valuation depends on validating revenue durability, unit economics, risk controls and governance against private records.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Unicorn-status source and public financing evidence support eligibility, subject to document reconciliation.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-016
    - founder_claim_id: FC-003
      summary: Public sources support the core product positioning.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: Public traction, customer, partner or network signals exist but are incomplete.
      evidence_claim_ids:
        - EC-005
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Consumer-credit cycle and funding-market sensitivity
    - risk_id: R-002
      summary: Private financials, cap table and loan-performance data unavailable
    - risk_id: R-003
      summary: Regulated lending, data, collections and conduct exposure
  key_evidence_gaps:
    - Audited financial statements, management reports, revenue bridge, gross margin, cash burn and runway
    - Fully diluted cap table, debt instruments, warrants, option grants and investor side letters
    - Top customer revenue, churn, renewal, backlog, customer contracts and references
    - CAC, channel mix, quota capacity, sales cycle, pipeline conversion and marketing budget
    - Product roadmap, R&D budget, security architecture, incident history and technical debt register
  recommended_next_steps:
    - Open financial, cap-table and board-material data room and reconcile public valuation claims to primary documents.
    - Run customer and revenue-quality diligence on top accounts, churn/retention cohorts and pipeline conversion.
    - Conduct counsel-led legal, regulatory, privacy, IP, insurance and material-contract review.
    - Run product/technical diligence covering architecture, roadmap, security, vendors and incident history.
