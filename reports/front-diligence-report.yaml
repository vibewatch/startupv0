risk_register:
  - risk_id: R-001
    risk_title: Public valuation is stale without current operating financials
    risk_category: financial
    severity: high
    likelihood: medium
    description: The $1.7B valuation is supported by 2022 funding, but audited financials, ARR quality, burn, cash runway,
      and current valuation are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.D
    evidence_claim_ids: *a73
    mitigation_or_diligence_request: Open a focused diligence request covering the underlying data room evidence,
      responsible executive interviews, and third-party verification before investment reliance.
  - risk_id: R-002
    risk_title: Customer concentration and retention are not disclosed
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Front names customers and a broad customer count, but revenue by customer, NRR, churn, cohort retention,
      and enterprise concentration are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a74
    mitigation_or_diligence_request: Open a focused diligence request covering the underlying data room evidence,
      responsible executive interviews, and third-party verification before investment reliance.
  - risk_id: R-003
    risk_title: Competitive AI support market could compress pricing and differentiation
    risk_category: market
    severity: medium
    likelihood: high
    description: Front competes with support suites, shared inbox products, and AI-first entrants while selling seat-based tiers.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids: *a75
    mitigation_or_diligence_request: Open a focused diligence request covering the underlying data room evidence,
      responsible executive interviews, and third-party verification before investment reliance.
  - risk_id: R-004
    risk_title: Security/privacy obligations are material because Front handles customer communications
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: SOC 2 and ISO claims are positive, but customer contracts, DPA exceptions, incident history, subprocessor
      risk, and regulated customer requirements need review.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a76
    mitigation_or_diligence_request: Open a focused diligence request covering the underlying data room evidence,
      responsible executive interviews, and third-party verification before investment reliance.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited/reviewed financial statements, ARR/net revenue, gross margin, burn, cash, debt, and backlog
    why_it_matters: Valuation and runway cannot be underwritten from public funding news alone
    suggested_source_or_request: CFO data-room package
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, option pool, liquidation preferences, investor rights, SAFEs/notes/warrants
    why_it_matters: Investor economics and dilution determine downside protection and exit outcomes
    suggested_source_or_request: Company counsel and finance team
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue/TPV/member/customer concentration, churn, renewal, NRR, and references
    why_it_matters: Public logos do not prove durable revenue quality
    suggested_source_or_request: Customer contracts and reference calls
    priority: high
  - gap_id: G-004
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, technical architecture, incident history, R&D spend, and security reports
    why_it_matters: Product differentiation and operational risk require non-public evidence
    suggested_source_or_request: CTO/CISO/product data-room package
    priority: medium
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, regulatory, IP, insurance, and material-contract schedules
    why_it_matters: Public searches are not a legal opinion and miss private disputes or notices
    suggested_source_or_request: Outside counsel legal diligence
    priority: high
follow_up_requests:
  - request_id: Q-001
    chapter_id: I
    section_id: I.A
    request: Provide audited/reviewed financials, monthly management accounts, revenue bridge, gross margin, burn, cash,
      runway, debt, and forecast model.
    requested_from: company
    priority: high
  - request_id: Q-002
    chapter_id: I
    section_id: I.C
    request: Provide fully diluted cap table, financing documents, side letters, debt, SAFEs/notes, warrants, and
      option-plan details.
    requested_from: counsel
    priority: high
  - request_id: Q-003
    chapter_id: III
    section_id: III.C
    request: Provide top customers/merchants/members by revenue or volume, contracts, renewal dates, NRR/churn, and
      reference permissions.
    requested_from: company
    priority: high
  - request_id: Q-004
    chapter_id: VI
    section_id: VI.B
    request: Provide product roadmap, architecture diagrams, security reports, incident history, pen tests, and R&D hiring plan.
    requested_from: company
    priority: medium
  - request_id: Q-005
    chapter_id: VIII
    section_id: VIII.A
    request: Provide litigation/regulatory/IP/insurance/material-contract schedules and outside-counsel representation letter.
    requested_from: counsel
    priority: high
