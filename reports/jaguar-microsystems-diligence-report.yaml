diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management reports, revenue bridge, gross margin, working capital and cash burn
    why_it_matters: Public sources do not establish financial quality.
    suggested_source_or_request: Audited financials, board packs and KPI definitions
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, investor rights, debt, options, warrants and side letters
    why_it_matters: Ownership and liquidation preferences determine proceeds and control.
    suggested_source_or_request: Cap table, financing docs and investor consents
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top customer revenue, churn, renewal, backlog and references
    why_it_matters: Concentration and retention drive valuation durability.
    suggested_source_or_request: Customer revenue schedule, contracts and reference calls
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, sales cycle, quota capacity, conversion and channel mix
    why_it_matters: GTM efficiency is not visible in public materials.
    suggested_source_or_request: Sales model, CRM export and pipeline conversion by cohort
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, R&D spend, technical debt and security/quality record
    why_it_matters: Technology and roadmap execution are core diligence issues.
    suggested_source_or_request: Roadmap, engineering KPIs, incident logs and technical diligence session
    priority: medium
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, regulatory correspondence, IP ownership, insurance and material contracts
    why_it_matters: Public sources cannot clear legal and regulatory exposure.
    suggested_source_or_request: Counsel-led docket/regulatory/IP/insurance review
    priority: high
