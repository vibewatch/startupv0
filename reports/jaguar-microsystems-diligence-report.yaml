  - figure_id: F-011
    title: Risk register heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Full risk-register heatmap for Jaguar Microsystems.
    purpose: Show relative severity and likelihood across diligence risks.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Stale valuation and missing current financials
          severity: high
          likelihood: medium
          rationale: The $1.34B marker is 2022-era; current revenue, burn, backlog and valuation are private.
          evidence_claim_ids:
            - EC-001
            - EC-003
            - EC-010
          source_ids:
            - SRC-001
        - risk_id: R-002
          label: Tencent concentration and governance rights
          severity: high
          likelihood: medium
          rationale: Tencent is both major investor and possible early customer, creating concentration, related-party and strategic-control risk.
          evidence_claim_ids:
            - EC-007
          source_ids:
            - SRC-001
        - risk_id: R-003
          label: Customer adoption and production revenue not public
          severity: high
          likelihood: unknown
          rationale: Public evidence does not prove production design wins, revenue concentration or shipment volumes.
          evidence_claim_ids:
            - EC-007
            - EC-010
          source_ids:
            - SRC-001
        - risk_id: R-004
          label: Semiconductor commercialization execution
          severity: high
          likelihood: medium
          rationale: Transitioning from prototype to SoC mass production can fail through yield, performance, packaging or software readiness.
          evidence_claim_ids:
            - EC-005
            - EC-008
            - EC-009
          source_ids:
            - SRC-001
        - risk_id: R-005
          label: Competitive pressure in DPU/cloud acceleration
          severity: medium
          likelihood: medium
          rationale: Multiple DPU startups and hyperscaler/in-house alternatives create pricing and design-win pressure.
          evidence_claim_ids:
            - EC-008
            - EC-009
          source_ids:
            - SRC-001
        - risk_id: R-006
          label: Export-control and geopolitical exposure
          severity: high
          likelihood: medium
          rationale: Advanced data-center semiconductors can be affected by export controls, EDA restrictions and customer sanctions.
          evidence_claim_ids:
            - EC-011
          source_ids:
            - SRC-001
        - risk_id: R-007
          label: Key-person and retention risk
          severity: medium
          likelihood: medium
          rationale: Public story leans heavily on Sunny Siu and a specialist team; current retention and compensation are not public.
          evidence_claim_ids:
            - EC-004
            - EC-005
          source_ids:
            - SRC-001
        - risk_id: R-008
          label: IP ownership and litigation clearance gap
          severity: medium
          likelihood: unknown
          rationale: DPU silicon depends on clean IP assignments, tool licenses and freedom-to-operate, none of which are public.
          evidence_claim_ids:
