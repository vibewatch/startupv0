  target_company: Jaguar Microsystems
  website: https://www.jaguarmicro.com/en/
  known_aliases:
    - JaguarMicro
    - Jaguar Micro
    - Yunbao Intelligent
  sector: Semiconductors / data processing units for cloud data centers
  geography: China / Shenzhen with Hong Kong operations
  company_stage: Private unicorn / venture-backed semiconductor company
  research_date: 2026-06-11
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD / CNY
  time_zone: UTC+8
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from reports/*-diligence-report.yaml and selected this uncovered target from the CB Insights current unicorn list using shuf -n 3.
    - Reviewed public company-owned pages, investor/news/database sources, and accessible search results without paywall bypassing.
    - Marked financial, customer, cap-table, legal, contract and personnel records as not_publicly_verifiable where private records are required.
  included_jurisdictions:
    - China
    - United States public web
    - Global public web
  excluded_topics:
    - No private data room access
    - No paywall bypassing
    - No non-public personal contact details
    - No exhaustive official docket, tax or regulator search
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn selection row from CB Insights-derived candidate list
      type: workflow_context
      date_received: 2026-06-11
      notes: "Selected row: Jaguar Microsystems\t$1.34\t6/23/2022\tChina\tShenzhen\tIndustrials\tTencent Holdings, Glory Ventures, Shenzhen Capital Group"
