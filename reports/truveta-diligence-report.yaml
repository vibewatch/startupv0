diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, monthly management accounts, ARR/bookings, gross margin, cash/debt, backlog and AR aging.
    why_it_matters: Required to test valuation support, revenue quality and runway.
    suggested_source_or_request: "Company CFO/data room: audited statements, KPI pack and management reports."
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, liquidation preferences, option pool, warrants, SAFEs/notes and debt.
    why_it_matters: Headline unicorn valuation may not represent common equity economics.
    suggested_source_or_request: Company counsel/CFO financing documents and waterfall model.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product adoption, pricing, gross margin, quality metrics, model validation and intended-use controls.
    why_it_matters: Public product claims do not prove monetization, safety or scalability.
    suggested_source_or_request: Product, finance and security data room artifacts.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top customer ARR, concentration, churn, NRR, renewal schedule and references.
    why_it_matters: Customer economics and concentration are central hidden risks.
    suggested_source_or_request: Customer cohort files, CRM export, contracts and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Health-system data-supplier agreements, contribution percentages, termination rights and data quality scorecards.
    why_it_matters: Data supply is a core moat and concentration risk.
    suggested_source_or_request: Data supplier contract schedule and feed-quality dashboards.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing, buyer references and benchmarked data quality versus RWE competitors.
    why_it_matters: Competition may pressure pricing and differentiation.
    suggested_source_or_request: Sales/customer references and third-party benchmark study.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, quota attainment, CAC/payback, pipeline conversion and implementation capacity.
    why_it_matters: Growth plan may depend on unproven enterprise sales efficiency.
    suggested_source_or_request: CRM, sales comp/attainment and S&M budget files.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D roadmap, development cost, validation reports, regulatory-grade audit packet and IP docket.
    why_it_matters: Needed to test product claims and defensibility.
    suggested_source_or_request: Product/R&D roadmap, QMS, validation reports and IP counsel files.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount history/projection by function/location, attrition and hiring plan.
    why_it_matters: More-than-400 employee anchor does not reveal burn or execution capacity.
    suggested_source_or_request: HRIS export, recruiting plan and attrition report.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.C
    missing_information: HIPAA de-identification expert determinations, BAAs/DUAs, privacy impact assessments, consent/opt-out governance and incident logs.
    why_it_matters: This is the central regulatory/legal risk for a large health-data platform.
    suggested_source_or_request: Privacy counsel, CISO and compliance data room.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Direct USPTO/WIPO patent docket, assignments, FTO, open-source inventory and software/data licenses.
    why_it_matters: Patent/IP defensibility and ownership were only partially verified.
    suggested_source_or_request: IP counsel files and engineering license inventory.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, agency inquiries, customer audits and AI/RWE compliance reviews.
    why_it_matters: Public sources cannot clear legal/regulatory agency risk.
    suggested_source_or_request: Counsel/regulatory compliance schedule and audit reports.
    priority: high
