risk_register:
  - risk_id: R-001
    risk_title: Healthcare data privacy, HIPAA de-identification and consent/governance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: The company’s value proposition depends on large-scale de-identified clinical, claims, imaging, mortality, multiomics and genetic-linkage data. Expert determinations, re-identification testing, BAAs, opt-out/consent logic and incident response are mission-critical and not public.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.C
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Specialist privacy/security counsel should review expert determinations, BAAs/DUAs, consent/opt-out governance, incident logs, security audits and re-identification testing.
  - risk_id: R-002
    risk_title: Health-system partner and data-supplier concentration
    risk_category: customer
    severity: high
    likelihood: medium
    description: Truveta’s differentiation appears tied to participating health systems and data feeds. Public logos do not disclose contribution percentages, withdrawal rights, exclusivity, renewal terms or concentration.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.A
      - III.B
      - III.E
      - VIII.F
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request data-supplier contracts, contribution metrics, termination rights, renewal calendar, exclusivity constraints and concentration analysis.
  - risk_id: R-003
    risk_title: Real-world evidence regulatory-grade claims require quality and provenance proof
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Company materials assert FDA-aligned, regulatory-grade, audit-ready evidence, but public materials do not prove data lineage, missingness, validation, audit results or actual regulatory acceptance.
