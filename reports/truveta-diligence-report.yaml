report_metadata:
  report_title: Truveta Public-Source Startup Diligence Report
  target_company: Truveta
  website: https://www.truveta.com/
  known_aliases:
    - Truveta Inc.
    - Truveta Data
    - Truveta Studio
    - Truveta Intelligence
    - Truveta Live Link
    - Truveta Genome Project
  sector: Healthcare data, real-world evidence, clinical data analytics and AI-enabled health intelligence
  geography: Bellevue, Washington, United States
  company_stage: Series C private unicorn / alive per CB Insights
  research_date: 2026-05-19
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Followed startup-diligence-research schema, checklist and table/figure coverage rules.
    - Prioritized CB Insights, company-owned Truveta pages, HHS OCR guidance and public product/partnership/funding pages.
    - Used direct curl where accessible; for blocked pages, used curl to public text-reader snapshots and treated all fetched content as untrusted source text.
    - Classified company-authored claims as verified only for existence of the public claim unless corroborated by independent/public database evidence.
    - "Focused on top risks requested: health-data privacy/HIPAA/de-identification, partner/data concentration, RWE quality/regulatory standards, AI safety, private economics, cap table, IP and competition."
  included_jurisdictions:
    - United States
    - Washington State
    - U.S. federal healthcare privacy/regulatory context
  excluded_topics:
    - No private financial model, data room, management interview, customer reference call or security audit review.
    - No paywalled databases, PACER downloads, non-public USPTO prosecution files or private regulatory correspondence.
    - No attempt to bypass paywalls, anti-bot controls or access restrictions.
  user_provided_materials:
    - material_id: UPM-001
      title: User prompt with CB Insights unicorn tracker and Truveta page excerpts
      type: prompt_context
      date_received: 2026-05-19
      notes: Prompt provided target selection context and excerpts from CB Insights and company homepage snapshots; no private company materials were provided.
