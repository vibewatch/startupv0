executive_summary:
  overall_assessment: BigPanda appears to be an active uncovered private unicorn based on CB Insights and current public company/regulatory materials. Public evidence supports the valuation/status screen, product presence and selected customer/operating signals, but core investment diligence remains unresolved because private financials, cap table, contracts, concentration, security/legal artifacts and management data were unavailable.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A thesis for BigPanda depends on proving durable revenue quality, customer retention, margin, defensible product adoption, security/legal posture, management depth and financing terms beyond the public headline valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists BigPanda as a $1.20B private unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: BigPanda publicly advertises an active product/business platform.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: BigPanda has public customer, account, partner or operating traction signals.
      evidence_claim_ids:
        - EC-005
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation currency gap
    - risk_id: R-002
      summary: Customer-logo and concentration gap
    - risk_id: R-003
      summary: Competitive pressure from ITSM/observability incumbents
  key_evidence_gaps:
    - Audited/current financial statements, KPI pack, cash/debt, forecast model and valuation bridge.
    - Cap table, preferences, option pool, debt instruments and financing documents.
    - Top-customer revenue, contract terms, renewal status, churn and NRR cohorts.
    - CAC, payback, quota attainment, pipeline and channel productivity.
    - Legal schedule, security/audit artifacts, material contracts, IP assignments and HRIS/attrition records.
  recommended_next_steps:
    - Run financial and revenue-quality diligence before relying on headline valuation.
    - Request customer cohorts, top-account contracts and independent customer references.
    - Have counsel/security specialists review legal, privacy, regulatory, security and IP artifacts.
    - Benchmark against direct competitors using win/loss, pricing, renewal and buyer-reference evidence.
