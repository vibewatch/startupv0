executive_summary:
  overall_assessment: Proceed to focused confirmatory diligence; public evidence supports operations and product scale, but key facts require private revenue, customer, data-source, compliance and legal records.
  investment_or_diligence_thesis: YipitData appears active and still privately held, with public evidence of unicorn status, alternative-data product scale, 500+ employees and substantial funding. Underwriting depends on data-rights compliance, revenue retention, legal exposure and current valuation durability.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support YipitData's private-unicorn screening status at $1.00B.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
    - founder_claim_id: FC-002
      summary: YipitData publicly markets active products/services.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-005
      summary: YipitData has current operating/personnel signals.
      evidence_claim_ids:
        - EC-009
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Data sourcing, privacy and compliance risk
    - risk_id: R-002
      summary: Financial opacity and valuation durability
    - risk_id: R-003
      summary: Legal/trade-secret and IP-control exposure
  key_evidence_gaps:
    - Audited financials, ARR/bookings, gross margin, cash, debt and forecast model
    - Cap table, preferences, options, warrants, notes and investor rights
    - Top-customer revenue, contracts, renewal, churn and NRR cohorts
    - CAC, pipeline, quota attainment, sales cycle and payback
    - Architecture, security, data provenance, roadmap and technical debt
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline valuation.
    - Request customer/partner contracts and independent reference calls.
    - Have counsel and security/compliance specialists review legal, privacy, IP, data-rights and regulatory artifacts.
    - Benchmark competitors using win/loss, pricing, retention and buyer-reference evidence.
