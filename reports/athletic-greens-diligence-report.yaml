executive_summary:
  overall_assessment: "Athletic Greens/AG1 remains eligible for this private-unicorn diligence report: CB Insights lists it as a current private unicorn at $1.32B, and 2026 retail/media/careers signals show active operations. Public evidence is strongest for financing/status, product surface, leadership transition, partnerships, selected clinical activity and IP records; financial quality, customer economics, legal exposure and operations remain private-data questions."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A credible underwriting case requires reconciling public valuation and $600M media revenue leads to audited financials, cohort retention, gross margin, CAC/payback, channel economics, regulatory-safe product claims, litigation exposure, current cap table and supplier quality systems.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Athletic Greens as a $1.32B private unicorn in Healthcare & Life Sciences.
      evidence_claim_ids:
        - EC-001
        - EC-022
    - founder_claim_id: FC-002
      summary: Public company and TechCrunch sources verify the January 2022 $115M funding and unicorn valuation context.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: Public partner sources verify The Vitamin Shoppe retail launch, IRONMAN partnership and Huberman sponsor channel.
      evidence_claim_ids:
        - EC-011
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and valuation bridge risk
    - risk_id: R-002
      summary: Subscription auto-renewal and consumer-law exposure
    - risk_id: R-003
      summary: Supplement efficacy, safety and advertising substantiation
  key_evidence_gaps:
    - Audited financials, cash/debt, SKU/channel margin and revenue-recognition details
    - Fully diluted cap table, financing terms, preferences and debt/secondary transaction status
    - Customer/subscriber cohorts, churn, CAC/payback, channel P&L and retail sell-through
    - Labels, claims substantiation, adverse-event logs, clinical reports and compliance reviews
    - Complete litigation, insurance, material contracts, supplier and HR schedules
  recommended_next_steps:
    - Do not underwrite valuation from public list data alone; require finance/cap-table data room before IC reliance.
    - Run legal/regulatory review of subscription, advertising, labeling, clinical claims and pending allegations.
    - Validate customer economics through cohort, channel, partner and retail sell-through diligence.
    - Perform product quality, supplier/manufacturer and IP ownership diligence with specialists.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Athletic Greens/AG1 as a CB Insights private unicorn with 2022 financing and latest-known $1.32B list valuation, but investment-grade financials, cap table, cash/debt, revenue quality and forecast assumptions remain private.
