    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preferences, option pool, debt, warrants, SAFEs/notes and investor rights.
    why_it_matters: Determines ownership, dilution and proceeds waterfall.
    suggested_source_or_request: Company counsel and financing documents.
    priority: high
