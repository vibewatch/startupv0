        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources provide media revenue and pricing leads but no audited statements, management reports, product/channel gross profit, backlog or AR aging.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Audited statements, budget-to-actuals, backlog and AR aging are not publicly disclosed; the $600M revenue reference is unaudited media evidence only.
            evidence_claim_ids:
              - EC-006
              - EC-023
            risk_ids:
              - R-001
        hidden_risks:
          - Revenue quality and cash/runway could differ materially from public valuation narratives.
        evidence_gaps:
          - Audited financials, revenue-recognition policy, management KPI pack, AR aging, backlog, inventory and working-capital schedules are private.
        follow_up_questions:
          - Provide audited annual/quarterly financial statements, revenue bridge, cohort KPIs, gross margin by SKU/channel, backlog and AR aging.
