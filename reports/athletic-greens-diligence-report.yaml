risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation bridge risk
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources show valuation and media revenue anchors, but audited financials, unit economics, cash/debt and forecast assumptions are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require full financial statements, KPI pack, cash/debt schedule, revenue-recognition memo and valuation/cap-table bridge.
  - risk_id: R-002
    risk_title: Subscription auto-renewal and consumer-law exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Public litigation sources include dismissed 2024 litigation and a 2026 automatic-renewal complaint allegation.
    impacted_chapter_ids:
      - VIII
      - V
    impacted_section_ids:
      - VIII.A
      - VIII.G
      - V.A
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Have counsel review all ARL, ROSCA, state subscription, checkout, cancellation and refund processes plus litigation status.
  - risk_id: R-003
    risk_title: Supplement efficacy, safety and advertising substantiation
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Clinical activity and certification exist, but broad health claims, ingredient synergies, adverse-event handling and labeling compliance need expert review.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Commission regulatory/scientific review of labels, ads, substantiation files, clinical protocols, adverse-event logs and quality systems.
  - risk_id: R-004
    risk_title: Customer/channel concentration and performance opacity
    risk_category: customer
    severity: high
    likelihood: unknown
    description: DTC, podcast, retail and event channels are public, but revenue contribution, concentration, retention and partner economics are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
      - V.C
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request channel cohort data, contracts, sell-through, partner-sourced revenue and top-customer or subscriber concentration.
  - risk_id: R-005
    risk_title: Competitive pricing and commoditization pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Competing greens powders with similar ingredient-count positioning and mass retail distribution create pricing and differentiation pressure.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Run a market-share, pricing-elasticity, brand-awareness and retention benchmarking study against greens and supplement competitors.
  - risk_id: R-006
    risk_title: Founder and science-transparency reputational risk
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: Public reporting has raised founder-background and science-transparency criticism, requiring governance and communications diligence.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.C
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Review board minutes, public-response strategy, founder role, background checks, dispute history and PR/legal readiness.
  - risk_id: R-007
    risk_title: Manufacturing, certification and supplier dependency
    risk_category: operational
    severity: medium
    likelihood: unknown
    description: Product quality claims reference NSF and TGA-registered manufacturing, but supplier identity, batch testing, capacity and recall history are not public.
    impacted_chapter_ids:
      - II
      - III
      - VI
    impacted_section_ids:
      - II.A
      - III.E
      - VI.A
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request supplier contracts, manufacturing audits, batch testing, recall/adverse-event logs, SLAs and business-continuity plans.
  - risk_id: R-008
