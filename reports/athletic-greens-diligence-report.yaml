report_metadata:
  report_title: Athletic Greens (AG1) Startup Diligence Report
  target_company: Athletic Greens (AG1)
  website: https://drinkag1.com/
  known_aliases:
    - AG1
    - Athletic Greens
    - Athletic Greens (USA), Inc.
    - Athletic Greens International, Inc.
  sector: Healthcare & Life Sciences; consumer health, wellness and dietary supplements
  geography: United States / New York per CB Insights; public operations span North America, Europe and Asia
  company_stage: Private unicorn / growth-stage consumer health and nutrition brand
  research_date: 2026-06-04
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from the user-provided CB Insights current unicorn-list row and independently fetched the public CB Insights list to verify the target row.
    - Used public company-issued releases, company-controlled careers pages, third-party news, partner pages, clinical/regulatory sources, trademark records, review/pricing sources and legal docket/complaint sources.
    - Treated company-owned releases as evidence of public claims, not proof of audited financial performance or legal terms.
    - Searched for IPO, acquisition or shutdown contradictions; no public source reviewed contradicted private-company eligibility, but counsel/corporate-registry confirmation is still required.
    - Did not use private records, paywalled sources, private contact details, customer calls or counsel/accountant confirmations.
  included_jurisdictions:
    - United States
    - New York
    - Utah/Salt Lake City litigation address signal
    - Global operations referenced publicly across North America, Europe and Asia
  excluded_topics:
    - Private financial statements, cap table, customer contracts, supplier contracts, board minutes, counsel memos, non-public employee data, private customer references and private medical/regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Assignment row for Athletic Greens from current CB Insights unicorn list
      type: workflow_request
      date_received: 2026-06-04
      notes: Company=Athletic Greens; slug=athletic-greens; latest known valuation=$1.32B; country=United States; city=New York; industry=Healthcare & Life Sciences; date joined=1/25/2022; investors=SC.Holdings, Not Boring Capital, Bolt Ventures.
