methodology:
  standard: Public-source startup diligence screen aligned to chapters I-VIII of the repository skill template.
  evidence_handling: Every affirmative claim is linked to source IDs and evidence claim IDs. Missing private records are explicitly marked not_publicly_verifiable.
  confidence_scale: High confidence means public source directly supports a historical/descriptive fact; medium means directionally supported or self-reported; low means indicative only.
limitations:
  - This report uses only public sources and is not legal, tax, accounting, valuation, technical, or investment advice.
  - Company-owned pages may be incomplete, self-selected, or access-restricted; management should verify all material claims.
  - Historical funding and valuation reports do not establish current enterprise value, investor marks, debt, or liquidity preference economics.
  - Absence of public negative evidence should not be read as absence of litigation, incidents, liabilities, customer churn, or regulatory issues.
  - Private diligence must precede any investment, acquisition, lending, partnership, or customer-risk decision.
