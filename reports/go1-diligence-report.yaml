report_metadata:
  report_title: Go1 Public-Source Startup Diligence Report
  target_company: Go1
  website: https://www.go1.com/
  known_aliases:
    - Go1
    - GO1
    - Go1 Pty Ltd
    - Go1.com
    - Go1 Learning
    - Blinkist after acquisition by Go1
  sector: Enterprise learning, corporate training, learning content aggregation, and HR technology
  geography: Australia-founded company with global enterprise learning customers, content providers, and platform integrations
  company_stage: Late-stage private venture-backed startup / historical unicorn
  research_date: 2026-05-17
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Created exactly one public-source YAML report for Go1 under reports/go1-diligence-report.yaml.
    - Prioritized public company/profile pages, reputable technology/business press, investor announcements, acquired-company announcements, legal/trust pages, and third-party integration documentation.
    - Treated company-authored product, scale, trust, and AI claims as self-reported unless corroborated by independent or third-party platform sources.
    - Marked financial statements, revenue, unit economics, customer concentration, cap table, legal, IP, security-control, tax, HR, and insurance records as not_publicly_verifiable when absent from public sources.
  included_jurisdictions:
    - Australia
    - United States
    - European Union / EEA
    - United Kingdom
    - Global enterprise-learning markets where Go1 or its integrations operate
  excluded_topics:
    - No private data-room materials, interviews, bank records, board packs, forecasts, cap tables, contracts, source code, or customer records were used.
    - No paid private-company, litigation, lien, sanction, credit, app-analytics, web-traffic, insurance, patent, or market-share databases were accessed.
    - Direct access to some Go1-controlled pages was constrained by anti-bot or access controls, so those pages should be re-verified manually during diligence.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-05-17
      notes: User requested a standard-depth public-source diligence YAML report for Go1 saved at reports/go1-diligence-report.yaml.
