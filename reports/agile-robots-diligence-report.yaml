executive_summary:
  overall_assessment: "Agile Robots appears eligible as a private unicorn diligence target: public CB Insights and financing evidence supports a $1B-plus robotics company with active products, global operations and named BMW/idealworks traction. However, public evidence is insufficient for investment-grade underwriting because financial quality, revenue predictability, customer concentration, cap table, pricing, product maturity, IP ownership, HR integration and legal/regulatory exposure remain largely private."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A credible thesis requires proving durable industrial automation revenue, healthy margins despite hardware/manufacturing complexity, defensible AI/force-control IP, low customer concentration, successful acquisition integration and adequate runway/cap-table terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Agile Robots as a Munich, Germany Industrials unicorn at $1.00B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Agile Robots announced a US$220M Series C led by SoftBank Vision Fund 2 and prior 2020 financing above US$130M.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: Company pages publicly market active robotics products and AI/software platforms including Diana 7, Yu 5, AgileCore, Agile ONE and mobile robotics.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-009
        - EC-010
        - EC-011
    - founder_claim_id: FC-005
      summary: BMW/idealworks sources provide named customer/partner evidence and public iw.hub deployment counts.
      evidence_claim_ids:
        - EC-013
        - EC-014
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, revenue recognition and unit economics remain opaque.
    - risk_id: R-002
      summary: Revenue predictability, customer concentration and churn are not publicly verifiable.
    - risk_id: R-003
      summary: Financing, runway and cap-table terms may be complex or stale.
    - risk_id: R-004
      summary: Market competition and pricing pressure from entrenched robotics suppliers.
    - risk_id: R-006
      summary: Technical defensibility and IP ownership are not fully verified.
  key_evidence_gaps:
    - Audited financial statements, KPI pack, cash/debt schedule and forecast model
    - Fully diluted cap table, preferences, debt, option plan and status of any 2026 financing
    - Top-customer revenue, churn, backlog, gross margin by account and customer references
    - Pricing waterfall, gross margin by SKU, warranty/support costs and field reliability
    - IP schedules, invention assignments, DLR/acquired-IP licenses, open-source/model-data rights
    - Litigation/regulatory/insurance schedules and product safety/privacy incident history
  recommended_next_steps:
    - Request full finance/cap-table data room before any valuation work.
    - Conduct customer calls, especially BMW/idealworks plus non-BMW accounts, and reconcile installed base to revenue.
    - Run technical/IP diligence on AgileCore, Agile ONE, Diana/Yu, DLR-origin technology and Franka assets.
    - Review product safety, certifications, privacy, export-control and insurance files with counsel.
    - Validate HRIS, attrition, retention and acquisition integration across Franka, idealworks, BÄR and audEERING.
chapters:
