          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited income statements, balance sheets, cash flows, plan-vs-actuals, revenue breakdown, backlog or AR aging were public; only funding/R&D/deployment signals were available.
        verification_status: not_publicly_verifiable
