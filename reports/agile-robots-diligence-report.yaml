risk_register:
  - risk_id: R-001
    risk_title: Financial quality, revenue recognition and unit economics remain opaque
    risk_category: financial
    severity: high
    likelihood: unknown
    description: No audited statements, revenue bridge, backlog, AR aging, gross margin, warranty reserve, cash/debt schedule or forecast model were public despite capital-intensive manufacturing and R&D signals.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-023
      - EC-026
      - EC-018
    mitigation_or_diligence_request: Require audited financials, monthly management accounts, revenue-recognition memo, backlog/AR aging, gross-margin bridge, warranty reserve analysis and cash runway model.
  - risk_id: R-002
    risk_title: Revenue predictability, customer concentration and churn are not publicly verifiable
    risk_category: customer
    severity: high
    likelihood: unknown
    description: BMW/idealworks is a strong public account signal, but top-customer revenue, renewal health, churn, severed relationships and customer satisfaction remain undisclosed.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-014
      - EC-027
    mitigation_or_diligence_request: Request top-15 customer revenue by year, contracts, renewal/churn history, severed relationship list, pipeline conversion and customer references.
  - risk_id: R-003
    risk_title: Financing, runway and cap-table terms may be complex or stale
    risk_category: financing
    severity: high
    likelihood: medium
    description: The company has multiple disclosed investors, a 2021 unicorn valuation, acquisitions and unconfirmed 2026 financing talks; preference stack, debt, dilution and runway are unknown.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-019
      - EC-026
    mitigation_or_diligence_request: Obtain fully diluted cap table, investor rights, liquidation preferences, debt/leases, option pool, acquisition consideration and status of any 2026 financing.
  - risk_id: R-004
    risk_title: Market competition and pricing pressure from entrenched robotics suppliers
    risk_category: market
    severity: high
    likelihood: high
    description: Agile competes in industrial/collaborative robotics against well-established players while pricing is quote-based and not public.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.A
    evidence_claim_ids:
      - EC-020
      - EC-021
      - EC-022
      - EC-023
    mitigation_or_diligence_request: Benchmark win/loss data, realized ASPs, discounting, gross margin by product, support/warranty economics and differentiated technical proof points.
  - risk_id: R-005
    risk_title: Product maturity and roadmap execution risk, especially humanoid/physical-AI claims
    risk_category: product
    severity: medium
    likelihood: high
    description: Diana and Yu pages show active products, while Agile ONE and foundation-model claims require scaled production, safety case and customer acceptance proof.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Request product revenue by SKU, field reliability, incident logs, certification files, roadmap milestones, Agile ONE pilot/customer data and manufacturing readiness reviews.
  - risk_id: R-006
    risk_title: Technical defensibility and IP ownership are not fully verified
    risk_category: technical
    severity: high
    likelihood: medium
    description: DLR origins, proprietary AI/software claims, acquired Franka assets and product names make IP central, but patent/trademark schedules, assignments and open-source exposure were not public.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VI.B
      - VIII.D
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-015
      - EC-030
    mitigation_or_diligence_request: Obtain patent/trademark schedules, invention assignments, DLR/license agreements, open-source SCA, dataset rights, model provenance and acquisition IP schedules.
  - risk_id: R-007
    risk_title: Legal, regulatory, privacy, product safety and AI-governance exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Robots operate around humans and use AI/vision/data; public principles, GTC and privacy policy are not substitutes for safety files, insurance, DPAs or regulatory history.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.C
      - VIII.F
      - VIII.G
      - II.A
    evidence_claim_ids:
      - EC-008
      - EC-024
      - EC-025
      - EC-029
    mitigation_or_diligence_request: Request product conformity declarations, safety/risk assessments, incident logs, insurance certificates, DPAs, data maps, export-control review and regulatory correspondence.
  - risk_id: R-008
    risk_title: Leadership depth, hiring, turnover and integration strain
    risk_category: team
    severity: medium
    likelihood: medium
    description: Headcount appears to have grown rapidly and through acquisitions; public management roster is thin and turnover/compensation/equity plans are private.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.G
      - VI.A
    evidence_claim_ids:
      - EC-016
      - EC-017
      - EC-018
      - EC-019
      - EC-028
    mitigation_or_diligence_request: Request org chart, leadership bench, HRIS by entity/function/location, attrition, compensation, equity plans, works council issues and retention plans for acquired teams.
  - risk_id: R-009
    risk_title: Manufacturing and supply-chain operational dependencies
    risk_category: operational
    severity: medium
    likelihood: high
    description: The company claims in-house manufacturing across Europe, China and India and over 20,000 deployed robotic solutions, but supplier concentration, capacity, quality and logistics dependencies are not public.
    impacted_chapter_ids:
      - III
      - V
      - VI
    impacted_section_ids:
      - III.E
      - V.A
      - VI.A
    evidence_claim_ids:
      - EC-006
      - EC-012
      - EC-018
    mitigation_or_diligence_request: Request supplier spend, dual-source status, BOM constraints, production capacity/utilization, quality yields, service SLAs, export/logistics dependencies and inventory schedules.
  - risk_id: R-010
    risk_title: Acquisition integration and acquired-liability risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Idealworks, BÄR, Franka and audEERING broaden the platform but increase integration, accounting, IP, culture and liability complexity; Franka came from insolvency.
    impacted_chapter_ids:
      - III
      - VII
      - VIII
    impacted_section_ids:
      - III.B
      - VII.G
      - VIII.F
    evidence_claim_ids:
      - EC-006
      - EC-011
      - EC-015
      - EC-028
      - EC-030
    mitigation_or_diligence_request: Review acquisition agreements, earn-outs, indemnities, purchase accounting, integration plans, employee retention, customer assignment consents and inherited-liability schedules.
