report_metadata:
  report_title: Agile Robots Startup Diligence Report
  target_company: Agile Robots
  website: https://www.agile-robots.com/
  known_aliases:
    - Agile Robots SE
    - Agile Robots AG
    - Beijing Agile Robot Technology Co., Ltd
    - 思灵机器人
    - Franka Robotics / Franka Emika (acquired business)
    - idealworks (acquired business)
  sector: Industrial robotics, collaborative robots, AI-powered automation, mobile robotics and physical AI
  geography: Munich, Germany headquarters with public operations/production in Europe, China, India and U.S. hiring signals
  company_stage: Private unicorn / growth-stage industrial robotics and automation company
  research_date: 2026-06-10
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public web sources only, including CB Insights via r.jina.ai, company pages, press releases, customer/partner releases, independent robotics press, market association data and competitor product pages.
    - Treated company pages as evidence of public claims rather than independent validation of performance, revenue, safety or compliance.
    - Focused on verifying unicorn eligibility, financing, products, customers/partners, market context, R&D, team and legal/IP risk.
    - Marked financials, cap table, customer concentration, supplier dependence, litigation, regulatory history, IP schedules and HR data as not_publicly_verifiable when public sources did not disclose them.
  included_jurisdictions:
    - Germany
    - European Union
    - China
    - India
    - United States
    - Public global markets referenced by company materials
  excluded_topics:
    - Private financial statements, cap table, board materials, customer contracts, supplier contracts, HRIS/personnel records, privileged legal opinions, source code, non-public safety files and paid registry/database records.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow-selected CB Insights unicorn candidate record for Agile Robots
      type: workflow_request
      date_received: 2026-06-10
      notes: Provided selected target slug/company/valuation/date joined/location/industry/select investors and source context.
