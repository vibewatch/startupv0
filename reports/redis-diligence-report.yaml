report_metadata:
  report_title: Redis Startup Diligence Research Report
  target_company: Redis
  website: https://redis.io/
  known_aliases:
    - Redis Ltd.
    - Redis Labs
    - Redis Inc.
    - Redis Enterprise
    - Redis Cloud
    - Redis Software
    - Redis Open Source
  sector: Enterprise Tech / real-time data platform / in-memory database
  geography: United States / Mountain View and San Francisco public signals; global cloud operations
  company_stage: Private unicorn / late-stage venture-backed company
  research_date: 2026-05-16
  analyst: GitHub Copilot CLI startup-diligence-research skill
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research using company press, product, legal, trust pages, partner documentation, Linux Foundation announcements, competitor pages, LinkedIn profile extract, SEC/Google Patents search surfaces, and user-provided CB Insights context.
    - Distinguished Redis commercial entity from Redis-compatible technology and Valkey fork.
    - No private records, paywall bypass, or confidential systems were used; inaccessible items are marked as gaps.
  included_jurisdictions:
    - United States
    - Israel-related founding/history signals
    - Global cloud marketplace context
    - Public web only
  excluded_topics:
    - Non-public financial statements and cap table
    - Full PACER docket documents
    - Official trademark/patent office records beyond public web extracts
    - Private customer calls and data-room materials
  user_provided_materials:
    - material_id: UPM-001
      title: Parsed CB Insights Redis unicorn entry
      type: task_context
      date_received: 2026-05-16
      notes: Included valuation, date joined, location, industry, investors, and aliases.
