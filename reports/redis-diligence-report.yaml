executive_summary:
  overall_assessment: Eligible for a public-source private-unicorn report. Redis appears active and privately financed, with strong public evidence of $100M+ rounds and a more than $2B 2021 valuation, but current valuation, financial quality, cap table, and post-2024 license/Valkey impact are not publicly verifiable.
  investment_or_diligence_thesis: Redis is a scaled enterprise infrastructure company with broad adoption and hyperscaler distribution; diligence should test whether enterprise features, managed operations, and AI/vector expansion defend revenue against Valkey and cloud-native Redis-compatible substitutes.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: 2021 Series G at more than $2B valuation.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: 2020 Series F at more than $1B valuation.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: 2024 license shift to RSALv2/SSPLv1.
      evidence_claim_ids:
        - EC-014
    - founder_claim_id: FC-008
      summary: CEO transition to Rowan Trollope effective 2023.
      evidence_claim_ids:
        - EC-019
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and stale valuation.
    - risk_id: R-002
      summary: Licensing backlash and Valkey fragmentation.
    - risk_id: R-003
      summary: Hyperscaler coopetition and channel conflict.
  key_evidence_gaps:
    - Audited financials, ARR bridge, gross margin, burn, cash, debt, backlog, and AR aging.
    - Current cap table, liquidation preferences, option pool, secondary-sale terms, and latest valuation support.
    - Top-customer revenue concentration, retention/churn after the license change, and customer references.
    - Cloud marketplace contracts, revenue share, cloud COGS, and supplier concentration.
    - Full legal/IP/compliance schedules, including license exceptions, litigation, insurance, and security reports.
  recommended_next_steps:
    - Run QoE financial diligence on current ARR, retention, margin, and runway.
    - Conduct customer/channel diligence with post-2024 renewals and cloud marketplace cohorts.
    - Review Redis licensing, Valkey migration risk, and enterprise-feature defensibility.
    - Review hyperscaler agreements and cloud COGS.
    - Obtain counsel certification for private status, litigation, IP, compliance, contracts, and insurance.
