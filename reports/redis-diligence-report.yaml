risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and stale valuation
    risk_category: financial
    severity: high
    likelihood: high
    description: Public valuation evidence is stale and audited financials, ARR quality, cash, debt, and burn are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited financials, ARR bridge, cash/burn, 409A, and latest financing evidence.
  - risk_id: R-002
    risk_title: Open-source licensing backlash and Valkey fragmentation
    risk_category: technical
    severity: high
    likelihood: high
    description: Redis moved future releases to source-available licenses and Valkey launched with major vendor support.
    impacted_chapter_ids:
      - II
      - IV
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
      - VIII.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review post-2024 churn, contributor metrics, customer objections, and Valkey displacement.
  - risk_id: R-003
    risk_title: Hyperscaler coopetition
    risk_category: market
    severity: high
    likelihood: medium
    description: AWS, Google Cloud, and Microsoft are channels/partners while also operating or marketing Redis/Valkey-compatible substitutes.
    impacted_chapter_ids:
      - III
      - IV
      - V
    impacted_section_ids:
      - III.B
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Review cloud agreements, marketplace economics, co-sell pipeline, and conflict history.
  - risk_id: R-004
    risk_title: Customer concentration and retention quality unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public logos and stale aggregate customer metrics do not reveal ARR concentration, renewal risk, or post-license-change churn.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request top-customer schedule, NRR/GRR cohorts, churn reasons, and reference calls.
  - risk_id: R-005
    risk_title: Commodity compatibility and product differentiation pressure
    risk_category: product
    severity: high
    likelihood: medium
    description: Valkey, hyperscaler services, Dragonfly, and other platforms can compete on compatibility, performance, procurement, and price.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Benchmark real workloads and validate enterprise feature attach rates and switching costs.
  - risk_id: R-006
    risk_title: Cloud infrastructure and marketplace dependency
    risk_category: operational
    severity: medium
    likelihood: high
    description: Redis Cloud and distribution appear materially dependent on major cloud providers, but cloud COGS and supplier concentration are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.E
      - V.A
      - V.C
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request cloud spend, reserved commitments, SLA history, marketplace fees, and vendor terms.
  - risk_id: R-007
    risk_title: Legal/IP and license-procurement exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Trademark, license, patent, litigation, and contract schedules are central but incomplete publicly.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.F
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request counsel certification, IP schedule, open-source audit, litigation, and material contracts.
  - risk_id: R-008
    risk_title: Leadership and personnel opacity
    risk_category: team
    severity: medium
    likelihood: medium
    description: A CEO transition is public and LinkedIn headcount is directional, but org, attrition, comp, and retention are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request org chart, executive terms, HRIS headcount, attrition, compensation, and retention plan.
  - risk_id: R-009
