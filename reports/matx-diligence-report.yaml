risk_register:
  - risk_id: R-001
    risk_title: Tapeout and manufacturing execution risk
    risk_category: technical
    severity: critical
    likelihood: high
    description: First high-end AI chip tapeout, validation, yield, packaging and ramp are not publicly proven.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Review tapeout plan, foundry/OSAT commitments, yield model and validation milestones.
  - risk_id: R-002
    risk_title: Foundry, IP, HBM and supply-chain dependency
    risk_category: operational
    severity: high
    likelihood: medium
    description: MatX depends on advanced manufacturing, HBM, IP blocks and rack/system partners with no public contracts.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.F
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Review supplier contracts, HBM allocations, IP licenses and dual-source options.
  - risk_id: R-003
