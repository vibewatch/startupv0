report_metadata:
  report_title: MatX Startup Diligence Report
  target_company: MatX
  website: https://matx.com/
  known_aliases:
    - MatX Inc.
    - MatX One
  sector: AI chip / high-throughput LLM inference and training hardware
  geography: United States; Mountain View, California
  company_stage: Private unicorn / growth-stage semiconductor startup
  research_date: 2026-06-09
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company pages, SEC Form D filings, CB Insights, competitor pages and U.S. export-control sources.
    - Treated company performance claims as claims made, not independent proof.
    - Marked private financials, customer, supplier, IP, HR and legal records as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - Delaware
    - California
    - U.S. export-control regime
  excluded_topics:
    - Private financials, cap table, customer calls, supplier contracts, engineering data room, non-public HR/legal/IP records.
  user_provided_materials:
    - material_id: UPM-001
      title: User task with MatX target and CB Insights row
      type: workflow_request
      date_received: 2026-06-09
      notes: No pitch deck, financial model, data room or founder responses were provided.
