risk_register:
  - risk_id: "R-001"
    risk_title: "Financial quality and current valuation are opaque"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Public sources do not disclose ARR, revenue, margin, cash, debt, burn, runway, current valuation, or updated financing terms."
    impacted_chapter_ids: ["I", "V"]
    impacted_section_ids: ["I.A", "I.B", "I.C", "V.E"]
    evidence_claim_ids: ["EC-001", "EC-018", "EC-021"]
    mitigation_or_diligence_request: "Request audited financials, management accounts, ARR bridge, gross margin by module, cash/debt/runway, and current valuation marks."
  - risk_id: "R-002"
    risk_title: "Customer concentration and retention are not public"
    risk_category: "customer"
    severity: "high"
    likelihood: "medium"
    description: "Bringg has prominent logos and scale claims, but revenue contribution, active status, churn, NRR, and concentration are private."
    impacted_chapter_ids: ["III", "V"]
    impacted_section_ids: ["III.A", "III.C", "V.B"]
    evidence_claim_ids: ["EC-003", "EC-005", "EC-008", "EC-021"]
    mitigation_or_diligence_request: "Request top-customer ARR, delivery volume, retention, NRR, gross margin, renewal dates, and direct customer references."
  - risk_id: "R-003"
    risk_title: "Competitive and pricing pressure"
    risk_category: "market"
    severity: "medium"
    likelihood: "high"
    description: "Competitor pages show overlapping features in routing, dispatch, visibility, carrier network, AI automation, and supply-chain decision intelligence."
    impacted_chapter_ids: ["IV", "V"]
    impacted_section_ids: ["IV.A", "V.A", "V.C"]
    evidence_claim_ids: ["EC-010", "EC-017", "EC-020"]
    mitigation_or_diligence_request: "Request win/loss, competitive discounting, replacement proof, renewal reasons, and product differentiation analysis."
