    risk_category: "operational"
    severity: "medium"
    likelihood: "medium"
    description: "Google Cloud, DoiT, carrier networks, SAP, Salesforce/Zenkraft, and subprocessors are operationally important and could affect uptime, compliance, or margin."
    impacted_chapter_ids: ["III", "VI", "VIII"]
    impacted_section_ids: ["III.B", "III.E", "VI.A", "VIII.F"]
    evidence_claim_ids: ["EC-006", "EC-009", "EC-010", "EC-011"]
    mitigation_or_diligence_request: "Request vendor contracts, SLAs, incident history, cloud spend, DR plan, subprocessor assessments, and carrier performance data."
  - risk_id: "R-006"
    risk_title: "Late-stage financing and capitalization uncertainty"
    risk_category: "financing"
    severity: "medium"
    likelihood: "medium"
    description: "The $1 billion 2021 valuation may not reflect current economics, and post-2021 security terms or secondary trades are not public."
