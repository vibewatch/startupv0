    risk_title: "Product complexity and integration execution"
    risk_category: "product"
    severity: "medium"
    likelihood: "medium"
    description: "Bringg spans multiple modules, SAP/Salesforce/Zenkraft paths, carrier integrations, and enterprise workflows that can create implementation and support burden."
