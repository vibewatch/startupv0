report_metadata:
  report_title: Alloy Startup Diligence Report
  target_company: Alloy
  website: https://www.alloy.com/
  known_aliases:
    - Alloy
    - Alloy Inc.
  sector: Identity decisioning, fraud prevention, KYC/KYB and AML infrastructure for financial services
  geography: United States / global financial services customers
  company_stage: Private unicorn / growth-stage fintech infrastructure company
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Built the target list from current public unicorn-list sources and excluded reports already present in the repository.
    - Prioritized public unicorn databases, company-owned pages, public app listings, customer pages, partner pages and regulatory disclosures where available.
    - Treated company-published claims as evidence that the statement exists, not independent proof of revenue quality, retention, margins or contract performance.
    - No private data room, management interview, customer call, legal docket search artifact, security report or cap table was available.
  included_jurisdictions:
    - United States
    - Global financial services markets referenced by company materials
  excluded_topics:
    - Private financial statements, contracts, cap table, customer calls, board materials, SOC/security reports, legal dockets and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-24
      notes: No pitch deck, financial model, data room or founder responses were provided.
