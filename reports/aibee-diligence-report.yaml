risk_register:
  - risk_id: R-001
    risk_title: Financial statements and revenue quality are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources disclose funding and valuation but not audited financials, ARR, revenue
      recognition, gross margin, backlog, AR aging, cash, burn, or debt.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.E
    evidence_claim_ids:
      - EC-004
      - EC-021
    mitigation_or_diligence_request:
      Obtain audited statements, management accounts, revenue by customer/product/channel/geography, margin,
      backlog, AR aging, debt, cash and burn data.
  - risk_id: R-002
    risk_title: Stale unicorn valuation and opaque recent financing
    risk_category: financing
    severity: high
    likelihood: medium
    description: The public unicorn valuation anchor is April 2021 at $1.2B; 2022 Series C valuation and amount
      are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-014
      - EC-020
    mitigation_or_diligence_request:
      Request latest financing terms, current valuation support, secondary/down-round history, investor
      consent rights, and cash runway.
  - risk_id: R-003
    risk_title: Cap-table and preference stack complexity unknown
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: Public investor names do not reveal ownership percentages, liquidation preferences,
      anti-dilution, warrants, notes, debt, or option pool.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - VII.E
    evidence_claim_ids:
      - EC-003
      - EC-020
      - EC-025
    mitigation_or_diligence_request:
