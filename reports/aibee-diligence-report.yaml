executive_summary:
  overall_assessment: "Eligible for a public-source diligence report: accessible CB Insights evidence lists
    Aibee as Series C | Alive, in the Unicorns collection, and valued at $1.2B in April 2021. The company
    shows credible public product/deployment signals, but financial quality, customer revenue, contracts,
    privacy compliance, IP ownership, and team/HR data are not publicly verifiable."
  investment_or_diligence_thesis:
    Aibee is a late-stage private China enterprise AI company focused on offline physical-space digitalization
    across malls, stores, parking, airports, tourism, banks, and smart spaces. The diligence case depends on
    converting public deployment breadth into verified recurring, high-margin revenue and proving compliant,
    defensible AI systems in regulated physical environments.
  strongest_verified_claims:
    - founder_claim_id: FC-008
      summary: "CB Insights valuation anchor: $1.2B in April 2021 and Series C | Alive private-stage status."
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-020
    - founder_claim_id: FC-003
      summary: "Funding scale: CB Insights reports $175.31M total raised and Aibee reports cumulative financing
        above $170M."
      evidence_claim_ids:
        - EC-002
        - EC-010
    - founder_claim_id: FC-001
      summary: "Company identity and product category: founded in 2017 and publicly positioned as an AI
        overall-solution provider."
      evidence_claim_ids:
        - EC-005
        - EC-007
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, revenue quality, cash runway, and unit economics are not public.
    - risk_id: R-007
      summary: Biometric, video, airport, bank, and physical-site deployments create privacy, cybersecurity, safety,
        and regulated-sector exposure.
    - risk_id: R-002
      summary: The $1.2B valuation is a stale April 2021 anchor; 2022 Series C amount/valuation and current
        valuation are undisclosed.
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue by customer/product/channel, gross margin, cash, burn, and
      debt.
    - Fully diluted cap table, investor rights, liquidation preferences, options/warrants/notes, and current
      valuation support.
    - Active customer roster, contract values, revenue concentration, churn/retention, SLAs, and customer
      references.
    - Privacy/cybersecurity compliance records, DPIAs, regulator correspondence, incident history, and
      insurance coverage for biometric/airport/bank use cases.
    - IP schedule, patent/trademark filings, source-code ownership, open-source license scan, and model
      benchmark evidence.
  recommended_next_steps:
    - Proceed only as a data-room diligence target, not a desk-research-cleared investment; require
      management-certified financial, customer, legal, privacy, and IP packages.
    - Confirm private-company eligibility through Chinese corporate registry/counsel, shareholder register,
      and investor confirmation.
    - Run priority customer calls for Xiaomi, major mall/airport/scenic/bank deployments and reconcile
      deployment counts to billed revenue.
    - Commission privacy/cybersecurity and biometric compliance review before relying on airport, bank, or
      face-recognition growth claims.
    - Refresh all official site claims because many source pages appear stale relative to 2026 research date.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Aibee as a Series C private unicorn candidate with $175.31M total
      raised and a $1.2B April 2021 valuation, but audited financial statements, revenue quality, cash runway,
      debt, tax, and cap-table terms are not publicly verifiable.
    founder_claim_ids:
      - FC-003
      - FC-008
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-010
      - EC-014
      - EC-020
      - EC-021
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-005
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No public audited statements, management accounts, product/channel/geography revenue splits, backlog,
          or AR aging were found; public sources only support funding and deployment narratives.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: CB Insights and Aibee disclose funding scale but not operating statements or revenue quality.
            evidence_claim_ids:
              - EC-004
              - EC-021
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Deployment counts could mask pilots, low-margin services, or lumpy hardware-heavy revenue.
        evidence_gaps:
          - Income statements, balance sheets, cash flows, footnotes, revenue by product/channel/geography,
            backlog, and AR aging require company records.
        follow_up_questions:
          - Provide audited annual financial statements, quarterly management accounts, revenue waterfalls,
            backlog, AR aging, and gross-margin by product/vertical.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-021
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources identify growth drivers in retail, airports, tourism, parking, and strategic partners,
          but forward projections, scenario assumptions, capex, working capital, and financing assumptions are
          private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Aibee public sources support a broad vertical-demand thesis, but do not disclose forecast reliability
              or assumptions.
            evidence_claim_ids:
              - EC-008
              - EC-009
              - EC-014
              - EC-015
              - EC-021
            risk_ids:
              - R-001
              - R-004
              - R-005
        hidden_risks:
          - Vertical-specific deployments may require custom implementation and support, reducing
            predictability and margin.
        evidence_gaps:
          - Three-year quarterly forecasts, scenario sensitivities, capex, depreciation, working capital, and
            external financing assumptions are not public.
        follow_up_questions:
          - Provide board-approved plan, forecast model, assumptions by vertical, pipeline coverage,
            bookings-to-revenue conversion, and sensitivity cases.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-014
          - EC-015
          - EC-021
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Investor names and financing rounds are partly public, but shares outstanding, stockholder
          percentages, options/warrants/notes, debt instruments, and off-balance-sheet liabilities are not
          public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights reports 24 investors and public rows for China Merchants Capital, Xiaomi, China
              Chengtong, China Resources, and HongShan.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-003
          - finding_id: I.C-F2
            finding: Eligibility as a private unicorn is supported by Series C | Alive and unicorn collection evidence.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-002
        hidden_risks:
          - Gated or undisclosed deal terms may create liquidation preference, veto, or dilution complexity.
        evidence_gaps:
          - Current cap table, option pool, warrants, convertible notes, debt lines, and off-balance-sheet
            obligations were not public.
        follow_up_questions:
          - Provide fully diluted cap table, current share register, option/warrant/note schedule, debt
            agreements, and investor rights agreements.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-020
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history supports the funding and valuation headline, but tax positions, accounting
          policies, revenue recognition, and current basis for each round require private records.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: CB Insights reports $175.31M raised over 7 rounds and a $1.2B April 2021 valuation; Aibee claims
              cumulative financing above $170M.
            evidence_claim_ids:
              - EC-002
              - EC-010
            risk_ids:
              - R-002
          - finding_id: I.D-F2
            finding: Pandaily corroborates a Xiaomi-led strategic investment and 165M yuan angel financing.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-002
        hidden_risks:
          - The $1.2B valuation is stale relative to current markets and lacks visible current revenue support.
        evidence_gaps:
          - Tax positions, revenue recognition policy, financing basis, current liquidation stack, and cash
            runway were not public.
        follow_up_questions:
          - Provide tax filings/positions, accounting policy memo, revenue-recognition analysis, current cash
            balance, runway, and round-by-round financing documents.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-010
          - EC-014
