diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and quarterly management accounts
    why_it_matters: Determines revenue quality, profitability, cash burn, and runway.
    suggested_source_or_request: Company CFO/accountant; audited statements, trial balance, management packs.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table and investor rights
    why_it_matters: Assesses dilution, control, liquidation preferences, and financing risk.
    suggested_source_or_request: Company counsel/investor relations; cap table, charter, investor rights agreements.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.D
    missing_information: Current valuation support and latest financing terms
    why_it_matters: The public $1.2B valuation is from April 2021 and may be stale.
    suggested_source_or_request: Latest board materials, 409A/internal valuation, financing documents.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product-level pricing, margins, and performance benchmarks
    why_it_matters: Determines whether broad solution scope translates into scalable, defensible economics.
    suggested_source_or_request: Price book, product P&Ls, benchmark reports, SLA dashboards.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.A
    missing_information: Top-15 customer list and active deployment status
    why_it_matters: Public logos and counts do not establish revenue concentration or retention.
    suggested_source_or_request: Customer revenue schedule, active deployment list, customer references.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Supplier, hardware, cloud, and implementation dependency schedule
    why_it_matters: Physical AI deployments can be constrained by hardware, integration, and support dependencies.
    suggested_source_or_request: Supplier contracts, BOM, cloud invoices, implementation partner agreements.
    priority: high
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Market share, win/loss, and competitor pricing
    why_it_matters: Validates differentiation against biometric and AI-integration competitors.
    suggested_source_or_request: Sales win/loss database, market studies, competitor battlecards.
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity and funnel metrics
    why_it_matters: Determines whether customer growth is repeatable and capital efficient.
    suggested_source_or_request: CRM export, rep quota/attainment, pipeline conversion, sales-cycle data.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D org chart, model benchmarks, and roadmap governance
    why_it_matters: Validates technical depth, delivery capacity, and product execution risk.
    suggested_source_or_request: CTO/R&D leadership, model-evaluation pack, roadmap, architecture docs.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Patent, trademark, source-code, data-license, and open-source schedules
    why_it_matters: Determines IP ownership, defensibility, and infringement/license risk.
    suggested_source_or_request: Company counsel, IP counsel, code scan, invention assignment records.
    priority: high
  - gap_id: G-011
    chapter_id: VII
    section_id: VII.G
    missing_information: Two-year attrition, compensation, and equity plan data
    why_it_matters: Assesses retention and key-person risk.
    suggested_source_or_request: HRIS export, compensation plan, option ledger, employee survey.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Privacy/cybersecurity/regulatory compliance pack
    why_it_matters: Biometric, airport, bank, and video analytics products create high compliance exposure.
    suggested_source_or_request: DPIAs, regulator correspondence, security audits, incident logs, privacy policies.
    priority: high
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Formal litigation, arbitration, and threatened-claims schedule
    why_it_matters: Public-source absence does not clear legal exposure.
    suggested_source_or_request: Counsel letters, docket searches, claims/disputes log.
    priority: high
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer, partner, supplier, DPA, SLA, and indemnity contracts
    why_it_matters: Determines revenue durability, obligations, data rights, termination rights, and liability.
    suggested_source_or_request: Legal data room; top customer/partner/supplier contracts and DPA/SLA schedules.
    priority: high
  - gap_id: G-015
    chapter_id: V
    section_id: V.A
    missing_information: Current operating status of older public deployment claims
    why_it_matters: Official pages are stale, and deployments may have changed materially.
    suggested_source_or_request: Management-certified current deployment roster and latest KPI/customer reference pack.
    priority: medium
