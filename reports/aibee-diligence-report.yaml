        summary: Insurance coverage and material exposure schedules were not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.E-F1
            finding: Public sources do not disclose insurance coverage or claims history.
            evidence_claim_ids:
              - EC-026
              - EC-028
            risk_ids:
              - R-007
              - R-011
        hidden_risks:
          - Biometric, airport, cyber, product-liability, and professional-liability exposures may require
            specialized coverage.
        evidence_gaps:
          - Cyber, E&O, product liability, general liability, D&O, workers compensation, claim history, and
            coverage exclusions are private.
        follow_up_questions:
          - Provide insurance policies, coverage limits, claims history, exclusions, broker summary, and
            incident-response obligations.
        table_ids:
          - T-019
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-026
          - EC-028
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Public sources identify customers and partners but not material contract terms, exclusivity,
          data-processing obligations, termination rights, warranties, indemnities, SLAs, or revenue
          commitments.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.F-F1
            finding: Strategic relationships are public, but contract terms are not.
            evidence_claim_ids:
              - EC-013
              - EC-014
              - EC-021
              - EC-022
            risk_ids:
              - R-004
              - R-011
        hidden_risks:
          - Unseen customer/partner contracts may include onerous service levels, data-use restrictions,
            indemnities, or nonstandard termination rights.
        evidence_gaps:
          - Material customer, partner, supplier, data-processing, licensing, and employment contracts are
            private.
        follow_up_questions:
          - Provide material contract list, top customer/partner/supplier agreements, DPAs, SLAs, indemnities,
            warranties, and termination/exclusivity terms.
        table_ids:
          - T-019
        figure_ids:
          - F-010
          - F-011
        evidence_claim_ids:
          - EC-013
          - EC-014
          - EC-021
          - EC-022
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No public regulatory agency action was identified in accessed sources, but biometric, airport, bank,
          and video-analytics use cases create elevated privacy, cybersecurity, safety, and regulated-sector
          risk.
        verification_status: unverified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: Regulatory risk is evident from product use cases, but agency correspondence/actions are not public.
            evidence_claim_ids:
              - EC-026
              - EC-028
            risk_ids:
              - R-007
        hidden_risks:
          - Privacy/security noncompliance could affect core products and regulated-sector customers.
        evidence_gaps:
          - Regulatory correspondence, approvals, audits, DPIAs, cybersecurity certifications, data-processing
            maps, and incident history are private.
        follow_up_questions:
          - Provide regulatory correspondence, DPIAs, security certifications, privacy policies, data maps,
            incident logs, and agency inspection/audit records.
        table_ids:
          - T-019
        figure_ids:
          - F-010
          - F-011
        evidence_claim_ids:
          - EC-026
          - EC-028
