      - EC-015
      - EC-029
      - EC-031
    mitigation_or_diligence_request:
      Request top-customer revenue schedule, active deployment list, renewal/churn cohorts, reference calls,
      and contract values.
  - risk_id: R-005
    risk_title: Pricing and unit economics undisclosed
    risk_category: financial
    severity: medium
    likelihood: high
