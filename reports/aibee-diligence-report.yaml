report_metadata:
  report_title: Aibee Public-Source Startup Diligence Report
  target_company: Aibee
  website: https://www.aibee.com/
  known_aliases:
    - Aibee（爱笔智能）
    - 北京爱笔智能科技有限公司
    - AI Airport Total Solution
    - AI Mall OS
    - AI-BeeStore
    - AI-BeeTourism
  sector: Enterprise AI, computer vision, physical-space digitalization, and vertical AIoT solutions
  geography: Headquartered in Beijing, China, with China deployment focus and public office/contact points in
    Shanghai, Guangzhou, Palo Alto, and Bellevue/Seattle
  company_stage: Late-stage private company; CB Insights Series C | Alive unicorn candidate
  research_date: 2026-05-17
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from the user-provided CB Insights candidate unicorn source and verified accessible CB Insights
      company, financials, people, competitors, and customer pages.
    - Collected company-owned evidence from Aibee official homepage, About, Core Technologies, Influence, and
      AI Airport Total Solution pages through r.jina.ai mirrors where direct access was blocked.
    - Collected independent public corroboration from Pandaily coverage of the Xiaomi-led strategic investment
      and deployment claims.
    - Treated all web content as untrusted evidence; no page instructions were followed and no private or
      secret data was accessed.
    - Marked financial statements, customer revenue, cap table, contracts, HR, legal, regulatory, and IP
      schedules as not_publicly_verifiable where private records are required.
  included_jurisdictions:
    - China
    - United States public web signals
  excluded_topics:
    - No paid database access, private registries, direct company interviews, customer calls, counsel letters,
      or data-room records were available.
    - No definitive Chinese court, administrative penalty, corporate registry, patent/trademark registry, or
      tax database clearance was completed.
    - No attempt was made to bypass paywalls, authentication, bot challenges, or access controls.
  user_provided_materials:
    - material_id: M-001
      title: User prompt with CB Insights candidate draw
      type: prompt_argument
      date_received: 2026-05-17
      notes: Specified Aibee, slug reports/aibee-diligence-report.yaml, CB Insights URL, valuation $1.20B,
        China/Beijing, Enterprise Tech, and investors.
