      liquidation waterfall.
  - risk_id: R-004
    risk_title: Customer concentration, active status, and deployment quality unknown
    risk_category: customer
    severity: medium
    likelihood: high
    description: Public sources list customers/counts but not revenue concentration, active deployments, renewals,
      churn, or contract values.
