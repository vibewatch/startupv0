diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, KPI pack, cash/debt, revenue-recognition policy and tax positions
    why_it_matters: Without finance records, valuation and growth quality cannot be underwritten.
    suggested_source_or_request: Company CFO / auditors
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferences, option pool, warrants, debt and investor rights
    why_it_matters: Liquidation preference, control and dilution can dominate economics.
    suggested_source_or_request: Company counsel / finance
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue, churn, NRR, renewal schedule and contract terms
    why_it_matters: Public traction does not prove revenue durability or concentration.
    suggested_source_or_request: Company revenue ops / customer contracts
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, sales cycle and pipeline conversion
    why_it_matters: Growth efficiency and forecast quality are not public.
    suggested_source_or_request: CRM and finance exports
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, technical debt, incident history, security reports and development cost
    why_it_matters: Product risk and scalability require technical diligence.
    suggested_source_or_request: CTO / security / product leadership
    priority: medium
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Full litigation, regulatory, privacy, IP, insurance and material-contract review
    why_it_matters: Public web research is not a counsel-grade legal review.
    suggested_source_or_request: External counsel and company legal team
    priority: high
