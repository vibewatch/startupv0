risk_register:
  - risk_id: R-001
    risk_title: ROI and payback claims require cohort proof
    risk_category: customer
    severity: high
    likelihood: medium
    description: Company-published six-month payback claims are not enough to verify realized savings, renewal health or reference quality.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-001
      - EC-005
      - EC-009
    mitigation_or_diligence_request: Request customer cohorts, avoided-loss calculations, renewal data and independent reference calls.
  - risk_id: R-002
    risk_title: Deployment and hardware scaling complexity
    risk_category: operational
    severity: high
    likelihood: medium
    description: Machine-health products depend on sensors, plant integrations, uptime, field support and customer change management.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
    evidence_claim_ids:
      - EC-001
      - EC-005
      - EC-009
    mitigation_or_diligence_request: Request deployment cycle-time, hardware BOM, supplier concentration, support SLAs and gross-margin bridge.
  - risk_id: R-003
