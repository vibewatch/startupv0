report_metadata:
  report_title: Epic Games Public-Source Startup Diligence Report
  target_company: Epic Games
  website: https://www.epicgames.com/
  known_aliases: [Epic Games Inc., Fortnite, Unreal Engine, Epic Games Store, Epic Online Services, Fab]
  sector: Interactive entertainment, games distribution, real-time 3D engine technology, and creator platforms
  geography: United States headquartered; global consumer, developer, and partner footprint
  company_stage: Late-stage private unicorn
  research_date: 2026-05-14
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Reviewed company-owned Epic, Unreal Engine, Epic Games Store, Fab, and developer pages.
    - Used CB Insights and public unicorn-list data for private-company, funding, investor, and competitor context.
    - Used Disney, Epic/Sony/KIRKBI, FTC, and public litigation sources for strategic, regulatory, and legal evidence.
    - Marked private financials, cap table, contracts, customer concentration, supplier spend, and HRIS data as not publicly verifiable.
  included_jurisdictions: [United States, European Union, United Kingdom, global digital distribution markets]
  excluded_topics:
    - No management interviews, customer calls, paid database exports, counsel letters, or private data-room documents were available.
    - Some news, company, and court pages returned 403, 404, CAPTCHA, JavaScript challenge, or regional-access errors.
  user_provided_materials:
    - material_id: M-001
      title: Random unicorn diligence request
      type: prompt
      date_received: 2026-05-14
      notes: User asked for one uncovered private unicorn selected at random from public unicorn lists.

founder_claims:
  - founder_claim_id: FC-001
    claim_text: Epic Games was founded in 1991 by CEO Tim Sweeney and is headquartered in Cary, North Carolina.
    claim_source: Epic about page; CB Insights
    claim_date: null
    mapped_chapter_ids: [VII, VIII]
    mapped_section_ids: [VII.A, VIII.D]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001, EC-002]
    contradiction_summary: null
    diligence_follow_up:
      - Provide officer/director certificates and current entity org chart.
  - founder_claim_id: FC-002
    claim_text: Epic operates an end-to-end ecosystem through Fortnite, Unreal Engine, Epic Games Store, and Epic Online Services.
    claim_source: Epic about page and public product pages
    claim_date: null
    mapped_chapter_ids: [II, III, V, VI]
    mapped_section_ids: [II.A, III.A, V.A, VI.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001, EC-007, EC-008, EC-009]
    contradiction_summary: null
    diligence_follow_up:
      - Provide product-level revenue, gross margin, active-user definitions, and cross-product overlap.
  - founder_claim_id: FC-003
    claim_text: Epic remains a private, founder-controlled company despite strategic minority investments from Sony, KIRKBI, and Disney.
    claim_source: 2022 Epic/Sony/KIRKBI announcement; 2024 Disney announcement; CB Insights
    claim_date: null
    mapped_chapter_ids: [I, VII]
    mapped_section_ids: [I.C, VII.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-002, EC-003, EC-004, EC-005]
    contradiction_summary: Founder control was disclosed in 2022, but current cap table, Disney closing status, and investor rights are not public.
    diligence_follow_up:
      - Provide current cap table, voting agreements, investor rights agreements, and post-Disney closing documentation.
  - founder_claim_id: FC-004
    claim_text: Epic Games Store offers developers/publishers an 88 percent revenue share and self-publishing access to a large audience.
    claim_source: Epic Games Store self-publishing announcement
    claim_date: 2023-03-09
    mapped_chapter_ids: [II, IV, V]
    mapped_section_ids: [II.A, IV.A, V.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-009, EC-010]
    contradiction_summary: null
    diligence_follow_up:
      - Provide store GMV, contribution margin, subsidy commitments, exclusivity guarantees, and publisher cohort retention.
  - founder_claim_id: FC-005
    claim_text: Unreal Engine monetizes through royalties and seat licenses above disclosed revenue thresholds.
    claim_source: Unreal Engine license and EULA pages
    claim_date: null
    mapped_chapter_ids: [I, II, VI, VIII]
    mapped_section_ids: [I.A, II.A, VI.A, VIII.D]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-008]
    contradiction_summary: null
    diligence_follow_up:
      - Provide Unreal bookings, seat ARR, royalty audit recoveries, churn, and customer-segment gross margin.
  - founder_claim_id: FC-006
    claim_text: Epic can safely operate child-facing consumer monetization at massive scale.
    claim_source: Implied by Fortnite and Epic Games Store consumer business model
    claim_date: null
    mapped_chapter_ids: [III, V, VIII]
    mapped_section_ids: [III.A, V.A, VIII.G]
    verification_status: contradicted
    confidence: high
    evidence_claim_ids: [EC-013]
    contradiction_summary: FTC settlements totaling USD 520 million over COPPA/privacy and billing/dark-pattern allegations contradict an unqualified safety claim.
    diligence_follow_up:
      - Provide FTC compliance reports, independent audits, refund metrics, age-gating tests, and product-design review controls.

executive_summary:
  overall_assessment: Epic Games is a scaled private entertainment and platform company with unusually strong public evidence for reach, technology relevance, and strategic backing. Public sources verify the ecosystem narrative, but investment diligence remains constrained by absent private financials, cap-table details, customer concentration, supplier spend, contracts, and current legal reserves.
  investment_or_diligence_thesis: >-
    The diligence case is a high-upside platform thesis: Fortnite supplies a
    massive consumer graph, Unreal Engine supplies developer and enterprise
    technology leverage, and Epic Games Store/Fab/Online Services extend
    distribution and creator monetization. The underwriting question is whether
    those assets generate durable, profitable cash flow after subsidies, legal
    spend, creator payouts, and platform-policy friction.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Founding, CEO/founder identity, headquarters, and core product ecosystem are verified by company and market-database sources.
      evidence_claim_ids: [EC-001, EC-002]
    - founder_claim_id: FC-002
      summary: Epic publicly reports over 800 million accounts and over 6 billion friend connections across major games and the Epic Games Store.
      evidence_claim_ids: [EC-001]
    - founder_claim_id: FC-005
      summary: Unreal Engine royalty and seat-license thresholds are directly disclosed in Epic licensing materials.
      evidence_claim_ids: [EC-008]
  biggest_risks:
    - risk_id: R-001
      summary: Private-company financial opacity prevents verification of profitability, cash burn, revenue mix, and quality of earnings.
    - risk_id: R-003
      summary: FTC settlements and child-facing products create ongoing privacy, billing, and product-design compliance risk.
    - risk_id: R-004
      summary: App-store litigation and mobile distribution dependence can affect Fortnite access, take rates, and legal expense.
  key_evidence_gaps:
    - Audited financial statements, management accounts, cash position, runway, debt, and off-balance-sheet commitments.
    - Current cap table, liquidation preferences, investor rights, option pool, and strategic-investor governance terms.
    - Revenue, gross margin, retention, CAC/LTV, and product-line contribution margin.
    - Top customer, partner, supplier, platform, cloud, and payment-processor concentration.
    - FTC consent-order controls, privacy audits, litigation reserves, and material legal contingencies.
  recommended_next_steps:
    - Run private financial diligence on revenue quality, cash burn, subsidies, and product-line contribution margin.
    - Review cap table, strategic-investor rights, voting control, debt, and exit-readiness restrictions.
    - Conduct legal diligence on FTC orders, Apple/Google litigation, child-safety controls, IP ownership, and developer/license terms.
    - Interview developers, publishers, creators, brand partners, and key platform or infrastructure suppliers.

chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources confirm large private financings and strategic investors, but audited financials, cash burn, profitability, debt, and cap-table terms are not public.
    founder_claim_ids: [FC-003, FC-005]
    evidence_claim_ids: [EC-002, EC-003, EC-004, EC-005, EC-008]
    risk_ids: [R-001, R-006, R-007]
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids: [I.A.1, I.A.4, I.A.6]
        summary: Epic is private; public evidence mostly consists of financing, user-scale, and pricing signals rather than audited financial statements.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: CB Insights shows total raised of USD 8.149 billion, but revenue fields remain unavailable.
            evidence_claim_ids: [EC-002]
            risk_ids: [R-001]
          - finding_id: I.A-F2
            finding: Public monetization terms exist for Unreal Engine and Epic Games Store, but realized revenue and contribution margin are private.
            evidence_claim_ids: [EC-008, EC-009]
            risk_ids: [R-001, R-005]
        hidden_risks:
          - Free-game subsidies, creator payouts, legal spend, and metaverse investment could mask weak cash conversion.
          - Revenue may be concentrated in Fortnite despite the broader ecosystem narrative.
        evidence_gaps:
          - Audited financials, revenue by product, gross margin, cash, debt, deferred revenue, and backlog.
        follow_up_questions:
          - Provide audited financial statements and monthly management accounts for fiscal 2023 through year-to-date 2026.
          - Break out revenue, gross margin, CAC, retention, and contribution margin by Fortnite, Unreal Engine, Epic Games Store, Fab, and services.
        table_ids: [T-001]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-002, EC-008, EC-009]
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids: [I.C.1, I.C.2, I.C.3, I.C.4]
        summary: Public sources show strategic minority investment and 2022 founder control, but current ownership, liquidation preferences, debt, and option-pool details require data-room review.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Epic disclosed USD 2 billion from Sony and KIRKBI in 2022 at a USD 31.5 billion post-money valuation, with Tim Sweeney retaining control.
            evidence_claim_ids: [EC-004]
            risk_ids: [R-006, R-007]
          - finding_id: I.C-F2
            finding: Disney announced a USD 1.5 billion equity stake in 2024, but valuation, percentage ownership, and rights were not public in collected sources.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-006, R-007]
        hidden_risks:
          - Strategic investors may have veto, commercial, exclusivity, or information rights that constrain exit paths.
        evidence_gaps:
          - Cap table, investor rights, voting agreements, side letters, debt instruments, and option pool.
        follow_up_questions:
          - Provide the current fully diluted cap table, investor-rights matrix, liquidation waterfall, debt schedule, and option pool detail.
        table_ids: [T-002]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-005]

  - chapter_id: II
    title: Products
    chapter_summary: Epic's public product footprint spans first-party games, a game platform, engine technology, store distribution, online services, and asset marketplaces.
    founder_claim_ids: [FC-002, FC-004, FC-005]
    evidence_claim_ids: [EC-001, EC-007, EC-008, EC-009, EC-010]
    risk_ids: [R-002, R-005, R-009]
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids: [II.A.1, II.A.4, II.A.5, II.A.6]
        summary: Public product evidence supports a broad ecosystem, but product-line profitability and cross-sell economics are not public.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Epic identifies Fortnite, Unreal Engine, Epic Games Store, and Epic Online Services as an end-to-end ecosystem.
            evidence_claim_ids: [EC-001, EC-007]
            risk_ids: [R-002]
          - finding_id: II.A-F2
            finding: Unreal Engine has disclosed royalty/seat monetization and UE5 technical features.
            evidence_claim_ids: [EC-008]
            risk_ids: [R-005, R-009]
        hidden_risks:
          - Product breadth may dilute focus if ecosystem modules do not cross-sell or retain users profitably.
        evidence_gaps:
          - Product P&Ls, active-user definitions, roadmap budgets, creator-payout economics, and moderation metrics.
        follow_up_questions:
          - Provide product-line P&Ls, active-user definitions, roadmap budgets, creator-payout formulas, and moderation metrics.
        table_ids: [T-003]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-001, EC-007, EC-008, EC-009]
      - section_id: II.B
        title: Pricing and monetization
        checklist_question_ids: [II.B.1, II.B.2]
        summary: Public pricing terms are available for Store and Unreal, while Fortnite and Fab economics require private financial and cohort data.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.B-F1
            finding: Epic Games Store's self-publishing value proposition includes an 88 percent publisher revenue share.
            evidence_claim_ids: [EC-009]
            risk_ids: [R-005]
          - finding_id: II.B-F2
            finding: Fortnite's free-to-play monetization is publicly described, but current bookings, payer concentration, refunds, and margin are private.
            evidence_claim_ids: [EC-006, EC-013]
            risk_ids: [R-001, R-003]
        hidden_risks:
          - Low take rates and subsidies can create growth without durable margin.
        evidence_gaps:
          - GMV, net revenue, refunds, chargebacks, creator payouts, guarantees, and attach rates by product.
        follow_up_questions:
          - Provide pricing waterfall and realized gross-to-net bridge for each monetization channel.
        table_ids: [T-004]
        figure_ids: []
        evidence_claim_ids: [EC-006, EC-009, EC-013]

  - chapter_id: III
    title: Customer Information
    chapter_summary: Public customer proof is strongest for consumers, developers, creators, publishers, and strategic brand partners; revenue concentration by account is not public.
    founder_claim_ids: [FC-002, FC-006]
    evidence_claim_ids: [EC-001, EC-005, EC-006, EC-009, EC-014]
    risk_ids: [R-002, R-003, R-007]
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids: [III.A]
        summary: Epic discloses enormous account and store reach, but active users, paying users, retention, and top-account revenue are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Epic reports over 800 million accounts and over 6 billion friend connections.
            evidence_claim_ids: [EC-001]
            risk_ids: [R-002]
          - finding_id: III.A-F2
            finding: Fortnite has historical public traction, including more than 125 million players in under a year and USD 9 billion gross revenue through 2019.
            evidence_claim_ids: [EC-006]
            risk_ids: [R-002]
        hidden_risks:
          - Public account counts may include inactive, duplicate, non-paying, or low-value accounts.
        evidence_gaps:
          - DAU/MAU, payer conversion, churn, ARPPU, age mix, top spenders, and refund/chargeback cohorts.
        follow_up_questions:
          - Provide cohort metrics for active users, paying users, bookings, refunds, chargebacks, and churn by product and geography.
        table_ids: [T-005]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-001, EC-006, EC-009, EC-014]
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids: [III.B]
        summary: Disney, Sony, KIRKBI, LEGO, and developers/publishers are material public relationships, but contract economics are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Disney announced a USD 1.5 billion equity investment and a Fortnite-connected universe powered by Unreal Engine.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-007]
          - finding_id: III.B-F2
            finding: Sony and KIRKBI each invested USD 1 billion in 2022 to support Epic's metaverse strategy.
            evidence_claim_ids: [EC-004]
            risk_ids: [R-007]
        hidden_risks:
          - Strategic partners may demand roadmap priority, minimum service levels, IP approvals, or exclusivity.
        evidence_gaps:
          - Contract terms, revenue shares, development milestones, service credits, termination rights, and partner contribution.
        follow_up_questions:
          - Provide material partner agreements for Disney, Sony, KIRKBI, LEGO, publishers, console platforms, and major licensees.
        table_ids: [T-006]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-005]

  - chapter_id: IV
    title: Competition
    chapter_summary: Epic competes across games, engines, distribution stores, creator platforms, marketplaces, and app-store economics.
    founder_claim_ids: [FC-002, FC-004, FC-005]
    evidence_claim_ids: [EC-008, EC-009, EC-010, EC-011, EC-015, EC-016]
    risk_ids: [R-002, R-004, R-005]
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids: [IV.A.1, IV.A.2]
        summary: Epic's competitive set differs by segment, including Steam in PC distribution, Unity in engines, Roblox/Minecraft in UGC games, and Apple/Google in mobile distribution.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: CB Insights names Epic as a leader in game development solutions and lists competitors.
            evidence_claim_ids: [EC-011]
            risk_ids: [R-002]
          - finding_id: IV.A-F2
            finding: Epic Games Store's 12 percent take-rate proposition contrasts with historically common 30 percent app-store economics.
            evidence_claim_ids: [EC-009, EC-015, EC-016]
            risk_ids: [R-004, R-005]
        hidden_risks:
          - Competitors may subsidize, bundle, or restrict distribution, pressuring store economics and user acquisition.
        evidence_gaps:
          - Market share, win/loss, developer churn, publisher pipeline, engine switching costs, and store contribution margin.
        follow_up_questions:
          - Provide competitor win/loss analyses, developer surveys, top lost deals, and pricing elasticity evidence.
        table_ids: [T-007]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-009, EC-011, EC-015, EC-016]
      - section_id: IV.B
        title: Basis of competition
        checklist_question_ids: [IV.B]
        summary: Epic's public differentiators are developer economics, consumer scale, Unreal technology, and strategic IP partnerships; quantitative market-share proof is absent.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.B-F1
            finding: Public evidence supports strong developer-economics positioning, but not store profitability.
            evidence_claim_ids: [EC-008, EC-009]
            risk_ids: [R-005]
          - finding_id: IV.B-F2
            finding: Mobile distribution remains exposed to Apple/Google policy and litigation outcomes.
            evidence_claim_ids: [EC-015, EC-016]
            risk_ids: [R-004]
        hidden_risks:
          - Public reach may not produce a durable moat if developer/publisher economics remain subsidy-dependent.
        evidence_gaps:
          - Net promoter scores, churn, market share, acquisition costs, and attach-rate by ecosystem module.
        follow_up_questions:
          - Provide developer and publisher retention, NPS, churn, and win/loss by product segment.
        table_ids: [T-008]
        figure_ids: []
        evidence_claim_ids: [EC-008, EC-009, EC-015, EC-016]

  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Epic distributes through Fortnite, Epic Games Store, Unreal licensing, developer portals, creator programs, and strategic IP partnerships.
    founder_claim_ids: [FC-002, FC-004, FC-006]
    evidence_claim_ids: [EC-001, EC-005, EC-006, EC-009, EC-010, EC-014]
    risk_ids: [R-002, R-003, R-005]
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids: [V.A.1, V.A.2, V.A.3, V.A.4]
        summary: Public GTM combines direct consumer distribution, self-publishing, developer economics, creator programs, and brand live events.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: V.A-F1
            finding: Epic Games Store self-publishing launched with over 68 million monthly active users, over 230 million users worldwide, and 88 percent publisher share.
            evidence_claim_ids: [EC-009]
            risk_ids: [R-005]
          - finding_id: V.A-F2
            finding: Disney reports Fortnite integrations reached hundreds of millions of players, with the Marvel Nexus War event drawing 15.3 million concurrent players.
            evidence_claim_ids: [EC-014]
            risk_ids: [R-002]
        hidden_risks:
          - Free users, event viewers, and subsidized users may not convert to high-margin recurring revenue.
        evidence_gaps:
          - CAC, channel spend, free-game subsidy schedule, creator payouts, publisher pipeline, and retention by channel.
        follow_up_questions:
          - Provide paid/organic acquisition mix, creator-program economics, free-game ROI, publisher acquisition pipeline, and marketing spend by channel.
        table_ids: [T-009]
        figure_ids: [F-005]
        evidence_claim_ids: [EC-001, EC-009, EC-014]
      - section_id: V.C
        title: Principal avenues for generating new business
        checklist_question_ids: [V.C]
        summary: New-business avenues include Fortnite engagement, third-party distribution, Unreal royalties/seats, creator publishing, asset marketplaces, and strategic IP collaborations.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.C-F1
            finding: Unreal licensing and Epic Games Store/Fab distribution create multiple developer monetization paths.
            evidence_claim_ids: [EC-008, EC-009, EC-010]
            risk_ids: [R-005]
          - finding_id: V.C-F2
            finding: The Disney partnership is a major potential growth path, but economics and launch schedule are not public.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-007]
        hidden_risks:
          - Different GTM motions may require incompatible sales, support, moderation, and compliance processes.
        evidence_gaps:
          - Pipeline, quota model, sales productivity, developer lifecycle funnel, and partner renewal rates.
        follow_up_questions:
          - Provide pipeline by product, sales productivity model, partner-renewal stats, and creator/publisher onboarding funnel.
        table_ids: [T-010]
        figure_ids: []
        evidence_claim_ids: [EC-005, EC-008, EC-009, EC-010]

  - chapter_id: VI
    title: Research and Development
    chapter_summary: Epic's R&D center of gravity is Unreal Engine, Fortnite/UEFN, creator tools, services, marketplaces, and safety controls.
    founder_claim_ids: [FC-002, FC-005]
    evidence_claim_ids: [EC-007, EC-008, EC-010, EC-012, EC-013]
    risk_ids: [R-002, R-005, R-009]
    sections:
      - section_id: VI.A
        title: Description of R&D organization
        checklist_question_ids: [VI.A.1, VI.A.2, VI.A.3]
        summary: Public sources identify advanced engine and creator-tool efforts, but R&D headcount, technical debt, roadmap budget, and release quality metrics are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.A-F1
            finding: Unreal Engine 5 public pages describe advanced rendering and creation features.
            evidence_claim_ids: [EC-008]
            risk_ids: [R-002, R-009]
          - finding_id: VI.A-F2
            finding: CB Insights reports Epic has filed 18 patents, but full patent schedule and assignments require review.
            evidence_claim_ids: [EC-012]
            risk_ids: [R-009]
        hidden_risks:
          - R&D complexity spans engine, live operations, marketplace quality, privacy, billing, moderation, and partner deliverables.
        evidence_gaps:
          - R&D budget, staffing by product, technical debt, security audits, patent assignments, and open-source compliance.
        follow_up_questions:
          - Provide R&D roadmap, staffing by product, technical debt register, security review results, patent assignments, and open-source compliance artifacts.
        table_ids: [T-011]
        figure_ids: [F-006]
        evidence_claim_ids: [EC-008, EC-012, EC-013]
      - section_id: VI.B
        title: New product pipeline
        checklist_question_ids: [VI.B.1, VI.B.2, VI.B.3, VI.B.4]
        summary: Public pipeline includes the Disney/Fortnite universe, UEFN/Verse, Unreal Engine evolution, Fab marketplace growth, and store/mobile distribution.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.B-F1
            finding: Disney and Epic announced a multiyear games and entertainment universe connected to Fortnite and powered by Unreal Engine.
            evidence_claim_ids: [EC-005, EC-014]
            risk_ids: [R-007]
          - finding_id: VI.B-F2
            finding: Fab broadens Epic's creator marketplace into Unreal, UEFN, Unity, MetaHuman, and asset categories.
            evidence_claim_ids: [EC-010]
            risk_ids: [R-009]
        hidden_risks:
          - Partner-led roadmap items can miss timing, overrun budgets, or underperform if consumer engagement shifts.
        evidence_gaps:
          - Launch schedule, development cost, milestone acceptance criteria, partner dependencies, and cancellation thresholds.
        follow_up_questions:
          - Provide product pipeline, milestone budget, launch-readiness reviews, partner acceptance criteria, and post-launch KPI targets.
        table_ids: [T-012]
        figure_ids: []
        evidence_claim_ids: [EC-005, EC-010, EC-014]

  - chapter_id: VII
    title: Management and Personnel
    chapter_summary: Founder/CEO continuity is public, but senior leadership depth, compensation, incentives, turnover, and function/location headcount require private diligence.
    founder_claim_ids: [FC-001, FC-003]
    evidence_claim_ids: [EC-001, EC-004, EC-017]
    risk_ids: [R-007, R-008]
    sections:
      - section_id: VII.A
        title: Organization Chart
        checklist_question_ids: [VII.A]
        summary: Tim Sweeney is publicly verified as founder and CEO, and 2022 founder control was disclosed, but board composition and executive reporting lines are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VII.A-F1
            finding: Epic states Tim Sweeney founded the company and serves as CEO; the 2022 financing announcement said he remained in control.
            evidence_claim_ids: [EC-001, EC-004]
            risk_ids: [R-007]
        hidden_risks:
          - Founder control can be a product-vision strength but may limit investor governance or succession flexibility.
        evidence_gaps:
          - Board composition, executive org chart, reserved matters, compensation, retention grants, and succession plan.
        follow_up_questions:
          - Provide board and executive org chart, committee charters, reserved-matter list, compensation summary, and succession plan.
        table_ids: [T-013]
        figure_ids: []
        evidence_claim_ids: [EC-001, EC-004]
      - section_id: VII.B
        title: Historical and projected headcount by function and location
        checklist_question_ids: [VII.B]
        summary: Public sources show global offices and reported layoffs; detailed function/location headcount, attrition, hiring plan, and compensation are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VII.B-F1
            finding: Epic says it has dozens of offices worldwide; public history reports September 2023 layoffs of 870 employees.
            evidence_claim_ids: [EC-001, EC-017]
            risk_ids: [R-008]
          - finding_id: VII.B-F2
            finding: Public headcount and workforce restructuring signals require direct HRIS confirmation.
            evidence_claim_ids: [EC-017]
            risk_ids: [R-008]
        hidden_risks:
          - Workforce reductions may signal cost pressure, product underperformance, morale issues, or reduced development capacity.
        evidence_gaps:
          - Headcount by function/location, attrition, regretted losses, recruiting pipeline, compensation bands, and retention grants.
        follow_up_questions:
          - Provide historical and projected headcount by function/location, attrition, regretted losses, compensation plans, and retention strategy.
        table_ids: [T-014]
        figure_ids: [F-007]
        evidence_claim_ids: [EC-001, EC-017]

  - chapter_id: VIII
    title: Legal and Related Matters
    chapter_summary: Legal diligence is material because Epic operates child-facing products, large payment flows, IP-heavy creator ecosystems, engine licenses, and app-store litigation.
    founder_claim_ids: [FC-005, FC-006]
    evidence_claim_ids: [EC-008, EC-012, EC-013, EC-015, EC-016]
    risk_ids: [R-003, R-004, R-009]
    sections:
      - section_id: VIII.A
        title: Pending lawsuits against the Company
        checklist_question_ids: [VIII.A]
        summary: App-store litigation and countersuits are public, but current docket status, reserves, insurance, and counsel assessments require legal diligence.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.A-F1
            finding: Public histories describe countersuits in Apple and Google disputes after Epic's direct-payment changes and app-store removals.
            evidence_claim_ids: [EC-015, EC-016]
            risk_ids: [R-004]
        hidden_risks:
          - Litigation outcomes can affect app access, payment economics, damages, fee awards, and compliance obligations.
        evidence_gaps:
          - Active docket list, reserves, fee exposure, settlement terms, insurance coverage, and counsel assessments.
        follow_up_questions:
          - Provide litigation schedule, claims/reserves, counsel letters, insurance notices, settlement discussions, and board materials.
        table_ids: [T-015]
        figure_ids: [F-008]
        evidence_claim_ids: [EC-015, EC-016]
      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids: [VIII.D]
        summary: Unreal Engine, Fortnite, store/developer licenses, patents, trademarks, and third-party IP collaborations are material assets and obligations.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.D-F1
            finding: Unreal Engine license terms and a CB Insights patent count are public, but ownership chains and encumbrances require document review.
            evidence_claim_ids: [EC-008, EC-012]
            risk_ids: [R-009]
        hidden_risks:
          - UGC, marketplace assets, brand collaborations, and engine-license compliance can create IP claims, audit disputes, or takedown exposure.
        evidence_gaps:
          - Patent/trademark schedules, chain-of-title records, open-source scan, creator IP policy enforcement, and indemnity obligations.
        follow_up_questions:
          - Provide IP schedule, assignments, license-in/license-out contracts, takedown metrics, indemnity claims, and open-source compliance reports.
        table_ids: [T-016]
        figure_ids: []
        evidence_claim_ids: [EC-008, EC-012]
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids: [VIII.G]
        summary: FTC orders over children's privacy and unwanted charges are high-priority legal diligence items.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: VIII.G-F1
            finding: The FTC announced settlements totaling USD 520 million, including a USD 275 million COPPA penalty and USD 245 million consumer refunds.
            evidence_claim_ids: [EC-013]
            risk_ids: [R-003]
        hidden_risks:
          - Consent-order violations could create new penalties, product constraints, audits, and reputational harm.
        evidence_gaps:
          - Current privacy program, independent audit results, consent-order reports, refund metrics, and product-design controls.
        follow_up_questions:
          - Provide FTC compliance binders, privacy audits, billing UX review process, age-gate testing, and complaints/refund trend data.
        table_ids: []
        figure_ids: [F-009]
        evidence_claim_ids: [EC-013]

