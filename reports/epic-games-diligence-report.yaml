limitations:
  - limitation_id: L-001
    description: Epic is private; audited financials, management accounts, cap table, customer contracts, supplier spend, and HRIS records were not public.
    affected_chapter_ids: [I, III, VII]
    affected_section_ids: [I.A, I.C, III.A, VII.B]
  - limitation_id: L-002
    description: Some primary pages and legal sources returned CAPTCHA, 403, 404, JavaScript challenge, or regional-access errors during research; inaccessible sources were treated as gaps rather than bypassed.
    affected_chapter_ids: [VII, VIII]
    affected_section_ids: [VII.B, VIII.A]
  - limitation_id: L-003
    description: Wikipedia and market-database sources were used only for public context where primary documents were unavailable; private diligence should replace them with company records, regulator/court records, and counsel letters.
    affected_chapter_ids: [I, IV, VII, VIII]
    affected_section_ids: [I.A, IV.A, VII.B, VIII.A]
  - limitation_id: L-004
    description: Public user, account, and event metrics are not normalized and should not be interpreted as paying users, retained users, or recurring revenue.
    affected_chapter_ids: [III, V]
    affected_section_ids: [III.A, V.A]
  - limitation_id: L-005
    description: Risk scoring is analyst judgment from public evidence and does not incorporate non-public board materials, counsel assessments, insurance coverage, or management forecasts.
    affected_chapter_ids: [I, VIII]
    affected_section_ids: [I.A, VIII.G]
