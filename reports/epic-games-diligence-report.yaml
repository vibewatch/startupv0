risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and quality-of-earnings gap
    risk_category: financial
    severity: high
    likelihood: high
    description: Epic's public profile verifies funding and scale, but audited revenue, EBITDA, cash burn, product-line margin, debt, subsidies, and runway are not public.
    impacted_chapter_ids: [I, II, III, V]
    impacted_section_ids: [I.A, I.C, II.B, III.A, V.A]
    evidence_claim_ids: [EC-002, EC-004, EC-005, EC-008, EC-009]
    mitigation_or_diligence_request: Require audited financials, monthly management accounts, product-line P&Ls, cash/debt schedule, and subsidy commitments.
  - risk_id: R-002
    risk_title: User-scale metrics may not translate into durable monetization
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public account, user, and event metrics are enormous but not normalized for active users, payer conversion, retention, age mix, refunds, or contribution margin.
    impacted_chapter_ids: [II, III, IV, V]
    impacted_section_ids: [II.A, III.A, IV.A, V.A]
    evidence_claim_ids: [EC-001, EC-006, EC-009, EC-014]
    mitigation_or_diligence_request: Obtain cohort metrics, payer conversion, ARPPU, retention, refunds, chargebacks, and product-level contribution margin.
  - risk_id: R-003
    risk_title: Child privacy, billing, and dark-pattern compliance
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: FTC settlements over COPPA/privacy and unwanted charges create continuing controls, audit, product-design, and reputational risk.
    impacted_chapter_ids: [III, V, VIII]
    impacted_section_ids: [III.A, V.A, VIII.G]
    evidence_claim_ids: [EC-013]
    mitigation_or_diligence_request: Review FTC compliance binders, independent audit reports, age-gating controls, billing UX approval process, complaints, and refund trends.
  - risk_id: R-004
    risk_title: App-store litigation and mobile distribution dependence
    risk_category: legal
    severity: high
    likelihood: medium
    description: Apple and Google disputes can affect mobile access, payment economics, legal expense, fee awards, and compliance obligations.
    impacted_chapter_ids: [IV, VI, VIII]
    impacted_section_ids: [IV.A, IV.B, VI.B, VIII.A]
    evidence_claim_ids: [EC-015, EC-016]
    mitigation_or_diligence_request: Obtain counsel letters, docket schedule, reserves, insurance coverage, settlement terms, and mobile revenue sensitivity.
  - risk_id: R-005
    risk_title: Developer-friendly economics may pressure margins
    risk_category: product
    severity: medium
    likelihood: high
    description: Store 88 percent publisher share, subsidies, free games, creator payouts, and marketplace costs can create low-margin growth.
    impacted_chapter_ids: [II, IV, V]
    impacted_section_ids: [II.B, IV.B, V.A, V.C]
    evidence_claim_ids: [EC-008, EC-009, EC-010]
    mitigation_or_diligence_request: Reconcile public take rates to net contribution margin by product and cohort.
  - risk_id: R-006
    risk_title: Current valuation and cap-table terms are not public
    risk_category: financing
    severity: medium
    likelihood: high
    description: Public sources provide historic valuation anchors, but current valuation, preferences, liquidation waterfall, debt, option pool, and Disney final terms are unknown.
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.C]
    evidence_claim_ids: [EC-002, EC-003, EC-004, EC-005]
    mitigation_or_diligence_request: Review cap table, investor rights, debt schedule, option pool, securities purchase agreements, and liquidation waterfall.
  - risk_id: R-007
    risk_title: Strategic-investor and partner rights may constrain strategy
    risk_category: operational
    severity: medium
    likelihood: unknown
    description: Sony, KIRKBI, and Disney validate Epic's strategy but may hold non-public governance, commercial, IP, exclusivity, or information rights.
    impacted_chapter_ids: [I, III, V, VI, VII]
    impacted_section_ids: [I.C, III.B, V.C, VI.B, VII.A]
    evidence_claim_ids: [EC-004, EC-005, EC-014]
    mitigation_or_diligence_request: Review strategic-investor rights, partner agreements, reserved matters, development milestones, and termination rights.
  - risk_id: R-008
    risk_title: Workforce restructuring and retention uncertainty
    risk_category: team
    severity: medium
    likelihood: medium
    description: Reported 2023 layoffs and absent current headcount detail create questions about morale, execution capacity, retention, and cost structure.
    impacted_chapter_ids: [VII]
    impacted_section_ids: [VII.B]
    evidence_claim_ids: [EC-001, EC-017]
    mitigation_or_diligence_request: Review HRIS exports, attrition, recruiting plan, compensation bands, retention grants, and post-layoff productivity metrics.
  - risk_id: R-009
    risk_title: IP, marketplace, and technical defensibility gaps
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Unreal, Fab, Fortnite UGC, and marketplace assets create valuable IP and technology, but assignments, encumbrances, takedowns, open-source compliance, and disputes are private.
    impacted_chapter_ids: [II, VI, VIII]
    impacted_section_ids: [II.A, VI.A, VIII.D]
    evidence_claim_ids: [EC-008, EC-010, EC-012]
    mitigation_or_diligence_request: Obtain IP schedule, patent assignments, open-source scans, takedown logs, indemnity claims, and custom license agreements.

diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, monthly management accounts, revenue by product, gross margin, cash, debt, runway, and off-balance-sheet commitments.
    why_it_matters: Needed to assess quality of earnings, burn, profitability, and valuation support.
    suggested_source_or_request: CFO data-room request for audited financials, management accounts, P&L by product, cash/debt schedule, and board budgets.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, investor rights, preferences, debt, option pool, Disney closing terms, and governance rights.
    why_it_matters: Determines economic ownership, exit waterfall, control, and strategic constraints.
    suggested_source_or_request: Legal/corporate data-room request for cap table, stock ledgers, financing documents, side letters, and board consents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Active users, paying users, churn, payer concentration, age mix, refunds, chargebacks, and top customer/partner contribution.
    why_it_matters: Public scale claims do not reveal revenue quality or concentration.
    suggested_source_or_request: Product analytics and billing data by cohort, geography, product, and partner.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.G
    missing_information: FTC compliance reports, independent audits, age-gating tests, billing UX approvals, refund metrics, and complaint trends.
    why_it_matters: Regulatory history is material to ongoing consumer and child-facing monetization.
    suggested_source_or_request: Counsel and compliance request for consent-order binders, audit reports, and board reporting.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation schedule, reserves, fee exposure, insurance coverage, settlement terms, and counsel assessments.
    why_it_matters: App-store litigation can affect distribution, economics, and legal liabilities.
    suggested_source_or_request: Counsel letters, docket summaries, reserve memos, and insurance notices.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D budget, engineering roadmap, technical debt, IP assignments, security audits, and open-source compliance.
    why_it_matters: Technology defensibility and delivery risk cannot be underwritten from public pages alone.
    suggested_source_or_request: CTO/GC data-room request for roadmap, staffing, audits, IP schedule, SBOM, and technical debt register.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS headcount, attrition, regretted losses, compensation bands, recruiting plan, and retention grants.
    why_it_matters: Public office and layoff signals do not show execution capacity or retention risk.
    suggested_source_or_request: HRIS export and people-ops interviews.
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.A
    missing_information: CAC/LTV, channel mix, free-game subsidy ROI, publisher guarantees, creator payouts, and brand-event economics.
    why_it_matters: Go-to-market scale may be expensive or low margin.
    suggested_source_or_request: Marketing and finance request for channel cohorts, campaign spend, subsidy schedules, and partner economics.
    priority: medium

