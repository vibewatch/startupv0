report_metadata:
  report_title: Ascend Elements Startup Diligence Report
  target_company: Ascend Elements
  website: https://www.ascendelements.com/
  known_aliases:
    - Ascend Elements, Inc.
    - Battery Resourcers
    - AE Elemental
  sector: Battery materials, lithium-ion battery recycling and critical minerals
  geography: United States; Europe; Massachusetts; Georgia; Kentucky; Poland
  company_stage: Private unicorn / growth-stage battery-materials manufacturer
  research_date: 2026-06-01
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source standard diligence only.
    - Used CB Insights for unicorn eligibility, Ascend company pages/releases for company claims, partner/government/legal sources for corroborating context.
    - Company statements verify public claims, not underlying financial, technical, legal or operating performance.
  included_jurisdictions:
    - United States
    - European Union
    - Poland
  excluded_topics:
    - Private financials, cap table, contracts, customer calls, patent files, permits, full dockets and HR data were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Ascend Elements diligence report
      type: workflow_request
      date_received: 2026-06-01
      notes: No pitch deck, model, data room or founder responses were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Ascend Elements is an eligible active private unicorn, with no public evidence found of IPO, acquisition or shutdown as of the research date.
    claim_source: CB Insights unicorn list and current company materials
    claim_date: 2023-09-06
    mapped_chapter_ids:
      - I
    mapped_section_ids:
