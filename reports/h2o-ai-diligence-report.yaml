report_metadata:
  report_title: H2O.ai Startup Diligence Report
  target_company: H2O.ai
  website: https://h2o.ai/
  known_aliases:
    - H2O.ai
    - H2O.ai Inc.
    - H2O AI Cloud
  sector: Enterprise predictive AI, generative AI agents, AutoML and MLOps software
  geography: United States / global enterprise AI markets
  company_stage: Private unicorn / growth-stage company
  research_date: 2026-06-07
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the existing-report exclusion list from reports/*-diligence-report.yaml before target selection.
    - Selected this target from the fetched CB Insights unicorn list and excluded reports already present in the repository.
    - Reviewed company-owned pages, CB Insights unicorn-list rows and available public mirrors; treated company claims as evidence that the claim is public, not as independent proof of operating performance.
    - Mapped every finding to checklist chapters I-VIII and marked private records as not_publicly_verifiable rather than speculating.
  included_jurisdictions:
    - United States
    - United States public web sources
    - Global markets referenced by company pages
  excluded_topics:
    - No private data room, customer calls, management interviews, non-public litigation dockets, paid databases, security reports, HRIS exports or cap-table records were available.
  user_provided_materials:
    - material_id: UPM-001
      title: Fetched CB Insights unicorn-list row
      type: market_database_row
      date_received: 2026-06-07
      notes: Row listed H2O.ai, valuation $1.70B, joined 2021-11-07, United States/Mountain View, Enterprise Tech, investors Nexus Venture Partners, Transamerica Ventures, Crane Venture Partners.
