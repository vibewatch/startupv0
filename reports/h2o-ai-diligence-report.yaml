executive_summary:
  overall_assessment: H2O.ai is eligible for this run's public-source diligence based on the fetched CB Insights unicorn-list row and active company-owned sources. Public evidence supports product, customer/partner and team signals, but financial quality, cap table, customer revenue quality, legal schedules and current valuation support remain private.
  investment_or_diligence_thesis: Proceed only if private diligence proves H2O.ai converts its long-lived AutoML credibility into profitable enterprise GenAI and MLOps growth with defensible retention, cloud costs and regulated-data controls.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists H2O.ai as a $1.70B unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company-owned sources verify an active product/platform suite.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Public customer or partner signals exist, though revenue contribution is not public.
      evidence_claim_ids:
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation support are private
    - risk_id: R-002
      summary: Enterprise AI platform competition is intense
    - risk_id: R-003
      summary: GenAI pivot and product sprawl execution risk
  key_evidence_gaps:
    - Audited financials, KPI pack, current forecast, cash/debt schedule, cap table and financing documents.
    - Top-customer ARR, NRR/churn, contract terms, concentration, partner-sourced pipeline and customer-reference calls.
    - Product architecture review, roadmap, security reports, incident history, legal/IP schedules, material contracts and HRIS/compensation records.
  recommended_next_steps:
    - Request a data-room package before relying on public valuation or operating claims.
    - Run customer, product/technical, security and win/loss references matched to the top risks.
    - Have counsel review IP, privacy/security, contracts, insurance, employment and litigation/regulatory matters.
