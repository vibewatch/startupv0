risk_register:
  - risk_id: R-001
    risk_title: Financial growth and margin sustainability
    risk_category: financial
    severity: high
    likelihood: medium
    description: Rapid revenue and margin improvement may not sustain as competition, product mix, warranty and service costs evolve.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request QoE, forecast, backlog, gross-margin bridge and warranty reserves.
  - risk_id: R-002
    risk_title: Founder control and special voting rights
    risk_category: team
    severity: high
    likelihood: high
    description: Founder voting control concentrates governance and succession risk.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - VII.A
      - VII.C
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review governance documents, board independence and succession plan.
  - risk_id: R-003
    risk_title: Competition and price pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Tesla and robotics competitors can pressure pricing, market share and margins.
    impacted_chapter_ids:
      - IV
      - I
    impacted_section_ids:
      - IV.A
      - I.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Benchmark competitors and model price/margin scenarios.
  - risk_id: R-004
    risk_title: Hardware reliability and support economics
    risk_category: product
    severity: high
    likelihood: medium
    description: Low prices and rapid unit growth do not prove warranty, support and service economics.
    impacted_chapter_ids:
      - II
      - III
    impacted_section_ids:
      - II.A
      - III.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request field failure, warranty, return and support-cost data.
  - risk_id: R-005
    risk_title: Safety and misuse exposure
    risk_category: regulatory
    severity: critical
    likelihood: medium
    description: Powerful mobile robots require functional safety, incident and end-use controls beyond public warnings.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.C
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request safety certificates, incident logs, training and misuse controls.
  - risk_id: R-006
    risk_title: Trade/export-control exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Overseas sales/imported materials and dual-use robotics create tariff, sanctions and export-control risk.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Run export classification, sanctions screening and distributor compliance audit.
  - risk_id: R-007
    risk_title: R&D roadmap breadth
    risk_category: technical
    severity: medium
    likelihood: high
    description: Multiple hardware/model projects may overrun capital and management bandwidth.
    impacted_chapter_ids:
      - VI
      - I
    impacted_section_ids:
      - VI.A
      - VI.B
      - I.B
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review roadmap, milestones, TRLs and budgets.
  - risk_id: R-008
    risk_title: IPO execution and valuation reset
    risk_category: financing
    severity: medium
    likelihood: medium
    description: IPO process is not completed and valuation/liquidity can reset with market/regulatory changes.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Confirm final IPO status, lockups and financing alternatives.
  - risk_id: R-009
    risk_title: Channel/distributor execution
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Offline/dealer/reseller channels create margin, inventory, compliance and support risks.
    impacted_chapter_ids:
      - V
      - III
    impacted_section_ids:
      - V.A
      - V.C
      - III.B
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Review distributor agreements and channel P&L.
  - risk_id: R-010
    risk_title: Customer quality opacity
    risk_category: customer
    severity: medium
    likelihood: medium
    description: Top-customer concentration appears low but many customer identities/contracts are anonymized or private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request customer contracts, cohorts and references.
  - risk_id: R-011
    risk_title: Component/supplier dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Supplier concentration is moderate but imported/electronics/mechanical parts can create hidden constraints.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.G
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Request BOM, sole-source list, alternates and inventory.
  - risk_id: R-012
    risk_title: Talent retention and key-person dependency
    risk_category: team
    severity: medium
    likelihood: medium
    description: R&D/core leadership is founder-centric; attrition and compensation are not public.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.B
      - VII.C
      - VII.G
      - VI.A
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Request HR census, attrition, compensation and retention plan.
  - risk_id: R-013
    risk_title: IP litigation and FTO
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Disclosed patent lawsuits plus dense robotics IP make FTO material.
    impacted_chapter_ids:
      - VIII
      - VI
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VI.A
    evidence_claim_ids: *a13
    mitigation_or_diligence_request: Retain IP counsel for docket, assignments and FTO review.
