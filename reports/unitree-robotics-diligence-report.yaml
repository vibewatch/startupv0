executive_summary:
  overall_assessment: "Eligible for reporting: CB Insights lists Unitree as a unicorn and public evidence shows IPO filing/preparation, not completed IPO/acquisition/shutdown. The SSE prospectus gives unusually strong public financial/product evidence, but diligence should focus on financial quality, governance, safety/export controls, customer quality, supplier dependencies and IP litigation/FTO."
  investment_or_diligence_thesis: Unitree appears to be a scaled, fast-growing legged/humanoid robotics company with public revenue, shipment, pricing and R&D evidence. Underwrite cautiously around margin durability, low-cost hardware support economics, founder control, dual-use/export exposure and whether public shipments translate into durable enterprise/customer value.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights unicorn row and public IPO-preparation evidence support eligibility.
      evidence_claim_ids:
        - EC-001
        - EC-003
        - EC-004
    - founder_claim_id: FC-003
      summary: Prospectus discloses rapid revenue growth, gross margin and financing/proceeds data.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-008
    - founder_claim_id: FC-004
      summary: Product pages and prospectus verify broad quadruped/humanoid portfolio and low headline pricing.
      evidence_claim_ids:
        - EC-006
        - EC-009
        - EC-010
        - EC-011
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Growth and gross margin may not sustain as competition, warranty and product mix evolve.
    - risk_id: R-002
      summary: Founder special voting rights create governance and key-person concentration.
    - risk_id: R-006
      summary: Overseas revenue/imported materials plus dual-use robotics create trade/export-control risk.
  key_evidence_gaps:
    - Audited statements/QoE, backlog, AR aging, warranty reserves and 2026 actuals.
    - Named customer contracts, retention/churn and deployment outcomes.
    - Safety certificates, incident logs, export classification and end-use controls.
    - Patent/trademark/FTO review and current litigation docket status.
    - Full cap table, investor rights, ESOP, debt/warrants and governance documents.
  recommended_next_steps:
    - Confirm current private/listing status and final IPO updates.
    - Run financial QoE and SKU gross-margin/warranty diligence.
    - Conduct customer, supplier, technical, product-safety, export-control and IP/FTO diligence before close.
