report_metadata:
  report_title: Unitree Robotics Public-Source Startup Diligence Report
  target_company: Unitree Robotics / Hangzhou Yushu Technology Co., Ltd.
  website: https://www.unitree.com/
  known_aliases:
    - Unitree
    - Unitree Robotics
    - Hangzhou Yushu Technology Co., Ltd.
    - 杭州宇树科技有限公司
    - 宇树科技
    - 宇树科技股份有限公司
  sector: Industrials; quadruped robotics; humanoid robotics; embodied AI; robotics components
  geography: Hangzhou, Zhejiang, China; global sales and distribution
  company_stage: Late-stage private unicorn with STAR Market IPO prospectus pre-disclosure and no completed IPO evidence in this public-source review
  research_date: 2026-06-15
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: RMB unless otherwise noted; USD for public headline prices and CB Insights valuation
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility using CB Insights tracker plus active company/product and IPO/prospectus sources.
    - Prioritized primary company pages, SSE prospectus, public product docs/GitHub, credible news, patent index, competitor pages, distributor page and export-control frameworks.
    - Classified private checklist items as not_publicly_verifiable rather than inferring.
  included_jurisdictions:
    - China / Shanghai Stock Exchange / Hangzhou
    - United States trade/export-control exposure
    - European Union dual-use framework
    - Global robotics markets
  excluded_topics:
    - No private data room, management interviews, customer calls, supplier calls, paid legal databases, audit workpapers or legal/tax/export-control opinions.
  user_provided_materials:
    - material_id: M-001
      title: User task with Unitree candidate row and output path
      type: prompt_argument
      date_received: 2026-06-15
      notes: Requested reports/unitree-robotics-diligence-report.yaml only; no commit, PR or safeoutputs.
