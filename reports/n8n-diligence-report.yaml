    title: n8n diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap for report risk register.
    purpose: Prioritize follow-up before investment/transaction work.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and ARR bridge not public
          severity: high
          likelihood: high
          rationale: Public sources disclose funding, ARR-growth and ARR-threshold signals but not audited statements, ARR bridge, margins, burn, runway, backlog or AR aging.
          evidence_claim_ids: &a33
            - EC-004
