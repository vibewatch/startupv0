executive_summary:
  overall_assessment: n8n is a credible late-stage Germany-based workflow automation and AI-orchestration company with strong public technical adoption, visible enterprise case studies and multiple public financing events. Public evidence supports the original $2.5B unicorn selection context for October 2025, but a May 2026 SAP strategic-investment announcement indicates a later $5.2B valuation that must be reconciled in cap-table diligence.
  investment_or_diligence_thesis: The diligence thesis is a high-growth, source-available automation platform converting developer/community adoption into enterprise AI-orchestration revenue. The investment case depends on validating ARR quality, gross margin, conversion, customer concentration, security/compliance posture and strategic-partnership economics.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Core product positioning as fair-code workflow automation with AI, cloud/self-host options and technical-team focus is verified by GitHub, product and investor sources.
      evidence_claim_ids:
        - EC-008
        - EC-010
        - EC-013
    - founder_claim_id: FC-003
      summary: The $2.5B October 2025 unicorn context is supported by CB row context and an independent Series C funding article.
      evidence_claim_ids:
        - EC-001
        - EC-005
    - founder_claim_id: FC-006
      summary: Public technical adoption is substantial, with GitHub/API and release/npm metrics observed on the research date.
      evidence_claim_ids:
        - EC-009
        - EC-021
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, ARR bridge, gross margin, burn, runway and revenue quality are not public.
    - risk_id: R-002
      summary: The report must reconcile $2.5B October 2025 valuation evidence with the later $5.2B SAP strategic-investment valuation.
    - risk_id: R-003
      summary: Customer concentration, churn, renewal and top-account revenue are not publicly verifiable despite strong case-study logos.
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, gross margin, burn, runway, debt and tax/accounting policies.
    - Fully diluted cap table, financing documents, option pool, investor rights and SAP strategic-investment/commercial agreement.
    - Top-customer ARR, churn/renewal cohorts, customer contracts, customer references and severed relationships.
    - SOC reports, pen tests, incident history, subprocessors, legal schedules, IP assignments, insurance and material contracts.
    - Current org chart, headcount by function/location, compensation, incentive plans, attrition and sales productivity.
  recommended_next_steps:
    - Open financial/cap-table data room and reconcile public $2.5B and $5.2B valuation signals to transaction documents.
    - Run customer diligence on top ARR accounts, public case-study logos, churned accounts and SAP partnership pipeline.
    - Conduct technical/security diligence on workflow credential handling, Azure/LLM dependencies, SOC reports, self-hosting obligations and source-available license compliance.
    - Perform counsel-led legal/IP/privacy diligence including contracts, regulatory correspondence, litigation dockets, trademarks/patents, insurance and employee/IP assignment records.
