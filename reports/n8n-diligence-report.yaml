            - EC-018
          source_ids:
            - SRC-004
            - SRC-005
            - SRC-007
        - risk_id: R-002
          label: Valuation and cap-table reconciliation risk
          severity: high
          likelihood: high
          rationale: Public sources show a $2.5B October 2025 valuation and a $5.2B May 2026 SAP strategic investment valuation without public pre/post-money, primary/secondary, liquidation preference or investor-rights details.
          evidence_claim_ids: &a34
            - EC-001
            - EC-005
            - EC-006
            - EC-022
          source_ids:
            - SRC-001
            - SRC-005
            - SRC-006
        - risk_id: R-003
          label: Customer concentration and churn unknown
          severity: high
          likelihood: high
          rationale: Case studies and customer-count press releases do not disclose top-customer revenue, churn, renewal cohorts or logo-to-ARR weights.
          evidence_claim_ids: &a35
            - EC-012
            - EC-017
            - EC-026
          source_ids:
            - SRC-010
            - SRC-004
            - SRC-006
        - risk_id: R-004
          label: Competitive pricing pressure in automation/orchestration
          severity: medium
          likelihood: high
          rationale: n8n competes against Zapier, Workato, Pipedream, Tray.ai, Make and other automation/AI-orchestration tools with different usage units and enterprise packaging.
          evidence_claim_ids: &a36
            - EC-007
            - EC-016
          source_ids:
            - SRC-007
            - SRC-017
            - SRC-018
            - SRC-019
            - SRC-020
        - risk_id: R-005
          label: Source-available licensing and enterprise monetization risk
          severity: medium
          likelihood: medium
          rationale: n8n’s fair-code/Sustainable Use License and separate enterprise-license model may create buyer/community confusion and requires careful compliance for embedded or SaaS use.
          evidence_claim_ids: &a37
            - EC-010
          source_ids:
            - SRC-009
        - risk_id: R-006
          label: Security, credential and shared-responsibility exposure
          severity: high
          likelihood: medium
          rationale: n8n workflows often connect sensitive systems and credentials; public security posture is directionally strong but SOC reports, exceptions, pen tests and incident history are private.
