report_metadata:
  report_title: n8n Startup Diligence Research Report
  target_company: n8n
  website: https://n8n.io
  known_aliases:
    - n8n GmbH
    - n8n.io
    - n8n-io/n8n
    - nodemation
  sector: Enterprise Tech / workflow automation / AI orchestration / developer tools
  geography: Germany / Berlin; global customer base
  company_stage: Private venture-backed unicorn / late-stage growth
  research_date: 2026-06-01
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public company sources: n8n website, pricing, security/legal pages, case studies and GitHub repository"
    - "Third-party and investor sources: TechCrunch, Highland Europe, Tech Funding News, Accel, Sequoia, Wikipedia and CB Insights context"
    - "Technical sources: GitHub API, npm registry, repository license/README files"
    - "Competitive sources: public pricing pages for Zapier, Workato, Pipedream and Tray.ai"
    - Legal/regulatory surface scan limited to public web and company legal/security pages; no private dockets or counsel letters
  included_jurisdictions:
    - Germany
    - European Union / GDPR context
    - United States and global public web
    - Microsoft Azure EU hosting context
  excluded_topics:
    - No paywall bypasses or private systems
    - No private financial model, data room, cap table, customer calls, founder interview or legal docket artifact
    - No non-public personal contact details
    - No assertion of absence for litigation/regulatory matters without counsel-led searches
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights unicorn-list target selection row for n8n
      type: user_context
      date_received: 2026-06-01
      notes: "User supplied row: n8n; slug n8n; valuation $2.5B; date joined 10/9/2025; Germany/Berlin; Enterprise Tech; investors Accel, Evantic Capital, Sequoia Capital; CB profile URL."
