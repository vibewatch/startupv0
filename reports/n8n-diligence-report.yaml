risk_register:
  - risk_id: R-001
    risk_title: Financial quality and ARR bridge not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources disclose funding, ARR-growth and ARR-threshold signals but not audited statements, ARR bridge, margins, burn, runway, backlog or AR aging.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Obtain audited/management financials, ARR by cohort, NRR/GRR, gross margin, burn, runway, backlog and AR aging.
  - risk_id: R-002
    risk_title: Valuation and cap-table reconciliation risk
    risk_category: financing
    severity: high
    likelihood: high
    description: Public sources show a $2.5B October 2025 valuation and a $5.2B May 2026 SAP strategic investment valuation without public pre/post-money, primary/secondary, liquidation preference or investor-rights details.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request full cap table, financing documents, valuation definitions, option pool, debt, SAFE/notes and investor-rights side letters.
  - risk_id: R-003
    risk_title: Customer concentration and churn unknown
    risk_category: customer
    severity: high
    likelihood: high
    description: Case studies and customer-count press releases do not disclose top-customer revenue, churn, renewal cohorts or logo-to-ARR weights.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Request top-20 customer ARR, renewal history, churned customers, pipeline conversion and independent customer calls.
  - risk_id: R-004
    risk_title: Competitive pricing pressure in automation/orchestration
    risk_category: market
    severity: medium
    likelihood: high
    description: n8n competes against Zapier, Workato, Pipedream, Tray.ai, Make and other automation/AI-orchestration tools with different usage units and enterprise packaging.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Obtain win/loss analysis, competitive displacement data, discounting, CAC and pricing-sensitivity studies.
  - risk_id: R-005
    risk_title: Source-available licensing and enterprise monetization risk
    risk_category: legal
    severity: medium
    likelihood: medium
    description: n8n’s fair-code/Sustainable Use License and separate enterprise-license model may create buyer/community confusion and requires careful compliance for embedded or SaaS use.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.D
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Review license counsel memo, customer license templates, enterprise-feature boundaries and open-source/fork enforcement history.
  - risk_id: R-006
    risk_title: Security, credential and shared-responsibility exposure
    risk_category: technical
    severity: high
    likelihood: medium
    description: n8n workflows often connect sensitive systems and credentials; public security posture is directionally strong but SOC reports, exceptions, pen tests and incident history are private.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - VIII.G
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Review SOC 2/3 reports, pen-test findings, incident log, subprocessors, data flows, credential encryption and customer shared-responsibility controls.
  - risk_id: R-007
    risk_title: Open community metrics may not convert to paid revenue
    risk_category: market
    severity: medium
    likelihood: medium
    description: GitHub stars, active users and builders indicate adoption but do not prove paid conversion, retention or enterprise willingness to pay.
    impacted_chapter_ids:
      - I
      - V
      - VI
    impacted_section_ids:
      - I.B
      - V.C
      - VI.A
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Request PLG funnel metrics from signup to paid, cohort conversion, expansion and support cost.
  - risk_id: R-008
    risk_title: SAP/Joule partnership execution and dependency risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: The SAP strategic investment and Joule Studio embedding could accelerate enterprise distribution but may create integration delivery, support, exclusivity or roadmap-dependency risks.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.B
      - VI.B
      - VIII.F
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Review SAP commercial agreement, exclusivity/MFN terms, integration obligations, revenue commitments, SLAs and roadmap staffing.
  - risk_id: R-009
    risk_title: Legal, regulatory, IP and material-contract schedules unavailable
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public legal/security pages do not provide litigation, regulatory, insurance, IP ownership, patent/trademark, material contract or counsel-letter schedules.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Conduct counsel-led docket/registry searches and request legal schedules, IP assignments, insurance policies and material contracts.
  - risk_id: R-010
    risk_title: Team scaling and personnel metrics opaque
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public sources provide a stale 2021 team size and later hiring-growth statements, but not current headcount by function/location, attrition, compensation or stock-plan details.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
      - VII.D
      - VII.E
      - VII.F
      - VII.G
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Request org chart, HRIS export, compensation bands, incentive plans, hiring plan and attrition/employee-relations logs.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, ARR bridge, gross margin, burn, runway, backlog and AR aging.
    why_it_matters: Public valuation and ARR claims cannot be underwritten without financial quality evidence.
    suggested_source_or_request: Company finance data room; auditor/accountant support.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, option pool, investor rights, debt/SAFE/notes and SAP transaction terms.
    why_it_matters: Valuation, dilution and exit economics depend on security terms and strategic-investor rights.
    suggested_source_or_request: Corporate counsel and board-approved financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, top-customer concentration, churn and renewal cohorts.
    why_it_matters: Case studies do not prove diversified, durable ARR.
    suggested_source_or_request: Customer ARR schedule and independent customer calls.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, quotas, attainment, sales cycle, CAC/payback and channel attribution.
    why_it_matters: Enterprise expansion requires efficient GTM, especially after large funding rounds.
    suggested_source_or_request: CRM export, sales comp plan and pipeline reports.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, SAP integration plan, R&D budget, AI governance and technical dependency map.
    why_it_matters: AI orchestration and SAP embedding are central to valuation and execution risk.
    suggested_source_or_request: Product/R&D data room, architecture review and SAP project plan.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount by function/location, hiring plan, attrition and compensation/incentive plans.
    why_it_matters: Public headcount data is stale and scaling risk is material.
    suggested_source_or_request: HRIS export, org chart and compensation/stock-plan records.
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC reports, pen tests, incident history, subprocessors, privacy/regulatory correspondence and breach log.
    why_it_matters: n8n handles workflow credentials and sensitive enterprise integrations.
    suggested_source_or_request: Security data room, DPA/subprocessor list and counsel review.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP assignment chain, trademark/patent docket, contributor agreements and open-source dependency compliance.
    why_it_matters: Source-available licensing and enterprise monetization depend on clean IP rights.
    suggested_source_or_request: IP counsel memo, registry exports and dependency scan.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer/supplier contracts, SAP agreement, SLAs, indemnities and insurance policies.
    why_it_matters: Strategic and enterprise obligations can create contingent liabilities.
    suggested_source_or_request: Legal data room and insurance broker schedules.
    priority: high
  - gap_id: G-010
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, market share, pricing discounts and competitive displacement data.
    why_it_matters: Crowded automation/AI orchestration market may pressure pricing and growth.
    suggested_source_or_request: Sales/marketing analytics, customer interviews and analyst benchmark.
    priority: medium
