report_metadata:
  report_title: BlueVoyant Startup Diligence Research Report
  target_company: BlueVoyant
  website: https://www.bluevoyant.com/
  known_aliases:
    - BlueVoyant LLC
  sector: Cybersecurity / managed detection and response / third-party risk management
  geography: United States / international
  company_stage: Private unicorn
  research_date: 2026-06-12
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built existing-report exclusion list from reports/*-diligence-report.yaml and selected uncovered current-list unicorns with shuf -n 3.
    - Fetched Wikipedia and CB Insights current unicorn lists via public web/Jina sources.
    - Fetched company-owned pages and public source pages for product, customer, pricing, trust, leadership, and market evidence.
    - No private data-room materials, financial statements, customer references, counsel letters, or cap-table documents were provided.
  included_jurisdictions:
    - United States / international
  excluded_topics:
    - Non-public financial, legal, customer, employee, vendor, and cap-table records not available from public sources.
  user_provided_materials: []
founder_claims:
  - founder_claim_id: FC-001
    claim_text: BlueVoyant is a current private unicorn with latest public valuation of US$1B+.
    claim_source: Wikipedia and CB Insights current unicorn lists
    claim_date: 2026-06-12
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-012
    contradiction_summary: null
    diligence_follow_up:
      - Request latest financing documents, 409A, secondary transaction data, and cap table.
  - founder_claim_id: FC-002
    claim_text: BlueVoyant operates an active business in Cybersecurity / managed detection and response / third-party risk management.
    claim_source: Company-owned public website
    claim_date: 2026-06-12
    mapped_chapter_ids:
      - II
      - III
      - V
    mapped_section_ids:
      - II.A
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-002
      - EC-004
      - EC-008
    contradiction_summary: null
    diligence_follow_up:
      - Request customer references, contracts, product usage cohorts, and revenue tie-out.
executive_summary:
  overall_assessment: "BlueVoyant has credible public evidence of private-unicorn status and an operating public product footprint, but the highest-value diligence questions remain private: financial quality, customer economics, contract exposure, team retention, and legal/IP completeness."
  investment_or_diligence_thesis: BlueVoyant has credible public unicorn-status and operating evidence, plus meaningful product/customer metrics, but diligence must verify recurring revenue mix, gross margin, SOC capacity, customer retention, and security-claim substantiation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: BlueVoyant appears on Wikipedia and CB Insights unicorn lists at US$1B+.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: BlueVoyant sells an AI-driven cyber defense platform spanning MDR, third-party risk management, digital risk protection, and professional services.
      evidence_claim_ids:
        - EC-002
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, ARR, gross margin, cash burn, debt, backlog, and AR aging were not public.
    - risk_id: R-002
      summary: Latest public valuation anchor is US$1B+ around 2022-02; post-round performance and secondary pricing are not public.
    - risk_id: R-003
      summary: Public customer/marketplace signals do not disclose revenue concentration, net retention, churn, or cohort economics.
  key_evidence_gaps:
    - Audited financial statements, management reports, ARR bridge, burn, cash runway, AR aging, debt and off-balance-sheet liabilities.
    - Customer-level revenue, concentration, churn, renewal, and cohort data.
    - CAC, sales cycle, quota attainment, pipeline conversion, and marketing channel spend.
    - Roadmap cost, R&D staffing, vendor dependencies, incident history, and release quality metrics.
    - Headcount history, attrition, compensation, employment agreements, and option plans.
  recommended_next_steps:
    - Provide audited financials, monthly management reporting, ARR bridge, burn, cash runway, debt schedule, and board-approved operating plan.
    - Provide top-customer revenue, cohort retention, churn, renewal status, contract terms, and customer references.
    - Provide CAC/payback, quota attainment, pipeline conversion, and channel-spend analysis by cohort.
    - Provide roadmap, R&D budget, engineering allocation, vendor/subprocessor architecture, and security review.
    - Provide org chart, employment agreements, compensation bands, option plan, and attrition report.
