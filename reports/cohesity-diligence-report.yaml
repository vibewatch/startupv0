executive_summary:
  overall_assessment: "Cohesity can be diligenced as an active private unicorn:
    official sources confirm major private financings, a completed Veritas
    data-protection combination, and late-2025 commercial activity, while a
    September 2025 CNBC article frames IPO as prospective rather than completed.
    Public evidence is strongest on financing headlines, product marketing,
    named customers, and partner ecosystem breadth, and weakest on standalone
    financial quality, customer economics, merger leverage, and post-close
    integration detail."
  investment_or_diligence_thesis: The underwriting question is whether Cohesity
    can convert post-Veritas scale, partner-led distribution, and
    cyber-resilience positioning into durable cash generation after integration,
    cloud/GPU costs, and channel economics are normalized.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Official December 2024 disclosures support unicorn-scale combined
        operations after the Veritas close.
      evidence_claim_ids:
        - EC-005
        - EC-007
    - founder_claim_id: FC-003
      summary: The company publicly disclosed >$1.7B pro forma FY2024 revenue and
        $1.5B ARR at the December 2024 close.
      evidence_claim_ids:
        - EC-005
    - founder_claim_id: FC-004
      summary: Public product pages verify unified DataProtect and FortKnox
        positioning across on-prem, cloud, and SaaS workloads.
      evidence_claim_ids:
        - EC-009
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: Audited financial quality, cash flow, and standalone post-merger unit
        economics remain opaque.
    - risk_id: R-002
      summary: Post-Veritas integration and transaction financing terms are not public.
    - risk_id: R-004
      summary: Customer and supplier concentration can only be inferred from case
        studies and partner pages.
    - risk_id: R-005
      summary: Competition claims rely partly on vendor-authored compare pages rather
        than neutral benchmarks.
    - risk_id: R-007
      summary: Workforce optimization and leadership changes could disrupt execution
        during integration.
  key_evidence_gaps:
    - Standalone audited financial statements, monthly management reporting, and
      a bridge between legacy Cohesity, Veritas carve-out, and combined metrics.
    - Current fully diluted cap table, debt schedule, preference stack, and
      transaction financing documents.
    - Customer concentration, net retention, churn, pipeline coverage, supplier
      commitments, and price-book/gross-margin detail.
    - Gaia adoption metrics, roadmap timing confidence, model-cost assumptions,
      and security/control validation artifacts.
    - Material contracts, insurance, IP schedule, and counsel-grade
      litigation/regulatory review.
  recommended_next_steps:
    - Obtain audited FY2023-FY2025 standalone and pro forma financials, plus
      monthly KPI bridge to the public revenue/ARR headlines.
    - Review the current cap table, Series H/transaction financing documents,
      and any confidential IPO or strategic-process materials.
    - Run top-customer, channel, and hyperscaler concentration analysis using
      contract-level data and reference calls.
    - Deep-dive Gaia roadmap, recovery/security performance, and post-Veritas
      product/platform integration progress.
    - Have counsel review Commvault and HELIOS matters, public IP portfolio,
      material contracts, and any regulatory correspondence.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources strongly support Cohesity’s financing history,
      combined-company scale claims, and continued private funding through the
      Veritas combination, but they do not disclose audited financial quality,
      debt terms, or a full cap table.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
      - FC-007
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-022
      - EC-023
    risk_ids:
      - R-001
      - R-002
      - R-003
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Official releases provide a few operating anchors—such as
          recurring-revenue growth and combined-company revenue/ARR—but no
          audited financial statements, cash flow, backlog, AR aging, or
          product/channel/geography profitability schedules are public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public financial visibility is limited to selected growth and
              combined-company metrics rather than full standalone statements.
            evidence_claim_ids:
              - EC-005
              - EC-022
              - EC-023
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Undisclosed working-capital stress, gross-margin compression, or
            one-time integration costs could materially change the public scale
            narrative.
        evidence_gaps:
          - No public audited income statement, balance sheet, cash flow
            statement, backlog schedule, or AR aging for Cohesity standalone or
            combined operations.
        follow_up_questions:
          - Provide audited FY2023-FY2025 financial statements and monthly
            management reporting that tie to the public ARR/revenue claims.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-022
          - EC-023
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public quarterly or annual financial projection model was located.
          The accessible source set contains growth commentary and a prospective
          IPO article, but not a diligence-grade forecast package.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: Public sources do not provide Cohesity’s forward revenue, cash, capex,
              or financing projections.
            evidence_claim_ids:
              - EC-006
              - EC-022
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - A private forecast could rely on optimistic integration, ARR
            expansion, or IPO assumptions that are not visible publicly.
        evidence_gaps:
          - No public management forecast, scenario plan, or financing
            assumption schedule was located.
        follow_up_questions:
          - Provide the current operating plan, downside case, and financing
            assumptions used by management and the board.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-022
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify investor cohorts, transaction financing
          direction, and some post-close shareholder signaling, but not share
          counts, preferences, option pool, or debt terms.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: Capital-structure visibility is limited to named investors, strategic
              backers, and broad post-close shareholder language.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-004
              - EC-005
              - EC-006
              - EC-022
            risk_ids:
              - R-001
              - R-002
              - R-003
        hidden_risks:
          - Preferred-rights overhang, debt covenants, or option-refresh needs
            could be economically material and remain hidden from public view.
        evidence_gaps:
          - No public fully diluted cap table, debt maturity schedule, covenant
            package, or option-plan detail.
        follow_up_questions:
          - Provide the current fully diluted cap table, debt documents,
            warrant/option schedule, and shareholder-rights summary.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-005
          - EC-006
          - EC-022
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Cohesity’s financing history and selected operating milestones are
          reasonably well supported by official releases, but tax positions,
          accounting policies, and full financing documentation remain
          non-public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: The company’s official release trail documents a clear funding arc from
              early venture rounds to post-Veritas Series H financing.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
              - EC-004
              - EC-005
            risk_ids:
              - R-002
              - R-003
        hidden_risks:
          - The public financing trail does not reveal tax attributes,
            off-balance-sheet liabilities, or accounting-policy weaknesses.
        evidence_gaps:
          - No public tax memo, NOL schedule, revenue-recognition policy
            package, or detailed financing term sheets.
        follow_up_questions:
          - Provide tax, accounting-policy, and financing-history schedules with
            supporting executed documents.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-005
  - chapter_id: II
    title: Products
    chapter_summary: Cohesity’s core product narrative is publicly clear across
      DataProtect, FortKnox, Data Cloud bundles, and Gaia, but product
      economics, pricing realization, and roadmap execution still need private
      diligence.
    founder_claim_ids:
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-017
    risk_ids:
      - R-006
      - R-009
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public product evidence supports a multi-product enterprise
          data-protection platform spanning DataProtect, FortKnox, Data Cloud
          bundles, and Gaia, but market share, SKU profitability, roadmap
          timing, and public price cards remain incomplete.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: DataProtect and FortKnox are the clearest publicly documented core
              products, while Gaia is the clearest public AI extension.
            evidence_claim_ids:
              - EC-009
              - EC-010
              - EC-017
            risk_ids:
              - R-006
              - R-009
          - finding_id: II.A-F2
            finding: Packaging is public at the bundle/subscription level, but commercial
              pricing and margin realization are not.
            evidence_claim_ids:
              - EC-011
              - EC-022
            risk_ids:
              - R-001
              - R-010
        hidden_risks:
          - Bundle complexity or aggressive discounting could obscure true
            product-level margin quality and customer adoption patterns.
        evidence_gaps:
          - No public product P&L, roadmap confidence scoring, market-share
            study, or numeric price book.
        follow_up_questions:
          - Provide SKU-level pricing, gross margin, adoption by workload, and
            roadmap stage gates for major products and Gaia.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-009
          - EC-010
          - EC-011
          - EC-017
          - EC-022
  - chapter_id: III
    title: Customer Information
    chapter_summary: Named customer case studies and partner ecosystems are public,
      but customer concentration, revenue by customer, supplier spend, and
      severed-relationship history are largely non-public.
    founder_claim_ids:
      - FC-005
      - FC-007
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-014
      - EC-015
      - EC-022
    risk_ids:
      - R-004
      - R-009
      - R-010
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public case studies confirm named accounts and deployment details for
          customers such as Nasdaq and Maryland DoIT, but no full top-customer
          schedule or application-ranked concentration list is public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: III.A-F1
            finding: Named reference accounts exist and include both enterprise and
              public-sector use cases, but customer revenue contribution is
              undisclosed.
            evidence_claim_ids:
              - EC-012
              - EC-013
              - EC-014
              - EC-022
            risk_ids:
              - R-004
        hidden_risks:
          - Public logos can mask concentration, churn, or non-material contract
            sizes.
        evidence_gaps:
          - No top-15 customer list, product penetration by customer, or current
            ARR concentration disclosure.
        follow_up_questions:
          - Provide top customers by ARR, use case, contract duration, NRR, and
            renewal status.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-012
          - EC-013
          - EC-014
          - EC-022
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Cohesity’s partner ecosystem is broad and public, spanning
          hyperscalers, channel distributors, and GSIs, but the revenue
          contribution and contractual economics of those relationships remain
          private.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: III.B-F1
            finding: The company’s route to market is visibly partner-heavy, particularly
              across cloud, distribution, and integration channels.
            evidence_claim_ids:
              - EC-015
              - EC-007
              - EC-004
            risk_ids:
              - R-010
        hidden_risks:
          - A broad partner ecosystem can create dependency, rebate burden, or
            loss of direct pricing control.
        evidence_gaps:
          - No public revenue-share or margin-share disclosure by partner or
            channel type.
        follow_up_questions:
          - Provide partner contribution by bookings, ARR, gross margin, and
            pipeline sourced or influenced.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-015
          - EC-007
          - EC-004
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No public source in this review disclosed revenue by customer or any
          list of customers above 5% of revenue.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Customer concentration cannot be determined from the accessible public
              source set.
            evidence_claim_ids:
              - EC-012
              - EC-022
            risk_ids:
              - R-001
              - R-004
        hidden_risks:
          - A small number of customers or sectors may contribute
            disproportionate ARR or renewal risk without public visibility.
        evidence_gaps:
          - No public revenue-by-customer schedule or concentration threshold
            disclosure.
        follow_up_questions:
          - Provide customer concentration schedules with ARR, renewal dates,
            NRR, and any customer above 5% of revenue.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-012
          - EC-022
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No accessible public source disclosed a list of significant customer,
          partner, or supplier relationships severed within the last two years.
          The absence of public disclosure should not be read as proof that none
          occurred.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.D-F1
            finding: Severed-relationship visibility is poor in the Cohesity-only public
              source set.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-004
              - R-010
