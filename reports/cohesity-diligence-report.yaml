      Cohesity’s own materials, but most relative performance/TCO claims are
      vendor-authored and need neutral validation.
    founder_claim_ids:
      - FC-005
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-015
      - EC-016
    risk_ids:
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Cohesity publicly frames Rubrik and Commvault as core competitors and
          emphasizes cyber recovery, workload breadth, and efficiency as key
          differentiators. Most numeric superiority claims remain
          vendor-authored.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: The public basis of competition is clear, but neutral benchmarking is
              missing from the Cohesity-only evidence set.
            evidence_claim_ids:
              - EC-016
              - EC-009
              - EC-010
              - EC-015
            risk_ids:
              - R-005
        hidden_risks:
          - If third-party benchmarks contradict vendor-authored compare pages,
            headline competitive positioning could weaken materially.
        evidence_gaps:
          - No independent market-share, win-rate, or neutral TCO benchmark was
            accessed for this Cohesity-only report.
        follow_up_questions:
          - Provide win-loss data, third-party benchmarks, and customer
            references comparing Cohesity to Rubrik and Commvault.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
