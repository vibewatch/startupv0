risk_register:
  - risk_id: R-001
    risk_title: Financial transparency gap
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources provide revenue and ARR headlines but not audited
      standalone statements, cash flow, backlog, AR aging, gross margin, or a
      full post-merger bridge.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - III.C
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Obtain audited FY2023-FY2025 statements,
      monthly management packs, backlog, AR aging, and a combined-to-standalone
      KPI bridge.
  - risk_id: R-002
    risk_title: Post-Veritas integration and financing opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: The Veritas combination introduced new debt/equity financing, large
      shareholders, and integration complexity, but public sources do not show
      debt terms, synergy plan, or integration costs.
    impacted_chapter_ids:
      - I
      - VI
      - VIII
    impacted_section_ids:
      - I.C
      - I.D
      - VI.B
      - VIII.G
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review Series H documents, debt terms,
      integration scorecards, and board materials on synergy and restructuring
      assumptions.
  - risk_id: R-003
    risk_title: Valuation relies on combined-company narrative more than public
      standalone proof
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation anchors jumped from $2.5B to $3.7B to >$7B at the
      combination level, while current standalone economics and any pre-IPO
      readiness remain largely non-public.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.C
      - I.D
      - V.A
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request the latest board-mark framework,
      transaction materials, and any confidential IPO readiness analysis.
  - risk_id: R-004
    risk_title: Customer and supplier concentration are opaque
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Named customers and partner/supplier examples are public, but
      revenue concentration, NRR, churn, minimum cloud commitments, and supplier
      spend mix are not.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.E
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request top-customer ARR, cohort retention,
      supplier spend by vendor, and concentration thresholds by revenue and
      infrastructure cost.
  - risk_id: R-005
    risk_title: Competitive claims rely partly on vendor-authored comparisons
    risk_category: market
    severity: medium
    likelihood: high
    description: Cohesity explicitly targets Rubrik and Commvault, but the most
      detailed superiority claims available publicly are vendor-authored and
      need neutral validation.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Run independent win-loss analysis, customer
      references, and neutral technical benchmarking before relying on
      compare-page claims.
  - risk_id: R-006
    risk_title: AI and recovery roadmap execution risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Gaia and FortKnox are core public differentiation levers, but
      roadmap items, model economics, and operational recovery performance need
      diligence beyond marketing pages.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request shipped-feature inventory, roadmap
      confidence levels, recovery drill evidence, model-cost assumptions, and
      large-customer references.
  - risk_id: R-007
    risk_title: Leadership change and workforce optimization risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: 2020 and 2023 workforce actions, plus visible leadership changes,
      raise execution and retention questions during post-merger scaling.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
      - VII.F
      - VII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review attrition by function, retention
      packages, org changes, succession plans, and leadership-scorecard tracking
      after the Veritas combination.
  - risk_id: R-008
    risk_title: IP and trademark dispute exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Public records show both a defendant-side patent case and a
      plaintiff-side trademark declaratory-judgment case, even though both
      matters ultimately closed.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Have IP counsel review the Commvault and HELIOS
      matters, open claims, settlement scope, and broader patent/trademark
      portfolio defensibility.
  - risk_id: R-009
    risk_title: Sovereignty and cyber-resilience claims require control validation
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Cohesity markets sovereignty, compliance, and cyber-resilience
      heavily, but marketing statements are not the same as tested control
      evidence.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - V.A
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request compliance matrices, pen-test reports,
      recovery test evidence, and data-residency control documentation for key
      geographies and workloads.
  - risk_id: R-010
    risk_title: Partner-heavy GTM may reduce direct control over economics
    risk_category: operational
    severity: medium
    likelihood: medium
    description: A broad partner/distributor/GSI/cloud ecosystem can accelerate
      reach but may also dilute direct pricing control and margin visibility.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - V.A
      - V.C
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Ask for revenue split by direct vs channel vs
      cloud marketplace, partner concentration, rebates, and gross-margin
      waterfall by route to market.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited FY2023-FY2025 standalone and pro forma financial
      statements, including balance sheet, cash flow, backlog, and AR aging.
    why_it_matters: Without audited statements, public revenue/ARR headlines cannot
      be translated into quality-of-earnings or liquidity conclusions.
    suggested_source_or_request: Request auditor-issued statements, monthly board
      packs, and KPI definitions from finance and the external auditor.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, option pool, preference
      stack, and all debt terms tied to the Veritas transaction.
    why_it_matters: Ownership, liquidation rights, and leverage directly affect
      valuation and downside protection.
    suggested_source_or_request: Request cap-table exports, charter documents,
      investor rights agreements, and debt schedules from company and lead
      investors.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.D
    missing_information: Bridge between legacy Cohesity, Veritas carve-out, and
      combined pro forma metrics.
    why_it_matters: The public scale narrative is combined-company centric and can
      mask integration costs or weaker standalone economics.
    suggested_source_or_request: Request transaction model, synergy tracker, and
      post-close KPI bridge from finance.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer ARR, NRR, churn, renewal timing, and any
      customer above 5% of revenue.
    why_it_matters: Customer concentration and retention are central to underwriting
      recurring revenue quality.
    suggested_source_or_request: Request customer concentration schedules, cohort
      retention files, and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Hyperscaler, hardware, and partner spend commitments,
      including minimum purchase obligations and termination terms.
    why_it_matters: Infrastructure and supplier concentration drive margin quality
      and operational resilience.
    suggested_source_or_request: Request supplier-spend analysis, cloud commit
      schedules, and hardware/hosting contracts.
    priority: high
  - gap_id: G-006
    chapter_id: II
    section_id: II.A
    missing_information: Price book, discounting rules, product gross margins, and
      packaging migration path between Core/Enterprise/Essentials/Gaia.
    why_it_matters: Commercial pricing quality is opaque from public packaging pages alone.
    suggested_source_or_request: Request current price book, standard discount
      matrix, and product P&L views.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: Gaia adoption metrics, roadmap confidence levels,
      model-cost assumptions, security testing, and customer references.
    why_it_matters: Gaia is a major differentiation narrative but public roadmap
      items alone do not prove defensibility or demand.
    suggested_source_or_request: Request product roadmap, customer pipeline,
      recovery/quality SLAs, and architecture review with CTO/CPO teams.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, attrition by function, and
      post-merger integration staffing plan.
    why_it_matters: Third-party headcount estimates do not support execution or
      cost-base diligence.
    suggested_source_or_request: Request HRIS exports, org charts, and staffing plan from HR and operations.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.D
    missing_information: Executive compensation, retention packages, option awards,
      and change-of-control terms.
    why_it_matters: Retention economics and incentive alignment are hidden in public sources.
    suggested_source_or_request: Request board-approved comp summaries and option-plan documents.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer, cloud, partner, debt, and insurance contracts.
    why_it_matters: Contract obligations can reshape risk, margin, and exit-value assumptions.
    suggested_source_or_request: Request executed contract summary schedules and
      insurance binders from legal and finance.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Full patent, trademark, OSS, and inbound/outbound license schedule.
    why_it_matters: A single public patent and one trademark dispute do not
      establish freedom to operate or moat strength.
    suggested_source_or_request: Request IP schedule, open-source policy, and counsel memo from legal.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Counsel-grade litigation and regulatory memo, including any
      non-public claims, threatened actions, or correspondence.
    why_it_matters: Public docket mirrors may miss sealed, threatened, foreign, or
      settled matters.
    suggested_source_or_request: Request outside-counsel memo and litigation hold summary.
    priority: high
