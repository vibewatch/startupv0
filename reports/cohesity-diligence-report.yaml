  - figure_id: F-011
    title: Risk heatmap for the Cohesity public-source diligence view
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of the report’s risk register by severity and likelihood.
    purpose: Summarize the most material public-source diligence risks in one visual.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial transparency gap
          severity: high
          likelihood: high
          rationale: Public sources provide revenue and ARR headlines but not audited
            standalone statements, cash flow, backlog, AR aging, gross margin,
            or a full post-merger bridge.
          evidence_claim_ids: &a1
            - EC-005
            - EC-022
            - EC-023
          source_ids:
            - SRC-001
            - SRC-002
            - SRC-015
            - SRC-016
            - SRC-019
            - SRC-020
            - SRC-012
            - SRC-009
            - SRC-005
        - risk_id: R-002
          label: Post-Veritas integration and financing opacity
          severity: high
          likelihood: medium
          rationale: The Veritas combination introduced new debt/equity financing, large
            shareholders, and integration complexity, but public sources do not
            show debt terms, synergy plan, or integration costs.
          evidence_claim_ids: &a2
            - EC-003
            - EC-004
            - EC-005
          source_ids:
            - SRC-002
            - SRC-003
            - SRC-001
        - risk_id: R-003
          label: Valuation relies on combined-company narrative more than public
            standalone proof
          severity: high
          likelihood: medium
          rationale: Public valuation anchors jumped from $2.5B to $3.7B to >$7B at the
            combination level, while current standalone economics and any
            pre-IPO readiness remain largely non-public.
          evidence_claim_ids: &a3
            - EC-002
            - EC-003
            - EC-005
            - EC-006
          source_ids:
            - SRC-004
            - SRC-002
            - SRC-001
            - SRC-010
        - risk_id: R-004
          label: Customer and supplier concentration are opaque
          severity: high
          likelihood: unknown
          rationale: Named customers and partner/supplier examples are public, but revenue
            concentration, NRR, churn, minimum cloud commitments, and supplier
            spend mix are not.
          evidence_claim_ids: &a4
            - EC-012
            - EC-013
            - EC-014
            - EC-015
            - EC-022
          source_ids:
            - SRC-016
            - SRC-017
            - SRC-018
            - SRC-019
            - SRC-020
            - SRC-021
            - SRC-001
            - SRC-002
            - SRC-015
            - SRC-012
        - risk_id: R-005
          label: Competitive claims rely partly on vendor-authored comparisons
          severity: medium
          likelihood: high
          rationale: Cohesity explicitly targets Rubrik and Commvault, but the most
            detailed superiority claims available publicly are vendor-authored
            and need neutral validation.
          evidence_claim_ids: &a5
            - EC-016
          source_ids:
            - SRC-022
            - SRC-023
        - risk_id: R-006
          label: AI and recovery roadmap execution risk
          severity: medium
          likelihood: medium
          rationale: Gaia and FortKnox are core public differentiation levers, but roadmap
            items, model economics, and operational recovery performance need
            diligence beyond marketing pages.
          evidence_claim_ids: &a6
            - EC-010
            - EC-017
          source_ids:
            - SRC-014
            - SRC-024
            - SRC-025
            - SRC-026
        - risk_id: R-007
          label: Leadership change and workforce optimization risk
          severity: medium
          likelihood: medium
          rationale: 2020 and 2023 workforce actions, plus visible leadership changes,
            raise execution and retention questions during post-merger scaling.
          evidence_claim_ids: &a7
            - EC-008
            - EC-019
            - EC-020
          source_ids:
            - SRC-012
            - SRC-028
            - SRC-029
            - SRC-030
        - risk_id: R-008
