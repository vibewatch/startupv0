          - Terminated cloud, channel, or large-customer relationships could be
            materially relevant and remain private.
        evidence_gaps:
          - No public severed-relationship list, contract termination summary,
            or unusual churn commentary.
        follow_up_questions:
          - Provide a list of material terminated customer, partner, and
            supplier relationships from the last 24 months and reasons for
            termination.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-022
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public sources let the reviewer infer meaningful dependencies on AWS,
