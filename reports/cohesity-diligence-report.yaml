evidence_claims:
  - evidence_claim_id: EC-001
    claim: Official Cohesity releases disclose a multi-round private funding history
      from Series A/B through Series E, reaching more than $650M total funding
      by April 2020.
    evidence_summary: Cohesity’s 2015, 2017, 2018, and 2020 press releases provide
      the clearest public funding trail before the Veritas transaction.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-008
      - SRC-007
      - SRC-006
      - SRC-005
    quoted_evidence:
      - source_id: SRC-008
        quote: today announced it has raised a total of $70 million in venture capital
          funding ... The company closed a Series A round of $15 million ...
          followed up last month by a $55 million Series B investment round
        location: body
      - source_id: SRC-007
        quote: raising over $90 million in a Series C round co-led by investors GV ...
          and Sequoia Capital
        location: body
      - source_id: SRC-006
        quote: raised $250 million in an oversubscribed Series D funding round led by
          the SoftBank Vision Fund
        location: body
      - source_id: SRC-005
        quote: today announces $250 million in Series E funding ... Company Now Valued
          at $2.5 Billion
        location: headline/body
    analyst_interpretation: The official source set supports a long-running
      private-financing cadence and a venture-backed capital structure well
      before the Veritas combination.
    limitations: Funding history is public, but share classes, ownership
      percentages, and post-money cap table by round are not disclosed.
    associations:
      chapter_id: I
      section_id: I.D
      founder_claim_ids: []
      table_ids:
        - T-001
      figure_ids:
        - F-001
      risk_ids:
        - R-003
  - evidence_claim_id: EC-002
    claim: A March 2021 employee tender established a $3.7B valuation without
      primary dilution.
    evidence_summary: Cohesity publicly described a non-dilutive employee liquidity
      event anchored to a $3.7B valuation.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-004
    quoted_evidence:
      - source_id: SRC-004
        quote: today announced a new company valuation of $3.7 billion
        location: body
      - source_id: SRC-004
        quote: The valuation was established in line with a $145 million tender offer
          ... This non-dilutive transaction was led by STEADFAST Capital
          Ventures
        location: body
    analyst_interpretation: The tender supplies a public valuation anchor between
      the 2020 Series E and the 2024 combined-company mark.
    limitations: Tender price is not a full-market valuation process and does not
      replace a current priced financing or audited fairness analysis.
    associations:
      chapter_id: I
      section_id: I.C
      founder_claim_ids: []
      table_ids:
        - T-001
        - T-002
