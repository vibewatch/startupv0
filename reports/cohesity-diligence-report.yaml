report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: Cohesity"
  target_company: Cohesity
  website: https://www.cohesity.com/
  known_aliases:
    - Cohesity, Inc.
  sector: AI-powered data security, data management, and cyber resilience software
  geography: United States headquartered; global enterprise and public-sector footprint
  company_stage: Private unicorn / late-stage post-Veritas combination
  research_date: 2026-06-17
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only
    - Prioritized official Cohesity pages, public legal-record mirrors, public
      patent/trademark summaries, and accessible independent trade/news coverage
    - Facts unavailable from public sources are explicitly marked
      not_publicly_verifiable or inconclusive
    - Research kept specific to Cohesity and did not rely on non-public
      data-room materials or paid database exports
  included_jurisdictions:
    - United States
    - Canada
    - Global customer and partner operations
  excluded_topics:
    - Non-public financial statements and data-room exports
    - Customer, supplier, or employee interviews
    - Paid market-intelligence products beyond publicly viewable pages
    - Personal data beyond public company/professional profiles
    - Legal advice or counsel-grade docket review
  user_provided_materials: []
