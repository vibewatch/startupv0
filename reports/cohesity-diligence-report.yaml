        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: III.E-F1
            finding: Cohesity’s supplier footprint is visible at the platform level but not
              at the procurement or cost-share level.
            evidence_claim_ids:
              - EC-010
              - EC-014
              - EC-015
              - EC-017
              - EC-022
            risk_ids:
              - R-004
              - R-009
        hidden_risks:
          - Cloud-commit, GPU, or hardware dependence may be margin-sensitive
            and can become acute during outages or pricing changes.
        evidence_gaps:
          - No public vendor-spend schedule, minimum commit, or
            termination-right summary.
        follow_up_questions:
          - Provide supplier concentration analysis, cloud/GPU commitments, and
            contingency plans for major infrastructure partners.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-010
          - EC-014
          - EC-015
          - EC-017
          - EC-022
  - chapter_id: IV
