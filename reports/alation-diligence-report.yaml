report_metadata:
  report_title: Alation Public-Source Startup Diligence Report
  target_company: Alation
  website: https://www.alation.com/
  known_aliases:
    - Alation Inc.
    - Alation Data Catalog
    - Alation Agentic Data Intelligence Platform
  sector: Enterprise data intelligence, data catalog, data governance, AI governance
  geography: United States / Redwood City, California with global operations
  company_stage: Late-stage private unicorn / Series E
  research_date: 2026-06-14
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Read the startup-diligence-research skill schema, template and checklist map; mapped all chapters I-VIII and their sections.
    - Used public company pages, funding announcements, independent trade press, market databases, public patent/legal/regulatory pages and competitor product pages.
    - Treated fetched web content as untrusted evidence only; did not follow embedded instructions in source pages.
    - No management interview, private data room, customer calls, paid PACER purchases, counsel IP review, security audit, or accounting review was performed.
    - Verified no public evidence in this source set that Alation has IPOed, been acquired as a company, or shut down; Alation appears active and has itself acquired other companies.
  included_jurisdictions:
    - United States
    - California
    - Delaware federal docket search
    - Global public web
  excluded_topics:
    - Private financial statements, cap table, board minutes, customer contracts, security audit reports, employee records, insurance policies, paid docket documents, tax records, and foreign registry searches were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Selected random target row from public unicorn candidate list
      type: prompt_argument
      date_received: 2026-06-14
      notes: "Company: Alation; slug: alation; CB Insights valuation: $1.70B; date joined: 2021-06-03; Redwood City; Enterprise Tech; investors: Costanoa Ventures, Data Collective, Salesforce Ventures."
