executive_summary:
  overall_assessment: "Proceed to private diligence before underwriting. Public evidence supports an active late-stage private data-intelligence company with a 2022 $1.7B+ valuation, $100M+ ARR claim, named enterprise customers, broad product scope and active AI roadmap. Material investment questions remain private: current ARR quality, gross margin, burn, runway, customer concentration, retention, cap-table terms, product adoption by module, security reports, and legal/IP clearance."
  investment_or_diligence_thesis: Alation is a credible enterprise-data unicorn positioned at the intersection of data catalog, governance and AI readiness. The upside case depends on converting catalog leadership into durable platform expansion while defending against Collibra, Informatica, Microsoft Purview, Atlan and other AI-data platforms. The report should be used as a public-source screen, not a final investment memo.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public funding sources support a Series E valuation of more than $1.7B and total funding of $340M.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-005
    - founder_claim_id: FC-002
      summary: Current product pages support broad data-intelligence, catalog, governance and AI governance scope.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
    - founder_claim_id: FC-003
      summary: Public sources support enterprise traction through named logos, Fortune 100 penetration claims and Databricks/Snowflake relationships.
      evidence_claim_ids:
        - EC-005
        - EC-010
        - EC-011
        - EC-025
  biggest_risks:
    - risk_id: R-001
      summary: Current financial quality and runway are not public.
    - risk_id: R-004
      summary: Crowded data-governance and AI-data-platform competition may pressure pricing and win rates.
    - risk_id: R-003
      summary: Customer concentration, retention and logo-currentness are not publicly verifiable.
  key_evidence_gaps:
    - Audited financials, ARR bridge, gross margin, burn, cash runway, debt, AR aging and revenue by product/channel/geography.
    - Fully diluted cap table, liquidation preferences, investor rights, option pool, warrants/notes/SAFEs and 2022-to-current valuation bridge.
    - Top customer revenue concentration, cohort retention, churn, renewal timing, references and severed relationships.
    - Product adoption by module, cloud/infrastructure costs, security audit reports, SOC/ISO evidence, incident logs and data-processing agreements.
    - Counsel-led litigation, patent/trademark, open-source, employment, privacy/regulatory, contract and insurance diligence.
  recommended_next_steps:
    - Open a financial/cap-table data room before discussing valuation or deal structure.
    - Run customer and partner diligence calls, prioritizing named Fortune 100/global logos and Databricks/Snowflake ecosystem references.
    - Commission security, privacy, IP/open-source and litigation diligence, including the terminated BrightPlanet case file and patent assignments.
    - Reconcile headcount and operating-plan signals with HRIS data, hiring plan, attrition and compensation records.
