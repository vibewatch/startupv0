risk_register:
  - risk_id: R-001
    risk_title: Current financial quality, burn and runway are private
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources disclose historical funding and stale ARR but not audited financials, current ARR, gross margin, cash, burn, debt or runway.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.D
    evidence_claim_ids:
      - EC-005
      - EC-026
      - EC-027
    mitigation_or_diligence_request: Obtain audited financials, monthly management accounts, ARR/cohort bridge, cash/debt schedule, gross margin and board plan.
  - risk_id: R-002
    risk_title: 2022 valuation may exceed current market-clearing value
    risk_category: financing
    severity: high
    likelihood: medium
    description: The public valuation stepped from $1.2B in 2021 to more than $1.7B in 2022; current fair value is not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-026
    mitigation_or_diligence_request: Request 409A reports, secondary transactions, investor marks, liquidation stack and down-round/ratchet terms.
  - risk_id: R-003
    risk_title: Customer concentration, retention and logo-currentness are not public
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public logos and customer counts do not disclose active status, ARR concentration, NRR/GRR, churn or renewal health.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-010
      - EC-025
      - EC-026
    mitigation_or_diligence_request: Request top-customer schedules, references, renewal calendars, churn analyses and cohort retention.
  - risk_id: R-004
    risk_title: Crowded category and suite competition may pressure pricing
    risk_category: market
    severity: high
    likelihood: high
    description: Alation faces data catalog/governance competition from Collibra, Atlan, Informatica, Microsoft Purview and other vendors named by TechTarget.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-005
      - EC-021
      - EC-022
      - EC-023
      - EC-024
      - EC-027
    mitigation_or_diligence_request: Review win/loss, displacement metrics, pricing/discounting, analyst reports and customer references versus key competitors.
  - risk_id: R-005
    risk_title: Agentic AI roadmap and Numbers Station integration risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Alation is expanding into agentic AI and AI governance; the Numbers Station acquisition has undisclosed terms and integration milestones.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-006
      - EC-008
      - EC-012
    mitigation_or_diligence_request: Review acquisition agreement, retention plan, product roadmap, beta metrics, AI reliability and integration milestones.
  - risk_id: R-006
    risk_title: Security, privacy and compliance proof is mission critical
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Alation handles enterprise metadata and governance use cases; public trust claims need independent report and incident verification.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids:
      - EC-009
    mitigation_or_diligence_request: Review SOC/ISO reports, pentests, incident logs, DPAs, subprocessors and privacy/regulator correspondence.
  - risk_id: R-007
    risk_title: IP ownership and historical patent litigation require counsel review
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Alation has public patents and a terminated BrightPlanet lawsuit; pleadings, settlement and encumbrances were not reviewed.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.A
      - VIII.D
    evidence_claim_ids:
      - EC-017
      - EC-018
    mitigation_or_diligence_request: Run IP ownership, patent family, settlement/license, open-source and litigation diligence.
  - risk_id: R-008
    risk_title: Headcount and operating-model signals are inconsistent
    risk_category: team
    severity: medium
    likelihood: medium
    description: Company-reported 2022 headcount of more than 700 conflicts with Tracxn’s lower 2025 estimate; actual workforce and attrition are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.G
    evidence_claim_ids:
      - EC-005
      - EC-015
      - EC-016
    mitigation_or_diligence_request: Request HRIS exports, attrition, open roles, compensation, morale/engagement and succession data.
  - risk_id: R-009
    risk_title: Partner and data-platform dependency risk
    risk_category: operational
