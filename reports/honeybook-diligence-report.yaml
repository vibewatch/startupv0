      - EC-025
    mitigation_or_diligence_request: Review processor agreements, funds-flow diagrams, chargeback/refund history, PCI scope, money-transmission analysis and compliance exams.
  - risk_id: R-008
    risk_title: Workforce retention and compensation opacity
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public careers and old headcount points do not disclose current headcount, attrition, compensation commitments, option liabilities or employee-relations issues.
