diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, KPI pack, gross margin, cash/debt, AR/deferred revenue and tax records.
    why_it_matters: Required to validate ARR quality, profitability, runway and valuation support.
    suggested_source_or_request: Finance data room and accountant/auditor interviews.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preferences, debt, side letters and option pool.
    why_it_matters: Determines true ownership economics and downside protection.
    suggested_source_or_request: Company counsel and CFO cap-table package.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer-level ARR, NRR/GRR, churn, refunds and top-customer concentration.
    why_it_matters: Tests durability of SMB revenue base and concentration risk.
    suggested_source_or_request: Billing/customer data exports and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: IV
    section_id: IV.A
    missing_information: Independent win/loss and competitor switching data.
    why_it_matters: Company comparison pages are biased and do not prove defensibility.
    suggested_source_or_request: Customer calls, CRM loss reasons and third-party market benchmarking.
    priority: medium
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, channel mix, quota attainment and pipeline conversion.
    why_it_matters: Growth efficiency is central to justifying the valuation.
    suggested_source_or_request: GTM KPI pack, CRM exports and marketing attribution data.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: AI evaluation methodology, model/vendor contracts, roadmap and Fine.dev integration terms.
    why_it_matters: AI claims influence product differentiation and regulatory/IP risk.
    suggested_source_or_request: Product/R&D roadmap and AI governance data room.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Current HRIS, org chart, headcount plan, attrition and compensation/equity records.
    why_it_matters: Validates execution capacity, retention and dilution/cash obligations.
    suggested_source_or_request: HRIS export and people-ops data room.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Counsel-run litigation, arbitration, demand-letter and settlement schedule.
    why_it_matters: Public search cannot prove absence of claims.
    suggested_source_or_request: Outside counsel memo and company legal schedule.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official IP inventory, assignments, open-source/model licenses and Fine.dev transfer documents.
    why_it_matters: AI/product strategy depends on clean IP and data rights.
    suggested_source_or_request: Counsel IP schedule and TSDR/assignment searches.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC reports, pen tests, subprocessors, incident logs, PCI scope, DSR logs and regulatory correspondence.
    why_it_matters: Privacy/security/payments controls are critical for SaaS/payments workflows.
    suggested_source_or_request: Security/counsel compliance data room.
    priority: high
