report_metadata:
  report_title: HoneyBook Startup Diligence Report
  target_company: HoneyBook
  website: https://www.honeybook.com/
  known_aliases:
    - HoneyBook
    - HoneyBook, Inc.
    - HoneyBook.com
    - HYBK
  sector: AI-enabled CRM, clientflow, payments and business-management software for independent businesses
  geography: United States and Canada focus; San Francisco and Tel Aviv operating footprint in public sources
  company_stage: Private unicorn / growth-stage SaaS and fintech-adjacent SMB platform
  research_date: 2026-05-21
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used startup-diligence-research workflow at standard depth with public-source research only.
    - Prioritized company-owned pages, pricing, about, reviews, alternatives, careers, trust, privacy, terms and newsroom materials.
    - Corroborated financing/valuation/ARR claims with independent news where available.
    - Searched public web, review/complaint and legal/IP/security indicators for hidden risks; treated absence of search hits as inconclusive, not exculpatory.
    - Marked financial, customer, legal, personnel, supplier and contract items not available publicly as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - California
    - Israel operating footprint where public sources mention Tel Aviv
    - Canada market references where company positioning applies
  excluded_topics:
    - No private data room, audited financial statements, customer reference calls, cap table, board materials, legal docket memorandum, SOC reports, HRIS or contracts were available.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for single HoneyBook diligence report and CB Insights-style unicorn row
      type: workflow_request
      date_received: 2026-05-21
      notes: User requested exactly reports/honeybook-diligence-report.yaml with standard-depth report and no other repository edits.
