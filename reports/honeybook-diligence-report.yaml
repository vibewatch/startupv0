risk_register:
  - risk_id: R-001
    risk_title: Unaudited financial quality and revenue efficiency
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public sources provide ARR, funding and platform volume signals but not audited revenue, gross margin, retention, CAC, burn or cash/debt.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-004
      - EC-019
      - EC-022
    mitigation_or_diligence_request: Request audited financials, KPI pack, cohort retention, cash/debt schedule, forecast model, CAC/payback and board-approved budget-to-actuals.
  - risk_id: R-002
    risk_title: Valuation and preference-stack opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $2.4B valuation is public, but current valuation, dilution, liquidation preferences, side letters, debt and option-pool economics are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-026
    mitigation_or_diligence_request: Review primary financing documents, pro forma cap table, option pool, preferences, debt and current 409A/fair-value marks.
  - risk_id: R-003
    risk_title: SMB customer churn and concentration unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: HoneyBook claims a large SMB base, but top-customer revenue, cohort churn, NRR and support/dispute patterns are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-015
      - EC-020
    mitigation_or_diligence_request: Request ARR by customer/cohort, logo and revenue retention, cancellations, refunds, disputes and independent customer references.
  - risk_id: R-004
    risk_title: Crowded horizontal/vertical SMB software competition
    risk_category: market
    severity: medium
    likelihood: high
    description: HoneyBook overlaps with CRM, proposals, scheduling, e-signature, accounting, payments and AI tools, creating pricing and bundling pressure.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-021
      - EC-022
    mitigation_or_diligence_request: Perform win/loss calls, competitor price benchmarking, customer switching-cost analysis and product-adoption depth review.
  - risk_id: R-005
    risk_title: AI product defensibility and product-liability exposure
    risk_category: product
    severity: medium
    likelihood: medium
    description: AI usage/performance claims and Fine.dev acquihire create upside but require validation of data rights, model quality, safety, reliability and differentiation.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.D
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-018
      - EC-023
    mitigation_or_diligence_request: Review AI roadmap, evaluation data, model/vendor contracts, data-use consents, IP assignments and AI incident/complaint logs.
  - risk_id: R-006
    risk_title: Privacy, security and data-governance obligations
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: The platform handles client, invoice, payment and potentially AI/meeting-recording data; public controls are self-reported and need independent validation.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VIII.G
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-014
      - EC-025
    mitigation_or_diligence_request: Request SOC 2, pen tests, subprocessors, data maps, DPA templates, DSR logs, incident history and AI governance artifacts.
  - risk_id: R-007
    risk_title: Payments, chargeback and financial-services compliance exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Invoices and payments are core product flows; public terms and trust pages do not disclose processor contracts, chargebacks, funds-flow or compliance audits.
    impacted_chapter_ids:
