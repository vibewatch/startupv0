executive_summary:
  overall_assessment: Articulate is a credible late-stage private learning-software unicorn with strong public evidence for its 2021 financing, valuation, founder history, product suite, published pricing, and broad aggregate customer reach. The public record cannot validate current ARR, growth, margin, cash runway, churn, customer concentration, or whether the 2021 valuation remains supportable.
  investment_or_diligence_thesis: Test whether Articulate can convert an established authoring franchise and large customer base into durable AI-enabled learning, localization, and delivery growth while defending pricing against learning suites, LMS vendors, and low-cost AI course-generation tools.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Articulate raised a $1.5B Series A at a $3.75B valuation in 2021.
      evidence_claim_ids:
        - EC-001
        - EC-002
  biggest_risks:
    - risk_id: R-001
      summary: Articulate has a verified 2021 valuation anchor, but current ARR, growth, cash, debt, margin, and valuation marks are not public.
    - risk_id: R-002
      summary: Organization, learner, and country counts are aggregate marketing metrics that do not reveal billable ARR, active usage, churn, or top-account concentration.
    - risk_id: R-003
      summary: Articulate competes with specialist authoring tools, broader learning suites, LMS vendors, and lower-cost AI content creation alternatives.
    - risk_id: R-004
      summary: AI, localization, and Reach expansion may require investment before clear revenue contribution and add privacy/security diligence obligations.
  key_evidence_gaps:
    - Current audited financials, ARR/revenue/GMV bridge, gross margin, EBITDA, cash runway, debt, and working-capital schedules.
    - Customer, seller, partner, supplier, and channel concentration with contract terms, churn/retention, cohort economics, and references.
    - Fully diluted cap table, investor rights, material contracts, insurance, litigation, regulatory, IP, security, and HR schedules.
  recommended_next_steps:
    - Request finance, cap-table, customer, supplier, HR, product, security, legal, insurance, and contract data-room packs.
    - Reconcile public scale metrics to current billable revenue, usage, retention, gross margin, and cash conversion.
    - Run management, customer, supplier, counsel, auditor, and key investor calls around the risk register.
