report_metadata:
  report_title: Articulate Public-Source Startup Diligence Report
  target_company: Articulate
  website: https://www.articulate.com/
  known_aliases:
    - Articulate Global, LLC
    - Articulate 360
    - Rise
    - Storyline
  sector: Enterprise learning, e-learning authoring, AI course creation, localization, and learning-delivery SaaS
  geography: United States headquartered with global customer claims across 187 countries
  company_stage: Late-stage private unicorn
  research_date: 2026-05-24
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and selected this company as one of three random uncovered private unicorn targets from the CB Insights Global Unicorn Club list.
    - Prioritized public company-owned, investor, funding, partner, and reputable market-database sources for Articulate.
    - Marked private financial statements, customer concentration, churn, debt, cap table, material contracts, litigation dockets, insurance policies, employee records, and detailed roadmap economics as evidence gaps rather than estimating them.
    - No private data-room materials, interviews, paid databases, or access-controlled systems were used.
  included_jurisdictions:
    - United States
    - Global enterprise customer jurisdictions
  excluded_topics:
    - No management, customer, investor, supplier, counsel, auditor, regulator, or employee interviews were performed.
    - No paid court-docket, lien, sanctions, patent, insurance, credit, app-analytics, or market-share databases were accessed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-24
      notes: The user requested three new public-source diligence reports for randomly selected uncovered private unicorns and a draft PR.
