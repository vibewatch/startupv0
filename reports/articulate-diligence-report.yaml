risk_register:
  - risk_id: R-001
    risk_title: Stale 2021 valuation and undisclosed current financials
    risk_category: financial
    severity: high
    likelihood: medium
    description: Articulate has a verified 2021 valuation anchor, but current ARR, growth, cash, debt, margin, and valuation marks are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-012
    mitigation_or_diligence_request: Request audited financials, monthly KPIs, investor marks, cash/debt schedule, and cap table.
  - risk_id: R-002
    risk_title: Customer concentration and active-customer definition risk
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Organization, learner, and country counts are aggregate marketing metrics that do not reveal billable ARR, active usage, churn, or top-account concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-005
      - EC-012
    mitigation_or_diligence_request: Request cohort, top-account ARR, churn, NRR, logo-definition, and reference schedules.
  - risk_id: R-003
    risk_title: Competitive pressure in learning-authoring and LMS markets
    risk_category: market
    severity: medium
    likelihood: high
    description: Articulate competes with specialist authoring tools, broader learning suites, LMS vendors, and lower-cost AI content creation alternatives.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.A
    evidence_claim_ids:
      - EC-007
      - EC-004
    mitigation_or_diligence_request: Review win/loss data, competitive discounts, attach rates, and roadmap differentiation.
  - risk_id: R-004
    risk_title: AI and localization execution risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: AI, localization, and Reach expansion may require investment before clear revenue contribution and add privacy/security diligence obligations.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.F
    evidence_claim_ids:
      - EC-004
      - EC-009
      - EC-011
    mitigation_or_diligence_request: Request AI governance, product adoption, support tickets, roadmap milestones, and security attestations.
  - risk_id: R-005
    risk_title: Security and enterprise procurement exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Learning content may contain sensitive internal employee/customer data, and public trust pages do not substitute for audit reports and incident history.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.F
      - II.A
    evidence_claim_ids:
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Request SOC 2, penetration tests, DPAs, incident register, subprocessor list, and AI data-use policy.
  - risk_id: R-006
    risk_title: Scale metrics not tied to revenue quality
    risk_category: operational
    severity: medium
    likelihood: unknown
    description: Learner, organization, and country counts are not enough to assess ARR durability, support costs, or margin.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - V.A
    evidence_claim_ids:
      - EC-005
      - EC-008
    mitigation_or_diligence_request: Reconcile scale metrics to billable accounts, ARR, gross margin, NRR, and support costs.
