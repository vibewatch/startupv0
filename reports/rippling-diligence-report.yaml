report_metadata:
  report_title: "Rippling Startup Diligence Report"
  target_company: "Rippling"
  website: "https://www.rippling.com/"
  known_aliases:
    - "People Center, Inc. d/b/a Rippling"
    - "People Center, Inc."
    - "Rippling People Center Inc."
  sector: "Enterprise workforce management software spanning HR, payroll, IT, finance, spend, and global employment infrastructure"
  geography: "United States; headquartered in San Francisco with public global recruiting and operations signals"
  company_stage: "Private unicorn / Series G (public-source status)"
  research_date: "2026-05-31"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "America/Los_Angeles"
research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Started from the user-supplied CB Insights Rippling unicorn row and verified against CB Insights public tracker/profile."
    - "Prioritized primary company product, customer, trust, privacy, and careers pages plus SEC EDGAR public filing checks."
    - "Supplemented with independent legal reporting and competitor-owned pages for market context."
    - "Did not bypass paywalls, bot checks, authentication, private systems, or legal databases; unavailable facts are marked not_publicly_verifiable."
  included_jurisdictions:
    - "United States"
    - "Ireland / European Union public lawsuit and privacy/security context"
    - "United Kingdom, Canada, Australia, France, Germany public recruiting/localization signals"
    - "Global payroll/EOR jurisdictions at screen level only"
  excluded_topics:
    - "Audited financial statements, cap table, board materials, customer contracts, HRIS, security reports, counsel schedules, and paid legal/IP/regulatory databases were unavailable."
  user_provided_materials:
    -
      material_id: "UPM-001"
      title: "CB Insights unicorn row for Rippling"
      type: "workflow_request"
      date_received: "2026-05-31"
      notes: "User specified valuation $16.8B, joined 2020-08-04, San Francisco, Enterprise Tech, and required verification that Rippling has not IPOed, been acquired, or shut down."
founder_claims:
