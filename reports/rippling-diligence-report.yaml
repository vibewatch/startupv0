executive_summary:
  overall_assessment: "Rippling appears to remain an active private unicorn with strong public evidence of product breadth, customer adoption signals, security certifications, and global recruiting. The underwrite still turns on private financial quality, retention, module economics, cap table terms, global payroll compliance, security report scope, and Deel litigation exposure."
  investment_or_diligence_thesis: "The diligence question is whether Rippling can convert a broad HR/payroll/IT/finance/global platform into durable, high-margin enterprise ARR while managing sensitive data, payroll funds-flow, global employment compliance, intense competition, and public litigation risk."
  strongest_verified_claims:
    -
      founder_claim_id: "FC-001"
      summary: "CB/SEC/company evidence supports private operating unicorn status with no reviewed evidence of IPO, acquisition, or shutdown."
      evidence_claim_ids:
        - "EC-001"
        - "EC-002"
        - "EC-003"
        - "EC-022"
    -
      founder_claim_id: "FC-002"
      summary: "Rippling-owned pages verify broad suite positioning across HR, Payroll, IT, Finance, Global, AI, and workflows."
      evidence_claim_ids:
        - "EC-005"
        - "EC-006"
        - "EC-007"
        - "EC-008"
    -
      founder_claim_id: "FC-005"
      summary: "Trust/privacy pages verify public security/compliance posture and sensitive data processing, subject to report-scope review."
      evidence_claim_ids:
        - "EC-010"
        - "EC-011"
        - "EC-024"
  biggest_risks:
    -
      risk_id: "R-001"
      summary: "High valuation/private financing status cannot be underwritten without audited financials, ARR bridge, margins, cash/burn, debt, runway, and marks."
    -
      risk_id: "R-003"
      summary: "Rippling competes with many incumbents and specialists, creating pricing, discounting, churn, and sales-efficiency risk."
    -
      risk_id: "R-002"
      summary: "The Deel litigation is public and material; merits, damages, insurance, and reputation/sales impact remain unresolved."
  key_evidence_gaps:
    - "Audited financials, ARR/revenue bridge, gross margin, cash, burn, debt, runway, cap table, preferences, and financing terms."
    - "Customer concentration, paid customer count, NRR, churn, pipeline, CAC/payback, sales productivity, and references."
    - "Module-level economics, reliability, architecture, AI governance, security reports, incident history, and payroll/payment controls."
    - "Litigation docket/counsel memo, regulatory correspondence, insurance, material contracts, IP/OSS schedules, and HRIS/comp/turnover data."
  recommended_next_steps:
    - "Run financial quality-of-revenue, ARR, margin, burn/runway, and valuation-mark diligence."
    - "Validate customer adoption with billing data, top-customer schedules, NRR/churn cohorts, and references."
    - "Review product/security architecture, SOC/ISO reports, incident history, AI governance, bank/payment/EOR contracts, and global compliance controls."
    - "Commission counsel-led litigation, regulatory, IP, contract, insurance, employment, and corporate-status review."
