  - figure_id: F-011
    title: Risk register heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Full risk-register heatmap for Fox ESS.
    purpose: Show relative severity and likelihood across diligence risks.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Valuation and IPO-transition risk
          severity: high
          likelihood: medium
          rationale: Public valuation signals are database/trade-source based, while IPO timing and primary financing terms are not available.
          evidence_claim_ids:
            - EC-001
            - EC-003
            - EC-009
            - EC-010
          source_ids:
            - SRC-001
        - risk_id: R-002
          label: Cap table, related-party and pre-IPO rights opacity
          severity: high
          likelihood: medium
          rationale: Tsingshan affiliation, pre-IPO financing and investor rights could materially affect proceeds and control.
          evidence_claim_ids:
            - EC-004
            - EC-009
          source_ids:
            - SRC-001
        - risk_id: R-003
          label: Customer/channel concentration and warranty exposure
          severity: high
          likelihood: unknown
          rationale: Customer revenue, installer concentration, warranty returns and geographic sell-through are not public.
          evidence_claim_ids:
            - EC-007
            - EC-011
          source_ids:
            - SRC-001
        - risk_id: R-004
          label: Hardware margin and manufacturing execution risk
          severity: medium
          likelihood: medium
          rationale: Rapid product expansion and manufacturing capacity claims require validation against BOM costs, yields and supply-chain terms.
          evidence_claim_ids:
            - EC-002
            - EC-004
            - EC-008
          source_ids:
            - SRC-001
        - risk_id: R-005
          label: Technical roadmap and product-quality validation
          severity: medium
          likelihood: medium
          rationale: Company-owned R&D claims do not prove comparative performance, cyber posture or field reliability.
          evidence_claim_ids:
            - EC-006
            - EC-008
          source_ids:
            - SRC-001
        - risk_id: R-006
          label: International regulatory and trade exposure
          severity: medium
          likelihood: medium
          rationale: Global energy hardware sales may face certification, grid-code, tariff and sanctions/export-control risk.
          evidence_claim_ids:
            - EC-007
            - EC-012
          source_ids:
            - SRC-001
        - risk_id: R-007
          label: Management depth and retention visibility
          severity: medium
          likelihood: unknown
          rationale: Only select executives and R&D footprint are public; turnover, incentives and succession are not.
          evidence_claim_ids:
            - EC-004
            - EC-006
          source_ids:
