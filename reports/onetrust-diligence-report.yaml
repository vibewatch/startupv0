  - figure_id: F-011
    title: OneTrust risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of all identified diligence risks by severity and likelihood.
    purpose: Prioritize diligence follow-up across chapters.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Private financial opacity and stale valuation risk
          severity: high
          likelihood: high
          rationale: OneTrust has a $4.5B public unicorn-list valuation and low-confidence revenue estimates, but no audited financials, ARR bridge, cash runway, gross margin, or retention cohorts were public.
          evidence_claim_ids: &a1
            - EC-001
            - EC-019
            - EC-021
          source_ids:
            - SRC-001
            - SRC-012
            - SRC-003
            - SRC-004
        - risk_id: R-002
          label: Capital structure and preference stack unknown
          severity: high
          likelihood: medium
          rationale: Public sources do not reveal ownership, liquidation preferences, option pool, debt, warrants, or current basis by round.
          evidence_claim_ids: &a2
            - EC-001
            - EC-021
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-004
            - SRC-012
        - risk_id: R-003
          label: Quote-based pricing and discounting risk
          severity: medium
          likelihood: medium
          rationale: Public pages use request-demo flows with no transparent pricing; buyers in GRC/privacy categories can compare bundled suites and negotiate large discounts.
          evidence_claim_ids: &a3
            - EC-020
            - EC-025
          source_ids:
            - SRC-004
            - SRC-016
            - SRC-017
            - SRC-018
            - SRC-019
            - SRC-020
        - risk_id: R-004
          label: Customer quality and concentration not public
          severity: high
          likelihood: medium
          rationale: A public 14,000+ customer claim and 70 customer stories support breadth, but top-customer ARR, concentration, churn, payment terms, and renewal quality are not public.
          evidence_claim_ids: &a4
            - EC-004
            - EC-005
          source_ids:
            - SRC-004
            - SRC-005
        - risk_id: R-005
          label: Regulated AI/privacy product execution risk
          severity: high
          likelihood: medium
          rationale: OneTrust sells into rapidly changing privacy, security, and AI-governance requirements; content errors, delayed framework updates, or inadequate AI controls could damage customers and the brand.
          evidence_claim_ids: &a5
