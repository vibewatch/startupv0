risk_register:
  - risk_id: R-001
    risk_title: Private financial opacity and stale valuation risk
    risk_category: financial
    severity: high
    likelihood: high
    description: OneTrust has a $4.5B public unicorn-list valuation and low-confidence revenue estimates, but no audited financials, ARR bridge, cash runway, gross margin, or retention cohorts were public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited financials, ARR/NRR/churn cohorts, cash/burn, debt, board-approved plan, and full financing documents before valuation reliance.
  - risk_id: R-002
    risk_title: Capital structure and preference stack unknown
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public sources do not reveal ownership, liquidation preferences, option pool, debt, warrants, or current basis by round.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request stock ledger, cap table waterfall, investor rights agreements, option/warrant schedules, debt documents, and 409A/valuation materials.
  - risk_id: R-003
    risk_title: Quote-based pricing and discounting risk
    risk_category: market
    severity: medium
    likelihood: medium
    description: Public pages use request-demo flows with no transparent pricing; buyers in GRC/privacy categories can compare bundled suites and negotiate large discounts.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.B
      - II.A
      - V.D
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request ACV distribution, discounting, implementation fee margin, price increases, sales-cycle data, and win/loss detail versus top competitors.
  - risk_id: R-004
    risk_title: Customer quality and concentration not public
    risk_category: customer
    severity: high
    likelihood: medium
    description: A public 14,000+ customer claim and 70 customer stories support breadth, but top-customer ARR, concentration, churn, payment terms, and renewal quality are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request top-20 customer schedule, ARR concentration, renewal cohorts, contract terms, reference calls, and churned-logo analysis.
  - risk_id: R-005
    risk_title: Regulated AI/privacy product execution risk
    risk_category: product
    severity: high
    likelihood: medium
    description: OneTrust sells into rapidly changing privacy, security, and AI-governance requirements; content errors, delayed framework updates, or inadequate AI controls could damage customers and the brand.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review AI governance architecture, legal-content QA, model-risk controls, update SLA, incident history, E&O insurance, and customer liability language.
  - risk_id: R-006
    risk_title: Crowded GRC/privacy/data-security competition
    risk_category: market
    severity: high
    likelihood: high
    description: Vanta, TrustArc, BigID, Securiti, AuditBoard/Optro, and large software platforms overlap material portions of OneTrust scope.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request win/loss analysis, pricing benchmarks, competitive displacement rates, retention by module, roadmap differentiation, and sales enablement data.
  - risk_id: R-007
    risk_title: Enterprise sales productivity and implementation capacity unknown
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Active hiring and quote-based sales suggest an enterprise GTM, but quota attainment, CAC payback, services capacity, and implementation cycle are not public.
    impacted_chapter_ids:
      - V
      - VII
    impacted_section_ids:
      - V.D
      - V.E
      - VII.B
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request pipeline, quota attainment, CAC/payback, implementation backlog, services margin, sales headcount, and partner contribution.
  - risk_id: R-008
    risk_title: Marketing logos may overstate paid/current adoption
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: Company pages display major enterprise logos and stories; diligence must confirm current contracted status, scope, permission, and referenceability.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.B
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request logo-use permissions, current MSA/SOW list, customer health scores, and third-party reference checks.
  - risk_id: R-009
    risk_title: Workforce reset, retention, and leadership-transition risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Current pages show 2,000+ employees and active hiring, while public background sources report a significant 2022 layoff and the finance function recently added a new CFO.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.C
      - VII.F
      - VII.G
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request attrition by function/geography, engagement survey, executive turnover, succession plan, comp/equity refresh, and post-layoff productivity metrics.
  - risk_id: R-010
    risk_title: Integration and third-party dependency complexity
    risk_category: technical
    severity: medium
    likelihood: medium
    description: The platform claims 500+ integrations, Microsoft Security Copilot/Azure OpenAI connectivity, and third-party risk data; broad integrations increase maintenance, security, and supplier-dependency exposure.
    impacted_chapter_ids:
      - II
      - III
      - VI
    impacted_section_ids:
      - II.A
      - III.E
      - VI.B
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request architecture diagrams, SOC reports, incident logs, integration usage, data-processing agreements, supplier contracts, and cloud spend concentration.
  - risk_id: R-011
    risk_title: IP, legal, and contractual liability gaps
    risk_category: legal
    severity: high
    likelihood: unknown
    description: The report could not independently verify full IP schedules, litigation, customer liability caps, OSS posture, or regulatory-counsel review.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
      - VIII.F
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Request counsel litigation schedule, patent/trademark assignments, OSS scan, customer MSA/DPA terms, insurance schedule, and regulatory legal memos.
  - risk_id: R-012
    risk_title: Trust-brand and fraud-abuse exposure
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: OneTrust sells trust/privacy/compliance tooling and publicly warns about recruitment fraud; failures or brand impersonation can undermine a trust-centered market position.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.F
      - VIII.G
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Request brand-abuse monitoring data, security incident history, privacy incident register, customer notification history, and crisis-communications procedures.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR bridge, cash/burn, gross margin, NRR/churn, AR aging, backlog, and revenue-recognition policy.
    why_it_matters: Determines valuation support, financial quality, runway, and downside risk.
    suggested_source_or_request: Request audited financials, management accounts, board package, accounting memos, and SaaS metrics export.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, liquidation preferences, debt, warrants, option pool, investor rights, and 409A valuation.
    why_it_matters: Determines ownership economics, dilution, preference overhang, and financing risk.
    suggested_source_or_request: Request stock ledger, financing docs, investor rights agreements, debt documents, option schedule, and waterfall model.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: SKU-level ARR, attach rates, price book, product usage, security reports, implementation backlog, support burden, and roadmap.
    why_it_matters: Separates marketed breadth from durable, profitable product adoption.
    suggested_source_or_request: Request product financials, usage telemetry, security/SOC reports, roadmap, support tickets, and implementation data.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue concentration, current paid status, contract terms, renewal calendar, churn/downsells, and referenceability.
    why_it_matters: Customer concentration and churn can materially affect ARR quality and valuation.
    suggested_source_or_request: Request customer master, top-20 ARR schedule, contracts, health scores, NRR cohorts, and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss data, independent market share, pricing benchmarks, displacement analysis, and competitor-specific retention.
    why_it_matters: The competitive environment is crowded and can pressure price and growth.
    suggested_source_or_request: Request CRM win/loss exports, analyst reports, sales notes, pricing studies, and churn reason codes.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Quota attainment, CAC payback, sales cycle, pipeline conversion, partner contribution, and sales-comp model.
    why_it_matters: Enterprise GTM efficiency can deteriorate despite customer logos and active hiring.
    suggested_source_or_request: Request CRM funnel, salesforce roster, comp plans, quota reports, pipeline by source, and marketing attribution.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: AI governance product adoption, model-risk controls, legal-content QA, security assessment, roadmap gates, and customer pilots.
    why_it_matters: AI/regulatory products have high liability and fast-changing requirements.
    suggested_source_or_request: Request product roadmap, AI risk assessments, model/data lineage, content review process, pilot metrics, and incident logs.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS, attrition, comp/equity, employee-relations schedule, post-layoff retention, and hiring plan.
    why_it_matters: Prior layoff history and current hiring create retention/productivity questions.
    suggested_source_or_request: Request HRIS, org chart, turnover cohorts, compensation/equity schedules, employee-relations matters, and engagement survey.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Counsel-grade IP schedule, assignments, OSS scan, licenses, data agreements, infringement matters, and patent/trademark verification.
    why_it_matters: Platform value and legal defensibility depend on clean IP and data rights.
    suggested_source_or_request: Request IP schedule, invention assignments, OSS reports, third-party license agreements, data-source contracts, and counsel memos.
    priority: high
  - gap_id: G-010
