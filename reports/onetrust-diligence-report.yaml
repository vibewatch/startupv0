report_metadata:
  report_title: OneTrust Startup Diligence Report
  target_company: OneTrust
  website: https://www.onetrust.com/
  known_aliases:
    - OneTrust LLC
    - OneTrust Technology Limited
    - OneTrust AI-Ready Governance Platform
  sector: Enterprise trust, privacy, security, AI governance, compliance, and third-party risk software
  geography: United States; headquartered in Atlanta with public global offices and international customer signals
  company_stage: Private unicorn / growth-stage enterprise SaaS
  research_date: 2026-05-31
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from public unicorn trackers and excluded companies already covered in reports/.
    - Prioritized primary OneTrust pages for platform, product, customers, careers, leadership, and company scale.
    - Supplemented with public market-database, background, trade-news, and competitor-owned sources for valuation, operating context, product motion, and competitive overlap.
    - Did not bypass paywalls, bot checks, private systems, authentication, or unavailable legal/IP databases; marked unavailable facts as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - European Union / GDPR / EU AI Act screen
    - United Kingdom and global offices at high-level public-source screen
    - Customer/partner signals across Americas, EMEA, APAC, and International filters
  excluded_topics:
    - Audited financials, cap table, board materials, customer contracts, HRIS, security reports, litigation dockets, patent/trademark database extracts, regulatory correspondence, and paid databases were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow-selected CB Insights unicorn row for OneTrust
      type: workflow_request
      date_received: 2026-05-31
      notes: Randomly selected from public unicorn candidate list after excluding existing report slugs; public row indicated $4.5B valuation, Atlanta, Enterprise Tech, and 2019-07-11 date joined.
founder_claims:
