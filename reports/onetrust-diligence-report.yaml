executive_summary:
  overall_assessment: "OneTrust is a credible private-unicorn diligence target with strong public evidence of scaled enterprise adoption, broad privacy/GRC/AI-governance product coverage, and active operations. The main diligence constraint is private-data opacity: financial quality, cap table, customer concentration, retention, legal exposure, and product economics are not publicly verifiable."
  investment_or_diligence_thesis: Proceed only as a data-room-led diligence candidate. Public sources support market relevance and operating scale, but the risk-adjusted view depends on verifying ARR quality, valuation support, customer retention, AI/compliance product liability, competitive win/loss, and workforce stability.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Primary company sources verify a broad AI-ready governance product suite across privacy, consent, AI governance, tech risk/compliance, third-party management, and data-use governance.
      evidence_claim_ids:
        - EC-003
        - EC-006
        - EC-008
        - EC-009
        - EC-010
        - EC-011
        - EC-012
    - founder_claim_id: FC-003
      summary: Primary sources support broad customer/reference breadth through a 14,000+ customer claim, named enterprise logos, and 70 public customer-story results.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-004
      summary: "Primary sources verify current scale signals: 2,000+ employees, 13 offices, 83 open roles, and a public leadership team."
      evidence_claim_ids:
        - EC-013
        - EC-014
        - EC-015
  biggest_risks:
    - risk_id: R-001
      summary: Private financial opacity and stale valuation risk are high because public valuation and revenue anchors do not verify ARR, cash, burn, gross margin, or retention.
    - risk_id: R-006
      summary: Competition is intense across privacy, GRC, data-security, and AI-governance categories, with credible overlapping platforms.
    - risk_id: R-005
      summary: Regulated AI/privacy product execution risk is high because customers rely on OneTrust for fast-changing compliance and trust workflows.
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, cash/burn, gross margin, NRR/churn, AR aging, backlog, and revenue-recognition policy.
    - Current cap table, liquidation preferences, debt, warrants, option pool, investor rights, and 409A valuation.
    - SKU-level ARR, attach rates, price book, product usage, security reports, implementation backlog, support burden, and roadmap.
    - Top-customer revenue concentration, current paid status, contract terms, renewal calendar, churn/downsells, and referenceability.
    - Win/loss data, independent market share, pricing benchmarks, displacement analysis, and competitor-specific retention.
    - Quota attainment, CAC payback, sales cycle, pipeline conversion, partner contribution, and sales-comp model.
  recommended_next_steps:
    - Open data-room diligence only after receiving financial, cap-table, customer, product-security, HR, and legal schedules.
    - Prioritize ARR quality, NRR/churn, gross margin, cash runway, preference stack, and customer concentration before valuation reliance.
    - Run focused product/legal review on AI governance, regulatory-content QA, Microsoft/cloud/data dependencies, and customer liability language.
    - Conduct customer and win/loss calls across privacy, consent, AI governance, and tech-risk modules to validate differentiation and renewal quality.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: "OneTrust is a public-database unicorn with credible operating-scale signals, but financial diligence is mostly private-data dependent: audited statements, ARR, cash, debt, cap table, and customer concentration are not public."
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
