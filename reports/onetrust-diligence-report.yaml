        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements or management accounts were public. A low-confidence analyst estimate suggests about $500M 2024 revenue, but this cannot support valuation without company financials.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public financial statement package was not available.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-001
