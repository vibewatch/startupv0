        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Absence of public disclosure is not proof of no lost relationships.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-003
        hidden_risks:
          - Lost logos or warranty/incident disputes could be non-public.
        evidence_gaps:
          - Lost customers/partners/suppliers, churn reasons, disputed invoices, implementation failures.
        follow_up_questions:
          - Provide two-year lost customer/partner list, churn reasons, non-renewals and customer success escalations.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-021
          - EC-024
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public supplier/dependency signals include Dell, Microsoft Intune in a case study, existing EDR adjacencies and hosted-platform references, but cloud/vendor spend and contracts are private ([EC-009, EC-012, EC-014, EC-017]).
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: Public pages expose partner/deployment dependencies but not supplier spend or cloud architecture.
            evidence_claim_ids:
              - EC-009
              - EC-014
              - EC-017
            risk_ids:
              - R-007
              - R-008
        hidden_risks:
          - Undisclosed cloud, telemetry, AI/ML and support-tool dependencies may create concentration or data-residency risk.
        evidence_gaps:
          - Top suppliers by spend, cloud architecture, subprocessors, EDR/MDM integrations, partner/vendor contracts.
        follow_up_questions:
          - Provide vendor-spend report, cloud architecture, subprocessor list, critical supplier contracts and business-continuity plan.
        table_ids:
          - T-009
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-012
          - EC-014
          - EC-017
