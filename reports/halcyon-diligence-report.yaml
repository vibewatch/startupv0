      - EC-025
    mitigation_or_diligence_request: Request board minutes, CEO transition rationale, employment agreements, legal entity/geography/tax nexus memo and retention plan.
  - risk_id: R-007
    risk_title: Legal, security, privacy and insurance artifacts incomplete
    risk_category: legal
    severity: medium
    likelihood: high
    description: Public policies, SLA and DPA exist, but SOC/ISO, pen tests, subprocessor list, litigation schedule, insurance and executed contract terms are not public.
