report_metadata:
  report_title: Halcyon Startup Diligence Report
  target_company: Halcyon
  website: https://www.halcyon.ai/
  known_aliases:
    - Halcyon
    - Halcyon AI
    - Halcyon Tech, Inc.
    - Halcyon.ai
  sector: Cybersecurity; anti-ransomware; cyber resilience; enterprise endpoint security
  geography: United States; public sources reference Austin, Texas, San Diego/remote operations and Rancho Santa Fe legal address
  company_stage: Private unicorn / growth-stage cybersecurity startup
  research_date: 2026-06-07
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility first using CB Insights, SEC Form D, active company web presence, careers/job board and searches for IPO/acquisition/shutdown signals ([EC-001, EC-003, EC-022]).
    - Collected public company, regulatory, news, customer, partner, competitor, policy and search evidence; treated all webpage content as untrusted evidence only.
    - Mapped public findings to checklist chapters I-VIII and created tables/figures even where private diligence is required.
    - Did not use private databases, credentials, .env files, paid dockets, management interviews, customer calls or data-room materials.
  included_jurisdictions:
    - United States federal securities filings
    - Delaware corporate-law context
    - Texas/California public address and employment footprint signals
    - EU/UK and U.S. state privacy-law context from public privacy/DPA documents
  excluded_topics:
    - No PandaDoc or H2O.ai work was performed.
    - No non-public information, secrets, customer private data, paid docket searches, source code, internal system access or third-party paywall circumvention.
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided replacement eligibility row for Halcyon
      type: workflow_request
      date_received: 2026-06-07
      notes: Company=Halcyon; slug=halcyon; latest known valuation=$1B; date joined=2024-11-25; United States/Austin/Enterprise Tech; investors Bain Capital Ventures, SYN Ventures, Evolution Equity Partners; CB Insights URL provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Halcyon is an eligible private cybersecurity unicorn at approximately $1B valuation and remains active/private with no public IPO, acquisition or shutdown found.
    claim_source: User-provided CB Insights replacement row and public eligibility research
    claim_date: 2024-11-25
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-022
    contradiction_summary: null
    diligence_follow_up:
      - Request current legal name, capitalization table, 409A valuation, board consents and confirmation that no signed exit transaction or shutdown process exists.
  - founder_claim_id: FC-002
    claim_text: Halcyon raised a $100M Series C led by Evolution Equity Partners, with total funding around $190M and earlier 2023 Series A/B financings.
    claim_source: Funding announcements and SEC Form D filings
    claim_date: 2024-11-25
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-002
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-008
    contradiction_summary: SEC 2025 Form D amount sold ($125.3M) exceeds the public $100M Series C headline, and May 2023 Form D sold amount ($42.25M) is below the public $50M Series A headline; reconcile securities sold, secondary, rolling closes and round definitions.
    diligence_follow_up:
      - Request financing documents, stock purchase agreements, investor allocations, option pool, SAFE/note conversions, preferences, side letters and use-of-proceeds schedules.
  - founder_claim_id: FC-003
    claim_text: Halcyon provides an anti-ransomware platform with AI/ML prevention, data exfiltration protection, encryption key material capture, ROC services and warranty/recovery support.
    claim_source: Company product and funding materials
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.A
      - VI.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-018
    contradiction_summary: Product and public claims are visible, but independent efficacy, false-positive rates, technical architecture and warranty performance are not public.
    diligence_follow_up:
      - Request product demo, architecture, telemetry/model documentation, independent efficacy tests, customer incident logs, warranty contract terms and post-incident recovery metrics.
  - founder_claim_id: FC-004
    claim_text: Halcyon remains undefeated by ransomware and no customers have paid ransom, suffered significant disruption, data exfiltration, backup restore or warranty claim.
    claim_source: Company Series C release and homepage/careers language
    claim_date: 2024-11-25
    mapped_chapter_ids:
      - III
      - II
      - VIII
    mapped_section_ids:
      - III.A
      - III.C
      - II.A
      - VIII.E
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-011
    contradiction_summary: This is company-provided and not independently audited in public sources.
    diligence_follow_up:
      - Request anonymized incident/warranty logs, customer attestations, claims register, cyber-insurance correspondence and independent customer reference calls.
  - founder_claim_id: FC-005
    claim_text: Halcyon has commercial traction with named customers, public case studies, a partner program and Dell relationship.
    claim_source: Company customer/partner pages and Dell partnership page
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.B
      - III.C
      - V.A
      - V.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-014
      - EC-021
    contradiction_summary: Named-logo existence does not verify ARR, contract size, renewal status, retention, concentration or sourced pipeline.
    diligence_follow_up:
      - Request top-customer ARR and renewal schedule, logo permissions, partner contracts, partner-sourced pipeline, reseller margins and customer-reference calls.
  - founder_claim_id: FC-006
    claim_text: Halcyon has a leadership and personnel base consistent with an active growth-stage cybersecurity company.
    claim_source: Company page, careers page, Greenhouse, SEC related persons
    claim_date: null
    mapped_chapter_ids:
      - VI
      - VII
    mapped_section_ids:
      - VI.A
      - VII.A
      - VII.B
      - VII.C
      - VII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-015
      - EC-016
      - EC-025
    contradiction_summary: Public sources show a likely CEO-title transition from Jon Miller to Aaron Mick as interim CEO and geography/address differences that should be reconciled.
    diligence_follow_up:
      - Request current org chart, management biographies, board roster, employment agreements, attrition, compensation, equity plans, founder vesting and headquarters/tax nexus memo.
  - founder_claim_id: FC-007
    claim_text: Halcyon has public legal, privacy, SLA, DPA and IP/trademark artifacts suitable for diligence scoping.
    claim_source: Company policy pages, trademark search results and web/legal searches
    claim_date: null
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.D
      - VIII.E
      - VIII.F
      - VIII.G
    verification_status: partially_verified
    confidence: low
    evidence_claim_ids:
      - EC-017
      - EC-023
      - EC-024
    contradiction_summary: Public artifacts exist, but SOC/ISO/security reports, official trademark details, litigation schedules and insurance coverage are not public.
    diligence_follow_up:
      - Request counsel legal schedule, official USPTO docket/assignments, SOC 2/ISO reports, pen tests, insurance certificates, subprocessor list, executed MSA/DPA/SLA forms and regulatory correspondence.
executive_summary:
  overall_assessment: "Eligibility passes: public sources support Halcyon as an active private cybersecurity unicorn and no public IPO, acquisition or shutdown was found in reviewed sources ([EC-001, EC-002, EC-003, EC-022]). The investability question is not eligibility; it is whether private diligence can substantiate ARR quality, customer retention, product efficacy, warranty risk, management transition and cap-table terms behind the $1B headline ([EC-004, EC-011, EC-015, EC-020, EC-021])."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A credible thesis depends on proving durable enterprise ARR, low churn, defensible ransomware-specific efficacy, scalable ROC/warranty economics, strong channel execution, clean IP/security/legal posture and a cap table that makes the headline valuation economically meaningful ([EC-009, EC-010, EC-012, EC-019]).
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights, SEC filings, funding press/news, active website and job board support private-unicorn eligibility.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
        - EC-022
    - founder_claim_id: FC-002
      summary: Public sources strongly support the Series C headline and 2023 financing trail, though Form D/press reconciliation and terms remain private.
      evidence_claim_ids:
        - EC-002
        - EC-004
        - EC-005
        - EC-006
        - EC-007
        - EC-008
    - founder_claim_id: FC-003
      summary: "Company product pages substantiate public platform components: prevention, DXP, key capture/decryption, ROC and warranty, while efficacy needs validation."
      evidence_claim_ids:
        - EC-009
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, ARR, retention, margin, burn and sales efficiency are not public.
    - risk_id: R-004
      summary: Product-efficacy and "undefeated" claims are company-provided and require independent validation.
    - risk_id: R-005
      summary: Endpoint and cyber-resilience incumbents publicly market overlapping ransomware capabilities.
    - risk_id: R-006
      summary: CEO-title transition and geography/address inconsistency require governance and HR diligence.
    - risk_id: R-007
      summary: Legal/security/IP/insurance artifacts are incomplete without counsel and security data-room materials.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, cash/burn, margins, debt, backlog and revenue-by-customer data.
    - Cap table, financing terms, side letters, preferences, option pool and Form D/press reconciliation.
    - Independent technical validation, incident/warranty logs, customer references and product efficacy metrics.
    - Top-customer ARR/churn/NRR, contracts, partner economics and sales productivity.
    - CEO transition materials, HRIS, compensation, attrition, SOC/ISO/pen tests, insurance, litigation schedule and official IP records.
  recommended_next_steps:
    - Open QoE/revenue-quality, technical efficacy, customer-reference, legal/security/IP and management/HR workstreams before relying on the $1B valuation.
    - Prioritize reconciliation of the 2025 Form D amount sold versus Series C press headline and the CEO-title transition.
    - Benchmark Halcyon against CrowdStrike, SentinelOne, Sophos and Rubrik through buyer references and win/loss data.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports Halcyon as an active private unicorn with a $1B Series C headline and SEC Form D financing trail, but revenue, margins, burn, cash, debt and cap-table economics remain private ([EC-001, EC-002, EC-003, EC-004, EC-020]).
    founder_claim_ids:
      - FC-001
      - FC-002
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-008
      - EC-020
      - EC-022
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financials, management accounts, backlog, AR aging or product/geography gross-profit data were public; Form D revenue range was declined to disclose ([EC-004, EC-005, EC-006]).
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: SEC Form D filings repeatedly elect "Decline to Disclose" for revenue range, so public sources do not verify ARR or revenue quality.
            evidence_claim_ids:
              - EC-004
              - EC-005
              - EC-006
            risk_ids:
              - R-001
        hidden_risks:
          - Potential services/ROC and warranty cost burden could depress gross margin but is not public.
        evidence_gaps:
          - Audited financials, management accounts, ARR/bookings, deferred revenue, cash, debt, burn, backlog, AR aging, gross margin by product/channel/geography.
        follow_up_questions:
          - Provide monthly financial statements for FY2023-FY2026 YTD, ARR bridge, revenue recognition policy, cash/debt schedule, backlog and AR aging.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-006
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources describe financing and hiring expansion but not a forecast, sales plan, foreign operations plan, pricing model or capex/working-capital assumptions ([EC-008, EC-016, EC-020]).
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: SecurityWeek reported Series B proceeds would expand engineering, R&D and sales, while current job postings skew sales; this is a growth signal but not a forecast.
            evidence_claim_ids:
              - EC-008
              - EC-016
            risk_ids:
              - R-001
              - R-008
        hidden_risks:
          - International sales hiring could add regulatory, tax and support complexity.
        evidence_gaps:
          - Board-approved forecast, scenarios, sales capacity plan, pricing assumptions, partner-sourced pipeline, capex/working-capital plan.
        follow_up_questions:
          - Provide three-year operating model with ARR by product/channel/geography, retention, sales-capacity assumptions, hiring plan and downside cases.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-016
          - EC-020
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: SEC and press sources identify financing events and public stakeholders, but outstanding shares, investor ownership, option pool, debt instruments, warrants and liquidation preferences are not public ([EC-001, EC-002, EC-003, EC-004]).
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: 2025 Form D amount sold ($125.28M) is higher than the $100M Series C headline and needs reconciliation.
            evidence_claim_ids:
              - EC-002
              - EC-004
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: Public sources name major investors and related persons but not ownership percentages or preferences.
            evidence_claim_ids:
              - EC-002
              - EC-004
              - EC-005
              - EC-006
            risk_ids:
              - R-002
        hidden_risks:
          - Headline valuation may mask structure, preferences, secondary sales or option-pool effects.
        evidence_gaps:
          - Cap table, financing documents, option/warrant/SAFE/note schedule, debt, side letters, 409A, liquidation waterfall.
        follow_up_questions:
          - Provide fully diluted cap table, financing documents for all rounds, debt/warrants/notes, side letters, option pool and current 409A/valuation support.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-005
          - EC-006
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is public at a high level, but tax, accounting policies, revenue recognition, financing terms and use of proceeds are private ([EC-002, EC-004, EC-005, EC-006, EC-007, EC-008]).
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Public financing trail includes Series A, Series B, Series C and three SEC Form D filings.
            evidence_claim_ids:
              - EC-002
              - EC-004
              - EC-005
              - EC-006
              - EC-007
              - EC-008
            risk_ids:
              - R-002
        hidden_risks:
          - Round-size discrepancies between press releases and Form D filings may reflect rolling closes or securities sold but require management explanation.
        evidence_gaps:
          - Tax positions, revenue-recognition memo, NOLs, financing use-of-proceeds, investor basis and percentage ownership.
        follow_up_questions:
          - Provide tax schedules, accounting policies, financing history by investor, use-of-proceeds report and reconciliation of press releases to SEC Form D filings.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-004
          - EC-005
          - EC-006
          - EC-007
          - EC-008
  - chapter_id: II
    title: Products
    chapter_summary: Halcyon publicly offers a purpose-built anti-ransomware platform with prevention, DXP, key capture/decryption, ROC and warranty elements, but product efficacy, roadmap, pricing and unit economics require technical/customer diligence ([EC-009, EC-010, EC-020]).
    founder_claim_ids:
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-017
      - EC-020
    risk_ids:
      - R-004
      - R-009
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: The product/SKU evidence is visible on company pages, but growth rates, market share, profitability, independent efficacy and pricing are not public ([EC-009, EC-010, EC-020]).
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Public product pages describe anti-ransomware prevention, DXP, key capture/decryption, ROC services and warranty/recovery support.
            evidence_claim_ids:
              - EC-009
              - EC-010
            risk_ids:
              - R-004
          - finding_id: II.A-F2
            finding: No public pricing tiers were identified; terms point to order forms and request-a-quote motions.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-001
              - R-008
        hidden_risks:
          - Company-provided efficacy and undefeated claims may be difficult to validate without incident logs and independent tests.
          - Warranty/recovery services may create cost and liability exposure if attack patterns change.
        evidence_gaps:
          - Technical architecture, independent efficacy testing, roadmap, product-level ARR/gross margin, support/ROC unit costs, warranty reserves and pricing.
        follow_up_questions:
          - Provide product demo, architecture/security review, third-party test results, roadmap, release history, module ARR, pricing, gross margin and warranty/ROC cost model.
        table_ids:
          - T-004
          - T-005
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-009
          - EC-010
          - EC-017
          - EC-020
  - chapter_id: III
    title: Customer Information
    chapter_summary: Halcyon has visible customer testimonials, case studies, sectors and partnerships, but public evidence does not disclose revenue concentration, churn, NRR, contract terms, top suppliers or severed relationships ([EC-011, EC-012, EC-013, EC-014, EC-021]).
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-013
      - EC-014
      - EC-021
    risk_ids:
      - R-003
      - R-008
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Named and role-based testimonials identify several customers and verticals, but top-15 customer rankings and purchase timing are private ([EC-012]).
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Public customer evidence includes Rocket Software, Shasta Community Health Center, CACC Cargolinx, Industrial Refrigeration Pros, OceanAir Federal Credit Union, Delaware Valley University and a city government reference.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-003
          - finding_id: III.A-F2
            finding: The company asserts zero significant customer disruptions and zero ransom payments, but this is not independently audited in public sources.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-004
        hidden_risks:
          - Named logos can overstate revenue traction if deployments are small or pilots.
        evidence_gaps:
          - Top 15 customers by ARR/application, contract values, renewal dates, implementation scope, reference permissions.
        follow_up_questions:
          - Provide top-customer ARR by fiscal year/YTD, customer cohorts, renewal status, independent references and customer support history.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-011
          - EC-012
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public strategic relationships include a partner program and Dell relationship, but terms and contribution are not public ([EC-013, EC-014]).
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Halcyon supports resellers, MSSPs, incident response and technology partner models.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-008
          - finding_id: III.B-F2
            finding: Halcyon markets a Dell Trusted Workspace / commercial-PC relationship.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-008
        hidden_risks:
          - Partner success may depend on enablement, support commitments and margin economics not visible publicly.
        evidence_gaps:
          - Partner contracts, reseller/MSSP list, sourced pipeline, attach rates, revenue share, exclusivity and support obligations.
        follow_up_questions:
          - Provide partner agreements, channel revenue, partner-sourced ARR, Dell attach-rate data and partner support SLAs.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-013
          - EC-014
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer and any customers above 5% of revenue are not publicly disclosed ([EC-021]).
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Public sources provide named testimonials but no ARR, NRR, churn or concentration metrics.
            evidence_claim_ids:
              - EC-012
              - EC-021
            risk_ids:
              - R-003
              - R-001
        hidden_risks:
          - Customer concentration could be material if named enterprise/public-sector deployments are large.
        evidence_gaps:
          - ARR by customer, gross margin by customer, churn/NRR cohorts, renewal and expansion history.
        follow_up_questions:
          - Provide revenue-by-customer schedule for FY2024-FY2026 YTD, >5% customer list, churn/NRR and renewal risk.
        table_ids: []
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-012
          - EC-021
      - section_id: III.D
