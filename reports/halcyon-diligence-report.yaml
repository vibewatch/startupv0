risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and revenue quality gap
    risk_category: financial
    severity: high
    likelihood: high
    description: No audited financials, ARR, margins, churn, burn, cash, debt, backlog or sales-efficiency metrics were public; Form D revenue range declined to disclose.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
      - EC-020
      - EC-021
    mitigation_or_diligence_request: Open full QoE/revenue-quality diligence with audited financials, ARR bridge, cohort retention, burn/runway and sales productivity.
  - risk_id: R-002
    risk_title: Headline valuation and cap-table terms unverified
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $1B valuation headline is public, but cap table, preferences, option pool, side letters, secondary sales and Form D/press amount reconciliation are not.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
      - EC-006
    mitigation_or_diligence_request: Request financing documents, cap table, liquidation waterfall, 409A, investor rights, side letters and round reconciliation.
  - risk_id: R-003
    risk_title: Customer concentration and retention not publicly verifiable
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Named customers and testimonials are public, but no ARR concentration, renewal, churn, NRR or cohort data are public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-012
      - EC-021
    mitigation_or_diligence_request: Request top-customer ARR, contracts, renewal status, churn/NRR cohorts and independent reference calls.
  - risk_id: R-004
    risk_title: Product efficacy and undefeated/warranty claims need independent proof
    risk_category: product
    severity: high
    likelihood: medium
    description: Halcyon’s core claims around preventing/recovering from ransomware and zero customer ransom/disruption outcomes are company-provided and not independently audited publicly.
    impacted_chapter_ids:
      - II
      - III
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - III.A
      - VI.B
      - VIII.E
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-018
    mitigation_or_diligence_request: Run technical validation, customer incident-reference checks, warranty claims review and third-party testing.
  - risk_id: R-005
    risk_title: Competitive pressure from endpoint, MDR and recovery incumbents
    risk_category: market
    severity: high
    likelihood: high
    description: CrowdStrike, SentinelOne, Sophos and Rubrik publicly market overlapping ransomware prevention, endpoint, MDR or recovery capabilities.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-019
    mitigation_or_diligence_request: Conduct win/loss, pricing, channel conflict and buyer-reference diligence.
  - risk_id: R-006
    risk_title: Management transition and headquarters/geography ambiguity
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public sources show Jon Miller as prior CEO/signatory while the current company page lists Aaron Mick as COO & Interim CEO; geography references vary among Austin, San Diego and Rancho Santa Fe.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.B
