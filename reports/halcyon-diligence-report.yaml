diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, ARR/bookings, margins, cash, debt, burn, backlog and AR aging.
    why_it_matters: Determines revenue quality, runway and valuation support.
    suggested_source_or_request: Data room financial statements, management accounts, QoE package.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, preferences, option pool, side letters and Form D/press reconciliation.
    why_it_matters: Headline valuation may not equal common-equity value.
    suggested_source_or_request: Financing documents, cap table, liquidation waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Independent product efficacy, architecture, false-positive rates and warranty performance.
    why_it_matters: Product claims drive the investment thesis.
    suggested_source_or_request: Technical diligence, test reports, incident logs, customer references.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Customer ARR, concentration, churn, NRR and contract terms.
    why_it_matters: Determines durability and concentration risk.
    suggested_source_or_request: Revenue-by-customer schedule and contracts.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC payback, quota attainment and partner funnel.
    why_it_matters: GTM expansion can burn capital quickly.
    suggested_source_or_request: Sales capacity model and CRM export.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, R&D budget, product validation by ransomware family and IP assignments.
    why_it_matters: Ransomware threat evolution creates ongoing R&D risk.
    suggested_source_or_request: Roadmap, engineering budget, invention/IP files.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.G
    missing_information: CEO transition details, attrition, compensation and retention plan.
    why_it_matters: Management transition and talent concentration can affect execution.
    suggested_source_or_request: Board minutes, HRIS, employment agreements.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Legal schedule, official IP records, SOC/ISO/pen tests, insurance, executed contracts and regulatory correspondence.
    why_it_matters: Legal/security liabilities could undermine enterprise trust and valuation.
    suggested_source_or_request: Counsel/security data room and official docket/IP searches.
    priority: high
