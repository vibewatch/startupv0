diligence_gaps:
- gap_id: G-001
  chapter_id: I
  section_id: I.A
  missing_information: Audited financials, TPV/revenue cohorts, AR aging, reserves
    and runway.
  why_it_matters: Core underwriting requires quality financial data.
  suggested_source_or_request: Request audited statements and management KPI pack.
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.C
  missing_information: Fully diluted cap table, preferences, debt, warrants and side
    letters.
  why_it_matters: Headline valuation may not reflect economic ownership.
  suggested_source_or_request: Request cap table and financing documents.
  priority: high
- gap_id: G-003
  chapter_id: II
  section_id: II.A
  missing_information: Product-level P&L, hardware COGS, credit metrics and roadmap
    costs.
