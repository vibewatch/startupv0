  suggested_source_or_request: Request product P&L and roadmap budget.
  priority: high
- gap_id: G-004
  chapter_id: III
  section_id: III.A
  missing_information: Top customers, active merchants, churn and concentration.
  why_it_matters: Customer quality and concentration drive payment-platform value.
  suggested_source_or_request: Request customer/revenue concentration and references.
  priority: high
- gap_id: G-005
  chapter_id: V
  section_id: V.A
  missing_information: CAC, channel mix, funnel conversion and sales productivity.
  why_it_matters: Growth quality depends on channel economics.
  suggested_source_or_request: Request GTM dashboard and channel contracts.
  priority: high
- gap_id: G-006
  chapter_id: VI
  section_id: VI.B
  missing_information: R&D roadmap, engineering headcount and security incident history.
  why_it_matters: Execution and control risk are central.
  suggested_source_or_request: Request roadmap, KPIs and security reports.
  priority: medium
- gap_id: G-007
  chapter_id: VII
  section_id: VII.B
  missing_information: Headcount, turnover, compensation and equity grants.
  why_it_matters: People cost and retention affect runway and execution.
  suggested_source_or_request: Request HRIS export and compensation/equity files.
  priority: medium
- gap_id: G-008
  chapter_id: VIII
  section_id: VIII.G
  missing_information: Licenses, regulatory correspondence, litigation, IP, contracts
    and insurance.
  why_it_matters: Legal/regulatory issues can block or impair a transaction.
  suggested_source_or_request: Request counsel memo, searches and contract schedules.
  priority: high
