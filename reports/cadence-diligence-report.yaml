report_metadata:
  report_title: Cadence Startup Diligence Research Report
  target_company: Cadence
  website: https://www.cadence.care/
  known_aliases:
    - Cadence
    - Cadence Care
    - Cadence RPM
    - Care in Sync
    - Cadence Health FL, PLLC
    - Cadence Health CA, PC
    - Cadence Health NJ LLC
    - NY Remote Medical Monitoring, PLLC
  sector: Healthcare remote care, remote patient monitoring, chronic care management, clinical AI
  geography: United States; Delaware corporation with New York headquarters signal
  company_stage: Private venture-backed unicorn / growth-stage healthcare technology company
  research_date: 2026-06-05
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public internet only: company pages/posts, SEC EDGAR, public unicorn list, trade press, policy pages, competitor
      pages, CourtListener, patent/trademark public sources, CMS/CDC, and app-store search."
    - User-provided target-list facts were treated as untrusted scope and corroborated where possible.
    - Private data-room questions are marked not_publicly_verifiable rather than inferred.
  included_jurisdictions:
    - United States
    - Delaware
    - New York
    - California
    - Florida
    - New Jersey
  excluded_topics:
    - Private personal contact details, personal emails, home addresses, paywalled sources, access-controlled systems,
      non-public customer contracts, and non-public patient data.
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided CB Insights unicorn-list target for Cadence
      type: user_context
      date_received: 2026-06-05
      notes: Used only as scope; public sources were collected for evidence.
