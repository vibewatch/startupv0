    title: Marketing, Sales, and Distribution
    chapter_summary: "Public evidence supports a hybrid PLG and enterprise GTM motion: free/self-serve, Git workflow, open source, customer proof, enterprise sales/security and AI/v0 developer funnel. Actual CAC, productivity and pipeline are private."
    founder_claim_ids:
