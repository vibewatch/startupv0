report_metadata:
  report_title: Vercel Public-Source Unicorn Diligence Report
  target_company: Vercel
  website: https://vercel.com/
  known_aliases:
    - Vercel Inc.
    - Vercel, Inc.
    - ZEIT
    - ZEIT Inc.
    - Vercel AI Cloud
    - v0
    - Next.js
  sector: AI Cloud, frontend cloud, developer platform, web application infrastructure
  geography: United States; San Francisco, California; Delaware-incorporated private company
  company_stage: Late-stage private unicorn / Series F
  research_date: 2026-06-04
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used company-owned pages, Business Wire/company financing releases, CB Insights, SEC public JSON, Data Privacy Framework, GitHub repositories, customer pages, security/trust pages, pricing/docs, careers/LinkedIn and competitor primary pages.
    - Used r.jina.ai mirrors and DuckDuckGo HTML search where direct access was blocked; did not bypass paywalls or access controls.
    - Treated company marketing and logo claims as partially verified unless supported by independent or customer-owned evidence; marked private metrics as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - Delaware
    - California
    - European Union / United Kingdom / Switzerland data-transfer frameworks
  excluded_topics:
    - No private financial statements, cap table, customer contracts, supplier agreements, employee census, insurance policies, SOC reports or counsel interviews.
    - No PACER/state-court paid searches, paid databases, private customer reference calls or security portal documents requiring approval.
  user_provided_materials:
    - material_id: M-001
      title: User prompt selecting Vercel as replacement diligence target
      type: prompt_argument
      date_received: 2026-06-04
      notes: No founder-supplied materials; candidate CB Insights unicorn evidence supplied in prompt and verified against canonical public URL.
