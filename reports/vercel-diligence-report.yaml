risk_register:
  - risk_id: R-001
    risk_title: Valuation step-up and financing terms risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: Verified $9.3B Series F is a sharp public step-up from $3.25B Series E/CB Insights valuation; private terms may include preferences, seniority or tender mechanics that change common-equity economics.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Review stock purchase agreements, investor rights, liquidation preferences, tender offer documents, option pool and secondary-sale approvals.
  - risk_id: R-002
    risk_title: No public financial statements or cap table
    risk_category: financial
    severity: high
    likelihood: high
    description: Audited financials, cash runway, burn, debt, AR aging, backlog, cap table and investor preference stack are not publicly verifiable.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request audited/management financials, monthly ARR waterfall, cash runway model, debt schedule and full cap table.
  - risk_id: R-003
    risk_title: Infrastructure and AI COGS margin sensitivity
    risk_category: operational
    severity: high
    likelihood: medium
    description: Vercel monetizes hosting, compute, edge, AI Gateway/v0 and usage features; cloud/model-provider costs and enterprise discounts can compress margin.
    impacted_chapter_ids:
      - I
      - II
      - III
      - VI
    impacted_section_ids:
      - I.B
      - II.A
      - III.E
      - VI.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request gross margin by SKU, cloud/model-provider spend, committed-use discounts, overage pricing, abuse controls and unit economics for v0/AI Gateway.
  - risk_id: R-004
    risk_title: Customer concentration and renewal quality unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public logos and case studies do not reveal active ARR, top-customer concentration, contract terms, churn, NRR or renewal health.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request top-25 customer schedule, ARR by account, cohorts, NRR/GRR, churn reasons and customer references.
  - risk_id: R-005
    risk_title: Intense developer-platform and hyperscaler competition
    risk_category: market
    severity: medium
    likelihood: high
    description: Vercel overlaps with Netlify, Cloudflare, AWS Amplify, Render, Fly.io, Heroku and Replit across hosting, edge, serverless, AI apps and full-stack workflows.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request win/loss, price realization, competitive displacement rates, hyperscaler partnership strategy and developer-sentiment tracking.
  - risk_id: R-006
    risk_title: AI content, privacy and IP exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Terms allow use of Hobby/trial Pro content for AI/ML training and require users to evaluate AI outputs; v0/AI agents create data, output and third-party-model exposure.
    impacted_chapter_ids:
      - VIII
      - VI
      - II
    impacted_section_ids:
      - VIII.F
      - VI.B
      - II.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Review enterprise data-use opt-outs, AI subprocessors, training datasets, output indemnity, DPA terms, model-provider contracts and abuse monitoring.
  - risk_id: R-007
    risk_title: Open-source ecosystem governance dependency
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Next.js, Turbo, SWR and AI SDK create powerful distribution but expose Vercel to maintainer concentration, license compliance, community trust and security-vulnerability risks.
    impacted_chapter_ids:
      - VI
      - IV
    impacted_section_ids:
      - VI.A
      - IV.A
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review OSS governance, contribution mix, license scans, vulnerability response, community sentiment and trademark/license boundaries.
  - risk_id: R-008
    risk_title: Enterprise security/compliance and privacy-regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Security/compliance claims are central to enterprise sales; failures in SOC/ISO controls, DPF, DPA or incident response could impair trust and trigger regulatory/customer claims.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Obtain SOC 2 Type II, ISO/PCI/HIPAA evidence, DPF recertification, privacy assessments, incident logs, pen tests and cyber insurance.
  - risk_id: R-009
    risk_title: Third-party supplier and subprocessor dependence
    risk_category: operational
    severity: medium
    likelihood: high
    description: Trust Center flags critical and third-party dependence; subprocessors include AWS and major observability/cloud vendors.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.F
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request top supplier spend, SLAs, concentration, redundancy, cloud commitments, DPA terms and subprocessor change history.
  - risk_id: R-010
    risk_title: Scaling, executive integration and retention risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Rapid growth, active hiring and new executive additions increase integration and execution risk while compensation/retention data are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.C
      - VII.G
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request org chart, attrition by function, regretted loss, engagement data, executive agreements and hiring plan attainment.
  - risk_id: R-011
    risk_title: Usage pricing, revenue recognition and predictability risk
    risk_category: financial
    severity: medium
    likelihood: medium
    description: Public pricing combines seat and usage elements; annualized revenue and top-line growth disclosures lack definitions, revenue recognition policy and cohort predictability.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.B
      - II.A
      - V.D
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Review revenue recognition memo, usage variability, committed ARR, consumption overage margins, pipeline coverage and forecast accuracy.
  - risk_id: R-012
    risk_title: Legal/IP search incomplete
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public searches did not reveal an obvious material case, but no PACER/state-court/counsel confirmation or full USPTO file review was completed.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Request litigation schedule, demand letters, regulatory inquiries, patent/trademark docket, OSS claims, and counsel legal opinion.
