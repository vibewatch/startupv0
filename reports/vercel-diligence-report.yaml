  - chapter_id: IV
    title: Competition
    chapter_summary: Vercel is well-positioned around Next.js/developer experience and AI Cloud, but faces direct frontend cloud rivals, hyperscaler bundling and AI app-builder competition.
    founder_claim_ids:
      - FC-007
    evidence_claim_ids:
      - EC-014
      - EC-016
    risk_ids:
      - R-005
      - R-007
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Competitors overlap on frontend cloud, edge/serverless, full-stack app hosting, PaaS and AI-native app creation. Basis of competition includes developer experience, Next.js ecosystem, performance, enterprise security, price and cloud bundling.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: IV.A-F1
            finding: Netlify, Cloudflare Pages/Workers, AWS Amplify, Render, Fly.io, Heroku and Replit all publish overlapping deployment/app/AI hosting propositions.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-005
          - finding_id: IV.A-F2
            finding: Open-source assets such as Next.js and AI SDK support differentiation but create governance dependency.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-007
        hidden_risks:
          - Cloudflare/AWS can subsidize infrastructure and bundle with existing spend; Replit and AI coding platforms pressure v0.
        evidence_gaps:
          - Win/loss by segment, competitive pricing, migration reasons, customer overlap and market share.
        follow_up_questions:
          - Provide win/loss, competitor displacement data, market share estimates and pricing-discount analysis.
        table_ids:
          - T-010
          - T-011
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-014
          - EC-016
