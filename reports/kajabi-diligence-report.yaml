report_metadata:
  report_title: Kajabi Startup Diligence Report
  target_company: Kajabi
  website: https://kajabi.com/
  known_aliases:
    - Kajabi
    - Kajabi LLC
  sector: Creator economy SaaS, digital products and knowledge-commerce platform
  geography: United States / global creator SaaS
  company_stage: Private unicorn / growth-stage company
  research_date: 2026-06-13
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the existing-report exclusion list from reports/*-diligence-report.yaml before target selection.
    - Selected this target at random from the fetched CB Insights unicorn list after excluding existing report slugs.
    - Reviewed company-owned pages, the fetched CB Insights unicorn-list row, reputable public articles where accessible, Wikipedia pages with cited references where direct pages were blocked, and legal/regulatory references available on the public web.
    - Treated company claims as evidence that the claim is public, not as independent proof of operating performance; marked private records as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - Global customers referenced by public sources
  excluded_topics:
    - No private data room, customer calls, management interviews, paid databases, non-public litigation dockets, security reports, HRIS exports or cap-table records were available.
  user_provided_materials:
    - material_id: UPM-001
      title: Fetched CB Insights unicorn-list row
      type: market_database_row
      date_received: 2026-06-13
      notes: CB Insights row listed Kajabi, valuation $2B, joined 2021-05-04, United States/Irvine, Media & Entertainment, investors Meritech Capital Partners, Tiger Global Management, Spectrum Equity.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Kajabi is an uncovered private unicorn at approximately $2B.
    claim_source: CB Insights unicorn tracker and secondary funding sources
    claim_date: 2021-05-04
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids: &a1
      - EC-001
      - EC-005
    contradiction_summary: The valuation is tied to a 2021 financing and may be stale.
    diligence_follow_up:
      - Request latest 409A, secondary-sale data, cap table, investor rights and board valuation support.
  - founder_claim_id: FC-002
    claim_text: Kajabi provides an all-in-one platform for creators to build, market and sell digital products.
    claim_source: Company product/pricing pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - V
      - VI
    mapped_section_ids:
      - II.A
      - V.A
      - VI.B
    verification_status: verified
    confidence: high
    evidence_claim_ids: &a2
      - EC-002
      - EC-004
      - EC-009
    contradiction_summary: null
    diligence_follow_up:
      - Validate gross margin, product usage, roadmap and security posture.
  - founder_claim_id: FC-003
    claim_text: Kajabi has substantial creator/customer scale.
    claim_source: Company homepage and product update
    claim_date: 2025-12-16
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - V.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: &a3
      - EC-003
    contradiction_summary: Aggregate creator/customer metrics do not verify revenue quality or retention.
    diligence_follow_up:
      - Request ARR, NRR, churn, cohort retention, payment volume, refunds and top customer concentration.
  - founder_claim_id: FC-004
    claim_text: Kajabi has current public leadership and hiring signals.
    claim_source: About page and Wikipedia secondary sources
    claim_date: null
    mapped_chapter_ids:
      - VII
    mapped_section_ids:
      - VII.B
      - VII.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-006
    contradiction_summary: Public headcount is stale and current org chart is private.
    diligence_follow_up:
      - Request org chart, employee count by function/location, attrition and compensation plans.
executive_summary:
  overall_assessment: Kajabi is eligible for public-source diligence based on CB Insights and active company-owned sources. Product and pricing are well evidenced, while current valuation, ARR quality, customer retention, payment economics and legal/privacy schedules remain private.
  investment_or_diligence_thesis: Proceed if Kajabi can prove durable creator-economy growth, low churn, efficient self-serve acquisition, strong payment economics and defensible all-in-one positioning against specialist tools.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Kajabi is an uncovered private unicorn at approximately $2B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Kajabi provides an all-in-one platform for creators to build, market and sell digital products.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Kajabi has substantial creator/customer scale.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: 2021 valuation may be stale
    - risk_id: R-002
      summary: Crowded creator and SMB SaaS competition
    - risk_id: R-003
      summary: Customer scale claims do not prove revenue quality
  key_evidence_gaps:
    - Current ARR, NRR, churn and cohort retention.
    - Cap table, latest valuation support, cash/debt and financing terms.
    - Payment volume, processor reserves, chargebacks and refund rates.
    - Top creator/customer concentration and enterprise exposure.
    - Security/privacy, IP, open-source and legal schedules.
  recommended_next_steps:
    - Request SaaS KPI pack and revenue bridge by plan/cohort.
    - Validate creator success metrics and aggregate earnings methodology.
    - Run pricing/win-loss interviews against Teachable, Thinkific, Shopify, ConvertKit and community platforms.
    - Review payment compliance, data privacy and income-claim controls.
