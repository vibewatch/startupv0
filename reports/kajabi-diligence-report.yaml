risk_register:
  - risk_id: R-001
    risk_title: 2021 valuation may be stale
    risk_category: financing
    severity: high
    likelihood: unknown
    description: The $2B valuation is tied to a 2021 financing; current ARR, growth and valuation support are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Request current valuation support, cap table, cash/debt schedule and financial model.
  - risk_id: R-002
    risk_title: Crowded creator and SMB SaaS competition
    risk_category: market
    severity: high
    likelihood: medium
    description: Kajabi competes with course platforms, website builders, email/funnel tools, payments, communities and creator storefronts.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.A
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Request win/loss, churn reasons, pricing pressure and competitive displacement data.
  - risk_id: R-003
    risk_title: Customer scale claims do not prove revenue quality
    risk_category: customer
    severity: medium
    likelihood: medium
    description: Aggregate businesses/customers/creator earnings do not disclose ARR, cohorts, concentration or churn.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a23
    mitigation_or_diligence_request: Request ARR bridge, NRR, churn cohorts, payment volume quality and top customer/creator concentration.
  - risk_id: R-004
    risk_title: Product transition and AI-era relevance execution
    risk_category: product
    severity: medium
    likelihood: medium
    description: Kajabi is repositioning around human expertise and broader products; roadmap execution and R&D efficiency are private.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.B
      - VII.C
    evidence_claim_ids: *a24
    mitigation_or_diligence_request: Review roadmap, release quality, R&D allocation, management incentives and customer adoption.
  - risk_id: R-005
    risk_title: Legal/privacy/platform compliance gaps
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Subscription commerce, payments, income claims and creator data create legal/privacy obligations not cleared publicly.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.D
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a25
    mitigation_or_diligence_request: Request privacy/security audits, payment compliance, terms, income-disclaimer review, insurance and litigation schedule.
