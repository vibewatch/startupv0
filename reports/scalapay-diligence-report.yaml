executive_summary:
  overall_assessment: Scalapay is a well-funded European BNPL unicorn with strong
    public evidence of product breadth, merchant/user scale claims and institutional
    partnerships, but investment-grade diligence is blocked by missing private financials,
    unit economics, cap table, credit-loss data, regulatory artifacts and material
    contracts.
  investment_or_diligence_thesis: 'Proceed only as a high-interest diligence target:
    public evidence supports real operating scale and category relevance, while the
    decisive diligence questions are financial quality, credit/funding risk, regulatory
    resilience, merchant concentration and supplier dependency.'
  strongest_verified_claims:
  - founder_claim_id: FC-002
    summary: Major financing events are well supported by PRNewswire and EIB/market-database
      sources.
    evidence_claim_ids:
    - EC-001
    - EC-002
    - EC-003
    - EC-004
    - EC-005
  - founder_claim_id: FC-003
    summary: Public docs and third-party payment platforms corroborate Scalapay's
      BNPL, app, in-store and ecommerce integration surface.
    evidence_claim_ids:
    - EC-007
    - EC-009
    - EC-010
    - EC-011
    - EC-018
  - founder_claim_id: FC-005
    summary: Terms, job postings and EU sources support a regulated-payments and compliance-intensive
      operating context.
    evidence_claim_ids:
    - EC-008
    - EC-015
    - EC-016
    - EC-017
    - EC-024
    - EC-030
  biggest_risks:
  - risk_id: R-001
    summary: No public financial statements or unit economics; BNPL quality cannot
      be underwritten from funding headlines.
  - risk_id: R-004
    summary: EU consumer-credit, payment-institution, AML, DORA, PCI and GDPR obligations
      are material and require counsel/audit artifacts.
  - risk_id: R-006
    summary: Marqeta, processors, PSPs and banking rails create material contract
      and resilience dependencies.
  - risk_id: R-008
    summary: Customer/logo scale claims do not reveal revenue concentration, active
      merchant quality or churn.
  key_evidence_gaps:
  - Audited financial statements, management accounts, GMV/revenue, take-rate, credit-loss,
    fraud, CAC/payback and contribution-margin cohorts.
  - Current cap table, option pool, financing documents, EIB/debt/warehouse terms,
    covenants and current valuation support.
  - Top-customer schedule, merchant contracts, churn, concentration, active merchant
    definitions and customer references.
  - Regulatory licenses/passporting, product classification, AML/KYC, DORA, GDPR,
    PCI, security reports and regulator correspondence.
  - Material supplier contracts, SLAs, incident history, insurance, official docket
    searches and full IP/open-source diligence.
  recommended_next_steps:
  - Start financial and credit-risk data-room review before any valuation reliance.
  - Have counsel run EU/Italy payment, BNPL/consumer-credit, AML, DORA/GDPR and official
    litigation/IP searches.
  - Interview top merchants and partners, with special focus on revenue concentration,
    churn, approval rates, disputes and merchant ROI.
  - Review Marqeta, processor, bank, PSP, EIB and merchant contracts for pricing,
    SLAs, concentration, covenants and termination exposure.
  - Validate product/engineering maturity through architecture, security, incident,
    uptime and roadmap evidence.
