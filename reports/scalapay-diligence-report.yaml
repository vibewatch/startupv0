risk_register:
- risk_id: R-001
  risk_title: Financial statements and unit economics are not public
  risk_category: financial
  severity: high
  likelihood: high
  description: No audited P&L, balance sheet, cash flow, GMV, take-rate, loss-rate,
    CAC/payback or cohort profitability data were found; BNPL economics can deteriorate
    quickly with credit losses and funding costs.
  impacted_chapter_ids:
  - I
  - V
  impacted_section_ids:
  - I.A
  - I.B
  - I.D
  - V.D
  evidence_claim_ids:
  - EC-020
  - EC-029
  mitigation_or_diligence_request: Require audited statements, management accounts,
    loan book performance, vintage loss curves, approval rates, CAC/payback and contribution
    margin by product/geography.
- risk_id: R-002
  risk_title: Current valuation and cap table are unresolved
  risk_category: financing
  severity: high
  likelihood: medium
  description: Public valuation signals conflict ($1B CB Insights row vs $1.9B company
    career claim) and do not disclose preference stack, dilution, secondary sales
    or latest fair-value marks.
  impacted_chapter_ids:
  - I
  impacted_section_ids:
  - I.C
  evidence_claim_ids:
  - EC-001
  - EC-013
  mitigation_or_diligence_request: Obtain current cap table, financing agreements,
    board-approved valuation, option pool, SAFEs/notes/warrants and investor marks.
- risk_id: R-003
  risk_title: Financing stack and debt covenants may constrain growth
  risk_category: financing
  severity: high
  likelihood: medium
  description: EIB Scale-Up Debt and securitization/treasury references imply debt
    and asset-funding complexity; public terms do not reveal covenants, collateral,
    drawdowns or liquidity runway.
  impacted_chapter_ids:
  - I
  - III
  impacted_section_ids:
  - I.C
  - I.D
  - III.E
  evidence_claim_ids:
  - EC-005
  - EC-021
  - EC-027
  mitigation_or_diligence_request: Review EIB facility, warehouse/securitization documents,
    cash forecast, covenant compliance, funding-cost sensitivity and stress tests.
- risk_id: R-004
  risk_title: BNPL consumer-credit and payment regulation risk
  risk_category: regulatory
  severity: high
  likelihood: high
  description: EU consumer credit rules, payment-institution licensing, AML/KYC and
    DORA can affect onboarding, underwriting, disclosures, incident reporting and
    operating costs.
  impacted_chapter_ids:
  - VIII
  impacted_section_ids:
  - VIII.F
  - VIII.G
  evidence_claim_ids:
  - EC-008
  - EC-015
  - EC-016
  - EC-017
  - EC-030
  mitigation_or_diligence_request: Obtain product-by-country legal memo, license/passporting
    matrix, regulator correspondence, AML files, DORA readiness and policy implementation
    evidence.
- risk_id: R-005
  risk_title: Credit, fraud and repayment performance are opaque
  risk_category: financial
  severity: high
  likelihood: medium
  description: The product depends on consumer approvals, payment collection, fraud
    checks and merchant/customer disputes; public sources do not disclose approval,
    default, fraud or recovery rates.
  impacted_chapter_ids:
  - I
  - II
  - VIII
  impacted_section_ids:
  - I.D
  - II.A
  - VIII.F
  evidence_claim_ids:
  - EC-011
  - EC-025
  - EC-029
  mitigation_or_diligence_request: Request underwriting policy, scorecards, vintage
    loss curves, fraud losses, disputes, refunds, chargeback rates and collections
    practices by country/product.
- risk_id: R-006
  risk_title: Processor, issuer and banking concentration/dependency
  risk_category: operational
  severity: medium
  likelihood: high
  description: Marqeta virtual-card issuance and multi-processor/banking infrastructure
    are material dependencies; outages, pricing changes or termination could affect
    acceptance and margin.
  impacted_chapter_ids:
  - III
  - VIII
  impacted_section_ids:
  - III.E
  - VIII.F
  evidence_claim_ids:
  - EC-006
  - EC-027
  mitigation_or_diligence_request: Review processor/bank contracts, SLAs, redundancy,
    incident history, exit rights, routing controls and vendor concentration metrics.
- risk_id: R-007
  risk_title: Competitive pressure from wallets and regional BNPL providers
  risk_category: market
  severity: medium
  likelihood: high
  description: PayPal Pay Later and Alma demonstrate merchant alternatives with wallet
    scale or regional overlap; competitors may compress merchant fees and raise acquisition
    costs.
  impacted_chapter_ids:
  - IV
  - V
  impacted_section_ids:
  - IV.A
  - V.A
  - V.C
  evidence_claim_ids:
  - EC-019
  mitigation_or_diligence_request: Request win/loss data, merchant churn, take-rate
    trends, competitor pricing, pipeline conversion and differentiation evidence.
- risk_id: R-008
  risk_title: Customer concentration and active merchant quality are unknown
  risk_category: customer
  severity: medium
  likelihood: high
  description: Public logos and brand counts are positive but do not disclose active
    GMV, revenue concentration, churn, top customers or signed contract duration.
  impacted_chapter_ids:
  - III
  - V
  impacted_section_ids:
  - III.A
  - III.C
  - V.B
  evidence_claim_ids:
  - EC-022
  - EC-028
  mitigation_or_diligence_request: Obtain top-15 merchant/customer list, GMV/revenue
    concentration, contract terms, churn/retention cohorts and independent customer
    references.
- risk_id: R-009
  risk_title: Privacy, security and operational-resilience evidence gaps
  risk_category: technical
  severity: medium
  likelihood: medium
  description: Scalapay handles sensitive payment and identity data, but public sources
    do not include SOC reports, PCI attestations, breach history, DORA gap analysis
    or subprocessor detail.
  impacted_chapter_ids:
  - VI
  - VIII
  impacted_section_ids:
  - VI.A
  - VIII.G
