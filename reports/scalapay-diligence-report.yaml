  - EC-017
  - EC-024
  - EC-025
  mitigation_or_diligence_request: Request SOC/ISO/PCI artifacts, security architecture,
    incident log, subprocessor list, DPIAs, data retention and DORA remediation plan.
- risk_id: R-010
  risk_title: Team scale, compensation and turnover are not verifiable publicly
  risk_category: team
  severity: medium
  likelihood: medium
  description: LinkedIn and jobs indicate operating scale, but exact headcount by
