      finding: No manufacturing or environmental-liability evidence was found in the
        public-source set.
      evidence_claim_ids:
      - EC-020
      risk_ids: []
    - finding_id: VIII.C-F2
      finding: Regulatory change exposure is materially more relevant than direct
        environmental exposure for Scalapay.
      evidence_claim_ids:
      - EC-015
      - EC-016
      - EC-017
      risk_ids:
      - R-004
    hidden_risks:
    - Office leases, remote work, health/safety or ESG liabilities may still exist
      but remain private.
    evidence_gaps:
    - Environmental/office leases, workplace safety incidents, employment compliance
      and ESG policies are missing.
    follow_up_questions:
    - Provide facilities/lease schedule, health and safety incidents, remote-work
      policies and ESG/environmental policies.
    table_ids:
    - T-022
    figure_ids:
    - F-013
    evidence_claim_ids:
    - EC-015
    - EC-016
    - EC-017
    - EC-020
  - section_id: VIII.D
    title: Material patents, copyrights, licenses, and trademarks
    checklist_question_ids:
    - VIII.D
    summary: UKIPO confirms one registered SCALA trademark owned by Scalapay S.r.l.;
      full patent/trademark/open-source/license diligence was not completed.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VIII.D-F1
      finding: UKIPO records SCALA mark UK00003690900 as registered and owned by Scalapay
        S.r.l.
      evidence_claim_ids:
      - EC-026
      risk_ids:
      - R-012
    - finding_id: VIII.D-F2
      finding: Product software/IP ownership, Cabel IP acquisition details and open-source
        compliance are not public.
      evidence_claim_ids:
      - EC-008
      - EC-013
      risk_ids:
      - R-012
    hidden_risks:
    - A partial trademark search can miss EU/Italian marks, patent disputes, open-source
      obligations or acquisition encumbrances.
    evidence_gaps:
    - Full IP portfolio, assignments, open-source bill of materials, patent searches
      and Cabel IP acquisition documents are missing.
    follow_up_questions:
    - Provide IP schedule, assignment agreements, open-source scan, domain portfolio,
      Cabel IP acquisition docs and counsel freedom-to-operate memo.
    table_ids:
    - T-020
    figure_ids:
    - F-013
    evidence_claim_ids:
    - EC-008
    - EC-013
    - EC-026
  - section_id: VIII.E
    title: Insurance coverage and material exposures
    checklist_question_ids:
    - VIII.E
    summary: No insurance schedule or coverage evidence was public; cyber, D&O, E&O,
      crime/fraud and credit/operational loss coverage must be verified.
    verification_status: not_publicly_verifiable
    confidence: low
    key_findings:
    - finding_id: VIII.E-F1
      finding: Reviewed public sources did not disclose insurance coverage or claims
        history.
      evidence_claim_ids:
      - EC-020
      - EC-023
      risk_ids:
      - R-012
    hidden_risks:
    - Insurance gaps could magnify cyber, fraud, professional liability, D&O or regulatory
      incident losses.
    evidence_gaps:
    - Insurance schedule, policies, limits, exclusions and claims history are missing.
    follow_up_questions:
    - Provide insurance schedule and policies for D&O, cyber, E&O/professional liability,
      crime/fraud, employment practices and any credit/operational loss coverage.
    table_ids:
    - T-021
    figure_ids:
    - F-014
    evidence_claim_ids:
    - EC-020
    - EC-023
  - section_id: VIII.F
    title: Material contracts
    checklist_question_ids:
    - VIII.F
    summary: Material public contracts/categories include Marqeta, EIB/funding, merchant
      agreements and platform terms; full agreements are private.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VIII.F-F1
      finding: Marqeta's five-year exclusive contract and EIB debt are public material-contract
        signals.
      evidence_claim_ids:
      - EC-006
      - EC-005
      - EC-021
      risk_ids:
      - R-003
      - R-006
    - finding_id: VIII.F-F2
      finding: Merchant/plugin docs tie product activation to contractual terms and
        integration-manager controls.
      evidence_claim_ids:
      - EC-010
      - EC-025
      risk_ids:
      - R-011
    hidden_risks:
    - Unfavorable contract terms, termination rights, data/security clauses or covenants
      could materially affect operations.
    evidence_gaps:
    - Full material contracts, side letters, SLAs, DPAs, processor/bank agreements
      and merchant agreements are missing.
    follow_up_questions:
    - Provide all material contracts, top merchant agreements, processor/bank/Marqeta/EIB
      documents, DPAs, SLAs and termination/covenant summaries.
    table_ids:
    - T-021
    figure_ids:
    - F-006
    evidence_claim_ids:
    - EC-005
    - EC-006
    - EC-010
    - EC-021
    - EC-025
  - section_id: VIII.G
    title: Regulatory agency problems
    checklist_question_ids:
    - VIII.G
    summary: Public evidence confirms regulated payment-institution posture and relevant
      EU BNPL/DORA/GDPR context; no regulator problem schedule was public.
    verification_status: partially_verified
    confidence: medium
    key_findings:
