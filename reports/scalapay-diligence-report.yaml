    - finding_id: VIII.G-F3
      finding: Privacy materials state GDPR commitments and controller role.
      evidence_claim_ids:
      - EC-024
      risk_ids:
      - R-009
    hidden_risks:
    - Regulator correspondence, remediation plans or supervisory findings may be non-public.
    evidence_gaps:
    - Licenses/passporting, regulatory correspondence, AML/KYC audits, DORA readiness,
      PCI proof and complaint/enforcement history are missing.
    follow_up_questions:
    - Provide regulatory correspondence, license/passporting matrix, compliance audits,
      DORA/PCI/GDPR artifacts, AML/KYC policies and open remediation tracker.
