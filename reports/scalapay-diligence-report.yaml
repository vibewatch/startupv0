diligence_gaps:
- gap_id: G-001
  chapter_id: I
  section_id: I.A
  missing_information: Audited financial statements and monthly management accounts
  why_it_matters: Core profitability, cash burn, revenue recognition and balance-sheet
    quality cannot be assessed publicly.
  suggested_source_or_request: Request audited statements, management accounts and
    trial balance for FY2023-FY2026 YTD.
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.D
  missing_information: BNPL unit economics by cohort
  why_it_matters: Credit losses, fraud, payment costs and funding costs determine
    contribution margin.
  suggested_source_or_request: Request GMV, take-rate, losses, fraud, collections,
    refunds, CAC and contribution margin by product/country/cohort.
  priority: high
- gap_id: G-003
  chapter_id: I
  section_id: I.C
  missing_information: Current cap table, option pool and debt/facility terms
  why_it_matters: Public valuation and financing history do not reveal ownership,
    liquidation preferences, covenants or dilution.
  suggested_source_or_request: Request full cap table, financing agreements, EIB facility,
    warehouse/securitization documents and board valuation support.
  priority: high
- gap_id: G-004
  chapter_id: II
  section_id: II.A
  missing_information: Product-level GMV/revenue/profitability and reliability metrics
  why_it_matters: Public product availability does not prove adoption, reliability
    or economic contribution.
  suggested_source_or_request: Request product KPI dashboard with GMV, approvals,
    disputes/refunds, uptime/SLA, revenue and contribution margin.
  priority: high
- gap_id: G-005
  chapter_id: III
  section_id: III.A
  missing_information: Top customer/merchant schedule and concentration
  why_it_matters: Logo counts do not show whether revenue depends on a small number
    of merchants.
  suggested_source_or_request: Request top-15 merchants by GMV/revenue for last two
    fiscal years and YTD, with churn and contract terms.
  priority: high
- gap_id: G-006
  chapter_id: III
  section_id: III.E
  missing_information: Supplier/processor/bank contracts and SLAs
  why_it_matters: Marqeta, processors and banks are operational-critical dependencies.
  suggested_source_or_request: Request Marqeta, PSP, processor, bank, core banking
    and data-provider contracts plus incident logs.
  priority: high
- gap_id: G-007
  chapter_id: IV
  section_id: IV.A
  missing_information: Win/loss, churn and competitor pricing benchmarks
  why_it_matters: Public competitor pages do not quantify market share or pricing
    pressure.
  suggested_source_or_request: Request sales win/loss analysis, churn reasons, competitor
    pricing and merchant reference calls.
  priority: medium
- gap_id: G-008
  chapter_id: V
  section_id: V.D
  missing_information: Sales productivity and CAC/payback
  why_it_matters: GTM scalability cannot be judged from job postings and merchant
    counts alone.
  suggested_source_or_request: Request quota attainment, pipeline, sales cycle, channel
    CAC, payback and sales hiring plan.
  priority: high
- gap_id: G-009
  chapter_id: VI
  section_id: VI.A
  missing_information: Architecture, security and R&D org artifacts
  why_it_matters: DORA/GDPR/PCI and payment operations require robust security/resilience
    evidence.
  suggested_source_or_request: Request architecture diagrams, SOC/ISO/PCI artifacts,
    penetration tests, incident history, R&D org chart and roadmap.
  priority: high
- gap_id: G-010
  chapter_id: VII
  section_id: VII.B
  missing_information: Actual HRIS headcount, compensation and attrition
  why_it_matters: LinkedIn/open roles do not prove staffing capacity or retention.
  suggested_source_or_request: Request HRIS export, org chart, compensation bands,
    attrition, engagement and hiring budget.
  priority: medium
- gap_id: G-011
  chapter_id: VIII
  section_id: VIII.G
  missing_information: License/passporting matrix and regulator correspondence
  why_it_matters: EU BNPL/payment regulation is a core operating risk.
  suggested_source_or_request: Request counsel memo, licenses, passporting notifications,
    regulatory correspondence and open remediation tracker.
  priority: high
- gap_id: G-012
  chapter_id: VIII
  section_id: VIII.A
  missing_information: Official litigation, enforcement and complaints searches
  why_it_matters: Lightweight web search is not legal clearance.
  suggested_source_or_request: Counsel docket/regulator searches across operating
    jurisdictions and management litigation schedule.
  priority: high
- gap_id: G-013
  chapter_id: VIII
  section_id: VIII.D
  missing_information: Full IP portfolio and open-source compliance
  why_it_matters: One UK trademark is insufficient for brand/software/IP diligence.
  suggested_source_or_request: Request IP schedule, assignment agreements, open-source
    scan, patents/trademarks and Cabel IP acquisition files.
  priority: medium
- gap_id: G-014
  chapter_id: VIII
  section_id: VIII.E
  missing_information: Insurance schedule and claims history
  why_it_matters: Cyber, E&O, fraud, D&O and employment risks need coverage validation.
  suggested_source_or_request: Request policies, limits, exclusions, broker summary
    and claims history.
  priority: medium
