risk_register:
  - risk_id: R-001
    risk_title: Event-contract regulatory compliance and enforcement risk
    risk_category: regulatory
    severity: high
    likelihood: high
    description: Polymarket has a prior CFTC settlement and operates in a highly regulated event-contract category
      with U.S. and international product boundaries.
    impacted_chapter_ids:
      - I
      - V
      - VIII
    impacted_section_ids:
      - I.B
      - V.A
      - VIII.G
    evidence_claim_ids:
      - EC-002
      - EC-007
      - EC-008
    mitigation_or_diligence_request: Obtain current counsel memo, DCM/rulebook evidence, surveillance program,
      geofencing tests, product-approval procedures, and regulator correspondence.
  - risk_id: R-002
    risk_title: U.S. relaunch and international-platform separation risk
    risk_category: legal
    severity: high
    likelihood: medium
    description: The public footer says Polymarket US is CFTC-regulated and separate from an international
      platform that is not CFTC-regulated; operational separation must be proven.
    impacted_chapter_ids:
      - V
      - VIII
    impacted_section_ids:
      - V.A
      - VIII.G
    evidence_claim_ids:
      - EC-002
      - EC-015
    mitigation_or_diligence_request: Review intercompany services, data-sharing, customer onboarding, IP
      licensing, operational controls, and restricted-jurisdiction controls.
  - risk_id: R-003
    risk_title: Market integrity, manipulation, resolution, and insider-information risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Prediction markets rely on accurate resolution, fair access, surveillance, and manipulation
      controls, especially for politics, finance, sports, weather, and fast-moving events.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids:
      - EC-008
      - EC-013
      - EC-014
      - EC-021
    mitigation_or_diligence_request: Request market-creation policy, resolution rules, surveillance alerts,
      enforcement history, insider-policy controls, and user-remediation metrics.
  - risk_id: R-004
    risk_title: Financial opacity and valuation-underwriting risk
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public sources disclose valuation and investment headlines but not audited financial statements,
      revenue, gross margin, burn, runway, debt, or customer concentration.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
      - EC-019
    mitigation_or_diligence_request: Request three-year monthly financials, management reporting, revenue cohorts,
      liquidity incentives, market-making costs, cash, debt, tax, and cap-table files.
  - risk_id: R-005
    risk_title: Strategic data-channel dependency and contract concentration
    risk_category: customer
    severity: medium
    likelihood: medium
    description: ICE and Dow Jones validate distribution but may create dependence on a small number of strategic
      partners whose economics and termination rights are not public.
    impacted_chapter_ids:
      - III
      - IV
      - V
    impacted_section_ids:
      - III.B
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-022
      - EC-024
    mitigation_or_diligence_request: Request partner contracts, revenue share, minimum commitments, exclusivity,
      renewal/termination rights, and customer concentration by revenue and data usage.
  - risk_id: R-006
    risk_title: Technical, custody, API, and wallet-security risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Public docs and APIs indicate CLOB, order, trade, and deposit-wallet workflows; architecture,
      custody, wallet, key-management, and uptime evidence are non-public.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-014
      - EC-023
    mitigation_or_diligence_request: Request architecture diagrams, code/security reviews, custody and wallet
      controls, SOC reports, penetration tests, bug bounty history, incident logs, and disaster-recovery
      tests.
  - risk_id: R-007
    risk_title: Hiring and controls scaling risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: 42 open roles and explicit AML, trade surveillance, regulatory, U.S. exchange, and security
      hiring imply rapid scaling needs in control-sensitive functions.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
