report_metadata:
  report_title: Polymarket Public-Source Startup Diligence Report
  target_company: Polymarket
  website: https://polymarket.com/
  known_aliases:
    - Adventure One QSS Inc.
    - Blockratize, Inc. d/b/a Polymarket
    - QCX LLC d/b/a Polymarket US
    - Polymarket US
    - The Oracle by Polymarket
  sector: Prediction markets, event-contract trading, market data, fintech, and crypto-enabled market infrastructure
  geography: United States / New York with an international platform and a separate U.S. Polymarket US waitlist
  company_stage: Late-stage private unicorn / growth-stage operating company
  research_date: 2026-05-17
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized official Polymarket product, terms, brand, careers, U.S. waitlist, docs, Substack, and
      public API surfaces.
    - Used ICE, Dow Jones, CFTC, CB Insights, PredictIt, and Fox Business sources to triangulate financing,
      partnerships, regulation, competition, and public-market activity.
    - Treated company-authored traffic, role, product, and customer/partner claims as primary-source evidence
      requiring follow-up unless independently corroborated.
    - Used public-source absence as a diligence finding for private financial statements, cap table, customer
      concentration, material contracts, insurance, compensation, and litigation detail.
  included_jurisdictions:
    - United States
    - New York
    - International platform jurisdictions referenced by Polymarket
  excluded_topics:
    - No private financial statements, board materials, cap table, contracts, tax files, insurance policies,
      customer lists, or regulator correspondence were available.
    - No management, customer, partner, employee, counsel, market maker, or regulator interviews were
      performed.
    - No paid litigation, corporate-registry, blockchain-forensics, or trademark/patent database work was
      performed.
    - Several media and dynamic web pages were inaccessible, blocked, or rate-limited; unfetched claims were
      excluded or marked as gaps.
  user_provided_materials:
    - material_id: M-001
      title: User request for a Polymarket diligence report
      type: prompt_argument
      date_received: 2026-05-17
      notes: The user requested exactly one standard-depth public-source YAML diligence report for Polymarket.
