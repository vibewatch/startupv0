executive_summary:
  overall_assessment: "Polymarket appears eligible for a public-source startup diligence report: it is a
    private, operating prediction-market unicorn with strong public validation from ICE, Dow Jones, live
    product/API surfaces, and active hiring. The diligence posture is 'promising but high-risk' because public
    financials, cap table, contracts, compliance controls, customer concentration, and detailed legal exposure
    remain unavailable."
  investment_or_diligence_thesis: Polymarket's upside comes from becoming a default event-probability data layer
    across consumer trading, media, and financial-market workflows. Underwriting should focus first on
    regulatory durability, market integrity, revenue quality, and the unit economics behind the high valuation
    rather than on public traffic and partnership headlines alone.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: ICE states Polymarket was founded by Shayne Coplan in 2020.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: ICE announced up to $2B of strategic investment at an approximately $8B pre-money valuation, then an
        additional $600M direct investment.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-006
      summary: Public docs and APIs expose market, orderbook, order, trade, and CLOB surfaces.
      evidence_claim_ids:
        - EC-012
        - EC-013
        - EC-014
  biggest_risks:
    - risk_id: R-001
      summary: Regulatory compliance in event contracts is the gating diligence issue, amplified by the 2022 CFTC
        settlement.
    - risk_id: R-004
      summary: Public valuation evidence is strong, but underlying financials and unit economics are not public.
    - risk_id: R-003
      summary: Market integrity, manipulation, resolution, custody, and surveillance controls must be proven before
        high-conviction underwriting.
  key_evidence_gaps:
    - Audited financial statements, revenue, gross margin, burn, cash runway, debt, tax, and
      revenue-recognition detail.
    - Fully diluted capitalization, financing documents, governance rights, and ICE/Dow Jones contract
      economics.
    - Current legal/regulatory memo, DCM/rulebook evidence, U.S.-international separation controls, and
      market-surveillance program.
    - Customer concentration, data-licensing ARR, market-maker/liquidity incentive costs, and user
      cohort/retention metrics.
    - Architecture, custody/wallet model, security reports, incident history, and insurance/litigation
      schedules.
  recommended_next_steps:
    - Run a legal/regulatory deep dive before any investment decision, beginning with CFTC status, product
      approvals, geofencing, and market-integrity controls.
    - Request a standard financial diligence pack and reconcile public valuation claims to primary financing
      documents.
    - Review strategic partner contracts and data-rights economics for ICE, Dow Jones, and any media/API/data
      customers.
    - Conduct technical/security diligence on CLOB, API, wallet/custody, market-resolution, and surveillance
      systems.
    - Interview management, compliance leadership, strategic partners, market makers, large customers, and
      counsel.
