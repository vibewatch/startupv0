diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited and management financial statements, revenue, gross margin, cash, burn, runway,
      backlog, AR aging.
    why_it_matters: Public valuation cannot be underwritten without actual financial performance and balance-sheet risk.
    suggested_source_or_request: Request monthly financials, management reports, board packets, bank statements, and accounting policies.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, securities terms, option pool, debt, warrants, and ICE investment documents.
    why_it_matters: Valuation and downside protection depend on ownership, preferences, and governance rights.
    suggested_source_or_request: Request cap table, financing docs, investor rights, warrants, notes, debt
      agreements, and board approvals.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product economics by surface, market count, audited volume/liquidity, market-maker costs,
      fee/take-rate detail.
    why_it_matters: Product usage may not translate into durable gross profit.
    suggested_source_or_request: Request category P&L, market-maker agreements, fee schedule, API revenue, and usage cohorts.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer/partner/data user and any customer over 5% of revenue.
    why_it_matters: ICE/Dow and data channels may create customer or strategic concentration.
    suggested_source_or_request: Request top-customer revenue, contracts, renewal status, pipeline, and churn/expansion data.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Independent market-share, comparative liquidity, and regulated competitor benchmarking.
    why_it_matters: World's-largest positioning requires quantitative validation against direct and adjacent competitors.
    suggested_source_or_request: Commission market-share study and request internal competitor dashboards.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.C
    missing_information: Growth funnel, CAC, channel mix, conversion from visits to funded users, and waitlist conversion.
    why_it_matters: Traffic and PR only matter economically if they convert into compliant, repeat usage.
    suggested_source_or_request: Request analytics, attribution, cohort retention, CAC/LTV, and U.S. waitlist funnel reports.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: Architecture, custody/wallet model, uptime, security reports, incident logs, and
      market-surveillance tooling.
    why_it_matters: Trading infrastructure and wallet flows carry operational and regulatory risk.
    suggested_source_or_request: Request architecture diagrams, SOC reports, pentests, incident register, vendor
      list, and surveillance specs.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.A
    missing_information: Official org chart, senior management biographies, board roster, reporting lines, and
      control-function staffing.
    why_it_matters: Scaling regulated markets requires experienced leadership and independent compliance controls.
    suggested_source_or_request: Request org chart, resumes, board materials, role descriptions, and compliance staffing model.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.D
    missing_information: Compensation, employment agreements, benefits, stock-plan terms, and turnover data.
    why_it_matters: Talent retention, dilution, and cash burn may be material at a high valuation.
    suggested_source_or_request: Request compensation bands, equity plan, grant ledger, attrition, engagement, and
      employee-claims schedule.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Current regulatory status, DCM evidence, rulebook, geofencing, product-approval, agency
      correspondence, and surveillance program.
    why_it_matters: Regulatory clearance and market integrity are gating risks for U.S. growth and institutional adoption.
    suggested_source_or_request: Request counsel memo, DCM/rulebook files, compliance testing, agency
      correspondence, and surveillance procedures.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Executed ICE, Dow Jones, market-maker, data, vendor, and API customer contracts.
    why_it_matters: Public partnership announcements do not reveal economics, rights, obligations, or termination risk.
    suggested_source_or_request: Request contract data room and revenue/customer mapping for all material agreements.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance schedules for D&O, E&O, cyber, crime, custody, regulatory defense, and event/office exposure.
    why_it_matters: Insurance is central to downside exposure in a regulated trading/data business.
    suggested_source_or_request: Request policies, limits, exclusions, claims history, broker summaries, and renewal correspondence.
    priority: medium
