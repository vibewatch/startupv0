diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited FY24-FY26 financial statements, monthly MIS, cash runway, gross margin and channel P&L.
    why_it_matters: Determines whether public growth claims translate into durable unit economics.
    suggested_source_or_request: Request audited accounts and monthly operating dashboards.
    priority: high
  - gap_id: G-002
    chapter_id: VIII
    section_id: VIII.C
    missing_information: Food-safety audits, certification scope, recall history and cold-chain logs.
    why_it_matters: Core product trust and regulatory exposure depend on execution quality.
    suggested_source_or_request: Request QA and compliance data room plus third-party audit interviews.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Active customer cohorts, repeat rates, churn, NPS and city/channel concentration.
    why_it_matters: Public total-consumer count does not prove revenue quality or retention.
    suggested_source_or_request: Request cohort tables and anonymized order-level data.
    priority: high
  - gap_id: G-004
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, financing terms, debt and option pool.
    why_it_matters: Determines ownership, preference overhang and financing risk.
    suggested_source_or_request: Request financing documents and fully diluted cap table.
    priority: high
