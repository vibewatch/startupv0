        title: Annual and quarterly financial information for the past three years
        checklist_question_ids: [I.A.1, I.A.2, I.A.3, I.A.4, I.A.5, I.A.6]
        summary: Public evidence is limited to funding/profile data and a revenue/loss headline; audited annual and quarterly statements were not public in this workflow.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: A CB Insights-linked news headline references FY26 revenue of Rs 1,166 crore and flat net loss, but the source financial statements were not available.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-001]
        hidden_risks: [Loss persistence, inventory spoilage, working-capital strain, channel economics masked by headline revenue.]
        evidence_gaps: [Audited FY24-FY26 statements, monthly MIS, inventory aging, receivables/payables aging, cash/debt schedules.]
        follow_up_questions: [Provide audited statements and monthly management accounts for the past three fiscal years.]
        table_ids: [T-003]
        figure_ids: []
        evidence_claim_ids: [EC-005, EC-008]
      - section_id: I.B
