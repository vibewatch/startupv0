    impacted_section_ids: [VII.F, VIII.C, VIII.G]
    evidence_claim_ids: [EC-007, EC-008]
    mitigation_or_diligence_request: Obtain counsel schedule, regulator correspondence, inspection reports, labor records and insurance coverage.
  - risk_id: R-006
    risk_title: Supplier and disease/quality dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Backward integration and fresh meat sourcing expose Licious to supplier concentration, disease, quality and traceability risks.
    impacted_chapter_ids: [III, VIII]
    impacted_section_ids: [III.E, VIII.F]
    evidence_claim_ids: [EC-002, EC-004]
