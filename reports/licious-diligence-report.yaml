evidence_claims:
  - evidence_claim_id: EC-001
    claim: Licious is an alive, private unicorn candidate with $488M total raised and a $1B unicorn-tracker valuation signal.
    evidence_summary: CB Insights profile lists founded 2015, Series F-III Alive, $488M total raised and $150M last raised; the tracker snapshot selected Licious at $1B valuation.
    evidence_type: market_database
    verification_status: verified
    confidence: high
    source_ids: [SRC-001, SRC-002]
    quoted_evidence:
      - source_id: SRC-001
        quote: "Series F - III | Alive; Total Raised $488M; Last Raised $150M."
        location: CB Insights Licious profile
      - source_id: SRC-002
        quote: "Licious ... $1 ... 10/5/2021 ... India ... Consumer & Retail."
        location: CB Insights unicorn tracker snapshot
    analyst_interpretation: Public market-database evidence supports eligibility and financing scale but not current cap table or terms.
    limitations: Primary financing documents were not public.
    associations: {chapter_id: I, section_id: I.C, founder_claim_ids: [FC-001], table_ids: [T-001, T-002], figure_ids: [F-001, F-002], risk_ids: [R-008]}
  - evidence_claim_id: EC-002
    claim: Licious operates a consumer food business focused on meat/seafood with back-end supply-chain and cold-chain control.
    evidence_summary: CB Insights describes fresh/raw meat, seafood, marinades and ready-to-eat categories, a farm-to-fork model and cold-chain control.
    evidence_type: market_database
    verification_status: verified
    confidence: medium
    source_ids: [SRC-001]
    quoted_evidence:
      - source_id: SRC-001
        quote: "Licious operates on a farm to fork business model with a back-end supply chain and cold chain control."
        location: CB Insights Licious profile
    analyst_interpretation: Supports the operating model claim but not operational performance.
    limitations: CB Insights profile is secondary-source company intelligence.
    associations: {chapter_id: II, section_id: II.A, founder_claim_ids: [FC-002], table_ids: [T-004, T-008, T-010], figure_ids: [F-003, F-005], risk_ids: [R-002, R-006]}
  - evidence_claim_id: EC-003
    claim: Licious publicly claims 0-4 C chilled handling through procurement, processing, storage and delivery, and lists online meat/seafood categories.
    evidence_summary: Licious homepage states meat needs 0-4 C storage and says the company maintains that temperature from procurement through doorstep delivery; it lists chicken, mutton, seafood, marinades and cold cuts.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: medium
    source_ids: [SRC-003]
    quoted_evidence:
      - source_id: SRC-003
        quote: "We maintain this temperature from the time we procure the product to cleaning, cutting and storing it, until it leaves for delivery."
        location: Licious homepage
    analyst_interpretation: Verifies the public claim; actual temperature compliance needs audit data.
    limitations: Company-authored claim.
