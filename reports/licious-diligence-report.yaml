risk_register:
  - risk_id: R-001
    risk_title: Private financial quality and cash runway
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Audited financial statements, cash runway, burn, gross margin, spoilage and store/channel profitability are not public.
    impacted_chapter_ids: [I, V]
    impacted_section_ids: [I.A, I.B, V.E]
    evidence_claim_ids: [EC-005, EC-008]
    mitigation_or_diligence_request: Obtain audited statements, monthly MIS, cash runway and channel-level contribution margin.
  - risk_id: R-002
    risk_title: Food safety and cold-chain execution
    risk_category: operational
    severity: high
    likelihood: medium
    description: Licious' value proposition depends on chilled handling and safety controls that require audit evidence.
    impacted_chapter_ids: [II, III, VIII]
    impacted_section_ids: [II.A, III.E, VIII.C]
    evidence_claim_ids: [EC-002, EC-003, EC-007]
    mitigation_or_diligence_request: Review QA audits, FSSC certificate scope, incident logs, temperature logs and recall history.
  - risk_id: R-003
    risk_title: Competitive price and convenience pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Public competitors and adjacent grocery/quick-commerce channels can pressure basket prices, delivery expectations and customer retention.
    impacted_chapter_ids: [IV, V]
    impacted_section_ids: [IV.A, V.C]
    evidence_claim_ids: [EC-006]
    mitigation_or_diligence_request: Run city-level price basket, market-share and retention analysis.
  - risk_id: R-004
    risk_title: Omnichannel expansion complexity
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Retail stores, quick commerce and own delivery increase capex, inventory and SLA complexity.
    impacted_chapter_ids: [III, V, VI]
    impacted_section_ids: [III.B, V.A, VI.B]
    evidence_claim_ids: [EC-004]
    mitigation_or_diligence_request: Review store cohorts, partner contracts, delivery costs and SLA performance.
  - risk_id: R-005
    risk_title: Regulatory, labor and safety compliance
    risk_category: regulatory
    severity: high
    likelihood: unknown
    description: Food, worker-safety, delivery, retail and data/privacy compliance exposures are not public.
