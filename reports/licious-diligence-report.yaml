        evidence_gaps: [Board-approved budget, forecast model, store rollout plan, cash runway, breakeven bridge.]
        follow_up_questions: [Provide base/upside/downside projections with assumptions for orders, AOV, gross margin, spoilage, delivery cost and store capex.]
