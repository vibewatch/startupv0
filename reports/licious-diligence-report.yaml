report_metadata:
  report_title: Licious Public-Source Startup Diligence Report
  target_company: Licious
  website: https://www.licious.in/
  known_aliases:
    - Licious
    - Delightful Gourmet Pvt Ltd
  sector: Consumer food, fresh meat and seafood, D2C grocery commerce
  geography: Bengaluru, India
  company_stage: Series F private unicorn / alive per CB Insights
  research_date: 2026-05-19
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD for funding and INR for India operating signals unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Built the target from a current CB Insights unicorn tracker snapshot after excluding existing report slugs.
    - Prioritized CB Insights, the company website and public news/press-release sources.
    - Treated company-authored claims as verified only for the existence of the public statement unless independently corroborated.
    - No private data room, management interview, customer reference call, supplier audit or legal docket artifact was available.
  included_jurisdictions:
    - India
    - Karnataka
  excluded_topics:
    - Private financial statements, cap table, debt documents, supplier contracts, store-level P&L, food-safety audits, customer cohorts and board materials were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-19
      notes: No pitch deck, data room, customer references or founder responses were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Licious is a private unicorn valued at approximately $1B and remains alive/private.
    claim_source: CB Insights unicorn tracker and company profile
    claim_date: 2026-05-19
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.B, I.C]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001]
    contradiction_summary: null
    diligence_follow_up:
      - Request primary financing documents, current valuation support, liquidation preferences and current cap table.
  - founder_claim_id: FC-002
    claim_text: Licious operates a fresh meat and seafood platform with farm-to-fork supply-chain control and cold-chain handling.
    claim_source: CB Insights profile and Licious website
    claim_date: null
    mapped_chapter_ids: [II, III, VI, VIII]
    mapped_section_ids: [II.A, III.E, VI.A, VIII.C]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-002, EC-003]
    contradiction_summary: Public sources verify the claim is made and describe controls, but not audit results, spoilage rates or supplier-level compliance.
    diligence_follow_up:
      - Request cold-chain logs, QA audit reports, FSSC certificate scope, recall history and supplier traceability files.
  - founder_claim_id: FC-003
    claim_text: Licious has scaled into omnichannel retail, including 60+ stores, quick-commerce partnerships and its own Flash delivery promise.
    claim_source: Public 2026 flagship-store announcement
    claim_date: 2026-04-14
    mapped_chapter_ids: [III, V]
    mapped_section_ids: [III.B, V.A, V.C]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-004]
    contradiction_summary: Public release verifies the stated claims but does not disclose same-store sales, channel economics or delivery SLA performance.
    diligence_follow_up:
      - Request store cohort P&Ls, quick-commerce contracts, delivery SLA dashboards and channel-level CAC/payback.
  - founder_claim_id: FC-004
    claim_text: Licious closed FY26 with Rs 1,166 crore of revenue while net loss remained flat.
    claim_source: Moneycontrol headline surfaced on CB Insights profile
    claim_date: 2026-04-01
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.A, I.B]
    verification_status: partially_verified
    confidence: low
    evidence_claim_ids: [EC-005]
    contradiction_summary: Only a headline/snippet was accessible in this workflow; audited statements were not available.
    diligence_follow_up:
      - Request audited FY24-FY26 financial statements, monthly MIS, contribution margin bridge and cash runway.
executive_summary:
  overall_assessment: Licious has credible public evidence of unicorn status, substantial capital raised, consumer brand scale and operational differentiation around chilled meat/seafood supply chains, but the most investment-critical evidence remains private.
  investment_or_diligence_thesis: The diligence case depends on whether a capital-intensive cold-chain and omnichannel grocery model can convert brand scale into durable gross margin, repeat purchase economics and compliance resilience.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Licious as an alive Series F private company, included in its unicorn collection, with $488M raised; the unicorn tracker snapshot selected Licious at a $1B valuation.
      evidence_claim_ids: [EC-001]
    - founder_claim_id: FC-002
      summary: Public company and CB Insights sources describe fresh/raw meat, seafood, marinades and ready-to-eat products supported by back-end supply chain and cold-chain control.
      evidence_claim_ids: [EC-002, EC-003]
    - founder_claim_id: FC-003
      summary: A 2026 public announcement states Licious has 4.5M consumers, 300+ SKUs, five processing centres, 60+ retail stores and quick-commerce/Flash delivery motions.
      evidence_claim_ids: [EC-004]
  biggest_risks:
    - risk_id: R-001
      summary: Private financial quality, cash runway, losses and contribution margin are not publicly verifiable.
    - risk_id: R-002
      summary: Fresh meat and seafood require tight cold-chain, food-safety and supplier controls; public materials do not prove operating performance.
    - risk_id: R-003
      summary: Competition from FreshToHome, Captain Fresh, Zappfresh, Jumbotail, BigBasket/Zepto-adjacent grocery channels and offline butchers may pressure price and retention.
  key_evidence_gaps:
    - Audited financials, revenue quality, gross margin, store/channel P&L and cash runway.
    - Cap table, investor rights, debt, liquidation preferences and option pool.
    - Supplier contracts, quality audits, recall/complaint history and regulatory licenses.
    - Cohort retention, order frequency, customer concentration, CAC/payback and delivery SLA metrics.
  recommended_next_steps:
    - Run a financial-quality review focused on FY24-FY26 revenue, losses, working capital, inventory spoilage and channel-level contribution margin.
    - Commission food-safety/cold-chain diligence covering processing centres, stores, delivery and supplier traceability.
    - Verify the latest cap table and financing terms against the public $1B unicorn signal.
    - Conduct customer cohort and competitor price checks in core metros before relying on growth claims.
chapters:
