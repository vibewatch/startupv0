risk_register:
  - risk_id: R-001
    risk_title: Financial quality and ARR reconciliation are private
    risk_category: financial
    severity: high
    likelihood: high
    description: Public $100M ARR and profitability claims are material but cannot be underwritten without audited financials, ARR bridge, retention, cash flow and gross margin.
    impacted_chapter_ids: [I, V]
    impacted_section_ids: [I.A, I.B, V.E]
    evidence_claim_ids: [EC-002, EC-003, EC-006, EC-020, EC-036]
    mitigation_or_diligence_request: Request audited/reviewed financials, ARR bridge, cohort retention, gross margin, cash, debt and plan-vs-actuals.
  - risk_id: R-002
    risk_title: Valuation, cap-table and secondary-liquidity terms are unknown
    risk_category: financing
    severity: high
    likelihood: high
    description: The $2.1B headline valuation and employee secondary component do not reveal security terms, preferences, ownership, dilution or option-pool needs.
    impacted_chapter_ids: [I, VII, VIII]
    impacted_section_ids: [I.C, I.D, VII.D, VII.E, VIII.G]
    evidence_claim_ids: [EC-001, EC-002, EC-009, EC-021, EC-023, EC-036]
    mitigation_or_diligence_request: Review cap table, financing docs, stock plan, 409A, investor rights, secondary documents and liquidation waterfall.
  - risk_id: R-003
    risk_title: Customer concentration, churn and paid conversion are undisclosed
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public user/content scale does not show paid seats, enterprise ARR, top-customer concentration, churn or NRR.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, III.C, V.B]
    evidence_claim_ids: [EC-004, EC-010, EC-034, EC-036]
    mitigation_or_diligence_request: Request customer cohorts, ARR by customer, churn/NRR, renewal calendar, references and pipeline.
  - risk_id: R-004
    risk_title: Competitive pressure from incumbents and AI presentation tools
    risk_category: market
    severity: high
    likelihood: high
    description: Canva, Beautiful.ai, Pitch and other alternatives publicly overlap with Gamma's presentation and collaboration capabilities.
    impacted_chapter_ids: [IV]
    impacted_section_ids: [IV.A]
    evidence_claim_ids: [EC-024, EC-025, EC-026, EC-027]
    mitigation_or_diligence_request: Run win/loss, customer displacement, pricing and feature benchmarks.
  - risk_id: R-005
    risk_title: Platform abuse and security trust risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Public phishing-abuse reporting and gated trust artifacts create enterprise security and reputation diligence needs.
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.E, VIII.G]
    evidence_claim_ids: [EC-014, EC-029]
    mitigation_or_diligence_request: Review SOC reports, incident history, abuse controls, takedown SLAs and security roadmap.
  - risk_id: R-006
    risk_title: AI model, IP and content-rights dependency
    risk_category: product
    severity: medium
    likelihood: high
    description: AI generation depends on undisclosed models, data rights, content controls and IP licensing terms.
    impacted_chapter_ids: [II, VI, VIII]
    impacted_section_ids: [II.A, VI.B, VIII.D]
    evidence_claim_ids: [EC-005, EC-011, EC-015, EC-035, EC-036]
    mitigation_or_diligence_request: Review model/vendor contracts, IP assignments, OSS scan, data licenses, output ownership and indemnity.
  - risk_id: R-007
    risk_title: Rapid scaling and hiring execution risk
    risk_category: team
    severity: medium
    likelihood: high
    description: Active hiring across many functions and geographies may change burn, culture and execution profile.
    impacted_chapter_ids: [VI, VII, V]
    impacted_section_ids: [VI.A, VII.B, V.D]
    evidence_claim_ids: [EC-017, EC-018, EC-019]
    mitigation_or_diligence_request: Review HRIS, hiring plan, attrition, compensation, management capacity and international employment compliance.
  - risk_id: R-008
    risk_title: Legal, privacy, regulatory and contract risks require counsel review
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Public privacy/terms evidence is not enough to assess enterprise contracts, litigation, arbitration, regulatory issues or international data compliance.
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.A, VIII.B, VIII.F, VIII.G]
    evidence_claim_ids: [EC-015, EC-016, EC-028, EC-030, EC-033]
    mitigation_or_diligence_request: Counsel should run litigation, UCC, IP, privacy, regulatory and contract diligence.
  - risk_id: R-009
    risk_title: Product-led growth conversion risk
    risk_category: market
    severity: medium
    likelihood: high
    description: Large product-led adoption may not convert to durable enterprise ARR at expected CAC/payback and retention.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, V.A, V.C]
    evidence_claim_ids: [EC-004, EC-007, EC-012, EC-013, EC-034]
    mitigation_or_diligence_request: Analyze funnel, paid conversion, customer segments, CAC/payback, retention and expansion by cohort.
  - risk_id: R-010
    risk_title: AI credit and compute-cost margin risk
    risk_category: technical
    severity: medium
    likelihood: high
    description: Credit-based AI usage and API generation may expose Gamma to variable model, cloud and support costs not disclosed publicly.
    impacted_chapter_ids: [I, II, III, V, VI]
    impacted_section_ids: [I.B, II.A, III.E, V.C, VI.B]
    evidence_claim_ids: [EC-011, EC-013, EC-035, EC-036]
    mitigation_or_diligence_request: Review gross margin by plan, API usage, credit consumption, vendor pricing, rate limits and cost controls.

