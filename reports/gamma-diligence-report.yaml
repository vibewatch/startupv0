  - {gap_id: G-013, chapter_id: VIII, section_id: VIII.E, missing_information: SOC reports and insurance policies, why_it_matters: Public trust-center statements do not prove control effectiveness or coverage., suggested_source_or_request: Request SOC 2, pen-test summary, insurance certificates and incident log., priority: high}
  - {gap_id: G-014, chapter_id: VIII, section_id: VIII.G, missing_information: Abuse response and regulatory correspondence, why_it_matters: Public phishing-abuse report creates trust-and-safety risk., suggested_source_or_request: Request abuse metrics, takedown SLAs and regulatory/counsel correspondence., priority: medium}

