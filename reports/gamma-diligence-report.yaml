  - {gap_id: G-005, chapter_id: III, section_id: III.E, missing_information: Supplier spend and cloud/model contracts, why_it_matters: Determines margin, concentration and continuity risk., suggested_source_or_request: Request top supplier contracts and spend., priority: high}
  - {gap_id: G-006, chapter_id: IV, section_id: IV.A, missing_information: Win/loss and market share, why_it_matters: Public alternatives create competitive pressure., suggested_source_or_request: Request win/loss data and customer references., priority: medium}
  - {gap_id: G-007, chapter_id: V, section_id: V.D, missing_information: Sales productivity, CAC and pipeline metrics, why_it_matters: Needed to evaluate GTM scaling and profitability durability., suggested_source_or_request: Request pipeline, quota, attainment and CAC/payback files., priority: high}
  - {gap_id: G-008, chapter_id: VI, section_id: VI.B, missing_information: Product roadmap and development costs, why_it_matters: Needed to assess R&D efficiency and execution risk., suggested_source_or_request: Request roadmap, engineering budget and model evaluation results., priority: medium}
