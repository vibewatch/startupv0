  - {gap_id: G-003, chapter_id: II, section_id: II.A, missing_information: Product architecture and AI model/vendor dependencies, why_it_matters: Determines defensibility, reliability, cost and IP risk., suggested_source_or_request: Request architecture, model/vendor contracts, evaluations and incident history., priority: high}
