  - {gap_id: G-010, chapter_id: VII, section_id: VII.E, missing_information: Option plan and equity grants, why_it_matters: Required to assess dilution and retention incentives., suggested_source_or_request: Request stock plan, option ledger and 409A history., priority: high}
