executive_summary:
  overall_assessment: "Algolia is eligible for a public-source private-unicorn diligence report: current company pages are active and public unicorn/funding evidence supports a US$2.25B valuation screen, with no completed IPO/acquisition/shutdown found in reviewed sources. Product, customer and compliance signals are strong, but financial, retention, cloud-cost, competition and legal-contract gaps remain unresolved."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The case depends on proving durable AI-search/retrieval revenue growth, NRR, gross margin after cloud/model costs, defensible product differentiation and clean security/privacy/legal posture.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Algolia publicly markets AI Search, Recommendations, Browse, Agent Studio and related retrieval products.
      evidence_claim_ids:
        - EC-003
        - EC-010
    - founder_claim_id: FC-003
      summary: Company customer page claims more than 18,000 customers across 150+ countries.
      evidence_claim_ids:
        - EC-005
    - founder_claim_id: FC-004
      summary: Security page lists SOC 2, ISO 27001:2022, GDPR and a no-exceptions SOC 2 note.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-006
      summary: Competition from search, commerce and AI/cloud incumbents is intense.
    - risk_id: R-001
      summary: Financial quality and cap table are private.
    - risk_id: R-002
      summary: Usage pricing and cloud/model costs may pressure gross margin.
  key_evidence_gaps:
    - Audited financials, ARR, NRR, gross margin, cloud/model COGS and cash runway.
    - Cap table, preferences, debt and investor rights.
    - Top-customer ARR, churn, concentration, renewal terms and DPAs.
    - Product benchmarks, roadmap, model/vendor dependencies and incident history.
    - Legal docket, IP/open-source, material contracts, SOC reports and insurance.
  recommended_next_steps:
    - Run revenue-quality and gross-margin diligence focused on usage/cloud/model costs.
    - Request customer cohort and top-account data before relying on customer-count claims.
    - Benchmark AI-search relevance and total cost against direct competitors.
    - Have security/counsel review SOC reports, DPAs, IP and material contracts.
