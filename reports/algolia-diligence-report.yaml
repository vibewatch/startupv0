    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, KPI pack, cash/debt and budget-to-actuals.
    why_it_matters: Public valuation and product claims do not prove financial quality.
    suggested_source_or_request: Request audited financials and management KPI pack.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferences, options, warrants and debt.
    why_it_matters: Headline valuation may hide liquidation or dilution risk.
    suggested_source_or_request: Request cap table and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue, churn, NRR and contract terms.
    why_it_matters: Customer-count or logo claims do not prove revenue quality.
    suggested_source_or_request: Request top-customer schedule and cohort metrics.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, funnel conversion and pipeline.
    why_it_matters: GTM efficiency cannot be assessed from public pages.
    suggested_source_or_request: Request sales productivity model.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, R&D budget, incident history and dependency map.
    why_it_matters: Product defensibility and execution risk require internal evidence.
    suggested_source_or_request: Request roadmap, architecture and incident register.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS export, attrition, compensation and succession data.
    why_it_matters: Team stability is not public.
    suggested_source_or_request: Request org chart and HRIS export.
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, regulatory correspondence, insurance and material contracts.
    why_it_matters: Legal exposure can materially affect valuation.
    suggested_source_or_request: Have counsel review dockets and material contracts.
    priority: high
