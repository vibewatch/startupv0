report_metadata:
  report_title: Algolia Startup Diligence Report
  target_company: Algolia
  website: https://www.algolia.com/
  known_aliases:
    - Algolia Inc.
    - Algolia SAS
  sector: AI search, discovery and retrieval software
  geography: France / United States / global software markets
  company_stage: Private unicorn / growth-stage software company
  research_date: 2026-06-07
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the exclusion list from existing reports and selected this target via shuf -n 3 from parsed public unicorn-list candidates.
    - Used public company pages, public registry or security pages, news/search snippets and market-list evidence available through public web fetches.
    - No private data room, founder interview, customer call, paid database export or counsel report was available.
  included_jurisdictions:
    - France
    - United States
    - European Union
    - Global markets referenced by public materials
  excluded_topics:
    - Private financial statements, cap table, customer contracts, board materials, legal docket exports, full security reports and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-07
      notes: No pitch deck, financial model, founder responses or data room were provided.
