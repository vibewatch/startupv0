diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR bridge, margins, cash/debt, backlog and AR aging.
    why_it_matters: Core revenue quality and runway cannot be underwritten publicly.
    suggested_source_or_request: CFO/accountant data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, financing/debt docs, preferences, option pool and investor rights.
    why_it_matters: Public valuation does not determine economics.
    suggested_source_or_request: Company/investor legal records.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top customers by ARR/application, contracts, churn/NRR/GRR and references.
    why_it_matters: Case studies do not reveal concentration.
    suggested_source_or_request: Contracts, billing exports and customer calls.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Retailer/API/data partner contracts, permissions, supplier/cloud spend and incident history.
    why_it_matters: Platform dependency is central to continuity.
    suggested_source_or_request: Partner/API contracts and supplier records.
    priority: high
  - gap_id: G-005
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, margin, adoption, roadmap, uptime, AI governance and security architecture.
    why_it_matters: Product breadth may not translate into profitable adoption.
    suggested_source_or_request: Product/engineering/security data room.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, competitor pricing and market share.
    why_it_matters: Competition could pressure growth and retention.
    suggested_source_or_request: Sales/customer interviews and competitive intelligence.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, quotas, CAC/payback and pipeline conversion.
    why_it_matters: Forecast achievability is not visible.
    suggested_source_or_request: Sales ops/CRM/finance exports.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D budget, roadmap cost/timing, release quality and data/model provider costs.
    why_it_matters: AI/DaaS roadmap may require significant cost/control.
    suggested_source_or_request: Product roadmap and engineering metrics.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, attrition, contractors, compensation and equity.
    why_it_matters: Execution capacity and retention risk cannot be evaluated publicly.
    suggested_source_or_request: HRIS and comp/equity plans.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP assignments, trademark/patent records, OSS scans and acquisition IP conveyance.
    why_it_matters: Rebrand/roll-up heighten IP-chain risk.
    suggested_source_or_request: Counsel IP diligence.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.G
