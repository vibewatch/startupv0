report_metadata:
  report_title: Assembly (Pacvue) Public-Source Startup Diligence Report
  target_company: Assembly (Pacvue)
  website: https://www.pacvue.com/
  known_aliases:
    - Assembly
    - Pacvue
    - Assembly Group
    - Pacvue Corporation
    - Helium 10 (referenced in Pacvue suite)
  sector: Consumer & Retail / e-commerce enablement / retail media and commerce software
  geography: United States; CB Insights seed references Culver City; public terms name Pacvue Corporation as Washington corporation; AWS listing indicates China/Shanghai signal requiring verification
  company_stage: Late-stage private unicorn
  research_date: 2026-06-14
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prepared one public-source diligence YAML for Assembly, now operating publicly as Pacvue.
    - Prioritized company, newswire, partner, GitHub, legal/terms, careers and search-snippet evidence; treated company metrics as unverified until privately supported.
    - Mapped all eight checklist chapters and converted private checklist items into gaps and follow-ups.
    - Did not infer audited financials, customer ARR, cap table, legal clearance, security compliance or HR metrics from absence of public evidence.
  included_jurisdictions:
    - United States
    - California / Washington corporate signals
    - EU / UK / California / Australia / Canada privacy regimes referenced in terms
    - China / Shanghai footprint signal
    - Global retailer/ad-platform markets
  excluded_topics:
    - Private data room materials
    - Management, investor, customer, supplier, counsel or auditor interviews
    - Paid databases/paywalled articles
    - Complete registry/docket/trademark downloads
    - Security audits, DPAs, insurance, contracts, cap tables and board materials
  user_provided_materials:
    - material_id: UPM-001
      title: Assignment and eligibility seed facts for Assembly/Pacvue
      type: workflow_request
      date_received: 2026-06-14
      notes: User supplied CB Insights/unicorn/valuation/PRNewswire/Advent/Pacvue seed facts and no public IPO/acquisition/shutdown evidence as of 2026-06-14.
