executive_summary:
  overall_assessment: "Assembly/Pacvue appears eligible for confirmatory diligence as an active late-stage private unicorn: public evidence supports a 2021 Advent/PSG-backed $1B+ context, the Pacvue acquisition, the Pacvue brand transition, current Commerce Media OS operations, broad retailer integrations, named customer stories, leadership/hiring signals, legal terms, Amazon Ads partner evidence and public MCP activity. It is not an underwriting conclusion because financial quality, cap table, customer concentration, contracts, security/legal clearance, IP and HR data remain private."
  investment_or_diligence_thesis: Proceed only with confirmatory finance, customer, product/security, legal/IP and HR diligence. The public thesis is monetizing cross-retailer retail-media/commerce workflow automation; key tests are revenue quality, retention, concentration, API dependency, defensibility, AI/data security controls and roll-up integration economics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Assembly has public private-unicorn context near $1B.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-003
      summary: Assembly acquired Pacvue and later adopted the Pacvue brand publicly.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-004
      summary: Pacvue publicly offers a broad Commerce Media/Operating System across multiple products and 100+ integrations.
      evidence_claim_ids:
        - EC-005
        - EC-008
        - EC-009
        - EC-010
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR, margins, burn, cash/debt, pricing and forecasts are not public.
    - risk_id: R-004
      summary: Value depends on retailer/ad-platform APIs, certifications and changing data policies.
    - risk_id: R-003
      summary: Customer concentration, churn, retention and active revenue status are undisclosed.
    - risk_id: R-007
      summary: Privacy, security, outside-platform and AI/data obligations require private artifacts.
    - risk_id: R-008
      summary: Roll-up and rebrand history creates integration, entity, IP and migration risk.
  key_evidence_gaps:
    - Audited financials, ARR bridge, margins, cash/debt, cap table, financing terms and projections.
    - Top-customer ARR, concentration, churn/retention, contracts, renewals and supplier/platform spend.
    - Product-level P&L, pricing, roadmap, AI governance, security architecture, uptime and data/API contracts.
    - SOC/ISO, DPA/subprocessors, pen tests, cyber insurance, IP records, litigation/regulatory and material contracts.
    - HRIS headcount, attrition, compensation/equity, succession and integration KPIs.
  recommended_next_steps:
    - Open finance/cap-table diligence with CFO/investors.
    - Run customer/partner diligence on top accounts, references, churn and API dependencies.
    - Run technical/security diligence on Agent, MCP, DaaS, data flows, OAuth/API tokens and retailer API resiliency.
    - Run counsel-led legal/IP/privacy diligence.
    - Run management/HR diligence on leadership transition, capacity, attrition and roll-up integration.
