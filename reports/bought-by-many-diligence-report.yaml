risk_register:
  - risk_id: R-001
    risk_title: Profit durability and cash conversion
    risk_category: financial
    severity: high
    likelihood: medium
    description: FY2024/25 was the first annual profit after a £33M loss, so durability, reserves, cash conversion, and normalized EBITDA are unproven publicly.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
    evidence_claim_ids:
      - EC-006
      - EC-007
    mitigation_or_diligence_request: Obtain audited accounts, QoE, monthly management accounts, cash-flow bridge, reserve triangles, and forecast sensitivities.
  - risk_id: R-002
    risk_title: GWP contraction and UK reacceleration requirement
    risk_category: market
    severity: medium
    likelihood: high
    description: GWP declined 3% due to the US sale; the UK-focused business must now prove efficient growth.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - V.A
    evidence_claim_ids:
      - EC-006
      - EC-015
    mitigation_or_diligence_request: Review continuing-UK GWP bridge, channel-level CAC/payback, renewals, churn, and FY2026 plan.
  - risk_id: R-003
    risk_title: International retreat and residual liabilities
    risk_category: legal
    severity: high
    likelihood: medium
    description: Sweden no-renewal and US sale refocus the company but may leave claims, data, employment, customer, indemnity, or regulatory liabilities.
    impacted_chapter_ids:
      - IV
      - VIII
    impacted_section_ids:
      - IV.B
      - VIII.B
    evidence_claim_ids:
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Request Sweden run-off and US sale/transfer documents, reserve schedules, customer notices, and legal opinions.
  - risk_id: R-004
    risk_title: High-limit and pre-existing underwriting exposure
    risk_category: product
    severity: high
    likelihood: medium
    description: £20k cover and pre-existing-condition products can attract high-severity claims and adverse selection.
    impacted_chapter_ids:
      - II
    impacted_section_ids:
      - II.A
      - II.B
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Review product-level loss ratio, pricing rules, exclusions, claim severity, adverse-selection controls, and actuarial memoranda.
  - risk_id: R-005
    risk_title: Regulatory and underwriting capacity dependence
    risk_category: regulatory
    severity: high
    likelihood: unknown
    description: Pet insurance economics depend on permissions, distribution conduct, underwriting/capacity contracts, delegated authority, and complaint controls.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.B
      - VIII.A
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-005
    mitigation_or_diligence_request: Counsel should verify FCA permissions, appointed-representative status if relevant, capacity contracts, claims authority, complaints, and correspondence.
  - risk_id: R-006
    risk_title: Cap table, liquidation preference, and valuation overhang
    risk_category: financing
    severity: high
    likelihood: unknown
    description: The >$2B 2021 round may include preferences; recent capital filings mean current common-equity value cannot be inferred publicly.
    impacted_chapter_ids:
      - I
      - VII
      - VIII
    impacted_section_ids:
      - I.B
      - VII.B
      - VIII.A
    evidence_claim_ids:
      - EC-003
      - EC-005
    mitigation_or_diligence_request: Obtain fully diluted cap table, option pool, debt/warrants, SAFEs if any, round docs, side letters, and liquidation waterfall.
  - risk_id: R-007
    risk_title: AI claims automation conduct and governance
    risk_category: technical
    severity: high
    likelihood: medium
    description: Millie handles up to 45% of claims, creating potential upside but also fairness, accuracy, appeal, explainability, and complaint risk.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.B
      - VI.A
      - VIII.A
    evidence_claim_ids:
      - EC-011
      - EC-013
    mitigation_or_diligence_request: Review model governance, training data, performance, overrides, QA, decline/partial-payment outcomes, audit logs, and policyholder notices.
  - risk_id: R-008
    risk_title: Customer trust metrics may be selectively presented
    risk_category: customer
    severity: medium
    likelihood: medium
    description: Trustpilot and claims-paid metrics are positive but need raw exports and denominator review.
    impacted_chapter_ids:
      - II
      - III
      - V
    impacted_section_ids:
      - II.B
      - III.A
      - V.B
    evidence_claim_ids:
