report_metadata:
  report_title: Bought By Many / ManyPets Startup Diligence Report
  target_company: Bought By Many / ManyPets
  website: https://manypets.com/uk/
  known_aliases:
    - Bought By Many
    - Bought By Many Ltd
    - MANYPETS LTD
    - ManyPets
    - Many Group Ltd
  sector: Insurtech / pet insurance
  geography: United Kingdom; historical United States and Sweden exposure
  company_stage: Private venture-backed unicorn / growth-stage insurtech
  research_date: 2026-05-17
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: GBP unless otherwise noted
  time_zone: Europe/London
research_scope:
  diligence_depth: deep_diligence
  source_strategy:
    - Verify legal eligibility and identity through Companies House before business analysis.
    - Prefer primary company, regulatory, and independent news sources.
    - Separate verified public facts from private data-room requests and risk hypotheses.
    - Focus on current UK economics after US and Sweden strategic exits.
  included_jurisdictions:
    - United Kingdom
    - United States exit context
    - Sweden run-off context
  excluded_topics:
    - Private cap table and investor documents were not available.
    - No legal opinion, customer calls, live quote-shop, or licensed market research were performed.
  user_provided_materials: []
