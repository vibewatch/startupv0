executive_summary:
  overall_assessment: AppsFlyer appears eligible for a private-unicorn public-source diligence report. CB Insights lists AppsFlyer as a $2B private unicorn and its financial profile shows Acq - Cancelled, while Globes reports Apollo/Fortissimo acquisition talks stalled/rejected rather than closed. Public evidence supports a large active marketing-measurement business with broad product, customer, partner, privacy and security surfaces. Investment reliance remains limited by missing audited financials, cap table, customer economics, contracts, security reports and counsel-confirmed legal/regulatory status.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only. AppsFlyer may be a durable marketing-data infrastructure asset if $500M+ revenue, profitability, retention, privacy resilience and AI/product expansion are verified, but valuation should be discounted until private financials, concentration, platform-dependency exposure, security/privacy posture and financing preferences are proven.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists AppsFlyer at a $2B unicorn valuation and an Acq - Cancelled event, supporting private-unicorn treatment.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-030
    - founder_claim_id: FC-004
      summary: AppsFlyer publishes active product pages for measurement, deep linking, data collaboration and agentic AI.
      evidence_claim_ids:
        - EC-006
        - EC-008
    - founder_claim_id: FC-002
      summary: AppsFlyer publicly claims scale of 15K+ brands and 100K+ active mobile apps measured.
      evidence_claim_ids:
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR bridge, profitability and valuation support are not independently verifiable.
    - risk_id: R-002
      summary: SDK/data-processing role creates privacy and regulatory exposure.
    - risk_id: R-003
      summary: Signal loss and platform privacy frameworks may pressure core attribution products.
    - risk_id: R-005
      summary: Customer concentration, retention, churn and NRR are not public.
    - risk_id: R-006
      summary: Stalled/rejected acquisition reporting creates exit and valuation uncertainty.
  key_evidence_gaps:
    - Audited financials, ARR/bookings bridge, gross margin, cash/debt and forecast variance.
    - Current cap table, preferences, option pool, debt/liens and transaction-process materials.
    - Customer-level ARR, top-account concentration, NRR/GRR, churn and contract terms.
    - Product module attach, AI adoption, pricing realization, CAC/payback and sales productivity.
    - SOC 2/ISO scope, pen tests, incident history, DPAs, subprocessors and regulator correspondence.
  recommended_next_steps:
    - Confirm private-company/transaction status with counsel and secretary records.
    - Perform quality-of-revenue diligence before relying on public $500M+ revenue reporting.
    - Run privacy/security diligence around SDK data flows, sensitive-data controls and subprocessors.
    - Request top customer contracts and independent references to validate retention and switching costs.
    - Review AI and privacy-resilient measurement roadmap against platform and competitor risks.
