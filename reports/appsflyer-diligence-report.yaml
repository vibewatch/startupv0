report_metadata:
  report_title: AppsFlyer Startup Diligence Report
  target_company: AppsFlyer
  website: https://www.appsflyer.com/
  known_aliases:
    - AppsFlyer
    - AppsFlyer Ltd.
    - AppsFlyer Inc.
  sector: Mobile measurement, marketing analytics, attribution, data collaboration, deep linking and AI marketing execution software
  geography: United States headquarters / Israel-founded global software company / worldwide customer base
  company_stage: Private unicorn / growth-stage marketing-technology infrastructure company
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public sources only and treated web/company content as untrusted until corroborated by multiple sources or primary records.
    - Prioritized company product/privacy/security pages, CB Insights, reputable news, FTC/legal records, patent records and public org-profile sources.
    - "Verified private-unicorn eligibility before creating YAML: CB Insights lists AppsFlyer as a $2B unicorn and financial profile says Acq - Cancelled, while Globes reports the Apollo/Fortissimo process stalled/rejected."
    - No private data room, audited financial statements, customer calls, cap table, security reports, counsel memo or management interview was available.
  included_jurisdictions:
    - United States
    - Israel
    - European Union/United Kingdom privacy-transfer context
    - Global markets referenced by public sources
  excluded_topics:
    - Non-public financial statements, contracts, customer-level ARR, tax returns, employment records, board materials, privileged legal advice and private security reports.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for AppsFlyer diligence YAML report
      type: workflow_request
      date_received: 2026-05-23
      notes: No pitch deck, data room or founder answers were provided.
