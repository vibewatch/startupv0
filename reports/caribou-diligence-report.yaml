risk_register:
  - risk_id: R-001
    risk_title: Financial performance and valuation support are opaque
    risk_category: financial
    severity: high
    likelihood: high
    description: Public materials support valuation history and borrower-scale
      metrics, but no audited financials, ARR, margin, cash, debt or
      profitability data are public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Obtain audited financials, KPI pack, lender
      economics and board-approved plan.
  - risk_id: R-002
    risk_title: Cap-table opacity and funding-history inconsistencies
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public sources identify investors and some round terms, but Series
      B and Series C amounts differ across sources and no ownership schedule is
      public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Reconcile all rounds against signed documents,
      charter, option pool, SAFEs/notes and liquidation waterfall.
  - risk_id: R-003
    risk_title: Insurance and ancillary-product scope is strategically ambiguous
    risk_category: product
    severity: medium
    likelihood: medium
    description: 2022 materials highlighted a digital insurance marketplace, while
      2026 materials emphasize refinance and optional protection with insurance
      more visible in support, licensing and terms pages.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.D
      - VIII.E
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request current insurance/product revenue mix, policy count and roadmap.
  - risk_id: R-004
    risk_title: Customer concentration and unit economics are not public
    risk_category: customer
    severity: high
    likelihood: high
    description: Public sources disclose aggregate borrower counts and testimonials
      but not revenue by customer, CAC, payback, NRR or channel concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - V.D
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request borrower acquisition, conversion,
      retention and partner-concentration data.
  - risk_id: R-005
    risk_title: Marketplace execution depends on lenders, carriers, bureaus and
      title operations
    risk_category: operational
    severity: high
    likelihood: medium
    description: Caribou depends on lender appetite, credit-bureau access,
      carrier/product partners and reliable payoff/titling workflows.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.B
      - III.E
      - VI.B
      - VIII.F
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review partner concentration, SLAs, fallback
      plans, implementation capacity and operational error rates.
  - risk_id: R-006
    risk_title: Regulatory, privacy and compliance burden is material
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Caribou collects sensitive financial/identity data, uses
      machine-learning inferences, operates under many lending/insurance
      licenses and relies on arbitration-heavy terms.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.C
      - VIII.E
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request state exam history, privacy/security
      controls, incident logs and compliance memos.
  - risk_id: R-007
    risk_title: Complaint and litigation exposure is visible in public records
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Public complaint data and at least two recent federal cases show
      non-trivial legal and customer-service diligence work.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review pleadings, arbitration statistics, complaint taxonomy and reserves.
  - risk_id: R-008
    risk_title: Current org capacity and turnover are only partially visible
    risk_category: team
    severity: medium
    likelihood: medium
    description: Caribou scaled rapidly in 2020-2022 and has recent executive hires,
      but current headcount, attrition and broader executive bench remain
      private.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.A
      - VII.B
      - VII.C
      - VII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request org chart, headcount by
      function/location, attrition and hiring plan.
  - risk_id: R-009
    risk_title: Demand is sensitive to auto-finance and affordability cycles
    risk_category: market
    severity: medium
    likelihood: medium
    description: Public rates/trends data show demand is driven by payment relief,
      APR changes and loan sizes, exposing the model to macro and credit-cycle
      swings.
    impacted_chapter_ids:
      - I
      - IV
      - V
    impacted_section_ids:
      - I.B
      - IV.A
      - V.C
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Stress-test conversion, approval and lender
      appetite under different rate and credit-loss environments.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, cash/debt schedule and charge-off metrics.
    why_it_matters: Public valuation and scale claims cannot substitute for
      financial-quality diligence.
    suggested_source_or_request: Request finance data room and lender-performance pack.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option pool, debt instruments and liquidation waterfall.
    why_it_matters: Control, dilution and investor-rights risk are not inferable
      from public sources.
    suggested_source_or_request: Request signed financing docs, charter and cap-table export.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level revenue, protection-product attach rates and
      insurance-policy economics.
    why_it_matters: Current product-mix strategy cannot be underwritten from public
      materials alone.
    suggested_source_or_request: Request product P&L and insurance / ancillary KPI dashboard.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Channel, lender-partner and borrower concentration metrics.
    why_it_matters: A consumer lender may have hidden concentration outside named customers.
    suggested_source_or_request: Request revenue, funded-volume and margin mix by channel/partner/segment.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, sales-cycle, partner onboarding and quota metrics.
    why_it_matters: Public GTM sophistication does not prove efficient growth.
    suggested_source_or_request: Request GTM operating model and board KPI pack.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Technical org chart, platform architecture, uptime/SLA and
      model-governance artifacts.
    why_it_matters: Operational resilience and technical debt are core underwriting
      questions for a marketplace.
    suggested_source_or_request: Request engineering review packet and incident history.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount, attrition and org-capacity data by function/location.
    why_it_matters: Rapid historical scaling can hide current execution risk.
    suggested_source_or_request: Request HRIS export and hiring / attrition analysis.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Top lender, carrier, affiliate and technology agreements.
    why_it_matters: Contract economics and termination rights can materially shift
      risk and value.
    suggested_source_or_request: Request counsel-vetted contract summaries and key agreements.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: State exam history, regulator correspondence and complaint
      root-cause analysis.
    why_it_matters: The broad license footprint creates meaningful unseen compliance exposure.
    suggested_source_or_request: Request compliance memos and exam tracker.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP assignments, patent strategy and trademark prosecution status.
    why_it_matters: Public brand filings exist, but full defensibility picture is incomplete.
    suggested_source_or_request: Request IP schedule and outside-counsel memo.
    priority: medium
