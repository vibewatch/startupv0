report_metadata:
  report_title: Caribou Startup Diligence Report
  target_company: Caribou
  website: https://www.caribou.com/
  known_aliases:
    - MotoRefi
    - Caribou Financial, Inc.
    - Caribou Insurance Services, LLC
    - Caribou Insurance Associates, LLC
  sector: Auto refinance fintech marketplace, lending distribution, insurance
    brokerage/comparison and ancillary vehicle protection
  geography: United States / Denver, Colorado; Washington, DC; Chandler, Arizona;
    remote U.S. workforce
  company_stage: Private unicorn / growth-stage auto-finance marketplace
  research_date: 2026-06-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Denver
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used only public web research accessible through company pages,
      independent news, market databases, legal/IP records and public search
      snapshots.
    - Treated company-owned metrics as evidence of public claims, not as audited
      truth, unless independently triangulated.
    - Prioritized direct company sources for product, licensing and hiring
      evidence; used Forge, Technical.ly, NerdWallet, LendingTree and public
      docket sources for external triangulation.
    - Where public evidence was absent, used not_publicly_verifiable or
      inconclusive rather than speculation.
  included_jurisdictions:
    - United States
    - Colorado
    - District of Columbia
    - Arizona
    - Multi-state lending and insurance license jurisdictions disclosed publicly
  excluded_topics:
    - Audited financial statements, private contracts, cap table, charge-off
      files, servicing data and board materials were unavailable.
    - No management interview, customer reference call, lender partner call or
      counsel memo was available.
    - No paywalled or access-controlled sources were bypassed.
  user_provided_materials:
    - material_id: UPM-001
      title: User task brief and disambiguation notes
      type: workflow_request
      date_received: 2026-06-17
      notes: No pitch deck, data room or founder responses were provided.
