executive_summary:
  overall_assessment: Caribou is an eligible active private auto-finance unicorn
    with credible public funding history, live borrower acquisition tooling, a
    visible lender/partner footprint and real licensing breadth. Public evidence
    is strong enough to justify confirmatory diligence, but not strong enough to
    underwrite valuation, durability or risk without a private data room.
  investment_or_diligence_thesis: The public case for Caribou is strongest around
    a real refinance marketplace with meaningful scale signals and partner
    infrastructure. The key diligence question is not whether the company exists
    or has distribution, but whether current economics, partner concentration,
    legal/regulatory posture and insurance-adjacent strategy justify the
    private-unicorn valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Forge still shows Caribou as a pre-IPO private company with a ~US$1.11B
        post-money valuation and Series C as its latest visible round.
      evidence_claim_ids:
        - EC-001
        - EC-011
    - founder_claim_id: FC-002
      summary: Caribou currently markets no-credit-impact rate checks and live daily
        APR matrices, with cohort savings around US$162/month.
      evidence_claim_ids:
        - EC-002
        - EC-014
        - EC-015
    - founder_claim_id: FC-005
      summary: Caribou publicly maintains broad lending and insurance license
        footprints plus explicit lender and affiliate partnership programs.
      evidence_claim_ids:
        - EC-012
        - EC-013
        - EC-018
        - EC-019
  biggest_risks:
    - risk_id: R-001
      summary: Current financial performance, margins, cash/debt and valuation support
        are not public.
    - risk_id: R-003
      summary: Insurance capability is real but its current strategic importance is
        ambiguous in the 2026 consumer funnel.
    - risk_id: R-006
      summary: Multi-state lending/insurance licensing, sensitive-data handling and
        arbitration-heavy legal terms create meaningful compliance burden.
  key_evidence_gaps:
    - Audited financials, charge-offs, servicing metrics, cash/debt and current
      forecast model.
    - Current cap table, investor rights, option pool, debt instruments and
      liquidation waterfall.
    - Channel, lender-partner and borrower concentration metrics plus
      CAC/payback and conversion funnel.
    - Current insurance-product economics, policy count and carrier / commission
      mix.
    - State exam history, litigation reserves, complaint root-cause analysis and
      security / privacy control evidence.
  recommended_next_steps:
    - Run finance and capital-structure diligence before relying on headline
      unicorn valuation.
    - Request product-mix economics and clarify whether insurance is a live
      growth product, a lower-profile adjacency or a legacy support flow.
    - Obtain partner concentration, contract summaries and GTM operating metrics
      to assess channel durability.
    - Have counsel and compliance specialists review litigation, complaint,
      licensing and privacy / AI governance artifacts.
    - Validate management depth, attrition and technical-operating capacity with
      an HRIS/org-chart package and leadership interviews.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports Caribou’s private-unicorn financing
      history and marketplace scale signals, but no audited financial
      statements, forecast model or full cap table are public.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-007
      - EC-008
      - EC-009
      - EC-010
      - EC-011
      - EC-014
      - EC-015
      - EC-031
      - EC-032
    risk_ids:
      - R-001
      - R-002
      - R-009
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited income statement, balance sheet, cash-flow or
          revenue-quality package was public; the best public substitutes are
          borrower-scale and rates/trends datasets.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
