              pricing signals rather than audited operating statements.
            evidence_claim_ids:
              - EC-012
              - EC-015
              - EC-032
            risk_ids:
              - R-001
        hidden_risks:
          - Without audited financials, valuation support is weak relative to
            headline unicorn status.
        evidence_gaps:
          - Audited financials, cash/debt schedule, charge-offs, margins and
            cohort metrics were not public.
        follow_up_questions:
          - Provide three years of audited financials, management accounts and
            lender-unit economics.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-012
          - EC-015
          - EC-032
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources disclose underwriting criteria, borrower affordability
          drivers and payment-savings trends, but not management projections or
          budget scenarios.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
