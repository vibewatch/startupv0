              compression in a higher-cost auto-finance environment.
            evidence_claim_ids:
              - EC-014
              - EC-015
            risk_ids:
              - R-009
        hidden_risks:
          - Macro and credit-cycle sensitivity could materially change approval
            and conversion dynamics.
        evidence_gaps:
          - No public forecast model, budget, scenario analysis or capex plan.
        follow_up_questions:
          - Provide forecast model, scenario cases and assumptions behind growth
            and capital needs.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-014
          - EC-015
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Major investors and some round-term proxies are public, but no
          ownership schedule, option pool, debt schedule or waterfall is public;
          public round sizes also conflict slightly across sources.
        verification_status: partially_verified
        confidence: medium
        key_findings:
