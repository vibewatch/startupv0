report_metadata:
  report_title: BeiBei Startup Diligence Report
  target_company: BeiBei
  website: https://www.beibei.com/
  known_aliases:
    - Beibei
    - BeiBei
    - Beibei.com
  sector: Maternal and infant products e-commerce / consumer marketplace
  geography: China (Hangzhou, Zhejiang)
  company_stage: Private unicorn / growth-stage consumer marketplace, public evidence stale after 2016 financing
  research_date: 2026-06-16
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list and selected targets from public unicorn lists before research.
    - Used public web evidence only, including unicorn databases, company pages, news/search snippets and regulatory
      filings where available.
    - Treated public and company-owned sources as screening evidence; marked private checklist items
      not_publicly_verifiable rather than speculating.
    - No private data room, customer calls, paid database exports, management interviews or privileged documents were
      used.
  included_jurisdictions:
    - China (Hangzhou, Zhejiang)
    - Public global markets referenced by sources
  excluded_topics:
    - Private financial statements, cap table, board materials, customer contracts, supplier contracts, HRIS exports,
      privileged legal records and non-public security documents.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow target metadata for BeiBei
      type: workflow_request
      date_received: 2026-06-16
      notes: Selected as one of three uncovered private unicorn targets; slug beibei; public valuation $1.0B+.
