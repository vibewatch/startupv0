executive_summary:
  overall_assessment: BeiBei appears to remain on current unicorn lists and active startup databases, but the public
    evidence base is old and thin. Treat valuation as stale until management provides current financial, user, merchant,
    inventory and legal records.
  investment_or_diligence_thesis: "BeiBei merits confirmatory diligence only: public sources verify an e-commerce product
    category, Hangzhou base, investors and 2016 Series D financing, but current operating scale, revenue quality and
    consumer relevance are not publicly verifiable."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support unicorn/status screening for BeiBei.
      evidence_claim_ids:
        - EC-001
        - EC-005
    - founder_claim_id: FC-002
      summary: Public sources support active product/platform presence.
      evidence_claim_ids:
        - EC-002
        - EC-008
    - founder_claim_id: FC-003
      summary: Public sources provide user/customer/partner or distribution signals, but not concentration economics.
      evidence_claim_ids:
        - EC-004
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Stale public valuation and no public current financials
    - risk_id: R-005
      summary: China consumer e-commerce competition and pricing pressure
    - risk_id: R-008
      summary: Customer, supplier, legal and operating data are private or thin
  key_evidence_gaps:
    - Audited financials, KPI pack, cash/debt schedule and financing documents
    - Fully diluted cap table, preferences, option plan and investor rights
    - Top customer/supplier contracts, revenue concentration, churn/retention and reference calls
    - Technical architecture, security, roadmap, incident history and IP assignment records
    - Legal/regulatory/insurance schedules and HRIS/personnel/turnover data
  recommended_next_steps:
    - Do not rely on public-list valuation without financing documents and current financials.
    - Run customer, supplier, legal/regulatory, technical/security and HR diligence before investment reliance.
    - Ask management to reconcile public valuation/status evidence with current operating metrics and post-research-date
      events.
