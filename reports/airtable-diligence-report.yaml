executive_summary:
  overall_assessment: "Airtable has substantial public product, customer, compliance, and leadership evidence, but the core investment questions remain private: current valuation support, revenue growth, retention, enterprise expansion, AI monetization, and post-layoff execution quality. Treat public adoption as encouraging but not sufficient without financial statements, customer cohorts, and sales-efficiency data."
  investment_or_diligence_thesis: The diligence question is whether Airtable can defend and monetize its large installed base as it transitions from no-code/database collaboration toward AI-native enterprise apps, while competing with bundled work-management, spreadsheet, automation, and AI app-building platforms.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Airtable-owned pages support enterprise app-building, AI, workflow, database, automation, and integration positioning.
      evidence_claim_ids:
        - EC-003
        - EC-009
        - EC-015
    - founder_claim_id: FC-004
      summary: Airtable security page supports SOC 2 Type 2, ISO 27001/27701, HIPAA, TX-RAMP, GDPR/CCPA, EU data residency, EKM, DPA, and subprocessors.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-003
      summary: Airtable about/customer materials support broad logo/adoption claims, while paid usage and retention remain private.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Airtable is publicly tracked around an $11B-$11.7B valuation, but audited revenue, growth, margin, burn, cash, and current market-clearing valuation are not public.
    - risk_id: R-002
      summary: Usage and logo claims are strong, but customer concentration, NRR, churn, discounting, seat expansion, and enterprise contract quality are not public.
    - risk_id: R-003
      summary: Airtable is repositioning around AI apps/agents and large-scale data; execution depends on product adoption, data governance, AI reliability, and integration architecture.
  key_evidence_gaps:
    - Audited revenue, ARR bridge, growth, gross margin, cash, burn, runway, latest valuation marks, debt, and financing terms.
    - Paid customer count, ARR concentration, NRR, churn, expansion, discounting, AI attach, and customer references.
    - AI roadmap, model/vendor contracts, product analytics, integration reliability, incident history, security reports, and data-governance controls.
    - Current HRIS, attrition, hiring plan, compensation, morale, leadership retention, and post-layoff execution metrics.
  recommended_next_steps:
    - Run financial-quality diligence around ARR/revenue recognition, burn/runway, 409A/secondary marks, and AI monetization.
    - Validate customer adoption claims against paid accounts, top-account concentration, retention cohorts, AI usage, and reference calls.
    - Review AI roadmap, product analytics, integration architecture, security/compliance reports, and subprocessor/data-residency evidence.
    - Benchmark against Smartsheet, Monday.com, Asana, Notion, Coda, Google/Microsoft app platforms, and AI workflow startups.

