risk_register:
  - risk_id: R-001
    risk_title: Valuation reset and financial opacity
    risk_category: financial
    severity: high
    likelihood: medium
    description: Airtable is publicly tracked around an $11B-$11.7B valuation, but audited revenue, growth, margin, burn, cash, and current market-clearing valuation are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request audited financials, current ARR/revenue, cash/burn/runway, latest 409A/secondary data, financing terms, and board plan.
  - risk_id: R-002
    risk_title: Customer concentration, retention, and monetization quality
    risk_category: commercial
    severity: high
    likelihood: medium
    description: Usage and logo claims are strong, but customer concentration, NRR, churn, discounting, seat expansion, and enterprise contract quality are not public.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - V.A
      - V.B
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Request customer cohorts, top-account contracts, retention, churn, expansion, pricing/discounting, and reference calls.
  - risk_id: R-003
    risk_title: AI transition and technical execution risk
    risk_category: technology
    severity: high
    likelihood: medium
    description: Airtable is repositioning around AI apps/agents and large-scale data; execution depends on product adoption, data governance, AI reliability, and integration architecture.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - II.B
      - VI.A
      - VI.B
      - VIII.B
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Review AI roadmap, model/vendor contracts, data governance, incident history, product analytics, and security controls.
  - risk_id: R-004
    risk_title: Crowded work-management and no-code competition
    risk_category: market
    severity: high
    likelihood: high
    description: Airtable competes with work-management, spreadsheet, database, automation, and AI app-building platforms that can bundle, underprice, or own adjacent workflows.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - IV.B
      - V.A
      - V.B
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Request win/loss, competitive displacement, pricing benchmarks, CAC, payback, and channel-specific retention.
  - risk_id: R-005
    risk_title: Security, privacy, and compliance obligations
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Airtable stores business data and offers enterprise security features, making privacy, data residency, subprocessors, EKM, HIPAA, SOC, ISO, and regulatory commitments material.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.A
      - VIII.B
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Review SOC/ISO reports, DPA, subprocessor contracts, data residency controls, incident history, insurance, and regulator correspondence.
  - risk_id: R-006
    risk_title: Organization and execution after layoffs / AI pivot
    risk_category: people
    severity: medium
    likelihood: medium
    description: Public layoff history and executive changes raise diligence questions about morale, retention, leadership depth, and execution capacity during AI repositioning.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Request HRIS, attrition, engagement surveys, hiring plan, compensation, executive retention, and succession plan.

diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, cash, burn, runway, revenue-recognition policy, margin bridge, debt, and tax positions.
    why_it_matters: Public valuation and operating claims cannot be translated into financial quality without primary records.
    suggested_source_or_request: Audited statements, management accounts, revenue schedules, board plan, bank/debt files, and tax workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Cap table, stock ledger, financing documents, liquidation preferences, investor rights, option plan, debt, warrants, and secondary/tender history.
    why_it_matters: Security terms determine ownership, governance, downside protection, and common-equity value.
    suggested_source_or_request: Charter, investor-rights agreement, voting agreement, ROFR/co-sale, financing documents, and stock-ledger export.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top-customer or user concentration, retention cohorts, churn, net expansion, usage intensity, support burden, and customer reference outcomes.
    why_it_matters: Durability depends on customer quality rather than top-line adoption claims.
    suggested_source_or_request: Customer cohort files, CRM export, product analytics, support tickets, and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.A
    missing_information: CAC, payback, sales-cycle length, pipeline conversion, channel mix, win/loss, and international or segment-level launch economics.
    why_it_matters: GTM efficiency determines whether growth can continue without excessive burn or discounting.
    suggested_source_or_request: Marketing attribution export, CRM pipeline, bookings bridge, sales productivity report, and channel cohort analysis.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.A
    missing_information: Product roadmap, R&D budget, incident history, uptime/SLOs, security reviews, model/vendor evaluations, and technical debt backlog.
    why_it_matters: Technology claims require reliability, roadmap, and dependency validation.
    suggested_source_or_request: Roadmap, architecture diagrams, incident postmortems, SOC/security reports, and vendor/model evaluation logs.
    priority: medium
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Counsel litigation schedule, regulator correspondence, employment matters, privacy incidents, tax notices, insurance claims, and settlement history.
    why_it_matters: Public pages rarely reveal contingent liabilities or regulator interactions.
    suggested_source_or_request: Legal schedule, outside counsel memos, regulator correspondence, insurance binders, and docket pulls.
    priority: high

