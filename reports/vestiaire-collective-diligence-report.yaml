report_metadata:
  report_title: Vestiaire Collective Startup Diligence Report
  target_company: Vestiaire Collective
  website: https://www.vestiairecollective.com/
  known_aliases:
  - Vestiaire Collective
  - Vestiaire de Copines
  sector: Luxury resale marketplace / recommerce / fashion e-commerce
  geography: Paris-headquartered global marketplace with public operating reach across
    70 countries and Europe-led revenue mix
  company_stage: Private unicorn / late-stage luxury recommerce company
  research_date: '2026-06-17'
  analyst: GitHub Copilot diligence agent
  report_version: '1.0'
  currency: Mixed reported currencies (EUR and USD) unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
  - Reviewed the public CB Insights profile JSON for company status, funding, competitors,
    customer references, partner relationships, service providers and limited financial
    signals.
  - Used archived public company pages from the Internet Archive for homepage, concept,
    help-center shipping/services/geography and official-partnership content because
    direct site access was blocked from this environment.
  - Used the public App Store listing as a company-managed product, pricing and customer-signal
    source.
  - Used Wikipedia raw wikitext only as a secondary source for founder, headcount
    and leadership-transition details when primary articles were inaccessible.
  - Treated the workflow-supplied Business of Fashion metrics as user-provided summaries
    of public reporting and marked them partially verified where not directly retrievable.
  included_jurisdictions:
  - France
  - European Union
  - United Kingdom
  - United States
  - Hong Kong
  - Singapore
  - Australia
  excluded_topics:
  - Non-public customer contracts, partner contracts, audited financial statements,
    board materials, cap table exports and debt documents.
  - Private legal correspondence, insurance policies, settlement agreements and works-council
    or labor files.
  - Direct database access to full litigation, trademark and regulatory records that
    was not available in this environment.
  user_provided_materials:
  - material_id: UPM-VC-001
    title: Workflow request and candidate-selection context
    type: workflow_request
    date_received: '2026-06-17'
    notes: Specified the target company, output path, no-git/no-other-file constraint,
      and required public-source starting points.
  - material_id: UPM-VC-002
    title: Workflow-supplied summary of BoF and candidate-pool metrics
    type: user_summary_of_public_sources
    date_received: '2026-06-17'
    notes: Included public valuation, revenue, GMV, geography, headcount and profitability-target
      claims tied to public URLs.
founder_claims:
- founder_claim_id: FC-VC-001
  claim_text: Vestiaire Collective remains an active private late-stage/unicorn-scale
    company; no completed IPO, sale of Vestiaire itself, or shutdown was found in
    reviewed public sources.
  claim_source: CB Insights public profile plus workflow-supplied public-source summary
  claim_date: '2026-06-17'
  mapped_chapter_ids:
  - I
  - VIII
  mapped_section_ids:
  - I.C
  - VIII.A
  verification_status: partially_verified
  confidence: medium
  evidence_claim_ids:
  - EC-VC-001
  - EC-VC-002
  - EC-VC-003
  - EC-VC-019
  contradiction_summary: Valuation anchors differ across public sources, but the reviewed
    sources still describe Vestiaire as private/alive and showed no public stock listing.
  diligence_follow_up:
  - Obtain corporate registry extracts, current cap table and any formal IPO-preparation
    materials.
- founder_claim_id: FC-VC-002
  claim_text: Vestiaire operates a global pre-loved luxury/designer marketplace with
    meaningful inventory breadth and international reach.
  claim_source: Archived company concept and geography pages plus App Store listing
  claim_date:
  mapped_chapter_ids:
  - II
  - V
  mapped_section_ids:
  - II.A
  - V.A
  verification_status: verified
  confidence: high
  evidence_claim_ids:
  - EC-VC-004
  - EC-VC-005
  - EC-VC-008
  contradiction_summary:
  diligence_follow_up:
  - Request GMV, sell-through and take-rate by geography, category and channel.
- founder_claim_id: FC-VC-003
  claim_text: Vestiaire’s trust model relies on machine-assisted screening, digital
    verification, physical authentication and multiple shipping modes.
  claim_source: Archived services and shipping FAQ pages plus App Store listing
  claim_date:
  mapped_chapter_ids:
  - II
  - VI
  mapped_section_ids:
  - II.A
  - VI.A
  verification_status: verified
  confidence: high
  evidence_claim_ids:
  - EC-VC-005
  - EC-VC-006
  - EC-VC-007
  contradiction_summary: Direct Shipping permits some lower-priced items to bypass
    additional physical authentication, creating a trust-versus-convenience tradeoff.
  diligence_follow_up:
  - Request counterfeit-loss data, return rates, QA escalation metrics and authentication
    staffing economics.
- founder_claim_id: FC-VC-004
  claim_text: Vestiaire has built a meaningful brand-partner and resale-as-a-service
    ecosystem.
  claim_source: Archived official-partnerships page plus CB Insights partner data
    and Giglio.com reference
  claim_date:
  mapped_chapter_ids:
  - III
  - V
  mapped_section_ids:
  - III.B
  - V.C
  verification_status: partially_verified
  confidence: high
  evidence_claim_ids:
  - EC-VC-009
  - EC-VC-012
  - EC-VC-014
  contradiction_summary: 'Named partner counts vary by date: the 2024 archived page
    lists nine named partners while a 2025 CB Insights snippet calls Ganni the 13th
    RaaS addition.'
  diligence_follow_up:
  - Request partner ARR contribution, churn, exclusivity terms and contract lengths.
- founder_claim_id: FC-VC-005
  claim_text: 2024 financial scale was about €200M revenue and slightly under €1B
    GMV, with Europe contributing about 70% of revenue and first annual profit targeted
    for 2026.
  claim_source: Workflow-supplied public-source summary tied to Business of Fashion
    and candidate-pool notes
  claim_date: '2026-06-17'
  mapped_chapter_ids:
  - I
  - III
  - VII
  mapped_section_ids:
  - I.A
  - III.C
  - VII.B
  verification_status: partially_verified
  confidence: medium
  evidence_claim_ids:
  - EC-VC-003
  - EC-VC-017
  contradiction_summary: CB Insights exposed an unsourced FY2024 revenue field of
    430,796,000, so public metric definitions and currencies require reconciliation.
  diligence_follow_up:
  - Request audited FY2024 statements, GMV-to-net-revenue bridge, regional contribution
    margin and monthly profitability cadence.
executive_summary:
  overall_assessment: Vestiaire Collective remains an eligible private late-stage
    luxury-recommerce company with credible public evidence of marketplace scale,
    authentication processes and partner-program depth, but financial quality, cap-table
    complexity, concentration risk and legal/IP exposure still require private diligence.
  investment_or_diligence_thesis: Vestiaire merits continued diligence as a still-private
    luxury resale platform that has expanded beyond pure C2C into partner-enabled
    resale infrastructure, but investment reliance should wait for audited financials,
    partner economics, legal schedules and current management/people data.
  strongest_verified_claims:
  - founder_claim_id: FC-VC-002
    summary: Archived company pages and the App Store listing publicly support the
      global luxury-resale marketplace positioning and scale claims around brands,
      listings and community reach.
    evidence_claim_ids:
    - EC-VC-004
    - EC-VC-005
    - EC-VC-008
  - founder_claim_id: FC-VC-003
    summary: Archived services and shipping FAQs verify a trust stack spanning profile
      monitoring, digital verification, physical authentication and multiple shipping
      modes.
    evidence_claim_ids:
    - EC-VC-005
    - EC-VC-006
    - EC-VC-007
  - founder_claim_id: FC-VC-004
    summary: Archived partnership materials and CB Insights relationship data support
      a meaningful official-partner / resale-as-a-service ecosystem.
    evidence_claim_ids:
    - EC-VC-009
    - EC-VC-012
    - EC-VC-014
  biggest_risks:
  - risk_id: R-VC-001
    summary: Public financial anchors imply valuation compression and still-targeted,
      not yet demonstrated, annual profitability.
  - risk_id: R-VC-002
    summary: Public revenue signals conflict, making GMV, net revenue and take-rate
      quality a core diligence issue.
  - risk_id: R-VC-003
    summary: Authentication and counterfeit liability remain central to brand trust
      and unit economics.
  - risk_id: R-VC-004
    summary: Brand, retailer and logistics partnerships are visible, but partner concentration
      and contract economics are not.
  key_evidence_gaps:
  - Audited financials, monthly GMV/net-revenue bridges and gross-margin detail by
    service and geography.
  - Current cap table, debt schedule, board rights and option/incentive-plan structure.
  - Top-customer, top-partner and top-supplier concentration plus contract economics.
  - Current org chart, executive biographies, headcount by function/location and attrition
    data.
  - Counsel-backed litigation, regulatory, insurance and IP ownership schedules.
  recommended_next_steps:
  - Obtain audited financial statements and reconcile public valuation/revenue claims
    before relying on any revenue multiple or profitability timing.
  - Review partner, logistics and marketplace contracts to quantify concentration,
    economics, data rights and termination risk.
  - Run customer and partner reference calls with at least one retailer/brand partner
    and one logistics/integration partner.
  - Complete counsel-led litigation, regulatory, insurance and trademark/IP diligence
    in all material jurisdictions.
chapters:
- chapter_id: I
  title: Financial Information
  chapter_summary: Public capital-raising evidence is strong enough to confirm late-stage
    private-company status, but audited financial quality, debt terms and valuation
    support remain unresolved and internally inconsistent across public sources.
  founder_claim_ids:
  - FC-VC-001
  - FC-VC-005
  evidence_claim_ids:
  - EC-VC-001
  - EC-VC-002
  - EC-VC-003
  - EC-VC-016
  - EC-VC-017
  risk_ids:
  - R-VC-001
  - R-VC-002
  - R-VC-007
  sections:
  - section_id: I.A
    title: Annual and quarterly financial information for the past three years
    checklist_question_ids:
    - I.A.1
    - I.A.2
    - I.A.3
    - I.A.4
    - I.A.5
    - I.A.6
    summary: Only thin public operating visibility exists. The workflow summary points
      to about €200M revenue, GMV just under €1B and a 2026 profit target, while CB
      Insights surfaced an unsourced FY2024 revenue field of 430.796M, so core financial
      quality is inconclusive.
    verification_status: inconclusive
    confidence: medium
    key_findings:
    - finding_id: VC-I-A-F1
      finding: The workflow-supplied public-source summary points to about €200M revenue,
        sub-€1B GMV and a first annual profit target in 2026.
      evidence_claim_ids:
      - EC-VC-003
      risk_ids:
      - R-VC-001
      - R-VC-002
    - finding_id: VC-I-A-F2
      finding: CB Insights exposed an unsourced FY2024 revenue field of 430,796,000,
        creating a metric-definition conflict that needs reconciliation.
      evidence_claim_ids:
      - EC-VC-017
      risk_ids:
      - R-VC-002
    hidden_risks:
    - GMV-versus-revenue confusion can overstate profitability quality.
    - Take-rate, gross margin and returns/refunds economics are not public.
    evidence_gaps:
    - Audited income statements, balance sheets and cash flows for 2022-2025.
    - Planned-versus-actual operating reports, AR aging and backlog schedules.
    - Revenue split by category, geography, shipping mode and services attach.
    follow_up_questions:
    - What is the audited FY2024 net revenue, GMV, take rate and gross margin by geography?
    - How much of revenue comes from services, shipping and authentication fees versus
      marketplace commissions?
    table_ids:
    - T-VC-I-3
    figure_ids:
    - F-VC-I-2
    evidence_claim_ids:
    - EC-VC-003
    - EC-VC-017
  - section_id: I.B
    title: Financial Projections
    checklist_question_ids:
    - I.B.1
    - I.B.2
    - I.B.3
    - I.B.4
    - I.B.5
    - I.B.6
    - I.B.7
    - I.B.8
    summary: No public budget model or board-approved forecast was found. The main
      visible forward-looking signal is the 2026 profitability target and a revenue
      mix exposed to Europe, the U.S. and Asia.
    verification_status: partially_verified
    confidence: low
    key_findings:
    - finding_id: VC-I-B-F1
      finding: The only public forward-looking operating claim in the reviewed source
        set is a target for first annual profit in 2026.
      evidence_claim_ids:
      - EC-VC-003
      risk_ids:
      - R-VC-001
    hidden_risks:
    - Profitability timing may slip if logistics, returns or partner economics worsen.
    - Multi-currency operations create FX and tax exposure without public hedging
      detail.
    evidence_gaps:
    - Quarterly revenue, opex, capex and cash-flow projections for the next three
      fiscal years.
    - Assumptions for external financing, foreign-exchange exposure and working-capital
      needs.
    follow_up_questions:
    - What assumptions bridge current GMV growth to 2026 profitability?
    - What downside case is used for partner attrition, returns and authentication
      error costs?
    table_ids: []
    figure_ids: []
    evidence_claim_ids:
    - EC-VC-003
  - section_id: I.C
    title: Capital Structure
    checklist_question_ids:
    - I.C.1
    - I.C.2
    - I.C.3
    - I.C.4
    - I.C.5
    summary: CB Insights shows about $748.39M total funding, a disclosed Crowdcube
      valuation range and a latest-public Nov 2024 private-equity event with Eurazeo,
      but the current preference stack, shareholder percentages and lender identities
      are private.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VC-I-C-F1
      finding: CB Insights publicly described Vestiaire as having raised about $748.39M
        total funding.
      evidence_claim_ids:
      - EC-VC-001
      risk_ids:
      - R-VC-007
    - finding_id: VC-I-C-F2
      finding: A February 2024 Crowdcube event disclosed a valuation range near $1.17B,
        and a November 2024 private-equity event named Eurazeo without disclosing
        amount or terms.
      evidence_claim_ids:
      - EC-VC-002
      risk_ids:
      - R-VC-001
      - R-VC-007
    hidden_risks:
    - Unknown liquidation preferences could materially change common-equity value.
    - The 2022 line of credit may carry covenants or security interests not visible
      publicly.
    evidence_gaps:
    - Current shares outstanding, option pool, warrants, SAFEs/notes and investor-rights
      schedule.
    - Debt documents, lender identity, collateral package and off-balance-sheet liabilities.
    follow_up_questions:
    - What is the fully diluted cap table as of the latest month close?
    - What debt, warehouse financing or receivables facilities remain outstanding?
    table_ids:
    - T-VC-I-1
    - T-VC-I-2
    figure_ids:
    - F-VC-I-1
    evidence_claim_ids:
    - EC-VC-001
    - EC-VC-002
    - EC-VC-010
  - section_id: I.D
    title: Other financial information
    checklist_question_ids:
    - I.D.1
    - I.D.2
    - I.D.3
    summary: Public records confirm financing cadence and at least one named financing
      counsel, but not tax positions, accounting policy choices or debt covenants.
    verification_status: not_publicly_verifiable
    confidence: low
    key_findings:
    - finding_id: VC-I-D-F1
      finding: CB Insights publicly listed a 2022 line of credit and Clipperton as
        counsel on Series B, C and D rounds.
      evidence_claim_ids:
      - EC-VC-002
      - EC-VC-016
      risk_ids:
      - R-VC-007
    hidden_risks:
    - Revenue-recognition policy can materially affect net-revenue presentation in
      marketplace models.
    - Unseen tax exposures may exist across 70-country operations.
    evidence_gaps:
    - Tax carry-forwards, VAT/sales-tax posture and revenue-recognition memos.
    - Debt covenant package and any factoring/receivables arrangements.
    follow_up_questions:
    - How is revenue recognized across commissions, shipping, authentication and consignment
      services?
    table_ids: []
    figure_ids: []
    evidence_claim_ids:
    - EC-VC-002
    - EC-VC-016
- chapter_id: II
  title: Products
  chapter_summary: Public company materials show Vestiaire as a hybrid of C2C marketplace,
    authentication service, consignment operation and resale-infrastructure partner,
    but product-level economics and roadmap discipline remain private.
  founder_claim_ids:
  - FC-VC-002
  - FC-VC-003
  evidence_claim_ids:
  - EC-VC-004
  - EC-VC-005
  - EC-VC-006
  - EC-VC-007
  - EC-VC-009
  risk_ids:
  - R-VC-003
  - R-VC-004
  - R-VC-006
  sections:
  - section_id: II.A
    title: Description of each product
    checklist_question_ids:
    - II.A.1
    - II.A.2
    - II.A.3
    - II.A.4
    - II.A.5
    - II.A.6
    summary: Public materials describe a product stack spanning marketplace discovery,
      direct and authenticated shipping, VIP consignment, Brand Approved listings
      and official-partner / RaaS services. Trust technology and operations are visible,
      while pricing, attach rates and profitability by service are not.
    verification_status: verified
    confidence: high
    key_findings:
    - finding_id: VC-II-A-F1
      finding: The concept page and App Store listing describe a global pre-loved
        luxury marketplace with millions of users, 12,000+ brands and 5M listings.
      evidence_claim_ids:
      - EC-VC-004
      - EC-VC-005
      risk_ids:
      - R-VC-004
    - finding_id: VC-II-A-F2
      finding: Archived FAQ pages describe machine-assisted profile monitoring, AI-led
        digital verification and full physical authentication as part of the core
        service design.
      evidence_claim_ids:
      - EC-VC-006
      - EC-VC-007
      risk_ids:
      - R-VC-003
    hidden_risks:
    - Authentication complexity can create expensive exception handling and reputational
      damage.
    - A broad service stack can hide weak unit economics in consignment or warehouse-based
      flows.
    evidence_gaps:
    - No public product P&L, market-share data, support-cost breakdown or release
      cadence.
    - No public pricing benchmark versus peers beyond promotional copy and seller-payout
      marketing.
    follow_up_questions:
    - What share of GMV flows through Direct Shipping versus Authenticated Shipping?
    - What is the gross margin and refund rate by service line?
    table_ids:
    - T-VC-II-1
    - T-VC-II-2
    figure_ids:
    - F-VC-II
    evidence_claim_ids:
    - EC-VC-004
    - EC-VC-005
    - EC-VC-006
    - EC-VC-007
    - EC-VC-009
- chapter_id: III
  title: Customer Information
  chapter_summary: Public customer evidence is strongest around official brand partners,
    retailer integrations and selected strategic relationships, while true customer
    concentration, top-account economics and supplier spend remain private.
  founder_claim_ids:
  - FC-VC-003
  - FC-VC-004
  - FC-VC-005
  evidence_claim_ids:
  - EC-VC-003
  - EC-VC-007
  - EC-VC-008
  - EC-VC-009
  - EC-VC-012
  - EC-VC-014
  risk_ids:
  - R-VC-002
  - R-VC-004
  - R-VC-006
  sections:
  - section_id: III.A
    title: Top customers by application
    checklist_question_ids:
    - III.A
    summary: No top-15 customer schedule is public, but public official-partner and
      retailer examples show Vestiaire serving luxury-brand resale, retailer integration
      and circular-commerce use cases.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VC-III-A-F1
      finding: The archived official-partnerships page listed luxury brands and retailers
        including Gucci, Chloé, Alexander McQueen, Mytheresa, Giglio and Luisaviaroma.
      evidence_claim_ids:
      - EC-VC-009
      risk_ids:
      - R-VC-004
    - finding_id: VC-III-A-F2
      finding: CB Insights captured a Giglio.com reference describing the partnership
        as a way to let customers resell iconic garments.
      evidence_claim_ids:
      - EC-VC-012
      risk_ids:
      - R-VC-004
    hidden_risks:
    - A few marquee partners may account for outsized GMV or marketing visibility.
    - Retailer/brand relationships can be promotional rather than durable revenue
      drivers.
    evidence_gaps:
    - Top-customer GMV or revenue schedules, 5%+ concentration disclosures and renewals.
    - Contract duration, exclusivity, refund sharing and reference-call permissions.
    follow_up_questions:
    - What percentage of GMV or net revenue is tied to the top 10 partner/customer
      relationships?
    table_ids:
    - T-VC-III-1
    figure_ids: []
    evidence_claim_ids:
    - EC-VC-009
    - EC-VC-012
  - section_id: III.B
    title: Strategic relationships
    checklist_question_ids:
    - III.B
    summary: CB Insights relationship data shows an active partnership cadence across
      Zalando, Ganni, Sendle, Isabel Marant and Sojo, supporting a partner-led expansion
      thesis beyond pure C2C resale.
    verification_status: verified
    confidence: medium
    key_findings:
    - finding_id: VC-III-B-F1
      finding: CB Insights said the 2026 Zalando partnership combines Vestiaire’s
        authentication expertise with Zalando’s reach and platform structure.
      evidence_claim_ids:
      - EC-VC-014
      risk_ids:
      - R-VC-004
      - R-VC-006
    - finding_id: VC-III-B-F2
      finding: The 2025 Ganni relationship was described as the 13th addition to Vestiaire’s
        RaaS programme.
      evidence_claim_ids:
      - EC-VC-014
      risk_ids:
      - R-VC-004
    hidden_risks:
    - Partner-channel growth can create dependency and revenue concentration.
    - Logistics and alteration partners add third-party execution risk.
    evidence_gaps:
    - Partner ARR contribution, termination rights, exclusivity and co-marketing budgets.
    - Net-revenue share by Zalando, Ganni, Giglio, Sojo, Isabel Marant and Sendle-related
      flows.
    follow_up_questions:
    - How much GMV and net revenue do official partners and retailer integrations
      contribute?
    table_ids:
    - T-VC-III-2
    figure_ids: []
    evidence_claim_ids:
    - EC-VC-009
    - EC-VC-012
    - EC-VC-014
  - section_id: III.C
    title: Revenue by customer
    checklist_question_ids:
    - III.C
    summary: 'The only public concentration view found is a geography split from the
      workflow-supplied public-source summary: Europe about 70% of revenue, U.S. about
      20%, Asia the remainder. No customer-level schedule was public.'
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VC-III-C-F1
      finding: The workflow summary attributed about 70% of revenue to Europe, about
        20% to the U.S. and the remainder to Asia.
      evidence_claim_ids:
      - EC-VC-003
      risk_ids:
      - R-VC-002
      - R-VC-006
    hidden_risks:
    - Regional mix can mask heavy concentration in a few brands or cross-border routes.
    - No public NRR/GRR or partner-level contribution data is available.
    evidence_gaps:
    - Top-customer revenue tables and partner/channel concentration by region.
    - Renewal rates, repeat-buyer rate and cohort contribution margin by geography.
    follow_up_questions:
    - Which regions drive profits versus merely GMV?
    table_ids: []
    figure_ids:
    - F-VC-III
    evidence_claim_ids:
    - EC-VC-003
  - section_id: III.D
    title: Significant relationships severed within the last two years
    checklist_question_ids:
    - III.D
    summary: No public schedule of severed customer, partner or supplier relationships
      surfaced in the accessible source set.
    verification_status: unverified
    confidence: low
    key_findings: []
    hidden_risks:
    - A lack of public disclosure is not proof of relationship stability.
    - Marketplace trust or logistics disputes may stay private.
    evidence_gaps:
    - Partner churn history, failed pilots and terminated retailer or brand programs.
    - Any lost logistics, payments or warehousing vendors over the last two years.
    follow_up_questions:
    - Which strategic relationships were lost, and what GMV impact followed?
    table_ids: []
    figure_ids: []
    evidence_claim_ids:
    - EC-VC-018
  - section_id: III.E
    title: Top suppliers
    checklist_question_ids:
    - III.E
    summary: Public sources show operational reliance on cross-border shipping, authentication
      hubs and at least one named logistics partner, but top-supplier spend data is
      not public.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VC-III-E-F1
      finding: The shipping FAQ makes clear that authenticated orders route through
        Vestiaire authentication centers before customer delivery.
      evidence_claim_ids:
      - EC-VC-007
      risk_ids:
      - R-VC-006
    - finding_id: VC-III-E-F2
      finding: CB Insights listed Sendle as a 2024 partner and described Vestiaire
        as its first partner for a Print In-Store solution.
      evidence_claim_ids:
      - EC-VC-014
      risk_ids:
      - R-VC-006
    hidden_risks:
    - A small number of carriers, warehouses or payments providers could be operational
      choke points.
    - The Sendle partnership also highlights exposure to partner health and execution.
    evidence_gaps:
    - Supplier names, spend concentration, SLA terms and continuity plans.
    - Cloud, payments, insurance and fraud-tool vendors were not publicly disclosed.
    follow_up_questions:
