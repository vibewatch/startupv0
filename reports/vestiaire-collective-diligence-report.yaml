diligence_gaps:
- gap_id: G-VC-001
  chapter_id: I
  section_id: I.A
  missing_information: Audited 2022-2025 financial statements and monthly management
    reporting
  why_it_matters: Without audited P&L, balance-sheet and cash-flow data, public revenue
    and profitability claims cannot be underwritten.
  suggested_source_or_request: Request full audited financial package plus monthly
    management accounts.
  priority: high
- gap_id: G-VC-002
  chapter_id: I
  section_id: I.C
  missing_information: Current cap table, preference stack and debt schedule
  why_it_matters: Valuation, dilution and downside protection cannot be assessed from
    public funding rows alone.
  suggested_source_or_request: Request fully diluted cap table, SAFEs/notes, debt
    covenants and board rights.
  priority: high
- gap_id: G-VC-003
  chapter_id: II
  section_id: II.A
  missing_information: Service-line economics by marketplace, direct shipping, authenticated
    shipping and consignment
  why_it_matters: Product breadth is visible, but contribution margin and working-capital
    needs are not.
  suggested_source_or_request: Request unit-economics model and gross margin by service
    line.
  priority: high
- gap_id: G-VC-004
  chapter_id: III
  section_id: III.C
  missing_information: Top-customer and top-partner concentration data
  why_it_matters: Public named partnerships do not reveal exposure to a handful of
    accounts or channels.
  suggested_source_or_request: Request top-20 customer/partner GMV and net-revenue
    schedule.
  priority: high
- gap_id: G-VC-005
  chapter_id: III
  section_id: III.E
  missing_information: Supplier names, spend concentration and SLAs
  why_it_matters: Cross-border shipping and authentication operations can fail at
    hidden bottlenecks.
  suggested_source_or_request: Request supplier list covering logistics, payments,
    cloud, fraud and warehousing.
  priority: medium
