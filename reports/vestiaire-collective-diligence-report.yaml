    hidden_risks:
    - Authentication mistakes, shipping losses and counterfeit disputes may require
      significant insurance backstops.
    evidence_gaps:
    - Broker schedules, deductibles, claims history and exclusions.
    follow_up_questions:
    - What coverage exists for counterfeit, cyber, D&O, cargo and employment risks?
    table_ids: []
    figure_ids: []
    evidence_claim_ids:
    - EC-VC-018
  - section_id: VIII.F
    title: Material contracts
    checklist_question_ids:
    - VIII.F
    summary: Public contract signals include official partner arrangements, Zalando
      integration, logistics collaboration with Sendle and Clipperton’s counsel role
      in earlier financings, but economics and termination rights are private.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VC-VIII-F-F1
      finding: The official-partnerships page marketed consignment desks and resale
        data partnerships to brands.
      evidence_claim_ids:
      - EC-VC-009
      risk_ids:
      - R-VC-008
    - finding_id: VC-VIII-F-F2
      finding: CB Insights relationship data documented recent business ties with
        Zalando, Ganni, Sendle, Isabel Marant and Sojo.
      evidence_claim_ids:
      - EC-VC-014
      risk_ids:
      - R-VC-004
      - R-VC-006
    hidden_risks:
    - Partner agreements may contain exclusivity, pricing or data-rights constraints.
    - Logistics or retailer agreements may embed SLAs or liabilities that change contribution
      margin.
    evidence_gaps:
    - Executed partner contracts, SLAs, data-rights clauses and change-of-control
      terms.
    follow_up_questions:
    - Which contracts are mission-critical for inventory flow, brand rights and cross-border
      shipping?
    table_ids: []
    figure_ids: []
    evidence_claim_ids:
    - EC-VC-009
    - EC-VC-014
    - EC-VC-016
    - EC-VC-018
  - section_id: VIII.G
    title: Regulatory agency problems
    checklist_question_ids:
    - VIII.G
    summary: No public agency actions were found in the accessible source set. The
      strongest public legal-policy signals are self-imposed marketplace rules and
      the complexity of operating in 70 countries.
    verification_status: unverified
    confidence: low
    key_findings: []
    hidden_risks:
    - Consumer-protection, tax, customs, marketplace and resale regulations may vary
      sharply by country.
    - No public absence should be read as a clean bill of health without counsel review.
    evidence_gaps:
    - Regulatory inquiries, customs/VAT disputes, consumer-protection notices and
      marketplace-policy escalations.
    follow_up_questions:
    - Have any regulators challenged authentication, customs, taxes, advertising or
      resale policies?
    table_ids:
    - T-VC-VIII-4
    figure_ids: []
    evidence_claim_ids:
    - EC-VC-004
    - EC-VC-008
    - EC-VC-018
