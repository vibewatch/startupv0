report_metadata:
  report_title: Hellobike / Hello TransTech Startup Diligence Report
  target_company: Hellobike / Hello TransTech
  website: https://www.hello-inc.com/
  known_aliases:
    - Hello TransTech
    - Hello Inc.
    - Hellobike
    - HelloBike
    - 哈啰
    - 哈啰出行
  sector: Local mobility, shared two-wheelers, e-bikes, battery swap, ride-hailing and robotaxi
  geography: China / Shanghai
  company_stage: Private unicorn / growth-stage mobility platform
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: RMB unless otherwise noted; USD for valuation and funding references
  time_zone: Asia/Shanghai
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used public sources only: official company website/security/careers endpoints, SEC filings and metadata, market databases, government service guidance and independent news."
    - Treated public market databases and media as evidence leads; financing and valuation claims require primary round documents before investment reliance.
    - Eligibility screen required public support for unicorn valuation and no credible public IPO completion, acquisition or shutdown evidence.
    - No private data room, management interview, customer calls, counsel searches or paid PRC legal databases were available.
  included_jurisdictions:
    - China
    - Shanghai
    - Beijing regulatory context
    - Cayman/United States SEC filing context
    - Global public web search scope
  excluded_topics:
    - Paid PRC corporate registry/litigation databases, private financials, customer references, management interviews, proprietary market reports, non-public contracts and technical audits were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Hellobike / Hello TransTech public-source diligence report
      type: workflow_request
      date_received: 2026-05-20
      notes: Requested standard-depth startup diligence YAML report at reports/hellobike-diligence-report.yaml.
