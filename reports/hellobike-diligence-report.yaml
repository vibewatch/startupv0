executive_summary:
  overall_assessment: "Proceed only with confirmatory diligence: public evidence supports Hellobike / Hello TransTech as an active private unicorn, but current financial quality, cap table, customer metrics, permits, contracts, cybersecurity and robotaxi execution are not publicly verifiable."
  investment_or_diligence_thesis: Hello may be a large China local-mobility platform with strategic Alibaba/Ant backing and adjacent product optionality, but underwriting must focus on post-2021 financial opacity, city-level regulatory economics, partner dependency and the risk that robotaxi ambitions require significant capital without proven commercialization.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn eligibility is supported by China Money Network’s 2018 Ant investment report at a US$1.47B valuation and CB’s later US$5B Series G marker.
      evidence_claim_ids:
        - EC-011
        - EC-013
    - founder_claim_id: FC-004
      summary: The 2021 SEC registration was withdrawn before effectiveness, and no securities were issued or sold under it.
      evidence_claim_ids:
        - EC-009
        - EC-010
    - founder_claim_id: FC-003
      summary: Official and SEC sources support a scaled shared two-wheeler business and broader mobility portfolio.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: No public audited financials after the withdrawn IPO period; current cash, debt, margins and unit economics are unknown.
    - risk_id: R-004
      summary: City-by-city permits, deployment caps and administrative enforcement can materially affect fleet economics.
    - risk_id: R-008
      summary: Robotaxi expansion introduces large capital, safety, technical, insurance and regulatory risk.
  key_evidence_gaps:
    - Audited FY2021-FY2025 financials, monthly KPI pack, cash/debt, AR aging and city/product contribution margins.
    - Current cap table, preference stack, debt, option plan, investor rights and legal status certificates.
    - MAU/DAU, ride cohorts, retention, customer references, partner contribution, channel attribution and CAC/LTV.
    - City permits, penalty records, fleet safety/battery/insurance records, cybersecurity/privacy audits and VIE/legal opinions.
    - Robotaxi safety case, permits, OEM/cloud contracts, capex plan, insurance and commercialization KPIs.
  recommended_next_steps:
    - Gate any valuation work on a private data room and legal/cap-table reconciliation.
    - Run PRC counsel searches for corporate status, permits, administrative penalties, litigation, IP, data/cyber and VIE enforceability.
    - Conduct customer/user, city/regulator and competitor calls focused on city-level economics and retention.
    - Treat robotaxi as an option value item until safety, regulatory, capex and deployment evidence is verified.
