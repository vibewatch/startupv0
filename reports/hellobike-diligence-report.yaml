evidence_claims:
  - evidence_claim_id: EC-001
    claim: Hello presents itself as an active domestic local mobility and life-services platform founded in September 2016 and headquartered in Shanghai.
    evidence_summary: The official site describes Hello as a domestic local mobility and life-services platform, founded in 2016-09, headquartered in Shanghai, and originating from shared bicycles.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-001
    quoted_evidence:
      - source_id: SRC-001
        quote: 公司成立于2016年9月，总部位于上海，从大家熟悉的共享单车业务起步。
        location: Official homepage
    analyst_interpretation: Current official web presence supports active operations and Shanghai headquarters, but not private financial performance.
    limitations: Company-authored marketing language is not independently audited.
