report_metadata:
  report_title: Abnormal Security Startup Diligence Report
  target_company: Abnormal Security
  website: https://abnormal.ai/
  known_aliases:
    - Abnormal Security
    - Abnormal AI
    - Abnormal Security Corp.
    - Abnormal Security, Inc.
  sector: Enterprise cybersecurity / AI-native human behavior and cloud email security
  geography: United States headquartered with public expansion references across Europe, Asia, and Australia
  company_stage: Private unicorn / growth-stage enterprise security company
  research_date: 2026-06-05
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility first using supplied CB Insights unicorn metadata, an existing-report slug search, active company web presence and public financing evidence for Abnormal Security only.
    - "Used public-source diligence only: CB Insights unicorn list, company-owned pages, funding/newsroom pages, search-result snippets for discovery, and public customer/trust/product pages where fetched."
    - Treated company-owned pages as evidence of public claims, not audited proof of performance.
    - Did not use private data rooms, founder interviews, customer calls, paid databases or paywalled content.
  included_jurisdictions:
    - United States
    - Public global markets referenced by company materials
  excluded_topics:
    - Non-public financial statements, cap table, board materials, contracts, security reports, customer calls, HRIS/personnel records and privileged legal/regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow target metadata for Abnormal Security from CB Insights unicorn list
      type: workflow_request
      date_received: 2026-06-05
      notes: Provided company name, slug abnormal-security, valuation $5.1B, date joined 2022-05-10, country, city, industry and investors.
