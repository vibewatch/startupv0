diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, revenue bridge, unit economics, cash runway and debt schedule
    why_it_matters: Determines quality of revenue, runway and valuation support.
    suggested_source_or_request: Audited statements, management accounts, KPI pack and lender/investor documents.
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue, churn, renewal health and customer concentration
    why_it_matters: Public customer names do not prove durable or diversified revenue.
    suggested_source_or_request: Top customer schedules, contracts, NRR cohorts and reference calls.
    priority: high
  - gap_id: G-003
    chapter_id: VI
    section_id: VI.B
    missing_information: Technical roadmap, defect history, security architecture and IP assignment proof
    why_it_matters: Product defensibility and technical debt are core to the diligence thesis.
    suggested_source_or_request: Architecture review, roadmap, incident logs, SBOM, patent/IP schedule and invention assignments.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, regulatory, contract, insurance and privacy/security matter schedules
    why_it_matters: Hidden obligations can impair value or constrain operations.
    suggested_source_or_request: Counsel memo, docket searches, insurance policies, regulatory correspondence and material contract schedule.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP schedule, assignments, invention agreements, open-source SBOM and model/data rights.
    why_it_matters: AI/security defensibility and freedom-to-operate cannot be confirmed from public search endpoints alone.
    suggested_source_or_request: Company counsel IP schedule and engineering open-source review.
    priority: medium
  - gap_id: G-010
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, competitive benchmark and discounting data versus Microsoft, Proofpoint, Mimecast, Avanan, Material and Sublime.
    why_it_matters: Crowded market and bundling pressure may impair pricing and growth.
    suggested_source_or_request: CRM exports, proof-of-value results and customer interviews.
    priority: high
