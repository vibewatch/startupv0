    claim: Axiom does not publish audited financials; independent reports in 2024 alleged financial headwinds, payroll/supplier pressure and mission losses, which the company publicly disputed only at a high level.
    evidence_summary: Public evidence is sufficient to flag financial-quality risk but not to confirm the current cash balance, revenue, gross margin, debt or runway.
    evidence_type: independent_news
    verification_status: partially_verified
    confidence: medium
    source_ids:
