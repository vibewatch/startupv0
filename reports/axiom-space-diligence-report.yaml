report_metadata:
  report_title: Axiom Space Startup Diligence Report
  target_company: Axiom Space
  website: https://www.axiomspace.com/
  known_aliases:
    - Axiom Space, Inc.
    - Axiom Space LLC
    - Axiom
  sector: Commercial space infrastructure / human spaceflight
  geography: United States; Houston, Texas
  company_stage: Late-stage private unicorn / hard-tech space infrastructure company
  research_date: 2026-06-09
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source research only; no private data room, management interview, paid database access or customer calls.
    - Company-authored sources were treated as claims or primary evidence of public announcements, not independent proof of performance.
    - No IPO, acquisition or shutdown evidence was found; eligibility passed based on current official operations and 2026 financing coverage.
    - Temporary notes were kept in-session only; no additional companion artifacts were created.
  included_jurisdictions:
    - United States
    - NASA / U.S. federal procurement and oversight
    - International customer programs visible in public mission pages
  excluded_topics:
    - Private financial statements, cap table, contracts, HRIS, insurance, safety case, customer references and counsel-led legal/IP searches were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User-supplied CB Insights target row and task instructions
      type: prompt_context
      date_received: 2026-06-09
      notes: Used to scope the target; material facts were re-checked against public sources where possible.
founder_claims:
