risk_register:
  - risk_id: R-001
    risk_title: Financing runway and reported supplier/payment pressure
    risk_category: financing
    severity: high
    likelihood: medium
    description: Axiom raised new capital in 2026, but prior independent reporting alleged cash, payroll and supplier-payment stress; current cash, debt and runway are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited financials, cash/debt/runway, AR/AP aging, supplier balances, debt covenants and board-approved forecast.
  - risk_id: R-002
    risk_title: Station schedule and ISS deorbit dependency
    risk_category: operational
    severity: high
    likelihood: medium
    description: Axiom Station depends on module fabrication, NASA/ISS interfaces, launch/berthing and transition timing before ISS retirement.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review NASA milestone correspondence, integrated master schedule, cost-to-complete, launch slots and alternative free-flyer plan.
  - risk_id: R-003
    risk_title: Spacesuit certification and Artemis/ISS readiness risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: NASA OIG flagged readiness challenges after Collins task orders were removed, increasing reliance on Axiom spacesuit delivery.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request xEVAS technical reviews, test results, certification plan, subcontractor schedule, margin and NASA issue logs.
  - risk_id: R-004
    risk_title: Customer concentration in NASA and sovereign programs
    risk_category: customer
    severity: medium
    likelihood: high
    description: Publicly visible demand is concentrated in NASA contracts and national astronaut missions; customer revenue concentration is not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request revenue by customer, backlog, renewal/pipeline, contract termination rights and references.
  - risk_id: R-005
    risk_title: Unproven unit economics across missions and emerging products
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Mission pricing, gross margin, station utilization economics, ODC margins and manufacturing/research revenue remain non-public.
    impacted_chapter_ids:
      - I
      - II
      - V
      - VI
    impacted_section_ids:
      - I.A
      - II.A
      - V.E
      - VI.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request product P&Ls, mission-level gross margin, pricing waterfall, utilization forecast and paid-pilot conversion data.
  - risk_id: R-006
    risk_title: Leadership transitions and personnel data opacity
    risk_category: team
    severity: medium
    likelihood: medium
    description: Company sources show CEO transitions from Suffredini to Bhatia to Cirtain; headcount/attrition and compensation are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.C
      - VII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request org chart, HRIS export, attrition, executive employment agreements, board minutes and retention plan.
  - risk_id: R-007
    risk_title: Competitive pressure from other commercial station providers
    risk_category: market
    severity: medium
    likelihood: medium
    description: NASA-backed alternatives include Orbital Reef, Starlab and Northrop concepts, and other entrants can compete for post-ISS customers.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
