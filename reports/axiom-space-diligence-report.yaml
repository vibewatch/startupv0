    claim: Axiom announced a $350M 2026 financing; CNBC reported the company was valued at more than $2.5B according to PitchBook, while Sacra reports a March 2025 $100M round at about $2B.
    evidence_summary: Latest public valuation evidence points above the original $1B CB Insights row, with the strongest public 2026 valuation reference coming from CNBC citing PitchBook rather than Axiom itself.
    evidence_type: independent_news
    verification_status: partially_verified
