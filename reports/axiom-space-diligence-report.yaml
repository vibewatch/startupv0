          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financing runway and reported supplier/payment pressure
          severity: high
          likelihood: medium
          rationale: Axiom raised new capital in 2026, but prior independent reporting alleged cash, payroll and supplier-payment stress; current cash, debt and runway are not public.
