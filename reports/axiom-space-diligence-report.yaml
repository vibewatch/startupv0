    quoted_evidence:
      - source_id: SRC-026
        quote: Axiom Space is facing significant financial headwinds as the company attempts to deliver on two key commercial programs for NASA.
        location: Ars Technica
      - source_id: SRC-026
        quote: Forbes reports that Axiom Space ... has been struggling to raise money ... difficulties meeting its payroll ... fallen behind on payments to key suppliers, including Thales Alenia Space ... and SpaceX.
        location: Ars Technica citing Forbes
      - source_id: SRC-027
        quote: According to Forbes, Axiom Space has lost money on every mission. It has also faced delays in constructing its space station.
        location: The Register
