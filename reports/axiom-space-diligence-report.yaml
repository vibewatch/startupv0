            - EC-002
            - EC-003
          source_ids:
            - SRC-015
            - SRC-016
            - SRC-017
            - SRC-026
            - SRC-027
        - risk_id: R-002
          label: Station schedule and ISS deorbit dependency
          severity: high
          likelihood: medium
          rationale: Axiom Station depends on module fabrication, NASA/ISS interfaces, launch/berthing and transition timing before ISS retirement.
          evidence_claim_ids: &a2
            - EC-004
            - EC-005
            - EC-022
          source_ids:
            - SRC-019
            - SRC-002
            - SRC-022
            - SRC-023
        - risk_id: R-003
          label: Spacesuit certification and Artemis/ISS readiness risk
          severity: high
          likelihood: medium
          rationale: NASA OIG flagged readiness challenges after Collins task orders were removed, increasing reliance on Axiom spacesuit delivery.
          evidence_claim_ids: &a3
