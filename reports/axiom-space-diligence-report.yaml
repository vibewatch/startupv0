executive_summary:
  overall_assessment: Proceed only with deep finance, NASA-program, technical, supplier and legal diligence. Public evidence verifies Axiom as an active private unicorn with major NASA contracts, completed ISS missions and a 2026 financing, but financial quality, unit economics, station cost-to-complete, AxEMU schedule and customer concentration remain private or risk-laden.
  investment_or_diligence_thesis: Axiom offers rare strategic exposure to post-ISS infrastructure and human-spaceflight services; underwriting should be gated on cash/runway, NASA milestone status, supplier health, spacesuit certification and contracted backlog rather than headline valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-003
      summary: NASA selected Axiom for the $228.5M Artemis III spacesuit task order.
      evidence_claim_ids:
        - EC-006
    - founder_claim_id: FC-004
      summary: Axiom has publicly documented Ax-2, Ax-3 and Ax-4 ISS missions with national/ESA participants.
      evidence_claim_ids:
        - EC-008
        - EC-026
    - founder_claim_id: FC-001
      summary: Axiom remains an active private unicorn with public 2026 financing and latest third-party valuation signal above $2.5B.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-019
  biggest_risks:
    - risk_id: R-001
      summary: Financing runway and reported supplier/payment pressure
    - risk_id: R-002
      summary: Station schedule and ISS deorbit dependency
    - risk_id: R-003
      summary: Spacesuit certification and Artemis/ISS readiness risk
  key_evidence_gaps:
    - Audited financial statements, cash/debt/runway, AP/AR aging and board-approved forecast.
    - Fully diluted cap table, financing preferences, debt terms and option/warrant schedules.
    - NASA milestone correspondence, station cost-to-complete, launch manifest and AxEMU certification/test records.
    - Customer contracts, revenue by customer, backlog, pipeline, mission P&Ls and reference calls.
    - Supplier contracts/payment status, legal dockets, IP assignments, insurance and HRIS/attrition data.
  recommended_next_steps:
    - Open finance/legal/technical/customer/supplier data-room requests before relying on public valuation.
    - Run counsel-led NASA contract, litigation, IP, insurance and export-control reviews.
    - Conduct technical diligence on AxEMU and station modules with NASA milestone/test evidence.
    - Perform customer/supplier references with NASA, sovereign mission customers, SpaceX, Thales and KBR where permitted.
