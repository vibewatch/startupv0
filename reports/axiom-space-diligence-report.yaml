    source_ids:
      - SRC-015
      - SRC-016
      - SRC-017
    quoted_evidence:
      - source_id: SRC-015
        quote: Axiom Space ... announced today $350-million in financing to advance its mission to deliver the successor to the International Space Station (ISS) and ready its next-generation spacesuits.
        location: Axiom 2026 financing release
      - source_id: SRC-016
        quote: CEO Jonathan Cirtain told reporters ... Axiom Space, which is valued at more than $2.5 billion according to Pitchbook, plans to use the funding on spacesuit capabilities and modules one and two for its commercial space station.
        location: CNBC article
      - source_id: SRC-017
        quote: Axiom Space raised $100 million in March 2025 at approximately a $2 billion valuation, with the round co-led by 1789 Capital and Type One Ventures.
