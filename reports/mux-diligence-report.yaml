executive_summary:
  overall_assessment: "Mux passes a public eligibility screen for a private-unicorn diligence report: CB Insights lists a $1B private-company valuation, the product and customer footprint are active, and no accessible source indicated IPO, acquisition by another company or shutdown. The diligence case is constrained by missing audited financials, cap table, customer concentration, cloud/CDN economics and legal schedules."
  investment_or_diligence_thesis: A credible investment thesis depends on whether Mux can defend developer mindshare and media-grade reliability while sustaining usage-based gross margins against cloud, CDN and video-platform competitors.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights provides a current public unicorn valuation marker.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Product existence and technical scope are strongly supported by company pages and docs.
      evidence_claim_ids:
        - EC-002
        - EC-008
    - founder_claim_id: FC-005
      summary: Founder/team credibility is supported by a16z evidence tied to Zencoder and Video.js.
      evidence_claim_ids:
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Public sources do not disclose audited revenue, ARR bridge, gross margin, burn, cash or debt.
    - risk_id: R-002
      summary: The $1B public valuation marker does not reveal preferences, dilution, secondary sales or debt.
    - risk_id: R-003
      summary: Video processing and delivery depend on infrastructure economics that can compress margins if supplier costs or customer usage mix shift.
    - risk_id: R-004
      summary: Named logos are public but top-account ARR, retention and renewal status are not.
    - risk_id: R-005
      summary: Mux competes with scaled infrastructure and video platforms that can bundle pricing or distribution.
  key_evidence_gaps:
    - Audited financial statements, ARR, gross margin, burn, cash and debt.
    - Cap table, liquidation preferences, option pool, 409A and investor rights.
    - Customer ARR concentration, churn, NRR, renewal status and customer references.
    - Cloud/CDN supplier contracts, usage commitments, margin sensitivity and incident history.
    - Legal, IP, privacy, security, insurance and employment schedules.
  recommended_next_steps:
    - Open financial quality-of-revenue diligence before relying on the $1B valuation.
    - Run customer and developer-reference calls by segment.
    - Review cloud/CDN costs, reliability architecture and incident history.
    - Have counsel run IP, privacy, contract, litigation and employment diligence.
