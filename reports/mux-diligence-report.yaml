report_metadata:
  report_title: Mux Public-Source Startup Diligence Report
  target_company: Mux
  website: https://www.mux.com/
  known_aliases:
    - Mux
    - Mux, Inc.
    - Mux Video
    - Mux Data
    - Mux Robots
  sector: Developer video infrastructure, video API, streaming, analytics and AI video workflows
  geography: United States / San Francisco with global developer and media customers
  company_stage: Private unicorn / growth-stage developer infrastructure company
  research_date: 2026-06-07
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from the public CB Insights unicorn list fetched on 2026-06-07 and excluded report slugs already present in reports/.
    - Selected Mux through the requested random shuf workflow and researched only public, accessible sources.
    - Prioritized company-owned pages, investor/market-database sources, public product/pricing/security/privacy/legal pages, customer or ecosystem evidence and independent context where accessible.
    - Treated third-party and company-authored claims as evidence to be verified, not as audited facts.
  included_jurisdictions:
    - United States
    - California
    - Global customer privacy and media-delivery context
  excluded_topics:
    - No private financial statements, board materials, cap table, debt instruments, contracts, customer lists, HRIS exports, security reports, insurance policies or management interviews were available.
    - Paywalled, blocked or rate-limited sources were not bypassed; gaps are identified as follow-up requests.
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn diligence assignment
      type: workflow_request
      date_received: 2026-06-07
      notes: "Selected row: Mux, slug mux, $1B valuation, joined 2021-04-30, United States / San Francisco, Media & Entertainment, investors Accel, Cobalt Capital and Andreessen Horowitz."
