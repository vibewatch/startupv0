report_metadata:
  report_title: OpenAI Public-Source Startup Diligence Report
  target_company: OpenAI
  website: https://openai.com/
  known_aliases:
    - OpenAI Group PBC
    - OpenAI Foundation
    - ChatGPT
    - Codex
    - OpenAI API
    - Sora 2
  sector: Frontier AI models, enterprise AI software, developer tooling, and
    deployment services
  geography: United States headquartered with global consumer, developer,
    enterprise, and policy footprint
  company_stage: Late-stage private mission-controlled public benefit corporation group
  research_date: 2026-05-13
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized official OpenAI company, pricing, business, security, safety,
      research, careers, and customer-story pages.
    - Used partner and regulator primary sources from Amazon/AWS and the Office
      of the Privacy Commissioner of Canada.
    - Used a legal tracker built from public filings where direct court access
      was not reliably accessible in-session.
    - Used Jina AI mirrors for OpenAI pages that returned 403s to the default
      fetcher, per the user’s instruction.
    - Treated customer ROI, customer counts, benchmark leadership, and
      enterprise-usage depth as management or marketing claims unless
      independently corroborated.
  included_jurisdictions:
    - United States
    - Canada
    - European Union
    - Germany
  excluded_topics:
    - No private financial statements, board decks, or cap-table exports were
      available.
    - No direct customer, partner, employee, or counsel interviews were
      performed.
    - No paid database work, PACER downloads, or trademark/patent registry deep
      dives were completed in-session.
    - Some dynamic or protected pages were inaccessible or rate-limited even
      through fallback fetch methods.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-13
      notes: The user requested startup research on OpenAI and asked for a diligence
        report, suggesting Jina AI when direct fetches failed.
