risk_register:
  - risk_id: R-001
    risk_title: Mission governance may become harder to preserve under larger capital pools
    risk_category: financing
    severity: high
    likelihood: medium
    description: The recapitalized structure is explicit, but equity economics,
      warrants, and partner contracts could still create pressure points between
      mission and shareholder interests.
    impacted_chapter_ids:
      - I
      - VII
      - VIII
    impacted_section_ids:
      - I.C
      - VII.A
      - VIII.F
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Review charter documents, warrant math,
      reserved matters, and board committee materials for conflict scenarios.
  - risk_id: R-002
    risk_title: Compute and cloud concentration remains strategically high
    risk_category: operational
    severity: high
    likelihood: high
    description: OpenAI now uses more than one cloud relationship, but Microsoft and
      AWS remain economically and technically central to capacity, distribution,
      and agentic infrastructure.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.D
      - III.E
      - VIII.F
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request cloud-spend concentration, outage
      history, portability tests, and any most-favored-nation or exclusivity
      language.
  - risk_id: R-003
    risk_title: Financial quality is hard to assess from public sources
    risk_category: financial
    severity: critical
    likelihood: medium
    description: Public materials disclose capital, adoption, and product breadth
      but not audited revenue, gross margin, cash burn, or working-capital
      quality.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Obtain audited financials, segment margins,
      budget-to-actuals, capex commitments, and cash-flow forecasts.
  - risk_id: R-004
    risk_title: Copyright and data-provenance litigation could impose large cash and
      product constraints
    risk_category: legal
    severity: critical
    likelihood: high
    description: OpenAI faces active U.S. and European IP cases that challenge
      training-data use and model outputs, with headline damages and precedent
      risk.
    impacted_chapter_ids:
      - VIII
      - I
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - I.D
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Review litigation reserve analyses, outside
      counsel memos, settlement strategy, and training-data provenance controls.
  - risk_id: R-005
    risk_title: Privacy and regulatory scrutiny remains ongoing despite visible remediation
    risk_category: regulatory
    severity: high
    likelihood: high
    description: Canadian regulators found earlier ChatGPT practices non-compliant,
      and OpenAI is operating under expanding transparency and governance
      obligations across jurisdictions.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.C
      - VIII.F
      - II.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request regulator correspondence, remediation
      work plans, DSR metrics, and compliance testing results by product and
      region.
  - risk_id: R-006
    risk_title: Competitive benchmark and price pressure could compress economic returns
    risk_category: market
    severity: high
    likelihood: high
    description: OpenAI has strong breadth and adoption, but Google, xAI, Mistral,
      and Anthropic continue to compete on price, enterprise deployment, and
      benchmark narratives.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Benchmark equivalent workloads across vendors
      and review discounting, retention, and feature-adoption data by segment.
  - risk_id: R-007
    risk_title: Customer concentration and contract opacity may mask revenue dependency
    risk_category: customer
    severity: high
    likelihood: medium
    description: OpenAI has many named users and more than 1M business customers,
      but public sources do not reveal concentration, renewal dynamics, or
      exposure to channel partners.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.C
      - V.B
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request top-customer concentration, pipeline,
      renewals, and channel-economics reports.
  - risk_id: R-008
    risk_title: Model misuse and safety failures remain a core platform risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Preparedness, system cards, and agent controls are visible, but the
      company is pushing into more autonomous, realtime, and cyber-relevant
      workloads.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VI.B
      - VIII.C
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Inspect red-team outputs, incident logs,
      safeguard scorecards, and exception approvals for high-capability systems.
  - risk_id: R-009
    risk_title: Organizational scaling may outpace operating discipline
    risk_category: team
    severity: medium
    likelihood: medium
    description: OpenAI is formalizing leadership, hiring across frontier roles, and
      adding services capacity through DeployCo, all of which increase
      integration and culture risk.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
      - VII.C
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Review attrition, performance-management data,
      role clarity, and post-acquisition integration plans.
  - risk_id: R-010
    risk_title: Monetization changes could erode user trust on lower tiers
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: Ads may help fund access, but even labeled ads introduce a new
      trust vector in a product often used for sensitive personal and work
      tasks.
    impacted_chapter_ids:
      - V
      - VIII
    impacted_section_ids:
      - V.A
      - VIII.E
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request consumer trust metrics, complaint
      trends, and safeguards for sensitive-topic exclusions and targeting.
  - risk_id: R-011
    risk_title: Deployment-services expansion could dilute software margins and focus
    risk_category: operational
    severity: medium
    likelihood: medium
    description: DeployCo and Codex Labs deepen customer relationships but push
      OpenAI toward service-heavy execution, staffing, and integration work.
    impacted_chapter_ids:
      - V
      - I
    impacted_section_ids:
      - V.C
      - I.D
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Review utilization targets, service gross
      margin assumptions, and separation of product versus services economics.
  - risk_id: R-012
    risk_title: Strategic contracts expose the company to hidden downside terms
    risk_category: legal
    severity: high
    likelihood: medium
    description: Microsoft and AWS disclosures are headline-level only; private
      terms could contain caps, covenants, termination hooks, or data and
      distribution constraints.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.D
      - VIII.F
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Obtain executed contracts, amendments, side
      letters, and covenant trackers for all material partner agreements.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited historical financial statements and footnotes
    why_it_matters: Without audited statements it is impossible to judge earnings
      quality, cash conversion, and working-capital health.
    suggested_source_or_request: Request audited statements, management accounts, and board reporting packs.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Detailed cap table, warrant math, and employee equity schedules
    why_it_matters: The recapitalized structure is central to control and economics.
    suggested_source_or_request: Request cap table, charter, option-plan docs,
      warrant agreements, and investor rights.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.D
    missing_information: Executed Microsoft and AWS agreements plus side letters
    why_it_matters: Headline summaries can hide covenants, pricing floors, or
      strategic restrictions.
    suggested_source_or_request: Request fully executed contracts and covenant trackers.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue concentration and retention by customer and channel
    why_it_matters: Customer breadth is visible; concentration is not.
    suggested_source_or_request: Request top-customer concentration, cohort
      retention, and partner-resold revenue splits.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity metrics and pipeline analysis
    why_it_matters: Channel richness does not prove efficient GTM execution.
    suggested_source_or_request: Request quota attainment, cycle times, CAC payback,
      and pipeline conversion by motion.
    priority: medium
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D budget allocation and portfolio economics
    why_it_matters: A fast pipeline can be impressive but uneconomic.
    suggested_source_or_request: Request product-line R&D budgets, launch gates, and kill rates.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, attrition, and org-health metrics
    why_it_matters: Management risk cannot be assessed from named leaders alone.
    suggested_source_or_request: Request headcount by function/location, regretted
      attrition, and engagement scores.
    priority: medium
