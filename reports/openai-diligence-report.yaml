          from the accessible public sources reviewed in-session. Public
          material instead emphasizes mission, intensity, and scaling, which are
          useful culture signals but not substitutes for employee-relations
          diligence.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VII.F-F1
            finding: Public talent messaging emphasizes intensity, fast iteration, and high
              impact rather than labor-relations transparency.
            evidence_claim_ids:
              - EC-025
            risk_ids:
              - R-009
        hidden_risks:
          - High-intensity cultures can produce retention and managerial issues
            before they surface publicly.
        evidence_gaps:
          - No labor-relations log, employee-litigation schedule, or
            whistleblower summary was publicly verified.
        follow_up_questions:
          - What have employee-engagement and regretted-attrition trends looked
            like?
          - Have there been material HR investigations, settlements, or labor
            claims?
        table_ids:
          - T-019
        figure_ids: []
        evidence_claim_ids:
          - EC-025
      - section_id: VII.G
        title: Personnel Turnover
        checklist_question_ids:
          - VII.G.1
          - VII.G.2
        summary: Public materials confirm role expansions and continued hiring, but not
          comprehensive turnover. Leadership formalization in 2025 may reflect a
          move toward greater management stability, yet attrition data remains a
          key gap.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VII.G-F1
            finding: Leadership role formalization suggests active management redesign, but
              not necessarily lower turnover.
            evidence_claim_ids:
              - EC-003
            risk_ids:
