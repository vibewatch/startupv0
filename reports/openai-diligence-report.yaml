  - figure_id: F-009
    title: OpenAI diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.C
    figure_type: risk_heatmap
    description: Heatmap of the report’s major risks by severity and likelihood.
    purpose: Condense the cross-report risk register into one view for prioritizing
      deeper diligence.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Mission governance may become harder to preserve under larger capital
            pools
          severity: high
          likelihood: medium
          rationale: The recapitalized structure is explicit, but equity economics,
            warrants, and partner contracts could still create pressure points
            between mission and shareholder interests.
          evidence_claim_ids: &a1
            - EC-002
            - EC-017
          source_ids:
            - SRC-002
            - SRC-023
        - risk_id: R-002
          label: Compute and cloud concentration remains strategically high
          severity: high
          likelihood: high
          rationale: OpenAI now uses more than one cloud relationship, but Microsoft and
            AWS remain economically and technically central to capacity,
            distribution, and agentic infrastructure.
          evidence_claim_ids: &a2
            - EC-017
            - EC-018
          source_ids:
            - SRC-023
            - SRC-030
        - risk_id: R-003
          label: Financial quality is hard to assess from public sources
          severity: critical
          likelihood: medium
          rationale: Public materials disclose capital, adoption, and product breadth but
            not audited revenue, gross margin, cash burn, or working-capital
            quality.
          evidence_claim_ids: &a3
            - EC-010
            - EC-028
          source_ids:
            - SRC-032
        - risk_id: R-004
          label: Copyright and data-provenance litigation could impose large cash and
            product constraints
          severity: critical
          likelihood: high
          rationale: OpenAI faces active U.S. and European IP cases that challenge
            training-data use and model outputs, with headline damages and
            precedent risk.
          evidence_claim_ids: &a4
            - EC-030
            - EC-031
            - EC-032
          source_ids:
            - SRC-034
            - SRC-035
            - SRC-036
        - risk_id: R-005
          label: Privacy and regulatory scrutiny remains ongoing despite visible
            remediation
          severity: high
          likelihood: high
          rationale: Canadian regulators found earlier ChatGPT practices non-compliant,
            and OpenAI is operating under expanding transparency and governance
            obligations across jurisdictions.
          evidence_claim_ids: &a5
            - EC-027
            - EC-028
            - EC-029
          source_ids:
            - SRC-031
            - SRC-032
            - SRC-033
        - risk_id: R-006
          label: Competitive benchmark and price pressure could compress economic returns
          severity: high
          likelihood: high
          rationale: OpenAI has strong breadth and adoption, but Google, xAI, Mistral, and
            Anthropic continue to compete on price, enterprise deployment, and
            benchmark narratives.
          evidence_claim_ids: &a6
            - EC-022
            - EC-023
          source_ids: []
        - risk_id: R-007
          label: Customer concentration and contract opacity may mask revenue dependency
          severity: high
          likelihood: medium
          rationale: OpenAI has many named users and more than 1M business customers, but
            public sources do not reveal concentration, renewal dynamics, or
            exposure to channel partners.
          evidence_claim_ids: &a7
            - EC-010
            - EC-019
            - EC-020
          source_ids:
            - SRC-024
            - SRC-025
        - risk_id: R-008
          label: Model misuse and safety failures remain a core platform risk
          severity: high
          likelihood: medium
          rationale: Preparedness, system cards, and agent controls are visible, but the
            company is pushing into more autonomous, realtime, and
            cyber-relevant workloads.
          evidence_claim_ids: &a8
            - EC-009
            - EC-023
            - EC-033
          source_ids:
            - SRC-010
            - SRC-011
            - SRC-012
        - risk_id: R-009
          label: Organizational scaling may outpace operating discipline
          severity: medium
          likelihood: medium
          rationale: OpenAI is formalizing leadership, hiring across frontier roles, and
            adding services capacity through DeployCo, all of which increase
            integration and culture risk.
          evidence_claim_ids: &a9
            - EC-003
            - EC-019
            - EC-025
          source_ids:
            - SRC-003
            - SRC-024
        - risk_id: R-010
          label: Monetization changes could erode user trust on lower tiers
          severity: medium
          likelihood: medium
          rationale: Ads may help fund access, but even labeled ads introduce a new trust
