executive_summary:
  overall_assessment: wefox appears eligible as an active private unicorn based on the CB Insights unicorn list and current public web presence. Public evidence supports product/category activity and selected traction or financing signals, but core diligence remains unresolved because financial statements, cap table, customer concentration, contracts, security/legal artifacts and detailed operating metrics are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The case for wefox depends on proving revenue quality, durable customer economics, defensible product adoption, legal/regulatory posture, team retention and financing terms beyond public-list valuation evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists wefox as a unicorn at $4.5B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Public company materials show an active product platform in Insurance / insurtech, MGA and retail insurance distribution.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-005
      summary: Public leadership/team signals indicate an operating company.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Turnaround and restructuring execution risk
    - risk_id: R-002
      summary: Valuation and financing opacity
    - risk_id: R-003
      summary: Regulated insurance and MGA dependency
  key_evidence_gaps:
    - Audited financial statements, KPI pack, cash/debt, cap table and financing documents.
    - Top-customer ARR/revenue, contracts, churn, retention, renewal status and reference calls.
    - CAC/payback, sales productivity, pipeline, pricing waterfall and margin by product/customer.
    - Product roadmap, reliability, security, incident history, technical debt and vendor dependencies.
    - Legal, regulatory, IP, insurance, employment and material-contract review by counsel.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline valuation.
    - Request customer contracts, cohort metrics and independent customer references.
    - Have counsel/security specialists review legal, regulatory, privacy, security, IP and material contracts.
    - Benchmark competitors using buyer references, win/loss evidence and pricing data.
