report_metadata:
  report_title: wefox Startup Diligence Report
  target_company: wefox
  website: https://www.wefox.com/
  known_aliases:
    - wefox
    - wefox Holding AG
    - FinanceFox
  sector: Insurance / insurtech, MGA and retail insurance distribution
  geography: Germany / Switzerland with Austria, Netherlands and Switzerland core markets
  company_stage: Private unicorn / restructuring growth-stage insurtech
  research_date: 2026-06-06
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: EUR and USD as disclosed
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Selected randomly from a CB Insights-derived candidate list after excluding existing reports by slug.
    - Used public company pages, CB Insights, Wikipedia where useful, and public newsroom/product/customer pages fetched through r.jina.ai/curl.
    - Treated company-published claims as verified only for the existence of the public statement unless independently corroborated.
    - No private data room, management interview, customer reference, counsel docket export or audited financial package was available.
  included_jurisdictions:
    - Germany
    - Primary public operating jurisdictions referenced by sources
  excluded_topics:
    - Private financial statements, contracts, customer calls, employee records, cap table, SOC/security reports and counsel-only legal materials were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-06
      notes: No pitch deck, founder claims, financial model, data room or customer references were provided.
