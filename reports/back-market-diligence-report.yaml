risk_register:
  - risk_id: R-001
    risk_title: Financial scale, margin, cash runway and retention are not public
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public evidence for Back Market does not disclose audited financials, ARR/GMV, gross margin, churn, CAC, debt or cash runway.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids:
      - EC-006
    mitigation_or_diligence_request: Request audited financials, KPI pack, budget-to-actuals, cash/debt schedule, forecast model and cohort metrics.
  - risk_id: R-002
    risk_title: Headline valuation may not reflect current financing terms
    risk_category: financing
    severity: high
    likelihood: medium
    description: Back Market's $5.70B unicorn valuation is a public list anchor, not a verified current post-money, preference stack or secondary-market price.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-005
    mitigation_or_diligence_request: Request cap table, liquidation preferences, option pool, SAFEs/notes, debt and latest board-approved valuation support.
  - risk_id: R-003
    risk_title: Buyer repeat behavior, seller quality and warranty/return burden are undisclosed
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public marketplace activity does not disclose active buyers, repeat purchase, NPS, seller quality, returns or category concentration.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
      - III.C
    evidence_claim_ids:
      - EC-004
    mitigation_or_diligence_request: Request top customer/merchant/seller concentration, cohort retention, disputes/returns/churn and independent references.
  - risk_id: R-004
    risk_title: Refurbished electronics face platform, retailer, OEM and carrier competition
    risk_category: market
    severity: medium
    likelihood: high
    description: Large marketplaces, OEMs, carriers and retailers can pressure CAC, supply access, pricing and trust differentiation.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-010
      - EC-011
    mitigation_or_diligence_request: Run win/loss diligence, pricing benchmarks, channel economics and competitor reference checks.
  - risk_id: R-005
    risk_title: Marketplace quality control and post-purchase economics are not fully public
    risk_category: product
    severity: medium
    likelihood: medium
    description: Back Market Promise and warranty claims are public, but defect rates, returns, seller audit quality and product reliability are private.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-008
    mitigation_or_diligence_request: Request product roadmap, uptime/incident history, quality metrics, technical debt review and roadmap-resourcing plan.
  - risk_id: R-006
    risk_title: Team scale, retention and compensation are not public
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Public pages do not provide Back Market's complete org chart, headcount history, compensation arrangements, turnover or employee-relations record.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.D
      - VII.G
    evidence_claim_ids:
      - EC-009
    mitigation_or_diligence_request: Request HRIS export, org chart, attrition, compensation plans, option grants and employee-relations history.
  - risk_id: R-007
    risk_title: Consumer protection, warranty, privacy, marketplace and ESG/advertising claims create legal exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Consumer warranties, right-to-repair, privacy, marketplace liability, ESG claims and cross-border consumer rules require counsel review.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - VIII.G
    evidence_claim_ids:
      - EC-007
      - EC-012
    mitigation_or_diligence_request: Have counsel review regulatory permissions, contracts, privacy/security obligations, IP assignments, litigation and insurance.
  - risk_id: R-008
    risk_title: Seller/refurbisher supply, inventory quality and payments/logistics dependencies are private
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Back Market depends on sellers/refurbishers, logistics, payments and quality controls; concentration and SLAs are not public.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.F
    evidence_claim_ids:
      - EC-004
      - EC-012
    mitigation_or_diligence_request: Request supplier contracts, processor/cloud dependencies, SLAs, concentration metrics and contingency plans.
