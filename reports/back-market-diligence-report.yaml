executive_summary:
  overall_assessment: "Back Market appears eligible for public-source diligence as an uncovered private unicorn: CB Insights lists a $5.70B valuation and public materials show active operations. The investment case remains unresolved because financial statements, retention, concentration, cap table, contracts and legal/compliance records are not public."
  investment_or_diligence_thesis: Proceed only if Back Market proves sustainable marketplace economics, repeat demand, seller quality control, return/warranty reserves and durable growth beyond the public $5.70B valuation anchor.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Back Market as a private unicorn at $5.70B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company-owned materials describe an active premium refurbished technology marketplace and circular electronics services offering.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-005
      summary: Public materials and active pages support ongoing operations, subject to management confirmation.
      evidence_claim_ids:
        - EC-005
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Financial scale, margin, cash runway and retention are not public
    - risk_id: R-003
      summary: Buyer repeat behavior, seller quality and warranty/return burden are undisclosed
    - risk_id: R-005
      summary: Marketplace quality control and post-purchase economics are not fully public
  key_evidence_gaps:
    - Audited financial statements, KPI pack, cash/debt/runway and forecast model.
    - Current cap table, preferences, option pool, SAFEs/notes and financing documents.
    - Top customer/merchant/seller concentration, contracts, retention/churn and reference calls.
    - CAC/payback, sales productivity, pricing waterfall and channel economics.
    - Counsel-led litigation, IP, regulatory, privacy/security, insurance and material-contract review.
  recommended_next_steps:
    - Do not rely on headline valuation until primary financing and financial-quality diligence are complete.
    - Request top-account, merchant or seller cohort data and independent references.
    - Run legal/regulatory, privacy/security, IP and contract review in parallel with financial diligence.
    - Benchmark pricing, differentiation and win/loss evidence against direct competitors.
