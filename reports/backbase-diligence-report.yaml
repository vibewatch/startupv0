executive_summary:
  overall_assessment: Backbase appears eligible as an uncovered private unicorn based on the fetched CB Insights list, active company website and public secondary financing history. The product/category evidence is strong for a bank software diligence target, but investment-grade underwriting still depends on private financials, customer concentration/churn, implementation economics, AI governance, competitive win/loss and regulated-bank contract review.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if Backbase can prove durable subscription revenue, low customer concentration, healthy implementation/managed-services margins, defensible AI-native product differentiation, bank-grade security/compliance controls and clear cap-table/runway terms behind the $2.66B public unicorn-list valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Backbase is an uncovered private unicorn according to CB Insights, valued at $2.66B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Backbase provides an AI-native banking operating system for financial institutions.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Backbase is trusted by 120+ leading banks and has named customer stories.
      evidence_claim_ids: *a3
    - founder_claim_id: FC-004
      summary: Backbase is recognized by analysts in digital banking engagement platforms.
      evidence_claim_ids: *a4
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements and unit economics are not public
    - risk_id: R-002
      summary: Valuation and cap table terms require primary documents
    - risk_id: R-003
      summary: Customer concentration and churn are not public
    - risk_id: R-004
      summary: Product performance claims are mostly company-reported
    - risk_id: R-005
      summary: Competitive and pricing pressure could compress growth
    - risk_id: R-006
      summary: Legal, regulatory and IP exposure cannot be cleared from public sources
  key_evidence_gaps:
    - Audited financial statements and monthly KPI pack.
    - Fully diluted capitalization, debt, warrants and investor rights.
    - Customer concentration, churn, renewals, implementation economics and reference checks.
    - Product roadmap, security/safety records, technical benchmarks and incident history.
    - Litigation, regulatory, IP, insurance and material-contract schedules.
  recommended_next_steps:
    - Run financial quality-of-earnings and revenue-recognition diligence.
    - Hold customer, partner and supplier reference calls.
    - Review cap table, financing documents and runway model.
    - Conduct product/security/IP/legal review with specialist counsel.
    - Benchmark pricing, win/loss and pipeline conversion against competitors.
