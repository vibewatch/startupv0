report_metadata:
  report_title: Backbase Startup Diligence Report
  target_company: Backbase
  website: https://www.backbase.com/
  known_aliases:
    - BackBase
    - Backbase BV
    - Backbase Banking OS
    - AI-Native Banking OS
  sector: Financial technology, digital banking software, AI-native banking operating systems and bank workflow orchestration
  geography: Amsterdam, Netherlands headquarters with global bank customer and office footprint
  company_stage: Private unicorn / growth-stage financial technology software company
  research_date: 2026-06-10
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from reports/*-diligence-report.yaml and selected this uncovered target from a fetched CB Insights unicorn list using shuf -n 3.
    - Used public company pages, public market-database rows, accessible news/encyclopedia sources and open technical sources; inaccessible or blocked sources are treated as limitations, not evidence.
    - No interviews, data-room documents, paid database exports, docket pulls or private records were used.
  included_jurisdictions:
    - Netherlands
    - European Union
    - United States
    - United Kingdom
    - Middle East
    - Asia Pacific
    - Global banking markets
  excluded_topics:
    - Private audited financials, cap table, contracts, board materials, employee records, non-public security reports, customer reference calls and privileged legal materials were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow-selected unicorn candidate record
      type: workflow_request
      date_received: 2026-06-10
      notes: "Selected candidate row: BackBase | $2.66B | 6/9/2022 | Netherlands | Amsterdam | Financial Services | Motive Partners"
