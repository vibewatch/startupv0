      risk_points:
        - risk_id: R-001
          label: Parking demand cyclicality
          severity: medium
          likelihood: medium
          rationale: Demand may fluctuate with commuting, events, airports, commercial real estate, pricing, and city policy changes.
          evidence_claim_ids: &a1
            - EC-003
            - EC-008
          source_ids:
            - SRC-002
            - SRC-005
        - risk_id: R-002
          label: Hardware/software deployment complexity
          severity: medium
          likelihood: medium
          rationale: Physical parking infrastructure plus software integrations create installation, support, warranty, and service-margin risk.
          evidence_claim_ids: &a2
            - EC-004
            - EC-007
          source_ids:
            - SRC-002
            - SRC-005
        - risk_id: R-003
          label: Customer concentration and revenue quality unknown
          severity: high
          likelihood: unknown
          rationale: Public scale metrics do not disclose top customers, churn, renewal terms, or revenue quality.
          evidence_claim_ids: &a3
            - EC-003
            - EC-008
          source_ids:
            - SRC-002
            - SRC-005
        - risk_id: R-004
          label: Data/privacy/payment security exposure
          severity: medium
          likelihood: medium
          rationale: Payments, parking, mapping, and mobility integrations create privacy, cybersecurity, and data-sharing obligations.
          evidence_claim_ids: &a4
            - EC-004
            - EC-008
          source_ids:
            - SRC-002
            - SRC-005
        - risk_id: R-005
          label: Headcount productivity and retention
          severity: medium
          likelihood: unknown
          rationale: The 2022 hiring plan requires current HRIS, attrition, support, and quota-productivity validation.
          evidence_claim_ids: &a5
            - EC-005
            - EC-008
          source_ids:
            - SRC-003
            - SRC-002
