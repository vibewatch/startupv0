risk_register:
  - risk_id: R-001
    risk_title: Parking demand cyclicality
    risk_category: market
    severity: medium
    likelihood: medium
    description: Demand may fluctuate with commuting, events, airports, commercial real estate, pricing, and city policy changes.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - III.A
      - VIII.G
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request primary records, third-party confirmations, and counsel/accountant review.
  - risk_id: R-002
    risk_title: Hardware/software deployment complexity
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Physical parking infrastructure plus software integrations create installation, support, warranty, and service-margin risk.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - III.A
      - VIII.G
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request primary records, third-party confirmations, and counsel/accountant review.
  - risk_id: R-003
    risk_title: Customer concentration and revenue quality unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public scale metrics do not disclose top customers, churn, renewal terms, or revenue quality.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - III.A
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request primary records, third-party confirmations, and counsel/accountant review.
  - risk_id: R-004
    risk_title: Data/privacy/payment security exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Payments, parking, mapping, and mobility integrations create privacy, cybersecurity, and data-sharing obligations.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - III.A
      - VIII.G
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request primary records, third-party confirmations, and counsel/accountant review.
  - risk_id: R-005
    risk_title: Headcount productivity and retention
    risk_category: team
    severity: medium
    likelihood: unknown
    description: The 2022 hiring plan requires current HRIS, attrition, support, and quota-productivity validation.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - III.A
      - VIII.G
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request primary records, third-party confirmations, and counsel/accountant review.
  - risk_id: R-006
    risk_title: Valuation staleness
    risk_category: financing
    severity: medium
    likelihood: medium
    description: The $1B+ mark dates to the 2022 round and may not reflect current private-market conditions.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - III.A
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request primary records, third-party confirmations, and counsel/accountant review.
  - risk_id: R-007
    risk_title: Legal/regulatory history not fully public
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public sources did not provide a full litigation, regulatory, insurance, or payment-compliance schedule.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - III.A
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request primary records, third-party confirmations, and counsel/accountant review.
  - risk_id: R-008
    risk_title: Acquisition and integration complexity
    risk_category: operational
    severity: high
    likelihood: medium
    description: Arrive, Parkonect, ParkIt, OmniPark, Ticketech and Ballparc expanded the platform quickly, increasing migration, product-overlap and customer-retention risk.
    impacted_chapter_ids:
      - III
      - VI
      - VII
    impacted_section_ids:
      - III.B
      - VI.B
      - VII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request acquisition integration KPIs, acquired ARR/churn and product rationalization roadmap.
  - risk_id: R-009
    risk_title: Competition and channel dependency
    risk_category: market
    severity: high
    likelihood: medium
    description: Legacy PARCS providers, AI parking entrants and mobile payment/reservation networks can pressure pricing and control driver demand.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.C
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request win/loss data, partner economics, bookings by channel and pricing concessions.
  - risk_id: R-010
    risk_title: Debt and post-2022 valuation opacity
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: Third-party data reports 2024 debt and the only valuation mark is from 2022; current fair value and covenant exposure are unknown.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request debt agreements, lien searches, covenant compliance and current valuation support.
