report_metadata:
  report_title: FLASH / FlashParking Public-Source Startup Diligence Report
  target_company: FLASH
  website: https://www.flashparking.com/
  known_aliases:
    - FlashParking
    - FLASH Parking
    - Flash
    - FlashParking, Inc.
    - ParkWhiz
    - BestParking
  sector: Parking, mobility, proptech infrastructure, payments and EV charging technology
  geography: Austin, Texas, United States; North America operating focus
  company_stage: Late-stage private mobility-infrastructure software and hardware platform
  research_date: 2026-06-09
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: America/Chicago
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Company-owned sources: Flash product, pricing, media, case-study, legal/privacy/ALPR/terms pages and Greenhouse job board."
    - "Third-party public sources: CB Insights unicorn table, Tracxn profile, LinkedIn public profile and Apple App Store listing."
    - "Legal/regulatory public sources: privacy policy, ALPR policy, terms, HITRUST/PCI announcements and Flash Valet patent-pending notice."
    - No private records, paid databases, customer calls or non-public systems were used.
  included_jurisdictions:
    - United States
    - Texas
    - California ALPR/privacy context
    - North America market references
  excluded_topics:
    - Private financials, customer contracts, cap table, debt documents, security audit reports, employee records and exhaustive docket searches.
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided CB Insights unicorn row for FLASH
      type: public-source excerpt
      date_received: 2026-06-09
      notes: Valuation $1B; joined 2022-03-16; United States/Austin/Industrials; investors L Catterton, Trellis Partners, Vista Equity Partners.
