report_metadata:
  report_title: Handshake Startup Diligence Report
  target_company: Handshake
  website: https://joinhandshake.com/
  known_aliases:
    - Handshake
    - Stryder Corp.
    - joinhandshake.com
  sector: Early-career recruiting, career-network, and AI workforce marketplace software
  geography: United States / San Francisco, California; global users and offices
  company_stage: Private unicorn / growth-stage marketplace and recruiting software company
  research_date: 2026-05-30
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the target set from public unicorn-list sources and excluded existing report slugs in reports/.
    - Used CB Insights as the primary unicorn-status source and public company/news pages for validation.
    - Screened for public IPO, acquisition and shutdown signals before writing the report.
    - Treated company-published statements as evidence of public claims, not as audited proof of performance.
    - No private data room, customer calls, management interviews, audited financials, counsel memos, SOC reports or HRIS data were available.
  included_jurisdictions:
    - United States
    - United Kingdom
    - Global remote/team footprint referenced publicly
  excluded_topics:
    - Private financials, contracts, cap table, customer calls, SOC/security reports, employee records, tax records, board materials and non-public legal correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-30
      notes: No pitch deck, financial model, data room or founder responses were provided.
