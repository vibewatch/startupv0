executive_summary:
  overall_assessment: Handshake is eligible for this report as an active private-unicorn target based on CB Insights and public operating evidence. Public sources support the unicorn valuation screen, active product/category presence, customer or network traction, and public team/product signals; however, current financials, cap table, retention, customer concentration, security, legal and HR artifacts are not public.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A defensible thesis for Handshake depends on proving durable revenue quality, retention, margin, customer concentration, competitive differentiation, security/privacy posture, and financing economics beyond public valuation and marketing evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and public financing coverage support the $3.50B unicorn valuation screen.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Handshake publicly markets an active product platform.
      evidence_claim_ids:
        - EC-003
        - EC-008
    - founder_claim_id: FC-004
      summary: Handshake has public customer, partner, logo or network traction signals.
      evidence_claim_ids:
        - EC-005
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Financial scale, burn, and valuation support are private
    - risk_id: R-002
      summary: Marketplace quality and monetization are not proven by public scale metrics
    - risk_id: R-003
      summary: Competitive pressure from large hiring and professional networks
  key_evidence_gaps:
    - Audited financial statements, ARR/bookings, gross margin, cash/debt and forecast model.
    - Cap table, preferences, option pool, debt, SAFEs/notes and financing documents.
    - Customer-level ARR, contracts, renewal schedule, churn/NRR cohorts and reference calls.
    - Security, privacy, IP, legal, insurance and material-contract artifacts.
    - Org chart, HRIS export, compensation, attrition and key-person retention evidence.
  recommended_next_steps:
    - Run financial and revenue-quality diligence before relying on headline valuation.
    - Request customer cohort data, top-account contracts and independent customer references.
    - Have counsel and security specialists review legal, privacy, security, IP and regulatory artifacts.
    - Benchmark against direct competitors using win/loss, pricing, renewal and buyer-reference evidence.
