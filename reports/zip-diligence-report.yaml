  - {risk_id: "R-008", risk_title: "Workforce scaling and retention risk", risk_category: "team", severity: "medium", likelihood: "medium", description: "Rapid headcount growth from 250 to over 500 employees can stress culture, management bandwidth, productivity, and compensation planning.", impacted_chapter_ids: ["VII"], impacted_section_ids: ["VII.B", "VII.D", "VII.G"], evidence_claim_ids: ["EC-024", "EC-027"], mitigation_or_diligence_request: "Request HRIS, attrition by function/location, compensation bands, management spans, and employee-relations claims."}
  - {risk_id: "R-009", risk_title: "Third-party cloud, AI, and observability dependencies", risk_category: "operational", severity: "medium", likelihood: "medium", description: "AWS, Anthropic, Datadog, Fivetran, LaunchDarkly, and Asana appear in subprocessors; concentration, cost, and failover plans are private.", impacted_chapter_ids: ["III", "II", "VIII"], impacted_section_ids: ["III.E", "II.A", "VIII.F"], evidence_claim_ids: ["EC-012"], mitigation_or_diligence_request: "Review vendor contracts, concentration, SLAs, cost exposure, resilience tests, and subprocessor change controls."}
