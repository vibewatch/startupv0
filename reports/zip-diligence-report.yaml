        evidence_gaps: ["Product demo, architecture, module ARR/gross margin, roadmap, release quality, support tickets, and price book."]
        follow_up_questions: ["Provide product roadmap, customer usage by module, and implementation cohort metrics."]
        table_ids: ["T-004", "T-005", "T-006"]
        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-005", "EC-006", "EC-007", "EC-012", "EC-017", "EC-018"]
