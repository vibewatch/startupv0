report_metadata:
  report_title: "Zip Startup Diligence Report"
  target_company: "Zip"
  website: "https://ziphq.com/"
  known_aliases:
    - "Zip"
    - "ZipHQ"
    - "ZipHQ, Inc."
    - "Zip.com"
  sector: "Enterprise procurement orchestration, spend management, and AI workflow software"
  geography: "United States headquartered; global enterprise customers and public EMEA/London expansion signals"
  company_stage: "Private unicorn / growth-stage enterprise SaaS"
  research_date: "2026-06-06"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "UTC"
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Confirmed target identity as the U.S. procurement/orchestration company Zip/ZipHQ, not Australian Zip Co lender."
    - "Used public web evidence only: company pages, press releases, customer resources, trust/privacy/subprocessor pages, trademark records, and DuckDuckGo result screens."
    - "Treated company-owned statements as claims; financial quality, retention, legal matters, security reports, and contracts require private records."
    - "Mapped findings to checklist chapters I-VIII and created tables/figures even where public evidence is thin."
  included_jurisdictions:
    - "United States"
    - "California"
    - "United Kingdom / European Union privacy context referenced by Zip"
    - "Global customer and subprocessor context"
  excluded_topics:
    - "No private data room, management interview, customer call, counsel report, SOC report, security artifact, cap table, contract, tax schedule, or HRIS export was available."
    - "No paywalled or access-controlled records were bypassed."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "User task selecting Zip as target"
      type: "workflow_request"
      date_received: "2026-06-06"
      notes: "No pitch deck, financial model, data room, customer list, or management responses were provided."
founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Zip is a private U.S. enterprise procurement/orchestration software unicorn with a latest public valuation of $2.2B after a $190M Series D."
    claim_source: "Zip funding announcements and Business Wire"
    claim_date: "2024-10-21"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.C", "I.D"]
    verification_status: verified
    confidence: high
    evidence_claim_ids: ["EC-001", "EC-002"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request cap table, financing documents, investor allocations, liquidation preferences, SAFEs/notes, debt, and current 409A support."
  - founder_claim_id: "FC-002"
    claim_text: "Zip offers an AI-powered procurement orchestration suite spanning intake-to-procure, procure-to-pay, supplier onboarding, sourcing, risk orchestration, payments, integrations, and AI agents."
    claim_source: "Company product pages and releases"
    claim_date: null
    mapped_chapter_ids: ["II", "VI"]
    mapped_section_ids: ["II.A", "VI.B"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-005", "EC-006", "EC-017", "EC-018"]
    contradiction_summary: "Product packaging is public, but adoption, reliability, attach rates, and margins are not publicly verifiable."
    diligence_follow_up:
      - "Request product demo, architecture, module ARR, roadmap, support metrics, release notes, and customer implementation references."
  - founder_claim_id: "FC-003"
    claim_text: "Zip has large enterprise customer traction and measurable customer outcomes, including hundreds of customers, named logos, and billions of dollars of claimed savings/spend processed."
    claim_source: "Company customer, funding, and Forrester TEI materials"
    claim_date: null
    mapped_chapter_ids: ["III", "V"]
    mapped_section_ids: ["III.A", "III.C", "V.A", "V.B"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-008", "EC-009", "EC-010", "EC-016", "EC-026"]
    contradiction_summary: "Logos and outcome claims are public, but revenue concentration, churn, NRR, and independent customer references are not public."
    diligence_follow_up:
      - "Request top-customer ARR, cohorts, customer contracts, renewal dates, churn/NRR, implementation health, and permissioned reference calls."
  - founder_claim_id: "FC-004"
    claim_text: "Zip is product/R&D-led, building software in-house and advancing AI Lab, Superagents, MCP, and AI Spend Automation."
    claim_source: "Series D and AI product blogs"
    claim_date: null
    mapped_chapter_ids: ["VI", "II"]
    mapped_section_ids: ["VI.A", "VI.B", "II.A"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-017", "EC-018"]
    contradiction_summary: "Roadmap and activity are public claims; delivery, governance, and customer adoption remain unverified."
    diligence_follow_up:
      - "Request R&D budget, AI governance, model/vendor map, release adoption, uptime/SLA history, and security incident reports."
  - founder_claim_id: "FC-005"
    claim_text: "Zip maintains enterprise security and privacy controls including SOC audits, ISO 27001, GDPR/CCPA posture, encryption, and audit logs."
    claim_source: "Zip Trust and Privacy pages"
    claim_date: null
    mapped_chapter_ids: ["VIII", "II"]
    mapped_section_ids: ["VIII.G", "II.A"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-019", "EC-020"]
    contradiction_summary: "Public trust claims are visible; current reports and exceptions require NDA review."
    diligence_follow_up:
      - "Request SOC reports, ISO certificate, pen-test summaries, incident history, DPAs, subprocessor notices, and breach logs."
  - founder_claim_id: "FC-006"
    claim_text: "Zip is scaling its workforce and leadership team while retaining founder-led management."
    claim_source: "About, Y Combinator, and headcount press materials"
    claim_date: null
    mapped_chapter_ids: ["VII"]
    mapped_section_ids: ["VII.A", "VII.B", "VII.C", "VII.G"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-004", "EC-024", "EC-025", "EC-027"]
    contradiction_summary: "Founder roles and growth are public; turnover, compensation, full org chart, and employee issues are not public."
    diligence_follow_up:
      - "Request org chart, HRIS export, attrition, compensation plan, option plan, employment agreements, and employee claims schedule."
executive_summary:
  overall_assessment: "Eligible public evidence supports Zip as an active private U.S. procurement software unicorn with a $2.2B public valuation anchor, substantial named enterprise customers, and broad AI/procurement product scope. The diligence posture remains high-gap because core financials, cap table, customer concentration, churn, contracts, and legal schedules are private."
  investment_or_diligence_thesis: "Zip may be a category-defining procurement orchestration platform if its public customer, savings, integration, and AI roadmap claims convert into durable ARR, high retention, and efficient enterprise sales. Underwriting should proceed only after financial, customer, security, and legal data-room verification."
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "$190M Series D at $2.2B valuation is supported by company and Business Wire sources."
      evidence_claim_ids: ["EC-001", "EC-002"]
    - founder_claim_id: "FC-002"
      summary: "Product suite spans intake, P2P, supplier/sourcing, payments, integrations, and AI agents in public materials."
      evidence_claim_ids: ["EC-005", "EC-006", "EC-017"]
    - founder_claim_id: "FC-006"
      summary: "Founder-led management and rapid headcount growth are publicly supported."
      evidence_claim_ids: ["EC-004", "EC-024", "EC-025"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Financial quality and revenue metrics are opaque."
    - risk_id: "R-002"
      summary: "Customer concentration, churn, and references are not public."
    - risk_id: "R-003"
      summary: "Competition from scaled procurement suites and specialists is intense."
  key_evidence_gaps:
    - "Audited financial statements, ARR/gross margin, burn/runway, and KPI definitions."
    - "Fully diluted cap table, option pool, debt/warrants, and preferred terms."
    - "Top-customer ARR, churn/NRR, renewal calendar, and reference calls."
    - "AI/security artifacts including SOC reports, model governance, incident history, and subprocessor contracts."
    - "Counsel-run litigation/regulatory/IP search and material contract review."
  recommended_next_steps:
    - "Proceed to company data-room request only if Zip remains an active private target and management can supply financial/customer/security/legal packages."
    - "Run independent customer reference calls for at least five named enterprise customers across modules."
    - "Have counsel verify lawsuits, trademarks, IP assignments, privacy posture, insurance, and material contracts."
    - "Benchmark pricing and win/loss against Coupa, SAP Ariba, Ivalua, JAGGAER, ORO Labs, and Airbase."
chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: "Public evidence verifies funding rounds and valuation anchors, but financial statements, projections, cap table economics, tax, and accounting policies remain private-company diligence gaps."
    founder_claim_ids: ["FC-001"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-003"]
    risk_ids: ["R-001", "R-005"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3", "I.A.4", "I.A.5", "I.A.6"]
        summary: "Public sources provide funding and operating-volume signals but not GAAP statements, planned-vs-actuals, backlog, or AR aging."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.A-F1"
            finding: "Operating metrics such as spend processed and claimed savings are not substitutes for audited financial statements."
            evidence_claim_ids: ["EC-003", "EC-009"]
            risk_ids: ["R-001"]
        hidden_risks: ["Revenue quality, cash burn, gross margin, and backlog could diverge from public traction metrics."]
        evidence_gaps: ["Audited statements, ARR bridge, AR aging, backlog, planned-vs-actuals, cash balance, and revenue recognition policies."]
        follow_up_questions: ["Provide FY2023-FY2026 YTD financial statements and KPI definitions."
        ]
        table_ids: ["T-003"]
        figure_ids: []
        evidence_claim_ids: ["EC-003", "EC-009"]
      - section_id: "I.B"
        title: "Financial Projections"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3", "I.B.4", "I.B.5", "I.B.6", "I.B.7", "I.B.8"]
        summary: "Forward projections, economic assumptions, capex, working capital, and financing assumptions are not publicly available."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.B-F1"
            finding: "No public projection model was found; public valuation creates growth-expectation risk."
            evidence_claim_ids: ["EC-001", "EC-003"]
            risk_ids: ["R-005"]
        hidden_risks: ["A high private valuation may require aggressive growth, margin, and retention assumptions."]
        evidence_gaps: ["Three-year quarterly model by product, channel, geography, hiring plan, and financing scenario."]
        follow_up_questions: ["Provide board-approved plan, downside/base/upside cases, and external financing assumptions."]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-001", "EC-003"]
      - section_id: "I.C"
        title: "Capital Structure"
        checklist_question_ids: ["I.C.1", "I.C.2", "I.C.3", "I.C.4", "I.C.5"]
        summary: "Investors and rounds are public; shares, preferences, options, warrants, debt, and off-balance-sheet liabilities are not."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.C-F1"
            finding: "Public sources identify founders and investors but not ownership percentages or preference stack."
            evidence_claim_ids: ["EC-001", "EC-002", "EC-004"]
            risk_ids: ["R-005"]
        hidden_risks: ["Liquidation preferences, option-pool expansion, or debt could materially affect returns."]
        evidence_gaps: ["Fully diluted cap table, charter, investor rights, option plan, debt/warrant schedule."]
        follow_up_questions: ["Provide current cap table and all financing documents."
        ]
        table_ids: ["T-002"]
        figure_ids: []
        evidence_claim_ids: ["EC-001", "EC-002", "EC-004"]
      - section_id: "I.D"
        title: "Other financial information"
        checklist_question_ids: ["I.D.1", "I.D.2", "I.D.3"]
        summary: "Financing history is publicly anchored; tax positions, accounting policies, and current investor basis are not public."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "I.D-F1"
            finding: "Series B, C, and D valuation trajectory is public and supports unicorn eligibility."
            evidence_claim_ids: ["EC-001", "EC-002"]
            risk_ids: ["R-005"]
        hidden_risks: ["Press-release valuations may not reflect current fair value, liquidation preferences, or secondary prices."]
        evidence_gaps: ["Tax schedules, accounting memos, investor basis, debt, and warrant history."]
        follow_up_questions: ["Provide financing history with investor allocations and current basis."
        ]
        table_ids: ["T-001"]
        figure_ids: ["F-001", "F-002"]
        evidence_claim_ids: ["EC-001", "EC-002", "EC-003"]
  - chapter_id: "II"
    title: "Products"
    chapter_summary: "Zip's public product suite is broad and AI-oriented, but pricing, profitability, implementation quality, and module adoption are not public."
    founder_claim_ids: ["FC-002"]
    evidence_claim_ids: ["EC-005", "EC-006", "EC-007", "EC-012", "EC-017", "EC-018"]
    risk_ids: ["R-004", "R-006", "R-009", "R-010"]
