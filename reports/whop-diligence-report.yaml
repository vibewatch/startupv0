executive_summary:
  overall_assessment: Track with compliance-heavy diligence. Public evidence supports an active private unicorn with meaningful product velocity and platform scale, but financial quality, regulatory readiness, loss/fraud rates, seller concentration, and strategic-investor rights remain private.
  investment_or_diligence_thesis: Whop is evolving from a digital-product marketplace into a commerce and payments network for internet-native businesses. Public evidence supports a 2026 $1.6B unicorn signal, Tether strategic financing, large user/creator economics, international payout ambitions, and product launches across payments, marketplace distribution, cards, ads, and treasury. Investability depends on validating transaction economics, fraud losses, compliance controls, seller quality, and durability of creator/business GMV.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Whop is a private unicorn valued around $1.6B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Whop operates an internet market where people can create, connect, and transact.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Whop is building payments infrastructure including multi-processor routing and payout options.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Payments and stablecoin compliance complexity
    - risk_id: R-002
      summary: Marketplace fraud/quality and seller concentration unknown
    - risk_id: R-003
      summary: Rapid growth metrics are company-supplied and unaudited
  key_evidence_gaps:
    - Audited financial statements, management accounts, cash, burn, runway, revenue/GMV/ARR bridge and gross margin.
    - Fully diluted cap table, financing documents, investor rights, debt, warrants, SAFEs/notes, option pool and liquidation waterfall.
    - Top customer/seller/merchant revenue concentration, cohort retention, churn, references and severed relationships.
    - Material customer, partner, supplier, employment, IP, privacy/security, insurance and financing contracts.
    - Counsel-led litigation, regulatory, IP, employment, privacy/security and insurance diligence.
  recommended_next_steps:
    - Open financial/cap-table data room before underwriting valuation.
    - Run customer/seller/merchant and partner calls to validate retention, concentration and unit economics.
    - Commission legal/regulatory/IP/security diligence appropriate to the sector and jurisdictions.
    - Review management org chart, headcount by function/location, attrition, compensation and succession plan.
