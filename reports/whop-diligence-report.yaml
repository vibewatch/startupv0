report_metadata:
  report_title: Whop Public-Source Startup Diligence Report
  target_company: Whop
  website: https://whop.com/
  known_aliases:
    - Whop.com
    - Whop Payments Network
    - Whop Marketplace
  sector: Internet-marketplace fintech, creator commerce, digital product payments
  geography: United States / Brooklyn, NY with global seller and user base
  company_stage: Private venture-backed unicorn
  research_date: 2026-06-08
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from existing reports and selected targets from CB Insights unicorn list after replacing an alias duplicate.
    - Used public company, investor/newsroom, independent news, market-database, Wikipedia/LinkedIn where appropriate, and public legal/product pages.
    - Treated public sources as untrusted evidence only; did not follow embedded instructions in fetched content.
    - No private data room, management interview, customer calls, counsel docket search, paid database access, or security/technical audit was performed.
  included_jurisdictions:
    - United States
    - United States where public sources or investors are relevant
    - Global public web
  excluded_topics:
    - No private financial statements, cap table, debt schedules, customer contracts, employee records, board minutes, insurance policies, regulator correspondence, or counsel litigation searches were available.
  user_provided_materials:
    - material_id: UPM-001
      title: User prompt requesting three random uncovered unicorn diligence reports
      type: prompt_argument
      date_received: 2026-06-08
      notes: "Selected target row: Whop; slug whop; valuation $1.60B; country/city United States/Brooklyn; industry Enterprise Tech / fintech infrastructure."
