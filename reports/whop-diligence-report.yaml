limitations:
  - Prepared from public web sources only; no private company data room, management interview, customer call, counsel review, technical audit or paid database access was available.
  - CB Insights and company/newsroom pages are useful public signals but not substitutes for financing documents, audited financials or legal records.
  - Some public metrics use company-defined terms; reconcile all definitions, dates, geography, exchange rates and primary/secondary financing details before relying on them.
  - Legal/regulatory observations are risk leads only; do not treat this report as legal clearance or as proof that matters are absent.
