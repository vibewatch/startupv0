risk_register:
  - risk_id: R-001
    risk_title: Financial quality and unit-economics opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Very recent unicorn valuation tied to strategic stablecoin financing and fast-changing fintech assumptions
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Obtain audited financials, management accounts, ARR/GMV bridge, gross margin, burn, cash runway, debt and cohort/unit economics.
  - risk_id: R-002
    risk_title: Valuation and cap-table reconciliation risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation is $1.60B, but pre/post-money, preference stack, primary/secondary mix and investor rights are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Request fully diluted cap table, financing documents, option pool, side letters, liquidation waterfall and debt/warrant schedule.
  - risk_id: R-003
    risk_title: Customer / seller / user concentration and retention unknown
    risk_category: customer
    severity: high
    likelihood: high
    description: Public logos, users or scale metrics do not disclose revenue concentration, churn, retention, cohort quality or margin by segment.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Request top-account revenue/GMV, churned/severed relationships, NRR/retention cohorts and customer/seller references.
  - risk_id: R-004
    risk_title: Competitive pricing and platform pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Marketplace quality, fraud, seller concentration, and consumer-protection risk are not publicly quantified
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Run win/loss calls, pricing benchmarks, displacement analysis and CAC/payback review.
  - risk_id: R-005
    risk_title: Legal, regulatory, security or compliance exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Payments, KYC/AML, stablecoin, BNPL, payout and international expansion compliance risk
    impacted_chapter_ids:
      - VIII
      - II
      - III
    impacted_section_ids:
      - VIII.A
      - VIII.G
      - II.A
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Have counsel review litigation, regulatory correspondence, privacy/security, IP, contracts, licenses and insurance.
  - risk_id: R-006
    risk_title: People, execution and operational dependency risk
    risk_category: operational
    severity: medium
    likelihood: medium
