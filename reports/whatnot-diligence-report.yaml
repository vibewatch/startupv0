diligence_gaps:
  - gap_id: "G-001"
    chapter_id: "I"
    section_id: "I.A"
    missing_information: "Audited annual and quarterly financial statements, net revenue, take rate, gross margin, contribution margin, burn, cash, and runway."
    why_it_matters: "Public valuation and GMV cannot be assessed without revenue quality and cash-flow evidence."
    suggested_source_or_request: "Audited financial statements, monthly management accounts, processor settlement reports, and board plan."
    priority: "high"
  - gap_id: "G-002"
    chapter_id: "I"
    section_id: "I.B"
    missing_information: "Cap table, stock ledger, financing documents, liquidation preferences, investor rights, tender terms, option pool, debt, and warrants."
    why_it_matters: "Financing terms determine ownership, governance, downside protection, and common-equity value."
    suggested_source_or_request: "Stock ledger, charter, investor rights agreement, voting agreement, ROFR/co-sale, note/debt schedules, and board consents."
    priority: "high"
  - gap_id: "G-003"
    chapter_id: "II"
    section_id: "II.B"
    missing_information: "Net take rate, fee exemptions, refunds, chargebacks, fraud, seller subsidies, shipping losses, payment-processing costs, and authentication costs."
    why_it_matters: "Marketplace fee terms do not establish contribution profitability."
    suggested_source_or_request: "Cohort P&L, fee schedule history, refund/chargeback reports, and category gross-margin bridge."
    priority: "high"
  - gap_id: "G-004"
    chapter_id: "III"
    section_id: "III.A"
    missing_information: "Top buyer/seller concentration, cohort retention, churn, active buyer/seller definitions, category and geography mix."
    why_it_matters: "Marketplace durability depends on liquidity quality and concentration."
    suggested_source_or_request: "Buyer/seller cohort files, category GMV, seller decile analysis, and repeat-purchase analysis."
    priority: "high"
  - gap_id: "G-005"
    chapter_id: "III"
    section_id: "III.B"
    missing_information: "Material processor, carrier, authentication, cloud, app-store, and vendor contracts."
    why_it_matters: "Supplier terms can drive cost, SLA, compliance, and concentration risk."
    suggested_source_or_request: "Executed contracts, SLA reports, reserve terms, pricing schedules, and incident history."
    priority: "medium"
  - gap_id: "G-006"
    chapter_id: "IV"
    section_id: "IV.A"
    missing_information: "Market share, competitive win/loss, seller multi-homing, app-ranking time series, and category-level pricing benchmarks."
    why_it_matters: "Whatnot's moat depends on relative seller/buyer liquidity, not just aggregate GMV."
    suggested_source_or_request: "Third-party app intelligence, category market reports, seller surveys, and internal competitive analyses."
    priority: "high"
  - gap_id: "G-007"
    chapter_id: "V"
    section_id: "V.A"
    missing_information: "CAC, channel mix, payback, seller acquisition funnel, buyer acquisition funnel, referral loops, and international launch economics."
    why_it_matters: "Growth quality depends on efficient acquisition and retention."
    suggested_source_or_request: "Marketing attribution exports, paid media spend, channel cohort reports, and country P&Ls."
    priority: "high"
  - gap_id: "G-008"
    chapter_id: "VI"
    section_id: "VI.A"
    missing_information: "R&D roadmap, uptime/SLOs, incident history, security audits, data architecture, product analytics, and engineering productivity."
    why_it_matters: "Live marketplace reliability and trust tooling are operationally critical."
    suggested_source_or_request: "Security reports, incident logs, roadmap, architecture diagrams, release metrics, and SLO dashboards."
    priority: "medium"
  - gap_id: "G-009"
    chapter_id: "VII"
    section_id: "VII.B"
    missing_information: "Official headcount, attrition, hiring plan, compensation, contractor mix, employee-relations matters, and international employment compliance."
    why_it_matters: "Rapid scaling can strain culture, compliance, and internal controls."
    suggested_source_or_request: "HRIS export, payroll reports, offer/attrition dashboards, employee handbooks, and employment counsel memos."
    priority: "medium"
  - gap_id: "G-010"
    chapter_id: "VIII"
    section_id: "VIII.A"
    missing_information: "Litigation schedule, regulatory inquiries, tax notices, privacy matters, payment-network correspondence, insurance, and counsel memos."
    why_it_matters: "Marketplace categories and jurisdictions create legal exposure not visible in policy pages."
    suggested_source_or_request: "Company counsel legal schedule, regulator correspondence, insurance binders, tax memos, and docket searches."
    priority: "high"
  - gap_id: "G-011"
    chapter_id: "VIII"
    section_id: "VIII.B"
    missing_information: "Official trademark/patent portfolio, IP assignments, takedown logs, counterfeit claims, and open-source inventory."
    why_it_matters: "Brand, authenticity, content, and IP enforcement are central to marketplace trust."
    suggested_source_or_request: "USPTO/EUIPO/WIPO pulls, IP schedule, invention assignments, DMCA logs, and open-source compliance report."
    priority: "medium"

