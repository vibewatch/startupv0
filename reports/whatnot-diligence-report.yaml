report_metadata:
  report_title: "Whatnot Startup Diligence Report"
  target_company: "Whatnot"
  website: "https://www.whatnot.com/"
  known_aliases:
    - "Whatnot Inc."
    - "Whatnot Europe Limited"
    - "Whatnot Australia Pty Limited"
  sector: "Live shopping marketplace, social commerce, and collectibles e-commerce"
  geography: "United States headquartered with public expansion signals in Canada, the United Kingdom, France, Germany, Ireland, Poland, and Australia"
  company_stage: "Private unicorn"
  research_date: "2026-05-16"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "America/Los_Angeles"

research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Selected Whatnot at random from a parsed public unicorn list after excluding slugs already present in reports."
    - "Prioritized company-owned product, seller, terms, policy, support, about, and professional-profile materials."
    - "Supplemented with independent funding coverage, accelerator and investor pages, market commentary, app-ranking pages, and trademark database records."
    - "Avoided blocked or inaccessible sources; Forbes returned a jurisdiction block, TechCrunch returned a block, and some search pages returned CAPTCHA or rate-limit responses."
  included_jurisdictions:
    - "United States"
    - "Canada where tax and expansion materials were public"
    - "United Kingdom and European Union where Whatnot Europe Limited terms apply"
    - "Australia where Whatnot Australia Pty Limited appears in terms"
  excluded_topics:
    - "Private data-room financial statements, monthly management accounts, payment-processor reports, bank statements, cash runway, current cap table, option plan, debt agreements, investor rights, and board minutes were not available."
    - "Non-public buyer or seller cohorts, seller concentration, dispute volumes, moderation queues, authentication vendor contracts, warehouse or logistics contracts, source code, security reports, and customer references were not accessed."
    - "Paid legal-docket, lien, tax, and insurance databases were not accessed; legal findings are limited to public policy materials and trademark database records."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Autonomous random-unicorn diligence request"
      type: "workflow_request"
      date_received: "2026-05-16"
      notes: "No founder deck, data-room export, management response, customer reference, or financial model was provided."

founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Whatnot is a private unicorn valued at approximately $11.5 billion after a 2025 Series F financing."
    claim_source: "Public unicorn list and independent funding coverage"
    claim_date: "2025-10-28"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.B"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-001", "EC-002"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request the Series F financing documents, share class, liquidation preference, investor-rights agreement, pro forma capitalization, and fully diluted option pool."
  - founder_claim_id: "FC-002"
    claim_text: "Whatnot is the largest live shopping marketplace in the United States, United Kingdom, Europe, North America, or Western markets depending on the company-owned page."
    claim_source: "Whatnot seller page, LinkedIn profile, and YC profile"
    claim_date: null
    mapped_chapter_ids: ["II", "III", "IV"]
    mapped_section_ids: ["II.A", "III.A", "IV.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-004", "EC-006", "EC-014", "EC-016", "EC-028"]
    contradiction_summary: "Company-owned and profile pages consistently claim leadership, but the exact geography and metric basis vary and independent market-share data was not public."
    diligence_follow_up:
      - "Request third-party GMV, active-buyer, active-seller, app-rank, retention, and market-share reports by region and category."
  - founder_claim_id: "FC-003"
    claim_text: "Whatnot exceeded multi-billion-dollar 2025 live-sales or GMV scale, with public sources citing more than $6 billion GMV in 2025 to date and a LinkedIn profile claiming more than $8 billion live sales in 2025."
    claim_source: "Independent funding coverage and Whatnot LinkedIn profile"
    claim_date: "2025-10-29"
    mapped_chapter_ids: ["I", "III", "V"]
    mapped_section_ids: ["I.A", "III.A", "V.B"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-004", "EC-016"]
    contradiction_summary: "The public sources support scale, but GMV/live-sales definitions, period cutoffs, gross-to-net adjustments, cancellations, returns, and take-rate translation to revenue are not public."
    diligence_follow_up:
      - "Request monthly GMV, net revenue, take rate, refund rate, cancellation rate, chargeback rate, cohort retention, and reconciliation to audited financial statements."
  - founder_claim_id: "FC-004"
    claim_text: "Whatnot sellers can monetize through a live-shopping marketplace with integrated payments, shipping, seller tools, and published fee terms."
    claim_source: "Whatnot seller page and terms of service"
    claim_date: null
    mapped_chapter_ids: ["II", "V"]
    mapped_section_ids: ["II.B", "V.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-005", "EC-006", "EC-011", "EC-025", "EC-026"]
    contradiction_summary: "Product, fee, payment, and fulfillment mechanics are public, but realized seller earnings, concentration, CAC, seller churn, and payout economics require private data."
    diligence_follow_up:
      - "Request seller cohort P&Ls, active-seller counts, seller GMV distribution, fee schedule history, payout aging, shipping economics, and category-level gross margin."
  - founder_claim_id: "FC-005"
    claim_text: "Whatnot has trust-and-safety policies for buyer protection, prohibited items, counterfeit goods, intellectual property, seller conduct, and shipping."
    claim_source: "Whatnot Help Center policies and terms"
    claim_date: null
    mapped_chapter_ids: ["II", "III", "VIII"]
    mapped_section_ids: ["II.B", "III.A", "VIII.A"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-008", "EC-009", "EC-010", "EC-024", "EC-026"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request enforcement metrics, counterfeit incident counts, authentication vendor contracts, refund-loss reserve policy, repeat-offender statistics, and regulatory complaint logs."
  - founder_claim_id: "FC-006"
    claim_text: "Whatnot was founded in 2019 by Grant LaFontaine and Logan Head and participated in Y Combinator Winter 2020."
    claim_source: "Y Combinator profile and public unicorn list"
    claim_date: null
    mapped_chapter_ids: ["VII"]
    mapped_section_ids: ["VII.A"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-014", "EC-001"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request current founder roles, vesting status, employment agreements, invention-assignment agreements, board composition, and key-person risk assessment."

executive_summary:
  overall_assessment: "Whatnot appears to be a fast-scaling private live-shopping marketplace with strong public financing validation, multi-billion-dollar GMV claims, a broad category surface, and a substantial trust-and-safety policy stack. The public record does not verify revenue quality, take rate, cohort durability, buyer and seller concentration, loss reserves, or unit economics, so the diligence stance should remain evidence-positive but data-room dependent."
  investment_or_diligence_thesis: "The core diligence question is whether Whatnot can translate live-commerce engagement into durable, high-margin marketplace revenue while controlling counterfeit, refund, shipping, regulatory, and competitive risks across collectible and high-value categories."
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "Independent funding coverage and public unicorn data support the $11.5 billion valuation and 2025 Series F financing."
      evidence_claim_ids: ["EC-001", "EC-002"]
    - founder_claim_id: "FC-006"
      summary: "YC and public unicorn data support the 2019 founding history and Grant LaFontaine / Logan Head founder attribution."
      evidence_claim_ids: ["EC-014", "EC-001"]
    - founder_claim_id: "FC-005"
      summary: "Company-owned policies substantiate the existence of buyer-protection, counterfeit, IP, prohibited-items, seller conduct, tax, payment, and shipping rules."
      evidence_claim_ids: ["EC-008", "EC-009", "EC-010", "EC-024", "EC-026"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "The $11.5 billion valuation is public, but revenue, take rate, gross margin, burn, runway, and audit quality are not publicly verifiable."
    - risk_id: "R-002"
      summary: "Marketplace integrity is central: counterfeit, inaccurate descriptions, refund disputes, prohibited items, and seller nonperformance can damage trust and economics."
    - risk_id: "R-003"
      summary: "Competition from incumbent marketplaces, social platforms, and short-video commerce may pressure growth, seller acquisition, and take rate."
  key_evidence_gaps:
    - "Audited or reviewed financial statements, monthly management accounts, revenue-recognition policy, GMV-to-revenue bridge, cash balance, burn rate, and runway."
    - "Current fully diluted capitalization, security classes, liquidation preferences, option plan, debt, secondary/tender terms, and investor rights."
    - "Buyer and seller cohorts, retention, churn, category concentration, geographic mix, refund/counterfeit rates, chargeback losses, and trust-and-safety staffing."
    - "Legal docket review, regulatory inquiries, insurance coverage, tax nexus positions, data-protection records, and authentication-vendor contracts."
  recommended_next_steps:
    - "Run a data-room review focused on financial quality, cohort retention, take rate, refunds, chargebacks, category mix, and loss reserves."
    - "Interview top sellers, mid-tail sellers, recent churned sellers, repeat buyers, payment processors, logistics vendors, and authentication partners."
    - "Request legal, tax, privacy, IP, trust-and-safety, insurance, and regulatory schedules from counsel."
    - "Benchmark Whatnot against eBay Live, TikTok Shop, Amazon live/social commerce, Fanatics Collect, livestream tools, and category-specific marketplaces."

chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: "Public sources verify several financing and valuation anchors and indicate substantial GMV scale, but they do not verify GAAP revenue, contribution margin, burn, cash balance, runway, audited financials, or investor-rights economics."
    founder_claim_ids: ["FC-001", "FC-003"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-003", "EC-004", "EC-017"]
    risk_ids: ["R-001", "R-007"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3"]
        summary: "Whatnot's public record contains GMV and live-sales claims, not full financial statements. Treat GMV scale as partially verified and all revenue, margin, cash, burn, and runway metrics as not publicly verifiable."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.A-F1"
            finding: "Independent and company-profile sources point to multi-billion-dollar 2025 marketplace scale, but the GMV/live-sales definitions and period cutoffs are not reconciled."
            evidence_claim_ids: ["EC-004", "EC-016"]
            risk_ids: ["R-001"]
          - finding_id: "I.A-F2"
            finding: "No audited financial statements, quarterly financials, net revenue, gross margin, EBITDA, cash, burn, or runway were found in public sources reviewed."
            evidence_claim_ids: ["EC-017"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "GMV can overstate economic quality if refunds, cancellations, seller subsidies, coupons, shipping losses, fraud, chargebacks, or authentication costs are material."
          - "Large tender offers and rapid valuation increases can mask employee-liquidity pressure or secondary-pricing complexity."
        evidence_gaps:
          - "Audited financials, management accounts, revenue-recognition memo, GMV-to-net-revenue reconciliation, take-rate history, contribution-margin bridge, refund reserve, and chargeback loss history."
        follow_up_questions:
          - "What were 2023, 2024, and year-to-date 2025 gross GMV, net GMV, net revenue, gross profit, contribution profit, EBITDA, free cash flow, cash balance, and runway?"
        table_ids: ["T-003"]
        figure_ids: ["F-002"]
        evidence_claim_ids: ["EC-004", "EC-016", "EC-017"]
      - section_id: "I.B"
        title: "Financings, capitalization, and ownership"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.C.1"]
        summary: "Public reporting verifies a major 2025 Series F and multiple named investor groups, but the actual capitalization, preference stack, pro rata rights, debt, and fully diluted ownership are private."
        verification_status: "partially_verified"
        confidence: "high"
        key_findings:
          - finding_id: "I.B-F1"
            finding: "Crunchbase News reported a $225 million Series F at an $11.5 billion valuation, co-led by DST Global and CapitalG, with total funding near $968 million."
            evidence_claim_ids: ["EC-002"]
            risk_ids: ["R-001"]
          - finding_id: "I.B-F2"
            finding: "Independent reporting also described a January 2025 Series E of $265 million at nearly $5 billion and a tender offer of up to $126 million."
            evidence_claim_ids: ["EC-003"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "Preference terms, secondary-sale terms, ratchets, protective provisions, and option-pool expansion could materially alter common-equity value."
        evidence_gaps:
          - "Current cap table, stock ledger, SAFEs/notes, debt, warrants, option plan, investor-rights agreements, voting agreements, ROFR/co-sale rights, and board consents."
        follow_up_questions:
          - "Which securities were issued in each financing, and what liquidation preferences, conversion rights, information rights, anti-dilution rights, and board rights attach?"
        table_ids: ["T-001", "T-002"]
        figure_ids: ["F-001"]
        evidence_claim_ids: ["EC-001", "EC-002", "EC-003", "EC-015"]
  - chapter_id: "II"
    title: "Products"
    chapter_summary: "Whatnot publicly presents a live-shopping marketplace that combines creator-led streams, marketplace listings, payments, shipping, seller tools, buyer protection, and category-specific rules. Product claims are plausible and supported by company sources, but reliability, attach rates, moderation effectiveness, and unit costs are private."
    founder_claim_ids: ["FC-002", "FC-004", "FC-005"]
    evidence_claim_ids: ["EC-005", "EC-006", "EC-007", "EC-008", "EC-010", "EC-011"]
    risk_ids: ["R-002", "R-005"]
    sections:
      - section_id: "II.A"
        title: "Current products and user value proposition"
        checklist_question_ids: ["II.A.1", "II.A.2", "II.A.3"]
        summary: "The product is a mobile and web marketplace where sellers run live shopping shows and buyers transact across many categories. Public pages emphasize livestream discovery, 50-plus categories, seller tools, integrated payments, and integrated shipping."
        verification_status: "verified"
        confidence: "medium"
        key_findings:
          - finding_id: "II.A-F1"
            finding: "Whatnot's seller page describes more than 50 categories, integrated payments and shipping, and seller monetization features."
            evidence_claim_ids: ["EC-005", "EC-006"]
            risk_ids: ["R-005"]
          - finding_id: "II.A-F2"
            finding: "The terms define Whatnot as a platform that facilitates transactions between buyers and sellers rather than as a principal merchant for most transactions."
            evidence_claim_ids: ["EC-011"]
            risk_ids: ["R-004"]
        hidden_risks:
          - "A marketplace/product design that depends on live hosts can concentrate GMV in top sellers or categories."
          - "Feature breadth across live video, payments, shipping, dispute handling, seller support, authentication, and category compliance increases operational complexity."
        evidence_gaps:
          - "Product uptime, stream quality, buyer conversion, seller activation, repeat purchase, search/discovery metrics, dispute-resolution SLAs, and product-roadmap evidence."
        follow_up_questions:
          - "What product surfaces drive GMV by category, and how do live streams, replays, marketplace listings, promotions, and seller tools affect conversion and retention?"
        table_ids: ["T-004"]
        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-005", "EC-006", "EC-011"]
      - section_id: "II.B"
        title: "Pricing, economics, trust controls, and dependencies"
        checklist_question_ids: ["II.B.1", "II.B.2", "II.C.1"]
        summary: "Public fee terms and seller obligations support a marketplace revenue model, but payout timing, refund exposure, shipping label economics, payment-processor costs, moderation costs, and category-specific authentication costs need private validation."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "II.B-F1"
            finding: "The seller page discloses an 8% commission plus 2.9% and $0.30 processing fee, and says payouts can arrive 48 to 72 hours after delivery."
            evidence_claim_ids: ["EC-005"]
            risk_ids: ["R-001", "R-005"]
          - finding_id: "II.B-F2"
            finding: "Terms and policy pages impose seller obligations around item descriptions, fulfillment, counterfeit items, prohibited items, refunds, and payment-processor compliance."
            evidence_claim_ids: ["EC-007", "EC-008", "EC-009", "EC-010", "EC-011"]
            risk_ids: ["R-002", "R-004"]
        hidden_risks:
          - "Marketplace fee take rate may be offset by buyer protection, refunds, returns, chargebacks, shipping subsidies, payment processing, fraud, and moderation expense."
          - "Trust controls are only as effective as enforcement capacity, category expertise, and authentication vendor coverage."
        evidence_gaps:
          - "Actual take rate, seller-fee exemptions, coupon/subsidy spend, processing-cost rates, refund/return losses, authentication costs, and seller support costs."
        follow_up_questions:
          - "How does net revenue per GMV dollar vary by category, geography, seller tier, and payment method after refunds, promotions, shipping, and fraud losses?"
        table_ids: ["T-005", "T-006"]
        figure_ids: []
        evidence_claim_ids: ["EC-005", "EC-007", "EC-008", "EC-009", "EC-010", "EC-011"]
  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: "Public evidence supports a two-sided marketplace serving sellers and buyers across collectibles, fashion, beauty, electronics, and other categories. However, buyer/seller concentration, retention by cohort, churn, net revenue retention, category mix, and named top customers are not public."
    founder_claim_ids: ["FC-002", "FC-003", "FC-005"]
    evidence_claim_ids: ["EC-004", "EC-005", "EC-006", "EC-008", "EC-016", "EC-018", "EC-027"]
    risk_ids: ["R-002", "R-005", "R-007"]
    sections:
      - section_id: "III.A"
        title: "Buyers, sellers, customers, and concentration"
        checklist_question_ids: ["III.A.1", "III.A.2", "III.B.1"]
        summary: "Whatnot has public claims of millions of daily users, more than 20 million accounts created in the prior year, and large 2025 live-sales scale, but named customer or seller concentration is not disclosed."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.A-F1"
            finding: "The seller page describes average seller earnings and higher transaction frequency, while LinkedIn claims millions of daily users and 20 million accounts created in the prior year."
            evidence_claim_ids: ["EC-005", "EC-016"]
            risk_ids: ["R-007"]
          - finding_id: "III.A-F2"
            finding: "Buyer protection and seller policies indicate that transaction quality, shipping speed, authenticity, and dispute resolution are core to customer trust."
            evidence_claim_ids: ["EC-008", "EC-010", "EC-026"]
            risk_ids: ["R-002", "R-005"]
        hidden_risks:
          - "Marketplace liquidity may depend on a small number of high-GMV sellers, celebrity hosts, or categories."
          - "Buyer retention and seller retention could be sensitive to app ranking, social-commerce trends, counterfeit incidents, and refund experience."
        evidence_gaps:
          - "Top buyer and seller concentration, category mix, cohort retention, churn, repeat purchase, CAC/LTV, NPS, disputes by cohort, and seller economics by decile."
        follow_up_questions:
          - "What percentage of GMV and net revenue is attributable to the top 10, top 100, and top 1,000 sellers and buyers?"
        table_ids: ["T-007"]
        figure_ids: ["F-004"]
        evidence_claim_ids: ["EC-004", "EC-005", "EC-008", "EC-016", "EC-018"]
      - section_id: "III.B"
        title: "Strategic relationships, partners, suppliers, and dependencies"
        checklist_question_ids: ["III.E.1", "III.E.2", "III.F.1"]
        summary: "Public materials identify dependencies on payment processors, shipping carriers or label providers, app stores, user-generated sellers, and trust/authentication processes, but contract terms and supplier concentration are private."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.B-F1"
            finding: "Terms state that Whatnot uses third-party payment processors and that users must comply with those processors' separate terms."
            evidence_claim_ids: ["EC-011"]
            risk_ids: ["R-004", "R-007"]
          - finding_id: "III.B-F2"
            finding: "Shipping policies and seller terms show seller fulfillment is operationally important and can trigger refunds, penalties, or account consequences."
            evidence_claim_ids: ["EC-007", "EC-026"]
            risk_ids: ["R-005"]
        hidden_risks:
          - "Payment-processor, card-network, carrier, authentication-provider, and app-store changes could affect cost, payout timing, fraud exposure, or distribution."
        evidence_gaps:
          - "Executed processor agreements, carrier agreements, authentication-vendor agreements, cloud/infrastructure contracts, app-store dependency analysis, and service-level histories."
        follow_up_questions:
          - "Which third-party providers are material to payment acceptance, payouts, shipping labels, notifications, video streaming, search/recommendation, moderation, and authentication?"
        table_ids: ["T-008"]
        figure_ids: []
        evidence_claim_ids: ["EC-007", "EC-011", "EC-026"]
  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: "Whatnot competes at the intersection of live shopping, social commerce, collectible marketplaces, resale marketplaces, category specialists, and creator-led commerce. Public sources support the market opportunity but not sustainable market share, CAC, seller exclusivity, or defensibility."
    founder_claim_ids: ["FC-002"]
    evidence_claim_ids: ["EC-015", "EC-019", "EC-020", "EC-028"]
    risk_ids: ["R-003"]
    sections:
      - section_id: "IV.A"
        title: "Competitive landscape and market positioning"
        checklist_question_ids: ["IV.A.1", "IV.A.2", "IV.B.1"]
        summary: "Independent funding coverage names eBay Live and TikTok Shop as competitive references, while market commentary frames live commerce as a large but still-developing Western-market format."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "IV.A-F1"
            finding: "Crunchbase News described Whatnot as competing with eBay Live and TikTok Shop."
            evidence_claim_ids: ["EC-019"]
            risk_ids: ["R-003"]
          - finding_id: "IV.A-F2"
            finding: "a16z's 2021 investment note argued live shopping had reached large scale in China and that the U.S. live-shopping market could support multiple platforms."
            evidence_claim_ids: ["EC-020"]
            risk_ids: ["R-003"]
        hidden_risks:
          - "Large platforms may subsidize creators, embed live shopping in existing social graphs, lower seller friction, or compress take rates."
          - "Category-specific incumbents can retain trust advantages in sneakers, cards, luxury goods, comics, and collectibles."
        evidence_gaps:
          - "Market-share data by category and region, paid CAC benchmarks, seller acquisition costs, exclusivity terms, creator churn, and category-level competitive win/loss data."
        follow_up_questions:
          - "How does Whatnot's retention, take rate, buyer frequency, seller earnings, refund rate, and GMV growth compare with eBay, TikTok Shop, Amazon, Fanatics Collect, StockX, GOAT, and category-specific marketplaces?"
        table_ids: ["T-009"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-019", "EC-020", "EC-028"]
      - section_id: "IV.B"
        title: "Basis of competition and differentiation"
        checklist_question_ids: ["IV.C.1", "IV.C.2"]
        summary: "Whatnot's claimed differentiation is live, community-led commerce with marketplace tools and seller monetization. Public evidence does not prove durable network effects or exclusive supply."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "IV.B-F1"
            finding: "The a16z investment note emphasized entertainment, discovery, connection, and repeat seller followings as differentiators from transactional e-commerce."
            evidence_claim_ids: ["EC-015", "EC-020"]
            risk_ids: ["R-003"]
          - finding_id: "IV.B-F2"
            finding: "Whatnot's seller page claims sellers see 10x more transactions than other peer-to-peer marketplaces, but the benchmark and methodology are not public."
            evidence_claim_ids: ["EC-005"]
            risk_ids: ["R-003"]
        hidden_risks:
          - "If seller earnings are concentrated or subsidized, seller acquisition may become more expensive as competitors imitate live formats."
        evidence_gaps:
          - "Seller cohort economics, creator acquisition funnel, exclusivity or non-circumvention enforcement, referral loops, category-level liquidity, and transaction-frequency methodology."
        follow_up_questions:
          - "What repeatable network effects does Whatnot measure, and how are they protected from multi-homing by top sellers and buyers?"
        table_ids: ["T-010"]
        figure_ids: []
        evidence_claim_ids: ["EC-005", "EC-015", "EC-020"]
  - chapter_id: "V"
    title: "Marketing, Sales, and Distribution"
    chapter_summary: "Whatnot's distribution appears to combine app-store discovery, creator/seller acquisition, category communities, international expansion, PR from funding rounds, and product-led seller tools. Channel mix and CAC are not public."
    founder_claim_ids: ["FC-003", "FC-004"]
    evidence_claim_ids: ["EC-005", "EC-016", "EC-027", "EC-028"]
    risk_ids: ["R-003", "R-007"]
    sections:
      - section_id: "V.A"
        title: "Distribution channels and go-to-market motion"
        checklist_question_ids: ["V.A.1", "V.A.2", "V.B.1"]
        summary: "The company markets to sellers through direct seller pages and relies on creators, category communities, app-store distribution, and marketplace liquidity to attract buyers."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "V.A-F1"
            finding: "Whatnot's seller page is explicit about seller onboarding, fees, payouts, seller earnings, and tools, indicating a seller-led acquisition motion."
            evidence_claim_ids: ["EC-005"]
            risk_ids: ["R-007"]
          - finding_id: "V.A-F2"
            finding: "Tech Funding News reported expansion into Canada, the United Kingdom, France, and Germany."
            evidence_claim_ids: ["EC-027"]
            risk_ids: ["R-003", "R-004"]
        hidden_risks:
          - "International growth can increase tax, consumer-protection, prohibited-item, shipping, payments, privacy, and language-localization complexity."
          - "Creator-led growth can be volatile if top sellers multi-home or if acquisition depends on paid incentives."
        evidence_gaps:
