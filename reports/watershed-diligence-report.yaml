    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-019
      - EC-020
      - EC-021
    risk_ids:
      - R-005
      - R-006
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public materials describe Measure, Report, Act, Product Footprints, CEDA, disclosure workflows and marketplace capabilities. Customer stories show applications, but market share, profitability, roadmap adoption and technical performance are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Platform pages verify the public product modules and data/methodology claims.
            evidence_claim_ids:
              - EC-007
              - EC-008
            risk_ids:
              - R-006
          - finding_id: II.A-F2
            finding: Customer stories support product use cases in beauty, medtech, apparel and design/supply-chain contexts.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-003
          - finding_id: II.A-F3
            finding: Product Footprints and CEDA are visible differentiation claims requiring technical review.
            evidence_claim_ids:
              - EC-019
              - EC-020
            risk_ids:
              - R-006
        hidden_risks:
          - AI data cleaning and emissions-factor mapping create accuracy and explainability risk.
          - Product breadth could require significant services/support, affecting margins.
        evidence_gaps:
          - Module-level ARR, adoption, churn, gross margin, roadmap timing, customer usage and technical validation.
        follow_up_questions:
          - Provide product demos, architecture, roadmap, module ARR, product gross margin and customer usage cohorts.
          - Provide methodology and assurance materials for CEDA, emissions factors and AI outputs.
        table_ids:
          - T-003
          - T-004
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-012
          - EC-019
          - EC-020
          - EC-021
  - chapter_id: III
    title: Customer Information
    chapter_summary: Watershed shows strong public customer traction signals including named enterprise customers, 60 Fortune 500 customers per Business Insider, 479M tonnes CO2e under management and multiple public case studies. Revenue by customer, concentration, churn and supplier dependencies remain private.
    founder_claim_ids:
