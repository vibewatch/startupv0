risk_register:
  - risk_id: R-001
    risk_title: Financial scale, retention and margin are private
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public sources do not disclose audited financial statements, ARR, bookings, gross margin, cash burn, CAC/payback, NRR, churn or customer concentration.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
      - V.D
    evidence_claim_ids:
      - EC-010
    mitigation_or_diligence_request: Require audited/management accounts, ARR bridge, bookings, cohorts, gross margin, cash/debt, plan-vs-actuals and sales efficiency analyses.
  - risk_id: R-002
    risk_title: Headline valuation may hide financing preference and dilution risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $1.8B valuation is public, but cap table, liquidation preferences, conversion terms, secondary transactions, option pool and current 409A are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-004
      - EC-023
    mitigation_or_diligence_request: Review financing documents, pro forma capitalization, investor side letters, liquidation waterfall and current fair-value support.
  - risk_id: R-003
    risk_title: Customer-logo evidence is strong but commercial quality is unverified
    risk_category: customer
    severity: medium
    likelihood: medium
    description: Public case studies show named customers and outcomes, but not contract size, renewal health, concentration, implementation burden or reference quality.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-009
      - EC-011
      - EC-012
      - EC-022
    mitigation_or_diligence_request: Request top-customer schedule, signed contracts, churn/NRR cohorts, customer reference calls and implementation/post-sale economics.
  - risk_id: R-004
    risk_title: Competitive pressure from horizontal and specialist sustainability platforms
    risk_category: market
    severity: high
    likelihood: high
    description: Business Insider identifies Salesforce and Microsoft as key competitors, and public product pages show overlapping offerings from Microsoft, Salesforce, Sweep and Workiva.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-010
      - EC-024
    mitigation_or_diligence_request: Run win/loss, pricing, feature parity, analyst, renewal and channel diligence against direct and suite competitors.
  - risk_id: R-005
    risk_title: Regulatory-demand timing and rule changes could alter buying urgency
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Watershed benefits from CSRD, California and disclosure mandates, but climate-reporting rules are politically and legally dynamic.
    impacted_chapter_ids:
      - II
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - V.A
      - VIII.C
    evidence_claim_ids:
      - EC-021
    mitigation_or_diligence_request: Map customer pipeline to mandatory compliance dates and stress-test demand if regulations are delayed, narrowed or litigated.
  - risk_id: R-006
    risk_title: Methodology, AI and data quality are central product-risk areas
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Watershed’s value proposition depends on emissions factors, CEDA, AI data cleaning, mapping logic and third-party assurance, but public pages do not expose validation evidence.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids:
      - EC-008
      - EC-019
      - EC-020
    mitigation_or_diligence_request: Conduct technical review of data lineage, model governance, factor sources, QA, assurance exceptions, explainability, roadmap and customer audit outcomes.
  - risk_id: R-007
    risk_title: Security/privacy artifacts and platform terms are not fully public
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Trust center lists SOC/ISO/privacy controls, but reports, DPA, subprocessor list, incident history, insurance and enterprise contract obligations were not reviewed.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.E
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-015
      - EC-016
      - EC-017
    mitigation_or_diligence_request: Request SOC reports, ISO certificate, pen test, DPA, MSA, subprocessor list, data residency choices, incident logs and cyber insurance.
  - risk_id: R-008
    risk_title: Trademark and IP chain should be confirmed by counsel
    risk_category: legal
    severity: low
    likelihood: unknown
    description: An unofficial trademark mirror reports one 2023 WATERSHED application as abandoned; this may be harmless but requires official USPTO review and assignment confirmation.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.D
    evidence_claim_ids:
      - EC-025
    mitigation_or_diligence_request: Have IP counsel pull official USPTO/TSDR records, assignments, registered marks, open applications, domain assets, licenses and infringement searches.
  - risk_id: R-009
    risk_title: Rapid international scaling can create execution and personnel risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Watershed states nearly 400 employees and offices across seven cities with hiring across functions and geographies, but org depth, attrition and local compliance are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.G
    evidence_claim_ids:
      - EC-009
      - EC-018
    mitigation_or_diligence_request: Review HRIS, attrition, hiring plan, local employment compliance, management layers, productivity and integration of Mexico City/Europe expansion.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, ARR/bookings, gross margin, cash/debt, backlog and plan-vs-actuals.
    why_it_matters: Determines whether valuation is supported by durable growth and efficient SaaS economics.
    suggested_source_or_request: Request financial statements, monthly management accounts, ARR bridge, cohort retention and cash/debt schedule.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, preferences, option pool, investor rights and liquidation waterfall.
    why_it_matters: Headline post-money valuation may not reflect common-equity economics or future dilution.
    suggested_source_or_request: Request financing documents, pro forma cap table, 409A history and liquidation waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, concentration, renewal status, churn, NRR and customer health.
    why_it_matters: Public logos do not prove revenue quality or durability.
    suggested_source_or_request: Request top-customer schedule, cohorts, contracts and independent references.
    priority: high
  - gap_id: G-004
    chapter_id: VI
    section_id: VI.A
    missing_information: Methodology, data lineage, AI governance, assurance reports and technical architecture.
    why_it_matters: Accuracy and auditability are central to customer trust and regulatory workflows.
    suggested_source_or_request: Request architecture diagrams, model governance, factor provenance, assurance reports and incident logs.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.F
    missing_information: MSA/DPA, subprocessor list, security artifacts, litigation schedule, IP/trademark official records and insurance.
    why_it_matters: Enterprise SaaS risk concentrates in privacy/security, contracts, IP and claims exposure.
    suggested_source_or_request: Counsel/security review of contracts, SOC/ISO reports, official USPTO records, docket searches and insurance.
    priority: high
