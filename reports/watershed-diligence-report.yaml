executive_summary:
  overall_assessment: "Watershed passes the public eligibility screen for a private unicorn diligence report: no existing Watershed report was present, SEC/company/market sources support a private enterprise sustainability platform with 2024 Series C financing and $1.8B public valuation. Public evidence is strong on product/category, funding, named customers, partnerships, team scale and trust-center artifacts, but insufficient on financial quality, retention, margins, cap table, contracts, security report contents, legal matters and customer economics."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A credible thesis would depend on proving durable ARR growth, high retention, enterprise-scale gross margins, defensible methodology/data assets, regulatory-resilient demand, low services drag, strong security/privacy posture and clean financing/legal/IP terms behind the headline valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public SEC, company, CB Insights and independent sources support Watershed private-unicorn eligibility and the 2024 financing event.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-004
        - EC-005
        - EC-023
    - founder_claim_id: FC-002
      summary: Watershed publicly operates a sustainability AI platform with measurement, reporting, action, CEDA and Product Footprints capabilities.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-019
        - EC-020
    - founder_claim_id: FC-003
      summary: Named customer and scale signals include major enterprises, customer stories, 479M tonnes CO2e under management and 60 Fortune 500 customers as reported by Business Insider.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, ARR, retention, margin, cash burn and sales efficiency are private.
    - risk_id: R-002
      summary: Headline valuation lacks cap table, preferences and liquidation-waterfall support.
    - risk_id: R-004
      summary: Competition from Microsoft, Salesforce, Workiva, Sweep and other carbon/ESG platforms is significant.
    - risk_id: R-006
      summary: Methodology, AI and data quality claims are central but unproven without technical and assurance materials.
    - risk_id: R-007
      summary: Trust/security artifacts are public at summary level but detailed reports and platform terms are gated.
  key_evidence_gaps:
    - Audited financials, monthly management accounts, ARR/bookings, gross margin, cash/debt, backlog, AR aging and plan-vs-actuals.
    - Cap table, option pool, liquidation preferences, debt/warrants/notes, side letters and current valuation support.
    - Top-customer ARR, contracts, renewal/churn/NRR cohorts, implementation economics and independent references.
    - Product architecture, emissions-factor methodology, CEDA/data-license chain, AI governance, assurance exceptions and incident history.
    - SOC/ISO artifacts, MSA/DPA/subprocessors, litigation schedule, insurance, IP counsel review and official USPTO/TSDR records.
  recommended_next_steps:
    - Open confirmatory financial and revenue-quality diligence before relying on the $1.8B headline valuation.
    - Run customer and product diligence focused on retention, implementation burden, gross margin, methodology accuracy and competitive displacement.
    - Have counsel/security specialists review contracts, privacy/security artifacts, IP/trademarks, regulatory claims and litigation/insurance schedules.
    - Benchmark Watershed against Microsoft, Salesforce, Workiva, Sweep, Persefoni and other carbon-management vendors through win/loss and buyer references.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: "Watershed is eligible for a diligence report: public evidence supports private unicorn status through a 2022 $1B Series B marker, a 2024 $1.8B Series C announcement and a 2024 SEC Form D for roughly $100.46M sold. Core financial statements, ARR, margins, cash, debt and cap table terms remain private."
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-023
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financials, management accounts, backlog, AR aging or product/geography gross profit data are public. Public evidence is limited to financing, customer and founder-reported revenue momentum signals.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Business Insider reports January 2025 was Watershed’s best new-revenue month but no figure was disclosed.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Public customer stories and logos do not disclose revenue by product, channel, geography or backlog.
            evidence_claim_ids:
              - EC-011
              - EC-012
            risk_ids:
              - R-003
        hidden_risks:
          - Possible services-heavy implementation model could depress gross margin.
          - Regulatory deadline-driven work may create uneven quarterly bookings.
        evidence_gaps:
          - Audited financials, management accounts, plan-vs-actuals, backlog, AR aging and gross margin by product/channel/geography.
        follow_up_questions:
          - Provide FY2023-FY2026 YTD financial statements and monthly management package.
          - Provide ARR/bookings bridge and gross margin by module and services.
        table_ids:
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-010
          - EC-011
          - EC-012
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources show demand drivers such as CSRD/California disclosures, enterprise customers and Europe expansion, but no forecast, budget, capital expenditure or working-capital assumptions are public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: ESG Today and Watershed connect growth to emissions measurement, sustainability reporting, decarbonization and Europe/regulatory demand.
            evidence_claim_ids:
              - EC-005
              - EC-021
            risk_ids:
              - R-005
          - finding_id: I.B-F2
            finding: The 2024 round provides growth capital but no forecast model or burn runway.
            evidence_claim_ids:
              - EC-002
              - EC-003
            risk_ids:
              - R-002
        hidden_risks:
          - Projection sensitivity to changing climate-reporting rules is material.
          - Hiring and international expansion may increase burn before ARR conversion.
        evidence_gaps:
          - Quarterly model, growth drivers, pricing assumptions, foreign operations risk, capex, depreciation and financing assumptions.
        follow_up_questions:
          - Provide three-year quarterly forecast with ARR, bookings, churn, gross margin, opex, cash runway and scenario analysis.
          - Tie pipeline to regulatory deadlines and country-level expansion plans.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-005
          - EC-021
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Capital structure is only partially visible through financing announcements and the Form D. Shares, preferences, debt, options, warrants and off-balance-sheet obligations are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Form D verifies a 2024 equity offering with $100.456M sold and 12 investors.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: Company and independent sources report a $1.8B Series C valuation led by Greenoaks with major existing investors participating.
            evidence_claim_ids:
              - EC-003
              - EC-005
              - EC-023
            risk_ids:
              - R-002
        hidden_risks:
          - Preference stack could make headline valuation less relevant to common-equity economics.
          - Secondary sales or side letters may alter incentives and governance.
        evidence_gaps:
          - Current shares, stockholder list, options/warrants/notes, debt terms, off-balance-sheet liabilities and liquidation waterfall.
        follow_up_questions:
          - Provide fully diluted cap table, financing documents, investor rights, option plan and 409A history.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-005
          - EC-023
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history is sufficient to support report eligibility, but tax positions, revenue recognition, accounting policies and financing economics are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Series B and Series C chronology is public and cross-supported by company, SEC, CB Insights and independent sources.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-004
              - EC-006
              - EC-023
            risk_ids:
              - R-002
          - finding_id: I.D-F2
            finding: Accounting policies, revenue recognition and tax attributes are not disclosed.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-001
        hidden_risks:
          - Usage-based, services or marketplace components could complicate revenue recognition.
          - International entities may introduce tax and transfer-pricing complexity.
        evidence_gaps:
          - Tax positions, NOLs, revenue recognition policy, financing history, investor economics and current valuation support.
        follow_up_questions:
          - Request accounting memo for SaaS/services/marketplace revenue and tax/NOL schedule.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-006
          - EC-010
          - EC-023
  - chapter_id: II
    title: Products
    chapter_summary: Watershed publicly offers an enterprise sustainability AI platform spanning measurement, reporting, decarbonization actions, CEDA data, Product Footprints, disclosure workflows and marketplace/ecosystem offerings. Product existence is well evidenced; technical quality, adoption by module and economics require diligence.
    founder_claim_ids:
