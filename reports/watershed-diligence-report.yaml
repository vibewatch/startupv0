        key_findings:
          - finding_id: VIII.E-F1
            finding: Trust Center controls show backups, replication, access controls and DR controls.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-007
        hidden_risks:
          - Cyber, E&O and regulatory reporting errors could create material exposure.
          - Insurance exclusions or low limits could impair enterprise contracts.
        evidence_gaps:
          - Insurance certificates, claims history, cyber/E&O/D&O policies and customer insurance requirements.
        follow_up_questions:
          - Request insurance schedule and claims history.
        table_ids:
          - T-015
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-015
          - EC-016
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material customer, partner, supplier and platform contracts are not public. Privacy policy states platform data terms are separate, making MSA/DPA review essential.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.F-F1
            finding: Privacy policy separates website privacy from platform processing terms.
            evidence_claim_ids:
              - EC-017
            risk_ids:
              - R-007
          - finding_id: VIII.F-F2
            finding: Partnership and customer materials show material relationships but not contract terms.
            evidence_claim_ids:
              - EC-013
              - EC-014
            risk_ids:
              - R-003
        hidden_risks:
          - Unknown liability caps, indemnities, SLAs, data-use rights, partner termination rights and revenue-share obligations.
          - Marketplace and data-license contracts may carry quality and supply risk.
        evidence_gaps:
          - Top customer MSAs, DPAs, partner agreements, supplier/data licenses, marketplace contracts and standard terms.
        follow_up_questions:
          - Request contract matrix and copies of material customer/partner/supplier agreements.
        table_ids:
          - T-015
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-013
          - EC-014
          - EC-017
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No public regulatory enforcement issues were identified, but the workstream did not include comprehensive regulatory-agency searches. Trust Center lists SOC/ISO/GDPR/CCPA posture and product pages target regulated disclosure workflows.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: Trust Center lists SOC 2, ISO 27001:2022, GDPR and CCPA.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-007
          - finding_id: VIII.G-F2
            finding: California and other framework pages support regulatory relevance but not regulatory approval.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-005
        hidden_risks:
          - Privacy, security or climate-reporting claims could attract scrutiny if outputs are inaccurate.
          - Gated security artifacts may contain exceptions.
        evidence_gaps:
          - Regulatory correspondence, privacy/security incidents, audit reports, SOC/ISO exceptions and product legal review.
        follow_up_questions:
          - Request regulatory-agency correspondence schedule and security/privacy compliance review.
        table_ids:
          - T-015
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-015
          - EC-016
          - EC-021
