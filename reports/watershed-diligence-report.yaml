report_metadata:
  report_title: Watershed Startup Diligence Report
  target_company: Watershed
  website: https://watershed.com/
  known_aliases:
    - Watershed
    - Watershed Technology, Inc.
    - Act, Inc.
  sector: Enterprise sustainability software, carbon accounting, ESG disclosure and decarbonization workflow automation
  geography: United States headquartered; global enterprise customers; offices publicly listed in San Francisco, London, New York, Sydney, Paris, Berlin and Mexico City
  company_stage: Private unicorn / growth-stage enterprise SaaS and sustainability data platform
  research_date: 2026-05-29
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Performed an eligibility check before report creation: no existing Watershed report file was present in reports/, and public sources support private unicorn status through 2022 and 2024 financing evidence."
    - "Used public evidence only: SEC Form D, company website/blog/product/customer/trust pages, independent news/databases and competitor/partner public pages."
    - Treated company-published customer, product, security and scale claims as evidence of public statements, not proof of revenue, retention, product quality or legal sufficiency.
    - Prioritized directly source-linked evidence claims with quotes and mapped them to diligence checklist chapters I-VIII.
  included_jurisdictions:
    - United States
    - European Union / United Kingdom regulatory context referenced by public sources
    - California climate-disclosure context referenced by public sources
    - Global customer/offices context referenced by public sources
  excluded_topics:
    - No private data room, management interview, customer call, counsel docket report, non-public SOC/ISO report, security artifact, cap table, contract, tax schedule or HRIS export was available.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Watershed diligence report
      type: workflow_request
      date_received: 2026-05-29
      notes: No pitch deck, financial model, customer list, legal schedule or management response was provided.
