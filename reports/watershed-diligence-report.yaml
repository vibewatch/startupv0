      - FC-004
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-012
      - EC-013
      - EC-022
    risk_ids:
      - R-001
      - R-003
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public pages identify major customers and case-study applications, but they do not provide top-15 customer rankings, product ownership details, purchase dates or recurring revenue.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
