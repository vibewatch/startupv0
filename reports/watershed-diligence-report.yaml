            evidence_claim_ids:
              - EC-016
              - EC-019
            risk_ids:
              - R-006
              - R-007
          - finding_id: III.E-F2
            finding: Marketplace and ecosystem partners create supplier/partner quality-control requirements.
            evidence_claim_ids:
              - EC-014
            risk_ids:
