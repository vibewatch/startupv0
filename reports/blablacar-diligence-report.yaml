diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, GMV, gross margin, CAC, retention, AR aging and backlog.
    why_it_matters: Required for revenue quality, profitability and working-capital underwriting.
    suggested_source_or_request: Request FY2022-FY2025 audit reports and monthly accounts.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option/warrant/note schedule, waterfall and credit facility terms.
    why_it_matters: Ownership, dilution and debt covenants drive value and downside risk.
    suggested_source_or_request: Request financing docs, cap table and facility agreement.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: SKU-level P&L, take rate, refund/cancellation and incident metrics.
    why_it_matters: Carpool, bus, rail and commute products have different risks.
    suggested_source_or_request: Request product P&L and cohort dashboards.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Customer/operator/partner concentration and revenue by geography/channel.
    why_it_matters: Aggregate passengers may hide concentration.
    suggested_source_or_request: Request revenue cube and top contracts.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.A
    missing_information: CAC, LTV, conversion funnel, traffic mix and marketing ROI.
    why_it_matters: Public marketing signals do not prove profitable growth.
    suggested_source_or_request: Request marketing dashboard and budget.
    priority: medium
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture, security reports, model inventory, DPIAs and AI governance.
    why_it_matters: Data/ML systems are mission-critical and legally sensitive.
    suggested_source_or_request: Request technical/security diligence pack.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount history/plan, turnover, comp, benefits and equity plan.
    why_it_matters: Execution and dilution risk are not public.
    suggested_source_or_request: Request HRIS and compensation/equity plan.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation schedule and legal docket/regulator/IP searches.
    why_it_matters: Public review cannot clear liabilities.
    suggested_source_or_request: Commission legal diligence.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, claims runs and safety incident history.
    why_it_matters: Transport marketplace exposure depends on coverage and claims.
    suggested_source_or_request: Request insurance pack and incident logs.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts, DPAs, operator/rail agreements, payment terms and SLAs.
    why_it_matters: Contracts determine margins, indemnities and data obligations.
    suggested_source_or_request: Request material-contract schedule and top contracts.
    priority: high
