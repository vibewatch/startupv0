report_metadata:
  report_title: "Startup Diligence Research Report: BlaBlaCar / Comuto"
  target_company: BlaBlaCar
  website: https://www.blablacar.com/
  known_aliases:
    - Comuto
    - Comuto SA
    - Covoiturage
    - BlaBlaCar Bus
    - BlaBlaCar Daily
  sector: Mobility marketplace / ridesharing / multimodal travel
  geography: Headquartered in Paris, France; public footprint across 21 countries
  company_stage: Private late-stage / unicorn
  research_date: 2026-05-24
  analyst: GitHub Copilot CLI diligence agent
  report_version: "1.0"
  currency: EUR and USD as reported
  time_zone: Europe/Paris
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source standard diligence using company pages, newsroom, legal pages, app metadata, jobs, market databases
      and independent press.
    - Private financial, cap-table, legal, HR and contract documents were unavailable; those gaps are marked
      not_publicly_verifiable.
    - Some company pages required public reader/cached access because direct requests were blocked; re-fetch before
      investment reliance.
  included_jurisdictions:
    - France
    - United Kingdom
    - European Union
    - India
    - Brazil
    - Mexico
    - Ukraine
    - Poland
    - Public global footprint references
  excluded_topics:
    - No paid legal docket search
    - No paid IP/trademark register search
    - No interviews
    - No private data-room review
  user_provided_materials:
    - material_id: UPM-001
      title: "Unicorn candidate row: BlaBlaCar $2B Private 2015-09-16 Ridesharing Comuto"
      type: user_prompt
      date_received: 2026-05-24
      notes: Used only as a claim to verify.
