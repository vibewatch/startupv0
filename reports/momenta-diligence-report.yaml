        - risk_id: R-002
          label: China/Hong Kong IPO and cross-border regulatory risk
          severity: high
          likelihood: medium
          rationale: IPO venue changes, data rules, export controls, and investor liquidity could affect exit timing.
          evidence_claim_ids: &a23
            - EC-002
            - EC-009
          source_ids: *a17
        - risk_id: R-003
          label: Safety-critical product validation risk
          severity: high
          likelihood: medium
          rationale: ADAS/robotaxi software requires rigorous safety validation; public sources do not disclose incident or validation data.
          evidence_claim_ids: &a24
            - EC-003
            - EC-004
            - EC-008
          source_ids: *a17
        - risk_id: R-004
          label: OEM concentration and contract liability risk
          severity: high
          likelihood: medium
          rationale: Public OEM relationships may represent concentrated revenue and heavy liability/acceptance obligations.
          evidence_claim_ids: &a25
            - EC-005
            - EC-014
          source_ids: *a17
        - risk_id: R-005
          label: Competitive pressure from robotaxi/ADAS peers
          severity: medium
          likelihood: high
          rationale: Momenta faces well-funded Chinese and global ADAS/robotaxi competitors.
          evidence_claim_ids: &a26
