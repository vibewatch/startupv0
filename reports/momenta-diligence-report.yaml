executive_summary:
  overall_assessment: Momenta has credible public evidence of private-unicorn status, advanced autonomous-driving products, and OEM/investor relationships, but diligence risk is high because financials, safety performance, OEM economics, regulatory approvals, and IPO-readiness materials are not public.
  investment_or_diligence_thesis: The diligence case depends on whether Momenta can convert OEM-assisted-driving deployments and robotaxi technology into durable, high-margin software revenue without unacceptable capital intensity, safety/regulatory exposure, or China/Hong Kong listing risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn-status evidence supports eligibility.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public product evidence supports the existence of the core product portfolio.
      evidence_claim_ids:
        - EC-003
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Autonomous-driving R&D, validation, OEM integration, and robotaxi operations can consume large cash amounts while revenue, margin, and runway are not public.
    - risk_id: R-002
      summary: IPO venue changes, data rules, export controls, and investor liquidity could affect exit timing.
    - risk_id: R-003
      summary: ADAS/robotaxi software requires rigorous safety validation; public sources do not disclose incident or validation data.
  key_evidence_gaps:
    - Audited financial statements and current cash runway.
    - Current cap table, investor rights, debt, and preference stack.
    - Top-customer/channel concentration, churn, retention, and contracts.
    - Counsel-prepared litigation, regulatory, IP, insurance, and material-contract schedules.
  recommended_next_steps:
    - Run source-document financial diligence.
    - Conduct customer/partner references and legal/regulatory review.
    - Reconcile public valuation to financing documents and current operating metrics.
