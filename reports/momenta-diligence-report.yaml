report_metadata:
  report_title: Momenta Public-Source Startup Diligence Report
  target_company: Momenta
  website: http://www.momenta.ai/en/
  known_aliases:
    - Momenta.ai
    - Momenta Global Limited
    - Momenta autonomous driving
  sector: Autonomous driving, ADAS software, robotaxi technology, and automotive AI
  geography: China headquartered with OEM programs in China and global automotive investor/partner exposure
  company_stage: Private unicorn / late-stage autonomous-driving technology company
  research_date: 2026-06-07
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and confirmed momenta was not covered.
    - "Selected from the CB Insights current unicorn list after public screening for private/active status: Momenta remains private in public sources despite IPO planning reports."
    - Used public evidence only; non-public financial, customer, cap-table, HR, legal, contract, and insurance items are marked as diligence gaps.
    - Search-result snippets and company pages are treated as public evidence, not management verification.
  included_jurisdictions:
    - China
    - Hong Kong IPO context
    - United States news/source context
    - Germany automotive partner context
  excluded_topics:
    - No private data room, management interview, customer call, counsel docket search, tax schedule, insurance policy, cap table, bank statement, or HRIS export was available.
    - No paywalled sources were bypassed.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for three random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-07
      notes: No company documents, founder claims, financial model, customer list, or legal schedule were provided.
