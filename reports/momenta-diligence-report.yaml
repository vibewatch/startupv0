    why_it_matters: Needed to verify revenue quality, losses, cash runway, working capital, and accounting policies.
    suggested_source_or_request: Request audited statements, trial balance, management accounts, bank statements, and AR aging.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option pool, SAFEs/notes, warrants, debt, preferences, and investor rights.
    why_it_matters: Needed to understand dilution, control, liquidation preference, debt service, and exit waterfall.
    suggested_source_or_request: Request cap table, financing documents, board consents, and debt agreements.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
