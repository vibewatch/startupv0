      risk_points:
        - risk_id: R-001
          label: Capital intensity and unit-economic opacity
          severity: high
          likelihood: high
          rationale: Autonomous-driving R&D, validation, OEM integration, and robotaxi operations can consume large cash amounts while revenue, margin, and runway are not public.
