    evidence_type: market_database
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-001
    quoted_evidence:
      - source_id: SRC-001
        quote: "| Cato Networks | $3 | 11/17/2020 | Israel | Tel Aviv | Enterprise Tech | Aspect Ventures, SingTel Innov8, Greylock Partners |"
        location: CB Insights table row
    analyst_interpretation: Supports private-unicorn eligibility but not current valuation or financial quality.
    limitations: I
