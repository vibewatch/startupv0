    missing_information: Customer/user/title concentration, retention, churn and renewal or payer cohorts.
    why_it_matters: Concentration and retention drive downside risk and valuation support.
    suggested_source_or_request: Request top customer/title schedule, contracts, cohort data and references.
    priority: high
  - gap_id: G-003
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Security, privacy, IP, regulatory, litigation and insurance artifacts.
    why_it_matters: Regulated, software, AI or mobile businesses can carry material control and legal exposure.
    suggested_source_or_request: Request SOC/security reports, DPAs, IP schedule, policies, incident register and counsel memos.
    priority: high
