limitations:
  - This report is based only on public evidence available during the workflow and is not transaction-ready diligence.
  - Startup-database valuations can lag current market conditions and do not disclose preferences, secondary
    transactions, debt, or liquidation economics.
  - Company-owned sources were used for product, customer, and operating claims but are not independent verification of
    economics or performance.
  - No paywalled, private, or access-controlled systems were bypassed; inaccessible materials are treated as diligence
    gaps.
  - Legal, regulatory, tax, IP, employment, privacy, safety, and sanctions observations are screening observations only
    and require specialist review.
