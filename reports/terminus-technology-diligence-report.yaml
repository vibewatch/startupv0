executive_summary:
  overall_assessment: TERMINUS Technology appears to be an active private AIoT/smart-city unicorn based on CB Insights and
    extensive company-published materials. The public case supports product breadth and international ambition, but
    diligence risk is elevated because financials, project backlog, customer economics, deployment quality, receivables,
    related-party exposure, and regulatory/data obligations are mostly not independently verifiable.
  investment_or_diligence_thesis: Proceed only with high-friction confirmatory diligence. The opportunity is exposure to
    AIoT-enabled urban infrastructure, but investment support depends on audited revenue, government/enterprise contract
    quality, receivable collectability, hardware margins, data/compliance posture, export/geopolitical risks, and proof
    that smart-city deployments generate repeatable software-like economics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists TERMINUS Technology as a private unicorn at US$2.96B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company materials describe AI CITY, AIoT, robots, smart parks, BitInfra, and SPACE future-habitat initiatives.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Company materials list public deployments and strategic relationships, while CB Insights supplies the valuation
        anchor.
      evidence_claim_ids:
        - EC-003
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Audited revenue, backlog, receivables, margin, and cash runway are not public despite a large headline valuation.
    - risk_id: R-002
      summary: Smart-city and venue deployments may concentrate revenue in government/large-project channels with long
        procurement and collection cycles.
    - risk_id: R-003
      summary: AIoT smart-city and robotics systems create privacy, cybersecurity, export, sanctions, and geopolitical review
        exposure.
  key_evidence_gaps:
    - Audited financial statements, contract backlog, revenue recognition, project margin, receivables aging, cash,
      debt, and forecast model.
    - Current cap table, investor rights, liquidation preferences, option pool, related-party financing, and valuation
      bridge.
    - Top customer contracts, public-sector tenders, acceptance certificates, renewals, references, and receivable
      collectability.
    - Architecture, cybersecurity, data-flow, model-governance, hardware BOM, warranty, and deployment incident evidence.
    - Legal, procurement, anti-corruption, export/sanctions, privacy, IP, safety, employment, and regulatory schedules
      reviewed by counsel.
  recommended_next_steps:
    - Run project-level financial diligence and receivables analysis before relying on the US$2.96B valuation.
    - Obtain signed backlog, top customer contracts, tender files, and independent customer references.
    - Separate hardware/services/software economics and test whether recurring software revenue supports the valuation.
    - Have counsel review data, cybersecurity, export/sanctions, procurement, anti-corruption, safety, and IP exposure.
