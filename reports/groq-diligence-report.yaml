risk_register:
  - risk_id: R-001
    risk_title: Valuation and financial quality are not publicly auditable
    risk_category: financial
    severity: high
    likelihood: high
    description: The public record includes funding and valuation anchors, but revenue, gross margin, burn, backlog, and customer concentration are not disclosed.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Request audited financial statements, revenue by channel, gross margins by workload, cash runway, and board-approved forecasts.
  - risk_id: R-002
    risk_title: Inference hardware scale-up and capital intensity
    risk_category: operational
    severity: high
    likelihood: medium
    description: Groq competes in a capital-intensive inference infrastructure market where chip supply, data-center rollout, and utilization determine economics.
    impacted_chapter_ids:
      - I
      - II
      - VI
    impacted_section_ids:
      - I.B
      - II.A
      - VI.B
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Request manufacturing, capacity, utilization, and capex commitments by region and partner.
  - risk_id: R-003
    risk_title: Competition from Nvidia, hyperscalers, and specialist AI clouds
    risk_category: market
    severity: high
    likelihood: high
    description: Groq has differentiated public speed/cost claims, but large competitors control GPU supply, cloud distribution, and enterprise procurement channels.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.C
    evidence_claim_ids: *a43
    mitigation_or_diligence_request: Benchmark latency, throughput, price, availability, and win/loss data against named competitors.
  - risk_id: R-004
    risk_title: Enterprise data-processing and privacy obligations
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Groq distinguishes controller processing from customer-data processor processing, but data flows, retention, and customer controls require contract review.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.F
      - VIII.G
      - II.A
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Review the Services Agreement, DPA, security reports, subprocessors, incident history, and customer opt-out/retention controls.
  - risk_id: R-005
    risk_title: International sovereign AI and export-control exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Public partnerships span Saudi Arabia, Canada, India, Australia, and U.S. government infrastructure, increasing export-control, sanctions, data-localization, and public-sector compliance complexity.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.B
      - VIII.G
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Map jurisdictions, license requirements, sanctions screening, data residency, and government-contract compliance obligations.
  - risk_id: R-006
    risk_title: Partner and customer concentration cannot be tested publicly
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Named partnerships are visible, but revenue contribution, exclusivity, backlog, and termination provisions are not public.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.C
      - V.B
      - VIII.F
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Request revenue concentration schedules, contract terms, renewal status, and implementation milestones.
  - risk_id: R-007
    risk_title: Dependence on third-party open models and ecosystem permissions
    risk_category: product
    severity: medium
    likelihood: medium
    description: GroqCloud public docs emphasize hosted third-party models and OpenAI-compatible APIs, which may create model availability, licensing, and differentiation constraints.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Review model provider agreements, deprecation policies, and proprietary model/tool roadmap.
  - risk_id: R-008
    risk_title: Public website terms are not enough to diligence enterprise liabilities
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Groq website terms expressly separate cloud services from website terms, so enterprise risk cannot be assessed from public terms alone.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.F
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Request all current customer agreements, SLAs, indemnities, limitation-of-liability schedules, and insurance certificates.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, revenue composition, COGS, ARR, cash runway, and working capital.
    why_it_matters: Valuation and scalability cannot be assessed without economics.
    suggested_source_or_request: CFO data-room package and auditor reports.
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.C
    missing_information: Customer and partner revenue concentration, backlog, and contract commitments.
    why_it_matters: Named partnerships may not equal recurring revenue.
    suggested_source_or_request: Customer revenue schedule and executed contracts.
    priority: high
  - gap_id: G-003
    chapter_id: VI
    section_id: VI.B
    missing_information: Manufacturing capacity, utilization, roadmap cost, and model-license terms.
    why_it_matters: Inference economics depend on supply, utilization, and model availability.
    suggested_source_or_request: COO/CTO capacity model and supplier agreements.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Export-control, sanctions, privacy, and government-contract compliance memos.
    why_it_matters: Global sovereign AI deployments raise regulatory execution risk.
    suggested_source_or_request: Counsel memos and compliance policies.
    priority: high
