report_metadata:
  report_title: Groq Public-Source Startup Diligence Report
  target_company: Groq
  website: https://groq.com/
  known_aliases:
    - Groq, Inc.
    - GroqCloud
    - LPU
  sector: AI inference hardware and cloud services
  geography: United States with announced global data-center and sovereign-AI partnerships
  company_stage: Late-stage private unicorn
  research_date: 2026-06-07
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing reports and selected Groq from an uncovered public unicorn list.
    - Prioritized Groq official website, documentation, newsroom, privacy, and terms pages.
    - Used the public unicorn-list row and newsroom-linked Bloomberg headline as valuation anchors while flagging financing-document gaps.
    - No private financials, customer references, cap table, counsel letters, or management interviews were available.
  included_jurisdictions:
    - United States
    - Canada
    - Saudi Arabia
    - India
    - Australia
    - European Union / United Kingdom for privacy-transfer considerations
  excluded_topics:
    - No paywalled database extraction, PACER retrieval, paid IP search, or private data-room review was performed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt requesting random unicorn diligence reports
      type: prompt_argument
      date_received: 2026-06-07
      notes: No founder deck or internal materials were supplied.
