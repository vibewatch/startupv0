executive_summary:
  overall_assessment: Groq shows strong public evidence of differentiated AI inference positioning, developer-facing products, substantial funding headlines, and named global partnerships; the main diligence constraint is that economics, capacity, customer concentration, and contract terms remain private.
  investment_or_diligence_thesis: Proceed only with detailed financial, capacity, contract, and technical benchmarking diligence because the upside depends on whether Groq can translate LPU speed/cost claims and sovereign/enterprise partnerships into durable gross margin against Nvidia and hyperscaler competition.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Groq publicly claims the LPU was pioneered in 2016 for inference.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: GroqCloud has a documented OpenAI-compatible API and model/pricing table.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-004
      summary: Groq publicly lists multiple global strategic partnerships.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Valuation and financial quality are not publicly auditable
    - risk_id: R-002
      summary: Inference hardware scale-up and capital intensity
    - risk_id: R-003
      summary: Competition from Nvidia, hyperscalers, and specialist AI clouds
  key_evidence_gaps:
    - Audited financial statements, ARR, gross margin, burn, cash runway, and revenue concentration.
    - Cap table, financing documents, liquidation preferences, and debt/data-center obligations.
    - Executed customer, partner, supplier, model-license, DPA, and SLA agreements.
    - Independent production benchmarks and capacity/utilization data.
  recommended_next_steps:
    - Run technical benchmarking against target workloads and GPU/hyperscaler alternatives.
    - Request customer cohort, backlog, churn, and partner implementation schedules.
    - Complete legal, privacy, export-control, IP, and insurance diligence before relying on public partnership headlines.
