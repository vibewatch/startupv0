  - figure_id: F-011
    title: Groq diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Groq diligence risk heatmap
    purpose: Plots the risk register by severity and likelihood.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Valuation and financial quality are not publicly auditable
          severity: high
          likelihood: high
          rationale: The public record includes funding and valuation anchors, but revenue, gross margin, burn, backlog, and customer concentration are not disclosed.
          evidence_claim_ids: &a41
            - EC-001
            - EC-006
            - EC-012
          source_ids: &a35
            - SRC-001
            - SRC-005
            - SRC-006
            - SRC-000
        - risk_id: R-002
          label: Inference hardware scale-up and capital intensity
          severity: high
          likelihood: medium
          rationale: Groq competes in a capital-intensive inference infrastructure market where chip supply, data-center rollout, and utilization determine economics.
          evidence_claim_ids: &a42
            - EC-002
            - EC-003
            - EC-007
          source_ids: *a35
        - risk_id: R-003
          label: Competition from Nvidia, hyperscalers, and specialist AI clouds
          severity: high
          likelihood: high
          rationale: Groq has differentiated public speed/cost claims, but large competitors control GPU supply, cloud distribution, and enterprise procurement channels.
          evidence_claim_ids: &a43
            - EC-004
            - EC-005
            - EC-007
          source_ids: *a35
        - risk_id: R-004
          label: Enterprise data-processing and privacy obligations
          severity: medium
          likelihood: medium
          rationale: Groq distinguishes controller processing from customer-data processor processing, but data flows, retention, and customer controls require contract review.
          evidence_claim_ids: *a36
          source_ids: *a35
        - risk_id: R-005
          label: International sovereign AI and export-control exposure
          severity: high
          likelihood: medium
          rationale: Public partnerships span Saudi Arabia, Canada, India, Australia, and U.S. government infrastructure, increasing export-control, sanctions, data-localization, and public-sector compliance complexity.
          evidence_claim_ids: *a37
          source_ids: *a35
        - risk_id: R-006
          label: Partner and customer concentration cannot be tested publicly
          severity: medium
          likelihood: unknown
          rationale: Named partnerships are visible, but revenue contribution, exclusivity, backlog, and termination provisions are not public.
          evidence_claim_ids: *a38
          source_ids: *a35
        - risk_id: R-007
          label: Dependence on third-party open models and ecosystem permissions
          severity: medium
          likelihood: medium
          rationale: GroqCloud public docs emphasize hosted third-party models and OpenAI-compatible APIs, which may create model availability, licensing, and differentiation constraints.
          evidence_claim_ids: *a39
          source_ids: *a35
        - risk_id: R-008
          label: Public website terms are not enough to diligence enterprise liabilities
          severity: medium
          likelihood: medium
          rationale: Groq website terms expressly separate cloud services from website terms, so enterprise risk cannot be assessed from public terms alone.
          evidence_claim_ids: *a40
          source_ids: *a35
    rendering_guidance:
      preferred_format: chart_spec
      display_notes: null
    evidence_claim_ids:
      - EC-001
      - EC-006
      - EC-007
      - EC-008
      - EC-012
    source_ids: *a35
    notes: null
