risk_register:
  - risk_id: R-001
    risk_title: Post-2021 valuation and growth quality risk
    risk_category: financial
    severity: high
    likelihood: medium
    description: ManoMano reached a $2.6B valuation in 2021 with pandemic-era DIY tailwinds, but current GMV, revenue, margin, profitability, cash, debt, and valuation marks are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-012
    mitigation_or_diligence_request: Request audited financials, GMV-to-revenue reconciliation, contribution margin, cash/debt, forecasts, and investor marks.
  - risk_id: R-002
    risk_title: Marketplace margin, fulfillment, and seller-quality risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: A specialized marketplace with thousands of sellers can face take-rate pressure, seller churn, returns, fraud, compliance, and service-cost burdens.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - V.A
      - VIII.F
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
      - EC-011
    mitigation_or_diligence_request: Review seller cohorts, take rate, fulfillment SLAs, returns, fraud, quality controls, and contribution margin by category/market.
  - risk_id: R-003
    risk_title: DIY/home-improvement competition and demand normalization
    risk_category: market
    severity: high
    likelihood: high
    description: ManoMano competes with Amazon, large DIY retailers, and local marketplaces as online DIY demand normalizes after pandemic acceleration.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-007
      - EC-008
    mitigation_or_diligence_request: Review category-level share, pricing, repeat purchase, paid acquisition, and win/loss by country.
  - risk_id: R-004
    risk_title: International expansion execution risk
    risk_category: market
    severity: medium
    likelihood: medium
    description: Public materials emphasize expansion in Germany, the UK, Spain, Italy, and B2B; cross-border localization, seller density, and brand awareness may vary.
    impacted_chapter_ids:
      - V
      - III
    impacted_section_ids:
      - V.A
      - III.A
    evidence_claim_ids:
      - EC-005
      - EC-008
    mitigation_or_diligence_request: Request country P&Ls, cohort retention, marketing payback, seller supply, and logistics performance by market.
  - risk_id: R-005
    risk_title: B2B/ManoManoPro monetization and credit risk
    risk_category: customer
    severity: medium
    likelihood: medium
    description: ManoManoPro grew rapidly in disclosed 2020-era materials, but professional buyer retention, receivables, payment terms, and credit exposure are not public.
    impacted_chapter_ids:
      - III
      - I
    impacted_section_ids:
      - III.C
      - I.A
    evidence_claim_ids:
      - EC-005
      - EC-012
    mitigation_or_diligence_request: Request ManoManoPro cohort metrics, AR aging, payment terms, bad debt, NRR, and professional-buyer concentration.
  - risk_id: R-006
    risk_title: Regulatory, product safety, and platform liability risk
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Home-improvement marketplaces can face product safety, environmental, consumer-protection, privacy, worker, and seller-compliance exposure across Europe.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.G
      - II.A
    evidence_claim_ids:
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Request regulatory correspondence, product-safety controls, marketplace compliance policies, insurance, and claims history.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Current audited financials, GMV-to-revenue bridge, take rate, gross/contribution margin, cash, debt, and country P&Ls.
    why_it_matters: The strongest public operating evidence is 2020/2021-era and may not reflect post-pandemic economics.
    suggested_source_or_request: Finance data room, auditor reports, country management accounts.
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.C
    missing_information: Customer, seller, and ManoManoPro cohorts including retention, concentration, repeat purchase, AR aging, and churn.
    why_it_matters: Marketplace scale metrics do not reveal revenue quality or concentration.
    suggested_source_or_request: Customer/seller schedules and cohort analytics.
    priority: high
  - gap_id: G-003
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Seller contracts, product-safety compliance, fulfillment agreements, insurance, litigation, regulatory, privacy, and tax/VAT schedules.
    why_it_matters: European marketplace operations create multi-jurisdiction legal and regulatory exposure.
    suggested_source_or_request: Counsel and operations data-room pack.
    priority: high
