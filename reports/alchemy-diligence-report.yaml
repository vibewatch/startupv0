executive_summary:
  overall_assessment: Proceed only with confirmatory diligence. Public evidence supports active private-unicorn status and a broad blockchain infrastructure platform, while financial quality, crypto-cycle exposure, customer concentration, regulatory posture, and platform reliability remain material open risks.
  investment_or_diligence_thesis: Alchemy could be valuable core infrastructure for onchain applications if usage, margins, customer retention, and compliance scale are verified; the public record is insufficient to underwrite the valuation without private financial, customer, and technical diligence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn status and valuation anchor for Alchemy are supported by CB Insights and active company materials.
      evidence_claim_ids:
        - EC-001
        - EC-010
    - founder_claim_id: FC-002
      summary: Public product positioning is supported by company-owned materials.
      evidence_claim_ids:
        - EC-002
        - EC-004
    - founder_claim_id: FC-003
      summary: Public customer, usage, partner, or deployment signals exist, but revenue concentration is private.
      evidence_claim_ids:
        - EC-005
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Valuation and financial opacity
    - risk_id: R-002
      summary: Customer concentration and revenue quality unknown
    - risk_id: R-003
      summary: Blockchain infrastructure reliability and commoditization risk
  key_evidence_gaps:
    - Audited financial statements, management accounts, cash/debt schedule, revenue recognition memo, and KPI bridge.
    - Cap table, preferred terms, warrants/options/notes, debt instruments, and board approvals.
    - Top customer revenue, contract terms, retention, churn, backlog, pipeline, and independent references.
    - Security, privacy, regulatory, legal, IP, insurance, supplier, and incident artifacts.
    - Full org chart, HRIS headcount, attrition, compensation, incentive stock plans, and key-person succession plans.
  recommended_next_steps:
    - Run financial quality-of-revenue and cap-table diligence before relying on headline valuation.
    - Request top customer and partner contracts, usage data, retention cohorts, and independent references.
    - Conduct product, security, compliance, IP, and regulatory reviews with specialist counsel or technical experts.
    - Benchmark pricing, win/loss, gross margins, sales productivity, and support obligations against direct competitors.
