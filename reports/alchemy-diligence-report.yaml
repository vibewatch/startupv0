    title: Risk heatmap from public diligence
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Severity and likelihood view of the main public diligence risks.
    purpose: Prioritize follow-up diligence before relying on headline valuation.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Valuation and financial opacity
          severity: high
          likelihood: high
          rationale: Alchemy's headline valuation is public, but audited financials, cash runway, revenue recognition, debt, and preference stack are not public.
          evidence_claim_ids: &a42
            - EC-001
            - EC-008
          source_ids: &a41
            - SRC-001
            - SRC-003
            - SRC-008
        - risk_id: R-002
          label: Customer concentration and revenue quality unknown
          severity: high
          likelihood: medium
          rationale: Public sources do not disclose customer-level revenue, churn, gross retention, backlog, or renewal cohorts for Alchemy.
          evidence_claim_ids: &a43
            - EC-005
            - EC-008
          source_ids: *a41
        - risk_id: R-003
          label: Blockchain infrastructure reliability and commoditization risk
          severity: high
          likelihood: medium
          rationale: Alchemy competes in blockchain API/infrastructure, where uptime, latency, chain coverage, cost-to-serve, and developer experience determine retention and pricing power.
          evidence_claim_ids: &a44
            - EC-002
            - EC-004
            - EC-007
          source_ids: *a41
        - risk_id: R-004
          label: Crypto, payments, data, and sanctions compliance exposure
          severity: high
          likelihood: medium
          rationale: Alchemy serves web3, stablecoin, DeFi, wallet, and payment use cases that can involve crypto regulatory, sanctions, consumer-protection, and data-security scrutiny.
          evidence_claim_ids: &a45
            - EC-009
          source_ids: *a41
        - risk_id: R-005
          label: Management, hiring, and key-person dependency
          severity: medium
          likelihood: medium
          rationale: Public leadership information exists, but full org design, attrition, compensation, succession, and key-person dependency are not public.
          evidence_claim_ids: &a46
            - EC-006
            - EC-008
          source_ids: *a41
        - risk_id: R-006
          label: Underlying blockchain, cloud, and node infrastructure dependency
          severity: medium
          likelihood: medium
          rationale: Alchemy depends on blockchain protocol availability, node infrastructure, cloud/network resilience, and third-party ecosystem demand that are not fully controlled by the company.
          evidence_claim_ids: &a47
            - EC-004
            - EC-009
          source_ids: *a41
