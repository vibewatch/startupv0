risk_register:
  - risk_id: R-001
    risk_title: Valuation and financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Alchemy's headline valuation is public, but audited financials, cash runway, revenue recognition, debt, and preference stack are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Request audited financials, management accounts, KPI bridge, cash/debt schedules, cap table, and financing documents.
  - risk_id: R-002
    risk_title: Customer concentration and revenue quality unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public sources do not disclose customer-level revenue, churn, gross retention, backlog, or renewal cohorts for Alchemy.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a43
    mitigation_or_diligence_request: Request top-customer revenue, contracts, renewal schedules, cohort retention, pipeline conversion, and independent customer references.
  - risk_id: R-003
    risk_title: Blockchain infrastructure reliability and commoditization risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Alchemy competes in blockchain API/infrastructure, where uptime, latency, chain coverage, cost-to-serve, and developer experience determine retention and pricing power.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
    evidence_claim_ids: *a44
    mitigation_or_diligence_request: Run product, architecture, roadmap, security, performance, and win/loss diligence with customer references.
  - risk_id: R-004
    risk_title: Crypto, payments, data, and sanctions compliance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Alchemy serves web3, stablecoin, DeFi, wallet, and payment use cases that can involve crypto regulatory, sanctions, consumer-protection, and data-security scrutiny.
