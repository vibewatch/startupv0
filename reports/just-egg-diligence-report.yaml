executive_summary:
  overall_assessment: JUST Egg / Eat Just is a real private alternative-protein unicorn with verified public evidence for historic valuation, substantial funding, plant-based egg products, cultivated-meat regulatory milestones, and a patent footprint. Proceed only with confirmatory diligence because current financial quality, unit economics, manufacturing scale, cash runway, supplier liabilities, and channel economics are not publicly verifiable.
  investment_or_diligence_thesis: The upside is a category-defining plant-based egg and cultivated-meat platform if product adoption and regulatory firsts can convert into margin-positive scale. The underwriting risk is that stale valuation, capital intensity, and supplier/legal history overwhelm public milestone value.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights supports private-unicorn and funding markers.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company pages verify a broad plant-based egg product family.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: BusinessWire and GOOD Meat sources support cultivated-meat regulatory and launch milestones.
      evidence_claim_ids:
        - EC-003
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Stale valuation and opaque current financial quality.
    - risk_id: R-002
      summary: Cultivated-meat scale-up and capex execution.
    - risk_id: R-003
      summary: ABEC vendor litigation and judgment signal.
  key_evidence_gaps:
    - Audited financials, revenue by channel, gross margin, cash/debt, burn, runway, and current valuation.
    - Batch records, yield, cost per pound, media cost, CMO and supplier contracts, and facility capex plan.
    - ABEC settlement/payment status, top customer contracts, channel revenue, regulatory correspondence, and IP assignments.
  recommended_next_steps:
    - Run financial quality-of-earnings and cap-table diligence.
    - Run food manufacturing/regulatory diligence on cultivated meat and plant-based SKU margins.
    - Have counsel review ABEC settlement, supplier obligations, FDA/USDA files, and patent/FTO materials.
