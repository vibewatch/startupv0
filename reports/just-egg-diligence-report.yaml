report_metadata:
  report_title: JUST Egg / Eat Just, Inc. Startup Diligence Research Report
  target_company: JUST Egg / Eat Just, Inc.
  website: https://www.ju.st/
  known_aliases:
    - JUST Egg
    - Eat Just
    - Eat Just, Inc.
    - Hampton Creek
    - GOOD Meat
    - Just Food Company
  sector: Alternative protein; plant-based eggs; cultivated meat
  geography: United States; Alameda/San Francisco, California with Singapore and U.S. cultivated-meat commercialization signals
  company_stage: Private unicorn
  research_date: 2026-05-19
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Selected from uncovered CB Insights unicorn candidates after screening for obvious IPO, acquisition, or shutdown evidence.
    - Prioritized CB Insights, company product pages, GOOD Meat, BusinessWire, CourtListener, and AgFunderNews.
    - Marked financial, customer, supplier, and unit-economics matters as gaps where public evidence is unavailable.
  included_jurisdictions:
    - United States
    - California
    - Singapore commercial references
    - U.S. federal food regulation and litigation
  excluded_topics:
    - Private financial statements
    - Management interviews
    - Customer calls
    - Non-public contracts
    - Paid databases beyond public snippets
  user_provided_materials: []
