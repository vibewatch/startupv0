diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, revenue by product/channel/geography, cash runway, backlog and AR aging.
    why_it_matters: Valuation could mask weak unit economics or burn.
    suggested_source_or_request: Provide audited statements, KPI dashboard, management accounts and board financials.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Three-year plan, assumptions, budget-vs-actuals, CAC/payback and capital needs.
    why_it_matters: Forecast sensitivity to card spend, partner constraints, international rollout and sales efficiency.
    suggested_source_or_request: Provide model with SKU/customer/channel/geography build and downside cases.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, waterfall, options/warrants/notes/debt, 409A, board approvals.
    why_it_matters: Structured preferences or option-pool changes could materially alter common value.
    suggested_source_or_request: Provide current fully diluted cap table and financing docs.
    priority: high
  - gap_id: G-004
    chapter_id: I
    section_id: I.D
    missing_information: Tax positions, revenue-recognition policy, debt, warrants, partner economics.
    why_it_matters: Revenue recognition and partner revenue share may be complex.
    suggested_source_or_request: Provide tax/accounting policies and full financing history by round.
    priority: high
  - gap_id: G-005
    chapter_id: II
    section_id: II.A
    missing_information: SKU revenue, active customers, margins, adoption, uptime, losses, roadmap.
    why_it_matters: Breadth can hide weak SKUs or create support/compliance burden.
    suggested_source_or_request: Provide product-level operating dashboard and customer references.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.A
    missing_information: Top-15 schedules, active definition, product ownership and references.
    why_it_matters: Logo count may include small/inactive customers.
    suggested_source_or_request: Provide top customers by revenue/spend/payment volume and application.
    priority: high
  - gap_id: G-007
    chapter_id: III
    section_id: III.B
    missing_information: Partner revenue, marketing terms, SLAs and termination rights.
    why_it_matters: Termination rights or partner concentration could disrupt product availability.
    suggested_source_or_request: Provide strategic partner agreements and concentration.
    priority: high
  - gap_id: G-008
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, churn, NRR, contract term and exposure.
    why_it_matters: A few enterprise or high-card-spend customers may drive revenue.
    suggested_source_or_request: Provide concentration schedule and renewal/churn cohorts.
    priority: high
  - gap_id: G-009
    chapter_id: III
    section_id: III.D
    missing_information: Two-year severed customer/partner/supplier schedule.
    why_it_matters: A terminated issuer, bank, processor or customer could signal hidden risk.
    suggested_source_or_request: Provide material non-renewals/terminations and reasons.
    priority: high
  - gap_id: G-010
    chapter_id: III
    section_id: III.E
    missing_information: Top-supplier spend, agreements, termination rights, reserves, vendor SOC reports.
    why_it_matters: Supplier concentration around banks/issuers could be material.
    suggested_source_or_request: Provide supplier register and program agreements.
    priority: high
  - gap_id: G-011
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, price realization, discounting, CAC, market share, churn reasons.
    why_it_matters: Competitors can bundle with banking, AP, payroll/HR, ERP or travel.
    suggested_source_or_request: Provide win/loss and competitive economics.
    priority: medium
  - gap_id: G-012
    chapter_id: V
    section_id: V.A
    missing_information: Channel mix, conversion, CAC/payback, marketing ROI, international distribution.
    why_it_matters: Free tier can add support cost; enterprise sales can increase CAC.
    suggested_source_or_request: Provide GTM dashboard and channel attribution.
    priority: medium
  - gap_id: G-013
    chapter_id: V
    section_id: V.B
    missing_information: Major account health, pipeline, renewal calendar and expansion plan.
    why_it_matters: Enterprise pipeline may have long cycles and heavy implementation needs.
    suggested_source_or_request: Provide top-account dashboard and pipeline.
    priority: medium
  - gap_id: G-014
    chapter_id: V
    section_id: V.C
    missing_information: Lead source, conversion, sales cycle, attach rate and channel economics.
    why_it_matters: Cross-sell can be shallow or support-heavy.
    suggested_source_or_request: Provide acquisition funnel and product attach analysis.
    priority: medium
  - gap_id: G-015
    chapter_id: V
    section_id: V.D
    missing_information: Sales headcount, quota, attainment, ramp time, comp plan.
    why_it_matters: Enterprise/international expansion may pressure sales efficiency.
    suggested_source_or_request: Provide sales capacity and compensation model.
    priority: medium
  - gap_id: G-016
    chapter_id: V
    section_id: V.E
    missing_information: Budget, CAC/LTV, payback and hiring plan.
    why_it_matters: Marketing plan may require continued financing if CAC/payback are weak.
    suggested_source_or_request: Provide marketing budget and ROI plan.
    priority: medium
  - gap_id: G-017
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D org chart, budget, key personnel, SDLC, incidents, defects.
    why_it_matters: R&D hiring may lag compliance/support needs.
    suggested_source_or_request: Provide R&D/security operating review.
    priority: medium
  - gap_id: G-018
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, development cost, model governance, adoption, reliability, IP.
    why_it_matters: AI errors, privacy issues or payment/fraud misses could be costly.
    suggested_source_or_request: Provide roadmap and model governance package.
    priority: medium
  - gap_id: G-019
    chapter_id: VII
    section_id: VII.A
    missing_information: Org chart, executive team, board, reporting lines, succession plan.
    why_it_matters: Leadership gaps or founder concentration may be hidden.
    suggested_source_or_request: Provide current/planned org chart.
    priority: medium
  - gap_id: G-020
    chapter_id: VII
    section_id: VII.B
    missing_information: Historical/projected headcount, contractors, location, attrition.
    why_it_matters: Open roles can indicate growth or backfill.
    suggested_source_or_request: Provide HRIS and hiring plan.
    priority: medium
  - gap_id: G-021
    chapter_id: VII
    section_id: VII.C
    missing_information: Full senior bios, tenure, equity, board seats, references.
    why_it_matters: Executive depth and regulated-finance experience unknown.
    suggested_source_or_request: Provide management bios and references.
    priority: medium
  - gap_id: G-022
    chapter_id: VII
    section_id: VII.D
    missing_information: Comp plans, benefits, severance, retention, sales comp.
    why_it_matters: Retention guarantees or severance may be material.
    suggested_source_or_request: Provide HR compensation package.
    priority: medium
  - gap_id: G-023
    chapter_id: VII
    section_id: VII.E
    missing_information: Option pool, grants, vesting, 409A, acceleration.
    why_it_matters: Underwater options or refresh grants could affect retention/dilution.
    suggested_source_or_request: Provide equity incentive plan and grant ledger.
    priority: medium
  - gap_id: G-024
    chapter_id: VII
    section_id: VII.F
    missing_information: HR investigations, claims, settlements, wage/hour audits.
    why_it_matters: Employment claims may be missed in public search.
    suggested_source_or_request: Provide HR/legal employee-relations register.
    priority: medium
  - gap_id: G-025
    chapter_id: VII
    section_id: VII.G
    missing_information: Voluntary/involuntary turnover and retention benefits.
    why_it_matters: High turnover in engineering/compliance/customer ops would impair execution.
    suggested_source_or_request: Provide attrition analytics and exit themes.
    priority: medium
  - gap_id: G-026
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complaints, damages, status, counsel, reserves, insurance.
    why_it_matters: Index snippets cannot determine damages or materiality.
    suggested_source_or_request: Counsel should pull all dockets and summarize exposure.
    priority: high
  - gap_id: G-027
    chapter_id: VIII
    section_id: VIII.B
    missing_information: Claims, damages, resolution, collectability and counsel view.
    why_it_matters: Affirmative disputes can indicate partner/customer contract issues.
    suggested_source_or_request: Provide litigation schedule for company-initiated matters.
    priority: high
  - gap_id: G-028
    chapter_id: VIII
    section_id: VIII.C
    missing_information: OSHA/workplace logs, office leases, remote-work compliance.
    why_it_matters: Workplace, remote-work or international employment issues can still exist.
    suggested_source_or_request: Provide safety/workplace compliance records.
    priority: high
  - gap_id: G-029
    chapter_id: VIII
    section_id: VIII.D
    missing_information: USPTO/WIPO records, assignments, OSS scan, material licenses.
    why_it_matters: Moat may rely on execution/data/integrations rather than patents; license issues could hide.
    suggested_source_or_request: Have IP counsel run full review.
    priority: high
  - gap_id: G-030
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Policies, limits, deductibles, exclusions, loss runs.
    why_it_matters: Coverage exclusions or inadequate limits could leave losses uncovered.
    suggested_source_or_request: Provide broker schedule and policies.
    priority: high
  - gap_id: G-031
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contract register and agreements.
    why_it_matters: Termination, reserves, indemnities, data rights and SLAs could constrain operations.
    suggested_source_or_request: Provide bank/issuer/network/processor/customer/vendor/data contracts.
    priority: high
  - gap_id: G-032
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Licenses, regulator correspondence, bank-partner exams, complaints, privacy/AML/sanctions.
    why_it_matters: No-result searches miss aliases, affiliates, state actions and non-public exams.
    suggested_source_or_request: Regulatory counsel should run full review.
    priority: high
