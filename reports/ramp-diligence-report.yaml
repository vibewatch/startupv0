report_metadata:
  report_title: Ramp Diligence Research Report
  target_company: Ramp Business Corporation
  website: https://ramp.com/
  known_aliases:
    - Ramp
    - Ramp Business Corporation
    - Ramp Payments Corporation
    - Ramp Financing Corporation
  sector: Financial technology / spend management / finance automation
  geography: United States; international product disclosures for Canada, UK and EEA
  company_stage: Late-stage private unicorn
  research_date: 2026-05-18
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public sources only
    - Company-controlled pages for product/security/pricing/legal disclosures
    - Independent news and market databases for valuation/private-status context
    - Competitor public pages for market benchmarks
    - Legal/regulatory public search for docket and enforcement signals
  included_jurisdictions:
    - United States
    - Canada
    - United Kingdom
    - European Economic Area where Ramp disclosures reference availability or partner entities
  excluded_topics:
    - Non-public financial statements
    - Management interviews
    - Customer calls
    - Data-room contracts
    - Private bank/issuer/regulator correspondence
  user_provided_materials: []
