executive_summary:
  overall_assessment: Ramp passed the public-source active/private eligibility screen and has strong public evidence of a broad finance-automation platform, visible customer scale, public pricing, trust artifacts, and late-stage valuation signals. The central diligence issue is not whether Ramp exists or has market visibility; it is that nearly all financial, customer-concentration, cap-table, regulatory, contract, HR and unit-economic evidence remains private.
  investment_or_diligence_thesis: If private materials substantiate durable revenue growth, healthy card/AP/treasury unit economics, low loss rates, strong retention and compliant partner operations, Ramp could be a scaled finance automation platform with meaningful cross-sell. Without those materials, the $32B public valuation anchor should be treated as unverified for investment underwriting.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public active/private and valuation signals exist through CB Insights, Ramp site/careers and Reuters valuation headlines.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
    - founder_claim_id: FC-002
      summary: Ramp publicly presents a broad cards, expense, AP, travel, treasury, integrations and AI platform used by 50,000+ businesses/customers.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-008
        - EC-009
        - EC-010
        - EC-011
        - EC-012
        - EC-025
    - founder_claim_id: FC-003
      summary: Ramp Free, Plus and Enterprise public pricing tiers are visible.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-004
      summary: Ramp publicly lists security and trust controls/artifacts including SOC/ISO/PCI-related materials.
      evidence_claim_ids:
        - EC-013
        - EC-014
  biggest_risks:
    - risk_id: R-001
      summary: No public audited financials, management accounts, runway, revenue mix or margin data.
    - risk_id: R-002
      summary: Public valuation marks are volatile and cap-table terms are private.
    - risk_id: R-003
      summary: Customer count is public but revenue concentration, NRR, churn and active customer definitions are not.
    - risk_id: R-005
      summary: Bank/issuer/network/treasury dependencies are operationally and regulatorily critical.
    - risk_id: R-008
      summary: CourtListener docket surface requires counsel review.
    - risk_id: R-011
      summary: AI claims need governance, accuracy, data-use and customer-outcome validation.
  key_evidence_gaps:
    - Audited financial statements, management accounts, cash runway, margins and KPI dashboards.
    - Cap table, liquidation preference, debt, option pool, investor rights and 409A.
    - Top-customer schedule, active customer definition, revenue concentration, retention and churn cohorts.
    - Bank/issuer/processor/network/treasury/adviser contracts and regulatory correspondence.
    - SOC/ISO/PCI report details, security incidents, pen tests, insurance and vendor-risk files.
    - Litigation schedule with pleadings, damages, reserves and insurance notices.
    - R&D roadmap, AI model governance, data rights and product-level unit economics.
    - Org chart, compensation, equity incentive plan and turnover data.
  recommended_next_steps:
    - "Confirm eligibility again before investment committee: no IPO, acquisition, shutdown or material post-report event."
    - "Request CFO package: audited financials, management accounts, board plan, KPI dashboard and cash runway."
    - Request cap table and financing document package with waterfall analysis.
    - Run customer diligence on top accounts and cohorts, including reference calls.
    - Have regulatory counsel review licenses, bank-partner program agreements, complaints and CFPB/state/affiliate searches.
    - Have litigation counsel pull CourtListener dockets and prepare exposure memo.
    - Review trust-center artifacts, cyber insurance, incidents, data-processing terms and AI governance.
    - Validate product-level economics and competitor win/loss data.
