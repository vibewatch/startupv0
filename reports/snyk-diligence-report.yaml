    mapped_section_ids: [I.C, II.B, V.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-005]
    contradiction_summary: null
    diligence_follow_up:
      - Request pricing waterfall, seat utilization, conversion, and enterprise
        discounting data.
  - founder_claim_id: FC-004
    claim_text: Snyk serves hundreds of organizations and has named customers including
      large technology, travel, financial, manufacturing, and enterprise software
      companies.
    claim_source: Snyk about and customer pages
    claim_date: null
    mapped_chapter_ids: [III, V]
    mapped_section_ids: [III.A, V.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-007]
    contradiction_summary: Vendor-published logo and case-study evidence supports customer
      existence but not current ARR, renewal status, concentration, or NRR.
    diligence_follow_up:
      - Directly confirm active customer status, ARR, renewal dates, case-study metrics,
        and logo rights.
  - founder_claim_id: FC-005
    claim_text: Snyk was founded in 2015, has Boston headquarters, global offices, and
      a global team of over 1,000 employees.
    claim_source: Snyk about/careers pages and Companies House
    claim_date: null
    mapped_chapter_ids: [VII, VIII]
    mapped_section_ids: [VII.B, VIII.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-002, EC-004, EC-010]
    contradiction_summary: A secondary source reports 1,400 employees in 2022 while
      current Snyk careers language says over 1,000; reconcile definitions and trend.
    diligence_follow_up:
      - Request headcount bridge, attrition, restructuring history, office leases, and
        entity chart.
  - founder_claim_id: FC-006
    claim_text: Snyk has public compliance/security posture including SOC 2 Type II,
      GDPR, ISO 27001/27017, FedRAMP plan support, encryption, and data residency options.
    claim_source: Snyk plans, security, and privacy pages
    claim_date: null
    mapped_chapter_ids: [VIII]
    mapped_section_ids: [VIII.D]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-013]
    contradiction_summary: Public marketing and policy language is not the same as
      reviewing audit reports, customer security exceptions, or DPAs.
    diligence_follow_up:
      - Review SOC 2/ISO/FedRAMP evidence, DPAs, subprocessors, incidents, privacy DPIAs,
        and customer security exceptions.

executive_summary:
  overall_assessment: >-
    Track with high-priority financial, customer, competitive, and legal diligence before
    any investment decision. Public evidence supports Snyk as an active, late-stage
    private developer-security unicorn with broad product and enterprise traction, but
    the most material underwriting inputs remain private.
  investment_or_diligence_thesis: >-
    Snyk is a scaled developer-security platform in a strategically important category:
    AI-assisted secure software development, open-source supply-chain risk, container/IaC
    security, and application risk management. The upside case depends on durable
    enterprise retention, platform attach, AI remediation efficacy, and ability to defend
    pricing against bundled platform-native tools and cloud-security suites.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Snyk appears on CB Insights current unicorn list at $7.40B valuation.
      evidence_claim_ids: [EC-001]
    - founder_claim_id: FC-002
      summary: Snyk publicly offers a broad developer-security product platform.
      evidence_claim_ids: [EC-004, EC-006]
    - founder_claim_id: FC-003
      summary: Snyk has public Free-to-Enterprise packaging.
      evidence_claim_ids: [EC-005]
    - founder_claim_id: FC-005
      summary: SNYK LIMITED is active at Companies House and Snyk states it has a global
        team over 1,000 employees.
      evidence_claim_ids: [EC-002, EC-010]
  biggest_risks:
    - risk_id: R-001
      summary: Valuation, preference-stack, and financing terms are opaque.
    - risk_id: R-002
      summary: Revenue quality, profitability, and SaaS unit economics are not public.
    - risk_id: R-003
      summary: Crowded AppSec and developer-security competition may pressure growth and pricing.
    - risk_id: R-005
      summary: Customer concentration, renewal quality, and churn are not publicly visible.
    - risk_id: R-006
      summary: Privacy, security, and regulated-enterprise obligations require private review.
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, NRR/GRR, gross-margin waterfall,
      CAC/payback, collections, and cash runway.
    - Current cap table, preference stack, debt/warrants, secondaries, option pool, and
      employee-equity repricing or retention analysis.
    - Top-customer ARR, renewal schedule, churn reasons, direct references, support
      history, and customer security exceptions.
    - Win/loss, market share, competitor-specific pricing pressure, AI remediation
      benchmarks, and module-level product telemetry.
    - Full legal entity chart, litigation and demand-letter register, IP assignments, OSS
      compliance audit, DPAs, audit reports, insurance, and incident history.
  recommended_next_steps:
    - Condition further diligence on a financial data room covering audited financials,
      ARR/retention, gross margin, bookings/billings, cash runway, and financing documents.
    - Run customer diligence on top accounts and selected churned/lost prospects, focusing
      on concentration, renewal risk, module attach, procurement pressure, and
      Snyk-vs-bundled-tool tradeoffs.
    - Run product/technology diligence on AI remediation quality, vulnerability-intelligence
      provenance, product telemetry, security architecture, incident history, and roadmap
      delivery.
    - Run legal diligence on corporate structure, IP ownership, OSS/data rights, customer
      contracts, DPAs/subprocessors, SOC2/ISO/FedRAMP evidence, insurance, employment,
      and litigation.

chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: >-
      Snyk is a late-stage private security-software unicorn with public valuation and
      funding signals but no public audited financial package, ARR bridge, gross-margin
      detail, cohort retention, cap table, debt schedule, or runway disclosure.
    founder_claim_ids: [FC-001, FC-003]
    evidence_claim_ids: [EC-001, EC-003, EC-005, EC-015]
    risk_ids: [R-001, R-002]
    sections:
      - section_id: I.A
        title: Historical financial statements and quality of earnings
        checklist_question_ids: [I.A.1, I.A.2, I.A.3]
        summary: Secondary sources report revenue and loss, but audited financials,
          ARR, margin, burn, and cash conversion are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: A secondary source reports 2023 revenue of $220M and net loss of
              $176M, but this run did not identify audited financial statements.
            evidence_claim_ids: [EC-003]
            risk_ids: [R-002]
          - finding_id: I.A-F2
            finding: ARR, NRR, GRR, gross margin, CAC payback, deferred revenue, cash
              runway, and cohort retention are not publicly verifiable.
            evidence_claim_ids: [EC-015]
            risk_ids: [R-001, R-002]
        hidden_risks:
          - Revenue quality or retention may differ materially from valuation assumptions.
          - Cash runway and financing contingency cannot be assessed from public sources.
        evidence_gaps:
          - Audited 2022-2025 financial statements, monthly management accounts, ARR bridge,
            deferred-revenue roll-forward, gross margin by product, and cash model.
        follow_up_questions:
          - Provide audited statements, management reporting packs, ARR/NRR by cohort,
            gross-margin bridge, CAC/payback analysis, and cash-burn forecast.
        table_ids: [T-002]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-015]
      - section_id: I.B
        title: Financing history and capitalization
        checklist_question_ids: [I.B.1, I.B.2, I.B.3]
        summary: Public sources support unicorn status and funding scale, but round
          documents and capitalization economics are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: CB Insights lists Snyk at $7.40B valuation in the unicorn tracker.
            evidence_claim_ids: [EC-001]
            risk_ids: [R-001]
          - finding_id: I.B-F2
            finding: CB Insights reports $1.247B total raised, but the preference stack,
              debt, side letters, option pool, and secondary transactions are not public.
            evidence_claim_ids: [EC-015]
            risk_ids: [R-001]
        hidden_risks:
          - A valuation below a prior peak signal could create employee-equity, preference,
            and exit-waterfall complexity.
        evidence_gaps:
          - Round documents, investor consents, option-pool detail, fully diluted
            capitalization, debt schedule, warrants, and liquidation preference stack.
        follow_up_questions:
          - Provide current and pro forma cap table, financing documents, investor-rights
            agreements, debt/credit agreements, warrant schedules, and option-pool history.
        table_ids: [T-001]
        figure_ids: [F-001, F-002]
        evidence_claim_ids: [EC-001, EC-015]

  - chapter_id: II
    title: Products
    chapter_summary: >-
      Snyk offers a broad developer-security platform covering code, open-source
      dependencies, containers, IaC, and application risk management. Product breadth is
      well evidenced by company pages; product-level ARR, usage, remediation efficacy,
      and AI governance remain private.
    founder_claim_ids: [FC-002, FC-003]
    evidence_claim_ids: [EC-004, EC-005, EC-006, EC-008]
    risk_ids: [R-003, R-004, R-010]
    sections:
      - section_id: II.A
        title: Product portfolio and core capabilities
        checklist_question_ids: [II.A.1, II.A.2, II.A.3]
        summary: Public product pages evidence a multi-module platform across SAST/code
          scanning, SCA/license risk, containers, IaC, and AppRisk.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Snyk publicly positions itself as an AI security company that helps
              secure code, dependencies, containers, and cloud infrastructure.
            evidence_claim_ids: [EC-004]
            risk_ids: [R-004]
          - finding_id: II.A-F2
            finding: Public product pages describe Snyk Code, Open Source, Container,
              IaC, and AppRisk modules.
            evidence_claim_ids: [EC-006]
            risk_ids: [R-003, R-004]
        hidden_risks:
          - Product breadth may mask uneven module adoption or weak attach rates.
          - AI remediation claims may create accuracy and liability exposure.
        evidence_gaps:
          - Product-level ARR, active projects/repos, scan volumes, false-positive rates,
            fix acceptance, SLA history, and roadmap delivery metrics.
        follow_up_questions:
          - Provide ARR by module, usage telemetry, remediation accuracy, false-positive
            rates, AI governance, incident history, and roadmap completion history.
        table_ids: [T-003]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-004, EC-006]
      - section_id: II.B
        title: Packaging, pricing, and buyer fit
        checklist_question_ids: [II.B.1, II.B.2]
        summary: Snyk discloses a Free, Team, Ignite, and Enterprise ladder, but
          discounting, utilization, and plan-level economics are not public.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.B-F1
            finding: Public plans include Free, Team, Ignite, and Enterprise, with
              Enterprise-specific compliance and data-residency options.
            evidence_claim_ids: [EC-005, EC-013]
            risk_ids: [R-002, R-006]
          - finding_id: II.B-F2
            finding: Public pages do not disclose ACV, discounting, utilization,
              paid-conversion rates, or module attach.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-002]
        hidden_risks:
          - Competitive discounting or low seat utilization could pressure revenue quality.
        evidence_gaps:
          - Contract-level pricing, discount bands, paid-seat utilization, SKU attach,
            overage economics, services revenue, and enterprise procurement terms.
        follow_up_questions:
          - Provide pricing waterfall, discount bands by segment, usage-to-entitlement
            analysis, packaging migration history, churn by plan, and expansion by SKU.
        table_ids: [T-004]
        figure_ids: []
        evidence_claim_ids: [EC-005, EC-013]

  - chapter_id: III
    title: Customer Information
    chapter_summary: >-
      Public customer evidence supports a broad enterprise security customer base with
      named examples and vendor-published outcomes. Customer concentration, retention,
      NPS, contract terms, renewal calendar, and reference quality remain private.
    founder_claim_ids: [FC-004]
    evidence_claim_ids: [EC-007, EC-008]
    risk_ids: [R-005, R-009]
    sections:
      - section_id: III.A
        title: Customers, case studies, and references
        checklist_question_ids: [III.A.1, III.A.2, III.A.3]
        summary: Snyk publicly cites hundreds of organizations and named customers, but
          ARR concentration and active status need direct validation.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Snyk customer pages cite hundreds of organizations and named logos
              including Skyscanner, Okta, ICE/NYSE, Labelbox, TechnologyOne, Komatsu,
              Snowflake, Spotify, Google, and AB InBev.
            evidence_claim_ids: [EC-007]
            risk_ids: [R-005]
          - finding_id: III.A-F2
            finding: Vendor-published outcomes are useful proof points but require direct
              customer confirmation and contract-level reconciliation.
            evidence_claim_ids: [EC-007]
            risk_ids: [R-005]
        hidden_risks:
          - Public logo evidence may include inactive, low-ARR, or narrow-scope accounts.
        evidence_gaps:
          - Customer-level ARR, top-20 concentration, renewal dates, churn history, NPS,
            support tickets, contract obligations, and reference permissions.
        follow_up_questions:
          - Provide top-50 customer ARR, renewal schedule, NRR/GRR cohorts, churn reasons,
            support history, NPS, and permissioned customer references.
        table_ids: [T-005]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-007]
      - section_id: III.B
        title: Partners, integrations, and supplier dependencies
        checklist_question_ids: [III.B.1, III.B.2, III.C.1]
        summary: Snyk has broad integration and partner evidence, which creates both
          distribution leverage and platform-dependency exposure.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: III.B-F1
            finding: Public integrations span source-code management, CI/CD, issue
              tracking, container registries, IDEs, and cloud ecosystems.
            evidence_claim_ids: [EC-008]
            risk_ids: [R-009]
          - finding_id: III.B-F2
            finding: Partner-sourced bookings, reseller economics, marketplace revenue,
              and API/platform change risk are not public.
            evidence_claim_ids: [EC-008]
            risk_ids: [R-009]
        hidden_risks:
          - API, marketplace, or platform-policy changes could affect workflow access or
            competitive positioning.
        evidence_gaps:
          - Partner pipeline/revenue, reseller contracts, marketplace performance,
            co-sell terms, supplier concentration, cloud spend, and subprocessor list.
        follow_up_questions:
          - Provide partner-sourced revenue, reseller terms, integration usage by account,
            API dependency map, cloud/infrastructure spend, and business continuity plans.
        table_ids: [T-006]
        figure_ids: []
        evidence_claim_ids: [EC-008]

  - chapter_id: IV
    title: Competition
    chapter_summary: >-
      Snyk operates in a crowded application-security and developer-security market
      spanning GitHub/GitLab-native tools, legacy AppSec vendors, cloud-security
      platforms, secrets scanners, and newer AI security entrants. Public evidence
      supports competitive breadth but not market share, win rates, or pricing pressure.
    founder_claim_ids: []
    evidence_claim_ids: [EC-006, EC-009]
    risk_ids: [R-003, R-004, R-010]
    sections:
      - section_id: IV.A
        title: Competitive set and market positioning
        checklist_question_ids: [IV.A.1, IV.A.2]
        summary: CB Insights and Snyk comparison pages identify a broad competitive set
          across platform-native, legacy AppSec, and specialized developer-security tools.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Snyk comparison pages target GitHub Advanced Security, GitLab, and
              Veracode; CB Insights names additional specialized competitors.
            evidence_claim_ids: [EC-009]
            risk_ids: [R-003]
          - finding_id: IV.A-F2
            finding: Snyk's public differentiation centers on developer workflow,
              remediation, AI, and platform breadth.
            evidence_claim_ids: [EC-006, EC-009]
            risk_ids: [R-003, R-004]
        hidden_risks:
          - Bundled tools from SCM and DevOps platforms may lower buyer willingness to
            pay for standalone developer-security products.
        evidence_gaps:
          - Market share, win/loss, competitor replacement source, discounting, proof-of-
            concept conversion, and analyst-report detail.
        follow_up_questions:
          - Provide win/loss by competitor, pipeline displacement data, discount approval
            logs, proof-of-concept conversion rates, and competitive churn reasons.
        table_ids: [T-007]
        figure_ids: [F-005]
        evidence_claim_ids: [EC-006, EC-009]
      - section_id: IV.B
        title: Basis of competition and pricing pressure
        checklist_question_ids: [IV.B.1, IV.B.2]
        summary: Competition likely centers on developer workflow depth, platform breadth,
          AI remediation quality, enterprise trust, and bundled-platform economics.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: IV.B-F1
            finding: Snyk has credible public platform breadth, but the report cannot
              verify win rates, market share, or competitive pricing pressure.
            evidence_claim_ids: [EC-006, EC-009]
            risk_ids: [R-003]
          - finding_id: IV.B-F2
            finding: AI-native code security and bundled SCM/DevOps security tools are
              material strategic threats requiring customer and win/loss diligence.
            evidence_claim_ids: [EC-009]
            risk_ids: [R-010]
        hidden_risks:
          - A large competitor could bundle enough security capability to cap Snyk pricing.
        evidence_gaps:
          - Competitive win-rate data, customer replacement maps, pricing benchmarks,
            buyer-budget wallet share, and competitor discounting.
        follow_up_questions:
          - Provide segmented win/loss, competitor pricing benchmarks, renewal discount
            analysis, roadmap response to GitHub/GitLab/Wiz/legacy suites, and buyer-budget
            analysis.
        table_ids: [T-008]
        figure_ids: []
        evidence_claim_ids: [EC-009]

  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: >-
      Snyk appears to combine developer-led adoption, freemium/low-friction plans,
      enterprise sales, partner/integration channels, and customer proof. The public
      channel map is credible, but pipeline conversion, sales efficiency, partner
      contribution, and demand-generation ROI are not public.
    founder_claim_ids: [FC-003, FC-004]
    evidence_claim_ids: [EC-005, EC-007, EC-008, EC-009, EC-013]
    risk_ids: [R-002, R-003, R-005, R-009]
    sections:
      - section_id: V.A
        title: Go-to-market motions
        checklist_question_ids: [V.A.1, V.A.2]
        summary: Public plans and integrations support product-led and developer-led entry
          with enterprise conversion paths.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: Free, Team, Ignite, and Enterprise plans support a developer-led to
              enterprise GTM ladder.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-002]
          - finding_id: V.A-F2
            finding: Customer pages and integrations support enterprise credibility and
              workflow-led distribution, but channel contribution is not public.
            evidence_claim_ids: [EC-007, EC-008]
            risk_ids: [R-005, R-009]
        hidden_risks:
          - Sales productivity or partner contribution may be weaker than implied by
            product and logo breadth.
        evidence_gaps:
          - Sales headcount by segment, pipeline source, conversion rates, partner-sourced
            bookings, average sales cycle, and enterprise seat utilization.
        follow_up_questions:
          - Provide pipeline source mix, funnel conversion, ACV and sales cycle by segment,
            partner-sourced ARR, win-rate by channel, self-serve-to-enterprise conversion,
            and sales capacity plan.
        table_ids: [T-009]
        figure_ids: [F-006]
        evidence_claim_ids: [EC-005, EC-007, EC-008]
      - section_id: V.B
        title: Marketing signals and enterprise procurement
        checklist_question_ids: [V.B.1, V.B.2, V.C.1]
        summary: Category positioning, comparison pages, customer proof, and compliance
          claims support enterprise demand generation but not conversion economics.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.B-F1
            finding: Snyk's "AI security company" positioning and competitor comparison
              pages suggest high-intent category marketing.
            evidence_claim_ids: [EC-004, EC-009]
            risk_ids: [R-003]
          - finding_id: V.B-F2
            finding: Enterprise procurement likely depends on compliance and security
              evidence that is only summarized publicly.
            evidence_claim_ids: [EC-013]
            risk_ids: [R-006]
        hidden_risks:
          - Enterprise redlines, DPAs, and security exceptions may slow sales cycles or
            increase liability exposure.
        evidence_gaps:
          - Marketing spend, MQL-to-SQL conversion, channel CAC, event ROI, brand-search
            trends, procurement redlines, and security exception logs.
        follow_up_questions:
          - Provide demand-generation spend by channel, source-to-close attribution, CAC by
            channel, web conversion, procurement redlines, and security exception history.
        table_ids: [T-010]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-009, EC-013]

  - chapter_id: VI
    title: Research and Development
    chapter_summary: >-
      Snyk product pages and IP signals indicate ongoing R&D investment in AI-assisted
      developer security, AppRisk, SCA, containers, and IaC. Public sources do not disclose
      engineering headcount allocation, model governance, vulnerability-research process,
      roadmap commitments, or R&D accounting.
    founder_claim_ids: [FC-002]
    evidence_claim_ids: [EC-004, EC-006, EC-014]
    risk_ids: [R-004, R-007, R-010]
    sections:
      - section_id: VI.A
        title: R&D organization and product pipeline
        checklist_question_ids: [VI.A.1, VI.A.2]
        summary: Public product pages show a multi-module R&D surface, but technical
          execution and roadmap evidence remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.A-F1
            finding: Snyk's public R&D surface spans code, dependency/license, container,
              IaC, AppRisk, and AI remediation workflows.
            evidence_claim_ids: [EC-006]
            risk_ids: [R-004, R-010]
          - finding_id: VI.A-F2
            finding: The public roadmap does not disclose delivery confidence, technical
              debt, AI safety validation, or R&D spend allocation.
            evidence_claim_ids: [EC-006]
            risk_ids: [R-004, R-010]
        hidden_risks:
          - Weak model governance or vulnerability-intelligence provenance could undermine
            customer trust.
        evidence_gaps:
          - Engineering headcount by module, R&D budget, roadmap burnup, technical-debt
            backlog, model governance, and vulnerability-research process.
        follow_up_questions:
          - Provide R&D headcount by team, roadmap and delivery metrics, AI/model
            governance, vulnerability-research process, technical-debt register, product
            incident history, and R&D capitalization policy.
        table_ids: [T-011]
        figure_ids: [F-007]
        evidence_claim_ids: [EC-006]
      - section_id: VI.B
        title: Technology defensibility and intellectual property
        checklist_question_ids: [VI.B.1, VI.B.2, VI.D.1]
        summary: Public IP signals exist, but patents, trademarks, assignments, OSS
          obligations, and AI/data rights require legal/technical review.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.B-F1
            finding: CB Insights reports 9 patents and Justia shows Snyk-related marks.
            evidence_claim_ids: [EC-014]
            risk_ids: [R-007]
          - finding_id: VI.B-F2
            finding: No patent-claim chart, invention assignment review, open-source
              license audit, trade-secret process, or AI training-data rights review was
              available.
            evidence_claim_ids: [EC-014]
            risk_ids: [R-007, R-010]
        hidden_risks:
          - OSS or data-rights gaps could affect a developer-security business that scans
            code and depends on vulnerability intelligence.
        evidence_gaps:
          - Patent applications, assignment history, employee invention agreements, OSS
            license scans, third-party code provenance, AI training-data rights, and
            trade-secret procedures.
        follow_up_questions:
          - Provide patent portfolio report, invention assignments, OSS license audit,
            AI training-data provenance, security research IP ownership, third-party code
            provenance, and litigation/non-infringement analysis.
        table_ids: [T-012]
        figure_ids: []
        evidence_claim_ids: [EC-014]

  - chapter_id: VII
    title: Management and Personnel
    chapter_summary: >-
      Snyk has public evidence of scale, global offices, a 1,000+ employee base, and a
      current leadership roster. A notable diligence item is leadership transition because
      current Snyk pages list Ken MacAskill as interim CEO/CFO while some secondary
      sources may still show prior CEO information.
    founder_claim_ids: [FC-005]
    evidence_claim_ids: [EC-003, EC-004, EC-010, EC-011, EC-012]
    risk_ids: [R-008]
    sections:
      - section_id: VII.A
        title: Leadership team and board
        checklist_question_ids: [VII.A.1, VII.A.2]
        summary: Current Snyk leadership pages list an interim CEO/CFO and a senior
          leadership roster; board pages list founder and investor/operator directors.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: VII.A-F1
            finding: Snyk lists Ken MacAskill as Chief Executive Officer & CFO and
              describes him as interim CEO.
            evidence_claim_ids: [EC-011]
            risk_ids: [R-008]
          - finding_id: VII.A-F2
            finding: The board page lists Guy Podjarny as Chairman & Founder and includes
              several operator/investor directors and advisors.
            evidence_claim_ids: [EC-012]
            risk_ids: [R-008]
        hidden_risks:
          - Interim CEO/CFO role combination can create succession, bandwidth, retention,
            and customer-confidence questions.
        evidence_gaps:
          - Board minutes, succession plan, executive employment agreements, compensation,
            retention grants, option repricing, and key-person insurance.
        follow_up_questions:
          - Provide management org chart, succession plan, executive agreements,
            compensation/retention plan, board minutes for CEO transition, key-person
            coverage, and option refresh/repricing details.
        table_ids: [T-013]
        figure_ids: [F-008, F-009]
        evidence_claim_ids: [EC-011, EC-012]
      - section_id: VII.B
        title: Headcount, hiring, and geographic footprint
        checklist_question_ids: [VII.B.1, VII.B.2, VII.C.1]
        summary: Snyk states it has a global team over 1,000 employees and global offices;
          a secondary 2022 employee count should be reconciled to current headcount.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VII.B-F1
            finding: Current Snyk careers language says the company has a global team of
              over 1,000 employees.
            evidence_claim_ids: [EC-010]
            risk_ids: [R-008]
          - finding_id: VII.B-F2
            finding: A secondary source reports 1,400 employees in 2022, creating a trend
              ambiguity that requires company confirmation.
            evidence_claim_ids: [EC-003, EC-010]
            risk_ids: [R-008]
        hidden_risks:
          - The apparent gap between 2022 and current public headcount anchors could
            reflect layoffs, stale data, contractor definitions, or changed disclosure.
        evidence_gaps:
          - Actual headcount by function/region, contractor count, attrition, hiring plan,
            office commitments, layoffs/restructuring history, and employee claims.
        follow_up_questions:
          - Provide headcount bridge, attrition and regretted-loss data, contractor/vendor
            population, hiring plan, restructuring history, office leases, and employee
            engagement survey summaries.
        table_ids: [T-014]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-004, EC-010]

  - chapter_id: VIII
    title: Legal and Related Matters
    chapter_summary: >-
      Snyk is an active private company with public privacy, terms, security, compliance,
      and trademark evidence. No legal clearance should be inferred: litigation, customer
      obligations, employment matters, IP chain of title, DPAs, subprocessors, insurance,
      sanctions/export controls, and regulatory correspondence require private review.
    founder_claim_ids: [FC-005, FC-006]
    evidence_claim_ids: [EC-002, EC-013, EC-014, EC-016]
    risk_ids: [R-006, R-007]
    sections:
      - section_id: VIII.A
        title: Corporate status, litigation, and entity structure
        checklist_question_ids: [VIII.A.1, VIII.B.1, VIII.B.2]
        summary: Companies House confirms SNYK LIMITED is active, but global entity
          structure, litigation, claims, insurance, and change-of-control consents are not
          public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: VIII.A-F1
            finding: SNYK LIMITED is an active UK private limited company incorporated on
              2015-07-09.
            evidence_claim_ids: [EC-002]
            risk_ids: [R-007]
          - finding_id: VIII.A-F2
            finding: Accessible public sources reviewed in this run did not provide
              comprehensive litigation or dispute clearance.
            evidence_claim_ids: [EC-016]
            risk_ids: [R-006, R-007]
        hidden_risks:
          - Unseen disputes, indemnity claims, insurance exclusions, or entity-level
            consent rights could affect transaction risk.
        evidence_gaps:
          - Full entity org chart, charter documents, board/investor consents, litigation
            dockets, settlement agreements, insurance policies, loss runs, and claims logs.
        follow_up_questions:
          - Provide entity chart, constitutional documents, board minutes/consents,
            investor approval rights, counsel-run docket searches, claims register,
            settlements, insurance policies, and loss runs.
        table_ids: [T-015]
        figure_ids: [F-010]
        evidence_claim_ids: [EC-002, EC-016]
      - section_id: VIII.B
        title: IP, privacy, security, and regulatory obligations
        checklist_question_ids: [VIII.C.1, VIII.D.1, VIII.F.1, VIII.G.1]
        summary: Public sources show trademarks/patent signals and compliance/security
          posture claims, but detailed IP, OSS, DPA, audit, incident, and regulatory
          materials require private review.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.B-F1
            finding: Justia and CB Insights provide public IP signals, including
              Snyk-related trademarks and a reported patent count.
            evidence_claim_ids: [EC-014]
            risk_ids: [R-007]
          - finding_id: VIII.B-F2
            finding: Snyk public pages reference encryption, SOC 2 Type II, GDPR, ISO
              27001/27017, FedRAMP options, and data residency, but audit packages and
              customer-specific obligations are not public.
            evidence_claim_ids: [EC-013, EC-016]
            risk_ids: [R-006]
        hidden_risks:
          - Code scanning, vulnerability intelligence, and AI remediation create sensitive
            data, IP, privacy, and contractual risk surfaces.
        evidence_gaps:
          - Patent/trademark files, IP assignments, OSS audit, AI/data rights, SOC2/ISO
            evidence, FedRAMP package, DPAs, subprocessor list, incident history, export
            controls, and regulated-customer obligations.
        follow_up_questions:
          - Provide IP schedule, assignment agreements, OSS compliance audit, data licenses,
            AI input/output policies, SOC 2/ISO/FedRAMP evidence, DPAs, subprocessors,
            incident logs, and export-control assessment.
        table_ids: [T-016]
        figure_ids: [F-011]
        evidence_claim_ids: [EC-013, EC-014, EC-016]

