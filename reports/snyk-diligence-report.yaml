risk_register:
  - risk_id: R-001
    risk_title: Valuation, preference-stack, and financing opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: CB Insights shows a $7.40B current valuation and $1.247B total raised,
      while secondary evidence reports a prior $8.5B valuation. Without round documents,
      preference stack, secondary-sale detail, and runway data, investor-return and
      employee-equity implications cannot be assessed.
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.B]
    evidence_claim_ids: [EC-001, EC-003, EC-015]
    mitigation_or_diligence_request: Review full cap table, round documents, liquidation
      preferences, debt/warrants, secondaries, cash runway, and board financing plan.
  - risk_id: R-002
    risk_title: Revenue quality, profitability, and SaaS unit economics are not public
    risk_category: financial
    severity: high
    likelihood: medium
    description: Secondary public revenue/loss figures are not enough to validate ARR
      quality, margin profile, retention, CAC, payback, or cash conversion.
    impacted_chapter_ids: [I, II, V]
    impacted_section_ids: [I.A, II.B, V.A]
    evidence_claim_ids: [EC-003, EC-005, EC-015]
    mitigation_or_diligence_request: Obtain audited statements, ARR bridge, cohort
      retention, gross-margin waterfall, CAC/payback, billings/collections, and cash-flow model.
  - risk_id: R-003
    risk_title: Crowded AppSec/developer-security competition may pressure growth and pricing
    risk_category: market
    severity: high
    likelihood: high
    description: Snyk competes against platform-native tooling, legacy AppSec suites,
      CNAPP/ASPM vendors, secrets scanners, and AI security entrants.
    impacted_chapter_ids: [II, IV, V]
    impacted_section_ids: [II.A, IV.A, IV.B, V.B]
    evidence_claim_ids: [EC-009]
    mitigation_or_diligence_request: Review win/loss, competitor displacement, pricing
      and discounts, analyst reports, and churn reasons by competitor.
  - risk_id: R-004
    risk_title: AI and remediation efficacy must be proven quantitatively
    risk_category: product
    severity: medium
    likelihood: medium
    description: Public product claims establish product modules and AI positioning, but
      not false-positive rates, model governance, fix acceptance, or customer outcome repeatability.
    impacted_chapter_ids: [II, VI]
    impacted_section_ids: [II.A, VI.A]
    evidence_claim_ids: [EC-004, EC-006]
    mitigation_or_diligence_request: Review product telemetry, scan/fix benchmarks, AI
      model governance, incident history, and reference calls.
  - risk_id: R-005
    risk_title: Customer concentration and retention are opaque
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named customers and case studies support enterprise traction, but
      account-level ARR, renewal dates, churn, NRR, and logo-rights status are not public.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, V.A]
    evidence_claim_ids: [EC-007]
    mitigation_or_diligence_request: Request top-customer ARR, renewal schedule, churn logs,
      NRR/GRR cohorts, and direct references.
  - risk_id: R-006
    risk_title: Privacy, security, and regulated-enterprise obligations require document review
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Public pages cite compliance and security posture, but audit reports,
      DPAs, subprocessors, incident history, and customer-specific exceptions are private.
    impacted_chapter_ids: [V, VIII]
    impacted_section_ids: [V.B, VIII.A, VIII.B]
    evidence_claim_ids: [EC-013, EC-016]
    mitigation_or_diligence_request: Review SOC2/ISO/FedRAMP evidence, DPAs, subprocessors,
      incident/breach logs, export-control analysis, and regulated-customer contracts.
  - risk_id: R-007
    risk_title: IP chain of title and litigation clearance are incomplete from public sources
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Trademark/patent signals exist, but patent scope, assignments, OSS
      obligations, litigation, settlements, and infringement exposure are not public.
    impacted_chapter_ids: [VI, VIII]
    impacted_section_ids: [VI.B, VIII.A, VIII.B]
    evidence_claim_ids: [EC-014, EC-016]
    mitigation_or_diligence_request: Counsel should review IP assignments, OSS scans,
      patent/trademark files, litigation dockets, settlements, and infringement opinions.
  - risk_id: R-008
    risk_title: Leadership transition and workforce trend ambiguity
    risk_category: team
    severity: medium
    likelihood: medium
    description: Snyk currently lists an interim CEO/CFO, while headcount public anchors
      differ between a 2022 secondary count and current careers language.
    impacted_chapter_ids: [VII]
    impacted_section_ids: [VII.A, VII.B]
    evidence_claim_ids: [EC-003, EC-010, EC-011, EC-012]
    mitigation_or_diligence_request: Review CEO succession, executive retention, headcount
      bridge, attrition, restructuring, and employee morale data.
  - risk_id: R-009
    risk_title: Integration and platform dependency exposure
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Snyk derives product value from many external developer/cloud ecosystems
      whose API, marketplace, or policy changes could affect workflows.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.B, V.A]
    evidence_claim_ids: [EC-008]
    mitigation_or_diligence_request: Review integration usage, partner contracts, platform
      API risk, marketplace dependence, and contingency plans.
  - risk_id: R-010
    risk_title: Fast-moving AI security threat landscape
    risk_category: technical
    severity: high
    likelihood: high
    description: AI-assisted development and attacker automation can both increase demand
      and accelerate product-obsolescence risk if Snyk remediation accuracy or coverage lags.
    impacted_chapter_ids: [II, IV, VI]
    impacted_section_ids: [II.A, IV.B, VI.A, VI.B]
    evidence_claim_ids: [EC-004, EC-006, EC-009, EC-014]
    mitigation_or_diligence_request: Evaluate AI roadmap, model/data rights, accuracy
      benchmarks, security research cadence, and competitive AI-native alternatives.

diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and quality-of-earnings detail.
    why_it_matters: Needed to validate reported revenue/loss, recurring revenue quality,
      cash conversion, and profitability path.
    suggested_source_or_request: Audited statements, management accounts, QoE schedule,
      EBITDA bridge, and revenue-recognition memo.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Cap table, preference stack, debt, secondaries, and runway.
    why_it_matters: Valuation and exit outcomes depend on financing terms and capital structure.
    suggested_source_or_request: Cap table, financing documents, debt/warrants, side
      letters, secondary ledger, option pool, and cash-runway model.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level usage, ARR, false positives, remediation acceptance,
      and AI-evaluation metrics.
    why_it_matters: Product breadth alone does not prove customer value, retention, or
      technology defensibility.
    suggested_source_or_request: Telemetry by module, scan/fix benchmarks, language
      coverage, AI governance, incident history, and roadmap delivery metrics.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Customer concentration, renewal schedule, NRR/GRR, churn, support
      issues, and direct references.
    why_it_matters: Enterprise SaaS valuation depends on durable renewals and expansion in top accounts.
    suggested_source_or_request: Top-50 ARR, renewal calendar, cohort retention, churn
      reasons, support ticket trends, NPS, and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, market share, competitor pricing, and buyer-budget share.
    why_it_matters: Bundled SCM/DevOps and cloud/AppSec platforms could pressure growth and pricing.
    suggested_source_or_request: Win/loss by competitor, discount logs, analyst reports,
      replacement maps, and competitive churn analysis.
    priority: high
  - gap_id: G-006
    chapter_id: V
    section_id: V.A
    missing_information: Pipeline source mix, CAC, sales cycle, conversion rates,
      partner-sourced bookings, and marketing ROI.
    why_it_matters: Growth efficiency and channel scalability determine late-stage SaaS durability.
    suggested_source_or_request: Sales/marketing funnel, channel attribution, CAC/payback,
      partner revenue, conversion, and sales capacity model.
    priority: medium
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: IP assignments, patent details, OSS license compliance, data rights,
      and AI training/use rights.
    why_it_matters: Developer-security products often rely on code/data/vulnerability
      intelligence where ownership and license compliance are critical.
    suggested_source_or_request: IP schedule, assignment chain, patent/trademark files,
      OSS audit, data licenses, AI policies, and FTO review.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.A
    missing_information: Executive succession, retention, compensation, option repricing,
      and board minutes.
    why_it_matters: Interim CEO/CFO status and possible headcount trend ambiguity raise
      continuity diligence questions.
    suggested_source_or_request: Succession plan, executive agreements, retention plan,
      board minutes, headcount bridge, and attrition history.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, threatened claims, settlements, indemnity notices,
      and insurance loss runs.
    why_it_matters: Unseen disputes can affect valuation, indemnities, and closing risk.
    suggested_source_or_request: Counsel docket search, claims register, settlements,
      demand letters, insurance policies, and loss runs.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.B
    missing_information: SOC2/ISO/FedRAMP evidence, DPAs, subprocessors, security incidents,
      breach history, and regulated-customer obligations.
    why_it_matters: Snyk handles sensitive code/security data and sells to
      enterprise/security-conscious buyers.
    suggested_source_or_request: Audit reports/certificates, DPAs, subprocessor list,
      incident logs, security exceptions, export-control and privacy assessments.
    priority: high

