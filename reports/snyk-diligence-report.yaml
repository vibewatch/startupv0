report_metadata:
  report_title: Snyk Public-Source Startup Diligence Report
  target_company: Snyk
  website: "https://snyk.io/"
  known_aliases:
    - Snyk Limited
    - SNYK LIMITED
    - Snyk, Inc.
    - DeepCode
    - Fugue
    - Probely
  sector: Enterprise Tech; developer security; AI application security; software supply-chain security
  geography: United States headquarters in Boston with UK legal entity and global offices
  company_stage: Late-stage private unicorn
  research_date: 2026-05-16
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built covered slugs from reports/*-diligence-report.yaml and selected one uncovered
      unicorn at random from a current public CB Insights unicorn list after excluding
      covered companies.
    - >
      Prioritized public primary sources: Snyk product, pricing, customer, security,
      privacy, terms, careers, leadership, board, integrations, and partner pages.
    - Used Companies House for UK corporate status; CB Insights and Wikipedia for
      market, valuation, financing, and company context; Justia for trademark signals.
    - Treated vendor-published customer stories and comparison pages as useful but not
      independently confirmed evidence.
    - Marked private financials, customer-level ARR, cap table, contracts, litigation
      clearance, security audit reports, and HR data as not publicly verifiable rather
      than inferring.
  included_jurisdictions:
    - United States
    - United Kingdom
    - European Union
    - Israel
    - Global enterprise software markets
  excluded_topics:
    - No private financial statements, ARR schedules, customer contracts, cap table,
      board materials, debt documents, security audit reports, DPAs, or employee records
      were available.
    - No paid database access, court-docket downloads, patent file-wrapper review, or
      customer/management interviews were conducted.
    - Blocked, inaccessible, stale, or 404 pages were not used as affirmative evidence
      except as limitations.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-16
      notes: The user requested one randomly selected uncovered private unicorn diligence
        report and a draft pull request.

founder_claims:
  - founder_claim_id: FC-001
    claim_text: Snyk is a private unicorn valued at $7.40B in the current CB Insights
      unicorn tracker.
    claim_source: CB Insights unicorn list
    claim_date: null
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.B]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001]
    contradiction_summary: null
    diligence_follow_up:
      - Validate valuation methodology and last priced-round terms against financing
        documents.
  - founder_claim_id: FC-002
    claim_text: Snyk is an AI security company helping organizations secure code,
      dependencies, containers, and cloud infrastructure.
    claim_source: Snyk about and product pages
    claim_date: null
    mapped_chapter_ids: [II]
    mapped_section_ids: [II.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-004, EC-006]
    contradiction_summary: null
