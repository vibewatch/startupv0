executive_summary:
  overall_assessment: Anysphere/Cursor has unusually strong public growth and financing signals for a private AI developer-tools company, including a public $2.3B Series D at a $29.3B post-money valuation and company-reported $1B+ annualized revenue. The diligence posture should be positive on public traction but conservative on valuation quality until audited revenue, gross margin, retention, model-cost exposure, code/privacy controls, and customer concentration are validated.
  investment_or_diligence_thesis: The central diligence question is whether Cursor can convert rapid AI-coding adoption into durable, secure, high-gross-margin enterprise software revenue while managing model-provider dependency, code-data privacy/IP risk, and intense competition from copilots, IDE vendors, and frontier model providers.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and Cursor's Series D release support the $29.3B private-unicorn valuation.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Company-owned pages and the Series D release support Cursor's AI developer-platform positioning.
      evidence_claim_ids:
        - EC-003
        - EC-014
    - founder_claim_id: FC-004
      summary: Security, privacy, and pricing pages support enterprise controls such as SOC 2 availability, SSO/SCIM, Privacy Mode, and audit logs.
      evidence_claim_ids:
        - EC-004
        - EC-006
        - EC-015
  biggest_risks:
    - risk_id: R-001
      summary: The $29.3B valuation and $2.3B Series D are public, but audited revenue, gross margin, cash, debt, burn, runway, and financing terms are not publicly verifiable.
    - risk_id: R-002
      summary: ARR and adoption claims are company-reported; customer concentration, NRR, churn, contract terms, discounts, and support burden require data-room validation.
    - risk_id: R-003
      summary: Cursor depends on frontier model access, inference economics, model-provider policies, and internal model quality while serving sensitive code workflows.
  key_evidence_gaps:
    - Audited financials, ARR definition, gross margin, model/inference cost, cash, burn, runway, debt, and financing terms.
    - Customer list, top-account concentration, NRR, churn, usage, contract terms, security exceptions, and reference calls.
    - Model-provider contracts, data-flow maps, SOC report, DPA, incident history, subprocessor terms, and privacy-mode enforcement evidence.
    - Current org chart, HRIS, attrition, compensation, board composition, succession plan, and key-person risk.
  recommended_next_steps:
    - Run financial-quality diligence around ARR recognition, gross margin after model costs, cash/burn/runway, and revenue concentration.
    - Review customer cohorts, top enterprise contracts, renewal/expansion trends, and security questionnaires.
    - Assess model-provider contracts, fallback strategy, eval quality, code-data handling, SOC report, and privacy controls.
    - Benchmark win/loss and switching costs against GitHub Copilot, IDE vendors, Codeium/Windsurf, Replit, Sourcegraph, and model-native tools.

