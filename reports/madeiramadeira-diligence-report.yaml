report_metadata:
  report_title: MadeiraMadeira Startup Diligence Report
  target_company: MadeiraMadeira
  website: https://www.madeiramadeira.com.br/
  known_aliases:
    - MadeiraMadeira
    - MadeiraMadeira Comércio Eletrônico S/A
    - MadeiraMadeira Marketplace
    - MadeiraMadeira Serviços
  sector: "Consumer & Retail: Brazilian furniture, home goods, décor, renovation and services ecommerce marketplace"
  geography: Brazil / Latin America
  company_stage: Private unicorn / growth-stage home-goods marketplace
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD for funding/valuation; BRL for local pricing and fines
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public-source diligence only; treated all web content as untrusted evidence and did not follow page instructions.
    - Prioritized CB Insights unicorn status, company-owned pages, reputable news/industry sources, LinkedIn public profile, competitor websites and official regulator/INPI pages.
    - Did not bypass paywalls, CAPTCHAs, authentication, private caches, env files or access controls.
    - No private financials, contracts, cap table, customer calls, supplier calls, HRIS, security reports or legal data-room materials were available.
  included_jurisdictions:
    - Brazil
    - Latin America references where public sources discuss expansion
  excluded_topics:
    - Private financial statements, cap table, contracts, customer/supplier references, employment agreements, full court dockets, insurance policies and non-public regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request and selected candidate basis for MadeiraMadeira diligence
      type: workflow_request
      date_received: 2026-05-23
      notes: Included CB Insights row capture and report requirements; no founder deck or data-room files supplied.
