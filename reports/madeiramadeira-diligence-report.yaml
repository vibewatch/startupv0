executive_summary:
  overall_assessment: "MadeiraMadeira appears eligible for a public-source private-unicorn diligence report: CB Insights lists the company as a current $1B Brazilian Consumer & Retail unicorn, and company/news sources show active ecommerce, marketplace, app, services, logistics and guide-shop operations. Core investment diligence remains unresolved because financials, cap table, unit economics, customer/seller concentration, contracts, HRIS and legal schedules are private."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The investment case depends on proving that broad home-goods assortment, marketplace supply, logistics, services and app/guide-shop channels can generate durable gross margin and repeat demand while controlling delivery/regulatory risk after public restructuring and Procon exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists MadeiraMadeira as a $1B private unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company-owned pages show active storefront, marketplace, app, services and guide-shop channels.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-006
        - EC-007
        - EC-008
    - founder_claim_id: FC-006
      summary: MPMG/Procon-MG public notice verifies a consumer-delivery administrative fine.
      evidence_claim_ids:
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation support are opaque.
    - risk_id: R-003
      summary: Marketplace/logistics execution has consumer-law exposure.
    - risk_id: R-004
      summary: Brazilian home-goods ecommerce competition is intense and promotion-heavy.
  key_evidence_gaps:
    - Audited financials, GMV/revenue, gross margin, cash/debt, working capital and forecast model.
    - Cap table, preferences, debt, option pool and financing documents.
    - Customer cohorts, repeat purchase, refunds, seller/supplier concentration and logistics SLA.
    - HRIS, attrition, severance, compensation and equity-plan data after reported restructuring.
    - Counsel schedules for Procon status, litigation, IP, privacy, insurance and material contracts.
  recommended_next_steps:
    - Run financial/quality-of-revenue diligence before relying on the $1B valuation.
    - Test fulfillment, seller and consumer-complaint remediation with operating data and counsel.
    - Benchmark competition and promotions by category, price, CAC and contribution margin.
    - Obtain HRIS/legal/IP/contract data-room materials and run targeted management interviews.
