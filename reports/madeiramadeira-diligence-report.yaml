risk_register:
  - risk_id: R-001
    risk_title: Financial quality and valuation support are opaque
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public sources confirm a $1B unicorn-list valuation but do not verify current revenue, GMV, gross margin, cash, debt, burn, cohorts or 2026 valuation support.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Require audited statements, monthly KPI pack, bank/debt schedules, gross-margin bridge, cohort analysis and valuation materials.
  - risk_id: R-002
    risk_title: Cap table, preferences and dilution are unknown
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Investors and rounds are public, but shareholdings, preferences, warrants, debt and option-pool terms are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request cap table, charter/bylaws, stock purchase agreements, side letters, option plan and debt documents.
  - risk_id: R-003
    risk_title: Marketplace/logistics execution can create consumer and regulatory exposure
    risk_category: operational
    severity: high
    likelihood: medium
    description: Public sources show marketplace sellers/logistics complexity and an official Procon-MG fine for non-delivery/offer breach.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.E
      - V.A
      - VIII.G
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Review seller SLAs, delivery KPIs, claims/refunds, supplier contracts, Procon status and fulfillment remediation plan.
  - risk_id: R-004
    risk_title: Competitive pricing and assortment pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Mobly, Westwing and Tok&Stok publicly offer overlapping furniture/decor categories, while MadeiraMadeira uses discounts, cashback and broad assortment to compete.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Benchmark win/loss, price index, contribution margin by category, CAC, SEO/app mix and competitor promotion intensity.
  - risk_id: R-005
    risk_title: Team restructuring and morale/retention risk
    risk_category: team
    severity: medium
    likelihood: high
    description: Exame reported a 10% reduction from a 2,000-person team and third workforce cut in 18 months, even as the company hires executives and functions.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.G
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Request HRIS headcount, regretted attrition, engagement survey, severance liabilities, key-person retention and hiring plan.
  - risk_id: R-006
    risk_title: Services/private-label/superapp expansion execution risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Public roadmap expands into services, private label, app retention, possible internationalization and larger catalog scale, increasing execution complexity.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Review product roadmap, service-provider contracts, attach rates, unit economics, launch gates and capital allocation.
  - risk_id: R-007
    risk_title: Consumer-law and regulatory remediation risk
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: The Procon-MG fine shows a public regulatory matter connected to delivery and marketplace responsibility.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Obtain counsel status memo, recurrence metrics, regulator correspondence and compliance controls.
  - risk_id: R-008
    risk_title: IP, privacy, insurance and material-contract gaps
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Legal identity and privacy page are public, but IP extracts, material contracts, insurance and complete litigation schedules were not obtained.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.D
      - VIII.E
      - VIII.F
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Request official INPI/IP extracts, DPA/LGPD artifacts, contract schedule, insurance policies and litigation/regulatory schedules.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly KPI pack, revenue/GMV, gross margin, cash, debt and AR aging.
    why_it_matters: Needed to test valuation, runway, profitability and working-capital risk.
    suggested_source_or_request: Finance data room from CFO/accountants.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, liquidation preferences, option pool, warrants, debt and side letters.
    why_it_matters: Determines ownership, dilution and financing risk.
    suggested_source_or_request: Corporate records and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer cohorts, repeat purchase, churn/retention, refunds, NPS and revenue concentration.
    why_it_matters: Public customer counts do not prove revenue quality.
    suggested_source_or_request: Customer data warehouse export and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Seller/supplier concentration, contracts, purchase amounts and logistics SLA.
    why_it_matters: Marketplace and delivery risk can drive consumer claims and margin leakage.
    suggested_source_or_request: Seller/vendor master files and logistics contracts.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Market share, price index, win/loss, competitor traffic and category-level contribution margin.
    why_it_matters: Competition appears intense from public category overlap.
    suggested_source_or_request: Commercial diligence, web analytics and pricing scrape.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.A
    missing_information: CAC, ROAS, app retention, channel GMV/revenue mix, store P&L and marketing budget.
    why_it_matters: Promotional and omnichannel model may be expensive.
    suggested_source_or_request: Growth analytics, finance and store operations files.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: Board-approved roadmap, R&D budget, services/private-label economics and launch metrics.
    why_it_matters: Superapp/services/private-label ambitions may stretch capital and execution.
    suggested_source_or_request: Product roadmap, OKRs, budget and unit economics.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS headcount, turnover, severance, engagement, compensation and equity plan data.
    why_it_matters: Public layoffs and hiring create retention/execution risk.
    suggested_source_or_request: HRIS exports and people-ops data room.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Procon-MG fine status, remediation plan, consumer complaints trend and regulator correspondence.
    why_it_matters: Public enforcement matter ties directly to operations and consumer law.
    suggested_source_or_request: Counsel memo and customer operations dashboards.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official trademark/patent extracts, IP assignments, OSS/SaaS license inventory and material contracts.
    why_it_matters: IP ownership, data/privacy and contract liabilities are not publicly resolved.
    suggested_source_or_request: Counsel-prepared legal/IP schedules.
    priority: medium
