report_metadata:
  report_title: Clear Street Startup Diligence Report
  target_company: Clear Street
  website: https://www.clearstreet.io/
  known_aliases:
    - Clear Street
    - Clear Street LLC
    - Clear Street UK Limited
    - Clear Street Derivatives LLC
    - Clear Street FCM
    - Clear Street Canada Inc.
    - Clear Street Europe
  sector: Financial services, cloud-native brokerage, clearing, custody, financing and capital-markets infrastructure
  geography: United States / New York headquarters with public office footprint across North America, Europe, Asia and Israel
  company_stage: Private unicorn / growth-stage regulated financial infrastructure company
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Built the unicorn eligibility anchor from CB Insights and active company-owned sources.
    - Prioritized company website, about, services, clients, Studio, careers, newsroom and regulatory disclosure pages; inaccessible pages are listed as limitations.
    - Separated company-published metrics from independently verifiable facts and marked private financial, customer, legal and HR items as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - United Kingdom
    - Canada
    - European operations
    - Singapore
    - India
    - Israel
  excluded_topics:
    - Private data-room materials, audited financials, customer contracts, regulatory correspondence, legal dockets, counsel letters, security reports, HRIS exports and customer calls were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for random unicorn diligence report
      type: workflow_request
      date_received: 2026-05-24
      notes: No pitch deck, financial model, data room, founder claims or private documents were supplied.
