risk_register:
  - risk_id: R-001
    risk_title: Financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Audited financials, ARR/revenue, gross margin, cash, burn, debt, regulatory capital and runway are not public despite large operating-scale claims.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
    evidence_claim_ids: *a17
    mitigation_or_diligence_request: Request audited financials, management accounts, revenue bridge, product margins, regulatory capital reports, cash/debt schedule and forecast model.
  - risk_id: R-002
    risk_title: Regulatory and clearing/FCM exposure
    risk_category: regulatory
    severity: high
    likelihood: high
    description: Broker-dealer, FCM, UK FCA/LME and international operations create capital, compliance, customer-asset, supervision and enforcement risks.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
    evidence_claim_ids: *a18
    mitigation_or_diligence_request: Obtain regulator extracts, examination correspondence, enforcement searches, capital reports, compliance policies, surveillance records and counsel letters.
  - risk_id: R-003
    risk_title: Customer and balance concentration opacity
    risk_category: customer
    severity: high
    likelihood: medium
    description: Aggregate client and balance metrics are public, but top-account concentration, customer profitability, churn and contract terms are not.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
    evidence_claim_ids: *a19
    mitigation_or_diligence_request: Request customer/balance concentration schedules, top contracts, churn/NRR, references and balance volatility analysis.
  - risk_id: R-004
    risk_title: Valuation and capital-structure uncertainty
    risk_category: financing
    severity: medium
    likelihood: high
    description: CB Insights lists a USD 2B valuation and company materials cite large financing rounds, but current valuation, liquidation preferences, debt and investor rights are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
    evidence_claim_ids: *a20
    mitigation_or_diligence_request: Request full cap table, financing documents, preference stack, option pool, debt/notes, secondary transactions and 409A reports.
  - risk_id: R-005
    risk_title: Product expansion and execution complexity
    risk_category: product
    severity: medium
    likelihood: high
    description: Rapidly expanding service lines, asset classes, acquisitions and international footprint increase product delivery, integration and operational-risk complexity.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Run product/technology diligence on roadmap, uptime, incidents, integrations, acquisition integration, SLAs and product-level economics.
  - risk_id: R-006
    risk_title: Cybersecurity and operational resilience
    risk_category: technical
    severity: high
    likelihood: medium
    description: Cloud-native trading, clearing, custody, financing and client portals require strong security, availability and disaster-recovery controls; public pages do not disclose independent audits.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.B
      - VI.B
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Request SOC reports, penetration tests, incident logs, BCP/DR tests, vendor-risk program, access controls and client SLA history.
  - risk_id: R-007
    risk_title: Competition and pricing pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Clear Street competes with incumbent prime brokers, clearing firms and fintech brokers that can pressure pricing, balance-sheet economics and client acquisition.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a23
    mitigation_or_diligence_request: Benchmark pricing, win/loss records, margin by product, competitor displacement, customer references and sales-cycle metrics.
  - risk_id: R-008
    risk_title: International expansion complexity
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Offices and regulated entities across multiple jurisdictions raise entity management, labor, tax, licensing, supervision and data-governance complexity.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.B
      - VIII.A
    evidence_claim_ids: *a24
    mitigation_or_diligence_request: Request entity chart, local regulatory status, tax/legal memos, HR compliance, cross-border data flows and integration plans.
  - risk_id: R-009
    risk_title: People and key-person scaling risk
    risk_category: team
