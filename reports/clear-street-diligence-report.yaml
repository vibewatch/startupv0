  - figure_id: F-008
    title: Diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.A
    figure_type: risk_heatmap
    description: Risk heatmap for Clear Street diligence workstreams.
    purpose: Prioritize legal, regulatory, financial and operational follow-up.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial opacity
          severity: high
          likelihood: high
          rationale: Audited financials, ARR/revenue, gross margin, cash, burn, debt, regulatory capital and runway are not public despite large operating-scale claims.
          evidence_claim_ids: &a17
            - EC-002
