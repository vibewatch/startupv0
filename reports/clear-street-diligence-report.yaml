        - risk_id: R-002
          label: Regulatory and clearing/FCM exposure
          severity: high
          likelihood: high
          rationale: Broker-dealer, FCM, UK FCA/LME and international operations create capital, compliance, customer-asset, supervision and enforcement risks.
          evidence_claim_ids: &a18
            - EC-007
            - EC-014
          source_ids:
            - SRC-010
        - risk_id: R-003
          label: Customer and balance concentration opacity
          severity: high
          likelihood: medium
          rationale: Aggregate client and balance metrics are public, but top-account concentration, customer profitability, churn and contract terms are not.
          evidence_claim_ids: &a19
            - EC-002
            - EC-005
            - EC-012
          source_ids:
            - SRC-010
        - risk_id: R-004
          label: Valuation and capital-structure uncertainty
          severity: medium
          likelihood: high
          rationale: CB Insights lists a USD 2B valuation and company materials cite large financing rounds, but current valuation, liquidation preferences, debt and investor rights are private.
          evidence_claim_ids: &a20
            - EC-001
            - EC-009
          source_ids:
            - SRC-010
        - risk_id: R-005
          label: Product expansion and execution complexity
          severity: medium
          likelihood: high
          rationale: Rapidly expanding service lines, asset classes, acquisitions and international footprint increase product delivery, integration and operational-risk complexity.
          evidence_claim_ids: &a21
            - EC-004
            - EC-006
            - EC-010
          source_ids:
            - SRC-010
        - risk_id: R-006
          label: Cybersecurity and operational resilience
          severity: high
          likelihood: medium
          rationale: Cloud-native trading, clearing, custody, financing and client portals require strong security, availability and disaster-recovery controls; public pages do not disclose independent audits.
          evidence_claim_ids: &a22
            - EC-004
            - EC-006
