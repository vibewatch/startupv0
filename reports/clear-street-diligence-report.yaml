executive_summary:
  overall_assessment: Clear Street qualifies for continued private-unicorn diligence based on a CB Insights USD 2B valuation row and active company materials showing a large regulated capital-markets infrastructure business. Public evidence supports product breadth, client-scale claims and regulatory surface area, but investment underwriting remains blocked by private financial, cap-table, regulatory, customer, technology, legal and HR records.
  investment_or_diligence_thesis: The diligence thesis is that Clear Street may be building modern cloud-native brokerage, clearing, financing and workflow infrastructure for sophisticated market participants; to underwrite that thesis, investors must prove revenue quality, regulatory capital strength, customer/balance durability, product reliability, security controls and valuation support beyond company-owned marketing metrics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Clear Street as a USD 2B Financial Services unicorn in New York.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Clear Street publicly markets a broad cloud-native platform across clearing, financing, execution/trading, investment banking and Studio tooling.
      evidence_claim_ids:
        - EC-004
        - EC-006
    - founder_claim_id: FC-004
      summary: Company regulatory disclosures identify broker-dealer/FCM and UK FCA/LME regulatory surfaces.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, revenue quality, cash/burn, debt and regulatory capital are not public.
    - risk_id: R-002
      summary: Regulated broker-dealer, FCM and international financial-services operations create high compliance and capital-risk diligence needs.
    - risk_id: R-003
      summary: Customer identities, balance concentration, churn, contracts and retention are not public despite aggregate client-scale claims.
    - risk_id: R-006
      summary: Cloud-native trading/clearing/custody infrastructure requires independent security and operational-resilience evidence.
  key_evidence_gaps:
    - Audited financials, management accounts, revenue by product, gross margin, cash, debt, burn, runway and regulatory capital reports.
    - Fully diluted cap table, financing documents, preference stack, debt/notes, investor rights and current valuation support.
    - Top-customer revenue/balance concentration, churn/NRR, customer contracts, references and pipeline.
    - "Security/technology artifacts: SOC reports, penetration tests, incidents, BCP/DR, architecture and vendor-risk files."
    - Regulator extracts, examination letters, enforcement searches, counsel letters, docket searches and material contracts.
    - HRIS, org chart, attrition, compensation/equity, retention and international employment compliance.
  recommended_next_steps:
    - Run confirmatory financial, regulatory-capital and cap-table diligence before relying on the public valuation signal.
    - Prioritize customer/balance concentration, churn, contract and reference-call workstreams.
    - Conduct regulatory/legal diligence across FINRA/SIPC, CFTC/NFA, FCA/LME and international entities.
    - Run technical/security diligence on cloud-native platform, Studio, trading systems, incident history and operational resilience.
    - Review product-level economics, pricing, gross margin and competitive displacement.
