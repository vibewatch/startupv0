          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Kaleidos is publicly positioned for remote communities, hospitals, data centers, military installations, disaster response, remote industry, and critical infrastructure, with 1 MWe electric and 1.9 MW thermal output claims.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
