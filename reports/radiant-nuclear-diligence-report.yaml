executive_summary:
  overall_assessment: >-
    Radiant Nuclear is a credible public-source unicorn candidate in advanced nuclear hardware: public sources support the $1.8B valuation headline, more than $300M new funding, a 1 MWe Kaleidos microreactor product claim, DOME demonstration pathway, R-50 factory licensing milestone, and customer or strategic demand signals from Equinix, the Department of the Air Force, and Lockheed Martin Ventures. The diligence posture remains high-risk because the company is pre-commercial, nuclear-regulated, capital intensive, dependent on first-of-a-kind engineering and HALEU/TRISO supply, and lacks public audited financials or binding-contract economics.
  investment_or_diligence_thesis: >-
    Proceed only to deep technical, regulatory, financial, and contract diligence. A positive thesis requires proving that Kaleidos can be safely licensed, tested, manufactured at repeatable cost, fueled on schedule, insured, sited with public acceptance, and sold under contracts that cover nuclear-grade capex and lifecycle liabilities.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public news and market-list evidence support Radiant as a unicorn valued around $1.8B after a more than $300M round.
      evidence_claim_ids:
        - EC-001
        - EC-004
    - founder_claim_id: FC-002
      summary: Company sources consistently describe Kaleidos as a compact 1 MWe portable microreactor with 1.9 MW thermal output and factory assembly.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-006
      summary: Government and company sources support real regulatory engagement with DOE/DOME, NRC Part 70 review, and Air Force ANPI site-selection next steps.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Nuclear licensing and NEPA approvals are incomplete and could delay or prevent demonstration, factory operations, and customer deployments.
    - risk_id: R-002
      summary: First-of-a-kind reactor, fuel, factory, and supply-chain execution risk is material despite public milestone progress.
    - risk_id: R-003
      summary: No public financial statements, ARR, backlog economics, unit-cost evidence, or runway data are available.
  valuation_view: >-
    The $1.8B public valuation is a screening anchor, not a diligence conclusion. It must be reconciled to financing terms, remaining cash, capital needs, customer deposits, and technical/regulatory milestone risk.
  recommendation: "High-risk confirmatory diligence only; do not underwrite from public sources alone."

chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports funding and valuation headlines, but audited financials, projections, cap table, debt, tax, accounting policies, unit economics, and customer backlog are not public.
    founder_claim_ids:
      - FC-001
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-004
      - EC-014
    risk_ids:
      - R-003
      - R-004
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources do not disclose income statements, balance sheets, cash flows, backlog, AR aging, revenue by product, gross margin, or unit economics.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: The company has public funding and customer-signal claims but no audited operating financials or backlog economics in public sources.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-003
        hidden_risks:
          - Cash burn, reactor capex, manufacturing yield, warranty, insurance, and nuclear-grade supplier costs could overwhelm headline funding.
        evidence_gaps:
          - Audited financials, management accounts, cash runway, budget-to-actuals, backlog, AR aging, gross-margin bridge, and unit-cost model.
        follow_up_questions:
          - Provide FY2023-FY2026 monthly financials, board KPI packs, cash runway, backlog schedule, and reactor cost model by deployment scenario.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-014
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public projections are limited to milestone-oriented statements about DOME testing, R-50 factory scale, and 2028 deployments.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Public materials frame growth around 2026 testing, R-50 construction, and 2028 deployments, but no three-year financial forecast or capex model is public.
            evidence_claim_ids:
              - EC-004
              - EC-005
              - EC-016
            risk_ids:
              - R-002
              - R-004
        hidden_risks:
          - A delay in DOE, NRC, NEPA, HALEU, or factory milestones could shift revenue years while increasing burn.
        evidence_gaps:
          - Three-year financial model, capex budget, contingency reserve, pricing assumptions, working-capital plan, and external financing assumptions.
        follow_up_questions:
          - Provide integrated forecast showing reactor test gates, factory licensing, production ramp, customer conversion, capex draw, financing needs, and downside cases.
        table_ids:
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-016
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify headline financing and investors, not shares outstanding, ownership, preferences, notes, warrants, or debt.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: The public round was led by Draper Associates and Boost VC with additional strategic/financial investors, but the preference stack is unknown.
            evidence_claim_ids:
              - EC-004
              - EC-011
            risk_ids:
              - R-004
        hidden_risks:
          - Liquidation preferences, milestone tranched financing, debt, warrants, or government-contract obligations could materially change equity value.
        evidence_gaps:
          - Cap table, financing documents, debt schedule, option plan, SAFE/note ledger, investor rights, board approvals, and 409A/valuation support.
        follow_up_questions:
          - Reconcile the $1.8B headline to current fully diluted ownership, preferences, cash, debt, and remaining financing commitments.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-004
          - EC-011
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is publicly visible at a high level; tax, accounting policy, revenue recognition, grant accounting, and deposit treatment are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: A public article reports a more than $300M round valuing Radiant above $1.8B, and Radiant says proceeds support R-50 and DOME.
            evidence_claim_ids:
              - EC-001
              - EC-004
            risk_ids:
              - R-003
              - R-004
        hidden_risks:
          - Customer deposits, government awards, and long-cycle reactor sales may have complex revenue-recognition and refundability terms.
        evidence_gaps:
          - Revenue recognition memo, tax positions, grant accounting, deposit liabilities, deferred revenue, and financing-history ledger.
        follow_up_questions:
          - Provide accounting memos for customer deposits, government contracts, R&D capitalization, inventory, warranty reserves, and decommissioning/liability provisions.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-004

