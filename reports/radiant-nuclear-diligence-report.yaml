  - chapter_id: IV
    title: Competition
    chapter_summary: Radiant competes in a crowded advanced nuclear and microreactor field against startups, public companies, and incumbents; public differentiation centers on portability, 1 MWe scale, factory production, DOME timing, and defense/data-center demand signals.
    founder_claim_ids:
      - FC-002
    evidence_claim_ids:
      - EC-003
      - EC-013
    risk_ids:
      - R-010
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public competitor pages show active alternatives including Oklo advanced fission plants, X-energy advanced reactors and TRISO fuel, and Westinghouse eVinci microreactors.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Radiant is differentiated by portable 1 MWe positioning and announced factory/DOME milestones, but larger competitors have meaningful technical, regulatory, customer, and balance-sheet advantages.
            evidence_claim_ids:
              - EC-003
              - EC-013
            risk_ids:
              - R-010
        hidden_risks:
          - Competitors may secure fuel, sites, government support, NRC approvals, and early customers before Radiant reaches repeatable production.
        evidence_gaps:
          - Win/loss data, price comparisons, site-level economics, power purchase terms, licensing schedules, and independent customer references.
        follow_up_questions:
          - Request competitive win/loss by segment, priced quotes, customer alternatives, and technical comparison against Oklo, X-energy, Westinghouse eVinci, diesel, batteries, and grid interconnects.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
