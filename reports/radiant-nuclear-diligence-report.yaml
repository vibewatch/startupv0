report_metadata:
  report_title: Radiant Nuclear Startup Diligence Report
  target_company: Radiant Nuclear
  website: https://www.radiantnuclear.com/
  known_aliases:
    - Radiant
    - Radiant Industries
    - Radiant Industries, Inc.
    - Kaleidos
  sector: Energy Technology / portable nuclear microreactors
  geography: United States
  company_stage: Private unicorn / growth-stage advanced nuclear hardware company
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public sources only, prioritizing company-owned announcements, government agency announcements, public unicorn-list evidence, and competitor-owned product pages.
    - Treated company-published statements as verified only for existence of the public statement unless corroborated by a government or independent source.
    - Marked audited financials, cap table, customer contracts, nuclear licensing files beyond public announcements, supplier contracts, insurance, legal dockets, and HR records as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - Tennessee
    - Idaho
    - Colorado
    - United Kingdom commercial HALEU-enrichment context where publicly referenced
  excluded_topics:
    - Classified defense requirements, non-public nuclear safety analyses, private customer contracts, non-public NRC/DOE correspondence, private financing documents, and personal employee information.
  user_provided_materials:
    - material_id: UPM-001
      title: User request and parsed Wikipedia current-unicorn row for Radiant Nuclear
      type: workflow_request
      date_received: 2026-05-23
      notes: Provided target slug context and required public-source diligence workflow; no pitch deck, financial model, customer contract, or private data room was provided.

