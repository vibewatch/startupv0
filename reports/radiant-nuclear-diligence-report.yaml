    chapter_summary: "Public customer and partner evidence is meaningful but early: Equinix, Department of the Air Force / Buckley SFB, DOE/INL, Urenco, and Lockheed Martin are visible signals, but revenue, concentration, deposits, renewals, severed relationships, and supplier commitments are not public."
