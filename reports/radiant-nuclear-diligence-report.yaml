limitations:
  - "This report uses public sources only and should not be treated as investment advice or a substitute for technical, regulatory, legal, financial, tax, insurance, and customer diligence."
  - "Company announcements were treated as evidence that statements were made, not independent proof of reactor performance, contract economics, or regulatory completion."
  - "No private financial statements, cap table, board materials, customer contracts, supplier contracts, safety analyses, regulatory dockets, insurance policies, HRIS exports, or counsel letters were reviewed."
  - "No claim was made that Radiant has no lawsuits, IP encumbrances, regulatory problems, employee issues, or supplier defaults; those areas require counsel and data-room verification."
  - "Search and page-fetching limitations may have excluded relevant public sources; inaccessible or non-public information is recorded as diligence gaps rather than inferred."
