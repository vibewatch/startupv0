diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, ARR, gross margin, cash, burn and runway.
    why_it_matters: Financial quality and valuation support cannot be underwritten publicly.
    suggested_source_or_request: Request CFO data-room financial package and board plan.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, investor rights, debt/warrants/options, 409A and preference stack.
    why_it_matters: Public $4B valuation does not reveal security-level economics.
    suggested_source_or_request: Request cap table and financing documents from company counsel.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top customer list, revenue concentration, churn, NRR and customer references.
    why_it_matters: Customer quality and concentration are core diligence items and not public.
    suggested_source_or_request: Request customer cohort/revenue schedules and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Supplier contracts and compute/cloud/hardware commitments.
    why_it_matters: Compute and platform obligations may drive cost and operational risk.
    suggested_source_or_request: Request Microsoft, CoreWeave/NVIDIA and Intel agreements.
    priority: high
  - gap_id: G-005
    chapter_id: VII
    section_id: VII.B
    missing_information: Current org chart, headcount, attrition and retention plan after Microsoft move.
    why_it_matters: Execution capacity is central after founders/staff moved to Microsoft.
    suggested_source_or_request: Request HRIS export, turnover analysis and retention agreements.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: Independent model benchmarks, red-team reports, model cards and security reviews.
    why_it_matters: Product defensibility and enterprise readiness require third-party validation.
    suggested_source_or_request: Commission technical diligence and request internal evals.
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Microsoft license and related agreements, including IP rights and accounting treatment.
    why_it_matters: Contract terms may encumber core assets and influence revenue recognition.
    suggested_source_or_request: Request executed agreements and accounting memos.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Complete regulatory correspondence and inquiry status.
    why_it_matters: CMA/FTC scrutiny can affect transaction risk and future obligations.
    suggested_source_or_request: Request all agency correspondence and outside counsel memos.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP ownership, patent/trademark schedule, open-source SBOM and training-data rights.
    why_it_matters: Model/software rights and IP encumbrances drive enterprise indemnity and valuation.
    suggested_source_or_request: Request counsel IP schedule and technical OSS review.
    priority: medium
  - gap_id: G-010
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, quotas, pipeline conversion and enterprise pricing.
    why_it_matters: Repeatable GTM is unproven publicly after the pivot.
    suggested_source_or_request: Request CRM export, price book and sales compensation plan.
    priority: high
