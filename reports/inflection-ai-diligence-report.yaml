risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation support
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources verify funding and valuation anchors but not audited financials, ARR, burn, runway, unit
      economics or current cap-table economics.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited financials, management accounts, cash/burn/runway, current 409A/fair
      value, cap table, debt and preference stack before underwriting valuation.
  - risk_id: R-002
    risk_title: Post-Microsoft workforce continuity
    risk_category: team
    severity: high
    likelihood: medium
    description: Microsoft hired founding technical leaders and several/most staff; remaining execution capacity and
      retention are not public.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.A
      - VII.G
      - VIII.F
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request current org chart, attrition by function, retention packages, open reqs,
      key-person dependencies and employee invention assignments.
  - risk_id: R-003
    risk_title: Regulatory scrutiny of Microsoft transaction
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: UK CMA reviewed and cleared the arrangement; U.S. FTC scrutiny was reported with no public final resolution found.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Obtain full regulator correspondence, legal memos, conditions/commitments, closing
      letters and board materials on transaction structure.
  - risk_id: R-004
    risk_title: Strategic supplier and platform dependency
    risk_category: operational
    severity: high
    likelihood: medium
    description: Inflection’s product history and current enterprise plan depend on Microsoft Azure, NVIDIA/CoreWeave
      compute and Intel enterprise hardware/channel relationships.
    impacted_chapter_ids:
      - III
      - VI
    impacted_section_ids:
      - III.B
      - III.E
      - VI.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Review supplier contracts, minimum commitments, SLAs, termination rights, pricing, data
      controls and alternative compute plan.
  - risk_id: R-005
    risk_title: Customer traction and concentration not public
    risk_category: customer
    severity: high
    likelihood: unknown
