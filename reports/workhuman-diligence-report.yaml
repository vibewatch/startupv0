executive_summary:
  overall_assessment: Workhuman is a credible, scaled private HR-technology company with corroborated
    2020 unicorn status, public large-enterprise references, broad product packaging, global usage
    claims and public security/privacy posture. The investment case is not underwriteable from
    public evidence alone because current revenue quality, customer concentration, gross margin, cap
    table, AI governance, legal posture and rewards/payment economics are private.
  investment_or_diligence_thesis: Proceed to data-room diligence only if Workhuman substantiates
    current ARR quality, retention, software-versus-rewards gross margin, customer renewal health,
    AI/data governance and legal/security controls. Upside is a differentiated enterprise
    recognition data platform; downside is that rewards/recognition economics may be more
    operationally complex than software-only positioning implies.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Historical US$1.2B unicorn valuation is corroborated by independent news and databases.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-003
      summary: Public product pages verify broad recognition/rewards/analytics/integration product suite.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-009
    - founder_claim_id: FC-004
      summary: Public case studies verify selected large enterprise deployments and usage metrics, subject
        to current-status confirmation.
      evidence_claim_ids:
        - EC-010
        - EC-011
        - EC-012
        - EC-013
        - EC-014
    - founder_claim_id: FC-005
      summary: Security/privacy pages state GDPR/CCPA, ISO27001/ISO27701 and PCI DSS posture.
      evidence_claim_ids:
        - EC-023
        - EC-024
  biggest_risks:
    - risk_id: R-001
      summary: Current financial quality, ARR retention, gross margin and cash/debt are not public.
    - risk_id: R-002
      summary: The headline valuation is historical and cap-stack economics are unknown.
    - risk_id: R-006
      summary: AI/employee-data analytics create privacy, bias, explainability and employment-law
        diligence risk.
    - risk_id: R-007
      summary: Global rewards/payment operations may create lower-margin, operational and regulatory
        exposure.
  key_evidence_gaps:
    - Current audited financials, ARR/NRR/GRR, software/rewards gross margin and cash/debt.
    - Cap table, preferences, debt, option pool and current valuation.
    - Top-customer ARR, renewal status, references and severed relationships.
    - AI governance, model evaluation, data lineage, privacy impact assessments and customer data
      rights.
    - Legal docket, IP ownership, material contracts, insurance and regulatory correspondence.
  recommended_next_steps:
    - Open data-room request list focused first on financials/cap table, customer economics and
      security/AI artifacts.
    - Conduct customer reference calls with Cisco/Merck/Eaton/Citizens-style deployments and at
      least two churned customers.
    - Run counsel-led legal/IP/privacy/security review across Globoforce/Workhuman entities and
      global rewards/payment operations.
    - Benchmark competitors and pricing using win/loss, customer interviews and third-party
      analyst/category data.
