    - United States
    - Massachusetts
    - Ireland
    - European Union privacy context
    - Global rewards/payment/privacy contexts
  excluded_topics:
    - Private financial statements, cap table, board minutes, SOC reports, source code, model
      artifacts, customer contracts, employee records, full legal docket/IP searches, tax opinions
      and insurance policies were unavailable.
