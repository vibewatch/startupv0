      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material customer, supplier, partner, DPA, rewards/payment and integration contracts are
          not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.F-F1
            finding: Workhuman advertises Microsoft Teams, Workday, Slack and other workflow integrations.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-007
          - finding_id: VIII.F-F2
            finding: Employee-data AI, global rewards and payment operations create privacy, regulatory, fraud,
              tax and merchant exposure.
            evidence_claim_ids:
              - EC-025
            risk_ids:
              - R-007
          - finding_id: VIII.F-F3
            finding: Litigation, initiated claims, IP portfolio, material contracts and insurance were not
              publicly verified in this standard pass.
            evidence_claim_ids:
              - EC-026
            risk_ids:
              - R-007
        hidden_risks:
          - Global rewards/payment fulfillment complexity
          - Strategic integration dependencies
          - Legal, contracts, IP and insurance require counsel-led review
        evidence_gaps:
          - Top contracts, DPAs, supplier/payment agreements, partner agreements and SLAs are
            missing.
        follow_up_questions:
          - 'Provide evidence for: Top contracts, DPAs, supplier/payment agreements, partner
            agreements and SLAs are missing.'
        table_ids:
          - T-020
          - T-021
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-025
          - EC-026
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Workhuman publicly claims privacy/security certifications and compliance; AI/data/rewards
          exposures require artifact review.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: Workhuman advertises global rewards, admin/spend controls, misuse detection and AI/NLP
              coaching features.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-006
          - finding_id: VIII.G-F2
            finding: Workhuman iQ is positioned as AI/analytics using 100M+ platform data points and a
              recognition-specific language model.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-006
          - finding_id: VIII.G-F3
            finding: Workhuman publicly claims GDPR/CCPA compliance, ISO27001:2022, ISO27701:2019 and PCI DSS
              Level 3 Merchant status.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-006
        hidden_risks:
          - AI, employee-data and bias governance exposure
          - Global rewards/payment fulfillment complexity
          - Security/privacy compliance needs independent evidence
        evidence_gaps:
          - SOC 2, ISO certificates, PCI AOC, incident log, DPAs, subprocessors, DPIAs and AI
            governance are missing.
        follow_up_questions:
          - 'Provide evidence for: SOC 2, ISO certificates, PCI AOC, incident log, DPAs,
            subprocessors, DPIAs and AI governance are missing.'
        table_ids:
          - T-019
          - T-021
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-023
          - EC-025
