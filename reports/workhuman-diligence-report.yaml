diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, ARR/NRR/GRR, gross margin, cash/debt and retention metrics.
    why_it_matters: Core underwriting depends on revenue quality, margin, retention and runway.
    suggested_source_or_request: Company CFO/controller and auditors.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferences, debt, option pool and valuation.
    why_it_matters: Historical valuation is stale and cap-stack economics determine value.
    suggested_source_or_request: Company counsel and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Module-level ARR, active users, attach rates, implementation cost and rewards gross margin.
    why_it_matters: Determines whether product breadth creates software-quality economics.
    suggested_source_or_request: Product analytics and finance schedules.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer ARR, renewal dates, churn and customer references.
    why_it_matters: Large logos do not prove concentration or retention quality.
    suggested_source_or_request: Customer revenue schedule, CRM and MSAs.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing, competitive replacements and market share.
    why_it_matters: Feature overlap creates pricing and churn risk.
    suggested_source_or_request: Sales ops and third-party analyst/category data.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC/payback, quota attainment and marketing ROI.
    why_it_matters: GTM efficiency is unverified.
    suggested_source_or_request: CRM exports, sales ops and finance.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: AI model evaluations, governance, data lineage and customer data rights.
    why_it_matters: AI differentiation could be valuable or risky.
    suggested_source_or_request: CTO/data science/legal/security artifacts.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, attrition, compensation and equity plans.
    why_it_matters: Personnel capacity and retention affect roadmap and transaction economics.
    suggested_source_or_request: HRIS, comp/equity ledger and management interviews.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC 2, ISO certificates, PCI AOC, incident logs, DPAs, subprocessors, DPIAs and AI governance.
    why_it_matters: Security/privacy posture underpins enterprise trust.
    suggested_source_or_request: Security/legal data room.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP schedule, assignments, licenses, open-source inventory and docket searches.
    why_it_matters: AI/data/product claims depend on enforceable rights.
    suggested_source_or_request: Company/IP counsel.
    priority: high
