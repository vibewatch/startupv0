diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts, revenue/GMV bridge, cash/debt and burn data.
    why_it_matters: Determines financial quality, runway and valuation support.
    suggested_source_or_request: Company CFO/data room; statutory filings; auditor workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, debt/convertible terms, preferences, option pool and waterfall.
    why_it_matters: Determines investor economics and dilution in a down-round/convertible-heavy structure.
    suggested_source_or_request: Financing documents, cap table and counsel memo.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Active buyer/seller definitions, cohorts, churn, concentration and references.
    why_it_matters: Aggregate scale metrics do not prove durable revenue or low concentration.
    suggested_source_or_request: Data exports, cohort reports and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Category margins, fulfillment SLAs, return rates and credit losses.
    why_it_matters: Product breadth can hide unprofitable categories and operational drag.
    suggested_source_or_request: Operations KPI pack, category P&Ls and credit reports.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: NCLT/scheme PDFs, annual returns, regulatory correspondence and legal docket searches.
    why_it_matters: Corporate restructuring and regulatory obligations can alter liabilities or transaction feasibility.
    suggested_source_or_request: Company counsel; MCA/NCLT records; legal diligence.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.A
    missing_information: Full org chart, board, founder current roles, compensation, ESOP and attrition.
    why_it_matters: Execution capacity and retention risk cannot be assessed from public names alone.
    suggested_source_or_request: HRIS export, board/corporate records and compensation schedules.
    priority: medium
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Market share, price benchmarking, win/loss and supplier exclusivity.
    why_it_matters: Competitive pressure is a top risk.
    suggested_source_or_request: Customer/supplier interviews, pricing scrape and third-party market study.
    priority: medium
