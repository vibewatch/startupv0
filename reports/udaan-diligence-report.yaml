report_metadata:
  report_title: Udaan Startup Diligence Report
  target_company: Udaan
  website: https://udaan.com/
  known_aliases:
    - Udaan
    - Hiveloop E-Commerce Private Limited
    - HEPL
    - udaanCapital
  sector: Consumer & Retail / eB2B wholesale commerce for kiranas, retailers and SMBs
  geography: India / Bengaluru, Karnataka
  company_stage: Eligible active private unicorn / growth-stage eB2B commerce company
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; INR where explicitly stated
  time_zone: Asia/Kolkata
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public web sources only; prioritized CB Insights and independent news for eligibility, valuation and financing history.
    - Used Udaan-owned pages for current product, leadership, legal-policy, regulatory-index and active-operation signals; treated those as public statements requiring private validation.
    - Screened for disqualifying public evidence of IPO, acquisition of Udaan or shutdown; no credible disqualifying public evidence was found.
    - No gh CLI was used; no private data room, paid registry, customer call, founder interview or confidential material was available.
  included_jurisdictions:
    - India
    - Singapore/US listing-context references where public articles discussed listing structures
    - Global investors only as named in public financing articles
  excluded_topics:
    - Non-public financial statements, contracts, cap table, board materials, credit files, customer data, legal docket searches and unretrieved regulatory PDFs.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for exactly one Udaan public-evidence-backed YAML diligence report
      type: workflow_request
      date_received: 2026-05-20
      notes: No pitch deck, model, data room or founder responses were provided.
