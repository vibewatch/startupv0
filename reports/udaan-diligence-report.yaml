executive_summary:
  overall_assessment: Eligible for diligence report creation. CB Insights lists Udaan as a private unicorn at US$1.8B, and public company materials show active operations, 2025 financing and Udaan acquiring ShopKirana. No credible public evidence was found that Udaan completed an IPO, was acquired or shut down. Investment diligence remains high-risk because public sources reveal down-round and convertible/debt context while leaving audited financials, cap table, customer concentration, credit risk and legal/regulatory details private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. Public evidence supports Udaan as an active India eB2B unicorn with significant historical financing and scale signals, but investability depends on private verification of revenue quality, contribution margin, cash runway, credit losses, financing preferences, customer/supplier retention, competitive differentiation and legal/regulatory status.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Udaan as a private unicorn with US$1.8B latest known public valuation.
      evidence_claim_ids:
        - EC-001
        - EC-019
    - founder_claim_id: FC-004
      summary: Multiple large financings are publicly reported across 2018-2025, including equity, convertible notes and debt.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-004
        - EC-005
        - EC-006
        - EC-007
    - founder_claim_id: FC-003
      summary: Public sources report millions of retailers/SMBs, thousands of sellers/brands and 23M+ orders/2.25B+ products shipped in 2023.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-010
    - founder_claim_id: FC-005
      summary: Active 2025 materials include updated terms/privacy, Series G financing and ShopKirana acquisition by Udaan.
      evidence_claim_ids:
        - EC-007
        - EC-009
        - EC-012
        - EC-013
        - EC-019
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation bridge are not public; down-round and lower latest public valuation require careful diligence.
    - risk_id: R-002
      summary: Convertible/debt and preference-stack complexity could materially affect investor economics.
    - risk_id: R-003
      summary: Competitive pressure from Reliance Retail, IndiaMART, OfBusiness and vertical players can pressure margins and growth.
    - risk_id: R-004
      summary: Customer/supplier concentration, active-account definitions and retention are not publicly verifiable.
  key_evidence_gaps:
    - Audited financial statements, revenue/GMV bridge, cash/debt, burn, gross margin and category/city contribution margin.
    - Fully diluted cap table, convertible/debt terms, preferences, option pool and valuation bridge.
    - Active buyer/seller cohorts, top customer/supplier concentration, churn, repeat orders, references and supplier contracts.
    - Credit book, default/loss rates, partner recourse, regulatory permissions and compliance records.
    - NCLT/scheme documents, annual returns, litigation/regulatory records, material contracts, privacy/security artifacts and ShopKirana acquisition documents.
  recommended_next_steps:
    - Open financial, customer, credit and legal confirmatory diligence before relying on headline valuation or scale claims.
    - Have counsel verify corporate status, no completed IPO/change-of-control event, filings, NCLT/scheme materials and regulatory obligations.
    - Run customer/supplier references and competitor benchmarking by region/category.
    - Review financing documents and construct liquidation waterfall under downside valuation scenarios.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Udaan is eligible for this report based on CB Insights private-unicorn status and active 2025 public materials, but financial diligence is high risk due selective revenue/loss, down-round and convertible/debt signals.
    founder_claim_ids:
      - FC-001
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-019
      - EC-020
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements were public; TechCrunch reported FY gross revenue about US$680M and loss under US$380M, while Udaan regulatory page lists annual returns not reviewed here.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: Public financial data is limited to headline revenue/loss and filing indexes.
            evidence_claim_ids:
              - EC-006
              - EC-014
              - EC-020
            risk_ids:
              - R-001
        hidden_risks:
          - Headline revenue may hide low gross margin, credit losses, returns, fulfillment cost and cash burn.
        evidence_gaps:
          - Audited financials, monthly accounts, cash/debt and KPI definitions.
        follow_up_questions:
          - Provide audited FY2023-FY2025 financials, management accounts, cash runway and GMV-to-revenue bridge.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-014
          - EC-020
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public projection support is limited to reported profitability/IPO timing claims and later financing; no board-approved model was public.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: I.B-F1
