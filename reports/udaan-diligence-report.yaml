          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public capital-structure data includes investor names, round sizes, valuation references and 2025 fresh equity, but not ownership, preferences, debt covenants or option pool.
        verification_status: partially_verified
        confidence: medium
