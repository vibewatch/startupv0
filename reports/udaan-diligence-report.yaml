risk_register:
  - risk_id: R-001
    risk_title: Financial quality and valuation bridge gap
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources show selective revenue/loss and valuation data, including down-round context and latest public valuation below 2021 reports.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited financials, management accounts, KPI pack, cash/debt and valuation bridge.
  - risk_id: R-002
    risk_title: Convertible/debt and preference-stack complexity
    risk_category: financing
    severity: high
    likelihood: medium
    description: 2022-2023 financings included convertibles and debt; terms and liquidation preferences are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review note/debt agreements, covenants, conversion terms, collateral and waterfall.
  - risk_id: R-003
    risk_title: Competitive pressure in Indian B2B and retail commerce
    risk_category: market
    severity: high
    likelihood: high
    description: Reliance Retail, IndiaMART, OfBusiness and vertical specialists may pressure pricing, supply, credit and growth.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Run market-share, price, supplier and win/loss diligence by category and geography.
  - risk_id: R-004
    risk_title: Customer concentration, retention and active-account opacity
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public scale metrics do not disclose active cohorts, top-account concentration, churn or repeat economics.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request cohorts, top accounts, churn, order frequency, NRR/GRR and references.
  - risk_id: R-005
    risk_title: Embedded credit exposure
    risk_category: financial
    severity: medium
    likelihood: medium
    description: Business credit and udaanCapital partnership signals are public, but credit book, losses and recourse are not.
    impacted_chapter_ids:
      - II
      - III
    impacted_section_ids:
      - II.A
      - III.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review underwriting, loan book, delinquency, partner recourse and regulatory permissions.
  - risk_id: R-006
    risk_title: Logistics and unit-economics execution risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Large order/shipment volumes and logistics reach can create fulfillment-cost, returns, service-level and burn risks.
    impacted_chapter_ids:
      - II
      - V
    impacted_section_ids:
      - II.A
      - V.A
      - V.D
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request city/category contribution margin, fulfillment cost, SLA and returns.
  - risk_id: R-007
    risk_title: Unreviewed restructuring, acquisition and material-contract documents
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Regulatory page lists NCLT/scheme documents; ShopKirana acquisition terms and liabilities are undisclosed.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Counsel review of scheme materials, acquisition agreement, approvals and liabilities.
  - risk_id: R-008
    risk_title: Privacy, platform and regulatory compliance exposure
    risk_category: regulatory
