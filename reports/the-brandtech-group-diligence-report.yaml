executive_summary:
  overall_assessment: The Brandtech Group is eligible for public-source unicorn diligence based on CB Insights
    unicorn-status evidence and an active operating website. Public evidence supports the existence and
    product/category positioning of the business, but underwriting remains gated by private financials, cap
    table, customer concentration, legal/security clearance, and management data.
  investment_or_diligence_thesis: The diligence thesis is that The Brandtech Group may have a defensible
    position in Enterprise technology; AI-enabled marketing technology, digital advertising, and content
    creation group if it can prove durable revenue quality, retention, gross margin, product differentiation,
    legal/compliance maturity, and valuation support beyond public positioning.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists The Brandtech Group at $4B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: The company maintains an active public website describing its current product positioning.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-003
      summary: Public customer, partner, or portfolio proof points indicate market activity but not revenue
        concentration.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-002
      summary: Official Brandtech pages identify a broad group-company portfolio and material GenAI/Pencil scale
        claims.
      evidence_claim_ids:
        - EC-013
        - EC-014
    - founder_claim_id: FC-003
      summary: Company announcements cite BCG/Pencil partnership and work with top global advertisers, subject to
        contract/customer validation.
      evidence_claim_ids:
        - EC-015
        - EC-017
  biggest_risks:
    - risk_id: R-001
      summary: Acquisition integration and portfolio complexity
    - risk_id: R-002
      summary: AI/IP/privacy and advertising compliance exposure
    - risk_id: R-003
      summary: Revenue concentration and profitability not public
  key_evidence_gaps:
    - Audited financials, ARR/revenue bridge, gross margin, burn, cash runway, and forecast model.
    - Current cap table, financing terms, preferences, debt, option pool, and valuation marks.
    - Top-customer revenue concentration, retention, contracts, renewal dates, churn, and references.
    - Legal/regulatory/IP/privacy/security clearance, material contracts, insurance, and litigation schedule.
  recommended_next_steps:
    - Open CFO/counsel data-room request before any valuation underwriting.
    - Schedule customer and partner reference calls after receiving top-customer schedules.
    - Run counsel-led legal, regulatory, privacy/security, IP, and litigation searches.
    - Reconcile public unicorn valuation to current market comps, financing terms, and downside scenarios.
