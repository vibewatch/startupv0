report_metadata:
  report_title: The Brandtech Group Public-Source Startup Diligence Report
  target_company: The Brandtech Group
  website: https://www.thebrandtechgroup.com/
  known_aliases:
    - The Brandtech Group
    - Brandtech
    - You & Mr Jones
    - You and Mr Jones
  sector: Enterprise technology; AI-enabled marketing technology, digital advertising, and content creation group
  geography: United States; CB Insights lists New York; group website describes global brand and technology operations
  company_stage: Late-stage private unicorn
  research_date: 2026-06-14
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Selected The Brandtech Group through a random uncovered-unicorn workflow after excluding existing report
      slugs.
    - Used CB Insights public unicorn table, fetched official company pages, and public news URLs where
      accessible.
    - Separated public evidence from private diligence requests; inaccessible or blocked sources are noted as
      limitations rather than used to infer facts.
    - Mapped findings to the eight-chapter startup diligence checklist with tables, figures, evidence claims,
      risks, gaps, and follow-up requests.
  included_jurisdictions:
    - United States
    - Global commerce-media markets
    - Other operating markets to be confirmed
  excluded_topics:
    - No private data-room materials, management interviews, customer calls, supplier calls, paid docket
      searches, paid market databases, or security-audit reports were reviewed.
  user_provided_materials:
    - material_id: M-001
      title: User request for random unicorn diligence reports
      type: prompt_argument
      date_received: 2026-06-14
      notes: User requested exactly three private startup unicorn diligence reports not already covered in reports/
        and a draft PR.
