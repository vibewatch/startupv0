      - EC-012
    mitigation_or_diligence_request: Run counsel-led legal, regulatory, privacy/security, IP, and contract diligence before closing.
  - risk_id: R-002
    risk_title: AI/content/IP compliance exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Generative AI marketing creates copyright, model-output, brand-safety, rights-clearance, and
      advertising substantiation risks.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids:
