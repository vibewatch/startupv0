risk_register:
  - risk_id: R-001
    risk_title: Roll-up integration complexity
    risk_category: operational
    severity: high
    likelihood: medium
    description: The group includes many operating companies, investments, and acquired/disposed assets, requiring
      integration and reporting diligence.
    impacted_chapter_ids:
