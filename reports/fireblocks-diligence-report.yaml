executive_summary:
  overall_assessment: Fireblocks is public-source eligible as a late-stage private unicorn with a credible institutional digital-asset infrastructure platform, strong public investor/customer/regulatory signals, and material private-data gaps. The report supports continued diligence, not a final investment decision.
  investment_or_diligence_thesis: "Proceed only to data-room diligence: validate ARR quality, valuation support, security controls, legal/regulatory status, cap-table economics and customer references before pricing or committing capital."
  strongest_verified_claims:
    - founder_claim_id: FC-004
      summary: Public $8B unicorn valuation anchor is supported by CB Insights and the 2022 Series E announcement.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-005
      summary: NYDFS lists Fireblocks Trust Company, LLC as licensed for virtual currency business activity.
      evidence_claim_ids:
        - EC-014
    - founder_claim_id: FC-003
      summary: Named customers/partners publicly span fintech, payments, bank, asset-manager and public-sector contexts.
      evidence_claim_ids:
        - EC-011
        - EC-012
  biggest_risks:
    - risk_id: R-004
      summary: Security/key-management failure risk is critical and must be independently tested.
    - risk_id: R-001
      summary: Current fair value and financial durability are not public.
    - risk_id: R-003
      summary: Regulatory obligations are jurisdiction-specific and require license/exam diligence.
  key_evidence_gaps:
    - Audited financials, ARR, retention, burn and current valuation support.
    - Cap table, investor rights and exit waterfall.
    - Security audit reports, incident register and StakeHound/legal status.
    - Customer concentration, churn, contract terms and direct references.
    - Global license map and regulator correspondence.
  recommended_next_steps:
    - Open company data room focused on financials, cap table, security, legal and customer metrics.
    - Run independent technical/security review and counsel diligence before any term sheet.
    - Conduct customer references across fintech, payments, bank/asset manager and public-sector use cases.
    - Model downside scenarios and structure valuation/protections based on validated private data.
