report_metadata:
  report_title: Fireblocks Public-Source Startup Diligence Report
  target_company: Fireblocks
  website: https://www.fireblocks.com/
  known_aliases:
    - Fireblocks Inc.
    - Fireblocks Trust Company, LLC
  sector: Institutional digital-asset infrastructure, MPC custody, payments, tokenization and compliance
  geography: United States / Israel with global institutional footprint
  company_stage: Late-stage private unicorn
  research_date: 2026-06-04
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company, regulator, customer/partner, developer-doc, market-database and independent business/legal sources only.
    - Treated company PR and website claims as management claims unless corroborated by regulator, customer/partner or market-database evidence.
    - Did not use paid databases, private customer calls, data-room materials, source code, confidential materials or user-provided local files.
  included_jurisdictions:
    - United States, especially New York DFS context
    - Israel founding/operating context
    - Global institutional digital-asset market context
  excluded_topics:
    - Private audited financial statements, cap table, board materials and customer contracts.
    - Non-public security reports, SOC reports, penetration tests, regulator exam findings and legal counsel letters.
    - Paid database records and private interviews.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-06-04
      notes: User requested a Fireblocks-only public-source diligence YAML report.
