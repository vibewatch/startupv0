  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Fully diluted cap table, option pool, debt/warrants, investor rights and liquidation preferences.
    why_it_matters: Late-stage rounds can materially alter economics and control.
    suggested_source_or_request: Corporate secretary/counsel cap table export and financing documents.
