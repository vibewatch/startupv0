report_metadata:
  report_title: "The Bot Company Public-Source Startup Diligence Report"
  target_company: "The Bot Company"
  website: "https://www.bot.co/"
  known_aliases:
    - "Botco, Inc."
    - "The Bot Company"
    - "The Incredible Amazing Bot Company, LLC"
    - "Team Human, LLC"
    - "BOTCO"
    - "BLOCK"
  sector: "Home robotics, general-purpose robots, AI-enabled hardware and robotics autonomy"
  geography: "United States; Form D principal place of business in San Francisco, California; CB Insights row lists New York, creating a geography data-quality item"
  company_stage: "Private unicorn / early-stage to growth-stage robotics company with no public product-shipment proof"
  research_date: "2026-05-18"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "UTC"
research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Used the startup-diligence-research workflow at standard depth and relied only on public evidence."
    - "Prioritized primary regulatory filings, company-owned pages, reputable technology/news coverage and public market databases."
    - "Treated company-published claims as verified only for the existence of the public statement unless independently corroborated."
    - "Marked private operating, financial, customer, HR, legal, IP and safety artifacts as not_publicly_verifiable rather than inferring them."
    - "Explicitly screened for IPO, acquisition and shutdown signals; no such public event was verified in reviewed sources."
  included_jurisdictions:
    - "United States"
    - "Delaware"
    - "California"
    - "Public global robotics market context"
  excluded_topics:
    - "Private financial statements, cap table, contracts, board materials, customer calls, supplier calls, HRIS, safety files, legal docket artifacts and non-public regulatory correspondence were unavailable."
  user_provided_materials:
    -
      material_id: "UPM-001"
      title: "User request for The Bot Company diligence YAML report"
      type: "workflow_request"
      date_received: "2026-05-18"
      notes: "No pitch deck, data room, founder responses, financial model or private documents were provided."
