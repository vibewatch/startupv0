risk_register:
  - risk_id: R-001
    risk_title: Consolidated financial opacity and valuation-quality risk
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public sources disclose financing and valuation anchors but not consolidated revenue, margin, burn, cash,
      debt, cohort retention or cap-table preference economics.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited consolidated financials, monthly KPI pack, cash runway, revenue bridge,
      cap table, liquidation preferences and debt/off-balance-sheet schedules.
  - risk_id: R-002
    risk_title: Regulatory/compliance supervision risk in broker-dealer/custody operations
    risk_category: regulatory
    severity: high
    likelihood: high
    description: Altruist operates regulated broker-dealer/adviser infrastructure and has at least one public FINRA
      disclosure event plus a reported FINRA fine/restitution item.
    impacted_chapter_ids:
      - VIII
      - I
    impacted_section_ids:
      - VIII.G
      - I.A
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Obtain FINRA AWC, exam letters, remediation evidence, compliance staffing model,
      supervision testing, customer notices and board compliance reporting.
  - risk_id: R-003
    risk_title: Customer/AUC concentration, retention and economics unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public advisor counts and named relationships do not reveal paying customer concentration, active usage,
      AUC quality, churn, NRR, pipeline or profitability.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - V.D
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request top-customer schedules, cohort retention, revenue/AUC concentration, customer
      references, lost deals and pipeline conversion data.
  - risk_id: R-004
