diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited consolidated financial statements, monthly management accounts, ARR/revenue bridge, gross
      margin, burn, cash/debt and AR/backlog schedules.
    why_it_matters: Cannot underwrite valuation, runway, quality of revenue or financial controls from public filings alone.
    suggested_source_or_request: Finance data room from company/CFO plus auditor workpapers and board packs.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Post-Series F cap table, preferences, option pool, debt, warrants/notes and off-balance-sheet obligations.
    why_it_matters: Late-stage terms can materially change investment economics and downside protection.
    suggested_source_or_request: Charter, financing documents, investor rights agreement, cap table and debt schedule.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product usage, uptime/SLOs, incident history, support tickets, roadmap and product-level gross margin.
    why_it_matters: Public product breadth does not prove reliability, adoption or profitability.
    suggested_source_or_request: Product analytics, SOC report, incident postmortems, roadmap and margin analysis.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Customer revenue/AUC concentration, NRR/churn and top-customer schedules.
    why_it_matters: Aggregate advisor counts can mask concentration, inactive advisors or weak monetization.
    suggested_source_or_request: Customer cohort and revenue schedules from CRM/billing/custody systems.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top supplier spend and agreements, including AI/cloud/data/sweep-bank vendors.
    why_it_matters: Supplier terms can drive margin, compliance and operational resilience.
    suggested_source_or_request: Procurement/vendor-management data room and material contracts.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Independent market share, win/loss, switching-cost and buyer-reference evidence.
    why_it_matters: Incumbent competition is intense and public positioning does not prove durable differentiation.
    suggested_source_or_request: Third-party market study, CRM win/loss and buyer interviews.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity model, quotas, attainment, sales cycle, CAC/payback and pipeline conversion.
    why_it_matters: Growth may be capital-intensive or slower than public metrics suggest.
    suggested_source_or_request: CRM export, sales compensation plans and cohort CAC/LTV analysis.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: Hazel AI model evaluations, data-flow diagrams, vendor contracts, accuracy/error rates and AI governance.
    why_it_matters: AI features process sensitive data and can create regulatory, privacy and reputational exposure.
    suggested_source_or_request: Technical diligence session, model-risk artifacts, DPAs and security reviews.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Consolidated headcount by function/location, hiring plan, turnover, compensation and equity plan.
    why_it_matters: Scaling regulated custody and AI operations requires sufficient specialized talent and retention.
    suggested_source_or_request: HRIS export, compensation/equity schedules and org plan.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Primary FINRA AWC, regulatory correspondence, exam letters and remediation evidence.
    why_it_matters: Reported FINRA fine/restitution and BrokerCheck event are material regulatory diligence items.
    suggested_source_or_request: Company counsel/compliance data room plus primary regulator documents.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts, insurance policies, privacy/data maps and customer-facing protection disclosures.
    why_it_matters: Contractual, insurance and data obligations define downside risk in custody/AI workflows.
    suggested_source_or_request: Legal data room from company counsel.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.B
    missing_information: Trademark docket, pleadings, settlement terms and current case status.
    why_it_matters: Brand/IP enforcement can impose cost and settlement obligations.
    suggested_source_or_request: Docket pull and counsel status memorandum.
    priority: medium
