report_metadata:
  report_title: Altruist Startup Diligence Research Report
  target_company: Altruist
  website: https://altruist.com/
  known_aliases:
    - Altruist Corp
    - Altruist LLC
    - Altruist Financial LLC
    - Hazel AI
    - Shareholders Service Group
  sector: Wealthtech / RIA custody and advisor software
  geography: United States; public records cite Culver City, CA and Dallas, TX regulated-entity office
  company_stage: Late-stage private unicorn
  research_date: 2026-05-21
  analyst: GitHub Copilot CLI startup-diligence-research skill
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Use public primary company pages for product, pricing, security, careers and customer-announcement evidence while
      treating promotional claims as unverified until independently corroborated.
    - Use FINRA BrokerCheck, SEC IAPD/ADV and SIPC as high-reliability regulatory sources for entity and
      investor-protection facts.
    - Use BusinessWire/GIC, CB Insights and independent legal/regulatory news as corroborating sources for financing,
      valuation and adverse-event screening.
    - Map every checklist chapter I–VIII to public evidence, hidden risks, gaps and follow-up requests; do not infer
      private financials from public marketing metrics.
  included_jurisdictions:
    - United States federal securities/regulatory sources
    - FINRA BrokerCheck
    - SEC IAPD/ADV
    - Public U.S. legal/news sources
  excluded_topics:
    - No paid databases, non-public data room, customer interviews, primary regulatory document retrieval beyond public
      webpages/PDF excerpts, or private litigation docket downloads were available.
  user_provided_materials:
    []
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Altruist is “the first modern custodian built exclusively for RIAs.”
    claim_source: Jason Wenk Series E note on Altruist.com
    claim_date: null
    mapped_chapter_ids:
      - II
      - IV
    mapped_section_ids:
      - II.A
      - IV.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-017
    contradiction_summary: Public evidence verifies Altruist offers an RIA-focused custody/wealth platform, but “first” and
      durable exclusivity are market-positioning claims not independently proven by public records.
    diligence_follow_up:
      - Request win/loss data, share by RIA segment, and third-party custody market studies substantiating
        “first/modern/exclusive” positioning.
  - founder_claim_id: FC-002
    claim_text: By the April 2025 Series F, Altruist served over 4,700 advisors and had tripled assets under management for
      two consecutive years.
    claim_source: GIC/BusinessWire Series F announcement
    claim_date: 2025-04-22
    mapped_chapter_ids:
      - I
      - III
      - V
    mapped_section_ids:
      - I.B
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-002
      - EC-005
    contradiction_summary: Round announcement is public and corroborated by two release hosts, but AUM/advisor counts are
      not independently audited in public filings.
    diligence_follow_up:
      - Reconcile advisor count, AUC/AUM, account growth, net asset flows and revenue cohorts to custodial records and
        audited financials.
  - founder_claim_id: FC-003
    claim_text: Altruist helps 6,000+ advisors and offers 25+ integrations.
    claim_source: Altruist homepage
    claim_date: null
    mapped_chapter_ids:
      - II
      - III
      - V
    mapped_section_ids:
      - II.A
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-005
    contradiction_summary: The 6,000+ figure is a company homepage claim accessed after the 4,700+ Series F claim; it is
      plausible growth over time but requires dated KPI support.
    diligence_follow_up:
      - Provide monthly advisor, firm, funded-account, AUC and active-user cohorts through the latest month, with
        definitions.
  - founder_claim_id: FC-004
    claim_text: Altruist offers no platform fees for Altruist accounts and charges $1 per connected non-Altruist account per
      month after the first 100.
    claim_source: Altruist product/pricing pages
    claim_date: null
    mapped_chapter_ids:
      - I
      - II
    mapped_section_ids:
      - I.B
      - II.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-006
    contradiction_summary: Public pricing terms are visible, but total economic cost, sweep economics, trading economics,
      pass-through fees and gross margin are not public.
    diligence_follow_up:
      - Provide full fee schedule, revenue bridges by stream, gross margin by product/account cohort, and any
        advisor/customer notice history for price changes.
  - founder_claim_id: FC-005
    claim_text: Altruist states it is heavily regulated, offers SIPC/excess/FDIC sweep protections, and has SOC 2 Type 2
      plus recurring third-party penetration testing.
    claim_source: Altruist security/legal disclosures
    claim_date: null
    mapped_chapter_ids:
      - II
      - VIII
    mapped_section_ids:
      - II.A
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-011
    contradiction_summary: FINRA/SEC records support regulated entity existence, but SOC reports, insurance details and
      control exceptions are private; SIPC protection has statutory limits.
    diligence_follow_up:
      - Obtain SOC 2 report, penetration-test executive summaries, cyber insurance, regulatory exam letters and
        reconciliations to official FINRA/SEC records.
  - founder_claim_id: FC-006
    claim_text: Hazel AI and Altruist automations can save advisors material time and client tax dollars.
    claim_source: Hazel and Lifeworks public pages
    claim_date: null
    mapped_chapter_ids:
      - III
      - VI
    mapped_section_ids:
      - III.B
      - VI.B
    verification_status: unverified
    confidence: low
    evidence_claim_ids:
      - EC-013
      - EC-014
    contradiction_summary: Public pages disclose survey/product-data claims and customer quotes, but methodology, cohorts,
      baselines and realized ROI are not independently public.
    diligence_follow_up:
      - Request Hazel ROI methodology, customer-level case studies, AI accuracy audits, data-retention architecture and
        reference calls with production users.
executive_summary:
  overall_assessment: "Altruist merits continued diligence as a high-growth, late-stage wealthtech/custody platform with
    visible funding momentum, advisor-scale claims, product breadth and regulated-entity infrastructure. The diligence
    posture should remain risk-forward: public materials do not disclose consolidated economics, capital structure,
    customer concentration, sales productivity, full regulatory remediation or AI/data-control evidence."
  investment_or_diligence_thesis: The attractive diligence thesis is an integrated RIA custody and software platform that
    can reduce advisor workflow fragmentation and compete with incumbents through product velocity and low-friction
    pricing. The counter-thesis is that regulated custody, low/no platform fees, AI data processing and incumbent
    competition create compliance, margin and execution risk that cannot be underwritten without private financial,
    customer, regulatory and technical evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Public Series F materials state a $152M GIC-led round at approximately $1.9B valuation and over 4,700 advisors.
      evidence_claim_ids:
        - EC-002
        - EC-005
    - founder_claim_id: FC-003
      summary: Altruist’s homepage publicly positions the company as an integrated wealth platform for independent advisors
        with 6,000+ advisors and 25+ integrations.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-005
      summary: Official and company sources support that Altruist operates regulated broker-dealer/adviser entities, though
        controls and remediation require private review.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-002
      summary: Regulatory/compliance risk is high because Altruist operates broker-dealer/custody infrastructure and has a
        public BrokerCheck disclosure plus a reported FINRA fine/restitution item.
    - risk_id: R-001
      summary: "Financial opacity is high: consolidated financials, revenue mix, unit economics, cash burn, runway and capital
        structure are not public."
    - risk_id: R-006
      summary: AI/privacy risk is high because Hazel and the platform process sensitive financial, identity, tax and
        communications data.
  key_evidence_gaps:
    - Audited consolidated financials, monthly KPI pack, cap table, cash runway, debt, tax and accounting-policy
      documents.
    - Customer revenue/AUC concentration, retention, churn, NRR, top customers, major contracts and direct reference
      calls.
    - FINRA AWC/exam letters/remediation, SOC 2 report, incident history, insurance policies and customer-facing
      protection disclosures.
    - Hazel AI data maps, model evaluations, vendor contracts, privacy impact assessments and AI governance artifacts.
    - Sales productivity, pipeline conversion, CAC/payback, quota attainment, marketing budget and competitive win/loss
      data.
  recommended_next_steps:
    - Open finance, legal/regulatory, customer and technical data-room workstreams before any valuation underwriting.
    - Prioritize primary regulatory-document review and remediation testing for the FINRA disclosure/fine item.
    - Run customer-reference calls with named and randomly sampled advisors, including SSG-migrated cohorts.
    - Conduct technical/security diligence on custody platform reliability, SOC 2 exceptions, AI data flows and vendor
      controls.
    - Benchmark pricing and win/loss against Schwab, Fidelity, Pershing, Orion, Tamarac and Betterment Advisor Solutions.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Altruist has strong public financing and valuation signals, but consolidated operating financials,
      revenue mix, unit economics, cash runway and capital structure are not public. Broker-dealer financial-condition
      statements and SEC/FINRA filings help validate regulated-entity facts but do not replace private financial
      diligence.
    founder_claim_ids:
      - FC-002
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-005
      - EC-006
      - EC-010
      - EC-021
    risk_ids:
      - R-001
      - R-005
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No public consolidated income statements, balance sheets, cash flows, backlog, AR aging or management financial
          reports were found. Public sources provide broker-dealer financial-condition statement listings, financing
          claims and regulatory facts only.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: Public filings and legal pages validate some regulated-entity artifacts but not consolidated venture-company
              financial performance.
            evidence_claim_ids:
              - EC-010
              - EC-021
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: ADV headcount and homepage/product claims provide operational context but cannot establish revenue or gross
              profit.
            evidence_claim_ids:
              - EC-004
              - EC-009
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Revenue concentration, cash burn, debt, margin pressure and AR quality may be hidden by public growth
            narratives.
          - Broker-dealer financial-condition statements may not reflect parent-company burn or software/AI economics.
        evidence_gaps:
          - Audited consolidated financial statements for the past three years.
          - Monthly management accounts, ARR/revenue bridge, gross margin by stream, backlog, AR aging, cash/debt and
            budget-to-actuals.
        follow_up_questions:
          - Provide audited consolidated financial statements and monthly KPI/financial packs for the last 36 months.
          - Reconcile broker-dealer regulatory financial statements to consolidated parent-company accounts.
        table_ids:
          - T-002
        figure_ids:
          []
        evidence_claim_ids:
          - EC-004
          - EC-009
          - EC-010
          - EC-021
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources support growth drivers—advisor growth, AUM growth, product breadth and low-friction pricing—but
          do not disclose projections, assumptions, capital expenditures, working capital or external-financing needs.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Series F claims and homepage advisor counts support a growth narrative but not forecast predictability.
            evidence_claim_ids:
              - EC-004
              - EC-005
            risk_ids:
              - R-001
              - R-003
          - finding_id: I.B-F2
            finding: Visible pricing creates an underwriting question around custody, sweep, trading, software and AI unit
              economics.
            evidence_claim_ids:
              - EC-006
              - EC-021
            risk_ids:
              - R-005
        hidden_risks:
          - A growth plan may depend on continued venture funding, spread economics, advisor migration rates or
            compliance spending not visible publicly.
          - Low software fees could pressure gross margin unless offset by custody or cash economics.
        evidence_gaps:
          - Three-year quarterly projections by product/channel/customer and assumptions.
          - CAC, LTV, AUC/AUM growth, cash sweep assumptions, support cost, capex/working-capital and financing plan.
        follow_up_questions:
          - Provide board-approved financial plan with downside/base/upside scenarios and variance history.
          - Provide revenue/gross-margin bridge by custody, software, AI, cash sweep, trading/order and other streams.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-004
          - EC-005
          - EC-006
          - EC-021
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public financing announcements reveal round amounts and selected investors but not shares outstanding, option
          pool, warrants, notes, debt, preferences, investor ownership or off-balance-sheet obligations.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C-F1
            finding: Series E/F and CB valuation evidence are screening data, not cap-table evidence.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
            risk_ids:
              - R-001
        hidden_risks:
          - Late-stage preference stack, participating preferred, debt covenants, secondary transactions or unallocated
            option pool could materially alter economics.
          - Flat-looking valuation markers may mask investor-friendly terms.
        evidence_gaps:
          - Current cap table, fully diluted shares, option/warrant/note schedule, debt instruments, SAFEs/convertibles
            and off-balance-sheet liabilities.
        follow_up_questions:
          - Provide post-Series F pro forma cap table, financing documents, preference stack, debt schedule and
            option-pool plan.
        table_ids:
          []
        figure_ids:
          []
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public sources provide financing-history anchors but not tax positions, revenue-recognition policies, NOLs or
          full accounting policies. Public broker-dealer financial-condition statements should be reviewed, but
          consolidated accounting policy diligence is still needed.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Public late-stage financing history includes a $169M Series E and $152M Series F at approximately $1.9B
              valuation.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
            risk_ids:
              - R-001
          - finding_id: I.D-F2
            finding: Broker-dealer financial-condition statement listings exist, but consolidated financial statements and tax
              schedules are not public.
            evidence_claim_ids:
              - EC-010
              - EC-021
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Revenue-recognition, regulatory net-capital, tax, transfer-pricing, NOL and financing-term risks remain open.
          - Investor basis and ownership cannot be determined from press releases.
        evidence_gaps:
          - Tax returns/NOL schedule, accounting policies, revenue-recognition memo, regulatory net capital details,
            financing history by investor and ownership percentage.
        follow_up_questions:
          - Provide tax/accounting policy memos, regulatory net capital computations and complete financing history
            including investor basis and ownership.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-010
          - EC-021
  - chapter_id: II
    title: Products
    chapter_summary: Altruist publicly offers an integrated RIA wealth platform spanning account opening, custody/trading,
      portfolio management, billing, reporting, client portal and Hazel AI. Public pricing and security claims are
      visible, but adoption depth, uptime, unit economics and AI/control evidence require private diligence.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-004
      - EC-006
      - EC-007
      - EC-014
      - EC-020
    risk_ids:
      - R-004
      - R-005
      - R-006
      - R-012
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: The public product surface is substantial and coherent for RIAs, with integrated custody/software workflows and
          AI automation. Major customers/applications and product costs are partially visible; growth rates, market
          share and profitability require private data.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Homepage and product pages support an integrated RIA platform spanning core custody/software workflows.
            evidence_claim_ids:
              - EC-004
              - EC-006
            risk_ids:
              - R-004
              - R-005
          - finding_id: II.A-F2
            finding: Security/privacy and Hazel evidence show significant sensitive-data and AI-control dependencies.
            evidence_claim_ids:
              - EC-007
              - EC-014
              - EC-020
            risk_ids:
              - R-006
              - R-012
        hidden_risks:
          - Product breadth can increase operational complexity, cyber surface area and compliance burden.
          - No-platform-fee positioning may obscure unit-economics pressure.
          - AI outputs may create suitability, privacy and model-risk exposures.
        evidence_gaps:
          - Product usage by module, reliability/SLOs, support tickets, product-level gross margin, roadmap and AI
            evaluation results.
          - Technical architecture, SOC report, penetration-test summaries and customer implementation metrics.
        follow_up_questions:
          - Provide product analytics, uptime/incident history, roadmap, gross margin by product, AI governance and
            architecture documents.
          - Provide pricing realization and full fee schedule by customer cohort.
        table_ids:
          - T-004
          - T-005
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-004
          - EC-006
          - EC-007
          - EC-014
          - EC-020
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence shows meaningful advisor scale signals and named relationships, including Sowell,
      Lifeworks and the SSG acquisition. However, top-customer schedules, revenue concentration, churn, retention,
      supplier spend and severed relationships are not public.
    founder_claim_ids:
      - FC-002
      - FC-003
      - FC-006
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-012
      - EC-013
      - EC-022
    risk_ids:
      - R-003
      - R-007
      - R-011
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Aggregate advisor counts are public, but the top 15 customers by application, product ownership and timing of
          purchases are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Public advisor count claims increased from over 4,700 in the Series F release to 6,000+ on the homepage
              accessed later.
            evidence_claim_ids:
              - EC-004
              - EC-005
            risk_ids:
              - R-003
          - finding_id: III.A-F2
            finding: Advisor count is not equivalent to active, paying, retained or profitable customer count.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-003
        hidden_risks:
          - Customer concentration could be hidden beneath aggregate advisor numbers.
          - SSG-acquired customers may have different retention/economics than organically acquired advisors.
        evidence_gaps:
          - Top 15 customers/firms by revenue/AUC/application for past two fiscal years and YTD.
          - Active advisor definitions, account-level usage and cohort retention.
        follow_up_questions:
          - Provide top-customer schedule by application, advisor count, AUC, revenue and purchase/onboarding timing.
          - Define advisor, active advisor, funded account and firm metrics used in public claims.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-022
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public relationship evidence includes SSG, Sowell and Lifeworks. Relationship existence is supported, but
          revenue contribution, marketing agreements and expansion economics are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: SSG acquisition and named partnerships are credible strategic-relationship signals.
            evidence_claim_ids:
              - EC-012
              - EC-013
            risk_ids:
              - R-003
              - R-007
          - finding_id: III.B-F2
            finding: Customer automation ROI claims are not independently validated.
            evidence_claim_ids:
              - EC-013
              - EC-014
            risk_ids:
              - R-003
              - R-006
        hidden_risks:
          - Acquired or enterprise relationships may require service-level commitments or pricing concessions.
          - Customer-quoted ROI could be non-representative.
        evidence_gaps:
          - Relationship contracts, revenue contribution, marketing agreements, renewal terms and customer reference
            checks.
        follow_up_questions:
          - Provide all strategic partnership/customer contracts and permission for reference calls with Sowell,
            Lifeworks and migrated SSG advisors.
        table_ids:
          - T-008
        figure_ids:
          []
        evidence_claim_ids:
          - EC-012
          - EC-013
          - EC-014
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No public revenue-by-customer schedule or >5% customer concentration data was found. Aggregate advisor/AUM
          metrics must be reconciled to revenue, AUC and gross margin.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Public customer traction is insufficient to underwrite revenue quality or concentration.
            evidence_claim_ids:
              - EC-021
              - EC-022
            risk_ids:
              - R-003
              - R-005
        hidden_risks:
          - A small number of enterprise RIAs, acquired relationships or custody/sweep balances could drive
            disproportionate economics.
          - Revenue may lag advisor counts if accounts are unfunded or free/discounted.
        evidence_gaps:
          - Customer revenue/AUC concentration, NRR/churn, gross margin by customer cohort and customer-level
            profitability.
        follow_up_questions:
          - Provide revenue by customer/firm, any >5% customers, AUC/account balances, gross margin and NRR/churn
            cohorts.
        table_ids:
          []
        figure_ids:
          []
        evidence_claim_ids:
          - EC-021
          - EC-022
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No reliable public schedule of severed customer, partner or supplier relationships was found.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Absence of public severed-relationship evidence is a diligence gap, not proof of none.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-003
              - R-007
        hidden_risks:
          - Failed migrations, lost enterprise RIAs, terminated data vendors or bank/sweep relationships could
            materially affect growth and reputation.
        evidence_gaps:
          - Lost customer/partner/supplier schedule with reasons, revenue/AUC impact and remedial actions.
        follow_up_questions:
          - Provide schedule of significant relationships severed, downgraded or under dispute in the last two years.
        table_ids:
          []
        figure_ids:
          []
        evidence_claim_ids:
          - EC-022
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Top supplier names, spend and agreements are not public. Likely critical categories include cloud, AI model
          providers, market-data/integration vendors, sweep banks and regulatory/compliance service providers.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: Hazel and privacy evidence reveal data/AI supplier dependencies, but vendor contracts and spend are not public.
            evidence_claim_ids:
              - EC-014
              - EC-020
            risk_ids:
              - R-006
              - R-012
        hidden_risks:
          - Vendor concentration, unfavorable termination rights, AI/cloud cost spikes or bank-program constraints could
            pressure margins and operations.
        evidence_gaps:
          - Top supplier spend for past two fiscal years and current YTD; AI/cloud/bank/data vendor agreements.
        follow_up_questions:
          - Provide top-supplier schedule, material vendor contracts, subprocessor list and sweep-bank program
            agreements.
        table_ids:
