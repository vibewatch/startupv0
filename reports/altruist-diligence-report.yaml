  - figure_id: F-009
    title: Legal, regulatory and control risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of key diligence risks concentrated in regulated custody, AI/data, financial opacity and competition.
    purpose: Prioritize follow-up requests by severity and likelihood.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Consolidated financial opacity and valuation-quality risk
          severity: high
          likelihood: medium
          rationale: Public sources disclose financing and valuation anchors but not consolidated revenue, margin, burn, cash,
            debt, cohort retention or cap-table preference economics.
          evidence_claim_ids: &a1
            - EC-001
            - EC-002
            - EC-010
            - EC-021
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-004
            - SRC-010
            - SRC-002
            - SRC-009
        - risk_id: R-002
          label: Regulatory/compliance supervision risk in broker-dealer/custody operations
          severity: high
          likelihood: high
          rationale: Altruist operates regulated broker-dealer/adviser infrastructure and has at least one public FINRA disclosure
            event plus a reported FINRA fine/restitution item.
          evidence_claim_ids: &a2
            - EC-007
            - EC-008
            - EC-018
          source_ids:
            - SRC-006
            - SRC-008
            - SRC-022
        - risk_id: R-003
          label: Customer/AUC concentration, retention and economics unknown
          severity: high
          likelihood: medium
          rationale: Public advisor counts and named relationships do not reveal paying customer concentration, active usage, AUC
            quality, churn, NRR, pipeline or profitability.
