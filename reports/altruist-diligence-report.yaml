          coverage, E&O/cyber coverage and exclusions are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.E-F1
            finding: SIPC has explicit limits and should not be marketed as investment-loss protection.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-010
          - finding_id: VIII.E-F2
            finding: Security page references SIPC/excess/FDIC sweep and SOC 2, but terms and reports are private.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-010
              - R-012
        hidden_risks:
          - Coverage gaps or exclusions could leave losses from cyber, operational errors, securities lending or AI
            advice workflows.
          - Advisor/client misunderstanding of protections could create complaints or reputational harm.
        evidence_gaps:
          - Insurance policies, excess SIPC details, E&O/cyber/fidelity bond coverage, exclusions, loss runs and
            coverage opinions.
        follow_up_questions:
          - Provide all insurance policies, excess coverage terms, loss runs and customer-facing protection disclosures.
        table_ids:
          - T-019
        figure_ids:
          []
        evidence_claim_ids:
          - EC-007
          - EC-011
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material customer, supplier, AI, data, sweep-bank, acquisition and enterprise custody contracts are not public,
          but public privacy/Hazel/customer evidence shows these contracts are material to risk.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.F-F1
            finding: Privacy and Hazel evidence imply material data-processing, AI-vendor, customer and supplier contracts.
            evidence_claim_ids:
              - EC-014
              - EC-020
            risk_ids:
              - R-006
              - R-012
          - finding_id: VIII.F-F2
            finding: SSG and named customer relationships require contract review for obligations and change-of-control terms.
            evidence_claim_ids:
              - EC-012
              - EC-013
            risk_ids:
              - R-003
              - R-007
        hidden_risks:
          - Termination rights, exclusivity, minimums, indemnities, data restrictions or change-of-control clauses could
            impair value.
          - AI/cloud/vendor costs may scale unexpectedly.
        evidence_gaps:
          - Material customer/supplier contracts, AI/vendor DPAs, sweep-bank agreements, data licenses, acquisition
            agreement and change-of-control provisions.
        follow_up_questions:
          - Provide material-contract schedule with revenue/spend, term, termination, exclusivity, indemnity and
            change-of-control terms.
        table_ids:
          - T-020
        figure_ids:
          []
        evidence_claim_ids:
          - EC-012
          - EC-013
          - EC-014
          - EC-020
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Official FINRA/SEC records verify regulated entities and at least one BrokerCheck disclosure event; an
          independent report describes a FINRA fine/restitution matter involving fully paid securities lending
          supervision and communications.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: FINRA BrokerCheck shows Altruist Financial LLC has one regulatory disclosure event.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-002
          - finding_id: VIII.G-F2
            finding: FX News reports a FINRA fine/restitution matter that requires primary-source confirmation and remediation
              review.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-002
              - R-010
          - finding_id: VIII.G-F3
            finding: Regulated-entity, SIPC/SOC/security claims are positive but require official records, audit reports and
              insurance detail.
            evidence_claim_ids:
              - EC-007
              - EC-009
              - EC-011
            risk_ids:
              - R-002
              - R-012
        hidden_risks:
          - Regulatory remediation may require systems, staffing or customer communication changes.
          - Future exams may focus on securities lending, marketing, AI/data controls and custody operations.
        evidence_gaps:
          - FINRA AWC, exam letters, remediation evidence, compliance staffing, surveillance reports, complaints and
            regulatory correspondence.
        follow_up_questions:
          - Provide all regulatory correspondence, FINRA/SEC exam findings, AWCs, remediation plans, complaints and
            compliance testing results for the last five years.
        table_ids:
          - T-018
          - T-019
        figure_ids:
          - F-009
          - F-010
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-009
          - EC-011
          - EC-018
