report_metadata:
  report_title: Scroll Startup Diligence Report
  target_company: Scroll
  website: https://scroll.io/
  known_aliases:
    - Scroll Ltd
    - Scroll.io
    - Scroll Tech
    - Scroll Network
    - SCR
  sector: Ethereum Layer 2, zkEVM rollup and blockchain infrastructure
  geography: Seychelles legal entity / global Ethereum ecosystem
  company_stage: Private unicorn / growth-stage blockchain infrastructure network with public token ecosystem
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for a public-source diligence report.
    - Prioritized Scroll-owned sources, Scroll GitHub repositories, official documentation, L2BEAT, funding databases and independent crypto-news coverage.
    - Treated company-published usage, fee, security and ecosystem claims as verified for the existence of the public statement, not as independently audited operating KPIs.
    - Flagged all financial statements, cap table, customer revenue, token treasury, legal docket, insurance and employment information as unresolved where not available publicly.
  included_jurisdictions:
    - Seychelles / Scroll Ltd references
    - Ethereum mainnet and global Web3 users/developers
    - United States and Asia-based investors referenced by public funding sources
    - Public crypto-market and protocol-security sources
  excluded_topics:
    - Private financial statements, management accounts, revenue-recognition workpapers, tax returns, cap table and financing documents.
    - Customer contracts, top-account revenue, partner economics, supplier/cloud contracts and customer reference calls.
    - Non-public security audits, incident reports, insurance policies, employment agreements and HRIS data.
    - Counsel-led legal docket searches, sanctions/AML review, securities-law analysis and regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for one standard-depth Scroll diligence report
      type: workflow_request
      date_received: 2026-05-20
      notes: No pitch deck, data room, founder responses, financial model or legal schedule was provided.
