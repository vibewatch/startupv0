  - figure_id: F-002
    title: Scroll technical architecture
    chapter_id: II
    section_id: II.A
    figure_type: architecture_diagram
    description: Architecture diagram of the three-layer Scroll protocol described in docs.
    purpose: Show product dependencies and technical diligence focus.
    spec_schema_ref: figure_spec_shapes.architecture_diagram
    spec:
      nodes:
        - node_id: users_dapps
          label: Users and dApps
          node_type: user
          description: Apps and users submit L2 and bridge transactions.
          evidence_claim_ids:
            - EC-001
            - EC-010
          source_ids:
            - SRC-001
            - SRC-010
        - node_id: sequencing
          label: Sequencing layer
          node_type: infrastructure
          description: Execution node creates L2 blocks; rollup node batches and submits data/proofs.
          evidence_claim_ids:
            - EC-002
          source_ids:
            - SRC-002
        - node_id: proving
          label: Proving layer
          node_type: infrastructure
          description: Pool of provers and coordinator generate/relay zkEVM validity proofs.
          evidence_claim_ids:
            - EC-002
          source_ids:
            - SRC-002
        - node_id: ethereum
          label: Ethereum settlement layer
          node_type: third_party
          description: Provides data availability, ordering, bridge/rollup contracts and proof verification.
          evidence_claim_ids:
            - EC-002
          source_ids:
            - SRC-002
        - node_id: bridge
          label: Bridge / cross-domain messaging
          node_type: service
          description: Moves tokens/messages between L1 and L2.
          evidence_claim_ids:
            - EC-016
          source_ids:
            - SRC-015
      edges:
        - edge_id: e1
          from_node_id: users_dapps
          to_node_id: sequencing
          relationship: submit transactions
          data_or_dependency: L2 txs and L1 messages
          evidence_claim_ids:
            - EC-002
          source_ids:
            - SRC-002
        - edge_id: e2
          from_node_id: sequencing
          to_node_id: ethereum
          relationship: posts data and block information
          data_or_dependency: batches/data availability
          evidence_claim_ids:
            - EC-002
          source_ids:
            - SRC-002
        - edge_id: e3
          from_node_id: sequencing
          to_node_id: proving
          relationship: dispatches proof tasks
          data_or_dependency: traces/chunks/batches
          evidence_claim_ids:
            - EC-002
          source_ids:
            - SRC-002
        - edge_id: e4
          from_node_id: proving
          to_node_id: ethereum
          relationship: submits validity proofs
          data_or_dependency: zkEVM validity proof
          evidence_claim_ids:
            - EC-002
          source_ids:
            - SRC-002
        - edge_id: e5
          from_node_id: users_dapps
          to_node_id: bridge
          relationship: send tokens/messages
          data_or_dependency: cross-domain messages
          evidence_claim_ids:
            - EC-016
          source_ids:
            - SRC-015
      boundaries:
        - boundary_id: scroll_protocol
          label: Scroll protocol
          node_ids:
            - sequencing
            - proving
            - bridge
    rendering_guidance:
      preferred_format: mermaid
      display_notes: Render left-to-right with Ethereum as settlement boundary.
    evidence_claim_ids:
      - EC-002
      - EC-016
    source_ids:
      - SRC-002
      - SRC-015
    notes: null
