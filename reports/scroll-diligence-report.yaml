executive_summary:
  overall_assessment: Scroll appears to be an active Ethereum Layer 2 infrastructure company/network with meaningful public technical assets, institutional funding references, audited protocol components and visible ecosystem usage. However, investment diligence remains incomplete because company-level financials, cap table, token/equity economics, customer revenue, legal posture and management artifacts are not publicly available.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A credible thesis would require proving that public network activity converts into durable, compliant company economics and that Scroll can maintain differentiated zkEVM performance/security in an intensely competitive L2 market while reducing centralization and regulatory risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Scroll publicly operates and documents a zkEVM Layer 2 architecture for Ethereum.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: Scroll publicly documents multiple independent audits and bug bounties up to $1M for critical vulnerabilities.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-005
      summary: Scroll maintains a broad public GitHub organization with active protocol, prover, documentation and audit repositories.
      evidence_claim_ids:
        - EC-011
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Company financials, runway, revenue and margins are not public.
    - risk_id: R-004
      summary: Rollup, bridge, prover, sequencer and upgrade architecture creates high-severity technical/security risk despite audits.
    - risk_id: R-006
      summary: Token, governance, securities, sanctions/AML and cross-border regulatory posture require counsel-led diligence.
  key_evidence_gaps:
    - Audited financial statements, revenue/ARR, gross margin, burn, cash, debt, treasury and tax positions.
    - Capitalization, preference stack, token/equity rights, token treasury and investor side-letter obligations.
    - Top customers/dApps, revenue concentration, contracts, retention, transaction quality and bot/airdrop-incentive normalization.
    - Complete security artifacts, incident history, key-management procedures, decentralization milestones and upgrade-emergency controls.
    - Legal opinions on token status, money-transmission/sanctions exposure, privacy/compliance, IP ownership and employment matters.
  recommended_next_steps:
    - Do not underwrite valuation from public token/network metrics; first reconcile company economics to protocol usage.
    - Run finance, legal/regulatory and security/architecture diligence in parallel before any investment decision.
    - Request top-account/partner revenue and independent ecosystem/customer calls to separate durable demand from incentive-driven activity.
    - Benchmark Scroll against zkSync, Starknet, Polygon zkEVM, Linea, Arbitrum and Optimism using live cost, reliability, developer adoption and security metrics.
chapters:
