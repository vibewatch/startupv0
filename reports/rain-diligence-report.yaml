diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, KPI pack, monthly cash/burn, debt and revenue-recognition memo
    why_it_matters: Financial quality and runway cannot be underwritten from public valuation evidence.
    suggested_source_or_request: Company finance team / auditor
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preferences, warrants, SAFEs, debt, investor rights and side letters
    why_it_matters: Public investor names do not reveal economic ownership, control or liquidation preferences.
    suggested_source_or_request: Company counsel / investors
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top customers/users, contract values, renewal history, satisfaction, utilization and churn
    why_it_matters: Public logos or customer counts do not prove durable revenue quality.
    suggested_source_or_request: Company revenue team / customer references
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Pipeline, conversion, CAC, payback, quota attainment and channel budget by region
    why_it_matters: GTM efficiency and forecast credibility are private.
    suggested_source_or_request: Sales/marketing leadership
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture review, roadmap, technical debt, security assessment, incident history and IP assignment schedule
    why_it_matters: Product defensibility and reliability cannot be validated from marketing pages.
    suggested_source_or_request: CTO / security team / counsel
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Current org chart, HRIS export, compensation, option plan, turnover and employee-relations history
    why_it_matters: Leadership depth and retention risks are not public.
    suggested_source_or_request: People team
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Litigation docket, regulatory correspondence, insurance policies, material contracts and compliance audits
    why_it_matters: Legal/regulatory exposure cannot be cleared without counsel records.
    suggested_source_or_request: Company counsel
    priority: high
