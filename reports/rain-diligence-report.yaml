report_metadata:
  report_title: Rain Startup Diligence Report
  target_company: Rain
  website: https://raincards.xyz/
  known_aliases:
    - Rain Cards
    - Raincards.xyz
    - Rain stablecoin payments
  sector: Stablecoin payments infrastructure, card issuing, digital wallets, and global payment processing
  geography: United States with global and Latin America stablecoin-card demand signals
  company_stage: Private unicorn / Series C fintech infrastructure company
  research_date: 2026-06-03
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing report filenames and selected this uncovered target from a shuffled CB Insights unicorn-list candidate set.
    - Used public-source diligence only; no private data room, founder interview, customer call, counsel memo, security report or regulatory search artifact was available.
    - Treated company-owned pages as evidence of public claims, not independent proof of performance.
    - Fetched the CB Insights current unicorn list and public company/profile/product pages for valuation, product, customer, GTM, team, legal/regulatory and gap analysis.
  included_jurisdictions:
    - United States
    - Public global markets referenced by company materials
  excluded_topics:
    - Non-public financial statements, cap table, board materials, contracts, security reports, customer calls, HRIS/personnel records and privileged legal/regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-03
      notes: No pitch deck, financial model, founder responses or private data room were provided.
