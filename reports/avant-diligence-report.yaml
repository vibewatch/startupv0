executive_summary:
  overall_assessment: Avant has clear public evidence of active products, scale, leadership, and unicorn status, but it carries above-average regulatory, credit-cycle, and funding-market diligence risk.
  investment_or_diligence_thesis: A buyer or investor should underwrite Avant as a regulated consumer-credit platform whose value depends on credit losses, funding access, compliance remediation, partner-bank resilience, and repeatable acquisition economics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn-status evidence supports eligibility.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public product evidence supports the existence of the core product portfolio.
      evidence_claim_ids:
        - EC-003
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Consumer-credit losses, funding spreads, securitization capacity, and capital-market access can materially affect liquidity and profitability.
    - risk_id: R-002
      summary: The FTC matter shows prior servicing compliance risk; consumer-finance regulations and partner-bank oversight remain core diligence items.
    - risk_id: R-003
      summary: Avant uses data and machine learning, but public sources do not disclose model validation or fair-lending controls.
  key_evidence_gaps:
    - Audited financial statements and current cash runway.
    - Current cap table, investor rights, debt, and preference stack.
    - Top-customer/channel concentration, churn, retention, and contracts.
    - Counsel-prepared litigation, regulatory, IP, insurance, and material-contract schedules.
  recommended_next_steps:
    - Run source-document financial diligence.
    - Conduct customer/partner references and legal/regulatory review.
    - Reconcile public valuation to financing documents and current operating metrics.
