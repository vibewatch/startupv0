report_metadata:
  report_title: Avant Public-Source Startup Diligence Report
  target_company: Avant
  website: https://www.avant.com/
  known_aliases:
    - AvantCredit
    - Avant, LLC
  sector: Financial technology, consumer credit, personal loans, credit cards, and loan servicing
  geography: United States headquartered in Chicago, serving U.S. consumers
  company_stage: Private unicorn / mature fintech lender and credit platform
  research_date: 2026-06-07
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and confirmed avant was not covered.
    - "Selected from the CB Insights current unicorn list after public screening for private/active status: Avant was selected from the random candidate order and public sources describe it as private with active 2026 financing activity."
    - Used public evidence only; non-public financial, customer, cap-table, HR, legal, contract, and insurance items are marked as diligence gaps.
    - Search-result snippets and company pages are treated as public evidence, not management verification.
  included_jurisdictions:
    - United States
    - Illinois
    - Federal Trade Commission regulatory context
    - Partner-bank and consumer-credit jurisdictions
  excluded_topics:
    - No private data room, management interview, customer call, counsel docket search, tax schedule, insurance policy, cap table, bank statement, or HRIS export was available.
    - No paywalled sources were bypassed.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for three random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-07
      notes: No company documents, founder claims, financial model, customer list, or legal schedule were provided.
