diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, bank statements, and AR aging.
    why_it_matters: Needed to verify revenue quality, losses, cash runway, working capital, and accounting policies.
    suggested_source_or_request: Request audited statements, trial balance, management accounts, bank statements, and AR aging.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option pool, SAFEs/notes, warrants, debt, preferences, and investor rights.
    why_it_matters: Needed to understand dilution, control, liquidation preference, debt service, and exit waterfall.
    suggested_source_or_request: Request cap table, financing documents, board consents, and debt agreements.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer/channel, churn, retention, and severed-relationship schedule.
    why_it_matters: Needed to assess predictability and concentration risk.
    suggested_source_or_request: Request customer-level revenue cohorts and contracts.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts, litigation schedule, regulatory correspondence, IP schedule, insurance, and privacy/security documentation.
    why_it_matters: Needed to assess legal enforceability and contingent liabilities.
    suggested_source_or_request: Request counsel-prepared legal diligence package.
    priority: high
