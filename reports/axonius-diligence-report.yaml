  - founder_claim_id: FC-004
    claim_text: Axonius has meaningful customer/revenue traction and scale.
    claim_source: TechCrunch and LinkedIn public statements
    claim_date: null
    mapped_chapter_ids:
      - I
      - III
      - V
    mapped_section_ids:
      - I.A
      - III.A
      - III.C
      - V.B
