report_metadata:
  report_title: Axonius Startup Diligence Report
  target_company: Axonius
  website: https://www.axonius.com/
  known_aliases:
    - Axonius, Inc.
    - Axonius Solutions Ltd.
    - Axonius Federal Systems, LLC
    - Axonius Asset Cloud
  sector: Cybersecurity / asset intelligence / exposure management
  geography: United States / New York with Israel and international footprint signals
  company_stage: Late-stage private cybersecurity unicorn
  research_date: 2026-06-02
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source-only research using company docs, SEC EDGAR, unicorn lists, independent news, LinkedIn, Google Patents, CourtListener and competitor-owned pages.
    - Company-authored statements are evidence that claims are made, not proof of commercial outcomes.
    - Private-record requirements are marked not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - New York
    - Delaware
    - Israel
    - Brazil signal from LinkedIn location list
  excluded_topics:
    - Private data room, management interviews, customer calls, paid databases, PACER purchases and non-public HR/financial/legal records.
  user_provided_materials:
    - material_id: UPM-001
      title: Axonius public unicorn selection details from prompt
      type: user_prompt
      date_received: 2026-06-02
      notes: Used as research seed only; not treated as independent evidence.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Axonius is a private unicorn currently valued at $2.60B on CB Insights.
    claim_source: CB Insights source URL and user prompt
    claim_date: 2026-06-02
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: contradicted
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-007
    contradiction_summary: CB Insights $2.60B conflicts with Wikipedia/TechCrunch $1.2B; SEC filings omit valuations.
    diligence_follow_up:
      - Request financing docs, valuation support, cap table and 409A history.
  - founder_claim_id: FC-002
    claim_text: Wikipedia lists Axonius at $1.2B in March 2021 in Cybersecurity, Israel / United States.
    claim_source: Wikipedia unicorn list
    claim_date: 2026-06-02
    mapped_chapter_ids:
