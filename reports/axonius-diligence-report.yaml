    diligence_follow_up:
      - Request ARR bridge, top-customer schedule, churn, NRR/GRR and references.
  - founder_claim_id: FC-005
    claim_text: Axonius was founded in 2017 and led by Dean Sysman with co-founders Ofri Shur and Avidor Bartov.
    claim_source: TechCrunch, LinkedIn and SEC filings
    claim_date: null
    mapped_chapter_ids:
      - VII
    mapped_section_ids:
      - VII.C
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-016
      - EC-018
    contradiction_summary: null
    diligence_follow_up:
      - Request employment agreements, option grants, board minutes and retention plans.
executive_summary:
  overall_assessment: Proceed only with deeper financial, customer, legal and technical diligence. Public evidence verifies financings, product surface, team scale and IP signals, but valuation records conflict and core underwriting facts are private.
  investment_or_diligence_thesis: Axonius may be attractive if current ARR quality, retention, customer concentration, gross margin and legal/IP posture support the $2.60B public valuation; public evidence alone is insufficient.
  strongest_verified_claims:
    - founder_claim_id: FC-003
      summary: Asset Cloud / Cyber Assets / Exposures product positioning is verified by docs/profile.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-010
        - EC-011
        - EC-012
    - founder_claim_id: FC-005
      summary: Founder and governance signals verified by TechCrunch, LinkedIn and SEC.
      evidence_claim_ids:
        - EC-016
        - EC-018
    - founder_claim_id: FC-001
      summary: CB Insights row verifies a $2.60B unicorn-list entry, but it conflicts with other sources.
      evidence_claim_ids:
        - EC-001
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: CB Insights $2.60B vs Wikipedia/TechCrunch $1.2B valuation discrepancy.
    - risk_id: R-002
      summary: Financial quality, ARR, burn, cash/debt and projections are private.
    - risk_id: R-003
      summary: Customer concentration, churn and contract quality are not public.
  key_evidence_gaps:
    - Financing documents, cap table, preferences, valuation support and 409A history.
    - Audited financials, current ARR bridge, gross margin, cash/debt and forecast model.
    - Top-customer ARR, churn, NRR/GRR, backlog, pipeline and references.
    - Legal pleadings, insurance, IP assignments, regulatory/privacy/security reports and material contracts.
    - HRIS, turnover, compensation, benefits, employment agreements and option plan.
  recommended_next_steps:
    - Reconcile valuation to primary financing documents before underwriting.
    - Run customer/revenue-quality diligence on top accounts and retention cohorts.
    - Have counsel review litigation, IP, privacy/security, regulatory history and material contracts.
    - Run technical diligence on adapter reliability, data quality, security controls and roadmap feasibility.
