    risk_title: Valuation discrepancy and stale unicorn records
    risk_category: financing
    severity: high
    likelihood: high
    evidence_strength: strong
    description: CB Insights $2.60B conflicts with Wikipedia/TechCrunch $1.2B; later SEC filings omit valuations.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-007
    mitigation_or_diligence_request: Obtain financing documents, valuation memo, 409A and cap-table waterfall.
  - risk_id: R-002
    risk_title: Financial quality and revenue predictability are private
    risk_category: financial
    severity: high
    likelihood: high
    evidence_strength: strong public gap
    description: Only stale ARR and financing signals are public.
    impacted_chapter_ids:
      - I
      - II
    impacted_section_ids:
      - I.A
      - I.B
      - II.A
    evidence_claim_ids:
      - EC-003
      - EC-006
      - EC-013
    mitigation_or_diligence_request: Request audited financials, ARR bridge, gross margin, cash/debt, burn and forecast.
  - risk_id: R-003
    risk_title: Customer concentration and retention unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    evidence_strength: strong public gap
    description: Top customers, churn, NRR and contract quality are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Request top-25 customer ARR, renewal calendar, churn/NRR/GRR and references.
  - risk_id: R-004
    risk_title: Competitive pressure from specialists and suites
    risk_category: market
    severity: medium
    likelihood: high
    evidence_strength: moderate
    description: Sevco, JupiterOne and CrowdStrike overlap public positioning.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-019
    mitigation_or_diligence_request: Run win/loss, pricing and churn-by-competitor analysis.
  - risk_id: R-005
    risk_title: Adapter/data-quality dependency
    risk_category: technical
    severity: medium
    likelihood: medium
    evidence_strength: moderate
    description: Product value depends on integrations and customer data quality.
    impacted_chapter_ids:
      - II
      - VI
      - III
    impacted_section_ids:
      - II.A
      - VI.B
      - III.E
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Review adapter reliability, API limits, normalization accuracy and implementation KPIs.
  - risk_id: R-006
    risk_title: Employment and recent litigation exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    evidence_strength: moderate
    description: CourtListener shows Sussman and Shkurko dockets.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.F
      - VIII.A
      - VIII.E
    evidence_claim_ids:
      - EC-021
      - EC-022
      - EC-023
    mitigation_or_diligence_request: Counsel review of pleadings, reserves, insurance and settlement posture.
  - risk_id: R-007
    risk_title: IP ownership and defensibility require review
    risk_category: legal
    severity: medium
    likelihood: unknown
    evidence_strength: moderate
    description: Patents exist, but ownership chain, maintenance, trademarks and FTO are not complete.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.D
    evidence_claim_ids:
      - EC-020
      - EC-024
    mitigation_or_diligence_request: Request IP schedule, assignments, OSS scan and FTO memo.
  - risk_id: R-008
    risk_title: Scaling, retention and compensation data private
    risk_category: team
    severity: medium
    likelihood: medium
    evidence_strength: moderate
    description: LinkedIn shows scale and hiring; turnover/comp are private.
    impacted_chapter_ids:
      - VII
      - V
    impacted_section_ids:
      - VII.B
      - VII.G
      - V.D
    evidence_claim_ids:
      - EC-016
      - EC-017
      - EC-018
    mitigation_or_diligence_request: Request HRIS, attrition, comp bands, option plan and hiring plan.
  - risk_id: R-009
    risk_title: Security, privacy and regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    evidence_strength: limited
    description: Axonius processes asset/exposure data; public evidence does not verify security reports or incident history.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids:
      - EC-011
      - EC-024
    mitigation_or_diligence_request: Request SOC 2/ISO, DPAs, subprocessors, incidents and regulatory correspondence.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preference stack, valuation bridge and 409A history.
    why_it_matters: Determines economic ownership and return sensitivity.
    suggested_source_or_request: Company CFO / counsel financing data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts, ARR bridge, cash/debt and burn.
    why_it_matters: Needed to evaluate financial quality and runway.
    suggested_source_or_request: Finance data room and auditor letters.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue, churn, NRR/GRR and backlog.
    why_it_matters: Customer concentration and retention drive valuation quality.
    suggested_source_or_request: CRM, billing and customer-success exports plus references.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Price book, SKU ARR, deployment costs, gross margin and adapter reliability metrics.
    why_it_matters: Product economics and technical reliability are central to underwriting.
    suggested_source_or_request: Product, finance and support data rooms.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Pleadings, damages, reserves, insurance notices and settlement posture for identified dockets.
    why_it_matters: Public docket metadata cannot quantify legal exposure.
    suggested_source_or_request: Company counsel litigation schedule and PACER documents.
    priority: high
