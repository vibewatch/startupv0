    mapped_section_ids:
      - I.C
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-007
    contradiction_summary: Verified as Wikipedia/TechCrunch record, but lower than CB Insights.
    diligence_follow_up:
      - Reconcile current valuation and source dates.
  - founder_claim_id: FC-003
    claim_text: Axonius offers an Asset Cloud / asset intelligence platform for unified security operations and exposure management.
    claim_source: Company docs and LinkedIn
