executive_summary:
  overall_assessment: SmartHR, Inc. qualifies for this run as an uncovered private
    unicorn candidate based on CB Insights and corroborating public evidence.
    The public record supports the high-level business narrative, but investment
    reliance requires private proof of financial quality, customer
    concentration, legal/regulatory status and valuation terms.
  investment_or_diligence_thesis: Proceed to full data-room diligence only if
    management can substantiate the valuation with primary financing documents,
    durable unit economics and customer/partner evidence. The public upside
    thesis is credible; the private diligence burden is material.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: SmartHR is an uncovered private unicorn with last publicly disclosed
        valuation around US$1.6B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: SmartHR provides cloud HR/labor and talent-management software.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: SmartHR raised a 2024 $140M Series E after its 2021 Series D.
      evidence_claim_ids: *a3
    - founder_claim_id: FC-004
      summary: SmartHR serves a large customer base with reported support for 60,000
        companies.
      evidence_claim_ids: *a4
  biggest_risks:
    - risk_id: R-001
      summary: Last disclosed valuation is stale relative to 2024 Series E
    - risk_id: R-002
      summary: ARR, retention and customer concentration are not public
    - risk_id: R-003
      summary: Product expansion may dilute focus or pressure margins
    - risk_id: R-004
      summary: Japan HR SaaS competition and pricing pressure
    - risk_id: R-005
      summary: IPO expectations and governance readiness
  key_evidence_gaps:
    - Audited financial statements and management accounts
    - Current capitalization and financing documents
    - Customer/merchant revenue concentration and churn
    - Sales productivity and CAC by channel
    - Product roadmap, R&D budget and technical validation
  recommended_next_steps:
    - Request full financial/cap-table data room before relying on valuation.
    - Run customer, legal/regulatory, IP, security/privacy and
      management-reference diligence.
    - Reconcile every public metric to definitions, time series and source
      documents.
