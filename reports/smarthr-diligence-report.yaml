risk_register:
  - risk_id: R-001
    risk_title: Last disclosed valuation is stale relative to 2024 Series E
    risk_category: financing
    severity: medium
    likelihood: medium
    description: The 2024 Series E did not publicly disclose valuation, leaving the
      $1.6B 2021 anchor stale.
    impacted_chapter_ids:
      - I
    impacted_section_ids: *a139
    evidence_claim_ids: *a140
    mitigation_or_diligence_request: Request Series E terms and current valuation bridge.
  - risk_id: R-002
    risk_title: ARR, retention and customer concentration are not public
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Reported $100M ARR and 60,000-company customer base require
      reconciliation to audited revenue, churn and top-account concentration.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids: *a141
    evidence_claim_ids: *a142
    mitigation_or_diligence_request: Review audited financials, ARR cohorts,
      retention and customer concentration.
  - risk_id: R-003
    risk_title: Product expansion may dilute focus or pressure margins
    risk_category: product
    severity: medium
    likelihood: medium
    description: SmartHR Plus and group services broaden scope beyond core HR
      operations, but revenue contribution and integration cost are private.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids: *a143
    evidence_claim_ids: *a144
    mitigation_or_diligence_request: Request product P&Ls, attach rates and integration roadmaps.
  - risk_id: R-004
    risk_title: Japan HR SaaS competition and pricing pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: SmartHR faces local SaaS vendors, payroll providers and global HCM suites.
    impacted_chapter_ids:
      - IV
    impacted_section_ids: *a145
    evidence_claim_ids: *a146
    mitigation_or_diligence_request: Benchmark win/loss, pricing, gross margin and sales efficiency.
  - risk_id: R-005
    risk_title: IPO expectations and governance readiness
    risk_category: financing
    severity: medium
    likelihood: medium
    description: Late-stage funding and board composition suggest public-market
      readiness pressure, but internal controls and governance records are
      private.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids: *a147
    evidence_claim_ids: *a148
    mitigation_or_diligence_request: Request audit committee materials, internal
      controls and IPO readiness plan.
  - risk_id: R-006
    risk_title: Leadership retention and succession
    risk_category: team
    severity: medium
    likelihood: medium
    description: Leadership roster is public but compensation, retention and
      succession are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids: *a149
    evidence_claim_ids: *a150
    mitigation_or_diligence_request: Review employment agreements, incentive plans, turnover and succession.
  - risk_id: R-007
    risk_title: HR data privacy and security exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: SmartHR handles sensitive employee/labor data; ISO certification is
      public but incident history and controls need private review.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids: *a151
    evidence_claim_ids: *a152
    mitigation_or_diligence_request: Review ISMS scope, SOC reports, incidents,
      privacy controls and vendor-risk records.
  - risk_id: R-008
    risk_title: M&A/product integration execution risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Series E proceeds may support organic/inorganic growth; integration
      execution and group-service complexity require diligence.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids: *a153
    evidence_claim_ids: *a154
    mitigation_or_diligence_request: Request acquisition pipeline, integration plans and material contracts.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and management accounts
    why_it_matters: Required to verify revenue quality, burn, margin and runway.
    suggested_source_or_request: Audited annual statements, monthly management accounts and KPI package
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current capitalization and financing documents
    why_it_matters: Required to reconcile valuation, dilution, debt and preferences.
    suggested_source_or_request: Cap table, option pool, financing docs, debt agreements and board consents
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer/merchant revenue concentration and churn
    why_it_matters: Required to assess revenue predictability and concentration risk.
    suggested_source_or_request: Top-account schedule, cohort retention and customer reference calls
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity and CAC by channel
    why_it_matters: Required to validate GTM efficiency.
    suggested_source_or_request: Pipeline, bookings, CAC, quota attainment and channel ROI
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, R&D budget and technical validation
    why_it_matters: Required to validate product maturity and delivery risk.
    suggested_source_or_request: Roadmap, R&D headcount, budgets, QA/security/benchmark reports
    priority: medium
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, compensation and retention
    why_it_matters: Required to assess scaling and key-person risk.
    suggested_source_or_request: HRIS export, compensation bands, turnover and employment agreements
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Legal, regulatory, IP and insurance schedules
    why_it_matters: Required because public sources cannot prove absence of material issues.
    suggested_source_or_request: Counsel schedules, IP assignments, policies,
      regulatory correspondence and insurance binders
    priority: high
