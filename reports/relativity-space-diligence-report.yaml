diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, cash/debt, burn and AR aging
    why_it_matters: Needed to assess financial quality and runway.
    suggested_source_or_request: Request audited financials, management accounts and bank/debt records.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table and financing terms
    why_it_matters: Needed to understand ownership and dilution.
    suggested_source_or_request: Request cap table, stock ledger, investor rights and debt/warrant schedules.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Executed customer contracts and amendments
    why_it_matters: Needed to verify backlog quality.
    suggested_source_or_request: Request launch-service agreements, deposits, cancellation rights and customer calls.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Terran R readiness package
    why_it_matters: Needed to underwrite launch cadence.
    suggested_source_or_request: Request qualification, test, first-flight and license records.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.A
    missing_information: Manufacturing yield and QA data
    why_it_matters: Needed to validate additive manufacturing claims.
    suggested_source_or_request: Request yield, scrap, NDE, nonconformance and supplier-quality records.
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.G
    missing_information: FAA/range/insurance status
    why_it_matters: Needed before revenue reliance.
    suggested_source_or_request: Request FAA, NEPA, range and insurance documents.
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP/FTO schedule
    why_it_matters: Needed to assess defensibility.
    suggested_source_or_request: Request patent/trademark assignments, FTO and licenses.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS and retention metrics
    why_it_matters: Needed after CEO transition and layoffs.
    suggested_source_or_request: Request org chart, attrition, comp and retention data.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Comprehensive litigation searches
    why_it_matters: Needed to verify legal exposure.
    suggested_source_or_request: Run PACER/state-court searches and obtain counsel schedule.
    priority: medium
  - gap_id: G-010
    chapter_id: V
    section_id: V.D
    missing_information: Sales pipeline and pricing data
    why_it_matters: Needed to test GTM predictability.
    suggested_source_or_request: Request pipeline, pricing, quotas and win/loss data.
    priority: medium
