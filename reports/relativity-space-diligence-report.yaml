report_metadata:
  report_title: Relativity Space Public Startup Unicorn Diligence Report
  target_company: Relativity Space
  website: https://www.relativityspace.com/
  known_aliases:
    - Relativity Space Inc.
    - Relativity
    - Terran R
    - Terran 1
    - Aeon R
    - Stargate
  sector: Aerospace / commercial launch / reusable rockets
  geography: United States; public footprint includes California, Mississippi, Florida, Washington D.C. and Seattle
  company_stage: Private unicorn / late-stage venture-backed launch company
  research_date: 2026-06-06
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company, SEC, news, customer/partner, regulator, legal/IP, hiring and market sources.
    - Treated company pages as claims evidence, not independent proof.
    - Marked private financials, cap table, contracts, customer concentration, insurance, compensation and supplier terms as not_publicly_verifiable.
  included_jurisdictions:
    - United States federal securities and launch-regulatory sources
    - United States legal/IP search entry points
    - Public international satellite-operator context
  excluded_topics:
    - Non-public data room, customer calls, management interviews, counsel opinions, paid docket retrieval and proprietary financial models.
  user_provided_materials:
    - material_id: UPM-001
      title: Wikipedia unicorn-list candidate row for Relativity Space
      type: workflow_context
      date_received: 2026-06-06
      notes: Listed Relativity Space at US$4.2B, June 2021, Aerospace, United States.
