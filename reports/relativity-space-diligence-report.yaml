executive_summary:
  overall_assessment: Relativity Space passes public-source eligibility screening as an active private unicorn workstream. The latest public valuation anchor remains US$4.2B from the June 2021 Series E. Public evidence supports historical funding, active Terran R/company pages, named customer announcements, large facilities and the 2025 Eric Schmidt CEO transition. Investment-grade diligence remains unresolved because financials, runway, cap table, backlog terms, customer concentration, insurance, manufacturing yields, Terran R qualification, FAA/range status, IP/FTO and litigation schedules are private or incomplete.
  investment_or_diligence_thesis: "Proceed only with confirmatory diligence: Relativity may have the capital, team, infrastructure and customer interest to build a reusable medium-to-heavy launch entrant, but it must convert announcement-heavy backlog into reliable Terran R launches after retiring Terran 1 while competing against SpaceX and other better-proven launch providers."
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: SEC and TechCrunch evidence verify the 2021 $650M financing amount and $4.2B public valuation anchor.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: Independent coverage verifies the Terran 1 retirement and hard pivot to Terran R.
      evidence_claim_ids:
        - EC-008
    - founder_claim_id: FC-007
      summary: TechCrunch and company pages support the 2025 CEO transition to Eric Schmidt and scaled team signal.
      evidence_claim_ids:
        - EC-017
        - EC-019
  biggest_risks:
    - risk_id: R-001
      summary: Terran R cadence and execution are unproven after the Terran 1/Terran R transition.
    - risk_id: R-002
      summary: Capital intensity and runway are opaque because cash, burn, debt and capex are private.
    - risk_id: R-003
      summary: Backlog quality, deposits, cancellation rights and customer concentration are not publicly verifiable.
  key_evidence_gaps:
    - Audited financials, cash/debt, burn, capex and runway scenarios.
    - Current cap table, financing terms, debt/warrant/option schedules and valuation marks.
    - Executed customer contracts, deposits, cancellation rights and backlog aging.
    - Terran R qualification, test, launch-license, range-access and insurance records.
    - Manufacturing yield/QA, supplier concentration, IP/FTO, litigation and HR records.
  recommended_next_steps:
    - Run finance/cap-table diligence before relying on the historical $4.2B valuation.
    - Require contract-level backlog verification and customer calls before underwriting revenue.
    - Require Terran R technical/regulatory readiness package and independent mission-assurance review.
    - Have counsel complete litigation, IP/FTO, FAA/range, insurance and material-contract diligence.
