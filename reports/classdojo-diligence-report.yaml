executive_summary:
  overall_assessment: "ClassDojo is a credible public-evidence edtech unicorn candidate: public sources support its
    founding history, large reach claims, broad product portfolio, app-store engagement and historical US$1.25B
    valuation. The investability question remains unresolved because public evidence does not disclose revenue quality,
    margin, retention, cap table, customer concentration, AI safety/efficacy, security assurance, legal materiality or
    current valuation."
  investment_or_diligence_thesis: Track, but do not underwrite from public data alone. The upside case is a massive
    trusted K-12 family network monetized through subscriptions, tutoring, AI learning and payments; the diligence gate
    is whether paid cohorts, privacy/security controls, child-safety/AI evidence and current financials support the
    stale 2022 unicorn valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: YC and unicorn-list sources verify founders/founding history.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-025
    - founder_claim_id: FC-005
      summary: Official pages verify a broad public product portfolio beyond core classroom communication.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
        - EC-019
        - EC-020
        - EC-021
    - founder_claim_id: FC-007
      summary: App-store listings verify substantial mobile review/rating footprint.
      evidence_claim_ids:
        - EC-016
        - EC-017
  biggest_risks:
    - risk_id: R-002
      summary: No public financials, ARR, margin, burn, retention or customer concentration.
    - risk_id: R-004
      summary: Child/student-data privacy and regulatory exposure require assurance artifacts.
    - risk_id: R-005
      summary: Child-facing AI, tutoring and virtual-world products raise safety/efficacy/moderation risk.
    - risk_id: R-001
      summary: US$1.25B public valuation is historical and unsupported by current public financials.
  key_evidence_gaps:
    - Audited/management financials, ARR/revenue bridge, gross margin, burn and runway.
    - Current cap table, liquidation preferences, option ledger, debt/warrants/notes and 409A.
    - Paid cohort retention, top-customer revenue, app-store net receipts, Plus/Tutor/Sparks/Payments unit economics.
    - SOC 2 Type II, penetration tests, DPAs, subprocessors, privacy incidents and regulator correspondence.
    - AI model cards/evaluations, child-safety/moderation logs, tutoring-vetting evidence and learning-outcome studies.
  recommended_next_steps:
    - Open financial/cap-table data room and reconcile public valuation to current ARR, margin, burn and financing terms.
    - Run customer/revenue diligence focused on paid conversion, retention and concentration rather than aggregate reach.
    - Perform privacy/security/AI/payments legal review with counsel and independent assurance artifacts.
    - Interview customers across teachers, parents, school leaders and districts; run competitor win/loss against
      ParentSquare/Remind, Seesaw and TalkingPoints.
    - Require product-level P&Ls and safety/efficacy metrics for Plus, Tutor, Sparks, Islands and Payments before
      valuation reliance.
