risk_register:
  - risk_id: R-001
    risk_title: Stale unicorn valuation and undisclosed capital structure
    risk_category: financing
    severity: high
    likelihood: medium
    description: The public valuation support dates to 2022; current 409A, cap table, liquidation preferences, debt and
      financing needs are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-024
    mitigation_or_diligence_request: Request full cap table, financing documents, investor rights, debt schedule, 409A
      history, SAFEs/notes/warrants and current runway model.
  - risk_id: R-002
    risk_title: Financial opacity and revenue-quality uncertainty
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence confirms products and reach, but not ARR, gross margin, burn, deferred revenue, retention,
      customer concentration or cohort economics.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
      - V.D
    evidence_claim_ids:
      - EC-001
      - EC-011
      - EC-024
    mitigation_or_diligence_request: Request audited/management financials, ARR bridge, subscription cohorts, customer
      revenue schedule, gross margin by product and cash forecast.
  - risk_id: R-003
    risk_title: Free core product versus paid monetization pressure
    risk_category: market
    severity: high
    likelihood: medium
    description: ClassDojo promises free core teacher/school/district use while monetizing through families, services and
      payments; the public record does not prove unit economics.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.A
      - II.A
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-001
      - EC-008
      - EC-010
      - EC-011
      - EC-016
      - EC-019
    mitigation_or_diligence_request: Build cohort LTV/CAC by product, including app-store fees, tutor costs, support costs,
      free-user infra costs and conversion rates.
  - risk_id: R-004
    risk_title: Student-data privacy and child-regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: The company handles child/student data and makes COPPA/FERPA/GDPR/security claims; actual compliance
      artifacts, incidents and regulator correspondence are not public.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-015
      - EC-018
      - EC-026
    mitigation_or_diligence_request: Request DPAs, consent-flow evidence, privacy impact assessments, subprocessor list,
      data-retention/deletion logs, incident history and regulator correspondence.
  - risk_id: R-005
    risk_title: Child-facing AI, tutoring and virtual-world safety
    risk_category: product
    severity: high
    likelihood: medium
    description: Sparks, Homework Helper, Tutor and Islands extend ClassDojo into AI/voice, tutoring and virtual
      environments for minors, where efficacy, safety and moderation are critical.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-020
    mitigation_or_diligence_request: Request AI model cards, safety red-team results, moderation policies, tutor vetting,
      efficacy studies, complaint logs and age-appropriate design review.
  - risk_id: R-006
    risk_title: Crowded family-engagement and learning-platform competition
    risk_category: market
    severity: medium
    likelihood: high
    description: ParentSquare, Remind, Seesaw and TalkingPoints publicly compete across district engagement, messaging,
      elementary learning and outcomes.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-023
    mitigation_or_diligence_request: Request win/loss, customer references, churn by competitor, pricing benchmarks and feature-parity roadmap.
  - risk_id: R-007
    risk_title: District enterprise motion not proven by free adoption claims
    risk_category: customer
    severity: medium
    likelihood: high
    description: District and school pages support adoption claims but do not show paid district contracts, renewal
      economics or procurement cycle data.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.B
      - V.B
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-019
      - EC-021
    mitigation_or_diligence_request: Request pipeline, contracted district list, ARR by district, renewal schedule, pilots,
      procurement timeline and references.
  - risk_id: R-008
    risk_title: Mobile-platform, subscription and payments dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: App stores are important for distribution/subscriptions and payments introduces regulated dependencies;
      platform fees, policy changes and payment risk are not public.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.E
      - V.A
      - VIII.F
    evidence_claim_ids:
      - EC-016
      - EC-017
      - EC-021
    mitigation_or_diligence_request: Request app-store net receipts, platform policy history, payment processor contracts,
      fraud logs, TPV/take-rate and business continuity plan.
  - risk_id: R-009
    risk_title: Accessibility litigation and remediation uncertainty
    risk_category: legal
    severity: medium
    likelihood: medium
    description: A public tracker reports a 2021 California accessibility complaint; current status, settlement/remediation
      and repeat exposure are not public.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
    evidence_claim_ids:
      - EC-022
    mitigation_or_diligence_request: Request litigation schedule, docket status, settlement terms if any, accessibility
      audit, remediation roadmap and insurance notice history.
  - risk_id: R-010
    risk_title: IP defensibility unclear beyond public brand/trademark signals
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public evidence shows brand/product-trademark claims, but patent, copyright, curriculum, AI model and
      open-source license posture were not public.
    impacted_chapter_ids:
      - VIII
      - VI
    impacted_section_ids:
      - VIII.D
      - VI.A
    evidence_claim_ids:
      - EC-009
      - EC-020
      - EC-024
    mitigation_or_diligence_request: Request IP schedule, trademark registrations, invention assignment agreements,
      curriculum/content ownership proof, model-data licenses and OSS scan.
  - risk_id: R-011
    risk_title: Team scaling, succession and retention risk
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Founders are publicly identifiable and hiring is visible, but headcount, turnover, comp obligations, option
      grants and succession plans are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.F
      - VII.G
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-024
      - EC-025
    mitigation_or_diligence_request: Request HRIS export, org chart, headcount plan, attrition, engagement survey, executive
      agreements, option ledger and succession plan.
  - risk_id: R-012
    risk_title: Security-control assurance gap
    risk_category: technical
    severity: high
    likelihood: medium
    description: Security page makes NIST/AWS/encryption/compliance claims, but independent assurance and incident history
      are not public.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-013
    mitigation_or_diligence_request: Request SOC 2 Type II, penetration tests, architecture/data-flow diagrams, incident
      log, disaster recovery evidence and subprocessor agreements.
  - risk_id: R-013
    risk_title: Payments compliance and money-movement exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: ClassDojo Payments may add processor, fraud, KYC/AML, state money-transmission allocation and chargeback
      risk depending on product design.
    impacted_chapter_ids:
      - II
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - V.A
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-021
    mitigation_or_diligence_request: Review payments architecture, processor agreement, regulatory analysis, TPV, take rate,
      fraud/chargeback history and reconciliation controls.
  - risk_id: R-014
    risk_title: Metric-definition inconsistency and marketing-claim reconciliation
    risk_category: reputational
    severity: low
    likelihood: medium
    description: Public pages cite different reach and translation figures (45M, 50M, 51M; 190+, 130+, 100+ language
      contexts), requiring definitions before reliance.
    impacted_chapter_ids:
      - III
      - IV
      - V
    impacted_section_ids:
      - III.A
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
      - EC-019
      - EC-026
    mitigation_or_diligence_request: Request source-of-truth KPI definitions, deduping methodology, geography, activeness
      thresholds and marketing-claims approval process.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited and management financial statements, ARR/revenue bridge, gross margin, burn and cash runway.
    why_it_matters: Needed to verify valuation support, revenue quality and survivability.
    suggested_source_or_request: Company CFO data room; auditor and board packs.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, financing documents, debt/warrants/notes, investor rights and 409A history.
    why_it_matters: Determines ownership, dilution, liquidation preferences and current valuation risk.
    suggested_source_or_request: Company legal/finance; investor counsel.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level usage, retention, gross margin, roadmap, AI model evaluations and safety/moderation incidents.
    why_it_matters: Product breadth includes child-facing AI, tutoring, virtual world and payments risks.
    suggested_source_or_request: Product analytics, roadmap, safety trust systems, AI governance.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, top-customer concentration, NRR/GRR, churn and app-store net receipts.
    why_it_matters: Aggregate reach does not prove paid customer quality.
    suggested_source_or_request: Revenue operations/customer success exports and app-store financial reports.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, churn by competitor, market share, RFP results and customer references.
    why_it_matters: Competitors target the same district/family engagement and elementary learning budgets.
    suggested_source_or_request: Sales/customer-success win-loss data and customer calls.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Sales comp, quota, pipeline, CAC/payback, conversion funnels and GTM hiring plan.
    why_it_matters: PLG, consumer, services, district and payments motions have different economics.
    suggested_source_or_request: GTM dashboards, CRM export and board plan.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D org chart, architecture diagrams, SOC report, penetration tests and subprocessor list.
    why_it_matters: Student-data, AI and payments products require validated engineering and security controls.
    suggested_source_or_request: CTO/CISO data room, SOC 2, pen tests, architecture review.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS export, headcount history/plan, attrition, compensation, options and employee-relations logs.
    why_it_matters: Execution capacity and retention risk are opaque.
    suggested_source_or_request: HR/people data room.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation and threatened-claims schedule, including status of accessibility complaint.
    why_it_matters: Public tracker alone cannot establish material legal exposure.
    suggested_source_or_request: Outside counsel letter and docket search.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Privacy/security incidents, regulator correspondence, DPAs, DPIAs, consent logs and AI/payments compliance memos.
    why_it_matters: Child/student data, AI and payments are core legal/regulatory risks.
    suggested_source_or_request: Counsel, privacy, security and compliance teams.
    priority: high
