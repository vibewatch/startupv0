research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth with public company pages, app-store listings,
      YC/company databases, unicorn/funding trackers, independent media, privacy/security/legal pages, competitor pages
      and public legal-tracker sources.
    - Treated company-published materials as evidence that ClassDojo makes the stated public claim; operating metrics,
      financials, customer economics, security controls and legal materiality require primary company/counsel documents.
    - Did not use private, paid, leaked, non-public, student/customer-confidential or user-provided data-room materials.
  included_jurisdictions:
    - United States
    - California
    - Global privacy/security contexts for K-12 edtech and child/student data
  excluded_topics:
    - Non-public audited financial statements, cap table, board minutes, contracts, SOC reports, penetration tests,
      source code, AI model artifacts, data-processing agreements, customer calls, employee records, counsel opinions
      and full PACER/state/international docket searches were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for a public-evidence ClassDojo diligence report
      type: workflow_context
      date_received: 2026-05-22
      notes: User requested a standard-depth evidence-backed YAML report at reports/classdojo-diligence-report.yaml using the
        startup-diligence-research skill.
