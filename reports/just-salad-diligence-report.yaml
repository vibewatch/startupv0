executive_summary:
  overall_assessment: "Eligible private-unicorn diligence target: public evidence supports Just Salad as a current private $1B CB Insights unicorn with a $200M 2025 raise and ongoing operations [EC-001, EC-002, EC-005, EC-025]. The opportunity is a scaled healthy fast-casual/sustainability brand, but financial, cap-table, unit-economic, customer, supplier, and legal schedules are mostly private [EC-019, EC-020, EC-021]."
  investment_or_diligence_thesis: Diligence should focus on whether nearly-100-unit expansion, digital/app personalization, and sustainability differentiation can sustain restaurant-level margins and growth sufficient for the $1B valuation [EC-002, EC-003, EC-011, EC-012].
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and financing coverage support the $1B unicorn valuation and 2025-02-24 list date.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-003
      summary: D1 Capital Partners is publicly named in the investor group for the 2025 raise.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-004
      summary: Fast-casual, app/online, catering, sustainability, reusable-bowl and carbon-label positioning are publicly supported.
      evidence_claim_ids:
        - EC-003
        - EC-007
        - EC-008
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation support remain opaque without financials, same-store-sales, and restaurant P&Ls.
    - risk_id: R-002
      summary: Expansion execution and unit economics could miss plan in competitive, labor/food-cost sensitive markets.
    - risk_id: R-003
      summary: Legal, employment, accessibility, food-safety, and regulatory exposure requires counsel/regulatory schedule review.
  key_evidence_gaps:
    - Audited financial statements, restaurant-level P&Ls, and same-store-sales cohorts.
    - Fully diluted cap table, 2025 financing terms, debt/lease obligations, and investor rights.
    - Revenue by customer/channel/platform, supplier concentration, and delivery/catering economics.
    - Management org chart, headcount/turnover, compensation, and employee-relations history.
    - Complete litigation, regulatory, insurance, and sustainability substantiation package.
  recommended_next_steps:
    - Proceed with standard private-company diligence; do not rely on valuation headline without financial/cap-table review.
    - Prioritize financial model, cap table, store-cohort economics, legal/regulatory schedule, and supplier/food-safety records.
    - Interview CEO, CFO/finance, operations, technology/product, legal, and sustainability owners.
    - Run location-level public-health/legal searches across every operating state and reconcile with counsel schedule.
chapters:
