    risk_title: Capital-structure complexity and investor rights
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: Public records show legacy Form D offerings, a 2025 $200M raise, and HoldCo/LLC signals, but current ownership, preferences, debt, options, and side letters are private [EC-004, EC-020].
