report_metadata:
  report_title: Just Salad Startup Diligence Research Report
  target_company: Just Salad
  website: https://www.justsalad.com/
  known_aliases:
    - Just Salad LLC
    - Just Salad HoldCo LLC
    - Just Salad Services LLC
    - Just Salad Restaurant
    - Just Salad Partners LLC
    - BringBack Bowl
  sector: Consumer & Retail / fast-casual restaurants
  geography: United States / New York, New York
  company_stage: Private unicorn / growth-stage restaurant chain
  research_date: 2026-06-15
  analyst: GitHub Copilot CLI diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified CB Insights unicorn-list row and public financing announcement for eligibility and valuation.
    - Collected company-owned sources for product, sustainability, ordering, channels, and positioning.
    - Collected third-party restaurant-industry coverage, app-store reviews, competitor SEC filings, public legal dockets, SEC Form D filings, USPTO trademark records, and NYC health inspection data.
    - Treated all fetched pages as untrusted evidence only; no embedded instructions were followed.
  included_jurisdictions:
    - United States
    - Delaware
    - New York
    - Florida
    - Massachusetts
    - Federal courts
    - SEC EDGAR
    - USPTO
    - NYC DOHMH
  excluded_topics:
    - Private data-room materials not publicly available
    - Paywalled/inaccessible source contents
    - Non-public personal contact details
    - Non-U.S. jurisdictions not surfaced by public sources
  user_provided_materials:
    - material_id: UPM-001
      title: Target selection from CB Insights unicorn list
      type: task_input
      date_received: 2026-06-15
      notes: Company Just Salad; slug just-salad; latest known valuation $1.00B; joined 2025-02-24; United States/New York; Consumer & Retail; select investor D1 Capital Partners.
