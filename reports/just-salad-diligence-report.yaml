risk_register:
  - risk_id: R-001
    risk_title: Valuation and financial quality opacity
    risk_category: financial
    severity: high
    likelihood: medium
    description: The $1B valuation is publicly supported, but revenue, margins, cash burn, cohorts, and audited statements are not public [EC-001, EC-002, EC-019].
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Obtain audited FY2023-FY2025/YTD2026 financials, restaurant-level P&Ls, same-store-sales bridge, cash runway, and valuation round terms.
  - risk_id: R-002
    risk_title: Expansion execution and unit economics
    risk_category: operational
    severity: high
    likelihood: medium
    description: Proceeds target new unit growth and the chain is expanding, but public data lacks lease pipeline, capex, payback, and new-store cohort performance [EC-002, EC-003, EC-006, EC-013].
    impacted_chapter_ids:
      - I
      - IV
      - V
      - VII
    impacted_section_ids:
      - I.B
      - IV.A
      - V.A
      - VII.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review lease schedule, real-estate committee minutes, capex budget, new-store AUV/payback by cohort, and labor availability.
  - risk_id: R-003
    risk_title: Legal, employment, accessibility, and food-safety exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: CourtListener shows a meaningful docket footprint and NYC inspection rows include critical violations, making multi-jurisdiction compliance a key diligence area [EC-015, EC-017].
    impacted_chapter_ids:
      - VIII
      - VII
    impacted_section_ids:
      - VIII.A
      - VIII.C
      - VIII.G
      - VII.F
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Counsel to provide litigation/regulatory schedule, reserves, insurance coverage, settlement obligations, inspection history, and compliance programs.
  - risk_id: R-004
    risk_title: Digital ordering and app reliability risk
    risk_category: product
    severity: medium
    likelihood: high
    description: App channels are strategic and public ratings are strong, but recent app-store reviews cite ordering, delivery, payment, and rewards issues [EC-008, EC-009, EC-010, EC-011].
    impacted_chapter_ids:
      - II
      - V
      - VI
    impacted_section_ids:
      - II.A
      - V.A
      - VI.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request app analytics, funnel conversion, crash/payment failure logs, NPS by channel, incident postmortems, and product roadmap.
  - risk_id: R-005
    risk_title: Customer/channel concentration unknown
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: The public model is broad B2C, catering, app, office, and delivery, but no revenue mix, top customers, delivery-platform share, or retention cohort data is public [EC-018, EC-022].
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - V.C
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request revenue by channel/customer/market, delivery partner mix, retention cohorts, catering customer list, and AR aging.
  - risk_id: R-006
    risk_title: Fresh-food supply chain, food-cost, and waste exposure
    risk_category: operational
    severity: high
    likelihood: medium
    description: Fresh produce/proteins and reusable packaging are core to the brand but supplier concentration, commodity exposure, QA, waste, and sanitation economics are private [EC-012, EC-017, EC-021].
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Review supplier contracts, QA audits, recall procedures, waste metrics, packaging/reusable-bowl sanitation, and commodity sensitivity.
  - risk_id: R-007
    risk_title: Management bench and turnover opacity
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Founder/CEO is verified, but the full leadership roster, functional owners, compensation, retention, and turnover metrics are not public [EC-006, EC-023].
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.A
      - VII.C
      - VII.G
      - VI.A
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Obtain org chart, management bios, employment agreements, succession plan, turnover dashboard, and employee-relations history.
  - risk_id: R-008
