risk_register:
  - risk_id: "R-001"
    risk_title: "Financial opacity and runway unknown"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Ledger does not publish audited financials, product revenue, gross margin, cash, burn, runway, debt or unit economics."
    impacted_chapter_ids: [I, V]
    impacted_section_ids: [I.A, I.B, V.D, V.E]
    evidence_claim_ids: [EC-019]
    mitigation_or_diligence_request: "Require audited financials, management accounts, cash/debt schedule, product/channel P&L, burn and runway before valuation reliance."
  - risk_id: "R-002"
    risk_title: "Crypto-cycle demand volatility"
    risk_category: "market"
    severity: "high"
    likelihood: "medium"
    description: "Hardware-wallet and app-service demand may fluctuate with crypto prices, exchange failures, consumer sentiment and NFT/DeFi activity."
    impacted_chapter_ids: [I, IV, V]
    impacted_section_ids: [I.B, IV.A, V.A]
    evidence_claim_ids: [EC-003]
    mitigation_or_diligence_request: "Review monthly bookings by crypto market regime, cohort retention, downside scenario and inventory exposure."
  - risk_id: "R-003"
    risk_title: "Security and privacy trust fragility"
    risk_category: "technical"
    severity: "critical"
    likelihood: "medium"
    description: "Ledger's value proposition depends on trust; the 2020 data breach and phishing fallout show that non-wallet data systems can still harm customers and brand."
    impacted_chapter_ids: [II, III, VIII]
    impacted_section_ids: [II.A, III.E, VIII.A, VIII.G]
    evidence_claim_ids: [EC-006, EC-008]
    mitigation_or_diligence_request: "Conduct independent security/privacy diligence, incident review, phishing-impact analysis, SOC/ISO audit review and breach remediation verification."
  - risk_id: "R-004"
    risk_title: "Ledger Recover trust and regulatory exposure"
    risk_category: "product"
    severity: "high"
    likelihood: "medium"
    description: "Identity-based backup may improve accessibility but introduces provider, identity, consent, law-enforcement, privacy and perception risks."
    impacted_chapter_ids: [II, VI, VIII]
    impacted_section_ids: [II.A, VI.B, VIII.G]
    evidence_claim_ids: [EC-007, EC-017, EC-018]
    mitigation_or_diligence_request: "Review Recover audits, source-code release, provider contracts, DPIA, legal memos, user consent and incident simulations."
  - risk_id: "R-005"
    risk_title: "Customer concentration and churn unknown"
    risk_category: "customer"
    severity: "high"
    likelihood: "unknown"
    description: "Public sources provide aggregate adoption but not top customers, churn, NRR, active-device cohorts or revenue concentration."
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, III.C, V.B]
    evidence_claim_ids: [EC-015, EC-019]
    mitigation_or_diligence_request: "Request customer schedules, cohort retention, active devices, NRR/churn, enterprise references and channel concentration."
  - risk_id: "R-006"
    risk_title: "Partner and supplier dependency"
    risk_category: "operational"
    severity: "high"
    likelihood: "medium"
    description: "Ledger depends on third-party transaction providers, Recover/HSM providers, hardware suppliers, retail/affiliate channels and enterprise integrations."
    impacted_chapter_ids: [III, V, VIII]
    impacted_section_ids: [III.B, III.E, V.A, VIII.F]
    evidence_claim_ids: [EC-007, EC-009, EC-016, EC-018]
    mitigation_or_diligence_request: "Review material contracts, SLAs, termination rights, DPAs, supplier redundancy, provider compliance and business-continuity plans."
  - risk_id: "R-007"
    risk_title: "Competitive price, UX and trust pressure"
    risk_category: "market"
    severity: "medium"
    likelihood: "high"
    description: "Competitors such as Trezor, Tangem and Keystone market overlapping security, simplicity and open-source attributes, while software wallets/exchanges compete on convenience."
    impacted_chapter_ids: [IV, V]
    impacted_section_ids: [IV.A, V.A]
    evidence_claim_ids: [EC-011, EC-020]
    mitigation_or_diligence_request: "Request win/loss data, market share, pricing elasticity, NPS, CAC by competitor and switching analysis."
  - risk_id: "R-008"
    risk_title: "Regulatory, privacy and consumer-protection exposure"
    risk_category: "regulatory"
    severity: "high"
    likelihood: "medium"
    description: "Privacy obligations, third-party crypto-service integrations, Recover identity verification, hardware compliance and global consumer claims create multi-jurisdiction exposure."
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.A, VIII.C, VIII.D, VIII.F, VIII.G]
    evidence_claim_ids: [EC-008, EC-014, EC-018]
    mitigation_or_diligence_request: "Obtain legal/regulatory memos, CNIL correspondence, DPIAs, AML/sanctions allocation, product compliance files and complaints schedule."
  - risk_id: "R-009"
    risk_title: "Hardware supply chain and product quality"
    risk_category: "operational"
    severity: "medium"
    likelihood: "medium"
    description: "Ledger's hardware security model depends on compliant components, manufacturing quality, firmware signing, logistics and warranty support."
    impacted_chapter_ids: [II, III, VIII]
    impacted_section_ids: [II.A, III.E, VIII.C]
    evidence_claim_ids: [EC-006, EC-014]
    mitigation_or_diligence_request: "Review supplier contracts, component sourcing, product certifications, QA, return rates, warranty reserves and recall history."
  - risk_id: "R-010"
    risk_title: "Talent retention and security key-person risk"
    risk_category: "team"
    severity: "medium"
    likelihood: "unknown"
    description: "Public evidence shows rapid headcount growth and key security leaders, but turnover, compensation and succession are not public."
    impacted_chapter_ids: [VI, VII]
    impacted_section_ids: [VI.A, VII.A, VII.B, VII.C, VII.G]
    evidence_claim_ids: [EC-012, EC-013, EC-019]
    mitigation_or_diligence_request: "Request HRIS, turnover by function/location, compensation, option plan, key-person retention and succession planning."
  - risk_id: "R-011"
    risk_title: "Cap-table, valuation and secondary overhang"
    risk_category: "financing"
    severity: "medium"
    likelihood: "medium"
    description: "Public valuation anchors and funding totals differ, and current preferences, secondaries and investor rights are not public."
    impacted_chapter_ids: [I, VII]
    impacted_section_ids: [I.C, I.D, VII.E]
    evidence_claim_ids: [EC-001, EC-002, EC-004, EC-019]
    mitigation_or_diligence_request: "Reconcile financing history to cap table, preference stack, secondary trades, 409A/fair value and investor consents."
