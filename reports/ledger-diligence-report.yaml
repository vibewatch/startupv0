report_metadata:
  report_title: "Ledger Diligence Research Report"
  target_company: "Ledger"
  website: "https://www.ledger.com/"
  known_aliases:
    - "Ledger SAS"
    - "LedgerHQ"
    - "Ledger Wallet"
    - "Ledger Live"
    - "Ledger Enterprise"
  sector: "Financial Services / Digital asset security / Crypto hardware wallets"
  geography: "France headquarters; global consumer and institutional operations"
  company_stage: "Private unicorn / late-stage digital-asset security company"
  research_date: "2026-06-06"
  analyst: "GitHub Copilot CLI using startup-diligence-research skill"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "UTC"
research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Public-source review of Ledger-owned website, product, careers, legal, security, breach-response and partnership pages."
    - "Public-source review of independent technology news for financing, valuation, product and breach context."
    - "Public registry review using Pappers for French company status and headquarters."
    - "Public competitor scan of Trezor, Tangem and Keystone product pages."
    - "No private data room, customer calls, management interviews, regulator portals, paywall bypass, secrets or auth-only systems were used."
  included_jurisdictions:
    - "France"
    - "United States"
    - "United Kingdom"
    - "European Union"
    - "Singapore and other global markets where Ledger publicly references availability"
  excluded_topics:
    - "No non-public financial statements, cap table, customer schedules, contracts or board materials."
    - "No paywall bypassing or private litigation databases."
    - "No private customer, employee or founder personal contact information."
    - "No legal, tax, accounting or investment advice."
  user_provided_materials:
    - material_id: "MAT-001"
      title: "CB Insights candidate unicorn row supplied in task prompt"
      type: "user_provided_public_database_excerpt"
      date_received: "2026-06-06"
      notes: "Ledger; slug ledger; valuation USD 1.47B; date joined 2021-06-10; country France; city Paris; industry Financial Services; investors Digital Currency Group, Draper Esprit and Korelya Capital; CB Insights URL supplied."
founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Ledger is a private unicorn-scale company with a CB Insights valuation anchor around USD 1.47B and a June 2021 unicorn date."
    claim_source: "User-provided CB Insights candidate row and CB Insights company profile"
    claim_date: "2021-06-10"
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.C, I.D]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: [EC-001, EC-002]
    contradiction_summary: "Public valuation anchors differ slightly across sources: CB Insights row says USD 1.47B; TechCrunch reported USD 1.5B in 2021 and about USD 1.41B in 2023."
    diligence_follow_up:
      - "Request current fully diluted cap table, latest 409A/fair-value support, investor rights, preference stack, option pool, secondary transactions and any IPO/acquisition process materials."
  - founder_claim_id: "FC-002"
    claim_text: "Ledger is headquartered in Paris, France and remains an active French SAS."
    claim_source: "Ledger public pages and Pappers public company registry"
    claim_date: null
    mapped_chapter_ids: [VII, VIII]
    mapped_section_ids: [VII.B, VIII.F]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: [EC-001, EC-012]
    contradiction_summary: null
    diligence_follow_up:
      - "Request corporate organization chart, subsidiary list, good-standing certificates and latest extrait Kbis."
  - founder_claim_id: "FC-003"
    claim_text: "Ledger provides crypto hardware wallets, a wallet app and digital-asset security infrastructure for consumers and institutions."
    claim_source: "Ledger website, careers page, product pages and Enterprise page"
    claim_date: null
    mapped_chapter_ids: [II, VI]
    mapped_section_ids: [II.A, VI.A]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: [EC-005, EC-006, EC-010]
    contradiction_summary: null
    diligence_follow_up:
      - "Request product-level revenue, gross margin, warranty returns, support tickets, incident logs, roadmap and SLA/security metrics."
  - founder_claim_id: "FC-004"
    claim_text: "Ledger raised a Series C extension in 2023 at about EUR 1.3B / USD 1.4B valuation."
    claim_source: "TechCrunch 2023 funding article"
    claim_date: "2023-03-30"
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.D]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: [EC-002]
    contradiction_summary: null
    diligence_follow_up:
      - "Request 2023 financing documents, use-of-proceeds plan, secondary-sale details and current runway."
  - founder_claim_id: "FC-005"
    claim_text: "Ledger has sold more than 6 million devices and secures roughly 20% of global crypto assets."
    claim_source: "Ledger careers page, Ledger homepage and TechCrunch 2023 article"
    claim_date: null
    mapped_chapter_ids: [I, III, V]
    mapped_section_ids: [I.A, III.A, V.B]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: [EC-003, EC-015]
    contradiction_summary: "Device-sale and share-of-assets metrics are public but largely company-stated or reported from company statements; underlying methodology, active devices and revenue conversion are not public."
    diligence_follow_up:
      - "Request active-device cohorts, registered users, wallet balances methodology, retention, revenue by cohort and reconciliation to audited financials."
  - founder_claim_id: "FC-006"
    claim_text: "Ledger's named investors include Digital Currency Group, Draper Esprit/Molten Ventures and Korelya Capital."
    claim_source: "Ledger Series B announcement, TechCrunch 2021 and CB Insights profile"
    claim_date: null
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.C, I.D]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: [EC-002, EC-004]
    contradiction_summary: "Draper Esprit rebranded to Molten Ventures; source names vary by publication date."
    diligence_follow_up:
      - "Request latest investor register, board/observer rights, pro rata rights and related-party transactions."
  - founder_claim_id: "FC-007"
    claim_text: "Ledger Recover is an optional identity-based backup product for wallet recovery."
    claim_source: "Ledger Recover product page and CEO message"
    claim_date: null
    mapped_chapter_ids: [II, VIII]
    mapped_section_ids: [II.A, VIII.G]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: [EC-007, EC-018]
    contradiction_summary: "The technical workflow is company-stated; complete independent audit results, provider contracts and regulator views were not found in public sources."
    diligence_follow_up:
      - "Request Recover cryptographic audits, provider contracts, DPIAs, regulatory analyses, incident response plans and opt-in consent records."
executive_summary:
  overall_assessment: "Proceed only with high-intensity confirmatory diligence. Public evidence verifies that Ledger is an active French private unicorn, has major consumer hardware-wallet traction, broad app/enterprise product ambitions and credible security R&D assets. The diligence case is constrained by non-public financials, cap table, customer concentration, contracts, security incident history, Recover trust concerns and crypto-cycle exposure."
  investment_or_diligence_thesis: "Ledger's upside depends on whether trusted hardware-backed self-custody can become a durable consumer and institutional platform with recurring software, Recover, staking, buy/swap and enterprise revenues, while maintaining security credibility after a 2020 customer-data breach and 2023 Recover backlash."
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "CB Insights and TechCrunch sources support unicorn-scale private valuation anchors around USD 1.4B to USD 1.5B."
      evidence_claim_ids: [EC-001, EC-002]
    - founder_claim_id: "FC-003"
      summary: "Ledger-owned pages verify a product surface spanning hardware wallets, Ledger Wallet/Live, Ledger Recover and Ledger Enterprise."
      evidence_claim_ids: [EC-005, EC-010]
    - founder_claim_id: "FC-005"
      summary: "Public sources report 6 million devices sold and Ledger claims roughly 20% of crypto assets secured by Ledger devices."
      evidence_claim_ids: [EC-003, EC-015]
    - founder_claim_id: "FC-006"
      summary: "Public financing announcements verify participation by DCG, Draper network/Molten, Korelya, Cathay and other investors."
      evidence_claim_ids: [EC-002, EC-004]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Audited financial statements, current revenue, burn, runway and unit economics are not public."
    - risk_id: "R-003"
      summary: "Security and privacy trust is mission-critical, yet Ledger disclosed a 2020 customer-data breach and phishing fallout."
    - risk_id: "R-004"
      summary: "Ledger Recover creates identity-provider, key-backup, regulatory and reputational exposure despite being optional."
    - risk_id: "R-005"
      summary: "Customer concentration, active-device cohorts, churn and institutional revenue dependence are not public."
    - risk_id: "R-007"
      summary: "Trezor, Tangem, Keystone, software wallets and exchanges pressure pricing, UX and trust positioning."
  key_evidence_gaps:
    - "Audited financial statements, revenue by product/channel/geography, gross margin, returns/warranty reserves, burn and runway."
    - "Fully diluted cap table, investor rights, preference stack, debt, options/warrants and secondary market transactions."
    - "Active users, active devices, customer concentration, institutional customer list, churn, NRR and customer references."
    - "Security audits, SOC/ISO reports, incident register, vulnerability-response metrics and Recover provider audits."
    - "Supply-chain contracts, secure-element sourcing, manufacturing agreements, logistics/retail agreements and partner SLAs."
    - "Regulatory correspondence, privacy impact assessments, CNIL follow-up, litigation schedule, insurance and material contracts."
    - "HRIS headcount by function/location, turnover, compensation plans and option/incentive plan documents."
  recommended_next_steps:
    - "Gate any investment process on receipt of audited financials, product-level P&L, cash runway and cap table."
    - "Run security diligence on hardware, firmware, Ledger Wallet, Recover and Enterprise, including independent audit review."
    - "Obtain customer and channel diligence packages: active devices, cohorts, top customers, enterprise references and partner economics."
    - "Review privacy, consumer-protection, crypto-service, sanctions/AML and data-transfer obligations with counsel."
    - "Reconcile public funding totals and valuation marks against current financing documents and secondary transactions."
chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: "Public sources verify substantial funding and unicorn valuation anchors, but do not disclose audited financial statements, current ARR, gross margin, cash, burn, runway, debt or product-level unit economics. Public traction signals are useful but cannot substitute for financial statements."
    founder_claim_ids: [FC-001, FC-004, FC-005, FC-006]
    evidence_claim_ids: [EC-001, EC-002, EC-003, EC-004, EC-019]
    risk_ids: [R-001, R-002, R-011]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: [I.A.1, I.A.2, I.A.3, I.A.4, I.A.5, I.A.6]
        summary: "Audited financials, management reporting, backlog, AR aging and sales/gross-profit by product/channel/geography are not public. Public device-sale and app-usage metrics provide directional scale only."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "I.A-F1"
            finding: "Public sources report device and usage scale, including more than 6 million devices sold and Ledger Live/Walet active-user signals, but no audited revenue or margin schedules."
            evidence_claim_ids: [EC-003, EC-015]
            risk_ids: [R-001, R-005]
        hidden_risks:
          - "Hardware gross margin, warranty reserves, channel rebates, returns and inventory obsolescence could materially change profitability."
          - "Crypto market cycles may create volatile sell-through and services revenue that public device-count metrics obscure."
        evidence_gaps:
          - "Audited consolidated financial statements, management accounts, product/channel/geography revenue, gross margin, backlog and AR aging."
        follow_up_questions:
          - "Provide monthly financial statements for FY2023-FY2026 YTD, product P&L, cash, debt, burn, runway, deferred revenue, backlog and AR aging."
        table_ids: [T-003]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-019]
      - section_id: "I.B"
        title: "Financial Projections"
        checklist_question_ids: [I.B.1, I.B.2, I.B.3, I.B.4, I.B.5, I.B.6, I.B.7, I.B.8]
        summary: "Projections are not public. Public evidence points to growth drivers in hardware wallets, app services, Recover, enterprise custody/staking and tokenized assets, but no forecast assumptions or capex/working-capital plan is public."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "I.B-F1"
            finding: "Public growth signals include 2023 funding, Ledger Wallet app monetization, Recover subscription bundles and Enterprise institutional claims, but forecast conversion is not public."
            evidence_claim_ids: [EC-002, EC-005, EC-010, EC-016]
            risk_ids: [R-001, R-002]
        hidden_risks:
          - "Forecasts may be highly sensitive to crypto asset prices, exchange failures, consumer confidence, retail channel inventory and regulatory restrictions."
        evidence_gaps:
          - "Three-year projections, plan-vs-actuals, scenario analysis, capex, depreciation, working capital and external financing assumptions."
        follow_up_questions:
          - "Provide base/downside/upside forecasts with explicit crypto-market, device ASP, services attach-rate, churn, capex and financing assumptions."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-002, EC-005, EC-010, EC-016, EC-019]
      - section_id: "I.C"
        title: "Capital Structure"
        checklist_question_ids: [I.C.1, I.C.2, I.C.3, I.C.4, I.C.5]
        summary: "Ledger is publicly described as private/unicorn and Pappers lists Ledger SAS as active, but shares, options, warrants, debt, preferences and beneficial ownership are not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.C-F1"
            finding: "Named investors are public across funding sources, while current ownership percentages and preference terms are not."
            evidence_claim_ids: [EC-001, EC-004]
            risk_ids: [R-011]
        hidden_risks:
          - "Late-stage liquidation preferences, secondary discounts or debt covenants could materially affect common-equity value."
        evidence_gaps:
          - "Fully diluted cap table, option pool, warrants, SAFEs/notes, debt instruments, preference stack, investor rights and secondary transactions."
        follow_up_questions:
          - "Provide current cap table, investor rights agreements, option ledger, debt schedule, board minutes approving financings and secondary sale documentation."
        table_ids: [T-002]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-001, EC-004, EC-019]
      - section_id: "I.D"
        title: "Other financial information"
        checklist_question_ids: [I.D.1, I.D.2, I.D.3]
        summary: "Public funding history is reasonably well supported, but tax positions, accounting policies and current basis by investor are not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.D-F1"
            finding: "Public announcements identify major financing rounds from 2015 through 2023, including 2021 Series C and 2023 extension valuation anchors."
            evidence_claim_ids: [EC-002]
            risk_ids: [R-011]
          - finding_id: "I.D-F2"
            finding: "Public funding-total figures conflict: Ledger's people page shows USD 463M raised since 2014, while CB Insights shows USD 574.38M total raised."
            evidence_claim_ids: [EC-002]
            risk_ids: [R-011]
        hidden_risks:
          - "Conflicting public funding totals may indicate stale company pages, secondary rounds, FX differences or excluded tranches that require reconciliation."
        evidence_gaps:
          - "Tax positions, revenue-recognition policies, debt/financing arrangements and investor basis by round."
        follow_up_questions:
          - "Reconcile all financing rounds, currencies, primary versus secondary proceeds, valuation marks and post-money capitalization."
        table_ids: [T-001]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-002, EC-019]
  - chapter_id: "II"
    title: "Products"
    chapter_summary: "Ledger's product portfolio is publicly visible across consumer hardware wallets, Ledger Wallet app, Ledger Recover and Ledger Enterprise. Product-market evidence is strong at a surface level, but product profitability, attach rates, return rates, reliability and roadmap timing require private diligence."
    founder_claim_ids: [FC-003, FC-007]
    evidence_claim_ids: [EC-005, EC-006, EC-007, EC-010, EC-020]
    risk_ids: [R-003, R-004, R-006, R-009]
    sections:
      - section_id: "II.A"
        title: "Description of each product"
        checklist_question_ids: [II.A.1, II.A.2, II.A.3, II.A.4, II.A.5, II.A.6]
        summary: "Public evidence supports a multi-product line, but major customers/applications, growth rates, market share, cost structure and profitability are not publicly disclosed at a diligence-grade level."
        verification_status: "partially_verified"
        confidence: "high"
        key_findings:
          - finding_id: "II.A-F1"
            finding: "Ledger markets hardware wallets/signers, a wallet app for buy/swap/stake/dApps, Recover backup, and Enterprise infrastructure for institutions."
            evidence_claim_ids: [EC-005, EC-010]
            risk_ids: [R-006, R-009]
          - finding_id: "II.A-F2"
            finding: "Hardware-wallet security claims rely on offline private-key storage, secure element/proprietary OS and on-device transaction confirmation."
            evidence_claim_ids: [EC-006]
            risk_ids: [R-003]
          - finding_id: "II.A-F3"
            finding: "Recover expands addressable users but creates trust, identity-verification and provider-dependency risk."
            evidence_claim_ids: [EC-007, EC-018]
            risk_ids: [R-004]
        hidden_risks:
          - "Product defects, firmware vulnerabilities, supply-chain compromise or confusing UX could damage trust faster than public marketing can rebuild it."
          - "Recover may cannibalize Ledger's self-custody trust narrative if users believe seed material can leave devices without sufficient transparency."
        evidence_gaps:
          - "Product-level revenue, margin, warranty/return rates, roadmap, release-quality metrics, active-user cohorts, security certifications and third-party audit reports."
        follow_up_questions:
          - "Provide SKU-level P&L, attach rates, support tickets, product incident history, firmware release process and audited security certifications."
        table_ids: [T-004, T-005]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-005, EC-006, EC-007, EC-010, EC-020]
  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: "Public evidence shows broad aggregate consumer reach and some institutional/partner relationships, but top customers, revenue concentration, churn, NRR and customer contract economics are not public."
    founder_claim_ids: [FC-005]
    evidence_claim_ids: [EC-009, EC-010, EC-015]
    risk_ids: [R-005, R-006]
    sections:
      - section_id: "III.A"
        title: "Top customers by application"
        checklist_question_ids: [III.A]
        summary: "No top-15 customer schedule is public. Public sources disclose aggregate consumer device sales, active app usage and Enterprise institution counts."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "III.A-F1"
            finding: "Public sources support aggregate usage scale but do not identify revenue-weighted top customers."
            evidence_claim_ids: [EC-015]
            risk_ids: [R-005]
        hidden_risks:
          - "Enterprise revenue could be concentrated in a small number of institutions, while consumer sales could be concentrated by channel or geography."
        evidence_gaps:
          - "Top customers by revenue, application, geography, cohort, purchase timing and customer reference availability."
        follow_up_questions:
          - "Provide top 25 customers and top 25 channels by revenue for FY2024-FY2026 YTD with retention, gross margin and contract status."
        table_ids: [T-006]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-015]
      - section_id: "III.B"
        title: "Strategic relationships"
        checklist_question_ids: [III.B]
        summary: "Public sources identify important partner integrations for on-ramp, transfer, recovery and enterprise distribution, but revenue contribution and agreement terms are not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.B-F1"
            finding: "PayPal and Coinbase Pay integrations publicly support Ledger Wallet on-ramp/transfer distribution, while Coincover supports Recover."
            evidence_claim_ids: [EC-007, EC-009, EC-016]
            risk_ids: [R-006]
        hidden_risks:
          - "Partner API, KYC, fee, reserve, compliance or termination terms could materially affect revenue and customer experience."
        evidence_gaps:
          - "Partner contracts, revenue-share, SLAs, termination rights, indemnities, compliance obligations and partner concentration."
        follow_up_questions:
          - "Provide partner-contract summaries for on-ramp, swap, staking, Recover, retail and enterprise channels."
        table_ids: [T-007]
        figure_ids: []
        evidence_claim_ids: [EC-007, EC-009, EC-016]
      - section_id: "III.C"
        title: "Revenue by customer"
        checklist_question_ids: [III.C]
        summary: "Revenue by customer and any customer over 5% of revenue are not public."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "III.C-F1"
            finding: "Public aggregate device and institution metrics do not reveal revenue concentration."
            evidence_claim_ids: [EC-015]
            risk_ids: [R-005]
        hidden_risks:
          - "One or more enterprise customers, retailers, distributors, on-ramp providers or app partners may drive a disproportionate share of revenue."
        evidence_gaps:
          - "Revenue by customer, channel, partner and geography; churn and NRR by cohort."
        follow_up_questions:
          - "Identify all customers, partners or channels exceeding 5% of revenue and provide contract status and renewal risk."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-015, EC-019]
      - section_id: "III.D"
        title: "Significant relationships severed within the last two years"
        checklist_question_ids: [III.D]
        summary: "No public schedule of severed customer, partner or supplier relationships was found in reviewed sources."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "III.D-F1"
            finding: "Reviewed public sources emphasize new or active relationships rather than terminated relationships."
            evidence_claim_ids: [EC-016, EC-019]
            risk_ids: [R-006]
        hidden_risks:
          - "Terminated providers or retailers could indicate compliance, margin, service-quality or security issues not visible publicly."
        evidence_gaps:
          - "List of terminated or non-renewed material customer, supplier and partner relationships for FY2024-FY2026 YTD."
        follow_up_questions:
          - "Provide a severed-relationships schedule with reason, revenue impact, disputes, wind-down obligations and replacement status."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-019]
      - section_id: "III.E"
        title: "Top suppliers"
        checklist_question_ids: [III.E]
        summary: "Public sources identify categories of supplier dependency, including secure elements, HSM/storage providers, e-commerce/marketing systems and third-party crypto-service providers, but top supplier spend is not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.E-F1"
            finding: "Recover depends on three independent companies/HSMs across countries, and app services depend on third-party providers."
            evidence_claim_ids: [EC-007, EC-016]
            risk_ids: [R-006]
          - finding_id: "III.E-F2"
            finding: "The 2020 data breach involved an e-commerce and marketing database accessed through an API key, making vendor/data architecture an important supplier diligence topic."
            evidence_claim_ids: [EC-008]
            risk_ids: [R-003, R-006]
        hidden_risks:
          - "Secure-element supply, manufacturing, logistics, app-provider compliance and HSM-provider availability may be single points of failure."
        evidence_gaps:
          - "Top supplier spend, sole-source components, manufacturing agreements, quality audits, inventory commitments and data-processor contracts."
        follow_up_questions:
          - "Provide supplier list by spend, criticality, geography, termination rights, security audit results and business-continuity plans."
        table_ids: [T-008]
        figure_ids: []
        evidence_claim_ids: [EC-006, EC-007, EC-008, EC-016]
  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: "Ledger competes with hardware wallet providers, software wallets, custodial exchanges and institutional custody providers. Public evidence supports Ledger's scale and security positioning, but pricing, UX, open-source, trust and distribution pressure remain material."
    founder_claim_ids: [FC-003, FC-005]
    evidence_claim_ids: [EC-005, EC-006, EC-011]
    risk_ids: [R-002, R-007]
    sections:
      - section_id: "IV.A"
        title: "Competitive landscape by market segment"
        checklist_question_ids: [IV.A.1, IV.A.2]
        summary: "Competitor pages show alternatives using touchscreen, secure element, NFC/card, open-source or air-gapped positioning. Ledger's differentiation appears to be scale, brand, secure-element/OS stack, app ecosystem and institutional platform, but public data does not prove market share or win rates."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "IV.A-F1"
            finding: "Trezor, Tangem and Keystone all publicly market security and usability features that overlap with Ledger hardware wallets."
            evidence_claim_ids: [EC-011]
            risk_ids: [R-007]
          - finding_id: "IV.A-F2"
            finding: "Ledger's self-custody positioning also competes with software wallets and custodial exchanges that may be easier or cheaper for mainstream users."
            evidence_claim_ids: [EC-005, EC-006]
            risk_ids: [R-002, R-007]
        hidden_risks:
          - "Competitors can undercut device pricing, market more open-source posture, simplify onboarding or exploit Ledger trust issues."
        evidence_gaps:
          - "Win/loss data, market share, customer switching, pricing elasticity, CAC by channel and competitor gross-margin benchmarks."
