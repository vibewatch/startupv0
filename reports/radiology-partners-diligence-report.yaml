report_metadata:
  report_title: Radiology Partners Startup Diligence Report
  target_company: Radiology Partners
  website: https://www.radpartners.com/
  known_aliases:
    - RadPartners
    - RP
    - Radiology Partners, Inc.
  sector: Healthcare services, radiology practice management, teleradiology and imaging AI workflows
  geography: United States
  company_stage: Private unicorn / growth-equity backed radiology platform
  research_date: 2026-06-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/Chicago
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public-web-only research with company-owned sources, partner/customer pages, investor pages, public legal records, independent healthcare press and DuckDuckGo snippets retrieved through r.jina.ai.
    - "Confirmed eligibility before drafting: Radiology Partners appears active, private and independent as of 2026-06-17, with no public IPO, shutdown or acquisition of the company itself located in this pass."
    - Treated company releases and marketing pages as evidence of public statements and platform posture; treated economic or operating claims from those pages as requiring confirmatory diligence unless independently corroborated.
    - Used search-result snippets for some valuation, ownership, jobs and competition signals when direct article text was inaccessible or rate-limited; such items are marked lower confidence where appropriate.
    - No private data room, management interview, customer references, payer contracts, cap-table records, debt documents, insurance schedules or internal compliance artifacts were available.
  included_jurisdictions:
    - United States
    - Federal healthcare reimbursement, privacy and corporate-practice-of-medicine context reflected in public sources
    - State-level hospital, payer and practice relationships surfaced in public reporting (including Texas, California, Florida and Mid-Atlantic states where cited)
  excluded_topics:
    - Private financial statements, monthly KPIs, AR aging, backlog and management accounts were unavailable.
    - Customer contracts, payer agreements, supplier spend, cap table, debt agreements, litigation reserves and insurance policies were not public.
    - Patient-level PHI, incident logs, internal audits and non-public compliance correspondence were outside scope.
  user_provided_materials:
    - material_id: UPM-001
      title: Task brief naming Radiology Partners as a CB Insights private unicorn target and citing a 2024 $720M growth-equity event
      type: workflow_request
      date_received: 2026-06-17
      notes: No deck, financial model, customer list, management responses or legal data room were provided.
