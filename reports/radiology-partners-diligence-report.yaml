risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and leverage risk
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources show a large 2024 recap and liquidity claim, but not audited revenue quality, covenant headroom, gross margin, EBITDA or consistent free-cash-flow performance; S&P-linked commentary suggests leverage remains material.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-002
      - EC-004
      - EC-038
    mitigation_or_diligence_request: Request audited financials, debt schedules, covenant model, monthly cash bridge and downside case by practice entity.
  - risk_id: R-002
    risk_title: Cap-table and ownership opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public signals show private ownership, physician stake and large financial sponsors, but not current diluted ownership, preferences, warrants, debt rights or liquidation waterfall.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-032
    mitigation_or_diligence_request: Obtain the current cap table, board consents, financing docs and debt/equity waterfall.
  - risk_id: R-003
    risk_title: Customer concentration and retention opacity
    risk_category: customer
    severity: high
    likelihood: medium
    description: RP publicly discloses broad facility counts and selected affiliates, but not top customers, customer-level revenue, renewal schedules or churn metrics.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-013
      - EC-014
      - EC-015
      - EC-035
    mitigation_or_diligence_request: Request top-customer revenue schedule, churn/NRR, contract terms and customer references.
  - risk_id: R-004
    risk_title: Third-party AI and cloud dependency
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Public product and R&D materials imply dependency on AWS HealthImaging, several third-party AI vendors and partner-developed workflow tools.
    impacted_chapter_ids:
      - II
      - III
      - VI
    impacted_section_ids:
      - II.A
      - III.E
      - VI.B
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Review key vendor agreements, data-rights terms, SLAs, exit plans and validation workflow ownership.
  - risk_id: R-005
    risk_title: Competitive pressure and pricing opacity
    risk_category: market
    severity: medium
    likelihood: high
    description: RP competes in a crowded outsourced radiology and teleradiology market, yet public pricing and win/loss evidence are limited.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-017
      - EC-018
      - EC-034
    mitigation_or_diligence_request: Collect win/loss reports, pricing decks, buyer references and competitor benchmark analysis.
  - risk_id: R-006
    risk_title: Relationship churn and corporate-practice backlash
    risk_category: operational
    severity: high
    likelihood: medium
    description: The Trinity-related relationship loss and civil allegations around corporate-practice and arbitration conduct suggest that large outsourced radiology relationships can be politically or operationally fragile.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.D
      - V.B
      - VIII.G
    evidence_claim_ids:
      - EC-015
      - EC-016
      - EC-025
      - EC-031
    mitigation_or_diligence_request: Review top at-risk accounts, termination history, customer complaints and state-law compliance memos.
  - risk_id: R-007
    risk_title: Clinical AI safety and validation risk
    risk_category: product
    severity: high
    likelihood: medium
    description: RP publicly claims broad AI deployment and new AI-native products, but public validation, patient-safety and model-governance detail remains thinner than deployment claims.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
      - VIII.C
    evidence_claim_ids:
      - EC-007
      - EC-009
      - EC-010
      - EC-024
      - EC-033
    mitigation_or_diligence_request: Request model-evaluation results, escalation protocols, AI incident log and clinical-governance committee materials.
  - risk_id: R-008
    risk_title: Management and workforce execution risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public materials show a broad leadership bench and hiring activity, but not audited headcount, span of control, attrition or compensation burden.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.A
      - VII.B
      - VII.C
      - VII.G
    evidence_claim_ids:
      - EC-020
      - EC-021
      - EC-022
      - EC-023
      - EC-037
    mitigation_or_diligence_request: Request org chart, HRIS headcount by function/location, attrition, key-person retention plan and compensation design.
  - risk_id: R-009
    risk_title: Payer litigation and reimbursement-process exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: The Aetna dispute put RP’s billing/arbitration conduct into public view and, together with financing stress, elevates reimbursement-process risk.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.D
      - VIII.A
      - VIII.B
    evidence_claim_ids:
      - EC-004
      - EC-025
      - EC-026
      - EC-029
    mitigation_or_diligence_request: Have counsel review all payer disputes, arbitration workflows, reserve analysis and state/federal reimbursement compliance controls.
  - risk_id: R-010
    risk_title: Privacy, compliance and contract-opacity risk
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Policies and hotline are public, but regulator correspondence, insurance coverage, material contracts and incident history are not.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.E
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-024
      - EC-027
      - EC-031
      - EC-033
    mitigation_or_diligence_request: Request privacy/security program artifacts, material contracts, insurance schedules and any government inquiry log.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Three years of audited income statements, balance sheets, cash flows, AR aging and budget-to-actuals.
    why_it_matters: Cannot underwrite revenue quality, liquidity durability or covenant capacity from public sources alone.
    suggested_source_or_request: Ask the company and accountants for audited statements, management accounts and AR detail.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, debt schedule, warrants/options and investor rights.
    why_it_matters: Public ownership clues are incomplete and partly snippet-based.
    suggested_source_or_request: Request cap table export, financing docs and debt agreements from company/investors.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Price book, SKU packaging, implementation costs and software-versus-services revenue mix.
    why_it_matters: Needed to understand margin leverage and competitive positioning of RPX AI and Mosaic products.
    suggested_source_or_request: Request pricing decks, sample contracts and module-level P&L.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-15 customers, >5% customer concentration, renewal dates, churn and NRR.
    why_it_matters: Facility counts do not reveal economic concentration or revenue durability.
    suggested_source_or_request: Ask company for customer concentration and churn cohort pack.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend by vendor, cloud concentration and AI-vendor contract terms.
    why_it_matters: Public dependency clues exist, but economic and operational concentration is unknown.
    suggested_source_or_request: Request top-supplier schedule and key vendor contracts.
    priority: medium
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss records, pricing comparisons and buyer references against teleradiology competitors.
    why_it_matters: Competitive map is only directional without direct buyer feedback.
    suggested_source_or_request: Interview customers and request CRM win/loss reporting.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Quota model, sales cycle, sourced pipeline, CAC/payback and marketing budgets.
