executive_summary:
  overall_assessment: Radiology Partners is eligible for diligence as an active private company with meaningful scale and increasing productization, but public evidence also highlights leverage stress, sparse customer economics disclosure and payer/regulatory-adjacent litigation risk.
  investment_or_diligence_thesis: Public materials support a real, national radiology platform that is trying to translate clinical scale into defensible AI and workflow software. The diligence question is not existence; it is whether leveraged services economics, customer durability, corporate-practice compliance and AI-enabled operating leverage are strong enough to justify a roughly unicorn-level valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Investor, market-database and company-owned sources support that Radiology Partners remained active and private as of 2026-06-17.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: The company publicly disclosed a February 2024 recap featuring approximately $720M of new equity, reduced debt and extended maturities.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-005
      summary: Radiology Partners publicly markets a layered offering spanning hospital services, practice infrastructure, RPX AI and MosaicOS/Mosaic Reporting.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-008
        - EC-009
    - founder_claim_id: FC-007
      summary: The public legal disclaimer and financing language support a physician-led, subsidiary-based practice structure rather than a single licensed care entity.
      evidence_claim_ids:
        - EC-002
        - EC-031
  biggest_risks:
    - risk_id: R-001
      summary: Public financing disclosure does not substitute for audited revenue quality, and S&P-linked reporting points to cash-flow and leverage stress.
    - risk_id: R-003
      summary: Scale is public, but top-customer revenue concentration, churn and renewal economics are not.
    - risk_id: R-006
      summary: The 2024 Trinity-related relationship loss shows that large-system relationships can turn and may be sensitive to outsourcing or corporate-practice concerns.
    - risk_id: R-009
      summary: Aetna litigation tied RP to No Surprises Act and corporate-practice allegations even though the case was later dismissed.
  key_evidence_gaps:
    - Audited financials, revenue/EBITDA bridge, debt documents, covenant headroom, cash-flow waterfall and current forecast model.
    - Fully diluted cap table, investor rights, liquidation preferences, ownership by physician entities and debt/term-loan schedules.
    - Top-15 customers, >5% customer concentration, renewal cohorts, churn/NRR, payer mix and site-level profitability.
    - Product pricing, software versus services mix, implementation metrics, model-evaluation results and AI governance artifacts.
    - Practice-management agreements, payer contracts, insurance limits, regulatory correspondence and litigation reserve analysis.
  recommended_next_steps:
    - Run full financial and debt diligence before relying on headline valuation or liquidity claims.
    - Request a customer concentration pack covering top accounts, churn, terminations and any at-risk health-system relationships.
    - Have healthcare counsel review corporate-practice structure, No Surprises Act workflows, payer arbitration files and state compliance controls.
    - Benchmark RP win/loss, pricing and retention against national teleradiology, outpatient imaging and practice-management competitors.
    - Validate whether RPX AI, Mosaic and partner-led AI products are margin-accretive software layers or primarily service-enablement tools.
