report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: WeLab"
  target_company: WeLab
  website: https://www.welab.co/
  known_aliases:
    - WeLab Limited
    - WeLab Holdings
    - WeLab Bank
    - WeLend
    - Maucash
  sector: Digital banking, consumer finance, fintech platform and B2B fintech services
  geography: Hong Kong headquartered with operations in Hong Kong, mainland China and Indonesia
  company_stage: Private fintech unicorn / licensed digital-bank operator
  research_date: 2026-06-18
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: Asia/Hong_Kong
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and selected this uncovered target from a shuffled public unicorn candidate list.
    - Prioritized public unicorn/profile sources, primary company pages, official regulator pages where available, and reputable independent news.
    - Classified unsupported private metrics as not_publicly_verifiable rather than inferring revenue, margins, customer concentration, cap-table or legal facts.
    - No human prompts were available; evidence gaps and follow-up requests identify required private data-room materials.
  included_jurisdictions:
    - Hong Kong
    - Mainland China
    - Indonesia
  excluded_topics:
    - No private data-room review
    - No customer/supplier/employee/reference interviews
    - No paid database export
    - No legal advice or counsel-grade docket search
    - No non-public personal information collection
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-06-18
      notes: User requested three random uncovered private unicorn diligence reports at standard depth and a draft PR.
