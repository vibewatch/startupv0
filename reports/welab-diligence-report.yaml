executive_summary:
  overall_assessment: WeLab is publicly supportable as an active private Hong Kong fintech unicorn with regulated virtual-bank operations and Asia consumer-finance footprint, but credit quality, regulatory capital, bank-level compliance, loan-book performance and current valuation require private diligence.
  investment_or_diligence_thesis: The diligence case turns on whether WeLab can translate its digital banking and consumer-finance user base into profitable, well-controlled regulated financial services across Hong Kong, mainland China and Indonesia.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: WeLab is publicly supportable as an eligible private unicorn target for this run.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: WeLab's product/platform narrative is supported by public company/product sources.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: WeLab has public traction or adoption signals, but economics require private validation.
      evidence_claim_ids:
        - EC-004
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Credit quality and loan-book opacity
    - risk_id: R-002
      summary: Regulated banking / capital compliance
    - risk_id: R-003
      summary: Cross-border regulatory and geopolitical exposure
    - risk_id: R-004
      summary: Current valuation and IPO path unresolved
    - risk_id: R-005
      summary: Customer concentration / monetization quality unknown
  key_evidence_gaps:
    - Audited/management financials, KPI definitions and cash runway
    - Current cap table, preference stack, debt and investor rights
    - Customer concentration, revenue by customer, retention/churn and contract economics
    - Security/regulatory/legal/IP schedules and material contracts
    - Headcount, compensation, attrition and key employment arrangements
  recommended_next_steps:
    - Open finance and cap-table data rooms before relying on public valuation.
    - Reconcile public adoption claims to paying customers, revenue, gross margin and retention.
    - Run customer/reference and partner diligence for the largest accounts and dependencies.
    - Have counsel review litigation, regulatory, IP, insurance and material contracts.
    - Review product/security/technology evidence with CTO/CISO or equivalent leaders.
