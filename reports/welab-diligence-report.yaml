evidence_claims:
  - evidence_claim_id: EC-001
    claim: WeLab is on the selected public unicorn candidate list and public profile sources do not indicate IPO, acquisition or shutdown in the sources reviewed.
    evidence_summary: WeLab is listed as a private Hong Kong fintech company and the selected unicorn-list row shows $1+ billion valuation in December 2019. TechCrunch reports WeLab had already reached $1 billion unicorn status and raised an additional $75 million Series C1 led by Allianz X in 2021.
    evidence_type: market_database
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-001
    quoted_evidence:
      - source_id: SRC-001
        quote: "Selected unicorn-list row: WeLab, valuation $1+ billion, valuation date December 2019."
        location: Wikipedia unicorn list candidate row
    analyst_interpretation: Eligibility is supported for this public-source run; recency must be reconfirmed before investment action.
    limitations: null
    associations:
      chapter_id: I
      section_id: I.C
      founder_claim_ids:
        - FC-001
      table_ids: []
      figure_ids: []
      risk_ids:
        - R-004
  - evidence_claim_id: EC-002
    claim: WeLab has public funding and valuation signals but current cap-table economics are not public.
    evidence_summary: Wikipedia reports WeLab raised $20 million Series A in 2015, $160 million Series B in 2016, $220 million financing in 2017, $156 million Series C in late 2019, and $75 million Series C1 in March 2021. TechCrunch reports the 2021 Series C1 followed the $156 million late-2019 Series C and that Simon Loong said valuation had gone up since $1 billion unicorn status.
    evidence_type: independent_news
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-001
      - SRC-002
      - SRC-003
    quoted_evidence:
      - source_id: SRC-003
        quote: Wikipedia reports WeLab raised $20 million Series A in 2015, $160 million Series B in 2016, $220 million financing in 2017, $156 million Series C in late 2019, and $75 million Series C1 in March 2021.
        location: Funding / valuation source
    analyst_interpretation: Amounts are public-source statements; current preferences, debt and post-money economics require company documents.
    limitations: I
    associations:
      chapter_id: I.D
      section_id:
        - FC-001
        - FC-005
      founder_claim_ids:
        - R-001
        - R-007
      table_ids: []
      figure_ids: []
  - evidence_claim_id: EC-003
    claim: WeLab has a public product/platform narrative.
    evidence_summary: WeLab offers online consumer credit platforms and virtual banking, including WeLab Bank, WeLend, Bank Jasa Jakarta and Maucash across Hong Kong, mainland China and Indonesia. The WeLab virtual bank announcement says it will use AI, big data and machine learning to design digital banking products.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-002
      - SRC-004
      - SRC-005
    quoted_evidence:
      - source_id: SRC-004
        quote: WeLab offers online consumer credit platforms and virtual banking, including WeLab Bank, WeLend, Bank Jasa Jakarta and Maucash across Hong Kong, mainland China and Indonesia.
        location: Company product/about source
    analyst_interpretation: Public pages do not disclose product-level revenue, gross margin or retention.
    limitations: II
    associations:
      chapter_id: II.A
      section_id:
        - FC-002
      founder_claim_ids:
        - R-006
      table_ids: []
      figure_ids: []
  - evidence_claim_id: EC-004
    claim: WeLab has public adoption/customer traction signals, but monetization and concentration remain unverified.
    evidence_summary: TechCrunch reports WeLab user base rose 20% year over year in 2020 to 50 million cumulative users, with around 47 million in mainland China, 2.5 million in Indonesia, less than 1 million in Hong Kong, and about 600 enterprise customers.
    evidence_type: primary_company_source
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-003
      - SRC-004
    quoted_evidence:
      - source_id: SRC-003
        quote: TechCrunch reports WeLab user base rose 20% year over year in 2020 to 50 million cumulative users, with around 47 million in mainland China, 2.5 million in Indonesia, less than 1 million in Hong Kong, and about 600 enterprise customers.
        location: Adoption/customer source
