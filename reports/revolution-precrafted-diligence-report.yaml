executive_summary:
  overall_assessment: "Revolution Precrafted remains an eligible uncovered unicorn for this run because CB Insights and
    Tech in Asia support the 2017 unicorn event and the company has an active 2025 website. The diligence posture is
    high-risk: public reports describe historical contractor complaints and delivery/valuation questions, while current
    revenue, order fulfillment and project economics are not public."
  investment_or_diligence_thesis: "Treat as a special-situation proptech diligence target: require proof of current
    deliveries, customer obligations, cash, permits, supplier liabilities and resolved legal matters before relying on
    the stale unicorn valuation."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn-list evidence supports Revolution Precrafted's $1.0B unicorn status at the listed date.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: The current company/product website supports active operating and product-scope claims.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Public sources provide at least directional traction, partner or customer signals.
      evidence_claim_ids:
        - EC-004
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Stale valuation and limited evidence of current scale
    - risk_id: R-002
      summary: Execution risk around permitting, local contractors, shipping and installation
    - risk_id: R-003
      summary: Historical complaints and reputational overhang despite dismissal reports
  key_evidence_gaps:
    - Audited financial statements, revenue quality, gross margin, cash runway and cap table are not public.
    - Top-customer revenue, contract terms, churn, retention, backlog and customer references are not public.
    - Complete legal/regulatory, IP, insurance, employment and material-contract schedules require company/counsel
      disclosure.
  recommended_next_steps:
    - Open a data-room request focused on finance, customer concentration, legal/regulatory schedules and
      product/technical validation.
    - Conduct management interviews with CEO/CFO/CTO or equivalent and obtain third-party customer/partner references.
    - Reconfirm current private status and valuation before relying on public unicorn-list marks.
