report_metadata:
  report_title: Revolution Precrafted Startup Diligence Report
  target_company: Revolution Precrafted
  website: https://revolutionprecrafted.com/
  known_aliases:
    - Revolution Precrafted Properties
    - Revolution Precrafted Properties Inc.
  sector: Prefabricated designer homes, pavilions and modular living spaces
  geography: Philippines; global shipping model from Makati, Metro Manila
  company_stage: Private growth-stage proptech / modular construction unicorn candidate
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Asia/Manila
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public evidence only: CB Insights unicorn tracker, company-owned pages, independent news, secondary-market or
      company-profile pages where accessible, and targeted public eligibility searches."
    - Excluded companies with discovered IPO, acquisition or shutdown signals; for selected targets, no such definitive
      public signal was found in collected evidence.
    - Marked private financials, cap table, customer revenue, contracts, HR records, detailed legal schedules,
      compliance artifacts and customer references as not_publicly_verifiable.
  included_jurisdictions:
    - Philippines
    - Global shipping / customer jurisdictions
  excluded_topics:
    - Private data room, paid databases, non-public customer references, privileged legal advice, credentials, secrets
      and non-public employee data.
  user_provided_materials:
    - material_id: UPM-001
      title: Randomized uncovered unicorn selection record
      type: workflow_selection_record
      date_received: 2026-05-23
      notes: Revolution Precrafted was selected by shuf from a CB Insights-derived uncovered candidate list after excluding
        existing report slugs.
