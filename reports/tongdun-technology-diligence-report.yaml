executive_summary:
  overall_assessment: Tongdun Technology appears to be an active private Chinese enterprise-tech unicorn based on CB
    Insights and current official product/customer pages. Public evidence supports a broad risk-decision product suite,
    customer-count claim, branch footprint and certification badges, but current financial scale, retention, regulatory
    posture, data-rights controls and cap table are not public.
  investment_or_diligence_thesis: Proceed only with data-room diligence. A positive thesis requires proving durable
    financial-services adoption, compliant data/model governance, current revenue quality, customer retention,
    competitive differentiation and financing terms behind the 2019 unicorn valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Tongdun Technology at $1.32B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Official pages describe active decision-intelligence, risk, fraud and database products.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Official pages claim more than 10,000 enterprise customers.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality is not publicly verifiable
    - risk_id: R-002
      summary: Headline valuation may be stale or hard to reconcile
    - risk_id: R-003
      summary: Customer concentration, retention and revenue conversion are opaque
    - risk_id: R-004
      summary: Financial-risk, fraud and data-intelligence products create privacy, data-security and sector-regulation exposure
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue by product and geography, gross margin, cash, debt and forecast model.
    - Current cap table, liquidation preferences, option pool, warrants, debt instruments and valuation support.
    - Top-customer revenue, contract terms, renewal status, churn, NRR/cohort metrics and receivables concentration.
    - Sales pipeline, CAC, payback, quota attainment, channel economics and budget-to-actuals.
    - Technical architecture review, security reports, incident history, IP assignments and product roadmap.
    - Legal docket search, regulatory correspondence, material contracts, insurance, employment agreements and HRIS
      export.
  recommended_next_steps:
    - Run confirmatory financial and cap-table diligence before relying on headline unicorn valuation.
    - Request customer cohorts, top-account contracts and independent customer references.
    - Have counsel and specialists review regulatory, privacy, IP, security and material-contract records.
    - Benchmark pricing, win/loss, retention and product quality against direct competitors.
