report_metadata:
  report_title: Jasper Startup Diligence Report
  target_company: Jasper
  website: https://www.jasper.ai/
  known_aliases:
    - Jasper AI
    - Jasper AI, Inc.
    - Jasper.ai
  sector: Enterprise AI marketing platform, generative AI content and agentic marketing workflows
  geography: United States / Austin and San Francisco public signals; remote-first across U.S., France and Australia
  company_stage: Private AI unicorn / growth-stage software company
  research_date: 2026-05-22
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Chicago / America/Los_Angeles public-company signals
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth and prioritized public company-owned sources for product, customer, pricing, security, privacy, leadership and careers evidence.
    - Used independent news and market-database evidence for financing, valuation and revenue/customer-count corroboration where available.
    - Used public legal and trademark records for docket and IP signals, while flagging materials requiring counsel review.
    - Treated company-published customer and security claims as public statements requiring private verification before investment reliance.
    - No private financials, cap table, contracts, customer calls, SOC reports, legal pleadings, HRIS records or data-room materials were available.
  included_jurisdictions:
    - United States
    - Public global operations/customer jurisdictions implicated by Jasper careers, customer and privacy materials
    - Privacy/security regimes referenced in Jasper public trust materials
  excluded_topics:
    - Non-public financial statements, cap table, board materials, contracts, HR records, customer references, SOC reports, legal pleadings, regulator correspondence and private market databases were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for standard public-evidence Jasper diligence report
      type: workflow_request
      date_received: 2026-05-22
      notes: No pitch deck, founder responses, data-room export or customer references were provided.
founder_claims:
