    claim_source: Jasper funding announcement and independent coverage
    claim_date: 2022-10-18
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.A
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
