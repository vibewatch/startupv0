diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, ARR bridge, gross margin, burn, cash, backlog and AR aging.
    why_it_matters: Public revenue/customer claims cannot underwrite valuation without quality-of-revenue evidence.
    suggested_source_or_request: "Request CFO data room: audits/reviews, monthly financials, ARR waterfall, revenue-recognition memo, AR aging and backlog."
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, debt, SAFEs/notes, option pool, warrants, preferences and investor rights.
    why_it_matters: Ownership and liquidation structure can materially change common-equity value and control.
    suggested_source_or_request: Request current fully diluted cap table, financing documents and liquidation waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Module-level ARR, active usage, reliability, gross margin, implementation effort and roadmap commitments.
    why_it_matters: Public product breadth does not prove adoption, profitability or technical moat.
    suggested_source_or_request: Request product telemetry, uptime/SLA reports, product P&L, roadmap and customer module references.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, top-account concentration, renewal schedule, churn/NRR and customer references.
    why_it_matters: Large customer-count claims can hide concentration, churn or low-ARPU cohorts.
    suggested_source_or_request: Request customer ARR schedule and conduct references with top accounts.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend, model routing, vendor contracts, SLAs, data-use terms and fallback architecture.
    why_it_matters: Model/cloud dependencies can affect margin, privacy, uptime and product quality.
    suggested_source_or_request: Request vendor contracts, spend by supplier and architecture/model-evaluation documentation.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing benchmarks, buyer interviews, retention by competitor and market-share evidence.
    why_it_matters: Competitive intensity is high and public pages cannot quantify Jasper’s durable differentiation.
    suggested_source_or_request: Conduct third-party customer/buyer calls and request win/loss and competitive displacement data.
    priority: high
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quotas, attainment, ramp, sales cycle, pipeline coverage and hiring plan.
    why_it_matters: Enterprise GTM success depends on sales productivity and efficient pipeline conversion.
    suggested_source_or_request: Request sales productivity model and CRM pipeline export by segment/channel.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D org chart, engineering/ML/security leaders, budget, model-evaluation framework and release quality metrics.
    why_it_matters: Agent platform quality and safety depend on strong technical process not visible publicly.
    suggested_source_or_request: Request R&D budget, org chart, eval dashboards, incident/defect metrics and roadmap governance.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Historical/projected headcount by function/location, compensation, option grants and attrition.
    why_it_matters: Workforce capacity, burn and retention cannot be assessed from public careers pages.
    suggested_source_or_request: Request HRIS exports, hiring plan, compensation bands, option ledger and attrition analysis.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Pleadings, claims, damages, counsel assessment, insurance and reserve for Zazueta docket.
    why_it_matters: Docket metadata alone cannot quantify legal exposure.
    suggested_source_or_request: Have counsel pull docket and provide litigation memorandum and reserve/insurance assessment.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official IP records, assignments, patents, copyrights, SBOM, model/data licenses and open-source obligations.
    why_it_matters: Generative AI product IP chain and license compliance are core transaction risks.
    suggested_source_or_request: Request IP schedule, assignment chain, OSS scan/SBOM and counsel search results.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC 2 report, DPIAs, DPAs, incident logs, regulator correspondence and AI governance controls.
    why_it_matters: Enterprise AI workflows process sensitive customer content and rely on subprocessors.
    suggested_source_or_request: Security/privacy counsel review of trust, privacy and AI-governance artifacts.
    priority: high
