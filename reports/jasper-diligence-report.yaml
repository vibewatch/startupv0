          - T-025
        figure_ids:
          - F-012
        evidence_claim_ids:
          - EC-010
          - EC-011
          - EC-020
          - EC-022
      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids:
          - VIII.D
        summary: Public trademark records identify Jasper AI logo and J mark assets; no patent, copyright-registration or software-license schedule was publicly verified.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.D.F1
            finding: USPTO.report records list a Jasper AI logo registration certificate and a 2025 J mark intent-to-use filing.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-007
          - finding_id: VIII.D.F2
            finding: Patent, copyright, open-source, model/data-license and assignment records require private counsel review.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-007
              - R-012
        hidden_risks:
          - Generative AI products may face copyright, training-data, open-source and license-scope risks not captured by trademark records.
        evidence_gaps:
          - Official USPTO/TSDR pull, IP assignment chain, patent search, copyright registrations, open-source SBOM and model/data license terms.
        follow_up_questions:
          - Have IP counsel verify trademarks and provide complete IP, assignment, license and open-source schedules.
        table_ids:
          - T-024
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-013
          - EC-020
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: No public insurance schedule was found. Cyber, E&O, D&O, EPLI and litigation coverage are material given enterprise AI/privacy/legal exposure.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.E.F1
            finding: Public sources do not disclose insurance limits, exclusions, claims history or reserves.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-012
          - finding_id: VIII.E.F2
            finding: Security/privacy posture and litigation docket make coverage review important.
            evidence_claim_ids:
              - EC-010
              - EC-012
            risk_ids:
              - R-007
              - R-008
        hidden_risks:
          - Coverage exclusions for AI, IP, privacy or contract breaches could leave uncovered exposure.
        evidence_gaps:
          - Insurance policies, limits, exclusions, claims history, broker letters and reserves.
        follow_up_questions:
          - Provide full insurance schedule and broker assessment of AI/privacy/IP/litigation coverage.
        table_ids:
          - T-023
        figure_ids: []
        evidence_claim_ids:
          - EC-010
          - EC-012
          - EC-020
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material customer, supplier, financing, reseller, data-processing and model/cloud contracts are not public. Public pricing and subprocessor pages only identify categories.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.F.F1
            finding: Subprocessor sources identify vendor categories but not contract terms.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-006
              - R-007
          - finding_id: VIII.F.F2
            finding: Material customer contracts, DPAs, SLAs, partner agreements and financing documents require data-room review.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-012
        hidden_risks:
          - Contracts may contain onerous SLAs, indemnities, data-use limits, MFNs, termination rights or change-of-control restrictions.
        evidence_gaps:
          - Material contract schedule, customer/vendor/partner agreements, DPAs, SLAs, indemnities and change-of-control terms.
        follow_up_questions:
          - Provide material contracts and counsel summary of unusual terms, indemnities and termination/change-of-control provisions.
        table_ids:
          - T-023
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-020
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No public regulatory enforcement action was found in reviewed sources; privacy/security/AI compliance should still be treated as material.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G.F1
            finding: Security page states SOC 2/GDPR posture and customer responsibility for sensitive regulated data input.
            evidence_claim_ids:
              - EC-010
              - EC-022
            risk_ids:
