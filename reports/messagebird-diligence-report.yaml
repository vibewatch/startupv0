limitations:
  - This report uses public evidence only and does not verify private financials, contracts, HR records, customer
    references, legal schedules or security artifacts.
  - Public valuation anchors are dated and may not reflect current fair value after restructuring and market changes;
    the report treats current valuation durability as a key diligence question.
  - Company-owned customer stories are useful for logo validation but cannot establish current revenue concentration or
    contract health without customer references and data-room schedules.
