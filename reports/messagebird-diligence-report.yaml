  - figure_id: F-008
    title: MessageBird/Bird diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Risk heatmap spanning the public diligence register.
    spec:
      x_axis:
        label: Likelihood
        scale:
          - low
          - medium
          - high
      y_axis:
        label: Severity
        scale:
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Valuation durability and financing terms are uncertain
          severity: high
          likelihood: medium
          rationale: Latest public valuation references are anchored to 2020-2021 funding/list data, while 2024 revenue and
            restructuring signals make current fair value uncertain.
        - risk_id: R-002
          label: Operating metrics need reconciliation
          severity: high
          likelihood: high
          rationale: Public sources cite different revenue/customer metrics across periods; management must reconcile revenue
            recognition, run-rate, EBITDA, churn and one-time effects.
        - risk_id: R-003
          label: Product repositioning and price cuts may pressure margins
          severity: high
          likelihood: medium
          rationale: Bird shifted from OPaaS/communications APIs toward AI CRM/business-in-a-box and cut prices sharply, which may
            improve adoption but pressure gross margin and brand clarity.
        - risk_id: R-004
          label: Customer concentration and churn are undisclosed
          severity: high
          likelihood: medium
          rationale: Named logos validate market reach, but no public source discloses top-account revenue, churn, NRR, contract
            duration or customer profitability.
        - risk_id: R-005
          label: Highly competitive communications/CRM market
          severity: high
          likelihood: high
          rationale: Bird competes with Twilio, Klaviyo, Attentive and broader CRM platforms while carrier/channel costs and
            feature commoditization can compress pricing.
        - risk_id: R-006
          label: Workforce reductions and hub shifts create execution risk
          severity: high
          likelihood: high
          rationale: Repeated layoffs and a shift away from the Netherlands toward global hubs may affect morale, execution
            continuity and customer support.
        - risk_id: R-007
          label: Data privacy, telecom and channel-platform compliance exposure
          severity: high
          likelihood: medium
          rationale: Messaging, email, WhatsApp, payments and customer-data products face telecom, anti-spam, privacy,
            deliverability and platform-policy risk across jurisdictions.
        - risk_id: R-008
          label: M&A integration and legacy platform complexity
          severity: medium
          likelihood: medium
          rationale: Acquisitions and rebranding can leave legacy systems, integration debt and customer-contract complexity that
            are not visible publicly.
    evidence_claim_ids:
      - EC-001
      - EC-004
      - EC-006
      - EC-010
    source_ids:
      - SRC-001
      - SRC-002
      - SRC-007
      - SRC-009
    notes: Severity and likelihood are analyst judgments from public evidence.
