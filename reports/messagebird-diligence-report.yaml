risk_register:
  - risk_id: R-001
    risk_title: Valuation durability and financing terms are uncertain
    category: financial_quality
    severity: high
    likelihood: medium
    evidence_strength: medium
    description: Latest public valuation references are anchored to 2020-2021 funding/list data, while 2024 revenue and
      restructuring signals make current fair value uncertain.
    mitigation_or_diligence_request: Request latest cap table, option/debt schedules, round terms, secondary pricing and valuation support.
    evidence_claim_ids:
      - EC-001
      - EC-004
  - risk_id: R-002
    risk_title: Operating metrics need reconciliation
    category: financial_quality
    severity: high
    likelihood: high
    evidence_strength: medium
    description: Public sources cite different revenue/customer metrics across periods; management must reconcile revenue
      recognition, run-rate, EBITDA, churn and one-time effects.
    mitigation_or_diligence_request: Request audited financials, ARR/revenue bridge, EBITDA bridge, cohort retention and revenue by product/channel.
    evidence_claim_ids:
      - EC-004
  - risk_id: R-003
    risk_title: Product repositioning and price cuts may pressure margins
    category: product_gtm
    severity: high
    likelihood: medium
    evidence_strength: medium
    description: Bird shifted from OPaaS/communications APIs toward AI CRM/business-in-a-box and cut prices sharply, which
      may improve adoption but pressure gross margin and brand clarity.
    mitigation_or_diligence_request: Review product-line P&L, gross margin by channel, pricing realization and migration/cohort performance.
    evidence_claim_ids:
      - EC-003
      - EC-007
      - EC-010
  - risk_id: R-004
    risk_title: Customer concentration and churn are undisclosed
    category: customer
    severity: high
    likelihood: medium
    evidence_strength: medium
    description: Named logos validate market reach, but no public source discloses top-account revenue, churn, NRR, contract
      duration or customer profitability.
    mitigation_or_diligence_request: Request top-25 customer schedule, NRR/churn cohorts, customer references and contract samples.
    evidence_claim_ids:
      - EC-008
  - risk_id: R-005
    risk_title: Highly competitive communications/CRM market
    category: competition
    severity: high
    likelihood: high
    evidence_strength: high
    description: Bird competes with Twilio, Klaviyo, Attentive and broader CRM platforms while carrier/channel costs and
      feature commoditization can compress pricing.
    mitigation_or_diligence_request: Benchmark win/loss, pricing, gross margin, channel pass-through costs and differentiation evidence.
    evidence_claim_ids:
      - EC-010
      - EC-007
  - risk_id: R-006
    risk_title: Workforce reductions and hub shifts create execution risk
    category: management
    severity: high
    likelihood: high
    evidence_strength: high
    description: Repeated layoffs and a shift away from the Netherlands toward global hubs may affect morale, execution
      continuity and customer support.
    mitigation_or_diligence_request: Request HRIS, attrition, regretted-loss analysis, hiring plan, employee engagement and support SLA performance.
    evidence_claim_ids:
      - EC-006
  - risk_id: R-007
    risk_title: Data privacy, telecom and channel-platform compliance exposure
    category: regulatory_security
    severity: high
    likelihood: medium
    evidence_strength: medium
    description: Messaging, email, WhatsApp, payments and customer-data products face telecom, anti-spam, privacy,
      deliverability and platform-policy risk across jurisdictions.
    mitigation_or_diligence_request: Request privacy/security reports, DPA templates, channel compliance logs,
      deliverability metrics and regulatory schedules.
    evidence_claim_ids:
      - EC-003
      - EC-007
  - risk_id: R-008
    risk_title: M&A integration and legacy platform complexity
    category: operations
    severity: medium
    likelihood: medium
    evidence_strength: medium
    description: Acquisitions and rebranding can leave legacy systems, integration debt and customer-contract complexity
      that are not visible publicly.
    mitigation_or_diligence_request: Review acquisition agreements, integration roadmap, product deprecation plans and customer migrations.
    evidence_claim_ids:
      - EC-005
      - EC-003
