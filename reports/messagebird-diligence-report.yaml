report_metadata:
  report_title: MessageBird / Bird Startup Diligence Report
  target_company: MessageBird / Bird
  website: https://bird.com/
  known_aliases:
    - Bird
    - MessageBird
    - MessageBird B.V.
    - Bird.com
  sector: AI customer communications, omnichannel messaging, CRM and payments workflow software
  geography: Netherlands origin with global hubs across the United States, Europe, Middle East and Asia
  company_stage: Private growth-stage communications platform unicorn
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; EUR where public European sources report revenue or valuation
  time_zone: Europe/Amsterdam
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public evidence only: unicorn lists, company-owned pages, funding announcements, reputable news, investor/partner
      pages and targeted public eligibility searches."
    - Excluded companies with public IPO, acquisition or shutdown signals; treated valuation and private-company status
      as public-market diligence inputs rather than guarantees.
    - Marked financial statements, cap table, contracts, customer concentration, board materials, security reports,
      legal schedules and HR records as not_publicly_verifiable where not public.
  included_jurisdictions:
    - Netherlands
    - United States
    - European Union
    - United Kingdom
    - Singapore
    - United Arab Emirates
    - Global messaging-channel jurisdictions
  excluded_topics:
    - Private data room, paid databases, non-public customer references, non-public contracts, privileged legal advice,
      security reports and personal employee records.
  user_provided_materials:
    - material_id: UPM-001
      title: Randomized public unicorn candidate selection from fetched unicorn lists
      type: workflow_selection_record
      date_received: 2026-05-23
      notes: MessageBird appeared as the next randomized uncovered eligible candidate after GoStudent failed current-unicorn
        valuation eligibility; CB Insights showed MessageBird at $3.8B and public sources show Bird remains
        active/private.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: MessageBird/Bird is an active private unicorn with latest known public valuation around $3.8B/euro 3.8B.
    claim_source: CB Insights, TechCrunch and NL Times public sources
    claim_date: 2026-05-23
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
      - I.C
      - I.D
      - VIII.F
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-009
    contradiction_summary: No public IPO/acquisition/shutdown signal was found, but current valuation should be
      re-underwritten because public valuation anchors are dated.
    diligence_follow_up:
      - Confirm current valuation, cap table, most recent financing/secondary pricing and exit status.
  - founder_claim_id: FC-002
    claim_text: MessageBird became Bird and now sells an AI-powered unified CRM/business communications platform.
    claim_source: Bird company pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - V
    mapped_section_ids:
      - II.A
      - V.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-003
      - EC-007
    contradiction_summary: null
    diligence_follow_up:
      - Validate product adoption, gross margin and retention by module.
  - founder_claim_id: FC-003
    claim_text: Bird has large enterprise/customer adoption, including named global customers and high interaction volume.
    claim_source: Company pages and news coverage
    claim_date: null
    mapped_chapter_ids:
      - III
    mapped_section_ids:
      - III.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-008
    contradiction_summary: Named logos and historical customer counts are public, but concentration, active revenue and churn are not.
    diligence_follow_up:
      - Request top-customer schedule, references, NRR and contract economics.
  - founder_claim_id: FC-004
    claim_text: Bird remains financially strong despite layoffs and realignment.
    claim_source: Founder statement quoted by TechCrunch and NL Times financial metrics
    claim_date: 2025-02
    mapped_chapter_ids:
      - I
      - VII
    mapped_section_ids:
      - I.A
      - VII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-006
    contradiction_summary: Public EBITDA claim is positive, but multiple workforce reductions are a significant
      execution-risk signal requiring reconciliation.
    diligence_follow_up:
      - Request audited financials, restructuring rationale, severance costs, productivity metrics and retention impact.
executive_summary:
  overall_assessment: MessageBird/Bird is an eligible replacement target for this run because public sources show a
    still-operating private communications platform with historical unicorn valuation evidence, but current valuation
    and operating durability need careful re-underwriting.
  investment_or_diligence_thesis: Track as a scaled communications/AI CRM platform with substantial public customer
    signals; proceed only after reconciling valuation, revenue quality, layoffs, pricing pressure and data/privacy risk.
  strongest_verified_claims:
    - summary: TechCrunch reported a $200M Series C at a $3B valuation in 2020, and CB Insights listed MessageBird at $3.8B.
      evidence_claim_ids:
        - EC-001
    - summary: Bird publicly operates an AI-powered CRM/business communications platform across email, SMS, WhatsApp, voice
        and related workflows.
      evidence_claim_ids:
        - EC-003
        - EC-007
    - summary: Public sources identify named enterprise customers and current operating activity.
      evidence_claim_ids:
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-006
      summary: Repeated layoffs and global hub shifts create execution and morale risk.
    - risk_id: R-005
      summary: Twilio/Klaviyo/Attentive and carrier/channel economics create pricing pressure.
    - risk_id: R-001
      summary: Current valuation durability is uncertain versus dated unicorn-round anchors.
  key_evidence_gaps:
    - Current cap table and valuation support
    - Audited revenue/EBITDA and ARR reconciliation
    - Top-customer revenue concentration and churn cohorts
    - Product-line gross margin after price cuts
    - Privacy, deliverability, channel compliance and security artifacts
  recommended_next_steps:
    - Request finance/cap-table package and latest board materials.
    - Run customer-reference and churn diligence.
    - Review pricing, carrier costs and product-line gross margins.
    - Conduct privacy/telecom compliance and security diligence.
    - Assess workforce reduction impact on support and roadmap execution.
