  - table_id: T-015
    title: Legal, regulatory and public proceeding screen
    chapter_id: VIII
    section_id: VIII.A
    purpose: Structure public diligence findings for legal, regulatory and public proceeding screen.
    columns:
      - category
      - public_result
      - verification_status
      - diligence_request
    rows:
      - category: IPO / public listing
        public_result: IPO rumored but no official timeline; no completed IPO found in reviewed sources
        verification_status: inconclusive
        diligence_request: confirm with company counsel and corporate records
      - category: acquisition or shutdown
        public_result: no completed acquisition/shutdown signal found in reviewed sources
        verification_status: partially_verified
        diligence_request: confirm legal entity status and material transactions
      - category: privacy/telecom/channel compliance actions
        public_result: no material action identified in reviewed public source set
        verification_status: inconclusive
        diligence_request: regulatory schedule and counsel docket search
    evidence_claim_ids:
      - EC-009
      - EC-007
    source_ids:
      - SRC-009
      - SRC-011
      - SRC-006
    notes: Absence from public search is not legal clearance.
  - table_id: T-016
    title: IP, data, contracts and compliance request matrix
    chapter_id: VIII
    section_id: VIII.D
    purpose: Structure public diligence findings for ip, data, contracts and compliance request matrix.
    columns:
      - asset_or_contract
      - public_evidence
      - risk
      - request
    rows:
      - asset_or_contract: Bird / MessageBird brand and domains
        public_evidence: rebrand publicly disclosed and Bird.com acquired
        risk: brand/IP ownership and legacy contracts require confirmation
        request: trademark, domain and brand asset schedule
      - asset_or_contract: customer messaging data
        public_evidence: platform handles email/SMS/WhatsApp/customer interactions
        risk: privacy, retention, cross-border transfer and DPA exposure
        request: DPIAs, DPAs, SOC reports and incident logs
      - asset_or_contract: carrier/channel-provider agreements
        public_evidence: PAYG pricing across communications channels
        risk: pass-through cost, platform-policy and termination exposure
        request: material provider contracts and compliance logs
