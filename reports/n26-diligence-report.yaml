limitations:
  - Public-source diligence only; no private data room, management interview, customer call, official legal docket package or security report was provided.
  - Company-owned statements are treated as evidence of public claims, not independent verification of operating performance.
  - No paywall bypass, credentialed database access or non-public regulatory/secret material was used.
  - Where evidence was absent, the report marks matters not_publicly_verifiable rather than estimating or fabricating facts.
