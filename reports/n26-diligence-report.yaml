    gap: Private financial statements, KPI exports and valuation bridge unavailable.
    affected_chapter_ids:
      - I
    priority: high
    follow_up_request: Provide audited financials, management accounts, KPI definitions and current valuation support.
  - gap_id: GAP-002
    gap: Customer concentration, retention and contract terms unavailable.
    affected_chapter_ids:
      - III
      - V
    priority: high
    follow_up_request: Provide top-customer ARR, contracts, renewals, churn, NRR and references.
  - gap_id: GAP-003
    gap: Legal, regulatory, security, IP and vendor records unavailable.
    affected_chapter_ids:
      - VI
      - VIII
    priority: high
    follow_up_request: Provide counsel memos, litigation schedule, regulatory correspondence, security reports, IP assignments and vendor contracts.
