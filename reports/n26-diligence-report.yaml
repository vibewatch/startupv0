report_metadata:
  report_title: N26 Startup Diligence Report
  target_company: N26
  website: https://n26.com/
  known_aliases:
    - N26
    - Number26
    - N26 Bank
  sector: Financial Services / mobile banking and consumer fintech
  geography: Germany / Berlin / European and international banking markets
  company_stage: Private unicorn / Series E digital bank
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing reports and selected only uncovered private-unicorn candidates from public unicorn-list evidence.
    - Used public company-owned pages, CB Insights public list/profile evidence and conservative analyst synthesis.
    - No private data room, management interview, customer call, counsel memo, regulator file or security report was available.
    - Treated company-published statements as public statements; private KPI claims remain not_publicly_verifiable.
  included_jurisdictions:
    - Germany
    - Berlin
    - Markets referenced by public materials
  excluded_topics:
    - Private financial statements, contracts, cap table, board materials, non-public regulatory correspondence and customer references.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-23
      notes: No pitch deck, financial model, data room or founder responses were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: N26 is a private unicorn with latest known public-list valuation of $9.23B.
    claim_source: CB Insights Global Unicorn Club
    claim_date: 2026-05-23
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
    contradiction_summary: null
    diligence_follow_up:
      - Request primary financing documents, valuation bridge and current cap table.
  - founder_claim_id: FC-002
    claim_text: N26 operates an active product platform in Financial Services / mobile banking and consumer fintech.
    claim_source: Public company/product sources
    claim_date: 2026-05-23
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-002
      - EC-009
    contradiction_summary: null
    diligence_follow_up:
      - Validate product usage, roadmap, reliability, security controls and customer satisfaction.
  - founder_claim_id: FC-003
    claim_text: N26 has monetization, customer or market evidence sufficient for screening diligence.
    claim_source: Public web evidence and analyst synthesis
    claim_date: 2026-05-23
    mapped_chapter_ids:
      - I
      - III
      - V
    mapped_section_ids:
      - I.A
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-008
      - EC-012
    contradiction_summary: Public evidence does not verify revenue quality, retention, CAC, margin, cash runway or concentration.
    diligence_follow_up:
      - Request finance, customer, sales and contract evidence before any investment decision.
executive_summary:
  overall_assessment: N26 qualifies for public-source screening as an uncovered private unicorn based on CB Insights and current product/company-owned evidence. The public record supports category presence and selected operating signals, but investment-grade diligence remains open because the core financial, customer, legal, security and governance materials are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The thesis depends on validating N26's revenue quality, retention, unit economics, regulatory/legal posture, product defensibility and financing terms beyond headline unicorn-list valuation evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists N26 at $9.23B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: N26 is a mobile bank that provides digital banking services through smartphones, including bank accounts, cards, savings, investing and security controls.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: N26 publicly lists Standard as free and paid personal plans at EUR 4.90, EUR 9.90 and EUR 16.90 per month; interchange, interest margin and contribution margin are private.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: Licensed-bank regulatory, AML/fraud and operational-resilience obligations are central and require non-public examination evidence
    - risk_id: R-002
      summary: Profitability, capital needs, funding runway and valuation bridge are not publicly verifiable
    - risk_id: R-003
      summary: European neobank competition and customer economics may pressure paid-plan conversion and retention
  key_evidence_gaps:
    - Audited bank financials, regulatory correspondence, capital ratios, loan/deposit economics, paid-plan cohorts, AML/fraud metrics, vendor contracts, cap table and board materials were not public.
    - Top customers, contracts, retention, cohort gross margin, CAC/payback and customer references.
    - Legal, regulatory, privacy, security, IP and third-party dependency artifacts.
    - Board materials, governance consents, compensation, hiring and attrition records.
  recommended_next_steps:
    - Request finance, cap table and KPI data-room exports.
    - Run customer-reference, contract, cohort and pricing diligence.
    - Have counsel/security specialists review legal, privacy, regulatory, IP and security artifacts.
    - Benchmark against direct competitors using win/loss and product/price evidence.
