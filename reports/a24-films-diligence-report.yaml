executive_summary:
  overall_assessment: A24 is a credible public-source unicorn target with strong brand,
    financing and partner evidence, but the investability of a $3.5B private valuation
    is not publicly verifiable without financials, cap table, title economics and
    contracts.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if A24 can
    demonstrate durable slate economics, low partner concentration, disciplined greenlight
    controls, enforceable IP/contract rights and adequate privacy/AI/legal controls.
  strongest_verified_claims:
  - founder_claim_id: FC-002
    summary: The 2022 $225M equity financing is supported by SEC Form D and transaction-counsel
      evidence.
    evidence_claim_ids:
    - EC-002
    - EC-003
  - founder_claim_id: FC-004
    summary: A24 publicly operates a broad film/TV/DTC product surface with large
      brand/library claims.
    evidence_claim_ids:
    - EC-006
    - EC-007
    - EC-008
  - founder_claim_id: FC-005
    summary: Major relationships with HBO/Max/WBD, Showtime and Apple are publicly
      supported.
    evidence_claim_ids:
    - EC-010
    - EC-011
    - EC-012
  biggest_risks:
  - risk_id: R-001
    summary: Financial opacity and valuation support are the top risk.
  - risk_id: R-002
    summary: Hit-driven slate volatility can quickly change revenue, cash needs and
      brand momentum.
  - risk_id: R-003
    summary: Revenue concentration and contract economics for major distribution partners
      are unknown.
  key_evidence_gaps:
  - Audited financials, monthly management accounts, cash/debt, revenue recognition
    and title P&Ls.
  - Fully diluted cap table, investor rights, board governance, option plan and financing
    terms.
  - Top-customer and partner revenue concentration, output/licensing agreements and
    renewal status.
  - Creative pipeline budgets, greenlight process, completion/E&O insurance, AI/talent
    consent and chain-of-title.
  - HRIS headcount/attrition, compensation/equity, org chart and management references.
  recommended_next_steps:
  - Open financial/cap-table data room before relying on the $3.5B valuation.
  - Run title-level P&L, slate, partner-contract and customer-reference diligence.
  - Have counsel review AAA24 settlement, trademark portfolio, IP chain-of-title,
    privacy/AI program and material contracts.
  - Benchmark title acquisition economics and audience conversion against specialty
    peers and streamers.
