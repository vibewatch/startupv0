report_metadata:
  report_title: ASAPP Startup Diligence Report
  target_company: ASAPP
  website: https://www.asapp.com/
  known_aliases:
    - ASAPP Inc.
    - ASAPP
  sector: Enterprise contact-center AI and customer-experience automation
  geography: United States / New York
  company_stage: Private unicorn / late-stage enterprise AI company
  research_date: 2026-05-28
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and selected uncovered targets from public unicorn-list evidence.
    - Used CB Insights unicorn list/profile evidence, company-owned pages, public news/search snippets, careers pages and product/customer pages.
    - Treated company-owned claims as public evidence of the statement, not independent proof of realized financial results.
    - No private data room, management interview, customer calls, full legal docket search or security report was available.
  included_jurisdictions:
    - United States
    - Global markets referenced in public materials
  excluded_topics:
    - Private financial statements, contracts, customer calls, HRIS, cap table, tax, insurance, SOC/security reports and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-28
      notes: No pitch deck, financial model, data room or founder responses were provided.
