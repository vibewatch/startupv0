executive_summary:
  overall_assessment: Proceed only to confirmatory diligence; public evidence supports activity and unicorn screening status, but core investment facts are private.
  investment_or_diligence_thesis: ASAPP appears active and still privately held, with public evidence of a contact-center AI platform, customers, patents and current product/security releases. Underwriting depends on current ARR, customer concentration, security assurance, gross margin and cap-table/debt terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support ASAPP's private-unicorn screening status at $1.60B.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
    - founder_claim_id: FC-002
      summary: ASAPP publicly markets active products/services.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-005
      summary: ASAPP has current operating/personnel signals.
      evidence_claim_ids:
        - EC-009
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and valuation staleness
    - risk_id: R-002
      summary: Enterprise AI safety, privacy and liability exposure
    - risk_id: R-003
      summary: Company-published customer evidence and unknown concentration
  key_evidence_gaps:
    - Audited financials, ARR/bookings, gross margin, cash, debt and forecast model
    - Cap table, preferences, options, warrants, notes and investor rights
    - Top-customer revenue, contracts, renewal, churn and NRR cohorts
    - CAC, pipeline, quota attainment, sales cycle and payback
    - Architecture, security, data provenance, roadmap and technical debt
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline valuation.
    - Request customer/partner contracts and independent reference calls.
    - Have counsel and security/compliance specialists review legal, privacy, IP, data-rights and regulatory artifacts.
    - Benchmark competitors using win/loss, pricing, retention and buyer-reference evidence.
