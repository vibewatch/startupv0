  - table_id: T-004
    title: Architecture and security responsibility split
    chapter_id: II
    section_id: II.A
    purpose: Identify who controls major reliability and security components.
    columns:
      - name: layer
        description: Architecture layer.
      - name: public_role
        description: Publicly described role.
      - name: control_or_risk
        description: Diligence concern.
    rows:
      - row_id: T-004.R1
        values:
          layer: Endpoint
          public_role: Immutable, permissionless protocol interface deployed on each chain.
          control_or_risk: Endpoint immutability reduces upgrade risk but makes deployment correctness critical.
        evidence_claim_ids: [EC-006]
        source_ids: [SRC-006]
      - row_id: T-004.R2
        values:
          layer: Message Libraries
          public_role: Configurable onchain rulesets for verification and delivery.
          control_or_risk: Library selection and upgrades can affect app-level security.
        evidence_claim_ids: [EC-006]
        source_ids: [SRC-006]
      - row_id: T-004.R3
        values:
          layer: DVNs
          public_role: Independent verification services with X-of-Y-of-N security stacks.
          control_or_risk: Single-DVN configurations create a verifier concentration risk.
        evidence_claim_ids: [EC-007, EC-016]
        source_ids: [SRC-009, SRC-020]
      - row_id: T-004.R4
        values:
          layer: Executors
          public_role: Deliver verified messages and can be run by anyone, but docs identify default concentration.
          control_or_risk: Default LayerZero Labs Executor can be a liveness/censorship concentration point.
        evidence_claim_ids: [EC-008]
        source_ids: [SRC-010]
      - row_id: T-004.R5
        values:
          layer: Pricing model
          public_role: Source gas, security stack fees, executor fees and destination gas purchase.
          control_or_risk: Cross-chain fee volatility and worker compensation affect UX and margins.
        evidence_claim_ids: [EC-009]
        source_ids: [SRC-008]
    evidence_claim_ids: [EC-006, EC-007, EC-008, EC-009, EC-016]
    source_ids: [SRC-006, SRC-008, SRC-009, SRC-010, SRC-020]
    notes: Control design should be independently reviewed by protocol security specialists.
