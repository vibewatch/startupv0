  - figure_id: F-008
    title: Key risk heatmap
    chapter_id: VIII
    section_id: VIII.A
    figure_type: risk_heatmap
    description: Heatmap of principal diligence risks.
    purpose: Prioritize follow-up across finance, security, token/legal and customer proof.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale: [low, medium, high, unknown]
      y_axis:
        label: severity
        scale: [informational, low, medium, high, critical]
      risk_points:
        - risk_id: R-003
          label: Security and liveness concentration
          severity: critical
          likelihood: high
          rationale: KelpDAO incident disclosed approximately $290M exploit tied to single-DVN setup and LayerZero Labs DVN RPC spoofing.
          evidence_claim_ids: [EC-016]
          source_ids: [SRC-020]
        - risk_id: R-001
          label: Financial opacity
          severity: high
          likelihood: high
          rationale: Public sources do not provide financial statements, cap table or customer revenue.
          evidence_claim_ids: [EC-020]
          source_ids: [SRC-001, SRC-003]
        - risk_id: R-004
          label: Token/regulatory uncertainty
          severity: high
          likelihood: medium
          rationale: ZRO governance, fee switch, buybacks and cross-chain asset issuance require counsel review.
          evidence_claim_ids: [EC-018]
          source_ids: [SRC-016]
        - risk_id: R-006
          label: FTX matter residual risk
          severity: medium
          likelihood: low
          rationale: CourtListener shows FTX Recovery Trust adversary docket terminated, but settlement/release details are not public.
          evidence_claim_ids: [EC-017]
          source_ids: [SRC-015]
        - risk_id: R-009
          label: Executor concentration
          severity: high
          likelihood: medium
          rationale: Docs state every default Executor across preset network configuration is operated by LayerZero Labs.
          evidence_claim_ids: [EC-008]
          source_ids: [SRC-010]
    rendering_guidance:
      preferred_format: svg
      display_notes: Use severity on Y-axis and likelihood on X-axis.
    evidence_claim_ids: [EC-008, EC-016, EC-017, EC-018, EC-020]
    source_ids: [SRC-010, SRC-015, SRC-016, SRC-020]
    notes: Heatmap reflects public-source diligence, not legal or investment advice.

