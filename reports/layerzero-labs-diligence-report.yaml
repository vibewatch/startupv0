report_metadata:
  report_title: LayerZero Labs Public-Source Startup Diligence Report
  target_company: LayerZero Labs
  website: https://layerzero.network/
  known_aliases:
    - LayerZero
    - LayerZero Labs Ltd.
    - LayerZero Foundation
    - LayerZero V2
    - ZRO
    - Stargate
    - Nexus
  sector: Omnichain interoperability protocol / blockchain infrastructure
  geography: United States / New York per CB Insights; Vancouver, New York and APAC hiring footprint; global protocol ecosystem
  company_stage: Private unicorn / token-governed protocol ecosystem
  research_date: 2026-05-18
  analyst: GitHub Copilot CLI diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source only; no private financial statements, contracts, cap table or management interviews were provided.
    - Triangulated valuation and financing from CB Insights, public news, company documents and legal records.
    - Used LayerZero docs, company pages, GitHub repositories, Immunefi and public court search records for product, security and legal evidence.
    - Treated company-controlled protocol, foundation and incident statements as primary evidence for what the company says, not independent proof of economics or absence of risk.
  included_jurisdictions:
    - United States
    - New York per CB Insights metadata
    - Canada / Vancouver hiring footprint
    - APAC hiring and market expansion references
    - Global blockchain networks and token ecosystem
  excluded_topics:
    - Non-public audited financial statements, tax records and management accounts
    - Private customer contracts, supplier contracts and revenue by customer
    - Complete cap table, token allocation schedule, warrants, debt instruments and liquidation preferences
    - Counsel-certified docket, regulatory and IP searches
    - Investment advice, legal opinion or technical security audit opinion
  user_provided_materials:
    - material_id: UPM-001
      title: User request to create LayerZero Labs diligence report
      type: conversation_instruction
      date_received: 2026-05-18
      notes: User requested reports/layerzero-labs-diligence-report.yaml using the startup diligence research skill.

