    affected_chapter_ids: [I, III, V, VII, VIII]
    affected_section_ids: [I.A, I.C, III.C, V.D, VII.A, VIII.F]
  - limitation_id: L-002
    description: Company-controlled docs/pages were used for product, governance and incident claims; these require independent validation.
    affected_chapter_ids: [II, VI, VIII]
    affected_section_ids: [II.A, VI.A, VIII.G]
  - limitation_id: L-003
    description: Legal conclusions are expressly out of scope; CourtListener metadata and public pages are not a counsel-certified docket/regulatory/IP search.
    affected_chapter_ids: [VIII]
    affected_section_ids: [VIII.A, VIII.B, VIII.D, VIII.G]
