          node_type: product
          description: Application logic executed after verification and delivery.
          evidence_claim_ids: [EC-008, EC-022]
          source_ids: [SRC-010, SRC-019]
      edges:
        - edge_id: e1
          from_node_id: app_source
          to_node_id: endpoint_source
          relationship: sends message through
          data_or_dependency: Application-defined bytes and execution options.
          evidence_claim_ids: [EC-004, EC-006]
          source_ids: [SRC-005, SRC-006]
        - edge_id: e2
          from_node_id: endpoint_source
          to_node_id: message_lib
          relationship: delegates to
          data_or_dependency: Channel and pathway configuration.
          evidence_claim_ids: [EC-006]
          source_ids: [SRC-006]
        - edge_id: e3
          from_node_id: message_lib
          to_node_id: dvn_stack
          relationship: requires verification by
          data_or_dependency: payloadHash and nonce.
          evidence_claim_ids: [EC-007]
          source_ids: [SRC-009]
        - edge_id: e4
          from_node_id: dvn_stack
          to_node_id: executor
          relationship: enables execution after verification
          data_or_dependency: Verified message state.
          evidence_claim_ids: [EC-007, EC-008]
          source_ids: [SRC-009, SRC-010]
        - edge_id: e5
          from_node_id: executor
          to_node_id: endpoint_destination
          relationship: calls lzReceive / lzCompose
          data_or_dependency: Destination gas and execution options.
          evidence_claim_ids: [EC-008, EC-009]
          source_ids: [SRC-008, SRC-010]
        - edge_id: e6
          from_node_id: endpoint_destination
          to_node_id: app_destination
          relationship: delivers verified message to
          data_or_dependency: Application payload.
          evidence_claim_ids: [EC-008, EC-022]
          source_ids: [SRC-010, SRC-019]
      boundaries:
        - boundary_id: b1
          label: Application-controlled configuration
          node_ids: [app_source, message_lib, dvn_stack, executor]
        - boundary_id: b2
          label: LayerZero protocol interface
          node_ids: [endpoint_source, endpoint_destination]
