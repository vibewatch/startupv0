        - node_id: executor
          label: Executor
          node_type: service
          description: Delivers and executes verified messages on destination chain.
          evidence_claim_ids: [EC-008]
          source_ids: [SRC-010]
        - node_id: endpoint_destination
          label: Destination Endpoint
          node_type: service
