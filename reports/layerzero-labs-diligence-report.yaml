risk_register:
  - risk_id: R-001
    risk_title: Financial, cap-table and customer-revenue opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: No public audited financials, management accounts, revenue by product/customer, cap table, debt schedule or material contracts were available.
    impacted_chapter_ids: [I, III, V, VII, VIII]
    impacted_section_ids: [I.A, I.C, III.C, V.D, VIII.F]
    evidence_claim_ids: [EC-020]
    mitigation_or_diligence_request: Require full financial/cap-table/customer data room before underwriting.
  - risk_id: R-002
    risk_title: Valuation and crypto-cycle exposure
    risk_category: financing
    severity: high
    likelihood: medium
    description: $3B public valuation is well evidenced historically but may be sensitive to crypto volumes, token prices, security incidents and macro financing conditions.
    impacted_chapter_ids: [I, II, IV, VI]
    impacted_section_ids: [I.D, II.A, IV.A, VI.B]
    evidence_claim_ids: [EC-001, EC-002, EC-003, EC-005, EC-023]
    mitigation_or_diligence_request: Re-underwrite valuation using current revenue, retention, incident-adjusted pipeline and comparable multiples.
  - risk_id: R-003
    risk_title: Security and liveness concentration
    risk_category: technical
    severity: critical
    likelihood: high
    description: The KelpDAO incident disclosed an approximately $290M exploit tied to a 1-of-1 DVN configuration and RPC spoofing affecting the LayerZero Labs DVN; multi-DVN adoption and remediation must be verified.
    impacted_chapter_ids: [II, III, VI, VIII]
    impacted_section_ids: [II.A, III.D, III.E, VI.A, VIII.G]
    evidence_claim_ids: [EC-007, EC-014, EC-016, EC-021]
    mitigation_or_diligence_request: Conduct independent forensic/security review, verify all remediation and require customer migration to diversified DVN configurations.
  - risk_id: R-004
    risk_title: Token, governance and regulatory uncertainty
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: ZRO fee switch, buybacks, governance, bridging and cross-chain value-transfer products create securities/commodities, sanctions and money-transmission review needs.
    impacted_chapter_ids: [I, V, VIII]
    impacted_section_ids: [I.C, V.A, VIII.G]
    evidence_claim_ids: [EC-014, EC-018, EC-022, EC-024]
    mitigation_or_diligence_request: Obtain counsel memos, token allocation/treasury controls, sanctions/money-transmission analysis and governance risk assessment.
  - risk_id: R-005
    risk_title: Adoption-to-revenue proof gap
    risk_category: customer
    severity: medium
    likelihood: high
    description: Named apps, TVL, volume, users and partner logos do not prove paid customers, retention, ARR or concentration.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, III.B, III.C, V.B, V.C]
    evidence_claim_ids: [EC-012, EC-013, EC-020, EC-023]
    mitigation_or_diligence_request: Request top-customer schedule, contracts, revenue by customer, pipeline and references.
  - risk_id: R-006
    risk_title: FTX litigation residual exposure
    risk_category: legal
    severity: medium
    likelihood: low
    description: CourtListener shows a terminated FTX Recovery Trust adversary proceeding involving LayerZero Labs Ltd.; settlement terms and residual obligations are not public.
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.A, VIII.B]
    evidence_claim_ids: [EC-017]
    mitigation_or_diligence_request: Obtain pleadings, settlement/dismissal documents, releases, reserves and counsel opinion.
  - risk_id: R-007
    risk_title: Management, controls and headcount transparency gap
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public sources verify CEO/co-founder and open roles but not full org, board, compensation, turnover, controls or succession.
    impacted_chapter_ids: [VII]
    impacted_section_ids: [VII.A, VII.B, VII.C, VII.D, VII.G]
    evidence_claim_ids: [EC-017, EC-019, EC-020, EC-025]
    mitigation_or_diligence_request: Request org chart, leadership bios, compensation, turnover and board/governance documents.
  - risk_id: R-008
    risk_title: Developer tooling stability and open-source execution
    risk_category: product
    severity: medium
    likelihood: medium
    description: Devtools README warns beta status and possible backwards-incompatible changes; public artifacts require code-quality and release-process review.
    impacted_chapter_ids: [IV, VI, VIII]
    impacted_section_ids: [IV.A, VI.A, VIII.D]
    evidence_claim_ids: [EC-010, EC-011, EC-021]
    mitigation_or_diligence_request: Review release process, semver policy, issue backlog, audits and customer-impact controls.
  - risk_id: R-009
    risk_title: Default Executor concentration
    risk_category: operational
    severity: high
    likelihood: medium
    description: LayerZero docs state every default Executor across every pathway in every preset network configuration is operated by LayerZero Labs, creating liveness/censorship concentration.
    impacted_chapter_ids: [II, VIII]
    impacted_section_ids: [II.A, VIII.G]
    evidence_claim_ids: [EC-008, EC-016]
    mitigation_or_diligence_request: Verify third-party/custom Executor adoption, fallback procedures, monitoring and customer communications.

diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and monthly management accounts.
    why_it_matters: Needed to assess revenue quality, burn, liabilities, runway and incident/litigation reserves.
    suggested_source_or_request: Request audited FY2023-FY2025 statements and 2026 YTD management accounts.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, token allocation, warrants, debt, preferences and investor rights.
    why_it_matters: Determines dilution, liquidation economics and governance control.
    suggested_source_or_request: Request fully diluted capitalization and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer and product.
    why_it_matters: Public adoption metrics do not prove economics or concentration.
    suggested_source_or_request: Request top-customer revenue, contracts, churn and margin schedule.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Active pathway metrics, SLAs, incidents and product-level gross margin.
    why_it_matters: Determines durability and profitability of interoperability products.
    suggested_source_or_request: Request product analytics and reliability dashboards.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.A
    missing_information: KelpDAO incident RCA, independent forensic report, remediation evidence and customer migration status.
    why_it_matters: Security incident is the highest-priority risk.
    suggested_source_or_request: Request full incident packet and third-party security review.
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Token, sanctions, money-transmission and cyber incident legal memos.
    why_it_matters: ZRO and cross-chain value transfer can trigger complex regulatory exposure.
    suggested_source_or_request: Request counsel memos and regulatory correspondence.
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.A
    missing_information: FTX pleadings, settlement/dismissal documents and residual obligations.
    why_it_matters: Public docket metadata does not show economic impact or releases.
    suggested_source_or_request: Request legal log and counsel opinion.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.A
    missing_information: Org chart, executive biographies, board composition and succession plan.
    why_it_matters: Execution and control quality cannot be assessed from public sources.
    suggested_source_or_request: Request management packet and background checks.
    priority: medium
  - gap_id: G-009
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, pipeline, quota, CAC and marketing budget.
    why_it_matters: GTM efficiency and budget sufficiency are unknown.
    suggested_source_or_request: Request CRM and GTM operating metrics.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Patent/trademark portfolio, OSS compliance, contributor assignment and material license review.
    why_it_matters: IP ownership and OSS compliance affect defensibility and legal risk.
    suggested_source_or_request: Request IP schedule and legal diligence memo.
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Cyber, D&O, E&O, crime and digital-asset insurance coverage.
    why_it_matters: Incident and token exposures may be uninsured or excluded.
    suggested_source_or_request: Request policies, exclusions, broker summary and claims history.
    priority: high
  - gap_id: G-012
    chapter_id: III
    section_id: III.E
    missing_information: Top suppliers, RPC/cloud/security vendors, SLAs and redundancy design.
    why_it_matters: RPC spoofing and worker concentration are material operational risks.
    suggested_source_or_request: Request supplier schedule and security attestations.
    priority: high

