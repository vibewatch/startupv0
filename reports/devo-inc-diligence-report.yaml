executive_summary:
  overall_assessment: Devo is an active private cybersecurity unicorn with strong public financing, product and compliance signals, but its investability cannot be underwritten from public evidence alone because financial quality, customer retention, cap table, security artifacts and legal schedules are private.
  investment_or_diligence_thesis: Devo merits continued diligence only if management can substantiate durable enterprise/SOC demand, differentiated security-data economics, defensible AI/SIEM outcomes, clean preference/legal/security posture and efficient growth after the 2021-2022 late-stage valuation step-up.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Series F was publicly announced at $100M and $2B valuation in June 2022.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Public product pages support Devo positioning across Data Analytics Cloud, Intelligent SIEM, Data Orchestration and DeepTrace.
      evidence_claim_ids:
        - EC-005
        - EC-014
        - EC-015
        - EC-016
    - founder_claim_id: FC-004
      summary: FedRAMP Moderate and StateRAMP Moderate announcements provide regulated-market signals.
      evidence_claim_ids:
        - EC-017
        - EC-018
  biggest_risks:
    - risk_id: R-001
      summary: No public financial statements, ARR, burn, cash runway or forecast accuracy.
    - risk_id: R-003
      summary: Customer concentration, churn, NRR and references are not public.
    - risk_id: R-004
      summary: Crowded SIEM/security-data market creates substantial pricing and displacement risk.
    - risk_id: R-010
      summary: Security/privacy artifact gap is material for a security data platform.
  key_evidence_gaps:
    - Audited/reviewed financials, management accounts, ARR bridge, burn, cash runway and forecast model.
    - Current cap table, preference stack, option pool, warrants, debt and 409A history.
    - Top-customer ARR, churn/NRR, customer references, partner economics and supplier commitments.
    - Architecture, AI/model evaluation, product adoption, COGS and security/compliance artifacts.
    - Counsel-led litigation/regulatory/IP/contracts/insurance schedules.
  recommended_next_steps:
    - Open financial/cap-table data room first; stop if ARR quality, runway or preferences do not support the 2022 valuation anchor.
    - "Run customer and product diligence in parallel: top-customer references, churn/NRR, product demo, architecture review and AI efficacy tests."
    - Have counsel/security review FedRAMP/StateRAMP packages, SOC/pen-test artifacts, material contracts, litigation and IP chain.
    - Interview CEO/executive chair and functional leaders about post-2025 operating plan, retention and GTM execution.
