risk_register:
  - risk_id: R-001
    risk_title: Private financial statements and operating metrics are unavailable
    risk_category: financial
    severity: high
    likelihood: high
    description: ARR, revenue growth, gross margin, burn, cash runway, backlog, receivables and forecast accuracy cannot be underwritten from public sources.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-020
    mitigation_or_diligence_request: Require audited/reviewed financials, monthly management accounts, cohort retention, cash balance, debt and detailed forecast model.
  - risk_id: R-002
    risk_title: Preference stack, dilution and financing terms may materially affect returns
    risk_category: financing
    severity: high
    likelihood: medium
    description: Large late-stage rounds at $1.5B and $2B valuations may include liquidation preferences, ratchets or senior rights not visible publicly.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
