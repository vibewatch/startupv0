report_metadata:
  report_title: Devo, Inc. Startup Diligence Report
  target_company: Devo, Inc.
  website: https://www.devo.com/
  known_aliases:
    - Devo
    - Devo Technology
    - Devo Technology Inc.
    - Logtrust
  sector: Cybersecurity software; cloud-native logging, security data platform, SIEM, SOAR and UEBA
  geography: United States / Cambridge, Massachusetts, with North America, Europe and APAC operations indicated by public materials
  company_stage: Private venture-backed unicorn / growth-stage software company; last public valuation $2B Series F in 2022
  research_date: 2026-05-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth.
    - Prioritized company primary sources for financing, product, leadership, compliance and customer/partner evidence, then triangulated with investor, PRNewswire, Gartner Peer Insights, IDC-referenced and CourtListener sources.
    - Treated company-published claims as verified only for existence of the public statement unless independently corroborated.
    - Stopped short of investment recommendation because private financial, customer, legal, security and technical artifacts were unavailable.
  included_jurisdictions:
    - United States
    - Spain/Europe historical Logtrust context
    - Global customer/partner jurisdictions referenced by company materials
    - United States federal and state government compliance context
  excluded_topics:
    - Private financial statements, forecasts, contracts, cap table, customer calls, counsel memos, SOC reports, authorization packages, source code, model evaluations and board materials were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Devo, Inc. diligence report
      type: workflow_request
      date_received: 2026-05-17
      notes: No pitch deck, financial model, data room or founder responses were provided.
