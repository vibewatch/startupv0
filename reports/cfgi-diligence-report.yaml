executive_summary:
  overall_assessment: CFGI appears eligible for a private-unicorn diligence report because CB Insights lists it as a unicorn, CB Insights/PRNewswire describe it as active and PE-backed, and SEC EDGAR shows private Form D filings without public tickers. Public evidence supports an active accounting and CFO advisory platform backed by Carlyle/CVC, but nearly all investment-critical economics remain private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The attractive thesis is a scaled, independent non-audit accounting advisory platform serving CFOs and private equity sponsors; the diligence burden is proving revenue quality, margin durability, utilization, customer concentration, professional talent retention, legal receivables exposure, and current cap-table/debt economics behind a stale 2021 valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights' unicorn list includes CFGI at US$1.85B with the 2021-09-15 unicorn date and Carlyle/CVC investors.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Public sources consistently describe CFGI as an accounting/business advisory firm supporting CFO and private equity sponsor priorities.
      evidence_claim_ids:
        - EC-003
        - EC-010
        - EC-021
    - founder_claim_id: FC-004
      summary: CFGI publicly claims over 1,200 professionals, 30+ offices and thousands of clients.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Revenue, EBITDA, cash, debt, ARR-equivalent backlog, utilization and quality-of-earnings data are not public.
    - risk_id: R-003
      summary: Top customers, churn, revenue concentration and project-level profitability are not publicly verifiable.
    - risk_id: R-005
      summary: Professional-services growth depends on recruiting, retention, utilization, partner leverage and quality control in a competitive talent market.
  key_evidence_gaps:
    - Audited financials, management accounts, revenue by service line/geography, EBITDA, cash/debt, utilization and forecast model.
    - Current cap table, investor rights, option pool, debt, leverage, acquisition history and 2021/current valuation bridge.
    - Customer list, contract terms, top-account revenue, churn, NRR/renewal proxy, backlog and independent customer references.
    - HRIS headcount, partner/principal productivity, attrition, compensation, bonus/equity plans and recruiting pipeline.
    - Full legal docket, AR/collections disputes, regulatory correspondence, IP/trademark ownership, insurance policies and material contracts.
  recommended_next_steps:
    - Run financial and quality-of-earnings diligence before relying on the US$1.85B headline valuation.
    - Request customer concentration, backlog, churn, project margin and reference-call materials.
    - Conduct legal, lien, regulatory, IP/trademark, insurance and employment diligence with counsel.
    - Benchmark pricing, win/loss, utilization and talent retention against Big Four and independent advisory competitors.
    - Reconcile CB Insights total-raised data with SEC Form D offerings and 2021 CVC/Carlyle transaction terms.
