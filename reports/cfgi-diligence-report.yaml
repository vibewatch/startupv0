report_metadata:
  report_title: CFGI Startup Diligence Report
  target_company: CFGI
  website: https://www.cfgi.com/
  known_aliases:
    - CFGI, LLC
    - CFGI Eagle Parent, L.L.C.
    - Corporate Finance Group, Inc.
  sector: Accounting advisory, finance transformation, capital markets readiness, transaction advisory and CFO services
  geography: United States / Boston, Massachusetts, with public claims of offices across the Americas, Europe and Asia Pacific
  company_stage: Private unicorn / private-equity-backed professional services company
  research_date: 2026-05-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth with public web, SEC, legal-record and company/news sources.
    - Used CB Insights as the unicorn-status source and cross-checked active/private status against CB Insights company profile, SEC EDGAR and recent company press releases.
    - Treated company-published and PRNewswire statements as evidence that the company publicly made the statement; private financials, customer contracts and cap-table terms remain unverified.
    - Direct access to some company/investor sites was blocked by bot protection; blocked sources are disclosed and not used to verify unsupported facts.
  included_jurisdictions:
    - United States
    - Delaware
    - Massachusetts
    - Publicly referenced Americas, Europe and Asia Pacific operating regions
  excluded_topics:
    - Private data-room materials, audited financial statements, customer references, HRIS exports, contracts, insurance policies, cap table, board materials and non-public legal/regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request and candidate CFGI row from fetched CB Insights unicorn table
      type: workflow_context
      date_received: 2026-05-17
      notes: Provided candidate slug, company name, $1.85B valuation, 2021-09-15 date joined, Boston/United States, Financial Services and investors The Carlyle Group and CVC Capital Partners; independent public sources were still used where accessible.
