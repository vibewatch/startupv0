diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts, service-line revenue/margins, cash, debt, AR aging, backlog and utilization.
    why_it_matters: These determine quality of earnings and valuation support.
    suggested_source_or_request: CFO data room and QoE provider.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, investor rights, debt, option pool, preferences and legal entity chart.
    why_it_matters: Sponsor economics and debt can materially change transaction value.
    suggested_source_or_request: Company counsel, CFO and investors.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Service-line P&L, rate card, realization, write-offs, delivery quality and automation roadmap.
    why_it_matters: Services economics depend on utilization, rate realization and repeatability.
    suggested_source_or_request: COO/CFO operating metrics and practice-leader interviews.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Top 15 customers by revenue, contracts, timing, service line, concentration and references.
    why_it_matters: Public customer claims do not verify revenue durability.
    suggested_source_or_request: Customer master, contracts and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.B
    missing_information: Partner agreements, referral fees, exclusivity, support obligations and partner pipeline.
    why_it_matters: Partnerships can create dependency or economics not visible in announcements.
    suggested_source_or_request: Legal contracts and partner-channel dashboard.
    priority: medium
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing benchmark, market share and buyer references versus Big Four and independent advisory firms.
    why_it_matters: Competition and pricing pressure are central to sustainability.
    suggested_source_or_request: Sales CRM, buyer calls and external benchmarking.
    priority: high
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quota, pipeline, conversion, sales cycle and channel contribution.
    why_it_matters: Growth requires evidence of productive sales and partner/principal channels.
    suggested_source_or_request: CRM, compensation plans and sales dashboard.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Technology budget, AI policy, internal tooling, partner platform security and roadmap.
    why_it_matters: Automation is a potential margin lever and risk vector.
    suggested_source_or_request: COO/CTO documentation, security review and partner agreements.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS headcount history/projection by function/location/level and utilization.
    why_it_matters: Talent capacity and utilization drive revenue, quality and margin.
    suggested_source_or_request: HRIS/payroll export and operating KPIs.
    priority: high
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.G
    missing_information: Attrition, regretted turnover, partner departures, recruiting funnel and retention incentives.
    why_it_matters: Advisory platforms are vulnerable to key-person and team attrition.
    suggested_source_or_request: HR/legal/finance materials and management interviews.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Comprehensive litigation, arbitration, demand letters, settlements and counsel letters.
    why_it_matters: Public searches are incomplete and client/employee disputes may be private.
    suggested_source_or_request: Company counsel and third-party docket search.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Trademark/IP portfolio, software licenses, open-source policy, client data and work-product ownership.
    why_it_matters: Advisory deliverables and technology partnerships can create IP/data-rights risk.
    suggested_source_or_request: IP counsel and contract/legal inventory.
    priority: medium
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.E
    missing_information: E&O, cyber, D&O, EPLI, workers' compensation and loss runs.
    why_it_matters: Professional services liability and data handling require adequate coverage.
    suggested_source_or_request: Broker certificates, policies and claims history.
    priority: medium
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, professional licensing, privacy/security incidents and global employment compliance.
    why_it_matters: Multijurisdiction operations can create hidden compliance exposure.
    suggested_source_or_request: Counsel compliance memo and incident register.
    priority: medium
