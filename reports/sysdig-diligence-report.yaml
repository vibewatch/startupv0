report_metadata:
  report_title: Sysdig Startup Diligence Report
  target_company: Sysdig
  website: https://www.sysdig.com/
  known_aliases:
    - Sysdig, Inc.
    - Sysdig Secure
    - Sysdig Monitor
    - Falco (open-source project originally created by Sysdig)
  sector: Cybersecurity; cloud-native application protection platform (CNAPP), runtime security, container/Kubernetes
    security and monitoring
  geography: United States (San Francisco) with global subsidiaries, regional SaaS endpoints and international customers/partners
  company_stage: Private unicorn / late-stage venture-backed cybersecurity company
  research_date: 2026-06-12
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility using CB Insights public unicorn list, SEC EDGAR company search, active official website,
      current careers page and recent product press release.
    - Collected public evidence from company pages, archived funding release, customer/partner pages, legal/trademark
      records, Falco/GitHub sources and competitor product pages.
    - Treated private financial, customer-concentration, cap-table, contract, insurance and HR metrics as
      not_publicly_verifiable rather than estimating.
    - Did not bypass paywalls or access controls; inaccessible/uncertain items are recorded as diligence gaps.
  included_jurisdictions:
    - United States
    - Public global jurisdictions named by Sysdig subsidiaries, customers, processors and cloud regions
  excluded_topics:
    - Non-public data room records
    - Private personal contact data
    - Paywalled analyst reports not publicly fetched
    - Customer calls and founder interviews
    - Privileged legal, tax and audit materials
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow-selected Sysdig unicorn row and CB Insights context
      type: workflow_context
      date_received: 2026-06-12
      notes: User provided selection context; report cites public CB Insights page where accessible.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Sysdig is a private unicorn with latest public-list valuation used here of $2.50B.
    claim_source: CB Insights public unicorn list and workflow context
    claim_date: 2026-03-01
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.B
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-015
    contradiction_summary: CB shows $2.50B while archived Series F shows $1.19B; reconcile with primary documents.
    diligence_follow_up:
      - Request full financing history, current cap table, option pool, debt instruments and valuation support.
  - founder_claim_id: FC-002
