    diligence_follow_up:
      - Request top-customer schedule, contracts, NRR/churn, customer references and partner-sourced ARR.
  - founder_claim_id: FC-006
    claim_text: Sysdig is extending cloud security into agentic AI workflows through headless cloud security and Sysdig Sage.
    claim_source: Sysdig May 2026 release and platform pages
    claim_date: 2026-05-06
    mapped_chapter_ids:
      - II
      - VI
      - V
    mapped_section_ids:
      - II.A
      - VI.B
      - V.A
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-012
      - EC-020
    contradiction_summary: null
    diligence_follow_up:
      - Validate adoption, security/privacy design, model dependencies, roadmap milestones and monetization.
executive_summary:
  overall_assessment: "Eligible private active unicorn: public evidence supports Sysdig as an active U.S.
    cybersecurity/CNAPP company with latest public-list valuation of $2.50B, but investability hinges on private
    financial quality, valuation reconciliation, customer concentration and competitive proof."
  investment_or_diligence_thesis: Sysdig has credible public differentiation around runtime security, Falco/open source,
    enterprise customers and AI/headless cloud-security roadmap; diligence should test whether revenue growth,
    retention, margins and win rates justify the stale public valuation in a crowded CNAPP market.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Founded in 2013 by Loris Degioanni and born in open source.
      evidence_claim_ids:
        - EC-003
        - EC-011
    - founder_claim_id: FC-003
      summary: Markets a broad CNAPP/runtime/cloud-security and monitoring platform.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-006
      summary: Recently announced AI/headless cloud-security product direction, supporting active status.
      evidence_claim_ids:
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, ARR, margin, burn, backlog and unit economics are not public.
    - risk_id: R-002
      summary: "Public valuation sources need reconciliation: $1.19B Series F historical source versus $2.50B CB Insights
        value."
    - risk_id: R-003
      summary: CNAPP/cloud security is highly competitive with broad incumbent and specialist overlap.
  key_evidence_gaps:
    - Audited financials, ARR/NRR/churn, gross margin, burn/runway and forecast model.
    - Current cap table, preference stack, debt and valuation reconciliation to $2.50B.
    - Top customer concentration, contracts, renewal pipeline and customer reference validation.
    - Win/loss, competitive pricing, product benchmarks and AI/headless adoption metrics.
    - Complete litigation/IP/insurance/material contract schedules reviewed by counsel.
  recommended_next_steps:
    - Run financial, cap-table and tax diligence before relying on public valuation.
    - Conduct customer-reference and win/loss calls across top accounts and competitive losses.
    - Perform product/security architecture review, including AI subprocessors and Falco/open-source governance.
    - Have counsel complete litigation, IP, privacy, insurance and material-contract review.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies late-stage financing and a $2.50B public-list valuation, but financial
      statements, projections, revenue quality and current capital structure remain private.
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-005
      - EC-018
      - EC-019
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or quarterly financial statements, management reports, revenue breakdowns, backlog or AR aging were
          public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources do not disclose audited financial statements, ARR, margin, burn, backlog or AR aging.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Quote-based enterprise licensing confirms monetization mechanics but not realized pricing or margins.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-001
        hidden_risks:
          - Valuation may be disconnected from current revenue quality if growth or multiples changed.
        evidence_gaps:
          - Audited financial statements, management accounts, ARR bridge, revenue by product/channel/geography, backlog
            and AR aging are required.
        follow_up_questions:
          - Provide monthly P&L, balance sheet, cash flow, ARR/NRR/churn cohorts, backlog and AR aging for FY2023-FY2026
            YTD.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-018
          - EC-005
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers are visible in product, AI/headless, partner and global footprint claims, but forecast
          assumptions are not public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Public product and partner evidence supports a plausible growth narrative in CNAPP, runtime security, AI
              workflows and cloud marketplaces.
            evidence_claim_ids:
              - EC-004
              - EC-007
              - EC-012
              - EC-020
            risk_ids:
              - R-003
              - R-005
          - finding_id: I.B-F2
            finding: International operations create growth optionality and compliance/FX/tax complexity.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-006
        hidden_risks:
          - Forecasts may depend on competitive displacement and AI adoption that are not externally validated.
        evidence_gaps:
          - No three-year projections, sensitivity cases, capex, working-capital or financing assumptions were public.
        follow_up_questions:
          - Provide board-approved forecast, scenarios, sales capacity model, capex/working-capital assumptions and
            runway.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-007
          - EC-012
          - EC-019
          - EC-020
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify investors and valuations but not shares, preferences, option pool, debt, warrants or
          liabilities.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB and archived release name major investors, but exact ownership and dilution are not public.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: SEC EDGAR returned no obvious public registrant named Sysdig, supporting private-company treatment with CB’s
              private-unicorn definition.
            evidence_claim_ids:
              - EC-015
              - EC-001
            risk_ids:
              - R-002
        hidden_risks:
          - Later financing terms could include senior preferences or structured rights.
        evidence_gaps:
          - No cap table, option/warrant schedule, debt summary or off-balance-sheet liability schedule was public.
        follow_up_questions:
          - Provide fully diluted cap table, preferred terms, option pool, debt/notes/warrants and board valuation
            materials.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-015
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Historical financing can be partially reconstructed; tax positions, accounting policies and full financing
          ledger cannot.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Archived Series F release verifies $188M at $1.19B valuation and $394M total funding as of April 2021.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-002
          - finding_id: I.D-F2
            finding: CB reports $2.50B public-list valuation; primary documents must reconcile the valuation path.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-002
        hidden_risks:
          - A stale or list-derived valuation may not represent current fair value or liquidation outcomes.
        evidence_gaps:
          - No tax-position schedule, revenue-recognition policy or complete equity/debt ledger was public.
        follow_up_questions:
          - Provide financing ledger, tax positions, revenue-recognition policy, debt schedule and valuation
            reconciliation.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-018
  - chapter_id: II
    title: Products
    chapter_summary: Sysdig publicly markets broad cloud-native security and monitoring with runtime insights, quote-based
      pricing and active AI/headless roadmap; efficacy and product economics require private validation.
    founder_claim_ids:
      - FC-003
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-011
      - EC-012
    risk_ids:
      - R-003
      - R-005
      - R-007
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public pages support CNAPP, detection/response, posture/permissions, vulnerability management, AI workload
          security, data security and monitoring; pricing is enterprise quote-based.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Product matrix spans prevention, detection, response, posture, vulnerability and monitoring.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-003
              - R-005
          - finding_id: II.A-F2
            finding: Quote-based licensing makes price benchmarking difficult.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-001
              - R-004
          - finding_id: II.A-F3
            finding: Falco/open-source runtime telemetry is a differentiator but creates governance diligence needs.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-007
        hidden_risks:
          - Broad scope can mask integration complexity and feature-depth gaps.
        evidence_gaps:
          - No independent benchmarks, usage telemetry, roadmap delivery scorecard or SKU-level profitability was public.
        follow_up_questions:
          - Provide product usage metrics, reliability/SLA data, roadmap status, security review, gross margin and
            competitive benchmarks.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-011
          - EC-012
  - chapter_id: III
    title: Customer Information
    chapter_summary: Named customers and partners validate enterprise presence, but top-customer schedules, concentration,
      churn, severed relationships and supplier spend are not public.
    founder_claim_ids:
      - FC-005
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-010
      - EC-021
    risk_ids:
      - R-004
      - R-006
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public case studies identify customers and use cases but not top-15 customers by revenue or purchase timing.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Public references include Minna Bank, UIDAI, Rush Street, Worldpay, Neo4j and older references such as Yahoo
              Japan, IBM and JW Player.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-004
        hidden_risks:
          - Public logos can overstate current paid usage if old, limited or non-renewed.
        evidence_gaps:
          - No top-15 customer list, application-by-customer revenue, purchase dates or product-ownership schedule was
            public.
        follow_up_questions:
          - Provide top-25 customers by ARR with products used, start date, renewal date, ACV, NRR and support status.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-021
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public materials show cloud, technology, GSI and marketplace relationships, but revenue contribution and
          contractual obligations are not public.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Sysdig identifies AWS, IBM Cloud, Google Cloud, Microsoft Azure, Oracle Cloud, technology partners and GSIs.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-004
              - R-006
        hidden_risks:
          - Partner pages may reflect marketing relationships rather than productive revenue channels.
        evidence_gaps:
          - Revenue contribution, co-sell commitments, MDF, partner-sourced pipeline and termination rights are not
            public.
        follow_up_questions:
          - Provide partner agreements, channel-sourced ARR, marketplace bookings and partner pipeline.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-020
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue concentration is not publicly verifiable; public customers are qualitative only.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Named customer evidence does not disclose revenue weight or any customer over 5% of revenue.
            evidence_claim_ids:
              - EC-006
              - EC-021
            risk_ids:
              - R-004
        hidden_risks:
          - Enterprise cybersecurity businesses can have large strategic accounts; concentration risk cannot be assessed
            from logos.
        evidence_gaps:
          - No revenue-by-customer, ACV, renewal, churn, NRR, backlog or AR schedule was public.
        follow_up_questions:
          - Provide revenue by customer, contracts, renewal/churn data and all accounts over 5% of revenue.
        table_ids: []
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-006
          - EC-021
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public evidence of severed major customer, partner or supplier relationships was found; absence is not proof
          none occurred.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Reviewed customer and partner pages do not provide severed-relationships history.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-021
            risk_ids:
              - R-004
        hidden_risks:
          - Material churn or partner termination could be hidden.
        evidence_gaps:
          - No churn log, termination notices, customer-health scorecards or partner offboarding records were public.
        follow_up_questions:
          - Provide lost/de-scoped top customers, partner terminations, lost ARR and remediation plans for the last 24
            months.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-021
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: The subprocessor list identifies important cloud, AI, analytics, support and CRM vendors, but not spend
          concentration.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Subprocessors include AWS, GCP, Azure, IBM, Oracle, Anthropic/AWS Bedrock, Azure OpenAI, OpenAI, Salesforce,
              Snowflake and Slack.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-006
        hidden_risks:
          - A SaaS platform could have high cloud-provider concentration, data-residency or AI-model dependency risk.
        evidence_gaps:
          - No supplier spend, SLA, incident history, DPA terms, dependency map or vendor-risk ratings were public.
        follow_up_questions:
          - Provide vendor spend, DPAs, SLAs, data-flow maps, incident history, resilience plans and exit strategy.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-010
          - EC-019
  - chapter_id: IV
    title: Competition
    chapter_summary: Sysdig’s runtime/open-source positioning is differentiated, but CNAPP/cloud security includes broad
      incumbents and specialists with overlapping public claims.
    founder_claim_ids:
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-004
      - EC-016
      - EC-017
    risk_ids:
      - R-003
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Palo Alto Prisma Cloud, Aqua Security and CrowdStrike publicly market overlapping CNAPP capabilities, creating
          pricing and platform-depth pressure.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Competitor pages show overlap in CNAPP, posture, workload/runtime, vulnerability and cloud detection.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-003
          - finding_id: IV.A-F2
            finding: Sysdig’s public differentiation rests on runtime insights, open source/Falco and AI/headless workflow claims.
            evidence_claim_ids:
              - EC-004
              - EC-011
              - EC-012
            risk_ids:
              - R-003
              - R-005
        hidden_risks:
          - Incumbents can bundle cloud security with endpoint, network, SIEM or broader platforms.
        evidence_gaps:
          - No market share, win/loss, displacement, pricing or independent benchmark data was public.
        follow_up_questions:
          - Provide win/loss reports, analyst research, pricing, deal discounts, benchmarks and references where Sysdig
            displaced competitors.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-004
          - EC-011
          - EC-012
          - EC-016
          - EC-017
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Public GTM is active across direct demo/quote, customer stories, analyst badges, partners, integrations
      and AI launches; sales productivity is not public.
    founder_claim_ids:
      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-005
      - EC-007
      - EC-017
      - EC-020
      - EC-021
    risk_ids:
      - R-003
      - R-004
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: Sysdig positions around real-time/runtime cloud security, uses demo/quote CTAs and supports partner/channel
          motions.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: GTM assets include demo/quote CTAs, customer stories, review/analyst badges, partner pages and AI/headless
              launch content.
            evidence_claim_ids:
              - EC-017
              - EC-020
            risk_ids:
              - R-003
          - finding_id: V.A-F2
            finding: Partner and marketplace messages suggest indirect distribution, but productivity is not public.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-004
        hidden_risks:
          - Marketing claims may outpace adoption in new AI/headless categories.
        evidence_gaps:
          - No marketing budget, CAC, conversion, channel mix, regional pipeline or campaign ROI was public.
        follow_up_questions:
          - Provide GTM plan, pipeline by source, CAC/payback, campaign ROI, marketplace bookings and partner-sourced
            ARR.
        table_ids:
          - T-011
          - T-012
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-017
          - EC-020
      - section_id: V.B
        title: Major Customers
        checklist_question_ids:
          - V.B.1
