    mapped_section_ids:
      - VII.C
      - VI.A
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-003
      - EC-011
    contradiction_summary: null
    diligence_follow_up:
      - Verify founder equity, employment terms, invention assignment and open-source governance.
  - founder_claim_id: FC-003
    claim_text: Sysdig provides a broad cloud-native application protection and runtime-security platform.
    claim_source: Sysdig product/pricing pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - IV
      - VI
    mapped_section_ids:
      - II.A
      - IV.A
      - VI.B
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-016
    contradiction_summary: null
    diligence_follow_up:
      - Run product demos, architecture/security review, win/loss interviews and customer references.
  - founder_claim_id: FC-004
    claim_text: Falco and open-source runtime telemetry are strategic to Sysdig’s differentiation.
    claim_source: Sysdig pages and Falco public sources
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
      - VIII
    mapped_section_ids:
      - II.A
      - VI.A
      - VIII.D
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-011
      - EC-004
    contradiction_summary: Public evidence verifies Falco origin/activity, not proprietary conversion or all IP obligations.
    diligence_follow_up:
      - Review open-source license compliance, CLAs, IP assignments and commercial boundaries.
  - founder_claim_id: FC-005
    claim_text: Sysdig serves major enterprise customers and partners across financial services, banking, technology and
      cloud ecosystems.
    claim_source: Sysdig customer/partner pages and archived release
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.B
      - V.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-021
