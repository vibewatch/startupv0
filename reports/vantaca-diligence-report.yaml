executive_summary:
  overall_assessment: Vantaca appears to be an active private unicorn based on CB Insights and a substantial current public operating footprint. Public sources support product presence, named leadership, AI/payments/security positioning and scale signals, but core investment diligence remains unresolved because financials, cap table, customer concentration, retention, security reports, payment compliance evidence, legal schedules and employee data are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A viable thesis depends on proving durable ARR growth, retention, module attach rates, payment/AI economics, customer concentration quality, secure controls and favorable PE/cap-table terms beyond the public $1.25B unicorn screen.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Vantaca as an active $1.25B private unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Vantaca publicly markets an HOA/community association management software platform.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-005
      summary: Vantaca publishes a named executive roster including CEO, founder, CTO, CPO, CFO, CRO and other leaders.
      evidence_claim_ids:
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation support are not public.
    - risk_id: R-004
      summary: Customer concentration, retention and revenue quality are unknown.
    - risk_id: R-005
      summary: Security, privacy and payments exposure needs primary controls evidence.
    - risk_id: R-007
      summary: Competition from scaled vertical software vendors may pressure CAC, pricing and churn.
    - risk_id: R-002
      summary: PE financing/cap-table and leverage terms are unknown.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, gross margin, cash/debt, burn and forecast model.
    - Cap table, option ledger, preferences, debt, warrants, side letters and waterfall.
    - Top-customer ARR, NRR/GRR, churn, contracts, module attach and independent references.
    - SOC 2 Type II report, PCI/NACHA evidence, DPA, subprocessor list, incident history and cyber insurance.
    - AI governance, product telemetry, roadmap, model evaluation and R&D budget.
    - Legal, IP, regulatory, insurance, material contract and HRIS schedules.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on the public unicorn valuation.
    - Request customer cohorts, top-account contracts, module attach, implementation and reference-call evidence.
    - Have security/privacy/payment specialists review SOC, PCI/NACHA, processor, DPA and AI governance artifacts.
    - Benchmark Vantaca against CINC, Caliber/FRONTSTEPS and Enumerate using win/loss, pricing and churn data.
    - Have counsel review cap table, legal/regulatory/IP/insurance and material contract schedules.
