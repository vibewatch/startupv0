report_metadata:
  report_title: Vantaca Startup Diligence Report
  target_company: Vantaca
  website: https://www.vantaca.com/
  known_aliases:
    - Vantaca
    - Vantaca, LLC
    - Vantaca Pay
    - Vantaca Home
    - Vantaca Vendor
    - HOAi
    - HOAi Fleet
  sector: Enterprise technology / community association management software / HOA SaaS
  geography: United States / Wilmington, North Carolina; customers across the United States
  company_stage: Private unicorn / private-equity-backed vertical SaaS company
  research_date: 2026-06-08
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and confirmed the slug vantaca was uncovered.
    - Selected Vantaca from the current CB Insights unicorn list and cross-checked the CB Insights profile for Alive status.
    - Researched company-owned product, careers, security, privacy and leadership pages plus competitor public pages and CB Insights profile text.
    - Treated company-published claims as evidence of public statements, not independently audited performance.
    - No private data room, management interview, customer calls, legal docket export, SOC report, PCI evidence or HRIS was available.
  included_jurisdictions:
    - United States
    - North Carolina
    - United States privacy/payment/security contexts referenced by public sources
  excluded_topics:
    - Private financial statements, cap table, debt, customer contracts, SOC/PCI reports, legal docket searches, insurance policies, HRIS and board materials were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-08
      notes: No pitch deck, financial model, data room or founder responses were provided.
