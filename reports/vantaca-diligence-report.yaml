diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, ARR, gross margin, cash, debt, burn and KPI pack.
    why_it_matters: Cannot underwrite $1.25B valuation without financial quality.
    suggested_source_or_request: Finance data room and audit/KPI pack.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, preferences, option pool, warrants, debt and side letters.
    why_it_matters: Headline valuation may not equal economic value.
    suggested_source_or_request: Charter, financing docs, option ledger and waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product/module ARR, adoption, uptime, incidents and roadmap.
    why_it_matters: Public product pages do not prove monetization or reliability.
    suggested_source_or_request: Product analytics, incident history and roadmap packet.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
