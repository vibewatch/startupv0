executive_summary:
  overall_assessment: SSENSE is an active private company on the fetched unicorn list, but public evidence materially weakens the investment screen because 2025 CCAA/bankruptcy-protection reports indicate debt, vendor-payment and liquidity stress. Any diligence thesis must be built around restructuring outcome, liquidity, inventory economics and vendor/customer trust rather than the stale unicorn valuation alone.
  investment_or_diligence_thesis: Proceed only as a distressed/restructuring diligence case. The upside depends on proving post-CCAA liquidity, vendor support, sustainable gross margin after tariffs/duties, resilient customer cohorts and a defensible curation/data platform.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists SSENSE as a USD 4.15B unicorn and public sources describe a Sequoia-backed 2021 valuation.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-002
      summary: Public sources verify an active luxury fashion e-commerce business model and brand assortment.
      evidence_claim_ids:
        - EC-002
        - EC-004
    - founder_claim_id: FC-005
      summary: Independent sources verify material restructuring and vendor risks.
      evidence_claim_ids:
        - EC-005
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: CCAA / bankruptcy-protection restructuring makes valuation stale
    - risk_id: R-002
      summary: Vendor trust and working-capital stress
    - risk_id: R-003
      summary: Luxury e-commerce demand and tariff pressure
  key_evidence_gaps:
    - Court monitor reports, CCAA plan, debt maturity and liquidity forecast.
    - Audited financials, inventory, markdowns, returns, vendor aging and cash burn.
    - Customer cohorts, CAC/payback, contribution margin and geographic revenue mix.
    - Vendor contracts, critical supplier exposure and claims process timeline.
    - Cybersecurity incident records, privacy notifications and cyber insurance.
  recommended_next_steps:
    - Treat SSENSE as a distressed diligence target and request restructuring/court documents first.
    - Validate vendor support, inventory availability and post-filing trade terms.
    - Rebuild financial model around tariffs, duties, returns, markdowns and liquidity.
    - Run cybersecurity/privacy and vendor-contract legal diligence.
