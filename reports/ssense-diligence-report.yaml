    risk_title: CCAA / bankruptcy-protection restructuring makes valuation stale
    risk_category: financial
    severity: critical
    likelihood: high
    description: Public sources report SSENSE filed for creditor/bankruptcy protection in 2025 with major debt, so the 2021/CB Insights valuation requires re-underwriting.
    impacted_chapter_ids:
