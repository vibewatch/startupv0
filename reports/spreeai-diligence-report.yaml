executive_summary:
  overall_assessment: SpreeAI appears to be an active private unicorn based on CB Insights and current public company materials. Public evidence supports the company category, product existence and selected adoption or market signals, but investment-grade diligence cannot rely on public evidence alone because financial quality, customer economics, legal exposure, security posture, cap table and current operating metrics remain private.
  investment_or_diligence_thesis: Proceed only if private diligence proves that SpreeAI can convert public AI-shopping interest into durable retailer contracts, measurable conversion/return-rate ROI, defensible model performance, compliant image-data handling and financing terms that support the $1.50B valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists SpreeAI at $1.50B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: SpreeAI publicly describes virtual try-on, fit/size prediction and outfit intelligence.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Public pages show partner/pilot motion, but customer names and revenue metrics are undisclosed.
      evidence_claim_ids:
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Headline valuation without private financial support
    - risk_id: R-002
      summary: Customer and partner economics are almost entirely undisclosed
    - risk_id: R-005
      summary: Image/body-data privacy and IP exposure need counsel review
  key_evidence_gaps:
    - Audited financial statements, KPI pack, cash/debt, runway and valuation bridge.
    - Cap table, liquidation preferences, option pool, debt instruments and financing documents.
    - Top customer or GMV/revenue concentration, retention cohorts, churn and reference calls.
    - Product security, privacy, reliability, incident, roadmap and technical-debt artifacts.
    - Legal docket, regulatory, IP, insurance, HR and material-contract records.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline valuation.
    - Request customer, partner and supplier contracts with cohort/retention schedules.
    - Have counsel and security/privacy specialists review legal, regulatory, IP and data-protection posture.
    - Benchmark competitive differentiation with win/loss, pricing and customer-reference evidence.
