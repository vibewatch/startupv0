        quote: Product Experience; Who We Are; Partners; Terms and Conditions; Privacy Policy.
        location: Company footer
    analyst_interpretation: Public packaging or transaction model evidence supports a commercial path, but realized ARR/GMV, take rate, discounts, CAC and payback are not public.
    limitations: Requires private revenue model, bookings, pricing waterfall and sales productivity data.
