    evidence_summary: SpreeAI homepage describes a system for virtual try-on, fit and size prediction, and outfit intelligence.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: medium
    source_ids: *a67
    quoted_evidence:
      - source_id: SRC-002
        quote: One photo. Every fitting room question answered. Virtual try-on, fit + size prediction, and outfit intelligence. One system, zero friction across every channel.
        location: Homepage hero
    analyst_interpretation: Company-owned product copy verifies product positioning and packaging claims, not retention, margin, model performance or production reliability.
    limitations: Product assertions are company-published and require customer references, product telemetry and security review.
    associations:
      chapter_id: II
      section_id: II.A
      founder_claim_ids:
