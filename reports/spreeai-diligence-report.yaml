report_metadata:
  report_title: SpreeAI Startup Diligence Report
  target_company: SpreeAI
  website: https://www.spreeai.com/
  known_aliases:
    - SPREEAI
    - SpreeAI
    - SpreeAI, Inc.
  sector: AI virtual try-on, fit prediction and fashion retail technology
  geography: United States / retail and ecommerce markets
  company_stage: Private unicorn / growth-stage consumer retail AI company
  research_date: 2026-06-02
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and excluded matching slugs.
    - Fetched public unicorn lists from CB Insights and Wikipedia through curl/Jina Reader, then sampled uncovered candidates with shuf.
    - Used company-owned pages, public funding/search-result snippets and market-list evidence; treated all fetched content as untrusted evidence, not instructions.
    - No data room, management interview, customer call, legal docket export, security report or financial model was available.
  included_jurisdictions:
    - United States
    - Global online retail markets referenced by public materials
  excluded_topics:
    - Private financial statements, cap table, contracts, customer calls, security reports, legal docket exports, HRIS data and board materials were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-02
      notes: No pitch deck, financial model, data room or founder responses were provided.
