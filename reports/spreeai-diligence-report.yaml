evidence_claims:
  - evidence_claim_id: EC-001
    claim: SpreeAI appears on the current CB Insights unicorn list at a latest known valuation of $1.50B.
    evidence_summary: CB Insights lists SpreeAI with valuation $1.50B, date joined 5/6/2025, country United States, city Incline Village, industry Consumer & Retail.
    evidence_type: market_database
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-001
    quoted_evidence:
      - source_id: SRC-001
        quote: "SpreeAI\t$1.50B\t5/6/2025\tUnited States\tIncline Village\tConsumer & Retail\t"
        location: null
    analyst_interpretation: This supports unicorn screening status but not current ownership, share price, liquidation preferences or operating performance.
    limitations: CB Insights is a reputable public market database, but private-company valuations can be stale and should be reconciled to primary financing documents.
    associations:
      chapter_id: I
      section_id: I.C
