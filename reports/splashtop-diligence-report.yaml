executive_summary:
  overall_assessment: Splashtop is eligible for a public-source diligence report as an active private unicorn with public evidence of a January 2021 $50M/$50M+ round at about/above a $1B valuation, long-lived founder-led operations, visible products, security/compliance claims and customer-logo traction. The diligence posture is positive product/traction evidence but high opacity around current financials, cap table, customer concentration, security control details and legal/IP schedules.
  investment_or_diligence_thesis: The thesis depends on whether Splashtop can sustain remote access/support and endpoint-security demand with durable recurring revenue, defensible security/performance, efficient GTM and manageable infrastructure/security/legal risk at a valuation still anchored to public 2021 financing evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support Splashtop as an active private unicorn candidate.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-013
        - EC-024
    - founder_claim_id: FC-002
      summary: Public sources verify a broad remote access/support, enterprise, endpoint-management and Foxpass product suite.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-016
        - EC-017
    - founder_claim_id: FC-003
      summary: Public sources show customer/logo and aggregate traction signals.
      evidence_claim_ids:
        - EC-006
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Audited/current financials and unit economics are opaque.
    - risk_id: R-002
      summary: Customer concentration and retention are not public.
    - risk_id: R-007
      summary: Cap table, preference stack, options and debt are not public.
    - risk_id: R-004
      summary: Remote-access security/privacy exposure requires NDA evidence.
    - risk_id: R-003
      summary: Competitive/pricing pressure is high.
  key_evidence_gaps:
    - Current audited/management financials, ARR, margins, cash, debt and runway
    - Current cap table, preferences, option pool, warrants, debt and investor rights
    - Customer revenue concentration, contracts, churn, NRR/GRR, usage and references
    - SOC 2 report, pen tests, vulnerability/incident history, DPAs and subprocessors
    - Official litigation/regulatory/IP/insurance/material-contract schedules
    - Headcount, compensation, turnover, sales productivity and succession data
  recommended_next_steps:
    - Open finance and cap-table data rooms before relying on the 2021 valuation.
    - Reconcile public logos and usage metrics to contracted ARR, retention and customer references.
    - Run security/privacy technical diligence under NDA.
    - Have counsel run comprehensive litigation, regulatory, IP, insurance and material-contract diligence.
    - Review product roadmap, AEM/Foxpass integration, SKU economics and cloud/vendor dependency.
