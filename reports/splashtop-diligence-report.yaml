report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: Splashtop"
  target_company: Splashtop
  website: https://www.splashtop.com/
  known_aliases:
    - Splashtop Inc.
    - DeviceVM Inc.
    - Splashtop OS
    - Foxpass
  sector: Remote access, remote support and endpoint management software
  geography: United States headquartered; global customers and users
  company_stage: Private unicorn / growth-stage software company
  research_date: 2026-06-18
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only; primary company sources, independent news, public lists, app-store listing, legal/regulatory endpoints and public legal/security policies.
    - Facts not available publicly are marked not_publicly_verifiable or inconclusive and converted into diligence gaps/follow-up requests.
  included_jurisdictions:
    - United States
    - California
    - European Union / GDPR-relevant operations
    - Global customer deployments where public
  excluded_topics:
    - Non-public data room materials
    - Paid database exports
    - Customer/supplier calls
    - Counsel-grade docket/IP searches beyond public sources
    - Private personal contact data
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided candidate row from public unicorn selection workflow
      type: prompt_context
      date_received: 2026-06-18
      notes: company=Splashtop; slug=splashtop; latest valuation=1+ US$B; valuation date=January 2021; industry=Software; country=United States.
