risk_register:
  - risk_id: R-001
    risk_title: Opaque financial statements and unit economics
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources do not disclose audited financials, current ARR, margins, burn, cash, backlog or AR aging.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Request audited/management financials, KPI definitions, revenue waterfall, cash runway, debt, backlog and AR aging.
  - risk_id: R-002
    risk_title: Unknown customer concentration and retention
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Logos and aggregate user claims do not reveal revenue concentration, active contract status, churn or expansion quality.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request top-customer revenue, cohorts, NRR/GRR, contracts, renewal pipeline and references.
  - risk_id: R-003
    risk_title: Competitive pricing and substitution pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Splashtop positions on price/value against TeamViewer/LogMeIn/AnyDesk and competes with VPN/RDP/VDI substitutes.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Review win/loss, discounting, churn reasons, sales productivity and competitor quotes.
  - risk_id: R-004
    risk_title: Security, privacy and compliance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Remote access products handle privileged access and telemetry; public compliance claims require NDA evidence testing.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Review SOC 2, ISO scope, pen tests, incidents, DPAs, subprocessors and security roadmap.
  - risk_id: R-005
    risk_title: Product expansion and integration execution risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: AEM, Foxpass, Secure Workspace, endpoint security and legacy lines broaden platform scope without public adoption/economics.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Request SKU adoption, roadmap, integration plans, support tickets, defect backlog and product margin.
  - risk_id: R-006
    risk_title: Cloud and third-party dependency concentration
    risk_category: operational
    severity: medium
    likelihood: medium
    description: AWS and integrations/providers are important to delivery; spend, commitments, redundancy and incidents are not public.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.F
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Request vendor contracts, subprocessor list, architecture/resilience evidence, SLAs and cost sensitivity.
  - risk_id: R-007
    risk_title: Cap table, preference stack and debt opacity
    risk_category: financing
    severity: high
    likelihood: unknown
    description: A long financing history and unicorn round are public, but ownership, preference stack, options, warrants, debt and rights are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Request charter, cap table, stock ledger, option ledger, debt schedule, side letters and board minutes.
  - risk_id: R-008
    risk_title: Incomplete public legal/IP clearance
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: CourtListener and SEC checks found no obvious issues, but official litigation, regulatory, IP and contract schedules are private.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Counsel should run PACER/state/regulatory/IP searches and review litigation, IP, insurance and contracts.
  - risk_id: R-009
    risk_title: Founder-led succession and key-person risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: The four co-founders publicly hold key roles after nearly two decades; succession and bench strength are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.C
      - VII.D
      - VII.E
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Request org chart, executive agreements, succession plan, retention/equity data and attrition.
  - risk_id: R-010
    risk_title: Stale public growth metrics
    risk_category: financial
    severity: medium
    likelihood: high
    description: The strongest operating metrics are from 2020/2021 and may not describe current post-pandemic demand or margins.
    impacted_chapter_ids:
      - I
      - IV
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - IV.A
      - V.B
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Obtain quarterly KPI trend through current month, cohort retention, bookings, pipeline and segment growth.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited/current financials, ARR/bookings, revenue recognition, gross margin by SKU, cash, debt, backlog and AR aging.
    why_it_matters: Valuation cannot be assessed from stale public claims.
    suggested_source_or_request: Finance data room with monthly trial balances, KPI definitions, auditor reports and board packages.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option ledger, debt, warrants, preferences, investor rights and side letters.
    why_it_matters: Multiple rounds over 20 years may create preference/dilution complexity.
    suggested_source_or_request: Legal/cap-table data room and counsel memo.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, contracts, NRR/GRR, churn, cohort usage and references.
    why_it_matters: Public logos do not prove revenue scale or concentration.
    suggested_source_or_request: CRM/billing exports, contract list, renewal pipeline and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: SKU-level revenue, gross margin, roadmap, uptime, support tickets and incidents.
    why_it_matters: Product breadth may hide uneven adoption or support burden.
    suggested_source_or_request: Product analytics, roadmap, incident register, engineering metrics and architecture review.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC 2 report, ISO scope, pen tests, vulnerabilities, incident reports, DPAs/subprocessors and regulator correspondence.
    why_it_matters: Security/privacy are core buying criteria and risk areas.
    suggested_source_or_request: Security/compliance data room under NDA and CISO interview.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, compensation, options, attrition, employee relations and succession plan.
    why_it_matters: Founder continuity creates key-person and scaling risk.
    suggested_source_or_request: HRIS exports, comp plans, org chart, engagement and attrition reports.
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official patent/trademark/copyright/open-source/license schedules and IP assignments.
    why_it_matters: Public IP evidence is incomplete.
    suggested_source_or_request: Counsel IP schedule, USPTO/WIPO validation, OSS scan/SBOM and invention assignment files.
    priority: medium
  - gap_id: G-008
    chapter_id: III
    section_id: III.E
    missing_information: Vendor contracts, AWS spend/architecture, SLAs, subprocessor list and payment/security partner terms.
    why_it_matters: Cloud/vendor dependency can affect availability, margin and compliance.
    suggested_source_or_request: Vendor contract data room, architecture diagrams and cost reports.
    priority: medium
  - gap_id: G-009
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quotas, ramp, CAC, payback, pipeline conversion and channel mix.
    why_it_matters: Public GTM evidence does not show scalable efficiency.
    suggested_source_or_request: CRM/pipeline exports, sales comp plans and marketing attribution reports.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation, threatened claims, settlements, regulatory matters and insurance claims.
    why_it_matters: Public legal searches are not comprehensive legal clearance.
    suggested_source_or_request: Counsel litigation schedule and external docket searches.
    priority: high
