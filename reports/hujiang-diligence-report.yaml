executive_summary:
  overall_assessment: HuJiang has public evidence for a current website and a 2026-accessible Tracxn profile showing Series E, $303M raised and $1B valuation, but the diligence posture is high-risk because core financing, employee, revenue and IPO evidence is old, public articles show a postponed IPO and layoffs, and some low-quality startup-failure sources conflict with the active-status narrative.
  investment_or_diligence_thesis: The diligence case is not a conventional growth-unicorn screen; it is a status-verification and turnaround-risk screen that must reconcile current operations, regulatory exposure and historic IPO-loss disclosures before any valuation can be relied on.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: HuJiang is an eligible still-private unicorn target for this report.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: HuJiang has a publicly evidenced product/platform narrative.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: HuJiang has public customer, user or demand signals.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Eligibility and active-status contradiction
    - risk_id: R-002
      summary: China education regulatory exposure
    - risk_id: R-003
      summary: Historic losses and failed IPO
    - risk_id: R-004
      summary: Stale valuation risk
    - risk_id: R-005
      summary: Customer/user monetization opacity
  key_evidence_gaps:
    - Audited/management financials, KPI definitions and cash runway
    - Current cap table, preferences, debt, investor rights and valuation marks
    - Customer concentration, usage, retention/churn and contract economics
    - Supplier/infrastructure dependencies, commitments and gross-margin bridge
    - Legal, regulatory, IP, privacy/security and insurance schedules
  recommended_next_steps:
    - Confirm eligibility status with company counsel and corporate records before relying on unicorn-list inclusion.
    - Open finance and cap-table data rooms before relying on public valuation.
    - Reconcile public customer/user/adoption claims to revenue, usage, margin and retention data.
    - Review product roadmap, quality/security controls and key technical or regulatory risks.
    - Run customer/reference, supplier and win/loss diligence in the most material market segments.
