executive_summary:
  overall_assessment: Xreal is a plausible private AR-glasses unicorn with strong public evidence for its current hardware product lineup and important Google/Qualcomm and ASUS ROG partnerships. Financing evidence is sufficient for eligibility but less complete than ideal, and the business-risk profile is elevated because hardware gross margin, inventory, sell-through, warranty, supplier concentration, and partner-roadmap economics are not public.
  investment_or_diligence_thesis: Determine whether Xreal can translate partner-backed Android XR and gaming-display roadmaps into profitable, repeatable consumer hardware demand before larger platform competitors absorb the category or dictate economics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Xreal is a private AR-glasses unicorn valued at approximately $1B.
      evidence_claim_ids:
        - EC-001
        - EC-002
  biggest_risks:
    - risk_id: R-001
      summary: AR glasses require optics, display, chipset, manufacturing yield, certification, inventory, return, and warranty execution that can materially affect gross margin and cash needs.
    - risk_id: R-002
      summary: Consumer AR glasses remain an emerging category with uncertain mainstream demand and strong competition from platform companies and hardware makers.
    - risk_id: R-003
      summary: Project Aura and ROG XREAL R1 rely on Google/Android XR, Qualcomm, and ASUS/ROG relationships whose economics and commitments are not public.
    - risk_id: R-004
      summary: CB Insights lists a $1B valuation and Bloomberg title evidence references a $60M raise, but terms, current cap table, debt, and burn are not public.
  key_evidence_gaps:
    - Current audited financials, ARR/revenue/GMV bridge, gross margin, EBITDA, cash runway, debt, and working-capital schedules.
    - Customer, seller, partner, supplier, and channel concentration with contract terms, churn/retention, cohort economics, and references.
    - Fully diluted cap table, investor rights, material contracts, insurance, litigation, regulatory, IP, security, and HR schedules.
  recommended_next_steps:
    - Request finance, cap-table, customer, supplier, HR, product, security, legal, insurance, and contract data-room packs.
    - Reconcile public scale metrics to current billable revenue, usage, retention, gross margin, and cash conversion.
    - Run management, customer, supplier, counsel, auditor, and key investor calls around the risk register.
