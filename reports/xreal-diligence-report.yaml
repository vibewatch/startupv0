risk_register:
  - risk_id: R-001
    risk_title: Hardware margin and supply-chain execution risk
    risk_category: operational
    severity: high
    likelihood: high
    description: AR glasses require optics, display, chipset, manufacturing yield, certification, inventory, return, and warranty execution that can materially affect gross margin and cash needs.
    impacted_chapter_ids:
      - I
      - II
      - III
    impacted_section_ids:
      - I.A
      - II.A
      - III.E
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-006
      - EC-012
    mitigation_or_diligence_request: Request BOM, supplier contracts, yields, inventory aging, warranty reserves, and gross margin by SKU.
  - risk_id: R-002
    risk_title: AR adoption and demand uncertainty
    risk_category: market
    severity: high
    likelihood: medium
    description: Consumer AR glasses remain an emerging category with uncertain mainstream demand and strong competition from platform companies and hardware makers.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-007
      - EC-008
    mitigation_or_diligence_request: Review sell-through, returns, cohort usage, channel inventory, and win/loss evidence.
  - risk_id: R-003
    risk_title: Strategic-platform dependency
    risk_category: product
    severity: high
    likelihood: medium
    description: Project Aura and ROG XREAL R1 rely on Google/Android XR, Qualcomm, and ASUS/ROG relationships whose economics and commitments are not public.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.B
      - VI.B
      - VIII.F
    evidence_claim_ids:
      - EC-006
      - EC-009
      - EC-011
    mitigation_or_diligence_request: Request partner agreements, exclusivity, roadmap commitments, launch milestones, and termination rights.
  - risk_id: R-004
    risk_title: Unverified financing details
    risk_category: financing
    severity: medium
    likelihood: medium
    description: CB Insights lists a $1B valuation and Bloomberg title evidence references a $60M raise, but terms, current cap table, debt, and burn are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.A
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-012
    mitigation_or_diligence_request: Request financing documents, cap table, cash/debt, runway, and investor marks.
  - risk_id: R-005
    risk_title: Legal/IP and product-safety exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Wearable displays can raise optics, eye-safety, export/control, privacy, IP, certification, and consumer-warranty issues.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.D
