      - II.A
    evidence_claim_ids:
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Request IP portfolio, certifications, product-safety testing, warranty data, privacy assessments, and litigation schedule.
  - risk_id: R-006
    risk_title: Roadmap timing and product-delivery risk
    risk_category: technical
    severity: medium
    likelihood: high
    description: Public partner announcements reference 2026 launches, making execution, developer ecosystem, certification, and channel readiness central diligence questions.
    impacted_chapter_ids:
      - VI
      - V
    impacted_section_ids:
      - VI.B
      - V.A
    evidence_claim_ids:
