    mitigation_or_diligence_request: Request roadmap, milestone burn-down, product qualification data, developer commitments, and launch plans.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Revenue, SKU gross margin, BOM, inventory, returns, warranty reserves, cash runway, and debt.
    why_it_matters: Hardware companies can consume cash through inventory and warranty even when demand appears strong.
    suggested_source_or_request: Finance and operations data room.
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.E
    missing_information: Supplier contracts, component concentration, manufacturing yield, quality metrics, and channel inventory.
    why_it_matters: Supply-chain risk can determine gross margin and launch reliability.
    suggested_source_or_request: Operations pack and supplier confirmations.
    priority: high
  - gap_id: G-003
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Executed Google/Qualcomm/ASUS agreements, IP licenses, safety certifications, insurance, and litigation schedule.
    why_it_matters: Partner and hardware legal terms can control roadmap economics and liability.
    suggested_source_or_request: Counsel and partner-contract schedules.
    priority: high
