executive_summary:
  overall_assessment: GoodLeap is a scaled private sustainable-home finance and software platform with substantial public evidence of active products, large self-reported reach, leadership depth, and institutional capital-markets access. It is not investment-ready on public sources alone because audited financials, unit economics, customer/contractor concentration, litigation/enforcement history, loan and lease performance, and capital-structure terms remain private.
  investment_or_diligence_thesis: Proceed only to second-stage diligence. The public thesis is that GoodLeap combines contractor-embedded POS finance, software/API distribution, AI/VPP features, and securitization access at large scale. The underwriting question is whether that scale converts into durable risk-adjusted profitability after funding-cost, credit, contractor-conduct, policy, compliance, and data-governance risks.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Company sources verify that GoodLeap positions itself as financing and software for sustainable home solutions.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-005
      summary: GoodLeap announced 2025 loan and lease/PPA securitizations and SEC filings show related ABS due-diligence procedures.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-009
    - founder_claim_id: FC-006
      summary: GoodLeap lists senior leaders covering CEO/founder, CFO, CTO, GC/CCO, revenue, risk, capital, and HR roles.
      evidence_claim_ids:
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Public sources do not show audited financial statements, profitability, cash, liquidity, cap table, or unit economics.
    - risk_id: R-002
      summary: GoodLeap's model appears materially tied to ABS, institutional funding, rates, collateral performance, and residual economics.
    - risk_id: R-004
      summary: Contractor/installer point-of-sale distribution creates sales-conduct, workmanship, cancellation, fraud, and complaint exposure.
    - risk_id: R-005
      summary: Consumer finance, mortgage/loan, lease/PPA, payments, privacy, advertising, and fair-lending rules require granular state/product controls.
    - risk_id: R-006
      summary: AI/API/VPP/payment products elevate privacy, security, model-governance, and data-quality risks.
  key_evidence_gaps:
    - Audited financial statements, revenue, margins, cash flow, liquidity, cap table, preferences, and covenants.
    - Loan/lease/PPA tapes, vintages, delinquencies, losses, prepayments, repurchases, exceptions, and residual cash flows.
    - Top contractor/customer/counterparty concentration, active usage, churn, complaints, and channel economics.
    - Contracts for warehouse lines, ABS, installers, integrations, utilities/VPP, servicing, leases/PPAs, and payments.
    - Legal docket, regulator exams/inquiries, state license reconciliation, privacy/security reports, AI governance, and insurance schedule.
  recommended_next_steps:
    - Open a data-room request focused on financial statements, capital structure, loan/lease performance, and funding covenants.
    - Run legal/regulatory searches and request counsel schedules for litigation, enforcement, licensing, complaints, privacy, IP, and insurance.
    - Conduct customer/contractor/funding-counterparty references and audit top-channel concentration and complaint remediation.
    - Review technical diligence for APIs, payments, DeDe, GoodGrid, security controls, data lineage, and model governance.
    - Stress-test economics under higher funding spreads, credit losses, contractor attrition, solar policy changes, and reduced securitization liquidity.
