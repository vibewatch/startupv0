risk_register:
  - risk_id: R-001
    risk_title: Audited financial statements and profitability are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public scale metrics do not show revenue quality, margins, cash burn, liquidity, or valuation.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
    evidence_claim_ids:
      - EC-002
      - EC-015
    mitigation_or_diligence_request: Request audited statements, monthly accounts, product P&Ls, liquidity, and board plan.
  - risk_id: R-002
    risk_title: Capital-markets and securitization dependence
    risk_category: financing
    severity: high
    likelihood: medium
    description: Growth and liquidity rely on institutional capital and ABS execution; spread or collateral shocks could impair economics.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.C
      - III.E
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
    mitigation_or_diligence_request: Review warehouse agreements, ABS waterfalls, ratings reports, covenants, hedge policy, and stress liquidity.
  - risk_id: R-003
    risk_title: Solar policy, rate, and lease/PPA complexity
    risk_category: market
    severity: high
    likelihood: medium
    description: Solar loans, leases, PPAs, batteries, and VPP programs are sensitive to rates, incentives, net metering, tax ownership, and transfers.
