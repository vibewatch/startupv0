      - EC-014
    mitigation_or_diligence_request: Request policy sensitivity, incentive assumptions, contract forms, transfer/default data, and VPP economics.
  - risk_id: R-004
    risk_title: Contractor/installer sales conduct and channel quality
    risk_category: customer
