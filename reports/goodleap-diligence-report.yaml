report_metadata:
  report_title: GoodLeap Startup Diligence Report
  target_company: GoodLeap
  website: https://www.goodleap.com/
  known_aliases:
    - GoodLeap, LLC
    - Loanpal
  sector: Sustainable home improvement fintech, consumer finance, energy software
  geography: United States
  company_stage: Private unicorn
  research_date: 2026-05-18
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized GoodLeap company pages for product, scale, legal, privacy, licensing, leadership, developer, and newsroom claims.
    - Supplemented company claims with SEC ABS filings/AUP exhibits and FTC solar-finance consumer guidance.
    - Used source-linked evidence claims and marked company-controlled claims as requiring data-room reconciliation.
    - Did not modify unrelated reports and did not use non-public materials.
  included_jurisdictions:
    - United States
  excluded_topics:
    - Private financial statements, cap table, investor agreements, loan/lease tapes, warehouse lines, ABS offering documents, customer lists, supplier contracts, litigation dockets, regulator files, security reports, and employee records were not available.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for GoodLeap public-source diligence report
      type: workflow_request
      date_received: 2026-05-18
      notes: No private company materials were provided.
