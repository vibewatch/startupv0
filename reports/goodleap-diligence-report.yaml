diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, cash, liquidity, profitability, and unit economics.
    why_it_matters: Scale metrics cannot support valuation or solvency underwriting without financial quality.
    suggested_source_or_request: Request audited FY2022-FY2025 statements, YTD management accounts, board plan, and product P&Ls.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, financing terms, preferences, debt, warehouse lines, covenants, ABS residuals, hedges, and liquidity.
    why_it_matters: Historical valuation and securitization headlines do not reveal current downside protection or funding risk.
    suggested_source_or_request: Request cap table, stockholder agreements, debt/warehouse agreements, ratings reports, and residual models.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level economics, underwriting criteria, APR/fees, take rates, eligibility by state, complaints, and customer outcomes.
    why_it_matters: Product breadth may hide adverse economics or compliance/product-market-fit issues.
    suggested_source_or_request: Request product P&Ls, approval/funding/cancellation funnels, pricing matrices, and complaint analysis.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Top customers, top contractors, active usage, concentration, churn, delinquency, complaints, and cohorts.
    why_it_matters: Aggregate scale may mask concentration, poor channel quality, or adverse cohorts.
    suggested_source_or_request: Request top-50 partners/customers, cohort performance, active-user definitions, and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC, dealer fees, application funnel, approvals, pull-through, cancellations, and installer monitoring.
    why_it_matters: Contractor-led growth can produce losses, complaints, or regulatory exposure if incentives are misaligned.
    suggested_source_or_request: Request funnel dashboard, dealer economics, monitoring scorecards, scripts, training, and QA exceptions.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture, uptime, security reports, incident history, API controls, payments controls, model governance, and VPP performance.
    why_it_matters: Software differentiation claims and sensitive financial/device data require robust controls.
    suggested_source_or_request: Request SOC 2/penetration tests, architecture diagrams, model inventory, red-team reports, DERMS contracts, and incident logs.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.A
    missing_information: Board composition, governance rights, committees, compensation, succession, attrition, employee relations, and reference checks.
    why_it_matters: Public bios do not prove governance quality or retention of key staff.
    suggested_source_or_request: Request board materials, org charts, equity/compensation schedules, HRIS metrics, and conduct references.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.G
    missing_information: State-by-state licensing, regulator exams, complaints, litigation, enforcement, fair-lending, privacy/security, insurance, and contract schedules.
    why_it_matters: GoodLeap operates in regulated consumer finance and solar/home-improvement markets with material conduct risk.
    suggested_source_or_request: Request counsel memos, license matrix, regulator correspondence, complaint logs, litigation schedule, insurance policies, and testing reports.
    priority: high
