diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited consolidated financial statements for the last three years.
    why_it_matters: Needed to test cash generation, capex, margins, and accounting quality.
    suggested_source_or_request: Request audited financial package and monthly management reporting.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, debt schedule, warrants, and related-party financing.
    why_it_matters: Control, dilution, and leverage cannot be underwritten from public sources alone.
    suggested_source_or_request: Request cap table, debt and warrant schedules, and any related-party loan agreements.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer concentration, top-10 accounts, and Starlink churn / ARPU.
    why_it_matters: Revenue quality and concentration are core diligence questions.
    suggested_source_or_request: Request customer revenue waterfall and cohort metrics.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Supplier concentration and single-source component exposure.
    why_it_matters: Operational bottlenecks and margin risk often sit in the supply base.
    suggested_source_or_request: Request top-supplier schedule with annual spend and contingency plans.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Starship and HLS milestone status, mishap findings, and cost-to-complete.
    why_it_matters: Starship is central to future upside and future capital needs.
    suggested_source_or_request: Request latest program-review deck and milestone tracker.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount by function, site, and clearance level.
    why_it_matters: Workforce scale and mix drive cost structure, safety, and execution capacity.
    suggested_source_or_request: Request current org census and labor-cost rollup.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.G
    missing_information: Two-year turnover, regretted attrition, and safety-by-site trends.
    why_it_matters: Labor strain and retention can impair engineering execution and compliance.
    suggested_source_or_request: Request quarterly people-ops and safety dashboards.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.C
    missing_information: Current reserve, insurance, and remediation treatment for agency actions.
    why_it_matters: Public enforcement does not reveal balance-sheet impact.
    suggested_source_or_request: Request legal reserve memo and insurance schedules.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP, trademark, launch-license, and spectrum-rights inventory.
    why_it_matters: Core rights and restrictions cannot be evaluated from marketing pages alone.
    suggested_source_or_request: Request current IP and license register with owner/entity mapping.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contract abstractions and side-letter obligations.
    why_it_matters: Public award headlines hide rights, liabilities, and termination terms.
    suggested_source_or_request: Request top-contract summary pack with economics and key clauses.
    priority: high

