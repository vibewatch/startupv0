risk_register:
  - risk_id: R-001
    risk_title: Government and mission-program concentration
    risk_category: customer
    severity: high
    likelihood: medium
    description: The clearest publicly visible customer relationships are NASA and U.S.
      national-security programs, creating concentration risk if budgets, schedules,
      or program priorities shift.
    impacted_chapter_ids:
      - I
      - III
      - V
      - VIII
