executive_summary:
  overall_assessment: >-
    SpaceX looks like a category leader with unusual product breadth and unusually
    strong NASA and national-security relevance, but public-source diligence remains
    constrained by opaque private-company financials, active regulatory and labor
    scrutiny, and concentrated program exposure around Starship and government
    customers.
  investment_or_diligence_thesis: >-
    The public record supports a durable operating moat in reusable launch, government
    mission credibility, and direct satellite-broadband distribution. The decisive
    open questions are private rather than public: audited segment economics, fully
    diluted ownership, related-party governance, classified backlog, supplier
    concentration, and Starship execution readiness.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Official SpaceX pages and the public rideshare offer verify a reusable
        Falcon family with a standardized smallsat launch product.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-005
    - founder_claim_id: FC-003
      summary: Starlink Business publicly lists entry pricing, global-priority tiers,
        direct sales, and reseller channels.
      evidence_claim_ids:
        - EC-006
    - founder_claim_id: FC-004
      summary: NASA and Space Force sources confirm major relationships across CRS,
        Commercial Crew, Artemis HLS, Gateway logistics, and national-security launch.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-009
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-002
      summary: Starship remains central to future upside but public sources do not
        prove routine operational readiness or schedule certainty.
    - risk_id: R-005
      summary: The company's financing visibility is far below public-market norms
        despite intense private-market interest.
    - risk_id: R-003
      summary: Launch, environmental, and subsidy regulators already appear in the
        public record as material operating constraints.
  key_evidence_gaps:
    - No public audited consolidated financial statements, debt schedule, or fully
      diluted cap table were located.
    - Public sources do not resolve customer concentration, Starlink churn and ARPU,
      or supplier concentration.
    - Classified Starshield and NRO economics are only partially visible in public awards.
    - Public labor, safety, and litigation pages do not disclose reserves, settlement
      expectations, or insurance coverage.
  recommended_next_steps:
    - Request audited 2023-2025 financial statements and monthly segment KPIs.
    - Request the full cap table, debt and warrant schedules, and any related-party loans.
    - Request Starship test-program status, propellant-transfer milestones, and latest mishap findings.
    - Request top-20 customer and supplier concentration, including classified and
      subsidy-supported revenue.
    - Request litigation, environmental, and compliance logs with reserve and
      insurance-treatment detail.

chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources confirm meaningful financing access, visible
      government contract anchors, and standardized pricing signals, but not audited
      financial quality. The core diligence problem is not whether SpaceX has scale;
      it is whether outsiders can test consolidated earnings, leverage, cash burn,
      and governance economics without a private data room.
    founder_claim_ids:
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-017
      - EC-018
      - EC-019
      - EC-024
    risk_ids:
      - R-001
      - R-005
      - R-006
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public records surface contract awards, pricing anchors, and private-market
          valuations, but not consolidated income statements, balance sheets, cash
          flows, backlog, or receivables.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public evidence is adequate to show demand and financing access,
              but inadequate to assess accounting quality or earnings durability.
            evidence_claim_ids:
              - EC-017
              - EC-018
              - EC-019
              - EC-024
            risk_ids:
              - R-005
        hidden_risks:
          - Opaque segment reporting can hide Starlink subsidy dependence, launch-cycle
            lumpiness, and capex-heavy working-capital swings.
        evidence_gaps:
          - No public audited consolidated statements were located.
          - No AR aging schedule, backlog roll-forward, or product/geography gross-profit split was found.
        follow_up_questions:
          - What are consolidated revenue, EBITDA, free cash flow, and capex by segment?
          - How much of current backlog is government, commercial launch, or Starlink service?
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-017
          - EC-018
          - EC-019
          - EC-024
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public demand signals exist through NASA, Space Force, rideshare,
          and Starlink price cards, but public sources do not provide management
          forecasts or scenario assumptions.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Government awards and published price points imply multiple revenue
              engines, but predictability cannot be tested without internal cohort
              and backlog data.
            evidence_claim_ids:
              - EC-005
              - EC-006
              - EC-007
              - EC-011
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Forecasts may be highly sensitive to Starship delays, spectrum policy,
            and classified-customer budget timing.
        evidence_gaps:
          - No three-year forecast model or sensitivity analysis was publicly available.
        follow_up_questions:
          - What are base, upside, and downside assumptions for Starship, Starlink,
            and government awards?
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-007
          - EC-011
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Secondary-market fundraising coverage shows repeated access to capital,
          but public sources do not reveal a current fully diluted cap table, option pool,
          debt stack, or other potentially dilutive instruments.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C-F1
            finding: Public financing milestones do not make SpaceX's actual ownership
              or leverage transparent enough for investor-grade underwriting.
            evidence_claim_ids:
              - EC-017
              - EC-018
              - EC-019
              - EC-024
            risk_ids:
              - R-005
              - R-006
        hidden_risks:
          - Secondary sales can conceal concentrated control, preferential terms, or
            unusual related-party financing.
        evidence_gaps:
          - No public warrant, option, note, or debt schedule was verified.
        follow_up_questions:
          - What is the current fully diluted ownership table and voting structure?
          - Are there related-party loans, pledges, or cross-company guarantees?
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-017
          - EC-018
          - EC-019
          - EC-024
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Publicly visible financing rounds, government awards, and price cards
          establish that SpaceX can attract capital and monetize multiple products,
          but the tax, accounting, and valuation basis remains largely private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: SpaceX has clear public signals of capital access, but private-company
              opacity prevents a full financing-history and valuation-quality audit.
            evidence_claim_ids:
              - EC-005
              - EC-017
              - EC-018
              - EC-019
              - EC-024
            risk_ids:
              - R-005
              - R-006
        hidden_risks:
          - High private valuations can outrun operating reality when no audited basis
            is public and secondary sales become a de facto price-setting mechanism.
        evidence_gaps:
          - No public tax-position summary or revenue-recognition policy was verified.
        follow_up_questions:
          - What valuation methods and rights applied in the latest primary and
            secondary transactions?
        table_ids:
          - T-001
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-017
          - EC-018
          - EC-019
          - EC-024
  - chapter_id: II
    title: Products
    chapter_summary: SpaceX's public product record is unusually legible for a private
      aerospace company. The launch, crew-cargo, lunar, and broadband stack is
      clearly visible from official pages, while the weakest areas are maturity,
      roadmap certainty, and segment-level economics rather than product existence.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-008
    risk_ids:
      - R-002
      - R-007
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: >-
          Official pages verify an unusually broad product stack: Falcon 9, Falcon
          Heavy, Dragon, Starship, rideshare launch, and Starlink business service
          tiers. Product existence and top-line specs are clear; adoption, unit
          economics, and roadmap certainty are much less so.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: SpaceX's public product surface spans launch, spacecraft, lunar
              logistics, and broadband rather than a single-line aerospace business.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
              - EC-004
              - EC-005
              - EC-006
            risk_ids:
              - R-002
          - finding_id: II.A-F2
            finding: The strongest public price transparency appears in rideshare and
              Starlink business plans rather than in dedicated heavy-lift missions.
            evidence_claim_ids:
              - EC-005
              - EC-006
            risk_ids:
              - R-007
        hidden_risks:
          - The breadth of the product stack can hide cross-subsidization among launch,
            Starlink, and strategic moon/Mars programs.
        evidence_gaps:
          - No public product-level profitability or customer-satisfaction data was verified.
        follow_up_questions:
          - What are gross margins, backlog, and reliability metrics by product line?
          - Which products subsidize Starship and long-horizon exploration programs?
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-005
          - EC-006
          - EC-007
          - EC-008
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public sources make government, NASA, and mission-specific
      customer relationships highly visible, but they do not disclose customer
      concentration, Starlink churn, or the economics of the long commercial tail.
      This chapter therefore has strong logo evidence but weak revenue-quality evidence.
    founder_claim_ids:
      - FC-002
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-009
      - EC-010
      - EC-011
    risk_ids:
      - R-001
      - R-008
      - R-009
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: NASA, U.S. national-security launch customers, and named crew/cargo
          missions are directly visible in public records. What is not visible is the
          full commercial-customer list or relative revenue weight outside of disclosed
          government contracts.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: SpaceX's most visible customers are government and mission-structured
              counterparties, especially NASA and the U.S. national-security community.
            evidence_claim_ids:
              - EC-007
              - EC-008
              - EC-009
              - EC-010
              - EC-011
            risk_ids:
              - R-001
        hidden_risks:
          - Named marquee customers can mask a much narrower paying-customer base than
            public mission publicity suggests.
        evidence_gaps:
          - No top-15 customer schedule or two-year ranking by revenue was publicly available.
        follow_up_questions:
          - Which customers contribute 5 percent or more of revenue or gross margin?
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-009
          - EC-010
          - EC-011
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: NASA partnerships, Gateway logistics, and government launch acquisition
          vehicles are easy to verify; Starlink's reseller and private-networking
          routes are also explicit. Detailed economics, exclusivity, and termination
          rights are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: SpaceX's strategic relationships are strongest where government,
              mission-critical logistics, and broadband distribution overlap.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-008
              - EC-011
            risk_ids:
              - R-001
              - R-009
        hidden_risks:
          - Mission-critical partners may hold pricing power or schedule leverage that
            is not obvious from public celebration of award wins.
        evidence_gaps:
          - No public side letters, take-or-pay terms, or service-level penalties were located.
        follow_up_questions:
          - What termination, delay, or exclusivity provisions exist in the largest contracts?
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-011
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Publicly disclosed contract values can anchor a concentration analysis,
          but complete revenue-by-customer disclosure is not available from public sources.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Publicly disclosed customer economics skew heavily toward government
              awards, suggesting concentration risk even though the full revenue mix is unknown.
            evidence_claim_ids:
              - EC-007
              - EC-009
              - EC-011
            risk_ids:
              - R-001
        hidden_risks:
          - Classified or long-cycle government work may dominate economics more than
            the commercial narrative suggests.
        evidence_gaps:
          - No customer revenue waterfall, cohort retention, or top-10 account list was verified.
        follow_up_questions:
          - How much revenue comes from NASA, DoD, intelligence, commercial launch,
            and Starlink subscribers respectively?
        table_ids: []
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-007
          - EC-009
          - EC-011
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No major publicly confirmed customer, partner, or supplier breaks
          were independently verified in-session.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: The accessible public record was more informative about new awards
              than about terminated relationships.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-011
            risk_ids:
              - R-009
        hidden_risks:
          - Quiet renegotiations or non-renewals are unlikely to be visible without customer diligence.
        evidence_gaps:
          - No public schedule of churned launch, Starlink, or supplier accounts was found.
        follow_up_questions:
          - Which large customers or partners have reduced spend or cancelled programs since 2024?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-011
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public supplier transparency is weak. The clearest operating dependencies
          are launch-range access, regulatory permits, and site infrastructure rather
          than a disclosed vendor list.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: SpaceX's visible dependency set is infrastructure- and regulator-heavy,
              not supplier-transparent.
            evidence_claim_ids:
              - EC-012
              - EC-013
              - EC-016
            risk_ids:
              - R-003
              - R-009
        hidden_risks:
          - An in-house manufacturing narrative can obscure single-source components,
            launch-range bottlenecks, or water and environmental constraints.
        evidence_gaps:
          - No public top-supplier spend schedule or concentration analysis was located.
        follow_up_questions:
          - What share of critical components, propellants, and site services comes
            from single-source vendors?
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-012
          - EC-013
          - EC-016
  - chapter_id: IV
    title: Competition
    chapter_summary: Public competitor pages support the view that SpaceX combines
      broader mission scope and stronger direct distribution than many peers, but the
      public record is weaker on like-for-like profitability and net pricing. The
      company's moat is clearest in product integration and mission heritage, not in
      fully auditable unit economics.
    founder_claim_ids:
      - FC-001
      - FC-008
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-021
      - EC-022
