report_metadata:
  report_title: SpaceX Public-Source Startup Diligence Report
  target_company: Space Exploration Technologies Corp. (SpaceX)
  website: https://www.spacex.com/
  known_aliases:
    - SpaceX
    - Space Exploration Technologies Corp.
    - Starlink
    - Starshield
  sector: Launch services, satellite broadband, and national-security space systems
  geography: United States headquartered with global launch, government, and broadband footprint
  company_stage: Late-stage private aerospace and satellite communications company
  research_date: 2026-05-13
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized official SpaceX, Starlink, NASA, Space Force, FAA, FCC, EPA, DOJ,
      and NLRB sources.
    - Used Jina AI mirrors for JS-heavy SpaceX and Starlink product pages per the
      user's instruction.
    - Used Reuters URLs and search-discovered metadata for financing and safety
      reporting where direct in-session fetches returned 451 or other access limits.
    - Treated private-company financial, cap-table, debt, and classified-contract
      questions as evidence gaps unless directly supported by public records.
  included_jurisdictions:
    - United States
    - Global launch and satellite-broadband markets
  excluded_topics:
    - No private financial statements, board materials, or cap-table exports were available.
    - No customer, supplier, employee, or management interviews were performed.
    - No classified contract annexes, Starshield program details, or non-public
      launch-license materials were accessible.
    - Some official or mainstream pages were rate-limited, geoblocked, or JS-heavy
      in-session.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-13
      notes: The user requested startup diligence research on SpaceX and asked to
        consider Wayback or Jina AI if URLs could not be fetched directly.

