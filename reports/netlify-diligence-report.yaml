    claim_text: Netlify is a late-stage private unicorn in Enterprise Tech with a $2B valuation marker from the November 2021 Series D.
    claim_source: CB Insights unicorn list and Netlify Series D press release
    claim_date: 2021-11-17
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-034
    contradiction_summary: Current private-market fair value is not publicly verifiable and may differ materially from the 2021 financing mark.
