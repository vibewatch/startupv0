          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public product evidence covers core deploy/build workflow, deploy previews, functions, edge network, observability, storage/database, AI Gateway and Agent Runners. Customers span web apps, marketing sites, SaaS, ecommerce and internal tools.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Platform primitives span deploy, previews, functions, storage, observability, edge network, AI Gateway and Agent Runners.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-004
          - finding_id: II.A-F2
            finding: Pricing exposes usage-meter cost points and tiered packaging across Free, Personal, Pro and Enterprise.
            evidence_claim_ids:
              - EC-008
              - EC-029
            risk_ids:
              - R-009
          - finding_id: II.A-F3
            finding: Database and AI capabilities suggest active repositioning around agent-native fullstack apps.
            evidence_claim_ids:
              - EC-014
              - EC-015
              - EC-016
            risk_ids:
              - R-004
