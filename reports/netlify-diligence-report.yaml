diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, ARR/bookings, gross margin, cash runway, backlog and AR aging.
    why_it_matters: Necessary to validate growth, profitability, working capital and runway behind public adoption metrics.
    suggested_source_or_request: Company finance data room and auditor/accountant workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, liquidation preferences, options, warrants, debt, SAFEs and side letters.
    why_it_matters: Determines investable ownership economics and whether the 2021 valuation is relevant.
    suggested_source_or_request: Company legal/finance cap-table export and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: ARR, gross margin, usage, uptime and support cost by product module.
    why_it_matters: Product breadth is visible but economic contribution is not.
    suggested_source_or_request: Product analytics and finance module P&L.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Customer ARR concentration, top-25 customer list, churn, renewal dates and active logo rights.
    why_it_matters: Logo proof cannot substitute for revenue durability.
    suggested_source_or_request: CRM, billing system and customer contracts.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top suppliers by spend, cloud/model/database provider contracts and subprocessor list.
    why_it_matters: Infrastructure and AI/database dependencies drive margin and compliance risk.
    suggested_source_or_request: Procurement/vendor-management schedules.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, churn-by-competitor and benchmark performance/price data.
    why_it_matters: Direct public competitors are strong; differentiation must be proven by customer decisions.
    suggested_source_or_request: Sales ops win/loss and product benchmark studies.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quotas, attainment, CAC/payback, pipeline and hiring plan.
    why_it_matters: Enterprise growth cannot be underwritten from public materials.
    suggested_source_or_request: GTM operating model and CRM reports.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: AI Gateway/Agent Runners/Database adoption, costs, incident data, safety controls and vendor agreements.
    why_it_matters: New product bets can create upside or hidden cost/security exposure.
    suggested_source_or_request: Product dashboards, vendor contracts and security reviews.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.G
    missing_information: Two-year attrition, compensation bands, option-plan data, employee relations and remote-work compliance.
    why_it_matters: Retention and workforce compliance are private but material to execution.
    suggested_source_or_request: People ops dashboard, HR/legal schedules and option ledger.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer/supplier/acquisition contracts, IP portfolio, insurance policies and litigation/regulatory schedules.
    why_it_matters: Public legal evidence is thin relative to enterprise SaaS/platform exposure.
    suggested_source_or_request: Counsel data room, insurance broker, IP counsel and contract repository.
    priority: high
