        follow_up_questions:
          - Request insurance binder, policies and claims history.
        table_ids:
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-025
          - EC-026
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Public terms reference self-serve and enterprise subscription agreements, but material customer, supplier, partner, acquisition and financing contracts are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.F-F1
            finding: Website Terms point to self-serve and Enterprise subscription agreements for services.
            evidence_claim_ids:
              - EC-026
            risk_ids:
              - R-010
          - finding_id: VIII.F-F2
            finding: Acquisition releases confirm deals but not terms.
            evidence_claim_ids:
              - EC-017
              - EC-018
              - EC-019
            risk_ids:
              - R-008
              - R-010
        hidden_risks:
          - Enterprise SLAs, data-processing terms, model-provider agreements, cloud commitments and acquisition obligations could create hidden liabilities.
        evidence_gaps:
          - Top customer MSAs/order forms, supplier contracts, partner agreements, acquisition agreements, financing documents, DPAs and SLAs.
        follow_up_questions:
          - Request material-contract schedule and sample Enterprise MSA/order forms.
        table_ids:
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-017
          - EC-018
          - EC-019
          - EC-026
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Public evidence shows security/compliance commitments and no obvious regulatory-problem disclosure; underlying audit exceptions and regulatory correspondence are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: ISO 27001/SOC 2/PCI claims support enterprise compliance posture.
            evidence_claim_ids:
              - EC-009
              - EC-010
            risk_ids:
              - R-006
          - finding_id: VIII.G-F2
            finding: Public security page describes GDPR/CCPA commitment but not regulatory correspondence.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-006
        hidden_risks:
          - A security incident or audit exception could affect enterprise trust and renewal risk.
        evidence_gaps:
          - Regulatory correspondence, privacy/security incident log, audit exceptions, DPIAs, DPAs and compliance roadmaps.
        follow_up_questions:
          - Request compliance audit reports, privacy incident register and regulatory correspondence schedule.
        table_ids:
          - T-015
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-009
          - EC-010
