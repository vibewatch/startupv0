risk_register:
  - risk_id: R-001
    risk_title: Operating financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: No public audited financials, ARR, gross margin, cash runway, backlog, AR aging or management reports are available.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
      - V.E
    evidence_claim_ids:
      - EC-031
    mitigation_or_diligence_request: Request full financial data room, QoE-style revenue/gross-margin analysis and cash-runway model.
  - risk_id: R-002
    risk_title: Stale unicorn valuation and preference-stack risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $2B valuation is a 2021 financing marker; current private-market value and common-equity economics may differ due to market changes or preferences.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-034
    mitigation_or_diligence_request: Review latest 409A, board valuations, cap table, preference stack, debt and secondary transactions.
  - risk_id: R-003
    risk_title: Developer-platform competitive pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Vercel, Cloudflare and hyperscalers compete on developer experience, edge scale, free tiers, pricing and integrated workflows.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-027
      - EC-028
    mitigation_or_diligence_request: Request win/loss data, churn by competitor, price benchmark and product differentiation roadmap.
  - risk_id: R-004
    risk_title: AI and database product execution risk
    risk_category: product
    severity: high
    likelihood: medium
    description: Agent Runners, AI Gateway and Netlify Database expand TAM but add model-provider, database, safety, COGS and reliability dependencies.
    impacted_chapter_ids:
      - II
      - VI
      - III
    impacted_section_ids:
      - II.A
      - VI.B
      - III.B
      - III.E
    evidence_claim_ids:
      - EC-014
      - EC-015
      - EC-016
    mitigation_or_diligence_request: Review module P&L, adoption cohorts, vendor contracts, AI safety controls, incident logs and roadmap milestones.
  - risk_id: R-005
    risk_title: Customer concentration and logo-verification risk
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Named logos and case studies are public, but active status, ARR, concentration, renewals and churn are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-032
    mitigation_or_diligence_request: Request customer ARR schedule, references, logo-rights proof, renewal risk and churn/loss reports.
  - risk_id: R-006
    risk_title: Security, compliance and infrastructure dependency risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Netlify hosts production apps and claims enterprise controls, but audit reports, incident history and supplier concentration were not reviewed.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-033
    mitigation_or_diligence_request: Review SOC/ISO/PCI evidence, incident reports, supplier contracts, BC/DR tests and security architecture.
  - risk_id: R-007
    risk_title: Remote global workforce and retention risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Remote-first operations across 14+ countries and employee equity can support talent, but headcount, attrition, comp and compliance are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.D
      - VII.E
      - VII.G
    evidence_claim_ids:
      - EC-020
      - EC-021
