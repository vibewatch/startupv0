report_metadata:
  report_title: Netlify Public-Source Startup Diligence Report
  target_company: Netlify
  website: https://www.netlify.com/
  known_aliases:
    - Netlify, Inc.
    - MakerLoop, Inc.
    - Jamstack pioneer
  sector: Enterprise Tech; developer tools; modern web deployment; Jamstack/composable web; AI-native app platform
  geography: United States; headquartered in San Francisco with remote-first global team across 14+ countries
  company_stage: Late-stage private unicorn / Series D
  research_date: 2026-05-25
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used public evidence only: company pages, company press releases/blog/product/pricing/security/legal pages, SEC EDGAR Form D records, CB Insights public unicorn list, GitHub repository metadata, CourtListener public search and competitor public product/pricing pages."
    - Prioritized primary company and regulatory sources for factual claims; treated vendor-published customer stories as partially verified until confirmed by customer contracts and reference calls.
    - Marked private financial, cap-table, customer, sales, HR, supplier, legal, insurance and contract data as not_publicly_verifiable rather than inferring it.
    - Excluded paid databases, private interviews, data-room documents, PACER paid docket review and non-public customer/supplier/counsel confirmations.
  included_jurisdictions:
    - United States
    - California
    - Delaware corporate/regulatory records where public
    - Global SaaS/developer-tools market context
  excluded_topics:
    - No private financial statements, capitalization records, customer contracts, supplier agreements, board materials, insurance policies, audit reports or HR records were reviewed.
    - No legal advice or exhaustive litigation/IP/regulatory search was performed.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-05-25
      notes: User requested exactly one public-source YAML diligence report for Netlify at reports/netlify-diligence-report.yaml.
founder_claims:
