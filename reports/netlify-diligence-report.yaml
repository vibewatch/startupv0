  - risk_id: R-008
    risk_title: Acquisition integration and retained-IP risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Gatsby, Quirrel and Stackbit broadened product scope; purchase terms, retention, IP assignments and integration outcomes are not public.
