report_metadata:
  report_title: DentalMonitoring Startup Diligence Report
  target_company: Dental Monitoring
  website: https://www.dentalmonitoring.com/
  known_aliases:
    - DentalMonitoring
    - Dental Monitoring SAS
    - Dental Monitoring
  sector: Orthodontic and dental remote monitoring software, workflow analytics, and AI-enabled digital care
  geography: France / global
  company_stage: Private growth-stage / late-stage digital health company
  research_date: 2026-06-10
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source diligence using company-owned web pages, regulatory records, public professional profiles, partner / customer references, press releases, practitioner interviews, legal search tools, and competitor websites.
    - Direct web search engines and some registries were partially blocked by anti-bot controls; the report therefore relies heavily on directly fetched company pages, FDA records, and accessible public releases.
    - Company-published scale, performance, profitability, testimonial, and portfolio claims are treated as management claims unless independently corroborated.
    - No private data room, management interview, customer calls, counsel letter, audited financial package, contract repository, or HR export was available.
  included_jurisdictions:
    - France
    - European Union
    - United States
    - United Kingdom
    - Australia
    - Publicly disclosed global operating footprint
  excluded_topics:
    - Non-public audited financial statements, monthly management accounts, backlog, AR aging, cash, debt, and tax workpapers
    - Private cap table, investor rights, preference stack, debt instruments, option pool, and employee-liquidity records
    - Customer contracts, churn / NRR cohorts, top-customer revenue concentration, supplier spend, and partner economic schedules
    - Private complaint logs, security incidents, insurance schedules, litigation files, and counsel correspondence
    - Full technical file, post-market surveillance package, model governance metrics, and country-by-country regulatory status matrix
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for a public-source diligence report on Dental Monitoring
      type: workflow_request
      date_received: 2026-06-10
      notes: User requested a complete standard-depth diligence YAML report for Dental Monitoring using the repo skill, schema, template, and checklist conventions.
