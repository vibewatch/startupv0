    mitigation_or_diligence_request: Request counsel letters, litigation schedule, insurance policies, and material contract summary with exceptions and claims history.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, AR aging, backlog, cash, debt, and revenue-quality metrics.
    why_it_matters: Necessary to underwrite profitability, liquidity, and value.
    suggested_source_or_request: CFO data room, auditor workpapers, and board reporting packs.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, options, warrants, debt, investor rights, and valuation support.
    why_it_matters: Determines dilution, financing risk, and common-equity value.
    suggested_source_or_request: Company counsel and equity-administration records.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer-level ARR, churn, NRR, contract terms, and top-customer concentration.
    why_it_matters: Named case studies do not prove durable or diversified revenue.
    suggested_source_or_request: Revenue-operations dashboard and customer contract schedule.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend, hardware counterparties, cloud commitments, and vendor SLAs.
    why_it_matters: Infrastructure and hardware dependencies can create hidden operational and compliance risks.
    suggested_source_or_request: Procurement / operations contract schedule and cloud / hardware agreements.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D spend, model-governance metrics, roadmap dates, and product-level launch quality.
    why_it_matters: Needed to judge whether the regulatory and product narrative is sustainably executable.
    suggested_source_or_request: R&D operating plan, roadmap tracker, and quality metrics.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function / location, compensation, equity plans, attrition, and executive roster.
    why_it_matters: Critical for scaling risk, retention risk, and leadership assessment.
    suggested_source_or_request: HRIS exports, compensation files, and board-approved org charts.
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts, DPAs, insurance policies, litigation schedules, and regulatory correspondence.
    why_it_matters: Material to downside protection and transaction liability.
    suggested_source_or_request: Counsel-led legal diligence and insurance-broker package.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Full patent / trademark / license schedule and freedom-to-operate review.
    why_it_matters: Important for moat validation and infringement exposure.
    suggested_source_or_request: IP counsel memo, assignment chain, and license schedule.
    priority: high
