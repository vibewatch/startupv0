            finding: Reviewed public sources did not disclose insurance limits, exclusions, or claims history for cyber, E&O, product, or D&O policies.
            evidence_claim_ids:
              - EC-036
            risk_ids:
              - R-012
        hidden_risks:
          - AI, privacy, product-liability, and multi-jurisdiction regulatory exposures can exceed standard policy terms or fall into exclusions.
        evidence_gaps:
          - Insurance schedule, broker letters, claims history, and coverage / exclusion summaries.
        follow_up_questions:
          - Provide insurance schedules, claims history, broker letters, and policy-exclusion summaries.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-036
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Public sources imply material cloud, data-processing, integration, and representative contracts, but not their economics or legal protections.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: VIII.F.1
            finding: AWS hosting, BambooHR processing, authorized representatives, and numerous PMS / manufacturer integrations imply a material contract set that was not publicly available.
            evidence_claim_ids:
              - EC-008
              - EC-021
              - EC-033
              - EC-036
            risk_ids:
              - R-005
              - R-008
              - R-011
              - R-012
        hidden_risks:
          - Termination rights, SLAs, data-ownership terms, and indemnities may be material and are not observable from public pages.
        evidence_gaps:
          - Material contracts, DPAs, cloud commitments, partner agreements, representative agreements, and indemnity schedules.
        follow_up_questions:
          - Provide material contract schedule and copies of cloud, partner, representative, and DPA agreements.
        table_ids:
          - T-022
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-021
          - EC-033
          - EC-036
          - EC-018
          - EC-024
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Public sources verify FDA and EU regulatory milestones and compliance-framework claims, but did not surface a public enforcement history or country-by-country exception list.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G.1
            finding: The strongest public regulatory evidence is positive—FDA De Novo and EU-MDR certification—while enforcement absence remains a non-conclusive public-screen result.
            evidence_claim_ids:
