executive_summary:
  overall_assessment: DentalMonitoring appears to be a real, scaled private digital-health software company with a credible regulated remote-monitoring product stack, meaningful workflow breadth, global commercial reach, and visible financing support, but the public record is materially weaker on audited financial quality, capitalization, customer concentration, supplier economics, and downside legal schedules.
  investment_or_diligence_thesis: The diligence case turns on whether DentalMonitoring’s combination of regulatory status, image-data scale, workflow integrations, SmartSTL, and global GTM execution can translate into durable, profitable, and defensible software economics once audited financials, retention cohorts, cap-table terms, and legal / regulatory operating detail are reviewed.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: "The strongest public verification is regulatory: FDA De Novo DEN230035 plus an EU-MDR class IIa announcement support a real regulated-software position."
      evidence_claim_ids:
        - EC-014
        - EC-015
        - EC-016
    - founder_claim_id: FC-001
      summary: Public sources support a meaningful differentiated product footprint spanning core remote monitoring, SmartSTL, analytics, and patient-engagement workflows, even if market-leadership language remains only partially verified.
      evidence_claim_ids:
        - EC-004
        - EC-006
        - EC-007
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Audited financial quality and cash-generation visibility are absent from the public record.
    - risk_id: R-004
      summary: Public customer proof does not reveal revenue concentration, churn, or renewal quality.
    - risk_id: R-007
      summary: The regulated AI medical-device model creates ongoing quality-system, country-claim, and post-market obligations.
    - risk_id: R-012
      summary: Litigation, insurance, and material contract schedules remain outside public visibility.
  key_evidence_gaps:
    - Audited FY2023-FY2025 financials, YTD management accounts, margin bridge, cash, debt, backlog, and AR aging.
    - Fully diluted cap table, financing documents, preference stack, investor rights, option pool, and employee-liquidity records.
    - Customer ARR concentration, churn / NRR, contract terms, pricing, discounting, and supplier / hardware counterparty schedules.
    - R&D spend, model governance, product roadmap execution, post-market quality metrics, and country-by-country regulatory status / claims.
    - Litigation, insurance, material contracts, IP assignments / licenses, and counsel-confirmed legal schedules.
  recommended_next_steps:
    - "Run finance-first diligence: audited statements, KPI pack, cash / debt, revenue quality, and a reconciliation of operational profitability to free cash flow."
    - Obtain a full cap-table and financing package before inferring value from the €45M or $100M public financing announcements.
    - Request top-customer, churn, NRR, pricing, and supplier schedules to test whether public practitioner proof translates into durable revenue quality.
    - Conduct regulatory / quality diligence covering the FDA De Novo file, EU-MDR evidence, complaint logs, CAPAs, PMS / PMCF materials, and country-specific commercial claims.
    - Run counsel-led legal diligence on litigation, insurance, material contracts, privacy / security, and IP freedom-to-operate.
