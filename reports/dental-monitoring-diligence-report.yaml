risk_register:
  - risk_id: R-001
    risk_title: Financial visibility and quality-of-earnings opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Sponsor-stated profitability and scale claims are public, but audited revenue quality, margins, cash, debt, and backlog are not.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.E
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Obtain audited financials, management accounts, cash / debt detail, margin bridge, and revenue-quality diagnostics.
  - risk_id: R-002
    risk_title: Capital structure and valuation opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public financing amounts do not reveal post-money valuation, ownership percentages, preferences, debt, or employee dilution.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request the fully diluted cap table, financing documents, debt schedule, and current valuation support.
  - risk_id: R-003
    risk_title: Sponsor-generated evidence bias in customer outcomes
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: Many public commercial-outcome claims come from company-curated evidence, testimonials, or partner releases rather than independent benchmarking.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - V.A
      - V.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request raw before/after KPI studies, independent customer references, and unbiased outcome measurement by cohort.
  - risk_id: R-004
    risk_title: Customer concentration and retention opacity
    risk_category: customer
    severity: high
    likelihood: high
    description: Public sources identify named practitioner references but not ARR concentration, churn, NRR, or customers above 5% of revenue.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Obtain top-customer schedules, churn / NRR cohorts, contract terms, and renewal calendars.
  - risk_id: R-005
    risk_title: Partnership and integration dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: DentalMonitoring’s visible PMS, manufacturer, and analytics ecosystem could create meaningful dependency on third-party integrations and partner economics.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.B
      - III.E
      - V.A
      - V.C
      - VIII.F
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review partner contracts, SLAs, usage depth, concentration, and contingency plans for integration breakage.
  - risk_id: R-006
    risk_title: Competition from virtual-care, aligner, and manufacturing-centric platforms
    risk_category: market
    severity: high
    likelihood: medium
    description: Grin, CandidPro, and uLab show adjacent capabilities that can compress differentiation or re-route workflows away from DentalMonitoring.
    impacted_chapter_ids:
      - II
      - IV
    impacted_section_ids:
      - II.A
      - IV.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Benchmark feature parity, pricing concessions, customer win/loss data, and competitor-driven churn.
  - risk_id: R-007
    risk_title: Regulatory and quality-system burden for AI medical-device software
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: The regulated-software model requires ongoing FDA / EU compliance, post-market surveillance, and country-specific claims discipline.
    impacted_chapter_ids:
      - I
      - II
      - VI
      - VIII
    impacted_section_ids:
      - I.B
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review technical files, PMCF / PMS records, complaint logs, CAPAs, and country-by-country regulatory status.
  - risk_id: R-008
    risk_title: Privacy, cybersecurity, and patient-image handling
    risk_category: legal
    severity: high
    likelihood: medium
    description: DentalMonitoring handles patient images, messaging, and cross-border workflows, making privacy and cybersecurity central legal exposures.
    impacted_chapter_ids:
      - V
      - VIII
    impacted_section_ids:
      - V.A
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request security certifications, incident logs, DPAs, data-flow maps, breach history, and privacy-governance materials.
  - risk_id: R-009
    risk_title: IP strength and freedom-to-operate uncertainty
    risk_category: legal
    severity: medium
    likelihood: medium
    description: The company publicly claims a large patent portfolio, but public counts vary and no full FTO or trademark schedule was available.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VIII.D
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Obtain a dated IP schedule, FTO memo, assignment chain, and open-source / licensing review.
  - risk_id: R-010
    risk_title: Talent scaling and global execution risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Global hiring and limited public management visibility create execution risk across sales, product, and R&D teams.
    impacted_chapter_ids:
