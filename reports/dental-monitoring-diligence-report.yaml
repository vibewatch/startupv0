      - VII.F
      - VII.G
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Review leadership bench, org structure, compensation, attrition, and hiring-plan execution by region.
  - risk_id: R-011
    risk_title: Hardware, smartphone, and cloud dependence
    risk_category: operational
    severity: medium
    likelihood: medium
    description: The workflow depends on smartphone image capture, proprietary ScanBox hardware, cloud hosting, and app-store distribution.
    impacted_chapter_ids:
      - II
