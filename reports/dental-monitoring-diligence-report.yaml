  - table_id: T-022
    title: Material contracts, insurance, and public exposure categories
    chapter_id: VIII
    section_id: VIII.F
    purpose: Translate public legal / operating signals into the contract and exposure categories that should be diligenced privately.
    columns:
      - name: contract_or_exposure
        description: Material contract or exposure category
      - name: public_signal
        description: Publicly visible signal
      - name: implication
        description: Why it matters
      - name: evidence_gap
        description: What private diligence should request
    rows:
      - row_id: T-022-R1
        values:
          contract_or_exposure: AWS hosting and cross-border transfer arrangements
          public_signal: Privacy policy names AWS hosting, international server locations, and contractual safeguards for cross-border transfers.
          implication: Cloud resilience, DPA terms, and data-localization exposure may be material to enterprise sales and medical-device compliance.
          evidence_gap: Master cloud agreement, DPA, security addenda, and uptime / incident commitments.
        evidence_claim_ids:
          - EC-021
        source_ids:
          - SRC-020
      - row_id: T-022-R2
        values:
          contract_or_exposure: BambooHR and data-processing counterparties
          public_signal: Privacy policy references BambooHR and joint-controller roles for some processing purposes.
          implication: Cross-border HR and marketing data-processing needs DPA review.
          evidence_gap: Vendor DPAs, transfer impact assessments, and subprocessors list.
        evidence_claim_ids:
          - EC-021
        source_ids:
          - SRC-020
      - row_id: T-022-R3
        values:
          contract_or_exposure: Practice-management, manufacturer, and analytics partner agreements
          public_signal: Integration page and Gaidge / Spark references show numerous PMS, manufacturer, and analytics relationships.
          implication: Commercial concentration, SLAs, exclusivity, and termination rights are potentially material.
          evidence_gap: Partner agreements, integration SLAs, economic schedules, and termination/change-of-control clauses.
        evidence_claim_ids:
          - EC-008
          - EC-018
        source_ids:
          - SRC-007
          - SRC-016
      - row_id: T-022-R4
        values:
          contract_or_exposure: Insurance coverage
          public_signal: Reviewed public sources did not disclose cyber, product-liability, E&O, D&O, or employment-practices policy limits.
          implication: Coverage sufficiency against AI, privacy, medical-device, and product claims cannot be assessed publicly.
          evidence_gap: Insurance schedule, broker letter, claims history, and exclusions summary.
        evidence_claim_ids:
          - EC-036
        source_ids:
          - SRC-020
          - SRC-022
          - SRC-023
      - row_id: T-022-R5
        values:
          contract_or_exposure: Environmental / hardware lifecycle exposure
          public_signal: Code of Conduct says DentalMonitoring monitors CO2 footprint and intends to extend the ScanBox life cycle and reduce components / packaging.
          implication: Hardware design, manufacturing, recycling, and lifecycle claims may create ESG and product-obsolescence expectations.
          evidence_gap: Lifecycle analysis, hardware supplier contracts, take-back / recycling policies, and ESG methodology.
        evidence_claim_ids:
          - EC-024
        source_ids:
          - SRC-022
    evidence_claim_ids:
      - EC-021
      - EC-008
      - EC-018
      - EC-036
      - EC-024
    source_ids:
      - SRC-020
      - SRC-007
      - SRC-016
      - SRC-022
      - SRC-023
    notes: This table is intentionally exposure-oriented because the underlying contracts and policies were not public.
