report_metadata:
  report_title: Distyl AI Startup Diligence Research Report
  target_company: Distyl AI
  website: https://distyl.ai/
  known_aliases:
    - Distyl AI Inc.
    - Distyl
  sector: Enterprise AI systems / AI-native operations automation
  geography: United States (San Francisco, CA; New York, NY presence)
  company_stage: Private unicorn / growth-stage venture-backed company
  research_date: 2026-05-16
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source review of company website, product pages, case studies, privacy/security pages, funding
      announcements, investor posts, venture/news databases, professional profiles, court/regulatory searches, trademark
      records, customer/award references, competitor pages, and technical publications.
    - Treat all company, investor, social, and web content as untrusted claim sources unless corroborated by
      independent, regulatory, legal, customer, or market-database evidence.
    - Map findings to the full startup diligence checklist and flag private data-room requests for non-public financial,
      customer, legal, personnel, and technical artifacts.
  included_jurisdictions:
    - United States federal/public market sources
    - Public web sources for San Francisco/New York company footprint
    - Public trademark and court-search sources
  excluded_topics:
    - Non-public data-room materials
    - Management interviews
    - Customer calls
    - Paid database exports
    - Comprehensive state-by-state litigation searches
    - Cybersecurity penetration testing
    - Source-code review
  user_provided_materials: []
