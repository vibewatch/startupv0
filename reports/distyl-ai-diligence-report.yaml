executive_summary:
  overall_assessment: "Distyl AI qualifies as an evidence-backed private unicorn based on public Series B and CB Insights
    evidence: $175M raised at a $1.8B valuation. The company has credible enterprise AI traction signals, but
    investability depends on private validation of financials, customer concentration, realized impact,
    security/compliance, and services-versus-software economics."
  investment_or_diligence_thesis: Distyl is a high-potential enterprise AI systems company serving Fortune 500 operational
    workflows through its Distillery platform and forward-deployed teams. The upside case is large AI-native
    transformation budgets and repeatable high-value deployments; the downside case is opaque financial quality,
    high-touch services economics, model-provider dependence, and unverifiable customer/impact claims.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support Distyl’s $1.8B private unicorn valuation.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: The $175M Series B financing is publicly announced and corroborated by market/news sources.
      evidence_claim_ids:
        - EC-002
        - EC-004
    - founder_claim_id: FC-003
      summary: Founder identities and Palantir-veteran background are supported by multiple public sources.
      evidence_claim_ids:
        - EC-003
        - EC-025
    - founder_claim_id: FC-010
      summary: R&D credibility is supported by research outputs and an OpenAI-referenced BIRD-SQL benchmark result.
      evidence_claim_ids:
        - EC-022
        - EC-023
  biggest_risks:
    - risk_id: R-001
      summary: No public operating financials, cap table, burn, or revenue data despite a high valuation.
    - risk_id: R-002
      summary: Customer revenue concentration and top-customer identities are mostly hidden behind anonymized F50 case studies.
    - risk_id: R-003
      summary: Large savings claims are often projected/company-reported and need customer/auditor substantiation.
    - risk_id: R-004
      summary: Strategic dependence on OpenAI/frontier model providers may affect margins, data rights, and continuity.
    - risk_id: R-007
      summary: Enterprise AI competition is intense from consultancies, Palantir, C3 AI, Glean, and others.
  key_evidence_gaps:
    - Audited or reviewed financial statements, management accounts, ARR/revenue, gross margin, burn/runway, backlog,
      and AR aging are not public.
    - Fully diluted cap table, preferred terms, investor rights, options/warrants/notes, and liquidation preferences are
      not public.
    - Top-15 customers, customer revenue concentration, churn, NRR, renewal dates, and customer references are not
      public.
    - OpenAI/model-provider contracts, customer MSAs/SOWs, DPAs/BAAs, and data-rights/liability terms are not public.
    - SOC 2/HIPAA evidence, security architecture, incident history, and AI governance artifacts are not public.
  recommended_next_steps:
    - Proceed as a high-interest but high-diligence private unicorn; do not underwrite on public valuation alone.
    - Prioritize financial/cap-table data-room review and customer-reference calls before valuation work.
    - Validate realized savings and zero-failure claims with customer attestations, logs, and incident history.
    - Review model-provider, cloud, customer, and data-processing contracts for dependency and liability risk.
    - Conduct technical/security diligence on Distillery, SOC/HIPAA claims, evaluation/guardrail systems, and
      productization economics.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources strongly verify Distyl’s financing history and unicorn valuation, but core operating
      financials, projections, backlog, AR, tax, debt, and cap table remain non-public.
    founder_claim_ids:
      - FC-001
      - FC-002
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
      - EC-005
      - EC-006
      - EC-034
    risk_ids:
      - R-001
      - R-009
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or management financial statements, sales/gross-profit breakdown, backlog, or AR aging were found in
          public sources; only financing and qualitative impact claims are public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public materials do not disclose income statements, balance sheets, cash flows, backlog, AR aging, or
              planned-versus-actual financials.
            evidence_claim_ids:
              - EC-005
              - EC-006
            risk_ids:
              - R-001
              - R-009
        hidden_risks:
          - Revenue, margin, burn, and working-capital quality cannot be assessed from public records.
        evidence_gaps:
          - Audited/reviewed financial statements, management accounts, ARR/revenue by product/channel/geography,
            backlog, AR aging, and board packs are missing.
        follow_up_questions:
          - Provide monthly financial statements for the last three fiscal years and YTD, including revenue bridge,
            gross margin, burn, runway, backlog, AR aging, and budget-vs-actual reporting.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-006
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources disclose growth narratives, case-study impact, and financing, but no three-year projections,
          pricing assumptions, capex, working-capital plan, or external-financing assumptions.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: The public investment case depends on large-enterprise AI transformation demand, but projection inputs are
              private.
            evidence_claim_ids:
              - EC-006
              - EC-019
              - EC-035
            risk_ids:
              - R-001
              - R-003
              - R-009
        hidden_risks:
          - Outcome-based pricing and forward-deployed delivery may create revenue recognition and margin volatility.
        evidence_gaps:
          - Quarterly forecast, pipeline assumptions, bookings, pricing, ACV expansion, churn, capex, and financing
            assumptions are missing.
        follow_up_questions:
          - Provide board-approved three-year model with revenue by product/customer/channel, gross margin by
            services/software, headcount plan, capex, working capital, and financing assumptions.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-019
          - EC-035
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources verify $175M Series B at $1.8B valuation and private/unicorn status, but shares, ownership,
          options, warrants, debt, and off-balance-sheet obligations are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: The public valuation and financing timeline are well supported by CB Insights, PRNewswire, Crunchbase News, and
              private-market pages.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-004
              - EC-034
            risk_ids:
              - R-001
        hidden_risks:
          - Preferred equity terms and option-pool expansion could materially change economic ownership and downside
            protection.
        evidence_gaps:
          - Current cap table, stockholder list, options/warrants/notes, debt, and off-balance-sheet liabilities are
            missing.
        follow_up_questions:
          - Provide fully diluted cap table, charter, investor rights, SAFEs/notes/warrants, option plan, debt
            instruments, side letters, and liquidation waterfall.
        table_ids:
          - T-001
          - T-004
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-004
          - EC-034
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public sources disclose financing history but not tax positions, accounting policies, revenue recognition, debt
          terms, or basis for current valuation beyond the announced round.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: Seed, Series A, and Series B financing history is publicly described, but tax/accounting and ownership detail
              are private.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-006
            risk_ids:
              - R-001
        hidden_risks:
          - Revenue recognition for outcome-based AI projects may be complex if fees depend on milestones or measured
            savings.
        evidence_gaps:
          - Tax positions, accounting policies, revenue-recognition memos, and financing basis by round are missing.
        follow_up_questions:
          - Provide tax returns/NOL schedule, revenue-recognition policy, accounting memos, debt/lease commitments, and
            round-by-round financing documents.
        table_ids:
          - T-005
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-006
  - chapter_id: II
    title: Products
    chapter_summary: Distyl’s public product story centers on Distillery, AI-native Routines, auditability, guardrails, and
      forward-deployed systems; case studies support multiple enterprise use cases but technical and economic validation
      are private.
    founder_claim_ids:
      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-012
      - EC-013
    risk_ids:
      - R-003
      - R-004
      - R-006
      - R-009
      - R-012
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Distyl describes Distillery as an enterprise AI workflow platform with Routines, evaluation/guardrails, audit
          trails, RBAC, multi-tenancy, and forward-deployed implementation; public use cases span customer experience,
          prior authorization, supply chain, analytics, and CPG operations.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Product capabilities and controls are described in detail on the company platform page.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-004
              - R-006
              - R-009
          - finding_id: II.A-F2
            finding: Case-study metrics support multi-vertical deployment but mostly remain company-controlled and anonymized.
            evidence_claim_ids:
              - EC-008
              - EC-009
              - EC-012
              - EC-013
            risk_ids:
              - R-003
              - R-012
        hidden_risks:
          - Product may be more services-heavy than platform-heavy; zero-failure and savings claims lack public audit.
        evidence_gaps:
          - Live product documentation, customer admin evidence, security reports, product margins, roadmap, pricing,
            market share, and cost structure are missing.
        follow_up_questions:
          - Provide product demo, architecture/security packet, SOC report, roadmap, deployment inventory,
            software/services margin split, customer product references, and incident history.
        table_ids:
          - T-006
          - T-007
          - T-008
        figure_ids:
          - F-003
          - F-004
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-009
          - EC-012
          - EC-013
  - chapter_id: III
    title: Customer Information
    chapter_summary: "Public customer evidence is directionally strong but thin: T-Mobile is the clearest named customer
      signal, while most F50/F500 case studies are anonymized and revenue concentration is undisclosed."
    founder_claim_ids:
      - FC-004
      - FC-005
      - FC-007
      - FC-008
    evidence_claim_ids:
      - EC-003
      - EC-009
      - EC-010
      - EC-011
      - EC-014
      - EC-015
      - EC-016
      - EC-017
      - EC-036
    risk_ids:
      - R-002
      - R-003
      - R-004
      - R-011
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public applications include telecom customer experience, healthcare prior authorization, supply-chain root
          cause, healthcare analytics, and CPG order-resolution workflows; T-Mobile is the only strong named public
          customer signal found.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Five anonymized F50 case studies and a T-Mobile collaboration signal demonstrate enterprise application
              breadth.
            evidence_claim_ids:
              - EC-009
              - EC-010
              - EC-011
              - EC-014
              - EC-015
              - EC-036
            risk_ids:
              - R-002
              - R-003
        hidden_risks:
          - Anonymized accounts could represent a small number of large customers or pilots rather than durable,
            diversified recurring revenue.
        evidence_gaps:
          - Top 15 customers, application ownership, timing of purchases, ARR/revenue by customer, and customer
            references are missing.
        follow_up_questions:
