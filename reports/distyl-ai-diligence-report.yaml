diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited/reviewed financial statements, management accounts, revenue breakdowns, backlog, and AR aging.
    why_it_matters: Core valuation and runway diligence cannot be completed publicly.
    suggested_source_or_request: "Company CFO/data room: statements, management accounts, KPI dashboards, backlog, AR aging."
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, investor rights, liquidation preferences, options, warrants, notes, debt.
    why_it_matters: Public valuation does not reveal economic ownership or downside protections.
    suggested_source_or_request: "Corporate counsel and CFO: cap table, charter, financing docs, side letters, debt schedule."
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product architecture, live demo, roadmap, incident history, product margins, deployment reuse metrics.
    why_it_matters: Determines whether Distillery is scalable software versus bespoke services.
    suggested_source_or_request: CTO/product/security data room and customer admin references.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Top 15 customer list, ARR/revenue by customer, customer references, deployment status, renewal dates.
    why_it_matters: Customer concentration and retention are not publicly visible.
    suggested_source_or_request: Revenue operations export, contracts, and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.B
    missing_information: OpenAI/model-provider and cloud supplier contract terms, data-use rights, pricing, SLAs.
    why_it_matters: Model-provider economics and risk allocation may materially affect margins and continuity.
    suggested_source_or_request: "Legal/procurement: model-provider contracts, DPAs, subprocessors, cloud spend."
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing comparisons, market share, competitive battlecards, analyst/customer perception.
    why_it_matters: Competitive intensity is high and public proof does not quantify defensibility.
