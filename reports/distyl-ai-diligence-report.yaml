risk_register:
  - risk_id: R-001
    risk_title: Valuation and financial opacity
    risk_category: financial
    severity: high
    likelihood: medium
    description: Distyl has a strong public unicorn valuation signal, but revenue, gross margin, burn, runway, ARR, backlog,
      debt, tax, and cap table remain private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
      - EC-005
      - EC-006
    mitigation_or_diligence_request: Request audited or reviewed financials, monthly management accounts, ARR/revenue
      bridge, burn/runway, cap table, financing documents, debt schedule, and tax positions.
  - risk_id: R-002
    risk_title: Customer concentration and anonymized traction
    risk_category: customer
    severity: high
    likelihood: medium
    description: Most large customers are anonymized and revenue by customer is not public, creating uncertainty about
      concentration, churn, and repeatability.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids:
      - EC-009
      - EC-015
      - EC-017
      - EC-036
    mitigation_or_diligence_request: Request top-15 customer list, ARR by customer, NRR, churn, backlog, renewal dates,
      concentration, customer references, and permission to validate named accounts.
  - risk_id: R-003
    risk_title: Outcome and savings attribution risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Several case studies report projected or forecasted customer savings; attribution, realization, and
      contractual economics are not public.
    impacted_chapter_ids:
      - II
      - III
      - V
    impacted_section_ids:
      - II.A
      - III.A
      - V.A
      - V.B
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-012
      - EC-013
      - EC-014
      - EC-019
      - EC-035
    mitigation_or_diligence_request: Request realized-vs-forecast impact models, customer sign-offs, baseline methodology,
      fee linkage to outcomes, and post-deployment KPI dashboards.
  - risk_id: R-004
    risk_title: Frontier model provider dependence
    risk_category: technical
    severity: high
    likelihood: medium
    description: OpenAI and other model-provider relationships are a strategic advantage but may create cost, access,
      privacy, substitution, and roadmap dependency.
    impacted_chapter_ids:
      - II
      - III
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - III.B
      - VI.A
      - VIII.F
    evidence_claim_ids:
      - EC-003
      - EC-016
      - EC-022
      - EC-024
      - EC-033
    mitigation_or_diligence_request: Review model-provider agreements, pricing, SLAs, data-use terms, multi-model fallback,
      and customer contractual allocation of model-provider risk.
  - risk_id: R-005
    risk_title: Regulated workflow and AI governance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Healthcare prior authorization and telecom customer interactions can affect regulated decisions, protected
      data, consumer experience, and audit obligations.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.A
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-011
      - EC-031
      - EC-032
    mitigation_or_diligence_request: Request model-risk management framework, human-review policies, clinical governance,
      regulatory counsel memos, DPAs/BAAs, audit logs, and incident history.
  - risk_id: R-006
    risk_title: Enterprise data security and privacy risk
    risk_category: legal
    severity: high
    likelihood: medium
    description: Distyl claims SOC/HIPAA/security controls, but public evidence lacks actual reports and a dedicated
      security page returned 404.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
