report_metadata:
  report_title: CAIS Startup Diligence Report
  target_company: CAIS
  website: https://www.caisgroup.com/
  known_aliases:
    - CAIS
    - Capital Integration Systems LLC
    - CAIS Capital LLC
    - CAIS Advisors LLC
  sector: Financial services / wealthtech / alternative-investment platform
  geography: United States
  company_stage: Private Equity | Alive; private unicorn valuation anchor approximately $1.10B
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Prioritized company-owned pages, regulatory records, legal summaries, market-database evidence and
      competitor public sources.
    - Treated company-published claims as evidence of the public statement unless independently corroborated
      by regulatory, market-database or third-party sources.
    - No private data room, management interview, customer call, full legal docket search, SOC report,
      financial model or cap table was available.
  included_jurisdictions:
    - United States
    - United Kingdom presence referenced in company materials
    - Global markets referenced by public company materials
  excluded_topics:
    - Private financial statements, contracts, cap table, customer calls, employee files, security reports,
      full litigation docket retrieval and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: CAIS public diligence workstream request
      type: workflow_request
      date_received: 2026-05-20
      notes: User requested one standard-depth public diligence YAML report for CAIS at
        reports/cais-diligence-report.yaml; no PR/commit.
