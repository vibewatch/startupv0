      - section_id: II.A
        title: Products and services
        checklist_question_ids:
          - II.A
        summary: Current public pages support a broad alternative-investment platform spanning marketplace, capital
          markets, education, enterprise, integrations and AI; pricing and product-level metrics are not
          public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: CAIS publicly markets Marketplace, Capital Markets, Custom Funds, Compass, Models, CAIS IQ,
              integrations and CAISey.
            evidence_claim_ids:
              - EC-007
              - EC-012
            risk_ids:
              - R-004
              - R-005
          - finding_id: II.A-F2
            finding: The legal page confirms fee existence for private funds/strategies but not fee amounts.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-002
              - R-001
        hidden_risks:
          - Product breadth may mask uneven adoption or margin by module; AI and structured products heighten
            suitability and control obligations.
        evidence_gaps:
          - Product-level revenue, gross margin, take rate, active users, pricing, SKU roadmap, SLAs, incident
            history and model-risk controls.
        follow_up_questions:
          - Provide product P&L, pricing book, SKU adoption, roadmap, AI governance, legal approvals and
            compliance disclosures.
        table_ids:
          - T-004
          - T-005
          - T-006
        figure_ids:
          - F-003
          - F-004
        evidence_claim_ids:
          - EC-007
          - EC-009
          - EC-012
          - EC-015
  - chapter_id: III
    title: Customers and Suppliers
    chapter_summary: Public evidence shows a large advisor ecosystem and important partners, but revenue
      concentration, contract terms, active usage and dependency economics are unknown.
