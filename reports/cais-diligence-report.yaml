risk_register:
  - risk_id: R-001
    title: Financial opacity and stale valuation support
    risk_category: financial
    severity: high
    likelihood: high
    risk_summary: CAIS is private; public sources support financings and scale proxies but not revenue, margin,
      cash, debt, burn, retention, current valuation or cap-table economics.
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
      - EC-025
    affected_chapter_ids:
      - I
    mitigating_factors:
      - Multiple public financings and active public releases support operating-company status.
    recommended_follow_up:
      - Request audited financials, ARR/bookings, KPI pack, cash/debt, cap table and valuation support.
    status: open
  - risk_id: R-002
    title: Regulatory, fiduciary and fee-conflict exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    risk_summary: CAIS operates through regulated broker-dealer/RIA entities, facilitates complex alternative
      investments and discloses fee and non-fiduciary limitations that require compliance review.
    evidence_claim_ids:
      - EC-015
      - EC-016
      - EC-017
      - EC-019
    affected_chapter_ids:
      - II
      - VIII
    mitigating_factors:
      - Public legal page and SEC records show regulatory entities and disclosures are visible.
    recommended_follow_up:
      - Obtain Form ADV, FINRA/SEC exam history, supervisory procedures, fee schedules, conflict controls and
        counsel memo.
    status: open
  - risk_id: R-003
    title: Customer, channel and partner concentration opacity
    risk_category: commercial
    severity: medium
    likelihood: high
    risk_summary: Public customer/scale metrics are broad and inconsistent; relationships with Mercer, custodians,
      asset managers, bank issuers and enterprise channels could create concentration or dependency risk.
    evidence_claim_ids:
      - EC-003
      - EC-008
      - EC-009
      - EC-010
      - EC-026
    affected_chapter_ids:
      - III
      - V
    mitigating_factors:
      - Named partnerships and case studies support market access.
    recommended_follow_up:
      - Request revenue by customer/channel, top 20 contracts, reference calls and material partner agreements.
    status: open
  - risk_id: R-004
    title: Competitive pressure from scaled alternatives platforms
    risk_category: market
    severity: medium
    likelihood: high
    risk_summary: iCapital publicly discloses much larger platform-asset and professional-network metrics, while
      Opto, Moonfare and direct/custodian channels compete for advisor private-markets workflows.
    evidence_claim_ids:
      - EC-020
      - EC-021
      - EC-022
    affected_chapter_ids:
      - IV
    mitigating_factors:
      - CAIS has Mercer due-diligence, education and integration positioning.
    recommended_follow_up:
      - Run win/loss, pricing, manager-overlap and customer-reference benchmark against iCapital and other
        competitors.
    status: open
  - risk_id: R-005
    title: AI, cybersecurity and data-permission risk
    risk_category: technology
    severity: medium
    likelihood: medium
    risk_summary: CAISey uses language models and fund-document search in an investment context, creating
      accuracy, entitlement, privacy and reliance risks.
    evidence_claim_ids:
      - EC-012
      - EC-013
    affected_chapter_ids:
      - VI
      - VIII
    mitigating_factors:
      - Public leadership includes CISO and AI/product roles.
    recommended_follow_up:
      - Review model governance, SOC reports, penetration tests, data lineage, DPAs, hallucination controls
        and incident history.
    status: open
  - risk_id: R-006
    title: Legal, IP, HR and governance documents not public
    risk_category: legal_and_people
    severity: medium
    likelihood: medium
    risk_summary: Public sources do not resolve litigation schedules, settlements, employment agreements,
      compensation, IP assignments, insurance, liens or material contracts.
    evidence_claim_ids:
      - EC-018
      - EC-023
      - EC-025
    affected_chapter_ids:
      - VII
      - VIII
    mitigating_factors:
      - Public leadership and some legal/regulatory records are available.
    recommended_follow_up:
      - Obtain counsel letter, docket searches, HRIS export, executive agreements, IP/trademark files,
        insurance policies, UCC searches and contracts.
    status: open
diligence_gaps:
  - gap_id: GAP-001
    chapter_id: I
    severity: high
    description: Audited financials, ARR/bookings, gross margin, cash/debt, burn, retention and current valuation
      support are not public.
    why_it_matters: Cannot validate valuation or financial quality.
    requested_artifacts:
      - Audited financials
      - KPI pack
      - cash/debt schedule
      - cap table
      - board-approved plan
    related_risk_ids:
      - R-001
  - gap_id: GAP-002
    chapter_id: III
    severity: high
    description: Customer economics, concentration, active usage, reference calls and partner contract terms are private.
    why_it_matters: Broad advisor ecosystem metrics may overstate monetized adoption.
    requested_artifacts:
      - Customer master
      - top 20 contracts
      - NRR/churn cohorts
      - reference calls
      - partner MSAs
    related_risk_ids:
      - R-003
  - gap_id: GAP-003
    chapter_id: VIII
    severity: high
    description: Regulatory exam history, compliance controls, fee conflicts, litigation, insurance and liens
      require counsel-led diligence.
    why_it_matters: Investment-product platforms face high compliance and liability exposure.
    requested_artifacts:
      - Form ADV/CRD records
      - WSPs
      - exam letters
      - counsel letter
      - insurance policies
      - UCC searches
    related_risk_ids:
      - R-002
      - R-006
  - gap_id: GAP-004
    chapter_id: VI
    severity: medium
    description: AI/model governance, security reports, integration SLAs and incident history are private.
    why_it_matters: CAISey and integrations introduce data and operational risk.
    requested_artifacts:
      - SOC reports
      - penetration tests
      - AI evaluation logs
      - vendor DPAs
      - incident logs
    related_risk_ids:
      - R-005
  - gap_id: GAP-005
    chapter_id: VII
    severity: medium
    description: Management incentives, succession, HR liabilities, employee agreements and attrition are not public.
    why_it_matters: Execution depends on retention of specialized leadership and control functions.
    requested_artifacts:
      - Executive agreements
      - equity grants
      - HRIS export
      - attrition analysis
      - benefit plans
    related_risk_ids:
      - R-006
