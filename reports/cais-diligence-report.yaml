executive_summary:
  overall_assessment: CAIS appears to be an active private U.S. wealthtech/financial-services platform focused
    on alternative investments for independent wealth channels. Public sources support founded-in-2009 status,
    unicorn financing history, broad product surface area, large advisor ecosystem claims, Mercer
    due-diligence relationship and regulated-entity disclosures. The investment case remains unconfirmed
    because revenue quality, margins, cap table, current valuation support, customer economics, contracts,
    compliance files, security posture and HR/legal details are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A viable thesis requires proving that
    CAIS can convert a large advisor ecosystem and product breadth into durable, compliant, profitable
    platform economics despite larger competitors and regulatory complexity.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: CAIS was founded in 2009 by Matt Brown and remains active.
      evidence_claim_ids:
        - EC-001
        - EC-014
    - founder_claim_id: FC-001
      summary: Public financing releases support a >$1B 2022 valuation and CB Insights lists $398M total funding.
      evidence_claim_ids:
        - EC-001
        - EC-004
        - EC-006
    - founder_claim_id: FC-003
      summary: CAIS publicly markets a broad platform across alternative investments, structured investments,
        education, integrations and AI.
      evidence_claim_ids:
        - EC-007
        - EC-012
    - founder_claim_id: FC-005
      summary: Mercer due-diligence/monitoring relationship and approximately 200-fund Enterprise offering are
        publicly described.
      evidence_claim_ids:
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and current valuation support are unresolved.
    - risk_id: R-002
      summary: Regulatory, fiduciary and fee-conflict exposure is material for complex alternative-investment
        products.
    - risk_id: R-003
      summary: Customer, channel and partner concentration/definition risk remains open because broad scale metrics
        vary and top-account economics are private.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, cash/debt, burn, gross margin, cap table and current valuation support.
    - "Customer economics: top-account revenue, active users, funded-account conversion, NRR/churn and
      reference calls."
    - Material contracts with Mercer, custodians/reporting providers, asset managers, bank issuers and
      enterprise/TAMP customers.
    - Regulatory/compliance files, fee/conflict controls, litigation schedule, counsel letter, insurance
      policies and lien searches.
    - Technology/security/AI governance, SOC reports, incident history, model evaluations and vendor/data
      rights.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline unicorn valuation.
    - Conduct securities regulatory/compliance review with counsel focused on broker-dealer/RIA perimeter,
      fees, conflicts, advertising and suitability.
    - Benchmark CAIS against iCapital and other platforms using customer calls, win/loss, pricing, manager
      overlap and active platform assets.
    - Perform product/security/AI diligence on CAISey, integrations, data rights and cyber controls.
    - Complete legal, IP, insurance, HR and management diligence from private records.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports CAIS as an active private unicorn with substantial financings, but
      core financial statements, cap table, current valuation support and unit economics are not public.
    founder_claim_ids:
      - FC-001
      - FC-002
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
      - EC-005
      - EC-006
      - EC-025
    risk_ids:
      - R-001
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A
        summary: No audited annual/quarterly financial statements, revenue, gross margin, cash, debt or profitability
          were found in reviewed public sources; only financing and operating-proxy metrics are available.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public evidence includes total funding, valuation and growth proxies, not P&L quality.
            evidence_claim_ids:
              - EC-001
              - EC-005
              - EC-025
            risk_ids:
              - R-001
        hidden_risks:
          - Financial scale could be materially below unicorn valuation expectations.
        evidence_gaps:
          - Audited statements, management accounts, ARR/bookings, revenue recognition, gross margin,
            cash/debt and budget-to-actuals.
        follow_up_questions:
          - Provide three-year audited financials, monthly KPI pack, cash/debt schedule and accounting
            policies.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-005
          - EC-025
      - section_id: I.B
        title: Financial projections
        checklist_question_ids:
          - I.B
        summary: Public valuation and growth claims cannot validate projections without management forecasts,
          assumptions, budget-to-actuals and cohort economics.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: 2022 releases cite >$1B valuation and growth in transaction volume/users, but no projections or
              forecast assumptions.
            evidence_claim_ids:
              - EC-004
              - EC-005
              - EC-006
            risk_ids:
              - R-001
        hidden_risks:
          - Projection risk is high if advisor activation, take rate or partner economics underperform.
        evidence_gaps:
          - Five-year model, bookings forecast, cohort retention, CAC/payback, platform AUM/transaction-volume
            definitions.
        follow_up_questions:
          - Provide board-approved plan, model, budget-to-actuals and sensitivity cases.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-006
      - section_id: I.C
        title: Capitalization
        checklist_question_ids:
          - I.C
        summary: Public sources identify several investors and board signals, but capitalization details, preferences,
          warrants, options and debt are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Eldridge, Apollo, Motive, Franklin Templeton and Reverence appear as public financing participants.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-006
            risk_ids:
              - R-001
        hidden_risks:
          - Liquidation preferences or debt could materially affect common-equity value.
        evidence_gaps:
          - Fully diluted cap table, preferred terms, debt, warrants, SAFEs, option pool, investor rights,
            related-party commercial arrangements.
        follow_up_questions:
          - Provide cap table, charter, investor rights, all financing documents and board minutes approving
            financings.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-006
          - EC-025
      - section_id: I.D
        title: Financing history
        checklist_question_ids:
          - I.D
        summary: Public financing history shows large growth rounds and a >$1B valuation, with CB Insights listing
          $398M total raised; underlying terms remain unverified.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: CAIS announced $50M, $225M and $100M financing events and CB Insights reports $398M total funding.
            evidence_claim_ids:
              - EC-001
              - EC-003
              - EC-004
              - EC-006
            risk_ids:
              - R-001
        hidden_risks:
          - Headline financing amounts can obscure valuation terms, preferences, secondaries or structured
            securities.
        evidence_gaps:
          - Primary financing agreements, proceeds schedule, investor side letters and current ownership.
        follow_up_questions:
          - Reconcile all public funding amounts to signed financing documents and cash proceeds.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-003
          - EC-004
          - EC-006
          - EC-027
  - chapter_id: II
    title: Products and Services
    chapter_summary: CAIS has a broad public product suite, but product-level economics, adoption, pricing,
      compliance controls and AI governance require private diligence.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-007
      - EC-009
      - EC-011
      - EC-012
      - EC-015
    risk_ids:
      - R-002
      - R-004
      - R-005
