            reference calls.
        follow_up_questions:
          - Provide customer master, top-account revenue, reference list and cohort analysis.
        table_ids:
          - T-007
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-010
          - EC-026
      - section_id: III.B
        title: Material customer and supplier agreements
        checklist_question_ids:
          - III.B
        summary: Mercer, custodians, asset managers, bank issuers and TAMP/enterprise partners appear strategically
          material, but agreements are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Mercer due-diligence and custodian/issuer/manager relationships are central to the public platform
              story.
            evidence_claim_ids:
              - EC-003
              - EC-008
              - EC-009
              - EC-011
            risk_ids:
              - R-003
        hidden_risks:
          - Termination, exclusivity, revenue share or liability terms could alter economics or compliance
            obligations.
        evidence_gaps:
          - All material MSAs, SLAs, revenue-share agreements, integration contracts,
            termination/change-of-control clauses.
        follow_up_questions:
          - Provide material contract schedule and copies of Mercer, custodian, issuer, manager and enterprise
            agreements.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-008
          - EC-009
          - EC-011
      - section_id: III.C
        title: Backlog and order book
        checklist_question_ids:
          - III.C
        summary: No backlog, pipeline, signed enterprise implementation queue or funded-account conversion data was
          publicly disclosed.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
