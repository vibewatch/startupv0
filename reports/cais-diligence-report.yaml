limitations:
  - This report uses public sources only and should not be treated as investment advice, legal advice, tax
    advice or a substitute for management, customer, financial, legal, regulatory or technical diligence.
  - Company press releases and website pages were treated as medium-confidence evidence of public statements
    unless corroborated by regulatory or independent sources.
  - No private financial statements, cap table, contracts, customer calls, legal docket files, HR records,
    security reports or board materials were available.
  - Scale metrics such as advisor count and end-client assets are not equivalent to revenue, platform assets,
    active users or committed capital.
  - Legal/litigation conclusions are limited to reviewed public sources and require counsel-led docket,
    regulatory, insurance and lien searches.
  - Some public-source excerpts were accessed through web retrieval mirrors due direct-site access limits;
    source URLs are preserved for verification.
