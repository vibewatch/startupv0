report_metadata:
  report_title: ByteDance Public-Source Startup Diligence Report
  target_company: ByteDance
  website: https://www.bytedance.com/en/
  known_aliases:
    - ByteDance Ltd.
    - TikTok
    - Douyin
    - CapCut
    - Lark
    - BytePlus
    - Seed
  sector: Consumer internet, advertising, e-commerce, creator tools, enterprise collaboration, and AI infrastructure
  geography: China founded with a global consumer and enterprise footprint across the Americas, Europe, and Asia
  company_stage: Late-stage private global platform company
  research_date: 2026-05-13
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized official ByteDance, TikTok, BytePlus, Lark, CapCut, Seed, USDS, and Project Clover pages.
    - Used regulator and court primary sources from the FTC, Irish DPC, New Jersey OAG, and the U.S. Supreme Court.
    - Used Bloomberg and Reuters syndication plus major newspapers for private-company financial signals that ByteDance does not publish directly.
    - Used Jina AI mirrors when dynamic pages or anti-bot controls blocked direct fetches, per the user's instruction.
    - Treated customer ROI, user counts, and leaked financial figures as directional unless corroborated by multiple credible sources.
  included_jurisdictions:
    - China
    - United States
    - Singapore
    - European Union
    - Ireland
    - Norway
    - Mexico
    - South Korea
    - Japan
  excluded_topics:
    - No audited financial statements, board decks, or private cap-table materials were available.
    - No direct customer, partner, employee, investor, or counsel interviews were performed.
    - No PACER downloads, trademark registry sweep, or supplier contract review was completed in-session.
    - Some company pages were JavaScript-heavy and required mirror retrieval, which can obscure page context or metadata.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-13
      notes: The user requested ByteDance diligence research and suggested Wayback or Jina AI if direct fetches failed.

