diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited three-year financial statements and quality-of-earnings support.
    why_it_matters: Public revenue and profit signals are strong but unaudited.
    suggested_source_or_request: Request audited statements, management accounts, and QoE workpapers from the company or accountants.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Full cap table, share classes, and debt schedule.
    why_it_matters: Employee buybacks and investor marks do not reveal control rights or liquidation overhang.
    suggested_source_or_request: Request cap-table export, debt instruments, and governance side letters.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level MAU, payer, and profitability by surface.
    why_it_matters: Product breadth is verified, but economic quality by product is not.
    suggested_source_or_request: Request product P&Ls and core operating metrics for TikTok, CapCut, Lark, BytePlus, and Seed-linked products.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue shares and supplier spend percentages.
    why_it_matters: Concentration risk cannot be underwritten from logos and case studies alone.
    suggested_source_or_request: Request top-customer and top-supplier reports by revenue and spend.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.B
    missing_information: Economics and termination rights for Oracle, UMG, NCC Group, and key partner contracts.
    why_it_matters: Strategic relationships are public but their durability and cost are not.
    suggested_source_or_request: Request material contracts and summary deal sheets.
    priority: high
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC, payback, and conversion metrics.
    why_it_matters: Public GTM proof is outcome-oriented, not efficiency-oriented.
    suggested_source_or_request: Request funnel dashboards, quota attainment, and budget-to-actual channel metrics.
    priority: medium
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D org chart, headcount by program, and budget allocation.
    why_it_matters: ByteDance's R&D ambition is clear, but organizational accountability is not.
    suggested_source_or_request: Request research org materials and capex-to-program mapping.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.D
    missing_information: Executive compensation, stock-plan documents, and retention packages.
    why_it_matters: Talent incentives are critical for AI-heavy businesses and private-company liquidity dynamics.
    suggested_source_or_request: Request employment agreements, bonus plans, and stock-plan documentation.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.G
    missing_information: Attrition data by function, geography, and seniority.
    why_it_matters: Public hiring intensity alone does not show organizational health.
    suggested_source_or_request: Request attrition dashboards and leadership turnover history.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation reserves, outside-counsel assessments, and settlement posture.
    why_it_matters: Active legal matters may create operational remedies and financial liabilities.
    suggested_source_or_request: Request legal memos, reserve analyses, and remediation plans.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulator correspondence and current remediation testing for U.S. and EEA data controls.
    why_it_matters: Mitigation architecture claims need independent validation.
    suggested_source_or_request: Request audit reports, regulator responses, and data-flow testing results.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance coverage and self-insurance posture.
    why_it_matters: Legal and platform-risk exposures are large enough that insurance matters to downside analysis.
    suggested_source_or_request: Request insurance schedules, broker summaries, and claims history.
    priority: medium
