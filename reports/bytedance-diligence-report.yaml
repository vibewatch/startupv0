    risk_ids:
      - R-001
      - R-002
      - R-008
      - R-010
    sections:
      - section_id: VIII.A
        title: Pending lawsuits against the Company
        checklist_question_ids: [VIII.A]
        summary: >-
          The clearest active public matters are the FTC and DOJ COPPA case and the New Jersey youth-harm lawsuit. These are serious proceedings because they go to platform design, child safety, and data practices rather than peripheral disputes.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: VIII-A-F1
            finding: The FTC and DOJ sued TikTok and ByteDance for alleged COPPA violations and breaches of an existing FTC consent order.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-002
          - finding_id: VIII-A-F2
            finding: New Jersey sued TikTok over alleged unlawful practices harming youth.
            evidence_claim_ids:
              - EC-042
            risk_ids:
              - R-002
        hidden_risks:
          - Safety and privacy cases can drive injunctive remedies that alter product design rather than merely impose fines.
        evidence_gaps:
          - Complaint responses, discovery posture, reserves, and settlement strategy.
        follow_up_questions:
          - What product or data-practice changes are already underway in response to these matters?
        table_ids:
          - T-018
        figure_ids: []
        evidence_claim_ids:
          - EC-022
          - EC-042
      - section_id: VIII.B
        title: Pending lawsuits initiated by Company
        checklist_question_ids: [VIII.B]
        summary: >-
          The most visible company-initiated matter is TikTok Inc. v. Garland, ByteDance's constitutional challenge to the U.S. divest-or-ban law. Compared with the defensive and regulatory docket, the offensive docket appears narrow in public view.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII-B-F1
            finding: TikTok and ByteDance challenged the Protecting Americans from Foreign Adversary Controlled Applications Act and lost in the Supreme Court.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-001
          - finding_id: VIII-B-F2
            finding: No comprehensive public list of other company-initiated litigation was established from the reviewed sources.
            evidence_claim_ids:
              - EC-033
            risk_ids:
              - R-001
        hidden_risks:
          - If offensive legal options narrow, ByteDance may have less negotiating leverage in future U.S. regulatory confrontations.
        evidence_gaps:
          - Full litigation tracker for ByteDance and TikTok initiated matters.
        follow_up_questions:
          - What additional constitutional, administrative, or transactional remedies remain available in the U.S.?
        table_ids:
          - T-019
        figure_ids: []
        evidence_claim_ids:
          - EC-024
          - EC-033
      - section_id: VIII.C
        title: Environmental and employee safety issues and liabilities
        checklist_question_ids: [VIII.C.1, VIII.C.2]
        summary: >-
          No reviewed public source surfaced material parent-level environmental or classic workplace safety controversies. The more material public liability profile is digital safety, privacy, and content governance rather than traditional EHS exposure.
        verification_status: unverified
        confidence: low
        key_findings:
          - finding_id: VIII-C-F1
            finding: Reviewed public sources did not surface a material EHS controversy at the parent level.
            evidence_claim_ids:
