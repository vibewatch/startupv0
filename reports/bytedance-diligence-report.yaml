limitations:
  - limitation_id: L-001
    description: ByteDance is private and does not publish audited financial statements or segment disclosures, so the financial section relies heavily on reputable but anonymous-source reporting.
    affected_chapter_ids:
      - I
    affected_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
  - limitation_id: L-002
    description: Several company pages were JavaScript-heavy or access-limited and had to be retrieved through Jina AI mirrors, which can obscure some page metadata and layout context.
    affected_chapter_ids:
      - II
      - III
      - VI
      - VII
    affected_section_ids:
      - II.A
      - III.B
      - VI.A
      - VII.B
  - limitation_id: L-003
    description: Public case studies are company-authored and therefore helpful for proving existence of traction but not for proving representative customer economics.
    affected_chapter_ids:
      - III
      - V
    affected_section_ids:
      - III.A
      - V.A
      - V.B
      - V.C
  - limitation_id: L-004
    description: No direct interviews, data-room documents, registry sweeps, or contract reviews were conducted, so several legal, customer, and financing conclusions remain provisional.
    affected_chapter_ids:
      - I
      - III
      - VII
      - VIII
    affected_section_ids:
      - I.C
      - III.C
      - VII.D
      - VIII.F
  - limitation_id: L-005
    description: Public personnel and governance disclosure is materially less complete than what a comparable public-company diligence exercise would require.
