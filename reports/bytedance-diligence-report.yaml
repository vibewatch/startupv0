              - EC-023
            risk_ids:
              - R-002
          - finding_id: VIII-G-F3
            finding: ByteDance continues to invest heavily in mitigation through USDS and Project Clover, but those architectures have not eliminated regulatory exposure.
            evidence_claim_ids:
