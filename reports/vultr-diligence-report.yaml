executive_summary:
  overall_assessment: "Vultr is an eligible active private unicorn for this run: public financing evidence supports a
    $3.5B valuation and private operating status, but diligence risk is high because the business is capital-intensive
    and critical financial/customer records are private."
  investment_or_diligence_thesis: Track as a scaled independent cloud and AI infrastructure challenger; proceed only after
    validating financial quality, GPU-capacity economics, customer retention and security/compliance evidence.
  strongest_verified_claims:
    - summary: Public sources corroborate $333M financing at a $3.5B valuation.
      evidence_claim_ids:
        - EC-001
    - summary: Public sources describe 32 cloud data center regions across six continents.
      evidence_claim_ids:
        - EC-003
    - summary: The company remains privately held in reviewed public sources.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-003
      summary: AI/GPU infrastructure capex, utilization and supplier dependency could dominate returns.
    - risk_id: R-005
      summary: Hyperscaler and neocloud competition may compress pricing and margins.
    - risk_id: R-001
      summary: Core financial quality, revenue durability and runway are not public.
  key_evidence_gaps:
    - Audited financials and management accounts
    - Customer concentration, churn, backlog and contract economics
    - Cap table, financing terms and debt instruments
    - GPU supplier contracts, utilization and capacity commitments
    - Security/compliance reports and incident history
  recommended_next_steps:
    - Request financial and cap-table data-room package.
    - Run customer-reference and churn diligence.
    - Review GPU/data-center supply commitments and unit economics.
    - Commission security/compliance diligence before enterprise-risk reliance.
