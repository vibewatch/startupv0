  - figure_id: F-008
    title: Vultr diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Risk heatmap spanning the public diligence register.
    spec:
      x_axis:
        label: Likelihood
        scale:
          - low
          - medium
          - high
      y_axis:
        label: Severity
        scale:
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and runway are not public
          severity: high
          likelihood: medium
          rationale: The $333M financing and $3.5B valuation are public, but revenue, gross margin, cash burn, debt, runway and
            audited financials are unavailable.
        - risk_id: R-002
          label: Financing terms and cap table may carry hidden preferences
          severity: high
          likelihood: medium
          rationale: A large growth financing may include liquidation preferences, investor rights or debt-like terms that are not
            visible in public announcements.
        - risk_id: R-003
          label: AI infrastructure capex and GPU supply dependency
          severity: high
          likelihood: high
          rationale: AI/GPU infrastructure requires expensive hardware, power, data-center capacity and strategic supplier access;
            AMD participation is an advantage but also a dependency.
        - risk_id: R-004
          label: Customer concentration, churn and backlog are undisclosed
          severity: high
          likelihood: medium
          rationale: No public schedule discloses top accounts, renewal cohorts, churn, backlog, contract duration or
            customer-specific profitability.
        - risk_id: R-005
          label: Hyperscaler and neocloud pricing pressure
          severity: high
          likelihood: high
          rationale: Vultr sells into a market shaped by hyperscalers, cloud challengers and GPU-specialist providers with scale
            advantages and aggressive pricing.
        - risk_id: R-006
          label: Management depth and workforce controls are opaque
          severity: medium
          likelihood: medium
          rationale: Founder and CEO identities are public, but full org chart, executive bench, compensation, attrition and
            hiring velocity are not public.
        - risk_id: R-007
          label: Security, compliance and data-residency proof requires private artifacts
          severity: high
          likelihood: medium
          rationale: Cloud infrastructure buyers require strong security, privacy and compliance evidence; public materials do not
            substitute for SOC reports, penetration tests or incident logs.
        - risk_id: R-008
          label: IPO timing could pressure governance and disclosure readiness
          severity: medium
          likelihood: medium
          rationale: Public reporting says Vultr is considering an IPO in coming years; readiness depends on controls, financial
            reporting maturity and legal cleanup.
