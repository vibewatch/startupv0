report_metadata:
  report_title: Vultr Startup Diligence Report
  target_company: Vultr
  website: https://www.vultr.com/
  known_aliases:
    - Constant Company LLC
    - Vultr Holdings LLC
    - Vultr Cloud Compute
  sector: Cloud infrastructure, AI infrastructure and cloud GPUs
  geography: United States; public cloud regions across six continents
  company_stage: Private growth-stage cloud infrastructure unicorn
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public evidence only: unicorn lists, company-owned pages, funding announcements, reputable news, investor/partner
      pages and targeted public eligibility searches."
    - Excluded companies with public IPO, acquisition or shutdown signals; treated valuation and private-company status
      as public-market diligence inputs rather than guarantees.
    - Marked financial statements, cap table, contracts, customer concentration, board materials, security reports,
      legal schedules and HR records as not_publicly_verifiable where not public.
  included_jurisdictions:
    - United States
    - Global cloud regions
    - European Union and other regulated customer jurisdictions
  excluded_topics:
    - Private data room, paid databases, non-public customer references, non-public contracts, privileged legal advice,
      security reports and personal employee records.
  user_provided_materials:
    - material_id: UPM-001
      title: Randomized public unicorn candidate selection from fetched unicorn lists
      type: workflow_selection_record
      date_received: 2026-05-23
      notes: CB Insights list extract showed Vultr as an uncovered unicorn candidate at $3.5B; public sources reviewed did not
        show IPO, acquisition or shutdown.
founder_claims:
