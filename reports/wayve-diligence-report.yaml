report_metadata:
  report_title: Wayve Startup Diligence Report
  target_company: Wayve
  website: https://wayve.ai/
  known_aliases:
    - Wayve Technologies Ltd
    - Wayve AI Driver
    - Wayve Technologies
    - Wayve Labs
  sector: Enterprise Tech; embodied AI and autonomous-driving software for assisted and automated vehicles
  geography: United Kingdom headquarters with public activity in London, Japan, North America, Germany and global OEM/mobility markets
  company_stage: Private unicorn / late-stage autonomous-driving AI company
  research_date: 2026-06-11
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD primary; GBP where UK financial filings are cited
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from user-provided CB Insights unicorn tracker row for Wayve and confirmed the slug was not already reported.
    - Collected public evidence from CB Insights, Wayve-owned pages, partner/customer/investor sources, Companies House, UK Government, UKIPO/IP sources and credible news.
    - Treated company/partner pages as evidence of public claims and requested private data where public sources cannot verify checklist items.
    - Did not rely on paywalled or private systems; no founder interview, data room, customer call or counsel confirmation was available.
  included_jurisdictions:
    - United Kingdom
    - United States public market/partner sources
    - Japan public partner source
    - Public global markets referenced by Wayve materials
  excluded_topics:
    - Private financial statements beyond public snippets
    - Non-public cap table and investor documents
    - Private customer/supplier contracts
    - Non-public safety case and regulatory correspondence
    - Private HRIS/personnel records
    - Code/security audits
  user_provided_materials:
    - material_id: UPM-001
      title: User-selected CB Insights unicorn tracker row for Wayve
      type: workflow_request
      date_received: 2026-06-11
      notes: company=Wayve, slug=wayve, valuation=$8.60B, date joined=2024-05-06, country=United Kingdom, city=London, industry=Enterprise Tech.
founder_claims:
