        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Microsoft Azure, NVIDIA, OEM vehicle/sensor platforms and Uber operations are visible material dependencies; spend, contract terms and redundancy are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E.1
            finding: Azure and NVIDIA are verified technology dependencies.
            evidence_claim_ids:
              - EC-010
              - EC-013
              - EC-026
            risk_ids:
              - R-005
          - finding_id: III.E.2
            finding: OEM sensors/vehicles and Uber operations are key partner dependencies for commercialization.
            evidence_claim_ids:
              - EC-008
              - EC-009
              - EC-026
            risk_ids:
              - R-005
        hidden_risks:
          - Supplier concentration can create lock-in, cost pressure and roadmap dependence.
        evidence_gaps:
          - Top supplier spend, SLAs, minimum commitments, data rights and backup vendors are not public.
        follow_up_questions:
          - Provide supplier spend by vendor, contracts, SLAs, data rights, renewal dates, concentration and exit plans.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-010
          - EC-013
          - EC-026
