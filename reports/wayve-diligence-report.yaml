risk_register:
  - risk_id: R-001
    risk_title: Financial quality and burn opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources disclose funding, valuation and a loss/no-material-revenue signal, but not revenue, margins, cash, debt, backlog, burn, runway or forecast reliability.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited accounts, management accounts, cash/debt schedule, burn/runway bridge, revenue/backlog detail, capex plan and board-approved forecast.
  - risk_id: R-002
    risk_title: Customer concentration and revenue conversion unknown
    risk_category: customer
    severity: high
    likelihood: high
    description: Named partners are public, but contract economics, revenue concentration, minimum volumes, churn and customer satisfaction are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
      - V.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review contracts, invoices, pipeline, renewal and milestone schedules; complete customer/OEM/partner reference calls.
  - risk_id: R-003
    risk_title: Safety, regulatory and liability gating
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: AV deployment requires regulator permissions, validated safety cases, insurance and liability allocation; public trial plans remain supervised and approval-dependent.
    impacted_chapter_ids:
      - VIII
      - II
      - V
    impacted_section_ids:
      - VIII.C
      - VIII.G
      - II.A
      - V.A
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request permits, safety cases, ODDs, incident logs, intervention metrics, insurance, indemnities and regulatory correspondence.
  - risk_id: R-004
    risk_title: Technical generalization and production readiness unproven publicly
    risk_category: technical
    severity: high
    likelihood: medium
    description: Public claims around mapless generalization, L3/L4 capability and world-model testing need independent validation and production-grade evidence.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Commission technical review of model architecture, test logs, benchmarks, safety validation, code/IP ownership, release process and production defect metrics.
  - risk_id: R-005
    risk_title: Partner and platform dependency
    risk_category: operational
    severity: medium
    likelihood: high
    description: Wayve’s model relies on Microsoft Azure, NVIDIA compute, OEM vehicle/sensor integration and Uber/OEM channels, creating dependency and negotiation risk.
    impacted_chapter_ids:
      - III
      - V
      - VI
    impacted_section_ids:
      - III.E
      - V.A
      - VI.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review supplier contracts, SLAs, component allocation, cloud cost commitments, data rights, OEM integration responsibilities and backup plans.
  - risk_id: R-006
    risk_title: Intense autonomous-driving competition
    risk_category: market
    severity: high
    likelihood: high
    description: Waymo and Mobileye show public service/production scale in adjacent segments, while OEMs and tech suppliers compete for control of autonomy stacks.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Benchmark cost, performance, safety, partner terms and go-to-market traction against Waymo, Mobileye and OEM internal programs.
  - risk_id: R-007
    risk_title: Cap-table complexity and investor rights
    risk_category: financing
    severity: medium
    likelihood: high
    description: Late-stage rounds, share-class changes and strategic investors likely create preferences, vetoes and potential down-round/exit constraints not visible publicly.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request fully diluted cap table, option pool, SAFEs/notes, preferences, ROFR/co-sale, protective provisions, side letters and pro forma ownership.
  - risk_id: R-008
    risk_title: Trademark/IP clearance and prosecution risk
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Wayve has public trademark opposition history and possible patent assets; official portfolio, encumbrances and freedom-to-operate require counsel review.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.D
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request IP schedule, prosecution files, assignments, licenses, open-source scan, FTO opinion and litigation/opposition docket summary.
  - risk_id: R-009
    risk_title: Rapid team scaling and retention risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Headcount scaling from 263 to about 650 and late-stage commercialization needs can stress culture, systems, compliance and cost base.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.G
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Review HRIS, attrition by function/location, regretted-loss rate, hiring plan, compensation/option refresh, engagement surveys and succession coverage.
  - risk_id: R-010
    risk_title: Valuation reliance risk
    risk_category: financing
    severity: medium
    likelihood: medium
    description: Public valuation sources agree on $8.6B, but valuation quality depends on terms, milestones, preferences and revenue conversion.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Analyze primary financing documents, post-money mechanics, option pool treatment, milestone funding and valuation support versus comps.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, cash/debt schedule, revenue/backlog and AR aging.
    why_it_matters: Needed to validate revenue quality, burn, runway and valuation support.
    suggested_source_or_request: Company CFO/accountant data-room package and auditor workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preferences, side letters, options, warrants, notes and investor rights.
    why_it_matters: Late-stage valuation may not translate to common-equity value or clean exit economics.
    suggested_source_or_request: Corporate counsel and cap-table administrator exports.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Safety case, ODD definitions, intervention/disengagement rates, incident logs and independent validation.
    why_it_matters: Core technical and regulatory viability depends on demonstrable safety and generalization.
    suggested_source_or_request: Safety, engineering and regulatory data room; independent technical review.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, contract values, minimums, milestones, renewals, churn and customer references.
    why_it_matters: Named partners do not prove revenue conversion or concentration resilience.
    suggested_source_or_request: Executed contracts, invoicing, CRM/export and customer calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend, cloud commitments, NVIDIA supply terms, OEM integration responsibility matrix and backup vendors.
    why_it_matters: Platform dependencies can drive cost, reliability and negotiation risk.
    suggested_source_or_request: Procurement/supplier contracts and CTO/COO interviews.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss data, market share, benchmark performance, pricing comparison and competitive displacement evidence.
    why_it_matters: Competition risk is high and public claims do not prove durable advantage.
    suggested_source_or_request: Sales pipeline, benchmark reports and customer/prospect references.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quotas, cycle length, funnel conversion, CAC/payback and sales hiring plan.
    why_it_matters: Enterprise GTM scalability cannot be assessed from announcements.
    suggested_source_or_request: CRO/finance GTM dashboard and board materials.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D roadmap with gates, compute budget, technical debt, model cards, validation reports and IP ownership.
    why_it_matters: Research credibility must translate into production-ready, defensible products.
    suggested_source_or_request: CTO/science data room, code/IP review and roadmap documents.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount by function/location, attrition, compensation, hiring plan and retention risks.
    why_it_matters: Rapid scale-up and AI talent market can create cost and execution risk.
    suggested_source_or_request: HRIS, payroll, comp bands, option grants and engagement/exit data.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Complete patent/trademark portfolio, assignments, licenses, open-source scan, FTO opinions and IP encumbrances.
    why_it_matters: Autonomous-driving IP disputes and software licensing can impair product rights.
    suggested_source_or_request: IP counsel schedule, prosecution files and code-scanning report.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Permits, regulator correspondence, safety approvals, incident reports and insurance/counsel memos.
    why_it_matters: Deployment is regulator- and liability-gated.
    suggested_source_or_request: Regulatory counsel, safety and insurance data-room documents.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts with Uber, Nissan, Microsoft, NVIDIA, OEMs, suppliers, investors and landlords.
    why_it_matters: Contract terms determine revenue, liability, exclusivity, data rights, termination and dependency risk.
    suggested_source_or_request: Counsel-prepared material contracts schedule and executed agreements.
    priority: high
