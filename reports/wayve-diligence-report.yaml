executive_summary:
  overall_assessment: "Wayve appears eligible for a public-source unicorn diligence report: public records show an active UK private limited company, CB Insights and Balderton support an $8.6B public valuation, and no public IPO/acquisition/shutdown evidence was found. Public partner evidence is unusually strong, but investment-grade diligence is gated by private financials, customer contracts, safety/regulatory records and technical validation."
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if Wayve can prove that its partner-led, mapless AI Driver platform converts into contracted OEM/robotaxi revenue with validated safety, durable unit economics, defensible IP and sufficient runway after high R&D/cloud/safety costs.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Wayve is publicly listed as a private unicorn and Balderton reports an $8.6B Series D post-money valuation.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-004
    - founder_claim_id: FC-004
      summary: Nissan and Uber publicly announced material commercialization relationships with Wayve.
      evidence_claim_ids:
        - EC-008
        - EC-009
    - founder_claim_id: FC-006
      summary: Wayve has public R&D/program evidence across AI Driver, GAIA, LINGO, Azure and NVIDIA platforms.
      evidence_claim_ids:
        - EC-007
        - EC-010
        - EC-011
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, burn, runway and revenue quality are not publicly verifiable.
    - risk_id: R-003
      summary: Safety, regulatory permission and liability allocation gate commercialization.
    - risk_id: R-002
      summary: Customer conversion and concentration remain unknown despite visible Nissan/Uber relationships.
  key_evidence_gaps:
    - Audited financials, cash/debt, burn/runway, revenue, backlog, margin and forecast model.
    - Fully diluted cap table, preferences, share classes, side letters and option pool.
    - Executed customer/partner/supplier contracts with pricing, minimums, data rights, liability and termination terms.
    - Safety case, permits, intervention rates, incidents, insurance and regulatory correspondence.
    - Technical validation, model benchmark evidence, R&D budget, IP/FTO and open-source review.
    - Current org chart, HRIS, attrition, compensation and hiring plan.
  recommended_next_steps:
    - Do not underwrite the $8.6B valuation solely from public sources; reconcile to Series D documents and quality-of-revenue evidence.
    - Prioritize Nissan/Uber contract diligence and customer references before assuming commercial traction.
    - Commission AV safety/regulatory and independent technical diligence before relying on mapless/generalization claims.
    - Review supplier/cloud/NVIDIA/OEM dependencies and cost structure in the financial model.
    - Run formal legal/IP/regulatory docket searches and counsel review.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Wayve has strong public financing/valuation evidence, including $8.6B public valuation anchors and late-stage rounds, but investment-grade financial statements, revenue, margin, cash, debt, forecast and cap-table economics remain private.
    founder_claim_ids:
      - FC-001
      - FC-002
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-005
      - EC-006
      - EC-027
    risk_ids:
      - R-001
      - R-007
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources provide a limited FY2024 loss/no-material-revenue signal and accounts filing status; full financial statements, sales/gross-profit breakdowns, backlog and AR aging are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A.1
            finding: Tech.eu reported a £62M pre-tax loss and no material revenues for the year ending 31 August 2024.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-001
          - finding_id: I.A.2
            finding: Detailed financial statements, backlog, AR aging and management reports are not publicly verifiable.
            evidence_claim_ids:
              - EC-027
            risk_ids:
              - R-001
        hidden_risks:
          - Potentially high burn against pre-revenue or early-revenue commercialization stage.
          - Public valuation may outpace current revenue evidence.
        evidence_gaps:
          - Audited financial statements, management accounts, revenue by product/channel/geography, backlog and AR aging were not public.
        follow_up_questions:
          - Provide audited accounts, monthly management accounts, revenue bridge, backlog, AR aging, gross margin and burn/runway schedule.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-027
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public announcements imply major growth drivers through Nissan, Uber, OEM licensing and robotaxi deployment, but the financial model, pricing, capital expenditure and financing assumptions are private.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B.1
            finding: Partner announcements create forecast-relevant milestones but do not disclose projected revenue or cost assumptions.
            evidence_claim_ids:
              - EC-008
              - EC-009
              - EC-024
            risk_ids:
              - R-001
              - R-002
          - finding_id: I.B.2
            finding: Projection inputs such as CAC, deployment costs, cloud cost, safety-operator costs and pricing are not public.
            evidence_claim_ids:
              - EC-027
              - EC-028
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Forecast risk is high because public evidence is milestone-based rather than financial-model based.
        evidence_gaps:
          - Quarterly projections, pricing assumptions, capex, working capital, external financing assumptions and scenarios are private.
        follow_up_questions:
          - Provide board-approved three-year model, customer pipeline, pricing waterfall, capex/cloud model, hiring plan and downside scenarios.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-024
          - EC-027
          - EC-028
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: CB Insights and Balderton support the $8.6B public valuation, while Companies House shows active share-capital activity and no registered charges; shareholdings, preferences and fully diluted ownership are private.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.C.1
            finding: CB Insights and Balderton both provide $8.6B valuation anchors.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-010
          - finding_id: I.C.2
            finding: Companies House filings show share-class/allotment activity but not economic ownership.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-007
        hidden_risks:
          - Late-stage financing may include preferences, side letters, milestones or strategic rights that public valuation does not reveal.
        evidence_gaps:
          - Current shares outstanding, fully diluted cap table, options/warrants/notes, investor rights and off-balance-sheet liabilities are not public.
        follow_up_questions:
          - Provide fully diluted cap table, share classes, preferences, option pool, debt/SAFE/note schedule, investor rights and side letters.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-005
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: The public financing history is strong, but tax positions, accounting policies, detailed financing terms and current basis for each investor are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D.1
            finding: Public financing history includes a 2024 $1.05B Series C and 2026 $1.2B Series D / $1.5B capital secured.
            evidence_claim_ids:
              - EC-002
              - EC-003
            risk_ids:
              - R-007
              - R-010
          - finding_id: I.D.2
            finding: Companies House records identify latest accounts and zero registered charges but not tax/accounting policies.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-001
        hidden_risks:
          - Tax, R&D credits, revenue recognition and debt/lease obligations can materially affect runway and valuation.
        evidence_gaps:
          - Tax positions, accounting policies, financing terms and current investor basis are not public.
        follow_up_questions:
          - Provide tax memo, accounting policies, R&D capitalization, financing history by investor and current basis.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-005
  - chapter_id: II
    title: Products
    chapter_summary: Wayve publicly markets a sophisticated AI Driver product platform and rides/OEM use cases; product existence is well supported, but independent safety, performance, cost and production-readiness evidence remains private.
    founder_claim_ids:
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-025
      - EC-026
    risk_ids:
      - R-003
      - R-004
      - R-005
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Wayve AI Driver is publicly described as mapless, end-to-end and configurable across L1/L2+/L3/L4; public evidence includes product pages, Uber rides/trials and Nissan integration plans, but market share, cost structure and product profitability are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A.1
            finding: Wayve AI Driver product claims span mapless autonomy, production integration and multiple automation levels.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-004
          - finding_id: II.A.2
            finding: Uber and Nissan provide public application evidence for robotaxi and OEM channels.
            evidence_claim_ids:
              - EC-008
              - EC-009
            risk_ids:
              - R-002
              - R-003
          - finding_id: II.A.3
            finding: Generalization claims across many cities are public but require independent validation.
            evidence_claim_ids:
              - EC-025
            risk_ids:
              - R-004
        hidden_risks:
          - Safety/regulatory validation and production readiness are the core product risks.
          - No public pricing or product margin evidence was found.
        evidence_gaps:
          - Product-level growth rates, market share, cost structure, defect rates, ODD limits and profitability are not public.
        follow_up_questions:
          - Provide product roadmap, safety case, benchmark data, incident/intervention logs, pricing, gross margin and support-cost model.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-009
          - EC-025
          - EC-026
  - chapter_id: III
    title: Customer Information
    chapter_summary: Wayve has strong public strategic-partner signals from Nissan, Uber, Microsoft, NVIDIA and automaker investors, but top-customer revenue, concentration, renewal health and supplier economics are not public.
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-010
      - EC-013
      - EC-026
      - EC-028
    risk_ids:
      - R-002
      - R-005
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public sources identify named counterparties and use cases, but not a top-15 customer list or revenue by application.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A.1
            finding: Nissan and Uber are the clearest public commercial counterparties by application.
            evidence_claim_ids:
              - EC-008
              - EC-009
            risk_ids:
              - R-002
          - finding_id: III.A.2
            finding: Strategic technology partners may be suppliers/investors rather than revenue customers.
            evidence_claim_ids:
              - EC-010
              - EC-013
              - EC-026
            risk_ids:
              - R-005
        hidden_risks:
          - Named partners may represent concentration but revenue weight is unknown.
        evidence_gaps:
          - Top 15 customers, application revenue, timing of purchases and product ownership are not public.
        follow_up_questions:
          - Provide top-customer revenue by application, contract status, renewal/churn and customer references.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-010
          - EC-013
          - EC-028
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: "Strategic relationships are unusually visible for a private company: Nissan definitive agreements, Uber L4 trials, Microsoft Azure and NVIDIA platform collaboration are public."
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: III.B.1
            finding: Nissan definitive agreements and Uber L4 London trials are verified by partner sources.
            evidence_claim_ids:
              - EC-008
              - EC-009
            risk_ids:
              - R-002
              - R-003
          - finding_id: III.B.2
            finding: Microsoft and NVIDIA are central technology partners and dependencies.
            evidence_claim_ids:
              - EC-010
              - EC-013
              - EC-026
            risk_ids:
              - R-005
