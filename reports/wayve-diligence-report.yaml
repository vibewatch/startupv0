    claim_text: Wayve is an active private unicorn with a latest public post-money valuation of $8.6B.
    claim_source: CB Insights unicorn tracker and Balderton Series D announcement
    claim_date: 2026-02-25
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
    contradiction_summary: null
    diligence_follow_up:
      - Request Series C/D financing documents, cap table, liquidation preferences, investor rights, secondary/milestone components and board consents.
  - founder_claim_id: FC-002
    claim_text: Wayve has raised large late-stage financing rounds, including $1.05B Series C and $1.2B Series D / $1.5B capital secured.
    claim_source: UK Government and investor announcements
