        summary: No public regulatory enforcement action was identified in reviewed sources, but AV permitting and safety approval remain central and not fully public.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: VIII.G.1
            finding: Public sources show regulatory engagement and permitting need rather than enforcement history.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-003
          - finding_id: VIII.G.2
            finding: Companies House active status and zero charges do not address AV regulatory compliance.
            evidence_claim_ids:
              - EC-004
              - EC-005
            risk_ids: []
        hidden_risks:
          - Regulator objections, permit delays or incident investigations can materially delay commercialization.
        evidence_gaps:
          - Regulatory enforcement searches, permits, agency correspondence and safety approvals are not public.
        follow_up_questions:
          - Provide permits, agency correspondence, enforcement/investigation history, safety approvals and counsel regulatory memo.
        table_ids:
          - T-020
        figure_ids:
          - F-012
        evidence_claim_ids:
          - EC-004
