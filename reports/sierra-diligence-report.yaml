        quote: Coverage corroborates Sierra raised $950M at a valuation over $15B and references ARR scale.
        location: News report
    analyst_interpretation: Strong public evidence supports the existence of the headline financing announcement; financing documents, investor rights and capitalization are still private.
    limitations: Exact financing terms, liquidation preferences and cap table were not public.
