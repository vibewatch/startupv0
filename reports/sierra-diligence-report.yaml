    why_it_matters: Valuation and exit economics depend on capitalization terms.
    suggested_source_or_request: Request cap table, financing documents and exit waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer-level ARR, churn, NRR and renewal schedule.
    why_it_matters: Customer concentration and retention drive growth durability.
    suggested_source_or_request: Request customer cohort files and top-account contracts.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Pricing, module adoption, gross margin and reliability metrics.
    why_it_matters: Product economics and maturity are central to valuation.
    suggested_source_or_request: Request price book, module telemetry, SLAs and incident history.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Security/privacy/AI governance artifacts.
    why_it_matters: Customer-facing AI agents create sensitive data and model-risk exposure.
    suggested_source_or_request: Request SOC reports, ISO certificates, DPIAs, subprocessors, incidents and model evals.
    priority: high
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC, payback and channel mix.
    why_it_matters: Rapid ARR growth may not equal efficient distribution.
    suggested_source_or_request: Request CRM/pipeline and sales-productivity exports.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, eval metrics and technical debt.
    why_it_matters: Product reliability and roadmap execution can determine retention.
    suggested_source_or_request: Request roadmap, eval suite, bug/incident backlog and release metrics.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS headcount, attrition, compensation and option plan.
    why_it_matters: Talent retention and burn affect execution.
    suggested_source_or_request: Request HRIS export, attrition, comp bands and equity plan.
    priority: medium
  - gap_id: G-009
    chapter_id: III
    section_id: III.E
    missing_information: Supplier contracts and model/cloud concentration.
    why_it_matters: Third-party dependencies affect cost, uptime, privacy and data residency.
    suggested_source_or_request: Request vendor contracts, spend and subprocessor schedule.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Counsel-grade litigation, IP, contract and insurance review.
    why_it_matters: Public sources cannot rule out legal liabilities.
    suggested_source_or_request: Have counsel run docket/IP searches and review contracts/insurance.
    priority: high
  - gap_id: G-011
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, buyer references and competitor pricing comparisons.
