    suggested_source_or_request: Run buyer-reference and win/loss diligence.
    priority: medium
  - gap_id: G-012
    chapter_id: V
    section_id: V.B
    missing_information: Independent customer references and ROI validation.
    why_it_matters: Company-published case studies are not independent proof.
    suggested_source_or_request: Interview customer references and review measured outcomes.
    priority: high
