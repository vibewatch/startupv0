risk_register:
  - risk_id: R-001
    risk_title: Financial quality and ARR durability are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Headline ARR scale is public, but audited financials, revenue recognition, gross margin, churn, NRR and customer concentration are not.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.A
      - I.D
      - III.C
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Run revenue-quality diligence with ARR bridge, audited statements, revenue-recognition memo, cohort retention and customer-contract testing.
  - risk_id: R-002
    risk_title: High valuation multiple sensitivity
    risk_category: financing
    severity: high
    likelihood: medium
    description: At disclosed thresholds, valuation versus ARR frames a very high revenue multiple that is sensitive to growth, retention, margin and AI cost assumptions.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Build valuation bridge, downside cases, comparable-company benchmark and liquidation-preference analysis.
  - risk_id: R-003
    risk_title: Customer concentration and retention opacity
    risk_category: customer
    severity: high
    likelihood: medium
    description: Fortune 50 penetration and named stories are positive, but top-account ARR, deployment depth, renewal status and churn are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request customer list, top-20 ARR, renewal schedule, usage logs, churn/NRR and independent references.
  - risk_id: R-004
    risk_title: Security, privacy and AI-governance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Customer-facing AI agents may process sensitive conversation data and create privacy, model-governance, hallucination, data-retention and regulated-industry obligations.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - VIII.G
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Review SOC/ISO evidence, DPIAs, subprocessors, model evaluations, incident logs, customer DPAs and AI governance program.
  - risk_id: R-005
    risk_title: Product maturity, reliability and implementation burden
    risk_category: product
    severity: medium
    likelihood: medium
    description: Public platform breadth is significant, but production reliability, escalation quality, integration effort and model-performance drift are not public.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Test uptime, evals, incident history, implementation backlog, support tickets and module-level adoption.
  - risk_id: R-006
    risk_title: Competition from incumbents and AI-native startups
    risk_category: market
    severity: high
    likelihood: high
    description: Large software incumbents and specialized AI customer-service vendors publicly target overlapping workflows, increasing pricing and differentiation pressure.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Run buyer/reference diligence, win-loss analysis, pricing comparison and product benchmark against incumbents and AI-native competitors.
  - risk_id: R-007
    risk_title: GTM efficiency and pricing opacity
    risk_category: market
    severity: medium
    likelihood: medium
    description: Enterprise GTM signals are visible, but CAC, payback, quota attainment, discounting, implementation capacity and price realization are private.
    impacted_chapter_ids:
      - II
      - V
    impacted_section_ids:
      - II.A
      - V.A
      - V.D
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request CRM/pipeline data, sales productivity, price book, discount waterfall, implementation capacity and partner-sourced pipeline.
