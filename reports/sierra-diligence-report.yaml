report_metadata:
  report_title: Sierra Startup Diligence Report
  target_company: Sierra
  website: https://sierra.ai/
  known_aliases:
    - Sierra AI
    - Sierra
  sector: Enterprise AI agents, customer experience automation and conversational AI
  geography: United States / San Francisco, California
  company_stage: Private AI unicorn / growth-stage software company
  research_date: 2026-05-18
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth.
    - Prioritized company-owned sources for product, customer, funding, trust and hiring evidence; used independent news and CB Insights for corroborating financing/valuation signals.
    - Treated company-published metrics as public statements requiring private financial/customer/security validation before transaction reliance.
    - No private financials, contracts, customer calls, legal dockets, security artifacts or data-room files were available.
  included_jurisdictions:
    - United States
    - Global customer jurisdictions implicated by enterprise customer-support AI
    - Privacy/security regimes referenced by public Sierra trust materials
  excluded_topics:
    - Non-public financial statements, cap table, contracts, legal dockets, security reports, HR records, customer references, board materials and regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for standard public-evidence Sierra diligence report
      type: workflow_request
      date_received: 2026-05-18
      notes: No pitch deck, founder responses, data room or customer references were provided.
