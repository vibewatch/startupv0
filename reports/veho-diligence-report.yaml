risk_register:
  - risk_id: R-001
    risk_title: Stale valuation and financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Valuation anchors are from 2021-2022 while revenue, margins, burn, debt and current valuation marks are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a67
    mitigation_or_diligence_request: Request audited/management financials, route-level economics, cash runway and cap table.
  - risk_id: R-002
    risk_title: Hub density and route-economics dependency
    risk_category: operational
    severity: high
    likelihood: medium
    description: Last-mile economics depend on route density, warehouse footprint, driver supply, claims and seasonality;
      public metrics do not prove profitability.
    impacted_chapter_ids:
      - II
      - III
      - I
    impacted_section_ids:
      - II.A
      - III.E
      - I.A
    evidence_claim_ids: *a68
    mitigation_or_diligence_request: Request cost per stop, density curves, hub P&L, claims, refunds and service-level credits by market.
  - risk_id: R-003
    risk_title: Driver classification, labor and safety exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Driver-partner model and legal snippets create potential wage/hour, classification, insurance and safety exposure.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.F
      - VIII.A
      - VIII.C
      - VIII.E
      - VIII.G
    evidence_claim_ids: *a69
    mitigation_or_diligence_request: Run counsel review of driver classification, contracts, insurance, NLRB/litigation history and safety incidents.
  - risk_id: R-004
    risk_title: Customer concentration and logo-risk opacity
    risk_category: customer
    severity: medium
    likelihood: high
    description: Recognizable logos are public, but revenue concentration, contract duration and relationship status are not
      disclosed.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a70
    mitigation_or_diligence_request: Request customer revenue by account, active logos, contract terms, churn, NRR and customer references.
  - risk_id: R-005
    risk_title: Service quality, claims and refund economics
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Public OTD, satisfaction and credits/refund improvements are positive but unaudited and may vary by market,
      customer and season.
    impacted_chapter_ids:
      - III
      - V
      - I
    impacted_section_ids:
      - III.A
      - V.B
      - I.A
    evidence_claim_ids: *a71
    mitigation_or_diligence_request: Validate raw delivery, damage, refund, support-ticket and peak-season KPI data.
  - risk_id: R-006
    risk_title: Consumer complaints, labor proceedings and reputational exposure
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: Search snippets show BBB complaints, NLRB case and Theall docket; details and materiality require legal review.
    impacted_chapter_ids:
      - VIII
      - VII
    impacted_section_ids:
      - VIII.A
      - VIII.G
      - VII.F
    evidence_claim_ids: *a72
    mitigation_or_diligence_request: Review complaints, proceedings, settlements, reserves and operating remediation.
  - risk_id: R-007
    risk_title: Competition from parcel incumbents and regional carriers
    risk_category: market
    severity: medium
    likelihood: high
    description: UPS, FedEx, USPS, OnTrac/Lasership and local courier networks can pressure pricing and service levels.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a73
    mitigation_or_diligence_request: Benchmark pricing, service, coverage and claims against parcel incumbents and regional carriers.
  - risk_id: R-008
    risk_title: Founder/team and scaling-process dependency
    risk_category: team
    severity: medium
    likelihood: unknown
