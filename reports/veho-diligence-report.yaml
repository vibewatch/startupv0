executive_summary:
  overall_assessment: "Eligible public unicorn report: Veho has credible public financing and private-status evidence and
    a differentiated ecommerce delivery narrative, but diligence risk is high around stale valuation, route economics,
    driver/labor exposure, customer concentration and service-quality proof."
  investment_or_diligence_thesis: Veho could be valuable if it converts customer-experience and 60+ market claims into
    profitable parcel density and durable enterprise contracts; public evidence supports brand traction more than
    financial quality or labor-risk insulation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and funding snippets support private-unicorn status around $1.5B.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
        - EC-012
    - founder_claim_id: FC-003
      summary: Company pages verify last-mile, brand, 3PL and driver-partner service scope.
      evidence_claim_ids:
        - EC-004
        - EC-006
        - EC-009
    - founder_claim_id: FC-006
      summary: About page verifies Itamar Zur and Fred Cook as co-founders and CEO/CTO.
      evidence_claim_ids:
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and stale 2021-2022 valuation anchors are high-priority risks.
    - risk_id: R-002
      summary: Hub density and route economics may determine whether growth is profitable.
    - risk_id: R-003
      summary: Driver classification, labor, insurance and safety exposure require counsel review.
    - risk_id: R-004
      summary: Logo evidence does not reveal customer concentration, active status or contract quality.
  key_evidence_gaps:
    - Revenue, gross margin, route-level economics, claims/refund costs and cash runway
    - Current cap table, financing terms, preferences, debt and valuation marks
    - Active customer list, revenue concentration, contract terms, churn and references
    - Hub economics, market-level density, delivery KPIs by market and peak-season performance
    - Driver contracts, classification analysis, insurance, safety incidents and labor proceedings
    - Privacy/data security artifacts and consumer-complaint/resolution logs
  recommended_next_steps:
    - Request full finance and route-economics data room before valuation reliance.
    - Conduct customer references and verify active logo status, volumes and contract terms.
    - Have employment/labor counsel review driver-partner model and all proceedings/complaints.
    - Review insurance, claims, safety and privacy controls.
    - Benchmark rates and service quality against parcel incumbents and regional carriers.
