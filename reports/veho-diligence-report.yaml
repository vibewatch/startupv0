    mitigation_or_diligence_request: Request org chart, executive biographies, turnover data, compensation and succession planning.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Revenue, route-level margins, cash burn and current valuation marks
    why_it_matters: Determines whether the $1.5B valuation is supportable.
    suggested_source_or_request: CFO data room, finance exports and board packages
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer and active logo status
    why_it_matters: Logo marketing may mask customer concentration or churn.
    suggested_source_or_request: CRM, billing system, contracts and reference calls
    priority: high
  - gap_id: G-003
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Details and outcomes of NLRB, Theall, driver-rights and BBB complaint signals
    why_it_matters: Labor/consumer-service exposure can affect costs and valuation.
    suggested_source_or_request: Counsel memo, docket pulls, settlements and complaint logs
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Hub economics and service-level performance by market
    why_it_matters: Last-mile delivery profitability depends on density and claims/service levels.
    suggested_source_or_request: Operations dashboards and market P&Ls
    priority: high
