report_metadata:
  report_title: Veho Startup Diligence Report
  target_company: Veho
  website: https://shipveho.com/
  known_aliases:
    - Veho
    - Veho Tech
    - Veho Technologies
    - shipveho
  sector: Last-mile ecommerce logistics and parcel delivery
  geography: United States; public sources list Boulder/Colorado and nationwide U.S. operations
  company_stage: Private unicorn / Series B
  research_date: 2026-05-18
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: America/Denver
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Replacement candidate selected from public unicorn candidate list after VOI eligibility concerns
    - Company-owned product, about, driver, brand and 3PL pages
    - Search-result snippets for financing, eligibility, leadership and legal/labor sweeps
    - No paid data-room, docket, consumer-complaint, lien or private-market database access
  included_jurisdictions:
    - United States federal and state legal/labor issues identified in public snippets
    - U.S. consumer delivery, driver-safety, insurance and privacy issues requiring counsel review
  excluded_topics:
    - No non-public data room
    - No customer or management interviews
    - No paid legal docket, patent, tax, lien or corporate registry searches
    - No security testing or private control reports
    - No audited financial statements, cap table or board materials
  user_provided_materials: []
