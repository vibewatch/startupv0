risk_register:
  - risk_id: R-001
    risk_title: Financial statement and valuation quality
    risk_category: financial
    severity: high
    likelihood: medium
    description: Bolt has public run-rate and valuation signals, but audited financials, service-level margin, cash, debt, burn/runway, and financing terms are not publicly verifiable.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request audited financials, segment P&Ls, cash/debt, credit-facility terms, cap table, and financing documents.
  - risk_id: R-002
    risk_title: Unit economics and multi-service complexity
    risk_category: financial
    severity: high
    likelihood: high
    description: Ride-hailing, delivery, micromobility, car-sharing, and corporate travel have different margin, insurance, subsidy, and capital-intensity profiles.
    impacted_chapter_ids:
      - I
      - II
      - III
      - V
    impacted_section_ids:
      - I.A
      - II.A
      - II.B
      - III.A
      - V.A
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Request city/service P&Ls, contribution margin, subsidy/discounts, insurance losses, vehicle capex, and cohort retention.
  - risk_id: R-003
    risk_title: Operational dependency and safety risk
    risk_category: operations
    severity: high
    likelihood: high
    description: Bolt depends on driver/courier/merchant/fleet supply, city permits, app reliability, safety, vehicle availability, payments, and local operations across 50+ countries.
    impacted_chapter_ids:
      - II
      - III
      - VI
    impacted_section_ids:
      - II.B
      - III.B
      - VI.A
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Review marketplace supply metrics, permits, safety incidents, insurance, vendor contracts, city compliance, and uptime.
  - risk_id: R-004
    risk_title: Competitive intensity across multiple verticals
    risk_category: market
    severity: high
    likelihood: high
    description: Bolt competes against global ride-hailing, taxi, delivery, micromobility, car-sharing, corporate travel, and AV players that can subsidize markets or bundle services.
    impacted_chapter_ids:
      - IV
      - V
      - VI
    impacted_section_ids:
      - IV.A
      - IV.B
      - V.A
      - V.B
      - VI.A
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Request market share, city-level win/loss, take rates, pricing, driver incentives, CAC, and competitor benchmarking.
  - risk_id: R-005
    risk_title: Labor, regulatory, licensing, and legal exposure
    risk_category: legal
    severity: critical
    likelihood: high
    description: The UK worker-status ruling and multi-market transport/delivery regulation create potentially material labor, minimum wage, benefits, tax, licensing, and insurance exposure.
    impacted_chapter_ids:
      - VIII
      - II
      - III
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - II.B
      - III.B
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Request counsel schedule, employment classification analysis, tribunal/appeal status, regulatory correspondence, city permits, insurance, and reserves.
  - risk_id: R-006
    risk_title: Founder/key-person and international scaling risk
    risk_category: people
    severity: medium
    likelihood: medium
    description: Bolt has founder-led history and 4,000+ employees across many hubs; management depth, attrition, labor compliance, and operational controls require validation.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Request org chart, HRIS, attrition, compensation, country employment compliance, executive agreements, and succession plan.

diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, cash, burn, runway, revenue-recognition policy, margin bridge, debt, and tax positions.
    why_it_matters: Public valuation and operating claims cannot be translated into financial quality without primary records.
    suggested_source_or_request: Audited statements, management accounts, revenue schedules, board plan, bank/debt files, and tax workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Cap table, stock ledger, financing documents, liquidation preferences, investor rights, option plan, debt, warrants, and secondary/tender history.
    why_it_matters: Security terms determine ownership, governance, downside protection, and common-equity value.
    suggested_source_or_request: Charter, investor-rights agreement, voting agreement, ROFR/co-sale, financing documents, and stock-ledger export.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top-customer or user concentration, retention cohorts, churn, net expansion, usage intensity, support burden, and customer reference outcomes.
    why_it_matters: Durability depends on customer quality rather than top-line adoption claims.
    suggested_source_or_request: Customer cohort files, CRM export, product analytics, support tickets, and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.A
    missing_information: CAC, payback, sales-cycle length, pipeline conversion, channel mix, win/loss, and international or segment-level launch economics.
    why_it_matters: GTM efficiency determines whether growth can continue without excessive burn or discounting.
    suggested_source_or_request: Marketing attribution export, CRM pipeline, bookings bridge, sales productivity report, and channel cohort analysis.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.A
    missing_information: Product roadmap, R&D budget, incident history, uptime/SLOs, security reviews, model/vendor evaluations, and technical debt backlog.
    why_it_matters: Technology claims require reliability, roadmap, and dependency validation.
    suggested_source_or_request: Roadmap, architecture diagrams, incident postmortems, SOC/security reports, and vendor/model evaluation logs.
    priority: medium
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Counsel litigation schedule, regulator correspondence, employment matters, privacy incidents, tax notices, insurance claims, and settlement history.
    why_it_matters: Public pages rarely reveal contingent liabilities or regulator interactions.
    suggested_source_or_request: Legal schedule, outside counsel memos, regulator correspondence, insurance binders, and docket pulls.
    priority: high

