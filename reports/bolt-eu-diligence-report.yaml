    diligence_follow_up:
      - Request org chart, HRIS, attrition, executive agreements, board roster, employment compliance, and succession plan.

executive_summary:
  overall_assessment: Bolt has strong public scale signals for a private mobility platform, including company-owned GMV/revenue run-rate claims, large customer/partner counts, 50+ country reach, and multiple service lines. However, the risk profile is materially higher than a pure software unicorn because unit economics, labor classification, city permitting, insurance/safety, credit facility terms, and service-level profitability require private and legal diligence.
  investment_or_diligence_thesis: The diligence question is whether Bolt can turn global mobility scale into durable cash generation across ride-hailing, delivery, micromobility, car-sharing, and business travel while containing labor/regulatory liabilities and city-level competitive subsidy pressure.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Company-owned and secondary sources support Bolt's broad multi-service mobility footprint across 50+ countries and 850 cities.
      evidence_claim_ids:
        - EC-002
        - EC-004
    - founder_claim_id: FC-003
      summary: Bolt company page provides unusually specific company-owned run-rate and scale metrics, though they require audit support.
      evidence_claim_ids:
        - EC-002
        - EC-017
    - founder_claim_id: FC-005
      summary: Company-owned materials support founder history and 4,000+ employee scale.
      evidence_claim_ids:
        - EC-015
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: Bolt has public run-rate and valuation signals, but audited financials, service-level margin, cash, debt, burn/runway, and financing terms are not publicly verifiable.
    - risk_id: R-002
      summary: Ride-hailing, delivery, micromobility, car-sharing, and corporate travel have different margin, insurance, subsidy, and capital-intensity profiles.
    - risk_id: R-003
      summary: Bolt depends on driver/courier/merchant/fleet supply, city permits, app reliability, safety, vehicle availability, payments, and local operations across 50+ countries.
  key_evidence_gaps:
    - Audited financials, GMV/revenue run-rate bridge, service-level gross margin, city P&Ls, cashflow reconciliation, debt/credit facility terms, and reserves.
    - Driver/courier/merchant/customer cohorts, supply concentration, retention, safety incidents, insurance losses, incentives, and market-level liquidity.
    - Labor classification memos, UK tribunal/appeal status, regulatory correspondence, city permits, tax positions, and insurance coverage.
    - Current cap table, financing terms, investor rights, HRIS, attrition, management depth, and international controls.
  recommended_next_steps:
    - Run service- and city-level financial diligence around take rate, contribution margin, incentives, insurance, vehicle capex, and cash conversion.
    - Prioritize legal diligence on worker classification, UK tribunal exposure, permits, tax, insurance, privacy, safety, and regulatory correspondence.
    - Validate marketplace liquidity and retention with driver/courier/merchant/customer cohorts and top-market concentration.
    - Benchmark city-by-city against Uber, local taxi platforms, FreeNow, Lime/Tier/Voi, Wolt/Glovo/Deliveroo, car-sharing operators, and AV alternatives.

