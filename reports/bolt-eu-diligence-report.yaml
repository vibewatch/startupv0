
report_metadata:
  report_title: Bolt Technology OÜ Startup Diligence Report
  target_company: Bolt Technology OÜ
  website: https://bolt.eu/
  known_aliases:
    - Bolt
    - Taxify
    - Bolt.eu
  sector: Mobility, ride-hailing, micromobility, delivery, car-sharing, and corporate travel
  geography: Estonia headquartered; operations across Europe, Africa, Asia, Latin America, and selected North American markets
  company_stage: Private unicorn
  research_date: 2026-05-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: EUR unless otherwise noted; CB Insights valuation in USD
  time_zone: Europe/Tallinn

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Selected Bolt Technology OÜ at random from a parsed CB Insights unicorn tracker after excluding report slugs already present in reports/.
    - Prioritized company-owned product, pricing, about, security, privacy, customer, and legal pages where accessible.
    - Supplemented with public unicorn trackers, independent or secondary public funding coverage, and public encyclopedia/news snippets when primary documents were unavailable.
    - Did not bypass paywalls, bot checks, rate limits, private systems, or access controls; inaccessible or unavailable records are listed as limitations.
  included_jurisdictions:
    - Estonia
    - European Union
    - United Kingdom
    - Africa and other operating countries where service is offered
  excluded_topics:
    - Audited financial statements, bank statements, board materials, revenue-recognition memos, cap table, option plan, debt agreements, investor rights, and detailed financing documents were not public.
    - Customer references, retention cohorts, churn, top-customer concentration, pipeline, CAC, payback, sales productivity, and vendor contracts were not available.
    - Comprehensive docket, lien, tax, employment, regulatory, insurance, privacy, patent, trademark, and open-source compliance searches require specialist databases or company counsel schedules.
  user_provided_materials:
    - material_id: UPM-001
      title: Autonomous random-unicorn diligence request
      type: workflow_request
      date_received: 2026-05-17
      notes: No management presentation, founder deck, data-room export, customer reference, or company response was provided.

