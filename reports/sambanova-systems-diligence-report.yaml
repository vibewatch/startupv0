executive_summary:
  overall_assessment: SambaNova Systems appears to be an active uncovered private unicorn based on the fetched CB Insights list and active public company/product materials. Public evidence supports status screening and product/GTM presence, but investment-grade diligence remains unresolved because financials, customer quality, contracts, legal/regulatory posture, cap table and personnel data are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A thesis for SambaNova Systems depends on proving durable revenue or utilization growth, retention, margin, defensible product value, compliance posture, leadership depth and financing terms beyond public-list valuation evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists SambaNova Systems as a $5B private unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: SambaNova Systems publicly markets an active product/service platform.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: SambaNova Systems has public customer, buyer, partner or demand-channel signals.
      evidence_claim_ids:
        - EC-005
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Capital intensity and private financial-quality gap
    - risk_id: R-003
      summary: Customer concentration and sovereign deployment contract risk
    - risk_id: R-004
      summary: Competition against GPU/cloud incumbents and custom-silicon peers
  key_evidence_gaps:
    - Audited financial statements, KPI pack and cash/debt schedule
    - Fully diluted cap table, preferences, debt and investor rights
    - Top customer or clinic/user cohort revenue, utilization, renewal and satisfaction data
    - Sales productivity, funnel conversion, CAC, payback and budget data
    - Roadmap, technical benchmarks, security/quality artifacts and incident history
  recommended_next_steps:
    - Do not rely on public valuation without financing documents, cap table and quality-of-revenue or utilization analysis.
    - Run customer/user cohort, reference and contract diligence before underwriting retention or concentration.
    - Have specialists review product/technical, security/privacy, regulatory/legal and IP evidence before investment reliance.
