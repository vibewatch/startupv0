report_metadata:
  report_title: SambaNova Systems Startup Diligence Report
  target_company: SambaNova Systems
  website: https://sambanova.ai/
  known_aliases:
    - SambaNova
    - SambaNova Systems, Inc.
  sector: AI inference infrastructure, dataflow chips, and full-stack enterprise AI platforms
  geography: United States (San Jose) with global enterprise, government, and sovereign AI deployments
  company_stage: Private unicorn / growth-stage AI infrastructure company
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing reports and selected this target randomly from uncovered CB Insights unicorn-list candidates.
    - Used public-source diligence only; no private data room, founder interview, customer call, counsel memo, security report or regulatory search artifact was available.
    - Treated company-owned pages as evidence of public claims, not independent proof of performance.
    - Fetched CB Insights current unicorn list, SambaNova company/product pages and sovereign AI materials through public web readers.
  included_jurisdictions:
    - United States
    - Public global markets referenced by company materials
  excluded_topics:
    - Non-public financial statements, cap table, board materials, contracts, security reports, customer calls, HRIS/personnel records and privileged legal/regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-25
      notes: No pitch deck, financial model, founder responses or private data room were provided.
