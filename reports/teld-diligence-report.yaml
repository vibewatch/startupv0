    - EC-016
    - EC-029
    - EC-032
  - section_id: VIII.D
    title: Material patents, copyrights, licenses, and trademarks
    checklist_question_ids:
    - VIII.D
    summary: Public IP evidence includes a WIPO trademark and at least one WIPO patent
      application associated with TELD-related entities; full IP ownership/FTO is
      not public.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VIII.D-1
      finding: WIPO trademark and patent aggregator records support public IP activity.
      evidence_claim_ids:
      - EC-021
      - EC-022
      risk_ids:
      - R-009
      - R-007
    - finding_id: VIII.D-2
      finding: Complete patent family, assignments, licenses and freedom-to-operate
        analysis are not public.
      evidence_claim_ids:
      - EC-021
      risk_ids:
      - R-009
    hidden_risks:
    - Charging standards and high-power architectures may require licenses or expose
      TELD to infringement risk.
    - IP may be held by affiliates or subsidiaries rather than TELD parent entity.
    evidence_gaps:
    - Patent/trademark portfolio export, assignments, inbound/outbound licenses, open-source
      and standards-essential patent exposure.
    follow_up_questions:
    - Request counsel-prepared IP schedule and FTO analysis.
    table_ids:
    - T-024
    figure_ids: []
    evidence_claim_ids:
    - EC-021
    - EC-022
  - section_id: VIII.E
    title: Insurance coverage and material exposures
    checklist_question_ids:
    - VIII.E
    summary: Insurance coverage is not public. TGOOD discloses insurance-industry
      partnerships for battery-degradation services, which is distinct from TELD's
      own coverage.
    verification_status: not_publicly_verifiable
    confidence: low
    key_findings:
    - finding_id: VIII.E-1
      finding: Public evidence shows partnerships with five insurers for user-facing
        battery-degradation protection, not TELD's corporate insurance limits.
      evidence_claim_ids:
      - EC-009
      risk_ids:
      - R-006
    hidden_risks:
    - Product liability, cyber, property, business interruption and environmental
      limits may be inadequate for high-power charging operations.
    evidence_gaps:
    - Insurance policies, limits, deductibles, claims history and named insureds.
    follow_up_questions:
    - Provide full insurance schedule and loss runs.
    table_ids: []
    figure_ids: []
    evidence_claim_ids:
    - EC-009
  - section_id: VIII.F
    title: Material contracts
    checklist_question_ids:
    - VIII.F
    summary: Material contract signals are public for IONCHI, ENEOS, Foton and Neolix,
      but terms and obligations are not.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VIII.F-1
      finding: Public sources identify several material partnership/contract relationships.
      evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-012
      - EC-013
      risk_ids:
      - R-004
      - R-010
    - finding_id: VIII.F-2
      finding: Full legal terms, exclusivity, warranties, termination rights and capex
        commitments remain private.
      evidence_claim_ids:
      - EC-027
      - EC-028
      risk_ids:
      - R-004
      - R-002
    hidden_risks:
    - Publicly announced JVs may impose capital commitments or exclusivity not visible
      in articles.
    - Station construction contracts may carry performance, uptime and safety warranties.
    evidence_gaps:
    - Top material contracts, amendments, guarantees, performance obligations and
      related-party agreements.
    follow_up_questions:
    - Provide data room of top contracts and legal memo summarizing obligations.
    table_ids: []
    figure_ids: []
    evidence_claim_ids:
    - EC-010
    - EC-011
    - EC-012
    - EC-013
    - EC-027
    - EC-028
  - section_id: VIII.G
    title: Regulatory agency problems
    checklist_question_ids:
    - VIII.G
    summary: A historical SAMR antitrust filing penalty is verified; no current agency
      problem was verified, but regulatory searches were incomplete.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VIII.G-1
      finding: SAMR fined TELD CNY500,000 in 2021 for failure to notify the Didi/Hui
        Di JV concentration; SAMR did not find competition harm.
      evidence_claim_ids:
      - EC-018
      risk_ids:
      - R-005
    - finding_id: VIII.G-2
      finding: No evidence of IPO, acquisition or shutdown was found; TELD appears
        active as an unlisted controlled subsidiary.
      evidence_claim_ids:
      - EC-030
      risk_ids:
      - R-001
      - R-007
    hidden_risks:
    - Future JVs, data partnerships and energy-market activities may require merger-control,
      data, cybersecurity or power-market compliance.
    - Regulatory records may require local database access beyond public web searches.
    evidence_gaps:
    - Official SAMR, cybersecurity, energy-regulator, safety and local administrative-penalty
      searches.
    follow_up_questions:
    - Have counsel verify all regulatory agency actions and required filings.
    table_ids: []
    figure_ids:
    - F-011
    - F-012
    evidence_claim_ids:
    - EC-018
    - EC-030
