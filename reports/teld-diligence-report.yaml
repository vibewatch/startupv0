executive_summary:
  overall_assessment: 'Eligible for this public-source run: TELD appears to be an
    active unlisted/private unicorn tracked by CB Insights, but it is controlled by
    listed parent TGOOD and requires standalone financial, cap-table and legal diligence
    before any investment reliance.'
  investment_or_diligence_thesis: TELD has unusually strong public operating-scale
    evidence for a private unicorn—China-leading charging-network metrics, named OEM/JV
    relationships and advanced charging/R&D roadmap—but the investability question
    turns on opaque standalone economics, parent-control governance, competition,
    working capital and regulatory/legal controls.
