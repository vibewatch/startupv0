risk_register:
- risk_id: R-001
  risk_title: Standalone financial opacity and public-parent control
  risk_category: financial
  severity: high
  likelihood: high
  description: TELD is an unlisted TGOOD-controlled subsidiary, and public sources
    provide mostly parent or charging-segment figures rather than audited standalone
    TELD financial statements, customer revenue, debt or cap-table detail.
  impacted_chapter_ids:
  - I
  - VII
  - VIII
  impacted_section_ids:
  - I.A
  - I.C
  - I.D
  - VII.A
  - VIII.F
  evidence_claim_ids:
  - EC-004
  - EC-025
  - EC-031
  mitigation_or_diligence_request: Request audited TELD financials, cap table, debt
    schedule, shareholder agreements, board minutes, related-party transactions and
    carve-out bridge from TGOOD segment disclosures.
- risk_id: R-002
  risk_title: Capital intensity, working-capital and receivables exposure
  risk_category: financial
  severity: high
  likelihood: medium
  description: Charging networks require site, grid, equipment and operations investment;
    TGOOD reports large receivables and charging-network expansion risks that could
    affect cash conversion.
  impacted_chapter_ids:
  - I
  - III
  - V
  impacted_section_ids:
  - I.A
  - I.B
  - III.E
  - V.E
  evidence_claim_ids:
  - EC-004
  - EC-017
  mitigation_or_diligence_request: Obtain TELD capex plan, site economics, utilization
    cohorts, AR aging, bad-debt reserve policy, cash-flow forecasts and funding commitments.
- risk_id: R-003
  risk_title: Intense operator competition and pricing pressure
  risk_category: market
  severity: high
  likelihood: high
  description: TELD ranks first by public charging piles, but mid-2024 data show Star
    Charge and Cloud Quick Charge close behind and the top three controlling over
    half the market.
  impacted_chapter_ids:
  - IV
  - V
  - I
  impacted_section_ids:
  - IV.A
  - V.A
  - I.B
  evidence_claim_ids:
  - EC-014
  - EC-015
  mitigation_or_diligence_request: Request station-level utilization, price realization,
    churn, win/loss, local concession terms and subsidy exposure by city.
- risk_id: R-004
  risk_title: Customer and partner concentration not publicly quantified
  risk_category: customer
  severity: medium
  likelihood: unknown
  description: Public sources identify automaker, IONCHI, ENEOS, Foton and Neolix
    relationships, but top-customer revenue and concentration are not disclosed.
  impacted_chapter_ids:
  - III
  - V
  impacted_section_ids:
  - III.A
  - III.C
  - V.B
  evidence_claim_ids:
  - EC-009
  - EC-011
  - EC-027
  mitigation_or_diligence_request: Request top-15 customers for 2024-2026 YTD, contract
    values, renewal dates, gross margin by customer and concentration covenants.
- risk_id: R-005
  risk_title: Regulatory and litigation overhang
  risk_category: regulatory
  severity: medium
  likelihood: medium
  description: TELD received a 2021 SAMR fine for failure to notify a joint venture
    concentration and has public litigation/hearing signals, though available evidence
    does not show material damages.
  impacted_chapter_ids:
  - VIII
  impacted_section_ids:
  - VIII.A
  - VIII.G
  evidence_claim_ids:
  - EC-018
  - EC-019
  - EC-020
  mitigation_or_diligence_request: Have PRC counsel run full SAMR, court, enforcement,
    administrative-penalty and credit-record searches for TELD and major subsidiaries.
- risk_id: R-006
  risk_title: Product safety and charging reliability obligations
  risk_category: product
  severity: high
  likelihood: medium
  description: High-power charging, battery diagnostics and automated charging could
    create safety, warranty, cyber and uptime exposure if performance claims are not
    proven in operating data.
  impacted_chapter_ids:
  - II
  - VI
  - VIII
  impacted_section_ids:
  - II.A
  - VI.B
  - VIII.C
  evidence_claim_ids:
  - EC-008
  - EC-016
  mitigation_or_diligence_request: Request safety certifications, incident logs, charger
    failure rates, warranty reserves, product-liability insurance and third-party
    technical audits.
- risk_id: R-007
  risk_title: Cap-table complexity and minority-investor liquidity
  risk_category: financing
  severity: medium
  likelihood: medium
  description: Public sources name TGOOD and outside A-round investors, but options,
    warrants, minority rights and any 2026 stake transfers are not public.
  impacted_chapter_ids:
  - I
  - VIII
  impacted_section_ids:
  - I.C
  - I.D
  - VIII.F
  evidence_claim_ids:
  - EC-003
  - EC-031
  mitigation_or_diligence_request: Request full securities ledger, shareholder agreements,
    transfer restrictions, employee incentives and any current stake-transfer documents.
- risk_id: R-008
  risk_title: Data privacy, cybersecurity and data-monetization compliance
  risk_category: technical
  severity: medium
  likelihood: medium
  description: TGOOD says the platform generates large user, vehicle, battery and
    energy datasets and monetizes data-support services, creating privacy, cybersecurity
    and data-governance diligence needs.
  impacted_chapter_ids:
  - III
  - VI
  - VIII
  impacted_section_ids:
  - III.B
  - VI.B
  - VIII.G
  evidence_claim_ids:
  - EC-009
  - EC-016
  mitigation_or_diligence_request: Request cybersecurity filings, PIPL/data-sharing
    policies, security audits, data-rights terms with OEMs and incident history.
- risk_id: R-009
  risk_title: R&D execution risk in liquid-cooled, autonomous and V2G products
  risk_category: technical
  severity: medium
  likelihood: medium
  description: Public R&D projects target advanced liquid-cooled charging, battery-safety
    AI, V2G and automatic charging, but commercialization milestones and TELD-specific
    budgets are incomplete.
  impacted_chapter_ids:
  - VI
  - II
  impacted_section_ids:
  - VI.B
  - II.A
  evidence_claim_ids:
  - EC-008
  - EC-016
  - EC-021
  mitigation_or_diligence_request: Request product roadmap, certification status,
    R&D spend by project, launch gates, IP assignments and pilot conversion metrics.
- risk_id: R-010
  risk_title: China policy, grid-access and local-site dependency
  risk_category: operational
  severity: medium
  likelihood: medium
  description: Charging-network economics depend on local grid capacity, site leases,
    utilization, electricity tariffs, demand-response programs and policy support.
  impacted_chapter_ids:
  - I
  - III
  - V
  - VIII
  impacted_section_ids:
  - I.B
  - III.E
  - V.A
  - VIII.C
  evidence_claim_ids:
  - EC-004
  - EC-010
  mitigation_or_diligence_request: Request city-by-city permits, grid-connection agreements,
    electricity-tariff exposure, subsidy schedules and landlord/site contracts.
diligence_gaps:
- gap_id: G-001
  chapter_id: I
  section_id: I.A
  missing_information: TELD standalone audited financial statements and QoE bridge.
  why_it_matters: Segment figures cannot prove standalone revenue quality, margins
    or cash conversion.
  suggested_source_or_request: Audited financials, management accounts and TGOOD bridge.
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.C
  missing_information: Current cap table, minority rights, options/warrants and debt.
  why_it_matters: Parent control and outside investors affect exit and dilution.
  suggested_source_or_request: Securities ledger, shareholder agreements and debt
    schedule.
  priority: high
- gap_id: G-003
  chapter_id: I
  section_id: I.B
  missing_information: Three-year financial projections and utilization/capex assumptions.
  why_it_matters: Charging economics are sensitive to utilization, tariffs and capex.
  suggested_source_or_request: Board-approved model with scenarios.
  priority: high
- gap_id: G-004
  chapter_id: II
  section_id: II.A
  missing_information: Pricing, gross margin, BOM, warranty reserves and safety certifications
    by product.
  why_it_matters: Product economics and liability cannot be underwritten from public
    claims.
  suggested_source_or_request: Product P&L, certifications and incident history.
  priority: high
- gap_id: G-005
  chapter_id: III
  section_id: III.C
  missing_information: Top-customer revenue concentration and churn.
  why_it_matters: Partner breadth does not prove diversified revenue.
  suggested_source_or_request: Top-15 customer ledger and contracts.
  priority: high
- gap_id: G-006
  chapter_id: III
  section_id: III.E
  missing_information: Top suppliers, grid/site contracts and landlord dependencies.
  why_it_matters: Network rollout depends on grid, sites and equipment supply.
  suggested_source_or_request: Supplier spend, grid agreements and lease/concession
    schedule.
  priority: high
- gap_id: G-007
  chapter_id: IV
  section_id: IV.A
  missing_information: Market share by kWh/revenue/utilization and competitor pricing
    by city.
  why_it_matters: Pile-count leadership can overstate economic share.
  suggested_source_or_request: Market/pricing benchmark and station cohorts.
  priority: medium
- gap_id: G-008
  chapter_id: V
  section_id: V.D
  missing_information: Sales productivity, CAC/payback, pipeline and marketing budget.
  why_it_matters: Repeatability of partner/JV wins is unverified.
  suggested_source_or_request: CRM export, quota plan and budget-to-actuals.
  priority: medium
- gap_id: G-009
  chapter_id: VI
  section_id: VI.A
  missing_information: TELD-specific R&D org, spend and IP assignment.
  why_it_matters: Parent R&D may not equal TELD-owned capability.
  suggested_source_or_request: R&D budget, personnel roster and IP assignment documents.
  priority: high
- gap_id: G-010
  chapter_id: VI
  section_id: VI.B
  missing_information: Technical validation for high-power, autonomous and battery-safety
    products.
  why_it_matters: Safety/product claims need independent evidence.
  suggested_source_or_request: Certification files, test reports and field reliability
    data.
  priority: high
- gap_id: G-011
  chapter_id: VII
  section_id: VII.A
  missing_information: Current org chart, board composition and delegated authorities.
  why_it_matters: Parent/subsidiary governance affects accountability.
  suggested_source_or_request: Board/management org chart and authority matrix.
  priority: medium
- gap_id: G-012
  chapter_id: VII
  section_id: VII.D
  missing_information: Employment agreements, compensation and incentive plans.
  why_it_matters: Retention/dilution/cash obligations are unknown.
  suggested_source_or_request: Executive agreements and incentive ledgers.
  priority: medium
- gap_id: G-013
  chapter_id: VIII
  section_id: VIII.A
  missing_information: Official litigation and enforcement search.
  why_it_matters: News/legal aggregators are incomplete.
  suggested_source_or_request: PRC counsel court/enforcement search and counsel letter.
  priority: high
- gap_id: G-014
  chapter_id: VIII
  section_id: VIII.G
  missing_information: Regulatory compliance history for SAMR, cybersecurity, energy
    and safety agencies.
  why_it_matters: Historical SAMR fine and data/energy activities create regulatory
    exposure.
  suggested_source_or_request: Counsel regulatory search and compliance remediation
    docs.
  priority: high
- gap_id: G-015
  chapter_id: VIII
  section_id: VIII.D
  missing_information: Full IP portfolio, assignments, licenses and FTO.
  why_it_matters: Aggregator patent/trademark records are insufficient for defensibility.
  suggested_source_or_request: Counsel IP schedule and FTO opinion.
  priority: medium
- gap_id: G-016
  chapter_id: VIII
  section_id: VIII.E
  missing_information: Insurance policies, loss runs and EHS incident logs.
  why_it_matters: High-power charging needs adequate coverage and safety controls.
  suggested_source_or_request: Insurance schedule, loss runs and EHS audit logs.
