executive_summary:
  overall_assessment: Neuralink appears eligible for this run as a still-private unicorn target based on the current CB Insights unicorn-list row and active public operating pages. Public evidence supports product/activity and selected demand/team signals, but core investment diligence remains unresolved because financials, cap table, retention, contracts, legal/compliance records and management materials are private.
  investment_or_diligence_thesis: Proceed only after clinical, regulatory, safety, manufacturing and financing diligence. Public sources validate active trials and a unicorn-list valuation, but not clinical outcomes, commercial pricing, reimbursement, cap table or adverse-event history beyond public study listings.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Neuralink as a $9.65B unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company/public sources verify active product positioning for Neuralink.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-005
      summary: Public R&D, hiring or team signals indicate an active operating profile.
      evidence_claim_ids:
        - EC-007
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Clinical and regulatory approval risk for an invasive implantable device
    - risk_id: R-002
      summary: No public revenue, reimbursement, margin or runway evidence despite high valuation
    - risk_id: R-003
      summary: Operational and reputational exposure from surgery, patient safety and hardware manufacturing complexity
  key_evidence_gaps:
    - Audited financials, ARR/bookings bridge, gross margin, cash, debt, burn and forecast model.
    - Cap table, preferences, option pool, warrants/notes/debt and financing documents.
    - Top customer/user/patient cohorts, revenue concentration, churn, NRR, contracts and reference calls.
    - CAC, payback, channel mix, quota attainment, sales cycle and pipeline quality.
    - Legal, regulatory, privacy/security, IP, insurance and material-contract schedules.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on the headline valuation.
    - Request cap table and financing documents to model downside preference stack and dilution.
    - Validate demand quality through cohorts, contracts, references and support metrics.
    - Have counsel review regulatory, privacy, security, IP, insurance and material contracts.
    - Benchmark product and pricing against competitors using buyer references and win/loss data.
