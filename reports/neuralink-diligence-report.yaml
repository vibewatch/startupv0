report_metadata:
  report_title: Neuralink Startup Diligence Report
  target_company: Neuralink
  website: https://neuralink.com/
  known_aliases:
    - Neuralink Corp
    - N1 Implant
    - R1 Robot
    - Telepathy
  sector: Healthcare and life sciences / implantable brain-computer interfaces
  geography: United States; Fremont, South San Francisco, Austin and U.S. clinical sites
  company_stage: Private unicorn / clinical-stage neurotechnology medical-device company
  research_date: 2026-06-09
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from existing reports and selected this company from the CB Insights unicorn list using shuf -n 3.
    - Used public company-owned pages, public market database evidence, investor/company pages and public registry/privacy/careers sources available through curl/Jina Reader.
    - Treated company-published and investor-published claims as evidence of public statements unless independently corroborated.
    - Marked financial statements, cap table, contracts, customer cohorts, HR records, security reports and legal schedules as not_publicly_verifiable when private records were required.
  included_jurisdictions:
    - United States
    - Public jurisdictions referenced by source materials
  excluded_topics:
    - Private data room, management interviews, customer calls, legal docket searches outside public page review, paywalled sources and non-public regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-09
      notes: No pitch deck, financial model, founder responses, data room or customer references were provided.
