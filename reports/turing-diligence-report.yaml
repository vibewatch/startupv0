executive_summary:
  overall_assessment: Public evidence supports continued diligence on Turing as an active private unicorn candidate with credible financing history, active AI product positioning and public research assets. However, investability depends on private validation of valuation support, revenue quality, customer concentration, product margins, data/privacy governance and legal/contract exposure.
  investment_or_diligence_thesis: "Proceed only with data-room diligence: Turing could be a differentiated AI post-training and enterprise AI services platform, but the public record is insufficient to underwrite current valuation, ARR durability or risk-adjusted margins."
  strongest_verified_claims:
    - founder_claim_id: FC-TUR-003
      summary: Turing publicly describes datasets, RL environments, safety, enterprise AI systems and AI talent offerings.
      evidence_claim_ids:
        - EC-TUR-006
    - founder_claim_id: FC-TUR-006
      summary: Turing Research publicly presents SWE-Bench++ and CRAVE benchmark assets with disclosed task counts.
      evidence_claim_ids:
        - EC-TUR-016
    - founder_claim_id: FC-TUR-001
      summary: CB Insights and TechCrunch support private-unicorn financing status, though valuation anchors require reconciliation.
      evidence_claim_ids:
        - EC-TUR-001
        - EC-TUR-002
        - EC-TUR-003
  biggest_risks:
    - risk_id: R-TUR-001
      summary: Valuation anchors and financing-stack economics are inconsistent/opaque publicly.
    - risk_id: R-TUR-002
      summary: ARR, customer concentration, retention and gross margin are not public.
    - risk_id: R-TUR-005
      summary: AI data, safety, privacy and global labor operations create complex compliance exposure.
  key_evidence_gaps:
    - Audited financials, ARR waterfall, retention/churn and customer concentration.
    - Current cap table, SAFE/note/preference/debt stack and valuation support.
    - Product-level pricing, gross margin, dataset provenance and technical governance.
    - Customer contracts, DPAs, SLAs, insurance, legal schedule and IP assignments.
  recommended_next_steps:
    - Open financial/cap-table/customer/legal/technical data rooms before valuation reliance.
    - Run customer reference calls across named, anonymized and current top accounts.
    - Have counsel review Form D compliance, IP/data rights, privacy/labor exposure and CourtListener bankruptcy references.
    - Segment the legacy talent marketplace from current AI data/evaluation and enterprise AI service lines.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Turing has credible public financing evidence and remains publicly framed as an active private unicorn, but financial statements, ARR quality, revenue mix, projections, cap table and debt/preference details are private.
    founder_claim_ids:
      - FC-TUR-001
    evidence_claim_ids:
      - EC-TUR-001
      - EC-TUR-002
      - EC-TUR-003
      - EC-TUR-004
      - EC-TUR-026
      - EC-TUR-028
    risk_ids:
      - R-TUR-001
      - R-TUR-002
      - R-TUR-006
      - R-TUR-011
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public records validate financing activity but do not provide audited statements, quarterly results, sales breakdowns, backlog or AR aging.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: TUR-I.A-F1
            finding: SEC Form D filings disclose exempt-offering activity and revenue-range non-disclosure, not operating financial results.
            evidence_claim_ids:
              - EC-TUR-003
              - EC-TUR-004
            risk_ids:
              - R-TUR-002
              - R-TUR-011
        hidden_risks:
          - ARR could include services, prepaid projects or one-time data work without public visibility.
          - Working-capital exposure to enterprise/bankrupt customers is unknown.
        evidence_gaps:
          - Audited or reviewed financial statements, monthly management reports, revenue by product/channel/geography, backlog, AR aging, gross margin and cash runway.
        follow_up_questions:
          - Provide monthly P&L, balance sheet, cash flow, ARR bridge, bookings, backlog and AR aging for the last 36 months.
        table_ids:
          - T-TUR-002
        figure_ids: []
        evidence_claim_ids:
          - EC-TUR-003
          - EC-TUR-004
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Product and hiring signals imply growth ambitions in AI post-training and enterprise AI, but public sources do not disclose board-approved plans or assumptions.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: TUR-I.B-F1
            finding: International talent and India role signals create FX, tax and labor-compliance questions that projections should explicitly model.
            evidence_claim_ids:
              - EC-TUR-026
            risk_ids:
              - R-TUR-006
        hidden_risks:
          - Forecasts may assume growth in new AI offerings without proven retention or margin history.
        evidence_gaps:
          - Three-year projections by product/customer/channel, assumptions for price, utilization, gross margin, capex, working capital, financing and international exposure.
        follow_up_questions:
          - Provide base/upside/downside projections with product-line ARR, gross margin, hiring plan, CAC payback, utilization and cash runway assumptions.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-TUR-026
          - EC-TUR-004
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public filings identify financing events and related persons, but outstanding shares, preference stack, options, warrants, notes and debt terms are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: TUR-I.C-F1
            finding: SEC filings and TechCrunch funding coverage show multiple equity/security rounds but not cap-table economics.
            evidence_claim_ids:
              - EC-TUR-002
              - EC-TUR-003
              - EC-TUR-028
            risk_ids:
              - R-TUR-001
        hidden_risks:
          - SAFE/note conversion and liquidation preferences may materially change common-equity value.
        evidence_gaps:
          - Current shares outstanding, fully diluted ownership, option pool, warrants, SAFEs/notes, debt lines, investor rights and off-balance-sheet liabilities.
        follow_up_questions:
          - Provide current cap table, financing documents, investor side letters, debt instruments and latest 409A.
        table_ids:
          - T-TUR-003
        figure_ids: []
        evidence_claim_ids:
          - EC-TUR-001
          - EC-TUR-002
          - EC-TUR-003
          - EC-TUR-028
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is partially observable through TechCrunch, CB Insights and SEC Form D, but tax positions, accounting policies and exact round-by-round ownership are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: TUR-I.D-F1
            finding: CB Insights lists Turing at $2.2B while TechCrunch reported $1.1B Series D and a $4B SAFE anchor, creating valuation reconciliation work.
            evidence_claim_ids:
              - EC-TUR-001
              - EC-TUR-002
            risk_ids:
              - R-TUR-001
          - finding_id: TUR-I.D-F2
            finding: Historical seed and Series B rounds are independently reported and partly corroborated by SEC filings.
            evidence_claim_ids:
              - EC-TUR-028
            risk_ids:
              - R-TUR-001
        hidden_risks:
          - Tax/NOL positions and revenue-recognition treatment for data/services work are unknown.
        evidence_gaps:
          - Financing history with post-money, percentage ownership, current basis by round, tax returns/NOLs and revenue-recognition policy.
        follow_up_questions:
          - Reconcile CB, TechCrunch and SEC financing records to company ledgers and board approvals.
        table_ids:
          - T-TUR-001
        figure_ids:
          - F-TUR-001
          - F-TUR-002
        evidence_claim_ids:
          - EC-TUR-001
          - EC-TUR-002
          - EC-TUR-003
          - EC-TUR-028
