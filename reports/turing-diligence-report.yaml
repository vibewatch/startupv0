report_metadata:
  report_title: Turing Startup Diligence Report
  target_company: Turing
  website: https://www.turing.com/
  known_aliases:
    - Turing
    - Turing Enterprises, Inc.
    - turing.com
  sector: Enterprise technology, AI post-training, AI data/evaluation, enterprise AI services and AI talent
  geography: United States; public sources indicate Palo Alto/California roots and global talent/hiring signals
  company_stage: Private unicorn / late-stage private company
  research_date: 2026-06-14
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Reviewed public company pages, product pages, research pages, case studies, privacy/terms pages, SEC EDGAR Form D filings, CB Insights public pages, TechCrunch funding coverage and CourtListener search-result snippets.
    - Treated company-owned materials as representations to verify, not as independent proof of performance or compliance.
    - Marked private records such as financials, cap table, contracts, customer concentration, insurance, HR and counsel schedules as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - Delaware
    - California
    - global enterprise and talent markets where public sources indicate activity
  excluded_topics:
    - Private contact details
    - Non-public customer contracts
    - Private personal data
    - Paywalled or access-controlled records
    - Unverified allegations presented as facts
  user_provided_materials:
    - material_id: UPM-TUR-001
      title: Workflow request and CB Insights candidate-selection context
      type: workflow_request
      date_received: 2026-06-14
      notes: Candidate context supplied latest unicorn-list valuation $2.2B, date joined 2021-12-20, country United States, city Palo Alto, industry Enterprise Tech and investors Foundation Capital, Frontier Ventures, AltaIR Capital.
founder_claims:
  - founder_claim_id: FC-TUR-001
    claim_text: Turing is an active private unicorn; the candidate list assigned a $2.2B valuation and December 20, 2021 unicorn date.
    claim_source: CB Insights unicorn list and candidate-selection context
    claim_date: 2021-12-20
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
