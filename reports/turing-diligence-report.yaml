risk_register:
  - risk_id: R-TUR-001
    risk_title: Valuation and financing-stack opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: CB Insights $2.2B list valuation, TechCrunch $1.1B Series D valuation and reported $4B SAFE anchor require reconciliation against actual securities, preferences and current marks.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request cap table, financing documents, SAFE/note ledgers, 409A valuations, debt schedules and investor side letters.
  - risk_id: R-TUR-002
    risk_title: Revenue quality and customer concentration are not public
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public sources do not disclose ARR, customer concentration, churn, revenue by product, gross margin or backlog.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request ARR waterfall, top-customer schedule, contract values, NRR/GRR, churn, cohort gross margin and pipeline conversion.
  - risk_id: R-TUR-003
    risk_title: Business-model pivot and product-mix uncertainty
    risk_category: market
    severity: high
    likelihood: medium
    description: Turing’s public positioning evolved from remote engineering Talent Cloud to AI data, post-training, enterprise AI and AI talent, making historical metrics potentially non-comparable.
    impacted_chapter_ids:
      - II
      - V
      - VI
    impacted_section_ids:
      - II.A
      - V.A
      - VI.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Segment revenue, retention, margin and CAC by legacy talent marketplace versus current AI products and services.
  - risk_id: R-TUR-004
    risk_title: Intense competitive overlap across AI talent, services and data/evaluation
    risk_category: market
    severity: medium
    likelihood: high
    description: CB Insights lists competitors across talent marketplaces and AI tooling, while current positioning also overlaps with AI consultancies and data/evaluation vendors.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request win/loss analysis, pricing comparisons, competitive displacement metrics and renewal discounting.
  - risk_id: R-TUR-005
    risk_title: Privacy, data provenance and AI-safety exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Turing’s offerings use datasets, RL environments, evaluations and sensitive safety domains, while privacy policy covers candidate/affiliated-person data collection.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review DPIAs, data consent/provenance, subprocessor list, cross-border transfer mechanisms, safety-review process and incident history.
  - risk_id: R-TUR-006
    risk_title: Global labor and contractor compliance
    risk_category: operational
    severity: high
    likelihood: unknown
    description: Historical global developer pool and current India roles imply multi-jurisdiction labor, tax, classification, payroll and data-transfer complexity.
    impacted_chapter_ids:
      - I
      - III
      - VII
      - VIII
    impacted_section_ids:
      - I.B
      - III.E
      - VII.B
      - VIII.C
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request worker-classification analysis, contractor templates, EOR arrangements, payroll/tax compliance memos and country-by-country headcount.
  - risk_id: R-TUR-007
    risk_title: Research benchmark durability and contamination risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Public benchmarks can create credibility but also require controls against data leakage, licensing issues and benchmark overfitting.
    impacted_chapter_ids:
      - VI
    impacted_section_ids:
      - VI.A
      - VI.B
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review dataset governance, contamination testing, third-party licenses, benchmark maintenance process and customer dependencies.
  - risk_id: R-TUR-008
    risk_title: Customer credit exposure signaled by bankruptcy docket snippets
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: CourtListener snippets reference Turing in bankruptcy dockets as professional services or creditor-matrix entries; underlying documents were not reviewed.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.D
      - VIII.A
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Ask counsel to review PACER documents, AR aging, bad-debt reserves, bankrupt-customer exposure and collectability.
  - risk_id: R-TUR-009
    risk_title: IP ownership and trademark registration not fully verified
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Website terms assert IP ownership, but public diligence did not validate assignment chains, patents, trademark registrations, open-source compliance or customer-specific IP terms.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.D
      - VIII.F
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request IP schedule, invention assignments, trademark/patent records, OSS scans, model/data licenses and enterprise IP clauses.
  - risk_id: R-TUR-010
    risk_title: Management, compensation and turnover opacity
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Founders and related persons are visible, but complete management roster, compensation, equity plans and turnover history are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.C
      - VII.D
      - VII.E
      - VII.G
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request org chart, management bios, offer letters, compensation bands, option plans, retention metrics and departures schedule.
  - risk_id: R-TUR-011
    risk_title: Pricing, unit economics and services margin opacity
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public pages do not disclose pricing, module ARR, sales cycle, delivery cost, gross margin or utilization for human-in-the-loop AI services.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.A
      - II.A
      - V.D
      - V.E
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Request SKU pricing, utilization, delivery staffing model, gross margin by product, support costs and professional-services attach rate.
  - risk_id: R-TUR-012
    risk_title: Public terms are not enough to evaluate enterprise contract exposure
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public terms cap liability and disclaim warranties, but negotiated enterprise MSAs, DPAs, indemnities and SLAs may materially differ.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.E
      - VIII.F
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Review executed customer contracts, DPAs, SLAs, indemnities, limitation-of-liability carveouts, insurance and change-of-control provisions.
