  - figure_id: F-TUR-011
    title: Risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of the full risk register.
    purpose: Prioritize diligence follow-up across severity and likelihood.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-TUR-001
          label: Valuation and financing-stack opacity
          severity: high
          likelihood: medium
          rationale: CB Insights $2.2B list valuation, TechCrunch $1.1B Series D valuation and reported $4B SAFE anchor require reconciliation against actual securities, preferences and current marks.
          evidence_claim_ids: &a1
            - EC-TUR-001
            - EC-TUR-002
            - EC-TUR-003
            - EC-TUR-028
          source_ids:
            - SRC-TUR-001
            - SRC-TUR-002
            - SRC-TUR-003
            - SRC-TUR-006
            - SRC-TUR-007
            - SRC-TUR-008
        - risk_id: R-TUR-002
          label: Revenue quality and customer concentration are not public
          severity: high
          likelihood: unknown
          rationale: Public sources do not disclose ARR, customer concentration, churn, revenue by product, gross margin or backlog.
          evidence_claim_ids: &a2
            - EC-TUR-004
            - EC-TUR-008
            - EC-TUR-010
          source_ids:
            - SRC-TUR-002
            - SRC-TUR-007
            - SRC-TUR-008
            - SRC-TUR-003
            - SRC-TUR-017
            - SRC-TUR-018
        - risk_id: R-TUR-003
          label: Business-model pivot and product-mix uncertainty
          severity: high
          likelihood: medium
          rationale: Turing’s public positioning evolved from remote engineering Talent Cloud to AI data, post-training, enterprise AI and AI talent, making historical metrics potentially non-comparable.
          evidence_claim_ids: &a3
            - EC-TUR-005
            - EC-TUR-006
            - EC-TUR-025
          source_ids:
            - SRC-TUR-009
            - SRC-TUR-010
            - SRC-TUR-011
            - SRC-TUR-012
            - SRC-TUR-013
            - SRC-TUR-014
        - risk_id: R-TUR-004
          label: Intense competitive overlap across AI talent, services and data/evaluation
          severity: medium
          likelihood: high
          rationale: CB Insights lists competitors across talent marketplaces and AI tooling, while current positioning also overlaps with AI consultancies and data/evaluation vendors.
          evidence_claim_ids: &a4
            - EC-TUR-013
            - EC-TUR-014
          source_ids:
            - SRC-TUR-002
            - SRC-TUR-009
            - SRC-TUR-011
            - SRC-TUR-015
            - SRC-TUR-016
        - risk_id: R-TUR-005
          label: Privacy, data provenance and AI-safety exposure
          severity: high
          likelihood: medium
          rationale: Turing’s offerings use datasets, RL environments, evaluations and sensitive safety domains, while privacy policy covers candidate/affiliated-person data collection.
          evidence_claim_ids: &a5
            - EC-TUR-017
            - EC-TUR-020
            - EC-TUR-027
          source_ids:
            - SRC-TUR-014
            - SRC-TUR-023
            - SRC-TUR-024
        - risk_id: R-TUR-006
          label: Global labor and contractor compliance
          severity: high
          likelihood: unknown
          rationale: Historical global developer pool and current India roles imply multi-jurisdiction labor, tax, classification, payroll and data-transfer complexity.
          evidence_claim_ids: &a6
            - EC-TUR-019
            - EC-TUR-024
            - EC-TUR-026
            - EC-TUR-030
          source_ids:
            - SRC-TUR-022
            - SRC-TUR-003
            - SRC-TUR-016
            - SRC-TUR-023
            - SRC-TUR-007
        - risk_id: R-TUR-007
          label: Research benchmark durability and contamination risk
          severity: medium
          likelihood: medium
          rationale: Public benchmarks can create credibility but also require controls against data leakage, licensing issues and benchmark overfitting.
          evidence_claim_ids: &a7
            - EC-TUR-016
            - EC-TUR-017
          source_ids:
            - SRC-TUR-019
            - SRC-TUR-020
            - SRC-TUR-021
            - SRC-TUR-014
        - risk_id: R-TUR-008
          label: Customer credit exposure signaled by bankruptcy docket snippets
          severity: medium
          likelihood: unknown
          rationale: CourtListener snippets reference Turing in bankruptcy dockets as professional services or creditor-matrix entries; underlying documents were not reviewed.
          evidence_claim_ids: &a8
            - EC-TUR-022
          source_ids:
            - SRC-TUR-025
        - risk_id: R-TUR-009
          label: IP ownership and trademark registration not fully verified
          severity: medium
          likelihood: unknown
          rationale: Website terms assert IP ownership, but public diligence did not validate assignment chains, patents, trademark registrations, open-source compliance or customer-specific IP terms.
          evidence_claim_ids: &a9
            - EC-TUR-021
            - EC-TUR-029
          source_ids:
            - SRC-TUR-024
            - SRC-TUR-002
            - SRC-TUR-007
        - risk_id: R-TUR-010
          label: Management, compensation and turnover opacity
          severity: medium
          likelihood: unknown
          rationale: Founders and related persons are visible, but complete management roster, compensation, equity plans and turnover history are not public.
          evidence_claim_ids: &a10
            - EC-TUR-018
            - EC-TUR-019
            - EC-TUR-030
