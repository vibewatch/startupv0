      - EC-TUR-002
      - EC-TUR-003
    contradiction_summary: CB Insights list shows $2.2B while TechCrunch reported a $1.1B Series D valuation and an oversubscribed SAFE at $4B; valuation support requires cap-table documents.
    diligence_follow_up:
