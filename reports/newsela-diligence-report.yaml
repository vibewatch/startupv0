risk_register:
  - risk_id: R-001
    risk_title: District procurement and budget-cycle exposure
    risk_category: market
    severity: high
    likelihood: medium
    description: K-12 sales depend on district budgets, curriculum cycles, renewals, and public-funding availability that are not visible in public sources.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - V.A
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Review district ARR cohorts, renewal calendar, funding sources, pipeline, and CAC payback.
  - risk_id: R-002
    risk_title: Student data privacy and AI compliance
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Newsela handles Student Data under FERPA/COPPA/state privacy regimes and is adding AI/analytics workflows, increasing regulatory and trust requirements.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VIII.A
    evidence_claim_ids: *a13
    mitigation_or_diligence_request: Review DPAs, DPIAs, AI governance, security audits, subprocessor list, and incident history.
