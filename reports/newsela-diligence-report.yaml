      - VII
    impacted_section_ids:
      - II.A
      - III.A
      - VI.A
      - VII.A
    evidence_claim_ids: *a14
    mitigation_or_diligence_request: Review integration roadmap, churn by acquired product, retention of key acquired staff, and cross-sell metrics.
  - risk_id: R-004
    risk_title: Efficacy and competitive differentiation need private proof
    risk_category: product
    severity: medium
    likelihood: medium
    description: Public product claims do not prove learning outcomes, differentiated AI, or durable advantage versus publishers and edtech incumbents.
