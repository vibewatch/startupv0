    risk_title: Acquisition and platform integration complexity
    risk_category: operational
    severity: medium
    likelihood: high
    description: Formative, Generation Genius, Schoolytics, EveryDay Labs, and Luna integrations may create product, data-model, and go-to-market complexity.
