    mitigation_or_diligence_request: Review content-provider agreements, AI data-use rights, IP assignments, and indemnity exposure.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Newsela audited financial statements, revenue by product, gross margin, burn, runway, debt, and full cap table are not public.
    why_it_matters: Valuation quality cannot be assessed without revenue scale, growth, margin, dilution, liquidation preferences, and cash runway.
    suggested_source_or_request: Request audited financials, board pack, cap table, financing documents, debt schedules, and monthly operating model.
    priority: high
  - gap_id: G-002
    chapter_id: II
    section_id: II.A
    missing_information: Newsela product usage, retention by module, pricing realization, roadmap, and SLA performance are not public.
    why_it_matters: Product-market fit and monetization quality require cohort and deployment evidence.
    suggested_source_or_request: Request product analytics, packaging/pricing history, churn cohorts, roadmap, uptime/SLA reports, and support metrics.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Newsela customer list, top-account concentration, ARR by customer, renewal rates, NRR, and reference calls are not public.
    why_it_matters: Customer concentration and retention drive revenue durability and downside risk.
    suggested_source_or_request: Request anonymized customer ARR schedule, top-20 account contracts, churn log, and reference-call access.
    priority: high
  - gap_id: G-004
    chapter_id: IV
    section_id: IV.A
    missing_information: Newsela win/loss data and competitive displacement evidence are not public.
    why_it_matters: Public positioning does not prove durable differentiation or pricing power.
    suggested_source_or_request: Request CRM win/loss exports, competitive battlecards, pipeline conversion by competitor, and gross retention by segment.
    priority: medium
  - gap_id: G-005
    chapter_id: V
    section_id: V.A
    missing_information: Newsela CAC, sales cycle, channel economics, partner-sourced pipeline, and marketing attribution are not public.
    why_it_matters: GTM efficiency determines whether growth can scale without excessive burn.
    suggested_source_or_request: Request CAC payback, sales cycle, pipeline source, channel margin, partner agreements, and quota attainment.
    priority: medium
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Newsela R&D budget, model or platform benchmarks, security test results, and roadmap dependencies are not public.
    why_it_matters: Technical defensibility and execution risk require internal evidence.
    suggested_source_or_request: Request R&D roadmap, architecture review, model/platform benchmarks, vuln management evidence, and engineering productivity data.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.A
    missing_information: Newsela headcount by function, attrition, compensation, hiring plan, board composition, and option refresh history are not public.
    why_it_matters: Talent density, retention, and governance affect execution and financing risk.
    suggested_source_or_request: Request HRIS exports, org chart, attrition report, compensation bands, board minutes, and hiring plan.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Newsela complete litigation searches, IP assignment chain, open-source license scan, DPIAs, DPAs, and regulatory correspondence are not public.
    why_it_matters: Legal, IP, privacy, and compliance risks can create hidden liabilities.
    suggested_source_or_request: Request counsel memo, litigation schedule, IP assignment records, open-source scan, DPAs, SOC/security reports, and privacy impact assessments.
    priority: medium
