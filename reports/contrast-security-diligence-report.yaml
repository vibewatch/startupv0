diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited annual/quarterly financial statements and management KPI package.
    why_it_matters: Needed to verify revenue quality, margins, burn, runway and plan credibility.
    suggested_source_or_request: Company CFO/controller data-room package.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preference stack, option pool, debt and latest 409A/common valuation.
    why_it_matters: Needed to underwrite dilution, liquidation economics and exit outcomes.
    suggested_source_or_request: Company counsel and finance team.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, product, channel and geography plus top-customer contracts.
    why_it_matters: Needed to assess concentration, renewal risk and quality of revenue.
    suggested_source_or_request: Sales ops, billing system exports and customer contracts.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Litigation, regulatory, privacy/security, insurance and IP schedules.
    why_it_matters: Needed to bound legal, security, regulatory and ownership exposure.
    suggested_source_or_request: Outside counsel, security team and insurance broker.
    priority: high
