    diligence_follow_up:
      - Request top-20 customer schedule, cohort retention, reference calls and revenue by customer.
executive_summary:
  overall_assessment: Contrast Security appears eligible as an uncovered private unicorn based on CB Insights/current public screens, but the diligence case is incomplete without private financial, customer, cap-table, legal and security records.
  investment_or_diligence_thesis: Public evidence supports a real company with material product and financing signals in Enterprise application and API security; underwriting should focus on Stale 2021 unicorn valuation with no audited public financials; Crowded AppSec/ASPM/ADR market with platform repositioning risk; Enterprise telemetry and AI-remediation claims require security validation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Contrast secures applications from within using live in-app runtime visibility and protection.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Contrast achieved unicorn status through a $150M Series E at greater than $1B valuation.
      evidence_claim_ids: *a2
  biggest_risks:
    - risk_id: R-001
      summary: Stale public valuation and opaque financial quality
    - risk_id: R-002
      summary: Crowded AppSec and platform-consolidation market
    - risk_id: R-003
      summary: AI/runtime efficacy and integration risk
    - risk_id: R-004
      summary: Customer concentration and renewal quality unknown
    - risk_id: R-005
      summary: Enterprise GTM productivity not public
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue bridge, cash runway and board-approved plan.
    - Cap table, financing documents, preference stack, debt and option schedule.
    - Customer concentration, retention/churn, current contract status and reference calls.
    - Security/privacy/legal/IP/insurance records and counsel confirmation.
  recommended_next_steps:
    - Open data-room request list focused on financials, customer schedules, cap table and legal/security evidence.
    - Run independent technical/product validation and customer reference calls.
    - Benchmark valuation and unit economics against direct public/private comparables.
    - Have counsel verify corporate status, litigation, regulatory exposure and material contracts.
