report_metadata:
  report_title: Contrast Security Startup Diligence Research Report
  target_company: Contrast Security
  website: https://www.contrastsecurity.com/
  known_aliases:
    - Contrast Security Inc.
    - Contrast
  sector: Enterprise application and API security
  geography: United States - Pleasanton/Los Altos, California
  company_stage: Private unicorn / growth-stage cybersecurity company
  research_date: 2026-06-15
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built existing-report exclusion list from reports/*-diligence-report.yaml.
    - Fetched CB Insights unicorn list and public company/news/search pages.
    - Screened for IPO, acquisition and shutdown signals from public sources.
    - Used public evidence only; private data-room records are requested where facts are not publicly verifiable.
  included_jurisdictions:
    - United States
  excluded_topics:
    - Private financial statements, non-public contracts, credentials, private data rooms and paywalled records not accessible in public research.
  user_provided_materials: []
