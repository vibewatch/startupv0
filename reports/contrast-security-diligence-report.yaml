risk_register:
  - risk_id: R-001
    risk_title: Stale public valuation and opaque financial quality
    risk_category: financial
    severity: high
    likelihood: medium
    description: Latest public unicorn valuation anchors to 2021/CB Insights; audited revenue, ARR, margins and burn are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.D
    evidence_claim_ids: *a20
    mitigation_or_diligence_request: Request audited financials, ARR bridge, bookings, gross margin by product, burn/runway and board-approved plan.
  - risk_id: R-002
    risk_title: Crowded AppSec and platform-consolidation market
    risk_category: market
    severity: high
    likelihood: high
    description: Contrast competes against specialist AST/SCA vendors and larger security platforms that can bundle adjacent capabilities.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Run competitive win/loss calls, pricing benchmark and POC against top alternatives.
  - risk_id: R-003
    risk_title: AI/runtime efficacy and integration risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: AI SmartFix and runtime instrumentation claims require validation for coverage, latency, false positives and secure remediation quality.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Perform technical diligence, customer telemetry review and red-team validation.
  - risk_id: R-004
    risk_title: Customer concentration and renewal quality unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Named logos do not disclose ARR, current contract status, expansion, churn or customer concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.B
    evidence_claim_ids: *a23
    mitigation_or_diligence_request: Request top-customer revenue, cohorts, NRR/GRR, churn reasons and reference calls.
  - risk_id: R-005
    risk_title: Enterprise GTM productivity not public
    risk_category: operational
    severity: medium
    likelihood: unknown
    description: Sales cycle, quota attainment, partner contribution and CAC payback are not publicly disclosed.
    impacted_chapter_ids:
      - V
    impacted_section_ids:
      - V.D
      - V.E
    evidence_claim_ids: *a24
    mitigation_or_diligence_request: Request pipeline, bookings by channel, sales productivity and forecast accuracy.
  - risk_id: R-006
    risk_title: Security-trust and data-processing exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Security products embedded in customer apps may process sensitive telemetry; trust artifacts and contractual risk allocation are not public.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.E
      - VIII.F
    evidence_claim_ids: *a25
    mitigation_or_diligence_request: Review SOC2/ISO reports, DPA, incident history, insurance and indemnity caps.
