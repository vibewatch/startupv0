        quote: SEC EDGAR company search found no obvious matching public-company result for Divergent Technologies or Divergent 3D during this review.
        location: Analyst search note
    analyst_interpretation: Revenue growth language is directionally positive, but the lack of actual revenue, margin, burn, backlog, and cash data is the largest public-source diligence gap.
