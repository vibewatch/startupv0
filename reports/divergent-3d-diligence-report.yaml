diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, revenue by product/customer/channel/geography, backlog, AR aging, and cash runway.
    why_it_matters: These determine whether public growth claims are economically meaningful.
    suggested_source_or_request: Company CFO/accountant data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, equity terms, debt terms, liens, warrants, SAFEs/notes, and off-balance-sheet obligations.
    why_it_matters: Financing structure can materially change risk/reward at a $2.3B headline valuation.
    suggested_source_or_request: Company counsel, CFO, UCC/IP lien searches.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Independent validation of performance claims, manufacturing yield, process capability, cost model, and warranty data.
    why_it_matters: DAPS value proposition depends on repeatable technical and economic superiority.
    suggested_source_or_request: Factory audit, customer test reports, quality data, costed BOMs.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Customer revenue concentration, backlog, purchase orders, gross margin, and revenue-recognition policy.
    why_it_matters: Named logos do not prove durable, profitable revenue.
    suggested_source_or_request: Customer schedule, contracts, accounting memo.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top suppliers, supplier agreements, purchase amounts, lead times, and sole-source dependencies.
    why_it_matters: AM materials, machines, robotics, and quality systems may constrain delivery.
    suggested_source_or_request: Procurement schedule and supplier contracts.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss data, price benchmarks, market share, and customer make-vs-buy comparisons.
    why_it_matters: Public competitor positioning is insufficient to prove durable moat.
    suggested_source_or_request: Sales ops data, customer interviews, competitive analyses.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Quota, attainment, sales cycle, CAC, pipeline aging, and conversion by channel.
    why_it_matters: Sales productivity and budget adequacy cannot be assessed publicly.
    suggested_source_or_request: CRM export, sales compensation plans, marketing budget.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: Pipeline by part/customer, qualification status, engineering cost, expected revenue, and margin.
    why_it_matters: Part-number growth may not translate into scalable production economics.
    suggested_source_or_request: Product roadmap and program management system.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D budget, team structure, software validation, material qualification, and Sigma IP integration status.
    why_it_matters: Technical moat depends on integrated execution across software, materials, AM, robotics, and quality.
    suggested_source_or_request: CTO/engineering data room and factory audit.
    priority: high
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.A
    missing_information: Full org chart, board composition, succession plan, and key-person dependencies.
    why_it_matters: Founder-led manufacturing scale-up can be vulnerable to governance and leadership bottlenecks.
    suggested_source_or_request: CEO/HR/counsel records.
    priority: medium
  - gap_id: G-011
    chapter_id: VII
    section_id: VII.G
    missing_information: Turnover, recruiting funnel, compensation, retention, and incentive equity data.
    why_it_matters: Talent execution is central to scaling a complex manufacturing platform.
    suggested_source_or_request: HRIS/payroll/equity plan records.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Verified litigation schedule and docket status, including the low-confidence Okoli case snippet.
    why_it_matters: Legal liabilities and employment disputes can affect valuation and operations.
    suggested_source_or_request: Company counsel and court docket search.
    priority: high
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.C
    missing_information: EHS permits, OSHA logs, incident reports, certification scopes, audit findings, and corrective actions.
    why_it_matters: AM/robotics/defense manufacturing has material safety and compliance exposure.
    suggested_source_or_request: EHS manager, registrar certificates, legal counsel.
    priority: high
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Complete IP schedule, assignments, liens, licenses, FTO opinions, open-source software audit, and prosecution status.
    why_it_matters: IP is a core value driver and may secure debt or be constrained by third-party rights.
    suggested_source_or_request: Patent counsel and IP data room.
    priority: high
  - gap_id: G-015
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, limits, exclusions, claims, indemnities, and reserves.
    why_it_matters: Safety-critical components can create large product-liability and recall exposures.
    suggested_source_or_request: Broker loss runs and legal contract review.
    priority: high
  - gap_id: G-016
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts across customers, suppliers, Palantir, EWAAC/task orders, Sigma acquisition, debt, and warranties.
    why_it_matters: Contract obligations determine revenue quality, liability allocation, and cash flow.
    suggested_source_or_request: Counsel-reviewed contract abstract and full contracts.
    priority: high
