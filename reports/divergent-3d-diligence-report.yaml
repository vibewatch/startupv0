executive_summary:
  overall_assessment: "Divergent is a credible public-source private unicorn candidate: public evidence supports a $2.3B valuation headline, substantial late-stage financing, a differentiated DAPS platform narrative, named automotive/aerospace/defense customer signals, certifications, patent/IP activity, and active hiring. The diligence posture remains high-risk because financial statements, cap table, customer economics, technical validation, quality history, legal/contracts, insurance, and supplier economics are not public."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A positive thesis requires proving that DAPS delivers repeatable, certified, margin-positive production at scale; that named customer programs convert to durable revenue; that debt/liens/IP ownership are clean; and that safety-critical legal, quality, insurance, and regulatory exposures are controlled.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public market-list and Series E evidence support a $2.3B unicorn-scale valuation headline.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Company sources consistently describe DAPS as AI-enabled design, additive manufacturing, and fixtureless robotic assembly.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-004
      summary: Public announcements identify multiple automotive and aerospace/defense customer or partner signals.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Public sources do not disclose financial statements, revenue base, backlog, margin, burn, or runway.
    - risk_id: R-004
      summary: Performance, cost, quality, and scale claims require independent technical and factory validation.
    - risk_id: R-007
      summary: Named logos do not disclose customer concentration, production commitments, contract economics, or gross margin.
    - risk_id: R-005
      summary: Aerospace, defense, and vehicle structures create safety-critical quality, regulatory, warranty, and liability exposure.
  key_evidence_gaps:
    - Audited financials, management accounts, unit economics, backlog, AR aging, and cash runway.
    - Fully diluted cap table, financing terms, debt covenants, and UCC/IP liens.
    - Customer contracts, task orders, revenue by customer, program margins, and customer reference calls.
    - Factory KPIs, manufacturing yield, material qualifications, process capability, quality escapes, and warranty history.
    - Legal docket confirmation, insurance policies, material contracts, regulatory compliance files, and IP/FTO review.
  recommended_next_steps:
    - Open a targeted data-room request covering finance/cap table/debt first; do not underwrite from valuation headlines alone.
    - Run technical and factory diligence on DAPS throughput, yield, quality, process capability, and cost by application.
    - Conduct customer diligence with top accounts and reconcile named logos to revenue, backlog, and production commitments.
    - Have counsel verify litigation, IP chain-of-title/liens, export-control/cyber requirements, insurance, warranties, and material contracts.
    - Confirm private-company eligibility and current ownership with company counsel and entity records.
  valuation_view: The $2.3B valuation is a public screening anchor, not an underwriting conclusion. It must be reconciled to current cash, debt, preferences, revenue quality, customer concentration, technical milestone risk, and safety-critical liability exposure.
  recommendation: High-risk confirmatory diligence only; track as a credible but opaque industrial technology unicorn.
