    claim: Public market-list and company financing evidence support Divergent as a private unicorn screening candidate valued around $2.3B.
    evidence_summary: CB Insights lists Divergent 3D with a $2.3B valuation and April 25, 2022 unicorn date; Divergent later announced a Series E at a $2.3B valuation.
    evidence_type: market_database
    verification_status: partially_verified
    confidence: high
    source_ids:
      - SRC-001
      - SRC-011
    quoted_evidence:
      - source_id: SRC-001
        quote: Divergent 3D | $2.3 | 4/25/2022 | United States | Torrance | Industrials | Hedosophia, Horizons Ventures, Alumni Ventures Group.
        location: Unicorn list row captured during research
      - source_id: SRC-011
        quote: Divergent Technologies, Inc. today announced the closing of its Series E financing raising a total of $290 million at a $2.3 billion valuation.
        location: Series E announcement
    analyst_interpretation: The unicorn claim is well supported as a public headline, but financing terms, preference stack, and current share count remain private.
    limitations: No stock-purchase agreement, investor rights agreement, or cap table was available.
    associations:
      chapter_id: I
      section_id: I.C
      founder_claim_ids:
        - FC-001
      table_ids:
        - T-001
        - T-003
      figure_ids:
        - F-001
        - F-002
      risk_ids:
        - R-002
        - R-003
  - evidence_claim_id: EC-002
    claim: "Public financing announcements identify at least three major rounds since 2022: $160M Series C, $230M Series D, and $290M Series E including $40M debt."
    evidence_summary: Divergent announced Series C, Series D, and Series E amounts; the Series D was led by a $100M Hexagon AB investment and the Series E consisted of $250M equity plus $40M debt.
    evidence_type: primary_company_source
    verification_status: partially_verified
    confidence: high
    source_ids:
      - SRC-009
      - SRC-010
      - SRC-011
    quoted_evidence:
      - source_id: SRC-009
        quote: completed its Series C funding totaling $160 million
        location: Series C announcement
      - source_id: SRC-010
        quote: completed a Series D equity financing totaling $230 million. The round was led by a $100 million investment from Hexagon AB
        location: Series D announcement
      - source_id: SRC-011
        quote: The round was led by Rochefort Asset Management and consists of $250 million in equity capital and $40 million in debt capital.
        location: Series E announcement
    analyst_interpretation: The capital history is material but incomplete; debt terms and liquidation preferences can dominate downside outcomes.
    limitations: Does not disclose valuation for all rounds, share counts, warrants, covenants, maturity, collateral, or cash balance.
    associations:
      chapter_id: I
      section_id: I.D
      founder_claim_ids:
        - FC-001
      table_ids:
        - T-001
        - T-003
      figure_ids:
