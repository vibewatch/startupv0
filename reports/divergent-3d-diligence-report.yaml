research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public internet sources only, prioritizing company announcements/pages, customer or partner announcements, patent records, SEC search interfaces, market databases, and competitor-owned pages.
    - Treated company-published performance and customer statements as verified only for existence of the public statement unless corroborated by independent/customer/regulatory sources.
    - Flagged all audited financials, cap table, customer contracts, supplier contracts, insurance, legal dockets, tax, HR records, and regulatory correspondence as not publicly verifiable unless directly evidenced.
  included_jurisdictions:
    - United States
    - California
    - Federal securities and patent records where publicly searchable
    - Aerospace/defense public-contract context where announced
  excluded_topics:
    - Classified defense program details
    - Non-public customer contracts
    - Non-public technical data packages
    - Private employee personal data
    - Non-public financial statements
    - Non-public export-control classifications
    - Paid databases and sources blocked by CAPTCHA/403
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Divergent 3D diligence report
      type: workflow_request
      date_received: 2026-05-26
      notes: No pitch deck, management materials, financial model, customer contracts, or data-room documents were provided.
