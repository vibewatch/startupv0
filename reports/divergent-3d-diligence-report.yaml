risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and underwriting gap
    risk_category: financial
    severity: high
    likelihood: high
    description: No public audited financials, revenue base, margins, burn, cash, AR aging, backlog, or projections are available, preventing public-source underwriting.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
    evidence_claim_ids:
      - EC-003
      - EC-020
    mitigation_or_diligence_request: Require audited financials, monthly management accounts, revenue recognition memo, cash runway, backlog report, AR aging, and board-approved plan.
  - risk_id: R-002
    risk_title: Valuation and financing terms risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: $2.3B valuation and $290M Series E headline may mask preference stack, debt covenants, liquidation preferences, anti-dilution, or milestone-driven risk.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
    mitigation_or_diligence_request: Review financing documents, debt agreements, preference stack, option pool, warrants, investor rights, liens, and pro forma capitalization.
  - risk_id: R-003
    risk_title: Capital structure and lien uncertainty
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Public patent data shows security-interest activity on at least one patent and public financing includes debt; full lien/collateral picture is unknown.
    impacted_chapter_ids:
