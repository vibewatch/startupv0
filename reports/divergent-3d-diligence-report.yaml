          - Provide all material contracts with revenue, supply, debt, IP, acquisition, partnership, warranty, indemnity, exclusivity, termination, and flow-down provisions summarized.
        table_ids:
          - T-020
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-011
          - EC-024
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No verified history of regulatory agency problems was found; public evidence shows defense/aerospace and certification context that makes regulatory compliance a key diligence workstream.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VIII.G-F1
            finding: Public certifications and defense/aerospace announcements imply regulated operations, but agency correspondence, export-control status, and problem history are not public.
            evidence_claim_ids:
              - EC-008
              - EC-012
              - EC-024
            risk_ids:
              - R-005
              - R-010
        hidden_risks:
          - ITAR/EAR, DFARS/CMMC, quality, environmental, labor, and export-control issues can be material even if not publicly visible.
          - Regulatory problem history may reside in non-public audits or customer quality records.
        evidence_gaps:
          - Agency communications, export classifications, CMMC/cyber status, audit findings, violations, fines, quality escapes, and corrective actions were not public.
        follow_up_questions:
          - Provide regulatory compliance matrix, agency correspondence, export-control classifications, CMMC/DFARS status, audit findings, violations/fines, quality escapes, and corrective actions.
        table_ids:
          - T-018
          - T-020
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-008
          - EC-012
          - EC-024
