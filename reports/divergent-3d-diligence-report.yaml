      - EC-018
    mitigation_or_diligence_request: Run UCC/IP lien searches and obtain debt, collateral, intercreditor, and release documents.
  - risk_id: R-004
    risk_title: Manufacturing scale and technical validation risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: DAPS promises faster, lighter, lower-cost structures; public sources do not prove repeatable yield, throughput, quality, or economics across scaled programs.
