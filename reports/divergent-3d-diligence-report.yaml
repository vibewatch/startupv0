        - F-002
      risk_ids:
        - R-002
        - R-003
  - evidence_claim_id: EC-003
    claim: Public sources do not provide audited financial statements, backlog, AR aging, gross margin, revenue by customer, or three-year projections.
    evidence_summary: The company is private; reviewed company pages and public databases provide funding and traction headlines but not financial statements or internal management reports.
    evidence_type: other
    verification_status: not_publicly_verifiable
    confidence: low
    source_ids:
      - SRC-011
