  - figure_id: F-011
    title: BrowserStack risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Risk severity and likelihood across the diligence register.
    purpose: Prioritize follow-up diligence.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Stale valuation and private financial opacity
          severity: high
          likelihood: medium
          rationale: The $4B valuation is public from 2021, but current audited financials, ARR, margins, burn, and cap table are not public.
          evidence_claim_ids: &a34
            - EC-001
            - EC-003
            - EC-010
          source_ids: &a33
            - SRC-001
            - SRC-005
            - SRC-011
        - risk_id: R-002
          label: Cloud/device data security and privacy exposure
          severity: high
          likelihood: medium
          rationale: BrowserStack handles customer test sessions, devices, apps, browsers, and potentially sensitive pre-release software; public security claims require control testing.
          evidence_claim_ids: &a35
            - EC-006
          source_ids: *a33
        - risk_id: R-003
          label: Competitive pressure in software testing clouds
          severity: medium
          likelihood: high
          rationale: Sauce Labs, LambdaTest, Perfecto, Kobiton, SmartBear, Applitools, open-source tooling, and native vendor test environments may pressure pricing and differentiation.
          evidence_claim_ids: &a36
            - EC-005
            - EC-007
          source_ids: *a33
        - risk_id: R-004
          label: Infrastructure capex and device supply dependency
          severity: medium
          likelihood: medium
          rationale: Real-device cloud breadth and global data centers require hardware procurement, maintenance, depreciation, and operational discipline.
          evidence_claim_ids: &a37
            - EC-005
            - EC-008
          source_ids: *a33
        - risk_id: R-005
          label: Customer concentration and churn not public
          severity: medium
          likelihood: unknown
          rationale: Customer count and logos are public, but top-account revenue, churn, NRR, and usage concentration are private.
          evidence_claim_ids: &a38
            - EC-004
            - EC-010
          source_ids: *a33
        - risk_id: R-006
          label: Platform dependence on browser, mobile OS, and device ecosystems
          severity: medium
          likelihood: medium
          rationale: Product value depends on keeping pace with browser engines, OS releases, and device availability outside BrowserStack control.
          evidence_claim_ids: &a39
            - EC-002
            - EC-005
          source_ids: *a33
        - risk_id: R-007
          label: Acquisition integration and product sprawl
          severity: medium
          likelihood: medium
          rationale: Public sources mention Percy and Nightwatch.js acquisitions/product additions; integration, monetization, and support costs need verification.
          evidence_claim_ids: &a40
            - EC-008
          source_ids: *a33
