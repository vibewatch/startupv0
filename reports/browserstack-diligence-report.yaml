risk_register:
  - risk_id: R-001
    risk_title: Stale valuation and private financial opacity
    risk_category: financial
    severity: high
    likelihood: medium
    description: The $4B valuation is public from 2021, but current audited financials, ARR, margins, burn, and cap table are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request audited financials, ARR bridge, gross retention, NRR, cap table, and latest valuation evidence.
  - risk_id: R-002
    risk_title: Cloud/device data security and privacy exposure
    risk_category: technical
    severity: high
    likelihood: medium
    description: BrowserStack handles customer test sessions, devices, apps, browsers, and potentially sensitive pre-release software; public security claims require control testing.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.C
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Review SOC2 report, CSA materials, pen tests, incident history, data retention, and device reset controls.
  - risk_id: R-003
    risk_title: Competitive pressure in software testing clouds
    risk_category: market
    severity: medium
    likelihood: high
    description: Sauce Labs, LambdaTest, Perfecto, Kobiton, SmartBear, Applitools, open-source tooling, and native vendor test environments may pressure pricing and differentiation.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Request win/loss, renewal cohorts, competitor displacement data, and pricing history.
  - risk_id: R-004
    risk_title: Infrastructure capex and device supply dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Real-device cloud breadth and global data centers require hardware procurement, maintenance, depreciation, and operational discipline.
    impacted_chapter_ids:
      - II
      - III
      - VI
    impacted_section_ids:
      - II.A
      - III.E
      - VI.B
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Request device utilization, capex plan, supplier contracts, depreciation, and data-center SLAs.
  - risk_id: R-005
    risk_title: Customer concentration and churn not public
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Customer count and logos are public, but top-account revenue, churn, NRR, and usage concentration are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Request top customer revenue, churn/NRR by cohort, usage concentration, and enterprise contract terms.
  - risk_id: R-006
    risk_title: Platform dependence on browser, mobile OS, and device ecosystems
    risk_category: product
    severity: medium
    likelihood: medium
    description: Product value depends on keeping pace with browser engines, OS releases, and device availability outside BrowserStack control.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Review release-lag metrics, coverage roadmap, vendor relationships, and unsupported-device backlog.
  - risk_id: R-007
    risk_title: Acquisition integration and product sprawl
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Public sources mention Percy and Nightwatch.js acquisitions/product additions; integration, monetization, and support costs need verification.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.B
      - VII.A
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Request acquisition integration plans, product P&Ls, retention of acquired teams, and roadmap governance.
  - risk_id: R-008
    risk_title: Legal, IP, and regulatory gaps not publicly resolved
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: No public-source review can substitute for docket searches, IP schedules, contractual data-processing terms, and insurance review.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - VIII.F
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Request counsel legal schedule, IP assignments, DPA/terms history, and insurance policies.
