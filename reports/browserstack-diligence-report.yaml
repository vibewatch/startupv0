          label: Legal, IP, and regulatory gaps not publicly resolved
          severity: medium
          likelihood: unknown
          rationale: No public-source review can substitute for docket searches, IP schedules, contractual data-processing terms, and insurance review.
          evidence_claim_ids: &a41
