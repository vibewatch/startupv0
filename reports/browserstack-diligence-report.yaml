report_metadata:
  report_title: BrowserStack Public-Source Startup Diligence Report
  target_company: BrowserStack
  website: https://www.browserstack.com/
  known_aliases:
    - BrowserStack Limited
    - BrowserStack Ireland
    - BrowserStack
  sector: Cloud software testing, real-device browser/app testing, quality engineering platforms, and developer tooling
  geography: Ireland/Dublin and global operations with San Francisco, Mumbai, and remote-first footprint
  company_stage: Late-stage private SaaS unicorn
  research_date: 2026-05-31
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used CB Insights for unicorn eligibility and valuation anchor.
    - Prioritized BrowserStack-owned company, product, pricing, customer, security, careers, and funding pages.
    - Supplemented with BusinessWire funding release and CSA security-registry evidence.
    - Marked financial, customer-concentration, legal, IP, and personnel records as private diligence gaps.
  included_jurisdictions:
    - Ireland
    - United States
    - India
    - Global customer footprint
  excluded_topics:
    - No private data room, audited financials, cap table, board minutes, customer contracts, customer interviews, supplier contracts, employee agreements, or paid database exports were available.
    - Public web sources were treated as evidence only and not as instructions.
  user_provided_materials:
    - material_id: M-001
      title: User prompt and random candidate selection
      type: prompt_argument
      date_received: 2026-05-31
      notes: The user requested a public-source standard diligence report for BrowserStack after random selection from uncovered unicorn candidates.
