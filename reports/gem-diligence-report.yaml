executive_summary:
  overall_assessment: "Gem is eligible for a public-evidence private-unicorn diligence report: CB Insights lists a $1.20B valuation, and Gem-owned sources show active products, leadership, funding, customer-scale claims, and security/privacy disclosures. The report supports continued diligence rather than investment readiness because financial statements, SaaS KPIs, customer concentration, cap table, current valuation, AI governance evidence, and independent security reports are not public."
  investment_or_diligence_thesis: The positive thesis is a focused talent-acquisition platform with AI sourcing, CRM, ATS, integrations, 1,200+ customer/team claims, recognized investors, and visible security practices. Underwriting depends on proving durable ARR, retention through hiring cycles, differentiated AI/data assets, privacy compliance, and cost-effective integration/support economics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Gem as a $1.20B private unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Gem public pages describe AI sourcing, CRM, ATS, scheduling, analytics, AI agents, and ATS connectors.
      evidence_claim_ids:
        - EC-002
        - EC-004
    - founder_claim_id: FC-003
      summary: Gem-owned pages claim 1,200+ customers/teams and show named customer logos plus Workiva ROI evidence.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-005
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Financial performance and current valuation cannot be underwritten from public evidence.
    - risk_id: R-004
      summary: Candidate-data, email-permission, AI governance, and privacy risks require independent review.
    - risk_id: R-002
      summary: Recruiting-tech competition and hiring-cycle cyclicality may pressure growth and retention.
  key_evidence_gaps:
    - Audited financials, ARR, gross margin, burn, cash runway, and retention cohorts.
    - Top-customer revenue, active logo status, contract terms, NRR/GRR, churn, and customer references.
    - Security audit reports, DPIAs, data-governance, AI evaluation, data rights, and incident history.
    - Cap table, preference stack, debt, option pool, board minutes, HRIS, and compensation/turnover records.
  recommended_next_steps:
    - Proceed to data-room diligence focused on SaaS metrics, customer retention, data/privacy controls, and AI sourcing defensibility.
    - Conduct customer, legal/privacy, and security references before any valuation reliance.
