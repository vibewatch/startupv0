report_metadata:
  report_title: Gem Startup Diligence Report
  target_company: Gem
  website: https://www.gem.com/
  known_aliases:
    - Gem Software
    - Gem.com
  sector: AI recruiting software, talent CRM, ATS, sourcing automation, and talent acquisition analytics
  geography: United States; San Francisco public unicorn-list anchor
  company_stage: Private unicorn / active SaaS company
  research_date: 2026-05-21
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Generated from public company pages, CB Insights unicorn/profile data, and cached public source excerpts collected for the random-unicorn workflow.
    - Marked financial, customer, cap-table, HR, contract, legal, security-audit, and AI-governance records as not_publicly_verifiable where public evidence was unavailable.
    - Used current public evidence to confirm Gem appears active and private; no paid databases or private systems were accessed.
  included_jurisdictions:
    - United States
    - California
    - EU/UK privacy exposure where GDPR customer/candidate data applies
  excluded_topics:
    - Private data-room contents, customer calls, legal docket pulls, security reports, HRIS exports, board minutes, bank records, and source-code review were not accessed.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for three random unicorn reports
      type: workflow_request
      date_received: 2026-05-21
      notes: Gem was selected as a random replacement from an uncovered unicorn candidate list after WTOIP was deemed ineligible.
founder_claims:
