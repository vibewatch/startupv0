risk_register:
  - risk_id: R-001
    risk_name: Financial opacity against 2021 unicorn valuation
    category: financial
    severity: high
    likelihood: medium
    evidence_strength: medium
    description: CB Insights lists a $1.20B valuation and Gem states $148M total funding, but revenue, ARR, gross margin, burn, cash, runway, and current valuation marks are not public.
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-010
    mitigation: Request audited financials, SaaS KPI bridge, cash runway, cap table, and current investor marks.
    diligence_priority: high
  - risk_id: R-002
    risk_name: Recruiting market cyclicality and competition
    category: market
    severity: medium
    likelihood: high
    evidence_strength: medium
    description: Gem sells talent-acquisition software into hiring cycles and competes with ATS, CRM, sourcing, and AI recruiting vendors.
    evidence_claim_ids:
      - EC-002
      - EC-004
      - EC-007
    mitigation: Validate win/loss, churn by hiring cycle, pricing pressure, and feature differentiation.
    diligence_priority: high
  - risk_id: R-003
    risk_name: Customer logo and concentration uncertainty
    category: customer
    severity: medium
    likelihood: medium
    evidence_strength: medium
    description: Gem cites 1,200+ customers or talent-acquisition teams and named logos, but active paid status, ARR concentration, retention, and contract terms are private.
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-005
      - EC-006
      - EC-010
    mitigation: Request top-customer ARR, active-logo permissions, NRR/GRR, churn cohorts, renewal schedules, and customer references.
    diligence_priority: high
  - risk_id: R-004
    risk_name: Candidate-data privacy, email-permission, and AI governance exposure
    category: legal_regulatory
    severity: high
    likelihood: medium
    evidence_strength: medium
    description: Gem processes candidate, recruiter, email, profile-search, and AI sourcing data; public security controls require independent verification.
    evidence_claim_ids:
      - EC-008
      - EC-009
    mitigation: Review SOC/security reports, DPIAs, DPAs, data retention/deletion, data lineage, AI governance, incident history, and regulatory correspondence.
    diligence_priority: high
  - risk_id: R-005
    risk_name: Platform integration and vendor dependency
    category: technology
    severity: medium
    likelihood: medium
    evidence_strength: medium
    description: Gem value depends on ATS connectors, email APIs, public-profile datasets, Heroku/AWS infrastructure, and integration reliability.
    evidence_claim_ids:
      - EC-004
      - EC-008
    mitigation: Validate connector SLAs, API limits, vendor agreements, subprocessors, data-license rights, and outage history.
    diligence_priority: medium
  - risk_id: R-006
    risk_name: AI sourcing data-rights and bias risk
    category: product_compliance
    severity: medium
    likelihood: medium
    evidence_strength: low
    description: Gem markets AI sourcing over 800M+ public talent profiles, creating questions around data rights, freshness, candidate consent, matching quality, and bias controls.
    evidence_claim_ids:
      - EC-004
      - EC-009
    mitigation: Request data-source inventory, model cards/evals, adverse-impact testing, customer notices, and legal review.
    diligence_priority: medium
diligence_gaps:
  - Audited financials, ARR, gross margin, burn, cash, and runway.
  - Cap table, financing terms, preference stack, debt, and option pool.
  - Top-customer ARR, active logo status, churn, NRR/GRR, customer contracts, and customer references.
  - Security audit reports, DPIAs, data-retention records, AI/data governance, data-license proof, and incident history.
  - HRIS by function/location, compensation, turnover, and employment agreements.
follow_up_requests:
  - Provide financial statements, SaaS KPI bridge, budget-vs-actuals, and board-approved forecast.
  - Provide customer-level ARR, contract terms, renewal cohorts, support metrics, and references.
  - Provide SOC/security reports, pen tests, DPIAs, subprocessors, data-governance, and AI-evaluation evidence.
  - Provide cap table, stockholder list, option plan, board minutes, and investor rights.
  - Provide HRIS, attrition, compensation, employment agreements, and key-person retention plan.
limitations:
  - No private Gem records, customer calls, code review, or legal/regulatory database pulls were accessed.
  - Company-owned marketing pages may be current but self-interested; customer and financial claims require direct confirmation.
  - The report is a public-evidence diligence screen, not an investment recommendation.
