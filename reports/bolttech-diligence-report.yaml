executive_summary:
  overall_assessment: "bolttech appears eligible as an active private unicorn: CB Insights lists bolttech at US$2.1B, public Series C announcements support the same private valuation, and a June 2026 ING partnership shows continuing operations. Public evidence supports broad embedded-insurance platform and partner claims, but financial, cap-table, customer, legal, regulatory, security and HR diligence remains unresolved."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The case depends on proving that partner distribution and quoted-premium scale convert into durable, compliant, high-margin revenue while controlling concentration, claims/servicing, licensing, data-security and competitive-pricing risks.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and Series C announcements support US$2.1B private-unicorn status.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-023
    - founder_claim_id: FC-004
      summary: Series B/C financing milestones are public.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-004
        - EC-005
    - founder_claim_id: FC-005
      summary: Named partnerships support GTM breadth.
      evidence_claim_ids:
        - EC-012
        - EC-013
        - EC-014
        - EC-015
        - EC-016
        - EC-030
  biggest_risks:
    - risk_id: R-001
      summary: Valuation without public financial quality.
    - risk_id: R-002
      summary: Unknown customer/partner concentration.
    - risk_id: R-006
      summary: Privacy/security exposure.
    - risk_id: R-007
      summary: Multi-jurisdiction insurance licensing risk.
    - risk_id: R-011
      summary: Competitive pressure.
  key_evidence_gaps:
    - Audited financials and management accounts
    - Cap table and financing documents
    - SKU economics and claims costs
    - Revenue by partner/customer
    - Top suppliers and SLAs
    - Win/loss and pricing benchmark
    - Sales productivity and CAC
    - AI/IoT validation and roadmap
  recommended_next_steps:
    - Run financial and cap-table diligence before relying on valuation.
    - Reconcile quoted premiums and partner/product counts to bound premium, revenue, margin and retention.
    - Have counsel verify licenses, litigation, IP, contracts and privacy/security controls.
    - Benchmark pricing, service quality and win/loss against competitors.
    - Obtain HRIS, compensation, incentive and succession materials.
