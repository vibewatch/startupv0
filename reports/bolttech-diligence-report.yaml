report_metadata:
  report_title: bolttech Startup Diligence Report
  target_company: bolttech
  website: https://bolttech.io/
  known_aliases:
    - bolttech Group
    - bolt
    - bolt insurance exchange
    - AmTrust Mobile Solutions (CB Insights profile URL alias)
  sector: Embedded insurance and protection insurtech platform
  geography: Singapore-headquartered with global operations across Asia, Europe, North America and Africa
  company_stage: Private unicorn / growth-stage insurtech
  research_date: 2026-06-13
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized CB Insights, bolttech company pages/news releases, partner announcements, competitor pages and public registry/search portals where accessible.
    - Used only public evidence; marked private financial, customer, cap-table, legal, regulatory, security and HR matters not_publicly_verifiable.
    - Did not bypass paywalls, CAPTCHAs or access controls.
  included_jurisdictions:
    - Singapore
    - Asia
    - Europe
    - United States
    - Africa
  excluded_topics:
    - Private financials, cap table, contracts, customer calls, HRIS, SOC/security reports, insurance certificates and counsel-led searches were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for bolttech diligence report
      type: workflow_request
      date_received: 2026-06-13
      notes: No founder deck, data room or management responses provided.
    - material_id: UPM-002
      title: Candidate metadata from CB Insights draw
      type: user_provided_public_metadata
      date_received: 2026-06-13
      notes: bolttech; valuation $2.1B; joined 7/1/2021; Singapore; Insurance; investors Mundi Ventures, Doqling Capital Partners, Activant Capital.
