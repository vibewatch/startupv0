executive_summary:
  overall_assessment: "Proceed only with high-intensity confirmatory diligence. Public evidence verifies SSI mission, headline financing, location and current leadership, but financials, cap table, customers, product roadmap, compute contracts, safety proof and legal/IP schedules are not public."
  investment_or_diligence_thesis: "SSI is a founder-led, research-first frontier AI lab with exceptional capital-market credibility and a singular safety/superintelligence mission; diligence should test whether technical milestones, governance, compute access, retention and financing terms justify a $30B-$32B pre-commercial valuation."
  strongest_verified_claims:
    - founder_claim_id: "FC-004"
      summary: "$1B company-announced round and named investors are corroborated."
      evidence_claim_ids: ["EC-001", "EC-005", "EC-006"]
    - founder_claim_id: "FC-003"
      summary: "Palo Alto/Tel Aviv footprint is company-stated and CB row lists Palo Alto."
      evidence_claim_ids: ["EC-003"]
    - founder_claim_id: "FC-007"
      summary: "Ilya CEO, Daniel Levy President and Daniel Gross departure are company-confirmed."
      evidence_claim_ids: ["EC-009", "EC-026"]
  biggest_risks:
    - risk_id: "R-005"
      summary: "Technical non-delivery for safe superintelligence with no public benchmarks."
    - risk_id: "R-001"
      summary: "Financial quality, burn and runway not public."
    - risk_id: "R-003"
      summary: "Valuation and cap-table economics opaque."
    - risk_id: "R-008"
      summary: "Founder/key-person risk after Gross departure and Meta interest."
    - risk_id: "R-004"
      summary: "Compute dependency unquantified."
  key_evidence_gaps:
    - "Audited/management financials, burn, runway and budgets."
    - "Fully diluted cap table, financing documents, investor rights and debt/option schedules."
    - "Product roadmap, model evals, safety case and release criteria."
    - "Compute/cloud/data contracts and capacity/cost commitments."
    - "Customer/pilot list, GTM plan and current revenue status."
    - "Litigation, IP, insurance, regulatory and material-contract schedules."
  recommended_next_steps:
    - "Run founder/CFO/counsel data-room request against follow_up_requests."
    - "Commission independent technical and safety diligence."
    - "Reconcile CB $30B value, reported $32B financing and actual cap-table economics."
    - "Validate compute contracts, security controls and runway scenarios."
    - "Review key-person retention and Gross departure documents."
chapters:
