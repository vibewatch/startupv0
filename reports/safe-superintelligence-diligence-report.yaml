report_metadata:
  report_title: "Safe Superintelligence Diligence Research Report"
  target_company: "Safe Superintelligence Inc."
  website: "https://ssi.inc/"
  known_aliases: ["Safe Superintelligence", "SSI", "SSI Inc."]
  sector: "Enterprise Tech / frontier artificial intelligence research"
  geography: "United States; Palo Alto, California and Tel Aviv offices publicly stated"
  company_stage: "Private unicorn / pre-commercial frontier AI research lab"
  research_date: "2026-06-01"
  analyst: "GitHub Copilot CLI using startup-diligence-research skill"
  report_version: "1.0"
  currency: "USD"
  time_zone: "UTC"
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Company website, updates, contact page and Ashby careers pages."
    - "CB Insights current unicorn tracker row and selected peer rows."
    - "Public TechCrunch summaries; no paywall bypass for Reuters or Financial Times."
    - "CourtListener, Google Patents and OpenCorporates public searches where accessible."
    - "No private data room, financials, deck, customer references or management interviews."
  included_jurisdictions: ["United States", "California", "Delaware/entity records requested but not verified", "Israel / Tel Aviv operations requested but not verified"]
  excluded_topics: ["No non-public personal data", "No paywall bypassing", "No private systems or leaked materials"]
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Assigned CB Insights unicorn tracker row for Safe Superintelligence"
      type: "task context"
      date_received: "2026-06-01"
      notes: "Slug safe-superintelligence; valuation $30B; date joined 9/4/2024; United States/Palo Alto; Enterprise Tech; selected investors Sequoia Capital, DST Global, Andreessen Horowitz."
