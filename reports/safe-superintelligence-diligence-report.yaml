    evidence_claim_ids: ["EC-001", "EC-005", "EC-006", "EC-007", "EC-008", "EC-017", "EC-023"]
    risk_ids: ["R-001", "R-002", "R-003", "R-004", "R-013"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3", "I.A.4", "I.A.5", "I.A.6"]
        summary: "No audited statements, management reports, product/geography gross profit breakdown, backlog or AR aging were public."
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: "I.A-F1"
            finding: "Core financial statements are not public; no-revenue reporting is the only revenue signal."
            evidence_claim_ids: ["EC-007", "EC-023"]
            risk_ids: ["R-001", "R-002"]
        hidden_risks: ["Financial quality and runway cannot be assessed without private records."]
        evidence_gaps: ["Financial statements, backlog, AR aging, burn and cash are missing."]
        follow_up_questions: ["Provide financial statements, budget-vs-actuals, backlog, AR aging, revenue/gross profit by product/channel/geography."]
        table_ids: ["T-002"]
        figure_ids: []
        evidence_claim_ids: ["EC-007", "EC-023"]
      - section_id: "I.B"
        title: "Financial Projections"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3", "I.B.4", "I.B.5", "I.B.6", "I.B.7", "I.B.8"]
        summary: "No projections are public; no-revenue reporting and compute dependency make milestone and financing assumptions central."
