report_metadata:
  report_title: Gecko Robotics Startup Diligence Report
  target_company: Gecko Robotics
  website: https://www.geckorobotics.com/
  known_aliases:
    - Gecko
    - Cantilever
  sector: AI robotics, physical infrastructure inspection, industrial asset intelligence, defense and energy modernization
  geography: United States headquartered in Pittsburgh with public customer references across defense, energy, manufacturing and infrastructure
  company_stage: Private unicorn / growth-stage industrial AI and robotics company
  research_date: 2026-06-05
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and selected this target randomly from uncovered CB Insights candidates.
    - "Used public-source diligence only: CB Insights unicorn list, company-owned pages, funding/newsroom pages, search-result snippets for discovery, and public customer/trust/product pages where fetched."
    - Treated company-owned pages as evidence of public claims, not audited proof of performance.
    - Did not use private data rooms, founder interviews, customer calls, paid databases or paywalled content.
  included_jurisdictions:
    - United States
    - Public global markets referenced by company materials
  excluded_topics:
    - Non-public financial statements, cap table, board materials, contracts, security reports, customer calls, HRIS/personnel records and privileged legal/regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-05
      notes: No pitch deck, financial model, founder responses or private data room were provided.
