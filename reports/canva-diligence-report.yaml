risk_register:
  - risk_id: "R-001"
    risk_title: "Financial quality and valuation opacity"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Canva has very large public valuation anchors but audited financials, current valuation support, cash, debt, burn, revenue quality, and cap table are not public."
    impacted_chapter_ids: ["I"]
    impacted_section_ids: ["I.A", "I.B", "I.C", "I.D"]
    evidence_claim_ids: ["EC-001", "EC-003", "EC-004", "EC-020"]
    mitigation_or_diligence_request: "Obtain audited financials, monthly KPI pack, cap table, financing documents, 409A, secondary transaction support, cash/debt, and board plan."
  - risk_id: "R-002"
    risk_title: "Customer concentration and retention opacity"
    risk_category: "customer"
    severity: "medium"
    likelihood: "high"
    description: "Public logos and usage scale do not reveal ARR concentration, churn, NRR, contract quality, or paid conversion."
    impacted_chapter_ids: ["III", "V"]
    impacted_section_ids: ["III.A", "III.C", "V.B"]
    evidence_claim_ids: ["EC-007", "EC-020", "EC-021"]
    mitigation_or_diligence_request: "Request top-customer schedules, ARR concentration, churn/NRR, contract terms, discounts, renewal calendar, and customer references."
  - risk_id: "R-003"
    risk_title: "Product performance and breadth execution"
    risk_category: "product"
    severity: "medium"
    likelihood: "medium"
    description: "Canva's expanding suite adds product complexity; review evidence includes complaints about lag, customization limits, and AI accuracy."
    impacted_chapter_ids: ["II", "IV", "VI"]
    impacted_section_ids: ["II.A", "IV.A", "VI.B"]
    evidence_claim_ids: ["EC-014", "EC-016", "EC-019"]
    mitigation_or_diligence_request: "Review product-level usage, defects, support tickets, performance benchmarks, roadmap prioritization, and customer NPS."
  - risk_id: "R-004"
    risk_title: "AI copyright, training-data, privacy, and indemnity exposure"
    risk_category: "legal"
    severity: "high"
    likelihood: "medium"
    description: "Leonardo, Magic Studio, Dream Lab, Canva AI, and Canva Code increase model-training, output IP, data-use, privacy, and enterprise indemnity exposure."
    impacted_chapter_ids: ["II", "VI", "VIII"]
    impacted_section_ids: ["II.A", "VI.B", "VIII.D", "VIII.F", "VIII.G"]
    evidence_claim_ids: ["EC-011", "EC-012", "EC-016", "EC-023"]
    mitigation_or_diligence_request: "Perform legal/technical AI diligence on training data, licenses, opt-ins, model cards, safety tests, indemnities, data processing, and open-source/code-generation controls."
  - risk_id: "R-005"
    risk_title: "Acquisition integration and talent retention"
    risk_category: "operational"
    severity: "medium"
    likelihood: "medium"
    description: "Affinity and Leonardo add important teams and products; integration, retention, reporting, and roadmap outcomes are not public."
    impacted_chapter_ids: ["II", "VI", "VII"]
    impacted_section_ids: ["II.A", "VI.A", "VII.G"]
    evidence_claim_ids: ["EC-010", "EC-011", "EC-012", "EC-013"]
    mitigation_or_diligence_request: "Review acquisition agreements, retention packages, integration milestones, roadmap KPIs, attrition, and employee feedback."
  - risk_id: "R-006"
    risk_title: "Competition and pricing pressure"
    risk_category: "market"
    severity: "high"
    likelihood: "medium"
    description: "Canva competes with Adobe, productivity suites, collaboration tools, and AI design startups; incumbents may bundle, discount, or outspend."
    impacted_chapter_ids: ["IV", "V"]
    impacted_section_ids: ["IV.A", "V.A", "V.C"]
    evidence_claim_ids: ["EC-006", "EC-013", "EC-014", "EC-016", "EC-019"]
    mitigation_or_diligence_request: "Request competitive win/loss, churn by competitor, pricing concessions, product benchmarks, and sales enablement evidence."
  - risk_id: "R-007"
    risk_title: "Security, privacy, enterprise control, and compliance exposure"
    risk_category: "regulatory"
    severity: "medium"
    likelihood: "medium"
    description: "Global enterprise and consumer scale plus integrations increase security, privacy, and compliance exposure despite public control claims."
    impacted_chapter_ids: ["III", "VIII"]
    impacted_section_ids: ["III.E", "VIII.G"]
    evidence_claim_ids: ["EC-008", "EC-017", "EC-020"]
    mitigation_or_diligence_request: "Review SOC reports, penetration tests, incident logs, DPIAs, data flows, privacy complaints, DPAs, and app-security review."
  - risk_id: "R-008"
    risk_title: "Supplier, cloud, content, and platform dependency"
    risk_category: "operational"
    severity: "medium"
    likelihood: "medium"
    description: "Cloud/CDN, content/music libraries, app integrations, AI compute, creator programs, and acquisition technology create dependency and contract risk."
    impacted_chapter_ids: ["III", "VI", "VIII"]
    impacted_section_ids: ["III.E", "VI.B", "VIII.F"]
    evidence_claim_ids: ["EC-008", "EC-014", "EC-017", "EC-023"]
    mitigation_or_diligence_request: "Request supplier spend, cloud commitments, content/music licenses, AI compute contracts, SLAs, and termination rights."
  - risk_id: "R-009"
    risk_title: "GTM efficiency and paid conversion uncertainty"
    risk_category: "market"
    severity: "medium"
    likelihood: "medium"
    description: "Public scale and marketing cadence are strong, but conversion, CAC, payback, sales productivity, and budget efficiency are private."
    impacted_chapter_ids: ["V"]
    impacted_section_ids: ["V.A", "V.C", "V.D", "V.E"]
    evidence_claim_ids: ["EC-005", "EC-006", "EC-009", "EC-014", "EC-015", "EC-020"]
    mitigation_or_diligence_request: "Request funnel analytics, channel attribution, CAC/payback, quota/attainment, sales cycle, marketing ROI, and conversion cohorts."
  - risk_id: "R-010"
    risk_title: "Capital structure, secondary, and acquisition consideration complexity"
    risk_category: "financing"
    severity: "medium"
    likelihood: "medium"
    description: "Multiple valuation anchors, secondary references, acquisitions, and late-stage financing can obscure common-equity value."
    impacted_chapter_ids: ["I", "VIII"]
    impacted_section_ids: ["I.C", "I.D", "VIII.F"]
    evidence_claim_ids: ["EC-001", "EC-003", "EC-004", "EC-012", "EC-013", "EC-020"]
    mitigation_or_diligence_request: "Obtain cap table, share classes, liquidation preferences, acquisition consideration, secondary terms, option pool, debt, and investor rights."
  - risk_id: "R-011"
    risk_title: "Global workforce and personnel opacity"
    risk_category: "team"
    severity: "medium"
    likelihood: "medium"
    description: "Canva has global locations, rapid historical growth, and acquired teams, but current headcount, compensation, attrition, and employee-relations records are private."
    impacted_chapter_ids: ["VII"]
    impacted_section_ids: ["VII.A", "VII.B", "VII.D", "VII.F", "VII.G"]
    evidence_claim_ids: ["EC-003", "EC-010", "EC-011", "EC-018", "EC-020"]
    mitigation_or_diligence_request: "Request headcount by function/location, attrition, compensation, equity plan, employee relations, acquired-team retention, and culture survey data."
  - risk_id: "R-012"
    risk_title: "Legal, regulatory, insurance, and litigation gaps"
    risk_category: "legal"
    severity: "medium"
    likelihood: "unknown"
    description: "Litigation, regulatory correspondence, insurance, threatened claims, and counsel assessment are not publicly verifiable."
    impacted_chapter_ids: ["VIII"]
    impacted_section_ids: ["VIII.A", "VIII.B", "VIII.E", "VIII.G"]
    evidence_claim_ids: ["EC-008", "EC-020", "EC-023"]
    mitigation_or_diligence_request: "Request legal schedule, counsel letters, insurance policies, claims history, regulatory correspondence, complaints, and reserves."

diligence_gaps:
  - gap_id: "G-001"
    chapter_id: "I"
    section_id: "I.A"
    missing_information: "Audited financial statements, management accounts, cash, debt, revenue by product/tier/geography, gross margin, burn, tax, AR aging, and backlog."
    why_it_matters: "Needed to underwrite quality of revenue, profitability, runway, and valuation."
    suggested_source_or_request: "CFO data room and auditor workpapers."
    priority: "high"
  - gap_id: "G-002"
    chapter_id: "I"
    section_id: "I.C"
    missing_information: "Current cap table, share classes, preferences, option pool, warrants, SAFEs/notes, debt, secondary transaction terms, and acquisition consideration."
    why_it_matters: "Determines common-equity value and financing/transaction risk."
    suggested_source_or_request: "Company counsel, Carta/equity ledger, financing documents, and board approvals."
    priority: "high"
  - gap_id: "G-003"
    chapter_id: "III"
    section_id: "III.C"
    missing_information: "Top-customer ARR, churn, NRR, customer concentration, contract terms, discounts, and reference calls."
    why_it_matters: "Logo proof and usage scale do not prove durable enterprise revenue."
    suggested_source_or_request: "Sales/revenue operations dashboard and customer contracts."
    priority: "high"
  - gap_id: "G-004"
    chapter_id: "VI"
    section_id: "VI.B"
    missing_information: "AI model-training provenance, compute cost, model evaluations, safety reviews, product-level economics, roadmap status, and launch quality."
    why_it_matters: "AI is strategic and introduces cost, IP, privacy, and quality risks."
    suggested_source_or_request: "R&D, legal, security, and finance data-room materials."
    priority: "high"
  - gap_id: "G-005"
    chapter_id: "VIII"
    section_id: "VIII.D"
    missing_information: "IP schedules, open-source audit, content/music licenses, model data licenses, creator opt-ins, indemnity terms, and acquisition IP assignments."
    why_it_matters: "Material to AI/pro-design moat and legal exposure."
    suggested_source_or_request: "Counsel-led IP and AI diligence."
    priority: "high"
  - gap_id: "G-006"
    chapter_id: "VII"
    section_id: "VII.B"
    missing_information: "Current and projected headcount by function/location, attrition, compensation, equity, employee-relations claims, and acquired-team retention."
    why_it_matters: "Rapid growth and acquisitions require organization and retention diligence."
    suggested_source_or_request: "People team data room and HR/legal schedules."
    priority: "medium"

