report_metadata:
  report_title: "Canva Startup Diligence Report"
  target_company: "Canva"
  website: "https://www.canva.com/"
  known_aliases:
    - "Canva Pty Ltd"
    - "Canva, Inc."
    - "Canva"
  sector: "Visual communication, design software, and creative AI"
  geography: "Australia / global"
  company_stage: "Private late-stage unicorn"
  research_date: "2026-05-23"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "UTC"

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public-source diligence using company-owned pages, public unicorn-list data, independent news, product/pricing/security/developer pages, public customer and review signals, and acquisition announcements."
    - "No private data room, management interview, customer reference call, audited financial statement, cap table, board deck, security report, employee file, or counsel letter was available."
    - "Company-published usage, customer, security, and ROI claims are treated as public management claims rather than audited operating results."
  included_jurisdictions:
    - "Australia"
    - "United States"
    - "United Kingdom"
    - "Publicly disclosed global operating footprint"
  excluded_topics:
    - "Non-public financial statements, management accounts, cash balances, debt, tax workpapers, and revenue-recognition memos"
    - "Private customer contracts, churn cohorts, pipeline, pricing concessions, and reference-call evidence"
    - "Private cap table, preference stack, option pool, employee liquidity, and secondary transaction documentation"
    - "Non-public security reports, model-training datasets, incident logs, IP assignments, and employment records"
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Selected unicorn-list seed evidence for Canva"
      type: "workflow_request"
      date_received: "2026-05-23"
      notes: "Seed listed Canva, slug canva, US$42B valuation in October 2024, graphic design, Australia, from Wikipedia list of unicorn startup companies."

founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Canva appears on a public unicorn list at a US$42B valuation dated October 2024."
    claim_source: "User-provided unicorn-list seed evidence"
    claim_date: "2024-10"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.D"]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: ["EC-001"]
    contradiction_summary: "The valuation is a public list anchor, while independent news also references a lower US$26B secondary-sale valuation earlier in 2024; current fair value requires company and financing records."
    diligence_follow_up:
      - "Request current cap table, 409A, secondary transactions, primary financing records, preference stack, and board valuation support."
  - founder_claim_id: "FC-002"
    claim_text: "Canva is eligible for private unicorn diligence because it is active and no reviewed public source showed an IPO, acquisition of Canva, or shutdown."
    claim_source: "Eligibility screen from public sources"
    claim_date: "2026-05-23"
    mapped_chapter_ids: ["I", "VIII"]
    mapped_section_ids: ["I.C", "VIII.F"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-002", "EC-005", "EC-018"]
    contradiction_summary: null
    diligence_follow_up:
      - "Confirm corporate standing, parent/subsidiary map, capitalization, and any IPO or strategic transaction process directly with company counsel."
  - founder_claim_id: "FC-003"
    claim_text: "Canva has large global usage and a broad visual communication product suite."
    claim_source: "Canva company, newsroom, pricing, and product pages"
    claim_date: null
    mapped_chapter_ids: ["II", "V"]
    mapped_section_ids: ["II.A", "V.A"]
    verification_status: verified
    confidence: high
    evidence_claim_ids: ["EC-005", "EC-006", "EC-014", "EC-015", "EC-016"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request active-user definitions, paid conversion, retention cohorts, product-level revenue, gross margin, and roadmap execution metrics."
  - founder_claim_id: "FC-004"
    claim_text: "Canva has enterprise adoption, including Fortune 500 usage and named enterprise customers."
    claim_source: "Canva Enterprise page and Canva 2024 wrap"
    claim_date: null
    mapped_chapter_ids: ["III", "V"]
    mapped_section_ids: ["III.A", "V.B"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-007", "EC-021"]
    contradiction_summary: "Public sources support logo and broad adoption claims but do not disclose contracted ARR, top-customer revenue, churn, or concentration."
    diligence_follow_up:
      - "Request top-customer schedules, enterprise ARR by cohort, churn/NRR, contract terms, and reference permissions."
  - founder_claim_id: "FC-005"
    claim_text: "Canva is investing heavily in AI and professional design through Leonardo.Ai, Affinity, Magic Studio, Dream Lab, and Visual Suite 2.0."
    claim_source: "Canva and TechCrunch acquisition/product coverage"
    claim_date: null
    mapped_chapter_ids: ["II", "VI", "VIII"]
    mapped_section_ids: ["II.A", "VI.B", "VIII.D"]
    verification_status: verified
    confidence: high
    evidence_claim_ids: ["EC-010", "EC-011", "EC-012", "EC-013", "EC-014", "EC-016"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request AI model-training provenance, content-licensing agreements, indemnity terms, integration milestones, product gross margins, and AI safety/security review."

executive_summary:
  overall_assessment: "Canva is publicly eligible for private unicorn diligence: public sources show an active Australian visual-communication software company with a US$42B October 2024 unicorn-list valuation anchor, large global usage, enterprise adoption claims, and recent acquisitions of Affinity and Leonardo.Ai."
  investment_or_diligence_thesis: "The diligence case turns on whether Canva can convert its massive freemium and enterprise footprint into durable, profitable software revenue while absorbing AI/pro-design acquisitions, managing valuation-reset risk, and mitigating copyright, privacy, security, competition, and customer-concentration exposures."
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "The selected public unicorn list supports Canva's US$42B October 2024 valuation anchor."
      evidence_claim_ids: ["EC-001"]
    - founder_claim_id: "FC-003"
      summary: "Canva-owned sources report 220M+ monthly users, 30B+ designs, broad product breadth, and global reach."
      evidence_claim_ids: ["EC-005", "EC-015", "EC-016"]
    - founder_claim_id: "FC-005"
      summary: "Official and independent sources verify 2024 acquisitions of Affinity and Leonardo.Ai and visible AI/product investment."
      evidence_claim_ids: ["EC-010", "EC-011", "EC-012", "EC-013"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Financial quality, current valuation, and liquidity-preference opacity"
    - risk_id: "R-004"
      summary: "AI copyright, model-training, privacy, and enterprise indemnity exposure"
    - risk_id: "R-006"
      summary: "Adobe/Figma/Microsoft/Google competition and freemium-to-enterprise monetization pressure"
  key_evidence_gaps:
    - "Audited financials, monthly KPI pack, revenue by product/tier/geography, gross margin, cash, debt, burn, and runway."
    - "Current cap table, preference stack, employee liquidity, secondary pricing, warrants, options, SAFEs/notes, debt, and IPO-readiness materials."
    - "Paid conversion, churn, NRR, top-customer revenue concentration, enterprise contract terms, pipeline, sales productivity, and reference calls."
    - "AI training-data provenance, content-licensing terms, indemnity obligations, model safety, security incidents, SOC reports, and privacy assessments."
    - "Acquisition integration milestones, retained employee data, product roadmap, IP assignments, supplier/cloud commitments, and legal/regulatory schedules."
  recommended_next_steps:
    - "Reconcile the US$42B October 2024 unicorn-list valuation against primary financing, secondary transactions, 409A, revenue growth, burn, and preference stack."
    - "Obtain customer and financial diligence before relying on public logo proof or active-user scale."
    - "Run focused AI/IP/privacy/security legal diligence covering Leonardo.Ai, Magic Studio, Dream Lab, Canva Code, creator-content licensing, and enterprise indemnity."
    - "Benchmark Canva's pricing, product depth, enterprise controls, and pro-design roadmap against Adobe, Figma, Microsoft, Google, and specialist AI design tools."
    - "Review integration, retention, and roadmap execution plans for Affinity, Leonardo.Ai, Flourish, and the broader app/developer ecosystem."

chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: "Public sources verify valuation and funding anchors plus usage/revenue signals, but audited financial quality, current valuation support, cap table, debt, and projections are not publicly verifiable."
    founder_claim_ids: ["FC-001", "FC-002"]
    evidence_claim_ids: ["EC-001", "EC-003", "EC-004", "EC-005", "EC-020"]
    risk_ids: ["R-001", "R-002", "R-010"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3", "I.A.4", "I.A.5", "I.A.6"]
        summary: "Canva is private; public sources provide scale signals but not audited income statements, balance sheets, cash flows, backlog, AR aging, or management reports."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.A.1"
            finding: "Independent news reported Canva was pulling in close to US$2B in revenue in 2024, while an older funding article said it expected to exceed US$1B annualized revenue by the end of 2021; neither substitutes for audited statements."
            evidence_claim_ids: ["EC-003", "EC-004"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "Revenue-recognition quality, gross margin, AI compute cost, enterprise discounting, cash burn, and AR/backlog quality cannot be underwritten from public sources."
        evidence_gaps:
          - "Audited financials, monthly management accounts, revenue by product/tier/channel/geography, gross margin, AR aging, backlog, cash, debt, and tax schedules."
        follow_up_questions:
          - "Provide audited annual financials and monthly management accounts for the last three fiscal years and YTD."
        table_ids: ["T-002", "T-004"]
        figure_ids: []
        evidence_claim_ids: ["EC-003", "EC-004", "EC-020"]
      - section_id: "I.B"
        title: "Financial Projections"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3", "I.B.4", "I.B.5", "I.B.6", "I.B.7", "I.B.8"]
        summary: "Canva's public pricing, product launches, and usage scale support growth potential, but forecasts, unit economics, AI compute costs, capital needs, and predictability are private."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.B.1"
            finding: "The pricing page discloses Free, Pro, Business, and Enterprise packaging, but public sources do not disclose conversion, churn, NRR, CAC, payback, or forecast assumptions."
            evidence_claim_ids: ["EC-006", "EC-020"]
            risk_ids: ["R-001", "R-002"]
        hidden_risks:
          - "AI and enterprise strategy may increase compute, sales, support, indemnity, and compliance costs faster than revenue."
        evidence_gaps:
          - "Board plan, cohort retention, paid conversion, AI cost model, enterprise pipeline, CAC/payback, and scenario cases."
        follow_up_questions:
          - "Provide the board-approved three-year plan with sensitivity cases for conversion, enterprise expansion, AI compute, pricing, and churn."
        table_ids: ["T-002", "T-004"]
        figure_ids: []
        evidence_claim_ids: ["EC-006", "EC-020"]
      - section_id: "I.C"
        title: "Capital Structure"
        checklist_question_ids: ["I.C.1", "I.C.2", "I.C.3", "I.C.4", "I.C.5"]
        summary: "Public sources support private-company eligibility and major valuation anchors, but shares outstanding, options, debt, preferences, warrants, and off-balance-sheet liabilities are not public."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.C.1"
            finding: "Canva remains visible as an active private company in public sources, but detailed capitalization and liquidity preference data require company records."
            evidence_claim_ids: ["EC-001", "EC-002", "EC-020"]
            risk_ids: ["R-001", "R-010"]
        hidden_risks:
          - "Late-stage rounds, secondary sales, employee liquidity, acquisition consideration, and preferred-stock terms could materially change common-share value."
        evidence_gaps:
          - "Fully diluted cap table, option/warrant/SAFE/note schedules, preferences, debt, investor rights, and secondary transaction records."
        follow_up_questions:
          - "Provide the current cap table, financing documents, investor-rights agreements, debt schedule, and secondary transaction support."
        table_ids: ["T-003"]
        figure_ids: []
        evidence_claim_ids: ["EC-001", "EC-002", "EC-020"]
      - section_id: "I.D"
        title: "Other financial information"
        checklist_question_ids: ["I.D.1", "I.D.2", "I.D.3"]
        summary: "Public financing history includes a US$200M 2021 round at US$40B, a lower US$26B secondary reference in early 2024, and a US$42B unicorn-list anchor in October 2024; tax and accounting positions are private."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "I.D.1"
            finding: "The valuation path is non-linear across public sources and must be reconciled to actual share classes, preferences, revenue growth, and secondary-sale terms."
            evidence_claim_ids: ["EC-001", "EC-003", "EC-004", "EC-013"]
            risk_ids: ["R-001", "R-010"]
        hidden_risks:
          - "Public valuation references can mix primary valuations, secondary transactions, and list estimates that are not directly comparable."
        evidence_gaps:
          - "Tax positions, revenue-recognition policy, acquisition accounting, stock-based compensation, and valuation support."
        follow_up_questions:
          - "Reconcile all public valuation anchors to financing documents, current 409A, revenue multiples, and preference stack."
        table_ids: ["T-001"]
        figure_ids: ["F-001", "F-002"]
        evidence_claim_ids: ["EC-001", "EC-003", "EC-004", "EC-013"]

  - chapter_id: "II"
    title: "Products"
    chapter_summary: "Canva has a broad self-serve and enterprise visual communication suite with recent AI and professional-design expansion, but product-level revenue, retention, margins, roadmap cost, and integration execution are private."
    founder_claim_ids: ["FC-003", "FC-005"]
    evidence_claim_ids: ["EC-006", "EC-010", "EC-011", "EC-014", "EC-016", "EC-017"]
    risk_ids: ["R-003", "R-004", "R-005", "R-006"]
    sections:
      - section_id: "II.A"
        title: "Description of each product"
        checklist_question_ids: ["II.A.1", "II.A.2", "II.A.3", "II.A.4", "II.A.5", "II.A.6"]
        summary: "Public pages show Free, Pro, Business, Enterprise, Visual Suite, Magic Studio, Dream Lab, Affinity, Leonardo.Ai, Flourish, APIs, and app integrations, but product-level economics are not public."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "II.A.1"
            finding: "Canva has expanded from an online design editor into a suite covering presentations, whiteboards, docs, websites, video, charts, AI generation, coding-assisted apps, professional design software, and developer integrations."
            evidence_claim_ids: ["EC-006", "EC-014", "EC-016", "EC-017"]
            risk_ids: ["R-003", "R-005"]
          - finding_id: "II.A.2"
            finding: "Affinity and Leonardo.Ai add professional-design and foundational-model capability, increasing product surface area and integration complexity."
            evidence_claim_ids: ["EC-010", "EC-011", "EC-012", "EC-013"]
            risk_ids: ["R-004", "R-005"]
        hidden_risks:
          - "Broader product breadth may dilute roadmap focus, increase support/security surface area, and expose Canva to specialized incumbents."
          - "Generative AI and Canva Code create IP, data-protection, output-quality, and enterprise governance risks."
        evidence_gaps:
          - "Product-level revenue, gross margin, retention, active-seat usage, AI cost per generated asset, roadmap milestones, uptime, and defect/security history."
        follow_up_questions:
          - "Provide product P&Ls, roadmap burn-up charts, active-seat cohorts, AI unit economics, support tickets, uptime, incident data, and acquisition integration KPIs."
        table_ids: ["T-005", "T-006"]
        figure_ids: ["F-003", "F-004"]
        evidence_claim_ids: ["EC-006", "EC-010", "EC-011", "EC-014", "EC-016", "EC-017"]

  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: "Canva discloses very large global usage and enterprise-logo proof, but top-customer revenue, retention, concentration, contract terms, supplier spend, and severed relationships are not publicly verifiable."
    founder_claim_ids: ["FC-003", "FC-004"]
    evidence_claim_ids: ["EC-005", "EC-007", "EC-009", "EC-015", "EC-021"]
    risk_ids: ["R-002", "R-007", "R-008"]
    sections:
      - section_id: "III.A"
        title: "Top customers by application"
        checklist_question_ids: ["III.A"]
        summary: "Public sources name enterprise customers and report broad Fortune 500 usage, but do not rank top customers or disclose revenue by application."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "III.A.1"
            finding: "The Enterprise page and 2024 wrap reference brands such as Expedia Group, Airbnb, Salesforce, Keller Williams, Aramark, Kellanova, HP, Atlassian, and Ray White, and say more than 95% of the Fortune 500 use Canva."
            evidence_claim_ids: ["EC-007", "EC-021"]
            risk_ids: ["R-002"]
        hidden_risks:
          - "Logo proof may include free, departmental, pilot, or low-ACV usage and may not indicate material contracted revenue."
        evidence_gaps:
          - "Top-15 customers by revenue, use case, product, renewal date, contract term, NRR, and reference status."
        follow_up_questions:
          - "Provide current and prior-year top-customer schedules by ARR, application, owner, renewal, gross margin, and concentration percentage."
        table_ids: ["T-007", "T-010"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-007", "EC-021"]
      - section_id: "III.B"
        title: "Strategic relationships"
        checklist_question_ids: ["III.B"]
        summary: "Canva's partner ecosystem includes acquisitions, content, apps, integrations, and workplace-platform relationships, but revenue contribution and commercial terms are private."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "III.B.1"
            finding: "Canva discloses 300+ apps and integrations, developer APIs, and integrations with platforms such as Google Workspace, Hootsuite, Mailchimp, Zapier, Make, Workato, Salesforce, Slack, Asana, and Frontify."
            evidence_claim_ids: ["EC-014", "EC-015", "EC-017"]
            risk_ids: ["R-007"]
        hidden_risks:
          - "Integration dependencies can create API, data, app-marketplace, support, and partner-policy risks."
        evidence_gaps:
          - "Partner revenue, minimum commitments, termination rights, data-sharing terms, and SLA obligations."
        follow_up_questions:
          - "Provide material partner agreements, revenue contribution, data flows, renewal/termination terms, and app-marketplace governance."
        table_ids: ["T-008"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-014", "EC-015", "EC-017"]
      - section_id: "III.C"
        title: "Revenue by customer"
        checklist_question_ids: ["III.C"]
        summary: "No public source reviewed discloses revenue by customer or any customer accounting for 5% or more of revenue."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "III.C.1"
            finding: "Public logo and usage evidence does not disclose customer-level revenue, churn, NRR, contract term, or concentration."
            evidence_claim_ids: ["EC-020", "EC-021"]
            risk_ids: ["R-002"]
        hidden_risks:
          - "A small number of enterprise or platform customers could have outsized ARR, discounting, support burden, or churn risk."
        evidence_gaps:
          - "Customer revenue waterfall, ARR concentration, churn/NRR by segment, and customer reference evidence."
        follow_up_questions:
          - "Provide ARR by customer and segment, accounts over 5% of revenue, churn cohorts, downgrade data, and reference contacts."
        table_ids: ["T-010"]
        figure_ids: []
        evidence_claim_ids: ["EC-020", "EC-021"]
      - section_id: "III.D"
        title: "Significant relationships severed within the last two years"
        checklist_question_ids: ["III.D"]
        summary: "No public source reviewed identified material customer, partner, or supplier relationships severed within the last two years."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "III.D.1"
            finding: "Relationship-loss data is not public and requires management and customer diligence."
            evidence_claim_ids: ["EC-020"]
            risk_ids: ["R-002", "R-007"]
        hidden_risks:
          - "Enterprise churn, partner deprecations, app removals, or content-license changes may not be visible in public sources."
        evidence_gaps:
          - "Lost-customer report, terminated partner/supplier agreements, churn reason codes, and exit interviews."
        follow_up_questions:
          - "Provide a two-year schedule of lost, downgraded, terminated, or non-renewed customer, partner, content, and supplier relationships."
        table_ids: ["T-008", "T-010"]
        figure_ids: []
        evidence_claim_ids: ["EC-020"]
      - section_id: "III.E"
        title: "Top suppliers"
        checklist_question_ids: ["III.E"]
        summary: "Public sources show technology, content, platform, and acquisition dependencies, but supplier purchase amounts and agreements are private."
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: "III.E.1"
            finding: "Security pages discuss cloud storage, global CDN, encryption, vulnerability scanning, and monitoring; product pages disclose AI, content, app, and integration dependencies."
            evidence_claim_ids: ["EC-008", "EC-014", "EC-017"]
            risk_ids: ["R-007", "R-008"]
        hidden_risks:
          - "Cloud/CDN, licensed content, music libraries, AI compute, workplace integrations, and app APIs may create concentration, cost, availability, and compliance risk."
        evidence_gaps:
          - "Top supplier spend, cloud commitments, content/music licenses, AI compute contracts, SLAs, and termination rights."
        follow_up_questions:
          - "Provide top supplier schedules, cloud/AI commitments, content and music license agreements, data-processing addenda, and SLAs."
        table_ids: ["T-009"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-008", "EC-014", "EC-017"]

  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: "Canva competes across self-serve design, enterprise visual communication, professional creative tools, and AI generation; public evidence supports competitive breadth but not win/loss or market-share data."
    founder_claim_ids: ["FC-003", "FC-005"]
    evidence_claim_ids: ["EC-006", "EC-009", "EC-013", "EC-014", "EC-016", "EC-019"]
    risk_ids: ["R-006", "R-003", "R-004"]
    sections:
      - section_id: "IV.A"
        title: "Competitive landscape by market segment"
        checklist_question_ids: ["IV.A.1", "IV.A.2"]
        summary: "Canva's competition includes Adobe, Figma, Microsoft, Google, and specialist AI/content/design tools; Affinity and AI launches expand both opportunity and direct competitive exposure."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "IV.A.1"
            finding: "TechCrunch framed the Affinity acquisition as helping Canva compete with Adobe and advanced creative tools; Canva's own pricing/product pages position it across individuals, SMBs, teams, and enterprises."
            evidence_claim_ids: ["EC-006", "EC-013"]
            risk_ids: ["R-006"]
          - finding_id: "IV.A.2"
            finding: "Product Hunt reviews show strong usability sentiment but also user complaints around premium assets, lag on heavy files, limited customization, and AI accuracy."
            evidence_claim_ids: ["EC-019"]
            risk_ids: ["R-003", "R-006"]
        hidden_risks:
          - "Incumbent bundles may pressure price, switching, distribution, AI features, and enterprise procurement."
          - "Pro designers may resist subscription or workflow changes after Affinity integration."
        evidence_gaps:
          - "Market share, competitive win/loss, churn by competitor, product-performance benchmarks, and pricing concessions."
        follow_up_questions:
          - "Provide win/loss analysis, displacement data, product benchmark tests, competitor churn reasons, and pricing approval logs."
        table_ids: ["T-011", "T-012"]
        figure_ids: ["F-006"]
        evidence_claim_ids: ["EC-006", "EC-013", "EC-019"]

  - chapter_id: "V"
    title: "Marketing, Sales, and Distribution"
    chapter_summary: "Canva appears to blend freemium/self-serve acquisition, product-led viral distribution, enterprise sales, education/nonprofit programs, content marketing, developer/apps, and partnerships, but sales productivity and pipeline are private."
    founder_claim_ids: ["FC-003", "FC-004"]
    evidence_claim_ids: ["EC-005", "EC-006", "EC-007", "EC-009", "EC-014", "EC-015"]
    risk_ids: ["R-002", "R-006", "R-009"]
    sections:
      - section_id: "V.A"
        title: "Strategy and implementation"
        checklist_question_ids: ["V.A.1", "V.A.2", "V.A.3", "V.A.4"]
        summary: "Public sources show broad global freemium reach, enterprise positioning, product launches, workplace reports, PR, events, integrations, and education/nonprofit motions."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "V.A.1"
            finding: "Canva reports users in 190+ countries, 100+ languages, massive design creation, and public product events such as Canva Create, Droptober, and Visual Suite 2.0."
            evidence_claim_ids: ["EC-005", "EC-014", "EC-015", "EC-016"]
            risk_ids: ["R-009"]
        hidden_risks:
          - "Broad awareness may not translate to paid conversion or efficient enterprise CAC at late-stage valuation levels."
        evidence_gaps:
          - "Marketing spend by channel, funnel conversion, sales cycle, pipeline, CAC, payback, brand spend, and geographic performance."
        follow_up_questions:
          - "Provide GTM dashboard, channel attribution, funnel conversion, sales cycle, quota capacity, CAC/payback, and international growth metrics."
        table_ids: ["T-013", "T-014"]
        figure_ids: ["F-007"]
        evidence_claim_ids: ["EC-005", "EC-014", "EC-015", "EC-016"]
