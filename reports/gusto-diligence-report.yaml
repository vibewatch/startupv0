risk_register:
  - risk_id: R1
    risk_title: Financial quality and unit economics not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Revenue, ARR, margin, burn, runway, CAC, and retention are not publicly verifiable.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - V.B
    evidence_claim_ids:
      - E16
    mitigation_or_diligence_request: Request audited financials, monthly management accounts, ARR/NRR cohorts, CAC/payback,
      burn, runway, and debt schedule.
