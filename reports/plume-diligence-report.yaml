risk_register:
  - risk_id: R-001
    risk_title: Opaque audited financials and unit economics
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public sources disclose financing and valuation, not audited financial statements, ARR, gross margin, cash burn, CAC, payback, churn or revenue recognition.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited financials, management accounts, ARR bridge, cohort retention, gross-margin by product, cash runway and quality-of-earnings analysis.
  - risk_id: R-002
    risk_title: Stale 2021 valuation anchor may not reflect current market
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $2.6B valuation is a 2021 public round marker; public evidence does not show current valuation marks, secondary prices or preferred terms.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Obtain current 409A, latest financing documents, investor marks, preference stack and secondary-transfer history.
  - risk_id: R-003
    risk_title: Customer concentration and ISP procurement-cycle exposure
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public sources name scale and a case study but not top customers, revenue concentration, contract terms, renewal cadence or churn.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - V.D
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request top-20 customer ARR, contract terms, renewal dates, churn/NRR, deployment status and independent customer calls.
  - risk_id: R-004
    risk_title: Crowded managed Wi-Fi / subscriber-experience competition
    risk_category: market
    severity: medium
    likelihood: high
    description: Airties, Calix, Nokia and others market overlapping cloud, AI, support and managed Wi-Fi platforms for operators.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Run win/loss calls, compare pricing, switching costs, product benchmarks and integration depth versus named competitors.
  - risk_id: R-005
    risk_title: Privacy, telemetry and cybersecurity regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Plume’s product depends on extensive network and device telemetry; privacy/security controls are public but not independently diligence-grade.
    impacted_chapter_ids:
      - VIII
      - II
      - VI
    impacted_section_ids:
      - VIII.G
      - VIII.C
      - II.A
      - VI.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review DPAs, DPIAs, SOC/ISO reports, incident history, subprocessor list, data maps, retention and cross-border transfer mechanisms.
  - risk_id: R-006
    risk_title: Patent litigation and IP-encumbrance risk
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Public dockets show patent litigation involving Plume and Justia lists assigned patents; public records do not resolve encumbrances, settlements or ITC implications.
    impacted_chapter_ids:
      - VIII
      - VI
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - VI.B
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Counsel should review PACER/ITC dockets, settlement obligations, patent assignments, open-source licenses and freedom-to-operate analyses.
  - risk_id: R-007
    risk_title: Sweepr integration and agentic AI execution risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: The 2026 acquisition and Agentic AI roadmap are strategically important but require integration of teams, data, workflows, models and customer-care channels.
    impacted_chapter_ids:
      - VI
      - VII
      - VIII
    impacted_section_ids:
      - VI.B
      - VII.G
      - VIII.F
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request integration plan, product KPIs, retention agreements, customer adoption, model-risk controls and revenue contribution.
  - risk_id: R-008
    risk_title: Operational dependency on CPE, ODMs, OpenSync and cloud/hyperscalers
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Hardware-agnostic value depends on standards, CPE integrations, ODM partners and cloud-native operations.
    impacted_chapter_ids:
      - II
      - III
      - VI
    impacted_section_ids:
      - II.A
      - III.E
      - VI.B
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Review top supplier/ODM/cloud contracts, uptime/SLA metrics, open-source governance and dependency concentration.
  - risk_id: R-009
    risk_title: Leadership transition and key-person retention
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public records show founder-led history and current non-founder CEO; Sweepr leadership joined in 2026.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.C
      - VII.G
      - VI.B
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Review succession history, executive retention, option refreshes, board oversight and post-acquisition key employee retention.
  - risk_id: R-010
    risk_title: Unknown cap table, preferences, debt and runway
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Public financing releases do not disclose share counts, preferences, debt, warrants, covenants or runway.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request fully diluted cap table, preference stack, SAFEs/notes/warrants, debt agreements, board consents and pro forma exit waterfalls.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited/management financials, ARR bridge, gross margin, cash burn, cash balance, backlog and AR aging.
    why_it_matters: Public valuation cannot be underwritten without financial quality and runway.
    suggested_source_or_request: Finance data room, auditor letters, bank statements and billing exports.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preferences, debt, warrants, options and investor rights.
    why_it_matters: Preference stack and dilution determine downside/upside economics.
    suggested_source_or_request: Carta/cap-table export, financing docs and waterfall model.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer revenue concentration, churn, NRR and renewal schedule.
    why_it_matters: Broad ISP count may hide revenue concentration and renewal risk.
    suggested_source_or_request: Top-20 customer ARR schedule and contracts.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC, quota attainment, pipeline conversion and channel mix.
    why_it_matters: Enterprise ISP GTM can be slow and expensive.
    suggested_source_or_request: CRM exports, bookings cohorts and sales-comp plan.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Agentic AI roadmap, model-risk controls, deployment KPIs and Sweepr integration plan.
    why_it_matters: 2026 product thesis depends on successful integration and trusted AI workflows.
    suggested_source_or_request: Product roadmap, model evals, security reviews and customer deployment metrics.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, attrition, compensation and incentive stock plans.
    why_it_matters: Execution and retention risks are not visible publicly.
    suggested_source_or_request: HRIS export, compensation plan, option ledger and turnover report.
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Full pending/threatened litigation and ITC/PACER review.
    why_it_matters: Patent litigation can create injunction, royalty or settlement exposure.
    suggested_source_or_request: Counsel litigation schedule, PACER/ITC searches and insurance notices.
    priority: high
  - gap_id: G-008
