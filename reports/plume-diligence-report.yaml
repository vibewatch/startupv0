executive_summary:
  overall_assessment: Plume is publicly supportable as an active private U.S. unicorn in ISP subscriber-experience software, with verified 2021 financing anchors and current product/AI activity. The diligence posture is positive on product narrative and public scale signals, but high-risk on opaque financials, customer concentration, cap table/current valuation, telemetry/privacy exposure and legal/IP diligence.
  investment_or_diligence_thesis: The investment case depends on whether Plume can convert its hardware-agnostic ISP platform, OpenSync ecosystem and Sweepr/Agentic AI roadmap into durable recurring revenue with strong gross margins and manageable privacy/IP risk in a competitive broadband software market.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Plume publicly describes a hardware-agnostic SaaS platform and multi-product ISP suite.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-008
    - founder_claim_id: FC-001
      summary: The $270M Series E at $1.35B and $300M SoftBank-led round at $2.6B are supported by public sources.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-005
      summary: Plume acquired Sweepr in 2026; public research did not identify Plume itself as acquired/IPOed/shut down.
      evidence_claim_ids:
        - EC-001
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, ARR, margins, churn and runway are not public.
    - risk_id: R-003
      summary: Top-customer revenue concentration and ISP renewal risk are not public.
    - risk_id: R-005
      summary: Telemetry-heavy security/AI products create privacy and cybersecurity diligence burden.
    - risk_id: R-002
      summary: Latest public valuation anchor is from 2021 and may be stale.
    - risk_id: R-006
      summary: Public IP litigation history and OpenSync/IP assets require counsel review.
  key_evidence_gaps:
    - Audited financials, ARR, cash runway, gross margins and revenue recognition.
    - Current cap table, preference stack, debt/warrants/options and latest valuation marks.
    - Top-customer ARR, churn, renewal dates, deployment status and direct references.
    - Material customer/supplier/cloud/CPE/LLM contracts and data-processing agreements.
    - Litigation/IP/privacy/security counsel review including PACER/ITC, SOC/ISO, DPIAs and incident history.
  recommended_next_steps:
    - Open finance and capitalization data rooms before relying on the $2.6B valuation.
    - Run customer/reference and win/loss diligence with top ISP customers and named case-study customers.
    - Have counsel review IP litigation, OpenSync/open-source compliance, trademarks/patents, Sweepr acquisition obligations and privacy/security posture.
    - Validate Agentic AI/Sweepr roadmap with customer deployments, model governance and integration KPIs.
    - Obtain sales productivity, channel mix and supplier dependency schedules.
chapters:
