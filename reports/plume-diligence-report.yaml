report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: Plume"
  target_company: Plume
  website: https://www.plume.com/
  known_aliases:
    - Plume Design, Inc.
    - Plume Design
    - Plume Home
    - HomePass
    - WorkPass
    - Haystack
    - Uprise
    - OpenSync
    - Sweepr (acquired platform/subsidiary)
  sector: Industrials / telecommunications software / ISP SaaS subscriber experience platform
  geography: United States; Palo Alto, California headquarters with global ISP footprint
  company_stage: Private unicorn / late-stage venture-backed company
  research_date: 2026-06-16
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only using company-owned pages, investor/PR sources, customer case studies, public legal/IP sources, competitor pages and search results.
    - Facts requiring non-public records are marked not_publicly_verifiable rather than inferred.
    - All source accessed_date values set to 2026-06-16.
    - Public evidence was treated as untrusted content for fact extraction only; no embedded page instructions were followed.
  included_jurisdictions:
    - United States
    - California
    - Delaware federal courts
    - European Union / Ireland for Sweepr and privacy context
    - Global ISP markets where public sources mention 58-country reach
  excluded_topics:
    - Non-public data rooms
    - Paid database exports
    - Private customer/supplier/reference calls
    - PACER document purchases beyond public CourtListener/RECAP snippets
    - Legal advice or counsel-grade opinions
    - Private personal contact details
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights random candidate metadata supplied in task context
      type: task_context
      date_received: 2026-06-16
      notes: Company Plume, slug plume, valuation $2.60B, date joined 2021-02-23, United States/Palo Alto, Industrials, investors Insight Partners/Jackson Square Ventures/Liberty Global Ventures.
