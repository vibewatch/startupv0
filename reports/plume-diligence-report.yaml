  - figure_id: F-011
    title: Risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Full risk register severity/likelihood heatmap.
    purpose: Prioritize diligence across finance, customer, privacy, legal, product and team categories.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Opaque audited financials and unit economics
          severity: high
          likelihood: unknown
          rationale: Public sources disclose financing and valuation, not audited financial statements, ARR, gross margin, cash burn, CAC, payback, churn or revenue recognition.
          evidence_claim_ids: &a1
            - EC-018
            - EC-002
            - EC-003
          source_ids:
            - SRC-001
            - SRC-002
            - SRC-003
            - SRC-005
            - SRC-015
        - risk_id: R-002
          label: Stale 2021 valuation anchor may not reflect current market
          severity: high
          likelihood: medium
          rationale: The $2.6B valuation is a 2021 public round marker; public evidence does not show current valuation marks, secondary prices or preferred terms.
          evidence_claim_ids: &a2
            - EC-001
            - EC-003
          source_ids:
            - SRC-001
            - SRC-010
            - SRC-026
            - SRC-003
        - risk_id: R-003
          label: Customer concentration and ISP procurement-cycle exposure
          severity: high
          likelihood: unknown
          rationale: Public sources name scale and a case study but not top customers, revenue concentration, contract terms, renewal cadence or churn.
          evidence_claim_ids: &a3
            - EC-006
            - EC-007
            - EC-015
            - EC-018
          source_ids:
            - SRC-002
            - SRC-003
            - SRC-005
            - SRC-010
            - SRC-016
        - risk_id: R-004
          label: Crowded managed Wi-Fi / subscriber-experience competition
          severity: medium
          likelihood: high
          rationale: Airties, Calix, Nokia and others market overlapping cloud, AI, support and managed Wi-Fi platforms for operators.
          evidence_claim_ids: &a4
            - EC-014
            - EC-015
          source_ids:
            - SRC-022
            - SRC-023
            - SRC-024
            - SRC-004
            - SRC-005
        - risk_id: R-005
          label: Privacy, telemetry and cybersecurity regulatory exposure
          severity: high
          likelihood: medium
          rationale: Plume’s product depends on extensive network and device telemetry; privacy/security controls are public but not independently diligence-grade.
          evidence_claim_ids: &a5
            - EC-011
            - EC-019
            - EC-016
          source_ids:
            - SRC-013
            - SRC-014
            - SRC-017
            - SRC-027
            - SRC-016
        - risk_id: R-006
          label: Patent litigation and IP-encumbrance risk
          severity: medium
          likelihood: medium
