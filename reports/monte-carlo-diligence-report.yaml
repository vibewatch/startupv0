    related_gap_ids: [G-005]
limitations:
  - This report relies only on public sources available during the 2026-05-21 research pass and the selected CB Insights row.
  - Company-published claims about customers, ROI, retention and growth verify the presence of public statements, not current customer economics or independent outcomes.
  - No management interview, data room, customer reference, security artifact, legal docket review or paid database export was available.
  - The USD 1.6B valuation and 2022 operating claims may be stale; current economics require primary company documents.
