    claim: Monte Carlo announced a USD 135M Series D led by IVP, USD 236M raised over 20 months and a USD 1.6B valuation.
    evidence_summary: BusinessWire release names IVP, Accel, GGV, Redpoint, ICONIQ Growth, Salesforce Ventures and GIC, and reports the valuation and capital raised.
    source_ids: [SRC-002]
    verification_status: verified
    confidence: high
    chapter_ids: [I, V, VII]
    section_ids: [I.B, I.C, V.A, VII.A, VII.B]
