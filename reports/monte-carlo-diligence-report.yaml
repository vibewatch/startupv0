risk_register:
  - risk_id: R-001
    risk_title: Financial quality and current revenue durability are non-public
    description: Current ARR, NRR/churn, gross margin, cash/debt, burn, customer concentration and forecasts are not publicly available.
    severity: high
    likelihood: high
    evidence_strength: medium
    evidence_claim_ids: [EC-009]
    mitigation_or_diligence_request: Request financial statements, ARR bridge, retention/churn, gross margin, cash/debt, forecast and board materials.
  - risk_id: R-002
    risk_title: Valuation and cap-table economics may be stale
    description: The USD 1.6B valuation dates to 2022; current market multiples, growth and financing terms may materially change economics.
    severity: high
    likelihood: medium
    evidence_strength: high
    evidence_claim_ids: [EC-001, EC-002, EC-003]
    mitigation_or_diligence_request: Review current valuation support, financing documents, preferences, debt, option pool and runway.
  - risk_id: R-003
    risk_title: Customer concentration and deployment depth are unknown
    description: Public 400+ enterprise and logo claims do not disclose ARR by account, contract status, churn, product usage or references.
    severity: high
    likelihood: medium
    evidence_strength: medium
    evidence_claim_ids: [EC-004, EC-005, EC-012]
    mitigation_or_diligence_request: Validate top accounts, renewals, NRR/churn, telemetry and independent references.
  - risk_id: R-004
    risk_title: Competitive pressure and bundling risk
    description: Data observability and AI observability overlap with platform vendors, APM vendors, catalogs/governance tools and AI-native startups.
    severity: high
    likelihood: medium
    evidence_strength: medium
    evidence_claim_ids: [EC-004, EC-006, EC-013]
    mitigation_or_diligence_request: Benchmark win/loss, pricing, retention, feature differentiation and platform-vendor displacement.
  - risk_id: R-005
    risk_title: Enterprise GTM efficiency is opaque
    description: Sales-led enterprise motion may have long cycles, security reviews and high CAC; public sources do not disclose productivity.
    severity: medium
    likelihood: medium
    evidence_strength: medium
    evidence_claim_ids: [EC-002, EC-011]
    mitigation_or_diligence_request: Review funnel metrics, CAC/payback, quota attainment, partner influence and pipeline quality.
  - risk_id: R-006
    risk_title: AI/agent observability product execution risk
    description: The product narrative has expanded into agent trust; adoption, maturity, telemetry and safety controls are not public.
    severity: medium
    likelihood: medium
    evidence_strength: medium
    evidence_claim_ids: [EC-004, EC-006]
    mitigation_or_diligence_request: Review roadmap, release status, telemetry, customer adoption and AI risk controls.
  - risk_id: R-007
    risk_title: Personnel scaling and retention unknown
    description: Public headcount grew from 20 to 120 by 2022; current headcount, attrition and leadership depth are not public.
    severity: medium
    likelihood: medium
    evidence_strength: medium
    evidence_claim_ids: [EC-002, EC-008]
    mitigation_or_diligence_request: Review HRIS, attrition, hiring plan, compensation, succession and employee IP assignments.
  - risk_id: R-008
    risk_title: Security, privacy, legal and IP artifacts unreviewed
    description: Privacy policy confirms data-processing obligations and subprocessors, but SOC, DPA, IP and legal schedules were not reviewed.
    severity: high
    likelihood: medium
    evidence_strength: medium
    evidence_claim_ids: [EC-007, EC-010]
    mitigation_or_diligence_request: Review SOC/security reports, DPAs, subprocessors, incident logs, legal schedule, IP assignments and insurance.
diligence_gaps:
  - gap_id: G-001
    topic: Financial statements and revenue quality
    description: Current audited financials, ARR, NRR/churn, gross margin, cash/debt, burn and forecast are not public.
    related_risk_ids: [R-001]
  - gap_id: G-002
    topic: Cap table and valuation
    description: Financing terms, investor rights, option pool, debt, preferences and current valuation bridge are unavailable.
    related_risk_ids: [R-002]
  - gap_id: G-003
    topic: Customer concentration and references
    description: Logo claims and 400+ customer count do not disclose current paid status, ARR concentration, churn or references.
    related_risk_ids: [R-003]
  - gap_id: G-004
    topic: Competitive defensibility
    description: Win/loss, price pressure, switching cost, platform-vendor bundling and AI-observability differentiation require private evidence.
    related_risk_ids: [R-004, R-006]
  - gap_id: G-005
    topic: Security, privacy, legal and IP controls
    description: SOC, DPA, subprocessor, incident, legal and IP artifacts were not reviewed.
    related_risk_ids: [R-008]
follow_up_requests:
  - request_id: FR-001
    request: Provide audited financials, YTD management accounts, ARR bridge, NRR/churn, gross margin, cash/debt, burn, pipeline and forecast model.
    owner: Company CFO / finance team
    priority: high
    related_gap_ids: [G-001]
  - request_id: FR-002
    request: Provide cap table, financing documents, investor rights, preferences, option pool, debt/warrants and current valuation support.
    owner: Company legal / finance team
    priority: high
    related_gap_ids: [G-002]
  - request_id: FR-003
    request: Provide current customer cohort, top 25 ARR customers, contracts, renewal/churn, deployment telemetry, ROI evidence and reference calls.
    owner: Revenue leadership
    priority: high
    related_gap_ids: [G-003]
  - request_id: FR-004
    request: Provide competitive win/loss, pricing comparisons, retention by competitor, AI/agent roadmap, product telemetry and technical architecture.
    owner: Product and revenue leadership
    priority: medium
    related_gap_ids: [G-004]
