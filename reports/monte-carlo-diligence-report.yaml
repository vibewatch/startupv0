  - evidence_claim_id: EC-001
    claim: CB Insights lists Monte Carlo as a private unicorn with latest known valuation of approximately USD 1.6B.
    evidence_summary: CB Insights unicorn list row selected for this workflow records Monte Carlo, USD 1.6B valuation, joined 2022-05-24, United States, enterprise tech.
    source_ids: [SRC-001]
    verification_status: verified
    confidence: high
    chapter_ids: [I]
    section_ids: [I.B]
