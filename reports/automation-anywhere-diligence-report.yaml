report_metadata:
  report_title: Automation Anywhere Startup Diligence Report
  target_company: Automation Anywhere
  website: https://www.automationanywhere.com/
  known_aliases:
    - Automation Anywhere
    - Automation Anywhere, Inc.
  sector: Agentic process automation, robotic process automation and enterprise workflow AI
  geography: United States / global enterprise automation markets
  company_stage: Private unicorn / late-stage enterprise software company
  research_date: 2026-05-27
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Selected from a CB Insights current unicorn-list fetch after excluding existing reports by slug.
    - Used company-owned sources, regulatory/company registries where relevant, independent news/database sources and public product/customer/security pages.
    - Treated company-published claims as evidence of public statements unless independently corroborated.
    - No private data room, management interview, customer call, legal docket export, security report or financial model was available.
  included_jurisdictions:
    - United States
    - Global markets referenced by public company materials
  excluded_topics:
    - Private financial statements beyond public filings, contracts, cap table, customer calls, board materials, SOC/security reports, legal dockets and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-27
      notes: No pitch deck, financial model, data room or founder responses were provided.
