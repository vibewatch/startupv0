executive_summary:
  overall_assessment: Track with financial, legal, and operations diligence. Public evidence supports an active private unicorn with substantial regional scale and product breadth, but audited financials, unit economics, courier economics, regulatory schedules, litigation, customer cohorts, and financing terms are not public.
  investment_or_diligence_thesis: Rappi is one of Latin America’s best-known private super-apps, with public evidence for a $5.25B valuation, 9-country/200+ city footprint, tens of millions of users, hundreds of thousands of couriers, and product extensions into fintech, quick commerce, travel, entertainment, and AI-enabled operations. Upside depends on whether scale converts into profitable density and financial-services monetization; downside centers on labor/regulatory pressure, subsidy intensity, and complex country-by-country execution.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Rappi is a private Latin American unicorn valued around $5.25B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Rappi was founded in 2015 by Simón Borrero, Sebastián Mejía, and Felipe Villamarín and is headquartered/associated with Bogotá, Colombia.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Rappi has continued R&D/product investment, including acquiring Fountain9 to enhance AI-driven operations.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Opaque unit economics and path to profitability
    - risk_id: R-002
      summary: Labor/consumer protection and fintech regulatory exposure
    - risk_id: R-003
      summary: Cross-border operational complexity and competitive subsidies
  key_evidence_gaps:
    - Audited financial statements, management accounts, cash, burn, runway, revenue/GMV/ARR bridge and gross margin.
    - Fully diluted cap table, financing documents, investor rights, debt, warrants, SAFEs/notes, option pool and liquidation waterfall.
    - Top customer/seller/merchant revenue concentration, cohort retention, churn, references and severed relationships.
    - Material customer, partner, supplier, employment, IP, privacy/security, insurance and financing contracts.
    - Counsel-led litigation, regulatory, IP, employment, privacy/security and insurance diligence.
  recommended_next_steps:
    - Open financial/cap-table data room before underwriting valuation.
    - Run customer/seller/merchant and partner calls to validate retention, concentration and unit economics.
    - Commission legal/regulatory/IP/security diligence appropriate to the sector and jurisdictions.
    - Review management org chart, headcount by function/location, attrition, compensation and succession plan.
