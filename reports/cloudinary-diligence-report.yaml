executive_summary:
  overall_assessment: Cloudinary appears to be an active late-stage private visual-media software unicorn with strong public evidence of product breadth, customer proof, trust/security materials, and a 2021 $2B valuation marker. The main underwriting blocker is private-company opacity across financials, ARR, margins, burn/runway, cap table, customer concentration/retention, GTM efficiency, material contracts, legal exposure, security detail, and HR data.
  investment_or_diligence_thesis: Cloudinary could be attractive if private data confirms durable high-retention ARR from a differentiated media API + DAM + AI platform with efficient GTM and manageable cloud/CDN/model COGS. Diligence should validate current valuation against financial quality, customer durability, competitive pressure, AI economics/governance, and privacy/security/legal exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support private-unicorn status and a historical $2B valuation marker.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
    - founder_claim_id: FC-002
      summary: Primary company pages verify programmable media, DAM/Assets, and visual-media platform positioning.
      evidence_claim_ids:
        - EC-005
        - EC-006
    - founder_claim_id: FC-006
      summary: Trust, subprocessor, status, privacy, DPA, and terms pages are public enterprise-procurement signals.
      evidence_claim_ids:
        - EC-011
        - EC-012
        - EC-013
        - EC-014
    - founder_claim_id: FC-007
      summary: AI Vision and MCP documentation verify public AI/agent workflow expansion.
      evidence_claim_ids:
        - EC-007
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: "Financial/unit-economics opacity: ARR, growth, margin, cloud/CDN/model COGS, burn, runway, cash, debt, and forecast quality are private."
    - risk_id: R-004
      summary: Privacy/security litigation and incident exposure require primary docket, counsel, insurance, and security review.
    - risk_id: R-003
      summary: "Customer concentration/retention opacity: public logos do not prove active paid status, ARR, NRR/GRR, churn, or severed relationships."
    - risk_id: R-006
      summary: Competitive pressure from Cloudflare, Akamai, Adobe, imgix, and adjacent alternatives.
    - risk_id: R-007
      summary: "AI governance/economics: adoption, accuracy, data-use controls, model providers, and gross-margin impact are not public."
  key_evidence_gaps:
    - Audited financials, ARR bridge, gross margin, COGS, cash, burn, runway, debt, and forecast model.
    - Cap table, financing documents, preference stack, option pool, investor rights, debt/warrants, 409A, and recent marks.
    - Top-customer ARR, NRR/GRR, churn, severed relationships, gross margin by customer, active status, logo rights, and references.
    - "GTM productivity: CAC/payback, pipeline, quota attainment, rep ramp, marketing ROI, pricing waterfall, discounting."
    - "Legal/security/privacy: litigation docket, SOC/ISO reports, pen tests, incidents, DPAs, subprocessors, contracts, insurance."
    - "People/IP/R&D: org chart, board, compensation, attrition, stock plans, roadmap, technical debt, AI governance, IP assignments."
  recommended_next_steps:
    - Run financial/QofE review focused on ARR quality, gross margin by usage, COGS, burn/runway, debt, and forecast support.
    - Run customer diligence with top-customer schedules, retention/churn cohorts, severed relationships, logo audit, and direct references.
    - Complete legal/security/privacy diligence covering litigation, SOC/ISO/pen tests, incidents, DPAs, subprocessors, contracts, privacy/regulatory correspondence, and insurance.
    - Validate GTM efficiency and competition through CRM win/loss, pricing concessions, pipeline, CAC/payback, quota attainment, and competitor displacement analysis.
    - Assess R&D/AI/IP execution through architecture review, roadmap, AI governance/model costs, technical debt, IP assignments, and open-source SBOM.
