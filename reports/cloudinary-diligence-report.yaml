report_metadata:
  report_title: Cloudinary Public-Source Startup Diligence Report
  target_company: Cloudinary
  website: https://cloudinary.com/
  known_aliases:
    - Cloudinary Ltd.
    - Cloudinary Inc.
    - Cloudinary Labs Ltd.
    - Cloudinary
  sector: Enterprise software; visual media management; image and video API; digital asset management; CDN/media optimization; AI-enabled media workflows
  geography: Israel-founded with U.S. and global operations; global SaaS customer footprint
  company_stage: Late-stage private unicorn; latest public valuation marker $2B from 2021 Blackstone Growth transaction
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used only public sources, prioritizing primary company pages for product/pricing/trust/legal/customer evidence.
    - Used reputable third-party public sources for unicorn eligibility, valuation corroboration, legal-record signals, patents, competitors, and workforce estimates.
    - Treated vendor customer stories, third-party headcount estimates, and legal-news summaries as diligence leads requiring direct confirmation.
    - Marked private financial, customer, cap-table, legal, HR, insurance, audit, and contract data as not_publicly_verifiable rather than inferring.
  included_jurisdictions:
    - United States
    - Israel
    - European Union / GDPR context
    - Global SaaS, media, CDN, and DAM markets
  excluded_topics:
    - No private financials, ARR schedules, CRM exports, contracts, cap tables, audit reports, insurance, HR records, counsel disclosures, interviews, paid databases, product tests, or source-code review.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-05-20
      notes: Standard-depth public-source diligence report for Cloudinary at reports/cloudinary-diligence-report.yaml.
