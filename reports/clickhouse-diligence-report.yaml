executive_summary:
  overall_assessment: "ClickHouse appears to be an active late-stage private enterprise-data unicorn
    with strong public signals: a $15B CB Insights tracker valuation, large public financing
    announcements, a widely adopted Apache-2.0 open-source core, same-day repository activity,
    managed ClickHouse Cloud, and company-published customer/ARR growth claims. The report should be
    treated as a diligence roadmap rather than an underwriting conclusion because audited
    financials, customer-level ARR, cap table, contracts, legal clearance, security audit artifacts,
    and HR data are private."
  investment_or_diligence_thesis: The diligence thesis is that open-source technical adoption plus a
    managed cloud product can support durable real-time analytics infrastructure revenue if
    ClickHouse proves cloud gross margins, retention, enterprise conversion, product focus, and
    competitive differentiation at a valuation implied by current public unicorn databases.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists ClickHouse as a $15B private unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: The public repository describes ClickHouse as an open-source column-oriented real-time
        analytics database.
      evidence_claim_ids:
        - EC-006
    - founder_claim_id: FC-008
      summary: GitHub API metrics show substantial current activity and community scale.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-004
      summary: Company-published materials cite more than 3,000 Cloud customers and ARR growth above 250%
        YoY.
      evidence_claim_ids:
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Public $15B valuation must be reconciled to financing terms, current cap table,
        preferences, and revenue quality.
    - risk_id: R-002
      summary: Audited financials, ARR bridge, margins, burn, and cash runway are not public.
    - risk_id: R-003
      summary: Managed cloud/BYOC economics and credit-facility terms could pressure gross margin or
        flexibility.
    - risk_id: R-005
      summary: Competition from hyperscalers, data-platform suites, and observability vendors is intense.
    - risk_id: R-007
      summary: Security, privacy, IP, contract, litigation, insurance, and regulatory clearance require
        private legal/security review.
  key_evidence_gaps:
    - Audited financial statements, management accounts, ARR/NRR/GRR cohort metrics, gross margin by
      product/deployment, cash/burn, and forecast model.
    - Current cap table, financing documents, liquidation preferences, option pool, investor rights,
      and credit-facility covenants.
    - Customer-level ARR, concentration, usage, churn, renewal calendar, customer reference calls,
      and supplier/cloud commitments.
    - Product-level P&L, cloud COGS, roadmap/adoption for BYOC/Postgres/ClickStack/Langfuse,
      engineering quality, and security/incident history.
    - "Legal data room: material contracts, DPAs, SLAs, insurance, IP assignments, OSS audit,
      litigation/regulatory searches, and HR claims/compensation data."
  recommended_next_steps:
    - Open a management diligence track focused on financial statements, ARR cohorts, cloud gross
      margin, sales productivity, and valuation bridge.
    - Run customer/supplier diligence covering top accounts, renewals, customer interviews,
      cloud-provider contracts, subprocessors, and margin commitments.
    - Run technical/security diligence covering architecture, product roadmap, incident history,
      vulnerability management, SBOM/OSS scan, and Trust Center audit artifacts.
    - Run legal/HR diligence covering cap table, financing/debt, material contracts, DPAs, IP
      assignments, litigation/regulatory searches, insurance, org/compensation, and option plans.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: "Public evidence verifies a large private financing trajectory and strong
      company-published Cloud traction, but core financial diligence remains private: audited
      statements, ARR bridge, gross margin, burn, cash, debt covenants, backlog, collections, taxes,
      and cap table were not public."
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-009
      - EC-016
    risk_ids:
      - R-001
      - R-002
      - R-003
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Audited financials, management reporting, backlog, AR aging, and revenue/margin by
          product/channel/geography are not public; only financing announcements and high-level
          customer/ARR growth claims are visible.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: No public audited income statement, balance sheet, cash-flow statement, backlog schedule,
              or AR aging schedule was located in reviewed public sources.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-002
          - finding_id: I.A-F2
            finding: Company-published metrics cite more than 3,000 Cloud customers and ARR growth above 250%
              year over year, but these are not substitutes for audited revenue, cohort, or margin
              schedules.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-002
              - R-004
        hidden_risks:
          - Headline ARR/customer-growth language may mask consumption volatility, discounts, churn,
            professional-services mix, or cloud infrastructure gross-margin pressure.
        evidence_gaps:
          - Audited annual/quarterly financial statements, revenue-recognition memo,
            product/channel/geography revenue, backlog, AR aging, gross margin by deployment model,
            cash/burn, and management KPI packs.
        follow_up_questions:
          - Provide audited financials for the last three fiscal years, current-year monthly
            management accounts, ARR bridge, NRR/GRR, gross-margin by product, backlog, AR aging,
            cash runway, and board financial packages.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-016
      - section_id: I.B
        title: Financial projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources identify growth drivers—cloud adoption, open-source reach, BYOC,
          observability, Postgres, and AI-adjacent products—but do not provide three-year financial
          projections or scenario assumptions.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Public product expansion creates multiple possible growth vectors but no public plan
              quantifies revenue, costs, or capital needs by vector.
            evidence_claim_ids:
              - EC-010
              - EC-011
            risk_ids:
              - R-001
              - R-003
              - R-005
        hidden_risks:
          - A high valuation could depend on sustained consumption growth and successful expansion
            into adjacent products without visible proof of forecast achievability.
        evidence_gaps:
          - Three-year quarterly forecast, cohort model, usage/consumption model, pricing
            assumptions, infrastructure capacity plan, hiring plan, and sensitivity cases.
        follow_up_questions:
          - Provide downside/base/upside projections with ARR, GAAP revenue, COGS, cloud costs,
            operating expense, cash, debt, and financing assumptions.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-010
          - EC-011
          - EC-016
      - section_id: I.C
        title: Capital structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public funding announcements identify large equity rounds and a credit facility, but share
          counts, option pool, warrants, SAFE/notes, debt covenants, investor rights, and
          off-balance-sheet liabilities are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: The $350M Series C and $100M credit facility announcement creates a public debt/financing
              diligence hook.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-003
          - finding_id: I.C-F2
            finding: CB Insights current $15B valuation should be reconciled to actual current fully diluted cap
              table and liquidation stack.
            evidence_claim_ids:
              - EC-001
            risk_ids:
              - R-001
        hidden_risks:
          - Credit covenants, liquidation preferences, secondary-sale economics, or employee option
            repricing needs could materially change common-equity value.
        evidence_gaps:
          - Cap table, stockholder list, option/warrant schedules, debt documents, board consents,
            investor rights, side letters, and off-balance-sheet commitments.
        follow_up_questions:
          - Provide current fully diluted cap table, option pool, debt agreements, preference stack,
            warrants/notes, investor rights, and liquidation waterfall.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-004
          - EC-016
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is public at a headline level, while tax positions, accounting policies,
          basis in prior rounds, and current ownership are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Public sources show a step-up from early venture financing to a CB Insights $15B unicorn
              valuation.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
              - EC-004
              - EC-005
            risk_ids:
              - R-001
        hidden_risks:
          - Round headline amounts can include secondary proceeds, structured terms, debt, or
            milestones that affect true dilution and preference economics.
        evidence_gaps:
          - Tax/NOL schedule, accounting policies, financing documents, round-by-round ownership,
            debt basis, and revenue-recognition policies.
        follow_up_questions:
          - Provide financing history by round with date, investors, gross/new money, secondary
            proceeds, post-money valuation, share price, preferences, ownership, and current
            carrying basis.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-005
  - chapter_id: II
    title: Products
    chapter_summary: "ClickHouse’s public product story is strong: a widely used Apache-2.0 open-source
      columnar database, managed ClickHouse Cloud, BYOC, pricing/packaging, and expanding adjacent
      products. Diligence should focus on product-level ARR, gross margin, retention, integration
      maturity, and technical differentiation durability."
    founder_claim_ids:
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-010
      - EC-011
    risk_ids:
      - R-003
      - R-005
      - R-006
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public materials support the core database and cloud product line plus BYOC, Postgres,
          observability/ClickStack, and Langfuse Cloud. Product-level economics and market share are
          not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: The ClickHouse README describes the core product as an open-source column-oriented database
              for real-time analytical reporting.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-006
          - finding_id: II.A-F2
            finding: Managed Cloud, BYOC, Postgres, ClickStack/observability, and Langfuse Cloud indicate a
              broader commercial portfolio.
            evidence_claim_ids:
              - EC-008
              - EC-010
              - EC-011
            risk_ids:
              - R-003
              - R-005
          - finding_id: II.A-F3
            finding: GitHub repository metrics provide a strong public technical-adoption signal.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-006
        hidden_risks:
          - Product sprawl could dilute engineering focus, increase support cost, or create
            integration debt before commercial traction is proven by module.
        evidence_gaps:
          - Product-level ARR, gross margin, attach rate, roadmap, uptime/SLA performance, incident
            history, cloud COGS, support costs, product security reviews, and win/loss by product.
        follow_up_questions:
          - Provide product P&L, roadmap, technical architecture review, deployment mix, churn/NRR
            by product, cloud COGS, support ticket trends, and product-security artifacts.
        table_ids:
          - T-003
          - T-004
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-010
          - EC-011
  - chapter_id: III
    title: Customer Information
    chapter_summary: Customer evidence is encouraging but incomplete. Company-published materials cite
      more than 3,000 Cloud customers and named customer stories; private diligence must verify
      active contracts, concentration, retention, consumption volatility, pipeline quality, and
      cloud/provider dependencies.
    founder_claim_ids:
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-009
      - EC-012
      - EC-016
    risk_ids:
      - R-002
      - R-004
      - R-009
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public customer stories and 3,000+ Cloud-customer language support broad adoption, but
          top-15 customer lists by application, ARR, product ownership, and purchase timing are
          private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Company-published materials cite more than 3,000 Cloud customers.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-004
          - finding_id: III.A-F2
            finding: Named customer stories support use-case breadth but require direct customer confirmation.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-004
        hidden_risks:
          - Logo evidence may include former, low-spend, trial, or non-referenceable customers;
            usage-based models can create concentration in a few high-consumption accounts.
        evidence_gaps:
          - Top-15 customers by ARR/usage/application, customer interviews, contract status,
            NRR/GRR, expansion/contraction, renewal dates, and logo-rights proof.
        follow_up_questions:
          - Provide top customer schedule for the last two fiscal years and current YTD, with ARR,
            product, use case, owner, purchase timing, renewal date, NRR, and reference status.
        table_ids:
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-009
          - EC-012
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Strategic cloud, technology, open-source, channel, and ecosystem relationships are
          directionally visible through product positioning but revenue contribution and contract
          terms are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.B-F1
            finding: BYOC and managed-cloud positioning imply important relationships with customer cloud
              accounts and infrastructure ecosystems.
            evidence_claim_ids:
              - EC-008
              - EC-010
            risk_ids:
              - R-003
              - R-009
        hidden_risks:
          - Dependence on hyperscaler marketplaces, credits, co-sell, or infrastructure terms may
            affect margins and go-to-market efficiency.
        evidence_gaps:
          - Partner agreements, cloud marketplace revenue, co-sell commitments, referral/channel
            economics, and strategic alliance KPIs.
        follow_up_questions:
          - Provide strategic partner list, contracts, revenue contribution, marketplace/co-sell
            metrics, MDF, commitments, and termination/change-of-control rights.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-010
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Customer-level revenue and any 5%+ customer concentration are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Public customer counts and stories do not disclose customer-level ARR, usage, or
              concentration.
            evidence_claim_ids:
              - EC-009
              - EC-012
              - EC-016
            risk_ids:
              - R-002
              - R-004
        hidden_risks:
          - A small number of very large consumption customers could drive growth, increase
            forecasting volatility, and create renewal leverage.
        evidence_gaps:
          - Revenue by customer, ARR concentration, usage concentration, expansion/contraction,
            commitments versus pay-as-you-go, and renewal calendar.
        follow_up_questions:
          - Provide customer revenue by month, top-customer concentration, cohort expansion, churn
            details, committed spend, consumption variance, and renewals for the next eight
            quarters.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-012
          - EC-016
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No comprehensive public source identified severed customer, partner, or supplier
          relationships.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Reviewed public sources did not provide a reliable severed-relationship schedule.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-004
              - R-009
        hidden_risks:
          - Lost lighthouse customers, terminated strategic alliances, or cloud-provider disputes
            may not be visible publicly.
        evidence_gaps:
          - Lost customer/partner/supplier logs, churn reasons, dispute letters, termination
            notices, and win-back plans.
        follow_up_questions:
          - Provide list of material customer, partner, and supplier terminations/non-renewals over
            the last two years with ARR impact and root cause.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-016
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Supplier exposure is not public; likely material dependencies include cloud infrastructure,
          data sub-processors, security tooling, and open-source maintainer/developer ecosystem
          support.
        verification_status: not_publicly_verifiable
