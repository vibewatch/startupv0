risk_register:
  - risk_id: R-001
    risk_title: Valuation and financing terms risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: CB Insights lists a $15B valuation and company announcements show large late-stage
      financings, but actual current pricing, secondary components, preferences, debt terms, and
      common-equity value are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-004
      - EC-005
    mitigation_or_diligence_request: Request financing documents, current cap table, liquidation
      waterfall, investor rights, and debt covenants.
  - risk_id: R-002
    risk_title: Private financial quality risk
    risk_category: financial
    severity: high
    likelihood: high
    description: Audited statements, revenue quality, ARR bridge, gross margin, cash burn, backlog, AR
      aging, and tax positions are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids:
      - EC-009
      - EC-016
    mitigation_or_diligence_request: Review audited financials, management accounts, revenue-recognition
      policies, cohort metrics, and cash runway.
  - risk_id: R-003
    risk_title: Cloud infrastructure economics and debt risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Managed Cloud and BYOC offerings may depend on cloud provider economics, capacity,
      credits, SLAs, and a public credit facility whose covenants are unknown.
    impacted_chapter_ids:
      - I
      - II
      - III
      - VIII
    impacted_section_ids:
      - I.C
      - II.A
      - III.E
      - VIII.F
    evidence_claim_ids:
      - EC-004
      - EC-008
      - EC-010
    mitigation_or_diligence_request: Analyze cloud COGS by provider, credits/commits, BYOC support
      model, debt documents, and gross-margin forecast.
  - risk_id: R-004
    risk_title: Customer concentration and retention risk
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public customer count and logos do not disclose active ARR, concentration, retention,
      churn, renewal timing, or usage volatility.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-009
      - EC-012
      - EC-016
    mitigation_or_diligence_request: Request customer-level ARR, NRR/GRR, cohort retention, renewals,
      churn reasons, and customer reference calls.
  - risk_id: R-005
    risk_title: Competitive intensity and product expansion risk
    risk_category: market
    severity: high
    likelihood: high
    description: ClickHouse competes with large data platforms and is expanding into adjacent product
      areas that may require new execution muscles.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
    evidence_claim_ids:
      - EC-011
      - EC-017
    mitigation_or_diligence_request: Review win/loss, displacement evidence, pricing pressure, product-level ARR, and roadmap focus.
  - risk_id: R-006
    risk_title: Open-source monetization and governance risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Apache-2.0 open source drives adoption but creates fork, support, contributor,
      security, and monetization questions.
    impacted_chapter_ids:
      - II
      - IV
      - V
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - IV.A
      - V.C
      - VI.A
      - VIII.D
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-018
      - EC-019
    mitigation_or_diligence_request: Review conversion funnel, maintainer concentration, CLA/IP
      assignments, OSS scanning, vulnerability process, and fork strategy.
  - risk_id: R-007
    risk_title: Security, privacy, contract, and legal exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Trust/legal pages are public, but audit reports, incidents, DPAs, indemnities, IP chain
      of title, litigation, regulatory correspondence, and insurance are private.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.C
      - VIII.D
      - VIII.E
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-013
      - EC-014
      - EC-019
      - EC-020
    mitigation_or_diligence_request: Request SOC/ISO evidence, pen tests, incident logs, DPAs, material
      contracts, insurance policies, docket searches, and IP schedules.
  - risk_id: R-008
    risk_title: Management, people, and retention risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: The company has a public operating presence, but org chart, headcount, attrition,
      compensation, option plans, and employee claims are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.D
      - VII.E
      - VII.F
      - VII.G
    evidence_claim_ids:
      - EC-015
      - EC-016
    mitigation_or_diligence_request: Request org chart, headcount bridge, attrition, compensation,
      employment agreements, option grants, and employee-relations files.
  - risk_id: R-009
    risk_title: Supplier and ecosystem dependency risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Cloud services, subprocessors, security vendors, and open-source ecosystem dependencies
      may affect margin, availability, compliance, and roadmap.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.F
    evidence_claim_ids:
      - EC-008
      - EC-010
      - EC-013
      - EC-014
    mitigation_or_diligence_request: Review vendor contracts, cloud commitments, subprocessor list,
      SLAs, incidents, business-continuity tests, and vendor concentration.
  - risk_id: R-010
    risk_title: Regulated data and AI/data-use risk
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Observability, database, and AI-adjacent products can touch sensitive customer data,
      regulated workloads, export controls, and data-residency commitments.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids:
      - EC-011
      - EC-013
      - EC-014
      - EC-020
    mitigation_or_diligence_request: Review data maps, DPIAs, regulated-customer obligations,
      export-control classification, sanctions screening, AI/data policies, and incident
      notification history.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, ARR bridge, gross margin, cash, and burn.
    why_it_matters: Needed to underwrite valuation, growth quality, runway, and profitability path.
    suggested_source_or_request: Company CFO / auditor workpapers and board financial packages.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option pool, investor rights, preferences, and debt covenants.
    why_it_matters: Determines ownership, dilution, common-equity value, and financing risk.
    suggested_source_or_request: Company counsel, finance team, and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, gross margin, cloud COGS, and roadmap adoption.
    why_it_matters: Validates whether product expansion is accretive or dilutive.
    suggested_source_or_request: Product P&L, telemetry, roadmap, and customer cohorts.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Top-customer ARR, usage, renewal, churn, and reference status.
    why_it_matters: Tests concentration and customer-quality risk behind public customer counts.
    suggested_source_or_request: Customer schedule, contracts, and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top supplier/cloud/subprocessor agreements and commitments.
    why_it_matters: Cloud economics and compliance depend on supplier terms.
    suggested_source_or_request: Vendor contracts, cloud commits, subprocessor list, and vendor security reviews.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, discounting, market-share, and benchmark evidence.
    why_it_matters: Competitive intensity is a primary underwriting risk.
    suggested_source_or_request: Sales ops, product marketing, customer interviews, analyst reports.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, pipeline, CAC/payback, and discounting.
    why_it_matters: Determines if growth is repeatable and capital efficient.
    suggested_source_or_request: CRM exports, finance metrics, comp plans, and sales forecasts.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Engineering quality, security backlog, release metrics, and key-person dependencies.
    why_it_matters: Public GitHub activity does not prove enterprise-grade reliability.
    suggested_source_or_request: Engineering dashboards, incident reports, vulnerability program, org chart.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, attrition, compensation, option plan, and employee claims.
    why_it_matters: People risks affect execution and retention at late-stage valuation.
    suggested_source_or_request: HRIS, legal claims, stock plan, engagement surveys, comp data.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP chain of title, OSS scan/SBOM, contributor agreements, and trademark/patent files.
    why_it_matters: Protects core technology and brand rights.
    suggested_source_or_request: Company counsel, OSS audit, IP counsel searches.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts, DPAs, SLAs, indemnities, consent rights, and insurance.
    why_it_matters: Hidden obligations can affect transaction risk and liability.
    suggested_source_or_request: Legal data room and contract abstraction.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, incident notifications, export-control and privacy assessments.
    why_it_matters: Data, security, and regulated customer exposure may create hidden liabilities.
    suggested_source_or_request: Compliance, security, privacy counsel, and incident response records.
    priority: medium
