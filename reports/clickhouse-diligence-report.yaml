            trademark/patent files, licenses, encumbrances, and IP dispute history.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-019
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: Cyber, E&O, D&O, EPLI, general liability, and cloud outage coverage are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.E-F1
            finding: Public trust/legal pages do not disclose insurance coverage or exclusions.
            evidence_claim_ids:
              - EC-014
              - EC-020
            risk_ids:
              - R-007
        hidden_risks:
          - Coverage gaps or exclusions for cyber incidents, AI/data issues, OSS claims, or outage
            liability could be material.
        evidence_gaps:
          - Insurance policies, coverage limits, exclusions, loss runs, claims, broker memos, and
            required customer coverage.
        follow_up_questions:
          - Provide insurance policies, coverage limits, exclusions, loss runs, open claims, broker
            memos, and customer-required coverage schedules.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-014
          - EC-020
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Public terms are visible, but enterprise MSAs, SLAs, DPAs, marketplace/channel agreements,
          debt documents, leases, and change-of-control consents are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.F-F1
            finding: Public terms/privacy pages establish baseline legal posture but not negotiated enterprise
              obligations.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-007
          - finding_id: VIII.F-F2
            finding: Credit facility and cloud/BYOC model make contract review especially important.
            evidence_claim_ids:
              - EC-004
              - EC-010
            risk_ids:
              - R-003
              - R-007
        hidden_risks:
          - Enterprise contracts may contain uncapped indemnities, security SLAs, data residency
            obligations, audit rights, MFNs, termination rights, or change-of-control consents.
        evidence_gaps:
          - Top contracts, MSAs, DPAs, SLAs, marketplace/channel agreements, debt/credit agreements,
            leases, data-processing terms, and change-of-control consents.
        follow_up_questions:
          - Provide material contract schedule, top customer/vendor agreements, DPAs, SLAs,
            marketplace/channel contracts, debt agreements, leases, side letters, and consent
            requirements.
        table_ids:
          - T-016
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-010
          - EC-014
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No public regulatory-problem clearance can be concluded; privacy, security, export-control,
          sanctions, AI/data, and sector-specific customer obligations require review.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VIII.G-F1
            finding: Trust/privacy/legal pages provide public compliance posture but no comprehensive regulatory
              correspondence history.
            evidence_claim_ids:
              - EC-013
              - EC-014
              - EC-020
            risk_ids:
              - R-007
              - R-010
        hidden_risks:
          - Data, encryption, export controls, regulated customer use cases, or incident
            notification obligations could create hidden regulatory exposure.
        evidence_gaps:
          - Regulatory correspondence, privacy assessments, DPIAs, export-control classification,
            sanctions screening, incident notifications, and compliance audits.
        follow_up_questions:
          - Provide regulatory correspondence, privacy/security assessments, export-control memo,
            sanctions screening, incident notification history, and compliance audit results.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-013
          - EC-014
          - EC-020
