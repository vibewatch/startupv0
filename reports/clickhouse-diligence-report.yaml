report_metadata:
  report_title: ClickHouse, Inc. Public-Source Startup Diligence Report
  target_company: ClickHouse, Inc.
  website: https://clickhouse.com/
  known_aliases:
    - ClickHouse
    - ClickHouse Cloud
    - ClickHouse, Inc.
  sector: Enterprise Tech; real-time analytics database; open-source data infrastructure; observability
  geography: United States headquarters reported by public databases; globally distributed enterprise
    software operations
  company_stage: Late-stage private unicorn
  research_date: 2026-05-16
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prepared exactly one public-source standard diligence report for ClickHouse, Inc. using
      company pages, public financing announcements, GitHub repository/API evidence, CB Insights,
      legal/privacy/trust pages, and trademark/context sources.
    - Prioritized primary company and technical repository evidence for product, financing,
      customer, security, and operating claims; treated vendor-published claims as evidence
      requiring private verification.
    - Mapped the report to the eight-chapter startup diligence checklist and separated verified
      public facts from private diligence gaps.
    - Did not infer audited financials, cap table, customer ARR, contracts, litigation clearance, HR
      data, security audit results, or legal opinions from absence of public evidence.
  included_jurisdictions:
    - United States
    - European Union / GDPR-facing markets
    - Global cloud and enterprise software markets
  excluded_topics:
    - No private data room, management interviews, customer calls, supplier calls, legal searches
      beyond public pages, paid database exports, or audit/security reports were reviewed.
    - No investment recommendation, valuation opinion, tax opinion, legal opinion, IP
      freedom-to-operate opinion, or cybersecurity attestation is provided.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-05-16
      notes: User requested exactly one standard-depth startup diligence YAML report for ClickHouse, Inc.
        at reports/clickhouse-diligence-report.yaml and no unrelated file modifications.
