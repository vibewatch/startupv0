report_metadata:
  report_title: Rothy's Public-Source Startup Diligence Report
  target_company: Rothy's
  website: https://rothys.com/
  known_aliases:
    - Rothy's, Inc.
    - Rothys
    - Rothy's washable shoes
  sector: Sustainable consumer footwear, accessories, direct-to-consumer retail, and wholesale expansion
  geography: United States headquartered in San Francisco with global supply-chain and strategic investor exposure
  company_stage: Private unicorn / consumer retail growth company with strategic minority investor
  research_date: 2026-06-07
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and confirmed rothy-s was not covered.
    - "Selected from the CB Insights current unicorn list after public screening for private/active status: Rothy's was the next random replacement after Sword Health showed acquisition ambiguity; public sources describe a 49.9% strategic stake while Rothy's continued to operate independently."
    - Used public evidence only; non-public financial, customer, cap-table, HR, legal, contract, and insurance items are marked as diligence gaps.
    - Search-result snippets and company pages are treated as public evidence, not management verification.
  included_jurisdictions:
    - United States
    - California
    - Brazil strategic investor context
    - China manufacturing/supply-chain context if applicable
  excluded_topics:
    - No private data room, management interview, customer call, counsel docket search, tax schedule, insurance policy, cap table, bank statement, or HRIS export was available.
    - No paywalled sources were bypassed.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for three random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-07
      notes: No company documents, founder claims, financial model, customer list, or legal schedule were provided.
