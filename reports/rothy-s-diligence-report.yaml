executive_summary:
  overall_assessment: Rothy's has credible public evidence of unicorn status, differentiated recycled-materials product positioning, and a strategic minority investment at a $1B valuation, but key diligence risk lies in current growth quality, supply-chain economics, sustainability-claim substantiation, wholesale execution, and investor/control rights.
  investment_or_diligence_thesis: The diligence case depends on whether Rothy's can sustain premium consumer demand and wholesale expansion while proving product margin, inventory turns, verified environmental impact, and clean control/liquidity economics after the Alpargatas minority-stake transaction.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn-status evidence supports eligibility.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public product evidence supports the existence of the core product portfolio.
      evidence_claim_ids:
        - EC-003
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Public sources cite valuation and wholesale expansion but do not disclose audited revenue, gross margin, returns, markdowns, inventory turns, or cash runway.
    - risk_id: R-002
      summary: A 49.9% strategic stake can include governance, veto, call/put, transfer, and future financing rights that materially affect control and exit value.
    - risk_id: R-003
      summary: Recycled-material and circularity claims are central to brand positioning, but quantified environmental data and audit evidence were not public.
  key_evidence_gaps:
    - Audited financial statements and current cash runway.
    - Current cap table, investor rights, debt, and preference stack.
    - Top-customer/channel concentration, churn, retention, and contracts.
    - Counsel-prepared litigation, regulatory, IP, insurance, and material-contract schedules.
  recommended_next_steps:
    - Run source-document financial diligence.
    - Conduct customer/partner references and legal/regulatory review.
    - Reconcile public valuation to financing documents and current operating metrics.
