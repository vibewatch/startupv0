executive_summary:
  overall_assessment: Proceed to confirmatory diligence with elevated operating-risk focus. Public evidence supports private-unicorn status, active operations and portfolio expansion; financial quality, hit durability, app-store/ad-network dependencies and AppLovin transaction economics remain unresolved.
  investment_or_diligence_thesis: Tripledot is an active private mobile-games unicorn with public evidence of studio scale and a major 2025 acquisition of AppLovin mobile games assets, but investment diligence hinges on revenue quality, UA economics, platform dependency and integration execution.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn valuation/status is supported by CB Insights and/or reputable financing coverage.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public product or portfolio positioning is supported by company-owned materials.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-003
      summary: A public acquisition or strategic expansion signal exists and should be reconciled to deal documents.
      evidence_claim_ids:
        - EC-004
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Mobile revenue and UA economics are private
    - risk_id: R-002
      summary: AppLovin portfolio integration and equity complexity
    - risk_id: R-003
      summary: Privacy, ad-network and platform dependency exposure
  key_evidence_gaps:
    - Audited financials, KPI pack, revenue/ARR or bookings bridge, cash/debt and forecast model.
    - Cap table, preferred terms, options/warrants/debt and valuation bridge.
    - Top customer/user/title revenue concentration, retention/churn, contracts and independent references.
    - Security, privacy, legal, IP, regulatory, insurance and incident artifacts.
    - Org chart, HRIS headcount, attrition, compensation, key-person dependency and integration plan.
  recommended_next_steps:
    - Run financial quality-of-revenue and retention diligence before relying on headline valuation.
    - Review customer/user contracts, product telemetry and independent references.
    - Have counsel and security specialists review legal, privacy, security, IP and regulatory artifacts.
    - Benchmark pricing, win/loss, margins and competitive position against direct alternatives.
