            - EC-009
          source_ids: []
        - risk_id: R-005
          label: Marketplace reliability and worker/facility reputation risk
          severity: medium
          likelihood: medium
          rationale: Fill-rate claims coexist with app-review complaints about attendance, pay, safety and disputes.
          evidence_claim_ids:
