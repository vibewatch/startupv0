risk_register:
  - risk_id: R-001
    risk_title: Financial quality, runway, and unit economics not publicly verifiable
    risk_category: financial
    severity: high
    likelihood: unknown
    evidence_strength: medium for financing; low for current financials
    description: Public funding is credible, but revenue, margin, cash, debt, AR and runway are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-006
    mitigation_or_diligence_request: Request financial statements, bank statements, AR aging, debt, budgets and unit economics.
  - risk_id: R-002
    risk_title: Independent-contractor worker-classification exposure
    risk_category: regulatory
    severity: high
    likelihood: high
    evidence_strength: high for public contractor language and legal framework
    description: Terms use independent-contractor professionals; CA/DOL frameworks create reclassification risk.
    impacted_chapter_ids:
      - VIII
      - VII
      - I
    impacted_section_ids:
      - VIII.F
      - VIII.G
      - VII.D
      - I.B
    evidence_claim_ids:
      - EC-010
      - EC-018
      - EC-019
      - EC-027
    mitigation_or_diligence_request: Request classification memos, worker agreements and wage-hour audits.
  - risk_id: R-003
    risk_title: Healthcare staffing licensing, credentialing, and nurse licensure obligations
    risk_category: regulatory
    severity: high
    likelihood: medium
    evidence_strength: medium from state/NCSBN sources
    description: State registrations and licensure requirements vary; company-specific compliance is not public.
    impacted_chapter_ids:
      - VIII
      - III
      - II
    impacted_section_ids:
      - VIII.C
      - VIII.G
      - III.E
      - II.A
    evidence_claim_ids:
      - EC-020
      - EC-021
      - EC-013
    mitigation_or_diligence_request: Request registrations, credentialing SOPs, license-check logs and incident reports.
  - risk_id: R-004
    risk_title: Customer concentration, churn, and retention are private
    risk_category: customer
    severity: medium
    likelihood: unknown
    evidence_strength: medium for aggregate/named stories; low for revenue concentration
    description: Stories and scale claims do not reveal top customers, churn or concentration.
    impacted_chapter_ids:
      - III
      - V
      - I
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
      - I.A
    evidence_claim_ids:
      - EC-005
      - EC-008
      - EC-009
    mitigation_or_diligence_request: Request top customer revenue, churn, contracts and references.
  - risk_id: R-005
    risk_title: Marketplace reliability and worker/facility reputation risk
    risk_category: operational
    severity: medium
    likelihood: medium
    evidence_strength: medium for public KPIs/app metrics; low for reviews
    description: Fill-rate claims coexist with app-review complaints about attendance, pay, safety and disputes.
    impacted_chapter_ids:
      - III
      - VII
      - II
    impacted_section_ids:
      - III.D
      - VII.F
      - VII.G
      - II.A
    evidence_claim_ids:
      - EC-005
      - EC-013
      - EC-014
      - EC-026
    mitigation_or_diligence_request: Request NPS, support tickets, incidents, cancellation/deactivation and dispute data.
  - risk_id: R-006
    risk_title: Competitive and pricing pressure
    risk_category: market
    severity: medium
    likelihood: high
    evidence_strength: medium from competitor pages
    description: ShiftKey, IntelyCare and ShiftMed overlap with Clipboard; ShiftMed emphasizes W-2 and savings.
    impacted_chapter_ids:
      - IV
      - V
      - I
    impacted_section_ids:
      - IV.A
      - V.A
      - I.B
    evidence_claim_ids:
      - EC-006
      - EC-023
      - EC-024
      - EC-025
    mitigation_or_diligence_request: Benchmark rates, take-rate, fill reliability, win/loss and W-2 cost sensitivity.
  - risk_id: R-007
    risk_title: Privacy, security, IP, and contract artifacts incomplete
    risk_category: legal
    severity: medium
    likelihood: medium
    evidence_strength: medium for privacy/trademark signals; low for controls
    description: Privacy and trademark signals exist, but SOC2, BAAs, subprocessors, official IP and material contracts are private.
    impacted_chapter_ids:
      - VIII
      - III
    impacted_section_ids:
      - VIII.D
      - VIII.E
      - VIII.F
      - III.E
    evidence_claim_ids:
      - EC-012
      - EC-022
    mitigation_or_diligence_request: Request SOC2/security package, HIPAA/BAA analysis, data map, official IP and contracts.
  - risk_id: R-008
    risk_title: Public-source inconsistency on CB Insights date/investors
    risk_category: financing
    severity: low
    likelihood: medium
    evidence_strength: medium
    description: Live CB row differed from prompt-provided CB selection on date/investors.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
    mitigation_or_diligence_request: Obtain current CB export and financing documents.
