          rationale: Terms use independent-contractor professionals; CA/DOL frameworks create reclassification risk.
          evidence_claim_ids:
            - EC-010
            - EC-018
            - EC-019
            - EC-027
          source_ids: []
        - risk_id: R-003
          label: Healthcare staffing licensing, credentialing, and nurse licensure obligations
          severity: high
          likelihood: medium
          rationale: State registrations and licensure requirements vary; company-specific compliance is not public.
          evidence_claim_ids:
            - EC-020
            - EC-021
            - EC-013
          source_ids: []
        - risk_id: R-004
          label: Customer concentration, churn, and retention are private
          severity: medium
          likelihood: unknown
          rationale: Stories and scale claims do not reveal top customers, churn or concentration.
          evidence_claim_ids:
            - EC-005
