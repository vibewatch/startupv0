executive_summary:
  overall_assessment: Clipboard Health has credible public evidence of a large healthcare staffing marketplace and unicorn financing, but major diligence gaps remain in financial quality, customer concentration, worker classification, healthcare staffing compliance and operational controls.
  investment_or_diligence_thesis: Proceed to data-room diligence focused on whether marketplace liquidity and vertical expansion can sustain profitable growth under contractor-classification, credentialing and healthcare staffing regulatory constraints.
  strongest_verified_claims:
    - founder_claim_id: FC-003
      summary: TechCrunch independently reported the $80M financing and $1.3B valuation.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: YC, Sequoia, Terms and app listings verify an app-based healthcare shift marketplace model.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-010
        - EC-013
        - EC-014
    - founder_claim_id: FC-005
      summary: Public Terms verify independent-contractor marketplace language, which is also the core regulatory diligence issue.
      evidence_claim_ids:
        - EC-010
        - EC-018
        - EC-019
  biggest_risks:
    - risk_id: R-002
      summary: Independent-contractor classification risk is high.
    - risk_id: R-003
      summary: Healthcare staffing registration, credentialing and nurse licensure obligations require state-by-state verification.
    - risk_id: R-001
      summary: Current financial quality, runway, revenue, margins and unit economics are not public.
  key_evidence_gaps:
    - No public audited/management financials, cap table, revenue, unit economics, cash/runway or AR aging.
    - No public top-customer revenue concentration, churn or direct references.
    - No public state-by-state compliance matrix for classification, staffing registration and licensure.
    - No comprehensive litigation/arbitration/agency search; CourtListener zero results are inconclusive.
    - Official USPTO/TSDR, security package, subprocessor list and material contracts remain private.
  recommended_next_steps:
    - Open CFO/counsel data room requests for financials, cap table, worker classification, registrations, contracts and legal matters.
    - Run customer calls and market-by-market competitor/rate benchmarking.
    - Have counsel perform PACER/state/admin docket and official USPTO searches.
    - "Audit marketplace KPIs: posted/filled/completed/cancelled shifts, repeat match, worker retention, facility churn and payment disputes."
