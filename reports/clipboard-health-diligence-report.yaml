report_metadata:
  report_title: Clipboard Health Startup Diligence Research Report
  target_company: Clipboard Health
  website: https://www.clipboardhealth.com/
  known_aliases:
    - Clipboard
    - Twomagnets LLC d/b/a Clipboard Health
    - Clipboard Health LLC
    - Clipboardworks
  sector: Healthcare staffing marketplace / health tech
  geography: United States; San Francisco listed publicly; remote-first operations claimed
  company_stage: Venture-backed private unicorn
  research_date: 2026-06-02
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company-owned pages, pricing, stories, careers, terms and privacy
    - "Third-party financing/profile sources: CB Insights, TechCrunch, Sequoia, YC"
    - App marketplace evidence from Apple and Google Play
    - Competitor pages for ShiftKey, IntelyCare and ShiftMed
    - Legal/regulatory checks from CourtListener, CA DIR, DOL, NJ DCA, NCSBN, FTC and trademark mirror
  included_jurisdictions:
    - United States
    - California worker-classification context
    - New Jersey healthcare service-firm context
    - U.S. federal labor/FTC context
    - Nurse Licensure Compact context
  excluded_topics:
    - Private financial/cap-table/contract records not supplied
    - Comprehensive paid databases, PACER/state court portals and official USPTO/TSDR not completed
  user_provided_materials:
    - material_id: UPM-001
      title: Prompt-provided CB Insights unicorn selection details
      type: user_provided_public_source_summary
      date_received: 2026-06-02
      notes: Used as claim ledger and reconciled to live public evidence.
