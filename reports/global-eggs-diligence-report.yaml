executive_summary:
  overall_assessment: Public evidence supports an uncovered unicorn-list entry and a likely Etobicoke food-manufacturing operating entity, but the public record is too thin to rely on the $8B headline without primary documents.
  investment_or_diligence_thesis: "Treat Global Eggs as a high-gap screening candidate: the unicorn-list and secondary valuation signals justify diligence, but investability depends on basic entity, financing, financial, customer, supplier and food-safety verification."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Global Eggs was selected from a current public CB Insights unicorn-list row after excluding existing report slugs.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Public financing/valuation evidence supports a $8B diligence screen.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public sources support at least product/category-level operating activity.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: Entity and valuation verification risk
    - risk_id: R-002
      summary: Financial quality and unit economics are opaque
    - risk_id: R-003
      summary: Customer and supplier concentration unknown
  key_evidence_gaps:
    - Audited financial statements, monthly KPI pack and revenue by product/channel/geography.
    - Current cap table, liquidation preferences, options/warrants, debt instruments and runway.
    - Top customers, churn/retention, supplier/partner contracts and management org chart.
    - Legal/regulatory docket, insurance, IP ownership and compliance evidence.
  recommended_next_steps:
    - Open a data-room request list focused on financial quality, customer concentration, financing structure and legal/regulatory exposure.
    - Schedule management diligence on current valuation support, growth drivers, current runway and public-evidence gaps.
    - Run customer/supplier reference calls and counsel-led legal/entity verification before relying on headline unicorn status.
