executive_summary:
  overall_assessment: "HomeLight is an eligible private-unicorn diligence target: CB Insights lists it at a $1.70B valuation and public company pages show active products, hiring, licensing disclosures and 2026 press activity. The strongest public evidence supports product breadth, agent/lender network claims and regulated mortgage/broker operations, while investment underwriting requires private financials, cap table, concentration, guarantee-loss data and counsel-led regulatory/litigation records."
  investment_or_diligence_thesis: The diligence thesis is a transaction-enablement proptech platform that could compound through agent/lender distribution and financial products, but whose quality depends on housing-cycle resilience, product-level gross margin, partner retention, regulatory controls and loss experience in Buy Before You Sell and cash-offer products.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists HomeLight as a unicorn with a $1.70B valuation.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: HomeLight publicly positions as a software platform for agents and lenders with multiple transaction products.
      evidence_claim_ids:
        - EC-003
        - EC-005
        - EC-009
    - founder_claim_id: FC-006
      summary: HomeLight discloses mortgage and California broker licensing identifiers.
      evidence_claim_ids:
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Public sources support unicorn status but not audited financials, ARR, gross margin, burn, debt, liquidation preferences or ownership.
    - risk_id: R-002
      summary: The business appears tied to real-estate transactions, mortgage activity and consumer home moves.
    - risk_id: R-003
      summary: Scale claims do not disclose top agents, lenders, investors, revenue concentration or retention.
    - risk_id: R-004
      summary: Mortgage lending and broker operations require state-by-state compliance and regulator oversight.
    - risk_id: R-005
      summary: Privacy disclosures include tracking, advertising partners and commercial partner sharing.
    - risk_id: R-006
      summary: HomeLight may buy properties if they do not sell within 120 days, creating inventory and valuation risk.
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, gross margin, burn, debt and runway.
    - Fully diluted cap table, preferences, warrants, option pool and investor rights.
    - Top customer/agent/lender/investor concentration, revenue by channel and cohort retention.
    - Buy Before You Sell underwriting, guarantee loss curves, inventory exposure and funding arrangements.
    - Counsel-led litigation, arbitration, complaints, license status, privacy and insurance schedules.
  recommended_next_steps:
    - Open financial/cap-table data room and reconcile CB valuation to current revenue, margin and burn.
    - Run product-level cohort review for BBYS, Simple Sale, referrals, loans and closing services.
    - Verify mortgage, broker, privacy and advertising compliance directly with counsel and regulators.
    - Interview top agents, lenders, cash buyers, churned partners and recent customers.
    - Stress test performance under high-rate, low-inventory and falling-home-price scenarios.
