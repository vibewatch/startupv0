    title: Risk heatmap
    chapter_id: VIII
    section_id: VIII.A
    figure_type: risk_heatmap
    description: Maps top diligence risks.
    purpose: Risk heatmap
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and valuation support are opaque
          severity: high
          likelihood: unknown
          rationale: Public sources support unicorn status but not audited financials, ARR, gross margin, burn, debt, liquidation preferences or ownership.
          evidence_claim_ids: &a77
            - EC-001
            - EC-024
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-006
        - risk_id: R-002
          label: Housing-cycle and transaction-volume sensitivity
          severity: high
          likelihood: medium
          rationale: The business appears tied to real-estate transactions, mortgage activity and consumer home moves.
          evidence_claim_ids: &a78
            - EC-005
            - EC-009
            - EC-019
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-006
        - risk_id: R-003
          label: Customer and partner concentration are not public
          severity: medium
          likelihood: unknown
          rationale: Scale claims do not disclose top agents, lenders, investors, revenue concentration or retention.
          evidence_claim_ids: &a79
            - EC-004
            - EC-008
            - EC-024
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-006
        - risk_id: R-004
          label: Mortgage and real-estate licensing exposure
          severity: high
          likelihood: medium
          rationale: Mortgage lending and broker operations require state-by-state compliance and regulator oversight.
          evidence_claim_ids: &a80
            - EC-010
            - EC-011
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-006
        - risk_id: R-005
          label: Privacy and advertising compliance risk
          severity: medium
          likelihood: medium
          rationale: Privacy disclosures include tracking, advertising partners and commercial partner sharing.
          evidence_claim_ids: &a81
            - EC-012
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-006
        - risk_id: R-006
          label: Buy Before You Sell guarantee and underwriting exposure
          severity: high
          likelihood: medium
          rationale: HomeLight may buy properties if they do not sell within 120 days, creating inventory and valuation risk.
          evidence_claim_ids: &a82
            - EC-006
            - EC-007
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-006
        - risk_id: R-007
          label: Competitive pressure from proptech and marketplace incumbents
          severity: medium
          likelihood: high
          rationale: Orchard, Knock, Opendoor and Zillow address overlapping buy-before-sell, cash-offer, agent and loan journeys.
