risk_register:
  - risk_id: R-001
    risk_title: Financial quality and valuation support are opaque
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public sources support unicorn status but not audited financials, ARR, gross margin, burn, debt, liquidation preferences or ownership.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids: *a77
    mitigation_or_diligence_request: Request audited financials, ARR bridge, debt schedule, cap table and financing documents.
  - risk_id: R-002
    risk_title: Housing-cycle and transaction-volume sensitivity
    risk_category: market
    severity: high
    likelihood: medium
    description: The business appears tied to real-estate transactions, mortgage activity and consumer home moves.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.B
      - V.A
    evidence_claim_ids: *a78
    mitigation_or_diligence_request: Stress test cohorts under mortgage-rate, inventory and home-price scenarios.
  - risk_id: R-003
    risk_title: Customer and partner concentration are not public
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Scale claims do not disclose top agents, lenders, investors, revenue concentration or retention.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
    evidence_claim_ids: *a79
    mitigation_or_diligence_request: Request top partner schedules, revenue by channel and cohort retention.
  - risk_id: R-004
    risk_title: Mortgage and real-estate licensing exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Mortgage lending and broker operations require state-by-state compliance and regulator oversight.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a80
    mitigation_or_diligence_request: Verify licenses, complaints, exams and remediation history with counsel.
  - risk_id: R-005
    risk_title: Privacy and advertising compliance risk
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Privacy disclosures include tracking, advertising partners and commercial partner sharing.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a81
    mitigation_or_diligence_request: Review consent flows, vendor DPAs, retention, DSAR logs and opt-out controls.
  - risk_id: R-006
    risk_title: Buy Before You Sell guarantee and underwriting exposure
    risk_category: financial
    severity: high
    likelihood: medium
    description: HomeLight may buy properties if they do not sell within 120 days, creating inventory and valuation risk.
    impacted_chapter_ids:
      - I
      - II
    impacted_section_ids:
      - I.B
      - II.A
    evidence_claim_ids: *a82
    mitigation_or_diligence_request: Request cohort loss curves, guarantee take-rate, property inventory and funding arrangements.
  - risk_id: R-007
    risk_title: Competitive pressure from proptech and marketplace incumbents
    risk_category: market
    severity: medium
    likelihood: high
    description: Orchard, Knock, Opendoor and Zillow address overlapping buy-before-sell, cash-offer, agent and loan journeys.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a83
    mitigation_or_diligence_request: Benchmark conversion, CAC, take rate, pricing and NPS.
  - risk_id: R-008
    risk_title: M&A integration and operating complexity
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Accept.inc, closing services, loans, referrals and agent tools create multi-entity operating complexity.
    impacted_chapter_ids:
      - VI
      - VII
      - VIII
    impacted_section_ids:
      - VI.B
      - VII.A
      - VIII.F
    evidence_claim_ids: *a84
    mitigation_or_diligence_request: Review integration KPIs, subsidiary org charts, intercompany agreements and controls.
  - risk_id: R-009
    risk_title: Consumer dispute and terms enforceability risk
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Terms manage disputes but consumer real-estate and lending claims may still create legal or reputational exposure.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
    evidence_claim_ids: *a85
    mitigation_or_diligence_request: Request litigation, arbitration, complaint and settlement schedules.
