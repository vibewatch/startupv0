report_metadata:
  report_title: HomeLight Startup Diligence Research Report
  target_company: HomeLight
  website: https://www.homelight.com
  known_aliases:
    - HomeLight, Inc.
    - HomeLight Home Loans, Inc.
    - HomeLight Closing Services
    - Accept.inc
  sector: Financial Services / PropTech / Real Estate Technology
  geography: United States; Scottsdale, Arizona public address with San Francisco and remote teams
  company_stage: Private unicorn / venture-backed growth company
  research_date: 2026-06-10
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - CB Insights unicorn tracker screen
    - "Company-owned pages: homepage, about, products, careers, press, privacy, terms and licensing"
    - Competitor pages for Orchard, Knock, Opendoor and Zillow
    - Public-source legal/regulatory screen limited to accessible licensing and policy pages
  included_jurisdictions:
    - United States
    - Arizona
    - California
    - State mortgage licensing disclosures
    - Global public web
  excluded_topics:
    - No paywall bypassing
    - No private data room access
    - No private personal contact details
    - No direct regulator portal verification beyond company-exposed public links
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn selection from fetched CB Insights list
      type: workflow_context
      date_received: 2026-06-10
      notes: HomeLight was selected by shuf from uncovered CB Insights unicorn candidates.
