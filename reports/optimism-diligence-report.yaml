report_metadata:
  report_title: Optimism / OP Labs Public-Source Startup Diligence Report
  target_company: Optimism / OP Labs / Optimism Foundation ecosystem
  website: https://www.optimism.io/
  known_aliases:
    - Optimism
    - OP Labs
    - Optimism Foundation
    - Optimism Collective
    - OP Mainnet
    - OP Stack
    - Superchain
  sector: Ethereum Layer 2 infrastructure / OP Stack / crypto developer platform
  geography: United States / New York per CB Insights; global protocol and governance ecosystem
  company_stage: Private unicorn / protocol ecosystem
  research_date: 2026-05-18
  analyst: GitHub Copilot CLI diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source only; no private company materials.
    - Triangulated financing with CB Insights, company, investor and news sources.
    - Used public repositories/docs and L2Beat config for product/security/governance claims.
    - Separated ecosystem proxies from revenue and customer proof.
    - Flagged legal conclusions as inconclusive absent counsel docket search.
  included_jurisdictions:
    - United States
    - New York per CB Insights metadata
    - Global blockchain/protocol ecosystem
    - Ethereum public networks
  excluded_topics:
    - Non-public financial statements and contracts
    - Management interviews
    - Counsel-certified docket/regulatory searches
    - Live TVL/fee/market-share data where endpoints were inaccessible
    - Investment advice or legal opinion
  user_provided_materials:
    - material_id: UPM-001
      title: User request and CB Insights row fields
      type: conversation_instruction
      date_received: 2026-05-18
      notes: User requested reports/optimism-diligence-report.yaml with standard-depth checklist coverage.
