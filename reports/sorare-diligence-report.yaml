report_metadata:
  report_title: Sorare Public-Source Startup Diligence Report
  target_company: Sorare
  website: https://sorare.com/
  known_aliases:
    - Sorare
    - Sorare SAS
    - "Sorare: NBA"
    - Sorare MLB
  sector: NFT fantasy sports, digital collectibles and sports gaming
  geography: France / Paris and New York operations / global users
  company_stage: Private unicorn
  research_date: 2026-05-19
  analyst: GitHub Copilot CLI diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source diligence using reputable unicorn-list, news, partner, regulator and company-owned sources.
    - Treated company-owned sources as evidence of public claims and product availability, not independent verification of economics.
    - Used public regulatory materials for UK and French gambling/JONUM exposure; no legal opinion was available.
    - No private data room, management interview, customer reference, cap table or audited financial records were provided.
  included_jurisdictions:
    - France
    - United Kingdom
    - United States
    - Global digital-asset and sports-fantasy markets referenced in public sources
  excluded_topics:
    - Private financial statements, cash/debt, cap table, token/NFT custody contracts, license agreements and customer-level transaction data.
    - Counsel-certified litigation, trademark, consumer-protection, AML and gambling-regulatory searches.
    - Private security architecture, wallet-key management, incident history and third-party audit reports.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-19
      notes: No founder responses, pitch deck, financial model, customer files or data-room documents were supplied.

founder_claims:
  - founder_claim_id: FC-001
    claim_text: Sorare is an uncovered private unicorn with a latest public valuation of approximately $4.3B.
    claim_source: CB Insights unicorn list and TechCrunch financing coverage
    claim_date: 2021-09-21
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.B]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001, EC-002]
    contradiction_summary: null
    diligence_follow_up:
      - Request current valuation support and the full capitalization table because public valuation evidence is from 2021.
  - founder_claim_id: FC-002
    claim_text: Sorare operates a fantasy sports platform using digital player cards/NFTs across football, NBA and MLB products.
    claim_source: Sorare website, TechCrunch and NBPA
    claim_date: null
    mapped_chapter_ids: [II, III]
    mapped_section_ids: [II.A, III.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-003, EC-008, EC-009, EC-010]
    contradiction_summary: null
    diligence_follow_up:
      - Validate active users, paid users, retention, wallet custody and sport-level gross merchandise value from internal data.
  - founder_claim_id: FC-003
    claim_text: Sorare has major sports-league and club licensing relationships.
    claim_source: TechCrunch, CNBC and NBPA
    claim_date: null
    mapped_chapter_ids: [III, VIII]
    mapped_section_ids: [III.A, VIII.B]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-004, EC-005, EC-008, EC-010]
    contradiction_summary: Public sources verify important relationships but not contract economics, renewal rights or termination clauses.
    diligence_follow_up:
      - Request executed league, club and athlete/IP license agreements, economics, exclusivity, minimum guarantees and renewal calendars.
  - founder_claim_id: FC-004
    claim_text: Sorare monetizes through card issuance and marketplace transaction activity.
    claim_source: TechCrunch and CNBC
    claim_date: null
    mapped_chapter_ids: [I, V]
    mapped_section_ids: [I.A, V.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-003, EC-006]
    contradiction_summary: Public sources describe monetization mechanics but do not disclose revenue, gross margin, CAC, payback or take-rate.
    diligence_follow_up:
      - Request revenue by product, new-card issuance economics, secondary-market fees, paid-user cohorts and take-rate history.
  - founder_claim_id: FC-005
    claim_text: Sorare has millions of users and global reach.
    claim_source: CNBC and NBPA
    claim_date: null
    mapped_chapter_ids: [III, V]
    mapped_section_ids: [III.A, V.B]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-005, EC-006, EC-008]
    contradiction_summary: Public user counts are not equivalent to active paid users; CNBC also reports 87% of players did not spend money.
    diligence_follow_up:
      - Request MAU, DAU, paid conversion, cohorts, retention, ARPPU, whale concentration and geographic compliance by jurisdiction.
  - founder_claim_id: FC-006
    claim_text: Sorare faces material gambling, digital-asset and consumer-protection regulatory scrutiny.
    claim_source: UK Gambling Commission, CNBC and ANJ materials
    claim_date: null
    mapped_chapter_ids: [VIII]
    mapped_section_ids: [VIII.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-007, EC-011, EC-012]
    contradiction_summary: null
    diligence_follow_up:
      - Request legal memos, correspondence with regulators, geographic restrictions, KYC/AML policies, age-gating and responsible-play controls.
  - founder_claim_id: FC-007
    claim_text: Sorare's financial statements, current valuation, cap table, current license liabilities and litigation status are not publicly verifiable.
    claim_source: Public-source diligence review
    claim_date: null
    mapped_chapter_ids: [I, VIII]
    mapped_section_ids: [I.A, VIII.B]
    verification_status: not_publicly_verifiable
    confidence: high
    evidence_claim_ids: [EC-013]
    contradiction_summary: null
    diligence_follow_up:
      - Provide a full diligence data room before any investment underwriting.

executive_summary:
  overall_assessment: >-
    Sorare is a credible private unicorn candidate: CB Insights lists the company at $4.3B, TechCrunch reported a $680M
    Series B led by SoftBank Vision Fund 2 at the same valuation, and independent/partner sources verify meaningful sports
    IP relationships with the Premier League, NBA/NBPA and a broad football-club ecosystem. The investability question is
    unresolved because the public record is much stronger on brand partnerships and historical financing than on current
    revenue quality, retention, paid-user concentration, cash runway, license liabilities, regulatory clearance or wallet/
    blockchain risk controls.
  investment_or_diligence_thesis: >-
    Advance only to confirmatory diligence if private data proves durable paid-user economics and regulatory compliance after
    the NFT/crypto downturn. Upside depends on Sorare converting scarce sports IP, fantasy gameplay and digital ownership
    into recurring entertainment revenue; the main underwriting risks are gambling/JONUM regulation, license-renewal cost,
    heavy-spender concentration, digital-asset volatility and a stale 2021 valuation anchor.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn and financing sources support the $4.3B 2021 valuation.
      evidence_claim_ids: [EC-001, EC-002]
    - founder_claim_id: FC-003
      summary: Multiple public sources verify important sports-league and club licensing relationships.
      evidence_claim_ids: [EC-004, EC-005, EC-008, EC-010]
    - founder_claim_id: FC-006
      summary: UK and French regulatory scrutiny/framework obligations are well documented in public sources.
      evidence_claim_ids: [EC-007, EC-011, EC-012]
  biggest_risks:
    - risk_id: R-003
      summary: Gambling/JONUM and digital-asset regulation could alter product design, access or economics.
    - risk_id: R-002
      summary: 2021 valuation may not reflect post-crypto-winter NFT-market conditions.
    - risk_id: R-004
      summary: Sports IP license dependence creates renewal, minimum-guarantee and concentration risk.
  key_evidence_gaps:
    - Audited financials, monthly management accounts, cash runway, debt, tax and current valuation support.
    - Cap table, investor rights, option pool, warrants and league equity/warrant economics.
    - Revenue by product, sport, geography, fee type and cohort; paid-user conversion and whale concentration.
    - License agreements, renewal calendars, minimum guarantees, exclusivity and termination rights.
    - UKGC, ANJ and other regulator correspondence; legal opinions on gambling, consumer protection, AML and digital assets.
    - Wallet custody, blockchain migration, security audits, incident history and insurance.
  recommended_next_steps:
    - Start with legal/regulatory diligence before relying on unrestricted global product availability.
    - Run revenue-quality diligence focused on paid-user cohorts, repeat spend, take-rate, refund/fraud and concentration.
    - Review all material sports IP licenses and model renewal/minimum-guarantee downside.
    - Re-underwrite valuation using current paid GMV/revenue and post-2021 NFT market comparables.

chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Sorare's 2021 $4.3B valuation and $680M Series B are public, but revenue, profitability, cash runway, cap table and current valuation support are private.
    founder_claim_ids: [FC-001, FC-004, FC-007]
    evidence_claim_ids: [EC-001, EC-002, EC-003, EC-006, EC-013]
    risk_ids: [R-001, R-002, R-005]
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids: [I.A]
        summary: Public sources disclose historical trading-volume and monetization mechanics, but not audited statements, revenue, gross margin, cash, debt or cohort economics.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: TechCrunch reported Sorare generated revenue by issuing new cards, while CNBC later reported transaction volume and high free-user share; neither source discloses revenue quality.
            evidence_claim_ids: [EC-003, EC-006]
            risk_ids: [R-001, R-005]
        hidden_risks:
          - Revenue may be concentrated in new card issuance, marketplace fees or high-spending collectors rather than broad recurring spend.
          - Public GMV/card-exchange metrics can overstate net revenue and cash conversion.
        evidence_gaps:
          - Audited financials, ARR/revenue by stream, gross margin, take-rate, paid-user cohorts, refund/fraud, cash and debt.
        follow_up_questions:
          - Provide monthly financials, revenue bridge from GMV to net revenue, paid-user cohorts and gross-margin reconciliation.
        table_ids: [T-001, T-003]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-002, EC-003, EC-006, EC-013]
      - section_id: I.B
        title: Capitalization, valuation and financing terms
        checklist_question_ids: [I.B, I.C]
        summary: The public valuation anchor is strong for 2021, but cap table, liquidation preferences, option pool, warrants and current mark are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: CB Insights and TechCrunch align on a $4.3B unicorn valuation; CNBC later described the same valuation as Sorare's last investor valuation.
            evidence_claim_ids: [EC-001, EC-002, EC-005]
            risk_ids: [R-002]
        hidden_risks:
          - Sports-league equity warrants, liquidation preferences or structured terms could materially dilute common equity.
        evidence_gaps:
          - Full cap table, current 409A or board-approved valuation, preferences, warrants, SAFE/convertible instruments and debt.
        follow_up_questions:
          - Provide financing documents, pro forma cap table, investor-rights agreements and all league/shareholder warrant terms.
        table_ids: [T-002]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-001, EC-002, EC-005, EC-013]

  - chapter_id: II
    title: Products
    chapter_summary: Sorare offers football, NBA and MLB fantasy products using scarce digital player cards and real-world performance scoring, but product economics and security controls require private validation.
    founder_claim_ids: [FC-002, FC-004]
    evidence_claim_ids: [EC-003, EC-008, EC-009, EC-010]
    risk_ids: [R-006, R-003]
    sections:
      - section_id: II.A
        title: Product and SKU matrix
        checklist_question_ids: [II.A]
        summary: Public sources support football, NBA and MLB product availability, lineup gameplay and rewards, with NFTs/digital collectibles central to the paid-card proposition.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Sorare's site markets football, NBA and MLB products; NBPA verifies an officially licensed NBA fantasy game; Wikipedia summarizes MLB and football availability.
            evidence_claim_ids: [EC-008, EC-009, EC-010]
            risk_ids: [R-006]
        hidden_risks:
          - Product engagement may be seasonal and sport-specific; public pages do not prove retention or repeat spend.
        evidence_gaps:
          - Product-level MAU, paid conversion, retention, support tickets, outages and roadmap.
        follow_up_questions:
          - Provide product KPI pack by sport, card scarcity tier, geography and user cohort.
        table_ids: [T-004]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-003, EC-008, EC-009, EC-010]
      - section_id: II.B
        title: Pricing, rewards and wallet experience
        checklist_question_ids: [II.B]
        summary: Public evidence shows card purchases, transactions, free-to-play modes and rewards, but fee schedules, wallet risk controls and card-liquidity protections are not fully public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.B-F1
            finding: CNBC reported 87% of players did not spend money while Sorare relied on big-spending power users and took a cut of transactions.
            evidence_claim_ids: [EC-006]
            risk_ids: [R-005]
        hidden_risks:
          - A small payer base can create revenue volatility, consumer-protection scrutiny and marketplace-liquidity pressure.
        evidence_gaps:
          - Fee schedule history, wallet custody model, chargeback/fraud data, card liquidity, refund policy and responsible-play settings.
        follow_up_questions:
          - Provide fee/take-rate history, wallet custody documentation, fraud metrics and responsible-play controls by jurisdiction.
        table_ids: [T-005]
        figure_ids: []
        evidence_claim_ids: [EC-006, EC-009, EC-012]

  - chapter_id: III
    title: Customer Information
    chapter_summary: Sorare has public evidence of millions of registered users and major sports partners, but paid-user quality, spender concentration, churn and contract economics are private.
    founder_claim_ids: [FC-003, FC-005]
    evidence_claim_ids: [EC-004, EC-005, EC-006, EC-008]
    risk_ids: [R-004, R-005, R-008]
    sections:
      - section_id: III.A
        title: Users, customers and strategic partners
        checklist_question_ids: [III.A, III.B]
        summary: TechCrunch reported 600,000 registered users and 150,000 monthly active buyers/team composers in 2021; NBPA reported two million registered users in 2022; CNBC reported three million users in 2023.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: III.A-F1
            finding: Public user-count anchors show growth from 600,000 registered users in 2021 to three million worldwide users in 2023.
            evidence_claim_ids: [EC-004, EC-005, EC-008]
            risk_ids: [R-008]
        hidden_risks:
          - Registered-user growth does not prove paid conversion, retention or responsible-play compliance.
        evidence_gaps:
          - Active paid users, cohorts, churn, ARPPU, geographic restrictions, customer support and complaints.
        follow_up_questions:
          - Provide monthly active, paid active, retention, spend distribution and responsible-play intervention data.
        table_ids: [T-006]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-004, EC-005, EC-006, EC-008]
      - section_id: III.B
        title: Supplier, data and platform dependencies
        checklist_question_ids: [III.C, III.D]
        summary: Product delivery depends on sports IP licensors, sports data/scoring, marketplace/payment rails, blockchain infrastructure and consumer trust in digital collectibles.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Public sources verify dependence on licensed sports IP and blockchain-backed collectible cards, but supplier contracts and SLAs are not public.
            evidence_claim_ids: [EC-003, EC-005, EC-008, EC-010]
            risk_ids: [R-004, R-006]
        hidden_risks:
          - Loss of a major league license or blockchain/wallet incident could impair product appeal and user trust.
        evidence_gaps:
          - Vendor contracts, data-provider agreements, payment processor terms, custody arrangements and incident history.
        follow_up_questions:
          - Provide supplier/vendor schedule, SLA history, data-provider contracts, wallet/custody documentation and payment-processor terms.
        table_ids: [T-007]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-005, EC-008, EC-010]

  - chapter_id: IV
    title: Competition
    chapter_summary: Sorare competes across fantasy sports, sports betting-adjacent entertainment, digital collectibles and NFT marketplaces; sports IP breadth is a differentiator but not a permanent moat without renewals.
    founder_claim_ids: [FC-002, FC-003]
    evidence_claim_ids: [EC-003, EC-004, EC-005, EC-008]
    risk_ids: [R-004, R-007]
    sections:
      - section_id: IV.A
        title: Competitor landscape
        checklist_question_ids: [IV.A]
        summary: Public evidence supports Sorare's differentiated sports-license portfolio, but competition includes fantasy sports incumbents, sports betting operators, collectibles platforms and blockchain games.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: TechCrunch viewed Sorare's 180 football organization partnerships as a barrier to entry, but CNBC highlights market pressure from the broader NFT downturn.
            evidence_claim_ids: [EC-004, EC-006]
            risk_ids: [R-007]
        hidden_risks:
          - Fantasy/betting incumbents can outspend on user acquisition and license guarantees if regulation permits.
        evidence_gaps:
          - Win/loss data, user-overlap analysis, license-bid history and competitive CAC.
        follow_up_questions:
          - Provide competitor win/loss, CAC by channel, license-bid history and user-overlap analysis.
        table_ids: [T-008]
        figure_ids: [F-005]
        evidence_claim_ids: [EC-004, EC-006, EC-008]
      - section_id: IV.B
        title: Basis of competition and defensibility
        checklist_question_ids: [IV.B]
        summary: Defensibility appears to rest on league/club licenses, community liquidity, gameplay design and brand, but each factor requires private measurement.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.B-F1
            finding: Public sources verify licenses and broad user claims but not renewal economics, liquidity depth, take-rate durability or switching costs.
            evidence_claim_ids: [EC-005, EC-008, EC-013]
            risk_ids: [R-004, R-007]
        hidden_risks:
          - If free-to-play users dominate engagement, monetization defensibility may be weaker than brand awareness suggests.
        evidence_gaps:
          - License renewal costs, market liquidity, cohort retention, card resale depth and user switching behavior.
        follow_up_questions:
          - Provide renewal calendars, license economics, marketplace liquidity metrics and retention by acquisition cohort.
        table_ids: [T-009]
        figure_ids: []
        evidence_claim_ids: [EC-005, EC-006, EC-013]

  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Sorare distributes through league partnerships, star investors/ambassadors, owned product channels and marketplace virality; paid marketing efficiency and channel mix are not public.
    founder_claim_ids: [FC-004, FC-005]
    evidence_claim_ids: [EC-005, EC-006, EC-008, EC-009]
    risk_ids: [R-005, R-007, R-003]
    sections:
      - section_id: V.A
        title: Distribution and monetization channels
        checklist_question_ids: [V.A]
        summary: Public sources show major license-led distribution and marketplace monetization, but CAC, sales efficiency and channel-level payback are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: TechCrunch reported planned U.S. expansion and marketing investment after the Series B; CNBC showed the Premier League deal expanded product distribution despite NFT market weakness.
            evidence_claim_ids: [EC-002, EC-005]
            risk_ids: [R-007]
        hidden_risks:
          - License announcements can create reach without profitable paid conversion.
        evidence_gaps:
          - CAC, payback, channel mix, partnership minimum guarantees and league activation ROI.
        follow_up_questions:
          - Provide CAC/payback by channel, license activation spend, partner referral economics and marketing budget-to-actuals.
        table_ids: [T-010]
        figure_ids: [F-006]
        evidence_claim_ids: [EC-002, EC-005, EC-006, EC-009]
      - section_id: V.B
        title: Public marketing and community signals
        checklist_question_ids: [V.B]
        summary: Sorare has public owned-channel, partner and ambassador signals, but community health and paid conversion are not independently verified.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.B-F1
            finding: NBPA notes Sorare backers include major investors and athletes, while Sorare's site highlights partners/investors and social/community channels.
            evidence_claim_ids: [EC-008, EC-009]
            risk_ids: [R-005]
        hidden_risks:
          - Ambassador marketing may be costly or less effective if NFT sentiment remains weak.
        evidence_gaps:
          - Influencer/ambassador agreements, community moderation, creator-program economics and complaint rates.
        follow_up_questions:
          - Provide ambassador/creator contracts, community metrics, complaint logs and conversion data from partner launches.
        table_ids: [T-011]
        figure_ids: []
        evidence_claim_ids: [EC-008, EC-009]

  - chapter_id: VI
    title: Research and Development
    chapter_summary: Public product materials show active gameplay updates and a blockchain-based collectible architecture, but internal R&D staffing, roadmap delivery and security posture are not public.
    founder_claim_ids: [FC-002]
    evidence_claim_ids: [EC-003, EC-009, EC-010, EC-015]
    risk_ids: [R-006, R-003]
    sections:
      - section_id: VI.A
        title: Product roadmap and release activity
        checklist_question_ids: [VI.A]
        summary: Sorare's public site and blog show active football, NBA and MLB product surfaces and recent gameplay/news posts; internal roadmap and budget remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.A-F1
            finding: Sorare's public site lists football, MLB and NBA fantasy products, and its blog index showed current football, NBA and MLB news posts.
            evidence_claim_ids: [EC-009, EC-015]
            risk_ids: [R-006]
        hidden_risks:
          - Product roadmap may be driven by regulatory redesign rather than pure growth features.
        evidence_gaps:
          - Engineering roadmap, delivery metrics, R&D budget, incident history and dependency upgrades.
        follow_up_questions:
          - Provide R&D roadmap, release calendar, incident history, security audits and engineering headcount by function.
        table_ids: [T-012]
        figure_ids: [F-007]
        evidence_claim_ids: [EC-009, EC-015]
      - section_id: VI.B
        title: Technical architecture and security dependencies
        checklist_question_ids: [VI.B]
        summary: Sorare's model depends on scarce digital collectibles, wallets, blockchain settlement and sports-data scoring; detailed controls are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.B-F1
            finding: TechCrunch described Ethereum-registered cards, while secondary sources describe later infrastructure changes; primary private architecture is needed.
            evidence_claim_ids: [EC-003, EC-010]
            risk_ids: [R-006]
        hidden_risks:
          - Wallet, bridge, marketplace or scoring-data incidents could trigger financial loss, user distrust and regulatory scrutiny.
        evidence_gaps:
          - SOC reports, penetration tests, key-management architecture, wallet/custody controls, data-provider SLAs and incident logs.
        follow_up_questions:
          - Provide security audit reports, wallet custody design, chain-migration risk assessment, incident runbooks and insurance coverage.
        table_ids: [T-013]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-010, EC-013]

  - chapter_id: VII
    title: Management and Personnel
    chapter_summary: Public sources verify founders/executive leadership signals and Paris/New York operations, but headcount, turnover, compensation and org depth are private.
    founder_claim_ids: [FC-002, FC-005]
    evidence_claim_ids: [EC-008, EC-010, EC-013]
    risk_ids: [R-009]
    sections:
      - section_id: VII.A
        title: Senior management and governance
        checklist_question_ids: [VII.A]
        summary: Public sources identify Nicolas Julia as co-founder/CEO and Wikipedia identifies Nicolas Julia and Adrien Montfort as developers/founders; board and governance rights are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VII.A-F1
            finding: NBPA quotes Nicolas Julia as co-founder and CEO; Wikipedia names Nicolas Julia and Adrien Montfort as the developers.
            evidence_claim_ids: [EC-008, EC-010]
            risk_ids: [R-009]
        hidden_risks:
          - Investor, league or athlete-shareholder governance rights could affect strategic control.
        evidence_gaps:
          - Board minutes, governance documents, management bios, succession planning and related-party transactions.
        follow_up_questions:
          - Provide org chart, board/investor rights, management KPIs, compensation plans and related-party disclosures.
        table_ids: [T-014]
        figure_ids: [F-008]
        evidence_claim_ids: [EC-008, EC-010, EC-013]
      - section_id: VII.B
        title: Headcount, hiring and personnel controls
        checklist_question_ids: [VII.B]
        summary: Public sources support Paris and New York operations, but headcount by function, attrition and employee obligations are not publicly verifiable.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VII.B-F1
            finding: NBPA states Sorare is based in Paris and New York; no reliable public headcount or turnover dataset was verified in this diligence pass.
            evidence_claim_ids: [EC-008, EC-013]
            risk_ids: [R-009]
        hidden_risks:
          - Compliance, trust-and-safety and security staffing may be insufficient for regulated global operations.
        evidence_gaps:
          - HRIS export, headcount plan, attrition, contractor/IP assignments, option grants and compliance staffing.
        follow_up_questions:
          - Provide HRIS export, hiring plan, turnover data, employee invention assignments and compliance/security org design.
        table_ids: [T-015]
        figure_ids: []
        evidence_claim_ids: [EC-008, EC-013]

  - chapter_id: VIII
    title: Legal and Related Matters
    chapter_summary: Sorare has material public regulatory exposure around gambling/JONUM and digital collectibles; litigation, IP records and license contracts need counsel-led diligence.
    founder_claim_ids: [FC-003, FC-006, FC-007]
    evidence_claim_ids: [EC-007, EC-011, EC-012, EC-013]
    risk_ids: [R-003, R-004, R-006, R-010]
    sections:
      - section_id: VIII.A
        title: Regulatory, consumer-protection and gambling matters
        checklist_question_ids: [VIII.A, VIII.D]
        summary: The UK Gambling Commission issued a 2021 consumer notice and said it was carrying out enquiries; CNBC reported French ANJ-driven product changes, and ANJ materials describe the JONUM framework and obligations.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: VIII.A-F1
            finding: UKGC stated Sorare.com was not licensed by the Gambling Commission and was under enquiries to establish whether an operating license was required.
            evidence_claim_ids: [EC-011]
            risk_ids: [R-003]
          - finding_id: VIII.A-F2
            finding: ANJ materials define JONUM and impose declaration, adult-access, advertising, moderation and AML-related obligations for covered operators.
            evidence_claim_ids: [EC-012]
            risk_ids: [R-003]
        hidden_risks:
          - Additional jurisdictions may classify paid fantasy NFT mechanics as gambling, digital-asset services or consumer-credit/payment products.
        evidence_gaps:
          - Regulator correspondence, legal opinions, jurisdiction matrix, KYC/AML files, age-gating controls and sanctions screening.
        follow_up_questions:
          - Provide all regulatory correspondence, legal opinions and compliance controls for UK, France, EU, U.S. and key operating markets.
        table_ids: [T-016]
        figure_ids: [F-009]
        evidence_claim_ids: [EC-007, EC-011, EC-012]
      - section_id: VIII.B
        title: IP, licenses, lawsuits and contractual matters
        checklist_question_ids: [VIII.B, VIII.C, VIII.E]
        summary: Public evidence verifies major IP licenses, but contract terms, infringement exposure, pending lawsuits and trademark/patent status were not fully verified.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.B-F1
            finding: Premier League, NBA/NBPA and football-club/licensor relationships are public; license economics and renewal risk are private.
            evidence_claim_ids: [EC-004, EC-005, EC-008]
            risk_ids: [R-004, R-010]
        hidden_risks:
          - Minimum guarantees, exclusivity restrictions, data rights or athlete-image disputes could materially affect economics.
        evidence_gaps:
          - Executed licenses, IP ownership schedules, trademark/patent searches, dispute docket searches and open claims.
        follow_up_questions:
          - Have counsel review all material licenses, IP records, open disputes, insurance and consumer terms.
        table_ids: [T-017, T-018]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-005, EC-008, EC-013]

