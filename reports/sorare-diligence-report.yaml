risk_register:
  - risk_id: R-001
    risk_title: Financial statements and unit economics are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence supports historical funding and GMV signals but not revenue, margin, cash runway, debt, retention or payback.
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.A, I.B]
    evidence_claim_ids: [EC-003, EC-006, EC-013]
    mitigation_or_diligence_request: Require audited financials, KPI pack, GMV-to-revenue bridge, cash/debt and cohort economics.
  - risk_id: R-002
    risk_title: Stale valuation and NFT-market compression
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $4.3B valuation is from 2021; CNBC later documented substantial NFT-market declines.
    impacted_chapter_ids: [I, IV]
    impacted_section_ids: [I.B, IV.A]
    evidence_claim_ids: [EC-001, EC-002, EC-006]
    mitigation_or_diligence_request: Re-underwrite valuation using current net revenue, paid user retention, cash runway and market comps.
  - risk_id: R-003
    risk_title: Gambling, JONUM and consumer-protection regulation
    risk_category: regulatory
    severity: high
    likelihood: high
    description: UKGC and ANJ evidence shows meaningful classification and compliance exposure that could constrain product design or market access.
    impacted_chapter_ids: [II, V, VIII]
    impacted_section_ids: [II.B, V.A, VIII.A]
    evidence_claim_ids: [EC-007, EC-011, EC-012]
    mitigation_or_diligence_request: Obtain legal opinions, regulatory correspondence, jurisdiction matrix, age-gating/KYC/AML and responsible-play evidence.
  - risk_id: R-004
    risk_title: Sports IP license dependence
    risk_category: operational
    severity: high
    likelihood: medium
    description: Product differentiation depends on league, club and player rights; economics and renewal terms are private.
    impacted_chapter_ids: [III, IV, VIII]
    impacted_section_ids: [III.A, IV.B, VIII.B]
    evidence_claim_ids: [EC-004, EC-005, EC-008, EC-014]
    mitigation_or_diligence_request: Review all material IP licenses, exclusivity, minimum guarantees, renewals, termination rights and warrants.
  - risk_id: R-005
    risk_title: Paid-user and spender concentration
    risk_category: customer
    severity: medium
    likelihood: high
    description: CNBC reported 87% of users did not spend money, implying revenue may depend on a concentrated payer base.
    impacted_chapter_ids: [I, III, V]
    impacted_section_ids: [I.A, III.A, V.A]
    evidence_claim_ids: [EC-006]
    mitigation_or_diligence_request: Request paid-user cohorts, whale concentration, retention, responsible-play interventions and ARPPU distribution.
  - risk_id: R-006
    risk_title: Blockchain, wallet and data integrity dependencies
    risk_category: technical
    severity: medium
    likelihood: medium
    description: NFT/card ownership, wallet, marketplace and scoring dependencies require security and controls diligence.
    impacted_chapter_ids: [II, III, VI, VIII]
    impacted_section_ids: [II.A, III.B, VI.B, VIII.A]
    evidence_claim_ids: [EC-003, EC-009, EC-010, EC-012]
    mitigation_or_diligence_request: Review security audits, wallet custody, chain-migration, sports data SLAs, incident logs and insurance.
  - risk_id: R-007
    risk_title: Competitive pressure from fantasy, betting and collectible platforms
    risk_category: market
    severity: medium
    likelihood: medium
    description: Sorare competes for sports-fan time/spend against well-funded fantasy, betting, game and NFT-marketplace players.
    impacted_chapter_ids: [IV, V]
    impacted_section_ids: [IV.A, V.A]
    evidence_claim_ids: [EC-004, EC-006]
    mitigation_or_diligence_request: Request win/loss, CAC, paid retention, license-bid history and competitive pricing analysis.
  - risk_id: R-008
    risk_title: Registered users may overstate active paying demand
    risk_category: customer
    severity: medium
    likelihood: high
    description: Public registered-user counts are large, but active paid conversion and retention are not public.
    impacted_chapter_ids: [III]
    impacted_section_ids: [III.A]
    evidence_claim_ids: [EC-004, EC-005, EC-006, EC-008]
    mitigation_or_diligence_request: Request DAU/MAU, paid active users, churn, cohort retention and spend distribution.
  - risk_id: R-009
    risk_title: Management depth and headcount controls not verified
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Public sources verify limited leadership signals but not full org depth, turnover, compliance staffing or succession.
    impacted_chapter_ids: [VII]
    impacted_section_ids: [VII.A, VII.B]
    evidence_claim_ids: [EC-008, EC-010, EC-013]
    mitigation_or_diligence_request: Request HRIS, org chart, attrition, compensation, compliance staffing and board materials.
  - risk_id: R-010
    risk_title: Litigation, IP and contract docket gaps
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public research did not complete counsel-grade litigation, IP or contract review.
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.B]
    evidence_claim_ids: [EC-013, EC-014]
    mitigation_or_diligence_request: Have counsel conduct docket, IP, license, consumer-terms and insurance review.

diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, revenue by stream, GMV-to-revenue bridge, gross margin, cash, debt and runway.
    why_it_matters: Public GMV/card-exchange signals cannot support valuation without net revenue and cash economics.
    suggested_source_or_request: CFO data room and auditor workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Full cap table, preferences, warrants, option pool, league equity rights and current valuation support.
    why_it_matters: Investor and partner economics could change common-equity value and dilution.
    suggested_source_or_request: Financing documents, shareholder register and warrant schedules.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Paid-user cohorts, retention, active users, churn, spender concentration and responsible-play interventions.
    why_it_matters: Registered-user counts do not prove durable monetization.
    suggested_source_or_request: Product analytics warehouse export and cohort dashboards.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.A
    missing_information: UKGC, ANJ and other regulator correspondence plus legal opinions by jurisdiction.
    why_it_matters: Regulatory classification could require product changes, licensing, fines or market restrictions.
    suggested_source_or_request: Counsel files and compliance/legal data room.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.B
    missing_information: Executed league/club/player licenses, minimum guarantees, exclusivity, renewals and termination rights.
    why_it_matters: Sports IP is core to product differentiation and economics.
    suggested_source_or_request: Legal/contracts schedule and all material agreements.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: Security audits, wallet/custody controls, incident history, chain-migration plan and insurance.
    why_it_matters: Digital-asset and wallet failures could cause customer loss and regulatory scrutiny.
    suggested_source_or_request: CTO/security packet and insurance policies.
    priority: high
  - gap_id: G-007
    chapter_id: V
    section_id: V.A
    missing_information: CAC, payback, channel mix, league activation ROI and partner-launch conversion.
    why_it_matters: Public partnerships may be expensive without profitable acquisition.
