diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, cash/debt, burn and unit economics
    why_it_matters: Cannot assess quality of revenue, margin, runway or valuation support.
    suggested_source_or_request: CFO data-room package and auditor workpapers
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, investor rights, option pool, warrants, debt and preferences
    why_it_matters: Public valuation may be misleading without ownership and preference stack.
    suggested_source_or_request: Corporate counsel and Carta/cap-table export
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer-level revenue, gross margin, churn and cohort retention
    why_it_matters: Public customers/users do not establish durable, diversified revenue.
    suggested_source_or_request: Customer cohort exports and top-contract summaries
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, sales productivity, pipeline conversion, quota attainment and payback
    why_it_matters: GTM scalability and budget sufficiency are not public.
    suggested_source_or_request: Sales ops dashboards and board GTM materials
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Technical architecture, roadmap commitments, R&D budget and technical debt
    why_it_matters: Product differentiation and delivery risk require engineering evidence.
    suggested_source_or_request: CTO architecture review and roadmap burn-up
    priority: medium
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Full org chart, compensation, equity grants, attrition and key-person plans
    why_it_matters: Team scalability and retention cannot be assessed from public profiles.
    suggested_source_or_request: HRIS export, option plan and retention analysis
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, regulatory, privacy/security, IP and insurance schedules
    why_it_matters: Legal liabilities and compliance costs may be material.
    suggested_source_or_request: Counsel-prepared legal schedule, policies and insurance binder
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer, supplier, cloud/model/payment and partner contracts
    why_it_matters: Termination rights, exclusivity, indemnities and cost commitments drive risk.
    suggested_source_or_request: Contract data room and legal abstracts
    priority: high
