executive_summary:
  overall_assessment: "Eligible public unicorn report: Solace is publicly listed as a $1B U.S. healthcare and life
    sciences unicorn and has announced a $130M Series C, but investment diligence should remain cautious until
    reimbursement, financial-quality, privacy/security and workforce controls are verified."
  investment_or_diligence_thesis: Solace may benefit from Medicare reimbursement tailwinds and demand for human healthcare
    navigation, yet the public record supports category momentum more than unit economics, compliance maturity or
    defensible technology.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and Series C evidence support Solace as a $1B+ private unicorn.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-006
      summary: Public financing evidence supports a $60M Series B, $130M Series C and $211M raised-to-date claim.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-004
    - founder_claim_id: FC-007
      summary: Founders Jeremy Gurewitz and Sara Sargent are publicly identified by company pages.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-004
      summary: Product scope as healthcare advocacy/navigation is consistently described on company pages.
      evidence_claim_ids:
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Medicare billing, navigation-code compliance and reimbursement changes can affect revenue and clawback exposure.
    - risk_id: R-002
      summary: Public evidence does not include ARR, margins, burn, retention, CAC, cap table or audited financial statements.
    - risk_id: R-004
      summary: HIPAA/PHI, security controls, BAAs and breach history are not publicly verifiable.
    - risk_id: R-005
      summary: Human advocate network quality, scope-of-practice, licensure and 1099 classification must be tested.
    - risk_id: R-010
      summary: Provider referrals, payer partnerships and Medicare billing require AKS/OIG/HIPAA marketing review.
  key_evidence_gaps:
    - Audited/management financials, KPI cohorts, cash runway and claims collections
    - Full cap table, financing documents, option pool and investor rights
    - Payer/provider contracts, claims-denial data and revenue by payer/customer
    - HIPAA/security artifacts, BAAs, subprocessors and breach history
    - Advocate roster, credentialing, training, QA and contractor classification analysis
    - Litigation/regulatory/corporate-record searches by exact legal entity
  recommended_next_steps:
    - Run company data-room request list before any investment decision.
    - Have healthcare regulatory counsel review Medicare billing, referral, AKS/OIG, HIPAA and licensure issues.
    - Rebuild unit economics from claims, payer mix, advocate utilization and cash collections.
    - Conduct customer/payer/provider references and outcome-methodology review.
    - Complete security/privacy diligence including SOC 2/HITRUST, BAAs, incident logs and data map.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies a $60M Series B, $130M Series C, $1B unicorn marker and reimbursement-linked
      business model, but core financial statements, cap table, unit economics, tax and projections are not public.
    founder_claim_ids:
      - FC-001
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-020
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-008
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or management financial statements are public. Public sources provide financing announcements,
          reimbursement-model descriptions and select scale metrics only.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Funding and operating metrics are publicly disclosed, but income statements, balance sheets, cash flows,
              backlog and AR aging are not.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-002
          - finding_id: I.A-F2
            finding: Medicare billing creates revenue-recognition and collections questions that require private claims and
              accounting data.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-001
        hidden_risks:
          - Valuation may rely on growth metrics without verified gross margin, burn, cash runway or collections quality.
          - Claims-denial and reimbursement timing could hide working-capital stress.
        evidence_gaps:
          - Audited or management financial statements; monthly KPI deck; AR aging; backlog; revenue/gross-profit by
            product, channel and geography.
        follow_up_questions:
          - Provide monthly income statement, balance sheet, cash-flow, revenue by payer/channel/geography, gross margin
            bridge, backlog and AR aging for FY2023-FY2026 YTD.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-020
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public projection evidence is limited to 10x YoY growth, Series C growth capital, Medicare reimbursement
          tailwinds and payer/provider partnership language.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Growth drivers include Medicare/MA coverage, provider referrals, payer partnerships and Series C capital, but
              the operating plan is private.
            evidence_claim_ids:
              - EC-005
              - EC-006
              - EC-027
            risk_ids:
              - R-003
              - R-008
          - finding_id: I.B-F2
            finding: Projection sensitivity should center on reimbursement rate, denial rate, advocate utilization and patient
              acquisition efficiency.
            evidence_claim_ids:
              - EC-004
              - EC-013
              - EC-015
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - CMS reimbursement shifts or payer policy changes could invalidate plan assumptions.
          - Rapid hiring after Series C could raise burn before payback is proven.
        evidence_gaps:
          - Three-year quarterly plan, downside cases, pricing/reimbursement assumptions, CAC/payback and
            capex/working-capital plan.
        follow_up_questions:
          - Provide board-approved forecast, cohort model, reimbursement sensitivity, hiring plan, cash runway and
            downside scenarios.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-006
          - EC-013
          - EC-015
          - EC-027
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources verify major financing rounds and unicorn valuation marker but do not disclose shares
          outstanding, cap table, options, warrants, debt, SAFEs/notes or off-balance-sheet obligations.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Series B and Series C financing announcements support venture backing and valuation eligibility.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
              - EC-019
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: $211M raised-to-date claim requires reconciliation with financing documents and bank records.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-002
        hidden_risks:
          - Liquidation preferences, secondary sales, option-pool increases and side letters could materially affect
            investor economics.
          - Undisclosed debt or contingent obligations could reduce runway.
        evidence_gaps:
          - Fully diluted capitalization, financing documents, side letters, SAFEs/notes, debt instruments, option plan
            and board consents.
        follow_up_questions:
          - Provide pre/post-money cap table for each round, preference stack, pro-forma fully diluted shares,
            debt/notes/warrants and investor rights.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-019
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Tax positions, NOLs, accounting policies and revenue-recognition treatment are not public; the Medicare
          reimbursement-linked model makes these documents high priority.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: Revenue-recognition policy is not public despite Medicare billing and variable reimbursement-share references.
            evidence_claim_ids:
              - EC-004
              - EC-020
            risk_ids:
              - R-001
              - R-002
          - finding_id: I.D-F2
            finding: Tax nexus may be complex because public sources suggest Austin, Redwood City and fully remote operations.
            evidence_claim_ids:
              - EC-026
            risk_ids:
              - R-009
        hidden_risks:
          - Misstated revenue recognition or reimbursement reserves could overstate growth.
          - Remote workforce and 1099 advocate footprint could create state tax and employment nexus exposure.
        evidence_gaps:
          - Tax returns, NOL schedule, revenue-recognition memo, claims reserve policy, audit adjustments and state
            nexus analysis.
        follow_up_questions:
          - Provide tax positions/NOLs, revenue-recognition memo, billing-reserve policy, state nexus matrix and
            financing-history schedule by instrument.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-020
          - EC-026
  - chapter_id: II
    title: Products
    chapter_summary: Solace markets a healthcare advocacy/navigation service backed by a HIPAA-compliant platform, with
      advocates helping patients and families navigate care, insurance, bills and logistics; delivery quality, margin
      and technical defensibility remain private.
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-010
      - EC-023
    risk_ids:
      - R-004
      - R-005
      - R-006
      - R-011
      - R-012
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: The public product is a services-plus-software advocacy model for care navigation, insurance/billing help,
          provider referrals and payer partnerships. Advocates are constrained from diagnosis/prescribing, and product
          economics are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Product scope is well described on company pages and includes appointments, bills, insurance appeals,
              documentation and coordination.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-005
          - finding_id: II.A-F2
            finding: Public safety boundary says advocates cannot prescribe or diagnose, but training and enforcement are private.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-005
              - R-011
          - finding_id: II.A-F3
            finding: HIPAA-compliant platform claims require technical verification.
            evidence_claim_ids:
              - EC-005
              - EC-023
            risk_ids:
              - R-004
              - R-011
        hidden_risks:
          - Service-heavy delivery may cap gross margin unless technology materially improves advocate productivity.
          - Professional-mix inconsistency between public sources may signal metric-definition or positioning drift.
          - Product could face clinical-safety and privacy exposure if advocates exceed navigation scope.
        evidence_gaps:
          - Product roadmap, pricing, gross margin by module, utilization, SLA performance, architecture, automation
            rate and QA outcomes.
        follow_up_questions:
          - Provide product demo, workflow maps, margin by service, case-resolution metrics, advocate training/QA,
            architecture/security docs and roadmap with release dates.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-010
          - EC-023
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence shows patient scale, advocate supply and Medicare/MA coverage claims, but no
      top-customer list, revenue concentration, churn, contracts, supplier spend or severed-relationship history is
      public.
    founder_claim_ids:
      - FC-002
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-012
      - EC-024
    risk_ids:
      - R-003
      - R-005
      - R-006
      - R-012
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Solace discloses patient scale but not named top customers or applications by revenue. Monthly-patient and
          advocate metrics are company-provided public claims.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Series C announcement claims 20,000+ monthly patients and 2,000+ advocates.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-006
              - R-012
          - finding_id: III.A-F2
            finding: Top 15 customers by application are not public.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-003
        hidden_risks:
          - Patient count definitions may differ from billable encounters or active reimbursed patients.
          - A few payer/provider sources could concentrate demand without being visible.
        evidence_gaps:
          - Top 15 customers/payers/providers by revenue and patients, application mix, retention and cohort activity.
        follow_up_questions:
          - Provide patient cohort definitions, top customer/provider/payer list, revenue by application,
            churn/retention and complaint metrics.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-005
          - EC-024
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Strategic relationship evidence includes Medicare/MA coverage claims, named insurer examples, provider
          referrals and payer/provider partnership strategy; actual contracts are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Public sources name major Medicare Advantage insurer examples and all-50-state coverage.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-003
          - finding_id: III.B-F2
            finding: Payer/provider partnerships are a declared strategic priority.
            evidence_claim_ids:
              - EC-011
              - EC-027
            risk_ids:
              - R-003
              - R-010
        hidden_risks:
          - Coverage language may not equal direct contracts or predictable reimbursement.
          - Referral relationships could trigger healthcare regulatory review.
        evidence_gaps:
          - Signed payer/provider agreements, revenue contribution, marketing agreements, implementation status and
            termination rights.
        follow_up_questions:
          - Provide strategic-relationship schedule with contract dates, revenue contribution, exclusivity, termination
            rights and compliance approvals.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-011
          - EC-027
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No customer-level revenue or 5%+ concentration schedule is public. Medicare/MA dependence appears likely from
          coverage and billing language.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Public sources emphasize Medicare billing and major MA insurers but do not disclose revenue by payer/customer.
            evidence_claim_ids:
              - EC-004
              - EC-024
            risk_ids:
              - R-003
          - finding_id: III.C-F2
            finding: Outcomes claims could influence payer revenue but methodology is not public.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-006
        hidden_risks:
          - Payer concentration or a single billing pathway could create hidden fragility.
          - Revenue may be sensitive to plan-specific denials or coding interpretations.
        evidence_gaps:
          - Revenue by customer/payer/provider, denied claims by payer, collections, reimbursement rates and customer
            gross margin.
        follow_up_questions:
          - Provide revenue and gross margin by customer/payer, 5%+ customer list, denial/appeal metrics and collections
            aging.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-012
          - EC-024
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No severed customer, partner or supplier relationship was found in public sources, but this cannot be verified
          without company records.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Reviewed public materials did not identify a specific severed relationship.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-009
          - finding_id: III.D-F2
            finding: Absence of public evidence is not reliable negative assurance for private payer/provider relationships.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-003
        hidden_risks:
          - Lost payer/provider relationships may be private and economically material.
          - Complaint or regulatory-driven terminations may not appear in marketing sources.
        evidence_gaps:
          - Churned payer/provider/customer list, termination notices, disputes and root-cause analyses for the last two
            years.
        follow_up_questions:
          - Provide schedule of lost or materially reduced relationships, disputes, notices of breach and related
            revenue impact.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-022
          - EC-024
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Top suppliers are not public. Key dependencies visible from public evidence are advocate labor supply,
          CMS/reimbursement infrastructure, payer relationships and technology/privacy vendors.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Advocate labor supply is a key operational dependency.
            evidence_claim_ids:
              - EC-005
              - EC-013
            risk_ids:
              - R-005
          - finding_id: III.E-F2
            finding: CMS/payer reimbursement and PHI infrastructure are critical dependencies.
            evidence_claim_ids:
              - EC-015
              - EC-023
            risk_ids:
              - R-001
              - R-004
        hidden_risks:
          - Third-party technology/subprocessor or billing vendor risk is hidden.
          - Advocate supply could become scarce or expensive as the model scales.
        evidence_gaps:
          - Top suppliers by spend, subprocessor list, billing vendors, advocate contractor terms and supplier
            concentration.
        follow_up_questions:
          - Provide supplier spend schedule, subprocessor/BAA list, billing-system vendors, advocate contractor
            agreement and supplier termination rights.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-013
          - EC-015
          - EC-023
  - chapter_id: IV
    title: Competition
    chapter_summary: Solace operates in a crowded healthcare navigation and advocacy market with established employer/plan
      navigation companies and adjacent Medicare/older-adult support providers. Public evidence does not establish
      market share.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-017
      - EC-018
    risk_ids:
      - R-007
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Direct and adjacent competitors market advocacy, navigation, virtual care, Medicare guidance and older-adult
          support. Solace differentiation appears to center on Medicare/MA coverage, patient advocacy, advocate network
          and reimbursement-enabled access.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Accolade, Included Health, Health Advocate, Quantum Health and Rightway market care-navigation or advocacy
              solutions.
