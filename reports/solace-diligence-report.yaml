risk_register:
  - risk_id: R-001
    risk_title: Medicare reimbursement and coding dependency
    risk_category: regulatory
    severity: high
    likelihood: high
    description: The model appears materially dependent on Medicare navigation-related reimbursement and billing workflows;
      CMS coding, consent, supervision, documentation, denial, audit or clawback changes could impair revenue.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.D
      - VIII.G
    evidence_claim_ids:
      - EC-004
      - EC-015
    mitigation_or_diligence_request: Review claims files, coding policies, physician-supervision arrangements, consent
      templates, denial rates, CMS/OIG guidance analysis and audit history.
  - risk_id: R-002
    risk_title: Valuation support and financial-quality opacity
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public information supports financing milestones but not revenue, gross margin, burn, cash runway,
      retention, CAC, contribution margin, cap table or liquidation preferences.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-020
    mitigation_or_diligence_request: Request audited/management financials, revenue recognition memo, KPI deck, cohort
      economics, cash runway and full financing history.
  - risk_id: R-003
    risk_title: Payer and reimbursement concentration
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public evidence emphasizes Medicare, Medicare Advantage and payer partnerships, but customer-level revenue
      concentration and plan-specific economics are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-006
      - EC-011
      - EC-024
    mitigation_or_diligence_request: Request payer mix, claims by plan, top customer concentration, contract terms,
      termination rights and denied-claim economics.
  - risk_id: R-004
    risk_title: HIPAA, PHI and cybersecurity controls
    risk_category: legal
    severity: high
    likelihood: medium
    description: Solace handles PHI through referrals, patient support and platform workflows; public HIPAA statements do
      not prove controls, BAAs, subprocessors, audit logs or breach history.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.G
      - II.A
    evidence_claim_ids:
      - EC-016
      - EC-023
    mitigation_or_diligence_request: Request HIPAA risk assessment, SOC 2/HITRUST, pen tests, incident/breach logs,
      subprocessors, BAAs and privacy-policy change history.
  - risk_id: R-005
    risk_title: Advocate network quality, scope and labor classification
    risk_category: operational
    severity: high
    likelihood: medium
    description: A services marketplace using healthcare advocates and 1099 RN roles must manage quality, credentialing,
      supervision, state licensure, scope-of-practice, malpractice and contractor-classification risks.
    impacted_chapter_ids:
      - II
      - VII
    impacted_section_ids:
      - II.A
      - VII.D
    evidence_claim_ids:
      - EC-009
      - EC-013
    mitigation_or_diligence_request: Review advocate credentialing, training, QA, malpractice coverage, classification
      analysis, state licensure matrix and escalation protocols.
  - risk_id: R-006
    risk_title: Outcome and satisfaction claims not independently validated
    risk_category: reputational
    severity: medium
    likelihood: high
    description: Patient-improvement and growth claims are public but appear company-provided; lack of independent
      methodology could weaken payer sales and create marketing-risk exposure.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.A
    evidence_claim_ids:
      - EC-005
      - EC-012
    mitigation_or_diligence_request: Request cohort definitions, raw survey data, independent evaluation reports, complaint
      logs, NPS/CSAT, and outcome methodology.
  - risk_id: R-007
    risk_title: Crowded navigation and advocacy competition
    risk_category: market
    severity: medium
    likelihood: high
    description: Established care-navigation and advocacy companies compete for employers, health plans and members;
      adjacent Medicare and older-adult support products could pressure differentiation and distribution.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-017
      - EC-018
    mitigation_or_diligence_request: Request win/loss data, pricing comparisons, customer references, differentiation proof
      and plan/employer pipeline conversion by competitor.
  - risk_id: R-008
    risk_title: Post-Series C execution and capital efficiency
    risk_category: financing
    severity: medium
    likelihood: medium
    description: Series C proceeds support marketing, engineering, product, design and research, but public sources do not
      show hiring plan, runway, burn multiple or productivity.
    impacted_chapter_ids:
      - I
      - VI
      - VII
    impacted_section_ids:
      - I.B
      - VI.A
      - VII.B
    evidence_claim_ids:
      - EC-002
      - EC-014
      - EC-025
    mitigation_or_diligence_request: Request operating plan, hiring plan, burn/runway, headcount productivity, sales quotas and R&D milestones.
  - risk_id: R-009
    risk_title: Corporate records, IP, insurance and entity details not public
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Exact legal entity, headquarters, cap table, IP assignments, trademark/patent status, insurance and
      material contracts are not publicly verified.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.B
      - VIII.D
      - VIII.E
      - VIII.F
    evidence_claim_ids:
