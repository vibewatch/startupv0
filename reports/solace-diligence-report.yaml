report_metadata:
  report_title: Solace Health Startup Diligence Report
  target_company: Solace Health
  website: https://www.solace.health/
  known_aliases:
    - Solace
    - Solace Health
  sector: Healthcare advocacy and care navigation
  geography: United States; public sources list Austin and a Redwood City press-release dateline; remote operations indicated
  company_stage: Private unicorn / Series C
  research_date: 2026-05-18
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source eligibility verification before report generation
    - Primary company pages and HIPAA notice
    - Financing announcements and investor pages
    - Market database and competitor websites
    - Official CMS reimbursement context
    - Limited public legal/regulatory sweep; no paid docket or private data-room access
  included_jurisdictions:
    - United States federal
    - United States state-level issues identified for follow-up
  excluded_topics:
    - No non-public data room
    - No customer calls
    - No counsel legal opinion
    - No paid PACER/state docket search
    - No security testing
    - No financial model access
  user_provided_materials: []
