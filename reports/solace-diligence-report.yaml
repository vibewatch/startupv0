        confidence: high
        key_findings:
          - finding_id: VIII.D-F1
            finding: Public sources reference a platform but do not establish patents, trademarks, code ownership or license
              compliance.
            evidence_claim_ids:
              - EC-025
              - EC-020
            risk_ids:
              - R-009
              - R-011
        hidden_risks:
          - If services are not technology-defensible, valuation may depend more on distribution and reimbursement
            access.
          - Missing invention assignments could impair IP ownership.
        evidence_gaps:
          - IP schedule, patents/trademarks, software license scan, invention assignments, contractor IP agreements and
            open-source policy.
        follow_up_questions:
          - Provide IP schedule, USPTO/copyright records, invention assignments, contractor agreements, software license
            scan and open-source compliance policy.
        table_ids:
          - T-018
        figure_ids: []
        evidence_claim_ids:
          - EC-020
          - EC-025
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: No insurance policies or coverage limits are public. Given PHI, clinical-adjacent advocacy, directors and
          contractor workforce, cyber, E&O, malpractice, D&O and GL coverage should be verified.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.E-F1
            finding: PHI and healthcare-advocacy workflows create material cyber, privacy and professional-liability exposure.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-004
              - R-005
          - finding_id: VIII.E-F2
            finding: No insurance schedules were public.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-009
        hidden_risks:
          - Uninsured HIPAA breach, malpractice-like allegations, billing disputes or D&O claims could be material.
          - Contractual insurance requirements with payers/providers may be unmet or restrictive.
        evidence_gaps:
          - Insurance schedules, policies, exclusions, limits, deductibles, claims history and contractual insurance
            requirements.
        follow_up_questions:
          - Provide cyber, E&O, malpractice, D&O, GL, workers comp policies, limits/exclusions and claims history.
        table_ids:
          - T-018
        figure_ids: []
        evidence_claim_ids:
          - EC-020
          - EC-023
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material payer, provider, advocate, technology, BAA/subprocessor, financing and investor-rights contracts are
          not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.F-F1
            finding: Payer/provider partnership strategy is public, but contract terms are private.
            evidence_claim_ids:
              - EC-011
              - EC-027
            risk_ids:
              - R-003
              - R-010
          - finding_id: VIII.F-F2
            finding: Advocate contractor and PHI-related agreements are private despite visible 1099 role and HIPAA workflows.
            evidence_claim_ids:
              - EC-013
              - EC-023
            risk_ids:
              - R-004
              - R-005
        hidden_risks:
          - Termination rights, exclusivity, audit rights, data-use restrictions or reimbursement conditions could
            materially affect economics.
          - Missing BAAs or contractor PHI terms could create compliance exposure.
        evidence_gaps:
          - Material contracts schedule, payer/provider agreements, advocate agreements, BAAs, vendor/subprocessor
            agreements and financing/investor-rights documents.
        follow_up_questions:
          - Provide all material contracts, including payer/provider, advocate, technology, BAA/subprocessor,
            debt/financing and investor-rights agreements.
        table_ids:
          - T-018
          - T-019
        figure_ids: []
        evidence_claim_ids:
          - EC-011
          - EC-013
          - EC-023
          - EC-027
          - EC-028
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No specific regulatory agency problem was verified in public sources, but Medicare billing, HIPAA/PHI, referral
          compliance and advocate licensure/scope require specialized review.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: CMS navigation-related code context creates both opportunity and audit risk.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-001
          - finding_id: VIII.G-F2
            finding: HIPAA Notice confirms PHI obligations but not control maturity or breach history.
            evidence_claim_ids:
              - EC-016
              - EC-023
            risk_ids:
              - R-004
          - finding_id: VIII.G-F3
            finding: Provider referrals and payer partnerships require healthcare regulatory counsel review.
            evidence_claim_ids:
              - EC-010
              - EC-027
            risk_ids:
              - R-010
        hidden_risks:
          - An OCR/CMS/OIG/FTC/state AG issue may not be visible in company marketing pages.
          - Billing-code misuse or insufficient documentation could trigger refunds or penalties.
        evidence_gaps:
          - OCR breach portal check, CMS/OIG/FTC/state AG searches, payer audit history, billing compliance audit, HIPAA
            risk assessment and counsel memos.
        follow_up_questions:
          - Have healthcare regulatory counsel review billing, referrals, payer contracts, HIPAA/privacy/security,
            licensure/scope and any agency correspondence.
        table_ids:
          - T-017
          - T-020
        figure_ids:
          - F-009
          - F-010
        evidence_claim_ids:
          - EC-015
          - EC-016
          - EC-022
          - EC-023
          - EC-027
