risk_register:
  - risk_id: R-001
    risk_title: Consumer-credit cycle and loss volatility
    risk_category: financial
    severity: high
    likelihood: medium
    description: Upgrade’s core economics depend on underwriting, funding costs, charge-offs and consumer repayment behavior across personal loans, cards, BNPL, auto and home-improvement finance.
    impacted_chapter_ids:
      - I
      - II
    impacted_section_ids:
      - I.A
      - I.B
      - II.A
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-009
      - EC-015
    mitigation_or_diligence_request: Request vintages, delinquency/charge-off curves, FICO and income bands, loan-sale/securitization economics, CECL/provision policy and stress tests.
  - risk_id: R-002
    risk_title: Bank-partner and state-regulatory dependency
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Upgrade is not a bank and depends on bank partners and state licenses for regulated credit, card and deposit products.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.B
      - III.E
      - VIII.G
    evidence_claim_ids:
      - EC-012
      - EC-014
      - EC-021
      - EC-022
    mitigation_or_diligence_request: Review bank-program agreements, compliance SLAs, state licenses, NMLS records, fair-lending testing, complaints, exam findings and partner termination rights.
  - risk_id: R-003
    risk_title: Complaint and reputational quality signals need normalization
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: Trustpilot and app ratings are positive, but CFPB complaints are sizable and concentrated in credit reporting, debt collection, loan, checking and card issues.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.A
      - VIII.G
    evidence_claim_ids:
      - EC-013
      - EC-014
    mitigation_or_diligence_request: Normalize complaints per active account/origination, review complaint root causes, remediation, regulator correspondence, and review-platform manipulation controls.
  - risk_id: R-004
    risk_title: Capital-markets and securitization funding exposure
    risk_category: financing
    severity: high
    likelihood: medium
    description: SEC ABS-15G filings and lending scale imply material reliance on asset-backed/whole-loan funding, which can tighten in stressed markets.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - I.D
      - VIII.F
    evidence_claim_ids:
      - EC-015
      - EC-003
      - EC-004
    mitigation_or_diligence_request: Request warehouse lines, securitization documents, investor concentration, covenants, trigger events, unused capacity, and contingency funding plan.
  - risk_id: R-005
    risk_title: Customer concentration and cohort retention are not public
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Public sources show millions of customers but do not disclose active customers, repeat use, revenue by product/customer, or concentration in strategic partners.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-006
      - EC-013
      - EC-024
    mitigation_or_diligence_request: Request active-customer cohorts, LTV/CAC, churn/repeat-rate tables, top partner/customer revenue, product cross-sell, and complaint/retention data.
  - risk_id: R-006
    risk_title: Uplift/Flex Pay integration and partner-channel execution
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Flex Pay adds travel and merchant distribution but depends on partner integrations and BNPL economics that may differ from core lending.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VI
    impacted_section_ids:
      - II.A
      - III.B
      - V.C
      - VI.B
    evidence_claim_ids:
      - EC-011
      - EC-019
    mitigation_or_diligence_request: Review Uplift integration plan, partner contracts, gross merchandise volume, approval rates, merchant fees, fraud/loss metrics, and retention of acquired employees/partners.
  - risk_id: R-007
    risk_title: Crowded digital-lending and neobank competition
    risk_category: market
    severity: medium
    likelihood: high
    description: Upgrade competes with well-funded public and private lenders, banks, credit unions and marketplace lenders with overlapping personal-loan and banking products.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-020
    mitigation_or_diligence_request: Benchmark pricing, approval rates, funding costs, CAC, brand conversion, customer mix, and product attach rates against public and private peers.
  - risk_id: R-008
    risk_title: Security, privacy and data-governance exposure
    risk_category: technical
    severity: high
    likelihood: medium
    description: Upgrade handles credit, banking and consumer data; public security/privacy pages are insufficient to verify control maturity or incident history.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-018
      - EC-022
    mitigation_or_diligence_request: Request SOC 2, penetration tests, incident register, GLBA/privacy program, vendor inventory, data-flow maps, model governance and security roadmap.
  - risk_id: R-009
    risk_title: Private financials and cap table limit valuation diligence
    risk_category: financial
    severity: high
    likelihood: high
    description: Public reporting supports valuation and scale, but audited financials, cap table, liquidation preferences, debt terms and option overhang are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-007
      - EC-024
    mitigation_or_diligence_request: Request audited financials, management accounts, full cap table, option/warrant schedule, debt instruments, tax positions and financing docs.
  - risk_id: R-010
    risk_title: Leadership retention and IPO-readiness pressure
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public sources show experienced leadership and IPO intent, but compensation, succession, turnover and equity-liquidity plans are not disclosed.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.C
      - VII.D
      - VII.E
      - VII.G
    evidence_claim_ids:
      - EC-002
      - EC-016
      - EC-017
    mitigation_or_diligence_request: Review executive agreements, equity plans, retention grants, succession plans, employee survey data, attrition by function and IPO-readiness roadmap.
  - risk_id: R-011
    risk_title: Legal/IP/contract visibility gap
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public research did not provide complete litigation dockets, formal trademark/patent status, insurance coverage, or material contract terms.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
      - VIII.F
    evidence_claim_ids:
      - EC-023
      - EC-024
    mitigation_or_diligence_request: Request litigation schedule, PACER/state docket searches, IP register, invention assignments, insurance certificates, bank/merchant/vendor contracts and counsel letter.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts and product-level P&L.
    why_it_matters: Needed to verify revenue quality, cash flow and profitability claims.
    suggested_source_or_request: Company CFO / audit firm data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Full cap table, liquidation preferences, option/warrant/debt schedules.
    why_it_matters: Determines valuation economics and dilution.
    suggested_source_or_request: Corporate counsel and latest financing docs.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.D
    missing_information: Warehouse, securitization and whole-loan sale agreements plus pool performance.
    why_it_matters: Funding and credit risk drive fintech resilience.
    suggested_source_or_request: Treasury/capital markets data room.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product-level CAC, approval rates, loss curves, contribution margin and roadmap.
    why_it_matters: Product breadth may hide uneven economics.
    suggested_source_or_request: Product, risk and finance leaders.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, partner, channel and product; top >5% concentrations.
    why_it_matters: Public cumulative-customer metrics do not reveal concentration.
    suggested_source_or_request: Revenue analytics and partner management.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Top vendor/supplier spend, bank contingency plans and critical vendor SLAs.
    why_it_matters: Partner and supplier dependencies can halt regulated products.
    suggested_source_or_request: Vendor-risk management and legal.
    priority: high
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Competitive CAC, market share, pricing elasticity and approval-rate benchmarks.
    why_it_matters: Competition can pressure margins and growth.
    suggested_source_or_request: Management analytics and third-party market data.
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quotas, pipeline conversion, sales cycle and productivity.
    why_it_matters: Public hiring does not prove scalable GTM.
    suggested_source_or_request: Sales operations and finance.
    priority: medium
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture diagrams, model inventory, fair-lending validation, SOC reports and incidents.
    why_it_matters: Fintech technical/control failures can create regulatory and credit losses.
    suggested_source_or_request: CTO/CISO/CRO data room.
    priority: high
  - gap_id: G-010
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, R&D cost, launch governance and post-launch monitoring.
    why_it_matters: New products add risk and capital needs.
    suggested_source_or_request: Product and engineering leadership.
    priority: medium
  - gap_id: G-011
    chapter_id: VII
    section_id: VII.B
    missing_information: Historical/projected headcount by function/location and attrition.
    why_it_matters: Hiring signals need context for scalability and retention.
    suggested_source_or_request: HRIS exports and workforce plan.
    priority: medium
  - gap_id: G-012
    chapter_id: VII
    section_id: VII.D
    missing_information: Executive compensation, benefits, employment agreements and equity retention.
    why_it_matters: Retention and change-of-control terms affect execution and deal value.
    suggested_source_or_request: HR/legal data room.
    priority: medium
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation schedule, arbitration inventory, counsel letter and reserves.
    why_it_matters: Public complaint data is not a legal contingency schedule.
    suggested_source_or_request: Company counsel and outside counsel.
    priority: high
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official patent/trademark register, Uplift IP assignments, open-source/SBOM.
    why_it_matters: Formal IP rights and software license compliance are unverified.
    suggested_source_or_request: IP counsel and engineering.
    priority: medium
  - gap_id: G-015
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulator exam findings, state license good standing, bank partner audits and remediation logs.
    why_it_matters: Bank-partner fintechs face material compliance risk.
    suggested_source_or_request: Compliance counsel, NMLS/state regulators, bank partners.
    priority: high
  - gap_id: G-016
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance schedule, limits, retentions, exclusions and claims history.
    why_it_matters: Insurance mitigates cyber, D&O, E&O, EPLI and credit-servicing exposures.
    suggested_source_or_request: Risk management and broker.
    priority: medium
