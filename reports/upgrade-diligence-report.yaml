report_metadata:
  report_title: Upgrade Startup Diligence Research Report
  target_company: Upgrade
  website: https://www.upgrade.com/
  known_aliases:
    - Upgrade, Inc.
    - Upgrade Loans
    - Upgrade Loans Inc.
    - Universal Credit
    - Flex Pay
    - Uplift (acquired/rebranded Flex Pay product)
  sector: Financial Services / consumer fintech / digital lending and neobanking
  geography: United States; headquarters in San Francisco, California
  company_stage: Private unicorn / late-stage venture-backed fintech
  research_date: 2026-06-14
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company-owned sources including product, press, team, bank-partner, security, privacy, license and career pages.
    - Independent news sources for financing, valuation, performance and M&A claims.
    - Regulatory/public records including SEC EDGAR and CFPB complaint database.
    - Review/app-market sources for customer-sentiment signals.
    - Competitor product pages and public filings for market context.
  included_jurisdictions:
    - United States federal sources
    - California / Delaware corporate context where public
    - State licensing signals via company/NMLS disclosure
    - Canada noted only as public Montréal engineering-center footprint
  excluded_topics:
    - Non-public bank partner exams, confidential supervisory information and private data-room records.
    - Paid databases and paywalled/private records not accessible from public web.
    - Personal private contact details and non-public personal information.
  user_provided_materials:
    - material_id: UPG-MAT-001
      title: CB Insights Global Unicorn Club extract for Upgrade from task context
      type: user_provided_document
      date_received: 2026-06-14
      notes: Used only as unicorn-status/valuation source and cross-checked with public evidence where possible.
