          - Single or limited bank-partner reliance can create business-continuity and regulatory risk.
        evidence_gaps:
          - Supplier spend, vendor contracts, cloud providers, critical systems, and backup plans are not public.
        follow_up_questions:
          - Provide top suppliers, spend, SLAs, exit plans, SOC reports, bank contingency plan and vendor-risk ratings.
        table_ids:
          - T-008
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-009
          - EC-012
          - EC-018
          - EC-024
  - chapter_id: IV
    title: Competition
    chapter_summary: Upgrade competes in a highly competitive digital lending, card, BNPL and neobank market. Public competitor terms show broad product overlap and pricing pressure.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-020
    risk_ids:
      - R-007
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public competitor sources and LendingClub’s 10-K confirm strong competition from banks, credit unions, finance companies and online/marketplace lenders.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: IV.A-F1
            finding: SoFi, LendingClub, Upstart and Avant all advertise overlapping personal-loan offers.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-007
          - finding_id: IV.A-F2
            finding: LendingClub’s public filing calls financial services highly competitive, rapidly changing and heavily regulated.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-007
        hidden_risks:
          - Pricing pressure could compress net interest margins and increase CAC, especially as competitors advertise low headline APRs.
        evidence_gaps:
          - No market-share, CAC, ad-spend, approval-rate or loss-rate benchmark database was accessed.
        follow_up_questions:
          - Provide competitive win/loss, pricing elasticity, channel CAC, market-share by product, and cohort profitability versus peers.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-020
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: "Upgrade’s public GTM is multi-channel: direct digital, partner banks, app stores, travel BNPL, contractors, dealers and financial institutions. Channel economics and sales productivity are private."
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-006
      - EC-011
