        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Public signals include state licenses/NMLS disclosure, bank partner model, SEC ABS-15G filings, CFPB complaint volume and privacy/security disclosures. No definitive public enforcement action was identified, but search was incomplete.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: CFPB complaint count is material but complaints are allegations and mostly timely responded.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-003
              - R-002
          - finding_id: VIII.G-F2
            finding: "Upgrade discloses NMLS #1548935, state licenses and bank partners; regulator good standing and exam findings need direct verification."
            evidence_claim_ids:
              - EC-012
              - EC-021
            risk_ids:
              - R-002
          - finding_id: VIII.G-F3
            finding: SEC ABS-15G filings show regulatory disclosure obligations related to asset-backed securitization.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-004
        hidden_risks:
          - Regulatory inquiries, fair-lending issues, UDAAP, privacy, bank-partner oversight, and licensing lapses may not be fully visible publicly.
        evidence_gaps:
          - Regulatory exam reports, enforcement inquiries, bank partner audit findings, NMLS direct records, FTC/state AG searches and remediation logs are not public.
        follow_up_questions:
          - Counsel to run federal/state enforcement searches; request compliance management system, fair-lending tests, exam findings, complaints and remediation plans.
        table_ids:
          - T-021
          - T-018
          - T-019
          - T-020
        figure_ids:
          - F-010
          - F-011
        evidence_claim_ids:
          - EC-012
