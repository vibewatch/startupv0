            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-006
        hidden_risks:
          - Loss of bank partners or embedded distribution partners could be material and may not be publicly disclosed promptly.
        evidence_gaps:
          - Partner churn, terminated bank programs, merchant losses and supplier terminations are not public.
        follow_up_questions:
          - Provide schedule of relationships severed, non-renewed or renegotiated in the last 24 months and related revenue/volume impact.
        table_ids:
          - T-007
          - T-008
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-019
          - EC-024
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Bank partners and Visa are publicly visible dependencies; cloud, core systems, model vendors and supplier spend are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Bank partners are the most obvious publicly disclosed supplier/dependency category.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
          - finding_id: III.E-F2
            finding: Technology and vendor dependencies require data-room review despite public security policy.
            evidence_claim_ids:
              - EC-018
              - EC-024
            risk_ids:
              - R-008
