executive_summary:
  overall_assessment: "Eligible for diligence: public evidence supports Upgrade as an active, private late-stage U.S. consumer fintech with a $7.3B 2025 valuation, broad product suite, bank-partner model and significant public complaint/regulatory diligence needs."
  investment_or_diligence_thesis: Upgrade appears to have meaningful scale, multi-product distribution and investor backing, but investment-grade underwriting depends on private verification of credit performance, funding/cap table terms, bank-partner compliance, cohort economics and legal/regulatory exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Active private-company eligibility is supported by 2025 financing, 2026 active product/career footprint and IPO-not-yet-public language.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-003
      summary: Product suite breadth is verified across company pages and press.
      evidence_claim_ids:
        - EC-006
        - EC-008
        - EC-009
        - EC-010
        - EC-011
    - founder_claim_id: FC-006
      summary: Bank-partner/nonbank model is clearly disclosed.
      evidence_claim_ids:
        - EC-012
        - EC-021
  biggest_risks:
    - risk_id: R-009
      summary: Private financials/cap table limit valuation diligence.
    - risk_id: R-002
      summary: Bank-partner and state-regulatory dependency is central to the business model.
    - risk_id: R-001
      summary: Consumer-credit cycle, loss and funding-cost volatility can materially affect economics.
  key_evidence_gaps:
    - Audited financials, cap table, debt/ABS and warehouse terms.
    - Loan tapes, loss curves, active-customer cohorts and product-level P&L.
    - Bank-program agreements, regulator correspondence, licenses and complaint remediation.
    - Partner/customer concentration and material contracts.
    - Litigation schedule, IP register, insurance and HR/compensation records.
  recommended_next_steps:
    - Run financial/credit quality-of-earnings using loan tapes and audited accounts.
    - Conduct bank-partner, licensing, complaints and fair-lending compliance diligence with counsel.
    - Review funding, securitization and cap-table documents before relying on valuation.
    - Normalize review and CFPB complaint signals per active customer and product volume.
    - Complete legal/IP/HR/insurance data-room review before investment decision.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources support late-stage financing, $7.3B valuation, large cumulative credit volume and CEO-reported cash-flow/revenue claims, but audited statements, cap table, debt terms and credit performance remain private.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-015
      - EC-024
    risk_ids:
      - R-001
      - R-004
      - R-009
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements were public; independent reporting and company press provide revenue/run-rate, cash-flow and cumulative credit signals that require quality-of-earnings verification.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: CNBC reported annualized revenue passed $1B in May 2025 and CEO said the company had been cash-flow positive for three years.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-001
              - R-009
          - finding_id: I.A-F2
            finding: Company press disclosed $42B+ cumulative credit to 7.5M+ customers, but active-customer and loan-performance definitions are not public.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Credit losses, funding costs and revenue recognition can materially change profitability quality.
        evidence_gaps:
          - Audited income statements, balance sheets, cash-flow statements, footnotes, management reports, AR aging, backlog and product/channel gross profit are not public.
        follow_up_questions:
          - Provide audited financial statements, monthly management accounts, product P&L, loan tapes, AR aging, tax positions and actual-vs-plan analysis.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-007
          - EC-024
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources point to growth drivers—multi-product expansion, channel partners and IPO ambition—but detailed projections and scenario assumptions are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: CNBC said Upgrade was looking toward an IPO but wanted balance-sheet and employee-liquidity capital first.
            evidence_claim_ids:
              - EC-002
              - EC-007
            risk_ids:
              - R-010
              - R-009
          - finding_id: I.B-F2
            finding: Product expansion into Flex Pay, home improvement and auto creates additional growth drivers and underwriting complexity.
            evidence_claim_ids:
              - EC-011
              - EC-019
            risk_ids:
              - R-006
              - R-001
        hidden_risks:
          - IPO timing could pressure growth, controls and employee liquidity expectations.
        evidence_gaps:
          - No board-approved three-year projections, capital expenditure plan, warehouse funding forecast, sensitivity cases or pricing assumptions were public.
        follow_up_questions:
          - Provide three-year projections, stress cases, IPO-readiness roadmap, credit-cycle downside plan, and financing assumptions.
        table_ids:
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-007
          - EC-011
          - EC-019
          - EC-024
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify investors and valuation events but not share counts, option overhang, liquidation preferences, warrants, debt instruments or off-balance-sheet liabilities.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights and 2025/2021 reporting support late-stage private valuation, while cap-table mechanics are not public.
            evidence_claim_ids:
              - EC-001
              - EC-003
              - EC-004
            risk_ids:
              - R-009
          - finding_id: I.C-F2
            finding: SEC ABS-15G filings suggest capital-markets/ABS activity relevant to debt and off-balance-sheet diligence.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-004
        hidden_risks:
          - Liquidation preferences and debt/warehouse covenants may materially affect common-equity value.
        evidence_gaps:
          - Current shares, stockholders, option/warrant schedules, debt instruments, bank lines and off-balance-sheet exposures are not public.
        follow_up_questions:
          - Provide full cap table, equity plan, investor rights, option/warrant schedules, debt/warehouse agreements, ABS residual exposures and covenant compliance.
        table_ids:
          - T-002
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-015
          - EC-024
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public funding history is reasonably triangulated from 2020 onward, but tax positions, accounting policies, debt schedules and full financing terms are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Public financing anchors include $40M Series D at $1B, $280M Series F at $6.28B and $165M Series G preferred with a $7.3B valuation.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-005
            risk_ids:
              - R-009
              - R-004
          - finding_id: I.D-F2
            finding: SEC filings provide public ABS-15G disclosure history but not complete debt/funding economics.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-004
        hidden_risks:
          - Debt and securitization triggers could tighten liquidity in a credit downturn.
        evidence_gaps:
          - Tax positions, NOLs, revenue recognition, financing history before 2020 and current basis for each round are not fully public.
        follow_up_questions:
          - Provide tax schedules, accounting policies, full financing ledger, debt/ABS agreements and investor-basis records.
        table_ids:
          - T-001
          - T-002
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-005
          - EC-015
          - EC-024
  - chapter_id: II
    title: Products
    chapter_summary: Upgrade publicly offers a broad consumer-finance suite spanning loans, cards, mobile banking, BNPL, home-improvement finance and auto finance/refinance. Product breadth is a strength but expands underwriting, partner and compliance risk.
    founder_claim_ids:
      - FC-003
      - FC-006
    evidence_claim_ids:
      - EC-006
      - EC-008
      - EC-009
      - EC-010
      - EC-011
      - EC-012
      - EC-019
    risk_ids:
      - R-001
      - R-002
      - R-006
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public product pages verify multiple active SKUs and pricing disclosures. Product-level growth, cost structure, profitability, market share and technology roadmap remain private.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Core products include personal loans, cards, mobile banking, BNPL, home-improvement financing and auto financing.
            evidence_claim_ids:
              - EC-006
              - EC-008
              - EC-009
              - EC-010
              - EC-011
            risk_ids:
              - R-001
              - R-006
          - finding_id: II.A-F2
            finding: Regulated credit/deposit delivery depends on bank partners; Upgrade publicly states it is not a bank.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
        hidden_risks:
          - Product proliferation can hide uneven profitability, risk performance, and compliance debt by SKU.
        evidence_gaps:
          - Market share, product-level cohort growth, CAC, contribution margin, approval/denial data and roadmap dates are not public.
        follow_up_questions:
          - Provide product P&Ls, roadmap, launch-gate documents, credit policy by product, technology architecture, and compliance testing by SKU.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-006
          - EC-008
          - EC-009
          - EC-010
          - EC-011
          - EC-012
          - EC-019
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public data show large cumulative customer reach, strong review signals and embedded partner channels, but top customers/partners, revenue concentration, churn and supplier spend are not public.
    founder_claim_ids:
      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-006
      - EC-011
      - EC-012
      - EC-013
      - EC-014
      - EC-019
      - EC-024
    risk_ids:
      - R-002
      - R-003
      - R-005
      - R-006
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Upgrade is primarily a consumer platform; public sources disclose cumulative customers and app/review signals, not top 15 customers by revenue or application.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Company press disclosed 7.5M+ customers and $42B+ cumulative credit.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-005
          - finding_id: III.A-F2
            finding: Google Play and Trustpilot show positive public sentiment, but reviews are subjective and not retention data.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-003
        hidden_risks:
          - A large cumulative base can mask low active usage, high churn or concentrated partner-originated volume.
        evidence_gaps:
          - Top customers by application, timing of purchases, active accounts and customer-level revenue are not public.
        follow_up_questions:
          - Provide top customer/application tables if any B2B/partner revenue exists, active customer cohorts, repeat-rate and product attach.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-006
          - EC-013
          - EC-024
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Bank partners, Expedia/Flex Pay, travel brands, contractors and dealers are visible strategic channels; revenue contribution and contracts are private.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: III.B-F1
            finding: Upgrade identifies Cross River, Blue Ridge and Celtic as bank partners for regulated products.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
          - finding_id: III.B-F2
            finding: Uplift/Flex Pay and Expedia add embedded travel distribution.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-006
        hidden_risks:
          - Termination, compliance failures or adverse economics in a major partner channel could disrupt growth.
        evidence_gaps:
          - Revenue contribution, economics, term, exclusivity and termination rights for strategic partners are not public.
        follow_up_questions:
          - Provide all bank, merchant, contractor, dealer and travel-partner agreements plus top partner concentration.
        table_ids:
          - T-007
        figure_ids:
          - F-004
          - F-006
        evidence_claim_ids:
          - EC-011
          - EC-012
          - EC-019
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer or partner is not publicly disclosed. Public evidence supports large cumulative consumer scale but not concentration or 5% customer exposure.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Top-customer revenue and partner-level concentration are not publicly available.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-005
          - finding_id: III.C-F2
            finding: Partner channels such as Expedia, contractors and dealers warrant concentration analysis.
            evidence_claim_ids:
              - EC-011
              - EC-019
            risk_ids:
              - R-006
              - R-005
        hidden_risks:
          - Embedded channels may create partner concentration not apparent from consumer counts.
        evidence_gaps:
          - Revenue by customer/partner/product/channel and any >5% concentration are private.
        follow_up_questions:
          - Provide revenue by product, partner, channel, geography, cohort and any customer/partner accounting for 5%+ of revenue.
        table_ids:
          - T-006
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-011
          - EC-019
          - EC-024
      - section_id: III.D
