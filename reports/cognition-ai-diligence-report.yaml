report_metadata:
  report_title: Cognition AI Startup Diligence Report
  target_company: Cognition AI
  website: https://cognition.ai/
  known_aliases:
    - Cognition
    - Cognition Labs
    - Devin
  sector: Artificial intelligence, software engineering agents and developer tools
  geography: United States / San Francisco with remote enterprise software footprint
  company_stage: Private unicorn / high-growth AI software company
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list and selected this target from public unicorn-list candidates.
    - Prioritized public company-owned sources, CB Insights, investor/news sources and search-result excerpts where direct pages were inaccessible.
    - Treated company-authored claims as evidence of public statements, not as independent proof of performance.
    - Public sources include company product pages and TechCrunch/Bloomberg-reported financing coverage; private contracts, security reports and model-risk artifacts were unavailable.
  included_jurisdictions:
    - United States
    - United States where public investors, customers, platforms or counterparties may create diligence relevance
    - Other operating/customer jurisdictions referenced by public materials
  excluded_topics:
    - Private financial statements, cap table, debt, customer contracts, employee records, security reports, board materials and non-public legal correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-20
      notes: No pitch deck, financial model, data room or founder responses were provided.
