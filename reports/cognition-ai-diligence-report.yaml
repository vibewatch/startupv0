executive_summary:
  overall_assessment: Cognition AI is a credible, high-profile AI software-engineering unicorn with strong valuation and product-positioning signals, but public evidence is much thinner than the valuation implies. The diligence center of gravity is revenue quality, customer repeatability, security controls for source-code access, and durable technical differentiation.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. Public sources support unicorn status, Devin capability claims and a named enterprise use case; investment reliance requires private financial, customer, security, legal and technical validation.
  strongest_verified_claims:
    - founder_claim_id: FC-COG-001
      summary: CB Insights lists Cognition AI at $9.8B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-COG-002
      summary: Cognition publicly describes Devin as an autonomous software-engineering agent.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-COG-003
      summary: The Devin launch blog reports a measurable SWE-bench result.
      evidence_claim_ids: *a3
    - founder_claim_id: FC-COG-004
      summary: A Nubank case study provides a named customer proof point.
      evidence_claim_ids: *a4
  biggest_risks:
    - risk_id: R-COG-001
      summary: Revenue quality and burn are private
    - risk_id: R-COG-002
      summary: Valuation/cap-table opacity
    - risk_id: R-COG-003
      summary: Customer concentration and repeatability unknown
    - risk_id: R-COG-004
      summary: Competitive pressure in AI coding agents
  key_evidence_gaps:
    - Audited financials, ARR, burn, runway and cap table.
    - Top-customer ARR, retention, ACV, NRR/GRR and renewal data.
    - Security architecture, SOC reports, data retention, incident logs and subprocessors.
    - Independent benchmark reproduction and production reliability metrics.
    - Leadership roster, board, hiring plan and retention data.
  recommended_next_steps:
    - Start with security and data-access diligence because Devin touches code and tools.
    - Reconcile valuation with cap table, preferences, cash, burn and ARR quality.
    - Conduct customer references and technical bakeoffs against coding-agent alternatives.
