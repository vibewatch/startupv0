  - figure_id: F-011
    title: Gousto public-source risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Risk heatmap spanning the full risk register.
    purpose: Provide a compact public-source summary of where the main diligence issues cluster.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Opaque audited economics and unit margins
          severity: high
          likelihood: high
          rationale: Public evidence points to profitability improvement, but audited revenue, gross margin, burn, working capital and cash runway are not disclosed in the accessible source set.
          evidence_claim_ids: &a36
            - EC-003
            - EC-018
          source_ids:
            - SRC-001
            - SRC-010
            - SRC-019
            - SRC-021
            - SRC-022
            - SRC-020
        - risk_id: R-002
          label: Valuation reset and financing complexity
          severity: high
          likelihood: medium
          rationale: Public rounds, a 2023 valuation cut, PSC changes, scheme-of-arrangement filings and recent charges imply non-trivial capital-structure complexity.
          evidence_claim_ids: &a37
            - EC-002
            - EC-012
            - EC-013
            - EC-023
            - EC-024
          source_ids:
            - SRC-014
            - SRC-015
            - SRC-016
            - SRC-017
            - SRC-018
            - SRC-009
            - SRC-010
            - SRC-012
            - SRC-013
        - risk_id: R-003
          label: Supply-chain and sourcing dependency
          severity: high
          likelihood: medium
          rationale: Gousto sources from more than 48 countries through UK importers and relies on a broad supplier base and multiple fulfilment nodes.
          evidence_claim_ids: &a38
            - EC-008
            - EC-009
          source_ids:
            - SRC-004
            - SRC-008
            - SRC-005
        - risk_id: R-004
          label: Intense competition and substitution risk
          severity: high
          likelihood: high
          rationale: HelloFresh, Green Chef, Mindful Chef and supermarkets all compete for the same dinner wallet with price, convenience and health-positioning claims.
          evidence_claim_ids: &a39
            - EC-007
            - EC-021
            - EC-022
          source_ids:
            - SRC-028
            - SRC-029
            - SRC-001
            - SRC-002
            - SRC-003
            - SRC-021
            - SRC-030
            - SRC-032
        - risk_id: R-005
          label: Promo dependence may obscure true customer economics
          severity: medium
          likelihood: high
          rationale: Large introductory discounts, free first delivery, referral credits and surcharge/Market mechanics create uncertainty around payback and repeat economics.
          evidence_claim_ids: &a40
            - EC-006
            - EC-020
          source_ids:
            - SRC-003
            - SRC-007
        - risk_id: R-006
          label: Fulfilment and workforce execution risk
          severity: high
          likelihood: medium
          rationale: Automation, site expansion, job creation, layoffs and factory closure/redundancy signals suggest execution risk across fulfilment operations and labour planning.
          evidence_claim_ids: &a41
            - EC-009
            - EC-010
            - EC-016
            - EC-017
          source_ids:
            - SRC-005
            - SRC-008
            - SRC-022
            - SRC-025
            - SRC-023
            - SRC-026
        - risk_id: R-007
          label: Product and menu-definition inconsistency
          severity: medium
          likelihood: medium
          rationale: Public pages describe 175+, 207 and 250+ recipes, making it unclear how Gousto defines menu breadth across products and geographies.
