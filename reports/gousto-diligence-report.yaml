diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, KPI dictionary and cash-flow detail for the last three years.
    why_it_matters: Profitability headlines alone are insufficient to judge revenue quality, working capital or runway.
    suggested_source_or_request: Finance data room with audited accounts, monthly board packs and KPI definitions.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, debt instruments, charge documents, option schedule and recap documents.
    why_it_matters: Public funding headlines and charge filings imply value-critical structure complexity.
    suggested_source_or_request: Cap table export, debt agreements, shareholder agreements and documents behind the 2023 scheme/PSC change.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer cohort revenue, retention, churn, order frequency and concentration analysis.
    why_it_matters: The consumer model cannot be underwritten without repeat-rate and segment economics.
    suggested_source_or_request: BI exports of cohorts, churn/reactivation and revenue by segment.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend concentration, SLA/OTIF, food-safety incidents and dual-sourcing coverage.
    why_it_matters: Sourcing from 48+ countries and relying on agency labour creates operational dependency risk.
    suggested_source_or_request: Procurement dashboard, supplier scorecards and continuity plans.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.A
    missing_information: CAC/LTV by channel, promo recovery, referral conversion and channel-level budgets.
    why_it_matters: Large introductory discounts could distort customer economics.
    suggested_source_or_request: GTM operating model and acquisition-efficiency dashboard.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, engineering/data budget, launch criteria and post-launch performance by product initiative.
    why_it_matters: Public product pages show breadth but not R&D discipline or development ROI.
    suggested_source_or_request: R&D roadmap, project tracker and capex/opex by initiative.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Actual headcount by function/site, regretted attrition, agency/permanent mix and leadership succession plans.
    why_it_matters: Public hiring announcements and redundancy headlines are only partial people signals.
    suggested_source_or_request: HRIS exports, org charts and talent review materials.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, tribunal, insurance and regulator-correlation schedules prepared by counsel/brokers.
    why_it_matters: The public source set cannot conclusively establish a clean legal posture.
    suggested_source_or_request: Counsel memo, broker summary and litigation schedule.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official trademark/patent/license schedule and assignment chain.
    why_it_matters: Website IP language is not enough to assess brand/IP defensibility or assignment hygiene.
    suggested_source_or_request: IP schedule from counsel including registrations, applications and key licenses.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Top supplier, logistics, debt, shareholder and software contracts.
    why_it_matters: Change-of-control, volume, pricing and covenant constraints can be decisive in diligence.
    suggested_source_or_request: Contracts folder with summaries and redline issue list.
    priority: high
