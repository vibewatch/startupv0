              - EC-003
              - EC-018
              - EC-001
            risk_ids:
              - R-001
        hidden_risks:
          - Public profitability headlines could mask margin compression, working-capital strain or one-off benefits not visible in the accessible source set.
        evidence_gaps:
          - Audited income statements, balance sheets, cash flows and monthly management accounts were not accessible in public sources reviewed.
        follow_up_questions:
          - Provide the last three years of audited and monthly management accounts, plus product/channel/geography revenue bridges and AR aging.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids: *a1
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public forecast model, capex plan or scenario deck was found. Public sources only show high-level growth intent and profitability claims.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
