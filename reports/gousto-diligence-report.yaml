          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public research verifies the legal entity, directors, funding rounds, a 2023 PSC/structure change and recent charges, but not the full cap table or debt terms.
        verification_status: partially_verified
        confidence: high
