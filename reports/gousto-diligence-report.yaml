report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: Gousto"
  target_company: Gousto
  website: https://www.gousto.co.uk/
  known_aliases:
    - SCA Investments Limited
    - SCA Investments Holdings Limited
    - Gousto
  sector: Direct-to-consumer meal kits / recipe-box grocery
  geography: United Kingdom and Ireland; HQ in London with fulfilment in Spalding and Warrington
  company_stage: Private unicorn / growth-stage consumer platform
  research_date: 2026-06-17
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: GBP unless otherwise stated
  time_zone: Europe/London
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only
    - Prioritized primary company pages, Companies House records, official company PDFs and current competitor home pages
    - Used Google News RSS metadata for blocked independent-news sources and marked resulting limitations explicitly
    - Facts unavailable in public sources are marked not_publicly_verifiable rather than inferred
  included_jurisdictions:
    - United Kingdom
    - Ireland
  excluded_topics:
    - Non-public data room materials
    - Customer or supplier reference calls
    - Counsel work product
    - Paid database exports
    - Personal data beyond public professional/company records
  user_provided_materials: []
