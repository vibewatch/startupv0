executive_summary:
  overall_assessment: Gousto is publicly supportable as an active private UK meal-kit unicorn with continuing operations, a visible multi-site fulfilment footprint and repeated profitability/growth signals, but the public record is still thin on audited economics, customer concentration, debt terms and post-reset governance details.
  investment_or_diligence_thesis: The core diligence question is whether Gousto’s broad menu, automation investments and dinner-brand positioning translate into durable repeat economics and defensible unit margins against HelloFresh, health-led peers and supermarket substitutes.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Gousto remains an active private company and public-unicorn candidate rather than an IPO’d, acquired or shut-down business.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
    - founder_claim_id: FC-002
      summary: Gousto’s core subscription meal-kit proposition, convenience mechanics and product breadth are directly visible on primary pages.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-006
    - founder_claim_id: FC-004
      summary: Gousto publicly discloses a meaningful operational footprint, supplier network and compliance controls.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Opaque audited economics and unit margins
    - risk_id: R-002
      summary: Valuation reset and financing complexity
    - risk_id: R-003
      summary: Supply-chain and sourcing dependency
    - risk_id: R-005
      summary: Promo dependence may obscure true customer economics
    - risk_id: R-008
      summary: Governance and shareholder-alignment risk
  key_evidence_gaps:
    - Audited financial statements, monthly KPI packs, working-capital detail and cash runway
    - Current cap table, debt packages, charge documents and 2023 recap mechanics
    - Customer cohort retention, churn, CAC/LTV and revenue concentration
    - Supplier spend concentration, SLA history, food-safety incidents and contingency plans
    - Full management roster, compensation structures, option plans and counsel-grade legal/IP review
  recommended_next_steps:
    - Open finance, cap-table and debt data rooms before relying on public valuation narratives.
    - Bridge public product and marketing claims to cohort economics, margin and retention data.
    - Visit Spalding and Warrington to validate automation, labour mix, safety and throughput assumptions.
    - Have counsel review the 2023 recap/governance events, recent charges, litigation exposure and IP schedules.
    - Test top supplier resilience and category pricing risk with procurement and operations management.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources verify Gousto’s active private status, funding history and recent filings, but audited statements, detailed revenue quality, debt terms and forecast assumptions remain outside public reach.
