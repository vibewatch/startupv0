      - FC-001
      - FC-003
      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-012
      - EC-013
      - EC-018
      - EC-023
      - EC-024
    risk_ids:
      - R-001
      - R-002
      - R-008
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources provide filing dates and press narratives on profitability and growth, but not the audited financial statements, channel/product revenue splits or receivables schedules that full diligence requires.
        verification_status: partially_verified
        confidence: medium
        key_findings:
