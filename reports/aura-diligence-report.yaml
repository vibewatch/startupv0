executive_summary:
  overall_assessment: "Aura appears eligible for a public-source private-unicorn diligence report: CB Insights lists Aura as a private unicorn and 2025 company evidence shows an active, newly independent Aura raising $140M at a $1.6B valuation after a Pango spin-off. Public evidence supports the business category, product breadth, named investors, founder/leadership, partner channels and app presence. Underwriting remains incomplete because financial statements, cap table, debt terms, retention, customer economics, contracts, security reports, AI validation and counsel/regulatory files are private."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A credible investment case requires proving Aura can sustain high-quality subscription growth and partner economics after Pango separation despite valuation comparability issues, incumbent competition, sensitive-data compliance and product/privacy execution risk.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Target identity at aura.com and founder/CEO Hari Ravichandran are verified publicly.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-007
        - EC-017
    - founder_claim_id: FC-005
      summary: Warburg Pincus and General Catalyst investor status is supported by CB Insights and Aura releases.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
        - EC-005
    - founder_claim_id: FC-003
      summary: Aura publicly offers a broad all-in-one identity, credit, device, privacy and family safety product suite.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-010
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and valuation comparability are the top risk.
    - risk_id: R-002
      summary: Revenue quality and customer economics are unverified.
    - risk_id: R-003
      summary: Sensitive-data, consumer-protection and legal exposure is material.
  key_evidence_gaps:
    - Audited financial statements and ARR bridge
    - Cap table, debt terms and investor rights
    - Pango separation agreement and pro-formas
    - Customer/channel revenue concentration and churn
    - CAC/payback and channel economics
    - Product-level revenue, usage and margin
  recommended_next_steps:
    - Open finance/cap-table diligence before relying on valuation.
    - Run revenue-quality and customer/channel diligence using billing exports and references.
    - Commission privacy/security/AI and child-safety diligence.
    - Have counsel run full litigation/regulatory/IP/insurance review.
    - Complete HR/management diligence focused on post-spin org and retention.
