    risk_category: market
    severity: medium
    likelihood: high
    description: Norton LifeLock, Experian and others overlap with Aura features, pressuring pricing, CAC and retention.
    impacted_chapter_ids:
      - IV
      - II
      - V
    impacted_section_ids:
      - IV.A
      - II.A
      - V.A
    evidence_claim_ids: *a37
