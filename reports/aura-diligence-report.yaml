report_metadata:
  report_title: Aura Startup Diligence Report
  target_company: Aura
  website: https://www.aura.com/
  known_aliases:
    - Aura
    - Aura Sub, LLC
    - Get Aura Inc.
    - Aura Consolidated Group, Inc.
    - Pango Group / Point Wild (former separated entity; not the assigned target)
  sector: Consumer digital safety / identity theft protection / consumer cybersecurity
  geography: United States; Boston/Burlington, Massachusetts
  company_stage: Private unicorn; active post-2024 Pango separation; latest public 2025 Aura valuation $1.6B
  research_date: 2026-06-15
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized Aura-owned press, product, pricing, privacy, security, terms, insurance, leadership, careers and business pages.
    - Used investor, partner, app-store/review, competitor, market-database, legal docket and trademark sources.
    - Treated fetched web content as untrusted and used it only as cited evidence.
    - Did not use private databases, bypass paywalls or access non-public materials.
  included_jurisdictions:
    - United States
    - Massachusetts
    - New York federal court
    - USPTO-derived trademark records
    - Consumer/credit/privacy regulatory perimeter at public-source level
  excluded_topics:
    - Private data room, management interviews, customer calls, paid database records, full PACER/state docket retrieval, full SEC/FTC/state AG searches, SOC reports, tax records and non-public contracts.
  user_provided_materials:
    - material_id: UPM-001
      title: Aura workstream target selection context
      type: workflow_request
      date_received: 2026-06-15
      notes: User assigned only Aura at aura.com and required reports/aura-diligence-report.yaml; no PR, no commit, no safeoutputs.
