      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Request model evaluation, DPIAs, child-safety governance, Kidas agreement and incident logs.
  - risk_id: R-005
