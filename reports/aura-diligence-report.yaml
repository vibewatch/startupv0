risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation comparability
    risk_category: financial
    severity: high
    likelihood: high
    description: Audited financials, debt terms, cap table, runway and current valuation support are private; 2021 $2.5B combined context is not like-for-like with 2025 $1.6B Aura-only valuation.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Request audited financials, ARR bridge, cap table, 409A, debt and financing documents.
  - risk_id: R-002
    risk_title: Revenue quality, customer economics and churn are opaque
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public app/review signals do not show paid users, churn, NRR, refunds, CAC or channel concentration.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - III.C
      - V.A
      - V.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request billing cohorts, churn/NRR, refunds, CAC/payback and customer/channel concentration.
  - risk_id: R-003
    risk_title: Sensitive-data, consumer-protection and legal exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Aura handles identity, credit, device and child-safety data; terms include auto-renewal/arbitration; public dockets show accessibility and patent matters.
    impacted_chapter_ids:
      - VIII
      - II
      - III
    impacted_section_ids:
      - VIII.A
      - VIII.G
      - II.A
      - III.A
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Run privacy/security/legal diligence, counsel searches, complaint-log review and ad-claims review.
  - risk_id: R-004
    risk_title: AI/child-safety product efficacy and privacy risk
    risk_category: product
    severity: high
    likelihood: medium
    description: Aura markets AI-powered family safety and Kidas voice/text analysis without public validation of accuracy, privacy safeguards or clinical claims.
