executive_summary:
  overall_assessment: Cribl appears to be an active private enterprise software unicorn with strong public evidence for a 2024 Series E, over $100M ARR, large-enterprise adoption, product breadth and named customer logos. Public evidence still leaves audited financials, cohort quality, customer concentration, security artifacts, legal matters and cap-table terms unresolved.
  investment_or_diligence_thesis: Proceed to confirmatory software/SaaS diligence focused on ARR quality, NDR cohort durability, gross margin, consumption pricing exposure, data-security posture, enterprise contract terms and competitive displacement against incumbent observability/security platforms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support Cribl's private-unicorn screening status at $3.5B.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-012
    - founder_claim_id: FC-002
      summary: Company-owned sources support active product positioning in Telemetry data management, observability pipeline, security data infrastructure and AI platform for telemetry.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-005
      summary: Public team or technical signals are consistent with an active operating company.
      evidence_claim_ids:
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Revenue concentration and cohort durability are not public despite strong ARR claims
    - risk_id: R-006
      summary: Telemetry/security data platform requires strong security, privacy and compliance controls
    - risk_id: R-004
      summary: Highly competitive observability and SIEM-adjacent market with large incumbents
  key_evidence_gaps:
    - Audited financial statements, KPI exports, cash/debt, burn/runway and forecast model.
    - Current cap table, preferences, debt, option pool, securities filings and financing documents.
    - Top-customer or top-partner revenue, contracts, renewals, churn and independent references.
    - CAC, payback, pipeline source mix, sales productivity and pricing/discount waterfall.
    - Legal, security/privacy/safety, IP, supplier and material-contract schedules.
  recommended_next_steps:
    - Run revenue-quality and financial diligence before relying on the public valuation headline.
    - Request customer/partner contracts, cohort metrics and independent reference calls.
    - Have counsel and technical specialists review IP, regulatory, security, safety and material-contract artifacts.
    - Benchmark against direct competitors using buyer interviews, win/loss data and pricing evidence.
