risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation-quality risk
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources verify historical funding and some scale metrics but
      not current revenue, gross margin, burn, cap table, or whether the 2021
      unicorn mark still reflects decision-useful value.
    impacted_chapter_ids:
      - I
      - III
      - VII
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
      - III.C
      - VII.B
    evidence_claim_ids: *a46
    mitigation_or_diligence_request: Request audited FY2024-FY2025 financials, the
      fully diluted cap table, secondary-mark data, and a board-approved
      forecast with sensitivity cases.
  - risk_id: R-002
    risk_title: Regulatory and compliance expansion risk
    risk_category: regulatory
    severity: high
    likelihood: high
    description: The platform now spans ACH, wires, RTP/FedNow, stablecoins,
      KYB/KYC, AML, sanctions, and wallet screening, raising execution and
      supervisory complexity.
    impacted_chapter_ids:
      - II
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - V.A
      - VIII.G
    evidence_claim_ids: *a47
    mitigation_or_diligence_request: Review the compliance operating model, named
      regulated partners, transaction-monitoring outcomes, sanctions procedures,
      and counsel memos on stablecoin workflows.
  - risk_id: R-003
    risk_title: Bank, rail, and provider-dependency risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Modern Treasury's commercial promise depends on integrated PSP and
      bank-partner relationships plus multi-rail availability that are only
      partially visible publicly.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - V.A
      - VIII.F
    evidence_claim_ids: *a48
    mitigation_or_diligence_request: Request partner roster, concentration by
      payment rail, outage history by partner, and contract economics for the
      integrated PSP and bank-partner program.
  - risk_id: R-004
    risk_title: Customer concentration and enterprise-sales risk
    risk_category: commercial
    severity: medium
    likelihood: high
    description: Named customer breadth is strong, but contract values, expansion
      rates, net retention, and dependence on a handful of high-volume fintechs
      remain private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - V.D
    evidence_claim_ids: *a49
    mitigation_or_diligence_request: Request top-10 customer concentration by ARR
      and payment volume, cohort retention, pipeline coverage, and churn/loss
      reasons.
  - risk_id: R-005
    risk_title: Competitive bundling and pricing-pressure risk
    risk_category: market
    severity: medium
    likelihood: high
    description: Peer platforms offer overlapping ledger, payments, accounts, or
      cross-border capabilities, and larger players may bundle adjacent products
      or undercut pricing.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.C
      - V.E
    evidence_claim_ids: *a50
    mitigation_or_diligence_request: Run win-loss analysis, competitive pricing
      grids, and segment-level positioning against the top overlapping ledger
      and embedded-finance vendors.
  - risk_id: R-006
    risk_title: Mission-critical security and reliability risk
    risk_category: technology
    severity: medium
    likelihood: medium
    description: The company publishes a mature control stack and 99.99% uptime
      claim, but as a financial-infrastructure vendor any controls gap or outage
      could create outsized downstream harm.
    impacted_chapter_ids:
      - I
      - VI
      - VIII
    impacted_section_ids:
      - I.A
      - VI.A
      - VIII.G
    evidence_claim_ids: *a51
    mitigation_or_diligence_request: Obtain the latest SOC reports, pentest
      summaries, incident register, uptime history, and root-cause analyses for
      major customer-visible events.
  - risk_id: R-007
    risk_title: Beam integration and stablecoin-roadmap risk
    risk_category: integration
    severity: medium
    likelihood: medium
    description: Beam expands opportunity but adds integration, product-roadmap, and
      regulated-go-to-market complexity that could distract the core
      payments-operations franchise.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a52
    mitigation_or_diligence_request: Request integration milestones, retained
      leadership and engineering roster, acquired-customer overlap, and planned
      deprecation or migration decisions.
  - risk_id: R-008
    risk_title: Organization visibility and talent-concentration risk
    risk_category: people
    severity: medium
    likelihood: medium
