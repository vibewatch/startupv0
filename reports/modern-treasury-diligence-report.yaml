    claim_text: Modern Treasury remains an eligible private unicorn and does not
      appear to have IPO'd or sold itself.
    claim_source: CB Insights unicorn list, company-owned pages, and private-company
      comparison sources
    claim_date: 2026-06-19
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
      - I.C
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-009
      - EC-012
    contradiction_summary: Public sources still show a private-company profile, but
      current ownership and any confidential exit process are not publicly
