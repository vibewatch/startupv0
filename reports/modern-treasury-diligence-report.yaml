report_metadata:
  report_title: Modern Treasury Startup Diligence Report
  target_company: Modern Treasury
  website: https://www.moderntreasury.com/
  known_aliases:
    - Modern Treasury
    - Modern Treasury Corp.
  sector: Payment infrastructure / treasury operations software
  geography: United States; headquartered in San Francisco with product scope
    spanning U.S. and cross-border/stablecoin flows
  company_stage: Private unicorn / late-stage fintech infrastructure
  research_date: 2026-06-19
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company-owned home, about, customers, pricing, security, and press-release
      pages fetched via r.jina.ai
    - Independent triangulation via CB Insights, OpenBankingTracker, and
      DuckDuckGo search-result snippets for valuation, headcount, and
      competitive context
    - No paid database, SOC report, court-docket, lien, or trademark access
    - No customer, bank-partner, vendor, or management interviews
  included_jurisdictions:
    - United States payments, fintech, privacy, and enterprise-software context
    - Cross-border and stablecoin product expansion as described in public
      company materials
  excluded_topics:
    - No private financial statements, cap table, or board materials
    - No counsel-led legal, IP, or regulator-correspondence review
    - No penetration testing or private security-report review
  user_provided_materials: []
founder_claims:
