executive_summary:
  overall_assessment: Modern Treasury clears the public eligibility screen as a
    still-private unicorn with strong product breadth, enterprise customer
    proof, and an unusually mature public security posture, but underwriting
    still hinges on unseen financial quality, customer concentration, partner
    dependency, and regulated-execution depth.
  investment_or_diligence_thesis: Modern Treasury may control a valuable
    infrastructure layer at the intersection of multi-rail payments, ledgering,
    and compliance operations if its integrated API stack truly compounds
    switching costs and margin; public evidence supports category relevance more
    than it supports current revenue quality, retention strength, or valuation
    durability.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Official pages clearly support a single-platform story across payments,
        accounts, ledgering, and stablecoin/compliance functionality.
      evidence_claim_ids:
        - EC-002
        - EC-005
    - founder_claim_id: FC-004
      summary: The official 2021 Series C press release verifies the $85M round and
        >$2B valuation milestone.
      evidence_claim_ids:
        - EC-008
    - founder_claim_id: FC-006
      summary: Modern Treasury publicly claims a mature control posture including PCI
        DSS 4.0, SOC 1/2 Type II, NIST alignment, and detailed security
        controls.
      evidence_claim_ids:
        - EC-006
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Current revenue quality, burn, and cap-table terms are still opaque
        despite visible historical funding and scale claims.
    - risk_id: R-002
      summary: Stablecoin, AML/KYC/KYB, sanctions, and cross-border expansion increase
        regulated-execution complexity.
    - risk_id: R-004
      summary: Public customer breadth is strong, but concentration, retention, and
        enterprise-sales efficiency remain private.
    - risk_id: R-007
      summary: Beam broadens the story but adds integration, compliance, and
        operational execution risk.
  key_evidence_gaps:
    - Audited FY2024-FY2025 financial statements, gross margin, cash bridge, and
      burn profile
    - Current fully diluted cap table, investor rights, and any secondary pricing
    - Customer concentration, net retention, churn, and top-account economics
    - Named bank, PSP, and screening partners plus partner concentration and
      fallback plans
    - Underlying SOC / PCI evidence, incident history, and regulator
      correspondence
    - Current headcount by function and location, turnover, and succession depth
  recommended_next_steps:
    - Run a finance and cap-table data-room review before treating the 2021
      unicorn mark as current decision-useful value.
    - Obtain customer concentration, retention, and pricing-realization data to
      test whether broad product scope converts into durable economics.
    - Review regulated-partner contracts, screening workflows, and stablecoin
      compliance procedures with payments counsel.
    - Inspect the latest SOC, PCI, pentest, and incident materials before
      relying on the public security posture.
    - Review Beam integration milestones, customer migrations, and post-deal
      accountability metrics.
