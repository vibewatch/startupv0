executive_summary:
  overall_assessment: Eligible public-source unicorn target, but high diligence risk.
    Mafengwo appears on CB Insights public unicorn list at $2B dated 2019-05-23, CB
    profile shows Series F | Alive and $488M total raised, and active app/site/2025-2026
    releases support ongoing operations. No reliable public IPO, completed acquisition
    or shutdown evidence was found.
  investment_or_diligence_thesis: Treat the 2019 $2B valuation as an eligibility marker,
    not current value. Proceed only with full financial, cap-table, product, customer,
    technical, privacy and legal diligence.
