risk_register:
  - risk_id: "R-001"
    risk_title: "Financial opacity and unit-economic uncertainty"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Public sources do not disclose revenue, gross margin, cost per pound, cash, burn, debt, or runway, while commercial volumes have been extremely limited."
    impacted_chapter_ids: ["I", "II", "III"]
    impacted_section_ids: ["I.A", "I.B", "II.B", "III.A"]
    evidence_claim_ids: ["EC-005", "EC-013"]
    mitigation_or_diligence_request: "Require audited financials, monthly management accounts, costed bill of materials, batch economics, cash/debt schedule, and runway scenarios before valuation work."
  - risk_id: "R-002"
    risk_title: "Commercialization and demand are not yet proven at repeatable scale"
    risk_category: "customer"
    severity: "high"
    likelihood: "high"
    description: "Bar Crenn availability ended after tiny serving volumes, and the original Filet is not currently available for sale."
    impacted_chapter_ids: ["II", "III", "V"]
    impacted_section_ids: ["II.B", "III.A", "V.A"]
    evidence_claim_ids: ["EC-005", "EC-006"]
    mitigation_or_diligence_request: "Request active customer pipeline, signed purchase orders, partner references, pricing, consumer feedback, repeat-purchase data, and launch calendar."
  - risk_id: "R-003"
    risk_title: "Regulatory and political market-access exposure"
    risk_category: "regulatory"
    severity: "high"
    likelihood: "medium"
    description: "FDA/USDA milestones are material but product/process-specific, and Florida litigation shows state-level bans can restrict market access."
    impacted_chapter_ids: ["II", "V", "VIII"]
    impacted_section_ids: ["II.A", "V.A", "VIII.A", "VIII.D"]
    evidence_claim_ids: ["EC-003", "EC-004", "EC-012", "EC-015"]
    mitigation_or_diligence_request: "Obtain regulatory matrix by product/process/facility, state legislative survey, outside counsel memo, and label/inspection records."
  - risk_id: "R-004"
    risk_title: "Manufacturing scale-up and process reliability risk"
    risk_category: "operational"
    severity: "high"
    likelihood: "high"
    description: "Company-stated capacity and ongoing process-development hiring do not validate actual yield, uptime, contamination rates, or cost at scale."
    impacted_chapter_ids: ["I", "III", "VI", "VII"]
    impacted_section_ids: ["I.A", "III.E", "VI.A", "VII.B"]
    evidence_claim_ids: ["EC-002", "EC-007", "EC-010"]
    mitigation_or_diligence_request: "Review batch records, deviations, yield, utilization, COGS, media supply, equipment reliability, QA/QC systems, and capex plan."
  - risk_id: "R-005"
    risk_title: "Product pivot and approval-scope risk"
    risk_category: "product"
    severity: "medium"
    likelihood: "medium"
    description: "The marketed next-generation product blends cultivated chicken and plant-based protein, while independent reporting said larger-scale products were pending regulatory approval."
    impacted_chapter_ids: ["II", "VI", "VIII"]
    impacted_section_ids: ["II.A", "II.B", "VI.B", "VIII.D"]
    evidence_claim_ids: ["EC-005", "EC-006", "EC-008"]
    mitigation_or_diligence_request: "Validate product roadmap, sensory and nutrition data, label strategy, regulatory scope, partner feedback, and margin targets by SKU."
  - risk_id: "R-006"
    risk_title: "Competitive and sector capital-market pressure"
    risk_category: "market"
    severity: "medium"
    likelihood: "high"
    description: "Cultivated-meat competitors have varied milestones, paused sales, and shutdowns, indicating category volatility and funding pressure."
    impacted_chapter_ids: ["IV"]
    impacted_section_ids: ["IV.A"]
    evidence_claim_ids: ["EC-011"]
    mitigation_or_diligence_request: "Build a primary-source competitor benchmark across cost, regulatory status, product quality, capital raised, and surviving runway."
  - risk_id: "R-007"
    risk_title: "Cap-table, preference-stack, and runway risk"
    risk_category: "financing"
    severity: "high"
    likelihood: "unknown"
    description: "Public sources verify the 2022 Series C but not current financing terms, liquidation preferences, investor rights, debt, or runway."
    impacted_chapter_ids: ["I", "VII"]
    impacted_section_ids: ["I.B", "I.C", "VII.A"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-009", "EC-013"]
    mitigation_or_diligence_request: "Request fully diluted cap table, financing documents, option plan, debt/SAFE/note schedule, board consents, and liquidation waterfall."
  - risk_id: "R-008"
    risk_title: "IP, legal, and food-safety records require counsel review"
    risk_category: "legal"
    severity: "medium"
    likelihood: "medium"
    description: "UPSIDE claims patents and regulatory milestones, but patent assignments, FTO, trade-secret controls, full dockets, and food-safety inspection files are not public."
    impacted_chapter_ids: ["VI", "VIII"]
    impacted_section_ids: ["VI.B", "VIII.A", "VIII.D"]
    evidence_claim_ids: ["EC-012", "EC-013", "EC-014"]
    mitigation_or_diligence_request: "Obtain IP schedule, FTO memo, trade-secret controls, litigation schedule, insurance notices, HACCP/QA records, and regulatory correspondence."

diligence_gaps:
  - gap_id: "G-001"
    chapter_id: "I"
    section_id: "I.A"
    missing_information: "Audited financial statements, monthly management accounts, cash, debt, burn, runway, revenue, gross margin, and cost per pound."
    why_it_matters: "Without these data, valuation and runway cannot be underwritten."
    suggested_source_or_request: "Request CFO data room, board pack, bank statements, debt schedule, and audited/statutory accounts."
    priority: "high"
  - gap_id: "G-002"
    chapter_id: "I"
    section_id: "I.C"
    missing_information: "Fully diluted cap table, liquidation preferences, option pool, investor rights, board rights, and later financing terms."
    why_it_matters: "Security terms and preferences determine common-equity value and financing risk."
    suggested_source_or_request: "Request financing documents, shareholder agreements, option ledger, and waterfall model."
    priority: "high"
  - gap_id: "G-003"
    chapter_id: "II"
    section_id: "II.A"
    missing_information: "Product-by-product regulatory status, SKU roadmap, sensory/nutrition results, shelf life, labeling, and product margin."
    why_it_matters: "Commercial launch depends on approved products that customers want and can buy profitably."
    suggested_source_or_request: "Request product roadmap, regulatory matrix, sensory studies, labels, and COGS by SKU."
    priority: "high"
  - gap_id: "G-004"
    chapter_id: "III"
    section_id: "III.A"
    missing_information: "Current customers, signed LOIs, purchase orders, partner pipeline, pricing, reorders, and customer references."
    why_it_matters: "Public evidence does not prove recurring demand or revenue."
    suggested_source_or_request: "Request top customer schedule, pipeline export, partner contracts, references, and consumer research."
    priority: "high"
  - gap_id: "G-005"
    chapter_id: "III"
    section_id: "III.E"
    missing_information: "Supplier contracts, media sourcing, equipment vendors, alternate sources, vendor quality, and concentration."
    why_it_matters: "Supplier constraints can block scale-up or inflate cost per pound."
    suggested_source_or_request: "Request top vendor list, contracts, quality agreements, supply continuity plans, and COGS bridge."
    priority: "high"
  - gap_id: "G-006"
    chapter_id: "VI"
    section_id: "VI.A"
    missing_information: "Actual batch records, yield, contamination/deviation history, utilization, capex, process-transfer records, and scale-up plan."
    why_it_matters: "Technical feasibility at pilot scale does not establish commercial-scale cost or reliability."
    suggested_source_or_request: "Request MSAT data package, QA/QC records, equipment logs, and external technical diligence session."
    priority: "high"
  - gap_id: "G-007"
    chapter_id: "VII"
    section_id: "VII.A"
    missing_information: "Current executive roster, board roster, turnover since Series C, compensation, retention, and key-person coverage."
    why_it_matters: "Scale-up execution depends on a deep management and technical bench."
    suggested_source_or_request: "Request org chart, board materials, HRIS headcount, attrition, and key employment agreements."
    priority: "medium"
  - gap_id: "G-008"
    chapter_id: "VIII"
    section_id: "VIII.D"
    missing_information: "FDA/USDA correspondence, labels, inspection status, product-change analysis, state legal survey, patent schedule, FTO, and litigation docket."
    why_it_matters: "Regulatory and legal constraints can block or delay market access and product changes."
    suggested_source_or_request: "Request outside counsel memo, regulatory data room, IP schedule, and litigation report."
    priority: "high"

