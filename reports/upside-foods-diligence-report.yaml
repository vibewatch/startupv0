          label: "Commercial availability"
          severity: "high"
          likelihood: "high"
          rationale: "Original product is not currently available and Bar Crenn series ended."
          evidence_claim_ids: ["EC-005", "EC-006"]
          source_ids: ["SRC-005", "SRC-007"]
        - risk_id: "R-003"
          label: "Regulatory and state market access"
          severity: "high"
