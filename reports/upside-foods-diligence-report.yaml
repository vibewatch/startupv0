    spec:
      x_axis:
        label: "likelihood"
        scale: ["low", "medium", "high", "unknown"]
      y_axis:
        label: "severity"
        scale: ["informational", "low", "medium", "high", "critical"]
      risk_points:
        - risk_id: "R-001"
          label: "Financial opacity and unit economics"
