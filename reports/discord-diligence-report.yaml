            finding: Collected sources focus on digital safety/privacy, not environmental or occupational safety liabilities.
            evidence_claim_ids:
              - EC-015
              - EC-023
            risk_ids: []
        hidden_risks:
          - Trust-and-safety and moderation work may carry employee wellbeing risk not visible in product safety
            materials.
          - Office leases, remote work, ergonomic claims, or workers compensation matters may be private.
        evidence_gaps:
          - EHS policies, workers compensation claims, trust-and-safety wellbeing programs, leases, office safety
            records, and insurance coverage.
        follow_up_questions:
          - Provide EHS/employee-safety policies, workers compensation history, trust-and-safety wellbeing controls,
            office lease obligations, and insurance coverage.
        table_ids:
          - T-020
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-015
          - EC-023
      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids:
          - VIII.D
        summary: Public product and policy sources show important copyrights, brands, developer APIs/SDKs, and IP-request
          processes, but the IP portfolio is not fully diligence-verified.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.D-F1
            finding: Transparency Hub covers intellectual-property requests, and Policy Hub includes an Unauthorized Copyright
              Access explainer.
            evidence_claim_ids:
              - EC-016
              - EC-017
            risk_ids:
              - R-010
          - finding_id: VIII.D-F2
            finding: Developer platform and Social SDK materials imply material software, API, brand, and license assets requiring
              ownership and OSS review.
            evidence_claim_ids:
              - EC-010
              - EC-011
            risk_ids:
              - R-008
              - R-010
        hidden_risks:
          - Open-source compliance, third-party SDK licenses, developer terms, brand misuse, copyright moderation, and
            user-generated content create IP exposure.
        evidence_gaps:
          - Patent/trademark schedule, copyright registrations, OSS inventory, inbound/outbound licenses, developer
            terms, IP assignments, DMCA metrics, and infringement disputes.
        follow_up_questions:
          - Provide IP schedule, trademark/patent filings, copyright registrations, OSS/SBOM reports, developer/API
            terms, license agreements, and IP dispute schedule.
        table_ids:
          - T-020
        figure_ids:
          - F-010
          - F-011
        evidence_claim_ids:
          - EC-010
          - EC-011
          - EC-016
          - EC-017
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: Insurance limits and claims history are not public; likely exposure classes include cyber, privacy, media
          liability, D&O, EPLI, and E&O.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.E-F1
            finding: Privacy, vendor, safety, policy, and public-scrutiny evidence indicates categories where insurance should be
              reviewed, but policies are private.
            evidence_claim_ids:
              - EC-015
              - EC-018
              - EC-019
              - EC-020
              - EC-025
            risk_ids:
              - R-004
              - R-005
              - R-011
        hidden_risks:
          - Coverage exclusions or inadequate limits could expose the company to privacy, cyber, safety, media/IP,
            employment, and regulatory defense costs.
        evidence_gaps:
          - Insurance policies, limits, exclusions, claims, notices, retentions, cyber questionnaires, and
            D&O/EPLI/E&O/cyber/media coverage.
        follow_up_questions:
          - Provide insurance schedule, binders, claims/notice history, retentions, exclusions, broker memo, and
            regulatory/cyber coverage analysis.
        table_ids:
          - T-020
          - T-021
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-015
          - EC-018
          - EC-019
          - EC-020
          - EC-025
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material contracts likely include console partners, cloud/payment vendors, ad measurement, developer/API terms,
          and privacy/data-processing agreements; terms are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.F-F1
            finding: Sony, Xbox, PlayStation, Stripe, PayPal, Google, ad platforms, and analytics/measurement partners appear in
              public sources, but contracts are not disclosed.
            evidence_claim_ids:
              - EC-012
              - EC-013
              - EC-014
              - EC-025
            risk_ids:
              - R-006
              - R-011
          - finding_id: VIII.F-F2
            finding: Developer and Social SDK materials imply developer terms, SDK/API terms, and support commitments that require
              legal review.
            evidence_claim_ids:
              - EC-010
              - EC-011
            risk_ids:
              - R-008
              - R-010
        hidden_risks:
          - Termination, exclusivity, data-sharing, IP, platform policy, SLA, indemnity, and minimum-commitment clauses
            can materially affect strategy and cost.
        evidence_gaps:
          - All material contracts, DPAs, console/platform agreements, cloud/payment/ad-measurement agreements,
            developer terms, SLAs, indemnities, and change-of-control clauses.
        follow_up_questions:
          - Provide material contract list with ACV/spend, term, termination, exclusivity, data, IP, SLA, indemnity,
            audit, and change-of-control provisions.
        table_ids:
          - T-020
          - T-021
        figure_ids:
          - F-010
          - F-011
        evidence_claim_ids:
          - EC-010
          - EC-011
          - EC-012
          - EC-013
          - EC-014
          - EC-025
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Discord publishes safety, policy, privacy, DSA, TCO, enforcement, and legal-request materials, but
          teen/privacy/platform scrutiny remains a high diligence priority.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: VIII.G-F1
            finding: Safety Center, Transparency Hub, Policy Hub, and Privacy Policy show public compliance infrastructure and
              policy coverage.
            evidence_claim_ids:
              - EC-015
              - EC-016
              - EC-017
              - EC-018
            risk_ids:
              - R-004
              - R-005
          - finding_id: VIII.G-F2
            finding: FTC sector reporting and a Senate Judiciary hearing with Discord’s then-CEO demonstrate heightened
              social-platform child-safety and privacy scrutiny.
            evidence_claim_ids:
              - EC-019
              - EC-020
            risk_ids:
              - R-004
              - R-005
        hidden_risks:
          - Regulatory expectations can change quickly for teen safety, ads, profiling, encryption, DSA/TCO, data
            transfers, and law-enforcement response.
          - Public policy pages do not prove operational controls or incident response effectiveness.
        evidence_gaps:
          - Regulatory inquiries, audits, DSA/TCO submissions, COPPA/GDPR/CPRA assessments, DPIAs, safety metrics,
            law-enforcement requests, and compliance remediation plans.
        follow_up_questions:
          - Provide regulatory correspondence, audit reports, DPIAs, DSA/TCO reports, COPPA/GDPR/CPRA assessments,
            law-enforcement workflows, safety metrics, and remediation plans.
        table_ids:
          - T-019
          - T-021
        figure_ids:
          - F-010
          - F-011
        evidence_claim_ids:
          - EC-015
          - EC-016
          - EC-017
          - EC-018
          - EC-019
          - EC-020
