    impacted_chapter_ids:
      - VIII
      - II
      - VI
    impacted_section_ids:
      - VIII.D
      - II.A
      - VI.A
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-016
      - EC-017
    mitigation_or_diligence_request: Review IP schedule, OSS/SBOM, developer/API terms, DMCA metrics, license agreements, and dispute history.
  - risk_id: R-011
    risk_title: Vendor, infrastructure, and security dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Public privacy policy names payment processors, Google cloud, ad platforms, and analytics/measurement
      partners, but contracts and architecture are private.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.F
    evidence_claim_ids:
      - EC-018
      - EC-025
    mitigation_or_diligence_request: Review cloud/payment/ad-measurement contracts, DPAs, security audits, incident history,
      SLAs, and business-continuity plans.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, revenue by product, gross margin, cash, debt, and cash burn.
    why_it_matters: Required to underwrite valuation, runway, profitability, and quality of earnings.
    suggested_source_or_request: Company data room; accountant QoE package; board budget materials.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, liquidation preferences, investor rights, and side letters.
    why_it_matters: Preference stack and strategic rights can materially alter exit economics and control.
    suggested_source_or_request: Company counsel; financing documents; investor-rights agreement.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product P&Ls, active user definitions, Nitro/Shop/Quests metrics, and platform reliability.
    why_it_matters: Public product pages do not prove profitable durable monetization or technical quality.
    suggested_source_or_request: Product analytics warehouse; finance model; incident/SLO reports.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue concentration by product, customer, advertiser, geography, and channel.
    why_it_matters: Concentration risk can be hidden in consumer/advertiser businesses.
    suggested_source_or_request: Billing exports, subscription cohorts, ad contracts, customer schedule.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend, contracts, SLAs, DPAs, and incident history for cloud/payment/ad/analytics partners.
    why_it_matters: Vendor concentration affects uptime, cost, privacy, and margin.
    suggested_source_or_request: Procurement/legal data room; vendor risk management files.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Market share, churn, competitive win/loss, and substitution data.
    why_it_matters: Public competitor pages do not quantify defensibility.
    suggested_source_or_request: User surveys, paid market research, cohort churn analysis.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Quests advertiser sales productivity, pipeline, ACV, renewal, and campaign margin.
    why_it_matters: Advertiser GTM may be lumpy or costly despite public case studies.
    suggested_source_or_request: CRM exports, campaign P&Ls, attribution studies, sales-comp plan.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D org chart, roadmap, technical debt, security reviews, and SDK adoption.
    why_it_matters: Developer/platform ambition requires sustained engineering and support capacity.
    suggested_source_or_request: Engineering roadmap, architecture review, SLO/incident dashboards.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, compensation, equity, attrition, and employee relations.
    why_it_matters: People risk is material after a CEO transition and for trust/safety scaling.
    suggested_source_or_request: HRIS export, compensation plans, attrition report, HR legal schedule.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Safety, privacy, DSA/TCO, COPPA/GDPR/CPRA, and ad-targeting controls and audits.
    why_it_matters: Discord is exposed to social-platform regulation and teen-safety scrutiny.
    suggested_source_or_request: Counsel memos, DPIAs, regulatory correspondence, audits, T&S KPIs.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP portfolio, OSS/SBOM, developer/API terms, and IP dispute history.
    why_it_matters: Software, UGC, and developer ecosystem can create hidden IP exposure.
    suggested_source_or_request: IP schedule, OSS scans, developer terms, DMCA metrics, disputes.
    priority: medium
