      hearing involving Discord show elevated regulatory burden.
    diligence_follow_up:
      - Provide safety KPIs, moderation staffing, law-enforcement-response metrics, child-safety audits, DSA/COPPA/GDPR
        assessments, and incident history.
executive_summary:
  overall_assessment: Discord is a scaled late-stage private communications platform with strong public evidence of
    gaming-native reach, consumer monetization surfaces, developer/platform ambition, and strategic console
    relationships. The investability question remains unresolved without private financials, cap table, contracts,
    cohort data, and legal/regulatory materials.
  investment_or_diligence_thesis: "The diligence case is a network-and-platform thesis: Discord’s gamer-heavy social graph
    can monetize through Nitro, paid profile goods, rewarded advertising, developer integrations, and console
    partnerships if privacy/safety execution, platform dependencies, and unit economics scale profitably."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Discord’s gaming-chat origin and founders are verified through the company timeline.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-002
      summary: Discord publicly reports 90M+ DAUs and strong gaming affinity metrics.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: Nitro, Shop/avatar decorations, and Quests verify multiple monetization surfaces.
      evidence_claim_ids:
        - EC-005
        - EC-007
        - EC-008
    - founder_claim_id: FC-005
      summary: Sony, Xbox, and PlayStation sources verify material console partnerships/integrations.
      evidence_claim_ids:
        - EC-012
        - EC-013
        - EC-014
  biggest_risks:
    - risk_id: R-001
      summary: Private financial opacity prevents verification of revenue quality, profitability, cash burn, and valuation
        support.
    - risk_id: R-004
      summary: Privacy, sponsored-content, teen/child-safety, and platform-regulation exposure is material.
    - risk_id: R-005
      summary: Trust-and-safety effectiveness is central but cannot be audited from public program pages alone.
    - risk_id: R-006
      summary: Console, cloud, payment, advertising, and analytics dependencies create contract, platform-policy, and
        data-transfer risk.
  key_evidence_gaps:
    - Audited financial statements, revenue mix, gross margin, cash, debt, and cash burn.
    - Current cap table, liquidation preferences, option pool, strategic-investor rights, and side letters.
    - Customer/advertiser concentration, subscription cohorts, Quests pipeline, campaign economics, and product-level
      P&Ls.
    - Material contracts with Sony/Microsoft/console, cloud, payment, ad, analytics, and developer ecosystem partners.
    - Safety, privacy, DSA/TCO, COPPA/GDPR/CPRA, law-enforcement, and regulatory correspondence/audit materials.
    - Headcount, compensation, equity, attrition, employee-relations, and full org/board data.
  recommended_next_steps:
    - Run financial and QoE diligence before relying on any valuation mark.
    - Review cap table, financing documents, investor rights, option plan, and strategic side letters.
    - Audit product-line unit economics for Nitro, Shop, Quests, developer platform, and console-linked engagement.
    - Conduct privacy, teen-safety, trust-and-safety, DSA/TCO, and advertising compliance diligence with counsel.
    - Review material partner/vendor contracts and technical/security architecture for dependency and data-transfer risk.
    - Interview management, product, trust-and-safety, privacy, finance, major advertisers, developers, and console
      partners.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Discord has strong public evidence of scale, valuation, and monetization surfaces, but audited
      financials, revenue mix, cash burn, debt, and cap-table economics are not public.
    founder_claim_ids:
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-006
      - EC-012
      - EC-023
    risk_ids:
      - R-001
      - R-002
      - R-003
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Discord is private; public sources verify business model surfaces but not historical revenue, margin, cash
          flow, or profitability.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public pages verify subscriptions, paid products, sponsored content, and scale; audited financial statements
              were not located in public sources.
            evidence_claim_ids:
              - EC-003
              - EC-005
              - EC-006
              - EC-023
            risk_ids:
              - R-001
              - R-003
          - finding_id: I.A-F2
            finding: Privacy-policy language confirms the business is funded by subscriptions, paid products, and sponsored content,
              not by selling personal information.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-004
        hidden_risks:
          - Large DAU scale can coexist with weak monetization or heavy safety/infrastructure cost.
          - Sponsored-content growth may increase privacy and brand-safety compliance cost.
        evidence_gaps:
          - Audited income statement, balance sheet, cash-flow statement, revenue by line, gross margin, deferred
            revenue, cash, debt, and budget-vs-actuals.
        follow_up_questions:
          - Provide audited financials and monthly management accounts for FY2023-FY2025 and year-to-date 2026.
          - Break out revenue, gross margin, refunds, CAC, retention, and contribution margin for Nitro, Shop/digital
            goods, Quests, developer/platform, and other products.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-006
          - EC-023
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public forecast, budget, or operating plan was found; projections should be diligence-built from user
          growth, subscription conversion, ad inventory, and platform cost data.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: The public record supports growth vectors—Nitro, Shop, Quests, console distribution, and Social SDK—but
              provides no forecast assumptions or variance history.
            evidence_claim_ids:
              - EC-005
              - EC-007
              - EC-008
              - EC-011
              - EC-023
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Forecasts may overstate advertising and subscription conversion if teen-safety, privacy, platform fees, or
            moderation costs scale faster than revenue.
        evidence_gaps:
          - Board-approved budget, long-range plan, cohort model, pipeline forecast, pricing tests, and historical
            forecast accuracy.
        follow_up_questions:
          - Provide management’s three-year model with user, conversion, ARPU, churn, ad fill, take-rate, headcount,
            cloud, safety, and legal cost assumptions.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-008
          - EC-023
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify late-stage private valuation context and a Sony Series H minority investment, but
          current fully diluted ownership and investor rights require data-room review.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights lists Discord at a USD 15B private unicorn valuation with Benchmark, Greylock, and Tencent as
              investors.
            evidence_claim_ids:
              - EC-001
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: Sony confirmed a minority investment in Discord as part of the Series H round.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
              - R-006
        hidden_risks:
          - Strategic investors may hold information, veto, platform, or commercial rights that affect exit flexibility
            and partner neutrality.
          - Valuation marks may be stale relative to public-market comps and private financial performance.
        evidence_gaps:
          - Current cap table, preference stack, liquidation waterfall, option pool, debt, secondary transactions,
            warrants, side letters, and board/investor rights.
        follow_up_questions:
          - Provide current fully diluted cap table, all financing documents, side letters, investor-rights agreement,
            ROFR/co-sale, voting agreements, option plan, and debt schedule.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-012
          - EC-023
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Other public financial evidence is limited to price points, partner/distribution clues, and policy disclosures
          about vendors and payment processors.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Nitro price anchors and avatar-decoration permanence show consumer monetization, while Quests demonstrates an
              advertiser-facing revenue surface.
            evidence_claim_ids:
              - EC-005
              - EC-007
              - EC-008
            risk_ids:
              - R-003
              - R-004
          - finding_id: I.D-F2
            finding: Privacy policy names Stripe, PayPal, Google, advertising platforms, and analytics/measurement partners as
              relevant vendor categories.
            evidence_claim_ids:
              - EC-025
            risk_ids:
              - R-011
        hidden_risks:
          - Payment, app-store, cloud, moderation, and ad-measurement vendor exposure may pressure gross margin or
            create compliance obligations.
        evidence_gaps:
          - Payment fee schedule, cloud contract, app-store take rates, DPA/processor agreements, material commitments,
            and off-balance-sheet obligations.
        follow_up_questions:
          - Provide payment, cloud, CDN, moderation vendor, and advertising measurement contracts with volume
            commitments, SLAs, data-transfer terms, and termination rights.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-007
          - EC-008
          - EC-025
  - chapter_id: II
    title: Products
    chapter_summary: Discord’s public product suite spans core communications, Nitro subscriptions, digital goods, Quests
      ads, developer platform, Social SDK, Activities, and console/game integrations.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-005
      - EC-007
      - EC-008
      - EC-010
      - EC-011
      - EC-022
    risk_ids:
      - R-003
      - R-004
      - R-008
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public sources support a broad communications and game-social platform portfolio, but product-level
          profitability and technical reliability data remain private.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Discord originated as gaming chat and now publicly reports voice, video, text, Nitro, Shop, Quests, Activities,
              and developer products.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-005
              - EC-007
              - EC-008
              - EC-010
            risk_ids:
              - R-003
              - R-008
          - finding_id: II.A-F2
            finding: The Social SDK extends Discord-powered social features directly into games with documented rate limits for some
              communications features.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-008
        hidden_risks:
          - Product breadth can increase surface area for safety, privacy, uptime, and developer-support obligations.
          - Rate limits or integration complexity may slow Social SDK adoption.
        evidence_gaps:
          - Product-level P&L, active users, usage frequency, uptime, reliability, roadmap status, security reviews,
            customer support cost, and developer adoption metrics.
        follow_up_questions:
          - Provide product inventory with P&L, active user definitions, uptime/reliability, incident history, support
            burden, roadmap, and technical debt by product.
        table_ids:
          - T-004
          - T-005
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-005
          - EC-007
          - EC-008
          - EC-010
          - EC-011
  - chapter_id: III
    title: Customer Information
    chapter_summary: Discord’s public customer evidence is stronger for user/community scale and strategic partners than for
      paying-customer concentration, enterprise accounts, or revenue by customer.
    founder_claim_ids:
      - FC-002
      - FC-005
    evidence_claim_ids:
      - EC-003
      - EC-009
      - EC-012
      - EC-013
      - EC-014
      - EC-024
      - EC-025
    risk_ids:
      - R-003
      - R-006
      - R-011
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Discord is consumer/community-led; public sources provide aggregate user-scale metrics and advertiser case
          studies but not top paying customers.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Discord reports 90M+ DAUs and gamer-heavy usage, providing evidence of large end-user reach.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-003
          - finding_id: III.A-F2
            finding: Quests success stories identify named brands/publishers using Discord advertising, including Second Dinner,
              Capcom, Paramount, Walmart, and others on the public Quests page.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-003
              - R-007
        hidden_risks:
          - Advertiser revenue may be concentrated in game launches or one-off campaigns; consumer subscription revenue
            may be sensitive to gaming cycles and disposable income.
          - End-user scale does not reveal paying conversion or customer concentration.
        evidence_gaps:
          - Top customers/advertisers by revenue, Nitro subscriber count, Shop buyers, developer customers, retention,
            NPS, age/geography mix, and concentration by segment.
        follow_up_questions:
          - Provide top 25 revenue customers/advertisers and cohorts for Nitro, Shop, Quests, developer, and any
            enterprise/brand relationships, with churn and renewal history.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-003
          - EC-009
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Sony, Xbox, and PlayStation sources verify strategic console relationships and integration support; commercial
          terms are private.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: III.B-F1
            finding: Sony disclosed a PlayStation partnership and minority Series H investment in Discord.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
              - R-006
          - finding_id: III.B-F2
            finding: Xbox and PlayStation support pages confirm console voice-chat integrations, with Xbox noting restrictions and
              country availability limits.
            evidence_claim_ids:
              - EC-013
              - EC-014
              - EC-024
            risk_ids:
              - R-006
        hidden_risks:
          - Console partners control platform policy, integration surfaces, region availability, user experience
            constraints, and potential renewal/termination leverage.
        evidence_gaps:
          - Commercial terms, exclusivity, data sharing, SLAs, roadmap commitments, platform fees, termination rights,
            and integration economics.
        follow_up_questions:
          - Provide Sony/Microsoft contracts, integration SLAs, data-sharing terms, termination notices, platform policy
            compliance history, and product roadmap dependencies.
        table_ids:
          - T-008
          - T-009
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-012
          - EC-013
          - EC-014
          - EC-024
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Public sources do not disclose revenue by customer, customer concentration, subscription conversion, or
          advertising take rates.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: The public record shows monetization categories and named campaign examples but no revenue by customer or
              segment.
            evidence_claim_ids:
              - EC-005
              - EC-008
              - EC-009
              - EC-023
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - A handful of large game publishers, console partners, app stores, or payment processors could drive
            disproportionate revenue or margin impact.
        evidence_gaps:
          - Revenue by customer and segment, top customer contracts, advertiser renewal/cohort history, subscription
            concentration, and platform/channel revenue split.
        follow_up_questions:
          - Provide revenue by customer/advertiser/product, monthly recurring revenue, net dollar retention,
            app-store/channel split, concentration and renewal analysis.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-005
          - EC-008
          - EC-009
          - EC-023
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No definitive public evidence of severed material relationships was identified; Guilded’s discontinuation is
          competitor context rather than a Discord relationship.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.D-F1
            finding: Public sources reviewed did not identify specific Discord customer/partner terminations; partner support pages
              still document Xbox and PS5 integrations.
            evidence_claim_ids:
              - EC-013
              - EC-014
              - EC-024
            risk_ids:
              - R-006
          - finding_id: III.D-F2
            finding: The adjacent gaming-community competitor Guilded is no longer available, indicating category churn but not a
              Discord customer loss.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-007
        hidden_risks:
          - Material partner churn may not be publicly announced, especially for advertisers, game publishers, cloud
            vendors, and platform integrations.
        evidence_gaps:
          - Churned top customers/advertisers, terminated partnerships, non-renewed integrations, dispute history, and
            customer-support escalations.
        follow_up_questions:
          - Provide a two-year lost-customer/partner schedule, reasons for loss, revenue impact, win/loss analysis, and
            any threatened termination notices.
        table_ids:
          - T-008
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-013
          - EC-014
          - EC-021
          - EC-024
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public privacy-policy disclosures identify payment, cloud, advertising-platform, and analytics/measurement
          vendor categories, but spend concentration and contracts are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Discord names Stripe, PayPal, Google, advertising platforms, and analytics/measurement partners in its privacy
              policy.
            evidence_claim_ids:
              - EC-025
            risk_ids:
              - R-011
          - finding_id: III.E-F2
            finding: Product scope implies additional infrastructure, safety, CDN, moderation, and mobile platform dependencies that
              require contract review.
            evidence_claim_ids:
              - EC-010
              - EC-018
              - EC-025
            risk_ids:
