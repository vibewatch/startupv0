risk_register:
  - risk_id: R-001
    risk_title: Private financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Audited financials, monthly management accounts, revenue mix, gross margin, cash, debt, and cash burn are
      not public.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.E
    evidence_claim_ids:
      - EC-023
    mitigation_or_diligence_request: Require full financial data room, QoE review, bank statements, debt schedule, and budget-to-actuals.
  - risk_id: R-002
    risk_title: Capital structure and preference-stack uncertainty
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation and investor signals do not reveal liquidation preferences, investor rights, strategic
      side letters, or current ownership.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - VII.E
    evidence_claim_ids:
      - EC-001
      - EC-012
      - EC-023
    mitigation_or_diligence_request: Review charter, financing documents, side letters, cap table, option plan, and liquidation waterfall.
  - risk_id: R-003
    risk_title: Monetization mix and customer concentration unknown
    risk_category: financial
    severity: high
    likelihood: medium
    description: Nitro, Shop, Quests, and developer products are public, but conversion, revenue mix, churn, and
      concentration are not.
    impacted_chapter_ids:
      - I
      - II
      - III
      - V
    impacted_section_ids:
      - I.A
      - II.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-005
      - EC-007
      - EC-008
      - EC-009
      - EC-023
    mitigation_or_diligence_request: Require product P&Ls, cohort data, subscription metrics, top customers/advertisers, and pricing history.
  - risk_id: R-004
    risk_title: Privacy, ads, and teen/child safety regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Discord collects user/action data, delivers sponsored content, and operates social/community products amid
      heightened privacy and child-safety scrutiny.
    impacted_chapter_ids:
      - VIII
      - V
    impacted_section_ids:
      - VIII.G
      - V.C
    evidence_claim_ids:
      - EC-006
      - EC-018
      - EC-019
      - EC-020
    mitigation_or_diligence_request: Review DPIAs, consent flows, ad targeting, regulatory correspondence, COPPA/GDPR/CPRA
      compliance, and child-safety audits.
  - risk_id: R-005
    risk_title: Trust and safety / content moderation execution risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Public safety infrastructure is visible, but enforcement outcomes, staffing, tooling, and false
      positive/negative rates are not.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids:
      - EC-015
      - EC-016
      - EC-017
      - EC-020
    mitigation_or_diligence_request: Review safety KPIs, moderation staffing, escalation workflows, law enforcement
      response, appeals, audits, and incident history.
  - risk_id: R-006
    risk_title: Console and strategic partner dependency
    risk_category: customer
    severity: medium
    likelihood: medium
    description: Sony, Xbox, and PlayStation integrations add distribution but depend on external platform policies,
      contracts, and availability limits.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.B
      - VIII.F
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-014
      - EC-024
    mitigation_or_diligence_request: Review partner contracts, SLAs, data-sharing, termination rights, roadmap dependencies, and regional availability.
  - risk_id: R-007
    risk_title: Competitive substitution and bundling pressure
    risk_category: market
    severity: medium
    likelihood: medium
    description: Discord competes with workplace collaboration, social/community media, livestreaming, console/in-game chat,
      and developer/social platform alternatives.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-003
      - EC-021
    mitigation_or_diligence_request: Review market share, win/loss, cohort churn, substitution surveys, and competitor response scenarios.
  - risk_id: R-008
    risk_title: Developer platform adoption and technical-limit risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Developer docs and Social SDK are public, but adoption, reliability, rate limits, and support burden are
      not disclosed.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-022
    mitigation_or_diligence_request: Review SDK adoption, active developers, SLOs, incidents, rate-limit telemetry, security
      reviews, and support tickets.
  - risk_id: R-009
    risk_title: Leadership transition and people-data opacity
    risk_category: team
    severity: medium
    likelihood: medium
