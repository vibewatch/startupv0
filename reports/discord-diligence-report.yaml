report_metadata:
  report_title: Discord Public-Source Startup Diligence Report
  target_company: Discord
  website: https://discord.com/
  known_aliases:
    - Discord Inc.
    - Discord Netherlands BV
    - Discord Nitro
    - Discord Quests
    - Discord Social SDK
  sector: Gaming-centered social communications, subscriptions, digital goods, advertising, and developer platform
  geography: United States headquartered; global consumer, developer, advertiser, and console-platform footprint
  company_stage: Late-stage private unicorn
  research_date: 2026-05-18
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Reviewed Discord-owned company, product, privacy, safety, transparency, policy, developer, support, and
      advertising pages.
    - Used CB Insights public unicorn list for third-party private-company valuation and investor context.
    - Used partner sources from Sony, Xbox, and PlayStation to verify console integrations and strategic investment
      signals.
    - Used FTC and U.S. Senate public pages for sector and child-safety/privacy scrutiny context.
    - Used public competitor pages only for high-level competitive mapping; no paid market-share database was used.
    - Marked financial statements, cap table, contracts, customer concentration, supplier spend, HRIS data, and legal
      reserves as not publicly verifiable when not found in public sources.
  included_jurisdictions:
    - United States
    - European Union
    - United Kingdom
    - global gaming and social-communications markets
  excluded_topics:
    - No private data-room materials, management interviews, customer calls, counsel letters, bank statements, board
      materials, paid database exports, or source-code/security audits were available.
    - Some media, legal, and database pages were blocked, rate-limited, stale, or unavailable; only successfully
      verified public-source facts are used as evidence claims.
  user_provided_materials:
    - material_id: M-001
      title: Discord diligence request
      type: prompt
      date_received: 2026-05-18
      notes: User requested exactly one standard-depth public-source startup diligence YAML report for Discord.
