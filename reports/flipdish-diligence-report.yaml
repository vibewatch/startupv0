risk_register:
  - risk_id: R-001
    risk_title: Unaudited private financials and ARR quality
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public sources disclose funding, pricing and traction signals, but audited statements, ARR, gross margin, burn, runway, receivables and revenue recognition are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-004
      - EC-016
    mitigation_or_diligence_request: Request audited financials, monthly management accounts, ARR bridge, cohorts, margin by product, AR aging and cash runway.
  - risk_id: R-002
    risk_title: Valuation and cap-table terms risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $1.25B valuation is public, but share count, preferences, debt, option pool and investor rights are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-018
    mitigation_or_diligence_request: Review financing documents, cap table, option pool, investor rights, liquidation stack, debt and secondary transfers.
  - risk_id: R-003
    risk_title: SMB restaurant churn and customer concentration
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Restaurant customers can be small, price-sensitive and operationally volatile; public customer logos do not disclose retention or revenue concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-011
    mitigation_or_diligence_request: Request top-customer ARR, cohorts, churn, NRR, payment volume, support tickets and reference calls.
  - risk_id: R-004
    risk_title: Competitive pressure from restaurant SaaS, POS and marketplaces
    risk_category: market
    severity: high
    likelihood: high
    description: Flipdish competes with restaurant software providers and third-party aggregators that can pressure pricing, product scope and customer ownership.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-012
      - EC-013
    mitigation_or_diligence_request: Analyze win/loss, pricing concessions, marketplace dependency, POS displacement and geographic competitive intensity.
  - risk_id: R-005
    risk_title: Product support and implementation reliability
    risk_category: product
    severity: medium
    likelihood: medium
    description: Public testimonials are generally positive but include support-speed complaints and implementation dependence.
    impacted_chapter_ids:
      - II
      - III
    impacted_section_ids:
      - II.A
      - III.A
    evidence_claim_ids:
      - EC-003
      - EC-011
    mitigation_or_diligence_request: Review uptime, incident history, onboarding backlog, support SLAs, churn reasons and product-quality metrics.
  - risk_id: R-006
    risk_title: GDPR, payments and special-category data exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Flipdish handles order, payment, location and potentially special-category food-order data across multiple jurisdictions.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Review DPAs, subprocessors, DPIAs, payment compliance, retention/deletion controls and regulator correspondence.
  - risk_id: R-007
    risk_title: AI Phone Agent voice-data and model-dependency risk
    risk_category: technical
    severity: medium
    likelihood: unknown
    description: AI Phone Agent introduces recorded calls, transcripts and model/vendor economics that are not publicly detailed.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids:
      - EC-003
      - EC-010
      - EC-014
    mitigation_or_diligence_request: Request model/provider contracts, call recording consent flows, prompt/evaluation logs, retention, opt-outs and unit-cost metrics.
  - risk_id: R-008
    risk_title: International expansion and headcount execution
    risk_category: operational
    severity: high
    likelihood: medium
    description: A 700-job expansion plan and 25-country footprint require operational controls, local compliance and sustained demand.
    impacted_chapter_ids:
      - V
      - VII
    impacted_section_ids:
      - V.E
      - VII.B
    evidence_claim_ids:
      - EC-006
      - EC-008
      - EC-015
    mitigation_or_diligence_request: Compare planned versus actual hiring, attrition, country P&L, localization costs and management bandwidth.
  - risk_id: R-009
    risk_title: Pricing, payments and transaction-margin opacity
    risk_category: financial
    severity: medium
    likelihood: unknown
    description: List pricing and transparent transaction-fee language do not show take rate, payment processor cost, hardware cost or discounting.
    impacted_chapter_ids:
      - I
      - II
    impacted_section_ids:
      - I.B
      - II.A
    evidence_claim_ids:
      - EC-004
      - EC-016
    mitigation_or_diligence_request: Request SKU-level bookings, payment volume, take rate, discounting, hardware COGS and gross-margin waterfall.
  - risk_id: R-010
    risk_title: Legal, IP, insurance and contract schedule gaps
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public sources did not provide legal schedules, insurance policies, IP assignments, material contracts or counsel-led litigation/regulatory searches.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
      - VIII.F
    evidence_claim_ids:
      - EC-017
    mitigation_or_diligence_request: Obtain litigation/regulatory schedule, contracts, IP assignments, OSS inventory, trademark/patent list, insurance policies and counsel letter.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR, gross margin, burn, runway and AR aging
    why_it_matters: Valuation and risk cannot be assessed from public financing/pricing signals alone.
    suggested_source_or_request: Finance data room and auditor workpapers
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table and financing terms
    why_it_matters: Preferences and option-pool terms can materially alter economics.
    suggested_source_or_request: Cap table, financing docs, investor rights and debt schedules
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, margin, uptime and AI Phone Agent performance
    why_it_matters: Product breadth can hide weak modules or high support/model costs.
    suggested_source_or_request: Product analytics, incident history, roadmap and AI evaluation reports
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Top customer ARR/GMV, churn and reference contacts
    why_it_matters: Public logos do not prove revenue quality or retention.
    suggested_source_or_request: Customer contracts, cohort report, reference list and churn schedule
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top supplier contracts and concentration
    why_it_matters: Payments, delivery, telephony and AI dependencies may affect margins and availability.
    suggested_source_or_request: Supplier spend/contracts, SLAs, outage reports and DPAs
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss and competitive pricing
    why_it_matters: Competitive pressure determines pricing power and growth durability.
    suggested_source_or_request: Win/loss report, competitive battlecards and pricing concessions
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity and CAC payback
    why_it_matters: Demo-led GTM could be expensive if restaurant ARPA is low.
    suggested_source_or_request: Sales funnel, quota attainment, CAC/LTV and payback by channel
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: AI governance, model contracts and roadmap costs
    why_it_matters: AI Phone Agent creates technical, privacy and cost risk.
    suggested_source_or_request: Model/vendor contracts, evaluations, safety review and development budget
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount, attrition and hiring plan
    why_it_matters: Historical 700-job plan is stale without actual outcomes.
    suggested_source_or_request: HRIS export, attrition report, org chart and hiring forecast
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Privacy, regulatory and incident history
    why_it_matters: GDPR/payment/voice data exposure is material.
    suggested_source_or_request: DPIAs, subprocessors, breach history, DSAR logs and regulator correspondence
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP assignments, patents/trademarks and OSS/model/data licenses
    why_it_matters: Unresolved IP/data rights can impair product use and exit.
    suggested_source_or_request: IP schedule, assignment agreements, OSS inventory and model/data rights
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts and insurance
    why_it_matters: Liability caps, exclusions and supplier/customer terms may shift risk.
    suggested_source_or_request: Contract schedule, top agreements, insurance policies and broker memo
    priority: high
