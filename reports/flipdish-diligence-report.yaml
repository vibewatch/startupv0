        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Product modules include POS, online ordering, websites/apps, kiosks, marketing, delivery, payments, marketplace management and AI Phone Agent.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-005
          - finding_id: II.A-F2
