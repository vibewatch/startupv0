report_metadata:
  report_title: Flipdish Startup Diligence Research Report
  target_company: Flipdish
  website: https://www.flipdish.com/
  known_aliases:
    - Flipdish Limited
    - Flipdish.com
    - Flipdish POS
    - Flipdish Pay
  sector: Restaurant management software, hospitality technology, online ordering, POS, payments and AI phone ordering
  geography: Ireland / Dublin headquarters with public operations and customers across Europe, the United States and other global markets
  company_stage: Private venture-backed Series C unicorn
  research_date: 2026-06-01
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD unless otherwise noted; public pricing also uses EUR
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Reviewed public company pages, pricing, customers, privacy policy and accessible legal pages.
    - Reviewed third-party market/news sources including CB Insights public profile, Restaurant Business and Eurofound.
    - Used the workflow-provided public unicorn-list row for target-selection context and corroborated core financing through independent public sources.
    - Marked financial statements, cap table, customer contracts, supplier contracts, legal schedules, HR records and security controls as gaps when not public.
  included_jurisdictions:
    - Ireland
    - European Union / GDPR
    - United Kingdom
    - United States
    - Spain
    - Germany
    - Global restaurant markets
  excluded_topics:
    - Private data room, founder interview, customer calls and bank/accounting records
    - Paid database details beyond public snippets
    - Counsel-led litigation/regulatory docket searches
    - Private employee, compensation, insurance and contract records
    - Non-public personal contact details
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights public unicorn-list row for Flipdish
      type: public market-list extract
      date_received: 2026-06-01
      notes: "Row provided during target selection: Flipdish, USD 1.25B valuation, Ireland/Dublin, Consumer & Retail, investors Tencent Holdings, Tiger Global Management and Global Founders Capital."
