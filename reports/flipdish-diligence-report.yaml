executive_summary:
  overall_assessment: Flipdish is a credible Irish private unicorn with public support for its USD 1.25B Tencent-led Series C valuation, broad restaurant-management product suite, named customer stories and international scale claims. The diligence case remains highly dependent on private validation of ARR quality, gross margin, customer retention, payment economics, product reliability, AI Phone Agent governance, privacy compliance, cap-table terms and current headcount.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence until data-room materials validate that Flipdish can convert a broad restaurant customer base into durable, high-margin recurring revenue while controlling marketplace competition, support complexity, payments/privacy exposure and international expansion costs.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: The USD 100M Series C at a USD 1.25B valuation is independently reported and matches the unicorn-list context.
      evidence_claim_ids:
        - EC-001
        - EC-018
    - founder_claim_id: FC-003
      summary: The product suite is publicly visible across Flipdish company pages and pricing navigation.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-007
      summary: Privacy policy evidence verifies Irish entity details and material personal/order/payment/voice data categories.
      evidence_claim_ids:
        - EC-009
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: No audited financial statements, ARR, gross margin, burn or runway are public.
    - risk_id: R-003
      summary: Restaurant customer churn, concentration and GMV/ARR quality are not publicly verifiable.
    - risk_id: R-006
      summary: GDPR, payment, special-category and AI voice/call data processing creates material compliance exposure.
  key_evidence_gaps:
    - Audited financials, ARR bridge, gross margin, burn, debt, tax/accounting policy and AR aging.
    - Cap table, financing terms, investor rights, option pool and liquidation waterfall.
    - Top-customer ARR/GMV, churn, NRR, support tickets, reference checks and severed relationships.
    - Supplier contracts for payments, delivery, AI/telephony, hardware and infrastructure.
    - Privacy/security artifacts, DPAs, subprocessors, DPIAs, incident history, IP assignments, material contracts and insurance.
  recommended_next_steps:
    - Open a financial/cap-table data room and reconcile the Series C, total raised and fully diluted economics.
    - Run customer diligence on top merchants/chains, churned customers, support-ticket history and marketplace-displacement claims.
    - Conduct technical/product diligence on POS reliability, AI Phone Agent accuracy/cost, data flows and vendor dependencies.
    - Complete counsel-led privacy, regulatory, contracts, insurance, IP and employment diligence across Ireland/EU, UK and US operations.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Flipdish has credible public financing and pricing evidence, but audited financials, ARR quality, projections, cap table, debt and tax matters are not public.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
      - EC-016
      - EC-018
    risk_ids:
      - R-001
      - R-002
      - R-009
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements, management accounts, backlog or AR aging were found publicly; public evidence is limited to pricing and financing signals.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources do not disclose revenue, ARR, margins, burn, cash or AR aging.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Pricing exists but cannot be translated into actual revenue quality without customer and SKU data.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-009
        hidden_risks:
          - Reported customer and product breadth could mask low margin, high support cost or churn.
        evidence_gaps:
          - Audited financials, ARR bridge, backlog, AR aging, GMV/payment volume and product-level gross margins are not public.
        follow_up_questions:
          - Provide audited financial statements, monthly management accounts, ARR bridge, booking cohorts, AR aging and margin by SKU/geography.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-004
          - EC-016
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers include bundling, product expansion, direct ordering and international/vertical expansion, but projections and assumptions are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Public list pricing and product breadth provide some growth-driver context.
            evidence_claim_ids:
              - EC-003
              - EC-004
            risk_ids:
              - R-009
          - finding_id: I.B-F2
            finding: Series C proceeds were reportedly intended for operations, products and new verticals.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-008
        hidden_risks:
          - Forecasts could overstate attach rates, sales productivity or international profitability.
        evidence_gaps:
          - Three-year forecast, CAC/LTV, churn, country plans, capex/hardware costs and external financing assumptions are not public.
        follow_up_questions:
          - Provide board-approved forecast, scenario model, product attach assumptions, country P&L, CAC/LTV and hardware/payment COGS.
        table_ids:
          - T-002
        figure_ids:
          - F-006
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-007
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources support a Series C unicorn valuation and investor list, but fully diluted ownership, preferences and debt are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: The USD 100M Tencent-led Series C at USD 1.25B is independently reported.
            evidence_claim_ids:
              - EC-001
              - EC-018
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: CB reports USD 156.34M total raised and names major investors.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-002
        hidden_risks:
          - Investor rights or liquidation preferences may materially change common-equity economics.
        evidence_gaps:
          - Current shares outstanding, option pool, warrants/notes, investor rights, debt and off-balance-sheet liabilities are not public.
        follow_up_questions:
          - Provide cap table, financing documents, option ledger, debt instruments, SAFE/note schedules and rights agreements.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-018
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Tax positions, accounting policies and complete financing history are not public; the report can only triangulate from financing articles and database profiles.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.D-F1
            finding: Public financing history is incomplete relative to CB total raised.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-002
          - finding_id: I.D-F2
            finding: Revenue recognition and payment-fee accounting are key because Flipdish bundles software, payments and hardware/support.
            evidence_claim_ids:
              - EC-004
              - EC-016
            risk_ids:
              - R-001
              - R-009
        hidden_risks:
          - Misclassification of hardware, payment or setup fees could distort ARR and gross margin.
        evidence_gaps:
          - Tax filings, revenue-recognition memo, transfer pricing, VAT/payment treatment and complete financing ledger are not public.
        follow_up_questions:
          - Provide tax schedule, revenue-recognition policy, financing ledger and auditor correspondence.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-004
          - EC-016
