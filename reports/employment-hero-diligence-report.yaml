report_metadata:
  report_title: Employment Hero Startup Diligence Research Report
  target_company: Employment Hero
  website: https://employmenthero.com/
  known_aliases:
    - Employment Hero Pty Ltd
    - Employment OS
    - HeroForce
    - Employment Hero Work
    - KeyPay
  sector: Enterprise Tech / HR, payroll, and workforce management SaaS
  geography: Sydney, Australia; operations and product footprint include Australia, New Zealand, United Kingdom, Malaysia, Singapore, and global employment services
  company_stage: Private unicorn / late-stage venture-backed startup
  research_date: 2026-06-12
  analyst: GitHub Copilot CLI using startup-diligence-research skill
  report_version: "1.0"
  currency: AUD and USD where specified
  time_zone: Australia/Sydney
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility against CB Insights unicorn list, Australian Business Register, company site, and professional profiles.
    - Collected public company-owned evidence for funding, product, scale, partners, pricing, privacy/legal, customer stories, and careers.
    - Collected third-party/public evidence from GetApp, LinkedIn, SEEK, and government registry pages.
    - Marked private financials, customer concentration, cap table, legal/IP schedules, and contracts as not_publicly_verifiable rather than speculating.
  included_jurisdictions:
    - Australia
    - New Zealand
    - United Kingdom
    - Malaysia
    - Singapore
    - Global employment services where publicly claimed
  excluded_topics:
    - Non-public data rooms
    - paid court/company extracts behind access controls
    - private customer/supplier interviews
    - non-public personal contact data
  user_provided_materials:
    - material_id: UPM-001
      title: Current unicorn-list target details for Employment Hero
      type: task_brief
      date_received: 2026-06-12
      notes: User provided CB Insights row values and requested Employment Hero workstream only.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Employment Hero is eligible for this workstream as a private startup unicorn.
    claim_source: User-provided CB Insights target list plus public verification
    claim_date: 2026-06-12
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
      - I.D
      - VIII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-010
    contradiction_summary: null
    diligence_follow_up:
      - Confirm latest primary-source valuation and share class terms directly with company.
  - founder_claim_id: FC-002
    claim_text: Employment Hero raised a major late-stage Series F and is valued above unicorn threshold.
    claim_source: Company funding announcement and CB Insights
    claim_date: 2023-10-23
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-003
    contradiction_summary: Company post uses Australian-dollar valuation just shy of A$2B, while CB Insights lists $1.37B, likely USD; reconcile currency and date.
    diligence_follow_up:
      - Request round documents, cap table, preference stack, and valuation currency reconciliation.
  - founder_claim_id: FC-003
    claim_text: Employment Hero serves hundreds of thousands of businesses and millions of users.
    claim_source: Company website and professional profiles
    claim_date: null
    mapped_chapter_ids:
      - III
      - VII
    mapped_section_ids:
      - III.A
      - VII.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-010
    contradiction_summary: Public figures vary between 2M employees, 2.5M active users, and 3M+ active users in job-board excerpts.
    diligence_follow_up:
      - Request current customer, active-user, employee-payroll, and paid-seat definitions with cohort bridges.
  - founder_claim_id: FC-004
    claim_text: Employment Hero provides an all-in-one HR, payroll, recruitment, and employment platform.
    claim_source: Company product pages
    claim_date: null
    mapped_chapter_ids:
      - II
    mapped_section_ids:
      - II.A
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
      - EC-006
    contradiction_summary: null
    diligence_follow_up:
      - Request module attach-rate, implementation backlog, support tickets, and revenue by SKU.
  - founder_claim_id: FC-005
    claim_text: Employment Hero is investing materially in AI and R&D.
    claim_source: Company funding announcement and about page
    claim_date: null
    mapped_chapter_ids:
      - VI
    mapped_section_ids:
      - VI.A
      - VI.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-013
    contradiction_summary: null
    diligence_follow_up:
      - Request R&D budget, capitalization policy, roadmap, AI model governance, and shipped-product adoption metrics.
  - founder_claim_id: FC-006
    claim_text: Employment Hero remains active and privately held, not IPO’d, shut down, or publicly acquired.
    claim_source: ABR, CB Insights, LinkedIn, and company site
    claim_date: 2026-06-12
    mapped_chapter_ids:
      - VII
      - VIII
    mapped_section_ids:
      - VII.B
      - VIII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-010
    contradiction_summary: null
    diligence_follow_up:
      - Request confirmation of ultimate parent entity, subsidiaries, and any control-change or pending transaction processes.
executive_summary:
  overall_assessment: Eligible private unicorn with strong public scale/funding evidence, but investment-quality diligence is gated by private financial, customer, legal, security, and cap-table data.
  investment_or_diligence_thesis: Employment Hero is a Sydney-based Enterprise Tech HR/payroll/workforce platform with public evidence of unicorn status, broad SMB adoption, and AI-led expansion; proceed only with focused data-room diligence on revenue quality, competition, privacy/payroll compliance, and product execution.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Employment Hero as a private unicorn at $1.37B, and ABR lists Employment Hero Pty Ltd as active Australian Private Company.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Company announced a A$263M Series F led by TCV, total raised over A$650M, and valuation just shy of A$2B.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: Company product pages verify a broad HR, payroll, recruitment, compliance, employee app, benefits, and AI product suite.
      evidence_claim_ids:
        - EC-005
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, ARR, gross margin, burn, debt, and cap table are not public.
    - risk_id: R-003
      summary: Payroll, privacy, sensitive data, and international data-transfer obligations create high diligence priority.
    - risk_id: R-004
      summary: HR/payroll/workforce software is crowded with global and local competitors, pressuring pricing and retention.
    - risk_id: R-005
      summary: Customer concentration, churn, NRR, and major-customer health are not publicly verifiable.
  key_evidence_gaps:
    - Audited financials, ARR bridge, gross margin, cash runway, debt, and tax positions.
    - Cap table, financing terms, liquidation preferences, and option/warrant schedules.
    - Revenue concentration, churn, NRR/GRR, top customer contracts, and customer references.
    - Security/privacy attestations, incident history, subprocessor list, payroll compliance audits.
    - Litigation, IP, insurance, material contracts, and regulatory correspondence.
  recommended_next_steps:
    - Proceed to data-room request; do not underwrite valuation from public scale metrics alone.
    - Prioritize finance, cap-table, customer-cohort, privacy/security, and payroll-compliance diligence.
    - Run counsel-led legal/IP/regulatory searches in Australia and operating jurisdictions.
    - Interview reference customers across HR, payroll, recruitment, HeroForce, and Work app modules.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources verify unicorn status and major financing history, but financial statements, ARR, margin, cash burn, debt, and cap table are not publicly verifiable.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-012
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited income statement, balance sheet, cash-flow statement, AR aging, backlog, or product-level gross-profit breakdown was public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A.F1
            finding: Public materials provide scale signals but not financial statements or revenue-quality metrics.
            evidence_claim_ids:
              - EC-004
              - EC-012
            risk_ids:
              - R-001
        hidden_risks:
          - Revenue quality, cash burn, and working-capital strain could be materially different from public scale perception.
        evidence_gaps:
          - Audited financials, monthly close pack, ARR bridge, gross margin by product, AR aging, backlog, debt schedule.
        follow_up_questions:
          - Provide audited financials and monthly management accounts for FY2023-FY2026 YTD.
          - Provide ARR/revenue, gross margin, churn, AR aging, and cash runway by month.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-012
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers are publicly described as global expansion, AI automation, and SME employment solutions, but projections and assumptions are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B.F1
            finding: Series F proceeds are tied publicly to global expansion and AI capability, but plan assumptions are undisclosed.
            evidence_claim_ids:
              - EC-003
              - EC-013
            risk_ids:
              - R-001
              - R-002
              - R-007
        hidden_risks:
          - Forecasts may rely on international expansion, AI adoption, and partner-channel growth that cannot be externally validated.
        evidence_gaps:
          - Three-year projections, scenario cases, pricing assumptions, capex, working capital, and financing assumptions.
        follow_up_questions:
          - Provide board-approved plan, pipeline conversion assumptions, and downside case.
          - Reconcile current valuation to currency, market multiples, and latest trading metrics.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-013
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Founders and select investors are public, but shares, preferences, options, warrants, debt, and off-balance-sheet liabilities are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C.F1
            finding: Public investor and founder evidence is insufficient to assess dilution, liquidation preferences, or debt.
            evidence_claim_ids:
              - EC-001
              - EC-003
              - EC-004
              - EC-012
            risk_ids:
              - R-002
        hidden_risks:
          - Preference stack, debt covenants, or option-pool refresh could materially affect common-equity value.
        evidence_gaps:
          - Cap table, option/warrant ledger, convertible notes, debt instruments, investor rights, off-balance-sheet liabilities.
        follow_up_questions:
          - Provide fully diluted cap table and all financing documents.
          - Provide debt, bank line, warrant, and option schedules with vesting and exercise prices.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-003
          - EC-012
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history includes Series C reference, unicorn/KeyPay period, Series F, CB valuation, and active registry status; tax and accounting policies remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D.F1
            finding: Employment Hero meets public unicorn criteria and remains active, but accounting policies and tax position are not public.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
              - EC-012
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Revenue recognition, payroll funds handling, tax liabilities, and foreign operations could introduce unobserved exposures.
        evidence_gaps:
          - Tax returns, NOLs, transfer pricing, revenue recognition memo, payroll-funds controls, financing history with investor ownership.
        follow_up_questions:
          - Provide tax, revenue-recognition, and payroll-funds control memos.
          - Reconcile CB Insights valuation with latest company share price and currency.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-012
  - chapter_id: II
    title: Products
    chapter_summary: Employment Hero publicly presents a broad Employment OS spanning HR, payroll, recruitment, employee app, benefits, learning, AI, HeroForce, and payroll/compliance; private diligence must verify module economics and technical maturity.
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-013
      - EC-014
    risk_ids:
      - R-004
      - R-006
      - R-003
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Product breadth is well supported by company pages, but revenue by SKU, attach rates, market share, cost structure, roadmap dates, and profitability are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A.F1
            finding: The company positions Employment OS as an integrated HR/payroll/recruitment/employment platform for SMEs.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-004
          - finding_id: II.A.F2
            finding: AI and KeyPay-related payroll integration are strategic product areas but require technical and commercial validation.
            evidence_claim_ids:
              - EC-013
              - EC-014
            risk_ids:
              - R-006
              - R-003
        hidden_risks:
          - Broad product scope can create technical debt, implementation complexity, and support burden if modules are unevenly mature.
        evidence_gaps:
          - Revenue by product, attach-rate cohorts, roadmap, product uptime, implementation backlog, support tickets, security attestations, gross margin by SKU.
        follow_up_questions:
          - Provide module ARR, attach rate, churn, NPS, and gross margin.
          - Provide architecture, security attestations, integration roadmap, and AI governance evidence.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-013
          - EC-014
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public sources support broad adoption and named case studies, but top customers, revenue concentration, churn, customer agreements, supplier spend, and severed relationships are not public.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-004
      - EC-007
      - EC-008
      - EC-011
    risk_ids:
      - R-005
      - R-010
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Employment Hero publishes customer stories and reports 350,000+ businesses, but it does not publish a top-15 customer list or revenue by application.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A.F1
            finding: Named case studies corroborate public customer adoption, but they are marketing-selected.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-005
        hidden_risks:
          - Actual revenue could be concentrated in larger customers or partners despite a broad logo count.
        evidence_gaps:
          - Top-15 customers for FY2024-FY2026 YTD, modules used, contract values, tenure, renewal status.
        follow_up_questions:
          - Provide top-customer schedule by ARR, geography, module, start date, renewal date, and customer health.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-007
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: The partner network is public, including referral, certified, strategic, and superannuation partner motions, but economics and named strategic partners are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B.F1
            finding: Partner network can expand reach but introduces channel and implementation quality dependency.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-010
        hidden_risks:
          - Partner-sourced revenue may be lower-margin or dependent on a small number of advisors or superannuation partners.
        evidence_gaps:
          - Partner contracts, partner-sourced ARR, revenue share, SLAs, channel conflict, termination rights.
        follow_up_questions:
          - Provide partner list, revenue contribution, contractual terms, and support responsibilities.
        table_ids:
          - T-007
        figure_ids:
          - F-006
        evidence_claim_ids:
          - EC-008
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer and any 5%+ revenue concentration are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C.F1
            finding: Public adoption metrics do not disclose revenue concentration or customer quality.
            evidence_claim_ids:
              - EC-004
              - EC-007
              - EC-012
            risk_ids:
              - R-005
        hidden_risks:
          - Revenue concentration, late renewals, or enterprise downgrades could be hidden by aggregate customer counts.
        evidence_gaps:
          - Revenue by customer, NRR, GRR, logo churn, receivables, expansion/contraction by cohort.
        follow_up_questions:
          - Provide revenue by customer and identify customers exceeding 5% of revenue.
        table_ids: []
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-004
          - EC-007
          - EC-012
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public severed customer, partner, or supplier relationship schedule was verified.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.D.F1
            finding: Severed relationships require direct company disclosure because public case studies are curated.
            evidence_claim_ids:
              - EC-007
              - EC-012
            risk_ids:
              - R-005
              - R-010
        hidden_risks:
          - Loss of a payroll processor, superannuation partner, or large customer could affect revenue or compliance.
        evidence_gaps:
          - Lost customers, terminated partners/suppliers, disputes, and churn reasons for last 24 months.
        follow_up_questions:
          - Provide lost customer/partner/supplier schedule with revenue impact and root cause.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-012
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public privacy and product materials reveal dependency categories but not spend, SLAs, or top supplier concentration.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E.F1
            finding: Google-related services, payroll portals, partners, and processors are dependency categories; full vendor concentration is private.
            evidence_claim_ids:
              - EC-005
              - EC-008
              - EC-011
            risk_ids:
              - R-010
              - R-003
        hidden_risks:
          - Subprocessor, cloud, payroll, superannuation, or partner outages could affect compliance-critical services.
        evidence_gaps:
          - Vendor spend by supplier, SLAs, BCP, incident history, subprocessor list, supplier agreements.
        follow_up_questions:
          - Provide top supplier spend and critical vendor contracts for the last two years and YTD.
        table_ids:
          - T-008
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-005
          - EC-008
          - EC-011
  - chapter_id: IV
    title: Competition
    chapter_summary: Employment Hero competes in a crowded HR/payroll/workforce market spanning SMB HR software, global payroll/EOR, local Australian/NZ compliance tools, and enterprise HCM incumbents.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-009
      - EC-013
    risk_ids:
      - R-004
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Third-party alternatives pages list multiple direct and adjacent competitors; Employment Hero’s differentiation likely depends on local compliance depth, product breadth, AI automation, and channel execution.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: IV.A.F1
            finding: GetApp lists several alternatives and popular comparisons, confirming a crowded category.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-004
          - finding_id: IV.A.F2
            finding: Pricing transparency and product breadth vary across competitors; win/loss data is needed.
            evidence_claim_ids:
              - EC-006
              - EC-009
            risk_ids:
              - R-004
        hidden_risks:
          - Well-funded global platforms can use bundling and aggressive pricing; local incumbents can defend compliance niches.
        evidence_gaps:
          - Market share, win/loss, sales cycle by competitor, churn-loss reasons, feature parity, pricing concessions.
        follow_up_questions:
          - Provide competitive win/loss data, churn-loss reasons, and current competitor battlecards.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-009
          - EC-013
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Public GTM evidence shows direct demo/pricing, partner network, case studies, review-marketplace presence, and sales hiring, but pipeline, CAC, sales productivity, quota attainment, and marketing budget are private.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-004
      - EC-006
      - EC-007
      - EC-008
      - EC-009
      - EC-010
    risk_ids:
      - R-004
      - R-005
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: The public GTM strategy combines direct online demo flows, partner motions, case studies, review sites, and brand/funding narrative.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A.F1
            finding: Public GTM channel types are visible, but actual bookings mix and CAC are not.
            evidence_claim_ids:
              - EC-006
              - EC-008
              - EC-009
            risk_ids:
              - R-004
        hidden_risks:
          - Paid acquisition efficiency or partner economics may deteriorate as competition intensifies.
        evidence_gaps:
          - CAC by channel, pipeline source, paid spend, conversion rates, partner-sourced ARR, marketing budget.
        follow_up_questions:
          - Provide bookings by channel, CAC/LTV cohorts, marketing spend, and funnel conversion.
        table_ids:
          - T-011
          - T-012
        figure_ids:
          - F-006
        evidence_claim_ids:
          - EC-006
          - EC-008
          - EC-009
          - EC-010
      - section_id: V.B
        title: Major Customers
        checklist_question_ids:
          - V.B.1
          - V.B.2
          - V.B.3
        summary: Customer case studies are public, but major-customer relationship status, growth prospects, and pipeline are private.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: V.B.F1
            finding: Public customer examples are insufficient to assess major-customer health or pipeline.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-005
        hidden_risks:
          - Customer health and expansion may differ sharply by segment or module.
        evidence_gaps:
          - Pipeline by account, renewal dates, customer success health scores, expansion opportunities.
        follow_up_questions:
          - Provide major-customer pipeline and customer reference list.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-007
      - section_id: V.C
        title: Principal avenues for generating new business
        checklist_question_ids:
          - V.C
        summary: Direct website, partner network, case studies, review marketplaces, and recruiting/job-board ecosystem are public new-business avenues.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.C.F1
            finding: Partner and direct-demo motions are public; contribution is private.
            evidence_claim_ids:
              - EC-006
              - EC-008
            risk_ids:
              - R-004
        hidden_risks:
          - Overreliance on one channel could be hidden without bookings attribution.
        evidence_gaps:
