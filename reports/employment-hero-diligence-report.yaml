risk_register:
  - risk_id: R-001
    risk_title: Financial quality and unit economics are opaque
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public research verifies scale and funding but not ARR, gross margin, cash burn, retention, AR aging, debt, backlog, or audited statements.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-006
      - EC-012
    mitigation_or_diligence_request: Request audited financials, monthly KPI pack, revenue waterfall, cohort retention, AR aging, debt schedule, and board-approved plan.
  - risk_id: R-002
    risk_title: Valuation and financing sensitivity
    risk_category: financing
    severity: high
    likelihood: medium
    description: The company is late-stage with public valuation anchors around CB $1.37B and company-stated just shy of A$2B; currency, preferences, and market multiple compression could materially affect downside.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-003
    mitigation_or_diligence_request: Review capitalization, liquidation preferences, last-round terms, SAFE/convertible notes, option pool, and runway under conservative growth cases.
  - risk_id: R-003
    risk_title: Payroll, privacy, and cross-border regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: The platform processes payroll, employment, demographic, and potentially sensitive personal data across Australia and international markets, creating privacy, data-transfer, payroll, and compliance obligations.
    impacted_chapter_ids:
      - VIII
      - II
      - VI
    impacted_section_ids:
      - VIII.G
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-011
      - EC-005
    mitigation_or_diligence_request: Request SOC/ISO reports, incident log, subprocessor list, data-flow maps, regulator correspondence, payroll compliance testing, and DPA templates.
  - risk_id: R-004
    risk_title: Crowded HR/payroll/workforce competitive landscape
    risk_category: market
    severity: high
    likelihood: high
    description: GetApp and competitor pages show alternatives ranging from SMB HR platforms to global payroll/EOR and enterprise HCM vendors, raising pressure on pricing, retention, and CAC.
    impacted_chapter_ids:
      - IV
      - V
      - II
    impacted_section_ids:
      - IV.A
