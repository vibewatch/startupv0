  - figure_id: F-011
    title: Risk-register heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Severity/likelihood heatmap for the public diligence risk register.
    purpose: Prioritize follow-up requests across all chapters.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and unit economics are opaque
          severity: high
          likelihood: medium
          rationale: Public research verifies scale and funding but not ARR, gross margin, cash burn, retention, AR aging, debt, backlog, or audited statements.
          evidence_claim_ids:
            - EC-003
            - EC-004
            - EC-006
            - EC-012
          source_ids:
            - SRC-002
            - SRC-003
            - SRC-006
            - SRC-008
            - SRC-001
        - risk_id: R-002
          label: Valuation and financing sensitivity
          severity: high
          likelihood: medium
          rationale: The company is late-stage with public valuation anchors around CB $1.37B and company-stated just shy of A$2B; currency, preferences, and market multiple compression could materially affect downside.
          evidence_claim_ids:
            - EC-001
            - EC-003
          source_ids:
            - SRC-001
            - SRC-002
        - risk_id: R-003
          label: Payroll, privacy, and cross-border regulatory exposure
          severity: high
          likelihood: medium
          rationale: The platform processes payroll, employment, demographic, and potentially sensitive personal data across Australia and international markets, creating privacy, data-transfer, payroll, and compliance obligations.
          evidence_claim_ids:
            - EC-011
            - EC-005
          source_ids:
            - SRC-012
            - SRC-005
            - SRC-007
        - risk_id: R-004
          label: Crowded HR/payroll/workforce competitive landscape
          severity: high
          likelihood: high
          rationale: GetApp and competitor pages show alternatives ranging from SMB HR platforms to global payroll/EOR and enterprise HCM vendors, raising pressure on pricing, retention, and CAC.
          evidence_claim_ids:
            - EC-008
            - EC-009
          source_ids:
            - SRC-011
            - SRC-008
        - risk_id: R-005
          label: Customer concentration, retention, and churn not public
          severity: medium
          likelihood: high
          rationale: Public case studies and scale metrics do not show top-customer revenue, NRR, churn, cohort retention, or health by customer segment.
          evidence_claim_ids:
            - EC-004
            - EC-007
            - EC-012
          source_ids:
            - SRC-003
            - SRC-010
            - SRC-001
            - SRC-002
            - SRC-004
        - risk_id: R-006
          label: AI automation and product-integration execution risk
          severity: medium
          likelihood: medium
          rationale: The company is using fresh capital to build AI/autonomous employment workflows and integrate platform capabilities such as KeyPay; execution and trust failures could affect adoption.
          evidence_claim_ids:
            - EC-013
            - EC-014
          source_ids:
            - SRC-002
            - SRC-003
            - SRC-007
        - risk_id: R-007
          label: International expansion localization complexity
          severity: medium
          likelihood: medium
          rationale: The company operates beyond Australia into New Zealand, the UK, Malaysia, Singapore, and global employment products; local payroll and labor compliance requirements may increase delivery costs.
          evidence_claim_ids:
            - EC-004
            - EC-011
          source_ids:
            - SRC-003
            - SRC-012
        - risk_id: R-008
          label: Headcount, hiring plan, and turnover transparency gap
          severity: medium
          likelihood: medium
          rationale: Public sources show active hiring and large profile counts, but exact payroll headcount, function mix, attrition, compensation, and plan-to-hire are private.
          evidence_claim_ids:
            - EC-010
          source_ids:
            - SRC-009
            - SRC-013
        - risk_id: R-009
          label: Legal, IP, and material-contract information not public
          severity: medium
          likelihood: unknown
          rationale: Public research did not verify pending litigation, trademark/patent portfolio, insurance, or material contract obligations.
          evidence_claim_ids:
            - EC-015
          source_ids:
            - SRC-004
            - SRC-012
        - risk_id: R-010
          label: Third-party processor and partner dependency risk
          severity: medium
          likelihood: medium
          rationale: Partner network and privacy materials indicate dependencies on partners, Google services, payroll portals, superannuation flows, and other subprocessors not fully enumerated publicly.
          evidence_claim_ids:
            - EC-008
            - EC-011
          source_ids:
            - SRC-011
            - SRC-012
    rendering_guidance:
      preferred_format: chart_spec
      display_notes: Show high severity/high likelihood risks in upper-right.
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-009
      - EC-011
      - EC-012
      - EC-015
    source_ids:
      - SRC-001
      - SRC-002
      - SRC-003
      - SRC-008
      - SRC-012
    notes: Heatmap is analyst judgment based on public evidence gaps.
