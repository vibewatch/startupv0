diligence_gaps:
- gap_id: G-001
  chapter_id: I
  section_id: I.A
  missing_information: Audited financial statements and management accounts for the
    past three years plus YTD.
  why_it_matters: Cannot assess revenue quality, margins, burn, runway, working capital,
    or accounting policies.
  suggested_source_or_request: Company CFO/accountant data room and QofE provider.
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.C
  missing_information: Current fully diluted cap table, investor rights, options/warrants/notes/debt,
    pledges, and off-balance-sheet obligations.
  why_it_matters: Public snapshots may be stale and duplicate profiles conflict.
  suggested_source_or_request: Corporate secretary, counsel, shareholder register,
    financing agreements.
  priority: high
- gap_id: G-003
  chapter_id: III
  section_id: III.C
  missing_information: Revenue by customer and customers >=5% of revenue.
  why_it_matters: Customer concentration and revenue durability are not publicly verifiable.
  suggested_source_or_request: Sales ledger, CRM, customer contracts, AR aging.
  priority: high
- gap_id: G-004
  chapter_id: II
  section_id: II.A
  missing_information: Product-level ARR/revenue, gross margin, pricing, retention,
    market share, and customer ROI.
  why_it_matters: Product breadth may not equal monetized, profitable adoption.
  suggested_source_or_request: Product finance schedules, billing data, customer cohorts,
    pricing policy.
  priority: high
- gap_id: G-005
  chapter_id: VI
  section_id: VI.B
  missing_information: Independent AI/IoT technical validation, model evals, uptime,
    cybersecurity tests, and hardware field reliability.
  why_it_matters: Public AI/IoT claims are central to differentiation but not independently
    verified.
  suggested_source_or_request: CTO, security team, third-party technical diligence,
    customer pilots.
  priority: high
- gap_id: G-006
  chapter_id: VIII
  section_id: VIII.D
  missing_information: Complete patent, trademark, software copyright, open-source,
    license, and FTO schedule.
  why_it_matters: IP ownership and freedom-to-operate are critical for an AI/software/IoT
    business.
  suggested_source_or_request: PRC IP counsel and company IP schedule.
  priority: high
- gap_id: G-007
  chapter_id: VIII
  section_id: VIII.A
  missing_information: Counsel-grade litigation, enforcement, administrative penalty,
    tax, and credit searches for all group entities.
  why_it_matters: Public legal sources were inaccessible/incomplete.
  suggested_source_or_request: Local PRC counsel with registry/court database access.
  priority: high
- gap_id: G-008
  chapter_id: V
  section_id: V.D
  missing_information: Sales compensation, quota, sales cycle, pipeline conversion,
    CAC, payback, and channel productivity.
  why_it_matters: GTM scalability cannot be modeled from public sources.
  suggested_source_or_request: Sales ops, CRM, finance, channel agreements.
  priority: medium
- gap_id: G-009
  chapter_id: VII
  section_id: VII.B
  missing_information: Headcount by function/location/entity, compensation, incentive
    plans, turnover, and employment compliance.
  why_it_matters: R&D and service delivery may be talent-constrained or retention-sensitive.
  suggested_source_or_request: HR, payroll, ESOP documents, employment counsel.
  priority: medium
- gap_id: G-010
  chapter_id: VIII
  section_id: VIII.F
  missing_information: Material customer, partner, supplier, cloud/model/device, finance,
