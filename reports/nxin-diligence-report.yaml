executive_summary:
  overall_assessment: 'Eligible for a public-source diligence report: public CB data
    says Nxin is Series B | Alive, the user-provided CB tracker row supplies $1.08B
    unicorn status, ZGC/official materials corroborate 2018-2024 unicorn/activity
    signals, and no IPO/acquisition/shutdown evidence was found. The public thesis
    is a Beijing agriculture-internet platform with AIoT/SaaS/transaction products
    for livestock and agribusiness, but financials, customer concentration, current
    cap table, technical validation, and PRC legal/IP/regulatory checks remain high-priority
    gaps.'
  investment_or_diligence_thesis: Nxin's diligence case rests on a well-corroborated
    2018 RMB364M/US$53M B round at RMB7B pre-money valuation, strategic investors,
    broad digital-agriculture product suite, swine-focused AIoT/data claims, and ecosystem
    distribution through core enterprises and operating centers. The next diligence
    phase should prove monetized recurring revenue, profitable product mix, durable
    customers, clean cap table, defensible IP/data rights, and compliance for data/platform/finance-like
    services.
