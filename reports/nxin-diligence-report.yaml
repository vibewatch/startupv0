- table_id: T-018
  title: Material contracts, insurance, EHS, and tax exposure gaps
  chapter_id: VIII
  section_id: VIII.F
  purpose: Capture non-public legal/contractual records required for closing diligence.
  columns:
  - name: Item
    description: Diligence item
  - name: Public evidence
    description: What was available publicly
  - name: Verification status
    description: Status from allowed enum
  - name: Risk implication
    description: Why this matters
  - name: Follow-up
    description: Data-room or expert request
  rows:
  - row_id: T-018-R1
    values:
      Item: Material customer/partner contracts
      Public evidence: Named case references exist, but contracts, revenue, term,
        SLA, and termination rights are not public.
      Verification status: not_publicly_verifiable
      Risk implication: Revenue durability and liability allocation unknown.
      Follow-up: Request top contracts, order forms, SLAs, DPA/privacy terms, warranties,
        indemnities, and termination notices.
    evidence_claim_ids:
    - EC-017
    - EC-026
    source_ids:
    - SRC-022
    - SRC-026
  - row_id: T-018-R2
    values:
      Item: Insurance coverage
      Public evidence: No insurance policies or coverage limits public.
      Verification status: not_publicly_verifiable
      Risk implication: Cyber, E&O, product liability, device, and farm-safety exposures
        may be uninsured.
      Follow-up: Request policy schedule, limits, exclusions, claims history, and
        broker letter.
    evidence_claim_ids:
    - EC-026
    source_ids:
    - SRC-026
  - row_id: T-018-R3
    values:
      Item: Environmental / employee safety
      Public evidence: Nxin is software/AIoT/platform-focused publicly, but farm-site
        hardware/service work could create safety duties; no EHS file public.
      Verification status: not_publicly_verifiable
      Risk implication: On-site device deployments and livestock/farm environments
        may create safety/product-liability exposure.
      Follow-up: Request EHS policies, incident logs, device certifications, field-service
        procedures, and product-liability claims.
    evidence_claim_ids:
    - EC-011
    - EC-012
    - EC-026
    source_ids:
    - SRC-011
    - SRC-012
    - SRC-026
  - row_id: T-018-R4
    values:
      Item: Tax/accounting positions
      Public evidence: No tax filings, revenue-recognition policy, transfer-pricing,
        or platform-tax compliance data public.
      Verification status: not_publicly_verifiable
      Risk implication: Transaction/platform model could create VAT, withholding,
        agent/principal, and platform reporting risks.
      Follow-up: Request tax returns, VAT filings, revenue recognition memo, transfer-pricing,
        and platform-tax compliance assessment.
    evidence_claim_ids:
    - EC-020
    - EC-026
    - EC-027
    source_ids:
    - SRC-025
    - SRC-026
    - SRC-027
