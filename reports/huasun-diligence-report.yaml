report_metadata:
  report_title: Huasun Public-Source Startup Diligence Report
  target_company: Huasun
  website: https://www.huasunsolar.com/
  known_aliases:
    - Huasun Energy
    - Huasun Solar
  sector: Industrials; renewable energy; heterojunction solar cells and modules
  geography: China headquarters marker in Xuancheng with shipments to more than 60 countries and regions
  company_stage: Private clean-energy unicorn / Hurun and CB Insights unicorn-list company
  research_date: 2026-05-19
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public sources gathered from CB Insights, company-owned pages, investor/partner pages, regulatory registers where available, and industry articles where available.
    - Separated public evidence from private diligence gaps; marked financial statements, cap table, customer schedules, contracts, legal records, HR data, and insurance materials as not_publicly_verifiable when not public.
    - Treated company-owned and investor-owned claims as evidence of public claims, not as audited proof; requested direct records for underwriting.
  included_jurisdictions:
    - China
    - Global photovoltaic supply chain
    - Export markets in 60+ countries and regions
  excluded_topics:
    - No private data room, management interviews, customer calls, supplier calls, counsel letters, paid databases, full court docket review, or authenticated regulator portals were used.
    - No attempt was made to bypass paywalls, authentication, access controls, or unavailable documents.
    - Competitor maps are analyst diligence maps based on public product categories, not sourced market-share studies.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-05-19
      notes: Requested three random private unicorn diligence reports not already covered in reports/ and a draft PR.
