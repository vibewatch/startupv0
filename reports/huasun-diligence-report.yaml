risk_register:
  - risk_id: R-001
    risk_title: Financial quality and utilization opacity
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public sources disclose capacity, shipments, R&D, and valuation, but not revenue, gross margin, utilization, cash, debt, subsidies, warranty reserves, or working capital.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Request audited financials, monthly management accounts, product-level P&L, capacity-utilization data, debt/subsidy schedules, and cash conversion.
  - risk_id: R-002
    risk_title: PV cycle and price-pressure risk
    risk_category: market
    severity: high
    likelihood: high
    description: Huasun itself references a declining PV market and industry-wide pressure; HJT differentiation must overcome oversupply and ASP pressure.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
      - IV.B
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Benchmark ASPs, margins, backlog, utilization, win/loss, warranty terms, and cost curve against TOPCon/PERC and HJT peers.
  - risk_id: R-003
    risk_title: Technology commercialization and warranty risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Efficiency, output, and low-carbon claims require certificate review, field-performance evidence, warranty reserve analysis, and manufacturability validation.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a23
    mitigation_or_diligence_request: Review certification reports, BOM, reliability tests, field data, warranty claims, yield, scrap, and process-control metrics.
  - risk_id: R-004
    risk_title: Customer concentration and export-market risk
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Shipments to 60+ countries do not disclose customer concentration, backlog quality, payment terms, export exposure, or channel risk.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.A
    evidence_claim_ids: *a24
    mitigation_or_diligence_request: Request top-customer schedule, backlog, receivables aging, geographic revenue, channel contracts, and export-control/tariff assessment.
  - risk_id: R-005
    risk_title: R&D/key-person and hiring-retention risk
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Large R&D claims are public, but the signed org chart, retention, compensation, and succession for technical leaders are not public.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
    evidence_claim_ids: *a25
    mitigation_or_diligence_request: Request HRIS export, R&D org chart, key technical leader contracts, attrition, option plans, and retention packages.
  - risk_id: R-006
    risk_title: Valuation and shareholder-term uncertainty
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: CB Insights valuation marker and named investors do not reveal current cap table, liquidation preferences, debt, subsidies, or secondary-market marks.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids: *a26
    mitigation_or_diligence_request: Request cap table, financing documents, shareholder registry, preference stack, debt, guarantees, grants/subsidies, and latest valuation report.
  - risk_id: R-007
    risk_title: Legal, IP, environmental, and trade-compliance gaps
    risk_category: legal
    severity: high
    likelihood: unknown
    description: Solar manufacturing creates IP, environmental, labor, product-warranty, customs, sanctions/export, and customer-contract diligence needs not resolved by public sources.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.D
      - VIII.G
    evidence_claim_ids: *a27
    mitigation_or_diligence_request: Request counsel disclosure, patent/trademark schedule, freedom-to-operate memo, environmental permits, safety records, insurance, and export/trade-compliance review.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, revenue bridge, margins, cash, debt, and working capital
    why_it_matters: Needed to test valuation, profitability, runway, and quality of earnings
    suggested_source_or_request: Request audited statements, trial balance, monthly financial pack, debt/cash schedules, and management forecast
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, financing documents, preferences, debt instruments, and secondary transactions
    why_it_matters: Needed to understand ownership, preference stack, dilution, and true current valuation
    suggested_source_or_request: Request cap table, securities docs, debt agreements, option pool, and latest valuation reports
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top-customer revenue, active-customer definitions, churn, retention, cohort margin, and references
    why_it_matters: Needed to validate public scale claims and customer quality
    suggested_source_or_request: Request customer schedule, CRM/billing reconciliation, NRR/GRR/churn cohorts, and reference calls
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.A
    missing_information: CAC, channel mix, funnel conversion, pipeline, sales capacity, and marketing ROI
    why_it_matters: Needed to validate scalable go-to-market efficiency
    suggested_source_or_request: Request funnel analytics, budget, pipeline, sales productivity, and cohort performance
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D roadmap, staffing, quality metrics, technical debt, certifications, and product-line economics
    why_it_matters: Needed to validate product defensibility and execution risk
    suggested_source_or_request: Request product roadmap, engineering/R&D org, QA metrics, certifications, and cost/margin data
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Signed org chart, headcount by function/location, attrition, compensation, option plans, and key-person retention
    why_it_matters: Needed to assess management depth and operational scalability
    suggested_source_or_request: Request HRIS export, payroll reconciliation, attrition reports, compensation plans, and retention agreements
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Counsel disclosure, litigation/regulatory schedule, material contracts, insurance policies/loss runs, and compliance records
    why_it_matters: Needed to identify hidden liabilities and consent/change-of-control issues
    suggested_source_or_request: Request counsel memo, docket schedule, regulatory correspondence, contracts, insurance, and incident records
    priority: high
