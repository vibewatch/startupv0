risk_register:
  - risk_id: R-001
    risk_title: Payments unit economics and loss exposure are not public
    risk_category: financial
    severity: high
    likelihood: medium
    description: The $1.5B valuation is supported, but net revenue, TPV, take rate, chargebacks, fraud losses, reserves,
      cash, and runway are not public.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.A
      - I.D
      - III.C
    evidence_claim_ids: *a73
    mitigation_or_diligence_request: Open a focused diligence request covering the underlying data room evidence,
      responsible executive interviews, and third-party verification before investment reliance.
  - risk_id: R-002
    risk_title: Multi-country payments regulation and acquiring licenses create execution risk
    risk_category: regulatory
    severity: high
