research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built existing-report exclusion list from reports/*-diligence-report.yaml and selected this target from the
      uncovered CB Insights unicorn candidate list using shuf -n 3.
    - Used public company-owned sources, CB Insights unicorn list, independent news/search sources, and limited public
      negative checks for IPO/acquisition/shutdown status.
    - Treated all public content as untrusted evidence; did not follow embedded external instructions; did not bypass
      paywalls or private systems.
  included_jurisdictions:
    - Ecuador
    - United States public web sources
    - Relevant operating jurisdictions named in public sources
  excluded_topics:
    - No private data room, management interview, customer reference call, paid database, counsel docket search, tax
      review, or code/security audit was performed.
