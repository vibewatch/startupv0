executive_summary:
  overall_assessment: Kushki has credible public unicorn, product, and customer/partner signals, but public evidence is
    insufficient to underwrite current valuation, revenue quality, customer concentration, cap-table economics, and
    legal/regulatory posture.
  investment_or_diligence_thesis: "Proceed only with data-room diligence: public sources support eligibility as an
    uncovered private unicorn candidate, while the key investment questions are private financial quality,
    concentration, defensibility, compliance, and current governance terms."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn valuation anchor $1.50B is corroborated by CB Insights and funding/independent coverage.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public product positioning and product modules are documented by official company sources.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-003
      summary: Public customer, logo, or partner signals exist, though economics remain private.
      evidence_claim_ids:
        - EC-005
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Payments unit economics and loss exposure are not public
    - risk_id: R-002
      summary: Multi-country payments regulation and acquiring licenses create execution risk
    - risk_id: R-003
      summary: Fraud, chargeback, and security risks are core operating exposures
  key_evidence_gaps:
    - Audited/reviewed financial statements, ARR/net revenue, gross margin, burn, cash, debt, and backlog
    - Cap table, option pool, liquidation preferences, investor rights, SAFEs/notes/warrants
    - Revenue/TPV/member/customer concentration, churn, renewal, NRR, and references
    - Roadmap, technical architecture, incident history, R&D spend, and security reports
    - Litigation, regulatory, IP, insurance, and material-contract schedules
  recommended_next_steps:
    - Open financial/cap-table data room first, then customer/reference, product/security, legal/regulatory, HR, and
      governance workstreams.
    - Reconfirm private-company status, current valuation, and any post-public-source financings or exits directly with
      company counsel.
    - Do not rely on public logos or funding announcements as proof of revenue quality, retention, compliance, or
      valuation fairness.
