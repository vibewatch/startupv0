executive_summary:
  overall_assessment: >-
    Eligible for this public-source diligence run: Paystand appears active and private based on CB Insights unicorn-list/profile
    evidence and active company-owned web evidence, with no retained source showing IPO, acquisition of the target, or shutdown.
  investment_or_diligence_thesis: >-
    Proceed only with confirmatory diligence. Public evidence supports Paystand's unicorn status and active product/market
    positioning, but underwriting depends on private financial quality, customer concentration, retention, security/compliance,
    IP/legal and cap-table materials.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: CB Insights supports the $1B private-unicorn valuation anchor.
    evidence_claim_ids:
    - EC-001
    - EC-002
  - founder_claim_id: FC-003
    summary: >-
      Company-owned sources verify active product positioning: AR automation, payment network, AP automation, expense/corporate-card
      workflows, global payouts and embedded AI for collections, reconciliation, approvals and payouts.
    evidence_claim_ids:
    - EC-003
