    evidence_claim_ids:
    - EC-004
    - EC-005
  biggest_risks:
  - risk_id: R-001
    summary: Private financial quality and valuation support
  - risk_id: R-002
    summary: Payments, banking and stablecoin regulatory exposure
  - risk_id: R-003
    summary: Customer concentration and ROI claim substantiation
  key_evidence_gaps:
  - Audited financials, KPI definitions, cash/debt, cap table, financing documents and valuation support.
  - Top-customer revenue, retention/churn, contracts, concentration and references.
  - Security/compliance reports, legal/regulatory schedule, IP ownership, material contracts and insurance.
  - HRIS headcount, attrition, compensation/equity and leadership retention records.
  recommended_next_steps:
  - Request a standard growth-stage data room before relying on public valuation or operating claims.
  - Run customer-reference, product/security, legal/regulatory and financial quality-of-revenue diligence.
  - Reconcile all public metrics to source-system exports and board-approved forecasts.
