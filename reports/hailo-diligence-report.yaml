        source_ids:
          - SRC-009
          - SRC-018
      - row_id: T-021-R2
        values:
          topic: Environmental / product compliance
          public_signal: Hailo claims ISO 14001 and quality/environmental management posture
          verification_status: partially_verified
          risk_read: Hardware companies need environmental, RoHS/REACH, conflict minerals, and disposal compliance.
          diligence_request: RoHS/REACH declarations, conflict minerals, environmental audits, supplier compliance.
        evidence_claim_ids:
          - EC-014
        source_ids:
