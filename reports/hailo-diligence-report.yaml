      - row_id: T-021-R3
        values:
          topic: Data privacy and security
          public_signal: Terms/privacy and ISO 27001 claim; edge positioning emphasizes privacy benefits
          verification_status: partially_verified
          risk_read: Software and developer platforms create cybersecurity and privacy obligations.
          diligence_request: SOC/security reports, incident log, vulnerability policy, privacy DPA, subprocessors.
        evidence_claim_ids:
          - EC-014
          - EC-015
        source_ids:
          - SRC-013
          - SRC-014
