executive_summary:
  overall_assessment: "Hailo is eligible for this public-source diligence report: CB Insights lists it as a Tel
    Aviv, Israel private unicorn at $1.2B, its website/products/repos are active, and no completed
    IPO/acquisition/shutdown was identified in the public workflow. The report should be treated as a
    high-risk diligence roadmap because June 2026 public reporting describes layoffs of about half the
    workforce and evaluation of acquisition or investment alternatives."
  investment_or_diligence_thesis: Hailo has credible public edge-AI semiconductor assets, public
    customer/partner proof, and active software repositories. The diligence thesis is only investable if
    private records validate runway, customer revenue quality, product margins, supply-chain resilience, and
    post-layoff execution capacity against NVIDIA and other incumbents.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Hailo as a $1.2B private unicorn in Tel Aviv, Israel.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-004
      summary: Hailo publicly offers edge AI accelerators, AI vision processors, and a software suite with active
        GitHub repositories.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-006
        - EC-007
        - EC-016
    - founder_claim_id: FC-005
      summary: Raspberry Pi independently launched a Hailo-based $70 AI Kit, providing third-party partner validation.
      evidence_claim_ids:
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Financing runway / strategic alternatives after June 2026 layoffs and acquisition/investment
        evaluation.
    - risk_id: R-002
      summary: Competitive pressure and software ecosystem challenge versus NVIDIA and edge-AI incumbents.
    - risk_id: R-003
      summary: Financial quality, cap table, debt, revenue concentration, and unit economics are not publicly
        verifiable.
  key_evidence_gaps:
    - Audited financials, cash runway, debt, ARR/bookings bridge, gross margin, backlog, and AR aging.
    - Fully diluted cap table, financing terms, preferences, option pool, and current valuation support.
    - Top-customer revenue concentration, active design-win contracts, churn/NRR, and customer references.
    - Post-layoff org chart, retention plan, support capacity, and roadmap resourcing.
    - Foundry/OSAT/memory/distributor agreements, inventory, purchase commitments, and warranty/RMA history.
    - Patent assignments/FTO, legal docket clearance, export-control, labor-law, privacy/security, and
      insurance materials.
  recommended_next_steps:
    - Do not rely on the $1.2B tracker valuation without current financing and strategic-alternatives
      materials.
    - Prioritize cash runway, sale/investment process, customer concentration, and post-layoff support
      capacity before deeper technical work.
    - Run customer and distributor calls, independent benchmarks, and supply-chain diligence in parallel.
    - Obtain legal/IP/export/labor counsel reviews before any transaction or investment decision.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Hailo passes public unicorn eligibility via CB Insights, but financial diligence is dominated
      by private-data gaps and a severe 2026 financing/strategic-alternatives signal.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-007
    evidence_claim_ids:
      - EC-001
      - EC-008
      - EC-009
      - EC-018
      - EC-019
      - EC-022
    risk_ids:
      - R-001
      - R-003
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements, management accounts, sales/gross profit breakdown, backlog, or AR
          aging were public; only customer/unit/funding signals were found.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources disclose customer/unit/funding signals but not diligence-grade financial statements.
            evidence_claim_ids:
              - EC-008
              - EC-009
              - EC-019
            risk_ids:
              - R-003
        hidden_risks:
          - Financial quality and revenue recognition risk cannot be assessed publicly.
        evidence_gaps:
          - Audited financials, revenue by product/channel/geography, backlog, AR aging, gross margin, cash,
            debt, and burn are missing.
        follow_up_questions:
          - Provide audited financial statements, monthly management reports, ARR/booking bridge, backlog, AR
            aging, debt schedule, and cash runway.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-019
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No projections are public; restructuring and strategic alternatives make forecast assumptions a
          high-priority request.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: June 2026 layoffs and acquisition/investment alternatives contradict a simple growth-continuity
              assumption.
            evidence_claim_ids:
              - EC-009
              - EC-022
            risk_ids:
              - R-001
              - R-008
        hidden_risks:
          - Forecasts may assume financing, market adoption, or cost reductions that are not achievable
            post-layoff.
        evidence_gaps:
          - Three-year forecast, scenario model, bookings, pricing, gross margin, capex, working capital, and
            financing assumptions are missing.
        follow_up_questions:
          - Provide board-approved three-year model, downside case, cash runway, bridge financing plan, and
            customer pipeline assumptions.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-019
          - EC-022
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources name some investors but do not disclose share count, preferences, debt, warrants,
          notes, or option pool.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights and TechCrunch identify investors, but not ownership or security terms.
            evidence_claim_ids:
              - EC-001
              - EC-008
              - EC-018
            risk_ids:
              - R-003
        hidden_risks:
