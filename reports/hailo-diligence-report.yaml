risk_register:
  - risk_id: R-001
    risk_title: Financing runway and strategic alternatives risk
    risk_category: financing
    severity: high
    likelihood: high
    description: June 2026 layoffs and acquisition/investment alternatives suggest Hailo may need capital or a
      buyer despite unicorn status.
    impacted_chapter_ids:
      - I
      - VII
      - VIII
    impacted_section_ids:
      - I.B
      - I.C
      - I.D
      - VII.B
      - VII.G
      - VIII.F
    evidence_claim_ids:
      - EC-009
      - EC-018
      - EC-022
    mitigation_or_diligence_request: Request current cash, burn, runway, debt, board materials, banker mandate,
      restructuring plan, and transaction process status.
  - risk_id: R-002
    risk_title: Competitive pressure from NVIDIA and edge-AI incumbents
    risk_category: market
    severity: high
    likelihood: high
    description: NVIDIA Jetson offers a broad software stack and high-TOPS modules; software ecosystem is a known
      custom-chip challenge.
    impacted_chapter_ids:
      - IV
      - VI
    impacted_section_ids:
      - IV.A
      - VI.B
    evidence_claim_ids:
      - EC-017
      - EC-024
    mitigation_or_diligence_request: Normalize benchmarks, win/loss analysis, developer adoption, support burden,
      roadmap differentiation, and pricing versus incumbents.
  - risk_id: R-003
    risk_title: Financial quality and capitalization opacity
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public sources do not disclose audited financials, ARR, margin, backlog, AR aging, debt, cap
      table, preferences, or option pool.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-019
    mitigation_or_diligence_request: "Request full data room: audited financials, monthly management accounts, cap
      table, debt, financing docs, ARR bridge, and customer revenue schedule."
  - risk_id: R-004
    risk_title: Customer concentration and revenue quality unverified
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Public customer stories and the Raspberry Pi product launch do not reveal ARR, concentration,
      churn, or contract durability.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-019
    mitigation_or_diligence_request: Request top-customer schedule, contracts, design-win status, renewals, churn,
      pipeline, and customer reference calls.
  - risk_id: R-005
    risk_title: Product roadmap and edge-GenAI timing risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Hailo-10H and Hailo-15 extend the roadmap into edge GenAI and camera SoCs, but adoption, GA
      status, and market timing are not public.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-009
