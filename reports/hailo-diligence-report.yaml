report_metadata:
  report_title: Hailo Public-Source Startup Diligence Report
  target_company: Hailo Technologies Ltd.
  website: https://hailo.ai/
  known_aliases:
    - Hailo
    - Hailo AI
    - Hailo Technologies
    - Hailo Technologies Ltd.
  sector: Enterprise Tech; edge AI semiconductors; AI accelerators; AI vision processors; embedded inference software
  geography: Israel; Tel Aviv public unicorn listing; global edge AI customer and partner markets
  company_stage: Late-stage private unicorn with 2026 restructuring / strategic alternatives risk
  research_date: 2026-06-12
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified Hailo eligibility using CB Insights public unicorn tracker, active company web evidence, public
      search, and restructuring news; no Hailo report slug existed before this file was created.
    - "Used public sources only: company pages, product pages, customer/partner pages, independent news,
      public GitHub API, competitor product page, and public search snippets where direct legal databases were
      not available."
    - Treated company-published metrics as evidence of public claims, not audited truth; classified private
      data-room requirements as not_publicly_verifiable.
    - Did not use gh CLI, did not access private systems, did not read environment variables or secrets, and
      did not infer legal clearance from absence of public results.
  included_jurisdictions:
    - Israel
    - United States
    - European Union / global distribution markets
    - Public GitHub and global web sources
  excluded_topics:
    - No private data room, management interviews, customer calls, supplier calls, paid legal databases,
      corporate registry certificates, patent office exports, audit reports, security audits, or bank records
      were reviewed.
    - No legal, tax, investment, cybersecurity, export-control, patent freedom-to-operate, or valuation
      opinion is provided.
  user_provided_materials:
    - material_id: M-001
      title: User task specifying Hailo workstream and CB Insights candidate row
      type: prompt_argument
      date_received: 2026-06-12
      notes: User requested exactly one standard-depth public-source YAML diligence report for Hailo at
        reports/hailo-diligence-report.yaml.
