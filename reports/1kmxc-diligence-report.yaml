executive_summary:
  overall_assessment: 1KMXC appears to be an active private Chinese unicorn operating the YIGOLI robotic car-wash business. Public evidence supports unicorn-list status, product existence and a large public station footprint, but financial statements, station economics, customer concentration, safety records, cap table and regulatory matters remain largely private.
  investment_or_diligence_thesis: Proceed only with confirmatory diligence focused on station-level unit economics, franchise/partner contracts, equipment reliability, safety compliance, China regulatory exposure and financing preferences before relying on the headline unicorn valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support 1KMXC's private-unicorn screening status at $1B.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-012
    - founder_claim_id: FC-002
      summary: Company-owned sources support active product positioning in Robotics-enabled unmanned car wash and automotive service equipment.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-005
      summary: Public team or technical signals are consistent with an active operating company.
      evidence_claim_ids:
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Station economics and revenue quality are private
    - risk_id: R-006
      summary: China regulatory/safety and municipal-partner exposure is difficult to verify publicly
    - risk_id: R-004
      summary: Source quality is uneven and cap-table terms are not disclosed
  key_evidence_gaps:
    - Audited financial statements, KPI exports, cash/debt, burn/runway and forecast model.
    - Current cap table, preferences, debt, option pool, securities filings and financing documents.
    - Top-customer or top-partner revenue, contracts, renewals, churn and independent references.
    - CAC, payback, pipeline source mix, sales productivity and pricing/discount waterfall.
    - Legal, security/privacy/safety, IP, supplier and material-contract schedules.
  recommended_next_steps:
    - Run revenue-quality and financial diligence before relying on the public valuation headline.
    - Request customer/partner contracts, cohort metrics and independent reference calls.
    - Have counsel and technical specialists review IP, regulatory, security, safety and material-contract artifacts.
    - Benchmark against direct competitors using buyer interviews, win/loss data and pricing evidence.
