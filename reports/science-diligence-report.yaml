executive_summary:
  overall_assessment: Science Corporation is a credible active private unicorn candidate based on CB Insights, SEC Form D filings, company financing announcements, public clinical/product materials and hiring signals. The strongest public evidence supports the US$230M Series C, US$1.50B unicorn listing, PRIMA clinical evidence and active operations. The investment case remains highly contingent on private diligence around financial quality, cap table, regulatory approval, safety, reimbursement, manufacturing scale, IP chain and GTM execution.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. Science has unusually strong public financing and clinical-evidence signals for a private medtech/neurotechnology company, but the most value-relevant issues—approval, reimbursement, unit economics, clinical safety, manufacturing yield, revenue quality and financing preferences—are not publicly verifiable.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: CB Insights lists Science as a US$1.50B healthcare/life-sciences unicorn.
    evidence_claim_ids:
    - EC-001
  - founder_claim_id: FC-002
    summary: SEC filings and Science's announcement corroborate the US$230M Series C financing signal.
    evidence_claim_ids:
    - EC-002
    - EC-004
  - founder_claim_id: FC-003
    summary: Public PRIMA materials and PubMed/NEJM evidence support a real clinical-stage retinal implant program.
    evidence_claim_ids:
    - EC-006
    - EC-007
    - EC-016
  biggest_risks:
  - risk_id: R-003
    summary: Regulatory approval and commercialization are gating.
  - risk_id: R-001
    summary: Financial quality, revenue and cash/burn are not public.
  - risk_id: R-004
    summary: Clinical safety and durability require detailed review.
  - risk_id: R-009
    summary: PRIMA IP chain and Pixium-origin obligations require counsel diligence.
  key_evidence_gaps:
  - Audited financials, KPI pack, cash/debt, burn, forecast model and valuation bridge.
  - Full cap table, financing documents, preferences, side letters, debt, warrants and option pool.
  - Regulatory submissions/correspondence, QMS audits, clinical study reports, adverse-event narratives and approval/labeling status.
  - Pricing, reimbursement, provider/payer contracts, top customers, pipeline, CAC/payback and sales productivity.
  - Manufacturing yield, supplier concentration, quality metrics, device reliability, IP assignments and FTO.
  recommended_next_steps:
  - Run legal/regulatory diligence before assigning commercial value to PRIMA launch claims.
  - Run quality-of-earnings and capitalization diligence before relying on headline valuation.
  - Conduct KOL, payer, provider and patient-channel diligence to validate adoption and reimbursement.
  - Perform technical/manufacturing/IP diligence on PRIMA, Foundry, Biohybrid, Vessel and Pixium-origin assets.
