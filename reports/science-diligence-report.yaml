- figure_id: F-012
  title: Science diligence risk heatmap
  chapter_id: VIII
  section_id: VIII.G
  figure_type: risk_heatmap
  description: Risk heatmap for the full public-diligence risk register.
  purpose: Prioritize confirmatory diligence before relying on valuation or commercialization claims.
  spec_schema_ref: figure_spec_shapes.risk_heatmap
  spec:
    x_axis:
      label: likelihood
      scale:
      - low
      - medium
      - high
      - unknown
    y_axis:
      label: severity
      scale:
      - informational
      - low
      - medium
      - high
      - critical
    risk_points:
    - risk_id: R-001
      label: Financial quality and revenue are opaque
      severity: high
      likelihood: high
      rationale: No public audited financials, ARR, gross margin, cash, burn, debt, revenue concentration or retention metrics.
      evidence_claim_ids:
      - EC-012
      source_ids:
      - SRC-001
      - SRC-002
      - SRC-006
    - risk_id: R-002
      label: Headline valuation and cap table may mask preference or dilution risk
      severity: high
      likelihood: medium
      rationale: CB Insights valuation and financing announcements do not disclose liquidation preferences, debt, warrants, side letters or option-pool economics.
      evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-018
      source_ids:
      - SRC-001
      - SRC-002
      - SRC-003
      - SRC-004
      - SRC-005
      - SRC-006
      - SRC-013
    - risk_id: R-003
      label: Regulatory approval and commercialization are gating
      severity: high
      likelihood: high
      rationale: PRIMA appears clinical/investigational in public materials, with CE mark submission but no publicly verified full approval package.
      evidence_claim_ids:
      - EC-006
      - EC-008
      - EC-016
      source_ids:
      - SRC-008
      - SRC-010
      - SRC-018
      - SRC-006
    - risk_id: R-004
      label: Clinical safety and durability require detailed review
      severity: high
      likelihood: medium
      rationale: The public clinical abstract reports serious adverse events; durability, causality and post-market surveillance are not fully public.
      evidence_claim_ids:
      - EC-007
      source_ids:
      - SRC-009
    - risk_id: R-005
      label: Product maturity and reliability are not publicly proven at commercial scale
      severity: high
      likelihood: medium
      rationale: PRIMA device architecture is public, but manufacturing yield, failure rates, field service, training and usability are not.
      evidence_claim_ids:
      - EC-006
      - EC-009
      source_ids:
      - SRC-008
      - SRC-011
      - SRC-012
      - SRC-006
    - risk_id: R-006
      label: Customer, reimbursement and adoption economics are unknown
      severity: high
      likelihood: medium
      rationale: Patients and trials are public, but paying customers, reimbursement, provider contracts, channel economics and top-account concentration are not.
      evidence_claim_ids:
      - EC-017
      source_ids:
      - SRC-006
      - SRC-008
      - SRC-012
    - risk_id: R-007
      label: Manufacturing and MEMS/foundry scale-up dependency
      severity: high
      likelihood: medium
      rationale: Commercial launch depends on specialized device fabrication, quality systems and operational scale not publicly disclosed.
      evidence_claim_ids:
      - EC-009
