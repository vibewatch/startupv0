executive_summary:
  overall_assessment: "Eligible to report: public evidence supports Moloco as an
    active private unicorn, with 2021 $1.5B Series C valuation and later 2023
    secondary transactions valuing it at more than $2.0B; Nasdaq Private Market
    states it has not had an IPO and current 2026 company pages/case studies
    show active operations. The investability question remains unresolved
    because audited financials, cap table, customer concentration, contracts,
    pricing/margins and legal/security artifacts are not public."
  investment_or_diligence_thesis: Proceed only to confirmatory data-room
    diligence. Moloco could be a valuable independent AI adtech platform if its
    claimed revenue scale, profitability, first-party-data ML performance,
    customer retention and cloud-cost economics are real and durable against
    walled-garden/privacy competition.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Moloco remains publicly supported as a private unicorn with latest
        public valuation >$2.0B and no IPO identified.
      evidence_claim_ids:
        - EC-003
        - EC-029
        - EC-030
    - founder_claim_id: FC-002
      summary: Series C and 2021 $1.5B valuation are directly supported by Moloco’s
        financing release.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Current public pages and docs verify a broad product suite across Ads,
        Commerce Media, SDK, CTV and Streaming Monetization.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and current KPI support are private.
    - risk_id: R-003
      summary: Customer concentration, retention and renewal quality are unknown
        despite public logos/cases.
    - risk_id: R-004
      summary: Adtech competition, privacy and platform-policy pressure are
        structurally high.
  key_evidence_gaps:
    - Audited financials, KPI pack, cash/debt, cloud COGS, backlog, AR aging and
      forecast.
    - Current cap table, option pool, investor rights, secondary terms and 409A.
    - Top-customer ARR, NRR/churn, contract terms, concentration and reference
      calls.
    - Product pricing, margins, model performance, architecture, roadmap and
      security artifacts.
    - Legal/regulatory schedule, SOC/ISO evidence, DPAs, insurance, IP/OSS and
      HR/attrition data.
  recommended_next_steps:
    - Confirm eligibility again immediately before investment because IPO
      processes can move quickly.
    - Open data room with finance/cap table/customer/contract/legal/security/HR
      folders before relying on valuation.
    - Run customer reference calls across app, commerce media, CTV and SDK
      segments.
    - Run technical model/cloud/security review focused on Google Cloud
      dependency, model governance, data rights and gross margin.
    - Perform competitive win/loss and privacy/platform-policy sensitivity
      analysis.
