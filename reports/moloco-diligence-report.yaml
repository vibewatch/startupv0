diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, KPI pack, cash/debt, cloud COGS, backlog and AR aging.
    why_it_matters: Needed to validate revenue quality, profitability, cash runway
      and valuation support.
    suggested_source_or_request: Company CFO/data room; auditor and bank records.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, financing terms, secondary transfers and 409A.
    why_it_matters: Secondary valuation and private-company liquidity create
      dilution/liquidation preference risk.
    suggested_source_or_request: Company, counsel and investors.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level pricing, gross margin, roadmap, model
      benchmarks and architecture docs.
    why_it_matters: Public product pages do not prove economic defensibility or
      technical performance.
    suggested_source_or_request: Product/R&D/data room and customer calls.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer ARR, NRR/churn, concentration, contract status
      and severed relationships.
    why_it_matters: Customer quality is the biggest unverified commercial risk.
    suggested_source_or_request: Company CRM/contracts and customer references.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, market share, competitor pricing and
      privacy/platform-change sensitivity.
    why_it_matters: Adtech competition and platform policy can impair growth and margin.
    suggested_source_or_request: Sales/customer success, third-party benchmark and management interviews.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC, pipeline, quota attainment and
      partner-sourced bookings.
    why_it_matters: GTM efficiency determines whether public scale translates to
      durable growth.
    suggested_source_or_request: Sales ops/CRM and finance.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.A
    missing_information: Model governance, latency/SLOs, data lineage, IP
      assignments and OSS/license scan.
    why_it_matters: Technical defensibility and compliance cannot be validated from
      marketing pages.
    suggested_source_or_request: CTO/R&D/security data room.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS census, attrition, compensation/equity, org chart and
      employee-relations log.
    why_it_matters: Rapid scaling and private-equity compensation can affect
      retention and execution.
    suggested_source_or_request: HR/legal data room.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Litigation/regulatory schedule, SOC/ISO evidence, DPAs,
      subprocessors, incident log and insurance.
    why_it_matters: Adtech privacy/security/legal exposure is material and mostly private.
    suggested_source_or_request: Counsel/security/compliance data room.
    priority: high
