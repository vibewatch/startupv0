risk_register:
  - risk_id: R-001
    risk_title: Financial quality and KPI pack not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public revenue/profitability claims are useful but not audited
      diligence evidence; backlog, AR aging, gross margin, CAC, cloud COGS, cash
      and debt are private.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - II.A
      - V.D
    evidence_claim_ids:
      - EC-004
      - EC-024
      - EC-025
    mitigation_or_diligence_request: Request audited financials, monthly KPI pack,
      revenue-recognition memo, gross margin by product, cash/debt and forecast.
  - risk_id: R-002
    risk_title: Valuation support relies on secondary-market pricing
    risk_category: financing
    severity: high
    likelihood: medium
    description: Latest public valuation is >$2B from secondary transactions that
      generated no primary proceeds; valuation support should be reconciled to
      current fundamentals.
