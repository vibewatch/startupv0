executive_summary:
  overall_assessment: "reMarkable is a real, active, private Norwegian unicorn with unusually strong public
    financial disclosure for a private hardware/software company: FY2024 revenue of USD 433.8m, positive
    EBITDA, cash of USD 111.5m, and a growing subscription layer. Public evidence also shows product-market
    traction around Paper Pro, a three-tier device lineup, Connect subscriptions, and enterprise security
    positioning. The main diligence posture is not whether the company exists, but whether its hardware-led
    growth, channel expansion, subscription attach, supply-chain execution, and private capitalization are
    sustainable and investable under downside cases."
  investment_or_diligence_thesis: The attractive thesis is a profitable, design-led e-paper hardware company
    converting a focused productivity device base into recurring software and enterprise fleet-management
    revenue. The diligence challenge is that key value drivers—SKU margins, channel concentration, customer
    concentration, supplier contracts, product roadmap, cohort retention, cap table, and legal/security
    artifacts—remain private.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Active private Norwegian company and CB Insights-tracker unicorn status are supported by
        user-provided tracker evidence, company IR, and official registries.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-003
      summary: FY2024 growth and Paper Pro launch impact are strongly supported by the Q4 2024 financial report.
      evidence_claim_ids:
        - EC-003
        - EC-008
        - EC-027
    - founder_claim_id: FC-004
      summary: Subscription revenue and Connect pricing/features are publicly verified, though cohort quality
        remains private.
      evidence_claim_ids:
        - EC-004
        - EC-010
    - founder_claim_id: FC-005
      summary: Enterprise/security claims are partially verified through public Connect for Business and
        trust-center materials.
      evidence_claim_ids:
        - EC-010
        - EC-023
  biggest_risks:
    - risk_id: R-001
      summary: Hardware launch-cycle concentration and Paper Pro dependency can create demand, inventory, return,
        and warranty volatility.
    - risk_id: R-012
      summary: Cap table, preferred terms, option dilution, and current valuation are opaque despite registry
        share-capital visibility.
    - risk_id: R-002
      summary: Supply-chain, tariff/FX, indirect-channel, and gross-margin risks are material for a hardware-led
        business.
    - risk_id: R-003
      summary: Public logos do not reveal revenue concentration, renewal quality, backlog, or enterprise pipeline
        conversion.
  key_evidence_gaps:
    - Audited financial statements and management accounts with product/channel/geography gross margins, AR
      aging, backlog, cash flows, and revenue-recognition memos.
    - Current cap table, preference stack, fully diluted ownership, option plan, investor rights, debt
      indenture, covenant model, and lease/supplier-finance commitments.
    - SKU-level sell-through, returns, warranty, inventory aging, supplier concentration, manufacturing
      contracts, and channel sell-through/economics.
    - Customer revenue/concentration, retention, renewal, pipeline, enterprise references, and customer
      success metrics.
    - Security, privacy, IP, litigation, regulatory, tax, insurance, and supply-chain audit artifacts.
  recommended_next_steps:
    - Run a financial data-room review focused on SKU/channel gross margins, subscriptions, revenue
      recognition, cash flow, working capital, debt covenants, and projections.
    - Conduct product/channel diligence with sell-through, return/warranty, inventory, supplier, and
      reseller-agreement schedules.
    - Perform customer and enterprise diligence through top-customer schedules, reference calls, pipeline
      review, subscription cohorts, and security-procurement artifacts.
    - Engage counsel for cap table, debt, IP/FTO, privacy/security, product-compliance, litigation/regulatory,
      tax, insurance, and supply-chain legal diligence.
