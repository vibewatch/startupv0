          - I.A.6
        summary: Public Q4 2024 and FY2024 financial data verify revenue, EBITDA, gross margin, subscription revenue,
          cash, and selected balance-sheet metrics for FY2024/FY2023; audited statements, full cash flows, AR
          aging, backlog, and detailed product/channel/geography cuts remain private.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: FY2024 revenue was USD 433.8m, up 28.3% from FY2023; Q4 2024 revenue was USD 173.7m, up 75% YoY.
            evidence_claim_ids: &a1
