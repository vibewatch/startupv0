report_metadata:
  report_title: reMarkable / Remarkable AS Public-Source Startup Diligence Report
  target_company: Remarkable AS (reMarkable)
  website: https://remarkable.com/
  known_aliases:
    - reMarkable
    - REMARKABLE AS
    - Remarkable AS
    - reMarkable Invest AS
    - reMarkable Paper Pro
    - reMarkable Paper Pure
  sector: Consumer electronics, e-paper tablets, productivity software subscriptions, enterprise device management
  geography: Norway headquartered; global consumer/business ecommerce and retail distribution; UK overseas
    company registration
  company_stage: Late-stage private unicorn / scaled hardware-software company
  research_date: 2026-05-17
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise stated; NOK for Norwegian share capital and bond
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prepared a public-source diligence report only, prioritizing primary company pages, investor relations
      materials, regulatory registries, patent records, and official competitor pages.
    - Used the user-provided CB Insights unicorn tracker row as the eligibility source for slug remarkable,
      valuation, date joined, geography, industry, and named investor.
    - Treated company-published financial/product/security/customer statements as evidence requiring private
      verification, not audited proof except where official registry data applies.
    - Separated verified public facts from private diligence gaps for each checklist section.
  included_jurisdictions:
    - Norway
    - United Kingdom
    - United States market context
    - EU/EEA privacy and supply-chain context
    - Global ecommerce/retail context where public sources identify channels
  excluded_topics:
    - No private data room, management interviews, customer reference calls, supplier calls, paid database
      exports, bank statements, legal opinions, or non-public board materials were reviewed.
    - No investment recommendation, valuation opinion, tax opinion, cybersecurity attestation, IP
      freedom-to-operate opinion, or legal clearance is provided.
    - No comprehensive court/regulatory search was performed beyond scoped public web sources and official
      registry pages.
  user_provided_materials:
    - material_id: M-001
      title: User request and CB Insights tracker selection
      type: prompt_argument
      date_received: 2026-05-17
      notes: User selected reMarkable / Remarkable AS from CB Insights unicorn tracker and requested a standard
        public-source diligence YAML report at reports/remarkable-diligence-report.yaml.
