risk_register:
  - risk_id: R-001
    risk_title: Hardware launch-cycle and demand concentration
    risk_category: product
    severity: high
    likelihood: medium
    description: 2024 growth was heavily linked to Paper Pro launch success; a slower refresh cycle, returns,
      warranty issues, or inventory mismatch could pressure growth and margins.
    impacted_chapter_ids:
      - I
      - II
      - VI
    impacted_section_ids:
      - I.A
      - II.A
      - VI.B
    evidence_claim_ids: *a65
    mitigation_or_diligence_request: Request SKU-level sell-through, returns, warranty, inventory aging, roadmap, and sensitivity cases.
  - risk_id: R-002
    risk_title: Supply-chain, component, FX, tariff, and gross-margin exposure
    risk_category: operational
    severity: high
    likelihood: medium
    description: Hardware production, indirect retail, electronics suppliers, supply-chain financing, and
      international operations expose the company to material margin volatility.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - III.E
      - VIII.C
    evidence_claim_ids: *a66
    mitigation_or_diligence_request: Request supplier concentration, BOM, tariffs, FX hedges, purchase commitments, and contingency plans.
  - risk_id: R-003
    risk_title: Customer concentration and enterprise traction opacity
    risk_category: customer
    severity: medium
    likelihood: high
    description: Public logos exist but no top-customer revenue, backlog, contract length, NRR, churn, or pipeline
      data is available.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a67
    mitigation_or_diligence_request: Request top-25 customer schedule, revenue by customer/channel/geography,
      backlog, churn, renewal pipeline, and reference calls.
  - risk_id: R-004
    risk_title: Floating-rate bond and covenant exposure
    risk_category: financing
    severity: high
    likelihood: medium
    description: The NOK 500m bond bears 3m NIBOR + 7% and matures in 2027; financial covenants and refinancing
      depend on cash generation and markets.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids: *a68
    mitigation_or_diligence_request: Review bond terms, covenant model, refinancing alternatives, cash
      restrictions, and interest-rate sensitivity.
  - risk_id: R-005
    risk_title: Competitive pressure from Amazon, Kobo, Supernote, BOOX, and general tablets
    risk_category: market
    severity: medium
    likelihood: high
    description: Competitors offer lower starting prices, reading ecosystems, Android app breadth, or modular
      hardware, making reMarkable’s premium focus positioning vulnerable.
    impacted_chapter_ids:
      - II
      - IV
    impacted_section_ids:
      - II.A
      - IV.A
    evidence_claim_ids: *a69
    mitigation_or_diligence_request: Request win/loss, market-share estimates, CAC trends, price elasticity, and
      customer retention by segment.
  - risk_id: R-006
    risk_title: Enterprise cloud/security execution risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Connect for Business, cloud sync, SAML, remote wipe, AI tools, and integrations increase privacy,
      cybersecurity, and compliance obligations.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.B
      - VIII.F
    evidence_claim_ids: *a70
    mitigation_or_diligence_request: Review ISO scope, pentest/SOC reports, DPA, subprocessors, incident history,
      retention controls, and enterprise SLAs.
  - risk_id: R-007
    risk_title: Supplier human-rights and electronics-manufacturing compliance exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: The company acknowledges supply-chain human-rights obligations, but supplier list, audit
      findings, and remediation status are not public.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.C
    evidence_claim_ids: *a71
    mitigation_or_diligence_request: Request supplier audits, corrective actions, modern-slavery/HSE policies, and board oversight evidence.
  - risk_id: R-008
    risk_title: Leadership transition and scaling process risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: A professional CEO transition and 472-employee scale require governance, retention, operating
      cadence, and culture diligence.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.F
      - VII.G
    evidence_claim_ids: *a72
    mitigation_or_diligence_request: Request org chart, leadership scorecards, retention plans, attrition,
      engagement survey, and board materials.
  - risk_id: R-009
    risk_title: IP validity, ownership, and freedom-to-operate remain unverified
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public patent records show assets but do not prove full ownership chain, FTO, non-infringement,
      trademark coverage, or absence of disputes.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.D
    evidence_claim_ids: *a73
    mitigation_or_diligence_request: Commission patent/trademark search, assignment review, FTO opinion, OSS scan, and license audit.
  - risk_id: R-010
    risk_title: Litigation, regulatory, tax, and product-compliance clearance not complete
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: No adverse litigation was identified in scoped sources, but no comprehensive multi-jurisdiction
      docket/regulatory search was performed.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.B
      - VIII.A
      - VIII.B
      - VIII.G
    evidence_claim_ids: *a74
    mitigation_or_diligence_request: Engage counsel for court/regulator searches, tax review, consumer warranty,
      privacy, environmental, and product-compliance diligence.
  - risk_id: R-011
    risk_title: Subscription revenue recognition and attach-rate quality
    risk_category: financial
    severity: medium
    likelihood: medium
    description: Subscription growth partly reflects IFRS free-trial treatment; conversion, churn, and cohort
      economics are not public.
    impacted_chapter_ids:
      - I
      - II
      - VI
    impacted_section_ids:
      - I.A
      - II.A
      - VI.A
    evidence_claim_ids: *a75
    mitigation_or_diligence_request: Request revenue-recognition memo, cohorts, attach/conversion, churn, deferred revenue, and ARR bridge.
  - risk_id: R-012
    risk_title: Cap table, preference stack, dilution, and current valuation opaque
    risk_category: financing
    severity: high
    likelihood: medium
    description: Registry share capital and public financing articles do not disclose owners, preferred terms,
      options, warrants, convertibles, or latest valuation.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a76
    mitigation_or_diligence_request: Request current cap table, fully diluted ledger, option plan, investor
      rights, waterfall, SAFEs/notes, and 409A/valuation materials.
  - risk_id: R-013
    risk_title: Indirect-channel concentration and reseller economics
    risk_category: market
    severity: medium
    likelihood: medium
    description: Q4 success was linked to Amazon and Best Buy; reseller terms, return rights, marketing
      commitments, and channel inventory are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - V.A
      - V.C
    evidence_claim_ids: *a77
    mitigation_or_diligence_request: Request channel revenue/margin, reseller agreements, sell-in/sell-through,
      returns, MDF, and inventory by channel.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited FY2022-FY2024 financial statements, management accounts,
      product/channel/geography gross margin, backlog, AR aging, and cash-flow statements.
    why_it_matters: Hardware/channel mix can materially swing gross margin; Q4 gross margin fell 2.4 percentage
      points YoY despite FY margin improvement.
    suggested_source_or_request: Provide audited financials, monthly management accounts, SKU/channel/geography
      gross margin, AR aging, backlog, and revenue-recognition memos.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Three-year quarterly projections, assumptions by product/channel/geography, pricing
      sensitivity, capex/depreciation, working capital, financing assumptions, and downside cases.
    why_it_matters: Forecasts could depend on another strong hardware cycle and successful enterprise subscription
      attach; FX, tariffs, and country-specific compliance could affect margins.
    suggested_source_or_request: Provide board-approved projections, budget-to-actual history, scenario
      sensitivities, and a bridge from FY2024 actuals to management plan.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, fully diluted ownership, shareholder register, option plan,
      warrants/notes, debt agreements, lease schedule, and covenant model.
    why_it_matters: Floating-rate debt, lease commitments, supplier financing, and undisclosed preferred equity
      terms can alter downside outcomes.
    suggested_source_or_request: Provide cap table, investor-rights documents, option ledger, bond indenture,
      covenant certificates, leases, and supplier-finance agreements.
    priority: high
  - gap_id: G-004
    chapter_id: I
    section_id: I.D
    missing_information: Tax returns, NOLs, VAT/GST positions, revenue-recognition memo, capitalization policy,
      and full financing history.
    why_it_matters: Revenue recognition, tax exposure, preference stack, and current valuation cannot be fully
      assessed from public sources.
    suggested_source_or_request: Provide tax memos, revenue-recognition analysis, audited statements, financing
      documents, and valuation materials.
    priority: high
  - gap_id: G-005
    chapter_id: II
    section_id: II.A
    missing_information: Product-level revenue, gross margin, customer cohorts, market share, warranty/returns,
      roadmap timing, and cost structure.
    why_it_matters: A premium hardware position increases exposure to product-cycle timing, inventory, warranties,
      and competition from lower-priced devices.
    suggested_source_or_request: Provide SKU P&L, returns/warranty dashboard, product roadmap, market-share
      estimates, attach-rate cohorts, and product customer references.
    priority: medium
  - gap_id: G-006
    chapter_id: III
    section_id: III.A
    missing_information: Top customer schedule by revenue/application/product, purchase timing, renewal date, and
      customer ownership.
    why_it_matters: Public logos may represent small deployments, pilots, marketing permissions, or historical
      relationships rather than material revenue.
    suggested_source_or_request: Provide top-25 customer schedule and permit reference calls with representative
      consumer, prosumer, and enterprise accounts.
    priority: medium
  - gap_id: G-007
    chapter_id: III
    section_id: III.B
    missing_information: Partner agreements, revenue contribution, reseller margins, cloud commitments, service
      levels, exclusivity, and termination rights.
    why_it_matters: Channel, integration, and cloud-provider agreements may include commitments, return rights,
      outages, margin leakage, or data-processing risk.
    suggested_source_or_request: Provide reseller, integration, cloud, and strategic-partnership agreements plus
      revenue/gross-margin contribution by partner.
    priority: medium
  - gap_id: G-008
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, channel, geography, and product; concentration above 5%; retention, churn, and NRR.
    why_it_matters: A large consumer channel, retailer, distributor, enterprise account, or geography could
      account for material revenue without public visibility.
    suggested_source_or_request: Provide customer concentration schedule, channel revenue, ARR/customer bridge,
      and churn/retention analysis.
    priority: high
  - gap_id: G-009
    chapter_id: III
    section_id: III.D
    missing_information: Lost-customer, lost-partner, and supplier-change schedules for 2024-2026, with reasons
      and financial impact.
    why_it_matters: Undisclosed churn, retailer de-listing, supplier quality disputes, or cloud/integration
      changes could signal execution problems.
    suggested_source_or_request: Provide all material relationship terminations or non-renewals in the last 24
      months, including customers, suppliers, resellers, and technology partners.
    priority: medium
  - gap_id: G-010
    chapter_id: III
    section_id: III.E
    missing_information: Top supplier list by spend, manufacturing contracts, component dependencies, audit
      results, quality metrics, and cloud commitments.
    why_it_matters: Sole-source components, supplier labor/human-rights issues, quality failures, freight/tariffs,
      or cloud outages could affect operations.
    suggested_source_or_request: Provide top supplier schedule, manufacturing and cloud agreements,
      quality/warranty metrics, audit reports, and contingency plans.
    priority: high
  - gap_id: G-011
    chapter_id: IV
    section_id: IV.A
    missing_information: Market share, win/loss, customer switching data, price elasticity, independent reviews,
      and sell-through by competitor.
    why_it_matters: Big Tech and ecosystem competitors can use content libraries, channels, and lower pricing to
      pressure reMarkable’s premium positioning.
    suggested_source_or_request: Provide competitive win/loss analysis, market-share estimates, pricing
      elasticity, review/NPS comparisons, and customer reference comparisons.
    priority: medium
  - gap_id: G-012
    chapter_id: V
    section_id: V.A
    missing_information: Marketing spend, CAC, channel margin, international distribution, reseller terms, sales
      plan, and budget sufficiency.
    why_it_matters: Channel expansion may raise return rights, discounting, inventory, marketing, and gross-margin pressure.
    suggested_source_or_request: Provide GTM plan, CAC/payback by channel, reseller agreements, marketing budget,
      country revenue, and sales hiring plan.
    priority: medium
  - gap_id: G-013
    chapter_id: V
    section_id: V.B
    missing_information: Customer health, renewal/expansion schedule, sales pipeline, ACV distribution, and
      reference-call evidence.
    why_it_matters: Enterprise forecasts could rely on immature pipeline, pilots, or small deployments rather than
      repeatable large accounts.
    suggested_source_or_request: Provide customer pipeline by stage, top account plans, renewal forecast,
      reference list, and customer success metrics.
    priority: high
  - gap_id: G-014
    chapter_id: V
    section_id: V.C
    missing_information: CAC, channel mix, LTV, payback, referral/organic traffic, reseller conversion, enterprise
      pipeline, and geographic mix.
    why_it_matters: If paid/direct acquisition or retailer promotions become more expensive, growth may depend on
      lower-margin channels.
    suggested_source_or_request: Provide new-business source-of-leads analysis, channel cohort economics,
      conversion by route, and LTV/CAC by segment.
    priority: medium
  - gap_id: G-015
    chapter_id: V
    section_id: V.D
    missing_information: Sales roster, compensation, quota, attainment, pipeline coverage, cycle length, ramp, and hiring plan.
    why_it_matters: Enterprise growth may require larger sales and customer-success investment than implied by
      public product pages.
    suggested_source_or_request: Provide sales productivity model, comp plans, quotas, quota attainment, sales
      cycle by segment, pipeline coverage, and new-hire ramp plan.
    priority: medium
  - gap_id: G-016
    chapter_id: V
    section_id: V.E
    missing_information: Marketing budget, campaign ROI, channel incentives, sales hiring plan, brand spend, and
      spend-to-plan forecast.
    why_it_matters: A cash-positive year can still mask heavy required launch, channel, and enterprise-sales investment.
    suggested_source_or_request: Provide marketing budget, historical campaign ROI, channel incentives, hiring
      plan, and forecasted GTM spend by quarter.
    priority: medium
  - gap_id: G-017
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D org chart, key personnel, capitalization policy, project roadmaps, QA metrics,
      security reviews, and technical debt.
    why_it_matters: Capitalized development, AI/cloud costs, and hardware/software integration complexity can hide
      execution or impairment risk.
    suggested_source_or_request: Provide R&D org chart, roadmap, capitalization policy, engineering headcount,
      development project ledger, QA metrics, and incident history.
    priority: medium
  - gap_id: G-018
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, development budget, launch gates, critical technology dependencies, beta
      feedback, and product risk register.
    why_it_matters: Pipeline may require expensive hardware refreshes, cloud/AI spend, security certifications,
      and supplier coordination.
    suggested_source_or_request: Provide product roadmap with milestones, costs, dependency map, beta/adoption
      metrics, launch-readiness criteria, and post-launch warranty/return data.
    priority: medium
  - gap_id: G-019
    chapter_id: VII
    section_id: VII.A
    missing_information: Current org chart, board list, executive roster, reporting lines, committees, advisors,
      and succession plan.
    why_it_matters: Leadership transition and scale can create governance, decision-rights, retention, and
      accountability gaps.
    suggested_source_or_request: Provide current org chart, board and committee roster, management biographies,
      succession plan, and key-person retention package.
    priority: medium
  - gap_id: G-020
    chapter_id: VII
    section_id: VII.B
    missing_information: Monthly headcount by function/location, contractor count, open roles, projected hiring
      plan, attrition, and compensation bands.
    why_it_matters: Rapid scaling without visible function/location controls may pressure management systems and margins.
    suggested_source_or_request: Provide headcount history/projections by function/location, recruiting plan,
      attrition, contractors, and compensation budget.
    priority: medium
  - gap_id: G-021
    chapter_id: VII
    section_id: VII.C
    missing_information: Full C-suite and VP biographies, tenure, age where appropriate/public, references,
      background checks, and employment agreements.
    why_it_matters: Single-leader transition, missing bench depth, or unclear founder role could impact execution.
    suggested_source_or_request: Provide senior management biographies, employment agreements, references, board
      evaluations, and succession plan.
    priority: medium
  - gap_id: G-022
    chapter_id: VII
    section_id: VII.D
    missing_information: Executive employment agreements, compensation plans, bonus plans, benefits, pension,
      severance, change-of-control, and retention grants.
    why_it_matters: Retention, severance, change-of-control, or compensation gaps can create hidden liabilities or
      execution risk.
    suggested_source_or_request: Provide employment agreements, compensation bands, bonus plans, benefits,
      severance/change-of-control terms, and retention analysis.
    priority: medium
  - gap_id: G-023
    chapter_id: VII
    section_id: VII.E
    missing_information: Stock option plan, equity grant ledger, vesting schedules, exercise prices, approvals, and tax treatment.
    why_it_matters: Unseen option pool, repricing, secondary sales, or retention grants could materially dilute
      investors or affect employee retention.
    suggested_source_or_request: Provide option plan, grant ledger, vesting schedule, exercise prices, option pool
      history, and dilution waterfall.
    priority: medium
  - gap_id: G-024
    chapter_id: VII
    section_id: VII.F
    missing_information: Employee complaints, investigations, grievances, works council/union matters, engagement
      surveys, and HR litigation.
    why_it_matters: Employee complaints, retention issues, works council/union matters, or culture issues may not
      be visible publicly.
    suggested_source_or_request: Provide HR/legal employee-relations schedule, complaints/investigations,
      engagement survey, and retention/culture analysis.
    priority: medium
  - gap_id: G-025
    chapter_id: VII
    section_id: VII.G
    missing_information: Turnover for the last two years, regretted attrition, retention plans, benefits,
      exit-interview themes, and open roles.
    why_it_matters: High attrition in engineering, product, supply chain, or enterprise sales could impair product
      roadmap and GTM execution.
    suggested_source_or_request: Provide 24-month turnover by function/location/level, regretted attrition, exit
      themes, retention grants, benefits, and hiring plan.
    priority: medium
  - gap_id: G-026
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Docket searches across Norway, EU/EEA, US, UK and key sales/supplier jurisdictions;
      management litigation schedule; counsel letters.
    why_it_matters: Undisclosed consumer, IP, warranty, employment, supplier, or privacy claims may exist outside
      scoped sources.
    suggested_source_or_request: Have counsel provide pending/threatened claims schedule, docket search results,
      claims history, and legal letters.
    priority: high
  - gap_id: G-027
    chapter_id: VIII
    section_id: VIII.B
    missing_information: Company-initiated claims, IP enforcement, collections, settlement agreements, and outside counsel list.
    why_it_matters: IP enforcement, supplier disputes, or customer collections could affect costs or relationships.
    suggested_source_or_request: Provide initiated litigation/arbitration schedule, settlements, enforcement strategy, and counsel budget.
    priority: medium
  - gap_id: G-028
    chapter_id: VIII
    section_id: VIII.C
    missing_information: Supplier audits, HSE policies, product safety certifications, recalls, environmental
      compliance, recycling/WEEE, and incident logs.
    why_it_matters: Supplier labor, product safety, environmental compliance, recycling, battery/shipping, and
      workplace-safety issues can create legal and reputation risk.
    suggested_source_or_request: Provide HSE/product-safety compliance package, supplier audit results, recall
      history, environmental reports, and safety incident logs.
    priority: medium
  - gap_id: G-029
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Patent/trademark register search, assignments, encumbrances, licenses, open-source scan,
      FTO opinion, and IP disputes.
    why_it_matters: A competitor, supplier, or former employee could challenge ownership or assert infringement;
      open-source/license issues may exist in software stack.
    suggested_source_or_request: Provide complete IP schedule, official register extracts, assignments, licenses,
      OSS scan, and FTO/non-infringement analysis.
    priority: high
  - gap_id: G-030
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, broker summaries, claims history, coverage limits, exclusions,
      premiums, and risk assessments.
    why_it_matters: Uninsured recalls, cyber incidents, product liability, transit losses, or D&O claims could be material.
    suggested_source_or_request: Provide insurance schedule, policy copies, broker letter, claims history, product
      recall/cyber coverage, and coverage-gap analysis.
    priority: medium
  - gap_id: G-031
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contract schedule, MSAs, reseller agreements, cloud contracts, leases, debt
      agreements, customer DPAs, supplier contracts, and insurance.
    why_it_matters: Change-of-control, minimum purchase, return rights, data-processing, SLA, indemnity, or
      termination clauses may constrain strategy.
    suggested_source_or_request: Provide all material contracts, contract summary schedule, change-of-control
      clauses, SLAs, indemnities, termination rights, and side letters.
    priority: high
  - gap_id: G-032
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, investigations, product compliance certificates, tax/VAT
      audits, privacy incident reports, and consumer complaint/recall history.
    why_it_matters: Privacy, consumer-protection, product-safety, tax, customs, environmental, labor, and
      supply-chain investigations could exist outside scoped sources.
    suggested_source_or_request: Have counsel/accountants provide regulator search results, compliance
      certificates, tax/VAT audit history, privacy incident logs, and consumer complaint/recall data.
    priority: medium
