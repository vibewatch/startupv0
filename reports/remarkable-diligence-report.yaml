  - figure_id: F-011
    title: Diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Severity/likelihood map of core public-source diligence risks.
    purpose: Prioritize follow-up requests and management diligence.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Hardware launch-cycle and demand concentration
          severity: high
          likelihood: medium
          rationale: 2024 growth was heavily linked to Paper Pro launch success; a slower refresh cycle, returns,
            warranty issues, or inventory mismatch could pressure growth and margins.
          evidence_claim_ids: &a65
            - EC-003
            - EC-008
            - EC-009
            - EC-017
          source_ids:
            - SRC-003
            - SRC-009
            - SRC-010
            - SRC-011
            - SRC-012
        - risk_id: R-002
          label: Supply-chain, component, FX, tariff, and gross-margin exposure
          severity: high
          likelihood: medium
          rationale: Hardware production, indirect retail, electronics suppliers, supply-chain financing, and
            international operations expose the company to material margin volatility.
          evidence_claim_ids: &a66
            - EC-013
            - EC-027
            - EC-028
          source_ids:
            - SRC-003
            - SRC-018
            - SRC-019
        - risk_id: R-003
          label: Customer concentration and enterprise traction opacity
          severity: medium
          likelihood: high
          rationale: Public logos exist but no top-customer revenue, backlog, contract length, NRR, churn, or pipeline
            data is available.
          evidence_claim_ids: &a67
            - EC-011
            - EC-016
          source_ids:
            - SRC-014
            - SRC-003
        - risk_id: R-004
          label: Floating-rate bond and covenant exposure
          severity: high
          likelihood: medium
          rationale: The NOK 500m bond bears 3m NIBOR + 7% and matures in 2027; financial covenants and refinancing
            depend on cash generation and markets.
          evidence_claim_ids: &a68
            - EC-005
            - EC-028
          source_ids:
            - SRC-002
            - SRC-003
        - risk_id: R-005
          label: Competitive pressure from Amazon, Kobo, Supernote, BOOX, and general tablets
          severity: medium
          likelihood: high
          rationale: Competitors offer lower starting prices, reading ecosystems, Android app breadth, or modular
            hardware, making reMarkable’s premium focus positioning vulnerable.
          evidence_claim_ids: &a69
            - EC-014
            - EC-009
          source_ids:
            - SRC-010
