risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and revenue quality
    severity: high
    likelihood: high
    evidence_strength: strong for missing-data conclusion
    confidence: medium
    description: No audited financials, revenue by product/customer, gross margin, cash runway, backlog or AR schedules are public.
    evidence_claim_ids:
      - EC-017
      - EC-019
    mitigation_or_diligence_request: Obtain full financial statements, ARR bridge, customer schedule, cloud cost/margin model and board-approved forecast.
  - risk_id: R-002
    risk_title: Valuation and funding source inconsistency
    severity: high
    likelihood: medium
    evidence_strength: medium
    confidence: medium
    description: CB list, IBM and secondary profiles support a near-$1B valuation, but public funding totals and dates conflict.
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-005
    mitigation_or_diligence_request: Reconcile cap table, financing documents, proceeds, share price, liquidation preferences and side letters.
  - risk_id: R-003
    risk_title: Compute and supplier concentration
    severity: high
    likelihood: high
    evidence_strength: strong
    confidence: high
    description: IBM Cloud, AMD silicon/ROCm and TensorWave infrastructure are central to the product roadmap and likely cost base.
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-008
      - EC-020
    mitigation_or_diligence_request: Review supplier contracts, capacity, minimum commitments, failover plans and utilization/margin data.
  - risk_id: R-004
    risk_title: Customer traction and concentration opacity
    severity: high
    likelihood: high
    evidence_strength: strong for gap
    confidence: medium
    description: No top-customer list, revenue concentration, churn, NRR/GRR, pipeline or named production customer evidence is public.
    evidence_claim_ids:
      - EC-019
    mitigation_or_diligence_request: Conduct customer reference calls and review contracts, usage cohorts, pipeline and churn.
  - risk_id: R-005
    risk_title: Model safety, abuse and regulated-use exposure
    severity: high
    likelihood: medium
    evidence_strength: strong
    confidence: medium
    description: Public assets include voice cloning, EEG research-use disclaimers and unmoderated model warnings, plus agentic execution risk.
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Review red-team reports, safety policies, AUP enforcement, data rights, consent controls and incident history.
  - risk_id: R-006
    risk_title: Competitive pressure and uncertain moat
    severity: medium
    likelihood: high
    evidence_strength: medium
    confidence: medium
    description: Zyphra competes with larger frontier labs, hyperscalers, inference providers and neoclouds; open assets may be replicable.
    evidence_claim_ids:
      - EC-021
      - EC-024
    mitigation_or_diligence_request: Obtain win/loss, independent benchmarks, customer switching analysis and defensibility/IP memo.
  - risk_id: R-007
    risk_title: Legal/privacy/security packet not public
    severity: high
    likelihood: medium
    evidence_strength: medium
    confidence: medium
    description: Public Terms reference separate customer agreement, AUP and DPA, but those documents, SOC/security audits, privacy controls and insurance are not reviewed.
    evidence_claim_ids:
      - EC-015
      - EC-023
    mitigation_or_diligence_request: Request SOC 2/security packet, customer terms, DPA, AUP, privacy policy, insurance, litigation and regulatory schedules.
  - risk_id: R-008
    risk_title: Team/headcount inconsistency and key-person risk
    severity: medium
    likelihood: medium
    evidence_strength: medium
    confidence: medium
    description: Commercial databases conflict on founding year, team size and some leadership roles; public org chart is incomplete.
    evidence_claim_ids:
      - EC-016
      - EC-017
    mitigation_or_diligence_request: Verify payroll census, org chart, founder employment/IP agreements, retention and succession plans.
  - risk_id: R-009
    risk_title: Roadmap and commercial maturity risk
    severity: medium
    likelihood: high
    evidence_strength: medium
    confidence: medium
    description: Inference is launched, while several cloud/agent/post-training/dedicated-capacity capabilities are roadmap or not backed by public customer metrics.
    evidence_claim_ids:
      - EC-009
      - EC-022
    mitigation_or_diligence_request: Review product roadmap, GA criteria, backlog, engineering milestones and customer commitments.
