follow_up_requests:
  - request_id: REQ-001
    priority: critical
    owner: CFO / finance lead
    request: Provide audited/management financials, ARR bridge, cash runway, revenue by product/customer/channel/geography, cloud cost and gross margin by workload.
  - request_id: REQ-002
    priority: critical
    owner: CEO / legal counsel
    request: Provide cap table, financing documents, investor rights, board approvals, option pool, debt/warrants/notes and use-of-funds schedule.
  - request_id: REQ-003
    priority: critical
    owner: Sales / customer success
    request: Provide top 20 customers/prospects, contracts, pipeline, churn/retention, paid usage cohorts and reference-call access.
  - request_id: REQ-004
    priority: high
    owner: Operations / infrastructure
    request: Provide IBM, AMD and TensorWave contracts, capacity commitments, pricing, SLAs, exclusivity, termination rights and failover plan.
  - request_id: REQ-005
    priority: high
    owner: CTO / research lead
    request: Provide model cards, benchmark reproducibility materials, data lineage, license inventory, red-team/safety reports and roadmap milestones.
  - request_id: REQ-006
    priority: high
    owner: General counsel / security
    request: Provide customer agreement, AUP, DPA, privacy policy, SOC/security reports, incident history, insurance, litigation/regulatory/IP schedules.
  - request_id: REQ-007
    priority: medium
    owner: People / CEO
    request: Provide org chart, payroll census, compensation, turnover, executive biographies, employment agreements and IP assignment records.
limitations:
  - This is a public-source diligence report, not investment, legal, accounting, tax, technical, privacy, cybersecurity or regulatory advice.
  - No management interview, private data room, customer calls, legal docket search by counsel, paid database export, source-code audit or benchmark reproduction was performed.
  - Commercial database entries conflict; this report preserves conflicts rather than forcing a single answer.
  - Absence of public litigation, regulatory, IPO, acquisition or shutdown evidence is not proof that no such matter exists.
  - Company-authored benchmarks, product descriptions and roadmap statements require independent technical validation.
  - All source access dates are 2026-05-21; web pages and database profiles can change after that date.
