report_metadata:
  report_title: Zyphra Standard-Depth Startup Diligence Report
  target_company: Zyphra
  slug: zyphra
  legal_name: Zyphra Technologies, Inc.
  website: https://www.zyphra.com/
  known_aliases:
    - Zyphra Technologies
    - Zyphra Technologies Inc.
  sector: Enterprise Tech / AI infrastructure and foundation models
  company_stage: Private unicorn / Series A
  geography: United States — Palo Alto / San Francisco, California
  research_date: 2026-05-21
  report_version: "1.0"
  diligence_depth: standard
  time_zone: America/Los_Angeles
  prepared_by: GitHub Copilot CLI public-source diligence workflow
  eligibility_screen: No public IPO, acquisition, or shutdown evidence found during this pass; treat as an active private-company diligence screen, not a legal status opinion.
research_scope:
  diligence_depth: standard
  scope_start_date: 2026-05-21
  scope_end_date: 2026-05-21
  research_methods:
    - Company website, legal terms, product/blog pages
    - Public market databases and secondary-market profiles
    - IBM/AMD partner announcements and independent industry coverage
    - GitHub repository/API review
    - SEC EDGAR and broad public-web status/litigation searches
  excluded_methods:
    - No management interview
    - No customer/reference calls
    - No private data room
    - No paid database access beyond publicly accessible snippets
    - No legal docket search by counsel
  source_date_policy: All sources are recorded with accessed_date 2026-05-21. Older publication dates remain explicitly identified.
  materiality_threshold: Facts are treated as material if they affect private-company eligibility, valuation, product maturity, commercial traction, capital intensity, legal/compliance exposure, or key-person risk.
  assumptions:
    - User-supplied CB Insights unicorn-list row is in scope as a source candidate and is cross-checked against the accessible CB list and other public sources.
    - Conflicting commercial database fields are reported as conflicts, not resolved into facts.
    - No adverse-status finding was considered conclusive without a primary or high-confidence source.
founder_claims:
  - claim_id: FC-001
    claim: Zyphra is a $1B private Enterprise Tech unicorn listed by CB Insights, date joined 2025-06-09.
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-003
  - claim_id: FC-002
    claim: Zyphra is building the full-stack for open superintelligence and supports sovereign AI control.
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-006
  - claim_id: FC-003
    claim: Zyphra Cloud consists of Agent/MAIA, Agent Environments, Inference and Compute capabilities.
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-007
  - claim_id: FC-004
    claim: Zyphra has strategic infrastructure relationships with IBM, AMD and TensorWave.
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-008
      - EC-020
  - claim_id: FC-005
    claim: Zyphra has a substantial public open-source/research footprint.
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-012
      - EC-013
      - EC-014
  - claim_id: FC-006
    claim: Revenue, headcount, customer concentration and detailed funding totals are verifiable from public sources.
    verification_status: unverified
    confidence: medium
    evidence_claim_ids:
      - EC-016
      - EC-017
      - EC-019
executive_summary:
  overall_assessment: Track / diligence-required. Zyphra has strong public technical and strategic-partner signals for an early AI infrastructure/model company, but standard investment diligence should treat financials, customers, unit economics, cap table, legal controls and supplier commitments as unverified until primary documents are reviewed.
  investment_or_diligence_thesis: Zyphra could be attractive if AMD-optimized long-context inference plus open research converts into enterprise customers and favorable unit economics; the public record does not yet prove that conversion.
  strongest_verified_claims:
    - summary: CB and IBM support the $1B private-unicorn / Series A valuation signal.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - summary: Zyphra has visible public technical assets across language, speech and EEG research plus 23 GitHub repositories.
      evidence_claim_ids:
        - EC-011
        - EC-012
        - EC-013
        - EC-014
    - summary: IBM, AMD and TensorWave relationships substantiate a serious compute/infrastructure strategy.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-008
        - EC-020
    - summary: Zyphra Cloud’s initial commercial wedge is serverless long-context inference on AMD MI355X, while several adjacent capabilities are roadmap items.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-022
  biggest_risks:
    - summary: Financial statements, revenue quality, burn, gross margin and customer concentration are not public.
      risk_ids:
        - R-001
        - R-004
    - summary: Public funding totals and valuation details conflict across databases and need cap-table reconciliation.
      risk_ids:
        - R-002
    - summary: Product execution depends heavily on AMD/IBM/TensorWave infrastructure and unknown commercial terms.
      risk_ids:
        - R-003
    - summary: Voice cloning, EEG research, unmoderated base-model warnings and agent execution raise safety/legal risks.
      risk_ids:
        - R-005
        - R-007
    - summary: Open research visibility supports credibility but may weaken moat without proven enterprise conversion.
      risk_ids:
        - R-006
        - R-009
  key_evidence_gaps:
    - Audited financials and revenue/ARR bridge.
    - Customer list, contracts, revenue concentration and retention.
    - Cap table, financing documents and investor rights.
    - Supplier and strategic partnership contracts.
    - Security/privacy/SOC/AUP/DPA and model-safety documentation.
    - Org chart, headcount, employment/IP agreements and turnover.
  recommended_next_steps:
    - Request primary financial, cap-table and financing documents before relying on valuation headlines.
    - Conduct customer/reference diligence and review top contracts, usage cohorts and pipeline.
    - Review IBM/AMD/TensorWave agreements, capacity commitments and gross-margin model.
    - Commission technical benchmark/safety review for inference, agent environments, voice cloning and EEG research.
    - Run counsel-led legal/IP/privacy/security diligence, including litigation dockets and IP/data-rights schedules.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: The public record supports Zyphra’s unicorn-screening status and a major IBM/AMD infrastructure relationship, but not revenue quality, cash runway, gross margin, cap table, debt-like commitments, or forecast reliability.
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-005
      - EC-017
      - EC-020
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        verification_status: inconclusive
        confidence: low
        summary: No audited or management income statements, balance sheets, cash-flow statements, backlog, AR aging, or revenue by product/channel/geography were found in public sources.
        evidence_claim_ids:
          - EC-017
          - EC-019
        key_findings:
          - finding: Public ARR/revenue is not verified; the only specific ARR value found is a low-confidence third-party estimate.
            evidence_claim_ids:
              - EC-017
          - finding: The current business appears capital- and compute-intensive, but no gross margin or utilization data are public.
            evidence_claim_ids:
              - EC-020
        evidence_gaps:
          - Audited financial statements for FY2023-FY2025 and YTD 2026.
          - Revenue by product, channel, geography, customer, cohort, and backlog.
          - Cloud/inference usage, GPU utilization, gross margin and support costs.
        hidden_risks:
          - Valuation may be disconnected from verified revenue.
          - Hidden minimum cloud/GPU commitments could materially affect runway.
        follow_up_questions:
          - Provide monthly P&L, balance sheet, cash flow, ARR bridge, deferred revenue, backlog and AR aging.
          - Show inference margin by model, average context length, concurrency and GPU vendor.
        table_ids:
          - T-003
        figure_ids: []
      - section_id: I.B
        title: Financial Projections
        verification_status: inconclusive
        confidence: low
        summary: No company projections were public. Public growth drivers are the cloud launch, Maia/agent roadmap, open-source funnel, and strategic compute access; cost and financing assumptions are not disclosed.
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-009
          - EC-020
          - EC-022
        key_findings:
          - finding: Growth narrative is credible at the product-roadmap level but not yet backed by public bookings or paid-customer data.
            evidence_claim_ids:
              - EC-019
              - EC-022
          - finding: Compute commitments and AMD/IBM/TensorWave dependencies should be modeled as major assumptions.
            evidence_claim_ids:
              - EC-020
        evidence_gaps:
          - Three-year quarterly model by revenue line, gross margin, capex/cloud spend and headcount.
          - Pipeline conversion assumptions, pricing assumptions, and scenario analyses.
          - External financing and runway assumptions.
        hidden_risks:
          - Forecasts could be highly sensitive to model mix, context length, utilization, hardware availability and pricing pressure.
        follow_up_questions:
          - What customer cohorts, committed contracts and utilization levels support the 2026-2028 plan?
          - What minimum spend or capacity commitments are embedded in IBM/TensorWave/AMD agreements?
        table_ids: []
        figure_ids:
          - F-002
      - section_id: I.C
        title: Capital Structure
        verification_status: partially_verified
        confidence: medium
        summary: The $1B unicorn headline is supported by CB Insights and IBM, with secondary profiles around $989M-$1B, but shares outstanding, investor rights, option pool, debt and other dilutive instruments are non-public.
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-005
        key_findings:
          - finding: Public funding totals conflict materially between CB visible profile data and secondary-market profiles.
            evidence_claim_ids:
              - EC-002
              - EC-005
          - finding: No public data shows liquidation preferences, option pool, debt, warrants, or off-balance-sheet liabilities.
            evidence_claim_ids:
              - EC-005
              - EC-020
        evidence_gaps:
          - Fully diluted cap table, option pool, SAFE/note conversion, board/investor rights, debt and warrants.
          - Series A/A-1 closing documents and side letters.
        hidden_risks:
          - Headline valuation may obscure investor preferences, structured terms, or debt-like compute obligations.
        follow_up_questions:
          - Provide cap table pre/post Series A, securities ledger, financing docs, investor rights, board consents and debt schedule.
        table_ids:
          - T-002
        figure_ids:
          - F-002
      - section_id: I.D
        title: Other financial information
        verification_status: partially_verified
        confidence: medium
        summary: Financing history is partially triangulated from CB, IBM and secondary-market profiles. Tax, accounting policies, revenue recognition, NOLs and deferred revenue are not public.
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-005
          - EC-017
        key_findings:
          - finding: The most defensible public financing facts are CB list $1B/date joined and IBM’s statement that Series A closed at a $1B valuation.
            evidence_claim_ids:
              - EC-001
              - EC-003
          - finding: Secondary-market financing rows add useful detail but should be reconciled to primary records.
            evidence_claim_ids:
              - EC-005
        evidence_gaps:
          - Tax returns and NOL schedule.
          - Revenue-recognition policies for cloud/API and reserved capacity.
          - Signed financing history with percentage ownership and current basis.
        hidden_risks:
          - Tax/accounting treatment of cloud credits, prepayments, model licensing and services could affect revenue quality.
        follow_up_questions:
          - Provide revenue recognition memo, tax filings, NOL schedule and financing proceeds/use-of-funds bridge.
        table_ids:
          - T-001
        figure_ids:
          - F-001
  - chapter_id: II
    title: Products
    chapter_summary: Zyphra’s public product surface is broad for its stage—open foundation models, speech/EEG research, MAIA agent, Inference, Compute and Agent Environments—but commercial maturity, pricing, production reliability and safety controls need primary validation.
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-009
      - EC-012
      - EC-013
      - EC-014
      - EC-022
      - EC-024
    sections:
      - section_id: II.A
        title: Description of each product
        verification_status: partially_verified
        confidence: medium
        summary: Public materials verify Zyphra Research, Zyphra Cloud, serverless Inference and a pipeline of agent/compute/environment capabilities. Public materials do not verify customer adoption, margins, pricing, market share or production SLAs.
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-009
          - EC-022
          - EC-024
        key_findings:
          - finding: Inference is the clearest currently commercialized product; other cloud capabilities are partially roadmap-dependent from public evidence.
            evidence_claim_ids:
              - EC-008
              - EC-009
              - EC-022
          - finding: The technical portfolio is credible and visible through GitHub and blogs, including Zonos, Zamba/Zamba2 and ZUNA.
            evidence_claim_ids:
              - EC-011
              - EC-012
              - EC-013
              - EC-014
          - finding: Pricing, customer logos, SLAs, cost structure and profitability are not public.
            evidence_claim_ids:
              - EC-015
              - EC-019
        evidence_gaps:
          - Current SKU/rate card and customer contract templates.
          - Product-level revenue, gross margin, retention and support costs.
          - Independent benchmark results and production incident history.
          - Safety evaluations for voice cloning, agent execution, hosted third-party models and EEG research.
        hidden_risks:
          - Roadmap breadth may exceed current execution capacity.
          - Open model artifacts create safety and data-rights obligations.
          - Company-authored benchmark claims may not generalize to customer workloads.
        follow_up_questions:
          - Which Zyphra Cloud capabilities are GA, beta, private preview or roadmap?
          - Provide product usage metrics by SKU, paid customer, workload type and average context length.
          - Provide red-team reports and AUP enforcement statistics for agent, speech and hosted-model features.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
  - chapter_id: III
    title: Customer Information
    chapter_summary: "Public customer diligence is the weakest area: no top-customer list, revenue by customer, churn or concentration table is public. Disclosed relationships are strategic infrastructure partnerships rather than proven paying-customer adoption."
    evidence_claim_ids:
      - EC-019
      - EC-020
    sections:
      - section_id: III.A
        title: Top customers by application
        verification_status: inconclusive
        confidence: low
        summary: No top-15 customers, product ownership, purchase timing or customer-level revenue were found in public sources. Public segments are developers, enterprises/knowledge workers and frontier AI hyperscalers.
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-019
        key_findings:
          - finding: Target applications are visible, but named production customers are not.
            evidence_claim_ids:
              - EC-019
          - finding: GitHub community usage is a demand signal but not a customer list.
            evidence_claim_ids:
              - EC-011
              - EC-019
        evidence_gaps:
          - Top 15 customer list by application for FY2024, FY2025 and YTD 2026.
          - Product ownership, contract term, ACV, usage, renewal and churn for each top account.
        hidden_risks:
          - Product-market fit could be earlier than the valuation implies.
          - Enterprise references may be concentrated in partners rather than paying customers.
        follow_up_questions:
          - Provide customer reference calls, top-customer revenue by product, and signed customer contracts.
        table_ids:
          - T-006
        figure_ids: []
      - section_id: III.B
        title: Strategic relationships
        verification_status: verified
        confidence: high
        summary: IBM Cloud, AMD and TensorWave relationships are well-supported publicly, but relationship economics, exclusivity and revenue/customer impact are not public.
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-008
          - EC-020
        key_findings:
          - finding: The IBM/AMD training-cluster relationship is supported by IBM release and independent industry coverage.
            evidence_claim_ids:
              - EC-003
              - EC-004
          - finding: TensorWave is named as the MI355X inference infrastructure partner.
            evidence_claim_ids:
              - EC-008
              - EC-020
        evidence_gaps:
          - Signed agreements, economics, co-sell rights, exclusivity and minimum-commitment schedules.
          - Partner-sourced pipeline and customer conversion metrics.
        hidden_risks:
          - Strategic partnerships can validate technology while masking unfavorable unit economics or exclusivity.
        follow_up_questions:
          - What revenue, cost, equity or minimum-spend commitments are attached to IBM, AMD and TensorWave?
        table_ids:
          - T-007
        figure_ids:
          - F-004
      - section_id: III.C
        title: Revenue by customer
        verification_status: inconclusive
        confidence: low
        summary: No revenue by customer or any customer accounting for 5%+ of revenue is public.
        evidence_claim_ids:
          - EC-017
          - EC-019
        key_findings:
          - finding: No public evidence substantiates diversified customer revenue.
            evidence_claim_ids:
              - EC-019
        evidence_gaps:
          - Revenue concentration schedule and cohort retention.
          - Gross margin and support burden by customer/application.
        hidden_risks:
          - One or a few strategic relationships could dominate revenue or cost exposure.
        follow_up_questions:
          - List all customers above 5% of revenue and all no-revenue strategic deployments.
        table_ids: []
        figure_ids: []
      - section_id: III.D
        title: Significant relationships severed within the last two years
        verification_status: inconclusive
        confidence: low
        summary: No severed customer, partner or supplier relationships surfaced in accessible public searches, but there is no public relationship ledger.
        evidence_claim_ids:
          - EC-018
          - EC-019
        key_findings:
          - finding: No public severance signal was found; absence of evidence is not evidence of absence.
            evidence_claim_ids:
              - EC-018
        evidence_gaps:
          - Lost customer/partner list, churned pilots, terminated supplier agreements, legal demand letters.
        hidden_risks:
          - Failed pilots or supplier disputes may be non-public.
        follow_up_questions:
          - Provide churn/lost-deal register and terminated relationship schedule since 2024.
        table_ids: []
        figure_ids: []
      - section_id: III.E
        title: Top suppliers
        verification_status: partially_verified
        confidence: medium
        summary: AMD, IBM Cloud and TensorWave are highly visible suppliers/partners. Purchase amounts and supplier contracts are not public.
        evidence_claim_ids:
          - EC-020
        key_findings:
          - finding: AMD hardware/software is central to both product differentiation and execution dependency.
            evidence_claim_ids:
              - EC-007
              - EC-008
              - EC-020
          - finding: IBM Cloud and TensorWave provide critical infrastructure for training and inference respectively.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-008
              - EC-020
        evidence_gaps:
          - Supplier spend, capacity, SLAs, failover plans and termination rights.
          - Redundancy and portability plans across hardware/cloud providers.
        hidden_risks:
          - Supplier concentration, ROCm/software risk and GPU supply constraints could affect margin and availability.
        follow_up_questions:
          - Provide supplier contracts, capacity reservations, spend history, committed-use obligations and contingency plan.
        table_ids:
          - T-008
        figure_ids: []
  - chapter_id: IV
    title: Competition
    chapter_summary: Zyphra has a differentiated public narrative—open models plus AMD-optimized long-context inference—but competes against heavily funded model labs, hyperscale clouds, inference specialists and neocloud providers with better-known customer scale.
    evidence_claim_ids:
      - EC-021
      - EC-024
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        verification_status: partially_verified
        confidence: medium
        summary: Zyphra’s basis of competition is technology architecture, open research, AMD optimization, long-context inference and enterprise agents. Public evidence does not prove market share, price leadership or customer preference.
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-011
          - EC-021
          - EC-024
        key_findings:
          - finding: The company’s public differentiation is clear, but market share and win/loss evidence are absent.
            evidence_claim_ids:
              - EC-021
          - finding: Open-source technical credibility is a real strength, though it may not create a durable moat without commercial conversion.
            evidence_claim_ids:
              - EC-011
              - EC-024
          - finding: AMD optimization can be a differentiated cost/performance wedge if independently validated.
            evidence_claim_ids:
              - EC-007
              - EC-008
              - EC-020
        evidence_gaps:
          - Market share by segment, price comparison, win/loss reports, independent benchmarks.
          - Customer reference comparison against incumbent inference/model platforms.
        hidden_risks:
          - Larger competitors can subsidize pricing, bundle distribution or replicate open architectures.
          - Supplier differentiation may narrow if AMD support becomes broadly available.
        follow_up_questions:
          - Provide competitive win/loss for top 20 opportunities and independent benchmark study versus three named alternatives.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Zyphra’s public GTM engine is technical content, open-source distribution, product pages/contact-sales and strategic partner announcements. There is no public sales productivity, funnel conversion, pipeline or budget evidence.
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-011
      - EC-019
    sections:
      - section_id: V.A
        title: Strategy and implementation
        verification_status: partially_verified
        confidence: medium
        summary: Public positioning emphasizes open/sovereign AI, long-horizon agents, AMD-optimized inference and enterprise/hyperscaler use cases. Implementation metrics are not public.
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-021
        key_findings:
          - finding: Technical founders can reach developers through GitHub and model launches, but enterprise GTM proof is not public.
            evidence_claim_ids:
              - EC-011
              - EC-019
          - finding: Partner PR with IBM/AMD can create credibility, but co-sell contribution is not public.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-020
        evidence_gaps:
          - GTM plan, ICP, channels, demand-gen budget, pipeline source and conversion metrics.
          - International distribution and regulated-industry plan.
        hidden_risks:
          - Narrative strength may outrun sales capacity and enterprise compliance readiness.
        follow_up_questions:
          - What percentage of pipeline comes from open-source, inbound product, partner referrals and outbound sales?
        table_ids:
          - T-011
          - T-012
        figure_ids:
          - F-006
      - section_id: V.B
        title: Major Customers
        verification_status: inconclusive
        confidence: low
        summary: No major customer relationships or customer trend data are public; strategic partner relationships are not necessarily customers.
        evidence_claim_ids:
          - EC-019
          - EC-020
        key_findings:
          - finding: No public reference customer validates production enterprise MAIA or inference adoption.
            evidence_claim_ids:
              - EC-019
        evidence_gaps:
          - Customer relationship status, expansion/contraction, NRR/GRR, referenceability, pipeline growth.
        hidden_risks:
          - Customer pipeline may consist of trials, free usage or partner demos rather than paid production workloads.
        follow_up_questions:
          - Provide top-account pipeline with stage, ACV, use case, technical owner, economic buyer and close date.
        table_ids: []
        figure_ids: []
      - section_id: V.C
        title: Principal avenues for generating new business
        verification_status: partially_verified
        confidence: medium
        summary: Observable avenues are open-source/community, product-led website/cloud access, partner credibility and technical content.
        evidence_claim_ids:
          - EC-011
          - EC-019
        key_findings:
          - finding: Open-source adoption is a plausible top-of-funnel channel because GitHub activity is visible.
            evidence_claim_ids:
              - EC-011
          - finding: No public data links community interest to paid customer conversion.
            evidence_claim_ids:
              - EC-019
        evidence_gaps:
          - Lead-source attribution, activation, usage-to-paid conversion, and sales-cycle data.
        hidden_risks:
          - Open-source users may not convert into enterprise revenue.
        follow_up_questions:
          - Show cohort conversion from repo download/star, cloud signup, activated workloads and paid spend.
        table_ids: []
        figure_ids:
          - F-006
      - section_id: V.D
        title: Sales force productivity model
        verification_status: inconclusive
        confidence: low
        summary: No sales headcount, quotas, compensation, productivity, sales-cycle or hiring plan data were public.
        evidence_claim_ids:
          - EC-016
          - EC-019
        key_findings:
          - finding: Public headcount estimates vary significantly and do not break out sales personnel.
            evidence_claim_ids:
              - EC-016
              - EC-017
        evidence_gaps:
          - Sales org chart, quotas, attainment, ramp, compensation and pipeline coverage.
          - Customer success/support staffing for cloud reliability.
        hidden_risks:
          - Sales capacity may not match enterprise pipeline or valuation expectations.
        follow_up_questions:
          - Provide sales productivity model by rep, segment, channel and cohort.
        table_ids: []
        figure_ids: []
      - section_id: V.E
        title: Ability to implement marketing plan with current and projected budgets
        verification_status: inconclusive
        confidence: low
        summary: Marketing budget and implementation capacity are not public. Compute commitments may compete with GTM budget for cash.
        evidence_claim_ids:
          - EC-017
          - EC-020
        key_findings:
          - finding: Without financial plan and headcount budget, GTM execution capacity cannot be assessed.
            evidence_claim_ids:
              - EC-017
        evidence_gaps:
          - Marketing budget, hiring plan, agency/PR contracts, partner MDF/co-sell budget.
          - Runway allocation between R&D/compute and GTM.
        hidden_risks:
          - Underfunded GTM could delay revenue while compute spend continues.
        follow_up_questions:
          - Provide budget-to-plan, GTM hiring plan and monthly burn allocation by function.
        table_ids: []
        figure_ids: []
  - chapter_id: VI
    title: Research and Development
    chapter_summary: "R&D is Zyphra’s strongest public diligence area: models, repos and technical blogs substantiate research activity. The open questions are cost, data rights, safety validation, key-person concentration, and conversion from research to durable commercial products."
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-012
      - EC-013
      - EC-014
      - EC-024
    sections:
      - section_id: VI.A
        title: Description of R&D organization
        verification_status: partially_verified
        confidence: medium
        summary: Public sources show active model research and named founders/leadership, but full org structure, personnel biographies, IP assignments and retention plan are not public.
        evidence_claim_ids:
          - EC-010
          - EC-011
          - EC-016
        key_findings:
          - finding: Zyphra’s public GitHub and blog footprint is meaningful for technical diligence.
            evidence_claim_ids:
              - EC-011
              - EC-024
