report_metadata:
  report_title: Figure AI Startup Diligence Report
  target_company: Figure AI
  website: https://www.figure.ai/
  known_aliases:
    - Figure
    - Figure AI, Inc.
  sector: Humanoid robotics / embodied AI
  geography: United States; San Jose, California headquarters with intended home and commercial markets
  company_stage: Late-stage private AI robotics unicorn
  research_date: 2026-05-27
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public sources only; no private data room, management interview, customer call or paid database access.
    - Built exclusion list from reports/*-diligence-report.yaml and selected uncovered private unicorns from the current Wikipedia unicorn table plus public source checks.
    - Treated company-authored claims as evidence of the claim being made, not independent proof of outcome.
  included_jurisdictions:
    - United States
    - San Jose, California headquarters with intended home and commercial markets
  excluded_topics:
    - Non-public financial statements, board materials, customer calls, contracts, HRIS exports and security reports were unavailable.
  user_provided_materials: []
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Figure is a private humanoid robotics unicorn valued at US$39B.
    claim_source: Company financing announcement and public unicorn list
    claim_date: 2025-09-16
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids: &a1
      - EC-001
      - EC-008
    contradiction_summary: null
    diligence_follow_up:
      - Request financing documents, investor rights, preference stack and current 409A/valuation support.
  - founder_claim_id: FC-002
    claim_text: Figure builds general-purpose humanoid robots powered by Helix embodied AI.
    claim_source: Figure website and Helix article
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: &a2
      - EC-002
      - EC-004
    contradiction_summary: null
    diligence_follow_up:
      - Request robot reliability, safety-case, model evaluations, BOM, cost curve and deployment data.
  - founder_claim_id: FC-003
    claim_text: Figure can scale humanoids into homes and commercial operations.
    claim_source: Company Series C announcement
    claim_date: 2025-09-16
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: &a3
      - EC-003
      - EC-006
    contradiction_summary: Ambition is public, but deployment volume, customer revenue and safety/ROI evidence are not public.
    diligence_follow_up:
      - Request signed customer contracts, deployment KPIs, incident logs, ROI studies and pipeline.
executive_summary:
  overall_assessment: "Figure AI passed the public-source operating-company screen after replacing an ineligible acquired candidate. Proceed only with deep technical, safety and unit-economic diligence: public evidence verifies a major US$39B financing and ambitious embodied-AI roadmap, but underwriting hinges on deployment economics, reliability, manufacturing yield and liability controls that are not public."
  investment_or_diligence_thesis: "Proceed only with deep technical, safety and unit-economic diligence: public evidence verifies a major US$39B financing and ambitious embodied-AI roadmap, but underwriting hinges on deployment economics, reliability, manufacturing yield and liability controls that are not public."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Figure is a private humanoid robotics unicorn valued at US$39B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Figure builds general-purpose humanoid robots powered by Helix embodied AI.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Figure can scale humanoids into homes and commercial operations.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Valuation far ahead of public commercialization evidence
    - risk_id: R-002
      summary: Technical reliability and safety-case risk
    - risk_id: R-003
      summary: Manufacturing scale and supply-chain execution risk
  key_evidence_gaps:
    - Audited financial statements, current cash/debt/runway and board-approved forecast.
    - Cap table, financing preferences, options/warrants, debt and current valuation support.
    - Top-customer revenue, contracts, churn/retention and independent customer references.
    - Material contracts, legal/regulatory/IP/security/insurance artifacts.
    - HRIS, compensation, option plan, turnover and hiring plan.
  recommended_next_steps:
    - Request finance, legal, customer, HR and product/security data-room indexes before relying on headline valuation.
    - Run customer-reference and revenue-quality workstream focused on concentration, retention and gross margin.
    - Have counsel and technical specialists review contracts, regulatory exposure, IP ownership, privacy/security and product risk.
