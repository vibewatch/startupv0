  - evidence_claim_id: EC-015
    claim: Colossal public GTM is primarily mission storytelling, species pages, education/newsletter
      channels, careers and scientific partnerships rather than disclosed commercial sales.
    evidence_summary: Company pages emphasize mission, science, species, careers and newsletter calls to action.
    verification_status: verified
    confidence: medium
    source_ids:
