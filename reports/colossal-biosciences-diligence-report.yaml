evidence_claims:
  - evidence_claim_id: EC-001
    claim: CB Insights lists Colossal as a United States healthcare and life-sciences unicorn in Austin
      with a $10.2B valuation and selected investors including Animal Capital, Breyer Capital and
      In-Q-Tel.
    evidence_summary: The CB Insights unicorn table provides the public valuation anchor used in this report.
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-001
    limitations: Round terms, financing amount, ownership and preferences are not disclosed in the table.
  - evidence_claim_id: EC-002
    claim: Colossal describes itself as combining genetics with the business of discovery to pursue
      de-extinction and biodiversity-related outcomes.
    evidence_summary: The company home page frames the mission around genetics, de-extinction and biodiversity.
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-002
    limitations: Mission statements do not validate technical feasibility or commercial economics.
  - evidence_claim_id: EC-003
    claim: Colossal says it is pursuing woolly mammoth, thylacine, dodo, dire wolf, moa and other
      species-related programs, with the mammoth framed as a cold-resistant elephant with core
      mammoth traits.
    evidence_summary: The species page lists species programs and describes the mammoth program.
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-004
      - SRC-007
    limitations: Program timelines, milestones, survival rates and regulatory approvals are not public.
  - evidence_claim_id: EC-004
    claim: Colossal defines functional de-extinction as generating an organism that resembles and is
      genetically similar to an extinct species by resurrecting lost lineage genes, engineering
      resistances and enhancing adaptability.
    evidence_summary: The de-extinction page provides the company definition.
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-003
    limitations: Definition is company-authored and does not prove scientific success.
  - evidence_claim_id: EC-005
    claim: Colossal says its technology stack spans genetics, software engineering, embryology,
      exogenous fetal development, animal husbandry and conservation, with potential software,
      wetware, hardware, IP and commercialization outputs.
    evidence_summary: The science and technology page describes the system and commercialization thesis.
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-005
    limitations: Specific patents, lab methods, safety data and product-market fit are not public.
  - evidence_claim_id: EC-006
    claim: Colossal says it invested $7.5M to expand its Ancient DNA Academic Research Project under
      Chief Science Officer Beth Shapiro.
    evidence_summary: The species page states the $7.5M investment and CSO leadership.
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-004
    limitations: Grant agreements, milestones and ownership of outputs are not public.
  - evidence_claim_id: EC-007
    claim: Colossal public pages identify Ben Lamm as Founder and CEO, George Church as Founder, and
      Beth Shapiro as Chief Science Officer.
    evidence_summary: Company home and species pages identify these public leadership roles.
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-002
      - SRC-004
    limitations: Full management roster, board, retention and compensation are private.
  - evidence_claim_id: EC-008
    claim: Colossal cites biodiversity urgency metrics including 30,000 species per year on average
      driven to extinction and UN claims that 1,000,000 animal and plant species are threatened.
    evidence_summary: The home page presents these biodiversity urgency statistics.
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-002
      - SRC-010
    limitations: The report did not independently audit the underlying extinction-statistic methodology.
  - evidence_claim_id: EC-009
    claim: Public sources did not disclose audited revenue, signed customer contracts, commercial
      pricing, gross margin, cash, debt, runway or customer concentration for Colossal.
    evidence_summary: Reviewed public sources are mission, technology, species, careers and privacy
      pages rather than financial statements.
    verification_status: not_publicly_verifiable
    confidence: high
    source_ids:
      - SRC-001
      - SRC-002
      - SRC-005
    limitations: Requires company financials, contracts, board plan and data room.
  - evidence_claim_id: EC-010
    claim: Colossal public materials present an IP creation and commercialization thesis but do not
      provide a complete patent, license or ownership schedule.
    evidence_summary: The technology page says many developments may be patentable and lead to commercialization.
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-005
    limitations: Actual patents, assignments, licenses and encumbrances require IP diligence.
  - evidence_claim_id: EC-011
    claim: Colossal privacy disclosures state the company is focused on species de-extinction and
      collects categories including personal, billing, device, usage, location and
      transaction-related information through services.
    evidence_summary: The privacy policy describes Colossal Services and data categories.
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-008
    limitations: Security reports, lab-data governance and incident logs were not public.
  - evidence_claim_id: EC-012
    claim: Public sources do not disclose comprehensive litigation, animal-research permits,
      environmental approvals, biosafety review, endangered-species approvals or counsel positions.
    evidence_summary: Reviewed legal sources include privacy and website terms, not a legal data room.
    verification_status: not_publicly_verifiable
    confidence: high
    source_ids:
      - SRC-008
    limitations: Requires counsel letters, permit matrix and regulatory correspondence.
  - evidence_claim_id: EC-013
    claim: Colossal career and company materials support an operating organization in genetics and
      biosciences, but headcount, attrition, compensation and lab-capacity metrics are not public.
    evidence_summary: Careers and company pages provide public hiring/culture signals without HR metrics.
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-006
    limitations: Requires HRIS, hiring plan, lab capacity and attrition data.
  - evidence_claim_id: EC-014
    claim: Conservation genetics and de-extinction-adjacent work has nonprofit, academic and government
      alternatives, creating competition for talent, grants, public trust and partner access.
    evidence_summary: Public category sources and Colossal materials show the field is broader than one company.
    verification_status: verified
    confidence: medium
    source_ids:
