  - evidence_claim_id: EC-016
    claim: Colossal public materials do not disclose animal welfare outcomes, embryo viability,
      surrogate capacity, ecological release criteria or independent scientific review results.
    evidence_summary: Species and technology pages describe programs and methods at a high level only.
    verification_status: not_publicly_verifiable
    confidence: high
    source_ids:
