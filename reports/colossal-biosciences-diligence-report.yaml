risk_register:
  - risk_id: R-001
    risk_title: Financial model and valuation opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: A $10.2B valuation is public, but revenue, cash, burn, cap table, investor rights and
      commercial model are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a17
    mitigation_or_diligence_request: Request audited financials, budget, runway, cap table and financing documents.
  - risk_id: R-002
    risk_title: Scientific feasibility and milestone risk
    risk_category: technical
    severity: high
    likelihood: high
    description: De-extinction requires complex genetics, embryology, development, animal husbandry and
      conservation milestones that public pages do not validate.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
    evidence_claim_ids: *a18
    mitigation_or_diligence_request: Request program milestones, protocols, validation data, independent
      reviews and failure-mode analysis.
  - risk_id: R-003
    risk_title: Commercialization uncertainty
    risk_category: market
    severity: high
    likelihood: medium
    description: Public materials describe IP and commercial evolution, but no paying customer, pricing
      or revenue model is disclosed.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.B
      - II.B
      - V.A
    evidence_claim_ids: *a19
    mitigation_or_diligence_request: Request commercial roadmap, product candidates, LOIs, contracts and licensing pipeline.
  - risk_id: R-004
    risk_title: Regulatory, animal welfare and environmental approval risk
    risk_category: regulatory
    severity: high
    likelihood: high
    description: Animal research, genetic engineering, surrogate use and any ecosystem introduction
      could require extensive approvals and public trust.
    impacted_chapter_ids:
      - VIII
      - VI
    impacted_section_ids:
      - VIII.A
      - VI.A
    evidence_claim_ids: *a20
    mitigation_or_diligence_request: Request permit matrix, biosafety review, animal-welfare protocols and counsel opinions.
  - risk_id: R-005
    risk_title: IP ownership and encumbrance risk
    risk_category: legal
    severity: high
    likelihood: medium
    description: The company says developments may be patentable, but patent schedules, university
      licenses and assignment rights are not public.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.B
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Request patent/trademark schedule, licenses, university agreements and invention assignments.
  - risk_id: R-006
    risk_title: Reputational and ethical risk
    risk_category: reputational
    severity: high
    likelihood: medium
    description: De-extinction is novel and can attract ecological, animal welfare and public-trust scrutiny.
    impacted_chapter_ids:
      - IV
      - VIII
    impacted_section_ids:
      - IV.B
      - VIII.A
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Review ethics board materials, stakeholder engagement, scientific
      advisory review and communications plan.
  - risk_id: R-007
    risk_title: Partner and ecosystem dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Ancient DNA, conservation and animal programs likely depend on academic, zoo,
      veterinary and regulatory partners whose contracts are not public.
    impacted_chapter_ids:
      - III
      - VI
    impacted_section_ids:
      - III.B
      - VI.A
    evidence_claim_ids: *a23
    mitigation_or_diligence_request: Request partner agreements, lab capacity, surrogate access and dependency map.
  - risk_id: R-008
    risk_title: Team scaling and key-person risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public leadership is prominent, but execution depends on scarce scientific talent and
      full org capacity is not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
    evidence_claim_ids: *a24
    mitigation_or_diligence_request: Request org chart, hiring plan, attrition, compensation and key-person retention.
