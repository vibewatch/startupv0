executive_summary:
  overall_assessment: Nimble Rx is an active private healthcare technology unicorn candidate with a current product site,
    public pharmacy/manufacturer/patient workflows, and CB Insights valuation support. Public evidence is strongest for
    product positioning and pharmacy network claims; it is weakest for financial quality, revenue concentration,
    compliance detail and valuation durability.
  investment_or_diligence_thesis: Track as a prescription-commerce and pharmacy enablement platform; require HIPAA/privacy
    evidence, pharmacy and manufacturer contracts, cohort retention, take-rate economics, claim substantiation and
    cap-table detail before underwriting.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn-list evidence supports Nimble Rx's $1.40B unicorn status at the listed date.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: The current company/product website supports active operating and product-scope claims.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Public sources provide at least directional traction, partner or customer signals.
      evidence_claim_ids:
        - EC-004
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Opaque valuation, revenue quality and unit economics
    - risk_id: R-002
      summary: Healthcare privacy, pharmacy compliance and payments risk
    - risk_id: R-003
      summary: Competition and channel dependency across independent pharmacies, chains, PBMs and large retailers
  key_evidence_gaps:
    - Audited financial statements, revenue quality, gross margin, cash runway and cap table are not public.
    - Top-customer revenue, contract terms, churn, retention, backlog and customer references are not public.
    - Complete legal/regulatory, IP, insurance, employment and material-contract schedules require company/counsel
      disclosure.
  recommended_next_steps:
    - Open a data-room request focused on finance, customer concentration, legal/regulatory schedules and
      product/technical validation.
    - Conduct management interviews with CEO/CFO/CTO or equivalent and obtain third-party customer/partner references.
    - Reconfirm current private status and valuation before relying on public unicorn-list marks.
