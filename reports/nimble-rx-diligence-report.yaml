report_metadata:
  report_title: Nimble Rx Startup Diligence Report
  target_company: Nimble Rx
  website: https://www.nimblerx.com/
  known_aliases:
    - NimbleRx
    - Nimble Pharmacy
    - Nimble
  sector: Healthcare technology; pharmacy ordering, payment and prescription-delivery platform
  geography: United States; Redwood City, California; nationwide pharmacy network
  company_stage: Private growth-stage healthcare technology unicorn
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public evidence only: CB Insights unicorn tracker, company-owned pages, independent news, secondary-market or
      company-profile pages where accessible, and targeted public eligibility searches."
    - Excluded companies with discovered IPO, acquisition or shutdown signals; for selected targets, no such definitive
      public signal was found in collected evidence.
    - Marked private financials, cap table, customer revenue, contracts, HR records, detailed legal schedules,
      compliance artifacts and customer references as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - US healthcare and pharmacy jurisdictions
  excluded_topics:
    - Private data room, paid databases, non-public customer references, privileged legal advice, credentials, secrets
      and non-public employee data.
  user_provided_materials:
    - material_id: UPM-001
      title: Randomized uncovered unicorn selection record
      type: workflow_selection_record
      date_received: 2026-05-23
      notes: Nimble Rx was selected by shuf from a CB Insights-derived uncovered candidate list after excluding existing
        report slugs.
