diligence_gaps:
- gap_id: G-001
  chapter_id: I
  section_id: I.A
  missing_information: Audited financials, KPI pack, cash/debt and AR/backlog.
  why_it_matters: Validates valuation, runway and revenue quality.
  suggested_source_or_request: CFO data room and auditor support.
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.C
  missing_information: Cap table, option plan, securities terms and investor rights.
  why_it_matters: Determines proceeds, dilution and control.
  suggested_source_or_request: Counsel/corporate secretary package.
  priority: high
- gap_id: G-003
  chapter_id: III
  section_id: III.C
  missing_information: Top customer ARR, utilization, NRR/churn and contracts.
  why_it_matters: Enterprise concentration drives durability.
  suggested_source_or_request: Customer revenue report and contracts.
  priority: high
- gap_id: G-004
  chapter_id: II
  section_id: II.A
  missing_information: Pricing, gross margin, product usage and outcome methodology.
  why_it_matters: Public outcomes do not prove economics.
  suggested_source_or_request: Product P&L and KPI methodology.
  priority: high
- gap_id: G-005
  chapter_id: VI
  section_id: VI.A
  missing_information: Architecture, SOC, incident history, AI governance and uptime.
  why_it_matters: Sensitive data and enterprise assurance.
  suggested_source_or_request: CTO/CISO diligence packet.
  priority: high
- gap_id: G-006
  chapter_id: VIII
  section_id: VIII.A
  missing_information: Pleadings, orders, reserves and insurance notices for dockets.
  why_it_matters: Legal exposure cannot be assessed from metadata.
  suggested_source_or_request: Counsel litigation schedule.
  priority: high
- gap_id: G-007
  chapter_id: VIII
  section_id: VIII.D
  missing_information: IP schedule, trademarks, assignments and OSS/SBOM.
  why_it_matters: IP ownership and license compliance.
  suggested_source_or_request: Counsel IP schedule and engineering OSS scan.
  priority: medium
- gap_id: G-008
  chapter_id: VII
  section_id: VII.B
  missing_information: Historical/projected headcount, attrition, comp and equity.
  why_it_matters: Execution depends on talent retention.
  suggested_source_or_request: HRIS and compensation package.
  priority: medium
- gap_id: G-009
  chapter_id: V
  section_id: V.D
  missing_information: Quotas, attainment, CAC/payback and pipeline coverage.
  why_it_matters: Forecast credibility and GTM efficiency.
  suggested_source_or_request: CRM/sales ops exports.
  priority: high
- gap_id: G-010
  chapter_id: VIII
  section_id: VIII.G
  missing_information: International compliance memos and data-transfer mechanisms.
  why_it_matters: Expansion creates privacy/employment/education-rule risk.
  suggested_source_or_request: Local counsel memos and DPAs.
  priority: medium
