executive_summary:
  overall_assessment: Intercom qualifies for public-evidence startup diligence as
    an active private software unicorn with verified historical $1.275B valuation,
    company-claimed $400M+ ARR, broad customer adoption and a clear AI-agent strategy
    through Fin. Underwriting should remain gated on private financials, Fin unit
    economics, customer concentration, debt terms, AI reliability, employee-retention
    data and legal/security diligence.
  investment_or_diligence_thesis: Intercom/Fin may combine a large installed support-software
    base with a timely AI-agent product and outcome-based monetization. The thesis
    is attractive only if data-room evidence confirms durable retention, strong Fin
    gross margins, manageable model costs, competitive win rates, clean governance/culture
    trajectory and no restrictive debt or legal liabilities.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: Historical unicorn eligibility and private-company posture are supported
      by Index Ventures, Intercom About and scoped SEC search evidence.
    evidence_claim_ids:
    - EC-001
    - EC-002
    - EC-019
  - founder_claim_id: FC-004
    summary: Public pricing verifies seat-based plans and Fin outcome pricing from
      $0.99/outcome.
    evidence_claim_ids:
    - EC-006
    - EC-022
  - founder_claim_id: FC-005
    summary: Security page lists enterprise-relevant certifications and privacy/AI
      governance frameworks.
    evidence_claim_ids:
    - EC-010
    - EC-024
  - founder_claim_id: FC-006
    summary: Company and independent sources verify current founder-led leadership
      and CEO return context.
    evidence_claim_ids:
    - EC-011
    - EC-012
  biggest_risks:
  - risk_id: R-001
    summary: Fin outcome pricing could underperform if model costs, escalation rates,
      refunds or quality controls erode gross margin.
  - risk_id: R-002
    summary: AI customer service is highly competitive, with incumbents and AI-native
      startups targeting the same budget.
  - risk_id: R-003
    summary: Private-company opacity means ARR, retention, profitability, cash burn,
      cap table and current valuation remain unverified.
  - risk_id: R-007
    summary: Layoffs, employee-relations reporting and planned rapid hiring require
      culture, turnover and recruiting diligence.
  key_evidence_gaps:
  - Audited financials, ARR bridge, retention cohorts and Fin revenue/gross-margin
    split.
  - Customer concentration, top contracts, references, churn and lost-customer analysis.
  - Debt agreement, covenants, liens/warrants, cap table and option pool.
  - AI model/vendor costs, benchmarks, error logs and outcome-dispute policy.
  - Counsel-led litigation/IP/regulatory review, material contracts, insurance and
    security audit reports.
  recommended_next_steps:
  - Proceed to company data-room diligence before any investment decision; do not
    rely solely on public ARR/customer claims.
  - Prioritize Fin unit economics, AI reliability and competitive win/loss because
    they drive the strategic narrative.
  - Require debt/cap-table/legal review early because venture debt and preferences
    can affect downside economics.
  - Run at least six customer references, including major Fin customers, expansions
    and recent churn/downsell accounts.
  - Conduct HR/governance review focused on founder-led controls, attrition, engagement
    and planned hiring capacity.
