research_scope:
  diligence_depth: standard_diligence
  source_strategy:
  - Used the startup diligence workflow at standard depth and independently verified
    private-unicorn eligibility before drafting.
  - Prioritized company primary sources for product, pricing, leadership, customer,
    security and developer evidence; triangulated financing, layoffs, CEO transition,
    employee-relations and competition with independent news or competitor pages.
  - Treated company-published metrics as claims requiring data-room validation rather
    than audited facts.
  - Performed scoped SEC and public court-search checks for private/public status
    and legal red flags, while noting these are not counsel-grade searches.
  included_jurisdictions:
  - United States
  - Ireland
  - United Kingdom / European Union privacy and employment context
  - Global customer jurisdictions implicated by AI customer support
  excluded_topics:
  - Non-public financial statements, board materials, customer contracts, employee
    files, security audit reports, legal dockets, IP registries, tax records and counsel
    memos were unavailable.
