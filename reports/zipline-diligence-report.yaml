report_metadata:
  report_title: Zipline Startup Diligence Report
  target_company: Zipline
  website: https://www.flyzipline.com/
  known_aliases:
    - Zipline International Inc.
    - FlyZipline
  sector: Autonomous drone delivery, healthcare logistics, instant delivery, robotics, and last-mile logistics
  geography: United States / South San Francisco with public operations and partnerships in the United States, Africa, and
    other markets
  company_stage: Private unicorn / growth-stage private company
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from reports/*-diligence-report.yaml and selected uncovered private unicorn candidates
      from current public unicorn-list sources.
    - Used CB Insights for the public unicorn-status and valuation anchor and company-owned or reputable public sources
      for product, customer, management, and risk evidence.
    - Treated company-owned sources as evidence of public statements, not independent proof of performance, economics,
      or customer satisfaction.
    - No private data room, founder interview, management presentation, customer reference, legal schedule, or financial
      model was available.
  included_jurisdictions:
    - United States
    - Rwanda
    - Ghana
    - Nigeria
    - Japan
    - Other public operating or partner jurisdictions referenced by sources
  excluded_topics:
    - Private financial statements, cap table, debt instruments, customer contracts, supplier contracts, board
      materials, security reports, employee records, and privileged legal analysis were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-25
      notes: No pitch deck, data room, financial model, or founder response was provided.
