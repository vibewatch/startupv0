executive_summary:
  overall_assessment: Zipline is a credible active private unicorn with substantial public evidence of drone-delivery
    operations, partner logos, delivery milestones, and a US$7.6B CB Insights valuation. The diligence case is
    attractive but high-risk because aviation approvals, safety performance, hardware/logistics unit economics,
    public-sector contract economics, insurance/liability, customer concentration, and international operating
    complexity require private proof.
  investment_or_diligence_thesis: Proceed to confirmatory diligence focused on whether Zipline can convert operational
    leadership into durable, profitable autonomous-logistics economics. Public evidence supports real deployments and
    partner breadth, but valuation support requires audited revenue, contribution margin per delivery, fleet
    utilization, safety history, regulatory permissions, insurance, customer contracts, and cap table evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Zipline as a private unicorn at US$7.6B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Zipline public materials position the company as drone delivery for food, groceries, medicine, and essentials.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Zipline publishes major delivery/miles counters and partner logos, including retail and restaurant brands.
      evidence_claim_ids:
        - EC-003
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Drone delivery depends on aviation approvals, safety performance, and incident-free scaling across jurisdictions.
    - risk_id: R-002
      summary: Public delivery and miles counters do not prove profitable contribution margin after hardware, maintenance,
        operations, insurance, and regulatory costs.
    - risk_id: R-003
      summary: Partner logos and public-health deployments do not disclose revenue concentration, contract terms, renewal
        rights, or subsidy exposure.
  key_evidence_gaps:
    - Audited revenue, delivery-level contribution margin, gross margin, fleet capex, maintenance cost, cash runway,
      debt, and forecast model.
    - Current cap table, investor rights, liquidation preferences, option pool, fleet financing, insurance collateral,
      and valuation bridge.
    - Top customer/partner contracts, volume commitments, exclusivity, subsidy terms, service levels, renewals, and
      independent references.
    - Regulatory approvals, safety case, incident history, autonomy software/IP evidence, hardware BOM, supplier
      contracts, and reliability data.
    - Legal, aviation, product-liability, privacy/health-data, insurance, employment, IP, sanctions/export, and
      operating-jurisdiction schedules reviewed by counsel.
  recommended_next_steps:
    - Run delivery-level financial and fleet-unit-economics diligence before relying on the US$7.6B valuation.
    - Obtain FAA/foreign aviation approvals, waivers, safety management materials, incident logs, and insurance loss
      runs.
    - Review top retail, restaurant, healthcare, and government contracts with references and market-level P&L.
    - Have counsel review aviation, product liability, privacy/health data, IP, export, insurance, and international
      operating exposure.
