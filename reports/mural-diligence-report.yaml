report_metadata:
  report_title: Mural Public-Source Startup Diligence Report
  target_company: Mural
  website: https://www.mural.co/
  known_aliases:
    - MURAL
    - Tactivos Inc. d/b/a Mural
    - LUMA Institute
  sector: AI-powered visual collaboration and enterprise teamwork software
  geography: United States / Argentina heritage with global enterprise software customers
  company_stage: Private unicorn / late-stage venture-backed company
  research_date: 2026-06-05
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used fetched Wikipedia current-unicorn table for selection and latest known valuation context.
    - Prioritized company-owned product, customer, pricing/packaging, security, about, leadership,
      and IP pages where available.
    - Used independent funding citation metadata where the original article was blocked or not fully
      accessible.
    - Marked private financial, customer, HR, legal, contract, cap-table, and model/IP evidence gaps
      rather than speculating.
  included_jurisdictions:
    - United States
    - Argentina
    - European Union
  excluded_topics:
    - No private financial statements, board decks, cap tables, customer contracts, employee
      agreements, or counsel confirmations were available.
    - No paid databases, authenticated court dockets, private registries, customer interviews, or
      management interviews were used.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-06-05
      notes: Requested three random uncovered private unicorn diligence reports and a draft PR.
