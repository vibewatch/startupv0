diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited or management financial statements, revenue bridge, gross margin, burn,
      runway, debt, and budget-vs-actual.
    why_it_matters: Public valuation and product evidence do not verify financial quality.
    suggested_source_or_request: CFO data-room package and board materials.
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue, contract values, renewal status, churn, NRR/GRR, and pipeline.
    why_it_matters: Public logos and case studies can overstate durable revenue.
    suggested_source_or_request: Customer cohort export, top-25 contracts, and reference calls.
    priority: high
  - gap_id: G-003
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer, supplier, cloud, data-processing, financing, and IP contracts.
    why_it_matters: Contract rights and obligations determine downside risk.
    suggested_source_or_request: Counsel and finance data-room index.
    priority: high
