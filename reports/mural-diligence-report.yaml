executive_summary:
  overall_assessment: Mural has real public evidence supporting unicorn status and product/customer
    traction, but investment-grade underwriting depends on private financials, customer
    concentration, contracts, HR, legal, and technical evidence.
  investment_or_diligence_thesis: Track for enterprise collaboration value only after proving durable
    ARR, renewal quality, and differentiation against bundled and specialist collaboration
    platforms.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Public company sources verify the product category and offering.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Public customer or scale signals support adoption but require validation.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-005
      summary: Security/governance positioning is public but requires audit evidence.
      evidence_claim_ids:
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and runway are not publicly verifiable
    - risk_id: R-002
      summary: Competitive pressure from collaboration suites and bundled tools
    - risk_id: R-003
      summary: Customer-logo evidence may not prove durable revenue concentration
  key_evidence_gaps:
    - Financial statements, ARR/revenue quality, burn, runway, debt, cap table, and current
      valuation.
    - Customer concentration, renewal status, churn, NRR/GRR, reference checks, and production usage.
    - Material contracts, legal/regulatory matters, IP ownership, security audits, data/model
      governance, and supplier dependencies.
  recommended_next_steps:
    - Request CFO and board data-room package for financial quality and capitalization.
    - Run customer and partner reference calls tied to top revenue accounts.
    - Have counsel review contracts, IP assignments, privacy/security evidence, regulatory
      correspondence, and litigation schedules.
