diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management pack, backlog, and AR aging.
    why_it_matters: Without these, quality of revenue, working-capital stress, and runway cannot be underwritten.
    suggested_source_or_request: Request full financial package from management and auditors.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option pool, SAFEs/notes, and liquidation preferences.
    why_it_matters: Ownership economics can differ sharply from the headline valuation.
    suggested_source_or_request: Request cap-table export and financing instruments.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.D
    missing_information: Debt, tax positions, NOLs, bank lines, and off-balance-sheet obligations.
    why_it_matters: Hidden obligations can materially affect enterprise value and liquidity.
    suggested_source_or_request: Request debt schedule, tax memos, and covenant package.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: SKU-level pricing, discounts, gross margins, SLAs, and module adoption.
    why_it_matters: Product breadth is public, but monetization quality and unit economics are not.
    suggested_source_or_request: Request price book, realized-deal samples, and product KPI dashboard.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer concentration, net retention, churn, and support metrics.
    why_it_matters: Customer quality is central to underwriting enterprise software value.
    suggested_source_or_request: Request cohort and concentration schedules plus customer references.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Supplier/cloud/model spend concentration and SLA terms.
    why_it_matters: Provider dependency can drive margin volatility and uptime risk.
    suggested_source_or_request: Request supplier agreements and spend reports.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Quota attainment, CAC, payback, sales cycle, and partner-influence metrics.
    why_it_matters: GTM efficiency cannot be inferred from marketing activity alone.
    suggested_source_or_request: Request sales and marketing operating dashboard.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D budget, engineering velocity, release quality, incident history, and roadmap confidence.
    why_it_matters: AI-product execution risk is material for the thesis.
    suggested_source_or_request: Request architecture review and engineering KPI pack.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS export by function/location plus attrition and compensation metrics.
    why_it_matters: Workforce health and planning are essential for scaling claims.
    suggested_source_or_request: Request HR data, org chart, and retention metrics.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Counsel-led litigation, IP, insurance, and material-contract review.
    why_it_matters: Public-web access limits left legal and IP cleanliness unresolved.
    suggested_source_or_request: Engage counsel for dedicated legal/IP diligence.
    priority: high
