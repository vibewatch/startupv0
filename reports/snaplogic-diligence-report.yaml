          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public product evidence supports a platform spanning data integration, application integration, API management, copilot functionality, agent creation, MCP-related capabilities, and ancillary tooling. Numeric pricing, SKU economics, and profitability remain private.
        verification_status: partially_verified
        confidence: high
