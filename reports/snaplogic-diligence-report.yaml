  - chapter_id: III
    title: Customer Information
    chapter_summary: SnapLogic has meaningful public customer-logo, case-study, review, and partner signals, but public materials do not disclose revenue concentration, customer health, or supplier spend concentration.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-013
      - EC-014
      - EC-015
      - EC-028
    risk_ids:
      - R-003
      - R-007
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: SnapLogic publicly shows a material roster of enterprise logos and a smaller set of named case studies, but public references do not quantify spend, product mix, or strategic importance.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Named logos and case studies demonstrate referenceability, but not customer concentration or contract durability.
            evidence_claim_ids:
              - EC-011
              - EC-012
              - EC-013
            risk_ids:
              - R-003
        hidden_risks:
          - A customer page can overrepresent marquee logos relative to actual revenue concentration or renewal risk.
        evidence_gaps:
          - Top-15 customer revenue, expansion, churn, and product-mix data were not public.
        follow_up_questions:
          - Provide top-customer revenue, cohort retention, churn, support metrics, and recent customer-reference contacts.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-011
          - EC-012
          - EC-013
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Partner evidence spans cloud, SI, OEM, and regional delivery relationships, indicating ecosystem leverage, but revenue contribution, exclusivity, and contractual economics are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Public partner breadth is visible, but the economics and depth of each relationship remain opaque.
            evidence_claim_ids:
              - EC-014
              - EC-029
            risk_ids:
              - R-007
              - R-010
        hidden_risks:
          - Channel conflict and low-quality partner-sourced pipeline can hide behind positive announcement volume.
        evidence_gaps:
          - Partner-sourced bookings, MDF, revenue share, and termination rights were not public.
        follow_up_questions:
          - Provide strategic-partner list with pipeline contribution, revenue share, and key contractual terms.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-014
          - EC-029
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No accessible public source disclosed revenue by customer or whether any single customer accounts for 5 percent or more of revenue.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Customer-level revenue concentration remains a private-company disclosure gap.
            evidence_claim_ids:
              - EC-028
            risk_ids:
              - R-003
        hidden_risks:
          - A single large customer or handful of partners could drive outsized concentration risk that public logos cannot reveal.
        evidence_gaps:
          - Revenue by customer, cohort, industry, and geography was not public.
        follow_up_questions:
          - Provide customer concentration schedule and identify any customer above 5 percent of revenue.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-028
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No clearly documented severed customer, partner, or supplier relationships were identified in accessible sources, but public search coverage was incomplete and non-conclusive.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: III.D-F1
