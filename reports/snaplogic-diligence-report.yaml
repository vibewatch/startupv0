executive_summary:
  overall_assessment: Track with high-priority financial, customer, security, and legal diligence before underwriting the March 2026 unicorn valuation or assuming durable AI-led iPaaS leadership.
  investment_or_diligence_thesis: Public evidence supports that SnapLogic is an active U.S. enterprise integration vendor with broad product breadth, visible AI launches, named enterprise logos, and an ecosystem-led go-to-market motion. The core underwriting questions—revenue quality, burn/runway, cap-table economics, concentration, legal exposure, pricing power, and contract durability—remain private-data-room items.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and company funding-history materials support SnapLogic’s public unicorn status and a 2021 financing at roughly a $1.0B valuation.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-002
      summary: Company product pages verify a broad platform spanning data integration, application integration, API management, AI copilot, agent creation, and MCP-related capabilities.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
        - EC-009
    - founder_claim_id: FC-004
      summary: Public timelines and press-release titles show a multi-year AI roadmap from Iris to SnapGPT, AgentCreator, MCP, and AI-governance tooling.
      evidence_claim_ids:
        - EC-002
        - EC-026
  biggest_risks:
    - risk_id: R-001
      summary: No public revenue, margin, cash, burn, or debt detail is available, preventing any serious public-only quality-of-revenue analysis.
    - risk_id: R-003
      summary: Public logos exist, but customer concentration, renewal rates, and expansion economics are unknown.
    - risk_id: R-004
      summary: SnapLogic competes against well-resourced iPaaS, integration, and automation vendors with broad feature overlap and potential pricing pressure.
    - risk_id: R-008
      summary: Accessible public legal and IP verification was incomplete, so litigation and registration cleanliness remain open diligence items.
    - risk_id: R-010
      summary: The public GTM footprint suggests activity, but quotas, CAC, payback, and channel efficiency are not disclosed.
  key_evidence_gaps:
    - Three years of audited financial statements, ARR bridge, gross margin, burn, cash, debt, and monthly KPI packs.
    - Cap table, option pool, liquidation preferences, SAFEs/notes, bank lines, tax positions, and off-balance-sheet obligations.
    - Top-customer concentration, net retention, churn, pipeline conversion, and partner-sourced revenue contribution.
    - Security/compliance artifacts, incident history, customer SLAs, material contracts, and full legal/IP schedules.
    - HRIS export, full org chart, compensation plans, quota model, attrition data, and management reference calls.
  recommended_next_steps:
    - Request a data room covering finance, cap table, contracts, customer cohorts, security/legal artifacts, and HR materials.
    - Run customer-reference, product architecture, and security diligence focused on AI-governance, connector reliability, and cloud/model dependencies.
    - Have counsel complete dedicated litigation, IP, insurance, and regulatory searches rather than relying on public-web sampling.
    - Refresh valuation evidence immediately before investment committee because CB Insights unicorn snapshots can lag current round economics.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence confirms SnapLogic’s unicorn status, several financing milestones, and some operating-scale markers, but revenue quality, margins, cash, debt, tax, cap-table terms, and forecast assumptions remain private.
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-024
      - EC-028
    risk_ids:
      - R-001
      - R-002
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements, revenue bridge, gross margin, cash, backlog, or AR schedules were public; only operating-scale proxies such as 2.7T documents per month, 300+ employees, and 5 offices are public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Accessible public sources show operating-scale proxies but do not expose the core financial statements needed for underwriting.
            evidence_claim_ids:
              - EC-004
              - EC-028
            risk_ids:
              - R-001
        hidden_risks:
          - Self-reported scale metrics can coexist with weak gross margins, elevated burn, or deteriorating receivables.
        evidence_gaps:
          - Three years of audited financials, monthly KPI packs, backlog by customer, and AR aging were not public.
        follow_up_questions:
          - Provide income statements, balance sheets, cash flows, backlog, and AR aging for the past three years.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-028
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers are publicly visible in product expansion and analyst-recognition cadence, but management projections, pricing assumptions, sales efficiency, and external-financing assumptions are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Public narratives support a growth story, but not the forecast model required to test valuation durability.
            evidence_claim_ids:
              - EC-001
              - EC-005
              - EC-010
              - EC-028
            risk_ids:
              - R-001
              - R-002
              - R-010
        hidden_risks:
          - The business may require financing or discounting assumptions that are invisible in public materials.
        evidence_gaps:
          - Three-year quarterly model, scenario assumptions, capex/working-capital plan, and foreign-operation risk analysis were not public.
        follow_up_questions:
          - Share the three-year operating model, assumptions, and financing plan that underlie current valuation expectations.
        table_ids: []
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-005
          - EC-010
          - EC-028
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify some investors and recent leaders but not shares outstanding, option overhang, debt terms, liquidation preferences, or off-balance-sheet liabilities.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Investor names are public, but actual ownership percentages and instrument terms are not.
            evidence_claim_ids:
              - EC-001
              - EC-024
              - EC-028
            risk_ids:
              - R-002
        hidden_risks:
          - A hidden preference stack or debt covenant could materially change common-equity economics.
        evidence_gaps:
          - Current cap table, SAFEs/notes, option grants, warrants, debt, and guarantees were not public.
        follow_up_questions:
          - Provide current fully diluted ownership, option schedules, debt agreements, and board-rights summaries.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-024
          - EC-028
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history is partially reconstructable through company timeline, CB Insights, and accessible secondary sources, including a 2021 $165M round at a $1B valuation.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: The 2021 funding event is strongly public, but earlier round detail and complete terms remain fragmented.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
            risk_ids:
              - R-002
        hidden_risks:
          - Headline valuation can be stale or economically misleading without preferences, secondary sales, or later markdown context.
        evidence_gaps:
          - Round-by-round term sheets, tax position, debt stack, and current basis for each investor were not public.
        follow_up_questions:
