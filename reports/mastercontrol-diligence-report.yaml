report_metadata:
  report_title: MasterControl Public-Source Startup Diligence Report
  target_company: MasterControl
  website: https://www.mastercontrol.com/
  known_aliases:
    - MasterControl Solutions Inc.
    - MasterControl QMS
    - MasterControl Manufacturing Excellence
  sector: Life-sciences quality management, manufacturing execution, and asset management software
  geography: United States; headquarters in Salt Lake City, Utah with global regulated-industry customers
  company_stage: Late-stage private unicorn; CB Insights lists a $1.30B valuation and 2025 company
    release disclosed a $200M ARR milestone
  research_date: 2026-05-29
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from existing reports and selected this uncovered unicorn from the CB
      Insights current unicorn list.
    - Reviewed company-owned pages, funding announcements, customer/partner pages,
      legal/privacy/security pages, and public news/database sources accessible through curl/Jina.
    - Treated company-authored customer, ROI, scale, and security claims as partially verified
      unless independently corroborated.
    - Marked financial statements, cap table, customer concentration, contracts, litigation
      schedules, and HR metrics as not publicly verifiable where unavailable.
  included_jurisdictions:
    - United States
    - United States
    - Global operations where public sources indicated international customers or users
  excluded_topics:
    - No paid databases, private data room, direct management interviews, customer calls, counsel
      letters, formal docket searches, or regulator-record pulls were performed.
    - No non-public personal data was collected or included.
  user_provided_materials:
    - material_id: M-001
      title: User prompt requesting three random uncovered unicorn diligence reports
      type: prompt_argument
      date_received: 2026-05-29
      notes: No founder deck or private company materials were supplied.
