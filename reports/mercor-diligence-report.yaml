report_metadata:
  report_title: Mercor Startup Diligence Report
  target_company: Mercor
  website: https://mercor.com/
  known_aliases:
    - Mercor.com, Inc.
    - Mercor AI
  sector: Artificial intelligence / expert data and AI labor marketplace
  geography: United States; global expert contractor network
  company_stage: Late-stage private AI unicorn
  research_date: 2026-05-27
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public sources only; no private data room, management interview, customer call or paid database access.
    - Built exclusion list from reports/*-diligence-report.yaml and selected uncovered private unicorns from the current Wikipedia unicorn table plus public source checks.
    - Treated company-authored claims as evidence of the claim being made, not independent proof of outcome.
  included_jurisdictions:
    - United States
    - global expert contractor network
  excluded_topics:
    - Non-public financial statements, board materials, customer calls, contracts, HRIS exports and security reports were unavailable.
  user_provided_materials: []
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Mercor is an active private AI unicorn valued at US$10B.
    claim_source: Company blog, CNBC and unicorn list
    claim_date: 2025-10-27
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids: &a1
      - EC-001
      - EC-008
    contradiction_summary: null
    diligence_follow_up:
      - Request financing documents, preference stack, cap table and current valuation support.
  - founder_claim_id: FC-002
    claim_text: Mercor organizes human expertise to train AI models for AI labs and enterprises.
    claim_source: Mercor website/blog
    claim_date: null
    mapped_chapter_ids:
      - II
      - III
      - VI
    mapped_section_ids:
      - II.A
      - III.B
      - VI.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: &a2
      - EC-002
      - EC-003
      - EC-005
    contradiction_summary: null
    diligence_follow_up:
      - Request customer contracts, project mix, data-rights terms, quality metrics and worker retention.
  - founder_claim_id: FC-003
    claim_text: Mercor’s scale and market timing support durable growth.
    claim_source: Implied valuation narrative
    claim_date: null
    mapped_chapter_ids:
      - I
      - V
    mapped_section_ids:
      - I.B
      - V.A
    verification_status: not_publicly_verifiable
    confidence: low
    evidence_claim_ids:
      - EC-004
      - EC-006
      - EC-007
    contradiction_summary: Growth narrative is public, but revenue concentration, margin and cohort evidence are private.
    diligence_follow_up:
      - Request ARR/bookings, gross margin, customer concentration, cohort data and pipeline.
executive_summary:
  overall_assessment: Mercor passed the public-source operating-company screen after replacing an ineligible acquired candidate. Proceed to diligence if Mercor can prove durable AI-lab/enterprise demand, strong gross margins, defensible quality systems and clean data/worker contracts; public evidence verifies the US$10B raise but leaves core revenue-quality and legal questions private.
  investment_or_diligence_thesis: Proceed to diligence if Mercor can prove durable AI-lab/enterprise demand, strong gross margins, defensible quality systems and clean data/worker contracts; public evidence verifies the US$10B raise but leaves core revenue-quality and legal questions private.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Mercor is an active private AI unicorn valued at US$10B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Mercor organizes human expertise to train AI models for AI labs and enterprises.
      evidence_claim_ids: *a2
  biggest_risks:
    - risk_id: R-001
      summary: AI-lab customer concentration and demand cyclicality
    - risk_id: R-002
      summary: Worker classification, data rights and IP/privacy exposure
    - risk_id: R-003
      summary: Gross margin and quality-control economics unknown
  key_evidence_gaps:
    - Audited financial statements, current cash/debt/runway and board-approved forecast.
    - Cap table, financing preferences, options/warrants, debt and current valuation support.
    - Top-customer revenue, contracts, churn/retention and independent customer references.
    - Material contracts, legal/regulatory/IP/security/insurance artifacts.
    - HRIS, compensation, option plan, turnover and hiring plan.
  recommended_next_steps:
    - Request finance, legal, customer, HR and product/security data-room indexes before relying on headline valuation.
    - Run customer-reference and revenue-quality workstream focused on concentration, retention and gross margin.
    - Have counsel and technical specialists review contracts, regulatory exposure, IP ownership, privacy/security and product risk.
