report_metadata:
  report_title: Hugging Face Startup Diligence Report
  target_company: Hugging Face
  website: https://huggingface.co/
  known_aliases:
    - Hugging Face, Inc.
    - Hugging Face
  sector: Open-source AI infrastructure, model hub, datasets, inference and enterprise AI collaboration
  geography: France / United States / global AI developer market
  company_stage: Private unicorn / growth-stage AI infrastructure company
  research_date: 2026-05-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Built the target list from current public unicorn-list sources and excluded reports already present in the repository.
    - Prioritized company-owned sources, public customer/pricing/security pages, GitHub repository metadata and reputable market/news sources.
    - Treated company-published claims as verified only for the existence of the public statement unless independently corroborated.
    - No private data room, management interview, customer call, legal docket search artifact or security report was available.
  included_jurisdictions:
    - France
    - United States
    - Global markets referenced by public company materials
  excluded_topics:
    - Private financial statements, contracts, cap table, customer calls, board materials, SOC/security reports, legal dockets and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-17
      notes: No pitch deck, financial model, data room or founder responses were provided.
