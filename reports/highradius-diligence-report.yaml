schema_version: "1.1"
report_metadata:
  report_title: HighRadius Public-Source Startup Diligence Report
  target_company: HighRadius
  website: https://www.highradius.com/
  known_aliases:
    - HighRadius
    - HighRadius Corporation
    - HighRadius Corp.
    - HighRadius Technologies Private Limited
  sector: Autonomous finance software / fintech / Office of the CFO software
  geography: Houston, Texas headquarters with India and UK operations signals; global enterprise customer base
  company_stage: Late-stage private unicorn / Series C
  research_date: 2026-06-17
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: America/Chicago
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public sources only, prioritizing HighRadius primary website pages, public legal/IP records and reputable third-party public profiles or snippets.
    - Verified report eligibility first by checking whether HighRadius still appears active and private / pre-IPO, and by looking for contrary IPO, acquisition or shutdown signals.
    - Where direct extraction of a destination page was incomplete because of bot/cookie gating, used search-result snippets as lower-confidence directional evidence and labeled them explicitly.
    - Marked financial, customer, contract, compensation and regulatory items not_publicly_verifiable when they require private data-room material or counsel-led searches.
  included_jurisdictions:
    - United States
    - India
    - United Kingdom
    - European enterprise operations referenced publicly
    - Global bank / ERP / customer footprint as publicly marketed
  excluded_topics:
    - Non-public data room materials
    - Customer or management interviews
    - Paid database exports beyond publicly surfaced snippets
    - Investment, tax or legal advice
    - Any non-public personal data
  user_provided_materials: []
