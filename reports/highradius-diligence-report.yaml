diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, AR aging, product/channel/geography revenue mix and working-capital metrics.
    why_it_matters: These are core to underwriting quality of revenue, cash conversion and valuation support.
    suggested_source_or_request: Request audited and monthly management financial statements plus AR aging and revenue bridges.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option schedule, debt/credit lines and investor rights.
    why_it_matters: Preference stack and dilution can materially change return math.
    suggested_source_or_request: Request the latest cap table, ESOP schedule, debt agreements and board consents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue and collections concentration by customer, including any account above 5%.
    why_it_matters: Logo evidence is not a substitute for concentration and churn risk analysis.
    suggested_source_or_request: Request ARR / collections by customer and top-customer contract summaries.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Module-level pricing, margins, NRR and product attach rates.
    why_it_matters: A broad platform can hide weak economics in individual suites.
    suggested_source_or_request: Request product P&L, pricing policy and cross-sell adoption metrics.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Vendor spend, SLA commitments, concentration and DR/BCP details for key subprocessors.
    why_it_matters: Cloud and AI vendor dependence is clearly material.
    suggested_source_or_request: Request the top-vendor list, spend, contracts and outage history.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Engineering org chart, R&D headcount and R&D spend.
    why_it_matters: The public pack is too thin to assess innovation execution depth.
    suggested_source_or_request: Request the engineering/product org, budget and roadmap governance documents.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Official headcount, attrition and compensation data by function and location.
    why_it_matters: Third-party headcount tools conflict and public people data is not governance-grade.
    suggested_source_or_request: Request HRIS exports and attrition dashboards.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.B
    missing_information: Official pleadings, reserve analysis, insurance response and settlement posture for active litigation.
    why_it_matters: Public docket aggregators do not provide a full legal-risk picture.
    suggested_source_or_request: Request counsel memos, pleadings and litigation budget/reserve materials.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulator correspondence, audit exceptions, trust-center artifacts and privacy incident logs.
    why_it_matters: Public compliance claims are not equivalent to a clean regulatory file.
    suggested_source_or_request: Request SOC reports, pen tests, DPA templates and regulator communications.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer, partner, bank-integration and acquisition contracts.
    why_it_matters: Commercial and change-of-control terms can materially affect value and integration flexibility.
    suggested_source_or_request: Request top contracts and the Cforia acquisition agreement.
    priority: high
