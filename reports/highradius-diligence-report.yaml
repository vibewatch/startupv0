risk_register:
  - risk_id: R-001
    risk_title: Opaque financial quality and unit economics
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources disclose funding events and selective growth metrics, but not audited statements, margins, burn, debt or working-capital quality.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-009
      - EC-030
    mitigation_or_diligence_request: Request audited financials, management accounts, AR aging, forecast model and debt/cash schedules.
  - risk_id: R-002
    risk_title: Customer concentration and retention opacity
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named logos and case studies are public, but revenue by customer, retention and concentration over 5% are not.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-016
      - EC-017
      - EC-018
      - EC-030
    mitigation_or_diligence_request: Obtain top-customer ARR/collections data, renewals, churn and customer references.
  - risk_id: R-003
    risk_title: Valuation staleness and liquidity risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: The strongest disclosed valuation anchor is the 2021 $3.1B round; no newer public financing round was found and current secondary-market pricing is not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-002
      - EC-005
      - EC-006
    mitigation_or_diligence_request: Request the latest 409A/valuation marks, secondaries, investor letters and fundraising plans.
  - risk_id: R-004
    risk_title: Competitive pressure across multiple finance-software categories
    risk_category: market
    severity: medium
    likelihood: high
    description: HighRadius spans O2C, treasury and R2R categories that each have strong incumbents and specialized challengers.
    impacted_chapter_ids:
      - II
      - IV
    impacted_section_ids:
      - II.A
      - IV.A
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-028
    mitigation_or_diligence_request: Benchmark price/performance, win rates and implementation success against the named alternatives.
  - risk_id: R-005
    risk_title: Implementation and ecosystem execution risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: The model relies on integrations, partner-led implementation and broad product scope, which can complicate delivery consistency.
    impacted_chapter_ids:
      - III
      - V
      - VI
    impacted_section_ids:
      - III.B
      - V.A
      - V.C
      - VI.B
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-019
      - EC-020
      - EC-027
    mitigation_or_diligence_request: Review implementation SLAs, services mix, gross margin by delivery model and post-acquisition integration plans.
  - risk_id: R-006
    risk_title: AI, privacy and compliance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: OpenAI-linked features, cloud AI subprocessors and public GDPR/HIPAA/SOC claims create material model-risk, data-governance and compliance diligence requirements.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-010
      - EC-013
      - EC-021
      - EC-033
    mitigation_or_diligence_request: Obtain trust-center documents, model-governance controls, data-flow maps, DPA templates and regulator correspondence.
  - risk_id: R-007
    risk_title: Cloud and bank/ERP dependency risk
    risk_category: technical
    severity: medium
    likelihood: high
    description: Key functionality depends on hyperscalers, AI services, Snowflake, Salesforce, Twilio and broad bank/ERP connectors.
    impacted_chapter_ids:
      - III
      - VI
    impacted_section_ids:
      - III.E
      - VI.A
    evidence_claim_ids:
      - EC-011
      - EC-013
    mitigation_or_diligence_request: Review vendor concentration, SLAs, DR/BCP, AI-provider lock-in and connector maintenance costs.
  - risk_id: R-008
    risk_title: Litigation and IP dispute risk
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Active litigation with Esker and prior disputes with Sidetrade show real commercial/IP/talent conflict risk in the category.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.B
      - VIII.D
    evidence_claim_ids:
      - EC-022
      - EC-023
      - EC-024
      - EC-025
    mitigation_or_diligence_request: Have counsel review pleadings, exposure, injunction risks, settlement posture and patent/trademark chain of title.
  - risk_id: R-009
    risk_title: People-scale and retention governance opacity
    risk_category: team
    severity: medium
    likelihood: medium
    description: HighRadius appears to employ several thousand people, but official headcount, attrition and compensation disclosures are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.D
      - VII.G
    evidence_claim_ids:
      - EC-014
      - EC-026
      - EC-031
    mitigation_or_diligence_request: Request official org/headcount/attrition files, key-person dependency analysis and retention plans.
  - risk_id: R-010
    risk_title: Acquisition and platform-unification risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: The Cforia acquisition and breadth across O2C, AP, R2R, Treasury and AI layers raise integration and roadmap-prioritization risk.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.F
    evidence_claim_ids:
