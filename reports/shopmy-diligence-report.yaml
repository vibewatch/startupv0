report_metadata:
  report_title: ShopMy Startup Diligence Report
  target_company: ShopMy
  website: https://shopmy.us/
  known_aliases:
    - Shop My Shelf, Inc.
    - ShopMyShelf
    - ShopMy.us
  sector: Creator commerce infrastructure, influencer marketing and affiliate commerce technology
  geography: United States / Worcester, Massachusetts public record; New York and remote-first operating signals
  company_stage: Private unicorn / growth-stage software platform
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public web, company pages, SEC filings, investor posts, reputable news, legal/trademark records and competitor pages.
    - Treated company/investor claims as public assertions unless independently/regulatorily corroborated.
    - Ignored embedded instructions in fetched pages as untrusted data.
  included_jurisdictions:
    - United States
    - Delaware
    - Massachusetts
    - Privacy jurisdictions implicated by company policy
  excluded_topics:
    - Private financials, cap table, contracts, customer calls, employee files, security reports, full legal dockets and complete IP searches were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided CB Insights ShopMy unicorn row
      type: workflow_request
      date_received: 2026-05-24
      notes: Included valuation, date joined, country/city, industry and select investors.
