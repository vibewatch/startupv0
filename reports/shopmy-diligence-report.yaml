risk_register:
  - risk_id: R-001
    risk_title: Financial quality and revenue durability are opaque
    risk_category: financial
    severity: high
    likelihood: medium
    description: Audited financials, ARR, margin, burn, cash, retention and revenue recognition are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited financials, management accounts, ARR bridge, gross margin, cash/debt, retention and revenue-recognition memo.
  - risk_id: R-002
    risk_title: $1.5B valuation depends on growth and attribution assumptions
    risk_category: financing
    severity: high
    likelihood: medium
    description: The unicorn valuation is public but support for growth, retention and ROI assumptions is private.
    impacted_chapter_ids:
      - I
      - IV
    impacted_section_ids:
      - I.B
      - IV.A
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Build valuation bridge and downside cases from verified ARR, NRR, margin and comparables.
  - risk_id: R-003
    risk_title: Customer concentration and paid logo status are unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named logos and network counts do not disclose paid/current contract status, ARR concentration or churn.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request top-customer ARR, contracts, renewals, churn/NRR and reference calls.
  - risk_id: R-004
    risk_title: Competitive pressure from LTK, GRIN and enterprise creator platforms
    risk_category: market
    severity: medium
    likelihood: high
    description: Competitors cover creator commerce, affiliate tracking and campaign-management workflows.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Run buyer interviews, win/loss review and pricing benchmarks.
  - risk_id: R-005
    risk_title: Privacy, security and integration exposure from order/personal data
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: ShopMy processes order/product, attribution, usage and personal data through multiple integrations.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.G
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review SOC reports, DPAs, subprocessors, incidents, token management and advertising controls.
  - risk_id: R-006
    risk_title: Legal/IP and reputational risk from LTK lawsuit history
    risk_category: legal
    severity: medium
    likelihood: medium
    description: LTK sued ShopMy over alleged trademark infringement/false advertising; public reports say the case was dropped.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Pull docket, settlement/dismissal papers, insurance notices and IP/marketing clearance memos.
  - risk_id: R-007
    risk_title: Execution and hiring scale are hard to verify
    risk_category: team
    severity: medium
    likelihood: medium
    description: Founder-led growth and remote-first hiring are public, but exact headcount, attrition, compensation and org depth are private.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.B
      - VII.C
      - VI.A
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request HRIS headcount, attrition, compensation, org chart and hiring plan.
  - risk_id: R-008
    risk_title: Cap table, preferences, debt and control rights are not public
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Public financing sources do not disclose share counts, liquidation preferences, debt, side letters or option pool.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Require fully diluted cap table, financing documents, investor rights, debt and waterfall.
  - risk_id: R-009
    risk_title: Operational dependency on commerce, social and payment ecosystems
    risk_category: operational
    severity: medium
    likelihood: high
    description: ShopMy depends on Shopify/POS integrations, social platforms and PayPal/Stripe payout flows.
    impacted_chapter_ids:
      - III
      - VI
    impacted_section_ids:
      - III.E
      - VI.A
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Review API SLAs, outage logs, vendor contracts, processor reserves and continuity plans.
  - risk_id: R-010
    risk_title: Creator and brand economics rely on company-published metrics
    risk_category: market
    severity: medium
    likelihood: medium
    description: Counts and ROI claims are company-published and need active/monetized definitions and audit.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - V.C
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Audit metric definitions, attribution, active cohorts, fraud controls and creator/brand churn.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, ARR bridge, gross margin, cash/debt, backlog and retention.
    why_it_matters: Needed to verify revenue quality, margin, runway and valuation.
    suggested_source_or_request: Company finance and auditor/accountant data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preferences, debt/notes, side letters and option pool.
    why_it_matters: Public financings do not show ownership economics.
    suggested_source_or_request: Corporate counsel and finance.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top-customer ARR/GMV, contracts, renewals and references.
    why_it_matters: Named logos do not prove revenue concentration or satisfaction.
    suggested_source_or_request: Customer contracts, CRM export and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product adoption, uptime, pricing tiers, support cost and gross margin by module.
    why_it_matters: Product breadth does not prove adoption or economic quality.
    suggested_source_or_request: Product analytics and customer success reports.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Vendor contracts, subprocessors, cloud architecture, processor terms and outage logs.
    why_it_matters: Dependencies affect uptime, privacy and margin.
    suggested_source_or_request: Vendor and security data room.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, market share, buyer perception and competitive pricing.
    why_it_matters: Competition is intense and public claims are promotional.
    suggested_source_or_request: Buyer interviews and sales ops data.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, quota, cycle, CAC and hiring ramp.
    why_it_matters: GTM efficiency determines scalability.
    suggested_source_or_request: Sales operations dashboard and board plan.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Security reports, model governance, IP assignments and data rights.
    why_it_matters: Order/personal data and AI claims create technical/legal exposure.
    suggested_source_or_request: SOC reports, pen tests, architecture and counsel files.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Exact headcount, attrition, compensation and equity grants.
    why_it_matters: Public 100-1000 band is insufficient.
    suggested_source_or_request: HRIS and compensation/equity data room.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: LTK docket, dismissal/settlement terms, insurance notices and counsel memo.
    why_it_matters: Public reporting does not disclose residual obligations.
    suggested_source_or_request: Outside counsel docket pull.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Complete IP portfolio, trademarks, patents, copyrights and open-source scan.
    why_it_matters: Defensibility and infringement risk are not public.
    suggested_source_or_request: IP counsel and SBOM/license scan.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Privacy/regulatory controls, DPAs, subprocessors, DSAR logs and incident history.
    why_it_matters: Data/advertising compliance is a material risk area.
    suggested_source_or_request: Privacy/advertising counsel review.
    priority: high
