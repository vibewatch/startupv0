executive_summary:
  overall_assessment: "Eligible: ShopMy appears to be an active private unicorn, with CB Insights listing a $1.50B valuation and no public IPO, acquisition or shutdown signal found in searched sources. Public evidence supports a fast-scaling creator-commerce platform with strong financing, premium-brand logos, product breadth and network-scale claims, but underwriting requires private validation of financial quality, customer concentration, ROI attribution, cap table, security/privacy controls and legal/IP exposure."
  investment_or_diligence_thesis: Proceed only to confirmatory private diligence. The attractive thesis is ShopMy as creator-commerce infrastructure for premium brands and tastemakers, but public evidence alone is insufficient to underwrite the $1.5B valuation without audited financials, ARR/retention, customer economics, cap-table terms, security/privacy evidence and legal review.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support the $70M financing and $1.5B valuation.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-004
      summary: Company pages verify a broad creator/brand/shopper product suite.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-022
    - founder_claim_id: FC-008
      summary: Founder identity and founder-led management are supported by TechCrunch, Menlo and SEC filings.
      evidence_claim_ids:
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR, margin, burn and retention are opaque.
    - risk_id: R-002
      summary: $1.5B valuation is sensitive to growth and attribution assumptions.
    - risk_id: R-003
      summary: Customer concentration, churn and paid logo status are unknown.
    - risk_id: R-005
      summary: Privacy/security exposure is material due to order/product/personal data flows.
  key_evidence_gaps:
    - Audited financials, ARR/GMV bridge, gross margin, cash/debt and retention.
    - Cap table, financing terms, preferences, debt and option pool.
    - Top-customer revenue, contracts, renewals, references and churn.
    - Product adoption, pricing, uptime, implementation cost and attribution methodology.
    - Security/privacy artifacts, subprocessors, DPAs, incident logs and advertising-compliance controls.
    - LTK litigation docket/dismissal terms, complete IP portfolio, material contracts and insurance.
  recommended_next_steps:
    - Open private financial and cap-table diligence before relying on valuation or ROI claims.
    - Conduct top-customer reference calls and review customer contracts, renewals and concentration.
    - Have security/privacy/advertising counsel review data flows, integrations, DPAs and creator disclosure controls.
    - Benchmark pricing, win/loss and buyer perception against LTK, GRIN, CreatorIQ, Aspire, Upfluence and impact.com.
    - Have counsel review LTK litigation records, IP portfolio, material contracts, insurance and regulatory correspondence.
