  - chapter_id: IV
    title: Competition
    chapter_summary: Sift operates in a crowded fraud-prevention market with public overlap against Forter, Riskified, Signifyd, SEON and internal risk engines. Differentiation depends on data, model performance, workflow depth, pricing and customer ROI proof.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-005
      - EC-011
      - EC-019
    risk_ids:
      - R-004
      - R-010
