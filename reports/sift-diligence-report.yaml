executive_summary:
  overall_assessment: "Sift appears to be an active, private U.S. fraud-prevention unicorn: public unicorn lists, TechCrunch financing coverage, current company website, jobs and LinkedIn all support eligibility. The product/category and customer/network claims are credible as public signals, but investment-grade diligence remains dominated by private gaps in ARR, retention, concentration, cap table, model performance, security/privacy, legal and contracts."
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if Sift can prove durable ARR growth, strong NRR, low concentration, differentiated model performance, acceptable data/privacy controls, defensible IP and current financing terms that justify or improve on the stale April 2021 unicorn valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support Sift as a 2021 $1B+ private unicorn.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-024
    - founder_claim_id: FC-002
      summary: Sift publicly markets an active AI-powered fraud decisioning platform.
      evidence_claim_ids:
        - EC-005
        - EC-023
    - founder_claim_id: FC-006
      summary: Current leadership, LinkedIn and job postings support active private-company status.
      evidence_claim_ids:
        - EC-013
        - EC-014
        - EC-024
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR, margins and cash/runway are not public.
    - risk_id: R-002
      summary: Customer concentration, churn and renewal quality are unknown despite public logos.
    - risk_id: R-004
      summary: Competitive pressure from Forter, Riskified, Signifyd, SEON and internal risk engines could pressure growth and pricing.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, gross margin, cash, debt, budget-to-actuals and forecast model.
    - Current cap table, liquidation preferences, option pool, debt, warrants and valuation support.
    - Top-customer ARR, concentration, NRR/churn cohorts, contract terms and independent customer references.
    - Model performance, false-positive rates, chargeback/fraud outcomes, uptime, incidents and security/SOC reports.
    - Privacy/regulatory correspondence, DPAs, material contracts, litigation, insurance and complete IP assignments/FTO.
  recommended_next_steps:
    - Run financial quality-of-earnings, ARR retention and cohort diligence before relying on the headline unicorn valuation.
    - Request cap table and financing documents to reconcile stale 2021 valuation with current ownership economics.
    - Conduct customer calls and product/model technical diligence to verify ROI, false positives, implementation burden and competitive differentiation.
    - Have counsel review privacy, data rights, contracts, IP, litigation and regulatory exposure.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Sift has strong public financing evidence for private-unicorn status, including a 2021 $50M round at over $1B, but operating financials, current valuation support, cap table, debt, ARR and unit economics are not publicly verifiable.
    founder_claim_ids:
      - FC-001
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-020
      - EC-021
      - EC-024
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public evidence provides selective usage and business-scale signals but not audited financial statements, budget-to-actuals, backlog, AR aging or product/geography gross profit.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources disclose transaction volume and loss-prevention claims, but no ARR, GAAP statements, cash/debt or margin data.
            evidence_claim_ids:
              - EC-020
              - EC-021
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - R-001 and R-002 remain unresolved until financial and customer schedules are provided.
        evidence_gaps:
          - Audited financials, management accounts, ARR/bookings, gross margin, cash/debt, backlog, AR aging and revenue by product/channel/geography.
        follow_up_questions:
          - Provide three years of audited financials, monthly KPI pack, ARR waterfall, budget-to-actuals, backlog, AR aging, cash/debt and revenue/margin splits.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-020
          - EC-021
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public projections were found. Public data supports a large market and product/customer traction, but forecast assumptions, capital needs and predictability require management materials.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Public signals do not verify forecast accuracy, CAC/payback, pricing assumptions or financing needs.
            evidence_claim_ids:
              - EC-010
              - EC-020
              - EC-021
            risk_ids:
              - R-001
              - R-003
              - R-010
        hidden_risks:
          - Stale valuation and undisclosed current financing assumptions could materially affect investor returns.
        evidence_gaps:
          - Three-year operating model, scenarios, budget-to-actual history, capex/cloud assumptions, hiring plan, financing plan and downside case.
        follow_up_questions:
          - Provide the board-approved forecast model and explain assumptions for ARR, NRR, churn, pricing, CAC, gross margin, cloud cost and hiring.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-010
          - EC-020
          - EC-021
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Investors and major funding rounds are public, but share counts, option pool, preferences, debt, warrants and off-balance-sheet obligations are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Public sources identify major investors and a 2021 valuation, not ownership percentages or liquidation terms.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
              - EC-004
              - EC-020
              - EC-024
            risk_ids:
              - R-003
        hidden_risks:
          - Preferred-stack and current valuation terms may differ materially from headline unicorn valuation.
        evidence_gaps:
          - Current cap table, option ledger, SAFEs/notes/warrants, debt instruments, preference stack, board rights and secondary transactions.
        follow_up_questions:
          - Provide fully diluted cap table, financing docs, option ledger, investor consents, debt/warrant schedules and current valuation analysis.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-020
          - EC-024
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history is reasonably documented for 2016, 2018 and 2021 rounds, but tax, accounting policies and complete financing basis are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Public round history supports a cumulative funding narrative through the 2021 unicorn round.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-004
            risk_ids:
              - R-003
        hidden_risks:
          - Tax positions, revenue-recognition policy and financing terms can materially alter quality-of-earnings and valuation.
        evidence_gaps:
          - Tax schedules, revenue recognition memos, financing ledgers, investor basis and accounting policies.
        follow_up_questions:
          - Provide tax returns/NOLs, revenue-recognition policy, financing history with ownership percentages and current investor basis.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-020
  - chapter_id: II
    title: Products
    chapter_summary: Sift publicly markets a live AI-powered fraud decisioning platform with payment, account, content, score API and partner/authentication capabilities. Product existence is verified, but pricing, roadmap, performance and margins remain private.
