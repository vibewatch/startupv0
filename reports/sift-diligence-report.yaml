        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Sift publicly markets a partner ecosystem, but partner revenue, marketing agreements and integration activity are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
