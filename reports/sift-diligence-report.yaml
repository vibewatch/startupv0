          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-010
          - EC-012
          - EC-023
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence supports broad customer-logo and network-scale claims, including 700+ brands and named case studies, but top-customer revenue, concentration, churn, NRR and severed relationships are private.
    founder_claim_ids:
      - FC-003
      - FC-007
    evidence_claim_ids:
