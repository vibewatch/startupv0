  - figure_id: F-010
    title: Sift diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of the full risk register by severity and likelihood.
    purpose: Support prioritization of confirmatory diligence.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and ARR are not public
          severity: high
          likelihood: unknown
          rationale: Audited financials, ARR, bookings, gross margin, NRR, churn, cash, debt and forecast accuracy are unavailable publicly.
          evidence_claim_ids:
            - EC-020
            - EC-021
          source_ids:
            - SRC-003
            - SRC-007
            - SRC-006
        - risk_id: R-002
          label: Customer concentration and renewal quality unknown
          severity: high
          likelihood: unknown
          rationale: Public logos and case studies do not disclose top-customer ARR, contract terms, churn, NRR or customer concentration.
          evidence_claim_ids:
            - EC-006
            - EC-007
            - EC-008
            - EC-020
          source_ids:
            - SRC-010
            - SRC-003
            - SRC-014
            - SRC-006
            - SRC-007
        - risk_id: R-003
          label: Stale valuation and financing terms risk
          severity: high
          likelihood: medium
          rationale: The public unicorn valuation dates to April 2021; current preferred terms, liquidation stack, debt and secondary pricing are not public.
          evidence_claim_ids:
            - EC-001
            - EC-002
            - EC-003
            - EC-004
            - EC-024
          source_ids:
            - SRC-002
            - SRC-004
            - SRC-013
            - SRC-001
            - SRC-003
            - SRC-006
            - SRC-014
            - SRC-005
        - risk_id: R-004
          label: Crowded fraud-prevention competitive landscape
          severity: high
          likelihood: medium
          rationale: Forter, Riskified, Signifyd, SEON and other providers advertise overlapping fraud and ecommerce-risk products.
          evidence_claim_ids:
            - EC-011
            - EC-019
          source_ids:
            - SRC-022
            - SRC-023
            - SRC-024
            - SRC-021
            - SRC-005
        - risk_id: R-005
          label: Model accuracy, drift and false-positive economics
          severity: high
          likelihood: medium
          rationale: Sift sells AI/ML fraud decisioning; model drift, false positives, underperformance or opaque decisions can damage customers and retention.
          evidence_claim_ids:
            - EC-005
            - EC-008
            - EC-023
          source_ids:
            - SRC-008
            - SRC-010
            - SRC-019
            - SRC-006
        - risk_id: R-006
          label: Privacy, profiling and regulatory exposure
          severity: high
          likelihood: medium
          rationale: Fraud-prevention services involve personal data, machine-learning/profiling, third-party integrations and international privacy regimes.
          evidence_claim_ids:
            - EC-016
