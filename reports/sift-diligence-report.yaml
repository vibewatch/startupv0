risk_register:
  - risk_id: R-001
    risk_title: Financial quality and ARR are not public
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Audited financials, ARR, bookings, gross margin, NRR, churn, cash, debt and forecast accuracy are unavailable publicly.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids:
      - EC-020
      - EC-021
    mitigation_or_diligence_request: Require audited financial statements, management KPI pack, ARR bridge, cohort retention, cash/debt schedule and forecast model.
  - risk_id: R-002
    risk_title: Customer concentration and renewal quality unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public logos and case studies do not disclose top-customer ARR, contract terms, churn, NRR or customer concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-020
    mitigation_or_diligence_request: Request top-25 customer schedule, renewal calendar, cohort retention, reference calls and lost-customer analysis.
  - risk_id: R-003
    risk_title: Stale valuation and financing terms risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: The public unicorn valuation dates to April 2021; current preferred terms, liquidation stack, debt and secondary pricing are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-024
    mitigation_or_diligence_request: Request full cap table, financing documents, preference stack, option pool, debt instruments and any secondary/down-round indications.
  - risk_id: R-004
    risk_title: Crowded fraud-prevention competitive landscape
    risk_category: market
    severity: high
    likelihood: medium
    description: Forter, Riskified, Signifyd, SEON and other providers advertise overlapping fraud and ecommerce-risk products.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids:
      - EC-011
      - EC-019
    mitigation_or_diligence_request: Run win/loss calls, pricing benchmark, analyst/customer references and differentiated-model performance tests.
  - risk_id: R-005
    risk_title: Model accuracy, drift and false-positive economics
    risk_category: product
    severity: high
    likelihood: medium
    description: Sift sells AI/ML fraud decisioning; model drift, false positives, underperformance or opaque decisions can damage customers and retention.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-005
      - EC-008
      - EC-023
    mitigation_or_diligence_request: Request model-performance dashboards, false-positive/chargeback cohorts, explainability policies, incident logs and customer SLA data.
  - risk_id: R-006
    risk_title: Privacy, profiling and regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Fraud-prevention services involve personal data, machine-learning/profiling, third-party integrations and international privacy regimes.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-016
      - EC-022
    mitigation_or_diligence_request: Counsel should review DPA templates, privacy impact assessments, regulator correspondence, SOC/security reports and data-transfer mechanisms.
  - risk_id: R-007
    risk_title: IP ownership and freedom-to-operate not fully verified
    risk_category: technical
    severity: medium
    likelihood: unknown
    description: Company-published patents support innovation but assignments, maintenance, scope, encumbrances and FTO are not independently reviewed.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.D
    evidence_claim_ids:
      - EC-012
      - EC-018
      - EC-023
    mitigation_or_diligence_request: Patent counsel should verify assignments, maintenance fees, claim coverage, trade secrets, open-source use and FTO.
  - risk_id: R-008
    risk_title: Leadership transition and hiring execution risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Current leadership is public and hiring is active, but executive retention, attrition and quota capacity are not public.
    impacted_chapter_ids:
      - VII
      - V
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.G
      - V.D
    evidence_claim_ids:
      - EC-013
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Review HRIS, attrition, sales capacity, compensation, leadership contracts and hiring-plan attainment.
  - risk_id: R-009
    risk_title: Operational dependency on data network, integrations and partners
    risk_category: operational
    severity: medium
    likelihood: unknown
    description: Product value depends on global data network, customer integrations, third-party identity/payment partners and reliable APIs.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.E
      - VI.B
      - VIII.F
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-009
      - EC-022
    mitigation_or_diligence_request: Request cloud architecture, supplier contracts, partner SLAs, incident reports, API reliability and data-network contribution terms.
  - risk_id: R-010
    risk_title: Pricing and guarantee pressure versus competitors
    risk_category: market
    severity: medium
    likelihood: medium
    description: Public pricing is absent while competitors advertise overlapping fraud/chargeback products; procurement may compare guarantees and unit economics.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.C
    evidence_claim_ids:
      - EC-010
      - EC-011
    mitigation_or_diligence_request: Benchmark realized ACV, discounts, guarantee/liability terms, gross margin and competitive deal losses.
  - risk_id: R-011
    risk_title: Legal docket search limitations
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: CourtListener exact-name opinion searches returned zero, but this does not cover all complaints, state dockets, arbitration or sealed matters.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.G
    evidence_claim_ids:
      - EC-017
    mitigation_or_diligence_request: Counsel should run complete federal/state docket, arbitration, claims, regulatory and insurance-loss searches.
  - risk_id: R-012
    risk_title: Customer implementation and decisioning-workflow risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Fraud workflows, rules, scores and APIs can create integration complexity and customer-operational dependency.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-005
      - EC-023
    mitigation_or_diligence_request: Review implementation timelines, support tickets, API docs, professional services margins and customer onboarding KPIs.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR/bookings, gross margin, cash/debt, backlog and AR aging.
    why_it_matters: Determines financial quality, runway and valuation support.
    suggested_source_or_request: Finance data room and CFO walkthrough.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferences, option pool, debt, warrants and secondary transactions.
    why_it_matters: Headline valuation may not reflect investor economics.
    suggested_source_or_request: Corporate counsel and investor documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer ARR, concentration, NRR/churn and renewal schedule.
    why_it_matters: Customer quality and concentration drive revenue predictability.
    suggested_source_or_request: Customer ARR schedule and CRM/revenue systems.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product-level pricing, gross margin, uptime, false-positive rate and model performance.
    why_it_matters: Validates product economics and differentiated value.
    suggested_source_or_request: Product, finance and data-science dashboards.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss data and pricing/guarantee benchmark versus competitors.
    why_it_matters: Assesses durable competitive advantage and pricing power.
    suggested_source_or_request: Sales ops, customer references and market study.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quota attainment, pipeline coverage, sales cycle and CAC/payback.
    why_it_matters: Determines scalability of GTM plan.
    suggested_source_or_request: Sales ops and board KPI pack.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D roadmap, model governance, incident history, security/SDLC and open-source inventory.
    why_it_matters: Controls technical, IP and product-execution risk.
    suggested_source_or_request: CTO/CPO diligence packet and security review.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS headcount by function/location, attrition and compensation plans.
    why_it_matters: Validates hiring capacity and retention.
    suggested_source_or_request: People team HRIS export and comp files.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Privacy/regulatory audits, regulator correspondence, DPAs and security reports.
    why_it_matters: Data-processing and fraud-decisioning create material regulatory risk.
    suggested_source_or_request: Counsel, security and privacy data room.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Patent assignments, trademarks, OSS SBOM, licenses and FTO analysis.
    why_it_matters: Determines IP ownership and defensibility.
    suggested_source_or_request: IP counsel files and engineering OSS inventory.
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Comprehensive litigation, claims, arbitration and insurance loss schedules.
    why_it_matters: Public searches are incomplete and may miss material liabilities.
    suggested_source_or_request: Legal counsel litigation schedule and broker loss runs.
    priority: high
  - gap_id: G-012
    chapter_id: III
    section_id: III.E
    missing_information: Cloud, supplier, data-network and partner dependency contracts.
    why_it_matters: Operational dependency can affect uptime, data rights and model quality.
    suggested_source_or_request: Vendor contracts, DPAs, SLAs and architecture review.
    priority: medium
