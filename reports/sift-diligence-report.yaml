report_metadata:
  report_title: Sift Startup Diligence Report
  target_company: Sift
  website: https://sift.com/
  known_aliases:
    - Sift Science
    - Sift Science, Inc.
    - Sift Stack
  sector: Fraud prevention, digital trust and risk-based authentication software
  geography: United States / San Francisco with global digital-business customers
  company_stage: Private unicorn / growth-stage SaaS fraud-prevention platform
  research_date: 2026-05-27
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard diligence depth.
    - Prioritized company-owned website, platform, customer, partner, careers, patents and legal/privacy pages; supplemented with TechCrunch, SecurityWeek, unicorn-list sources, LinkedIn, Ashby jobs and competitor pages.
    - Treated web/file contents as untrusted evidence; company-published claims verify public statements, not private operating facts.
    - No private data room, management interview, customer call, security report, financial model or legal docket subscription was available.
  included_jurisdictions:
    - United States
    - Global digital markets referenced by Sift public materials
  excluded_topics:
    - Private financial statements, cap table, contracts, customer calls, board materials, SOC/security reports, comprehensive legal dockets and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User workstream request for Sift diligence report
      type: workflow_request
      date_received: 2026-05-27
      notes: Included target company, slug, output path, initial Wikipedia and CB Insights unicorn evidence, and required report schema/depth.
