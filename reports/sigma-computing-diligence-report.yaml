report_metadata:
  report_title: Sigma Computing Startup Diligence Report
  target_company: Sigma Computing
  website: https://www.sigmacomputing.com/
  known_aliases:
    - Sigma
    - Sigma Computing
  sector: Cloud business intelligence, analytics, AI applications and warehouse-native data workflow software
  geography: San Francisco, California / United States; global enterprise software market
  company_stage: Private unicorn / growth-stage enterprise SaaS company
  research_date: 2026-05-18
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Prioritized company announcements, product/security/status/customer/partner pages, CB Insights, PR Newswire and secondary market profiles.
    - Treated company-published ARR, customer, active-user, security and product claims as verified only for existence of the public statement unless independently corroborated.
    - Marked private financials, cap table, customer concentration, contracts, HR, litigation, insurance and security-report contents as not_publicly_verifiable when no public artifact was available.
  included_jurisdictions:
    - United States
    - Global markets referenced by public company materials
  excluded_topics:
    - Private financial statements, contracts, cap table, customer calls, board materials, SOC/security reports, legal dockets, HRIS exports and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request to create Sigma Computing public-source diligence YAML report
      type: workflow_request
      date_received: 2026-05-18
      notes: No pitch deck, data room, financial model or founder responses were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Sigma Computing is a private unicorn valued at approximately $1.5B.
    claim_source: CB Insights Global Unicorn Club
    claim_date: 2024-05-16
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.B, I.C]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001]
    contradiction_summary: null
    diligence_follow_up:
      - Request financing documents, 409A reports, current cap table and preference stack.
  - founder_claim_id: FC-002
    claim_text: Sigma raised large growth financings, including a $300M Series C and a $200M Series D.
    claim_source: Company announcement and PR Newswire
    claim_date: 2024-05-16
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.C, I.D]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-002, EC-015]
    contradiction_summary: Round announcements are public, but cap-table economics, preferences and proceeds are not.
    diligence_follow_up:
      - Obtain stock purchase agreements, investor consents, pro forma cap table, debt and secondary-sale detail.
  - founder_claim_id: FC-003
    claim_text: Sigma surpassed $100M ARR with 83% annual growth for the fiscal year ended January 31, 2025.
    claim_source: Company ARR announcement
    claim_date: 2025-04-09
    mapped_chapter_ids: [I, V]
    mapped_section_ids: [I.A, V.D]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-003]
    contradiction_summary: Public ARR statement is not audited and does not disclose ARR definition, churn, billings or revenue recognition.
    diligence_follow_up:
      - Request ARR bridge, billing exports, revenue-recognition policy, cohort retention and customer-level schedules.
  - founder_claim_id: FC-004
    claim_text: Sigma reached $200M ARR in April 2026, doubled year over year and serves more than 2,000 businesses.
    claim_source: Company ARR announcement
    claim_date: 2026-05-18
    mapped_chapter_ids: [I, III, V]
    mapped_section_ids: [I.A, III.C, V.D]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-004]
    contradiction_summary: Claim is company-published and current-period support was not audited or reconciled.
    diligence_follow_up:
      - Validate ARR definition, customer master, active-user metric, churn, expansion and cohort waterfall.
  - founder_claim_id: FC-005
    claim_text: Sigma offers a warehouse-first analytics platform across AI applications, embedded analytics, reporting, BI, spreadsheets and agents.
    claim_source: Company product and architecture pages
    claim_date: null
    mapped_chapter_ids: [II, VI]
    mapped_section_ids: [II.A, VI.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-005, EC-006]
    contradiction_summary: null
    diligence_follow_up:
      - Review product telemetry, roadmap, gross margin by product, support burden and architecture/performance evidence.
  - founder_claim_id: FC-006
    claim_text: Sigma has a public leadership team led by Mike Palmer, with co-founders Rob Woollen and Jason Frantz in technical leadership roles.
    claim_source: Company leadership page and secondary profile
    claim_date: null
    mapped_chapter_ids: [VII]
    mapped_section_ids: [VII.A, VII.C]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-014]
    contradiction_summary: Leadership roster is public; employment terms, board roles, succession and retention are private.
    diligence_follow_up:
      - Request org chart, executive employment agreements, board composition, references and retention/attrition data.
  - founder_claim_id: FC-007
    claim_text: Sigma maintains enterprise security/compliance posture with trust center, SOC/ISO listings, status page and vulnerability disclosure process.
    claim_source: Trust Center, VDP and Statuspage
    claim_date: null
    mapped_chapter_ids: [VI, VIII]
    mapped_section_ids: [VI.B, VI.C, VIII.G]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-010, EC-011, EC-012, EC-013]
    contradiction_summary: Public listings verify the existence of claims/processes but not underlying reports, exceptions or remediation status.
    diligence_follow_up:
      - Obtain SOC reports, ISO certificates, pentest report, incident log, DPIA, subprocessors, cyber insurance and VDP SLA metrics.
  - founder_claim_id: FC-008
    claim_text: Sigma has public customer stories and usage examples among large enterprises.
    claim_source: Company customer and homepage materials
    claim_date: null
    mapped_chapter_ids: [III, V]
    mapped_section_ids: [III.A, V.D]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-008]
    contradiction_summary: Customer stories do not disclose contract value, renewal status, concentration or implementation economics.
    diligence_follow_up:
      - Run customer reference calls and request top-customer contracts, renewal cohorts and implementation success metrics.
executive_summary:
  overall_assessment: Sigma Computing appears to be a high-growth private enterprise analytics unicorn with substantial public financing, ARR, customer, product, partner and security signals. The central diligence question is whether public growth claims convert into durable, efficient, secure and defensible enterprise value after private financial, customer, technical, legal and HR diligence.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only. Public evidence supports a credible thesis around warehouse-native analytics, AI applications, enterprise trust and rapid ARR scale; investment reliance requires validating ARR quality, retention, gross margin, customer concentration, cap-table economics, competitive win/loss, security artifacts, AI governance and legal/HR risks.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Sigma Computing as a $1.5B private unicorn.
      evidence_claim_ids: [EC-001]
    - founder_claim_id: FC-002
      summary: Sigma announced a $200M Series D financing in May 2024 with major growth investors.
      evidence_claim_ids: [EC-002]
    - founder_claim_id: FC-005
      summary: Sigma publicly markets a warehouse-first analytics platform across BI, AI applications, embedded analytics and reporting.
      evidence_claim_ids: [EC-005, EC-006]
    - founder_claim_id: FC-007
      summary: Sigma maintains public enterprise security/compliance surfaces including a trust center, VDP and status page.
      evidence_claim_ids: [EC-010, EC-012, EC-013]
  biggest_risks:
    - risk_id: R-001
      summary: ARR scale and growth are company-published and need audited financial/KPI reconciliation.
    - risk_id: R-003
      summary: Customer concentration, retention, contract economics and churn are not public.
    - risk_id: R-004
      summary: BI/analytics competition is intense against bundled incumbents and modern challengers.
    - risk_id: R-006
      summary: Security/compliance posture is visible but underlying reports and exceptions were not reviewed.
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, billings, gross margin, cash/debt, burn and forecast model.
    - Cap table, liquidation preferences, debt, option pool, financing documents and 409A support.
    - Top-customer ARR, contracts, NRR/GRR, churn, renewal pipeline and independent customer references.
    - Product telemetry, architecture benchmarks, AI governance, product-level gross margin and support burden.
    - SOC/ISO reports, pentest, security exceptions, incident log, privacy assessments, subprocessors and VDP metrics.
    - Legal docket, IP ownership, OSS/SBOM, material contracts, insurance policies, HRIS and executive retention data.
  recommended_next_steps:
    - Run revenue-quality diligence first with ARR definition, billing exports, cohort retention, customer concentration and gross margin.
    - Reconcile valuation with full cap table, financing documents, preferences, debt, option pool and secondary proceeds.
    - Conduct customer calls and competitive win/loss diligence to test the warehouse-native and AI-applications thesis.
    - Have security/privacy counsel review trust-center artifacts, SOC/ISO reports, incidents, subprocessors and AI governance.
    - Have legal/HR diligence cover IP assignments, OSS compliance, material contracts, litigation, insurance and people retention.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Sigma has strong public financing and ARR milestones, but audited financial statements, retention, cash/debt, cap table and current valuation support remain private.
    founder_claim_ids: [FC-001, FC-002, FC-003, FC-004]
    evidence_claim_ids: [EC-001, EC-002, EC-003, EC-004, EC-015, EC-016]
    risk_ids: [R-001, R-002]
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids: [I.A]
        summary: Public sources disclose company-published ARR milestones but not audited annual/quarterly financial statements, revenue-recognition policy, billings, gross margin, cash, debt, burn or KPI cohorts.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: Company-published ARR milestones create a scale signal, but operating-financial quality cannot be verified publicly.
            evidence_claim_ids: [EC-003, EC-004, EC-016]
            risk_ids: [R-001]
        hidden_risks: [ARR quality, revenue recognition, churn, gross margin and runway remain high-priority private diligence items.]
        evidence_gaps: [Audited financials, management accounts, ARR bridge, billings, deferred revenue, gross margin, cash/debt and budget-to-actuals.]
        follow_up_questions: [Provide audited financials, monthly KPI pack, ARR bridge, revenue-recognition memo, billings exports, gross-margin detail and cash/debt schedule.]
        table_ids: [T-002]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-003, EC-004, EC-016]
      - section_id: I.B
        title: Financial projections
        checklist_question_ids: [I.B]
        summary: The jump from $100M ARR in FY2025 to $200M ARR in April 2026 supports a growth narrative, but management forecasts, assumptions, pipeline coverage and downside cases are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Public ARR growth indicates momentum but does not validate forecast quality or sales efficiency.
            evidence_claim_ids: [EC-003, EC-004]
            risk_ids: [R-001]
        hidden_risks: [Growth may depend on expansion cohorts, AI adoption, pricing changes or enterprise pipeline quality that cannot be verified publicly.]
        evidence_gaps: [Board-approved plan, bookings forecast, pipeline conversion, NRR/GRR, CAC/payback and scenario analysis.]
        follow_up_questions: [Provide board plan, forecast model, pipeline by stage, churn/expansion assumptions and actual-vs-plan history.]
        table_ids: [T-002]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-003, EC-004]
      - section_id: I.C
        title: Capital structure
        checklist_question_ids: [I.C]
        summary: Public sources verify financing events and valuation anchors, but share count, ownership, liquidation preferences, debt, options and secondary proceeds are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Series C, Series D and unicorn-list signals establish financing trajectory but not economic ownership.
            evidence_claim_ids: [EC-001, EC-002, EC-015]
            risk_ids: [R-002]
        hidden_risks: [Preference stack, option pool, investor rights, pro rata obligations and secondary liquidity can materially change common-equity value.]
        evidence_gaps: [Current cap table, charter, investor rights, SAFE/note/debt schedules, option pool, 409A reports and secondary-sale records.]
        follow_up_questions: [Provide pro forma fully diluted cap table, financing documents, investor rights, debt instruments, option plan and 409A history.]
        table_ids: [T-001]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-001, EC-002, EC-015]
      - section_id: I.D
        title: Other financial information
        checklist_question_ids: [I.D]
        summary: Tax, accounting policies, off-balance-sheet commitments, cloud spend commitments and working-capital dynamics are not publicly verifiable.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.D-F1
            finding: No public tax, accounting-policy, commitment or working-capital schedules were available.
            evidence_claim_ids: [EC-016]
            risk_ids: [R-001, R-002]
        hidden_risks: [Cloud commitments, unbilled receivables, sales commissions, taxes and lease obligations may affect cash conversion.]
        evidence_gaps: [Tax filings, accounting memos, vendor commitments, leases, contingent liabilities and working-capital detail.]
        follow_up_questions: [Provide tax returns, accounting policies, cloud/vendor commitments, lease schedule and contingent-liability disclosure.]
        table_ids: [T-001, T-002]
        figure_ids: []
        evidence_claim_ids: [EC-016]
  - chapter_id: II
    title: Products
    chapter_summary: Sigma has a visible multi-product analytics platform and warehouse-native architecture; product economics, usage depth, roadmap durability and AI governance need private validation.
    founder_claim_ids: [FC-005]
    evidence_claim_ids: [EC-005, EC-006]
    risk_ids: [R-004, R-005, R-007]
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids: [II.A]
        summary: Company materials verify public product categories across BI, embedded analytics, reporting, AI applications, spreadsheets, data models and agents.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Sigma publicly markets a broad analytics and AI-applications platform with spreadsheet UX and agentic workflows.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-004, R-007]
        hidden_risks: [Breadth can create product complexity, support burden and roadmap prioritization risk.]
        evidence_gaps: [SKU-level ARR, adoption, usage, churn, support tickets, gross margin and roadmap by product.]
        follow_up_questions: [Provide product telemetry, revenue by SKU, roadmap, support burden and attach/expansion analysis.]
        table_ids: [T-003, T-004]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-005, EC-006]
      - section_id: II.B
        title: Product profitability and unit economics
        checklist_question_ids: [II.B]
        summary: Public sources do not disclose product-level gross margin, cloud compute costs, support cost, implementation cost or AI feature cost-to-serve.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: II.B-F1
            finding: Warehouse-first design may offload compute but cost-to-serve and margins require private proof.
            evidence_claim_ids: [EC-006, EC-016]
            risk_ids: [R-001, R-005]
        hidden_risks: [AI features, embedded analytics and writeback workflows may change infrastructure, support and security costs.]
        evidence_gaps: [Gross margin by SKU, COGS detail, cloud/warehouse cost allocation, support tickets and implementation services margin.]
        follow_up_questions: [Provide product P&L, COGS allocation, cloud cost by workload, support/case volume and services attach margins.]
        table_ids: [T-004]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-006, EC-016]
      - section_id: II.C
        title: Roadmap and R&D execution
        checklist_question_ids: [II.C]
        summary: Company pages emphasize AI Apps, Sigma Agents and warehouse-first architecture, but roadmap milestones, R&D velocity, technical debt and AI safety governance are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.C-F1
            finding: AI and agentic workflow positioning is public; delivery quality and governance remain diligence items.
            evidence_claim_ids: [EC-005, EC-006]
            risk_ids: [R-007]
        hidden_risks: [AI roadmap may increase regulatory, explainability, cost and customer-data risks.]
        evidence_gaps: [Roadmap, engineering velocity, AI model/vendor strategy, red-team results, product security review and customer adoption metrics.]
        follow_up_questions: [Provide roadmap, R&D budget, release velocity, AI governance materials, model/vendor contracts and product-security review artifacts.]
        table_ids: [T-003, T-004]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-005, EC-006]
  - chapter_id: III
    title: Customer Information
    chapter_summary: Sigma publishes meaningful customer and usage stories, but top-customer revenue, concentration, churn, renewal status, references and supplier spend are not public.
    founder_claim_ids: [FC-004, FC-008]
    evidence_claim_ids: [EC-004, EC-007, EC-008, EC-016]
    risk_ids: [R-003, R-005]
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids: [III.A]
        summary: Public customer stories cite large-scale users and enterprise outcomes, but top-15 customer schedules and application-level ARR are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: DoorDash, Blackstone, Florida Cancer Specialists and Veronica Beard stories show use-case breadth but not contract economics.
            evidence_claim_ids: [EC-008]
            risk_ids: [R-003]
        hidden_risks: [Case-study customers may not represent full cohort quality, renewal health or concentration.]
        evidence_gaps: [Top customers by ARR, application use, contract term, renewal date, reference status and implementation outcomes.]
        follow_up_questions: [Provide top-customer schedule, ARR by application, contracts, renewal pipeline and reference-call access.]
        table_ids: [T-005]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-008]
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids: [III.B]
        summary: Public partner ecosystem includes cloud data warehouses, cloud platforms, technology partners and consulting partners; agreement terms and revenue contribution are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Snowflake, Databricks, AWS, Azure and Google Cloud relationships align with the warehouse-first value proposition.
            evidence_claim_ids: [EC-007]
            risk_ids: [R-005]
        hidden_risks: [Co-sell, marketplace, cloud-credit, certification or integration terms may affect CAC and support obligations.]
        evidence_gaps: [Partner agreements, marketplace revenue, referral economics, certification status, SLAs and termination rights.]
        follow_up_questions: [Provide partner agreements, partner-sourced pipeline/revenue, integration SLAs and cloud/warehouse dependency map.]
        table_ids: [T-006]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-007]
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids: [III.C]
        summary: Public ARR and customer-count claims do not disclose revenue by customer, customer concentration, NRR, GRR, churn or discounting.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: More than 2,000 businesses and 1,350-customer claims require reconciliation to billing and customer-master data.
            evidence_claim_ids: [EC-003, EC-004, EC-016]
            risk_ids: [R-003]
        hidden_risks: [A small set of enterprise accounts or embedded customers could drive disproportionate ARR.]
        evidence_gaps: [Customer-level ARR, logo churn, NRR/GRR, discounting, contract terms and cohort waterfall.]
        follow_up_questions: [Provide anonymized customer-level ARR, NRR/GRR cohorts, top-20 contracts, churn reasons and discount waterfall.]
        table_ids: [T-006]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-003, EC-004, EC-016]
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids: [III.D]
        summary: No public schedule of lost customers, terminated partners or severed supplier relationships was available.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Public customer pages emphasize wins and case studies; churn/loss information is absent.
            evidence_claim_ids: [EC-008, EC-016]
            risk_ids: [R-003]
        hidden_risks: [Lost enterprise accounts or partner disputes could signal product, support or ROI issues.]
        evidence_gaps: [Churned customer list, lost ARR, win/loss notes, terminated partner agreements and supplier termination records.]
        follow_up_questions: [Provide churn/loss schedule, severed partner/supplier list, root-cause analysis and remediation actions.]
        table_ids: [T-006]
        figure_ids: []
        evidence_claim_ids: [EC-008, EC-016]
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids: [III.E]
        summary: Supplier categories are inferable from warehouse/cloud architecture and partner materials, but supplier spend and commitments are private.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: Cloud platforms, data warehouses and security/compliance vendors are critical operating dependencies, but spend concentration is not public.
            evidence_claim_ids: [EC-006, EC-007, EC-011]
            risk_ids: [R-005]
        hidden_risks: [Cloud/data-warehouse partner changes, API changes or cost increases could affect margin and product reliability.]
        evidence_gaps: [Top supplier spend, cloud commitments, subprocessors and supplier SLAs.]
        follow_up_questions: [Provide vendor spend by supplier, cloud commitments, subprocessors, SLAs, termination rights and supplier risk assessments.]
        table_ids: [T-006]
        figure_ids: []
        evidence_claim_ids: [EC-006, EC-007, EC-011]
  - chapter_id: IV
    title: Competition
    chapter_summary: Sigma competes in crowded BI, analytics and AI-workflow categories against incumbents, cloud-native providers and modern BI challengers; public positioning is clear but private win/loss and pricing proof are absent.
    founder_claim_ids: [FC-005]
    evidence_claim_ids: [EC-005, EC-006, EC-007]
    risk_ids: [R-004]
    sections:
      - section_id: IV.A
        title: Competitors and strategy
        checklist_question_ids: [IV.A]
        summary: Sigma differentiates around spreadsheet familiarity, warehouse-native execution, embedded analytics and AI applications, while competing with Microsoft, Tableau/Salesforce, Looker/Google, ThoughtSpot, Domo, Mode/Hex and warehouse-native alternatives.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Product pages and partner ecosystem support Sigma's strategy, but market-share and competitive win rates are private.
            evidence_claim_ids: [EC-005, EC-006, EC-007]
            risk_ids: [R-004]
        hidden_risks: [Bundled incumbents can compress price, while modern challengers may match AI and self-service workflows.]
        evidence_gaps: [Win/loss dataset, competitive displacement rates, pricing analysis, analyst reports and churn by competitor.]
        follow_up_questions: [Provide win/loss data, competitor battlecards, pricing/discount analysis and pipeline displacement metrics.]
        table_ids: [T-007, T-008]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-005, EC-006, EC-007]
      - section_id: IV.B
        title: Barriers to entry and differentiation
        checklist_question_ids: [IV.B]
        summary: Barriers likely arise from warehouse integrations, enterprise trust, embedded deployments, data governance and workflow adoption, but public evidence cannot quantify switching costs or defensibility.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.B-F1
            finding: Partnerships and security posture support enterprise credibility, yet defensibility depends on adoption depth and customer workflow lock-in.
            evidence_claim_ids: [EC-007, EC-010, EC-011]
            risk_ids: [R-004, R-006]
        hidden_risks: [If Sigma remains a presentation layer over cloud warehouses, competitors and platforms can replicate portions of the value proposition.]
        evidence_gaps: [Switching-cost proof, active-user depth, embedded-app dependencies, API usage, governance adoption and renewal uplift.]
        follow_up_questions: [Provide customer deployment maps, active-user cohorts, embedded dependency analysis and renewal/expansion attribution.]
        table_ids: [T-008]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-007, EC-010]
      - section_id: IV.C
        title: Pricing and positioning
        checklist_question_ids: [IV.C]
        summary: Public pages emphasize solution breadth but do not disclose enterprise price book, discounting, packaging or AI usage charges.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: IV.C-F1
            finding: Pricing power cannot be verified from public materials.
            evidence_claim_ids: [EC-005, EC-016]
            risk_ids: [R-004]
        hidden_risks: [AI and embedded analytics packaging could create margin pressure or customer pushback.]
        evidence_gaps: [Price book, average selling price, discounting, competitive concessions and usage-based pricing policies.]
        follow_up_questions: [Provide price book, packaging changes, discount approval data, AI usage metering and competitor pricing comparison.]
        table_ids: [T-007]
        figure_ids: []
        evidence_claim_ids: [EC-005, EC-016]
  - chapter_id: V
    title: Marketing, Sales and Distribution
    chapter_summary: Public evidence supports enterprise GTM momentum through ARR/customer milestones, case studies and partners; sales efficiency, channel mix, CAC and pipeline quality are private.
    founder_claim_ids: [FC-003, FC-004, FC-008]
    evidence_claim_ids: [EC-003, EC-004, EC-007, EC-008, EC-016]
    risk_ids: [R-001, R-003, R-004]
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids: [V.A]
        summary: Sigma's public GTM appears enterprise-led with customer stories, marketplace/partner ecosystem, embedded analytics and product-led active-user narratives.
