risk_register:
  - risk_id: R-001
    risk_title: Public ARR quality is not independently reconciled
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public ARR milestones are strong but unaudited; revenue recognition, billings bridge, churn, expansion, gross margin and cash conversion were not public.
    impacted_chapter_ids: [I, V]
    impacted_section_ids: [I.A, I.B, V.D]
    evidence_claim_ids: [EC-003, EC-004, EC-016]
    mitigation_or_diligence_request: Obtain audited financials, ARR bridge, billing exports, customer-level ARR, cohort retention and gross-margin detail.
  - risk_id: R-002
    risk_title: Capital structure and liquidation preferences are unknown
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Public funding announcements and unicorn listings do not disclose ownership, preferences, debt, options, secondaries or investor rights.
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.C, I.D]
    evidence_claim_ids: [EC-001, EC-002, EC-015, EC-016]
    mitigation_or_diligence_request: Review full cap table, financing documents, charter, investor rights, debt instruments, option plan and 409A history.
  - risk_id: R-003
    risk_title: Customer concentration and retention are not public
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Customer stories and customer-count announcements do not disclose top-customer exposure, NRR, GRR, churn, renewal timing or contract economics.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, III.C, V.D]
    evidence_claim_ids: [EC-003, EC-004, EC-008, EC-016]
    mitigation_or_diligence_request: Request top-customer schedule, cohort waterfall, churn reasons, renewal pipeline, top contracts and independent customer calls.
  - risk_id: R-004
    risk_title: Analytics and BI competition may pressure pricing and growth
    risk_category: market
    severity: high
    likelihood: medium
    description: Sigma competes against bundled incumbents, cloud platforms and modern analytics challengers with overlapping BI, embedded and AI features.
    impacted_chapter_ids: [II, IV, V]
    impacted_section_ids: [II.A, IV.A, IV.B, V.A]
    evidence_claim_ids: [EC-005, EC-006, EC-007, EC-009]
    mitigation_or_diligence_request: Analyze win/loss, displacement, pricing/discounts, analyst coverage, churn by competitor and customer switching-cost evidence.
  - risk_id: R-005
    risk_title: Warehouse/cloud dependency can affect resilience and margin
    risk_category: technical
    severity: medium
    likelihood: medium
