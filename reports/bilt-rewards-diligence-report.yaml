          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public releases cite EBITDA profitability in 2023 and annualized member
          spend nearing $20B, but revenue quality, gross margin, rewards
          expense, cash burn and monthly financials are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I-A-public-signal
            finding: Public releases cite EBITDA profitability in 2023 and annualized member
              spend nearing $20B, but revenue quality, gross margin, rewards
              expense, cash burn and monthly financials are not public.
            evidence_claim_ids: &a1
