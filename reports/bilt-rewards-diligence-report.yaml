        summary: Material contracts likely include bank/card, servicer, capital,
          property-manager, merchant, credit-bureau, transfer-partner, vendor
          and data-processing agreements; terms are private.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII-F-public-signal
            finding: Material contracts likely include bank/card, servicer, capital,
              property-manager, merchant, credit-bureau, transfer-partner,
              vendor and data-processing agreements; terms are private.
            evidence_claim_ids: &a31
              - EC-006
              - EC-020
              - EC-023
              - EC-025
            risk_ids:
              - R-001
              - R-005
              - R-008
              - R-010
        hidden_risks:
          - Termination rights, exclusivity, data-use restrictions, reserve
            requirements and indemnities could materially alter economics.
          - Partner consents may be required for financing or exit transactions.
        evidence_gaps:
          - Material-contract list, economics, term/termination, MFNs,
            exclusivity, indemnities, consents and change-of-control clauses.
        follow_up_questions:
          - Provide material contract data room with summaries of economics,
            restrictions, term and termination rights.
        table_ids:
          - T-021
        figure_ids: []
        evidence_claim_ids: *a31
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Bilt has public licenses and privacy disclosures, but examinations,
          enforcement, complaints, suspicious-activity controls, bank-program
          audits and regulatory correspondence are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII-G-public-signal
            finding: Bilt has public licenses and privacy disclosures, but examinations,
              enforcement, complaints, suspicious-activity controls,
              bank-program audits and regulatory correspondence are not public.
            evidence_claim_ids: &a32
              - EC-009
              - EC-010
              - EC-011
              - EC-021
            risk_ids:
              - R-004
              - R-006
              - R-008
        hidden_risks:
          - FCRA rent reporting, UDAAP marketing, money transmission, AML/KYC,
            GLBA privacy and bank-partner exams can create remediation costs.
          - Cross-partner card stack complicates responsibility for disclosures
            and complaints.
        evidence_gaps:
          - Licensing matrix, exam reports, complaints, SAR/AML controls,
            fair-lending tests, audit findings and remediation plans.
        follow_up_questions:
          - Provide regulatory correspondence, complaints, audit/exam reports
            and compliance testing across card, rent payment and data products.
        table_ids:
          - T-020
        figure_ids:
          - F-011
        evidence_claim_ids: *a32
