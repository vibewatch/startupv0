risk_register:
  - risk_id: R-001
    risk_title: Bank-partner and card-stack transition risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Bilt is moving from the Wells Fargo card partnership into a
      Column/Cardless/Fidem stack; transition, servicing, funding, reserve,
      migration and regulatory obligations could impair growth or unit
      economics.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.B
      - III.D
      - VIII.F
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Review executed partner contracts, migration
      plan, economics, SLAs, reserves, audits, termination rights and
      bank-regulator correspondence.
  - risk_id: R-002
    risk_title: Rent and mortgage rewards unit-economics risk
    risk_category: financial
    severity: high
    likelihood: medium
    description: Paying rewards on large housing payments can create a high rewards
      cost relative to interchange or merchant revenue unless annual fees,
      merchant economics, breakage and partner subsidies offset the expense.
    impacted_chapter_ids:
      - I
      - II
    impacted_section_ids:
      - I.A
      - I.D
      - II.A
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request product P&Ls, reward liability
      roll-forward, redemption mix, breakage analysis, interchange, merchant
      fees and partner subsidies by cohort.
  - risk_id: R-003
    risk_title: Valuation and revenue-projection verification gap
    risk_category: financial
    severity: high
    likelihood: medium
    description: The public $10.75B valuation and $1B revenue expectation are
      headline claims without audited financial statements, board model,
