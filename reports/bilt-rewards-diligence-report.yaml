#Evidence-backed public-source diligence report. Generated for startupv0 static site.

report_metadata:
  report_title: Bilt Rewards Startup Diligence Report
  target_company: Bilt Rewards
  website: https://www.biltrewards.com/
  known_aliases:
    - Bilt
    - Bilt Rewards
    - Bilt Rewards Alliance
    - Bilt Mastercard
    - Bilt Card
    - Bilt Card 2.0
    - Bilt Home
  sector: Housing-linked rewards, consumer fintech, card-linked offers and
    property technology
  geography: United States
  company_stage: Private growth-stage unicorn
  research_date: 2026-05-21
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized Bilt-owned newsroom, product, legal, privacy, alliance,
      support and careers pages, then partner-bank and independent news sources.
    - Used competitor-owned sources only to identify category overlap, not to
      verify competitor performance.
    - Treated company-published financial and scale metrics as public claims
      that require private verification before underwriting.
    - Did not bypass paywalls, bot protections, access controls or rate limits;
      inaccessible records are disclosed as limitations.
  included_jurisdictions:
    - United States federal consumer finance and privacy context
    - State money-transmission and credit-reporting contexts referenced by
      public materials
  excluded_topics:
    - Private financial statements, cap table, financing documents, customer
      contracts, bank-program contracts, data room, security reports, counsel
      letters and management interviews were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Bilt Rewards diligence report
      type: workflow_request
      date_received: 2026-05-21
      notes: No pitch deck, founder responses, private documents or customer
        references were provided.
