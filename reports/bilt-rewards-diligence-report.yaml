              - EC-018
              - EC-024
            risk_ids:
              - R-002
              - R-003
        hidden_risks:
          - Revenue may include gross-versus-net presentation or partner
            subsidies that do not translate into durable gross margin.
          - Rewards liability and redemption costs may lag recognized revenue.
        evidence_gaps:
          - Audited income statements, balance sheets, cash flow,
            revenue-recognition policy, gross margin and reward-liability
            roll-forward.
        follow_up_questions:
