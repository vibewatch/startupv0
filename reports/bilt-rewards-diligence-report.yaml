executive_summary:
  overall_assessment: Bilt Rewards merits continued diligence because public
    evidence supports exceptional scale, valuation momentum and a differentiated
    housing-linked rewards ecosystem, but the underwriting case remains
    high-risk until bank-program economics, rewards liability, audited
    financials, cap table, concentration, compliance and contracts are verified.
  investment_or_diligence_thesis: The bull case is that Bilt becomes a
    high-frequency rewards and payments network around rent, mortgage and
    neighborhood spend. The diligence burden is proving that high-GMV housing
    rewards convert into durable, compliant, profitable revenue after partner
    economics, rewards costs and consumer-finance controls.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Bilt has publicly launched rent rewards and announced Card 2.0 with
        rent and mortgage rewards.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-007
    - founder_claim_id: FC-003
      summary: Bilt publishes large member, merchant and property-manager reach metrics.
      evidence_claim_ids:
        - EC-002
        - EC-004
    - founder_claim_id: FC-005
      summary: The post-Wells card stack with Column, Cardless and Fidem is publicly
        identified.
      evidence_claim_ids:
        - EC-006
        - EC-023
    - founder_claim_id: FC-006
      summary: Public legal, licenses, privacy and rent-reporting disclosures confirm
        regulated operating surfaces.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Bank-partner/card-stack transition risk from Wells to
        Column/Cardless/Fidem.
    - risk_id: R-002
      summary: Rent and mortgage rewards unit economics and rewards-liability risk.
    - risk_id: R-003
      summary: High valuation and revenue forecast cannot be verified from public
        records.
    - risk_id: R-004
      summary: Consumer finance, money movement, credit reporting and privacy
        compliance exposure.
    - risk_id: R-005
      summary: Property-manager, merchant and partner concentration hidden by
        aggregate reach metrics.
  key_evidence_gaps:
    - Audited financials, revenue recognition, product P&Ls, cash runway and
      reward-liability accounting.
    - Cap table, liquidation preferences, debt/receivables facilities and
      security terms behind headline valuations.
    - Bank/card, servicer, capital, property-manager, merchant and
      transfer-partner contracts.
    - Active-user cohorts, cardholder penetration, merchant take rate, churn,
      retention and customer concentration.
    - Regulatory exams, complaint logs, FCRA/GLBA/UDAAP controls, data map,
      security reports and litigation/counsel review.
  recommended_next_steps:
    - Do not underwrite valuation from public announcements alone; request
      financing documents, cap table and audited financials first.
    - Compare Wells legacy economics with Card 2.0 agreements, migration
      metrics, reserves and partner obligations.
    - Build a product-level contribution-margin model for rent, mortgage, card,
      merchant and property-manager channels.
    - Run legal/compliance diligence across money transmission, card program,
      FCRA rent reporting, privacy, UDAAP and bank oversight.
    - Conduct customer/partner references with property managers, merchants,
      bank/program partners and high-value member cohorts.
chapters:
