executive_summary:
  overall_assessment: QuintoAndar appears to be an active private unicorn with strong public evidence of funding, product breadth and company-published operating scale. Investability remains unresolved because revenue quality, unit economics, guarantee/credit losses, concentration, cap table, legal/regulatory schedules and current valuation support are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A positive thesis requires proving that QuintoAndar can convert large marketplace activity into durable profitable revenue while managing Brazil/LatAm real-estate cycles, no-guarantor credit exposure, partner quality, competition and multi-jurisdiction legal/privacy obligations.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support a $5.1B private-unicorn valuation anchor.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: The active public product is a rent/buy/sell real-estate platform with digital contracting and no-guarantor rental messaging.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-004
      summary: Public articles and market data support roughly $755M-$755.74M raised from institutional investors.
      evidence_claim_ids:
        - EC-002
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Private financials and unit economics unavailable despite high valuation
    - risk_id: R-002
      summary: Brazil real-estate, rate and regulatory cyclicality
    - risk_id: R-003
      summary: Customer, transaction concentration and credit/guarantee exposure unknown
    - risk_id: R-004
      summary: Competition from Loft, Habi, other proptechs and traditional brokers
    - risk_id: R-005
      summary: Marketplace trust, fraud, partner quality and legal operations
  key_evidence_gaps:
    - Audited financials, revenue/ARR/GMV, gross margin, cash, debt, burn, unit economics and budget-to-actuals.
    - Cap table, liquidation preferences, option pool, warrants/notes/debt and current valuation support.
    - Revenue concentration, cohort retention, city/product mix, top counterparties, delinquency/default/loss and guarantee economics.
    - CAC, payback, channel mix, broker/partner economics, sales productivity and marketing budget.
    - Litigation, IP, insurance, material contracts, CRECI/privacy/regulatory matters and country-by-country compliance schedules.
  recommended_next_steps:
    - Run financial quality-of-earnings and unit-economics diligence before relying on the $5.1B valuation anchor.
    - Request credit/guarantee/fraud loss triangles and concentration schedules for tenants, owners, brokers, cities and products.
    - Conduct legal/privacy/real-estate regulatory diligence across Brazil and other operating countries.
    - Benchmark win/loss, pricing, CAC and supply liquidity against Loft, Habi, other proptechs and traditional brokers.
    - Validate product, R&D, security, HR and management depth through data-room artifacts and specialist interviews.
