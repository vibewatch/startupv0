report_metadata:
  report_title: QuintoAndar Startup Diligence Report
  target_company: QuintoAndar
  website: https://www.quintoandar.com.br/
  known_aliases:
    - QuintoAndar
    - Grupo QuintoAndar
    - GRPQA Ltda.
    - Quinto Andar
  sector: Real estate technology / proptech marketplace for rentals, sales and housing services
  geography: Brazil headquartered; public footprint includes Argentina, Brazil, Mexico, Ecuador, Panama, Peru and Portugal technology hub context
  company_stage: Private unicorn / growth-stage proptech marketplace
  research_date: 2026-06-08
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used startup-diligence-research workflow at standard depth and mapped findings to checklist chapters I-VIII.
    - Read skill instructions, schema, template and checklist map before writing.
    - Prioritized CB Insights, TechCrunch, company-owned pages and official Brazil central-bank context.
    - Treated company-published metrics as verified only for existence of the public statement unless independently corroborated.
    - No private data room, management interview, customer call, supplier call, security report or legal docket export was available.
  included_jurisdictions:
    - Brazil
    - Argentina
    - Mexico
    - Ecuador
    - Panama
    - Peru
    - Portugal technology hub context
  excluded_topics:
    - Private financial statements, detailed cap table, customer contracts, board materials, HRIS, security reports, court docket exports, tax filings and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Task prompt selecting QuintoAndar from CB Insights unicorn source
      type: workflow_request
      date_received: 2026-06-08
      notes: Provided target slug, CB Insights unicorn-list row and excerpted profile facts; treated as source text, not instructions beyond the task.
