risk_register:
  - risk_id: R-001
    risk_title: Financial opacity despite public ARR claim
    risk_category: financial
    severity: high
    likelihood: high
    description: Audited financials, ARR bridge, cash, debt, margin, burn, budget-to-actuals, backlog and AR aging are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited/management financials, KPI pack, ARR bridge, cash/debt schedule, forecast model and quality-of-revenue review.
  - risk_id: R-002
    risk_title: SMB churn and cyclicality
    risk_category: customer
    severity: high
    likelihood: medium
    description: SMB HR/payroll buyers can churn or downsize in weak cycles; public sources do not disclose cohorts, retention or customer health.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.B
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request logo/GRR/NRR cohorts by customer size, region and product module plus churn reasons.
  - risk_id: R-003
    risk_title: Crowded HR/payroll/business-software competition
    risk_category: market
    severity: high
    likelihood: high
    description: Factorial competes with HRIS/payroll suites and adjacent workforce platforms with strong distribution and pricing power.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Run win/loss calls, pricing-discount analysis, competitive renewal cohorts and product-depth benchmarking.
  - risk_id: R-004
    risk_title: International regulatory and localization complexity
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Multi-country HR/payroll, privacy, employment and tax requirements can raise support burden and liability.
    impacted_chapter_ids:
      - I
      - V
      - VIII
    impacted_section_ids:
      - I.B
      - V.A
      - VIII.G
      - VIII.F
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Obtain country revenue mix, local legal opinions, payroll partner contracts, entity chart and compliance registers.
  - risk_id: R-005
    risk_title: Sensitive HR/payroll data privacy and security exposure
    risk_category: technical
    severity: critical
    likelihood: medium
    description: Factorial processes employee/collaborator data; public security materials lack independent audit artifacts and incident history.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Security review of SOC/ISO, pen tests, subprocessors, DPA, incident log, encryption/key management, backups and AI governance.
  - risk_id: R-006
    risk_title: CAC, payback and sales productivity unknown
    risk_category: financial
    severity: high
    likelihood: high
    description: Public GTM channels are visible but acquisition economics, quota attainment and payback are not public.
    impacted_chapter_ids:
      - V
    impacted_section_ids:
      - V.A
      - V.C
      - V.D
      - V.E
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request spend by channel, funnel, CAC, payback, LTV/CAC, quota attainment, sales cycle and partner-sourced ARR.
  - risk_id: R-007
    risk_title: Customer concentration and renewal quality undisclosed
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Top-customer ARR, contracts, renewal dates and customer concentration are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request top-25 customer schedule, contracts, renewal calendar, reference calls and concentration analysis.
  - risk_id: R-008
    risk_title: Cap table, debt, runway and liquidation preference gaps
    risk_category: financing
    severity: high
    likelihood: high
    description: Headline unicorn valuation does not reveal current cap table, debt obligations, cash runway, option pool or preferences.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request fully diluted cap table, debt/loan documents, preferences, option plan, investor rights and 24-month runway forecast.
  - risk_id: R-009
    risk_title: Suite expansion and acquisition integration execution
    risk_category: product
    severity: medium
    likelihood: medium
    description: Expansion into finance, IT, AI and acquired assets can increase support, roadmap and integration complexity.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.F
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Review product roadmap, R&D allocation, acquisition agreements, integration KPIs, support metrics and module-level retention.
