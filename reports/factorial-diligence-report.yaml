report_metadata:
  report_title: Factorial Startup Diligence Report
  target_company: Factorial
  website: https://factorialhr.com/
  known_aliases:
    - Factorial
    - Factorial HR
    - Everyday Software, S.L.
    - factorialhr.com
  sector: Enterprise Tech / HR, payroll and SMB business-management software
  geography: Barcelona, Spain with international operations referenced in Europe, Brazil, Mexico and Spanish/Portuguese-speaking markets
  company_stage: Private unicorn / growth-stage SMB HR and business-management software company
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Verified eligibility first: existing report slug search, CB Insights unicorn row, TechCrunch valuation/funding coverage, and current operating signals from company pages."
    - Prioritized company-owned product, pricing, customer, partner, API, security, privacy, legal, terms, careers, about and blog pages, plus CB Insights and TechCrunch.
    - Treated company-published traction, security and ARR statements as public claims requiring private verification rather than audited facts.
    - Searched reviewed public sources for IPO, acquisition-of-Factorial, shutdown, lawsuits and regulatory evidence; negative results are marked inconclusive/not publicly verifiable.
  included_jurisdictions:
    - Spain
    - European Union / GDPR context
    - United Kingdom and Germany mentioned in public expansion evidence
    - Brazil and Mexico subsidiaries referenced in terms
    - United States investor/news context
  excluded_topics:
    - No private data room, management interview, customer reference calls, counsel docket memo, registry extracts, SOC/ISO reports, cap table, contracts, HRIS exports or audited financials were available.
  user_provided_materials:
    - material_id: UPM-001
      title: User-selected CB Insights row for Factorial
      type: workflow_context
      date_received: 2026-05-23
      notes: Company=Factorial; slug=factorial; CB Insights valuation=$1B; date joined=10/11/2022; country=Spain; city=Barcelona; industry=Enterprise Tech; investors=K Fund, Creandum, CRV; source URL=https://www.cbinsights.com/company/factorial.
