    chapter_id: I
    section_id: I.C
    missing_information: Cap table, preferences, option pool, debt/loan documents and investor rights.
    why_it_matters: Headline $1B valuation may not reflect economics to new investors.
    suggested_source_or_request: Company counsel and CFO financing files.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Module-level ARR, attach rates, gross margins, support costs, roadmap and incident history.
    why_it_matters: Suite expansion underpins growth but can dilute margin and execution focus.
    suggested_source_or_request: Product analytics, support systems, finance by product and roadmap docs.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Top customers, active/paying customer definitions and reference calls.
    why_it_matters: Public customer counts/logos do not verify revenue quality.
    suggested_source_or_request: Billing/customer master, CRM and reference-call permissions.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.C
    missing_information: Customer concentration, NRR/GRR, churn cohorts and renewal calendar.
    why_it_matters: SMB churn and concentration can materially change valuation.
    suggested_source_or_request: Billing, CRM, contracts and customer-success exports.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss and pricing pressure by competitor.
    why_it_matters: Crowded HR/payroll/workforce software markets can pressure growth and margins.
    suggested_source_or_request: Sales win/loss database, customer calls and competitive intelligence.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
