    mitigation_or_diligence_request: Counsel-led litigation/regulatory/IP/insurance/contract diligence across Spain, EU, U.K., U.S., Brazil, Mexico and operating markets.
  - risk_id: R-012
    risk_title: Team scaling and turnover risk
    risk_category: team
