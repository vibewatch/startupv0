executive_summary:
  overall_assessment: "Factorial is eligible for a public-source diligence report: CB Insights and TechCrunch support a $1B private-unicorn valuation on 2022-10-11, and current company pages support active operations as the Barcelona HR/SMB business software company. The investment case cannot be underwritten from public evidence alone because financial statements, cap table, customer cohorts, contracts, security audits and legal clearance are private. Evidence: EC-001, EC-002, EC-003, EC-004, EC-020."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A positive thesis depends on verifying $100M+ ARR quality, retention, module expansion, CAC/payback, defensibility against HR/payroll competitors, privacy/security maturity and financing economics beyond public valuation headlines.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and TechCrunch corroborate Factorial as a $1B private unicorn from the 2022 Series C period.
      evidence_claim_ids:
        - EC-001
        - EC-004
    - founder_claim_id: FC-002
      summary: Public company/legal sources support Factorial HR / Everyday Software, S.L. as the Barcelona SMB HR/business-management software target.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Factorial publicly markets an active platform spanning HR/payroll, time, talent, finance, IT, integrations/API and AI.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-011
        - EC-017
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity despite public ARR and valuation signals.
    - risk_id: R-005
      summary: Sensitive HR/payroll data privacy and security exposure without public independent audit artifacts.
    - risk_id: R-003
      summary: Crowded HR/payroll/workforce software competition and pricing pressure.
  key_evidence_gaps:
    - Audited financials, ARR bridge, cash/debt, gross margin, burn, backlog, AR aging and forecast model.
    - Fully diluted cap table, liquidation preferences, option pool, debt/loan terms and runway.
    - Top-customer ARR, concentration, churn, retention, NRR/GRR cohorts, contracts and reference calls.
    - CAC/payback, funnel conversion, quota attainment, channel mix and partner economics.
    - SOC/ISO reports, pen tests, subprocessors, DPA/DPIA, breach history and regulatory/litigation/IP/insurance clearance.
  recommended_next_steps:
    - Run financial quality-of-revenue and cap-table/debt diligence before relying on headline valuation.
    - Request customer/cohort/contract data and conduct independent customer references across regions and modules.
    - Have counsel and security specialists review legal, privacy, security, IP, regulatory, insurance and material contracts.
    - Benchmark win/loss, pricing, retention and product depth against Personio/Sesame/BambooHR/Rippling/Deel/Paycor-style competitors.
