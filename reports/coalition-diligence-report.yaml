          - finding_id: V.A-F1
            finding: Broker and partner channels are central to public GTM signals.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-007
        hidden_risks:
          - Broker concentration or carrier appetite shifts could affect acquisition economics.
        evidence_gaps:
