    risk_title: Private financial quality is not publicly verifiable
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Audited financials, cash/debt, loss ratio, gross margin, ARR, budget-to-actuals and projections were not public.
    impacted_chapter_ids:
