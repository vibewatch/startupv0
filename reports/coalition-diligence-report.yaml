        summary: New-business pipeline, conversion, quote-to-bind, renewal uplift and cohort data were not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: V.C-F1
            finding: Public partnership/product evidence supports GTM existence, not pipeline quality.
            evidence_claim_ids:
              - EC-013
              - EC-014
            risk_ids:
              - R-006
