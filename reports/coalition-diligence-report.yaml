report_metadata:
  report_title: Coalition Startup Diligence Report
  target_company: Coalition
  website: https://www.coalitioninc.com/
  known_aliases:
    - Coalition
    - Coalition Inc.
    - Coalition Insurance Solutions
    - Coalition Insurance Company
    - Coalition Control
    - Coalition Security
    - Wirespeed
  sector: Active cyber insurance, cybersecurity and insurtech
  geography: United States headquartered with public global operations and partnerships
  company_stage: Private unicorn / growth-stage active insurance provider
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow and public-source-only evidence collection.
    - Prioritized Coalition company pages, company announcements, legal/privacy disclosures, claims/product pages, third-party market databases and credible market context.
    - Treated company-published performance/product claims as verified only for existence of the public statement unless independently corroborated.
    - Excluded inaccessible, blocked or CAPTCHA-protected claims from definitive conclusions unless separately corroborated.
  included_jurisdictions:
    - United States
    - Canada
    - United Kingdom
    - Australia
    - Germany
    - Denmark
    - Sweden
    - France
    - Global markets referenced by public company materials
  excluded_topics:
    - Private financial statements, actuarial files, contracts, cap table, customer calls, board materials, SOC/security reports, litigation databases, regulator database pulls and non-public correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for a Coalition diligence report
      type: workflow_request
      date_received: 2026-05-20
      notes: No pitch deck, financial model, data room or founder responses were provided.
