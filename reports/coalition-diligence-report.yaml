diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, cash/debt, revenue/premium bridge and loss economics.
    why_it_matters: Required to assess financial quality and runway.
    suggested_source_or_request: Finance data room and QoE review.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferences, option pool, debt/warrants and 409A/current valuation.
    why_it_matters: Historical valuation does not determine current investor economics.
    suggested_source_or_request: Corporate charter, stock purchase agreements and cap table.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level revenue, attach, usage, margins and independent loss-reduction validation.
    why_it_matters: Core differentiation rests on measurable active-insurance efficacy.
    suggested_source_or_request: Product analytics, actuarial validation and customer references.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top customers/policies, revenue concentration, churn, renewals and broker/channel concentration.
    why_it_matters: Aggregate policyholder count does not prove revenue durability.
    suggested_source_or_request: Customer cohort and concentration file.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Carrier/reinsurer capacity, supplier contracts and termination rights.
    why_it_matters: Capacity and supplier dependencies can constrain growth or margins.
    suggested_source_or_request: Carrier, reinsurance and critical-vendor contracts.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Coalition market share, win/loss, pricing and broker/customer preference versus At-Bay, Cowbell, Resilience and incumbents.
    why_it_matters: Competitive differentiation cannot be underwritten from public positioning alone.
    suggested_source_or_request: Win/loss, pricing studies and reference calls.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, broker productivity, marketing budget and channel ROI.
    why_it_matters: Growth quality depends on efficient distribution.
    suggested_source_or_request: GTM dashboard and budget-to-actuals.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Data lineage, model validation, security architecture, privacy controls, IP assignments and Wirespeed integration plan.
    why_it_matters: Technology/data claims are central to valuation and risk.
    suggested_source_or_request: Technical diligence package, model docs, security audits and IP schedule.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Actual headcount, attrition, compensation, option grants, employee relations and contractor classification.
    why_it_matters: Scaled global teams introduce retention and compliance risk.
    suggested_source_or_request: HRIS export, compensation plan and employee-relations schedule.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, complaints, producer appointments, privacy assessments and insurance policy-form approvals.
    why_it_matters: Insurance/privacy compliance is a gating diligence issue.
    suggested_source_or_request: Counsel-run regulator and privacy compliance review.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts, Allianz agreement, carrier/reinsurance terms, cloud/security vendors and customer/broker agreements.
    why_it_matters: Economic rights and termination/assignment clauses can materially affect value.
    suggested_source_or_request: Material contract schedule and full copies.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation docket, claims disputes, demand letters and settlement history.
    why_it_matters: Public legal pages are not a litigation search.
    suggested_source_or_request: Legal schedule and independent docket search.
    priority: medium
