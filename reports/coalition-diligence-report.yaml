executive_summary:
  overall_assessment: Coalition appears to be a scaled private unicorn operating at the intersection of cyber insurance, cybersecurity, data and AI. Public evidence verifies historical financings, broad product scope, carrier/licensing infrastructure, large policyholder/customer claims and a major Allianz partnership. Core investment diligence remains unresolved because audited financials, loss economics, current valuation, customer concentration, GTM efficiency, contracts, legal/regulatory files and technology validation are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The attractive thesis is a differentiated active-insurance platform in a growing cyber-insurance market; the gating questions are underwriting profitability, reinsurance/capacity resilience, defensible data/AI efficacy, efficient broker/partner distribution, regulatory/legal hygiene and current valuation/cap-table economics.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Coalition has verified public historical financing milestones, including a more-than-$3.5B Series E valuation and $250M Series F announcement.
      evidence_claim_ids:
        - EC-002
        - EC-022
    - founder_claim_id: FC-003
      summary: Coalition publicly markets an active-insurance platform combining insurance, Control, Active Data Graph, CoalitionAI and Wirespeed/security capabilities.
      evidence_claim_ids:
        - EC-004
        - EC-006
        - EC-015
        - EC-016
        - EC-017
    - founder_claim_id: FC-006
      summary: Coalition has visible carrier/licensing infrastructure and a public strategic global partnership with Allianz.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-020
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, loss economics and runway are not publicly verifiable.
    - risk_id: R-003
      summary: Cyber-insurance losses can be volatile, severe and correlated.
    - risk_id: R-005
      summary: Technology, AI and data-advantage claims are company-published and need independent validation.
    - risk_id: R-007
      summary: Carrier/reinsurer/Allianz relationships can create capacity and execution dependency.
  key_evidence_gaps:
    - Audited financials, actuarial loss data, reserves, reinsurance economics, cash/debt and forecast model.
    - Current cap table, preferences, strategic rights, option pool, debt and valuation support.
    - Customer/policyholder reconciliation, top accounts, churn, retention, broker/channel concentration and reference calls.
    - "GTM efficiency: CAC, payback, quote-to-bind, commissions, quota attainment and S&M budget."
    - "Technical diligence: data lineage, model validation, security controls, privacy assessments and IP chain."
    - "Legal/regulatory diligence: licenses, appointments, policy forms, material contracts, dockets, regulator correspondence and privacy/GLBA compliance."
  recommended_next_steps:
    - Open confirmatory financial/actuarial diligence before relying on historical unicorn valuation.
    - Run legal/regulatory review of licenses, carrier/reinsurance agreements, Allianz terms, privacy/GLBA and material contracts.
    - Validate data/AI/security product efficacy with technical review, model governance artifacts, claims triangulation and customer references.
    - Reconcile customer/policyholder definitions and test GTM efficiency by channel, broker and geography.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies major historical financings and a unicorn valuation anchor, but audited financials, current valuation, loss economics, cash/debt and projections remain private.
    founder_claim_ids:
      - FC-002
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-022
    risk_ids:
      - R-001
      - R-002
      - R-003
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A
        summary: No audited annual or quarterly financial statements, management accounts, backlog, AR aging, product/geography gross profit, cash/debt or loss ratio data were public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public materials disclose financing and premium-run-rate signals, not operating financial quality.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-001
        hidden_risks:
          - Insurance premium growth can mask loss-ratio or reinsurance-cost deterioration.
          - Cash burn, solvency and debt obligations cannot be assessed publicly.
        evidence_gaps:
          - Audited financial statements, monthly management accounts, ARR/revenue/premium bridge, loss triangles, cash/debt and budget-to-actuals.
        follow_up_questions:
          - Provide audited financials, monthly KPI pack, cash/debt schedule, loss ratio, reinsurance economics and QoE support.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-003
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B
        summary: No public forecast, budget, plan-vs-actual, valuation bridge or sensitivity model was located.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: The $250M Series F and >$3.5B Series E support historical investor demand but not forward projections.
            evidence_claim_ids:
              - EC-002
              - EC-022
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Headline financing could obscure future dilution or valuation reset risk.
        evidence_gaps:
          - Board-approved model, actuarial plan, budget-to-actuals, growth assumptions and downside cases.
        follow_up_questions:
          - Provide three-year forecast, unit economics, loss-ratio sensitivity, reinsurance assumptions and valuation bridge.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
          - F-009
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-022
      - section_id: I.C
        title: Capital structure
        checklist_question_ids:
          - I.C
        summary: Public sources identify major rounds and investors but not cap table, preferences, warrants, debt, option pool, pro forma ownership or current 409A.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Series D/E/F chronology provides a minimum financing backbone for cap-table requests.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-002
        hidden_risks:
          - Liquidation preferences, participating preferred, side letters or strategic rights could materially affect common/equity economics.
        evidence_gaps:
          - Current cap table, charter, investor rights, option pool, debt/warrants and strategic investor rights.
        follow_up_questions:
          - Provide full cap table, charter, stock purchase agreements, side letters, debt instruments and option ledger.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-009
        evidence_claim_ids:
          - EC-002
          - EC-022
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D
        summary: Tax, insurance reserves, reinsurance recoverables, regulatory capital, solvency filings, payables and related-party transactions were not public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Cyber-insurance operating economics require deeper actuarial and regulatory-capital diligence than SaaS-style revenue diligence.
            evidence_claim_ids:
              - EC-003
              - EC-011
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Reserve adequacy, adverse development, capital requirements or reinsurance recoverability could create hidden liabilities.
        evidence_gaps:
          - Tax returns, regulatory filings, actuarial opinions, reserve triangles, reinsurance recoverable schedule and related-party disclosures.
        follow_up_questions:
          - Provide statutory/GAAP reconciliations, reserve analysis, tax materials and related-party transaction schedule.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-011
  - chapter_id: II
    title: Products
    chapter_summary: Coalition publicly markets an integrated active-insurance platform combining insurance products, Control, incident response, security training, Active Data Graph, CoalitionAI and Wirespeed ADR.
    founder_claim_ids:
      - FC-003
      - FC-004
      - FC-007
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
      - EC-015
      - EC-016
      - EC-017
    risk_ids:
      - R-004
      - R-005
    sections:
      - section_id: II.A
        title: Product descriptions
        checklist_question_ids:
          - II.A
        summary: Public pages verify a broad product suite and claims of risk reduction; diligence should verify attach, revenue mix, loss-ratio impact and technology efficacy.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Coalition offers insurance coverages and non-insurance security products under the active-insurance positioning.
            evidence_claim_ids:
              - EC-004
              - EC-006
            risk_ids:
              - R-004
              - R-005
          - finding_id: II.A-F2
            finding: Claims reduction and recovery statistics are company-published and need actuarial validation.
            evidence_claim_ids:
              - EC-005
              - EC-007
            risk_ids:
              - R-003
              - R-005
        hidden_risks:
          - If security products do not materially reduce claims, underwriting margins and differentiation may compress.
          - AI/security features can introduce model, privacy, support and incident-response liabilities.
        evidence_gaps:
          - Product-level revenue, attach, usage, NPS, retention, gross margin, loss-ratio impact and roadmap.
        follow_up_questions:
          - Provide product P&L, attach/usage cohorts, loss-reduction methodology, product roadmap and technical diligence materials.
        table_ids:
          - T-003
          - T-004
          - T-018
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-006
          - EC-015
          - EC-016
          - EC-017
  - chapter_id: III
    title: Customer Information
    chapter_summary: Coalition publishes large policyholder/customer counts and claims outcomes, but top customers, revenue concentration, churn, severed relationships and supplier economics are not public.
    founder_claim_ids:
      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-010
      - EC-023
    risk_ids:
      - R-006
      - R-007
    sections:
      - section_id: III.A
        title: Top customers and policyholder base
        checklist_question_ids:
          - III.A
        summary: Aggregate policyholder counts are public but customer names, revenue, industry/geography mix and concentration are not.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Company sources cite 42K, 52K+, 160K+ and 100K+ customer/policyholder metrics at different dates and definitions.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-006
        hidden_risks:
          - Definition changes could overstate comparable growth; policyholder count may not equal revenue diversification.
        evidence_gaps:
          - Top customer list, premium/revenue by account, industry/geography segmentation and concentration.
        follow_up_questions:
          - Reconcile public customer/policyholder definitions to billed customers, active policies and revenue.
        table_ids:
          - T-005
        figure_ids:
          - F-003
          - F-009
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-023
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Allianz partnership and carrier relationships are material public signals.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Allianz agreement could expand global distribution but has approvals and execution dependencies.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-007
        hidden_risks:
          - Strategic dependence on one or several capacity/channel partners could affect growth, pricing and product breadth.
        evidence_gaps:
          - Partner economics, exclusivity, approvals, SLAs, termination rights and capacity commitments.
        follow_up_questions:
          - Provide Allianz and carrier contracts, approval status and concentration analysis.
        table_ids:
          - T-006
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-009
          - EC-010
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer, premium by customer and customer cohort economics are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Aggregate policyholder evidence does not answer revenue concentration or retention.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-006
        hidden_risks:
          - Broker/channel concentration may be more important than individual insured concentration.
        evidence_gaps:
          - Top 50 customers/policies, revenue, premium, broker source, contract term and renewals.
        follow_up_questions:
          - Provide anonymized customer concentration, churn and renewal cohort file.
        table_ids:
          - T-005
        figure_ids: []
        evidence_claim_ids:
          - EC-023
      - section_id: III.D
        title: Severed customer relationships
        checklist_question_ids:
          - III.D
        summary: Public research did not identify severed customer or partner relationships.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.D-F1
            finding: No public severed-relationship schedule was available.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-006
        hidden_risks:
          - Material cancellations, broker disputes or carrier exits may not be public.
        evidence_gaps:
          - Lost customers, non-renewals, complaints, claims disputes and broker departures.
        follow_up_questions:
          - Provide lost-account list, churn reasons, claims disputes and broker termination history.
        table_ids:
          - T-005
        figure_ids: []
        evidence_claim_ids:
          - EC-023
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Carriers/reinsurers, broker channels, cloud/security vendors and data providers are likely critical suppliers, but supplier spend and contracts are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Carrier list and Allianz partnership indicate material supplier/capacity counterparties.
            evidence_claim_ids:
              - EC-009
              - EC-010
            risk_ids:
              - R-007
        hidden_risks:
          - A carrier, reinsurer, cloud or security-data provider outage/termination could disrupt underwriting or claims operations.
        evidence_gaps:
          - Top suppliers by spend and dependency, carrier/reinsurance terms, cloud/security vendor contracts and data licenses.
        follow_up_questions:
          - Provide supplier spend, critical-vendor assessment, carrier/reinsurance schedule and business-continuity plan.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-010
          - EC-020
  - chapter_id: IV
    title: Competition
    chapter_summary: Coalition operates in a growing cyber-insurance market with direct venture-backed competitors and incumbent insurer/reinsurer competition.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-011
      - EC-012
    risk_ids:
      - R-003
      - R-004
    sections:
      - section_id: IV.A
        title: Competitive landscape
        checklist_question_ids:
          - IV.A
        summary: Munich Re estimates strong market growth, while competitor sites show active-insurance/security convergence among At-Bay, Cowbell and Resilience.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: IV.A-F1
            finding: The global cyber-insurance market is large and expected to grow, but North America remains the biggest share and competition is intense.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-003
              - R-004
          - finding_id: IV.A-F2
            finding: Competitors also combine insurance with MDR, risk quantification, resilience services or adaptive underwriting.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-004
        hidden_risks:
          - Rate softening, incumbent carrier capacity, security-vendor bundling or reinsurer appetite changes could compress margins.
        evidence_gaps:
          - Win/loss by competitor, pricing, broker preference, claims outcomes, renewal retention and share by segment.
        follow_up_questions:
          - Provide competitive pipeline, win/loss, pricing and broker/customer reference data.
        table_ids:
          - T-007
          - T-008
          - T-017
        figure_ids:
          - F-004
          - F-010
        evidence_claim_ids:
          - EC-011
          - EC-012
  - chapter_id: V
