    chapter_summary: Coalition appears to distribute through brokers, carrier partnerships and digital/product-led channels; sales efficiency and budget data are private.
    founder_claim_ids:
      - FC-006
    evidence_claim_ids:
      - EC-013
      - EC-014
      - EC-023
    risk_ids:
      - R-006
      - R-007
