      and Mediheal's 2026 release claims broader Target/Ulta/Costco and 36-country
      distribution.
    evidence_claim_ids:
    - EC-006
    - EC-008
  biggest_risks:
  - risk_id: R-001
    summary: Audited financial statements, margin, cash, debt, burn, runway, cap table,
      and financing terms are not public.
  - risk_id: R-003
    summary: TopDaily's related-party/internal-transaction allegations around LS Cosmetic
      create a high-priority governance, transfer-pricing, and succession diligence
      issue.
  - risk_id: R-004
    summary: Retail/channel concentration and international expansion economics are
      not verifiable without customer schedules, retailer contracts, sell-through,
      and channel P&Ls.
  key_evidence_gaps:
  - Audited financials, management accounts, cash, debt, burn, runway, tax positions,
    and revenue-recognition policies.
  - Current fully diluted cap table, liquidation preferences, investor rights, options/warrants/notes,
    and off-balance-sheet obligations.
  - Top customers/distributors, revenue by customer/channel/geography, sell-through,
    retailer terms, promotion allowances, returns, and backlog/pipeline.
  - Supplier contracts, LS Cosmetic related-party economics, board approvals, transfer-pricing
    support, factory permits, capex, and quality metrics.
  - Official legal/IP/regulatory/insurance clearance, product-safety files, privacy/security
    controls, litigation dockets, and counsel letters.
  - Management org chart, board roster, employment/compensation/equity plans, turnover,
    employee-relations history, and succession plan.
  recommended_next_steps:
  - Confirm private status through official registry/exchange checks and management/counsel
    representations before relying on the unicorn-list classification.
  - Run financial diligence on audited statements, management accounts, channel gross-to-net
    revenue, margins, cash, debt, burn, capex, and tax/transfer pricing.
  - Validate channel durability with retailer/distributor agreements, POS sell-through,
    inventory turns, returns, promotional funding, and customer concentration schedules.
  - Review LS Cosmetic and other supplier agreements, related-party approvals, board
    minutes, quality SLAs, and Incheon factory commissioning/permit records.
  - Have counsel review IP, product-regulatory, privacy, insurance, litigation, EHS,
    employee, and material-contract exposures.
