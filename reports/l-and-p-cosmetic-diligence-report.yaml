research_scope:
  diligence_depth: standard_diligence
  source_strategy:
  - Prioritized public sources that directly identify L&P Cosmetic/Mediheal, including
    CB Insights, company-owned Mediheal pages, retailer pages, trademark/patent mirrors,
    and independent Korean/business media.
  - Used public evidence to verify unicorn/private status, product surface, channel
    traction, financial signals, R&D/IP, management, legal policies, and hidden risks.
  - Treated company-authored blogs and PR Newswire releases as primary company evidence,
    not independent verification; triangulated with retailer and independent-news
    sources where possible.
  - Recorded unavailable private data as not_publicly_verifiable rather than inferring
    audited financials, customer concentration, cap table, contracts, insurance, or
    litigation clearance.
  included_jurisdictions:
  - South Korea
  - United States
  - European Union
  - Global markets where Mediheal claims distribution or where public retail pages
    were available
  excluded_topics:
  - Private data room, audited financial statements, management accounts, bank statements,
    tax filings, cap table, option ledger, debt agreements, investor rights, board
    minutes, and employee records.
  - Official Korean corporate registry, Korea Exchange, paid M&A databases, full legal
    dockets, counsel letters, IP file histories behind official office portals, insurance
    policies, retailer contracts, supplier contracts, and non-public customer references.
  - Any inaccessible CAPTCHA-blocked or paywalled sources beyond public excerpts.
  user_provided_materials:
