executive_summary:
  overall_assessment: L&P Cosmetic / Mediheal appears to be a real, active South Korea-headquartered
    private unicorn in dermocosmetic skincare. CB Insights lists L&P Cosmetic at a
    $1.19B unicorn-list valuation and Corporate Minority - III | Alive status; a July
    2024 Korea Times/PressReader excerpt described only a potential renewed IPO push,
    and reviewed public sources did not show a completed IPO, acquisition, or shutdown.
    Public evidence also supports meaningful brand and channel traction, including
    KRW 300B reported 2024 revenue, multi-billion cumulative mask sales, U.S. growth,
    and Target/Ulta retail visibility. The key diligence issue is not existence or
    product-market relevance; it is whether public growth narratives are backed by
    audited financials, durable margins, clean governance, and defensible international
    execution.
  investment_or_diligence_thesis: Advance to confirmatory diligence only after obtaining
    private materials. The opportunity has credible K-beauty brand equity, broad product
    expansion beyond masks, and public U.S./global distribution signals. However,
    underwriting should be gated by audited financials, current cap table, customer/channel
    concentration, retailer economics, supplier and related-party contracts, factory
    capex/ramp, IP counsel review, product-regulatory/privacy clearance, insurance,
    and management/governance documents.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: CB Insights lists L&P Cosmetic as a $1.19B Consumer & Retail unicorn
      in Seoul, South Korea, with a 1/1/2016 unicorn date.
    evidence_claim_ids:
    - EC-001
  - founder_claim_id: FC-003
    summary: Public product and retailer pages verify Mediheal's live skincare product
