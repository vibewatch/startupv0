report_metadata:
  report_title: Hippocratic AI Startup Diligence Report
  target_company: Hippocratic AI
  website: https://www.hippocraticai.com/
  known_aliases:
    - Hippocratic AI
    - HAI
  sector: Generative AI healthcare agents / healthcare workflow automation
  geography: United States with publicly referenced provider, payer, and international health-system relationships
  company_stage: Private unicorn / growth-stage healthcare AI company
  research_date: 2026-06-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Reviewed public CB Insights financials and competitor pages for funding, valuation, and market-position signals.
    - Reviewed company-owned homepage, about, customers, safety, and team pages for product, customer, leadership, and safety-framework claims.
    - Treated company outcome claims as marketing evidence unless independently corroborated; private data-room items are flagged as not publicly verifiable.
    - Did not rely on inaccessible paywalled or gated sources for substantive claims beyond noting the access limitation.
  included_jurisdictions:
    - United States
    - Israel
    - United Arab Emirates
    - global healthcare delivery and life-sciences workflows
  excluded_topics:
    - Non-public customer contracts, audited financial statements, cap table exports, and round documents.
    - Clinical incident logs, regulatory correspondence, insurance policies, and detailed employment/compensation records.
    - Full court-docket, patent-chain-of-title, and security-audit artifact review beyond publicly accessible pages.
  user_provided_materials:
    - material_id: UPM-HIP-001
      title: Workflow request and candidate-selection context
      type: workflow_request
      date_received: 2026-06-17
      notes: Specified the target, output path, and public-source starting point for an uncovered private unicorn report.
founder_claims:
  - founder_claim_id: FC-HIP-001
    claim_text: Hippocratic AI is an active private unicorn-scale company with a valuation above $1B.
    claim_source: CB Insights public financials page
    claim_date: 2025-01-09
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
      - I.A
      - VIII.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-HIP-001
    contradiction_summary: The January 2025 valuation is public, but the November 2025 post-money value remains gated, so current fair value still needs private confirmation.
    diligence_follow_up:
      - Obtain the latest round documents, cap table, and any debt or secondary terms tied to the November 2025 financing.
  - founder_claim_id: FC-HIP-002
    claim_text: Hippocratic AI offers safety-first generative AI healthcare agents and says Polaris 5.0 was trained on 180M+ patient interactions.
    claim_source: Hippocratic AI homepage and safety page
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.A
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-HIP-002
      - EC-HIP-004
      - EC-HIP-005
    contradiction_summary: The product and safety framework are clearly represented publicly, but independent clinical-performance validation is not publicly available in this pass.
    diligence_follow_up:
      - Request benchmark methodology, deployment pass/fail criteria, escalation rates, and model-validation packets for Polaris releases.
  - founder_claim_id: FC-HIP-003
    claim_text: Hippocratic AI has public customer deployments that produce measurable workflow and engagement improvements.
    claim_source: Hippocratic AI customers page
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-HIP-003
    contradiction_summary: Named logos and quoted outcome metrics are public, but the company pages are marketing materials and do not reveal contract economics, cohort definitions, or retention.
    diligence_follow_up:
      - Request signed reference permissions, customer concentration, renewal data, and the denominator/methodology for each published outcome metric.
  - founder_claim_id: FC-HIP-004
    claim_text: Hippocratic AI has publicly visible clinical, product, and commercial leadership depth.
    claim_source: Hippocratic AI team page
    claim_date: null
    mapped_chapter_ids:
      - VI
      - VII
    mapped_section_ids:
      - VI.A
      - VII.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-HIP-006
    contradiction_summary: Leadership biographies are public, but reporting relationships, tenure economics, and board governance are not fully visible.
    diligence_follow_up:
      - Request the current org chart, board observer rights, retention packages, and key-person dependency analysis.
executive_summary:
  overall_assessment: Hippocratic AI shows credible public evidence of unicorn-scale financing, an expansive healthcare-agent product surface, named provider and payer references, and a prominently marketed safety framework, but clinical-performance rigor, customer economics, pricing, legal exposure, and capital-structure details still require private diligence.
  investment_or_diligence_thesis: The company merits continued diligence as a high-profile healthcare AI workflow platform, but investment reliance should be conditioned on independent validation of safety and clinical outcomes, customer concentration and retention, and the legal/compliance controls around patient-facing AI use.
  strongest_verified_claims:
    - founder_claim_id: FC-HIP-001
      summary: CB Insights publicly records a January 2025 $1.64B valuation and a $126M Series C in November 2025.
      evidence_claim_ids:
        - EC-HIP-001
    - founder_claim_id: FC-HIP-002
      summary: The homepage and safety pages clearly present Polaris 5.0, healthcare-agent use cases, and a five-step safety approach with human escalation.
      evidence_claim_ids:
        - EC-HIP-002
        - EC-HIP-004
        - EC-HIP-005
    - founder_claim_id: FC-HIP-003
      summary: The customers page names healthcare organizations and publishes case-study style workflow metrics across provider and payer settings.
      evidence_claim_ids:
        - EC-HIP-003
  biggest_risks:
    - risk_id: R-HIP-001
      summary: Clinical-safety and regulatory exposure are high because the product is patient-facing and outcome-sensitive.
    - risk_id: R-HIP-002
      summary: Revenue quality, pricing, and customer concentration remain private despite visible logos and published marketing outcomes.
    - risk_id: R-HIP-003
      summary: Valuation support and capital-structure economics remain incomplete because the latest post-money value and terms are gated.
  key_evidence_gaps:
    - Audited financials, current ARR/revenue quality, and the full November 2025 financing terms.
    - Independent clinical-safety results, escalation rates, incident logs, and regulatory correspondence.
    - Customer concentration, renewals, pricing architecture, and deployment economics.
    - IP ownership schedules, legal open-matter list, and full board/governance documentation.
  recommended_next_steps:
    - Request the data room for financials, cap table, legal schedules, and commercialization metrics.
    - Run technical/clinical diligence on safety methodology, model governance, and escalation workflows.
    - Conduct reference calls with named customers across provider, payer, and international deployment settings.
    - Review privacy, HIPAA, and patient-communication controls alongside any insurance and indemnity package.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources confirm unicorn-scale valuation anchors and large venture backing, but audited financial quality, current revenue composition, and full financing terms are private.
    founder_claim_ids:
      - FC-HIP-001
    evidence_claim_ids:
      - EC-HIP-001
      - EC-HIP-008
    risk_ids:
      - R-HIP-002
      - R-HIP-003
    sections:
      - section_id: I.A
        title: Funding, valuation, and public scale signals
        checklist_question_ids:
          - I.A.1
          - I.A.4
          - I.B.3
          - I.C.1
          - I.D.3
        summary: CB Insights provides a clean public valuation anchor and latest-round date, but the latest post-money value, audited statements, and revenue-quality detail are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: HIP-I-F1
            finding: CB Insights records a January 2025 valuation of $1.64B and a November 2025 $126M Series C.
            evidence_claim_ids:
              - EC-HIP-001
            risk_ids:
              - R-HIP-003
          - finding_id: HIP-I-F2
            finding: CB Insights shows $402M total raised across 9 rounds, but the latest post-money valuation amount is gated.
            evidence_claim_ids:
              - EC-HIP-001
            risk_ids:
              - R-HIP-003
          - finding_id: HIP-I-F3
            finding: No audited revenue, gross margin, or customer-concentration data was found in public sources during this pass.
            evidence_claim_ids:
              - EC-HIP-008
            risk_ids:
              - R-HIP-002
        hidden_risks:
          - Structured financing or secondary terms could materially affect ownership economics.
          - Healthcare deployment services could mask software gross-margin quality if not separated privately.
        evidence_gaps:
          - Audited financials, bookings/ARR bridge, cap table, debt schedule, and current cash runway.
        follow_up_questions:
          - What is the current revenue mix across provider, payer, and life-sciences workflows, and how much of it is recurring software versus services?
        table_ids:
          - T-HIP-I-1
          - T-HIP-I-2
        figure_ids:
          - F-HIP-I
        evidence_claim_ids:
          - EC-HIP-001
          - EC-HIP-008
  - chapter_id: II
    title: Products
    chapter_summary: Public product pages show a broad healthcare-agent platform and multiple workflow surfaces, but pricing, exact module attach rates, and clinical-performance depth remain private.
    founder_claim_ids:
      - FC-HIP-002
    evidence_claim_ids:
      - EC-HIP-002
      - EC-HIP-004
      - EC-HIP-005
    risk_ids:
      - R-HIP-001
      - R-HIP-004
    sections:
      - section_id: II.A
        title: Healthcare-agent product surface
        checklist_question_ids:
          - II.A.1
          - II.A.4
          - II.A.5
          - II.A.6
        summary: The public site positions Hippocratic as a patient-facing healthcare-agent platform with Polaris 5.0, AI Front Door, Nurse Co-Pilot, and 1,000+ agents, but no public pricing or product-line economics are disclosed.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: HIP-II-F1
            finding: The homepage markets Polaris 5.0 as built on 180M+ patient interactions and highlights 1,000+ AI healthcare agents.
            evidence_claim_ids:
              - EC-HIP-002
            risk_ids:
              - R-HIP-001
          - finding_id: HIP-II-F2
            finding: The site advertises AI Front Door and Nurse Co-Pilot as named workflow products.
            evidence_claim_ids:
              - EC-HIP-002
            risk_ids:
              - R-HIP-004
          - finding_id: HIP-II-F3
            finding: The about and safety pages emphasize clinical abundance and do-no-harm principles as core product framing.
            evidence_claim_ids:
              - EC-HIP-004
              - EC-HIP-005
            risk_ids:
              - R-HIP-001
        hidden_risks:
          - Workflow breadth can outpace product hardening across edge cases.
          - Patient-facing voice interactions may create liability if prompt or triage logic drifts.
        evidence_gaps:
          - SKU pricing, implementation timelines, model-error taxonomy, and gross margin by product/workflow.
        follow_up_questions:
          - How are product lines packaged and priced across providers, payers, and life sciences, and which modules carry the highest margin?
        table_ids:
          - T-HIP-II-1
          - T-HIP-II-2
        figure_ids:
          - F-HIP-II
        evidence_claim_ids:
          - EC-HIP-002
          - EC-HIP-004
          - EC-HIP-005
  - chapter_id: III
    title: Customer Information
    chapter_summary: Named public customers and outcome claims indicate real deployment traction, but concentration, ARR weight, and referenceable retention economics remain undisclosed.
    founder_claim_ids:
      - FC-HIP-003
    evidence_claim_ids:
      - EC-HIP-003
      - EC-HIP-008
    risk_ids:
      - R-HIP-002
      - R-HIP-004
    sections:
      - section_id: III.A
        title: Public customers, use cases, and outcome signals
        checklist_question_ids:
          - III.A
          - III.B
          - III.C
          - III.E
        summary: The customers page names provider and payer organizations and publishes workflow-improvement claims, but contract values, deployment scope, and concentration are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: HIP-III-F1
            finding: Public references include OhioHealth, Cincinnati Children’s Global, Medical Mutual, Universal Health Services, Burjeel Holdings, University Hospitals, and Sheba Medical Center.
            evidence_claim_ids:
              - EC-HIP-003
            risk_ids:
              - R-HIP-002
          - finding_id: HIP-III-F2
            finding: Published case-study style outcomes include 360% capacity expansion, 20% higher MWV completion, 2.6x higher engagement, and 30% readmission reduction.
            evidence_claim_ids:
              - EC-HIP-003
            risk_ids:
              - R-HIP-002
          - finding_id: HIP-III-F3
            finding: Public sources do not reveal top-customer revenue share, renewal rates, or churn.
            evidence_claim_ids:
              - EC-HIP-008
            risk_ids:
              - R-HIP-002
        hidden_risks:
          - Large-logo reliance may overstate broad-market repeatability.
          - Outcome metrics can depend heavily on customer workflow design and staffing support.
        evidence_gaps:
          - Customer concentration, ACV distribution, renewals, NRR/GRR, and case-study denominators.
        follow_up_questions:
          - How much ARR is concentrated in the top 10 customers and what percentage of public case studies have renewed or expanded?
        table_ids:
          - T-HIP-III-1
          - T-HIP-III-2
        figure_ids:
          - F-HIP-III
        evidence_claim_ids:
          - EC-HIP-003
          - EC-HIP-008
  - chapter_id: IV
    title: Competition
    chapter_summary: The accessible market signal positions Hippocratic among healthcare-AI and voice/workflow automation vendors, but durable differentiation still depends on proof of clinical safety and deployment outcomes.
    founder_claim_ids:
      - FC-HIP-002
    evidence_claim_ids:
      - EC-HIP-002
      - EC-HIP-007
    risk_ids:
      - R-HIP-001
      - R-HIP-004
    sections:
      - section_id: IV.A
        title: Competitive landscape for healthcare AI agents
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: CB Insights competitor pages identify healthcare AI and identity/voice adjacencies, while Hippocratic’s own positioning emphasizes safety and patient-facing workflow coverage.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: HIP-IV-F1
            finding: CB Insights names Qualified Health, Hume AI, Hyro, Apricot, Beam Health, and Iodine Software among top competitors or adjacencies.
            evidence_claim_ids:
              - EC-HIP-007
            risk_ids:
              - R-HIP-004
          - finding_id: HIP-IV-F2
            finding: Hippocratic differentiates publicly on safety-first messaging, clinical supervision, and healthcare-specific agent workflows.
            evidence_claim_ids:
              - EC-HIP-002
              - EC-HIP-004
            risk_ids:
              - R-HIP-001
        hidden_risks:
          - Adjacent AI infrastructure and workflow vendors can compress pricing or erode differentiation.
          - Hospitals may consolidate AI spend onto broader platform vendors.
        evidence_gaps:
          - Win/loss data, deployment conversion, pricing pressure, and competitor-specific displacement rates.
        follow_up_questions:
          - Which competitors show up most often in late-stage deals and what is the typical reason Hippocratic wins or loses?
        table_ids:
          - T-HIP-IV-1
          - T-HIP-IV-2
        figure_ids:
          - F-HIP-IV
        evidence_claim_ids:
          - EC-HIP-002
          - EC-HIP-004
          - EC-HIP-007
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: The public GTM picture is enterprise-oriented and case-study driven, but pipeline, partner-sourced revenue, and sales productivity are not public.
    founder_claim_ids:
      - FC-HIP-003
    evidence_claim_ids:
      - EC-HIP-002
      - EC-HIP-003
      - EC-HIP-005
    risk_ids:
      - R-HIP-002
      - R-HIP-004
    sections:
      - section_id: V.A
        title: Go-to-market and enterprise demand signals
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.4
          - V.C
        summary: Public pages show direct enterprise sales, named customer stories, and healthcare labor-shortage messaging, but do not disclose funnel conversion, CAC, or quota productivity.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: HIP-V-F1
            finding: The site uses direct meeting CTAs and customer stories rather than self-serve pricing.
            evidence_claim_ids:
              - EC-HIP-002
              - EC-HIP-003
            risk_ids:
              - R-HIP-004
          - finding_id: HIP-V-F2
            finding: The about page frames the product against a 15M healthcare-worker shortfall and patient-access need.
            evidence_claim_ids:
              - EC-HIP-005
            risk_ids:
              - R-HIP-004
          - finding_id: HIP-V-F3
            finding: Public case studies demonstrate demand signals but not repeatable economics across segments.
            evidence_claim_ids:
              - EC-HIP-003
            risk_ids:
              - R-HIP-002
        hidden_risks:
          - Long enterprise sales cycles in healthcare can slow scaling.
          - Deployment success may depend on intensive clinical and change-management support.
        evidence_gaps:
          - Pipeline health, CAC payback, channel mix, sales productivity, partner contribution, and renewal expansion.
        follow_up_questions:
          - What are the leading channels, average sales cycle, and implementation burden by segment?
        table_ids:
          - T-HIP-V-1
          - T-HIP-V-2
        figure_ids:
          - F-HIP-V
        evidence_claim_ids:
          - EC-HIP-002
          - EC-HIP-003
          - EC-HIP-005
  - chapter_id: VI
    title: Research and Development
    chapter_summary: Public R&D signals center on the safety framework, product releases, and named product/science leaders, but model-governance artifacts and roadmap depth remain private.
    founder_claim_ids:
      - FC-HIP-002
      - FC-HIP-004
    evidence_claim_ids:
      - EC-HIP-002
      - EC-HIP-004
      - EC-HIP-006
    risk_ids:
      - R-HIP-001
      - R-HIP-005
      - R-HIP-006
    sections:
      - section_id: VI.A
        title: Safety framework and product development leadership
        checklist_question_ids:
          - VI.A.1
          - VI.A.2
          - VI.A.3
          - VI.B.1
          - VI.B.4
        summary: The public site exposes named product/science leadership and a five-step safety framework, but independently reviewed model-governance outputs and roadmap commitments are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: HIP-VI-F1
            finding: The safety page publishes a five-step approach that includes constellation architecture, output testing, human clinical supervision, escalation to a human nurse, and cross-validation.
            evidence_claim_ids:
              - EC-HIP-004
            risk_ids:
              - R-HIP-001
              - R-HIP-005
          - finding_id: HIP-VI-F2
            finding: The team page publicly identifies co-founder product and science leaders and multiple clinical operators.
            evidence_claim_ids:
              - EC-HIP-006
            risk_ids:
              - R-HIP-006
        hidden_risks:
          - Governance narrative may outpace production telemetry and exception handling.
          - Healthcare models face high evidence burdens when expanding into new workflows.
        evidence_gaps:
          - Safety audit artifacts, model cards, roadmap dates, failure-taxonomy trends, and security/compliance reports.
        follow_up_questions:
          - What quantitative safety thresholds govern release approvals and how are escalations audited post-deployment?
        table_ids:
          - T-HIP-VI-1
          - T-HIP-VI-2
        figure_ids:
          - F-HIP-VI
        evidence_claim_ids:
          - EC-HIP-002
          - EC-HIP-004
          - EC-HIP-006
  - chapter_id: VII
    title: Management and Personnel
    chapter_summary: Public biographies show meaningful founder, clinical, and commercial depth, but governance rights, full org structure, and workforce metrics are not public.
    founder_claim_ids:
      - FC-HIP-004
    evidence_claim_ids:
      - EC-HIP-006
      - EC-HIP-008
    risk_ids:
      - R-HIP-006
    sections:
      - section_id: VII.A
        title: Leadership and workforce visibility
        checklist_question_ids:
          - VII.A
          - VII.B
          - VII.C
          - VII.D.1
          - VII.G.1
        summary: The team page gives substantial biography detail for founders and clinical/commercial leaders, but public reporting relationships, headcount, attrition, and compensation exposure are still incomplete.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: HIP-VII-F1
            finding: Public biographies identify founder and executive leadership across CEO, product, science, communications, HR, finance, and business development roles.
            evidence_claim_ids:
              - EC-HIP-006
            risk_ids:
              - R-HIP-006
          - finding_id: HIP-VII-F2
            finding: Accessible public sources did not provide a full current headcount, attrition, or incentive-plan dataset.
            evidence_claim_ids:
              - EC-HIP-008
            risk_ids:
              - R-HIP-006
        hidden_risks:
          - Founder or key-clinician concentration may be material in a fast-scaling healthcare AI company.
          - Clinical credibility can be hard to preserve during rapid GTM expansion.
        evidence_gaps:
          - Current org chart, board composition, headcount by function, attrition, and compensation/incentive plans.
        follow_up_questions:
          - What is the current headcount by engineering, clinical operations, customer success, and sales, and where are retention risks highest?
        table_ids:
          - T-HIP-VII-1
          - T-HIP-VII-2
        figure_ids:
          - F-HIP-VII
        evidence_claim_ids:
          - EC-HIP-006
          - EC-HIP-008
  - chapter_id: VIII
    title: Legal and Related Matters
    chapter_summary: Legal and compliance risk is primarily tied to patient-facing AI, privacy, and contracting obligations; however, full open-matter, IP, insurance, and regulatory records are not publicly verifiable in this pass.
    founder_claim_ids:
      - FC-HIP-001
      - FC-HIP-002
    evidence_claim_ids:
      - EC-HIP-001
      - EC-HIP-004
      - EC-HIP-008
    risk_ids:
      - R-HIP-001
      - R-HIP-003
      - R-HIP-005
      - R-HIP-006
    sections:
      - section_id: VIII.A
        title: Legal, regulatory, and compliance posture
        checklist_question_ids:
          - VIII.A
          - VIII.C.1
          - VIII.C.2
          - VIII.D
          - VIII.E
          - VIII.F
        summary: The public record shows an active private company operating in a clinically sensitive domain with an explicit safety narrative, but legal matters, insurance, IP ownership, and regulatory interactions require private diligence.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: HIP-VIII-F1
            finding: No completed IPO, acquisition, or shutdown was found in the reviewed public sources, supporting private-company eligibility.
            evidence_claim_ids:
              - EC-HIP-001
            risk_ids:
              - R-HIP-003
          - finding_id: HIP-VIII-F2
            finding: The safety page and customer references imply meaningful clinical and privacy obligations, but no public legal matter schedule was available in this pass.
            evidence_claim_ids:
              - EC-HIP-004
              - EC-HIP-008
            risk_ids:
              - R-HIP-001
              - R-HIP-005
        hidden_risks:
          - Patient communication, clinical guidance, and data-handling obligations may create outsized liability.
          - Insurance coverage and indemnity structures may lag product-risk profile.
        evidence_gaps:
          - Litigation schedule, IP assignments, insurance program, HIPAA/security controls, and regulatory correspondence.
        follow_up_questions:
          - What litigation, complaint, incident, and insurance disclosures exist around patient-facing AI workflows?
        table_ids:
          - T-HIP-VIII-1
          - T-HIP-VIII-2
        figure_ids:
          - F-HIP-VIII
        evidence_claim_ids:
          - EC-HIP-001
          - EC-HIP-004
          - EC-HIP-008
