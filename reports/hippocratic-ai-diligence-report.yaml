risk_register:
  - risk_id: R-HIP-001
    risk_title: Clinical safety and regulatory exposure
    risk_category: regulatory
    severity: critical
    likelihood: medium
    description: Patient-facing healthcare agents create outsized downside if model, workflow, or escalation controls fail in production.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VIII.A
    evidence_claim_ids:
      - EC-HIP-002
      - EC-HIP-004
      - EC-HIP-005
    mitigation_or_diligence_request: Review clinical governance, incident history, escalation telemetry, insurance, and any regulatory/legal notices.
  - risk_id: R-HIP-002
    risk_title: Revenue quality and concentration remain opaque
    risk_category: financial
    severity: high
    likelihood: medium
    description: Named customer references and marketing metrics do not reveal top-customer dependence, renewal quality, or segment economics.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - V.A
    evidence_claim_ids:
      - EC-HIP-003
      - EC-HIP-008
    mitigation_or_diligence_request: Request ARR bridge, cohort retention, top-10 ARR share, and referenceable renewal data.
  - risk_id: R-HIP-003
    risk_title: Valuation and capital-structure support are incomplete
    risk_category: financial
    severity: high
    likelihood: medium
    description: The January 2025 unicorn valuation is public, but the latest post-money amount, preference stack, and any structured-finance terms remain gated.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.A
      - VIII.A
    evidence_claim_ids:
      - EC-HIP-001
      - EC-HIP-008
    mitigation_or_diligence_request: Request round docs, cap table, debt schedule, and any secondary or structured-capital terms.
  - risk_id: R-HIP-004
    risk_title: Competition and healthcare workflow adoption pressure
    risk_category: market
    severity: medium
    likelihood: medium
    description: A crowded healthcare-AI landscape may compress pricing, lengthen evaluation cycles, or make category ownership difficult.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-HIP-002
      - EC-HIP-003
      - EC-HIP-007
    mitigation_or_diligence_request: Review win/loss data, product attach rates, deployment timelines, and pricing pressure by segment.
  - risk_id: R-HIP-005
    risk_title: Privacy and data-security obligations are material
    risk_category: operational
    severity: high
    likelihood: unknown
    description: Healthcare and patient-facing workflows imply stringent privacy, data-processing, and security expectations that were not fully inspectable from public sources alone.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.A
    evidence_claim_ids:
      - EC-HIP-002
      - EC-HIP-004
      - EC-HIP-008
    mitigation_or_diligence_request: Review HIPAA controls, subprocessor map, incident response, security audit artifacts, and BAAs.
  - risk_id: R-HIP-006
    risk_title: Governance and key-person concentration
    risk_category: personnel
    severity: medium
    likelihood: medium
    description: Founder, product, and science leadership depth is visible, but board, incentive, succession, and org-scale transparency remain incomplete.
    impacted_chapter_ids:
      - VI
      - VII
      - VIII
    impacted_section_ids:
      - VI.A
      - VII.A
      - VIII.A
    evidence_claim_ids:
      - EC-HIP-006
      - EC-HIP-008
    mitigation_or_diligence_request: Request full org chart, board roster, compensation plans, and retention-risk analysis.
diligence_gaps:
  - gap_id: G-HIP-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, ARR/revenue bridge, cap table, and latest financing terms
    why_it_matters: Needed to underwrite valuation, dilution, and revenue durability.
    suggested_source_or_request: CFO / finance data room
    priority: high
  - gap_id: G-HIP-002
    chapter_id: III
    section_id: III.A
    missing_information: Customer concentration, renewals, pricing, and case-study methodology
    why_it_matters: Determines commercial quality and repeatability of public customer wins.
    suggested_source_or_request: Sales ops / customer success
    priority: high
  - gap_id: G-HIP-003
    chapter_id: VI
    section_id: VI.A
    missing_information: Safety audit artifacts, incident history, model cards, and escalation telemetry
    why_it_matters: Core to validating a patient-facing AI platform.
    suggested_source_or_request: Product / clinical governance / security
    priority: high
  - gap_id: G-HIP-004
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Legal open-matter schedule, IP ownership package, and insurance tower
    why_it_matters: Needed to size downside in a regulated healthcare context.
    suggested_source_or_request: General counsel / IP counsel / risk management
    priority: high
