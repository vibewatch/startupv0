executive_summary:
  overall_assessment: 'Apna is eligible for this public-source diligence report: CB
    Insights lists it as a $1.10B India/Bengaluru Enterprise Tech unicorn, public
    company pages show ongoing operations, third-party profiles list Apnatime Tech
    as active, and no public IPO, acquisition or shutdown evidence was found. The
    diligence posture remains confirmatory/high-risk because audited financials, cap
    table, customer concentration, AI/data governance, material contracts and legal/regulatory
    schedules are private.'
  investment_or_diligence_thesis: Proceed to data-room diligence only if Apna can
    demonstrate that its large candidate/employer network converts into durable paid
    revenue with controlled CAC, acceptable gross margin, compliant AI/data practices
    and defensible employer retention. Public upside is a scaled India jobs and AI
    recruiting network; public downside is revenue volatility, continuing losses,
    intense competition and opaque legal/capital-structure details.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: CB Insights and TechCrunch support the 2021 $1.10B unicorn valuation
      and the active-private screen is adequate for public diligence.
    evidence_claim_ids:
    - EC-001
    - EC-002
    - EC-023
  - founder_claim_id: FC-004
    summary: TechCrunch corroborates the $70M Series B and $100M Series C in 2021.
    evidence_claim_ids:
    - EC-002
    - EC-004
    - EC-005
  - founder_claim_id: FC-002
    summary: Company pages and app listing verify an active job-search, employer-hiring
      and AI recruiting platform.
    evidence_claim_ids:
    - EC-006
    - EC-007
    - EC-010
    - EC-018
    - EC-026
  biggest_risks:
  - risk_id: R-001
    summary: Financial quality and FY24 revenue-decline risk cannot be underwritten
      without audited financials and management accounts.
  - risk_id: R-002
    summary: The 2021 valuation and unknown preference stack/cap table may not reflect
      current economics.
  - risk_id: R-003
    summary: Customer concentration, paid/free mix, active-user quality and churn
      are not public despite large scale claims.
  key_evidence_gaps:
  - Audited financial statements, monthly management accounts, cash/debt, revenue
    recognition, AR aging and forecast model.
  - Fully diluted cap table, financing terms, option/warrant/debt schedules and liquidation
    waterfall.
  - Customer-level revenue, paid/free split, concentration, churn, retention, cohort
    quality and reference contacts.
  - AI/data governance, model evaluation, call consent, DPDP/privacy compliance and
    security evidence.
  - Counsel litigation/regulatory letter, corporate registry reconciliation, IP schedule,
    insurance and material contracts.
  recommended_next_steps:
  - Open confirmatory financial/cap-table diligence before relying on the 2021 valuation.
  - Run customer/employer and candidate-supply diligence by city/category, including
    paid cohorts and references.
  - Conduct privacy, AI governance, cybersecurity, employment-law and international-placement
    legal review.
  - Benchmark CAC, paid conversion, retention and pricing against Naukri, WorkIndia,
    foundit and global platforms.
