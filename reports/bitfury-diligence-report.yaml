executive_summary:
  overall_assessment: Public sources verify active operations, the CB Insights unicorn listing, a 2018 $80M private placement, a 2025 $1B initiative, and several portfolio assets; they do not verify current revenue quality, cash, cap table, debt, fund capitalization terms, or customer concentration.
  investment_or_diligence_thesis: Bitfury diligence turns on whether an older blockchain/mining unicorn can substantiate current economics after pivoting toward a $1B AI, web3, and sustainable-computing investment platform, while managing crypto-cycle, regulatory, portfolio-valuation, and brand-fraud risks.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Bitfury appears on a public unicorn list at a latest known valuation of $1B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Bitfury is eligible for private unicorn diligence because reviewed public sources show active operations and no IPO, acquisition of the company, or shutdown.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-003
      summary: Bitfury has an active public product or operating model in Web3, digital assets, AI, sustainable computing, and technology investment/incubation.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Current revenue quality and post-pivot economics are opaque
    - risk_id: R-002
      summary: Crypto/mining and HPC cyclicality
    - risk_id: R-003
      summary: Portfolio valuation and related-party complexity
  key_evidence_gaps:
    - Audited annual and quarterly financial statements, cash, debt, burn, revenue by product/channel/geography, gross margin, AR aging, and backlog.
    - Fully diluted cap table, preference stack, option pool, SAFEs/notes/warrants, investor rights, and secondary transactions.
    - Top-customer revenue, churn, NRR, cohort expansion, contract terms, and customer references.
    - Product-level P&L, pricing/discounting, roadmap, uptime, incidents, and dependency map.
    - Litigation, regulatory, IP, privacy/security, insurance, and material-contract schedules.
  recommended_next_steps:
    - Reconcile public valuation to primary financing documents, current cap table, 409A/secondary transactions, cash, debt, and forecast support.
    - Request customer cohort, concentration, churn, NRR, reference, pipeline, and contract data before underwriting revenue durability.
    - Run focused product, technology, security/privacy, IP, regulatory, and material-contract diligence tied to the risks in this report.
    - Interview leadership and functional owners for finance, product, sales, security, legal, and people operations.
