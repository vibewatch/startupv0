"executive_summary":
  "overall_assessment": "Tridge has strong public evidence for company existence, product breadth, funding history, and a 2022 unicorn valuation step-up, but the underwrite remains evidence-gap heavy because revenue quality, customer concentration, supplier concentration, and governance detail are largely private."
  "investment_or_diligence_thesis": "The core diligence question is whether Tridge's publicly impressive cross-product narrative—intelligence, sourcing, fulfillment, and payments—is supported by durable unit economics, defensible competitive advantages, compliant execution, and a current valuation justified beyond the 2022 Series D anchor."
  "strongest_verified_claims":
    - "founder_claim_id": "FC-001"
      "summary": "Public sources verify Tridge raised a 2022 Series D at a reported $2.7B valuation after a $500M Series C in 2021."
      "evidence_claim_ids":
        - "EC-004"
        - "EC-005"
    - "founder_claim_id": "FC-002"
      "summary": "Tridge publicly operates a visible multi-product stack spanning Eye, Ark, Sourcing Hub, Fulfillment, and Tridge Pay."
      "evidence_claim_ids":
        - "EC-009"
        - "EC-010"
        - "EC-011"
        - "EC-012"
        - "EC-017"
    - "founder_claim_id": "FC-003"
      "summary": "Public materials consistently indicate meaningful network scale, albeit with inconsistent metric definitions."
      "evidence_claim_ids":
        - "EC-001"
        - "EC-002"
        - "EC-003"
        - "EC-013"
        - "EC-016"
  "biggest_risks":
    - "risk_id": "R-001"
      "summary": "Financial transparency and valuation support remain limited to public round history rather than current financial quality or fair-value support."
    - "risk_id": "R-002"
      "summary": "KPI definition drift across users, buyers, stakeholders, visitors, and employees raises growth-quality and reporting-discipline risk."
    - "risk_id": "R-003"
      "summary": "Execution breadth across intelligence, commerce, fulfillment, and payments pits Tridge against stronger specialists while increasing operational complexity."
  "key_evidence_gaps":
    - "Audited historical financials, current run-rate metrics, backlog, AR aging, and working-capital quality."
    - "Current cap table, preference stack, debt instruments, warrants/options, and post-2022 financing history."
    - "Top-customer and top-supplier concentration schedules, cohort retention, churn, and severed-relationship history."
    - "Product-level revenue, gross margin, paid conversion, and roadmap delivery metrics across Eye, Ark, fulfillment, and Pay."
    - "Litigation matrix, insurance coverage, regulatory correspondence, and compliance audit materials for cross-border operations."
  "recommended_next_steps":
    - "Request a full financial, cap-table, and debt data-room package plus quality-of-earnings support."
    - "Run customer, supplier, and channel-partner reference calls with concentration and renewal focus."
    - "Review Tridge Pay and fulfillment compliance controls, sanctions screening, banking dependencies, and incident logs."
    - "Obtain full litigation dockets, contract templates, IP schedules, and insurance coverage from counsel."
    - "Reconcile all public KPI definitions against internal board metrics and management reporting."
