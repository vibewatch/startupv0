  "diligence_depth": "standard_diligence"
  "source_strategy":
    - "Public-internet research only using accessible company pages, public professional profiles, independent news, legal summaries, and search-result snippets where primary records were gated."
    - "Tridge-owned pages were used to verify product scope, operating narrative, and stated network metrics, but they were not treated as audited evidence for economics."
    - "Independent news was used to anchor round amounts, investors, and valuation history where possible."
    - "Accessible legal and trademark evidence was supplemented with clearly labeled lower-confidence snippet evidence when full records were blocked."
    - "No data room, management interviews, customer reference calls, supplier calls, private legal databases, or paid market datasets were used."
  "included_jurisdictions":
    - "South Korea"
    - "Hong Kong"
    - "United States"
    - "Global cross-border trade operations as described in public sources"
  "excluded_topics":
    - "Audited financial statements and quality-of-earnings review"
    - "Private cap table, shareholder rights, and debt documents"
    - "Customer and supplier references not disclosed publicly"
    - "Privileged legal/regulatory correspondence and full court dockets behind paywalls"
    - "Private HR, compensation, retention, and security incident records"
  "user_provided_materials": []
