executive_summary:
  overall_assessment: GetYourGuide appears eligible as a private Germany-based travel unicorn. Public evidence verifies a 2019 SoftBank-led $484M round above $1B valuation, a 2023 $194M equity/debt financing at nearly $2B, and active operations through company pages describing employees, offices, supply partners, apps, APIs, and 2025 product releases.
  investment_or_diligence_thesis: Proceed to second-stage diligence only with a heavy information-gap discount. The public case supports brand, supply, demand, financing, and product reality, but not audited financial quality, unit economics, cap-table economics, supplier safety, customer concentration, or legal/regulatory exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CNBC verifies 2019 and 2023 financing/valuation milestones.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-002
      summary: Company materials describe large supplier, affiliate, and connectivity networks.
      evidence_claim_ids:
        - EC-005
        - EC-007
    - founder_claim_id: FC-003
      summary: 2025 release describes 200M+ tickets, 12,000 cities, and AI/product features.
      evidence_claim_ids:
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials and unit economics are not public.
    - risk_id: R-002
      summary: Capital structure and RCF/debt terms are unknown.
    - risk_id: R-004
      summary: Competition from Viator, Klook, Civitatis, OTAs, and direct suppliers is intense.
  key_evidence_gaps:
    - Audited financials, monthly accounts, GMV/net revenue, margins, CAC/payback, cash, debt, burn, and runway.
    - Current cap table, liquidation preferences, option pool, investor rights, Series F terms, RCF terms, and covenants.
    - Supplier concentration, safety incidents, refunds, chargebacks, active supply, repeat booking, and customer cohorts.
    - Legal/IP verification, privacy/security audits, insurance policies, regulatory correspondence, and material contracts.
  recommended_next_steps:
    - Open confirmatory finance diligence before relying on nearly $2B valuation.
    - Run marketplace KPI diligence on GMV, take rate, active supply, repeat purchase, CAC, and cohorts.
    - Interview suppliers, partners, customers, and connectivity/affiliate counterparts.
    - Have counsel review consumer terms, supplier contracts, IP/litigation, privacy/security, insurance, and travel regulation.
