report_metadata:
  report_title: GetYourGuide Startup Diligence Report
  target_company: GetYourGuide
  website: https://www.getyourguide.com/
  known_aliases:
    - GetYourGuide AG
    - GetYourGuide Deutschland GmbH
  sector: Travel technology; tours, attractions, activities, and experiences marketplace
  geography: Germany-headquartered with global consumer and supplier marketplace
  company_stage: Private unicorn
  research_date: 2026-05-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Europe/Berlin
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source diligence report using startup diligence checklist and evidence-linked YAML schema.
    - Prioritized company pages, press releases, legal/privacy/security materials, public leadership pages, independent news, filings, and legal/IP lookups.
    - Research/access date 2026-05-17; company-published scale claims treated as requiring data-room corroboration.
  included_jurisdictions:
    - Germany
    - European Union
    - United States public litigation/IP search context
    - Global travel-experience markets
  excluded_topics:
    - Private data-room financials, cap table, debt agreements, board minutes, contracts, employee records, insurance, and audit materials were not available.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for GetYourGuide diligence report
      type: workflow_request
      date_received: 2026-05-17
      notes: No private materials supplied.
