report_metadata:
  report_title: InCred / InCred Finance Startup Diligence Report
  target_company: InCred Financial Services Limited
  website: https://www.incred.com/
  known_aliases:
    - InCred
    - InCred Finance
    - InCred Financial Services
    - InCred Financial Services Limited
    - InCred Holdings Limited
    - Formerly KKR India Financial Services Limited
  sector: Diversified NBFC, digital lending, consumer finance and education finance
  geography: India, with overseas-education borrower exposure
  company_stage: Private unicorn / IPO-track diversified NBFC
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: INR unless otherwise noted
  time_zone: Asia/Kolkata
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public web evidence only and the startup-diligence-research schema/checklist at standard depth.
    - Prioritized company pages, annual reports, investor relations, rating-agency rationales, RBI notifications, app stores, independent news and competitor pages.
    - Treated company/app-store marketing claims as claim-existence evidence unless corroborated by audited/rating/regulatory sources.
    - Mapped unavailable private materials explicitly to diligence gaps and follow-up requests rather than implying clearance.
  included_jurisdictions:
    - India
    - Public overseas education-loan exposure where relevant to borrower risk
  excluded_topics:
    - Private data room, management interviews, customer/partner calls, non-public loan tapes, contracts, legal counsel letters, paid litigation searches, tax records and regulator correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for InCred standard-depth public-source diligence report
      type: workflow_request
      date_received: 2026-05-24
      notes: No pitch deck, financial model, customer list, cap table or founder responses were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: InCred Financial Services Limited is an RBI-registered NBFC operating as the InCred Finance lending business.
    claim_source: Annual report / corporate details / app listing
    claim_date: 2025-03-31
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
      - I.A
      - VIII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
    contradiction_summary: null
    diligence_follow_up:
      - Obtain RBI certificate, current registration category, regulatory inspection correspondence and fit-and-proper confirmations.
  - founder_claim_id: FC-002
    claim_text: InCred offers personal loans, student/education loans, business/MSME loans and loans to financial institutions.
    claim_source: Company website
    claim_date: null
    mapped_chapter_ids:
      - II
    mapped_section_ids:
      - II.A
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-007
      - EC-010
    contradiction_summary: null
    diligence_follow_up:
      - Request product-level disbursement, AUM, NIM, CAC, delinquency and contribution-margin schedules.
  - founder_claim_id: FC-003
    claim_text: InCred personal loans are offered online up to ₹15 lakh with 15-minute disbursal and no collateral.
    claim_source: Personal-loan product page
    claim_date: 2026-05-21
    mapped_chapter_ids:
      - II
      - V
    mapped_section_ids:
      - II.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-008
    contradiction_summary: The page verifies the marketing claim but not actual median approval time, disbursal timing or effective APR/fee disclosure.
    diligence_follow_up:
      - Sample KFS disclosures and validate application-to-disbursal SLA, approval funnel, cancellation and complaint cohorts.
  - founder_claim_id: FC-004
    claim_text: InCred education loans offer no collateral up to ₹1.5 Cr, interest from 10.50% and a 90% student recommendation claim.
    claim_source: Education-loan product page
    claim_date: 2026-05-21
    mapped_chapter_ids:
      - II
      - III
    mapped_section_ids:
      - II.A
      - III.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-009
    contradiction_summary: Public page does not disclose sample size/methodology for recommendation claim or actual student-loan defaults.
    diligence_follow_up:
      - Request recommendation survey methodology, approval/rejection waterfall, country/course mix and vintage loss curves.
  - founder_claim_id: FC-005
    claim_text: InCred became a unicorn after a $60M Series D round at a $1.04B valuation.
    claim_source: Inc42 funding article
    claim_date: 2023-12-25
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
    contradiction_summary: null
    diligence_follow_up:
      - Request financing documents, cap table, liquidation preferences, valuation marks and secondary-transfer history.
  - founder_claim_id: FC-006
    claim_text: IFSL FY25 revenue from operations, PAT and AUM were INR 1,88,257.82 lakh, INR 37,216.97 lakh and INR 12,58,507.39 lakh respectively.
    claim_source: InCred Holdings FY25 annual report
    claim_date: 2025-03-31
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-002
    contradiction_summary: null
    diligence_follow_up:
      - Reconcile subsidiary schedules to audited statutory statements, MIS, cash-flow statement, ECL/provisioning and AUM definitions.
  - founder_claim_id: FC-007
    claim_text: The InCred app has substantial app-store reach and developer claims of 400,000+ borrowers and ₹18,000 Cr+ personal-loan disbursed.
    claim_source: Google Play / App Store listings
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-013
    contradiction_summary: App-store metadata corroborates downloads/reviews; borrower and disbursement claims are developer-provided and need ledger tie-out.
    diligence_follow_up:
      - Tie app installs, active borrowers, disbursals and repeat behavior to audited MIS and acquisition cohorts.
  - founder_claim_id: FC-008
    claim_text: InCred Group has 3,500+ employees, 150 branches and businesses spanning lending, capital/wealth/AMC and money distribution.
    claim_source: InCred Group about page
    claim_date: null
    mapped_chapter_ids:
      - VII
    mapped_section_ids:
      - VII.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-021
    contradiction_summary: The page is group-level; IFSL-only headcount/branch footprint and shared-service allocations are not public.
    diligence_follow_up:
      - Request entity-level HRIS export, branch list, org chart, attrition, compensation and shared-service cost allocations.
  - founder_claim_id: FC-009
    claim_text: InCred Holdings plans an IPO fresh issue of up to Rs.1,250 crore mainly to augment IFSL’s capital base.
    claim_source: Financial Express report summarizing updated DRHP
    claim_date: 2026-05-22
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-006
    contradiction_summary: Evidence is an independent news summary, not the primary filed DRHP in this review.
    diligence_follow_up:
      - Review SEBI/stock-exchange filing, use-of-proceeds schedule, regulatory approvals and post-money capital ratios.
executive_summary:
  overall_assessment: Track with high-priority credit, regulatory, partner/channel, funding and data-control diligence before relying on the unicorn valuation or IPO growth narrative.
  investment_or_diligence_thesis: "InCred shows credible public scale signals for an Indian diversified NBFC: FY25 IFSL AUM above Rs.12,500 crore, PAT above Rs.370 crore, AA-/Stable ratings, public multi-product distribution and a reported unicorn/IPO path. The underwriting question is not whether the business exists, but whether rapid personal/student-loan growth, partner/co-lending channels, digital-lending compliance and funding costs remain controlled as the book seasons."
  strongest_verified_claims:
    - founder_claim_id: FC-006
      summary: FY25 revenue, PAT and AUM are verified from the parent annual report.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-001
      summary: IFSL is publicly described as an RBI-registered NBFC and wholly owned subsidiary of InCred Holdings.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-005
      summary: The $60M Series D / $1.04B valuation is supported by independent news, though terms remain private.
      evidence_claim_ids:
        - EC-005
    - founder_claim_id: FC-002
      summary: The multi-product loan portfolio is publicly visible on company/rating-agency sources.
      evidence_claim_ids:
        - EC-003
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Personal-loan-heavy unsecured consumer credit can deteriorate quickly if macro/partner quality weakens.
    - risk_id: R-002
      summary: Rapid AUM growth creates limited-seasoning risk and may understate normalized credit costs.
    - risk_id: R-003
      summary: RBI digital-lending and consumer-credit frameworks create operationally detailed compliance requirements.
    - risk_id: R-004
      summary: Funding-cost, ratings and IPO execution risk can constrain growth or dilute valuation.
    - risk_id: R-005
      summary: Partner/co-lending concentration and economics are not public despite credit-quality signals.
  key_evidence_gaps:
    - Loan tape, product/channel profitability, cohort/vintage losses and ECL/provision bridge.
    - Cap table, financing/security terms, covenants, IPO filing package and post-issue capital plan.
    - Partner/co-lending/LSP contracts, FLDG/DLG exposure and partner-level delinquencies.
    - RBI correspondence, digital-lending compliance testing, grievance/ombudsman and collection-conduct evidence.
    - Technology/security/model-governance artifacts and vendor/subprocessor inventory.
    - IFSL-specific headcount, compensation, turnover and branch productivity.
  recommended_next_steps:
    - Run loan-tape and vintage analysis before relying on FY25 profitability.
    - Review RBI/NBFC compliance pack and digital-lending app/partner journeys end to end.
    - Request cap table, debt/ALM and IPO documents to test funding runway and dilution.
    - Diligence top partners/co-lenders and any partner-book delinquency or DLG/FLDG arrangements.
    - Perform technology/security/model-risk review tied to data collection and underwriting.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: "Public financial evidence is unusually strong for a private NBFC due to annual-report and rating-agency disclosures: IFSL reported FY25 AUM of about Rs.12,585 crore and PAT of Rs.372 crore, with ICRA reporting Rs.12,815 crore AUM by June 2025. The major hidden risks are rapid growth, unsecured personal-loan concentration, funding cost sensitivity and non-public cap-table/debt covenants."
    founder_claim_ids:
      - FC-005
      - FC-006
      - FC-009
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-016
      - EC-022
      - EC-024
    risk_ids:
      - R-001
      - R-002
      - R-004
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: FY25 subsidiary-level revenue, PAT and AUM are public in the InCred Holdings annual report, and rating reports add AUM, asset-quality and capital metrics. Full quarterly financials, cash flows, management reports, product/channel gross profit, AR aging and backlog are not public for a lending NBFC.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.A.F1
            finding: FY25 revenue, PAT and AUM are public and independently supplemented by ICRA AUM/mix metrics.
            evidence_claim_ids:
              - EC-002
              - EC-003
            risk_ids:
              - R-001
              - R-002
          - finding_id: I.A.F2
            finding: Gross stage 3 rose to 2.3% as of June 2025 per ICRA, requiring vintage-level credit review.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Quarterly P&L/cash flow and provision movements are not public; growth can mask seasoning risk.
        evidence_gaps:
          - Full three-year audited IFSL statements, quarterly MIS, loan tape, ECL/provision bridge, AR/collections aging and product/channel economics.
        follow_up_questions:
          - Provide audited IFSL financial statements for FY23-FY25 and quarterly FY26 MIS with AUM reconciliation by owned/managed/co-lending book.
        table_ids:
          - T-001
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No management forecast or three-year projection model is public. Rating agencies expect moderation in AUM growth and RBI risk-weight changes create external financing and capital assumptions to stress test.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B.F1
            finding: ICRA expects AUM growth to moderate to about 20% in the near term and notes student-loan disbursement uncertainty.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-002
              - R-006
          - finding_id: I.B.F2
            finding: RBI consumer-credit measures can influence bank/NBFC capital and funding assumptions.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-003
              - R-004
        hidden_risks:
          - Projection risk is high because growth assumptions interact with funding cost, risk weights and credit losses.
        evidence_gaps:
          - No forecast model, growth-driver bridge, capex/opex plan, ALM assumptions or downside cases public.
        follow_up_questions:
          - Provide base/upside/downside projections by product with credit-cost, funding-cost and capital-ratio sensitivities.
        table_ids:
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-016
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: "Headline financing signals are visible: a $60M Series D at $1.04B valuation, strong credit ratings, public debt instruments and a reported IPO fresh issue. Shares outstanding, ownership percentages, ESOPs, preference terms, warrants, covenants and off-balance-sheet liabilities are not public."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C.F1
            finding: Series D/unicorn valuation and reported IPO fresh issue are public but not enough to underwrite security terms.
            evidence_claim_ids:
              - EC-005
              - EC-006
            risk_ids:
              - R-004
          - finding_id: I.C.F2
            finding: Annual report identifies subsidiaries and a ceased subsidiary, making related-party review necessary.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-010
        hidden_risks:
          - Valuation may not reflect liquidation preferences, debt covenants or current public-market conditions.
        evidence_gaps:
          - Cap table, shareholder agreements, ESOP/warrants, debt covenant package, off-balance-sheet commitments and IPO filing package.
        follow_up_questions:
          - Provide cap table, financing docs, debt schedule, debenture terms, undrawn facilities, covenants and DRHP/SEBI correspondence.
        table_ids:
          - T-002
          - T-003
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-022
          - EC-024
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Investor-relations pages expose categories such as financial results, annual reports, ratings and debenture trustee documents. Tax positions, accounting policies beyond annual-report disclosure, financing-basis details and full history are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D.F1
            finding: Investor-relations disclosure breadth supports public-debt transparency.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-004
          - finding_id: I.D.F2
            finding: Rating reports provide debt/liquidity indicators but not full covenant or tax detail.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-004
        hidden_risks:
          - Debt-market transparency can coexist with undisclosed covenant, tax and accounting-policy complexity.
        evidence_gaps:
          - Tax filings, GST/TDS positions, direct-tax disputes, revenue/EIR accounting policy memo and financing history support.
        follow_up_questions:
          - Provide tax position memo, statutory auditor management letters, accounting policy papers and full financing history.
        table_ids:
          - T-003
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-004
          - EC-024
  - chapter_id: II
    title: Products
    chapter_summary: InCred has publicly visible products across personal loans, education loans, MSME/anchor/school financing, LAP/asset-backed lending and loans to financial institutions. Public product pages verify marketing claims and rates, but not unit economics, cost structure, approval funnels or product-level profitability.
    founder_claim_ids:
      - FC-002
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-010
      - EC-011
    risk_ids:
      - R-001
      - R-006
      - R-007
      - R-012
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Company and rating-agency sources identify multiple products and current AUM mix. Product existence and public pricing are verified; market share, detailed growth by product, cost structure, profitability, roadmap timing and technology-change impacts are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A.F1
            finding: Personal loans and student loans are the largest disclosed product categories in June 2025 AUM mix.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-001
              - R-006
          - finding_id: II.A.F2
            finding: Public rate bands are broad and risk-based, including personal-loan rates up to 36% p.a.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-007
          - finding_id: II.A.F3
            finding: FI lending and secured/product diversification are public but counterparty/collateral economics are not.
            evidence_claim_ids:
              - EC-010
              - EC-011
            risk_ids:
              - R-005
        hidden_risks:
          - Unsecured personal loans and long-tenure education/LAP products can deteriorate after rapid growth; high APR bands can create conduct risk.
        evidence_gaps:
          - Product P&L, approval rates, CAC, contribution margin, NIM, fee income, collections cost, loss curves and roadmap investment.
        follow_up_questions:
          - Provide product-level MIS and underwriting policies including approval, pricing, reject, delinquency, profitability and roadmap data.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
          - F-004
        evidence_claim_ids:
          - EC-003
          - EC-007
          - EC-008
          - EC-009
          - EC-010
          - EC-011
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public customer evidence is mostly borrower/application signals, app-store reach, product mix and partner/channel names. Top customers/borrowers, customer revenue, partner concentration, severed relationships and supplier spend are not publicly verifiable.
    founder_claim_ids:
      - FC-004
      - FC-007
    evidence_claim_ids:
      - EC-003
      - EC-009
      - EC-012
      - EC-013
      - EC-017
      - EC-027
    risk_ids:
      - R-005
      - R-006
      - R-007
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: For a lending NBFC, customer diligence should focus on borrower cohorts by application rather than named enterprise logos. Public sources show retail, student, MSME/FI and app-scale signals, but top borrowers/customers are not public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.A.F1
            finding: ICRA mix gives application-level AUM allocation; app stores give consumer reach signals.
            evidence_claim_ids:
              - EC-003
              - EC-013
            risk_ids:
              - R-001
              - R-007
          - finding_id: III.A.F2
            finding: Student-loan marketing and mix show a meaningful high-ticket borrower segment.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-006
        hidden_risks:
          - Top-borrower or partner concentration could be material but hidden in public sources.
        evidence_gaps:
          - Top 15 borrowers/partners for FY24/FY25/YTD, application/product ownership, purchase/disbursement timing and concentration by state/employer/university.
        follow_up_questions:
          - Provide top borrower/partner exposure schedule by AUM, revenue, delinquency, profitability and collateral/guarantor status.
        table_ids:
          - T-006
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-003
          - EC-009
          - EC-013
          - EC-027
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Partnership names and co-lending/managed-book indicators are public. Contract terms, exclusivity, volume concentration, partner-quality controls, DLG/FLDG exposure and revenue contribution are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B.F1
            finding: Named partners and public-sector bank co-lending arrangements are public evidence of strategic distribution/funding relationships.
            evidence_claim_ids:
              - EC-012
              - EC-017
            risk_ids:
              - R-005
          - finding_id: III.B.F2
            finding: CRISIL flagged higher delinquencies in the partner personal-loan book due to one key account.
            evidence_claim_ids:
              - EC-017
            risk_ids:
              - R-005
              - R-001
        hidden_risks:
          - Partner performance can be a hidden driver of credit cost and customer complaints.
        evidence_gaps:
          - Executed agreements, partner revenue/AUM concentration, FLDG/DLG, co-lending economics, partner-level delinquency and termination rights.
        follow_up_questions:
          - Provide top 20 partner schedule and contracts with channel cohorts and loss-sharing terms.
        table_ids:
          - T-007
        figure_ids:
          - F-007
        evidence_claim_ids:
          - EC-012
          - EC-017
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No public customer revenue concentration data was found. For lending, revenue concentration should be reviewed by borrower group, product, partner, geography, employer/university and funding counterparty.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C.F1
            finding: Public sources do not disclose any customer accounting for 5%+ of revenue.
            evidence_claim_ids:
              - EC-027
            risk_ids:
              - R-005
        hidden_risks:
          - Undisclosed concentration could hide borrower, partner, funding or geography exposure.
        evidence_gaps:
          - Customer/borrower revenue schedule, interest income by product, top partner contribution and geographic concentration.
        follow_up_questions:
          - Provide revenue and AUM concentration reports by borrower/partner/product/geography for FY24-FY25 and YTD.
        table_ids:
          - T-006
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-027
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public severed-relationship schedule was found. InCred Prime ceased being a subsidiary, but that is group structure rather than a customer/partner severance finding.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D.F1
            finding: Annual report discloses subsidiary perimeter change; no customer/partner severance list is public.
            evidence_claim_ids:
              - EC-022
              - EC-027
            risk_ids:
              - R-010
              - R-005
        hidden_risks:
          - Partner/customer exits can signal credit, compliance, economics or reputation issues.
        evidence_gaps:
          - List of terminated customers, partners, suppliers, co-lenders, recovery agencies and reasons for termination.
        follow_up_questions:
          - Provide terminated or materially modified relationships since FY24, with economics and dispute status.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-022
          - EC-027
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Top suppliers are not public. Likely important suppliers include credit bureaus, app/cloud vendors, payment/collection partners, recovery agencies, LSPs and data providers, but names/spend are unavailable.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E.F1
            finding: Privacy policy confirms CIC reporting and data dependencies, but supplier spend and agreements are not public.
            evidence_claim_ids:
              - EC-014
              - EC-025
            risk_ids:
              - R-012
