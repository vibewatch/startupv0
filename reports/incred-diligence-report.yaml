risk_register:
  - risk_id: R-001
    risk_title: Unsecured consumer-credit asset quality shock
    risk_category: financial
    severity: high
    likelihood: high
    description: Personal loans represent roughly half of AUM and unsecured retail loans are exposed to macro, employment, fraud and affordability shocks; rates can reach 36% p.a.
    impacted_chapter_ids:
      - I
      - II
      - III
    impacted_section_ids:
      - I.A
      - II.A
      - III.B
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Request loan tape, vintage curves, bureau-score distribution, employment/geography mix, write-offs, recoveries and stress-test results.
  - risk_id: R-002
    risk_title: Rapid growth with limited seasoning
    risk_category: financial
    severity: high
    likelihood: high
    description: AUM expanded quickly through FY24-FY26, while rating agencies note limited portfolio seasoning in longer-tenure and fast-growing products.
    impacted_chapter_ids:
      - I
      - II
    impacted_section_ids:
      - I.A
      - I.B
      - II.A
    evidence_claim_ids: *a13
    mitigation_or_diligence_request: Request cohort-level origination, delinquency, ECL, prepayment and vintage profitability by product and channel.
  - risk_id: R-003
    risk_title: Digital lending and NBFC regulatory compliance
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: RBI digital-lending rules and consumer-credit risk-weight measures raise compliance, capital and funding constraints for digital NBFCs.
    impacted_chapter_ids:
      - I
      - VI
      - VIII
    impacted_section_ids:
      - I.B
      - VI.A
      - VIII.G
    evidence_claim_ids: *a14
    mitigation_or_diligence_request: Map every product/partner journey to RBI Digital Lending Directions, KFS/APR, consent, data retention, DLA directory, LSP and grievance evidence.
  - risk_id: R-004
    risk_title: Funding-market and IPO execution risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: Growth depends on debt capital, ratings, bank lines, securitisation/co-lending and potential IPO proceeds; risk-weight changes and market conditions may raise cost of funds.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a15
    mitigation_or_diligence_request: Review ALM, debt maturities, covenants, undrawn facilities, debenture terms, capital plan, IPO status and sensitivity to cost of funds.
  - risk_id: R-005
    risk_title: Partner/channel concentration and co-lending risk
    risk_category: customer
    severity: medium
    likelihood: high
    description: Partnerships and managed/co-lending books are visible but concentration, FLDG, partner-book delinquencies and contract economics are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - III.C
      - V.C
    evidence_claim_ids: *a16
    mitigation_or_diligence_request: Request top partner list, partner-sourced AUM, delinquency by partner, FLDG/DLG terms, co-lending agreements and termination rights.
  - risk_id: R-006
    risk_title: Overseas education-loan macro/geography risk
    risk_category: market
    severity: medium
    likelihood: medium
    description: Education loans are high-ticket, long-tenure and exposed to visa, destination-country, university/employment, forex and co-obligor risks.
    impacted_chapter_ids:
      - II
      - III
      - IV
    impacted_section_ids:
      - II.A
      - III.A
      - IV.A
    evidence_claim_ids: *a17
    mitigation_or_diligence_request: Request destination/course mix, guarantor structure, moratorium terms, post-study employment outcomes, forex sensitivity and default data.
  - risk_id: R-007
    risk_title: Consumer data privacy and reputational risk
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: Digital app data collection, CIC reporting, high APR bands and public review channels create consumer-protection and reputation exposure.
    impacted_chapter_ids:
      - II
      - V
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - V.A
      - VI.A
      - VIII.G
    evidence_claim_ids: *a18
    mitigation_or_diligence_request: Review consent UX, app permissions, grievance metrics, collection practices, data-sharing inventory and recovery-agent controls.
  - risk_id: R-008
    risk_title: Incomplete public litigation and contingent-liability picture
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Only limited public legal records were accessible; no counsel letters, litigation schedule, regulatory show-cause notices or contingent-liability roll-forward were reviewed.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.E
    evidence_claim_ids: *a19
    mitigation_or_diligence_request: Request counsel letters, litigation docket, NCLT/civil/consumer forum searches, regulatory correspondence and insurance policies.
  - risk_id: R-009
    risk_title: Competitive pricing and distribution pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Digital lenders, specialist education financiers and large NBFCs market comparable speed, ticket sizes and rates, pressuring CAC, yield and risk selection.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a20
    mitigation_or_diligence_request: Benchmark approval rates, CAC/payback, NIM, borrower repeat rates and adverse-selection indicators against competitors.
  - risk_id: R-010
    risk_title: Group structure, related-party and ownership opacity
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Group entities, former-name history, step-down subsidiaries and a ceased subsidiary require cap table, related-party and cost-allocation diligence.
    impacted_chapter_ids:
      - I
      - VII
      - VIII
    impacted_section_ids:
      - I.C
      - VII.A
      - VIII.F
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Request cap table, shareholder agreements, related-party contracts, transfer-pricing/cost-allocation policy and board approvals.
  - risk_id: R-011
    risk_title: People, compensation and retention not public
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Leadership roster and group headcount are public, but compensation, incentive stock plans, turnover, branch staffing and key-person retention are not.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.D
      - VII.E
      - VII.G
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Request employment agreements, ESOP plans, compensation bands, attrition by function/location and succession plans.
  - risk_id: R-012
    risk_title: Technology/security/model governance opacity
    risk_category: technical
    severity: high
    likelihood: unknown
    description: Digital credit underwriting relies on app, bureau, device and partner data, but architecture, security audits, model validation and incident history are not public.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a23
    mitigation_or_diligence_request: Request system architecture, model governance, VAPT/SOC/ISO reports, incident logs, data lineage and vendor/subprocessor inventory.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Full audited IFSL standalone statements, cash flows, product/channel economics and provision bridge for FY23-FY25 plus FY26 YTD.
    why_it_matters: Needed to confirm profitability quality, cash generation and credit-cost normalization.
    suggested_source_or_request: Auditor-issued standalone financials, MIS and loan-tape reconciliations.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, shareholder agreements, ESOP/warrants and security terms for Series D and IPO planning.
    why_it_matters: Headline unicorn valuation may not reflect dilution, preferences or current economics.
    suggested_source_or_request: Company secretary/cFO cap table and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.B
    missing_information: Partner/co-lending contracts, partner-by-partner AUM and delinquency.
    why_it_matters: Partner book issues were explicitly flagged by CRISIL and could drive losses.
    suggested_source_or_request: Executed contracts, channel MIS and FLDG/DLG schedules.
    priority: high
  - gap_id: G-004
    chapter_id: VI
    section_id: VI.A
    missing_information: Security, architecture, model-governance and data-processing evidence.
    why_it_matters: Digital lending relies on sensitive consumer data, models and partner/LSP flows.
    suggested_source_or_request: Architecture deck, SOC/VAPT/ISO reports, model inventory and DPIA/vendor register.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: RBI inspection/correspondence, digital-lending compliance testing and grievance/ombudsman data.
    why_it_matters: Regulatory non-compliance can constrain NBFC operations, app journeys and growth.
    suggested_source_or_request: Compliance officer certification and regulatory correspondence package.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: IFSL-only headcount, attrition, compensation and branch productivity.
    why_it_matters: Group-level 3,500+ employee/150 branch claim cannot be mapped to IFSL cost/control capacity.
    suggested_source_or_request: HRIS export, branch list, compensation and attrition dashboard.
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts, IP, insurance and supplier schedules.
    why_it_matters: Hidden obligations and uninsured exposures can affect valuation and IPO readiness.
    suggested_source_or_request: Legal data-room index and counsel/broker certifications.
    priority: high
  - gap_id: G-008
    chapter_id: IV
    section_id: IV.A
    missing_information: Market share, CAC/payback and competitor win/loss data by product.
    why_it_matters: Public competitor pages show aggressive alternatives; economics determine defensibility.
    suggested_source_or_request: Management market study and channel economics dashboard.
    priority: medium
