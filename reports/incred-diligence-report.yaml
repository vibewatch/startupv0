  - figure_id: F-011
    title: Risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Diligence risk heatmap based on public evidence and gaps.
    purpose: Prioritize follow-up requests.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Unsecured consumer-credit asset quality shock
          severity: high
          likelihood: high
          rationale: Personal loans represent roughly half of AUM and unsecured retail loans are exposed to macro, employment, fraud and affordability shocks; rates can reach 36% p.a.
          evidence_claim_ids: &a12
            - EC-003
            - EC-004
            - EC-011
            - EC-016
            - EC-017
          source_ids: &a3
            - SRC-015
        - risk_id: R-002
          label: Rapid growth with limited seasoning
          severity: high
          likelihood: high
          rationale: AUM expanded quickly through FY24-FY26, while rating agencies note limited portfolio seasoning in longer-tenure and fast-growing products.
          evidence_claim_ids: &a13
            - EC-002
            - EC-003
            - EC-004
          source_ids: &a2
            - SRC-013
        - risk_id: R-003
          label: Digital lending and NBFC regulatory compliance
          severity: high
          likelihood: medium
          rationale: RBI digital-lending rules and consumer-credit risk-weight measures raise compliance, capital and funding constraints for digital NBFCs.
          evidence_claim_ids: &a14
            - EC-014
            - EC-015
            - EC-016
          source_ids: &a1
