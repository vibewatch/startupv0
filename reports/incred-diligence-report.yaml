        evidence_gaps:
          - Policy schedule, limits, exclusions, claims history, broker letter and renewal status.
        follow_up_questions:
          - Provide full insurance schedule and claims history.
        table_ids:
          - T-017
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-025
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material contracts are not public beyond named partners, debenture trustee details and investor-relations document categories. Co-lending, partner, funding, servicing, LSP, vendor and related-party contracts are core gaps.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: VIII.F.F1
            finding: Partner names are public but executed contracts and economics are not.
            evidence_claim_ids:
              - EC-012
              - EC-025
            risk_ids:
              - R-005
              - R-010
          - finding_id: VIII.F.F2
            finding: Related-party and step-down-subsidiary contracts need review given group structure.
            evidence_claim_ids:
              - EC-022
              - EC-025
            risk_ids:
              - R-010
        hidden_risks:
          - Contract terms can determine credit losses, data compliance, termination rights and economics.
        evidence_gaps:
          - Top contracts by value/risk, co-lending agreements, LSP/partner contracts, funding agreements, vendor agreements and related-party services.
        follow_up_questions:
          - Provide material contract index and copies with summary of term, economics, termination, data, DLG/FLDG and change-of-control terms.
        table_ids:
          - T-017
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-012
          - EC-022
          - EC-025
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No company-specific regulatory agency problem or penalty was verified publicly. However, RBI digital-lending and consumer-credit frameworks are directly relevant and should be tested for compliance.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: VIII.G.F1
            finding: RBI Digital Lending Directions 2025 and risk-weight measures materially affect InCred’s model.
            evidence_claim_ids:
              - EC-015
              - EC-016
            risk_ids:
              - R-003
              - R-004
          - finding_id: VIII.G.F2
            finding: NBFC registration is publicly supported by annual report, but inspection/correspondence status is private.
            evidence_claim_ids:
              - EC-001
              - EC-025
            risk_ids:
              - R-003
              - R-008
        hidden_risks:
          - Regulatory findings may be confidential until disclosed, and digital-lending compliance is operationally detailed.
        evidence_gaps:
          - RBI inspection reports, show-cause notices, penalties, grievance reports, ombudsman data, DLA directory status and remediation trackers.
        follow_up_questions:
          - Provide regulatory correspondence, compliance testing, RBI inspection/penalty history and digital-lending control evidence.
        table_ids:
          - T-016
          - T-017
        figure_ids:
          - F-011
          - F-012
        evidence_claim_ids:
          - EC-001
          - EC-015
          - EC-016
