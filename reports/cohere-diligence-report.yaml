executive_summary:
  overall_assessment: Cohere is publicly supportable as an active private enterprise-AI unicorn with a 2024 USD 500M Series D at a reported USD 5.5B valuation, named enterprise customers and a broad public product suite. The key diligence posture is high proof of financing/product narrative and low public proof of audited financial quality, customer concentration, cloud/GPU cost exposure, security evidence and current cap-table economics.
  investment_or_diligence_thesis: The investment case depends on whether Cohere can convert enterprise private-deployment positioning into durable recurring revenue at defensible gross margins in a crowded foundation-model market.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Cohere is a still-private startup unicorn and eligible target for this report.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Cohere has a publicly evidenced core product/platform narrative.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Cohere has public customer, adoption or partner traction signals.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-003
      summary: Valuation may outrun verified revenue scale
    - risk_id: R-002
      summary: AI infrastructure and GPU cost pressure
    - risk_id: R-004
      summary: Intense enterprise AI competition
    - risk_id: R-001
      summary: Opaque financial statements and unit economics
    - risk_id: R-006
      summary: Product defensibility depends on model quality and cost
  key_evidence_gaps:
    - Audited/management financials, KPI definitions and cash runway
    - Current cap table, preferences, debt, investor rights and valuation marks
    - Customer concentration, usage, retention/churn and contract economics
    - Supplier/infrastructure/manufacturing dependencies and cost commitments
    - Product roadmap, technical/clinical evidence, quality/security and legal/IP schedules
  recommended_next_steps:
    - Open finance and cap-table data rooms before relying on public valuation.
    - Reconcile public customer/adoption claims to revenue, usage, margin and retention data.
    - Review product roadmap, quality/security controls and key technical or regulatory risks.
    - Run customer/reference and win/loss diligence in the most material market segments.
    - Have counsel review litigation, regulatory, IP, insurance and material contracts.
