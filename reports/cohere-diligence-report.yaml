report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: Cohere"
  target_company: Cohere
  website: https://cohere.com/
  known_aliases:
    - Cohere Inc.
    - Cohere AI
    - Cohere For AI
  sector: Enterprise artificial intelligence / large language models
  geography: Canada headquartered; global enterprise customers
  company_stage: Private unicorn / Series D
  research_date: 2026-05-22
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: America/Toronto
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only
    - Prioritized public unicorn lists, primary company pages, official registry or regulator sources and reputable news/trade publications
    - Facts not available in public sources are explicitly marked not_publicly_verifiable or unverified
    - All sources accessed_date set to 2026-05-22
  included_jurisdictions:
    - Canada
    - United States
    - United Kingdom
    - European Union / global customer deployments
  excluded_topics:
    - Non-public data room materials
    - Customer calls and supplier calls
    - Paid database exports
    - Personal data beyond public professional/company profiles
    - Legal advice or counsel-grade docket searches
  user_provided_materials: []
