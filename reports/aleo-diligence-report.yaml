risk_register:
  - risk_id: R-001
    risk_title: No public financial statements or revenue quality
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Funding and valuation are public, but audited financials, revenue, margins, cash, burn, debt and tax data are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Require audited financials, management accounts, revenue bridge and runway analysis.
  - risk_id: R-002
    risk_title: Stale 2022 valuation anchor
    risk_category: financing
    severity: high
    likelihood: medium
    description: Latest public valuation found is the 2022 $1.45B financing/unicorn valuation.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request latest 409A, investor marks, secondaries and fundraising materials.
  - risk_id: R-003
    risk_title: Token/equity economics and treasury opacity
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Token utility and market page are public, but allocation, treasury, lockups, governance and company revenue capture are not.
    impacted_chapter_ids:
      - I
      - V
      - VIII
    impacted_section_ids:
      - I.C
      - V.A
      - VIII.G
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Request token cap table, treasury wallets, exchange/market-maker agreements and legal memos.
  - risk_id: R-004
    risk_title: ZK Layer 1 technical/security execution risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Aleo relies on complex ZK cryptography, validators/provers/stakers and open-source core repos.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
      - VIII.D
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Request audits, incident logs, uptime, benchmarks, SBOM and security roadmap.
  - risk_id: R-005
    risk_title: Reported KYC privacy incident
    risk_category: reputational
    severity: high
    likelihood: medium
    description: A 2024 report alleged users received others’ KYC documents, an acute issue for a privacy-focused company.
    impacted_chapter_ids:
      - VIII
      - V
      - III
    impacted_section_ids:
      - VIII.G
      - V.A
      - III.E
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Request incident report, affected-user count, notices, remediation, vendor RCA and insurance notices.
  - risk_id: R-006
    risk_title: Privacy/stablecoin/token regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: unknown
    description: Private/compliant payments, stablecoins, tokens, KYC/AML and governance raise legal/regulatory questions not resolved publicly.
    impacted_chapter_ids:
      - II
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - V.A
      - VIII.G
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Obtain counsel memos on securities, stablecoins, AML/KYC/OFAC, money transmission and privacy.
  - risk_id: R-007
    risk_title: Ecosystem traction may not equal revenue
    risk_category: customer
    severity: medium
    likelihood: high
    description: Public projects, pilots and grants do not disclose paid revenue, retention or customer concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.C
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Request customer schedule, contracts, cohorts, grant ROI and references.
  - risk_id: R-008
    risk_title: Crowded ZK/privacy competition
    risk_category: market
    severity: medium
    likelihood: high
    description: Aleo competes with Aztec, Mina, Zcash, Starknet, ZKsync and others for developers, liquidity and enterprise use cases.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Benchmark technology, adoption, liquidity, fees, security and GTM win/loss.
  - risk_id: R-009
    risk_title: Open-source license/IP governance complexity
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Core repos use GPL-3.0 and Apache-2.0 licenses; contributor/IP assignments and license compliance need review.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.D
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Request IP assignments, SBOM, open-source scan and trademark/patent schedule.
  - risk_id: R-010
    risk_title: Current org, hiring and turnover are opaque
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Historical leadership references exist, but current org chart, headcount, compensation and turnover are not public; careers page showed no open roles.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.G
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Request org chart, HRIS, payroll, compensation, option/token grants and attrition.
  - risk_id: R-011
    risk_title: Stablecoin, KYC and network supplier dependencies
    risk_category: operational
    severity: medium
    likelihood: unknown
    description: USDCx references Circle xReserve, the KYC incident references a third-party KYC protocol, and network operation depends on validators/provers/stakers.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.B
      - III.E
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a43
    mitigation_or_diligence_request: Request vendor contracts, reserve/custody terms, DPAs, SLAs, validator/prover concentration and BCP.
