  source_strategy:
    - Used startup-diligence-research skill at standard depth and public evidence only.
    - Prioritized CB Insights, company-owned pages, financing announcements, investor articles, GitHub, token-market pages, competitor pages and public news.
    - Marked non-public financials, cap table, customers, contracts, legal matters, insurance and HR data as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - California / San Francisco public metadata
    - Global blockchain ecosystem
    - United States federal trademark/regulatory context
  excluded_topics:
    - Private data-room records
    - Management interviews
    - Customer reference calls
    - Counsel-certified legal searches
    - Investment, legal or tax advice
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided Aleo unicorn candidate row
      type: workflow_request
      date_received: 2026-05-27
      notes: slug=aleo, company=Aleo, valuation=$1.45B, country=United States, sector=Enterprise Tech, source=CB Insights Global Unicorn Club.
