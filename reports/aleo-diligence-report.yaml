executive_summary:
  overall_assessment: Aleo is publicly verifiable as a CB Insights unicorn with a $1.45B valuation and a $200M Series B announced in February 2022. Public evidence also supports a credible zero-knowledge/privacy blockchain footprint with active repositories and stablecoin/payment positioning. However, standard investment diligence remains incomplete because financials, cap table/token treasury, customer revenue, contracts, legal/regulatory opinions, insurance, current org/headcount and incident remediation are not public.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The thesis depends on proving Aleo can convert public ZK/privacy technology and ecosystem visibility into durable, compliant revenue while managing token/stablecoin regulation, privacy/security execution and a crowded ZK market.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Aleo at $1.45B valuation in the Global Unicorn Club.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Business Wire announced a $200M Series B at a $1.45B valuation.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Aleo has public ZK product and R&D assets including Leo, snarkOS and snarkVM.
      evidence_claim_ids:
        - EC-005
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, revenue and runway are not public.
    - risk_id: R-003
      summary: Token/equity economics and treasury control are opaque.
    - risk_id: R-005
      summary: Reported KYC document exposure creates privacy/reputation risk.
    - risk_id: R-006
      summary: Privacy, stablecoin and token regulatory posture requires counsel-led diligence.
  key_evidence_gaps:
    - Audited financials, revenue/ARR, margin, cash, burn and tax positions.
    - Equity/token cap table, investor rights, treasury, lockups and valuation marks.
    - Top customers, paid revenue, concentration, churn, contracts and references.
    - Security audits, stablecoin reserve attestations, compliance policies and KYC incident remediation.
    - Current org chart, headcount, compensation, turnover, IP, contracts and insurance.
  recommended_next_steps:
    - Do not underwrite the $1.45B valuation without current financials, cap table/token treasury and valuation marks.
    - Run finance, legal/regulatory, security/architecture and customer diligence in parallel.
    - Validate ecosystem metrics against signed contracts, active usage, paid revenue and independent references.
    - Obtain counsel opinions for token, stablecoin, privacy, AML/KYC/OFAC, money transmission and data-security matters.
