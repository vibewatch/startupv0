executive_summary:
  overall_assessment: Track with high-priority private diligence. Public evidence supports an active private unicorn with meaningful enterprise traction and a broad identity-security product surface, but audited financials, current ARR, burn, customer concentration, cap-table terms, incident history, and contract economics remain unavailable.
  investment_or_diligence_thesis: "1Password has a credible late-stage enterprise-security profile: public evidence supports a $6.8B valuation signal, a large business customer base, recognizable enterprise logos, 1,400+ employees, and a product expansion from password management into Extended Access Management. The investment case depends on validating ARR quality, net retention, security/compliance evidence, and competitive positioning against IAM, PAM, endpoint, and browser-security suites."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: 1Password is a private unicorn valued around $6.8B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: 1Password serves a large business customer base and recognizable enterprise logos.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: 1Password has expanded beyond password management into Extended Access Management for every identity, device, and application.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Private financials and cap table are not public
    - risk_id: R-002
      summary: Enterprise security buyers demand proof of controls and incident response
    - risk_id: R-003
      summary: Identity-security competition may pressure pricing and CAC
  key_evidence_gaps:
    - Audited financial statements, management accounts, cash, burn, runway, revenue/GMV/ARR bridge and gross margin.
    - Fully diluted cap table, financing documents, investor rights, debt, warrants, SAFEs/notes, option pool and liquidation waterfall.
    - Top customer/seller/merchant revenue concentration, cohort retention, churn, references and severed relationships.
    - Material customer, partner, supplier, employment, IP, privacy/security, insurance and financing contracts.
    - Counsel-led litigation, regulatory, IP, employment, privacy/security and insurance diligence.
  recommended_next_steps:
    - Open financial/cap-table data room before underwriting valuation.
    - Run customer/seller/merchant and partner calls to validate retention, concentration and unit economics.
    - Commission legal/regulatory/IP/security diligence appropriate to the sector and jurisdictions.
    - Review management org chart, headcount by function/location, attrition, compensation and succession plan.
