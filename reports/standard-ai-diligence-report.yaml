    diligence_follow_up:
      - Request counsel letters, litigation docket search, insurance schedule, customer DPAs, privacy assessments, patent assignments, open-source scan and material contracts.
executive_summary:
  overall_assessment: "Standard AI qualifies for continued public-source private-unicorn diligence: CB Insights lists a $1B Standard AI unicorn row and active company materials show a current VISION retail-analytics platform. Investment underwriting remains blocked by private financial, customer, cap-table, contract, legal and HR data; the 2024 pivot from autonomous checkout to Vision Analytics is the central execution risk."
  investment_or_diligence_thesis: A diligence thesis would require proving that Standard AI can convert its computer-vision IP and existing-camera VISION platform into repeatable, privacy-compliant, profitable enterprise retail/brand deployments after the pivot. Public evidence supports category relevance and product activity but not revenue quality, unit economics, customer concentration, retention or current fair value.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Standard AI as a $1B Consumer & Retail unicorn headquartered in San Francisco.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Standard AI publicly markets VISION as an existing-camera retail intelligence platform with edge/privacy-safe positioning.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-006
      summary: Standard AI publicly discloses a patent-marking page and privacy/terms materials that frame legal/IP diligence topics.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, revenue quality, burn, cash/debt and forecast support are not public.
    - risk_id: R-003
      summary: The 2024 pivot from autonomous checkout to Vision Analytics brought leadership changes and reported layoffs.
    - risk_id: R-004
      summary: Customer proof is limited publicly to an unnamed major Midwest retailer pilot and generic relationship signals.
    - risk_id: R-005
      summary: Camera/video/proximity data create privacy and regulatory exposure despite privacy-safe/no-facial-recognition positioning.
  key_evidence_gaps:
    - Audited financial statements, management accounts, ARR/bookings, gross margin, burn, cash, debt, backlog, AR aging and revenue recognition.
    - Fully diluted cap table, financing documents, liquidation preferences, option pool, debt/notes, 409A and current valuation support.
    - Top customers, customer revenue concentration, contracts, renewal/churn/NRR, implementation status, customer references and pipeline.
    - Product accuracy, deployment economics, uptime, security reports, privacy assessments, incident history and model-governance artifacts.
    - Org chart, headcount, turnover, compensation/equity plans, layoff details, retention plan and key employment agreements.
    - Counsel letters, litigation/regulatory searches, insurance schedule, IP assignments/FTO, customer DPAs/MSAs and material contracts.
  recommended_next_steps:
    - Run confirmatory financial and cap-table diligence before relying on any valuation signal.
    - "Prioritize post-pivot customer validation: pilot conversion, paid deployments, retention, churn, ROI and references."
    - Conduct technical, security and privacy diligence on edge/cloud architecture, video/proximity data handling and no-facial-recognition claims.
    - Review leadership transition, layoffs, org capacity and retention incentives.
    - Have counsel review privacy, IP/FTO, material contracts, insurance, acquisition obligations and regulatory exposure.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Standard AI has credible public unicorn evidence, but public sources do not disclose financial statements, revenue quality, cap table, cash, debt, backlog, AR aging, customer concentration or forecast assumptions. The latest independently accessible valuation evidence is CB Insights at $1B; a company press-page $1.5B headline is lower confidence because the original article was inaccessible.
    founder_claim_ids:
      - FC-001
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-013
      - EC-016
      - EC-017
      - EC-020
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or management financial statements, product/channel/geography gross profit, backlog or AR aging were located in public sources.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public evidence supports valuation and product claims but not revenue, margin, burn, cash, debt or working-capital metrics.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-001
        hidden_risks:
          - A high-valuation private company can hide weak unit economics, short runway or customer concentration when only public marketing/database sources are available.
        evidence_gaps:
          - Audited statements, management accounts, revenue bridge, cash/debt schedule, backlog and AR aging were unavailable.
        follow_up_questions:
          - Provide FY2023-FY2026 YTD audited/management financial statements, ARR/bookings bridge, gross margin by product, backlog and AR aging.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-016
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources disclose growth narratives around VISION, pilots and camera reuse, but no financial forecast, pricing, capex, working-capital or external-financing assumptions.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: The pivot to Vision Analytics creates forecast assumptions around customer conversion, deployment cost and burn reduction that are not publicly testable.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-005
              - EC-016
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Forecasts may rely on unproven retail-media/analytics adoption or understate implementation costs.
        evidence_gaps:
          - No board forecast, scenario model, pricing assumptions, capex plan or financing plan located.
        follow_up_questions:
          - Provide three-year quarterly model with revenue by product/channel/customer, gross margin, CAC/payback, cash runway, capex and financing assumptions.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-005
          - EC-016
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: CB Insights lists a $1B unicorn row; a Standard AI press-card references $1.5B, but neither source provides shares outstanding, investor ownership, option pool, warrants, notes, debt or preferences.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Public valuation signals are inconsistent or incomplete and require reconciliation to financing documents.
            evidence_claim_ids:
              - EC-001
              - EC-013
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: Current active-private-company eligibility is reasonable from public sources, but corporate registry and cap-table confirmation were not performed.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-001
        hidden_risks:
          - Preference stack, liquidation overhang, option pool refresh, debt or structured terms could materially affect common-equity value.
        evidence_gaps:
          - Shares outstanding, fully diluted cap table, debt, SAFEs/notes, warrants, preferences and 409A reports unavailable.
        follow_up_questions:
          - Provide cap table, financing round documents, investor rights, debt/convertible instruments and current valuation support.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-013
          - EC-020
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public sources provide investor/backer and acquisition signals but no tax positions, revenue-recognition policy, debt instruments or complete financing history.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Business Wire backer/founding context and Skip acquisition coverage are useful but not a financing-history substitute.
            evidence_claim_ids:
              - EC-006
              - EC-017
            risk_ids:
              - R-002
              - R-010
        hidden_risks:
          - Accounting for hardware, software, pilots, partner arrangements and acquisition integration could materially affect revenue recognition and liabilities.
        evidence_gaps:
          - Tax positions, revenue-recognition memos, financing ledger, acquisition accounting and off-balance-sheet liabilities unavailable.
        follow_up_questions:
          - Provide tax schedules, accounting policies, revenue-recognition memo, financing history and acquisition-accounting support.
        table_ids:
          - T-001
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-017
  - chapter_id: II
    title: Products
    chapter_summary: Standard AI publicly markets VISION as a privacy-safe, existing-camera retail intelligence platform. The key product diligence issue is whether a post-2024 pivot from autonomous checkout to analytics can produce repeatable, paid retailer/brand ROI with manageable deployment economics and privacy risk.
    founder_claim_ids:
      - FC-002
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-015
      - EC-019
    risk_ids:
      - R-003
      - R-005
      - R-006
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: VISION is positioned around existing-camera analytics, verified impressions, engagement measurement, traffic/out-of-stock/conversion insights and shrink/labor intelligence; legacy autonomous checkout and Skip integration remain relevant but de-emphasized.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Current product messaging centers on VISION Analytics rather than the original cashierless-checkout positioning.
            evidence_claim_ids:
              - EC-002
              - EC-005
              - EC-007
            risk_ids:
              - R-003
          - finding_id: II.A-F2
            finding: Public architecture and privacy claims are material but unvalidated without technical/security diligence.
            evidence_claim_ids:
              - EC-003
              - EC-011
            risk_ids:
              - R-005
              - R-006
          - finding_id: II.A-F3
            finding: Public evidence shows announced features and pilot signals, not audited product ROI or market share.
            evidence_claim_ids:
              - EC-004
              - EC-015
              - EC-019
            risk_ids:
              - R-004
              - R-006
        hidden_risks:
          - The pivot may leave legacy checkout support costs while current analytics product-market fit remains early.
        evidence_gaps:
          - Product-level revenue, gross margin, deployments, accuracy, uptime, implementation cost, roadmap and customer ROI not public.
        follow_up_questions:
          - Provide product P&L, deployment counts, roadmap, model accuracy reports, uptime, implementation cost and customer ROI studies.
        table_ids:
          - T-004
          - T-005
          - T-006
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-005
          - EC-006
          - EC-015
          - EC-019
  - chapter_id: III
    title: Customer Information
    chapter_summary: "Public customer evidence is thin: Business Wire cites an unnamed major Midwest retailer pilot, and legal/privacy language references business customers generically. Top customers, revenue concentration, churn, renewals, references and supplier spend are not public."
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-004
      - EC-006
      - EC-011
      - EC-014
      - EC-016
    risk_ids:
      - R-004
      - R-007
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: No top-customer list was public. The main public customer signal is an unnamed major Midwest retailer pilot for VISION.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: The unnamed pilot supports product-market experimentation but not referenceable customer concentration or paid rollout scale.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-004
        hidden_risks:
          - A single unnamed pilot can look stronger than the underlying revenue base if expansion did not occur.
        evidence_gaps:
          - Top 15 customers by application, contract terms, deployment counts and referenceability unavailable.
        follow_up_questions:
          - Provide top-customer revenue by product/application, deployment status, contract dates, renewal/churn and references.
        table_ids:
          - T-008
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-004
          - EC-016
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public evidence includes Axis/NVIDIA logo signals, generic business-customer references and the Skip acquisition announcement, but no partner economics.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Partner and acquisition signals are visible, but contract terms, support obligations and revenue contribution are unknown.
            evidence_claim_ids:
              - EC-006
              - EC-014
            risk_ids:
              - R-007
        hidden_risks:
          - Logo partnerships can mask weak or non-exclusive relationships and dependencies.
        evidence_gaps:
          - Partner contracts, reseller/co-sell arrangements, cloud/hardware SLAs and supplier concentration unavailable.
        follow_up_questions:
          - Provide partner/supplier agreements, revenue contribution, co-sell pipeline, support obligations and SLA history.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-014
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No public revenue-by-customer disclosure or customer accounting for 5% or more of revenue was located.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Customer revenue quality and concentration cannot be assessed from public sources.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-004
        hidden_risks:
          - Retail enterprise revenue may be concentrated in a small number of pilots or deployments.
        evidence_gaps:
          - Customer ARR/revenue, NRR, churn and gross margin by customer unavailable.
        follow_up_questions:
          - Provide revenue by customer, application and geography; identify any customers above 5% of revenue and current renewal status.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-016
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No severed customer/partner/supplier relationships were publicly disclosed; the 2024 pivot and layoffs make churn/termination review important.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.D-F1
            finding: The public pivot creates a specific need to test whether legacy checkout customer relationships were lost, reduced or converted.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-003
              - R-004
        hidden_risks:
          - Legacy autonomous-checkout contracts may include termination, support or refund obligations.
        evidence_gaps:
          - Churned customers, severed partners and supplier terminations unavailable.
