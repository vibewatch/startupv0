        evidence_gaps:
          - Supplier agreements, purchase commitments, cloud bills and hardware warranties unavailable.
        follow_up_questions:
          - Provide top-supplier schedule, purchase volumes, pricing, SLAs, termination rights and cloud/hardware cost history.
        table_ids:
          - T-007
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-014
  - chapter_id: IV
    title: Competition
    chapter_summary: Standard AI now competes primarily on privacy-safe, existing-camera retail analytics and in-store media measurement rather than pure autonomous checkout. Public evidence supports positioning but not win/loss, pricing power, market share or benchmarked model accuracy.
    founder_claim_ids:
      - FC-002
      - FC-004
    evidence_claim_ids:
      - EC-002
      - EC-004
      - EC-005
      - EC-006
      - EC-009
      - EC-015
      - EC-019
    risk_ids:
      - R-003
      - R-004
      - R-006
      - R-007
      - R-009
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public evidence places Standard AI in computer-vision retail analytics, retail-media measurement, legacy autonomous checkout and self-checkout/POS integration. Competitive basis includes accuracy, privacy, camera reuse, implementation cost and ROI.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: The 2024 pivot moved Standard AI into an analytics/retail-media competitive frame with different buyers and success metrics than autonomous checkout.
            evidence_claim_ids:
              - EC-004
              - EC-005
              - EC-019
            risk_ids:
              - R-003
              - R-004
          - finding_id: IV.A-F2
            finding: Existing-camera and edge/privacy claims may be differentiators if validated technically and economically.
            evidence_claim_ids:
              - EC-002
              - EC-003
            risk_ids:
              - R-006
          - finding_id: IV.A-F3
            finding: The patent list may support defensibility but cannot be valued without claims/FTO review.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-009
        hidden_risks:
          - Entrenched retail analytics, camera/VMS, POS, retail-media and cloud vendors may pressure pricing and sales cycles.
        evidence_gaps:
          - Market share, competitor win/loss, benchmark accuracy, pricing comparisons and replacement rates unavailable.
        follow_up_questions:
          - Provide win/loss, competitive benchmarks, market-share estimates, pricing comparisons, customer selection reasons and IP/FTO review.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-005
          - EC-009
          - EC-019
