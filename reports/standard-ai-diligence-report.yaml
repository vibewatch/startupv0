diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited and management financial statements, ARR/bookings, gross margin, cash, debt, burn and working-capital schedules.
    why_it_matters: Without financial statements and revenue quality, valuation and runway cannot be underwritten.
    suggested_source_or_request: Company CFO/data room; auditor/accountant workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preference stack, option pool, debt/notes/warrants and current valuation support.
    why_it_matters: Headline valuation may not translate to common-equity value or new-money terms.
    suggested_source_or_request: Financing documents, investor rights agreements, 409A reports and board approvals.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer and any customer above 5% of revenue.
    why_it_matters: Public customer evidence is mostly unnamed; concentration risk could be high.
    suggested_source_or_request: Customer revenue schedule, contracts, NRR/churn cohorts and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: VISION deployment counts, accuracy, uptime, install cost, cloud/edge COGS and ROI studies.
