      - VIII
    mapped_section_ids:
      - VIII.C
      - VIII.D
      - VIII.F
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-021
