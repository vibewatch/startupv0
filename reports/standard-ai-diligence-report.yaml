risk_register:
  - risk_id: R-001
    risk_title: Financial statements and revenue quality are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: No public audited financials, ARR, gross margin, burn, cash, debt, backlog, AR aging or revenue concentration were located.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids:
      - EC-016
    mitigation_or_diligence_request: Require audited financials, management accounts, revenue cohorts, cash/debt schedule and board-approved forecast before valuation reliance.
  - risk_id: R-002
    risk_title: Headline valuation may be stale or inconsistent
    risk_category: financing
    severity: high
    likelihood: medium
    description: CB Insights lists $1B joined in 2021, while the company press page references a $1.5B VentureBeat headline that was not independently accessible.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-013
      - EC-017
    mitigation_or_diligence_request: Reconcile all financing rounds, liquidation preferences, 409A/common valuation, secondary transactions and down-round protections.
  - risk_id: R-003
    risk_title: Strategic pivot execution risk
    risk_category: product
    severity: high
    likelihood: high
    description: Public reporting describes a shift from autonomous checkout toward Vision Analytics, with leadership changes and layoffs tied to the pivot.
    impacted_chapter_ids:
      - II
      - VII
    impacted_section_ids:
      - II.A
      - VII.G
    evidence_claim_ids:
      - EC-005
      - EC-006
    mitigation_or_diligence_request: Review post-pivot bookings, churn, roadmap, retained technical assets, customer pipeline, employee retention and burn reduction.
  - risk_id: R-004
    risk_title: Customer proof and concentration are opaque
    risk_category: customer
    severity: high
    likelihood: high
    description: The strongest public customer signal is an unnamed major Midwest retailer pilot; top customers, revenue contribution, renewals and churn are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-004
      - EC-016
    mitigation_or_diligence_request: Request top-customer schedule, contract terms, NRR/churn, implementation status and independent references.
  - risk_id: R-005
    risk_title: Privacy and surveillance-regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Privacy policy discloses camera/video/proximity data, local/cloud storage and customer-controlled policy contexts for in-store shoppers.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.C
      - VIII.G
      - II.A
    evidence_claim_ids:
      - EC-003
      - EC-011
      - EC-021
    mitigation_or_diligence_request: Have privacy counsel review notices, consent, DPIAs, DPAs, biometric/facial-recognition controls, retention, cross-border transfer and incident history.
  - risk_id: R-006
    risk_title: Technical accuracy and deployment economics unproven publicly
    risk_category: technical
    severity: medium
    likelihood: medium
    description: VISION promises high-fidelity analytics from existing cameras, but public sources do not provide accuracy, uptime, false-positive, install-cost or support metrics.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
