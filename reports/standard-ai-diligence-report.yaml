report_metadata:
  report_title: Standard AI Startup Diligence Report
  target_company: Standard AI
  website: https://standard.ai/
  known_aliases:
    - Standard AI
    - Standard Cognition
    - Standard Cognition Corp.
    - Standard Cognition, Corp.
    - Checkout Technologies S.r.l.
    - Vision OS
    - VisionOS
  sector: Retail technology, computer vision, in-store analytics and autonomous checkout
  geography: United States / San Francisco with distributed remote workforce and some Europe roles
  company_stage: Private unicorn / growth-stage retail AI company
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Prioritized company-owned pages, reputable trade/news coverage, accelerator/company profiles, market databases and public legal/IP pages.
    - Treated company-published claims as verification that the statement exists, not independent proof of performance, revenue or compliance.
    - Did not bypass paywalls, bot protections, access controls or rate limits; inaccessible original articles are disclosed as limitations.
  included_jurisdictions:
    - United States
    - European operations referenced by company careers page
    - Global retail markets only where referenced by public materials
  excluded_topics:
    - Private data-room materials, founder interviews, customer calls, audited financials, cap table, contracts, counsel letters, HRIS exports, security reports, regulatory correspondence and non-public board materials were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Standard AI diligence report
      type: workflow_request
      date_received: 2026-05-24
      notes: No pitch deck, financial model, customer references, data room or founder responses were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Standard AI is an active private unicorn eligible for public-source diligence, with strongest independently accessible valuation evidence of $1B from CB Insights and a lower-confidence company press-page reference to $1.5B.
    claim_source: CB Insights unicorn list and Standard AI press page
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-013
      - EC-020
    contradiction_summary: CB Insights lists $1B while the company press page links a VentureBeat headline saying $1.5B; the original VentureBeat article was inaccessible, so valuation is treated as unresolved beyond the $1B CB row.
    diligence_follow_up:
      - Request financing documents, board-approved current valuation support, 409A reports, fully diluted cap table, option pool, preferences, debt and investor rights.
  - founder_claim_id: FC-002
    claim_text: Standard AI publicly markets VISION as an existing-camera, privacy-safe computer-vision analytics platform for physical retail.
    claim_source: Company website, Business Wire and CSP Daily News
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.B
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-004
      - EC-015
      - EC-019
    contradiction_summary: null
    diligence_follow_up:
      - Validate platform accuracy, edge/cloud architecture, deployment cost, product roadmap, customer outcomes, uptime and model-governance controls.
  - founder_claim_id: FC-003
    claim_text: Standard AI has public go-to-market and monetization signals but no public financial statements or revenue metrics.
    claim_source: Public product, retailer-contact and press materials
    claim_date: null
    mapped_chapter_ids:
      - I
      - V
    mapped_section_ids:
      - I.A
      - I.B
      - V.A
      - V.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-012
      - EC-016
    contradiction_summary: Public sales messaging exists, but audited financials, ARR, pricing realization, gross margin, CAC/payback and cash runway were not publicly available.
    diligence_follow_up:
      - Request audited/management financials, ARR or bookings bridge, pricing, gross margin, CAC, payback, quota attainment, pipeline and forecast model.
  - founder_claim_id: FC-004
    claim_text: Standard AI has public customer and partner signals, including an unnamed major Midwest retailer pilot and technology partner logos, but customer concentration is not public.
    claim_source: Business Wire, Standard AI homepage and CSP Daily News
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.B
      - III.C
      - V.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-014
    contradiction_summary: The public pilot customer is unnamed and partner logos do not disclose revenue, exclusivity or contract terms.
    diligence_follow_up:
      - Request top-customer ARR/revenue schedule, contracts, renewal/churn data, partner agreements, pipeline, implementation references and customer calls.
  - founder_claim_id: FC-005
    claim_text: Standard AI has public management, founder and hiring signals, but leadership changed during the 2024 pivot and layoffs were reported.
    claim_source: CSP Daily News, YC profile and company careers page
    claim_date: null
    mapped_chapter_ids:
      - VII
    mapped_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
      - EC-007
      - EC-008
