    chapter_summary: Standard AI has active GTM messaging for retailers and brands, supported by product announcements, sales CTA and thought leadership. Public evidence does not disclose pricing, ACV, pipeline, sales-cycle length, quota attainment, CAC/payback or budget sufficiency.
    founder_claim_ids:
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-004
      - EC-012
      - EC-014
      - EC-016
      - EC-018
    risk_ids:
