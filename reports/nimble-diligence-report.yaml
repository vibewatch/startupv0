diligence_gaps:
- gap_id: G-001
  chapter_id: I
  section_id: I.A
  missing_information: Audited consolidated financial statements, management accounts,
    cash/burn/runway, backlog and AR aging.
  why_it_matters: Core financial quality and runway cannot be underwritten from public
    sources.
  suggested_source_or_request: Company CFO data room and auditor workpapers.
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.C
  missing_information: Fully diluted cap table, financing terms, option pool, warrants,
    debt and investor rights.
  why_it_matters: "$1B valuation may not reflect current economic ownership or preferences."
  suggested_source_or_request: Cap table system export, financing documents, investor-rights
    agreements and 409A.
  priority: high
- gap_id: G-003
  chapter_id: II
  section_id: II.A
  missing_information: Product performance, SLA, uptime, accuracy, exception handling,
    safety and unit economics.
  why_it_matters: Automation ROI and customer value depend on reliable high-throughput
    operations.
  suggested_source_or_request: Reliability dashboards, incident log, customer ROI
    studies and product P&L.
  priority: high
- gap_id: G-004
  chapter_id: III
  section_id: III.A
  missing_information: Top-customer schedule and contract status by application.
  why_it_matters: Public logos do not reveal concentration, churn or reference quality.
  suggested_source_or_request: Top 15 customer schedule, contracts, SLA history and
    reference-call list.
  priority: high
- gap_id: G-005
  chapter_id: III
  section_id: III.E
  missing_information: Top suppliers, robot BOM, manufacturing vendors, cloud vendors
    and carrier/freight agreements.
  why_it_matters: Supplier concentration and manufacturing yield could drive deployment
    delays and margin risk.
  suggested_source_or_request: Supplier spend schedule, BOM, vendor contracts, cloud
    architecture and carrier contracts.
  priority: high
- gap_id: G-006
  chapter_id: IV
  section_id: IV.A
  missing_information: Competitive win/loss, price benchmarks and normalized ROI comparison.
  why_it_matters: Market contains multiple credible alternatives with overlapping
    value propositions.
  suggested_source_or_request: Sales CRM, lost-deal analysis, pricing studies and
    customer ROI benchmarks.
  priority: medium
- gap_id: G-007
  chapter_id: V
  section_id: V.D
  missing_information: Sales productivity model, quotas, attainment, funnel conversion,
    CAC and payback.
  why_it_matters: GTM scalability cannot be assessed from website and jobs alone.
  suggested_source_or_request: Sales ops dashboards, compensation plans, CRM exports
    and marketing spend reports.
  priority: high
- gap_id: G-008
  chapter_id: VI
  section_id: VI.A
  missing_information: R&D roadmap, model/data governance, architecture, test coverage
    and deployment postmortems.
  why_it_matters: Technical execution determines product reliability, safety and defensibility.
  suggested_source_or_request: CTO/engineering data room, architecture review and
    reliability/safety dashboards.
  priority: high
- gap_id: G-009
  chapter_id: VI
  section_id: VI.B
  missing_information: IP assignments, official patent/trademark docket, FTO and open-source
    policy.
  why_it_matters: Public applications do not prove ownership, scope or freedom to
    operate.
  suggested_source_or_request: Counsel IP schedule, USPTO records, assignments and
    FTO memo.
  priority: high
- gap_id: G-010
  chapter_id: VII
  section_id: VII.B
  missing_information: Headcount, attrition, compensation, stock plans and employee
    relations data.
  why_it_matters: Scaling R&D and operations requires retention and hiring capacity.
  suggested_source_or_request: HRIS export, compensation bands, option ledger and
