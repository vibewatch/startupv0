executive_summary:
  overall_assessment: Proceed only with high-intensity confirmatory diligence. Public
    sources verify Nimble public unicorn eligibility, $106M Series C/$1B valuation,
    FedEx strategic alliance, broad autonomous-fulfillment product claims, customer-logo/15M-pick
    traction signals, active hiring and visible IP filings. The material underwriting
    variables - financials, cap table terms, customer concentration, FedEx contract
    economics, robot performance, manufacturing yield, safety, security, contracts
    and legal schedules - are not public.
  investment_or_diligence_thesis: Nimble could be a strategically valuable robotics-enabled
    fulfillment platform if its general-purpose robots and cloud logistics can deliver
    reliable, lower-cost fulfillment at FedEx and multi-node scale; the diligence
    burden is to prove that headline valuation and product claims convert into profitable,
    defensible, safe and contractually resilient operations.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: CB Insights lists Nimble as a private $1B San Francisco Industrials unicorn.
    evidence_claim_ids:
    - EC-001
    - EC-022
  - founder_claim_id: FC-002
    summary: Nimble/BusinessWire announced a $106M Series C led by FedEx, co-led by
      Cedar Pine, and a FedEx commercial agreement.
    evidence_claim_ids:
    - EC-002
  - founder_claim_id: FC-003
    summary: Nimble public pages describe autonomous fulfillment centers, general-purpose
      warehouse robots and Cloud Logistics.
    evidence_claim_ids:
    - EC-003
    - EC-004
  - founder_claim_id: FC-007
    summary: Careers page verifies active hiring across AI/robotics, manufacturing,
      operations and service functions.
    evidence_claim_ids:
    - EC-007
    - EC-023
  biggest_risks:
  - risk_id: R-001
    summary: Financial statements, burn, runway and unit economics are not public.
  - risk_id: R-004
    summary: Customer concentration, churn and FedEx revenue dependency are unknown.
  - risk_id: R-003
    summary: Robot performance, safety, uptime and ROI claims require independent
      validation.
  - risk_id: R-006
    summary: Manufacturing/deployment scale-up may constrain FedEx and customer rollout.
  - risk_id: R-007
    summary: Competition from scaled warehouse automation vendors can pressure pricing
      and differentiation.
  key_evidence_gaps:
  - Audited financials, management accounts, cash/runway, backlog, AR aging and node-level
    unit economics.
  - Fully diluted cap table, financing terms, investor rights, debt, warrants/options
    and current valuation support.
  - Top customer schedule, concentration, churn/NRR, contract status, FedEx agreement
    and customer references.
  - Robot performance, uptime, throughput, safety, incident history, manufacturing
    yield, supplier/BOM and deployment postmortems.
  - Material contracts, insurance, IP assignments/FTO, privacy/security certifications,
    OSHA/EHS and regulatory/counsel records.
  recommended_next_steps:
  - Start confirmatory data-room request with finance/cap table, FedEx contract, customer
    schedule and product performance records.
  - Run customer references including FedEx and at least five non-FedEx logos across
    categories and facility nodes.
  - Commission technical diligence on robot autonomy, safety, reliability, Cloud Logistics
    security and manufacturing/deployment readiness.
  - Have counsel review IP, contracts, OSHA/EHS, privacy/security, insurance, litigation
    and regulatory records.
  - Benchmark Nimble ROI, pricing and win/loss against AutoStore, Symbotic, Dexterity,
    Locus and Exotec.
