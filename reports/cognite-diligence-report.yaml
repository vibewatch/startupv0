executive_summary:
  overall_assessment: Cognite appears to be an active uncovered private unicorn based on the fetched CB Insights list, public financing evidence and active company/product pages. Public evidence supports status screening and product/GTM presence, but investment-grade diligence remains unresolved because financials, customer quality, contracts, legal/regulatory posture, cap table and personnel data are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A thesis for Cognite depends on proving durable revenue growth, retention, margin, defensible product value, compliance posture, leadership depth and financing terms beyond public-list valuation evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support unicorn valuation/status for Cognite.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Cognite publicly markets an active product platform.
      evidence_claim_ids:
        - EC-003
        - EC-011
    - founder_claim_id: FC-003
      summary: Cognite has public customer, partner or demand signals.
      evidence_claim_ids:
        - EC-004
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation support are not public
    - risk_id: R-002
      summary: Industrial transformation sales cycles and customer concentration
    - risk_id: R-003
      summary: ROI and value-creation claims require independent validation
  key_evidence_gaps:
    - Audited financial statements, KPI pack and cash/debt schedule
    - Fully diluted cap table, preferences, debt and investor rights
    - Top-customer revenue, retention, contracts, renewal and satisfaction data
    - Sales productivity, funnel conversion, CAC, payback and budget data
    - Roadmap, technical benchmarks, security/quality artifacts, incident history and legal/IP schedules
  recommended_next_steps:
    - Do not rely on public valuation without financing documents, cap table and quality-of-revenue analysis.
    - Run customer/reference, contract, retention and concentration diligence before underwriting growth.
    - Have specialists review product/technical, security/privacy, regulatory/legal and IP evidence before investment reliance.
