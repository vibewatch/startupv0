executive_summary:
  overall_assessment: "upGrad clears the threshold for a substantive public-source diligence file: it is a real, scaled higher-ed/skilling platform with multi-line products, visible enterprise/study-abroad breadth and improving profitability signals. The current underwriting caution is that the latest defensible public valuation is around $1.73B, below the older $2.25B marker, while cap-table terms, audited financial quality, customer concentration and compliance artifacts remain private-diligence dependencies."
  investment_or_diligence_thesis: Treat upGrad as a multi-surface edtech/workforce platform with real scale and improving economics, but do not underwrite on stale unicorn valuation references or marketing claims alone. The core diligence questions are revenue quality, partner dependence, refund/complaint exposure, customer concentration, leadership transition stability and whether AI-led growth can scale without margin erosion or compliance friction.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Company pages verify a broad platform surface across consumer credentials, study abroad, enterprise and offline/blended channels.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-005
    - founder_claim_id: FC-007
      summary: WIPO and court-linked public records verify that the UPGRAD trademark exists and has been actively enforced.
      evidence_claim_ids:
        - EC-022
        - EC-023
        - EC-025
    - founder_claim_id: FC-004
      summary: Public FY25 and provisional FY26 sources show a credible path from losses toward EBITDA and PAT profitability.
      evidence_claim_ids:
        - EC-011
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Historical $2.25B references appear stale; the latest reviewed public valuation is about $1.73B and financing terms remain opaque.
    - risk_id: R-002
      summary: Financial quality cannot be fully assessed from press-led disclosures with large unrecognized-revenue balances.
    - risk_id: R-003
      summary: Consumer complaints, refund friction and high-visibility student disputes could create reputational and legal drag.
    - risk_id: R-004
      summary: The business relies heavily on external universities, admissions/testing ecosystems and enterprise partners.
  key_evidence_gaps:
    - Audited FY24/FY25/FY26 financial statements, revenue-recognition policy and cash/deferred-revenue detail.
    - Current cap table, debt instruments, ESOP overhang and latest financing rights.
    - Top-customer concentration, retention, contract value and by-channel CAC/LTV metrics.
    - Partner contract economics, accreditation boundaries, complaint logs and legal reserve analysis.
    - Current engineering/security architecture, HRIS headcount/attrition data and complete compliance artifacts.
  recommended_next_steps:
    - Run confirmatory finance diligence before relying on any valuation mark, especially the post-reset $1.73B figure.
    - Request customer and partner concentration packs, including the top 20 enterprise accounts and top university relationships.
    - Run consumer-ops diligence on refund rates, complaint causes, course shutdowns and student-outcome quality by program.
    - Run legal/compliance diligence on trademark files, complaint tracker, ISO certificate scope and cross-border academic disclosures.
    - Benchmark win/loss, pricing and completion economics against Coursera, Simplilearn, Emeritus and other regional peers.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence shows upGrad improved from heavy FY24 losses to FY25 EBITDA profitability and provisional FY26 PAT positivity, but the financial package remains press-led rather than audited and the latest defensible valuation appears closer to $1.73B than the older $2.25B marker.
    founder_claim_ids:
      - FC-001
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-007
      - EC-008
      - EC-009
      - EC-010
      - EC-011
      - EC-012
      - EC-017
      - EC-025
    risk_ids:
      - R-001
      - R-002
      - R-004
      - R-005
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: The best public financial record comprises FY24 and FY25 operating snapshots plus a provisional 11M FY26 update. Trend direction is favorable, but audited statements, quarterly data and balance-sheet detail are absent.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: FY24 public disclosures showed Rs 1,876 crore gross revenue, Rs 1,547 crore total income, Rs 507 crore unrecognized collections, Rs 202 crore EBITDA loss (excluding one-time costs) and Rs 560 crore net loss.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-002
          - finding_id: I.A-F2
            finding: FY25 public disclosures improved to Rs 1,943 crore gross revenue, Rs 1,650 crore total income, Rs 15 crore EBITDA profit (Rs 38 crore excluding one-time costs) and Rs 274 crore loss.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-002
          - finding_id: I.A-F3
            finding: A May 2026 report cited provisional 11M FY26 revenue from operations of Rs 1,531.7 crore, EBITDA of Rs 56.9 crore and PAT of Rs 38.8 crore.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
        hidden_risks:
          - Large collected-but-unrecognized revenue balances can mask near-term quality of earnings and cash conversion.
        evidence_gaps:
          - No audited balance sheets, cash flow statements, quarterly packs, AR aging schedules or product-level gross margins were found publicly.
        follow_up_questions:
          - How much of unrecognized collections are cancellable, refundable, or dependent on partner-university completion events?
        table_ids:
          - T-001
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-011
          - EC-012
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: "Only limited forward-looking public evidence exists: a DCF-backed FY31 revenue target in the 2026 valuation report and management commentary about 30% CAGR. That is directionally useful but insufficient for underwriting without the model."
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: The 2026 valuation report said revenue is projected to cross Rs 15,000 crore by FY31 and that equity value was derived entirely through DCF.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-001
              - R-002
          - finding_id: I.B-F2
            finding: FY25 management commentary said the company was on track for a 30% CAGR over the next two to three years while expanding internationally.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-002
              - R-004
        hidden_risks:
          - Aggressive long-range growth targets could depend on continued external capital, partner expansion and favorable recognition timing.
        evidence_gaps:
          - No three-year quarterly forecast, capex plan, working-capital assumptions, FX sensitivities or scenario analysis was public.
        follow_up_questions:
          - What share of the FY31 revenue ambition comes from study abroad, enterprise, domestic consumer and international markets?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-011
          - EC-012
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public ownership snippets indicate continued founder control and new preferred issuance, but the cap table, ESOP pool, debt, options and off-balance-sheet obligations remain private.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: I.C-F1
            finding: The 2022 BusinessWire round announcement said the founder group still held more than 50% ownership after the $210M round.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-001
          - finding_id: I.C-F2
            finding: StartupTalky reported Ronnie Screwvala at 44% and Mayank Kumar at 8%, while Entrackr said the 2026 round involved 8.91 crore CCPS at Rs 40.55 each.
            evidence_claim_ids:
              - EC-012
              - EC-017
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Preference stack, side letters, debt terms and ESOP refreshes could materially alter effective ownership economics.
        evidence_gaps:
          - No shareholder register, option schedule, warrant schedule, debt summary or off-balance-sheet liability schedule was found publicly.
        follow_up_questions:
          - What liquidation preferences, anti-dilution protections and board-control rights were attached to the latest CCPS issuance?
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-012
          - EC-017
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history supports a 2021 unicorn milestone, a historical 2024 $2.25B marker and a more recent 2026 valuation around $1.73B. The latest mark is the most defensible current valuation in reviewed sources.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: EdTechReview documented a 2021 $185M funding round at a $1.2B valuation.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-001
          - finding_id: I.D-F2
            finding: Entrackr documented a 2024 $60M Temasek round at a $2.25B valuation, but its May 2026 report cited a fresher $1.73B valuation and new CCPS issue.
            evidence_claim_ids:
              - EC-010
              - EC-012
            risk_ids:
              - R-001
          - finding_id: I.D-F3
            finding: The strongest latest public valuation anchor is the May 2026 Entrackr/Incwert figure rather than the older unicorn-era $2.25B reference.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-001
        hidden_risks:
          - Stale database values can mask valuation resets, preference overhang and dilution.
        evidence_gaps:
          - No tax memo, revenue-recognition policy, full financing timeline by class or official current cap table was public.
        follow_up_questions:
          - How much of the valuation step-down is market-driven versus company-specific performance, governance or term-structure effects?
        table_ids:
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-010
          - EC-012
  - chapter_id: II
    title: Products
    chapter_summary: upGrad’s visible product surface is broad across consumer credentials, study-abroad pathways, enterprise skilling and offline/blended support. Public pricing is heavily merchandised, but consistency and partner-disclosure issues deserve diligence.
    founder_claim_ids:
      - FC-002
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-013
      - EC-014
      - EC-015
    risk_ids:
      - R-003
      - R-004
      - R-006
      - R-009
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: The homepage and program pages show an integrated product set centered on AI, business and career mobility. The strongest product risks come from partner dependency, pricing transparency and accreditation/credit-transfer communication.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: The homepage visibly spans Agentic AI, AI, MBA, Doctorate, Study Abroad, Offline Centres and Free Courses, indicating a deliberate multi-surface catalog.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-006
          - finding_id: II.A-F2
            finding: Study-abroad materials advertise 300+ universities, 20,000+ enrolled learners and 18 global universities accepting Term-1 credits, but explicitly say upGrad itself is not a college or university and does not grant credits.
            evidence_claim_ids:
              - EC-003
              - EC-004
            risk_ids:
              - R-004
              - R-009
          - finding_id: II.A-F3
            finding: Public pricing pages show EMI-led merchandising, including a visible inconsistency on the JGU MBA page where monthly cost is shown as both INR 6,790 and INR 16,251.
            evidence_claim_ids:
              - EC-014
              - EC-015
            risk_ids:
              - R-003
              - R-006
        hidden_risks:
          - Merchandising can simplify affordability optics while obscuring total program cost and partner economics.
        evidence_gaps:
          - No product-level contribution margin, churn, market share or cohort-level outcome data was found publicly.
        follow_up_questions:
          - What products drive the highest gross margin and lowest refund/complaint incidence by geography and learner segment?
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-005
          - EC-006
          - EC-014
          - EC-015
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public sources show broad relationship scale across universities, employers and enterprise clients, but they do not disclose top accounts or revenue concentration. The company’s breadth story is stronger than its concentration transparency.
    founder_claim_ids:
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-008
      - EC-011
      - EC-013
      - EC-014
      - EC-015
    risk_ids:
      - R-004
      - R-007
      - R-009
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: No top-15 customer list is public. The best proxies are disclosed client, partner, university, placement and learner counts.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Public materials show 3,000+ corporate partners, 1,000+ mid and large clients in FY24, 300+ university partners and 20,000+ study-abroad enrolled learners.
            evidence_claim_ids:
              - EC-003
              - EC-005
              - EC-008
              - EC-013
            risk_ids:
              - R-007
          - finding_id: III.A-F2
            finding: The company also publicized 55,000 FY24 career transitions, which supports outcome-led demand messaging but not customer concentration analysis.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-007
        hidden_risks:
          - Breadth counts can hide concentration if a small subset of clients contributes most enterprise revenue.
        evidence_gaps:
          - No top-customer list, account-level ARR or application-level revenue split was public.
        follow_up_questions:
          - Who were the top 15 customers by revenue in FY24, FY25 and current YTD, and what products did they buy?
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-003
          - EC-005
          - EC-008
          - EC-013
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: "Strategic relationships appear central to the model: universities power credentials and pathways; enterprise accounts and placement companies power demand and outcomes. Economics and exclusivity remain opaque."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: BusinessWire disclosed 300 university partners and 1,000 enterprise clients worldwide by 2022.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-004
              - R-007
          - finding_id: III.B-F2
            finding: Study-abroad pages and enterprise capability pages point to a dense partner fabric, including 18 term-credit universities, 300+ enterprises in one capability area and 220+ enterprises in talent fulfillment.
            evidence_claim_ids:
              - EC-003
              - EC-006
            risk_ids:
              - R-004
              - R-007
          - finding_id: III.B-F3
            finding: Placement and employer relationships are also part of the public narrative via 3,000 companies and 55,000 FY24 transitions.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-007
        hidden_risks:
          - Partner breadth does not prove strong retention or favorable economics.
        evidence_gaps:
          - No partner-level revenue contributions, exclusivity terms, SLA obligations or cancellation rights were public.
        follow_up_questions:
          - Which university and enterprise relationships are economically material or operationally irreplaceable?
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-006
          - EC-008
          - EC-013
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue concentration by customer is not publicly disclosed in reviewed sources.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings: []
        hidden_risks:
          - A few enterprise contracts or university relationships could be disproportionately important without any public visibility.
        evidence_gaps:
          - No customer-level revenue schedule, 5%-plus customer list or net revenue retention by account was found.
        follow_up_questions:
          - What percentage of revenue came from the top 5, 10 and 20 customers in FY24 and FY25?
        table_ids: []
        figure_ids: []
        evidence_claim_ids: []
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No clearly documented severed customer, partner or supplier relationships were found in reviewed public sources, but the public record is not complete enough to infer absence.
        verification_status: unverified
        confidence: low
        key_findings: []
        hidden_risks:
          - Relationship breaks may only become visible after delayed revenue effects or litigation.
        evidence_gaps:
          - No public severed-relationship log, partner churn table or postmortem commentary was found.
        follow_up_questions:
          - Which strategic relationships were lost, suspended or materially renegotiated since FY24 and why?
        table_ids: []
        figure_ids: []
        evidence_claim_ids: []
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Supplier concentration is not directly disclosed, but public evidence implies dependence on universities, admissions/testing vendors, human delivery capacity and financing rails.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: Study-abroad pages explicitly say credits are granted at institution discretion and admissions require external tests and proof-of-funds processes.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-004
              - R-009
          - finding_id: III.E-F2
            finding: BusinessWire highlighted a large teacher/coach/mentor network, implying material dependence on contracted human delivery capacity.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-004
          - finding_id: III.E-F3
            finding: Consumer price pages also show financing/EMI rails as part of the go-to-market experience.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-004
        hidden_risks:
          - Third-party delivery, accreditation and financing dependencies can tighten margins or impair conversion.
        evidence_gaps:
          - No supplier ledger, purchase volumes, partner payment terms or concentration analysis was public.
        follow_up_questions:
          - Who are the top 10 suppliers/partners by spend and what termination rights do they have?
        table_ids:
