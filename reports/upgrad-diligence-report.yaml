evidence_claims:
  - evidence_claim_id: EC-001
    claim: upGrad publicly presents itself as serving 10M+ learners globally and dates its mission-led growth to the 2015 operating launch period.
    evidence_summary: The About page says upGrad is empowering over 10 million learners globally and shows timeline milestones including becoming India’s largest online higher education company and surpassing 2 million registered learners.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-002
    quoted_evidence:
      - source_id: SRC-002
        quote: Empowering over 10 million learners globally, upGrad leverages advanced technology, world-class faculty, and industry partnerships to bring impactful online learning.
        location: About page vision section
      - source_id: SRC-002
        quote: Expanded partnerships and became India’s largest online higher education company
        location: About page timeline excerpt
    analyst_interpretation: This strongly verifies what the company currently claims publicly about scale and positioning, but not the underlying active/paying-user methodology.
    limitations: Company-reported scale metrics are not independently audited in the reviewed public record.
    associations:
      chapter_id: II
      section_id: II.A
      founder_claim_ids:
        - FC-003
      table_ids: []
      figure_ids: []
      risk_ids: []
  - evidence_claim_id: EC-002
    claim: upGrad’s current public catalog spans AI, MBA, doctorate, study abroad, free courses and offline channels.
    evidence_summary: The homepage prominently merchandises these categories and related landing pages, supporting the integrated-product claim.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-003
    quoted_evidence:
      - source_id: SRC-003
        quote: Agentic AI ... Artificial Intelligence ... Doctorate ... MBA
        location: Homepage category header excerpt
      - source_id: SRC-003
        quote: Learn offline ... Study Abroad ... Agentic AI Courses ... Free Course
        location: Homepage callout links
    analyst_interpretation: The homepage clearly supports a broad multi-surface product strategy.
    limitations: Breadth on the homepage does not imply equal economic importance across each product line.
    associations:
      chapter_id: II
      section_id: II.A
      founder_claim_ids:
        - FC-002
      table_ids:
        - T-004
      figure_ids:
        - F-003
      risk_ids:
        - R-006
  - evidence_claim_id: EC-003
    claim: upGrad’s study-abroad business publicly claims large scale and pathway breadth.
    evidence_summary: The study-abroad page displays 300+ universities, 98% admit rate, 20,000+ enrolled learners, average cost savings claims and 18 global universities accepting Term-1 credits.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-004
    quoted_evidence:
      - source_id: SRC-004
        quote: 300+ ... 98% ... 20,000+ ... Term 1 credits accepted at 18 global universities.
        location: Study-abroad top metrics section
      - source_id: SRC-004
        quote: With upGrad Pathway, start online in India and flexibly choose your university or switch your country for on-campus graduation.
        location: Study-abroad pathway section
    analyst_interpretation: This verifies what upGrad markets publicly about pathway breadth and demand, but not the underlying cohort quality or admissions economics.
    limitations: The company page does not disclose partner-by-partner conversion, dropout or revenue-share detail.
    associations:
      chapter_id: II
      section_id: II.A
      founder_claim_ids:
        - FC-002
        - FC-005
      table_ids:
        - T-004
        - T-005
      figure_ids:
        - F-003
      risk_ids:
        - R-004
  - evidence_claim_id: EC-004
    claim: upGrad publicly discloses that it is not itself a college or university and that credit transfer is controlled by partner institutions.
    evidence_summary: The study-abroad disclaimer directly limits upGrad’s own academic standing and transfers control to partner institutions.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-004
    quoted_evidence:
      - source_id: SRC-004
        quote: upGrad does not grant credit; credits are granted, accepted or transferred at the sole discretion of an educational institution. upGrad is not a college or university in itself.
        location: Study-abroad disclaimer / footnote 8
      - source_id: SRC-004
        quote: Some universities may also ask for entrance tests like GRE, GMAT, SAT, or ACT.
        location: Study-abroad FAQ / admissions requirements
    analyst_interpretation: This is a material regulatory and product-risk disclosure because partner institutions, not upGrad, control academic credit and many admissions gates.
