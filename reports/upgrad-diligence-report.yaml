  - table_id: T-021
    title: Public regulatory, disclosure and compliance signals
    chapter_id: VIII
    section_id: VIII.G
    purpose: Capture the clearest public compliance-related signals and caveats visible from current pages.
    columns:
      - name: signal
        description: Compliance-related signal.
      - name: public_detail
        description: What the public source states.
      - name: risk_if_unmanaged
        description: Potential diligence concern.
      - name: follow_up_needed
        description: Next diligence ask.
    rows:
      - row_id: T021-R1
        values:
          signal: Study-abroad academic disclaimer
          public_detail: upGrad says it does not grant credit, credits are accepted or transferred at the sole discretion of educational institutions, and upGrad is not a college or university in itself.
          risk_if_unmanaged: Potential student-misunderstanding, accreditation and marketing-compliance risk.
          follow_up_needed: Review all student-facing disclosures, partner approvals and complaint patterns by destination/program.
        evidence_claim_ids:
          - EC-004
        source_ids:
          - SRC-004
      - row_id: T021-R2
        values:
          signal: Enterprise ISO page inconsistency
          public_detail: Page says upGrad is ISO 9001:2015 certified while linking to a file named ISO 27001-2013-upGrad Education PVT. LTD. ISMS.
          risk_if_unmanaged: Potential control-documentation inconsistency or messaging confusion for enterprise buyers.
          follow_up_needed: Request valid certificates, scope statements, expiration dates and audit reports.
        evidence_claim_ids:
          - EC-006
        source_ids:
          - SRC-006
      - row_id: T021-R3
        values:
          signal: Program refund-policy visibility
          public_detail: IIITB AI/ML page says pre-commencement refunds incur a Rs 10,000 processing fee and no refunds are considered after the program commences.
          risk_if_unmanaged: Refund and grievance policies can become consumer-protection flashpoints.
          follow_up_needed: Review refund SLAs, exception handling and complaint escalation by program.
        evidence_claim_ids:
          - EC-014
        source_ids:
          - SRC-013
    evidence_claim_ids:
      - EC-004
      - EC-006
      - EC-014
    source_ids:
      - SRC-004
      - SRC-006
      - SRC-013
    notes: No direct public regulator enforcement action was identified in reviewed sources, but absence of evidence is not evidence of absence.
