report_metadata:
  report_title: upGrad Startup Diligence Report
  target_company: upGrad
  website: https://www.upgrad.com/
  known_aliases:
    - upGrad Education Private Limited
    - upGrad Enterprise
    - upGrad Study Abroad
    - upGrad Abroad
  sector: Higher education technology / workforce development / study-abroad services
  geography: India headquartered with international revenue, study-abroad pathways and enterprise activity across Asia, Middle East, US and other markets
  company_stage: Private late-stage edtech / growth-stage venture-backed company
  research_date: 2026-06-14
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: INR unless otherwise noted
  time_zone: Asia/Kolkata
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Followed the startup-diligence-research workflow using public internet sources only.
    - Prioritized company pages, company-distributed financing announcements, legal records and credible startup press for the latest valuation and operating signals.
    - Reconciled historical unicorn references against fresher 2026 financing and valuation reporting rather than carrying forward stale database values.
    - Marked private-data items such as cap table, debt, customer concentration and compensation as not_publicly_verifiable and converted them into diligence requests.
  included_jurisdictions:
    - India
    - United States
    - United Kingdom
    - European Union
    - Middle East
    - Southeast Asia
  excluded_topics:
    - Private data room documents
    - Management interviews
    - Customer or supplier calls
    - Paid databases not accessible from the environment
    - Official docket/order downloads blocked by anti-bot controls
  user_provided_materials:
    - material_id: UPM-001
      title: User assignment for new upGrad diligence report
      type: workflow_request
      date_received: 2026-06-14
      notes: Create reports/upgrad-diligence-report.yaml; reconcile historical $2.25B public marker with newer 2026 ~$1.7B reporting and use the latest defensible valuation.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: upGrad’s current enterprise value still sits around $2.25B.
    claim_source: Historical public unicorn references and user assignment context referencing a $2.25B marker
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.D
    verification_status: contradicted
    confidence: medium
    evidence_claim_ids:
      - EC-010
      - EC-012
      - EC-017
