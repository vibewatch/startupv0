  - table_id: T-020
    title: Material trademark and IP enforcement signals
    chapter_id: VIII
    section_id: VIII.D
    purpose: Organize the visible trademark and domain-enforcement evidence into one diligence table.
    columns:
      - name: asset_or_action
        description: Trademark asset or enforcement action.
      - name: public_detail
        description: Public detail available.
      - name: source_strength
        description: How strong the source is.
      - name: diligence_takeaway
        description: Why it matters.
    rows:
      - row_id: T020-R1
        values:
          asset_or_action: UPGRAD word mark
          public_detail: WIPO decision says the company is registered proprietor of trademark No. 2985064, registered on 15 June 2015 in class 41.
          source_strength: Strong primary adjudicatory record
          diligence_takeaway: Material trademark asset appears real and enforceable.
        evidence_claim_ids:
          - EC-025
        source_ids:
          - SRC-023
      - row_id: T020-R2
        values:
          asset_or_action: Domain portfolio
          public_detail: WIPO decision lists ownership of <upgrad.com>, <upgrad.co>, <upgrad.info>, <upgrad.net> and <upgrad.org>.
          source_strength: Strong primary adjudicatory record
          diligence_takeaway: Shows deliberate brand-domain estate management.
        evidence_claim_ids:
          - EC-025
        source_ids:
          - SRC-023
      - row_id: T020-R3
        values:
          asset_or_action: upgrad.academy UDRP transfer
          public_detail: WIPO ordered transfer of the disputed domain name to upGrad.
          source_strength: Strong primary adjudicatory record
          diligence_takeaway: Supports the company’s willingness and ability to enforce rights internationally.
        evidence_claim_ids:
          - EC-025
        source_ids:
