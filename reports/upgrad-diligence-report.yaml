            finding: Search snippets and case metadata show the company pursued an Intellipaat keyword/trademark dispute and the parties discussed an undertaking not to use the mark in Google Ads exact or string search terms.
            evidence_claim_ids:
              - EC-022
              - EC-023
            risk_ids:
              - R-008
        hidden_risks:
          - Trademark strength does not answer whether all content, faculty material and international rights are cleanly assigned.
        evidence_gaps:
          - No full trademark schedule, copyright assignment log, patent list or license register was public.
        follow_up_questions:
          - Please provide the trademark portfolio by jurisdiction plus all material content/IP assignment agreements.
        table_ids:
          - T-020
        figure_ids: []
        evidence_claim_ids:
          - EC-022
          - EC-023
          - EC-025
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: No public insurance schedule or coverage summary was found.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings: []
        hidden_risks:
          - Claims frequency in consumer, data/privacy and partner disputes can materially change appropriate coverage needs.
        evidence_gaps:
          - No D&O, E&O, cyber, general liability or student-claim insurance details were public.
        follow_up_questions:
          - What policies, carriers, limits, exclusions and claims history apply to the business?
        table_ids: []
        figure_ids: []
        evidence_claim_ids: []
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material contracts are not public, but public pages confirm that partner universities, refund terms and credit-transfer conditions sit underneath the customer promise.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.F-F1
            finding: The IIITB AI/ML page references a program offer letter for detailed refund terms, and study-abroad pages make clear that academic credit depends on partner institutions.
            evidence_claim_ids:
              - EC-004
              - EC-014
            risk_ids:
              - R-003
              - R-004
        hidden_risks:
          - Unfavorable revenue-share, refund, indemnity or partner-termination clauses can materially reshape economics.
        evidence_gaps:
          - No MSAs, university agreements, partner revenue-share contracts, vendor contracts or consumer T&Cs packet was fully reviewed.
        follow_up_questions:
          - What are the top 20 material contracts by revenue, cost or legal exposure?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-014
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No direct public regulatory enforcement action was recovered, but cross-border education disclaimers and compliance-control inconsistencies justify deeper diligence rather than a clean bill of health.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: Study-abroad materials include an explicit disclaimer that upGrad is not a college or university and that credit transfer is at institution discretion.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-003
              - R-004
              - R-009
          - finding_id: VIII.G-F2
            finding: The enterprise ISO page says upGrad is ISO 9001:2015 certified while linking to a file named ISO 27001-2013-upGrad Education PVT. LTD. ISMS, which should be reconciled.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-009
          - finding_id: VIII.G-F3
            finding: The visible legal record centers more on trademark/reputation enforcement than on a public regulator action, leaving formal agency-risk assessment incomplete.
            evidence_claim_ids:
              - EC-022
              - EC-024
              - EC-025
            risk_ids:
              - R-008
        hidden_risks:
          - Consumer complaints or partner-disclosure issues can later escalate into regulator interest even if no action is currently visible.
        evidence_gaps:
          - No regulator correspondence, notices, privacy/security filings or accreditation audits were public.
        follow_up_questions:
          - Has any regulator, accreditation body or consumer-protection authority issued notices or asked for remediation since FY24?
        table_ids:
          - T-021
        figure_ids:
          - F-010
          - F-011
        evidence_claim_ids:
          - EC-004
          - EC-006
          - EC-022
          - EC-024
          - EC-025
