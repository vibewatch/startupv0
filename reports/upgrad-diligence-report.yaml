diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited FY24/FY25/FY26 statements with balance sheet, cash flow and footnotes.
    why_it_matters: Without audited packs, public profitability and revenue-quality claims remain incomplete.
    suggested_source_or_request: Request audited financial statements and board-approved monthly management accounts.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, ESOP schedule, debt instruments and preference stack.
    why_it_matters: Valuation and ownership risk cannot be underwritten from partial press snippets.
    suggested_source_or_request: Request shareholder register, CCPS term sheets, option schedule and debt agreements.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level revenue, gross margin, refund rate and cohort economics.
    why_it_matters: Catalog breadth alone does not show which products create value versus customer service load.
    suggested_source_or_request: Request product P&Ls and cohort dashboards by program family.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue concentration and account-level retention.
    why_it_matters: Enterprise concentration can materially change downside risk.
    suggested_source_or_request: Request top-20 customer list with ARR/bookings, renewals and contract dates.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.B
    missing_information: University and strategic-partner economics, exclusivity and churn.
    why_it_matters: Partner breadth is only valuable if relationships are durable and economically attractive.
    suggested_source_or_request: Request all material partner contracts and renewal history.
    priority: high
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: CAC, funnel conversion, quota, payback and sales-cycle data.
    why_it_matters: GTM efficiency is central to judging whether profitability can scale.
    suggested_source_or_request: Request sales productivity dashboard and channel-level CAC/LTV model.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.A
    missing_information: Engineering org, platform architecture, security controls and R&D spend.
    why_it_matters: The public tech narrative is not enough to assess defensibility or operational risk.
    suggested_source_or_request: Request architecture docs, SDLC/security controls and R&D budget/headcount.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount by function/location and two-year attrition data.
    why_it_matters: Capacity and leadership-risk assessment remain weak without current workforce data.
    suggested_source_or_request: Request HRIS extracts, attrition dashboard and hiring plan.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Full litigation/complaint register and reserve analysis.
    why_it_matters: Public legal signals may understate or overstate true exposure without the full case book.
    suggested_source_or_request: Request litigation tracker, consumer-complaint logs and outside-counsel summary.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory notices, privacy/security certifications and accreditation audits.
    why_it_matters: Cross-border education and enterprise-sales diligence need control evidence, not marketing statements.
    suggested_source_or_request: Request regulator correspondence, valid ISO certificates, privacy documentation and accreditation files.
    priority: high
