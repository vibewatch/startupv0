        checklist_question_ids:
          - III.D
        summary: No public list of terminated customers, severed strategic partners, lost suppliers or churned major accounts was found. This does not verify stability; it only reflects public-source limitations.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
