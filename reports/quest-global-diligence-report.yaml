        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer, segment, country, application and gross profit was not publicly disclosed. The absence is material because strategic-account engineering services businesses can have meaningful customer concentration.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: No public revenue-by-customer schedule was found in reviewed sources.
            evidence_claim_ids:
