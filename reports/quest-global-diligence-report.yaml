        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids:
          - VIII.D
        summary: The most concrete public IP record found was USPTO application 97403671 for QUEST GLOBAL, live with opposition pending at TTAB. Public sources did not disclose material patents, software licenses, customer IP ownership schedules or third-party license obligations.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.D-F1
            finding: USPTO shows the QUEST GLOBAL application as live with opposition pending and owner QuEST Global Services, Pte. Ltd.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-008
        hidden_risks:
          - Customer-project IP ownership and open-source/tool-license obligations may be more material than brand trademarks but are not public.
        evidence_gaps:
          - Patent/trademark portfolio, TTAB file, open-source policy, tool/license inventory, customer IP assignment terms and infringement claims.
        follow_up_questions:
          - Provide IP portfolio, TTAB counsel memo, software/tool license schedule and standard customer IP clauses.
        table_ids:
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-022
          - EC-024
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: No public insurance coverage schedule was found. Given professional engineering services in regulated industries, cyber, E&O/professional liability, D&O, employment practices, general liability and project-specific coverage require review.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.E-F1
            finding: Insurance policies and claims history were not publicly disclosed.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-001
              - R-009
        hidden_risks:
          - Coverage exclusions or inadequate limits could leave the company exposed to customer-project, cyber, employment or regulatory claims.
        evidence_gaps:
          - Insurance policies, limits, exclusions, retentions, claims history, broker reports and pending notices.
        follow_up_questions:
          - Provide all insurance policies, claims runs, broker coverage analysis and notices for the past five years.
        table_ids:
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-024
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Customer MSAs, partner agreements, supplier/subcontractor contracts, leases, debt agreements and material licenses were not public. Public partner listings and customer-history narratives are not contract evidence.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.F-F1
            finding: Material contracts were not publicly disclosed, despite visible partner and customer narratives.
            evidence_claim_ids:
              - EC-009
              - EC-015
              - EC-024
            risk_ids:
              - R-003
              - R-007
              - R-009
        hidden_risks:
          - Indemnity, warranty, IP ownership, termination-for-convenience, exclusivity, non-solicit, audit and data-security clauses can materially affect risk and valuation.
        evidence_gaps:
          - Top customer MSAs/SOWs, partner agreements, supplier contracts, leases, licenses, debt, guarantees and contract-risk matrix.
        follow_up_questions:
          - Provide material contract schedule and copies of top customer, partner, supplier, lease and financing agreements.
        table_ids:
          - T-006
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-009
          - EC-015
          - EC-024
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Quest publishes ethics/compliance and privacy policies, including Code of Conduct/Speak Up and GDPR commitment, but no full regulatory correspondence, audits, enforcement actions or export-control files were public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: Ethics page publicly states integrity values and links Code of Conduct/Speak Up resources.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-009
          - finding_id: VIII.G-F2
            finding: Privacy policy states GDPR commitment and reasonable security measures.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-009
        hidden_risks:
          - Aerospace/defense, semiconductor, medtech and global delivery create export-control, sanctions, anti-bribery, privacy and cybersecurity exposure not resolved by public policy pages.
        evidence_gaps:
          - Regulatory correspondence, export-control classification process, sanctions screening, anti-bribery audits, privacy incidents, SOC/ISO reports and breach logs.
        follow_up_questions:
          - Provide regulatory/audit correspondence and compliance-control evidence for privacy, export control, anti-bribery, sanctions, cybersecurity and government contracts.
        table_ids:
          - T-015
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-016
          - EC-018
          - EC-021
          - EC-024
