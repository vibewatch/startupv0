          - Broad service coverage increases cross-sell potential but expands quality, regulatory, security, export-control and professional-liability exposure.
        evidence_gaps:
          - Revenue and margin by service line/industry, backlog, utilization, defect metrics, IP ownership terms, certifications, warranty/indemnity terms and customer satisfaction.
        follow_up_questions:
          - Provide service-line P&L, project KPI dashboard, IP assignment templates, regulatory certifications and customer references for each major vertical.
        table_ids:
          - T-003
          - T-004
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-009
          - EC-010
          - EC-011
          - EC-013
          - EC-023
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence shows historical enterprise relationship signals and a large strategic-partner ecosystem, but top customers, revenue concentration, customer contracts, churn/NRR, renewal dates, customer satisfaction and supplier economics are not public. Quest’s own “fewer, deeper relationships” narrative makes concentration analysis especially important.
    founder_claim_ids:
      - FC-002
      - FC-005
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-014
      - EC-015
      - EC-024
    risk_ids:
      - R-003
      - R-007
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Quest Global’s history page references early and historical enterprise relationships, including General Electric and later preferred-partner references, but no current top-customer schedule by application was public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Quest says its journey began with a General Electric project and grew from two people to 22K+ people.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-003
          - finding_id: III.A-F2
            finding: Quest claims its first client is still working with it, supporting a long-term relationship narrative but not current revenue detail.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-003
        hidden_risks:
          - Public case/history references can overrepresent successful or long-lived relationships; current concentration could still be high.
        evidence_gaps:
          - Top 20 customers by revenue/gross profit, application/use case, start date, renewal date, contract term, NRR, churn and reference status.
        follow_up_questions:
          - Provide top-customer schedule and permission for independent reference calls across aerospace, automotive, semiconductor, energy and healthcare segments.
        table_ids:
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-014
          - EC-015
          - EC-024
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Quest publicly lists strategic partners across cloud, AI, data, semiconductor and automotive ecosystems. These relationships support credibility but do not reveal commercial terms, co-sell contribution, exclusivity or renewal status.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Quest lists NVIDIA, Microsoft, AWS, GCP, Databricks, Arm, TSMC, Renesas and NXP partner relationships.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-007
          - finding_id: III.B-F2
            finding: NVIDIA and Renesas partner pages provide domain-specific AI, digital-twin, ADAS/SDV and edge-AI positioning.
            evidence_claim_ids:
              - EC-010
              - EC-011
            risk_ids:
              - R-007
              - R-010
        hidden_risks:
          - Partner badges may be non-exclusive and may not generate material pipeline, revenue or differentiation.
        evidence_gaps:
          - Partner agreements, certification rosters, sourced pipeline, partner-influenced revenue, renewal dates, co-marketing obligations and technical enablement.
        follow_up_questions:
          - Provide a partner-by-partner commercial schedule and evidence of active joint deployments.
        table_ids:
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-009
          - EC-010
          - EC-011
