    claim_text: Quest Global is a private unicorn with a 2023 valuation around US$1.8B and credible later pre-IPO valuation signals.
    claim_source: CB Insights, Carlyle/Quest announcement and independent media reports
    claim_date: 2023-08-08
    mapped_chapter_ids:
