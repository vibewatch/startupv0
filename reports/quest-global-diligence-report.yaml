        summary: Quest Global publicly offers broad engineering services across digital/software, embedded/silicon, mechanical/operations/PLM/EPCM and controls/testing, serving aerospace, automotive, hi-tech, energy, industrial, medtech, rail and semiconductor sectors. The model appears project/program and strategic-account oriented rather than productized self-serve software.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: The services page lists ten major service lines.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-005
              - R-006
          - finding_id: II.A-F2
