            finding: Reviewed public materials did not disclose material severed customer or partner relationships.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-003
        hidden_risks:
          - Loss of a strategic account or partner may be commercially sensitive and unlikely to appear publicly.
        evidence_gaps:
