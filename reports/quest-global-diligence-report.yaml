report_metadata:
  report_title: Quest Global Startup Diligence Report
  target_company: Quest Global
  website: https://www.questglobal.com/
  known_aliases:
    - QuEST Global
    - Quest Global Services Pte. Ltd.
    - QuEST Global Services, Pte. Ltd.
    - Quest Global Services N.A., Inc.
    - QuEST Global Services-North America
  sector: Engineering research and development services; digital, embedded, semiconductor and product engineering services
  geography: Singapore-headquartered with global delivery footprint across 20 countries and major India engineering presence
  company_stage: Private unicorn / pre-IPO reported
  research_date: 2026-05-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Asia/Singapore
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research skill workflow and structured the output to the repository report schema.
    - Prioritized primary company pages, investor transaction announcements, public market databases, partner pages, legal/settlement records and independent business media.
    - Treated public company claims as verified only for existence of the public statement; financial, customer, contract and control-effectiveness claims require private confirmation.
    - No companion planning notes were created; this YAML file is the final report artifact.
  included_jurisdictions:
    - Singapore
    - India
    - United States
    - European Union / GDPR context
    - Global delivery jurisdictions referenced by company sources
  excluded_topics:
    - Private data-room financial statements, customer contracts, cap table, option plan, debt agreements, tax filings, board minutes, insurance policies and supplier agreements were not available.
    - Paid docket services, authenticated company registries, non-public background checks, customer reference calls and management interviews were not accessed.
    - No legal opinion, valuation opinion, tax advice or investment recommendation is provided.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Quest Global public-source startup diligence report
      type: workflow_request
      date_received: 2026-05-17
      notes: No founder deck, management responses, financial model or private data room was provided.
founder_claims:
