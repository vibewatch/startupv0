        table_ids:
          - T-005
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-024
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public sources list technology partners but not supplier spend, subcontractor concentration, contractor workforce, tool/license dependence, real-estate obligations or vendor/security addenda.
        verification_status: partially_verified
        confidence: medium
        key_findings:
