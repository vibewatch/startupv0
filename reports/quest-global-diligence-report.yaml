executive_summary:
  overall_assessment: Quest Global is a credible private unicorn/pre-IPO engineering services company with substantial public evidence of scale, longevity, global footprint, investor backing, broad service/industry coverage and technology partnerships. The core diligence challenge is not existence; it is financial quality, customer concentration, contract risk, labor/compliance controls and valuation support, none of which are sufficiently public for underwriting.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence with a high-information-gap posture. Public sources support a real large-scale ER&D services platform and a plausible IPO-track story, but any investment or transaction decision should depend on audited financials, cap table, customer economics, utilization, legal/compliance review and proof that partner/service breadth produces durable margins against strong ER&D competition.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Quest Global publicly states it is Singapore-headquartered with 22K+ employees, 20 countries and 100 delivery centers/offices.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Carlyle/Quest announced the 2023 strategic partnership with Carlyle acquiring a significant minority stake, Bain/Advent exiting, company share repurchase and CEO Ajit Prabhu increasing stake.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: Quest’s public services and industries pages support a broad ER&D services portfolio across major regulated engineering verticals.
      evidence_claim_ids:
        - EC-006
        - EC-007
    - founder_claim_id: FC-005
      summary: Quest publicly lists major cloud, AI, data, semiconductor and automotive technology partners.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Revenue, margins, cash, debt, backlog, burn and utilization are not public.
    - risk_id: R-003
      summary: Top customers, concentration, contract terms, churn/NRR and severed relationships are not public despite a fewer/deeper relationship strategy.
    - risk_id: R-004
      summary: Aerospace-worker no-poach/compensation settlement context creates HR compliance and reputational diligence requirements.
    - risk_id: R-006
      summary: ER&D and digital engineering services competition is intense and public materials do not prove durable differentiation or pricing power.
    - risk_id: R-009
      summary: Aerospace/defense, semiconductor, medtech, energy and global delivery create privacy, export-control, security and regulatory burdens.
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, cash/debt/burn, backlog, utilization, revenue by service line and customer/project gross margin.
    - Current cap table, preferences, investor rights, option pool, debt, share repurchase details and IPO/redomiciliation materials.
    - Top customer contracts, revenue concentration, churn/NRR, renewal dates, severed relationships and independent customer references.
    - Sales productivity, pipeline, bookings, CAC/payback, marketing budget and partner-sourced revenue.
    - Complete litigation/regulatory/IP docket review, insurance, material contracts, privacy/security/export-control audits and HR remediation evidence.
  recommended_next_steps:
    - Run financial confirmatory diligence before relying on any public valuation signal.
    - Have counsel conduct global litigation, regulatory, IP, employment, export-control, privacy and material-contract review.
    - Validate customer concentration, strategic-account durability and gross margin through customer references and contract review.
    - Benchmark Quest against LTTS, Tata Elxsi, Cyient, global IT services firms and OEM captives using win/loss, pricing and margin data.
    - Reconcile headcount definitions, employee/contractor mix, attrition, utilization and compensation inflation across delivery centers.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Quest Global’s private-unicorn status, 2023 Carlyle transaction, major footprint metrics and later pre-IPO valuation reporting, but audited financial statements, revenue, margins, cash, debt, cap table, backlog, burn and projections are not public. Financial underwriting cannot proceed beyond triangulation until data-room materials are produced.
    founder_claim_ids:
      - FC-001
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-005
      - EC-024
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements, quarterly financials, revenue, gross margin, EBITDA, cash-flow, debt, burn or backlog disclosures were found in public sources. Available public materials are transaction/footprint/marketing disclosures rather than financial statements.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources reviewed disclose scale and valuation signals but not revenue, margin, cash, debt or burn metrics.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-001
        hidden_risks:
          - A large services company can grow headcount while masking low utilization, margin compression, project overruns or working-capital pressure.
        evidence_gaps:
          - Audited FY2023-FY2025 statements, monthly management accounts, revenue recognition policy, cash/debt schedule, backlog, utilization and customer/project gross margin.
        follow_up_questions:
          - Provide audited annual financials, current year-to-date management accounts and KPI bridge by service line, geography and customer.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-024
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources provide valuation signals but no board-approved forecast, pipeline conversion model, hiring plan, utilization forecast, budget-to-actual bridge or IPO plan. Business Times reported a possible US$4.6B pre-IPO price, while earlier evidence anchors the 2023 valuation around US$1.8B-nearly US$2B.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: CB Insights lists Quest Global at US$1.8B on 2023-08-08.
            evidence_claim_ids:
              - EC-001
            risk_ids:
              - R-002
          - finding_id: I.B-F2
            finding: Business Standard reported approximately US$500M for roughly 28% at nearly US$2B valuation; Business Times later reported a possible US$4.6B pre-IPO price.
            evidence_claim_ids:
              - EC-004
              - EC-005
            risk_ids:
              - R-002
        hidden_risks:
          - Pre-IPO valuation reporting may reflect negotiation dynamics, secondary liquidity, redomiciliation or IPO scarcity premium rather than operating fundamentals.
        evidence_gaps:
          - Board-approved plan, IPO readiness pack, pipeline by probability, hiring budget, forecast model, budget-to-actual history and valuation support materials.
        follow_up_questions:
          - Provide the current operating plan, IPO/readiness timeline, valuation bridge from 2023 to current and downside sensitivities.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-004
          - EC-005
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: The 2023 transaction publicly identifies Carlyle, Bain Capital, Advent International, Quest share repurchase and additional CEO stake purchase, but the current fully diluted cap table, security classes, preferences, debt and governance rights are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Carlyle became a significant minority investor while Bain and Advent exited and Quest Global repurchased shares.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: Business Standard provided a media estimate of investment size and stake percentage.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-002
        hidden_risks:
          - Investor rights, liquidation preferences or debt covenants may materially alter common-equity value even if headline valuation is high.
        evidence_gaps:
          - Fully diluted cap table, shareholder agreements, option plan, investor rights, liquidation waterfall, share repurchase approvals and debt/convertible agreements.
        follow_up_questions:
          - Provide current cap table, security classes, voting rights, board rights, option pool and all post-2023 financing/secondary/debt documents.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-024
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public sources support ongoing operations and pre-IPO/private status, but do not disclose bank facilities, liens, tax exposures, insurance, related-party transactions or contingent liabilities.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Business Times described Quest as preparing for an India IPO rather than already public, and Quest continues to publish operating announcements.
            evidence_claim_ids:
              - EC-005
              - EC-013
            risk_ids:
              - R-002
          - finding_id: I.D-F2
            finding: No public debt, lien, tax, insurance or contingent-liability schedules were found.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-001
        hidden_risks:
          - Entity redomiciliation, IPO preparation, offshore delivery centers and share repurchases can create tax, legal and cash commitments not visible publicly.
        evidence_gaps:
          - Entity chart, statutory accounts, tax filings, lien searches, insurance, debt, related-party schedules and contingent liabilities.
        follow_up_questions:
          - Provide legal entity chart, tax/residency plan, lender/lease obligations, insurance policies and counsel/accountant confirmation of private status.
        table_ids:
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-005
          - EC-013
          - EC-024
  - chapter_id: II
    title: Products
    chapter_summary: Quest Global is not a narrow SaaS startup; it is a large engineering services company with a broad services taxonomy and regulated-industry delivery model. Public evidence verifies advertised service lines and vertical coverage, while revenue mix, customer outcomes, delivery quality, IP ownership and margin by product/service line remain private.
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
