risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and unit-economics unknown
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources do not disclose revenue, margins, EBITDA, cash, debt, burn, backlog, utilization, revenue recognition or working-capital dynamics.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-024
    mitigation_or_diligence_request: Require audited financials, monthly management accounts, customer/project margin, utilization, backlog, cash/debt and runway before underwriting.
  - risk_id: R-002
    risk_title: Valuation and IPO transaction uncertainty
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation signals range from US$1.8B to nearly US$2B in 2023 and a reported possible US$4.6B pre-IPO price; actual terms, preferences and IPO timing are unknown.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-005
    mitigation_or_diligence_request: Obtain transaction documents, cap table, financing history, liquidation waterfall, secondary terms and IPO/redomiciliation workstreams.
  - risk_id: R-003
    risk_title: Customer concentration and relationship economics unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Quest emphasizes fewer, deeper relationships, but top customers, revenue concentration, renewal dates, pricing power and severed relationships are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids:
      - EC-014
      - EC-015
      - EC-024
    mitigation_or_diligence_request: Request top-customer schedule, contracts, renewals, margins, NRR/churn and customer references.
  - risk_id: R-004
    risk_title: Labor and no-poach settlement signal
    risk_category: legal
    severity: high
    likelihood: medium
    description: Aerospace worker antitrust settlement materials identify Quest Global Services N.A. in a compensation/no-poach litigation context, creating HR compliance and reputational diligence needs.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.F
      - VIII.A
      - VIII.G
    evidence_claim_ids:
      - EC-019
      - EC-020
      - EC-021
    mitigation_or_diligence_request: Counsel should review docket/settlement, insurance recovery, release scope, HR compliance changes, recruiting policies and training evidence.
  - risk_id: R-005
    risk_title: Execution risk across distributed global delivery centers
    risk_category: operational
    severity: high
    likelihood: medium
    description: Quest operates a large multi-country delivery footprint across complex engineering domains; utilization, quality, security, export-control and customer delivery KPIs are not public.
    impacted_chapter_ids:
      - II
      - VI
      - VII
    impacted_section_ids:
      - II.A
      - VI.A
      - VII.B
    evidence_claim_ids:
      - EC-002
      - EC-006
      - EC-007
      - EC-023
    mitigation_or_diligence_request: Review center-level utilization, project quality, incident rates, certifications, delivery SLAs, export-control process and customer references.
