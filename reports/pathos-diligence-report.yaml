report_metadata:
  report_title: Pathos Startup Diligence Report
  target_company: Pathos
  website: https://www.pathos.com/
  known_aliases:
    - Pathos AI
    - Pathos AI, Inc.
  sector: AI-enabled clinical-stage biotechnology / precision oncology drug development
  geography: United States / Chicago, Illinois and New York public news datelines
  company_stage: Private unicorn / clinical-stage biotech
  research_date: 2026-05-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth with company-owned public pages, public financing announcements and CB Insights unicorn data.
    - Treated company-published statements as evidence that the company made the statement; clinical, regulatory, financial, legal and commercial outcomes require primary documents.
    - No private data-room materials, customer references, contracts, audited financials, HRIS exports or board materials were available.
  included_jurisdictions:
    - United States
    - Chicago
    - United States
    - Healthcare and data/privacy contexts tied to oncology collaborations
  excluded_topics:
    - Non-public financial statements, cap table, board minutes, customer contracts, HRIS files, clinical source documents, counsel opinions and full legal/regulatory dockets were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request and candidate Pathos row from fetched CB Insights unicorn table
      type: workflow_context
      date_received: 2026-05-17
      notes: "Candidate row: Pathos, US$1.60B, joined 2025-05-01, Chicago/United States, Healthcare & Life Sciences, investors New Enterprise Associates."
