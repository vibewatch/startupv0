            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-008
        hidden_risks:
          - Retention, employee claims or weak incentives could impair execution.
        evidence_gaps:
          - Compensation plans, option grants, turnover, employee claims and offer letters.
        follow_up_questions:
          - Provide compensation, equity and employee-relations schedules.
        table_ids:
          - T-017
        figure_ids: []
        evidence_claim_ids:
          - EC-008
  - chapter_id: VIII
    title: Legal and Related Matters
    chapter_summary: Public sources do not provide a counsel-grade legal, IP, regulatory, insurance or contract record.
    founder_claim_ids:
      - FC-008
    evidence_claim_ids:
      - EC-010
    risk_ids:
      - R-001
      - R-007
    sections:
      - section_id: VIII.A
        title: Pending lawsuits against the Company
        checklist_question_ids:
          - VIII.A
        summary: No complete litigation docket was produced by public-source review.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VIII.A-F1
            finding: Absence of public docket evidence is not proof of no litigation.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-007
        hidden_risks:
          - Undisclosed litigation, employment claims or product/data disputes could be material.
        evidence_gaps:
          - Counsel docket search and litigation schedule.
        follow_up_questions:
          - Have counsel provide litigation, claims and settlement schedule.
        table_ids:
          - T-018
        figure_ids: []
        evidence_claim_ids:
          - EC-010
      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids:
          - VIII.D
        summary: IP and license ownership cannot be confirmed from public sources alone.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.D-F1
            finding: Material rights require chain-of-title and license diligence.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-007
        hidden_risks:
          - Weak IP ownership or restrictive licenses could impair commercialization.
        evidence_gaps:
          - Patent schedule, assignments, licenses, FTO, open-source and contractor IP records.
        follow_up_questions:
          - Provide complete IP schedule and license agreements.
        table_ids:
          - T-019
        figure_ids: []
        evidence_claim_ids:
          - EC-010
      - section_id: VIII.E
        title: Insurance coverage and material contracts
        checklist_question_ids:
          - VIII.E
          - VIII.F
        summary: Insurance policies and material contracts are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.E-F1
            finding: Material contracts and insurance must be reviewed before closing diligence.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-007
        hidden_risks:
          - Underinsured clinical, product, data/privacy or D&O exposure could be material.
        evidence_gaps:
          - Insurance schedule, claims history and material contracts.
        follow_up_questions:
          - Provide insurance policies and all material contracts.
        table_ids:
          - T-020
        figure_ids: []
        evidence_claim_ids:
          - EC-010
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Clinical, privacy/data and healthcare regulatory exposure cannot be resolved publicly.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: Regulatory status is a gating diligence item.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-001
        hidden_risks:
          - Regulatory delay, data-rights/privacy defects or approval limits could impair value.
        evidence_gaps:
          - Regulatory correspondence, audits, complaints, adverse events and privacy reviews.
        follow_up_questions:
          - Provide all regulatory correspondence and agency/audit history.
        table_ids:
          - T-018
        figure_ids:
          - F-010
          - F-011
        evidence_claim_ids:
          - EC-010
