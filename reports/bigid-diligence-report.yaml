executive_summary:
  overall_assessment: BigID is an eligible uncovered private-unicorn target for this run based on current public list sources, active public company materials and absence from existing report slugs. Public evidence supports status screening, product existence and customer/partner signals, but investment-grade diligence remains unresolved because financials, cap table, customer economics, legal/regulatory posture and personnel data are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A thesis for BigID depends on proving durable revenue growth, retention, unit economics, product defensibility, regulatory/legal posture, leadership depth and financing terms beyond public-list valuation evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists BigID at $1.25B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: BigID publicly markets an active product platform.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-003
      summary: BigID has public customer, partner or demand-channel signals.
      evidence_claim_ids:
        - EC-005
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Private financial quality and valuation staleness
    - risk_id: R-002
      summary: Crowded data security and privacy platform competition
    - risk_id: R-003
      summary: Regulatory and customer liability exposure
  key_evidence_gaps:
    - Audited financial statements, monthly KPI pack, cash, debt, burn, tax and AR aging
    - Fully diluted cap table, preferences, option pool, SAFEs/notes, investor consents
    - Top customer revenue, contracts, renewal status, churn, NRR/GRR and references
    - Funnel conversion, CAC, payback, sales-cycle and quota attainment
    - Technical architecture, security reports, roadmap, incident history and model/product benchmarks
  recommended_next_steps:
    - Do not rely on public valuation without primary financing documents, cap table and quality-of-revenue analysis.
    - Run customer, cohort, contract and reference diligence before underwriting retention or concentration.
    - Have technical/security, legal/regulatory, IP and HR specialists review the relevant data-room artifacts before investment reliance.
