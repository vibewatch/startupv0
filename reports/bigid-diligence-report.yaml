report_metadata:
  report_title: BigID Startup Diligence Report
  target_company: BigID
  website: https://bigid.com/
  known_aliases:
    - BigID Inc.
    - BigID data security platform
  sector: Enterprise data security, DSPM, privacy, compliance and AI governance software
  geography: United States and Israel roots with global enterprise customers
  company_stage: Private unicorn / growth-stage enterprise data security company
  research_date: 2026-06-14
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from reports/*-diligence-report.yaml and excluded existing slugs before random selection.
    - Fetched current public unicorn-list sources including CB Insights and Wikipedia, then selected uncovered candidates with shuf.
    - Used public company pages, customer/partner/product pages, funding/list sources and competitor public websites for evidence-backed screening.
    - Treated company-owned statements as evidence of public claims, not independent proof of revenue, usage, retention or contract performance.
  included_jurisdictions:
    - United States
    - Public global markets referenced by company materials
  excluded_topics:
    - Private data-room records, management interviews, customer calls, counsel memoranda, paid databases, non-public regulatory correspondence and privileged documents were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-14
      notes: No pitch deck, financial model, data room, founder responses or customer references were provided.
