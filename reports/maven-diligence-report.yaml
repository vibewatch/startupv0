risk_register:
  - risk_id: R-001
    risk_title: Limited public financial detail
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources do not provide audited financials, revenue bridge, gross margin, burn,
      runway, AR aging, debt, or tax positions.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.D
    evidence_claim_ids:
      - EC-002
      - EC-009
    mitigation_or_diligence_request: Request audited financial statements, management accounts, KPI
      definitions, debt schedule, cash runway, tax/NOL analysis, and board plan-vs-actual packs.
  - risk_id: R-002
    risk_title: Customer concentration and retention unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public scale/customer claims do not disclose ARR by customer, logo concentration,
      churn, expansion, renewal status, or reference quality.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-004
      - EC-009
    mitigation_or_diligence_request: Request top-customer schedule, cohort retention, renewal pipeline,
      churned-customer interviews, and reference calls.
  - risk_id: R-003
    risk_title: Competitive pressure and differentiation durability
    risk_category: market
    severity: medium
    likelihood: high
    description: The target operates in a competitive category where incumbents and focused specialists
      can compete on bundle, price, distribution, or ecosystem.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.A
    evidence_claim_ids:
      - EC-003
      - EC-008
    mitigation_or_diligence_request: Request win/loss data, pipeline displacement reasons, pricing
      waterfall, and third-party customer references.
  - risk_id: R-004
    risk_title: Partner, supplier, and ecosystem dependencies
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Public sources imply reliance on implementation, cloud, provider, partner, or technical
      ecosystems, but supplier concentration and contract terms are private.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.B
      - III.E
      - V.C
      - VIII.F
    evidence_claim_ids:
      - EC-005
      - EC-009
    mitigation_or_diligence_request: Request supplier spend, SLAs, termination rights, redundancy,
      subcontractor controls, and business-continuity plans.
  - risk_id: R-005
    risk_title: Valuation and financing terms opacity
    risk_category: financing
    severity: medium
    likelihood: medium
    description: Public valuation anchors do not reveal liquidation preferences, secondary sales, debt,
      option pool, investor rights, or down-round protections.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-009
    mitigation_or_diligence_request: Request fully diluted cap table, financing documents, investor
      rights agreements, debt schedule, and waterfall model.
  - risk_id: R-006
    risk_title: Management depth and retention unknown
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public biographies do not provide full org chart, succession coverage, compensation,
      regretted attrition, or employee-relations issues.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.G
    evidence_claim_ids:
      - EC-006
      - EC-009
    mitigation_or_diligence_request: Request org chart, leadership scorecards, attrition data,
      compensation bands, equity-refresh plan, and employee relations matters.
  - risk_id: R-007
    risk_title: Security, privacy, and regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Public policies/certifications are useful but do not replace audit reports, incident
      logs, data-processing agreements, sector-specific compliance evidence, and legal/regulatory
      correspondence.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-007
      - EC-009
    mitigation_or_diligence_request: Request SOC/ISO reports, DPAs/BAAs where applicable, security
      questionnaire, incident log, regulator correspondence, and privacy impact assessments.
  - risk_id: R-008
    risk_title: Product roadmap and ROI validation
    risk_category: product
    severity: medium
    likelihood: medium
    description: Public product and roadmap claims require demos, adoption metrics, technical review,
      release evidence, and customer ROI validation.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-003
      - EC-010
    mitigation_or_diligence_request: Request product analytics, roadmap, release cadence, implementation
      KPIs, technical architecture, OSS/IP review, and customer ROI proof.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, revenue bridge, gross margin, cash, debt, AR
      aging, backlog, and plan-vs-actual data
    why_it_matters: Financial quality and runway cannot be underwritten from public sources alone
    suggested_source_or_request: CFO data room package and auditor/accountant workpapers
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, financing documents, option pool, liquidation
      preferences, notes/debt, and investor rights
    why_it_matters: Valuation and control economics may differ materially from headline valuation
    suggested_source_or_request: Corporate secretary / investor counsel
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: ARR by customer, top-20 contracts, renewal/churn/expansion cohorts, and customer references
    why_it_matters: Concentration and retention are core private-company risk drivers
    suggested_source_or_request: Sales ops, CRM export, and customer reference calls
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC, channel attribution, quota attainment, implementation
      capacity, and pipeline conversion
    why_it_matters: Growth efficiency cannot be validated from public marketing claims
    suggested_source_or_request: GTM operations dashboard and cohort analysis
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, product analytics, technical architecture, IP/OSS scans, and release-quality metrics
    why_it_matters: Product differentiation and technical debt require direct validation
    suggested_source_or_request: CTO/product data room and technical diligence sessions
    priority: medium
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Org chart, headcount by function/location, hiring plan, attrition,
      compensation, and equity refresh
    why_it_matters: Management depth and execution capacity are not publicly verifiable
    suggested_source_or_request: HRIS export and management interviews
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.F
    missing_information: SOC/ISO reports, DPAs/BAAs where applicable, security questionnaires, incident
      logs, legal claims, regulatory correspondence, contracts, and insurance policies
    why_it_matters: Legal, privacy, security, and contract risk cannot be concluded from public policies alone
    suggested_source_or_request: Counsel/security data room and insurance broker package
    priority: high
