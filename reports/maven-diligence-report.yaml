executive_summary:
  overall_assessment: Maven Clinic qualifies for a public-source diligence screen as a currently
    listed private unicorn with credible product and market evidence, but underwriting should remain
    gated on private financial, customer, legal, and security documents.
  investment_or_diligence_thesis: The public record supports a scaled category participant in Virtual
    clinic and benefits platform for women and family health, fertility, maternity, pediatrics,
    menopause, and health-plan populations; diligence should focus on whether headline valuation is
    supported by durable revenue quality, retention, gross margin, defensible product
    differentiation, and manageable legal/regulatory exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Maven Clinic as a current unicorn at $1.70B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company-owned sources substantiate the public product/category positioning.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-005
      summary: Public legal/privacy/security materials exist, but they are not substitutes for audit
        evidence.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Public sources do not provide audited financials, revenue bridge, gross margin, burn,
        runway, AR aging, debt, or tax positions.
    - risk_id: R-002
      summary: Public scale/customer claims do not disclose ARR by customer, logo concentration, churn,
        expansion, renewal status, or reference quality.
    - risk_id: R-003
      summary: The target operates in a competitive category where incumbents and focused specialists can
        compete on bundle, price, distribution, or ecosystem.
    - risk_id: R-004
      summary: Public sources imply reliance on implementation, cloud, provider, partner, or technical
        ecosystems, but supplier concentration and contract terms are private.
  key_evidence_gaps:
    - Audited financial statements, revenue bridge, gross margin, cash, debt, AR aging, backlog, and
      plan-vs-actual data
    - Fully diluted cap table, financing documents, option pool, liquidation preferences,
      notes/debt, and investor rights
    - ARR by customer, top-20 contracts, renewal/churn/expansion cohorts, and customer references
    - Sales productivity, CAC, channel attribution, quota attainment, implementation capacity, and
      pipeline conversion
    - Roadmap, product analytics, technical architecture, IP/OSS scans, and release-quality metrics
  recommended_next_steps:
    - Run management financial diligence before relying on headline valuation or scale metrics.
    - Perform customer reference calls and analyze ARR concentration, churn, expansion, and
      implementation cohorts.
    - Review security, privacy, legal, IP, insurance, and material-contract data-room materials.
    - Validate roadmap, technical architecture, product analytics, and competitive win/loss evidence.
