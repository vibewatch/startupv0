report_metadata:
  report_title: Thinking Machines Lab Public-Source Startup Diligence Report
  target_company: Thinking Machines Lab
  website: https://thinkingmachines.ai/
  known_aliases:
    - Thinking Machines
    - Thinking Machines Lab
    - Thinking Machines Labs
    - Tinker
  sector: Frontier AI research, customizable model training APIs, and AI infrastructure platforms
  geography: United States headquartered; public sources indicate San Francisco, California
  company_stage: Private unicorn; publicly reported $12B valuation after July 2025 seed financing
  research_date: 2026-05-23
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified public eligibility first using public-company, funding, and operating-status signals before drafting the report.
    - Prioritized company-owned sources for product, research, hiring, and partnership claims, then cross-checked funding and compute claims against independent news and NVIDIA-owned publications.
    - Used public technical repositories, job postings, LinkedIn company data, CourtListener, and SEC company-ticker data to test product, hiring, legal, and public-company assertions.
    - Treated all company-authored product, customer, partnership, and research statements as public claims needing follow-up; no private financials, customer contracts, cap table, or board records were available.
  included_jurisdictions:
    - United States
    - California
  excluded_topics:
    - Audited financial statements, management accounts, tax returns, board minutes, cap table ledgers, debt agreements, and investor side letters were not publicly available.
    - Customer, supplier, investor, and employee interviews were not performed.
    - Paid legal, trademark, patent, procurement, app-usage, and private-company databases were not used.
    - Full PACER, state corporate registry, and insurance-record searches were outside this public-source pass.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-23
      notes: The user requested a standard-depth diligence report on Thinking Machines Lab and provided no private company materials or founder-provided claims.

