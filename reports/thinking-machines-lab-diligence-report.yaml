diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited or management financial statements, trial balances, cash burn, runway, revenue, gross margin, backlog, AR aging.
    why_it_matters: Public sources cannot determine financial quality, solvency, revenue predictability, or valuation support.
    suggested_source_or_request: CFO/controller data room with inception-to-date financials and board-approved plan.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Three-year projections, utilization assumptions, compute commitments, pricing policies, and sensitivity cases.
    why_it_matters: The NVIDIA partnership and $12B valuation make scenario analysis essential.
    suggested_source_or_request: Board model, pricing model, compute utilization plan, and downside cases.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, investor rights, option pool, debt/warrants/notes, and side letters.
    why_it_matters: Dilution, liquidation preferences, and strategic rights can materially change investor economics and control.
    suggested_source_or_request: Legal closing binder, pro forma cap table, stock plan, and debt schedule.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Tinker usage cohorts, uptime, training-job success, paid conversion, retention, gross margin, and security controls.
    why_it_matters: Public product claims do not prove scalable, reliable, margin-positive product-market fit.
    suggested_source_or_request: Product analytics, infra dashboards, incident logs, security reviews, and product P&L.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, top-15 customer list, contract values, churn, backlog, and greater-than-5-percent accounts.
    why_it_matters: Customer concentration and revenue predictability are not publicly assessable.
    suggested_source_or_request: Customer revenue schedule, contracts, CRM export, usage logs, and reference-call list.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend, NVIDIA commitments, cloud/data-center contracts, and alternative suppliers.
    why_it_matters: Supplier concentration may drive cost, availability, and operational continuity.
    suggested_source_or_request: Supplier contracts, vendor spend report, capacity roadmap, and contingency plan.
    priority: high
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss data, competitive benchmarks, pricing comparisons, and market share.
    why_it_matters: Differentiation and pricing power cannot be proven from public research posts alone.
    suggested_source_or_request: Sales win/loss pack, technical benchmark workpapers, and customer evaluation notes.
    priority: high
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quotas, sales cycle, CAC, pipeline, and quota capacity.
    why_it_matters: The public record does not show whether the company can build a repeatable GTM motion.
    suggested_source_or_request: CRM, sales plan, quota model, comp plan, and marketing budget.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D roadmap, development budget, safety gates, model benchmarks, and launch milestones.
    why_it_matters: Technical ambition must be tied to product launch, revenue, safety, and compute economics.
    suggested_source_or_request: Product roadmap, model evals, red-team reports, R&D budget, and milestone reviews.
    priority: high
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.B
    missing_information: Verified headcount by function/location, hiring plan, payroll, and contractor roster.
    why_it_matters: LinkedIn and job-board signals are not reliable for burn, execution capacity, or org design.
    suggested_source_or_request: HRIS export, payroll roster, hiring plan, and contractor schedule.
    priority: medium
  - gap_id: G-011
    chapter_id: VII
    section_id: VII.D
    missing_information: Executive compensation, benefits, employment agreements, retention grants, and turnover data.
    why_it_matters: Talent retention and burn are material in frontier AI.
    suggested_source_or_request: Employment agreements, compensation bands, option grants, attrition data, and benefits plan.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Patent/trademark register, invention assignments, OSS compliance, model licenses, and training-data provenance.
    why_it_matters: AI startups face material IP and data-rights exposure.
    suggested_source_or_request: Counsel IP schedule, OSS scan, SBOM, contributor agreements, and data provenance memo.
    priority: high
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.F
    missing_information: NVIDIA agreement, customer terms, DPAs, supplier contracts, and investor side letters.
    why_it_matters: Material contracts can contain obligations not visible in public announcements.
    suggested_source_or_request: Contract data room and counsel summary of key terms.
    priority: high
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, limits, exclusions, and claims history.
    why_it_matters: AI, data, IP, cyber, D&O, and infrastructure exposures need coverage mapping.
    suggested_source_or_request: Broker schedule, policies, endorsements, exclusions, and claims history.
    priority: medium
  - gap_id: G-015
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, export-control analysis, AI safety governance, and privacy/security compliance records.
    why_it_matters: Public absence of regulator action does not prove compliance readiness.
    suggested_source_or_request: Compliance data room, counsel memo, safety committee minutes, and incident logs.
    priority: high

