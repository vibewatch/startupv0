risk_register:
  - risk_id: R-001
    risk_title: No public operating financials or revenue quality evidence
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources do not disclose audited or management financials, ARR, usage revenue, gross margin, burn, runway, backlog, or AR aging.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
    evidence_claim_ids:
      - EC-016
      - EC-025
    mitigation_or_diligence_request: Request inception-to-date financials, board plan, revenue schedules, billings, cash burn, runway, AR aging, and backlog.
  - risk_id: R-002
    risk_title: $12B valuation execution hurdle
    risk_category: financing
    severity: high
    likelihood: medium
    description: A $12B valuation shortly after launch requires rapid commercial proof, product reliability, and defensible differentiation.
    impacted_chapter_ids:
      - I
      - IV
    impacted_section_ids:
      - I.C
      - IV.A
    evidence_claim_ids:
      - EC-003
      - EC-016
    mitigation_or_diligence_request: Review financing model, milestone plan, investor materials, valuation comps, and downside scenarios.
  - risk_id: R-003
    risk_title: NVIDIA compute supplier and commitment concentration
    risk_category: operational
    severity: high
    likelihood: medium
    description: The announced one-gigawatt Vera Rubin deployment could create material supplier, capex, delivery, utilization, and contractual dependence.
    impacted_chapter_ids:
      - I
      - III
      - VI
      - VIII
    impacted_section_ids:
      - I.B
      - III.E
      - VI.B
      - VIII.F
    evidence_claim_ids:
      - EC-011
      - EC-023
    mitigation_or_diligence_request: Review NVIDIA agreements, deployment milestones, minimum commitments, financing terms, alternative suppliers, and utilization model.
  - risk_id: R-004
    risk_title: Early product maturity and monetization proof gap
    risk_category: product
    severity: high
    likelihood: high
    description: Tinker is young and was launched as a private beta; no public paid conversion, uptime, retention, or gross-margin metrics are available.
    impacted_chapter_ids:
      - II
      - V
      - VI
    impacted_section_ids:
      - II.A
      - V.B
      - VI.B
    evidence_claim_ids:
      - EC-005
      - EC-021
      - EC-025
    mitigation_or_diligence_request: Request product usage cohorts, uptime, job success rates, support tickets, paid conversion, retention, and product P&L.
  - risk_id: R-005
    risk_title: Customer concentration and reference gap
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public sources name pilots but not top customers, revenue concentration, churn, contracts, or satisfaction.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-007
      - EC-025
    mitigation_or_diligence_request: Run reference calls and request top-customer schedules, contracts, usage, NPS, renewal, churn, and expansion data.
  - risk_id: R-006
    risk_title: Competitive intensity and pricing pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Cloud AI vendors, frontier labs, and open-source stacks can compete on model quality, price, distribution, and enterprise trust.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.A
    evidence_claim_ids:
      - EC-020
      - EC-012
      - EC-013
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Request win/loss data, benchmark comparisons, pricing analysis, switching-cost evidence, and roadmap differentiation.
  - risk_id: R-007
    risk_title: Key-person and talent retention risk
    risk_category: team
    severity: high
    likelihood: medium
    description: Company credibility heavily depends on a small set of prominent founders and senior AI researchers; compensation and turnover data are private.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.A
      - VII.C
      - VII.G
      - VI.A
    evidence_claim_ids:
      - EC-004
      - EC-009
      - EC-010
      - EC-028
    mitigation_or_diligence_request: Review employment agreements, equity vesting, retention plans, attrition, references, and succession planning.
