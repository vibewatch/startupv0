      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids:
          - VIII.D
        summary: The public cookbook is Apache-2.0 licensed, but patent, trademark, proprietary-model, training-data, and invention-assignment positions were not fully verified.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.D-F1
            finding: The tinker-cookbook repository metadata and license indicate Apache-2.0 licensing for the cookbook.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-010
          - finding_id: VIII.D-F2
            finding: Published research and open-source examples increase transparency but require careful IP and license compliance controls.
            evidence_claim_ids:
              - EC-008
              - EC-012
              - EC-014
            risk_ids:
              - R-008
              - R-010
        hidden_risks:
          - Prior-employer IP, training data, model weights, and third-party open-source dependencies could create hidden claims.
          - Trademark and patent ownership were not confirmed through official registries in this pass.
        evidence_gaps:
          - Patent and trademark schedule, invention assignments, open-source bill of materials, third-party licenses, and training-data provenance.
        follow_up_questions:
          - Provide IP register, OSS compliance scan, employee invention assignments, and model/data provenance documentation.
        table_ids:
          - T-019
          - T-021
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-019
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: Insurance coverage was not publicly available.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.E-F1
            finding: Frontier AI, customer data, open-source software, and large compute dependencies create exposures that should be mapped to cyber, E&O, D&O, EPLI, and property/business-interruption coverage.
            evidence_claim_ids:
              - EC-024
              - EC-027
              - EC-030
            risk_ids:
              - R-008
              - R-009
              - R-013
        hidden_risks:
          - Insurance exclusions for AI outputs, IP infringement, data leakage, or infrastructure outage could leave material uncovered loss.
        evidence_gaps:
          - Insurance policies, limits, exclusions, claims history, and broker summaries.
        follow_up_questions:
          - Provide insurance schedule and map exclusions to AI, data, IP, cyber, and infrastructure risks.
        table_ids:
          - T-020
          - T-021
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-024
          - EC-030
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Public material contracts include clear evidence of an NVIDIA strategic partnership and public Tinker data commitments, but actual agreements are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: VIII.F-F1
            finding: The NVIDIA partnership and significant investment are material; detailed contract terms are not public.
            evidence_claim_ids:
              - EC-011
              - EC-023
            risk_ids:
              - R-003
              - R-011
          - finding_id: VIII.F-F2
            finding: Tinker public terms state data is used solely to fine-tune user models and not train Thinking Machines Lab's models, but the enforceable customer-contract package was not reviewed.
            evidence_claim_ids:
              - EC-027
            risk_ids:
              - R-008
        hidden_risks:
          - Material agreements may contain exclusivity, MFNs, data rights, liability caps, audit obligations, or minimum commitments.
        evidence_gaps:
          - NVIDIA agreement, customer terms, DPAs, enterprise contracts, investor rights, supplier contracts, and data-center agreements.
        follow_up_questions:
          - Provide all material contracts and a summary of exclusivity, MFN, data, IP, termination, and liability provisions.
        table_ids:
          - T-020
          - T-021
        figure_ids: []
        evidence_claim_ids:
          - EC-011
          - EC-023
          - EC-027
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No public regulatory agency problems were found in this pass, and no SEC public-company record matched; nevertheless frontier AI and customer-data handling merit regulatory diligence.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: SEC company-ticker data did not show a public-company match for Thinking Machines Lab, supporting private-company status but not proving absence of all regulatory filings.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-013
          - finding_id: VIII.G-F2
            finding: No public regulatory agency problem was identified, but searches were not exhaustive across every federal, state, international, or AI-specific regulator.
            evidence_claim_ids:
              - EC-024
              - EC-030
            risk_ids:
              - R-009
              - R-013
        hidden_risks:
          - AI safety, privacy, export control, model-evaluation, employment, and procurement obligations may emerge faster than public disclosures.
        evidence_gaps:
          - Regulatory correspondence, compliance policies, privacy impact assessments, export-control analysis, and AI safety governance records.
        follow_up_questions:
          - Has the company received inquiries from regulators or government customers, or made commitments under AI safety or export-control regimes?
        table_ids:
          - T-018
          - T-021
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-018
          - EC-024
          - EC-030

