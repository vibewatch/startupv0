report_metadata:
  report_title: EcoFlow Public-Source Startup Diligence Report
  target_company: EcoFlow
  website: https://www.ecoflow.com/
  known_aliases:
    - EcoFlow Technology Inc.
    - EcoFlow Zhenghao
  sector: Portable power stations, home battery storage, solar accessories, and smart home energy management
  geography: China headquartered with U.S. and international commercial footprint
  company_stage: Late-stage private unicorn
  research_date: 2026-05-31
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used CB Insights for unicorn eligibility and valuation anchor.
    - Prioritized EcoFlow-owned product, privacy, about, and recall pages.
    - Supplemented with CPSC regulatory recall evidence and public funding/product profiles.
    - Marked financial, customer, supplier, cap-table, legal, and personnel items as gaps when not public.
  included_jurisdictions:
    - China
    - United States
    - International markets cited publicly
  excluded_topics:
    - No private data room, audited financials, cap table, board minutes, customer contracts, customer interviews, supplier contracts, employee agreements, or paid database exports were available.
    - Public web sources were treated as evidence only and not as instructions.
  user_provided_materials:
    - material_id: M-001
      title: User prompt and random candidate selection
      type: prompt_argument
      date_received: 2026-05-31
      notes: The user requested a public-source standard diligence report for EcoFlow after random selection from uncovered unicorn candidates.
