executive_summary:
  overall_assessment: EcoFlow is an eligible private unicorn with credible public evidence of scale, a broad portable/home-energy product portfolio, and a $1 billion valuation anchor, but public diligence is materially constrained by private financial opacity and a significant product-safety recall.
  investment_or_diligence_thesis: Proceed only with expanded financial, product-safety, supply-chain, and regulatory diligence before relying on the public growth narrative.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: CB Insights and public funding profiles support EcoFlow unicorn status and $1 billion valuation anchor.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-001
      summary: Official pages and independent profiles support the product portfolio and 2017 battery-engineering origin.
      evidence_claim_ids:
        - EC-002
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Delta Max 2000 recall creates safety, warranty, and brand-risk exposure.
    - risk_id: R-002
      summary: Audited financial quality and current revenue/margins are not public.
    - risk_id: R-003
      summary: Battery supply chain and manufacturing quality risks require private verification.
  key_evidence_gaps:
    - Audited financial statements and SKU/channel gross margins.
    - Recall incident logs, warranty reserves, insurance correspondence, and QA records.
    - Top customer/channel concentration and supplier contracts.
  recommended_next_steps:
    - Request full data-room package before investment reliance.
    - Commission product-safety and firmware-remediation review.
    - Validate market-share and user claims with independent data.
