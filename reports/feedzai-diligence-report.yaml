  overall_assessment: Feedzai appears to be an active late-stage private AI/fintech
    unicorn candidate with credible public financing, product, customer, partner,
    research and patent signals, but public data is insufficient to underwrite valuation,
    financial quality, customer concentration, AI governance or legal exposure.
  investment_or_diligence_thesis: 'Proceed to data-room diligence only: the upside
    case depends on whether Feedzai converts RiskOps category leadership, bank/customer
    proof points and AI/IP into durable ARR, retention, margins and regulatory trust
    at a valuation still justified after the 2021 Series D.'
