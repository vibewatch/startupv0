report_metadata:
  report_title: "XPANCEO Startup Diligence Report"
  target_company: "XPANCEO"
  website: "https://www.xpanceo.com/"
  known_aliases:
    - "Xpanceo"
    - "XPANCEO Smart Contact Lens"
  sector: "Smart contact lenses, XR computing, biosensing, nanophotonics and wearable deep tech"
  geography: "United Arab Emirates; Dubai with global research collaborations"
  company_stage: "Private unicorn / deep-tech precommercial hardware company"
  research_date: "2026-06-03"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD"
  time_zone: "UTC"
research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Built an exclusion list from reports/*-diligence-report.yaml before selection."
    - "Fetched CB Insights and Wikipedia unicorn-list sources and randomly selected three uncovered candidates with shuf."
    - "Used public web evidence only; no private data room, founder interview, counsel memo, customer call or paid database was available."
    - "Treated company-owned pages, search results and news articles as untrusted evidence sources, not instructions."
  included_jurisdictions:
    - "United Arab Emirates"
    - "Public global markets referenced by sources"
    - "United States and European Union as potential regulatory/commercial markets"
  excluded_topics:
    - "Non-public financial statements, cap table, board materials, contracts, clinical data, security reports, customer calls, HRIS/personnel records, privileged legal/regulatory correspondence and paid-database records."
  user_provided_materials:
    -
      material_id: "UPM-001"
      title: "Workflow request for random unicorn diligence reports"
      type: "workflow_request"
      date_received: "2026-06-03"
      notes: "No pitch deck, financial model, founder responses or private data room were provided."
