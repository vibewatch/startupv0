report_metadata:
  report_title: VAST Data Public-Source Startup Diligence Report
  target_company: VAST Data
  website: https://www.vastdata.com
  known_aliases:
    - VAST Data, Inc.
    - VAST
  sector: Enterprise data infrastructure and AI data platform
  geography: United States; New York, New York
  company_stage: Private venture-backed unicorn
  research_date: 2026-05-30
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used CB Insights current unicorn list for eligibility and valuation status.
    - Used company-owned public pages for product, customer/proof-point, privacy/terms, careers, and dependency evidence.
    - Marked private financial, cap-table, customer, legal, security, and contract records as not publicly verifiable.
  included_jurisdictions:
    - United States
  excluded_topics:
    - Paid dockets, private data-room files, management interviews, customer reference calls, and non-public
      security/compliance audits.
  user_provided_materials: []
founder_claims: []
executive_summary:
  overall_assessment: VAST Data has public evidence supporting private-unicorn status at $80B and a coherent an AI-era
    enterprise data platform and AI Operating System positioning. The main diligence blockers are private financial
    quality, valuation support, customer concentration, product economics, operational dependencies, regulatory/security
    posture, and governance records.
  investment_or_diligence_thesis: "Proceed only with full data-room verification: public sources support the category
    narrative, but do not prove ARR quality, gross margin, retention, concentration, supplier resilience, compliance, or
    exit economics."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists VAST Data at $80B.
      evidence_claim_ids:
        - E1
    - founder_claim_id: FC-002
      summary: VAST says it reimagined data management for the AI era with an enterprise software platform built to power AI
        factories and agents at hyperscale, and that its AI Operating System connects and understands enterprise data.
      evidence_claim_ids:
        - E2
    - founder_claim_id: FC-003
      summary: The VAST platform page lists VAST DataStore, VAST DataBase, VAST DataSpace, and VAST AI Operating System,
        including all-flash file/object/table storage and low-latency query processing across structured and
        unstructured data.
      evidence_claim_ids:
        - E3
  biggest_risks:
    - risk_id: R1
      summary: Financial quality and unit economics not public
    - risk_id: R2
      summary: Cap table and valuation support opaque
    - risk_id: R3
      summary: Customer concentration and retention unknown
    - risk_id: R4
      summary: Competitive pricing and differentiation pressure
    - risk_id: R5
      summary: Product and roadmap execution risk
    - risk_id: R6
      summary: Operational dependency risk
  key_evidence_gaps:
    - Audited financials, revenue/ARR bridge, margin, burn, runway, debt, and budget-to-actuals are not public.
    - Cap table, preferred terms, secondary/tender documents, investor rights, and option pool are not public.
    - Customer concentration, contract terms, churn, renewal cohorts, backlog, and reference calls are not public.
    - Security/compliance audits, litigation/regulatory schedules, IP assignments, and material supplier/customer
      contracts require private diligence.
  recommended_next_steps:
    - Request financial, cap-table, customer, legal, security, supplier, and HR data-room materials.
    - Interview management on revenue quality, product differentiation, dependency resilience, and compliance controls.
    - Run customer, partner, supplier, and technical reference checks.
