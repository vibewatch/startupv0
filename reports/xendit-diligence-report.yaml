  - figure_id: F-011
    title: Risk register heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of top diligence risks by severity and likelihood.
    purpose: Make the top risks PR-summary friendly and tied to evidence.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and valuation support are not public
          severity: high
          likelihood: medium
          rationale: Public sources verify financing, pricing and stale TPV-growth claims, but do not disclose audited revenue, take rate, gross margin, burn, cash runway, ARR/TPV bridge or support for any post-2021 valuation.
          evidence_claim_ids: &a1
            - EC-004
            - EC-013
            - EC-014
            - EC-017
          source_ids:
            - SRC-004
            - SRC-002
            - SRC-003
            - SRC-006
            - SRC-007
            - SRC-001
            - SRC-008
            - SRC-010
        - risk_id: R-002
          label: Multi-jurisdiction fintech regulatory and licensing exposure
          severity: high
          likelihood: medium
          rationale: Xendit operates regulated payment/remittance/VASP/lending activities across several Asian jurisdictions; public license claims require regulator confirmation and review of restrictions, renewals and enforcement history.
          evidence_claim_ids: &a2
            - EC-009
            - EC-019
            - EC-012
          source_ids:
            - SRC-009
            - SRC-006
            - SRC-010
            - SRC-012
        - risk_id: R-003
          label: Customer concentration, churn and contract economics are hidden
          severity: high
          likelihood: unknown
          rationale: Public customer logos show use cases but do not disclose top-customer revenue, active status, pricing, renewals, churn/NRR or 5%+ concentration.
          evidence_claim_ids: &a3
            - EC-008
            - EC-015
          source_ids:
            - SRC-008
        - risk_id: R-004
          label: Operational dependency on bank, e-wallet and payment rails
          severity: medium
          likelihood: high
          rationale: Status page incidents show partner-rail disruptions for GoPay, virtual accounts, BSS, Landbank and Alipay Philippines, highlighting dependencies outside Xendit core systems.
          evidence_claim_ids: &a4
            - EC-011
          source_ids:
            - SRC-011
        - risk_id: R-005
          label: Competitive pricing and take-rate pressure
          severity: medium
          likelihood: high
          rationale: Payments infrastructure buyers can benchmark on payment-method coverage, reliability, developer tooling, local licensing and price; Xendit publishes list prices but realized discounts and competitor win/loss are private.
          evidence_claim_ids: &a5
            - EC-007
            - EC-016
            - EC-017
          source_ids:
            - SRC-007
            - SRC-006
            - SRC-009
            - SRC-010
            - SRC-016
            - SRC-008
        - risk_id: R-006
          label: Product reliability, fraud and security controls require private validation
          severity: high
          likelihood: medium
          rationale: Xendit documents APIs and fraud-detection products and status components, but SOC/PCI/penetration-test evidence, uptime SLAs and incident history were not public.
          evidence_claim_ids: &a6
            - EC-006
            - EC-010
            - EC-011
            - EC-019
          source_ids:
            - SRC-006
            - SRC-010
            - SRC-011
            - SRC-009
        - risk_id: R-007
          label: Cap-table, preference stack and debt obligations unknown
          severity: medium
          likelihood: unknown
          rationale: Public sources name investors and amounts but not fully diluted ownership, liquidation preferences, warrants, notes, option pool or debt/off-balance-sheet obligations.
          evidence_claim_ids: &a7
            - EC-001
            - EC-002
            - EC-004
            - EC-014
          source_ids:
            - SRC-001
            - SRC-014
            - SRC-002
            - SRC-004
        - risk_id: R-008
          label: Management depth, retention and employee-relations risk not public
          severity: medium
