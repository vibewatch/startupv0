  - founder_claim_id: FC-003
    claim_text: Xendit offers broad payment acceptance, payout, treasury, card, financing, identity and platform products for Southeast Asia.
    claim_source: Xendit homepage, pricing and docs
    claim_date: null
    mapped_chapter_ids:
