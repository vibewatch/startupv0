  - founder_claim_id: FC-004
    claim_text: Xendit has public customer and use-case references across e-commerce, marketplace, gaming, insurance and travel.
    claim_source: Xendit customer page
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.C
      - V.B
    verification_status: partially_verified
    confidence: medium
