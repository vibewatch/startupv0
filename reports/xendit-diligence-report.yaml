      - Open a data-room request list before making any investment decision based on this public-source screen.
executive_summary:
  overall_assessment: Xendit qualifies for continued diligence as an active private Southeast Asia payments-infrastructure unicorn screen. Public evidence supports the 2021 $1B unicorn claim, broad product footprint, customer references, multi-country license claims and 2022 $300M Series D financing; the investment case cannot be underwritten without private financial, customer, regulatory, contract, security and HR records.
  investment_or_diligence_thesis: A credible thesis is that Xendit can compound as localized payments and financial-operations infrastructure for Southeast Asian merchants and platforms. The thesis depends on proving revenue quality, take-rate durability, customer diversification, reliable partner-rail operations, compliant multi-jurisdiction licenses and supportable current valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Xendit appears on CB Insights as a $1B Indonesia/Jakarta financial-services unicorn and YC lists it active.
      evidence_claim_ids:
        - EC-001
        - EC-005
        - EC-020
    - founder_claim_id: FC-002
      summary: Public sources verify $150M Series C at $1B valuation and $300M Series D / $538M total raised, while leaving Series D valuation undisclosed.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-004
    - founder_claim_id: FC-003
      summary: Xendit publicly markets 100+ payment methods, payments, payouts, treasury, cards, financing, identity, BaaS/e-money and developer docs.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and current valuation support are not public.
    - risk_id: R-002
      summary: Multi-jurisdiction fintech licensing/regulatory exposure requires local counsel confirmation.
    - risk_id: R-003
      summary: Customer concentration, churn and contract economics are hidden behind public logo evidence.
  key_evidence_gaps:
    - Audited financials, cash/burn/runway, TPV-to-revenue bridge, gross margin and forecast model.
    - Fully diluted cap table, valuation support, preference stack, debt, warrants/notes and option pool.
    - Top-customer revenue, active contracts, churn/NRR, customer references and supplier/rail contracts.
    - Regulator-confirmed licenses, compliance correspondence, legal docket searches, material contracts and insurance.
    - Security reports, SLA/incident history, R&D roadmap, current org chart, compensation and turnover data.
  recommended_next_steps:
    - Do not rely on headline funding or CB valuation until financial, cap-table and current valuation support are reviewed.
    - Open a data-room request covering financials, customers, contracts, regulatory, security and HR before investment committee use.
    - Commission local regulatory/legal diligence in Indonesia, Philippines, Singapore, Malaysia, Thailand, Vietnam and Hong Kong.
    - Run customer, partner-rail and competitor win/loss diligence to validate concentration, reliability and pricing pressure.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Xendit’s financing history, unicorn-list status and list pricing, but not audited financial statements, current valuation, cash runway, cap table, debt or forecast reliability.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-013
      - EC-014
      - EC-020
      - EC-021
    risk_ids:
      - R-001
      - R-007
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited statements, management reports, AR aging or backlog were public. Retrieved sources provide financing history, list pricing, and stale company-reported TPV growth only.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I-A-1
            finding: Business Wire reported company claims of more than 200% YoY TPV growth and more than 10% month-over-month growth in 2021, but revenue, margin and cash-flow quality remain private.
            evidence_claim_ids:
              - EC-003
              - EC-013
            risk_ids:
              - R-001
        hidden_risks:
          - High TPV growth can mask low or declining take rate, negative gross margin, high fraud losses or working-capital strain.
        evidence_gaps:
          - Audited financial statements, management accounts, cash balance, bank statements, AR aging, backlog, revenue by product/channel/geography and accounting policies.
        follow_up_questions:
          - Provide audited FY2023-FY2025 financials, monthly 2025-2026 management accounts, TPV-to-net-revenue bridge and AR/backlog schedules.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-013
          - EC-021
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Forecasts and assumptions are private. Public sources indicate expansion and pricing axes but not predictability, FX sensitivity, capex, working capital or external financing assumptions.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I-B-1
            finding: Forbes confirms the 2022 $300M Series D and $538M total raised, but not runway, burn, forecast model or current valuation support.
            evidence_claim_ids:
              - EC-004
              - EC-013
            risk_ids:
              - R-001
        hidden_risks:
          - Cross-border and multi-currency products create FX, settlement and regulatory cost assumptions that may be material.
        evidence_gaps:
          - Three-year quarterly forecast, scenario model, pricing/volume assumptions, capex/depreciation, working-capital model and financing assumptions.
        follow_up_questions:
          - Provide board-approved financial model with actual-vs-plan bridge and downside cases by country/product.
        table_ids: []
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-004
          - EC-013
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify investors and round amounts, but not shares outstanding, ownership, option pool, preferences, warrants, notes, debt or off-balance-sheet liabilities.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I-C-1
            finding: CB Insights, TechCrunch and Forbes verify public investors and round sizes, but no fully diluted ownership or preference stack was public.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-004
              - EC-014
            risk_ids:
              - R-007
        hidden_risks:
          - Late-stage rounds may include senior preferences, structured terms or debt not visible in press coverage.
        evidence_gaps:
          - Cap table, option/warrant/note schedules, debt instruments, bank lines and off-balance-sheet obligations.
        follow_up_questions:
          - Provide fully diluted cap table, financing documents and liquidation waterfall as of the research date.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-004
          - EC-014
          - EC-020
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Funding history is publicly supported; tax positions, accounting policies and financing terms are not public. The accessible latest financing article does not disclose Series D valuation.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I-D-1
            finding: Public funding history includes YC, a $64.6M Series B reference, $150M Series C at $1B valuation, and a $300M Series D with $538M total raised.
            evidence_claim_ids:
              - EC-002
              - EC-004
            risk_ids:
              - R-001
              - R-007
        hidden_risks:
          - Headline funding may be mistaken for financial quality; tax, revenue recognition and settlement-accounting policies are unverified.
        evidence_gaps:
          - Tax positions, revenue-recognition memo, settlement accounting, financing term sheets and current valuation support.
        follow_up_questions:
          - Provide tax memo, revenue-recognition policy, financing history schedule and support for current fair value.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
  - chapter_id: II
    title: Products
    chapter_summary: Xendit publicly markets broad receive, send, business-operations and financial-products capabilities with list pricing, but product availability, utilization, margins and roadmap commitments require private validation.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-010
      - EC-016
    risk_ids:
      - R-005
      - R-006
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public pages verify a broad product catalog and pricing table. Historical growth, market share, product-level profitability, technical change and roadmap timing are not publicly verifiable.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II-A-1
            finding: Homepage and docs show payments, payment links, subscriptions, POS, payouts, cross-border, fraud detection, XenPlatform, treasury, expense management, cards, financing, identity verification, BaaS and e-money offerings.
            evidence_claim_ids:
              - EC-006
              - EC-010
            risk_ids:
              - R-006
          - finding_id: II-A-2
            finding: Pricing page gives indicative fees, enabling high-level margin-sensitivity questions but not realized take rate or unit economics.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Large product breadth can create integration, compliance and support complexity; list pricing may not reflect enterprise discounting or partner costs.
        evidence_gaps:
          - Product-level revenue/TPV, attach rates, gross margin, country availability, roadmap timing, support burden and SLA history.
        follow_up_questions:
          - Provide product-by-country matrix, roadmap, active merchant counts, product gross margins and engineering/security architecture review.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-010
          - EC-016
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public customer references support market relevance, but concentration, active status, contract economics, churn and supplier purchase amounts are not public.
    founder_claim_ids:
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-008
      - EC-011
      - EC-015
    risk_ids:
      - R-003
      - R-004
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Xendit names customers/use cases across several verticals, but not the top 15 customers or purchase timing by fiscal year.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III-A-1
            finding: Travelio, Lazada, Wawa Games, Pasarpolis and Traveloka appear as public customer/use-case references.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-003
        hidden_risks:
          - Public logos may be stale or immaterial revenue contributors.
        evidence_gaps:
          - Top-15 customer list, active-contract confirmation, purchase timing, products used and revenue by fiscal year.
        follow_up_questions:
          - Provide top-15 customers for FY2024, FY2025 and 2026 YTD with contracts and reference-call contacts.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-015
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Strategic commercial relationships are partly inferable from licenses and partner-rail status incidents, but revenue contribution and marketing agreements are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III-B-1
            finding: License page and status incidents show reliance on banks, e-wallets, regulators and payment rails across markets.
            evidence_claim_ids:
              - EC-009
              - EC-011
            risk_ids:
              - R-002
              - R-004
        hidden_risks:
          - Rail/provider disruptions can affect customer experience and expose SLA/contractual credit risk.
        evidence_gaps:
          - Strategic partner agreements, revenue contribution, exclusivity, termination provisions and marketing commitments.
        follow_up_questions:
          - Provide partner/rail agreement schedule and top supplier/partner spend for the last two fiscal years.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-011
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer and any 5%+ concentration are not publicly verifiable. Customer logos do not disclose spend or contract economics.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III-C-1
            finding: Public customer page supports named references but does not quantify revenue contribution or active contract status.
            evidence_claim_ids:
              - EC-008
              - EC-015
            risk_ids:
              - R-003
        hidden_risks:
          - Undisclosed concentration could make revenue vulnerable to one marketplace, travel, insurance or gaming customer.
        evidence_gaps:
          - Revenue by customer, churn/NRR, cohorts, pricing, contract length, minimum commitments and termination rights.
        follow_up_questions:
          - Provide revenue-by-customer schedule and cohort retention/NRR by segment.
        table_ids:
          - T-008
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-008
          - EC-015
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public schedule of severed customer, partner or supplier relationships was found. This requires company confirmation.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings: []
        hidden_risks:
          - Quiet churn or terminated bank/e-wallet relationships may not be visible publicly until service disruptions occur.
        evidence_gaps:
          - Churn log, terminated partner/supplier schedule, incident history and customer-loss reasons.
        follow_up_questions:
          - Disclose all material customer, partner or supplier terminations since 2024 with reasons and revenue impact.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-015
          - EC-011
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Top suppliers and purchase amounts are private. Status incidents identify examples of partner rails whose disruptions can affect service.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III-E-1
            finding: Status page incidents referenced GoPay, virtual-account bank transfer, BSS, Landbank and Alipay Philippines disruptions.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-004
        hidden_risks:
          - Dependency on external rails, banks, cloud providers or card networks may create concentration risk not visible in financials.
        evidence_gaps:
          - Top suppliers by spend, cloud/hosting contracts, payment-network agreements, bank/e-wallet rail contracts and SLA/BCP reports.
        follow_up_questions:
          - Provide top-supplier schedule and critical vendor risk assessments.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-011
  - chapter_id: IV
    title: Competition
    chapter_summary: Xendit competes in payments infrastructure on local payment-method coverage, pricing, reliability, developer experience, licensing and regional distribution; true market share and win/loss are private.
    founder_claim_ids:
      - FC-006
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-009
      - EC-010
      - EC-016
    risk_ids:
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public sources support benchmark axes but not Xendit market share or independent customer perception. The competitor set should include global PSPs, local gateways, bank/e-wallet rails and regional fintechs.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV-A-1
            finding: Xendit’s own claims emphasize 100+ payment methods, transparent pricing, API docs and licensed entities; these become key competitive axes.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-009
              - EC-010
              - EC-016
            risk_ids:
              - R-005
        hidden_risks:
          - List pricing may compress under enterprise discounting; global competitors may pressure high-value merchants while local providers pressure price.
        evidence_gaps:
          - Market share, win/loss, competitor pricing, acceptance-rate benchmarking, uptime comparisons and customer perception.
        follow_up_questions:
          - Run customer interviews and benchmark payment-method coverage, approval rates, settlement speeds, support and realized pricing.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-016
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Public evidence indicates a hybrid self-serve, developer-led and sales-led GTM, with customer stories and localized regional pages; CAC, quota productivity and budget sufficiency are private.
    founder_claim_ids:
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-006
      - EC-008
      - EC-010
      - EC-017
    risk_ids:
      - R-001
      - R-005
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: Homepage CTAs, docs/API reference, customer stories and localized pages support public GTM positioning. Channel economics and execution performance are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V-A-1
            finding: Xendit promotes Try for Free, Contact Sales, customer stories, pricing and API documentation, indicating hybrid PLG/developer-led and sales-led GTM.
            evidence_claim_ids:
              - EC-017
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Developer-led signups can create long-tail support cost; sales-led enterprise discounts can reduce take rate.
        evidence_gaps:
          - Channel mix, CAC, payback, conversion, partner/referral contribution, marketing budget and country-level performance.
        follow_up_questions:
          - Provide CRM funnel, channel attribution, CAC/payback and marketing-budget plan.
        table_ids:
          - T-011
          - T-012
        figure_ids:
          - F-006
        evidence_claim_ids:
          - EC-017
      - section_id: V.B
        title: Major Customers
        checklist_question_ids:
          - V.B.1
          - V.B.2
          - V.B.3
        summary: Public references do not reveal major-customer trends, pipeline or future-growth prospects.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
