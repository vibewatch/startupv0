risk_register:
  - risk_id: R-001
    risk_title: Financial quality and valuation support are not public
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public sources verify financing, pricing and stale TPV-growth claims, but do not disclose audited revenue, take rate, gross margin, burn, cash runway, ARR/TPV bridge or support for any post-2021 valuation.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
      - V.E
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited financials, monthly KPI pack, cash/burn, revenue recognition memo, TPV-to-revenue bridge, latest valuation support and board-approved model.
  - risk_id: R-002
    risk_title: Multi-jurisdiction fintech regulatory and licensing exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Xendit operates regulated payment/remittance/VASP/lending activities across several Asian jurisdictions; public license claims require regulator confirmation and review of restrictions, renewals and enforcement history.
    impacted_chapter_ids:
      - VIII
      - I
    impacted_section_ids:
      - VIII.G
      - VIII.F
      - I.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Commission local counsel review in Indonesia, Philippines, Singapore, Malaysia, Thailand, Vietnam and Hong Kong; collect licenses, correspondence, exams and remediation history.
  - risk_id: R-003
    risk_title: Customer concentration, churn and contract economics are hidden
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public customer logos show use cases but do not disclose top-customer revenue, active status, pricing, renewals, churn/NRR or 5%+ concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request top-15 customer schedule, revenue by customer, contract terms, churn/NRR cohorts and independent references.
  - risk_id: R-004
    risk_title: Operational dependency on bank, e-wallet and payment rails
    risk_category: operational
    severity: medium
    likelihood: high
    description: Status page incidents show partner-rail disruptions for GoPay, virtual accounts, BSS, Landbank and Alipay Philippines, highlighting dependencies outside Xendit core systems.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.F
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Review supplier/rail contracts, SLA history, redundancy, incident postmortems, customer credits and business-continuity plans.
  - risk_id: R-005
    risk_title: Competitive pricing and take-rate pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Payments infrastructure buyers can benchmark on payment-method coverage, reliability, developer tooling, local licensing and price; Xendit publishes list prices but realized discounts and competitor win/loss are private.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Run customer win/loss calls and compare realized pricing, acceptance rates, settlement speeds and support SLAs against local and global payment competitors.
  - risk_id: R-006
    risk_title: Product reliability, fraud and security controls require private validation
    risk_category: technical
    severity: high
    likelihood: medium
    description: Xendit documents APIs and fraud-detection products and status components, but SOC/PCI/penetration-test evidence, uptime SLAs and incident history were not public.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VIII.F
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Obtain SOC/PCI/ISO reports if applicable, penetration tests, uptime SLA data, architecture review, incident postmortems and secure-SDLC evidence.
  - risk_id: R-007
    risk_title: Cap-table, preference stack and debt obligations unknown
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: Public sources name investors and amounts but not fully diluted ownership, liquidation preferences, warrants, notes, option pool or debt/off-balance-sheet obligations.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request full cap table, financing documents, debt schedule, option plan and waterfall model.
  - risk_id: R-008
    risk_title: Management depth, retention and employee-relations risk not public
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Public sources identify founders and a team-size anchor, but not current leadership bench, attrition, compensation, employee relations or hiring plan.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.F
      - VII.G
      - VI.A
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request org chart, executive agreements, compensation/benefits, option plan, attrition reports, employee-relations claims and hiring forecast.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, cash, burn, gross margin and TPV-to-revenue bridge.
    why_it_matters: Core valuation and financial-quality underwriting cannot be completed from public funding/pricing evidence.
    suggested_source_or_request: Company CFO data room; auditor and bank statements.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, option pool, preferences, warrants, notes and debt/off-balance-sheet obligations.
    why_it_matters: Ownership, dilution and liquidation waterfall may dominate return profile.
    suggested_source_or_request: Company counsel/corporate records and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level TPV, revenue, gross margin, country availability, roadmap and SLA history.
    why_it_matters: Product breadth may obscure profitability and reliability risks.
    suggested_source_or_request: Product KPI pack, roadmap and support/SLA dashboards.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue, churn/NRR, contracts and active-logo confirmation.
    why_it_matters: Public logos do not validate durable or diversified revenue.
    suggested_source_or_request: Customer schedule and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top suppliers/rails by spend, contract terms, SLAs and incident history.
    why_it_matters: Partner disruptions can affect customer availability and economics.
    suggested_source_or_request: Vendor/rail contracts and incident postmortems.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Market share, win/loss, competitor pricing and acceptance-rate benchmarking.
    why_it_matters: Competition may compress take rates and growth.
    suggested_source_or_request: Customer interviews, competitor research and internal sales CRM.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales quotas, attainment, CAC/payback, channel attribution and sales-cycle length.
    why_it_matters: Public GTM signals do not prove efficient growth.
    suggested_source_or_request: CRM, finance and sales-ops exports.
    priority: medium
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D budget, architecture, security reports, roadmap governance and key technical leadership.
    why_it_matters: Payments infrastructure requires resilient, secure and scalable engineering.
    suggested_source_or_request: CTO/security data-room materials and architecture review.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.G
    missing_information: Turnover, employee relations, compensation, benefits and option-plan data.
    why_it_matters: Retention and labor issues can impair regulated operations and product delivery.
    suggested_source_or_request: HR/legal schedules and benefits plan documents.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Official regulatory confirmations, regulator correspondence, exams/enforcement history and license conditions.
    why_it_matters: Multi-country payments/remittance/VASP activities carry high regulatory risk.
    suggested_source_or_request: Local counsel and regulator registry searches.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP schedule, trademark/patent searches, OSS compliance and IP assignments.
    why_it_matters: Product ownership and compliance are not proven by public product pages.
    suggested_source_or_request: Company counsel IP schedule and external IP searches.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer, bank, e-wallet, card-network, cloud/vendor contracts and insurance coverage.
    why_it_matters: Contracts determine SLAs, fees, reserves, termination rights, coverage and hidden liabilities.
    suggested_source_or_request: Legal data room and broker letters.
    priority: high
