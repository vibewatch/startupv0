report_metadata:
  report_title: Xendit Startup Diligence Report
  target_company: Xendit
  website: https://www.xendit.co/
  known_aliases:
    - Xendit
    - PT Sinar Digital Terdepan
    - PT Syaftraco
    - Xendit Philippines, Inc
    - XenRemit, Inc
    - Dragonpay Corporation
    - Xendit Payments Singapore Pte. Ltd.
    - Payex PLT
    - Xendit Tech Co., Ltd
    - Xendit Wallet Co., Ltd
    - AppotaPay Joint Stock Company
    - Xendit Finance Limited Liability Company
    - Hong Kong Mobile Payment Service Company Limited
  sector: Payments infrastructure, payment gateway, payouts and financial-operations fintech
  geography: Indonesia headquartered; Southeast Asia and Asia footprint including Indonesia, Philippines, Singapore, Malaysia, Thailand, Vietnam and Hong Kong
  company_stage: Private unicorn / growth-stage fintech; latest accessible public priced valuation $1B in 2021, with 2022 Series D valuation not disclosed in retrieved Forbes source
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Followed startup-diligence-research checklist and schema at standard diligence depth.
    - Prioritized company pages, docs, pricing, customers, licenses, status pages, funding news, CB Insights, YC, CourtListener and SEC public search pages.
    - Treated company-controlled claims as evidence that the public claim exists, not as independent audit of metrics, compliance or performance.
    - Did not use private systems, paywalled databases, GitHub API, safeoutputs or non-public sources.
  included_jurisdictions:
    - Indonesia
    - Philippines
    - Singapore
    - Malaysia
    - Thailand
    - Vietnam
    - Hong Kong
    - United States for news/market/legal-search sources
  excluded_topics:
    - Non-public financial statements, cap table, contracts, customer calls, regulator correspondence, counsel letters, security reports, HR files and paid/legal database results were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for Xendit diligence report
      type: workflow_request
      date_received: 2026-05-25
      notes: User specified target Xendit, CB Insights row, research date, required output path and no founder deck/private materials.
    - material_id: UPM-002
      title: Candidate selection context
      type: selection_context
      date_received: 2026-05-25
      notes: Selected at random via shuf; Xendit was third uncovered candidate. Existing reports excluded xendit.
founder_claims:
