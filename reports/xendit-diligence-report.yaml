    claim_source: CB Insights row supplied in workflow and public CB Insights/YC pages
    claim_date: 2021-09-14
    mapped_chapter_ids:
      - I
      - VII
    mapped_section_ids:
      - I.C
      - I.D
      - VII.B
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-005
      - EC-020
    contradiction_summary: null
    diligence_follow_up:
      - Request corporate registry extracts, current capitalization, latest 409A/fair-value analysis and shareholder consents to confirm private active status and ownership.
  - founder_claim_id: FC-002
    claim_text: Xendit raised major late-stage financing including a $150M Series C and $300M Series D.
    claim_source: TechCrunch, Business Wire and Forbes public financing coverage
