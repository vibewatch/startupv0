risk_register:
  - risk_id: R-001
    risk_title: Revenue quality and valuation support not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence supports unicorn eligibility but not ARR, growth, margin, burn, cash, forecast accuracy or valuation multiple.
    impacted_chapter_ids:
