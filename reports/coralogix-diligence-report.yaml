report_metadata:
  report_title: Coralogix Startup Diligence Report
  target_company: Coralogix
  website: https://coralogix.com/
  known_aliases:
    - Coralogix
    - Coralogix Ltd.
    - Coralogix Inc.
  sector: Observability, telemetry analytics, logging, APM, SIEM and AI observability software
  geography: Israel / United States / global enterprise software markets
  company_stage: Private unicorn / growth-stage SaaS
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Prioritized company-owned sources, public financing/news mirrors, user-provided CB Insights unicorn-row data, customer case studies and public competitor pricing pages.
    - Treated company-published claims as verification that the public statement exists, not as independent proof of performance.
    - Mapped findings to checklist chapters I-VIII and identified private data-room requests for every section.
  included_jurisdictions:
    - Israel
    - United States
    - Global markets referenced by public company materials
  excluded_topics:
    - Non-public financial statements, board materials, cap table, contracts, customer calls, SOC reports, litigation dockets behind access controls, HRIS and management interviews were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights unicorn row for Coralogix
      type: market_database_row
      date_received: 2026-05-24
      notes: User-provided row listed valuation $1.12B, date joined 2025-06-17 and named investors.
