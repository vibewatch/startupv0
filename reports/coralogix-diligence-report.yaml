executive_summary:
  overall_assessment: "Coralogix qualifies for the requested unicorn diligence report based on CB Insights/public financing evidence: a 2025 $115M Series E at over $1B valuation and user-provided CB Insights $1.12B row. Public evidence supports active product, pricing, customer, leadership, AI and security positioning, but core investment diligence remains unresolved because financials, cap table, customer revenue quality, product benchmarks and legal/security artifacts are private."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The investable thesis requires proving that Coralogix’s index-free/cross-stack/AI observability positioning produces durable ARR growth, superior TCO, strong retention, attractive gross margin and manageable security/legal risk in a highly competitive observability market.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Coralogix is publicly supported as a unicorn via CB Insights row and 2025 Series E financing announcement.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-004
      summary: Coralogix publishes transparent volume-based pricing for logs, traces, metrics and AI tokens.
      evidence_claim_ids:
        - EC-005
    - founder_claim_id: FC-006
      summary: Coralogix has a visible executive team and active operating/recruiting posture.
      evidence_claim_ids:
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Revenue quality and current valuation support are not public.
    - risk_id: R-004
      summary: Observability market competition and pricing/TCO pressure are high.
    - risk_id: R-003
      summary: Customer concentration, retention and contract quality are unknown despite public logos.
  key_evidence_gaps:
    - Audited financials, KPI pack, forecast, cash/debt, cap table and financing terms.
    - Top-customer ARR, NRR/churn, contract terms, customer concentration and direct reference calls.
    - Win/loss, TCO, competitor benchmarks, product reliability and architecture performance evidence.
    - SOC/security reports, DPA/subprocessors, privacy incidents, AI governance and legal/IP/contract schedules.
    - HRIS, compensation/equity, attrition and management reference checks.
  recommended_next_steps:
    - Request financial/cap-table data room before relying on the $1B+ valuation.
    - Run customer, win/loss and technical reference diligence focused on TCO, performance and retention.
    - Have counsel/security specialists review SOC/ISO/PCI/GDPR scope, privacy, AI governance, IP and contracts.
    - Benchmark Coralogix against Datadog, Dynatrace, New Relic, Elastic and Splunk using matched workloads and contract economics.
