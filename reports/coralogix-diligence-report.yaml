diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts, ARR/bookings, gross margin, burn, cash, debt and forecast model.
    why_it_matters: Cannot underwrite valuation or revenue quality from public financing announcements.
    suggested_source_or_request: Finance data room and quality-of-revenue review.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferences, option pool, warrants, debt and investor rights.
    why_it_matters: Headline valuation may not equal common-equity value.
    suggested_source_or_request: Corporate counsel and finance documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer ARR, concentration, NRR, churn, contracts and renewal status.
    why_it_matters: Public logos do not prove durable, diversified revenue.
    suggested_source_or_request: Customer schedule, CRM, billing data and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, TCO, competitor POC results and market share estimates.
    why_it_matters: Observability is crowded and pricing claims need buyer validation.
    suggested_source_or_request: CRM exports, sales-engineering benchmark pack and customer interviews.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quota, cycle, pipeline, CAC, payback and ramp by cohort.
    why_it_matters: Determines whether growth can scale efficiently after late-stage funding.
    suggested_source_or_request: GTM data room, CRM and commission-plan review.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture, reliability, incident history, roadmap, R&D budget and security backlog.
    why_it_matters: Differentiated architecture and AI claims are central to the thesis.
    suggested_source_or_request: CTO diligence, architecture review and product analytics.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS, headcount by function/location, compensation, option grants and attrition.
    why_it_matters: Execution and retention risks cannot be measured from public pages.
    suggested_source_or_request: HR data room and management references.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.C
    missing_information: SOC 2 report, ISO certificate, PCI AoC, DPA, subprocessors, privacy incidents and AI governance.
    why_it_matters: Security/privacy posture affects enterprise sales and liability.
    suggested_source_or_request: Security/legal data room and third-party audit reports.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Patent/trademark schedule, OSS scan, invention assignments and Aporia acquisition IP documents.
    why_it_matters: IP ownership and license issues can impair platform defensibility.
    suggested_source_or_request: IP counsel review and code/license scan.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Customer MSAs, DPAs, cloud/supplier agreements, insurance and investor/acquisition agreements.
    why_it_matters: Contracts can contain revenue, liability, data-use, SLA and change-of-control risks.
    suggested_source_or_request: Legal contract data room and counsel review.
    priority: high
