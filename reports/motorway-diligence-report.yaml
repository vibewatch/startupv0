        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Consumer-side traction and outcome claims are public, but no top-15 customer list or cohort
          economics are disclosed.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Motorway publicly claims more than 1 million sellers helped, half a million cumulative cars
              sold and strong satisfaction and price-outcome metrics, but the underlying customer
              mix and repeat behavior are not public.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-013
            risk_ids:
              - R-003
              - R-004
        hidden_risks:
          - Selective outcome marketing can mask weaker cohorts, higher exception rates or uneven
            performance by vehicle type.
        evidence_gaps:
          - No top customers by application, no cohort retention and no regional seller mix were
            publicly disclosed.
        follow_up_questions:
