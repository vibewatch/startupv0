      - EC-016
      - EC-024
      - EC-025
    mitigation_or_diligence_request: Stress-test GMV, take rate and CAC assumptions under softer
      used-car demand and more aggressive competitor offers.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: FY2024 and FY2025 audited financial statements plus monthly management accounts.
    why_it_matters: Headline revenue and loss figures are insufficient to assess gross margin, burn,
      working capital or revenue quality.
    suggested_source_or_request: Request from company and accountant.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, preference stack and option schedule.
    why_it_matters: Historical unicorn status is public, but current economics and dilution are not.
    suggested_source_or_request: Request from founder, company and investor.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.D
    missing_information: Debt-facility agreement, charges and covenant package for the £25M loan.
    why_it_matters: Late-stage debt can materially affect runway, control and downside scenarios.
    suggested_source_or_request: Request from company and counsel.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Service-fee schedule, module-level revenue and contribution margin.
    why_it_matters: Public product breadth is clear, but economics by workflow are not.
    suggested_source_or_request: Request from company.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.C
    missing_information: Dealer concentration, top-dealer GMV and revenue share.
    why_it_matters: A broad dealer count does not prove diversified liquidity or low concentration risk.
    suggested_source_or_request: Request from company.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Supplier concentration, SLAs and contingency planning.
    why_it_matters: Transport, ID, payment and data suppliers could be operationally critical.
    suggested_source_or_request: Request from company and supplier contracts.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.C
    missing_information: CAC and conversion by channel, tool and geography.
    why_it_matters: Claims-led growth can be expensive if organic reach or conversion weakens.
    suggested_source_or_request: Request from company marketing analytics.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: AI profiling accuracy, re-pricing rate and product adoption by module.
    why_it_matters: Operational automation quality will heavily influence trust and margins.
    suggested_source_or_request: Request from product and engineering teams.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.G
    missing_information: Turnover, regretted attrition, compensation and option-refresh data.
    why_it_matters: People risk cannot be assessed from current public pages alone.
    suggested_source_or_request: Request from HR and management.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Paid docket search and complete litigation schedule.
    why_it_matters: Open-web negative searches are not enough to clear legal risk.
    suggested_source_or_request: Request from counsel.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Trademark, patent, copyright and key-license register.
    why_it_matters: Brand and software rights may be material even without a patent-heavy model.
    suggested_source_or_request: Request from counsel and IP register search.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance schedules, limits, deductibles and claims history.
    why_it_matters: Cyber, crime, motor-trade and D&O coverage are material for this operating model.
    suggested_source_or_request: Request from company and broker.
    priority: high
