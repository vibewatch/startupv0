            outcomes.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-013
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Publicly visible counterparties include a large dealer network, dealer financing support,
          transport and inspection partners and a 2023 provenance-data acquisition.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
