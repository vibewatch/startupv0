    quoted_evidence:
      - source_id: SRC-008
        quote: At no point does Motorway purchase any vehicles itself, nor does it acquire any risk or title
          to any vehicle made available for purchase via the Platform.
        location: Selling Your Car Through Our Marketplace
      - source_id: SRC-001
        quote: Our end-to-end platform connects you to thousands of quality cars – from private driveways to
          your forecourt.
        location: About page
    analyst_interpretation: This supports the core marketplace-model thesis and inventory-light framing.
    limitations: Operational responsibilities and contingent liabilities can still be significant even
      without title risk.
