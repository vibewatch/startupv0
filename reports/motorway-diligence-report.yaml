        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue concentration by dealer or partner is not publicly disclosed.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.C-F1
            finding: The existence of 8,000+ dealers and 2,000+ Motorway Pay dealers suggests breadth, but
