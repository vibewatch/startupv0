risk_register:
  - risk_id: R-001
    risk_title: Profitability and financing-runway risk
    risk_category: financial
    severity: high
    likelihood: high
    description: Motorway remained loss-making in 2024, added debt in late 2025 and only snippet-level
      public guidance supports a mid-2026 profitability target.
    impacted_chapter_ids:
      - I
      - V
      - VII
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
      - V.E
      - VII.B
    evidence_claim_ids:
      - EC-013
      - EC-014
      - EC-021
    mitigation_or_diligence_request: Request FY2024 and FY2025 audited statements, monthly cash bridge,
      covenant schedule and board-approved forecast sensitivity.
  - risk_id: R-002
    risk_title: Stale valuation and cap-table opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: The most recent official priced valuation anchor retrieved is the 2021 >$1B Series C;
      current mark, preferences, secondaries and dilution are not public.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids:
      - EC-001
      - EC-007
      - EC-017
    mitigation_or_diligence_request: Request the current cap table, financing docs, secondary
      transaction history and option-plan detail.
  - risk_id: R-003
    risk_title: Dealer-liquidity and concentration dependence
    risk_category: customer
    severity: high
    likelihood: medium
    description: Motorway’s inventory-light model depends on dealers continuing to bid, pay and collect
      at scale, but public sources do not reveal concentration or churn.
    impacted_chapter_ids:
      - III
      - IV
      - V
    impacted_section_ids:
      - III.B
      - III.C
      - III.E
      - IV.A
      - V.B
      - V.C
    evidence_claim_ids:
      - EC-003
      - EC-009
      - EC-013
      - EC-015
      - EC-016
    mitigation_or_diligence_request: Request dealer concentration, repeat-rate, payment-default and GMV-by-dealer-cohort analysis.
  - risk_id: R-004
    risk_title: Marketing-claim substantiation risk
    risk_category: legal
    severity: medium
    likelihood: high
    description: Motorway’s headline price and satisfaction claims rely on company methodology and
      survey subsets, creating advertising, compliance and reputation exposure if results diverge in
      practice.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.A
      - V.A
      - V.C
      - VIII.G
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-011
    mitigation_or_diligence_request: Commission an independent review of methodology, exclusions and consumer-marketing compliance.
  - risk_id: R-005
    risk_title: Payments, fraud and operational execution risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Motorway orchestrates ID checks, sanctions or watchlist checks, payment flows, finance
      settlement, inspection and collection, so failures in any leg can create losses or disputes.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - III.B
      - III.E
      - V.A
      - VI.B
      - VIII.C
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-013
    mitigation_or_diligence_request: Review fraud losses, payout reversals, processor agreements,
      collections claims and incident-management controls.
  - risk_id: R-006
    risk_title: Product and AI execution risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: AI profiling, valuation and transaction automation could deepen the moat, but public
      materials do not quantify defect rates, re-pricing frequency or realized ROI.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids:
      - EC-003
      - EC-008
      - EC-009
      - EC-013
    mitigation_or_diligence_request: Request module adoption, error rates, customer-impact studies and roadmap governance materials.
  - risk_id: R-007
    risk_title: Key-person, succession and turnover risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Founder visibility remains high and deeper org or turnover data are private, making
      succession, management depth and retention economics hard to assess.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.G
    evidence_claim_ids:
