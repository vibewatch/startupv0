            evidence_claim_ids:
              - EC-009
              - EC-013
              - EC-026
            risk_ids:
              - R-003
              - R-005
        hidden_risks:
          - Dependence on external dealers and workflow partners may create concentration and SLA
            risk that is not visible in headline network counts.
        evidence_gaps:
          - No dealer concentration, commercial terms, revenue contribution or partner-churn data is
            public.
        follow_up_questions:
