report_metadata:
  report_title: Motorway Startup Diligence Report
  target_company: Motorway
  website: https://motorway.co.uk/
  known_aliases:
    - Motorway
    - Motorway Online Ltd
  sector: Automotive marketplace / used-car transaction platform
  geography: United Kingdom; headquartered in London with operations in Brighton
  company_stage: Private unicorn / growth-stage marketplace
  research_date: 2026-06-19
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: GBP
  time_zone: Europe/London
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company-owned about, how-it-works, claims, careers, dealer, privacy and terms pages fetched
      via r.jina.ai
    - UK public-company and regulatory checks using Companies House and ICO pages
    - Independent media review via City AM and DuckDuckGo snippet sweeps for financial, IPO and
      legal signals
    - Competitor benchmarking with Auto Trader and Carwow public seller pages
    - No paid data-room, court-docket, trademark or private-market database access
  included_jurisdictions:
    - United Kingdom corporate, consumer-marketplace and data-protection context
    - UK dealer and seller operating model
  excluded_topics:
    - No private financial statements, cap table, board materials or customer contracts
    - No paid court-docket, trademark or lien searches
    - No customer, dealer, supplier or management interviews
    - No security testing or private control reports
  user_provided_materials: []
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Motorway remains an eligible private UK unicorn rather than an IPO'd, acquired or
      shut-down company.
    claim_source: Companies House, official site and IPO/acquisition search sweep
    claim_date: 2026-06-19
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
      - I.C
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-017
      - EC-018
    contradiction_summary: Exact current valuation is not publicly verifiable and open-web search can
      surface low-quality acquisition noise, but reviewed official records still show an active
      private company.
    diligence_follow_up:
      - Request the current cap table, board minutes on exit planning and any live IPO or sale
        process materials.
  - founder_claim_id: FC-002
