        quote: Motorway Online Ltd is a private limited company, registered in England and Wales with
          company number 10285711.
        location: About us section of terms
    analyst_interpretation: This is the strongest public anchor that Motorway still appears private and operating.
    limitations: Companies House status does not by itself rule out a confidential sale process or
