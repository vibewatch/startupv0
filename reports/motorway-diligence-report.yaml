  - risk_id: R-010
    risk_title: Used-car cycle and competition risk
    risk_category: market
    severity: high
    likelihood: medium
    description: Marketplace growth depends on used-car pricing, dealer demand and efficient seller
      acquisition in a crowded UK channel set.
    impacted_chapter_ids:
      - I
      - IV
      - V
    impacted_section_ids:
      - I.A
