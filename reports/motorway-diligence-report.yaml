    claim: Motorway describes itself as a marketplace connecting private sellers with professional
      buyers rather than a principal buying inventory for itself.
    evidence_summary: The terms say the vehicle is purchased by a Car Buying Partner and that Motorway
      does not purchase vehicles itself.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-002
