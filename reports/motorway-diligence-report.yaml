      - EC-006
      - EC-012
      - EC-022
      - EC-023
    mitigation_or_diligence_request: Request the full org chart, succession plan, regretted attrition
      and key-employee retention package data.
  - risk_id: R-008
    risk_title: Privacy and data-governance risk
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Motorway processes identity documents, facial verification data, bank details, DVLA
      data and communications, expanding GDPR and security exposure.
    impacted_chapter_ids:
