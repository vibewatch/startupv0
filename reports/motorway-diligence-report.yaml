          valuation, AI-assisted profiling, dealer auctions, payment, logistics and provenance
          checks.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Terms state that Motorway does not take vehicle title, which preserves inventory-light
              economics but increases dependence on dealer liquidity and operational execution
              across partner workflows.
            evidence_claim_ids:
              - EC-002
              - EC-011
            risk_ids:
              - R-003
              - R-005
              - R-006
        hidden_risks:
          - Each added module such as payments, transport, ID checks and provenance increases
            failure modes and compliance burden.
        evidence_gaps:
          - Module-level revenue, attach rates, service-fee schedule detail, re-pricing rates and
            contribution margins are not public.
        follow_up_questions:
          - Request product P&L, attach rates, defect/repricing rates and roadmap adoption by module.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-002
          - EC-009
          - EC-011
          - EC-013
  - chapter_id: III
