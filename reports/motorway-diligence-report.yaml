      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-013
      - EC-009
      - EC-026
      - EC-010
      - EC-018
      - EC-020
      - EC-011
      - EC-019
    risk_ids:
