  - risk_id: R-009
    risk_title: Limited legal and IP visibility
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Accessible public sweeps do not provide a complete litigation, trademark, patent,
      contract or insurance picture.
    impacted_chapter_ids:
