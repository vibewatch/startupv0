executive_summary:
  overall_assessment: Motorway passes the public eligibility screen as an operating private UK company
    with a historically verified >$1B valuation and clear marketplace traction, but investability
    hinges on private financial quality, dealer concentration, payments or compliance execution and
    the gap between marketing claims and audited outcomes.
  investment_or_diligence_thesis: Motorway could be a meaningful UK used-car marketplace asset if its
    dealer liquidity, service-fee model and end-to-end transaction stack create durable economics;
    public evidence supports strong product-market presence more than it supports current
    profitability, concentration or valuation quality.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Motorway publicly documents an inventory-light marketplace model in which dealers, not
        Motorway, purchase the vehicles.
      evidence_claim_ids:
        - EC-002
        - EC-011
    - founder_claim_id: FC-003
      summary: Motorway’s own 2021 financing announcement verifies the $190M Series C and >$1B unicorn
        valuation event.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-008
      summary: Motorway publicly discloses its current executive team and live privacy, terms and ICO
        records.
      evidence_claim_ids:
        - EC-006
        - EC-010
        - EC-019
  biggest_risks:
    - risk_id: R-001
      summary: Public evidence still shows losses and new debt, while the path to profitability is only
        partially public.
    - risk_id: R-003
      summary: Dealer-liquidity breadth is visible, but dealer concentration, churn and default risk are
        not.
    - risk_id: R-005
      summary: Payments, fraud, collection and compliance operations add execution risk beyond a simple
        listing marketplace.
    - risk_id: R-008
      summary: Identity, banking and vehicle-data handling create meaningful privacy and data-governance
        exposure.
  key_evidence_gaps:
    - Audited FY2024 and FY2025 financial statements, cash bridge and gross-margin detail
    - Current fully diluted cap table, option pool, preference stack and debt covenants
    - Dealer concentration, repeat-purchase rates and payment-default data
    - Service-fee schedule, unit economics and module attach rates for Motorway Pay and Motorway Move
    - Litigation, trademark, insurance and contract schedules reviewed by counsel
    - Headcount, turnover and executive compensation data beyond public benefits pages
  recommended_next_steps:
    - Run a finance and cap-table data-room review before treating the 2021 unicorn mark as
      decision-useful current valuation evidence.
    - Obtain dealer concentration, seller-funnel and service-fee economics to test whether the
      business has durable pricing power.
    - Review fraud, payments, ID-verification, privacy and transport controls with counsel and
      operations leaders.
    - Commission customer and dealer references focused on payout reliability, repricing frequency
      and support quality.
    - Run paid litigation, trademark and insurance diligence to close the largest legal-visibility
      gaps.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Motorway's 2021 unicorn financing and 2025 debt, but not
      current valuation quality, detailed financial health or cap-table terms.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-007
    evidence_claim_ids:
      - EC-013
      - EC-021
      - EC-008
      - EC-014
      - EC-001
      - EC-012
      - EC-017
      - EC-007
      - EC-026
      - EC-011
    risk_ids:
      - R-001
      - R-010
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public reporting gives revenue, GMV, loss and selective growth anchors, but no full
          statements, margins or cash-flow detail.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: City AM reports 2024 revenue of £66.4m, pre-tax loss of £37.3m and GMV of £2.2bn; this
              implies roughly a 3.0% revenue-to-GMV take rate before operating costs.
            evidence_claim_ids:
              - EC-013
              - EC-021
            risk_ids:
              - R-001
              - R-010
        hidden_risks:
          - A low disclosed take rate can still mask high inspection, transport, payment or support
            costs that are invisible in public sources.
        evidence_gaps:
          - No published balance sheet, cash-flow statement, AR aging, deferred-revenue schedule or
            gross-margin bridge was retrieved.
        follow_up_questions:
          - Provide FY2024 and FY2025 audited financials plus a monthly revenue, margin and
            cash-burn bridge.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-013
          - EC-021
          - EC-008
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Only snippet-level forward guidance is public; investment-grade projections remain private.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Industry-press snippets cite likely 2025 revenue of £78m and a mid-2026 profitability
              target, but no public operating model or scenario assumptions were retrieved.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-001
              - R-010
        hidden_risks:
          - Forward-looking profitability messaging can slip if used-car pricing, dealer demand or
            service-fee realization weakens.
        evidence_gaps:
          - No quarterly model, capex plan, working-capital forecast, financing assumptions or
            downside scenarios are public.
        follow_up_questions:
          - Provide a three-year monthly model with scenario sensitivities and covenant headroom.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-014
          - EC-013
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Legal-form, director and investor signals are public, but fully diluted ownership,
          preference stack and lender/security details are not.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Companies House and current terms confirm Motorway Online Ltd is an active private limited
              company, while public investor names and director appointments identify stakeholders
              without revealing holdings or rights.
            evidence_claim_ids:
              - EC-001
              - EC-012
              - EC-017
            risk_ids:
              - R-002
        hidden_risks:
          - A stale official valuation anchor and opaque preference stack can hide meaningful
            down-round, secondary or liquidation-preference risk.
        evidence_gaps:
          - No fully diluted cap table, option pool, shareholder percentages, preference stack or
            lender security package was retrieved.
        follow_up_questions:
          - Provide the current cap table, debt agreements, option schedule and any secondary
            share-sale history.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-012
          - EC-017
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history is strongest for 2021 equity and 2025 debt, while tax, accounting
          policy and detailed financing terms remain non-public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Official 2021 funding materials verify a $190m Series C at >$1bn valuation; later public
              reporting adds a £25m debt facility and a 2023 stock-funded acquisition.
            evidence_claim_ids:
              - EC-007
              - EC-013
              - EC-026
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Debt added after years of losses raises the possibility of covenant, security or
            refinancing constraints that are not visible publicly.
        evidence_gaps:
          - No tax position, accounting policy note, fee-schedule economics or full financing
            instrument set was retrieved.
        follow_up_questions:
          - Provide accounting policies, tax exposures, debt docs, charges and the current
            service-fee schedule.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-007
          - EC-013
          - EC-026
          - EC-011
  - chapter_id: II
    title: Products
    chapter_summary: Motorway's product scope now spans marketplace, valuation, AI-assisted profiling,
      payment, logistics and provenance.
    founder_claim_ids:
