report_metadata:
  report_title: 6sense Startup Diligence Report
  target_company: 6sense
  website: https://6sense.com/
  known_aliases:
    - 6Sense
    - 6sense Insights
    - 6sense Revenue AI
  sector: B2B revenue intelligence, account-based marketing and sales AI software
  geography: United States / San Francisco with global enterprise customers
  company_stage: Private unicorn / enterprise SaaS growth-stage
  research_date: 2026-06-15
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built existing-report exclusion list from reports/*-diligence-report.yaml and selected uncovered targets from the CB Insights unicorn list via shuf.
    - Fetched CB Insights, accessible 6sense customer/product pages and search-result source discovery; several 6sense newsroom/team pages were blocked by bot verification, so funding details beyond CB Insights are not asserted.
    - Used public company-owned sources and reputable public unicorn-list data; marked private financial, legal, HR and customer records as not_publicly_verifiable.
    - Did not bypass paywalls, CAPTCHAs or access controls; blocked/inaccessible sources are limitations, not filled with invented facts.
  included_jurisdictions:
    - United States
    - San Francisco
    - United States federal and state/public-market context as applicable
  excluded_topics:
    - Private financial statements, cap table, customer calls, HRIS exports, litigation docket subscriptions, insurance policies and non-public contracts were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for 6sense unicorn diligence report
      type: workflow_request
      date_received: 2026-06-15
      notes: No pitch deck, model, data room or management responses were provided.
    - material_id: UPM-002
      title: Candidate metadata from CB Insights unicorn list
      type: public_metadata
      date_received: 2026-06-15
      notes: Slug 6sense; valuation $5.20B; date joined 2021-03-30; country United States; industry Enterprise Tech.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: 6sense is an eligible private unicorn with latest public unicorn-list valuation of $5.20B.
    claim_source: Workflow-selected CB Insights unicorn-list metadata
    claim_date: 2021-03-30
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-012
    contradiction_summary: No IPO, acquisition or shutdown evidence was found in the public source set used for screening; ownership and current fair value require company confirmation.
    diligence_follow_up:
      - Request current cap table, fully diluted share count, liquidation preferences, SAFEs/notes/debt and board-approved valuation support.
  - founder_claim_id: FC-002
    claim_text: 6sense operates the public products/services described on its website.
    claim_source: Company-owned public pages
    claim_date: 2026-06-15
    mapped_chapter_ids:
      - II
    mapped_section_ids:
      - II.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-002
      - EC-003
    contradiction_summary: Product availability and positioning are visible; revenue mix, margin and roadmap are private.
    diligence_follow_up:
      - Request SKU-level revenue, gross margin, product roadmap, deprecation history, pricing/discounting and product P&L.
  - founder_claim_id: FC-003
    claim_text: 6sense has public customer, channel or footprint signals that support active market presence.
    claim_source: Company-owned customer/location/GTM pages
    claim_date: 2026-06-15
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.B
      - V.A
      - V.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-005
    contradiction_summary: Public logos/locations/channels do not verify retention, concentration, pipeline conversion or account-level revenue.
    diligence_follow_up:
      - Request customer/revenue concentration, cohort retention, churn, NRR/SSS equivalents, channel mix, CAC/payback and pipeline conversion.
  - founder_claim_id: FC-004
    claim_text: 6sense has public legal, compliance, regulatory or ESG-related signals that require deeper diligence.
    claim_source: Company disclosures and product/legal pages
    claim_date: 2026-06-15
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.C
      - VIII.D
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-009
      - EC-011
    contradiction_summary: Public disclosures do not prove absence of litigation, regulatory correspondence, insurance gaps or IP ownership defects.
    diligence_follow_up:
      - Request counsel litigation/regulatory memo, IP schedule, insurance certificates, material contracts and compliance-control evidence.
  - founder_claim_id: FC-005
    claim_text: 6sense private financial statements, cap table, customer concentration, HR data and contracts were not publicly verifiable.
    claim_source: Public-source diligence gap assessment
    claim_date: 2026-06-15
    mapped_chapter_ids:
      - I
      - III
      - VII
      - VIII
    mapped_section_ids:
      - I.A
      - I.C
      - III.C
      - VII.B
      - VIII.F
    verification_status: not_publicly_verifiable
    confidence: high
    evidence_claim_ids:
      - EC-010
    contradiction_summary: null
    diligence_follow_up:
      - Open data-room request list before relying on valuation or growth claims.
executive_summary:
  overall_assessment: 6sense passes public eligibility screening as an uncovered private unicorn, but investment-grade diligence remains gated by private financial, customer, HR, legal and contract records.
  investment_or_diligence_thesis: 6sense has credible public evidence of active market presence in B2B revenue intelligence, account-based marketing and sales AI software; the diligence thesis depends on validating unit economics, customer/channel durability, compliance controls and valuation support.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists 6sense at $5.20B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company-owned pages verify active products/services and public positioning.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Public source set includes customer, location, channel or logo evidence.
      evidence_claim_ids:
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: B2B data provenance, privacy, AI workflow controls and web-deanonymization compliance require deep legal/technical diligence.
    - risk_id: R-002
      summary: Public financial opacity prevents validation of ARR quality, NRR, burn, pipeline conversion and valuation support.
    - risk_id: R-003
      summary: Revenue-intelligence category is crowded and exposed to suite bundling by CRM/marketing-cloud incumbents.
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts and KPI definitions
    - Fully diluted cap table, option plan, SAFEs/notes/debt and liquidation preferences
    - Revenue concentration, retention/churn and cohort schedules
    - CAC, payback, funnel conversion, quota capacity and sales-cycle data
    - Headcount, turnover, compensation and org-chart records
  recommended_next_steps:
    - Provide audited financial statements, monthly trial balances and board KPI packages for the last 36 months.
    - Provide current fully diluted cap table, option/warrant/SAFE/note/debt schedules and financing documents.
    - Provide top customer/channel/location revenue, cohort retention, churn and concentration schedules.
    - Provide CRM funnel, sales productivity, quota, CAC/payback and marketing-spend exports.
    - Provide org chart, HRIS headcount-by-function/location, turnover and compensation plan data.
