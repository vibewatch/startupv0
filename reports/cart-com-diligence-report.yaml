risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation overhang
    risk_category: financial
    severity: high
    likelihood: high
    description: Cart.com has large public financing and growth signals but no audited financials, cap table, debt terms,
      profitability, cash burn or current fair value evidence.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
    mitigation_or_diligence_request: Request audited/management financials, quality of earnings, current cap table, 409A,
      debt schedule and investor-rights documents.
  - risk_id: R-002
    risk_title: Structured financing and debt preference risk
    risk_category: financial
    severity: high
    likelihood: medium
    description: 2022 equity/debt and repeated Form D financings could include preferences, covenants or liquidation stack
      that materially change economic value.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids:
      - EC-003
      - EC-004
    mitigation_or_diligence_request: Reconcile all financings to definitive agreements, liquidation waterfall, debt covenants and option pool.
  - risk_id: R-003
    risk_title: Customer concentration and ROI representativeness unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named logos and case studies are positive but selective; customer revenue concentration, churn, NRR and
      average ROI are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-006
      - EC-011
      - EC-012
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Request top-customer revenue/gross profit, contracts, churn/NRR cohorts and reference
      calls across top, median and churned customers.
  - risk_id: R-004
    risk_title: Physical logistics fixed-cost and execution risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: The fulfillment footprint can differentiate Cart.com but creates utilization, labor, lease, safety and
      service-level exposure.
    impacted_chapter_ids:
      - II
      - III
      - IV
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - IV.A
      - VIII.C
    evidence_claim_ids:
      - EC-007
      - EC-013
      - EC-014
    mitigation_or_diligence_request: Review facility utilization, leases, labor metrics, SLA penalties, EHS/safety logs and customer claims.
  - risk_id: R-005
    risk_title: AI roadmap and proprietary software proof gap
    risk_category: product
    severity: medium
    likelihood: medium
    description: AI/automation claims are central to the forward thesis, but public evidence does not prove adoption, model
      performance, governance or IP ownership.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.D
    evidence_claim_ids:
      - EC-009
      - EC-023
    mitigation_or_diligence_request: Request product analytics, model evaluations, governance artifacts, roadmap delivery
      metrics, code ownership and open-source compliance scan.
  - risk_id: R-006
    risk_title: Privacy, security, contract and IP exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Cart.com handles commerce, marketing, fulfillment and personal/payment data, but public sources do not
      include assurance reports, DPAs, IP portfolio or incident history.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.D
      - VIII.F
      - VIII.G
      - II.A
    evidence_claim_ids:
      - EC-017
      - EC-018
      - EC-023
      - EC-024
    mitigation_or_diligence_request: Review SOC 2/ISO, DPIAs, breach log, customer DPAs/MSAs, trademark/patent/code ownership and insurance.
  - risk_id: R-007
    risk_title: Leadership, workforce and retention opacity
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Public leadership roster is positive, but compensation, turnover, workforce safety, warehouse labor
      reliance and succession data are private.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.G
      - VIII.C
    evidence_claim_ids:
      - EC-019
      - EC-020
      - EC-025
    mitigation_or_diligence_request: Request org chart, turnover, compensation, equity grants, succession plan, OSHA logs
      and employee-relations matters.
  - risk_id: R-008
    risk_title: Litigation and regulatory search incompleteness
    risk_category: legal
    severity: medium
    likelihood: medium
    description: CourtListener search surfaced federal matters naming Cart.com, but pleadings, merits, reserves and
      state/arbitration matters are not reviewed.
    impacted_chapter_ids:
      - VIII
      - VII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VII.F
    evidence_claim_ids:
      - EC-021
    mitigation_or_diligence_request: Have counsel conduct complete federal/state/arbitration docket review, assess
      exposure/reserves and map insurance coverage.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts and revenue bridge
    why_it_matters: Validates growth quality, margins, burn and valuation.
    suggested_source_or_request: CFO data room; auditor workpapers; board packages
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, liquidation waterfall and debt schedule
    why_it_matters: Determines security economics and potential preference overhang.
    suggested_source_or_request: Corporate counsel; financing documents; 409A reports
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue/gross profit, churn and NRR cohorts
    why_it_matters: Determines concentration and repeatability of public customer proof.
    suggested_source_or_request: CRM, billing, data warehouse and customer contracts
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product revenue mix, module adoption and gross margin
    why_it_matters: Distinguishes software-like economics from services/logistics revenue.
    suggested_source_or_request: Product analytics, revenue accounting and cost accounting
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: AI/automation adoption, model evaluation and governance
    why_it_matters: AI roadmap is a central forward-use-of-proceeds claim.
    suggested_source_or_request: Model cards, eval reports, product analytics and incident reviews
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Counsel-reviewed litigation docket and reserves
    why_it_matters: Public search surfaced cases but not exposure or status.
    suggested_source_or_request: Outside counsel memo, PACER/state docket exports and insurance notices
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Security assurance and privacy compliance package
    why_it_matters: Customer trust depends on secure handling of commerce/personal/payment data.
    suggested_source_or_request: SOC 2, ISO, DPAs, subprocessor list, breach log and DPIAs
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP portfolio, code ownership and open-source compliance
    why_it_matters: Proprietary software and AI claims require clean ownership.
    suggested_source_or_request: IP counsel report, USPTO export, OSS scan and acquisition assignment schedules
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, attrition, safety and workforce relations by location
    why_it_matters: Warehouse operations create labor, safety and retention risks.
    suggested_source_or_request: HRIS export, OSHA logs, workers-comp loss runs and employee-relations summaries
    priority: medium
  - gap_id: G-010
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, competitive pricing and switching-cost evidence
    why_it_matters: Tests defensibility against focused software and fulfillment competitors.
    suggested_source_or_request: Salesforce win/loss, pricing decks and customer reference calls
    priority: medium
  - gap_id: G-011
    chapter_id: V
    section_id: V.A
    missing_information: CAC, sales productivity and marketing attribution model
    why_it_matters: Public growth-marketing metrics cannot establish efficient growth.
    suggested_source_or_request: GTM funnel, quota attainment, CAC payback and attribution methodology
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policy schedules and claims history
    why_it_matters: Determines coverage for warehouse, cyber, D&O, E&O and labor exposures.
    suggested_source_or_request: Broker memo, policy forms, loss runs and claims register
    priority: medium
