limitations:
  - limitation_id: L-001
    description: Research used public sources only; no management interviews, customer references, paid databases, private
      data room, authenticated PACER/state docket retrieval or security testing were performed.
    affected_chapter_ids:
      - I
      - III
      - VIII
    affected_section_ids:
      - I.A
      - III.C
      - VIII.A
  - limitation_id: L-002
    description: Company-owned metrics and case studies are treated as evidence of public claims, not independently audited facts.
    affected_chapter_ids:
      - II
      - III
      - V
      - VI
    affected_section_ids:
      - II.A
      - III.A
      - V.A
      - VI.B
  - limitation_id: L-003
    description: CourtListener and public search surfaced legal matters, but no conclusions are drawn on merits,
      materiality, reserves or insurance coverage without counsel review.
    affected_chapter_ids:
      - VIII
      - VII
    affected_section_ids:
      - VIII.A
      - VIII.B
      - VII.F
  - limitation_id: L-004
    description: Valuation and financing headlines do not reveal liquidation preferences, debt covenants, dilution, investor
      marks or common-equity value.
    affected_chapter_ids:
      - I
      - VII
    affected_section_ids:
      - I.C
      - VII.E
  - limitation_id: L-005
    description: Competitor analysis used representative public competitor pages only; no paid market sizing, pricing
      surveys or customer win/loss interviews were completed.
    affected_chapter_ids:
      - IV
      - V
    affected_section_ids:
      - IV.A
      - V.A
