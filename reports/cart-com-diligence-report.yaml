executive_summary:
  overall_assessment: "Eligible public diligence target: Cart.com has credible private-company financing, scale and
    customer-evidence signals, including a 2026 $180M growth-equity investment and public unicorn valuation anchors. The
    diligence decision turns on private financial quality, capital structure, customer concentration, logistics fixed
    costs, AI proof, security/IP and legal review."
  investment_or_diligence_thesis: Cart.com could be a category-scale commerce enablement platform if its software,
    services and fulfillment network create a durable integrated moat with attractive retention and unit economics.
    Public evidence supports breadth and momentum more than it proves profitability, ARR quality, defensibility or
    legal/security readiness.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: SEC submissions and Form D filings verify Cart.com, Inc. as a private Delaware issuer with repeated financing
        activity.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-002
      summary: "Company pages verify the three-part solution taxonomy: fulfillment/logistics, commerce software and commerce
        services."
      evidence_claim_ids:
        - EC-007
        - EC-008
    - founder_claim_id: FC-007
      summary: About page and 2026 investment release verify founder/CEO leadership, public executive roster and a new board
        director.
      evidence_claim_ids:
        - EC-019
        - EC-025
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and valuation overhang remain high without audited financials, cap table, debt terms and
        current fair value.
    - risk_id: R-003
      summary: Customer concentration and ROI representativeness are unknown despite strong named-logo case studies.
    - risk_id: R-004
      summary: Large physical fulfillment footprint creates fixed-cost, labor, safety and service-level exposure.
    - risk_id: R-006
      summary: Privacy, security, contract and IP diligence is incomplete for a data-intensive commerce platform.
  key_evidence_gaps:
    - Audited/management financials, ARR/revenue bridge, gross margin and cash runway
    - Full cap table, debt, investor rights, liquidation preferences and option pool
    - Top-customer revenue, churn, NRR, contract terms and reference calls
    - Facility utilization, lease/labor obligations, SLA history and warehouse safety records
    - AI adoption, model governance, product telemetry and IP/code ownership
    - Security assurance, privacy compliance, insurance and counsel-reviewed litigation docket
  recommended_next_steps:
    - Open finance/cap-table data room before relying on valuation headlines.
    - Run customer-reference program across top, median and churned customers.
    - Review facility economics, lease obligations, labor/safety metrics and SLA claims.
    - Have counsel conduct litigation, IP, privacy, contract and insurance diligence.
    - Validate AI/automation roadmap with product analytics, model evaluation and customer ROI evidence.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports Cart.com as a private, heavily financed growth-stage commerce/logistics
      company, but audited financials, profitability, debt terms, cap table and current fair value remain private.
    founder_claim_ids:
      - FC-001
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or quarterly financial statements were public. Public proxies include a Deloitte Fast 500 claim of
          1,053.5% revenue growth from 2021 to 2024 and company statements about prior revenue growth, but revenue
          quality, margins and burn are not verifiable.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - Deloitte/Fast 500 release reports 1,053.5% revenue growth from 2021 to 2024.
          - Company pages and releases provide scale indicators but not GAAP financials, ARR, EBITDA, cash flow or
            working capital.
        hidden_risks:
          - Growth may include acquisitions and may not translate into profitable unit economics.
          - Logistics footprint can create fixed-cost leverage and downturn exposure.
        evidence_gaps:
          - Audited financials, monthly management accounts, ARR/revenue bridge, gross margin by product and cash runway.
          - Customer concentration, churn/NRR and revenue recognition policies.
        follow_up_questions:
          - Provide audited 2023-2025 financial statements and 2026 YTD management accounts.
          - Break revenue by software, fulfillment, services, pass-through shipping and marketplace services.
        table_ids:
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-005
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Management forecast assumptions are private. The 2026 investment release describes planned use of proceeds for
          software, AI, client investment, fulfillment footprint and operational efficiency, implying a
          growth-with-profitability plan but not disclosing targets.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - 2026 investment release explicitly references operational efficiency and sustainable/profitable growth.
          - No forecast model, bookings plan or sensitivity cases were public.
        hidden_risks:
          - AI and facility-expansion plans may require capital before payback is proven.
          - Forecast risk is amplified if customer acquisition depends on large enterprise deals and facility ramp
            timing.
        evidence_gaps:
          - 2026-2028 financial plan, scenario cases, sales pipeline, hiring plan and capex/lease commitments.
        follow_up_questions:
          - Provide board-approved forecast with revenue, gross margin, EBITDA, cash burn and covenant headroom.
          - Identify assumptions for AI adoption, facility utilization and new-customer ramp.
        table_ids:
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-005
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: SEC Form D filings and company releases disclose repeated financings from 2021 through 2026, including a 2026
          $180M growth-equity investment; however the cap table, liquidation preferences, debt, option pool and board
          rights are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - SEC data corroborates Form D offerings in 2021, 2023, 2024 and 2025.
          - 2026 announcement names Springcoast as lead investor and major existing investors.
          - Public valuation anchors include $1.2B in 2023 and a company-cited $1.6B valuation in 2025.
        hidden_risks:
          - Preference stack and debt could materially affect common-equity value.
          - Recent growth equity may include structured terms that headline valuation obscures.
        evidence_gaps:
          - Fully diluted cap table, SAFEs/notes/warrants, investor rights, debt agreements, 409A and secondary
            transactions.
        follow_up_questions:
          - Provide capitalization table and financing documents for all rounds since incorporation.
          - Reconcile SEC Form D amounts to bank proceeds and board approvals.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Other public financial information consists mainly of financing, GMV/order scale and marketing-spend claims. No
          tax, banking, debt covenant, accounts receivable aging, lease or insurance schedules were public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - Public claims include $10B+ annual GMV supported, 80M annual orders and $200M+ managed media.
          - Terms disclose a multi-affiliate structure that should be reconciled to legal entities and revenue streams.
        hidden_risks:
          - GMV, managed media and order count are not revenue; pass-through and services mix can distort growth
            interpretation.
          - Multi-entity operations may complicate intercompany obligations and customer contracting.
        evidence_gaps:
          - Debt schedule, tax filings, AR/AP aging, facility leases, customer deposits and revenue-recognition memo.
        follow_up_questions:
          - Provide quality-of-earnings package and legal-entity revenue waterfall.
          - Separate gross versus net revenue treatment across fulfillment, media and marketplace operations.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-010
          - EC-017
  - chapter_id: II
    title: Products
    chapter_summary: "Cart.com publicly offers a broad hybrid platform: physical fulfillment/logistics, OMS/WMS/TMS and
      marketplace/feed/B2B software, plus commerce services. Breadth is differentiated but increases operational
      complexity and margin-mix opacity."
    founder_claim_ids:
      - FC-002
      - FC-003
      - FC-006
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-013
    risk_ids:
      - R-002
      - R-004
      - R-005
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: "Product evidence supports three solution families: Fulfillment & Logistics, Commerce Software and Commerce
          Services. Cart.com describes proprietary OMS/WMS/TMS, marketplace/feed/B2B software, growth marketing,
          customer engagement and store optimization services."
        verification_status: partially_verified
        confidence: high
        key_findings:
          - Public site navigation and product pages consistently present the same three-family taxonomy.
          - Operational releases emphasize proprietary OMS/WMS/TMS, real-time inventory visibility and API integrations.
          - AI and automation claims appear central to future product differentiation.
        hidden_risks:
          - End-to-end breadth may be a services-heavy bundle with lower software margins unless revenue mix proves
            otherwise.
          - Proprietary claims require code ownership, IP chain-of-title and integration-quality verification.
          - Physical network execution risk sits inside the product promise.
        evidence_gaps:
          - Product revenue mix, attach rates, active users, uptime, roadmap delivery, implementation backlog and gross
            margin by module.
          - SOC 2/ISO, uptime/SLA history, incident logs and model governance.
        follow_up_questions:
          - Provide product P&L by family and top 20 module adoption cohorts.
          - Provide architecture, integration catalog, uptime/SLA and roadmap status.
        table_ids:
          - T-003
          - T-004
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-009
          - EC-013
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public customer proof is strong in named-logo breadth and selective outcomes, but revenue
      concentration, churn, NRR, contract terms and negative references are not public.
    founder_claim_ids:
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-006
      - EC-011
      - EC-012
      - EC-014
      - EC-015
      - EC-016
    risk_ids:
      - R-003
      - R-004
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public pages name or cite customers across apparel, footwear, grooming and consumer brands, including Tommy
          John, TOMS, Pacsun, Janie and Jack, Thursday Boots, The Underwear Expert and Foundry portfolio brands. None
          disclose revenue ranking or contract economics.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - Named recent wins and case studies support customer traction in apparel/consumer verticals.
          - Case studies show strong service metrics for selected customers.
          - About page claims 6,000+ customers worldwide.
        hidden_risks:
          - Published case studies may overrepresent successes and omit churn or service failures.
          - Customer base may be concentrated in apparel and consumer discretionary categories.
        evidence_gaps:
          - Top 25 customers by ARR/gross profit, contract term, renewal date, cohort, churn and NPS/reference status.
        follow_up_questions:
          - Provide customer concentration schedule and allow reference calls with top, median and churned customers.
          - Identify customer-count definition and active versus legacy customers.
        table_ids:
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-006
          - EC-011
          - EC-012
          - EC-014
          - EC-015
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public evidence identifies strategic customer/partner relationships, including Snowflake, Google Cloud, PayPal,
          Signifyd, Klaviyo, Gorgias and Foundry Brands. Relationship depth, exclusivity and revenue contribution are
          not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - Partner page lists technology and service partners and includes a Snowflake quote.
          - 2026 investment release names investors that may also have ecosystem relevance, including PayPal Ventures.
        hidden_risks:
          - Partner dependencies could affect product integrations, customer acquisition and data flow obligations.
          - Partner logos do not prove active joint pipeline or certified integrations.
        evidence_gaps:
          - Partner agreements, integration SLAs, partner-sourced pipeline and renewal terms.
        follow_up_questions:
          - Provide top partner contracts and partner-sourced ARR/gross profit.
          - Verify Snowflake/Google Cloud/PayPal integration status and data-processing terms.
        table_ids:
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-015
          - EC-016
          - EC-025
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No revenue by customer is public. Customer names and outcome metrics cannot determine concentration, margin,
          churn or renewal quality.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - Public customer examples span fulfillment, marketplace services and returns operations.
          - No ARR or gross profit by customer is disclosed.
        hidden_risks:
          - A few large enterprise/logistics customers could dominate revenue and facility utilization.
          - Low-margin fulfillment revenue could mask weaker software revenue quality.
        evidence_gaps:
          - Top-customer revenue, gross margin, AR aging, renewal timing, SLA penalties and churn cohort data.
        follow_up_questions:
          - Provide revenue/gross profit by top 25 customers for 2023-2026 YTD.
          - Break customer economics by product family and fulfillment center.
        table_ids:
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-006
          - EC-014
          - EC-015
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public list of severed customer or partner relationships was found. The legal docket search and case-study
          selectivity make churn/termination diligence necessary.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - No public customer-loss schedule exists.
          - CourtListener search surfaced litigation names but not enough detail to infer customer loss or
            employment/vendor disputes.
        hidden_risks:
          - Terminated relationships can create revenue cliffs, facility stranded costs or legal claims.
          - Selective public wins can hide churn.
        evidence_gaps:
          - Churned customers, terminated partner agreements, lost RFPs, disputed implementations and litigation links.
        follow_up_questions:
          - Provide customer-loss log for the last 24 months with reason codes.
          - Provide top implementation escalations and disputed invoices.
        table_ids:
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-021
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Top suppliers are not public. The business likely depends on facility landlords, labor providers, carriers,
          cloud/data vendors and SaaS/marketing ecosystem partners, but supplier concentration is not verifiable.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - Partner page publicly lists technology partners; logistics carrier/vendor contracts are private.
          - Terms indicate multiple affiliates and data/service providers.
        hidden_risks:
          - Carrier, labor, cloud or warehouse automation concentration could create cost and continuity risk.
          - Supplier contracts may contain change-of-control or minimum-volume obligations.
        evidence_gaps:
          - Top vendors by spend, carrier agreements, warehouse leases, cloud contracts, automation vendors and
            subcontractors.
        follow_up_questions:
          - Provide supplier/vendor spend schedule and critical third-party risk assessments.
          - Provide facility lease maturity schedule and carrier SLA/claims data.
        table_ids:
          - T-006
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-016
          - EC-017
  - chapter_id: IV
    title: Competition
    chapter_summary: Cart.com competes simultaneously with enterprise ecommerce software, 3PL/fulfillment networks,
      omnichannel logistics platforms and marketplace/feed specialists. Its integrated model is distinctive but exposes
      it to many focused competitors.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-022
      - EC-008
      - EC-007
    risk_ids:
      - R-004
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Competitive evidence maps Cart.com against Shopify Plus and BigCommerce in ecommerce software, ShipBob and
          Stord in fulfillment/logistics, and Rithum/Feedonomics in marketplace/feed operations. Cart.com differentiates
          by bundling software, services and physical network.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - Cart.com spans multiple categories rather than one narrow segment.
          - Competitors have narrower but potentially deeper positions in specific layers.
          - Cart.com’s physical logistics can be a moat or a margin drag depending on utilization.
        hidden_risks:
          - Multi-front competition can pressure pricing and product roadmap focus.
          - Customers may unbundle Cart.com if specialized competitors offer better price/performance.
        evidence_gaps:
          - Win/loss history, pricing benchmarks, renewal reasons, switching costs and competitor overlap in pipeline.
        follow_up_questions:
          - Provide competitive win/loss report by segment and top 20 lost deals.
          - Quantify attach rate and retention advantage from the integrated bundle.
        table_ids:
          - T-007
          - T-008
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-022
          - EC-008
          - EC-007
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Cart.com appears to acquire and expand customers through enterprise sales, vertical credibility,
      partner ecosystem, content/case studies and its own growth-marketing services; sales productivity and budget
      efficiency are private.
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-010
      - EC-014
      - EC-015
      - EC-016
    risk_ids:
      - R-003
      - R-004
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: Public GTM strategy emphasizes omnichannel commerce/logistics pain points, named customer outcomes, vertical
          content, partner ecosystem and services that can both generate demand and act as product proof.
        verification_status: partially_verified
        confidence: medium
        key_findings:
