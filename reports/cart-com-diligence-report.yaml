report_metadata:
  report_title: Cart.com Startup Diligence Report
  target_company: Cart.com
  website: https://www.cart.com/
  known_aliases:
    - Cart.com
    - Cart.com, Inc.
    - Cartdotcom
  sector: Unified commerce, ecommerce enablement, fulfillment logistics, commerce software and services
  geography: United States; headquartered in Houston, Texas with U.S. fulfillment network and selected international
    office footprint
  company_stage: Private unicorn / growth-stage commerce and logistics platform
  research_date: 2026-05-21
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: America/Chicago
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company-owned product, about, newsroom, policy, terms, partner and case-study pages
    - SEC Form D and issuer submissions
    - Public legal search via CourtListener
    - Representative competitor pages for market mapping
    - No private data room, interviews, paid market data, security testing or full counsel docket review
  included_jurisdictions:
    - United States federal securities/Form D filings
    - United States federal court search results surfaced by CourtListener
    - United States privacy, consumer, warehouse safety and contract issues from public policies
    - Public international office/data-transfer references where company pages mention them
  excluded_topics:
    - No audited financial statements or tax returns
    - No customer/management interviews
    - No paid legal docket, lien, corporate registry, trademark export or patent database review
    - No security testing or private compliance reports
    - No private customer contracts, leases, insurance policies or board materials
  user_provided_materials: []
