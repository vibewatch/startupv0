report_metadata:
  report_title: PointClickCare Startup Diligence Research Report
  target_company: PointClickCare Technologies Inc. / PointClickCare Corp.
  website: https://pointclickcare.com/
  known_aliases:
    - PointClickCare
    - PointClickCare Technologies
    - PointClickCare Technologies Inc.
    - PointClickCare Corp.
    - Wescom Solutions Inc.
  sector: Healthcare software / senior care SaaS / long-term and post-acute care EHR
  geography: Canada and United States; headquartered in Mississauga, Ontario per SEC filings
  company_stage: Private growth-stage unicorn / growth-equity-backed healthcare SaaS
  research_date: 2026-05-21
  analyst: GitHub Copilot startup diligence research agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Toronto
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Triangulated user-provided unicorn metadata with CB Insights, independent press, SEC filings and company/public
      legal sources.
    - Applied stop-condition screen for IPO completion, acquisition or shutdown before drafting; historical IPO filing
      was withdrawn in 2017.
    - Used company website/product/trust/privacy sources for current product and compliance positioning, with explicit
      caveats for management-authored evidence.
    - Used public legal records for litigation discovery and flagged where counsel-grade searches are required.
  included_jurisdictions:
    - United States federal securities and appellate court records
    - Canada/Ontario corporate context from public company disclosures and press
    - Public healthcare privacy/security sources relevant to U.S./Canadian operations
  excluded_topics:
    - Non-public data-room financials and contracts
    - Paid market research
    - Management/customer/supplier interviews
    - Formal legal/IP/accounting/tax opinions
  user_provided_materials:
    - material_id: UPM-001
      title: Three-company unicorn batch metadata including PointClickCare
      type: CB Insights-derived user-provided screening metadata
      date_received: 2026-05-21
      notes: Used only as screening input and cross-checked with public sources.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: PointClickCare qualifies for the unicorn batch with a screening valuation of about US$4.0B.
    claim_source: User-provided CB Insights-derived unicorn list; triangulated with CB Insights/BetaKit/Globe
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
      - EC-005
    contradiction_summary: Communitech later reported a value above US$5B, so US$4B is treated as the requested screening
      valuation rather than a current verified value.
    diligence_follow_up:
      - Request latest 409A/common and preferred valuation materials.
      - Request complete capitalization table and secondary-sale closing documents.
  - founder_claim_id: FC-002
    claim_text: Founders Mike and David Wessinger continued to control and operate the company after the 2021 H&F/Dragoneer
      minority investment.
    claim_source: BusinessWire company release and historical SEC filing
    claim_date: 2021-01-06
    mapped_chapter_ids:
      - I
      - VII
    mapped_section_ids:
      - I.C
      - VII.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-003
      - EC-026
    contradiction_summary: null
    diligence_follow_up:
      - Confirm current voting control, board seats, protective provisions and succession plan.
  - founder_claim_id: FC-003
    claim_text: PointClickCare has substantial long-term/post-acute-care scale, including thousands of providers/facilities
      and large resident/patient reach.
    claim_source: SEC F-1/A, BusinessWire and Communitech public statements
    claim_date: null
    mapped_chapter_ids:
      - I
      - III
    mapped_section_ids:
      - I.A
      - III.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
      - EC-007
      - EC-010
      - EC-022
    contradiction_summary: Public sources are from different years and use different denominators; current customer/revenue
      mix remains unverified.
    diligence_follow_up:
      - Request current logo count, ARR by segment, facility count and residents/patients served definitions.
  - founder_claim_id: FC-004
    claim_text: PointClickCare offers a broad healthcare software platform spanning EHR, billing, care coordination,
      analytics, marketplace and AI-enabled workflows.
    claim_source: PointClickCare website/product pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.B
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-012
      - EC-024
    contradiction_summary: null
    diligence_follow_up:
      - Validate product adoption, attach rates, churn and AI model governance in product demos and customer calls.
  - founder_claim_id: FC-005
    claim_text: PointClickCare maintains disclosed healthcare SaaS security/compliance controls including SOC and HITRUST
      certifications for relevant platforms.
    claim_source: PointClickCare Trust Center and Privacy Policy
    claim_date: null
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-013
      - EC-014
      - EC-028
    contradiction_summary: The trust portal claims need auditor reports, bridge letters and exception review.
    diligence_follow_up:
      - Obtain SOC 1/SOC 2/HITRUST reports, penetration-test summaries, incident log and HIPAA/PHIPA risk assessments.
  - founder_claim_id: FC-006
    claim_text: PointClickCare remains an active private company with no verified IPO completion, acquisition or shutdown event.
    claim_source: SEC filings, company website and 2021-2025 public sources
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-006
      - EC-019
    contradiction_summary: Historical IPO registration was withdrawn; no current stop event found, but private transactions may not be public.
    diligence_follow_up:
      - Recheck corporate registry, press releases, SEC/SEDAR+, and investor databases immediately before IC.
executive_summary:
  overall_assessment: "Proceed with diligence, not investment decision: PointClickCare passes the public stop-condition
    screen and appears to be a substantial private healthcare SaaS company, but current financials, cap table,
    contracts, customer concentration, PHI/security controls and interoperability litigation require data-room and
    counsel review."
  investment_or_diligence_thesis: The attractive thesis is a scaled incumbent in senior-care/post-acute healthcare
    software with broad product, customer and data-network reach. The underwriting hinge is whether current ARR quality,
    retention, product economics, legal/regulatory posture and growth outside core LTPAC justify the private-market
    valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-006
      summary: Historical IPO registration was withdrawn in 2017; no public evidence of IPO completion, acquisition or
        shutdown was found.
      evidence_claim_ids:
        - EC-006
        - EC-019
    - founder_claim_id: FC-002
      summary: BusinessWire release supports founder-control continuity after the 2021 H&F/Dragoneer minority investment.
      evidence_claim_ids:
        - EC-003
        - EC-026
    - founder_claim_id: FC-004
      summary: Current company pages verify broad product/vertical coverage across senior living, skilled nursing and
        cross-continuum healthcare workflows.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-012
    - founder_claim_id: FC-005
      summary: Trust Center and Privacy Policy confirm regulated PHI/PII context and disclosed security/privacy posture.
      evidence_claim_ids:
        - EC-013
        - EC-014
        - EC-028
  biggest_risks:
    - risk_id: R-001
      summary: Current audited financials, ARR, debt/cash, cap table and valuation terms are not public.
    - risk_id: R-002
      summary: Real Time litigation creates material interoperability/API access and information-blocking diligence risk.
    - risk_id: R-003
      summary: PHI/PII handling creates high privacy, cybersecurity and healthcare-regulatory exposure.
    - risk_id: R-004
      summary: Customer concentration, churn and satisfaction are hidden behind curated stories and aggregate scale claims.
    - risk_id: R-007
      summary: Secondary-heavy 2021 transaction evidence means headline valuation may not equal current primary enterprise
        value.
  key_evidence_gaps:
    - Audited financial statements, ARR/NRR/churn cohorts, cash/debt, gross margin and management projections.
    - Capitalization table, liquidation preferences, investor rights, secondary/tender documents and employee equity
      plan.
    - Top-customer ARR/concentration, renewal calendar, customer references and churn/downsells.
    - SOC/HITRUST reports, HIPAA/PHIPA risk assessments, breach logs, cyber insurance and regulatory searches.
    - Real Time litigation current status, API/interoperability policy and information-blocking legal analysis.
  recommended_next_steps:
    - Open a financial/legal/security data room and prioritize gaps G-001 through G-006 and G-013 through G-016.
    - Have healthcare regulatory and litigation counsel review Real Time, information-blocking exposure, BAAs/DPAs and
      agency/breach searches.
    - Run CFO/CEO/CPO/CISO diligence calls plus at least six permissioned customer/reference calls across SNF, senior
      living, hospital and risk-bearing segments.
    - Reconcile US$4B screening valuation with current valuation materials, secondary sale terms and later public US$5B+
      reports.
    - Perform product demos and technical review focused on AI Resident Status, marketplace/API governance, uptime and
      security controls.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports PointClickCare as a mature private healthcare SaaS company and validates a
      2021 US$4B unicorn screen, but current audited financials, ARR, profitability, debt, cash and valuation
      preferences are not public.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-019
      - EC-020
    risk_ids:
      - R-001
      - R-007
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Current annual/quarterly financial statements were not public. Historical SEC filings and later press estimates
          indicate substantial scale, but data-room financials are required.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: 2016 F-1/A disclosed 2015 revenue of US$125.4M and historical customer/facility scale.
            evidence_claim_ids:
              - EC-007
              - EC-020
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Communitech later reported revenue above US$500M and roughly 20% growth, but this is not audited financial
              evidence.
            evidence_claim_ids:
              - EC-005
              - EC-020
            risk_ids:
              - R-001
        hidden_risks:
          - Current ARR, EBITDA, cash/debt and revenue quality could materially diverge from public estimates.
        evidence_gaps:
          - Audited statements, monthly management accounts, ARR bridge, deferred revenue, gross margin, EBITDA,
            cash/debt and KPI cohorts are missing.
        follow_up_questions:
          - Provide audited financial statements for the last three fiscal years and monthly financials for the trailing
            24 months.
          - Provide ARR/NRR/churn by product and segment.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-007
          - EC-020
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No current management projections or budget variance data were public. Public scale supports diligence interest
          but not forecast underwriting.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Public sources include revenue/employee/customer estimates but no forward-looking operating plan.
            evidence_claim_ids:
              - EC-005
              - EC-020
            risk_ids:
              - R-001
        hidden_risks:
          - Growth-equity investors may underwrite aggressive expansion into acute/payer segments without public
            evidence of CAC/payback or roadmap delivery.
        evidence_gaps:
          - Board-approved plan, forecast model, assumptions, bookings pipeline, hiring plan and variance history are
            missing.
        follow_up_questions:
          - Provide board-approved financial plan and actual-vs-plan performance for the last eight quarters.
          - Provide sensitivity cases for retention, bookings, gross margin and R&D investment.
        table_ids:
          - T-003
          - T-013
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-020
          - EC-023
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public evidence identifies founders, H&F, Dragoneer and JMI-related secondary activity, but exact
          capitalization, investor rights and preferences are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: BusinessWire stated H&F made a minority strategic investment and Dragoneer increased investment, with founders
              continuing control.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-007
              - R-009
          - finding_id: I.C-F2
            finding: Independent press reported a US$4B valuation and secondary sale dynamics, including JMI mostly cashing out.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-007
        hidden_risks:
          - Secondary-heavy deals can create misread valuation signals and undisclosed investor preferences.
        evidence_gaps:
          - Current cap table, option pool, voting rights, liquidation preferences, debt and secondary documents are
            missing.
        follow_up_questions:
          - Provide fully diluted capitalization table and all equity/debt financing documents.
          - Provide 2021 secondary-sale/tender documents and current investor-rights agreements.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: SEC filings establish that the historical IPO registration was withdrawn. No public stop-event evidence was
          found, but private-company financial controls and tax matters remain unknown.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Form RW withdrew the F-1 registration and stated no securities had been issued or sold.
            evidence_claim_ids:
              - EC-006
              - EC-019
            risk_ids:
              - R-001
          - finding_id: I.D-F2
            finding: CB Insights lists a later small grant and overall disclosed funding history, but not full liquidity history.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-007
        hidden_risks:
          - Private M&A/recapitalization or material debt could be non-public.
        evidence_gaps:
          - Tax audits, debt/covenants, off-balance-sheet obligations and revenue-recognition policies are missing.
        follow_up_questions:
          - Provide tax returns, debt schedules, lease/commitment schedules and revenue recognition memos.
          - Reconfirm no IPO/acquisition/shutdown event before committee.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-006
          - EC-019
  - chapter_id: II
    title: Products
    chapter_summary: PointClickCare publicly markets a broad healthcare software portfolio for senior living, skilled
      nursing, providers, hospitals, risk-bearing organizations and ecosystem partners. The main diligence gap is not
      product existence but adoption, pricing, module economics, AI validation and roadmap execution.
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-011
      - EC-012
      - EC-021
      - EC-024
    risk_ids:
      - R-005
      - R-008
      - R-011
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public product pages identify a multi-product platform including senior living EHR, skilled nursing workflows,
          billing, care/service delivery, integrations, marketplace, cross-continuum solutions and AI-enabled nursing
          support. Pricing, attach rate and product-level financials are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Company pages verify broad product/vertical coverage across senior living, skilled nursing and adjacent
              healthcare segments.
            evidence_claim_ids:
              - EC-008
              - EC-009
              - EC-012
            risk_ids:
              - R-005
          - finding_id: II.A-F2
            finding: AI-powered Resident Status is publicly marketed, but model performance and governance are not public.
            evidence_claim_ids:
              - EC-009
              - EC-024
            risk_ids:
              - R-008
          - finding_id: II.A-F3
            finding: No SKU price cards, implementation economics or module attach rates were public.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-001
              - R-008
        hidden_risks:
          - Product breadth may mask uneven adoption, support burden or margin differences by module.
          - AI claims could create clinical, reputational or regulatory risk without validation.
        evidence_gaps:
          - SKU-level ARR, retention, attach rates, pricing, roadmap dates, model validation and customer support
            metrics are missing.
        follow_up_questions:
          - Provide product revenue by SKU, attach-rate cohorts and gross margin by product family.
          - Provide AI/model governance, validation, incident handling and product roadmap materials.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-012
          - EC-021
          - EC-024
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public sources show meaningful logo/use-case breadth and large provider scale, but top-customer
      concentration, revenue mix, churn, retention and supplier dependencies are not public.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-003
      - EC-005
      - EC-010
      - EC-011
      - EC-012
      - EC-022
    risk_ids:
      - R-004
      - R-006
      - R-011
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public customer stories provide examples across payer/risk-bearing, physician practice, hospital/ED,
          marketplace and long-term-care use cases, but they are not top customers by revenue.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Customer-story hub includes named examples across multiple care-continuum segments.
            evidence_claim_ids:
              - EC-010
              - EC-012
            risk_ids:
              - R-004
          - finding_id: III.A-F2
            finding: Public scale claims suggest broad provider penetration, but definitions vary by source and period.
            evidence_claim_ids:
              - EC-003
              - EC-005
              - EC-007
            risk_ids:
              - R-004
        hidden_risks:
          - Curated logos may overstate customer satisfaction or current relationship scope.
        evidence_gaps:
          - Top 20 customers by ARR, logo retention, segment mix and reference permissions are missing.
        follow_up_questions:
          - Provide top-customer ARR and reference-call list by segment.
          - Reconcile public customer counts to active paying logos and facilities.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-003
          - EC-005
          - EC-010
          - EC-022
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Marketplace, investor relationships and acquisition history are visible public signals, but partner economics
          and integration performance are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: PointClickCare markets a partner marketplace ecosystem.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-006
          - finding_id: III.B-F2
            finding: H&F/Dragoneer investor relationships and Collective Medical acquisition signal strategic expansion.
            evidence_claim_ids:
              - EC-003
              - EC-029
            risk_ids:
              - R-006
              - R-007
        hidden_risks:
          - Partner/API disputes and integration delays can affect customer value and legal exposure.
        evidence_gaps:
          - Partner roster, revenue share, partner-sourced ARR, API terms and acquisition integration KPIs are missing.
        follow_up_questions:
          - Provide partner marketplace economics and top partner contracts.
          - Provide integration roadmap and KPIs for acquired assets.
        table_ids:
          - T-007
          - T-008
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-011
          - EC-029
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer is not public. Customer stories and scale metrics provide presence signals, not
          concentration analysis.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.C-F1
            finding: Named customer stories do not disclose ARR, contract length, renewal status or concentration.
            evidence_claim_ids:
              - EC-010
              - EC-022
            risk_ids:
              - R-004
        hidden_risks:
          - A small number of enterprise chains, payers or health systems could carry outsized ARR or negotiation
            leverage.
        evidence_gaps:
          - Revenue concentration, NRR/churn by cohort, contract renewal calendar and AR aging are missing.
        follow_up_questions:
          - Provide ARR by customer, parent account, facility count and product module.
          - Provide renewal schedule and churn/downsells for the last twelve quarters.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-010
          - EC-022
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public schedule of lost major customers or severed strategic relationships was available.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Public sources do not disclose churned logos or terminated partner relationships.
            evidence_claim_ids:
              - EC-022
              - EC-023
            risk_ids:
              - R-004
              - R-006
        hidden_risks:
          - Recent churn or partner terminations could be hidden by curated customer stories.
        evidence_gaps:
          - Lost customer/partner schedule, dispute notices and non-renewal reasons are missing.
        follow_up_questions:
          - Provide lost customer report and top non-renewal/downsells for the last 24 months.
          - Provide partner termination/dispute log.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-022
          - EC-023
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Named top suppliers are not public. Diligence should focus on cloud hosting, security auditors, marketplace
          partners, data-access counterparties and regulatory data dependencies.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Trust/security, marketplace and litigation evidence indicate supplier/dependency categories but not named
              vendor contracts.
            evidence_claim_ids:
              - EC-011
              - EC-013
              - EC-015
              - EC-028
            risk_ids:
              - R-003
              - R-006
              - R-011
        hidden_risks:
          - Undisclosed cloud/subprocessor or API dependencies could create outage, security or contractual exposure.
        evidence_gaps:
          - Subprocessor list, cloud architecture, DR tests, security vendor scope and partner SLAs are missing.
        follow_up_questions:
          - Provide supplier/subprocessor schedule, top spend suppliers, DR/BCP tests and vendor risk reviews.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-011
          - EC-013
          - EC-015
          - EC-028
  - chapter_id: IV
    title: Competition
    chapter_summary: PointClickCare appears deeply positioned in long-term/post-acute care, but MatrixCare, Netsmart and
      WellSky publicly market overlapping suites, while acute/payer expansion increases exposure to broader healthcare
      platform competitors.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-008
      - EC-012
      - EC-018
    risk_ids:
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public competitor pages confirm overlapping market coverage. Competitive underwriting requires independent
          share data, win/loss analysis and pricing/discounting evidence.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: MatrixCare, Netsmart and WellSky all market overlapping long-term/post-acute software solutions.
            evidence_claim_ids:
              - EC-018
            risk_ids:
