risk_register:
  - risk_id: R-001
    risk_title: Current financial statements and valuation terms are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources support large scale and a historic unicorn valuation, but current audited financials, ARR,
      EBITDA, cash/debt, revenue quality and valuation preferences are unavailable.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - V.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-005
      - EC-020
    mitigation_or_diligence_request: Request audited financials, monthly ARR bridge, cohort retention, cash/debt schedule,
      budget/plan and valuation/cap-table materials.
    evidence_strength: medium
    confidence: medium
  - risk_id: R-002
    risk_title: Information-blocking/API access litigation risk
    risk_category: legal
    severity: high
    likelihood: medium
    description: Real Time Medical Systems litigation shows that third-party access to PointClickCare EHR data can become a
      material legal/regulatory and customer-relations issue.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.B
      - VI.B
      - VIII.A
      - VIII.G
    evidence_claim_ids:
      - EC-015
      - EC-016
    mitigation_or_diligence_request: Counsel should review current docket status, settlement posture, information-blocking
      analysis, API policies and customer notices.
    evidence_strength: high
    confidence: high
  - risk_id: R-003
    risk_title: PHI/privacy/cybersecurity exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: The platform handles PHI/PII and serves regulated healthcare workflows; disclosed SOC/HITRUST claims must
      be validated against reports, exceptions and incident history.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.E
      - VI.A
      - VIII.E
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-013
      - EC-014
      - EC-028
      - EC-030
    mitigation_or_diligence_request: Obtain SOC/HITRUST reports, HIPAA/PHIPA assessments, breach logs, cyber-insurance
      policies, subprocessor list and security incident metrics.
    evidence_strength: high
    confidence: high
  - risk_id: R-004
    risk_title: Customer concentration, churn and satisfaction unknown
    risk_category: customer
    severity: medium
    likelihood: high
    description: Public scale claims and curated customer stories do not disclose top-customer ARR, churn, NRR, contract
      terms or satisfaction metrics.
