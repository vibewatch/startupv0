diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Current audited financial statements, ARR, gross margin, EBITDA, cash and debt.
    why_it_matters: Current underwriting cannot rely on stale SEC data and public article estimates.
    suggested_source_or_request: Company CFO data room; audited statements and management accounts.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current capitalization table, preferred terms and 2021 secondary documents.
    why_it_matters: Valuation, control, liquidation preferences and dilution determine investor economics.
    suggested_source_or_request: Company/investor counsel closing sets and securities ledger.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, attach rates, pricing and gross margin.
    why_it_matters: Product breadth is public, but monetization quality is unknown.
    suggested_source_or_request: Product finance dashboards and SKU cohorts.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: AI Resident Status validation, model governance and incident handling.
    why_it_matters: AI/clinical workflow claims can create product, regulatory and reputational risk.
    suggested_source_or_request: Product/R&D model cards, validation data, risk controls and customer pilots.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer ARR, churn, renewals, NRR and customer satisfaction.
    why_it_matters: Customer concentration and retention are among the largest hidden value drivers.
    suggested_source_or_request: Customer success/finance data and permissioned reference calls.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Supplier/subprocessor schedule, cloud architecture and DR/BCP evidence.
    why_it_matters: PHI hosting and uptime risks can be material.
    suggested_source_or_request: Security, legal and infrastructure teams.
    priority: high
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Independent market-share, win/loss and competitive pricing data.
    why_it_matters: Public competitor pages confirm overlap but not relative strength.
    suggested_source_or_request: Sales ops win/loss files; third-party market study.
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, pipeline conversion and sales productivity by segment.
    why_it_matters: Scale and expansion cannot be underwritten without GTM efficiency.
    suggested_source_or_request: CRM/S&M analytics and board packs.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.A
    missing_information: Engineering org, architecture, uptime/SLA history and SDLC controls.
    why_it_matters: R&D capacity and reliability underpin product moat and compliance posture.
    suggested_source_or_request: CTO/CISO data room.
    priority: high
  - gap_id: G-010
    chapter_id: VI
    section_id: VI.B
    missing_information: Interoperability/API policy and information-blocking compliance roadmap.
    why_it_matters: Legal dispute suggests data-access policy can be a strategic risk.
    suggested_source_or_request: Product/legal/regulatory counsel memo.
    priority: high
  - gap_id: G-011
    chapter_id: VII
    section_id: VII.A
    missing_information: Current org chart, management bios and succession plan.
    why_it_matters: Founder-control and key-person risk require direct validation.
    suggested_source_or_request: CEO/CHRO board materials.
    priority: medium
  - gap_id: G-012
    chapter_id: VII
    section_id: VII.G
    missing_information: Turnover, engagement, compensation and incentive equity data.
    why_it_matters: Large workforce plus private-company liquidity history can affect retention.
    suggested_source_or_request: CHRO reports and equity plan documents.
    priority: medium
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation schedule and Real Time current status.
    why_it_matters: The appellate opinion is material but not a full legal-reserve picture.
    suggested_source_or_request: Company counsel and outside litigation counsel.
    priority: high
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC/HITRUST reports, HIPAA/PHIPA assessments, breach logs and agency-search confirmations.
    why_it_matters: PHI/PII exposure is structurally high and must be independently validated.
    suggested_source_or_request: CISO/compliance data room and healthcare regulatory counsel.
    priority: high
  - gap_id: G-015
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Formal patent/trademark/IP schedule, assignments and OSS/SBOM scan.
    why_it_matters: IP ownership and acquired-asset rights are not verified publicly.
    suggested_source_or_request: IP counsel and engineering compliance exports.
    priority: medium
  - gap_id: G-016
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Top customer/partner contracts, BAAs/DPAs, SLAs, indemnities and acquisition agreements.
    why_it_matters: Contract terms can drive churn, liability, data-use rights and pricing flexibility.
    suggested_source_or_request: Legal data room.
    priority: high
