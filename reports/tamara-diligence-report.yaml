risk_register:
  - risk_id: R-001
    risk_title: Financing structure and debt-facility risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: Tamara depends on equity and sizable warehouse/debt facilities;
      covenants, advance rates and collateral performance are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids: *a135
    evidence_claim_ids: *a136
    mitigation_or_diligence_request: Review financing documents, warehouse
      eligibility, covenants and stress scenarios.
  - risk_id: R-002
    risk_title: Merchant and customer concentration opacity
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Tamara reports large users and merchants but not GMV, active users,
      top-merchant share or take-rate concentration.
    impacted_chapter_ids:
      - III
    impacted_section_ids: *a137
    evidence_claim_ids: *a138
    mitigation_or_diligence_request: Request cohort, GMV, revenue and top merchant concentration analysis.
  - risk_id: R-003
    risk_title: Product profitability and conversion claims need proof
    risk_category: product
    severity: medium
    likelihood: medium
    description: Merchant uplift and app-originated shopping claims are public but
      not independently quantified.
    impacted_chapter_ids:
      - II
      - V
    impacted_section_ids: *a139
    evidence_claim_ids: *a140
    mitigation_or_diligence_request: Validate product-level contribution margin, ROAS and retention.
  - risk_id: R-004
    risk_title: BNPL regulatory and consumer-protection exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: BNPL, credit-score impact, collection practices, Sharia compliance
      and multi-country operations invite supervisory scrutiny.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids: *a141
    evidence_claim_ids: *a142
    mitigation_or_diligence_request: Review SAMA/UAE/Kuwait approvals, complaints,
      collections and compliance audits.
  - risk_id: R-005
    risk_title: Credit cycle and funding-cost sensitivity
    risk_category: financial
    severity: high
    likelihood: medium
    description: BNPL economics can deteriorate with delinquencies, macro stress or
      higher funding costs.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids: *a143
    evidence_claim_ids: *a144
    mitigation_or_diligence_request: Analyze vintage losses, provisions, funding
      cost, charge-offs and stress cases.
  - risk_id: R-006
    risk_title: Leadership and governance depth not fully public
    risk_category: team
    severity: medium
    likelihood: medium
    description: Founders are public, but complete org chart, board rights,
      succession and compensation are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids: *a145
    evidence_claim_ids: *a146
    mitigation_or_diligence_request: Request org chart, board composition, founder vesting and key-person terms.
  - risk_id: R-007
    risk_title: Legal and data privacy record incomplete
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public sources do not provide complete litigation, data-privacy,
      insurance or vendor-risk records.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids: *a147
    evidence_claim_ids: *a148
    mitigation_or_diligence_request: Run counsel-led litigation, regulatory, privacy and insurance diligence.
  - risk_id: R-008
    risk_title: Competitive pressure from BNPL/payment peers
    risk_category: market
    severity: medium
    likelihood: high
    description: Tamara faces regional and global payment, BNPL and bank competitors
      with similar merchant-facing value propositions.
    impacted_chapter_ids:
      - IV
    impacted_section_ids: *a149
    evidence_claim_ids: *a150
    mitigation_or_diligence_request: Benchmark pricing, approval rates, merchant
      terms and customer acquisition costs.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and management accounts
    why_it_matters: Required to verify revenue quality, burn, margin and runway.
    suggested_source_or_request: Audited annual statements, monthly management accounts and KPI package
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current capitalization and financing documents
    why_it_matters: Required to reconcile valuation, dilution, debt and preferences.
    suggested_source_or_request: Cap table, option pool, financing docs, debt agreements and board consents
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer/merchant revenue concentration and churn
    why_it_matters: Required to assess revenue predictability and concentration risk.
    suggested_source_or_request: Top-account schedule, cohort retention and customer reference calls
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity and CAC by channel
    why_it_matters: Required to validate GTM efficiency.
    suggested_source_or_request: Pipeline, bookings, CAC, quota attainment and channel ROI
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, R&D budget and technical validation
    why_it_matters: Required to validate product maturity and delivery risk.
    suggested_source_or_request: Roadmap, R&D headcount, budgets, QA/security/benchmark reports
    priority: medium
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, compensation and retention
    why_it_matters: Required to assess scaling and key-person risk.
    suggested_source_or_request: HRIS export, compensation bands, turnover and employment agreements
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Legal, regulatory, IP and insurance schedules
    why_it_matters: Required because public sources cannot prove absence of material issues.
    suggested_source_or_request: Counsel schedules, IP assignments, policies,
      regulatory correspondence and insurance binders
    priority: high
