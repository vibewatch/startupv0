executive_summary:
  overall_assessment: Tamara Finance Company qualifies for this run as an
    uncovered private unicorn candidate based on CB Insights and corroborating
    public evidence. The public record supports the high-level business
    narrative, but investment reliance requires private proof of financial
    quality, customer concentration, legal/regulatory status and valuation
    terms.
  investment_or_diligence_thesis: Proceed to full data-room diligence only if
    management can substantiate the valuation with primary financing documents,
    durable unit economics and customer/partner evidence. The public upside
    thesis is credible; the private diligence burden is material.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Tamara is an uncovered private unicorn at approximately US$1B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Tamara provides BNPL/payment products for consumers and merchants,
        including pay over up to 24 months.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Tamara has raised $500M equity and more than $400M debt financing since
        inception.
      evidence_claim_ids: *a3
    - founder_claim_id: FC-004
      summary: Tamara has more than 10M users, over 30,000 partner merchants and
        relationships with major regional/global merchants.
      evidence_claim_ids: *a4
  biggest_risks:
    - risk_id: R-001
      summary: Financing structure and debt-facility risk
    - risk_id: R-002
      summary: Merchant and customer concentration opacity
    - risk_id: R-003
      summary: Product profitability and conversion claims need proof
    - risk_id: R-004
      summary: BNPL regulatory and consumer-protection exposure
    - risk_id: R-005
      summary: Credit cycle and funding-cost sensitivity
  key_evidence_gaps:
    - Audited financial statements and management accounts
    - Current capitalization and financing documents
    - Customer/merchant revenue concentration and churn
    - Sales productivity and CAC by channel
    - Product roadmap, R&D budget and technical validation
  recommended_next_steps:
    - Request full financial/cap-table data room before relying on valuation.
    - Run customer, legal/regulatory, IP, security/privacy and
      management-reference diligence.
    - Reconcile every public metric to definitions, time series and source
      documents.
