risk_register:
  - risk_id: R-001
    risk_title: "Financial opacity and unverified revenue quality"
    risk_category: financial
    severity: high
    likelihood: high
    description: "Audited financials, ARR bridge, margins, burn, cash, debt, and retention are not public; analyst estimates are insufficient for valuation reliance."
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.A]
    evidence_claim_ids: [EC-004]
    mitigation_or_diligence_request: "Request audited/reviewed financial statements, management accounts, ARR bridge, revenue-recognition memo, deferred revenue, billings, gross-margin breakdown, cash/burn/runway, and debt schedule."
  - risk_id: R-002
    risk_title: "Valuation compression and preference-stack risk"
    risk_category: financing
    severity: high
    likelihood: medium
    description: "Forge public data imply a reset from $2B in 2023 to $1.24B in 2025; downside protections may change common-equity economics."
    impacted_chapter_ids: [I, V]
    impacted_section_ids: [I.C, V.A]
    evidence_claim_ids: [EC-001, EC-002]
    mitigation_or_diligence_request: "Review Series C/D financing documents, liquidation preferences, anti-dilution, warrants, debt, option pool, and 409A."
  - risk_id: R-003
    risk_title: "Customer concentration and contract-quality risk"
    risk_category: customer
    severity: high
    likelihood: medium
    description: "Public customer logos and case studies do not disclose customer-level ARR, production status, renewal timing, or revenue concentration."
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, III.C, V.B]
    evidence_claim_ids: [EC-007, EC-008, EC-009, EC-010, EC-011, EC-012]
    mitigation_or_diligence_request: "Request top-20 customer schedule, contracts, renewal calendar, NRR/GRR, churn/expansion, implementation status, and reference calls."
  - risk_id: R-004
    risk_title: "Sensitive-data, privacy, security, and AI governance exposure"
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: "Instabase processes regulated enterprise documents; public controls need verification against SOC reports, DPAs, subprocessors, model-provider terms, and incidents."
    impacted_chapter_ids: [II, III, VIII]
    impacted_section_ids: [II.A, III.A, VIII.G]
    evidence_claim_ids: [EC-006, EC-019]
    mitigation_or_diligence_request: "Review SOC 2, HIPAA/BAA scope, DPA, subprocessors, model terms, incident log, cyber insurance, and security remediation evidence."
  - risk_id: R-005
    risk_title: "Competition and commoditization risk"
    risk_category: market
    severity: medium
    likelihood: high
    description: "IDP growth attracts specialists, RPA suites, hyperscalers, and LLM platforms; extraction features may commoditize."
    impacted_chapter_ids: [IV]
    impacted_section_ids: [IV.A]
    evidence_claim_ids: [EC-013, EC-014]
    mitigation_or_diligence_request: "Analyze win/loss, product differentiation, pricing trends, customer switching costs, and independent benchmark data."
  - risk_id: R-006
    risk_title: "AI accuracy, drift, and workflow liability risk"
    risk_category: technical
    severity: high
    likelihood: medium
    description: "Public product controls are positive but unverified; document-processing errors in lending, insurance, banking, or public-sector workflows may cause costly failures."
    impacted_chapter_ids: [II, III, VI]
    impacted_section_ids: [II.A, III.A, VI.B]
    evidence_claim_ids: [EC-005, EC-016]
    mitigation_or_diligence_request: "Run blinded benchmarks, review golden datasets, exception workflows, model-change controls, human review, audit logs, and incident reports."
  - risk_id: R-007
    risk_title: "Private-status evidence is public-source limited"
    risk_category: legal
    severity: medium
    likelihood: low
    description: "No public IPO/acquisition/shutdown evidence was found, but confidential transactions or preparations may not be visible."
    impacted_chapter_ids: [I, VIII]
    impacted_section_ids: [I.D, VIII.F]
    evidence_claim_ids: [EC-001, EC-021]
    mitigation_or_diligence_request: "Obtain counsel certificate and management representation on IPO/M&A, solvency, tender offers, and material corporate actions."
  - risk_id: R-008
    risk_title: "Enterprise GTM scalability and implementation burden"
    risk_category: operational
    severity: medium
    likelihood: medium
    description: "Enterprise document automation may require long sales cycles and heavy implementation/support; public hiring and customer stories do not show CAC or services margin."
    impacted_chapter_ids: [V, VII]
    impacted_section_ids: [V.A, VII.A]
    evidence_claim_ids: [EC-007, EC-018]
    mitigation_or_diligence_request: "Review pipeline, CAC payback, implementation hours, services gross margin, quota attainment, sales cycle, and partner channel economics."
  - risk_id: R-009
    risk_title: "Talent, founder, and R&D execution risk"
    risk_category: team
    severity: medium
    likelihood: medium
    description: "AI-native enterprise product execution requires scarce technical talent; public leadership/hiring evidence does not reveal attrition, org depth, compensation, or roadmap risk."
    impacted_chapter_ids: [VI, VII]
    impacted_section_ids: [VI.A, VII.A]
    evidence_claim_ids: [EC-017, EC-018]
    mitigation_or_diligence_request: "Request org chart, headcount plan, attrition, compensation, option pool, key-person plan, R&D roadmap, and engineering metrics."
  - risk_id: R-010
    risk_title: "Unverified litigation docket flag"
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: "A PacerMonitor docket title indicates litigation involving M&T Bank, but pleadings and merits were not reviewed."
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.A]
    evidence_claim_ids: [EC-020]
    mitigation_or_diligence_request: "Obtain full docket, pleadings, settlement correspondence, reserves, insurance notices, and counsel assessment."

