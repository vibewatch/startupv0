limitations:
  - The report uses only public evidence available during the session and does not include private data-room review.
  - Third-party links that returned HTTP errors, paywall blocks, challenge pages, or 404 shells were not treated as substantive evidence.
  - Company-published product, customer, trust, and leadership claims are useful diligence leads but require independent confirmation.
  - No secrets, private credentials, customer contracts, employee records, or confidential trust-center documents were accessed.
  - Negative findings mean "not publicly verified from sources reviewed" rather than proof that a matter does not exist.
