  geography: United States / Israel
  research_date: 2026-05-20
  diligence_depth: standard
  report_version: "1.0"
  prepared_by: GitHub Copilot
research_scope:
  diligence_depth: standard
  assignment_context: Random uncovered private-unicorn diligence report generated from public evidence.
  target_company_name: Cyera
  known_aliases:
    - Cyera Ltd.
    - Cyera, Inc.
  website: https://www.cyera.com/
  sector_and_business_model: Enterprise cybersecurity software focused on data security posture management, data discovery, classification, DLP, access governance, and AI security.
  geography: New York, United States; Tel Aviv, Israel; additional public hiring locations.
  source_strategy:
    - Existing reports were excluded before selection.
    - Public unicorn status and valuation were checked against the CB Insights global unicorn list.
    - Company-owned pages were used for product, customer, leadership, security, privacy, and hiring evidence.
    - Third-party pages that returned errors, paywalls, or challenge pages were not used as substantive evidence.
  limitations:
    - No private data-room records, contracts, audited financial statements, employee files, cap-table documents, board materials, or customer calls were available.
    - Some press and media pages were inaccessible or returned 404/challenge pages; those pages are excluded from evidence except as limitations.
