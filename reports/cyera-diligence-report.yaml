executive_summary:
  overall_assessment: Cyera is a credible high-growth private cybersecurity unicorn with strong public signals in DSPM, AI security, enterprise logos, compliance posture, and leadership depth, but the public record is insufficient to underwrite valuation, revenue quality, customer concentration, retention, legal exposure, or cap-table economics.
  investment_or_diligence_thesis: Proceed only with full financial, customer, security, legal, and cap-table diligence; public evidence supports eligibility and market relevance but not transaction pricing.
  recommendation: Track / diligence required
  key_verified_points:
    - CB Insights lists Cyera at $9B, date joined 2024-04-09, United States, New York, Enterprise Tech, with Accel, CyberStarts, and Sequoia Capital named as investors.
    - Company pages describe a broad AI security and data-security platform with data discovery, classification, DSPM, DLP, access governance, AI Guardian, remediation, and identity/access context.
    - Public materials identify well-known customer and trust signals, but not contract value, deployment depth, renewal status, or concentration.
    - The trust center presents multiple compliance frameworks and assurance artifacts, but most underlying reports require direct access/NDA review.
  key_evidence_gaps:
    - Audited financials, ARR, bookings, revenue recognition, gross margin, burn, cash/debt, backlog, and AR aging.
    - Cap table, preferred terms, option pool, debt, warrants, secondary transactions, and current fair-value evidence.
    - Customer contracts, top-customer ARR, renewal calendar, churn/NRR, pricing, implementation timelines, support tickets, and reference calls.
    - Product telemetry, false-positive/false-negative performance, security incidents, model-risk controls, roadmap delivery, and cloud cost economics.
    - Official legal docket search, IP assignment records, open-source/SBOM review, regulatory correspondence, and insurance claims.
  top_risks:
    - Financial quality and valuation support are opaque.
    - Customer concentration and renewal durability are not publicly verifiable.
    - Product claims around AI/classification precision and rapid value require technical validation.
    - Privacy/security posture must be validated because Cyera operates in sensitive-data workflows.
