evidence_claims:
  - evidence_claim_id: EC-001
    claim: Eruditus has public unicorn-status evidence at a US$3.2B August 2021 valuation.
    evidence_summary: LiveMint reported a US$650M Series E at US$3.2B; Wikipedia current unicorn list carries the same valuation/date.
    evidence_type: independent_news
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-001
      - SRC-002
    related_chapter_ids:
      - I
    related_section_ids:
      - I.C
      - I.D
    quote_or_excerpt: LiveMint reported a US$650M Series E at US$3.2B; Wikipedia current unicorn list carries the same valuation/date.
    analyst_note: Public-source evidence; confirm in management diligence.
  - evidence_claim_id: EC-002
    claim: Eruditus operates in executive education/upskilling through university-partnered online programs.
    evidence_summary: LiveMint described more than 250 learning programmes with over 50 universities for professionals.
    evidence_type: independent_news
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-002
    related_chapter_ids:
      - II
    related_section_ids:
      - II.A
    quote_or_excerpt: LiveMint described more than 250 learning programmes with over 50 universities for professionals.
    analyst_note: Public-source evidence; confirm in management diligence.
  - evidence_claim_id: EC-003
    claim: Public materials show meaningful operating scale but do not provide audited financials.
    evidence_summary: LiveMint reported 250,000 learners across 80 countries, a 1,550-person team across 14 countries, and a bookings target; audited statements were not public.
    evidence_type: independent_news
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-002
    related_chapter_ids:
      - I
      - VII
    related_section_ids:
      - I.A
      - VII.B
    quote_or_excerpt: LiveMint reported 250,000 learners across 80 countries, a 1,550-person team across 14 countries, and a bookings target; audited statements were not public.
    analyst_note: Public-source evidence; confirm in management diligence.
  - evidence_claim_id: EC-004
    claim: A 2024 press report suggested valuation reset/down-round risk.
    evidence_summary: Inc42 reported talks for US$150M at a likely US$2.3B valuation, 28% below the prior US$3.2B mark and dependent on performance targets.
    evidence_type: independent_news
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-003
    related_chapter_ids:
      - I
    related_section_ids:
      - I.C
    quote_or_excerpt: Inc42 reported talks for US$150M at a likely US$2.3B valuation, 28% below the prior US$3.2B mark and dependent on performance targets.
    analyst_note: Public-source evidence; confirm in management diligence.
  - evidence_claim_id: EC-005
    claim: Management and founder identity are publicly visible through Emeritus materials.
    evidence_summary: Emeritus lists Ashwin Damera and Chaitanya Kalipatnapu as co-founders and executive directors, plus finance, enterprise and product leaders.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-004
    related_chapter_ids:
      - VII
    related_section_ids:
      - VII.C
    quote_or_excerpt: Emeritus lists Ashwin Damera and Chaitanya Kalipatnapu as co-founders and executive directors, plus finance, enterprise and product leaders.
    analyst_note: Public-source evidence; confirm in management diligence.
  - evidence_claim_id: EC-006
    claim: Core financial statements, cap table, current cash/debt, cohort retention and customer concentration are not publicly verifiable.
    evidence_summary: No public source reviewed supplied audited financial statements, current cap table, lender terms, customer revenue concentration or cohort retention.
    evidence_type: other
    verification_status: not_publicly_verifiable
    confidence: low
    source_ids:
      - SRC-002
      - SRC-003
      - SRC-005
    related_chapter_ids:
      - I
      - III
    related_section_ids:
      - I.A
      - III.C
    quote_or_excerpt: No public source reviewed supplied audited financial statements, current cap table, lender terms, customer revenue concentration or cohort retention.
    analyst_note: Requires private data-room evidence or direct confirmation.
  - evidence_claim_id: EC-007
    claim: The product and customer model appears dependent on university partnerships and professional learner demand.
    evidence_summary: LiveMint cited university partnerships with Harvard, Wharton, IIMs and IITs, and specialized courses for corporate customers.
    evidence_type: independent_news
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-002
    related_chapter_ids:
      - II
      - III
    related_section_ids:
      - II.A
      - III.B
    quote_or_excerpt: LiveMint cited university partnerships with Harvard, Wharton, IIMs and IITs, and specialized courses for corporate customers.
    analyst_note: Public-source evidence; confirm in management diligence.
  - evidence_claim_id: EC-008
    claim: Public research did not find an IPO, acquisition, or shutdown signal for Eruditus by the research date.
    evidence_summary: The sources reviewed describe financing and potential IPO planning but not a completed IPO, sale or shutdown.
    evidence_type: other
    verification_status: inconclusive
    confidence: medium
    source_ids:
      - SRC-001
      - SRC-003
      - SRC-004
    related_chapter_ids:
      - I
    related_section_ids:
      - I.C
    quote_or_excerpt: The sources reviewed describe financing and potential IPO planning but not a completed IPO, sale or shutdown.
    analyst_note: Public-source evidence; confirm in management diligence.
  - evidence_claim_id: EC-009
    claim: The edtech market has valuation and demand cyclicality risk.
    evidence_summary: The reported potential 2024 valuation decrease against the 2021 round indicates sensitivity to market conditions and performance targets.
    evidence_type: independent_news
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-003
    related_chapter_ids:
      - IV
    related_section_ids:
      - IV.A
    quote_or_excerpt: The reported potential 2024 valuation decrease against the 2021 round indicates sensitivity to market conditions and performance targets.
    analyst_note: Public-source evidence; confirm in management diligence.
  - evidence_claim_id: EC-010
    claim: Legal, regulatory, IP and contract exposure require private diligence.
    evidence_summary: Public sources did not disclose material lawsuits, regulatory actions, IP schedules, university contracts or insurance coverage.
    evidence_type: other
    verification_status: not_publicly_verifiable
    confidence: low
    source_ids:
      - SRC-004
      - SRC-005
    related_chapter_ids:
      - VIII
    related_section_ids:
      - VIII.G
    quote_or_excerpt: Public sources did not disclose material lawsuits, regulatory actions, IP schedules, university contracts or insurance coverage.
    analyst_note: Requires private data-room evidence or direct confirmation.
