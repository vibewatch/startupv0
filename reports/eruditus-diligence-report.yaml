limitations:
  - Public-source diligence only; no management interview, private data room, customer calls, paid database export or counsel-led docket search was available.
  - Some source pages were inaccessible, rate-limited, blocked or returned errors; inaccessible materials are treated as gaps rather than evidence.
  - Current private-company valuation and eligibility can change quickly; no claim is made beyond public evidence reviewed on 2026-05-27.
  - Company-authored technical, scale or product claims require independent verification before underwriting.
