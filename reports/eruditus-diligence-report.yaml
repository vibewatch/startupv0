report_metadata:
  report_title: Eruditus Startup Diligence Report
  target_company: Eruditus
  website: https://www.eruditus.com/
  known_aliases:
    - Eruditus Executive Education
    - Emeritus
    - Eruditus Group
  sector: Educational technology / executive education
  geography: India, Singapore, United States and global online education markets
  company_stage: Late-stage private edtech unicorn
  research_date: 2026-05-27
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public sources only; no private data room, management interview, customer call or paid database access.
    - Built exclusion list from reports/*-diligence-report.yaml and selected uncovered private unicorns from the current Wikipedia unicorn table plus public source checks.
    - Treated company-authored claims as evidence of the claim being made, not independent proof of outcome.
  included_jurisdictions:
    - India, Singapore, United States and global online education markets
  excluded_topics:
    - Non-public financial statements, board materials, customer calls, contracts, HRIS exports and security reports were unavailable.
  user_provided_materials: []
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Eruditus is an active private unicorn valued at US$3.2B in its 2021 Series E.
    claim_source: Public unicorn/news sources
    claim_date: 2021-08-12
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids: &a1
      - EC-001
      - EC-008
    contradiction_summary: null
    diligence_follow_up:
      - Request financing documents, cap table and any 2024/2025 valuation support.
  - founder_claim_id: FC-002
    claim_text: Eruditus offers executive education/upskilling programs with global university partners.
    claim_source: Public company/news sources
    claim_date: null
    mapped_chapter_ids:
      - II
      - III
    mapped_section_ids:
      - II.A
      - III.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: &a2
      - EC-002
      - EC-007
    contradiction_summary: null
    diligence_follow_up:
      - Request partner contracts, revenue by program, learner completion and renewal/placement data.
  - founder_claim_id: FC-003
    claim_text: Eruditus operating performance supports late-stage valuation expectations.
    claim_source: Implied valuation narrative
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.A
      - I.B
    verification_status: not_publicly_verifiable
    confidence: low
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-006
    contradiction_summary: Public scale signals exist, but audited financials and updated forecasts are missing.
    diligence_follow_up:
      - Request audited financials, bookings/ARR bridge, burn, cash and forecast model.
executive_summary:
  overall_assessment: "Eruditus passed the public-source operating-company screen after replacing an ineligible acquired candidate. Proceed only with confirmatory diligence: public evidence supports Eruditus as an operating edtech unicorn with meaningful global scale, but investment underwriting depends on private financial, cohort, partner-contract and current valuation materials."
  investment_or_diligence_thesis: "Proceed only with confirmatory diligence: public evidence supports Eruditus as an operating edtech unicorn with meaningful global scale, but investment underwriting depends on private financial, cohort, partner-contract and current valuation materials."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Eruditus is an active private unicorn valued at US$3.2B in its 2021 Series E.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Eruditus offers executive education/upskilling programs with global university partners.
      evidence_claim_ids: *a2
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and current valuation support are not public
    - risk_id: R-002
      summary: Potential down-round / performance-target valuation reset
    - risk_id: R-003
      summary: University-partner and learner-demand dependency
  key_evidence_gaps:
    - Audited financial statements, current cash/debt/runway and board-approved forecast.
    - Cap table, financing preferences, options/warrants, debt and current valuation support.
    - Top-customer revenue, contracts, churn/retention and independent customer references.
    - Material contracts, legal/regulatory/IP/security/insurance artifacts.
    - HRIS, compensation, option plan, turnover and hiring plan.
  recommended_next_steps:
    - Request finance, legal, customer, HR and product/security data-room indexes before relying on headline valuation.
    - Run customer-reference and revenue-quality workstream focused on concentration, retention and gross margin.
    - Have counsel and technical specialists review contracts, regulatory exposure, IP ownership, privacy/security and product risk.
