executive_summary:
  overall_assessment: Poolside has strong public financing, founder, technical, and strategic-partner signals, but underwriting risk is high because model economics, customer conversion, benchmark superiority, and IP/data governance are not public.
  investment_or_diligence_thesis: "Treat Poolside as a high-upside/high-risk AI infrastructure diligence target: proceed only with rigorous private validation of model performance, customer ARR, compute unit economics, data rights, security posture, and competitive retention."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Poolside is building foundation models and software agents for software development.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Poolside closed a $500M Series B and is valued at about $3B.
      evidence_claim_ids: *a2
  biggest_risks:
    - risk_id: R-001
      summary: "Compute intensity and burn can outpace commercialization: Poolside trains proprietary models at large GPU scale; revenue, gross margin, committed compute, and runway are not public."
    - risk_id: R-002
      summary: "Customer proof and ARR concentration are undisclosed: Public sources describe pilots and enterprises but do not name customers, ARR, renewal terms, or conversion rates."
    - risk_id: R-003
      summary: "Crowded AI coding market pressures differentiation: Poolside competes with deeply funded incumbents and developer-tool leaders; public evidence lacks independent benchmark and win/loss proof."
    - risk_id: R-004
      summary: "Data, IP, and model-governance liability: Training-data rights, code IP provenance, customer code handling, privacy, and public-sector controls are material and not publicly verifiable."
  key_evidence_gaps:
    - Poolside audited financial statements, revenue by product, gross margin, burn, runway, debt, and full cap table are not public.
    - Poolside product usage, retention by module, pricing realization, roadmap, and SLA performance are not public.
    - Poolside customer list, top-account concentration, ARR by customer, renewal rates, NRR, and reference calls are not public.
    - Poolside win/loss data and competitive displacement evidence are not public.
    - Poolside CAC, sales cycle, channel economics, partner-sourced pipeline, and marketing attribution are not public.
    - Poolside R&D budget, model or platform benchmarks, security test results, and roadmap dependencies are not public.
  recommended_next_steps:
    - Request audited financials, board pack, cap table, financing documents, debt schedules, and monthly operating model.
    - Request product analytics, packaging/pricing history, churn cohorts, roadmap, uptime/SLA reports, and support metrics.
    - Request anonymized customer ARR schedule, top-20 account contracts, churn log, and reference-call access.
    - Request CRM win/loss exports, competitive battlecards, pipeline conversion by competitor, and gross retention by segment.
    - Request CAC payback, sales cycle, pipeline source, channel margin, partner agreements, and quota attainment.
    - Request R&D roadmap, architecture review, model/platform benchmarks, vuln management evidence, and engineering productivity data.
