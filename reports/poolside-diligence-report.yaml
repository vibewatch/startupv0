report_metadata:
  report_title: Poolside Public-Source Startup Diligence Report
  target_company: Poolside
  website: https://poolside.ai/
  known_aliases:
    - poolside
    - poolside.ai
    - Poolside AI
  sector: Foundation models and AI software-development agents for enterprise and public-sector software engineering
  geography: United States headquartered with distributed US and Europe team footprint
  company_stage: Late-stage private AI unicorn
  research_date: 2026-05-29
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from reports/*-diligence-report.yaml and selected this uncovered target from the CB Insights unicorn tracker.
    - Prioritized company-owned product, funding, privacy/security, and customer/partner pages, then supplemented with reputable news and investor/partner sources.
    - Classified undisclosed financial, customer-concentration, cap-table, legal, and employee metrics as not publicly verifiable rather than estimating them.
  included_jurisdictions:
    - United States
    - European Union / France context
    - Global enterprise and public-sector buyers
  excluded_topics:
    - Private audited financial statements, bank statements, debt schedules, revenue cohorts, customer contracts, and cap table records were not available.
    - No customer, supplier, employee, founder, or investor interviews were performed.
    - No paid database, private registry, PACER, or non-public app analytics access was used.
  user_provided_materials:
    - material_id: M-001
      title: User prompt requesting three random unicorn diligence reports
      type: prompt_argument
      date_received: 2026-05-29
      notes: No private diligence materials or founder-supplied claims were provided.
