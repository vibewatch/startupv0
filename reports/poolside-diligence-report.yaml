risk_register:
  - risk_id: R-001
    risk_title: Compute intensity and burn can outpace commercialization
    risk_category: financial
    severity: critical
    likelihood: medium
    description: Poolside trains proprietary models at large GPU scale; revenue, gross margin, committed compute, and runway are not public.
    impacted_chapter_ids:
      - I
      - VI
    impacted_section_ids:
      - I.A
      - VI.A
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Review cloud/GPU contracts, burn, gross margin, revenue pipeline, and capital plan.
  - risk_id: R-002
    risk_title: Customer proof and ARR concentration are undisclosed
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public sources describe pilots and enterprises but do not name customers, ARR, renewal terms, or conversion rates.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.A
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Request signed contracts, ARR by account, pilot conversion, references, and services margin.
  - risk_id: R-003
    risk_title: Crowded AI coding market pressures differentiation
    risk_category: market
    severity: high
    likelihood: high
    description: Poolside competes with deeply funded incumbents and developer-tool leaders; public evidence lacks independent benchmark and win/loss proof.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a13
    mitigation_or_diligence_request: Request direct win/loss evidence, pricing benchmarks, and customer switching data.
  - risk_id: R-004
    risk_title: Data, IP, and model-governance liability
    risk_category: legal
    severity: high
    likelihood: medium
    description: Training-data rights, code IP provenance, customer code handling, privacy, and public-sector controls are material and not publicly verifiable.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.A
    evidence_claim_ids: *a14
    mitigation_or_diligence_request: Review data lineage, IP assignments, OSS/license scans, model evals, DPAs, SOC reports, and incident history.
  - risk_id: R-005
    risk_title: Strategic infrastructure dependency
    risk_category: technical
    severity: medium
    likelihood: medium
    description: AWS/Bedrock/Trainium and NVIDIA GPU access support distribution and training, but dependency economics and resilience are private.
    impacted_chapter_ids:
      - III
      - VI
    impacted_section_ids:
      - III.A
      - VI.A
    evidence_claim_ids: *a15
    mitigation_or_diligence_request: Review cloud contracts, portability plan, capacity commitments, and fallback infrastructure.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Poolside audited financial statements, revenue by product, gross margin, burn, runway, debt, and full cap table are not public.
    why_it_matters: Valuation quality cannot be assessed without revenue scale, growth, margin, dilution, liquidation preferences, and cash runway.
    suggested_source_or_request: Request audited financials, board pack, cap table, financing documents, debt schedules, and monthly operating model.
    priority: high
  - gap_id: G-002
    chapter_id: II
    section_id: II.A
    missing_information: Poolside product usage, retention by module, pricing realization, roadmap, and SLA performance are not public.
    why_it_matters: Product-market fit and monetization quality require cohort and deployment evidence.
    suggested_source_or_request: Request product analytics, packaging/pricing history, churn cohorts, roadmap, uptime/SLA reports, and support metrics.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Poolside customer list, top-account concentration, ARR by customer, renewal rates, NRR, and reference calls are not public.
    why_it_matters: Customer concentration and retention drive revenue durability and downside risk.
    suggested_source_or_request: Request anonymized customer ARR schedule, top-20 account contracts, churn log, and reference-call access.
    priority: high
  - gap_id: G-004
    chapter_id: IV
    section_id: IV.A
    missing_information: Poolside win/loss data and competitive displacement evidence are not public.
    why_it_matters: Public positioning does not prove durable differentiation or pricing power.
    suggested_source_or_request: Request CRM win/loss exports, competitive battlecards, pipeline conversion by competitor, and gross retention by segment.
    priority: medium
  - gap_id: G-005
    chapter_id: V
    section_id: V.A
    missing_information: Poolside CAC, sales cycle, channel economics, partner-sourced pipeline, and marketing attribution are not public.
    why_it_matters: GTM efficiency determines whether growth can scale without excessive burn.
    suggested_source_or_request: Request CAC payback, sales cycle, pipeline source, channel margin, partner agreements, and quota attainment.
    priority: medium
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Poolside R&D budget, model or platform benchmarks, security test results, and roadmap dependencies are not public.
    why_it_matters: Technical defensibility and execution risk require internal evidence.
    suggested_source_or_request: Request R&D roadmap, architecture review, model/platform benchmarks, vuln management evidence, and engineering productivity data.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.A
    missing_information: Poolside headcount by function, attrition, compensation, hiring plan, board composition, and option refresh history are not public.
    why_it_matters: Talent density, retention, and governance affect execution and financing risk.
    suggested_source_or_request: Request HRIS exports, org chart, attrition report, compensation bands, board minutes, and hiring plan.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Poolside complete litigation searches, IP assignment chain, open-source license scan, DPIAs, DPAs, and regulatory correspondence are not public.
    why_it_matters: Legal, IP, privacy, and compliance risks can create hidden liabilities.
    suggested_source_or_request: Request counsel memo, litigation schedule, IP assignment records, open-source scan, DPAs, SOC/security reports, and privacy impact assessments.
    priority: medium
