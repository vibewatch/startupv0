executive_summary:
  overall_assessment: Aqua Security appears to be an eligible active private unicorn based on current public unicorn lists
    and active public product materials. Public evidence supports valuation/status, product presence and some customer
    or operating signals, but investment-grade diligence remains unresolved because financials, customer concentration,
    retention, contracts, legal/regulatory posture and cap-table economics are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A transaction or investment thesis for Aqua
    Security depends on proving durable revenue quality, retention, margin, customer quality, product defensibility,
    legal/regulatory posture, team stability and financing terms beyond public-list valuation evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn lists include Aqua Security at latest known valuation of US$1B.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Aqua Security publicly markets active products in Cloud native application protection platform, container and
        Kubernetes security.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: Aqua Security has public customer, user or market activity signals.
      evidence_claim_ids:
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR, retention and cash runway are not public.
    - risk_id: R-002
      summary: Competitive pressure is intense in CNAPP/cloud security against well-funded platform vendors.
    - risk_id: R-006
      summary: Security vendor diligence requires private security artifacts, incident history, open-source license review and
        customer references.
  key_evidence_gaps:
    - Audited financials, ARR/revenue, gross margin, cash/debt, burn, tax and forecast model.
    - Cap table, preferences, option pool, debt, warrants and current valuation support.
    - Top-customer/user cohorts, contracts, concentration, churn/NRR, satisfaction and references.
    - CAC/payback, pipeline, sales productivity and channel revenue mix.
    - Legal/regulatory/IP/security artifacts, material contracts, insurance and incident history.
  recommended_next_steps:
    - Run revenue-quality and financial diligence before relying on headline valuation.
    - Request customer/user cohorts, contracts and independent references.
    - Have counsel and technical specialists review legal, regulatory, security, privacy, IP and product artifacts.
    - Benchmark against direct competitors using win/loss, pricing, retention and buyer-reference evidence.
