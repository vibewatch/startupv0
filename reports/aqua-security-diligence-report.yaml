risk_register:
  - risk_id: R-001
    risk_title: Financial quality is not publicly verifiable
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Audited financials, ARR, revenue quality, gross margin, cash, debt, burn, tax and forecast assumptions are
      not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a17
    mitigation_or_diligence_request: Request audited financials, management accounts, ARR/revenue bridge, gross margin,
      cash/debt, tax positions, forecast model and board materials.
  - risk_id: R-002
    risk_title: Headline valuation may be stale or unsupported
    risk_category: financing
    severity: high
    likelihood: medium
    description: Aqua Security's public valuation evidence comes from unicorn lists and historical funding signals; current
      valuation bridge, preferences and secondary marks are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a18
    mitigation_or_diligence_request: Request full financing history, cap table, liquidation preferences, debt, option pool,
      409A/valuation reports and recent secondary activity.
  - risk_id: R-003
    risk_title: Customer concentration and retention are unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public customer, user or activity signals do not disclose top-account revenue, renewal status, churn, NRR,
      pipeline conversion or customer satisfaction.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a19
    mitigation_or_diligence_request: Request top-customer ARR, contract terms, renewal cohorts, churn/NRR, references and support escalations.
  - risk_id: R-004
    risk_title: Competitive pressure and pricing power require validation
    risk_category: market
    severity: medium
    likelihood: high
    description: The category includes strong competitors such as Wiz, Palo Alto Networks Prisma Cloud, Lacework, Sysdig,
      Snyk; public product claims do not prove win rates or pricing power.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a20
    mitigation_or_diligence_request: Request win/loss analysis, pricing benchmarks, renewal concessions, competitive takeout
      evidence and product differentiation proof.
  - risk_id: R-005
    risk_title: Product maturity, security and dependency risk remain private
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Roadmap, reliability, incident history, technical debt, architecture dependencies, data/security posture
      and R&D spend are not fully public.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Request product roadmap, architecture review, incident log, security reports, SDLC
      artifacts and dependency inventory.
  - risk_id: R-006
    risk_title: Legal, regulatory and IP diligence incomplete
    risk_category: legal
    severity: high
    likelihood: unknown
    description: No public regulatory enforcement action was identified in the fetched sources; this does not substitute for
      legal docket and regulator checks.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - VIII.G
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Have counsel run docket/regulatory searches and review licenses, customer contracts,
      privacy/security artifacts, IP assignments and insurance.
  - risk_id: R-007
    risk_title: Management, hiring and incentives are not fully public
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Public leadership/headcount signals do not verify current org design, attrition, compensation, equity
      incentives or key-person dependencies.
    impacted_chapter_ids:
