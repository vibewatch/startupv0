risk_register:
  - risk_id: R-001
    risk_title: Financial-crime remediation and regulatory supervision
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Official FCA enforcement found historical anti-financial-crime control failures and VREQ breaches; remediation quality and ongoing supervisory posture are not public.
    impacted_chapter_ids:
      - VIII
      - II
      - VI
    impacted_section_ids:
      - VIII.G
      - II.A
      - VI.A
    evidence_claim_ids:
      - EC-015
      - EC-016
    mitigation_or_diligence_request: Request full remediation file, skilled-person reports, closure evidence, AML model validation, compliance testing and FCA/PRA correspondence.
  - risk_id: R-002
    risk_title: Bank financial quality, capital and liquidity opacity
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public annual-report metrics show scale, but audited details, capital, liquidity, credit losses, revenue quality and stress tests are not public.
