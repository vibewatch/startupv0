            evidence_claim_ids:
              - EC-003
              - EC-005
            risk_ids:
              - R-005
              - R-008
        hidden_risks:
          - Headline customer counts may include low-balance, low-activity or unprofitable cohorts.
        evidence_gaps:
          - Top cohorts by revenue/balance, active definitions, product penetration, demographics, complaints, churn and concentration.
        follow_up_questions:
          - Provide cohort tables by product, acquisition channel, activity, balances, revenue, complaints, churn and risk outcomes.
        table_ids:
          - T-005
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-003
          - EC-005
          - EC-013
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public relationships include BlackRock-linked wealth products, accounting integrations for business banking, card/app distribution channels and the Habito homeownership extension noted in Monzo's 2026 annual report. Contract economics and dependencies are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: BlackRock-linked investment/pension references and accounting integrations show material third-party dependencies.
            evidence_claim_ids:
              - EC-006
              - EC-011
              - EC-012
            risk_ids:
              - R-004
              - R-008
        hidden_risks:
          - Vendor or regulated-partner concentration could constrain product economics or create operational liability.
        evidence_gaps:
          - Contracts, SLAs, revenue share, termination rights, data-processing agreements, dependency risk assessments and backup providers.
        follow_up_questions:
          - Provide top strategic partner and supplier contracts, dependency maps, SLAs and vendor risk assessments.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-011
          - EC-012
          - EC-022
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Monzo discloses revenue split categories in the 2026 annual-report page but not revenue by customer, cohort, balance tier, product or geography.
        verification_status: not_publicly_verifiable
        confidence: low
