      - I.B
      - I.D
    evidence_claim_ids:
      - EC-003
      - EC-004
    mitigation_or_diligence_request: Request audited statements, regulatory capital/liquidity returns, ICAAP/ILAAP, stress tests, treasury reports and product-level P&Ls.
