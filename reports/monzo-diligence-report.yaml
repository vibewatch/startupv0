          - EC-010
          - EC-011
          - EC-012
          - EC-013
  - chapter_id: IV
    title: Competition
    chapter_summary: Monzo competes across UK personal banking, SME banking, payments, savings, credit, wealth and subscriptions. Public competitor pages show strong alternatives from Starling, Chase and Wise; Monzo's durable advantage must be proven with CAC, retention, balances, product cross-sell and risk-adjusted margin data.
    founder_claim_ids:
      - FC-006
    evidence_claim_ids:
      - EC-019
      - EC-020
      - EC-021
      - EC-023
    risk_ids:
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Starling publicly claims 3.5m customers and business-account features, Chase markets a UK current account with 1% cashback, and Wise markets international and multi-currency account functionality. These public offers overlap with Monzo's current-account, SME and payments propositions.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Competitors can attack Monzo on personal current accounts, business accounts, cashback, international transfers and multi-currency use cases.
            evidence_claim_ids:
              - EC-019
              - EC-020
              - EC-021
            risk_ids:
              - R-005
          - finding_id: IV.A-F2
            finding: Competitive parity on product surfaces means defensibility depends on private metrics such as CAC, primary-bank share, balances, retention and risk-adjusted margin.
            evidence_claim_ids:
              - EC-003
              - EC-019
              - EC-020
              - EC-021
            risk_ids:
              - R-005
        hidden_risks:
          - Product breadth may not equal defensibility if better-capitalized banks subsidize acquisition or pricing.
        evidence_gaps:
          - Win/loss, share of new accounts, CASS switching data, CAC/payback, deposit costs, NPS by segment, churn and product-level margin vs peers.
        follow_up_questions:
          - Provide competitor benchmarking and channel-level CAC/payback, with cohort retention and balance comparisons.
        table_ids:
          - T-007
          - T-008
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-003
          - EC-019
          - EC-020
          - EC-021
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Monzo distributes through its mobile app, owned web flows, app stores, Current Account Switch Service, business-account web acquisition, paid/organic brand channels and product-led cross-sell. Public evidence validates channels, not CAC, funnel conversion or budget sufficiency.
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-013
    risk_ids:
      - R-005
      - R-008
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
