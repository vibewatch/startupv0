          - T-004
        figure_ids:
          - F-003
          - F-010
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-011
          - EC-012
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public sources show large customer-scale claims and business-bank adoption, but core customer diligence--cohorts, balances, revenue by customer, churn, concentration, complaints and supplier/partner dependence--is not public.
    founder_claim_ids:
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-003
      - EC-005
      - EC-006
      - EC-013
    risk_ids:
      - R-005
      - R-008
