report_metadata:
  report_title: Monzo Startup Diligence Report
  target_company: Monzo
  website: https://monzo.com/
  known_aliases:
    - Monzo
    - Monzo Bank Limited
    - Monzo Bank Ltd
    - Monzo Bank Holding Group Limited
    - Mondo
  sector: Consumer fintech, digital banking, retail and SME banking, payments, lending, savings, investments and pensions
  geography: United Kingdom, headquartered in London; Ireland/EU expansion publicly announced
  company_stage: Private unicorn / PRA-authorised digital bank
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: GBP for operating and bank metrics; USD for funding and valuation headlines
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Focused on Monzo only after eligibility check as an active private unicorn with public operating evidence.
    - Prioritized official company pages, Companies House, FCA, Bank of England/PRA, CB Insights, funding press and public competitor pages.
    - Treated company-owned metrics as public assertions requiring reconciliation to data-room and regulatory materials.
    - Did not use private documents, management interviews, customer references, regulator references or non-public datasets.
  included_jurisdictions:
    - United Kingdom
    - Ireland
    - European Union public expansion evidence
  excluded_topics:
    - Non-public customer data, detailed loan/credit books, AML case files, regulator correspondence, board materials, employee records, cap table, tax files and contract schedules were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request to replace FlashEx target with Monzo diligence
      type: workflow_request
      date_received: 2026-05-24
      notes: No company materials beyond public sources were provided.
