diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, cash-flow detail, capital/liquidity schedules and product-level P&Ls.
    why_it_matters: Public growth metrics do not prove risk-adjusted profitability or bank-capital adequacy.
    suggested_source_or_request: Finance data-room package, signed accounts, board packs, Pillar 3, ICAAP/ILAAP and treasury materials.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferences, debt, secondaries, warrants and option plan.
    why_it_matters: Public valuation markers do not determine common-equity value.
    suggested_source_or_request: Financing documents, shareholder agreements, option ledger and debt/capital instrument schedules.
