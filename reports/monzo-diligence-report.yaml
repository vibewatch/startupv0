            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-002
              - R-008
        hidden_risks:
          - Revenue may be concentrated in rate-sensitive balances, borrowing cohorts, subscription power users or interchange-heavy customers.
        evidence_gaps:
          - Revenue by cohort/customer/product, ARPAC calculation, net interest margin, fee income, credit losses and contribution margin.
        follow_up_questions:
          - Provide anonymized customer-level or cohort-level revenue and margin bridge for the last 36 months.
        table_ids:
          - T-018
        figure_ids: []
        evidence_claim_ids:
          - EC-003
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No comprehensive public list of lost customers, partners or suppliers was available. Funding press notes U.S. ambitions, while public history has references to prior U.S. licensing challenges, making regulator/partner timeline diligence important.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
