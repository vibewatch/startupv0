        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Monzo is a consumer/SME bank, so 'top customers' are likely retail/SME segments rather than named accounts. Public claims include 15.2m customers in the 2026 annual report and more than 15m personal/business customers on the About page; named top customers are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
