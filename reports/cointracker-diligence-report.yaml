diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and monthly management accounts.
    why_it_matters: Required to evaluate revenue quality, cash burn, runway, margins, and working capital.
    suggested_source_or_request: CFO data-room financials, audit reports, trial balances, bank/debt statements.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferences, option pool, debt, SAFEs/notes, warrants, and 409A history.
    why_it_matters: Determines ownership, downside protection, dilution, and valuation reset risk.
    suggested_source_or_request: Corporate counsel and finance capitalization package.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.B
    missing_information: Board-approved projections, unit economics, CAC/payback, churn, NRR, and scenario cases.
    why_it_matters: Public product and pricing claims cannot support growth underwriting without operating metrics.
    suggested_source_or_request: Board plan, KPI dashboard, forecast model, actuals-to-plan reporting.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product-level revenue, accuracy metrics, support-ticket rates, roadmap, and gross margin.
    why_it_matters: Complex crypto tax/accounting errors can create refunds, churn, and liability.
    suggested_source_or_request: Product P&Ls, tax methodology review, QA metrics, support dashboards.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer/partner/channel and any concentration above 5%.
    why_it_matters: Public user counts do not prove durable revenue diversification.
    suggested_source_or_request: Customer revenue schedule, NRR/churn report, partner-sourced revenue.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.B
    missing_information: Material partner contracts, data-access agreements, SLAs, and termination rights.
    why_it_matters: Partner/channel or API dependency could impair acquisition or product completeness.
    suggested_source_or_request: Executed partner/vendor contracts and amendments.
    priority: high
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, quota attainment, pipeline conversion, sales cycle, and CAC/payback.
    why_it_matters: Enterprise accounting expansion may change GTM economics.
    suggested_source_or_request: CRM export, bookings report, quota/commission plans, pipeline dashboard.
    priority: medium
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture, incident history, integration coverage, QA, release controls, and R&D staffing.
    why_it_matters: Reliability and accuracy determine user trust and regulatory exposure.
    suggested_source_or_request: Engineering architecture docs, SOC reports, incident postmortems, roadmap.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Current and historical headcount by function/location plus turnover and compensation.
    why_it_matters: Scaling and retention risks are opaque from public headcount snapshots.
    suggested_source_or_request: HRIS, payroll, compensation, option grants, attrition and engagement reports.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory inquiry schedule, breach postmortem, DPA notices, tax-reporting readiness, and counsel letters.
    why_it_matters: Sensitive tax/crypto data and digital-asset regulation create legal exposure.
    suggested_source_or_request: Outside counsel memo, incident records, privacy/regulatory correspondence, tax opinions.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Comprehensive IP schedule, invention assignments, OSS/license scan, patent/copyright records.
    why_it_matters: Trademark records do not prove full technology ownership.
    suggested_source_or_request: IP counsel schedule, source-code/OSS scan, employee/contractor IP assignments.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, limits, exclusions, retentions, claims history, and cyber/E&O coverage.
