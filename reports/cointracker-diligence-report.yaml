report_metadata:
  report_title: CoinTracker Startup Diligence Report
  target_company: CoinTracker
  website: https://www.cointracker.io/
  known_aliases:
    - CoinTracker
    - Nino Finance Inc.
    - Nino Finance, Inc.
  sector: Financial technology / crypto tax, portfolio tracking, and digital asset accounting
  geography: United States / remote-global operations
  company_stage: Private late-stage unicorn
  research_date: 2026-05-26
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source diligence using company pages, public market/news databases, accelerator profile, breach monitors, legal/IP records, regulatory sources, and competitor pages.
    - No private data room, audited financials, management interview, customer reference, SOC report, board deck, cap table, contract, or counsel letter was available.
    - Company-published operating metrics are treated as public claims and require reconciliation to private KPI systems before underwriting.
  included_jurisdictions:
    - United States
    - Publicly disclosed global/remote operating context
    - Digital-asset tax reporting context where publicly relevant
  excluded_topics:
    - Non-public financial statements and management accounts
    - Private customer/partner contracts and reference calls
    - Private capitalization, debt, option, and financing documents
    - Non-public security reports, litigation dockets, HR records, and board materials
  user_provided_materials: []
