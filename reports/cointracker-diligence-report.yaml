executive_summary:
  overall_assessment: "CoinTracker is publicly eligible for private unicorn diligence: public sources verify an active crypto tax/portfolio company with a January 2022 US$100M Series A and US$1.30B valuation anchor, meaningful public adoption claims, and active product/partner pages."
  investment_or_diligence_thesis: The diligence case turns on whether CoinTracker can convert crypto tax-season and enterprise accounting demand into durable, compliant, high-retention revenue despite stale valuation risk, crypto-market cyclicality, security/privacy exposure, partner dependency, and intense feature-parity competition.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and CoinTracker/CB Insights funding coverage support the US$1.30B/US$1.3B January 2022 unicorn valuation anchor.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
    - founder_claim_id: FC-003
      summary: CoinTracker public pages support a broad consumer crypto tax/portfolio product with free/paid tiers and advanced tax features.
      evidence_claim_ids:
        - EC-004
        - EC-009
        - EC-027
        - EC-028
    - founder_claim_id: FC-005
      summary: CoinTracker publishes security/privacy controls, while independent breach monitors identify a 2022 incident requiring follow-up.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and valuation reset risk.
    - risk_id: R-004
      summary: Security/privacy incident and sensitive data exposure.
    - risk_id: R-006
      summary: Product accuracy and integration complexity across crypto tax/accounting workflows.
    - risk_id: R-005
      summary: Partner/channel and exchange/wallet dependency.
    - risk_id: R-007
      summary: Competitive feature parity and pricing pressure.
  key_evidence_gaps:
    - Audited financials, monthly KPIs, cash/debt/runway, revenue by product/channel, gross margin, churn, NRR, and unit economics.
    - Current cap table, preference stack, debt/SAFE/warrant schedules, option pool, 409A, and secondary pricing.
    - Top-customer/partner revenue, paid-user cohorts, partner contracts, churn, concentration, and customer references.
    - SOC reports, pen tests, breach postmortem, data maps, regulatory correspondence, tax methodology, and insurance policies.
    - Current org chart, headcount plan, compensation/equity, turnover, employee-relations records, and counsel-prepared litigation/IP schedules.
  recommended_next_steps:
    - Gate any valuation conclusion on private financials, cap table, current fair-value support, and cohort/unit-economics evidence.
    - Run deep security/privacy/tax-regulatory diligence focused on the 2022 breach record, SOC reports, data flows, and digital-asset reporting readiness.
    - Validate customer quality through paid-user cohorts, partner-sourced revenue, top-customer concentration, churn/NRR, and reference calls.
    - Benchmark product accuracy, integration coverage, support burden, pricing, and win/loss against Koinly, TaxBit, CoinLedger, ZenLedger, TokenTax, and Ledgible.
    - Review enterprise-accounting ARR, implementation metrics, roadmap, controls, audit acceptance, and support capacity before underwriting enterprise expansion.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies CoinTracker's 2022 Series A/unicorn anchor but leaves audited financial quality, runway, projections, and capitalization unresolved.
    founder_claim_ids:
      - FC-001
      - FC-002
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-022
      - EC-023
      - EC-026
      - EC-029
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: CoinTracker is private; public sources reviewed do not disclose audited financial statements, quarterly management accounts, revenue, gross margin, cash, debt, AR aging, backlog, or tax positions.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A.1
            finding: Public sources verify financing and adoption claims but not the financial statements required to underwrite revenue quality, cash burn, runway, or working capital.
            evidence_claim_ids: &a1
              - EC-022
            risk_ids:
              - R-001
        hidden_risks:
          - Revenue recognition, burn, cash runway, AR quality, deferred revenue, and tax exposures may differ materially from public growth signals.
        evidence_gaps:
          - Audited annual financials, quarterly management accounts, revenue by product/channel/geography, cash/debt schedules, AR aging, backlog, and tax returns.
        follow_up_questions:
          - Provide audited financials and monthly/quarterly management accounts for FY2023-FY2025 and YTD FY2026.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids: *a1
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public pricing, product, and partner materials support possible growth drivers, but board-approved projections, unit economics, CAC/payback, gross-margin bridge, burn, and financing assumptions are private.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B.1
            finding: Public materials identify pricing tiers and enterprise expansion but do not disclose forecast cases or assumptions.
            evidence_claim_ids: &a2
              - EC-009
              - EC-011
              - EC-025
              - EC-029
            risk_ids:
              - R-001
              - R-002
              - R-003
        hidden_risks:
          - Crypto-market cycles, tax-regime changes, paid-conversion limits, refunds, and support load could make projections less predictable than user-count claims imply.
        evidence_gaps:
          - Board plan, scenario sensitivities, CAC/payback, NRR, churn, conversion, transaction-volume, crypto-cycle, and regulatory implementation assumptions.
        follow_up_questions:
          - Provide the current board-approved operating model with base/upside/downside scenarios and KPI actuals-to-plan.
        table_ids:
          - T-004
        figure_ids: []
        evidence_claim_ids: *a2
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public financing sources identify a Series A and unicorn valuation but do not disclose the current fully diluted capitalization, option pool, debt, preferences, warrants, SAFEs, notes, or secondary terms.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C.1
            finding: CoinTracker's public funding history is sufficient for a unicorn screen, not for preference-stack or ownership dilution analysis.
            evidence_claim_ids: &a3
              - EC-001
              - EC-002
              - EC-023
              - EC-026
            risk_ids:
              - R-001
        hidden_risks:
          - Late-stage preferences, investor rights, option refreshes, debt covenants, or secondary repricing could materially affect returns.
        evidence_gaps:
          - Current cap table, investor rights, charter/bylaws, financing documents, option plan, debt, warrants, SAFEs/notes, 409A valuations, and secondary transactions.
        follow_up_questions:
          - Provide the current fully diluted cap table, preference waterfall, financing documents, investor rights, and debt/SAFE/warrant schedules.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids: *a3
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public sources verify the 2022 financing/valuation anchor and scale claims, but proceeds use, runway, debt, tax positions, and current valuation are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D.1
            finding: CoinTracker's Series A and unicorn valuation are public; current financial quality requires private diligence.
            evidence_claim_ids: &a4
              - EC-001
              - EC-002
              - EC-003
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Public valuation anchors from early 2022 may be stale after crypto market volatility and private-market repricing.
        evidence_gaps:
          - Current valuation support, cash balance/runway, use of proceeds, tax positions, financing covenants, and investor updates.
        follow_up_questions:
          - Reconcile the US$1.30B valuation to current 409A, secondary pricing, primary financing discussions, and company forecast.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids: *a4
