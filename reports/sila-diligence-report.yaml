executive_summary:
  overall_assessment: Track / proceed to confirmatory diligence. Sila is an eligible private U.S. battery-materials
    unicorn with strong public validation but high unresolved financial, scale-up, and customer-contract risk.
  investment_or_diligence_thesis: Sila may be a strategically important domestic silicon-anode supplier if Titan Silicon
    performance, Moses Lake scale economics, customer contracts, and IP/FTO claims validate in private diligence.
  company_snapshot:
    valuation_anchor: $3.30B
    country: United States
    sector: Industrials
    stage: Series G | Alive
    total_raised_public_profile: $1.406B
    last_raise: $375M Series G
  key_positive_signals:
    - CB Insights active private-unicorn profile and $3.30B valuation anchor.
    - Public $375M Series G and $100M DOE manufacturing award signal scale-up capital.
    - Named relationships with Panasonic, Mercedes-Benz, and WHOOP plus undisclosed auto contracts.
    - Moses Lake manufacturing campus and large claimed patent/R&D base.
  key_risks:
    - Financial quality/runway opacity.
    - Moses Lake manufacturing scale-up and series-production execution.
    - Customer concentration and undisclosed contract economics.
    - Technical validation, warranty, and automotive qualification risk.
    - IP/FTO, grant, EHS, and governance complexity.
  key_evidence_gaps:
    - Audited financial statements, cash balance, burn, debt, and revenue are not public.
    - Cap table and preference stack are unavailable.
    - Independent technical validation and customer qualification data are absent.
    - Unit economics, yield, COGS, ASP, and warranty costs are not public.
    - Customer contracts, volumes, forecasts, and termination rights are undisclosed.
    - Supplier contract economics and alternative feedstock plans are unavailable.
  recommended_next_steps:
    - Provide audited financial statements, management accounts, revenue by customer, gross margin, cash, debt, burn,
      and runway model.
    - Provide 24-month monthly forecast, capex plan, and variance-to-budget history.
    - Provide fully diluted cap table, financing documents, preference stack, debt, grants, SAFEs/notes, and secondary
      history.
    - Provide independent Titan Silicon test reports for energy density, cycle life, swelling, fast charge, safety, and
      aging.
    - Provide customer qualification reports, sample histories, rejection data, and field-performance/warranty records.
    - Provide unit-economics model with ASP, COGS, yield, scrap, silane cost, warranty reserve, freight, and service
      margin.
    - Provide all customer contracts, MSAs, SOWs, forecasts, pricing, exclusivity, termination rights, and take-or-pay
      commitments.
    - Arrange customer references with Panasonic, Mercedes-Benz, WHOOP, and undisclosed auto counterparties where
      permitted.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights public data supports private active unicorn status and $3.30B valuation anchor.
      evidence_claim_ids:
        - EC-001
        - EC-002
