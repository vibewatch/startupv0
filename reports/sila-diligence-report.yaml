limitations:
  - limitation_id: L-001
    description: Report uses public sources only; no company data room, management interview, or customer reference calls
      were available.
    impact: Financial, customer, technical, and legal conclusions remain provisional.
    mitigation: Use follow-up request list before investment decision.
  - limitation_id: L-002
    description: Company website and press releases are primary-company sources and may be promotional.
    impact: Product, capacity, and customer claims require independent corroboration.
    mitigation: Triangulate with contracts, tests, audits, and third-party references.
  - limitation_id: L-003
    description: No audited financial statements, cap table, or detailed revenue records were found publicly.
    impact: Valuation, runway, gross margin, and quality of earnings cannot be underwritten.
    mitigation: Request financial package and cap-table records.
  - limitation_id: L-004
    description: Patent and legal screens are not attorney opinions.
    impact: IP strength, FTO, and litigation exposure remain uncertain.
    mitigation: Commission counsel review.
  - limitation_id: L-005
    description: OSHA/EHS and permitting review was limited to public screens and company releases.
    impact: Factory compliance exposure may be understated.
    mitigation: Request site records and agency correspondence.
  - limitation_id: L-006
    description: Customer contracts and pricing are undisclosed.
    impact: Customer concentration, economics, and backlog durability cannot be quantified.
    mitigation: Obtain contracts and references.
  - limitation_id: L-007
    description: Direct automated access to some web pages may be blocked; mirror/cache access was used for several pages.
    impact: Exact current page text should be rechecked manually before final committee use.
    mitigation: Refresh source pack with manual browser access.
