diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly MIS, sales ledger, AR aging, inventory, payables and gross profit by SKU/channel/geography.
    why_it_matters: Public claims cannot support revenue quality, margin or working-capital diligence.
    suggested_source_or_request: Request FY2023-FY2026 audited financials, trial balances, MIS packs and ledger exports.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Board-approved forecast, actual-vs-plan history, capex plan and scenario assumptions.
    why_it_matters: Valuation cannot be assessed without forecast credibility and sensitivity analysis.
    suggested_source_or_request: Request three-year forecast model with monthly historical tie-out and assumptions workbook.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, investor rights, preferences, debt, liens and off-balance-sheet obligations.
    why_it_matters: Public valuation anchors conflict and investor economics may materially change return profile.
    suggested_source_or_request: Request cap table, SHA/SSA, debt schedule, lien search and board approvals.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Complete SKU master, label files, pricing, COGS, claims substantiation and complaint/return rates.
    why_it_matters: Product-level quality and profitability are core investment drivers and public data is insufficient.
    suggested_source_or_request: Request product master, price lists, QA substantiation, SKU P&L and complaint log.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.A
    missing_information: Top customers/distributors/marketplaces by revenue, purchase timing and contract status.
    why_it_matters: Broad channel count does not show concentration, churn or account health.
    suggested_source_or_request: Request top-25 account revenue, channel P&L, contracts and references.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Top ingredient/packaging suppliers, supplier audits, concentration, alternate suppliers and traceability.
    why_it_matters: Protein sourcing and QA failure could create margin, recall and reputational risk.
    suggested_source_or_request: Request top supplier spend, agreements, quality audits and alternate-source plan.
    priority: high
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Independent market share, shelf-price tracking, promotion intensity and brand consideration/NPS.
    why_it_matters: Attractive category growth may mask competitive pressure and margin erosion.
    suggested_source_or_request: Request market studies, share data, price-pack analysis and consumer research.
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.A
    missing_information: CAC, payback, trade spend, marketplace fees, distributor margins, funnel conversion and marketing ROI.
    why_it_matters: GTM scale may be uneconomic without channel-level contribution proof.
    suggested_source_or_request: Request channel P&Ls, campaign cohorts, marketplace dashboards and distributor economics.
    priority: high
  - gap_id: G-009
    chapter_id: V
    section_id: V.D
    missing_information: Sales headcount, quotas, compensation, attainment, cycle length and hiring plan.
    why_it_matters: Revenue projections depend on sales productivity and realistic staffing.
    suggested_source_or_request: Request sales roster, quota/attainment history, comp plans and pipeline.
    priority: medium
  - gap_id: G-010
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D/QA org chart, personnel credentials, lab certifications, batch-release controls and R&D budget.
    why_it_matters: Quality/science claims need operational proof, especially after product-quality litigation signal.
    suggested_source_or_request: Request R&D/QA roster, lab records, SOPs, budgets and CAPA logs.
    priority: high
  - gap_id: G-011
    chapter_id: VI
    section_id: VI.B
    missing_information: New-product roadmap, launch economics, formula ownership, critical technology risks and clinical/regulatory support.
    why_it_matters: Future growth and moat claims depend on pipeline defensibility.
    suggested_source_or_request: Request roadmap, stage-gate reviews, formula IP assignments and launch business cases.
    priority: medium
  - gap_id: G-012
    chapter_id: VII
    section_id: VII.A
    missing_information: Current org chart, board committees, reporting lines and decision rights.
    why_it_matters: Public leadership signals are partial and ownership/governance dependencies are unclear.
    suggested_source_or_request: Request org chart, board pack, committee charters and delegation matrix.
    priority: medium
  - gap_id: G-013
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS/payroll export, contractors, function/location split, attrition, hiring plan and employee-relations records.
    why_it_matters: Public headcount anchors conflict materially.
    suggested_source_or_request: Request HRIS, payroll, contractor roster, attrition and grievance/labor records.
    priority: high
  - gap_id: G-014
    chapter_id: VII
    section_id: VII.D
    missing_information: Executive employment agreements, compensation, benefits, ESOP plan, option ledger and vesting.
    why_it_matters: Incentive alignment and dilution cannot be evaluated publicly.
    suggested_source_or_request: Request executive agreements, compensation schedules, ESOP plan and option ledger.
    priority: medium
  - gap_id: G-015
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation docket, original consumer-court order, pleadings, settlement documents, reserves and counsel memo.
    why_it_matters: Public legal signals are material but incomplete.
    suggested_source_or_request: Request counsel nationwide docket search, case files, reserves and management responses.
    priority: high
  - gap_id: G-016
    chapter_id: VIII
    section_id: VIII.C
    missing_information: FSSAI/state food-safety licenses, factory permits, inspection reports, recalls, EHS audits and worker-safety logs.
    why_it_matters: Food/pet-food manufacturing can create regulatory and product-liability exposure.
    suggested_source_or_request: Request regulatory license matrix, inspection history, recall log and EHS records.
    priority: high
  - gap_id: G-017
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official trademark/IP schedule, assignments, licenses, oppositions and settlement compliance.
    why_it_matters: Brand portfolio is central and public IP records are incomplete.
    suggested_source_or_request: Request official IP schedule from counsel with registry extracts and encumbrance review.
    priority: medium
  - gap_id: G-018
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Product liability, recall, D&O, property and cyber insurance policies, exclusions and claims/loss runs.
    why_it_matters: Consumer/product-quality events may be uninsured or underinsured.
    suggested_source_or_request: Request policy schedule, copies, claims history and broker memo.
    priority: high
  - gap_id: G-019
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts with investors, marketplaces, distributors, suppliers, ambassadors, manufacturers, landlords and insurers.
    why_it_matters: Commercial rights, exclusivity and change-of-control clauses may constrain value.
    suggested_source_or_request: Request material contract schedule and executed copies.
    priority: high
