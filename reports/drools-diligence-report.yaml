report_metadata:
  report_title: Drools Startup Diligence Report
  target_company: Drools Pet Food Private Limited
  website: https://drools.com/
  known_aliases:
    - Drools
    - Drools India
    - Drools Pet Food Pvt Ltd
  sector: Pet food / pet nutrition
  geography: India
  company_stage: Private unicorn / late-stage
  research_date: 2026-06-13
  analyst: GitHub Copilot CLI diligence workflow
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Asia/Kolkata
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only; prioritized company, investor, court/legal, market-database, professional-profile and independent-news sources.
    - Every material claim is linked to evidence_claim_ids and source_ids.
    - Private, unavailable or inconclusive checklist items are marked as gaps rather than inferred.
  included_jurisdictions:
    - India
    - United States for trademark/news/search signals where surfaced
  excluded_topics:
    - No private financial model audit
    - No in-person plant or supplier diligence
    - No paid data-room, MCA paid extracts or official registry downloads beyond accessible snippets
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided target and candidate unicorn metadata
      type: workflow_request
      date_received: 2026-06-13
      notes: Included target Drools, slug, valuation/date/sector/country and request for public-source report.
