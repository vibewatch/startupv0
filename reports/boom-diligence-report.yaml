        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-011", "EC-012", "EC-014"]

  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: "Boom competes with subsonic premium air travel, business aviation, potential supersonic/hypersonic entrants, NASA/Lockheed government programs, internal airline fleet plans, and the cautionary precedent of failed supersonic startups."
    founder_claim_ids: []
    evidence_claim_ids: ["EC-005", "EC-010", "EC-011", "EC-014"]
    risk_ids: ["R-004", "R-005", "R-006"]
    sections:
      - section_id: "IV.A"
        title: "Competitive landscape by market segment"
        checklist_question_ids: ["IV.A.1", "IV.A.2"]
        summary: "Boom's differentiation is speed, announced airline relationships, XB-1 flight data, and a purpose-built engine/superfactory path; market share, airline ROI, and competitive win/loss are private."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "IV.A.1"
            finding: "Overture's public promise is twice subsonic speed over water and many faster routes, but airlines will compare total economics against widebody, business-class, and private-aviation alternatives."
            evidence_claim_ids: ["EC-005", "EC-007"]
            risk_ids: ["R-005", "R-006"]
        hidden_risks:
          - "Subsonic premium cabins, remote collaboration, SAF constraints, noise regulation, and economics can compete with or reduce demand for supersonic aircraft."
        evidence_gaps:
          - "Airline business cases, competitive pricing, operating-cost comparisons, route economics, fleet planning, and customer willingness-to-pay."
        follow_up_questions:
          - "Provide airline ROI models, competitive win/loss, route economics, and willingness-to-pay research."
        table_ids: ["T-008", "T-009"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-005", "EC-010", "EC-011", "EC-014"]

  - chapter_id: "V"
    title: "Marketing, Sales, and Distribution"
