        confidence: medium
        key_findings:
          - finding_id: "III.E.1"
            finding: "Boom's Overture and Symphony releases identify multiple program suppliers and assembly/testing partners."
            evidence_claim_ids: ["EC-011", "EC-012"]
            risk_ids: ["R-006"]
        hidden_risks:
          - "Long-lead materials, engine components, avionics, landing gear, manufacturing automation, and certification support could drive cost escalation or delays."
        evidence_gaps:
