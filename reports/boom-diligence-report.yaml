report_metadata:
  report_title: "Boom Supersonic Startup Diligence Report"
  target_company: "Boom Supersonic"
  website: "https://boomsupersonic.com/"
  known_aliases:
    - "Boom"
    - "Boom Technology, Inc."
    - "Boom Supersonic"
  sector: "Aerospace, supersonic aircraft, propulsion, and industrial power turbines"
  geography: "United States / global airline market"
  company_stage: "Private late-stage unicorn"
  research_date: "2026-06-04"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "UTC"

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public-source diligence using CB Insights unicorn-list data, Boom-owned website and press releases, airline partner announcements mirrored on Boom's site, supplier/technology announcements, and public news/background sources."
    - "No private data room, management interview, audited financial statements, aircraft certification artifacts, customer contracts, supplier contracts, or counsel letters were available."
    - "Company claims about aircraft timing, certification, order book, Superpower turbine backlog, SAF, and boomless cruise are treated as public management claims unless independently corroborated."
  included_jurisdictions:
    - "United States"
    - "Publicly disclosed airline and supplier relationships in the United States and Japan"
    - "FAA/EASA certification context where publicly disclosed"
  excluded_topics:
    - "Non-public financial statements, cash, debt, burn, runway, unit cost, aircraft program accounting, and revenue recognition."
    - "Private purchase agreements, refundable/non-refundable deposit terms beyond public statements, delivery schedules, aircraft pricing, supplier commitments, and warranty/indemnity terms."
    - "Non-public certification plans, FAA/EASA correspondence, safety analyses, engine test data, design reviews, and manufacturing quality records."
    - "Private cap table, preference stack, employee option pool, board materials, legal schedule, insurance, and HR records."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Random unicorn selection seed for Boom"
      type: "workflow_request"
      date_received: "2026-06-04"
      notes: "Seed row from CB Insights current unicorn list: Boom, slug boom, valuation $1.5B, date joined 2020-12-16, United States, Centennial, Industrials, investors WRVI Capital, Caffeinated Capital, Y Combinator."

founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Boom appears on a current public unicorn list at a $1.5B valuation and remains eligible for private-unicorn diligence."
    claim_source: "CB Insights current unicorn list seed evidence"
    claim_date: "2026-03"
    mapped_chapter_ids: ["I", "VIII"]
    mapped_section_ids: ["I.C", "I.D", "VIII.F"]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: ["EC-001", "EC-002", "EC-003"]
    contradiction_summary: null
    diligence_follow_up:
      - "Confirm private-company status, latest cap table, financing documents, post-money valuation, secondary transactions, and any IPO or strategic sale process with company counsel."
  - founder_claim_id: "FC-002"
    claim_text: "Boom is developing Overture, a supersonic airliner, and Symphony, a purpose-built supersonic engine."
    claim_source: "Boom homepage, Overture page, Symphony page, and press releases"
    claim_date: null
    mapped_chapter_ids: ["II", "VI"]
    mapped_section_ids: ["II.A", "VI.B"]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: ["EC-003", "EC-004", "EC-005", "EC-012"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request aircraft program plan, engine-development plan, certification basis, design reviews, supplier statements of work, cost-to-complete, and technical risk register."
  - founder_claim_id: "FC-003"
    claim_text: "Overture has an order book of 130 aircraft, including orders and pre-orders from United Airlines, American Airlines, and Japan Airlines."
    claim_source: "Boom Overture page and 2025-2026 Boom press releases"
    claim_date: null
    mapped_chapter_ids: ["III", "V"]
    mapped_section_ids: ["III.A", "III.B", "V.B"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-005", "EC-006", "EC-007", "EC-008", "EC-009"]
    contradiction_summary: "Public sources support the announced airline relationships and aggregate order-book claim, but contract enforceability, refundability, milestone conditions, delivery slots, and revenue recognition are not public."
    diligence_follow_up:
      - "Request signed purchase/pre-order agreements, deposits, conditions precedent, cancellation rights, delivery schedule, aircraft pricing, escalation clauses, and customer reference calls."
  - founder_claim_id: "FC-004"
    claim_text: "XB-1 achieved supersonic flight and demonstrated a technical foundation for Overture."
    claim_source: "Boom January and February 2025 press releases"
    claim_date: "2025-01-28"
    mapped_chapter_ids: ["II", "VI", "VIII"]
    mapped_section_ids: ["II.A", "VI.B", "VIII.G"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-010", "EC-011"]
    contradiction_summary: "The flight milestone is public and specific, but scaling from XB-1 to certified Overture and Symphony remains unproven."
    diligence_follow_up:
      - "Request full XB-1 test results, anomaly logs, lessons learned, Overture design traceability, safety reviews, and certification-credit assessment."
  - founder_claim_id: "FC-005"
    claim_text: "The 2025 Superpower turbine funding and Crusoe backlog fully fund Symphony development and create a path to fund Overture certification."
    claim_source: "Boom December 2025 press release"
    claim_date: "2025-12-09"
    mapped_chapter_ids: ["I", "II", "VI"]
    mapped_section_ids: ["I.B", "II.A", "VI.B"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-002", "EC-014"]
    contradiction_summary: "The public release states the financing and backlog, but contract terms, margin, capital requirements, execution risk, and sufficiency to fund aircraft certification are not public."
    diligence_follow_up:
      - "Request Superpower contract, Crusoe order economics, backlog convertibility, turbine COGS, capex plan, funding model, and aircraft program cash-flow bridge."

executive_summary:
  overall_assessment: "Boom is publicly eligible for private unicorn diligence: CB Insights lists Boom as a current $1.5B unicorn, Boom's website and press releases show an active company based in Denver, and public evidence supports ongoing Overture, Symphony, XB-1, Superfactory, airline, government, supplier, and Superpower turbine programs."
  investment_or_diligence_thesis: "The diligence case turns on whether Boom can convert major technical milestones and airline interest into a certifiable, manufacturable, economically viable supersonic airliner while funding a long, high-risk aerospace development cycle through private capital and the newer Superpower turbine business."
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "CB Insights provides the public unicorn-list valuation anchor of $1.5B."
      evidence_claim_ids: ["EC-001"]
    - founder_claim_id: "FC-004"
      summary: "Boom's January 2025 release reports XB-1 reached Mach 1.122 and became the first independently developed supersonic jet to break the sound barrier."
      evidence_claim_ids: ["EC-010"]
    - founder_claim_id: "FC-003"
      summary: "Public sources document airline relationships with United, American, and Japan Airlines and Boom's aggregate 130-aircraft order-book claim."
      evidence_claim_ids: ["EC-005", "EC-006", "EC-007", "EC-008", "EC-009"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Funding, burn, cap-table, and valuation support are opaque for a capital-intensive aircraft and engine program."
    - risk_id: "R-004"
      summary: "FAA/EASA certification, safety, engine, noise, emissions, and boomless-cruise execution risks remain high."
    - risk_id: "R-005"
      summary: "Airline order book quality depends on conditions, deposits, cancellation rights, aircraft economics, SAF availability, and delivery timing."
  key_evidence_gaps:
    - "Audited financials, cash, debt, burn, runway, aircraft program cost-to-complete, Superpower margins, capex, and financing plan."
    - "Cap table, preference stack, current valuation support, investor rights, employee equity, and debt or off-balance-sheet obligations."
    - "Signed airline purchase/pre-order agreements, deposits, refundability, delivery schedule, conditions precedent, aircraft price, and customer reference calls."
    - "FAA/EASA certification plan, safety assessments, engine test data, XB-1 test report, Overture design maturity, noise/emissions analysis, and manufacturing quality plans."
    - "Supplier contracts, long-lead commitments, Superfactory tooling and production readiness, IP ownership, insurance, regulatory/legal schedule, and employee/leadership data."
  recommended_next_steps:
    - "Run a full aerospace technical diligence workstream covering Overture, Symphony, XB-1, Boomless Cruise, certification, safety, noise, SAF, and manufacturing readiness."
    - "Reconcile the $1.5B unicorn valuation and 2025 $300M financing to program cash needs, aircraft backlog conversion, Superpower economics, and investor preferences."
    - "Validate airline and government customer commitments directly with United, American, Japan Airlines, and the U.S. Air Force or their procurement teams."
    - "Review Superpower backlog, Crusoe order, Baker Hughes generator order, and whether turbine revenue can realistically fund aircraft certification."
    - "Benchmark Boom against aerospace incumbents, Aerion's shutdown precedent, NASA/Lockheed X-59, and subsonic premium-air-travel alternatives."

chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: "Public sources verify unicorn valuation, 2025 financing, Superpower backlog, and aircraft order-book signals, but audited financials, cash burn, aircraft program cost-to-complete, cap table, debt, and projections are not publicly verifiable."
    founder_claim_ids: ["FC-001", "FC-005"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-014", "EC-015"]
    risk_ids: ["R-001", "R-002", "R-003"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3", "I.A.4", "I.A.5", "I.A.6"]
        summary: "Boom is private; public sources provide financing, backlog, and order-book signals but not audited income statements, cash flows, balance sheets, AR aging, backlog convertibility, or management accounts."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.A.1"
            finding: "The December 2025 release announced $300M in new funding and more than $1.25B of Superpower turbine backlog, but did not disclose revenue, margin, cash, debt, or burn."
            evidence_claim_ids: ["EC-002", "EC-014"]
            risk_ids: ["R-001", "R-002"]
        hidden_risks:
          - "Aircraft and engine development may require materially more capital than public announcements imply."
        evidence_gaps:
          - "Audited financials, monthly accounts, cash, debt, burn, runway, capitalized R&D, aircraft program accounting, Superpower COGS, backlog convertibility, AR aging, and tax schedules."
        follow_up_questions:
          - "Provide audited financial statements and monthly management accounts for the last three fiscal years and current YTD."
        table_ids: ["T-002"]
        figure_ids: []
        evidence_claim_ids: ["EC-002", "EC-014"]
      - section_id: "I.B"
        title: "Financial Projections"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3", "I.B.4", "I.B.5", "I.B.6", "I.B.7", "I.B.8"]
        summary: "Boom's public plan depends on Superpower revenue, Symphony development, Overture certification, and airline deliveries; board projections and scenario cases are private."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.B.1"
            finding: "Boom states the Series B fully funds Symphony development and Superpower revenues will finance Overture certification and delivery, but detailed cash-flow support is not public."
            evidence_claim_ids: ["EC-002", "EC-014"]
            risk_ids: ["R-001", "R-002", "R-004"]
        hidden_risks:
          - "Certification delays, engine-test failures, supplier escalation, tooling delays, SAF availability, and airline deferrals could break the financing plan."
        evidence_gaps:
          - "Three-year plan, program cost-to-complete, milestone-based financing plan, Superpower margin, aircraft unit economics, capex, and sensitivity cases."
        follow_up_questions:
          - "Provide board-approved forecast and sensitivity cases for Overture, Symphony, Superpower, certification, supplier costs, and airline delivery timing."
        table_ids: ["T-002", "T-003"]
        figure_ids: []
        evidence_claim_ids: ["EC-002", "EC-014"]
      - section_id: "I.C"
        title: "Capital Structure"
        checklist_question_ids: ["I.C.1", "I.C.2", "I.C.3", "I.C.4", "I.C.5"]
        summary: "CB Insights and Boom identify investors and financing rounds, but shares, preferences, debt, warrants, options, and off-balance-sheet obligations are not public."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.C.1"
            finding: "CB Insights lists WRVI Capital, Caffeinated Capital, and Y Combinator; Boom's 2025 release names Darsana, Altimeter, ARK Invest, Bessemer, Robinhood Ventures, and Y Combinator in the new round."
            evidence_claim_ids: ["EC-001", "EC-002"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "Late-stage preferred terms, liquidation preferences, debt, supplier financing, government funding obligations, and employee equity overhang could materially affect common-equity value."
        evidence_gaps:
          - "Fully diluted cap table, preferences, investor rights, options/warrants/SAFEs/notes, debt instruments, grants, and secondary transactions."
        follow_up_questions:
          - "Provide the current cap table, all financing documents, debt schedule, government grant/contract obligations, and equity incentive plan."
        table_ids: ["T-001", "T-003"]
        figure_ids: []
        evidence_claim_ids: ["EC-001", "EC-002", "EC-014"]
      - section_id: "I.D"
        title: "Other financial information"
        checklist_question_ids: ["I.D.1", "I.D.2", "I.D.3"]
        summary: "Public financing anchors include the $1.5B CB Insights valuation and 2025 $300M funding; tax positions and accounting policies are private."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "I.D.1"
            finding: "The latest public financing event reviewed is Boom's December 2025 $300M funding round, while CB Insights lists a $1.5B unicorn valuation."
            evidence_claim_ids: ["EC-001", "EC-002"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "Public valuation and funding announcements may not indicate current fair value, liquidation preference, or capital required to reach certification."
        evidence_gaps:
          - "Tax positions, revenue-recognition policy, aircraft program capitalization, R&D accounting, government contract accounting, and fair-value support."
        follow_up_questions:
          - "Reconcile public valuation and financing references to financing documents, current 409A, preference stack, and program cash needs."
        table_ids: ["T-001"]
        figure_ids: ["F-001", "F-002"]
        evidence_claim_ids: ["EC-001", "EC-002", "EC-014"]

  - chapter_id: "II"
    title: "Products"
    chapter_summary: "Boom's public products and programs include Overture, Symphony, XB-1, Superpower, Boomless Cruise, and the Overture Superfactory; technical maturity, program economics, certification readiness, and product profitability are private."
    founder_claim_ids: ["FC-002", "FC-004", "FC-005"]
    evidence_claim_ids: ["EC-003", "EC-004", "EC-005", "EC-010", "EC-011", "EC-012", "EC-014"]
    risk_ids: ["R-004", "R-006", "R-007"]
    sections:
      - section_id: "II.A"
        title: "Description of each product"
        checklist_question_ids: ["II.A.1", "II.A.2", "II.A.3", "II.A.4", "II.A.5", "II.A.6"]
        summary: "Overture is the planned airliner; Symphony is the purpose-built turbofan; XB-1 is the demonstrator; Superpower is a turbine aimed at AI data centers using related engine-core technology."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "II.A.1"
            finding: "The Overture page describes Mach 1.7 cruise, 60,000 ft cruise altitude, 100% SAF compatibility, 4,250 nautical mile range, 64-80 passengers, 600+ global routes, and 130 orders/pre-orders."
            evidence_claim_ids: ["EC-005"]
            risk_ids: ["R-004", "R-005"]
          - finding_id: "II.A.2"
            finding: "Symphony is described as a Boom-designed engine; the current Symphony page says ignition testing proved flame stability before a fully operational engine core prototype test in 2026."
            evidence_claim_ids: ["EC-012"]
            risk_ids: ["R-004"]
          - finding_id: "II.A.3"
            finding: "The Superpower release says the 42 MW natural gas turbine shares supersonic engine-core technology and has Crusoe as launch customer."
            evidence_claim_ids: ["EC-002"]
            risk_ids: ["R-002", "R-007"]
        hidden_risks:
          - "XB-1 success does not prove Overture certification, Symphony durability, economics, manufacturing ramp, airline acceptance, or Superpower margin."
        evidence_gaps:
          - "Product-level cost, design maturity, certification basis, test data, safety case, production readiness, and gross margin."
        follow_up_questions:
          - "Provide product P&Ls, technical readiness levels, program schedules, certification plans, cost-to-complete, and test/quality data."
        table_ids: ["T-004", "T-005"]
        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-003", "EC-004", "EC-005", "EC-010", "EC-011", "EC-012", "EC-014"]

  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: "Public evidence supports major airline, U.S. Air Force, supplier, and Crusoe relationships, but customer economics, enforceability, concentration, contract terms, deposits, cancellation rights, and supplier commitments are not public."
    founder_claim_ids: ["FC-003", "FC-005"]
    evidence_claim_ids: ["EC-002", "EC-005", "EC-006", "EC-007", "EC-008", "EC-009", "EC-013", "EC-014"]
    risk_ids: ["R-005", "R-006", "R-007", "R-010"]
    sections:
      - section_id: "III.A"
        title: "Top customers by application"
        checklist_question_ids: ["III.A"]
        summary: "Publicly named customer/partner signals include United, American, Japan Airlines, Crusoe, and the U.S. Air Force; revenue by customer is not public."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "III.A.1"
            finding: "American announced an agreement for up to 20 Overtures with an option for 40 more and a non-refundable deposit on the initial 20."
            evidence_claim_ids: ["EC-006"]
            risk_ids: ["R-005"]
          - finding_id: "III.A.2"
            finding: "United announced an agreement for 15 Overtures with an option for 35 more, subject to Boom meeting safety, operating, and sustainability requirements."
            evidence_claim_ids: ["EC-007"]
            risk_ids: ["R-005"]
          - finding_id: "III.A.3"
            finding: "JAL made a $10M strategic investment and has an option to purchase up to 20 aircraft through a pre-order arrangement."
            evidence_claim_ids: ["EC-008"]
            risk_ids: ["R-005"]
        hidden_risks:
          - "Order book may include conditional, option, or pre-order aircraft that do not convert to revenue."
        evidence_gaps:
          - "Signed customer agreements, deposit balances, refundability, conditions, delivery slots, price escalation, cancellation rights, and customer references."
        follow_up_questions:
          - "Provide top-customer schedule and signed airline, Superpower, and government agreements with all conditions and payment terms."
        table_ids: ["T-006"]
        figure_ids: ["F-004"]
        evidence_claim_ids: ["EC-002", "EC-006", "EC-007", "EC-008", "EC-009", "EC-013", "EC-014"]
      - section_id: "III.B"
        title: "Strategic relationships"
        checklist_question_ids: ["III.B"]
        summary: "Boom publicly discloses airline relationships, a U.S. Air Force STRATFI partnership, Superpower launch customer Crusoe, and many suppliers; economics and obligations are private."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "III.B.1"
            finding: "The U.S. Air Force partnership was described as a three-year STRATFI contract valued at up to $60M."
            evidence_claim_ids: ["EC-013"]
            risk_ids: ["R-006"]
