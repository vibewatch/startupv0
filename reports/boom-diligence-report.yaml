            finding: "The 2025 Superpower release identifies Crusoe as launch customer and reports a more-than-$1.25B Superpower turbine backlog."
            evidence_claim_ids: ["EC-002"]
            risk_ids: ["R-002", "R-010"]
        hidden_risks:
          - "Supplier, government, and turbine agreements may include milestone, performance, cancellation, indemnity, or exclusivity terms that affect economics."
        evidence_gaps:
          - "Strategic partnership contracts, supplier statements of work, Superpower order terms, government contract terms, revenue contribution, and termination rights."
        follow_up_questions:
          - "Provide all strategic relationship contracts and revenue/spend by relationship."
        table_ids: ["T-007"]
        figure_ids: ["F-004"]
        evidence_claim_ids: ["EC-002", "EC-006", "EC-007", "EC-008", "EC-013", "EC-014"]
      - section_id: "III.C"
        title: "Revenue by customer"
        checklist_question_ids: ["III.C"]
        summary: "Revenue by customer and accounts above 5% of revenue are not public."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "III.C.1"
            finding: "Public sources disclose order/backlog quantities and values for some programs, but not recognized revenue, deposit balances, or customer concentration."
            evidence_claim_ids: ["EC-002", "EC-009", "EC-014"]
            risk_ids: ["R-010"]
