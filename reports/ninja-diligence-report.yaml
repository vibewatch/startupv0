executive_summary:
  overall_assessment: Ninja qualifies for a public-source screen as an uncovered private unicorn, but the public record is insufficient to underwrite valuation or downside risk without private financial, customer, legal, and governance evidence.
  investment_or_diligence_thesis: Track and diligence selectively. The upside case depends on converting the publicly described quick commerce; grocery and daily-essentials delivery position into durable, profitable, defensible growth after validating current metrics against the last valuation anchor of $1.50B.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Unicorn-list inclusion and selected public financing evidence were verified from accessible public sources.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-003
      summary: Public sources describe the company product/market position, with caveats around adoption and economics.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: Q-commerce unit economics and cash burn are not publicly verifiable
    - risk_id: R-002
      summary: Dark-store expansion may require heavy working capital and execution discipline
    - risk_id: R-003
      summary: IPO-readiness claims need audited financials, governance records, and regulatory preparation evidence
  key_evidence_gaps:
    - Audited financials, ARR/revenue quality, gross margin, runway, debt, cap table, and current valuation support.
    - Customer concentration, churn, retention, contract terms, pricing, and reference checks.
    - Legal/regulatory/IP/insurance schedules, material contracts, security/privacy evidence, and board materials.
  recommended_next_steps:
    - Request a data-room package before any underwriting decision.
    - Conduct customer, supplier, and investor reference calls.
    - Reconcile public valuation claims against current operating metrics, financing terms, and downside scenario analysis.
  overall_confidence: medium
  recommendation: Track; proceed only after private data-room verification.
