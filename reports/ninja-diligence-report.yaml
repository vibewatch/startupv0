diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.C
    missing_information: Audited financial statements, monthly management accounts, cap table, preference stack, debt, cash runway, and current valuation support.
    why_it_matters: Needed to validate valuation, dilution, solvency, and quality of revenue.
    suggested_source_or_request: Company CFO and counsel data room
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.A
    missing_information: Customer-level revenue, churn, NRR, pipeline, contract terms, and concentration.
    why_it_matters: Needed to verify revenue predictability and customer risk.
    suggested_source_or_request: CRM export, billing records, top-customer references
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.B
    missing_information: Pricing, unit economics, gross margin, roadmap cost, and product performance metrics.
    why_it_matters: Needed to verify scalability and defensibility.
    suggested_source_or_request: Product analytics, price books, COGS schedules, roadmap review
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, regulatory, IP, insurance, privacy/security, and material-contract schedules.
    why_it_matters: Needed to clear legal and contingent liability exposure.
    suggested_source_or_request: Counsel diligence package and insurance broker records
    priority: high
  - gap_id: G-005
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, attrition, compensation, employee relations, and key-person risk records.
    why_it_matters: Needed to test execution capacity and culture risk.
    suggested_source_or_request: HRIS exports and management interviews
    priority: medium
