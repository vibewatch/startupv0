report_metadata:
  report_title: Ninja Public-Source Startup Diligence Report
  target_company: Ninja
  website: null
  known_aliases:
    - Ninja q-commerce
    - Saudi q-commerce Ninja
  sector: Quick commerce; grocery and daily-essentials delivery
  geography: Saudi Arabia headquarters with reported GCC operations in Saudi Arabia, Bahrain, Qatar, and Kuwait
  company_stage: Late-stage private unicorn; media reports describe Tadawul IPO preparation for 2027
  research_date: 2026-06-10
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from CB Insights unicorn-list data after excluding existing report slugs from reports/*-diligence-report.yaml.
    - Used accessible company-owned, market-database, news, and search-result sources; did not bypass paywalls or private systems.
    - Marked operating, financial, legal, customer, cap-table, and personnel questions as not_publicly_verifiable when private records are required.
  included_jurisdictions:
    - Saudi Arabia
    - Bahrain
    - Qatar
    - Kuwait
  excluded_topics:
    - No management interviews, customer calls, paid database access, private data room, source-code review, or non-public legal/regulatory searches.
    - Search-result snippets were used only as discovery/eligibility signals unless corroborated by fetched source pages.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-06-10
      notes: Generate one of three random private-unicorn diligence reports at standard depth.
