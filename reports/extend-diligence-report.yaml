report_metadata:
  report_title: Extend Startup Diligence Report
  target_company: Extend
  website: https://www.extend.com/
  known_aliases:
    - Extend
    - Extend, Inc.
    - Extend.com
    - Extend Product Protection
  sector: Embedded product protection, shipping protection, returns and shopper-operations software for merchants
  geography: United States; San Francisco, California / remote US operations
  company_stage: Private unicorn / growth-stage insurtech and e-commerce infrastructure company
  research_date: 2026-06-16
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company-owned pages, developer docs, jobs pages, news, award pages, patents, competitor pages and targeted search snippets.
    - Treated company-published claims as claim evidence, not independent proof of revenue, retention, claims performance or margins.
    - Verified eligibility with active site/jobs and no reviewed public IPO/acquisition/shutdown result; corporate confirmation still required.
  included_jurisdictions:
    - United States
    - California
    - US federal IP/privacy/consumer protection context
    - Global merchant markets referenced by company materials
  excluded_topics:
    - Private financials, cap table, contracts, security reports, insurance filings, legal dockets, HRIS and customer calls were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: "Task context: CB Insights unicorn metadata for Extend"
      type: workflow_request_metadata
      date_received: 2026-06-16
      notes: Provided $1.36B valuation, United States/San Francisco, Insurance sector and investors; direct CB URL mismatch flagged.
