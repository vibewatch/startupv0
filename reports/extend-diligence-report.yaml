risk_register:
  - risk_id: R-001
    risk_title: Financial quality and unit economics are private
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources do not disclose audited financials, revenue, margins, loss ratios, cash, debt, burn, backlog, AR aging or forecasts.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-002
      - EC-016
      - EC-017
    mitigation_or_diligence_request: Request audited financials, KPI pack, cash/debt/burn, claims/loss ratios and forecast.
  - risk_id: R-002
    risk_title: Stale/inconsistent unicorn valuation
    risk_category: financing
    severity: high
    likelihood: medium
    description: Supplied $1.36B valuation conflicts with public $1.6B/$1.6B+ snippets and 2021 pricing may be stale.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-021
      - EC-022
    mitigation_or_diligence_request: Reconcile cap table, preferences, 409A and financing documents.
  - risk_id: R-003
    risk_title: Customer concentration and partnership health unknown
    risk_category: customer
    severity: high
    likelihood: high
    description: Public partner counts/logos do not verify revenue concentration, active status, churn, NRR or merchant profitability.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-017
    mitigation_or_diligence_request: Request customer cohort file, top contracts, churn/NRR and references.
  - risk_id: R-004
    risk_title: Channel and integration dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: GTM depends on integrations, developers, demos and platform/partner channels whose economics are private.
    impacted_chapter_ids:
      - V
      - III
    impacted_section_ids:
      - V.A
      - V.C
      - III.B
    evidence_claim_ids:
      - EC-019
    mitigation_or_diligence_request: Request CAC/payback, channel mix, app metrics and partner agreements.
  - risk_id: R-005
    risk_title: Claims, underwriting and service-contract performance risk
    risk_category: product
    severity: high
    likelihood: medium
    description: Protection products depend on pricing, claims, reserves, fraud controls, repairs/replacements and obligor/insurer arrangements.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.E
    evidence_claim_ids:
      - EC-004
      - EC-020
      - EC-023
    mitigation_or_diligence_request: Request claims waterfall, loss ratios, reserves, insurance/obligor contracts and QA.
  - risk_id: R-006
    risk_title: Competitive pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Mulberry, Cover Genius/XCover/Clyde and Assurant market overlapping capabilities.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids:
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Request win/loss, pricing and merchant switching-cost evidence.
  - risk_id: R-007
    risk_title: Privacy/consumer-protection/regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Extend processes personal/shopper/claims data and operates consumer-facing protection workflows with public arbitration terms.
