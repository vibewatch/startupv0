      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-018
      - EC-020
    mitigation_or_diligence_request: Request privacy/security reports, regulator searches, complaints and service-contract counsel memo.
