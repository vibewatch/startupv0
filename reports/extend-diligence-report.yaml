executive_summary:
  overall_assessment: Track, but require primary financial, cap-table, claims/insurance, customer, security/privacy and legal diligence before relying on the unicorn valuation.
  investment_or_diligence_thesis: Extend has credible public signals as an active embedded product-protection and shopper-operations platform, including large funding, active products, public merchant logos, developer docs, patent applications and hiring. The investment case depends on private proof of durable merchant economics, loss/claims performance, regulatory compliance and valuation resilience.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Product protection, shipping protection, APIs/integrations and merchant/customer portals are public.
      evidence_claim_ids:
        - EC-004
        - EC-006
        - EC-019
        - EC-020
    - founder_claim_id: FC-006
      summary: Woodrow Levin and Rohan Shah have public founder/executive evidence.
      evidence_claim_ids:
        - EC-008
        - EC-009
    - founder_claim_id: FC-001
      summary: PYMNTS verifies the $260M SoftBank-led Series C and over-$315M total funding claim.
      evidence_claim_ids:
        - EC-002
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and unit economics are private.
    - risk_id: R-002
      summary: Headline valuation is stale/inconsistent.
    - risk_id: R-003
      summary: Customer concentration and partnership health are unknown.
  key_evidence_gaps:
    - Audited financials, ARR/revenue, gross margin, claims/loss ratios, cash/debt/burn and forecast.
    - Cap table, liquidation preferences, option pool, debt/notes and valuation support.
    - Customer cohorts, active contracts, churn/NRR, attach rates, top-customer revenue and references.
    - Insurance/obligor/reinsurance, reserves, privacy/security, legal/regulatory and IP schedules.
    - HRIS, compensation, options, attrition and management references.
  recommended_next_steps:
    - Open data-room request covering financials, cap table, claims economics, insurance/regulatory structure, customer contracts/cohorts, security/privacy, IP and HR.
    - Run customer-reference, technical/model, legal/regulatory and insurance diligence.
    - Reconcile $1.36B supplied valuation with $1.6B/$1.6B+ public references and current 409A/financing terms.
