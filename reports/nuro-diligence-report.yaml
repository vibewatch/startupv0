risk_register:
  - risk_id: R-001
    risk_title: Valuation compression/down-round risk
    risk_category: financing
    severity: high
    likelihood: high
    description: Public evidence shows valuation falling from $8.6B in 2021 to $6B in 2025 Series E reporting.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-002
    mitigation_or_diligence_request: Request cap table, liquidation preferences, 409A history and Series E terms.
  - risk_id: R-002
    risk_title: Business-model pivot execution
    risk_category: market
    severity: high
    likelihood: high
    description: Nuro pivoted from owning delivery robots to licensing autonomy to OEMs and mobility providers.
    impacted_chapter_ids:
      - II
      - V
      - VI
    impacted_section_ids:
      - II.A
      - V.A
      - VI.B
    evidence_claim_ids:
      - EC-005
      - EC-013
    mitigation_or_diligence_request: Request signed licensing contracts, pipeline, pricing, launch milestones and partner obligations.
  - risk_id: R-003
    risk_title: Revenue/customer concentration opacity
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named pilots and partners do not disclose contracted recurring revenue or concentration.
    impacted_chapter_ids:
      - III
      - I
    impacted_section_ids:
      - III.C
      - I.A
    evidence_claim_ids:
      - EC-008
      - EC-010
    mitigation_or_diligence_request: Request ARR/backlog by customer, churn, pilot conversion and top-customer dependency.
  - risk_id: R-004
    risk_title: Regulatory and safety approval dependency
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Autonomous vehicle deployments require permits, safety cases and operating-domain approvals.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.G
      - II.A
    evidence_claim_ids:
      - EC-023
      - EC-024
    mitigation_or_diligence_request: Request permit map, ODD limits, regulator correspondence and safety case.
  - risk_id: R-005
    risk_title: Safety claims are company-reported
    risk_category: technical
    severity: high
    likelihood: medium
    description: 1.7M miles and zero at-fault incidents are company claims; third-party audit was not public.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.C
    evidence_claim_ids:
      - EC-007
    mitigation_or_diligence_request: Request crash, near-miss, disengagement, insurance and third-party safety audit data.
  - risk_id: R-006
    risk_title: Capital intensity/runway
    risk_category: financial
    severity: high
    likelihood: medium
    description: Prior vehicle-manufacturing strategy, layoffs and runway extensions imply capital pressure.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.B
      - VII.G
    evidence_claim_ids:
      - EC-020
      - EC-021
    mitigation_or_diligence_request: Request burn, runway, manufacturing obligations, vendor commitments and board plan.
  - risk_id: R-007
    risk_title: Competitive pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Wayve, Mobileye, Waymo, Starship and Serve pressure Nuro across licensing, robotaxi and delivery markets.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids:
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Request win/loss analysis, technical benchmarks and partner pipeline comparison.
  - risk_id: R-008
    risk_title: Strategic partner dependence
    risk_category: customer
    severity: high
    likelihood: medium
    description: Uber/Lucid robotaxi program may be a critical go-forward validation and revenue path.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - V.B
    evidence_claim_ids:
      - EC-009
    mitigation_or_diligence_request: Review definitive agreements, milestones, exclusivity and cancellation penalties.
  - risk_id: R-009
    risk_title: Talent retention after layoffs/pivot
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public anchors show >1,200 employees in 2022, layoffs in 2022/2023 and about 700 employees in 2025.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.G
    evidence_claim_ids:
      - EC-020
      - EC-021
    mitigation_or_diligence_request: Request attrition, key-person retention, option refreshes and hiring plan.
  - risk_id: R-010
    risk_title: IP ownership and FTO not publicly validated
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Founder patent expertise is public but company patent schedule, assignments and FTO are private.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.D
    evidence_claim_ids:
      - EC-016
      - EC-017
    mitigation_or_diligence_request: Request patent schedule, invention assignments, open-source SBOM and FTO opinions.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, revenue bridge, gross margin, cash burn, and backlog by customer.
    why_it_matters: Public funding data cannot prove quality of revenue or runway.
    suggested_source_or_request: Request audited financials, management accounts, KPI pack, and board-approved plan.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, liquidation preferences, debt instruments, warrants, and option pool.
    why_it_matters: Headline valuation can diverge materially from common-equity economics.
    suggested_source_or_request: Request full capitalization export and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top customer revenue, churn, renewal status, and contract concentration.
    why_it_matters: Named customers or partners do not establish durable revenue.
    suggested_source_or_request: Request customer-level ARR/backlog and signed contract summaries.
    priority: high
  - gap_id: G-004
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, validation results, IP assignments, and open-source/SBOM review.
    why_it_matters: Technical defensibility and execution risk cannot be underwritten from marketing pages.
    suggested_source_or_request: Request roadmap, architecture review, patent schedule, and security/quality reports.
    priority: medium
  - gap_id: G-005
    chapter_id: VII
    section_id: VII.B
    missing_information: Current employee census, attrition, compensation, option refreshes, and key-person retention.
    why_it_matters: Scale-up and retention risk can be hidden in a private company.
    suggested_source_or_request: Request HR census, regretted-loss metrics, and employment agreements.
    priority: medium
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Nuro material contracts, indemnities, insurance, compliance reports, and litigation reserve details.
    why_it_matters: Public legal pages rarely disclose economic exposure or termination rights.
    suggested_source_or_request: Request counsel memo, contract abstracts, insurance policies, and regulator correspondence.
    priority: high
