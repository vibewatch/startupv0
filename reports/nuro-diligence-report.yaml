    description: Public sources do not disclose Nuro financials, customer contract values, safety audit data, permit
      schedules, insurance, or IP assignments.
    affected_chapter_ids:
      - I
      - III
      - VIII
    affected_section_ids:
      - I.A
      - III.C
      - VIII.F
