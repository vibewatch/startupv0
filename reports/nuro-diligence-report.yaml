    diligence_follow_up:
      - Request financing docs and cap table.
executive_summary:
  overall_assessment: Eligible private unicorn, but diligence should treat Nuro as a pivot story with valuation
    compression, regulatory/safety dependency, and customer-conversion uncertainty.
  investment_or_diligence_thesis: Nuro may have valuable L4 autonomy IP and strategic partnerships, but underwriting
    depends on proving licensing revenue, safety validation, regulatory scalability, and post-layoff talent retention.
  strongest_verified_claims:
    - founder_claim_id: FC-004
      summary: Funding history and private status are well supported by multiple public sources.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-025
    - founder_claim_id: FC-001
      summary: Current licensing product strategy is supported by company and independent reporting.
      evidence_claim_ids:
        - EC-005
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Valuation compression/down round.
    - risk_id: R-002
      summary: Business-model pivot execution.
    - risk_id: R-004
      summary: Regulatory and safety approval dependency.
  key_evidence_gaps:
    - Signed licensing contracts and pipeline economics.
    - Third-party safety audit and incident data.
    - Financials, runway, cap table and retention metrics.
  recommended_next_steps:
    - Prioritize contract and safety-case diligence.
    - Review financial runway and cap-table terms.
    - Interview key technical, regulatory and commercial leaders.
