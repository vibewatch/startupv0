executive_summary:
  overall_assessment: StockX appears to be an alive private U.S. consumer marketplace unicorn with credible public funding, valuation, scale, product, and leadership evidence. The diligence stance remains data-room dependent because financial quality, cap table economics, customer/seller concentration, unit economics, legal schedules, insurance, security posture, and material contracts are not publicly verifiable.
  investment_or_diligence_thesis: Underwrite StockX only if data-room evidence shows that authenticated marketplace liquidity converts into durable, high-margin net revenue while legal/authentication, cyber/privacy, consumer-cycle, and operational logistics risks are controlled at scale.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Forge, CB Insights, and Modern Retail support private/alive unicorn status and a $3.8B latest public valuation anchor.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-004
    - founder_claim_id: FC-002
      summary: Company help materials verify StockX bid/ask marketplace mechanics and category scope.
      evidence_claim_ids:
        - EC-005
    - founder_claim_id: FC-004
      summary: Company help materials verify seller-level thresholds and 9.0%-7.0% published base transaction fees.
      evidence_claim_ids:
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, unit economics, cash runway, and valuation support are not publicly verifiable despite a $3.8B valuation marker.
    - risk_id: R-002
      summary: Authentication/trust/legal exposure remains material due to Buyer Promise obligations, Nike settlement, and the centrality of counterfeit prevention.
    - risk_id: R-003
      summary: Marketplace growth is exposed to discretionary sneaker/streetwear/collectibles cycles, seller liquidity, competition, and incomplete customer concentration data.
  key_evidence_gaps:
    - Audited financial statements, management accounts, GMV-to-revenue bridge, take rate, gross margin, cash, burn, runway, and projections.
    - Current cap table, financing documents, investor rights, debt, option pool, and liquidation preference stack.
    - Buyer/seller/customer cohorts, revenue concentration, seller concentration, category/geography mix, retention, churn, and refund/chargeback rates.
    - Authentication QA metrics, counterfeit claims, Nike settlement terms, breach remediation, security reports, regulatory correspondence, and insurance coverage.
    - Material contracts for logistics, verification vendors, payment processors, cloud/facilities, top sellers, licenses, and brand/settlement obligations.
  recommended_next_steps:
    - Run a financial data-room review and quality-of-earnings/unit-economics analysis before relying on valuation headlines.
    - Conduct customer/seller/vendor references and obtain cohort exports to validate marketplace durability and concentration.
    - Have counsel perform full litigation, regulatory, IP, insurance, privacy, and material-contract diligence, including Nike settlement and breach remediation.
    - Interview management around post-2025 CEO transition, workforce restructuring, R&D/security roadmap, and GTM efficiency.
