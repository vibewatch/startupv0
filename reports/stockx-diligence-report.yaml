report_metadata:
  report_title: StockX Startup Diligence Report
  target_company: StockX
  website: https://stockx.com/
  known_aliases:
    - StockX LLC
    - StockX
    - Campless
  sector: Consumer e-commerce marketplace for authenticated sneakers, streetwear, electronics, collectibles, and current-culture goods
  geography: United States headquartered in Detroit, Michigan with international marketplace operations referenced publicly
  company_stage: Private unicorn / Series E-II alive company
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Detroit
  latest_known_valuation: $3.8B public valuation anchor from Forge/Modern Retail
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Confirmed StockX appears alive/private/pre-IPO from accessible public sources before creating the report.
    - Prioritized primary StockX Help Center product/fee/trust/delivery materials and company-issued CEO transition release.
    - Supplemented with independent news, market database pages, and patent records for financing, scale, competition, layoffs, breach, litigation, and IP.
    - Marked private-data-room and blocked-source areas as diligence gaps rather than inferring facts.
  included_jurisdictions:
    - United States
    - European Union and United Kingdom where Buyer Promise article references consumer withdrawal rights
    - International operations only where public sources referenced global/international expansion
  excluded_topics:
    - Non-public financial statements, monthly management accounts, bank statements, tax returns, cap table, board minutes, contracts, customer data, supplier data, security reports, HR data, legal schedules, and insurance policies.
    - Paid legal docket, paid market-share, credit, lien, UCC, and private-company shareholder databases.
    - Any confidential or non-public StockX information; no GitHub API, safeoutputs, founder deck, or private repository data was used.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for StockX diligence report
      type: workflow_request
      date_received: 2026-05-25
      notes: User specified output path, research date, public-source-only approach, exact top-level keys, checklist coverage, table/figure/evidence requirements, and no commit.
