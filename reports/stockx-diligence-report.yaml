              - R-008
        hidden_risks:
          - Authentication IP may not fully protect against competitors or legal claims without strong assignments, FTO, and portfolio coverage.
        evidence_gaps:
          - Patent/trademark portfolio, prosecution history, assignments, licenses, OSS scan, model/data rights, FTO opinions, brand agreements.
        follow_up_questions:
          - Request IP schedule and counsel memo covering patents, trademarks, copyrights, licenses, OSS, data rights, and settlement obligations.
        table_ids:
          - T-020
        figure_ids: []
        evidence_claim_ids:
          - EC-012
          - EC-013
          - EC-015
          - EC-019
          - EC-025
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: Insurance coverage and material exposures are not publicly verified despite privacy, counterfeit, consumer, logistics, and workforce exposures.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.E-F1
            finding: Cyber/privacy breach and Nike settlement raise potential insurance relevance.
            evidence_claim_ids:
              - EC-011
              - EC-012
              - EC-022
            risk_ids:
              - R-004
              - R-008
          - finding_id: VIII.E-F2
            finding: No insurance certificates, claims runs, limits, exclusions, or reserves were public.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-008
        hidden_risks:
          - Coverage exclusions or inadequate limits could leave investors exposed to breach, counterfeit, logistics, employee, or consumer claims.
        evidence_gaps:
          - Insurance policies, limits, exclusions, claims history, broker letters, reserves, cyber/E&O/D&O/general liability/product liability coverage.
        follow_up_questions:
          - Request full insurance schedule, claims runs, broker memo, open claims, denials, and coverage mapping to legal/security risks.
        table_ids:
          - T-021
        figure_ids: []
        evidence_claim_ids:
          - EC-011
          - EC-012
          - EC-022
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material contracts are not publicly available beyond help-center terms/process descriptions and reported confidential settlement terms.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.F-F1
            finding: Marketplace, seller, buyer, logistics, payment, verification, cloud, lease, brand, and settlement contract terms are not public.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-005
              - R-008
          - finding_id: VIII.F-F2
            finding: Nike settlement terms are confidential; vendor/settlement obligations may be material.
            evidence_claim_ids:
              - EC-012
              - EC-019
            risk_ids:
              - R-002
              - R-008
        hidden_risks:
          - Hidden termination rights, exclusivity, pricing escalators, indemnities, or compliance covenants could impair margin or strategic flexibility.
        evidence_gaps:
          - Material contract schedule with counterparties, spend/revenue, term, termination, exclusivity, MFN, indemnity, data/privacy, settlement obligations.
        follow_up_questions:
          - Request material-contract schedule and copies of top vendor, seller, payment, logistics, cloud, lease, brand/license, and settlement agreements.
        table_ids:
          - T-019
        figure_ids: []
        evidence_claim_ids:
          - EC-012
          - EC-019
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Regulatory-agency problem history is not fully public; the 2019 breach, GDPR exposure, EU/UK consumer rights, and counterfeit/authenticity context require counsel review.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: Data breach and potential GDPR exposure are publicly reported.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-004
          - finding_id: VIII.G-F2
            finding: Buyer Promise references EU/UK statutory withdrawal rights; regulatory correspondence and outcomes are not public.
            evidence_claim_ids:
              - EC-007
              - EC-022
            risk_ids:
              - R-008
        hidden_risks:
          - Unresolved privacy, consumer-protection, customs, counterfeit, or employment agency matters may not be visible without company/counsel schedules.
        evidence_gaps:
          - Regulatory inquiry schedule, privacy assessments, consumer complaints, customs/import reviews, agency correspondence, settlements, remediation, controls.
        follow_up_questions:
          - Request counsel regulatory schedule and privacy/security compliance pack, including breach remediation and agency communications.
        table_ids:
          - T-021
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-007
          - EC-011
          - EC-022
