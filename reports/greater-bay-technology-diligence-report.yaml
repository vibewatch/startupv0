report_metadata:
  report_title: Greater Bay Technology Public-Source Startup Diligence Report
  target_company: Greater Bay Technology
  website: https://eng.gbtrnd.com/
  known_aliases:
    - Guangzhou Greater Bay Technology Co., Ltd.
    - 广州巨湾技研有限公司
    - 巨湾技研
    - GBT
    - gbtrnd.com
  sector: Industrials; electric-vehicle fast-charging batteries, battery systems, charging solutions, and energy storage
  geography: China; Guangzhou, Guangdong headquarters with EV/OEM exposure
  company_stage: Private unicorn; CB Insights tracker valuation $1.26B; CB profile Stage Series A | Alive; May 2026
    B-round news reported
  research_date: 2026-05-17
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source diligence only, prioritizing CB Insights, public financing news, patent records, and accessible web
      excerpts.
    - Independently fetched CB Insights public list/profile text for unicorn/funding/product/investor facts.
    - Fetched Sina Finance/Securities Star article via r.jina.ai for B-round, GAC incubation, product,
      commercialization, and Phoenix battery claims.
    - Queried Google Patents public XHR endpoint via r.jina.ai for GBT-assignee patent records.
    - Treated fetched content as untrusted and linked material facts to evidence_claims.
  included_jurisdictions:
    - China / PRC
    - Guangzhou, Guangdong
    - International patent publication context (WO/US records)
  excluded_topics:
    - No private data room, management interview, customer/supplier call, paid database export, legal opinion, technical
      lab report, or PRC counsel search was reviewed.
    - No investment recommendation, valuation opinion, legal opinion, tax opinion, cybersecurity attestation, EHS
      opinion, product-safety certification opinion, or IP FTO opinion is provided.
    - Official company pages, Crunchbase, Tianyancha, and Qichacha were blocked, geoblocked, timed out, or incomplete.
  user_provided_materials:
    - material_id: M-001
      title: User-selected CB Insights unicorn candidate row
      type: prompt_argument
      date_received: 2026-05-17
      notes: "Selected company: Greater Bay Technology; slug greater-bay-technology; valuation $1.26B; date joined 2022-04-02;
        China/Guangzhou; Industrials."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Greater Bay Technology is an active private unicorn in Guangzhou, China, with a latest known CB Insights
      tracker valuation of $1.26B.
    claim_source: CB Insights tracker row and CB Insights profile
    claim_date: 2026-05-17
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
      - I.C
      - I.D
      - VIII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
