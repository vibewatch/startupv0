      identities are not public.
    diligence_follow_up:
      - Request customer list, OEM supply agreements, volumes shipped by model, revenue concentration, warranty records,
        and customer references.
executive_summary:
  overall_assessment: "Eligible for a public-source diligence report: CB Insights lists Greater Bay Technology as a $1.26B
    private unicorn, CB profile says Alive, and May 2026 Chinese financing news indicates ongoing private B-round
    activity. The company is a GAC-incubated Guangzhou EV fast-charging battery company with visible GAC/AION
    commercialization and patent activity, but financials, customer concentration, cap table, technical validation, and
    legal/regulatory checks require private diligence."
  investment_or_diligence_thesis: The public case rests on XFC battery performance claims, GAC ecosystem
    commercialization, strategic investors, a $1.26B CB tracker valuation, and patent filings. Diligence should prove
    repeatable non-GAC revenue, pack safety/reliability, manufacturing economics, current financing terms, and PRC
    legal/EHS/IP cleanliness.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights tracker verifies a $1.26B unicorn row for Greater Bay Technology.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Public sources support XFC batteries, charging solutions, and energy-storage focus.
      evidence_claim_ids:
        - EC-003
        - EC-006
    - founder_claim_id: FC-005
      summary: Public article identifies GAC AION V Plus commercialization examples.
      evidence_claim_ids:
        - EC-007
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: No public audited financials, revenue concentration, margins, backlog, AR aging, warranty reserves, or runway.
    - risk_id: R-002
      summary: Visible commercialization is GAC/AION-centered; non-GAC customer revenue is not public.
    - risk_id: R-003
      summary: Fast-charge and Phoenix claims lack public independent test, field reliability, yield, and warranty validation.
  key_evidence_gaps:
    - Audited financials, current cap table, B-round documents, debt and off-balance-sheet liabilities.
    - Top customer/supplier schedules, OEM contracts, revenue concentration, volumes, warranty claims, and references.
    - Independent technical test reports, production yield, field failure rates, product safety certifications, and
      warranty reserves.
    - PRC registry/court/administrative/EHS searches and company legal schedule.
    - IP assignments, licenses, liens, FTO analysis, and management/HR materials.
  recommended_next_steps:
    - Proceed only as a public-source screen until data-room and PRC counsel materials are obtained.
    - Prioritize financial, cap-table, customer concentration, and technical-validation workstreams before valuation
      reliance.
    - Run local PRC legal/registry/EHS/product-safety searches and patent counsel review.
    - Conduct GAC/AION and non-GAC OEM customer reference checks plus supplier quality reviews.
