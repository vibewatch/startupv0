executive_summary:
  overall_assessment: Lila Sciences has strong public financing validation and a compelling AI-for-science narrative, but
    public evidence is insufficient to underwrite product-market fit, revenue quality, unit economics, customer
    concentration, IP defensibility or legal/regulatory exposure.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only. The thesis depends on proving that Lila can
    convert a well-funded science-factory platform into repeatable, defensible, high-margin commercial outcomes with
    manageable regulatory, IP, supplier and talent risk.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Public sources corroborate $200M seed, $350M Series A and about $550M total raised, with valuation above $1.3B.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-003
      summary: Company pages publicly market Iris, Catalyst and Creation.
      evidence_claim_ids:
        - EC-005
    - founder_claim_id: FC-004
      summary: Greenhouse shows active hiring signals across functions and hubs.
      evidence_claim_ids:
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Operating financial quality and runway are private.
    - risk_id: R-003
      summary: Product maturity and AI/lab performance are not independently validated.
    - risk_id: R-004
      summary: No public top-customer, concentration or retention data was found.
    - risk_id: R-005
      summary: Competition and compute/lab operating intensity may pressure margins.
  key_evidence_gaps:
    - Financials, KPI pack, ARR/bookings, gross margin, cash runway and budget-to-actuals.
    - Cap table, financing documents, investor rights, debt, side letters and option pool.
    - Top customers, contracts, renewals, churn/NRR, concentration and references.
    - Product telemetry, pricing, roadmap, reliability, model benchmarks, lab throughput and cost-to-serve.
    - Patent schedule, invention assignments, data rights, OSS review, regulatory/legal memo and EHS/insurance records.
  recommended_next_steps:
    - Open a finance/cap-table data room before relying on public valuation.
    - Run technical diligence on model performance, lab throughput, data rights and reproducibility.
    - Conduct customer diligence with contract review, top-account references and cohort metrics.
    - Have counsel perform IP/FTO, litigation, regulatory, EHS, privacy/security and contract review.
