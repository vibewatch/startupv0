report_metadata:
  report_title: Lila Sciences Startup Diligence Report
  target_company: Lila Sciences
  website: https://www.lila.ai/
  known_aliases:
    - Lila
    - Lila AI
    - Lila Sciences, Inc.
    - LILA SCIENCES
  sector: AI-native scientific discovery, autonomous laboratories and life-science/materials R&D platforms
  geography: United States with San Francisco and Cambridge, MA signals; United Kingdom hiring footprint; global
    scientific markets
  company_stage: Private venture-backed growth-stage / unicorn
  research_date: 2026-05-21
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used public-source diligence only: company pages, investor/law-firm financing announcements, public job postings,
      trademark mirrors, limited legal/regulatory searches and competitor public materials."
    - Treated company-owned claims as evidence of public positioning, not independent evidence of performance or
      customer adoption.
    - Marked private financials, cap table, customer concentration, contracts, technical benchmarks, HR data and
      legal/regulatory records as not publicly verifiable.
  included_jurisdictions:
    - United States
    - United Kingdom hiring footprint
    - Global markets referenced by public company materials
  excluded_topics:
    - Private financial statements, contracts, cap table, board materials, security reports, full legal docket searches,
      management interviews and customer calls were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Lila Sciences diligence report
      type: workflow_request
      date_received: 2026-05-21
      notes: No pitch deck, data room, financial model or founder responses were provided.
