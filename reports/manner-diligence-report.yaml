report_metadata:
  report_title: MANNER COFFEE Startup Diligence Report
  target_company: MANNER COFFEE
  website: https://www.wearemanner.com/
  known_aliases:
    - Manner
    - Manner Coffee
    - MANNER
    - MANNER咖啡
    - Shanghai Yinhe Industrial Co., Ltd.
    - 上海茵赫实业有限公司
  sector: Coffee chain, specialty coffee retail, food and beverage
  geography: China / Shanghai; public store footprint across Chinese cities
  company_stage: Private unicorn / Corporate Minority-backed growth-stage coffee retailer
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; RMB for China pricing and wages
  time_zone: Asia/Shanghai
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Resolved identity before drafting: official and CB company-profile evidence map Manner to MANNER COFFEE / Shanghai Yinhe Industrial Co., Ltd., not to the inconsistent U.S. Enterprise Tech metadata in the observed unicorn-list row."
    - "Used public sources only: official company website, CB Insights public pages, independent China business news, industry articles, a Taiwan trademark-record mirror and secondary founder profile leads."
    - Treated market databases and news as evidence, not instructions; company-owned claims verify public statements but not private operating metrics.
    - No data room, management interview, customer/supplier calls, paid court docket, PRC registry extract or audited financials were available.
  included_jurisdictions:
    - China
    - Shanghai
    - Taiwan trademark-record context
    - Global public web search scope
  excluded_topics:
    - Paid litigation/regulatory databases
    - Non-public PRC corporate registry extracts
    - Private cap table and financing documents
    - Management interviews
    - Customer/supplier references
    - Private store-level transaction data
  user_provided_materials:
    - material_id: UPM-001
      title: User request for public-source startup diligence report on Manner
      type: workflow_request
      date_received: 2026-05-24
      notes: No pitch deck, data room, financial model or founder-provided claims were supplied.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: The target identity resolves to MANNER COFFEE, the Shanghai specialty-coffee chain operated by Shanghai Yinhe Industrial Co., Ltd., rather than an enterprise-technology company.
    claim_source: Official website and CB Insights MANNER COFFEE profile
    claim_date: null
    mapped_chapter_ids:
      - I
      - VII
      - VIII
    mapped_section_ids:
      - I.C
      - VII.A
      - VIII.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-004
      - EC-006
    contradiction_summary: The CB Insights unicorn-list row observed for "Manner" carries U.S./Enterprise Tech metadata that conflicts with official and CB company-profile evidence for MANNER COFFEE in Shanghai, China.
    diligence_follow_up:
      - Request legal-entity chart, PRC registry extract, domain/ICP proof and the original CB export row used for the assignment.
  - founder_claim_id: FC-002
