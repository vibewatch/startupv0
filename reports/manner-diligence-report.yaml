          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public databases name investors and stage but do not disclose share count, preferences, options, debt or off-balance-sheet liabilities.
        verification_status: not_publicly_verifiable
        confidence: medium
