        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements, management reports, backlog, AR aging or product/channel gross-profit tables were found in public sources.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding: CB Insights discloses funding and stage signals but not revenue, profit, cash flow or balance sheet detail.
            evidence_claim_ids:
              - EC-004
              - EC-005
          - finding: Financial-statement, backlog and AR aging diligence requires non-public company records.
            evidence_claim_ids:
              - EC-018
        hidden_risks:
          - Public store count can mask weak average unit volume, labor cost pressure or lease liabilities.
        evidence_gaps:
          - Audited financials, management accounts, store-level P&L, cash/debt, taxes, backlog, AR aging and channel gross margins are missing.
        follow_up_questions:
          - Provide audited FY2023-FY2025 financials, latest YTD management accounts, store cohort P&Ls and cash/debt schedule.
        table_ids:
          - T-003
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-018
