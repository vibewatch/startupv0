    claim_source: CB Insights unicorn list and MANNER COFFEE financials profile
    claim_date: 2021-03
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.B
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-019
    contradiction_summary: Public valuation evidence supports unicorn eligibility, but cap table, round documents and current valuation are not public; a secondary article reports a higher valuation that is not used as the primary anchor.
    diligence_follow_up:
      - Request financing documents, cap table, preference stack and valuation bridge for the 2020–2021 rounds.
  - founder_claim_id: FC-003
    claim_text: MANNER COFFEE operates a large directly owned store network with no franchise/agency model and sells coffee beverages plus bakery products.
    claim_source: MANNER COFFEE official website
    claim_date: null
    mapped_chapter_ids:
      - II
      - III
      - V
    mapped_section_ids:
      - II.A
      - III.A
      - V.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-002
      - EC-003
    contradiction_summary: null
    diligence_follow_up:
      - Request store list by city, openings/closures, lease schedule, average unit volume, gross margin and staffing model.
  - founder_claim_id: FC-004
    claim_text: Named investors/backers include ByteDance, DragonBall Capital/Meituan, Temasek, Coatue and H Capital.
    claim_source: Pandayoo and CB Insights financials/profile pages
    claim_date: 2021-06-16
    mapped_chapter_ids:
      - I
      - III
    mapped_section_ids:
      - I.C
      - I.D
      - III.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
      - EC-007
    contradiction_summary: Investor names are public, but ownership percentages, rights and current holders are not public.
    diligence_follow_up:
      - Request investor register, shareholder agreements, side letters and current beneficial ownership.
  - founder_claim_id: FC-005
    claim_text: Founder/management public context points to Han Yulong and Lu Jianxia, but senior leadership biographies and reporting lines are not well disclosed publicly.
    claim_source: Pandayoo and Baidu Baike
    claim_date: null
    mapped_chapter_ids:
      - VII
    mapped_section_ids:
      - VII.A
      - VII.C
    verification_status: partially_verified
    confidence: low
    evidence_claim_ids:
      - EC-015
      - EC-018
    contradiction_summary: Public profile evidence is secondary and incomplete; official site evidence is stronger for the legal entity than for executive biographies.
    diligence_follow_up:
      - Request management bios, org chart, board composition, employment agreements and founder equity/vesting.
executive_summary:
  overall_assessment: "Eligible with caveats: public sources support MANNER COFFEE as a private/alive China coffee-chain unicorn at a CB valuation anchor of about US$1.3B, but the observed CB unicorn-list row contains identity metadata errors and the company’s financial, cap-table and operating metrics are largely private."
  investment_or_diligence_thesis: Manner offers a scaled, direct-operated specialty-coffee platform with 2,000+ public store-count claims and prominent backers, but underwrite only after validating unit economics, labor remediation, price-war resilience, regulatory history and ownership rights.
  strongest_verified_claims:
    - "Official identity: MANNER COFFEE belongs to Shanghai Yinhe Industrial Co., Ltd. and was founded in Shanghai in 2015 (EC-001)."
    - "Official store model: 2,000+ directly operated stores and no franchise/agency model (EC-002)."
    - "CB financials: US$1.3B valuation anchor and US$11.54M total raised over five rounds (EC-005)."
  biggest_risks:
    - Financial/cap-table opacity despite headline valuation (R-002).
    - China coffee price-war and margin pressure, including public discounting context and SOE price changes (R-003).
    - Labor, service-quality and food-safety/regulatory risks in a large direct-operated store network (R-004, R-005).
  key_evidence_gaps:
    - Audited financials, store-level P&L and cash/debt.
    - Fully diluted cap table, investor rights, debt, leases and preference stack.
    - Customer/member cohorts, channel revenue and city/store concentration.
    - HR incident/turnover data, staffing model and labor remediation proof.
    - Full litigation, regulatory, insurance, contract and IP schedules.
  recommended_next_steps:
    - Reconcile the original CB unicorn export row with official/CB profile identity before transaction reliance.
    - Request financial, cap-table and store-cohort data room materials.
    - Run PRC legal/regulatory/market-supervision and branch-level registry checks.
    - Conduct customer/member analytics, store visits and supplier/landlord contract review.
    - Verify labor-remediation execution after 2024 public incidents.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports identity, private status and a US$1.3B valuation anchor, but audited financial statements, store-level unit economics, cap table, debt and projections are not public.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-004
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-018
      - EC-019
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-008
