          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public signals show growth, price changes and market pressure, but no board-approved forecast or economic-assumption bridge is public.
        verification_status: not_publicly_verifiable
        confidence: medium
