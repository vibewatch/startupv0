diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, cash/debt, store-level P&L and KPI pack
    why_it_matters: Public valuation and store count cannot be underwritten without revenue, margin, cash flow and unit economics.
    suggested_source_or_request: Request from company, auditors and investors.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, investor rights, debt, lease commitments and preference stack
    why_it_matters: Headline valuation may not translate to common-equity value.
    suggested_source_or_request: Request financing documents, shareholder agreements and debt/lease schedules.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Customer/member cohorts, channel revenue, city concentration, delivery-platform share and retention
    why_it_matters: B2C retail concentration and retention risk are invisible in public sources.
    suggested_source_or_request: Request transaction and member analytics by city/store/channel.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Store staffing, wage bands, overtime, service times, complaints and turnover
    why_it_matters: Public incidents suggest labor model may be a value-limiting bottleneck.
    suggested_source_or_request: Request HR, operations and customer-service dashboards.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Full PRC regulatory/food-safety, litigation, insurance and contract schedules
    why_it_matters: Retail food operations carry branch-level risks not captured by English public sources.
    suggested_source_or_request: Request counsel letters, regulator searches, insurance schedules and material contracts.
    priority: high
