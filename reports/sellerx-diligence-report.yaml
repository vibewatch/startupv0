executive_summary:
  overall_assessment: SellerX remains eligible as a historical private unicorn diligence target, but it should
    be treated as a distressed/restructured ecommerce roll-up rather than an unquestioned USD1bn current-value
    company. Public evidence verifies the founding model, early EUR100m financing, unicorn-list entry, and
    private status; independent reporting also shows debt pressure, a debt-equity swap, brand contraction,
    layoffs, and leadership turnover.
  investment_or_diligence_thesis: Track only with data-room conditions. Underwrite SellerX from current
    retained-brand cash flow, debt terms, creditor governance, and post-restructuring management capacity; do
    not underwrite the stale 2021 unicorn valuation without fresh transaction, 409A, or lender-supported
    valuation evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: SellerX was founded in 2020 around acquiring and scaling Amazon Marketplace/FBA brands.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-017
    - founder_claim_id: FC-002
      summary: TechCrunch reported EUR100m seed financing with named venture/debt backers.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: CB Insights lists SellerX as a historical unicorn at USD1bn with a 2021-12-09 unicorn date.
      evidence_claim_ids:
        - EC-001
  biggest_risks:
    - risk_id: R-001
      summary: Debt distress and creditor-control risk dominate valuation and transaction feasibility.
    - risk_id: R-003
      summary: Reported portfolio contraction from 67 brands to 19 and later fewer than ten implies asset-quality
        and impairment risk.
    - risk_id: R-006
      summary: Founder, CEO/CFO, and workforce churn raise execution and retention risk.
  key_evidence_gaps:
    - Current cap table, creditor ownership, liquidation preferences, warrants, and investor/creditor consent
      rights are not public.
    - Audited financials, monthly cash, gross margin, inventory, debt covenants, and restructuring model are
      not public.
    - Current brand list, brand-level P&Ls, acquisition/disposal ledger, inventory impairments, and
      retained-brand economics are not public.
    - Customer cohorts, CAC/LTV, marketplace account health, and channel concentration are not public.
    - Supplier audits, privacy controls, litigation dockets, insurance, and material contracts are not public.
  recommended_next_steps:
    - Open financial and legal data room before any valuation discussion; start with debt agreements,
      restructuring terms, current cap table, and FY2022-FY2025 accounts.
    - Rebuild valuation from retained-brand free cash flow, lender case, and post-swap ownership rather than
      public unicorn database fields.
    - Run brand-by-brand diligence on retained/disposed assets, SKU economics, inventory, customer cohorts,
      and marketplace account health.
    - Interview current leadership, key brand operators, creditors, and former founders/executives where
      possible to understand governance and execution risk.
    - Commission counsel-led reviews of privacy/GDPR, supplier compliance, product safety, litigation,
      insurance, and material contracts.
