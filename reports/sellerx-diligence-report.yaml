risk_register:
  - risk_id: R-001
    risk_title: Debt distress and creditor-control risk
    risk_category: financing
    severity: critical
    likelihood: high
    description: Auction, BlackRock loan, debt-equity swap, and downsizing reports indicate potential creditor
      control, impaired equity value, and restrictive covenants.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - VIII.F
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request all credit agreements, restructuring documents, covenant compliance
      certificates, board minutes, and creditor consent rights.
  - risk_id: R-002
    risk_title: Stale unicorn valuation risk
    risk_category: financial
    severity: high
    likelihood: high
    description: The USD1bn unicorn valuation is from 2021 and conflicts with later distress and portfolio
      contraction signals.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Do not underwrite the CB Insights valuation without a current 409A/fair-value
      analysis and latest priced transaction support.
  - risk_id: R-003
    risk_title: Portfolio contraction and asset-quality risk
    risk_category: product
    severity: high
    likelihood: high
    description: Public reports say brands contracted from 67 to 19 and later fewer than ten, suggesting
      write-downs, disposals, or discontinued brands.
    impacted_chapter_ids:
      - II
    impacted_section_ids:
      - II.A
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request brand acquisition/disposal ledger, impairment analyses,
      retained-brand P&Ls, SKU rationalization, and inventory write-offs.
  - risk_id: R-004
    risk_title: Capital-intensive roll-up execution risk
    risk_category: market
    severity: high
    likelihood: medium
    description: The acquisition-led marketplace aggregator model depends on external financing, integration
      quality, and multiple expansion.
    impacted_chapter_ids:
      - I
      - IV
    impacted_section_ids:
      - I.C
      - IV.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Require acquisition cohort returns, debt-service capacity, covenant headroom,
      and post-acquisition integration KPIs.
  - risk_id: R-005
    risk_title: Amazon and marketplace dependency
    risk_category: customer
    severity: high
    likelihood: high
    description: The strategy centers on Amazon/FBA sellers, creating exposure to marketplace fees, policies,
      ranking changes, reviews, and account suspensions.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request channel split, account health history, marketplace policy incidents,
      customer cohorts, and dependency mitigation plans.
  - risk_id: R-006
    risk_title: Leadership and workforce turnover risk
    risk_category: team
    severity: high
    likelihood: high
    description: Founder exits, CEO/CFO departures, layoffs, and workforce downsizing may weaken execution and
      institutional memory.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request current org chart, retention plan, severance obligations,
      works-council correspondence, and key-person risk assessment.
  - risk_id: R-007
    risk_title: Supply-chain and product-compliance risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Brand operations and modern-slavery disclosures imply third-party manufacturing, sourcing, and
      product-safety exposure.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.C
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request supplier master, factory audits, product testing, sanctions
      screening, remediation logs, and insurance coverage.
  - risk_id: R-008
    risk_title: Legal docket and insurance opacity
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: No complete litigation, claims, or insurance schedule was publicly available.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.E
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Counsel should run jurisdictional docket searches and provide warranty/indemnity/insurance schedules.
  - risk_id: R-009
    risk_title: Limited visible technical moat
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Public sources do not verify proprietary technology, patents, or R&D capabilities that would
      differentiate the roll-up model.
    impacted_chapter_ids:
      - VI
    impacted_section_ids:
      - VI.A
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request engineering roadmap, data platform architecture, code/IP ownership,
      patents/trademarks, and build-versus-buy spend.
  - risk_id: R-010
    risk_title: GDPR and ecommerce data risk
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Ecommerce operations process personal and marketplace data, but public materials do not verify
      control effectiveness.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request data maps, DPIAs, processor contracts, breach logs, cookie consent
      evidence, and cross-border-transfer assessments.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited FY2022-FY2025 financials and monthly management accounts.
    why_it_matters: Needed to verify revenue, margin, cash burn, debt service, and working capital.
    suggested_source_or_request: Company CFO/accountant data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, debt schedule, debt-equity swap documents, and creditor rights.
    why_it_matters: Determines ownership, control, dilution, and transaction feasibility.
    suggested_source_or_request: Company, investors, creditors, counsel.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Current brand list, acquisition/disposal ledger, SKU economics, and impairment analyses.
    why_it_matters: Reported portfolio contraction is central to asset quality.
    suggested_source_or_request: Company brand-operations data room.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Customer cohorts, CAC/LTV, returns, repeat purchase, channel/country concentration.
    why_it_matters: Tests whether retained brands have durable demand.
    suggested_source_or_request: Data warehouse export and marketplace reports.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Supplier master, factory audit results, product testing, remediation logs.
    why_it_matters: Consumer-goods supply-chain failures can create legal and reputational liability.
    suggested_source_or_request: Operations/compliance team and suppliers.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Competitor benchmarks, acquisition ROI, market share, and financing resilience analysis.
    why_it_matters: Determines whether SellerX has a durable edge or only scale from prior capital availability.
    suggested_source_or_request: Management model, market studies, and board materials.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.C
    missing_information: Marketing budget, marketplace ad productivity, account-health history, organic/paid growth bridge.
    why_it_matters: Determines whether post-restructuring growth is fundable and profitable.
    suggested_source_or_request: Marketing and marketplace operations dashboards.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Engineering/R&D org, proprietary tooling, architecture, security controls, and IP ownership.
    why_it_matters: Public evidence does not prove technical moat or scalable operating leverage.
    suggested_source_or_request: CTO/tech data room and vendor contracts.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.A
    missing_information: Current org chart, board/observer list, executive contracts, succession plan.
    why_it_matters: Leadership churn is a top execution risk.
    suggested_source_or_request: Company HR, counsel, board secretary.
    priority: high
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.B
    missing_information: Monthly payroll census, attrition, layoffs, severance, works-council materials.
    why_it_matters: Validates workforce capacity and employment liabilities.
    suggested_source_or_request: HR/payroll and legal records.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts including debt, marketplace, acquisition, supplier, logistics, and IP agreements.
    why_it_matters: Contracts may contain defaults, consent rights, or change-of-control restrictions.
    suggested_source_or_request: Counsel-led contract data room.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, DPIAs, breach logs, product-safety/recall records,
      sanctions/customs screening.
    why_it_matters: Ecommerce operations expose the company to GDPR, consumer, product-safety, and trade compliance risk.
    suggested_source_or_request: Legal/compliance team.
    priority: medium
