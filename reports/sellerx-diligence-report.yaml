report_metadata:
  report_title: SellerX Startup Diligence Report
  target_company: SellerX
  website: https://www.sellerx.com
  known_aliases:
    - SellerX
    - Seller X
    - SellerX Group
  sector: Consumer ecommerce and Amazon marketplace brand aggregation
  geography: Germany / Berlin with global ecommerce operations
  company_stage: Private unicorn (historical public unicorn marker; current valuation not public)
  research_date: 2026-05-16
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: EUR and USD as reported by sources
  time_zone: Europe/Berlin
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Proceed only because public unicorn/private-company eligibility was supported by CB Insights and
      LinkedIn-like public evidence.
    - Used company pages, market databases, professional profile data, and independent ecommerce/business-news
      reports; separated source facts from analyst judgments.
    - Treated the CB Insights USD1bn valuation as historical/stale because later public restructuring signals
      materially conflict with current-value assumptions.
  included_jurisdictions:
    - Germany
    - European Union
    - United States / Amazon marketplace exposure
    - Global ecommerce and supply-chain markets
  excluded_topics:
    - Non-public financial statements, cap table, debt agreements, board materials, supplier audits, customer
      cohorts, legal dockets, and HR records.
    - Paywalled or blocked sources that could not be independently re-opened during final validation.
  user_provided_materials: []
