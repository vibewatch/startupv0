  - figure_id: F-008
    title: Island key-risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Risk heatmap based on public-source diligence.
    purpose: Prioritize private diligence workstreams.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and revenue durability are opaque
          severity: high
          likelihood: medium
          rationale: Public sources do not disclose audited financials, ARR dollars, gross margin, retention, burn, cash, debt or budget-to-actuals.
          evidence_claim_ids: &a1
            - EC-010
            - EC-021
          source_ids:
            - SRC-013
            - SRC-001
            - SRC-014
            - SRC-015
            - SRC-016
        - risk_id: R-002
          label: Headline valuation may not reflect common-equity economics
          severity: high
          likelihood: medium
          rationale: The public valuation rose to $4.8B/$5B, but preferred terms, preferences, option pool, debt and secondary components are private.
          evidence_claim_ids: &a2
            - EC-001
            - EC-002
            - EC-024
          source_ids:
            - SRC-001
            - SRC-013
            - SRC-014
            - SRC-015
            - SRC-016
        - risk_id: R-003
          label: Customer concentration, retention and deployment depth are unknown
          severity: high
          likelihood: medium
          rationale: Customer count and stories do not disclose ARR concentration, churn, NRR, renewal history or production depth.
          evidence_claim_ids: &a3
            - EC-010
            - EC-011
            - EC-022
          source_ids:
            - SRC-013
            - SRC-006
            - SRC-007
        - risk_id: R-004
          label: GTM efficiency and sales productivity are not public
          severity: medium
          likelihood: medium
          rationale: No public CAC, payback, pipeline conversion, quota capacity, implementation cost or partner-sourced revenue data was found.
          evidence_claim_ids: &a4
            - EC-010
            - EC-012
          source_ids:
            - SRC-013
            - SRC-003
            - SRC-006
            - SRC-022
        - risk_id: R-005
          label: Platform competition from browsers, SASE, endpoint and identity vendors
          severity: high
          likelihood: medium
          rationale: Island competes with entrenched enterprise platforms and adjacent security categories that can bundle or imitate controls.
          evidence_claim_ids: &a5
            - EC-007
            - EC-009
            - EC-023
          source_ids:
            - SRC-003
            - SRC-005
            - SRC-006
        - risk_id: R-006
          label: Browser-replacement adoption friction
          severity: medium
          likelihood: medium
          rationale: An enterprise browser strategy can face user-change, compatibility, extension, management and procurement friction.
          evidence_claim_ids: &a6
            - EC-007
            - EC-012
            - EC-023
          source_ids:
            - SRC-003
            - SRC-006
            - SRC-022
            - SRC-005
        - risk_id: R-007
          label: AI governance claims require deeper technical/security proof
