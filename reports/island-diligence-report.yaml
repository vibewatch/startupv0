executive_summary:
  overall_assessment: Island appears to be a credible, active private unicorn in enterprise browser/security software. Public evidence supports unicorn eligibility, repeated financing step-ups, product breadth, customer-scale claims, FedRAMP-in-process status and patent activity. The main underwriting gaps are financial quality, customer retention/concentration, preferred-equity economics, product displacement proof, competitive durability, security/privacy/legal artifacts and public-sector authorization timing.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The public story is strong—large financing rounds, a differentiated enterprise-browser thesis and apparent customer traction—but a $4.8B to $5B valuation should not be underwritten without private ARR, retention, margin, cash, customer, cap-table, technical-security and legal evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Island as a unicorn at roughly $5B valuation.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Public financing announcements show a 2025 $250M Series E at a $4.8B valuation.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Island publicly markets Enterprise Browser, Enterprise AI and Enterprise Network products.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-009
    - founder_claim_id: FC-006
      summary: FedRAMP Marketplace lists Island Enterprise Browser as Agency Authorization In Process at High baseline.
      evidence_claim_ids:
        - EC-014
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and revenue durability are opaque.
    - risk_id: R-002
      summary: Headline valuation may not reflect common-equity economics.
    - risk_id: R-003
      summary: Customer concentration, retention and deployment depth are unknown.
    - risk_id: R-005
      summary: Platform competition from browser, SASE, endpoint and identity vendors is intense.
  key_evidence_gaps:
    - Audited financials, ARR/bookings bridge, gross margin, burn, cash/debt, revenue recognition and budget-to-actuals.
    - Cap table, Series E terms, liquidation preferences, option pool, debt, secondary sales and investor rights.
    - Customer cohort data, top-account ARR, churn/NRR/GDR, deployment depth, independent references and disputes.
    - Product architecture, security testing, AI data flows, uptime/SLA, implementation metrics and module adoption.
    - FedRAMP package details, legal/privacy/security artifacts, litigation/regulatory schedules, insurance and IP/FTO review.
  recommended_next_steps:
    - Run financial quality-of-revenue diligence before relying on the $4.8B to $5B headline valuation.
    - Obtain cap table and financing documents to model preference stack and common-equity value.
    - Conduct customer reference and cohort retention diligence focused on deployment depth and renewal behavior.
    - Run technical/security diligence on browser control, AI governance, network/SASE architecture and FedRAMP readiness.
    - Have counsel review contracts, privacy/security artifacts, litigation/regulatory history, insurance and IP/FTO.
