report_metadata:
  report_title: Island Startup Diligence Report
  target_company: Island
  website: https://www.island.io/
  known_aliases:
    - Island Technology
    - Island.io
    - Island Enterprise Browser
  sector: Enterprise browser, cybersecurity, secure access, SASE and AI governance software
  geography: United States / Dallas, Texas with Israel R&D presence
  company_stage: Private unicorn / growth-stage cybersecurity software company
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Chicago
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized public market databases, company product/legal/customer pages, financing announcements, FedRAMP records and patent databases.
    - Treated company and wire-service claims as verified only for existence of the public statement unless independently corroborated.
    - Focused on founder-claim verification, hidden risk discovery and data-room follow-up requests suitable for confirmatory diligence.
    - No management interview, customer call, private financial model, data room, legal docket export, SOC report or security architecture review was available.
  included_jurisdictions:
    - United States
    - Israel public R&D/technology footprint where publicly referenced
    - United States federal public-sector authorization signals
  excluded_topics:
    - Private financial statements, contracts, cap table, debt, board materials, HRIS/payroll, customer references, security audit reports and exhaustive litigation/regulatory docket searches were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request to create an Island diligence YAML report
      type: workflow_request
      date_received: 2026-05-24
      notes: No pitch deck, data room, founder responses, financial model or private documents were provided.
