risk_register:
  - risk_id: R-001
    risk_title: Financial quality and revenue durability are opaque
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public sources do not disclose audited financials, ARR dollars, gross margin, retention, burn, cash, debt or budget-to-actuals.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited statements, monthly KPI pack, ARR bridge, revenue recognition memo, cohort retention, cash/debt and board plan.
  - risk_id: R-002
    risk_title: Headline valuation may not reflect common-equity economics
    risk_category: financing
    severity: high
    likelihood: medium
    description: The public valuation rose to $4.8B/$5B, but preferred terms, preferences, option pool, debt and secondary components are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review financing documents, waterfall, pro forma cap table and valuation bridge.
  - risk_id: R-003
    risk_title: Customer concentration, retention and deployment depth are unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Customer count and stories do not disclose ARR concentration, churn, NRR, renewal history or production depth.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request top 25 accounts, contract values, renewal/churn cohorts, usage telemetry and independent references.
  - risk_id: R-004
    risk_title: GTM efficiency and sales productivity are not public
    risk_category: market
    severity: medium
    likelihood: medium
    description: No public CAC, payback, pipeline conversion, quota capacity, implementation cost or partner-sourced revenue data was found.
    impacted_chapter_ids:
      - V
    impacted_section_ids:
      - V.A
      - V.C
      - V.D
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request sales funnel, cohort CAC/payback, pipeline, quota attainment and partner economics.
  - risk_id: R-005
    risk_title: Platform competition from browsers, SASE, endpoint and identity vendors
    risk_category: market
    severity: high
    likelihood: medium
    description: Island competes with entrenched enterprise platforms and adjacent security categories that can bundle or imitate controls.
    impacted_chapter_ids:
      - II
      - IV
    impacted_section_ids:
      - II.A
      - IV.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Conduct win/loss, pricing, displacement and buyer-reference diligence against Microsoft, Google, SASE/ZTNA, VDI and endpoint vendors.
  - risk_id: R-006
    risk_title: Browser-replacement adoption friction
    risk_category: product
    severity: medium
    likelihood: medium
    description: An enterprise browser strategy can face user-change, compatibility, extension, management and procurement friction.
    impacted_chapter_ids:
      - II
      - III
      - IV
    impacted_section_ids:
      - II.A
      - III.A
      - IV.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Validate deployment time, app compatibility, user adoption, support burden and renewal reasons with customers.
  - risk_id: R-007
    risk_title: AI governance claims require deeper technical/security proof
    risk_category: technical
    severity: medium
    likelihood: medium
    description: AI Protect/Browser/Automate/Publish claims require validation of data flows, model controls, policy enforcement and monitoring.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request architecture, model/data-flow diagrams, security assessment, red-team results and AI governance control evidence.
  - risk_id: R-008
    risk_title: FedRAMP timing and public-sector revenue risk
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: FedRAMP Agency Authorization In Process is a progress signal but not authorization; delays could affect government revenue plans.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.B
      - VIII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Confirm sponsor agency, package status, 3PAO work, POA&M, controls and government pipeline dependencies.
  - risk_id: R-009
    risk_title: Privacy, legal and contractual exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Browser, network and AI control points process sensitive enterprise activity; public legal pages do not reveal incidents, contract deviations or regulatory correspondence.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Counsel should review DPAs, MSAs, incident logs, subprocessors, insurance, regulatory correspondence and security reports.
  - risk_id: R-010
    risk_title: IP enforceability and freedom-to-operate uncertainty
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public patent records show relevant IP, but ownership chain, portfolio breadth, claim strength and third-party FTO are not public.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.D
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request full patent/trademark schedule, assignments, invention agreements, open-source review and FTO memo.
  - risk_id: R-011
    risk_title: People scale and cross-border R&D execution risk
    risk_category: team
    severity: medium
    likelihood: low
    description: Public materials indicate meaningful US/Israel scale, but org depth, attrition, hiring plan and succession are private.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.A
      - VII.B
      - VII.C
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Request org chart, HRIS extract, attrition, compensation, location split, key-person dependencies and succession plan.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials and monthly management accounts are unavailable publicly.
    why_it_matters: Needed to underwrite ARR quality, margin, burn, cash and runway.
    suggested_source_or_request: Company CFO/data room request.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, financing terms and preference stack are unavailable publicly.
    why_it_matters: Headline valuation may not equal common-equity value.
    suggested_source_or_request: Counsel/company financing document request.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer ARR, concentration, churn, NRR/GDR and deployment depth are unavailable publicly.
    why_it_matters: Customer durability is central to valuation support.
    suggested_source_or_request: Customer cohort schedule and independent references.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product architecture, security test results and module attach rates are unavailable publicly.
    why_it_matters: Product claims and competitive defensibility require technical validation.
    suggested_source_or_request: CTO/security artifact request and customer proof-of-concept.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, pipeline conversion and partner economics are unavailable publicly.
    why_it_matters: GTM scalability determines growth efficiency.
    suggested_source_or_request: Sales/marketing KPI pack request.
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.G
    missing_information: FedRAMP package details and authorization timeline are unavailable publicly.
    why_it_matters: AIP status is not authorization and may affect public-sector revenue.
    suggested_source_or_request: FedRAMP package, sponsor and 3PAO evidence.
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Customer/vendor contracts, DPAs, SLAs and indemnities are unavailable publicly.
    why_it_matters: Material contract terms drive legal, privacy and margin exposure.
    suggested_source_or_request: Legal data room request.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Full IP portfolio, assignments, open-source SBOM and FTO analysis are unavailable publicly.
    why_it_matters: Patent existence does not prove enforceability or freedom to operate.
    suggested_source_or_request: Counsel/IP request.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS-supported headcount, attrition, compensation and hiring plan are unavailable publicly.
    why_it_matters: People execution is critical given reported 500-employee scale.
    suggested_source_or_request: HRIS/payroll and compensation request.
    priority: medium
  - gap_id: G-010
    chapter_id: III
    section_id: III.E
    missing_information: Supplier, cloud, AI/model and subprocessor dependency economics are unavailable publicly.
    why_it_matters: Vendor dependencies may affect margin, uptime, data rights and compliance.
    suggested_source_or_request: Vendor/subprocessor and infrastructure spend request.
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Exhaustive litigation and regulatory docket searches were not performed.
    why_it_matters: Undisclosed disputes could create contingent liabilities.
    suggested_source_or_request: Counsel-led docket and regulatory correspondence review.
    priority: medium
  - gap_id: G-012
    chapter_id: I
    section_id: I.D
    missing_information: Insurance and tax schedules are unavailable publicly.
    why_it_matters: Coverage exclusions or tax issues could affect downside risk.
    suggested_source_or_request: Insurance/tax data room request.
    priority: medium
