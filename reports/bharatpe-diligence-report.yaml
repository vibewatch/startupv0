executive_summary:
  overall_assessment: BharatPe appears to be an active private fintech unicorn with strong public evidence of merchant scale, UPI/POS products and a current leadership team. The investability screen turns on private verification of financial quality, loan/credit risk, regulatory posture, merchant retention, cap table and governance/legal settlement terms.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if BharatPe can prove profitable, compliant merchant payments/lending scale with durable retention and clean governance after the founder-dispute period.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists BharatPe at USD 2.85B and active public profiles support private-company status.
      evidence_claim_ids:
        - EC-001
        - EC-010
    - founder_claim_id: FC-003
      summary: Company sources report a 17M+ merchant network, 450M+ monthly UPI transactions and large POS/lending scale.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Company sources verify current management including CEO Nalin Negi.
      evidence_claim_ids:
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Governance and founder-dispute overhang
    - risk_id: R-002
      summary: Fintech regulatory and payments compliance exposure
    - risk_id: R-003
      summary: Credit/lending partner and merchant portfolio risk
  key_evidence_gaps:
    - Audited financials, cap table, cash/debt and revenue by product.
    - Loan portfolio performance, partner NBFC agreements, defaults and provisions.
    - Merchant cohorts, retention, concentration, TPV take rate and CAC/payback.
    - RBI/payment aggregator compliance, AML/KYC, complaints and regulatory correspondence.
    - Founder-settlement documents, litigation schedule and governance remediation evidence.
  recommended_next_steps:
    - Run financial and credit-quality diligence before relying on valuation.
    - Review RBI/payment aggregator and lending-partner compliance files.
    - Request merchant cohort, TPV, take-rate, fraud and uptime data.
    - Have counsel review founder settlement, litigation, data/privacy and regulatory records.
