risk_register:
  - risk_id: R-001
    risk_title: Governance and founder-dispute overhang
    risk_category: reputational
    severity: high
    likelihood: medium
    description: Public sources describe disputes involving former co-founder Ashneer Grover and a 2024 settlement, which requires legal and governance diligence.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.F
      - VIII.A
      - VIII.B
    evidence_claim_ids: *a44
    mitigation_or_diligence_request: Request settlement agreements, litigation schedule, board minutes and related-party/confidentiality controls.
  - risk_id: R-002
    risk_title: Fintech regulatory and payments compliance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: BharatPe operates in UPI, POS, lending partnerships and payment aggregation; RBI/licensing and partner compliance are central.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.G
      - II.A
    evidence_claim_ids: *a45
    mitigation_or_diligence_request: Review RBI licenses, payment aggregator conditions, partner NBFC agreements, AML/KYC and compliance correspondence.
  - risk_id: R-003
    risk_title: Credit/lending partner and merchant portfolio risk
    risk_category: financial
    severity: high
    likelihood: medium
    description: BharatPe Money has facilitated large loan disbursements through NBFC partners; credit quality, defaults and partner recourse are private.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.A
      - III.C
    evidence_claim_ids: *a46
    mitigation_or_diligence_request: Request loan cohort performance, partner contracts, delinquency, take rates and provisioning.
  - risk_id: R-004
    risk_title: Private financial quality behind 2021 valuation
    risk_category: financial
    severity: high
    likelihood: medium
    description: CB Insights valuation and public revenue figures do not disclose audited EBITDA, cash, debt, cap table or unit economics.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
    evidence_claim_ids: *a47
    mitigation_or_diligence_request: Request audited financials, cap table, cash/debt, revenue by product and profitability bridge.
  - risk_id: R-005
    risk_title: Highly competitive UPI/POS merchant acquisition market
    risk_category: market
    severity: medium
    likelihood: high
    description: BharatPe competes with PhonePe, Paytm, Google Pay, Razorpay, Pine Labs and banks for merchants and transactions.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a48
    mitigation_or_diligence_request: Benchmark merchant acquisition cost, retention, pricing and transaction economics.
  - risk_id: R-006
    risk_title: Operational scale and fraud/security risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: High public transaction volume and fraud-protection messaging imply operational, fraud, uptime and data-security diligence surfaces.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.G
    evidence_claim_ids: *a49
    mitigation_or_diligence_request: Request incident history, fraud losses, uptime/SLA, security audits and chargeback/complaint data.
