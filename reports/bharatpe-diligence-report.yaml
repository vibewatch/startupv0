report_metadata:
  report_title: BharatPe Startup Diligence Report
  target_company: BharatPe
  website: https://bharatpe.com/
  known_aliases:
    - BharatPe
    - Resilient Innovations Pvt Ltd
    - Resilient Innovations Private Limited
  sector: Fintech, UPI payments, merchant POS and embedded lending
  geography: India
  company_stage: Private unicorn / public-source diligence screen
  research_date: 2026-06-11
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD and INR
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built target eligibility from the fetched CB Insights unicorn list and repository exclusion list.
    - Used company-owned pages, public profiles, reputable business/news sources and public encyclopedia references where primary pages were inaccessible.
    - Treated company-published claims as evidence of public statements, not as independent proof of private metrics.
    - No management interview, financial model, cap table, customer calls, legal docket exports, security reports or data-room records were available.
  included_jurisdictions:
    - India
  excluded_topics:
    - Private financial statements, contracts, tax records, cap table, security reports, board materials and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-11
      notes: No pitch deck, data room, founder responses or private customer references were provided.
