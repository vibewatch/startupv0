        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Remote names customers such as Anthropic, KFC and Datadog and publishes TheyDo and Reverse Tech case studies, but top-15 customer lists and purchase timing by application are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
