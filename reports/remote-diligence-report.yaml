executive_summary:
  overall_assessment: Remote is a credible, late-stage global HR/payroll infrastructure company with strong public financing, product, customer, partner and scale signals. The public record supports unicorn status, broad product availability and major growth claims at the statement level, but standard investment or acquisition diligence remains gated by non-public financials, retention, customer concentration, cap table, contracts, regulatory artifacts, security reports and legal schedules.
  investment_or_diligence_thesis: Proceed to confirmatory diligence rather than relying on public narrative alone. Remote’s US$300M ARR/cash-flow-positive claim, owned-entity infrastructure, transparent pricing, strategic partners and customer stories suggest meaningful business substance; underwriting should focus on revenue quality, gross margin, regulatory execution, customer retention, competitive price pressure, payment/data dependencies and financing preferences.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and Remote financing announcements support Remote’s unicorn/near-US$3B valuation history.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: Remote publicly advertises EOR, payroll, contractor, HRIS, API/integration and MCP offerings with list pricing for core SKUs.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-022
    - founder_claim_id: FC-005
      summary: Remote has public customer/partner traction signals including Anthropic, KFC, Datadog, Workday, BambooHR, Personio and named case studies.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Financial-quality proof is incomplete despite headline US$300M ARR and cash-flow-positive claims.
    - risk_id: R-003
      summary: Global EOR/payroll operations carry multi-jurisdiction regulatory, tax, employment, classification and payment risk.
    - risk_id: R-004
      summary: Customer concentration, churn, NRR and pipeline are not public.
    - risk_id: R-005
      summary: Transparent competitor pricing creates price-compression and margin-risk questions.
    - risk_id: R-007
      summary: Sensitive workforce data plus MCP/AI connectivity requires security, privacy and AI-governance artifact review.
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, ARR waterfall, gross margin by SKU, cash/debt, backlog and AR aging.
    - Cap table, financing documents, preference stack, option pool, warrants, debt and current valuation support.
    - Top customer ARR, customer concentration, churn/NRR, renewal calendar, severed relationships and independent references.
    - Material contracts, partner agreements, supplier/payment-provider agreements, DPAs, subprocessors, SOC reports, incident register and insurance policies.
    - Legal/regulatory schedules covering litigation, employment/payroll/tax/payment agency correspondence, licenses, audits and worker-classification issues.
    - HRIS headcount, attrition, compensation, benefit plans, equity plan and employee-relations records.
  recommended_next_steps:
    - Open a data room request focused first on financial quality, cap table and customer retention/concentration.
    - Have employment/payroll/payments/privacy counsel review entity/license map, regulatory correspondence, customer MSAs, DPAs, Nium/payment agreements and litigation dockets.
    - Run customer calls for TheyDo/Reverse Tech-like accounts plus top ARR accounts, churned accounts and partner-channel customers.
    - Benchmark against Deel, Oyster, Rippling and Papaya using realized pricing, win/loss, gross margin, implementation speed, service quality and NRR.
    - Review SOC/ISO reports, penetration tests, incident history, AI/MCP governance and vendor-risk artifacts before relying on sensitive-data controls.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Remote has strong public financing and headline scale signals, including US$300M ARR/cash-flow-positive claims and a near-US$3B valuation history. Complete financial statements, cap table, cash/debt, retention, backlog and AR aging remain private-data-room items.
    founder_claim_ids:
      - FC-001
      - FC-002
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-019
      - EC-020
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Remote publicly claims US$300M ARR and cash-flow positivity, but no audited income statements, balance sheets, cash flows, monthly management accounts, backlog or AR aging were available.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public evidence gives headline ARR and cash-flow positivity, not full financial statements or quality of revenue.
            evidence_claim_ids:
              - EC-004
              - EC-019
            risk_ids:
              - R-001
        hidden_risks:
          - Headline ARR may include product/geography mix or one-time effects that public sources do not disaggregate.
        evidence_gaps:
          - Audited financials, management accounts, ARR/bookings by product and geography, gross margin, backlog and AR aging.
        follow_up_questions:
          - Provide audited financials, management financial reports, ARR bridge, gross-margin schedule, cash/debt, backlog and AR aging.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-019
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Remote’s public growth story is supported by payroll-growth and partner/customer statements, but three-year projections, assumptions, capex, working capital and external financing assumptions are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Growth drivers include payroll, strategic platform partnerships and global infrastructure, but forecast assumptions were not disclosed.
            evidence_claim_ids:
              - EC-004
              - EC-005
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Foreign payroll/payment operations can create working-capital and FX volatility not visible in public metrics.
        evidence_gaps:
          - Quarterly three-year model, scenario cases, growth-driver bridge, foreign-exchange exposure, working-capital requirements and financing assumptions.
        follow_up_questions:
          - Provide board-approved plan, forecast model, sensitivity cases, international risk assumptions and expected financing needs.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-019
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify investors and valuation headlines but do not disclose current shares, stockholder list, options, warrants, notes, debt instruments, preferences or off-balance-sheet liabilities.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C-F1
            finding: Known public investors include SoftBank, Accel, Sequoia, Index Ventures, General Catalyst and others, but ownership economics are private.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
              - EC-020
            risk_ids:
              - R-002
        hidden_risks:
          - Valuation headline could mask preference-stack or dilution complexity.
        evidence_gaps:
          - Cap table, option pool, warrants, notes, debt, preferences, liquidation stack and off-balance-sheet liabilities.
        follow_up_questions:
          - Provide fully diluted cap table, financing documents, debt schedule, warrants/options and off-balance-sheet obligation schedule.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-020
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is partially visible from Series B and Series C announcements plus CB Insights, but tax positions, accounting policies, revenue recognition and financing terms remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Remote announced a US$150M Series B in 2021 and US$300M Series C in 2022, with total raised reaching US$495M.
            evidence_claim_ids:
              - EC-002
              - EC-003
            risk_ids:
              - R-002
        hidden_risks:
          - Owned entities across jurisdictions increase tax and accounting complexity.
        evidence_gaps:
          - Tax positions by entity/jurisdiction, accounting policies, revenue-recognition memos and financing terms.
        follow_up_questions:
          - Provide financing history with percentages, preferences, current basis, tax positions and revenue-recognition policy memos.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-019
          - EC-020
  - chapter_id: II
    title: Products
    chapter_summary: Remote publicly presents a broad global HR platform spanning EOR, payroll, contractor management, HRIS/Core HR, API/Embedded, integrations and MCP/AI connectivity. Product breadth is credible publicly; adoption, margins, roadmap delivery and control effectiveness require private verification.
    founder_claim_ids:
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-022
    risk_ids:
      - R-003
      - R-005
      - R-007
      - R-010
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Remote’s public product suite targets global hiring, payroll, contractors, HR records, embedded partners and AI-enabled access to workforce data. Public pricing is visible for several SKUs, while product-level market share, profitability and roadmap timing are not.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Remote’s SKU breadth is publicly verifiable across employment, payroll, contractor, HRIS, API/integrations and MCP offerings.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-010
          - finding_id: II.A-F2
            finding: Remote’s list pricing is transparent and directly comparable to Deel/Oyster in several categories.
            evidence_claim_ids:
              - EC-006
              - EC-016
              - EC-017
            risk_ids:
              - R-005
        hidden_risks:
          - Product breadth can increase execution and compliance burden if attach rates or margins are weak.
        evidence_gaps:
          - Product-level ARR, active seats, gross margin, attach rate, roadmap dates, quality/SLOs and market share.
        follow_up_questions:
          - Provide SKU-level revenue, usage, margin, product roadmap, uptime/support KPIs and win/loss against Deel/Oyster/Rippling/Papaya.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
          - F-004
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-007
          - EC-016
          - EC-017
          - EC-018
          - EC-022
  - chapter_id: III
    title: Customer Information
    chapter_summary: Remote has public customer and partner evidence, including named logos, case studies and platform partners. However, the checklist’s top-customer revenue, concentration, churn, NRR, supplier spend and severed-relationship data are not publicly available.
