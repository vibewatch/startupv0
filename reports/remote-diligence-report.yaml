    chapter_summary: Remote operates in a crowded global HR/EOR/payroll market against Deel, Oyster, Rippling, Papaya and others. Public evidence supports differentiation around owned entities, pricing, platform/API and customer evidence, but realized win/loss and margin durability are unknown.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-006
      - EC-016
      - EC-017
      - EC-018
    risk_ids:
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Competitors overlap Remote across EOR, payroll, contractor management, HRIS and payments. Competition is based on price, country coverage, compliance quality, platform breadth, integrations, speed and service.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Deel and Oyster have public list pricing that overlaps Remote’s EOR and contractor products.
            evidence_claim_ids:
              - EC-006
              - EC-016
              - EC-017
            risk_ids:
