report_metadata:
  report_title: Remote Startup Diligence Report
  target_company: Remote
  website: https://remote.com/
  known_aliases:
    - Remote Europe Holding B.V.
    - Remote Technology Services, Inc.
    - Remote Technology, Inc.
    - Remote Technology Services
  sector: Global HR, employer of record, payroll, contractor management, employment infrastructure
  geography: Netherlands / Amsterdam and United States / San Francisco; globally distributed operations
  company_stage: Private unicorn / late-stage global employment infrastructure company
  research_date: 2026-05-21
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public internet research only; prioritized company-owned primary sources for product, pricing, customer, legal/privacy/security and financing statements.
    - Used CB Insights as a third-party unicorn valuation/status screen and CourtListener as a legal-record screening source.
    - Treated company-authored claims as verified only for existence of the public statement unless independent or documentary support was available.
    - Marked private financials, cap table, contracts, customer concentration, churn/NRR, legal/regulatory artifacts and security reports as not_publicly_verifiable.
  included_jurisdictions:
    - Netherlands
    - United States
    - Global employment/payroll/payment/privacy jurisdictions referenced by public materials
  excluded_topics:
    - Private financial statements, cap table, customer contracts, supplier agreements, board materials, SOC/security reports, regulatory correspondence, HRIS data and full legal dockets were not available.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Remote standard diligence report
      type: workflow_request
      date_received: 2026-05-21
      notes: No pitch deck, financial model, data room, founder answers or customer references were provided.
