            evidence_claim_ids:
              - EC-008
              - EC-009
            risk_ids:
              - R-004
        hidden_risks:
          - Public customer stories may overrepresent successful deployments.
        evidence_gaps:
          - Top 15 customers for each of the past two fiscal years and YTD, by application, ARR and purchase timing.
        follow_up_questions:
          - Provide customer roster, product adoption by account, ARR by top accounts and reference-call list.
        table_ids:
          - T-006
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-004
          - EC-008
          - EC-009
          - EC-025
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Remote publicly cites strategic platform relationships with Workday, BambooHR and Personio and advertises API/embedded/integration motions, but partner revenue, terms and obligations are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Strategic partner distribution appears central to Remote’s platform strategy.
            evidence_claim_ids:
              - EC-005
              - EC-007
            risk_ids:
              - R-010
        hidden_risks:
          - Partner concentration or channel conflict could be hidden without contract economics.
        evidence_gaps:
          - Partner contracts, revenue contribution, marketing commitments, data-sharing terms, support obligations and termination rights.
        follow_up_questions:
          - Provide strategic partner agreements and partner-sourced ARR/pipeline reports.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-007
          - EC-021
