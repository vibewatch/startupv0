        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Public logos and case studies do not answer revenue concentration or NRR questions.
            evidence_claim_ids:
              - EC-025
            risk_ids:
              - R-004
        hidden_risks:
          - Concentration could exist despite broad logo claims.
        evidence_gaps:
          - Customer-level revenue, 5%+ customer identification, churn, NRR and renewal calendar.
