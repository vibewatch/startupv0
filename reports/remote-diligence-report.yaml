risk_register:
  - risk_id: R-001
    risk_title: Public financial-quality evidence is incomplete
    risk_category: financial
    severity: high
    likelihood: medium
    description: Remote publicly claims US$300M ARR and cash-flow positivity, but audited financials, gross margin, cohort retention, cash, debt, AR aging and backlog were not available.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited financials, monthly management accounts, ARR waterfall, gross-margin by SKU, cash/debt and board plan.
  - risk_id: R-002
    risk_title: Valuation and preference-stack risk
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Public financing announcements support a near-US$3B valuation but do not disclose current valuation support, preference stack, ownership, option pool, warrants or debt.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review cap table, financing documents, investor rights, debt instruments and 409A/fair-value support.
  - risk_id: R-003
    risk_title: Multi-jurisdiction employment/payroll regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Remote’s EOR/payroll/contractor model spans employment, tax, benefits, immigration, worker classification and regulated-payment obligations across many countries.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Have counsel review licenses, entity registry, local counsel memos, compliance audits, regulatory correspondence and incident logs.
  - risk_id: R-004
    risk_title: Customer concentration, churn and NRR are unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Remote publishes logos and case studies but not top customer revenue, concentration, churn, NRR, pipeline or severed relationships.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request top-account ARR, cohorts, churn/NRR, renewal calendar, CRM pipeline and independent customer references.
  - risk_id: R-005
    risk_title: Price compression in global HR/EOR/payroll
    risk_category: market
    severity: high
    likelihood: medium
    description: Competitors including Deel, Oyster, Rippling and Papaya overlap with Remote across EOR, payroll, contractor and HRIS workflows with transparent or partially visible pricing.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Benchmark realized ASP, discounts, win/loss, gross margin by SKU and switching costs against direct competitors.
