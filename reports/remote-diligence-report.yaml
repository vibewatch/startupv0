        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-025
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public source disclosed significant customer, partner or supplier relationships severed within the last two years.
