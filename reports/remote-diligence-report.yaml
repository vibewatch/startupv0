    risk_category: operational
    severity: medium
    likelihood: medium
    description: Privacy, terms and integrations materials identify dependencies such as AWS/subprocessors, Nium and external HR/accounting integrations.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.F
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Review vendor contracts, SLAs, SOC reports, subprocessor list, payment-provider agreements, incident history and business-continuity testing.
