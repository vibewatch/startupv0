diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and KPI pack.
    why_it_matters: Verify revenue, margin, burn, cash, debt and profitability.
    suggested_source_or_request: Finance data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, financing documents and debt agreements.
    why_it_matters: Determine valuation, dilution, control rights and covenants.
    suggested_source_or_request: Corporate/financing data room.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer concentration, churn, NRR and top contracts.
    why_it_matters: Public customer counts do not prove revenue quality.
    suggested_source_or_request: Customer cohort export and contract schedule.
    priority: high
  - gap_id: G-004
    chapter_id: I
    section_id: I.A
    missing_information: Credit losses, underwriting model and facility eligibility.
    why_it_matters: Credit losses can erase card/bill-pay economics.
    suggested_source_or_request: Credit-risk dashboard and lender covenant package.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Licenses, regulator correspondence and SOFOM registry confirmation.
    why_it_matters: Regulatory non-compliance can halt products or trigger fines.
    suggested_source_or_request: External counsel memo and regulator checks.
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Mastercard, banking, lender, customer and vendor contracts.
    why_it_matters: Termination rights, exclusivity, SLAs and covenants matter.
    suggested_source_or_request: Material contract schedule.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.A
    missing_information: SOC 2, PCI, ISO reports, incident history and privacy maps.
    why_it_matters: Payment and employee/vendor data creates high-impact risk.
    suggested_source_or_request: Security data room under NDA.
    priority: high
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment and marketing ROI.
    why_it_matters: Growth quality cannot be assessed publicly.
    suggested_source_or_request: GTM dashboard.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Org chart, headcount, hiring plan, turnover and compensation/equity plans.
    why_it_matters: Determines execution capacity and retention/dilution risk.
    suggested_source_or_request: HRIS export and comp plans.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Official legal docket, IP portfolio and insurance schedules.
    why_it_matters: Public searches did not clear legal/IP/insurance liabilities.
    suggested_source_or_request: Counsel-led legal/IP searches and broker materials.
    priority: high
  - gap_id: G-011
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, competitor pricing and market share.
    why_it_matters: Differentiation is not proven by public product breadth.
    suggested_source_or_request: Customer calls and sales win/loss analysis.
    priority: medium
  - gap_id: G-012
    chapter_id: II
    section_id: II.A
    missing_information: Product uptime, roadmap, support, fraud metrics and attach rates.
    why_it_matters: Broad product claims need adoption and reliability proof.
    suggested_source_or_request: Product analytics and incident logs.
    priority: medium
