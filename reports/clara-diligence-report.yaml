executive_summary:
  overall_assessment: Clara appears to be an active LatAm spend-management fintech unicorn with strong public evidence of product breadth, funding access, named capital partners and 2023 scale metrics. However, this is a confirmatory-diligence case because financial statements, unit economics, credit losses, customer concentration, cap table/current valuation, regulatory records, material contracts and security reports are private.
  investment_or_diligence_thesis: A credible thesis is that Clara can become core spend, card and payment infrastructure for Latin American finance teams if it converts public traction into durable, well-underwritten, compliant and profitable multi-product relationships. The thesis fails without proof of revenue quality, credit-risk management, regulatory compliance, product reliability, customer retention and financing terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: December 2021 US$1B threshold is supported by the candidate list and Clara Series B/unicorn release.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-002
      summary: Clara publicly markets a broad spend-management suite spanning cards, vendor payments, expense management, AI controls and pricing tiers.
      evidence_claim_ids:
        - EC-002
        - EC-007
        - EC-008
        - EC-015
    - founder_claim_id: FC-004
      summary: Public sources show repeated access to equity and credit/debt capital, including 2023, 2025 and IFC facility announcements.
      evidence_claim_ids:
        - EC-005
        - EC-011
        - EC-014
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, unit economics and credit losses are not public.
    - risk_id: R-003
      summary: Card/bill-pay financing creates credit, liquidity and facility-dependency risk.
    - risk_id: R-004
      summary: Multi-country fintech/SOFOM/card-program regulatory scope requires counsel review.
  key_evidence_gaps:
    - Audited financials, revenue by product/country, gross margin, cash, burn, credit losses and monthly KPI pack.
    - Cap table, financing terms, liquidation preferences, debt covenants, current valuation and draw/availability status.
    - Top-customer revenue/spend, retention cohorts, churn/NRR, credit performance, contracts and independent references.
    - Country-by-country licensing/entity map, SOFOM/regulatory records, Mastercard/program agreements and regulator correspondence.
    - SOC 2, PCI, ISO reports, privacy/data maps, incident history, insurance schedules, IP assignments and official legal/IP searches.
  recommended_next_steps:
    - Run financial/credit diligence before relying on volume, funding or valuation headlines.
    - Commission legal/regulatory diligence in Mexico, Brazil and Colombia.
    - Obtain customer cohorts, top-customer contracts and independent references.
    - Review security/compliance artifacts under NDA and test privacy/fraud/vendor controls.
    - Benchmark against Mendel, Jeeves, Tribal and incumbents using win/loss, pricing and customer evidence.
