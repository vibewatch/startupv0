report_metadata:
  report_title: Clara Startup Diligence Report
  target_company: Clara
  website: https://www.clara.com/
  known_aliases:
    - Clara
    - Clara Technologies
    - Clara (company)
    - CF Tech, S.A. de C.V.
  sector: LatAm spend management, corporate cards, bill payments and fintech credit infrastructure
  geography: Mexico, Brazil, Colombia and Latin America
  company_stage: Private unicorn / growth-stage LatAm fintech
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; MXN where pricing is quoted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used startup-diligence-research workflow at standard depth for public-source diligence.
    - Focused on company pages, financing announcements, independent press, trust/security pages and competitor coverage.
    - Treated company-controlled claims as verified only for the existence of public statements unless independently corroborated.
    - Used user-provided unicorn candidate-list fact and cross-checked the US$1B threshold against Clara’s 2021 release.
    - No private data room, management interview, paid legal database, security report under NDA or customer call was available.
  included_jurisdictions:
    - Mexico
    - Brazil
    - Colombia
    - Latin America
    - United States where relevant to press/investor sources
  excluded_topics:
    - Private financial statements, cap table, financing/debt documents and board materials.
    - Non-public customer contracts, cohort data, legal docket services, regulator correspondence and security reports under NDA.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request to generate Clara diligence report
      type: workflow_request
      date_received: 2026-05-20
      notes: "User specified Clara as a LatAm spend-management/fintech unicorn and supplied candidate-list valuation facts: “1+”, December 2021, fintech, Mexico."
