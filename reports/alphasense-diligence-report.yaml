executive_summary:
  overall_assessment: Public sources verify a $650M financing at a $4B valuation, the Tegus acquisition, $200M+ ARR milestone, 4,000+ enterprise customers, majority S&P 500 adoption, named customer cases, leadership roster, and security controls; they do not verify current retention, margins, integration economics, content-license liabilities, or cap-table terms.
  investment_or_diligence_thesis: AlphaSense diligence turns on whether the company can sustain AI-driven market-intelligence growth and integrate Tegus/Sentieo/BamSEC/Canalyst while defending content licensing, enterprise security, and workflow depth against incumbents and horizontal AI search.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: AlphaSense appears on a public unicorn list at a latest known valuation of $4B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: AlphaSense is eligible for private unicorn diligence because reviewed public sources show active operations and no IPO, acquisition of the company, or shutdown.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-003
      summary: AlphaSense has an active public product or operating model in AI market intelligence, enterprise search, financial data, and expert research.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Tegus and multi-acquisition integration complexity
    - risk_id: R-002
      summary: Content licensing and data-rights exposure
    - risk_id: R-003
      summary: AI accuracy, hallucination, and enterprise security risk
  key_evidence_gaps:
    - Audited annual and quarterly financial statements, cash, debt, burn, revenue by product/channel/geography, gross margin, AR aging, and backlog.
    - Fully diluted cap table, preference stack, option pool, SAFEs/notes/warrants, investor rights, and secondary transactions.
    - Top-customer revenue, churn, NRR, cohort expansion, contract terms, and customer references.
    - Product-level P&L, pricing/discounting, roadmap, uptime, incidents, and dependency map.
    - Litigation, regulatory, IP, privacy/security, insurance, and material-contract schedules.
  recommended_next_steps:
    - Reconcile public valuation to primary financing documents, current cap table, 409A/secondary transactions, cash, debt, and forecast support.
    - Request customer cohort, concentration, churn, NRR, reference, pipeline, and contract data before underwriting revenue durability.
    - Run focused product, technology, security/privacy, IP, regulatory, and material-contract diligence tied to the risks in this report.
    - Interview leadership and functional owners for finance, product, sales, security, legal, and people operations.
