report_metadata:
  report_title: AlphaSense Startup Diligence Report
  target_company: AlphaSense
  website: https://www.alpha-sense.com/
  known_aliases:
    - AlphaSense Inc.
    - AlphaSense
  sector: AI market intelligence, enterprise search, financial data, and expert research
  geography: United States / New York / global
  company_stage: Private late-stage unicorn
  research_date: 2026-06-04
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source diligence using CB Insights unicorn-list evidence, company-owned pages, funding announcements, customer/partner releases, security/privacy/product pages, search-result discovery, and independent public coverage where accessible.
    - No private data room, management interview, audited financial statement, cap table, customer reference call, counsel letter, security report, or employee file was available.
    - Company-published operating metrics are treated as public management claims, not audited results.
  included_jurisdictions:
    - United States / New York / global
    - United States and other jurisdictions only where public sources identified activity
  excluded_topics:
    - Non-public financial statements, management accounts, tax workpapers, cash balances, debt, and revenue-recognition memos
    - Private customer contracts, churn cohorts, pipeline, pricing concessions, and reference-call evidence
    - Private cap table, option grants, employee liquidity, board minutes, and material contracts
  user_provided_materials:
    - material_id: UPM-001
      title: Selected unicorn-list seed evidence for AlphaSense
      type: workflow_request
      date_received: 2026-06-04
      notes: CB Insights listed AlphaSense at a $4B valuation, date joined 6/15/2022, United States, New York, Enterprise Tech, with Viking Global Investors, GS Growth, and BlackRock as selected investors.
