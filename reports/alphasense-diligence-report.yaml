diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited annual and quarterly financial statements, cash, debt, burn, revenue by product/channel/geography, gross margin, AR aging, and backlog.
    why_it_matters: Required to verify quality of revenue, liquidity, runway, and valuation support.
    suggested_source_or_request: Company CFO / accountant data room
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preference stack, option pool, SAFEs/notes/warrants, investor rights, and secondary transactions.
    why_it_matters: Public valuation cannot be translated into security value without ownership and preference terms.
    suggested_source_or_request: Company counsel and finance team
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue, churn, NRR, cohort expansion, contract terms, and customer references.
    why_it_matters: Customer concentration and durability are not publicly verifiable.
    suggested_source_or_request: Company revenue operations and customer references
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product-level P&L, pricing/discounting, roadmap, uptime, incidents, and dependency map.
    why_it_matters: Needed to underwrite product maturity, margins, and execution risk.
    suggested_source_or_request: Product, engineering, and security teams
    priority: medium
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Litigation, regulatory, IP, privacy/security, insurance, and material-contract schedules.
    why_it_matters: Legal and compliance exposure cannot be cleared from public sources alone.
    suggested_source_or_request: Company counsel
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS headcount by function/location, attrition, hiring plan, compensation, equity grants, and employee relations records.
    why_it_matters: Rapid scaling or leadership changes can impair execution and create hidden liabilities.
    suggested_source_or_request: People team
    priority: medium
