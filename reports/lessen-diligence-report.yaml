diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited historical financials and monthly management accounts
    why_it_matters: Needed to verify revenue quality, gross margin, cash burn and working-capital risk.
    suggested_source_or_request: Company CFO / accountant data room
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preference stack, option pool and debt schedule
    why_it_matters: Needed to reconcile public valuation with investor economics and common-share value.
    suggested_source_or_request: Company counsel / finance team
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top customers, contract terms, churn and NRR/cohort data
    why_it_matters: Needed to evaluate concentration, repeatability and reference quality.
    suggested_source_or_request: Company revenue operations / customer references
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Supplier, vendor and infrastructure contracts
    why_it_matters: Needed to evaluate dependency, pricing, SLA and continuity risk.
    suggested_source_or_request: Operations and procurement team
    priority: medium
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Legal, regulatory, insurance and IP schedules
    why_it_matters: Needed to verify litigation, compliance, ownership and material exposures.
    suggested_source_or_request: Company counsel / insurance broker
    priority: high
