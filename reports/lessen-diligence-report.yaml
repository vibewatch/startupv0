executive_summary:
  overall_assessment: Public sources support Lessen as an active private unicorn in property services/proptech, with verified 2021 unicorn financing and active 2025 commercial hiring, while critical operating and financing details remain private.
  investment_or_diligence_thesis: Lessen has credible unicorn and product evidence, but diligence should prioritize debt structure, services gross margin, vendor-network controls, customer concentration and insurance/safety exposure before relying on the $1B+ valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Lessen was selected from a current public CB Insights unicorn-list row after excluding existing report slugs.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Public financing/valuation evidence supports a $1B+ diligence screen.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-002
      summary: Public sources support at least product/category-level operating activity.
      evidence_claim_ids:
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Debt and financing-structure complexity
    - risk_id: R-002
      summary: Services gross-margin and vendor-network execution risk
    - risk_id: R-003
      summary: Customer concentration and cyclicality
  key_evidence_gaps:
    - Audited financial statements, monthly KPI pack and revenue by product/channel/geography.
    - Current cap table, liquidation preferences, options/warrants, debt instruments and runway.
    - Top customers, churn/retention, supplier/partner contracts and management org chart.
    - Legal/regulatory docket, insurance, IP ownership and compliance evidence.
  recommended_next_steps:
    - Open a data-room request list focused on financial quality, customer concentration, financing structure and legal/regulatory exposure.
    - Schedule management diligence on current valuation support, growth drivers, current runway and public-evidence gaps.
    - Run customer/supplier reference calls and counsel-led legal/entity verification before relying on headline unicorn status.
