report_metadata:
  report_title: Lessen Startup Diligence Report
  target_company: Lessen
  website: https://www.lessen.com/
  known_aliases:
    - Project Ponos
    - Lessen SMS
  sector: Property services, facilities management, proptech and real-estate operations software/services
  geography: United States / Scottsdale, Arizona
  company_stage: Private unicorn / debt-financed active proptech services company
  research_date: 2026-06-02
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and excluded matching slugs.
    - Fetched the current CB Insights unicorn list and parsed candidate rows with company, slug, valuation, geography, industry and source URL.
    - Randomly selected candidates with shuf; replaced Zhipu AI and Celestial AI after public CB Insights profiles indicated IPO/acquisition status.
    - Used public company pages, CB Insights public profiles/list rows, PR/news releases, commercial profiles and public search pages; no private data room or management interview was available.
    - Treated company-authored and market-database content as evidence for the existence of public claims, not as audited proof of operating performance.
  included_jurisdictions:
    - United States
    - Scottsdale, Arizona
  excluded_topics:
    - Private financial statements, cap table, investor rights, board materials, customer contracts, supplier contracts, legal dockets beyond public search, security reports, HRIS exports and tax records were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-02
      notes: Selected public unicorn-list row for Lessen; no pitch deck, data room, founder response or customer references were provided.
