limitations:
  - This is a public-source diligence report, not a substitute for audited financial, legal, customer, security, or tax diligence.
  - CB Insights valuation/list data is treated as a reputable public unicorn-status signal but not as an audited valuation or security price.
  - Company-owned sources are useful for product and positioning claims but may be selective or marketing-oriented.
  - No private founder claims, pitch deck, data room, customer references, or management interviews were provided.
  - Company pages remain active and Wikipedia lists company type as private; no IPO, acquisition, or shutdown evidence was identified in the public-source set, but public operating updates are sparse after 2018-2021.
