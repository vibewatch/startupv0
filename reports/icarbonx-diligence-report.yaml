executive_summary:
  overall_assessment: iCarbonX is eligible for this run as an uncovered private unicorn based on CB Insights and active public-source evidence, but public diligence is gap-heavy because financial, customer, legal, and personnel records are private.
  investment_or_diligence_thesis: The diligence case depends on whether iCarbonX can convert public product/market credibility in Multi-omics AI, precision health, biomarker discovery, and clinical diagnostics support into durable revenue, defensible economics, and compliant operations at or above the $1B public valuation signal.
  strongest_verified_claims:
    - CB Insights lists iCarbonX as a private unicorn valued at $1B, with a 2016-04-12 unicorn date, Shenzhen location, healthcare industry classification, and named select investors Tencent and Vcanbio.
    - iCarbonX says it was founded in 2015 by Jun Wang to create a future where people can drive health and defeat disease with advanced data and AI.
    - Company-owned investor disclosures list Tencent, VCANBIO Life Sciences, and UEC Group as investors/partners supporting the company.
    - iCarbonX says its Digital Life Platform integrates genomics, proteomics, metabolomics, microbiome, and phenotypical profiling and shifted focus in 2019 toward innovative biomarker discoveries for translational work.
  biggest_risks:
    - Stale valuation and thin recent commercial evidence
    - Health/genomics data and diagnostics regulatory exposure
    - Clinical validation and proprietary dataset defensibility gaps
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, revenue bridge, gross margin, cash runway, debt, tax, and AR aging are not public.
    - Fully diluted cap table, liquidation preferences, investor rights, options, warrants, and notes are not public.
    - Named customers, contract values, churn, NRR/GRR, revenue concentration, and referenceability require private schedules.
    - Current headcount, org chart, turnover, compensation, and incentive-equity details are not sufficiently public.
    - Legal, regulatory, IP, privacy, security, insurance, and material-contract schedules need counsel and management confirmation.
  recommended_next_steps:
    - Provide audited financial statements, monthly financial model, ARR/GMV/revenue bridge, gross margin, cash runway, debt, and tax schedules.
    - Provide cap table, financing documents, investor rights, option/warrant/note schedules, litigation schedule, regulatory correspondence, material contracts, and IP assignment records.
    - Provide top customers, contract terms, churn, renewal rates, pipeline, sales productivity, customer references, and partner/supplier concentration.
    - Provide current org chart, headcount by function/location, compensation philosophy, incentive plans, turnover, employee-relations matters, and key-person retention plans.
    - Provide product roadmap, architecture, security audits, privacy assessments, compliance policies, incident history, and product-level P&L.
