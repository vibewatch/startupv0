      - FC-001
      - FC-003
      - FC-006
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-034
      - EC-002
      - EC-001
    risk_ids:
      - R-001
      - R-003
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public evidence provides headline ARR, run-rate and claims-volume signals, but not audited statements, AR aging, backlog or product/geography gross-profit schedules.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
