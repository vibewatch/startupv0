report_metadata:
  report_title: Commure Startup Diligence Report
  target_company: Commure
  website: https://www.commure.com/
  known_aliases:
    - Commure, Inc.
    - Commure + Athelas
  sector: Healthcare & Life Sciences / healthcare software infrastructure
  geography: United States; enterprise-provider deployments centered in the U.S.
  company_stage: Private unicorn / late-stage growth company
  research_date: 2026-06-14
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Read the diligence schema, template and checklist locally before research and mapped findings to Chapters I-VIII.
    - Used public web evidence only, relying heavily on Commure-owned product, customer, legal and trust pages plus select independent news, court records, CB Insights and public trademark search results.
    - Treated company-controlled metrics as evidence that the claim is public, not as independent proof of operating performance or compliance quality.
    - Marked private-data items such as audited financials, cap table, customer concentration, insurance and full contract schedules as not_publicly_verifiable rather than speculating.
  included_jurisdictions:
    - United States
    - United States public web sources
    - Global competitor and partner pages where relevant to Commure comparisons
  excluded_topics:
    - No private data room, management interview, customer call, paid database export, full docket search or non-public security report was available in this run.
  user_provided_materials:
    - material_id: UPM-001
      title: User-supplied target metadata and valuation anchor
      type: user_prompt
      date_received: 2026-06-14
      notes: Prompt specified Commure, website, sector, country and CB Insights March 2026 unicorn-list valuation anchor of $6.0B.
