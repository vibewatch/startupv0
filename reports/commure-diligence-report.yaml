risk_register:
  - risk_id: R-001
    risk_title: Financial quality and valuation support remain opaque
    risk_category: financial
    severity: high
    likelihood: high
    description: Commure’s public record contains compelling headline growth and valuation signals, but not audited statements, cohort retention, margin detail, cash burn or the detailed terms needed to underwrite a private-company valuation.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-034
    mitigation_or_diligence_request: Request audited financials, KPI pack, board valuation support, cash/debt schedule and customer-cohort detail before relying on public scale metrics.
  - risk_id: R-002
    risk_title: Strongline legal and IP exposure
    risk_category: legal
    severity: critical
    likelihood: medium
    description: The Canopy dispute already produced an injunction affecting Strongline Pro activity and publicly exposed uncertainty over technology rights and customer-support control in a staff-safety product line.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.D
      - VIII.A
      - VIII.B
      - VIII.C
      - VIII.D
      - VIII.F
    evidence_claim_ids:
      - EC-026
      - EC-027
      - EC-028
      - EC-040
    mitigation_or_diligence_request: Have counsel review every Strongline agreement, court filing, customer notice and any settlement / transition documentation before underwriting the business line.
  - risk_id: R-003
    risk_title: Sponsor concentration and financing-structure complexity
    risk_category: financing
    severity: medium
    likelihood: medium
    description: General Catalyst appears repeatedly as investor, financier and strategic backer, while the CVF structure uses a non-standard repayment mechanism tied to customer cohorts.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
    mitigation_or_diligence_request: Request the signed financing documents, board rights, payback mechanics, covenants and any preferred-security waterfall analysis.
  - risk_id: R-004
    risk_title: Platform breadth and post-acquisition integration complexity
    risk_category: operational
    severity: high
    likelihood: medium
    description: Commure’s public product span is unusually broad and the company said it completed four acquisitions while scaling rapidly, increasing the odds of uneven product quality, roadmap slippage or integration debt.
    impacted_chapter_ids:
      - II
      - VI
      - VII
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
      - VII.B
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-009
      - EC-010
      - EC-019
      - EC-022
    mitigation_or_diligence_request: Request architecture review, incident/change management data, roadmap dependencies, product-line P&Ls and post-acquisition integration scorecards.
  - risk_id: R-005
    risk_title: Enterprise-customer concentration and long sales cycles
    risk_category: customer
    severity: high
    likelihood: medium
    description: Commure’s public traction centers on large provider systems and multi-stakeholder pilots, which can produce concentrated ARR, heavy implementation cost and elongated conversion / renewal cycles.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - III.B
      - III.C
      - V.A
      - V.B
      - V.C
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-005
      - EC-011
      - EC-012
      - EC-013
      - EC-014
      - EC-015
      - EC-035
      - EC-036
    mitigation_or_diligence_request: Request top-account ARR concentration, pilot-to-rollout conversion, implementation margin, renewal performance and source-of-pipeline data.
  - risk_id: R-006
    risk_title: Compliance-assurance gap
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Commure’s privacy, security and HIPAA posture is visible publicly, but the strongest evidence available is still mostly vendor-controlled copy and a public template BAA rather than third-party reports or regulator correspondence.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.E
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-023
      - EC-024
      - EC-025
      - EC-038
      - EC-039
    mitigation_or_diligence_request: Obtain SOC 2 report, pen-test reports, HIPAA risk assessments, incident history, cyber-insurance schedule and counsel review of any regulator matters.
  - risk_id: R-007
    risk_title: Workforce integration and retention risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: A company claiming 3,000+ global employees after four acquisitions with only sparse public headcount, attrition and hiring-plan visibility deserves extra retention and org-design scrutiny.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.F
      - VII.G
    evidence_claim_ids:
      - EC-019
      - EC-020
      - EC-037
      - EC-042
    mitigation_or_diligence_request: Request HRIS extracts, attrition data, engagement surveys, compensation plans, refresh-grant schedules and integration plans by acquired entity.
  - risk_id: R-008
    risk_title: Competition from specialists and incumbents
    risk_category: market
    severity: high
    likelihood: high
    description: Commure is competing simultaneously with ambient AI specialists like Abridge and Suki, AI-RCM vendors like AKASA, and incumbents like R1, which can pressure win rates and pricing.
    impacted_chapter_ids:
      - III
      - IV
      - V
    impacted_section_ids:
      - III.A
      - IV.A
      - V.A
      - V.B
      - V.C
    evidence_claim_ids:
      - EC-012
      - EC-015
      - EC-030
      - EC-031
      - EC-032
      - EC-033
    mitigation_or_diligence_request: Run win/loss analysis, product bake-offs and independent customer references by product line and buyer type.
  - risk_id: R-009
    risk_title: External dependency on EHR, cloud and model partners
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Commure’s value proposition depends heavily on EHR embedding, channel access and frontier-model availability, creating technical, certification and commercial dependency on third parties.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - III.B
      - III.E
      - V.A
      - V.C
      - VIII.G
    evidence_claim_ids:
      - EC-016
      - EC-017
      - EC-018
      - EC-023
      - EC-041
    mitigation_or_diligence_request: Request integration SLA terms, vendor concentration by spend, outage history, certification obligations and the cloud / model-provider architecture map.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, AR aging, backlog and product/channel/geography gross-profit schedules.
    why_it_matters: Without them, headline ARR and claims-volume metrics cannot be turned into conviction on revenue quality or cash efficiency.
    suggested_source_or_request: Company CFO / finance data room; auditor package; monthly management accounts.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, debt schedule, option / warrant register and CVF repayment mechanics.
    why_it_matters: Ownership economics and downside protection are impossible to underwrite from public sources alone.
    suggested_source_or_request: Company finance team, board materials, financing counsel.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.B
    missing_information: Three-year forecast model, scenario assumptions, working-capital plan and runway analysis.
    why_it_matters: The public record shows growth ambition but not planning quality or downside resilience.
    suggested_source_or_request: Company finance team and board-approved planning deck.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue concentration, churn / NRR by cohort and payment behavior.
    why_it_matters: Public logo strength can hide concentrated ARR or weak retention dynamics.
    suggested_source_or_request: Company finance and sales ops; top-customer schedule.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top-supplier spend, EHR / cloud / model concentration and termination rights.
    why_it_matters: Commure’s partner-heavy model creates real dependency risk that is not quantifiable from public sources.
    suggested_source_or_request: Procurement ledger, vendor contracts, cloud and model spend reports.
    priority: high
  - gap_id: G-006
    chapter_id: II
    section_id: II.A
    missing_information: Module-level pricing, attach rates, deployment counts and product-line gross margin.
    why_it_matters: A broad product story only matters if packaging, attach and margin are durable.
    suggested_source_or_request: Product finance pack, price book, implementation statements of work.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap dates, development cost, quality metrics and go/no-go criteria by major product initiative.
    why_it_matters: Pipeline credibility is central to a platform valuation but cannot be inferred from blogs alone.
    suggested_source_or_request: Product / engineering roadmap review and release metrics.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.D
    missing_information: Executive employment agreements, incentive plans, refresh-grant policy and benefits structure.
    why_it_matters: Retention and alignment risk is material after rapid growth and acquisitions.
    suggested_source_or_request: HR / legal data room and compensation committee materials.
    priority: high
  - gap_id: G-009
    chapter_id: VII
