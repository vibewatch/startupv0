        table_ids: []
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-004
          - EC-034
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify selected investors and a merged operating structure, but not the actual cap table, debt schedule or option overhang.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C-F1
