          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers and a run-rate target are public, but no full forecast model, scenario set or capital plan was accessible.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: The public record contains growth-driver narrative and one run-rate target, not a finance-grade projection package.
            evidence_claim_ids:
              - EC-002
              - EC-004
              - EC-034
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - "R-003: CVF-style financing can alter growth economics even if top-line forecasts appear strong."
        evidence_gaps:
          - Quarterly forecast, capex plan, working-capital assumptions, FX risk and financing-arrangement assumptions were not public.
        follow_up_questions:
