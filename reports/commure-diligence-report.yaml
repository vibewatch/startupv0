          - I.D.2
          - I.D.3
        summary: Commure’s financing history is the richest public financial topic; tax positions, accounting policies and detailed financing mechanics remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
