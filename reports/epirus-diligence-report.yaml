report_metadata:
  report_title: Epirus Public Startup Diligence Research Report
  target_company: Epirus
  website: https://www.epirusinc.com/
  known_aliases:
    - Epirus, Inc.
    - Epirus Inc
    - Leonidas
    - Stryker Leonidas
    - Leonidas Autonomous Robotic
    - Leonidas AR
    - IFPC-HPM
  sector: Industrials; defense technology; directed energy; counter-UAS
  geography: United States; Torrance, California
  company_stage: Private venture-backed unicorn; public tracker valuation $1.35B; defense prototype traction
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility with CB Insights tracker metadata, company sources, public financing releases, SEC exact-name search, and active-website signals.
    - Collected public company, government, partner, independent media, market database, and limited legal/regulatory search evidence.
    - Used public sources only; no private, classified, paywalled, or access-controlled materials were used.
    - Marked financial, customer, legal, IP, supplier, safety, and HR items not_publicly_verifiable where private records are required.
  included_jurisdictions:
    - United States federal public context
    - California/Torrance operating context from public sources
    - U.S. Army/DoD public-contract and testing context
  excluded_topics:
    - Classified program details and controlled technical data
    - Private customer, supplier, employee, counsel, accountant, and investor interviews
    - Paid docket retrieval and access-controlled filings
    - Private personal contact information
  user_provided_materials:
    - material_id: UPM-001
      title: Random CB Insights current unicorn tracker candidate selection for Epirus
      type: user_provided_source_summary
      date_received: 2026-05-23
      notes: User supplied target slug and CB Insights tracker metadata for Epirus.
