executive_summary:
  overall_assessment: "Epirus appears eligible for public unicorn diligence as an active private U.S. company: CB Insights lists it at $1.35B, company/partner/government sources show current operations and defense activity, and no credible public IPO, acquisition, or shutdown signal was found in reviewed public sources. The strongest proof points are the 2022 $200M Series C, $66.1M Army RCCTO prototype award, GDLS integrations, and Leonidas demonstrations. The main diligence constraint is that revenue quality, backlog, production economics, cap table, controlled performance, safety, and legal/export exposure remain non-public."
  investment_or_diligence_thesis: The upside thesis is a timely high-power microwave counter-swarm capability in a market pulled by drone proliferation and Army urgency. The underwriting constraint is that public sources do not prove recurring production procurement, production-scale margins, durable IP, or independently validated performance in operational conditions.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Epirus as a $1.35B Torrance Industrials unicorn with 2022 date joined and named investors.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Epirus and Business Wire verify a $200M Series C, $287M total raised, and $1.35B valuation in 2022.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Public sources support a $66.1M Army RCCTO prototype award and Army IFPC-HPM testing, though contract details remain private.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
    - founder_claim_id: FC-003
      summary: Company and independent sources support the existence and technical substance of Leonidas HPM product work.
      evidence_claim_ids:
        - EC-004
        - EC-024
  biggest_risks:
    - risk_id: R-006
      summary: "Financial opacity and stale valuation: current revenue, cash, debt, backlog, margins, and cap table are not public."
    - risk_id: R-001
      summary: "Defense procurement concentration: public hard traction is dominated by Army/DoD and GDLS-related channels."
    - risk_id: R-002
      summary: "Controlled/non-public performance data: decisive technical, safety, and operational test evidence is not public."
    - risk_id: R-004
      summary: "Manufacturing scale: specialized HPM/GaN arrays and vehicle integration may bottleneck production and margins."
  key_evidence_gaps:
    - Audited financials, revenue, backlog, cash/burn/runway, debt, and cap table.
    - Executed Army OTA and GDLS contracts, options, acceptance criteria, margins, and data/government rights.
    - Independent test reports, telemetry, safety approvals, customer feedback, and field reliability.
    - Supplier list, GaN/RF sourcing, production yield, quality, warranty, and inventory.
    - IP docket, export-control classifications, regulatory correspondence, insurance, HR, and litigation schedules.
  recommended_next_steps:
    - Confirm private-company eligibility and corporate status with counsel before relying on tracker metadata.
    - Prioritize financial, customer/backlog, and Army/DoD program-conversion diligence before valuation work.
    - Run independent technical, safety, manufacturing, and export-control diligence under NDA/clearance where required.
    - Conduct reference calls with Army stakeholders, GDLS, suppliers, and technical advisors if permitted.
    - Require full legal/IP/regulatory/insurance/HR data-room schedules before investment or acquisition decision.
