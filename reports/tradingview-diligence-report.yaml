risk_register:
  - risk_id: R-001
    risk: Financial opacity and inability to verify revenue quality
    severity: high
    likelihood: high
    evidence_strength: high
    diligence_priority: critical
    rationale: Public sources verify scale and pricing but do not disclose audited
      financials, ARR, churn, gross margin, cash, burn, debt, or concentration.
    evidence_claim_ids: [EC-001, EC-002, EC-003]
    mitigation_or_next_step: Obtain audited financials, ARR bridge, billing and
      cohort exports, margin by SKU, cash/debt schedule, and budget variance.
  - risk_id: R-002
    risk: Market-data licensing, exchange-fee, and vendor-dependency exposure
    severity: high
    likelihood: medium
    evidence_strength: high
    diligence_priority: high
    rationale: Market data is core to the product and public pages explicitly
      reference delayed data constraints, real-time packages, data providers, and
      usage restrictions.
    evidence_claim_ids: [EC-008, EC-010]
    mitigation_or_next_step: Review data-provider contracts, exchange audits,
      fees, entitlements, vendor concentration, SLAs, and gross-margin impact.
  - risk_id: R-003
    risk: Broker integration and trading workflow regulatory/partner exposure
    severity: high
    likelihood: medium
    evidence_strength: medium
    diligence_priority: high
    rationale: Broker integrations are public and strategically important, but
      contracts, revenue share, execution responsibility, incidents, and regional
      regulatory allocation are not public.
    evidence_claim_ids: [EC-004, EC-010]
    mitigation_or_next_step: Review broker agreements, incident logs, compliance
      matrix, monitoring, indemnities, and partner concentration.
  - risk_id: R-004
    risk: Consumer subscription, refund, and real-time-data paywall friction
    severity: medium
    likelihood: high
    evidence_strength: medium
    diligence_priority: high
    rationale: Public app listings show strong ratings but also evidence of user
      friction around real-time data and paywalls; terms include recurring billing
      and refund mechanics.
    evidence_claim_ids: [EC-006, EC-008, EC-010]
    mitigation_or_next_step: Analyze refunds, chargebacks, support tickets, app
      reviews, paid conversion, exchange-fee messaging, and retention by plan.
  - risk_id: R-005
    risk: Competitive pressure across terminals, analytics, charting, and broker apps
    severity: medium
    likelihood: high
    evidence_strength: medium
    diligence_priority: medium
    rationale: TradingView competes against professional terminals, investment
      analytics platforms, retail charting tools, broker-owned trading apps, and
      finance portals.
    evidence_claim_ids: [EC-011, EC-012]
    mitigation_or_next_step: Obtain win/loss, churn reasons, competitor cohorts,
      pricing elasticity, and independent market-share data.
  - risk_id: R-006
    risk: Cap-table, governance, and leadership opacity
    severity: medium
    likelihood: unknown
    evidence_strength: medium
    diligence_priority: high
    rationale: The 2021 financing is public, but current cap table, investor
      rights, board, management roster, and option plan are not.
    evidence_claim_ids: [EC-002, EC-007]
    mitigation_or_next_step: Request cap table, investor rights, board materials,
      option plan, leadership roster, and succession plan.
  - risk_id: R-007
    risk: Account security, fraud, phishing, and global workforce resilience
    severity: medium
    likelihood: medium
    evidence_strength: medium
    diligence_priority: medium
    rationale: Security page highlights phishing, fake premium, cracked apps,
      impersonation, account hacking, 2FA, and bug-bounty reporting; workforce
      is distributed across multiple countries.
    evidence_claim_ids: [EC-007, EC-009]
    mitigation_or_next_step: Review SOC reports, incident logs, fraud metrics,
      bug bounty history, access controls, business continuity, and security
      staffing.
  - risk_id: R-008
    risk: User-generated script, IP, content, and advice-boundary exposure
    severity: medium
    likelihood: medium
    evidence_strength: medium
    diligence_priority: medium
    rationale: Pine Script and public indicators are differentiated, but terms
      show IP representations, default licensing, and disclaimers that should be
      tested against moderation and takedown operations.
    evidence_claim_ids: [EC-005, EC-010, EC-014, EC-015]
    mitigation_or_next_step: Review script moderation, takedowns, license
      compliance, creator disputes, financial advice controls, and open-source
      software inventory.
diligence_gaps:
  - gap_id: DG-001
    area: Financial statements and revenue quality
    description: Audited financials, ARR, gross margin, churn, retention, cash,
      burn, debt, and customer/channel concentration are not public.
    priority: critical
    related_risk_ids: [R-001]
    requested_evidence:
      - Audited financial statements and management accounts for the last three
        fiscal years and YTD.
      - ARR/revenue bridge by SKU, geography, channel, broker, and data package.
      - Cohort retention, churn, refunds, chargebacks, and support-cost exports.
  - gap_id: DG-002
    area: Capitalization and governance
    description: Public sources do not disclose security terms, ownership,
      preferences, board rights, option pool, debt, or secondary-sale details.
    priority: high
    related_risk_ids: [R-006]
    requested_evidence:
      - Cap table, financing documents, investor rights, option plan, board
        minutes, debt instruments, SAFEs/notes, and warrants.
  - gap_id: DG-003
    area: Data-provider and broker contracts
    description: Market-data and broker relationships are public, but commercial
      contracts and compliance obligations are not.
    priority: high
    related_risk_ids: [R-002, R-003]
    requested_evidence:
      - Exchange/data-provider contracts, broker agreements, revenue-share terms,
        SLAs, audit findings, minimum commitments, and incident allocation matrix.
  - gap_id: DG-004
    area: Customer and GTM analytics
    description: Public reach is strong, but user definitions, conversion, CAC,
      payback, retention, app economics, and enterprise sales productivity are not
      public.
    priority: high
    related_risk_ids: [R-004, R-005]
    requested_evidence:
      - Funnel analytics, traffic sources, paid conversion, app retention, CAC,
        LTV, sales pipeline, win/loss, and brand tracking.
  - gap_id: DG-005
    area: Legal, privacy, security, and IP
    description: Public policies reveal risk surfaces but not actual compliance,
      incident, litigation, regulatory, IP, or insurance history.
    priority: high
    related_risk_ids: [R-002, R-003, R-007, R-008]
    requested_evidence:
      - Litigation schedule, regulator correspondence, SOC/penetration reports,
        incident logs, insurance policies, IP portfolio, open-source inventory,
        script takedowns, and privacy assessments.
follow_up_requests:
