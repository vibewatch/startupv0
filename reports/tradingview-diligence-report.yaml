report_metadata:
  report_title: TradingView Public-Source Startup Diligence Report
  target_company: TradingView
  website: https://www.tradingview.com/
  known_aliases:
    - TradingView Inc.
    - TradingView
    - Pine Script
    - Supercharts
  sector: Financial charting, market data, social investing, broker connectivity,
    and retail/professional trading tools
  geography: United Kingdom-listed unicorn with United States and global operating
    footprint; paying users and usage signals span more than 180 countries
  company_stage: Late-stage private unicorn
  research_date: 2026-05-15
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built covered slugs from reports/*-diligence-report.yaml and selected
      TradingView at random from a current public unicorn list after excluding
      covered companies.
    - Prioritized primary company pages covering product, pricing, brokers,
      market-data coverage, careers, security, privacy, terms, widgets, and Pine
      Script documentation.
    - Used the October 2021 PRNewswire announcement for the financing and
      valuation anchor.
    - Used Apple App Store and Google Play public listings as third-party mobile
      traction signals.
    - Used public competitor pages for a limited competitive benchmark and treated
      inaccessible or private financial information as evidence gaps.
  included_jurisdictions:
    - United Kingdom
    - United States
    - Global consumer and brokerage markets
  excluded_topics:
    - No private financial statements, ARR schedules, cohort-retention exports,
      cap table, board materials, data-provider contracts, broker contracts, or
      customer references were available.
    - No paid database access, PACER downloads, or exhaustive trademark/patent
      registry searches were performed.
    - No interviews were conducted with management, customers, employees,
      brokers, data providers, investors, or counsel.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-15
      notes: The user requested one random uncovered private unicorn diligence
        report and a draft pull request.
