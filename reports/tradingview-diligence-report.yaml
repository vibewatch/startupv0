    chapter_id: VIII
    section_id: VIII.E
    figure_type: risk_heatmap
    description: Cross-report risk prioritization.
    spec:
      x_axis:
        label: likelihood
        scale: [low, medium, high, unknown]
      y_axis:
        label: severity
        scale: [informational, low, medium, high, critical]
      risk_points:
        - risk_id: R-001
          label: Financial opacity
          severity: high
          likelihood: high
          rationale: No public financial statements, ARR, margin, churn, or cash data.
          evidence_claim_ids: [EC-002, EC-003]
          source_ids: [SRC-002, SRC-004]
        - risk_id: R-002
          label: Market-data dependency
          severity: high
          likelihood: medium
          rationale: Product utility depends on real-time/delayed data, vendor
            notices, exchange rules, and paid packages.
          evidence_claim_ids: [EC-008, EC-010]
          source_ids: [SRC-007, SRC-013]
        - risk_id: R-003
          label: Broker and trading integration exposure
          severity: high
          likelihood: medium
          rationale: Broker marketplace and trade workflows create partner,
            compliance, support, and incident-allocation risk.
          evidence_claim_ids: [EC-004, EC-010]
          source_ids: [SRC-006, SRC-013]
        - risk_id: R-004
          label: Consumer subscription and data-paywall friction
          severity: medium
          likelihood: high
          rationale: App-store evidence includes strong ratings but also user
            friction around real-time data/paywalls.
          evidence_claim_ids: [EC-006, EC-008]
          source_ids: [SRC-009, SRC-007]
        - risk_id: R-005
          label: Competitive pressure
          severity: medium
          likelihood: high
          rationale: TradingView faces substitutes from terminals, analytics
            platforms, retail charting tools, and broker apps.
