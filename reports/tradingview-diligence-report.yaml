evidence_claims:
  - evidence_claim_id: EC-001
    claim: TradingView publicly describes itself as a charting platform and social
      network used by 100M+ traders and investors worldwide.
    evidence_summary: The TradingView about page states the company identity and
      100M+ worldwide user claim.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-001]
    quoted_evidence:
      - source_id: SRC-001
        quote: "We're TradingView, a charting platform and social network used by 100M+ traders and investors worldwide to spot opportunities across global markets."
        location: About page
    analyst_interpretation: This is strong evidence for the public claim, but not
      for active-user, paying-user, or retention definitions.
    limitations: User-count definitions are not disclosed.
    associations:
      chapter_id: II
      section_id: II.A
      founder_claim_ids: [FC-001]
      table_ids: [T-002, T-005, T-010, T-011]
      figure_ids: [F-001, F-004, F-006]
      risk_ids: [R-004, R-005]
  - evidence_claim_id: EC-002
    claim: TradingView announced a $298 million investment round led by Tiger
      Global at a $3 billion valuation on October 14, 2021, and stated it had
      paying customers in over 180 countries and 30 million monthly users.
    evidence_summary: PRNewswire carried a TradingView announcement with the
      financing, valuation, CEO quote, user growth, and country reach.
    evidence_type: independent_news
    verification_status: verified
    confidence: high
    source_ids: [SRC-002]
    quoted_evidence:
      - source_id: SRC-002
        quote: "TradingView Inc ... announced a new $298 million investment round - led by Tiger Global. The financing takes the company ... to a $3 billion valuation."
        location: PRNewswire announcement
      - source_id: SRC-002
        quote: "with paying customers in over 180 countries worldwide"
        location: PRNewswire announcement
      - source_id: SRC-002
        quote: "Denis Globa, CEO and co-founder of TradingView"
        location: PRNewswire announcement
    analyst_interpretation: The round and valuation are credible public anchors,
      while current financials and ownership terms remain private.
    limitations: The announcement does not disclose security type, primary versus
      secondary mix, liquidation preferences, investor rights, or current valuation.
    associations:
      chapter_id: I
      section_id: I.C
      founder_claim_ids: [FC-002]
      table_ids: [T-001, T-002, T-005, T-011, T-014, T-016]
      figure_ids: [F-001, F-002, F-006, F-008, F-011]
      risk_ids: [R-001, R-006]
  - evidence_claim_id: EC-003
    claim: TradingView publicly offers a freemium-to-enterprise pricing ladder
      across Free, Essential, Plus, Premium, Ultimate, Enterprise, and real-time
      data packages.
    evidence_summary: The pricing page lists plans and prices, identifies
      Enterprise for 100+ subscriptions, and references millions of instruments
      and hundreds of data feeds.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-004]
    quoted_evidence:
      - source_id: SRC-004
        quote: "Essential $12.95/mo annually; Plus $29.95/mo annually; Premium $59.95/mo annually; Ultimate $199.95/mo annually."
        location: Pricing page
      - source_id: SRC-004
        quote: "Enterprise plans for 100+ subscriptions"
        location: Pricing page
      - source_id: SRC-004
        quote: "3,539,722 instruments"
        location: Pricing page
    analyst_interpretation: Product packaging is well evidenced; economics and
      conversion require internal data.
    limitations: Public prices do not show discounts, promotions, refunds, taxes,
      app-store fees, exchange fees, or actual realized ARPU.
    associations:
      chapter_id: I
      section_id: I.D
      founder_claim_ids: [FC-003]
      table_ids: [T-002, T-004, T-010]
      figure_ids: [F-003, F-006, F-011]
      risk_ids: [R-001, R-002, R-004]
  - evidence_claim_id: EC-004
    claim: TradingView has a public broker marketplace and has stated an intent to
      expand brokerage partnerships and integrations.
    evidence_summary: The brokers page lists verified brokers; the 2021 financing
      announcement said TradingView was doubling down on broker relationships.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-006, SRC-002]
    quoted_evidence:
      - source_id: SRC-006
        quote: Get trading with verified brokers today.
        location: Brokers page
      - source_id: SRC-002
        quote: "The company is also doubling down on its broker relationships and is expecting to partner and integrate with most major brokerage platforms over the next few years."
        location: PRNewswire announcement
    analyst_interpretation: Broker ecosystem evidence is strong, but partner
      economics and compliance allocation are private.
    limitations: Public listings do not disclose contracts, revenue share,
      uptime, indemnities, incident history, or concentration.
    associations:
      chapter_id: III
      section_id: III.B
      founder_claim_ids: [FC-004]
      table_ids: [T-003, T-006, T-010]
      figure_ids: [F-003, F-005, F-011]
      risk_ids: [R-003]
  - evidence_claim_id: EC-005
    claim: TradingView's public product feature set includes hundreds of built-in
      indicators and strategies, 100,000+ public indicators, drawing tools,
      alerts, fundamentals, Pine Script, and advanced charting capabilities.
    evidence_summary: The feature page documents current technical-analysis,
      alert, fundamental, charting, and Pine Script surfaces.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-005]
