executive_summary:
  overall_assessment: TradingView is a scaled, late-stage private fintech software
    company with strong public evidence of user reach, mobile traction, product
    depth, and broker/data-provider ecosystem relevance. Public evidence does not
    verify revenue quality, profitability, churn, customer concentration, data-cost
    exposure, or cap-table terms, so financial diligence remains gating.
  investment_or_diligence_thesis: The public case is that TradingView has built a
    global network and workflow layer for traders by combining charts, social
    publishing, market data, alerts, custom scripting, broker connectivity, and
    freemium subscription packaging. The principal diligence question is whether
    that reach converts into durable, high-margin subscription and partner revenue
    after exchange/data costs, broker obligations, consumer churn, and competitive
    pressure.
  strongest_verified_claims:
    - TradingView publicly states it is used by 100M+ traders and investors
      worldwide.
    - PRNewswire reports a $298 million Tiger Global-led financing at a $3
      billion valuation in October 2021.
    - Public product pages verify a broad pricing ladder, large instrument count,
      market-data packages, alerts, indicators, Pine Script, mobile apps, widgets,
      and broker marketplace integrations.
  biggest_risks:
    - "Financial opacity: no public audited financials, ARR, retention, gross margin,
      customer concentration, burn, cash, debt, or cap-table terms."
    - "Market-data dependency: exchange rules, per-user data fees, vendor contracts,
      and delayed/real-time data licensing can affect margins, UX, and plan packaging."
    - "Regulatory and partner exposure: broker integrations, trading workflows,
      market-data terms, user-generated scripts, and global privacy obligations create
      legal, operational, and reputational risk."
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue bridge, cohort retention, gross
      margin by plan, sales efficiency, cash balance, runway, and debt schedule.
    - Cap table, investor rights, option pool, secondary-sale details, liquidation
      stack, and board-control documents.
    - Data-provider and broker contracts, usage commitments, revenue share,
      incident history, and concentration by vendor or partner.
    - Active-user definitions, paying-user count, conversion funnel, app retention,
      churn, refund rates, support quality, and consumer complaint trends.
  recommended_next_steps:
    - Run a finance workstream covering revenue recognition, subscriptions,
      exchange-fee pass-through, gross margin, billing churn, refunds, and cohort
      retention.
    - Run contract diligence on exchange/data-provider, broker, enterprise,
      app-store, cloud, and widget/API arrangements.
    - Conduct customer and broker reference calls across retail, professional, and
      enterprise segments.
    - Verify current traffic, app analytics, and competitive positioning through
      independent analytics providers.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: The only public priced financing located in this session was
      the October 2021 $298 million round at a $3 billion valuation. Public pages
      expose monetization surfaces - subscriptions, paid market data, enterprise
      plans, broker integrations, widgets, and app distribution - but not audited
      revenue, ARR, margin, burn, debt, or retention.
    founder_claim_ids:
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-008
    risk_ids:
      - R-001
      - R-002
      - R-006
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids: [I.A.1, I.A.2, I.A.3, I.A.4, I.A.5, I.A.6]
        summary: No audited financial statements, quarterly financials, revenue
          bridge, gross margin, EBITDA, burn, cash, or debt schedule were found in
          public sources.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding: Public evidence verifies scaled usage and monetization
              surfaces, but not financial statement quality.
            evidence_claim_ids:
              - EC-001
              - EC-003
        hidden_risks:
          - Revenue may be more consumer-subscription and data-fee sensitive than
            user-scale headlines suggest.
        evidence_gaps:
          - Audited income statements, balance sheets, cash-flow statements, ARR,
            recognized revenue, deferred revenue, gross margin, support costs,
            app-store fees, and exchange/data pass-throughs.
        follow_up_questions:
          - What share of gross revenue is retained after app-store fees,
            exchange/data fees, broker economics, refunds, and taxes?
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-003
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids: [I.B.1, I.B.2, I.B.3, I.B.4, I.B.5, I.B.6, I.B.7, I.B.8]
        summary: Public pages do not disclose projections; management's 2021
          announcement did state an intent to expand broker relationships.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding: The 2021 financing announcement framed broker integrations
              as a growth priority.
            evidence_claim_ids:
              - EC-004
        hidden_risks:
          - Forecasts may depend on partner integrations that require broker
            compliance, uptime, commercial alignment, and regional approvals.
        evidence_gaps:
          - Board-approved forecast, pipeline, bookings, churn, gross margin,
            hiring plan, data-cost plan, broker attach-rate, and downside case.
        follow_up_questions:
          - What sensitivity has management modeled for user growth, paid
            conversion, data fees, and broker revenue share?
        table_ids: []
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-004
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids: [I.C.1, I.C.2, I.C.3, I.C.4, I.C.5]
        summary: The October 2021 announcement verifies a $298 million financing
          led by Tiger Global at a $3 billion valuation, but public sources do not
          disclose the full capitalization, security type, investor rights, or
          option-pool treatment.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding: The financing and valuation are directly supported by a
              named public announcement.
            evidence_claim_ids:
              - EC-002
        hidden_risks:
          - Late-stage private round terms may include preferences, secondary
            sales, veto rights, or pro-rata rights that materially change common
            equity economics.
        evidence_gaps:
          - Cap table, round documents, investor rights, board composition,
            liquidation stack, option pool, SAFEs/notes, warrants, and debt.
        follow_up_questions:
          - What rights did Tiger Global and other investors receive, and how much
            of the round was primary versus secondary?
        table_ids:
          - T-001
        figure_ids: []
        evidence_claim_ids:
          - EC-002
      - section_id: I.D
        title: Other financial information
        checklist_question_ids: [I.D.1, I.D.2, I.D.3]
        summary: Pricing pages verify Free, Essential, Plus, Premium, Ultimate,
          paid market data, and Enterprise plans, creating multiple revenue
          levers but also potential complexity in revenue recognition and data
          cost attribution.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding: TradingView publicly lists annual monthly-equivalent prices
              for Essential, Plus, Premium, and Ultimate plans, and offers
              enterprise subscriptions for 100+ users.
            evidence_claim_ids:
              - EC-003
        hidden_risks:
          - Exchange fees and real-time data packages can create margin drag and
            user dissatisfaction if customers expect real-time data to be bundled.
        evidence_gaps:
          - Revenue by product, monthly versus annual mix, renewal rate, refunds,
            discounts, data package margins, enterprise ACV, and broker revenue.
        follow_up_questions:
          - What are gross and contribution margins by plan after vendor,
            exchange, payment, app-store, support, and cloud costs?
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-008
  - chapter_id: II
    title: Products
    chapter_summary: TradingView's public product suite combines charting,
      screeners, alerts, custom scripting, social publishing, data coverage,
      widgets, mobile apps, desktop, broker connectivity, and paid plans. Product
      breadth is well supported by primary pages; adoption, retention, and
      profitability by product are not public.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-005
      - EC-013
    risk_ids:
      - R-002
      - R-005
      - R-008
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids: [II.A.1, II.A.2, II.A.3, II.A.4, II.A.5, II.A.6]
        summary: Public evidence verifies a broad product matrix with a free
          entry point, paid individual plans, Ultimate, Enterprise, real-time data
          packages, widgets, broker connectivity, Pine Script, alerts, and mobile
          apps.
        verification_status: verified
        confidence: high
        key_findings:
          - finding: Product breadth is directly supported by company product,
              pricing, data, broker, widget, and app pages.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-005
              - EC-013
        hidden_risks:
          - The same breadth increases dependency on data vendors, exchange
            rules, broker integrations, community moderation, app stores, and
            support operations.
        evidence_gaps:
          - Product-level active use, paid conversion, churn, cloud cost, support
            load, quality metrics, roadmap, and technical-debt register.
        follow_up_questions:
          - Which products drive paid conversion and retention versus top-of-funnel
            engagement?
        table_ids:
          - T-003
          - T-004
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-001
          - EC-003
          - EC-004
          - EC-005
          - EC-013
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public customer evidence is strongest for aggregate user
      scale, mobile reach, country reach, broker relationships, and data-provider
      dependencies. It does not disclose top customers, revenue concentration,
      segment mix, churn, NPS, or referenceable enterprise accounts.
    founder_claim_ids:
      - FC-001
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-004
      - EC-006
      - EC-008
    risk_ids:
      - R-002
      - R-003
      - R-004
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids: [III.A]
        summary: Public sources indicate mass-market trader and investor reach,
          but do not identify top customers or revenue by customer.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding: TradingView states 100M+ traders and investors worldwide;
              app listings show large mobile review and download counts.
            evidence_claim_ids:
              - EC-001
              - EC-006
        hidden_risks:
          - User count can overstate monetizable customer depth if active,
            paying, professional, and enterprise users are not separated.
        evidence_gaps:
          - Top customers, customer contracts, paid-seat counts, enterprise
            accounts, geographic revenue mix, churn, NPS, and support SLAs.
        follow_up_questions:
          - What percentage of revenue comes from the top 10 customers, consumer
            subscriptions, enterprise seats, broker partners, and data packages?
        table_ids:
          - T-005
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-001
          - EC-006
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids: [III.B]
        summary: TradingView maintains public broker and data-provider
          relationships, including broker listings and market-data/reference-data
          vendors.
        verification_status: verified
        confidence: high
        key_findings:
          - finding: The brokers page lists verified broker options; footer and
              data pages identify ICE Data Services, FactSet, Quartr, and other
              data/reference sources.
            evidence_claim_ids:
              - EC-004
              - EC-008
        hidden_risks:
          - Partner concentration or degraded integrations could directly affect
            product utility, conversion, or support burden.
        evidence_gaps:
          - Broker contracts, commercial terms, integration uptime, revenue share,
            data-provider contracts, minimum commitments, and termination rights.
        follow_up_questions:
          - Which brokers and data vendors account for the most revenue, usage,
            incidents, and support escalations?
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-008
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids: [III.C]
        summary: Revenue by customer, segment, geography, plan, broker, and data
          package is not publicly disclosed.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding: Pricing pages show monetization SKUs but not revenue mix or
              concentration.
            evidence_claim_ids:
              - EC-003
        hidden_risks:
          - Concentration can hide in brokers, enterprise customers, data-package
            resellers, app-store channels, or high-ARPU professional users.
        evidence_gaps:
          - Revenue by customer, plan, geography, channel, broker, data package,
            and professional versus non-professional subscriber status.
        follow_up_questions:
          - What is revenue retention by cohort and by major customer/channel?
        table_ids:
          - T-005
        figure_ids: []
        evidence_claim_ids:
          - EC-003
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids: [III.D]
        summary: No reliable public evidence was located for material severed
          customer, broker, or data-provider relationships during this session.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding: Public pages show active broker/data relationships, but do
              not provide a history of terminated relationships.
            evidence_claim_ids:
              - EC-004
              - EC-008
        hidden_risks:
          - Lost exchange or broker access could be material even if not broadly
            disclosed.
        evidence_gaps:
          - Churned enterprise customers, terminated brokers, removed exchanges,
            data-vendor disputes, and postmortems for service interruptions.
        follow_up_questions:
          - Which significant relationships were lost, renegotiated, suspended,
            or degraded during the last 24 months?
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-008
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids: [III.E]
        summary: Public supplier evidence is concentrated in data/reference
          providers and app-store/mobile distribution; cloud, payments, support,
          and enterprise tooling suppliers were not publicly verified.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding: Public pages identify select market data from ICE Data
              Services, reference data from FactSet, and SEC filings/documents
              from Quartr.
            evidence_claim_ids:
              - EC-008
        hidden_risks:
          - Data suppliers and exchanges can change availability, terms, fees, or
            display restrictions with direct margin and product consequences.
        evidence_gaps:
          - Top suppliers by spend, cloud architecture, data entitlements, minimum
            commitments, payments processors, app-store exposure, and disaster
            recovery arrangements.
        follow_up_questions:
          - What suppliers are single points of failure for real-time data,
            alerts, chart rendering, payments, support, and brokerage workflows?
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-008
  - chapter_id: IV
    title: Competition
    chapter_summary: >-
      TradingView competes across several overlapping segments:
      retail charting communities, professional market terminals, broker-owned
      trading platforms, finance portals, screeners, widgets, and data platforms.
      Public sources support product overlap, but not win/loss rates or switching
      economics.
    founder_claim_ids:
      - FC-006
    evidence_claim_ids:
      - EC-003
      - EC-005
      - EC-011
      - EC-012
    risk_ids:
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids: [IV.A.1, IV.A.2]
        summary: TradingView's public strengths are reach, community, indicators,
          script ecosystem, app traction, pricing ladder, and broker/data
          integrations. Competitors range from professional terminals and
          investment platforms to brokers and retail charting tools.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding: Public competitor pages verify alternative products in
              professional terminals, investment analytics, charting, and
              brokerage-adjacent segments.
            evidence_claim_ids:
              - EC-012
        hidden_risks:
          - Broker platforms can subsidize tools with trading economics, while
            professional terminals and analytics platforms may compete for
            high-value users and enterprises.
        evidence_gaps:
          - Win/loss data, direct churn to competitors, price elasticity, feature
            parity analysis, and independent market-share data.
        follow_up_questions:
          - Which competitor segments create the highest churn or acquisition-cost
            pressure by customer cohort?
        table_ids:
          - T-008
          - T-009
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-003
          - EC-005
          - EC-011
          - EC-012
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: TradingView appears to combine product-led growth, SEO/content,
      app distribution, social/community activity, broker integrations, widgets,
      and enterprise plans. Public materials provide strong reach signals but no
      customer acquisition cost, payback, channel mix, or sales productivity.
    founder_claim_ids:
      - FC-001
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-004
      - EC-006
      - EC-011
      - EC-013
    risk_ids:
      - R-003
      - R-004
      - R-005
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids: [V.A.1, V.A.2, V.A.3, V.A.4]
        summary: Public evidence supports a multi-channel GTM strategy based on
          freemium usage, high-traffic web presence, mobile apps, widgets,
          broker integrations, and plan upgrades.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding: TradingView publishes free widgets, mobile apps, pricing
              tiers, broker pages, and a company blog claim of leading investing
              website rank.
            evidence_claim_ids:
              - EC-006
              - EC-011
              - EC-013
        hidden_risks:
          - Public reach may not translate into efficient paid conversion if
            acquisition, support, refunds, exchange fees, and app-store fees are
            high.
        evidence_gaps:
          - Channel mix, CAC, payback, conversion, churn, reseller/broker
            economics, paid marketing spend, and attribution quality.
        follow_up_questions:
          - What is paid conversion and CAC payback by web, app, broker, widget,
            referral, organic search, and enterprise channels?
        table_ids:
          - T-010
          - T-011
        figure_ids:
          - F-006
        evidence_claim_ids:
          - EC-006
          - EC-011
          - EC-013
      - section_id: V.B
        title: Major Customers
        checklist_question_ids: [V.B.1, V.B.2, V.B.3]
        summary: Major customers are not publicly disclosed; public evidence is
          primarily aggregate user, mobile, and country reach.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding: PRNewswire stated paying customers in over 180 countries in
              2021, but did not identify accounts or revenue weights.
            evidence_claim_ids:
              - EC-002
        hidden_risks:
          - Enterprise or broker concentration may be material despite consumer
            brand visibility.
        evidence_gaps:
          - Named major customers, contract values, renewal status, gross
            retention, NRR, and reference-call availability.
        follow_up_questions:
          - Are any brokers, data customers, enterprise accounts, or app stores
            individually material to revenue?
        table_ids:
          - T-010
        figure_ids: []
        evidence_claim_ids:
          - EC-002
      - section_id: V.C
        title: Principal avenues for generating new business
        checklist_question_ids: [V.C]
        summary: Principal public avenues include freemium/product-led sign-up,
          app-store distribution, broker partnerships, widgets embedded on third
          party sites, social sharing, and enterprise plans.
        verification_status: partially_verified
