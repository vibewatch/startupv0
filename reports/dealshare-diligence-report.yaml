    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-002
    contradiction_summary: No contradiction on the public announcement; financing economics are undisclosed.
    diligence_follow_up:
      - Request primary financing documents and board approvals.
  - founder_claim_id: FC-003
    claim_text: DealShare serves first-time online shoppers and mass-market households in India tier 2 and tier 3 towns.
    claim_source: Moneycontrol company description
    claim_date: 2022-01-29
    mapped_chapter_ids:
