  - figure_id: F-010
    title: DealShare risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Risk heatmap for full public diligence risk register.
    purpose: Prioritize data-room requests and follow-up workstreams.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: FY24 revenue collapsed after prior unicorn growth narrative
          severity: critical
          likelihood: high
          rationale: Public coverage reports FY24 gross revenue from operations fell 75% to Rs 499 crore from Rs 1,963 crore, undermining the prior $1B-revenue expectation and valuation narrative.
          evidence_claim_ids: &a33
            - EC-004
            - EC-005
            - EC-006
          source_ids:
            - SRC-002
            - SRC-003
        - risk_id: R-002
          label: Business-model reset and B2B shutdown create customer/supplier wind-down risk
          severity: high
          likelihood: high
          rationale: The B2B vertical reportedly shut down after more than 100 layoffs, creating severed-customer, receivable, vendor, inventory and logistics exposure.
          evidence_claim_ids: &a34
            - EC-008
            - EC-014
          source_ids:
            - SRC-003
        - risk_id: R-003
          label: Founder exits and leadership transition increase execution risk
          severity: high
          likelihood: high
          rationale: Three of four co-founders reportedly left and the retail business chief Kamaldeep Singh was leading the firm.
          evidence_claim_ids: &a35
            - EC-008
            - EC-010
          source_ids:
            - SRC-003
            - SRC-002
        - risk_id: R-004
          label: Valuation impairment and preference-stack risk
          severity: high
          likelihood: medium
          rationale: Historical $1.6B-$1.7B valuation anchors may not represent current fair value after revenue contraction, cost cuts and public criticism of unicorn status.
          evidence_claim_ids: &a36
            - EC-001
            - EC-002
            - EC-009
            - EC-018
          source_ids:
            - SRC-001
            - SRC-002
            - SRC-003
        - risk_id: R-005
          label: Customer quality and retention are not public
          severity: high
          likelihood: unknown
          rationale: Target customers are price-sensitive mass-market tier 2/3 shoppers, but repeat purchase, churn, CAC, order frequency and revenue concentration are not disclosed.
          evidence_claim_ids: &a37
            - EC-003
            - EC-017
          source_ids:
            - SRC-002
            - SRC-003
        - risk_id: R-006
          label: Weak unit economics and working-capital exposure
          severity: high
          likelihood: medium
          rationale: Entrackr reported negative EBITDA margin, negative ROCE, Rs 1.54 spent to earn one rupee, and material trade receivables.
          evidence_claim_ids: &a38
            - EC-006
            - EC-007
          source_ids:
            - SRC-003
        - risk_id: R-007
          label: Primary company pages were blocked during research
          severity: medium
          likelihood: medium
          rationale: Company-owned pages returned 403, preventing direct public validation of current product, terms, policies, leadership and governance.
          evidence_claim_ids: &a39
            - EC-011
            - EC-015
          source_ids:
            - SRC-004
        - risk_id: R-008
          label: Competitive pressure in Indian value e-commerce
          severity: medium
          likelihood: medium
          rationale: DealShare competes for price-sensitive shoppers and suppliers against marketplaces, grocery platforms and social-commerce models with potentially stronger capital and logistics.
          evidence_claim_ids: &a40
            - EC-013
          source_ids:
            - SRC-006
            - SRC-008
