report_metadata:
  report_title: DealShare Startup Diligence Report
  target_company: DealShare
  website: https://www.dealshare.in/
  known_aliases:
    - DealShare
    - Merabo Labs Private Limited
  sector: Indian value e-commerce / social commerce / consumer retail
  geography: India / Bengaluru, Jaipur and tier 2-3 markets referenced in public sources
  company_stage: Private unicorn with elevated restructuring and valuation-impairment risk
  research_date: 2026-05-26
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD for financing; INR/Rs for Indian operating metrics unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list and selected DealShare from the fetched CB Insights unicorn list with shuf alongside two other uncovered targets.
    - Used public evidence from CB Insights, Moneycontrol, Entrackr, DuckDuckGo Lite discovery pages and accessible competitor/source fetch attempts.
    - Treated company-owned pages returning 403 as a limitation rather than evidence of shutdown or wrongdoing.
    - No private data room, management interview, customer call, legal docket search, audited statement package, HRIS export or board materials were available.
  included_jurisdictions:
    - India
    - Public global venture-financing context
  excluded_topics:
    - Non-public financial statements and management accounts
    - Cap table, investor rights, debt and current investor marks
    - Customer, supplier, logistics and franchise contracts
    - Employee agreements, severance, HRIS and founder exit terms
    - Counsel-led litigation, regulatory, tax, IP, insurance and labor-law searches
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-26
      notes: No founder deck, customer list, financial model or data-room documents were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: DealShare is an Indian private unicorn with public valuation anchors around $1.6B to $1.7B.
    claim_source: CB Insights, Moneycontrol and Entrackr public financing coverage
    claim_date: 2022-01-27
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-009
      - EC-018
    contradiction_summary: The historical unicorn valuation is supported, but current fair value is uncertain after reported FY24 contraction and restructuring.
    diligence_follow_up:
      - Request cap table, financing documents, liquidation preferences, debt instruments and current investor marks.
  - founder_claim_id: FC-002
    claim_text: DealShare raised a $165M Series E first close led by Tiger Global/Alpha Wave with other venture investors.
    claim_source: Moneycontrol funding coverage
    claim_date: 2022-01-29
