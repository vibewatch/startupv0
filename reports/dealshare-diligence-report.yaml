    contradiction_summary: Segment positioning is supported, but customer retention and order economics are not public.
    diligence_follow_up:
      - Request cohorts, repeat purchase, city/category P&L and customer references.
  - founder_claim_id: FC-004
    claim_text: DealShare expected near-term $1B revenue and planned technology, logistics and offline franchise investment after its Series E.
    claim_source: Moneycontrol funding coverage
    claim_date: 2022-01-29
    mapped_chapter_ids:
      - I
      - V
      - VI
    mapped_section_ids:
      - I.B
      - V.A
      - VI.B
    verification_status: contradicted
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
    contradiction_summary: Later FY24 public evidence shows much lower revenue and restructuring, contradicting the growth trajectory implied by the 2022 expectation.
    diligence_follow_up:
      - Request budget-to-actuals, revised operating plan, board materials and management explanation.
  - founder_claim_id: FC-005
    claim_text: DealShare underwent a major business-model and personnel reset including B2B shutdown, layoffs and founder departures.
    claim_source: Entrackr FY24 financial coverage
    claim_date: 2024-11-12
    mapped_chapter_ids:
      - III
      - VII
    mapped_section_ids:
      - III.D
      - VII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-008
      - EC-014
    contradiction_summary: The restructuring is independently reported and creates material continuity risk.
    diligence_follow_up:
      - Request restructuring plan, severance obligations, founder exit terms and current org chart.
  - founder_claim_id: FC-006
    claim_text: DealShare remains active and private for report-selection purposes and has no identified public IPO, acquisition or shutdown event.
    claim_source: CB Insights and Entrackr public evidence
    claim_date: 2026-05-26
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
      - I.C
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-012
    contradiction_summary: Public evidence supports ongoing operations but current legal status and valuation must be confirmed.
    diligence_follow_up:
      - Request company registry status, corporate structure, board consents and any strategic transaction materials.
executive_summary:
  overall_assessment: DealShare has strong public evidence of historical unicorn financing but also strong public evidence of severe post-unicorn operating distress. The key public diligence conclusion is not whether DealShare once reached a unicorn valuation; it is whether the current retail business, leadership team, liquidity and customer economics can support any valuation near those historical anchors.
  investment_or_diligence_thesis: Proceed only as a turnaround diligence case. Underwriting requires proof of current revenue quality, contribution margin, cash runway, receivables collectability, customer retention, supplier stability, leadership retention and legal exposure after the B2B shutdown and workforce reductions.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: The $165M Series E first close at a $1.6B valuation is supported by Moneycontrol.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-005
      summary: FY24 restructuring, B2B shutdown, layoffs and founder departures are supported by Entrackr reporting.
      evidence_claim_ids:
        - EC-008
        - EC-014
    - founder_claim_id: FC-003
      summary: The original mass-market tier 2/3 customer positioning is supported by independent news coverage.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: FY24 revenue collapsed after prior unicorn growth narrative
    - risk_id: R-002
      summary: Business-model reset and B2B shutdown create customer/supplier wind-down risk
    - risk_id: R-003
      summary: Founder exits and leadership transition increase execution risk
    - risk_id: R-004
      summary: Valuation impairment and preference-stack risk
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, revenue/GMV bridge, cash runway, debt, receivables aging and contribution margin.
    - Current cap table, financing terms, preference stack, investor marks, down-round protections and debt/SAFE/warrant schedules.
    - Customer cohorts, repeat purchase, CAC/payback, city/category P&L, supplier concentration and B2B wind-down claims.
    - Current org chart, founder exit terms, severance obligations, retention plan and counsel-led legal/regulatory/material-contract review.
  recommended_next_steps:
    - Obtain statutory filings and management accounts before relying on any headline valuation.
    - Rebuild the business model from FY24 actuals and current monthly cohorts, not the 2022 Series E narrative.
    - Run customer, supplier and former-employee diligence focused on the B2B shutdown and retail reset.
    - Have counsel review employment, supplier, customer, data/privacy, consumer, IP, tax, insurance and litigation schedules.
