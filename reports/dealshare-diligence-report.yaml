    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.E
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Request audited statements, monthly management accounts, GMV/revenue bridge, cohort retention, category/city P&L and management turnaround plan.
  - risk_id: R-002
