executive_summary:
  overall_assessment: Ro is eligible for public-source diligence as an active private U.S. telehealth unicorn with public $7B valuation evidence, broad product/partner signals and current operations. The key diligence posture is strong public proof of platform breadth and financing, but weak public proof of financial quality, unit economics, customer concentration, contract terms and regulatory control effectiveness.
  investment_or_diligence_thesis: The diligence case depends on whether Ro can convert direct-to-patient telehealth breadth and GLP-1 access into durable, compliant, high-margin recurring revenue despite intense competition, manufacturer/pharmacy dependency and sensitive health-data exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Ro is publicly supportable as an active private unicorn candidate with a reported $7B valuation.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Ro publicly presents a vertically integrated direct-to-patient platform across telehealth, pharmacy, labs/diagnostics and in-home care.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-007
    - founder_claim_id: FC-003
      summary: Ro has public traction and GTM signals, including visit/member claims, county reach, partnerships and national campaigns.
      evidence_claim_ids:
        - EC-010
        - EC-012
        - EC-014
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, revenue quality and unit economics are not public.
    - risk_id: R-003
      summary: GLP-1 growth may depend on manufacturer/pharmacy access and pricing terms.
    - risk_id: R-005
      summary: Privacy, consumer health data and TCPA/marketing litigation exposure require counsel review.
    - risk_id: R-009
      summary: Telehealth and GLP-1 access competition is intense and price-sensitive.
  key_evidence_gaps:
    - Audited/management financial statements, KPI definitions, cash runway and margin by product.
    - Current cap table, liquidation preferences, debt, options and valuation marks.
    - Active customer cohorts, retention/churn, top accounts, revenue concentration and CAC/payback.
    - Manufacturer/pharmacy/lab/B2B contracts, supplier concentration and service levels.
    - Counsel-grade litigation/regulatory/privacy/IP/insurance schedules.
  recommended_next_steps:
    - Open finance, cap-table, customer/cohort, HR and legal data rooms before underwriting valuation.
    - Run GLP-1 supply/pricing sensitivity and manufacturer-contract review.
    - Perform counsel-led privacy/TCPA/FDA/state telehealth/pharmacy review.
    - Conduct competitor win/loss, customer/reference and cohort retention diligence.
    - Verify management roster, attrition, roadmap execution and clinical QA controls.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies major financing events and limited revenue-growth snippets, but not audited financials, runway, cap table, debt, revenue quality or unit economics.
    founder_claim_ids:
      - FC-001
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-011
    risk_ids:
      - R-001
      - R-002
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or management statements were located publicly; only funding, revenue-mix and growth snippets are visible.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public evidence does not support investment-grade revenue, margin, backlog or AR analysis.
            evidence_claim_ids:
              - EC-004
              - EC-011
            risk_ids:
              - R-001
        hidden_risks:
          - Reported line growth may mask low margin, churn, refund or working-capital strain.
        evidence_gaps:
          - Audited financial statements, management reports, product/channel/geography revenue, backlog and AR aging.
        follow_up_questions:
          - Provide monthly financial statements, KPI definitions and revenue recognition policy for FY2023-FY2026 YTD.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-011
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers are publicly visible in GLP-1 access, pharmacy and B2B capabilities, but projections and assumptions are private.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
