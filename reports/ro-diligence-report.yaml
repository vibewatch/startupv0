              - EC-006
              - EC-012
            risk_ids:
              - R-003
              - R-009
        hidden_risks:
          - Forecasts may assume durable GLP-1 access or CAC efficiency that is not proven publicly.
        evidence_gaps:
          - Three-year quarterly model, pricing/mix assumptions, drug-supply assumptions and CAC/payback sensitivities.
        follow_up_questions:
