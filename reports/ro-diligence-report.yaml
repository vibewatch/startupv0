risk_register:
  - risk_id: R-001
    risk_title: Opaque financial statements and unit economics
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence does not include audited financials, cash runway, gross margin, CAC/payback, AR aging or revenue recognition detail.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-004
      - EC-011
    mitigation_or_diligence_request: Obtain audited/management financials, KPI definitions, cohort economics and bridge to public growth claims.
  - risk_id: R-002
    risk_title: Valuation may outrun verified scale
    risk_category: financing
    severity: high
    likelihood: medium
    description: Reported $7B valuation is public but underlying revenue, preferences and dilution are not.
