  geography: United States; headquartered in New York, New York
  company_stage: Private unicorn / late-stage venture-backed
  research_date: 2026-06-17
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only, accessed with curl and Jina Reader where available.
    - Prioritized primary Ro pages, CB Insights, SEC EDGAR, legal dockets, USPTO TSDR and reputable news/market sources.
    - Private records are explicitly marked not_publicly_verifiable; no private personal contact details are included.
    - All sources use accessed_date 2026-06-17.
  included_jurisdictions:
    - United States
    - New York
    - Federal SEC / FDA / FTC / USPTO context
    - State telehealth/pharmacy/privacy regimes where applicable
  excluded_topics:
    - Private data room materials
    - Customer/supplier interviews
    - Paid database exports
    - Counsel-grade docket/regulatory searches
    - Non-public personal contact details
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights unicorn candidate selection for Ro
      type: user_context
      date_received: 2026-06-17
      notes: "Candidate: Ro, slug ro, valuation $7B, United States, New York, Healthcare & Life Sciences."
