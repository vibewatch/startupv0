diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited and monthly financial statements, gross margin, CAC, runway and AR aging.
    why_it_matters: Necessary to underwrite valuation and revenue quality.
    suggested_source_or_request: Finance data room and CFO walkthrough.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, preferences, options, debt and warrants.
    why_it_matters: Determines true equity value and dilution.
    suggested_source_or_request: Cap table, financing documents and liquidation waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue concentration, active customer cohorts, retention/churn and B2B account list.
    why_it_matters: Public visit counts do not prove durable revenue.
    suggested_source_or_request: Customer/cohort data room and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend and contract economics for GLP-1 manufacturer/pharmacy and lab relationships.
    why_it_matters: Supplier dependency is a top operating risk.
    suggested_source_or_request: Material contract and supplier spend schedules.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.A
    missing_information: CAC, channel mix, conversion, media spend and payback.
    why_it_matters: DTC national campaigns can be capital intensive.
    suggested_source_or_request: Marketing analytics exports and board materials.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, R&D budget, clinical research protocols and quality metrics.
    why_it_matters: Product defensibility and regulatory safety depend on execution quality.
    suggested_source_or_request: Roadmap, QA dashboards and research files.
