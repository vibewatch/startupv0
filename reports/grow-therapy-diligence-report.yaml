executive_summary:
  overall_assessment: Public evidence supports Grow Therapy as a scaled private behavioral-health
    platform with strong financing and visible product velocity, but public diligence
    remains constrained by missing audited financials, concentration data, and contract
    terms.
  investment_or_diligence_thesis: Grow appears to combine insurance-first consumer
    access, provider infrastructure, and enterprise distribution. The upside is durable
    distribution; the downside is reimbursement complexity, privacy and AI governance
    burden, and strong competition from insurance-enabled peers.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: Still-private status and $3B valuation are supported by company and CB
      Insights sources.
    evidence_claim_ids:
    - EC-010
    - EC-011
  - founder_claim_id: FC-004
    summary: Provider-enablement scope is directly supported by official provider
      materials.
    evidence_claim_ids:
