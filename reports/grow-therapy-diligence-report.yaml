    - EC-006
  - founder_claim_id: FC-005
    summary: Amazon, Evernorth, and enterprise-channel expansion are public.
    evidence_claim_ids:
    - EC-009
    - EC-016
    - EC-019
  biggest_risks:
  - risk_id: R-001
    summary: Valuation quality is hard to judge without audited financials, debt detail,
      or cap-table economics.
  - risk_id: R-002
    summary: The model depends on payer, billing, and enterprise channels whose concentration
      and economics are not public.
  - risk_id: R-003
    summary: Sensitive behavioral-health data plus AI features create material privacy,
      HIPAA, and safety exposure.
  key_evidence_gaps:
  - Audited financials, ARR, gross margin, burn, and debt.
  - Top customer, payer, and partner concentration.
  - Employee headcount, attrition, and option-plan detail.
  - Litigation, IP registry, and regulatory-audit files.
  recommended_next_steps:
  - Underwrite revenue quality and payer economics.
  - Obtain top partner contracts and concentration tables.
  - Review security, privacy, CPOM, and AI-governance artifacts.
  - Benchmark win/loss and unit economics versus Headway, Alma, and Talkspace.
