diligence_gaps:
- gap_id: G-001
  chapter_id: I
  section_id: I.A
  missing_information: Audited financials and monthly management reporting.
  why_it_matters: Without audited numbers the $3B valuation is hard to underwrite.
  suggested_source_or_request: Request audited statements, revenue bridge, and AR
    aging.
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.C
  missing_information: Cap table, preferred terms, option pool, and debt schedule.
  why_it_matters: Round headlines alone do not reveal downside economics.
  suggested_source_or_request: Request cap table and financing docs.
  priority: high
- gap_id: G-003
  chapter_id: III
  section_id: III.C
  missing_information: Revenue concentration by customer, payer, and partner.
  why_it_matters: A concentrated revenue base would materially change risk.
  suggested_source_or_request: Request top-customer and top-payer schedules.
  priority: high
- gap_id: G-004
  chapter_id: III
  section_id: III.E
  missing_information: Top supplier and vendor list by spend.
  why_it_matters: Undisclosed infra concentration can create resilience and margin
    risk.
  suggested_source_or_request: Request vendor ranking and DPA set.
  priority: medium
- gap_id: G-005
  chapter_id: V
  section_id: V.D
  missing_information: Sales productivity and channel CAC/LTV.
  why_it_matters: Enterprise growth quality is unknowable without efficiency data.
  suggested_source_or_request: Request pipeline, quota, win-rate, and payback data.
  priority: high
- gap_id: G-006
  chapter_id: VI
  section_id: VI.B
  missing_information: Model governance, AI evals, and initiative budgets.
  why_it_matters: AI features can be risky or uneconomic without strong controls.
  suggested_source_or_request: Request AI policy, evals, incidents, and budgets.
  priority: high
- gap_id: G-007
  chapter_id: VII
  section_id: VII.B
  missing_information: Employee headcount and provider activation/retention.
  why_it_matters: Growth can look stronger publicly than internally.
  suggested_source_or_request: Request HRIS and provider-cohort retention exports.
  priority: medium
- gap_id: G-008
  chapter_id: VIII
  section_id: VIII.A
  missing_information: Litigation and threatened-claims schedule.
  why_it_matters: Blocked public legal search is not a clearance.
  suggested_source_or_request: Request counsel-prepared claims log.
  priority: high
- gap_id: G-009
  chapter_id: VIII
  section_id: VIII.D
  missing_information: Trademark, patent, and OSS inventory.
  why_it_matters: IP readiness cannot be fully assessed from marketing pages.
  suggested_source_or_request: Request IP schedule and registry extracts.
  priority: high
- gap_id: G-010
  chapter_id: VIII
  section_id: VIII.G
  missing_information: Regulatory inquiries, payer audits, and incident history.
  why_it_matters: Healthcare workflows create compliance risk even without public
    headlines.
  suggested_source_or_request: Request audit, complaint, and incident logs.
  priority: high
