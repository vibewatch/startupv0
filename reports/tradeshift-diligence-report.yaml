diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited and management financial statements, ARR/revenue bridge, gross margin and cash runway
    why_it_matters: Financial quality and valuation support cannot be verified from public evidence.
    suggested_source_or_request: CFO data room with monthly P&L, balance sheet, cash flow, KPI definitions and board packages
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferences, debt, investor rights and option/warrant schedules
    why_it_matters: Public funding amounts do not show true ownership, liquidation stack or financing risk.
    suggested_source_or_request: Corporate secretary / CFO cap-table export and financing documents
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, concentration, churn, retention and contract economics
    why_it_matters: Public users/logos may not map to durable revenue.
    suggested_source_or_request: Customer contract schedule, cohort retention, AR aging and top-customer reference calls
    priority: high
  - gap_id: G-004
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap, R&D spend, technical debt, security audits and model/vendor governance
    why_it_matters: Product and control claims require engineering evidence.
    suggested_source_or_request: CTO / CISO roadmap, architecture, audit and incident materials
    priority: medium
  - gap_id: G-005
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, attrition, compensation and incentive plans
    why_it_matters: Execution risk and retention cannot be assessed from public bios.
    suggested_source_or_request: HRIS export, offer letters, compensation plans and attrition schedule
    priority: medium
  - gap_id: G-006
