evidence_claims:
  - evidence_claim_id: EC-001
    claim: Tradeshift is on the selected public unicorn candidate list and public profile sources do not indicate IPO, acquisition or shutdown in the sources reviewed.
    evidence_summary: Tradeshift was selected from the current unicorn list with a $2.7 billion March 2021 valuation and public sources reviewed describe an active platform rather than an IPO, acquisition or shutdown. Wikipedia states Tradeshift is a cloud-based business network/platform and that its 2018 Goldman-led financing gave it unicorn status.
    evidence_type: market_database
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-001
    quoted_evidence:
      - source_id: SRC-001
        quote: "Selected unicorn-list row: Tradeshift, valuation $2.7 billion, valuation date March 2021."
        location: Wikipedia unicorn list candidate row
    analyst_interpretation: Eligibility is supported for this public-source run; recency must be reconfirmed before investment action.
    limitations: null
    associations:
      chapter_id: I
      section_id: I.C
      founder_claim_ids:
        - FC-001
      table_ids: []
      figure_ids: []
      risk_ids:
        - R-004
  - evidence_claim_id: EC-002
    claim: Tradeshift has public funding and valuation signals but current cap-table economics are not public.
    evidence_summary: Wikipedia reports Tradeshift raised $250 million in Series E funding in 2018 at a $1.1 billion valuation and $240 million in Series F finance in January 2020. Wikipedia reports a July 2023 HSBC agreement and $35 million HSBC investment into Tradeshift as part of a funding round expected to raise at least $70 million.
    evidence_type: independent_news
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-001
      - SRC-002
      - SRC-003
    quoted_evidence:
      - source_id: SRC-002
        quote: Wikipedia reports Tradeshift raised $250 million in Series E funding in 2018 at a $1.1 billion valuation and $240 million in Series F finance in January 2020.
        location: Funding / valuation source
    analyst_interpretation: Amounts are public-source statements; current preferences, debt and post-money economics require company documents.
    limitations: I
    associations:
      chapter_id: I.D
      section_id:
        - FC-001
        - FC-005
      founder_claim_ids:
        - R-001
        - R-007
      table_ids: []
      figure_ids: []
  - evidence_claim_id: EC-003
    claim: Tradeshift has a public product/platform narrative.
    evidence_summary: Tradeshift says its platform automates AP, e-invoicing, compliance and clearance, and lets businesses connect, trade, pay and get paid on one platform. Tradeshift claims e-invoicing compliance in 70 countries and clearance in 12, with PA status in France.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-003
      - SRC-004
      - SRC-005
      - SRC-006
    quoted_evidence:
      - source_id: SRC-003
        quote: Tradeshift says its platform automates AP, e-invoicing, compliance and clearance, and lets businesses connect, trade, pay and get paid on one platform.
        location: Company product/about source
    analyst_interpretation: Public pages do not disclose product-level revenue, gross margin or retention.
    limitations: II
    associations:
      chapter_id: II.A
      section_id:
        - FC-002
      founder_claim_ids:
        - R-006
      table_ids: []
      figure_ids: []
  - evidence_claim_id: EC-004
    claim: Tradeshift has public adoption/customer traction signals, but monetization and concentration remain unverified.
    evidence_summary: Tradeshift says its network has more than one million business users; the AP page says it processes 10 million invoice documents every month and has helped hundreds of customers deploy AP automation.
    evidence_type: primary_company_source
    verification_status: partially_verified
    confidence: medium
