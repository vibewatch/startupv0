executive_summary:
  overall_assessment: Tradeshift is publicly supportable as an active private e-invoicing/AP automation unicorn with credible product and compliance footprint, but valuation freshness, debt/funding structure, executive transition, customer economics, and regulatory-delivery risk require private diligence.
  investment_or_diligence_thesis: The investment case depends on whether Tradeshift can convert its e-invoicing compliance network and AI AP automation positioning into durable, profitable enterprise revenue despite long sales cycles and compliance-product complexity.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Tradeshift is publicly supportable as an eligible private unicorn target for this run.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Tradeshift's product/platform narrative is supported by public company/product sources.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: Tradeshift has public traction or adoption signals, but economics require private validation.
      evidence_claim_ids:
        - EC-004
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Stale valuation and financing complexity
    - risk_id: R-002
      summary: E-invoicing compliance execution risk
    - risk_id: R-003
      summary: Opaque financials, debt and runway
    - risk_id: R-004
      summary: Customer concentration and logo-to-revenue gap
    - risk_id: R-005
      summary: AI dependency and model vendor risk
  key_evidence_gaps:
    - Audited/management financials, KPI definitions and cash runway
    - Current cap table, preference stack, debt and investor rights
    - Customer concentration, revenue by customer, retention/churn and contract economics
    - Security/regulatory/legal/IP schedules and material contracts
    - Headcount, compensation, attrition and key employment arrangements
  recommended_next_steps:
    - Open finance and cap-table data rooms before relying on public valuation.
    - Reconcile public adoption claims to paying customers, revenue, gross margin and retention.
    - Run customer/reference and partner diligence for the largest accounts and dependencies.
    - Have counsel review litigation, regulatory, IP, insurance and material contracts.
    - Review product/security/technology evidence with CTO/CISO or equivalent leaders.
