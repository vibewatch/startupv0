diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and monthly management accounts
    why_it_matters: Needed to verify revenue quality, margins, burn, working capital and cash runway.
    suggested_source_or_request: Audited financials, trial balances, monthly KPI pack and CFO interview.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table and financing documents
    why_it_matters: Needed to reconcile valuation discrepancies and understand preferences/dilution/debt.
    suggested_source_or_request: Cap table, stock ledger, financing docs, 409A and liquidation waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.B
    missing_information: Unit economics and profitability bridge
    why_it_matters: Quick-commerce economics depend on delivery labor, inventory, MFC utilization and repeat orders.
    suggested_source_or_request: Contribution-margin bridge by market/category/channel, CAC/payback and cohort data.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue concentration by channel, market and cohort
    why_it_matters: Public sources do not show dependence on Uber Eats, direct app, membership or specific geographies.
    suggested_source_or_request: Revenue by channel/geography/customer cohort and top market concentration.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top supplier/vendor and warehouse lease schedules
    why_it_matters: Fulfillment and supplier concentration can drive margin and service continuity risk.
    suggested_source_or_request: Top suppliers, purchase amounts, leases, SLAs, termination provisions and vendor SOC reports.
    priority: high
  - gap_id: G-006
    chapter_id: V
    section_id: V.A
    missing_information: CAC/payback, promo spend and marketing ROI
    why_it_matters: Value/deals and sponsorship strategy may be margin dilutive without strong retention.
    suggested_source_or_request: Marketing dashboard, promo budget, channel cohorts and sponsorship ROI analysis.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.A
    missing_information: Technology roadmap, architecture, security posture and engineering metrics
    why_it_matters: Public evidence does not prove defensible technology or operational reliability.
    suggested_source_or_request: Architecture docs, roadmap, incident history, security reports, engineering headcount and tech debt plan.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS export and official org chart
    why_it_matters: Public headcount signals conflict and layoffs may affect execution.
    suggested_source_or_request: HRIS export, org chart, headcount plan, attrition and compensation data.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation, arbitration, demand-letter and settlement schedule
    why_it_matters: Public dockets are incomplete and do not quantify exposure.
    suggested_source_or_request: Counsel-prepared litigation schedule, reserves, insurance notices and settlement agreements.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Alcohol/tobacco/THC license map and age-verification audit history
    why_it_matters: Regulated categories create license and enforcement risk across jurisdictions.
    suggested_source_or_request: State-by-state licenses, training, age-check logs, violations, enforcement correspondence and audit reports.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official IP schedule and software ownership records
    why_it_matters: Public trademark mirror does not prove patent/software ownership or absence of encumbrances.
    suggested_source_or_request: Official USPTO docket, assignments, patents, copyrights, open-source audit and invention assignment agreements.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies and claims history
    why_it_matters: Delivery, regulated products, cyber/ID data and employment claims require coverage review.
    suggested_source_or_request: D&O, EPLI, cyber, GL, auto, cargo and product-liability policies plus claims/loss runs.
    priority: medium
