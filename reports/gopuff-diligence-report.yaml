    title: Products
    chapter_summary: Gopuff publicly markets instant delivery of everyday essentials from local warehouses with broad SKU categories, regulated categories and value claims. Product breadth is visible, while product-level margins, delivery SLA reliability, roadmap and technology defensibility are private.
    founder_claim_ids:
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-011
      - EC-012
      - EC-021
      - EC-024
    risk_ids:
