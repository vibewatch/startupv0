  - chapter_id: IV
    title: Competition
    chapter_summary: Gopuff competes with scaled delivery marketplaces, grocery enablement platforms, retailer delivery and local convenience stores. Its claimed advantages are speed, owned inventory and value pricing; public evidence is insufficient to prove sustainable differentiation or margin.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-008
      - EC-019
      - EC-020
      - EC-024
    risk_ids:
