report_metadata:
  report_title: Gopuff Startup Diligence Report
  target_company: Gopuff / GoBrands, Inc.
  website: https://www.gopuff.com/
  known_aliases:
    - Gopuff
    - GoPuff
    - GoBrands, Inc.
    - GoBrands Inc.
    - Beverages & More Inc. d/b/a BevMo!
    - BevMo!
    - Liquor Barn
  sector: Consumer & Retail / quick-commerce convenience delivery
  geography: United States / Philadelphia headquarters; United Kingdom operations referenced publicly
  company_stage: Private unicorn / growth-stage private company with public valuation-reset signals
  research_date: 2026-06-02
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public-source diligence only; no private data room, management interview, customer calls, counsel memo or financial model was available.
    - Cross-checked user-provided CB Insights/Wikipedia unicorn selection against company-owned product/careers/privacy pages, partner pages, independent news, market database, public dockets, regulatory guidance and trademark mirrors.
    - Investigated valuation discrepancy/reset, quick-commerce unit economics, layoffs/warehouse operations, partner/customer evidence, regulated alcohol/tobacco/THC exposure, privacy/ID handling, public litigation and IP/trademark signals.
    - Treated company marketing claims as evidence that a claim is publicly made, not as independent proof of performance or economics.
  included_jurisdictions:
    - United States
    - Pennsylvania
    - California example for alcohol regulation
    - Federal FDA tobacco rules
    - United Kingdom public operations reference
  excluded_topics:
    - Private financial statements, cap table, debt agreements, tax records, contracts, HRIS, customer references, supplier confirmations, counsel privileged records and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Public unicorn selection details for Gopuff
      type: workflow_request
      date_received: 2026-06-02
      notes: Included CB Insights and Wikipedia unicorn-list details, normalized slug gopuff and required output path.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: CB Insights lists Gopuff as a private unicorn at an $8.5B valuation, joined 10/8/2020, United States / Philadelphia, Consumer & Retail, with Accel, SoftBank Group and Anthos Capital as select investors.
    claim_source: User-provided public unicorn selection / CB Insights
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
    contradiction_summary: Other public sources cite $15B, $13.84B, $5.45B and $2B valuation markers; CB Insights is one anchor, not current fair value.
    diligence_follow_up:
      - Request current cap table, financing docs, 409A/fair-value marks and board materials supporting current valuation.
