risk_register:
  - risk_id: R-001
    risk_title: Financial quality, cash runway and unit economics are not public
    risk_category: financial
    severity: high
    likelihood: high
    evidence_strength: medium
    description: Public sources show valuation marks, reported burn and layoffs, but not audited financials, gross margin, contribution margin, CAC/payback, cohort retention, working capital or cash runway.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.E
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited financials, KPI pack, cohort/unit-economics bridge, cash/debt schedule and board-approved forecast before valuation reliance.
  - risk_id: R-002
    risk_title: Valuation discrepancy and reset risk
    risk_category: financing
    severity: high
    likelihood: high
    evidence_strength: high
    description: CB Insights, Wikipedia/Reuters-derived list values, Prime Unicorn Index and Fidelity marks create materially different valuation anchors from $15B/$13.84B to $5.45B/$2B.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Reconcile all financing rounds, secondary trades, preferred terms, liquidation preferences and 409A/fair-value marks.
  - risk_id: R-003
    risk_title: Warehouse, inventory and delivery execution risk
    risk_category: operational
    severity: high
    likelihood: high
    evidence_strength: high
    description: The model depends on local micro-fulfillment centers, delivery coverage and inventory accuracy, while public reporting shows closures of 76 warehouses and large layoffs.
    impacted_chapter_ids:
      - II
      - III
      - VII
    impacted_section_ids:
      - II.A
      - III.E
      - VII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request site-level P&Ls, delivery-time SLA history, MFC utilization, stockout/substitution data, driver supply metrics and closure rationale.
  - risk_id: R-004
    risk_title: Age-restricted alcohol, tobacco, nicotine and THC compliance risk
    risk_category: regulatory
    severity: high
    likelihood: medium
    evidence_strength: high
    description: Gopuff publicly offers regulated categories and processes ID/signature data; federal and state rules create enforcement, license and operational-control risk.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Obtain jurisdiction license schedules, age-verification SOPs, training records, failed-delivery rates, enforcement history and third-party compliance audits.
  - risk_id: R-005
    risk_title: Customer concentration, retention and repeat economics are not public
    risk_category: customer
    severity: high
    likelihood: unknown
    evidence_strength: low
    description: Top customers are consumers and platform/channel users; public pages do not disclose cohort retention, order frequency, net revenue retention, major account/channel concentration or churn.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request cohort retention, order-frequency distributions, channel revenue mix, top geography/partner concentration and customer satisfaction/refund metrics.
  - risk_id: R-006
    risk_title: Competitive pricing pressure from DoorDash, Instacart, Uber Eats and retailers
    risk_category: market
    severity: high
    likelihood: high
    evidence_strength: medium
    description: Gopuff claims lower prices/no fees, but scaled marketplace and grocery competitors operate overlapping convenience offerings with large demand networks.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids: *a6
