            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-006
        hidden_risks:
          - Regulated categories increase licensing and age-verification risk; value pricing could pressure margins.
        evidence_gaps:
          - SKU-level revenue, margin, inventory turns, delivery-time SLA, market share, roadmap and R&D spend are not public.
        follow_up_questions:
          - Provide SKU/category P&L, delivery-time SLA, roadmap, pricing tests, inventory shrink and regulated-category compliance metrics.
        table_ids:
          - T-004
          - T-005
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-011
          - EC-012
          - EC-021
          - EC-024
  - chapter_id: III
    title: Customer Information
    chapter_summary: Gopuff’s customers appear primarily consumer/direct and partner-channel users, but top-customer/channel concentration, retention, order frequency, cohort performance and supplier concentration are not public. Public partner evidence includes Uber Eats and McLaren.
