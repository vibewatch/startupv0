          - IV.A.2
        summary: DoorDash/DashMart, Instacart, Uber Eats and local retailers all overlap with some part of Gopuff’s proposition. Market share, win/loss, price elasticity and contribution margin by market are not public.
        verification_status: partially_verified
        confidence: medium
