          - SRC-018
      - row_id: T-023-R2
        values:
          regulatory_area: Alcohol delivery / licensing
          public_evidence: Gopuff alcohol category and privacy notice; California ABC example requires proper identification for certain off-site privileges
          status: verified exposure
          risk: State-by-state licensing and delivery restrictions vary materially.
          follow_up: License map, delivery SOPs, enforcement/complaint history and BevMo integration review.
        evidence_claim_ids:
          - EC-005
          - EC-011
          - EC-021
        source_ids:
