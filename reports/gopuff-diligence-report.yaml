executive_summary:
  overall_assessment: Gopuff is an active private quick-commerce company with strong public brand/product evidence and multiple public unicorn-list valuation anchors, but public diligence raises material concerns around valuation reset, burn, layoffs/warehouse consolidation, unit economics and regulated-category compliance. Do not rely on any single headline valuation without primary financial and legal diligence.
  investment_or_diligence_thesis: Proceed only if Gopuff can prove durable contribution margins, repeat-order economics, cash runway, compliant age-restricted delivery, stable post-layoff execution and a reconciled capital structure that supports a current valuation materially below or above public reset markers.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Gopuff at $8.5B with Philadelphia/Consumer & Retail/select investor details.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Company-owned pages describe instant delivery from local warehouses and broad everyday essentials assortment.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-005
      summary: Uber Eats and McLaren public pages verify public partner/channel relationships.
      evidence_claim_ids:
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, cash runway and quick-commerce unit economics are not public.
    - risk_id: R-002
      summary: Valuation discrepancy/reset risk across $15B, $13.84B, $8.5B, $5.45B and $2B public markers.
    - risk_id: R-004
      summary: Alcohol/tobacco/THC delivery and ID-card handling create material regulatory/privacy exposure.
  key_evidence_gaps:
    - Audited financials, KPI pack, cash/debt/runway and contribution-margin bridge.
    - Current cap table, preferences, financing documents, option pool and liquidation waterfall.
    - Revenue/channel/customer concentration, retention, churn, order frequency and CAC/payback.
    - Site-level MFC economics, warehouse leases, supplier/vendor contracts and delivery SLA history.
    - Litigation/regulatory schedules, age-verification audits, license map, insurance policies and IP assignments.
  recommended_next_steps:
    - Reconcile public valuation discrepancy with primary financing/fair-value evidence before any valuation reliance.
    - Run financial quality-of-earnings and unit-economics diligence focused on quick-commerce margin sustainability.
    - Conduct counsel-led alcohol/tobacco/THC, privacy, labor and litigation review in parallel.
    - Validate customer/channel economics through cohort data, partner contracts and independent price/delivery mystery shops.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence establishes Gopuff as a large private quick-commerce company with multiple valuation anchors, but audited financials, cap table, runway, debt and unit economics are not publicly verifiable. The key issue is reconciling $8.5B CB Insights, $15B Wikipedia/Reuters-derived, Prime Unicorn $5.45B and Fidelity $2B marks.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-006
      - EC-007
      - EC-022
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited income statements, balance sheets, cash flows, AR aging, backlog or product/channel/geography margin schedules are public. Public signals include a secondary revenue estimate, reported burn and layoffs, all requiring primary reconciliation.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources provide valuation and limited revenue/burn signals, not full financial statements.
            evidence_claim_ids:
              - EC-003
              - EC-006
              - EC-022
            risk_ids:
              - R-001
        hidden_risks:
          - Reported burn and layoffs may indicate pressure in quick-commerce unit economics.
        evidence_gaps:
          - Audited financial statements, management accounts, AR aging, revenue by category/channel/geography, gross margin and cash-flow statements are unavailable publicly.
        follow_up_questions:
          - Provide audited financials, monthly management accounts, KPI pack and variance-to-plan for the last three fiscal years.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-006
          - EC-007
          - EC-022
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Forward projections are not public. Prime/Technical.ly signals of burn, markdowns and profitability targets make forecast assumptions, cost reductions and working-capital needs central diligence items.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Public reports of $400M burn and a profitability push make the forecast and runway model high priority.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-022
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Profitability path may depend on warehouse closures, layoffs, promotional discipline and partner/channel economics not visible publicly.
        evidence_gaps:
          - Quarterly three-year forecast, cash runway, capex/lease obligations, working capital, pricing and market assumptions are not public.
        follow_up_questions:
          - Provide board-approved forecast, scenario model, cash runway and budget-to-actual variance by market.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-022
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: The public cap-table view is limited to founders/select investors and valuation markers. Share counts, liquidation preferences, debt, options, warrants, notes and off-balance-sheet liabilities are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C-F1
            finding: Public valuation anchors conflict and do not disclose security terms or ownership.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-006
              - EC-022
            risk_ids:
              - R-002
        hidden_risks:
          - Preferred terms or debt could make headline valuation misleading for common equity or new investors.
        evidence_gaps:
          - Current cap table, share count, preferences, debt instruments, warrants/options/notes and lease obligations are unavailable publicly.
        follow_up_questions:
          - Provide full cap table, financing documents, option pool schedule, debt/lease schedule and liquidation waterfall.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-006
          - EC-022
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history can be sketched from unicorn lists and secondary-market reporting, but tax positions, accounting policies and detailed financing documents are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: CB Insights, Wikipedia and Prime Unicorn Index create a public financing/valuation timeline with major discrepancies.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-006
            risk_ids:
              - R-002
        hidden_risks:
          - Tax, accounting and revenue-recognition policies could materially affect reported growth and losses.
        evidence_gaps:
          - Tax positions, NOLs, revenue-recognition policy, debt terms and round-by-round ownership percentages are not public.
        follow_up_questions:
          - Provide round-by-round financing history, valuation support, tax memo and accounting policy memo.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-006
          - EC-022
