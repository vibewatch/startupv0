          public_evidence: Privacy notice discloses customer records including ID cards, business partners, shipping/fulfillment partners, advertising partners and state privacy rights
          status: verified obligation
          risk: Sensitive ID data and targeted advertising create breach and privacy-compliance exposure.
          follow_up: DPIAs, retention/deletion logs, vendor DPAs, incident history, GPC/opt-out compliance.
        evidence_claim_ids:
