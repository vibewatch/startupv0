      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality is not publicly verifiable
          severity: high
          likelihood: unknown
          rationale: Audited financials, cash, debt, gross margin, retention and budget-to-actuals for OpenSea are not available from public sources.
          evidence_claim_ids:
            - EC-001
