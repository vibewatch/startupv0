executive_summary:
  overall_assessment: OpenSea appears to be an active private unicorn based on current public unicorn-list evidence and company-owned operating materials. Public evidence supports category presence, product activity and selected scale or partner signals, but investment-grade diligence remains unresolved because financial statements, customer economics, cap table, material contracts, legal docket details and retention data are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A diligence thesis for OpenSea requires proving that the public valuation is supported by durable revenue quality, defensible product adoption, compliant operations, manageable legal/regulatory exposure and financing terms that preserve investor economics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: OpenSea is listed as a unicorn at $13.30B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: OpenSea publicly operates an NFT/token marketplace and developer platform with APIs, SDKs and Seaport protocol integrations.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-005
      summary: OpenSea public materials show an active platform, careers page, developer docs and company ownership by Ozone Networks, Inc.
      evidence_claim_ids:
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-004
      summary: NFT/token volume cyclicality and competitor pressure can reset revenue quality
    - risk_id: R-006
      summary: Web3 regulatory, IP, sanctions and consumer-protection exposure is high
    - risk_id: R-007
      summary: Blockchain, wallet, API and third-party content dependencies are structurally material
  key_evidence_gaps:
    - Audited financial statements, cash/debt, revenue by product/channel/geography, gross margin, retention, CAC/payback and forecast model.
    - Cap table, preference stack, option pool, debt instruments, warrants, secondary transactions and current valuation bridge.
    - Top-customer or top-account schedule, contracts, renewal/cohort data, churn/NRR, supplier spend and severed-relationship schedule.
    - Product roadmap, reliability/security evidence, technical debt, R&D budget and defensibility artifacts.
    - Complete legal docket, regulatory correspondence, IP assignments, privacy/security reports, employment agreements and material contracts.
  recommended_next_steps:
    - Run quality-of-revenue and valuation bridge diligence before relying on the headline unicorn valuation.
    - Request customer/supplier contracts, cohorts and independent references to test concentration and retention.
    - Have counsel and compliance specialists review regulatory, IP, privacy, security, employment and jurisdiction-specific risks.
    - Benchmark product differentiation, pricing power and go-to-market efficiency against direct competitors using win/loss and buyer-reference evidence.
