          evidence_claim_ids:
            - EC-001
            - EC-003
          source_ids:
            - SRC-001
        - risk_id: R-003
          label: Customer economics and concentration are opaque
          severity: high
          likelihood: unknown
          rationale: Public customer or usage signals do not disclose top-account revenue, churn, renewal status, NRR or cohort profitability.
          evidence_claim_ids:
            - EC-006
          source_ids:
            - SRC-001
        - risk_id: R-004
          label: NFT/token market cyclicality and competition can pressure take-rate economics
          severity: high
          likelihood: medium
          rationale: OpenSea operates in volatile NFT/token markets with competitors such as Blur, Magic Eden and wallet/exchange platforms; volume and revenue quality can swing with crypto cycles.
          evidence_claim_ids:
            - EC-008
            - EC-009
          source_ids:
            - SRC-001
        - risk_id: R-005
          label: Marketplace trust, safety and blockchain dependency are core execution risks
          severity: high
          likelihood: medium
          rationale: OpenSea depends on public blockchains, third-party wallets/content and moderation; trust/safety, IP disputes, stolen items and uptime/security need evidence beyond public pages.
          evidence_claim_ids:
            - EC-004
            - EC-010
          source_ids:
            - SRC-001
        - risk_id: R-006
          label: Web3 regulatory, sanctions, IP, consumer-protection and arbitration exposure is material
          severity: high
          likelihood: high
          rationale: OpenSea terms emphasize peer-to-peer/non-custodial positioning, sanctions compliance, third-party content, arbitration and user responsibility, highlighting legal complexity.
          evidence_claim_ids:
            - EC-012
            - EC-013
          source_ids:
            - SRC-001
        - risk_id: R-007
          label: Platform depends on public blockchains, wallets, APIs and third-party content
          severity: medium
          likelihood: medium
          rationale: OpenSea disclaims custody/control over wallets, blockchains and third-party content; outages, chain changes or wallet/security incidents can affect user trust.
          evidence_claim_ids:
            - EC-007
