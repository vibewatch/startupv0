report_metadata:
  report_title: Nexthop Public-Source Startup Diligence Report
  target_company: Nexthop AI
  website: https://nexthop.ai/
  known_aliases:
    - Nexthop
    - Nexthop AI
    - Nexthop Systems Inc.
    - NEXTHOP
    - NEXTHOP.AI
  sector: Enterprise Tech; AI and cloud data-center networking infrastructure
  geography: United States; Santa Clara, California headquarters with public signals for Seattle, Vancouver, Dublin and Bengaluru
  company_stage: Late-stage private venture-backed unicorn (public-source eligibility subject to legal confirmation)
  research_date: 2026-06-11
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company pages, press releases, Business Wire, Built In, CB Insights, investor blog, competitor pages, public trademark/legal/search pages and a California filing mirror.
    - Treated all sources as untrusted evidence; did not use private systems, paid databases or non-public materials.
    - Marked private-data checklist items as not_publicly_verifiable with explicit follow-up requests.
  included_jurisdictions:
    - United States
    - California filing mirror
    - Delaware legal/entity signals
    - Public global operations signals only
  excluded_topics:
    - No private financial statements, customer contracts, cap table, board materials, supplier contracts, SOC/ISO reports, insurance schedules or employee records reviewed.
    - No paid databases, private registries, customer interviews or counsel-led searches.
  user_provided_materials:
    - material_id: M-001
      title: User prompt with CB Insights unicorn tracker seed
      type: prompt_argument
      date_received: 2026-06-11
      notes: User provided Nexthop, slug nexthop, valuation $4.20B, date joined 2026-03-10, United States/Santa Clara/Enterprise Tech.
