executive_summary:
  overall_assessment: Shulan Health appears to remain an eligible private-unicorn diligence target based on the current CB Insights row and no public evidence of completed IPO, acquisition or shutdown in the sources reviewed. Public evidence supports a real healthcare-provider network with hospital, management, platform, internet-hospital and AI/digital initiatives, but investment-grade diligence remains unresolved because audited financials, current cap table, contracts, payer economics, legal dockets, licenses, HR and IP schedules are not public.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The core thesis depends on proving that Shulan can convert high-acuity private-hospital brand and digital-health ambitions into sustainable, subsidy-adjusted profitability despite医保/DRG pressure, expansion capex, governance/share-freeze concerns and strong competition from public hospitals and private specialty networks.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Shulan Health as a $1.24B private unicorn in China/Hangzhou Healthcare & Life Sciences.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Official hospital sources support substantial clinical breadth at Shulan (Hangzhou) Hospital, including tertiary Grade A positioning, 46 clinical departments and 13 medical-technology departments.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-005
      summary: CICC and public media identify institutional investors including GIC-linked Cliff Investment, Qiming-related Suzhou Qiming Rongxin and a Sequoia-related investor.
      evidence_claim_ids:
        - EC-001
        - EC-004
  biggest_risks:
    - risk_id: R-002
      summary: Reported losses, leverage and subsidy-adjusted earnings quality require audited financial diligence.
    - risk_id: R-004
      summary: 医保 pricing guidance and DRG/DIP reform could pressure margins and reimbursement.
    - risk_id: R-005
      summary: Family control, reported equity freeze and stalled IPO process create governance and financing risk.
  key_evidence_gaps:
    - Audited financial statements, facility-level P&L, cash runway, debt, subsidy accounting and projections.
    - Current fully diluted cap table, preferences, options, pledges/freezes and investor rights.
    - Payer mix, top-referral/customer concentration,医保 settlements, patient cohorts and independent references.
    - Hospital licenses, agency inspections, malpractice/adverse events, clinical-trial compliance and insurance.
    - Material contracts, related-party transactions, IP/software/data ownership, security reports and AI governance.
    - HRIS headcount, physician productivity, compensation, retention and turnover.
  recommended_next_steps:
    - Run finance-quality diligence before relying on headline unicorn valuation.
    - Have PRC counsel verify the reported equity freeze, IPO status, licenses, court dockets, IP and material contracts.
    - Request facility-level performance and payer economics, including DRG/DIP sensitivity and subsidy-adjusted EBITDA.
    - Conduct independent clinical quality, patient/payer reference and key-physician retention diligence.
    - Review digital/AI product analytics, cybersecurity, data-consent controls and software/IP ownership.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Shulan has public unicorn and financing anchors plus prospectus-cited revenue scale, but primary financial statements, debt schedules, cap table terms and forecast support are not public.
    founder_claim_ids:
      - FC-001
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-005
      - EC-006
      - EC-013
      - EC-022
    risk_ids:
      - R-001
      - R-002
      - R-004
      - R-005
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public articles citing prospectus data provide revenue, loss and leverage signals for 2020-2023, but audited statements, footnotes, AR aging, backlog and budget-to-actuals are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: Revenue scale appears material, with public reports indicating RMB 1.548B to RMB 1.884B revenue over 2021-2023.
            evidence_claim_ids:
              - EC-005
              - EC-006
            risk_ids:
              - R-002
          - finding_id: I.A-F2
            finding: Losses and leverage remain material diligence issues, especially because 2023 improvement may include a one-time government subsidy.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-002
        hidden_risks:
          - Reported facility expansion losses may mask weaker unit economics at new hospitals.
          - Secondary-source financial figures require reconciliation to audited statements.
        evidence_gaps:
          - Audited financial statements, management accounts, AR aging, tax schedules, debt instruments, capex commitments and site-level P&Ls.
        follow_up_questions:
          - Provide audited 2021-2025 financials and management KPI packs by hospital, product line, payer and channel.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-022
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public three-year forecast was available. Public evidence points to growth drivers from hospital ramp, digital services and management-output services, offset by医保 pricing and DRG/DIP risk.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: 医保 price guidance and falling reported inpatient spend create forecast sensitivity.
            evidence_claim_ids:
              - EC-013
              - EC-014
            risk_ids:
              - R-004
          - finding_id: I.B-F2
            finding: New hospitals and future medical centers require capital and ramp assumptions that are not public.
            evidence_claim_ids:
              - EC-011
              - EC-006
            risk_ids:
              - R-002
              - R-003
        hidden_risks:
          - Forecasts could overstate mature-hospital margin or understate cash needs for new facilities.
          - Government subsidies may be non-recurring.
        evidence_gaps:
          - Board-approved forecast, payer-mix model, capex plan, hospital ramp curve, debt/refinancing assumptions and sensitivity cases.
        follow_up_questions:
          - Provide a three-year integrated forecast with monthly cash runway, site ramp, debt service, subsidy assumptions and DRG/DIP downside cases.
        table_ids:
          - T-005
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-013
          - EC-014
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: CB Insights and CICC provide public valuation/shareholder anchors, but the current fully diluted cap table, preference stack, debt and option pool are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights lists Shulan Health at $1.24B and the CICC table shows pre-IPO investors including GIC, Qiming and Sequoia-related entities.
            evidence_claim_ids:
              - EC-001
              - EC-004
            risk_ids:
              - R-001
              - R-005
          - finding_id: I.C-F2
            finding: Shanghai Shulan Investment was the controlling shareholder in the 2021 table and Zheng Jie was identified as actual controller.
            evidence_claim_ids:
              - EC-003
              - EC-004
            risk_ids:
              - R-005
        hidden_risks:
          - Current ownership may differ from 2021 due to transfers, freezes, conversion rights or later financings.
          - Preference overhang could materially affect common-equity value.
        evidence_gaps:
          - Current cap table, share-class rights, SAFEs/notes, warrants, option pool, debt, pledges and share-freeze status.
        follow_up_questions:
          - Provide a fully diluted cap table with liquidation preferences, investor rights, debt, pledges/freezes and post-2021 transfer history.
        table_ids:
          - T-001
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-012
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public sources disclose financing history and some reported profitability but not tax positions, accounting policies, revenue recognition, debt covenants or working-capital arrangements.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Five rounds and a March 2021 D round are publicly reported, but financing terms are absent.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-001
          - finding_id: I.D-F2
            finding: CICC counseling materials show an A-share IPO counseling process, but later public reporting indicates listing attempts stalled.
            evidence_claim_ids:
              - EC-003
              - EC-012
            risk_ids:
              - R-001
        hidden_risks:
          - Revenue recognition across hospital services, management services, platform services and subsidies may differ materially.
          - Tax and医保 settlement liabilities are unknown.
        evidence_gaps:
          - Tax positions, revenue-recognition memos, financing history docs, debt covenant compliance and subsidy accounting support.
        follow_up_questions:
          - Ask finance and auditors to walk through revenue recognition, subsidy accounting, tax exposures and financing documents.
        table_ids:
          - T-001
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-012
          - EC-022
  - chapter_id: II
    title: Products
    chapter_summary: Shulan offers healthcare services through hospitals plus hospital-management/platform and internet/digital services; product-market evidence is strongest for clinical service breadth and weakest for digital adoption and profitability.
    founder_claim_ids:
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-010
      - EC-011
      - EC-013
    risk_ids:
      - R-003
      - R-004
      - R-007
      - R-009
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: The public product set spans self-operated hospital care, hospital management output, platform/digital services, internet-hospital services, clinical trials and AI health tools; pricing, growth and profitability by product are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: The flagship hospital publicly claims tertiary Grade A status, 46 clinical departments, 13 medical-technology departments and four organ-transplant qualifications.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-007
          - finding_id: II.A-F2
            finding: Internet hospital and AI product claims are public, but usage, monetization and clinical validation are not disclosed.
            evidence_claim_ids:
              - EC-008
              - EC-010
            risk_ids:
              - R-009
          - finding_id: II.A-F3
            finding: The product matrix includes health medical services, hospital management services and platform services.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-003
        hidden_risks:
          - Complex clinical services carry license, quality and adverse-event risk.
          - Digital/AI services could underperform or create data/compliance liabilities.
          - New hospital services may require long ramp periods before profitability.
        evidence_gaps:
          - Product-level revenue, gross margin, utilization, clinical outcome metrics, online-hospital traffic, AI adoption and roadmap budget.
        follow_up_questions:
          - Provide product-line P&L, clinical outcome dashboards, product roadmap, online-hospital utilization and AI validation/security package.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-010
          - EC-011
          - EC-013
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence supports patient-service activity and partnership claims, but top customers, payer concentration, reference calls, churn, referral-source economics and supplier contracts remain private.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-017
      - EC-018
      - EC-020
      - EC-022
    risk_ids:
      - R-003
      - R-006
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: For a provider network, “customers” are primarily patients, payers and referring institutions. Public sources do not disclose top 15 customers or payer accounts.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.A-F1
            finding: Official materials report increasing outpatient/emergency and surgery volume and patient satisfaction above 95%, but this is not a top-customer ledger.
            evidence_claim_ids:
              - EC-017
            risk_ids:
              - R-006
        hidden_risks:
          - Self-reported utilization can hide weak payer mix or poor retention.
          - No independent customer/patient reference evidence is public.
        evidence_gaps:
          - Top patients are not appropriate to disclose; request anonymized payer/referral/customer cohorts instead.
        follow_up_questions:
          - Provide anonymized payer concentration, referral-source mix, patient cohorts, NPS/satisfaction methodology and reference-call candidates.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-017
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public sources identify partner-hospital output and international/academic collaboration claims, but contracts, exclusivity and revenue contribution are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: CICC materials mention cooperation with medical institutions in Fujian, Hainan, Chongqing and Zhengzhou.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-006
          - finding_id: III.B-F2
            finding: The flagship hospital claims collaboration with UCLA, Massachusetts General Hospital, University of Hong Kong and other institutions.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-006
        hidden_risks:
          - Partner relationships may be branding only if no active volume, revenue or clinical exchange exists.
          - Management-service contracts may be short-term or low-margin.
        evidence_gaps:
          - Partner contracts, term sheets, active project volumes, revenue contribution and termination rights.
        follow_up_questions:
          - Provide all material partner contracts and a list of active joint clinical/research activities with revenue and renewal status.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-018
          - EC-020
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue concentration by payer, employer, insurer, referral network or patient segment is not public; public materials only disclose facility concentration in older prospectus-cited summaries.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Hangzhou hospital revenue represented a reported 74.0%, 68.3% and 59.7% of total revenue in 2020-2022, indicating facility concentration rather than customer concentration.
            evidence_claim_ids:
              - EC-005
              - EC-017
            risk_ids:
              - R-003
              - R-006
        hidden_risks:
          - Facility concentration may become payer/customer concentration if one医保 geography or hospital drives economics.
          - No 5%+ customer or payer disclosure was available.
        evidence_gaps:
          - Revenue by payer, product/service, geography, referral source and patient segment.
        follow_up_questions:
          - Provide revenue bridge by payer and geography plus all customers/payers above 5% of revenue.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-005
          - EC-017
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public evidence identified severed customer, payer, partner or supplier relationships, but this cannot be verified without contracts and management representations.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Public sources disclose partnerships but not terminations or churn.
            evidence_claim_ids:
              - EC-017
              - EC-018
              - EC-020
            risk_ids:
              - R-006
        hidden_risks:
          - Undisclosed loss of key physicians,医保 status, partner hospitals or suppliers could materially harm performance.
        evidence_gaps:
          - Relationship termination schedule and notices for customers, payers, partners, suppliers and key clinicians.
        follow_up_questions:
          - Provide a two-year lost-account/terminated-partner log with revenue impact and reasons.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-017
          - EC-018
          - EC-020
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Supplier concentration is not public. Likely dependencies include physicians, equipment vendors, drugs/consumables,医保 settlement systems, cloud/IT vendors and construction contractors.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: Official materials list advanced equipment and digital technologies but do not name suppliers or contract terms.
            evidence_claim_ids:
              - EC-007
              - EC-019
            risk_ids:
              - R-007
              - R-009
        hidden_risks:
          - A small number of medical-device, pharma, cloud or construction suppliers could control cost, uptime or compliance.
          - Physician recruitment/retention is a critical provider-network dependency.
        evidence_gaps:
          - Top supplier schedule, spend by supplier, contract terms, vendor concentration, cloud/security agreements and key-physician retention data.
        follow_up_questions:
          - Provide top 20 suppliers by spend and all mission-critical vendor contracts.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-019
          - EC-022
  - chapter_id: IV
    title: Competition
    chapter_summary: Shulan competes in a fragmented but regulated Chinese healthcare market against public tertiary hospitals, broad private networks, specialty private chains and digital-health players.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-016
      - EC-007
      - EC-010
    risk_ids:
      - R-008
      - R-004
      - R-007
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Shulan’s differentiated claim is a broad, high-acuity, research-oriented private-hospital model with digital services; competitors include public hospitals, United Family, Hygeia, AIER and digital-health platforms.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Official and peer pages validate a competitive set spanning broad private hospitals, oncology chains and ophthalmology chains.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-008
          - finding_id: IV.A-F2
            finding: Shulan’s clinical breadth and transplant qualifications are differentiators but also create regulatory and quality exposure.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-007
        hidden_risks:
          - Public hospitals may dominate complex-care referrals and医保 trust.
          - Specialty chains may outperform in focused service-line scale and margins.
          - Digital platforms may compete for front-door patient relationships.
        evidence_gaps:
          - Local market share by service line, referral-source win/loss, physician productivity and competitor pricing benchmarks.
        follow_up_questions:
          - Commission a market study covering Hangzhou/Zhejiang private and public peers, service-line share and referral flows.
        table_ids:
          - T-009
          - T-010
