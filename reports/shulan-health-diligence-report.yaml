diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, notes, tax, AR aging, debt and site-level P&Ls.
    why_it_matters: Public financial numbers are secondary and do not prove earnings quality or cash runway.
    suggested_source_or_request: Audited financials, management accounts, debt schedule and auditor workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, liquidation preferences, options, pledges/freezes and investor rights.
    why_it_matters: Headline valuation may not translate to investable common-equity value.
    suggested_source_or_request: Cap table, charter, shareholder agreements, option ledger and registry/court verification.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-line revenue, gross margin, utilization, outcomes and digital/AI adoption.
    why_it_matters: Public product presence does not prove profitable or safe service-line economics.
    suggested_source_or_request: Product/service P&L, clinical KPI dashboard, online-hospital analytics and AI validation files.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Payer/customer/referral concentration and patient cohort retention.
    why_it_matters: Revenue quality and reimbursement risk cannot be underwritten without concentration and cohort data.
    suggested_source_or_request: Anonymized payer/referral/customer list,医保 settlement data and patient cohorts.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top suppliers, vendor contracts, key-physician agreements and cloud/software dependencies.
    why_it_matters: Provider operations can be fragile if key vendors or clinicians are concentrated.
    suggested_source_or_request: Top-20 supplier spend, critical vendor contracts and key-clinician retention agreements.
    priority: medium
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Local market share, win/loss, referral flows and competitor pricing by service line.
    why_it_matters: Public peer pages do not quantify competitive advantage.
    suggested_source_or_request: Commissioned market study and internal referral/conversion data.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales/marketing funnel, CAC, pipeline, quota attainment and channel ROI.
    why_it_matters: Growth may not be repeatable if dependent on brand or founder relationships.
    suggested_source_or_request: Marketing analytics, CRM/pipeline export and sales compensation plan.
    priority: medium
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D roadmap, budget, clinical validation, AI governance, cybersecurity and IP assignments.
    why_it_matters: Digital-health claims can create unpriced technical and regulatory risk.
    suggested_source_or_request: R&D portfolio, product analytics, security reports, model governance and IP assignment schedules.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, hiring plan, compensation, employee relations and turnover by facility/function.
    why_it_matters: Clinical quality and hospital ramp depend on staffing stability.
    suggested_source_or_request: HRIS export, attrition dashboard and key-person retention plans.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Court docket, freeze order and full litigation/arbitration schedule.
    why_it_matters: Reported equity freeze could affect control, financing and IPO readiness.
    suggested_source_or_request: PRC counsel docket search and management legal schedule.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Clinical licenses, internet-hospital approvals, IP/trademark/patent/software/data ownership.
    why_it_matters: Healthcare and digital operations depend on licenses and ownership of regulated assets.
    suggested_source_or_request: License register, IP register, software ownership and data-processing agreements.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts and related-party transactions.
    why_it_matters: Contracts may include hidden obligations, termination rights or affiliate economics.
    suggested_source_or_request: Material contract index and related-party schedule.
    priority: high
