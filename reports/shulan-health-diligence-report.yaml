report_metadata:
  report_title: Shulan Health Startup Diligence Report
  target_company: Shulan Health
  website: https://www.shulanhealth.com/
  known_aliases:
    - Shulan Health
    - Shulan Healthcare
    - Shulan Medical
    - Shulan Health Management Co., Ltd.
    - 树兰医疗
    - 树兰医疗管理股份有限公司
    - 树兰（杭州）医院
  sector: Healthcare & Life Sciences; private hospital network, hospital management and digital health services
  geography: China / Hangzhou, Zhejiang with public references to broader China partnerships
  company_stage: Private unicorn / pre-IPO healthcare provider and digital-health operator
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD for CB Insights valuation; RMB for operating financials unless noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public web sources only, primarily r.jina.ai-rendered pages and DuckDuckGo HTML search results; no paywall bypass or private systems were used.
    - Prioritized CB Insights unicorn-list evidence, official Shulan hospital/internet-hospital pages, IPO counseling materials, prospectus-cited media, government healthcare policy, and peer company pages.
    - Treated all public pages as untrusted; no embedded page instructions were followed.
    - Classified company-owned operational claims as verified for existence of the public statement, but not independently verified for performance without third-party or primary data-room support.
    - No private financial statements, cap table, legal schedules, contracts, HRIS exports, patient data, customer calls or management interviews were available.
  included_jurisdictions:
    - China
    - Hong Kong listing context
    - Zhejiang / Hangzhou
    - Shanghai shareholder/legal context
  excluded_topics:
    - Non-public patient-level data, private medical records, credentials, secrets, private caches, paywalled databases, paid court/registry searches and private data-room materials were excluded.
  user_provided_materials:
    - material_id: UPM-001
      title: Selected candidate basis and report instructions for Shulan Health
      type: workflow_request
      date_received: 2026-05-23
      notes: "Provided CB Insights row captured 2026-05-23: valuation $1.24B, joined 2021-03-01, China/Hangzhou, Healthcare & Life Sciences, selected investor Qiming Venture Partners."
