executive_summary:
  overall_assessment: Starburst Data appears to be an active private U.S. enterprise-data unicorn based on CB Insights/Wikipedia screening and Starburst’s own 2022 $250M Series D announcement at $3.35B. Public evidence supports product/category, pricing, customer-logo/case-study, partner, technical, security and hiring signals. Core underwriting remains unresolved because financial quality, current valuation, customer concentration, retention, cap table, contracts, security reports, insurance and complete legal/regulatory records are private.
  investment_or_diligence_thesis: Starburst has credible public unicorn-list support and a differentiated Trino-based data-access thesis, but diligence must prove private revenue scale, retention, workload economics and defensibility versus Snowflake, Databricks, Dremio and cloud-native query engines.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support Starburst Data's private unicorn valuation anchor of $3.35B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company materials support active product/platform positioning in Data lakehouse, federated analytics, Trino-based enterprise data platform and AI data access.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Public customer or logo evidence exists but requires revenue-quality validation.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: Private ARR, retention and cloud-cost unit economics are undisclosed
    - risk_id: R-003
      summary: Open-source and hyperscaler competition may pressure monetization
    - risk_id: R-004
      summary: Customer-logo evidence does not disclose concentration or renewal health
  key_evidence_gaps:
    - Audited financial statements, ARR/bookings, gross margin, cash/debt and working-capital detail
    - Cap table, preferences, option pool, debt and investor rights
    - Top-customer ARR, renewal, churn and concentration
    - CAC, payback, quota attainment and sales-cycle evidence
    - Roadmap, architecture, security and incident history
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline valuation.
    - Request top-customer contracts/cohorts and independent customer references.
    - Have counsel and security specialists review legal, privacy, security, regulatory and IP artifacts.
    - Benchmark win/loss, pricing and renewal evidence against direct competitors.
