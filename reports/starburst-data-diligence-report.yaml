report_metadata:
  report_title: Starburst Data Startup Diligence Report
  target_company: Starburst Data
  website: https://www.starburst.io/
  known_aliases:
    - Starburst
    - Starburst Data, Inc.
  sector: Enterprise data analytics, open data lakehouse, federated SQL query and AI-ready data platforms
  geography: United States / Boston, MA with global enterprise markets
  company_stage: Private unicorn / venture-backed growth-stage enterprise software company
  research_date: 2026-05-27
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used startup-diligence-research workflow at standard depth for Starburst Data.
    - Prioritized CB Insights/Wikipedia unicorn-list evidence, Starburst funding/product/pricing/customer/partner/security/legal/careers pages, Trino public technical sources, competitor pages, CourtListener and trademark sources.
    - Treated company-owned statements as evidence that public claims exist; private financial, customer, legal and security records are still required.
    - No private data room, management interview, customer reference, SOC report or counsel memo was available.
  included_jurisdictions:
    - United States
    - United States where relevant to investors/customers/IP
    - Global markets referenced by public company materials
  excluded_topics:
    - Private financial statements, contracts, cap table, HRIS, customer calls, SOC reports, litigation docket exports and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-27
      notes: No pitch deck, financial model, data room or founder responses were provided.
