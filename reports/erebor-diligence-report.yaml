    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Named customer and concentration schedule
    why_it_matters: Assess demand, concentration, related-party exposure, and references.
    suggested_source_or_request: "Company sales/ops: customer ledger, contracts, balances, references."
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Critical vendor inventory and supplier contracts
    why_it_matters: Assess operational resilience and vendor concentration.
    suggested_source_or_request: "Operations/security: vendor inventory, contracts, SOC reports, exit plans."
