  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss and competitive benchmarks
    why_it_matters: Underwrite market share and differentiation.
    suggested_source_or_request: "Sales/product: CRM, lost-deal notes, pricing comparison, battlecards."
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.C
    missing_information: GTM funnel metrics and affiliated-customer controls
