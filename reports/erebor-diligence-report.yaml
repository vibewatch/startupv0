risk_register:
  - risk_id: R-001
    risk_title: Public financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: No public audited financials, deposits, loans, revenue, unit economics, backlog, AR aging, burn, or projections.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-012
      - EC-020
    mitigation_or_diligence_request: Require audited financials, management accounts, deposit/loan balances, revenue by product, burn, runway, and projections.
  - risk_id: R-002
    risk_title: De novo bank execution and capital-condition risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Erebor must execute a regulated de novo bank launch while satisfying OCC/FDIC conditions and capital requirements.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - VIII.G
    evidence_claim_ids:
      - EC-005
      - EC-006
    mitigation_or_diligence_request: Review conditions tracker, capital-call agreement, regulatory correspondence, and launch milestones.
  - risk_id: R-003
    risk_title: Digital-asset compliance and operational risk
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Virtual-currency market participants and gas-fee holdings heighten BSA/AML, sanctions, custody, fraud, and operational-control risk.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.A
      - VIII.G
    evidence_claim_ids:
      - EC-004
      - EC-006
    mitigation_or_diligence_request: Request BSA/AML, sanctions, digital-asset, custody/vendor, and transaction-monitoring controls.
  - risk_id: R-004
    risk_title: Valuation versus unproven operating traction
    risk_category: financing
    severity: high
    likelihood: unknown
    description: $4.35B valuation is public, but revenue, deposits, credit performance, and customer adoption are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-012
    mitigation_or_diligence_request: Benchmark valuation against verified operating metrics and comparable fintech/bank multiples.
  - risk_id: R-005
    risk_title: Unverified demand and customer concentration
    risk_category: customer
    severity: medium
    likelihood: high
    description: Target segments are public but named customers, concentration, churn, and references are not.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - V.C
    evidence_claim_ids:
      - EC-012
      - EC-019
    mitigation_or_diligence_request: Request customer ledger, pipeline, concentration, churn, affiliated-customer flags, and reference calls.
  - risk_id: R-006
    risk_title: Political and regulatory-process scrutiny
    risk_category: reputational
    severity: high
    likelihood: medium
    description: Senate oversight allegations could create reputational, legal, and supervisory burden even if not substantiated.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.G
    evidence_claim_ids:
      - EC-014
      - EC-016
    mitigation_or_diligence_request: Request counsel analysis, OCC response, congressional correspondence, and board discussion materials.
  - risk_id: R-007
    risk_title: Key-person and regulated-operations team risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Leadership is public but formal org, retention, references, and turnover are not.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.A
      - VII.C
      - VII.G
    evidence_claim_ids:
      - EC-010
      - EC-011
    mitigation_or_diligence_request: Request org chart, succession, background checks, compensation, and turnover metrics.
  - risk_id: R-008
    risk_title: Product and pricing opacity
    risk_category: product
    severity: medium
    likelihood: high
    description: Public sources disclose categories but not live SKUs, pricing, rates, underwriting, SLAs, or product usage.
    impacted_chapter_ids:
      - II
      - IV
    impacted_section_ids:
      - II.A
      - IV.A
    evidence_claim_ids:
      - EC-004
      - EC-015
    mitigation_or_diligence_request: Request product catalog, pricing, customer contracts, usage, and win/loss analysis.
  - risk_id: R-009
    risk_title: Bank-grade privacy, cyber, and data-security exposure
    risk_category: technical
    severity: high
    likelihood: medium
    description: Terms indicate sensitive financial, identity, transaction, and employment data collection.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.E
    evidence_claim_ids:
      - EC-009
    mitigation_or_diligence_request: Request SOC/ISO evidence, FFIEC cyber assessment, pen tests, vendor-risk inventory, incident history, and cyber insurance.
  - risk_id: R-010
    risk_title: CRA and branchless-community compliance risk
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Branchless national model requires clear CRA/community-benefit implementation and evidence.
    impacted_chapter_ids:
      - V
      - VIII
    impacted_section_ids:
      - V.A
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-007
      - EC-018
    mitigation_or_diligence_request: Review CRA plan implementation, assessment-area rationale, LMI/community-development activity, and OCC feedback.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
