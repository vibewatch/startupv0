executive_summary:
  overall_assessment: "Eligible public-source unicorn report: CB Insights lists Erebor at a $4.35B valuation and public OCC/FDIC/company records show an active, federally insured de novo bank. Investment diligence should remain gated on private financial, customer, regulatory, and legal data."
  investment_or_diligence_thesis: Erebor could become a regulated banking platform for AI, defense, payment, investment, and virtual-currency-adjacent customers after the post-SVB startup-banking gap; public support rests on regulatory approvals and investor backing, not disclosed operating traction.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Erebor as a $4.35B U.S. Financial Services unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: OCC and FDIC public documents verify national-bank charter/deposit-insurance approvals subject to conditions.
      evidence_claim_ids:
        - EC-003
        - EC-006
        - EC-007
    - founder_claim_id: FC-004
      summary: Regulator documents verify the intended deposit/lending and innovation-economy/virtual-currency target-market strategy.
      evidence_claim_ids:
        - EC-004
        - EC-006
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: No public financials or operating metrics.
    - risk_id: R-002
      summary: De novo bank launch and capital-condition execution risk.
    - risk_id: R-006
      summary: Political/regulatory-process scrutiny from Senate oversight letter.
    - risk_id: R-003
      summary: Digital-asset compliance and operational risk.
    - risk_id: R-004
      summary: High valuation without public traction proof.
  key_evidence_gaps:
    - Audited financials, projections, cap table, and regulatory capital model.
    - Customer/deposit/loan concentration, pipeline, churn, and references.
    - Product pricing, security architecture, vendor stack, and usage metrics.
    - Regulator correspondence, conditions tracker, counsel letters, and litigation/IP searches.
    - Formal org chart, compensation, turnover, and background checks.
  recommended_next_steps:
    - Do not rely on public valuation alone; request full financing and operating data room.
    - Prioritize regulator/counsel review of OCC/FDIC conditions and Senate inquiry.
    - Run customer-reference diligence and deposit/loan concentration analysis.
    - Complete bank-grade cyber/vendor/BSA/AML/CRA diligence.
    - Benchmark valuation against deposits, NIM/fee revenue, credit quality, and comparable fintech/bank metrics.
