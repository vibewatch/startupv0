    suggested_source_or_request: "Counsel/compliance: regulator correspondence, exam findings, tracker."
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation/enforcement/oversight file
    why_it_matters: Verify absence of material claims and assess Senate-letter risk.
    suggested_source_or_request: "Counsel: litigation schedule, PACER/state searches, demand letters, correspondence."
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.D
