report_metadata:
  report_title: Erebor Startup Diligence Research Report
  target_company: Erebor Bank, N.A.
  website: https://erebor.bank/
  known_aliases:
    - Erebor
    - Erebor Bank
    - Erebor Bank, NA
    - Erebor Bank, N.A.
    - Erebor Group, Inc.
    - EGI
    - Atticus Digital, Inc.
  sector: Financial Services / de novo national bank / digital-asset-adjacent banking
  geography: United States; main office Columbus, Ohio; CB Insights city San Francisco; administrative offices New York, New York and Newport Beach, California
  company_stage: Private unicorn; newly chartered FDIC-insured de novo national bank
  research_date: 2026-06-13
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company-owned public pages and terms
    - Primary OCC and FDIC public records
    - Market database/unicorn tracker
    - Independent news accessible through public readers
    - LinkedIn/Ashby hiring signals
    - Competitor-owned public pages
    - Scoped public web searches for IPO/acquisition/shutdown/litigation/IP red flags
  included_jurisdictions:
    - United States federal banking regulation
    - Ohio
    - California
    - New York
  excluded_topics:
    - Non-public customer references
    - Private data-room materials
    - Paywalled/inaccessible sources
    - Non-public regulator correspondence
    - Account-opening tests requiring credentials
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights unicorn tracker candidate row for Erebor
      type: public tracker excerpt
      date_received: 2026-06-13
      notes: User supplied valuation, date joined, geography, industry, and select investors from CB Insights/Jina Reader scrape.
