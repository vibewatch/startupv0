      - EC-014
      - EC-018
    mitigation_or_diligence_request: Require board-approved pivot memo, current business plan, active backlog, customer consents, and impairment/asset write-down analysis.
  - risk_id: R-002
    risk_title: Repeated technical execution failures and incomplete public qualification evidence
    risk_category: technical
    severity: high
    likelihood: high
    description: RS1 Flight 1 failed shortly after liftoff and the Flight 2 static-fire anomaly destroyed/buckled the vehicle; Long Wall products depend on related propulsion/GSE capabilities.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
