report_metadata:
  report_title: ABL Space Systems / Long Wall Public Diligence Research Report
  target_company: ABL Space Systems
  website: https://ablspacesystems.com/
  known_aliases:
    - ABL Space Systems Co
    - ABL Space Systems Company
    - ABL
    - Long Wall
    - Long Wall Company
  sector: Aerospace, launch vehicles, deployable ground systems, missile defense
  geography: United States; public footprint includes California, Alaska/launch sites, and allied/international site concepts
  company_stage: Private venture-backed unicorn-scale company; public evidence indicates pivot/rebrand to Long Wall defense focus
  research_date: 2026-05-21
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public company websites and news/blog archives for product and management claims
    - SEC EDGAR Form D filings for financing evidence
    - Trade press and market databases for independent context
    - Professional profiles for directional personnel signals
    - Competitor product pages for benchmark context
    - No confidential company, customer, supplier, counsel, or data-room materials used
  included_jurisdictions:
    - United States federal SEC/FAA public context
    - California public corporate/operations context where available
    - International/allied launch-site mentions only where cited by ABL
  excluded_topics:
    - Classified defense program details
    - Paid court docket retrieval beyond public search snippets
    - Non-public customer calls and management interviews
    - Exhaustive patent/trademark database search
    - Private social media or personal data beyond public professional profiles
  user_provided_materials: []
