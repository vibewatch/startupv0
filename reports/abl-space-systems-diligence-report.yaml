diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, AR aging, revenue/gross profit by product/channel/customer, and current backlog.
    why_it_matters: Cannot assess burn, margin, customer concentration, runway, or post-pivot financial viability.
    suggested_source_or_request: Request CFO data room for FY2023-FY2025 and YTD 2026.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, debt, warrants, investor rights, option plan, and off-balance-sheet obligations.
    why_it_matters: Public Form Ds do not show ownership economics or control constraints.
    suggested_source_or_request: Request cap table and financing documents from company counsel/CFO.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Current customer-by-customer backlog, cancellations, refunds, and signed Long Wall contracts/LOIs.
    why_it_matters: Historical launch manifest may be stale and Long Wall customer traction is not public.
    suggested_source_or_request: Request contract schedule and customer confirmations.
    priority: high
  - gap_id: G-004
    chapter_id: VI
    section_id: VI.B
    missing_information: Technical qualification, mishap corrective actions, TRL, and test roadmap for RSX/Cyclops/Ironwood.
    why_it_matters: Repeated technical failures create high execution risk for defense products.
    suggested_source_or_request: Request independent technical diligence package and test data.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: FAA/regulatory correspondence, licenses, Flight 2 investigation status, export-control and defense compliance records.
    why_it_matters: Regulatory gating and compliance failures could stop launch/test operations or defense contracts.
    suggested_source_or_request: Request regulatory counsel and compliance data room.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Payroll census, turnover, layoffs, retention grants, and key-person employment agreements.
    why_it_matters: Pivot/layoffs may impair execution and increase litigation risk.
    suggested_source_or_request: Request HR data room and counsel employment schedule.
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Verified litigation docket and counsel assessment for the possible Jose Barbosa employment matter and all threatened claims.
    why_it_matters: Potential liabilities and employee-relations issues are not verifiable from search snippets.
    suggested_source_or_request: Request litigation schedule and docket materials from counsel.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, claims, exclusions, deductibles, and recovery status for vehicle/pad events and employment claims.
    why_it_matters: Insurance recovery or exclusions materially affect downside loss and runway.
    suggested_source_or_request: Request insurance schedule and broker/loss-run reports.
    priority: high
