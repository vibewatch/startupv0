risk_register:
  - risk_id: R-001
    risk_title: Strategic pivot/rebrand may obsolete legacy ABL launch thesis
    risk_category: market
    severity: high
    likelihood: high
    description: ABL/Long Wall public evidence shows a pivot away from commercial launch into missile defense; legacy customer manifest, product roadmap, and valuation may no longer support the current business.
    impacted_chapter_ids:
      - I
      - II
      - III
      - V
      - VI
    impacted_section_ids:
      - I.B
      - II.A
      - III.A
