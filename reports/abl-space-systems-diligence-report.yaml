      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-004
      - EC-009
      - EC-024
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: RS1, E2, and GS0 have detailed company-published specs; Long Wall lists Cyclops, RSX, and Ironwood. Public evidence does not verify current customers, market share, growth, cost structure, or profitability for any product.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: RS1/E2/GS0 public specs are detailed enough to map product architecture, but Flight 1 and Flight 2 outcomes undermine reliability proof.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-004
              - EC-011
              - EC-012
            risk_ids:
              - R-002
          - finding_id: II.A-F2
            finding: Long Wall products are publicly named and tied to ABL R&D, but signed customer evidence and TRLs are not public.
            evidence_claim_ids:
              - EC-009
              - EC-018
              - EC-024
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Company may be mid-transition from launch vehicles to defense products with unproven technical/customer milestones.
        evidence_gaps:
          - Current SKU list; roadmap; product P&L; market share; test qualification; customer acceptance; pricing and COGS.
        follow_up_questions:
          - Provide product-level gross margin, TRL/qualification evidence, signed customer requirements, and post-pivot roadmap.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-009
          - EC-024
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public records show strong historical customer and government-award signals, but customer revenue, concentration, and current backlog after the commercial-launch exit are not publicly verifiable. Long Wall signed-customer disclosure is absent in the public trade-press source reviewed.
