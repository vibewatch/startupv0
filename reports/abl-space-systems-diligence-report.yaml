executive_summary:
  overall_assessment: ABL Space Systems qualifies for a public-evidence standard diligence report as a private, active, historically unicorn-valued U.S. launch/space systems company, but the investable target should be treated as ABL Space Systems / Long Wall because public evidence shows a material 2024-2025 pivot from commercial launch toward missile-defense products. Historical financing and product claims are well documented; current revenue, backlog, cap table, and defense traction are not publicly verifiable.
  investment_or_diligence_thesis: "The strongest public thesis is that ABL’s transportable launch/GSE/propulsion R&D may have reusable value in Long Wall defense applications where government demand could be less price-sensitive than commercial small launch. The counter-thesis is severe: repeated RS1 failures, lack of public current customers, and opaque financial runway may mean the pivot is a salvage/repositioning effort rather than a de-risked growth company."
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Historical unicorn financing is verified by public release, SpaceNews, and SEC Form Ds, including the 2021 $200M/$2.4B valuation claim.
      evidence_claim_ids:
        - EC-006
        - EC-008
    - founder_claim_id: FC-001
      summary: RS1/GS0 technical positioning and specs are extensively documented by company sources.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-004
    - founder_claim_id: FC-006
      summary: Flight 1 mishap and FAA closure with corrective actions are publicly described by ABL.
      evidence_claim_ids:
        - EC-011
        - EC-022
    - founder_claim_id: FC-004
      summary: Long Wall publicly states it builds on seven years of ABL R&D and offers Cyclops, RSX, and Ironwood.
      evidence_claim_ids:
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: The commercial launch thesis and 2021 manifest may be obsolete after the Long Wall pivot.
    - risk_id: R-002
      summary: Two public RS1 campaign failures/anomalies create high technical and regulatory execution risk.
    - risk_id: R-003
      summary: Current revenue, backlog, customer concentration, and signed Long Wall customers are not publicly verifiable.
    - risk_id: R-004
      summary: Cap table, debt, runway, and current valuation are private despite large historical Form D financings.
  key_evidence_gaps:
    - Audited financials and current management accounts are unavailable publicly.
    - Current signed backlog, customer cancellations/refunds, and Long Wall customer traction are unavailable publicly.
    - Full cap table, financing terms, debt, option pool, and investor control rights are unavailable publicly.
    - Technical qualification, Flight 2 investigation closure, and Long Wall product TRLs are unavailable publicly.
    - Litigation, insurance, regulatory, export-control, and material-contract schedules require counsel/company data room.
  recommended_next_steps:
    - Treat this as a pivot diligence, not a simple legacy launch-company diligence.
    - Prioritize company data-room requests for financial runway, active contracts, technical corrective actions, and cap table.
    - Conduct customer/reference calls with remaining launch customers and any Long Wall defense prospects.
    - Run independent propulsion/GSE and safety/regulatory technical diligence before relying on product claims.
    - Have counsel verify litigation, FAA/regulatory, insurance, export-control, and material-contract exposure.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence confirms historical unicorn-scale financing and SEC Form D activity, but audited financials, revenue, backlog, cap table, debt, tax, AR, and projections are not publicly verifiable. The 2024-2025 commercial-launch exit makes current financial diligence a gating issue.
    founder_claim_ids:
      - FC-002
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-006
      - EC-007
      - EC-008
      - EC-019
    risk_ids:
      - R-003
      - R-004
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or management financial statements were found publicly. SEC Form D filings show financing activity and declined revenue disclosure, not operating performance. Legacy backlog claims are stale without current confirmation.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: No public audited income statement, balance sheet, cash flow, footnotes, AR aging, or revenue-by-product schedule was found.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-003
              - R-004
          - finding_id: I.A-F2
            finding: 2023 Form D declined to disclose revenue range while reporting $40.65M sold of a $100M offering.
            evidence_claim_ids:
              - EC-007
              - EC-019
            risk_ids:
              - R-003
              - R-004
        hidden_risks:
          - Cash burn, customer refunds, launch-failure costs, and defense-pivot expenses may be hidden.
        evidence_gaps:
          - Audited financial statements for FY2023-FY2025/YTD 2026; management accounts; AR aging; revenue/gross profit by product/channel/geography; current backlog by customer.
        follow_up_questions:
          - Provide monthly financial statements and budget-vs-actual for the last 36 months, including launch-failure costs and any impairment charges.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-007
          - EC-019
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public projections were found. Any model must be rebuilt around Long Wall defense programs, not the stale RS1 commercial launch manifest.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: The commercial-launch exit and Long Wall rebrand make prior launch-market projections unreliable unless management provides a bridge.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-001
              - R-003
          - finding_id: I.B-F2
            finding: Facilities, propulsion testing, and defense product maturation imply meaningful capex and working-capital needs, but no public budget exists.
            evidence_claim_ids:
              - EC-005
              - EC-024
            risk_ids:
              - R-004
        hidden_risks:
          - Management may be using defense pipeline probabilities that are not public and may depend on government budget cycles.
        evidence_gaps:
          - Quarterly 3-year projections by product/customer/channel; scenario assumptions; capex/working-capital plan; external financing assumptions.
        follow_up_questions:
          - Provide base/downside/upside plan, funded backlog, pipeline probability methodology, and cash runway covenant model.
        table_ids:
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-018
          - EC-019
          - EC-024
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Historical financing is public, but current shares, preferences, option pool, warrants/notes, debt, investor rights, and off-balance-sheet liabilities are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights supports private/alive/unicorn-scale eligibility, but capitalization terms are absent.
            evidence_claim_ids:
              - EC-001
            risk_ids:
              - R-004
          - finding_id: I.C-F2
            finding: Form D offerings disclose amounts, not ownership, liquidation preferences, debt, or investor control rights.
            evidence_claim_ids:
              - EC-008
              - EC-019
            risk_ids:
              - R-004
        hidden_risks:
          - A down round, recapitalization, investor consent constraint, or debt covenant could be hidden.
        evidence_gaps:
          - Fully diluted cap table; debt/warrant/note schedule; preferred rights; investor consents; off-balance-sheet obligations.
        follow_up_questions:
          - Provide cap table and all financing documents from 2020 onward, including any 2023/2024 bridge, loan, SAFE, or recapitalization terms.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-008
          - EC-019
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is partially verifiable through SEC filings and the 2021 financing release. Tax, accounting policies, and revenue recognition are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: 2020-2023 Form Ds and the 2021 press release document a financing trail including the $2.4B reported valuation.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-008
            risk_ids:
              - R-004
          - finding_id: I.D-F2
            finding: No tax positions, NOLs, revenue-recognition policy, or accounting policy memo was found.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-003
        hidden_risks:
          - Revenue recognition for launch/defense milestone contracts, refunds, and failed missions could materially affect financials.
        evidence_gaps:
          - Tax returns/NOL schedule; accounting policies; revenue-recognition memos; financing history with investors, percentage ownership, and basis.
        follow_up_questions:
          - Provide tax and accounting memos plus a board-approved financing history reconciling Form Ds to cap table.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-019
  - chapter_id: II
    title: Products
    chapter_summary: ABL’s legacy RS1/GS0 product descriptions are well documented by company sources, and Long Wall now presents Cyclops, RSX, and Ironwood as defense products built on ABL R&D. Product-market fit, unit economics, and successful operational qualification remain unverified publicly.
    founder_claim_ids:
