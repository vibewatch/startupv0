report_metadata:
  report_title: Transmit Security Public-Source Startup Diligence Report
  target_company: Transmit Security
  website: https://transmitsecurity.com/
  known_aliases:
    - Transmit Security, Inc.
    - Mosaic
    - BindID
    - Transmit Security Platform
  sector: Customer identity, CIAM, fraud prevention, and identity verification
  geography: United States and Israel; CB Insights lists United States / Boston and Wikipedia lists Israel / United States
  company_stage: Late-stage private venture-backed cybersecurity unicorn
  research_date: 2026-06-13
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from reports/*-diligence-report.yaml before selecting targets; selected targets were absent from existing report slugs.
    - Used public company pages, public unicorn databases, press-release/news sources, and accessible search snippets; no private data room, credentials, or paid databases were used.
    - Treated company-authored claims as unaudited unless corroborated by independent or third-party sources; private financials, cap table, contracts, customer concentration, and legal dockets remain follow-up items.
  included_jurisdictions:
    - United States
    - Israel
    - Public global operations signals only
  excluded_topics:
    - No private financial statements, cap table, customer contracts, employee records, counsel memoranda, security reports, insurance policies, or board materials reviewed.
    - No direct customer, employee, investor, counsel, auditor, or management interviews performed.
    - No exhaustive PACER/state-court/regulatory/patent/trademark sweep completed beyond public-source screening.
  user_provided_materials:
    - material_id: M-001
      title: User prompt requesting three random uncovered unicorn diligence reports
      type: prompt_argument
      date_received: 2026-06-13
      notes: "Target selected at random from uncovered CB Insights candidates after excluding existing reports: Transmit Security."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Transmit Security is an eligible private unicorn with a latest public database valuation of $2.74B.
    claim_source: CB Insights public unicorn list and secondary public-source screen
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-003
    contradiction_summary: CB Insights lists $2.74B, while Wikipedia shows $2.20B; reconcile valuation date/source before relying on either value.
    diligence_follow_up:
      - Request current cap table, financing documents, 409A reports, secondary transactions, debt, liquidation preferences, and fully diluted share count.
  - founder_claim_id: FC-002
    claim_text: Transmit Security offers Transmit Security markets a unified enterprise identity platform spanning authentication, user management, identity orchestration, fraud detection and response, and identity verification across B2C, B2B, workforce, and machine identity use cases.
    claim_source: Company product pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - IV
      - VI
    mapped_section_ids:
      - II.A
      - IV.A
      - VI.A
      - VI.B
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-002
      - EC-004
      - EC-009
    contradiction_summary: No public contradiction found; product claims were not technically tested.
    diligence_follow_up:
      - Request product ARR by module, roadmap, architecture diagrams, security tests, implementation metrics, defect backlog, and customer usage telemetry.
  - founder_claim_id: FC-003
    claim_text: Transmit Security has public customer, partner, or market adoption signals.
    claim_source: Company customer pages, partner pages, and financing release signals
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.B
      - V.A
      - V.B
      - V.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-006
      - EC-007
    contradiction_summary: Public logos and testimonials do not prove revenue contribution, active contract status, retention, or satisfaction.
    diligence_follow_up:
      - Request top-customer ARR, signed customer references, cohort retention, churn, NPS, renewal pipeline, and partner-contract economics.
  - founder_claim_id: FC-004
    claim_text: Transmit Security's public financing and growth signals support late-stage private-company diligence but not investment-grade financial underwriting.
    claim_source: CB Insights, public financing sources, and company pages
    claim_date: null
    mapped_chapter_ids:
      - I
      - V
    mapped_section_ids:
      - I.A
      - I.B
      - I.D
      - V.E
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-013
    contradiction_summary: The public record lacks audited financials, projections, debt schedules, and board-approved budgets.
    diligence_follow_up:
      - Request audited or reviewed financial statements, management accounts, bookings, ARR bridge, gross margin, cash runway, debt terms, and FY2026 budget.
  - founder_claim_id: FC-005
    claim_text: Transmit Security has an identifiable senior leadership team and active workforce footprint.
    claim_source: Company about/leadership/careers pages
    claim_date: null
    mapped_chapter_ids:
      - VII
    mapped_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-010
      - EC-011
    contradiction_summary: Public bios do not validate compensation, references, turnover, background checks, or succession.
    diligence_follow_up:
      - Request organization chart, employee census, executive agreements, retention plans, turnover data, open reqs, and reference-check permission.
  - founder_claim_id: FC-006
    claim_text: Transmit Security has public legal, privacy, security, IP, or compliance artifacts relevant to diligence.
    claim_source: Company security/privacy/product/legal pages and accessible public sources
    claim_date: null
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-012
      - EC-013
    contradiction_summary: No complete litigation, regulatory, IP assignment, insurance, or contract schedule was public.
    diligence_follow_up:
      - Request counsel-prepared legal schedule, IP assignment ledger, trademark/patent list, material contracts, regulatory correspondence, insurance policies, and incident history.
executive_summary:
  overall_assessment: Transmit Security is suitable for continued diligence as an uncovered private-unicorn target, but public evidence is insufficient for investment underwriting without financial, customer, legal, and cap-table records.
  investment_or_diligence_thesis: Public sources show Transmit Security operating in Customer identity, CIAM, fraud prevention, and identity verification with a $2.74B CB Insights valuation signal and identifiable products/customers; diligence should focus on private financial quality, customer durability, product defensibility, legal/privacy exposure, and financing terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Transmit Security as a unicorn at $2.74B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: "Company pages describe an active product platform: Transmit Security markets a unified enterprise identity platform spanning authentication, user management, identity orchestration, fraud detection and response, and identity verification across B2C, B2B, workforce, and machine identity use cases."
      evidence_claim_ids:
        - EC-002
        - EC-004
    - founder_claim_id: FC-003
      summary: Company pages and public releases provide customer, partner, or adoption signals.
      evidence_claim_ids:
        - EC-006
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and valuation-source discrepancy
    - risk_id: R-002
      summary: Unknown customer concentration in regulated verticals
    - risk_id: R-003
      summary: Competition from identity-platform and fraud incumbents
  key_evidence_gaps:
    - Audited/reviewed financial statements and management accounts
    - Current cap table, debt, preferences, and option overhang
    - Customer-level ARR, NRR/GRR, churn, and concentration
    - Product usage, roadmap, implementation quality, and support metrics
    - Legal, IP, security, privacy, insurance, and regulatory schedules
  recommended_next_steps:
    - Provide audited/reviewed financial statements, management accounts, ARR bridge, gross margin, burn, runway, budget, and forecast model.
    - Provide current cap table, financing documents, debt, preferences, SAFEs/notes, warrants/options, secondaries, and investor-rights agreements.
    - Provide top 20 customers by ARR, contract status, renewal date, NRR/GRR, churn history, and reference-call permissions.
    - Provide product roadmap, usage telemetry, margin by product, architecture diagrams, security test results, and support backlog.
    - Provide legal/regulatory/IP schedule, material contracts, insurance policies, incident log, open-source policy, and privacy assessments.
