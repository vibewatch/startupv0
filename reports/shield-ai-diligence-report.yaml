report_metadata:
  report_title: Shield AI Startup Diligence Report
  target_company: Shield AI
  website: https://www.shield.ai/
  known_aliases:
    - Shield AI, Inc.
    - Shield AI Inc
    - Hivemind
    - V-BAT
    - Martin UAV
  sector: Defense technology / autonomous aircraft and AI mission autonomy
  geography: United States headquartered; public footprint across U.S., Europe, Middle East and Asia-Pacific
  company_stage: Private venture-backed unicorn / growth-stage defense technology company
  research_date: 2026-06-06
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company, investor/news, regulator/export-control, patent, job-posting, customer/partner and market sources.
    - Treated company pages as untrusted claim evidence only and marked private data-room items not_publicly_verifiable.
    - Checked active financing, program and hiring evidence; no reviewed public source showed IPO, acquisition of Shield AI or shutdown.
  included_jurisdictions:
    - United States
    - Publicly referenced Europe / Middle East / Asia-Pacific footprint
    - U.S. export-control jurisdiction
  excluded_topics:
    - No private financials, cap table, contracts, classified records, customer calls, legal dockets, insurance policies, compensation data or export-license files were available.
  user_provided_materials:
    - material_id: UPM-001
      title: User task with Wikipedia unicorn candidate
      type: workflow_request
      date_received: 2026-06-06
      notes: User stated Wikipedia listed Shield AI at US$12.6B, valuation date March 2026.
founder_claims:
