executive_summary:
  overall_assessment: "Shield AI remains eligible for private-unicorn diligence based on reviewed public evidence: March 2026 $12.7B financing, planned acquisition of Aechelon as acquirer, active 2026 defense program announcements, and broad public hiring. No reviewed source showed IPO, acquisition of Shield AI, or shutdown. Public evidence supports product and program traction, but investment-grade diligence is blocked by private financials, customer economics, contracts, safety data, export-control records, IP encumbrances and legal/HR records."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. Upside rests on a scarce defense-autonomy platform combining Hivemind software, V-BAT/X-BAT aircraft and major U.S./allied program access; underwriting depends on proving revenue quality, safe/reliable autonomy, manufacturing scale, export compliance and clean cap-table/IP/legal records.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Shield AI publicly announced a March 2026 $12.7B post-money financing and Wikipedia listed a nearby $12.6B unicorn valuation.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Company sources say Shield AI was founded in 2015 by Brandon Tseng, Ryan Tseng and Andrew Reiter.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-006
      summary: Shield AI appears active and scaling, with 2026 program announcements and 343 parsed public job posting entries.
      evidence_claim_ids:
        - EC-013
        - EC-023
  biggest_risks:
    - risk_id: R-001
      summary: Private financial opacity despite a large valuation step-up.
    - risk_id: R-002
      summary: Defense procurement concentration and classified customer-validation limits.
    - risk_id: R-005
      summary: Autonomy safety/reliability, incident and workplace/legal allegation exposure.
  key_evidence_gaps:
    - Audited financials, revenue by customer/product, backlog, cash/debt, burn and unit economics.
    - Current cap table, preferred equity/debt terms, investor rights, liens and option pool.
    - Government/customer contracts, task orders, customer concentration, margins and references.
    - Autonomy safety case, test telemetry, mishap logs, cyber assessment and reliability metrics.
    - Export-control records, IP/data-rights schedules, litigation dockets, insurance policies and HR records.
  recommended_next_steps:
    - Run finance/cap-table diligence before relying on headline valuation.
    - Use cleared technical diligence for Hivemind/V-BAT safety, reliability, cyber and customer acceptance evidence.
    - Have counsel review export controls, government contracts, material contracts, litigation, safety incidents, IP ownership and Aechelon transaction documents.
    - Conduct customer/partner references and manufacturing/supply-chain diligence focused on task-order conversion and V-BAT scale.
