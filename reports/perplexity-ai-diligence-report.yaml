executive_summary:
  overall_assessment: Eligible private unicorn with exceptional valuation momentum and visible product/partner traction,
    offset by material content/legal exposure, incumbent competition and opaque unit economics.
  investment_or_diligence_thesis: Perplexity could become a high-value AI search and research workflow layer if it proves
    durable user retention, compliant content access and profitable query economics against Google/OpenAI competition.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: $20B valuation signal is supported by TechCrunch, CB Insights and Wikipedia unicorn list.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Public pricing verifies multiple monetization channels.
      evidence_claim_ids:
        - EC-009
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: Copyright/content litigation exposure.
    - risk_id: R-003
      summary: Unverified financial quality relative to valuation.
    - risk_id: R-005
      summary: Google/OpenAI distribution and product competition.
  key_evidence_gaps:
    - Audited financials, ARR by segment, gross margin and query COGS.
    - Content licenses, crawler logs, legal reserves and publisher contracts.
    - Top customer/partner economics, churn and retention.
  recommended_next_steps:
    - Prioritize legal/content diligence before relying on publisher or answer-quality moat.
    - Request detailed unit-economics and retention cohorts.
    - Benchmark product quality and distribution costs vs Google/OpenAI.
