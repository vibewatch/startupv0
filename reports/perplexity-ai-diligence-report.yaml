report_metadata:
  report_title: Perplexity AI Public-Source Unicorn Diligence Report
  target_company: Perplexity AI
  website: https://www.perplexity.ai/
  known_aliases:
    - Perplexity
    - Perplexity.ai
    - Perplexity AI, Inc.
  sector: AI search, answer engine, enterprise AI productivity and API services
  geography: United States; San Francisco, California
  company_stage: Late-stage private AI search unicorn
  research_date: 2026-05-31
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing reports and selected uncovered private unicorns from public unicorn indexes.
    - Used company-owned pages, public funding announcements, independent technology press, market databases,
      legal/regulatory sources, and partner pages.
    - Treated company marketing claims as partially verified unless independently corroborated; marked private
      financials and contract economics as not publicly verifiable.
  included_jurisdictions:
    - United States
    - California
    - New York
    - United Kingdom
  excluded_topics:
    - No private financial statements, board materials, cap table, customer contracts, employee census, insurance
      policies, or counsel interviews were available.
    - No paid database exports, PACER downloads, or private customer reference calls were performed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt selecting three uncovered private unicorn reports
      type: prompt_argument
      date_received: 2026-05-31
      notes: No company-provided materials or founder claim ledger supplied; public claims were inferred from public company
        and funding sources.
