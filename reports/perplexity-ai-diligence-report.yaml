diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, revenue bridge, gross margin, cash burn, and backlog by customer.
    why_it_matters: Public funding data cannot prove quality of revenue or runway.
    suggested_source_or_request: Request audited financials, management accounts, KPI pack, and board-approved plan.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, liquidation preferences, debt instruments, warrants, and option pool.
    why_it_matters: Headline valuation can diverge materially from common-equity economics.
    suggested_source_or_request: Request full capitalization export and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top customer revenue, churn, renewal status, and contract concentration.
    why_it_matters: Named customers or partners do not establish durable revenue.
    suggested_source_or_request: Request customer-level ARR/backlog and signed contract summaries.
    priority: high
  - gap_id: G-004
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, validation results, IP assignments, and open-source/SBOM review.
    why_it_matters: Technical defensibility and execution risk cannot be underwritten from marketing pages.
    suggested_source_or_request: Request roadmap, architecture review, patent schedule, and security/quality reports.
    priority: medium
  - gap_id: G-005
    chapter_id: VII
    section_id: VII.B
    missing_information: Current employee census, attrition, compensation, option refreshes, and key-person retention.
    why_it_matters: Scale-up and retention risk can be hidden in a private company.
    suggested_source_or_request: Request HR census, regretted-loss metrics, and employment agreements.
    priority: medium
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Perplexity material contracts, indemnities, insurance, compliance reports, and litigation reserve details.
    why_it_matters: Public legal pages rarely disclose economic exposure or termination rights.
    suggested_source_or_request: Request counsel memo, contract abstracts, insurance policies, and regulator correspondence.
    priority: high
