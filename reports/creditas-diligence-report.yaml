risk_register:
  - risk_id: "R-001"
    risk_title: "IFRS loss-making and earnings-quality risk"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Creditas reports strong growth and improved Q1 2026 operating loss, but it remains loss-making on IFRS operating and net-income measures and recently changed interest-accrual methodology."
    impacted_chapter_ids: ["I"]
    impacted_section_ids: ["I.A"]
    evidence_claim_ids: ["EC-002", "EC-003", "EC-010"]
    mitigation_or_diligence_request: "Obtain audited financials, management accounts, cash-flow bridge, provision models, vintage curves, and month-by-month profitability plan."
  - risk_id: "R-002"
    risk_title: "Capital-markets funding and structured-finance dependency"
    risk_category: "financing"
    severity: "high"
    likelihood: "medium"
    description: "Capital markets are a main funding pillar, with FIDCs/CRIs/FIIs and more than 70% of funding in market structures per public release."
    impacted_chapter_ids: ["I", "III", "VIII"]
    impacted_section_ids: ["I.B", "III.B", "VIII.A"]
    evidence_claim_ids: ["EC-001", "EC-015", "EC-024"]
    mitigation_or_diligence_request: "Review all funding agreements, maturities, covenants, triggers, ratings, investor concentration, stress tests, and liquidity reserves."
  - risk_id: "R-003"
    risk_title: "Brazil interest-rate and credit-cycle exposure"
    risk_category: "market"
    severity: "high"
    likelihood: "high"
    description: "Creditas' lending results depend on Brazil macro conditions, SELIC, collateral values, delinquencies, recoveries, and borrower affordability."
    impacted_chapter_ids: ["I", "II", "III", "V"]
    impacted_section_ids: ["I.A", "II.B", "III.A", "V.A"]
    evidence_claim_ids: ["EC-002", "EC-010", "EC-011", "EC-015"]
    mitigation_or_diligence_request: "Request stress tests by SELIC, unemployment, collateral values, delinquencies, recovery timing, and funding spreads."
  - risk_id: "R-004"
    risk_title: "Regulatory and entity-structure complexity"
    risk_category: "regulatory"
    severity: "medium"
    likelihood: "medium"
    description: "Creditas spans correspondent banking, SCD roles, partner institutions, insurance brokerage, marketplace and structured-finance arrangements."
    impacted_chapter_ids: ["II", "VIII"]
    impacted_section_ids: ["II.B", "VIII.A", "VIII.B"]
    evidence_claim_ids: ["EC-008", "EC-024", "EC-025"]
    mitigation_or_diligence_request: "Build an entity-by-product regulatory map, obtain legal opinions, regulator correspondence, and compliance testing."
  - risk_id: "R-005"
    risk_title: "Customer-service, complaint, and fraud-impersonation risk"
    risk_category: "reputational"
    severity: "medium"
    likelihood: "high"
    description: "Review-site data shows complaint volume and Regular reputation, while Creditas warns the public about impersonation and upfront-payment scams."
    impacted_chapter_ids: ["III", "V", "VIII"]
    impacted_section_ids: ["III.A", "V.B", "VIII.B"]
    evidence_claim_ids: ["EC-017", "EC-019"]
    mitigation_or_diligence_request: "Review complaint taxonomy, regulatory complaint logs, fraud cases, brand takedowns, remediation process, and customer-service SLAs."
  - risk_id: "R-006"
    risk_title: "Privacy, AI, and model-governance risk"
    risk_category: "technical"
    severity: "medium"
    likelihood: "medium"
    description: "Creditas processes sensitive financial, location, behavioral, health/disability, biometric, and AI/model-training data and reports AI automation in collections and credit workflows."
    impacted_chapter_ids: ["VI", "VIII"]
    impacted_section_ids: ["VI.B", "VIII.B"]
    evidence_claim_ids: ["EC-009", "EC-013", "EC-025"]
    mitigation_or_diligence_request: "Request AI governance, DPIAs, model inventory, monitoring reports, bias testing, human review procedures, and data-retention controls."
  - risk_id: "R-007"
    risk_title: "Execution risk across product breadth, M&A, partners, and management transition"
    risk_category: "operational"
    severity: "medium"
    likelihood: "medium"
    description: "Creditas operates many products and partnerships, completed or announced multiple strategic transactions, and is transitioning operations/technology leadership."
    impacted_chapter_ids: ["II", "III", "IV", "V", "VI", "VII"]
    impacted_section_ids: ["II.A", "III.B", "IV.B", "V.A", "VI.A", "VII.A"]
    evidence_claim_ids: ["EC-012", "EC-013", "EC-016", "EC-021", "EC-023"]
    mitigation_or_diligence_request: "Request integration scorecards, partner KPIs, product P&Ls, management cadence, and transition milestones."
  - risk_id: "R-008"
    risk_title: "Material private-data gaps"
    risk_category: "other"
    severity: "medium"
    likelihood: "high"
    description: "Public sources do not provide cap-table terms, audited statements, loan tapes, current valuation, litigation dockets, partner concentration, supplier list, or security audits."
    impacted_chapter_ids: ["I", "III", "IV", "VI", "VII", "VIII"]
    impacted_section_ids: ["I.B", "III.A", "IV.A", "VI.A", "VII.B", "VIII.A", "VIII.B"]
    evidence_claim_ids: ["EC-026"]
    mitigation_or_diligence_request: "Run a formal data-room request and require management representations for all not-publicly-verifiable items."

diligence_gaps:
  - gap_id: "G-001"
    chapter_id: "I"
    section_id: "I.A"
    missing_information: "Audited financial statements, management accounts, cash-flow statements, and monthly bridge from IFRS loss to cash-neutral operation."
    why_it_matters: "Profitability and runway are the central diligence questions."
    suggested_source_or_request: "CFO data-room package and auditor workpapers."
    priority: "high"
  - gap_id: "G-002"
    chapter_id: "I"
    section_id: "I.B"
    missing_information: "Current cap table, liquidation preferences, convertible-note terms, option pool, warrants, and side letters."
    why_it_matters: "Public valuation and funding totals do not reveal current ownership economics."
    suggested_source_or_request: "Corporate secretary capitalization schedule and financing documents."
    priority: "high"
  - gap_id: "G-003"
    chapter_id: "I"
    section_id: "I.A"
    missing_information: "Loan-level tapes, vintage curves, delinquency buckets, charge-offs, recoveries, collateral values, and provision model."
    why_it_matters: "Secured-lending quality determines true unit economics and funding availability."
    suggested_source_or_request: "Risk/finance loan-tape export and model documentation."
    priority: "high"
  - gap_id: "G-004"
    chapter_id: "II"
    section_id: "II.B"
    missing_information: "Realized APR, effective total cost, fee schedules, approval rates, LTV, and contribution margin by product."
    why_it_matters: "Marketing terms may differ materially from realized economics."
    suggested_source_or_request: "Product P&Ls and underwriting policy decks."
    priority: "high"
  - gap_id: "G-005"
    chapter_id: "III"
    section_id: "III.A"
    missing_information: "Customer count, cohort retention, repeat borrowing, NPS, complaint taxonomy, and customer concentration."
    why_it_matters: "Public demand signals do not prove customer quality or satisfaction."
    suggested_source_or_request: "CRM exports, servicing dashboards, and customer-reference calls."
    priority: "high"
  - gap_id: "G-006"
    chapter_id: "III"
    section_id: "III.B"
    missing_information: "Partner/channel concentration, API partner list, revenue share, termination rights, and partner-specific loan quality."
    why_it_matters: "Partner distribution can hide CAC and concentration risk."
    suggested_source_or_request: "Partnership contracts and channel-performance dashboards."
    priority: "high"
  - gap_id: "G-007"
    chapter_id: "IV"
    section_id: "IV.A"
    missing_information: "Independent market share, TAM, competitor pricing, and win/loss benchmarks."
    why_it_matters: "Leadership claims and moat cannot be confirmed from company sources alone."
    suggested_source_or_request: "Independent market study and competitor pricing scrape."
    priority: "medium"
  - gap_id: "G-008"
    chapter_id: "V"
    section_id: "V.A"
    missing_information: "CAC, conversion, fraud, and approval funnel by channel and product."
    why_it_matters: "Growth quality depends on channel economics and credit quality."
    suggested_source_or_request: "Growth analytics and risk dashboards."
    priority: "high"
  - gap_id: "G-009"
    chapter_id: "VI"
    section_id: "VI.B"
    missing_information: "AI governance, model inventory, validation, human review thresholds, incident logs, and performance metrics."
    why_it_matters: "AI is positioned as a productivity lever but can create conduct, privacy, and operational risks."
    suggested_source_or_request: "CTO/COO, risk, legal, and data-governance materials."
    priority: "high"
  - gap_id: "G-010"
    chapter_id: "VII"
    section_id: "VII.B"
    missing_information: "Current headcount, attrition, compensation, hiring plan, and productivity attribution."
    why_it_matters: "Public headcount ranges do not show actual operating leverage or staff reductions."
    suggested_source_or_request: "HRIS export and board talent materials."
    priority: "medium"
  - gap_id: "G-011"
    chapter_id: "VIII"
    section_id: "VIII.A"
    missing_information: "Litigation docket, regulator correspondence, legal opinions, and FIDC offering/covenant documents."
    why_it_matters: "Legal/regulatory and structured-finance risks cannot be closed from public summaries."
    suggested_source_or_request: "External counsel certificate and transaction documents."
    priority: "high"
  - gap_id: "G-012"
    chapter_id: "VIII"
    section_id: "VIII.B"
    missing_information: "Privacy impact assessments, security audits, penetration tests, breach logs, IP assignments, trademark/patent docket, and open-source inventory."
    why_it_matters: "Sensitive data, AI, and proprietary technology claims require control and ownership evidence."
    suggested_source_or_request: "DPO/security/legal data-room package."
    priority: "high"

