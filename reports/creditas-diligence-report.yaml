report_metadata:
  report_title: "Creditas Startup Diligence Report"
  target_company: "Creditas"
  website: "https://www.creditas.com/"
  known_aliases:
    - "Creditas Solucoes Financeiras"
    - "Creditas Sociedade de Credito Direto"
    - "Minuto Seguros"
  sector: "Financial services fintech / secured lending"
  geography: "Brazil, with public signals for Mexico and Spain operations"
  company_stage: "Private unicorn"
  research_date: "2026-05-15"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "BRL unless otherwise noted"
  time_zone: "America/Sao_Paulo"

research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Started from public unicorn lists and excluded companies already covered in reports."
    - "Prioritized company-owned investor-relations, product, legal, privacy, transparency, careers, and developer documentation."
    - "Supplemented with public market databases, professional profiles, and customer-review data where accessible."
    - "Excluded inaccessible, blocked, or unrelated pages; Reuters and TechCrunch returned access blocks, Crunchbase returned access-control friction, and a CB Insights page referred to a different CREDITAS entity."
  included_jurisdictions:
    - "Brazil"
    - "Mexico where publicly referenced by company sources"
    - "Spain where publicly referenced as a technology hub"
  excluded_topics:
    - "Private data-room financial statements, cap table, securitization documents, bank covenants, warehouse-line agreements, and loan tapes were not available."
    - "Non-public customer lists, supplier contracts, legal dockets, security assessments, and employee records were not accessed."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Autonomous task instructions"
      type: "workflow_request"
      date_received: "2026-05-15"
      notes: "No founder deck, company data room, or private financial package was provided."

founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Creditas is a leading fintech platform for secured and specialized financial solutions focused on auto, home, and employee-benefits ecosystems."
    claim_source: "Company investor-relations and funding announcements"
    claim_date: "2022-01-25"
    mapped_chapter_ids: ["II", "IV", "V"]
    mapped_section_ids: ["II.A", "IV.A", "V.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-006", "EC-007", "EC-014"]
    contradiction_summary: "Public sources support the product breadth and secured-lending focus, but market-leadership rank requires independent market-share validation."
    diligence_follow_up:
      - "Request current market-share data by product line, methodology, and independent third-party corroboration."
  - founder_claim_id: "FC-002"
    claim_text: "The January 2022 Series F valued Creditas at US$4.8 billion and brought total equity raised to US$829 million across six rounds."
    claim_source: "Creditas Series F announcement"
    claim_date: "2022-01-25"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.B"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-004"]
    contradiction_summary: null
    diligence_follow_up:
      - "Reconcile the US$829 million Series F total with the later IR-home claim of US$987 million raised through seven financing rounds."
  - founder_claim_id: "FC-003"
    claim_text: "Creditas had a R$7.6 billion loan portfolio as of March 2026 and Q1 2026 annualized revenues above R$2.5 billion."
    claim_source: "Creditas IR home and Q1 2026 financial results"
    claim_date: "2026-05-07"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.A"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-001", "EC-002"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request audited FY2025 and Q1 2026 financial statements, reconciliation schedules, and portfolio stratification."
  - founder_claim_id: "FC-004"
    claim_text: "AI automation is materially improving operations, including early-stage collections, credit/legal workflows, and product-development cycle time."
    claim_source: "Creditas Q1 2026 financial results"
    claim_date: "2026-05-07"
    mapped_chapter_ids: ["VI"]
    mapped_section_ids: ["VI.B"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-009"]
    contradiction_summary: "Claims are specific but self-reported; no independent control testing, model-governance documentation, or KPI audit was public."
    diligence_follow_up:
      - "Request AI-governance policy, monitoring metrics, human-review thresholds, and before/after productivity support."
  - founder_claim_id: "FC-005"
    claim_text: "Creditas is maintaining neutral cash flow and targeting near-term operational break-even."
    claim_source: "Creditas Q4 2025 and Q1 2026 financial results"
    claim_date: "2026-05-07"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-003"]
    contradiction_summary: "Company reports neutral cash flow but also reports IFRS operating and net losses; public statements do not include full cash-flow statements."
    diligence_follow_up:
      - "Request monthly cash-flow bridge, covenant tests, unrestricted cash, funding availability, and board-approved plan to IFRS profitability."
  - founder_claim_id: "FC-006"
    claim_text: "Creditas Insurance is the largest independent online insurance broker in Brazil."
    claim_source: "Creditas Q1 2026 financial results and Minuto Seguros acquisition release"
    claim_date: "2026-05-07"
    mapped_chapter_ids: ["II", "IV"]
    mapped_section_ids: ["II.A", "IV.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-006", "EC-016"]
    contradiction_summary: "Creditas and Minuto sources support scale and broker positioning; independent ranking evidence was not publicly verified in this run."
    diligence_follow_up:
      - "Request insurance gross written premium, carrier concentration, ranking methodology, and regulator/brokerage filings."

executive_summary:
  overall_assessment: >-
    Creditas is a scaled Brazil-centered secured-lending fintech with substantial public operating disclosure, diversified loan and insurance products, and mature capital-markets funding infrastructure. The company remains high-risk for investment diligence because public results still show IFRS losses, sensitivity to Brazil rates and credit cycles, reliance on securitization structures, and meaningful customer-service, privacy, AI, and regulatory questions that require private data-room validation.
  investment_or_diligence_thesis: >-
    The diligence thesis is "continue to second-stage diligence, not yet investment-ready": public evidence supports a real operating platform with a R$7.6 billion March 2026 portfolio, Q1 2026 revenue of R$633.0 million, US$987 million raised through seven rounds, and a last public unicorn valuation of US$4.8 billion. The underwriting question is whether Creditas can convert self-reported cohort profitability and AI productivity into durable IFRS profitability while preserving credit quality and funding access in a high-rate Brazilian environment.
  strongest_verified_claims:
    - founder_claim_id: "FC-002"
      summary: "Creditas announced a US$260 million Series F at a US$4.8 billion valuation in January 2022."
      evidence_claim_ids: ["EC-004"]
    - founder_claim_id: "FC-003"
      summary: "Creditas discloses a R$7.6 billion March 2026 portfolio and Q1 2026 annualized revenue above R$2.5 billion."
      evidence_claim_ids: ["EC-001", "EC-002"]
    - founder_claim_id: "FC-001"
      summary: "Company product pages and IR disclosures substantiate secured lending across vehicle, home, payroll, insurance, financing, and benefits offerings."
      evidence_claim_ids: ["EC-006", "EC-007"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "The company remains IFRS loss-making despite improved Q1 2026 operating loss and neutral-cash-flow claims."
    - risk_id: "R-002"
      summary: "Portfolio growth depends on capital-markets funding and macro/credit-cycle resilience in Brazil."
    - risk_id: "R-005"
      summary: "Customer-service, fraud-impersonation, privacy, and AI-data handling risks are visible in public sources."
  key_evidence_gaps:
    - "Audited financial statements, monthly cash-flow statements, credit-loss roll-forward, vintage/cohort loss curves, and loan-tape stratification."
    - "Full cap table, liquidation preferences, convertible-note terms, Andbank transaction documents, FIDC/CRI covenants, and warehouse availability."
    - "Customer concentration, churn, CAC/payback by channel, partner revenue share, and direct-versus-partner origination mix."
    - "Independent market-share evidence for secured lending, insurance brokerage, and auto finance positions."
    - "Model-risk, AI-governance, privacy-impact, and security-control evidence."
  recommended_next_steps:
    - "Run confirmatory financial diligence on IFRS profitability, cash generation, provision adequacy, funding liquidity, and covenant headroom."
    - "Request product-level loan tapes, vintage performance, collateral LTV distributions, recoveries, delinquencies, and securitization waterfalls."
    - "Interview capital-markets counterparties, partner channels, and a sample of borrowers and employer/payroll partners."
    - "Review legal/regulatory permissions by entity and privacy/AI controls under LGPD and Banco Central-facing obligations."

chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: >-
      Public evidence indicates Creditas is scaled and growing but not yet IFRS profitable. The latest public quarter shows record origination, portfolio, revenue, and gross profit, alongside a narrower operating loss and a net loss.
    founder_claim_ids: ["FC-002", "FC-003", "FC-005"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-003", "EC-004", "EC-005"]
    risk_ids: ["R-001", "R-002", "R-003", "R-008"]
    sections:
      - section_id: "I.A"
        title: "Recent financial performance and profitability"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3"]
        summary: >-
          Q1 2026 public results show R$1.1 billion origination, R$7.6 billion portfolio, R$633.0 million revenue, R$253.5 million gross profit, a R$34.9 million operating loss, and a R$75.9 million net loss. The operating-loss trajectory improved versus Q4 2025, but full audited statements and cash-flow support were not public.
        verification_status: "partially_verified"
        confidence: "high"
        key_findings:
          - finding_id: "I.A-F1"
            finding: "Creditas disclosed record Q1 2026 origination, portfolio, revenue, and gross profit while still reporting IFRS losses."
            evidence_claim_ids: ["EC-002", "EC-003"]
            risk_ids: ["R-001"]
          - finding_id: "I.A-F2"
            finding: "The Q4 2025 accounting-methodology change materially reduced reported 2025 revenue by 6.4%, creating comparability and earnings-quality diligence work."
            evidence_claim_ids: ["EC-010"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "Reported gross margin improvements may be sensitive to origination mix, interest-rate curves, and front-loaded IFRS provisioning."
          - "Neutral cash-flow claims are not independently verifiable from public source excerpts."
        evidence_gaps:
          - "Audited FY2023-FY2025 statements, Q1 2026 management accounts, cash-flow statements, debt maturity schedule, and covenant tests."
        follow_up_questions:
          - "What is the reconciliation between IFRS net loss, operating loss, cohort profitability, and cash-neutral operation by month?"
        table_ids: ["T-002"]
        figure_ids: []
        evidence_claim_ids: ["EC-002", "EC-003", "EC-010"]
      - section_id: "I.B"
        title: "Funding history, valuation, and ownership"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3"]
        summary: >-
          The latest public priced equity valuation found in company sources is the January 2022 Series F at US$4.8 billion. Creditas later reported US$987 million raised through seven financing rounds, but detailed cap-table economics and preference stacks are not public.
        verification_status: "partially_verified"
        confidence: "high"
        key_findings:
          - finding_id: "I.B-F1"
            finding: "Creditas announced US$255 million Series E financing at a US$1.75 billion valuation in December 2020 and US$260 million Series F financing at a US$4.8 billion valuation in January 2022."
            evidence_claim_ids: ["EC-004", "EC-005"]
            risk_ids: ["R-008"]
          - finding_id: "I.B-F2"
            finding: "Investor-relations highlights state US$987 million raised through seven financing rounds; detailed ownership and security terms remain private."
            evidence_claim_ids: ["EC-001"]
            risk_ids: ["R-008"]
        hidden_risks:
          - "Later financing instruments, including the July 2022 convertible note and Andbank-linked transactions, may affect dilution, control, liquidation preference, or funding obligations."
        evidence_gaps:
          - "Current cap table, option pool, debt instruments, side letters, and investor-rights agreements."
        follow_up_questions:
          - "What is the fully diluted ownership and liquidation stack after the Series F extension, convertible note, and Andbank transaction?"
        table_ids: ["T-001", "T-003"]
        figure_ids: ["F-001", "F-002"]
        evidence_claim_ids: ["EC-001", "EC-004", "EC-005"]

  - chapter_id: "II"
    title: "Products"
    chapter_summary: >-
      Creditas offers a multi-product secured-finance ecosystem spanning vehicle-backed loans, home-backed loans, private payroll loans, auto insurance, real-estate financing, auto finance, and corporate benefits. Public pages show product terms, but product economics, approval funnels, default curves, and cross-sell conversion are not public.
    founder_claim_ids: ["FC-001", "FC-006"]
    evidence_claim_ids: ["EC-006", "EC-007", "EC-008", "EC-014", "EC-016"]
    risk_ids: ["R-003", "R-004", "R-007"]
    sections:
      - section_id: "II.A"
        title: "Product portfolio and borrower proposition"
        checklist_question_ids: ["II.A.1", "II.A.2", "II.A.3"]
        summary: >-
          Company product pages show a broad consumer and employer product catalog centered on collateral-backed credit, financing, insurance, and benefits. Public product limits include vehicle-backed loans from R$5,000 to R$150,000 and home-backed loans up to R$3 million.
        verification_status: "verified"
        confidence: "high"
        key_findings:
          - finding_id: "II.A-F1"
            finding: "The public product catalog spans vehicle-backed loans, home-backed loans, private payroll loans, insurance, real-estate financing, auto financing, and flexible-benefits cards."
            evidence_claim_ids: ["EC-006", "EC-007"]
            risk_ids: ["R-003"]
          - finding_id: "II.A-F2"
            finding: "Creditas frames its strategy as a secured-finance ecosystem across auto, home, and employee-benefits verticals."
            evidence_claim_ids: ["EC-014"]
            risk_ids: ["R-007"]
        hidden_risks:
          - "Product breadth creates operational and regulatory complexity across correspondent banking, SCD, insurance brokerage, marketplaces, and partner-led distribution."
        evidence_gaps:
          - "Approval rates, net interest margin, credit-loss rates, and unit economics by SKU."
        follow_up_questions:
          - "Which products account for origination, revenue, gross profit, losses, complaints, and capital use by quarter?"
        table_ids: ["T-004"]
        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-006", "EC-007", "EC-014"]
      - section_id: "II.B"
        title: "Pricing, terms, and product economics"
        checklist_question_ids: ["II.B.1", "II.B.2", "II.B.3"]
        summary: >-
          Public terms disclose indicative rates, limits, and tenors, but pricing is highly product-specific and may differ between marketing pages and legal footers. Private data is required to validate realized APR, fees, discounts, default-adjusted yield, and customer outcomes.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "II.B-F1"
            finding: "Public pages advertise vehicle-backed rates from 1.49% monthly and home-backed rates from 1.09% monthly plus IPCA, but legal-footer examples and product-specific terms should be reconciled."
            evidence_claim_ids: ["EC-007", "EC-008"]
            risk_ids: ["R-004"]
          - finding_id: "II.B-F2"
            finding: "Creditas disclosed insurance scale through the Minuto acquisition and later claimed the insurance unit is the largest independent online broker in Brazil."
            evidence_claim_ids: ["EC-016", "EC-006"]
            risk_ids: ["R-007"]
        hidden_risks:
          - "High nominal Brazilian rates and complex effective-cost disclosures can increase conduct, complaint, and regulatory risk."
        evidence_gaps:
          - "Realized customer APR, fee schedules, prepayment rates, collection recoveries, and complaint root-cause analysis by product."
        follow_up_questions:
          - "How do advertised rates, effective total cost, underwriting bands, and borrower outcomes differ by channel and borrower segment?"
        table_ids: ["T-005"]
        figure_ids: []
        evidence_claim_ids: ["EC-007", "EC-008", "EC-016"]

  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: >-
      Public customer evidence is stronger for distribution partners and platform usage than for named end borrowers. Creditas discloses millions of credit requests and major partnerships, but customer concentration, retention, NPS, churn, and cohort economics are not public.
    founder_claim_ids: ["FC-001"]
    evidence_claim_ids: ["EC-011", "EC-012", "EC-013", "EC-015", "EC-017", "EC-018"]
    risk_ids: ["R-003", "R-005", "R-007", "R-008"]
    sections:
      - section_id: "III.A"
        title: "Customer base and publicly visible demand"
        checklist_question_ids: ["III.A.1", "III.A.2", "III.A.3"]
        summary: >-
          Creditas publicly states it has exceeded 13 million credit requests and discloses a R$7.6 billion portfolio, but public materials do not list named borrowers or concentration metrics. Review-site data shows material customer-service friction.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.A-F1"
            finding: "Public sources support large demand indicators, including millions of credit requests and a multi-billion-real credit portfolio."
            evidence_claim_ids: ["EC-001", "EC-011"]
            risk_ids: ["R-003"]
          - finding_id: "III.A-F2"
            finding: "Reclame Aqui reported a Regular rating, 1,960 complaints in the latest six-month period, and 71% resolution."
            evidence_claim_ids: ["EC-017"]
            risk_ids: ["R-005"]
        hidden_risks:
          - "Complaint volume and response times may indicate servicing strain in high-touch collateralized products."
          - "Borrower-level concentration, repeat borrowing, charge-offs, and complaints by product are not public."
        evidence_gaps:
          - "Customer cohort retention, repeat usage, NPS, complaint root-cause, loan-level performance, and top-employer/top-partner concentration."
        follow_up_questions:
          - "What percentage of origination comes from repeat customers, employer partners, affiliates, API partners, and direct digital channels?"
        table_ids: ["T-006"]
        figure_ids: ["F-004"]
        evidence_claim_ids: ["EC-001", "EC-011", "EC-017"]
      - section_id: "III.B"
        title: "Partners, counterparties, and operating dependencies"
        checklist_question_ids: ["III.B.1", "III.B.2", "III.B.3"]
        summary: >-
          Creditas has public partnerships with Nubank, Andbank, Anga Asset, Banco Daycoval, insurance carriers, and API-based distribution partners. These relationships can reduce CAC and diversify funding, but also create dependency, integration, and governance risks.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.B-F1"
            finding: "Nubank announced a partnership to bring Creditas products to Nubank customers and received an option to become a minority shareholder up to 7.7%."
            evidence_claim_ids: ["EC-012"]
            risk_ids: ["R-007"]
          - finding_id: "III.B-F2"
            finding: "Creditas API documentation describes a partner integration flow with staging validation before production activation."
            evidence_claim_ids: ["EC-013"]
            risk_ids: ["R-007"]
        hidden_risks:
          - "Partner-led origination can create channel concentration, data-sharing, consent, security, and margin-sharing risks."
        evidence_gaps:
          - "Top partner volume, partner economics, termination rights, service-level commitments, data-processing agreements, and partner-specific credit quality."
        follow_up_questions:
          - "Which partners originate the most loans and what contractual protections exist if a partner relationship is terminated?"
        table_ids: ["T-007", "T-008"]
        figure_ids: []
        evidence_claim_ids: ["EC-012", "EC-013", "EC-015", "EC-018"]

  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: >-
      Creditas competes with incumbent banks, digital banks, auto and home finance specialists, insurance brokers, and benefits platforms. Public evidence confirms positioning and funding scale, but independent market-share and competitor economics were not public in the reviewed source set.
    founder_claim_ids: ["FC-001", "FC-006"]
    evidence_claim_ids: ["EC-006", "EC-014", "EC-016", "EC-018", "EC-019"]
    risk_ids: ["R-003", "R-007", "R-008"]
    sections:
      - section_id: "IV.A"
        title: "Competitive positioning and market map"
        checklist_question_ids: ["IV.A.1", "IV.A.2", "IV.A.3"]
        summary: >-
          Company and Dealroom sources support Creditas as an asset-backed consumer-loan fintech with multiple adjacent products. However, the public evidence reviewed does not independently rank Creditas against banks, digital banks, or secured-lending specialists by originations, portfolio, loss rate, or CAC.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "IV.A-F1"
            finding: "Dealroom categorizes Creditas as a Sao Paulo fintech unicorn and a digital lending platform for asset-backed consumer loans."
            evidence_claim_ids: ["EC-018"]
            risk_ids: ["R-008"]
          - finding_id: "IV.A-F2"
            finding: "Creditas positions itself as a multi-ecosystem secured-finance platform rather than a single-product lender."
            evidence_claim_ids: ["EC-014"]
            risk_ids: ["R-007"]
        hidden_risks:
          - "If banks or digital banks match secured-credit pricing and distribution, Creditas may face margin pressure and higher acquisition costs."
        evidence_gaps:
          - "Independent TAM, market share, competitor pricing, approval speed, loss curves, and customer acquisition costs."
        follow_up_questions:
          - "What objective metrics show Creditas wins versus banks, digital banks, and other secured-credit platforms?"
        table_ids: ["T-009"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-014", "EC-018"]
      - section_id: "IV.B"
        title: "Basis of competition"
        checklist_question_ids: ["IV.B.1", "IV.B.2", "IV.B.3"]
        summary: >-
          The public basis for Creditas differentiation is collateralized products, proprietary technology, integrated insurance/marketplace adjacencies, partner distribution, and capital-markets funding. These claims require private benchmarking to prove durable moat and pricing power.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "IV.B-F1"
            finding: "Creditas disclosed AI and funnel-automation initiatives aimed at lowering CAC and improving productivity."
            evidence_claim_ids: ["EC-009"]
            risk_ids: ["R-007"]
          - finding_id: "IV.B-F2"
            finding: "Minuto added insurance brokerage scale and carriers, broadening the competitive perimeter."
            evidence_claim_ids: ["EC-016"]
            risk_ids: ["R-007"]
        hidden_risks:
          - "Self-reported technology and AI improvements may be replicable unless supported by proprietary data advantages and execution evidence."
        evidence_gaps:
          - "Win/loss data, competitor pricing crawls, channel-conversion benchmarks, and contribution margins by competitive segment."
        follow_up_questions:
          - "Which products show statistically significant lower CAC, higher conversion, or better loss-adjusted returns than competitors?"
        table_ids: ["T-010"]
        figure_ids: []
        evidence_claim_ids: ["EC-009", "EC-016"]

  - chapter_id: "V"
    title: "Marketing, Sales, and Distribution"
    chapter_summary: >-
      Creditas appears to combine direct digital acquisition, partner distribution, employer channels, API integrations, Nubank distribution, insurance-carrier relationships, and capital-markets investor relations. Public data is insufficient to quantify channel mix, CAC, conversion, or partner concentration.
    founder_claim_ids: ["FC-001"]
    evidence_claim_ids: ["EC-006", "EC-012", "EC-013", "EC-015", "EC-018"]
    risk_ids: ["R-003", "R-005", "R-007"]
    sections:
      - section_id: "V.A"
        title: "Distribution channels and GTM motions"
        checklist_question_ids: ["V.A.1", "V.A.2", "V.A.3"]
        summary: >-
          Public evidence supports direct product pages, partner/API integration, employer-linked payroll products, Nubank channel access, affiliate networks in home equity, and capital-markets investor distribution for funding. Channel economics and concentration are private diligence items.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "V.A-F1"
            finding: "The public website exposes direct-consumer product simulations and partner/API entry points."
            evidence_claim_ids: ["EC-006", "EC-013"]
            risk_ids: ["R-007"]
          - finding_id: "V.A-F2"
            finding: "Creditas reported partner-led growth in auto and scaling of direct-to-consumer and affiliate networks in home equity."
            evidence_claim_ids: ["EC-002", "EC-003"]
            risk_ids: ["R-003"]
        hidden_risks:
          - "A channel shift toward partners can hide concentration and margin-sharing risk if direct CAC remains high."
        evidence_gaps:
          - "Channel mix, CAC by channel, conversion funnel, partner revenue share, and lead-quality metrics."
        follow_up_questions:
          - "What is the monthly distribution funnel from lead source to approved loan to disbursement by product?"
        table_ids: ["T-011"]
        figure_ids: ["F-006"]
        evidence_claim_ids: ["EC-006", "EC-012", "EC-013"]
      - section_id: "V.B"
        title: "Marketing signals and brand/reputation"
        checklist_question_ids: ["V.B.1", "V.B.2", "V.B.3"]
        summary: >-
          Public marketing signals include owned product pages, IR transparency, careers content, app promotion, security/fraud education, and review-site visibility. Reputation risk is non-trivial because complaint metrics and fraud impersonation warnings are visible.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "V.B-F1"
            finding: "Dealroom reported 1.9 million monthly visits, with Brazil representing 96.6% of web traffic in its public taster profile."
            evidence_claim_ids: ["EC-018"]
            risk_ids: ["R-005"]
          - finding_id: "V.B-F2"
            finding: "Creditas maintains security content warning that it does not request upfront payments for loan approval."
            evidence_claim_ids: ["EC-019"]
            risk_ids: ["R-005"]
        hidden_risks:
          - "Fraud impersonation can create brand damage and customer-loss even when the company is not the direct perpetrator."
        evidence_gaps:
