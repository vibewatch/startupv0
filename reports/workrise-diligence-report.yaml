report_metadata:
  report_title: Workrise Startup Diligence Report
  target_company: Workrise
  website: https://www.workrise.com/
  known_aliases:
    - Workrise
    - RigUp
    - Workrise Technologies Inc.
  sector: Energy source-to-pay software, vendor management, contingent workforce and field services
  geography: United States / Austin, Texas with public operations and hiring signals in Austin, Belfast and Calgary
  company_stage: Private unicorn / Series E growth-stage company
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built eligibility from the workflow's CB Insights unicorn list row and public company-owned RigUp and Workrise pages.
    - Prioritized current company product, about, careers, vendor, workforce and rebrand pages.
    - Treated company-published operating metrics as evidence of public claims only unless independently corroborated.
    - Marked financial statements, customer contracts, cap table, worker/vendor records, legal schedules, security reports and HR records as not publicly verifiable.
  included_jurisdictions:
    - United States
    - Canada
    - United Kingdom
    - North America energy basins referenced by public materials
  excluded_topics:
    - Private financial statements, cap table, board materials, customer/vendor/worker contracts, background-check records, payroll/tax records, litigation docket workups, security reports and HRIS records were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow-provided random-unicorn candidate context
      type: workflow_request
      date_received: 2026-05-25
      notes: "Candidate from CB Insights Global Unicorn Club: Workrise, slug workrise, valuation $2.90B, country United States, industry Industrials."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Workrise is an active private unicorn valued at approximately $2.90B.
    claim_source: CB Insights unicorn list and public financing-title artifact
    claim_date: 2026-05-25
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.A, I.B]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001, EC-002]
    contradiction_summary: null
    diligence_follow_up:
      - Request primary financing documents, cap table, investor rights, debt instruments, option pool, current 409A and any valuation impairment analysis.
  - founder_claim_id: FC-002
    claim_text: Workrise, now publicly branded again as RigUp, operates source-to-pay software and services for energy companies.
    claim_source: Current homepage, about page and rebrand blog
    claim_date: null
    mapped_chapter_ids: [II, V]
    mapped_section_ids: [II.A, V.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-003, EC-006, EC-007]
    contradiction_summary: Public pages verify current positioning and rebrand, but not revenue, retention or product usage.
    diligence_follow_up:
      - Request product usage metrics, active customer count, rebrand rationale, churn by product and roadmap adoption data.
  - founder_claim_id: FC-003
    claim_text: The company offers vendor-management capabilities across 200+ service categories.
    claim_source: Vendor Solutions page
    claim_date: null
    mapped_chapter_ids: [II, III, VI]
    mapped_section_ids: [II.A, III.B, VI.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-004]
    contradiction_summary: Public feature claims do not prove supplier quality, realized spend under management, compliance accuracy or revenue contribution.
    diligence_follow_up:
      - Request vendor count, vendor activation, compliance outcomes, spend under management and customer ROI by category.
  - founder_claim_id: FC-004
    claim_text: The workforce product includes 10,000+ vetted workers, 400+ roles and 50+ basins.
    claim_source: Workforce Management page
    claim_date: null
    mapped_chapter_ids: [III, V, VI]
    mapped_section_ids: [III.A, V.A, VI.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-005]
    contradiction_summary: Company-published supply metrics do not verify active workers, compliance status, fill rate, retention or worker quality.
    diligence_follow_up:
      - Request active worker cohorts, fill rates, credentialing outcomes, safety metrics, worker churn and payroll compliance records.
  - founder_claim_id: FC-005
    claim_text: Workrise/RigUp has active team and operating signals across Austin, Belfast and Calgary.
    claim_source: Careers page
    claim_date: null
    mapped_chapter_ids: [VII]
    mapped_section_ids: [VII.A, VII.B]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-008]
    contradiction_summary: Careers page supports active employer positioning but not headcount, attrition, leadership depth or employee claims.
    diligence_follow_up:
      - Request org chart, HRIS headcount history, attrition, compensation plans, employment claims and leadership/board documentation.
executive_summary:
  overall_assessment: Workrise appears eligible as an active private unicorn based on CB Insights and current company pages, though the public brand has shifted back toward RigUp. The business shows credible public product surfaces in energy source-to-pay, vendor management and contingent workforce operations, but valuation underwriting is blocked by missing private financial, customer, legal, worker and HR evidence.
  investment_or_diligence_thesis: Proceed only if Workrise can substantiate durable energy-customer demand, profitable source-to-pay and workforce unit economics, compliant worker/vendor operations, resilient execution after rebranding and clean legal, payroll, tax, safety, IP and data-rights posture.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Workrise as a $2.90B U.S. unicorn and the public financing-title artifact references a $300M Series E at a $2.9B valuation.
      evidence_claim_ids: [EC-001, EC-002]
    - founder_claim_id: FC-002
      summary: Current pages verify active RigUp positioning around source-to-pay software and services for energy field operations.
      evidence_claim_ids: [EC-003, EC-006, EC-007]
    - founder_claim_id: FC-004
      summary: Workforce page publicly claims 10,000+ vetted workers, 400+ roles and 50+ basins.
      evidence_claim_ids: [EC-005]
  biggest_risks:
    - risk_id: R-001
      summary: Financial and valuation support are not public despite the $2.90B headline valuation.
    - risk_id: R-002
      summary: Energy-cycle exposure could pressure customer budgets, workforce demand and vendor volumes.
    - risk_id: R-003
      summary: Worker/vendor compliance, payroll, safety and classification risks are central and not public.
  key_evidence_gaps:
    - Audited financial statements, gross margin, cash runway, debt, AR/AP aging, revenue mix and customer concentration.
    - Current cap table, investor rights, preference stack, warrants, debt and valuation support.
    - Customer contracts, spend under management, active worker/vendor cohorts, fill rates, compliance outcomes and safety metrics.
    - Product usage, roadmap, uptime, AI/data controls, security reports, integrations and technical debt.
    - Litigation, payroll/tax, worker classification, insurance, IP, privacy/security and material-contract schedules.
  recommended_next_steps:
    - Validate valuation against current revenue, gross margin, cash burn and energy-cycle sensitivity.
    - Perform customer, vendor and worker cohort diligence with contract and compliance sample testing.
    - Review rebrand execution, product roadmap and pipeline conversion after the return to RigUp branding.
    - Have counsel review worker classification, payroll/tax, safety, insurance, privacy/security, IP and litigation schedules.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources verify a $2.90B valuation anchor and active operating surface, but financial statements, revenue quality, debt, cap table and cash runway are private.
    founder_claim_ids: [FC-001]
    evidence_claim_ids: [EC-001, EC-002, EC-010]
    risk_ids: [R-001, R-002, R-009]
    sections:
      - section_id: I.A
        title: Funding, valuation and capitalization
        checklist_question_ids: [I.A.1, I.B.1, I.C.1]
        summary: CB Insights provides the primary unicorn eligibility anchor at $2.90B; the underlying financing terms and current valuation support require data-room records.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Workrise is listed by CB Insights as a private U.S. unicorn with a $2.90B valuation.
            evidence_claim_ids: [EC-001]
            risk_ids: [R-001]
        hidden_risks:
          - Down-round protections, debt, warrants or liquidation preferences may reduce common-equity value.
        evidence_gaps:
          - No current cap table, investor rights, option pool, debt schedule or valuation support was public.
        follow_up_questions:
          - Provide all financing documents, board approvals, cap table, debt instruments, option pool and current valuation support.
        table_ids: [T-001]
        figure_ids: [F-001, F-002]
        evidence_claim_ids: [EC-001, EC-002, EC-010]
      - section_id: I.B
        title: Revenue quality and unit economics
        checklist_question_ids: [I.D.1, I.E.1, I.F.1]
        summary: Product pages show vendor, workforce and source-to-pay monetization surfaces, but no public revenue, gross margin, retention or working-capital data.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Public materials identify monetizable enterprise software and services, while actual economics remain private.
            evidence_claim_ids: [EC-003, EC-004, EC-005]
            risk_ids: [R-001, R-002]
        hidden_risks:
          - Staffing, payroll, vendor pass-throughs and field-ticket workflows can create low gross margins or working-capital strain.
        evidence_gaps:
          - No ARR, revenue mix, take rate, gross margin, AR/AP aging, cash runway or customer concentration was public.
        follow_up_questions:
          - Provide revenue by product, gross margin by segment, customer cohorts, AR/AP aging, cash burn and energy-cycle sensitivity.
        table_ids: [T-002]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-004, EC-005, EC-010]
  - chapter_id: II
    title: Products
    chapter_summary: Current pages describe source-to-pay, vendor-management, workforce and AI-enabled data capabilities for energy operations; product quality and usage are private.
    founder_claim_ids: [FC-002, FC-003]
    evidence_claim_ids: [EC-003, EC-004, EC-005, EC-006]
    risk_ids: [R-004, R-006]
    sections:
      - section_id: II.A
        title: Product portfolio and functionality
        checklist_question_ids: [II.A.1, II.A.2]
        summary: RigUp publicly offers vendor management, capital management, bid management, compliance, field ticket, workforce and worker-portal capabilities.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Public product pages support a broad energy source-to-pay and contingent workforce suite.
            evidence_claim_ids: [EC-003, EC-004, EC-005, EC-006]
            risk_ids: [R-004]
        hidden_risks:
          - Broad product claims may mask implementation complexity, integration debt or services-heavy delivery.
        evidence_gaps:
          - No product usage, uptime, implementation success, roadmap completion or feature-level revenue data was public.
        follow_up_questions:
          - Provide product usage, implementation timelines, NPS, support tickets, uptime, roadmap and revenue by module.
        table_ids: [T-003]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-003, EC-004, EC-005, EC-006]
      - section_id: II.B
        title: Pricing, packaging and product-market fit
        checklist_question_ids: [II.B.1, II.C.1]
        summary: The public site drives users to demos and networks; pricing, contract structure, attach rates and renewal performance are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: II.B-F1
            finding: Demo, vendor-network and workforce-network CTAs are visible but realized pricing is not.
            evidence_claim_ids: [EC-003, EC-004, EC-005]
            risk_ids: [R-001, R-004]
        hidden_risks:
          - Revenue may depend on lower-margin managed services rather than scalable software subscription economics.
        evidence_gaps:
          - No public price book, contract form, discounting, module attach, renewal or implementation-cost schedule was found.
        follow_up_questions:
          - Provide price book, standard order forms, discounting, attach rates, renewal cohorts and implementation margin.
        table_ids: [T-004]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-004, EC-005, EC-010]
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence shows energy-operator, vendor and worker-network positioning, but customer names, revenue concentration and retention are not sufficiently public.
    founder_claim_ids: [FC-003, FC-004]
    evidence_claim_ids: [EC-004, EC-005, EC-010]
    risk_ids: [R-002, R-003, R-005]
    sections:
      - section_id: III.A
        title: Customer, vendor and worker scale
        checklist_question_ids: [III.A.1, III.B.1, III.C.1]
        summary: The workforce page claims 10,000+ vetted workers, 400+ roles and 50+ basins; vendor and customer revenue quality is private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Worker-network scale metrics are public company claims that need active-cohort and compliance validation.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-003, R-005]
        hidden_risks:
          - Headline supply counts may overstate active, compliant, available or high-performing workers.
        evidence_gaps:
          - No active customer list, top-customer revenue, vendor count, active worker cohort, fill rate or churn data was public.
        follow_up_questions:
          - Provide customer concentration, active workers/vendors, fill rates, churn, safety/compliance outcomes and reference approvals.
        table_ids: [T-005]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-005, EC-010]
      - section_id: III.B
        title: Partnerships, suppliers and ecosystem dependencies
        checklist_question_ids: [III.D.1, III.E.1]
        summary: Workrise/RigUp depends on energy operators, service vendors, workers, payroll/payment workflows and likely third-party systems that are not publicly contracted.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: III.B-F1
            finding: Public pages show vendor and workforce networks but not contract terms or dependency concentration.
            evidence_claim_ids: [EC-004, EC-005]
            risk_ids: [R-003, R-005]
        hidden_risks:
          - Worker, vendor, payroll, insurance and customer terms may create concentration or compliance liabilities.
        evidence_gaps:
          - No partner contracts, top-vendor concentration, payroll provider terms, insurance schedule or customer MSAs were public.
        follow_up_questions:
          - Provide material customer, vendor, worker, payroll, insurance and technology contracts.
        table_ids: [T-006]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-005, EC-010]
  - chapter_id: IV
    title: Competition
    chapter_summary: Workrise competes with energy procurement software, field-service workflow tools, staffing firms, managed service providers and in-house procurement teams; public evidence does not prove durable moat.
    founder_claim_ids: [FC-002, FC-003]
    evidence_claim_ids: [EC-003, EC-004, EC-005]
    risk_ids: [R-002, R-004]
    sections:
      - section_id: IV.A
        title: Competitive landscape
        checklist_question_ids: [IV.A.1, IV.B.1]
        summary: The company positions around a combined software-and-services model, which differentiates it from pure software or staffing alternatives but may dilute margins.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Public pages emphasize purpose-built energy software backed by services and staffing expertise.
            evidence_claim_ids: [EC-005, EC-006]
            risk_ids: [R-004]
        hidden_risks:
          - Customers may substitute internal procurement systems, ERP modules, procurement marketplaces or regional staffing vendors.
        evidence_gaps:
          - No win/loss data, churn reasons, pricing benchmarks or competitive displacement rates were public.
        follow_up_questions:
          - Provide competitor win/loss, pricing benchmarks, churn reasons, customer switching data and implementation ROI.
        table_ids: [T-007]
        figure_ids: [F-005]
        evidence_claim_ids: [EC-003, EC-004, EC-005, EC-006]
      - section_id: IV.B
        title: Basis of competition and moat
        checklist_question_ids: [IV.C.1, IV.D.1]
        summary: Potential differentiation comes from energy-specific workflows, worker/vendor networks and data visibility, but defensibility is not public.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: IV.B-F1
            finding: Worker/vendor network scale and source-to-pay data could be valuable if active and proprietary.
            evidence_claim_ids: [EC-004, EC-005]
            risk_ids: [R-004]
        hidden_risks:
          - Network effects may be weak if customers can multi-home across staffing, ERP and procurement providers.
        evidence_gaps:
          - No exclusivity, data-rights, network retention, patent/IP or proprietary algorithm evidence was public.
        follow_up_questions:
          - Provide network-retention metrics, data-rights analysis, IP schedule, win/loss and customer ROI studies.
        table_ids: [T-008]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-005, EC-010]
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Current pages show demo-led enterprise GTM plus vendor and workforce network acquisition, but funnel metrics, CAC, payback and pipeline quality are private.
    founder_claim_ids: [FC-002, FC-004]
    evidence_claim_ids: [EC-003, EC-004, EC-005, EC-007]
    risk_ids: [R-002, R-007]
    sections:
      - section_id: V.A
        title: GTM channels and funnel
        checklist_question_ids: [V.A.1, V.C.1, V.D.1]
        summary: Public CTAs route energy customers to demos and route vendors/workers to network onboarding, but conversion and revenue attribution are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: The GTM motion appears three-sided across energy customers, vendors and workers.
            evidence_claim_ids: [EC-003, EC-004, EC-005]
            risk_ids: [R-007]
        hidden_risks:
          - Three-sided acquisition may require high services spend, recruiting capacity and long enterprise sales cycles.
        evidence_gaps:
          - No lead conversion, pipeline, CAC, payback, sales productivity or vendor/worker activation data was public.
        follow_up_questions:
          - Provide CRM funnel, CAC/payback, sales productivity, activation cohorts and rebrand campaign metrics.
        table_ids: [T-009]
        figure_ids: [F-006]
        evidence_claim_ids: [EC-003, EC-004, EC-005]
      - section_id: V.B
        title: Marketing signals and rebrand execution
        checklist_question_ids: [V.B.1, V.E.1]
        summary: The public site shows a 2025 move from Workrise branding back to RigUp, creating a diligence need around customer understanding and brand equity.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.B-F1
            finding: The rebrand page and site banners indicate Workrise is now RigUp.
            evidence_claim_ids: [EC-007]
            risk_ids: [R-007]
        hidden_risks:
          - Rebrand could signal strategic repositioning after growth, customer-fit or market-cycle challenges.
        evidence_gaps:
          - No customer communication metrics, website conversion impact, brand tracking or churn impact was public.
        follow_up_questions:
          - Provide rebrand rationale, customer communications, funnel impact, churn impact and sales enablement data.
        table_ids: [T-010]
        figure_ids: []
        evidence_claim_ids: [EC-007, EC-010]
  - chapter_id: VI
    title: Research and Development
    chapter_summary: Public pages describe dashboards, AI-powered insights, compliance, field-ticket and worker portal capabilities; R&D spend, engineering org, IP and security posture are not public.
    founder_claim_ids: [FC-003, FC-004]
    evidence_claim_ids: [EC-004, EC-005, EC-008]
    risk_ids: [R-004, R-006]
    sections:
      - section_id: VI.A
        title: Product and technical organization
        checklist_question_ids: [VI.A.1, VI.B.1]
        summary: The workforce page claims AI-powered insights, worker portals, spend dashboards and digital field-ticket workflows, but engineering delivery metrics are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.A-F1
            finding: Public product surfaces imply data, workflow, compliance and AI capabilities across field operations.
            evidence_claim_ids: [EC-004, EC-005]
            risk_ids: [R-006]
        hidden_risks:
          - AI and data claims may create security, accuracy, explainability and customer-data-rights obligations.
        evidence_gaps:
          - No R&D budget, model documentation, security report, uptime, incident logs or engineering headcount was public.
        follow_up_questions:
          - Provide architecture, R&D roadmap, AI/data governance, uptime, incidents, security audits and engineering org chart.
        table_ids: [T-011]
        figure_ids: [F-007]
        evidence_claim_ids: [EC-004, EC-005, EC-010]
      - section_id: VI.B
        title: IP, roadmap and technical dependencies
        checklist_question_ids: [VI.C.1, VI.D.1]
        summary: Product value depends on workflow data, integrations, payroll/vendor systems and energy-specific workflows, but IP and dependency schedules are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VI.B-F1
            finding: Public product modules are visible, but IP ownership and third-party dependencies require private diligence.
            evidence_claim_ids: [EC-004, EC-005, EC-010]
            risk_ids: [R-004, R-006]
        hidden_risks:
          - Third-party payroll, background-check, ERP or compliance integrations could constrain margins, uptime or data rights.
        evidence_gaps:
          - No IP schedule, patent/trademark review, source-code ownership, SOC report or dependency list was public.
        follow_up_questions:
          - Provide IP schedule, source-code assignment records, vendor dependency list, SOC/security reports and roadmap.
        table_ids: [T-012]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-005, EC-010]
  - chapter_id: VII
    title: Management and Personnel
    chapter_summary: Careers materials show active employer brand, values and teams in Austin, Belfast and Calgary; leadership roster, headcount, attrition and governance require private records.
    founder_claim_ids: [FC-005]
    evidence_claim_ids: [EC-008, EC-010]
    risk_ids: [R-008]
    sections:
      - section_id: VII.A
        title: Senior leadership and governance
        checklist_question_ids: [VII.A.1, VII.B.1]
        summary: Current collected public sources did not provide a reliable full senior-management roster; governance and key-person risk require direct company records.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VII.A-F1
            finding: Careers and about pages show active company operations but not a complete leadership/board roster.
            evidence_claim_ids: [EC-006, EC-008]
            risk_ids: [R-008]
        hidden_risks:
          - Rebrand and energy-cycle pressure may have created management turnover not visible in public pages.
        evidence_gaps:
          - No full executive roster, board list, executive agreements or succession plan was found in collected sources.
        follow_up_questions:
          - Provide leadership roster, board composition, executive agreements, retention grants and succession plan.
        table_ids: [T-013]
        figure_ids: [F-008]
        evidence_claim_ids: [EC-006, EC-008, EC-010]
      - section_id: VII.B
        title: Hiring, culture and retention
        checklist_question_ids: [VII.C.1, VII.F.1, VII.G.1]
        summary: Careers page describes culture, values, benefits and teams in Austin, Belfast and Calgary, but headcount and turnover are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VII.B-F1
            finding: Public careers page confirms active employer brand and multi-location team signal.
            evidence_claim_ids: [EC-008]
            risk_ids: [R-008]
        hidden_risks:
          - Recruiting and retention may be exposed to energy-cycle volatility, rebrand uncertainty and technical talent competition.
        evidence_gaps:
          - No HRIS headcount, attrition, open roles by function, compensation, diversity or employment-claim schedule was public.
        follow_up_questions:
          - Provide headcount by function/location, hiring plan, attrition, compensation, engagement surveys and employment claims.
        table_ids: [T-014]
        figure_ids: []
        evidence_claim_ids: [EC-008, EC-010]
  - chapter_id: VIII
    title: Legal and Related Matters
    chapter_summary: Worker/vendor operations create legal, payroll, tax, safety, classification, insurance, privacy and data-rights diligence needs that are not resolved by public pages.
    founder_claim_ids: [FC-001, FC-003, FC-004]
    evidence_claim_ids: [EC-009, EC-010]
    risk_ids: [R-003, R-006, R-010]
    sections:
      - section_id: VIII.A
        title: Litigation, regulatory and worker compliance matters
        checklist_question_ids: [VIII.A.1, VIII.B.1, VIII.C.1]
        summary: No reliable public legal schedule was available; the operating model requires counsel-led review of worker classification, payroll/tax, safety and contract liabilities.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.A-F1
            finding: Public pages show workforce and vendor operations but not legal/compliance outcomes.
            evidence_claim_ids: [EC-005, EC-009]
            risk_ids: [R-003, R-010]
        hidden_risks:
          - Worker classification, wage/hour, payroll tax, safety, insurance and customer indemnity exposure could be material.
        evidence_gaps:
          - No litigation schedule, employment claim schedule, payroll/tax audit, OSHA/safety record, insurance schedule or regulatory correspondence was public.
        follow_up_questions:
          - Provide counsel legal schedules, payroll/tax audits, worker classification memo, safety metrics, insurance policies and material contracts.
        table_ids: [T-015]
        figure_ids: [F-009, F-010]
        evidence_claim_ids: [EC-005, EC-009, EC-010]
      - section_id: VIII.B
        title: Intellectual property, privacy and data rights
        checklist_question_ids: [VIII.D.1, VIII.E.1, VIII.F.1]
        summary: AI/data, worker, customer, vendor and payment workflows raise privacy, security and data-rights issues that require private documentation.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.B-F1
            finding: Data-intensive workforce and spend workflows are public, but ownership, security and privacy controls are not.
            evidence_claim_ids: [EC-004, EC-005, EC-009]
            risk_ids: [R-006, R-010]
        hidden_risks:
          - Customer operational data, worker records and AI insights may have contractual or statutory restrictions.
        evidence_gaps:
          - No SOC report, DPA inventory, privacy impact assessment, IP schedule or data-rights memo was public.
        follow_up_questions:
          - Provide security reports, DPA inventory, privacy/security assessments, IP schedule and data-rights terms.
        table_ids: [T-016]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-005, EC-009, EC-010]
