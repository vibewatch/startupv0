risk_register:
  - risk_id: R-001
    risk_title: Financial and valuation opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources provide a $2.90B valuation anchor but not current revenue, margin, cash runway, debt, cap table or valuation support.
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.A, I.B]
    evidence_claim_ids: [EC-001, EC-002, EC-010]
    mitigation_or_diligence_request: Request audited financials, cap table, financing documents, cash/debt schedules, revenue cohorts and current valuation support.
  - risk_id: R-002
    risk_title: Energy-cycle exposure
    risk_category: market
    severity: high
    likelihood: medium
    description: The company is purpose-built for energy projects, so commodity cycles and energy capex budgets may materially affect demand.
    impacted_chapter_ids: [I, III, IV, V]
    impacted_section_ids: [I.B, III.A, IV.A, V.A]
    evidence_claim_ids: [EC-003, EC-006]
    mitigation_or_diligence_request: Request revenue by energy segment, customer budgets, churn during downturns and stress-case forecasts.
  - risk_id: R-003
    risk_title: Worker, vendor and compliance exposure
    risk_category: legal
    severity: high
    likelihood: unknown
    description: Workforce and vendor operations may involve worker classification, wage/hour, payroll tax, safety, insurance and compliance obligations.
    impacted_chapter_ids: [III, VIII]
    impacted_section_ids: [III.A, III.B, VIII.A]
    evidence_claim_ids: [EC-004, EC-005, EC-009]
    mitigation_or_diligence_request: Review worker classification memos, payroll/tax audits, safety metrics, insurance policies and legal schedules.
  - risk_id: R-004
    risk_title: Product and services margin mix
    risk_category: product
    severity: medium
    likelihood: medium
    description: The software-plus-services positioning may be less scalable than pure software and require high managed-service support.
    impacted_chapter_ids: [II, IV, VI]
    impacted_section_ids: [II.A, II.B, IV.A, VI.A]
    evidence_claim_ids: [EC-004, EC-005, EC-006]
    mitigation_or_diligence_request: Request revenue/gross margin by module and service line plus implementation staffing data.
  - risk_id: R-005
    risk_title: Customer and supply concentration unknown
    risk_category: customer
    severity: medium
    likelihood: high
    description: Public pages do not disclose top customer revenue, active vendor/worker concentration, retention or churn.
    impacted_chapter_ids: [III]
    impacted_section_ids: [III.A, III.B]
    evidence_claim_ids: [EC-004, EC-005, EC-010]
    mitigation_or_diligence_request: Request concentration, retention and active supply cohort data plus customer/vendor/worker references.
  - risk_id: R-006
    risk_title: Data, AI and security controls unknown
    risk_category: technical
    severity: medium
    likelihood: unknown
    description: AI-powered workforce/spend data workflows require controls that were not public.
    impacted_chapter_ids: [VI, VIII]
    impacted_section_ids: [VI.A, VI.B, VIII.B]
    evidence_claim_ids: [EC-005, EC-009, EC-010]
    mitigation_or_diligence_request: Review security reports, AI governance, data-rights terms, incident history and DPAs.
  - risk_id: R-007
    risk_title: Rebrand and positioning execution risk
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: The public return from Workrise branding to RigUp may signal strategic repositioning that requires customer and funnel validation.
    impacted_chapter_ids: [V]
    impacted_section_ids: [V.B]
    evidence_claim_ids: [EC-007]
    mitigation_or_diligence_request: Request rebrand rationale, customer communications, funnel impact and churn analysis.
  - risk_id: R-008
    risk_title: Management and hiring opacity
    risk_category: team
    severity: medium
    likelihood: medium
    description: Careers pages show active employer brand, but leadership, board, headcount, attrition and employment claims are not public.
    impacted_chapter_ids: [VII]
    impacted_section_ids: [VII.A, VII.B]
    evidence_claim_ids: [EC-008, EC-010]
    mitigation_or_diligence_request: Request org chart, leadership roster, board records, HRIS history, attrition and employment claim schedules.
  - risk_id: R-009
    risk_title: Working-capital and payroll exposure
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: Workforce, field ticket, invoicing and payment workflows may create cash timing and credit exposure.
    impacted_chapter_ids: [I, VIII]
    impacted_section_ids: [I.B, VIII.A]
    evidence_claim_ids: [EC-004, EC-005]
    mitigation_or_diligence_request: Request AR/AP aging, payroll funding, credit losses, bad debt, factoring/debt facilities and customer payment terms.
  - risk_id: R-010
    risk_title: Legal, IP and privacy documentation gap
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Legal, IP, privacy, security and material-contract records were not public.
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.A, VIII.B]
    evidence_claim_ids: [EC-009, EC-010]
    mitigation_or_diligence_request: Counsel should provide legal schedules, IP schedules, DPAs, privacy/security reviews and material contracts.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, current cap table, investor rights, option/debt schedule and valuation support.
    why_it_matters: Required to determine whether the $2.90B valuation remains supportable.
    suggested_source_or_request: CFO and counsel data-room production.
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.A
    missing_information: Top customers, active vendors/workers, retention, fill rate, safety/compliance outcomes and customer references.
    why_it_matters: Validates network quality, revenue concentration and compliance risk.
    suggested_source_or_request: Data warehouse exports, contract schedules and reference-call approvals.
    priority: high
  - gap_id: G-003
    chapter_id: VI
    section_id: VI.A
    missing_information: Product usage, uptime, security reports, AI/data governance, roadmap and R&D headcount.
    why_it_matters: Determines whether public product claims are scalable and defensible.
    suggested_source_or_request: CTO/product/security data-room production.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Worker classification, payroll/tax, safety, insurance, litigation, IP, privacy/security and material-contract schedules.
    why_it_matters: Compliance liabilities can be material in workforce and vendor-management models.
    suggested_source_or_request: Counsel-prepared schedules and third-party compliance review.
    priority: high
