executive_summary:
  overall_assessment: Culture Amp is a credible mature HR-tech unicorn with verified product breadth, customer-count/logos and security/privacy claims. The key diligence question is whether a 2021-era valuation is still supported by current ARR growth, retention, margins and defensible differentiation in a crowded HR tech market.
  investment_or_diligence_thesis: Proceed with private SaaS diligence. Underwrite Culture Amp as a scaled employee-experience platform, but require proof of current ARR quality, net retention, module attach, enterprise churn, AI governance and security artifacts.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Culture Amp at $1.50B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Platform modules and AI/integration features are public.
      evidence_claim_ids:
        - EC-002
        - EC-006
        - EC-007
    - founder_claim_id: FC-003
      summary: Customer count/logos and case studies are public.
      evidence_claim_ids:
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: The public $1.5B valuation dates to 2021 while current ARR, growth, burn, profitability and retention are private.
    - risk_id: R-002
      summary: Culture Amp competes with large HR suites, engagement tools and performance-management platforms.
    - risk_id: R-003
      summary: The platform processes sensitive employee feedback/performance data and markets AI capabilities; SOC/ISO claims require artifact review.
  key_evidence_gaps:
    - Current ARR, growth, NRR/GRR, churn, gross margin and valuation.
    - Customer concentration and renewal calendars.
    - SOC/ISO reports, DPA/subprocessors, incident history and AI governance.
    - Complete management, headcount, compensation and turnover schedules.
  recommended_next_steps:
    - Run SaaS QoE and retention cohort review.
    - Validate top customer references and logo/customer-count definitions.
    - Review security/privacy/AI governance documents.
    - Benchmark product differentiation and win/loss against HR suites and point solutions.
