report_metadata:
  report_title: Culture Amp Public-Source Startup Diligence Report
  target_company: Culture Amp
  website: https://www.cultureamp.com/
  known_aliases:
    - Culture Amp Pty Ltd
    - Culture Amp employee experience platform
    - People Geek
  sector: HR technology; employee experience, engagement, performance and development software
  geography: Australia; Richmond/Melbourne origin with global SaaS operations
  company_stage: Late-stage private venture-backed unicorn
  research_date: 2026-06-11
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from reports/*-diligence-report.yaml and selected this company from the uncovered CB Insights unicorn tracker sample.
    - Used public company pages, CB Insights and Wikipedia unicorn-list context, public press/news pages, product/pricing/customer/security/career pages, and inaccessible-source notes where relevant.
    - No private financial statements, cap table, customer contracts, board materials, data-room files, interviews, paid databases or credentials were used.
  included_jurisdictions:
    - Australia
    - United States
    - United Kingdom
    - European Union/GDPR public signal
    - Global SaaS customers
  excluded_topics:
    - No private financials, cap table, tax files, insurance policies, security reports, SOC reports, contracts, customer references, employee records, or full legal docket searches reviewed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-06-11
      notes: User requested three random uncovered private unicorn diligence reports at standard depth.
