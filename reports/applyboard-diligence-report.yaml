    chapter_summary: ApplyBoard appears differentiated by scale, workflow breadth, AIRC/ApplyProof trust signals, and funding brand, but faces direct institutions, offline agents, program marketplaces, and other aggregators. Market share, price pressure, and win/loss data are not public.
