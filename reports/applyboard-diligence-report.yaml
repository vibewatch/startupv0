risk_register:
  - risk_id: R-001
    risk_title: Stale unicorn valuation and financing overhang
    risk_category: financing
    severity: high
    likelihood: high
    description: The C$4B 2021 valuation is historical; sector press reported possible markdown allegations and no current valuation/cap-table records are public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
    mitigation_or_diligence_request: Request cap table, 409A/fair-value marks, secondary trades, investor marks, financing documents, liquidation preferences, and latest board valuation materials.
  - risk_id: R-002
    risk_title: Destination-market policy shock
    risk_category: regulatory
    severity: high
    likelihood: high
    description: Study-permit caps and PGWP/spousal-work changes in Canada materially affect international-student flows and ApplyBoard’s core demand drivers.
    impacted_chapter_ids:
