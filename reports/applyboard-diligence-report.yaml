report_metadata:
  report_title: ApplyBoard Public-Source Startup Diligence Report
  target_company: ApplyBoard
  website: https://www.applyboard.com/
  known_aliases:
    - ApplyBoard Inc.
    - ApplyBoard
    - ApplyProof
  sector: International student recruitment, education technology, admissions workflow, and document verification
  geography: Canada headquartered with international student, institution, and recruitment-partner activity across major study destinations
  company_stage: Late-stage private Canadian edtech unicorn candidate
  research_date: 2026-05-16
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: CAD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Created exactly one public-source YAML report for ApplyBoard under reports/applyboard-diligence-report.yaml.
    - Prioritized company-owned pages, funding announcements, product/legal/privacy pages, ApplyProof, AIRC information, and ApplyInsights materials.
    - Used independent/news/regulatory sources for layoffs, valuation-risk reporting, international-student policy changes, and agent-aggregator market context.
    - Treated company scale, product, and performance claims as company-authored unless corroborated by independent or official sources.
    - Marked financial statements, revenue, customer concentration, cap table, debt, contracts, insurance, litigation, IP, and employee metrics as gaps when not public.
  included_jurisdictions:
    - Canada
    - United States
    - United Kingdom
    - Australia
    - European Union / EEA where privacy obligations may apply
    - Major student source markets referenced by company pages
  excluded_topics:
    - No private financial statements, bank statements, board packs, forecasts, cap tables, or data-room records were available.
    - No customer, student, agent, management, investor, counsel, auditor, supplier, employee, or regulator interviews were performed.
    - No paid court docket, cap-table, lien, sanction, insurance, credit, web-traffic, app-analytics, or market-share databases were accessed.
    - No non-public personal information or private documents were used.
    - Official trademark/patent-register evidence was not obtained reliably; IP is treated as an evidence gap.
  user_provided_materials:
    - material_id: M-001
      title: User request and prior research summary
      type: prompt_argument
      date_received: 2026-05-16
      notes: User requested exactly one evidence-backed standard_diligence YAML report for ApplyBoard using only public evidence and no PR/commit/branch.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: ApplyBoard operates a large international student recruitment platform with 1.5M+ students helped, 1,500+ institution partners, 6,500+ recruitment partners, and broad student-market reach.
    claim_source: ApplyBoard company pages
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-002
      - EC-009
      - EC-014
    contradiction_summary: Company-owned pages support the scale claims, but active-account definitions, revenue contribution, concentration, churn, and independently audited counts are not public.
