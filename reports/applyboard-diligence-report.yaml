  - founder_claim_id: FC-004
    claim_text: ApplyBoard mitigates recruitment quality and document-fraud risks through AIRC certification and ApplyProof document verification.
    claim_source: ApplyBoard AIRC and ApplyProof pages
    claim_date: null
    mapped_chapter_ids:
