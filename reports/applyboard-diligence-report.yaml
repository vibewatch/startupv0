      - V
      - VIII
    impacted_section_ids:
      - I.B
      - V.A
      - VIII.G
    evidence_claim_ids:
      - EC-012
      - EC-024
    mitigation_or_diligence_request: Request revenue/bookings by destination, scenario forecast, policy monitoring process, and diversification plan across destination countries.
