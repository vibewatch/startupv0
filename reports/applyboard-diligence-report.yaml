executive_summary:
  overall_assessment: ApplyBoard has credible public evidence for historical unicorn status, major funding, broad marketplace scale, recognizable investor/partner signals, and product breadth across applications, institution services, recruitment partners, ApplyProof, and ApplyInsights. The report should be treated as a diligence screen rather than investment approval because current financial quality, valuation, customer concentration, contract economics, legal posture, IP, insurance, and post-policy-shock operating performance are not publicly verifiable.
  investment_or_diligence_thesis: The investment thesis is a scaled international-student recruitment marketplace with trust/compliance tooling and large institution/recruitment-partner reach. The central diligence question is whether ApplyBoard can sustain profitable, compliant enrollments and defend valuation after Canada and other destination-market policy changes, repeated layoffs, agent-governance scrutiny, and possible valuation markdowns.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Historical financing through the 2021 C$375M Series D at C$4B valuation is well supported by public announcements.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: ApplyBoard’s platform, institution services, recruitment-partner workflows, ApplyProof, and ApplyInsights are publicly visible products/services.
      evidence_claim_ids:
        - EC-006
        - EC-008
        - EC-016
    - founder_claim_id: FC-006
      summary: Public company pages identify the Basiri co-founders and claim a 750+ employee, 35+ country workforce footprint.
      evidence_claim_ids:
        - EC-017
  biggest_risks:
    - risk_id: R-002
      summary: Official Canada policy caps and related study/work-permit changes create a material demand shock for the core market.
    - risk_id: R-001
      summary: The last clean public valuation is from 2021, and sector press reported markdown allegations; current valuation/cap table are private.
    - risk_id: R-006
      summary: Current ARR, margin, cash burn, debt, runway, backlog, AR, and forecast quality are not publicly verifiable.
    - risk_id: R-003
      summary: Large recruitment-partner networks create agent/sub-agent compliance and reputation risk despite AIRC and ApplyProof mitigants.
  key_evidence_gaps:
    - Audited financial statements, management accounts, ARR bridge, revenue by product/channel/geography, gross margin, burn, cash, debt, runway, AR aging, backlog, and tax positions.
    - Current cap table, fully diluted ownership, option pool, warrants, debt, liquidation preferences, investor rights, latest 409A/fair-value marks, and any secondary transactions.
    - Customer/partner revenue concentration, top 15 customers, institution agreements, partner commission schedules, churn, NRR, severed relationships, and top suppliers.
    - Product-level adoption, pricing, take rates, commission economics, CAC/payback, sales productivity, marketing budgets, and policy-shock scenario forecasts.
    - Counsel litigation letter, regulator correspondence, privacy/security audits, IP/register schedules, OSS SBOM, material contracts, and insurance schedules.
  recommended_next_steps:
    - Run financial QoE and valuation/cap-table diligence before relying on the historical unicorn valuation.
    - Quantify exposure to Canada and other destination-policy changes using bookings, applications, enrollments, cancellations, and revenue by destination.
    - Audit recruitment-partner compliance, AIRC status, complaints, removals, sub-agent policy, and ApplyProof accuracy/adoption.
    - Interview top institutions, recruitment partners, and recent lost/severed relationships to validate quality and retention.
    - Complete legal, privacy, cybersecurity, IP, contract, insurance, and employment diligence with counsel and technical specialists.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies substantial historical financing and a 2021 C$4B valuation, but current financial quality, valuation, debt, revenue, margin, runway, tax, AR, backlog, and projections require private diligence.
    founder_claim_ids:
      - FC-002
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-005
      - EC-012
    risk_ids:
      - R-001
      - R-002
      - R-006
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements, management accounts, product/channel/geography revenue, backlog, or AR aging were public. Public evidence supplies funding and scale signals, not quality-of-earnings evidence.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Current revenue, ARR, margins, cash burn, backlog, and AR aging are not publicly verifiable.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-006
          - finding_id: I.A-F2
            finding: Official Canada policy changes create scenario risk for revenue forecasts and bookings.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
        hidden_risks:
          - Historical scale claims may mask current demand deterioration after destination-policy changes.
          - AR/refund exposure could be material if student applications are cancelled or policy-constrained.
        evidence_gaps:
          - Audited financial statements and management accounts for FY2023-FY2025 YTD.
          - Revenue/gross profit by product, channel, geography, and destination country.
          - Backlog, bookings, cancellations, refund liabilities, and AR aging by customer/partner.
        follow_up_questions:
          - Provide monthly financial statements and KPI pack for the last 36 months.
          - Reconcile student/institution/partner scale claims to revenue and active accounts.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-012
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources show demand uncertainty rather than a validated forecast. ApplyInsights discusses 2025 trends, while IRCC caps and independent layoff reporting indicate policy-driven pressure.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Canada policy changes are verified and material to the international-student funnel.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
          - finding_id: I.B-F2
            finding: No board-approved forecast, scenario model, pricing assumptions, capex plan, or external-financing assumption is public.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-006
        hidden_risks:
          - Forecasts may depend on policy rebound assumptions that are not independently validated.
          - Cross-border FX, destination policy, and government instability risk can affect demand and payments.
        evidence_gaps:
          - Three-year quarterly forecast by product, geography, destination country, and channel.
          - Scenario model for Canada, UK, US, Australia, and major source markets.
          - External financing, capex, depreciation, working capital, and debt assumptions.
        follow_up_questions:
          - Provide board-approved forecast model with downside policy scenarios and historical forecast accuracy.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-012
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources verify major financing events but not the current capitalization table, shares, options, warrants, debt, off-balance-sheet liabilities, or current valuation marks.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Historical Series D C$4B valuation is verified, but current valuation is uncertain and possibly impaired.
            evidence_claim_ids:
              - EC-001
              - EC-004
            risk_ids:
              - R-001
          - finding_id: I.C-F2
            finding: Investor and founder ownership percentages, debt instruments, and dilution are private.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-006
        hidden_risks:
          - Preference stack or debt covenants could materially change common-equity economics.
          - Reported valuation markdowns could impair financing flexibility and employee equity incentives.
        evidence_gaps:
          - Fully diluted cap table, debt schedule, option/warrant schedule, side letters, investor rights, and 409A/valuation marks.
        follow_up_questions:
          - Provide current cap table, all financing documents, debt instruments, and latest fair-value/409A materials.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-003
          - EC-004
          - EC-005
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is well documented publicly; tax positions, accounting policies, and current basis for each round are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Public funding history from 2018-2021 totals at least C$617M in announced equity rounds.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-001
          - finding_id: I.D-F2
            finding: Tax, revenue recognition, and current basis by investor require private records.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-006
        hidden_risks:
          - Historical funding may not indicate current runway if burn rose during expansion or demand fell after policy changes.
        evidence_gaps:
          - Tax returns, revenue-recognition memos, transfer-pricing files, NOL schedules, and investor basis by round.
        follow_up_questions:
          - Provide tax/accounting memos and a financing-history schedule with investment amount, ownership, valuation, and current carrying basis.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-003
          - EC-005
  - chapter_id: II
    title: Products
    chapter_summary: ApplyBoard’s core platform, institution services, recruitment-partner workflows, ApplyProof verification, and ApplyInsights content are publicly visible. Product economics, pricing, adoption, profitability, and roadmap timing are private.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-002
      - EC-006
      - EC-007
      - EC-008
      - EC-016
    risk_ids:
      - R-005
      - R-008
      - R-009
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public sources support a multi-sided international-student recruitment platform with institution, partner, verification, and insights products. However, major-customer applications, market share, product-level growth, cost structure, pricing, and profitability are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: The product suite includes marketplace/application workflows, institution services, recruitment-partner workflows, ApplyProof, and ApplyInsights.
            evidence_claim_ids:
              - EC-006
              - EC-008
              - EC-016
            risk_ids:
              - R-008
          - finding_id: II.A-F2
            finding: Pricing, commission rates, unit costs, and product-level margins are not publicly disclosed.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-006
          - finding_id: II.A-F3
            finding: Sensitive document and identity workflows make security/privacy diligence integral to product diligence.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-005
        hidden_risks:
          - A broad product suite may not be profitable if commissions, support costs, and compliance costs are high.
          - ApplyProof is a mitigation but also creates document-verification liability and security obligations.
        evidence_gaps:
          - Product-level ARR, gross margin, usage cohorts, attach rates, roadmap, SLAs, and security attestations.
          - Customer references for ApplyProof and institution growth services.
        follow_up_questions:
          - Provide product P&Ls, adoption cohorts, roadmap, pricing schedules, support-cost allocation, and security architecture.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-011
          - EC-016
