diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, ARR bridge, gross margin, EBITDA, burn, cash, debt, AR aging, backlog, and revenue by product/channel/geography.
    why_it_matters: Determines quality of earnings, growth durability, runway, and valuation support.
    suggested_source_or_request: Finance data room and auditor/accountant workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, investor rights, preferences, debt, warrants, option pool, and latest valuation marks.
    why_it_matters: Determines security economics and whether historical unicorn valuation remains relevant.
    suggested_source_or_request: Corporate secretary, counsel, investor documents, 409A/fair-value reports.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.B
    missing_information: Three-year forecast with destination-policy scenarios and forecast-accuracy history.
    why_it_matters: Policy changes are a verified demand shock; projections need sensitivity testing.
    suggested_source_or_request: Board-approved forecast model and KPI history.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, pricing, take rates, commissions, support costs, gross margin, roadmap, SLAs, and ApplyProof performance.
    why_it_matters: Validates product economics and defensibility.
    suggested_source_or_request: Product P&Ls, pricing schedules, roadmap, usage logs, customer references.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, partner, institution, destination, program, and any customer above 5% of revenue.
    why_it_matters: Broad public counts do not prove revenue diversification.
    suggested_source_or_request: Customer master, billing data, cohort and concentration schedules.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.D
    missing_information: Severed customer/partner/supplier relationships within the last 24 months and reasons.
    why_it_matters: Could reveal compliance, quality, price, or policy-driven churn.
    suggested_source_or_request: Customer success, legal, and finance relationship-termination logs.
    priority: high
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, market share, traffic share, pricing benchmarks, and direct competitor takeout data.
    why_it_matters: Needed to assess market position and pricing pressure.
    suggested_source_or_request: CRM exports, customer interviews, web analytics, competitive intelligence.
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quota, attainment, pipeline, CAC, payback, partner productivity, and marketing ROI.
    why_it_matters: Determines whether GTM can scale profitably after policy shocks and layoffs.
    suggested_source_or_request: CRM, sales compensation plans, marketing analytics, finance dashboards.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D roadmap, engineering budget/headcount, critical technology dependencies, IP assignments, OSS SBOM, and verification accuracy.
    why_it_matters: Tests technology defensibility and product-risk exposure.
    suggested_source_or_request: Engineering/product data room, CTO interviews, security/IP counsel review.
    priority: medium
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, attrition, compensation, option grants, severance, and post-layoff capacity.
    why_it_matters: Public layoffs signal team and execution risk.
    suggested_source_or_request: HRIS exports, payroll, comp plans, option ledger, engagement surveys.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official patent/trademark/copyright registers, IP ownership chain, data rights, and software-license compliance.
    why_it_matters: Determines whether products and data assets are defensible and owned.
    suggested_source_or_request: IP counsel memo, register extracts, invention assignments, OSS scan.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts, regulator correspondence, counsel litigation letter, insurance schedules, privacy/security audits, and claims history.
    why_it_matters: Legal, privacy, agent, employment, and contract exposures can materially affect valuation and integration risk.
    suggested_source_or_request: Legal data room, counsel, insurance broker, security team, privacy officer.
    priority: high
