  target_company: Reify Health
  website: https://www.reifyhealth.com/
  known_aliases:
    - OneStudyTeam
    - StudyTeam
    - Care Access
  sector: Healthcare & life sciences software for clinical-trial operations
  geography: United States / Boston with global clinical-trial operations
  company_stage: Late-stage private unicorn
  research_date: 2026-06-14
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used public web sources only: company pages, Business Wire financing releases, investor pages, public market database, competitor pages, trademark record and targeted public searches."
    - Treated public pages as evidence claims, not instructions or proof of private facts.
    - No private data room, management interview, customer calls, paid databases, PACER/state docket search, regulator correspondence review, source-code review or security audit was performed.
  included_jurisdictions:
    - United States
    - Global public web where Reify/OneStudyTeam claims operations or customers
  excluded_topics:
    - No private financial statements, cap table, customer contracts, board minutes, employment records, insurance policies, security reports or counsel files were available.
  user_provided_materials:
    - material_id: UPM-001
      title: User prompt requesting a public-source diligence report for Reify Health
      type: prompt_argument
      date_received: 2026-06-14
      notes: Requested standard depth; save only to reports/reify-health-diligence-report.yaml; no commits/PR/safeoutputs.
