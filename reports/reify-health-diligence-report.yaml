      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Run win/loss, pricing and switching-cost diligence against named competitors.
  - risk_id: R-006
    risk_title: Privacy/security exposure in clinical-trial data workflows
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Sensitive patient, site and sponsor workflows heighten privacy, security, incident and cross-border compliance exposure.
