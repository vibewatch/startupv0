executive_summary:
  overall_assessment: "Track with high-priority private diligence. Public evidence supports an active late-stage private healthcare/life-sciences unicorn with substantial financing, a sponsor/site clinical-trial operations product, recognizable pharma logos and global site reach. The highest-value diligence remains private: financials, cap table, customer concentration, security/privacy proof, contracts and legal/regulatory searches."
  investment_or_diligence_thesis: Reify Health / OneStudyTeam appears to address a large clinical-trial enrollment and operations bottleneck with evidence of global sponsor and site adoption. Investment attractiveness depends on proving durable sponsor-paid revenue, active site network quality, retention, unit economics, competitive differentiation against broad clinical platforms, and compliant handling of sensitive clinical-trial data.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support Reify as a private unicorn valued around or above $4.8B.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-002
      summary: Reify publicly positions OneStudyTeam and Care Access within its portfolio.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Public sources support broad StudyTeam site/sponsor adoption, including 10,000+ site claims.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-008
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Private financials and cap-table terms are not public.
    - risk_id: R-003
      summary: Revenue concentration and customer retention are not public despite named logos.
    - risk_id: R-006
      summary: Privacy/security exposure is material because product workflows touch clinical-trial data.
  key_evidence_gaps:
    - Audited financials, ARR, gross margin, burn, cash/runway, debt and QoE.
    - Fully diluted cap table, financing terms, investor rights and liquidation waterfall.
    - Top-customer revenue, contracts, renewal/churn cohorts and customer references.
    - Security/privacy evidence artifacts, AI governance, DPAs, subprocessors and incident history.
    - Counsel-led litigation, regulatory, IP, employment, material-contract and insurance diligence.
  recommended_next_steps:
    - Open financial/cap-table/customer data room before valuation underwriting.
    - Run customer, site and sponsor reference calls to validate active usage, ROI and retention.
    - Commission privacy/security/legal/IP diligence given clinical-trial data workflows and AI disclosures.
    - Obtain KPI definitions memo reconciling public site/sponsor/country/product metrics.
