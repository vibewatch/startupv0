    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Request SOC reports, penetration tests, incident logs, DPAs, subprocessors and data maps.
  - risk_id: R-007
    risk_title: AI-assisted functionality governance risk
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Privacy policy discloses AI-assisted analysis, matching, recommendations and workflow insights; governance controls are not public.
    impacted_chapter_ids:
      - VIII
      - VI
    impacted_section_ids:
      - VIII.G
      - VI.B
    evidence_claim_ids: *a13
    mitigation_or_diligence_request: Request AI model governance, human-review controls, DPIAs and customer terms.
  - risk_id: R-008
    risk_title: Sponsor-budget and trial-cycle cyclicality
    risk_category: market
    severity: medium
    likelihood: medium
    description: Revenue likely depends on pharma/CRO trial-start budgets and site adoption cycles.
