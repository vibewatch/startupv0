risk_register:
  - risk_id: R-001
    risk_title: Private financial statement opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: No public audited financials, ARR, gross margin, burn, runway or cash data support underwriting.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Open monthly financial statements, ARR bridge, cash/burn/runway, QoE and bank/debt schedules.
  - risk_id: R-002
    risk_title: Cap-table and liquidation-waterfall opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: Late-stage financing at high valuation could include preferences, ratchets or investor rights not visible publicly.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request fully diluted cap table, financing documents, side letters, debt, warrants and waterfall.
  - risk_id: R-003
    risk_title: Customer concentration and revenue quality unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named pharma logos do not reveal revenue concentration, renewals, churn, committed backlog or economics.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request top-customer revenue, contracts, cohort retention and customer calls.
  - risk_id: R-004
    risk_title: Metric comparability and product-rename ambiguity
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Site counts and product labels vary by source and over time, complicating growth interpretation.
    impacted_chapter_ids:
      - II
      - III
    impacted_section_ids:
      - II.A
      - III.A
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request a reconciled operating metrics definitions memo and KPI history.
  - risk_id: R-005
    risk_title: Platform competition from Veeva, Florence and Advarra
    risk_category: market
    severity: high
    likelihood: medium
    description: Large competitors cover adjacent clinical-operations workflows and may pressure pricing or bundle against Reify.
