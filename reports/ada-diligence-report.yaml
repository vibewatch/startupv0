risk_register:
  - risk_id: R-001
    risk_title: Financial quality and valuation bridge are not public
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Private ARR, margin, cash runway, valuation bridge, and cap-table terms are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
    evidence_claim_ids:
      - EC-001
      - EC-007
    mitigation_or_diligence_request: Request audited financials, monthly ARR/bookings, gross margin, cash, burn, debt, cap table, financing documents, 409A/fair-value support and valuation bridge.
  - risk_id: R-002
    risk_title: Customer concentration and retention are not public
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Enterprise customer concentration, retention, and competitive displacement risk are not visible from logo/case-study marketing.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-004
      - EC-007
    mitigation_or_diligence_request: Request top-customer revenue schedule, renewal/churn cohorts, customer references, pipeline and concentration by segment/geography.
  - risk_id: R-003
    risk_title: Regulatory, privacy, security and control exposure
    risk_category: technical
    severity: high
    likelihood: medium
    description: AI safety, data-retention, compliance, and hallucination-control claims need audit artifacts and enterprise customer validation.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.G
    evidence_claim_ids:
      - EC-005
    mitigation_or_diligence_request: Review SOC/audit reports, regulatory correspondence, incident logs, policies, control exceptions, DPAs, customer obligations and counsel memos.
  - risk_id: R-004
    risk_title: Competitive pricing and distribution pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Incumbents and focused competitors can bundle adjacent workflows or pressure price, while actual win/loss and CAC are private.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-002
      - EC-007
    mitigation_or_diligence_request: Request win/loss analysis, CAC/payback by channel, discounting, churn by competitor, and product usage depth.
  - risk_id: R-005
    risk_title: Product execution and technology defensibility require proof
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Public product breadth does not prove defensibility, roadmap delivery, uptime, model/control quality, or implementation economics.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-003
    mitigation_or_diligence_request: Review roadmap, release metrics, architecture, uptime/SLA, incident history, security design, IP assignments and engineering productivity.
  - risk_id: R-006
    risk_title: Management, headcount and attrition visibility is limited
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Public sources do not provide a complete leadership roster, org chart, function-level headcount, compensation arrangements or turnover history.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.G
    evidence_claim_ids:
      - EC-007
    mitigation_or_diligence_request: Request org chart, employee census, executive agreements, board minutes, attrition data, recruiting plan and key-person retention analysis.
