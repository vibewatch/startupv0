diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, ARR/bookings, gross margin, cash, debt, backlog, AR aging, and budget-to-actuals.
    why_it_matters: Determines revenue quality, profitability, runway and valuation support.
    suggested_source_or_request: Finance data room and CFO Q&A.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, liquidation preferences, option pool, warrants, debt, investor rights and waterfall.
    why_it_matters: Determines economic ownership and transaction proceeds.
    suggested_source_or_request: Corporate secretary / counsel / equity platform export.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer-level ARR, top 15 customers, churn/NRR cohorts, renewal calendar and concentration over 5%.
    why_it_matters: Customer quality and retention drive valuation and downside risk.
    suggested_source_or_request: RevOps/CS data room, billing system export and customer calls.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, sales cycle, channel attribution and pipeline coverage.
    why_it_matters: GTM efficiency determines sustainable growth.
    suggested_source_or_request: Sales/marketing dashboards and board packs.
    priority: high
  - gap_id: G-005
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, roadmap, uptime, defects, implementation timelines, support tickets and product gross margin.
    why_it_matters: Product breadth and reliability are central to value and risk.
    suggested_source_or_request: Product analytics, incident/support exports and architecture review.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: AI/MCP governance, data-access controls, roadmap adoption and security reviews.
    why_it_matters: Agentic data access can create privacy/security risk.
    suggested_source_or_request: Security architecture, AI governance policy, access logs and product KPIs.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount by function/location, attrition, hiring plan, engagement and employee relations records.
    why_it_matters: Execution capacity and morale risk follow public layoff signal.
    suggested_source_or_request: HRIS export, engagement survey, attrition dashboard and HR/legal log.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation docket, pleadings, settlements, reserves, claims notices and counsel assessment.
    why_it_matters: Search snippets indicate possible privacy litigation leads but no primary docket was retrieved.
    suggested_source_or_request: Outside counsel docket search and litigation schedule.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.C
    missing_information: SOC reports, PCI AOC, ISO certificate, bridge letters, pentest results, incident history and subprocessor list.
    why_it_matters: Security posture affects enterprise trust and regulatory risk.
    suggested_source_or_request: Security/compliance trust-room package.
    priority: high
  - gap_id: G-010
