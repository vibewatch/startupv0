report_metadata:
  report_title: ChargeBee Technologies Startup Diligence Report
  target_company: ChargeBee Technologies
  website: https://www.chargebee.com/
  known_aliases:
    - Chargebee
    - ChargeBee
    - Chargebee Inc.
    - ChargeBee Technologies
  sector: Financial services / subscription billing, revenue management, and monetization software
  geography: United States (San Francisco unicorn-list city) with global customers and India-origin operations
  company_stage: Private unicorn / Series H / active operating company
  research_date: 2026-05-22
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public internet evidence only, prioritizing company pages, CB Insights, funding releases, SEC/EDGAR, trademark records, reputable news, product/pricing/security pages, and competitor public pages.
    - Treated company-published product, customer, scale and security claims as verified only for the public statement unless independently corroborated.
    - Verified eligibility through CB Insights unicorn row/profile, active company pages and SEC public-filing signals; no public IPO, acquisition or shutdown evidence was found in reviewed sources.
    - Marked non-public financials, cap table, customer revenue, contracts, legal dockets, insurance, security reports and HR records as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - India
    - European Union / United Kingdom data-transfer posture
    - Global markets referenced by public company materials
  excluded_topics:
    - No private data room, management interview, customer calls, board materials, paid legal docket exports, SOC reports, insurance schedules, tax returns, or HRIS data were available.
  user_provided_materials:
    - material_id: UPM-001
      title: Candidate unicorn row supplied in workflow request
      type: workflow_request
      date_received: 2026-05-22
      notes: Included company name, slug, valuation, date joined, country, city, industry, profile URL, and CB Insights source.
