risk_register:
  - risk_id: R-001
    risk_title: Stale valuation and financial opacity
    risk_category: financial
    severity: high
    likelihood: medium
    description: The $3.5B valuation is a 2022 financing/list anchor; public sources do not disclose ARR, growth, margins, cash, debt or current marks.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited financials, KPI pack, cash/debt, valuation marks and financing documents.
  - risk_id: R-002
    risk_title: Customer concentration and retention unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public logos and 6,500+ customer claims do not disclose top-customer ARR, churn, NRR or implementation health.
    impacted_chapter_ids:
