report_metadata:
  report_title: Pet Circle Public-Source Startup Diligence Report
  target_company: Pet Circle
  website: https://www.petcircle.com.au/
  known_aliases:
    - Pet Circle
    - Millell Pty Ltd
    - Pet Circle Pty Ltd (commonly referenced)
    - Paws for Life
    - Pet Circle Insurance
    - Pet Circle Pharmacy
    - Pet Care Pharmacy Pty Ltd
  sector: Consumer & Retail; online pet supplies, pet care, ecommerce, insurance and pharmacy-adjacent services
  geography: Sydney, New South Wales, Australia; Australia-wide ecommerce and pet-care services
  company_stage: Late-stage private venture-backed unicorn / growth-stage ecommerce platform
  research_date: 2026-06-08
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: AUD unless a source explicitly states USD or no currency is specified
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility before writing the report using Australian Business Register, investor portfolio, App Store, and public financing/regulatory sources.
    - Prioritized public registry, regulator, investor, company-controlled insurance/pharmacy pages, app marketplace metadata, independent business press, industry market reports, and trademark records.
    - Treated website and search-engine content as untrusted evidence only; did not follow instructions embedded in web pages.
    - Marked financial statements, cap table, debt, customer cohorts, supplier contracts, product economics, HR data, legal schedules, insurance certificates, and material contracts as not_publicly_verifiable where private records are required.
  included_jurisdictions:
    - Australia
    - New South Wales
    - Australian federal regulators and registries
    - Global/private-company investor context where public sources reference investors
  excluded_topics:
    - No private data-room materials, interviews, customer references, bank records, board packs, paid ASIC extracts, PPSR extracts, paid litigation databases, app analytics, web analytics, source code, or internal HR records were accessed.
    - No full repository build was run per user instruction.
  user_provided_materials:
    - material_id: M-001
      title: User-provided CB Insights unicorn-list selection context for Pet Circle
      type: prompt_argument
      date_received: 2026-06-08
      notes: Included random-selection context, CB Insights row values, investors, and instruction to create reports/pet-circle-diligence-report.yaml.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Pet Circle is an active private Australian unicorn operating in online pet care/retail.
    claim_source: User-provided CB Insights row, ABN Lookup, Prysm Capital, App Store
    claim_date: 2026-06-08
    mapped_chapter_ids:
      - I
      - II
    mapped_section_ids:
      - I.C
      - II.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-006
    contradiction_summary: null
    diligence_follow_up:
      - Request current ASIC company extract, corporate group chart, officer list, and board minutes confirming operating status.
  - founder_claim_id: FC-002
    claim_text: Pet Circle reached unicorn status through a $125 million Series C in late 2021 at an approximately $1 billion-plus valuation.
    claim_source: CB Insights row and Business News Australia
    claim_date: 2021-12-07
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-002
      - EC-023
    contradiction_summary: null
    diligence_follow_up:
      - Request financing documents, post-money valuation, currency denomination, investor allocations, preferences, and valuation marks.
  - founder_claim_id: FC-003
    claim_text: Pet Circle retained a billion-dollar valuation in 2023 and had meaningful revenue scale.
    claim_source: Business News Australia, Forbes Australia, Prysm Capital
    claim_date: 2023-07-03
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.A
      - I.B
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-003
      - EC-004
    contradiction_summary: Public sources support revenue scale and valuation retention, but Forbes also reported a $31.8 million loss, so profitability and cash burn need private verification.
    diligence_follow_up:
      - Request audited statements, management accounts, quality-of-earnings analysis, cash runway, and board-approved plan.
  - founder_claim_id: FC-004
    claim_text: Pet Circle is an integrated pet care platform with ecommerce, subscription/Auto Delivery, vet/telehealth advice, insurance, and pharmacy adjacency.
    claim_source: Business News Australia, App Store, Pet Circle Insurance, Pet Circle Pharmacy
    claim_date: null
    mapped_chapter_ids:
      - II
      - III
      - V
      - VI
      - VIII
    mapped_section_ids:
      - II.A
      - III.B
      - V.A
      - VI.A
      - VIII.G
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-008
      - EC-014
      - EC-017
    contradiction_summary: Product breadth is supported; ownership/economics of insurance and pharmacy are partly partner-dependent and private.
    diligence_follow_up:
      - Request product P&L, subscription cohort data, tech stack, vendor contracts, insurance underwriter agreement, pharmacy agreements, and compliance audits.
  - founder_claim_id: FC-005
    claim_text: Pet Circle is Australia’s largest online specialty pet retailer / online pet-food-and-supplies player.
    claim_source: ACCC, Business News Australia, App Store, Pet Circle Insurance
    claim_date: 2023-08-30
    mapped_chapter_ids:
      - II
      - III
      - IV
      - V
    mapped_section_ids:
      - II.A
      - III.A
      - IV.A
      - V.A
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-011
      - EC-019
    contradiction_summary: ACCC supports about 45% online market share, but current independent share by category and channel is still needed.
    diligence_follow_up:
      - Request independent market-share study, GMV by category/channel, active customers, subscription penetration, and customer retention cohorts.
  - founder_claim_id: FC-006
    claim_text: Pet Circle has no material unresolved public regulatory issue that would disqualify eligibility.
    claim_source: ACCC records and public-source review
    claim_date: 2023-08-30
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-016
      - EC-022
    contradiction_summary: A 2023 ACCC pricing matter is public and material but appears remediable; public sources do not show IPO, acquisition, shutdown, or disqualifying insolvency.
    diligence_follow_up:
      - Request completed remediation evidence, complaint logs, litigation schedule, regulator correspondence, and counsel memo.
executive_summary:
  overall_assessment: "Eligible for public-source diligence: Pet Circle appears active and private, with public evidence supporting historical and continuing unicorn status through at least the 2023 Prysm financing. Diligence should focus on financial quality, current valuation/cap table, competitive margin pressure, and regulatory/control remediation."
  investment_or_diligence_thesis: Pet Circle has credible online category leadership in a large Australian pet market, with a broad digital pet-care platform and recurring consumables model; however, the model is logistics- and promotion-sensitive, faces powerful omnichannel competitors, and lacks public transparency into unit economics, current valuation, cap table, suppliers, and retention.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: ABN/App/investor evidence supports active private-company eligibility.
      evidence_claim_ids:
        - EC-001
        - EC-006
    - founder_claim_id: FC-002
      summary: 2021 $125M Series C/unicorn status is supported by Business News Australia and the CB Insights row.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-005
      summary: ACCC public statement supports online pet-food-and-supplies leadership at about 45% market share.
      evidence_claim_ids:
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and reported loss require full QoE and runway diligence.
    - risk_id: R-002
      summary: Omnichannel, marketplace, and supermarket competition may pressure margins and retention.
    - risk_id: R-003
      summary: ACCC pricing matter requires evidence of durable compliance remediation.
  key_evidence_gaps:
    - Audited financial statements, cash runway, unit economics, and working-capital schedules.
    - Current cap table, liquidation preferences, debt, investor marks, and financing documents.
    - Active-customer cohorts, Auto Delivery penetration, churn, CAC/LTV, and revenue concentration.
    - Supplier/rebate/freight contracts and warehouse/carrier economics.
    - ACCC remediation proof, licensing/partner contracts for insurance/pharmacy, litigation and material-contract schedules.
  recommended_next_steps:
    - Proceed with private data-room request; do not rely on headline unicorn valuation alone.
    - Run QoE, unit-economic, and cohort retention review before valuation work.
    - Commission SKU-level competitive price/share benchmark against PETstock/Woolworths, Petbarn/Greencross, Amazon, supermarkets, and online specialists.
    - Review ACCC remediation, pricing controls, insurance/pharmacy licenses/contracts, and consumer complaint logs.
    - Validate cap table, current valuation marks, debt/PPSR, and investor preference stack.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Pet Circle’s active private status, historical unicorn financing, 2023 valuation-retention financing, and partial revenue/loss signals; full financial statements, projections, cap table, debt, unit economics, tax, and working capital remain private diligence items.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-021
      - EC-023
    risk_ids:
      - R-001
      - R-005
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources provide headline 2022 retail sales/revenue and a reported loss, but not full statements, balance sheet, cash flow, AR aging, or planned-vs-actuals.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A.F1
            finding: Public press reported 2022 retail sales/revenue around A$308 million and a reported loss of A$31.8 million, requiring audit-file verification.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-001
          - finding_id: I.A.F2
            finding: Full financial statements, footnotes, backlog, accounts receivable, and management reporting are not publicly verifiable.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-001
        hidden_risks:
          - Loss-making ecommerce with bulky consumables may mask freight and working-capital strain.
        evidence_gaps:
          - Audited statements, monthly management accounts, AR/AP aging, inventory aging, and bank/debt schedules are not public.
        follow_up_questions:
          - Provide FY2022-FY2025 audited statements, management accounts, QoE workbook, revenue by category/channel, AR/AP aging, inventory aging, and cash runway.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-004
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers are directionally supported by market tailwinds, premium food, insurance/pharmacy expansion, and digital-first commerce; forecasts, assumptions, capex, and financing plan are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B.F1
            finding: Public management comments cite continued growth in premium food and customer experience, but not quantified forecasts or assumptions.
            evidence_claim_ids:
              - EC-003
              - EC-009
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Forecasts may rely on continued online penetration and supplier/freight economics not visible publicly.
        evidence_gaps:
          - Board-approved projections, scenarios, sensitivity tables, capex, depreciation, working capital, and financing assumptions are not public.
        follow_up_questions:
          - Provide three-year financial model with monthly actuals bridge, pricing/freight assumptions, cohort LTV/CAC, capital expenditure plan, and financing assumptions.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-009
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public records identify an active private legal entity and named investors, but not share counts, option/warrant schedules, debt, preferences, side letters, or off-balance-sheet liabilities.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C.F1
            finding: ABN Lookup verifies active Australian private-company status for Millell Pty Ltd and the Pet Circle business name.
            evidence_claim_ids:
              - EC-001
            risk_ids:
              - R-005
          - finding_id: I.C.F2
            finding: Public sources identify Prysm, TDM, Baillie Gifford, AirTree, and earlier investors, but not ownership percentages or rights.
            evidence_claim_ids:
              - EC-002
              - EC-021
              - EC-023
            risk_ids:
              - R-005
        hidden_risks:
          - Liquidation preferences or later valuation marks could materially change common-equity value.
        evidence_gaps:
          - Current cap table, debt instruments, options/warrants, shareholder agreements, side letters, and PPSR/security interests are not public.
        follow_up_questions:
          - Provide fully diluted cap table, financing documents, side letters, option plan, debt/PPSR searches, and investor mark history.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-021
          - EC-023
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Funding history is publicly visible for the 2021 Series C and 2023 Prysm injection, while tax, accounting policies, revenue recognition, current basis, and detailed round economics are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D.F1
            finding: Public sources support 2021 Series C and 2023 funding events; historical 2017 Series A is only secondary-market-database corroborated.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-023
            risk_ids:
              - R-005
        hidden_risks:
          - Public financing headlines do not reveal liquidation stack, option refreshes, or valuation changes after 2023.
        evidence_gaps:
          - Tax positions, accounting policies, financing basis, and current valuation support were not public.
        follow_up_questions:
          - Provide tax schedule, accounting policy memo, financing history by security, investor rights, valuation support, and current basis by holder.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-023
  - chapter_id: II
    title: Products
    chapter_summary: "Pet Circle’s product breadth is well supported by public sources: ecommerce catalog, Auto Delivery, online vet advice, insurance, pharmacy, app, and logistics. Profitability, roadmap, proprietary technology, pricing depth, and regulated-service economics require private records."
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-008
      - EC-012
      - EC-017
      - EC-020
    risk_ids:
      - R-002
      - R-004
      - R-007
      - R-009
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public sources verify a broad online pet-products catalog, app, Auto Delivery, vet advice/telehealth, insurance, and pharmacy adjacency; product-level margins, roadmap timing, and cost structure are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: II.A.F1
            finding: Business press and investor pages describe an integrated pet-care platform with subscription, VetChat/telehealth, and 13,500+ products.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-002
              - R-009
          - finding_id: II.A.F2
            finding: App metadata verifies current mobile shopping, order tracking, Auto Delivery, and shipping/value proposition signals.
            evidence_claim_ids:
              - EC-006
              - EC-012
            risk_ids:
              - R-006
              - R-007
          - finding_id: II.A.F3
            finding: Insurance and pharmacy expansion are publicly visible, but partner economics and licensing details require diligence.
            evidence_claim_ids:
              - EC-007
              - EC-008
              - EC-017
            risk_ids:
              - R-004
              - R-007
        hidden_risks:
          - Product expansion into regulated-adjacent categories may increase compliance, partner, and customer-outcomes risk.
        evidence_gaps:
          - Product profitability, SKU gross margin, roadmap, R&D cost, tech stack, and regulatory operating model are not public.
        follow_up_questions:
          - Provide product P&L by category, SKU margin/rebate analysis, Auto Delivery cohorts, tech architecture, roadmap, and insurance/pharmacy contracts.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-007
          - EC-008
          - EC-012
          - EC-017
          - EC-020
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public customer information is consumer-scale rather than named-account based. Pet Circle has app ratings, an over-1-million-Australians claim, and an ACCC market-share statement, but active-customer cohorts, top customers, revenue concentration, churn, subscription penetration, supplier spend, and severed relationships are private.
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-011
      - EC-019
      - EC-020
    risk_ids:
      - R-006
      - R-007
      - R-002
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Because Pet Circle is a consumer ecommerce retailer, public sources show aggregate customer-scale proxies rather than named top customers.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A.F1
            finding: Public scale proxies include over 1 million Australians, 5,461 iOS ratings, and ACCC-reported online market share around 45%.
            evidence_claim_ids:
              - EC-019
              - EC-011
            risk_ids:
              - R-006
        hidden_risks:
          - Consumer revenue may be concentrated in subscription cohorts or premium-food categories not visible publicly.
        evidence_gaps:
          - Top 15 customers is not directly applicable to B2C operations; active customers, order frequency, and cohort revenue are not public.
        follow_up_questions:
          - Provide active customers, orders, AOV, repeat rate, Auto Delivery penetration, churn, cohort LTV/CAC, and revenue by product application.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-019
          - EC-011
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public relationships include investors, insurance underwriter, independent pharmacy provider, and major supplier brands; revenue contribution and contract terms are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B.F1
            finding: Insurance and pharmacy offerings rely on third-party/related regulated entities and should be treated as strategic dependencies.
            evidence_claim_ids:
              - EC-007
              - EC-008
              - EC-017
            risk_ids:
              - R-004
              - R-007
        hidden_risks:
          - Partner economics may shape gross margin and customer trust but are opaque.
        evidence_gaps:
          - Revenue contribution, contract duration, exclusivity, termination rights, and service levels for strategic relationships are not public.
        follow_up_questions:
          - Provide partner agreements, supplier rebates, underwriter/pharmacy SLAs, and revenue/margin contribution by relationship.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-017
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No public customer-by-customer revenue, concentration, or 5%-plus customer data was found; B2C revenue likely requires cohort-level analysis.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C.F1
            finding: Public signals are aggregate and do not reveal revenue concentration or subscription cohort quality.
            evidence_claim_ids:
              - EC-019
              - EC-004
            risk_ids:
              - R-006
              - R-001
        hidden_risks:
          - Hidden concentration could exist in B2B/affiliate, insurance, pharmacy, supplier-funded promotion, or marketplace-like arrangements.
        evidence_gaps:
          - Revenue by customer/cohort and any 5%-plus customer or partner exposure are private.
        follow_up_questions:
          - Provide cohort revenue, subscription revenue, any B2B/partner revenue, and top revenue relationships over the last three fiscal years.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-019
          - EC-004
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No severed customer, partner, or supplier relationships were publicly verified; this remains a private data-room request.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D.F1
            finding: No public severed-relationship schedule was identified; supplier and partner termination history is a required diligence request.
            evidence_claim_ids:
              - EC-020
              - EC-022
            risk_ids:
              - R-007
              - R-010
        hidden_risks:
          - Lost supplier relationships could affect assortment, rebates, and availability.
        evidence_gaps:
          - Relationship terminations, notice disputes, and supplier delistings are not public.
        follow_up_questions:
          - Provide schedules of material customer/partner/supplier relationships severed, non-renewed, disputed, or repriced in the last 24 months.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-020
          - EC-022
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public app description lists major third-party brands, but top suppliers, purchase volumes, rebates, stockout performance, and carrier/warehouse dependencies are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E.F1
            finding: Public app description names major brands supplied by Pet Circle, indicating reliance on third-party pet-food, health, and accessory suppliers.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-007
              - R-002
        hidden_risks:
          - Supplier concentration and rebate dependence can drive gross margin and competitive defensibility.
        evidence_gaps:
          - Top suppliers by spend, rebate terms, exclusivity, inventory risk, freight/carrier contracts, and service levels are not public.
        follow_up_questions:
          - Provide top 25 suppliers by spend/margin, rebate schedules, supplier contracts, inventory aging, fill-rate/stockout reports, warehouse/carrier SLAs.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-020
  - chapter_id: IV
    title: Competition
    chapter_summary: Market context is attractive but competitive. Public sources support high Australian pet ownership/spend, Pet Circle’s online leadership, and strong omnichannel pressure from PETstock/Woolworths, Petbarn/Greencross, Amazon, supermarkets, and specialists.
    founder_claim_ids:
      - FC-005
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-020
    risk_ids:
      - R-002
      - R-007
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Pet Circle benefits from large pet ownership and online category leadership, while ACCC records show many competitive constraints and a differentiated specialty-vs-grocery channel structure.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: IV.A.F1
            finding: Animal Medicines Australia data supports a large pet market with 28.7 million pets, 6.9 million pet-owning households, 69% household penetration, and over $33 billion spend.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-002
          - finding_id: IV.A.F2
            finding: ACCC merger records identify PETstock, Petbarn, Amazon, supermarkets, and other specialty/online retailers as relevant competitive constraints.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-002
          - finding_id: IV.A.F3
            finding: ACCC stated Pet Circle accounted for about 45% of the online pet-food-and-supplies market, supporting leadership but not current share by category.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-002
              - R-006
        hidden_risks:
          - Woolworths/PETstock could use omnichannel reach, loyalty, and supplier power to pressure Pet Circle margins.
        evidence_gaps:
          - Current independent online-market-share data, SKU price index, loyalty comparison, and supplier terms by competitor are not public.
        follow_up_questions:
          - Commission independent market share/pricing study; compare supplier terms, delivery economics, and subscription retention against Petstock, Petbarn, Amazon, supermarkets, and Budget Pet Products.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-009
          - EC-010
          - EC-011
          - EC-020
