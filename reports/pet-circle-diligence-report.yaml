diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, QoE, cash flow, gross margin, freight cost, AR/AP, inventory aging, and cash runway.
    why_it_matters: Headline revenue and loss signals cannot validate quality of earnings or runway.
    suggested_source_or_request: Request audit files, management accounts, bank statements, debt/PPSR searches, and cohort economics.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, preferences, option pool, warrants, debt, side letters, and investor marks.
    why_it_matters: Historical unicorn valuation may not represent current common-equity value.
    suggested_source_or_request: Request financing docs, board valuation materials, 409A/fair-value marks, investor statements, and legal opinion.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Active customers, Auto Delivery penetration, cohort retention, churn, LTV/CAC, and any B2B/partner concentration.
    why_it_matters: Public scale signals do not establish predictable revenue or concentration risk.
    suggested_source_or_request: Request customer cohort workbook, subscription analytics, channel attribution, and top revenue relationships.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Top suppliers, rebate terms, exclusivity, purchase volumes, stockouts, carrier/warehouse SLAs.
    why_it_matters: Supplier and logistics economics may drive gross margin and competitive moat.
    suggested_source_or_request: Request supplier contracts, rebate schedules, fill-rate reports, inventory aging, freight invoices, and warehouse leases.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Current independent market share, SKU price index, competitive CAC, and omnichannel switching behavior.
    why_it_matters: Woolworths/PETstock, Petbarn, Amazon, and supermarkets can pressure margins and growth.
    suggested_source_or_request: Commission category market study and benchmark prices, assortment, delivery SLAs, and loyalty/subscription offers.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.A
    missing_information: CAC, ROAS, attribution, discount liability, promo controls, and contribution margin by channel.
    why_it_matters: GTM may be growth-accretive or subsidy-driven; ACCC matter makes pricing controls material.
    suggested_source_or_request: Request marketing spend, attribution model, pricing QA, promotion approvals, and cohort contribution margin.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.A
    missing_information: Tech stack, cloud/security controls, source-code ownership, R&D budget, roadmap, and engineering headcount.
    why_it_matters: Public sources support a platform story but not technical defensibility or execution risk.
    suggested_source_or_request: Request architecture, security reports, SOC/pen-test status, vendor list, roadmap, and engineering org chart.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, turnover, compensation, incentive plan, employee relations, WHS incidents.
    why_it_matters: Fulfillment/customer-service labor can affect unit economics and operational execution.
    suggested_source_or_request: Request HRIS export, turnover dashboard, compensation plan, option ledger, WHS and employee-relations schedule.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: ACCC remediation evidence, complaints, regulator correspondence, insurance/pharmacy licenses/contracts, litigation schedule.
    why_it_matters: Regulated-service expansion and past pricing matter require proof of control effectiveness.
    suggested_source_or_request: Request counsel memo, compliance testing, refund completion, license documents, complaints, and material contracts.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Foreign trademarks, source-code copyrights, open-source usage, patents, licenses, and IP assignments.
    why_it_matters: Visible moat appears brand-heavy; technical/IP ownership must be verified.
    suggested_source_or_request: Request IP schedule, assignment agreements, trademark counsel file, patent search, open-source scan, and source-code ownership docs.
    priority: medium
