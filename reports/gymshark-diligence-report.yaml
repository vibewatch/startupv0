report_metadata:
  report_title: "Gymshark Startup Diligence Report"
  target_company: "Gymshark"
  website: "https://www.gymshark.com"
  known_aliases:
    - "Gymshark Ltd"
    - "Gymshark Group Limited"
    - "Gymshark USA Inc"
  sector: "Sportswear and fitness apparel"
  geography: "United Kingdom with global ecommerce and retail operations"
  company_stage: "Private unicorn"
  research_date: "2026-05-15"
  analyst: "GitHub Copilot CLI"
  report_version: "1.0"
  currency: "GBP"
  time_zone: "Europe/London"

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Selected Gymshark at random from a public unicorn list after excluding existing report slugs in reports/."
    - "Used public company pages, Companies House records, investor announcements, reputable business news, and competitor-owned public materials."
    - "Separated verified public facts from analyst judgments and private data-room gaps."
  included_jurisdictions:
    - "United Kingdom"
    - "United States"
    - "European Union"
    - "United Arab Emirates"
  excluded_topics:
    - "Non-public data-room financial schedules, cap table documents, supplier contracts, customer cohorts, litigation dockets, and employee records."
    - "Paywalled, blocked, or access-controlled materials."
  user_provided_materials: []

founder_claims:
  - founder_claim_id: FC-001
    claim_text: "Gymshark was founded in 2012 from a garage in Birmingham, UK."
    claim_source: "Company about page and General Atlantic announcement"
    claim_date: null
    mapped_chapter_ids: [VII]
    mapped_section_ids: [VII.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001, EC-006]
    contradiction_summary: null
    diligence_follow_up:
      - "Confirm founder equity vesting, founder employment agreements, and current voting control in the cap table."
  - founder_claim_id: FC-002
    claim_text: "Gymshark achieved unicorn status at an over GBP1bn valuation in 2020."
    claim_source: "General Atlantic announcement"
    claim_date: "2020-08-14"
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.C]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-003]
    contradiction_summary: null
    diligence_follow_up:
      - "Request the 2020 transaction documents, post-money capitalization, and any subsequent secondary or primary transactions."
  - founder_claim_id: FC-003
    claim_text: "Gymshark has a global community, customers in over 200 countries, 14 online stores, and over 18m social followers."
    claim_source: "Company about page"
    claim_date: null
    mapped_chapter_ids: [III, V]
    mapped_section_ids: [III.A, V.C]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-006]
    contradiction_summary: "The figures are company-reported and were not reconciled to platform analytics or customer records."
    diligence_follow_up:
      - "Request source-of-truth social audience, active customer, repeat-purchase, and country-level revenue cohorts."
  - founder_claim_id: FC-004
    claim_text: "FY24 revenue exceeded GBP600m and adjusted EBITDA increased by double digits."
    claim_source: "Business Live and BusinessCloud reports on Companies House accounts"
    claim_date: "2025-04-29"
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-004, EC-005]
    contradiction_summary: null
    diligence_follow_up:
      - "Request audited FY22-FY25 financial statements, monthly management accounts, inventory aging, cash flow, and store-level P&Ls."
  - founder_claim_id: FC-005
    claim_text: "Gymshark is moving toward a fully omnichannel business and a 100-year brand."
    claim_source: "CEO quote reported by Business Live and BusinessCloud"
    claim_date: "2025-04-29"
    mapped_chapter_ids: [V]
    mapped_section_ids: [V.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-005, EC-007, EC-021]
    contradiction_summary: "The public record verifies store expansion and retail hiring, but does not verify store economics or whether omnichannel execution improves returns."
    diligence_follow_up:
      - "Request store opening budgets, lease commitments, contribution margins, payback periods, and omnichannel cohort analytics."
  - founder_claim_id: FC-006
    claim_text: "Gymshark can become to the UK what Nike is to the US and Adidas is to Germany."
    claim_source: "Founder quote in General Atlantic announcement"
    claim_date: "2020-08-14"
    mapped_chapter_ids: [IV]
    mapped_section_ids: [IV.B]
    verification_status: unverified
    confidence: low
    evidence_claim_ids: [EC-003, EC-020]
    contradiction_summary: "This is an aspirational strategic claim; public evidence shows meaningful scale, but not comparable global brand breadth or profitability."
    diligence_follow_up:
      - "Benchmark brand awareness, repeat purchase, gross margin, regional profitability, and marketing efficiency against Nike, lululemon, Adidas, YoungLA, and other fitness-apparel peers."

executive_summary:
  overall_assessment: >-
    Gymshark is a real, scaled private sportswear company with verified UK corporate status,
    a publicly disclosed 2020 unicorn valuation, and reported FY24 revenue of GBP607.3m.
    Public evidence also shows profit compression, active store expansion, workforce
    restructuring, influencer-contract exposure, and material gaps around current valuation,
    cap table, inventory quality, supplier concentration, and store economics.
  investment_or_diligence_thesis: >-
    The diligence thesis is a "track with data-room conditions" view: Gymshark has rare
    private-company consumer-brand scale and global community reach, but an investor or acquirer
    should not underwrite the stale 2020 valuation or omnichannel expansion without audited
    unit economics, cash conversion, inventory, cap-table, supplier, and legal-risk support.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: "Companies House and company materials support the 2012 UK origin story and active private-company status."
      evidence_claim_ids: [EC-001, EC-006]
    - founder_claim_id: FC-002
      summary: "General Atlantic publicly announced the 2020 transaction at an over GBP1bn valuation and a 21% stake."
      evidence_claim_ids: [EC-003]
    - founder_claim_id: FC-004
      summary: "Business Live and BusinessCloud reported FY24 revenue of GBP607.3m and adjusted EBITDA of GBP51.7m."
      evidence_claim_ids: [EC-004]
  biggest_risks:
    - risk_id: R-001
      summary: "Revenue growth is accompanied by falling pre-tax profit, requiring gross-margin and cash-flow diligence."
    - risk_id: R-002
      summary: "Store expansion and omnichannel ambitions create lease, capex, execution, and inventory risks."
    - risk_id: R-003
      summary: "Influencer-led marketing and athlete ownership arrangements create legal, reputational, and cap-table complexity."
  key_evidence_gaps:
    - "Current valuation and fully diluted cap table after the General Atlantic transaction and Chris Bumstead shareholder announcement are not public."
    - "Audited FY25 accounts, monthly cash flow, debt facilities, inventory aging, returns, and gross margin by region/channel require company disclosure."
    - "Customer cohort data, repeat purchase, paid/organic mix, CAC, retention, and top-customer or top-country concentration are not public."
    - "Store-level P&L, lease obligations, capex, payback, and omnichannel incrementality are not public."
    - "Supplier list details, factory audit results, and concentration by manufacturer/country could not be fully verified from the public web snapshot."
  recommended_next_steps:
    - "Request a full financial data room covering FY22-FY25 audited accounts, management accounts, inventory, cash, debt, taxes, leases, and board reporting."
    - "Request current cap table, shareholder agreements, option plans, investor rights, athlete equity grants, and all secondary transactions."
    - "Request omnichannel economics by store and region, including leases, capex, traffic, returns, and customer-lifetime-value uplift."
    - "Request influencer and athlete agreements, active disputes, non-compete templates, IP assignments, and social-platform risk controls."
    - "Request supplier contracts, factory list, audit findings, remediation logs, modern-slavery process evidence, and country concentration."

chapters:
  - chapter_id: I
    title: "Financial Information"
    chapter_summary: >-
      Gymshark has public evidence of scale and growth, but public records are insufficient
      for valuation, cash conversion, channel profitability, and balance-sheet underwriting.
    founder_claim_ids: [FC-002, FC-004]
    evidence_claim_ids: [EC-002, EC-003, EC-004, EC-005, EC-019, EC-023]
    risk_ids: [R-001, R-004, R-005]
    sections:
      - section_id: I.A
        title: "Annual and quarterly financial information"
        checklist_question_ids: [I.A.1, I.A.2, I.A.3, I.A.4, I.A.5, I.A.6]
        summary: >-
          Public news reports citing Companies House accounts show FY24 revenue of GBP607.3m,
          adjusted EBITDA of GBP51.7m, and pre-tax profit of GBP11.8m. The profit trend is
          weaker than revenue growth, so detailed gross margin, cash-flow, and inventory
          diligence is required.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: "FY24 revenue reportedly reached GBP607.3m, up from GBP556.2m in FY23."
            evidence_claim_ids: [EC-004]
            risk_ids: [R-001]
          - finding_id: I.A-F2
            finding: "Pre-tax profit reportedly fell to GBP11.8m, after GBP13.0m in FY23 and GBP27.8m in FY22."
            evidence_claim_ids: [EC-004]
            risk_ids: [R-001]
          - finding_id: I.A-F3
            finding: "BusinessCloud attributed pressure to rising raw material, labor, and other apparel input costs."
            evidence_claim_ids: [EC-004]
            risk_ids: [R-005]
        hidden_risks:
          - "Profit compression may mask markdowns, returns, store ramp costs, inventory write-downs, or weaker channel mix."
          - "FY25 accounts are referenced at Companies House as filed, but detailed accounts were not included in the public research cache."
        evidence_gaps:
          - "Audited FY22-FY25 accounts, monthly management accounts, cash conversion, tax schedules, working capital, returns, inventory aging, and channel contribution are not public."
        follow_up_questions:
          - "What were gross margin, contribution margin, free cash flow, and net debt by month for FY22-FY25?"
          - "How much of FY24 revenue growth was volume, price, mix, geographic expansion, or discounting?"
        table_ids: [T-001, T-002]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-002, EC-004, EC-005]
      - section_id: I.C
        title: "Capital structure"
        checklist_question_ids: [I.C.1, I.C.2, I.C.3, I.C.4, I.C.5]
        summary: >-
          The latest publicly priced equity event found was the 2020 General Atlantic
          transaction at an over GBP1bn valuation. General Atlantic publicly disclosed a 21%
          stake and Ben Francis was described as increasing his stake to over 70%. Subsequent
          athlete-shareholder arrangements and the current fully diluted cap table are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: "General Atlantic's 2020 investment valued Gymshark at over GBP1bn and gave General Atlantic a 21% stake."
            evidence_claim_ids: [EC-003]
            risk_ids: [R-004]
          - finding_id: I.C-F2
            finding: "Companies House charges search showed four registered charges and zero outstanding charges, all satisfied on 29 May 2024."
            evidence_claim_ids: [EC-019]
            risk_ids: [R-004]
          - finding_id: I.C-F3
            finding: "Chris Bumstead was reported as a shareholder in 2024, but Gymshark did not disclose his percentage stake publicly."
            evidence_claim_ids: [EC-016, EC-023]
            risk_ids: [R-003, R-004]
        hidden_risks:
          - "A stale 2020 headline valuation may not reflect current margins, store commitments, or market multiples."
          - "Athlete equity or option arrangements could create dilution, transfer restrictions, or governance issues."
        evidence_gaps:
          - "Current cap table, option plan, shareholder agreements, liquidation preferences, debt terms, and athlete equity terms are not public."
        follow_up_questions:
          - "What is the fully diluted cap table by holder, class, voting rights, liquidation preference, and transfer restrictions?"
          - "Were any debt facilities repaid or refinanced when the Companies House charges were satisfied in 2024?"
        table_ids: [T-003]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-003, EC-016, EC-019, EC-023]

  - chapter_id: II
    title: "Products"
    chapter_summary: >-
      Gymshark publicly presents itself as a conditioning and fitness apparel brand with
      ecommerce, app, content, and physical-store touchpoints. Product design, supplier quality,
      SKU profitability, and roadmap claims require private data.
    founder_claim_ids: []
    evidence_claim_ids: [EC-006, EC-008, EC-009, EC-011]
    risk_ids: [R-002, R-005, R-010]
    sections:
      - section_id: II.A
        title: "Product and SKU portfolio"
        checklist_question_ids: [II.A.1, II.A.2, II.A.3]
        summary: >-
          Public website navigation and company descriptions support a broad training-apparel
          and accessories portfolio for women and men, plus content and community experiences.
          SKU economics, defect rates, and product lifecycle performance are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: "Gymshark describes creating clothing, content, and community for conditioning."
            evidence_claim_ids: [EC-006, EC-008]
            risk_ids: [R-010]
          - finding_id: II.A-F2
            finding: "The public site exposes product categories such as womens clothing, mens clothing, accessories, headwear, and guides."
            evidence_claim_ids: [EC-008]
            risk_ids: [R-005]
        hidden_risks:
          - "Fashion and fitness apparel SKUs can face rapid obsolescence, return-rate spikes, inventory markdowns, and size-fit risk."
          - "Public product pages do not reveal gross margin, defect rates, return reasons, or sell-through by SKU."
        evidence_gaps:
          - "No public SKU-level revenue, margin, inventory age, product-defect, or returns dataset was available."
        follow_up_questions:
          - "Which product lines drive gross profit and repeat purchase, and which lines create markdown or returns drag?"
          - "What are quality-control failure rates by supplier, fabric, country, and product line?"
        table_ids: [T-004]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-006, EC-008]
      - section_id: II.B
        title: "Pricing, terms, and product obligations"
        checklist_question_ids: [II.B.1, II.B.2, II.B.3, II.B.4]
        summary: >-
          Public terms show ecommerce sale mechanics, delivery, returns, payment providers, and
          consumer dispute provisions. Detailed pricing architecture, promotional cadence, and
          unit economics require data-room support.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.B-F1
            finding: "US terms identify Gymshark USA Inc, US shipping, 30-day returns for qualifying products, and Klarna/Afterpay-type payment options."
            evidence_claim_ids: [EC-009]
            risk_ids: [R-010]
          - finding_id: II.B-F2
            finding: "US terms include individual arbitration provisions and a group-arbitration mechanism for mass similar claims."
            evidence_claim_ids: [EC-009]
            risk_ids: [R-010]
        hidden_risks:
          - "Consumer terms may not fully mitigate product liability, return abuse, chargebacks, advertising claims, or jurisdiction-specific consumer rights."
          - "Buy-now-pay-later and promotions can lift conversion while adding refund, chargeback, and regulatory compliance complexity."
        evidence_gaps:
          - "No public data was found for pricing elasticity, promotion depth, SKU-level returns, or payment-provider economics."
        follow_up_questions:
          - "What is the return rate, chargeback rate, and BNPL share by country and customer cohort?"
          - "How are product claims, fit claims, sustainability claims, and influencer claims reviewed before launch?"
        table_ids: [T-005, T-006]
        figure_ids: []
        evidence_claim_ids: [EC-009, EC-010]

  - chapter_id: III
    title: "Customer Information"
    chapter_summary: >-
      Gymshark has strong public signals of global reach, but customer concentration, repeat
      purchase, cohort retention, and supplier dependence are not publicly verifiable.
    founder_claim_ids: [FC-003]
    evidence_claim_ids: [EC-005, EC-006, EC-007, EC-012, EC-022]
    risk_ids: [R-006, R-005, R-002]
    sections:
      - section_id: III.A
        title: "Customers, geographies, and revenue concentration"
        checklist_question_ids: [III.A, III.C]
        summary: >-
          Public reporting identifies the US as the largest disclosed FY24 geography by revenue,
          with the UK, Europe ex-UK, and other global markets also material. Individual customer
          cohorts, retention, and concentration are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: III.A-F1
            finding: "FY24 US revenue was reported at about GBP251m, with UK at GBP136.4m, Europe ex-UK at GBP145.7m, and other global markets at GBP74m."
            evidence_claim_ids: [EC-005]
            risk_ids: [R-006]
          - finding_id: III.A-F2
            finding: "The company says it has customers in over 200 countries across 14 online stores."
            evidence_claim_ids: [EC-006]
            risk_ids: [R-006]
        hidden_risks:
          - "Country-level revenue can still hide channel, campaign, influencer, or cohort concentration."
          - "US revenue concentration may increase currency, consumer-demand, logistics, returns, and regulatory exposure."
        evidence_gaps:
          - "No public customer-level sales, retention, cohort, churn, CAC, LTV, or first-party data analytics were available."
        follow_up_questions:
          - "What are repeat purchase, active customers, CAC, LTV, and contribution margin by country and acquisition cohort?"
          - "How concentrated is revenue in top campaigns, top influencers, product drops, and top regions?"
        table_ids: [T-007]
        figure_ids: [F-004, F-005]
        evidence_claim_ids: [EC-005, EC-006, EC-022]
      - section_id: III.B
        title: "Strategic relationships and supplier dependence"
        checklist_question_ids: [III.B, III.E]
        summary: >-
          Public evidence supports a network of athlete, influencer, store, ecommerce, payment,
          and marketing relationships. Supplier concentration and factory audit outcomes require
          private records and complete sustainability/factory disclosures.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: "Chris Bumstead was publicly announced as both athlete and shareholder, while David Laid was named Creative Director of Lifting."
            evidence_claim_ids: [EC-016, EC-017]
            risk_ids: [R-003]
          - finding_id: III.B-F2
            finding: "The site discloses sustainability and modern-slavery reporting links, but the public scrape did not verify complete supplier concentration details."
            evidence_claim_ids: [EC-011, EC-012, EC-024]
            risk_ids: [R-005]
        hidden_risks:
          - "Influencer or athlete relationships can create contractual, reputational, and consumer-dependence risk."
          - "A limited number of factories, fabrics, geographies, or logistics providers could create disruption and margin risk."
        evidence_gaps:
          - "Supplier contracts, factory list rows, country concentration, quality audits, remediation logs, and athlete contract terms are not public."
        follow_up_questions:
          - "What share of revenue is linked to top athletes, discount codes, creator affiliates, stores, and paid channels?"
          - "Who are the top suppliers by spend, country, product line, lead time, and audit score?"
        table_ids: [T-008, T-009]
        figure_ids: []
        evidence_claim_ids: [EC-011, EC-012, EC-016, EC-017, EC-024]

  - chapter_id: IV
    title: "Competition"
    chapter_summary: >-
      Gymshark competes against global incumbents, premium athletic-apparel brands, and
      digitally native fitness brands. Its public differentiation is community-led conditioning,
      ecommerce, athlete relationships, and selective retail stores; defensibility needs proof
      through brand, cohort, and margin data.
    founder_claim_ids: [FC-006]
    evidence_claim_ids: [EC-003, EC-006, EC-020]
    risk_ids: [R-009, R-001, R-003]
    sections:
      - section_id: IV.A
        title: "Competitive landscape by market segment"
        checklist_question_ids: [IV.A.1, IV.A.2]
        summary: >-
          Public competitor materials show that Nike, lululemon, and YoungLA all overlap parts
          of Gymshark's target market through athletic apparel, training, lifestyle, innovation,
          and community positioning.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: "Nike describes a global footprint, innovation culture, and brands including Nike, Jordan, and Converse."
            evidence_claim_ids: [EC-020]
            risk_ids: [R-009]
          - finding_id: IV.A-F2
            finding: "lululemon describes differentiated athletic apparel with four-way stretch, support, seamless construction, moisture-wicking, anti-odor, and water-resistant features."
            evidence_claim_ids: [EC-020]
            risk_ids: [R-009]
          - finding_id: IV.A-F3
            finding: "YoungLA positions itself as an affordable fitness and lifestyle clothing brand, directly overlapping value-conscious gym consumers."
            evidence_claim_ids: [EC-020]
            risk_ids: [R-009]
        hidden_risks:
          - "Large incumbents can outspend Gymshark on athletes, stores, R&D, logistics, and advertising."
          - "Digitally native competitors can replicate influencer and product-drop tactics, pressuring CAC and pricing."
        evidence_gaps:
          - "No public internal brand-awareness, win-loss, CAC, price elasticity, or product-line margin benchmark was available."
        follow_up_questions:
          - "How does Gymshark benchmark aided/unaided awareness, consideration, conversion, repeat purchase, and gross margin against Nike, lululemon, Adidas, YoungLA, and Alo?"
        table_ids: [T-010]
        figure_ids: [F-006]
        evidence_claim_ids: [EC-020]
      - section_id: IV.B
        title: "Basis of competition and defensibility"
        checklist_question_ids: [IV.B.1, IV.B.2, IV.B.3]
        summary: >-
          Public evidence supports brand/community scale and a founder-led ambition to be a
          global fitness brand. The durable defensibility of that position is unverified without
          customer cohorts, proprietary product data, and marketing efficiency trends.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: IV.B-F1
            finding: "General Atlantic described Gymshark as an authentic, disruptive, differentiated brand with a substantial social community."
            evidence_claim_ids: [EC-003]
            risk_ids: [R-009]
          - finding_id: IV.B-F2
            finding: "The company now reports over 18m social followers, but platform-level engagement quality and conversion are not public."
            evidence_claim_ids: [EC-006, EC-022]
            risk_ids: [R-006, R-009]
        hidden_risks:
          - "Social follower count may not translate into low CAC, repeat revenue, or defensible brand pricing power."
          - "If core consumers perceive Gymshark as less authentic, paid marketing and athlete spend may rise."
        evidence_gaps:
          - "No public evidence was available for contribution margin by acquisition channel, creator ROI, or community engagement quality."
        follow_up_questions:
          - "What is the incremental revenue, contribution margin, and retention impact of community, athlete, affiliate, and paid media channels?"
        table_ids: [T-011]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-006, EC-020, EC-022]

  - chapter_id: V
    title: "Marketing, Sales, and Distribution"
    chapter_summary: >-
      Gymshark has evolved from a primarily direct, community-led ecommerce business into a
      growing omnichannel retailer with flagship and mall stores. The critical diligence issue is
      whether physical retail improves total contribution after leases, capex, inventory, staffing,
      returns, and marketing costs.
    founder_claim_ids: [FC-003, FC-005]
    evidence_claim_ids: [EC-006, EC-007, EC-009, EC-016, EC-017, EC-021]
    risk_ids: [R-002, R-003, R-006]
    sections:
      - section_id: V.A
        title: "Distribution channels and omnichannel execution"
        checklist_question_ids: [V.A.1, V.A.2, V.A.3, V.A.4]
        summary: >-
          Public records show online stores and a physical footprint spanning London, New York,
          Manchester, Amsterdam, and Dubai, plus job postings for retail operations. Store-level
          economics and lease liabilities are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: V.A-F1
            finding: "The company says it serves customers in over 200 countries across 14 online stores."
            evidence_claim_ids: [EC-006]
            risk_ids: [R-006]
          - finding_id: V.A-F2
            finding: "The stores page listed Bond St NYC, Regent Street, Stratford, White City, Roosevelt Field, Trafford Centre, Amsterdam Kalverstraat, and Dubai Mall."
            evidence_claim_ids: [EC-007]
            risk_ids: [R-002]
          - finding_id: V.A-F3
            finding: "Careers listings showed ongoing retail hiring across Roosevelt Field, Regent Street, Trafford Centre, Wynwood Miami, Bond Street, and Amsterdam."
            evidence_claim_ids: [EC-021]
            risk_ids: [R-002, R-007]
        hidden_risks:
          - "Retail growth can dilute ecommerce margins through leases, payroll, shrink, build-out costs, and localized inventory."
          - "The public record does not show whether stores drive incremental customers or mainly shift ecommerce demand."
        evidence_gaps:
          - "Store-level P&L, lease commitments, capex, payback, inventory, traffic, and omnichannel incrementality are not public."
        follow_up_questions:
          - "What is four-wall contribution by store, and how does each store affect local ecommerce CAC, return rate, and lifetime value?"
        table_ids: [T-012]
        figure_ids: [F-007]
        evidence_claim_ids: [EC-006, EC-007, EC-021]
      - section_id: V.C
        title: "Marketing, community, and athlete-led acquisition"
        checklist_question_ids: [V.C, V.D.1, V.D.2]
        summary: >-
          Public evidence shows a community-led model, athlete and influencer relationships,
          and social scale. Marketing efficiency, discount-code economics, and dependency on
          specific athletes or platforms require company data.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.C-F1
            finding: "Gymshark reports an over 18m total social media following and a family of employees, athletes, and followers over 10m strong."
            evidence_claim_ids: [EC-006]
            risk_ids: [R-006]
          - finding_id: V.C-F2
