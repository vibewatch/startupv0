risk_register:
  - risk_id: R-001
    risk_title: "Profit compression despite revenue growth"
    risk_category: financial
    severity: high
    likelihood: high
    description: "FY24 revenue reportedly grew to GBP607.3m, but pre-tax profit fell for a third straight year to GBP11.8m."
    impacted_chapter_ids: [I, VII]
    impacted_section_ids: [I.A, VII.B]
    evidence_claim_ids: [EC-004, EC-015]
    mitigation_or_diligence_request: "Request audited statements, EBITDA bridge, cash-flow conversion, gross margin by SKU/channel, returns, inventory aging, and restructuring savings."
  - risk_id: R-002
    risk_title: "Omnichannel retail execution and lease/capex risk"
    risk_category: operational
    severity: high
    likelihood: medium
    description: "Store footprint and retail hiring show omnichannel expansion, but store-level unit economics and lease obligations are not public."
    impacted_chapter_ids: [II, V, VII]
    impacted_section_ids: [II.A, V.A, VII.B]
    evidence_claim_ids: [EC-007, EC-021]
    mitigation_or_diligence_request: "Request store P&Ls, lease commitments, capex, payback, traffic, inventory, staffing, and omnichannel lift analysis."
  - risk_id: R-003
    risk_title: "Influencer and athlete contract/reputation exposure"
    risk_category: reputational
    severity: medium
    likelihood: high
    description: "Athlete-led marketing, athlete ownership, discount codes, and a public influencer dispute create contract, reputational, and margin risks."
    impacted_chapter_ids: [III, V, VIII]
    impacted_section_ids: [III.B, V.C, VIII.A]
    evidence_claim_ids: [EC-016, EC-017, EC-018, EC-023]
    mitigation_or_diligence_request: "Request all athlete/influencer agreements, equity terms, morals clauses, dispute logs, approval workflows, and creator ROI."
  - risk_id: R-004
    risk_title: "Stale public valuation and undisclosed cap table"
    risk_category: financing
    severity: high
    likelihood: medium
    description: "The latest public valuation is the 2020 over GBP1bn General Atlantic round; current valuation, dilution, and shareholder rights are not public."
    impacted_chapter_ids: [I, VIII]
    impacted_section_ids: [I.C, VIII.B]
    evidence_claim_ids: [EC-003, EC-016, EC-019, EC-023]
    mitigation_or_diligence_request: "Request fully diluted cap table, shareholder agreements, option plans, investor rights, debt facilities, and any secondary transactions."
  - risk_id: R-005
    risk_title: "Supply chain, input cost, and ESG substantiation risk"
    risk_category: operational
    severity: high
    likelihood: medium
    description: "Public reports cite raw-material and labor input pressure, while supplier concentration and audit outcomes remain largely private."
    impacted_chapter_ids: [I, II, III, VIII]
    impacted_section_ids: [I.A, II.A, III.B, VIII.B]
    evidence_claim_ids: [EC-004, EC-011, EC-012, EC-024]
    mitigation_or_diligence_request: "Request supplier contracts, country concentration, audit results, remediation logs, material cost bridge, traceability, and claims substantiation."
  - risk_id: R-006
    risk_title: "Customer, geography, and channel concentration unknown"
    risk_category: customer
    severity: medium
    likelihood: high
    description: "Public sources disclose reach and regional revenue, but not customer cohorts, creator/channel concentration, CAC, or LTV."
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, V.C]
    evidence_claim_ids: [EC-005, EC-006, EC-022]
    mitigation_or_diligence_request: "Request cohort retention, active customers, CAC/LTV, AOV, margin by geography, channel attribution, and creator concentration."
  - risk_id: R-007
    risk_title: "Personnel restructuring and leadership transition risk"
    risk_category: team
    severity: medium
    likelihood: medium
    description: "Public data shows headcount growth followed by a consultation placing 296 roles at risk and creating 168 new roles."
    impacted_chapter_ids: [VII]
    impacted_section_ids: [VII.A, VII.B]
    evidence_claim_ids: [EC-013, EC-014, EC-015, EC-021]
    mitigation_or_diligence_request: "Request restructuring plan, severance, function-level attrition, executive succession, engagement, and hiring plans."
  - risk_id: R-008
    risk_title: "Privacy, adtech, and data governance exposure"
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: "Public privacy and cookie disclosures indicate significant customer, app, marketing, pixel, analytics, and advertising data processing."
    impacted_chapter_ids: [VI, VIII]
    impacted_section_ids: [VI.B, VIII.A]
    evidence_claim_ids: [EC-009, EC-010]
    mitigation_or_diligence_request: "Request DPIAs, consent logs, vendor DPAs, data maps, incident history, retention schedules, and adtech compliance review."
  - risk_id: R-009
    risk_title: "Competitive intensity in fitness apparel"
    risk_category: market
    severity: medium
    likelihood: high
    description: "Gymshark faces global incumbents, premium athletic apparel brands, and digitally native fitness brands with overlapping positioning."
    impacted_chapter_ids: [IV, VI]
    impacted_section_ids: [IV.A, IV.B, VI.A]
    evidence_claim_ids: [EC-006, EC-020, EC-022]
    mitigation_or_diligence_request: "Request market share, brand health, CAC trends, win-loss, pricing elasticity, SKU margins, and competitor benchmarks."
  - risk_id: R-010
    risk_title: "Consumer product, returns, and terms exposure"
    risk_category: legal
    severity: medium
    likelihood: medium
    description: "Apparel ecommerce entails returns, fit, product-quality, advertising, consumer-contract, and payment risks."
    impacted_chapter_ids: [II, VIII]
    impacted_section_ids: [II.B, VIII.A]
    evidence_claim_ids: [EC-009]
    mitigation_or_diligence_request: "Request product claims, return-rate and chargeback reports, consumer complaints, product-safety incidents, and jurisdictional terms review."

diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: "Audited FY22-FY25 financial statements, monthly management accounts, cash flow, inventory aging, returns, and gross margin by SKU/channel."
    why_it_matters: "Required to underwrite profitability, cash conversion, and valuation."
    suggested_source_or_request: "Company CFO and auditors."
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: "Current fully diluted cap table, shareholder rights, option plan, athlete equity, and debt facilities."
    why_it_matters: "Determines control, dilution, valuation, and exit economics."
    suggested_source_or_request: "Company counsel, investor counsel, and board materials."
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: "SKU-level sales, gross margin, return reasons, defect rates, and inventory aging."
    why_it_matters: "Shows whether product growth is profitable and sustainable."
    suggested_source_or_request: "Merchandising, finance, and operations systems."
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: "Customer cohorts, CAC, LTV, repeat purchase, AOV, retention, and creator/channel attribution."
    why_it_matters: "Validates community monetization and revenue quality."
    suggested_source_or_request: "Data warehouse, CRM, ecommerce analytics, and marketing attribution tools."
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.B
    missing_information: "Supplier contracts, spend concentration, factory audit outcomes, country concentration, and remediation logs."
    why_it_matters: "Supply-chain failures can hit margins, availability, ESG, and brand reputation."
    suggested_source_or_request: "Supply-chain team, ESG team, and external auditors."
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.B
    missing_information: "Brand-awareness benchmark, market share, pricing elasticity, and competitor win-loss data."
    why_it_matters: "Needed to test defensibility against incumbents and DTC competitors."
    suggested_source_or_request: "Commercial diligence survey and internal brand tracking."
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.A
    missing_information: "Store P&L, lease commitments, capex, payback, traffic, and omnichannel incrementality."
    why_it_matters: "Determines whether retail expansion is accretive or margin dilutive."
    suggested_source_or_request: "Retail finance, leases, POS, and ecommerce geotest data."
    priority: high
  - gap_id: G-008
    chapter_id: V
    section_id: V.C
    missing_information: "Influencer and athlete contracts, discount-code economics, content approvals, and morals clauses."
    why_it_matters: "Influencer-led GTM creates margin, legal, and reputation exposure."
    suggested_source_or_request: "Marketing, legal, and brand teams."
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.B
    missing_information: "Data map, cybersecurity controls, vendor DPAs, incident history, and consent logs."
    why_it_matters: "Privacy/adtech processing is central to ecommerce acquisition and regulatory risk."
    suggested_source_or_request: "CTO, DPO/privacy counsel, security team, and vendor management."
    priority: medium
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.B
    missing_information: "Restructuring plan, final redundancy count, redeployment, severance, expected savings, and morale/attrition data."
    why_it_matters: "Determines whether cost actions protect or disrupt growth."
    suggested_source_or_request: "People, finance, and board materials."
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.A
    missing_information: "Full litigation schedule, influencer dispute filings, consumer claims, product safety matters, and regulator correspondence."
    why_it_matters: "Public legal signals may understate contingent liabilities."
    suggested_source_or_request: "Company counsel and outside litigation counsel."
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.B
    missing_information: "Trademark/design-right portfolio, IP assignments, counterfeit enforcement, insurance, and supplier compliance documentation."
    why_it_matters: "Brand protection and supplier compliance are core assets and risks for apparel companies."
    suggested_source_or_request: "IP counsel, brand protection, ESG, procurement, and insurance brokers."
    priority: medium

