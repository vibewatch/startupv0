risk_register:
  - risk_id: R-001
    risk_title: Financial quality and banking economics opacity
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Press-reported profitability and user counts do not reveal audited statements, regulatory capital, NIM, interchange, fee mix, credit risk, CAC, or customer-level profitability.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.D
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Review audited financials, Pillar 3 workbook, management accounts, regulatory capital, deposit mix, credit losses, unit economics, and product-level P&L.
  - risk_id: R-002
    risk_title: Regulatory approval and compliance risk
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Bunq is a regulated bank and says US expansion depends on FINRA/SEC broker-dealer approval and later full banking-license refiling.
    impacted_chapter_ids:
      - VIII
      - V
    impacted_section_ids:
      - VIII.G
      - V.A
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Request supervisory correspondence, license applications, compliance audits, AML/sanctions testing, capital plans, and US approval status.
  - risk_id: R-003
    risk_title: Competitive pressure in neobanking and consumer financial apps
    risk_category: market
    severity: medium
    likelihood: high
    description: Digital banking faces intense price, feature, trust, and regulatory competition from neobanks, incumbent banks, and specialist fintechs.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.A
    evidence_claim_ids: *a23
    mitigation_or_diligence_request: Run competitor pricing, win/loss, churn, switching-cost, brand-trust, and paid-conversion analysis.
  - risk_id: R-004
    risk_title: User monetization and retention opacity
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Large public user counts do not show active users, paid users, deposits, ARPU, churn, or cohort profitability.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.B
    evidence_claim_ids: *a24
    mitigation_or_diligence_request: Request active/paid user bridge, deposits by cohort, ARPU, churn, NPS, complaints, and plan migration data.
  - risk_id: R-005
    risk_title: Founder/key-person and personnel opacity
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Only limited leadership evidence was gathered; full leadership, board, headcount, attrition, and compensation are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.C
    evidence_claim_ids: *a25
    mitigation_or_diligence_request: Request org chart, executive/board biographies, retention plans, compensation, option pool, headcount by function/location, and attrition.
  - risk_id: R-006
    risk_title: Cap-table and valuation uncertainty
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: CB Insights lists a valuation marker and undisclosed investors; financing terms, preferences, debt, secondaries, and current fair value are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids: *a26
    mitigation_or_diligence_request: Request fully diluted cap table, financing documents, preference stack, debt instruments, valuation reports, and secondary transaction history.
  - risk_id: R-007
    risk_title: Legal, product, insurance, and DGS communication exposure
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Banking, securities, crypto/stocks features, DGS disclosures, and international expansion can create disclosure, conduct, insurance, and customer-remediation risk.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.D
      - VIII.G
    evidence_claim_ids: *a27
    mitigation_or_diligence_request: Review counsel disclosure, complaints, enforcement correspondence, insurance policies, product terms, DGS/FDIC communications, and customer remediation history.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, revenue bridge, margins, cash, debt, and working capital
    why_it_matters: Needed to test valuation, profitability, runway, and quality of earnings
    suggested_source_or_request: Request audited statements, trial balance, monthly financial pack, debt/cash schedules, and management forecast
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, financing documents, preferences, debt instruments, and secondary transactions
    why_it_matters: Needed to understand ownership, preference stack, dilution, and true current valuation
    suggested_source_or_request: Request cap table, securities docs, debt agreements, option pool, and latest valuation reports
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top-customer revenue, active-customer definitions, churn, retention, cohort margin, and references
    why_it_matters: Needed to validate public scale claims and customer quality
    suggested_source_or_request: Request customer schedule, CRM/billing reconciliation, NRR/GRR/churn cohorts, and reference calls
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.A
    missing_information: CAC, channel mix, funnel conversion, pipeline, sales capacity, and marketing ROI
    why_it_matters: Needed to validate scalable go-to-market efficiency
    suggested_source_or_request: Request funnel analytics, budget, pipeline, sales productivity, and cohort performance
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D roadmap, staffing, quality metrics, technical debt, certifications, and product-line economics
    why_it_matters: Needed to validate product defensibility and execution risk
    suggested_source_or_request: Request product roadmap, engineering/R&D org, QA metrics, certifications, and cost/margin data
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Signed org chart, headcount by function/location, attrition, compensation, option plans, and key-person retention
    why_it_matters: Needed to assess management depth and operational scalability
    suggested_source_or_request: Request HRIS export, payroll reconciliation, attrition reports, compensation plans, and retention agreements
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Counsel disclosure, litigation/regulatory schedule, material contracts, insurance policies/loss runs, and compliance records
    why_it_matters: Needed to identify hidden liabilities and consent/change-of-control issues
    suggested_source_or_request: Request counsel memo, docket schedule, regulatory correspondence, contracts, insurance, and incident records
    priority: high
