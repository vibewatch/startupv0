diligence_gaps:
  - gap_id: G-PAT-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, KPI pack, cash/debt, forecast model and cap table.
    why_it_matters: Required to underwrite valuation, runway, dilution and revenue quality.
    suggested_source_or_request: Company CFO, board materials, accountants and financing counsel.
    priority: high
  - gap_id: G-PAT-002
    chapter_id: III
    section_id: III.A
    missing_information: Top-customer or top-partner concentration, contracts, retention and reference calls.
    why_it_matters: Public traction claims do not prove durable, diversified revenue.
    suggested_source_or_request: Customer master, contracts, renewal cohorts and reference list.
    priority: high
  - gap_id: G-PAT-003
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Legal docket, compliance audits, security reports, IP/data rights and incident history.
    why_it_matters: Legal, regulatory, privacy and security issues can materially impair enterprise value.
    suggested_source_or_request: Company counsel, security team, privacy counsel and insurance broker.
    priority: high
