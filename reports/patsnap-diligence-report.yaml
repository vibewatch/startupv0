executive_summary:
  overall_assessment: PatSnap appears to be a mature enterprise innovation-intelligence unicorn with public evidence of a broad product suite, large structured-data corpus, named customer stories and visible trust posture. The key diligence issue is whether these public claims translate into high-quality recurring revenue, defensible data rights and efficient multi-product operations.
  investment_or_diligence_thesis: Proceed to confirmatory diligence focused on revenue quality, data licensing, customer concentration, AI governance and cross-border compliance. Public evidence supports product breadth and customer proof, but financial, legal and operational records are private.
  strongest_verified_claims:
    - founder_claim_id: FC-PAT-001
      summary: CB Insights lists PatSnap as a $1B private unicorn.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-PAT-002
      summary: Company sources describe a broad product matrix across AI agents, IP analytics and domain data products.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-PAT-003
      summary: PatSnap claims more than 2B structured data points and more than 18,000 innovators.
      evidence_claim_ids: *a3
    - founder_claim_id: FC-PAT-004
      summary: Public customer stories include Canon, Grab, Gowling WLG and universities.
      evidence_claim_ids: *a4
  biggest_risks:
    - risk_id: R-PAT-001
      summary: Financial quality private
    - risk_id: R-PAT-002
      summary: Cap-table and valuation opacity
    - risk_id: R-PAT-003
      summary: Customer concentration and ROI proof unknown
    - risk_id: R-PAT-004
      summary: Broad product-surface complexity
  key_evidence_gaps:
    - Audited financials, ARR, gross margin, burn and cap table.
    - Definition and monetization of 18,000 innovators claim.
    - Data licensing, model governance and AI-training controls.
    - Top-customer concentration, retention and contract economics.
    - SOC/ISO report contents, incidents, subprocessors and privacy assessments.
  recommended_next_steps:
    - Validate ARR quality and product-level gross margin.
    - Audit data rights and AI governance before underwriting defensibility.
    - Conduct customer references across IP, life-sciences and law-firm segments.
