report_metadata:
  report_title: KoBold Metals Startup Diligence Report
  target_company: KoBold Metals
  website: https://koboldmetals.com/
  known_aliases:
    - KoBold
    - KoBold Metals Co
    - KoBold Metals Zambia
    - KoBold Metals Africa
  sector: Industrials / critical minerals exploration and mine development
  geography: United States; Zambia; global exploration jurisdictions referenced publicly
  company_stage: Private unicorn / growth-stage critical minerals company
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Prioritized CB Insights unicorn-list evidence, KoBold company pages, team/project pages and source-access limitations captured during research.
    - Treated company statements as support for public claims, not independent proof of financial, technical, legal or operating performance.
    - Marked financials, contracts, cap table, legal, permits, IP, HR and customer/offtake information as not_publicly_verifiable when private records were required.
  included_jurisdictions:
    - United States
    - Zambia
    - Other exploration jurisdictions referenced by company materials
  excluded_topics:
    - Private financial statements, contracts, cap table, customer/offtake calls, mineral-title opinions, permit files, technical model audits, legal dockets, employee personal data and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-25
      notes: No pitch deck, financial model, data room or founder responses were provided.
