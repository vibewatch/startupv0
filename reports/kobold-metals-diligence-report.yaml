        title: Research pipeline and model validation
        checklist_question_ids:
          - VI.B
        summary: Public sources describe AI/human exploration and Mingomba, but do not disclose model-validation metrics or project-level R&D ROI.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.B-F1
            finding: AI exploration is publicly claimed; performance metrics are private.
            evidence_claim_ids:
              - EC-004
              - EC-014
            risk_ids:
              - R-005
        hidden_risks:
          - Model outputs may not reliably translate to economical discoveries or development-ready projects.
        evidence_gaps:
          - Model benchmarks, field-validation results, false-positive analysis, data provenance and technical audit.
        follow_up_questions:
          - Provide model validation, discovery attribution, data rights and project-level R&D KPIs.
        table_ids:
          - T-012
        figure_ids: []
        evidence_claim_ids:
