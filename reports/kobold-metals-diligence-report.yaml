executive_summary:
  overall_assessment: KoBold Metals appears to be an active private unicorn based on CB Insights and current company materials. Public evidence supports the existence of its critical-minerals, AI-enabled exploration positioning, founding narrative, leadership roster and Mingomba public project claims. Investment-grade diligence remains unresolved because financials, cap table, project economics, technical model validation, permits, mineral rights, JV/offtake contracts, legal matters and HR records are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The investability case depends on proving that KoBold can translate AI-enabled exploration into economically financeable mineral projects while controlling capex, permitting, social-license, JV, commodity and IP/title risks.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists KoBold Metals as a $1B United States unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: KoBold publicly says it was founded in 2018 by Kurt House, Josh Goldman and Jeff Jurinak.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-005
      summary: KoBold publishes a current public team roster with executives and specialized science/technology leaders.
      evidence_claim_ids:
        - EC-008
        - EC-014
  biggest_risks:
    - risk_id: R-001
      summary: Capital intensity and financing gap for mine development and global exploration.
    - risk_id: R-003
      summary: Permitting, ESG and social-license exposure around Zambia and other jurisdictions.
    - risk_id: R-006
      summary: Private financials and cap table are unavailable despite public unicorn valuation.
  key_evidence_gaps:
    - Audited financials, cash/debt, burn, capex and project economics.
    - Current cap table, financing terms, investor rights, preferences and debt.
    - Technical model validation, field hit rates, data rights and IP ownership.
    - JV/offtake/customer contracts, partner economics and project concentration.
    - Permits, mineral-title opinions, environmental/social records, litigation and regulatory schedules.
  recommended_next_steps:
    - Run finance and cap-table diligence before relying on the headline $1B valuation.
    - Commission independent technical/geoscience review of AI workflow, discovery attribution and Mingomba resource/economics.
    - Have counsel review mineral rights, permits, JV/offtake contracts, IP/data rights and litigation/regulatory records.
    - Conduct partner, government/community, supplier and employee diligence focused on Mingomba and other material projects.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: KoBold has public unicorn-list valuation evidence, but operating financials, project economics, cap table and financing terms are private.
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-001
      - EC-006
      - EC-009
      - EC-016
    risk_ids:
      - R-001
      - R-006
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A
        summary: No public audited financial statements, management accounts, cash/debt, revenue, burn, gross margin or mine-economics package was found.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources support valuation screening but not financial quality or runway.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-001
              - R-006
        hidden_risks:
          - Capital intensity could be underestimated without cash, debt, capex and runway data.
        evidence_gaps:
          - Audited financials, management accounts, cash/debt schedule, tax records, project-level capex and budget-to-actuals.
        follow_up_questions:
          - Provide audited statements, latest management accounts, cash/debt, burn, project capex and financing plan.
        table_ids:
          - T-001
        figure_ids: []
        evidence_claim_ids:
          - EC-009
      - section_id: I.B
        title: Financial projections and valuation support
        checklist_question_ids:
          - I.B
        summary: CB Insights provides a $1B valuation anchor, but projections, current valuation bridge and financing assumptions are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: The public unicorn-list row supports $1B valuation screening; inaccessible funding pages should not be relied on without primary documents.
            evidence_claim_ids:
              - EC-001
              - EC-016
            risk_ids:
              - R-006
        hidden_risks:
          - Stale or headline valuations can diverge materially from current fair value and preference-stack economics.
        evidence_gaps:
          - Current board-approved plan, valuation bridge, investor deck, sensitivity analysis and financing documents.
        follow_up_questions:
          - Provide current forecast, valuation support, round documents, preference stack and downside sensitivity cases.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-016
      - section_id: I.C
        title: Capital structure
        checklist_question_ids:
          - I.C
        summary: Investor logos and CB Insights investor fields are public, but ownership, preferences, options, warrants and debt are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Investor participation is publicly signaled, but the cap table is not.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-006
        hidden_risks:
          - Liquidation preferences, warrants, debt or strategic-investor rights could materially affect common-equity value.
        evidence_gaps:
          - Cap table, stock ledger, option pool, SAFE/note documents, debt instruments, investor rights and 409A.
        follow_up_questions:
          - Provide current fully diluted cap table, financing documents, debt schedule and investor-rights agreements.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-009
  - chapter_id: II
    title: Products
    chapter_summary: KoBold publicly offers an AI-enabled mineral exploration and development model, but pricing, margins, product performance and deployment economics are private.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-011
    risk_ids:
      - R-001
      - R-005
    sections:
      - section_id: II.A
        title: Product and platform overview
        checklist_question_ids:
          - II.A
        summary: Public materials support a product thesis around scientific exploration, AI/human expertise and critical-mineral project development.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: KoBold is positioned as a critical-minerals exploration/development company using AI plus human expertise.
            evidence_claim_ids:
              - EC-003
              - EC-004
            risk_ids:
              - R-005
        hidden_risks:
          - Technology advantage may be weaker than public positioning without independent model validation.
        evidence_gaps:
          - Technical architecture, data rights, model validation, discovery attribution and project ROI by workflow.
        follow_up_questions:
          - Provide technical architecture, data lineage, model benchmarks and project-level discovery attribution.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-004
      - section_id: II.B
        title: Pricing and monetization
        checklist_question_ids:
          - II.B
        summary: No public SKU pricing exists; monetization appears tied to project economics, JVs, mineral ownership and development outcomes.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: II.B-F1
            finding: Pricing diligence should focus on project economics and contracts rather than posted subscription tiers.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-001
              - R-006
        hidden_risks:
          - Economic value may accrue through complex JV, royalty, offtake or mineral-rights terms not visible publicly.
        evidence_gaps:
          - JV agreements, offtake contracts, royalties, carried interests, development budgets, gross margin and cost sharing.
        follow_up_questions:
          - Provide contract economics for each material project and counterparty.
        table_ids:
          - T-004
        figure_ids: []
        evidence_claim_ids:
          - EC-011
      - section_id: II.C
        title: Product roadmap and reliability
        checklist_question_ids:
          - II.C
        summary: Public pages do not disclose roadmap, system reliability, data governance, model drift or operational readiness metrics.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: II.C-F1
            finding: Public product evidence does not close technology-operating risks.
            evidence_claim_ids:
              - EC-004
              - EC-014
            risk_ids:
              - R-005
        hidden_risks:
          - Field decisions based on model outputs could be costly if data quality, explainability or governance is weak.
        evidence_gaps:
          - Roadmap, incident history, model-governance policies, field-validation logs and data-license inventory.
        follow_up_questions:
          - Provide product roadmap, model-governance controls, incident log and data-license schedule.
        table_ids:
          - T-004
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-014
  - chapter_id: III
    title: Customer Information
    chapter_summary: KoBold has public project and partner signals, especially Mingomba and ZCCM-IH, but customers, offtake, concentration and contract economics are private.
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-005
      - EC-010
    risk_ids:
      - R-002
      - R-007
    sections:
      - section_id: III.A
        title: Public customers, partners and projects
        checklist_question_ids:
          - III.A
        summary: Mingomba and ZCCM-IH are the clearest public partnership/project signals; commercial customer list and offtake counterparties are not disclosed.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Mingomba is publicly presented as a flagship copper development with ZCCM-IH partnership signal.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-002
              - R-007
        hidden_risks:
          - Project concentration and counterparty dependency could be material if most value is tied to Mingomba.
        evidence_gaps:
          - Top counterparties, offtake agreements, JV governance, project-level ownership and concentration metrics.
        follow_up_questions:
          - Provide customer/offtake list, JV contracts, counterparty exposure and project concentration analysis.
        table_ids:
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-010
      - section_id: III.B
        title: Supplier and infrastructure dependencies
        checklist_question_ids:
          - III.B
        summary: Public materials mention local Zambian suppliers and contractors but not supplier concentration, cloud/data vendors or critical equipment dependencies.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Local procurement is publicly highlighted, but detailed supplier concentration is private.
            evidence_claim_ids:
              - EC-007
              - EC-010
            risk_ids:
              - R-007
        hidden_risks:
          - Single-source contractors, drilling providers, labs, cloud infrastructure or permitting consultants could create schedule risk.
        evidence_gaps:
          - Supplier master list, spend by vendor, termination rights, service-level obligations and contingency plans.
        follow_up_questions:
          - Provide top vendors, contract terms, spend concentration and business-continuity plan.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-010
      - section_id: III.C
        title: Revenue concentration and customer health
        checklist_question_ids:
          - III.C
        summary: Revenue by customer, project, geography and contract type is not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Customer/revenue health cannot be assessed from public materials alone.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-001
              - R-007
        hidden_risks:
          - A small number of projects or partners may drive most implied value.
        evidence_gaps:
          - Revenue by counterparty, backlog, pipeline, offtake pricing, contract terms, receivables and customer references.
        follow_up_questions:
          - Provide counterparty revenue, backlog, contract terms and reference-call list.
        table_ids:
          - T-005
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-010
  - chapter_id: IV
    title: Competition
    chapter_summary: KoBold competes for scarce mineral assets, talent, permits, capital and discovery credibility against mining incumbents, juniors and technology-enabled explorers.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-012
    risk_ids:
      - R-004
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape
        checklist_question_ids:
          - IV.A
        summary: Public positioning places KoBold in critical minerals exploration and development, exposing it to mining incumbents and emerging AI/geoscience competitors.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Competition is asset-, permit-, capital- and technical-execution driven rather than conventional software share competition.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-004
              - R-005
        hidden_risks:
          - Incumbents may outbid for assets or partners, while juniors may hold attractive mineral rights.
        evidence_gaps:
          - Asset auction history, competitor cost curves, partner pipeline, win/loss data and technical benchmark comparisons.
        follow_up_questions:
          - Provide competitive project pipeline, lost opportunities, benchmark hit rates and cost-curve analysis.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-012
      - section_id: IV.B
        title: Basis of competition
        checklist_question_ids:
          - IV.B
        summary: KoBold appears differentiated by AI/geoscience integration and full-stack exploration, but differentiation is not independently benchmarked.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.B-F1
            finding: Public sources support differentiated positioning, not measured superiority.
            evidence_claim_ids:
              - EC-004
              - EC-012
            risk_ids:
              - R-005
        hidden_risks:
          - If AI benefit is marginal, KoBold may face commodity-like exploration economics with venture-scale valuation.
        evidence_gaps:
          - Blind benchmark, discovery-rate comparison, proprietary dataset inventory, field success by model and independent expert review.
        follow_up_questions:
          - Commission technical and geological benchmark review against incumbent exploration workflows.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-012
      - section_id: IV.C
        title: Market dynamics
        checklist_question_ids:
          - IV.C
        summary: Critical-mineral demand can support the thesis, but valuation remains sensitive to commodity prices, capex inflation and permitting timelines.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.C-F1
            finding: Exposure to copper, cobalt, lithium and nickel implies cyclical and jurisdictional market risk.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-004
        hidden_risks:
          - Commodity downturns or capex inflation could delay financing or impair project returns.
        evidence_gaps:
          - Commodity-price sensitivities, offtake pricing, FX exposure and cost-curve analysis.
        follow_up_questions:
          - Provide downside cases for copper/lithium/cobalt/nickel prices and capex inflation.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-012
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: KoBold distribution is project-origination, JV, investor, government and community driven; public funnel metrics are unavailable.
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-007
      - EC-013
    risk_ids:
      - R-003
      - R-007
    sections:
      - section_id: V.A
        title: Distribution channels and GTM motion
        checklist_question_ids:
          - V.A
        summary: Public materials indicate global exploration, owned projects, JVs, local procurement and Zambia partnership/community channels.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: KoBold go-to-market is best understood as project origination and stakeholder development, not a standard sales funnel.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-007
        hidden_risks:
          - Project access and local stakeholder trust may be gating constraints.
        evidence_gaps:
          - Project pipeline, origination sources, government approvals, JV terms, partner obligations and community commitments.
        follow_up_questions:
          - Provide project-origination funnel, partner terms, stakeholder map and government/community engagement plan.
        table_ids:
          - T-009
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-013
      - section_id: V.B
        title: Public marketing and reputation signals
        checklist_question_ids:
          - V.B
        summary: The website, team page and news page provide owned-channel and reputation signals, but conversion metrics and brand effectiveness are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.B-F1
            finding: Public media/news curation supports visibility but not deal conversion or partner sentiment.
            evidence_claim_ids:
              - EC-006
              - EC-013
            risk_ids:
              - R-003
        hidden_risks:
          - Reputation risk can affect permitting, recruiting, government relations and capital access.
        evidence_gaps:
          - Media monitoring, stakeholder sentiment, brand metrics, inbound project leads and investor-relations materials.
        follow_up_questions:
          - Provide stakeholder sentiment tracking, inbound pipeline metrics and communications risk register.
        table_ids:
          - T-010
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-013
      - section_id: V.C
        title: Sales efficiency and pipeline quality
        checklist_question_ids:
          - V.C
        summary: CAC, sales productivity, pipeline stages and conversion rates are not public and may not map to SaaS-style metrics.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: V.C-F1
            finding: Public evidence does not show project-funnel conversion or deal economics.
            evidence_claim_ids:
              - EC-011
              - EC-013
            risk_ids:
              - R-001
              - R-007
        hidden_risks:
          - Management may overstate project pipeline quality without signed rights, permits or financing.
        evidence_gaps:
          - Deal funnel, project stage gates, signed rights, partner LOIs, offtake pipeline and conversion history.
        follow_up_questions:
          - Provide project pipeline with stage, probability, rights status, capex, timing and expected economics.
        table_ids:
          - T-009
          - T-010
        figure_ids: []
        evidence_claim_ids:
          - EC-011
          - EC-013
  - chapter_id: VI
