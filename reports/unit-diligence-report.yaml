report_metadata:
  report_title: Unit Startup Diligence Research Report
  target_company: Unit
  website: https://www.unit.co/
  known_aliases:
    - Unit Finance
    - unit.co
    - Unit
  sector: Financial services / embedded finance and banking-as-a-service infrastructure
  geography: United States / New York with Tel Aviv operations
  company_stage: Private venture-backed unicorn / embedded finance platform
  research_date: 2026-06-15
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from existing reports and selected Unit via shuf -n 3 from the CB Insights unicorn list.
    - Used CB Insights, Unit website, Unit documentation, Unit customer pages and PRNewswire financing release; no private bank, compliance or customer documents were available.
    - Marked bank partner contracts, compliance exams, customer concentration, revenue, cap table and credit loss data as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - New York
    - Israel / Tel Aviv operations
    - US banking regulatory context
  excluded_topics:
    - No paywall bypasses, private systems, data-room access, customer calls, management interviews or counsel-led docket pulls.
    - No private personal contact details included.
    - Public web evidence only; inaccessible sources are recorded as limitations.
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn diligence workflow request and CB Insights target row
      type: workflow_request
      date_received: 2026-06-15
      notes: Selected by shuf -n 3 from CB Insights current unicorn-list candidates after excluding existing report slugs; target slug unit.
