executive_summary:
  overall_assessment: Unit is an eligible uncovered private unicorn with public evidence supporting its $1.2B valuation/status and active product operations. The public record is sufficient for a standard outside-in screen but not for investment-grade financial, customer, legal or governance clearance.
  investment_or_diligence_thesis: The diligence thesis is to validate whether Unit's public category position and financing history translate into durable revenue, efficient growth, customer retention and defensible operations at the public valuation level.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Unit is an eligible private unicorn valued at $1.2B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Unit offers embedded finance infrastructure for accounts, payments, cards and capital.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Unit has public customer and usage scale, including 140+ customers in 2022 and current 5M+ accounts / $80B+ annual transaction volume claims.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Valuation is stale and financial quality is private
    - risk_id: R-002
      summary: Customer concentration and KPI definitions are opaque
    - risk_id: R-003
      summary: Embedded finance market and product complexity
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, cash runway and cap table.
    - Customer-level ARR, churn, renewal, concentration and reference evidence.
    - Legal, regulatory, IP, insurance, security and material contract schedules.
  recommended_next_steps:
    - Request a management data-room package covering financials, customers, product metrics, HR and legal schedules.
    - Run customer, partner/supplier and counsel-led public-record diligence before relying on public valuation.
    - Reconcile all public tracker/database claims against signed company records.
