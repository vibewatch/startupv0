diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and KPI pack
    why_it_matters: Required to verify revenue quality, margins, burn and runway.
    suggested_source_or_request: Company CFO / data room
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, debt, warrants, options and investor rights
    why_it_matters: Required to assess ownership, dilution, liquidation stack and control.
    suggested_source_or_request: Company counsel / finance
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Customer-level ARR, churn, NRR and top-account contracts
    why_it_matters: Required to assess concentration, retention and customer quality.
    suggested_source_or_request: Company revenue operations
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product-level revenue, pricing, COGS and roadmap
    why_it_matters: Required to validate product economics and product-market fit.
    suggested_source_or_request: Product and finance teams
    priority: medium
  - gap_id: G-005
    chapter_id: V
    section_id: V.A
    missing_information: CAC, sales productivity, pipeline and forecast model
    why_it_matters: Required to test GTM efficiency and growth plan.
    suggested_source_or_request: Sales and marketing leadership
    priority: medium
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS, turnover, compensation and option grants
    why_it_matters: Required to evaluate team stability and incentive alignment.
    suggested_source_or_request: People team
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP ownership, licenses, data rights and security/compliance evidence
    why_it_matters: Required to assess legal ownership and regulatory exposure.
    suggested_source_or_request: Company counsel / security
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer, supplier, bank/cloud/compute and financing contracts
    why_it_matters: Required to assess obligations, SLAs, termination rights and concentration.
    suggested_source_or_request: Company counsel
    priority: high
