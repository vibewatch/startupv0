risk_register:
  - risk_id: R-001
    risk_title: Public financials are insufficient to verify profitability durability
    risk_category: financial
    severity: high
    likelihood: medium
    description: OPay claims first monthly profitability and large transaction scale, but audited statements, cash-flow
      data, revenue-recognition policies, and take-rate bridge were not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-023
    mitigation_or_diligence_request: Perform confirmatory financial diligence on audited statements, monthly management
      accounts, settlement reconciliation, cohort economics, revenue recognition, and cash generation.
  - risk_id: R-002
    risk_title: Regulatory and AML/KYC scrutiny in Nigeria is material
    risk_category: regulatory
    severity: high
    likelihood: high
    description: OPay is CBN-listed as an MMO, but 2024 public reports cite onboarding restrictions, lifting of
      restrictions, and a reported ₦1 billion fine, making compliance resilience a central diligence topic.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-016
    mitigation_or_diligence_request: Review license conditions, CBN/NIBSS correspondence, KYC remediation program, sanctions
      screening, suspicious-transaction monitoring, and board compliance reporting.
  - risk_id: R-003
    risk_title: Fraud, chargeback, and customer-dispute exposure may pressure margins and trust
    risk_category: operational
    severity: high
    likelihood: medium
    description: OPay terms allocate liability and chargeback obligations, while support pages highlight transfer/card
      dispute workflows, indicating material operational risk around mistaken or unauthorized transactions.
    impacted_chapter_ids:
      - V
      - VIII
    impacted_section_ids:
      - V.A
      - VIII.F
    evidence_claim_ids:
      - EC-016
      - EC-020
    mitigation_or_diligence_request: Request fraud-loss history, chargeback rates, dispute SLA attainment, complaint
      escalations, reimbursement policy, and fraud-model governance.
  - risk_id: R-004
    risk_title: Competition from Moniepoint, PalmPay, Paga, Flutterwave, Kuda, and banks may compress economics
    risk_category: market
    severity: medium
    likelihood: high
    description: Nigeria digital payments has multiple well-funded or profitable players, some with comparable merchant
      networks, consumer wallets, or higher enterprise valuation.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-012
      - EC-013
      - EC-014
      - EC-019
    mitigation_or_diligence_request: Benchmark take rates, fees, CAC, incentives, merchant retention, wallet share,
      active-user quality, and product attach versus peers.
  - risk_id: R-005
    risk_title: Nigeria concentration and FX/macroeconomic exposure remain important despite emerging-market expansion claims
    risk_category: market
    severity: medium
    likelihood: high
    description: Public evidence centers on Nigeria even while OPay references Nigeria, Egypt, and Pakistan; currency
      controls, naira volatility, inflation, and consumer purchasing power can affect volumes and USD comparability.
    impacted_chapter_ids:
      - I
      - III
      - IV
    impacted_section_ids:
      - I.B
      - III.A
      - IV.A
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-019
    mitigation_or_diligence_request: Request revenue and contribution margin by country/currency, FX policy, treasury
      controls, and regulatory approvals in each jurisdiction.
  - risk_id: R-006
    risk_title: Governance, ownership, and personnel visibility are limited
    risk_category: team
    severity: high
    likelihood: medium
    description: Public sources identify investors and some leadership, but do not provide full board composition,
      beneficial ownership, employment terms, stock plans, or turnover.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.G
    evidence_claim_ids:
      - EC-002
      - EC-017
      - EC-018
      - EC-022
      - EC-023
    mitigation_or_diligence_request: Request statutory filings, beneficial ownership, current org chart, board materials,
      executive contracts, equity plans, headcount/attrition, and key-person succession plans.
  - risk_id: R-007
    risk_title: Technology reliability and security claims need independent evidence
    risk_category: technical
    severity: medium
    likelihood: medium
    description: The website claims 100% uptime and seconds-level payment completion, but no public status page, incident
      logs, audit reports, PCI evidence, or SOC-style reports were found.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids:
      - EC-001
      - EC-021
    mitigation_or_diligence_request: Request architecture diagrams, SLO/SLI history, incident postmortems, DR tests,
      penetration-test summaries, PCI/card-scheme evidence, and cloud/vendor risk reviews.
  - risk_id: R-008
    risk_title: Privacy, consumer-protection, and reputation risk are structurally high for mass-market wallets
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: OPay processes sensitive personal and financial data at large scale, and terms/support disclosures point to
      disputes, chargebacks, and customer-risk allocation.
    impacted_chapter_ids:
      - V
      - VIII
    impacted_section_ids:
      - V.A
      - VIII.C
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-015
      - EC-016
      - EC-020
    mitigation_or_diligence_request: Review NDPA/NDPR compliance, privacy notices, breach history, processor contracts,
      complaint analytics, social-listening data, and regulatory consumer-protection correspondence.
  - risk_id: R-009
    risk_title: Last public valuation is stale relative to market and financing conditions
    risk_category: financing
    severity: medium
    likelihood: medium
    description: The $2 billion valuation dates to 2021; subsequent private-market repricing, FX volatility, regulatory
      scrutiny, and undisclosed financings could change fair value.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids:
      - EC-002
      - EC-003
    mitigation_or_diligence_request: Request 409A/valuation marks, investor reporting, secondary-sale history, post-money
      calculations, liquidation preferences, and any IPO/acquisition preparation materials.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited FY2023-FY2025 financial statements and 2026 YTD management accounts.
    why_it_matters: Required to verify profitability, liquidity, revenue quality, and cash generation.
    suggested_source_or_request: Company CFO, auditor, board materials.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, liquidation preferences, debt, options/warrants, and off-balance-sheet obligations.
    why_it_matters: Determines investable security economics and downside protection.
    suggested_source_or_request: Corporate secretary, counsel, investor relations.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Active-user, active-merchant, churn, duplicate-account, and KYC-tier metrics.
    why_it_matters: Registered-user scale may not translate into monetizable activity.
    suggested_source_or_request: Data warehouse export and metrics definitions.
    priority: high
  - gap_id: G-004
    chapter_id: III
