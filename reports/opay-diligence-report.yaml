        checklist_question_ids:
          - VIII.F
        summary: Material contracts are not public. Terms reveal dependencies on payment processors, settlement banks, card
          schemes, merchants, and regulator/card-scheme rules.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.F-F1
            finding: Terms disclose third-party processors, settlement-bank concepts, card-scheme rules, chargebacks, refunds, and
              set-off rights.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-003
              - R-008
        hidden_risks:
          - Termination, reserve, settlement, chargeback, or exclusivity clauses could materially affect liquidity and
            growth.
        evidence_gaps:
          - Processor, bank, card-scheme, merchant, biller, cloud, KYC/fraud, and agent contracts.
        follow_up_questions:
          - Provide all material contracts with economics, volume commitments, SLAs, reserves, termination rights, and
            change-of-control provisions.
        table_ids:
          - T-006
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-016
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Regulatory diligence is the highest-priority legal area. OPay is listed by the CBN as an MMO, but press reports
          cite 2024 onboarding restrictions, lifting of restrictions, and a reported ₦1 billion fine.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: CBN list supports MMO licensing status.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-002
          - finding_id: VIII.G-F2
            finding: News reports describe 2024 onboarding restrictions and a reported fine, which require direct evidence.
            evidence_claim_ids:
              - EC-008
              - EC-009
            risk_ids:
              - R-002
        hidden_risks:
          - Regulatory remediation may constrain onboarding, product expansion, capital, or transaction monitoring.
          - If reported fines are accurate, repeat findings could impair license standing or investor appetite.
        evidence_gaps:
          - CBN examination reports, enforcement letters, remediation plans, sanctions-monitoring metrics, AML/KYC
            audits, NIBSS correspondence, and board compliance reports.
        follow_up_questions:
          - Provide complete regulatory correspondence and remediation evidence for 2023-2026, including onboarding
            restrictions, fines, inspections, and AML/KYC findings.
        table_ids:
          - T-015
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-009
          - EC-016
