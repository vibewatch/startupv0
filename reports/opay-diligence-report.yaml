report_metadata:
  report_title: OPay Startup Diligence Report
  target_company: OPay
  website: https://www.opayweb.com/
  known_aliases:
    - OPay Digital Services Limited
    - Paycom Nigeria Limited
    - OPay Nigeria
    - OWealth
    - Opay
  sector: Financial technology / mobile money / digital payments
  geography: Nigeria primary; public sources also reference Egypt and Pakistan
  company_stage: Private unicorn
  research_date: 2026-05-18
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; Nigerian naira (₦) for local regulatory amounts
  time_zone: Africa/Lagos
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from public unicorn databases, OPay-owned web/legal/product pages, regulator lists, and independent
      Africa/fintech media.
    - Prioritized evidence that verifies private-unicorn status, licensing, funding, product breadth, operating scale,
      regulatory issues, and peer competition.
    - Used public evidence only; no confidential filings, customer data, bank settlement files, or private company data
      room were accessed.
    - Treated company press-release metrics as claims requiring confirmatory diligence, not as audited fact.
    - Flagged reported regulatory fines and onboarding restrictions as material but partially verified where direct CBN
      enforcement notices were not public.
  included_jurisdictions:
    - Nigeria
    - Egypt where referenced by company press materials
    - Pakistan where referenced by company press materials
    - Global investor/market-database context
  excluded_topics:
    - Non-public financial statements and tax filings
    - Private cap table and financing documents
    - Non-public CBN correspondence, enforcement notices, and remediation plans
    - Customer-level records, bank settlement files, and supplier contracts
    - Private litigation dockets, HR records, security reports, and insurance policies
  user_provided_materials:
    - material_id: UPM-001
      title: Autonomous diligence request for OPay
      type: workflow_request
      date_received: 2026-05-18
      notes: User requested public-source diligence report at reports/opay-diligence-report.yaml; no founder deck or private
        materials were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: OPay is a broad mobile money and payments platform for consumers and merchants, with wallet, transfers,
      bills, airtime/data, card, savings, merchant, and support functionality.
    claim_source: Company website, terms, and support pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - V
      - VI
    mapped_section_ids:
      - II.A
      - V.A
      - VI.A
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-016
      - EC-020
      - EC-021
    contradiction_summary: Product availability is supported by company-owned public materials, but usage and economics by
      product are not public.
    diligence_follow_up:
      - Request product-level revenue, active users, take rate, loss/fraud rate, uptime logs, and complaint metrics by
        product line.
  - founder_claim_id: FC-002
    claim_text: OPay is a private unicorn valued at $2 billion after its $400 million 2021 Series C financing.
    claim_source: TechCabal 2021 funding coverage and CB Insights unicorn database
    claim_date: 2021-08-23
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-002
      - EC-003
    contradiction_summary: null
    diligence_follow_up:
      - Request full financing history, current cap table, liquidation preferences, investor rights, option pool, debt,
        and any post-2021 valuation marks.
  - founder_claim_id: FC-003
    claim_text: OPay reached first monthly profitability and very large 2024 operating scale, including more than 50 million
      users, more than 1 million merchants, and more than $12 billion monthly transaction volume.
    claim_source: OPay May 2024 PR Newswire release
    claim_date: 2024-05-10
    mapped_chapter_ids:
      - I
      - III
    mapped_section_ids:
      - I.A
      - III.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-005
    contradiction_summary: No public audited statements or regulator/bank reconciliation was available to verify
      profitability or transaction volume.
    diligence_follow_up:
      - Request monthly management accounts, audited statements, active-user definitions, merchant cohorts, transaction
        reconciliation, and revenue/take-rate bridge.
  - founder_claim_id: FC-004
    claim_text: OPay is licensed/recognized by the Central Bank of Nigeria as a mobile money operator.
    claim_source: CBN public mobile money operator list
    claim_date: null
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
    contradiction_summary: CBN list supports license status; press reports also indicate regulatory restrictions and fines
      that need document review.
    diligence_follow_up:
      - Request license certificates, examination reports, sanctions/remediation letters, CBN correspondence, and
        compliance KPIs.
  - founder_claim_id: FC-005
    claim_text: OPay scaled distribution through agents, merchants, and job creation in emerging markets.
    claim_source: TechCabal 2021 coverage and OPay 2024 press release
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
      - VII
    mapped_section_ids:
      - III.B
      - V.C
      - VII.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-006
      - EC-005
      - EC-022
    contradiction_summary: Distribution scale is plausible and public, but methodology for agents, merchants, and jobs is not disclosed.
    diligence_follow_up:
      - Request agent/merchant master file, active-month definitions, churn, commissions, dormant-account aging, and
        job-count methodology.
  - founder_claim_id: FC-006
    claim_text: OPay has public leadership and investor backing sufficient to support scaled regulated operations.
    claim_source: Funding coverage and Nigeria media coverage of management
    claim_date: null
    mapped_chapter_ids:
      - VII
      - I
    mapped_section_ids:
      - VII.A
      - VII.C
      - I.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-017
      - EC-018
      - EC-002
    contradiction_summary: Public evidence names a CEO and investors, but board composition, beneficial ownership, control
      rights, and retention terms are not public.
    diligence_follow_up:
      - Request org chart, board minutes, statutory filings, beneficial-ownership register, shareholder agreements, and
        key-person retention agreements.
executive_summary:
  overall_assessment: OPay is a real, scaled Nigeria-centered mobile-money and digital-payments private unicorn with
    strong public support for its 2021 $400 million Series C, $2 billion valuation, CBN mobile-money-operator listing,
    broad wallet/merchant product suite, and very large self-reported 2024 scale. The company is not investment-ready on
    public evidence alone because audited financials, current capitalization, product-level economics, customer/merchant
    quality, regulatory correspondence, security evidence, and governance details are missing.
  investment_or_diligence_thesis: Continue to second-stage confirmatory diligence. The upside case is a scaled mass-market
    wallet/merchant network in a rapidly growing Nigerian mobile-money market with reported first monthly profitability.
    The underwriting question is whether OPay can convert gross transaction scale into durable, compliant,
    cash-generative revenue while withstanding CBN/AML scrutiny, fraud/chargeback risk, competitive incentives, and
    FX/regulatory concentration.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Public sources support the 2021 $400 million Series C at a $2 billion valuation and CB Insights unicorn listing.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: The CBN public list includes OPay Digital Services Limited (formerly Paycom Nigeria Limited) as a Mobile Money
        Operator.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-001
      summary: OPay-owned product/legal materials substantiate a broad wallet, transfer, merchant, card, bill-pay,
        savings/rewards, support, and payment product footprint.
      evidence_claim_ids:
        - EC-001
        - EC-016
        - EC-020
  biggest_risks:
    - risk_id: R-002
      summary: "Regulatory and AML/KYC risk is high: OPay is licensed, but public reports cite onboarding restrictions and a
        reported ₦1 billion CBN fine."
    - risk_id: R-001
      summary: Profitability and unit economics are not verified by public audited financials despite a self-reported first
        monthly profit.
    - risk_id: R-003
      summary: Fraud, chargeback, failed-transfer, and customer-dispute exposure can pressure margins and reputation in a
        mass-market wallet.
    - risk_id: R-004
      summary: Competition from Moniepoint, PalmPay, Paga, Flutterwave, Kuda, banks, and telcos could compress fees and
        require incentives.
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, settlement reconciliation, product-level P&L, revenue
      recognition, tax, and chargeback/fraud reserve policy.
    - Current fully diluted cap table, financing documents, investor rights, debt/off-balance-sheet obligations, option
      pool, and any post-2021 valuation marks.
    - Active-user and active-merchant definitions, cohorts, churn, KYC tiers, complaints, top customers/partners, and
      revenue concentration.
    - CBN/NIBSS correspondence, onboarding restriction/fine documentation, AML/KYC remediation evidence, and compliance
      KPI history.
    - Architecture, uptime/SLO, security audit, privacy, incident, processor, bank, card-scheme, and material-contract
      evidence.
    - Board, management, beneficial ownership, headcount, compensation, stock plans, employee relations, and turnover.
  recommended_next_steps:
    - "Open confirmatory financial and regulatory diligence before any valuation work: audited accounts, settlement
      data, CBN correspondence, and AML/KYC remediation are gating items."
    - Run customer/merchant cohort analysis and peer benchmark of take rate, incentives, fraud losses, chargebacks, and
      CAC/payback.
    - Review all material contracts with settlement banks, processors, card schemes, KYC/fraud vendors, billers, agents,
      and major merchants.
    - Conduct technical/security diligence on uptime, incident history, architecture, data protection, fraud models, and
      disaster recovery.
    - Confirm governance, beneficial ownership, board controls, key-person retention, and cap-table economics before
      assigning investment value.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: OPay has strong public scale and funding signals, including a $400 million Series C, $2 billion unicorn
      valuation, and a 2024 self-reported first monthly profit. However, the core financial statements, revenue bridge,
      cap table, and cash-flow data required for investment underwriting are not public.
    founder_claim_ids:
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-023
    risk_ids:
      - R-001
      - R-005
      - R-006
      - R-009
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited annual or quarterly financial statements were public. Available financial evidence consists of
          self-reported profitability and scale metrics, plus historical funding press coverage. This is sufficient for
          screening but not for confirming quality of revenue, cash flow, working capital, or receivables exposure.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: OPay announced first monthly profitability in May 2024, but no audited statements or monthly management
              accounts were public.
            evidence_claim_ids:
              - EC-004
              - EC-023
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Public operating metrics imply large scale, but revenue, take rate, and gross profit by
              product/channel/geography are absent.
            evidence_claim_ids:
              - EC-005
              - EC-006
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Profitability may reflect a single favorable month, accounting classification, FX translation, or temporary
            incentive reductions rather than durable cash generation.
          - Transaction-volume claims could include low-margin transfers or gross flows that do not translate into
            revenue.
        evidence_gaps:
          - Audited income statements, balance sheets, cash flows, footnotes, tax schedules, monthly management
            accounts, revenue-recognition policy, receivables aging, and backlog/customer concentration.
        follow_up_questions:
          - Provide FY2023-FY2025 audited financial statements and 2026 YTD management accounts with product-level
            revenue, gross profit, CAC, fraud losses, chargebacks, and cash-flow reconciliations.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-006
          - EC-023
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public three-year projection package was available. Growth drivers visible in public sources include
          user/merchant expansion, agent distribution, mobile-money market growth, and product breadth, while risks
          include FX, regulation, competition, fraud, and incentive economics.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Mobile-money market growth provides a favorable top-down context, but OPay-specific future share and margins
              are not public.
            evidence_claim_ids:
              - EC-019
              - EC-005
            risk_ids:
              - R-004
              - R-005
        hidden_risks:
          - Forecasts may depend on fee increases or incentive reductions that could impair retention in a highly
            competitive wallet market.
          - Foreign operations in Egypt and Pakistan may introduce currency, licensing, and capital-control risks not
            captured in Nigeria-centered public sources.
        evidence_gaps:
          - Board-approved operating plan, sensitivity cases, pricing strategy, country-level forecasts, external
            financing assumptions, capex, and working-capital assumptions.
        follow_up_questions:
          - Provide a 36-month board plan with revenue by product/geography/channel, volume/take-rate assumptions,
            regulatory capital requirements, FX scenarios, and funding needs.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-019
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: The last public priced equity event identified was the 2021 $400 million Series C at a $2 billion valuation. CB
          Insights corroborates the $2 billion unicorn status. Detailed ownership, preferences, options, warrants, debt,
          and off-balance-sheet obligations were not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: The Series C and unicorn valuation are strongly supported by public sources.
            evidence_claim_ids:
              - EC-002
              - EC-003
            risk_ids:
              - R-009
          - finding_id: I.C-F2
            finding: The investor list is public, but actual current ownership and control rights are not.
            evidence_claim_ids:
              - EC-002
              - EC-018
            risk_ids:
              - R-006
        hidden_risks:
          - A large 2021 round could carry liquidation preferences, investor vetoes, or anti-dilution provisions that
            materially affect common-equity economics.
          - Undisclosed debt, settlement obligations, or regulator-mandated reserves could affect capitalization.
        evidence_gaps:
          - Current cap table, shareholder register, investor rights agreements, option/warrant schedule, debt schedule,
            settlement float treatment, and off-balance-sheet obligations.
        follow_up_questions:
          - Provide a fully diluted cap table, financing documents, debt/warehouse lines, settlement/float liability
            accounting, investor rights, and any secondary or restructuring history.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-018
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Tax positions, accounting policies, revenue recognition, chargeback accounting, settlement-float treatment, and
          cross-border transfer pricing are not public. Terms disclose chargeback and third-party processor dependencies
          that may be financially material.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.D-F1
            finding: Terms disclose chargeback and processor relationships that should be tied to accounting policy and financial
              reserves.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-003
              - R-001
        hidden_risks:
          - Chargeback and refund liabilities may be under-reserved if fraud or failed-transfer rates rise.
          - Float, settlement timing, and customer funds treatment could have regulatory and accounting implications.
        evidence_gaps:
          - Tax filings, transfer-pricing policy, revenue-recognition memos, customer-funds accounting, reserve policy,
            and settlement reconciliations.
        follow_up_questions:
          - Provide tax structure, regulatory capital/float treatment, revenue-recognition memoranda, chargeback reserve
            policy, and independent auditor correspondence.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-016
          - EC-023
  - chapter_id: II
    title: Products
    chapter_summary: "OPay’s public product suite is broad for a mass-market digital finance platform: consumer wallet,
      transfers, merchant payments, QR/business tools, bill pay, airtime/data, savings rewards, cards, and support. The
      main diligence gap is product-level economics, risk, reliability, and regulatory permissions."
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-001
      - EC-016
      - EC-021
    risk_ids:
      - R-003
      - R-007
      - R-008
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Company materials support a broad wallet, transfer, payments, savings, card, bill-pay, airtime/data, merchant,
          and support product suite. Public sources do not provide product-level active users, revenue, gross margin,
          loss rate, or roadmap economics.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: OPay’s website supports the existence of core consumer wallet, transfer, rewards, airtime/data, and payment
              functionality.
            evidence_claim_ids:
              - EC-001
            risk_ids:
              - R-007
          - finding_id: II.A-F2
            finding: Terms disclose third-party payment processors, regulatory information requests, and chargeback/refund mechanics
              that affect product risk.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-003
              - R-008
          - finding_id: II.A-F3
            finding: The 100% uptime marketing claim is unverified and requires technology evidence.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-007
        hidden_risks:
          - Savings or reward products may create regulatory or partner-bank dependencies that are not visible in public
            materials.
          - Cards, QR, and merchant acceptance expose the company to card-scheme rules, settlement risk, chargebacks,
            and fraud.
          - The website uptime claim could raise consumer-protection or reputational risk if outages occur.
        evidence_gaps:
          - Product-level P&L, licenses/partner contracts by product, uptime/SLA data, card-scheme registrations,
            savings product structure, fraud losses, and customer complaints.
        follow_up_questions:
          - Provide a product inventory with owner, launch date, regulator/partner approvals, revenue model, active
            users, unit economics, risk controls, and product roadmap.
        table_ids:
          - T-003
          - T-004
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-016
          - EC-021
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public information supports very large user and merchant claims but not top-customer lists, revenue
      concentration, churn, cohort retention, or supplier exposure. OPay appears primarily consumer/SMB/agent-network
      driven rather than concentrated in a few enterprise customers, but this is not verifiable from public data.
    founder_claim_ids:
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-016
    risk_ids:
      - R-001
      - R-003
      - R-005
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: "OPay’s public claims emphasize a mass-market base: over 50 million users, over 1 million merchants, near-10
          million daily active trading users, and a 2021 base of 5 million registered users and 300,000 agents. No
          top-15 customer list or application-level purchasing history is public."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: User and merchant scale is large but self-reported.
            evidence_claim_ids:
              - EC-005
              - EC-006
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Dormant or duplicate users may inflate registered-user metrics.
          - Merchant count may include low-volume or inactive merchants.
        evidence_gaps:
          - Active monthly users, cohorts, KYC tiering, dormant accounts, active merchants, transaction frequency, and
            customer-level revenue.
        follow_up_questions:
          - Provide top-customer/merchant cohorts by revenue and volume, monthly active users, churn, complaints, and
            application/product usage segmentation.
        table_ids:
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-006
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public sources imply relationships with merchants, agents, banks/payment processors, card schemes, regulators,
          and billers, but contract terms and revenue contribution are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Terms disclose third-party payment processors and settlement-bank concepts; the CBN list confirms regulator
              relevance.
            evidence_claim_ids:
              - EC-016
              - EC-007
            risk_ids:
              - R-003
              - R-002
        hidden_risks:
          - A concentrated settlement-bank or processor dependency could create operational fragility.
          - Agent/merchant contracts may include incentives or minimums that affect margins.
        evidence_gaps:
          - Contracts with processors, banks, card schemes, billers, telcos, agent aggregators, and top merchants.
        follow_up_questions:
          - Provide partner list, revenue/volume contribution, contract tenor, SLAs, exclusivity, termination rights,
            and settlement obligations.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-016
          - EC-007
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No revenue-by-customer data is public. The business likely monetizes high-volume consumer and merchant activity
          through fees, spreads, float/treasury arrangements, merchant services, card economics, or partner commissions,
          but exact mix is private.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: No public source discloses customer concentration or revenue by customer.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-001
        hidden_risks:
          - A small number of processors, merchants, or biller relationships could represent more concentration than
            user counts suggest.
        evidence_gaps:
          - Customer and merchant revenue concentration, product-level take rate, top-20 accounts, and related-party
            revenue.
        follow_up_questions:
          - Provide revenue by customer/merchant/partner, customer count definitions, and concentration thresholds above
            5%.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-023
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public evidence of severed material customer, supplier, or partner relationships was found in this run. This
          should not be interpreted as absence of such events.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Public search did not identify a material severed relationship, but private partner history is unavailable.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-006
        hidden_risks:
          - Regulatory restrictions, processor de-risking, or bank-partner termination could be material but undisclosed.
        evidence_gaps:
          - Terminated bank/processor/merchant/agent contracts, notices of breach, and litigation or arbitration files.
        follow_up_questions:
          - Provide schedule of terminated or non-renewed strategic relationships, reason codes, remediation steps, and
            any open disputes.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-023
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Top suppliers are not publicly named. Likely supplier categories include banks/settlement banks, payment
          processors, card schemes, telcos/billers, cloud/infrastructure vendors, KYC/fraud vendors, and device/POS
          providers.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: OPay terms reference payment processors and settlement banks, but supplier names and spend are not disclosed.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-003
        hidden_risks:
          - Supplier concentration in settlement, cloud, KYC, or card processing could create operational and compliance
            risk.
        evidence_gaps:
          - Supplier master file, spend by vendor, contract terms, SLA history, critical-vendor risk assessments, and
            exit plans.
        follow_up_questions:
          - Provide top suppliers by spend and criticality for the past two fiscal years and YTD, including agreements
            and continuity plans.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-016
  - chapter_id: IV
    title: Competition
