executive_summary:
  overall_assessment: Genies appears eligible as an uncovered private unicorn based on CB Insights and corroborating public evidence. Public evidence supports status screening and product/market activity, but investment-grade underwriting remains unresolved because financials, customer quality, contracts, legal/regulatory posture, cap table and personnel data are private. Financing and partner claims are from investor press release; product claims are company-owned current pages.
  investment_or_diligence_thesis: Genies shows credible financing and active product evidence, but diligence should focus on whether the company converted Web3-avatar momentum into durable AI-character/developer revenue with defensible IP rights.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn and financing evidence supports the $1B status screen.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public sources support at least partial active product/platform positioning.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: Public sources show partner, customer or ecosystem signals but not revenue quality.
      evidence_claim_ids:
        - EC-004
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Avatar/Web3 monetization and pivot risk
    - risk_id: R-002
      summary: IP, creator-rights and platform dependency risk
    - risk_id: R-003
      summary: Private financial quality and retention gap
  key_evidence_gaps:
    - Audited financial statements, KPI pack, cash/debt schedule and runway
    - Fully diluted cap table, preferences, warrants, notes and investor rights
    - Top-customer revenue, contracts, renewals, churn and reference checks
    - Sales productivity, funnel conversion, CAC/payback and pipeline quality
    - Roadmap, technical/security artifacts, IP assignments, litigation/regulatory schedule, insurance and material contracts
  recommended_next_steps:
    - Do not underwrite from public valuation alone; request financing documents and current KPI pack.
    - Run customer/reference, retention, contract and concentration diligence before relying on demand signals.
    - Have legal, regulatory, security/privacy and IP specialists review source evidence and data-room records before investment reliance.
