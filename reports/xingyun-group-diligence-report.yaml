    contradiction_summary: Company-owned metrics are not audited and differ from brand-page metrics.
    diligence_follow_up:
      - Request active-account definitions, KPI dictionary, HRIS headcount, and geography/entity reconciliation.
  - founder_claim_id: FC-004
    claim_text: Xingyun has hundreds of thousands of retail endpoints and RMB3B+ monthly transaction value.
    claim_source: Xingyun brand services page
    claim_date: null
    mapped_chapter_ids:
      - I
      - III
      - V
    mapped_section_ids:
      - I.A
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
    contradiction_summary: Retailer counts vary across company pages, and transaction value does not equal net revenue.
    diligence_follow_up:
      - Request GMV/revenue bridge, active retailer counts, and transaction audit trail.
  - founder_claim_id: FC-005
    claim_text: Public revenue/funding data are sufficient to underwrite economics.
    claim_source: Implicit diligence claim
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.A
    verification_status: not_publicly_verifiable
    confidence: low
    evidence_claim_ids:
      - EC-006
    contradiction_summary: Public records do not disclose audited margins, cash, debt, working capital, or credit losses.
    diligence_follow_up:
      - Provide audited financials and working-capital schedules.
  - founder_claim_id: FC-006
    claim_text: Xingyun has no material legal/entity-perimeter issue affecting private-unicorn eligibility.
    claim_source: Eligibility screen and CB profile discrepancy
    claim_date: null
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.A
    verification_status: inconclusive
    confidence: low
    evidence_claim_ids:
      - EC-008
      - EC-009
    contradiction_summary: Reverse-merger signal and entity-perimeter ambiguity remain unresolved.
    diligence_follow_up:
      - Have counsel verify registries, public affiliates, and reverse-merger references.
executive_summary:
  overall_assessment: Xingyun Group has credible public evidence for unicorn status, large funding, cross-border commodity services, and company-claimed network scale. It should not be underwritten from public evidence alone because revenue quality, gross margin, inventory, receivables, credit losses, financing facilities, customer concentration, compliance, and entity perimeter are unresolved.
  investment_or_diligence_thesis: The opportunity is a high-scale infrastructure layer for cross-border consumer goods if Xingyun can convert brand/retailer reach into recurring, margin-positive service revenue without excessive working-capital, credit, customs, or entity-structure risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights supports $2B unicorn and substantial funding anchors.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-006
    - founder_claim_id: FC-002
      summary: CB and company pages support the full-link cross-border service model.
      evidence_claim_ids:
        - EC-003
        - EC-007
    - founder_claim_id: FC-003
      summary: Official pages claim substantial employee, country, brand, retailer and SKU scale.
      evidence_claim_ids:
        - EC-004
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Opaque financial quality and stale valuation.
    - risk_id: R-002
      summary: Working-capital, inventory and credit exposure.
    - risk_id: R-005
      summary: Entity perimeter and reverse-merger ambiguity.
  key_evidence_gaps:
    - Audited financials, revenue-recognition policy, GMV-to-revenue bridge, margins, cash/debt, and current valuation.
    - Inventory, AR/AP, credit losses, bank/capital partner facilities, guarantees and covenants.
    - Active brand/retailer/customer definitions, top-account concentration, churn, and contract economics.
    - Legal entity chart, public affiliate/reverse-merger analysis, offshore/VIE structure, investor rights and compliance licenses.
  recommended_next_steps:
    - Run financial quality-of-earnings and working-capital diligence.
    - Have PRC/HK/offshore counsel verify legal entity perimeter and reverse-merger signal.
    - Reconcile all scale metrics to active, revenue-generating cohorts.
    - Review top brand/platform/logistics/bank contracts and cross-border compliance files.
