report_metadata:
  report_title: Xingyun Group Startup Diligence Research Report
  target_company: Xingyun Group
  website: https://www.xingyungroup.com/
  known_aliases:
    - Xingyun Group
    - Xingyun B2B
    - Xingyun cross-border
  sector: Cross-border e-commerce; digital supply chain; consumer goods distribution; supply-chain finance
  geography: China; Shenzhen headquarters with claimed global cross-border operations
  company_stage: Private unicorn with unresolved public-market/entity-perimeter risk
  research_date: 2026-05-19
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless source states RMB
  time_zone: Asia/Shanghai
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Selected from uncovered CB Insights unicorn candidates after screening for obvious IPO, acquisition, or shutdown evidence.
    - Prioritized CB Insights public profiles, official Xingyun pages, and eligibility search snapshots.
    - Treated Chinese-language company scale claims as partially verified until reconciled to audited and legal-entity records.
  included_jurisdictions:
    - People's Republic of China
    - Hong Kong SAR
    - Singapore
    - Cross-border goods corridors claimed by company
  excluded_topics:
    - Private financial statements
    - Management interviews
    - Customer calls
    - Non-public contracts
    - Paid databases beyond public snippets
  user_provided_materials: []
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Xingyun Group is an active private unicorn valued around $2B with substantial funding.
    claim_source: CB Insights unicorn list and company profiles
    claim_date: 2020-09-24
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-006
      - EC-008
    contradiction_summary: CB public pages include a reverse-merger-stage signal requiring entity-perimeter review.
    diligence_follow_up:
      - Confirm legal entity structure, current capitalization, financing documents, and current valuation.
