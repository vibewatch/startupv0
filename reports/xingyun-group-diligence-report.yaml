risk_register:
  - risk_id: R-001
    risk_title: Opaque financial quality and stale valuation
    risk_category: financial
    severity: high
    likelihood: high
    description: CB valuation/revenue/funding anchors are public, but audited financials, margins, cash, debt and current valuation are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a18
    mitigation_or_diligence_request: Request audited financials, cap table, cash/debt, and revenue-recognition memo.
  - risk_id: R-002
    risk_title: Working-capital, inventory and credit exposure
    risk_category: operational
    severity: high
    likelihood: high
    description: Cross-border commodity distribution and supply-chain finance can create inventory, receivable, payable, and credit risks.
    impacted_chapter_ids:
      - I
      - II
      - III
    impacted_section_ids:
      - I.A
      - II.A
      - III.B
    evidence_claim_ids: *a19
    mitigation_or_diligence_request: Request AR/AP, inventory aging, facilities, guarantees, and credit-loss history.
  - risk_id: R-003
    risk_title: Scale-claim reconciliation risk
    risk_category: financial
    severity: medium
    likelihood: high
    description: Company pages claim different retailer and scale metrics, requiring active-account and KPI definition reconciliation.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.A
    evidence_claim_ids: *a20
    mitigation_or_diligence_request: Request KPI dictionary, active cohorts, GMV/revenue bridge, and source ledgers.
  - risk_id: R-004
    risk_title: Supply-chain finance and cross-border compliance risk
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Bank/capital cooperation, logistics and cross-border goods create financial, customs, product safety, tax and data-compliance exposure.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.B
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Review licenses, customs files, tax controls, bank agreements, and compliance incidents.
  - risk_id: R-005
    risk_title: Entity perimeter and reverse-merger ambiguity
    risk_category: legal
    severity: high
    likelihood: medium
    description: CB pages conflict between Series C - II | Alive and Reverse Merger, so legal entity status and private-unicorn eligibility need counsel verification.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.B
      - VIII.A
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Counsel should verify registries, offshore/VIE entities, public affiliates, and reverse-merger references.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, GMV-to-revenue bridge, margins, cash/debt and current valuation.
    why_it_matters: Headline revenue/transaction values may not translate to high-quality net revenue.
    suggested_source_or_request: Company finance data room and auditor workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.A
    missing_information: Inventory, AR/AP, credit-loss, bank/capital partner and guarantee schedules.
    why_it_matters: Working capital and financing exposure are core risks.
    suggested_source_or_request: Treasury and working-capital schedules.
    priority: high
  - gap_id: G-003
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Legal entity perimeter and reverse-merger analysis.
    why_it_matters: Determines private-unicorn eligibility and investable entity rights.
    suggested_source_or_request: PRC/HK/offshore counsel memo and registry documents.
    priority: high
follow_up_requests:
