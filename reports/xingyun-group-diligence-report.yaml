    title: Xingyun legal and related matters figure
    chapter_id: VIII
    section_id: VIII.A
    figure_type: risk_heatmap
    description: Xingyun legal and related matters figure
    purpose: Xingyun legal and related matters figure
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    rendering_guidance:
      preferred_format: table_visual
      display_notes: Render from public-evidence anchors; null values mark evidence gaps.
    evidence_claim_ids: *a15
    source_ids: *a17
    notes: null
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Opaque financial quality and stale valuation
          severity: high
          likelihood: high
          rationale: CB valuation/revenue/funding anchors are public, but audited financials, margins, cash, debt and current valuation are not.
          evidence_claim_ids: &a18
            - EC-001
            - EC-002
            - EC-006
          source_ids: *a17
        - risk_id: R-002
          label: Working-capital, inventory and credit exposure
          severity: high
          likelihood: high
          rationale: Cross-border commodity distribution and supply-chain finance can create inventory, receivable, payable, and credit risks.
          evidence_claim_ids: &a19
            - EC-003
            - EC-005
            - EC-006
          source_ids: *a17
        - risk_id: R-003
          label: Scale-claim reconciliation risk
          severity: medium
          likelihood: high
          rationale: Company pages claim different retailer and scale metrics, requiring active-account and KPI definition reconciliation.
          evidence_claim_ids: &a20
            - EC-004
            - EC-005
          source_ids: *a17
        - risk_id: R-004
