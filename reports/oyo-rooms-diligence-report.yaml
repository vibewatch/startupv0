report_metadata:
  report_title: OYO Rooms Public-Source Startup Diligence Report
  target_company: OYO Rooms
  website: https://www.oyorooms.com/
  known_aliases:
    - OYO
    - OYO Rooms
    - OYO Hotels
    - Oravel Stays Limited
    - Oravel Stays Private Limited
    - Oravel Stays Singapore Pte. Limited
  sector: Hospitality technology, budget hotels, homes and accommodation marketplace operations
  geography: India / Gurugram with operations across India, Europe, Southeast Asia and global hotel/home markets
  company_stage: Private unicorn / late-stage hospitality technology platform
  research_date: 2026-06-07
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise noted; Indian operating records may use INR
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from the public CB Insights unicorn list fetched on 2026-06-07 and excluded report slugs already present in reports/.
    - Selected OYO Rooms through the requested random shuf workflow and researched only public, accessible sources.
    - Prioritized company-owned pages, investor/market-database sources, public product/pricing/security/privacy/legal pages, customer or ecosystem evidence and independent context where accessible.
    - Treated third-party and company-authored claims as evidence to be verified, not as audited facts.
  included_jurisdictions:
    - India
    - Singapore
    - United States
    - United Kingdom
    - European Union
    - Southeast Asia
  excluded_topics:
    - No private financial statements, board materials, cap table, debt instruments, contracts, customer lists, HRIS exports, security reports, insurance policies or management interviews were available.
    - Paywalled, blocked or rate-limited sources were not bypassed; gaps are identified as follow-up requests.
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn diligence assignment
      type: workflow_request
      date_received: 2026-06-07
      notes: "Selected row: OYO Rooms, slug oyo-rooms, $9B valuation, joined 2018-09-25, India / Gurugram, Consumer & Retail, investors SoftBank Group, Sequoia Capital India and Lightspeed India Partners."
