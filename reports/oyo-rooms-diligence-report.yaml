executive_summary:
  overall_assessment: "OYO passes a public eligibility screen for a private-unicorn diligence report: CB Insights lists OYO Rooms as a $9B private unicorn, public company pages remain active, and accessible sources show substantial accommodation-platform operations. The diligence risk profile is high because current audited financials, IPO status detail, debt, unit economics, partner churn, customer concentration, regulatory matters and legal schedules were not publicly verifiable from accessible sources."
  investment_or_diligence_thesis: A credible diligence thesis requires proving that OYO can translate very large accommodation supply and brand reach into sustainable, compliant, profitable unit economics across heterogeneous jurisdictions and partner-property models.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights provides a public private-unicorn valuation marker.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company-owned sources support the platform/product description and global operations.
      evidence_claim_ids:
        - EC-002
        - EC-008
    - founder_claim_id: FC-003
      summary: Public pages support large network scale, though definitions need reconciliation.
      evidence_claim_ids:
        - EC-004
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Public sources show scale but not current audited revenue, contribution margin, cash, debt or working capital.
    - risk_id: R-002
      summary: The $9B public valuation does not disclose current ownership, preferences, debt or down-round/IPO implications.
    - risk_id: R-003
      summary: OYO runs multiple products across booking, property management, dynamic pricing and partner operations; reliability and product economics are private.
    - risk_id: R-004
      summary: Large supply metrics do not reveal active property concentration, partner churn, corporate account reliance or revenue by geography.
    - risk_id: R-005
      summary: OYO competes with global OTAs, hotel brands, vacation-rental platforms and local budget-hotel operators.
  key_evidence_gaps:
    - Audited financial statements, cash, debt, working capital, tax, unit economics and plan-vs-actuals.
    - Cap table, preferences, secondary transactions, shareholder rights and IPO/financing status.
    - Active hotels/homes, take rate, cancellations/refunds, partner churn, corporate account concentration and geography profitability.
    - Regulatory, consumer-protection, privacy, tax, labor and franchise/property-contract exposure across jurisdictions.
    - Management depth, headcount, compensation, attrition and incentive plan details.
  recommended_next_steps:
    - Reconcile operating metrics and obtain audited financials before relying on the $9B valuation.
    - Run property-owner, corporate-customer and traveler-reference diligence in major geographies.
    - Review partner/property contracts, refund policies, tax and regulatory obligations by jurisdiction.
    - Have counsel run official litigation, regulatory, IP, privacy, employment and insurance searches.
