executive_summary:
  overall_assessment: "Dialpad appears eligible for a private-unicorn public diligence report: CB Insights and funding evidence support a $2.2B valuation, public product/customer/trust/careers pages show an active AI communications business, and no public SEC ticker match was found. This is a public-evidence screen, not investment-ready diligence."
  investment_or_diligence_thesis: "Proceed only to confirmatory diligence. The positive thesis is a scaled AI communications platform with public customer proof, strategic-channel evidence, enterprise trust posture and AI/IP assets. The underwriting question is whether audited revenue quality, retention, AI/telephony gross margins, customer concentration, security/privacy controls, patent exposure and financing terms support the valuation."
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "Dialpad is publicly listed as a unicorn at $2.2B and announced a $170M Series F at the same valuation."
      evidence_claim_ids:
        - "EC-001"
        - "EC-003"
    - founder_claim_id: "FC-002"
      summary: "Dialpad publicly markets AI Agents, Support, Sell and Connect."
      evidence_claim_ids:
        - "EC-005"
    - founder_claim_id: "FC-004"
      summary: "Public customer evidence includes JRE, Beacon Mobility, ConstructConnect, PS Logistics and broad brand claims."
      evidence_claim_ids:
        - "EC-007"
        - "EC-008"
        - "EC-009"
        - "EC-010"
        - "EC-011"
        - "EC-012"
    - founder_claim_id: "FC-006"
      summary: "Trust and legal pages describe enterprise security/compliance controls and regulated telephony/AI obligations."
      evidence_claim_ids:
        - "EC-014"
        - "EC-015"
        - "EC-016"
  biggest_risks:
    - risk_id: "R-001"
      summary: "Financial quality, ARR durability, gross margin, burn and cash runway are not publicly verifiable."
    - risk_id: "R-003"
      summary: "UCaaS/CCaaS/AI communications competition is intense, with scaled incumbents and Microsoft bundling pressure."
    - risk_id: "R-006"
      summary: "Security, privacy, AI-governance and regulated communications obligations are material."
    - risk_id: "R-008"
      summary: "Patent assertion activity and incomplete public IP/FTO evidence require counsel review."
    - risk_id: "R-004"
      summary: "Public logos and case studies do not disclose concentration, churn, renewals or satisfaction."
  key_evidence_gaps:
    - "Audited financials, ARR bridge, NRR/GRR, gross margin, cash runway, debt and revenue-recognition policy."
    - "Fully diluted cap table, liquidation preferences, option pool, debt/notes and current valuation support."
    - "Top-customer ARR, retention/churn cohorts, renewal calendar, contracts and reference calls."
    - "SOC/ISO/PCI/HIPAA artifacts, incident history, DPA/subprocessor review and AI data-governance controls."
    - "Complete litigation/IP/FTO review, insurance coverage and regulatory telecom/privacy counsel analysis."
    - "Independent market sizing and win/loss evidence versus RingCentral, Microsoft, Five9, Genesys and Nextiva."
  recommended_next_steps:
    - "Open confirmatory data-room diligence with finance, cap table, customer, product, security, legal and HR workstreams."
    - "Conduct CFO/CTO/CISO/counsel interviews focused on ARR quality, AI economics, reliability, privacy/security artifacts and litigation/IP exposure."
    - "Run customer reference calls and review top-account contracts/renewals before relying on case-study metrics."
    - "Commission market and win/loss analysis to test competitive defensibility and pricing power."
    - "Have telecom/privacy counsel review 911, TCPA, wiretap/call-recording, robocall mitigation and AI-agent disclosure controls."
