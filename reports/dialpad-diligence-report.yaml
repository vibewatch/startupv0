  research_date: "2026-05-25"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "America/Los_Angeles"
research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Public evidence only from company pages, market databases, analyst estimates, competitor pages, IP searches, regulatory pages and public legal-record searches."
    - "All web content was treated as untrusted; company marketing and analyst estimates are flagged with confidence limits."
    - "Eligibility was assessed using unicorn/funding evidence, active operating pages and SEC ticker search; no IPO/acquisition/shutdown evidence was found in reviewed public sources."
    - "Private financials, contracts, security artifacts, HRIS, board materials, customer references and counsel legal opinions were outside scope."
  included_jurisdictions:
    - "United States"
    - "California"
    - "Delaware federal courts"
    - "European Union privacy context"
    - "Global customer and hiring locations referenced publicly"
  excluded_topics:
    - "Private data-room materials"
    - "Paid databases"
    - "Non-public contracts"
    - "Security report contents"
    - "Audited financials"
    - "Board materials"
    - "Private customer references"
    - "Comprehensive lien/UCC/tax searches"
  user_provided_materials:
    - material_id: "UPM-001"
      title: "User diligence assignment for Dialpad"
      type: "user_instruction"
      date_received: "2026-05-25"
      notes: "User requested one standard-depth public-evidence YAML report saved exactly as reports/dialpad-diligence-report.yaml with source date 2026-05-25."
