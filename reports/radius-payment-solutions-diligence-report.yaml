          label: Personnel and operating-complexity risk
          severity: medium
          likelihood: unknown
          rationale: A 3,000-person, multi-country team implies HR, compliance, compensation, and management-depth diligence needs.
          evidence_claim_ids: &a25
            - EC-006
            - EC-008
          source_ids: *a20
        - risk_id: R-006
          label: Valuation and cap-table uncertainty
          severity: medium
          likelihood: unknown
          rationale: The $1.07B marker is a public database entry; current securities terms, preferences, debt, and secondary pricing are not public.
          evidence_claim_ids: &a26
            - EC-001
            - EC-010
          source_ids: *a20
        - risk_id: R-007
          label: Legal, regulatory, insurance, and environmental gaps
