executive_summary:
  overall_assessment: Radius appears to be an active private fleet-mobility and connectivity services platform with CB Insights unicorn-list coverage, Inflexion backing, five-continent operations, 400,000+ to 470,000+ business-customer scale claims, and a broad product suite spanning fuel cards, telematics, leasing, EV charging, telecoms, insurance, and expense management. Public evidence is strongest for market status, product breadth, sponsor backing, customer count, M&A strategy, and workforce scale; it is weak for revenue quality, margins, debt, cap-table terms, customer concentration, contract economics, regulatory exposure, and legal history.
  investment_or_diligence_thesis: The underwriting case depends on whether a diversified fleet-and-connectivity customer base and acquisition-led expansion translate into durable recurring gross profit after fuel-card, telecoms, insurance, and EV-transition economics are normalized. Public sources support scale and sponsor involvement but do not support a quality-of-earnings view.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Radius is an active private unicorn-list company with CB Insights/Inflexion backing and a $1.07B market-database valuation marker.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Radius offers a broad fleet mobility and connectivity platform across fuel cards, telematics, vehicle leasing, EV charge points, telecoms, insurance, energy, and expense management.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Radius serves hundreds of thousands of business customers across multiple continents.
      evidence_claim_ids: *a3
    - founder_claim_id: FC-004
      summary: Radius has strategic relationships with major fuel, payment, telecom, energy, insurance, and mobility brands.
      evidence_claim_ids: *a4
  biggest_risks:
    - risk_id: R-001
      summary: "Financial quality and leverage opacity: Revenue mix, gross margin, debt, cash conversion, working capital, and acquisition accounting are not public for this private-equity-backed company."
    - risk_id: R-002
      summary: "Acquisition integration and roll-up execution: Inflexion says Radius completed over 25 acquisitions across five countries, creating integration, systems, culture, and synergy risk."
    - risk_id: R-003
      summary: "Supplier and partner dependency: Fuel, payment-card, telecom, insurance, energy, and EV-charging products may depend on third-party commercial terms not visible from public sources."
    - risk_id: R-004
      summary: "Customer concentration and retention opacity: Public customer counts do not reveal top-customer revenue, churn, NRR/GRR, cohort profitability, or segment concentration."
    - risk_id: R-005
      summary: "Personnel and operating-complexity risk: A 3,000-person, multi-country team implies HR, compliance, compensation, and management-depth diligence needs."
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, revenue/ARR or revenue bridge, gross margin, cash, debt, working capital, and forecasts.
    - Fully diluted cap table, financing documents, preference stack, debt instruments, shareholder agreements, option pool, and latest valuation support.
    - Top-customer schedule, active/revenue-weighted customer definitions, churn/retention, backlog or pipeline, reference calls, and severed relationships.
    - Material customer, supplier, partner, financing, licensing, insurance, employment, IP, and real-estate contracts.
    - Counsel disclosure, litigation/regulatory schedule, privacy/security/compliance materials, insurance loss runs, and incident history.
  recommended_next_steps:
    - Run quality-of-earnings and balance-sheet diligence before relying on public valuation or profitability/scale claims.
    - Validate customer quality with top-customer schedule, cohort retention, concentration, pipeline/backlog, and reference calls.
    - Perform legal, regulatory, IP, insurance, supplier, and material-contract review with counsel and company records.
    - Benchmark competitive position using third-party market data, competitor pricing, customer win/loss, and margin/cost analysis.
