executive_summary:
  overall_assessment: GVE appears to be an active private Japanese fintech/digital-currency infrastructure company with
    strong public valuation headlines and technical-security claims. The investability question remains unresolved
    because customer deployments, recurring revenue, unit economics, cap table, commercial contracts, security
    validation and regulatory path are not publicly verifiable.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A positive thesis requires proving that GVE can
    convert digital-currency technology and patent claims into regulated production deployments with durable revenue,
    defensible security, credible governance and financing terms that support the reported valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources report 2020 financing and a 2025 decacorn valuation calculation.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company and Startup DB sources describe the CBDC/instant-settlement platform.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Startup DB identifies founders and leadership roles.
      evidence_claim_ids:
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality is not publicly verifiable
    - risk_id: R-002
      summary: Headline valuation may be stale or hard to reconcile
    - risk_id: R-003
      summary: Customer concentration, retention and revenue conversion are opaque
    - risk_id: R-004
      summary: CBDC and digital-currency adoption depends on government and financial-infrastructure decisions
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue by product and geography, gross margin, cash, debt and forecast model.
    - Current cap table, liquidation preferences, option pool, warrants, debt instruments and valuation support.
    - Top-customer revenue, contract terms, renewal status, churn, NRR/cohort metrics and receivables concentration.
    - Sales pipeline, CAC, payback, quota attainment, channel economics and budget-to-actuals.
    - Technical architecture review, security reports, incident history, IP assignments and product roadmap.
    - Legal docket search, regulatory correspondence, material contracts, insurance, employment agreements and HRIS
      export.
  recommended_next_steps:
    - Run confirmatory financial and cap-table diligence before relying on headline unicorn valuation.
    - Request customer cohorts, top-account contracts and independent customer references.
    - Have counsel and specialists review regulatory, privacy, IP, security and material-contract records.
    - Benchmark pricing, win/loss, retention and product quality against direct competitors.
