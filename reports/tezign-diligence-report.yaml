executive_summary:
  overall_assessment: Tezign appears to be an active Shanghai-based private unicorn based on CB Insights, public Chinese funding coverage, official product pages, investor portfolio evidence and public founder profiles. Public evidence supports the existence of enterprise AI/content/DAM positioning, large-logo marketing claims and substantial company-stated technology/IP metrics, but investment-grade diligence remains open because financials, cap table, customer concentration, security/legal artifacts, HR data and official IP/regulatory extracts are not public.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A defensible thesis requires proving that Tezign converts its public enterprise AI/DAM/customer-logo position into durable high-quality ARR, retained enterprise customers, scalable software margins, defensible data/IP, compliant AI/privacy operations and attractive common-equity economics after financing preferences.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Tezign as a $1.0B Shanghai enterprise-tech unicorn that joined on 2021-11-02.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Official pages describe Tezign as a 2015-founded Shanghai enterprise AI company with DAM-plus-GEA product architecture.
      evidence_claim_ids:
        - EC-002
        - EC-005
        - EC-006
    - founder_claim_id: FC-006
      summary: Public profiles identify Ling Fan as founder/CEO and corroborate Tezign’s generative-AI unicorn positioning.
      evidence_claim_ids:
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, ARR, cash/debt and unit economics are not public.
    - risk_id: R-002
      summary: Headline unicorn valuation and investor names do not reveal current cap-table economics or preference stack.
    - risk_id: R-003
      summary: Customer logos and 200+ customer claims do not verify active ARR, concentration, churn or references.
    - risk_id: R-005
      summary: Company-stated patents, copyrights, filings and data/usage metrics require independent registry and system-log validation.
    - risk_id: R-006
      summary: Security, privacy and AI compliance claims require SOC/ISO/DPA/MLPS/PIPL artifacts.
  key_evidence_gaps:
    - Audited financial statements, ARR/bookings, gross margin, cash/debt, backlog, AR aging and budget-to-actuals.
    - Current fully diluted cap table, option pool, investor preferences, debt, side letters and financing documents.
    - Top-customer ARR, active contract status, concentration, churn, NRR/GRR, renewals and customer references.
    - Product roadmap, module-level adoption/revenue, price book, reliability, incident history and security/compliance artifacts.
    - IP registry extracts, assignments, algorithm/model filings, OSS/license review and data/model provenance.
    - HRIS, org chart, compensation, equity incentives, attrition and employee-relations schedule.
    - Legal/regulatory/counsel schedule, material contracts, insurance and privacy/data-protection documentation.
  recommended_next_steps:
    - Run finance and cap-table diligence before relying on the $1.0B public valuation.
    - Validate customer quality through top-account contracts, cohort metrics and independent references.
    - Perform technical/security diligence on GEA architecture, model/data governance, IP ownership and compliance artifacts.
    - Benchmark Tezign against DAM/content operations and AI-agent competitors using win/loss, pricing and customer ROI evidence.
    - Have PRC, privacy, IP and commercial counsel review corporate structure, filings, litigation, material contracts and regulatory exposure.
