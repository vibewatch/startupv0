report_metadata:
  report_title: Tezign Startup Diligence Report
  target_company: Tezign
  website: https://www.tezign.com/
  known_aliases:
    - Tezign
    - 特赞
    - 特赞科技
    - 特赞（上海）信息科技有限公司
  sector: Enterprise Tech / enterprise AI agents, DAM, content operations and creative technology
  geography: China / Shanghai with public support points in Guangzhou, Singapore, Hong Kong and Taipei
  company_stage: Private unicorn / growth-stage enterprise AI and content technology company
  research_date: 2026-05-18
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Started from the user-provided CB Insights unicorn target row and independently fetched the public CB Insights page through a public reader.
    - Prioritized company-owned sources, Chinese funding/news sources, investor portfolio pages, university/fellowship profiles, and public competitor/category pages.
    - Treated company-published customer, technology, security, IP and recognition claims as verified only for the existence of the public statement unless independently corroborated.
    - No private data room, management interview, customer reference, official registry extract, court docket artifact or security report was available.
  included_jurisdictions:
    - China
    - Shanghai
    - Hong Kong
    - Singapore
    - Taiwan / Taipei public support signal
    - Global enterprise customer markets referenced by public company materials
  excluded_topics:
    - Private financial statements, cap table, customer contracts, board materials, HRIS, official registry extracts, legal docket searches, SOC/security reports, DPAs and regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Selected target row from CB Insights public unicorn page
      type: workflow_request
      date_received: 2026-05-18
      notes: Company=Tezign; slug=tezign; valuation=$1.0B; date joined=11/2/2021; country=China; city=Shanghai; industry=Enterprise Tech; investors=Sequoia Capital China, Linear Venture, Hearst Ventures; source=CB Insights Complete List Of Unicorn Companies March 2026 public page.
