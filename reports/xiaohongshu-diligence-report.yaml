report_metadata:
  report_title: Xiaohongshu Public-Source Startup Diligence Report
  target_company: Xiaohongshu
  website: https://www.xiaohongshu.com/en
  known_aliases:
    - RedNote
    - rednote
    - RED
    - Little Red Book
    - XHS
    - Xingyin Information Technology (Shanghai) Co., Ltd.
  sector: Social commerce, lifestyle content, advertising, and e-commerce discovery
  geography: China headquartered with international app-store distribution and 2025 U.S. user influx
  company_stage: Late-stage private unicorn
  research_date: 2026-06-07
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing report filenames and selected Xiaohongshu from an uncovered public unicorn list.
    - Prioritized official Xiaohongshu English page, app-store listings, and compiled public sources with citations to Reuters/Financial Times where direct pages were inaccessible.
    - Treated app-store reviews and Wikipedia-compiled statistics as directional evidence, not audited company metrics.
    - No private financials, advertiser/customer schedules, cap table, legal files, or management interviews were available.
  included_jurisdictions:
    - China
    - United States
    - Apple App Store / Google Play distribution jurisdictions
    - European Union / United Kingdom for privacy-screen considerations
  excluded_topics:
    - No paid database, Chinese court-registry, CAC-regulator, SAIC/AMR filing, or private data-room searches were performed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt requesting random unicorn diligence reports
      type: prompt_argument
      date_received: 2026-06-07
      notes: No founder deck or internal materials were supplied.
