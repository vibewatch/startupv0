    risk_category: operational
    severity: high
    likelihood: medium
    description: REWE, Carrefour/Cajoo, Just Eat and large-merchant dependencies may materially affect margins and control.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.B
      - III.E
      - V.C
      - VIII.F
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Review top supplier/distribution contracts, exclusivity, rebates, SLAs, data rights and termination provisions.
