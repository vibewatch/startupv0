executive_summary:
  overall_assessment: Flink is publicly verifiable as an operating Germany-based quick-commerce unicorn, but investment-grade diligence depends on private financials, cap table/debt terms, customer cohorts, supplier contracts and EU regulatory/labor review.
  investment_or_diligence_thesis: Upside is survivor consolidation in rapid grocery with app reach, dense hubs and strategic suppliers; downside is a capital-intensive low-margin model with valuation compression, partner dependency and unresolved France/labor/privacy risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Flink at $1.07B in Germany/Berlin, Consumer & Retail.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Google Play, Apple and LinkedIn verify active consumer grocery-delivery apps and positioning.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-004
    - founder_claim_id: FC-004
      summary: Public reporting supports 2020 launch/founding by Oliver Merkel, Julian Dames and Christoph Cordes.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials and unit economics are not public
    - risk_id: R-002
      summary: Public valuation and financing terms are inconsistent or incomplete
    - risk_id: R-003
      summary: Quick-commerce margin/demand pressure remains high
    - risk_id: R-005
      summary: Supplier and partner dependency may drive economics
    - risk_id: R-008
      summary: Privacy/payment/location data exposure requires GDPR diligence
  key_evidence_gaps:
    - Audited financial statements and monthly management accounts
    - Current cap table, debt/preferred terms and option pool
    - Customer cohorts, retention, order frequency and CAC/LTV
    - Top supplier, partner, lease and payment-processor contracts
    - GDPR/privacy package, litigation, insurance and HR/labor schedules
  recommended_next_steps:
    - Open finance/cap-table data room before valuation reliance.
    - Run customer-cohort and city-level unit-economics diligence.
    - Review REWE/Carrefour/Just Eat and payment-provider contracts.
    - Confirm France footprint/exit liabilities and hub lease obligations.
    - Complete counsel-led GDPR, labor, IP, litigation and insurance review.
