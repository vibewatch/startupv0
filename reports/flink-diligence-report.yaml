report_metadata:
  report_title: Flink Startup Diligence Report
  target_company: Flink
  website: https://www.goflink.com/en/
  known_aliases:
    - Flink SE
    - Flink Lebensmittel GmbH
    - goflink.com
    - Flink Germany
    - Flink Nederland
    - Cajoo (acquired/historical France operation)
  sector: Consumer & Retail / quick commerce grocery delivery
  geography: Germany (Berlin HQ) with public Germany and Netherlands focus; France footprint requires confirmation
  company_stage: Private venture-backed unicorn / growth-stage quick-commerce company
  research_date: 2026-05-27
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; EUR for Euro-denominated financing reports
  time_zone: Europe/Berlin
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used public evidence only: CB Insights, app stores, LinkedIn, independent funding/market news and accessible public registry/search pages."
    - Treated company/app-store claims and news-reported metrics as public signals requiring private verification before investment reliance.
    - Did not bypass paywalls, private systems or blocked company pages; goflink.com direct fetch returned 403 and is disclosed as a limitation.
    - Marked financials, cap table, debt, contracts, customer cohorts, legal dockets, insurance, HRIS and IP schedules as not_publicly_verifiable where public evidence was absent.
  included_jurisdictions:
    - Germany
    - Netherlands
    - France
    - European Union
  excluded_topics:
    - Private data-room contents
    - Paid databases
    - Non-public legal dockets
    - Private customer references
    - Privileged counsel materials
  user_provided_materials:
    - material_id: UPM-001
      title: Candidate unicorn row for Flink
      type: user_provided_public_list_extract
      date_received: 2026-05-27
      notes: User specified slug=flink, company=Flink, valuation=$1.07B, country=Germany, sector=Consumer & Retail, unicorn-status source=CB Insights Global Unicorn Club.
