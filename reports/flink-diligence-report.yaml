      - V
      - VIII
    impacted_section_ids:
      - I.A
      - III.D
      - V.A
      - VIII.F
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Confirm current France footprint and all exit, lease, employee and partner liabilities.
