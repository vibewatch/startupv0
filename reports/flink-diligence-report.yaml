risk_register:
  - risk_id: R-001
    risk_title: Audited financials and unit economics are not public
    risk_category: financial
    severity: critical
    likelihood: high
    description: Public sources do not provide audited financials, cash, burn, gross margin, contribution margin or revenue-recognition support.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Require audited/management accounts, revenue bridge, market P&Ls, gross margin and cash runway.
  - risk_id: R-002
    risk_title: Public valuation and financing terms are inconsistent or incomplete
    risk_category: financing
    severity: high
    likelihood: high
    description: Public valuation marks range from $1.07B to over $5B and 2024 debt/equity terms are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Obtain cap table, debt documents, liquidation preferences, option pool and latest valuation materials.
  - risk_id: R-003
    risk_title: Quick-commerce margin/demand pressure remains high
    risk_category: market
    severity: high
    likelihood: high
    description: Sector reporting cites higher costs, lower demand, low margins, high acquisition costs and competitor exits.
    impacted_chapter_ids:
      - I
      - IV
      - V
    impacted_section_ids:
      - I.B
      - IV.A
      - V.E
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Validate density, AOV, labor, rent, fees, promo spend and sensitivity cases by city.
  - risk_id: R-004
    risk_title: Customer cohorts and revenue concentration are not public
    risk_category: customer
    severity: medium
    likelihood: high
    description: App-store metrics do not disclose active users, retention, order frequency, churn or revenue concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Request cohort data, DAU/MAU, orders/customer, NPS, CAC/LTV and promo dependency.
