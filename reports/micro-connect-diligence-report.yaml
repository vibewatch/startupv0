diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and monthly management accounts.
    why_it_matters: Needed to assess revenue quality, profitability, cash conversion and runway.
    suggested_source_or_request: "Finance data room: audits, management accounts, bank confirmations and KPI pack."
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, debt instruments, preferences and MIFC structure.
    why_it_matters: Determines economics, control, dilution and private-company eligibility.
    suggested_source_or_request: Cap table, financing docs, debt schedules, org chart and counsel memo.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product economics, fee schedule, liquidity, security and default/loss cohorts.
    why_it_matters: Validates whether DRO/DRP products can generate durable, compliant revenue.
    suggested_source_or_request: Product P&L, fee schedule, trading stats, cohort performance and security reports.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, top merchants/investors and concentration.
    why_it_matters: Public aggregate counts cannot reveal concentration, churn or reference risk.
    suggested_source_or_request: Top customer/merchant/investor schedule and reference-call list.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing and market-share benchmark versus SME/RBF competitors.
    why_it_matters: Competition could compress take rates and increase CAC.
    suggested_source_or_request: Competitive analysis, pricing benchmark and pipeline loss reasons.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC/payback, quota attainment and channel economics.
    why_it_matters: Determines scalability of partnership/direct distribution.
    suggested_source_or_request: CRM export, sales comp plans, quota/ramp data and marketing spend by channel.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.A
    missing_information: System architecture, cybersecurity, data lineage and integration controls.
    why_it_matters: Daily revenue data and critical infrastructure require robust controls.
    suggested_source_or_request: Architecture pack, SOC/pen-test reports, incident logs and vendor contracts.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS headcount, compensation, equity plans and turnover.
    why_it_matters: Assesses execution capacity, retention and dilution.
    suggested_source_or_request: HRIS export, option ledger, compensation plans and turnover analysis.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Counsel-led litigation and investigation clearance.
    why_it_matters: Public search was not exhaustive and financial/regulatory platforms can face claims.
    suggested_source_or_request: Counsel certificate, docket searches and claims schedule.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP registrations, assignments, licenses and freedom-to-operate.
    why_it_matters: Public brand/product use does not prove ownership or defensibility.
    suggested_source_or_request: IP schedule and registry searches in HK, Macao, Mainland China, WIPO and relevant markets.
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.G
    missing_information: MCEX license conditions, AMCM correspondence and cybersecurity obligations.
    why_it_matters: Regulatory obligations can constrain growth, product design and investor access.
