report_metadata:
  report_title: Micro Connect Startup Diligence Report
  target_company: Micro Connect
  website: https://microconnect.com/
  known_aliases:
    - Micro Connect Group
    - Micro Connect Investments Limited
    - Micro Connect (H.K) Investments Limited
    - Micro Connect (Macao) Financial Assets Exchange
    - MCEX
    - 滴灌通
  sector: Financial Services / fintech / revenue-based financing market infrastructure
  geography: Hong Kong, Macao, Mainland China, and global professional-investor channels
  company_stage: Private unicorn / growth-stage private company
  research_date: 2026-06-01
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; RMB/MOP where source uses local currency
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility using CB Insights unicorn-list/profile evidence, company sources, independent news mirrors, MCEX website, Macao Official Gazette and HKEX context.
    - Collected company-owned pages for product, funding, partnerships, founders, MAP, position paper, MCEX and media releases; treated them as public statements, not audited proof.
    - Checked public competitive references for RBF, e-commerce finance and SME digital financing; did not bypass paywalls or private systems.
    - Marked private financials, cap table, customer concentration, legal dockets, contracts, HR and insurance as not_publicly_verifiable when public sources did not disclose them.
  included_jurisdictions:
    - Hong Kong
    - Macao
    - Mainland China
    - Global professional/institutional investor markets
  excluded_topics:
    - Private data room materials
    - Non-public customer references
    - Non-public regulatory correspondence
    - Personal phone/home/email data
    - Paywalled or access-controlled databases not publicly readable
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided CB Insights Micro Connect unicorn row and task instructions
      type: workflow_request
      date_received: 2026-06-01
      notes: Company Micro Connect; slug micro-connect; valuation $1.70B; date joined 2023-08-02; city Hong Kong; industry Financial Services; investors HongShan, Horizons Ventures, Lenovo Capital and Incubator Group; source URL provided.
founder_claims:
