  - figure_id: F-012
    title: Risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Risk register plotted by severity and likelihood.
    purpose: Focus follow-up on high-severity open items.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and runway not public
          severity: high
          likelihood: medium
          rationale: Audited financials, revenue, gross margin, cash runway, AR aging and forecasts are absent from public sources.
          evidence_claim_ids: &a1
            - EC-005
            - EC-015
            - EC-016
          source_ids:
            - SRC-001
            - SRC-006
            - SRC-007
            - SRC-008
            - SRC-009
        - risk_id: R-002
          label: Novel DRO/DRC asset performance risk
          severity: high
          likelihood: medium
          rationale: Returns depend on small-business revenue shares, daily collection, contract enforceability and portfolio default/loss performance that are not public.
          evidence_claim_ids: &a2
            - EC-003
            - EC-006
            - EC-024
          source_ids:
            - SRC-003
            - SRC-005
            - SRC-006
            - SRC-007
            - SRC-010
        - risk_id: R-003
          label: Regulatory and cross-border distribution exposure
          severity: high
          likelihood: medium
          rationale: MCEX is AMCM-regulated, critical-infrastructure-related, professional/institutional-investor limited and jurisdiction-restricted.
          evidence_claim_ids: &a3
            - EC-007
            - EC-008
            - EC-020
            - EC-021
          source_ids:
            - SRC-010
            - SRC-011
            - SRC-012
            - SRC-013
            - SRC-017
        - risk_id: R-004
          label: Listing-structure and eligibility complexity
          severity: medium
          likelihood: medium
          rationale: MIFC submitted a HKEX application while Micro Connect says it is not a Micro Connect Group listing, creating structural and investor-communication complexity.
          evidence_claim_ids: &a4
            - EC-017
          source_ids:
            - SRC-019
            - SRC-025
            - SRC-001
        - risk_id: R-005
          label: Customer/merchant concentration and churn opaque
          severity: high
          likelihood: unknown
          rationale: Public aggregate counts do not disclose top merchants, brands, investors, revenue concentration, churn, severed relationships or reference quality.
          evidence_claim_ids: &a5
            - EC-006
            - EC-010
            - EC-014
          source_ids:
            - SRC-006
            - SRC-008
            - SRC-014
            - SRC-015
            - SRC-011
        - risk_id: R-006
          label: Crowded SME financing and RBF alternatives
          severity: medium
          likelihood: high
          rationale: Adjacent providers market revenue, e-commerce, invoice, trade and SME financing; price, speed, distribution and data access can pressure Micro Connect.
          evidence_claim_ids: &a6
            - EC-011
            - EC-020
            - EC-021
          source_ids:
            - SRC-021
            - SRC-022
            - SRC-023
            - SRC-024
            - SRC-017
        - risk_id: R-007
          label: Technology, security and data integrity dependency
          severity: high
          likelihood: medium
          rationale: Daily revenue collection, market infrastructure, data disclosure and critical-infrastructure designation heighten cyber, uptime and reconciliation risk.
          evidence_claim_ids: &a7
            - EC-007
            - EC-013
            - EC-024
          source_ids:
            - SRC-010
            - SRC-011
            - SRC-012
            - SRC-013
            - SRC-006
        - risk_id: R-008
          label: Key-person and personnel risk
          severity: medium
          likelihood: medium
          rationale: Public narrative relies heavily on Charles Li and Gary Zhang; detailed org depth, retention and compensation are private.
          evidence_claim_ids: &a8
            - EC-004
            - EC-012
            - EC-023
          source_ids:
