          - Sales may depend on a small number of institutional channels or ecosystem partners.
        evidence_gaps:
          - Channel pipeline, CAC, sales cycle, win rates, channel revenue and marketing budget.
        follow_up_questions:
          - Provide GTM plan, CRM pipeline, marketing budget, channel mix and partner-led revenue analysis.
        table_ids:
          - T-011
        figure_ids:
          - F-007
        evidence_claim_ids:
          - EC-008
          - EC-010
          - EC-021
      - section_id: V.B
        title: Major Customers
        checklist_question_ids:
          - V.B.1
          - V.B.2
          - V.B.3
        summary: Major customer relationship status, trends and pipeline are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: V.B-F1
            finding: Aggregate merchant and partner signals do not reveal major-account trends or pipeline.
            evidence_claim_ids:
              - EC-014
              - EC-021
            risk_ids:
              - R-005
              - R-006
        hidden_risks:
          - Pipeline quality and repeatability may be weaker than aggregate public metrics imply.
        evidence_gaps:
          - Major customer pipeline, renewal status, reference calls and growth plans.
        follow_up_questions:
          - Provide status/trends of major customer relationships, future growth prospects and pipeline analysis.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-014
          - EC-021
