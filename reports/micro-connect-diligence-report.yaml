    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance coverage and claims history.
    why_it_matters: Cyber, E&O, D&O, crime/fraud and financial-market infrastructure exposure may be material.
    suggested_source_or_request: Insurance policies, claims run and broker coverage assessment.
    priority: medium
