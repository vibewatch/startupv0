risk_register:
  - risk_id: R-001
    risk_title: Financial quality and runway not public
    risk_category: financial
    severity: high
    likelihood: medium
    description: Audited financials, revenue, gross margin, cash runway, AR aging and forecasts are absent from public sources.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited statements, management accounts, cash/debt schedules, KPI pack, forecast model and bank confirmations.
  - risk_id: R-002
    risk_title: Novel DRO/DRC asset performance risk
    risk_category: financial
    severity: high
    likelihood: medium
    description: Returns depend on small-business revenue shares, daily collection, contract enforceability and portfolio default/loss performance that are not public.
    impacted_chapter_ids:
      - I
      - II
      - III
    impacted_section_ids:
      - I.A
      - II.A
      - III.C
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request cohort-level deployed capital, revenue shares, repayments, defaults, restructurings, write-offs and reconciliation controls.
  - risk_id: R-003
    risk_title: Regulatory and cross-border distribution exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: MCEX is AMCM-regulated, critical-infrastructure-related, professional/institutional-investor limited and jurisdiction-restricted.
    impacted_chapter_ids:
      - V
      - VIII
    impacted_section_ids:
      - V.A
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Obtain license conditions, compliance manual, regulatory correspondence, member onboarding files and cross-border legal memos.
  - risk_id: R-004
    risk_title: Listing-structure and eligibility complexity
    risk_category: financing
    severity: medium
    likelihood: medium
    description: MIFC submitted a HKEX application while Micro Connect says it is not a Micro Connect Group listing, creating structural and investor-communication complexity.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - VIII.F
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Verify current legal structure, application status, related-party arrangements and whether any transaction changes private-company eligibility.
  - risk_id: R-005
    risk_title: Customer/merchant concentration and churn opaque
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public aggregate counts do not disclose top merchants, brands, investors, revenue concentration, churn, severed relationships or reference quality.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
      - III.D
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request top 15 merchants/brands/investors, concentration by revenue and deployed capital, churn, severed relationships and reference calls.
  - risk_id: R-006
    risk_title: Crowded SME financing and RBF alternatives
    risk_category: market
    severity: medium
    likelihood: high
    description: Adjacent providers market revenue, e-commerce, invoice, trade and SME financing; price, speed, distribution and data access can pressure Micro Connect.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Benchmark take rates, pricing, approval speed, merchant acquisition cost and win/loss against Choco Up, FundPark, Qupital and Funding Societies.
  - risk_id: R-007
    risk_title: Technology, security and data integrity dependency
    risk_category: technical
    severity: high
    likelihood: medium
    description: Daily revenue collection, market infrastructure, data disclosure and critical-infrastructure designation heighten cyber, uptime and reconciliation risk.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request architecture diagrams, SOC/penetration tests, incident logs, reconciliation reports, DR/BCP, third-party integration contracts and cybersecurity correspondence.
  - risk_id: R-008
    risk_title: Key-person and personnel risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public narrative relies heavily on Charles Li and Gary Zhang; detailed org depth, retention and compensation are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request org chart, succession plan, employment agreements, equity plans, turnover data and reference checks.
  - risk_id: R-009
    risk_title: Legal, IP and brand-fraud exposure
    risk_category: legal
    severity: medium
    likelihood: high
    description: MCEX warned about unauthorized third-party websites/false information; IP registry ownership and litigation clearance remain unverified.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.G
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Run counsel-led litigation/IP searches, review takedown/enforcement history, insurance and customer/investor complaints.
  - risk_id: R-010
    risk_title: Accounting and instrument-classification risk
    risk_category: financial
    severity: high
    likelihood: medium
    description: DRC/DRO/DRP accounting treatment is novel enough that Micro Connect released a position paper; investor/issuer accounting, tax and consolidation treatment could affect adoption.
    impacted_chapter_ids:
      - I
      - II
      - VIII
    impacted_section_ids:
      - I.D
      - II.A
      - VIII.F
    evidence_claim_ids: *a10
