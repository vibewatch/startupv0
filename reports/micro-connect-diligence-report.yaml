    claim_text: Micro Connect is an eligible private unicorn with a $1.70B CB Insights valuation and Hong Kong Financial Services classification.
    claim_source: User-provided CB Insights row and public CB/Forbes evidence
    claim_date: 2023-08-02
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-017
    contradiction_summary: null
    diligence_follow_up:
      - Request current capitalization table, financing documents, valuation support and written confirmation of private-company status.
  - founder_claim_id: FC-002
    claim_text: Micro Connect operates a revenue-sharing financing/exchange model for micro and small businesses.
    claim_source: Company public materials
    claim_date: null
    mapped_chapter_ids:
      - II
      - VIII
    mapped_section_ids:
      - II.A
      - VIII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-003
      - EC-007
      - EC-009
      - EC-024
    contradiction_summary: null
    diligence_follow_up:
      - Validate product mechanics, investor protections, merchant contracts and regulatory permissions with counsel and management.
  - founder_claim_id: FC-003
    claim_text: Micro Connect has public operating/deployment scale signals.
    claim_source: Company and news public materials
    claim_date: null
    mapped_chapter_ids:
      - I
      - III
    mapped_section_ids:
      - I.A
      - III.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-006
      - EC-015
    contradiction_summary: Public deployment metrics do not prove revenue, gross margin, default rates, retention or cash flow.
    diligence_follow_up:
      - Request audited financials, cohort performance, repayments, losses, concentration, retention and reconciliations.
  - founder_claim_id: FC-004
    claim_text: Micro Connect has public customer, partner and monetization channels via MCEX, funds/structured products and ecosystem partners.
    claim_source: Company public materials
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.B
      - V.A
      - V.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-010
      - EC-020
      - EC-021
    contradiction_summary: Commercial terms, revenue contribution and pipeline conversion are not public.
    diligence_follow_up:
      - Request partner contracts, channel economics, CRM pipeline, member onboarding statistics and revenue by channel.
  - founder_claim_id: FC-005
    claim_text: Micro Connect has public team and product-development signals consistent with ongoing operations.
    claim_source: Company/LinkedIn public materials
    claim_date: null
    mapped_chapter_ids:
      - VI
      - VII
    mapped_section_ids:
      - VI.A
      - VII.B
      - VII.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-012
      - EC-013
    contradiction_summary: null
    diligence_follow_up:
      - Request org chart, HRIS export, R&D roadmap, system architecture, security reports and retention/turnover data.
  - founder_claim_id: FC-006
    claim_text: Public listing activity does not show Micro Connect Group itself has completed an IPO.
    claim_source: Founder blog and public profile checks
    claim_date: 2025-06-19
    mapped_chapter_ids:
      - I
      - VIII
    mapped_section_ids:
      - I.C
      - VIII.F
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-017
    contradiction_summary: MIFC filed a HKEX application, but the company states this is not a listing of Micro Connect Group.
    diligence_follow_up:
      - Have counsel confirm current holding-company, MIFC and HKEX application status before relying on private-company eligibility.
executive_summary:
  overall_assessment: "Micro Connect remains eligible for public-source private-unicorn diligence: public evidence supports active operations, a 2023 $1.70B valuation, Hong Kong Financial Services classification, and no completed Micro Connect Group IPO; the 2025 HKEX item is described by the company as an MIFC application, not a Micro Connect Group listing."
  investment_or_diligence_thesis: Proceed only with primary diligence that proves financial quality, DRO/DRP repayment performance, regulatory compliance, data integrity and customer/partner concentration; the public story is compelling but most underwriting variables are not public.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights/Forbes support Micro Connect’s $1.70B unicorn valuation and Hong Kong Financial Services classification.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company and MCEX sources consistently describe revenue-sharing products, ARM, DRO/DRP and MCEX exchange infrastructure.
      evidence_claim_ids:
        - EC-003
        - EC-007
    - founder_claim_id: FC-006
      summary: The company publicly states the June 2025 HKEX application is for MIFC and not Micro Connect Group.
      evidence_claim_ids:
        - EC-017
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, cash runway, revenue, margin and cap table are not public.
    - risk_id: R-003
      summary: Regulatory/cross-border and critical-infrastructure obligations are material for MCEX.
    - risk_id: R-002
      summary: DRO/DRC performance, data integrity, defaults and repayment quality require cohort proof.
  key_evidence_gaps:
    - Audited financials, management accounts, cash/debt/runway and forecast model.
    - Current cap table, financing documents, preferences, debt terms and MIFC-related structure.
    - Cohort repayment/default/loss performance and top customer/merchant/investor concentration.
    - MCEX license conditions, compliance correspondence, cybersecurity and data/integration controls.
    - Material contracts, insurance, litigation/IP clearance, HRIS and compensation/equity plans.
  recommended_next_steps:
    - Do not rely on the headline $1.70B valuation without cap-table, financing and financial-quality diligence.
    - Run counsel-led regulatory, litigation, IP, insurance, material-contract and MIFC/listing-structure review.
    - Require cohort-level deployed capital, repayments, defaults, losses, churn, concentration and reference calls.
    - Benchmark pricing, liquidity, CAC and competitive win/loss against SME/RBF finance alternatives.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Micro Connect has strong public funding and valuation evidence, but investment-grade revenue, margin, cash, cap-table, debt and forecast diligence remains private.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-005
      - EC-015
      - EC-016
      - EC-017
    risk_ids:
      - R-001
      - R-002
      - R-004
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public materials disclose funding and deployment metrics, not audited financial statements, backlog, AR aging or management financials.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Audited financial statements, ARR/revenue, gross margin, cash runway, backlog and AR aging are not public.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Deployment metrics are public but do not prove profitability, repayment quality or cash conversion.
            evidence_claim_ids:
              - EC-006
              - EC-024
            risk_ids:
              - R-002
        hidden_risks:
          - Funding headlines may mask cash burn, credit losses, non-performing DROs or off-balance-sheet exposure.
        evidence_gaps:
          - Audited financial statements, management accounts, KPI pack, bank statements, AR aging, backlog and cohort loss/repayment schedules.
        follow_up_questions:
          - Provide three-year audited financial statements, monthly management accounts, cash/debt schedule, ARR/revenue bridge and cohort performance reconciliations.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-015
          - EC-024
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources discuss growth ambitions and deployment scale but do not disclose forecast model, assumptions, capital expenditures or external financing assumptions.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: Growth projections and predictability cannot be assessed from public sources.
            evidence_claim_ids:
              - EC-015
              - EC-006
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Forecasts may depend on new investor channels, regulatory approvals, merchant acquisition and repayment performance.
        evidence_gaps:
          - Three-year forecast model, driver assumptions, scenario analysis, capital expenditure plan and financing assumptions.
        follow_up_questions:
          - Provide quarterly forecast model by product/channel/geography with sensitivity to default, merchant churn, take rate, foreign exchange and regulatory delays.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-015
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Named investors and financing rounds are public; ownership percentages, preferences, debt terms and MIFC-related structure are not.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: CB/Forbes support the $1.7B unicorn valuation, but current cap-table economics are private.
            evidence_claim_ids:
              - EC-001
              - EC-016
            risk_ids:
              - R-001
              - R-010
          - finding_id: I.C-F2
            finding: The 2025 HKEX application is publicly described as MIFC, not Micro Connect Group.
            evidence_claim_ids:
              - EC-017
            risk_ids:
              - R-004
        hidden_risks:
          - Debt/credit, preferences, related-party arrangements or post-2025 listing activity could materially affect eligibility and economics.
        evidence_gaps:
          - Current cap table, debt schedule, option/warrant/SAFE/note schedules, preferences and MIFC transaction documents.
        follow_up_questions:
          - Provide current capitalization table, financing documents, debt instruments and legal structure chart including MIFC and any affiliated investment manager.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-016
          - EC-017
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history is reasonably developed; tax positions, revenue-recognition policy and accounting treatment need private/auditor confirmation.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Public sources support Series B, Series C, CB total-raised and line-credit anchors.
            evidence_claim_ids:
              - EC-002
              - EC-005
            risk_ids:
              - R-001
          - finding_id: I.D-F2
            finding: DRC/DRO/DRP accounting complexity is visible in the public position paper.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-010
        hidden_risks:
          - Novel product accounting, tax treatment and consolidation could affect reported revenue, assets and liabilities.
        evidence_gaps:
          - Tax records, revenue-recognition policy, auditor memos and financing history with ownership percentages.
        follow_up_questions:
          - Provide auditor position papers, tax memos and financing history including instrument terms and current basis.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-005
          - EC-009
  - chapter_id: II
    title: Products
    chapter_summary: Micro Connect publicly markets a novel revenue-sharing product suite and exchange infrastructure; economic performance, security and detailed fee data are not public.
    founder_claim_ids:
      - FC-002
      - FC-004
    evidence_claim_ids:
      - EC-003
      - EC-007
      - EC-009
      - EC-013
      - EC-024
    risk_ids:
      - R-002
      - R-007
      - R-010
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public evidence supports DRC/DRO/DRP, MCEX, MAP and Micro Star product existence, but growth, share, cost structure and profitability require private data.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Company sources consistently describe DRC/DRO/DRP, ARM and MCEX mechanics.
            evidence_claim_ids:
              - EC-003
              - EC-024
            risk_ids:
              - R-002
              - R-007
          - finding_id: II.A-F2
            finding: MAP and accounting-treatment materials show standard-setting but also highlight product complexity.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-010
          - finding_id: II.A-F3
            finding: R&D/technology claims are public at product level but not technically audited.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-007
        hidden_risks:
          - Technical defensibility, data accuracy, fee economics, secondary liquidity and product liability are not proven publicly.
        evidence_gaps:
          - Product usage by SKU, take rate, default/loss rates, security reports, architecture, fee schedules and roadmap.
        follow_up_questions:
          - Provide product P&L by SKU, rulebooks, sample contracts, security audit, roadmap, incident logs and fee/volume history.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
          - F-004
        evidence_claim_ids:
          - EC-003
          - EC-007
          - EC-009
          - EC-013
          - EC-024
  - chapter_id: III
    title: Customer Information
    chapter_summary: Aggregate merchant/store deployment and partnership evidence is public, but top customer concentration, revenue by customer, churn and severed relationships are private.
    founder_claim_ids:
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-006
      - EC-010
      - EC-014
      - EC-024
    risk_ids:
      - R-002
      - R-005
      - R-007
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public sources disclose aggregate store/business counts across retail, F&B, services and culture/sports, not top 15 customers or application-level revenue.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.A-F1
            finding: Aggregate merchant scale increased from >100 businesses in 2022 to >12,000 by 2024 in public company-reported anchors.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-005
        hidden_risks:
          - A large aggregate merchant base could still hide concentration by brand, chain, geography, sector or cohort vintage.
        evidence_gaps:
          - Top 15 customers/merchants/brands by deployed capital, revenue share, repayment performance and application.
        follow_up_questions:
          - Provide top-15 customer/merchant schedule for the last two fiscal years and YTD, including product ownership, purchase timing and references.
        table_ids:
          - T-006
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-006
          - EC-014
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: BOCM, Choco Up, Amanie and Micro Star participants are public, but economics and exclusivity are not.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Public partnerships support distribution and product ecosystem breadth.
            evidence_claim_ids:
              - EC-010
              - EC-020
            risk_ids:
              - R-005
              - R-006
        hidden_risks:
          - Partnership announcements may not translate into committed volume, revenue or exclusivity.
        evidence_gaps:
          - Partner contracts, revenue contribution, integration status, termination rights and exclusivity.
        follow_up_questions:
          - Provide strategic relationship schedule including revenue, commitments, marketing agreements and termination rights.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-010
          - EC-020
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer or partner is not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Public aggregate deployment metrics do not disclose any customer above 5% of revenue.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-005
        hidden_risks:
          - Undisclosed concentration among issuers, investors, banks or ecosystem partners could drive revenue volatility.
        evidence_gaps:
          - Revenue by customer/investor/merchant and concentration by deployed capital, fee revenue and repayments.
        follow_up_questions:
          - Provide revenue by customer and identify all customers/partners accounting for 5% or more of revenue.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-014
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No severed relationships were publicly verified.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Reviewed public materials list partnerships but not terminated or severed relationships.
            evidence_claim_ids:
              - EC-014
              - EC-023
            risk_ids:
              - R-005
        hidden_risks:
          - Silent partner churn could indicate product, regulatory or repayment issues.
        evidence_gaps:
          - Terminated customer/partner/supplier relationships, reasons and disputes.
        follow_up_questions:
          - Provide schedule of severed or materially reduced customer, partner and supplier relationships for the last two years.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-014
          - EC-023
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public model implies dependencies on payment/data integrations, partners, MCEX infrastructure and regulators; supplier spend is private.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: ARM, partners and MCEX infrastructure are key operational dependencies.
            evidence_claim_ids:
              - EC-024
              - EC-007
            risk_ids:
              - R-007
        hidden_risks:
          - Failure of data/payment integrations or regulatory infrastructure could impair collections and investor reporting.
        evidence_gaps:
          - Top supplier/vendor list, spend, contracts, SLAs, DPAs and business-continuity plans.
        follow_up_questions:
          - Provide top suppliers for the last two fiscal years and YTD, including purchase amounts and supplier agreements.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-023
          - EC-024
  - chapter_id: IV
    title: Competition
    chapter_summary: Micro Connect’s exchange/regulatory positioning is distinctive, but adjacent SME/RBF/e-commerce finance competitors pressure acquisition, pricing and data advantages.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-007
      - EC-011
      - EC-021
      - EC-024
    risk_ids:
      - R-006
      - R-007
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public competitor sources show adjacent RBF, e-commerce and SME finance alternatives; direct win/loss, pricing and market share are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Choco Up, FundPark, Qupital and Funding Societies publicly market adjacent financing products.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-006
          - finding_id: IV.A-F2
            finding: Micro Connect’s Macao exchange license may differentiate it, but compliance cost and actual liquidity need proof.
            evidence_claim_ids:
              - EC-007
              - EC-008
            risk_ids:
              - R-003
              - R-006
        hidden_risks:
          - Competitors can bundle faster/simpler credit, while MCEX faces regulated-market friction.
        evidence_gaps:
          - Market share, win/loss, pricing benchmark, approval speed, merchant acquisition cost and liquidity data.
        follow_up_questions:
          - Provide competitive win/loss, market-share analysis, pricing benchmark and active trading/liquidity statistics.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-006
        evidence_claim_ids:
          - EC-007
          - EC-011
          - EC-021
          - EC-024
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Public GTM appears ecosystem-led through MCEX, partnerships, standards and media; CAC, sales productivity and channel economics are private.
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-008
      - EC-010
      - EC-020
      - EC-021
    risk_ids:
      - R-003
      - R-006
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: Micro Connect publicly positions via MCEX, partnerships, MAP, Micro Star and media; channel weights and conversion are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
