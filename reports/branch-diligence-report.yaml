executive_summary:
  overall_assessment: "Branch is an active public-source insurtech unicorn candidate with verified product, partner-distribution and privacy/licensing signals. The diligence case turns on private insurance economics: statutory capital, loss ratios, reserves, reinsurance, partner-channel concentration and state regulatory history."
  investment_or_diligence_thesis: Proceed only with private insurance diligence. Underwrite Branch as a partner-led personal-lines insurtech whose valuation requires proof of loss-ratio discipline, efficient CAC, durable reinsurance and compliant state expansion.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Branch at $1.05B in Insurance.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Branch publicly markets home, auto and add-on personal insurance.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Partner-led and direct digital GTM are publicly stated.
      evidence_claim_ids:
        - EC-004
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Audited statements, loss ratios, premium growth, acquisition cost, reinsurance economics, reserves and burn are not public.
    - risk_id: R-002
      summary: Branch sells regulated insurance products and its terms state products are limited to states where approved/licensed.
    - risk_id: R-003
      summary: Public site highlights lending and home-service partners; revenue contribution and partner exclusivity are not public.
  key_evidence_gaps:
    - Audited and statutory financials, reserves, loss ratios and reinsurance treaties.
    - Current cap table, preferences, debt and option pool.
    - Partner-channel concentration, unit economics and retention.
    - State licensing, complaint, market-conduct and privacy/credit compliance records.
  recommended_next_steps:
    - Run insurance-focused QoE/statutory-capital review.
    - Have counsel verify licenses, rate/form filings, complaints and regulatory history.
    - Interview partners/customers and review partner contracts.
    - Validate data/credit privacy controls and cyber/claims handling.
