diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly trial balances, ARR/revenue bridge, gross margin, burn and runway.
    why_it_matters: Core quality-of-earnings and liquidity cannot be verified publicly.
    suggested_source_or_request: Company CFO / accountant data room
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, fully diluted shares, option pool, preferences, notes, warrants and debt.
    why_it_matters: Unicorn valuation does not determine common-equity economics.
    suggested_source_or_request: Company counsel and finance
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer concentration, top-account revenue, retention cohorts and renewal calendar.
    why_it_matters: Public logos or partner lists do not prove revenue durability.
    suggested_source_or_request: Company sales ops and customer references
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation, regulatory, IP, insurance and material-contract schedules.
    why_it_matters: Public searches are incomplete for private-company legal exposure.
    suggested_source_or_request: Company counsel
    priority: high
