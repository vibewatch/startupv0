    claim_source: Company terms/privacy disclosures, Google Play data-safety disclosures, Sixth Tone and GizChina
      regulatory coverage
    claim_date: null
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.C
      - VIII.F
      - VIII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-012
      - EC-017
      - EC-018
    contradiction_summary: Company disclosures assert authorization and encryption controls, while public media
      reported regulator/privacy concerns.
    diligence_follow_up:
      - Engage PRC/Singapore/privacy counsel to obtain regulator records, assess consent and data-transfer
        compliance, and review incident-response history.
executive_summary:
  overall_assessment: Public evidence supports LinkSure Network / WiFi Master Key as a historical private
    unicorn with large consumer-scale claims and an active app, but investment reliance should be gated by
    financial, cap-table, privacy/security, regulatory and current-usage diligence.
  investment_or_diligence_thesis: The upside case is a historically massive connectivity utility with network
    effects and global distribution. The diligence case is fragile because current monetization, financial
    quality, cap table, user retention and legal/regulatory posture are opaque, while the core
    credential-sharing model carries high privacy and authorization risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Unicorn eligibility is supported by CB Insights funding evidence, China Money Network’s US$5.2B
        ranking marker, Wikipedia’s LinkSure unicorn row and the company’s 2017 financing/valuation release.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
        - EC-005
    - founder_claim_id: FC-002
      summary: The product model is verified by official WiFi.com pages describing passwordless one-click Wi-Fi
        access through shared hotspots and intermediary access-provider terms.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
    - founder_claim_id: FC-004
      summary: The Android app remains publicly listed under LINKSURE NETWORK HOLDING with 100M+ downloads and a May
        2026 update.
      evidence_claim_ids:
        - EC-011
  biggest_risks:
    - risk_id: R-003
      summary: Wi-Fi credential-sharing authorization and network-security exposure is critical to product legality
        and trust.
    - risk_id: R-001
      summary: Current financial quality, revenue, margins, cash, debt and customer economics are not publicly
        verifiable.
    - risk_id: R-002
      summary: Current cap table, valuation, preference stack and financing terms are unknown despite stale public
        unicorn markers.
  key_evidence_gaps:
    - Audited financials, cash/debt, revenue by product/geography/channel, customer economics, AR aging and
      forecast model.
    - Current cap table, shareholder register, preference stack, investor rights,
      options/warrants/convertibles/debt and valuation bridge.
    - Current MAU/DAU, active installs, retention, country mix, monetization, ad yield and store-console
      analytics.
    - Consent-flow, credential-security, encryption, privacy, deletion, incident-response and
      regulator-remediation evidence.
    - Primary counsel searches for MIIT/CAC/local regulator outcomes, litigation, IP, insurance, material
      contracts and satellite commitments.
  recommended_next_steps:
    - Request a data room before any valuation reliance and reconcile all public valuation markers to primary
      financing documents.
    - Engage PRC/Singapore/privacy counsel to verify regulatory history and current data/network-access
      compliance.
    - Commission a technical audit of credential handling, consent enforcement, encryption, SDK behavior and
      deletion flows.
    - Treat the satellite program as unverified until contracts, licenses, capex and launch evidence are
      produced.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports unicorn eligibility and historical financing, but the financials
      needed to underwrite current value are not public.
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-005
      - EC-022
      - EC-023
    risk_ids:
      - R-001
      - R-002
      - R-005
      - R-007
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No public audited income statements, balance sheets, cash flows, management reporting, backlog or AR
          aging were found; only funding and scale signals are public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public data confirms historical funding and user scale but not revenue, margin, cash, debt, backlog
              or receivables.
            evidence_claim_ids:
              - EC-001
              - EC-004
              - EC-023
            risk_ids:
              - R-001
              - R-007
          - finding_id: I.A-F2
            finding: Company-issued user metrics should not be converted to revenue without app analytics and monetization
              evidence.
            evidence_claim_ids:
              - EC-004
              - EC-023
            risk_ids:
              - R-006
              - R-007
        hidden_risks:
          - Financial statements may reveal materially lower monetization than historical user scale suggests.
          - Potential regulatory or app-store remediation costs may not be visible publicly.
        evidence_gaps:
          - Audited financials for FY2023-FY2025 and current YTD.
          - Revenue, gross margin and contribution margin by product, geography and channel.
          - Backlog, AR aging, deferred revenue, cash, debt and off-balance-sheet obligations.
        follow_up_questions:
          - Provide audited financial statements, monthly management reports, KPI pack, bank statements, debt
            schedule, AR aging and backlog by customer/channel.
        table_ids:
          - T-001
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-004
          - EC-023
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public projections were found; the only material forward-looking item is the 2018 satellite plan,
          which requires current status, capex and financing evidence.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: The reported RMB3B satellite plan would be a major capital-allocation item if active.
            evidence_claim_ids:
              - EC-019
              - EC-025
            risk_ids:
              - R-005
          - finding_id: I.B-F2
            finding: Core app growth assumptions must be rebuilt from current MAU/retention and advertising economics, not
              2016-2018 scale claims.
            evidence_claim_ids:
              - EC-004
              - EC-011
              - EC-023
            risk_ids:
              - R-006
              - R-007
        hidden_risks:
          - Satellite commitments could create hidden capex, guarantees or impairment risk.
          - Foreign exchange, PRC platform regulation and app-store policy changes could affect projections.
        evidence_gaps:
          - Board-approved operating model, budget and scenario analysis.
          - Capex plan, financing assumptions, satellite commitments and working-capital requirements.
        follow_up_questions:
          - Provide a three-year quarterly forecast with actual-vs-plan history, operating assumptions,
            capex/depreciation/working-capital schedules and financing sources.
        table_ids:
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-019
          - EC-023
          - EC-025
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: CB Insights, China Money Network and Wikipedia support historical unicorn financing/valuation
          markers, but current shares, options, warrants, notes, debt and preferences are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Public sources identify a $52M Series A and a $5.2B ranking valuation marker.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: No fully diluted cap table, preference stack, debt or off-balance-sheet liability schedule is public.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-002
        hidden_risks:
          - Stale valuation may mask down rounds, preference overhang, undisclosed debt or structured investor
            rights.
          - Current control rights and founder/investor economics are unknown.
        evidence_gaps:
          - Current cap table, shareholder register, option plan, warrants, convertibles, debt and
            off-balance-sheet liabilities.
        follow_up_questions:
          - Provide current fully diluted cap table, all financing documents, investor-rights agreements,
            option/warrant schedule, debt instruments and legal-entity chart.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-005
          - EC-022
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Tax positions, accounting policies and a full financing history are not publicly available; public
          financing evidence is limited to historical rounds and valuation markers.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Historical $52M Series A evidence is triangulated by CB Insights, PRNewswire and Tech in Asia.
            evidence_claim_ids:
              - EC-001
              - EC-005
              - EC-022
            risk_ids:
              - R-002
          - finding_id: I.D-F2
            finding: No public tax, accounting-policy, NOL, revenue-recognition or auditor information was found.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-001
        hidden_risks:
          - Unrecorded tax exposure, revenue-recognition issues or related-party transactions may be hidden
            without financial statements.
          - Historical financing terms may include liquidation preferences or anti-dilution not visible in
            public sources.
        evidence_gaps:
          - Auditor identity, tax filings, revenue-recognition memo, NOL/carry-forward schedules and financing
            history by round.
        follow_up_questions:
          - Request auditor workpapers summary, tax returns, tax-position memo, revenue-recognition policy,
            all financing-round closing documents and current investor basis schedule.
        table_ids:
          - T-001
          - T-002
          - T-003
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-005
          - EC-022
          - EC-023
  - chapter_id: II
    title: Products
    chapter_summary: WiFi Master Key is publicly verified as a LinkSure Wi-Fi sharing app with security and
      utility features; the largest open issue is whether authorization, security and user-value controls work
      at current scale.
    founder_claim_ids:
      - FC-002
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-009
      - EC-010
      - EC-011
      - EC-012
      - EC-013
      - EC-016
    risk_ids:
      - R-003
      - R-004
      - R-006
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: The core product is a free Wi-Fi sharing application, distributed through app stores, that connects
          users to shared hotspots and adds security, speed test, signal and map features.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Official help and terms verify a shared-hotspot access model mediated by LinkSure and access
              providers.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-008
            risk_ids:
              - R-003
          - finding_id: II.A-F2
            finding: Google Play verifies a currently available Android app with 100M+ downloads and current data-safety
              disclosures.
            evidence_claim_ids:
              - EC-011
              - EC-012
              - EC-013
            risk_ids:
              - R-004
              - R-006
          - finding_id: II.A-F3
            finding: Security pages and privacy policy claim encryption and hotspot-risk systems, but public evidence does
              not validate implementation quality.
            evidence_claim_ids:
              - EC-010
              - EC-016
            risk_ids:
              - R-003
              - R-004
        hidden_risks:
          - Product-market appeal is entangled with authorization, credential handling, privacy and app-store
            policy risk.
          - Historical scale may have declined despite ongoing app-store presence.
        evidence_gaps:
          - Product-level revenue, active installs, connection success rate, abuse reports, cost structure,
            gross margin and roadmap timing.
          - Technical controls for consent, revocation, encryption, key management and hotspot-risk scoring.
        follow_up_questions:
          - Provide product demo, current product roadmap, active-user analytics, gross-margin by product,
            security architecture, consent-flow evidence and independent security audit.
        table_ids:
          - T-004
          - T-005
          - T-006
        figure_ids:
          - F-003
          - F-004
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-010
          - EC-011
          - EC-012
          - EC-013
          - EC-016
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public sources evidence a very large historical consumer user base, but no customer revenue
      schedule, partner economics, supplier spend or churn data is public.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-004
      - EC-011
      - EC-024
    risk_ids:
      - R-006
      - R-007
      - R-008
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: For a consumer app, public sources disclose aggregate users/downloads rather than top customers by
          application; no top-15 paying customer schedule is public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Historical app scale is supported by PRNewswire and current app-store download indicators.
            evidence_claim_ids:
              - EC-004
              - EC-011
            risk_ids:
              - R-006
          - finding_id: III.A-F2
            finding: No named paid top customers by application were found.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-007
        hidden_risks:
          - User scale may not translate into durable paying customers or advertisers.
          - Consumer geography mix and cohort quality are unknown.
        evidence_gaps:
          - Top customer/advertiser/partner list by revenue, application, geography and timing.
          - Current MAU/DAU by country and product feature.
        follow_up_questions:
          - Provide top-15 customers/advertisers/partners for FY2024-FY2026 YTD, application mapping, contract
            dates and revenue contribution.
        table_ids:
          - T-007
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-004
          - EC-011
          - EC-024
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: The service model depends on access providers and app stores, and TechNode historically referenced
          merchant/service partnerships, but current strategic agreements are not public.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: III.B-F1
            finding: Terms describe Access Providers as the parties sharing password data.
            evidence_claim_ids:
              - EC-007
              - EC-008
            risk_ids:
              - R-008
          - finding_id: III.B-F2
            finding: Current revenue contribution and strategic marketing agreements are not disclosed.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-008
        hidden_risks:
          - Access-provider, app-store or ad-network dependency may be concentrated and revocable.
          - Consent withdrawal and password updates can degrade network quality.
        evidence_gaps:
          - Strategic relationship list, revenue contribution, renewal terms, exclusivity and termination
            history.
        follow_up_questions:
          - Provide access-provider, app-store, ad-network, merchant and distribution agreements with revenue
            and churn contribution.
        table_ids:
          - T-007
          - T-008
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-024
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No revenue by customer, advertiser, channel or geography was publicly available.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Public sources contain no customer accounting for 5% or more of revenue.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-007
          - finding_id: III.C-F2
            finding: Aggregate user metrics do not reveal ad yield, customer concentration or payment terms.
            evidence_claim_ids:
              - EC-004
              - EC-024
            risk_ids:
              - R-007
        hidden_risks:
          - Revenue concentration could be high despite consumer-scale metrics.
          - Receivables or revenue-recognition issues cannot be assessed publicly.
        evidence_gaps:
          - Revenue by customer and by product/channel/geography, gross margin and contract-level terms.
        follow_up_questions:
          - Provide customer revenue schedule and concentration analysis for the past two fiscal years and
            current YTD.
        table_ids:
          - T-007
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-024
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public schedule of lost customers, partners, suppliers or app-store restrictions was found.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: No severed relationship list or churn schedule is public.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-008
        hidden_risks:
          - Lost app-store, ad-network, cloud, access-provider or regulator relationships could materially
            affect operations.
          - Past enforcement or remediation may be undisclosed.
        evidence_gaps:
          - Churned/lost partner list, terminated supplier contracts, app-store notices and regulatory
            remediation commitments.
        follow_up_questions:
          - Provide lost customer/partner/supplier schedule for FY2024-FY2026 YTD, with reasons, revenue
            impact and remediation.
        table_ids:
          - T-008
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-024
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: No top supplier schedule is public; likely supplier categories include app stores, cloud/security
          vendors, ad networks, data services and, if active, satellite partners.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: Supplier dependency cannot be measured from public sources.
            evidence_claim_ids:
              - EC-024
              - EC-025
            risk_ids:
              - R-008
        hidden_risks:
          - Cloud, security, app-store or satellite suppliers may create concentration, data-transfer, SLA and
            cost risks.
          - Supplier contracts may contain unfavorable termination or compliance clauses.
        evidence_gaps:
