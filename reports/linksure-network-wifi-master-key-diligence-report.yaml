risk_register:
  - risk_id: R-001
    risk_title: Current financial quality is not publicly verifiable
    risk_category: financial
    severity: high
    likelihood: high
    description: No audited financials, revenue, margins, cash/debt, AR aging, backlog, capex or management
      reports were found in public sources.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Gate any valuation work on audited financials, monthly KPI pack, bank/debt
      statements, AR aging, tax returns and management reports.
  - risk_id: R-002
    risk_title: Stale and unreconciled valuation/cap table
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation markers range from $1B+ in 2015 to $5.2B in a ranking, but current
      capitalization, ownership, preferences, debt and secondary transactions are unknown.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
