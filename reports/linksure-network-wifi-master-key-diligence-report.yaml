diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, monthly management reports, cash/debt, AR aging, backlog and tax records.
    why_it_matters: Needed to assess revenue quality, margins, runway and hidden liabilities.
    suggested_source_or_request: Data-room financial statements, bank/debt schedules, auditor and tax records.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, fully diluted ownership, option pool, preferences, warrants, notes and
      investor rights.
    why_it_matters: Public valuation markers are stale and do not reveal economics or control.
    suggested_source_or_request: Shareholder register, financing documents, option plan and board approvals.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product telemetry, connection success rate, consent enforcement, abuse reports and current roadmap.
    why_it_matters: Core product diligence depends on whether shared-hotspot access is authorized, reliable and safe.
    suggested_source_or_request: Product analytics, consent logs, demo, roadmap and security audit.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Customer/advertiser/partner revenue schedule, churn, concentration and supplier spend.
    why_it_matters: Public user scale does not prove monetization or durable revenue.
    suggested_source_or_request: Customer and supplier schedules with contracts and revenue/spend by period.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: Marketing CAC, sales productivity, channel attribution, pipeline and budget-to-actual performance.
