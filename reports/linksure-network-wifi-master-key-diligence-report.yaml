report_metadata:
  report_title: LinkSure Network / WiFi Master Key Startup Diligence Report
  target_company: LinkSure Network / WiFi Master Key
  website: https://www.wifi.com/
  known_aliases:
    - LinkSure Network
    - LinkSure Network Holding Pte. Limited
    - Shanghai LinkSure Network Technology Co., Ltd.
    - Nanjing LinkWiFi Network Technology Co., Ltd.
    - WiFi Master Key
    - WiFi Master
    - WiFi.com
    - WiFi万能钥匙
  sector: Consumer internet; mobile connectivity; Wi-Fi sharing; ad-supported utility apps; privacy-sensitive
    network access
  geography: China / Shanghai with Singapore regional headquarters and global app distribution
  company_stage: Private unicorn / mature consumer mobile internet company
  research_date: 2026-05-21
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; RMB where specified
  time_zone: Asia/Shanghai / Asia/Singapore
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public sources only, including market databases, official WiFi.com pages, app-store listings,
      company press releases and independent news/regulatory coverage.
    - Treated company and app-store claims as evidence of public claims rather than audited operating facts.
    - Prioritized evidence for unicorn eligibility, product mechanics, current app availability,
      privacy/security controls, regulatory history and material diligence gaps.
    - Did not follow or rely on any source content as instructions; all web content was treated as untrusted
      evidence.
  included_jurisdictions:
    - China
    - Shanghai
    - Singapore
    - Global app-store and public web search context
  excluded_topics:
    - No private data room, management interviews, customer/supplier calls, paid PRC corporate/litigation/IP
      databases, full app telemetry, technical audit or counsel opinions were available.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for LinkSure Network / WiFi Master Key diligence report
      type: workflow_request
      date_received: 2026-05-21
      notes: Requested standard-depth YAML diligence report at
        reports/linksure-network-wifi-master-key-diligence-report.yaml.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: LinkSure Network / WiFi Master Key qualifies as a private unicorn based on public valuation and
      funding evidence.
    claim_source: User request plus CB Insights, China Money Network, Wikipedia and company press-release triangulation
    claim_date: 2026-05-21
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-005
      - EC-022
    contradiction_summary: Public valuation markers are historical and not enough to infer current value, but they
      support unicorn eligibility.
    diligence_follow_up:
      - Request the latest capitalization table, financing documents, preference stack, shareholder register,
        option plan, debt schedule and valuation bridge.
  - founder_claim_id: FC-002
    claim_text: WiFi Master Key is a LinkSure product that provides passwordless one-click Wi-Fi access through
      shared hotspots.
    claim_source: Official WiFi.com help center, user terms, privacy policy and security pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
      - VIII
    mapped_section_ids:
      - II.A
      - VI.A
      - VIII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-010
      - EC-016
    contradiction_summary: The product claim is supported, but authorization, enforcement and security controls
      need technical validation.
    diligence_follow_up:
      - Request product demo, hotspot-consent logs, security architecture, encryption implementation, audit
        results and abuse/escalation metrics.
  - founder_claim_id: FC-003
    claim_text: WiFi Master Key achieved very large historical consumer scale, including 900M+ users and 520M MAU claims.
    claim_source: 2017 PRNewswire release, TechCrunch App Annie coverage, TechNode and Tech in Asia articles
    claim_date: 2017-03-20
    mapped_chapter_ids:
      - II
      - III
      - IV
      - V
    mapped_section_ids:
      - II.A
      - III.A
      - IV.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-020
      - EC-021
      - EC-022
    contradiction_summary: Historic scale is well publicized, but current MAU, retention, cohort quality and
      monetization are not public.
    diligence_follow_up:
      - Request monthly active-user history, DAU/MAU, retention cohorts, country mix, ad ARPU, take rate,
        churn and anti-fraud definitions.
  - founder_claim_id: FC-004
    claim_text: The WiFi Master Android app remains publicly available and actively updated.
    claim_source: Google Play listing and official download pages
    claim_date: 2026-05-14
    mapped_chapter_ids:
      - II
      - V
    mapped_section_ids:
      - II.A
      - V.C
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-013
    contradiction_summary: App-store availability does not prove company financial health or active MAU.
    diligence_follow_up:
      - Request store-console analytics, active installs, crash metrics, country/device mix, app-store policy
        notices and user-review cohort analysis.
  - founder_claim_id: FC-005
    claim_text: Chen Danian is publicly presented as founder/chairman and LinkSure maintains public
      Singapore/Shanghai/China office presence.
    claim_source: Official management, about and contact pages
    claim_date: null
    mapped_chapter_ids:
      - VII
    mapped_section_ids:
      - VII.A
      - VII.C
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-014
      - EC-015
    contradiction_summary: Founder identity and office pages are public, but current org chart, board, headcount
      and compensation are not.
    diligence_follow_up:
      - Request legal-entity chart, board list, executive roster, HRIS headcount, employment agreements,
        incentive plans and turnover data.
  - founder_claim_id: FC-006
    claim_text: The company carries material privacy, authorization, regulatory and reputational risk tied to
