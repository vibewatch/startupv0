              - EC-007
              - EC-008
              - EC-024
            risk_ids:
              - R-008
              - R-010
        hidden_risks:
          - Contracts may contain termination, exclusivity, indemnity, data-transfer or regulatory compliance
            obligations.
          - Supplier concentration and app-store policy obligations may be high.
        evidence_gaps:
          - Material contracts, DPAs, access-provider agreements, cloud/security SLAs, ad agreements,
            satellite contracts and change-of-control terms.
        follow_up_questions:
          - Provide material-contract schedule and copies of all contracts representing material revenue,
            cost, data, IP, app-store or regulatory exposure.
        table_ids:
          - T-018
          - T-019
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-024
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Public evidence shows material regulatory/privacy scrutiny in 2018 and ongoing privacy/data-safety
          disclosures; final disposition and current compliance posture require counsel verification.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: VIII.G-F1
            finding: Sixth Tone reported MIIT-requested investigation after CCTV allegations involving Wi-Fi sharing apps.
            evidence_claim_ids:
              - EC-017
            risk_ids:
              - R-003
              - R-004
          - finding_id: VIII.G-F2
            finding: GizChina corroborated MIIT cybersecurity concern and suspected invasion/personal-information issues.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-003
              - R-004
          - finding_id: VIII.G-F3
            finding: Company terms/privacy/app-store disclosures assert authorization, encryption and deletion controls,
              but these need validation.
            evidence_claim_ids:
              - EC-007
              - EC-008
              - EC-009
              - EC-012
              - EC-013
            risk_ids:
              - R-003
              - R-004
        hidden_risks:
          - Regulator findings, penalties, consent orders or app-store enforcement could be undisclosed
            publicly.
          - The same facts driving product value also create privacy, telecom, cybersecurity and reputational
            exposure.
        evidence_gaps:
          - Primary MIIT/CAC/local regulator records, complaints, penalties, app-store notices, DPIAs, consent
            logs and remediation evidence.
        follow_up_questions:
          - Engage PRC/Singapore/privacy counsel for regulator searches and legal opinions on authorization,
            data processing, cross-border transfer and cybersecurity obligations.
        table_ids:
          - T-017
          - T-018
          - T-020
