report_metadata:
  report_title: "Startup Diligence Research Report: Flexport"
  target_company: Flexport
  website: https://www.flexport.com/
  known_aliases:
    - Flexport Inc.
  sector: Global logistics technology, freight forwarding, customs, and supply chain software
  geography: United States headquartered; global operations and customer footprint across 112 countries in public company materials
  company_stage: Private unicorn / late-stage venture-backed
  research_date: 2026-06-18
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only, using primary company pages first and then public filings and reputable news.
    - Text mirrors were used where direct pages were script-heavy; canonical source URLs are preserved in the source list.
    - Negative evidence, such as no accessed IPO or acquisition announcement, is treated conservatively and not overstated.
    - Items requiring data-room materials are explicitly marked not_publicly_verifiable or inconclusive rather than inferred.
  included_jurisdictions:
    - United States
    - Netherlands / European Union where public terms or privacy provisions explicitly referenced Amsterdam and DPF coverage
    - Global trade lanes and public customer footprint across 112 countries
  excluded_topics:
    - Non-public data room materials, customer calls, supplier calls, and management interviews
    - Paid private-company databases beyond the publicly accessible unicorn list page
    - Direct docket pulls from gated services when public summaries were blocked by bot checks
    - Legal advice, accounting advice, or regulatory opinions beyond public-source diligence
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided target details and unicorn valuation context
      type: task instructions
      date_received: 2026-06-17
      notes: Included company name, website, alias, scope limitation to Flexport, and latest known USD 8B valuation context from CB Insights.
