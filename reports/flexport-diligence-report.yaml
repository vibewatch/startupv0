executive_summary:
  overall_assessment: Flexport is strongly evidenced as an operating private unicorn with a broad AI-enabled global logistics platform, named customer and partner traction, and continued product releases, but the public record remains weak on audited financial quality, current valuation, customer concentration, supplier commitments, and detailed legal exposure.
  investment_or_diligence_thesis: The core diligence question is whether Flexport can convert its end-to-end software-plus-execution positioning into durable, profitable growth despite freight-cycle volatility, competition from visibility and managed-transport platforms, and internal execution disruption from leadership churn and layoffs.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Flexport is still publicly evidenced as an active private unicorn company.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: The latest widely referenced valuation anchor remains USD 8B from the 2022 financing and current unicorn lists.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: Flexport publicly describes and ships a broad logistics platform spanning forwarding, customs, fulfillment, visibility, and capital.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-009
    - founder_claim_id: FC-006
      summary: Flexport shows technical scale and active release cadence in 2025-2026 public materials.
      evidence_claim_ids:
        - EC-015
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: Opaque financials and unit economics
    - risk_id: R-002
      summary: Freight-cycle volatility and profitability pressure
    - risk_id: R-003
      summary: Stale public valuation anchor
    - risk_id: R-008
      summary: Leadership churn and repeated layoffs
    - risk_id: R-009
      summary: High regulatory and compliance complexity
  key_evidence_gaps:
    - Audited 2023-2025 financials, KPI definitions, burn, runway, debt, and working-capital schedules
    - Current cap table, preferences, option pool, warrant overhang, and governance side letters
    - Top-customer revenue concentration, retention, lane mix, and supplier/carrier commitments
    - Product-level price books, gross margins, implementation cost, and SLA/performance data
    - Counsel-grade docket pulls, insurance schedules, material contracts, and IP registration schedules
  recommended_next_steps:
    - "Open the finance room first: audited results, cash forecast, debt, AR aging, and customer concentration by revenue and gross margin."
    - Review the Shopify transaction documents, governance rights, warrant/option dilution, and any post-2022 valuation marks.
    - Run customer and supplier references across major trade lanes, customs programs, Atlas Air capacity, and large strategic brands.
    - Pressure-test AI and customs performance claims with raw accuracy, savings, SLA, and exception-resolution logs.
    - Have counsel review litigation, licenses, insurance, sanctions/privacy controls, and IP chain-of-title documents.
