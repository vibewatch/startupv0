risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and limited public unit-economics evidence
    risk_category: financial
    severity: high
    likelihood: high
    description: Flexport does not publish audited financials, product-level margins, current burn, runway, AR aging, or debt terms in accessible public sources.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
    evidence_claim_ids:
      - EC-005
      - EC-006
    mitigation_or_diligence_request: Request audited FY2023-FY2025 financials, board materials, KPI bridge, debt schedule, and 13-week cash forecast.
  - risk_id: R-002
    risk_title: Freight-cycle volatility and profitability pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Public sources tie Flexport revenue sensitivity and repeated layoffs to the freight-market slowdown, indicating meaningful macro exposure.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.E
      - V.A
    evidence_claim_ids:
      - EC-019
      - EC-025
    mitigation_or_diligence_request: Stress-test volume, yield, and gross-margin assumptions by mode, lane, and customer cohort against downturn scenarios.
  - risk_id: R-003
    risk_title: Stale public valuation anchor
    risk_category: financing
    severity: high
    likelihood: medium
    description: The latest widely cited public valuation remains the February 2022 USD 8B round; no later priced round was verified in accessible sources.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-002
      - EC-003
    mitigation_or_diligence_request: Obtain current investor marks, any secondary trades, and post-2022 financing documents.
  - risk_id: R-004
    risk_title: Strategic-shareholder influence and cap-table complexity
    risk_category: financing
    severity: medium
    likelihood: medium
    description: Shopify holds a 13% fully diluted equity interest and the public record explicitly references warrants and options, but rights and priorities are not public.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.C
      - III.B
    evidence_claim_ids:
      - EC-004
    mitigation_or_diligence_request: Review stock purchase, governance, warrant, option-pool, and investor-rights documentation.
  - risk_id: R-005
    risk_title: Hidden customer concentration and supplier dependency
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public sources name customers, partners, and suppliers but do not disclose revenue concentration, carrier dependence, or commercial terms.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.E
      - V.B
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-026
    mitigation_or_diligence_request: Request top-25 customers and suppliers by revenue/cost, contract terms, renewal status, and carrier-capacity commitments.
  - risk_id: R-006
    risk_title: Competition and pricing pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Flexport competes across digital forwarding, visibility, orchestration, and managed transportation against large incumbents and specialized software platforms.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-010
      - EC-013
      - EC-014
    mitigation_or_diligence_request: Run recent win/loss analysis and compare Flexport price realization, service levels, and attach rates against key competitors.
  - risk_id: R-007
    risk_title: Execution risk around AI and integrated-platform claims
    risk_category: product
    severity: medium
    likelihood: medium
    description: Flexport makes ambitious AI, customs, and automation claims, but public sources do not provide customer-by-customer SLA, implementation, or margin proof.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-008
      - EC-016
      - EC-024
    mitigation_or_diligence_request: Review release-quality metrics, implementation timelines, outage history, savings realization, and gross-margin contribution by module.
  - risk_id: R-008
    risk_title: Leadership churn and repeated layoffs
    risk_category: team
    severity: high
    likelihood: high
    description: The company reversed a CEO transition, changed multiple senior roles, and undertook several layoffs, creating retention and execution risk.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.B
      - VII.C
      - VII.G
      - VI.A
    evidence_claim_ids:
      - EC-017
      - EC-018
      - EC-019
    mitigation_or_diligence_request: Review attrition, engagement, regretted-loss reports, succession plans, and reference checks on the post-reset leadership team.
  - risk_id: R-009
    risk_title: Regulatory and compliance complexity
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Flexport operates across customs brokerage, privacy, sanctions, insurance, and trade-finance-related functions, increasing compliance burden and licensing risk.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-020
      - EC-024
    mitigation_or_diligence_request: Counsel should review licensing, customs controls, sanctions screening, privacy compliance, and insurance/lending oversight artifacts.
  - risk_id: R-010
    risk_title: Legal, IP, and contract visibility gaps
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Public legal snippets and website terms show a defensive contract posture, but accessible docket details, enterprise contracts, and independent IP registry support remain incomplete.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - VIII.A
      - VIII.D
      - VIII.F
    evidence_claim_ids:
      - EC-021
      - EC-022
      - EC-023
    mitigation_or_diligence_request: Obtain counsel-grade litigation report, material contracts, insurance tower, and trademark/patent schedules.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited FY2023-FY2025 statements, KPI definitions, backlog, AR aging, and cash-flow detail.
    why_it_matters: The public record is insufficient to underwrite quality of revenue or liquidity.
    suggested_source_or_request: Company finance room and auditor-prepared statements.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, liquidation preferences, option pool, warrant overhang, and side letters.
    why_it_matters: Shopify's fully diluted stake implies meaningful complexity and dilution risk.
    suggested_source_or_request: Legal cap-table export, financing docs, and board approvals.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.B
    missing_information: Three-year forecast, financing assumptions, and downside cases by mode and geography.
    why_it_matters: Freight-cycle sensitivity is a major risk and needs stress testing.
    suggested_source_or_request: Management forecast package and lender/investor materials.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product-level pricing, gross margin, SLA, implementation effort, and customer adoption by module.
    why_it_matters: The public product narrative is broad, but economics and delivery quality remain opaque.
    suggested_source_or_request: Product/finance pack with price books, margins, and support metrics.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.C
    missing_information: Top customers by revenue, gross margin, lane, contract length, and churn/renewal status.
    why_it_matters: Breadth of logos does not answer concentration or quality of revenue.
    suggested_source_or_request: Customer concentration report and cohort-retention data.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Top carrier, warehouse, charter, and underwriter dependencies with spend and contractual commitments.
    why_it_matters: Atlas Air, carriers, and insurance relationships may create concentrated operating risk.
    suggested_source_or_request: Supplier concentration report and key supply agreements.
    priority: high
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss analysis, market-share estimates, and pricing benchmarks against major peers and incumbents.
    why_it_matters: Public positioning alone cannot quantify competitive durability.
    suggested_source_or_request: Recent deal reviews, pricing comps, and independent market analysis.
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity by rep, quota attainment, CAC, funnel conversion, and sales-cycle length.
    why_it_matters: The GTM story is visible but not measurable from public materials.
    suggested_source_or_request: Sales-ops dashboard and board GTM pack.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D spend, roadmap gating, incident history, model costs, and product-quality metrics.
    why_it_matters: AI and customs claims need technical and economic validation.
    suggested_source_or_request: Engineering roadmap, SRE/security metrics, and R&D budget.
    priority: high
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.B
    missing_information: Historical headcount by function and location, attrition, regretted losses, and compensation plans.
    why_it_matters: Public people signals suggest churn risk but do not quantify recovery or stability.
    suggested_source_or_request: HRIS exports, compensation committee materials, and engagement data.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Counsel-grade lawsuit list, direct docket pulls, claim amounts, reserves, and outside-counsel summaries.
    why_it_matters: Snippet-level litigation evidence is not sufficient for legal risk pricing.
    suggested_source_or_request: Legal matter list from counsel and docket-service pulls.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Trademark/patent schedule, chain of title, open-source policy, and material license inventory.
    why_it_matters: Public IP assertions are not the same as confirmed registrable or defendable rights.
    suggested_source_or_request: IP schedule from counsel and registry search package.
    priority: high
