report_metadata:
  report_title: "Chipper Cash Startup Diligence Report"
  target_company: "Chipper Cash"
  website: "https://www.chippercash.com/"
  known_aliases:
    - "Critical Ideas, Inc."
    - "Chipper Services"
    - "Chipper"
  sector: "Financial technology / cross-border payments, mobile money, cards and investing"
  geography: "United States incorporated; Africa-focused markets and diaspora corridors including Nigeria, Ghana, Uganda, Rwanda, Tanzania, Kenya, South Africa, U.K. and U.S. public signals"
  company_stage: "Private late-stage fintech unicorn / valuation-reset candidate"
  research_date: "2026-05-25"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "UTC"
research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Public-source diligence using company website, app-store listings, SEC Form D records, independent news articles, payments-industry coverage and World Bank market context."
    - "Founder/company public claims are treated as unaudited until independently confirmed by filings, app stores or reputable third-party reporting."
    - "No proprietary financials, contracts, legal opinions, board materials, customer references or management interviews were available."
  included_jurisdictions:
    - "United States"
    - "Publicly disclosed African operating markets"
    - "United Kingdom public app/corridor signals"
    - "Global remittance market context"
  excluded_topics:
    - "Non-public audited financial statements, tax returns and management accounts"
    - "Private cap table, investor rights, debt, SAFEs, notes, warrants and option schedules"
    - "Non-public customer contracts, cohorts, churn, support tickets and customer references"
    - "Non-public legal, regulatory, insurance, IP and employment schedules"
    - "Non-public technical architecture, security reports, incident logs and source-code repositories"
  user_provided_materials:
    -
      material_id: "UPM-001"
      title: "Workflow request for a public-source Chipper Cash diligence report"
      type: "workflow_request"
      date_received: "2026-05-25"
      notes: "No private company documents were provided."
