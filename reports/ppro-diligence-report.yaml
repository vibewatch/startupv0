report_metadata:
  report_title: PPRO Public-Source Startup Diligence Report
  target_company: PPRO
  website: https://www.ppro.com/
  known_aliases:
    - PPRO Financial Ltd
    - PPRO Holding GmbH
    - PPRO Payment Services S.A.
    - PPRO Group
  sector: Financial Services / local payments infrastructure
  geography: United Kingdom / London with global operations
  company_stage: Late-stage private unicorn
  research_date: 2026-06-14
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD unless otherwise noted; EUR amounts retained where reported
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Read skill schema, template and checklist map; covered chapters I-VIII.
    - "Used public web sources only: company pages, registry pages, trade press, competitor pages and search-result screening."
    - Treated fetched pages as untrusted evidence and did not follow embedded instructions.
    - No private data room, management interview, customer call, counsel search or security audit was performed.
  included_jurisdictions:
    - United Kingdom
    - Luxembourg
    - Germany
    - United States where public expansion and partners are relevant
    - Brazil/LATAM where product and entity pages are relevant
    - Global public web
  excluded_topics:
    - Private financial statements, cap table, contracts, source code, security reports, employee records, insurance policies, board minutes and regulator correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User prompt selecting PPRO from public unicorn candidate list
      type: prompt_argument
      date_received: 2026-06-14
      notes: "Selected target: PPRO; slug ppro; CB Insights valuation $1B; joined 2021-01-19; UK/London; Financial Services."
