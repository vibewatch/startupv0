executive_summary:
  overall_assessment: Proceed to private diligence before underwriting. Public sources support PPRO as an active late-stage local-payments unicorn with recognizable partners, global footprint and recent product expansion; core financial, customer, cap-table, regulatory and contract evidence remains private.
  investment_or_diligence_thesis: PPRO may be valuable infrastructure for PSPs and merchants needing local payment methods across fragmented markets. The investability question is whether public scale signals convert into durable profitable revenue after concentration, partner dependence, regulatory exposure, pricing pressure and technical reliability are verified.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: 2021 $1B+ unicorn status is supported by CB Insights, PPRO and trade press.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Product pages verify a broad activate/accept/manage/API local-payments platform.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-009
        - EC-010
        - EC-011
        - EC-014
    - founder_claim_id: FC-003
      summary: PPRO publicly names or displays recognizable partners and customers.
      evidence_claim_ids:
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and unit economics are not public.
    - risk_id: R-002
      summary: Valuation, dilution and financing terms are opaque.
    - risk_id: R-003
      summary: Regulated payment, privacy, stablecoin and local-method exposure is material.
  key_evidence_gaps:
    - Audited financials, revenue/TPV bridge, gross margin, cash burn, runway and tax/safeguarding schedules.
    - Fully diluted cap table, financing documents, debt, warrants, investor rights and waterfall.
    - Top customer/partner concentration, churn, renewals, severed relationships and reference calls.
    - Regulator correspondence, AML/sanctions/privacy incidents, complaint logs, SOC/security reports and litigation searches.
    - Material customer, partner, supplier, LPM, banking/settlement, employment, insurance and financing contracts.
  recommended_next_steps:
    - Open finance/cap-table data room before underwriting valuation.
    - Run customer and partner reference calls.
    - Commission regulatory, litigation, IP, privacy/security and insurance diligence.
    - Review product/API reliability, settlement controls, fraud/dispute metrics and roadmap adoption.
    - Validate competitive moat with win/loss, pricing, retention and take-rate analysis.
