diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, TPV-to-revenue bridge, gross margin, cash/burn/runway, tax, safeguarding and AR aging
    why_it_matters: Core underwriting depends on revenue quality and cash needs
    suggested_source_or_request: Financial data room and CFO/accountant walkthrough
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, debt, warrants, investor rights and liquidation waterfall
    why_it_matters: Public valuation does not determine investor economics
    suggested_source_or_request: Company secretary/legal data room
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer/partner revenue concentration, churn, renewals and severed relationships
    why_it_matters: Logos do not show concentration or retention
    suggested_source_or_request: Top-customer schedule and reference calls
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulator correspondence, AML/sanctions/privacy incidents and safeguarding audits
    why_it_matters: Regulatory issues can impair licenses and valuation
    suggested_source_or_request: Counsel-led regulatory review
    priority: high
  - gap_id: G-005
    chapter_id: II
    section_id: II.A
    missing_information: Product pricing, uptime, incident logs, fraud/dispute metrics and product margins
    why_it_matters: Product breadth may hide weak economics or reliability
    suggested_source_or_request: CTO/CPO product diligence
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP portfolio, trademark ownership, OSS scan and brand permissions
    why_it_matters: IP defects can block financing or acquisition
    suggested_source_or_request: IP counsel and engineering OSS review
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.G
    missing_information: Executive retention, org chart, attrition and compensation/equity plans
    why_it_matters: Leadership changes need retention diligence
    suggested_source_or_request: HR data room
    priority: medium
  - gap_id: G-008
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing comparison and customer NPS
    why_it_matters: Competitive pressure may impair growth
    suggested_source_or_request: Sales/customer diligence
    priority: medium
