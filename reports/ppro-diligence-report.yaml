    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Provide win/loss, pricing and retention analysis.
  - risk_id: R-006
    risk_title: Operational complexity in payment orchestration
    risk_category: technical
    severity: medium
    likelihood: high
    description: PPRO handles integrations, settlement, FX, tax, reconciliation, fraud and disputes across many rails.
    impacted_chapter_ids:
