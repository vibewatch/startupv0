risk_register:
  - risk_id: R-001
    risk_title: Private financial quality unknown
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence verifies funding and volume signals but not audited revenue, gross margin, cash, burn, runway, tax or AR quality.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Open financial data room with audits, management accounts and TPV-to-revenue bridge.
  - risk_id: R-002
    risk_title: Valuation and financing terms opaque
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation and funding amounts do not disclose current valuation, liquidation stack, debt, warrants or investor rights.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request cap table, financing docs and liquidation waterfall.
  - risk_id: R-003
    risk_title: Multi-jurisdiction regulatory perimeter
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: PPRO has regulated payment entities and expands into US, LATAM, stablecoin and local-method use cases.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - V.A
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Run licensing, AML/sanctions, privacy, safeguarding, stablecoin and BNPL review.
  - risk_id: R-004
    risk_title: Customer and partner concentration unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named logos are public, but revenue weight, live volume, churn and contract status are not.
    impacted_chapter_ids:
