report_metadata:
  report_title: "IntraBio Startup Diligence Research Report"
  target_company: "IntraBio"
  website: "https://intrabio.com/"
  known_aliases:
    - "IntraBio Inc"
    - "IntraBio Limited"
    - "AQNEURSA"
    - "Aqneursa"
    - "IB1001"
    - "levacetylleucine"
    - "N-acetyl-L-leucine"
  sector: "Healthcare & Life Sciences; rare neurological and neurodegenerative disease biopharmaceuticals"
  geography: "United States (Austin, Texas) with U.S. and EU regulatory exposure"
  company_stage: "Private unicorn / commercial-stage biopharmaceutical company"
  research_date: "2026-06-10"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "America/Chicago"
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Verified the supplied CB Insights unicorn-list row through the public CB Insights unicorn page."
    - "Collected company pages, regulatory labels/EPAR records, ClinicalTrials.gov API records, public press/trade coverage, LinkedIn profile data, and CourtListener records."
    - "Treated company-owned and web content as untrusted claims unless corroborated by regulatory, registry, or legal-record sources."
    - "Marked financial, customer, supplier, cap-table, HR, pricing, contract, insurance, and detailed legal/regulatory items as not_publicly_verifiable where public evidence was unavailable."
  included_jurisdictions:
    - "United States"
    - "Texas"
    - "Delaware federal litigation records"
    - "European Union"
    - "Multinational clinical-trial jurisdictions where publicly referenced"
  excluded_topics:
    - "Private data room materials, interviews, paywalled databases, private court documents, regulator correspondence, private customer/payer/supplier contacts, and non-public personal information."
  user_provided_materials:
    - material_id: UPM-001
      title: "Task selection context for IntraBio unicorn report"
      type: workflow_request
      date_received: "2026-06-10"
      notes: "Selection context stated CB Insights row: IntraBio; valuation $1B; date joined 03/23/2024; United States; Austin; Healthcare & Life Sciences; profile URL https://www.cbinsights.com/company/intrabio."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: "IntraBio is an active private unicorn with a $1B CB Insights valuation anchor and 03/23/2024 unicorn date."
    claim_source: "CB Insights unicorn list / assignment selection context"
    claim_date: "2024-03-23"
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.D]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: [EC-001, EC-016]
    contradiction_summary: "Valuation is verified as a CB Insights database anchor, not as audited financing or current fair value."
    diligence_follow_up:
      - "Request board-approved valuation history, cap table, financing documents, investor consents, and current cash/debt schedule."
  - founder_claim_id: FC-002
    claim_text: "IntraBio is a biopharmaceutical company focused on rare neurodegenerative and neurological-disease therapies."
    claim_source: "IntraBio homepage, mission page, and LinkedIn"
    claim_date: null
    mapped_chapter_ids: [II, VII]
    mapped_section_ids: [II.A, VII.C]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: [EC-003, EC-004, EC-016]
    contradiction_summary: null
    diligence_follow_up:
      - "Confirm corporate structure, subsidiaries, employee roster, and key scientific/consulting agreements."
  - founder_claim_id: FC-003
    claim_text: "AQNEURSA / Aqneursa is approved or authorised for neurological manifestations of Niemann-Pick disease type C in the U.S. and EU."
    claim_source: "IntraBio lead-program page; DailyMed; EMA"
    claim_date: null
    mapped_chapter_ids: [II, V, VIII]
    mapped_section_ids: [II.A, V.A, VIII.G]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-005, EC-006, EC-007]
    contradiction_summary: "The company lead-program page appeared stale on jurisdiction status, but DailyMed and EMA corroborate current U.S. and EU scope."
    diligence_follow_up:
      - "Request approval letters, post-marketing commitments, pharmacovigilance plans, reimbursement status, and launch metrics."
  - founder_claim_id: FC-004
    claim_text: "IB1001 / levacetylleucine has multiple clinical programs, including completed Phase II studies and pending or pivotal Phase III work."
    claim_source: "IntraBio clinical-trials and pipeline pages; ClinicalTrials.gov; BusinessWire; Clinical Trials Arena"
    claim_date: null
    mapped_chapter_ids: [VI, II, IV]
    mapped_section_ids: [VI.B, II.A, IV.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-002, EC-008, EC-009, EC-010, EC-011, EC-012, EC-013]
    contradiction_summary: "Registry metadata and public topline claims support activity, but full CSRs, peer review for all endpoints, and regulatory letters are not public."
    diligence_follow_up:
      - "Request full clinical study reports, protocols/amendments, statistical analysis plans, FDA/EMA correspondence, and safety databases."
  - founder_claim_id: FC-005
    claim_text: "IntraBio has orphan, rare pediatric disease, Fast Track, and patent protections around the IB1000/AQNEURSA program."
    claim_source: "IntraBio lead-program and virtual patent-marking pages"
    claim_date: null
    mapped_chapter_ids: [VIII, VI]
    mapped_section_ids: [VIII.D, VI.B]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-005, EC-015, EC-020]
    contradiction_summary: "Public company pages and docket records support patent/designation claims in part; formal ownership, expiry, validity, and designation letters require counsel/regulatory review."
    diligence_follow_up:
      - "Request IP schedule, prosecution files, license agreements, FTO opinion, exclusivity analyses, and designation letters."
  - founder_claim_id: FC-006
    claim_text: "Public information is sufficient to underwrite IntraBio financial performance and commercial traction."
    claim_source: "Analyst gap ledger from public research"
    claim_date: "2026-06-10"
    mapped_chapter_ids: [I, III, V]
    mapped_section_ids: [I.A, III.C, V.D]
    verification_status: not_publicly_verifiable
    confidence: high
    evidence_claim_ids: [EC-021, EC-022]
    contradiction_summary: "Public sources do not disclose audited financials, revenue, gross margin, customer concentration, pricing, payer coverage, or runway."
    diligence_follow_up:
      - "Request audited financials, management accounts, product revenue, gross-to-net, payer coverage, AR aging, inventory, COGS, and cash runway."
  - founder_claim_id: FC-007
    claim_text: "AQNEURSA has manageable safety and label obligations for commercialization."
    claim_source: "DailyMed label"
    claim_date: null
    mapped_chapter_ids: [VIII, II]
    mapped_section_ids: [VIII.G, II.A]
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids: [EC-006, EC-024]
    contradiction_summary: "Label confirms approval and safety language, but post-marketing safety, adherence, and pregnancy/drug-interaction counseling performance are not public."
    diligence_follow_up:
      - "Request pharmacovigilance reports, safety signal reviews, medical-information logs, complaint files, and compliance SOPs."
  - founder_claim_id: FC-008
    claim_text: "IntraBio is privately held, based in Austin, and appears small-team/commercial-stage from public profiles."
    claim_source: "LinkedIn company page"
    claim_date: null
    mapped_chapter_ids: [VII, I]
    mapped_section_ids: [VII.B, I.C]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: [EC-016, EC-023]
    contradiction_summary: "LinkedIn corroborates privately held and headcount range, but corporate registry, subsidiary ownership, and board composition were not verified."
    diligence_follow_up:
      - "Request corporate records, org chart, board/advisor list, employment agreements, and key-person succession plan."
executive_summary:
  overall_assessment: "IntraBio is eligible for a public-evidence unicorn diligence report: CB Insights lists a $1B IntraBio unicorn row, LinkedIn describes the company as privately held in Austin, and public regulatory sources verify AQNEURSA/Aqneursa approvals for NPC. Underwriting should remain conditional because public evidence does not disclose financials, revenue, cap table, pricing, payer coverage, customers, suppliers, or complete HR/contract records."
  investment_or_diligence_thesis: "The positive thesis is a rare-neurology platform with an approved U.S./EU NPC product, public clinical-registry history, A-T sNDA Priority Review, patent assets, and a small focused team. The diligence thesis depends on proving commercial traction, payer access, durable IP, regulatory execution, manufacturing/supply resilience, safety compliance, and enough capital/team capacity to scale."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: "CB Insights lists IntraBio as a $1B private unicorn row in Austin healthcare/life sciences."
      evidence_claim_ids: [EC-001]
    - founder_claim_id: FC-003
      summary: "DailyMed and EMA verify AQNEURSA/Aqneursa approved/authorised NPC label scope in the U.S. and EU."
      evidence_claim_ids: [EC-006, EC-007]
    - founder_claim_id: FC-008
      summary: "LinkedIn publicly describes IntraBio as privately held, Austin-headquartered, and 11-50 employees."
      evidence_claim_ids: [EC-016]
  biggest_risks:
    - risk_id: R-001
      summary: "Financial opacity prevents public underwriting of the $1B valuation."
    - risk_id: R-003
      summary: "Pipeline value depends on pending regulatory reviews and trial execution."
    - risk_id: R-002
      summary: "Commercial performance may be concentrated in a small rare-disease product/indication."
    - risk_id: R-006
      summary: "IP value and legal spend are affected by patent assets and public Tesseract litigation."
  key_evidence_gaps:
    - "Audited financials, revenue, gross-to-net, cash runway, debt, and cap table."
    - "Pricing, payer coverage, product-level P&L, customer/payer/distributor concentration, and launch funnel metrics."
    - "Full clinical study reports, FDA/EMA correspondence, safety databases, and post-marketing commitments."
    - "IP ownership/expiry/FTO, licenses, exclusivity, and Tesseract litigation pleadings/strategy."
    - "HRIS, org chart, compensation, turnover, contracts, supplier/CMO/CRO/PV vendor schedules, and insurance coverage."
  recommended_next_steps:
    - "Proceed only to data-room diligence; do not rely on public valuation without financial, cap-table, and commercial proof."
    - "Prioritize product launch economics, payer access, clinical/regulatory correspondence, IP/litigation counsel review, and supply-chain/PV compliance."
    - "Conduct customer/payer/physician references and independent scientific/regulatory review before any investment valuation decision."
chapters:
  - chapter_id: I
    title: "Financial Information"
    chapter_summary: "Public evidence verifies a $1B CB Insights unicorn valuation and private-company status, but financial statements, current valuation, cap table, revenue, burn, debt, taxes, and unit economics are not publicly verifiable."
    founder_claim_ids: [FC-001, FC-006, FC-008]
    evidence_claim_ids: [EC-001, EC-014, EC-016, EC-021]
    risk_ids: [R-001]
    sections:
      - section_id: I.A
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: [I.A.1, I.A.2, I.A.3, I.A.4, I.A.5, I.A.6]
        summary: "No audited income statements, balance sheets, cash-flow statements, management reports, sales breakdowns, backlog, or AR aging were found in reviewed public sources."
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: "Reviewed public sources disclose product/regulatory facts but not revenue, gross margin, burn, cash, debt, or customer concentration."
            evidence_claim_ids: [EC-021, EC-022]
            risk_ids: [R-001, R-002]
        hidden_risks:
          - "Valuation cannot be reconciled to revenue, margin, burn, or cash runway from public evidence."
        evidence_gaps:
          - "Audited financials, monthly management accounts, revenue by product/channel/region, backlog, AR aging, inventory, cash, debt, and budget-vs-actuals."
        follow_up_questions:
          - "Provide audited financials and monthly management accounts for FY2023-FY2026 YTD with product, payer, channel, and geography breakdowns."
        table_ids: [T-003]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-021, EC-022]
      - section_id: I.B
        title: "Financial Projections"
        checklist_question_ids: [I.B.1, I.B.2, I.B.3, I.B.4, I.B.5, I.B.6, I.B.7, I.B.8]
        summary: "Public sources show potential growth drivers from approved NPC product and pending A-T/CACNA1A programs, but no three-year projections or assumptions were public."
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: "A-T sNDA Priority Review and EU authorization are public growth catalysts, but projection assumptions, launch curves, and financing needs are private."
            evidence_claim_ids: [EC-007, EC-012, EC-021]
            risk_ids: [R-001, R-003]
        hidden_risks:
          - "Pipeline-dependent projections could be highly sensitive to regulatory decisions, payer access, and rare-disease patient identification."
        evidence_gaps:
          - "Three-year financial model, scenario assumptions, capital expenditures, COGS, gross-to-net, payer access, launch curves, and financing plan."
        follow_up_questions:
          - "Provide base/upside/downside financial model through FY2029 with regulatory and launch assumptions by indication and jurisdiction."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-007, EC-012, EC-021]
      - section_id: I.C
        title: "Capital Structure"
        checklist_question_ids: [I.C.1, I.C.2, I.C.3, I.C.4, I.C.5]
        summary: "LinkedIn indicates IntraBio is privately held and CourtListener shows an IntraBio Limited relationship in litigation, but current shares, ownership, options, warrants, debt, and off-balance-sheet obligations are private."
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: "Public sources identify private-company status and IntraBio Inc./Limited legal entities but do not disclose cap table or debt."
            evidence_claim_ids: [EC-016, EC-020, EC-021]
            risk_ids: [R-001, R-006]
        hidden_risks:
          - "Unknown preference stack, debt, option pool, intercompany IP ownership, and litigation funding could materially affect returns."
        evidence_gaps:
          - "Cap table, entity chart, debt instruments, warrants/notes, option plan, investor rights, and intercompany agreements."
        follow_up_questions:
          - "Provide fully diluted cap table, entity chart, board consents, debt/warrant/note schedules, and all investor-rights agreements."
        table_ids: [T-002]
        figure_ids: []
        evidence_claim_ids: [EC-016, EC-020, EC-021]
      - section_id: I.D
        title: "Other financial information"
        checklist_question_ids: [I.D.1, I.D.2, I.D.3]
        summary: "CB Insights provides the valuation/date anchor and IntraBio claims broad historical platform investment, but financing history, tax positions, accounting policies, and current basis for each round are not public."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: "CB Insights lists IntraBio as a $1B unicorn; no investors are listed in the row."
            evidence_claim_ids: [EC-001]
            risk_ids: [R-001]
          - finding_id: I.D-F2
            finding: "The company says the platform reflects over $350M of worldwide organizational investments, but the claim is not itemized publicly."
            evidence_claim_ids: [EC-014]
            risk_ids: [R-001]
        hidden_risks:
          - "Historical investment claims may not map to IntraBio-owned assets or shareholder capital."
        evidence_gaps:
          - "Tax positions, NOLs, revenue recognition, financing history, investor list, percentage ownership, and basis by round."
        follow_up_questions:
          - "Provide tax/NOL schedule, revenue-recognition memo, financing history, investor schedule, and capitalization of platform/R&D investments."
        table_ids: [T-001]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-001, EC-014, EC-021]
  - chapter_id: II
    title: "Products"
    chapter_summary: "Public evidence verifies AQNEURSA/levacetylleucine as an approved NPC therapy in the U.S. and EU and identifies multiple clinical-stage expansion programs, while pricing, profitability, manufacturing, and adoption remain private."
    founder_claim_ids: [FC-002, FC-003, FC-004, FC-007]
    evidence_claim_ids: [EC-003, EC-005, EC-006, EC-007, EC-008, EC-022, EC-024]
    risk_ids: [R-002, R-003, R-004]
    sections:
      - section_id: II.A
        title: "Description of each product"
        checklist_question_ids: [II.A.1, II.A.2, II.A.3, II.A.4, II.A.5, II.A.6]
        summary: "AQNEURSA is an approved levacetylleucine oral-suspension product for NPC neurological manifestations in defined U.S./EU populations, and IB1001/levacetylleucine underpins additional rare-neurology programs."
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: "DailyMed and EMA corroborate approved/authorised NPC indications for AQNEURSA/Aqneursa."
            evidence_claim_ids: [EC-006, EC-007]
            risk_ids: [R-002]
          - finding_id: II.A-F2
            finding: "Registry and company sources show pipeline programs in NPC, GM2, A-T, and CACNA1A-related disorders."
            evidence_claim_ids: [EC-008, EC-009, EC-010, EC-011, EC-012]
            risk_ids: [R-003]
          - finding_id: II.A-F3
            finding: "Pricing, profitability, adoption, manufacturing, and customer concentration are not public."
            evidence_claim_ids: [EC-021, EC-022]
            risk_ids: [R-001, R-002, R-007]
        hidden_risks:
          - "Single-product concentration and label/safety obligations could constrain launch economics if payer access or adherence disappoints."
        evidence_gaps:
          - "Pricing, COGS, gross margin, product profitability, patient starts, manufacturing capacity, quality history, and roadmap costs."
        follow_up_questions:
          - "Provide product P&L, label strategy, CMC/manufacturing package, payer access dashboard, product roadmap, and safety update reports."
        table_ids: [T-004, T-005]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-003, EC-005, EC-006, EC-007, EC-008, EC-022, EC-024]
  - chapter_id: III
    title: "Customer Information"
    chapter_summary: "For a commercial-stage rare-disease biopharma, public sources define patient/provider segments and regulators but do not disclose top customers, payers, distributors, suppliers, revenue by account, or severed relationships."
    founder_claim_ids: [FC-003, FC-006]
    evidence_claim_ids: [EC-006, EC-007, EC-022]
    risk_ids: [R-002, R-007]
    sections:
      - section_id: III.A
        title: "Top customers by application"
        checklist_question_ids: [III.A]
        summary: "Public evidence identifies eligible patient populations by label, not named customers/accounts or top 15 customer lists."
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.A-F1
            finding: "U.S. and EU labels define NPC patient populations, but not customers or revenue weight."
            evidence_claim_ids: [EC-006, EC-007, EC-022]
            risk_ids: [R-002, R-007]
        hidden_risks: ["Ultra-rare patient populations and opaque payer/provider concentration could produce volatile revenue."]
        evidence_gaps: ["Top accounts, payers, prescribers, patient starts, refill/adherence, and revenue concentration."]
        follow_up_questions: ["Provide top 15 payers/accounts/distributors/prescribers by revenue and product for FY2024-FY2026 YTD."]
        table_ids: [T-006]
        figure_ids: []
        evidence_claim_ids: [EC-006, EC-007, EC-022]
      - section_id: III.B
        title: "Strategic relationships"
        checklist_question_ids: [III.B]
        summary: "Public relationships are primarily regulators and clinical-trial ecosystem nodes; commercial partners are not named."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: "FDA, EMA, and clinical-trial site networks are visible; commercial distributors/payers/CMOs are not."
            evidence_claim_ids: [EC-002, EC-006, EC-007, EC-012, EC-022]
            risk_ids: [R-003, R-007]
        hidden_risks: ["Dependency on undisclosed vendors, sites, and commercial partners may be material."]
        evidence_gaps: ["Partner contracts, revenue contribution, marketing agreements, CRO/site contracts, PV agreements, and termination rights."]
        follow_up_questions: ["Provide strategic partnership, clinical-site, CRO, distributor, specialty pharmacy, payer, and CMO contract schedules."]
        table_ids: [T-007]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-002, EC-006, EC-007, EC-012, EC-022]
      - section_id: III.C
        title: "Revenue by customer"
        checklist_question_ids: [III.C]
        summary: "No revenue by customer, payer, account, distributor, channel, or geography is publicly disclosed."
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: "Reviewed product/regulatory sources do not disclose revenue by customer or any customer accounting for 5%+ of revenue."
            evidence_claim_ids: [EC-022]
            risk_ids: [R-001, R-007]
        hidden_risks: ["Customer/payer concentration, rebate exposure, and channel inventory cannot be assessed publicly."]
        evidence_gaps: ["Revenue by payer/account/channel, rebate/gross-to-net schedules, accounts receivable, returns, and reserves."]
        follow_up_questions: ["Provide revenue by customer/payer/distributor/channel and identify all accounts over 5% of revenue."]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-022]
      - section_id: III.D
        title: "Significant relationships severed within the last two years"
        checklist_question_ids: [III.D]
        summary: "No public evidence of severed customer, partner, or supplier relationships was found in reviewed sources."
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.D-F1
            finding: "Public sources did not disclose terminated commercial or supply relationships."
            evidence_claim_ids: [EC-022]
            risk_ids: [R-007]
        hidden_risks: ["Undisclosed distributor, CMO, site, or payer terminations could disrupt launch or clinical timelines."]
        evidence_gaps: ["Terminated contracts, notice letters, disputes, service-level failures, and replacement plans."]
        follow_up_questions: ["Provide a two-year schedule of terminated or materially amended customer, payer, supplier, site, and vendor relationships."]
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-022]
      - section_id: III.E
        title: "Top suppliers"
        checklist_question_ids: [III.E]
        summary: "No top supplier list, purchase volumes, API/CMO names, quality agreements, or inventory position was public."
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.E-F1
            finding: "Labels and public pages do not name manufacturers, CMOs, API suppliers, distributors, or PV vendors."
            evidence_claim_ids: [EC-022, EC-024]
            risk_ids: [R-007, R-009]
        hidden_risks: ["Single-source API/CMO or distributor dependency could be material for a rare-disease launch."]
        evidence_gaps: ["Supplier schedule, purchase amounts, quality agreements, audits, inventory, batch history, and business continuity plans."]
        follow_up_questions: ["Provide top supplier/CMO/API/vendor schedule with annual spend, term, quality metrics, and alternatives."]
        table_ids: [T-008]
        figure_ids: []
        evidence_claim_ids: [EC-022, EC-024]
  - chapter_id: IV
    title: "Competition"
    chapter_summary: "IntraBio competes in NPC against other approved/available therapies and seeks possible differentiation through A-T and other pipeline indications, but market share, payer preference, and pricing comparisons are not public."
    founder_claim_ids: [FC-004]
    evidence_claim_ids: [EC-006, EC-007, EC-012, EC-013, EC-017, EC-018, EC-022]
    risk_ids: [R-005]
    sections:
      - section_id: IV.A
        title: "Competitive landscape by market segment"
        checklist_question_ids: [IV.A.1, IV.A.2]
        summary: "DailyMed and EMA evidence identify approved NPC comparators; BusinessWire and Clinical Trials Arena frame A-T as an unmet market with no currently approved therapies pending IntraBio review."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: "MIPLYFFA and miglustat are material NPC comparators in public regulatory sources."
            evidence_claim_ids: [EC-017, EC-018]
            risk_ids: [R-005]
          - finding_id: IV.A-F2
            finding: "A-T may be a differentiated opportunity, but approval remains pending."
            evidence_claim_ids: [EC-012, EC-013]
            risk_ids: [R-003, R-005]
          - finding_id: IV.A-F3
            finding: "Pricing, access, market share, and physician preference are not public."
            evidence_claim_ids: [EC-022]
            risk_ids: [R-005]
        hidden_risks:
          - "Competitor launch data and payer access could pressure AQNEURSA uptake and price realization."
        evidence_gaps:
          - "Market share, claims data, pricing/access comparisons, physician/payer interviews, competitive pipeline map, and switching/adherence data."
        follow_up_questions:
          - "Conduct payer/physician diligence comparing AQNEURSA, MIPLYFFA, miglustat, supportive care, and investigational programs."
        table_ids: [T-009, T-010]
        figure_ids: [F-005]
        evidence_claim_ids: [EC-006, EC-007, EC-012, EC-013, EC-017, EC-018, EC-022]
  - chapter_id: V
    title: "Marketing, Sales, and Distribution"
    chapter_summary: "Regulatory approvals imply commercialization obligations in the U.S. and EU, but public sources do not disclose sales force productivity, payer coverage, channel contracts, budgets, or launch metrics."
    founder_claim_ids: [FC-003, FC-006]
    evidence_claim_ids: [EC-006, EC-007, EC-012, EC-016, EC-022]
