report_metadata:
  report_title: impact.com Public-Source Startup Diligence Report
  target_company: impact.com
  website: https://impact.com/
  known_aliases:
    - Impact Tech, Inc.
    - Impact
    - Impact Partnership Cloud
    - Partnership Automation
  sector: Partnership management, affiliate marketing, creator/referral SaaS and attribution infrastructure
  geography: United States headquartered with global offices and customers
  company_stage: Late-stage private SaaS unicorn
  research_date: 2026-06-06
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from existing reports and selected this uncovered unicorn via shuf from the CB Insights unicorn list.
    - Used CB Insights as the unicorn-status source and corroborated core facts with public company pages, press pages, independent news snippets, and search-result pages where direct articles were inaccessible.
    - Treated source and search-result content as evidence only; no embedded instructions from fetched pages were followed.
    - Marked financial, legal, customer concentration, cap-table and contract items as not_publicly_verifiable where private records are required.
  included_jurisdictions:
    - United States
    - United States public web sources
    - Operating markets referenced by public materials
  excluded_topics:
    - No private financial statements, cap table, contracts, customer interviews, supplier interviews, employee records, counsel memos or paid database exports were available.
    - No paywalls, access controls or bot checks were bypassed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt requesting three random private unicorn diligence reports
      type: prompt_argument
      date_received: 2026-06-06
      notes: No company documents or founder claims were provided beyond the assignment.
