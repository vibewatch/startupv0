executive_summary:
  overall_assessment: impact.com remains eligible for public-source diligence as an uncovered private unicorn based on CB Insights and supporting public evidence; no public evidence found in this run showed IPO, acquisition, or shutdown.
  investment_or_diligence_thesis: impact.com shows substantial public SaaS scale signals and named enterprise customers, but diligence should focus on current ARR/retention, privacy-safe tracking durability, and customer-verified ROI because many traction metrics are company-authored and the disclosed valuation is from 2021.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: impact.com is a late-stage private SaaS unicorn valued at $1.5B after a 2021 financing.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: impact.com provides a unified partnership-management platform for affiliate, creator and referral programs.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: impact.com has broad enterprise adoption and cites 1M+ active partnerships plus named customer outcomes.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Privacy, tracking and attribution regulation pressure
    - risk_id: R-002
      summary: Valuation and ARR staleness since 2021 financing
    - risk_id: R-003
      summary: Company-authored ROI claims need customer verification
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue by product and geography, gross margin, cash burn and runway.
    - Cap table, financing documents, debt/warrants, option pool and liquidation preferences.
    - Customer/account concentration, churn, retention, pipeline, CAC/payback and cohort performance.
    - Material contracts, IP assignments, regulatory correspondence, litigation schedules and insurance coverage.
  recommended_next_steps:
    - Request a full financial and legal data room before investment reliance.
    - Interview management on the top three risks and reconcile public scale claims to source systems.
    - Run customer, supplier and counsel reference checks for claims that are company-authored or not publicly verifiable.
