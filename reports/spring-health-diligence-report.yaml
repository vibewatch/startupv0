    risk_category: customer
    severity: medium
    likelihood: medium
    description: Spring Health publicly references payer relationships, 27,000 groups through a channel partner, Guardian
      collaboration, and consultant/channel motions; economics and dependencies are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
