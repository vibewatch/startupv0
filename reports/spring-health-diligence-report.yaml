risk_register:
  - risk_id: R-001
    risk_title: Financial statements and revenue quality are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence supports valuation and funding history but not audited revenue, ARR, gross margin, burn,
      backlog, AR aging, or cash runway.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-026
    mitigation_or_diligence_request: Request audited financials, monthly management accounts, cohort ARR, gross margin,
      cash/burn, AR aging, and backlog.
  - risk_id: R-002
    risk_title: Preference stack and cap table complexity
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Multiple large preferred rounds imply possible liquidation preferences, option-pool expansion, and investor
      rights that materially affect common-equity economics.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
    mitigation_or_diligence_request: Request pro forma cap table, stock ledgers, option plan, debt/SAFE/note schedules, and financing documents.
  - risk_id: R-003
    risk_title: Outcome and ROI claims need independent substantiation
    risk_category: product
    severity: high
    likelihood: medium
    description: ROI, engagement, clinical outcomes, and fast-access claims are mostly company-hosted and require
      independent customer/claims validation.
    impacted_chapter_ids:
      - I
      - II
      - III
      - V
      - VI
    impacted_section_ids:
      - I.B
      - II.A
      - III.A
      - V.A
      - VI.B
    evidence_claim_ids:
      - EC-006
      - EC-010
      - EC-011
      - EC-031
    mitigation_or_diligence_request: Request study designs, customer claims analyses, third-party validation reports, and reference calls.
  - risk_id: R-004
    risk_title: Competitive pricing and feature pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Lyra, Modern Health, Headspace, BetterUp, Included Health, and Teladoc create direct and adjacent
      competition for employer mental-health budgets.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-007
      - EC-013
      - EC-021
      - EC-022
    mitigation_or_diligence_request: Benchmark win/loss, net revenue retention, pricing by segment, and competitive displacement data.
  - risk_id: R-005
    risk_title: Customer concentration and renewal risk are opaque
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Major logos and case studies are public, but revenue by customer, concentration, term lengths, utilization,
      and renewal health are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-005
      - EC-010
      - EC-011
      - EC-025
    mitigation_or_diligence_request: Request top-25 customer schedule, NRR/GRR, churn, renewal pipeline, and consented customer calls.
  - risk_id: R-006
    risk_title: PHI/privacy/security regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Spring Health handles health information and relies on healthcare-grade security/privacy controls across
      apps, providers, service providers, and global markets.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.G
    evidence_claim_ids:
      - EC-014
      - EC-015
      - EC-016
      - EC-027
      - EC-032
    mitigation_or_diligence_request: Review SOC 2/HITRUST/HIPAA artifacts, BAAs, DPIAs, breach logs, subprocessors, and global privacy compliance.
  - risk_id: R-007
    risk_title: Provider network quality and licensed-care capacity
    risk_category: operational
    severity: high
    likelihood: medium
    description: Therapy, medication management, crisis, and global-provider claims depend on provider availability,
      credentialing, QA, and state/country licensure.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - VIII.G
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-027
    mitigation_or_diligence_request: Request provider-network roster, credentialing files, utilization/capacity reports,
      quality metrics, and adverse-event reviews.
  - risk_id: R-008
    risk_title: AI clinical safety, bias, and explainability
    risk_category: technical
    severity: medium
    likelihood: high
    description: AI is a public product/positioning theme, but model cards, validation sets, bias testing, clinical
      safeguards, and human oversight are not public.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
      - VIII.G
    evidence_claim_ids:
      - EC-009
      - EC-019
      - EC-031
    mitigation_or_diligence_request: Request AI inventory, model risk assessments, clinical governance minutes, bias testing, and incident reports.
  - risk_id: R-009
