      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-023
      - EC-024
      - EC-032
    mitigation_or_diligence_request: Counsel should run PACER/state docket, arbitration, UCC, USPTO/TSDR, patent, open-source, and contract reviews.
  - risk_id: R-012
    risk_title: Revenue predictability and employer-benefit budget cyclicality
    risk_category: market
    severity: medium
    likelihood: medium
