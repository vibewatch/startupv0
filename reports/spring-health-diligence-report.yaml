diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR, revenue by product/channel/customer, gross margin, burn, cash
      runway, backlog, and AR aging.
    why_it_matters: Needed to underwrite valuation and revenue quality.
    suggested_source_or_request: "Company CFO/data room: audited financials, management accounts, ARR bridge, AR aging, cash/burn report."
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, financing documents, preference stack, option pool, debt/notes/warrants, investor rights.
    why_it_matters: Determines proceeds waterfall and dilution risk.
    suggested_source_or_request: "Company counsel/CFO: stock ledger, cap table, financing docs, debt schedule."
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
