executive_summary:
  overall_assessment: "Eligible private-unicorn screen: public evidence supports Spring Health as an active, private U.S.
    healthcare unicorn valued at $3.3B, but investment underwriting should pause on private financials, cap table,
    customer concentration, outcome substantiation, and HIPAA/provider-network diligence."
  investment_or_diligence_thesis: Spring Health has credible public traction signals in employer/health-plan mental
    health, major-logo references, and late-stage financing; the diligence case turns on whether revenue quality,
    retention, provider capacity, ROI claims, AI governance, and privacy/security controls support the valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: $100M Series E at $3.3B and CB Insights $3.3B unicorn row are publicly supported.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-003
      summary: Product scope as EAP+/connected mental-health platform is supported by company product pages.
      evidence_claim_ids:
        - EC-007
        - EC-008
    - founder_claim_id: FC-006
      summary: Major customer/logo and case-study leads are public, though customer economics are not.
      evidence_claim_ids:
        - EC-010
        - EC-011
        - EC-025
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, revenue quality, ARR, burn, and runway are not public.
    - risk_id: R-006
      summary: PHI/privacy/security and provider-network regulatory exposure is central to the business.
    - risk_id: R-004
      summary: Direct and adjacent competitors create intense pricing, feature, and ROI-proof pressure.
  key_evidence_gaps:
    - Audited financials, management accounts, ARR, gross margin, cash runway, and AR aging
    - Fully diluted cap table, preferences, debt/notes, option pool, and investor rights
    - Top-25 customer revenue, active lives, utilization, NRR/GRR, churn, and renewal schedule
    - Provider-network capacity/credentialing, clinical outcomes methodology, AI validation, and safety records
    - SOC 2/HITRUST/HIPAA artifacts, BAAs, subprocessors, breach logs, litigation/regulatory schedules
  recommended_next_steps:
    - Run founder/company data-room request list before valuation work.
    - Conduct customer reference calls with at least five top customers and one payer/channel partner.
    - Have counsel run HIPAA/privacy, provider licensure, AI claims, litigation, IP, and material-contract reviews.
    - Benchmark Spring Health pricing and win/loss against Lyra, Modern Health, Headspace, Included Health, Teladoc, and
      BetterUp.
    - Reconcile public scale claims (5M/10M/20M lives) to dated internal KPI definitions.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Spring Health remains eligible as a private unicorn based on CB Insights and company financing
      announcements, but core financial statements, revenue quality, runway, cap table, and debt terms are not publicly
      verifiable.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-026
    risk_ids:
      - R-001
      - R-002
      - R-012
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public evidence provides financing and directional growth signals, not financial statements.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Audited income statements, balance sheets, cash flows, backlog, AR aging, and revenue breakdowns were not
              publicly available in reviewed sources.
            evidence_claim_ids:
              - EC-026
            risk_ids:
              - R-001
              - R-012
          - finding_id: I.A-F2
            finding: The Series C announcement gives only a directional “approximately 6x revenue growth” signal without revenue
              dollars.
            evidence_claim_ids:
              - EC-003
              - EC-026
            risk_ids:
              - R-001
        hidden_risks:
          - Valuation cannot be underwritten without revenue quality, gross margin, burn, and cash runway.
        evidence_gaps:
          - Audited financials, management reports, revenue by product/channel/geography/customer, backlog, AR aging.
        follow_up_questions:
          - Provide audited and unaudited monthly financials for FY2023-FY2026 YTD with revenue bridge and gross margin
            detail.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-026
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers are public; projections, assumptions, and financing needs are private.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Public scale and ROI claims suggest growth drivers, but no public three-year projection, scenario model, or
              financing assumption was found.
            evidence_claim_ids:
              - EC-005
              - EC-006
              - EC-025
              - EC-028
            risk_ids:
              - R-001
              - R-012
          - finding_id: I.B-F2
            finding: Global expansion and multiple GTM channels add forecast complexity.
            evidence_claim_ids:
              - EC-012
              - EC-028
            risk_ids:
              - R-006
              - R-009
              - R-012
        hidden_risks:
          - Employer-benefit budgets and utilization guarantees may pressure projections.
        evidence_gaps:
          - Forecast model, assumptions, pipeline, renewal/churn, capex/working capital, external financing assumptions.
        follow_up_questions:
          - Provide board-approved three-year plan with downside cases, pipeline conversion, retention, and financing
            runway.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-012
          - EC-025
          - EC-028
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Named investors and founders are public; ownership, preferences, options, warrants, and debt are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
