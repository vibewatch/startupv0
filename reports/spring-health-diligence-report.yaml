report_metadata:
  report_title: Spring Health Diligence Research Report
  target_company: Spring Health
  website: https://www.springhealth.com/
  known_aliases:
    - Spring Care, Inc.
    - Spring Health™
    - Spring Care™
  sector: Healthcare & Life Sciences
  geography: United States
  company_stage: Private unicorn / growth-stage digital health
  research_date: 2026-06-06
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company-owned website, news, product, customer, trust, privacy, terms, careers, and sitemap pages
    - Public unicorn/funding databases and financing announcements
    - Customer/case-study pages and public competitor websites
    - Public legal-record search and healthcare/privacy/security disclosure review
    - No private data rooms, secrets, paywalled databases, or non-public systems used
  included_jurisdictions:
    - United States
    - New York
    - Global markets only where publicly claimed by Spring Health
  excluded_topics:
    - Private financial statements, cap table, customer contracts, provider contracts, source code, non-public
      SOC/HITRUST artifacts, non-public legal records, and private employee data
  user_provided_materials:
    - material_id: UPM-001
      title: Selected candidate list entry for Spring Health
      type: user_prompt
      date_received: 2026-06-06
      notes: Provided latest_known_valuation $3.3B, sector Healthcare & Life Sciences, country United States, and CB Insights
        unicorn-list source.
