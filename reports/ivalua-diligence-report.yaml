diligence_gaps:
- gap_id: G-001
  chapter_id: I
  section_id: I.A
  missing_information: Audited financial statements and monthly management accounts
    for FY2023-FY2025/YTD.
  why_it_matters: Required to validate revenue, margins, cash flow, profitability
    and debt claims.
  suggested_source_or_request: Audited financials, trial balance, monthly board packs
    and CFO interview.
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.B
  missing_information: Three-year operating plan with ARR, bookings, churn, CAC, cash,
    capex and FX assumptions.
  why_it_matters: Determines predictability and funding needs.
  suggested_source_or_request: Board-approved base/upside/downside plan and model
    audit.
  priority: high
- gap_id: G-003
  chapter_id: I
  section_id: I.C
  missing_information: Fully diluted cap table, preferences, debt, warrants and option
    pool.
  why_it_matters: Controls ownership, proceeds and dilution economics.
  suggested_source_or_request: Financing documents, Carta/export, debt/lease schedule
    and waterfall.
  priority: high
- gap_id: G-004
  chapter_id: III
  section_id: III.C
  missing_information: Top customer ARR/revenue, customers over 5%, retention and
    churn.
  why_it_matters: Validates concentration and revenue durability.
  suggested_source_or_request: Top-50 customer schedule and cohort retention analysis.
  priority: high
- gap_id: G-005
  chapter_id: III
  section_id: III.E
  missing_information: Critical supplier, cloud, subprocessor and integration dependency
    list.
  why_it_matters: Identifies operational, SLA and data-privacy dependencies.
  suggested_source_or_request: Vendor spend report, subprocessor list and architecture
    review.
  priority: high
- gap_id: G-006
  chapter_id: IV
  section_id: IV.A
  missing_information: Competitive win/loss, pricing benchmarks, discounting and market
    share.
  why_it_matters: Validates durability of Gartner/market positioning.
  suggested_source_or_request: Salesforce opportunity history, win/loss interviews
    and pricing analysis.
  priority: medium
- gap_id: G-007
  chapter_id: V
  section_id: V.D
  missing_information: Sales productivity, quota attainment, CAC payback and sales
    cycle.
  why_it_matters: Determines if growth can be scaled efficiently.
  suggested_source_or_request: Revenue-ops dashboards and sales cohort analysis.
  priority: high
- gap_id: G-008
  chapter_id: VI
  section_id: VI.B
  missing_information: AI governance, model architecture, release roadmap, adoption
    and red-team results.
  why_it_matters: Agentic AI is a key product claim and risk surface.
  suggested_source_or_request: AI policy, model cards, audits, release notes and usage
    telemetry.
  priority: high
- gap_id: G-009
  chapter_id: VII
  section_id: VII.G
  missing_information: Turnover, compensation, equity-incentive plan and employee-relations
    history.
  why_it_matters: Large global workforce and key technical leaders require retention
    validation.
  suggested_source_or_request: HRIS exports, comp plans, stock-plan docs and employee-relations
    register.
  priority: medium
- gap_id: G-010
  chapter_id: VIII
  section_id: VIII.A
  missing_information: Complete litigation, dispute, claim and insurance register.
