executive_summary:
  overall_assessment: 'Ivalua appears to remain an eligible private operating unicorn
    in enterprise source-to-pay software, with public evidence of a $1.10B unicorn
    listing, active 2025 growth claims, large enterprise customers, broad product
    coverage, analyst recognition and substantial partner ecosystem. The main diligence
    posture is constructive but data-room dependent: financial quality, customer concentration,
    AI/security governance, legal exposure and cap-table economics cannot be fully
    verified from public sources.'
  investment_or_diligence_thesis: If management substantiates ARR quality, retention,
    profitability, AI governance and low legal exposure, Ivalua could represent a
    mature procurement software platform benefiting from AI-driven enterprise procurement
    modernization. Downside risk centers on opaque private financials, competitive
    pricing pressure, implementation complexity and undisclosed contractual/legal
    obligations.
