    - finding_id: VIII.F-F2
      finding: Customer case studies imply complex integration and compliance commitments.
      evidence_claim_ids:
      - EC-019
      risk_ids:
      - R-007
      - R-008
    hidden_risks:
    - Contract terms may include onerous SLAs, implementation milestones, acceptance
      criteria, indemnities or termination rights.
    evidence_gaps:
    - Top customer contracts, MSAs/order forms, partner agreements, SLAs, DPAs and
      material vendor contracts.
    follow_up_questions:
    - Provide material-contract schedule and top 20 customer agreements.
    table_ids:
    - T-022
    - T-024
    figure_ids: []
    evidence_claim_ids:
    - EC-016
    - EC-019
  - section_id: VIII.G
    title: Regulatory agency problems
    checklist_question_ids:
    - VIII.G
    summary: No public regulatory enforcement action was identified in the sources
      reviewed. Privacy, TISAX and EcoVadis evidence are positive controls, but formal
      compliance scope and regulatory correspondence are not public.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VIII.G-F1
      finding: Privacy policy and TISAX AL2 support regulated enterprise diligence,
        subject to validation of scope.
      evidence_claim_ids:
      - EC-012
      - EC-013
      risk_ids:
      - R-008
    - finding_id: VIII.G-F2
      finding: SEC ticker search did not reveal a public issuer match, supporting
        but not proving private status.
      evidence_claim_ids:
      - EC-017
      risk_ids:
      - R-006
    hidden_risks:
    - Data privacy, AI regulation, export controls and public-sector procurement obligations
      can create undisclosed regulatory exposure.
    evidence_gaps:
    - Regulatory inquiries, DPA/SOC reports, ISO certificates, AI governance, subprocessor
      list and public-sector compliance evidence.
    follow_up_questions:
    - Provide compliance register, SOC/ISO/TISAX evidence and privacy/security audits.
    table_ids:
    - T-023
    figure_ids:
    - F-011
    evidence_claim_ids:
    - EC-012
    - EC-013
    - EC-017
