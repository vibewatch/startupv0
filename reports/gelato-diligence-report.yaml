report_metadata:
  report_title: "Gelato Startup Diligence Report"
  target_company: "Gelato"
  website: "https://www.gelato.com/"
  known_aliases:
    - "Gelato ASA"
    - "GelatoCreate"
    - "GelatoConnect"
    - "Optimalprint"
  sector: "Print-on-demand software, creator commerce, and distributed print fulfillment"
  geography: "Norway-headquartered with global production and logistics network"
  company_stage: "Private unicorn"
  research_date: "2026-05-15"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "Europe/Oslo"

research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Selected Gelato at random from a parsed current unicorn list after excluding slugs already present in reports."
    - "Prioritized company-owned product, pricing, legal, privacy, trust, leadership, board, developer, and support materials."
    - "Supplemented with independent news, the Norwegian company register, Shopify market education, and competitor pricing pages where accessible."
    - "Avoided inaccessible, blocked, or unrelated pages; Bloomberg was blocked, Grand View Research returned an access block, DuckDuckGo later returned anomaly pages, and one CB Insights result appeared to describe an unrelated frozen-dessert company."
  included_jurisdictions:
    - "Norway"
    - "United States where Gelato terms and copyright-agent provisions apply"
    - "European Union and international transfer regimes where privacy materials apply"
    - "Global fulfillment markets described by Gelato-owned sources"
  excluded_topics:
    - "Private data-room financial statements, monthly management accounts, bank statements, cap table, option plan, debt agreements, board minutes, supplier contracts, insurance policies, and customer contracts were not available."
    - "Non-public customer references, partner production contracts, security audit reports, penetration-test results, incident logs, employee records, and legal docket searches requiring paid or authenticated access were not accessed."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Autonomous random-unicorn diligence request"
      type: "workflow_request"
      date_received: "2026-05-15"
      notes: "No founder deck, private data room, financial model, customer references, or management responses were provided."

founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Gelato operates the world's largest print-on-demand network, enabling local production in 32 countries through 140+ print providers and 60+ logistics partners."
    claim_source: "Gelato print-on-demand page"
    claim_date: null
    mapped_chapter_ids: ["II", "III", "V"]
    mapped_section_ids: ["II.A", "III.E", "V.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-004", "EC-020"]
    contradiction_summary: "Gelato's own pages support the network-size, country-count, local-production, and logistics claims, but independent verification of provider count, order allocation, service levels, and utilization was not public."
    diligence_follow_up:
      - "Request the current provider roster, executed partner agreements, volume by provider, SLA history, dispute history, and independent customer delivery metrics."
  - founder_claim_id: "FC-002"
    claim_text: "Gelato became a unicorn in August 2021 after a US$240 million financing round at a US$1.05 billion valuation."
    claim_source: "Business Insider financing article and public unicorn list"
    claim_date: "2021-08-16"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.B", "I.C"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-001", "EC-002"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request the financing documents, security class, liquidation preferences, investor rights, board consents, and current fully diluted ownership."
  - founder_claim_id: "FC-003"
    claim_text: "GelatoConnect is an AI-powered, machine-agnostic operating system for print production that improves margins through procurement, workflow, logistics, automation, and carrier selection."
    claim_source: "Gelato about and GelatoConnect pages"
    claim_date: null
    mapped_chapter_ids: ["II", "VI"]
    mapped_section_ids: ["II.A", "VI.B"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-005", "EC-016", "EC-017"]
    contradiction_summary: "The product modules and case-study metrics are public, but the operating results are company-published and require customer and cohort-level validation."
    diligence_follow_up:
      - "Interview referenced customers and request before-after KPI exports, implementation timelines, support tickets, churn data, and gross-margin bridge by module."
  - founder_claim_id: "FC-004"
    claim_text: "Gelato has enterprise-grade trust controls including ISO/IEC 27001 certification, GDPR alignment, encryption at rest and in transit, AWS hosting with EU residency options, and regular penetration testing."
    claim_source: "Gelato Trust Centre and privacy policy"
    claim_date: null
    mapped_chapter_ids: ["VIII", "VI"]
    mapped_section_ids: ["VIII.G", "VI.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-010", "EC-011"]
    contradiction_summary: "Controls are described on Gelato-owned pages; public sources did not include the full certificate scope, SOC reports, penetration-test summaries, incident history, or DPA execution evidence."
    diligence_follow_up:
      - "Request ISO certificate scope, latest audit findings, SOC reports if any, penetration-test executive summaries, incident log, subprocessor list, and DPIA/transfer-impact documentation."
  - founder_claim_id: "FC-005"
    claim_text: "Gelato offers a low-friction creator commerce product with free entry, paid subscriptions, ecommerce integrations, REST API access, and local fulfillment."
    claim_source: "Gelato subscription, API, and print-on-demand pages"
    claim_date: null
    mapped_chapter_ids: ["II", "V"]
    mapped_section_ids: ["II.A", "V.C"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-004", "EC-006", "EC-007"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request active merchants, paid conversion by plan, API volume, gross merchandise value, churn, NRR, CAC/payback, and contribution margin by channel."

executive_summary:
  overall_assessment: >-
    Gelato is a credible Norway-headquartered private unicorn in print-on-demand software and distributed fulfillment, with independently reported 2021 financing at a US$1.05 billion valuation and a current Norwegian registry record for Gelato ASA. Public evidence supports a real global POD platform, a two-sided creator and print-producer model, and a substantial product surface spanning GelatoCreate, GelatoConnect, ecommerce integrations, API access, pricing tiers, and trust/legal materials. The main diligence issue is not existence or basic product-market relevance; it is whether the heavily company-published operating claims translate into durable, profitable, defensible unit economics in a crowded, price-sensitive fulfillment market.
  investment_or_diligence_thesis: >-
    Continue to second-stage diligence, but treat the opportunity as high-information-gap. Public sources verify the unicorn financing event, active Norwegian corporate status, broad product footprint, and market demand for print-on-demand. Investment readiness depends on private validation of revenue scale, growth, gross margin, provider-level economics, churn, customer concentration, cap-table terms, supplier SLAs, legal exposure from user-generated content, privacy controls, and whether GelatoConnect creates defensible software margins rather than only fulfillment take-rate economics.
  strongest_verified_claims:
    - founder_claim_id: "FC-002"
      summary: "Business Insider reported a US$240 million August 2021 round at a US$1.05 billion valuation, with Insight Partners leading and SoftBank Vision Fund 2 participating."
      evidence_claim_ids: ["EC-002"]
    - founder_claim_id: "FC-005"
      summary: "Gelato publicly discloses a free plan, paid Gelato+ subscriptions, custom Platinum pricing, ecommerce integrations, API access, and local production across 32 countries."
      evidence_claim_ids: ["EC-004", "EC-006", "EC-007"]
    - founder_claim_id: "FC-004"
      summary: "Gelato's Trust Centre discloses ISO/IEC 27001 certification, GDPR posture, encryption at rest and in transit, AWS hosting with EU residency options, and regular penetration testing."
      evidence_claim_ids: ["EC-010"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Revenue, margins, burn, runway, debt, and unit economics are not publicly verifiable."
    - risk_id: "R-002"
      summary: "Quality, delivery, cost, and customer experience depend on a distributed third-party print and logistics network."
    - risk_id: "R-003"
      summary: "Competitive pricing pressure is high because Printful, Printify, Prodigi, marketplaces, and ecommerce platforms offer overlapping POD, API, and integration value propositions."
  key_evidence_gaps:
    - "Audited financial statements, monthly ARR/GMV, gross margin, contribution margin, burn, cash, debt, and runway."
    - "Current cap table, liquidation preferences, option pool, board rights, financing covenants, and any secondary or debt transactions after 2021."
    - "Customer cohorts, merchant concentration, churn, NRR, CAC/payback, paid-plan conversion, API usage, and GelatoConnect renewal metrics."
    - "Provider and carrier SLAs, concentration, defect/reprint rates, late-delivery rates, quality credits, inventory and capacity constraints, and supplier contract terms."
    - "Legal docket searches, IP registrations, infringement notices, privacy incidents, security audit reports, insurance policies, and regulatory correspondence."
  recommended_next_steps:
    - "Run confirmatory financial diligence on revenue, GMV, margin, cash, debt, runway, and cohort-level economics before underwriting valuation."
    - "Validate the global network by sampling top print providers, logistics partners, and referenced customers across regions."
    - "Benchmark GelatoCreate and GelatoConnect pricing, delivery, product breadth, support quality, and gross margin against Printful, Printify, Prodigi, and marketplace alternatives."
    - "Review privacy, transfer-impact, security, incident-response, user-content moderation, IP takedown, insurance, and supplier compliance controls."

chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: >-
      Public evidence verifies Gelato's August 2021 unicorn financing and active Norwegian corporate registration, but financial statements, revenue, ARR, GMV, gross margin, burn, debt, cash balance, runway, and detailed cap-table economics were not public in this run.
    founder_claim_ids: ["FC-002"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-003", "EC-018", "EC-019"]
    risk_ids: ["R-001", "R-005", "R-008"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3", "I.A.4", "I.A.5", "I.A.6"]
        summary: >-
          No audited financial statements, quarterly results, revenue, ARR, GMV, gross margin, EBITDA, cash-flow, or burn disclosures were found in public sources. The Norwegian register indicates Gelato ASA submitted 2024 annual accounts, but the public API excerpt did not provide financial-statement line items.
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "I.A-F1"
            finding: "Public sources reviewed do not provide revenue, margin, cash, debt, or burn metrics needed to evaluate financial quality."
            evidence_claim_ids: ["EC-018"]
            risk_ids: ["R-001"]
          - finding_id: "I.A-F2"
            finding: "Gelato ASA is listed in the Norwegian register with 2024 annual accounts submitted, but line-item accounts require separate document retrieval and accounting review."
            evidence_claim_ids: ["EC-003"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "The 2021 valuation may no longer be representative if growth slowed, margins compressed, later financing repriced the company, or liquidity terms changed."
          - "Creator commerce and distributed fulfillment can show top-line scale while masking low product gross margin, high support/reprint cost, and working-capital volatility."
        evidence_gaps:
          - "Audited FY2023-FY2025 financials, monthly management accounts, revenue recognition policy, cohort-level gross margin, cash, debt, burn, and runway."
        follow_up_questions:
          - "What are current ARR, GMV, net revenue, gross margin, contribution margin, cash, debt, monthly burn, and runway by GelatoCreate and GelatoConnect?"
        table_ids: ["T-003"]
        figure_ids: []
        evidence_claim_ids: ["EC-003", "EC-018"]
      - section_id: "I.B"
        title: "Financial projections and financing history"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3", "I.B.4", "I.B.5", "I.B.6", "I.B.7", "I.B.8"]
        summary: >-
          The latest independently reported priced financing found was the August 2021 US$240 million round at a US$1.05 billion valuation. No current company forecast, board-approved plan, later financing, down-round, debt, or secondary transaction details were public.
        verification_status: "partially_verified"
        confidence: "high"
        key_findings:
          - finding_id: "I.B-F1"
            finding: "Business Insider reported Gelato raised US$240 million in August 2021 at a US$1.05 billion valuation."
            evidence_claim_ids: ["EC-002"]
            risk_ids: ["R-005"]
          - finding_id: "I.B-F2"
            finding: "The public unicorn list includes Gelato as a Norway-based unicorn with a US$1+ billion valuation date in August 2021."
            evidence_claim_ids: ["EC-001"]
            risk_ids: ["R-005"]
        hidden_risks:
          - "Post-2021 valuation marks, liquidation preferences, anti-dilution, secondary sales, or debt covenants may materially alter common-equity value."
        evidence_gaps:
          - "Current forecast, board plan, financing documents, investor consents, bridge/debt facilities, and capitalization waterfall."
        follow_up_questions:
          - "Has Gelato raised equity, debt, secondary, SAFE, or convertible financing after August 2021, and on what terms?"
        table_ids: ["T-001"]
        figure_ids: ["F-001", "F-002"]
        evidence_claim_ids: ["EC-001", "EC-002", "EC-018"]
      - section_id: "I.C"
        title: "Capital structure"
        checklist_question_ids: ["I.C.1", "I.C.2", "I.C.3", "I.C.4", "I.C.5"]
        summary: >-
          Public evidence identifies named investors and board representatives but not the full cap table. The Norwegian register identifies Gelato ASA as an ASA with NOK share capital and shares registered in 2025, but the beneficial ownership, preference stack, options, and investor rights are not public in the sources reviewed.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.C-F1"
            finding: "Business Insider named Insight Partners, SoftBank Vision Fund 2, Goldman Sachs Asset Management funds, Dawn Capital, and SEB Pension Fund as financing participants."
            evidence_claim_ids: ["EC-002"]
            risk_ids: ["R-005"]
          - finding_id: "I.C-F2"
            finding: "Gelato's board page names board members connected to Insight, Dawn Capital, Morgan Stanley, Norfund/Northzone, and Optimizely backgrounds."
            evidence_claim_ids: ["EC-009"]
            risk_ids: ["R-005"]
        hidden_risks:
          - "Investor governance, vetoes, liquidation preferences, option-pool refreshes, or pay-to-play terms may change economics and exit optionality."
        evidence_gaps:
          - "Fully diluted cap table, option ledger, shareholder agreements, liquidation waterfall, investor rights, and board minutes approving financings."
        follow_up_questions:
          - "What are the current fully diluted ownership, liquidation preferences, option pool, board composition rights, and major consent rights?"
        table_ids: ["T-002"]
        figure_ids: []
        evidence_claim_ids: ["EC-002", "EC-003", "EC-009"]
      - section_id: "I.D"
        title: "Other financial information"
        checklist_question_ids: ["I.D.1", "I.D.2", "I.D.3"]
        summary: >-
          Registry evidence supports that Gelato ASA is active and not flagged as bankrupt, liquidating, or under forced dissolution. Public research did not identify an IPO, acquisition, or shutdown, but this is not a substitute for counsel confirmation or exchange-listing checks.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.D-F1"
            finding: "Norwegian registry data lists Gelato ASA as active, not bankrupt, not under liquidation, and not under forced dissolution."
            evidence_claim_ids: ["EC-003", "EC-019"]
            risk_ids: ["R-008"]
        hidden_risks:
          - "Corporate group complexity may be larger than the single Norwegian parent record shows; subsidiaries, intercompany IP, and tax structures require legal/accounting review."
        evidence_gaps:
          - "Group structure chart, subsidiary list, statutory accounts, tax filings, debt/lien searches, and counsel confirmation of private status."
        follow_up_questions:
          - "Provide a legal entity chart with jurisdictions, ownership, intercompany agreements, statutory filings, and debt/lien schedules."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-003", "EC-019"]
  - chapter_id: "II"
    title: "Products"
    chapter_summary: >-
      Gelato publicly describes a broad product surface: GelatoCreate for merchants and creators, GelatoConnect for print producers, subscription tiers, ecommerce integrations, REST API access, and production routing through local print partners. Product breadth is well evidenced, while product margin, retention, reliability, and relative performance require private data and user validation.
    founder_claim_ids: ["FC-001", "FC-003", "FC-005"]
    evidence_claim_ids: ["EC-004", "EC-005", "EC-006", "EC-007", "EC-016"]
    risk_ids: ["R-002", "R-003", "R-004", "R-007"]
    sections:
      - section_id: "II.A"
        title: "Description of each product"
        checklist_question_ids: ["II.A.1", "II.A.2", "II.A.3", "II.A.4", "II.A.5", "II.A.6"]
        summary: >-
          GelatoCreate gives creators and ecommerce sellers custom products, design tools, store integrations, API access, and local production without inventory. GelatoConnect targets print producers with estimating, order intake, procurement, workflow, logistics, apparel, and white-label storefront modules. The product-market logic is credible, but the source base is mainly Gelato-published.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "II.A-F1"
            finding: "Gelato publicly discloses custom product categories, zero-inventory POD, free design tools, ecommerce integrations, local production in 32 countries, 140+ print providers, and 60+ logistics partners."
            evidence_claim_ids: ["EC-004"]
            risk_ids: ["R-002", "R-003"]
          - finding_id: "II.A-F2"
            finding: "GelatoConnect is positioned as a machine-agnostic OS for print producers with procurement, workflow, logistics, estimating, apparel, and storefront modules."
            evidence_claim_ids: ["EC-005", "EC-016"]
            risk_ids: ["R-004"]
          - finding_id: "II.A-F3"
            finding: "The REST API uses JSON, API keys, HTTPS, and conventional HTTP error handling, supporting platform integration use cases."
            evidence_claim_ids: ["EC-007"]
            risk_ids: ["R-004"]
        hidden_risks:
          - "POD customer experience depends on partner capacity, catalog consistency, carrier performance, and exception handling that are not fully controlled by software."
          - "Claims of AI-driven operating improvements require independent customer validation and may not generalize across print facilities."
        evidence_gaps:
          - "Product-level revenue, attach rates, retention, support load, API uptime, incident history, feature adoption, and customer satisfaction by product line."
        follow_up_questions:
          - "Which products generate the most revenue and gross profit, and what are churn, expansion, and support-ticket trends by product line?"
        table_ids: ["T-004", "T-005"]
        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-004", "EC-005", "EC-006", "EC-007", "EC-016"]
  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: >-
      Public customer evidence consists largely of company-published case-study snippets and website references rather than customer contracts, revenue shares, churn cohorts, or independent references. Strategic relationships are visible through ecommerce integrations, print partners, logistics partners, cloud subprocessors, and referenced GelatoConnect customers.
    founder_claim_ids: ["FC-001", "FC-003", "FC-005"]
    evidence_claim_ids: ["EC-004", "EC-010", "EC-017", "EC-020"]
    risk_ids: ["R-002", "R-006", "R-007"]
    sections:
      - section_id: "III.A"
        title: "Top customers by application"
        checklist_question_ids: ["III.A"]
        summary: >-
          Gelato publishes examples and customer-result snippets, including ESP Colour and Bennett Graphics for GelatoConnect, but top customers, revenue by account, contract terms, churn, and expansion were not public.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.A-F1"
            finding: "GelatoConnect pages publicly name ESP Colour and Bennett Graphics with operating-result claims."
            evidence_claim_ids: ["EC-017"]
            risk_ids: ["R-006"]
        hidden_risks:
          - "Public case studies may overrepresent successful customers and omit failed implementations, churned accounts, or low-margin segments."
        evidence_gaps:
          - "Top 20 customers by revenue, contract dates, churn/NRR, case-study permissions, and customer reference calls."
        follow_up_questions:
          - "Provide top customer schedule, retention cohorts, reference access, and cohort-level revenue concentration by creator, enterprise, and print-producer segments."
        table_ids: ["T-006"]
        figure_ids: ["F-004"]
        evidence_claim_ids: ["EC-017", "EC-018"]
      - section_id: "III.B"
        title: "Strategic relationships"
        checklist_question_ids: ["III.B"]
        summary: >-
          Public relationship evidence includes integrations with Shopify, Etsy, WooCommerce, TikTok Shop, Amazon, Wix, Squarespace, BigCommerce, API/Order Desk references, plus print-provider and logistics-network claims. The economic and contractual terms of those relationships are not public.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.B-F1"
            finding: "Gelato advertises one-click ecommerce integrations and API connectivity as acquisition and fulfillment infrastructure."
            evidence_claim_ids: ["EC-004", "EC-007"]
            risk_ids: ["R-003"]
        hidden_risks:
          - "Platform-policy changes, app-store ranking shifts, API changes, and marketplace competition could impair acquisition or fulfillment workflows."
        evidence_gaps:
          - "Executed partner agreements, app marketplace metrics, integration uptime, and economic terms for platforms and order-management partners."
        follow_up_questions:
          - "Which integrations produce the most GMV and paid subscriptions, and what platform or app-store dependencies could alter access?"
        table_ids: ["T-007"]
        figure_ids: []
        evidence_claim_ids: ["EC-004", "EC-007"]
      - section_id: "III.C"
        title: "Revenue by customer"
        checklist_question_ids: ["III.C"]
        summary: >-
          Revenue by customer, customer concentration, churn, renewal status, and account-level gross margin were not public.
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "III.C-F1"
            finding: "No public customer concentration schedule or revenue-by-customer disclosure was found."
            evidence_claim_ids: ["EC-018"]
            risk_ids: ["R-006"]
        hidden_risks:
          - "Concentration may sit either in large merchants, enterprise print producers, specific ecommerce channels, or a small set of print/logistics providers."
        evidence_gaps:
          - "Revenue by top customer, segment, channel, geography, and product, plus churn and expansion cohorts."
        follow_up_questions:
          - "What percentage of revenue and gross profit is generated by the top 10 customers, top 10 providers, and top 5 ecommerce channels?"
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-018"]
      - section_id: "III.D"
        title: "Significant relationships severed within the last two years"
        checklist_question_ids: ["III.D"]
        summary: >-
          Public sources reviewed did not identify material severed customer, provider, or platform relationships, but absence of public reports does not verify relationship stability.
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "III.D-F1"
            finding: "No public list of lost customers, terminated providers, or severed channel partners was identified."
            evidence_claim_ids: ["EC-018"]
            risk_ids: ["R-006"]
        hidden_risks:
          - "Provider or enterprise-customer churn can be commercially sensitive and may not appear in public sources."
        evidence_gaps:
          - "Lost account list, termination notices, provider offboarding history, and postmortems for failed deployments."
        follow_up_questions:
          - "Which customer, provider, or platform relationships have ended since 2024, and why?"
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-018"]
      - section_id: "III.E"
        title: "Top suppliers"
        checklist_question_ids: ["III.E"]
        summary: >-
          The company discloses a distributed production network and key technology subprocessors, but not supplier spend, provider concentration, carrier concentration, contractual SLAs, right-to-audit provisions, or contingency capacity.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.E-F1"
            finding: "Gelato discloses 140+ print providers, 60+ logistics partners, cloud subprocessors including AWS, Google Cloud, Cloudflare, Datadog, and collaboration/security vendors."
            evidence_claim_ids: ["EC-004", "EC-010"]
            risk_ids: ["R-002", "R-007"]
        hidden_risks:
          - "Service quality and margin may depend on supplier-level concentration, carrier cost inflation, local capacity, and vendor security posture."
        evidence_gaps:
          - "Supplier contracts, provider volume concentration, carrier rate cards, security addenda, DPAs, and business-continuity test results."
        follow_up_questions:
          - "Provide top print-provider and carrier concentration, SLA compliance, incident history, contract renewal dates, and fallback capacity by geography."
        table_ids: ["T-008"]
        figure_ids: []
        evidence_claim_ids: ["EC-004", "EC-010", "EC-020"]
  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: >-
      The print-on-demand category is large and growing, but competition is broad: vertically integrated POD vendors, print networks, marketplaces, ecommerce platforms, and local print providers can all capture parts of the value chain. Gelato's differentiated claim is a global local-production network plus GelatoConnect software for print producers, but pricing and feature pressure are visible.
    founder_claim_ids: ["FC-001", "FC-003"]
    evidence_claim_ids: ["EC-004", "EC-005", "EC-014", "EC-015", "EC-016"]
    risk_ids: ["R-003", "R-004"]
    sections:
      - section_id: "IV.A"
        title: "Competitive landscape by market segment"
        checklist_question_ids: ["IV.A.1", "IV.A.2"]
        summary: >-
          Shopify describes POD as a growing category that reached almost US$11 billion globally in 2025 and is projected to grow at 23.6% annually through 2033. Competitors have free tiers, discounts, broad catalogs, integrations, and APIs, which creates price and feature pressure against Gelato's free/Gelato+/Platinum structure.
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "IV.A-F1"
            finding: "POD market demand is supported by Shopify's category education and cited market-size/growth estimate."
            evidence_claim_ids: ["EC-014"]
