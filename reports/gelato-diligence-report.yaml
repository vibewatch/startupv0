risk_register:
  - risk_id: "R-001"
    risk_title: "Financial quality and runway not publicly verifiable"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Revenue, ARR, GMV, gross margin, cash, debt, burn, and runway are not public, making valuation and solvency underwriting impossible without data-room materials."
    impacted_chapter_ids: ["I", "V"]
    impacted_section_ids: ["I.A", "I.B", "V.D", "V.E"]
    evidence_claim_ids: ["EC-003", "EC-018"]
    mitigation_or_diligence_request: "Request audited financials, management accounts, bank statements, debt schedules, board plan, cohort economics, and cash/runway model."
  - risk_id: "R-002"
    risk_title: "Distributed print and logistics dependency"
    risk_category: "operational"
    severity: "high"
    likelihood: "high"
    description: "Gelato's customer experience depends on independent local printers and carriers, creating quality, capacity, compliance, and delivery risks."
    impacted_chapter_ids: ["II", "III", "VIII"]
    impacted_section_ids: ["II.A", "III.E", "VIII.F"]
    evidence_claim_ids: ["EC-004", "EC-020"]
    mitigation_or_diligence_request: "Review provider/carrier contracts, volume concentration, SLA history, quality metrics, defect/reprint rates, and contingency capacity."
  - risk_id: "R-003"
    risk_title: "Competitive pricing and commoditization pressure"
    risk_category: "market"
    severity: "high"
    likelihood: "high"
    description: "Printful, Printify, Prodigi, and ecommerce platforms offer overlapping POD, integration, discount, and API capabilities."
    impacted_chapter_ids: ["II", "IV", "V"]
    impacted_section_ids: ["II.A", "IV.A", "V.A"]
    evidence_claim_ids: ["EC-006", "EC-014", "EC-015"]
    mitigation_or_diligence_request: "Perform SKU-level landed-cost, delivery-speed, quality, support, and retention benchmarking by geography."
  - risk_id: "R-004"
    risk_title: "GelatoConnect ROI and technical defensibility unproven publicly"
    risk_category: "technical"
    severity: "medium"
    likelihood: "medium"
    description: "GelatoConnect product and AI claims are specific but company-published; module adoption, ROI, retention, and integration complexity are not public."
    impacted_chapter_ids: ["II", "IV", "VI"]
    impacted_section_ids: ["II.A", "IV.A", "VI.B"]
    evidence_claim_ids: ["EC-005", "EC-007", "EC-016", "EC-017"]
    mitigation_or_diligence_request: "Validate module-level ARR, implementation costs, NRR, uptime, customer references, and before-after KPI exports."
  - risk_id: "R-005"
    risk_title: "Cap table, preference stack, and post-2021 valuation unknown"
    risk_category: "financing"
    severity: "high"
    likelihood: "medium"
    description: "The latest public valuation is from 2021; current cap table, liquidation preferences, post-2021 financing, debt, and secondary activity are not public."
    impacted_chapter_ids: ["I", "VII"]
    impacted_section_ids: ["I.B", "I.C", "VII.E"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-009", "EC-018"]
    mitigation_or_diligence_request: "Request financing documents, fully diluted cap table, option ledger, preference waterfall, debt agreements, and recent valuation support."
  - risk_id: "R-006"
    risk_title: "Customer concentration, churn, and reference bias"
    risk_category: "customer"
    severity: "high"
    likelihood: "medium"
    description: "Public customer evidence is mainly company-published; top-customer revenue, churn, NRR, cohort quality, and failed implementations are not public."
    impacted_chapter_ids: ["III", "V"]
    impacted_section_ids: ["III.A", "III.C", "V.B"]
    evidence_claim_ids: ["EC-017", "EC-018"]
    mitigation_or_diligence_request: "Request customer cohorts, top-account schedule, churn/NRR, failed implementation list, and independent reference calls."
  - risk_id: "R-007"
    risk_title: "Privacy, security, and subprocessor exposure"
    risk_category: "regulatory"
    severity: "high"
    likelihood: "medium"
    description: "Gelato processes customer, order, payment-method, content, address, and tracking data globally through printers, cloud vendors, and subprocessors."
    impacted_chapter_ids: ["III", "VI", "VIII"]
    impacted_section_ids: ["III.E", "VI.A", "VIII.G"]
    evidence_claim_ids: ["EC-010", "EC-011"]
    mitigation_or_diligence_request: "Review ISO scope, SOC reports if any, penetration-test summaries, DPIAs, TIAs, SCCs, DPAs, incident logs, and subprocessor governance."
  - risk_id: "R-008"
    risk_title: "Legal, litigation, and contract schedules incomplete"
    risk_category: "legal"
    severity: "medium"
    likelihood: "unknown"
    description: "Public terms are available, but lawsuit schedules, arbitration, claims, insurance policies, negotiated contracts, and full legal docket checks are not public."
    impacted_chapter_ids: ["I", "VIII"]
    impacted_section_ids: ["I.D", "VIII.A", "VIII.B", "VIII.D", "VIII.F"]
    evidence_claim_ids: ["EC-012", "EC-013", "EC-019"]
    mitigation_or_diligence_request: "Obtain counsel memo, litigation schedule, arbitration claims, material contracts, insurance schedule, and full docket/regulatory searches."
  - risk_id: "R-009"
    risk_title: "Management depth, headcount, incentives, and turnover opaque"
    risk_category: "team"
    severity: "medium"
    likelihood: "medium"
    description: "Public leadership is visible, but global headcount, compensation, option status, attrition, and employee-relations data are not public."
    impacted_chapter_ids: ["VII"]
    impacted_section_ids: ["VII.A", "VII.B", "VII.C", "VII.D", "VII.E", "VII.F", "VII.G"]
    evidence_claim_ids: ["EC-003", "EC-008", "EC-018"]
    mitigation_or_diligence_request: "Request global headcount, org chart, attrition, compensation, option plan, employee-relations matters, and management references."
  - risk_id: "R-010"
    risk_title: "User-generated content and IP infringement exposure"
    risk_category: "legal"
    severity: "medium"
    likelihood: "high"
    description: "POD depends on customer-uploaded designs and content; terms allocate responsibility to customers but claims can still create operational, legal, and reputational burden."
    impacted_chapter_ids: ["VIII"]
    impacted_section_ids: ["VIII.C", "VIII.D", "VIII.E", "VIII.G"]
    evidence_claim_ids: ["EC-011", "EC-012", "EC-013", "EC-020"]
    mitigation_or_diligence_request: "Review content-screening controls, takedown history, repeat-infringer policy execution, indemnity claims, IP portfolio, and insurance coverage."

diligence_gaps:
  - gap_id: "G-001"
    chapter_id: "I"
    section_id: "I.A"
    missing_information: "Audited financial statements, monthly management accounts, revenue, ARR, GMV, gross margin, contribution margin, burn, cash, debt, and runway."
    why_it_matters: "Core financial quality and valuation cannot be underwritten from public evidence."
    suggested_source_or_request: "Company data room, auditor package, board plan, bank statements, and debt schedules."
    priority: "high"
  - gap_id: "G-002"
    chapter_id: "I"
    section_id: "I.C"
    missing_information: "Fully diluted cap table, option ledger, preference stack, investor rights, and post-2021 financing terms."
    why_it_matters: "Liquidation preferences and later financings can materially change common-equity value."
    suggested_source_or_request: "Financing documents, shareholder agreements, board consents, and cap-table export."
    priority: "high"
  - gap_id: "G-003"
    chapter_id: "III"
    section_id: "III.C"
    missing_information: "Customer concentration, churn, NRR, cohort revenue, segment split, and account-level gross profit."
    why_it_matters: "Public case studies do not prove durable revenue quality."
    suggested_source_or_request: "Top-customer schedule, cohort model, customer references, and CRM exports."
    priority: "high"
  - gap_id: "G-004"
    chapter_id: "III"
    section_id: "III.E"
    missing_information: "Provider and carrier contracts, SLA compliance, concentration, defect/reprint rates, lost/late shipment rates, and fallback capacity."
    why_it_matters: "Network performance drives customer experience, margin, and reputational risk."
    suggested_source_or_request: "Provider MSAs, carrier agreements, QA dashboards, support logs, and operational KPI exports."
    priority: "high"
  - gap_id: "G-005"
    chapter_id: "IV"
    section_id: "IV.A"
    missing_information: "Independent market share, win/loss analysis, SKU-level cost benchmarking, delivery tests, and retention comparison."
    why_it_matters: "Competitors publish similar free tiers, discounts, products, and integrations."
    suggested_source_or_request: "Win/loss CRM data, market study, mystery-shopping benchmark, and customer interviews."
    priority: "medium"
  - gap_id: "G-006"
    chapter_id: "V"
    section_id: "V.A"
    missing_information: "CAC, payback, free-to-paid conversion, sales productivity, marketing spend, app-store metrics, and channel revenue split."
    why_it_matters: "Low-friction acquisition may not be profitable if conversion or retention is weak."
    suggested_source_or_request: "Attribution dashboards, CRM, billing data, app analytics, and marketing spend history."
    priority: "high"
  - gap_id: "G-007"
    chapter_id: "VI"
    section_id: "VI.B"
    missing_information: "GelatoConnect module ARR, implementation costs, adoption, retention, uptime, customer ROI, and roadmap status."
    why_it_matters: "Software defensibility and margin expansion depend on repeatable product ROI."
    suggested_source_or_request: "Product analytics, module cohort data, customer references, roadmap, and incident history."
    priority: "high"
  - gap_id: "G-008"
    chapter_id: "VII"
    section_id: "VII.B"
    missing_information: "Global headcount, attrition, compensation, option grants, employee relations, and hiring plan."
    why_it_matters: "Entity-level registry headcount does not support productivity or retention diligence."
    suggested_source_or_request: "HRIS export, option ledger, compensation plan, employee-relations schedule, and hiring plan."
    priority: "medium"
  - gap_id: "G-009"
    chapter_id: "VIII"
    section_id: "VIII.G"
    missing_information: "Security audit evidence, ISO scope, penetration-test summaries, incident logs, DPIAs, TIAs, SCCs, DPAs, and subprocessor governance."
    why_it_matters: "Global fulfillment and user-content processing create privacy, security, and transfer exposure."
    suggested_source_or_request: "Security data room, privacy counsel memo, vendor-management records, and incident register."
    priority: "high"
  - gap_id: "G-010"
    chapter_id: "VIII"
    section_id: "VIII.A"
    missing_information: "Litigation, arbitration, demand letters, regulatory correspondence, insurance policies, claims history, and material contracts."
    why_it_matters: "Public legal pages do not prove absence of disputes or sufficient coverage."
    suggested_source_or_request: "Counsel legal schedule, docket searches, insurance schedule, claims register, and material contract index."
    priority: "high"

