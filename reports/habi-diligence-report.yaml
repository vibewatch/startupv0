executive_summary:
  overall_assessment: Habi remains eligible for public-source diligence as an uncovered private unicorn based on CB Insights and supporting public evidence; no public evidence found in this run showed IPO, acquisition, or shutdown.
  investment_or_diligence_thesis: Habi addresses a real LatAm residential-liquidity pain point with publicly corroborated unicorn financing, but diligence should focus first on inventory turns, debt exposure, credit compliance, and cohort economics because the public record is mostly funding and marketing disclosure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Habi is a Colombian unicorn valued at about US$1B after a 2022 Series C.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Habi simplifies buying and selling homes by making fast offers and operating a digital real-estate platform.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Habi has expanded across Colombia and Mexico with a broader real-estate ecosystem including valuation, broker, inventory and credit products.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Capital-intensive inventory and housing-cycle exposure
    - risk_id: R-002
      summary: Thin public financial/unit-economic disclosure
    - risk_id: R-003
      summary: Regulatory, data and credit-product complexity
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue by product and geography, gross margin, cash burn and runway.
    - Cap table, financing documents, debt/warrants, option pool and liquidation preferences.
    - Customer/account concentration, churn, retention, pipeline, CAC/payback and cohort performance.
    - Material contracts, IP assignments, regulatory correspondence, litigation schedules and insurance coverage.
  recommended_next_steps:
    - Request a full financial and legal data room before investment reliance.
    - Interview management on the top three risks and reconcile public scale claims to source systems.
    - Run customer, supplier and counsel reference checks for claims that are company-authored or not publicly verifiable.
