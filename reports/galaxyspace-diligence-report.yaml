report_metadata:
  report_title: GalaxySpace Startup Diligence Report
  target_company: GalaxySpace
  website: http://www.galaxyspace.com/
  known_aliases:
    - GALAXYSPACE
    - Yinhe Hangtian
    - Beijing GalaxySpace
  sector: Industrials / commercial satellite internet and satellite manufacturing
  geography: China / Beijing
  company_stage: Private unicorn / growth-stage private company
  research_date: 2026-06-08
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Asia/Shanghai
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing reports and selected this uncovered target from a randomized CB Insights unicorn candidate pool.
    - Prioritized public company-owned materials, CB Insights unicorn-list data, reputable news or company press materials, and public product/customer pages.
    - Treated company-authored claims as public statements, not as independent proof of performance.
    - Marked private artifacts such as audited financials, customer contracts, board materials, cap table, legal files, security reports, and HRIS exports as evidence gaps.
  included_jurisdictions:
    - China
    - Global satellite communications markets where services or components may be used
  excluded_topics:
    - Private data room materials, non-public customer references, paid databases, paywalled documents, and privileged legal records were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-08
      notes: No pitch deck, financial model, data room, or founder responses were provided.
