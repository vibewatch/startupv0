risk_register:
  - risk_id: R-001
    risk_title: Valuation and financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: GalaxySpace's headline valuation is public, but audited financials, cash runway, revenue recognition, debt, and preference stack are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Request audited financials, management accounts, KPI bridge, cash/debt schedules, cap table, and financing documents.
  - risk_id: R-002
    risk_title: Customer concentration and revenue quality unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public sources do not disclose customer-level revenue, churn, gross retention, backlog, or renewal cohorts for GalaxySpace.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a43
    mitigation_or_diligence_request: Request top-customer revenue, contracts, renewal schedules, cohort retention, pipeline conversion, and independent customer references.
  - risk_id: R-003
    risk_title: Satellite manufacturing, launch, and constellation execution risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: GalaxySpace operates in capital-intensive LEO satellite internet and component manufacturing, where product reliability, launch access, spectrum, ground terminals, and on-orbit performance determine value.
