report_metadata:
  report_title: Airalo Startup Diligence Report
  target_company: Airalo
  website: https://www.airalo.com/
  known_aliases:
    - Airalo eSIM
    - AirGSM Pte. Ltd.
    - Airalo Partners
  sector: Travel eSIM marketplace and consumer connectivity
  geography: Singapore / Delaware public footprint with global customers and remote workforce
  company_stage: Private unicorn / growth-stage travel eSIM platform
  research_date: 2026-06-08
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized CB Insights unicorn-list evidence, Airalo company pages, app-store listings, investor announcements, independent news and competitor websites.
    - Treated company-owned claims as public evidence of the statement, not independent proof of audited financial, customer or security outcomes.
    - Marked financials, cap table, customer concentration, legal, HR, insurance, SOC and contract details as not_publicly_verifiable where private records are required.
    - Did not bypass paywalls, CAPTCHAs or access controls.
  included_jurisdictions:
    - Singapore
    - United States / Delaware
    - Global markets where Airalo publicly offers eSIM services
    - EU/UK and other privacy/telecom jurisdictions as follow-up scope
  excluded_topics:
    - Private financial statements, cap table, contracts, customer calls, HRIS, SOC reports, insurance certificates, full litigation docket searches and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for Airalo unicorn diligence report
      type: workflow_request
      date_received: 2026-06-08
      notes: No pitch deck, financial model, data room, management responses or customer references were provided.
    - material_id: UPM-002
      title: Candidate metadata from CB Insights
      type: user_provided_public_metadata
      date_received: 2026-06-08
      notes: Slug airalo; valuation $1B; date joined 7/10/2025; country Singapore; industry Consumer & Retail; source URL CB Insights unicorn list.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Airalo is an eligible private unicorn with a $1B valuation and July 10, 2025 unicorn-list join date.
    claim_source: "Public source: CB Insights unicorn list and Airalo/CVC Series C announcements"
    claim_date: 2025-07-10
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.B
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-023
    contradiction_summary: Public sources support active private unicorn status; actual cap table, preference stack and current fair value are not public.
    diligence_follow_up:
      - Request Series C financing documents, current fully diluted cap table, preference stack, 409A and board-approved valuation support.
  - founder_claim_id: FC-002
    claim_text: Airalo is the world's first and largest travel eSIM provider with eSIM packages in 200+ countries and regions.
    claim_source: Public/company claim in Airalo press releases and app listings
    claim_date: 2025-07-10
    mapped_chapter_ids:
