    diligence_follow_up:
      - Request org chart, HRIS export, attrition by function/location, compensation bands, equity plans and key-person succession plan.
executive_summary:
  overall_assessment: Airalo appears to be an active private unicorn based on CB Insights, Airalo/CVC Series C announcements, current app listings, partner pages, careers pages and 2026 company press releases. Public evidence supports product breadth, customer-scale claims and funding milestones, but investment-grade diligence remains unresolved because financials, cap table, customer concentration, carrier contracts, regulatory history, IP registrations, insurance and HR records are private.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only. The investability case depends on proving that Airalo can convert large eSIM user scale and B2B partner distribution into durable, high-margin, compliant revenue while managing carrier dependency, price competition, app reliability and global privacy/telecom obligations.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and Airalo/CVC announcements support private unicorn status at a $1B+ valuation.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-023
    - founder_claim_id: FC-005
      summary: App marketplace listings verify local, regional and global eSIM product positioning across 200+ countries/regions.
      evidence_claim_ids:
        - EC-005
        - EC-006
    - founder_claim_id: FC-006
      summary: Public careers and press releases support an active global team and technical hiring signals.
      evidence_claim_ids:
        - EC-015
        - EC-016
        - EC-017
  biggest_risks:
    - risk_id: R-001
      summary: Headline valuation without public financial quality, unit economics or runway.
    - risk_id: R-002
      summary: Customer, partner and revenue concentration are not publicly verifiable.
    - risk_id: R-004
      summary: Carrier/service-provider dependency can affect coverage, refunds and reputation.
    - risk_id: R-006
      summary: Global privacy, eKYC and telecom regulatory exposure requires counsel review.
  key_evidence_gaps:
    - Audited financials, revenue by product/channel/geography, gross margin by destination, cash/debt, burn and tax/accounting policies.
    - Fully diluted cap table, financing documents, investor rights, options, warrants, debt and preference stack.
    - Top customer/partner revenue, active paying users, cohorts, churn, refunds, support tickets and customer references.
    - Carrier/supplier contracts, SLAs, termination rights, network-quality metrics, material partner contracts and data-processing agreements.
    - Litigation/regulatory searches, IP registrations, insurance, SOC/PCI reports, HRIS, compensation, stock plans and turnover data.
  recommended_next_steps:
    - Run financial and cap-table diligence before relying on the public unicorn valuation.
    - Reconcile user/customer milestones to active paying users, revenue, retention, refunds and gross margin.
    - Have telecom/privacy counsel review carrier contracts, licensing, eKYC/privacy, DPAs, incidents and regulatory correspondence.
    - Benchmark destination pricing, network quality, app reliability and partner economics against Nomad, Holafly, GigSky and Ubigi.
    - Obtain HR, security, IP, litigation, insurance and material-contract schedules under NDA.
