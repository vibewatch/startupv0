risk_register:
  - risk_id: R-001
    risk_title: Headline valuation without public financial quality
    risk_category: financial
    severity: high
    likelihood: high
    description: The $1B+ valuation is public, but revenue, margin, cash, burn, debt, AR aging, refund liability and unit economics are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
    mitigation_or_diligence_request: Obtain audited financials, management accounts, cohort economics, cash/debt schedule, tax records and board plan.
  - risk_id: R-002
    risk_title: Customer and revenue concentration unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Aggregate user/customer counts are public, but customer revenue, partner concentration, churn and repeat-purchase quality are not.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-009
    mitigation_or_diligence_request: Request customer cohorts, revenue by channel/partner/geography, retention, refunds, support tickets and top-account concentration.
  - risk_id: R-003
    risk_title: Price and feature competition in travel eSIM market
    risk_category: market
    severity: medium
    likelihood: high
    description: Nomad, Holafly, GigSky and Ubigi publicly compete in travel eSIMs with overlapping coverage, app distribution and unlimited/local/regional plans.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.A
    evidence_claim_ids:
      - EC-011
      - EC-005
    mitigation_or_diligence_request: Perform pricing benchmarks, CAC/payback review, destination-level margin analysis and win/loss diligence.
  - risk_id: R-004
    risk_title: Telecom carrier and service-provider dependency
    risk_category: operational
    severity: high
    likelihood: medium
    description: Airalo relies on third-party mobile networks and service providers; terms indicate provider collaboration can change.
    impacted_chapter_ids:
      - III
      - II
      - VIII
    impacted_section_ids:
      - III.E
      - II.A
      - VIII.F
    evidence_claim_ids:
      - EC-010
      - EC-020
    mitigation_or_diligence_request: Review carrier/supplier contracts, SLAs, termination rights, redundancy, outage history and destination-level quality metrics.
  - risk_id: R-005
    risk_title: App reliability and marketplace-platform dependency
    risk_category: product
    severity: medium
    likelihood: medium
    description: App stores are a major distribution and review channel; service failures can trigger refunds, ratings pressure and support costs.
    impacted_chapter_ids:
      - II
      - V
      - III
    impacted_section_ids:
      - II.A
      - V.A
      - III.A
    evidence_claim_ids:
      - EC-006
      - EC-010
      - EC-020
    mitigation_or_diligence_request: Review app incident logs, support metrics, refund rates, app-store policy dependencies and platform-risk controls.
  - risk_id: R-006
    risk_title: Global privacy, eKYC and telecom regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Airalo processes consumer, device/location and potentially eKYC biometric data across jurisdictions and markets trust/compliance controls.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
      - VIII.F
    evidence_claim_ids:
      - EC-018
      - EC-019
    mitigation_or_diligence_request: Have privacy/regulatory counsel review DPIAs, DPA/subprocessors, telecom licensing, eKYC basis, incident history and SOC/PCI materials.
  - risk_id: R-007
    risk_title: Cap-table and investor-rights opacity
    risk_category: financing
    severity: medium
    likelihood: high
    description: Major investors are public, but share classes, preferences, pro rata rights, debt and secondary components are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids:
      - EC-001
      - EC-002
    mitigation_or_diligence_request: Request fully diluted cap table, financing docs, side letters, SAFEs/notes, debt instruments and investor consent rights.
  - risk_id: R-008
    risk_title: Partner-channel execution and channel conflict
    risk_category: market
    severity: medium
    likelihood: medium
    description: B2B/B2B2C partner growth is material, but economics, conflicts with direct consumer sales, churn and partner obligations are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - V.C
      - V.D
    evidence_claim_ids:
      - EC-008
      - EC-013
    mitigation_or_diligence_request: Review partner contracts, partner pipeline, sales productivity, channel attribution, margins and dispute history.
  - risk_id: R-009
    risk_title: Distributed workforce scaling risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Airalo publicly reports a large fully remote, multi-country workforce; HR, compliance, retention and management controls are private.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
      - VII.G
    evidence_claim_ids:
      - EC-015
      - EC-017
    mitigation_or_diligence_request: Request HRIS, employment-law compliance review, contractor/employee classification, attrition and compensation/equity plans.
  - risk_id: R-010
    risk_title: Litigation, IP and insurance unknowns
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Brand/software assets are public, but lawsuit schedules, IP registrations, insurance coverage and material-contract disputes were not public.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
      - VIII.F
    evidence_claim_ids:
      - EC-021
      - EC-022
    mitigation_or_diligence_request: Counsel should run global docket and IP searches, review insurance certificates and inspect material contracts.
  - risk_id: R-011
    risk_title: Sustainability claim substantiation
    risk_category: reputational
    severity: low
    likelihood: medium
    description: Airalo makes public CO2-emissions claims around eSIM adoption; methodology and assurance were not reviewed.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
    evidence_claim_ids:
      - EC-007
    mitigation_or_diligence_request: Request sustainability methodology, assumptions, third-party validation and marketing-law review.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, cash/debt, revenue, margin and AR aging.
    why_it_matters: Needed to underwrite quality of revenue, runway and valuation.
    suggested_source_or_request: Company CFO data room and auditor materials.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, option pool, preferences, debt and investor rights.
    why_it_matters: Determines economic ownership and exit proceeds.
    suggested_source_or_request: Corporate counsel and finance records.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer/partner/channel/geography and cohort retention.
    why_it_matters: Determines concentration, churn and repeat-purchase durability.
    suggested_source_or_request: Finance analytics export and customer data warehouse.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.E
    missing_information: Carrier, eSIM supplier, payment, cloud and support vendor contracts with SLAs and spend.
    why_it_matters: Determines service reliability, margin and operational resilience.
    suggested_source_or_request: Procurement, legal and operations contract schedule.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity model, quotas, CAC/payback, channel mix and marketing budget.
    why_it_matters: Determines whether growth is capital efficient.
    suggested_source_or_request: GTM analytics, CRM and finance model.
    priority: medium
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, development cost, incident history and destination-level quality metrics.
    why_it_matters: Determines product maturity and roadmap execution risk.
    suggested_source_or_request: Product/R&D leadership materials and incident logs.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS export, headcount by function/location, turnover and compensation/equity plans.
    why_it_matters: Determines retention, compliance and scaling risk.
    suggested_source_or_request: People team records and employment counsel.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, telecom licensing analysis, DPIAs, DPAs, SOC/PCI reports and incident history.
    why_it_matters: Determines privacy, security and telecom compliance exposure.
    suggested_source_or_request: Legal/security data room and outside counsel review.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Trademark/patent registry extracts, invention assignments and open-source SBOM.
    why_it_matters: Determines defensibility and software/IP ownership.
    suggested_source_or_request: IP counsel and engineering/legal records.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, regulatory, insurance and material contract schedules.
    why_it_matters: Determines hidden liabilities and change-of-control risk.
    suggested_source_or_request: Company counsel, broker and docket search.
    priority: high
