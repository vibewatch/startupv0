report_metadata:
  report_title: "Bitmain Startup Diligence Report"
  target_company: "Bitmain"
  website: "https://www.bitmain.com/"
  known_aliases:
    - "Bitmain Technologies Ltd."
    - "BITMAIN Technologies Holding Company"
    - "ANTMINER"
    - "Bitmain Group"
  sector: "Cryptocurrency mining hardware and PoW computing infrastructure"
  geography: "China headquarters with worldwide sales and public R&D / subsidiary references in China, Singapore, and other regions"
  company_stage: "Private unicorn"
  research_date: "2026-05-15"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "Asia/Shanghai"

research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Started from the public Wikipedia unicorn list, built an uncovered candidate set from reports, and selected Bitmain at random with shuf."
    - "Prioritized company-owned sources for products, shop pricing, support, privacy, terms, R&D footprint, and public distribution signals."
    - "Supplemented with public news summaries, Wikipedia article citations, competitor company / investor-relations pages, and market-background references."
    - "Did not use private data rooms, paywalled filings, non-public customer lists, employee records, credentials, or access-controlled systems."
  included_jurisdictions:
    - "China"
    - "Hong Kong"
    - "Singapore"
    - "United States where public export-control, customer, and sales references are relevant"
  excluded_topics:
    - "Private audited financial statements, management accounts, bank lines, tax files, cap table, debt instruments, supplier contracts, and customer contracts."
    - "Non-public export-control correspondence, legal dockets behind paywalls, employee files, security assessments, and personally identifying customer data."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Autonomous random unicorn diligence task"
      type: "workflow_request"
      date_received: "2026-05-15"
      notes: "No company-supplied deck, data room, financial model, or customer references were provided."

founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Bitmain is the world's leading manufacturer of digital currency mining servers through the ANTMINER brand."
    claim_source: "Bitmain About page"
    claim_date: null
    mapped_chapter_ids: ["II", "IV"]
    mapped_section_ids: ["II.A", "IV.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-003", "EC-012"]
    contradiction_summary: "Company-owned language is supported by historical third-party reports of very high market share, but public sources also indicate competitors gained share after 2019."
    diligence_follow_up:
      - "Request current third-party market-share reports by shipment volume, hashrate shipped, revenue, and region."
  - founder_claim_id: "FC-002"
    claim_text: "Bitmain serves customers across more than 100 countries and regions and has multiple R&D centers."
    claim_source: "Bitmain About page"
    claim_date: null
    mapped_chapter_ids: ["III", "VI", "VII"]
    mapped_section_ids: ["III.A", "VI.A", "VII.B"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-003", "EC-021"]
    contradiction_summary: "The claim is specific but company-sourced; customer, shipment, and headcount support by geography were not public."
    diligence_follow_up:
      - "Request shipment history, active-customer count, top-customer concentration, and R&D headcount by location."
  - founder_claim_id: "FC-003"
    claim_text: "Bitmain remains a private unicorn with a public unicorn-list valuation of about $12 billion from June 2018."
    claim_source: "Wikipedia unicorn list and Bitmain company profile"
    claim_date: "2018-06-01"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.C", "I.D"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-001", "EC-002", "EC-006"]
    contradiction_summary: "Public sources support private-company status and the stale 2018 unicorn-list valuation; no current independently priced round was found."
    diligence_follow_up:
      - "Request the current cap table, most recent financing documents, secondary trades, 409A or equivalent valuation materials, and option liquidity history."
  - founder_claim_id: "FC-004"
    claim_text: "Bitmain's current ANTMINER portfolio includes high-efficiency Bitcoin miners and hydro / immersion infrastructure."
    claim_source: "Bitmain shop and About page"
    claim_date: "2026-05-15"
    mapped_chapter_ids: ["II", "VI"]
    mapped_section_ids: ["II.A", "VI.B"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-007", "EC-008"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request realized gross margin, warranty-return rates, field failure rates, and customer acceptance data by SKU and cooling method."
  - founder_claim_id: "FC-005"
    claim_text: "Bitmain provides a global support and after-sales model, including HUB warehouses, ASAR replacement, and on-site repair."
    claim_source: "Bitmain About page"
    claim_date: null
    mapped_chapter_ids: ["III", "V"]
    mapped_section_ids: ["III.B", "V.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-009", "EC-016"]
    contradiction_summary: "Company-owned sources describe the support model, but service-level agreements, coverage by country, and customer satisfaction metrics were not public."
    diligence_follow_up:
      - "Request support SLA performance, spare-parts inventory turns, warranty expense, and NPS / customer-satisfaction history."

executive_summary:
  overall_assessment: >-
    Bitmain is a real, scaled, still-private crypto-mining hardware company with a long ANTMINER product history, public current shop listings, global distribution claims, and historical evidence of very large revenue and market share. It is not investment-ready from public evidence alone because the available financial record is stale, crypto-cycle exposure is extreme, supplier and export-control risk is material, and governance / legal history is unusually visible for a private company.
  investment_or_diligence_thesis: >-
    Continue only to controlled second-stage diligence. Public evidence supports Bitmain's product reality, technical roadmap, and unicorn history, but underwriting depends on private validation of current revenue quality, gross margin, inventory, TSMC or foundry dependency, export-control exposure, post-2021 governance controls, customer concentration, and warranty / field reliability.
  strongest_verified_claims:
    - founder_claim_id: "FC-004"
      summary: "Bitmain publicly lists many current ANTMINER SKUs, including S23 Hyd. at 580T, 5510W, 9.5 J/T and $17,400, plus mining-farm infrastructure products."
      evidence_claim_ids: ["EC-007"]
    - founder_claim_id: "FC-003"
      summary: "Public sources identify Bitmain as private, founded in 2013, and included on a unicorn list at $12 billion in June 2018."
      evidence_claim_ids: ["EC-001", "EC-002"]
    - founder_claim_id: "FC-001"
      summary: "Company and historical third-party sources support that Bitmain was a major ASIC mining-hardware leader, though current share is not independently verified."
      evidence_claim_ids: ["EC-003", "EC-012"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Revenue, inventory, and margins appear highly exposed to crypto price cycles and mining economics."
    - risk_id: "R-002"
      summary: "Foundry concentration, Sophgo export-control history, and sanctions / export restrictions create material operational and geopolitical risk."
    - risk_id: "R-003"
      summary: "Co-founder dispute, litigation history, and control separation raise governance and reputational diligence priorities."
  key_evidence_gaps:
    - "Current audited financial statements, monthly management accounts, and inventory aging."
    - "Current cap table, voting rights, debt, founder-related-party arrangements, and option pool."
    - "Top customer / supplier concentration and binding contracts."
    - "Export-control legal advice, sanctions screening controls, and status of Sophgo-related restrictions."
    - "Current management roster, board governance, headcount, turnover, and compensation plans."
  recommended_next_steps:
    - "Request a full financial data room covering FY2023-FY2026 year-to-date, including revenue by SKU, channel, region, gross margin, backlog, AR aging, inventory, cash flow, and tax positions."
    - "Run legal / regulatory diligence on export controls, Sophgo, sanctions screening, Hong Kong / China / Cayman matters, customer disputes, and IP claims."
    - "Interview major customers, foundry / packaging suppliers, logistics partners, and repair / support operators."
    - "Benchmark unit economics and efficiency versus Canaan Avalon, MicroBT WhatsMiner, Bitdeer SEALMINER, and emerging U.S. suppliers."

chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: "Bitmain has meaningful public historical financial disclosures from its 2018 IPO attempt, but current financial statements, projections, cap table, and debt are not public."
    founder_claim_ids: ["FC-003"]
    evidence_claim_ids: ["EC-001", "EC-004", "EC-005", "EC-006", "EC-022"]
    risk_ids: ["R-001", "R-004", "R-008"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3", "I.A.4", "I.A.5", "I.A.6"]
        summary: "Only stale 2018 financials and press summaries were public; no current audited annual or quarterly statements were found."
        verification_status: "not_publicly_verifiable"
        confidence: "medium"
        key_findings:
          - finding_id: "I.A-F1"
            finding: "TechNode reported 2018 first-half income above $2.8 billion, net profit of $742.7 million, and 94.3% of income from mining equipment sales."
            evidence_claim_ids: ["EC-004"]
            risk_ids: ["R-001"]
          - finding_id: "I.A-F2"
            finding: "TechCrunch highlighted declining gross margin, possible Q2 2018 loss, and inventory build, making historical revenue quality a key diligence issue."
            evidence_claim_ids: ["EC-005"]
            risk_ids: ["R-001", "R-008"]
        hidden_risks:
          - "Current profitability could be materially different from 2018 because miner demand, Bitcoin price, network difficulty, and hardware efficiency cycles changed."
          - "Inventory aging and warranty reserves can move quickly in ASIC hardware downturns."
        evidence_gaps:
          - "FY2023-FY2026 audited financial statements, monthly management accounts, inventory aging, AR aging, backlog, tax schedules, and cash-flow statements."
        follow_up_questions:
          - "What are current revenue, gross margin, EBITDA, cash flow, inventory turns, warranty reserves, and backlog by SKU and geography?"
        table_ids: ["T-002"]
        figure_ids: []
        evidence_claim_ids: ["EC-004", "EC-005", "EC-022"]
      - section_id: "I.B"
        title: "Financial Projections"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3", "I.B.4", "I.B.5", "I.B.6", "I.B.7", "I.B.8"]
        summary: "No management forecast, capex plan, working-capital model, or scenario plan was public."
        verification_status: "not_publicly_verifiable"
        confidence: "medium"
        key_findings:
          - finding_id: "I.B-F1"
            finding: "Public sources show drivers that should be modeled: Bitcoin price, network difficulty, halving economics, product ASPs, foundry supply, and export restrictions."
            evidence_claim_ids: ["EC-005", "EC-015", "EC-020"]
            risk_ids: ["R-001", "R-002"]
        hidden_risks:
          - "A projection built on spot miner prices without stress cases for Bitcoin, power cost, and supply restrictions would be unreliable."
        evidence_gaps:
          - "Board-approved budget, three-year forecast, SKU roadmap economics, and downside scenarios."
        follow_up_questions:
          - "How does management model miner demand after the 2024 Bitcoin halving and under different power-price and BTC-price scenarios?"
        table_ids: ["T-002"]
        figure_ids: ["F-002"]
        evidence_claim_ids: ["EC-005", "EC-015", "EC-022"]
      - section_id: "I.C"
        title: "Capital Structure"
        checklist_question_ids: ["I.C.1", "I.C.2", "I.C.3", "I.C.4", "I.C.5"]
        summary: "Public sources provide only old ownership signals and dispute-resolution information; current shares, voting rights, options, debt, and related-party exposure are not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.C-F1"
            finding: "TechCrunch reported that the top five founding individuals owned about 60% before the attempted IPO, the employee pool about 18.5%, Sequoia above 2%, and Coatue 0.14%."
            evidence_claim_ids: ["EC-005"]
            risk_ids: ["R-003", "R-008"]
          - finding_id: "I.C-F2"
            finding: "Wikipedia reports that the co-founder dispute was resolved with Wu stepping down and Zhan borrowing roughly $600 million to purchase Wu's stake."
            evidence_claim_ids: ["EC-018"]
            risk_ids: ["R-003", "R-004"]
        hidden_risks:
          - "Founder buyout financing may have introduced debt, pledges, or related-party obligations that are not visible publicly."
        evidence_gaps:
          - "Current cap table, voting rights, options / warrants, founder buyout financing, debt instruments, and off-balance-sheet liabilities."
        follow_up_questions:
          - "What changed in the cap table and control documents after the 2021 separation?"
        table_ids: ["T-003"]
        figure_ids: []
        evidence_claim_ids: ["EC-005", "EC-018", "EC-022"]
      - section_id: "I.D"
        title: "Other financial information"
        checklist_question_ids: ["I.D.1", "I.D.2", "I.D.3"]
        summary: "Public financing and valuation evidence is concentrated around 2018; tax positions and accounting policies after the failed IPO are not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.D-F1"
            finding: "The public unicorn list shows Bitmain at a $12 billion valuation in June 2018; Caixin reported the 2018 private value was estimated as high as $14 billion."
            evidence_claim_ids: ["EC-001", "EC-018"]
            risk_ids: ["R-008"]
          - finding_id: "I.D-F2"
            finding: "The Hong Kong IPO application lapsed in March 2019, so the public filing did not create ongoing public-company disclosure."
            evidence_claim_ids: ["EC-006"]
            risk_ids: ["R-008"]
        hidden_risks:
          - "Stale unicorn valuation may not reflect current market value after crypto cycles, competitive share shifts, and regulatory events."
        evidence_gaps:
          - "Current tax positions, accounting policies, revenue-recognition policy, and current valuation support."
        follow_up_questions:
          - "What is the latest independently supportable valuation and what assumptions drive it?"
        table_ids: ["T-001"]
        figure_ids: ["F-001", "F-002"]
        evidence_claim_ids: ["EC-001", "EC-006", "EC-018", "EC-022"]
  - chapter_id: "II"
    title: "Products"
    chapter_summary: "Bitmain publicly sells a broad ANTMINER portfolio spanning Bitcoin, altcoin miners, hydro / immersion cooling, racks, containers, transformers, and accessories."
    founder_claim_ids: ["FC-001", "FC-004"]
    evidence_claim_ids: ["EC-007", "EC-008", "EC-009"]
    risk_ids: ["R-001", "R-005"]
    sections:
      - section_id: "II.A"
        title: "Description of each product"
        checklist_question_ids: ["II.A.1", "II.A.2", "II.A.3", "II.A.4", "II.A.5", "II.A.6"]
        summary: "The public product portfolio is tangible and current, but profitability, failure rates, customer applications, and product-level growth rates require private records."
        verification_status: "partially_verified"
        confidence: "high"
        key_findings:
          - finding_id: "II.A-F1"
            finding: "Bitmain's shop lists current Bitcoin miners such as U3S23H, S23 Hyd., S23e U2H, S21 XP+ Hyd., S23, and multiple S21 variants with disclosed hashrate, power, efficiency, and price."
            evidence_claim_ids: ["EC-007"]
            risk_ids: ["R-005"]
          - finding_id: "II.A-F2"
            finding: "Bitmain's About page describes a roadmap from S9 at the 100 J/T era to S19 at 30 J/T, S19 XP at 20 J/T, S21 at 10 J/T, and S23 Hyd. at single-digit J/T."
            evidence_claim_ids: ["EC-008"]
            risk_ids: ["R-005"]
          - finding_id: "II.A-F3"
            finding: "Mining farm products such as ANTSPACE HD5, HW5, and MD5 show Bitmain is selling infrastructure beyond standalone miners."
            evidence_claim_ids: ["EC-007"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "SKU-level gross margin may compress quickly when competitors match efficiency or when miner spot prices fall."
          - "Hydro and immersion products may have different installation, warranty, and service-liability profiles than air-cooled miners."
        evidence_gaps:
          - "Gross margin by SKU, BOM, warranty reserves, field return rates, firmware security process, and customer acceptance tests."
        follow_up_questions:
          - "Which current SKUs account for the majority of revenue and gross profit?"
          - "What field reliability data supports the hydro / immersion product push?"
        table_ids: ["T-004", "T-005"]
        figure_ids: ["F-003", "F-004"]
        evidence_claim_ids: ["EC-007", "EC-008", "EC-009"]
  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: "Public sources support a broad global-customer claim and a visible partner ecosystem, but top-customer concentration, revenue by customer, churn, and strategic-contract terms are not public."
    founder_claim_ids: ["FC-002", "FC-005"]
    evidence_claim_ids: ["EC-003", "EC-009", "EC-010", "EC-011", "EC-024"]
    risk_ids: ["R-002", "R-004", "R-007"]
    sections:
      - section_id: "III.A"
        title: "Top customers by application"
        checklist_question_ids: ["III.A"]
        summary: "Bitmain claims customers across more than 100 countries and regions, but it does not publish a top-15 customer list."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.A-F1"
            finding: "The company-owned About page states Bitmain serves customers across over 100 countries and regions."
            evidence_claim_ids: ["EC-003"]
            risk_ids: ["R-004"]
          - finding_id: "III.A-F2"
            finding: "Wikipedia reports an early-2026 commercial partnership under which Bitmain provides hardware and hosting capacity for American Bitcoin."
            evidence_claim_ids: ["EC-024"]
            risk_ids: ["R-004", "R-007"]
        hidden_risks:
          - "A few large miners or hosting customers could drive material order concentration."
        evidence_gaps:
          - "Top-15 customers by revenue, application, geography, products purchased, renewal / repeat-purchase history, and account-level gross margin."
        follow_up_questions:
          - "Which customers generated at least 5% of revenue in the last two fiscal years and year-to-date?"
        table_ids: ["T-006"]
        figure_ids: []
        evidence_claim_ids: ["EC-003", "EC-024"]
      - section_id: "III.B"
        title: "Strategic relationships"
        checklist_question_ids: ["III.B"]
        summary: "Bitmain publicly references a partner ecosystem, support model, and strategic partner links, but revenue contribution and contract terms are not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.B-F1"
            finding: "Bitmain's About page lists strategic partner links including ANTPOOL, BITFUFU, ANTALPHA, ANTSENTRY, and ANTRESALE."
            evidence_claim_ids: ["EC-010"]
            risk_ids: ["R-004"]
          - finding_id: "III.B-F2"
            finding: "After-sales claims include ASAR replacement, miner repair, on-site repair, HUB warehouses, and 24/7 response."
            evidence_claim_ids: ["EC-009"]
            risk_ids: ["R-004"]
        hidden_risks:
          - "Partner companies that were spun out or related to founders may create related-party revenue, financing, or governance questions."
        evidence_gaps:
          - "Partner agreements, revenue share, referral economics, exclusivity, warranties, and related-party transaction approvals."
        follow_up_questions:
          - "Which strategic partners are related parties and what revenue, receivables, or guarantees flow through them?"
        table_ids: ["T-007"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-009", "EC-010", "EC-024"]
      - section_id: "III.C"
        title: "Revenue by customer"
        checklist_question_ids: ["III.C"]
        summary: "Customer-level revenue is not public."
        verification_status: "not_publicly_verifiable"
        confidence: "medium"
        key_findings:
          - finding_id: "III.C-F1"
            finding: "The public evidence provides category-level historical revenue mix but no top-customer revenue shares."
            evidence_claim_ids: ["EC-004", "EC-022"]
            risk_ids: ["R-004"]
        hidden_risks:
          - "Undisclosed revenue concentration could amplify order lumpiness and credit risk."
        evidence_gaps:
          - "Revenue by customer and product for the past two fiscal years and current year-to-date."
        follow_up_questions:
          - "What are the revenue, backlog, AR, and margin contributions of each customer above 5%?"
        table_ids: ["T-006"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-004", "EC-022"]
      - section_id: "III.D"
        title: "Significant relationships severed within the last two years"
        checklist_question_ids: ["III.D"]
        summary: "No current-year severed customer or supplier relationships were verified publicly, but historical spin-offs and foundry / export-control issues warrant diligence."
        verification_status: "inconclusive"
        confidence: "low"
        key_findings:
          - finding_id: "III.D-F1"
            finding: "BTC.com and Bitdeer were separated from Bitmain during the 2021 corporate separation."
            evidence_claim_ids: ["EC-018"]
            risk_ids: ["R-003", "R-004"]
        hidden_risks:
          - "Relationship changes may be embedded in founder separation, export controls, or supplier allocation decisions."
        evidence_gaps:
          - "List of terminated customers, partners, suppliers, foundry allocations, and distributor agreements since FY2024."
        follow_up_questions:
          - "Have any major customers, suppliers, distributors, or partners ended or materially reduced business since 2024?"
        table_ids: ["T-007"]
        figure_ids: []
        evidence_claim_ids: ["EC-018", "EC-022"]
      - section_id: "III.E"
        title: "Top suppliers"
        checklist_question_ids: ["III.E"]
        summary: "The strongest supplier-concentration signal is historical TSMC dependence; current foundry, packaging, component, and logistics supplier shares are not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.E-F1"
            finding: "TechCrunch reported TSMC was Bitmain's largest supplier at 59.2% of total supply in H1 2018 and around 58% over the prior 2.5 years."
            evidence_claim_ids: ["EC-011"]
            risk_ids: ["R-002"]
        hidden_risks:
          - "A constrained foundry relationship could limit product launches, create prepayment exposure, or trigger export-control risk."
        evidence_gaps:
          - "Top suppliers by purchase amount, foundry allocation, prepayment balances, and contractual commitments for the last two fiscal years and year-to-date."
        follow_up_questions:
          - "What share of wafers, packaging, power components, and cooling components comes from each top supplier today?"
        table_ids: ["T-008"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-011", "EC-020", "EC-022"]
  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: "Bitmain's historical leadership is credible, but public sources show competition from Canaan, MicroBT / WhatsMiner, Bitdeer, and other mining-infrastructure players."
    founder_claim_ids: ["FC-001"]
    evidence_claim_ids: ["EC-012", "EC-013", "EC-014", "EC-015"]
    risk_ids: ["R-001", "R-005"]
    sections:
      - section_id: "IV.A"
        title: "Competitive landscape by market segment"
        checklist_question_ids: ["IV.A.1", "IV.A.2"]
        summary: "Bitmain competes on miner efficiency, price per hashrate, supply availability, support, and full-stack mining infrastructure; public sources indicate the market became more competitive after the late-2010s."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "IV.A-F1"
            finding: "Wikipedia reports Bitmain was once estimated to supply roughly three-quarters of bitcoin mining machines but faced increasing competitive share gains from rivals by 2019 and the early 2020s."
            evidence_claim_ids: ["EC-012"]
            risk_ids: ["R-005"]
          - finding_id: "IV.A-F2"
            finding: "Canaan is public on Nasdaq and describes itself as an ASIC high-performance computing chip and Avalon mining-equipment company."
            evidence_claim_ids: ["EC-013"]
            risk_ids: ["R-005"]
          - finding_id: "IV.A-F3"
            finding: "Bitdeer, spun out from Bitmain, is publicly listed and competes in mining operations, hosting, AI cloud, and now mining-machine initiatives."
            evidence_claim_ids: ["EC-014"]
            risk_ids: ["R-005"]
        hidden_risks:
          - "Competitors can pressure ASPs and gross margins during crypto downturns, especially when inventory ages."
          - "Public competitors disclose financials, which may improve customer / investor trust relative to opaque private suppliers."
        evidence_gaps:
          - "Current share by hashrate shipped, revenue, region, product generation, and customer segment."
        follow_up_questions:
          - "How does Bitmain benchmark win rate, price per terahash, efficiency, and delivery lead time against Canaan, MicroBT, Bitdeer, and emerging U.S. suppliers?"
        table_ids: ["T-009", "T-010"]
        figure_ids: ["F-006"]
        evidence_claim_ids: ["EC-012", "EC-013", "EC-014", "EC-015"]
  - chapter_id: "V"
    title: "Marketing, Sales, and Distribution"
    chapter_summary: "Bitmain's public GTM combines direct shop listings, bulk order / sales contact flows, events, official communities, support channels, and partner ecosystem links."
    founder_claim_ids: ["FC-005"]
    evidence_claim_ids: ["EC-009", "EC-016", "EC-025"]
    risk_ids: ["R-002", "R-004", "R-007"]
    sections:
      - section_id: "V.A"
        title: "Strategy and implementation"
        checklist_question_ids: ["V.A.1", "V.A.2", "V.A.3", "V.A.4"]
        summary: "The company uses online merchandising, direct bulk-order routes, trade-show presence, and an official-community posture; budget, channel conversion, and region-by-region economics are not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
