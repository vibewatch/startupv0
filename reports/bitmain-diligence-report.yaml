risk_register:
  - risk_id: "R-001"
    risk_title: "Crypto-cycle financial exposure"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Historical revenue depended heavily on mining equipment, and mining hardware demand is sensitive to Bitcoin price, network difficulty, block rewards, power costs, and inventory cycles."
    impacted_chapter_ids: ["I", "II", "VI"]
    impacted_section_ids: ["I.A", "I.B", "II.A", "VI.B"]
    evidence_claim_ids: ["EC-004", "EC-005", "EC-007", "EC-015"]
    mitigation_or_diligence_request: "Request current revenue by SKU and region, backlog, inventory aging, price-protection terms, warranty reserves, and downside scenarios."
  - risk_id: "R-002"
    risk_title: "Foundry, export-control, and sanctions exposure"
    risk_category: "regulatory"
    severity: "high"
    likelihood: "medium"
    description: "Historical TSMC concentration, Sophgo Entity List reporting, and Bitmain's own export-control terms indicate material geopolitical and compliance risk."
    impacted_chapter_ids: ["III", "VI", "VIII"]
    impacted_section_ids: ["III.E", "VI.A", "VIII.F", "VIII.G"]
    evidence_claim_ids: ["EC-011", "EC-020", "EC-025"]
    mitigation_or_diligence_request: "Request export-control legal opinions, denied-party screening logs, foundry contracts, affiliate maps, and remedial action plans."
  - risk_id: "R-003"
    risk_title: "Governance and legal history"
    risk_category: "team"
    severity: "high"
    likelihood: "medium"
    description: "The co-founder dispute, corporate separation, and public litigation history create control, retention, and reputational risks."
    impacted_chapter_ids: ["I", "VII", "VIII"]
    impacted_section_ids: ["I.C", "VII.A", "VII.F", "VIII.A", "VIII.B"]
    evidence_claim_ids: ["EC-018", "EC-019", "EC-023"]
    mitigation_or_diligence_request: "Request governance documents, board minutes, settlement terms, delegation-of-authority policy, litigation schedule, and employee-relations remediation evidence."
  - risk_id: "R-004"
    risk_title: "Customer and partner opacity"
    risk_category: "customer"
    severity: "medium"
    likelihood: "high"
    description: "Global reach and public partners are visible, but top customers, customer concentration, pipeline, partner economics, and related-party terms are not public."
    impacted_chapter_ids: ["III", "V"]
    impacted_section_ids: ["III.A", "III.B", "III.C", "V.B", "V.C"]
    evidence_claim_ids: ["EC-003", "EC-010", "EC-016", "EC-024", "EC-022"]
    mitigation_or_diligence_request: "Request top-customer revenue, backlog, AR, churn / repeat purchase, partner agreements, and related-party transaction schedules."
  - risk_id: "R-005"
    risk_title: "Competitive pricing and technology pressure"
    risk_category: "market"
    severity: "high"
    likelihood: "high"
    description: "Rivals such as Canaan, MicroBT, and Bitdeer pressure Bitmain on efficiency, price, supply availability, and disclosure."
    impacted_chapter_ids: ["II", "IV", "VI", "VIII"]
    impacted_section_ids: ["II.A", "IV.A", "VI.B", "VIII.D"]
    evidence_claim_ids: ["EC-007", "EC-008", "EC-012", "EC-013", "EC-014", "EC-019"]
    mitigation_or_diligence_request: "Run SKU-level benchmark tests, win / loss analysis, ASP trend review, IP review, and product roadmap / foundry capacity diligence."
  - risk_id: "R-006"
    risk_title: "Privacy and security operations"
    risk_category: "technical"
    severity: "medium"
    likelihood: "medium"
    description: "Bitmain processes customer, account, KYC-like, order, support, marketing, and usage data and acknowledges security limitations."
    impacted_chapter_ids: ["VIII"]
    impacted_section_ids: ["VIII.E", "VIII.G"]
    evidence_claim_ids: ["EC-017"]
    mitigation_or_diligence_request: "Request data maps, SOC / security certifications if any, incident logs, processor contracts, cross-border transfer mechanisms, and vulnerability-management evidence."
  - risk_id: "R-007"
    risk_title: "Energy, environmental, and local-policy exposure"
    risk_category: "regulatory"
    severity: "medium"
    likelihood: "high"
    description: "Bitmain's products enable energy-intensive mining and high-density cooling / infrastructure deployments that can trigger environmental, grid, noise, or local-policy scrutiny."
    impacted_chapter_ids: ["III", "V", "VIII"]
    impacted_section_ids: ["III.A", "V.A", "VIII.C", "VIII.E"]
    evidence_claim_ids: ["EC-007", "EC-015", "EC-024", "EC-025"]
    mitigation_or_diligence_request: "Request product certifications, EHS policies, environmental claims substantiation, customer-deployment incident history, and insurance coverage."
  - risk_id: "R-008"
    risk_title: "Private-company disclosure gap"
    risk_category: "financing"
    severity: "high"
    likelihood: "high"
    description: "Current financials, cap table, debt, headcount, compensation, insurance, and legal schedules are not publicly verifiable after the lapsed IPO."
    impacted_chapter_ids: ["I", "VII", "VIII"]
    impacted_section_ids: ["I.A", "I.C", "I.D", "VII.B", "VII.D", "VIII.E"]
    evidence_claim_ids: ["EC-006", "EC-022", "EC-023"]
    mitigation_or_diligence_request: "Do not underwrite without a full data room, management Q&A, counsel confirmations, and accountant support."

diligence_gaps:
  - gap_id: "G-001"
    chapter_id: "I"
    section_id: "I.A"
    missing_information: "Current audited financial statements, monthly management accounts, AR aging, inventory aging, cash-flow statements, backlog, and tax schedules."
    why_it_matters: "Historical scale is stale and crypto hardware economics can change rapidly."
    suggested_source_or_request: "Company CFO / accountant data room."
    priority: "high"
  - gap_id: "G-002"
    chapter_id: "I"
    section_id: "I.C"
    missing_information: "Current cap table, voting rights, option pool, debt, founder buyout financing, and related-party obligations."
    why_it_matters: "Public ownership data predates the 2021 founder separation."
    suggested_source_or_request: "Corporate secretary, counsel, and investor rights documents."
    priority: "high"
  - gap_id: "G-003"
    chapter_id: "II"
    section_id: "II.A"
    missing_information: "SKU-level gross margin, shipment volume, warranty returns, field failure rates, firmware-security process, and customer acceptance results."
    why_it_matters: "Product listings verify availability but not profitability or reliability."
    suggested_source_or_request: "Product, finance, quality, and support data room."
    priority: "high"
  - gap_id: "G-004"
    chapter_id: "III"
    section_id: "III.A"
    missing_information: "Top-15 customers, customer revenue concentration, customer contracts, AR, backlog, churn, and repeat-purchase history."
    why_it_matters: "Large miner buyers can drive concentrated, cyclical, and credit-sensitive revenue."
    suggested_source_or_request: "Sales ledger, CRM export, customer contracts, and reference calls."
    priority: "high"
  - gap_id: "G-005"
    chapter_id: "III"
    section_id: "III.E"
    missing_information: "Current foundry, packaging, component, logistics, and service-supplier concentration and contracts."
    why_it_matters: "Historical TSMC concentration and export controls can materially affect supply."
    suggested_source_or_request: "Procurement schedule, supplier contracts, prepayment balances, and legal review."
    priority: "high"
  - gap_id: "G-006"
    chapter_id: "IV"
    section_id: "IV.A"
    missing_information: "Independent current market share, win / loss, ASP, delivery-time, and efficiency benchmarks."
    why_it_matters: "Historical leadership does not prove current competitive position."
    suggested_source_or_request: "Third-party market report, internal sales analytics, and lab benchmarks."
    priority: "medium"
  - gap_id: "G-007"
    chapter_id: "V"
    section_id: "V.D"
    missing_information: "Sales compensation, quotas, pipeline, channel mix, conversion, discounting, and marketing ROI."
    why_it_matters: "Public channels are visible but productivity is not."
    suggested_source_or_request: "CRM, sales compensation plan, and marketing analytics."
    priority: "medium"
  - gap_id: "G-008"
    chapter_id: "VI"
    section_id: "VI.A"
    missing_information: "R&D headcount, spend, project ownership, tape-out history, IP assignments, open-source compliance, and affiliate boundary with Sophgo."
    why_it_matters: "R&D and IP ownership determine defensibility and export-control exposure."
    suggested_source_or_request: "CTO / legal data room, patent counsel, and export-control counsel."
    priority: "high"
  - gap_id: "G-009"
    chapter_id: "VII"
    section_id: "VII.A"
    missing_information: "Current board, executive roster, org chart, delegation of authority, and governance remediation after the founder dispute."
    why_it_matters: "Public governance history is a material risk."
    suggested_source_or_request: "Board materials, HR records, and counsel memo."
    priority: "high"
  - gap_id: "G-010"
    chapter_id: "VII"
    section_id: "VII.G"
    missing_information: "Current headcount, attrition, critical-role retention, compensation, benefits, and option plan details."
    why_it_matters: "ASIC product execution depends on scarce engineering and support talent."
    suggested_source_or_request: "HRIS export, comp plan, option ledger, and employee-relations log."
    priority: "medium"
  - gap_id: "G-011"
    chapter_id: "VIII"
    section_id: "VIII.G"
    missing_information: "Export-control legal opinions, sanctions-screening controls, denied-party logs, Sophgo remediation, and government correspondence."
    why_it_matters: "Export-control issues can restrict supply, sales, financing, and reputation."
    suggested_source_or_request: "Outside counsel memo and compliance operations files."
    priority: "high"
  - gap_id: "G-012"
    chapter_id: "VIII"
    section_id: "VIII.A"
    missing_information: "Complete litigation schedule, claims, reserves, settlements, insurance notices, and counsel assessments."
    why_it_matters: "Public litigation history is incomplete and may omit pending or threatened matters."
    suggested_source_or_request: "General counsel litigation schedule and insurer correspondence."
    priority: "high"

