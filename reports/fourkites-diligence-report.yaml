          - VIII.G
        summary: No public regulatory enforcement history was found, but privacy and cross-border data obligations are
          material.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G.F1
            finding: Privacy policy discloses GDPR/controller/processor framework, data categories and international
              subsidiaries.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-006
          - finding_id: VIII.G.F2
            finding: Security certification claims indicate compliance investment, but incident and regulator
              correspondence history is not public.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-006
        hidden_risks:
          - Regulatory inquiries or security incidents may be confidential unless enforcement actions are
            public.
        evidence_gaps:
          - Regulator correspondence; privacy impact assessments; Schrems II/TIA documentation; incident log;
            audit reports; subprocessor notices.
        follow_up_questions:
          - Provide regulatory inquiry history, security/privacy incidents, DPIAs/TIAs and evidence of
            compliance with data transfer obligations.
