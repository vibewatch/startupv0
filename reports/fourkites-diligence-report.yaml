report_metadata:
  report_title: FourKites Diligence Research Report
  target_company: FourKites, Inc.
  website: https://www.fourkites.com/
  known_aliases:
    - FourKites
  sector: Supply chain visibility and logistics software
  geography: United States (Chicago, Illinois) with global operations
  company_stage: Private venture-backed unicorn / growth-stage SaaS
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/Chicago
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public evidence only
    - Company pages and press releases treated as untrusted primary claims
    - Market databases and search snippets used as directional inputs
    - Legal and regulatory records used where publicly accessible
  included_jurisdictions:
    - United States
    - Illinois
    - Delaware
    - European Union / GDPR-related privacy posture
    - India, Netherlands, Singapore, Poland and Germany as disclosed subsidiaries
  excluded_topics:
    - Non-public financial statements
    - Non-public cap table and contract terms
    - Paid analyst reports not publicly available
    - Management interviews and customer reference calls
  user_provided_materials: []
