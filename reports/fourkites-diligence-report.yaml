risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation support risk
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources provide only estimated revenue, funding and valuation figures; audited statements,
      ARR, margins, cash balance, debt and cap table are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-015
    mitigation_or_diligence_request: Obtain audited/reviewed financials, monthly management accounts, ARR bridge,
      cash/debt schedule, full cap table and financing documents.
  - risk_id: R-002
    risk_title: Financing and market-reset risk after late-stage rounds
    risk_category: financing
    severity: high
    likelihood: medium
    description: FourKites reached a reported $1B valuation in 2022 after a smaller Series D-1/Form D round;
      private-market multiple compression may affect liquidity, employee equity and down-round risk.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-015
    mitigation_or_diligence_request: Model valuation against current ARR, growth, gross margin and burn; review
      investor preferences, option repricing history and cash runway.
  - risk_id: R-003
    risk_title: Customer concentration and logo-to-revenue uncertainty
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public sources name many blue-chip logos but do not disclose paid ARR concentration, churn,
      expansion, renewal dates or whether named entities are active paying customers.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-005
      - EC-008
    mitigation_or_diligence_request: Request top-25 customer ARR, NRR/GRR by cohort, renewal calendar, customer
      reference calls and definition of connected vs paying customers.
  - risk_id: R-004
    risk_title: ROI and outcome-claim verification risk
    risk_category: market
    severity: medium
    likelihood: high
    description: Customer success stories report savings and performance improvements, but public materials do not
      disclose methodology, baseline, sample size or attribution.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.B
    evidence_claim_ids:
      - EC-009
    mitigation_or_diligence_request: Validate ROI with raw before/after data, implementation costs, customer
      interviews and independent reference checks.
  - risk_id: R-005
    risk_title: Crowded competitive market and pricing pressure
    risk_category: market
    severity: high
    likelihood: high
    description: FourKites competes with project44, Tive, Loop, Vector, Overhaul, Blue Yonder and other visibility
      or supply-chain suites; price and feature competition may compress growth or margins.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-011
      - EC-016
      - EC-017
    mitigation_or_diligence_request: Request win/loss analysis, pricing history, gross retention by competitor
      displacement and product differentiation roadmap.
  - risk_id: R-006
    risk_title: Privacy, security and cross-border location-data exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: The platform processes large volumes of logistics, geolocation and operational data across
      jurisdictions, making privacy, data-transfer, security incident and contractual liability diligence
      material.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.C
      - VIII.D
      - VIII.G
    evidence_claim_ids:
      - EC-012
      - EC-018
      - EC-020
    mitigation_or_diligence_request: Review SOC reports, ISO certificates, data maps, DPAs, subprocessor list,
      incident history, cyber insurance and cross-border transfer impact assessments.
  - risk_id: R-007
    risk_title: Legal and reputational overhang from project44 disputes
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Litigation between FourKites and project44 reached the Illinois Supreme Court and was later
      reported resolved; settlement terms and any insurance or conduct restrictions are not public.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.F
      - VIII.A
      - VIII.B
      - VIII.E
    evidence_claim_ids:
      - EC-013
    mitigation_or_diligence_request: Obtain docket search, settlement agreements, releases, insurance
      correspondence and counsel memo on remaining exposure.
  - risk_id: R-008
    risk_title: AI/product differentiation and monetization risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: FourKites markets AI agents, digital twins and patented ETA capabilities, but public data does
      not prove adoption, gross margin, accuracy uplift or defensibility versus competitors.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.D
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-012
    mitigation_or_diligence_request: Request model performance metrics, attach rates, module ARR, patent
      assignments, roadmap and customer proof for AI-agent workflows.
  - risk_id: R-009
    risk_title: Integration, partner and data-network dependency risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: The product depends on carrier, partner, customer and third-party integrations; partner breadth
      is public, but contractual durability and data-quality controls are not.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - III.B
      - III.E
      - V.C
      - VIII.F
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-010
      - EC-020
    mitigation_or_diligence_request: Review integration SLAs, partner agreements, data-quality KPIs, outage history and carrier churn.
  - risk_id: R-010
    risk_title: Management depth, retention and compensation opacity
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public sources show a broad leadership team and 500+ employees, but current org chart, executive
      turnover, compensation, equity incentives and employee-relations data are not public.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.G
    evidence_claim_ids:
      - EC-014
    mitigation_or_diligence_request: Request current org chart, executive bios, board minutes on compensation,
      option plan, retention metrics, attrition by function and key-person risk plan.
diligence_gaps:
