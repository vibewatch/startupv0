executive_summary:
  overall_assessment: FourKites appears to be an eligible private unicorn in supply-chain visibility with strong
    public evidence of network scale, enterprise logos, product breadth and analyst recognition. The
    investability question is dominated by non-public financial quality, customer concentration, competitive
    pricing and legal/privacy diligence.
  investment_or_diligence_thesis: If FourKites can substantiate positive cash flow, durable top-enterprise
    retention and monetization of AI/control-tower modules, it may represent a scaled category leader; without
    those proofs, the $1B valuation and blue-chip logo narrative carry material verification risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Large network-scale claims are consistently stated across current company materials and 2024 press
        releases.
      evidence_claim_ids:
        - EC-005
    - founder_claim_id: FC-004
      summary: Public materials name many blue-chip customers and claim broad Fortune 500/top-vertical penetration.
      evidence_claim_ids:
        - EC-008
    - founder_claim_id: FC-005
      summary: Security/privacy posture is supported by public ISO/privacy statements and patent references, though
        underlying reports are needed.
      evidence_claim_ids:
        - EC-012
        - EC-018
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, ARR, margins, cash, debt and cap table are not public despite valuation/funding
        signals.
    - risk_id: R-003
      summary: Named enterprise logos do not reveal revenue concentration, paid usage, churn or renewal risk.
    - risk_id: R-005
      summary: Crowded RTTVP and supply-chain software competition could pressure pricing, win rates and
        differentiation.
  key_evidence_gaps:
    - Audited/reviewed financial statements and ARR bridge
    - Fully diluted cap table and financing terms
    - Top-customer revenue concentration and retention
    - Win/loss and pricing data
    - Current litigation/settlement, privacy/security and material-contract documents
  recommended_next_steps:
    - Run company financial/cap-table data room review before valuation work
    - Conduct customer reference calls and churn/retention analysis
    - Commission competitive win/loss and pricing review
    - Have counsel review project44 settlement, IP, privacy, data and insurance materials
    - Validate AI-agent adoption, accuracy and monetization with product analytics
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports a venture-backed unicorn profile with substantial funding, a
      reported 2021 revenue estimate and a 2024 company claim of positive cash flow, but core financial
      diligence remains non-public.
    founder_claim_ids:
      - FC-002
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-015
      - EC-019
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Only public estimates and company claims are available; audited financial statements, management
          reports and AR/backlog schedules are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A.F1
            finding: CB Insights reports $65M 2021 revenue, but no audited income statement, balance sheet, cash-flow
              statement or footnotes were found publicly.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-001
          - finding_id: I.A.F2
            finding: The CEO stated in 2024 that FourKites had zero burn and positive cash flow, but no public cash-flow
              evidence was available.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Revenue quality, gross margin and cash runway may diverge materially from database estimates or
            promotional statements.
        evidence_gaps:
          - Audited/reviewed financial statements for FY2023-FY2025; monthly management accounts; ARR, gross
            margin and cash-flow bridge; AR aging; backlog by customer.
        follow_up_questions:
          - Provide annual and quarterly financial statements for the past three years and explain differences
            between GAAP revenue, ARR and customer-billed shipment volumes.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-015
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers are plausible from network scale, partner breadth and market tailwinds, but financial
          projections and assumptions are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B.F1
            finding: Public market snippets and Gartner-related recognition support category tailwinds, while FourKites
              claims positive cash flow.
            evidence_claim_ids:
              - EC-015
              - EC-016
              - EC-017
            risk_ids:
              - R-002
              - R-005
          - finding_id: I.B.F2
            finding: No public projections disclose revenue by product, customer or channel, capex, working capital, debt
              assumptions or pricing policy.
            evidence_claim_ids:
              - EC-002
              - EC-015
            risk_ids:
              - R-001
        hidden_risks:
          - Forward growth may rely on unverified assumptions about AI-agent monetization, enterprise
            expansion, international data compliance and competitive pricing.
        evidence_gaps:
          - Board-approved forecast; pipeline conversion; pricing model; product/channel/geography revenue
            split; capex/depreciation; financing assumptions.
        follow_up_questions:
          - Provide the next three fiscal years of quarterly projections with scenarios for pricing pressure,
            churn, market growth and foreign operations.
        table_ids:
          - T-004
        figure_ids: []
        evidence_claim_ids:
          - EC-015
          - EC-016
          - EC-017
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: The 2022 SEC filing confirms preferred stock and warrant issuance, but the full capitalization table,
          debt instruments and off-balance-sheet liabilities are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C.F1
            finding: SEC Form D confirms 2.5M Series D-1 preferred shares sold for $30M plus a warrant exercisable for up
              to 907,068 common shares.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-001
          - finding_id: I.C.F2
            finding: CB Insights reports 24 investors and a 2023 secondary round, but public sources do not disclose
              ownership percentages or liquidation preferences.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Warrants, preference stack, option pool, debt or investor rights could materially affect
            common-equity value.
        evidence_gaps:
          - Current cap table; option/warrant ledger; SAFEs/notes; debt and bank lines; investor rights;
            off-balance-sheet liabilities.
        follow_up_questions:
          - Provide a fully diluted capitalization table with all preferred terms, options, warrants, debt and
            secondary-transfer history.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-002
          - EC-003
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is publicly visible at a high level, but tax posture, accounting policies and
          detailed round economics are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D.F1
            finding: FourKites announced a $100M Series D in 2021 and has reported total funding of $242.9M across 12
              rounds.
            evidence_claim_ids:
              - EC-002
              - EC-004
            risk_ids:
              - R-001
          - finding_id: I.D.F2
            finding: No public evidence was found of a completed IPO, acquisition, bankruptcy or shutdown.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-001
        hidden_risks:
          - Tax liabilities, revenue-recognition policies and investor preferences may create hidden
            obligations not visible in public funding announcements.
        evidence_gaps:
          - Tax returns and NOL schedule; revenue-recognition memo; complete financing documents; investor
            consents; board minutes approving financings.
        follow_up_questions:
          - Provide tax, accounting-policy and financing-history schedules with amounts, prices, ownership,
            preferences and current basis by investor.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-004
          - EC-019
  - chapter_id: II
    title: Products
    chapter_summary: FourKites offers an enterprise supply-chain control-tower platform built on network data,
      digital twins and AI-enabled workflow modules. Public materials show broad product scope but not
      SKU-level revenue, adoption, margin or technical benchmarks.
    founder_claim_ids:
      - FC-001
      - FC-003
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-012
    risk_ids:
      - R-008
      - R-009
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public product pages describe a suite spanning real-time visibility, control tower, digital twins, AI
          agents, yard/appointment, ocean and air visibility.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A.F1
            finding: The core platform is marketed as an Intelligent Control Tower combining real-time network data,
              digital twins and AI-powered Digital Workers.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-008
              - R-009
          - finding_id: II.A.F2
            finding: Company sources cite Dynamic Yard, Dynamic Ocean, patented ETA capabilities and 120+ features
              delivered in 2020.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-008
          - finding_id: II.A.F3
            finding: Security and privacy controls appear material to product trust because the platform ingests large
              volumes of logistics and location data.
            evidence_claim_ids:
              - EC-012
              - EC-018
            risk_ids:
              - R-006
        hidden_risks:
          - Feature breadth may mask uneven adoption, implementation complexity, integration maintenance
            burden or SKU profitability gaps.
        evidence_gaps:
          - ARR and gross margin by product; active customers per module; implementation time; model accuracy;
            downtime; support-ticket trends; roadmap.
        follow_up_questions:
          - Provide product-level ARR, attach rates, retention, gross margin, roadmap and customer references
            for each major module.
        table_ids:
          - T-005
          - T-006
        figure_ids:
          - F-003
          - F-004
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-012
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence shows substantial enterprise customer validation and named blue-chip logos,
      but customer revenue concentration, churn, renewal quality and supplier/data dependencies are not
      public.
    founder_claim_ids:
      - FC-001
      - FC-004
    evidence_claim_ids:
      - EC-005
      - EC-008
      - EC-009
      - EC-010
      - EC-013
      - EC-018
    risk_ids:
      - R-003
      - R-004
      - R-006
      - R-009
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Company and database sources identify many named customers and quantified case-study outcomes, but
          not a top-15 list by revenue or application.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A.F1
            finding: Named public customers include major CPG, retail, manufacturing, healthcare and logistics brands such
              as Coca-Cola, 3M, Cargill, Bayer, Dow and Cardinal Health.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-003
          - finding_id: III.A.F2
            finding: Customer-success pages disclose outcome metrics including detention reductions, response-time
              improvements and hours saved.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-004
        hidden_risks:
          - Named logos may include inactive, low-ARR, pilot, carrier-connected or partner-enabled accounts
            rather than material paying customers.
        evidence_gaps:
          - Top-15 customers by ARR for FY2024, FY2025 and current YTD; product ownership; contract dates;
            implementation status; reference readiness.
        follow_up_questions:
          - Provide top-15 customer schedules by application, contract value, product mix, renewal date and
            usage metrics.
        table_ids:
          - T-007
          - T-008
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-005
          - EC-008
          - EC-009
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: FourKites discloses strategic partners and technology/SI integrations, including SAP, Blue Yonder,
          Infor Nexus, Infosys and others.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B.F1
            finding: The public partner directory lists 24 partners across technology and SI/consulting categories.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-009
          - finding_id: III.B.F2
            finding: Strategic ecosystem breadth can support implementation and distribution but revenue contribution is
              undisclosed.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-009
        hidden_risks:
          - Partner dependencies can create co-sell channel conflict, integration fragility or revenue leakage
            if agreements are non-exclusive or low-commitment.
        evidence_gaps:
          - Partner contracts; co-sell pipeline; implementation capacity; revenue contribution by partner;
            termination rights; integration SLAs.
        follow_up_questions:
          - Provide partner-contract summary, revenue influenced by each partner and current
            integration/support obligations.
        table_ids:
          - T-009
        figure_ids: []
        evidence_claim_ids:
          - EC-010
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No public source discloses revenue by customer or any customer accounting for 5% or more of revenue.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C.F1
            finding: Public customer logos validate market reach but do not disclose paid revenue, concentration or
              renewal exposure.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-003
          - finding_id: III.C.F2
            finding: Reported network metrics do not substitute for revenue concentration because shipment volume and ARR
              may not correlate.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-003
        hidden_risks:
          - A small number of enterprise shippers or strategic accounts could represent a disproportionate
            share of ARR.
        evidence_gaps:
          - ARR by customer; customer-level gross margin; NRR/GRR; multi-year renewal schedule; credit risk
            and receivables aging by customer.
        follow_up_questions:
          - Provide revenue concentration analysis including all customers above 5% of ARR and changes over
            the last two fiscal years.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-008
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public customer/partner termination schedule was found; project44 legal disputes were reported
          resolved in late 2024.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D.F1
            finding: Public reporting indicates legal disputes with project44 were resolved, but settlement terms were not
              disclosed.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-007
          - finding_id: III.D.F2
            finding: No public evidence identified significant customer or supplier relationships severed within the last
              two years.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-003
        hidden_risks:
          - Material churn or partner terminations would not necessarily be publicly visible unless litigated
            or announced.
        evidence_gaps:
          - Customer churn log; partner/supplier termination list; non-renewal reasons; litigation or demand
            letters involving customers or partners.
        follow_up_questions:
          - Provide a schedule of all material customer, partner and supplier relationships lost or impaired
            in the past 24 months.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-013
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Top suppliers and purchase amounts are not public. Material dependencies likely include cloud
          infrastructure, data providers, carriers, integration partners and privacy/security vendors.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E.F1
            finding: The platform depends on a broad partner and carrier ecosystem plus processing of logistics and
              geolocation data.
            evidence_claim_ids:
              - EC-005
              - EC-010
              - EC-018
            risk_ids:
              - R-006
              - R-009
          - finding_id: III.E.F2
            finding: Public security materials indicate large-scale monthly data ingestion, increasing infrastructure and
              data-governance dependency.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-006
              - R-009
        hidden_risks:
          - Cloud, telemetry, carrier or EDI/API dependencies could create service-quality, margin or
            compliance risk if contracts are weak.
        evidence_gaps:
          - Top supplier spend; cloud commitments; data-provider agreements; carrier connectivity contracts;
            subprocessor list; vendor concentration.
        follow_up_questions:
          - Provide top suppliers for the past two fiscal years and YTD with spend, termination rights, SLAs
            and data-processing obligations.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-010
          - EC-012
          - EC-018
  - chapter_id: IV
    title: Competition
    chapter_summary: FourKites has strong analyst recognition and network-scale claims, but the RTTVP market is
      crowded and includes direct visibility rivals and broader supply-chain platforms.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-011
      - EC-016
      - EC-017
    risk_ids:
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: FourKites competes in real-time transportation visibility and broader supply-chain execution against
          focused startups and enterprise software suites.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A.F1
            finding: CB Insights lists competitors including project44, Tive, Loop, Vector, Overhaul, Arteria, BuyCo,
              Arviem, Evertracker and Blue Yonder.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-005
          - finding_id: IV.A.F2
            finding: FourKites announced Gartner Leader recognition for the fourth consecutive year, while noting Gartner
              does not endorse vendors.
            evidence_claim_ids:
              - EC-016
            risk_ids:
              - R-005
          - finding_id: IV.A.F3
            finding: Market-size snippets indicate growth but disagree materially on market size and CAGR.
            evidence_claim_ids:
              - EC-017
            risk_ids:
              - R-005
        hidden_risks:
          - Competitive pricing, suite bundling, sensor-led competitors and customer procurement pressure may
            reduce win rates or gross margin.
        evidence_gaps:
          - Win/loss analysis; pricing by competitor; churn to competitors; market-share data;
            Gartner/Forrester reports; product differentiation benchmarks.
        follow_up_questions:
          - Provide competitive win/loss and pricing analysis by segment, including recent displacements and
            losses to project44, Tive, Blue Yonder and other suites.
        table_ids:
          - T-010
          - T-011
        figure_ids:
          - F-006
        evidence_claim_ids:
          - EC-011
          - EC-016
          - EC-017
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: FourKites appears to use enterprise direct sales, thought leadership, customer proof, analyst
      recognition and partner ecosystem motions. Sales productivity, quotas, pipeline and budget adequacy
      remain non-public.
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-010
      - EC-016
    risk_ids:
      - R-003
      - R-004
      - R-005
      - R-009
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: Public positioning emphasizes AI-driven supply-chain transformation, enterprise logos, Gartner
          recognition and partner ecosystem reach.
