  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer and top-25 customer concentration, retention and renewal schedule.
    why_it_matters: Tests logo quality and concentration risk.
    suggested_source_or_request: CRM/billing export and customer contracts.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Independent validation of published ROI outcomes.
    why_it_matters: Determines whether customer-success claims generalize.
    suggested_source_or_request: Customer references and raw before/after KPI data.
    priority: medium
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, competitive pricing and market share by segment.
    why_it_matters: Competitive pressure is a major risk to growth and margins.
    suggested_source_or_request: Sales ops and product marketing analysis.
    priority: high
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity model, CAC/payback, quotas and pipeline conversion.
    why_it_matters: Determines scalability of GTM plan.
    suggested_source_or_request: CRM, compensation plans and board operating plan.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: AI-agent adoption, ARR, accuracy, incident and model-risk metrics.
    why_it_matters: AI positioning may drive valuation but is not independently verified.
    suggested_source_or_request: Product analytics, model cards and customer references.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: Historical and projected headcount, attrition and compensation by function/location.
    why_it_matters: Execution and retention risk are opaque.
    suggested_source_or_request: HRIS export and compensation committee materials.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Current litigation schedule and project44 settlement terms.
    why_it_matters: Legal overhang and insurance/reserve impact are unknown.
    suggested_source_or_request: Counsel memo and settlement agreements.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC reports, security incidents, subprocessor list, regulator correspondence and
      transfer-impact assessments.
    why_it_matters: Cross-border location data creates privacy/security exposure.
    suggested_source_or_request: Security/privacy compliance data room.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer, partner, vendor and data contracts.
    why_it_matters: Contract terms determine revenue quality, liability and change-of-control risk.
    suggested_source_or_request: Executed contract repository and legal summaries.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Complete IP schedule, patent assignments and open-source compliance scan.
    why_it_matters: Needed to validate technical defensibility and freedom to operate.
    suggested_source_or_request: IP counsel file and engineering OSS scan.
    priority: medium
