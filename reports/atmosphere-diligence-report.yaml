diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, monthly management accounts, ARR/bookings, gross margin, cash, debt and forecast model.
    why_it_matters: Required to validate revenue quality, runway, profitability and valuation support.
    suggested_source_or_request: Company CFO / finance data room
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, preferences, warrants, option pool, debt agreements, covenants and investor rights.
    why_it_matters: Headline valuation may not reflect economic ownership or downside outcomes.
    suggested_source_or_request: Company counsel and finance
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top customers/advertisers/venues by revenue, contract terms, renewal dates, churn and NRR cohorts.
    why_it_matters: Revenue concentration and retention drive durability of a media network.
    suggested_source_or_request: Revenue operations / customer success
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, pipeline, fill rate, CPM/RPM and campaign renewal metrics.
    why_it_matters: Determines whether growth is efficient and repeatable.
    suggested_source_or_request: Sales and marketing operations
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, R&D budget, reliability/incident history, technical debt, security backlog and support burden.
    why_it_matters: Validates product scalability and execution risk.
    suggested_source_or_request: CTO / product leadership
    priority: medium
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Current HRIS, org chart, compensation bands, attrition by function/level, open requisitions and severance liabilities.
    why_it_matters: Needed to reconcile public employee count, layoff and no-open-role signals.
    suggested_source_or_request: People team
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP assignments, trademark status, content licenses, copyright/takedown logs and open-source compliance.
    why_it_matters: Content and IP rights are central to the channel product.
    suggested_source_or_request: Company counsel
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Privacy data map, DPAs, measurement vendor contracts, regulatory correspondence, insurance policies and material contracts.
    why_it_matters: Advertising measurement and proximity targeting create legal/compliance exposure.
    suggested_source_or_request: Company counsel / privacy lead
    priority: high
