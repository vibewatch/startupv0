report_metadata:
  report_title: Atmosphere Startup Diligence Report
  target_company: Atmosphere
  website: https://atmosphere.tv/
  known_aliases:
    - Atmosphere
    - Atmosphere TV
  sector: Media and entertainment, out-of-home connected TV advertising and business streaming
  geography: United States / Austin, Texas with venue network in North America and selected international surfaces
  company_stage: Private unicorn / Series D growth-stage company
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built eligibility from the workflow's CB Insights unicorn list row and public company pages.
    - Prioritized company-owned press, product, advertising, channel, brand-control, careers and about pages.
    - Treated company-published audience, venue and campaign metrics as verified only as public company claims unless independently corroborated.
    - Marked financial statements, cap table, customer contracts, audience-audit files, legal dockets and security reports as not publicly verifiable.
  included_jurisdictions:
    - United States
    - United Kingdom support surface
    - Public venue and advertising markets referenced by Atmosphere materials
  excluded_topics:
    - Private financial statements, detailed cap table, board materials, customer contracts, advertiser insertion orders, content licenses, litigation docket workups, security reports and HR records were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow-provided random-unicorn candidate context
      type: workflow_request
      date_received: 2026-05-25
      notes: "Candidate from CB Insights Global Unicorn Club: Atmosphere, slug atmosphere, valuation $1B, country United States, industry Media & Entertainment."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Atmosphere is an active private unicorn valued at approximately $1B.
    claim_source: CB Insights unicorn list and Atmosphere press page
    claim_date: 2026-05-25
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.A, I.B]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001, EC-002]
    contradiction_summary: null
    diligence_follow_up:
      - Request primary financing documents, investor rights, current cap table, option/debt schedules and valuation support.
  - founder_claim_id: FC-002
    claim_text: Atmosphere operates a business streaming platform with 30+ audio-optional, brand-safe channels.
    claim_source: Atmosphere channels and advertising pages
    claim_date: null
    mapped_chapter_ids: [II, VI]
    mapped_section_ids: [II.A, VI.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-004, EC-007, EC-008]
    contradiction_summary: Public materials verify product positioning but not viewing quality, content economics, uptime or roadmap execution.
    diligence_follow_up:
      - Request device telemetry, content-cost schedule, uptime data, roadmap, content-license inventory and product usage cohorts.
  - founder_claim_id: FC-003
    claim_text: Atmosphere reaches large out-of-home audiences and advertisers through venues such as restaurants, bars, gyms and airports.
    claim_source: Atmosphere press and advertising pages
    claim_date: null
    mapped_chapter_ids: [III, V]
    mapped_section_ids: [III.A, V.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-003, EC-005, EC-009]
    contradiction_summary: Company-published reach and campaign metrics are not independently audited in the public record reviewed.
    diligence_follow_up:
      - Request third-party audience audits, venue count reconciliation, advertiser concentration, campaign-level lift methodology and insertion-order samples.
  - founder_claim_id: FC-004
    claim_text: Atmosphere monetizes through advertising while also offering venue software features such as digital signage and remote screen controls.
    claim_source: Atmosphere advertise, digital signage and brand-control pages
    claim_date: null
    mapped_chapter_ids: [I, II, V]
    mapped_section_ids: [I.C, II.B, V.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-006, EC-007, EC-008]
    contradiction_summary: Public materials do not disclose ad revenue, venue economics, pricing, inventory sell-through, CAC or payback.
    diligence_follow_up:
      - Request revenue mix, sell-through, CPM/CPA economics, venue subsidy economics, device costs, gross margin and CAC/payback by channel.
  - founder_claim_id: FC-005
    claim_text: Atmosphere has a public leadership roster and active hiring/culture surface.
    claim_source: Atmosphere about and careers pages
    claim_date: null
    mapped_chapter_ids: [VI, VII]
    mapped_section_ids: [VI.A, VII.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-010, EC-011]
    contradiction_summary: Leadership and careers pages verify public management signals, but headcount, attrition, retention and compensation are not public.
    diligence_follow_up:
      - Request org chart, HRIS headcount history, regretted attrition, retention, compensation plans, employment claims and management contracts.
executive_summary:
  overall_assessment: Atmosphere appears eligible as an active private unicorn based on CB Insights and company press evidence, with active product, advertising and careers surfaces. Underwriting remains constrained by heavy reliance on company-published metrics and missing private financial, customer, legal and operational records.
  investment_or_diligence_thesis: Proceed only with confirmatory diligence that verifies ad revenue quality, venue/audience measurement, content and device economics, customer concentration, legal/IP posture and whether the $1B valuation remains supportable under current out-of-home advertising conditions.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Atmosphere as a $1B U.S. unicorn and Atmosphere's press page describes a $65M Series D at a $1B valuation.
      evidence_claim_ids: [EC-001, EC-002]
    - founder_claim_id: FC-002
      summary: Company pages verify an active business-streaming product with 30+ audio-optional channels and dashboard-controlled signage/features.
      evidence_claim_ids: [EC-004, EC-007, EC-008]
    - founder_claim_id: FC-003
      summary: Atmosphere publicly claims large monthly reach and venue footprint, including 160M monthly consumers on the advertising page.
      evidence_claim_ids: [EC-003, EC-005]
  biggest_risks:
    - risk_id: R-001
      summary: Financial and valuation support are not public despite the $1B headline valuation.
    - risk_id: R-002
      summary: Audience, venue and campaign-lift claims require independent audit and methodology review.
    - risk_id: R-003
      summary: Advertising demand, content licensing and device/venue subsidy economics could pressure margins.
  key_evidence_gaps:
    - Audited financial statements, cash/debt, revenue mix, gross margin, CAC/payback, backlog and cash runway.
    - Current cap table, liquidation preferences, investor rights, debt, warrants and option pool.
    - Venue count reconciliation, monthly active screens, audience-audit methodology, advertiser concentration and insertion-order terms.
    - Content-license obligations, device supply chain, uptime, security/privacy reviews and data processing controls.
    - Litigation, IP/trademark, regulatory, employment and contract schedules from counsel.
  recommended_next_steps:
    - Validate valuation against actual revenue, gross margin and 2024-2026 advertising growth.
    - Commission customer, venue and advertiser reference calls with independent audience and campaign-measurement review.
    - Review content licensing, device subsidy, inventory sell-through and ad-tech partner dependencies.
    - Have counsel complete litigation, privacy, IP, employment and material-contract diligence.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources verify funding and valuation anchors, but operating financials, revenue quality, cash runway, debt and cap table are not public.
    founder_claim_ids: [FC-001, FC-004]
    evidence_claim_ids: [EC-001, EC-002, EC-006, EC-012]
    risk_ids: [R-001, R-004]
    sections:
      - section_id: I.A
        title: Funding, valuation and capitalization
        checklist_question_ids: [I.A.1, I.B.1, I.C.1]
        summary: CB Insights and Atmosphere's press page support a $1B valuation anchor; primary financing instruments and current capitalization remain private.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: The public valuation anchor is consistent across the CB Insights candidate list and Atmosphere's own Series D press item.
            evidence_claim_ids: [EC-001, EC-002]
            risk_ids: [R-001]
        hidden_risks:
          - Liquidation preferences, debt, warrants or down-round protections may materially change common-equity value.
        evidence_gaps:
          - No audited financials, cap table, investor-rights schedule or current valuation support was public.
        follow_up_questions:
          - Provide financing documents, board consents, post-money capitalization, preference stack and current 409A.
        table_ids: [T-001]
        figure_ids: [F-001, F-002]
        evidence_claim_ids: [EC-001, EC-002, EC-012]
      - section_id: I.B
        title: Revenue quality and unit economics
        checklist_question_ids: [I.D.1, I.E.1, I.F.1]
        summary: Public pages show advertising and venue-software monetization surfaces but do not disclose revenue, margin, CAC, payback or customer concentration.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Advertising and digital-signage surfaces are observable, while actual economics require private records.
            evidence_claim_ids: [EC-006, EC-007, EC-008]
            risk_ids: [R-001, R-004]
        hidden_risks:
          - A free venue service could require material device, support and content subsidies before advertising scale covers costs.
        evidence_gaps:
          - No public ARR, revenue mix, gross margin, device cost, venue subsidy, CAC or payback data was found.
        follow_up_questions:
          - Provide revenue by product line, gross-margin bridge, device economics, advertiser retention and venue cohort contribution.
        table_ids: [T-002]
        figure_ids: []
        evidence_claim_ids: [EC-006, EC-007, EC-008, EC-012]
  - chapter_id: II
    title: Products
    chapter_summary: Atmosphere publicly offers out-of-home streaming channels, digital signage and screen-management controls; usage, reliability and roadmap depth remain private.
    founder_claim_ids: [FC-002, FC-004]
    evidence_claim_ids: [EC-004, EC-007, EC-008]
    risk_ids: [R-003, R-005]
    sections:
      - section_id: II.A
        title: Product portfolio and functionality
        checklist_question_ids: [II.A.1, II.A.2]
        summary: Public pages support a product suite spanning 30+ channels, dashboard-controlled signage and remote screen management for business venues.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: The product surface combines entertainment channels, venue messaging and controls for scheduling and permissions.
            evidence_claim_ids: [EC-004, EC-007, EC-008]
            risk_ids: [R-003]
        hidden_risks:
          - Product value depends on quality of content rights, device uptime, support responsiveness and advertiser-friendly audience attention.
        evidence_gaps:
          - No public platform uptime, device-failure rate, content-license economics or product roadmap was found.
        follow_up_questions:
          - Provide usage telemetry, device fleet age, uptime, support SLAs, roadmap and content rights schedule.
        table_ids: [T-003]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-004, EC-007, EC-008]
      - section_id: II.B
        title: Pricing, packaging and product-market fit
        checklist_question_ids: [II.B.1, II.C.1]
        summary: Public materials emphasize a free monthly service for venues and advertising solutions for brands, but realized pricing is not public.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: II.B-F1
            finding: Venue-facing product pages mention free monthly service and marketing tools, while advertiser pricing remains undisclosed.
            evidence_claim_ids: [EC-006, EC-007]
            risk_ids: [R-004]
        hidden_risks:
          - Free venue adoption may not translate into high-quality ad impressions or profitable monetization.
        evidence_gaps:
          - No price card, take rate, minimum spend, venue device costs or churn by cohort was public.
        follow_up_questions:
          - Provide current price book, discount policy, advertiser ROI studies, venue churn and product-margin bridge.
        table_ids: [T-004]
        figure_ids: []
        evidence_claim_ids: [EC-006, EC-007, EC-012]
  - chapter_id: III
    title: Customer Information
    chapter_summary: Atmosphere cites a large venue and consumer footprint and publishes logos/testimonials, but revenue concentration, retention and customer-contract quality are not public.
    founder_claim_ids: [FC-003]
    evidence_claim_ids: [EC-003, EC-005, EC-009]
    risk_ids: [R-002, R-006]
    sections:
      - section_id: III.A
        title: Venue, advertiser and audience evidence
        checklist_question_ids: [III.A.1, III.B.1, III.C.1]
        summary: Company pages claim 50,000 venues in 2023 and 160M monthly consumers on the current advertising page; these are not independently audited in public sources reviewed.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Atmosphere's public reach claims show scale, but private diligence must reconcile active venues, active screens and verified audience.
            evidence_claim_ids: [EC-003, EC-005]
            risk_ids: [R-002, R-006]
        hidden_risks:
          - Venue count, screen activity, dwell time and demographic quality may diverge from headline monthly-consumer reach.
        evidence_gaps:
          - No venue cohort file, active-screen audit, advertiser revenue concentration or customer contracts were public.
        follow_up_questions:
          - Provide top customers, top advertisers, venue cohorts, audited impression methodology and churn/renewal schedules.
        table_ids: [T-005]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-003, EC-005, EC-009]
      - section_id: III.B
        title: Partnerships and dependencies
        checklist_question_ids: [III.D.1, III.E.1]
        summary: Press items and product pages show partnership claims with ad-tech, venue, event and content partners; dependency economics and exclusivity are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Public partnership evidence includes VIOOH programmatic access, HYROX and airports/venue signals.
            evidence_claim_ids: [EC-009]
            risk_ids: [R-003, R-006]
        hidden_risks:
          - Programmatic demand partners, content owners or device suppliers could constrain inventory quality or margin.
        evidence_gaps:
          - No partner contracts, content license terms, exclusivity restrictions or supplier concentration schedule was public.
        follow_up_questions:
          - Provide material partner contracts, ad-tech dependency map, content license schedule and device supplier list.
        table_ids: [T-006]
        figure_ids: []
        evidence_claim_ids: [EC-009, EC-012]
  - chapter_id: IV
    title: Competition
    chapter_summary: Atmosphere competes across out-of-home TV, digital signage, retail media and CTV advertising; defensibility is not provable from public materials alone.
    founder_claim_ids: [FC-002, FC-003]
    evidence_claim_ids: [EC-004, EC-005, EC-006]
    risk_ids: [R-003, R-004]
    sections:
      - section_id: IV.A
        title: Competitive landscape
        checklist_question_ids: [IV.A.1, IV.B.1]
        summary: Atmosphere positions as a business-streaming and out-of-home video advertising network, adjacent to digital signage networks, retail media and CTV ad platforms.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Differentiation is based on venue-first entertainment plus brand-safe ad inventory, but competitor win/loss data is private.
            evidence_claim_ids: [EC-004, EC-005, EC-006]
            risk_ids: [R-003]
        hidden_risks:
          - Larger ad platforms and retail media networks may have stronger demand, attribution and measurement capabilities.
        evidence_gaps:
          - No win/loss, pricing benchmark, share data, customer switching data or exclusivity analysis was public.
        follow_up_questions:
          - Provide competitor win/loss analysis, CPM benchmarks, attribution methodology and customer switching/churn reasons.
        table_ids: [T-007]
        figure_ids: [F-005]
        evidence_claim_ids: [EC-004, EC-005, EC-006]
      - section_id: IV.B
        title: Basis of competition and moat
        checklist_question_ids: [IV.C.1, IV.D.1]
        summary: Public evidence supports broad channel inventory and venue features, but proprietary moat depends on audience quality, data, content rights and sales execution.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: IV.B-F1
            finding: Moat claims require private proof of exclusive inventory, defensible measurement and profitable advertiser retention.
            evidence_claim_ids: [EC-004, EC-005, EC-009]
            risk_ids: [R-003, R-004]
        hidden_risks:
          - If content, hardware and ad-tech are replicable, competition may compress CPMs and venue economics.
        evidence_gaps:
          - No patents, exclusive rights list, proprietary data model documentation or long-term ad contracts were public.
        follow_up_questions:
          - Provide content exclusivity, data rights, audience measurement validation and advertiser retention cohorts.
        table_ids: [T-008]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-005, EC-009, EC-012]
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Atmosphere shows dual GTM motions to venues and advertisers, supported by public press, campaigns and partner announcements; funnel conversion and sales productivity are private.
    founder_claim_ids: [FC-003, FC-004]
    evidence_claim_ids: [EC-005, EC-006, EC-007, EC-009]
    risk_ids: [R-002, R-004]
    sections:
      - section_id: V.A
        title: GTM channels and funnel
        checklist_question_ids: [V.A.1, V.C.1, V.D.1]
        summary: The public funnel includes self-serve get-started flows for venues, demo/contact surfaces and advertiser campaign sales.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: Venue-facing and advertiser-facing pages support a two-sided GTM motion, but CAC/payback and conversion are private.
            evidence_claim_ids: [EC-005, EC-006, EC-007]
            risk_ids: [R-004]
        hidden_risks:
          - The business may require expensive venue acquisition and advertiser sales cycles before inventory monetizes.
        evidence_gaps:
          - No funnel conversion, sales productivity, quota attainment, CAC or channel-mix data was public.
        follow_up_questions:
          - Provide GTM funnel metrics by venue/advertiser segment, CAC/payback, sales productivity and attribution.
        table_ids: [T-009]
        figure_ids: [F-006]
        evidence_claim_ids: [EC-005, EC-006, EC-007]
      - section_id: V.B
        title: Marketing proof points and campaign outcomes
        checklist_question_ids: [V.B.1, V.E.1]
        summary: Atmosphere publishes campaign and press proof points, including a Jack in the Box lift claim, but methodology is not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.B-F1
            finding: The Jack in the Box campaign claim provides a public outcome signal but requires independent methodology review.
            evidence_claim_ids: [EC-005]
            risk_ids: [R-002]
        hidden_risks:
          - Campaign lift can be overstated if control groups, attribution windows or foot-traffic vendors are weak.
        evidence_gaps:
          - No campaign-level raw data, measurement vendor report or repeat-advertiser retention cohort was public.
        follow_up_questions:
          - Provide campaign measurement packets, advertiser references, insertion order renewals and lift-study methodology.
        table_ids: [T-010]
        figure_ids: []
        evidence_claim_ids: [EC-005, EC-009]
  - chapter_id: VI
    title: Research and Development
    chapter_summary: Public evidence shows product leadership and active software/product surfaces; R&D spend, engineering headcount, IP and roadmap velocity are private.
    founder_claim_ids: [FC-002, FC-005]
    evidence_claim_ids: [EC-007, EC-008, EC-010, EC-011]
    risk_ids: [R-005]
    sections:
      - section_id: VI.A
        title: Product and technical organization
        checklist_question_ids: [VI.A.1, VI.B.1]
        summary: Public leadership includes CTO and CPO roles, while pages show dashboard, scheduling, content and ad features that require software operations.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.A-F1
            finding: Product and technical accountability is publicly visible, but engineering capacity and roadmap quality are not.
            evidence_claim_ids: [EC-008, EC-010]
            risk_ids: [R-005]
        hidden_risks:
          - Scaling device management and ad delivery across thousands of venues may require infrastructure reliability not visible in public materials.
        evidence_gaps:
          - No R&D budget, roadmap, incident history, security documentation or engineering headcount was public.
        follow_up_questions:
          - Provide R&D budget, roadmap, engineering org chart, incident logs, security reports and release velocity.
        table_ids: [T-011]
        figure_ids: [F-007]
        evidence_claim_ids: [EC-007, EC-008, EC-010]
      - section_id: VI.B
        title: IP, roadmap and technical dependencies
        checklist_question_ids: [VI.C.1, VI.D.1]
        summary: Public sources did not provide a detailed IP portfolio or technical dependency inventory; content, device and ad-tech dependencies require diligence.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VI.B-F1
            finding: The product footprint implies content, device, dashboard and ad-tech dependencies, but ownership and IP protection are not public.
            evidence_claim_ids: [EC-004, EC-007, EC-008]
            risk_ids: [R-005, R-007]
        hidden_risks:
          - Weak IP ownership, content-license gaps or third-party system dependencies could impair scale and acquirer diligence.
        evidence_gaps:
          - No patent search, source-code review, content/license schedule, SOC report or technical vendor list was available.
        follow_up_questions:
          - Provide IP schedule, content rights, third-party vendor list, source-code ownership records and security attestations.
        table_ids: [T-012]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-007, EC-008, EC-012]
  - chapter_id: VII
    title: Management and Personnel
    chapter_summary: Atmosphere discloses senior leadership and careers benefits; board composition, headcount, turnover, compensation and employee matters are private.
    founder_claim_ids: [FC-005]
    evidence_claim_ids: [EC-010, EC-011]
    risk_ids: [R-008]
    sections:
      - section_id: VII.A
        title: Senior leadership and governance
        checklist_question_ids: [VII.A.1, VII.B.1]
        summary: The about page lists CEO, CIO, President, CTO, CPO and CRO leadership roles, supporting active management presence.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: VII.A-F1
            finding: Public leadership roster identifies operational ownership across executive, technology, product and revenue roles.
            evidence_claim_ids: [EC-010]
            risk_ids: [R-008]
        hidden_risks:
          - Public leadership roster does not reveal board control, succession, key-person risk or founder/investor rights.
        evidence_gaps:
          - No board list, employment agreements, retention data or compensation plan was public.
        follow_up_questions:
          - Provide board minutes, investor-rights schedule, executive agreements, retention plans and succession plan.
        table_ids: [T-013]
        figure_ids: [F-008]
        evidence_claim_ids: [EC-010]
      - section_id: VII.B
        title: Hiring, culture and retention
        checklist_question_ids: [VII.C.1, VII.F.1, VII.G.1]
        summary: Careers page describes mission and benefits, but headcount growth, hiring plan, attrition and employee claims are not public.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: VII.B-F1
            finding: Atmosphere presents an active employer brand, while HR quality metrics require company records.
            evidence_claim_ids: [EC-011]
            risk_ids: [R-008]
        hidden_risks:
          - High-growth media/ad-tech operations can face sales turnover, content operations complexity and support staffing pressure.
        evidence_gaps:
          - No HRIS history, regretted attrition, diversity metrics, compensation bands or employment-claim schedule was public.
        follow_up_questions:
          - Provide headcount by function, hiring plan, attrition, compensation benchmarking and employment/legal claims.
        table_ids: [T-014]
        figure_ids: []
        evidence_claim_ids: [EC-011, EC-012]
  - chapter_id: VIII
    title: Legal and Related Matters
    chapter_summary: Public website surfaces legal/policy links, but litigation, regulatory, IP, material contracts, insurance and privacy/security diligence require company and counsel records.
    founder_claim_ids: [FC-001, FC-004]
    evidence_claim_ids: [EC-012]
    risk_ids: [R-007, R-009]
    sections:
      - section_id: VIII.A
        title: Litigation, regulatory and contractual matters
        checklist_question_ids: [VIII.A.1, VIII.B.1, VIII.C.1]
        summary: No reliable public litigation or regulatory schedule was available in the collected sources; website policy pages were partially inaccessible during fetch.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.A-F1
            finding: Absence of public evidence is not evidence of absence; counsel must provide legal schedules.
            evidence_claim_ids: [EC-012]
            risk_ids: [R-007, R-009]
        hidden_risks:
          - Advertising privacy, music/content rights, venue contracts, device warranties and employment claims can create material liabilities.
        evidence_gaps:
          - No docket search artifact, litigation schedule, regulatory correspondence, insurance schedule or material-contract list was public.
        follow_up_questions:
          - Provide litigation/regulatory schedule, insurance policies, advertising/privacy compliance memo and material contracts.
        table_ids: [T-015]
        figure_ids: [F-009, F-010]
        evidence_claim_ids: [EC-012]
      - section_id: VIII.B
        title: Intellectual property, privacy and data rights
        checklist_question_ids: [VIII.D.1, VIII.E.1, VIII.F.1]
        summary: Public pages show reliance on content, advertising and consumer/venue data flows; IP ownership, privacy compliance and data rights require private review.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.B-F1
            finding: Content, data and ad measurement rights are core to the model but not sufficiently documented in public sources.
            evidence_claim_ids: [EC-004, EC-005, EC-012]
            risk_ids: [R-007, R-009]
        hidden_risks:
          - Content rights, privacy/consent, measurement data ownership or creative approvals could restrict monetization.
        evidence_gaps:
          - No trademark/patent schedule, content-license schedule, DPA inventory, privacy assessment or data-rights memo was public.
        follow_up_questions:
          - Provide IP schedule, privacy/security assessment, DPA inventory, data-rights terms and content/advertiser approval workflows.
        table_ids: [T-016]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-005, EC-012]
