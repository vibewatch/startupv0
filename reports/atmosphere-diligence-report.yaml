report_metadata:
  report_title: Atmosphere Startup Diligence Report
  target_company: Atmosphere
  website: https://www.atmosphere.tv/
  known_aliases:
    - Atmosphere
    - Atmosphere TV
    - AtmosphereTV
  sector: Out-of-home streaming TV, digital out-of-home advertising and venue media
  geography: United States / Austin, Texas with commercial venue network
  company_stage: Private unicorn / late-stage venture-backed media and adtech company
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth for public-source diligence.
    - Prioritized company-owned materials, financing announcements, market databases, industry data, competitor sites, employer/careers
      signals and public IP records.
    - Treated company-published claims as verified only for the existence of the public statement unless independently corroborated.
    - No private financial model, data room, management interview, customer reference, legal docket report or security/compliance artifact
      was available.
  included_jurisdictions:
    - United States
    - Global advertising and commercial venue markets referenced by public materials
  excluded_topics:
    - Private financial statements, contracts, cap table, board materials, HRIS, security reports, customer calls and non-public
      legal/regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Atmosphere diligence report
      type: workflow_request
      date_received: 2026-05-25
      notes: No pitch deck, financial model, founder responses or data room were provided.
