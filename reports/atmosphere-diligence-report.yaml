risk_register:
  - risk_id: R-001
    risk_title: Financial and valuation opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence verifies a $1B valuation anchor but not revenue, margin, cash runway, debt, cap table or current valuation support.
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.A, I.B]
    evidence_claim_ids: [EC-001, EC-002, EC-012]
    mitigation_or_diligence_request: Request audited financials, cap table, financing documents, cash/debt schedules, revenue cohorts and valuation support.
  - risk_id: R-002
    risk_title: Audience and campaign-measurement quality
    risk_category: customer
    severity: high
    likelihood: medium
    description: Reach and campaign-lift metrics are company-published and require audit methodology, active-screen reconciliation and advertiser references.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, V.B]
    evidence_claim_ids: [EC-003, EC-005]
    mitigation_or_diligence_request: Request third-party measurement reports, raw logs, advertiser references and campaign methodology.
  - risk_id: R-003
    risk_title: Content, ad-tech and venue dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: The model depends on content rights, device availability, ad-tech demand and venue retention that are not contractually visible.
    impacted_chapter_ids: [II, III, IV]
    impacted_section_ids: [II.A, III.B, IV.B]
    evidence_claim_ids: [EC-004, EC-009]
    mitigation_or_diligence_request: Review material partner, content, device and ad-tech contracts.
  - risk_id: R-004
    risk_title: Unit economics and subsidy risk
    risk_category: financial
    severity: high
    likelihood: medium
    description: Free venue service and hardware/support obligations may create subsidy burden if ad monetization lags.
    impacted_chapter_ids: [I, II, V]
    impacted_section_ids: [I.B, II.B, V.A]
    evidence_claim_ids: [EC-006, EC-007]
    mitigation_or_diligence_request: Request contribution margin by venue cohort, device/support cost, inventory fill and advertiser retention.
  - risk_id: R-005
    risk_title: Product reliability and security unknowns
    risk_category: technical
    severity: medium
    likelihood: unknown
    description: Public pages do not provide uptime, incident, security or architecture proof for a distributed screen network.
    impacted_chapter_ids: [II, VI]
    impacted_section_ids: [II.A, VI.A, VI.B]
    evidence_claim_ids: [EC-007, EC-008, EC-012]
    mitigation_or_diligence_request: Review architecture, uptime, incident logs, security reports and vendor dependencies.
  - risk_id: R-006
    risk_title: Customer and advertiser concentration unknown
    risk_category: customer
    severity: medium
    likelihood: high
    description: Public venue and audience claims do not reveal revenue concentration, churn, renewal terms or top-advertiser dependency.
    impacted_chapter_ids: [III]
    impacted_section_ids: [III.A, III.B]
    evidence_claim_ids: [EC-003, EC-005, EC-006]
    mitigation_or_diligence_request: Request top customer/advertiser concentration, contracts, renewal cohorts and reference calls.
  - risk_id: R-007
    risk_title: Legal, IP and privacy gaps
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Content rights, data rights, privacy compliance, IP ownership and litigation schedules were not public.
    impacted_chapter_ids: [VI, VIII]
    impacted_section_ids: [VI.B, VIII.A, VIII.B]
    evidence_claim_ids: [EC-004, EC-005, EC-012]
    mitigation_or_diligence_request: Counsel should review IP schedule, content licenses, privacy/security materials, litigation/regulatory schedules and material contracts.
  - risk_id: R-008
    risk_title: Management and hiring execution risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public leadership and careers surfaces exist, but headcount, attrition, retention and governance are not public.
    impacted_chapter_ids: [VII]
    impacted_section_ids: [VII.A, VII.B]
    evidence_claim_ids: [EC-010, EC-011, EC-012]
    mitigation_or_diligence_request: Request org chart, HRIS history, attrition, executive agreements and board governance records.
  - risk_id: R-009
    risk_title: Advertising and privacy regulatory exposure
    risk_category: regulatory
    severity: medium
    likelihood: unknown
    description: Out-of-home advertising, campaign measurement, consumer data and creative approvals can create compliance exposure not visible in public sources.
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.A, VIII.B]
    evidence_claim_ids: [EC-005, EC-012]
    mitigation_or_diligence_request: Request privacy impact assessments, DPA inventory, ad-measurement contracts and regulatory correspondence.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, revenue bridge, cash/debt, cap table and investor-rights schedule.
    why_it_matters: Required to underwrite the $1B valuation and downside preference stack.
    suggested_source_or_request: CFO and counsel data-room production.
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.A
    missing_information: Active venue, active screen, audience audit and advertiser concentration files.
    why_it_matters: Validates the quality of headline reach and campaign claims.
    suggested_source_or_request: Data warehouse export, third-party measurement reports and customer contract schedule.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.B
    missing_information: Device subsidy economics, content costs, sell-through, CPMs, CAC and payback.
    why_it_matters: Determines whether free venue growth creates profitable ad inventory.
    suggested_source_or_request: Finance, operations and sales operations exports.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.B
    missing_information: IP, content license, privacy/security, litigation and material-contract schedules.
    why_it_matters: Core product and advertising rights may materially constrain scale or transaction readiness.
    suggested_source_or_request: Counsel-prepared schedules and full policy/security review.
    priority: high
