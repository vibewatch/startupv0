risk_register:
  - risk_id: R-001
    risk_title: Financial quality, ARR and unit economics are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: No audited financials, ARR, gross margin, cash, debt, revenue cohort, venue economics or forecast model were available publicly.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-014
      - EC-016
    mitigation_or_diligence_request: Request audited financials, monthly management accounts, ARR/bookings bridge, gross margin, cash/debt, runway and unit-economics model.
  - risk_id: R-002
    risk_title: Headline valuation and fundraising do not reveal current financing economics
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation and financing announcements do not disclose preferences, debt terms, covenants, warrants, option pool,
      down-round protections or current 409A.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-016
    mitigation_or_diligence_request: Request cap table, financing documents, debt agreements, warrant schedules, preference stack and current valuation support.
  - risk_id: R-003
    risk_title: Audience and venue scale claims may not map to monetizable active inventory
    risk_category: market/customer
    severity: high
    likelihood: medium
    description: Viewer, consumer and venue metrics are public claims but methodology, deduplication, active venue count and inventory quality
      are not disclosed.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.A
      - V.B
    evidence_claim_ids:
      - EC-003
      - EC-005
      - EC-013
      - EC-014
    mitigation_or_diligence_request: Request venue roster, active-device logs, third-party audience methodology, ad inventory reports and churn cohorts.
  - risk_id: R-004
    risk_title: Advertiser revenue concentration, retention and campaign incrementality are unknown
    risk_category: revenue_quality
    severity: high
    likelihood: unknown
    description: Public materials do not disclose top advertisers, renewal rates, fill rate, CPM/RPM, ROAS validation or Jack in the Box methodology.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.C
      - V.A
      - V.B
      - V.D
    evidence_claim_ids:
      - EC-005
      - EC-014
      - EC-018
    mitigation_or_diligence_request: Request advertiser cohorts, contracts, campaign reporting, attribution methodology, top-account concentration and references.
  - risk_id: R-005
    risk_title: Competitive market is crowded across DOOH, retail media and venue entertainment
    risk_category: competition
    severity: medium
    likelihood: high
    description: Atmosphere competes with Loop TV, Rockbot, UPshow/EverPass, ReachTV and broader DOOH/retail-media alternatives for venue
      distribution and ad budgets.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.C
    evidence_claim_ids:
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Conduct win/loss interviews, benchmark pricing and renewal data, and compare venue activation economics by segment.
  - risk_id: R-006
    risk_title: Workforce reduction and no-open-role signal may indicate scaling or cost-control pressure
    risk_category: people
    severity: medium
    likelihood: medium
    description: A 106-person layoff signal and no public openings at research time raise questions about growth capacity, morale, severance and
      execution bandwidth.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.F
      - VII.G
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Request HRIS export, layoff rationale, severance/accruals, open requisitions, attrition by function and employee-engagement data.
  - risk_id: R-007
    risk_title: Content licensing and IP chain-of-title need review
    risk_category: legal_ip
    severity: medium
    likelihood: unknown
    description: The public channel catalog and trademark record do not establish full content rights, copyright compliance, trademark status or
      IP assignments.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.D
      - VIII.F
    evidence_claim_ids:
      - EC-006
      - EC-015
      - EC-021
    mitigation_or_diligence_request: Request content licenses, assignment agreements, trademark portfolio, open-source policy, takedown logs and indemnities.
  - risk_id: R-008
    risk_title: Advertising measurement and proximity targeting carry privacy/compliance risk
    risk_category: regulatory_privacy
    severity: medium
    likelihood: medium
    description: Contextual/proximity advertising and foot-traffic outcome claims require review of consumer data sources, consents, privacy
      notices and measurement vendors.
