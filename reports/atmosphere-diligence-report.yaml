    affected_chapter_ids: [I, II, III, IV, V, VI, VII, VIII]
    affected_section_ids: [I.A, I.B, II.A, II.B, III.A, III.B, IV.A, IV.B, V.A, V.B, VI.A, VI.B, VII.A, VII.B, VIII.A, VIII.B]
