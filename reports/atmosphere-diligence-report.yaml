executive_summary:
  overall_assessment: "Atmosphere has strong public screening signals: unicorn-list status, large financing announcements, an active
    venue-TV/ad product, meaningful reach claims and an identifiable leadership team. However, the investability case remains unproven
    because financial quality, current cap table, active venue/audience methodology, customer concentration, ad economics, workforce
    trajectory and legal/privacy/content-rights exposure are private."
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if Atmosphere can prove durable revenue growth, quality venue
    inventory, advertiser retention, efficient dual-sided CAC/payback, defensible content/adtech operations, clean financing economics and
    well-controlled privacy/IP/legal risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Atmosphere as a $1B private unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Atmosphere publicly markets a 30+ channel audio-optional venue TV product and advertising network.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-006
    - founder_claim_id: FC-005
      summary: Atmosphere publicly lists a senior leadership roster including CEO Blake Sabatinelli.
      evidence_claim_ids:
        - EC-007
        - EC-019
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR and unit economics are not public.
    - risk_id: R-003
      summary: Audience and venue scale claims may not map to monetizable active inventory.
    - risk_id: R-004
      summary: Advertiser revenue concentration, retention and campaign incrementality are unknown.
    - risk_id: R-006
      summary: Workforce reduction and no-open-role signals require HRIS reconciliation.
    - risk_id: R-008
      summary: Advertising measurement and proximity targeting create privacy/compliance diligence needs.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, gross margin, cash/debt, forecast model and budget-to-actuals.
    - Cap table, financing documents, preferences, debt terms, warrants and current valuation support.
    - Active venue roster, audience measurement methodology, advertiser/venue revenue concentration and churn/NRR cohorts.
    - CAC, payback, sales productivity, fill rate, CPM/RPM, campaign renewals and attribution methodology.
    - HRIS, attrition, layoff details, compensation/equity plans and executive employment/governance documents.
    - Content licenses, IP assignments, privacy data maps, adtech/vendor contracts, insurance and litigation/regulatory schedules.
  recommended_next_steps:
    - Open finance and cap-table diligence before relying on the $1B headline valuation.
    - Validate active venue/audience metrics with raw logs and third-party measurement support.
    - Run advertiser and venue reference calls focused on retention, campaign ROI and switching alternatives.
    - Have counsel review privacy, IP/content licensing, material contracts, debt covenants, insurance and litigation/regulatory exposure.
    - Reconcile employee count, layoffs, open roles, attrition and management incentives to HRIS and board-approved plans.
