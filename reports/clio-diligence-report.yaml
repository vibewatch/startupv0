        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Clio publishes headline ARR and payment-volume milestones, but not audited statements, backlog, or receivables detail.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A.1
