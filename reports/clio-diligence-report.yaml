          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public evidence clarifies growth drivers—AI, enterprise, vLex, payments, and global expansion—but not the internal plan or scenario assumptions.
        verification_status: not_publicly_verifiable
        confidence: low
