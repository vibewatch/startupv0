diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, cash and debt balances, revenue by product/channel/geography, gross margin, AR aging, and payment-economics detail.
    why_it_matters: Needed to assess ARR quality, profitability, cash conversion, and valuation support.
    suggested_source_or_request: CFO data room, auditor package, and board KPI materials.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, share classes, preferences, option pool, debt covenants, and vLex transaction consideration mechanics.
    why_it_matters: Determines common-equity value, downside protection, and transaction complexity.
    suggested_source_or_request: Company counsel, equity ledger, financing documents, and transaction agreements.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer ARR, concentration, NRR, churn, renewal timing, discounts, and segment retention.
    why_it_matters: Customer breadth does not prove durable, diversified revenue quality.
    suggested_source_or_request: Revenue operations dashboards, cohort analysis, and customer contract schedules.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, sales cycle, channel-sourced bookings, and rep ramp assumptions.
    why_it_matters: GTM efficiency is required to judge scalability and forecast credibility.
    suggested_source_or_request: Sales leadership dashboard and finance GTM model.
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: AI model provenance, evaluation framework, compute-cost model, roadmap quality metrics, and product-level economics.
    why_it_matters: AI is central to the platform thesis and introduces cost, IP, privacy, and quality risk.
    suggested_source_or_request: R&D, security, legal, and finance diligence materials.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount by function/location, attrition, compensation, equity refreshes, and acquired-team retention.
    why_it_matters: Rapid scaling and acquisition integration make talent quality a core execution variable.
    suggested_source_or_request: People team data room and HR analytics.
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP schedules, registry printouts, data-license inventory, open-source audit, and AI-related legal memoranda.
    why_it_matters: IP and data rights are material to both product moat and litigation exposure.
    suggested_source_or_request: Counsel-led IP and AI diligence.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, privacy complaints, payments compliance reviews, and incident-reporting history.
    why_it_matters: Legaltech and payments operations can create hidden regulatory liabilities.
    suggested_source_or_request: Legal, compliance, and security data room materials.
    priority: high
