report_metadata:
  report_title: Clio Startup Diligence Report
  target_company: Clio
  website: https://www.clio.com/
  known_aliases:
    - Clio
    - Themis Solutions Inc.
  sector: Legal technology, practice management software, legal AI, and payments
  geography: Canada / global
  company_stage: Private late-stage growth company
  research_date: 2026-06-10
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source diligence using Clio-owned pages, pricing, security/AI pages, customer stories, careers/leadership news, PR distribution pages, TechCrunch coverage, and public search-result leads for litigation, competition, and IP topics that were not otherwise directly accessible.
    - No private data room, management interview, customer reference call, cap table, board material, audited financial statement package, debt agreement, or legal opinion was available.
    - Company-published ARR, adoption, security, retention, and AI assertions are treated as management claims rather than audited or regulator-verified operating facts.
    - Some direct legal/IP sources were inaccessible behind anti-bot or domain protections; where that occurred, the report uses low-confidence search-result evidence only as a diligence lead and flags the gap explicitly.
  included_jurisdictions:
    - Canada
    - United States
    - United Kingdom
    - Spain / EU
    - Global public operating footprint
  excluded_topics:
    - Non-public audited financial statements, management accounts, tax workpapers, customer contracts, churn cohorts, cap table, option pool, debt covenants, and insurance policies
    - Private litigation schedules, privileged legal analyses, customer reference calls, supplier contracts, and non-public security incident logs
    - Private employee files, compensation ledgers, stock plans, 409A work, and HR investigations
  user_provided_materials:
    - material_id: UPM-001
      title: Assignment brief for a standard-depth public diligence memo on Clio
      type: workflow_request
      date_received: 2026-06-10
      notes: Target company specified as Clio, legal-tech / practice-management software, Canada, website https://www.clio.com/, public evidence only.
