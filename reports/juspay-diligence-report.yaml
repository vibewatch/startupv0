diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, cash balance, burn, gross margin and working-capital schedules.
    why_it_matters: Required to assess financial quality, runway and valuation support.
    suggested_source_or_request: Company CFO / finance data room
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, liquidation preferences, option pool, warrants, debt and off-balance-sheet obligations.
    why_it_matters: Determines investor economics and downside protection.
    suggested_source_or_request: Company counsel and finance team
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top customer/borrower/merchant concentration, cohort retention, churn, NRR and reference contacts.
    why_it_matters: Public logos or aggregate metrics do not prove durable revenue quality.
    suggested_source_or_request: Company CRM, billing and customer success exports
    priority: high
  - gap_id: G-004
