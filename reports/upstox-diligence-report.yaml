executive_summary:
  overall_assessment: Track with high-priority regulatory, financial, customer-cohort, reliability and compliance diligence before relying on the headline $3.40B valuation.
  investment_or_diligence_thesis: Upstox has strong public usage and app-store signals as an Indian retail brokerage unicorn, but diligence must center on regulated-broker compliance, active funded accounts, cohort economics, customer support quality and trading-volume cyclicality.
  key_positive_signals:
    - Upstox has a public $3.40B unicorn-list valuation from CB Insights.
    - The Upstox public app listing describes stocks, F&O, mutual funds, IPOs, fixed income, currencies, commodities, bonds, T-bills, gold, charts, orders and account/portfolio tools.
    - Google Play listing shows a 4.4 rating, about 485K reviews, 10M+ downloads and a company claim that 1.3+ Cr Indians trust the app.
  key_risks:
    - Financial quality, revenue and retention are not public
    - Headline valuation may not reflect current financing economics
    - Customer concentration, retention and satisfaction are unknown
    - Competitive and pricing pressure
    - Product, reliability and technical-performance evidence is incomplete
  key_evidence_gaps:
    - Audited financials, revenue/ARR bridge, gross margin, cash, debt, burn and forecast model.
    - Cap table, liquidation preferences, option pool, debt/SAFE/note instruments and current valuation support.
    - Customer concentration, contract status, cohort retention, churn, support metrics and reference calls.
    - Security/privacy/regulatory artifacts, legal schedules, material contracts and IP assignments.
    - Org chart, HRIS export, compensation, incentives, attrition and management references.
  recommended_next_steps:
    - Request a data-room package covering financials, cap table, customer cohorts, contracts, security/legal artifacts and HR materials.
    - Conduct management, customer-reference, legal/regulatory, security and technical diligence before relying on public valuation claims.
    - Refresh eligibility and public-source checks immediately before investment committee because unicorn-list valuations can be stale.
