report_metadata:
  report_title: SandboxAQ Startup Diligence Report
  target_company: SandboxAQ
  website: https://www.sandboxaq.com/
  known_aliases:
    - SandboxAQ
    - Sandbox AQ
    - SandboxAQ, Inc.
    - Sandbox Quantum
    - sandbox-quantum
  sector: Enterprise technology / quantitative AI, AI plus quantum techniques, cybersecurity, drug and material discovery, navigation and medical diagnostics
  geography: United States; Palo Alto, California with global enterprise, healthcare, defense and energy relationships
  company_stage: Private unicorn / growth-backed enterprise deep-tech company
  research_date: 2026-06-12
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified public eligibility using CB Insights, active company pages, 2025 funding pages and public search for contrary IPO/acquisition/shutdown signals.
    - Collected company-owned, partner/customer, press, publications, technical repository, competitor and legal-policy sources.
    - Treated company and partner sources as public-claim evidence, not independent proof of revenue or margins.
    - Marked private financial, cap-table, customer, HR, legal, IP, security and contract records as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - United Kingdom/EU/global privacy and cybersecurity contexts
    - Saudi Arabia for Aramco relationship diligence
    - Defense and healthcare regulatory contexts referenced publicly
  excluded_topics:
    - Private data room, management interviews, customer calls and formal counsel docket searches
    - Paywalled article bodies not accessible through the available reader
  user_provided_materials:
    - material_id: UPM-001
      title: SandboxAQ target-selection context
      type: workflow_request
      date_received: 2026-06-12
      notes: "User supplied selected row: company SandboxAQ, slug sandboxaq, CB Insights source, $5.6B valuation, joined 2024-12-18, Palo Alto, Enterprise Tech."
