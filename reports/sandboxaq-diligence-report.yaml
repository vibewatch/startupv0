risk_register:
  - risk_id: R-001
    risk_title: Financial quality and valuation support not publicly verifiable
    risk_category: financial
    severity: high
    likelihood: high
    description: Public valuation/funding are visible; revenue, ARR, margins, burn and cash are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Obtain audited financials, ARR bridge, margins, cash/debt and forecast.
  - risk_id: R-002
    risk_title: Revenue predictability and customer concentration unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named logos do not disclose recurring revenue, churn, NRR or concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.C
      - V.B
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request customer revenue, contracts, churn/NRR and references.
  - risk_id: R-003
    risk_title: Enterprise and regulated sales cycles may make growth lumpy
    risk_category: market
    severity: medium
    likelihood: high
    description: Defense, healthcare, cyber and energy buyers involve long procurement and validation cycles.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - V.C
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Validate pipeline aging, pilot conversion and procurement paths.
  - risk_id: R-004
    risk_title: Competition across multiple deep-tech markets
    risk_category: market
    severity: medium
    likelihood: high
    description: SandboxAQ competes with specialists and incumbents in each vertical.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Run win/loss, technical and pricing benchmarks.
  - risk_id: R-005
    risk_title: Product and technical maturity validation risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Strong public technical claims need independent validation and product-readiness review.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Review benchmarks, model cards, QA, regulatory and acceptance tests.
  - risk_id: R-006
    risk_title: Regulatory, legal, privacy and security exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Healthcare, cyber, defense and international projects create compliance burden.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Counsel to review regulatory, privacy, security, export and insurance.
  - risk_id: R-007
    risk_title: IP ownership and open-source/license obligations
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Alphabet spinout, collaborations and open-source crypto require ownership/license review.
    impacted_chapter_ids:
      - VIII
      - VI
    impacted_section_ids:
      - VIII.D
      - VI.A
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Obtain patent/trademark docket, assignments, SBOM and FTO.
  - risk_id: R-008
    risk_title: Specialized talent concentration and retention risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: The company depends on scarce AI, quantum, chemistry, sensing and crypto talent.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
      - VII.G
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Review HRIS, attrition, comp/equity and key-person retention.
  - risk_id: R-009
    risk_title: Financing runway, preference stack and cap-table complexity unknown
    risk_category: financing
    severity: high
    likelihood: medium
    description: Large multi-round financings may create preference and governance complexity.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Model preferences, pro-rata rights, option pool, debt and runway.
  - risk_id: R-010
    risk_title: Cloud/GPU/HPC and partner-channel dependencies
    risk_category: operational
    severity: medium
    likelihood: high
    description: LQM workloads cite AWS, Intel, NVIDIA, Accenture and multi-GPU compute.
    impacted_chapter_ids:
