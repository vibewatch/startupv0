    impacted_section_ids:
      - III.E
      - VI.B
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Review supplier contracts, COGS, SLAs and alternatives.
  - risk_id: R-011
    risk_title: Pricing pressure and packaging opacity
    risk_category: market
    severity: medium
    likelihood: medium
    description: Public pages do not disclose price lists or package economics.
    impacted_chapter_ids:
