executive_summary:
  overall_assessment: "SandboxAQ appears eligible as an active private unicorn: CB Insights lists it at $5.6B, company sources show active operations and 2025 funding, and no IPO/acquisition-by-third-party/shutdown signal surfaced in accessible public review. Public evidence supports product breadth, funding strength, leadership/R&D depth and named relationship signals, but financial quality, cap table, customer revenue, retention, contracts, legal/IP and HR records are private."
  investment_or_diligence_thesis: SandboxAQ may be a high-upside quantitative-AI platform with credible investors and multidomain deep-tech products, but diligence should validate whether public technical and logo signals convert into repeatable high-margin revenue supporting a $5.6B valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists SandboxAQ as a $5.6B private unicorn.
      evidence_claim_ids:
        - EC-001
        - EC-029
    - founder_claim_id: FC-002
      summary: Company sources verify active independent Alphabet spinout status and B2B AI/quantum positioning.
      evidence_claim_ids:
        - EC-002
        - EC-006
    - founder_claim_id: FC-006
      summary: Leadership, specialist-team, publications and careers sources support active R&D/team signals.
      evidence_claim_ids:
        - EC-009
        - EC-014
        - EC-015
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation support not publicly verifiable
    - risk_id: R-002
      summary: Revenue predictability and customer concentration unknown
    - risk_id: R-005
      summary: Product and technical maturity validation risk
    - risk_id: R-006
      summary: Regulatory, legal, privacy and security exposure
    - risk_id: R-009
      summary: Financing runway, preference stack and cap-table complexity unknown
  key_evidence_gaps:
    - Audited financials, ARR/bookings, backlog, AR aging, cash/debt and burn.
    - Cap table, financing documents, preferences, options, warrants, debt and Alphabet/Google agreements.
    - Product revenue, gross margin, roadmap, validation reports and pricing.
    - Top customers, revenue concentration, churn/NRR, contracts and references.
    - Cloud/GPU/HPC supplier spend, SLAs, security and alternatives.
    - Win/loss, independent benchmarks and pricing comparisons.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on the $5.6B valuation.
    - Request cap table and financing documents to model preference stack and downside outcomes.
    - Validate top customers and contracts with revenue waterfall, NRR/churn and references.
    - Commission technical diligence on LQM accuracy, AQNav/AQMed validation, cybersecurity controls, IP and open-source.
    - Have counsel review healthcare, cyber, defense/export, international, privacy, insurance and material contracts.
