risk_register:
- risk_id: R-ID-001
  risk_title: Valuation support and capital-structure opacity
  risk_category: financing
  severity: high
  likelihood: medium
  description: Public sources show a $2.0B January 2025 valuation anchor, a $67M secondary,
    a $275M line of credit, and a $65M Series E, but the latest post-money valuation,
    liquidation preferences, debt covenants, and ownership stack are not public.
  impacted_chapter_ids:
  - I
  - VIII
  impacted_section_ids:
  - I.A
  - I.C
  - VIII.F
  evidence_claim_ids:
  - EC-ID-002
  - EC-ID-003
  - EC-ID-005
  mitigation_or_diligence_request: Obtain the full cap table, debt documents, investor
    rights agreements, and any 409A or fairness materials for 2024-2026 transactions.
- risk_id: R-ID-002
  risk_title: Revenue quality and customer-concentration opacity
  risk_category: financial
  severity: high
  likelihood: medium
  description: A public 2023 revenue figure exists, but no audited statements, retention
    metrics, gross margins, or top-customer concentration disclosures were found.
  impacted_chapter_ids:
  - I
  - III
  - V
  impacted_section_ids:
  - I.A
  - III.C
  - V.B
  evidence_claim_ids:
  - EC-ID-004
  - EC-ID-006
  mitigation_or_diligence_request: Request monthly recurring revenue bridges, top-20
    customer schedules, NRR/GRR, and audited income statements and cash flows.
- risk_id: R-ID-003
  risk_title: Public-sector dependency and policy exposure
  risk_category: customer
  severity: high
  likelihood: medium
  description: Official and company sources show deep public-sector use cases, which
    creates exposure to procurement cycles, policy shifts, and public scrutiny around
    identity-verification approaches.
  impacted_chapter_ids:
  - III
  - V
  - VIII
  impacted_section_ids:
  - III.A
  - V.A
  - VIII.G
  evidence_claim_ids:
  - EC-ID-012
  - EC-ID-017
  - EC-ID-019
  - EC-ID-020
  mitigation_or_diligence_request: Map revenue by agency and program, renewal timing,
    termination rights, and any policy/regulatory dependencies for public-sector workflows.
- risk_id: R-ID-004
  risk_title: Privacy, biometric-data, and identity-policy scrutiny
  risk_category: regulatory
  severity: high
  likelihood: medium
  description: ID.me makes strong consent and biometric-data commitments, but the
    identity-proofing category faces continued policy scrutiny and the company’s operating
    compliance cannot be verified from public pages alone.
  impacted_chapter_ids:
  - II
  - VI
  - VIII
  impacted_section_ids:
  - II.A
  - VI.A
  - VIII.D
  evidence_claim_ids:
  - EC-ID-007
  - EC-ID-008
  - EC-ID-017
  mitigation_or_diligence_request: Review biometric-data governance, deletion exceptions,
    customer DPAs, privacy-impact assessments, and any complaints, settlements, or
