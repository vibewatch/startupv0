executive_summary:
  overall_assessment: 'ID.me remains an eligible private-company diligence target
    in the reviewed public record: a 2025 Series E, active careers pages, current
    VA integration, and broad product/industry pages support ongoing operations. The
    strongest public signals are product breadth, government/healthcare relevance,
    and ecosystem scale; the weakest are audited financial quality, customer concentration,
    litigation completeness, and named leadership depth.'
  investment_or_diligence_thesis: ID.me appears to be a differentiated digital identity
    platform with real public-sector, healthcare, member-network, and employment-screening
    relevance, but any investment or acquisition thesis should remain conditional
    on private validation of revenue quality, structured capital terms, customer concentration,
    privacy/compliance evidence, and entity/IP ownership.
  strongest_verified_claims:
  - founder_claim_id: FC-ID-003
    summary: Public network pages clearly verify the product family and regulated-industry
      coverage.
    evidence_claim_ids:
    - EC-ID-009
    - EC-ID-010
    - EC-ID-011
  - founder_claim_id: FC-ID-006
    summary: VA and Sterling sources verify meaningful current relationships in government
      and employment-related workflows.
    evidence_claim_ids:
    - EC-ID-014
    - EC-ID-019
  - founder_claim_id: FC-ID-004
    summary: The homepage publicly states large ecosystem counts across members, stores,
      healthcare organizations, and federal agencies.
    evidence_claim_ids:
    - EC-ID-006
  biggest_risks:
  - risk_id: R-ID-001
    summary: Public valuation anchors mask a more complex capital stack involving
      secondary liquidity and line-of-credit financing.
  - risk_id: R-ID-002
    summary: Public revenue evidence exists, but audited financial quality and customer
      concentration do not.
  - risk_id: R-ID-004
    summary: Identity, biometrics, and public-sector workflows create elevated privacy
      and policy-scrutiny risk.
  - risk_id: R-ID-007
    summary: Public entity naming suggests a legal-entity/IP reconciliation item that
      should not be ignored.
  key_evidence_gaps:
  - Audited 2023-2025 financial statements and monthly KPI bridge.
  - Full cap table, debt schedule, and 2024-2025 financing terms.
  - Top-customer and top-partner concentration, retention, and contract schedules.
  - Current named executive roster, board, and headcount by function/location.
  - Full litigation/open-matters schedule and trademark/patent portfolio.
  recommended_next_steps:
  - Request audited financial, cap-table, and customer-concentration materials before
    relying on valuation or revenue anchors.
  - Run counsel-led litigation and IP searches and reconcile ID.me, Inc. versus ID.me,
    LLC across ownership and contracting.
  - Review privacy, biometric-data, and compliance audit artifacts behind public FedRAMP/NIST/ISO/SOC
    2-style claims.
  - Conduct customer/partner calls across VA/public sector, healthcare, and Sterling-related
    employment workflows.
