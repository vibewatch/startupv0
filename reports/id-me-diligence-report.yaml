research_scope:
  diligence_depth: standard_diligence
  source_strategy:
  - Reviewed public company-owned consumer, privacy, careers, wallet, network, public-sector,
    healthcare, and partnership pages that were accessible through the workflow environment.
  - Reviewed CB Insights public financial and comparison pages, SEC EDGAR browse results,
    a VA customer page, an IRS policy page, CourtListener search results, and the
    USPTO TSDR portal entry point.
  - Treated anti-bot, rate-limited, or gated pages as evidence gaps rather than as
    proof of absence.
  included_jurisdictions:
  - United States
  - U.S. federal agencies
  - U.S. state agencies
  - U.S. healthcare and employment workflows
  excluded_topics:
