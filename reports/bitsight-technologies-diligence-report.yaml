  included_jurisdictions:
    - "United States"
    - "Portugal"
    - "Israel"
    - "Singapore"
    - "Global public web where directly cited"
  excluded_topics:
    - "Non-public financial statements and tax returns"
    - "Non-public cap table and financing documents"
    - "Paid legal docket searches and attorney opinions"
    - "Paid analyst reports beyond public excerpts"
    - "Technical penetration testing or raw model/data audit"
  user_provided_materials: []
