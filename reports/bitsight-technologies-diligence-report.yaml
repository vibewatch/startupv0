executive_summary:
  overall_assessment: "BitSight appears to be a mature private cyber risk intelligence company with strong public validation: 2021 unicorn status, substantial funding, broad product portfolio, large self-reported datasets, 3,500+ customers, named enterprise case studies, Moody's/Microsoft partnerships, analyst recognition, active 2026 launches, and a public CEO transition. The investment-critical gap is that financials, cap table, contracts, legal clearance, customer concentration, and technical/model validation are not public."
  investment_or_diligence_thesis: "Positive on market relevance and strategic validation, gated by private financial, legal, technical, and customer diligence. Investment judgment should depend on verified ARR growth, retention, margin, cash runway, data rights, model accuracy, partner economics, and current valuation stack."
  strongest_verified_claims:
    -
      founder_claim_id: "FC-001"
      summary: "Public databases support 2021 $2.39B-$2.40B valuation signal and $250M round."
      evidence_claim_ids:
        - "EC-001"
        - "EC-002"
    -
      founder_claim_id: "FC-002"
      summary: "Company and customer pages support broad product/customer scale claims, subject to self-reporting limits."
      evidence_claim_ids:
        - "EC-004"
        - "EC-005"
        - "EC-009"
    -
      founder_claim_id: "FC-006"
      summary: "Moody's and Microsoft partnerships are publicly evidenced."
      evidence_claim_ids:
        - "EC-013"
        - "EC-014"
    -
      founder_claim_id: "FC-008"
      summary: "CEO transition to John Clancy is company-confirmed."
      evidence_claim_ids:
        - "EC-021"
  biggest_risks:
    -
      risk_id: "R-001"
      summary: "No public financials, ARR, margins, debt, runway, or customer concentration."
    -
      risk_id: "R-003"
      summary: "Product/model efficacy and data provenance require technical diligence."
    -
      risk_id: "R-004"
      summary: "Data rights, privacy, and ratings-dispute exposure."
    -
      risk_id: "R-009"
      summary: "Open-web legal/IP/insurance/regulatory review is incomplete."
  key_evidence_gaps:
    - "Audited financials and management accounts"
    - "ARR by product/channel/customer and retention cohorts"
    - "Fully diluted cap table and preferred terms"
    - "Top customer and supplier schedules"
    - "Partner contracts/economics"
    - "Model validation and data-source rights"
    - "Litigation/IP/insurance/regulatory counsel package"
  recommended_next_steps:
    - "Run private financial diligence before valuation work"
    - "Conduct technical/data-rights diligence"
    - "Complete top-customer review and reference calls"
    - "Review Moody's/Microsoft and top customer contracts"
    - "Obtain counsel legal/IP/regulatory/insurance package"
    - "Assess CEO transition and retention"
