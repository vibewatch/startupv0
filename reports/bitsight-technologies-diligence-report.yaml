  geography: "Boston, Massachusetts, United States; global customer footprint"
  company_stage: "Private growth-stage unicorn"
  research_date: "2026-05-25"
  analyst: "GitHub Copilot CLI using startup-diligence-research skill"
  report_version: "1.0"
  currency: "USD"
  time_zone: "America/New_York"
research_scope:
