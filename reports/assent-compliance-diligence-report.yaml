report_metadata:
  report_title: Assent Compliance Startup Diligence Report
  target_company: Assent Compliance
  website: https://www.assent.com/
  known_aliases:
    - Assent
    - Assent Inc.
    - Assent Compliance Inc.
  sector: Supply chain sustainability, product compliance, ESG and trade-compliance software for complex manufacturers
  geography: Canada / North America with global enterprise customers
  company_stage: Private unicorn / growth-stage supply-chain sustainability software company
  research_date: 2026-05-27
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing reports and selected this uncovered private unicorn with shuf from the current Wikipedia unicorn table.
    - Used public unicorn-list, funding/news, company product, customer, leadership and security/legal pages.
    - Treated company-owned statements as public claims requiring private validation for financial, customer and legal diligence.
    - No private data room, management interview, customer reference, legal docket database export or security report was available.
  included_jurisdictions:
    - Canada
    - United States where relevant to investors/customers/IP
    - Global markets referenced by public company materials
  excluded_topics:
    - Private financial statements, contracts, cap table, HRIS, customer calls, SOC reports, litigation docket exports and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-27
      notes: No pitch deck, financial model, data room or founder responses were provided.
