executive_summary:
  overall_assessment: Public evidence supports Assent as an operating private unicorn in supply-chain sustainability software. The largest diligence gaps are private financial quality, customer economics, supplier-data reliability and legal/security evidence.
  investment_or_diligence_thesis: Assent has credible public unicorn/funding evidence and a focused regulatory-compliance software thesis for complex manufacturers, but investment diligence should remain confirmatory until current ARR quality, retention, customer concentration, security attestations and cap-table terms are validated.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support Assent Compliance's private unicorn valuation anchor of $1B+.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company materials support active product/platform positioning in Supply chain sustainability, product compliance, ESG and trade-compliance software for complex manufacturers.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Public customer or logo evidence exists but requires revenue-quality validation.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: Private financial and retention quality are not public
    - risk_id: R-003
      summary: Customer concentration and renewal health are opaque
    - risk_id: R-004
      summary: Regulatory change and supplier-data quality can affect product outcomes
  key_evidence_gaps:
    - Audited financial statements, ARR/bookings, gross margin, cash/debt and working-capital detail
    - Cap table, preferences, option pool, debt and investor rights
    - Top-customer ARR, renewal, churn and concentration
    - CAC, payback, quota attainment and sales-cycle evidence
    - Roadmap, architecture, security and incident history
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline valuation.
    - Request top-customer contracts/cohorts and independent customer references.
    - Have counsel and security specialists review legal, privacy, security, regulatory and IP artifacts.
    - Benchmark win/loss, pricing and renewal evidence against direct competitors.
