report_metadata:
  report_title: Quizlet Public-Source Startup Diligence Report
  target_company: Quizlet
  website: https://quizlet.com/
  known_aliases:
    - Quizlet
    - Quizlet Inc.
    - Quizlet, Inc.
    - "Quizlet: More than Flashcards"
  sector: Consumer learning, education technology, AI-assisted study tools and mobile subscription learning apps
  geography: United States; San Francisco, California headquarters; global consumer/student user base
  company_stage: Late-stage private venture-backed unicorn candidate
  research_date: 2026-06-01
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility before writing using CB Insights profile/context, SEC EDGAR, TechCrunch and app-store
      activity.
    - "Used only public sources: company-sourced press release, app stores, reputable news, SEC, FTC, CourtListener, CB
      Insights public pages and competitor company sources."
    - Marked private financials, customers, cap table, contracts, insurance, headcount and HR records as
      not_publicly_verifiable rather than estimating.
    - Research date is 2026-06-01; fetched content was treated as untrusted evidence and used only for factual
      extraction.
  included_jurisdictions:
    - United States
    - California
    - Delaware corporate/SEC filing context
    - Global consumer/app distribution where public app sources indicate availability
  excluded_topics:
    - No private data-room materials, interviews, paid databases, bank records, tax returns, cap tables, contracts,
      source code, customer references or personal contact data.
    - No final report companion files were created.
  user_provided_materials:
    - material_id: M-001
      title: User request and CB Insights unicorn-row context
      type: prompt_argument
      date_received: 2026-06-01
      notes: User supplied CB Insights row details and requested one standard-depth public-source diligence report saved to
        reports/quizlet-diligence-report.yaml.
