risk_register:
  - risk_id: R-001
    risk_title: Opaque financial statements and unit economics
    risk_category: financial
    severity: high
    likelihood: high
    description: Revenue, gross margin, burn, cash balance, CAC/LTV, retention and paid conversion are not public; valuation
      support cannot be underwritten from public evidence alone.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-005
      - EC-007
    mitigation_or_diligence_request: Request audited/management financials, revenue by SKU/channel/geography, cohort
      retention, CAC/LTV, gross margin and cash runway.
  - risk_id: R-002
    risk_title: Student/youth privacy and AI regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Quizlet serves students and uses AI; app-store privacy labels indicate personal-data processing, requiring
      COPPA/FERPA/GDPR/CCPA and AI-data-use review.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-009
      - EC-017
    mitigation_or_diligence_request: Obtain privacy policies, DPIAs, DPA/subprocessor list, model data-use controls, incident history and counsel memo.
  - risk_id: R-003
    risk_title: Intense AI-enabled learning competition
    risk_category: market
    severity: high
    likelihood: high
    description: Quizlet competes with public incumbents, learning apps, classroom tools and AI-native study products; moat
      and paid conversion are not public.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-012
      - EC-013
    mitigation_or_diligence_request: Request win/loss, churn reasons, market share, SEO durability, product roadmap and pricing-power analyses.
  - risk_id: R-004
    risk_title: UGC/content IP and litigation exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    description: CourtListener found Barkley matters and public product relies on large content/UGC library; IP rights and
      litigation exposure need counsel review.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
    evidence_claim_ids:
      - EC-016
      - EC-018
    mitigation_or_diligence_request: Counsel should review all dockets, claims, takedown history, licenses, IP assignments, reserves and insurance.
  - risk_id: R-005
    risk_title: App-store and distribution platform dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Mobile app stores are core public distribution and billing channels; policy, fee, privacy-label or ranking
      changes can affect acquisition and monetization.
    impacted_chapter_ids:
      - II
      - III
      - V
    impacted_section_ids:
      - II.A
      - III.B
      - III.D
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-007
      - EC-011
      - EC-020
    mitigation_or_diligence_request: Request channel revenue, store fees, refund rates, policy notices, ranking/ASO
      analytics and alternative distribution plans.
  - risk_id: R-006
    risk_title: Cap-table and financing terms not public
    risk_category: financing
    severity: medium
    likelihood: high
    description: Public sources identify financing events and investors but not ownership percentages, preference stack,
      debt, warrants or option-pool dilution.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids:
      - EC-002
      - EC-003
      - EC-019
    mitigation_or_diligence_request: Request current fully diluted cap table, charter, investor rights, debt/warrant schedule and board approvals.
  - risk_id: R-007
    risk_title: Customer concentration and paid cohort opacity
    risk_category: customer
    severity: medium
    likelihood: high
    description: Public user-scale signals do not disclose paid subscribers, customer concentration, revenue by
      account/segment, churn or ARPU.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.B
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-008
      - EC-010
      - EC-005
    mitigation_or_diligence_request: Request customer/revenue cohort tables, top accounts, subscriber churn, ARPU and school/district exposure.
  - risk_id: R-008
    risk_title: AI vendor, model-cost and output-quality dependency
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Q-Chat is publicly described as built on OpenAI API/models, creating cost, uptime, contractual, safety and
      hallucination exposure.
    impacted_chapter_ids:
      - II
      - III
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - III.B
      - VI.A
      - VI.B
      - VIII.F
    evidence_claim_ids:
      - EC-009
      - EC-011
    mitigation_or_diligence_request: Review OpenAI/vendor contracts, fallback architecture, evaluation results, unit-cost
      economics and output safety controls.
  - risk_id: R-009
    risk_title: Management, headcount and retention opacity
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public sources identify selected leadership history but not current org chart, headcount, turnover,
      compensation or equity incentives.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.F
      - VII.G
      - VI.A
    evidence_claim_ids:
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Request HRIS exports, org chart, headcount plan, attrition, compensation, option grants
      and management employment agreements.
  - risk_id: R-010
    risk_title: AI/student-data reputational and safety exposure
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: AI tutoring for students can create accuracy, bias, age-appropriateness, data-protection and brand-risk
      concerns not resolvable from app-store labels.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-009
      - EC-017
    mitigation_or_diligence_request: Request trust-and-safety policies, model evaluations, incident/takedown logs,
      age-gating controls and school/privacy compliance evidence.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited or management financial statements, cash balance, runway, gross margin and revenue by product/channel.
    why_it_matters: Needed to assess valuation support and sustainability.
    suggested_source_or_request: Company CFO/accountant data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, preference stack, debt, warrants and option pool.
    why_it_matters: Determines ownership, liquidation economics and dilution.
    suggested_source_or_request: Company counsel and board-approved cap table.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Paid subscribers, revenue by customer/segment/geography, churn and ARPU.
    why_it_matters: Public MAU does not prove monetization quality.
    suggested_source_or_request: Billing and analytics exports.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.B
    missing_information: OpenAI, app-store, payment and infrastructure contracts.
    why_it_matters: Needed to quantify vendor dependency, cost and termination risks.
    suggested_source_or_request: Material-contract schedule and vendor MSAs.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, market share, churn reasons and pricing studies.
    why_it_matters: Competitive risk is high and public sources lack moat proof.
    suggested_source_or_request: Management GTM/product analyses and customer interviews.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: CAC, marketing spend, conversion funnel and sales-force/product-led productivity.
    why_it_matters: Needed to assess scalability of growth.
    suggested_source_or_request: Marketing analytics and finance dashboards.
    priority: high
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: AI roadmap, model evaluation, hallucination/safety metrics and AI unit costs.
    why_it_matters: AI is strategic and may affect cost, trust and retention.
    suggested_source_or_request: Product/R&D roadmap, evaluation reports and vendor invoices.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount by function/location, hiring plan and attrition.
    why_it_matters: Execution risk and cost structure are not public.
    suggested_source_or_request: HRIS exports and budget plan.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation docket, pleadings, reserves and counsel assessment.
    why_it_matters: CourtListener signals cannot quantify exposure.
    suggested_source_or_request: Outside counsel litigation schedule and PACER/state-court pulls.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Privacy policies, subprocessors, DPIAs, incident logs and youth/student-data compliance analyses.
    why_it_matters: Student data and AI are core regulatory risks.
    suggested_source_or_request: Privacy counsel and security/compliance team materials.
    priority: high
