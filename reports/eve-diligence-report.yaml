report_metadata:
  report_title: "Eve Startup Diligence Report"
  target_company: "Eve"
  website: "https://www.eve.legal/"
  known_aliases:
    - "Butler Labs, Inc."
    - "Eve Legal"
    - "eve"
  sector: "Legal AI workflow software for plaintiff law firms"
  geography: "United States; San Mateo and San Francisco references in public sources"
  company_stage: "Private unicorn"
  research_date: "2026-05-15"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "America/Los_Angeles"

research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Built covered slugs from existing reports, parsed a current CB Insights unicorn list, normalized candidate slugs, excluded covered companies, and selected one uncovered private unicorn at random using shuf."
    - "Selected Eve from the parsed CB Insights row listing Eve at a $1 billion valuation on 2025-09-30 in Enterprise Tech with Spark Capital, Lightspeed Venture Partners, and Andreessen Horowitz."
    - "Prioritized company-owned pages for product, customer, security, privacy, legal, SLA, careers, and founder information."
    - "Supplemented company sources with PRNewswire, LawNext, Law360, DuckDuckGo search result snippets, and competitor pages where accessible."
    - "Did not use unauthenticated private systems, paid legal dockets, or non-public data; gaps are marked not_publicly_verifiable rather than inferred."
  included_jurisdictions:
    - "United States"
    - "California and federal legal context where Butler Labs, Inc. terms and the accessible case index apply"
    - "U.S. privacy and legal-services professional responsibility context relevant to plaintiff law firms"
  excluded_topics:
    - "Audited financial statements, management accounts, bank statements, cash balance, debt instruments, cap table, option plan, financing documents, customer contracts, board minutes, and customer references were not available."
    - "SOC 2 reports, penetration-test results, security audit reports, incident logs, model evaluation datasets, insurance policies, employment records, and full legal docket documents were not accessed."
    - "Reuters returned an access block and Justia returned a security-verification page; those sources are treated as limitations rather than evidence."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Autonomous random-unicorn diligence request"
      type: "workflow_request"
      date_received: "2026-05-15"
      notes: "No founder deck, private data room, financial model, customer references, or management responses were provided."

founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Eve is a legal AI platform for plaintiff law firms that supports the case lifecycle from intake through resolution."
    claim_source: "Eve homepage, product pages, and PRNewswire release"
    claim_date: null
    mapped_chapter_ids: ["II", "III", "V"]
    mapped_section_ids: ["II.A", "III.A", "V.A"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-004", "EC-005", "EC-006"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request product analytics, deployment counts by module, integration list, active usage by persona, error metrics, and workflow-level retention."
  - founder_claim_id: "FC-002"
    claim_text: "Eve raised a $103 million Series B at an over $1 billion valuation, with total raised of at least $164 million across public company materials."
    claim_source: "PRNewswire release, LawNext article, CB Insights list, and Eve careers page"
    claim_date: "2025-09-30"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.B", "I.C"]
    verification_status: "partially_verified"
    confidence: "high"
    evidence_claim_ids: ["EC-001", "EC-002", "EC-003"]
    contradiction_summary: "The Series B amount, valuation, and named investors are corroborated by company and independent sources; full financing terms, share class, valuation mechanics, and current cap table are not public."
    diligence_follow_up:
      - "Request signed financing documents, cap table, preference waterfall, option pool, investor rights, board consents, and any debt or secondary transactions."
  - founder_claim_id: "FC-003"
    claim_text: "Eve serves hundreds to over 1000 plaintiff firms, processes more than 200,000 legal cases annually, and has helped firms recover more than $3.5 billion."
    claim_source: "PRNewswire release and Eve homepage"
    claim_date: "2025-09-30"
    mapped_chapter_ids: ["III", "V"]
    mapped_section_ids: ["III.A", "III.C", "V.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-004", "EC-005"]
    contradiction_summary: "The public customer count differs by source and timing: PRNewswire says over 450 firms, while the homepage says over 1000 firms. The metrics are company-published and require cohort and customer validation."
    diligence_follow_up:
      - "Request customer cohort export, logo permission records, active paying account definition, case-count methodology, outcome attribution methodology, churn, NRR, and top-customer concentration."
  - founder_claim_id: "FC-004"
    claim_text: "Eve maintains enterprise security and availability controls, including SOC 2 framework alignment, third-party assessments, annual penetration testing, encryption, access reviews, and a 99.5% monthly uptime SLA."
    claim_source: "Eve security page and Butler Labs SLA"
    claim_date: null
    mapped_chapter_ids: ["VI", "VIII"]
    mapped_section_ids: ["VI.A", "VIII.F", "VIII.G"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-009", "EC-010"]
    contradiction_summary: "Company pages disclose control categories and SLA terms, but no SOC report, certificate scope, penetration-test summary, incident history, or SLA-performance history was public."
    diligence_follow_up:
      - "Request SOC 2 report, penetration-test executive summaries, vulnerability remediation logs, incident register, uptime history, cloud architecture, vendor risk files, and customer security questionnaires."
  - founder_claim_id: "FC-005"
    claim_text: "Eve 2.0, Agents, and Auditor improve law-firm capacity, case movement, drafting speed, and settlement value."
    claim_source: "Eve 2.0, AI Agents, Auditor, and customer story pages"
    claim_date: null
    mapped_chapter_ids: ["II", "VI", "III"]
    mapped_section_ids: ["II.A", "VI.B", "III.A"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-006", "EC-007", "EC-014"]
    contradiction_summary: "The named metrics are company-published testimonials and page claims; public sources did not disclose sample size, baseline controls, contract cohort, or independent customer validation."
    diligence_follow_up:
      - "Request reference calls, before-after KPI exports, source documents for quoted metrics, failed deployment list, support tickets, human-review protocols, and model evaluation reports."

executive_summary:
  overall_assessment: >-
    Eve is a credible private legal AI unicorn focused on plaintiff law firms. Public evidence verifies a September 2025 $103 million Series B at an over $1 billion valuation, named blue-chip investors, a broad plaintiff-firm workflow product, public founder biographies, security and legal terms, and extensive company-published customer traction. The largest diligence issue is that nearly all operating quality evidence is company-published: revenue, ARR, margins, cash, burn, churn, NRR, customer concentration, legal outcome attribution, security audit results, model accuracy, and cap-table economics are not public.
  investment_or_diligence_thesis: >-
    Proceed only to confirmatory diligence. The opportunity is strategically interesting because Eve sits in a high-value legal workflow category, appears to have strong investor support, and targets plaintiff firms with measurable pain around intake, medical records, drafting, discovery, and client communication. Underwriting should be gated on private validation of financial scale, cohort retention, customer ROI, professional-responsibility controls, security evidence, and the pending EvenUp v. Butler Labs litigation signal.
  strongest_verified_claims:
    - founder_claim_id: "FC-002"
      summary: "PRNewswire and LawNext report Eve raised a $103 million Series B at an over $1 billion valuation on 2025-09-30, led by Spark Capital with Andreessen Horowitz, Lightspeed, and Menlo participating."
      evidence_claim_ids: ["EC-001", "EC-002"]
    - founder_claim_id: "FC-001"
      summary: "Eve-owned pages and the financing release describe a plaintiff-law lifecycle platform spanning intake, pre-litigation, litigation, agents, auditor, drafting, demand letters, discovery, and case analysis."
      evidence_claim_ids: ["EC-004", "EC-005", "EC-006"]
    - founder_claim_id: "FC-004"
      summary: "Company legal and security pages disclose AWS/Azure hosting, U.S. AWS databases, encryption at rest and in transit, third-party assessments, annual penetration testing, quarterly access reviews, vendor risk management, and a 99.5% monthly uptime SLA."
      evidence_claim_ids: ["EC-009", "EC-010"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Financial quality, runway, revenue durability, and valuation support are not publicly verifiable."
    - risk_id: "R-004"
      summary: "An accessible Law360 case page and public search snippets identify EvenUp v. Butler Labs, Inc., a pending competitor trade-secret-related case signal that requires counsel review."
    - risk_id: "R-003"
      summary: "Legal AI output is expressly draft, non-final, and attorney-supervised, creating professional-responsibility, hallucination, privilege, confidentiality, and unauthorized-practice-of-law control risk."
  key_evidence_gaps:
    - "Audited financials, monthly ARR/revenue, gross margin, contribution margin, burn, cash, debt, runway, and board-approved forecast."
    - "Current cap table, option ledger, preference stack, financing documents, investor rights, debt, SAFEs, notes, and secondary transactions."
    - "Customer cohorts, active paid-firm definition, case-count methodology, outcome-attribution methodology, churn, NRR, expansion, concentration, and customer references."
    - "SOC reports, penetration-test results, model evaluation results, incident history, uptime history, data-retention evidence, vendor contracts, and privacy assessments."
    - "Full legal docket, pleadings, counsel analysis, insurance coverage, indemnity exposure, IP ownership assignments, open-source inventory, and regulatory correspondence."
  recommended_next_steps:
    - "Run financial and cap-table diligence before relying on the unicorn valuation."
    - "Validate top 25 customers, customer count definitions, case volume, recovery attribution, retention, and implementation outcomes."
    - "Have counsel review the EvenUp litigation, legal-advice disclaimers, customer supervision controls, privilege/confidentiality design, and professional-responsibility compliance."
    - "Review security, privacy, uptime, AI governance, vendor, and model-evaluation artifacts before approving sensitive plaintiff-law data workflows."

chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: >-
      Public sources verify a recent unicorn financing event and named investors, but they do not disclose revenue, ARR, margin, cash, debt, burn, runway, cap table, preference stack, or board plan. Eve's valuation cannot be underwritten from public sources alone.
    founder_claim_ids: ["FC-002"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-003", "EC-018", "EC-019"]
    risk_ids: ["R-001", "R-008"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3", "I.A.4", "I.A.5", "I.A.6"]
        summary: "No audited financial statements, quarterly results, revenue, ARR, gross margin, cash, debt, burn, or runway metrics were found in public sources."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "I.A-F1"
            finding: "Public sources reviewed do not provide financial statements or unit economics."
            evidence_claim_ids: ["EC-019"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "A high-growth customer count could mask discounting, high services burden, low gross margin, delayed collections, or high support/model costs."
        evidence_gaps:
          - "Audited financials, revenue recognition policy, monthly management accounts, ARR bridge, gross margin, cash, debt, burn, and runway."
        follow_up_questions:
          - "What are FY2023-FY2026 revenue, ARR, gross margin, contribution margin, operating burn, cash, debt, and runway by product and customer segment?"
        table_ids: ["T-003"]
        figure_ids: []
        evidence_claim_ids: ["EC-019"]
      - section_id: "I.B"
        title: "Financial projections and financing history"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3", "I.B.4", "I.B.5", "I.B.6", "I.B.7", "I.B.8"]
        summary: "The strongest public financing anchor is the September 2025 $103 million Series B at an over $1 billion valuation."
        verification_status: "partially_verified"
        confidence: "high"
        key_findings:
          - finding_id: "I.B-F1"
            finding: "PRNewswire and LawNext report a $103 million Series B at an over $1 billion valuation."
            evidence_claim_ids: ["EC-002"]
            risk_ids: ["R-001"]
          - finding_id: "I.B-F2"
            finding: "The CB Insights row used for target selection lists Eve as a U.S. Enterprise Tech unicorn valued at $1 billion on 2025-09-30."
            evidence_claim_ids: ["EC-001"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "Public financing announcements do not disclose liquidation preferences, ratchets, investor rights, debt, secondary sales, or current valuation marks."
        evidence_gaps:
          - "Board plan, forecast, financing terms, investor rights, valuation mechanics, debt facilities, and any later financing or secondary transaction."
        follow_up_questions:
          - "Has Eve raised or agreed to any debt, secondary, SAFE, note, or equity financing after the Series B, and on what terms?"
        table_ids: ["T-001"]
        figure_ids: ["F-001", "F-002"]
        evidence_claim_ids: ["EC-001", "EC-002", "EC-003"]
      - section_id: "I.C"
        title: "Capital structure"
        checklist_question_ids: ["I.C.1", "I.C.2", "I.C.3", "I.C.4", "I.C.5"]
        summary: "Public sources identify major investors but not ownership percentages, share classes, option pool, preference stack, or board-control rights."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.C-F1"
            finding: "Public sources name Spark Capital, Andreessen Horowitz, Lightspeed Venture Partners, and Menlo Ventures as Series B participants or major investors."
            evidence_claim_ids: ["EC-002", "EC-003"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "Investor preferences, governance rights, option-pool refreshes, and future pay-to-play terms may materially change common-equity economics."
        evidence_gaps:
          - "Fully diluted cap table, option ledger, investor rights, preference waterfall, board consents, and major shareholder agreements."
        follow_up_questions:
          - "What are current ownership, preference, option-pool, board, consent, pro rata, ROFR, and information-rights terms?"
        table_ids: ["T-002"]
        figure_ids: []
        evidence_claim_ids: ["EC-002", "EC-003"]
      - section_id: "I.D"
        title: "Other financial information"
        checklist_question_ids: ["I.D.1", "I.D.2", "I.D.3"]
        summary: "Public MSA terms disclose order-based rates, invoicing, late-fee mechanics, overage billing, automatic renewal, and a default 7.5% renewal price adjustment, but not actual pricing, discounting, or receivables."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.D-F1"
            finding: "The MSA says rates are in the applicable order and renewal fees increase 7.5% unless the order states otherwise."
            evidence_claim_ids: ["EC-018"]
            risk_ids: ["R-008"]
        hidden_risks:
          - "Enterprise order forms may contain discounts, termination rights, implementation services, usage caps, SLAs, or liability deviations not visible in the public MSA."
        evidence_gaps:
          - "Contracted ARR by customer, billings, collections, deferred revenue, discounting, overage revenue, renewal uplifts, receivables, and bad debt."
        follow_up_questions:
          - "Provide top customer order forms, pricing schedule, discounts, renewal history, AR aging, collections, and credit notes."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-018"]
  - chapter_id: "II"
    title: "Products"
    chapter_summary: >-
      Eve publicly describes a broad plaintiff-law AI platform spanning intake, case evaluation, medical records, drafting, demand letters, discovery, litigation workflows, AI Agents, Auditor, and a forthcoming Analyst. The breadth is credible from company pages, but product quality, accuracy, implementation burden, uptime, and paid adoption by module are not public.
    founder_claim_ids: ["FC-001", "FC-005"]
    evidence_claim_ids: ["EC-004", "EC-005", "EC-006", "EC-007", "EC-011", "EC-018"]
    risk_ids: ["R-003", "R-007", "R-010"]
    sections:
      - section_id: "II.A"
        title: "Description of each product"
        checklist_question_ids: ["II.A.1", "II.A.2", "II.A.3", "II.A.4", "II.A.5", "II.A.6"]
        summary: "Public product pages support a multi-module legal AI platform; pricing is private and output is expressly draft and attorney-supervised under the MSA."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "II.A-F1"
            finding: "Eve markets products across intake, pre-litigation, litigation, Agents, Auditor, and a forthcoming Analyst."
            evidence_claim_ids: ["EC-005", "EC-006", "EC-007"]
            risk_ids: ["R-007"]
          - finding_id: "II.A-F2"
            finding: "The MSA requires licensed legal professional oversight and states all output is draft and not final."
            evidence_claim_ids: ["EC-011"]
            risk_ids: ["R-003"]
        hidden_risks:
          - "The highest-value use cases process sensitive client, medical, settlement, and litigation data where model errors or confidentiality failures can have disproportionate consequences."
          - "Broad product scope can create integration, QA, support, and model-evaluation burden if adoption outpaces controls."
        evidence_gaps:
          - "Module ARR, active usage, accuracy metrics, human-review workflow, integrations, release process, incident backlog, model vendors, and product roadmap."
        follow_up_questions:
          - "Which modules are generally available, which are beta, what is paid adoption by module, and what accuracy/quality gates must be passed before customer deployment?"
        table_ids: ["T-004", "T-005"]
        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-005", "EC-006", "EC-007", "EC-011", "EC-018"]
  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: >-
      Public evidence points to meaningful customer traction, including named plaintiff firms, customer logos, case-study metrics, and company-published counts. However, the public record does not disclose active paid customers, revenue by customer, churn, NRR, implementation failures, concentration, or outcome attribution methodology.
    founder_claim_ids: ["FC-003", "FC-005"]
    evidence_claim_ids: ["EC-004", "EC-005", "EC-007", "EC-014", "EC-019"]
    risk_ids: ["R-002", "R-007", "R-008"]
    sections:
      - section_id: "III.A"
        title: "Top customers by application"
        checklist_question_ids: ["III.A"]
        summary: "Eve names or displays many plaintiff-firm customers and customer stories, including Mike Morse Law Firm, The Law Offices of James Scott Farrin, Barrett & Farahany, Disparti Law Group, Frontier Law Center, Laurel Employment Law, Hershey Law, and others."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.A-F1"
            finding: "PRNewswire names multiple plaintiff-firm customers and says Eve serves over 450 firms."
            evidence_claim_ids: ["EC-004"]
            risk_ids: ["R-002"]
          - finding_id: "III.A-F2"
            finding: "The homepage says over 1000 leading plaintiff firms use Eve, a higher count than the Series B release."
            evidence_claim_ids: ["EC-005"]
            risk_ids: ["R-002"]
        hidden_risks:
          - "Logo and testimonial pages may include pilots, unpaid accounts, inactive users, affiliates, or non-standard contracts unless the customer definition is validated."
        evidence_gaps:
          - "Top customer list, active paid account definition, logo permission records, contract status, implementation status, customer references, and churn."
        follow_up_questions:
          - "Which named firms are active paying customers, which modules do they use, and what share of ARR and gross margin comes from the top 10 accounts?"
        table_ids: ["T-006"]
        figure_ids: ["F-004"]
        evidence_claim_ids: ["EC-004", "EC-005", "EC-007", "EC-014"]
      - section_id: "III.B"
        title: "Strategic relationships"
        checklist_question_ids: ["III.B"]
        summary: "Public strategic relationships are mostly investors, customer references, and workflow integrations implied by product pages; no exclusive channel, reseller, court, insurer, or bar-association partnership was verified."
        verification_status: "partially_verified"
        confidence: "low"
        key_findings:
          - finding_id: "III.B-F1"
            finding: "Major investors publicly include Spark, Andreessen Horowitz, Lightspeed, and Menlo; this supports financing credibility but not customer distribution."
            evidence_claim_ids: ["EC-002", "EC-003"]
            risk_ids: ["R-008"]
        hidden_risks:
          - "GTM may rely on concentrated founder/investor networks, references, or high-touch transformation services not visible in public sources."
        evidence_gaps:
          - "Channel agreements, referral agreements, partner revenue, integrations, customer-success staffing, and services commitments."
        follow_up_questions:
          - "List all strategic alliances, referral partners, integration partners, bar association relationships, and revenue contribution by channel."
        table_ids: ["T-007"]
        figure_ids: []
        evidence_claim_ids: ["EC-002", "EC-003", "EC-009"]
      - section_id: "III.C"
        title: "Revenue by customer"
        checklist_question_ids: ["III.C"]
        summary: "Revenue by customer and customer concentration are not public."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "III.C-F1"
            finding: "No public source reviewed disclosed ARR, revenue, ACV, NRR, churn, or concentration by customer."
            evidence_claim_ids: ["EC-019"]
            risk_ids: ["R-001", "R-002"]
        hidden_risks:
          - "A small number of large plaintiff firms could drive reported scale, exposing the company to renewal, reputational, and services concentration risk."
        evidence_gaps:
          - "Revenue by customer, active subscription count, ACV distribution, top-10 concentration, churn, NRR, expansion, and payment status."
        follow_up_questions:
          - "Provide revenue concentration, customer cohort, churn/NRR, and failed-renewal schedules."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-019"]
      - section_id: "III.D"
        title: "Significant relationships severed within the last two years"
        checklist_question_ids: ["III.D"]
        summary: "No customer or partner relationship severance schedule is public; one competitor litigation signal exists but is not evidence of a severed customer relationship."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "III.D-F1"
            finding: "Public sources did not disclose churned, failed, or terminated customer relationships."
            evidence_claim_ids: ["EC-019"]
            risk_ids: ["R-002"]
        hidden_risks:
          - "Failed AI deployments may be handled privately under confidentiality clauses and therefore may not appear in public customer stories."
        evidence_gaps:
          - "Churned accounts, terminated pilots, non-renewals, failed implementations, refund/credit records, support escalations, and reference decline reasons."
        follow_up_questions:
          - "Provide all material non-renewals, failed implementations, refunds, credits, and customer disputes since 2023."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-019"]
      - section_id: "III.E"
        title: "Top suppliers"
        checklist_question_ids: ["III.E"]
        summary: "Eve discloses AWS and Microsoft Azure hosting, AWS databases in the United States, and cloud or integrated-app outage exclusions in the SLA; model, data, and integration vendors are otherwise not fully public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.E-F1"
            finding: "Security materials say services are hosted with AWS and Microsoft Azure and data is hosted in AWS databases located in the United States."
            evidence_claim_ids: ["EC-009"]
            risk_ids: ["R-005", "R-010"]
          - finding_id: "III.E-F2"
            finding: "The SLA excludes cloud provider and integrated application provider outage events from monthly availability calculations."
            evidence_claim_ids: ["EC-010"]
            risk_ids: ["R-010"]
        hidden_risks:
          - "Undisclosed LLM, OCR, voice, e-signature, document-management, CRM, or case-management integrations could create material vendor and data-transfer risk."
        evidence_gaps:
          - "Subprocessor list, model vendor terms, cloud architecture, integration dependencies, data residency, vendor contracts, and concentration by workload."
        follow_up_questions:
          - "Provide vendor inventory, subprocessors, DPAs, model-provider contracts, data flow maps, and uptime dependency analysis."
        table_ids: ["T-007"]
        figure_ids: []
        evidence_claim_ids: ["EC-009", "EC-010"]
  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: >-
      Eve competes in a crowded legal AI market. Direct overlap is strongest with EvenUp for plaintiff personal-injury workflows, while Harvey and Spellbook illustrate adjacent legal AI platform and contract-AI pressure. Larger legal platforms and incumbents are also relevant but were not fully benchmarked in this run.
    founder_claim_ids: []
    evidence_claim_ids: ["EC-016", "EC-004", "EC-005"]
    risk_ids: ["R-006", "R-004", "R-007"]
    sections:
      - section_id: "IV.A"
        title: "Competitive landscape by market segment"
        checklist_question_ids: ["IV.A.1", "IV.A.2"]
        summary: "Competitor pages show overlapping AI workflows for legal work, plaintiff law, litigation, document analysis, intake, demand generation, discovery, and contract drafting."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "IV.A-F1"
            finding: "EvenUp publicly markets AI products for personal-injury lawyers across intake, treatment, demands, negotiation, discovery, trial, drafting, analytics, communications, and integrations."
            evidence_claim_ids: ["EC-016"]
            risk_ids: ["R-006", "R-004"]
          - finding_id: "IV.A-F2"
            finding: "Harvey markets AI software for legal and professional services, including assistant, vault, knowledge, workflow agents, ecosystem, and litigation use cases."
            evidence_claim_ids: ["EC-016"]
            risk_ids: ["R-006"]
          - finding_id: "IV.A-F3"
            finding: "Spellbook markets legal AI for contract review, workflow automation, and deal-history insights, showing adjacent legal AI competition for budget and adoption."
            evidence_claim_ids: ["EC-016"]
            risk_ids: ["R-006"]
        hidden_risks:
          - "Competitors with stronger datasets, legal content, case-management integrations, capital, or professional-services capacity could compress pricing or shorten Eve's differentiation window."
        evidence_gaps:
          - "Win/loss data, price benchmarks, feature-by-feature demos, customer switching costs, model performance comparisons, sales-cycle data, and market share."
