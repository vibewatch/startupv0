risk_register:
  - risk_id: "R-001"
    risk_title: "Financial quality and runway not publicly verifiable"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Revenue, ARR, gross margin, cash, debt, burn, runway, forecast, and cap-table economics are not public, making valuation underwriting impossible from public evidence alone."
    impacted_chapter_ids: ["I", "V", "VII"]
    impacted_section_ids: ["I.A", "I.B", "I.C", "I.D", "V.E", "VII.E"]
    evidence_claim_ids: ["EC-002", "EC-003", "EC-019"]
    mitigation_or_diligence_request: "Request audited financials, monthly management accounts, bank statements, debt schedules, cap table, financing documents, and board plan."
  - risk_id: "R-002"
    risk_title: "Customer and traction metrics require validation"
    risk_category: "customer"
    severity: "high"
    likelihood: "medium"
    description: "Customer counts, case volumes, recoveries, and customer-story metrics are company-published and count definitions differ by source."
    impacted_chapter_ids: ["III", "V"]
    impacted_section_ids: ["III.A", "III.C", "III.D", "V.B"]
    evidence_claim_ids: ["EC-004", "EC-005", "EC-014"]
    mitigation_or_diligence_request: "Request active paid customer cohorts, logo permissions, case-count methodology, recovery attribution, customer references, churn, NRR, and concentration."
  - risk_id: "R-003"
    risk_title: "Legal AI professional-responsibility exposure"
    risk_category: "regulatory_legal"
    severity: "high"
    likelihood: "high"
    description: "Eve's MSA states output is draft and not legal advice, requiring licensed legal professional oversight; any failure of controls may create ethics, UPL, privilege, confidentiality, or malpractice-adjacent issues."
    impacted_chapter_ids: ["II", "VIII"]
    impacted_section_ids: ["II.A", "VIII.E", "VIII.F", "VIII.G"]
    evidence_claim_ids: ["EC-011", "EC-012"]
    mitigation_or_diligence_request: "Review customer training, attorney-supervision workflows, audit logs, privilege/confidentiality controls, bar-ethics analysis, and error-remediation processes."
  - risk_id: "R-004"
    risk_title: "Pending competitor litigation and IP risk"
    risk_category: "legal"
    severity: "high"
    likelihood: "medium"
    description: "Public legal/search sources identify EvenUp v. Butler Labs, Inc. and snippets referencing trade-secret allegations; docket-level legal analysis is required."
    impacted_chapter_ids: ["IV", "VIII"]
    impacted_section_ids: ["IV.A", "VIII.A", "VIII.D", "VIII.E"]
    evidence_claim_ids: ["EC-015", "EC-020"]
    mitigation_or_diligence_request: "Obtain counsel memo, docket documents, pleadings, orders, litigation budget, insurance coverage, board updates, and product/IP impact analysis."
  - risk_id: "R-005"
    risk_title: "Sensitive legal, medical, and client data exposure"
    risk_category: "privacy_security"
    severity: "high"
    likelihood: "medium"
    description: "Plaintiff-law workflows may process sensitive legal, client, health, communications, and litigation data; public controls are not enough without audit artifacts."
    impacted_chapter_ids: ["III", "VIII"]
