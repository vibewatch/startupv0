risk_register:
  - risk_id: R-001
    risk_title: Sustained GAAP and adjusted operating losses
    risk_category: financial
    severity: high
    likelihood: high
    description: 2025 revenue contracted and GAAP net loss widened; Q1 2026 improved but remains loss-making.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request monthly cash burn, 2026 plan, variance-to-plan, and path-to-profitability bridge.
  - risk_id: R-002
    risk_title: Non-voting retail security and private-company liquidity risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: The Reg A offering sold non-voting Class D stock and warned that the securities are highly speculative.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review cap table, investor rights, secondary-transfer restrictions, and board/control provisions.
  - risk_id: R-003
    risk_title: Municipal timeshare/zoning restrictions
    risk_category: regulatory
    severity: high
    likelihood: high
    description: St. Helena settlement restricts Pacaso expansion beyond four homes and similar local resistance could constrain supply.
    impacted_chapter_ids:
      - VIII
      - IV
      - V
    impacted_section_ids:
      - VIII.G
      - VIII.A
      - IV.A
      - V.A
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Build a jurisdiction-by-jurisdiction legal matrix, including pending ordinances and HOA constraints.
  - risk_id: R-004
    risk_title: Owner resale liquidity and net-return opacity
    risk_category: customer
    severity: high
    likelihood: medium
    description: Company resale-gain claims require transaction-level verification including fees, days on market, concessions, and unsold shares.
    impacted_chapter_ids:
      - III
      - I
    impacted_section_ids:
      - III.A
      - I.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request resale cohort data by market, vintage, share size, and net owner proceeds.
  - risk_id: R-005
    risk_title: Macro, interest-rate, and luxury-real-estate cyclicality
    risk_category: market
    severity: high
    likelihood: medium
    description: Revenue and demand are exposed to luxury second-home demand, mortgage rates, destination inventory values, and consumer sentiment.
    impacted_chapter_ids:
      - I
      - IV
      - V
    impacted_section_ids:
      - I.A
      - IV.A
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Stress-test sell-through, inventory carrying costs, and financing availability under lower home prices and slower absorption.
  - risk_id: R-006
    risk_title: Customer-acquisition cost and channel dependency
    risk_category: market
    severity: medium
    likelihood: high
    description: Agent commissions and Reg A advertising show paid-acquisition intensity; public CAC, conversion, and payback data are absent.
    impacted_chapter_ids:
      - V
      - III
    impacted_section_ids:
      - V.D
      - V.E
      - III.B
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request funnel metrics by channel, CAC, payback, close rate, and referral economics.
  - risk_id: R-007
    risk_title: Property operations and service-quality execution
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Pacaso manages homes, LLC programs, maintenance, scheduling, and resales across dispersed luxury destinations.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.F
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review SLAs, complaint logs, maintenance reserves, vendor concentration, and insurance claims.
  - risk_id: R-008
    risk_title: Debt and property-linked financing complexity
    risk_category: financing
    severity: medium
    likelihood: medium
