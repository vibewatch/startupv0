report_metadata:
  report_title: Pacaso Startup Diligence Research Report
  target_company: Pacaso Inc.
  website: https://www.pacaso.com/
  known_aliases:
    - Pacaso
    - Landholdings Inc.
  sector: PropTech / luxury vacation-home co-ownership
  geography: United States with select global vacation-home markets
  company_stage: Late-stage private company / Regulation A reporting issuer
  research_date: 2026-05-24
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: America/New_York
research_scope:
  diligence_depth: deep_diligence
  source_strategy:
    - Public-source only review using SEC EDGAR filings, company pages, municipal/court records, trademark records, and public competitor pages.
    - Prioritized primary regulatory filings and official company/legal sources over press and search snippets.
    - Did not use nonpublic materials, interviews, paid databases, or confidential customer/vendor records.
  included_jurisdictions:
    - United States federal securities filings
    - California municipal/legal examples
    - United States trademark records
    - Selected global listing/market references
  excluded_topics:
    - No private customer calls
    - No data-room financial model
    - No formal legal opinion
    - No paid market-sizing database
    - No technical code/security audit
  user_provided_materials: []
