              - EC-004
            risk_ids:
              - R-006
        hidden_risks:
          - Hidden termination rights, covenants, data restrictions, and HOA provisions may affect operations.
          - Owner contracts may create consumer-law obligations.
        evidence_gaps:
          - All material contracts, templates, amendments, defaults, and change-of-control provisions.
        follow_up_questions:
          - Provide material-contract schedule and copies of all core templates.
        table_ids:
          - T-017
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-014
          - EC-019
          - EC-004
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Regulatory exposure is high because Pacaso intersects real-estate brokerage, securities, consumer protection, local zoning/timeshare ordinances, financing, and international property rules.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: VIII.G-F1
            finding: St. Helena settlement provides verified evidence that local timeshare ordinance enforcement can restrict growth.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-003
          - finding_id: VIII.G-F2
            finding: Reg A offering carries SEC reporting/advertising and investor-protection obligations.
            evidence_claim_ids:
              - EC-005
              - EC-006
              - EC-020
            risk_ids:
              - R-002
          - finding_id: VIII.G-F3
            finding: Global listings and expansion introduce foreign property and tax law exposure.
            evidence_claim_ids:
              - EC-003
              - EC-013
            risk_ids:
              - R-012
        hidden_risks:
          - A single unfavorable ordinance can block inventory in attractive destinations.
          - Securities marketing scrutiny can affect reputation and financing flexibility.
        evidence_gaps:
          - Regulatory correspondence, state licensing, broker compliance, advertising approvals, local permits, and foreign counsel opinions.
        follow_up_questions:
          - Provide jurisdiction-by-jurisdiction regulatory matrix and copies of all regulator correspondence.
