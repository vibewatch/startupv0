executive_summary:
  overall_assessment: "Pacaso is a real, revenue-generating PropTech company with strong brand/founder credentials, public SEC reporting, and a clear luxury co-ownership product. The diligence posture is mixed-to-high risk: FY2025 revenue contracted and losses remain meaningful, while Q1 2026 metrics improved; municipal/timeshare regulation, resale liquidity, and property-level economics are the gating risks."
  investment_or_diligence_thesis: Proceed only with full data-room and counsel review. The upside case is a managed marketplace that turns underused luxury second homes into lower-ticket ownership with recurring services and resale revenue. The downside case is a capital-intensive, locally constrained, macro-sensitive property operator with opaque resale economics and non-voting retail-shareholder protections.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Pacaso publicly offers 1/8 to 1/2 second-home ownership and listings priced for 1/8 ownership.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-005
      summary: SEC-furnished Q1 2026 metrics show net-loss improvement and higher units/resales despite lower reported revenue.
      evidence_claim_ids:
        - EC-010
        - EC-011
    - founder_claim_id: FC-006
      summary: Historical Series C financing and investor backing are verified in press-release and TechCrunch coverage.
      evidence_claim_ids:
        - EC-012
        - EC-013
  biggest_risks:
    - risk_id: R-003
      summary: Municipal timeshare/zoning restrictions can directly block growth in desirable markets.
    - risk_id: R-001
      summary: The company remains loss-making; FY2025 net loss widened even after strong Reg A fundraising.
    - risk_id: R-004
      summary: Owner resale liquidity and net returns are not publicly substantiated at transaction level.
    - risk_id: R-002
      summary: Class D Reg A securities are non-voting, speculative, and privately illiquid.
  key_evidence_gaps:
    - Property-level cohort economics, resale net returns, days-on-market, and unsold-share aging.
    - Full cap table, preference stack, option/warrant schedule, debt covenants, and current 409A.
    - Jurisdiction-by-jurisdiction regulatory matrix and litigation/settlement schedule.
    - CAC, conversion, funnel, and channel payback data separated from Reg A investor marketing.
    - Current headcount, org chart, compensation, attrition, and leadership bench.
  recommended_next_steps:
    - Make full financial, legal, and property-level data-room access a gating condition.
    - Commission outside counsel review of timeshare/zoning, securities, brokerage, HOA, and foreign-market compliance.
    - Run cohort-level economic analysis by market, vintage, share size, channel, financing, and resale outcome.
    - Interview owners, agents, former employees, local brokers, and municipal stakeholders in top markets.
    - Reconcile historical venture valuation, Reg A pricing, and current fully diluted ownership economics.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: SEC filings provide unusually strong public financial visibility for a private startup. Pacaso has meaningful revenue, improved Q1 2026 loss metrics, and fresh Reg A capital, but FY2025 revenue contracted and losses remain material.
    founder_claim_ids:
      - FC-004
      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-008
      - EC-009
      - EC-010
      - EC-011
      - EC-012
      - EC-013
      - EC-014
      - EC-020
    risk_ids:
      - R-001
      - R-002
      - R-005
      - R-008
      - R-011
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public SEC data covers FY2024, FY2025, H1 2025, and Q1 2026. Revenue declined in FY2025 and Q1 2026, while Q1 net loss improved and adjusted gross profit excluding whole homes increased.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: FY2025 revenue was $90.057M, down 29% from $126.560M in FY2024.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-001
              - R-005
          - finding_id: I.A-F2
            finding: FY2025 GAAP net loss widened to $63.479M, but adjusted EBITDA loss was much smaller at $21.340M after adjustments including Reg A advertising.
            evidence_claim_ids:
              - EC-007
              - EC-008
            risk_ids:
              - R-001
          - finding_id: I.A-F3
            finding: Q1 2026 units plus resales increased to 72 from 56, but revenue fell 22% year over year.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-005
        hidden_risks:
          - Revenue recognition can shift with sale structure; non-GAAP measures may mask cash needs.
          - Property-level operating expense and inventory-aging details are not public.
        evidence_gaps:
          - Monthly P&L, cash-flow statements, balance sheet, and variance-to-budget by month for 2023-2026.
          - Revenue and gross profit by transaction type, market, and channel.
          - Backlog, reservations/deposits, AR aging, and unsold-share aging.
        follow_up_questions:
          - Provide audited FY2023-FY2025 statements, Q1/Q2 2026 management accounts, and monthly cash burn by department.
          - Reconcile GAAP revenue to gross real estate transacted and adjusted gross profit excluding whole homes.
        table_ids:
          - T-001
          - T-003
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-010
          - EC-011
          - EC-014
          - EC-019
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No full forecast is public. Management commentary emphasizes margin expansion, faster inventory turns, and disciplined execution, but projections must be tested under housing-market and regulatory stress.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Q1 2026 non-GAAP adjusted gross profit excluding whole homes increased 25% year over year and adjusted EBITDA loss improved 17%.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-001
          - finding_id: I.B-F2
            finding: Growth assumptions depend on luxury second-home demand, financing availability, and jurisdiction-by-jurisdiction permission to operate.
            evidence_claim_ids:
              - EC-015
              - EC-018
            risk_ids:
              - R-003
              - R-005
              - R-012
        hidden_risks:
          - Forecasts could assume faster sell-through than local regulations and market absorption allow.
          - Foreign/global expansion adds tax, FX, and legal complexity.
        evidence_gaps:
          - Three-year quarterly forecast by product, channel, country, and market.
          - Stress cases for interest rates, home prices, and regulatory shutdowns.
        follow_up_questions:
          - Provide base/upside/downside models with revenue by transaction type and market.
          - Provide capex/working-capital assumptions for property inventory, furnishings, debt, and reserves.
        table_ids:
          - T-001
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-010
          - EC-011
          - EC-015
          - EC-018
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public filings disclose share classes, a closed Reg A Class D raise, cash and liabilities, and debt signals. A full cap table, preferences, warrants, options, and covenants require company disclosure.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: Pacaso closed a Reg A offering after issuing 24,958,207 Class D shares for about $72.3M gross proceeds.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-002
              - R-011
          - finding_id: I.C-F2
            finding: Pacaso reported $52.237M cash and equivalents and $71.249M total liabilities at Dec. 31, 2025.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-001
              - R-008
          - finding_id: I.C-F3
            finding: Offering documents state the Class D security is non-voting and highly speculative.
            evidence_claim_ids:
              - EC-005
              - EC-020
            risk_ids:
              - R-002
        hidden_risks:
          - Preferred-stock preferences and debt covenants could materially alter common/Class D economics.
          - SPE lines and property debt can create refinancing or covenant exposure.
        evidence_gaps:
          - Fully diluted cap table; investor rights; liquidation preference stack; option/warrant schedule; debt schedule and covenants.
        follow_up_questions:
          - Provide current cap table, 409A history, board consents, debt agreements, and all SAFEs/notes/warrants/options.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-009
          - EC-020
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public information confirms major financing history and high-level revenue-recognition categories, but tax positions, NOLs, and accounting policies require data-room review.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Series C in 2021 was reported at $125M and $1.5B valuation; Reg A closed in 2025 at a different financing stage.
            evidence_claim_ids:
              - EC-012
              - EC-006
            risk_ids:
              - R-011
          - finding_id: I.D-F2
            finding: Revenue includes sale of Holding SPE interests, transaction fees, design/furniture services, financing fees, resales, and recurring management fees.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-001
              - R-008
        hidden_risks:
          - Historical valuation headlines may not map to today’s economics.
          - Tax and NOL details were not publicly available.
        evidence_gaps:
          - Tax positions, NOL schedule, revenue-recognition memo, and financing history with ownership percentages.
        follow_up_questions:
          - Provide financing-round docs from seed through Reg A, tax memos, revenue-recognition policy, and auditor management letters.
        table_ids:
          - T-002
          - T-003
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-012
          - EC-013
          - EC-019
  - chapter_id: II
    title: Products
    chapter_summary: Pacaso’s product is a managed luxury second-home co-ownership marketplace combining property sourcing, LLC ownership, financing facilitation, design, scheduling, property operations, and resale support. The public product is clear; durability depends on owner economics and regulatory acceptance.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-014
      - EC-019
    risk_ids:
      - R-003
      - R-004
      - R-007
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: The primary product is fractional ownership of luxury vacation homes through property-specific LLCs, with SmartStay scheduling, property management, financing facilitation, and resale support. Product performance data by cohort is not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Official materials verify 1/8 to 1/2 ownership and property-specific LLC structure.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-003
          - finding_id: II.A-F2
            finding: SEC filings confirm revenue from sales of Holding SPE interests, transaction fees, resales, management fees, and SmartStay technology.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-001
              - R-007
          - finding_id: II.A-F3
            finding: Owner resale appreciation claims are not publicly verified at transaction level.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-004
        hidden_risks:
          - Product may be economically attractive only in selected destinations and price bands.
          - If owners experience resale friction, the ownership proposition weakens.
        evidence_gaps:
          - Product-level margins, utilization, resale cohorts, maintenance reserves, and owner satisfaction.
          - Technology uptime and scheduling-dispute metrics.
        follow_up_questions:
          - Provide cohort-level owner economics by market and vintage.
          - Provide SmartStay product roadmap, incident logs, and owner NPS.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-014
          - EC-019
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public sources support a luxury second-home buyer profile and resale/owner-service revenue, but top customers, cohorts, and satisfaction metrics are not public. Diligence should prioritize owner economics, resale liquidity, and channel-specific conversion.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-010
      - EC-014
      - EC-019
    risk_ids:
      - R-004
      - R-006
      - R-010
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: No top-customer list is public, which is normal for a consumer marketplace. Public evidence points to affluent second-home buyers, owners using the home through SmartStay, and resale participants.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Listings and 1/8 share pricing indicate a high-net-worth/luxury customer application.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-005
          - finding_id: III.A-F2
            finding: 2021 TechCrunch coverage reported company statements about first-time second-home buyers and customer diversity.
            evidence_claim_ids:
              - EC-010
            risk_ids: []
        hidden_risks:
          - Customer demand may be concentrated in a few geographies or macro-sensitive buyer cohorts.
          - Public claims do not reveal repeat rate, churn, complaints, or owner utilization.
        evidence_gaps:
          - Top 15 buyer cohorts are not applicable, but company should provide anonymized buyer cohort and contribution data.
        follow_up_questions:
          - Provide buyer cohorts by market, share size, acquisition channel, financed percentage, utilization, resale status, and NPS.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-003
          - EC-010
          - EC-019
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Publicly visible strategic relationships include agents, lenders/credit facilities, vendors, and municipalities/HOAs. Their economics and contract terms are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Agent referral channel is explicitly public at a 3% commission on share price.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-006
          - finding_id: III.B-F2
            finding: Financing and property operations imply material lender and vendor dependencies.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-007
              - R-008
        hidden_risks:
          - Referral incentives may inflate CAC.
          - Local service quality depends on dispersed suppliers.
        evidence_gaps:
          - Revenue contribution by partner/channel; lender concentration; vendor SLAs.
        follow_up_questions:
          - Provide partner list, contract summaries, volume by channel, commissions, and termination rights.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-004
          - EC-019
          - EC-015
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer is not public. Because transactions are consumer-facing and property-specific, concentration should be analyzed by market, property, channel, and repeat owner rather than named customers.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: SEC filings disclose revenue categories but not revenue by customer or cohort.
            evidence_claim_ids:
              - EC-019
            risk_ids:
