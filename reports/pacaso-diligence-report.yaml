        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: Public sources show dependence on local operations, financing, agent referrals, and data/exclusive content.
            evidence_claim_ids:
              - EC-004
              - EC-014
              - EC-019
            risk_ids:
              - R-007
              - R-008
              - R-010
