        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: St. Helena settlement materially limited operations in that city.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-003
        hidden_risks:
          - Unpublicized lender/vendor/municipal relationship changes could affect operations.
          - Dismissed litigation may have confidential settlement obligations.
        evidence_gaps:
          - List of terminated vendors, lenders, broker channels, municipal permits, and owner associations since 2024.
        follow_up_questions:
          - Provide relationship termination log and any settlement/confidentiality obligations.
        table_ids:
          - T-007
          - T-016
        figure_ids:
          - F-009
        evidence_claim_ids:
          - EC-015
          - EC-016
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
