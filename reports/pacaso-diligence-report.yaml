          - Vendor concentration could affect quality, cost, and compliance.
          - Insurance and HOA restrictions can change property economics.
        evidence_gaps:
          - Top suppliers by spend, contracts, termination rights, insurance carriers, lender lines.
        follow_up_questions:
          - Provide supplier spend cube, vendor SLAs, insurance schedules, and debt/lender contracts.
        table_ids:
          - T-007
          - T-013
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-004
          - EC-014
          - EC-019
  - chapter_id: IV
    title: Competition
    chapter_summary: "Pacaso competes in a crowded adjacency set: direct managed co-ownership, fractional real-estate investing, luxury travel subscriptions, and incumbent vacation clubs/timeshares. Differentiation centers on real ownership, managed luxury service, scheduling technology, and brand trust."
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-018
      - EC-001
      - EC-002
      - EC-003
      - EC-017
    risk_ids:
      - R-003
      - R-005
      - R-006
      - R-009
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Direct and indirect competitors can satisfy the same vacation-home aspiration with different ownership, liquidity, and service tradeoffs.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Ember and Kocomo present direct co-ownership alternatives.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-005
          - finding_id: IV.A-F2
            finding: Inspirato and Marriott Vacation Clubs compete for usage without Pacaso’s exact real-estate ownership structure.
            evidence_claim_ids:
              - EC-018
            risk_ids:
