diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Monthly financial statements, cash burn, and variance-to-plan for 2023-2026.
    why_it_matters: Needed to verify runway and operating leverage beyond public annual/Q1 snapshots.
    suggested_source_or_request: Company CFO/controller data-room package.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, liquidation preferences, warrants, SAFEs/notes, and option schedule.
    why_it_matters: Determines economic outcome for Class D/common holders and employees.
    suggested_source_or_request: Company legal/finance cap table export and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Property-level gross margin, carrying cost, days-to-sell, and resale returns by cohort.
    why_it_matters: Core to product economics and owner value proposition.
    suggested_source_or_request: Transaction ledger and property cohort analysis.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Customer cohort data, NPS, complaints, utilization, and resale outcomes.
    why_it_matters: Tests customer satisfaction and repeat/referral quality.
    suggested_source_or_request: CRM, owner survey, support ticket, and resale datasets.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: CAC, conversion, payback, channel mix, sales headcount, and quota attainment.
    why_it_matters: Determines scalability of sales and agent channels.
    suggested_source_or_request: Marketing attribution and sales productivity dashboards.
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Jurisdiction-by-jurisdiction legal/regulatory status and local ordinance/HOA analysis.
    why_it_matters: Regulatory constraints can block supply and create litigation costs.
    suggested_source_or_request: Outside counsel memoranda and permit/licensing matrix.
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation, arbitration, threatened claims, and settlement schedule.
    why_it_matters: Public sources reveal disputes but not the full claims universe.
    suggested_source_or_request: Counsel letter, PACER/state docket searches, claims log.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: SmartStay architecture, roadmap, uptime, security controls, and IP ownership.
    why_it_matters: Determines whether software creates defensible scale or just supports services.
    suggested_source_or_request: Engineering diligence package and security audits.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount, attrition, compensation, and hiring plan.
    why_it_matters: Needed to evaluate execution capacity and retention after valuation changes.
    suggested_source_or_request: HRIS export and compensation committee materials.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, exclusions, and loss runs by property and corporate entity.
    why_it_matters: Luxury properties create high-severity casualty, climate, and D&O/E&O exposure.
    suggested_source_or_request: Insurance broker package and claims history.
    priority: medium
  - gap_id: G-011
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, market share, and destination-level competitive pricing data.
    why_it_matters: Public competitor positioning is insufficient to prove defensibility.
    suggested_source_or_request: Sales CRM, broker interviews, and third-party market research.
    priority: medium
  - gap_id: G-012
    chapter_id: I
    section_id: I.D
    missing_information: Tax positions, NOLs, transfer pricing, and foreign-operations tax memos.
    why_it_matters: International listings and SPE structures may create tax complexity.
    suggested_source_or_request: Tax returns and accounting-firm memoranda.
    priority: medium
