  report_version: "1.0"
  currency: "USD"
  time_zone: "UTC"
research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Public web and registry research only"
    - "CB Insights unicorn/profile evidence"
    - "Companies House UK registry evidence"
    - "Company/partner press releases and blog claims"
    - "GitHub repositories and public metadata"
    - "CoinMarketCap crypto-asset/project profile"
    - "Website/docs/explorer accessibility checks"
  included_jurisdictions:
    - "United Kingdom public company registry"
    - "Global public web sources"
  excluded_topics:
    - "Private financial statements"
    - "Non-public cap table and token treasury"
    - "Non-public customer contracts"
