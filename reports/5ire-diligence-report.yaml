executive_summary:
  overall_assessment: "Eligible for the requested unicorn diligence stream because CB Insights lists 5ire at a $1.50B valuation, but public diligence is high-risk and gated by legal-entity continuity, financing reconciliation, and absent operating evidence."
  investment_or_diligence_thesis: "Treat 5ire as a public-source unicorn-screen candidate rather than investment-ready. Proceed only after counsel resolves the dissolved 5IRE LLP record and management reconciles cap table/token financing, financials, customers, product telemetry, and regulatory exposure."
  strongest_verified_claims:
    -
      founder_claim_id: "FC-001"
      summary: "CB Insights unicorn row lists 5ire at $1.50B, joined 2022-07-15."
      evidence_claim_ids:
        - "EC-001"
    -
      founder_claim_id: "FC-005"
      summary: "Companies House/partner release support public founder/designated-member identities."
      evidence_claim_ids:
        - "EC-004"
    -
      founder_claim_id: "FC-003"
      summary: "Public repositories and profiles support existence of 5ireChain and wallet technical artifacts."
      evidence_claim_ids:
        - "EC-008"
        - "EC-010"
        - "EC-011"
  biggest_risks:
    -
      risk_id: "R-001"
      summary: "Companies House records 5IRE LLP as dissolved on 2026-04-28."
    -
      risk_id: "R-002"
      summary: "Public funding totals conflict across CB Insights, CoinMarketCap, and press releases."
    -
      risk_id: "R-003"
      summary: "No public audited financials, revenue, cash, debt, or runway evidence."
    -
      risk_id: "R-005"
      summary: "No public top-customer, revenue-concentration, retention, or churn proof."
  key_evidence_gaps:
    - "Legal-entity map and counsel explanation for 5IRE LLP dissolution."
    - "Audited financials, cash runway, revenue/ARR bridge, tax, debt, and cap table/token treasury."
    - "Customer contracts, revenue concentration, retention, churn, and pipeline."
    - "Security audits, chain telemetry, validator health, wallet/user adoption, and incident history."
    - "Token regulatory opinions, exchange/listing contracts, AML/KYC, and sustainability-claim substantiation."
  recommended_next_steps:
    - "Do not rely on valuation until legal-entity continuity is resolved."
    - "Request finance/cap-table/token treasury data room and reconcile all public funding amounts."
    - "Conduct customer and partner reference calls tied to signed contracts and invoices."
    - "Perform technical/security review of chain, wallet, docs, telemetry, and uptime."
    - "Run counsel-led crypto/token, securities, AML, IP, employment, privacy, and sustainability-claim review."
