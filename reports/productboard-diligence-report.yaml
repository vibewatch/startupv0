executive_summary:
  overall_assessment: Productboard is publicly supportable as an active private Series D unicorn with a February 2022 valuation around $1.725B-$1.73B, recognized product-management platform positioning, active AI/Spark product pages, named customers and current hiring. The diligence posture is strongest on eligibility, financing event and product narrative; weakest on audited financial quality, current valuation, customer concentration, AI/unit economics and legal/IP clearance.
  investment_or_diligence_thesis: The investment case depends on whether Productboard can convert its broad product-team footprint and Spark AI repositioning into durable recurring revenue at attractive SaaS/AI gross margins while defending against Atlassian, Aha! and adjacent analytics/feedback platforms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Active private unicorn eligibility is supported by CB Insights Stage Series D | Alive, current company pages, LinkedIn and no public disqualifier found.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: The February 2022 unicorn valuation is corroborated by Wikipedia, CB Insights and Tech.eu.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: The public product narrative around feedback, prioritization, roadmaps, integrations and Spark AI is well evidenced.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
        - EC-018
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements and unit economics are opaque
    - risk_id: R-002
      summary: Latest public valuation is stale and market-cycle exposed
    - risk_id: R-004
      summary: Customer concentration, retention and logo materiality are unknown
    - risk_id: R-005
      summary: Crowded competitive landscape and platform bundling pressure
    - risk_id: R-007
      summary: AI/privacy/subprocessor governance exposure
  key_evidence_gaps:
    - Audited financials, ARR bridge, gross margin, burn/runway and KPI definitions
    - Fully diluted cap table, preferences, debt, option pool and later financing events
    - Top-customer ARR, retention/churn, contract terms and reference calls
    - Spark adoption, AI COGS, model/vendor controls and product roadmap evidence
    - Counsel-grade litigation, IP/trademark, regulatory, insurance and material-contract schedules
  recommended_next_steps:
    - Open finance and cap-table data rooms before relying on the 2022 valuation.
    - Reconcile customer logos and 6,000+ claim to active paid ARR, NRR, churn and concentration.
    - Run competitive win/loss and pricing diligence against Atlassian/Jira Product Discovery, Aha!, ProductPlan, UserVoice, Pendo and Amplitude.
    - Review Spark AI architecture, subprocessors, security reports, AI COGS and customer data-use controls.
    - Have counsel perform full litigation, regulatory, IP, privacy, insurance and material-contract review.
