risk_register:
  - risk_id: R-001
    risk_title: Financial statements and unit economics are opaque
    risk_category: financial
    severity: high
    likelihood: high
    description: No audited financials, management accounts, gross margin, CAC, burn, runway, ARR bridge or cohort metrics were found publicly; secondary revenue estimates are not investment-grade.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.D
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Request audited financials, monthly management accounts, ARR waterfall, KPI definitions, burn/runway, gross margin by product and CAC/payback analyses.
  - risk_id: R-002
    risk_title: Latest public valuation is stale and market-cycle exposed
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $1.725B/$1.73B valuation is from February 2022 and may not reflect current private SaaS multiples or Productboard performance.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Obtain latest 409A, investor marks, secondary indications, debt terms, budget/actuals and current financing plans.
  - risk_id: R-003
    risk_title: Cap table, preferences and debt instruments are not public
    risk_category: financing
    severity: high
    likelihood: high
    description: Public sources name major investors and total raised but not share counts, liquidation preferences, option pool, debt, warrants or investor rights.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Review charter, cap table, SAFEs/notes, debt, preference stack, pro rata rights, board consents and option pool schedule.
  - risk_id: R-004
    risk_title: Customer concentration, retention and logo materiality are unknown
    risk_category: customer
    severity: high
    likelihood: high
    description: Public logos and 6,000+ claims do not disclose ARR contribution, renewal status, churn, NRR or top-customer concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Request top-25 customer ARR, contract terms, renewal cohorts, churn reasons, health scores and independent reference calls.
  - risk_id: R-005
    risk_title: Crowded competitive landscape and platform bundling pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Productboard faces full-suite product-management competitors and platform vendors such as Atlassian with distribution advantages.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Run win/loss analysis, pricing/discount benchmarking, churn-to-competitor review and customer switching-cost interviews.
  - risk_id: R-006
    risk_title: AI product adoption and monetization are unproven publicly
    risk_category: product
    severity: medium
    likelihood: medium
    description: Spark is publicly marketed and priced, but adoption, attach, credit consumption, margin and differentiation are not public.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Request Spark adoption metrics, AI COGS, retention impact, roadmap, model-evaluation results and enterprise customer feedback.
  - risk_id: R-007
    risk_title: AI/privacy/subprocessor governance exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Productboard processes customer feedback and lists AI/analytics subprocessors including OpenAI, Google Vertex AI and MotherDuck, raising privacy, transfer and customer-control questions.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.G
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Review DPA, subprocessor contracts, AI data-use settings, model-training prohibitions, regional transfer assessments and enterprise security exceptions.
  - risk_id: R-008
    risk_title: Cloud and operational dependency on AWS us-east-1
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Public security materials state services/data are hosted in AWS us-east-1; concentration and resilience need verification.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.G
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Request architecture diagrams, disaster recovery tests, RTO/RPO, uptime history, SLAs, cloud spend commitments and regional/data-residency options.
  - risk_id: R-009
    risk_title: Team scaling and distributed engineering execution risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public hiring shows AI and enterprise engineering expansion across San Francisco and Prague/Czechia; execution quality and retention are not public.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
      - VII.G
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Request org chart, attrition, offer acceptance, engagement surveys, critical-role backfills and engineering productivity metrics.
  - risk_id: R-010
    risk_title: Legal/IP/regulatory clearance is incomplete on public sources
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public searches found no obvious CourtListener results and one patent application indicator, but counsel-grade litigation, trademark, patent, regulatory and insurance review is required.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.G
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Have counsel run full litigation/regulatory/IP searches, review insurance, material contracts, open-source use and data-protection correspondence.
