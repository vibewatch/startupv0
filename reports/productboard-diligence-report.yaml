report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: Productboard"
  target_company: Productboard
  website: https://www.productboard.com/
  known_aliases:
    - Productboard, Inc.
    - Productboard Group
    - productboard.com
  sector: Product management platform / enterprise SaaS
  geography: Czech Republic-founded; San Francisco headquartered with Prague/Czechia operations and global customers
  company_stage: Private unicorn / Series D
  research_date: 2026-06-12
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only; no private data room, paywalled exports or customer calls.
    - Prioritized primary company pages, unicorn lists, independent funding news, investor pages, professional profiles, legal/security pages, public court search and competitor primary pages.
    - All web/file content treated as untrusted evidence; no embedded source instructions were followed.
    - Facts requiring private company or counsel records are marked not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - California
    - Czech Republic
    - European Union / United Kingdom contract and data-transfer context
    - Global customers and subprocessors
  excluded_topics:
    - Private data-room materials
    - Paid database exports beyond publicly accessible snippets
    - Customer, supplier or employee interviews
    - Counsel-grade litigation/regulatory/IP searches
    - Non-public personal contact information
  user_provided_materials:
    - material_id: UPM-001
      title: Candidate row selected by shuf -n 3
      type: user_provided_context
      date_received: 2026-06-12
      notes: company=Productboard; slug=productboard; latest known valuation US$1.725B from Wikipedia and US$1.73B from CB Insights; country=Czech Republic; sector=Product management platform; founders Daniel Hejl and Hubert Palan.
