  - figure_id: F-012
    title: Risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of the full diligence risk register.
    purpose: Prioritize follow-up workstreams before relying on public evidence.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial statements and unit economics are opaque
          severity: high
          likelihood: high
          rationale: No audited financials, management accounts, gross margin, CAC, burn, runway, ARR bridge or cohort metrics were found publicly; secondary revenue estimates are not investment-grade.
          evidence_claim_ids: &a33
            - EC-005
            - EC-015
            - EC-023
          source_ids:
            - SRC-019
            - SRC-001
            - SRC-002
            - SRC-004
            - SRC-009
            - SRC-012
            - SRC-029
        - risk_id: R-002
          label: Latest public valuation is stale and market-cycle exposed
          severity: high
          likelihood: medium
          rationale: The $1.725B/$1.73B valuation is from February 2022 and may not reflect current private SaaS multiples or Productboard performance.
          evidence_claim_ids: &a34
            - EC-002
            - EC-003
            - EC-005
          source_ids:
            - SRC-014
            - SRC-016
            - SRC-017
            - SRC-019
        - risk_id: R-003
          label: Cap table, preferences and debt instruments are not public
          severity: high
          likelihood: high
          rationale: Public sources name major investors and total raised but not share counts, liquidation preferences, option pool, debt, warrants or investor rights.
          evidence_claim_ids: &a35
            - EC-001
            - EC-003
            - EC-004
          source_ids:
            - SRC-001
            - SRC-012
            - SRC-015
            - SRC-017
            - SRC-019
        - risk_id: R-004
          label: Customer concentration, retention and logo materiality are unknown
          severity: high
          likelihood: high
          rationale: Public logos and 6,000+ claims do not disclose ARR contribution, renewal status, churn, NRR or top-customer concentration.
          evidence_claim_ids: &a36
            - EC-009
            - EC-010
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-012
            - SRC-017
        - risk_id: R-005
          label: Crowded competitive landscape and platform bundling pressure
          severity: high
          likelihood: high
          rationale: Productboard faces full-suite product-management competitors and platform vendors such as Atlassian with distribution advantages.
          evidence_claim_ids: &a37
            - EC-014
            - EC-015
          source_ids:
            - SRC-021
            - SRC-022
            - SRC-023
            - SRC-024
            - SRC-025
            - SRC-026
            - SRC-027
            - SRC-028
            - SRC-001
            - SRC-002
            - SRC-004
            - SRC-009
