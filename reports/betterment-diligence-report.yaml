executive_summary:
  overall_assessment: "Eligible private-unicorn screen: public evidence supports Betterment as an active U.S./New York digital wealth company
    with CB Insights $1.30B last-known unicorn valuation and active website/regulatory records (EC-001, EC-002, EC-007, EC-025).
    Underwriting should focus on private financials, stale valuation/cap table, regulatory remediation, and customer/channel economics."
  investment_or_diligence_thesis: Betterment has credible public scale and brand/product breadth in digital wealth, employer retirement,
    advisor infrastructure, and cash/checking, but the investment case turns on whether net flows, realized fee yield, retention, compliance
    controls, and regulated/vendor dependencies support the 2021-era valuation (EC-002, EC-003, EC-009, EC-020).
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Sector/geography/model are supported by CB Insights, Betterment pages, and SEC regulatory descriptions.
      evidence_claim_ids:
        - EC-001
        - EC-007
        - EC-015
    - founder_claim_id: FC-004
      summary: Product breadth across retail investing, cash/checking, Betterment at Work, and Advisor Solutions is publicly verified.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
    - founder_claim_id: FC-006
      summary: Regulated-entity and partner-bank structure is disclosed in Betterment legal, IAPD, and product pages.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-006
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, revenue quality, burn, runway, and unit economics are not public.
    - risk_id: R-003
      summary: 2023 SEC order over TLH disclosures creates regulatory remediation and control diligence priority.
    - risk_id: R-002
      summary: The $1.30B valuation is stale and current cap table/preference stack is not public.
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue by SKU/channel, gross margin, burn, runway, and AUM/net-flow bridge
    - Current cap table, liquidation preferences, debt terms, investor ownership, 409A/secondary marks, and option ledger
    - Top customer/partner revenue concentration, retention, churn, and customer reference data
    - Regulatory remediation evidence, exam history, complaint/arbitration logs, and complete litigation docket search
    - Vendor/bank/clearing contracts, service levels, SOC/security evidence, insurance, and IP/USPTO verification
  recommended_next_steps:
    - Proceed only with data-room diligence; do not rely on 2021 valuation as current mark.
    - Prioritize CFO/cap-table review, SEC remediation review, and customer/channel economics before any investment memo.
    - Run counsel-led PACER/state/FINRA/USPTO searches and regulated-entity diligence.
    - Conduct customer/partner/vendor reference calls for employer, advisor, Apex, nbkc/program-bank, and Marcus-transfer cohorts.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: "Public evidence supports Betterment as an active financial-services unicorn with $1.30B last-known CB Insights valuation
      and company-claimed $70B+ AUM; audited financials, cap table, debt terms, revenue quality, and runway remain private-data-room
      requests. Evidence: EC-001, EC-002, EC-014, EC-015, EC-020."
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
      - FC-005
      - FC-007
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-013
      - EC-014
      - EC-015
      - EC-020
      - EC-025
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: "No public audited financial statements or management accounts were found; public proxies are AUM/customer metrics, regulatory AUM
          anchors, and pricing model evidence. Evidence: EC-002, EC-015, EC-020."
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Betterment claims 1M+ customers and $70B+ AUM, but audited revenue, margins, cash flows, backlog, and AR aging are not public.
            evidence_claim_ids:
              - EC-002
              - EC-020
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: SEC order provides a historical $33.8B regulatory AUM anchor, not GAAP revenue.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-001
        hidden_risks:
          - AUM growth can mask low realized fee yield or net-flow pressure.
          - Private financial quality may diverge from public scale claims.
        evidence_gaps:
          - Audited income statements, balance sheets, cash flows, footnotes, monthly management accounts, product/channel/geography
            revenue, backlog, and AR aging.
        follow_up_questions:
          - Provide audited financials and monthly management accounts for FY2023-FY2026 YTD.
          - Reconcile AUM, revenue, net flows, and customer definitions by channel.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-015
          - EC-020
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: "Public sources disclose pricing but not three-year projections, assumptions, capex, working capital, or external-financing
          assumptions. Evidence: EC-003, EC-020."
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: Pricing is public, so fee-yield scenarios can be modeled, but management projections and assumptions are private.
            evidence_claim_ids:
              - EC-003
              - EC-020
            risk_ids:
              - R-001
              - R-005
        hidden_risks:
          - Forecast risk is material because AUM-based revenue depends on markets, net flows, realized fee yield, and channel mix.
        evidence_gaps:
          - Quarterly forecasts, scenario cases, pricing assumptions, revenue by SKU/channel/customer type, capex, depreciation, working
            capital, and financing assumptions.
        follow_up_questions:
          - Provide base/downside/upside forecast model with assumptions and actual-vs-plan history.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-020
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: "Public cap-structure evidence is limited to investor associations, regulatory entities, and last-known valuation; shares,
          liquidation preferences, options, debt, and off-balance-sheet liabilities are not public. Evidence: EC-001, EC-013, EC-025."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights and investor pages support Bessemer, Menlo, and Anthemis signals, with Anthemis correcting the CB typo.
            evidence_claim_ids:
              - EC-001
              - EC-013
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: No public evidence of IPO, acquisition of Betterment, or shutdown was found; active website/regulatory records support eligibility.
            evidence_claim_ids:
              - EC-025
            risk_ids:
              - R-002
        hidden_risks:
          - The valuation is stale; preferences, debt facility terms, and dilution could materially affect common-equity value.
        evidence_gaps:
          - Current fully diluted cap table, share classes, investor ownership, option pool, warrants, notes, debt facilities, consent
            rights, and off-balance-sheet liabilities.
        follow_up_questions:
          - Provide current cap table and all financing/debt documents.
          - Confirm no pending IPO/M&A process or change-of-control restrictions.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-013
          - EC-025
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: "The 2021 financing/valuation headline and public regulatory/pricing sources are available, but tax positions, accounting policies,
          financing history detail, and current basis by investor are private. Evidence: EC-014, EC-020."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Betterment press headline and CB Insights row support a $160M growth-capital / $1.3B valuation event in 2021.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-002
        hidden_risks:
          - Revenue recognition for advisory, cash, checking, employer, and advisor channels may differ materially.
        evidence_gaps:
          - Tax positions, NOLs, revenue-recognition memo, financing history, investor bases, and debt schedules.
        follow_up_questions:
          - Provide tax position memo, revenue-recognition policy, financing history, and current debt/warrant schedule.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-014
          - EC-020
