risk_register:
  - risk_id: R-001
    risk_title: Private financial statements and revenue quality are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources show AUM, pricing, and regulatory signals but not audited revenue, margin, burn, profitability, CAC, retention,
      or cash runway.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Obtain audited financials, monthly management accounts, ARR/revenue bridge, gross margin, burn, runway,
      bank/debt statements, and KPI cohorts.
  - risk_id: R-002
    risk_title: Valuation is stale and current private mark is not observable
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $1.30B unicorn valuation is publicly anchored to 2021; current secondary marks, liquidation preferences, and dilution are
      not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request current 409A, cap table, option ledger, debt instruments, liquidation stack, recent
      secondary/primary marks, and investor consent rights.
  - risk_id: R-003
    risk_title: Regulatory compliance and disclosure controls require enhanced diligence
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: The 2023 SEC order over tax-loss harvesting disclosures shows a prior control failure in a core product area.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Review compliance policies, advertising/TLH approvals, remediation testing, code-change controls, exam
      history, and complaint/incident logs.
  - risk_id: R-004
    risk_title: Third-party bank, clearing, custody, and sweep dependencies
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Betterment relies on Betterment Securities, Apex Clearing, program banks, and nbkc bank for core customer experiences.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - VIII.F
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Review vendor contracts, concentration limits, termination rights, incident history, reconciliation
      controls, and disaster-recovery testing.
  - risk_id: R-005
    risk_title: Robo-advice pricing and distribution pressure
    risk_category: market
    severity: high
    likelihood: medium
    description: Betterment faces incumbents and fintechs with similar or lower headline advisory fees and broader banking/brokerage ecosystems.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request win/loss data, pricing elasticity, CAC/payback by channel, net flows, retention, and competitor benchmark pack.
  - risk_id: R-006
    risk_title: Customer concentration and retention are not publicly verifiable
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Aggregate customer count is public, but top customers, B2B accounts, revenue concentration, churn, and customer cohort
      economics are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request top customers by revenue/AUM/channel, contract values, renewals, churn, NPS/support metrics, and
      customer-reference permissions.
  - risk_id: R-007
    risk_title: Algorithmic tax, product, and crypto-adjacent roadmap risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Product differentiation includes tax technology and increasingly complex portfolios; SEC TLH history and crypto ETF products
      heighten governance needs.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review model governance, TLH logic, product QA, customer suitability, crypto disclosures, and roadmap risk committee materials.
  - risk_id: R-008
    risk_title: Management depth, headcount trend, compensation, and turnover are only partly public
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Public leadership and careers pages confirm active team presence, but full biographies, turnover, compensation, option plan,
      and functional headcount are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request org chart, headcount history, retention/turnover, executive agreements, compensation bands, equity
      plan, and regulated-personnel roster.
  - risk_id: R-009
    risk_title: Litigation, IP registration status, insurance, and material contracts require counsel diligence
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public review found SEC/regulatory records and company marks but not complete docket, USPTO assignment, insurance, or
      material-contract evidence.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
      - VIII.F
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Run PACER/state/FINRA arbitration searches; export USPTO/PTO records; review insurance schedules and material contracts.
  - risk_id: R-010
    risk_title: Partner migrations and acquisitions can create integration and retention risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Marcus Invest transfer and Makara acquisition are public signals of inorganic/partner-led expansion; migration economics and
      retention are private.
    impacted_chapter_ids:
      - III
      - VI
    impacted_section_ids:
      - III.B
      - VI.B
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request integration plans, migration consent/attrition data, customer support metrics, conversion
      economics, and post-close product performance.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and monthly management accounts
    why_it_matters: Needed to verify revenue quality, profitability, burn, runway, and accounting policies.
    suggested_source_or_request: Company CFO/accountant data room
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option ledger, debt/warrant/SAFE schedule, liquidation preferences
    why_it_matters: Stale valuation cannot be underwritten without ownership and preference stack.
    suggested_source_or_request: Corporate secretary/CFO financing package
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.B
    missing_information: Three-year projections with assumptions
    why_it_matters: Valuation depends on AUM growth, fee yield, CAC, margins, and market scenarios.
    suggested_source_or_request: Board-approved operating plan and model
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: SKU-level revenue, margin, roadmap, model governance, and incident history
    why_it_matters: Product breadth and tax/crypto features increase execution and regulatory risk.
    suggested_source_or_request: Product P&L, roadmap, model-risk committee materials, incident logs
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.A
    missing_information: Top customers by AUM/revenue and customer concentration
    why_it_matters: Aggregate customer count does not prove diversified revenue.
    suggested_source_or_request: Customer concentration schedule and reference list
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Vendor and supplier contracts, spend, SLAs, and concentration
    why_it_matters: Apex, banks, cloud/KYC/fraud vendors are operationally critical.
    suggested_source_or_request: Vendor contract schedule and SOC/control reports
    priority: high
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Competitive win/loss, net flows, market share, CAC payback
    why_it_matters: Public pricing shows fee pressure but not Betterment differentiation durability.
    suggested_source_or_request: GTM analytics and competitor benchmark pack
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: Sales force productivity, quota attainment, sales cycle, and marketing budget
    why_it_matters: B2B channel viability and CAC payback are not public.
    suggested_source_or_request: Sales/marketing dashboards and board plan
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D organization, engineering headcount, development spend, security reports
    why_it_matters: Automated advice requires robust technology, controls, and cybersecurity.
    suggested_source_or_request: CTO/CISO data-room pack
    priority: high
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount history, forecast, turnover, and compensation/equity plans
    why_it_matters: Team scale, retention, and dilution risks cannot be assessed publicly.
    suggested_source_or_request: HRIS exports, compensation plan, option ledger
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory exam letters, remediation evidence, complaint/arbitration logs
    why_it_matters: SEC TLH order creates need to verify current compliance posture.
    suggested_source_or_request: Legal/compliance data room
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation docket searches and counsel schedule
    why_it_matters: Public review is not exhaustive for pending suits or arbitrations.
    suggested_source_or_request: Counsel memo plus PACER/state/FINRA exports
    priority: high
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.D
    missing_information: USPTO trademark, patent, assignment, and open-source license verification
    why_it_matters: Company mark list is not equivalent to enforceable IP status.
    suggested_source_or_request: IP counsel schedule and USPTO/TSDR exports
    priority: medium
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies and claims/loss runs
    why_it_matters: Cyber, E&O, fiduciary, and broker-dealer exposures may be material.
    suggested_source_or_request: Insurance broker package and claims history
    priority: medium
