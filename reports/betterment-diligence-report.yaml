        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-003
          - EC-009
          - EC-021
          - EC-027
  - chapter_id: III
    title: Customer Information
    chapter_summary: "Aggregate customer and AUM claims are public, but top customers, B2B accounts, concentration, revenue by customer, and
      severed relationships are not publicly verifiable. Partner-bank and clearing dependencies are material. Evidence: EC-002, EC-005,
      EC-006, EC-017, EC-024."
    founder_claim_ids:
      - FC-003
      - FC-006
    evidence_claim_ids:
      - EC-002
      - EC-005
      - EC-006
      - EC-017
      - EC-021
      - EC-024
    risk_ids:
      - R-004
      - R-006
      - R-010
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: "Betterment publicly claims 1M+ customers but does not publish a top-15 customer list or application-by-customer purchase history.
          Evidence: EC-002, EC-024."
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
