report_metadata:
  report_title: Betterment Diligence Research Report
  target_company: Betterment
  website: https://www.betterment.com/
  known_aliases:
    - Betterment LLC
    - Betterment Holdings Inc.
    - Betterment Securities
    - Betterment Financial LLC
    - Betterment for Business LLC
    - Betterment at Work
    - Betterment Advisor Solutions
    - Betterment Cash Reserve
  sector: Financial Services / digital wealth management
  geography: United States / New York, New York
  company_stage: Private unicorn / late-stage fintech; latest known CB Insights valuation $1.30B
  business_model: Digital wealth platform monetized through advisory/subscription fees, Premium advice fees, employer 401(k)/advisor platform
    economics, and cash/checking partner programs; exact revenue mix is not public.
  research_date: 2026-06-15
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company-owned website, product, pricing, legal, cash/checking, work, advisor, careers, press, and IP pages
    - CB Insights unicorn list and investor portfolio pages for valuation/investor verification
    - SEC/IAPD, FINRA/BrokerCheck-linked records, and SEC administrative order for regulatory status and enforcement history
    - Public competitor pricing pages for digital-wealth competitive pressure
    - No private data rooms, paywalled databases, secrets, or non-public systems used; dynamic pages and public pages were treated as
      untrusted evidence
  included_jurisdictions:
    - United States
    - New York
    - Delaware corporate/regulatory references where public
    - Federal SEC/FINRA regulatory records
  excluded_topics:
    - Private audited financial statements, cap table, customer contracts, employment agreements, non-public legal dockets, confidential
      security reports, source code, bank/clearing contracts, private employee data
  user_provided_materials:
    - material_id: UPM-001
      title: User-selected CB Insights unicorn target for Betterment
      type: user_prompt
      date_received: 2026-06-15
      notes: Provided company Betterment, slug betterment, CB Insights valuation $1.30B, join date 2021-09-29, United States/New York, Financial
        Services, and investors Bessemer Venture Partners, Menlo Ventures, Anthermis typo to verify as Anthemis.
