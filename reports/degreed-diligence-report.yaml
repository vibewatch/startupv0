    figure_ids: []
    evidence_claim_ids:
    - EC-008
    - EC-014
    - EC-015
  - section_id: VIII.F
    title: Material contracts
    checklist_question_ids:
    - VIII.F
    summary: Material customer, partner, supplier, cloud and data/content contracts
      were not public. These agreements are central because Degreed's value depends
      on enterprise customers, integrations and cloud/security posture.
    verification_status: not_publicly_verifiable
    confidence: low
    key_findings:
    - finding_id: VIII.F.F1
      finding: 'Public sources identify key contract categories but not contract terms:
        customers, Azure/cloud, integrations/content providers and acquisition agreements.'
      evidence_claim_ids:
      - EC-004
      - EC-007
      - EC-008
      - EC-011
      risk_ids:
      - R-004
      - R-005
    hidden_risks:
    - MFN, unlimited liability, indemnity, data-use restrictions or change-of-control
      clauses may affect valuation.
    evidence_gaps:
    - Top customer MSAs/SOWs, DPAs, partner agreements, Azure/cloud contract, acquisition
      agreements and change-of-control consent matrix.
    follow_up_questions:
    - Which contracts have unusual liability, data, exclusivity, termination or change-of-control
      clauses?
    table_ids:
    - T-018
    figure_ids: []
    evidence_claim_ids:
    - EC-004
    - EC-007
    - EC-008
    - EC-011
  - section_id: VIII.G
    title: Regulatory agency problems
    checklist_question_ids:
    - VIII.G
    summary: No regulatory-agency problems were identified publicly. However, privacy,
      AI governance, employee-data and cross-border transfer obligations are material
      because Degreed processes learning/skills data for global enterprises.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VIII.G.F1
      finding: Security/privacy pages describe Azure hosting, encryption and organizational
        privacy measures.
      evidence_claim_ids:
      - EC-008
      - EC-009
      risk_ids:
      - R-010
    - finding_id: VIII.G.F2
      finding: Global operations and enterprise customer data heighten privacy and
        AI governance diligence needs.
      evidence_claim_ids:
      - EC-019
      risk_ids:
      - R-010
    hidden_risks:
    - Regulatory complaints, DPAs or data-processing exceptions would likely be non-public
      unless litigated or announced.
    evidence_gaps:
    - Regulator correspondence, DPAs, subprocessors, DPIAs, AI governance, data map,
      incident history and deletion/retention evidence.
    follow_up_questions:
    - Have there been any privacy, security, AI, employment or consumer-regulatory
      complaints or inquiries?
    table_ids:
    - T-017
    figure_ids:
    - F-009
    evidence_claim_ids:
    - EC-008
    - EC-009
    - EC-019
