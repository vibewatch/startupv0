    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: II.A.F1
      finding: The current homepage frames the product as AI-powered learning for
        always-on change.
      evidence_claim_ids:
      - EC-005
      risk_ids:
      - R-003
    - finding_id: II.A.F2
      finding: Product/pricing pages describe a skills-first platform and Maestro
        AI coaching/roleplay capabilities.
      evidence_claim_ids:
      - EC-006
      risk_ids:
      - R-003
    - finding_id: II.A.F3
      finding: Public product pages do not provide price points, SKU-level adoption
