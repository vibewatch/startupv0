chapters:
- chapter_id: I
  title: Financial Information
  chapter_summary: Degreed qualifies for a public-evidence private-unicorn screen
    through CB Insights and its 2021 Series D announcement, but virtually all operating
    financial metrics remain private. The core diligence issue is whether current
    ARR, retention, gross margin and burn can support or exceed the stale 2021 valuation.
  founder_claim_ids:
  - FC-001
  - FC-007
  evidence_claim_ids:
  - EC-001
  - EC-002
  - EC-003
  - EC-012
  - EC-013
  - EC-018
  - EC-020
  risk_ids:
  - R-001
  - R-009
  sections:
  - section_id: I.A
    title: Annual and quarterly financial information for the past three years
    checklist_question_ids:
    - I.A.1
    - I.A.2
    - I.A.3
    - I.A.4
    - I.A.5
    - I.A.6
    summary: No audited financial statements, income statements, balance sheets, cash-flow
      statements, ARR bridges or quarterly KPI packs were public. Company-published
      historical growth statements are positive but insufficient for financial diligence.
    verification_status: not_publicly_verifiable
    confidence: low
    key_findings:
    - finding_id: I.A.F1
      finding: Degreed disclosed historical growth indicators in 2021, including 76%
        compound annual revenue growth and 2020 active-user/team growth, but not audited
        financials.
      evidence_claim_ids:
      - EC-003
      risk_ids:
      - R-001
    - finding_id: I.A.F2
      finding: Public materials do not disclose ARR, gross margin, burn, cash balance,
        runway, bookings or revenue-recognition policies.
      evidence_claim_ids:
      - EC-018
      risk_ids:
      - R-001
    hidden_risks:
    - Revenue growth may have slowed after the 2021 funding peak.
    - Implementation services or content/partner pass-throughs could dilute gross
      margin.
    evidence_gaps:
    - Audited financial statements and management KPI decks for FY2023-FY2025.
    - ARR, NRR/GRR, logo retention, gross margin and burn bridge by quarter.
    follow_up_questions:
    - What is current ARR, ARR growth, burn multiple and cash runway?
    - How are active learners and revenue recognized across bundles and services?
    table_ids:
    - T-002
    figure_ids:
    - F-002
    evidence_claim_ids:
    - EC-003
    - EC-018
