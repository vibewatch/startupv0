executive_summary:
  overall_assessment: 'Degreed is eligible for a public-evidence unicorn diligence
    report: CB Insights and Degreed''s own Series D announcement support a US$1.4B
    private valuation in April 2021, and current public pages/job profiles support
    ongoing operations. The investment case is plausible but unproven without private
    ARR, retention, margin, customer concentration, AI efficacy and security/legal
    artifacts.'
  investment_or_diligence_thesis: Track as a credible enterprise-learning unicorn
    with large-logo evidence, broad integrations and AI/skills positioning, but require
    a current valuation reset analysis against post-2021 SaaS multiples and rigorous
    private-data verification before any investment decision.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: US$1.4B unicorn status in April 2021 is corroborated by CB Insights and
      Degreed's Series D release.
    evidence_claim_ids:
