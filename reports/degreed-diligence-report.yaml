  - founder_claim_id: FC-005
    summary: Security/privacy pages publish enterprise SaaS controls such as Azure
      hosting, TLS and AES-256.
    evidence_claim_ids:
    - EC-008
    - EC-009
  biggest_risks:
  - risk_id: R-001
    summary: Core financial metrics are not public; ARR, margin, burn, runway and
      NRR are decisive.
  - risk_id: R-009
    summary: The public unicorn valuation dates to 2021 and may be stale in the current
