executive_summary:
  overall_assessment: Unqork appears to be an active private software unicorn with credible public evidence for its 2020 US$207M Series C, US$2B valuation, no-code platform positioning and selected customer-logo signals. The core diligence issue is whether 2020 valuation and logo evidence translate into current durable ARR, retention, software margins and competitive differentiation.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. Public evidence supports a real enterprise no-code vendor with high-profile historic backing, but investment quality depends on current ARR, retention, customer contracts, implementation economics, competitive win/loss, workforce stability and cap-table terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Unqork is an active private unicorn with a latest public unicorn-list valuation around US$2.0B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Unqork operates an enterprise no-code application platform.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Public sources identify enterprise and public-sector customers such as Goldman Sachs, Liberty Mutual and major cities.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Revenue, ARR, gross margin, burn, cash/debt, retention and forecast quality are not public.
    - risk_id: R-002
      summary: The US$2B valuation is anchored to 2020 financing/public lists; current valuation, preferences, dilution and debt are unknown.
    - risk_id: R-003
      summary: No-code product claims are public, but deployment depth, maintainability, security, margins and roadmap quality need validation.
  key_evidence_gaps:
    - Audited financials, management accounts, ARR/bookings, gross margin, cash/debt, tax position and forecast bridge.
    - Current cap table, option pool, liquidation preferences, debt, warrants and investor rights.
    - Top-customer revenue, renewal cohorts, churn/NRR, backlog, customer references and concentration by account.
    - Security, privacy, IP, litigation, regulatory, insurance and material-contract artifacts reviewed by counsel.
    - HRIS headcount, attrition, compensation, equity plan, sales productivity and operating-plan support.
  recommended_next_steps:
    - Run financial-quality diligence before relying on headline valuation.
    - Request customer cohort files, top-account contracts and independent references.
    - Benchmark buyer references and pricing against direct competitors.
    - Have counsel review IP, litigation, privacy/security, regulatory and material-contract materials.
