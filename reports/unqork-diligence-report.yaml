risk_register:
  - risk_id: R-001
    risk_title: Financial quality and ARR durability are opaque
    risk_category: financial
    severity: high
    likelihood: high
    description: Revenue, ARR, gross margin, burn, cash/debt, retention and forecast quality are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a82
    mitigation_or_diligence_request: Request financial statements, KPI pack, ARR bridge, retention cohorts and forecast support.
  - risk_id: R-002
    risk_title: Capital structure and 2020 valuation may be stale
    risk_category: financing
    severity: high
    likelihood: medium
    description: The US$2B valuation is anchored to 2020 financing/public lists; current valuation, preferences, dilution and debt are unknown.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a83
    mitigation_or_diligence_request: Request current cap table, financing documents and valuation bridge.
  - risk_id: R-003
    risk_title: Product adoption and platform defensibility need proof
    risk_category: product
    severity: medium
    likelihood: medium
    description: No-code product claims are public, but deployment depth, maintainability, security, margins and roadmap quality need validation.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids: *a84
    mitigation_or_diligence_request: Review product telemetry, architecture, implementation data, roadmap and security artifacts.
  - risk_id: R-004
    risk_title: Customer concentration and logo currency are unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public customer examples may be stale and do not disclose current ARR, contract scope, churn or concentration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a85
    mitigation_or_diligence_request: Request current customer list, top contracts, churn/NRR, backlog and references.
  - risk_id: R-005
    risk_title: No-code/low-code competitive pressure is intense
    risk_category: market
    severity: medium
    likelihood: high
    description: Unqork competes with specialized low-code/no-code vendors, broad workflow platforms and internal engineering teams.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids: *a86
    mitigation_or_diligence_request: Run buyer-reference, win/loss and pricing benchmarking.
  - risk_id: R-006
    risk_title: Enterprise implementation and partner dependencies may constrain scaling
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Enterprise no-code outcomes may depend on implementation partners, cloud infrastructure and customer change management.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.B
      - III.E
      - VI.A
      - VIII.F
    evidence_claim_ids: *a87
    mitigation_or_diligence_request: Review supplier, partner, implementation and SLA contracts.
  - risk_id: R-007
    risk_title: Management, workforce and turnover data are incomplete
    risk_category: team
    severity: medium
    likelihood: medium
    description: Founder/CEO is public, but full org chart, attrition, compensation, succession and employee-relations data are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.G
    evidence_claim_ids: *a88
    mitigation_or_diligence_request: Request org chart, HRIS, attrition, compensation, equity plan and references.
  - risk_id: R-008
    risk_title: Legal/regulatory exposure requires counsel-grade searches
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: High-level public search did not establish direct material litigation, but this is not sufficient for legal diligence.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.G
    evidence_claim_ids: *a89
    mitigation_or_diligence_request: Run docket, IP, privacy/security, employment, insurance and regulatory searches with counsel.
