report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: Unqork"
  target_company: Unqork
  website: https://www.unqork.com/
  known_aliases:
    - Unqork, Inc.
    - Unqork
  sector: Insurance / enterprise no-code application platform / regulated-industry workflow software
  geography: United States / New York, New York
  company_stage: Private unicorn / venture-backed growth-stage company
  research_date: 2026-05-25
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built existing-report exclusion list from reports/*-diligence-report.yaml.
    - Selected target from CB Insights unicorn list after excluding already-covered slugs and replacing an ineligible bankrupt candidate.
    - "Used public web research only: CB Insights list rows, company pages, independent news snippets, market pages and public search results."
    - Treated search snippets and company-authored pages as public evidence but downgraded confidence when the underlying source was stale, marketing-oriented or not independently confirmed.
    - Marked financial statements, cap table, contracts, customer concentration, HR files and counsel-grade legal searches as not_publicly_verifiable when unavailable.
  included_jurisdictions:
    - United States
    - New York
    - Regulated insurance, financial-services, healthcare and public-sector customer contexts
  excluded_topics:
    - Private financial statements, board materials, cap table, debt instruments and shareholder agreements
    - Customer, supplier, employee, counsel and auditor interviews
    - Paid database exports and non-public court, HR, security, tax or regulatory records
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn diligence workflow request and CB Insights unicorn-list row
      type: workflow_request
      date_received: 2026-05-25
      notes: No pitch deck, founder responses, data room or private financials were provided.
