        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: FY21-FY23 public reports show revenue growth but widening losses; 2025-2026 public evidence shifts to salary
          delays, asset sales and CIRP. Quarterly statements, cash flows, AR aging and management accounts are not
          public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Revenue scale grew from INR 49.32 crore in FY21 to INR 603 crore in FY23 while FY23 net loss reached INR 917
              crore.
            evidence_claim_ids:
              - EC-004
              - EC-005
              - EC-006
            risk_ids:
              - R-002
          - finding_id: I.A-F2
            finding: The current financial story is insolvency/restructuring rather than growth financing.
            evidence_claim_ids:
              - EC-009
              - EC-010
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Reported salary delays and CIRP suggest unpaid liabilities may exceed public financial anchors.
        evidence_gaps:
          - Audited consolidated FY21-FY25 financials; cash/burn/runway; AR aging; inventory; payables; employee/vendor
            claims; tax/auditor notes.
        follow_up_questions:
          - Provide three years of audited and management accounts, YTD financials, cash runway, claims aging and
            restructuring budget.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-006
          - EC-009
          - EC-010
