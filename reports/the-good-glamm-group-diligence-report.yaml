  - risk_id: R-013
    risk_title: Leadership and retention disruption
    risk_category: team
    severity: high
    likelihood: high
    description: Cofounder role changes, board exits, layoffs and salary delays increase retention and operational continuity risk.
    impacted_chapter_ids:
