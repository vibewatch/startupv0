          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public forward financial model was found. Any projection must be reset around CIRP, asset sales, creditor
          recoveries and retained-brand economics.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: Public growth history cannot support projections without restructuring assumptions.
            evidence_claim_ids:
              - EC-006
              - EC-009
              - EC-010
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Legacy IPO/growth assumptions may be obsolete under CIRP.
        evidence_gaps:
          - Three-year projection model by retained/sold brand, creditor recovery waterfall, working capital, capex,
            taxes and downside cases.
        follow_up_questions:
          - Provide board/RP-approved forecast, asset-sale waterfall, budget-vs-actuals and going-concern assessment.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-009
          - EC-010
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify investors, bridge financing, lenders enforcing brand charges and CIRP, but not share
          counts, preferences, option pool, debt terms or creditor priority.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: The $1.2B-$1.26B valuation anchors are historical and likely stale given lender enforcement/CIRP.
