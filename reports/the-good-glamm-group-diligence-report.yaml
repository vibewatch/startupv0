    impacted_section_ids:
      - VII.B
      - VII.C
      - VII.G
    evidence_claim_ids: *a13
    mitigation_or_diligence_request: Request org chart, retention plan, employment agreements, unpaid compensation, ESOP and key-person continuity plan.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited consolidated FY21-FY25 financials, cash runway, AR/AP aging and claims aging.
    why_it_matters: Determines solvency and recoveries.
    suggested_source_or_request: Company/RP data room and audited filings.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preference stack, secured debt, charge documents and creditor priority.
    why_it_matters: Equity value may be wiped out by creditor claims.
    suggested_source_or_request: Company counsel, RP and lenders.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Current ownership, SKUs, inventory, gross margin and product-liability status by brand.
    why_it_matters: Asset-sale value depends on what is actually owned and operational.
    suggested_source_or_request: Brand data rooms and sale agreements.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Top customers/channels, cohorts, churn, returns and revenue concentration.
    why_it_matters: Public audience metrics do not prove profitable demand.
    suggested_source_or_request: CRM, marketplace dashboards and finance system exports.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top suppliers, payables, manufacturing agreements and quality records.
    why_it_matters: Supplier disruption and claims could impair operations.
    suggested_source_or_request: Procurement/AP schedules and manufacturing contracts.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Market share, price benchmarking and win/loss data.
    why_it_matters: Distressed brands may lose ground to better-capitalized competitors.
    suggested_source_or_request: Third-party market datasets and internal analytics.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.A
    missing_information: CAC, ROAS, channel mix, consent/data rights and media conversion.
    why_it_matters: Validates or disproves content-to-commerce thesis.
    suggested_source_or_request: Marketing analytics, ad accounts, CRM and data-processing agreements.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D org, roadmap, product QA/testing, product claims and incident history.
    why_it_matters: Product and regulatory liabilities may transfer with brands.
    suggested_source_or_request: Product/QA/regulatory data room.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount, unpaid salaries, severance, statutory dues and retention plan.
    why_it_matters: Employee claims and key-person loss can disrupt operations and sales.
    suggested_source_or_request: HRIS/payroll/RP claims schedule.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: NCLT orders, CIRP public announcements, claim list, default notices and legal schedule.
    why_it_matters: Defines formal insolvency status and recoveries.
    suggested_source_or_request: RP/counsel-certified legal data room.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Trademark/IP assignments, domain control and lien releases for each brand/media asset.
    why_it_matters: Asset buyers need clean title.
    suggested_source_or_request: IP India/WIPO extracts and assignment documents.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies and claims/lapse history.
    why_it_matters: Potential recovery for employee, consumer, cyber or product claims.
    suggested_source_or_request: Insurance schedule from CFO/RP.
    priority: medium
