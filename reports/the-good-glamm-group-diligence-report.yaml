      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-009
      - EC-010
      - EC-021
      - EC-024
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-007
    sections:
