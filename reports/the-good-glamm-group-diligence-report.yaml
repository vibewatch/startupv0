risk_register:
  - risk_id: R-001
    risk_title: CIRP and lender-led breakup
    risk_category: financing
    severity: critical
    likelihood: high
    description: Official CIRP portal and lender-led brand-sale reporting indicate severe going-concern impairment and
      creditor-control risk.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.A
      - I.C
      - VIII.A
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Review NCLT docket, CIRP public announcements, claim schedule, security documents,
      moratorium status and resolution plan.
  - risk_id: R-002
    risk_title: Unsustainable losses and burn
    risk_category: financial
    severity: critical
    likelihood: high
    description: Reported FY23 loss of INR 917 crore against INR 603 crore operating revenue indicates major negative economics.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request audited FY21-FY25 financials, cash bridge, unit economics, working capital and budget-vs-actuals.
  - risk_id: R-003
    risk_title: Liquidity, salary and vendor dues
    risk_category: operational
    severity: high
    likelihood: high
    description: Public reporting cites salary delays, cash crunch and restitution fund for unpaid dues.
    impacted_chapter_ids:
      - I
      - VII
      - VIII
    impacted_section_ids:
      - I.C
      - VII.F
      - VIII.F
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Obtain creditor aging, employee dues, vendor claims, payroll settlements, priority
      claims and related-party payables.
  - risk_id: R-004
    risk_title: Portfolio fragmentation and asset-sale uncertainty
    risk_category: product
    severity: high
    likelihood: high
    description: Multiple brands/media assets were sold, bought back or put up for sale, undermining the house-of-brands thesis.
    impacted_chapter_ids:
      - II
      - V
    impacted_section_ids:
      - II.A
      - V.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Reconcile current legal ownership, asset-sale status, retained liabilities, domain/IP
      control and transition-service obligations.
  - risk_id: R-005
    risk_title: Customer, cohort and channel opacity
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public sources disclose aggregate customer/audience metrics but not revenue concentration, churn, repeat
      purchase or channel mix.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request top customer/channel schedules, cohort retention, CAC, ROAS, marketplace data,
      NRR/repeat purchase and complaints.
  - risk_id: R-006
    risk_title: Acquisition integration failure
    risk_category: operational
    severity: high
    likelihood: high
    description: Sirona buyback, ScoopWhoop sale discount and breakup suggest acquisitions did not create durable group value.
    impacted_chapter_ids:
      - II
      - III
    impacted_section_ids:
      - II.A
      - III.B
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Review acquisition agreements, earnouts, impairment tests, synergy tracking, founder
      retention and integration KPIs.
  - risk_id: R-007
    risk_title: Governance and investor confidence erosion
    risk_category: team
    severity: high
    likelihood: medium
    description: Public board/investor representative exits occurred during cash crunch and financing uncertainty.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - VII.C
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request board minutes, director resignations, investor communications, consent rights and conflict disclosures.
  - risk_id: R-008
    risk_title: Intense Indian beauty and personal-care competition
    risk_category: market
    severity: high
    likelihood: medium
    description: Nykaa, Honasa/Mamaearth, SUGAR, Purplle, Plum and Minimalist overlap on categories and channels.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Benchmark price, gross margin, market share, traffic, repeat purchase, channel margins
      and brand equity against competitors.
  - risk_id: R-009
    risk_title: Product/channel continuity risk
    risk_category: product
    severity: high
    likelihood: high
    description: GoodGlamm/MyGlamm web presence now points to CIRP, while some brand domains are active and others appear impaired.
    impacted_chapter_ids:
      - II
      - V
    impacted_section_ids:
      - II.A
      - V.C
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Verify domain control, ecommerce operations, inventory availability, marketplace
      status, customer support and refunds.
  - risk_id: R-010
    risk_title: Legal/default and insolvency-claims exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Default notices, CIRP claims and NCLT process can create buyer-liability and recovery uncertainty.
    impacted_chapter_ids:
