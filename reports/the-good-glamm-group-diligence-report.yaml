report_metadata:
  report_title: The Good Glamm Group Diligence Research Report
  target_company: The Good Glamm Group
  website: https://www.goodglamm.com/
  known_aliases:
    - Good Glamm Group
    - MyGlamm
    - Sanghvi Beauty and Technologies Private Limited
    - Sanghvi Beauty & Technologies Private Limited
  sector: Consumer & Retail / beauty, personal care and content-to-commerce
  geography: India; New Delhi public tracker location; operations and brands primarily India-focused
  company_stage: Private unicorn tracker entry; distressed/CIRP observed
  research_date: 2026-06-07
  analyst: GitHub Copilot CLI using startup-diligence-research skill
  report_version: "1.0"
  currency: USD and INR
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source research using CB Insights tracker, company/brand websites, Entrackr, Inc42 and competitor public
      websites.
    - Focused on eligibility, financing, financial distress, brand exits, CIRP, products, customers, competition, GTM,
      personnel and legal/IP gaps.
    - No private data room, paywall bypassing, management interviews, customer calls or non-public systems were used.
  included_jurisdictions:
    - India
    - Public global websites for brands/competitors
  excluded_topics:
    - No private financials, cap table, debt instruments or CIRP claim downloads
    - No paywall bypassing
    - No personal creditor/employee details
    - No legal, tax or investment advice
  user_provided_materials:
    - material_id: UP-001
      title: "Assignment selection note: CB Insights tracker fetched 2026-06-07 lists The Good Glamm Group at $1.20B"
      type: assignment_context
      date_received: 2026-06-07
      notes: Used only as scope context; public CB Insights tracker was separately fetched.
