executive_summary:
  overall_assessment: "Illumio is supportable from public evidence as an active private unicorn candidate with a fetched CB Insights valuation of $2.75B and public product/customer signals. The diligence posture is evidence-backed but gap-heavy: financing and positioning are visible, while audited financials, current cap table, customer concentration, pricing, retention, supplier dependencies and legal/IP schedules are not publicly verifiable."
  investment_or_diligence_thesis: The diligence question is whether Illumio's public Cybersecurity / breach containment and Zero Trust segmentation positioning converts into durable, profitable growth at a valuation that still clears current market and preference-stack risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Illumio appears on the fetched CB Insights private unicorn list at $2.75B.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Illumio has a public product/platform narrative.
      evidence_claim_ids:
        - EC-004
        - EC-011
    - founder_claim_id: FC-003
      summary: Illumio has public customer, partner or GTM traction signals.
      evidence_claim_ids:
        - EC-005
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Opaque financial statements and current valuation mark
    - risk_id: R-002
      summary: Crowded microsegmentation and security-suite competition
    - risk_id: R-003
      summary: Undisclosed customer concentration and implementation depth
  key_evidence_gaps:
    - Audited/management financials, KPI definitions and cash runway
    - Current cap table, preferences, debt, investor rights and current valuation mark
    - Customer concentration, usage, retention/churn and contract economics
    - Supplier, partner, infrastructure and channel concentration
    - Legal, IP, regulatory, insurance and material-contract schedules
  recommended_next_steps:
    - Open finance and cap-table data rooms before relying on public valuation.
    - Reconcile public customer/partner claims to revenue, usage, margin and retention data.
    - Review product roadmap, technical evidence, security controls and key dependencies.
    - Run customer/reference and win/loss diligence in the most material segments.
    - Have counsel review litigation, regulatory, IP, insurance and material contracts.
