    - Facts unavailable in public sources are marked not_publicly_verifiable rather than inferred.
  included_jurisdictions:
    - United States
    - United States federal/state public-source review where applicable
    - Global customer and partner markets where publicly referenced
  excluded_topics:
    - Non-public data rooms
    - Customer calls
    - Supplier calls
    - Paid database exports
    - Legal advice or counsel-grade docket searches
    - Private personal contact data
  user_provided_materials: []
