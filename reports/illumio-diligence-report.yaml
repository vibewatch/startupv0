limitations:
  - limitation_id: L-001
    description: This report uses public web sources only; no company data room, customer calls, supplier calls, counsel work product or paid database exports were available.
    impact: Financial quality, cap table, contracts, customer concentration, litigation and regulatory conclusions remain provisional.
    mitigation: Treat findings as a public-source screen and request the listed data-room materials before investment decisions.
  - limitation_id: L-002
    description: Some company and third-party HTTPS pages were blocked by the environment proxy or rate-limited by text-reader tooling, so public search-result excerpts were used for several evidence items.
    impact: Search-result snippets are lower reliability than full primary documents and are marked accordingly.
    mitigation: Refresh source fetches manually or through approved research tools during formal diligence.
  - limitation_id: L-003
    description: No public source review can conclusively prove absence of confidential IPO, acquisition, shutdown, litigation or regulatory events.
    impact: Eligibility and legal conclusions are partially verified rather than absolute.
    mitigation: Confirm corporate status, financing events and legal matters directly with company counsel.
