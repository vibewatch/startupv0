risk_register:
  - risk_id: R-001
    risk_title: Credit, liquidity and regulatory-capital data gap
    risk_category: financial
    severity: high
    likelihood: high
    description: Zopa's regulated credit/banking model cannot be evaluated without loan-book performance, provisions, capital, liquidity and funding data.
    impacted_chapter_ids: [I, III, VIII]
    impacted_section_ids: [I.A, III.A, VIII.A]
    evidence_claim_ids: [EC-004, EC-008, EC-009]
    mitigation_or_diligence_request: Request loan tape, arrears/defaults, vintage curves, capital reports, liquidity stress tests, funding facilities and regulator correspondence.
  - risk_id: R-002
    risk_title: Stale public unicorn valuation
    risk_category: financing
    severity: high
    likelihood: medium
    description: The public $1B valuation date is 2021 and may not reflect current economics, preferences or market conditions.
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.A, I.B]
    evidence_claim_ids: [EC-001, EC-002, EC-009]
    mitigation_or_diligence_request: Obtain current valuation support, cap table, preference stack, secondary transactions and debt terms.
  - risk_id: R-003
    risk_title: Competitive pressure in consumer finance
    risk_category: market
    severity: medium
    likelihood: high
    description: Zopa competes with fintech lenders, banks and credit providers where funding cost, CAC and underwriting are decisive.
    impacted_chapter_ids: [IV, V]
    impacted_section_ids: [IV.A, IV.B, V.A]
    evidence_claim_ids: [EC-005, EC-006]
    mitigation_or_diligence_request: Benchmark CAC, approval rates, cost of funds, risk-adjusted margin and win/loss against direct competitors.
  - risk_id: R-004
    risk_title: Product and model governance complexity
    risk_category: product
    severity: high
    likelihood: medium
    description: Broad consumer-credit and banking products require robust underwriting, affordability, fraud, conduct and operational-resilience controls.
    impacted_chapter_ids: [II, IV, VI]
    impacted_section_ids: [II.A, II.B, IV.B, VI.A]
    evidence_claim_ids: [EC-003, EC-007, EC-008, EC-009]
    mitigation_or_diligence_request: Review model inventory, validation reports, conduct testing, complaints, incidents and operational-resilience evidence.
  - risk_id: R-005
    risk_title: Customer and partner concentration unknown
    risk_category: customer
    severity: medium
    likelihood: medium
    description: Public sources do not disclose cohort economics or partner origination concentration.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, III.B, V.A, V.B]
    evidence_claim_ids: [EC-003, EC-004, EC-009]
    mitigation_or_diligence_request: Request active-customer cohorts, product cross-sell, partner volume and contract concentration.
  - risk_id: R-006
    risk_title: Management and technical-resourcing gap
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Public source set does not verify leadership depth, engineering capacity, compliance staffing or attrition.
    impacted_chapter_ids: [VI, VII]
    impacted_section_ids: [VI.A, VI.B, VII.A, VII.B]
    evidence_claim_ids: [EC-009, EC-010]
    mitigation_or_diligence_request: Request management bios, HRIS export, engineering roadmap, security reports and key-person retention materials.
  - risk_id: R-007
    risk_title: Regulatory and conduct exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: A PRA/FCA-regulated consumer-finance platform can face conduct, complaints, affordability, capital or enforcement risk not visible on company pages.
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.A, VIII.B]
    evidence_claim_ids: [EC-004, EC-008, EC-009]
    mitigation_or_diligence_request: Conduct direct FCA/PRA, complaints, enforcement, legal and compliance diligence.
