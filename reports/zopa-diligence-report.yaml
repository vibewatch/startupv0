report_metadata:
  report_title: Zopa Startup Diligence Report
  target_company: Zopa
  website: https://www.zopa.com/
  known_aliases:
    - Zopa
    - Zopa Bank Limited
    - Zopa Group PLC
  sector: Consumer fintech, digital banking, lending, savings, credit cards, car finance and embedded finance
  geography: United Kingdom, headquartered in London
  company_stage: Private unicorn / regulated consumer-finance and digital-banking company
  research_date: 2026-05-19
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD for unicorn-list valuation and fundraising; GBP for UK customer products where applicable
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the exclusion list from existing reports, used public unicorn-list sources, and randomly selected Zopa from uncovered candidates.
    - Prioritized CB Insights for unicorn status and financing metadata, and Zopa-owned pages for products, customer claims and regulatory statements.
    - Treated company-owned operating claims as public assertions unless independently corroborated by a regulator or market database.
    - No private financial model, data room, customer references, contracts, loan tape, cap table, compliance file or management interview was available.
  included_jurisdictions:
    - United Kingdom
  excluded_topics:
    - Private audited financials, regulatory correspondence, loan-book performance, arrears, provisions, warehouse funding, customer contracts, board materials and cap-table documents were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-19
      notes: No company materials beyond public sources were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Zopa is listed as a private unicorn with a latest known valuation of approximately $1B.
    claim_source: CB Insights unicorn list
    claim_date: 2021-10-19
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.A, I.B]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001]
    contradiction_summary: null
    diligence_follow_up:
      - Request primary financing documents, current 409A or fair-value support, and any subsequent secondary or down-round transactions.
  - founder_claim_id: FC-002
    claim_text: Zopa remains alive and privately financed, with more than $1B of total capital raised according to CB Insights.
    claim_source: CB Insights company profile
    claim_date: null
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.A, I.B]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-002]
    contradiction_summary: Public source confirms stage and total raised, but not current cash balance, valuation, ownership or debt terms.
    diligence_follow_up:
      - Request cap table, debt facilities, liquidity runway, regulatory capital position and financing covenants.
  - founder_claim_id: FC-003
    claim_text: Zopa publicly markets an active consumer banking and credit product suite.
    claim_source: Zopa website
    claim_date: null
    mapped_chapter_ids: [II, V]
    mapped_section_ids: [II.A, V.A]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-003]
    contradiction_summary: null
    diligence_follow_up:
      - Request product-level P&L, approval rates, loss curves, unit economics and compliance monitoring by product.
  - founder_claim_id: FC-004
    claim_text: Zopa reports more than 1.5 million customers and UK regulatory authorization.
    claim_source: Zopa website
    claim_date: null
    mapped_chapter_ids: [III, VIII]
    mapped_section_ids: [III.A, VIII.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-004]
    contradiction_summary: Customer count is company-published; regulatory statement is public, but the source set did not include direct regulator-register extracts.
    diligence_follow_up:
      - Request customer cohort bridge, complaints data, arrears/default metrics, regulatory correspondence and capital adequacy materials.
  - founder_claim_id: FC-005
    claim_text: Zopa competes in digital lending and consumer finance against other fintech lenders and credit providers.
    claim_source: CB Insights competitor list and Zopa product pages
    claim_date: null
    mapped_chapter_ids: [IV]
    mapped_section_ids: [IV.A, IV.B]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-005, EC-006]
    contradiction_summary: Public competitor lists do not disclose win/loss, CAC, approval quality, pricing discipline or loan-book economics.
    diligence_follow_up:
      - Request win/loss analysis, channel CAC, pricing tests, credit-box changes and competitor benchmark data.
executive_summary:
  overall_assessment: Zopa appears to be an active UK private unicorn based on CB Insights, company-owned product pages and public customer/regulatory statements. The investability question remains unresolved because the most material banking and lending diligence items--loan-book quality, loss reserves, funding costs, regulatory capital, liquidity, revenue quality and ownership economics--are not public.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A viable thesis depends on proving that Zopa can generate durable, risk-adjusted returns across lending, cards, savings and embedded finance while managing bank-regulatory, credit-cycle and funding-liquidity exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Zopa as a $1B unicorn joined on 2021-10-19.
      evidence_claim_ids: [EC-001]
    - founder_claim_id: FC-003
      summary: Zopa's site shows active current-account, loan, credit-card, car-finance, savings, ISA, investing and partnership products.
      evidence_claim_ids: [EC-003]
    - founder_claim_id: FC-004
      summary: Zopa publicly states it is PRA-authorized/FCA- and PRA-regulated and trusted by over 1.5 million customers.
      evidence_claim_ids: [EC-004]
  biggest_risks:
    - risk_id: R-001
      summary: Loan-book credit quality, loss provisions, liquidity and regulatory capital are not public.
    - risk_id: R-002
      summary: Headline unicorn valuation is stale without current financing, cap-table and unit-economic support.
    - risk_id: R-003
      summary: Consumer-finance competition and macro credit cycles may compress margins or increase losses.
  key_evidence_gaps:
    - Audited financials, regulatory capital reports, loan tape, arrears/defaults, charge-offs, funding costs and liquidity runway.
    - Current cap table, preference stack, debt facilities, warehouse lines, covenants, option pool and 409A/fair-value history.
    - Customer cohorts, product-level economics, complaints, fraud, affordability checks and conduct-risk findings.
    - B2B partnership contracts, concentration, termination rights and embedded-lending performance.
  recommended_next_steps:
    - Run banking/credit diligence before relying on unicorn-list valuation.
    - Request regulator-facing materials, loan-book analytics, credit policy history, liquidity stress tests and capital forecasts.
    - Conduct customer, partner, legal, compliance, cyber and model-risk diligence with specialist reviewers.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources support Zopa's unicorn status and historical fundraising, but core financial statements, bank capital, credit metrics, debt and valuation support require private diligence.
    founder_claim_ids: [FC-001, FC-002]
    evidence_claim_ids: [EC-001, EC-002, EC-009]
    risk_ids: [R-001, R-002]
    sections:
      - section_id: I.A
        title: Financial performance and valuation anchors
        checklist_question_ids: [I.A, I.B]
        summary: CB Insights gives a $1B valuation and $1.048B total raised, but revenue is not disclosed in the public profile and audited financials were unavailable.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: Public valuation and total-raised anchors exist, but profitability, credit losses and cash runway are not publicly verifiable.
            evidence_claim_ids: [EC-001, EC-002, EC-009]
            risk_ids: [R-001, R-002]
        hidden_risks:
          - Lending losses, deposit funding costs or capital requirements could make headline growth uneconomic.
        evidence_gaps:
          - Audited financial statements, loan-book KPIs, cash, debt, capital ratios, funding facilities and budget-to-actuals.
        follow_up_questions:
          - Provide audited financials, monthly management accounts, loan tape, arrears/default metrics, liquidity runway and regulatory capital forecasts.
        table_ids: [T-001]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-001, EC-002, EC-009]
      - section_id: I.B
        title: Capital structure and financing quality
        checklist_question_ids: [I.C]
        summary: Public investor and funding metadata do not reveal ownership, preferences, debt seniority, warrants or warehouse-funding economics.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: CB Insights identifies investors and latest funding stage, but not the economic terms that determine common-equity value.
            evidence_claim_ids: [EC-001, EC-002]
            risk_ids: [R-002]
        hidden_risks:
          - Preference stack, structured debt, regulatory capital instruments or secondary sales may materially change effective valuation.
        evidence_gaps:
          - Fully diluted cap table, debt schedule, warehouse facilities, option plan, preference stack and shareholder agreements.
        follow_up_questions:
          - Provide capitalization, debt and financing documents with liquidation preferences, covenants and change-of-control terms.
        table_ids: [T-002]
        figure_ids: []
        evidence_claim_ids: [EC-001, EC-002, EC-009]
  - chapter_id: II
    title: Products
    chapter_summary: Zopa has a broad public product suite spanning consumer banking, credit and savings; product-level economics, performance and compliance controls remain private.
    founder_claim_ids: [FC-003]
    evidence_claim_ids: [EC-003, EC-004]
    risk_ids: [R-004]
    sections:
      - section_id: II.A
        title: Product and service portfolio
        checklist_question_ids: [II.A]
        summary: Zopa markets Biscuit current account, personal loans, credit cards, car finance, savings, ISAs, investing and partnership finance products.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Active public pages show multiple regulated consumer-finance products and app-based access.
            evidence_claim_ids: [EC-003]
            risk_ids: [R-004]
        hidden_risks:
          - Multi-product breadth increases conduct, model, servicing and regulatory complexity.
        evidence_gaps:
          - Product-level revenue, risk-adjusted margin, approval rates, fraud, complaints and servicing costs.
        follow_up_questions:
          - Provide product-level KPI packs, compliance monitoring, model governance and customer-outcome testing.
        table_ids: [T-003]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-003]
      - section_id: II.B
        title: Pricing, eligibility and roadmap
        checklist_question_ids: [II.B]
        summary: Public pages show product categories and some account benefits, but realized APRs, deposit beta, repricing rules and roadmap controls are not available.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.B-F1
            finding: Pricing and eligibility are materially dependent on credit policy, funding costs and customer risk bands that are not publicly disclosed.
            evidence_claim_ids: [EC-003, EC-009]
            risk_ids: [R-004]
        hidden_risks:
          - Rate movements or adverse selection could reduce margins if pricing models lag credit-cycle changes.
        evidence_gaps:
          - APR distribution, deposit rate history, underwriting scorecards, roadmap, model validation and product incident history.
        follow_up_questions:
          - Provide pricing files, underwriting policy, roadmap, model-validation reports and product-incident logs.
        table_ids: [T-004]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-009]
  - chapter_id: III
    title: Customer Information
    chapter_summary: Zopa discloses a large customer-count claim, but revenue concentration, cohort performance, complaints, churn, credit outcomes and partner concentration are private.
    founder_claim_ids: [FC-004]
    evidence_claim_ids: [EC-004, EC-007, EC-009]
    risk_ids: [R-001, R-005]
    sections:
      - section_id: III.A
        title: Customers, cohorts and retention
        checklist_question_ids: [III.A, III.B]
        summary: Zopa states it is trusted by over 1.5 million customers, but public evidence does not reconcile active customers, borrowers, depositors, accounts or revenue cohorts.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Customer scale is company-published and useful for screening, but cohort economics are not public.
            evidence_claim_ids: [EC-004, EC-009]
            risk_ids: [R-001, R-005]
        hidden_risks:
          - Customer-count growth may mask low balances, weak repeat borrowing, poor risk-adjusted returns or conduct complaints.
        evidence_gaps:
          - Cohorts by product, active definitions, churn, NPS, complaints, arrears, fraud and customer acquisition cost.
        follow_up_questions:
          - Provide customer cohort tables, complaints register, fraud metrics, active-customer definitions and product cross-sell analysis.
        table_ids: [T-005]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-004, EC-009]
      - section_id: III.B
        title: Partnerships and operating dependencies
        checklist_question_ids: [III.C, III.E]
        summary: Zopa markets consumer-finance, embedded-lending, retail-finance and auto-finance partnerships, but partner economics and concentration are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Partnership product pages indicate a B2B channel, but the diligence file lacks partner contracts and concentration data.
            evidence_claim_ids: [EC-003, EC-009]
            risk_ids: [R-005]
        hidden_risks:
          - A small number of partner channels or funding providers could drive origination volume or liquidity risk.
        evidence_gaps:
          - Partner list, contract terms, revenue share, volume concentration, termination rights and supplier risk assessments.
        follow_up_questions:
          - Provide top partners and suppliers by volume/revenue, contract summaries, SLAs and termination provisions.
        table_ids: [T-006]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-009]
  - chapter_id: IV
    title: Competition
    chapter_summary: Zopa competes in crowded consumer-finance categories where underwriting quality, cost of funds, brand, app experience and regulatory trust are key differentiators.
    founder_claim_ids: [FC-005]
    evidence_claim_ids: [EC-005, EC-006]
    risk_ids: [R-003, R-004]
    sections:
      - section_id: IV.A
        title: Competitor landscape
        checklist_question_ids: [IV.A]
        summary: CB Insights lists fintech lending competitors including Avant, Auxmoney, Lendable and Prosper, while Zopa's own pages show overlap with banks and credit providers.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Public competitor evidence confirms category crowding, but not Zopa's win rate or relative economics.
            evidence_claim_ids: [EC-005, EC-006]
            risk_ids: [R-003]
        hidden_risks:
          - Competitors with lower funding costs or larger balance sheets could pressure pricing and acquisition costs.
        evidence_gaps:
          - Win/loss, market share, approval rate, CAC by channel, cost-of-funds comparison and risk-adjusted margin benchmarks.
        follow_up_questions:
          - Provide competitor benchmarking, win/loss, rate-sensitivity tests and acquisition-channel performance.
        table_ids: [T-007]
        figure_ids: [F-004]
        evidence_claim_ids: [EC-005, EC-006]
      - section_id: IV.B
        title: Basis of competition
        checklist_question_ids: [IV.B]
        summary: Product breadth and regulated-bank positioning are visible, but durable advantage depends on private data, credit models, funding cost and compliance execution.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: IV.B-F1
            finding: Public data supports product breadth, not defensible underwriting superiority or customer acquisition efficiency.
            evidence_claim_ids: [EC-003, EC-009]
            risk_ids: [R-003, R-004]
        hidden_risks:
          - Public product parity may leave Zopa exposed to bank, neobank and specialist lender competition.
        evidence_gaps:
          - Model performance, proprietary data rights, CAC, retention, repeat borrowing and funding-cost advantage.
        follow_up_questions:
          - Provide model performance by cohort, channel CAC, funding-cost benchmark and win/loss evidence.
        table_ids: [T-008]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-009]
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Zopa uses owned digital channels, app stores, direct web acquisition and partnership channels; channel mix, CAC and payback are not public.
    founder_claim_ids: [FC-003, FC-004]
    evidence_claim_ids: [EC-003, EC-004, EC-009]
    risk_ids: [R-003, R-005]
    sections:
      - section_id: V.A
        title: Distribution channels
        checklist_question_ids: [V.A]
        summary: Zopa's website routes users to app download, personal loans, credit cards, savings, current account, car finance and partnership pages.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: V.A-F1
            finding: Public channels show both direct-to-consumer and partner-led origination motions.
            evidence_claim_ids: [EC-003]
            risk_ids: [R-005]
        hidden_risks:
          - Paid acquisition, broker/referral economics and partner dependence could materially affect unit economics.
        evidence_gaps:
          - Channel mix, CAC, application-to-approval funnel, partner volume, payback and marketing compliance review.
        follow_up_questions:
          - Provide channel funnel, CAC/payback, approval rates and marketing compliance files.
        table_ids: [T-009]
        figure_ids: [F-005]
        evidence_claim_ids: [EC-003, EC-009]
      - section_id: V.B
        title: Brand, awards and customer proof
        checklist_question_ids: [V.B]
        summary: Zopa highlights awards, Trustpilot visuals and customer-count claims, but independent satisfaction and complaint trend data were not obtained.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.B-F1
            finding: Brand proof is visible on company pages, but it needs independent complaint, conversion and retention validation.
            evidence_claim_ids: [EC-004]
            risk_ids: [R-005]
        hidden_risks:
          - Consumer-review snippets can overstate quality if complaint volumes or regulator findings are adverse.
        evidence_gaps:
          - Complaint trend, Trustpilot export, app-store analytics, customer surveys, marketing spend and conversion by channel.
        follow_up_questions:
          - Provide customer research, complaint KPIs, brand tracking and marketing ROI by campaign.
        table_ids: [T-010]
        figure_ids: []
        evidence_claim_ids: [EC-004, EC-009]
  - chapter_id: VI
    title: Research and Development
    chapter_summary: Public evidence indicates app-based banking, credit tooling and partnership products, but engineering roadmap, model governance and R&D productivity are private.
    founder_claim_ids: [FC-003]
    evidence_claim_ids: [EC-003, EC-007, EC-009]
    risk_ids: [R-004, R-006]
    sections:
      - section_id: VI.A
        title: Technology and model-risk posture
        checklist_question_ids: [VI.A]
        summary: Zopa's public app features include credit score, borrowing power, account access and loan application workflows, implying digital underwriting and servicing infrastructure.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.A-F1
            finding: Public product flows imply technology-enabled origination and servicing, but model performance and governance are not public.
            evidence_claim_ids: [EC-003, EC-007]
            risk_ids: [R-004, R-006]
        hidden_risks:
          - Credit, affordability, fraud or personalization models could have hidden bias, drift or governance gaps.
        evidence_gaps:
          - Model inventory, validation reports, incident history, roadmap, security assessments and engineering metrics.
        follow_up_questions:
          - Provide model governance, model monitoring, security reports, incident history and product roadmap.
        table_ids: [T-011]
        figure_ids: [F-006]
        evidence_claim_ids: [EC-003, EC-007, EC-009]
      - section_id: VI.B
        title: Product pipeline and R&D organization
        checklist_question_ids: [VI.B]
        summary: Public pages show current products and careers/leadership links, but R&D headcount, budget and future releases are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VI.B-F1
            finding: R&D delivery quality cannot be assessed from public product pages alone.
            evidence_claim_ids: [EC-003, EC-009]
            risk_ids: [R-006]
        hidden_risks:
          - Underinvestment in data, servicing or compliance tooling could amplify credit-cycle and conduct risk.
        evidence_gaps:
          - R&D budget, roadmap, release cadence, engineering headcount, vendor dependencies and technical debt.
        follow_up_questions:
          - Provide R&D roadmap, engineering org chart, reliability metrics, vendor list and architecture review materials.
        table_ids: [T-012]
        figure_ids: []
        evidence_claim_ids: [EC-003, EC-009]
  - chapter_id: VII
    title: Management and Personnel
    chapter_summary: Zopa links to board, leadership and careers pages, but the diligence file lacks a verified management roster, HRIS export, compensation and turnover data.
    founder_claim_ids: []
    evidence_claim_ids: [EC-003, EC-010]
    risk_ids: [R-006]
    sections:
      - section_id: VII.A
        title: Leadership and governance
        checklist_question_ids: [VII.A]
        summary: The company site includes board and leadership navigation, but this research pass did not obtain a full officer/director roster from primary filings.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VII.A-F1
            finding: Public navigation indicates leadership disclosure exists, but management diligence requires verified biographies, responsibilities and board controls.
            evidence_claim_ids: [EC-003, EC-010]
            risk_ids: [R-006]
        hidden_risks:
          - Key-person dependence, regulated-person accountability or governance weaknesses may be hidden.
        evidence_gaps:
          - Officer roster, board minutes, regulated senior-manager responsibilities, references and succession plans.
        follow_up_questions:
          - Provide management bios, board composition, governance calendar, regulated-person responsibility maps and references.
        table_ids: [T-013]
        figure_ids: [F-007]
        evidence_claim_ids: [EC-003, EC-010]
      - section_id: VII.B
        title: Headcount, hiring and retention
        checklist_question_ids: [VII.B, VII.C]
        summary: Public source set does not disclose headcount, attrition, hiring plan, compensation bands or employee-relations matters.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VII.B-F1
            finding: People operations remain a private-data-room diligence item.
            evidence_claim_ids: [EC-010]
            risk_ids: [R-006]
        hidden_risks:
          - Compliance, credit-risk or engineering attrition could impair execution in a regulated lending business.
        evidence_gaps:
          - HRIS export, attrition by function, open roles, compensation, incentives, complaints and employee litigation.
        follow_up_questions:
          - Provide HRIS reports, attrition, hiring plan, incentive plans, employee claims and key-person retention materials.
        table_ids: [T-014]
        figure_ids: []
        evidence_claim_ids: [EC-010]
  - chapter_id: VIII
    title: Legal and Related Matters
    chapter_summary: Zopa publicly states PRA authorization, FCA/PRA regulation and FSCS coverage, but direct regulator extracts, legal dockets, IP registers and compliance files were not reviewed.
    founder_claim_ids: [FC-004]
    evidence_claim_ids: [EC-004, EC-008, EC-009]
    risk_ids: [R-001, R-007]
    sections:
      - section_id: VIII.A
        title: Regulatory, licensing and consumer-protection matters
        checklist_question_ids: [VIII.A, VIII.G]
        summary: Zopa says it is covered by FSCS and authorized by the PRA and regulated by the FCA and PRA; regulatory correspondence and enforcement searches were not completed.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.A-F1
            finding: Company-owned pages disclose UK bank regulatory perimeter, which is material to diligence scope.
            evidence_claim_ids: [EC-004, EC-008]
            risk_ids: [R-007]
        hidden_risks:
          - Conduct, affordability, complaints, capital adequacy or model-governance findings may not be visible on company pages.
        evidence_gaps:
          - Direct FCA/PRA register extract, correspondence, complaints, SMCR records, policies, audits and enforcement searches.
        follow_up_questions:
          - Provide regulatory registers, correspondence, compliance monitoring, complaints, audit reports and legal opinions.
        table_ids: [T-015]
        figure_ids: [F-008]
        evidence_claim_ids: [EC-004, EC-008, EC-009]
      - section_id: VIII.B
        title: Litigation, IP and contractual matters
        checklist_question_ids: [VIII.B, VIII.C, VIII.F]
        summary: Public research did not identify a litigation docket, trademark/patent schedule, material contract list or IP ownership file.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.B-F1
            finding: Legal, IP and contract diligence must be completed from counsel-managed records.
            evidence_claim_ids: [EC-009]
            risk_ids: [R-007]
        hidden_risks:
          - Unseen disputes, customer remediation, IP gaps or vendor termination rights could affect valuation.
        evidence_gaps:
          - Litigation list, claims history, IP assignments, trademark/patent schedules, customer/partner contracts and vendor agreements.
        follow_up_questions:
          - Provide litigation schedule, IP register, customer/partner contracts, vendor agreements and legal letters.
        table_ids: [T-016]
        figure_ids: []
        evidence_claim_ids: [EC-009]
tables:
  - table_id: T-001
    title: Public funding and valuation anchors
    chapter_id: I
    section_id: I.A
    purpose: Summarize public financing facts and finance-data gaps.
    columns:
      - {name: item, description: Financing or financial item}
      - {name: public_signal, description: Publicly observed fact}
      - {name: diligence_status, description: Verification status and caveat}
    rows:
      - row_id: T-001-R1
        values: {item: "Unicorn valuation", public_signal: "$1B valuation, joined 2021-10-19", diligence_status: "verified from CB Insights list; current valuation needs primary support"}
        evidence_claim_ids: [EC-001]
        source_ids: [SRC-001]
      - row_id: T-001-R2
        values: {item: "Total raised", public_signal: "$1.048B total raised and $106M last raised", diligence_status: "partially verified; terms and cash balance not public"}
        evidence_claim_ids: [EC-002]
        source_ids: [SRC-002]
