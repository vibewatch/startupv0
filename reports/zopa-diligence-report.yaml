evidence_claims:
  - evidence_claim_id: EC-001
    claim: CB Insights lists Zopa as a UK/London financial-services unicorn valued at $1B, joined 2021-10-19, with IAG Capital Partners, Augmentum Fintech and Northzone Ventures shown as investors.
    evidence_summary: The CB Insights unicorn-list row provides the selected company's public valuation, join date, geography, sector and listed investors.
    evidence_type: market_database
    verification_status: verified
    confidence: high
    source_ids: [SRC-001]
    quoted_evidence:
      - source_id: SRC-001
        quote: "| [Zopa](https://www.cbinsights.com/company/zopa) | $1 | 10/19/2021 | United Kingdom | London | Financial Services | IAG Capital Partners, Augmentum Fintech, Northzone Ventures |"
        location: CB Insights unicorn list row
    analyst_interpretation: This verifies eligibility for the requested uncovered private-unicorn screen but does not prove current valuation.
    limitations: CB Insights is a secondary market database and may lag current financing or corporate status.
    associations: {chapter_id: I, section_id: I.A, founder_claim_ids: [FC-001], table_ids: [T-001, T-002], figure_ids: [F-001, F-008], risk_ids: [R-002]}
  - evidence_claim_id: EC-002
    claim: CB Insights' Zopa profile states founded year 2004, stage "Convertible Note | Alive", total raised $1.048B and last raised $106M.
    evidence_summary: The profile provides stage and fundraising metadata and describes Zopa's lending, investment, savings and credit-card focus.
    evidence_type: market_database
    verification_status: partially_verified
    confidence: medium
    source_ids: [SRC-002]
    quoted_evidence:
      - source_id: SRC-002
        quote: "Stage Convertible Note | Alive; Total Raised $1.048B; Last Raised $106M | 1 yr ago."
        location: CB Insights Zopa profile
    analyst_interpretation: Useful financing signal, but economic terms, cash balance and current status require primary confirmation.
    limitations: Revenue field is not meaningful in the captured profile and is not used as evidence.
    associations: {chapter_id: I, section_id: I.A, founder_claim_ids: [FC-002], table_ids: [T-001, T-002], figure_ids: [F-001, F-008], risk_ids: [R-001, R-002]}
  - evidence_claim_id: EC-003
    claim: Zopa's website shows an active product suite including Biscuit current account, loans, credit cards, car finance, savings, ISAs, investing and partnership finance.
    evidence_summary: The homepage navigation and product sections list consumer and partnership products.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids: [SRC-003]
    quoted_evidence:
      - source_id: SRC-003
        quote: "Biscuit current account; Personal loan; Credit card; Compare car finance; Savings account; Cash ISA; Investing; Consumer finance; Embedded lending; Retail finance; Auto finance."
        location: Zopa homepage navigation
    analyst_interpretation: Product presence is well supported; product economics are not.
    limitations: Company-owned marketing page, not audited operating data.
    associations: {chapter_id: II, section_id: II.A, founder_claim_ids: [FC-003], table_ids: [T-003, T-004, T-006, T-008, T-009, T-010, T-011, T-016], figure_ids: [F-002, F-004, F-005], risk_ids: [R-003, R-004, R-005]}
  - evidence_claim_id: EC-004
    claim: Zopa publicly states FSCS coverage, PRA authorization, FCA/PRA regulation and more than 1.5 million customers.
    evidence_summary: Homepage statements describe customer count and regulatory perimeter.
    evidence_type: primary_company_source
    verification_status: partially_verified
    confidence: medium
    source_ids: [SRC-003]
    quoted_evidence:
      - source_id: SRC-003
        quote: "Zopa's covered by the Financial Services Compensation Scheme (FSCS). Trusted by over 1.5 million Zopa customers. Authorised by the Prudential Regulation Authority and regulated by the Financial Conduct Authority and the Prudential Regulation Authority."
        location: Zopa homepage
    analyst_interpretation: Customer and regulatory statements materially shape diligence, but regulator registers and customer cohorts are separate diligence requests.
    limitations: Customer count is company-published; direct regulator extracts were not fetched in this pass.
    associations: {chapter_id: III, section_id: III.A, founder_claim_ids: [FC-004], table_ids: [T-005, T-008, T-010, T-015], figure_ids: [F-003, F-008], risk_ids: [R-001, R-005, R-007]}
  - evidence_claim_id: EC-005
    claim: CB Insights lists Zopa competitors including Avant, Auxmoney, Lendable and Prosper.
    evidence_summary: The profile's comparison section names adjacent digital lenders and describes their product overlaps.
    evidence_type: market_database
    verification_status: partially_verified
    confidence: medium
    source_ids: [SRC-002]
    quoted_evidence:
      - source_id: SRC-002
        quote: "Compare Zopa to Competitors ... Avant ... auxmoney ... Lendable ... Prosper."
        location: CB Insights Zopa profile competitor section
    analyst_interpretation: Competitor presence is clear, but relative performance is not public.
    limitations: The list is not a complete market map or market-share estimate.
    associations: {chapter_id: IV, section_id: IV.A, founder_claim_ids: [FC-005], table_ids: [T-007], figure_ids: [F-004], risk_ids: [R-003]}
  - evidence_claim_id: EC-006
    claim: Zopa operates in digital lending and consumer finance categories where product overlap with fintech lenders is public.
    evidence_summary: CB Insights describes Zopa's focus on lending, investments, savings and credit cards, and competitor snippets show adjacent lending/card offerings.
    evidence_type: market_database
    verification_status: partially_verified
    confidence: medium
    source_ids: [SRC-002]
    quoted_evidence:
      - source_id: SRC-002
        quote: "The company offers lending, intelligent investments, fixed-term savings, and credit cards designed to empower customers to take control of their finances."
        location: CB Insights Zopa profile about section
    analyst_interpretation: Confirms category overlap but not durable advantage.
    limitations: Secondary database profile; needs customer and financial validation.
    associations: {chapter_id: IV, section_id: IV.A, founder_claim_ids: [FC-005], table_ids: [T-007, T-008], figure_ids: [F-004], risk_ids: [R-003, R-004]}
  - evidence_claim_id: EC-007
    claim: Zopa's app copy references credit score, Borrowing Power, instant access and quick loan application flows.
    evidence_summary: Homepage feature copy describes app capabilities relevant to credit and servicing technology.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: medium
    source_ids: [SRC-003]
    quoted_evidence:
      - source_id: SRC-003
        quote: "See your credit score and what you could borrow with Borrowing Power. Instant access to your bank account, loans, credit card or savings. Apply for a Zopa loan in minutes with no fees or paperwork."
        location: Zopa homepage app section
    analyst_interpretation: Supports product-tech presence but not model quality or compliance.
    limitations: Marketing copy, not technical documentation.
    associations: {chapter_id: VI, section_id: VI.A, founder_claim_ids: [FC-003], table_ids: [T-011], figure_ids: [F-006], risk_ids: [R-004, R-006]}
  - evidence_claim_id: EC-008
    claim: Zopa's disclosed regulatory perimeter makes regulator-facing diligence central to legal and risk review.
    evidence_summary: Company-owned regulatory statements identify PRA/FCA and FSCS context.
    evidence_type: primary_company_source
    verification_status: partially_verified
    confidence: medium
    source_ids: [SRC-003]
    quoted_evidence:
      - source_id: SRC-003
        quote: "Authorised by the Prudential Regulation Authority and regulated by the Financial Conduct Authority and the Prudential Regulation Authority."
        location: Zopa homepage regulatory statement
    analyst_interpretation: Legal diligence must cover bank regulation, conduct, complaints, model governance and capital.
    limitations: Direct regulator records were not included in the source set.
    associations: {chapter_id: VIII, section_id: VIII.A, founder_claim_ids: [FC-004], table_ids: [T-008, T-015], figure_ids: [F-006, F-007, F-008], risk_ids: [R-001, R-007]}
  - evidence_claim_id: EC-009
    claim: Core private diligence materials for Zopa--financials, loan-book quality, customer cohorts, contracts, legal files and security reports--were not public in the reviewed source set.
    evidence_summary: The reviewed public sources contain marketing and market-database facts but not data-room materials.
    evidence_type: other
    verification_status: not_publicly_verifiable
    confidence: high
    source_ids: [SRC-001, SRC-002, SRC-003]
    quoted_evidence: []
    analyst_interpretation: Absence of private data is a diligence gap, not a negative finding by itself.
    limitations: No paid databases, direct company records or interviews were used.
    associations: {chapter_id: I, section_id: I.A, founder_claim_ids: [], table_ids: [T-001, T-002, T-004, T-005, T-006, T-008, T-011, T-012, T-015, T-016], figure_ids: [F-001, F-003, F-005, F-006, F-008], risk_ids: [R-001, R-002, R-004, R-005, R-007]}
  - evidence_claim_id: EC-010
    claim: Management, HR and governance diligence could not be completed from the reviewed public source set.
    evidence_summary: Zopa's homepage navigation links to board, leadership and careers pages, but the source set did not include a verified roster or HR data.
    evidence_type: primary_company_source
    verification_status: inconclusive
    confidence: low
    source_ids: [SRC-003]
    quoted_evidence:
      - source_id: SRC-003
        quote: "About Zopa; Our board; Our leadership team; Careers."
        location: Zopa homepage navigation
    analyst_interpretation: People diligence should be treated as unresolved pending primary documents and interviews.
    limitations: Navigation links are not equivalent to verified management diligence.
    associations: {chapter_id: VII, section_id: VII.A, founder_claim_ids: [], table_ids: [T-012, T-013, T-014], figure_ids: [F-007], risk_ids: [R-006]}
