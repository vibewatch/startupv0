executive_summary:
  overall_assessment: Contentsquare appears to be an active private unicorn based on CB Insights and current public company materials. Public evidence supports the company category, product existence and selected adoption or market signals, but investment-grade diligence cannot rely on public evidence alone because financial quality, customer economics, legal exposure, security posture, cap table and current operating metrics remain private.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if Contentsquare can substantiate durable ARR growth, enterprise retention, privacy/security controls, acquisition/product integration and debt/equity financing terms underlying the $5.60B valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Contentsquare at $5.60B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Contentsquare publicly markets a broad experience-intelligence platform spanning analytics, monitoring, product analytics, voice/conversation and AI capabilities.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Contentsquare publicly claims 3,000 brands, 1.3+ million websites and named customer stories.
      evidence_claim_ids:
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Headline valuation without private financial support
    - risk_id: R-005
      summary: Privacy, session-data and enterprise security exposure
    - risk_id: R-003
      summary: Crowded digital analytics market may pressure growth and pricing
  key_evidence_gaps:
    - Audited financial statements, KPI pack, cash/debt, runway and valuation bridge.
    - Cap table, liquidation preferences, option pool, debt instruments and financing documents.
    - Top customer or GMV/revenue concentration, retention cohorts, churn and reference calls.
    - Product security, privacy, reliability, incident, roadmap and technical-debt artifacts.
    - Legal docket, regulatory, IP, insurance, HR and material-contract records.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline valuation.
    - Request customer, partner and supplier contracts with cohort/retention schedules.
    - Have counsel and security/privacy specialists review legal, regulatory, IP and data-protection posture.
    - Benchmark competitive differentiation with win/loss, pricing and customer-reference evidence.
