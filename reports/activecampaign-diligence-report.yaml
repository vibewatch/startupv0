          - VIII.B.1
          - VIII.F.1
          - VIII.G.1
        summary: Public company legal pages show consent, privacy, DPA, Data Privacy Framework, terms, AUP, API, and WhatsApp-related obligations; blocked court sources and absent data-room materials prevent a complete legal-risk assessment.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.A-F1
            finding: ActiveCampaign legal and privacy pages identify privacy, data-transfer, DPF, CCPA, LGPD, subprocessors, consent, anti-spam, cookie, DPA, SCC, terms, AUP, and SLA materials.
            evidence_claim_ids:
