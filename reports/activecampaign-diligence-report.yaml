risk_register:
  - risk_id: R-001
    risk_title: Current financial quality and valuation are opaque
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources disclose historical funding, 2021 ARR, and broad customer scale, but not current revenue quality, retention, margins, cash, debt, burn, runway, or post-2021 valuation marks.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - III.A
      - V.A
    evidence_claim_ids:
      - EC-002
      - EC-019
      - EC-020
    mitigation_or_diligence_request: Require audited financials, monthly ARR bridge, cohort retention, customer concentration, debt schedule, cash runway, cap table, and investor financing documents before valuation work.
  - risk_id: R-002
    risk_title: Competitive pricing and positioning pressure
    risk_category: market
    severity: high
    likelihood: high
    description: ActiveCampaign competes with entry-level email tools, full CRM suites, e-commerce automation specialists, and AI-native automation tools; PCMag flags price scaling, learning curve, and CRM depth limits.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-006
      - EC-008
    mitigation_or_diligence_request: Analyze win/loss, discounting, churn by competitor, price sensitivity, CAC payback, time-to-value, and product differentiation by segment.
  - risk_id: R-003
    risk_title: Consent-driven messaging and privacy compliance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: SMS, WhatsApp, email, privacy, international transfers, CCPA/LGPD, DPF, and sensitive communication data create compliance obligations that may produce regulatory, class-action, and platform-policy risk.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.B
      - VIII.A
    evidence_claim_ids:
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Review consent logs, opt-out handling, complaints, regulator correspondence, DSAR logs, DPA/SCC/DPF controls, Meta/carrier policies, and privacy counsel memos.
  - risk_id: R-004
    risk_title: Product complexity and AI execution risk
    risk_category: product
    severity: medium
    likelihood: high
    description: Broad automation, CRM, integrations, messaging, acquired products, and AI-agent features can create onboarding complexity, support burden, technical debt, and unproven AI monetization.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.A
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-008
    mitigation_or_diligence_request: Review usage telemetry, feature adoption, onboarding completion, support tickets, R&D roadmap, AI cost, model governance, and product-level churn/ARR.
  - risk_id: R-005
    risk_title: Security and privacy incident exposure
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Public security materials show controls, but a reported 2022 social-engineering event and sensitive customer-data processing warrant incident and control diligence.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.B
      - VIII.A
    evidence_claim_ids:
      - EC-010
      - EC-016
    mitigation_or_diligence_request: Review SOC 2 Type II, pen tests, vulnerability SLAs, incident register, postmortems, customer notifications, cyber insurance, and account-takeover controls.
  - risk_id: R-006
    risk_title: Team, governance, and headcount uncertainty
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public sources identify senior executive hires and global headcount anchors, but do not disclose board rights, succession plans, attrition, functional productivity, or current HRIS data.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.B
      - VII.A
    evidence_claim_ids:
      - EC-009
      - EC-013
      - EC-020
    mitigation_or_diligence_request: Request board roster, executive turnover, employment agreements, equity grants, HRIS export, attrition by function/geography, compensation benchmarks, and succession planning.
  - risk_id: R-007
    risk_title: Third-party platform and integration dependency
    risk_category: operational
    severity: medium
    likelihood: high
    description: Integrations, Meta/WhatsApp, SMS carriers, payment processors, APIs, and app ecosystems create external dependency risk that can affect availability, compliance, deliverability, and customer workflows.
    impacted_chapter_ids:
      - II
      - III
      - VI
      - VIII
    impacted_section_ids:
      - II.B
      - III.B
      - VI.A
      - VIII.A
    evidence_claim_ids:
      - EC-004
      - EC-012
      - EC-014
    mitigation_or_diligence_request: Review key third-party contracts, SLAs, platform-policy change history, supplier concentration, integration uptime, and contingency plans.
  - risk_id: R-008
    risk_title: IP, litigation, and legal-record gaps
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Trademark signals are public, but patents, source-code ownership, OSS compliance, acquired IP, litigation schedules, regulatory inquiries, and insurance claims are not fully verifiable from accessible public sources.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.C
    evidence_claim_ids:
      - EC-015
      - EC-017
    mitigation_or_diligence_request: Counsel should provide IP schedule, official trademark/patent review, OSS/SBOM, invention assignments, litigation/regulatory schedule, insurance policies, and M&A IP assignment documents.

diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited annual and quarterly financial statements, revenue recognition memo, monthly ARR bridge, bookings, deferred revenue, AR aging, gross margin, EBITDA, cash flow, cash balance, debt, burn, and runway.
    why_it_matters: These items determine valuation, dilution, runway, debt risk, and quality of growth.
    suggested_source_or_request: CFO, finance data room, auditors, board materials, and bank/debt statements.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Fully diluted cap table, preferred-stock terms, investor rights, option pool, warrants, SAFEs/notes, secondary sales, 409A valuations, and debt agreements.
    why_it_matters: Liquidation preferences and security terms can materially alter investor return and control outcomes.
    suggested_source_or_request: Company counsel, CFO, corporate secretary, and investor documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Customer cohort data, top-customer ARR, churn, GRR, NRR, expansion, contractions, support cost, and customer references.
    why_it_matters: Public customer counts do not prove durable revenue or customer quality.
    suggested_source_or_request: CRM, billing, data warehouse, customer success, and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, discounting, competitor migration data, competitive churn, CAC payback, and product differentiation by segment.
    why_it_matters: The category is crowded and pricing pressure may impair growth or retention.
    suggested_source_or_request: Sales ops, RevOps, CRM exports, product marketing, and customer interviews.
    priority: high
  - gap_id: G-005
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, gross margin, attach rate, usage telemetry, uptime, reliability, feature adoption, AI cost, and product-level retention.
    why_it_matters: Product breadth is public, but economic contribution and durability are private.
    suggested_source_or_request: Product analytics, billing, engineering, customer success, and finance exports.
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.A
    missing_information: SOC 2 Type II report, penetration-test attestation, security incident register, breach notifications, cyber insurance, vulnerability SLAs, and remediations.
    why_it_matters: Marketing automation processes sensitive contact and communication data and has public incident history.
    suggested_source_or_request: CISO/security team, Trust Center, counsel, and insurer.
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.A
    missing_information: SMS/WhatsApp consent logs, TCPA/CASL/GDPR compliance controls, carrier/Meta audits, complaint rates, opt-outs, platform suspensions, and policy correspondence.
    why_it_matters: Messaging compliance is a high-severity regulatory and platform-dependency risk.
    suggested_source_or_request: Legal, compliance, product, Trust and Safety, Meta/carrier account teams, and customer-support logs.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.A
    missing_information: Current HRIS export, executive turnover, attrition by function/geography, compensation bands, equity grants, retention plans, board roster, and succession plans.
    why_it_matters: Public headcount anchors vary, and late-stage SaaS scaling depends on leadership and workforce execution.
    suggested_source_or_request: People team, CFO, board materials, compensation committee, and employment agreements.
    priority: medium
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.A
    missing_information: Roadmap, R&D budget, engineering headcount, technical debt, AI vendor contracts, model governance, acquisition-integration status, and architectural diagrams.
    why_it_matters: Product expansion and AI strategy may create cost, privacy, technical, and execution risk.
    suggested_source_or_request: CTO/product leadership, R&D operating plan, architecture review, and M&A integration plans.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.C
    missing_information: IP schedule, patents, official trademark records, source-code ownership, invention assignments, OSS/SBOM, acquired-company IP transfer documents, and IP disputes.
    why_it_matters: Public trademark records do not prove full software and data IP ownership.
    suggested_source_or_request: Company counsel, IP counsel, engineering, M&A counsel, and code-scanning tools.
    priority: medium

