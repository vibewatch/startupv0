    diligence_follow_up:
      - Request current SOC 2 Type II, HIPAA/BAA scope, latest penetration-test attestation, security-incident register, and customer-notification history.

executive_summary:
  overall_assessment: >-
    ActiveCampaign is a credible late-stage private marketing-automation SaaS unicorn with verified public anchors for founding history, major funding, broad product coverage, global customer reach, and a mature security/legal posture. The investment case depends on private diligence because the public record does not verify current ARR, growth, gross margin, churn, NRR, customer concentration, debt, cash runway, or post-2021 valuation quality.
  investment_or_diligence_thesis: >-
    Public evidence supports a scaled SMB and mid-market automation platform with cross-channel email, CRM, SMS, WhatsApp, transactional email, AI agents, and a large integration ecosystem. The central diligence question is whether ActiveCampaign can defend premium automation pricing and healthy retention against broad-suite competitors, entry-level email tools, e-commerce specialists, and AI-native workflows while staying compliant across consent-driven messaging channels.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: ActiveCampaign's founding, Chicago headquarters, private status, and shift from on-premise software to SaaS are supported by company and independent sources.
      evidence_claim_ids:
        - EC-001
        - EC-018
    - founder_claim_id: FC-003
      summary: The 2021 Series C round, total financing figure, disclosed ARR, and over $3 billion valuation are directly supported by a PRNewswire funding announcement.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: The product suite and integration breadth are supported by current company product, apps, pricing, and independent PCMag review evidence.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-006
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Current financial quality, growth, margin, cash runway, debt, valuation marks, and cap-table economics are not public.
    - risk_id: R-002
      summary: Martech competition spans low-cost email tools, full-suite CRM clouds, e-commerce automation specialists, and AI-native workflow vendors, creating pricing and positioning pressure.
    - risk_id: R-003
      summary: Email, SMS, WhatsApp, privacy, data-transfer, and consent obligations create regulatory and platform-policy exposure.
  key_evidence_gaps:
    - Current ARR, GAAP revenue, gross margin, EBITDA, free cash flow, cash balance, burn, debt, and runway.
    - Net revenue retention, gross retention, logo churn, cohort behavior, customer concentration, and expansion by segment.
    - Cap table, liquidation preferences, investor rights, debt instruments, option pool, and post-2021 valuation marks.
    - Product-level ARR, AI adoption, WhatsApp/SMS economics, deliverability metrics, and third-party dependency SLAs.
    - Litigation docket details, customer claims, regulatory inquiries, insurance coverage, and breach-remediation history.
  recommended_next_steps:
    - Require a finance data room with monthly ARR bridge, revenue recognition memo, cohort tables, deferred revenue, AR aging, gross margin detail, and cash runway.
    - Run customer calls across SMB, mid-market, agency/reseller, e-commerce, WhatsApp, and CRM use cases to validate retention drivers and switching costs.
    - Review current security, privacy, DPA, SOC 2, HIPAA, incident, deliverability, and Meta/WhatsApp compliance materials with counsel and technical diligence.
    - Benchmark pricing, win/loss, discounting, CAC payback, and expansion against HubSpot, Mailchimp/Intuit, Klaviyo, Brevo, Salesforce, Campaigner, and niche AI automation tools.

chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources verify substantial outside financing and a 2021 ARR anchor, but current financial performance and capitalization economics remain private diligence items.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-002
      - EC-020
    risk_ids:
      - R-001
      - R-006
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
        summary: ActiveCampaign publicly disclosed $165 million ARR in 2021 and Wikipedia lists a 2024 revenue figure, but no audited financial statements, current ARR bridge, profitability, cash, debt, or unit economics were available.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: A 2021 company funding announcement disclosed $165 million ARR and strong customer-scale metrics at the time of the Series C.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Current revenue quality, margin, burn, cash runway, debt, and audited statements are not publicly verifiable.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-001
        hidden_risks:
          - A high 2021 valuation could be stale if growth slowed, SMB churn increased, or SaaS multiples compressed.
          - Public customer-count growth does not prove billable-account quality, retention, or expansion.
        evidence_gaps:
          - Audited income statements, balance sheets, cash-flow statements, ARR roll-forward, bookings, deferred revenue, AR aging, and cohort metrics.
          - Current cash balance, debt, burn, and runway.
        follow_up_questions:
          - What are monthly ARR, GAAP revenue, gross margin, EBITDA, free cash flow, cash, and debt for the last 36 months?
          - How much of ARR is email, CRM, SMS, WhatsApp, transactional email, reseller, partner, and professional-services revenue?
        table_ids:
          - T-001
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-020
      - section_id: I.B
        title: Capitalization, ownership, financing, and valuation
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
        summary: ActiveCampaign's major external rounds are public, but ownership percentages, investor rights, liquidation preferences, secondary sales, debt, and option-pool status are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Public sources identify Silversmith, Susquehanna Growth Equity, Tiger Global, and Dragoneer as major financing participants across Series A-C.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-001
          - finding_id: I.B-F2
            finding: Capital structure cannot be assessed without a private cap table and financing documents.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-006
        hidden_risks:
          - Investor preferences, ratchets, debt covenants, secondary proceeds, or repricing could materially change common-equity value.
          - A post-2021 mark-down or down-round signal may not be visible in public sources.
        evidence_gaps:
          - Fully diluted cap table, preferred-stock terms, SAFE/note/debt instruments, board rights, option grants, and 409A history.
        follow_up_questions:
          - Provide the current cap table, financing documents, liquidation stack, option-pool roll-forward, debt agreements, and any secondary transaction details.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-002
          - EC-020

  - chapter_id: II
    title: Products
    chapter_summary: The product portfolio is broad and publicly visible, spanning marketing automation, email, CRM, SMS, WhatsApp, transactional email, AI agents, integrations, and security controls; product-level economics and adoption remain private.
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
      - EC-008
      - EC-010
    risk_ids:
      - R-004
      - R-007
    sections:
      - section_id: II.A
        title: Product and technology offering
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
        summary: ActiveCampaign operates a multi-product customer-experience automation platform with email, CRM, SMS, WhatsApp, transactional email, AI agents, and extensive integrations.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Company product pages and PCMag independently support a broad automation product suite with email, CRM, segmentation, predictive sending, and integrations.
            evidence_claim_ids:
              - EC-004
              - EC-008
            risk_ids:
              - R-004
          - finding_id: II.A-F2
            finding: Active Intelligence is positioned around AI agents, campaign building, AI-suggested segments, predictive sending, and AI-tool connectors, but public sources do not verify adoption or product-level ROI.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-004
        hidden_risks:
          - Broad feature scope may create onboarding complexity, support load, and product-surface area for security or deliverability incidents.
          - AI agents may raise differentiation expectations before measurable adoption, margin, or retention benefits are proven.
        evidence_gaps:
          - Product-level ARR, gross margin, usage retention, attach rates, R&D spend, AI model cost, latency, reliability, and incident history.
        follow_up_questions:
          - Which SKUs drive new ARR and expansion, and what are attach rates for SMS, WhatsApp, CRM, Postmark, and AI features?
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-006
          - EC-008
      - section_id: II.B
        title: Product security, reliability, and service dependencies
        checklist_question_ids:
          - II.B.1
          - II.B.2
          - II.B.3
        summary: ActiveCampaign publishes security and legal materials, but the current audit reports, SLAs, penetration-test attestations, incident history, and third-party dependency contracts require direct diligence.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.B-F1
            finding: The company claims GDPR, SOC 2, and HIPAA focus, single-tenancy architecture, MFA, SSO, session management, automated scanning, and internal red-team work.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-005
          - finding_id: II.B-F2
            finding: Terms disclose beta-feature risk, payment processor dependency, and WhatsApp service dependencies on eligibility, credits, usage limits, and changes or discontinuation.
            evidence_claim_ids:
              - EC-011
              - EC-012
            risk_ids:
              - R-003
              - R-007
        hidden_risks:
          - Meta/WhatsApp, telecom, payment, email deliverability, and integration-platform policies can change outside ActiveCampaign's control.
          - Security posture cannot be fully validated without reports, logs, customer controls testing, and historical incident records.
        evidence_gaps:
          - Current SOC 2 report, penetration-test attestation, uptime history, disaster-recovery tests, incident postmortems, and material vendor agreements.
        follow_up_questions:
          - Provide current Trust Center documents, third-party vendor list, service uptime history, and remediation evidence for recent material incidents.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-010
          - EC-011
          - EC-012
          - EC-016

  - chapter_id: III
    title: Customer Information
    chapter_summary: Public sources show a large, global, diverse customer base and many case studies, but they do not reveal concentration, churn, cohort retention, reseller economics, or customer-level ARR.
    founder_claim_ids:
      - FC-001
      - FC-004
    evidence_claim_ids:
      - EC-003
      - EC-007
      - EC-019
    risk_ids:
      - R-001
      - R-007
    sections:
      - section_id: III.A
        title: Customers, cohorts, concentration, and retention
        checklist_question_ids:
          - III.A.1
          - III.A.2
          - III.A.3
          - III.C.1
        summary: ActiveCampaign lists more than 180,000 customers, customer stories across sectors and geographies, and 104 customer-story entries, but does not publish top-account concentration or churn metrics.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Company pages report more than 180,000 customers and customers in more than 170 countries, with named stories including Paperbell, Pit Boss Grills, MSI Chicago, Artivive, and Ducks Unlimited Canada.
            evidence_claim_ids:
              - EC-003
              - EC-007
            risk_ids:
              - R-001
          - finding_id: III.A-F2
            finding: Customer concentration, churn, NRR, expansion, and average revenue per account are not publicly verifiable.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-001
        hidden_risks:
          - SMB and solopreneur customer mix can elevate logo churn and support costs relative to enterprise SaaS.
          - Named case studies may overrepresent successful customers and not reflect retention or monetization of the broader base.
        evidence_gaps:
          - Top-25 customers by ARR, churn by cohort and ARR band, NRR/GRR, reseller/agency account structure, customer references, and support-ticket trends.
        follow_up_questions:
          - What share of ARR is from top 10, top 25, SMB, mid-market, enterprise, agency/reseller, and international customers?
        table_ids:
          - T-006
          - T-008
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-003
          - EC-007
          - EC-019
      - section_id: III.B
        title: Strategic relationships, partners, and platform dependencies
        checklist_question_ids:
          - III.B.1
          - III.D.1
          - III.E.1
        summary: ActiveCampaign markets more than 1,000 integrations and product dependencies across Shopify, Salesforce, Meta, WhatsApp, Zapier, Make, payment tools, and developer APIs; public sources do not quantify partner revenue or supplier concentration.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: ActiveCampaign's integration ecosystem is public and extensive, including core CRM, e-commerce, advertising, productivity, data, and automation platforms.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-007
          - finding_id: III.B-F2
            finding: WhatsApp and SMS products expose the company to Meta, telecom, consent, deliverability, and local regulatory dependencies.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-003
              - R-007
        hidden_risks:
          - Changes in Meta, telecom carrier, e-commerce platform, API, app-store, or email-provider rules could impair customer workflows.
          - No public data shows the economics, rev-share, contractual durability, or performance obligations of key partners.
        evidence_gaps:
          - Partner contracts, supplier SLAs, reseller agreements, partner-sourced ARR, integration failure rates, and dependency remediation plans.
        follow_up_questions:
          - Which partners or suppliers are material to ARR, uptime, deliverability, data access, or customer acquisition?
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-012

  - chapter_id: IV
    title: Competition
    chapter_summary: ActiveCampaign occupies a mid-market automation position between low-cost email tools and broad enterprise CRM suites, but competitive pressure from HubSpot, Mailchimp, Brevo, Klaviyo, Salesforce, Campaigner, and AI-native workflows is material.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-006
      - EC-008
    risk_ids:
      - R-002
      - R-004
    sections:
      - section_id: IV.A
        title: Competitive landscape and positioning
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
          - IV.A.3
        summary: Independent PCMag evidence positions ActiveCampaign as stronger than entry-level newsletter tools for automation, less broad than enterprise CRM suites, and subject to pricing growth as contact lists scale.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: PCMag describes ActiveCampaign as bridging simple newsletter tools and enterprise email ecosystems, with predictive sending, HIPAA compliance, and mid-market pricing.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-002
          - finding_id: IV.A-F2
            finding: PCMag flags a steep learning curve, contact-list-based price increases, and CRM depth below dedicated platforms.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-002
              - R-004
        hidden_risks:
          - Product breadth may not fully defend against lower-cost email providers, e-commerce-focused tools, or all-in-one CRM platforms.
          - AI-native tools can automate workflows outside incumbent martech platforms, pressuring perceived differentiation.
        evidence_gaps:
          - Win/loss data, competitive discounting, migration source/destination data, CAC by channel, partner influence, and product-level churn.
        follow_up_questions:
          - Provide win/loss analysis against HubSpot, Mailchimp/Intuit, Klaviyo, Brevo, Salesforce, Campaigner, and AI-native workflow tools.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-006
          - EC-008

  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: ActiveCampaign uses direct self-serve, demo-led, partner, integration, customer-story, reseller, and international-hub motions, but public sources do not disclose channel mix, CAC, payback, pipeline conversion, or quota productivity.
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-003
      - EC-007
      - EC-009
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: V.A
        title: Go-to-market motions, geography, and channels
        checklist_question_ids:
          - V.A.1
          - V.B.1
          - V.C.1
        summary: Public sources show a mix of free trial, buy-now pricing, demo-led enterprise paths, customer stories, integrations, partner/reseller references, and international hubs, but not channel economics.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: The website presents self-serve pricing flows, demo calls, partner/integration pathways, and customer-story proof points across many industries.
            evidence_claim_ids:
              - EC-006
              - EC-007
            risk_ids:
              - R-002
          - finding_id: V.A-F2
            finding: International offices and hubs support global coverage, including Dublin, Brazil, Poland, Costa Rica, Sydney, and other regions.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-006
        hidden_risks:
          - Global customer count may mask uneven regional profitability, local compliance costs, and partner/reseller margin leakage.
          - A broad SMB funnel can produce high lead volume but weak payback if churn or low-ARPA segments dominate.
        evidence_gaps:
          - CAC, payback, sales cycle, quota attainment, channel mix, lead source, conversion funnel, reseller economics, discounting, and international ARR by region.
        follow_up_questions:
          - What are CAC, payback, win rate, churn, and NRR by self-serve, sales-led, partner, reseller, geography, and product bundle?
        table_ids:
          - T-011
          - T-012
        figure_ids:
          - F-006
        evidence_claim_ids:
          - EC-003
          - EC-006
          - EC-007
          - EC-009

  - chapter_id: VI
    title: Research and Development
    chapter_summary: ActiveCampaign's public R&D narrative emphasizes AI agents, automation, integrations, WhatsApp/SMS expansion, security scanning, and acquired capabilities, but R&D spending, roadmap deliverability, model costs, and technical debt are not public.
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-010
      - EC-014
    risk_ids:
      - R-004
      - R-007
    sections:
      - section_id: VI.A
        title: R&D organization, product pipeline, and technology defensibility
        checklist_question_ids:
          - VI.A.1
          - VI.A.2
          - VI.B.1
        summary: The public pipeline centers on Active Intelligence, cross-channel automation, integrations, WhatsApp capabilities, Postmark transactional email, and security practices; internal roadmap, R&D budget, staffing, and technical architecture require private diligence.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VI.A-F1
            finding: Active Intelligence product pages describe AI agents for campaign creation, segmentation, scheduling, optimization, and AI-tool connectors.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-004
          - finding_id: VI.A-F2
            finding: Acquisitions of Postmark, Onesend, and Hilos suggest product expansion through M&A in transactional email, reseller/multi-location marketing, and WhatsApp automation.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-007
        hidden_risks:
          - Acquired product integration can create platform fragmentation, duplicate systems, and product-roadmap execution risk.
          - AI features may increase infrastructure cost, privacy review burden, and model-vendor dependency without clear monetization.
        evidence_gaps:
          - R&D headcount, roadmap commitments, technical architecture diagrams, uptime SLOs, model/vendor contracts, M&A integration plans, and product telemetry.
        follow_up_questions:
