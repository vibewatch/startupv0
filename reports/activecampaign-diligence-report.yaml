report_metadata:
  report_title: ActiveCampaign Public-Source Startup Diligence Report
  target_company: ActiveCampaign
  website: https://www.activecampaign.com/
  known_aliases:
    - ActiveCampaign, LLC
    - ActiveCampaign Postmark
    - Postmark
    - Onesend
    - Hilos
  sector: Marketing automation, customer experience automation, sales CRM, messaging, and transactional email SaaS
  geography: United States headquartered with customers and hubs across North America, Latin America, Europe, APAC, and Australia
  company_stage: Late-stage private SaaS unicorn
  research_date: 2026-05-15
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the target from a public unicorn candidate list, normalized slugs, excluded existing report slugs, and selected ActiveCampaign at random from uncovered private candidates.
    - Prioritized company-owned sources including the about page, product pages, pricing, integrations, customers, security, legal, privacy, terms, and careers pages.
    - Used independent sources including PRNewswire, PCMag, Built In Chicago, Nearshore Americas, MediaPost, Wikipedia, and USPTO mirror pages where direct official pages were accessible.
    - Treated customer ROI metrics, review counts, AI-performance claims, and marketing superiority claims as company-authored unless independently corroborated.
    - Marked private financial statements, customer concentration, churn, cap table, debt, material contracts, insurance, litigation docket details, and employee turnover as not publicly verifiable.
  included_jurisdictions:
    - United States
    - Ireland
    - Brazil
    - Poland
    - Costa Rica
    - Australia
    - Mexico
    - European Union
  excluded_topics:
    - No private financial statements, bank statements, board materials, forecasts, or quality-of-earnings materials were available.
    - No data-room exports for customer cohorts, churn, NRR, top accounts, pipeline, partner economics, or reseller contracts were available.
    - No management, customer, investor, auditor, counsel, employee, supplier, or regulator interviews were performed.
    - No paid court-docket, lien, insurance, sanction-screening, or cap-table databases were accessed.
    - Several public web sources were inaccessible, rate-limited, geo-restricted, or CAPTCHA-protected and are disclosed in limitations.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-15
      notes: The user requested one new public-source unicorn diligence report and a draft PR; no company documents or founder claims were supplied.

founder_claims:
  - founder_claim_id: FC-001
    claim_text: ActiveCampaign helps more than 180,000 customers in more than 170 countries with intelligent marketing automation.
    claim_source: ActiveCampaign about and customers pages
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-003
      - EC-007
      - EC-019
    contradiction_summary: The broad customer-count and country-reach claims are supported by company pages and a 2021 press release, but account-level concentration, churn, and active-paying-customer definitions are not public.
    diligence_follow_up:
      - Request a customer cohort schedule by month, ARR band, geography, product, and channel for the last 36 months.
