    claim_source: ActiveCampaign security, legal, terms, and privacy pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - VIII
    mapped_section_ids:
      - II.B
      - VIII.F
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-016
