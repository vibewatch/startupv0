  - founder_claim_id: FC-004
    claim_text: ActiveCampaign offers email marketing, marketing automation, CRM, SMS, WhatsApp, transactional email, AI agents, and more than 1,000 integrations.
    claim_source: ActiveCampaign product, apps, and Active Intelligence pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - III
      - VI
    mapped_section_ids:
      - II.A
      - III.B
      - VI.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-004
