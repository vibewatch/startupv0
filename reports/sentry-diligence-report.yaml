  - figure_id: F-011
    chapter_id: III
    section_id: III.A
    title: Public customer and usage scale
    figure_type: chart
    description: Public customer and usage anchors demonstrate broad reach while leaving paid-customer mix, concentration, retention, and revenue quality unresolved.
    purpose: Visualize non-financial public scale metrics that drive customer diligence requests.
    spec_schema_ref: figure_spec_shapes.chart
    spec:
      chart_type: bar
      x_axis:
        label: Public scale metric
        unit: null
        scale: categorical
      y_axis:
        label: Count
        unit: count
        scale: logarithmic
      series:
        - series_id: public-scale
          name: Public scale
          unit: count
          data_points:
            - x: Developers
              y: 4000000
              label: 4M+ developers
              evidence_claim_ids: [EC-003]
              source_ids: [SRC-001]
            - x: Organizations
              y: 150000
              label: 150K+ organizations
              evidence_claim_ids: [EC-003]
              source_ids: [SRC-001]
            - x: Customers
              y: 130000
              label: 130K+ customers
              evidence_claim_ids: [EC-009]
              source_ids: [SRC-009]
      annotations:
        - label: Paid mix private
          x: Customers
          y: 130000
          note: Public logo/customer counts do not disclose paid-vs-free mix, top-customer ARR, or retention.
          evidence_claim_ids: [EC-009]
          source_ids: [SRC-009]
    rendering_guidance:
      preferred_format: chart_spec
      display_notes: Use a logarithmic y-axis because developer, organization, and customer counts differ materially in scale.
    evidence_claim_ids: [EC-003, EC-009]
    source_ids: [SRC-001, SRC-009]
    notes: Counts are public company-reported scale anchors and should be reconciled to customer master and revenue records.
