limitations:
  - limitation_id: L-001
    title: Public-source-only scope
    description: This report uses public information only and cannot confirm private financials, contracts, cap table, HR records, legal disclosures, security audit reports, or customer references.
  - limitation_id: L-002
    title: Vendor-published evidence caveat
    description: Sentry product, pricing, customer, security, and subprocessors pages are primary evidence for company claims but may be marketing-oriented and require documentary confirmation.
  - limitation_id: L-003
    title: Secondary database caveat
    description: CB Insights valuation, funding, and status fields are useful external markers but are not substitute evidence for financing documents or current private-market valuation.
  - limitation_id: L-004
    title: Litigation search limitation
    description: CourtListener published-opinion searches are not comprehensive legal clearance and may omit dockets, complaints, private arbitrations, demands, settlements, investigations, and sealed matters.
  - limitation_id: L-005
    title: Headcount/profile limitation
    description: LinkedIn and The Org counts are directional public profile signals and may differ from payroll census, contractor counts, or legal-entity employment records.
  - limitation_id: L-006
    title: Access limitations
    description: Some direct web access was blocked or rate-limited during research; unsupported blocked pages were not used as affirmative evidence.
