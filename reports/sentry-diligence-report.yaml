report_metadata:
  report_title: Sentry Public-Source Startup Diligence Report
  target_company: Sentry
  website: "https://sentry.io/"
  known_aliases:
    - Functional Software, Inc.
    - Functional Software
    - GetSentry
    - getsentry
    - Sentry.io
  sector: Enterprise Tech; developer tools; observability; application performance monitoring; error tracking; AI debugging
  geography: United States headquarters in San Francisco with public offices in Vienna and Toronto and global customer footprint
  company_stage: Late-stage private unicorn / Series E
  research_date: "2026-05-17"
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used only public evidence: company pages, public documentation, GitHub repository/API metadata, CB Insights public pages, LinkedIn, The Org, CourtListener, and public competitor product pages."
    - Prioritized primary company sources for product, pricing, security, subprocessors, customer stories, careers, and legal-policy claims.
    - Treated vendor-published customer stories as partially verified evidence requiring direct customer reference calls.
    - Marked private financial, customer, contract, cap-table, legal, HR, and insurance data as not_publicly_verifiable rather than inferring.
  included_jurisdictions:
    - United States
    - Canada
    - Austria
    - European Union
    - Global SaaS/developer-tools markets
  excluded_topics:
    - No private financial statements, ARR schedules, customer contracts, cap table, debt documents, board materials, audit reports, insurance policies, HR records, or counsel disclosures were available.
    - No paid database access, PACER/RECAP docket downloads, full trademark/patent prosecution review, or customer/supplier/management interviews were conducted.
    - Blocked or inaccessible pages were not used as affirmative evidence except as limitations or source-access notes.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: "2026-05-17"
      notes: User requested a standard-depth public-source startup diligence YAML report for Sentry at reports/sentry-diligence-report.yaml.

founder_claims:
