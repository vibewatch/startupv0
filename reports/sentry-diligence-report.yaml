risk_register:
  - risk_id: R-001
    title: Financial and unit-economics opacity
    category: financial
    severity: high
    likelihood: high
    impact: high
    description: Private ARR, revenue growth, gross margin, burn, runway, cash, debt, and cloud/model COGS prevent valuation underwriting from public evidence alone.
    evidence_claim_ids: [EC-004]
    affected_chapters: [I, III, V]
    mitigation: Obtain audited financials, management accounts, ARR bridge, COGS support, cash/debt schedules, and cohort economics.
  - risk_id: R-002
    title: Private valuation and preference-stack risk
    category: financial
    severity: medium
    likelihood: medium
    impact: high
    description: Public $3B unicorn marker does not disclose current mark, preferences, option pool, debt, warrants, secondaries, or liquidation stack.
    evidence_claim_ids: [EC-001, EC-002]
    affected_chapters: [I]
    mitigation: Review cap table, financing documents, investor rights, 409A, secondary transactions, and waterfall model.
  - risk_id: R-003
    title: Observability platform competition
    category: market
    severity: high
    likelihood: high
    impact: high
    description: Datadog, New Relic, Dynatrace, Grafana Cloud, Honeycomb, and bundled cloud platforms can pressure standalone monitoring/debugging spend.
    evidence_claim_ids: [EC-022, EC-023, EC-024, EC-026]
    affected_chapters: [III, IV, V, VI]
    mitigation: Validate win/loss, pricing pressure, displacement churn, module adoption, roadmap, and retention by competitor.
  - risk_id: R-004
    title: Customer concentration and retention opacity
    category: commercial
    severity: high
    likelihood: medium
    impact: high
    description: Public customer counts and case studies do not prove paid customer reconciliation, top-account concentration, NRR/GRR, or renewal quality.
    evidence_claim_ids: [EC-009, EC-013]
    affected_chapters: [III, V]
    mitigation: Obtain customer-level ARR schedules, churn/expansion cohorts, renewal calendar, and direct reference confirmations.
  - risk_id: R-005
    title: Telemetry security privacy and subprocessor exposure
    category: legal_compliance
    severity: high
    likelihood: medium
    impact: high
    description: Sentry ingests customer telemetry and relies on cloud/AI/support subprocessors, creating privacy, breach, contractual, and vendor-risk exposure.
    evidence_claim_ids: [EC-014, EC-015, EC-021]
    affected_chapters: [III, VIII]
    mitigation: Review SOC/ISO reports, pen tests, incident logs, DPAs, data maps, DPIAs/TIAs, subprocessor assessments, and customer security obligations.
  - risk_id: R-006
    title: AI debugging execution and governance risk
    category: technology
    severity: medium
    likelihood: medium
    impact: high
    description: Seer/AI features may introduce model COGS, hallucinated fixes, data-use objections, security risks, and governance/regulatory exposure.
    evidence_claim_ids: [EC-015, EC-019, EC-025]
    affected_chapters: [VI, VIII]
    mitigation: Review AI feature metrics, model contracts, evaluation/guardrail process, cost curves, data-retention controls, and customer opt-out terms.
  - risk_id: R-007
    title: Multi-jurisdiction tax exposure
    category: tax
    severity: medium
    likelihood: medium
    impact: medium
    description: US headquarters, Canada/Austria offices, and global customers can create income tax, VAT/GST, transfer-pricing, payroll, and PE exposure.
    evidence_claim_ids: [EC-003, EC-016]
    affected_chapters: [II]
    mitigation: Review tax returns, nexus study, VAT/GST registrations, transfer pricing, payroll compliance, and audit correspondence.
  - risk_id: R-008
    title: Fair-source license and OSS/IP tension
    category: legal_compliance
    severity: medium
    likelihood: medium
    impact: medium
    description: FSL-1.1-Apache-2.0 future licensing and public repo/community posture may create adoption, compliance, or IP-ownership diligence issues.
    evidence_claim_ids: [EC-007, EC-008]
    affected_chapters: [V, VI, VIII]
    mitigation: Review IP assignments, license compliance, contributor agreements, third-party dependency scan, and community/customer feedback.
  - risk_id: R-009
    title: HR census retention and compensation opacity
    category: people
    severity: medium
    likelihood: medium
    impact: medium
    description: Public headcount signals conflict and do not disclose payroll census, attrition, compensation, equity grants, or employment claims.
    evidence_claim_ids: [EC-016, EC-017, EC-018]
    affected_chapters: [VII]
    mitigation: Obtain HR census, payroll, compensation, equity, attrition, engagement, recruiting, and employment legal records.
  - risk_id: R-010
    title: Legal disclosure incompleteness
    category: legal_compliance
    severity: high
    likelihood: medium
    impact: high
    description: Public legal pages and scoped public-record searches cannot identify all litigation, regulatory, contractual, insurance, corporate, or IP issues.
    evidence_claim_ids: [EC-020, EC-021]
    affected_chapters: [VIII]
    mitigation: Conduct counsel-led legal diligence and review disclosure schedules, contracts, policies, claims logs, and insurance materials.

