executive_summary:
  overall_assessment: Kong appears eligible for public standard diligence as an active private unicorn/Series E company. Public evidence supports CB Insights unicorn-list inclusion, active SEC Form D filings, broad API/AI product scope, public open-source repositories, selected enterprise customer stories, partner channels, 600+ employee company claim and active 2026 press/GitHub footprint. Investment-grade conclusions remain blocked by private financials, cap table, customer concentration, legal/IP, HR, security and contract gaps.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The case depends on proving durable enterprise API/AI platform revenue, efficient GTM, defensible open-source-to-enterprise conversion, strong security/reliability controls and a valuation/cap table that reconciles public CB Insights and Form D signals.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Public company pages, documentation and GitHub sources verify a broad Kong API/AI connectivity product surface.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
        - EC-012
        - EC-016
        - EC-017
    - founder_claim_id: FC-003
      summary: Kong/kong and Insomnia are active public open-source repositories with large GitHub communities.
      evidence_claim_ids:
        - EC-016
        - EC-017
    - founder_claim_id: FC-007
      summary: Kong publicly identifies founder-led leadership, including Augusto Marietti as CEO/co-founder and Marco Palladino as CTO/co-founder.
      evidence_claim_ids:
        - EC-007
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR, margins, cash, debt and runway are not public.
    - risk_id: R-002
      summary: Public valuation anchors require reconciliation before relying on a $2B valuation.
    - risk_id: R-003
      summary: Customer concentration, churn and current contract status are not publicly verifiable.
    - risk_id: R-006
      summary: API/AI gateway security and reliability exposure is high-impact and needs SOC/security review.
    - risk_id: R-009
