risk_register:
  - risk_id: R-001
    risk_title: Financial quality and runway are private
    risk_category: financial
    severity: high
    likelihood: unknown
    description: No audited financial statements, cash, debt, burn, ARR, gross margin, revenue-recognition or runway data were public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited/management financials, bank statements, debt schedule, revenue waterfall, ARR bridge, cohort retention and board plan.
  - risk_id: R-002
    risk_title: Public valuation anchors need reconciliation
    risk_category: financing
    severity: medium
    likelihood: medium
    description: CB Insights public unicorn row shows $2B while CB profile data includes a $1.4B 2020 valuation anchor and blurred current valuation fields.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Reconcile all valuation claims to priced-round documents, 409A history and secondary-market transactions.
  - risk_id: R-003
    risk_title: Customer revenue concentration and churn are unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public case studies identify customers but do not reveal top-customer ARR, concentration, NRR, churn, renewals or contract terms.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request customer cohort data, top accounts by ARR, renewal pipeline, churn reasons and direct customer references.
  - risk_id: R-004
    risk_title: Competition from hyperscalers and open-source gateways
    risk_category: market
    severity: high
    likelihood: high
    description: Kong competes with Apigee, Tyk, Solo/Gloo and likely hyperscaler-native API gateways, increasing pricing and distribution pressure.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Benchmark win/loss, price realization, attach rates, sales cycle and migration costs against named competitors.
  - risk_id: R-005
    risk_title: Open-source support and monetization burden
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Large public open-source surfaces create maintenance, security-response and community expectations while enterprise conversion is not public.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VIII.D
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request open-source governance, security SLA, maintainer staffing, enterprise conversion funnel and support-ticket metrics.
  - risk_id: R-006
    risk_title: API gateway security and reliability exposure
    risk_category: product
    severity: high
    likelihood: medium
    description: Kong sits in critical API/AI traffic paths; defects, vulnerabilities or misconfiguration can create high-impact customer incidents.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Review SOC 2/ISO reports, penetration tests, CVE history, incident postmortems, SLA credits and customer security questionnaires.
  - risk_id: R-007
    risk_title: AI Gateway and agentic-roadmap execution risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Kong is expanding into AI Gateway, AI connectivity and legacy migration amid fast-moving AI infrastructure competition.
    impacted_chapter_ids:
      - II
      - VI
      - V
    impacted_section_ids:
      - II.A
      - VI.B
      - V.A
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request roadmap, AI Gateway revenue/usage, model-provider economics, safety controls, backlog and customer references.
  - risk_id: R-008
    risk_title: Leadership, remote workforce and retention risk
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Public evidence shows founder-led leadership and 600+ employees, but org health, attrition, compensation and succession are private.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.D
      - VII.G
      - VI.A
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request HRIS, attrition, engagement survey, compensation/equity plan, key-person dependencies and succession plan.
  - risk_id: R-009
    risk_title: Legal, regulatory and IP schedules not public
    risk_category: legal
    severity: high
    likelihood: unknown
    description: Complete litigation, regulatory, insurance, material-contract, trademark/patent and open-source compliance schedules were not publicly verified.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Counsel should run docket/regulatory/IP searches and review contracts, policies, insurance and compliance reports.
  - risk_id: R-010
    risk_title: Cap-table complexity and financing terms unknown
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Multiple Form D rounds and CB Insights funding data indicate substantial financing, but preference stack, option pool, debt and investor rights are private.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request fully diluted cap table, stock plan, warrants, SAFEs/notes, debt, investor rights, liquidation waterfall and secondary transactions.
  - risk_id: R-011
    risk_title: Supplier and platform dependency not quantified
    risk_category: operational
    severity: medium
    likelihood: unknown
    description: Kong products depend on cloud marketplaces, Kubernetes/Envoy ecosystems and LLM/model-provider integrations, but supplier contracts and concentration are not public.
    impacted_chapter_ids:
      - III
      - II
      - VI
    impacted_section_ids:
      - III.E
      - II.A
      - VI.B
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Request cloud/marketplace, model-provider, infrastructure, data-processing and support-vendor contracts with spend and termination rights.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts, revenue by product/channel/geography, gross margin, cash, debt, burn and runway.
    why_it_matters: Required to assess financial quality and valuation support.
    suggested_source_or_request: Request audited statements, monthly P&L/BS/CF, ARR bridge, bank/debt schedules and board budget.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, liquidation preferences, investor rights, options, warrants, SAFEs/notes and debt.
    why_it_matters: Multiple financings and valuation anchors create dilution/preference risk.
    suggested_source_or_request: Request cap table, charter, financing docs, stock plan, grants and liquidation waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.D
    missing_information: Reconciliation of CB Insights $2B unicorn valuation, CB profile $1.4B 2020 anchor and 2024 Series E/Form D data.
    why_it_matters: Valuation is a central investment premise and public sources conflict or are incomplete.
    suggested_source_or_request: Request 409A, board valuation materials, priced-round documents and secondary transaction details.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, usage, gross margin, support cost, security incidents and roadmap commitments.
    why_it_matters: Kong has broad product surface but economics and reliability are private.
    suggested_source_or_request: Request product KPI dashboard, roadmap, SLAs, incident history and SKU P&L.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.A
    missing_information: Top customers by ARR/application and current contract/renewal status.
    why_it_matters: Public case studies do not reveal concentration or retention.
    suggested_source_or_request: Request top-25 customer schedule, renewal pipeline, NRR/churn and reference calls.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Top suppliers and platform dependencies by spend, SLA and termination rights.
    why_it_matters: Cloud/model/open-source dependencies can affect reliability and margin.
    suggested_source_or_request: Request vendor spend, contracts, DPAs, subprocessor list and SLA history.
    priority: medium
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, market share, price benchmarks and churn-to-competitor analysis.
    why_it_matters: Competition from hyperscalers and OSS gateways affects pricing and growth durability.
    suggested_source_or_request: Request competitive analysis, Gong/CRM win-loss data and third-party analyst reports.
    priority: high
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, quota attainment, CAC, payback, marketing attribution and channel revenue mix.
    why_it_matters: GTM efficiency determines funding needs and valuation quality.
    suggested_source_or_request: Request pipeline, quotas, attainment, CAC/LTV, channel mix and budget-to-actuals.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.A
    missing_information: Engineering/R&D org chart, release velocity, vulnerability backlog, SBOM and open-source governance.
    why_it_matters: Open-source API infrastructure requires strong security and maintenance processes.
    suggested_source_or_request: Request R&D org, roadmap, CVE process, SBOM, CLAs and security reports.
    priority: high
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS, headcount history/projections, compensation bands, attrition, engagement and employee-relations matters.
    why_it_matters: 600+ employee remote/global claim requires operational and compliance verification.
    suggested_source_or_request: Request HRIS export, payroll, attrition, comp/equity plan and employee-relations schedules.
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation, regulatory, IP, insurance and material-contract schedules.
    why_it_matters: Legal exposure is not cleared by public source review.
    suggested_source_or_request: Counsel review of dockets, agency records, policies, contracts, IP registries and claims.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official trademark/patent/copyright ownership, assignments and third-party license compliance.
    why_it_matters: IP and OSS compliance are critical to product defensibility and enterprise indemnity.
    suggested_source_or_request: Request IP schedule, registry reports, assignments, CLAs, SBOM and OSS scan.
    priority: high
