research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized CB Insights unicorn and company profile data, SEC EDGAR Form D filings, Kong company pages, Kong developer documentation, GitHub repositories, customer/partner pages and accessible competitor sources.
    - Treated company-owned website, pricing and case-study claims as evidence of public claims, not independent proof of financial/customer outcomes.
    - Marked financial statements, cap table, customer concentration, supplier spend, HRIS, legal, regulatory, IP, insurance and contract details as not_publicly_verifiable where private records are required.
    - Did not bypass paywalls, authentication, CAPTCHAs or access controls; some company pages were fetched via a public reader proxy due direct egress blocks.
  included_jurisdictions:
    - United States / Delaware
    - California / San Francisco public footprint
    - Public global markets where Kong markets API/AI connectivity products
    - Open-source GitHub ecosystem
  excluded_topics:
    - Private data-room materials, non-public financials, customer calls, HRIS, security reports, full docket searches, official IP registry exports, insurance policies and contract schedules were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for Kong diligence report
      type: workflow_request
      date_received: 2026-06-13
      notes: No pitch deck, management responses, financial model, customer references or data room were provided.
    - material_id: UPM-002
      title: Candidate metadata from current unicorn list
      type: user_provided_public_metadata
      date_received: 2026-06-13
      notes: Kong; slug kong; CB Insights valuation $2B; joined 12/31/2020; United States/San Francisco; Enterprise Tech; investors NEA, CRV, Index Ventures.
