    title: Insurance, material contracts and commercial commitments stub
    chapter_id: VIII
    section_id: VIII.E
    purpose: Identify private legal/contract schedules required for an enterprise SaaS/open-source company.
    columns:
      - name: Schedule
        description: Public evidence
      - name: Verification status
      - name: Why it matters
      - name: Request
    rows:
      - row_id: T-023-R1
        values:
          Schedule: Insurance coverage
          Public evidence: Not public
          Verification status: not_publicly_verifiable
          Why it matters: Cyber/E&O/D&O coverage is critical for API infrastructure provider
          Request: Insurance certificates, policies, limits, exclusions, claims history.
        evidence_claim_ids:
          - EC-026
        source_ids:
          - SRC-013
      - row_id: T-023-R2
        values:
          Schedule: Customer contracts / SLAs / DPAs
          Public evidence: Enterprise tier mentions higher SLAs, CSMs, TAMs and professional services; contract terms not public
          Verification status: partially_verified packaging; private terms
          Why it matters: SLA credits, liability caps, security terms and DPAs drive risk
          Request: Top customer MSAs, SLAs, DPAs, liability caps and security addenda.
        evidence_claim_ids:
          - EC-009
          - EC-026
        source_ids:
          - SRC-009
      - row_id: T-023-R3
        values:
          Schedule: Partner, marketplace and supplier contracts
          Public evidence: Public partner categories and AWS Marketplace links; agreements not public
          Verification status: partially_verified relationships; private terms
          Why it matters: Take rates, co-sell obligations and termination rights affect revenue and resilience
          Request: Marketplace, reseller, SI, cloud, model-provider and subprocessor contracts.
        evidence_claim_ids:
          - EC-009
          - EC-014
          - EC-026
        source_ids:
          - SRC-009
          - SRC-012
      - row_id: T-023-R4
        values:
          Schedule: Open-source and commercial license commitments
          Public evidence: Public repository licenses visible; commercial terms not public
          Verification status: partially_verified
          Why it matters: OSS obligations, indemnity and enterprise license terms affect monetization
          Request: OSS policy, CLA, third-party license scan and standard enterprise license terms.
        evidence_claim_ids:
          - EC-027
        source_ids:
