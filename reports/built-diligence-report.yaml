report_metadata:
  report_title: Built Technologies Startup Diligence Report
  target_company: Built Technologies
  website: https://getbuilt.com/
  known_aliases:
    - Built
    - Built Technologies
    - Built Technologies, Inc.
  sector: Construction and real estate finance technology, construction loan administration, draw management and payments
  geography: United States
  company_stage: Private unicorn / growth-stage construction-fintech software company
  research_date: 2026-06-16
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing reports and selected this target from the CB Insights public unicorn list.
    - Used public company, news/search-result and market-database sources only; no private data room or management
      interview was available.
    - Treated company-published claims as verified only for public existence unless independently corroborated.
    - Marked financial, legal, customer, cap-table, HR, security and contract gaps as not_publicly_verifiable where
      private evidence is required.
  included_jurisdictions:
    - United States
    - Publicly referenced global jurisdictions
  excluded_topics:
    - Private financial statements, cap table, contracts, security reports, customer references, board materials, legal
      docket exports and regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-16
      notes: No pitch deck, financial model, data room or founder responses were provided.
