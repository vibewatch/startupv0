executive_summary:
  overall_assessment: Built Technologies appears to be an eligible private unicorn based on CB Insights and public
    financing/product evidence. The company has public evidence of active operations, products and customer/partner
    signals, but investment-grade diligence remains incomplete because financials, cap table, customer concentration,
    contracts, security artifacts and legal/regulatory records are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The investability of Built Technologies depends
    on proving durable revenue quality, retention, margin, compliance, customer concentration, security/legal posture
    and current valuation support beyond the public $1.50B unicorn-list anchor.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Built Technologies as a private unicorn at $1.50B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Public company materials verify an active platform in Construction and real estate finance technology,
        construction loan administration, draw management and payments.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-004
      summary: Public materials identify customer or partner examples, subject to concentration and contract diligence.
      evidence_claim_ids:
        - EC-005
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Stale headline valuation and private financial quality
    - risk_id: R-002
      summary: Construction and CRE cycle sensitivity
    - risk_id: R-006
      summary: Sensitive loan and project-data security risk
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue quality, gross margin, cash, debt and budget-to-actuals.
    - Cap table, preferences, investor rights, option pool and current valuation support.
    - Top-customer revenue/GTV, contracts, churn, NRR and independent customer references.
    - Security, privacy, legal, regulatory, IP, insurance and material-contract data room.
    - Headcount by function, turnover, compensation and key employment agreements.
  recommended_next_steps:
    - Run financial quality-of-revenue and valuation-support diligence before relying on headline unicorn valuation.
    - Request customer cohort schedules, top contracts and independent references.
    - Have counsel and security specialists review legal, regulatory, IP, privacy, security and material-contract
      artifacts.
    - Benchmark pricing, win/loss, retention and roadmap against direct competitors.
