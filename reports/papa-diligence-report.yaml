risk_register:
  - risk_id: R-001
    risk_title: Financial quality and revenue visibility are not publicly verifiable
    risk_category: financial
    severity: high
    likelihood: high
    description: Papa is private; public sources do not disclose audited financials, ARR, gross margin, AR aging, backlog, or unit economics, while PMPM and nonrenewal signals indicate revenue-quality sensitivity.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-012
      - EC-015
    mitigation_or_diligence_request: Require audited financials, monthly management accounts, ARR bridge, customer revenue cohorts, AR aging, and gross margin by SKU.
  - risk_id: R-002
    risk_title: Customer concentration and payer renewal risk
    risk_category: customer
    severity: high
    likelihood: high
    description: Public customer examples are payer-centric, and late-2023 reporting indicated nearly three dozen payer/employer nonrenewals for 2024.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.B
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-015
    mitigation_or_diligence_request: Request current customer list, ACV by customer, renewal dates, churn reasons, QBRs, references, and nonrenewal remediation.
  - risk_id: R-003
    risk_title: Healthcare privacy, biometric, geolocation, and HIPAA compliance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Papa’s privacy policy discloses health-related data, faceprints, and geolocation; assurance portal lists HIPAA/SOC2, requiring scope verification.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
      - VIII.E
      - VIII.F
    evidence_claim_ids:
      - EC-007
      - EC-008
    mitigation_or_diligence_request: Obtain SOC2 report, HIPAA risk analysis, BAAs, data map, consent logs, DPIAs, breach log, regulator inquiries, and subprocessor list.
  - risk_id: R-004
    risk_title: Workforce/provider quality and safety risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Papa’s model relies on independent Pals entering homes of vulnerable populations; public safety framework exists, but complaint/allegation reporting requires verification.
    impacted_chapter_ids:
      - III
      - VII
      - VIII
    impacted_section_ids:
      - III.E
      - VII.F
      - VIII.C
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
      - EC-015
    mitigation_or_diligence_request: Review background checks, training, active Pal cohorts, incident/complaint logs, insurance claims, removals, and quality audits.
  - risk_id: R-005
    risk_title: Independent-contractor classification and wage/hour exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Public litigation challenges Pal classification; class certification denial does not eliminate individual, collective, arbitration, or regulatory exposure.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.D
      - VII.F
      - VIII.A
      - VIII.F
    evidence_claim_ids:
      - EC-009
      - EC-016
      - EC-017
    mitigation_or_diligence_request: Obtain Pal agreements, arbitration opt-out logs, wage/hour audits, state classification memos, claims inventory, and settlement/reserve schedule.
  - risk_id: R-006
    risk_title: Competition and differentiation risk
    risk_category: market
    severity: medium
    likelihood: high
    description: Multiple competitors and substitutes offer in-home care, care marketplaces, and aging-services software; Papa’s moat must come from payer workflow, data, outcomes, safety, and network density.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
    evidence_claim_ids:
      - EC-022
      - EC-023
      - EC-024
      - EC-025
    mitigation_or_diligence_request: Review win/loss, pricing, customer references, data/IP moat, RFP scores, and retention versus competitors.
  - risk_id: R-007
    risk_title: Outcome-evidence generalization risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Public outcomes evidence is promising but often company-selected, preliminary, or customer-specific; ROI claims need current, independently reproducible support.
    impacted_chapter_ids:
      - I
      - II
      - III
      - V
    impacted_section_ids:
      - I.B
      - II.A
      - III.A
      - V.A
    evidence_claim_ids:
      - EC-002
      - EC-012
      - EC-021
    mitigation_or_diligence_request: Request raw claims extracts, study protocols, third-party evaluations, holdout cohorts, confidence intervals, and customer attestations.
  - risk_id: R-008
    risk_title: Third-party and operational dependency risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Service depends on Pals, mobile apps, care center, dashboards, ride/delivery/payment vendors, and data integrations.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.E
      - VI.A
      - VIII.F
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-008
