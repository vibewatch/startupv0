  - founder_claim_id: FC-005
    claim_text: Papa reached unicorn scale with a $150 million Series D at a $1.4 billion valuation.
    claim_source: Global Venturing; CB Insights unicorn-list pointer supplied by user
    claim_date: 2021-11-05
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-010
    contradiction_summary: null
    diligence_follow_up:
      - Obtain cap table, preference stack, option pool, debt, SAFEs, secondary transactions, and current 409A/valuation materials.
  - founder_claim_id: FC-006
    claim_text: Papa Pals are independent contractors providing nonmedical support rather than employees or clinical caregivers.
    claim_source: Papa terms and Pal recruiting page
    claim_date: null
    mapped_chapter_ids:
