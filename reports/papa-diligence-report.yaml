report_metadata:
  report_title: Papa Diligence Research Report
  target_company: Papa
  website: https://www.papa.com/
  known_aliases:
    - Papa Inc.
    - Papa Health
    - Papa Pals
    - papa.com
    - papa.health
  sector: Healthcare & Life Sciences / social care / companion care
  geography: United States
  company_stage: Private Series D unicorn candidate
  research_date: 2026-06-15
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company-owned pages for product, leadership, privacy, security, trust and safety, and Pal recruiting.
    - Third-party financing, customer, legal, scientific, competitor, and reputational sources fetched via r.jina.ai and direct public search snippets where accessible.
    - Public-only diligence; no paywall bypassing, private systems, or non-public personal contact details.
    - Checklist chapters I-VIII mapped to public evidence, evidence gaps, structured tables, figures, risk register, and follow-up requests.
  included_jurisdictions:
    - United States
    - Florida
    - California
    - Federal courts / N.D. California
    - HIPAA / U.S. healthcare privacy context
  excluded_topics:
    - Non-public customer references
    - Private financial statements and cap table
    - Private personal contact details
    - Paywalled source contents not accessible through public fetches
  user_provided_materials:
    - material_id: MAT-001
      title: CB Insights unicorn-list source row for Papa
      type: public-database-extract pointer
      date_received: 2026-06-15
      notes: "User supplied row: Papa | slug papa | valuation $1.40B | United States | Healthcare & Life Sciences."
    - material_id: MAT-002
      title: Eligibility search notes for Papa private/unicorn status
      type: public-search-summary pointer
      date_received: 2026-06-15
      notes: User supplied summary indicated private/pre-IPO status and Tracxn data; final report relies on public sources fetched in run where possible.
founder_claims:
  - founder_claim_id: FC-001
