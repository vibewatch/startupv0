  - founder_claim_id: FC-003
    claim_text: Papa improves outcomes such as loneliness, cost of care, readmissions, ED utilization, preventive care, churn, and satisfaction.
    claim_source: Papa health-plan page, customer case-study reporting, and published abstract
    claim_date: null
    mapped_chapter_ids:
      - I
      - II
      - III
    mapped_section_ids:
      - I.B
      - II.A
      - III.A
    verification_status: partially_verified
    confidence: medium
