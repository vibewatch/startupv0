    claim_source: Papa public homepage and product pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - V
    mapped_section_ids:
      - II.A
      - V.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-003
    contradiction_summary: null
