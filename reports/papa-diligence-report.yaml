      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
      - EC-006
    contradiction_summary: Customer-drop and abuse-allegation reporting makes incident taxonomy, complaint handling, and remediation a critical diligence topic.
    diligence_follow_up:
