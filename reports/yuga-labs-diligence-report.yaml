          - EC-002
          - EC-003
          - EC-028
  - chapter_id: II
    title: Products
    chapter_summary: Yuga's public materials clearly show a portfolio of ape-linked collections, Otherside and ApeChain-linked initiatives, but product profitability, royalty capture, roadmap economics and unit-level usage remain private.
    founder_claim_ids:
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
      - EC-007
    risk_ids:
      - R-003
      - R-004
      - R-005
      - R-006
