        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Visible strategic relationships cluster around ApeCoin/ApeChain, major marketplaces, Amazon-linked redemption and counterparties from Yuga's portfolio transitions.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Public pages and reporting identify platform, token and IP-transfer counterparties, but not the economics of those relationships.
            evidence_claim_ids:
              - EC-011
              - EC-012
              - EC-029
            risk_ids:
              - R-005
              - R-006
