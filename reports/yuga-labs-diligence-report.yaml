executive_summary:
  overall_assessment: Eligible. Public sources reviewed on 2026-06-17 support that Yuga Labs remains an active standalone private unicorn, but the public record is much stronger on brand, IP and community than on monetization, profitability, contracts or cap-table economics.
  investment_or_diligence_thesis: Yuga retains one of the strongest branded web3 ecosystems in the public market record, yet the business appears to be narrowing around Apes, Otherside and ApeChain after layoffs and portfolio divestitures. Any investment thesis therefore depends on proving that the narrowed strategy can convert community attention into durable, legally resilient and profitable revenue.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights still lists Yuga Labs as a US$4B private unicorn.
      evidence_claim_ids:
        - EC-001
        - EC-028
    - founder_claim_id: FC-002
      summary: Yuga's current public portfolio and ecosystem surface are easy to verify from owned sites.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-005
      summary: The SEC investigation closed without enforcement in 2025.
      evidence_claim_ids:
        - EC-024
    - founder_claim_id: FC-007
      summary: Yuga remained an active standalone company through its 2026 CEO transition.
      evidence_claim_ids:
        - EC-021
        - EC-028
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and current monetization are still opaque.
    - risk_id: R-003
      summary: The business remains exposed to volatile NFT-market demand and price cycles.
    - risk_id: R-004
      summary: Otherside and ApeChain require difficult product execution that is not yet publicly validated.
    - risk_id: R-009
      summary: Core IP and litigation posture remain legally significant despite some wins.
  key_evidence_gaps:
    - Audited revenue, royalty, commerce, token and cash-flow data by product and channel.
    - Fully diluted cap table, debt, token/treasury economics and any side-letter or preference structure.
    - Top customer, licensing, partner and marketplace concentration plus contract economics.
    - Otherside product KPIs, security/incident history, creator economics and roadmap cost.
    - Insurance tower, full litigation/regulatory memo, and material commercial agreements.
  recommended_next_steps:
    - Run full revenue-quality diligence focused on royalties, commerce, licensing and token-adjacent economics.
    - Have counsel review Yuga v. Ripps remand posture, the dismissed investor case record, and all marketplace/licensing contracts.
    - Request Otherside KPI dashboard, architecture overview, security artifacts and post-divestiture operating plan.
    - Benchmark Yuga against direct web3/IP peers using buyer references, retention, pricing power and creator-platform traction.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources support Yuga's eligibility as an active private unicorn and confirm a March 2022 US$450M financing at a US$4B post-money valuation, but audited financials, revenue quality, cash, debt, projections and full cap-table economics remain private.
    founder_claim_ids:
      - FC-001
      - FC-007
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-028
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: The reviewed public record did not include audited income statements, balance sheets, cash flows, backlog, accounts receivable aging or product-by-product revenue disclosure.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources disclosed valuation, product and marketplace signals rather than financial statements or management accounts.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-001
        hidden_risks:
          - R-001 persists because brand strength and secondary-market activity cannot substitute for audited operating performance.
        evidence_gaps:
          - Audited FY2023-FY2025 financial statements and monthly management accounts were not public.
          - Product/channel/geography revenue mix and AR aging were not public.
        follow_up_questions:
          - Provide audited financials, monthly KPI pack, cash/debt schedule and backlog/AR aging detail.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-003
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public evidence supports the 2022 financing event and current private-unicorn status, but no public forecast model, downside case or valuation bridge was located.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: The only hard public valuation anchors in this review were the 2022 US$450M / US$4B financing and the current CB Insights US$4B row.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-028
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - R-001 remains material because current value capture across royalties, commerce and ecosystem initiatives is not public.
        evidence_gaps:
          - No quarterly projections, sensitivity analysis, capex plan or external financing assumptions were public.
        follow_up_questions:
          - Provide the board-approved model, scenario analysis and valuation bridge from 2022 to 2026.
        table_ids: []
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-028
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Investor names and the corporate entity are public, but fully diluted ownership, liquidation preferences, debt, option pool and ApeCoin-linked economics were not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: The public record reveals the Delaware corporation and some investor names but not the instruments or economics behind them.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
              - EC-008
              - EC-011
            risk_ids:
