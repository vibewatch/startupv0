  - chapter_id: IV
    title: Competition
    chapter_summary: Public evidence suggests Yuga competes on brand/IP intensity, secondary-market liquidity and immersive-world ambition against other NFT-native IP ecosystems and creator-platform worlds.
    founder_claim_ids:
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-006
      - EC-013
      - EC-014
      - EC-015
      - EC-030
