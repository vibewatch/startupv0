risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation-underwriting gap
    risk_category: financial
    severity: high
    likelihood: high
    description: No public audited financials, revenue bridge, gross margin, cash, debt or board plan support the current valuation anchor.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
      - V.E
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
    mitigation_or_diligence_request: Request audited FY2023-FY2025 financials, monthly KPI pack, revenue bridge, cash/debt schedule and board-approved plan.
  - risk_id: R-002
    risk_title: Cap-table and token-economics opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public investor names do not disclose ownership, preferences, dilution, debt, or economic capture from ApeCoin/ApeChain-adjacent structures.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - I.D
      - VIII.F
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-011
    mitigation_or_diligence_request: Request fully diluted cap table, debt, token holdings, side letters and ecosystem-agreement summary.
  - risk_id: R-003
    risk_title: Secondary-market demand volatility
    risk_category: market
    severity: high
    likelihood: high
    description: NFT floor prices and brand attention are active but clearly cyclical, volatile and vulnerable to sentiment shocks.
