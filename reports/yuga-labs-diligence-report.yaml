          - IV.A.1
          - IV.A.2
        summary: In sampled public materials, Azuki competes for premium NFT-media mindshare while The Sandbox competes for creator-platform and virtual-world attention; Yuga appears strongest where brand and ape-linked liquidity intersect, but its execution burden is also highest.
        verification_status: partially_verified
