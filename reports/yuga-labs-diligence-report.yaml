      - row_id: T-022-R2
        values:
          asset_or_right: Site content and trademarks
          public_evidence: Terms say Yuga or its licensors retain all rights to site content and prohibit unapproved use of Yuga trademarks or mirrored pages.
          current_public_signal: Public contract surface asserts broad IP control over site assets.
          diligence_caveat: Does not prove chain-of-title or broader asset-licensing terms.
        evidence_claim_ids:
          - EC-008
        source_ids:
