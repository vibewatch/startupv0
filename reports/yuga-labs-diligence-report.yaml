      - name: current_public_signal
        description: current public signal
      - name: diligence_caveat
        description: diligence caveat
    rows:
      - row_id: T-022-R1
        values:
          asset_or_right: BAYC marks
          public_evidence: Ninth Circuit opinion held that Yuga's NFTs can be trademarked and described district-court findings that Yuga used BAYC marks since approximately April 2021.
          current_public_signal: Core IP remains litigated but legally recognized as trademark-capable.
          diligence_caveat: Remand means ultimate infringement relief still matters.
        evidence_claim_ids:
