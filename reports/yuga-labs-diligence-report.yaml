diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, revenue bridge and cash/debt schedules
    why_it_matters: Public valuation anchors cannot be underwritten without financial quality and liquidity support.
    suggested_source_or_request: Request directly from company management, investors and accountants.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table and ApeCoin/ApeChain economic-rights summary
    why_it_matters: Ownership, preferences and token-linked economics may materially change realized equity value.
    suggested_source_or_request: Request directly from company management, investors and counsel.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level revenue, royalty rates and gross margin
    why_it_matters: The public record shows products and markets, but not which products actually make money.
    suggested_source_or_request: Request product P&Ls and revenue-recognition policy from management.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer, licensing and channel concentration
    why_it_matters: Community metrics do not reveal revenue durability or renewal risk.
    suggested_source_or_request: Request customer/partner concentration schedules and contract summaries.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment and marketing budget data
    why_it_matters: Public GTM surfaces cannot be converted into economics without operating metrics.
    suggested_source_or_request: Request sales and marketing KPI dashboard from management.
    priority: medium
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap milestone tracking, development cost and product KPI evidence
    why_it_matters: Otherside and ApeChain execution risk is central to the current strategy.
    suggested_source_or_request: Request roadmap, budget, KPI dashboard and incident history from product/security teams.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS headcount, attrition and retention plan
    why_it_matters: Leadership churn and layoffs cannot be sized without workforce data.
    suggested_source_or_request: Request HRIS export, org chart and retention framework.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts and insurance tower
    why_it_matters: Marketplace, IP-transfer and licensing economics sit mostly behind non-public contracts.
    suggested_source_or_request: Request contract register, key agreements and insurance policies from counsel.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Full regulatory correspondence and counsel memos
    why_it_matters: The SEC closure is helpful, but broader NFT/token compliance risk still matters.
    suggested_source_or_request: Request all regulatory correspondence and internal legal analyses.
    priority: high
