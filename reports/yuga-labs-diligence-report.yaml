  - table_id: T-021
    title: Company-initiated litigation and IP enforcement
    chapter_id: VIII
    section_id: VIII.B
    purpose: Summarize Yuga's publicly visible offensive IP litigation.
    columns:
      - name: case
        description: case
      - name: forum
        description: forum
      - name: public_status
        description: public status
      - name: key_public_holding
        description: key public holding
      - name: diligence_implication
        description: diligence implication
    rows:
      - row_id: T-021-R1
        values:
          case: Yuga Labs, Inc. v. Ryder Ripps and Jeremy Cahen
          forum: Ninth Circuit No. 24-879 following C.D. California proceedings
          public_status: Appellate panel affirmed in part, reversed in part and remanded on 2025-07-23
          key_public_holding: NFTs can be trademarked, but summary judgment for Yuga on infringement and cybersquatting was reversed because consumer confusion was not proven as a matter of law.
          diligence_implication: Yuga has credible IP rights but litigation outcome and remedies remained unsettled in the reviewed public record.
        evidence_claim_ids:
          - EC-025
        source_ids:
          - SRC-009
      - row_id: T-021-R2
        values:
          case: Remand-stage status after July 2025 opinion
          forum: District court follow-on status
          public_status: not publicly verified in this review
          key_public_holding: Publicly accessible post-opinion docket workup was not completed here.
          diligence_implication: Counsel should confirm whether any settlement, new trial, injunction or fee order changed the posture after remand.
        evidence_claim_ids:
          - EC-025
        source_ids:
          - SRC-009
    evidence_claim_ids:
      - EC-025
    source_ids:
      - SRC-009
    notes: This case is strategically important because BAYC marks are core to Yuga's brand moat.
  - table_id: T-022
    title: Material IP, trademark, copyright, and licensing signals
    chapter_id: VIII
    section_id: VIII.D
