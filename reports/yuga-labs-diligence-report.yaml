        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public materials verify Yuga's visible collection stack and Otherside positioning, while sampled marketplace metrics show active but volatile pricing; cost structure, product-level margins and sustained adoption remain non-public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Yuga publicly surfaces BAYC, MAYC, BAKC, Ape Chemistry Club, Otherdeed Expanded, Kodas and TwelveFold, with Otherside and ApeChain as strategic ecosystem elements.
            evidence_claim_ids:
              - EC-004
              - EC-005
            risk_ids:
              - R-004
              - R-006
          - finding_id: II.A-F2
            finding: Otherside promises a real-time metaRPG and sampled collection pages show active market demand, but independent usage and profitability proof is not public.
            evidence_claim_ids:
              - EC-006
              - EC-007
            risk_ids:
              - R-003
              - R-004
              - R-005
        hidden_risks:
          - R-004 is elevated because Yuga is promising complex persistent-world outcomes rather than only collectible ownership.
        evidence_gaps:
          - Module-level revenue, royalty rate capture, churn, gross margin and roadmap cost were not public.
          - Market share and independent product-quality benchmarks were not public.
        follow_up_questions:
          - Provide product P&Ls, royalty policy, usage cohorts, roadmap milestones and customer/holder satisfaction metrics.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-006
          - EC-007
  - chapter_id: III
    title: Customer Information
    chapter_summary: Yuga's public customer-like signals are mostly on-chain community and liquidity proxies rather than disclosed customer-revenue data. The company also publicly narrowed relationships and assets through 2024-2025 divestitures.
    founder_claim_ids:
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-012
      - EC-030
    risk_ids:
      - R-003
      - R-005
      - R-006
      - R-007
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: For Yuga's web3 model, the best public customer proxies are holder counts, floor prices and company-published reach claims; none of these identify top paying customers or counterparties.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: OpenSea owner counts give a measurable community-dispersion proxy across BAYC, MAYC, BAKC and Otherdeed.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-007
          - finding_id: III.A-F2
            finding: Yuga's own scale claim and current market metrics suggest meaningful reach but not durable monetization.
            evidence_claim_ids:
              - EC-009
              - EC-030
            risk_ids:
              - R-003
              - R-007
        hidden_risks:
          - R-007 remains central because community size may not equal royalty, commerce or licensing durability.
        evidence_gaps:
          - Top 15 customers, counterparty concentration and product-application revenue are not public.
          - Wallet data does not distinguish end users, speculators or institutional holders.
        follow_up_questions:
          - Provide top counterparties, cohort spend, royalty concentration and off-chain customer schedules.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-009
          - EC-010
          - EC-030
