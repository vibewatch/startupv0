report_metadata:
  report_title: Yuga Labs Startup Diligence Report
  target_company: Yuga Labs
  website: https://www.yuga.com/
  known_aliases:
    - Yuga Labs, Inc.
    - Yuga
    - Bored Ape Yacht Club creator
  sector: Web3 media & entertainment, NFT-native IP, metaverse/world-building and digital-asset ecosystem products
  geography: United States / Coral Gables, Florida with global blockchain and NFT user reach
  company_stage: Private unicorn / later-stage web3 media & entertainment company
  research_date: 2026-06-17
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; ETH is used for marketplace metrics where public
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Confirmed eligibility first using the current CB Insights unicorn list plus current company-activity signals from Yuga's live site and April 2026 leadership coverage.
    - Prioritized company-owned sources for product, ecosystem, terms and timeline evidence; used independent news and legal records for funding, layoffs, litigation and regulatory developments.
    - Used marketplace/community sources (OpenSea) as point-in-time community and liquidity proxies while explicitly separating those from audited financial evidence.
    - Treated company-published scale, roadmap and product claims as partially verified unless corroborated by independent or legal sources.
    - No paywalled data room, management interview, customer reference, private token-treasury report or confidential contract set was available.
  included_jurisdictions:
    - United States
    - Delaware corporate-law context
    - Florida operating footprint
    - California federal courts and Ninth Circuit appellate context
    - Global blockchain and NFT marketplace context where directly referenced in public materials
  excluded_topics:
    - Private financial statements, board decks, cap table, token treasury and bank records were unavailable.
    - Closed community channels, private Discord/Telegram data, wallet deanonymization and private smart-contract audit materials were not used.
    - Full 50-state or international regulatory, tax, labor and litigation searches were outside this public-web-only review.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Yuga Labs diligence report with eligibility screen and standard depth
      type: workflow_request
      date_received: 2026-06-17
      notes: No pitch deck, financial model, customer references or data room was supplied.
