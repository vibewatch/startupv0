report_metadata:
  report_title: boAT Startup Diligence Report
  target_company: boAT
  website: https://www.boat-lifestyle.com/
  known_aliases:
    - boAT
    - Imagine Marketing Limited
    - Imagine Marketing India
  sector: Consumer electronics, audio accessories and wearables
  geography: India / Mumbai with consumer hardware sales channels
  company_stage: Private unicorn / growth-stage company
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing reports and selected this target from public unicorn-list candidates.
    - Used CB Insights as the primary public unicorn-list source and company-owned/investor/news sources for operating evidence.
    - Separated company-published claims, independent news, market database records and analyst judgments.
    - Marked finance, cap table, customer, supplier, legal, HR and contract questions as not_publicly_verifiable when public evidence was unavailable.
  included_jurisdictions:
    - India
    - India / Mumbai with consumer hardware sales channels
    - Global markets referenced by public materials
  excluded_topics:
    - Private data room materials, management interviews, customer calls, paid market databases, non-public legal dockets, security reports and confidential contracts were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-23
      notes: No pitch deck, financial model, founder responses or data-room files were supplied.
