executive_summary:
  overall_assessment: boAT appears to be an active private unicorn candidate based on CB Insights valuation/status data and company/public operating sources. Public evidence supports product presence and some investor, channel or traction signals, but core investment diligence remains open because detailed financials, cap table, customer concentration, supplier contracts, legal records and personnel data are private or unverified.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A viable thesis requires proving durable revenue quality, margin/cash conversion, customer/channel resilience, product defensibility, compliance posture and financing terms beyond the public $1.40B valuation anchor.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists boAT as a $1.40B unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Public sources show active product offerings for boAT.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-003
      summary: Public sources show go-to-market or relationship signals, while detailed economics remain private.
      evidence_claim_ids:
        - EC-005
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and working-capital opacity
    - risk_id: R-002
      summary: Category competition and pricing pressure
    - risk_id: R-003
      summary: Customer, supplier or channel concentration unknown
  key_evidence_gaps:
    - Audited financials, KPIs, cash/debt, tax, financing and cap-table records.
    - Product-level revenue, margins, roadmap, reliability, quality and roadmap-cost evidence.
    - Top customers, contracts, revenue concentration, suppliers, churn and reference calls.
    - Market share, win/loss, pricing, competitor benchmarks and buyer references.
    - CAC, payback, sales productivity, channel economics, pipeline and marketing budget.
    - R&D org, budget, roadmap, technical dependencies, IP ownership and incident history.
    - Org chart, headcount, compensation, equity plans, turnover and employee relations records.
    - Legal dockets, regulatory correspondence, IP registries, insurance and material contracts.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline valuation.
    - Request top customer/channel/supplier contracts and independent references.
    - Have counsel review corporate, IP, regulatory, privacy, employment and material-contract records.
    - Benchmark product, pricing, channel economics and retention against direct competitors.
