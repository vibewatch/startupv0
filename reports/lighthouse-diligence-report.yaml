executive_summary:
  overall_assessment: Lighthouse appears eligible as an active private unicorn based on CB Insights and current public
    operating evidence, but investment-grade diligence remains unresolved because financials, cap table, customer
    concentration, contracts, HR, legal/regulatory and IP evidence are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence; the case depends on proving that the $1B
    valuation is supported by durable revenue, defensible product differentiation and compliant operations.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Lighthouse at $1B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Current public product evidence supports active operations.
      evidence_claim_ids:
        - EC-003
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Private financials and unit economics are unavailable despite a $1B unicorn-list valuation.
    - risk_id: R-002
      summary: Hospitality-cycle exposure and customer concentration are not publicly measurable.
    - risk_id: R-003
      summary: Product edge depends on proprietary travel/market data pipelines, AI claims and third-party integrations that
        require technical diligence.
  key_evidence_gaps:
    - Audited financials and revenue quality.
    - Cap table, financing documents and preference stack.
    - Customer/channel concentration, churn and references.
    - Material contracts, supplier dependencies, legal/regulatory and IP schedules.
    - HRIS, compensation/equity and turnover data.
  recommended_next_steps:
    - Request full data-room index and management claim ledger.
    - Run finance, tax and cap-table diligence.
    - Interview customers, partners and suppliers.
    - Have counsel review regulatory, IP, insurance, contracts and litigation.
    - Run technical/product validation appropriate to the sector.
