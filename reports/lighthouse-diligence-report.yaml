executive_summary:
  overall_assessment: Lighthouse is publicly supportable as an active private hospitality-software unicorn, with primary-company and KKR/Business Wire sources verifying a November 2024 approximately $370M growth investment, 70,000+ hospitality providers, 700+ employees and a broad revenue-management product suite. The largest diligence gaps are audited financials, net revenue retention, margin profile, customer concentration, data rights and acquisition integration.
  investment_or_diligence_thesis: The investment case depends on whether Lighthouse can convert its large hospitality-data footprint and KKR-backed acquisition/product agenda into durable recurring software growth without overexposure to hotel-cycle volatility or data-rights constraints.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Lighthouse is an eligible still-private unicorn target for this report.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Lighthouse has a publicly evidenced product/platform narrative.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Lighthouse has public customer, user or demand signals.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Valuation and growth expectations
    - risk_id: R-002
      summary: Hospitality-cycle exposure
    - risk_id: R-003
      summary: Customer concentration and monetization opacity
    - risk_id: R-004
      summary: Data rights and AI governance risk
    - risk_id: R-005
      summary: Acquisition integration risk
  key_evidence_gaps:
    - Audited/management financials, KPI definitions and cash runway
    - Current cap table, preferences, debt, investor rights and valuation marks
    - Customer concentration, usage, retention/churn and contract economics
    - Supplier/infrastructure dependencies, commitments and gross-margin bridge
    - Legal, regulatory, IP, privacy/security and insurance schedules
  recommended_next_steps:
    - Confirm eligibility status with company counsel and corporate records before relying on unicorn-list inclusion.
    - Open finance and cap-table data rooms before relying on public valuation.
    - Reconcile public customer/user/adoption claims to revenue, usage, margin and retention data.
    - Review product roadmap, quality/security controls and key technical or regulatory risks.
    - Run customer/reference, supplier and win/loss diligence in the most material market segments.
