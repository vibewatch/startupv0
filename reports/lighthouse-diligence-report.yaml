risk_register:
  - risk_id: R-001
    risk_title: Valuation and growth expectations
    risk_category: financial
    severity: high
    likelihood: medium
    description: Large 2024 financing and unicorn valuation require ARR, margin, retention and rule-of-40 evidence not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
    evidence_claim_ids:
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Request audited financials, ARR bridge, NRR, CAC payback and valuation waterfall.
  - risk_id: R-002
    risk_title: Hospitality-cycle exposure
    risk_category: market
    severity: medium
    likelihood: medium
    description: Hotel software demand can be sensitive to travel cycles, hotel budgets and regional downturns.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Analyze revenue by customer segment, geography and property type across cycles.
  - risk_id: R-003
    risk_title: Customer concentration and monetization opacity
    risk_category: customer
    severity: high
    likelihood: unknown
    description: 70,000+ providers may include properties, groups, users or customers; paid account concentration and churn are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
    evidence_claim_ids:
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Request customer ledger, top-account ARR, logo/GRR/NRR and contract terms.
  - risk_id: R-004
    risk_title: Data rights and AI governance risk
    risk_category: legal
    severity: high
    likelihood: unknown
    description: The platform processes large travel/market datasets and uses AI; data rights, privacy, scraping and model-governance controls are not public.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.C
    evidence_claim_ids:
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Review data licenses, DPAs, privacy/security audits and AI governance controls.
  - risk_id: R-005
    risk_title: Acquisition integration risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: The Hotels Network acquisition adds product breadth but integration terms, retention and roadmap are not public.
    impacted_chapter_ids:
      - III
      - V
      - VII
    impacted_section_ids:
      - III.E
      - V.A
      - VII.B
    evidence_claim_ids:
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Request acquisition agreement, integration milestones, synergy assumptions and retention plan.
  - risk_id: R-006
    risk_title: Competitive pressure in hotel commercial stack
    risk_category: market
    severity: medium
    likelihood: high
    description: RMS, PMS, BI and distribution vendors compete for hotel budgets and integrations.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-009
      - EC-010
    mitigation_or_diligence_request: Run win/loss, pricing and integration diligence against IDeaS, Duetto, Cloudbeds and RateGain.
  - risk_id: R-007
    risk_title: Infrastructure and data-processing cost opacity
    risk_category: technical
    severity: medium
    likelihood: unknown
    description: Processing 400 TB/day could carry meaningful cloud/data costs and uptime obligations.
    impacted_chapter_ids:
