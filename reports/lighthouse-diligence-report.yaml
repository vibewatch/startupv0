    why_it_matters: Required to convert public-source diligence into investment-grade verification.
    suggested_source_or_request: Provide audited financials, board packages, cap table, debt and investor-rights documents.
    priority: high
  - gap_id: G-II
    chapter_id: II
    section_id: II.A
    missing_information: Product roadmap, price book, gross margin by product and customer usage telemetry.
    why_it_matters: Required to convert public-source diligence into investment-grade verification.
