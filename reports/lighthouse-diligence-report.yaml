report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: Lighthouse"
  target_company: Lighthouse
  website: https://www.mylighthouse.com/
  known_aliases:
    - OTA Insight
    - Lighthouse Intelligence
    - Lighthouse platform
  sector: Travel and hospitality commercial intelligence / hotel revenue-management software
  geography: United Kingdom headquartered; customers in 185 countries
  company_stage: Private unicorn / Series C
  research_date: 2026-06-13
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD and EUR unless otherwise stated
  time_zone: Europe/London
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only; no private data-room, customer calls, bank records, or paid database exports were available.
    - Prioritized current unicorn lists, company-owned pages, reputable news/trade publications, public registry pages where accessible, and market/sector sources.
    - Facts that require company records are marked not_publicly_verifiable; contradictory or stale public signals are called out as risks rather than resolved by assumption.
    - All sources were accessed on 2026-06-13.
  included_jurisdictions:
    - United Kingdom
    - United States
    - European Union / global hospitality markets
  excluded_topics:
    - Non-public data-room materials
    - Customer calls and supplier calls
    - Paid database exports
    - Legal advice or counsel-grade docket searches
    - Private personal data
  user_provided_materials: []
