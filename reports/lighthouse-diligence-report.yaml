report_metadata:
  report_title: Lighthouse Startup Diligence Report
  target_company: Lighthouse
  website: https://www.mylighthouse.com/
  known_aliases:
    - OTA Insight
    - Lighthouse Intelligence
  sector: Hospitality commercial intelligence and revenue-management software
  geography: United Kingdom / London headquarters with global hospitality customers
  company_stage: Private unicorn / growth-stage hospitality technology platform
  research_date: 2026-06-12
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from existing reports and selected this uncovered candidate from the CB Insights unicorn list
      using shuf -n 3.
    - Used public company pages, funding/news sources, search-result pages and technical/product sources as evidence
      only.
    - Marked private financials, cap table, contracts, HR, legal, regulatory, IP and customer data as
      not_publicly_verifiable.
  included_jurisdictions:
    - United Kingdom
    - United States and global markets where public sources indicate activity
  excluded_topics:
    - Private data room, management interviews, customer/supplier calls, paywalled databases and exhaustive legal docket
      searches were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request
      type: workflow_request
      date_received: 2026-06-12
      notes: No private materials provided.
    - material_id: UPM-002
      title: CB Insights candidate metadata
      type: public_metadata
      date_received: 2026-06-12
      notes: slug lighthouse; valuation $1B; country United Kingdom; industry Enterprise Tech.
