risk_register:
  - risk_id: R-001
    risk_title: Stale valuation and preference-stack opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: The public $1.8B valuation is from 2021/CB tracker context; liquidation preferences,
      secondaries, debt, warrants, and option-pool changes are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-004
      - EC-005
      - EC-023
    mitigation_or_diligence_request: Require full cap table, financing documents, preference waterfall,
      option-pool history, secondaries, debt, warrants, and board/investor consents.
  - risk_id: R-002
    risk_title: Financial opacity and unit economics
    risk_category: financial
    severity: critical
    likelihood: unknown
    description: Audited financial statements, ARR, gross margin, app-store fees, CAC/payback,
      retention, cash runway, and profitability are not publicly available.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids:
      - EC-003
      - EC-023
    mitigation_or_diligence_request: Open a financial data room with audited statements, monthly
      management accounts, ARR/NRR/GRR, product P&L, cohorts, cash runway, and tax records.
  - risk_id: R-003
    risk_title: App-store and platform dependence
    risk_category: market
    severity: high
    likelihood: high
    description: Consumer app distribution and subscription monetization likely depend heavily on
      Apple/Google policies, search rankings, platform fees, and privacy rules.
    impacted_chapter_ids:
      - II
      - V
