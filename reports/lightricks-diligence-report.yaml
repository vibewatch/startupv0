  - figure_id: F-010
    title: Lightricks risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of principal diligence risks.
    purpose: Prioritize follow-up workstreams.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Stale valuation and preference-stack opacity
          severity: high
          likelihood: medium
          rationale: The public $1.8B valuation is from 2021/CB tracker context; liquidation preferences,
            secondaries, debt, warrants, and option-pool changes are not public.
          evidence_claim_ids:
            - EC-001
            - EC-004
            - EC-005
            - EC-023
          source_ids:
            - SRC-003
        - risk_id: R-002
          label: Financial opacity and unit economics
          severity: critical
          likelihood: unknown
          rationale: Audited financial statements, ARR, gross margin, app-store fees, CAC/payback, retention,
            cash runway, and profitability are not publicly available.
          evidence_claim_ids:
            - EC-003
            - EC-023
          source_ids:
            - SRC-001
        - risk_id: R-003
          label: App-store and platform dependence
          severity: high
          likelihood: high
          rationale: Consumer app distribution and subscription monetization likely depend heavily on
            Apple/Google policies, search rankings, platform fees, and privacy rules.
          evidence_claim_ids:
            - EC-006
            - EC-009
            - EC-024
          source_ids:
            - SRC-001
            - SRC-004
            - SRC-005
            - SRC-006
            - SRC-007
            - SRC-009
            - SRC-013
        - risk_id: R-004
          label: AI model competition and commoditization
          severity: high
          likelihood: high
          rationale: Generative image/video tools face rapid competition from platform incumbents, open
            models, and foundation-model companies, which may compress differentiation and pricing.
          evidence_claim_ids:
            - EC-010
            - EC-011
            - EC-026
          source_ids:
            - SRC-009
        - risk_id: R-005
          label: Unknown subscriber retention and customer quality
          severity: high
          likelihood: unknown
          rationale: Public scale metrics do not reveal paid conversion, churn, ARPU, cohort retention,
            creator quality, brand retention, or marketplace concentration.
          evidence_claim_ids:
            - EC-003
            - EC-012
            - EC-024
          source_ids:
            - SRC-001
        - risk_id: R-006
          label: Layoff/reorganization execution risk
          severity: high
          likelihood: medium
          rationale: Independent reporting of layoffs and AI-video reorganization may signal pressure on
            legacy apps, morale, retention, or strategic focus.
          evidence_claim_ids:
            - EC-014
            - EC-016
          source_ids:
            - SRC-015
        - risk_id: R-007
          label: Privacy, AI content, and data-rights exposure
          severity: high
          likelihood: medium
          rationale: Consumer apps, Popular Pays, AI generation, uploads, biometric-like edits, user content,
            and training data create privacy/IP/safety obligations across multiple regimes.
          evidence_claim_ids:
            - EC-017
            - EC-018
            - EC-022
          source_ids:
            - SRC-016
        - risk_id: R-008
          label: IP and litigation uncertainty
          severity: medium
          likelihood: medium
          rationale: Public trademark and litigation signals exist, but patent clearance, assignments, OSS
            obligations, settlements, and legal reserves are not public.
          evidence_claim_ids:
            - EC-019
            - EC-020
            - EC-021
          source_ids:
            - SRC-020
            - SRC-021
        - risk_id: R-009
          label: Popular Pays marketplace concentration/integration risk
          severity: medium
          likelihood: medium
          rationale: Popular Pays expands into brand/creator marketplace workflows but GMV, take rate,
            concentration, creator quality, and acquisition integration are not public.
          evidence_claim_ids:
            - EC-012
            - EC-013
          source_ids:
            - SRC-013
        - risk_id: R-010
          label: Open-source monetization and license leakage risk
          severity: medium
          likelihood: medium
          rationale: Open model/repo strategy may increase adoption but can reduce defensibility if
            competitors replicate model assets or if license/data obligations are unclear.
          evidence_claim_ids:
            - EC-011
            - EC-022
            - EC-026
          source_ids:
