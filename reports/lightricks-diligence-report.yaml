report_metadata:
  report_title: Lightricks Public-Source Startup Diligence Report
  target_company: Lightricks
  website: https://www.lightricks.com/
  known_aliases:
    - Lightricks Ltd.
    - Lightricks, Ltd.
    - Facetune
    - Photoleap
    - Videoleap
    - LTX Studio
    - LTXV
    - LTX-Video
    - Popular Pays
  sector: AI visual content creation; mobile photo and video editing; generative video; creator
    marketing marketplace
  geography: Israel headquarters in Jerusalem with public hiring/offices in Jerusalem, Haifa, London,
    Los Angeles, and New York
  company_stage: Late-stage private unicorn
  research_date: 2026-05-16
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Followed the startup-diligence-research checklist and produced a public-source report covering
      financial, product, customer, competition, GTM, R&D, management, and legal chapters.
    - Prioritized primary company sources, official product pages, public legal policies, public
      technical repositories/model cards, CB Insights unicorn tracker, app-store listings, trademark
      records, CourtListener/Justia legal records, and independent news.
    - Treated company-published metrics as partially verified unless independently corroborated;
      marked private financial, customer, cap-table, contract, HR, and legal data as not publicly
      verifiable.
    - Used source-linked evidence claims, tables, and figures to separate verified facts from
      diligence gaps and risk hypotheses.
  included_jurisdictions:
    - Israel
    - United States
    - United Kingdom
    - European Union
    - Global app-store and online creator markets
  excluded_topics:
    - No private financial statements, management accounts, bank records, tax files, cap table,
      board materials, customer contracts, HRIS data, data-room documents, security audit reports,
      or legal advice were reviewed.
    - No paid database exports, management interviews, customer/supplier calls, regulator outreach,
      PACER downloads, or independent technical benchmarking were performed.
    - No valuation fairness opinion or investment recommendation is provided beyond diligence
      prioritization.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-16
      notes: User requested one standard-depth public-source startup diligence YAML report for Lightricks
        at reports/lightricks-diligence-report.yaml.
