report_metadata:
  report_title: Swile Public-Source Startup Diligence Report
  target_company: Swile
  website: https://www.swile.co/
  known_aliases:
    - Lunchr
    - Carte Lunchr
    - Swile Card
    - Bimpli
    - Vee Benefícios
  sector: Enterprise Tech; worktech; employee benefits; meal and gift vouchers; corporate travel and expense
  geography: France / Montpellier legal headquarters with France and Brazil operations
  company_stage: Late-stage private unicorn
  research_date: 2026-05-17
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: EUR and USD as source-reported
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prepared exactly one public-source standard diligence report for Swile using company pages, public
      financing/transaction announcements, independent news, French registry aggregators, privacy/CSR/legal pages,
      public trademark/legal records and competitor product pages.
    - Prioritized CB Insights for unicorn eligibility, primary company pages for product/customer/HR/privacy claims,
      independent and transaction-party sources for financing/financial claims, and registry/legal sources for corporate
      and IP facts.
    - Treated company-published metrics, logos, testimonials and CSR/privacy statements as public representations
      requiring data-room verification.
    - Marked audited financials, projections, cap table, customer-level revenue, contracts, litigation clearance, HR
      data, insurance, regulatory correspondence and technical/security reports as not_publicly_verifiable when
      unavailable publicly.
  included_jurisdictions:
    - France
    - European Union
    - Brazil
    - Global corporate travel / employee-benefits markets where relevant
  excluded_topics:
    - No private data room, management interviews, customer calls, supplier calls, counsel letters, official paid
      registry extracts, court docket downloads, bank statements, tax records, security audit reports or employee
      records were reviewed.
    - No investment recommendation, valuation opinion, legal opinion, tax opinion, IP freedom-to-operate opinion,
      regulatory opinion, market-sizing study or cybersecurity attestation is provided.
    - No GitHub, private repository, paid database or non-public system access was used.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-05-17
      notes: User requested one standard-depth public-source diligence YAML report for Swile saved at
        reports/swile-diligence-report.yaml, with CB Insights unicorn citation and validation.
