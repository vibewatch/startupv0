          severity: medium
          likelihood: medium
          rationale: Privacy disclosures identify AWS, payment/e-money providers, support, CRM, and marketing subprocessors;
            public sources do not disclose concentration, uptime SLAs, DORA/outsourcing posture, or incident history.
          evidence_claim_ids: &a7
