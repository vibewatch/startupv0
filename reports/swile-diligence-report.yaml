risk_register:
  - risk_id: R-001
    risk_title: Audited financial quality and profitability durability are not public
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public sources show a large 2022 loss followed by reported 2024 profitability, but audited statements, cash
      balance, gross margin, working capital, cohort economics, and segment-level performance remain private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited FY2022-FY2025 financials, monthly management accounts, cash runway,
      bank statements, revenue recognition memo, cohort gross margin, and bridge from loss to EBITDA.
  - risk_id: R-002
    risk_title: Cap-table and financing complexity after BPCE alliance
    risk_category: financing
    severity: high
    likelihood: medium
    description: BPCE reportedly became a 22% fully diluted shareholder and received €150M preferential convertible bonds
      while Swile acquired Bimpli, creating a need to diligence liquidation preferences, covenants, conversion
      mechanics, and related-party rights.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - I.D
      - VIII.F
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request the full cap table, note/bond indentures, shareholder agreements, board
      consents, anti-dilution terms, related-party agreements, and pro forma waterfall.
  - risk_id: R-003
    risk_title: Voucher, payments, and financial-services regulatory dependence
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Swile operates meal, gift, mobility and payment-card products in regulated benefit and payments markets,
      depends on e-money/payment providers, and Pappers shows an ORIAS IFP radiated signal that needs context.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request regulatory matrix by product/country, payment-program contracts, licenses/agent
      appointments, ORIAS history explanation, regulator correspondence, and compliance audits.
  - risk_id: R-004
    risk_title: Customer concentration and revenue quality are obscured by logo and aggregate metrics
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public sources cite 85,000 client companies and marquee logos, but revenue by customer, churn, NRR, cohort
      health, take-rate, and exposure to major employers or CSE committees are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request top-25 customer ARR/GMV by product, customer concentration, churn/NRR, renewal
      calendar, pipeline coverage, and permission for reference calls.
  - risk_id: R-005
    risk_title: Competition from incumbents and adjacent platforms may pressure take rates
    risk_category: market
    severity: medium
    likelihood: high
    description: Swile competes with historical meal-voucher issuers, new benefits platforms, travel/expense vendors, and
      bank-backed offerings; public market-share gains do not disclose pricing or margin pressure.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request win/loss reports, pricing history, gross margin by SKU, competitor battlecards,
      RFP loss reasons, and retention by cohort.
  - risk_id: R-006
    risk_title: Brazil expansion and integration execution risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Swile expanded in Brazil through Vee Benefícios and still publicly targets Brazil profitability and 1M
      users, implying currency, regulatory, competitive, and operating execution risk outside France.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.B
      - III.A
      - V.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request Brazil P&L, user/customer cohorts, FX exposure, local compliance review,
      management plan, and profitability bridge.
  - risk_id: R-007
    risk_title: Critical third-party dependency and data-processing exposure
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Privacy disclosures identify AWS, payment/e-money providers, support, CRM, and marketing subprocessors;
      public sources do not disclose concentration, uptime SLAs, DORA/outsourcing posture, or incident history.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.E
      - VI.A
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request vendor inventory, data maps, SOC/ISO reports, incident log, SLA performance,
      exit plans, DPAs, subprocessors, and payment-provider agreements.
  - risk_id: R-008
    risk_title: Headcount restructuring and retention risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public sources cite 1,000 employees in earlier materials and about 850 employees in later 2024-results
      coverage, while another industry article references reduced staff; turnover and morale require private HR
      diligence.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.F
      - VII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request headcount by month/function/location, voluntary and involuntary turnover,
      restructuring plan, regretted attrition, employee relations claims, and retention compensation.
  - risk_id: R-009
    risk_title: Trademark/IP scope and dispute exposure
    risk_category: legal
    severity: medium
    likelihood: low
    description: Public trademark records show EU SWILE registrations and a public EU court record involving Wonderbox,
      EUIPO, and Swile; no public full IP chain-of-title or litigation clearance was reviewed.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request full IP schedule, assignments, opposition/cancellation history, counsel
      litigation letter, domain portfolio, open-source inventory, and patent/trademark prosecution files.
  - risk_id: R-010
    risk_title: GDPR, payment-data, and employee-benefit privacy exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Swile processes employer, employee, payment, travel, and support data across France, Brazil, and
      third-party subprocessors; company policies are public but no security audit, DPIA, or incident evidence was
      reviewed.
    impacted_chapter_ids:
      - VIII
      - VI
    impacted_section_ids:
      - VIII.G
      - VI.A
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request GDPR records of processing, DPIAs, breach log, DPO reports, CNIL
      correspondence, penetration tests, ISO/SOC evidence, and cross-border transfer assessments.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited FY2022-FY2025 financial statements, monthly management accounts, cash runway and
      quality-of-earnings bridge.
    why_it_matters: Public profitability claims cannot be underwritten without audited scope, working capital and cash conversion.
    suggested_source_or_request: Auditor package, trial balance, management accounts and QoE report.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, BPCE convertible-bond terms, option pool and liquidation waterfall.
    why_it_matters: Preference and governance terms can materially change equity value and exit outcomes.
    suggested_source_or_request: Cap table, shareholder agreements, bond indenture and board minutes.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR/GMV, pricing, gross margin, roadmap, regulatory obligations and support cost.
    why_it_matters: Swile’s product breadth may hide weak unit economics or compliance costs by SKU.
    suggested_source_or_request: Product P&L, pricing files, roadmap and compliance signoffs.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Customer revenue concentration, churn, NRR and renewal calendar.
    why_it_matters: Aggregate client/user counts do not prove revenue quality or predictability.
    suggested_source_or_request: Top-25 customer ARR/GMV and retention schedule.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend, payment-provider contracts, cloud SLAs and vendor risk assessments.
    why_it_matters: Payment/cloud/support dependencies are core to operations and data processing.
    suggested_source_or_request: Vendor inventory, contracts, DPAs, SOC/ISO reports and SLA history.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing, discounting and competitor-response data.
    why_it_matters: Competition from incumbents and adjacent platforms may pressure margin and retention.
    suggested_source_or_request: Sales win/loss reports, RFP tracker and pricing waterfall.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales quota, compensation, ramp, CAC payback and pipeline coverage.
    why_it_matters: Growth and marketing budget sufficiency cannot be assessed from public sources.
    suggested_source_or_request: Sales productivity model and CRM pipeline export.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: R&D organization, key technical personnel, security reports and incident history.
    why_it_matters: Product breadth and regulated payment data require strong technical controls.
    suggested_source_or_request: Engineering org chart, security audit, pen-test, incident logs and architecture docs.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap cost, staffing and technical dependencies for Travel, Brazil and multi-benefit card/app expansion.
    why_it_matters: Expansion initiatives may consume cash or introduce regulatory/technical risk.
    suggested_source_or_request: Product roadmap, development budget and risk register.
    priority: medium
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.A
    missing_information: Current org chart, board composition and governance rights after BPCE alliance.
    why_it_matters: Governance and leadership capacity affect execution and exit readiness.
    suggested_source_or_request: Org chart, board minutes, committee charters and shareholder agreement.
    priority: high
  - gap_id: G-011
    chapter_id: VII
    section_id: VII.G
    missing_information: Turnover, restructuring, compensation and retention data.
    why_it_matters: Public headcount changes could indicate morale/execution risk.
    suggested_source_or_request: HRIS turnover reports, restructuring plan and compensation/equity schedules.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Comprehensive litigation schedule and counsel letter.
    why_it_matters: Public searches do not provide legal clearance and identified an EU trademark matter.
    suggested_source_or_request: Counsel letter, docket list, claim amounts, status and expected outcomes.
    priority: high
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Complete IP schedule, assignments and open-source/license inventory.
    why_it_matters: Product software and acquired Bimpli assets require chain-of-title and license diligence.
    suggested_source_or_request: IP schedule, EUIPO/INPI extracts, assignments, OSS scan and domain list.
    priority: high
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory license matrix, ORIAS explanation, CNIL/privacy history and payment compliance reports.
    why_it_matters: Voucher, payments and personal data are core regulated operations.
    suggested_source_or_request: Regulatory counsel memo, license/agent appointments, regulator correspondence and audit reports.
    priority: high
  - gap_id: G-015
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, limits, exclusions and claims history.
    why_it_matters: Cyber/payment/E&O/D&O exposures are not assessable publicly.
    suggested_source_or_request: Insurance schedule and broker letter.
    priority: medium
  - gap_id: G-016
    chapter_id: I
    section_id: I.B
    missing_information: Three-year quarterly forecast by product, geography, channel and customer cohort.
    why_it_matters: Public growth/profitability statements need scenario-backed assumptions.
    suggested_source_or_request: Board-approved financial model and forecast memo.
    priority: high
