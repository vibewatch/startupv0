          signals. Historical/projected growth by product, market share by SKU, speed of technology change, roadmap
          timing, cost structure and product-level profitability require private data.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A.F1
            finding: Swile Card/app publicly spans meal, gift, mobility and culture wallets with smart routing and personal-card
