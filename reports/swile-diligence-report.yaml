executive_summary:
  overall_assessment: "Swile meets the public-source unicorn screen: CB Insights lists Swile as a $1B French Enterprise
    Tech unicorn, and company/news/transaction sources corroborate a large benefits/worktech platform with France and
    Brazil operations. Diligence should proceed, but valuation support, audited financial quality, cap-table complexity,
    customer concentration, payments/voucher regulation, HR restructuring and legal/regulatory schedules are material
    private-data items."
  investment_or_diligence_thesis: Swile’s upside case is a scaled French worktech platform that digitized employee
    benefits, combined with Bimpli/BPCE, broadened into Travel and reached reported profitability. The diligence case
    depends on proving durable cash generation, defensible take-rate/market share, clean regulatory/payment posture,
    manageable BPCE terms and low customer/supplier concentration.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Swile as a $1B French unicorn; TechCrunch and Index corroborate the SoftBank-led $200M Series
        D/unicorn event.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
    - founder_claim_id: FC-004
      summary: BPCE/Bimpli alliance terms are publicly corroborated, including Bimpli acquisition, BPCE 22% fully diluted
        stake and €150M preferential convertible bonds.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-005
      summary: Swile’s public product pages verify the multi-benefit card/app and Travel product scope.
      evidence_claim_ids:
        - EC-009
        - EC-016
        - EC-017
        - EC-018
  biggest_risks:
    - risk_id: R-001
      summary: Recent profitability claims are public but unaudited; quality of earnings and cash conversion remain unverified.
    - risk_id: R-002
      summary: BPCE ownership and €150M preferential convertible bonds create cap-table, governance and waterfall complexity.
    - risk_id: R-003
      summary: Voucher, payments, privacy and ORIAS/payment-provider dependencies create regulatory diligence risk.
  key_evidence_gaps:
    - Audited financials, cash runway, product/geography/customer revenue, AR aging, backlog and tax positions.
    - Fully diluted cap table, BPCE convertible terms, shareholder rights and liquidation waterfall.
    - Top-customer revenue concentration, churn/NRR, renewal schedule and direct reference calls.
    - Regulatory license matrix, ORIAS explanation, payment-provider contracts, GDPR/security audits and insurance.
    - Current org chart, executive biographies, headcount/turnover, compensation and incentive-stock details.
  recommended_next_steps:
    - Open a targeted data-room request covering audited financials, cap table/BPCE terms, customer concentration,
      contracts, regulatory/privacy/security and HR records.
    - Run management Q&A on 2022-to-2024 profitability bridge, Travel/Brazil economics, Bimpli integration and
      supplier/payment dependencies.
    - Conduct customer and supplier reference calls across meal vouchers, gift/CSE, Travel, payment providers and
      cloud/support vendors.
    - Have counsel review IP/trademark matters, ORIAS/payment status, GDPR/CNIL posture, litigation schedule, material
      contracts and insurance.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies a unicorn financing history, Bimpli/BPCE strategic financing and selected
      revenue/profitability anchors, but complete audited statements, projections, cash, AR/backlog, tax, debt and
      cap-table records are not public.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-008
      - EC-024
    risk_ids:
      - R-001
      - R-002
      - R-006
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources disclose selected 2022, H1 2024 and FY2024 metrics but not full audited income statements,
          balance sheets, cash flows, footnotes, planned-versus-actuals, product/geography revenue, backlog or AR aging.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A.F1
            finding: 2022 revenue of €138M including Bimpli and €72M losses are reported by TechCrunch.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-001
          - finding_id: I.A.F2
            finding: "2024 public coverage reports a sharp profitability improvement: €204M revenue, €36M EBITDA and €2M net
              income."
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-001
          - finding_id: I.A.F3
            finding: Dematerialized meal-voucher share claims range from 34% to 39% depending on source/period and need methodology
              reconciliation.
            evidence_claim_ids:
              - EC-007
              - EC-008
            risk_ids:
              - R-005
        hidden_risks:
          - Quality-of-earnings risk because margin expansion may reflect restructuring, supplier renegotiation or
            consolidation effects.
          - Cash runway and working-capital requirements are not visible from public sources.
        evidence_gaps:
          - Audited FY2022-FY2025 financial statements, management accounts, revenue recognition, product/geography
            splits, AR aging, backlog and tax schedules.
        follow_up_questions:
          - Provide audited statements and management reporting bridge from public EBITDA/net income claims to statutory
            accounts.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-024
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No formal quarterly projections are public. Public articles discuss profitability expectations, Brazil targets
          and Travel expansion, but assumptions, pricing, capex, working capital and financing arrangements are private.
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: I.B.F1
            finding: "Public sources indicate strategic growth drivers: Travel, Brazil and multi-product attach."
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-017
              - EC-025
            risk_ids:
              - R-006
          - finding_id: I.B.F2
            finding: The public profitability narrative is not sufficient to underwrite predictability without cohort, churn,
              pricing and pipeline data.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-024
            risk_ids:
              - R-001
              - R-004
        hidden_risks:
          - Foreign operations risk in Brazil and FX/local regulation could affect projections.
          - Pricing and margin assumptions are exposed to competitor response and voucher regulation.
        evidence_gaps:
          - Board-approved quarterly plan, scenario analysis, capex, working-capital, financing assumptions, Brazil plan
            and Travel attach-rate forecasts.
        follow_up_questions:
          - Provide three-year quarterly model by product, customer segment, geography and channel with downside
            scenarios.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-017
          - EC-024
          - EC-025
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify key investors, BPCE’s 22% fully diluted stake and €150M preferential convertible bonds,
          but current shares outstanding, option pool, warrants, rights, note terms, debt, side letters and
          off-balance-sheet liabilities are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C.F1
            finding: BPCE’s 22% fully diluted position and preferential convertible bonds are central current cap-table facts.
            evidence_claim_ids:
              - EC-004
              - EC-005
            risk_ids:
              - R-002
          - finding_id: I.C.F2
            finding: Statutory SAS capital values in legal/registry sources are not a substitute for the fully diluted cap table.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
        hidden_risks:
          - Complex preference stack or BPCE governance rights could materially affect common-equity value and exit
            paths.
          - Related-party commercial terms may affect economics.
        evidence_gaps:
          - Cap table, option pool, notes/bonds, shareholder agreements, liquidation waterfall, debt instruments, bank
            lines and off-balance-sheet commitments.
        follow_up_questions:
          - Provide fully diluted cap table, all financing documents and pro forma waterfall including BPCE instruments.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-004
          - EC-005
          - EC-012
          - EC-024
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: The public record supports a multi-round financing history and unicorn valuation marker but does not disclose
          tax positions, accounting policies, financing terms or current basis for investors.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D.F1
            finding: CB Insights and news/investor sources verify unicorn financing status and the 2021 $200M Series D.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
            risk_ids: []
          - finding_id: I.D.F2
            finding: The Bimpli/BPCE alliance added strategic-financing and integration complexity beyond conventional venture
              rounds.
            evidence_claim_ids:
              - EC-004
              - EC-005
            risk_ids:
              - R-002
        hidden_risks:
          - Tax/NOL position, debt covenants and revenue-recognition treatment are not public.
          - Currency/FX exposure exists because France and Brazil operations are public.
        evidence_gaps:
          - Tax returns, NOL schedules, revenue-recognition memos, financing history with preferences and current
            investor basis.
        follow_up_questions:
          - Provide full financing history and tax/accounting policies, including any acquisition accounting for Bimpli.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-005
  - chapter_id: II
    title: Products
    chapter_summary: "Swile’s public product suite is coherent and broad: meal vouchers, gift vouchers, mobility/culture
      benefits, Swile Card/app and Swile Travel. Product features are publicly verifiable, while pricing, gross margin,
      compliance obligations and product-level profitability are private."
    founder_claim_ids:
