        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-014
          - EC-016
          - EC-019
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
