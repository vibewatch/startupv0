  - figure_id: F-011
    title: Swile public-source diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Plots the report risk register by severity and likelihood.
    purpose: Prioritizes follow-up diligence across financial, regulatory, customer, market, team, technical and legal themes.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Audited financial quality and profitability durability are not public
          severity: high
          likelihood: medium
          rationale: Public sources show a large 2022 loss followed by reported 2024 profitability, but audited statements, cash
            balance, gross margin, working capital, cohort economics, and segment-level performance remain private.
          evidence_claim_ids: &a1
            - EC-006
            - EC-007
            - EC-008
          source_ids:
            - SRC-018
            - SRC-019
            - SRC-020
        - risk_id: R-002
          label: Cap-table and financing complexity after BPCE alliance
          severity: high
          likelihood: medium
          rationale: BPCE reportedly became a 22% fully diluted shareholder and received €150M preferential convertible bonds
            while Swile acquired Bimpli, creating a need to diligence liquidation preferences, covenants, conversion
            mechanics, and related-party rights.
          evidence_claim_ids: &a2
            - EC-004
            - EC-005
          source_ids:
            - SRC-016
            - SRC-017
        - risk_id: R-003
          label: Voucher, payments, and financial-services regulatory dependence
          severity: high
          likelihood: medium
          rationale: Swile operates meal, gift, mobility and payment-card products in regulated benefit and payments markets,
            depends on e-money/payment providers, and Pappers shows an ORIAS IFP radiated signal that needs context.
          evidence_claim_ids: &a3
            - EC-014
            - EC-016
            - EC-018
            - EC-020
          source_ids:
            - SRC-007
            - SRC-009
            - SRC-011
            - SRC-012
            - SRC-021
        - risk_id: R-004
          label: Customer concentration and revenue quality are obscured by logo and aggregate metrics
          severity: high
          likelihood: medium
          rationale: Public sources cite 85,000 client companies and marquee logos, but revenue by customer, churn, NRR, cohort
            health, take-rate, and exposure to major employers or CSE committees are not public.
          evidence_claim_ids: &a4
            - EC-010
            - EC-019
          source_ids:
            - SRC-003
            - SRC-013
        - risk_id: R-005
          label: Competition from incumbents and adjacent platforms may pressure take rates
          severity: medium
          likelihood: high
          rationale: Swile competes with historical meal-voucher issuers, new benefits platforms, travel/expense vendors, and
            bank-backed offerings; public market-share gains do not disclose pricing or margin pressure.
          evidence_claim_ids: &a5
            - EC-002
            - EC-007
            - EC-008
            - EC-023
          source_ids:
            - SRC-014
            - SRC-019
            - SRC-020
            - SRC-026
            - SRC-027
            - SRC-028
            - SRC-029
            - SRC-030
            - SRC-031
        - risk_id: R-006
          label: Brazil expansion and integration execution risk
          severity: medium
          likelihood: medium
          rationale: Swile expanded in Brazil through Vee Benefícios and still publicly targets Brazil profitability and 1M users,
            implying currency, regulatory, competitive, and operating execution risk outside France.
          evidence_claim_ids: &a6
            - EC-002
