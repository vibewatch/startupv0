              - EC-018
            risk_ids:
              - R-003
          - finding_id: II.A.F2
            finding: Swile Travel is live with booking, approvals, budgets, carbon, duty-of-care and expense workflows and a
              >2,000-client public signal.
            evidence_claim_ids:
              - EC-017
            risk_ids:
