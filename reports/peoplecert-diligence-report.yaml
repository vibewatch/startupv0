executive_summary:
  overall_assessment: PeopleCert looks like a scaled, founder-led certification platform with unusually strong product/IP control through AXELOS-linked frameworks, a large partner network, and visible recurring-content layers, but public evidence is insufficient to underwrite financial quality, customer concentration, or legal cleanliness.
  investment_or_diligence_thesis: The core diligence case rests on PeopleCert’s control of high-value professional frameworks, global delivery footprint, and partner-enabled distribution. The key diligence question is not whether the platform is real or large—it is whether the mix, margins, leverage, governance concentration, and renewal durability are as strong as the public narrative implies.
  strongest_verified_claims:
    - founder_claim_id: FC-003
      summary: The current portfolio clearly includes ITIL, PRINCE2, DEVOPS INSTITUTE, LANGUAGECERT, and other adjacent brands.
      evidence_claim_ids:
        - EC-013
    - founder_claim_id: FC-004
      summary: PeopleCert agreed and completed the AXELOS transaction in 2021 and had been the exclusive Examination Institute since 2018.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-007
      summary: "PeopleCert publicly discloses a large ecosystem: ~2,300 employees, ~11,800 external associates, 53,500+ organizations, and 7,500+ partners."
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-008
      summary: CB Insights’ March 2026 unicorn list places PeopleCert at a $1.27B valuation with London/UK geography.
      evidence_claim_ids:
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: "Financial opacity: no audited financial statements, ARR, or forecast package surfaced in the public review."
    - risk_id: R-002
      summary: "Leverage/refinancing: public record shows acquisition-related debt and a 2025 €300m secured-note refinance, but not covenant headroom."
    - risk_id: R-004
      summary: "Customer concentration opacity: public customer evidence is aggregate rather than named-account revenue disclosure."
    - risk_id: R-008
      summary: "Governance concentration: founder and family members hold multiple visible senior roles."
  key_evidence_gaps:
    - Audited historical financial statements, ARR, cash-flow, and forecast model inputs are not public.
    - Current cap table, option pool, FTV ownership percentage, and debt covenant package are not public.
    - Top-customer concentration, partner concentration, and supplier-spend concentration remain unresolved.
    - Compensation, turnover, and employee-relations data are not meaningfully public.
    - Search-engine review is not a substitute for full counsel-led litigation, contract, and IP-registry diligence.
  recommended_next_steps:
    - Request three years of audited financials plus monthly KPI packs and a forecast bridge by product, channel, and geography.
    - Obtain full cap table, equity-plan schedule, note indentures, leverage metrics, and refinancing cases.
    - Review top-20 customers, top partners, and top suppliers with revenue/spend concentration and renewal histories.
    - Ask counsel for docket, sanctions, lien, and trademark/patent registry searches across key jurisdictions.
    - Request product-family revenue, version-migration KPIs, membership attach/renewal metrics, and partner audit outcomes.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public financial evidence supports scale, financing history, and unicorn status, but not audited financial quality, forecast credibility, or a full cap table.
    founder_claim_ids:
      - FC-001
      - FC-004
      - FC-008
    evidence_claim_ids:
      - EC-002
      - EC-011
      - EC-035
      - EC-014
      - EC-018
      - EC-019
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-036
      - EC-008
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public research surfaced operating-scale and growth proxies, but not audited income statements, balance sheets, cash flows, backlog, or receivables detail.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: "The strongest public growth signal is founder-reported: ~40% average annual revenue growth through 2020 with ~20% of the business from government contracts."
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Current public disclosure favors scale metrics (organizations, partners, employees) over financial statements and unit economics.
            evidence_claim_ids:
              - EC-002
              - EC-035
            risk_ids:
              - R-001
        hidden_risks:
          - Interview-based growth claims can mask material mix or margin changes after the AXELOS acquisition if not reconciled to audited accounts.
        evidence_gaps:
          - Three years of audited income statements, balance sheets, cash-flow statements, and footnotes were not publicly located.
          - No public breakdown of sales or gross profit by product, channel, or geography was identified.
          - Accounts receivable aging and backlog by customer are private-data items.
        follow_up_questions:
          - What were revenue, gross margin, EBITDA, and cash conversion for the last three fiscal years?
          - How much of current revenue comes from government, enterprise, training partners, and direct-to-candidate channels?
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-002
          - EC-011
          - EC-035
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public pages reveal strategic growth drivers—AXELOS ownership, AI content, partner scale, and membership upsell—but not formal financial projections or modeling assumptions.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Growth drivers are visible in public sources, but quarterly forecasts, capital-expenditure assumptions, and financing cases are not.
            evidence_claim_ids:
              - EC-014
              - EC-018
              - EC-019
              - EC-035
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - A business with meaningful government exposure and partner dependence can have different predictability dynamics than direct SaaS revenue.
        evidence_gaps:
          - No public three-year quarterly forecast package, scenario model, or external-financing assumptions were located.
          - No public disclosure of pricing realization assumptions, FX sensitivity, or working-capital planning was found.
        follow_up_questions:
          - What are management’s base, upside, and downside cases through 2029?
          - What covenant and liquidity headroom assumptions underpin the business plan?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-014
          - EC-018
          - EC-019
          - EC-035
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public capital-structure visibility is limited but sufficient to establish founder-led governance, a 2021 FTV minority stake, a Cyprus parent entity, and secured debt refinanced in 2025.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: PeopleCert’s public record shows founder/family leadership plus a minority FTV stake, but not share counts or dilution schedules.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-036
            risk_ids:
              - R-002
              - R-008
          - finding_id: I.C-F2
            finding: The parent entity and debt issuer are public, yet noteholder identity, options, warrants, and covenant detail are not.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-036
            risk_ids:
              - R-002
        hidden_risks:
          - The gap between legal-parent disclosures, market-database geography, and public transaction commentary can obscure where value and debt legally sit.
        evidence_gaps:
          - No public fully diluted cap table, option pool, warrant schedule, or debt covenant package was identified.
          - No public off-balance-sheet liability schedule was found.
        follow_up_questions:
          - What percentage does FTV Capital own today, and what governance rights accompany that ownership?
          - What are the restricted-payment, leverage, and springing-liquidity covenants on outstanding notes?
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-005
          - EC-006
          - EC-007
          - EC-036
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history is materially clearer than public operating-financial disclosure, with visible M&A, debt financing, and a unicorn valuation snapshot.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: "The AXELOS transaction created a clear public financing trail: £380m target valuation, €300m 2026 notes at close, and €300m 2031 notes at refinance."
            evidence_claim_ids:
              - EC-004
              - EC-005
              - EC-006
            risk_ids:
              - R-002
          - finding_id: I.D-F2
            finding: CB Insights still classifies PeopleCert as a March 2026 unicorn at $1.27B, but that valuation is not an audited company disclosure.
            evidence_claim_ids:
              - EC-008
            risk_ids: []
        hidden_risks:
          - A strong valuation narrative can obscure the need to understand post-acquisition cash generation and leverage.
        evidence_gaps:
          - Tax positions, NOLs, and revenue-recognition policies were not publicly disclosed.
          - No public current-basis schedule for all rounds or shareholder classes was found.
        follow_up_questions:
          - How has leverage moved since the 2021 AXELOS close and 2025 refinance?
          - What tax and revenue-recognition policies govern bundled training, exams, retakes, and memberships?
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-006
          - EC-008
