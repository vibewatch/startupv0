risk_register:
  - risk_id: R-001
    risk_title: Financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence shows scale, financing events, and anecdotal growth claims, but not audited financial statements, ARR, or projections.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
      - V.D
      - V.E
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request three years of audited financials, monthly KPI dashboards, and management forecast bridge by product, channel, and geography.
  - risk_id: R-002
    risk_title: Leverage and refinancing dependence
    risk_category: financing
    severity: high
    likelihood: medium
    description: The AXELOS acquisition used secured debt and the company refinanced €300m of notes in 2025, creating execution and covenant risk that cannot be evaluated from public data alone.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - I.D
      - VIII.F
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Obtain indentures, covenant package, leverage history, cash-interest burden, and base/downside refinancing cases.
  - risk_id: R-003
    risk_title: Portfolio and IP concentration
    risk_category: product
    severity: medium
    likelihood: medium
    description: PeopleCert’s strongest moat appears tied to flagship frameworks such as ITIL and PRINCE2 plus acquired certification brands, concentrating brand and renewal risk.
    impacted_chapter_ids:
      - II
      - IV
      - VIII
    impacted_section_ids:
      - II.A
      - IV.A
      - VIII.D
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request revenue concentration by framework, renewal rates for each brand family, and ownership/license documentation.
  - risk_id: R-004
    risk_title: Customer concentration not disclosed
    risk_category: customer
    severity: high
    likelihood: medium
    description: The company discloses aggregate enterprise and government reach, but not named top customers or any 5%+ revenue exposure.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request top-20 customers, public-sector share, renewal terms, NRR/churn, and backlog by cohort.
  - risk_id: R-005
    risk_title: Partner-channel dependency
    risk_category: operational
    severity: medium
    likelihood: high
    description: A large share of distribution and learning delivery depends on accredited training organizations and broader partners, creating channel-control and quality drift risk.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - III.E
      - V.A
      - V.C
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request active-partner counts, revenue contribution, partner churn, audit failure rates, and top-partner concentration.
  - risk_id: R-006
    risk_title: Regulatory and compliance complexity
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: LanguageCert regulation, global exam delivery, and multi-standard compliance create ongoing audit, localization, and jurisdictional obligations.
    impacted_chapter_ids:
      - II
      - V
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - V.A
      - VI.A
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request compliance calendar, regulatory correspondence, internal audit findings, and any material remediation projects.
  - risk_id: R-007
    risk_title: Technology and vendor dependency
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Observed site and exam-stack disclosures point to dependency on Azure/Microsoft services, payment vendors, analytics, and web tooling that may affect resilience and data protection.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.E
      - VI.A
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request architecture diagrams, vendor SLAs, cloud spend concentration, BCP/DR test results, and security incident logs.
  - risk_id: R-008
    risk_title: Founder and family governance concentration
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public governance shows the founder plus family members in senior leadership roles, increasing key-person and governance concentration risk.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.C
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request shareholder rights, reserved matters, independent-director roles, and succession planning materials.
  - risk_id: R-009
    risk_title: Product transition risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Version launches and retirement schedules (for example PRINCE2 Agile v1 retirement) require ecosystem migration and can disrupt partner and candidate demand.
    impacted_chapter_ids:
      - II
      - V
      - VI
    impacted_section_ids:
      - II.A
      - V.C
      - VI.B
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request migration KPIs, voucher liability analysis, and adoption rates for new product/version cohorts.
  - risk_id: R-010
    risk_title: Legal visibility gap
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Accessible public-web review did not surface clear pending litigation or contract disputes, but the absence of surfaced results is not a substitute for professional docket review.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.F
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Have counsel run full UK/EU/US docket, sanctions, lien, and IP-registry searches and review material contracts and insurance schedules.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited income statements, balance sheets, cash-flow statements, and footnotes for the last three years.
    why_it_matters: Public scale metrics cannot validate revenue quality, margins, or cash conversion.
    suggested_source_or_request: Company / accountant data room request.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Quarterly forecast package with assumptions, scenarios, FX sensitivity, capex, and financing cases.
    why_it_matters: Needed to test predictability and refinancing resilience.
    suggested_source_or_request: Company CFO / FP&A request.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option/warrant schedules, FTV ownership percentage, and full note covenant package.
    why_it_matters: Required to understand governance, dilution, and leverage risk.
    suggested_source_or_request: Company / investor / counsel request.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer list, 5%+ revenue concentrations, public-sector mix, NRR, and churn by cohort.
    why_it_matters: Aggregate logos do not show economic concentration or renewal risk.
    suggested_source_or_request: Company / investor request.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top-supplier list by spend, SLAs, cloud concentration, and exit constraints.
    why_it_matters: Observed service dependencies do not quantify operational concentration.
    suggested_source_or_request: Company procurement / CTO request.
    priority: medium
  - gap_id: G-006
    chapter_id: II
    section_id: II.A
    missing_information: Product-level revenue, gross margin, attach rates, pass rates, and ownership-versus-license details.
    why_it_matters: Needed to size moat, profitability, and rights-chain risk by brand family.
    suggested_source_or_request: Company product / finance request.
    priority: high
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quotas, sales-cycle data, CAC, payback, and channel-mix economics.
    why_it_matters: Commercial efficiency cannot be inferred from hiring signals alone.
    suggested_source_or_request: Company CRO / finance request.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D spend, engineering headcount split, roadmap governance, and launch KPIs.
    why_it_matters: Public roadmap signals do not quantify execution discipline or investment intensity.
    suggested_source_or_request: Company product / CTO request.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.D
    missing_information: Executive compensation, equity plans, attrition data, and employee-relations history.
    why_it_matters: Key-person retention and organization health are material to execution.
    suggested_source_or_request: Company HR / board request.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Counsel-led litigation, sanctions, lien, contract, and IP-registry searches plus insurance schedules.
    why_it_matters: Accessible web search is not sufficient to clear legal and exposure risk.
    suggested_source_or_request: External counsel / company request.
    priority: high
