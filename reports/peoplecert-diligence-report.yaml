report_metadata:
  report_title: PeopleCert Startup Diligence Research Report
  target_company: PeopleCert
  website: https://www.peoplecert.org/
  known_aliases:
    - PeopleCert Group
    - PeopleCert International Limited
    - PeopleCert Wisdom Issuer plc
  sector: Enterprise Tech / certification and assessment
  geography: United Kingdom, Greece, Cyprus, and global delivery footprint
  company_stage: Private unicorn / scaled certification platform
  research_date: 2026-06-14
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: Mixed public disclosures (USD, EUR, GBP)
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - PeopleCert-owned sources across about, investor relations, product, partner, careers, policy, and location pages
    - Independent interview/profile coverage and investor transaction commentary
    - CB Insights current unicorn list (March 2026 snapshot) via public web mirror
    - Competitor first-party sites for positioning comparisons
    - Official regulatory qualification register for LanguageCert in Wales
  included_jurisdictions:
    - United Kingdom
    - Cyprus
    - Greece
    - European Union
    - Global web footprint
  excluded_topics:
    - Private financial statements and data-room materials
    - Non-public customer references and contracts
    - Jurisdiction-by-jurisdiction court-docket subscription services
  user_provided_materials: []
