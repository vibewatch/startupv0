  - figure_id: F-011
    title: PeopleCert diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of the report’s core diligence risks by severity and likelihood.
    purpose: Prioritize follow-up diligence where public evidence is strong enough to suggest material risk.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial opacity
          severity: high
          likelihood: high
          rationale: Public evidence shows scale, financing events, and anecdotal growth claims, but not audited financial statements, ARR, or projections.
          evidence_claim_ids: &a1
            - EC-011
            - EC-035
          source_ids:
            - SRC-023
            - SRC-005
            - SRC-006
        - risk_id: R-002
          label: Leverage and refinancing dependence
          severity: high
          likelihood: medium
          rationale: The AXELOS acquisition used secured debt and the company refinanced €300m of notes in 2025, creating execution and covenant risk that cannot be evaluated from public data alone.
          evidence_claim_ids: &a2
            - EC-005
            - EC-006
          source_ids:
            - SRC-004
            - SRC-006
        - risk_id: R-003
          label: Portfolio and IP concentration
          severity: medium
          likelihood: medium
          rationale: PeopleCert’s strongest moat appears tied to flagship frameworks such as ITIL and PRINCE2 plus acquired certification brands, concentrating brand and renewal risk.
          evidence_claim_ids: &a3
            - EC-004
            - EC-013
            - EC-014
            - EC-015
          source_ids:
            - SRC-003
            - SRC-007
            - SRC-008
            - SRC-009
        - risk_id: R-004
          label: Customer concentration not disclosed
          severity: high
          likelihood: medium
          rationale: The company discloses aggregate enterprise and government reach, but not named top customers or any 5%+ revenue exposure.
          evidence_claim_ids: &a4
            - EC-001
            - EC-002
            - EC-037
          source_ids:
            - SRC-001
            - SRC-005
            - SRC-021
            - SRC-031
        - risk_id: R-005
          label: Partner-channel dependency
          severity: medium
          likelihood: high
          rationale: A large share of distribution and learning delivery depends on accredited training organizations and broader partners, creating channel-control and quality drift risk.
          evidence_claim_ids: &a5
            - EC-002
            - EC-021
            - EC-022
            - EC-023
          source_ids:
            - SRC-005
            - SRC-014
            - SRC-015
            - SRC-016
        - risk_id: R-006
          label: Regulatory and compliance complexity
          severity: medium
          likelihood: medium
          rationale: LanguageCert regulation, global exam delivery, and multi-standard compliance create ongoing audit, localization, and jurisdictional obligations.
          evidence_claim_ids: &a6
            - EC-024
            - EC-025
            - EC-027
          source_ids:
            - SRC-017
            - SRC-030
            - SRC-020
        - risk_id: R-007
          label: Technology and vendor dependency
          severity: medium
          likelihood: medium
          rationale: Observed site and exam-stack disclosures point to dependency on Azure/Microsoft services, payment vendors, analytics, and web tooling that may affect resilience and data protection.
          evidence_claim_ids: &a7
            - EC-020
            - EC-024
            - EC-030
          source_ids:
            - SRC-013
            - SRC-017
            - SRC-031
        - risk_id: R-008
          label: Founder and family governance concentration
          severity: medium
          likelihood: medium
          rationale: Public governance shows the founder plus family members in senior leadership roles, increasing key-person and governance concentration risk.
          evidence_claim_ids: &a8
            - EC-003
            - EC-009
          source_ids:
            - SRC-002
            - SRC-023
        - risk_id: R-009
          label: Product transition risk
          severity: medium
          likelihood: medium
          rationale: Version launches and retirement schedules (for example PRINCE2 Agile v1 retirement) require ecosystem migration and can disrupt partner and candidate demand.
          evidence_claim_ids: &a9
            - EC-014
            - EC-016
            - EC-019
          source_ids:
            - SRC-008
            - SRC-010
            - SRC-022
        - risk_id: R-010
          label: Legal visibility gap
          severity: medium
          likelihood: unknown
          rationale: Accessible public-web review did not surface clear pending litigation or contract disputes, but the absence of surfaced results is not a substitute for professional docket review.
          evidence_claim_ids: &a10
            - EC-039
            - EC-040
          source_ids:
            - SRC-032
    rendering_guidance:
      preferred_format: table_visual
      display_notes: Plot all risks and use labels or tooltips for rationale.
    evidence_claim_ids:
