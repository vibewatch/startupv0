report_metadata:
  report_title: Reflection AI Startup Diligence Research Report
  target_company: Reflection AI
  website: https://reflection.ai/
  known_aliases:
    - Reflection
    - reflection.ai
    - Asimov
  sector: Enterprise technology / frontier open AI models and coding agents
  geography: United States / New York and San Francisco hiring signals
  company_stage: Private venture-backed unicorn / frontier AI lab
  research_date: 2026-06-15
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from reports/*-diligence-report.yaml and selected Reflection AI via shuf -n 3 from the CB Insights unicorn list.
    - Used public company pages, public private-market research, and reader-backed search result excerpts; no paywall bypasses or private data-room records.
    - Marked revenue, customers, cap table, contracts, legal schedules, and model-safety artifacts as not_publicly_verifiable where public evidence was absent.
  included_jurisdictions:
    - United States
    - New York
    - California
    - United Kingdom hiring signals
  excluded_topics:
    - No paywall bypasses, private systems, data-room access, customer calls, management interviews or counsel-led docket pulls.
    - No private personal contact details included.
    - Public web evidence only; inaccessible sources are recorded as limitations.
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn diligence workflow request and CB Insights target row
      type: workflow_request
      date_received: 2026-06-15
      notes: Selected by shuf -n 3 from CB Insights current unicorn-list candidates after excluding existing report slugs; target slug reflection-ai.
