executive_summary:
  overall_assessment: Reflection AI is an eligible uncovered private unicorn with public evidence supporting its $8.0B valuation/status and active product operations. The public record is sufficient for a standard outside-in screen but not for investment-grade financial, customer, legal or governance clearance.
  investment_or_diligence_thesis: The diligence thesis is to validate whether Reflection AI's public category position and financing history translate into durable revenue, efficient growth, customer retention and defensible operations at the public valuation level.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Reflection AI is an eligible private unicorn valued at $8B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Reflection AI is building frontier open intelligence/open foundation models and related coding-agent infrastructure.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: The company has a high-caliber AI research team and is hiring across major AI hubs.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Valuation and financing quality are not publicly auditable
    - risk_id: R-002
      summary: Customer traction and revenue quality are opaque
    - risk_id: R-003
      summary: Capital intensity and commoditization pressure in frontier/open AI
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, cash runway and cap table.
    - Customer-level ARR, churn, renewal, concentration and reference evidence.
    - Legal, regulatory, IP, insurance, security and material contract schedules.
  recommended_next_steps:
    - Request a management data-room package covering financials, customers, product metrics, HR and legal schedules.
    - Run customer, partner/supplier and counsel-led public-record diligence before relying on public valuation.
    - Reconcile all public tracker/database claims against signed company records.
