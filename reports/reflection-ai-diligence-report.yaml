risk_register:
  - risk_id: R-001
    risk_title: Valuation and financing quality are not publicly auditable
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $8B public valuation is supported by trackers and private-market reporting, but round terms, liquidation preferences, insider participation and runway are unavailable.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a13
    mitigation_or_diligence_request: Request full cap table, financing documents, cash balance, burn, runway and investor rights.
  - risk_id: R-002
    risk_title: Customer traction and revenue quality are opaque
    risk_category: customer
    severity: high
    likelihood: unknown
    description: No public customer list, ARR, retention, ACV or revenue concentration data was found; design-partner claims may not convert to scalable paid revenue.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.B
    evidence_claim_ids: *a14
    mitigation_or_diligence_request: Request customer cohort exports, signed contracts, pipeline, churn and reference calls.
  - risk_id: R-003
    risk_title: Capital intensity and commoditization pressure in frontier/open AI
    risk_category: technical
    severity: high
    likelihood: high
    description: The strategy requires expensive compute and top-tier talent while open-source and hyperscaler alternatives can pressure pricing and differentiation.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
    evidence_claim_ids: *a15
    mitigation_or_diligence_request: Review compute commitments, model benchmarks, gross margin, deployment economics and defensibility.
  - risk_id: R-004
    risk_title: Talent concentration and execution risk in a young company
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public evidence shows elite hiring but does not disclose leadership depth, retention, operating cadence or controls.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.C
    evidence_claim_ids: *a16
    mitigation_or_diligence_request: Request org chart, turnover, key-person dependencies and hiring plan.
  - risk_id: R-005
    risk_title: Legal, IP and AI safety exposure not publicly diligenceable
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Open-weight frontier model work raises IP, data provenance, licensing, safety and regulatory questions that are not resolved by public pages.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.D
      - VIII.G
    evidence_claim_ids: *a17
    mitigation_or_diligence_request: Request IP assignment schedule, training-data policy, model cards, safety evals, DPAs, insurance and counsel memos.
