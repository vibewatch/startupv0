  - figure_id: F-008
    title: Risk heatmap
    chapter_id: VIII
    section_id: VIII.A
    figure_type: risk_heatmap
    description: Risk register severity/likelihood mapped for diligence prioritization.
    purpose: Prioritize legal, financial, customer and operating follow-up.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Valuation and financing quality are not publicly auditable
          severity: high
          likelihood: medium
          rationale: The $8B public valuation is supported by trackers and private-market reporting, but round terms, liquidation preferences, insider participation and runway are unavailable.
          evidence_claim_ids: &a13
            - EC-001
            - EC-002
          source_ids:
            - SRC-001
            - SRC-005
        - risk_id: R-002
          label: Customer traction and revenue quality are opaque
          severity: high
          likelihood: unknown
          rationale: No public customer list, ARR, retention, ACV or revenue concentration data was found; design-partner claims may not convert to scalable paid revenue.
          evidence_claim_ids: &a14
            - EC-007
            - EC-009
          source_ids:
            - SRC-002
            - SRC-005
        - risk_id: R-003
          label: Capital intensity and commoditization pressure in frontier/open AI
          severity: high
          likelihood: high
          rationale: The strategy requires expensive compute and top-tier talent while open-source and hyperscaler alternatives can pressure pricing and differentiation.
          evidence_claim_ids: &a15
            - EC-004
            - EC-006
            - EC-008
          source_ids:
            - SRC-003
            - SRC-005
