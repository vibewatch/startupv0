risk_register:
  - risk_id: R-001
    risk_title: Financial statements and revenue quality are private
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources did not provide audited financial statements, ARR, revenue bridge, margin detail, burn, cash, debt, backlog, deferred revenue, or AR aging.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a66
    mitigation_or_diligence_request: Request audited financials, monthly management accounts, QoE, ARR bridge, revenue recognition memo, cash/debt schedule, and board plan.
  - risk_id: R-002
    risk_title: Valuation and cap-table economics are unverified
    risk_category: financing
    severity: high
    likelihood: unknown
    description: The $11B context is not enough to underwrite current value without share count, preferences, debt-like instruments, secondary marks, and option pool.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids: *a67
    mitigation_or_diligence_request: Request cap table, financing documents, liquidation waterfall, SAFEs/notes/warrants, option pool, and recent secondary transactions.
  - risk_id: R-003
    risk_title: Paid conversion, retention, and customer concentration are unknown
    risk_category: customer
    severity: high
    likelihood: high
    description: 100M users and marquee customer logos do not reveal paid seats, NRR, churn, expansion, concentration, or customer-health distribution.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a68
    mitigation_or_diligence_request: Request cohort retention, paid conversion funnel, top-customer ARR, renewal/expansion schedules, churn reasons, and reference calls.
  - risk_id: R-004
    risk_title: AI workspace competition is intense
    risk_category: market
    severity: high
    likelihood: high
    description: Notion competes with hyperscalers and specialist work-management/database tools that can bundle AI, email, docs, and workflow into existing procurement relationships.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
    evidence_claim_ids: *a69
    mitigation_or_diligence_request: Request win/loss data, competitive displacement analysis, SKU attach rates, procurement notes, and customer references.
  - risk_id: R-005
    risk_title: AI/security/privacy governance requires private evidence
    risk_category: technical
    severity: high
    likelihood: medium
    description: Enterprise workspace data, AI subprocessors, connectors, permissions, and data residency introduce high-sensitivity control requirements.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a70
    mitigation_or_diligence_request: Request SOC 2, pen tests, incident register, AI data-flow/model-vendor inventory, DPA, subprocessors, residency architecture, and security roadmap.
  - risk_id: R-006
    risk_title: Patent/IP litigation and acquired-IP exposure
    risk_category: legal
    severity: medium
    likelihood: medium
    description: CourtListener shows recent patent-related matters and Notion has acquired products whose IP assignments and open-source compliance should be reviewed.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.A
      - VIII.D
    evidence_claim_ids: *a71
    mitigation_or_diligence_request: Request litigation docket files, counsel memos, insurance/reserve analysis, acquisition IP assignments, OSS scan, patent portfolio, and invention agreements.
  - risk_id: R-007
    risk_title: Cloud, LLM, and SaaS dependency concentration
    risk_category: technical
    severity: medium
    likelihood: high
    description: Public sources imply AWS, Snowflake/data stack, Google ecosystem, APIs, third-party AI subprocessors, and integration dependencies that can affect cost, resiliency, and margins.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.C
    evidence_claim_ids: *a72
    mitigation_or_diligence_request: Request vendor contracts, cloud/LLM spend, SLAs, incident postmortems, data architecture, model fallback strategy, and procurement commitments.
  - risk_id: R-008
    risk_title: Global hiring scale and org effectiveness are not proven
    risk_category: team
    severity: medium
    likelihood: medium
    description: A broad hiring footprint suggests scaling needs, but public data does not reveal headcount, attrition, management depth, diversity, compensation, or productivity.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.F
      - VII.G
    evidence_claim_ids: *a73
    mitigation_or_diligence_request: Request org chart, headcount roll-forward, attrition, compensation bands, regretted-loss analysis, employee survey trends, and hiring plan.
  - risk_id: R-009
    risk_title: Prosumer-to-enterprise motion can create support and packaging complexity
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Broad individual/team adoption plus enterprise controls may create segmentation, support-cost, channel-conflict, and discounting pressure.
    impacted_chapter_ids:
      - V
    impacted_section_ids:
      - V.A
      - V.C
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-003
      - EC-005
      - EC-007
      - EC-008
    mitigation_or_diligence_request: Request segmentation economics, support cost by cohort, pricing experiments, enterprise discounting, and partner/channel performance.
  - risk_id: R-010
    risk_title: M&A integration and product-sprawl execution risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Calendar, Mail, Automate.io integrations, Campsite, Developer Platform, and agents broaden surface area and integration demands.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-004
      - EC-009
      - EC-013
    mitigation_or_diligence_request: Request product roadmap, M&A integration plans, acquired-team retention, feature usage by SKU, uptime, and product-margin contribution.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, and QoE
    why_it_matters: Without original financials, revenue quality, controls, profitability, burn, and forecast integrity cannot be underwritten.
    suggested_source_or_request: Request audited financials, monthly management accounts, trial balance, revenue recognition memo, QoE pack, and auditor communications.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, financing terms, and liquidation waterfall
    why_it_matters: Headline valuation may not reflect economic ownership or downside exposure.
    suggested_source_or_request: Request fully diluted cap table, financing docs, liquidation waterfall, investor rights, SAFEs/notes/warrants, option/RSU plans, and secondary trades.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: ARR bridge, paid conversion, retention, churn, and customer concentration
    why_it_matters: User and logo claims do not establish durable paid revenue.
    suggested_source_or_request: Request ARR bridge by product/geography/segment, cohort retention, NRR/GRR/churn, top-customer ARR, renewal calendar, and churned-logo list.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, sales productivity, pipeline conversion, discounts, and support costs
    why_it_matters: GTM efficiency determines whether growth can continue without excessive burn.
    suggested_source_or_request: Request channel CAC, payback, pipeline conversion, quota capacity, sales-cycle, discount approvals, and support-cost analysis.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.C
    missing_information: Security, privacy, AI governance, and incident evidence
    why_it_matters: Enterprise workspace data and AI subprocessors create high-stakes control requirements.
    suggested_source_or_request: Request SOC reports, pen tests, vulnerability metrics, incident register, AI data-flow/model-vendor docs, DPA/subprocessors, and residency architecture.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture, vendor spend, cloud/LLM COGS, and operational resiliency
    why_it_matters: AI and data infrastructure costs/dependencies can affect margin and reliability.
    suggested_source_or_request: Request system architecture, cloud/LLM/data vendor contracts, COGS bridge, uptime/SLOs, incident postmortems, scaling plan, and model fallback strategy.
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP ownership, OSS compliance, patents, and acquisition agreements
    why_it_matters: Patent-related litigation and acquired products require proof of rights and no hidden liabilities.
    suggested_source_or_request: Request IP assignment records, patent portfolio, OSS/SBOM scan, acquired-company files, purchase agreements, earnouts, employee invention agreements, and counsel memos.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.A
    missing_information: Org chart, headcount, attrition, compensation, and culture evidence
    why_it_matters: Global scaling risk cannot be assessed from open roles alone.
    suggested_source_or_request: Request org chart, headcount roll-forward, hiring plan, compensation/equity bands, attrition/regretted-loss analysis, and employee survey trends.
    priority: medium
  - gap_id: G-009
    chapter_id: IV
    section_id: IV.A
    missing_information: Competitive win/loss and pricing power
    why_it_matters: Public product overlap does not quantify displacement risk or defensibility.
    suggested_source_or_request: Request competitive win/loss database, procurement notes, displacement cases, pricing/discount analysis, and customer references against key competitors.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation, insurance, and reserve schedule
    why_it_matters: Court index snippets are insufficient to assess legal exposure.
    suggested_source_or_request: Request counsel litigation schedule, docket files, claims charts, insurance policies, deductibles/exclusions, reserves, and settlement history.
    priority: medium
