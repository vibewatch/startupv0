executive_summary:
  overall_assessment: Track with high diligence intensity. Notion has strong public evidence of product breadth, brand/community scale, AI/platform expansion, enterprise controls, marquee customers, and global hiring; however, investment-grade underwriting is blocked by private gaps in financials, cap table, retention, unit economics, security/AI governance evidence, customer concentration, and legal/IP exposure.
  investment_or_diligence_thesis: Notion could be a category-defining AI workspace if broad user adoption converts into durable enterprise ARR with efficient AI economics and defensible workflow depth. The diligence case turns on proving revenue quality, paid retention, gross margin after AI/cloud costs, security/privacy controls, and competitive resilience against bundled hyperscaler suites and work-management incumbents.
  strongest_verified_claims:
    - founder_claim_id: FC-003
      summary: Notion publicly claims over 100M users.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: Public product pages support a broad connected workspace and AI/product suite.
      evidence_claim_ids:
        - EC-004
        - EC-012
    - founder_claim_id: FC-005
      summary: List pricing and AI add-on packaging are public.
      evidence_claim_ids:
        - EC-005
    - founder_claim_id: FC-006
      summary: Enterprise security and privacy/residency controls are publicly described, though implementation evidence is private.
      evidence_claim_ids:
        - EC-006
        - EC-014
    - founder_claim_id: FC-007
      summary: Selected customer stories including Ramp and Vercel are public.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, ARR, margin, burn, cash, and debt are not public.
    - risk_id: R-002
      summary: Headline valuation cannot be underwritten without cap table and financing terms.
    - risk_id: R-003
      summary: User scale and logos do not prove paid conversion, retention, or concentration.
    - risk_id: R-004
      summary: AI workspace competition from Microsoft, Google, Atlassian, ClickUp, Coda, Airtable, Asana, and Monday.com is intense.
    - risk_id: R-005
      summary: AI/security/privacy governance requires private control evidence.
  key_evidence_gaps:
    - Audited financial statements, management accounts, ARR bridge, gross margin, cash/debt, and burn/runway.
    - Current cap table, financing documents, liquidation preferences, investor rights, and secondary transactions.
    - Paid conversion, active-user definitions, cohort retention, NRR/GRR, churn, customer concentration, and contract terms.
    - Security/privacy/AI governance evidence, SOC reports, pen tests, incident history, DPA/subprocessors, and data residency architecture.
    - Architecture, vendor spend, cloud/LLM COGS, product telemetry, AI evals, M&A/IP assignments, legal docket/reserves, org chart, compensation, and attrition.
  recommended_next_steps:
    - Open confidential financial/cap-table data room and commission quality-of-earnings review.
    - Run customer diligence with top accounts, churned customers, and competitive win/loss interviews.
    - Perform security/privacy/AI governance review including SOC, pen-test, incident, DPA/subprocessor, model-vendor, and residency evidence.
    - Review material contracts, vendor commitments, cloud/LLM economics, acquired-IP files, open-source scans, litigation dockets, insurance, and reserves.
    - Interview leadership and review org chart, hiring plan, compensation/equity, attrition, and product roadmap before any investment decision.
