report_metadata:
  report_title: Notion Labs, Inc. — Private Unicorn Diligence Report
  target_company: Notion Labs, Inc.
  website: https://www.notion.com/
  known_aliases:
    - Notion
    - Notion Labs
  sector: Collaboration software, productivity, knowledge management, AI workspace
  geography: United States with global commercial and hiring footprint
  company_stage: Private unicorn / late-stage venture-backed company
  research_date: 2026-06-01
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public-source diligence only: company pages, investor/press sources, court-record search, customer stories, careers/jobs pages, and competitor product pages."
    - No private data room, management interview, customer call, code/security access, or paid database export was available.
    - Blocked/rate-limited sources were not bypassed; unverifiable claims are marked as gaps or partial verification.
  included_jurisdictions:
    - United States
    - European Union / Ireland
    - Japan
    - Korea
    - Australia
    - Global customer footprint where public evidence exists
  excluded_topics:
    - Non-public financial statements
    - Tax diligence
    - Full legal docket review
    - Security penetration testing
    - Customer interviews
    - Management interviews
  user_provided_materials:
    - material_id: UPM-001
      title: User request for standard-depth private unicorn diligence report on Notion
      type: instruction
      date_received: 2026-06-01
      notes: No company confidential material provided.
