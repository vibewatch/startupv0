risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and stale valuation marks
    risk_category: financial
    severity: high
    likelihood: high
    description: Public evidence anchors ecosystem activity and historical financings, but not Patreons current revenue, gross margin, burn, debt or board-marked valuation.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-007
    mitigation_or_diligence_request: Obtain FY2023-FY2025 audited financials, ARR bridge, cash-burn schedule, debt summary and current 409A / board valuation materials.
  - risk_id: R-002
    risk_title: App-store and pricing friction
    risk_category: operational
    severity: high
    likelihood: high
    description: Apple billing rules can stack a 30 percent app-store fee on top of Patreon platform fees or push creators toward web checkout, creating conversion and margin friction.
    impacted_chapter_ids:
      - I
      - II
      - V
      - VIII
    impacted_section_ids:
      - I.D
      - II.A
      - V.C
      - VIII.F
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-014
      - EC-024
    mitigation_or_diligence_request: Request channel-level conversion, net take-rate and gross-to-net payment economics before and after iOS policy changes.
  - risk_id: R-003
    risk_title: Content moderation and adult-category constraints
    risk_category: regulatory
    severity: high
    likelihood: high
    description: Trust-and-safety review, adult-content payment-partner rules and feature gating may constrain supply-side growth and generate creator dissatisfaction or churn.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.A
      - VIII.G
    evidence_claim_ids:
      - EC-019
      - EC-020
      - EC-021
    mitigation_or_diligence_request: Request appeals rates, policy-exception workflows, adult-creator retention, and any revenue exposure to category-specific restrictions.
  - risk_id: R-004
    risk_title: Competitive unbundling and fee pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Substack, Beehiiv, YouTube memberships, Ko-fi, Buy Me a Coffee and OnlyFans each attack different parts of Patreons bundle using lower fees, built-in distribution or stronger niche economics.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.C
    evidence_claim_ids:
      - EC-027
      - EC-028
      - EC-029
    mitigation_or_diligence_request: Quantify creator win/loss reasons, cohort churn to alternatives, and feature-level willingness to pay.
  - risk_id: R-005
    risk_title: External dependency concentration
    risk_category: operational
    severity: medium
    likelihood: high
    description: Patreon depends on Apple, AWS, payment rails and multiple integrations to deliver commerce, hosting, community access and payouts, but concentration and contract terms are private.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - III.B
      - III.E
      - VIII.F
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-018
      - EC-022
    mitigation_or_diligence_request: Request top-vendor spend, uptime/SLA terms, termination rights, and contingency planning for Apple and payment partners.
  - risk_id: R-006
    risk_title: Product-sprawl and execution complexity
    risk_category: product
    severity: medium
    likelihood: high
    description: Patreon now spans memberships, commerce, discovery, video, podcasts, live events, profile-combining and billing migrations, raising rollout, support and technical-debt risk.
    impacted_chapter_ids:
      - II
      - V
      - VI
    impacted_section_ids:
      - II.A
      - V.C
      - VI.B
    evidence_claim_ids:
      - EC-012
      - EC-013
      - EC-015
      - EC-016
      - EC-017
    mitigation_or_diligence_request: Request product P&Ls, roadmap sequencing, engineering-capacity plans, and module-level adoption / support-burden metrics.
  - risk_id: R-007
    risk_title: Team scaling volatility
    risk_category: team
    severity: medium
    likelihood: medium
    description: Repeated layoffs and office closures indicate prior over-hiring and operating-model resets, even as Patreon continues to hire for selected roles.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
      - VII.G
    evidence_claim_ids:
      - EC-025
      - EC-026
    mitigation_or_diligence_request: Request current headcount by function and geography, regretted attrition, hiring-plan assumptions and manager span-of-control metrics.
  - risk_id: R-008
    risk_title: Privacy, security and litigation exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Patreon handles DSARs, DMCA notices, law-enforcement requests and member data at scale and has settled at least one VPPA class action tied to Meta Pixel usage on video pages.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - VIII.G
    evidence_claim_ids:
      - EC-019
      - EC-022
      - EC-023
      - EC-030
    mitigation_or_diligence_request: Obtain incident history, privacy counsel memos, insurance schedule, vendor due diligence, and settlement / remediation status for historic claims.
  - risk_id: R-009
    risk_title: Customer and revenue concentration opacity
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Patreon publishes creator examples and aggregate ecosystem metrics, but not top-creator concentration, churn, NRR or creator-level cohort economics.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-007
      - EC-008
    mitigation_or_diligence_request: Request top-creator revenue concentration, cohort retention and free-to-paid conversion segmented by vertical and geography.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: FY2023-FY2025 audited financial statements and monthly ARR bridge
    why_it_matters: Without audited statements, it is impossible to underwrite Patreons margin profile, burn, and quality of earnings.
    suggested_source_or_request: Request audited financial statements, management accounts, ARR waterfall and deferred-revenue rollforward.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, liquidation preferences and debt instruments
    why_it_matters: Private-company financing and M&A-related equity issuance can materially affect upside and downside outcomes.
    suggested_source_or_request: Request current cap table, financing docs, debt schedule and all option/warrant/SAFE instruments.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.D
    missing_information: Revenue-recognition policy, tax positions and off-balance-sheet liabilities
    why_it_matters: Creator-platform fee recognition and tax treatment are essential to valuation and legal diligence.
    suggested_source_or_request: Request accounting policy memo, tax exposure summary and contingent-liability schedule.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-creator concentration, churn and NRR by vertical
    why_it_matters: A two-sided platform can look large publicly while being economically concentrated on a small number of creators.
    suggested_source_or_request: Request top-creator concentration tables and cohort retention / NRR data.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Supplier concentration and contract terms for Apple, AWS, payment rails and integrations
    why_it_matters: Operational leverage can sit with a few external parties even when public spend is not visible.
    suggested_source_or_request: Request vendor-spend concentration, SLAs, termination rights and contingency plans.
    priority: high
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, sales/productivity metrics and marketing budget
    why_it_matters: Public product-led GTM signals are not enough to assess efficient growth.
    suggested_source_or_request: Request channel-level CAC, conversion, sales productivity and budget plans.
    priority: medium
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: Module adoption, roadmap staffing and product economics
    why_it_matters: A broad product suite can create hidden complexity and support burden.
    suggested_source_or_request: Request MAU/WAU, attach-rate, support, infra-cost and roadmap-resourcing data by product family.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount by function and location plus org chart
    why_it_matters: Past layoffs are public, but current org strength and cost structure are not.
    suggested_source_or_request: Request current org chart, headcount plan, regretted attrition and manager spans.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Docket-complete litigation and settlement-status review
    why_it_matters: The VPPA settlement is public, but the full litigation picture could be broader.
    suggested_source_or_request: Have counsel perform PACER and state-court docket searches and confirm final status of public matters.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Patent, trademark, copyright, open-source and key-license schedule
    why_it_matters: Policy pages do not replace a counsel-built IP schedule.
    suggested_source_or_request: Run USPTO/WIPO/EUIPO searches and request internal IP inventory.
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Security audits, incident history and regulator correspondence
    why_it_matters: Public security/privacy pages show process, not outcomes.
    suggested_source_or_request: Request SOC-type reports, pen-test summaries, incident log and any regulator or law-enforcement correspondence.
    priority: high
