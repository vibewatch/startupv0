executive_summary:
  overall_assessment: "Eligible for a private-unicorn diligence report: public evidence shows Patreon remained active and private into 2026, with SEC Form D filings rather than public-company reporting and live official newsroom/help-center activity. The main underwriting risks are financial opacity, Apple-driven billing friction, category-specific moderation/payment constraints and rising competition from other creator stacks."
  investment_or_diligence_thesis: Patreon has credible scale and broad product ambition across memberships, commerce, media, discovery and live/community tooling. Public evidence is much stronger on creator/fan engagement and product breadth than on Patreons own revenue quality, margins, concentration, or current valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: SEC filings and active 2026 official sources support that Patreon is still operating as a private company.
      evidence_claim_ids:
        - EC-001
        - EC-005
        - EC-019
        - EC-023
    - founder_claim_id: FC-003
      summary: Patreon publicly reported more than 300,000 creators, more than 10 million paying memberships each month, and more than 60 million free memberships.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-005
      summary: Patreon publicly confirms a standard 10% plan for many new creators and meaningful Apple-driven iOS billing friction.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-024
    - founder_claim_id: FC-006
      summary: Patreon disclosed large-scale moderation, privacy and security/compliance workflows in 2025-2026 materials.
      evidence_claim_ids:
        - EC-019
        - EC-020
        - EC-021
        - EC-023
  biggest_risks:
    - risk_id: R-001
      summary: Public metrics describe ecosystem GMV and product momentum, not Patreons own margins, burn or current valuation.
    - risk_id: R-002
      summary: Apple billing rules and fee stacking can pressure creator conversion and net economics.
    - risk_id: R-003
      summary: Adult-category payment-partner and moderation constraints can limit supply growth and increase churn risk.
    - risk_id: R-004
      summary: Competitive pressure is broad, with lower-fee or audience-rich alternatives spanning newsletters, video, tips and adult monetization.
    - risk_id: R-007
      summary: Repeated layoffs indicate prior scaling resets and possible org-fragility risk.
  key_evidence_gaps:
    - FY2023-FY2025 audited financials, ARR bridge, gross margin, burn and debt summary.
    - Fully diluted cap table, option pool, liquidation preferences and any structured secondary activity.
    - Top-creator revenue concentration, churn, NRR and vertical cohort performance.
    - Contract economics and concentration for Apple, payment rails, AWS and key integrations.
    - Current 2026 executive roster, headcount by function/location and equity/compensation plans.
    - Docket-complete legal review, insurance schedule and detailed privacy/security audit outcomes.
  recommended_next_steps:
    - Request full finance package, board metrics and cap-table documents before relying on valuation or runway assumptions.
    - Run creator reference calls across major verticals, with special focus on podcasts, video-first creators and adult-category creators.
    - Obtain Apple, payment-processor, cloud-hosting and key integration contract summaries.
    - Ask counsel to perform docket, IP and regulator sweeps and confirm settlement/remediation status for the VPPA matter.
    - Request module-level adoption, support-burden and product P&Ls for network, live, video, shop and podcast tools.
chapters:
