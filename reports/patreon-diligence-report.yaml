          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources provide creator-GMV and membership proxies rather than Patreon income statements, balance sheets or cash flows.
        verification_status: partially_verified
        confidence: medium
        key_findings:
