          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public evidence identifies product and conversion drivers, but not management forecasts or financing assumptions.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
