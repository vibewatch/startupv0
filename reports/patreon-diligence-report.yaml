report_metadata:
  report_title: Patreon Startup Diligence Report
  target_company: Patreon
  website: https://www.patreon.com/
  known_aliases:
    - Patreon
    - Patreon, Inc.
  sector: Creator monetization, memberships, media and community platform
  geography: United States; San Francisco headquarters with global creator, fan and payout footprint
  company_stage: Private unicorn / late-stage creator-economy platform
  research_date: 2026-06-19
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Official Patreon newsroom, help-center, pricing, policy, privacy and security pages accessed via public web endpoints and r.jina.ai.
    - SEC EDGAR company submissions and Form D filings for private-offering history and private-company status checks.
    - Independent reporting from TechCrunch and The Verge for financing, layoffs, app-store changes, M&A and competitive context.
    - Public settlement documentation for the VPPA class action.
    - Direct access to main patreon.com marketing pages was limited by bot-protection/CAPTCHA during this run, so accessible official support/news pages were used instead.
  included_jurisdictions:
    - United States federal securities sources (SEC EDGAR).
    - United States public legal settlement materials.
    - Global platform policy, payment and data-processing obligations where Patreon states they apply cross-border.
  excluded_topics:
    - No private data room, board materials, audited financial package or cap table access.
    - No paid patent, trademark or court-docket database subscriptions.
    - No customer, employee, founder or investor interviews.
    - No technical penetration testing or private security audit reports.
    - No direct corporate-registry sweep outside accessible SEC and public web sources.
  user_provided_materials: []
