        follow_up_questions:
          - What are the FY2026-FY2028 revenue, burn, headcount and capital-expenditure plans by product line and geography?
        table_ids: []
        figure_ids: []
        evidence_claim_ids: *a2
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public SEC and media sources verify major financing events and an M&A-related equity issuance, but not the full current cap table.
        verification_status: partially_verified
        confidence: high
        key_findings:
