        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public competitor pages show direct alternatives in AWS MWAA, Google Cloud Composer, Prefect and Dagster, with additional DIY/self-managed Airflow pressure.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding: Astronomer is Airflow-native and benefits from Airflow ecosystem scale.
            evidence_claim_ids:
              - EC-016
              - EC-029
          - finding: AWS and Google offer managed Airflow alternatives; Prefect and Dagster position around workflow/data orchestration.
            evidence_claim_ids:
              - EC-023
          - finding: AWS and Microsoft partnerships coexist with hyperscaler competitive pressure.
            evidence_claim_ids:
              - EC-030
        hidden_risks:
          - Hyperscalers can bundle, discount or integrate managed orchestration in ways that compress Astronomer pricing; modern orchestration vendors can win greenfield workloads.
        evidence_gaps:
          - Win/loss by competitor; price realization versus AWS/GCP; market share; customer switching costs; reasons for renewals/downgrades.
        follow_up_questions:
          - Provide competitive win/loss cohort and discounting data for MWAA, Composer, Prefect, Dagster and DIY Airflow alternatives.
