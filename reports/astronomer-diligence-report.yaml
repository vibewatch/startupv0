  - chapter_id: IV
    title: Competition
    chapter_summary: Astronomer competes in workflow orchestration against hyperscaler managed-Airflow services, modern orchestration vendors, DIY Airflow and broader data-platform suites. Its Airflow-native specialization is real, but coopetition is a central risk.
    founder_claim_ids:
