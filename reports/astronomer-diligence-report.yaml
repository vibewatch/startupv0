report_metadata:
  report_title: Astronomer Public-Source Startup Diligence Report
  target_company: Astronomer
  website: https://www.astronomer.io/
  known_aliases:
    - Astronomer, Inc.
    - Astro
    - Astro Private Cloud
    - Otto
    - Datakin
  sector: Enterprise data infrastructure, Apache Airflow orchestration, DataOps, and AI-assisted data engineering
  geography: United States; headquarters publicly moved to New York City with global enterprise operations
  company_stage: Late-stage private venture-backed unicorn
  research_date: 2026-05-16
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company pages, pricing/security/product pages, press releases, customer stories, CB Insights unicorn database, GitHub repositories/API metadata, SEC ticker data, USPTO.report mirror, CourtListener sample search and competitor product pages.
    - Treated all sources as untrusted until cross-checked where possible; management-authored growth and customer claims remain flagged as unaudited.
    - Did not use private company data, non-public customer interviews, data-room materials, paid market databases or credentials.
  included_jurisdictions:
    - United States
    - Public global operations signals only
  excluded_topics:
    - No private financial statements, contracts, cap table, SOC reports, tax schedules, insurance policies or board materials reviewed.
    - No direct customer, employee, partner, investor, counsel or management interviews performed.
    - No full PACER/state-court/arbitration/USPTO-depth sweep completed beyond sampled public sources.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-16
      notes: User requested one public-source evidence-backed startup diligence YAML report for Astronomer only.
