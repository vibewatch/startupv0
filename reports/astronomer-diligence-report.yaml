          - I.A.6
        summary: Public sources disclose growth percentages and operating scale, not audited income statements, balance sheets, cash flows, backlog, AR aging, planned-versus-actual reports or segment gross profits.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
