diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management reporting, ARR bridge, deferred revenue, backlog, AR aging and gross margin by product/channel/geography.
    why_it_matters: Public growth rates do not prove revenue quality, cash conversion or unit economics.
    suggested_source_or_request: Request audited FY2023-FY2025 financial statements and monthly management packs.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferred rights, option pool, warrants/notes, debt, 409A history and primary/secondary funding mix.
    why_it_matters: Headline valuation can materially diverge from investor economics and common-equity value.
    suggested_source_or_request: Request full capitalization export and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer ARR concentration, revenue by customer, churn, NRR/GRR and renewal calendar.
    why_it_matters: Customer stories may hide concentration, churn or low-margin enterprise support.
    suggested_source_or_request: Request top-20 customer and cohort-retention schedules.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quota, attainment, ramp, sales cycle, CAC payback and pipeline conversion.
    why_it_matters: Growth claims cannot be translated into efficient scaling without GTM productivity.
    suggested_source_or_request: Request sales productivity model and cohort attainment.
    priority: high
  - gap_id: G-005
    chapter_id: II
    section_id: II.A
    missing_information: Product-line ARR, gross margin, attach rates and reliability metrics for Astro, Private Cloud, observability/lineage and Otto.
    why_it_matters: Product breadth does not prove profitable, sticky monetization across SKUs.
    suggested_source_or_request: Request product P&Ls, roadmap and support/reliability data.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: Otto adoption, AI-specific ARR, model cost, security review, evals and roadmap timing.
    why_it_matters: AI positioning is strategically important but commercially and operationally unproven publicly.
    suggested_source_or_request: Request Otto metrics and security/financial review materials.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.G
    missing_information: Two-year attrition, regretted attrition, employee-relations issues, executive agreements and succession plan.
    why_it_matters: Personnel risk can impair sales execution, product velocity and customer trust before appearing publicly.
    suggested_source_or_request: Request HR dashboards and executive diligence files.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official IP, patent, trademark, OSS license, contributor and inbound/outbound license schedules.
    why_it_matters: Airflow/OSS-centric products require careful license and governance diligence.
    suggested_source_or_request: Request counsel IP/OSS memo and SBOM/license audit.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material customer, cloud, marketplace, model-provider, security, insurance and alliance contracts.
    why_it_matters: Contract terms drive margin, liability, indemnity, data-protection and change-of-control exposure.
    suggested_source_or_request: Request material-contract schedule and executed agreements.
    priority: high
