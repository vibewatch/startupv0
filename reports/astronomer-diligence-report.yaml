risk_register:
  - risk_id: R-001
    risk_title: Revenue quality and unit economics are opaque
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources disclose growth percentages and customer counts, not audited revenue, ARR bridge, gross margin, backlog, deferred revenue, AR aging or burn.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
      - V.D
    evidence_claim_ids:
      - EC-003
      - EC-006
      - EC-007
      - EC-014
      - EC-027
    mitigation_or_diligence_request: Request audited financial statements, ARR definitions, cohort retention, gross margin and budget-vs-actual packs.
  - risk_id: R-002
    risk_title: Headline valuation may not reflect current security economics
    risk_category: financing
    severity: high
    likelihood: medium
    description: CB Insights and press releases support a unicorn valuation and major financings, but current cap table, preferences, option overhang, debt and secondary transactions are private.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-027
    mitigation_or_diligence_request: Obtain full cap table, financing documents, liquidation preferences, option plan and 409A history.
  - risk_id: R-003
    risk_title: Hyperscaler coopetition and channel bargaining power
    risk_category: competition
    severity: high
    likelihood: high
    description: AWS and Microsoft are important partners while AWS MWAA and Google Composer compete directly; hyperscalers can bundle, discount or control marketplace access.
    impacted_chapter_ids:
      - III
      - IV
      - V
      - VIII
    impacted_section_ids:
      - III.B
      - IV.A
      - V.C
      - VIII.F
    evidence_claim_ids:
      - EC-015
      - EC-023
      - EC-030
    mitigation_or_diligence_request: Review alliance contracts, marketplace economics, win/loss by hyperscaler service and change-of-control restrictions.
  - risk_id: R-004
    risk_title: Airflow-native differentiation could narrow as orchestration market evolves
    risk_category: product
    severity: medium
    likelihood: medium
    description: Astronomer benefits from Airflow scale, but buyers may choose modern orchestration frameworks, DIY Airflow or broader data-platform orchestration.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.A
    evidence_claim_ids:
      - EC-016
      - EC-017
      - EC-023
      - EC-029
    mitigation_or_diligence_request: Review roadmap, product NPS, retention by workload and competitive win/loss against Airflow alternatives.
  - risk_id: R-005
    risk_title: Customer concentration and retention are not public
    risk_category: commercial
    severity: high
    likelihood: medium
    description: Named customer stories do not disclose top-customer ARR, churn, renewal timing, expansion, disputes or concentration above 5% of revenue.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-013
      - EC-014
      - EC-027
    mitigation_or_diligence_request: Request top-customer ARR concentration, renewal calendar, NRR/GRR and churned-account reason codes.
  - risk_id: R-006
    risk_title: Security and shared-responsibility exposure in sensitive workloads
    risk_category: security
    severity: high
    likelihood: medium
    description: Airflow orchestration can touch credentials, data pipelines and regulated workflows; public security pages omit SOC reports, incident history, pen tests, DPIAs and insurance limits.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - VIII.E
      - VIII.F
