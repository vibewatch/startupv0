  - risk_id: R-002
    risk_title: Growth quality and margin sustainability
    risk_category: financial
    severity: high
    likelihood: medium
    description: Reported growth and outlet expansion are unaudited; promotions, SKU complexity, capex, and input costs could pressure margin.
