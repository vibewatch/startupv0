    why_it_matters: This missing data is needed to validate valuation, risk, operating quality, or exit readiness.
    suggested_source_or_request: Provide audited FY2023-FY2025 financials and monthly 2026 management accounts.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option plan, debt, bank lines, warrants, and off-balance-sheet liabilities are not public.
    why_it_matters: This missing data is needed to validate valuation, risk, operating quality, or exit readiness.
    suggested_source_or_request: Provide fully diluted cap table, investor rights, option ledger, and debt schedule.
    priority: high
