executive_summary:
  overall_assessment: Proceed only with focused deep diligence. Public evidence supports active/private eligibility, a $15B CB Insights valuation anchor, product/channel reach, and ongoing operations, but underwriting-critical financial, customer, cap-table, legal, and personnel data remains private.
  investment_or_diligence_thesis: Yuanqi Senlin / Genki Forest is a scaled Chinese beverage challenger with verified low/no-sugar brand breadth, public international/channel signals, and recent management emphasis on profitability and discipline. The case depends on whether audited margins, channel economics, and governance support the valuation after rapid historical step-ups.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Yuanqi Senlin as a China Consumer & Retail unicorn valued at $15B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Active/private eligibility is supported by active official 2026 updates, CB status, and a no-listing-plan report.
      evidence_claim_ids:
        - EC-006
        - EC-009
        - EC-025
    - founder_claim_id: FC-003
      summary: Official sources verify a broad beverage portfolio and active product history.
      evidence_claim_ids:
        - EC-003
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity relative to $15B valuation.
    - risk_id: R-004
      summary: Incumbent competition and supplier/channel pressure.
    - risk_id: R-005
      summary: Health-claim and labeling compliance exposure.
  key_evidence_gaps:
    - Audited financials, cash flow, AR aging, debt, and working capital.
    - Fully diluted cap table, financing documents, preferences, options, debt, and board consents.
    - Top customer/distributor revenue, sell-through, contracts, churn, and concentration.
    - SKU-level price, volume, gross margin, trade spend, and label substantiation.
    - Legal docket/regulatory search, IP registrations, material contracts, insurance, org chart, headcount, and turnover.
  recommended_next_steps:
    - Run confirmatory legal/corporate-registry screen for active/private status, litigation, regulatory matters, and ownership.
    - Request financial data room before valuation work.
    - Request channel/customer economics and top-distributor contracts.
    - Commission label/claims and product-liability counsel review across China and export markets.
    - Interview management, investors, customers/distributors, suppliers, and former employees.
