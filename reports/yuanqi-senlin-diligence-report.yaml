report_metadata:
  report_title: Yuanqi Senlin / Genki Forest Standard-Depth Startup Diligence Report
  target_company: Yuanqi Senlin
  website: https://www.yuanqisenlin.com/
  known_aliases:
    - Genki Forest
    - Yuanqi Forest
    - 元气森林
    - 元气森林（北京）食品科技集团有限公司
    - Genki Forest Food Technology Group
    - Chi Forest
  sector: Consumer & Retail / functional and low-sugar beverages
  geography: China (Beijing public CB row) with exports to North America, Europe, Southeast Asia, Australia, and other markets
  company_stage: Private unicorn / venture-backed consumer beverage company
  research_date: 2026-06-07
  analyst: GitHub Copilot CLI public-source diligence workflow
  report_version: "1.0"
  currency: USD unless otherwise noted; RMB where public Chinese revenue metrics are quoted
  time_zone: Asia/Shanghai
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public company-owned sources: official website, llms.txt, product, homepage/news, and contact pages."
    - "Third-party sources: CB Insights public unicorn tracker and KrASIA articles/API items."
    - Negative eligibility screen for IPO/acquisition/shutdown using accessible public sources.
    - No paid databases, private data room, interviews, docket platforms, or non-public records were used.
  included_jurisdictions:
    - China
    - Hong Kong listing screen
    - United States and Canada distribution signals
    - Export markets at high level
  excluded_topics:
    - No private financial statements or bank records
    - No private cap table or financing documents
    - No customer/reference calls
    - No paid legal docket, CNIPA/WIPO/USPTO, or corporate-registry extract
    - No supplier/customer contract review
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights candidate metadata fetched 2026-06-07
      type: unicorn-tracker metadata
      date_received: 2026-06-07
      notes: company=Yuanqi Senlin; slug=yuanqi-senlin; valuation=$15B; country=China; industry=Consumer & Retail; source=CB Insights unicorn tracker.
