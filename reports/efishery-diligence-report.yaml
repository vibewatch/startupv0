executive_summary:
  overall_assessment: eFishery has public evidence of historical unicorn status and a real aquaculture product narrative, but public-source diligence should treat the company as a distressed, high-risk case. Later reporting alleges severe financial misconduct, valuation impairment, bad receivables, leadership upheaval, layoffs and court outcomes involving former executives. No investment conclusion should rely on the headline $1.30B valuation without forensic accounting, legal and customer/credit validation.
  investment_or_diligence_thesis: Proceed only to confirmatory/forensic diligence. Rebuild value from audited cash, verified customers, loan/AR recoveries, product continuity, enforceable IP/contracts and legal/insurance recoveries rather than historical unicorn marks.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: eFishery is a private unicorn valued at $1.30B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: eFishery has a publicly described product platform in Aquaculture technology, smart feeders, distribution, and farmer credit.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Alleged financial-statement fraud
    - risk_id: R-002
      summary: Valuation reliability
    - risk_id: R-003
      summary: Governance and internal controls
  key_evidence_gaps:
    - Forensic audit, audited financials, bank statements, revenue-recognition workpapers and AR aging.
    - Current cap table, preferences, debt/guarantees, creditor claims and restructuring/liquidation waterfall.
    - Customer master, active farmer/device reconciliation, churn, revenue by customer and direct customer references.
    - Loan facilitation agreements, borrower performance, bank recourse and collections/provisioning data.
    - Court/regulatory files, counsel schedule, insurance notices, IP assignments, material contracts and data/privacy/security controls.
    - Current operating plan, cash runway, HRIS, layoffs/severance, org chart and product-support continuity.
  recommended_next_steps:
    - Request complete data room and management Q&A.
    - Run customer, supplier, accountant, and counsel confirmations.
    - Build downside valuation case using verified records.
    - Gate any transaction on independent forensic accounting and legal review.
    - Rebuild valuation from current assets, verified cash flows, preferences and creditor claims.
    - Conduct direct farmer, bank, supplier, buyer and employee diligence before relying on public scale claims.
    - Audit IoT/data/privacy/security, IP ownership, product uptime and support staffing.
