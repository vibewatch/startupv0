  - {request_id: Q-005, chapter_id: III, section_id: III.A, request: Provide top customer schedule by ARR/volume, contracts, churn/NRR, payment volumes, customer-health scores and reference permissions., requested_from: company, priority: high}
  - {request_id: Q-006, chapter_id: VI, section_id: VI.A, request: Provide architecture diagrams, SDLC controls, repository/dependency inventory, penetration tests, resilience tests, incident history and SLA reports., requested_from: company/CTO/CISO, priority: high}
  - {request_id: Q-007, chapter_id: VII, section_id: VII.A, request: Provide board minutes, organization chart, leadership succession materials, retention plan, HRIS attrition and compensation/equity schedules., requested_from: company/board/HR, priority: high}
limitations:
  - limitation_id: L-001
    description: This report relies only on public sources; no private financials, contracts, customer references, legal dockets, regulator correspondence, code repositories or management interviews were available.
    affected_chapter_ids: [I, III, V, VI, VIII]
    affected_section_ids: [I.A, III.A, V.A, VI.A, VIII.G]
  - limitation_id: L-002
    description: Company-owned product pages are treated as evidence of public claims, not as independent proof of adoption, resilience, profitability or customer outcomes.
    affected_chapter_ids: [II, III, VI]
    affected_section_ids: [II.A, III.A, VI.A]
  - limitation_id: L-003
    description: Some independent news and market-database details should be reconciled to primary records; direct access to court/tax files and full statutory accounts was not part of this public review.
    affected_chapter_ids: [I, VII, VIII]
    affected_section_ids: [I.B, VII.A, VIII.G]
  - limitation_id: L-004
    description: No legal, tax, regulatory, accounting, security or investment advice is provided; specialist advisors should validate all material issues before reliance.
    affected_chapter_ids: [I, VI, VIII]
    affected_section_ids: [I.A, VI.A, VIII.G]
