risk_register:
  - risk_id: R-001
    risk_title: Financial quality and liquidity opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: No public KPI pack, audited operating detail, ARR/revenue, cash/debt, liquidity runway or capital-resources reconciliation supports the valuation.
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.A]
    evidence_claim_ids: [EC-006, EC-018, EC-019]
    mitigation_or_diligence_request: Request audited financials, monthly management accounts, cash/debt, regulatory capital/liquidity returns and board plan.
  - risk_id: R-002
    risk_title: Cap-table and financing-rights opacity
    risk_category: financing
    severity: high
    likelihood: medium
    description: Headline valuation and funding fields do not disclose ownership, preferences, debt, option pool, liquidation waterfall or regulatory capital treatment.
    impacted_chapter_ids: [I]
    impacted_section_ids: [I.B]
    evidence_claim_ids: [EC-001, EC-002, EC-021]
    mitigation_or_diligence_request: Request cap table, financing documents, side letters, investor rights, debt and capital-treatment memo.
  - risk_id: R-003
    risk_title: Regulated product resilience and service-quality risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Payments, clearing, settlement, accounts and agency banking require high resilience; public materials do not disclose volumes, SLAs, incidents or controls.
    impacted_chapter_ids: [II, III, VI]
    impacted_section_ids: [II.A, III.A, VI.A]
    evidence_claim_ids: [EC-003, EC-004, EC-013, EC-016]
    mitigation_or_diligence_request: Request product KPIs, incident logs, SLAs, scheme/vendor evidence, resilience testing and operational-risk reports.
  - risk_id: R-004
    risk_title: HMRC/tax and winding-up petition stress
    risk_category: legal_tax
    severity: high
    likelihood: medium
    description: Independent news reported HMRC winding-up/petition activity; even if resolved, it raises tax-governance and liquidity concerns.
    impacted_chapter_ids: [I, VIII]
    impacted_section_ids: [I.B, VIII.G]
    evidence_claim_ids: [EC-007, EC-021]
    mitigation_or_diligence_request: Counsel should verify court/tax records and request HMRC correspondence, settlement evidence and current tax compliance schedule.
  - risk_id: R-005
    risk_title: Governance and leadership-transition risk
    risk_category: governance
    severity: high
    likelihood: medium
    description: Founder/CEO transition and statutory officer-change records require close governance review in a regulated bank context.
    impacted_chapter_ids: [VII]
    impacted_section_ids: [VII.A]
    evidence_claim_ids: [EC-008, EC-009]
    mitigation_or_diligence_request: Request board minutes, succession materials, regulatory approvals, org chart, HRIS and retention plan.
  - risk_id: R-006
    risk_title: PRA integrity, capital-reporting and cooperation enforcement
    risk_category: regulatory
    severity: critical
    likelihood: high
    description: Official PRA enforcement and £2M fine for capital-position/reporting and cooperation/integrity failures are material to a regulated banking infrastructure business.
    impacted_chapter_ids: [I, VIII]
    impacted_section_ids: [I.A, VIII.G]
    evidence_claim_ids: [EC-010, EC-011]
    mitigation_or_diligence_request: Request final notice remediation plan, regulator correspondence, board attestations, accountability mapping and independent assurance.
  - risk_id: R-007
    risk_title: Legal, contract, IP and insurance opacity
    risk_category: legal
    severity: high
    likelihood: medium
    description: Public sources do not disclose material contracts, IP ownership, licenses, insurance, claims, complaints or outsourcing obligations.
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.G]
    evidence_claim_ids: [EC-011, EC-020]
    mitigation_or_diligence_request: Have counsel review contracts, IP assignments, insurance, complaints, licenses, outsourcing and remediation obligations.
  - risk_id: R-008
    risk_title: Customer and revenue concentration opacity
    risk_category: commercial
    severity: high
    likelihood: high
    description: Top customers, revenue concentration, churn/retention, payment volumes and customer references are not public.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, V.A]
    evidence_claim_ids: [EC-012, EC-013]
    mitigation_or_diligence_request: Request top customer contracts, ARR/volume by customer, churn/NRR, payment volumes and independent references.
  - risk_id: R-009
    risk_title: Competitive differentiation unproven
    risk_category: market
    severity: medium
    likelihood: medium
    description: The company competes with incumbents, BaaS/sponsor banks and payment processors; no public win/loss or differentiation proof was available.
    impacted_chapter_ids: [IV]
    impacted_section_ids: [IV.A]
    evidence_claim_ids: [EC-014]
    mitigation_or_diligence_request: Request win/loss, buyer interviews, competitor displacement, pricing and churn reason analysis.
  - risk_id: R-010
    risk_title: Sales productivity and implementation-capacity opacity
    risk_category: gtm
    severity: medium
    likelihood: medium
    description: CAC, payback, sales cycle, quota attainment, pipeline conversion and implementation capacity are not public.
    impacted_chapter_ids: [V]
    impacted_section_ids: [V.A]
    evidence_claim_ids: [EC-015]
    mitigation_or_diligence_request: Request CRM exports, GTM KPI pack, implementation backlog and customer-success capacity model.
  - risk_id: R-011
    risk_title: R&D, security and SDLC opacity
    risk_category: technology
    severity: high
    likelihood: medium
    description: Architecture, SDLC controls, security testing, incident history, code quality and roadmap evidence are not public despite regulated infrastructure claims.
    impacted_chapter_ids: [VI, VIII]
    impacted_section_ids: [VI.A, VIII.G]
    evidence_claim_ids: [EC-016, EC-017, EC-020]
    mitigation_or_diligence_request: Request architecture, repository access, dependency inventory, SDLC controls, penetration tests, incident logs and roadmap governance.
diligence_gaps:
  - {gap_id: G-001, chapter_id: I, section_id: I.A, missing_information: Audited financials, management accounts, cash/debt, regulatory capital/liquidity and tax schedule, why_it_matters: Public valuation and funding headlines cannot underwrite current solvency or bank regulatory resources., suggested_source_or_request: Company CFO, auditors, board packs and regulatory returns., priority: critical}
  - {gap_id: G-002, chapter_id: VIII, section_id: VIII.G, missing_information: PRA final notice remediation evidence and supervisory correspondence, why_it_matters: Official enforcement is the dominant risk and may constrain operations or reputation., suggested_source_or_request: Company counsel, compliance/risk leadership and independent assurance provider., priority: critical}
  - {gap_id: G-003, chapter_id: III, section_id: III.A, missing_information: Top customer ARR/volume, churn/retention and references, why_it_matters: Customer quality and concentration are not publicly verifiable., suggested_source_or_request: Company revenue operations and customer-reference process., priority: high}
  - {gap_id: G-004, chapter_id: VI, section_id: VI.A, missing_information: Architecture, SDLC, security, incident and resilience artifacts, why_it_matters: Regulated banking infrastructure has high operational and regulatory impact if technology controls fail., suggested_source_or_request: CTO/CISO, audit reports, repository access and incident management system., priority: high}
  - {gap_id: G-005, chapter_id: VII, section_id: VII.A, missing_information: Board minutes, succession rationale, org chart and retention/attrition data, why_it_matters: Governance confidence is critical after leadership transition and enforcement., suggested_source_or_request: Board secretary, HR leadership and regulatory affairs., priority: high}
