  "overall_assessment": "ZigBang passed a public-source eligibility screen as an uncovered unicorn target and has real public evidence for valuation/status and product existence. The diligence posture remains evidence-gap heavy because private financial, customer, cap-table, legal and personnel records are not public."
  "investment_or_diligence_thesis": "Underwriting ZigBang should focus on validating whether the public valuation and product narrative are supported by durable revenue quality, customer retention, defensible differentiation, compliant operations and sufficient capitalization."
