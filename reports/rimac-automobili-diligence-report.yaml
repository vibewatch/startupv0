executive_summary:
  overall_assessment: Rimac appears to be an active private unicorn-scale automotive technology group, with credible public evidence for its financing, holding structure, Nevera hypercar and Tier-1 EV technology platform. The diligence case is not finance-ready without private support for unit economics, capex, customer concentration, warranties, safety/regulatory matters and cap-table terms.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence focused on whether Rimac can convert public technology credibility and strategic-investor backing into durable high-margin OEM/energy revenue without excessive capital intensity or product-liability exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and Rimac Group public materials support unicorn-scale financing and valuation anchors.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Company sources verify active hypercar, EV-component and energy-system product lines.
      evidence_claim_ids:
        - EC-004
        - EC-006
    - founder_claim_id: FC-004
      summary: Rimac governance and careers pages show an active management and hiring footprint.
      evidence_claim_ids:
        - EC-005
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Financial scale, margins and cash runway are not public
    - risk_id: R-002
      summary: Complex group structure and strategic-investor ownership
    - risk_id: R-003
      summary: Low-volume hypercar and OEM-program economics
  key_evidence_gaps:
    - Audited financials, backlog, gross margin, cash/debt and capex plan.
    - Cap table, preferences, shareholder agreements and related-party agreements.
    - OEM/customer contracts, revenue concentration and warranty exposure.
    - Safety, homologation, recall, product-liability and insurance records.
    - Manufacturing yield, supplier concentration and R&D milestone evidence.
  recommended_next_steps:
    - Request full finance and cap-table data room before relying on headline valuation.
    - Review OEM/customer contracts and warranty/product-liability reserves.
    - Run technical diligence on battery, eAxle, ECU and BESS roadmaps.
    - Have counsel review automotive regulatory, safety, IP and insurance posture.
