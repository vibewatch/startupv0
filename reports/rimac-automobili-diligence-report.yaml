risk_register:
  - risk_id: R-001
    risk_title: Financial scale, margins and cash runway are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Headline valuation and Series D are public, but audited financials, cash, debt, backlog and unit economics are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
    evidence_claim_ids: *a44
    mitigation_or_diligence_request: Request audited financials, KPI pack, cash/debt schedule, backlog, AR aging and cap table.
  - risk_id: R-002
    risk_title: Complex group structure and strategic-investor ownership
    risk_category: financing
    severity: high
    likelihood: medium
    description: Rimac Automobili was folded into Rimac Group/Bugatti Rimac, with strategic and financial investor blocks that may carry preferences or governance rights.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.C
      - VIII.F
    evidence_claim_ids: *a45
    mitigation_or_diligence_request: Review shareholder agreements, preference stack, related-party agreements and Porsche/strategic-investor rights.
  - risk_id: R-003
    risk_title: Low-volume hypercar and OEM-program economics
    risk_category: market
    severity: medium
    likelihood: medium
    description: Rimac combines premium hypercars, Tier-1 EV components and energy systems; public sources do not reveal gross margin or program concentration.
    impacted_chapter_ids:
      - II
      - III
      - V
    impacted_section_ids:
      - II.A
      - III.C
      - V.A
    evidence_claim_ids: *a46
    mitigation_or_diligence_request: Request program-level revenue, gross margin, customer concentration and OEM contract terms.
  - risk_id: R-004
    risk_title: Automotive homologation, safety and product-liability exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: High-performance vehicles and battery systems carry safety, warranty, homologation and recall exposure that public sources do not quantify.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a47
    mitigation_or_diligence_request: Have counsel review homologation, recall, warranty, safety and product-liability records.
  - risk_id: R-005
    risk_title: Execution risk in capital-intensive manufacturing and campus ramp
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Public materials describe a large operational campus and advanced manufacturing scope; production ramp and capex performance are private.
    impacted_chapter_ids:
      - I
      - VI
      - VII
    impacted_section_ids:
      - I.B
      - VI.B
      - VII.B
    evidence_claim_ids: *a48
    mitigation_or_diligence_request: Request capex plan, production yield, supplier quality, hiring plan and ramp KPIs.
  - risk_id: R-006
    risk_title: Competitive pressure from OEM EV programs and luxury hypercar incumbents
    risk_category: market
    severity: medium
    likelihood: medium
    description: Rimac competes with OEM internal EV teams, luxury hypercar brands and battery/Tier-1 suppliers.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a49
    mitigation_or_diligence_request: Run customer win/loss and competitor benchmarking against OEM and Tier-1 alternatives.
