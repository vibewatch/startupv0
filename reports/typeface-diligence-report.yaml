executive_summary:
  overall_assessment: Public evidence supports Typeface's unicorn-list status, $1B
    valuation anchor, $165M public funding history and current enterprise marketing
    AI positioning. The investability case remains unproven without private financials,
    cap table, customer revenue/retention, product/security audit evidence and legal/IP
    diligence.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The thesis
    depends on proving that Typeface's Arc/agentic marketing AI platform converts
    named enterprise logos and partner marketplaces into durable ARR with defensible
    product quality, acceptable AI/security risk, efficient GTM and clean IP/contracts
    in a crowded market.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: CB Insights and company funding announcements support the $1B unicorn
      status.
    evidence_claim_ids:
    - EC-001
    - EC-002
  - founder_claim_id: FC-002
    summary: Public funding announcements support $65M launch funding and $100M Series
      B / $165M total capital.
    evidence_claim_ids:
    - EC-002
    - EC-003
  - founder_claim_id: FC-003
    summary: Company pages verify a current public product narrative around Arc Graph,
      Arc Agents, Arc Spaces and Arc Forge for enterprise marketing workflows.
    evidence_claim_ids:
    - EC-004
    - EC-005
    - EC-023
  biggest_risks:
  - risk_id: R-001
    summary: Financial quality, ARR, margins, burn and valuation support are not public.
  - risk_id: R-003
    summary: Customer concentration, contract status, NRR/churn and severed relationships
      are hidden behind public logos.
  - risk_id: R-004
    summary: Competition and pricing pressure are high from Writer, Jasper, Adobe
      and Canva.
  key_evidence_gaps:
  - Audited financial statements, management accounts, ARR/bookings/NRR/churn, COGS
    and cash burn.
  - Current cap table, option pool, preferences, debt, SAFEs/notes and investor rights.
  - Product usage, reliability, model quality, security architecture, roadmap and
    SKU margins.
  - Top-customer ARR, contract status, renewal dates, concentration, NRR/churn and
    references.
  - Supplier/vendor list, model providers, cloud spend, DPAs, SLAs and exit plans.
  - Win/loss, market share, price/TCO benchmarking and displacement evidence.
  recommended_next_steps:
  - Open a financial/cap-table data room before relying on the $1B valuation.
  - Run customer reference, win/loss and cohort-retention diligence focused on named
    logos and partner-sourced ARR.
  - Conduct product/security/AI governance review with SOC reports, architecture,
    model/provider contracts and incident history.
  - Have counsel complete IP, litigation, regulatory, material-contract, privacy and
    insurance diligence.
  - Benchmark pricing/TCO and workflow ROI against Writer, Jasper, Adobe Firefly and
    Canva Enterprise.
