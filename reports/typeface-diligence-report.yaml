- gap_id: G-008
  chapter_id: VI
  section_id: VI.B
  missing_information: R&D roadmap, engineering capacity, development costs, incident
    history, model/provider roadmap and patent claim map.
  why_it_matters: Product execution and dependencies are core to defensibility.
  suggested_source_or_request: CTO/product/security data room.
  priority: high
- gap_id: G-009
  chapter_id: VII
  section_id: VII.B
  missing_information: HRIS, org chart, compensation, option grants, attrition and
    employee-relations matters.
  why_it_matters: Team scale and retention affect execution risk.
  suggested_source_or_request: HR data room and management references.
  priority: high
- gap_id: G-010
  chapter_id: VIII
  section_id: VIII.C
  missing_information: SOC/ISO reports, pen tests, DPA/subprocessors, privacy incidents
