  report_version: '1.0'
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
  - Followed startup-diligence-research standard-depth workflow using public sources
    only.
  - Prioritized company pages, funding announcements, marketplace listings, investor
    pages, public social/org profiles, legal/IP records, security/privacy policies
    and competitor pages.
  - Treated CB Insights unicorn list as market_database evidence per user instruction
    and cited the Jina Reader-fetched row.
  - Marked financials, cap table, customer revenue, contracts, SOC reports, HRIS and
    counsel-only legal checks as not_publicly_verifiable or inconclusive.
  included_jurisdictions:
  - United States
  - California
  - Global enterprise markets referenced by public materials
  excluded_topics:
  - Private data room materials, management interviews, customer calls, private litigation
    dockets behind access controls, SOC reports, source code, bank records and HRIS
    were unavailable.
  user_provided_materials:
