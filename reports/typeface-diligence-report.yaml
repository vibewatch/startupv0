  chapter_id: I
  section_id: I.A
  missing_information: Audited financial statements, management accounts, ARR/bookings/NRR/churn,
    COGS and cash burn.
  why_it_matters: Needed to underwrite financial quality and the $1B valuation.
  suggested_source_or_request: 'CFO data room: auditeds, monthly financial pack, KPI
    pack and cash/debt schedule.'
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.C
  missing_information: Current cap table, option pool, preferences, debt, SAFEs/notes
    and investor rights.
  why_it_matters: Headline valuation can obscure liquidation stack and dilution.
  suggested_source_or_request: Corporate counsel/CFO financing data room.
  priority: high
- gap_id: G-003
  chapter_id: II
  section_id: II.A
  missing_information: Product usage, reliability, model quality, security architecture,
    roadmap and SKU margins.
  why_it_matters: Public product claims do not prove ROI, quality or profitability.
  suggested_source_or_request: Product/security data room, demo, benchmarks and architecture
    review.
  priority: high
- gap_id: G-004
  chapter_id: III
  section_id: III.A
  missing_information: Top-customer ARR, contract status, renewal dates, concentration,
    NRR/churn and references.
  why_it_matters: Customer logos do not prove revenue durability.
  suggested_source_or_request: Customer schedule and direct reference calls.
  priority: high
- gap_id: G-005
  chapter_id: III
  section_id: III.E
  missing_information: Supplier/vendor list, model providers, cloud spend, DPAs, SLAs
    and exit plans.
  why_it_matters: AI/cloud dependencies can affect margin, privacy and continuity.
  suggested_source_or_request: Vendor contracts and spend schedule.
  priority: high
- gap_id: G-006
  chapter_id: IV
  section_id: IV.A
  missing_information: Win/loss, market share, price/TCO benchmarking and displacement
    evidence.
  why_it_matters: Competition from Writer, Jasper, Adobe and Canva is high.
  suggested_source_or_request: Sales/product competitive diligence package.
