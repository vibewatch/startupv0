- gap_id: G-007
  chapter_id: V
  section_id: V.D
  missing_information: CAC, payback, quota, ramp, sales cycle, pipeline conversion
    and marketing ROI.
  why_it_matters: GTM efficiency is not public and is key to valuation support.
