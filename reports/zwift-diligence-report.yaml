      - EC-010
    contradiction_summary: Public customer claims do not verify revenue concentration or retention.
    diligence_follow_up:
      - Request customer schedules, contracts, renewals and references.
executive_summary:
  overall_assessment: Zwift appears eligible as an uncovered private unicorn based on CB Insights list evidence and no public evidence in this run that it has IPOed, been acquired as a whole, or shut down. Public evidence supports active product/category presence, but financials, customer economics, contracts, cap table and many legal/compliance records are private.
  investment_or_diligence_thesis: "Proceed only to confirmatory diligence: underwrite Zwift by validating revenue quality, retention, concentration, unit economics, legal/compliance posture and financing terms rather than relying on the $1B public-list valuation alone."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Zwift as a $1B unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Public product sources support active operations in Connected fitness, virtual cycling, running and subscription training software.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: Public customer, partner or community signals exist, while economics require private validation.
      evidence_claim_ids:
        - EC-004
        - EC-009
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: Subscriber retention and cohort economics are private
    - risk_id: R-002
      summary: Competition and consumer-fitness substitution
    - risk_id: R-003
      summary: Hardware and platform dependency
  key_evidence_gaps:
    - Audited financial statements, revenue/ARR bridge, gross margin, cash runway and debt schedule.
    - Cap table, liquidation preferences, option pool, warrants and latest financing documents.
    - Top-customer and supplier schedules, contracts, renewal status, churn/retention and concentration.
    - Sales productivity, CAC/payback, pipeline quality and marketing budget support.
    - Legal, privacy, security, IP, insurance and material-contract schedules reviewed by counsel.
  recommended_next_steps:
    - Run financial and revenue-quality diligence before relying on headline valuation.
    - Request top-customer and cohort data, then conduct independent customer references.
    - Have counsel and specialists review legal/regulatory, security/privacy, IP and material contracts.
    - Validate product usage, reliability, roadmap, technical debt and vendor dependencies.
    - Reconcile current valuation to security preferences, debt, dilution and secondary-market marks.
