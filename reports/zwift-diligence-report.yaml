report_metadata:
  report_title: Zwift Startup Diligence Report
  target_company: Zwift
  website: https://www.zwift.com/
  known_aliases:
    - Zwift, Inc.
    - Zwift Ride
    - Zwift Companion
  sector: Connected fitness, virtual cycling, running and subscription training software
  geography: United States / global consumer fitness community
  company_stage: Private unicorn / consumer subscription fitness platform
  research_date: 2026-05-28
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Selected from a random shuf sample of uncovered CB Insights unicorn-list candidates after stripping existing report slugs.
    - Used public web sources only, including CB Insights, company-owned pages and regulator/government pages where available.
    - Treated company claims as public assertions unless independently corroborated; no private data room or management interview was available.
  included_jurisdictions:
    - United States
    - United States public web sources
    - Global markets referenced by public company materials
  excluded_topics:
    - Non-public financials
    - Private contracts
    - Private cap table
    - Customer calls
    - Non-public security reports
    - Comprehensive paid docket searches
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-28
      notes: No pitch deck, financial model, data room or founder responses were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Zwift is a private unicorn with latest known public-list valuation of $1B.
    claim_source: CB Insights unicorn list
    claim_date: 2026-05-28
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
    contradiction_summary: null
    diligence_follow_up:
      - Request primary financing documents and current valuation support.
  - founder_claim_id: FC-002
    claim_text: Zwift publicly markets an active product platform in Connected fitness, virtual cycling, running and subscription training software.
    claim_source: Company-owned product pages and market database profile
    claim_date: 2026-05-28
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-003
      - EC-005
      - EC-006
    contradiction_summary: null
    diligence_follow_up:
      - Validate adoption, reliability, margin and roadmap metrics.
  - founder_claim_id: FC-003
    claim_text: Zwift has public customer, partner, community or segment evidence, but top-account economics are not public.
    claim_source: Company and market database public sources
    claim_date: 2026-05-28
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.C
      - V.B
    verification_status: partially_verified
    confidence: medium
