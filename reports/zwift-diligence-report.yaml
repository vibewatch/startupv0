risk_register:
  - risk_id: R-001
    risk_title: Subscriber retention and cohort economics are private
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public pricing is visible, but paid subscribers, churn, CAC, ARPU and seasonality are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Request subscriber cohorts, churn, CAC/payback, ARPU, gross margin and seasonal retention.
  - risk_id: R-002
    risk_title: Competition and consumer-fitness substitution
    risk_category: market
    severity: high
    likelihood: medium
    description: Zwift competes with training apps, hardware ecosystems, gyms, outdoor riding and connected-fitness subscriptions.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Benchmark engagement, retention and pricing against Rouvy, TrainerRoad, Wahoo and Peloton.
  - risk_id: R-003
    risk_title: Hardware and platform dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: The experience depends on smart trainers, devices, app stores, connectivity and real-time reliability.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Review compatibility roadmap, outage history, cloud/vendor contracts and app-store economics.
  - risk_id: R-004
    risk_title: Health and fitness data privacy exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Zwift processes activity/device data across jurisdictions; public policy links exist but controls are private.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Request DPIAs, privacy/security audits, incident logs and consumer health data compliance analysis.
  - risk_id: R-005
    risk_title: Valuation support is stale or opaque
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: CB Insights lists a $1B valuation, but current secondary pricing, preferences and dilution are undisclosed.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Request cap table, latest financing documents, option pool, debt and secondary history.
  - risk_id: R-006
    risk_title: Engagement concentration and seasonality
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Community/event density is central, but engagement by cohort/geography is private.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
    evidence_claim_ids:
      - EC-008
    mitigation_or_diligence_request: Request DAU/MAU, event participation, cohort engagement and geographic revenue mix.
