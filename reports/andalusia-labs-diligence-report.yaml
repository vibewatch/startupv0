executive_summary:
  overall_assessment: Andalusia Labs appears eligible as an uncovered private unicorn based on CB Insights and corroborating public evidence. Public evidence supports status screening and product/market activity, but investment-grade underwriting remains unresolved because financials, customer quality, contracts, legal/regulatory posture, cap table and personnel data are private. Several full article pages or product pages were inaccessible or rate-limited during this public-source run; search-result excerpts and CB Insights were used only where direct fetches failed.
  investment_or_diligence_thesis: Proceed only if the company can substantiate active product ownership, domain/control posture, protocol/customer revenue and regulatory readiness beyond public unicorn-list evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn and financing evidence supports the $1B status screen.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public sources support at least partial active product/platform positioning.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: Public sources show partner, customer or ecosystem signals but not revenue quality.
      evidence_claim_ids:
        - EC-004
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Public evidence depth and domain-integrity risk
    - risk_id: R-002
      summary: Digital-asset regulatory and market-cycle exposure
    - risk_id: R-003
      summary: Private financial and customer quality gap
  key_evidence_gaps:
    - Audited financial statements, KPI pack, cash/debt schedule and runway
    - Fully diluted cap table, preferences, warrants, notes and investor rights
    - Top-customer revenue, contracts, renewals, churn and reference checks
    - Sales productivity, funnel conversion, CAC/payback and pipeline quality
    - Roadmap, technical/security artifacts, IP assignments, litigation/regulatory schedule, insurance and material contracts
  recommended_next_steps:
    - Do not underwrite from public valuation alone; request financing documents and current KPI pack.
    - Run customer/reference, retention, contract and concentration diligence before relying on demand signals.
    - Have legal, regulatory, security/privacy and IP specialists review source evidence and data-room records before investment reliance.
