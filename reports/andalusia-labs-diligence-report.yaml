report_metadata:
  report_title: Andalusia Labs Startup Diligence Report
  target_company: Andalusia Labs
  website: null
  known_aliases:
    - Andalusia Labs
    - RiskHarbor
  sector: Digital-asset risk infrastructure / blockchain security
  geography: United States public-list location with Abu Dhabi global headquarters announcement in public funding snippets
  company_stage: Private unicorn / Series A
  research_date: 2026-06-06
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built existing-report exclusion list from reports/*-diligence-report.yaml and selected uncovered targets from the fetched CB Insights unicorn tracker with a Wikipedia unicorn-list cross-check fetched during target selection.
    - "Used public-source diligence only: company-owned pages where available, investor/news financing coverage, public search snippets where full pages were inaccessible, and market-database rows/snippets for unicorn status."
    - Treated public valuation and marketing pages as screening evidence, not audited proof of financial quality, customer concentration or legal posture.
    - Did not use paywalled sources, private data rooms, customer calls, credentials or non-public materials.
  included_jurisdictions:
    - United States
    - Public jurisdictions referenced by company or financing materials
  excluded_topics:
    - Non-public financial statements, cap table, board materials, contracts, source code, security reports, customer calls, HRIS/personnel records and privileged legal/regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow target metadata for Andalusia Labs from CB Insights unicorn list
      type: workflow_request
      date_received: 2026-06-06
      notes: "Randomly selected uncovered candidate: Andalusia Labs, slug andalusia-labs, valuation $1B, date joined 2023-12-13, United States/San Francisco, Enterprise Tech."
