              - R-009
          - finding_id: VIII.D.F2
            finding: Website terms and MML/Thanos signals show IP/open-source issues requiring ownership and license review.
            evidence_claim_ids:
              - EC-018
              - EC-027
            risk_ids:
              - R-009
        hidden_risks:
          - Key IP may be owned by ventures, foundations, employees, contractors, or open-source projects.
          - Patent encumbrances from investors/debt/customer contracts could exist.
        evidence_gaps:
          - Patent/trademark/copyright schedules, assignments, licenses, OSS bill of materials, invention assignment agreements, encumbrances.
        follow_up_questions:
          - Provide IP schedule, patent-family analysis, trademark search, OSS scan, IP assignments, and venture IP agreements.
        table_ids:
          - T-016
        figure_ids:
          - F-003
          - F-010
        evidence_claim_ids:
          - EC-018
          - EC-022
          - EC-027
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: Insurance coverage is not public; material exposures likely include cyber/privacy, live immersive events, Web3/regulatory, D&O, E&O, employer liability, and IP.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.E.F1
            finding: No insurance schedule was found publicly.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-009
        hidden_risks:
          - Coverage gaps could be material given platform, data, live-event, and Web3 exposure.
          - D&O coverage is important with large investors and complex governance.
        evidence_gaps:
          - Insurance policies, limits, exclusions, claims history, broker letters.
        follow_up_questions:
          - Provide complete insurance schedule and claims history; obtain broker coverage adequacy memo.
        table_ids:
          - T-016
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-024
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Public materials identify cloud providers and named partner relationships, but no material customer, supplier, investor, venture, or service contracts are public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.F.F1
            finding: Privacy policy references AWS/Google Cloud; named relationships with BBC, MLB, Yuga and Somnia require contract review.
            evidence_claim_ids:
              - EC-013
              - EC-014
              - EC-015
              - EC-017
              - EC-024
            risk_ids:
              - R-007
              - R-009
        hidden_risks:
          - Unknown exclusivity, data rights, revenue share, IP ownership, change-of-control, and termination provisions.
          - Cloud commitments could materially affect unit economics.
        evidence_gaps:
          - Material contract list, customer/partner agreements, cloud contracts, venture service agreements, investor rights, debt documents.
        follow_up_questions:
          - Provide material contracts over threshold, including customer, cloud, venture, financing, and IP/license agreements.
        table_ids:
          - T-006
          - T-016
        figure_ids:
          - F-003
          - F-010
        evidence_claim_ids:
          - EC-013
          - EC-014
          - EC-015
          - EC-017
          - EC-024
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No regulatory agency problems were found in reviewed public sources; however, Web3, privacy, employment, and international operations require counsel confirmation.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VIII.G.F1
            finding: Privacy policy and modern slavery statement show baseline compliance disclosures but not regulator correspondence.
            evidence_claim_ids:
              - EC-017
              - EC-019
            risk_ids:
              - R-009
        hidden_risks:
          - Somnia/Web3 ecosystem, data processing, international hiring, and live events may trigger regulatory scrutiny.
          - Absence of public enforcement does not prove no inquiries.
        evidence_gaps:
          - Regulator correspondence, privacy incidents, security incidents, AML/sanctions review for Web3 exposure, employment regulator records.
        follow_up_questions:
          - Request regulatory inquiries log, privacy/security incident register, Web3 compliance memo, and counsel confirmation.
        table_ids:
          - T-015
          - T-016
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-017
          - EC-019
