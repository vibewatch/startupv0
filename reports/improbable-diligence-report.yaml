report_metadata:
  report_title: Improbable Public-Source Startup Diligence Report
  target_company: Improbable Worlds Limited
  website: https://www.improbable.io/
  known_aliases:
    - Improbable
    - Improbable.io
    - MSquared
    - M²
    - Improbable Ventures
    - Improbable Capital
    - Improbable Worlds
  sector: Venture builder, metaverse infrastructure, Web3, AI simulation, and immersive digital experiences
  geography: United Kingdom headquartered; global venture, partner, and cloud footprint
  company_stage: Late-stage private unicorn / venture builder; CB Insights stage Corporate Minority - II | Alive
  research_date: 2026-05-17
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: GBP for company financial metrics unless noted; USD for CB Insights valuation/funding and Somnia/venture investment metrics
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized Companies House primary records for entity status, filings, officers, PSCs, and charges.
    - Used CB Insights for private-unicorn eligibility, valuation, funding totals, stage, and patent-count signals.
    - Used Improbable-owned pages and news for management claims, financial snapshots, venture-builder positioning, technology, careers, legal/privacy, and partnerships.
    - Used BBC R&D as an independent partner source for Improbable platform use in an immersive 3D technical trial.
    - Used Thanos and MML public project sites for technical-footprint corroboration.
    - Treated marketing, portfolio counts, performance metrics, and Web3/token metrics as company claims unless independently corroborated.
  included_jurisdictions:
    - United Kingdom
    - United States where public counterparties/investors are referenced
    - European Union and international operations only to the extent surfaced in public sources
  excluded_topics:
    - No private data room, audited account PDFs, board materials, cap table, customer contracts, or management interviews were available.
    - No paid court, patent, trademark, sanctions, credit, or market-research databases were used.
    - No source code, technical audit artifacts, SOC/ISO reports, cloud contracts, or on-chain/token allocation records were reviewed.
    - No customer, supplier, investor, employee, or counsel interviews were performed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-17
      notes: User requested exactly one evidence-backed YAML diligence report for Improbable using the startup-diligence-research skill.
