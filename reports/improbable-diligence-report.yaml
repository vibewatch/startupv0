          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public pages describe venture-building services, MSquared/virtual worlds, Somnia/Web3 infrastructure, simulation ventures, Thanos, and MML. Growth, share, cost structure, and product profitability are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A.F1
            finding: About and Building pages support the claim that Improbable operates a venture-building model with multiple ventures and exits.
            evidence_claim_ids:
