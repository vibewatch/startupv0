executive_summary:
  overall_assessment: Improbable is an active UK private unicorn by public-screen criteria, but the diligence posture is high-risk/track rather than invest-ready because the business model has pivoted from large operating revenue to a venture-builder model with opaque venture economics, customer concentration, cap table, and legal/IP exposure.
  investment_or_diligence_thesis: The attractive thesis is a well-capitalized, technically deep UK venture builder with major investors, public partner logos, and optionality in metaverse/Web3/AI ventures. The key diligence test is whether parent-company economics, ownership, recurring revenue, and IP rights justify the stale $3.36B unicorn valuation after FY2024 revenue fell to £10M.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Companies House verifies Improbable Worlds Limited as an active private limited company incorporated on 16 May 2012.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: CB Insights lists Improbable as a $3.36B unicorn and alive/private, supporting private-unicorn eligibility.
      evidence_claim_ids:
        - EC-002
        - EC-025
    - founder_claim_id: FC-007
      summary: BBC R&D independently validates use of Improbable’s platform/testbed in a live immersive music trial.
      evidence_claim_ids:
        - EC-013
    - founder_claim_id: FC-005
      summary: Company sources consistently support a venture-builder repositioning, though venture counts require reconciliation.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-011
        - EC-023
  biggest_risks:
    - risk_id: R-001
      summary: "Reported revenue volatility around the pivot: £78M FY2022, £66M FY2023, £10M FY2024 consolidated revenue."
    - risk_id: R-003
      summary: Venture/Web3/metaverse concentration creates monetization, adoption, token-market, and execution risk.
    - risk_id: R-005
      summary: Governance and capital structure are complex and private, with founder and SVF PSC signals plus large historical funding.
    - risk_id: R-009
      summary: Legal/IP/privacy/Web3 risks remain unresolved without counsel, registry, contract, and security diligence.
  key_evidence_gaps:
    - Audited financial statements, management accounts, revenue bridge, and FY2025 YTD financials.
    - Fully diluted cap table, liquidation preferences, investor rights, options/warrants/notes, and debt documents.
    - "Venture/product economics: ownership, revenue, gross margin, cash burn, exits, and fair-value marks."
    - Customer contracts and revenue concentration, including MLB/BBC/Yuga/Somnia economics.
    - Technical benchmarks, security audits, IP ownership, OSS obligations, and Web3/token allocation/compliance records.
    - Headcount bridge, attrition, compensation, incentive stock plans, and current org chart.
  recommended_next_steps:
    - Proceed only to structured confirmatory diligence with a full finance/legal/product/customer data room.
    - Reconcile FY2022-FY2024 financials to audited accounts and build a venture-by-venture revenue/cash model.
    - Validate current valuation against investor marks, fair-value work, secondary trades, and venture ownership economics.
    - Run technical/IP/security diligence on MSquared, Somnia, MML/Thanos, cloud dependencies, and patent/OSS ownership.
    - Obtain top-customer contracts/references and verify whether named relationships produce recurring revenue.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Improbable passes private-unicorn eligibility screens, but public financial evidence shows a major business-model pivot with sharply lower FY2024 consolidated revenue and missing private operating schedules.
    founder_claim_ids:
      - FC-002
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-005
      - EC-006
      - EC-007
      - EC-008
      - EC-020
      - EC-024
      - EC-025
      - EC-028
    risk_ids:
      - R-001
      - R-002
      - R-004
      - R-005
      - R-006
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources provide high-level 2022-2024 revenue/cash/profit signals and Companies House filing cadence, but not full statements, footnotes, backlog, or AR aging.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A.F1
            finding: Company-stated revenue moved from £78M in FY2022 to £66M in FY2023 and £10M in FY2024 consolidated revenue.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-008
            risk_ids:
              - R-001
          - finding_id: I.A.F2
            finding: Public filing history indicates accounts activity through 2024, but detailed statements were not extracted.
            evidence_claim_ids:
              - EC-028
            risk_ids:
              - R-002
        hidden_risks:
          - Revenue comparability is low after the venture-builder pivot.
          - Profitability quality may rely on one-off gains or portfolio accounting not visible publicly.
        evidence_gaps:
          - Audited income statements, balance sheets, cash-flow statements, footnotes, management accounts, backlog, AR aging, revenue by product/customer/geography.
        follow_up_questions:
          - Provide audited FY2022-FY2024 accounts, monthly FY2025 management pack, revenue bridge by product/venture, cash burn, gross margin, AR aging, and backlog.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-024
          - EC-028
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No three-year model was public. Company disclosed FY2024 cash and a 2025 plan to invest $17M in 10+ ventures, but projected revenue, margins, capex, working capital, and financing assumptions remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B.F1
            finding: Cash of £162.8M and planned $17M venture investment suggest near-term runway, but allocation and burn are unknown.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-002
              - R-003
          - finding_id: I.B.F2
            finding: Future performance is tied to launches of multiple ventures every year and Somnia/Web3 adoption.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-003
              - R-008
        hidden_risks:
          - Forecasts may depend on venture exits, token economics, and intercompany services rather than recurring contracted revenue.
          - FX risk exists because public reporting uses GBP while funding/FDV and planned investments are reported in USD.
        evidence_gaps:
          - Board-approved forecast, scenarios, capex, working capital, financing plan, FX assumptions, venture-by-venture revenue and funding needs.
        follow_up_questions:
          - Provide three-year quarterly financial model with downside/base/upside cases and a bridge from parent cash to venture commitments.
        table_ids:
          - T-001
          - T-012
        figure_ids:
          - F-001
          - F-007
        evidence_claim_ids:
          - EC-008
          - EC-024
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: CB Insights and Companies House confirm unicorn/public-control and charge signals, but shares outstanding, options/warrants/notes, debt balances, and off-balance-sheet obligations are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C.F1
            finding: CB Insights lists a $3.36B unicorn valuation and $865.95M raised while Companies House shows active private status.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-025
            risk_ids:
              - R-004
              - R-005
          - finding_id: I.C.F2
            finding: Companies House shows HSBC Innovation Banking charges, including one outstanding in reviewed records.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-006
        hidden_risks:
          - Large historical funding and PSC records may imply complex preference/control rights.
          - Debt security interests could restrict asset sales, venture transfers, or financing.
        evidence_gaps:
          - Fully diluted cap table, debt schedule, shareholder agreements, option/warrant/SAFE/note schedules, investor rights, off-balance-sheet liabilities.
        follow_up_questions:
          - Provide cap table, financing documents, debt agreements, outstanding charge payoff/covenant certificates, and board/investor consent schedule.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-020
          - EC-025
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Tax positions, revenue-recognition policies, venture/intercompany accounting, and full financing history are not public; only summary funding milestones and filing status were verified.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.D.F1
            finding: Company milestones and CB profile support large historical financing, but economics and current basis are not public.
            evidence_claim_ids:
              - EC-003
              - EC-005
            risk_ids:
              - R-005
          - finding_id: I.D.F2
            finding: Hybrid venture-builder model makes revenue recognition and intercompany transactions a key diligence area.
            evidence_claim_ids:
              - EC-011
              - EC-023
              - EC-024
            risk_ids:
              - R-002
        hidden_risks:
          - Intercompany revenues, venture gains/losses, and fair-value marks could distort operating performance.
          - Tax exposures may span UK and international subsidiaries.
        evidence_gaps:
          - Tax returns, transfer-pricing memos, revenue-recognition policy, intercompany agreements, fair-value policy, NOL/tax asset schedule.
        follow_up_questions:
          - Provide accounting policies, tax position memo, transfer-pricing support, valuation-policy memo, and financing-history schedule.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-005
          - EC-011
          - EC-023
          - EC-024
  - chapter_id: II
