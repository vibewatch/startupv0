diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, notes, management accounts, backlog, AR aging, revenue by product/customer/geography.
    why_it_matters: Needed to test revenue quality, profitability, working capital, and customer concentration.
    suggested_source_or_request: Company CFO/accountant data room and Companies House full accounts download.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Three-year quarterly forecast and scenario model.
    why_it_matters: Public cash and investment plans cannot establish runway or enterprise value.
    suggested_source_or_request: Board-approved operating model with downside/base/upside cases.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, investor rights, debt schedule, and outstanding security interests.
    why_it_matters: Historical funding and PSC records imply complex economics and consent rights.
    suggested_source_or_request: Company legal/finance data room plus counsel summary.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Revenue, margin, usage, and retention by venture/product.
    why_it_matters: Product breadth is not enough; economics determine value.
    suggested_source_or_request: Product/venture P&Ls and KPI dashboards.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.A
    missing_information: Top-15 customer list by application and year.
    why_it_matters: Named logos do not reveal concentration or repeatability.
    suggested_source_or_request: Company customer schedule and billing export.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Cloud and top-supplier spend/commitments.
    why_it_matters: High-scale virtual worlds and blockchain workloads may be cloud-cost sensitive.
    suggested_source_or_request: Supplier contracts and procurement ledger.
    priority: medium
  - gap_id: G-007
    chapter_id: IV
    section_id: IV.A
    missing_information: Market share, win/loss, pricing, and competitor benchmark data.
    why_it_matters: Competition spans several segments and cannot be quantified publicly.
    suggested_source_or_request: Sales/strategy market analysis and customer reference calls.
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, quotas, sales cycle, pipeline conversion, CAC, and marketing ROI.
    why_it_matters: Marketing and sales capacity cannot be assessed from open roles only.
    suggested_source_or_request: CRM export, comp plan, marketing attribution report.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.A
    missing_information: Technical architecture, benchmark, security audit, uptime, and cost telemetry.
    why_it_matters: Technical claims are central to differentiation and must be independently tested.
    suggested_source_or_request: Engineering data room and third-party technical diligence.
    priority: high
  - gap_id: G-010
    chapter_id: VI
    section_id: VI.B
    missing_information: Product pipeline budget, stage gates, launch dates, and kill criteria.
    why_it_matters: Venture-builder value depends on disciplined capital allocation.
    suggested_source_or_request: Product roadmap and investment committee materials.
    priority: high
  - gap_id: G-011
    chapter_id: VII
    section_id: VII.B
    missing_information: Reconciled headcount and attrition by entity/function/location.
    why_it_matters: Public people counts are inconsistent and may hide restructuring risk.
    suggested_source_or_request: HRIS export and monthly headcount bridge.
    priority: high
  - gap_id: G-012
    chapter_id: VII
    section_id: VII.D
    missing_information: Compensation, benefits, severance, and retention agreements.
    why_it_matters: Key-person and change-of-control costs are private but material.
    suggested_source_or_request: HR/legal employment agreement schedule.
    priority: medium
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Comprehensive litigation and threatened-claims schedule.
    why_it_matters: Public search was not exhaustive and legal disputes could be material.
    suggested_source_or_request: Outside counsel letter and court/tribunal searches.
    priority: high
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP schedule, patent assignments, OSS inventory, trademarks, venture IP ownership.
    why_it_matters: Patent count alone does not prove ownership or freedom to operate.
    suggested_source_or_request: IP counsel memo, patent registry search, OSS scan.
    priority: high
  - gap_id: G-015
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, limits, exclusions, and claims history.
    why_it_matters: Coverage must match cyber, D&O, live-event, Web3, IP, and employment exposures.
    suggested_source_or_request: Broker letter and insurance schedule.
    priority: medium
  - gap_id: G-016
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulator correspondence, privacy/security incidents, and Web3 compliance memo.
    why_it_matters: Web3, data processing, and international operations create regulatory surface.
    suggested_source_or_request: Counsel/compliance logs and security incident register.
    priority: high
