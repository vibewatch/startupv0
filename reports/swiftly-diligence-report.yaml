  - founder_claim_id: FC-005
    claim_text: Swiftly campaigns can drive measurable iROAS, ROAS, app installs and sales lift.
    claim_source: Company case studies and product pages
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-006
      - EC-011
    contradiction_summary: null
