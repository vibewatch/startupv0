      - Request raw campaign datasets, measurement methodology, matched-control design and a full customer performance distribution.
  - founder_claim_id: FC-006
    claim_text: Swiftly financial statements, ARR, margin, runway, detailed cap table and customer concentration are available for diligence.
    claim_source: Expected private diligence materials, not public
    claim_date: null
    mapped_chapter_ids:
      - I
      - III
    mapped_section_ids:
      - I.A
      - III.C
    verification_status: not_publicly_verifiable
    confidence: high
    evidence_claim_ids:
      - EC-019
    contradiction_summary: null
    diligence_follow_up:
      - Open data room with audited/management financials, ARR bridge, revenue by customer, cap table, debt schedule and cash runway model.
executive_summary:
  overall_assessment: "Eligible for a public-source diligence report: Swiftly is publicly listed by CB Insights as a $1.20B private unicorn and shows current 2026 operating activity. Investment diligence remains highly dependent on private financial, customer, cap-table and legal materials."
  investment_or_diligence_thesis: "Swiftly targets a real retailer need: AI-enabled digital engagement, retail media and data connectivity for regional grocers and wholesalers. Public evidence supports product breadth, current partnerships and campaign proof points, but current valuation support, revenue quality, concentration, privacy/legal exposure and integration economics are unresolved."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights row verifies the $1.20B unicorn marker, date joined and selected investors.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Company product pages verify a broad retail AI, app/web and retail media product suite.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-005
        - EC-006
        - EC-007
    - founder_claim_id: FC-004
      summary: 2026 announcements and case studies show active customer/partner signals including MDI, Giant Eagle, Vistar, Better Health, Homeland and UNFI-related campaigns.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-002
      summary: Private financials and runway are not public.
    - risk_id: R-003
      summary: Customer concentration and active deployment economics are unknown.
    - risk_id: R-004
      summary: Consumer data, retail media and alcohol-promotion compliance require deep review.
  key_evidence_gaps:
    - Audited/management financials, ARR, margin, burn and runway.
    - Full cap table, preferred terms and current valuation support.
    - Revenue by customer, churn and top-customer concentration.
    - Litigation, privacy/security, alcohol compliance and insurance materials.
  recommended_next_steps:
    - Proceed to confidential data-room request list before valuation underwriting.
    - Run counsel-led litigation/privacy/security review.
    - Conduct top-customer and partner reference calls.
    - Benchmark win/loss and pricing against Instacart, Criteo and grocery ecommerce vendors.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Swiftly meets the public unicorn threshold through CB Insights, but detailed financials, runway, cap structure and current valuation support are private-data-room items.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-019
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or management financial statements were public; only selected public traction metrics and case-study economics were available.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Audited income statements, balance sheets, cash flows, AR aging and product/channel revenue breakdowns were not public.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-002
        hidden_risks:
          - Public scale claims could mask low gross margin or high services cost if integrations are labor-intensive.
        evidence_gaps:
          - Audited financials, monthly management accounts, AR aging, deferred revenue, backlog and revenue recognition memo are required.
        follow_up_questions:
          - Provide three years of audited/management financial statements, monthly ARR/revenue bridge and AR aging.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-019
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources describe growth drivers around retail AI, media and data connectivity but do not provide projections, capital expenditure assumptions or runway.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Growth drivers are supported by product pages and current partnerships, but projections and economic assumptions are private.
            evidence_claim_ids:
              - EC-003
              - EC-006
              - EC-008
            risk_ids:
              - R-002
        hidden_risks:
          - Growth may require costly integrations, media sales capacity and customer success headcount.
        evidence_gaps:
          - Board-approved plan, revenue by product, burn/runcash, pipeline and scenario assumptions were unavailable.
        follow_up_questions:
          - Provide board plan, forecast by product/channel/geography, burn/runcash and scenario sensitivities.
        table_ids: []
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-006
          - EC-019
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public capital-structure evidence is limited to CB Insights selected investors and no SEC issuer entries in scoped name searches.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Swiftly appears as a current CB Insights unicorn; SEC name searches did not show public issuer entries.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-001
        hidden_risks:
          - Hidden preferences, debt, SAFEs, warrants or secondary transactions could materially change common-equity value.
        evidence_gaps:
          - Shares outstanding, option pool, warrants, debt, liquidation preferences and investor rights are not public.
        follow_up_questions:
          - Provide fully diluted cap table, financing documents, debt schedule, investor side letters and waterfall.
        table_ids:
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: CB Insights provides a $1.20B valuation marker and selected investors; detailed financing history is otherwise not fully public in accessible sources.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: The verified public valuation marker is $1.20B with a 2022-09-19 unicorn date.
            evidence_claim_ids:
              - EC-001
            risk_ids:
              - R-001
        hidden_risks:
          - A 2022 valuation may not reflect current revenue multiples or market conditions.
        evidence_gaps:
          - Complete equity/warrant/debt financing history and current basis for each round were not public.
        follow_up_questions:
          - Provide all financing rounds, post-money/pre-money, securities, preferences, ownership percentages and current 409A/valuation support.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-019
  - chapter_id: II
    title: Products
    chapter_summary: Swiftly has a broad product suite around retail AI, app/web, retail media, Audience Optimizer, SmartCircular, Alcohol Cashback and Connect; pricing and product-line economics are not public.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-020
    risk_ids:
      - R-004
      - R-006
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Primary sources verify multiple product modules and integration dependencies, while pricing, margins and adoption by SKU require private records.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Swiftly’s product suite spans retail media, App & Web, Audience Optimizer, SmartCircular, Alcohol Cashback and Connect.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-005
              - EC-006
              - EC-007
            risk_ids:
              - R-006
          - finding_id: II.A-F2
            finding: App & Web and Connect rely on live product, pricing, inventory, loyalty and supplier data.
            evidence_claim_ids:
              - EC-005
              - EC-020
            risk_ids:
              - R-006
        hidden_risks:
          - Bundled modules can obscure which products drive recurring revenue versus services-heavy implementations.
        evidence_gaps:
          - No public price book, SKU-level revenue, gross margin, roadmap economics or product adoption by customer.
        follow_up_questions:
          - Provide product catalog, active deployments by product, price book, services attach rate and implementation backlog.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-005
          - EC-006
          - EC-007
          - EC-020
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence identifies named customers/partners and selected case-study outcomes, but top-customer revenue concentration, active deployment status and supplier costs are not public.
    founder_claim_ids:
      - FC-004
      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-010
      - EC-011
      - EC-019
      - EC-020
    risk_ids:
      - R-003
      - R-006
      - R-008
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Named public customers/cases include Better Health Market, Homeland, UNFI Media Network campaigns and Giant Eagle; public materials do not identify top 15 customers by revenue.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Case studies disclose selected campaign results and named customers, but not all top customers.
            evidence_claim_ids:
              - EC-009
              - EC-011
            risk_ids:
              - R-003
        hidden_risks:
          - Case studies may represent selected successful outcomes rather than normalized portfolio performance.
        evidence_gaps:
          - Top 15 customers by fiscal year, purchase timing, current contract status and revenue contribution are private.
        follow_up_questions:
          - Provide customer list by ARR/revenue, contract term, renewal date, product modules and reference contacts.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-009
          - EC-011
          - EC-019
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Strategic relationships include MDI and Vistar Media, both announced in 2026, but economics and exclusivity were not public.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: MDI partnership targets web, SmartCircular and Audience Optimizer deployment across independent grocers.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-003
              - R-006
          - finding_id: III.B-F2
            finding: Vistar extends campaigns to DOOH and transaction-linked measurement.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-004
              - R-005
        hidden_risks:
          - Partner-led distribution could be broad but low-revenue unless retailer activation and media sales convert.
        evidence_gaps:
          - No partner contract value, exclusivity, minimum commitments, revenue share or channel conflict detail.
        follow_up_questions:
          - Provide strategic partner agreements, MDF/revenue-share terms, rollout milestones and active retailer counts.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-008
          - EC-010
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer and any customers over 5% of revenue were not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Public sources disclose customer/partner names and campaign metrics, not revenue concentration.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-003
        hidden_risks:
          - A small number of grocers/wholesalers could account for disproportionate platform usage, media inventory or revenue.
        evidence_gaps:
          - Revenue by customer, product, geography and channel was unavailable.
        follow_up_questions:
          - Provide revenue by customer for the last three fiscal years and YTD, including any 5%+ customers.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-019
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public list of severed material customer, partner or supplier relationships was found in scoped sources.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.D-F1
            finding: No severed-relationship schedule is public.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-003
        hidden_risks:
          - Lost retailer relationships may not be publicly announced and could impair network scale.
        evidence_gaps:
          - Churn, downgrades, terminated partnerships and disputed implementations require company confirmation.
        follow_up_questions:
          - Provide churn/lost-customer schedule and all material disputes or non-renewals in the last two years.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-019
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public sources identify dependencies on retailer systems, coupon providers, Vistar and Databricks; purchase amounts and supplier agreements are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Swiftly Connect and App & Web integrate into retailer POS, loyalty, ordering, supplier, coupon and inventory systems.
            evidence_claim_ids:
              - EC-005
              - EC-020
            risk_ids:
              - R-006
          - finding_id: III.E-F2
            finding: Trust Center lists Databricks as a subprocessor.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-008
        hidden_risks:
          - Supplier or subprocessor outages and retailer data-quality problems can undermine campaign attribution and app utility.
        evidence_gaps:
          - Top supplier spend, cloud architecture, SLAs and subprocessor DPAs were not public.
        follow_up_questions:
          - Provide supplier spend, cloud bills, subprocessors, SLAs, incident history and dependency map.
        table_ids:
          - T-008
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-015
          - EC-020
  - chapter_id: IV
    title: Competition
    chapter_summary: Swiftly competes in crowded retail media, grocery ecommerce and personalization markets against scaled platforms with larger networks and advertiser relationships.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-018
      - EC-004
      - EC-006
    risk_ids:
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Competitor public pages confirm overlap with retail media, grocery ecommerce and personalization; Swiftly differentiates on retailer-first AI/connectivity but must prove scale and economics.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Instacart Ads and Criteo publish materially larger network claims than Swiftly’s disclosed 12M shoppers/33K storefronts.
            evidence_claim_ids:
              - EC-004
              - EC-018
            risk_ids:
              - R-005
          - finding_id: IV.A-F2
            finding: Mercatus overlaps on grocery ecommerce and personalization.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-005
        hidden_risks:
          - Large competitors may bundle media buying, ecommerce and fulfillment with broader first-party data networks.
        evidence_gaps:
          - No public win/loss, pricing comparison, customer retention, market share or RFP outcome data.
        follow_up_questions:
          - Provide competitor win/loss, churn reasons, pricing benchmarks and differentiation evidence.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-004
          - EC-006
          - EC-018
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Swiftly sells to retailers/wholesalers and monetizes CPG brand campaigns through product-led and partner channels; sales productivity, budgets and pipeline are not public.
