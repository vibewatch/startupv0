        confidence: medium
        key_findings:
          - finding_id: V.C-F1
            finding: Case studies and product pages provide public proof points for retailer and brand demand generation.
            evidence_claim_ids:
              - EC-006
              - EC-011
            risk_ids:
              - R-005
        hidden_risks:
