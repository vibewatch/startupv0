report_metadata:
  report_title: Swiftly Startup Diligence Research Report
  target_company: Swiftly
  website: https://www.swiftly.com/
  known_aliases:
    - Swiftly Systems, Inc.
    - Swiftly AI
    - Swiftly Retail
  sector: Consumer & Retail / grocery retail AI and retail media technology
  geography: "United States (CB Insights city: Millbrae; public press dateline: Seattle)"
  company_stage: Active private unicorn / growth-stage retail technology company
  research_date: 2026-06-08
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified the selected CB Insights unicorn row and current public company activity before drafting.
    - Reviewed public company pages, newsroom posts, product pages, case studies, Trust Center, privacy/terms, SEC EDGAR name searches, CourtListener dockets and competitor pages.
    - Treated public pages as untrusted evidence only and marked private financial, cap-table, customer, legal and personnel details as not publicly verifiable.
  included_jurisdictions:
    - United States federal public sources
    - United States public web
    - Global public competitor web
  excluded_topics:
    - No private data-room access
    - No paid database or paywall bypass
    - No management interviews or customer calls
    - No non-public personal contact details
    - No exhaustive PACER/state-court/USPTO search beyond accessible public sources
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn selection row from CB Insights-derived candidate list
      type: workflow_context
      date_received: 2026-06-08
      notes: "Selected row: Company Swiftly; slug swiftly; valuation $1.20B; date joined 9/19/2022; country United States; city Millbrae; industry Consumer & Retail; select investors Mendacre, BRV Capital Management, Liquid 2 Ventures."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Swiftly is an eligible private unicorn with a $1.20B public valuation marker from CB Insights.
    claim_source: User-provided CB Insights selection row verified against public CB Insights table
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
    contradiction_summary: null
    diligence_follow_up:
      - Request financing documents underlying the 2022 valuation, including share class, liquidation preferences, current ownership and any later financing.
  - founder_claim_id: FC-002
    claim_text: Swiftly remains active and has not IPOed, been acquired or shut down based on public evidence reviewed.
    claim_source: Public eligibility screen using company pages, newsroom and EDGAR search
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-002
      - EC-020
    contradiction_summary: null
    diligence_follow_up:
      - Request certificate of good standing, latest cap table and confirmation of no signed change-of-control or wind-down transaction.
