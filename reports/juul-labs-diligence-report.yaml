report_metadata:
  report_title: JUUL Labs Public-Source Startup Diligence Report
  target_company: JUUL Labs
  website: https://www.juul.com/
  known_aliases:
    - JUUL
    - Juul Labs, Inc.
    - Ploom
    - Pax Labs spinout
  sector: Regulated consumer products, electronic nicotine delivery systems, and tobacco harm-reduction alternatives
  geography: United States, headquartered in San Francisco
  company_stage: Late-stage private unicorn with material regulatory, litigation, and valuation overhang
  research_date: 2026-05-15
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the covered-report slug list from repository files and excluded existing diligence report slugs before selecting a new target.
    - Fetched current public unicorn lists, normalized company names to slugs, removed covered slugs, built more than 30 uncovered candidates, and randomly selected JUUL Labs with shuf.
    - Prioritized primary public evidence from JUUL-owned pages, FDA tobacco marketing-order records, FTC enforcement materials, Altria investor communications, and public patent/trademark records.
    - Used secondary sources only for historical market share, settlement chronology, and leadership/founding context where primary records were unavailable or inaccessible.
    - Treated private financials, customer concentration, supplier contracts, litigation dockets, and current cap-table information as evidence gaps rather than estimating them.
  included_jurisdictions:
    - United States
  excluded_topics:
    - Private audited financial statements, cash balances, revenue ledgers, board minutes, cap table, debt instruments, settlement agreements, and customer-level records were unavailable.
    - No customer, supplier, investor, regulator, employee, plaintiff, defense-counsel, or management interviews were performed.
    - Paywalled, CAPTCHA-protected, bot-blocked, or unavailable pages were not bypassed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-15
      notes: The user asked for one random uncovered private unicorn diligence report and a draft pull request.

founder_claims:
  - founder_claim_id: FC-001
    claim_text: JUUL Labs is a private unicorn on a current public unicorn list with a USD 12 billion listed valuation.
    claim_source: CB Insights unicorn list
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-008
    contradiction_summary: CB Insights lists JUUL Labs at USD 12 billion, but Altria reported only USD 250 million fair value for its minority economic investment before exchanging the stake in 2023.
    diligence_follow_up:
      - Request the current cap table, fully diluted share count, financing terms, preference stack, most recent 409A, and any secondary-transfer data to reconcile the stale public unicorn valuation.
  - founder_claim_id: FC-002
    claim_text: JUUL markets its product as an alternative for adult smokers and limits U.S. purchasing to age-verified adults.
    claim_source: JUUL company and product-access pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - V
    mapped_section_ids:
      - II.A
      - V.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-003
      - EC-004
    contradiction_summary: null
    diligence_follow_up:
      - Request age-verification performance metrics, failed-verification rates, retailer compliance audits, chargeback/refund logs, and underage-access incident reporting.
  - founder_claim_id: FC-003
    claim_text: The FDA has authorized the JUUL System for U.S. sale after scientific review.
    claim_source: JUUL regulatory-policy page and FDA tobacco-products marketing-order records
    claim_date: 2025-07-17
    mapped_chapter_ids:
      - II
      - VIII
    mapped_section_ids:
      - II.A
      - VIII.G
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-020
    contradiction_summary: The 2025 marketing granted orders materially improve the U.S. regulatory posture, but the same FDA record shows 2022 denials and 2024 rescission history, so the diligence focus should remain on order scope, conditions, and compliance.
    diligence_follow_up:
      - Obtain the complete marketing granted orders, post-market reporting obligations, product-change controls, warning letters if any, and PMTA correspondence history.
  - founder_claim_id: FC-004
    claim_text: JUUL has a substantial intellectual-property estate around devices, pods, charging accessories, and JUUL2 products.
    claim_source: JUUL patent notice and Justia patent records
    claim_date: null
    mapped_chapter_ids:
      - VI
      - VIII
    mapped_section_ids:
      - VI.A
      - VIII.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-010
      - EC-011
    contradiction_summary: null
    diligence_follow_up:
      - Request the patent docket, freedom-to-operate opinions, ownership chain, inventor assignments, open oppositions, maintenance-fee status, and license encumbrances.
  - founder_claim_id: FC-005
    claim_text: Youth use of JUUL has fallen sharply since 2019.
    claim_source: JUUL youth-prevention page citing the 2025 National Youth Tobacco Survey
    claim_date: 2025-10-06
    mapped_chapter_ids:
      - V
      - VIII
    mapped_section_ids:
      - V.C
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-012
    contradiction_summary: The public page reports a 99% decrease in past-30-day JUUL use since 2019, but the reviewed record is company presentation of survey results rather than the underlying survey microdata or independent enforcement analysis.
    diligence_follow_up:
      - Request the underlying survey citations, brand-specific trend calculations, youth-prevention audits, retailer mystery-shop data, and regulator correspondence on youth access.
  - founder_claim_id: FC-006
    claim_text: JUUL's current revenue, profitability, cash runway, customer concentration, and settlement liabilities can be evaluated from public information.
    claim_source: Analyst diligence request
    claim_date: 2026-05-15
    mapped_chapter_ids:
      - I
      - III
      - VIII
    mapped_section_ids:
      - I.A
      - III.A
      - VIII.A
    verification_status: not_publicly_verifiable
    confidence: high
    evidence_claim_ids:
      - EC-014
      - EC-015
      - EC-018
    contradiction_summary: Public sources contain isolated historical revenue, valuation, settlement, and channel signals, but not audited financial statements, customer files, cash runway, or a complete legal-liability schedule.
    diligence_follow_up:
      - Request audited financials, management accounts, budget-to-actuals, cash runway model, settlement reserve roll-forward, customer/channel concentration, and payment waterfall.

executive_summary:
  overall_assessment: >-
    JUUL Labs remains a private, highly regulated consumer-nicotine company with
    meaningful product and IP assets, improved U.S. FDA authorization posture as
    of 2025, and severe historical overhang from litigation, youth-use scrutiny,
    and valuation deterioration. The public record supports operating continuity
    and regulatory progress, but it does not support underwriting the CB Insights
    USD 12 billion unicorn-list valuation without private cap-table, financial,
    settlement, and order-condition diligence.
  investment_or_diligence_thesis: >-
    A viable diligence case depends on whether JUUL can convert FDA-authorized
    U.S. products, age-gated distribution, and IP coverage into compliant,
    cash-generative adult-smoker conversion while containing litigation reserves,
    channel concentration, illicit-disposable competition, and reputational risk.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: JUUL's public product pages and company pages consistently position the product for adult smokers and show age-gated U.S. purchasing mechanics.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-003
      summary: FDA public marketing-order records list July 17, 2025 marketing granted orders for JUUL device and tobacco/menthol JUULpods.
      evidence_claim_ids:
        - EC-006
        - EC-007
    - founder_claim_id: FC-004
      summary: Company patent notices and public patent records show a broad IP estate across devices, pods, charging accessories, and JUUL2 products.
      evidence_claim_ids:
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Public valuation signals conflict sharply; CB Insights lists USD 12 billion while Altria marked its stake to USD 250 million before exchanging it for IP rights.
    - risk_id: R-002
      summary: FDA authorization improved the U.S. posture, but the order scope, product-change controls, post-market obligations, and enforcement sensitivity remain central diligence risks.
    - risk_id: R-003
      summary: Youth-marketing litigation, settlements, and reputational overhang can constrain distribution, brand trust, financing options, and strategic exits.
  key_evidence_gaps:
    - Current audited financial statements, cash runway, gross margin, contribution margin, settlement reserves, and revenue by channel are not publicly available.
    - Current cap table, preference stack, debt, warrants, secondary transactions, and board/investor rights are not publicly available.
    - Customer/channel concentration, retailer economics, distributor contracts, and age-verification performance data are not publicly available.
    - Full litigation docket, settlement-payment schedule, insurance coverage, indemnities, and regulatory correspondence are not publicly available.
  recommended_next_steps:
    - Treat the CB Insights USD 12 billion valuation as a list marker, not an investable current mark, until reconciled against company records and financing terms.
    - Make FDA marketing-order conditions, PMTA correspondence, post-market reporting, and product-change controls a red-flag review led by regulatory counsel.
    - Require a settlement and litigation reserve schedule, including payment timing, covered claims, insurance recoveries, and covenants.
    - Underwrite only after receiving channel economics, retailer concentration, age-gate metrics, and adult-smoker conversion cohorts.

chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: >-
      Public financial evidence is dominated by historical valuation signals,
      Altria's 2023 exit from its minority economic investment, and isolated
      secondary-source operating metrics. Current revenue, profitability, cash
      runway, debt, and settlement reserves are not publicly verifiable.
    founder_claim_ids:
      - FC-001
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-008
      - EC-014
      - EC-018
    risk_ids:
      - R-001
      - R-006
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
        summary: Public sources do not disclose JUUL's current audited financial statements, current revenue, gross margin, EBITDA, cash balance, debt, or settlement reserves.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Altria's 2023 statement provides an external valuation signal but not JUUL's full financial statements.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Current revenue quality, profitability, cash runway, and settlement reserve adequacy require private company records.
            evidence_claim_ids:
              - EC-014
              - EC-018
            risk_ids:
              - R-006
        hidden_risks:
          - Historical valuation declines may mask a down-round, restructuring, debt, or liquidation-preference overhang not visible in public sources.
          - Settlement cash payments and legal fees could materially affect liquidity even if products remain authorized.
        evidence_gaps:
          - Audited financial statements and management accounts for the last three fiscal years.
          - Cash, debt, off-balance-sheet obligations, settlement reserve roll-forward, and cash runway model.
        follow_up_questions:
          - What were revenue, gross margin, adjusted EBITDA, free cash flow, legal cash outflows, and cash balances by quarter for the last three years?
          - What debt, warrants, settlement obligations, or covenant restrictions exist today?
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-014
          - EC-018
      - section_id: I.B
        title: Revenue recognition, margins, and quality of earnings
        checklist_question_ids:
          - I.B.1
          - I.B.2
        summary: Public materials show adult-smoker product access and online/retail channels, but not revenue-recognition policy, margins, returns, chargebacks, promotions, or channel gross-to-net adjustments.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: Online Auto-Ship and retail-locator signals indicate recurring and retail distribution motions, but the economics by channel are undisclosed.
            evidence_claim_ids:
              - EC-004
              - EC-015
            risk_ids:
              - R-005
        hidden_risks:
          - Promotional allowances, retailer chargebacks, settlement payments, and FDA compliance costs could make gross revenue a poor proxy for contribution margin.
        evidence_gaps:
          - Revenue-recognition memo, channel gross-to-net bridge, SKU margin, and return/refund history.
        follow_up_questions:
          - How much revenue is generated through direct online sales versus retail and wholesale channels, and what is contribution margin by channel?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-015
      - section_id: I.C
        title: Financing history, valuation, and capital structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
        summary: CB Insights lists JUUL Labs as a USD 12 billion unicorn, but public Altria disclosures and secondary sources show a steep valuation reset from the implied 2018 Altria transaction value.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights lists JUUL Labs at USD 12 billion and identifies Tiger Global Management as an investor in the public unicorn-list row.
            evidence_claim_ids:
              - EC-001
            risk_ids:
              - R-001
          - finding_id: I.C-F2
            finding: Altria said it exchanged its entire minority economic investment in JUUL for a non-exclusive heated-tobacco IP license and disclosed a USD 250 million carrying and fair value at year-end 2022.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-001
        hidden_risks:
          - Preference stack, liquidation preferences, anti-dilution, debt, warrants, and secondary-sale restrictions could dominate common-equity economics.
        evidence_gaps:
          - Current cap table, financing documents, investor rights, board consents, 409A reports, and secondary-transfer history.
        follow_up_questions:
          - What is the fully diluted capitalization and waterfall at plausible exit values after settlement liabilities and any debt?
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-008
          - EC-013
      - section_id: I.D
        title: Forecasts, budgets, and operating plan
        checklist_question_ids:
          - I.D.1
          - I.D.2
        summary: No public source reviewed provides a current board-approved forecast, budget, cash runway plan, or covenant model.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: Regulatory authorization is a necessary operating-plan input, but public authorization evidence alone does not establish demand, margin, or runway.
            evidence_claim_ids:
              - EC-007
              - EC-014
            risk_ids:
              - R-002
              - R-006
        hidden_risks:
          - Forecasts may depend on restricted products, retail expansion, price increases, or litigation assumptions that are not evident in public sources.
        evidence_gaps:
          - Board-approved plan, monthly budget-to-actuals, scenario model, covenant model, and settlement payment schedule.
        follow_up_questions:
          - What operating plan is management using after the July 2025 FDA marketing granted orders, and what downside case assumes renewed enforcement or channel constraints?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-014

  - chapter_id: II
    title: Products
    chapter_summary: >-
      JUUL's public product evidence supports an age-gated vapor product for
      adult smokers with FDA-authorized U.S. product scope. Product diligence
      should center on exact authorized SKUs, product-change controls, toxicology
      data, quality systems, and roadmap claims.
    founder_claim_ids:
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-020
    risk_ids:
      - R-002
      - R-004
    sections:
      - section_id: II.A
        title: Product overview, SKU scope, and roadmap
        checklist_question_ids:
          - II.A.1
          - II.A.2
        summary: Public pages describe the JUUL vaporizer/e-cigarette for adult smokers, online product access, Auto-Ship, and retail access, while FDA records show marketing granted orders for the device and specified tobacco and menthol JUULpods.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: FDA public records list July 17, 2025 marketing granted orders for the JUUL device, Virginia tobacco JUULpods, and menthol JUULpods.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-002
          - finding_id: II.A-F2
            finding: JUUL product-access pages show age-gated online account creation, Auto-Ship, online benefits, and a retail locator.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-005
        hidden_risks:
          - Product changes outside the scope of FDA orders may require new submissions or trigger enforcement.
          - Roadmap claims around JUUL2 and future products are not equivalent to U.S. marketing authorization.
        evidence_gaps:
          - Full marketing-order letters, authorized labeling, post-market study obligations, adverse-event process, product-change protocols, and roadmap status.
        follow_up_questions:
          - Which exact device, pod, flavor, nicotine concentration, packaging, and labeling configurations are authorized for U.S. sale today?
          - What product roadmap items depend on new FDA submissions?
        table_ids:
          - T-003
          - T-004
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-007
          - EC-020
      - section_id: II.B
        title: Product performance, quality, and regulatory science
        checklist_question_ids:
          - II.B.1
          - II.B.2
        summary: FDA's 2022 denial record cited toxicological-data concerns, the 2024 update rescinded denials and returned applications to review, and the 2025 marketing-order list indicates subsequent authorization for specified products.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: II.B-F1
            finding: The same FDA public record history contains denial, rescission, and authorization events, making the underlying toxicology and post-market compliance record a priority diligence area.
            evidence_claim_ids:
              - EC-005
              - EC-006
              - EC-007
            risk_ids:
              - R-002
        hidden_risks:
          - Public order listings do not reveal complete FDA conditions, study commitments, manufacturing quality findings, or adverse-event trends.
        evidence_gaps:
          - PMTA data package, toxicology studies, FDA deficiency letters, quality-system audit reports, complaint logs, and product recall history.
        follow_up_questions:
          - What deficiencies cited in 2022 were remediated, and what continuing obligations came with the 2025 marketing granted orders?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-007
      - section_id: II.C
        title: Product economics and pricing
        checklist_question_ids:
          - II.C.1
          - II.C.2
        summary: Public product pages support sales access and subscription-like Auto-Ship mechanics, but current SKU pricing, discounting, gross margin, and replenishment economics were not fully observable in the reviewed public sources.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.C-F1
            finding: Auto-Ship indicates repeat-purchase mechanics, but churn, frequency, fulfillment cost, and promotional economics are not publicly verifiable.
            evidence_claim_ids:
              - EC-004
              - EC-015
            risk_ids:
              - R-005
        hidden_risks:
          - Price compression from competitors, illicit disposables, taxes, and retailer margin demands could erode unit economics.
        evidence_gaps:
          - SKU price book, discounting policy, refill cadence, return rates, fulfillment cost, and margin by channel.
        follow_up_questions:
          - What is net revenue per adult purchaser, by product and channel, after taxes, discounts, returns, and retailer margin?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-015

  - chapter_id: III
    title: Customer Information
    chapter_summary: >-
      Public materials identify the intended customer as age-verified adult
      smokers and show direct online plus retail access. They do not disclose
      customer concentration, cohort retention, top retailers, wholesale terms,
      supplier terms, or age-verification failure rates.
    founder_claim_ids:
      - FC-002
      - FC-006
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-012
      - EC-015
      - EC-019
    risk_ids:
      - R-003
      - R-005
    sections:
      - section_id: III.A
        title: Customer base, cohorts, and concentration
        checklist_question_ids:
          - III.A.1
          - III.A.2
        summary: JUUL identifies the intended end user as adult smokers, but no public source reviewed discloses active adult purchasers, retention cohorts, channel-level concentration, or customer-level revenue.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Adult-smoker positioning is public and consistent across company pages, but actual customer cohorts and revenue concentration are not publicly verifiable.
            evidence_claim_ids:
              - EC-003
              - EC-015
            risk_ids:
              - R-005
          - finding_id: III.A-F2
            finding: JUUL reports sharply reduced youth use of JUUL, but youth-use and access-control diligence remains material because of historical legal and reputational exposure.
            evidence_claim_ids:
              - EC-012
              - EC-018
            risk_ids:
              - R-003
        hidden_risks:
          - Retailer, distributor, or geography concentration could be high even if end-user demand appears diversified.
          - Youth-use or unauthorized-access incidents could trigger new restrictions, settlements, or reputational harm.
        evidence_gaps:
          - Active adult-customer counts, repeat-purchase cohorts, churn, top-retailer revenue, distributor concentration, and age-verification outcomes.
        follow_up_questions:
          - What percentage of net revenue comes from the top five retail partners, direct-to-consumer accounts, and each U.S. state?
        table_ids:
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-003
          - EC-012
          - EC-015
      - section_id: III.B
        title: Strategic relationships, partners, and suppliers
        checklist_question_ids:
          - III.B.1
          - III.B.2
        summary: Public records show a historical strategic relationship with Altria, later terminated economically through an IP-license exchange, while current strategic, retailer, manufacturing, logistics, and age-verification vendor agreements are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Altria's 2023 exchange eliminated its minority economic investment and replaced it with a non-exclusive heated-tobacco IP license, changing the strategic-partner context.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-001
              - R-007
          - finding_id: III.B-F2
            finding: Public company pages show online and retail access but not the contracts or dependencies behind distribution, manufacturing, or compliance vendors.
            evidence_claim_ids:
              - EC-004
              - EC-015
              - EC-019
            risk_ids:
              - R-005
        hidden_risks:
          - Termination rights, volume commitments, retail delisting rights, manufacturer concentration, and compliance-vendor failures may not surface in public materials.
        evidence_gaps:
          - Retailer, distributor, manufacturer, logistics, payment, identity-verification, and technology-vendor contracts.
        follow_up_questions:
          - Which suppliers or retailers are single points of failure, and what termination or exclusivity rights do they hold?
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-008
          - EC-015
          - EC-019
      - section_id: III.C
        title: Customer satisfaction, complaints, and churn
        checklist_question_ids:
          - III.C.1
          - III.C.2
        summary: Complaint volume, adult-smoker conversion outcomes, product satisfaction, retention, and churn data were not available in public sources reviewed.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: The company mission emphasizes adult-smoker switching, but public evidence does not disclose adult-smoker conversion, satisfaction, or retention metrics.
            evidence_claim_ids:
              - EC-003
              - EC-015
            risk_ids:
              - R-005
        hidden_risks:
          - High churn, product complaints, battery/pod quality issues, or customer-service failures could impair repeat purchase economics.
        evidence_gaps:
          - NPS, complaint logs, churn cohorts, refund rates, product-return codes, and adult-smoker conversion data.
        follow_up_questions:
          - What percentage of purchasers are verified adult smokers who remain active after 3, 6, and 12 months?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-015
      - section_id: III.D
        title: Revenue by customer, channel, and geography
        checklist_question_ids:
          - III.D.1
          - III.D.2
        summary: Public materials show channel types but not revenue splits by customer, retailer, distributor, state, or country.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.D-F1
            finding: Retail locator and online access show routes to market, but channel revenue weights are not public.
            evidence_claim_ids:
              - EC-004
              - EC-015
            risk_ids:
              - R-005
        hidden_risks:
          - State flavor laws, excise taxes, retailer policies, or local enforcement could create revenue volatility by geography.
        evidence_gaps:
          - State-level and channel-level revenue, retailer concentration, and distributor sell-through.
        follow_up_questions:
          - Which states and retail partners drive the largest net revenue and margin contribution?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-015
      - section_id: III.E
        title: Dependency on suppliers, platforms, and channels
        checklist_question_ids:
          - III.E.1
          - III.E.2
        summary: Public evidence is sufficient to identify categories of dependency, but not contractual exposure or concentration.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Age-verification, online commerce, retail distribution, manufacturing, FDA compliance, and payment processing are all operational dependency categories that need contract-level review.
            evidence_claim_ids:
              - EC-004
              - EC-007
              - EC-015
            risk_ids:
              - R-002
