diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Current audited financial statements, management accounts, cash balances, debt, settlement reserves, and revenue by channel.
    why_it_matters: These records are required to assess solvency, quality of earnings, and whether FDA authorization can produce cash generation.
    suggested_source_or_request: CFO data room with audited statements, trial balance, monthly KPI pack, settlement reserve roll-forward, and liquidity model.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, liquidation preferences, debt, warrants, 409A reports, and secondary-transfer history.
    why_it_matters: Public valuation signals conflict by orders of magnitude, so ownership economics cannot be inferred.
    suggested_source_or_request: Corporate counsel and CFO cap-table package with waterfall model.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Full FDA marketing granted orders, conditions, labeling, post-market obligations, and product-change controls.
    why_it_matters: U.S. commercial scope depends on exact order conditions and compliance.
    suggested_source_or_request: Regulatory counsel PMTA/FDA correspondence binder.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Customer cohorts, adult-smoker verification, churn, repeat purchase, top retailer concentration, and channel margin.
    why_it_matters: Public pages show channel existence, not customer quality or revenue durability.
    suggested_source_or_request: Sales, CRM, ecommerce, retailer, and cohort dashboards.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.C
    missing_information: Marketing-control policies, youth-access incidents, retailer audit results, and survey methodology behind youth-use claims.
    why_it_matters: Youth-use and marketing history are central legal and reputational risks.
    suggested_source_or_request: Compliance audit binder, marketing approval workflow, retailer mystery-shop data, and CDC survey methodology reconciliation.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Patent docket, assignments, FTO opinions, patent-strength analysis, and license encumbrances.
    why_it_matters: Public patent notices do not establish enforceability, revenue coverage, or unencumbered rights.
    suggested_source_or_request: IP counsel docket and claim-chart package.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Current executive roster, org chart, headcount, attrition, retention grants, and critical hiring plan.
    why_it_matters: A regulated consumer-product company needs sufficient legal, quality, regulatory, and channel-compliance capacity.
