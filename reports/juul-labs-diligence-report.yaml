risk_register:
  - risk_id: R-001
    risk_title: Public valuation signals are materially contradictory
    risk_category: financial
    severity: critical
    likelihood: high
    description: CB Insights lists JUUL Labs at USD 12 billion, while Altria's disclosed stake fair value and 2023 exit point to a much lower public valuation signal.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - VII.D
    evidence_claim_ids:
      - EC-001
      - EC-008
    mitigation_or_diligence_request: Obtain cap table, financing documents, 409A reports, secondary-transfer data, debt schedule, and liquidation waterfall before assigning value.
  - risk_id: R-002
    risk_title: FDA authorization scope and compliance obligations may constrain operations
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: FDA records show improved authorization status in 2025, but only for specified products and subject to order conditions not fully visible in public sources.
    impacted_chapter_ids:
