      - VIII
    impacted_section_ids:
      - II.A
      - II.B
      - VI.B
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-020
    mitigation_or_diligence_request: Have tobacco regulatory counsel review full order letters, post-market obligations, PMTA files, product-change controls, and compliance calendar.
