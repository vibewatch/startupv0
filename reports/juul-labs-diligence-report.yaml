              - EC-010
              - EC-011
            risk_ids:
              - R-007
          - finding_id: VIII.D-F2
            finding: Altria's 2023 heated-tobacco IP license must be reviewed as a potential encumbrance on strategic alternatives.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-007
        hidden_risks:
          - Some assets may be licensed, challenged, expired, pledged, or insufficient to block competitors.
        evidence_gaps:
          - License agreements, patent-maintenance records, assignments, FTO opinions, invalidity analyses, and trademark oppositions.
        follow_up_questions:
          - Which patents and trademarks are core to authorized U.S. revenue, and which are subject to third-party licenses or challenges?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-010
          - EC-011
      - section_id: VIII.E
        title: Material contracts and commitments
        checklist_question_ids:
          - VIII.E.1
          - VIII.E.2
        summary: Public evidence does not disclose retailer, distributor, manufacturer, logistics, payment, age-verification, debt, or settlement contracts.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.E-F1
            finding: Material contracts are central to channel, compliance, manufacturing, financing, and legal-risk underwriting, but they are private.
            evidence_claim_ids:
              - EC-014
              - EC-015
            risk_ids:
              - R-005
              - R-006
        hidden_risks:
          - Change-of-control provisions, minimum purchase commitments, exclusivity, termination rights, and compliance indemnities may impair an investment or acquisition.
        evidence_gaps:
          - Contract list, top 20 agreements, change-of-control matrix, debt covenants, settlement agreements, and vendor risk reports.
        follow_up_questions:
          - What contracts require consent or accelerate obligations upon financing, sale, product-change, or regulatory event?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-014
          - EC-015
      - section_id: VIII.F
        title: Insurance, indemnities, and claims coverage
        checklist_question_ids:
          - VIII.F.1
          - VIII.F.2
        summary: Public sources reviewed did not disclose insurance programs, claim notices, coverage disputes, retentions, exclusions, or recoveries.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.F-F1
            finding: Insurance recoverability is critical because public sources indicate large historical legal exposure, but coverage details are private.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-006
        hidden_risks:
          - Youth-marketing, regulatory, intentional-conduct, or product-liability exclusions may reduce insurance value.
        evidence_gaps:
          - Insurance towers, policies, claim notices, reservation-of-rights letters, coverage litigation, and recovery assumptions.
        follow_up_questions:
          - Which settlement and litigation costs are insured, self-insured, disputed, or excluded?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-018
      - section_id: VIII.G
        title: Regulatory compliance and restricted-product obligations
        checklist_question_ids:
          - VIII.G.1
          - VIII.G.2
        summary: FDA authorization for specified products is the most favorable public legal development, but restricted-product compliance remains a gating diligence area.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: VIII.G-F1
            finding: FDA public marketing-order records independently verify 2025 marketing granted orders for specified JUUL products.
            evidence_claim_ids:
              - EC-007
              - EC-020
            risk_ids:
              - R-002
          - finding_id: VIII.G-F2
            finding: The FDA record and JUUL's public policy page show a narrow regulated-product posture, not blanket authorization for all future products or claims.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-020
            risk_ids:
              - R-002
        hidden_risks:
          - Noncompliant labeling, unauthorized product changes, youth access, or post-market study failures could jeopardize authorization.
        evidence_gaps:
          - Complete FDA orders, compliance calendar, responsible-person matrix, adverse-event reports, inspections, and post-market study progress.
        follow_up_questions:
          - What controls prevent sales, claims, packaging, or product changes outside the exact FDA-authorized scope?
        table_ids: []
        figure_ids:
          - F-009
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-020

