executive_summary:
  overall_assessment: "Carta passed the public-source eligibility screen for this report: public sources show active operations, large private-market scale and valuation references above $1B, while no verified IPO, acquisition or shutdown was found in reviewed sources. The diligence profile is high-potential but high-trust-sensitivity: Carta appears to have scaled revenue/ARR and a broad private-capital platform, yet financial statements, current cap table, retention, product margins, legal exposure and data-governance evidence remain private."
  investment_or_diligence_thesis: Underwrite Carta only if data-room materials substantiate durable ARR growth, improving gross margins in fund administration/legal services, low churn after the 2024 trust incident, strong security/data governance, clean regulatory/legal exposure and a current capitalization that supports attractive risk-adjusted ownership despite valuation compression from prior peaks.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Active operations and unicorn/private eligibility are supported by current company pages plus 2021 and 2024 independent valuation references.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
        - EC-028
    - founder_claim_id: FC-003
      summary: Carta publicly offers broad Equity Suite, Fund ERP, transfer-agent and Carta Law products.
      evidence_claim_ids:
        - EC-006
        - EC-008
        - EC-009
        - EC-011
    - founder_claim_id: FC-002
      summary: Company-controlled sources claim 50,000+ companies, large security-holder/equity-holder scale and recognizable customer/fund logos.
      evidence_claim_ids:
        - EC-001
        - EC-010
        - EC-013
        - EC-014
    - founder_claim_id: FC-005
      summary: Security/trust pages list encryption, least privilege, logging, DR/BCP, audits, pen testing and AI data-use constraints.
      evidence_claim_ids:
        - EC-012
        - EC-015
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: Audited financials, cash runway, margins and product economics are not public.
    - risk_id: R-002
      summary: Valuation compression from public high marks to a reported possible $2B secondary and private preference stack.
    - risk_id: R-008
      summary: Customer-data conflict/trust risk after Linear/CartaX allegations and secondary-trading exit.
    - risk_id: R-010
      summary: SEC transfer-agent and Carta Law regulatory footprint requires specialist review.
    - risk_id: R-012
      summary: Reputational/employment litigation overhang could affect retention and sales.
    - risk_id: R-011
      summary: AI and sensitive KYC/financial data governance require technical/legal validation.
  key_evidence_gaps:
    - Audited financial statements, management accounts, revenue recognition, product-level gross margins, burn and cash runway.
    - Current cap table, financing documents, liquidation preferences, option pool, debt/warrants, 409A and secondary-sale close/price details.
    - Top customers, active definitions, ARR concentration, GRR/NRR, churn, support quality and trust-incident impact.
    - SOC/ISO reports, pen tests, access logs, incident history, AI governance, data maps, DPAs and subprocessor details.
    - Regulatory correspondence/exams, litigation dockets, employment matters, settlements/reserves and insurance coverage.
    - Sales funnel, CAC/payback, quota productivity, discounting, partner economics and acquisition integration metrics.
  recommended_next_steps:
    - Reconfirm immediately before any committee decision that Carta has not IPO’d, been acquired or shut down.
    - "Request CFO package: audited financials, management accounts, KPI dashboard, product-level P&L, board plan and cash/debt schedule."
    - Request cap table and financing package with preference/waterfall analysis and secondary-sale documents.
    - Run customer diligence across active, churned and competitor-migrated customers after the 2024 trust incident.
    - Have securities, privacy, employment and UK legal-regulatory counsel review registrations, dockets, incidents and insurance.
    - Conduct security/AI technical review of SOC/ISO reports, access logs, model governance and data-use controls.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources support Carta as an active private unicorn with meaningful revenue/ARR scale, but audited financial statements, capitalization, projections, margin, cash runway and valuation support are not public.
    founder_claim_ids:
      - FC-001
      - FC-007
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-028
    risk_ids:
      - R-001
      - R-002
      - R-003
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A
        summary: Carta discloses company-controlled ARR and press/analyst estimates exist, but no audited statements or management accounts were public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources cite $380M 2023 revenue, Sacra-estimated $442M 2024 ARR and Carta-stated $500M ARR crossed in 2025.
            evidence_claim_ids:
              - EC-001
              - EC-003
              - EC-004
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: No public balance sheet, cash flow, burn, backlog, AR aging, deferred revenue or tax package was found.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-001
        hidden_risks:
          - ARR/revenue scale could mask weak gross margin, services-heavy delivery costs, burn or debt.
        evidence_gaps:
          - Audited financials, management accounts, revenue recognition memo, cash runway, debt, tax positions and KPI dashboards.
        follow_up_questions:
          - Provide audited statements, monthly management accounts, KPI dashboard, budget-vs-actuals and cash/debt schedules.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-003
          - EC-004
          - EC-005
      - section_id: I.B
        title: Financial projections
        checklist_question_ids:
          - I.B
        summary: No board-approved forecast, pipeline-backed model or downside case was publicly available.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Public product breadth suggests multiple growth levers across Equity Suite, Fund ERP and Carta Law.
            evidence_claim_ids:
              - EC-006
              - EC-009
              - EC-011
            risk_ids:
              - R-003
          - finding_id: I.B-F2
            finding: Public pricing and GTM evidence do not reveal CAC, payback, NRR, sales capacity or margin assumptions.
            evidence_claim_ids:
              - EC-007
              - EC-030
            risk_ids:
              - R-005
        hidden_risks:
          - Forecast may rely on unproven AI/legal/fund-admin margin expansion or rebound in private-market fundraising.
        evidence_gaps:
          - Three-year plan, assumptions, pipeline, scenario cases, hiring plan, product-level P&L and board materials.
        follow_up_questions:
          - Provide board-approved plan with SKU/segment/geography build and downside liquidity cases.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-009
          - EC-011
          - EC-030
      - section_id: I.C
        title: Capital structure
        checklist_question_ids:
          - I.C
        summary: Historical financing and valuation references are public, but current cap table, preference stack and current common value are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: 2021 Series G at $7.4B and reported possible 2024 $2B secondary support unicorn eligibility and valuation compression.
            evidence_claim_ids:
              - EC-002
              - EC-003
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: Public-source screen found no verified IPO, acquisition or shutdown in reviewed sources; final confirmation is still required.
            evidence_claim_ids:
              - EC-028
            risk_ids:
              - R-002
        hidden_risks:
          - Structured preferences, secondary discounts or employee liquidity pressure could materially affect common equity value.
        evidence_gaps:
          - Current cap table, financing docs, 409A, secondary close status, debt/warrants/options and investor rights.
        follow_up_questions:
          - Provide full capitalization and financing package; confirm no pending IPO/acquisition/shutdown event.
        table_ids:
          - T-001
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-028
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D
        summary: Public reporting highlights valuation pressure, 2023 loss estimate and secondary-business exit; accounting/tax policies and product economics remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: TechCrunch reported $65M 2023 loss and fund-admin gross-margin issues, creating margin/quality diligence priorities.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-001
              - R-003
          - finding_id: I.D-F2
            finding: Ward-reported business-line revenue approximations show cap table and fund admin were materially larger than secondary trading before the exit.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-003
              - R-011
        hidden_risks:
          - Fund administration and legal services may carry lower software margins and professional-liability exposure.
        evidence_gaps:
          - Revenue recognition, tax policies, segment gross margin, professional-services utilization and acquisition accounting.
        follow_up_questions:
          - Provide product-level P&L, tax/accounting memos and board materials on secondary-business shutdown.
        table_ids:
          - T-002
          - T-003
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-005
          - EC-019
