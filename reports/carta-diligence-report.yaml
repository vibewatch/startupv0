report_metadata:
  report_title: Carta Diligence Research Report
  target_company: eShares, Inc. dba Carta, Inc.
  website: https://carta.com/
  known_aliases:
    - Carta
    - Carta, Inc.
    - eShares, Inc.
    - eShares
    - Carta Law
    - CartaX
  sector: Financial technology / private-capital infrastructure / equity management / fund administration
  geography: United States headquarters; public locations in the United States, Canada, Brazil, United Kingdom and Denmark
  company_stage: Late-stage private unicorn
  research_date: 2026-05-20
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public sources only
    - Company-controlled pages for active status, products, pricing, customer logos, security, privacy and management
    - Independent technology/local press for valuation, financial estimates, trust incidents and litigation/culture allegations
    - Competitor public pages for market map and substitution risk
    - USPTO trademark records from public TSDR references, with counsel refresh required
  included_jurisdictions:
    - United States
    - United Kingdom
    - European Union / Europe where product pages reference expansion or offices
    - Canada and Brazil where Carta lists locations
  excluded_topics:
    - Non-public audited financial statements and management accounts
    - Private cap table, financing documents and investor rights
    - Management interviews, customer calls and employee references
    - Contracts, bank/payment/vendor agreements and protected trust-center artifacts
    - Legal advice or counsel-reviewed docket conclusions
  user_provided_materials: []
