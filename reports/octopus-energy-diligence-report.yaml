executive_summary:
  overall_assessment: "Octopus Energy is eligible for public diligence as an active private unicorn candidate: Companies House lists the group as active and private, and public unicorn/funding sources support a multi-billion-dollar valuation screen. Public evidence supports operating scale, but investment reliance is blocked by private financial, customer, regulatory, cap-table and contract gaps."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The upside case depends on proving durable retail energy margins, Kraken platform economics, renewable-portfolio returns and regulatory resilience beyond public scale narratives.
  strongest_verified_claims:
    - founder_claim_id: FC-004
      summary: Companies House lists Octopus Energy Group Limited as active and private limited.
      evidence_claim_ids:
        - EC-002
        - EC-013
    - founder_claim_id: FC-003
      summary: Octopus publicly claims more than 10 million homes powered and a large renewable-generation footprint.
      evidence_claim_ids:
        - EC-003
        - EC-005
    - founder_claim_id: FC-002
      summary: Public materials support technology/platform positioning around Kraken and energy products.
      evidence_claim_ids:
        - EC-006
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, cap table and runway are private.
    - risk_id: R-002
      summary: Energy-market volatility and regulatory exposure may pressure margins.
    - risk_id: R-003
      summary: Kraken platform economics and concentration are not public.
  key_evidence_gaps:
    - Audited financials, cash/debt, hedging/collateral and KPI pack.
    - Cap table, preferences, investor rights and debt instruments.
    - Customer churn, bad debt, concentration and contract economics.
    - Kraken ARR, implementation economics, SLAs and incident history.
    - Regulatory correspondence, litigation and material contracts.
  recommended_next_steps:
    - Run financial and energy-market stress diligence before relying on valuation.
    - Request Kraken customer economics and top-licensee contracts.
    - Have counsel review Ofgem/FCA compliance, complaints and material contracts.
    - Review renewable project schedules, leverage, PPAs and returns.
