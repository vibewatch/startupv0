    figure_type: risk_heatmap
    description: Risk-register severity and likelihood.
    purpose: Prioritize follow-up diligence.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Private financial quality unverified
          severity: high
          likelihood: unknown
          rationale: Audited financials, unit economics, hedging, cash runway and financing terms are not public.
          evidence_claim_ids: &a27
            - EC-001
            - EC-008
          source_ids: &a26
            - SRC-002
            - SRC-003
            - SRC-005
        - risk_id: R-002
          label: Energy-market margin and working-capital volatility
          severity: high
          likelihood: medium
          rationale: Retail energy suppliers face wholesale price, price-cap, hedging, collateral and bad-debt exposure.
          evidence_claim_ids: &a28
            - EC-007
            - EC-012
          source_ids: *a26
        - risk_id: R-003
          label: Kraken platform execution and concentration
          severity: medium
          likelihood: medium
          rationale: Public Kraken account/licensee signals do not disclose ARR, service levels, implementation economics or licensee concentration.
          evidence_claim_ids: &a29
            - EC-006
          source_ids: *a26
        - risk_id: R-004
          label: Renewable generation project exposure
          severity: medium
          likelihood: medium
          rationale: Public renewable-project claims do not disclose project leverage, PPA terms or returns.
          evidence_claim_ids: &a30
            - EC-005
          source_ids: *a26
        - risk_id: R-005
          label: Customer concentration and churn unknown
          severity: medium
          likelihood: unknown
          rationale: Homes/accounts metrics do not disclose revenue concentration, churn, bad debt or cohort economics.
          evidence_claim_ids: &a31
            - EC-005
            - EC-008
          source_ids: *a26
        - risk_id: R-006
          label: Competition from incumbents and energy-tech rivals
          severity: medium
          likelihood: high
          rationale: Octopus competes with large utilities, price-comparison channels, renewable developers and energy software platforms.
          evidence_claim_ids: &a32
            - EC-009
          source_ids: *a26
