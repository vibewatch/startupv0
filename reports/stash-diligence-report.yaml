risk_register:
  - risk_id: R-001
    risk_title: Public financial opacity and unaudited performance claims
    risk_category: financial
    severity: high
    likelihood: high
    description: Stash discloses scale, profitability, margin, and financing claims, but audited financials, revenue, net income, cash, debt, burn, CAC, churn, and EBITDA reconciliation are not public.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
      - V.E
    evidence_claim_ids:
      - EC-003
      - EC-008
      - EC-009
      - EC-019
    mitigation_or_diligence_request: Request audited financials, monthly KPI pack, EBITDA bridge, cohort economics, revenue-recognition policy, cash runway, and debt/liability schedules.
  - risk_id: R-002
    risk_title: High regulatory complexity across advice, brokerage, banking access, rewards, crypto history, and AI
    risk_category: regulatory
    severity: high
    likelihood: high
    description: Stash's public disclosures show RIA, broker-dealer, banking-partner, Stock-Back securities rewards, crypto history, and AI-personalized advice surfaces that require specialist compliance review.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.A
      - VIII.G
    evidence_claim_ids:
      - EC-006
      - EC-012
      - EC-020
    mitigation_or_diligence_request: Conduct SEC/FINRA/state/banking-partner regulatory diligence, including exams, complaints, marketing reviews, Form ADV/CRS, AI supervision, and Stock-Back disclosures.
  - risk_id: R-003
    risk_title: Partner and operational dependency
    risk_category: operational
    severity: high
    likelihood: medium
    description: Stash relies on external partners for banking, card issuance/licensing, clearing/custody, insurance benefits, Stockpile transition, and likely technology functions not fully visible publicly.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.B
      - III.E
      - VIII.F
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-011
      - EC-020
    mitigation_or_diligence_request: Review contracts, SLAs, termination rights, audit reports, incident history, vendor-risk assessments, fourth-party dependencies, and contingency plans.
  - risk_id: R-004
    risk_title: Competitive pressure and customer acquisition economics
    risk_category: market
    severity: medium
    likelihood: high
    description: Public competitor pages show overlap from Acorns, Robinhood, SoFi, Betterment, and Chime across investing, automated advice, banking, rewards, and primary financial relationship.
    impacted_chapter_ids:
      - III
      - IV
      - V
    impacted_section_ids:
      - III.A
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-014
      - EC-015
      - EC-016
      - EC-017
      - EC-018
    mitigation_or_diligence_request: Request CAC/payback, channel mix, price elasticity, win/loss, churn reason, direct-deposit ownership, and competitor overlap studies.
  - risk_id: R-005
    risk_title: AI advice suitability and model governance
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Stash reports AI engagement and discloses AI Money Coach recommendations as personalized investment advice, but public materials do not show model-risk controls or suitability testing.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids:
      - EC-003
      - EC-006
      - EC-013
      - EC-020
    mitigation_or_diligence_request: Review AI governance, model cards, prompt/response logs, suitability test cases, escalation paths, disclosures, complaint review, and regulatory correspondence.
  - risk_id: R-006
    risk_title: Management transition, co-CEO governance, and staffing capacity
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public releases show co-founders returning as co-CEOs after a period with Liza Landsman as CEO, but full org design, turnover, compensation, and control-function staffing are private.
