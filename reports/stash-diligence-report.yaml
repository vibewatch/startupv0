          - VIII.G.1
        summary: >-
          Public evidence verifies regulated-entity status and high regulatory surface area, but not exam results, deficiency letters, consent orders, complaints, or enforcement history.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F-001
            finding: Stash publicly discloses an SEC-registered investment adviser, a broker-dealer, FINRA/SIPC relationships, non-bank status, Stride Bank banking services, and investment products that may lose value.
            evidence_claim_ids:
              - EC-006
              - EC-020
            risk_ids:
              - R-002
          - finding_id: VIII.G-F-002
            finding: Stash's prior crypto access was powered by Apex Crypto and explicitly disclosed that crypto was not FDIC or SIPC insured.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
          - finding_id: VIII.G-F-003
            finding: Stash states AI Money Coach and Diversification Analysis recommendations are personalized investment advice, creating explicit advisory-compliance implications.
            evidence_claim_ids:
              - EC-006
              - EC-020
            risk_ids:
              - R-005
        hidden_risks:
          - Regulatory findings, complaint trends, arbitration, marketing-review issues, rewards disclosures, and AI-advice suitability may be material but non-public.
        evidence_gaps:
          - SEC/FINRA exam history, regulatory correspondence, Form ADV/CRS support files, complaint logs, arbitration history, marketing-review files, and AI supervision records.
        follow_up_questions:
          - Provide all SEC, FINRA, state, banking-partner, and consumer-protection exam findings and remediation status since 2021.
        table_ids:
          - T-016
          - T-018
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-006
          - EC-012
          - EC-020

