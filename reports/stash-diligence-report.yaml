report_metadata:
  report_title: Stash Public-Source Startup Diligence Report
  target_company: Stash
  website: https://www.stash.com/
  known_aliases:
    - Stash Financial, Inc.
    - Stash Investments LLC
    - Stash Capital LLC
    - StashWorks
    - Stock-Back Card
    - AI Money Coach
  sector: Consumer fintech, investing, banking-adjacent financial wellness, robo-advice, and workplace benefits
  geography: United States, headquartered in New York
  company_stage: Late-stage private fintech unicorn
  research_date: 2026-05-14
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the covered-report slug list from repository files and excluded existing Anthropic, ByteDance, Databricks, OpenAI, and SpaceX reports.
    - Fetched a public unicorn list from Wikipedia, normalized candidate slugs, randomly selected Stash from uncovered candidates with shuf, and checked public evidence that Stash remains private and operating.
    - Prioritized Stash-owned pages for product, pricing, financing, executive, regulatory, disclosure, careers, and acquisition/transition evidence.
    - Supplemented company evidence with PR Newswire for the 2021 Series G valuation and public competitor pages for market positioning.
    - Treated company-reported AUM, subscriber, profitability, and AI engagement metrics as management assertions unless independently corroborated.
  included_jurisdictions:
    - United States
  excluded_topics:
    - Private audited financial statements, bank statements, cap table, debt instruments, board minutes, revenue cohort data, and customer-level records were unavailable.
    - No customer, supplier, investor, employee, or regulator interviews were performed.
    - Paid databases, paywalled pages, CAPTCHA-protected profiles, and inaccessible regulator PDFs were not bypassed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-14
      notes: The user asked for one random uncovered private unicorn diligence report and a draft pull request.

founder_claims:
  - founder_claim_id: FC-001
    claim_text: Stash is a private unicorn fintech with a latest public valuation above $1.4 billion.
    claim_source: Public unicorn list and 2021 Series G announcement
    claim_date: 2021-02-03
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-002
    contradiction_summary: Public sources support a $1.4 billion-plus valuation in 2021, but the 2025 Series H did not disclose a new valuation.
    diligence_follow_up:
