diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, revenue, EBITDA bridge, gross-margin methodology, cash, debt, burn, and runway.
    why_it_matters: Public profitability and gross-margin claims cannot be underwritten without financial-quality support.
    suggested_source_or_request: Request 2023-2025 audits, 2026 YTD financials, board KPI pack, bank statements, debt schedule, and revenue recognition memo.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, valuation, preference stack, option pool, SAFEs/notes, debt, and 409A history.
    why_it_matters: Public valuation is stale and later financing terms could change common-equity value and exit economics.
    suggested_source_or_request: Request cap table export, financing documents, investor side letters, debt/warrant documents, and waterfall model.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Cohort retention, ARPU, LTV/CAC, churn, assets per user, funded-account rate, complaint rate, and customer concentration.
    why_it_matters: Headline subscriber and account counts do not prove durable, profitable customer relationships.
    suggested_source_or_request: Request anonymized cohort KPI pack and customer reference/interview plan.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SEC/FINRA/state/bank-partner exams, deficiency letters, complaints, arbitrations, marketing reviews, AI-advice controls, and crypto legacy remediation.
    why_it_matters: Regulatory exposure is one of the highest-risk diligence areas for this business model.
    suggested_source_or_request: Request regulatory correspondence, exam reports, complaint logs, arbitration schedule, compliance policies, and AI governance records.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material partner contracts and vendor risk assessments for Stride, Apex, Mastercard, Avibra, Stockpile, cloud, KYC/fraud, and AI/model providers.
    why_it_matters: Partner termination, repricing, service failure, or compliance breach could disrupt core product functions.
    suggested_source_or_request: Request executed contracts, amendments, SLAs, SOC reports, vendor due-diligence files, and contingency plans.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Functional org chart, hiring plan, attrition, compensation, equity plan, and control-function capacity.
    why_it_matters: Stash appears lean relative to a broad regulated AI-enabled product surface.
    suggested_source_or_request: Request HRIS export, org chart, open roles, attrition data, compensation plan, and equity plan.
    priority: medium

