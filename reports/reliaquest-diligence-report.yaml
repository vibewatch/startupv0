risk_register:
  - risk_id: R-001
    risk_title: Valuation and financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: ReliaQuest's headline valuation is public, but audited financials, cash runway, revenue recognition, debt, and preference stack are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Request audited financials, management accounts, KPI bridge, cash/debt schedules, cap table, and financing documents.
  - risk_id: R-002
    risk_title: Customer concentration and revenue quality unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public sources do not disclose customer-level revenue, churn, gross retention, backlog, or renewal cohorts for ReliaQuest.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a43
    mitigation_or_diligence_request: Request top-customer revenue, contracts, renewal schedules, cohort retention, pipeline conversion, and independent customer references.
  - risk_id: R-003
    risk_title: AI SecOps efficacy and cybersecurity platform risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: GreyMatter performance claims, agentic AI accuracy, telemetry normalization, and response automation must be independently validated because customer security outcomes are mission-critical.
    impacted_chapter_ids:
      - II
      - IV
      - VI
    impacted_section_ids:
      - II.A
      - IV.A
      - VI.B
    evidence_claim_ids: *a44
    mitigation_or_diligence_request: Run product, architecture, roadmap, security, performance, and win/loss diligence with customer references.
  - risk_id: R-004
    risk_title: Sensitive telemetry, privacy, and cybersecurity liability exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: ReliaQuest handles enterprise security telemetry and incident-response workflows, creating privacy, breach, contractual liability, and sector-specific compliance exposure.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a45
    mitigation_or_diligence_request: Have counsel review regulatory licenses, data/privacy controls, compliance incidents, contracts, insurance, and pending matters.
  - risk_id: R-005
    risk_title: Management, hiring, and key-person dependency
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public leadership information exists, but full org design, attrition, compensation, succession, and key-person dependency are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.G
    evidence_claim_ids: *a46
    mitigation_or_diligence_request: Request org chart, HRIS headcount history, attrition, offer acceptance, compensation, option plans, and succession plans.
  - risk_id: R-006
    risk_title: Integration, telemetry, and security-tool ecosystem dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: GreyMatter depends on integrations with customer SIEM, endpoint, identity, email, network, cloud and OT tools; integration quality and vendor API changes can affect outcomes.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - VIII.F
    evidence_claim_ids: *a47
    mitigation_or_diligence_request: Request supplier contracts, platform dependency mapping, resilience testing, insurance coverage, and incident history.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements and management accounts
    why_it_matters: Needed to verify revenue, margins, cash burn, debt, and revenue recognition.
    suggested_source_or_request: Request audited statements, monthly management accounts, trial balance, bank/debt schedules, and accounting policies.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table and financing terms
    why_it_matters: Headline valuation can differ materially from common-equity economics.
    suggested_source_or_request: Request fully diluted cap table, preferred terms, SAFEs/notes, warrants/options, side letters, and board approvals.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer-level revenue and retention
    why_it_matters: Public customer logos do not verify concentration, churn, or contract quality.
    suggested_source_or_request: Request top customer revenue, ARR/NRR cohorts, contracts, invoices, renewal dates, and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity and pipeline
    why_it_matters: CAC payback, sales cycle, quota attainment, and pipeline quality are not public.
    suggested_source_or_request: Request sales capacity model, pipeline report, win/loss data, channel attribution, and commission plans.
    priority: medium
  - gap_id: G-005
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, attrition, compensation, and equity plans
    why_it_matters: Team scale and retention risk cannot be evaluated from public bios alone.
    suggested_source_or_request: Request HRIS export, attrition, open roles, compensation bands, benefit plans, and stock incentive plans.
    priority: medium
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Legal, regulatory, privacy, insurance, and incident records
    why_it_matters: Public sources do not clear litigation, regulatory, IP, privacy, or insurance exposures.
    suggested_source_or_request: Request counsel memo, docket/lien searches, insurance policies, IP assignments, privacy assessments, and incident logs.
    priority: high
