evidence_claims:
- evidence_claim_id: EC-001
  claim_text: Teamworks markets itself as the Operating System for Sports, spanning
    talent acquisition, coordination, development and deployment across personnel,
    performance, coaching and operations workflows.
  verification_status: verified
  confidence: high
  source_ids:
  - SRC-001
  evidence_type: primary_company_source
  excerpt_or_observation: Homepage describes the OS for Sports and product categories
    around personnel, performance, coaching and operations.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-002
  claim_text: Teamworks publicly claims 7,000+ teams worldwide, 520+ collegiate athletic
    departments, 330 professional organizations and 65 leagues/governing bodies.
  verification_status: verified
  confidence: high
  source_ids:
  - SRC-001
  evidence_type: primary_company_source
  excerpt_or_observation: Homepage count block lists teams worldwide, collegiate departments,
    professional organizations and leagues/governing bodies.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-003
  claim_text: Teamworks' own about page states it was founded in 2006, has 485+ employees,
    $400M in funding, 17-country global presence and a 24x7x365 support squad.
  verification_status: verified
  confidence: high
  source_ids:
  - SRC-002
  evidence_type: primary_company_source
  excerpt_or_observation: About page business and global presence sections list these
    metrics.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-004
  claim_text: Teamworks lists Zach Maurides, Mitch Heath, Kyle Charters, Reed Shaffner,
    Anna Resman, James Coffos, Doug Fearing and Corey Richardson in senior leadership
    roles.
  verification_status: verified
  confidence: high
  source_ids:
  - SRC-002
  evidence_type: primary_company_source
  excerpt_or_observation: Leadership section lists founder/CEO, co-founder, CFO, CTO,
    COO, CSO, Chief Data Scientist and EVP Sales.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-005
  claim_text: Teamworks' careers page describes remote-first work, generous leave,
    health/dental/vision benefits, professional development budget and an SBJ Best
    Places to Work in Sports 2023 reference.
  verification_status: verified
  confidence: high
  source_ids:
  - SRC-003
  evidence_type: primary_company_source
  excerpt_or_observation: Careers page describes work model and benefits.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-006
  claim_text: Teamworks announced a $235M Series F led by Dragoneer at a $1B+ valuation,
    with proceeds for AI, product and data-science expansion; the financing included
    primary and secondary elements.
  verification_status: verified
  confidence: high
  source_ids:
  - SRC-004
  evidence_type: independent_news
  excerpt_or_observation: PR Newswire release states the amount, valuation threshold,
    lead investor, use of proceeds and transaction structure.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-007
  claim_text: CB Insights lists Teamworks as a Durham-founded 2006 company with Secondary
    Market/Alive status, $396.57M total raised, unicorn classification and four patents.
  verification_status: verified
  confidence: medium
  source_ids:
  - SRC-005
  evidence_type: market_database
  excerpt_or_observation: CB Insights profile metadata observed during research; access
    may be paywalled or partially restricted.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-008
  claim_text: The 2019 Series C release reported a $25M round led by Delta-v, more
    than $45M total funding, 3,000+ teams, 2,000+ Division I teams and adoption across
    nearly half of NFL/MLB/NHL/NBA teams.
  verification_status: verified
  confidence: medium
  source_ids:
  - SRC-006
  evidence_type: independent_news
  excerpt_or_observation: Business Wire release facts observed during public-source
    review.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-009
  claim_text: The 2022 Series D coverage reported a US$50M round led by Delta-v with
    investors including Seaport, General Catalyst, Teamworthy, Blossom Street, Afia
    and athlete investors, bringing total funding near US$100M.
  verification_status: partially_verified
  confidence: medium
  source_ids:
  - SRC-007
  evidence_type: independent_news
  excerpt_or_observation: SportsPro coverage summarized the round and investor set;
    verify final cap table with company documents.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-010
  claim_text: The 2023 Series E/ARMS announcement reported $65M led by Dragoneer,
    ARMS serving 400+ collegiate athletic departments and more than 6,000 sports organizations
    on Teamworks products.
  verification_status: verified
  confidence: high
  source_ids:
  - SRC-008
  evidence_type: independent_news
  excerpt_or_observation: PR Newswire Series E/ARMS release reports round, lead investor,
    ARMS footprint and organization count.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-011
  claim_text: Telemetry Sports acquisition announcement says Telemetry served about
