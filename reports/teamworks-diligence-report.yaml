  verification_status: verified
  confidence: high
  source_ids:
  - SRC-010
  evidence_type: primary_company_source
  excerpt_or_observation: Teamworks announcement describes Zelus team and customer
    coverage.
  last_checked: '2026-05-19'
- evidence_claim_id: EC-013
  claim_text: Sportlogiq acquisition announcement says Sportlogiq served 97% of NHL
