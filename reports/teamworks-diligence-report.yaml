executive_summary:
  overall_assessment: Teamworks is a credible, well-funded sports-technology platform
    with verified unicorn financing, broad public customer reach and meaningful AI/data
    acquisitions. The diligence posture is Track / proceed only with deeper data-room
    work because audited financials, customer revenue concentration, cap-table terms
    and legal/privacy exposure are not publicly verifiable.
  investment_or_diligence_thesis: If Teamworks converts its elite-sports footprint
    into integrated, high-retention multi-module ARR, it could be a category-defining
    vertical SaaS/data platform. The investability question is whether growth is organic,
    profitable and defensible after acquisition integration rather than primarily
    capital- and M&A-driven.
  strongest_verified_claims:
  - "$235M Series F at $1B+ valuation led by Dragoneer."
  - 7,000+ teams, 520+ collegiate departments, 330 professional organizations and
    65 leagues/governing bodies claimed on company homepage.
  - 485+ employees, $400M funding, 17 countries and senior leadership roster on Teamworks
    about page.
  - Zelus, Telemetry, Sportlogiq and PFF Enterprise acquisitions materially expand
    AI/data and sport-specific analytics assets.
  biggest_risks:
  - Unaudited financials and revenue-quality metrics are not public.
  - Customer concentration, renewal quality and revenue predictability are unknown
    despite broad logo counts.
  - Acquisition integration, data-rights/IP and Phillies/Zelus litigation may create
    operational and legal exposure.
  key_evidence_gaps:
  - Audited financial statements, QofE and ARR bridge.
  - Top-customer revenue, retention and renewal schedule.
  - Current cap table, preference stack and debt/contingent consideration.
  - Product-level ARR/gross margin and integration roadmap.
  - Active litigation files, privacy/security attestations and insurance coverage.
  recommended_next_steps:
  - Open financial, commercial, legal/IP, security/privacy and technical workstreams
    before valuation reliance.
  - Interview CFO/CTO/Chief Data Scientist/EVP Sales and leaders from acquired businesses.
  - Run customer calls across collegiate, pro, league/governing body and acquired-product
    cohorts.
  - Commission legal review of Phillies/Zelus, acquisition agreements, data licenses
    and privacy controls.
  - Reconcile public funding totals to fully diluted cap table and liquidation waterfall.
