  last_checked: '2026-05-19'
- evidence_claim_id: EC-015
  claim_text: Teamworks processes personal data in its services, states it is generally
    a processor for customer-controlled data, names AWS/Twilio/DocuSign/Gainsight
    among subprocessors, and includes children-under-13, FERPA, PCI DSS, CPRA and
