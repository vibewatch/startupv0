limitations:
- This report uses public sources only; no management interview, data room, customer
  calls or privileged legal review was performed.
- Private-company financials, customer revenue, cap table, debt, tax, insurance, material
  contracts and most HR metrics are not publicly verifiable.
- Some secondary legal and market-database sources may be paywalled, incomplete or
  updated after access; verify litigation and IP facts with counsel.
- Customer and team-count definitions differ across years and announcements; counts
  should not be treated as audited customer, ARR or retention metrics.
- Competitor examples and market-map positions are analytical aids, not a comprehensive
  market-share study.
