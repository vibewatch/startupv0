diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR/bookings, gross margin, cash/debt, AR aging, backlog, budget-to-actuals, and deferred revenue.
    why_it_matters: These records are required to underwrite revenue quality, margin, collectability, cash runway, and valuation support.
    suggested_source_or_request: Finance data room from CFO/accountants.
    priority: high
  - gap_id: G-002
    chapter_id: I
