  - founder_claim_id: FC-003
    claim_text: Calendly has public monetization through paid subscription tiers and enterprise packaging.
    claim_source: Company pricing page and 2021 TechCrunch financing article
    claim_date: 2026-05-30
    mapped_chapter_ids:
      - I
      - II
      - V
    mapped_section_ids:
      - I.A
      - II.A
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-003
      - EC-005
      - EC-018
    contradiction_summary: Public pricing confirms monetization paths, but realized ARR, discounts, churn, gross margin, CAC, payback, and net retention are not public.
    diligence_follow_up:
      - Request ARR by tier, cohort retention, gross margin, discounting, CAC/payback, bookings, and renewal waterfall.
  - founder_claim_id: FC-004
    claim_text: Calendly has customer, partner, and ecosystem traction.
    claim_source: Company homepage, about page, customer stories, security page, and public integrations/developer materials
    claim_date: 2026-05-30
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.B
      - V.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-006
      - EC-007
      - EC-008
      - EC-018
      - EC-020
    contradiction_summary: Public logos, usage metrics, and customer stories do not verify revenue concentration, contract value, retention, or independent satisfaction.
    diligence_follow_up:
      - Request top-customer ARR, renewal/churn cohorts, NRR, reference calls, contracts, and partner revenue contribution.
  - founder_claim_id: FC-005
    claim_text: Calendly shows team, R&D, and operating signals consistent with an active growth-stage company.
    claim_source: Leadership page, careers page, LinkedIn company page, release notes, developer site, and GitHub
    claim_date: 2026-05-30
    mapped_chapter_ids:
      - VI
      - VII
    mapped_section_ids:
      - VI.A
      - VII.B
      - VII.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-012
      - EC-021
    contradiction_summary: Public team and hiring evidence supports active operations but does not verify internal org design, attrition, compensation, or R&D budget.
    diligence_follow_up:
      - Request org chart, HRIS export, attrition, location mix, engineering roadmap, development budget, and key-person retention plan.
executive_summary:
  overall_assessment: Calendly is eligible for this report as an active private unicorn target. Public evidence confirms the calendly.com scheduling automation platform, a CB Insights $3B unicorn listing, and 2021 financing coverage at over $3B; however, core investment diligence remains unresolved because current financials, customer economics, cap table, contracts, and security/legal artifacts are private.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only. The public case supports a durable brand and distribution position in scheduling automation, but underwriting a $3B private-company valuation requires private proof of ARR growth, retention, gross margin, customer concentration, competitive win/loss, security posture, privacy exposure, and financing terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Calendly as a $3B United States / Atlanta Enterprise Tech unicorn and 2021 financing coverage independently describes a $350M round at over $3B.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Calendly's public site, product pages, release notes, developer site, and GitHub sample app show an active scheduling automation platform.
      evidence_claim_ids:
        - EC-004
        - EC-009
        - EC-010
    - founder_claim_id: FC-003
      summary: Public pricing shows Free, Standard, Teams, and Enterprise packaging with paid seat and enterprise price points.
      evidence_claim_ids:
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Current financial quality, valuation support, ARR, churn, gross margin, and cash runway are not public.
    - risk_id: R-002
      summary: Public customer logos and usage metrics do not reveal concentration, renewal health, or revenue quality.
    - risk_id: R-003
      summary: Scheduling is exposed to competitive pressure from specialized tools and bundled CRM/productivity suites.
  key_evidence_gaps:
    - Audited financial statements, ARR/bookings, gross margin, cash/debt, cap table, tax, and forecast model.
    - Customer-level ARR, renewal terms, NRR/churn cohorts, backlog, pipeline, and independent references.
    - Security reports, incident history, privacy DPIAs, DPA/subprocessor review, and legal docket/counsel memo.
    - Engineering roadmap, R&D spend, platform reliability, technical debt, and architecture review.
    - HRIS export, org chart, compensation plans, option pool, attrition, and key-person retention.
  recommended_next_steps:
    - Condition any investment work on private financial and customer data-room access before relying on the headline $3B valuation.
    - Conduct customer/reference calls and competitor win-loss interviews focused on enterprise retention, procurement, and bundling threats.
    - Have privacy/security counsel review CIPA/privacy litigation exposure, DPA terms, SOC/ISO reports, subprocessors, and AI/notetaker data flows.
    - Benchmark pricing and product differentiation against Cal.com, Doodle, Chili Piper, HubSpot, Microsoft Bookings, and other suite providers.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources support Calendly's unicorn valuation history and historical 2020 revenue/profitability statements, but current financial statements, cap table, debt, retention, and valuation support are private.
    founder_claim_ids:
      - FC-001
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-005
      - EC-018
      - EC-019
    risk_ids:
      - R-001
      - R-008
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public research found historical subscription-revenue and profitability statements from 2021 coverage, plus current public pricing, but no audited annual or quarterly statements, product gross margin, backlog, AR aging, or budget-to-actuals.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: TechCrunch reported historical 2020 subscription revenue and profitability, while current financial statements remain not publicly verifiable.
            evidence_claim_ids:
              - EC-003
              - EC-018
            risk_ids:
              - R-001
        hidden_risks:
          - Historical profitability may not reflect current growth investments, AI/product spend, discounting, churn, or macro demand.
          - No public AR aging or backlog evidence leaves collectability and revenue-recognition quality unresolved.
        evidence_gaps:
          - Audited financial statements, management accounts, ARR/bookings, revenue by product, gross margin, cash, debt, backlog, AR aging, and budget-to-actuals.
        follow_up_questions:
          - Provide audited financials, monthly KPI pack, ARR waterfall, product/geography gross margin, backlog, AR aging, cash/debt schedule, and budget-to-actual variance analysis.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-018
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: The public valuation anchor is visible, but projections, growth drivers, predictability, capex/working-capital needs, and financing assumptions require company records.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: CB Insights and financing coverage support a valuation screen, while forecast mechanics and current ARR growth are private.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-018
            risk_ids:
              - R-001
              - R-008
        hidden_risks:
          - A flat public $3B valuation marker through the CB Insights list may mask down-round, preference, secondary-sale, or stale-mark risk.
        evidence_gaps:
          - Three-year model, board plan, scenario sensitivities, pricing assumptions, net retention, CAC/payback, capex, and financing assumptions.
        follow_up_questions:
          - Provide the board-approved operating plan with downside/base/upside cases and bridge public $3B valuation to current ARR and rule-of-40 metrics.
        table_ids: []
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-018
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify key financing investors and founder role, but shares outstanding, ownership, preferences, options, warrants, notes, debt, and off-balance-sheet liabilities are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C-F1
            finding: OpenView and ICONIQ are public financing participants, but ownership percentages and terms require cap-table documentation.
            evidence_claim_ids:
              - EC-002
              - EC-019
            risk_ids:
              - R-008
        hidden_risks:
          - Preference stack, option-pool refresh, secondary liquidity, debt, and investor rights could materially affect common-equity outcomes.
        evidence_gaps:
          - Current cap table, stockholder list, option/warrant schedule, debt instruments, SAFE/note documents, and off-balance-sheet liabilities.
        follow_up_questions:
          - Provide the fully diluted cap table, all financing documents, side letters, secondary sale documents, debt agreements, and option-pool schedule.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-002
          - EC-019
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is partly public, but tax posture, accounting policies, revenue recognition, and debt/equity basis are not publicly available.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: The public financing record shows a 2021 $350M round and CB Insights unicorn listing; accounting and tax quality remain private.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-019
            risk_ids:
              - R-001
              - R-008
        hidden_risks:
          - SaaS revenue recognition, deferred revenue, sales-tax nexus, international transfer pricing, and tax-loss attributes cannot be assessed from public sources.
        evidence_gaps:
          - Tax returns, revenue recognition memo, deferred revenue schedule, financing basis, investor rights, and accounting policies.
        follow_up_questions:
          - Provide tax positions, revenue-recognition policy, deferred-revenue rollforward, and financing-history schedule with current basis by investor.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-019
  - chapter_id: II
    title: Products
    chapter_summary: Calendly publicly markets a broad scheduling automation platform with self-serve, team, enterprise, security, analytics, payments, AI/notetaker, contacts, and developer/API capabilities; cost structure, profitability, and roadmap economics are private.
    founder_claim_ids:
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-009
      - EC-010
      - EC-021
    risk_ids:
      - R-003
      - R-005
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public sources verify Calendly's active scheduling automation platform, pricing tiers, integrations, API/developer surface, and ongoing release activity; market share, product profitability, and roadmap economics require private diligence.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Calendly publicly describes scheduling, Notetaker, Contacts, Payments, admin/security, analytics, and integration/API capabilities.
            evidence_claim_ids:
              - EC-004
              - EC-009
              - EC-010
              - EC-021
            risk_ids:
              - R-005
          - finding_id: II.A-F2
            finding: Public pricing confirms Free, Standard, Teams, and Enterprise packaging but not realized margin or unit economics.
            evidence_claim_ids:
              - EC-005
              - EC-018
            risk_ids:
              - R-001
        hidden_risks:
          - New AI/notetaker and routing features may create incremental privacy, storage, model, support, and margin exposure.
          - Calendar/video/CRM/payment dependencies could constrain roadmap or reliability.
        evidence_gaps:
          - Product-level ARR, gross margin, attach rates, utilization, roadmap dates, technical debt, incident history, and support burden.
        follow_up_questions:
          - Provide product revenue by SKU, attach rates, gross margin, roadmap, reliability metrics, incident history, and architectural dependency map.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-009
          - EC-010
          - EC-021
  - chapter_id: III
    title: Customer Information
    chapter_summary: Calendly publicly claims large-scale usage and publishes customer logos/case stories, but customer-level revenue, concentration, retention, severed relationships, and supplier spend are not publicly verifiable.
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-004
      - EC-006
      - EC-007
      - EC-008
      - EC-018
      - EC-020
    risk_ids:
      - R-002
      - R-004
      - R-005
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public pages list customer logos and stories across sales, recruiting, education, customer service, nonprofit, and partner/API use cases, but not the top 15 customers by revenue.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Public customer stories and logos support broad use-case evidence, while top-customer revenue ranking is private.
            evidence_claim_ids:
              - EC-006
              - EC-008
              - EC-018
            risk_ids:
              - R-002
        hidden_risks:
          - Logo pages can overstate revenue quality if accounts are small, expired, discounted, or non-paying.
        evidence_gaps:
          - Top 15 customers by ARR and application for the last two fiscal years and year-to-date, including contract status and purchase timing.
        follow_up_questions:
          - Provide top-customer ARR, use case, product ownership, contract start/end dates, renewal status, NRR, and reference-call contacts.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-006
          - EC-008
          - EC-018
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public integration and developer materials show strategic ecosystem relationships with calendars, video conferencing, CRM, payments, ATS, and API partners, but revenue contribution and commercial terms are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Calendly publicly lists integrations with Zoom, Salesforce, Google Calendar, Slack, Microsoft Teams, HubSpot, Zapier, Greenhouse, Stripe, PayPal, Typeform, Intercom, and others.
            evidence_claim_ids:
              - EC-004
              - EC-020
            risk_ids:
              - R-005
        hidden_risks:
          - Third-party API changes or partnership conflicts could affect product reliability, lead routing, payments, or enterprise adoption.
        evidence_gaps:
          - Partner contracts, revenue sharing, uptime/SLA dependencies, API limits, and co-marketing obligations.
        follow_up_questions:
          - Provide strategic-partner agreements, integration dependency owners, API usage limits, incident history, and partner revenue contribution.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-020
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Public sources do not disclose revenue by customer or whether any customer accounts for 5% or more of revenue.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Customer concentration, renewal health, and revenue by account require private ARR and contract data.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-002
        hidden_risks:
          - Enterprise concentration, reseller dependence, or a large free-user base could materially affect valuation quality.
        evidence_gaps:
          - Revenue by customer, top-account contract values, renewal dates, churn/NRR, and accounts above 5% of revenue.
        follow_up_questions:
          - Provide revenue by customer and identify accounts exceeding 5% of revenue with renewal and expansion history.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-018
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public source reviewed disclosed material severed customer, partner, or supplier relationships in the last two years.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Severed relationships require management disclosure and churn/partner termination records.
            evidence_claim_ids:
              - EC-018
              - EC-020
            risk_ids:
              - R-002
        hidden_risks:
          - Lost enterprise customers or terminated integration partnerships may not be visible publicly.
        evidence_gaps:
          - Churned major-customer list, partner termination notices, supplier termination notices, and win/loss analysis.
        follow_up_questions:
          - Provide all material customer, partner, and supplier relationships severed or at risk in the last 24 months.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-018
          - EC-020
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public sources identify dependency categories such as cloud infrastructure, calendars, video conferencing, CRM, payment processors, and security profile sharing, but top suppliers and spend are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Calendly security materials reference a leading cloud infrastructure provider and Chargebee payment processing, while supplier concentration and agreements are not disclosed.
            evidence_claim_ids:
              - EC-007
              - EC-020
            risk_ids:
              - R-005
        hidden_risks:
          - A small number of cloud, calendar, CRM, payment, or security vendors may create outage, data, pricing, and contractual concentration risk.
        evidence_gaps:
          - Top supplier spend, agreements, SLAs, subprocessors, cloud architecture, and exit/contingency plans.
        follow_up_questions:
          - Provide top suppliers by spend, criticality, contract terms, SLAs, subprocessors, and operational continuity plans.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-020
  - chapter_id: IV
    title: Competition
    chapter_summary: Calendly has strong public brand/usage signals, but scheduling automation is crowded with specialist tools, open-source/product-led rivals, CRM and productivity suites, and vertical booking products.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-017
      - EC-024
    risk_ids:
      - R-003
      - R-005
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public competitor pages show alternatives across group polling, open-source scheduling, inbound GTM routing, free CRM scheduling, Microsoft 365 bookings, and vertical appointment booking; private win/loss and market-share data are required.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Doodle, Cal.com, Chili Piper, HubSpot, Microsoft Bookings, and Acuity/Squarespace publicly market overlapping scheduling or booking capabilities.
            evidence_claim_ids:
              - EC-017
              - EC-024
            risk_ids:
              - R-003
          - finding_id: IV.A-F2
            finding: Calendly's public differentiation centers on ease of use, integrations, enterprise security, and broad adoption, but durable moat is not publicly provable.
            evidence_claim_ids:
              - EC-004
              - EC-005
              - EC-007
              - EC-024
            risk_ids:
              - R-003
        hidden_risks:
          - Bundled Microsoft/HubSpot/Google-style features can pressure willingness to pay for a standalone scheduling subscription.
          - Open-source and low-price competitors can compress SMB seat pricing.
        evidence_gaps:
          - Win/loss, churn reasons, renewal concessions, market share, competitive pricing exceptions, and enterprise procurement feedback.
        follow_up_questions:
          - Provide competitor win/loss analysis, price-realization by segment, churn reasons, and customer references comparing suite alternatives.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-017
          - EC-024
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Calendly publicly uses product-led self-serve sign-up, transparent pricing, sales/demo motions, customer stories, content, integrations, and developer channels; CAC, pipeline, quotas, and sales productivity are private.
    founder_claim_ids:
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-006
      - EC-023
    risk_ids:
      - R-001
      - R-002
      - R-003
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: Public materials show self-serve sign-up, free tier, sales contact/demo CTAs, customer stories, integrations, content, and enterprise positioning; marketing budget and ROI are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: Public channels include free sign-up, paid plans, sales/demo motions, customer stories, developer docs, and integrations.
            evidence_claim_ids:
              - EC-005
              - EC-023
            risk_ids:
              - R-003
          - finding_id: V.A-F2
            finding: Public reach signals include 20M professionals, more than 100,000 organizations, 86% Fortune 500 usage, and more than 200M meetings, but these are not revenue metrics.
            evidence_claim_ids:
              - EC-004
              - EC-007
              - EC-023
            risk_ids:
              - R-002
        hidden_risks:
          - Product-led acquisition can hide low conversion, seat churn, or high sales-assist cost in enterprise upgrades.
        evidence_gaps:
          - Marketing spend, CAC, payback, lead-source conversion, pipeline, sales productivity, international channel mix, and partner-sourced revenue.
        follow_up_questions:
          - Provide CAC/payback by channel, funnel conversion, pipeline by segment, quota attainment, sales cycle, and marketing ROI.
        table_ids:
          - T-011
