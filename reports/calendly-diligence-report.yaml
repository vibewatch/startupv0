  - risk_id: R-003
    risk_title: Competitive pressure from specialists and bundled suites
    risk_category: market
    severity: high
    likelihood: high
    description: Doodle, Cal.com, Chili Piper, HubSpot, Microsoft Bookings, and similar tools publicly offer overlapping scheduling/booking/routing capabilities, creating pricing and bundling risk.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
