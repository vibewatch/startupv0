risk_register:
  - risk_id: R-001
    risk_title: Financial quality and current valuation support are private
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public sources confirm a $3B valuation history and historical revenue/profitability reports but do not disclose current ARR, growth, gross margin, churn, CAC, payback, cash, debt, forecast, or valuation bridge.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.A
      - V.C
      - V.D
      - V.E
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-005
      - EC-018
    mitigation_or_diligence_request: Require audited financials, ARR/bookings waterfall, retention cohorts, gross margin, cash/debt, forecast model, CAC/payback, and current valuation support before valuation reliance.
  - risk_id: R-002
    risk_title: Customer concentration and retention are unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public logos, stories, usage counts, and Fortune 500 claims do not show paid status, contract value, concentration, churn, renewal, or NRR.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids:
      - EC-004
      - EC-006
      - EC-008
      - EC-018
