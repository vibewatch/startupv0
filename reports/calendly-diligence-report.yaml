report_metadata:
  report_title: Calendly Startup Diligence Report
  target_company: Calendly, LLC
  website: https://calendly.com/
  known_aliases:
    - Calendly
    - Calendly, LLC
  sector: Scheduling automation and enterprise SaaS
  geography: United States / Atlanta, Georgia / global users
  company_stage: Private unicorn / growth-stage SaaS company
  research_date: 2026-05-30
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard diligence depth against public company-owned, third-party news/database, legal, privacy, professional-profile, developer, and competitor sources.
    - Confirmed the target as the scheduling automation company operating at https://calendly.com/ and screened for active/private status before writing the report.
    - Treated company-published customer, security, usage, and ranking statements as evidence of public claims, not as audited proof of financial or operating performance.
    - No private data room, audited financials, cap table, contracts, customer calls, SOC reports, board materials, HRIS data, or counsel memos were available.
  included_jurisdictions:
    - United States
    - California federal court public docket signals
    - Global privacy and customer markets referenced by public sources
  excluded_topics:
    - Non-public financial statements, tax records, board materials, cap table, customer contracts, security reports, employee agreements, and private legal advice.
    - Paywalled or access-controlled databases beyond publicly readable excerpts.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Calendly-only unicorn diligence report
      type: workflow_request
      date_received: 2026-05-30
      notes: The request supplied the CB Insights candidate facts and required a public-source YAML diligence report only.
