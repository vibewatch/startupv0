    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and valuation support
          severity: high
          likelihood: medium
          rationale: Public valuation and historical revenue do not prove current ARR, retention, margin, cash runway, or valuation support.
          evidence_claim_ids:
            - EC-001
            - EC-002
            - EC-003
            - EC-018
          source_ids:
            - SRC-001
            - SRC-011
            - SRC-012
        - risk_id: R-002
          label: Customer concentration and retention unknown
          severity: high
          likelihood: unknown
          rationale: Public customer logos and usage claims do not disclose top-account revenue, churn, or NRR.
          evidence_claim_ids:
            - EC-006
            - EC-008
            - EC-018
          source_ids:
            - SRC-004
            - SRC-006
        - risk_id: R-003
          label: Competitive/bundling pressure
          severity: high
          likelihood: high
          rationale: Public competitor pages show multiple direct and suite-based alternatives.
          evidence_claim_ids:
            - EC-017
            - EC-024
          source_ids:
            - SRC-022
            - SRC-023
            - SRC-024
            - SRC-025
            - SRC-026
        - risk_id: R-004
          label: Privacy/security/regulatory exposure
          severity: high
          likelihood: medium
          rationale: Calendly processes personal scheduling data and has public privacy/security/regulatory surfaces plus a prior dismissed privacy-related case.
          evidence_claim_ids:
            - EC-007
            - EC-013
            - EC-014
            - EC-015
            - EC-022
          source_ids:
            - SRC-005
            - SRC-016
            - SRC-017
            - SRC-019
            - SRC-020
        - risk_id: R-005
          label: Product dependency and commoditization
          severity: medium
          likelihood: high
          rationale: Product relies on third-party calendars, video, CRM, payments, APIs, and broad scheduling functionality that competitors can replicate or bundle.
          evidence_claim_ids:
            - EC-009
            - EC-010
            - EC-017
            - EC-020
          source_ids:
            - SRC-002
            - SRC-006
            - SRC-009
            - SRC-010
            - SRC-022
            - SRC-023
            - SRC-024
            - SRC-025
            - SRC-026
