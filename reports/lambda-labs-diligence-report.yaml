risk_register:
  - risk_id: R-001
    risk_title: Capex, power, and data-center execution risk
    risk_category: operational
    severity: high
    likelihood: high
    description: AI factories, Superclusters, and data-center leases create capital, delivery, power, cooling, and utilization risk.
    impacted_chapter_ids:
      - I
      - III
      - V
      - VIII
    impacted_section_ids:
      - I.B
      - III.E
      - V.A
      - VIII.C
    evidence_claim_ids:
      - EC-013
      - EC-018
    mitigation_or_diligence_request: Request site-level capex plan, leases, power agreements, utilization and deployment milestones.
  - risk_id: R-002
    risk_title: NVIDIA hardware and supply-chain concentration
    risk_category: operational
    severity: high
    likelihood: high
    description: Public product architecture and partner validation depend heavily on NVIDIA GPUs and ecosystem access.
    impacted_chapter_ids:
      - III
      - IV
      - VI
    impacted_section_ids:
      - III.E
      - IV.A
      - VI.A
    evidence_claim_ids:
      - EC-014
      - EC-016
    mitigation_or_diligence_request: Request GPU purchase commitments, allocation schedule, vendor diversification and failure scenarios.
  - risk_id: R-003
    risk_title: Customer concentration from hyperscaler-scale agreements
    risk_category: customer
    severity: high
    likelihood: medium
    description: A multibillion-dollar Microsoft agreement may dominate revenue, backlog, and bargaining power.
    impacted_chapter_ids:
      - III
      - V
      - I
    impacted_section_ids:
      - III.C
      - V.B
      - I.A
    evidence_claim_ids:
      - EC-013
    mitigation_or_diligence_request: Request top customer ARR/backlog, take-or-pay terms, cancellation rights and margin by customer.
  - risk_id: R-004
    risk_title: GPU cloud price compression
    risk_category: market
    severity: high
    likelihood: high
    description: Public GPU pricing can be benchmarked against self-serve competitors and cloud marketplaces; realized
      enterprise pricing is unknown.
    impacted_chapter_ids:
      - II
      - IV
      - I
    impacted_section_ids:
      - II.A
      - IV.A
      - I.B
    evidence_claim_ids:
      - EC-015
    mitigation_or_diligence_request: Request realized price per GPU-hour, utilization and gross margin by SKU/cohort.
  - risk_id: R-005
    risk_title: Financial quality and debt/runway opacity
    risk_category: financial
    severity: high
    likelihood: medium
    description: Large funding announcements do not reveal revenue quality, burn, covenants, lease obligations, or cap-table
      economics.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-006
    mitigation_or_diligence_request: Request audited financials, cash burn, debt schedule, covenants and full capitalization.
  - risk_id: R-006
    risk_title: Valuation uncertainty
    risk_category: financing
    severity: medium
    likelihood: high
    description: CB Insights and secondary reports provide valuation signals, while later financings lack public valuation
      disclosure.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-004
      - EC-025
    mitigation_or_diligence_request: Request latest 409A, preferred-stock terms, secondary trades and post-money capitalization.
  - risk_id: R-007
    risk_title: Historical trademark/IP ambiguity
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Court metadata shows a historical trademark case involving Lambda names; disposition was not verified publicly.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
    evidence_claim_ids:
      - EC-024
    mitigation_or_diligence_request: Request docket disposition, settlement/license terms, trademark schedule and assignments.
  - risk_id: R-008
    risk_title: Security/compliance claims need audit artifacts
    risk_category: technical
    severity: high
    likelihood: medium
    description: SOC/ISO claims are company-disclosed and material for enterprise AI workloads.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.F
    evidence_claim_ids:
      - EC-009
    mitigation_or_diligence_request: Review SOC 2 Type II, ISO certificates, pen tests, incident history and customer DPAs.
  - risk_id: R-009
    risk_title: Mission-critical SLA exposure
    risk_category: operational
    severity: high
    likelihood: medium
    description: Customer stories and supercluster claims imply mission-critical workloads where outages and node failures
      could be costly.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.A
      - VIII.F
    evidence_claim_ids:
      - EC-010
      - EC-012
    mitigation_or_diligence_request: Request uptime reports, incident postmortems, credits, node-failure logs and insurance coverage.
  - risk_id: R-010
    risk_title: Leadership transition and scaling risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public roster shows professional executives alongside founders, but role clarity, retention and board
      governance are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.C
      - VII.D
    evidence_claim_ids:
      - EC-021
      - EC-022
    mitigation_or_diligence_request: Request org chart, employment agreements, board minutes, succession plan and founder vesting.
  - risk_id: R-011
    risk_title: Environmental, utility, and permitting exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Large AI infrastructure creates power, cooling, interconnection, permitting and environmental diligence needs.
    impacted_chapter_ids:
      - VIII
      - III
    impacted_section_ids:
      - VIII.C
      - III.E
    evidence_claim_ids:
      - EC-018
    mitigation_or_diligence_request: Request permits, utility interconnects, environmental studies, water/cooling plans and power contracts.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, revenue bridge, gross margin, cash burn, and backlog by customer.
    why_it_matters: Public funding data cannot prove quality of revenue or runway.
    suggested_source_or_request: Request audited financials, management accounts, KPI pack, and board-approved plan.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, liquidation preferences, debt instruments, warrants, and option pool.
    why_it_matters: Headline valuation can diverge materially from common-equity economics.
    suggested_source_or_request: Request full capitalization export and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top customer revenue, churn, renewal status, and contract concentration.
    why_it_matters: Named customers or partners do not establish durable revenue.
    suggested_source_or_request: Request customer-level ARR/backlog and signed contract summaries.
    priority: high
  - gap_id: G-004
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, validation results, IP assignments, and open-source/SBOM review.
    why_it_matters: Technical defensibility and execution risk cannot be underwritten from marketing pages.
    suggested_source_or_request: Request roadmap, architecture review, patent schedule, and security/quality reports.
    priority: medium
  - gap_id: G-005
    chapter_id: VII
    section_id: VII.B
    missing_information: Current employee census, attrition, compensation, option refreshes, and key-person retention.
    why_it_matters: Scale-up and retention risk can be hidden in a private company.
    suggested_source_or_request: Request HR census, regretted-loss metrics, and employment agreements.
    priority: medium
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Lambda material contracts, indemnities, insurance, compliance reports, and litigation reserve details.
    why_it_matters: Public legal pages rarely disclose economic exposure or termination rights.
    suggested_source_or_request: Request counsel memo, contract abstracts, insurance policies, and regulator correspondence.
    priority: high
