executive_summary:
  overall_assessment: Eligible private unicorn with strong public financing and product evidence, but diligence hinges on
    financial quality, capital intensity, supplier/customer concentration and compliance artifacts.
  investment_or_diligence_thesis: Lambda offers direct exposure to AI compute demand; underwriting should focus on
    utilization, gross margins, power/GPU commitments, contract durability and cap-table economics.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Series C amount is corroborated by company announcement and SEC Form D.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: Public product pages verify Instances, 1-Click Clusters and Superclusters.
      evidence_claim_ids:
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: AI infrastructure capex and power execution.
    - risk_id: R-002
      summary: NVIDIA supply-chain concentration.
    - risk_id: R-003
      summary: Customer concentration from very large contracts.
  key_evidence_gaps:
    - Audited financials and revenue by product/customer.
    - GPU supply commitments, data-center leases and power contracts.
    - Cap table, debt, preferences and latest valuation support.
  recommended_next_steps:
    - Request full data-room financial and cap-table package.
    - Review customer and supplier contracts.
    - Complete technical/SOC/IP/legal diligence with counsel and infrastructure experts.
