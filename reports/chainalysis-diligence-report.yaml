    suggested_source_or_request: "CFO data room and auditor workpapers."
    priority: high
  - gap_id: "G-002"
    chapter_id: "I"
    section_id: "I.C"
    missing_information: "Cap table, preference stack, investor rights, options/warrants/SAFEs/notes, secondary transactions, and debt."
