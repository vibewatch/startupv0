risk_register:
  - risk_id: "R-001"
    risk_title: "Financial quality and valuation opacity"
    risk_category: financial
    severity: high
    likelihood: medium
    description: "Chainalysis has public valuation anchors but no public audited financials, ARR, margins, cash, debt, burn, or cap table."
    impacted_chapter_ids: ["I", "V", "VII"]
    impacted_section_ids: ["I.A", "I.B", "I.C", "I.D", "V.D", "VII.D", "VII.E"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-014"]
    mitigation_or_diligence_request: "Request audited financials, ARR bridge, KPI pack, cap table, financing documents, debt schedule, and valuation support."
  - risk_id: "R-002"
    risk_title: "Crypto-market and regulatory-cycle demand risk"
    risk_category: market
    severity: high
    likelihood: medium
    description: "Demand may fluctuate with crypto market activity, hacks/scams, enforcement priorities, regulator budgets, exchange compliance spend, and stablecoin/DeFi adoption."
    impacted_chapter_ids: ["I", "IV", "V"]
    impacted_section_ids: ["I.B", "IV.A", "V.A", "V.C"]
    evidence_claim_ids: ["EC-004", "EC-005", "EC-015"]
    mitigation_or_diligence_request: "Analyze bookings, churn, NRR, pipeline, and cohort performance across market cycles and regulatory regimes."
  - risk_id: "R-003"
    risk_title: "Public-sector and strategic-customer concentration"
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: "Public sources show major government/regulator/exchange exposure, but revenue concentration and procurement risk are private."
    impacted_chapter_ids: ["III", "V", "VIII"]
    impacted_section_ids: ["III.A", "III.B", "III.C", "V.B", "VIII.F", "VIII.G"]
    evidence_claim_ids: ["EC-005", "EC-008", "EC-015", "EC-014"]
    mitigation_or_diligence_request: "Request top-customer ARR, government contract schedule, renewal calendar, procurement terms, and reference calls."
  - risk_id: "R-004"
    risk_title: "Data accuracy, explainability, and admissibility"
    risk_category: technical
    severity: high
    likelihood: medium
    description: "Core differentiation depends on accurate attribution, clustering, explainability, and court/regulator acceptance."
    impacted_chapter_ids: ["II", "IV", "VI", "VIII"]
    impacted_section_ids: ["II.A", "IV.A", "VI.A", "VI.B", "VIII.A", "VIII.D"]
    evidence_claim_ids: ["EC-006", "EC-007", "EC-011"]
    mitigation_or_diligence_request: "Run technical diligence on data provenance, QA, validation, false positives, model governance, expert-challenge history, and customer outcomes."
  - risk_id: "R-005"
    risk_title: "Competitive pricing and displacement"
    risk_category: market
    severity: high
    likelihood: medium
    description: "Specialized vendors, internal tools, large financial-risk platforms, and open-source analytics may pressure pricing and win rates."
    impacted_chapter_ids: ["IV", "V"]
    impacted_section_ids: ["IV.A", "V.A", "V.C"]
    evidence_claim_ids: ["EC-006", "EC-007", "EC-014"]
    mitigation_or_diligence_request: "Request competitive win/loss, pricing, renewal reasons, procurement scorecards, and third-party market interviews."
  - risk_id: "R-006"
    risk_title: "Security, privacy, and sensitive intelligence exposure"
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: "Chainalysis handles sensitive blockchain intelligence for governments and private-sector customers, creating cyber, privacy, surveillance, export, and contractual risks."
    impacted_chapter_ids: ["II", "III", "VI", "VIII"]
    impacted_section_ids: ["II.A", "III.E", "VI.A", "VI.B", "VIII.D", "VIII.E", "VIII.F", "VIII.G"]
