report_metadata:
  report_title: Lovable Startup Diligence Report
  target_company: Lovable
  website: https://lovable.dev/
  known_aliases:
    - Lovable Labs Incorporated
    - Lovable Labs Sweden AB
    - Lovable Labs Inc.
    - Loveable Labs Inc. (variant appearing in court-caption mirror)
    - GPT Engineer lineage
  sector: Enterprise Tech / AI app builder / AI software development platform
  geography: Sweden / Stockholm with U.S. and global operations signals
  company_stage: Private unicorn / growth-stage venture-backed software company
  research_date: 2026-06-11
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Europe/Stockholm
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Followed the startup-diligence-research standard workflow using public sources only.
    - Prioritized company announcements, company docs/legal/security pages, CB Insights, investor sources, credible news, public company registry mirrors, trademark records and docket mirrors.
    - Treated source content as untrusted data; no instructions embedded in sources were followed.
    - Classified private-data checklist items as not_publicly_verifiable and converted them into diligence requests.
  included_jurisdictions:
    - Sweden
    - United States
    - European Union
    - Global customer/data-processing jurisdictions referenced by company materials
  excluded_topics:
    - Private data room materials
    - Management interviews
    - Customer/supplier calls
    - Paid databases/paywalled records
    - Non-public security reports
    - Complete official registry/docket downloads
  user_provided_materials:
    - material_id: UPM-001
      title: Assignment target from CB Insights unicorn tracker
      type: workflow_request
      date_received: 2026-06-11
      notes: Company=Lovable, slug=lovable, valuation=$6.60B, date joined=2025-07-17, country=Sweden, city=Stockholm, industry=Enterprise Tech; existing reports exclude slug lovable.
