risk_register:
  - risk_id: R-001
    risk_title: Financial quality and revenue durability are not public
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Headline ARR and usage metrics are public but audited financials, margins, retention, cash, debt and revenue-recognition policy are not public.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - V.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited/management financials, KPI pack, ARR bridge, gross margin, cash/debt, cohort retention and forecast model.
  - risk_id: R-002
    risk_title: Valuation step-up and private financing terms may carry hidden economics
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation increased from $1.8B Series A to $6.6B Series B within months, but preferences, secondary sales, option pool and dilution are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review financing documents, liquidation waterfall, option pool, debt/SAFE notes and current 409A/secondary pricing.
  - risk_id: R-003
    risk_title: Customer concentration, churn and contract quality are not public
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public testimonials and logos do not disclose account-level ARR, renewal terms, usage depth, concentration or churn.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request top-customer ARR, cohort retention/NRR, churn reasons, contract terms and independent customer references.
  - risk_id: R-004
    risk_title: AI-generated code may create security, quality and liability exposure
    risk_category: technical
    severity: high
    likelihood: medium
    description: Terms warn that AI output may contain errors and may not be unique or rights-free; security claims need artifact review.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.F
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Perform code-generation red-team, security review of sample apps, vulnerability/incident review and enterprise indemnity analysis.
  - risk_id: R-005
    risk_title: Third-party platform and model dependencies are material
    risk_category: operational
    severity: medium
    likelihood: high
    description: Lovable workflows depend on integrations and infrastructure such as GitHub, Supabase and third-party AI providers; supplier contracts and SLAs are private.
    impacted_chapter_ids:
      - II
      - III
      - VI
    impacted_section_ids:
      - II.A
      - III.E
      - VI.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review supplier contracts, model-provider terms, data-retention restrictions, outages, fallback strategy and gross-margin sensitivity.
  - risk_id: R-006
    risk_title: Intense competition in AI app-building and coding tools
    risk_category: market
    severity: high
    likelihood: high
    description: Cursor, Replit, Bolt, Vercel v0, Bubble and Webflow publicly target overlapping AI coding/app-building/no-code jobs.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Validate win/loss, switching costs, differentiation, pricing pressure, retention and competitor displacement by segment.
  - risk_id: R-007
    risk_title: Brand/IP risk remains despite resolved trademark matter
    risk_category: legal
    severity: medium
    likelihood: medium
    description: A trademark lawsuit was dismissed with prejudice, but settlement terms are private and trademark applications/status should be verified officially.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Pull complete PACER docket, settlement, USPTO/EUIPO files, patent/open-source scans and counsel IP opinion.
  - risk_id: R-008
    risk_title: Privacy, data-processing and enterprise compliance require artifact review
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Privacy/security pages reference GDPR and controls, but enterprise DPA, subprocessors, SOC details and incidents are not public.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request DPA, subprocessor list, SOC/ISO reports, DPIA, data maps, privacy notices, incident register and regulator correspondence.
  - risk_id: R-009
    risk_title: Rapid hiring and multi-location scaling may strain culture and execution
    risk_category: team
    severity: medium
    likelihood: high
    description: Careers page lists 76 roles across multiple geographies and functions, but actual headcount, attrition and management depth are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.G
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request HRIS roster, org chart, attrition, regretted loss, comp bands, offer acceptance and leadership hiring plan.
  - risk_id: R-010
    risk_title: Usage metrics are self-reported and may not map to monetizable engagement
    risk_category: product
    severity: medium
    likelihood: medium
    description: Large project/visit/user metrics are public but definitions, paid mix, repeat usage, quality and production deployments are not public.
    impacted_chapter_ids:
      - II
      - III
      - V
    impacted_section_ids:
      - II.A
      - III.A
      - V.C
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Audit analytics definitions, free-to-paid conversion, cohort engagement, project quality, deployment rate and retained paid teams.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, ARR bridge, margins, cash/debt, AR aging and revenue by product/channel/geography.
    why_it_matters: Headline valuation cannot be underwritten without revenue quality and cash/runway proof.
    suggested_source_or_request: Finance data room and management KPI pack.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, investor rights, preferences, debt/SAFE notes and entity/IP ownership chart.
    why_it_matters: Economic ownership and liquidation outcomes may differ from headline valuation.
    suggested_source_or_request: Corporate counsel financing files and cap-table export.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Generated-code quality, vulnerability rate, uptime, product adoption by module and gross margin by plan.
    why_it_matters: Product maturity and unit economics drive retention and enterprise suitability.
    suggested_source_or_request: Technical diligence sandbox, incident logs, telemetry and cost-to-serve files.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top customer ARR, concentration, retention/NRR, churn reasons and contract terms.
    why_it_matters: Public logos do not prove durable enterprise revenue.
    suggested_source_or_request: Customer cohort file, contracts and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend, model-provider terms, DPAs/SLAs and fallback plans.
    why_it_matters: Third-party AI/cloud dependencies affect margin, privacy and uptime.
    suggested_source_or_request: Supplier contract schedule and architecture review.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, switching costs, market share, pricing benchmarks and competitor displacement data.
    why_it_matters: The AI app-builder category is crowded and fast-moving.
    suggested_source_or_request: Sales/customer interviews and competitive CRM fields.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota attainment, sales cycle, pipeline conversion and channel attribution.
    why_it_matters: GTM scalability cannot be verified from public marketing claims.
    suggested_source_or_request: CRM and finance funnel exports.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D roadmap, model-provider contracts, development budget and security backlog.
    why_it_matters: Roadmap execution and margin/security risk are central to product defensibility.
    suggested_source_or_request: Product roadmap, engineering metrics and security backlog.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Actual headcount by function/location, attrition, comp bands, equity grants and hiring plan.
    why_it_matters: Rapid hiring can mask execution, culture and burn risk.
    suggested_source_or_request: HRIS export and compensation/equity files.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC/ISO reports, DPA, subprocessors, privacy incidents, regulator correspondence and insurance policies.
    why_it_matters: Enterprise AI app generation creates privacy, security, IP and liability exposure.
    suggested_source_or_request: Legal/security data room and counsel letter.
