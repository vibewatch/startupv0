executive_summary:
  overall_assessment: "Eligible for a public-source report: Lovable appears to be an active private unicorn, with CB Insights and company/news sources supporting a latest public $6.6B valuation. The business has strong public financing, product and usage signals, but financial quality, customer economics, technical/security assurance, cap-table economics and legal/privacy artifacts remain private diligence dependencies."
  investment_or_diligence_thesis: Proceed to confirmatory diligence rather than underwriting from public claims alone. Public evidence supports a real, fast-scaling AI app-builder with premium investors and meaningful usage/customer signals, while the key underwriting questions are ARR durability, paid conversion, margin under AI/cloud costs, customer retention, competitive defensibility, generated-code security/IP exposure and financing terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Lovable as a Sweden/Stockholm Enterprise Tech unicorn at $6.6B.
      evidence_claim_ids:
        - EC-001
        - EC-019
    - founder_claim_id: FC-002
      summary: Lovable publicly announced a $330M Series B at a $6.6B valuation.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Company docs verify Lovable’s natural-language full-stack app-builder, GitHub sync and Supabase backend integration claims.
      evidence_claim_ids:
        - EC-008
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, retention, margins and runway are not public.
    - risk_id: R-006
      summary: Competition is intense across AI coding agents, prompt-to-app builders and no-code platforms.
    - risk_id: R-004
      summary: AI-generated code/security/IP output risk requires technical and legal artifact review.
  key_evidence_gaps:
    - Audited financials, ARR bridge, margins, cash/debt, forecasts and cap table.
    - Top-customer ARR, retention/churn, contract terms, concentration and references.
    - Technical review of generated-code quality, security defaults, incident history and model/cloud costs.
    - SOC/ISO reports, DPA/subprocessor list, insurance, counsel litigation/IP files and material contracts.
    - HRIS headcount, attrition, compensation/equity plans and leadership/org depth.
  recommended_next_steps:
    - Run finance/cap-table diligence before relying on the $6.6B valuation.
    - Run customer diligence on retention, paid conversion and enterprise contract depth.
    - Run technical/security/legal diligence on generated apps, data processing, model providers and IP/AI-output terms.
    - Benchmark win/loss and pricing against Cursor, Replit, Bolt, v0, Bubble and Webflow.
