executive_summary:
  overall_assessment: Olist appears eligible for this run as a still-private unicorn target based on the current CB Insights unicorn-list row and active public operating pages. Public evidence supports product/activity and selected demand/team signals, but core investment diligence remains unresolved because financials, cap table, retention, contracts, legal/compliance records and management materials are private.
  investment_or_diligence_thesis: Olist has credible public product breadth and customer-volume signals, but diligence must validate revenue quality, take rate, credit/payment risk, merchant retention, unit economics and integration complexity behind the headline unicorn valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Olist as a $1.50B unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company/public sources verify active product positioning for Olist.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-005
      summary: Public R&D, hiring or team signals indicate an active operating profile.
      evidence_claim_ids:
        - EC-007
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Brazil SMB commerce exposure creates macro, credit, tax and payments-regulatory risk
    - risk_id: R-002
      summary: Product-suite breadth may mask integration complexity, support cost and margin dispersion
    - risk_id: R-003
      summary: Public customer metrics do not disclose ARR, churn, take rate, margin or concentration
  key_evidence_gaps:
    - Audited financials, ARR/bookings bridge, gross margin, cash, debt, burn and forecast model.
    - Cap table, preferences, option pool, warrants/notes/debt and financing documents.
    - Top customer/user/patient cohorts, revenue concentration, churn, NRR, contracts and reference calls.
    - CAC, payback, channel mix, quota attainment, sales cycle and pipeline quality.
    - Legal, regulatory, privacy/security, IP, insurance and material-contract schedules.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on the headline valuation.
    - Request cap table and financing documents to model downside preference stack and dilution.
    - Validate demand quality through cohorts, contracts, references and support metrics.
    - Have counsel review regulatory, privacy, security, IP, insurance and material contracts.
    - Benchmark product and pricing against competitors using buyer references and win/loss data.
