risk_register:
  - risk_id: R-001
    risk_title: Financial quality and valuation bridge are not public
    risk_category: financial
    severity: high
    likelihood: medium
    description: Public evidence does not disclose audited financial statements, ARR/bookings bridge, gross margin, cash, burn, debt or forecast assumptions for Olist.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Request audited financials, monthly KPI pack, cash runway, budget-to-actuals and valuation bridge.
  - risk_id: R-002
    risk_title: Cap table, preferences and financing terms are private
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Headline valuation does not disclose ownership, liquidation preferences, option pool, debt, warrants or secondary terms.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request fully diluted cap table and financing documents.
  - risk_id: R-003
    risk_title: Customer concentration and retention quality are unverified
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public demand signals do not disclose top-account revenue, churn, renewals, NRR, cohorts or satisfaction.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Request cohorts, top-account contracts, churn/NRR, support metrics and references.
  - risk_id: R-004
    risk_title: Competitive durability and pricing power require proof
    risk_category: market
    severity: medium
    likelihood: medium
    description: Olist operates in a market with credible substitutes and incumbents; public positioning does not prove win rates or switching costs.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Request win/loss, pricing benchmarks, renewal uplift and customer interviews.
  - risk_id: R-005
    risk_title: Product, technical and roadmap execution risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Public materials show active product/R&D work, but roadmap delivery, quality, reliability, safety, model costs or technical debt are not fully public.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Request roadmap, architecture review, reliability metrics, incident history and R&D budget.
  - risk_id: R-006
    risk_title: Legal, regulatory, privacy, IP and compliance exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Public sources are insufficient for litigation, regulatory, privacy/security, insurance, IP ownership and material-contract diligence.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - VIII.G
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Have counsel run docket, regulatory, privacy, security, insurance and IP diligence.
  - risk_id: R-007
