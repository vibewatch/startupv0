follow_up_requests:
  - request_id: FUP-001
    owner: Company CFO / finance
    priority: P1
    request: Provide audited financial statements for the last three fiscal years, current-year monthly management accounts,
      cash runway, debt schedule, revenue bridge, gross margin, and board-approved forecast.
    related_gap_ids:
      - GAP-001
    related_chapter_ids:
      - I
  - request_id: FUP-002
    owner: Company legal / corporate secretary
    priority: P1
    request: Provide current fully diluted cap table, financing documents, investor rights, liquidation preferences, option
      plan, board consents, and current valuation marks.
    related_gap_ids:
      - GAP-002
    related_chapter_ids:
      - I
  - request_id: FUP-003
    owner: Revenue / customer success leadership
    priority: P1
    request: Provide top customer/user cohort analysis, revenue concentration, churn/NRR, reference-call list, customer
      contracts, and supplier/partner economics.
    related_gap_ids:
      - GAP-003
    related_chapter_ids:
      - III
      - V
  - request_id: FUP-004
    owner: Product / engineering / security leadership
    priority: P2
    request: Provide SKU-level adoption, price book, product roadmap, engineering headcount, uptime/incident history,
      security reports, privacy assessments, and technical-debt review.
    related_gap_ids:
      - GAP-004
    related_chapter_ids:
      - II
      - VI
  - request_id: FUP-005
    owner: People / executive leadership
    priority: P2
    request: Provide org chart, executive bios, board and advisor list, compensation, equity grants, hiring plan, turnover,
      and employee-relations log.
    related_gap_ids:
      - GAP-005
    related_chapter_ids:
      - VII
  - request_id: FUP-006
    owner: Outside counsel / risk
    priority: P1
    request: Provide litigation schedule, counsel letter, material contracts, IP assignments, OSS scan, regulatory
      correspondence, insurance policies, claims history, and compliance evidence packs.
    related_gap_ids:
      - GAP-006
    related_chapter_ids:
      - VIII
limitations:
  - This is a public-source standard diligence screen, not an audit, legal opinion, valuation opinion, technical
    assessment, or regulator search.
  - Company-owned sources were treated as evidence of public claims, not independent verification of audited
    performance, customer truth, security effectiveness, or legal compliance.
  - Private-company financial statements, cap table, material contracts, customer records, board materials, employee
    records, legal dockets, security reports, insurance policies, and regulator correspondence were unavailable.
  - Staffbase customer and security details are company-published and should be corroborated through customer
    references, trust-center evidence packs, and contract review.
