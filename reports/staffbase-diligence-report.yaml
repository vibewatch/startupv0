executive_summary:
  overall_assessment: Continue to confirmatory diligence. Public evidence verifies product breadth, customer logos,
    trust/security positioning, and the historical unicorn valuation, but private ARR, churn, NRR, gross margin,
    customer concentration, cap table, and legal-contract files are required before underwriting.
  investment_or_diligence_thesis: Staffbase has credible public evidence of a scaled enterprise employee-communications
    platform, recognizable enterprise logos, security/compliance investment, and a 2022 CB Insights unicorn valuation.
    The core underwriting question is whether ARR retention, AI product differentiation, gross margin, and sales
    efficiency still support that valuation in a crowded internal-communications and Microsoft 365 ecosystem.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Staffbase at a $1.10B valuation, joined 3/15/2022, in Germany/Chemnitz enterprise tech.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Staffbase-owned materials describe a single platform spanning communications, knowledge, action, intranet, app,
        email, signage, and employee AI.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Staffbase security materials disclose EU/US/Australia hosting options, ISO 27001/SOC 2 facility claims,
        GDPR/CCPA/HIPAA support, and bug-bounty intake.
      evidence_claim_ids:
        - EC-003
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: "Private ARR and retention quality not public: Public evidence verifies product and customer logos, not ARR,
        NRR, churn, gross retention, gross margin, sales efficiency, or cohort health."
    - risk_id: R-002
      summary: "Enterprise communications market competition: Staffbase competes with Microsoft-adjacent suites and specialist
        employee-experience vendors; public claims do not prove durable differentiation."
    - risk_id: R-003
      summary: "Employee data, privacy, and AI governance exposure: The platform handles employee content and AI answers;
        security/compliance claims are public but require SOC reports, DPAs, subprocessor review, and AI controls
        testing."
    - risk_id: R-004
      summary: "Cloud and subprocessor dependency: Staffbase cites Microsoft Azure and AWS hosting; concentration, outage,
        data residency, and subprocessor-change controls need contract review."
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, cash runway, revenue recognition, gross margin, and
      unit economics are not public.
    - Current cap table, investor rights, liquidation preferences, debt, warrants, option pool, and secondary
      transactions are not public.
    - Customer/user cohorts, revenue concentration, churn, NRR, supplier/partner economics, and references require
      private evidence.
    - Product pricing, adoption, attach rate, roadmap, reliability, and service obligations need management support.
    - Management, board, compensation, equity plans, employee relations, hiring, and attrition are not publicly
      verifiable.
    - Litigation, IP ownership, open-source compliance, insurance, material contracts, and regulatory correspondence
      require counsel-led review.
  recommended_next_steps:
    - Provide audited financial statements for the last three fiscal years, current-year monthly management accounts,
      cash runway, debt schedule, revenue bridge, gross margin, and board-approved forecast.
    - Provide current fully diluted cap table, financing documents, investor rights, liquidation preferences, option
      plan, board consents, and current valuation marks.
    - Provide top customer/user cohort analysis, revenue concentration, churn/NRR, reference-call list, customer
      contracts, and supplier/partner economics.
    - Provide SKU-level adoption, price book, product roadmap, engineering headcount, uptime/incident history, security
      reports, privacy assessments, and technical-debt review.
  preliminary_recommendation: Proceed to confirmatory diligence; do not rely on public sources alone for investment underwriting.
