          - T-016
        figure_ids: []
        evidence_claim_ids: *a29
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No regulatory-agency problems were identified in accessible sources, but the model has consumer rental, billing, damage-fee, credit/fraud, privacy, transfer and green-claims touchpoints.
        verification_status: inconclusive
        confidence: low
        key_findings:
