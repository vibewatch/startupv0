report_metadata:
  report_title: Grover Public-Source Startup Diligence Report
  target_company: Grover
  website: https://www.grover.com/
  known_aliases:
    - Grover
    - ByeBuy
    - Grover Group GmbH
    - Grover Tech, Inc.
    - Grover Finance I GmbH (reported but not independently verified in this report)
  sector: Consumer electronics rental, technology subscription, circular economy, device-as-a-service and consumer fintech-adjacent asset financing
  geography: Berlin-founded company with public operations/signals in Germany, Austria, Spain, the Netherlands and United States-facing web properties
  company_stage: Late-stage private venture-backed unicorn candidate; latest reliable public valuation marker over $1B from April 2022 Series C
  research_date: 2026-05-17
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise noted; EUR amounts retained as reported
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Created exactly one public-source YAML diligence report for Grover at reports/grover-diligence-report.yaml.
    - Prioritized public company pages, Grover press releases, reputable technology/startup press, market-database pages, public legal/privacy pages, a public trademark aggregator and live job-board evidence.
    - Treated company-authored customer, sustainability, growth, financing and product claims as self-reported unless corroborated.
    - Marked financials, revenue, margin, burn, runway, debt terms, cap table, customer revenue, litigation, insurance, HR and contracts as not_publicly_verifiable where absent from public sources.
  included_jurisdictions:
    - Germany
    - Austria
    - Spain
    - Netherlands
    - United States public web/legal pages
    - European Union / EEA privacy, consumer and IP context
  excluded_topics:
    - No private data-room materials, interviews, bank statements, audited financials, board packs, customer lists, supplier contracts, facility agreements, insurance policies, legal dockets or HRIS exports were used.
    - No paid market, litigation, credit, corporate-registry, app-analytics, web-traffic, sanctions, lien, patent or private-company databases were accessed.
    - No full repository build was run because the user requested report creation only and no site code changes.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-05-17
      notes: User requested one standard-depth public-source diligence YAML report for Grover at reports/grover-diligence-report.yaml.
