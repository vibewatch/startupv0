risk_register:
  - risk_id: R-001
    risk_title: Financial and unit-economics opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Revenue, margin, burn, cash and unit economics may diverge materially from public financing/product story.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a31
    mitigation_or_diligence_request: Review audited financials, monthly management accounts and device-level cohort economics.
  - risk_id: R-002
    risk_title: Debt and asset-backed refinancing dependency
    risk_category: financing
    severity: critical
    likelihood: medium
    description: Debt covenants, collateral performance or refinancing terms may constrain growth and equity value.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.C
      - III.E
      - VIII.F
    evidence_claim_ids: *a32
    mitigation_or_diligence_request: Review facility documents, covenants, borrowing-base reports, collateral performance and 2025 refinancing terms.
  - risk_id: R-003
    risk_title: Stale unicorn valuation marker
    risk_category: financing
    severity: high
    likelihood: high
    description: The April 2022 unicorn marker may be stale and preference-adjusted equity value may be lower.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Request current 409A, investor marks, preference stack, secondary transactions and recap/down-round history.
  - risk_id: R-004
    risk_title: Competitive pressure from alternative access models
