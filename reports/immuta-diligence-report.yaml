        obligations and insurance notices.
executive_summary:
  overall_assessment: "Immuta remains an eligible public-list private unicorn based on CB Insights, and public materials
    support a real operating company with meaningful product breadth in data provisioning, access governance,
    marketplace workflows, classification and data-platform integrations. However, underwriting cannot rely on public
    evidence alone: financial statements, ARR quality, customer concentration, retention, contracts, current security
    artifacts, partner economics and legal exposure remain private-data-room gating items."
  investment_or_diligence_thesis: Proceed to confirmatory diligence only. The upside case is a differentiated
    cross-platform data provisioning/governance layer aligned with AI-era data-access demand and regulated-enterprise
    needs. The diligence thesis fails if private evidence shows weak retention, concentrated ARR, poor sales efficiency,
    native-platform displacement, unresolved security/privacy control gaps or material patent/IP exposure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Immuta as a $1B Enterprise Tech unicorn in Boston with date joined 2022-06-08.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Immuta publicly announced a $100M Series E and $267M total financing in June 2022.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: Public product pages and documentation substantiate broad data provisioning/governance capabilities and
        Databricks Unity Catalog integration claims.
      evidence_claim_ids:
        - EC-005
        - EC-007
        - EC-008
        - EC-009
        - EC-010
    - founder_claim_id: FC-006
      summary: Company materials identify active leadership and employer signals.
      evidence_claim_ids:
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR durability, cash/debt and forecasts are not public.
    - risk_id: R-003
      summary: Customer concentration, churn, NRR and contract terms are not public despite logo evidence.
    - risk_id: R-006
      summary: Native data-platform controls and adjacent governance/catalog products may pressure differentiation.
    - risk_id: R-007
      summary: Current security/privacy artifacts and regulatory exposure require specialist review.
    - risk_id: R-008
      summary: Public patent litigation allegations create a legal/IP diligence blocker until counsel reviews official records.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, retention/churn, gross margin, cash/debt, forecast model and budget-to-actuals.
    - Cap table, financing documents, preference stack, debt/warrants, option pool and current valuation support.
    - Top-customer ARR, contracts, deployment depth, renewal calendar, NRR/churn and independent customer references.
    - Partner agreements, API dependencies, co-sell economics and integration support obligations.
    - Current SOC 2/security reports, incident history, DPAs, subprocessor list, regulatory correspondence and
      cyber/E&O/D&O/IP insurance.
    - Official ALTR litigation pleadings, counsel assessment, indemnity exposure and IP landscape review.
  recommended_next_steps:
    - Run financial/revenue-quality diligence before relying on the $1B unicorn headline.
    - Conduct customer and partner diligence using public logos as a reference-call target list.
    - Have security/privacy counsel and technical diligence review current trust artifacts, architecture and AI/agentic
      governance controls.
    - Have IP/litigation counsel review ALTR pleadings, patent claims, insurance coverage and design-around exposure.
    - Benchmark Immuta against native data-platform controls and independent governance/catalog competitors using
      win/loss and buyer interviews.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Immuta has strong public financing and unicorn-status evidence, but no public financial statements,
      current ARR/retention, cash/debt, cap table, tax or accounting detail.
