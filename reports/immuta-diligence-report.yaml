report_metadata:
  report_title: Immuta Startup Diligence Report
  target_company: Immuta
  website: https://www.immuta.com/
  known_aliases:
    - Immuta Inc.
    - Immuta
  sector: Data provisioning, data access governance, data security and privacy software
  geography: United States / Boston, Massachusetts
  company_stage: Private unicorn / Series E growth-stage software company
  research_date: 2026-05-20
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified unicorn eligibility through CB Insights public unicorn list and checked CB company profile for
      private/active status.
    - Prioritized primary company pages for product, roadmap, customer-logo, security/privacy and people signals, while
      treating company claims as evidence of public statements rather than independent proof.
    - Used public documentation and legal-record analysis to uncover technical integration evidence and hidden legal/IP
      risk.
    - Mapped findings to checklist chapters I-VIII with explicit source-linked evidence, tables, figures, risks, gaps
      and follow-up requests.
  included_jurisdictions:
    - United States
    - Delaware litigation venue where publicly identified
    - Global/customer jurisdictions implied by enterprise and regulated-industry materials
  excluded_topics:
    - Non-public financial statements, board materials, contracts, customer interviews, security reports, cap table and
      official litigation pleadings were unavailable.
    - No paid databases beyond publicly accessible CB Insights pages were used.
  user_provided_materials:
    - material_id: UPM-001
      title: User request to generate an Immuta diligence report
      type: workflow_request
      date_received: 2026-05-20
      notes: No pitch deck, data room, founder responses, financial model or customer/reference materials were provided.
founder_claims:
