      Insights.
    claim_source: CB Insights unicorn list
    claim_date: 2022-06-08
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.B
      - I.C
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
    contradiction_summary: null
