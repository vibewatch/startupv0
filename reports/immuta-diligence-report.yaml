      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Audited/management financial statements, ARR, margin, cash/debt, backlog and receivables were not public.
          Public evidence supports financing history but not operating quality.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
