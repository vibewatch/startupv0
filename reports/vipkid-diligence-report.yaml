report_metadata:
  report_title: VIPKid Startup Diligence Report
  target_company: VIPKid
  website: https://global.vipkid.com/
  known_aliases:
    - VIPKid
    - VIPKID
    - VIPKid Global
    - VIPTeacher
    - VIPTEACHER PTE. LTD.
    - Chengdu Qiande Technology Co., Ltd.
    - Mi Wenjuan Cindy / Cindy Mi
  sector: K-12 education technology, online English-language learning, live tutoring marketplace
  geography: Beijing / China heritage with international online learning and North American teacher supply
  company_stage: Private venture-backed growth-stage edtech
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: Asia/Shanghai
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company pages, app-store metadata, market databases, official China policy, independent news, legal
      settlement sources, trademark pointers and competitor pages.
    - Treated company-published metrics as claims, not audited proof of current active users, revenue or unit economics.
    - No evidence was found that VIPKid is IPO’d, acquired or shut down; CB Insights and app stores indicate
      private/alive activity.
  included_jurisdictions:
    - China / PRC online tutoring regulation
    - United States and California teacher-classification litigation context
    - Canada / North American teacher supply context
    - Singapore and China app-seller entity signals
    - Global app-store distribution
  excluded_topics:
    - Non-public financials, cap table, contracts, legal opinions, SOC/security reports, app analytics, paid databases,
      full docket searches and interviews were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for VIPKid public diligence report
      type: workflow_context
      date_received: 2026-05-23
      notes: User requested exactly one standard-depth evidence-backed YAML report at reports/vipkid-diligence-report.yaml.
