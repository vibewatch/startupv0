executive_summary:
  overall_assessment: VIPKid appears private/alive and evidenceable, with strong historical scale and ongoing app
    activity, but investability is dominated by China regulatory disruption, financial opacity, teacher-classification
    exposure and unclear current revenue mix.
  investment_or_diligence_thesis: Do not underwrite VIPKid on cumulative class/parent/teacher claims alone. Treat it as a
    potentially continuing but heavily restructured online-learning platform requiring confirmatory financial,
    regulatory, entity, contractor and privacy diligence before valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights supports Series E/alive status and substantial historical financing.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-017
    - founder_claim_id: FC-006
      summary: Official policy and Reuters/Yahoo verify 2021 China tutoring disruption.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-028
    - founder_claim_id: FC-007
      summary: Apple metadata verifies 2026 app-update activity.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-016
        - EC-027
  biggest_risks:
    - risk_id: R-001
      summary: China tutoring regulation directly impaired the original model.
    - risk_id: R-003
      summary: Current financials, capitalization and runway are not public.
    - risk_id: R-004
      summary: Teacher contractor classification has produced settlement exposure.
  key_evidence_gaps:
    - Audited financials, cash/debt/runway and revenue by product/geography.
    - Cap table, preference stack, investor rights and entity ownership/intercompany map.
    - Active paid cohorts, retention, CAC/payback, refunds and China/non-China revenue bridge.
    - Teacher contracts, classification analyses, settlement agreement, reserves and remaining exposure.
    - PRC counsel memo, licenses, privacy/security controls and material contracts.
  recommended_next_steps:
    - Run data-room financial and cap-table diligence before valuation.
    - Obtain PRC regulatory counsel review for China-facing products and entity structure.
    - Have employment counsel review teacher classification and settlement exposure.
    - Request app analytics, cohort data, CAC/LTV and product-level P&Ls.
    - Reconcile entities, IP ownership, app-store accounts, data controllers/processors, insurance and material
      contracts.
