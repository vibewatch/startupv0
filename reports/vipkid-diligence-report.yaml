risk_register:
  - risk_id: R-001
    risk_title: China tutoring regulation impaired the original foreign-teacher China model
    risk_category: regulatory
    severity: critical
    likelihood: high
    description: 2021 restrictions and VIPKid’s reported halt of China foreign-teacher class sales directly affect the
      original model.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.D
      - V.C
      - VIII.G
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Obtain PRC counsel memo, license matrix, product classification, regulator
      correspondence and revenue/refund bridge.
  - risk_id: R-002
    risk_title: Post-2021 revenue mix and retention are opaque
    risk_category: market
    severity: high
    likelihood: high
    description: Public scale claims are cumulative and do not disclose active paid cohorts, China/non-China mix or
      replacement revenue.
    impacted_chapter_ids:
      - I
      - III
      - V
      - VI
    impacted_section_ids:
      - I.A
      - III.C
      - V.C
      - VI.B
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Request revenue/bookings by geography/product, cohort retention, refunds, paid conversion and active users.
  - risk_id: R-003
    risk_title: Financial runway and capitalization cannot be underwritten publicly
    risk_category: financial
    severity: high
    likelihood: medium
    description: Last public financing was 2019; financials are not public; settlement reporting referenced financial difficulties.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Request audited financials, cash/debt, burn/runway, board packages and cap table/preference stack.
  - risk_id: R-004
    risk_title: Teacher contractor classification and wage-hour exposure
    risk_category: legal
    severity: high
    likelihood: medium
    description: Teacher network appears contractor-based and has generated California settlement exposure.
    impacted_chapter_ids:
      - II
      - VII
      - VIII
    impacted_section_ids:
      - II.A
      - VII.F
      - VIII.A
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Employment counsel review of contracts, control factors, arbitration, releases,
      reserves and non-California exposure.
  - risk_id: R-005
    risk_title: Corporate/app-seller entity map is unclear
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Apple listings show VIPTEACHER PTE. LTD. and Chengdu Qiande sellers, while company profile points to Beijing.
    impacted_chapter_ids:
      - VII
      - VIII
    impacted_section_ids:
      - VII.A
      - VIII.D
      - VIII.F
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Request legal entity register, ownership tree, app-store accounts, data-flow map and intercompany agreements.
  - risk_id: R-006
    risk_title: Public scale claims may overstate current monetizable base
    risk_category: customer
    severity: medium
    likelihood: high
    description: Cumulative claims are not audited, current or deduplicated in public evidence.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.A
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Request KPI definitions, analytics exports, active/paid cohorts and teacher utilization.
  - risk_id: R-007
    risk_title: Competitive pressure and commoditization
    risk_category: market
