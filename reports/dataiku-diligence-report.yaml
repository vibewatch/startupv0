executive_summary:
  overall_assessment: Dataiku qualifies for continued diligence as a public-source private unicorn screen, but the investment case cannot be underwritten without primary financial, cap-table, customer, legal and operating records.
  investment_or_diligence_thesis: Dataiku has credible public evidence of scale and market relevance in Enterprise AI and analytics software. The thesis depends on validating financial quality, durable customer economics, compliance posture and whether the $3.70B valuation is supportable after private-record review.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Dataiku appears on a public unicorn list with latest known valuation of $3.70B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Dataiku publicly markets an active product platform.
      evidence_claim_ids:
        - EC-004
        - EC-009
    - founder_claim_id: FC-004
      summary: Dataiku has public customer, usage, partner or borrower signals.
      evidence_claim_ids:
        - EC-005
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Valuation reset and financing-market risk
    - risk_id: R-002
      summary: Financial quality and ARR definition opacity
    - risk_id: R-003
      summary: Enterprise AI competitive intensity
    - risk_id: R-004
      summary: Customer concentration and renewal quality unknown
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, cash balance, burn, gross margin and working-capital schedules.
    - Fully diluted cap table, liquidation preferences, option pool, warrants, debt and off-balance-sheet obligations.
    - Top customer/borrower/merchant concentration, cohort retention, churn, NRR and reference contacts.
    - Product-level gross margin, roadmap, reliability, implementation backlog and support burden.
    - Legal, regulatory, IP, insurance, security and material-contract schedules.
  recommended_next_steps:
    - Request financial statements, cap table, financing documents and current valuation support before relying on headline valuation.
    - Run customer, partner and supplier diligence to validate concentration, contract economics, retention and termination risk.
    - Complete legal, regulatory, IP, security and material-contract review with company counsel and relevant specialists.
    - Benchmark product, pricing and sales efficiency against the named competitive set with customer win-loss calls.
