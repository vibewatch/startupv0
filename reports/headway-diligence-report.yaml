        evidence_gaps:
          - CAC, payback, quota attainment, conversion rates, implementation backlog and marketing budget.
        follow_up_questions:
          - Provide sales productivity, marketing plan, budget-to-actuals and implementation capacity analysis.
        table_ids:
          - T-013
        figure_ids: []
        evidence_claim_ids:
