executive_summary:
  overall_assessment: "Headway is a credible active private unicorn: CB Insights lists it as a U.S. healthcare unicorn, and company plus independent sources corroborate the 2023 Series C and 2024 Series D financing history. Public evidence supports a real insurance-native mental-health access platform, but the investability question remains dominated by private financial quality, payer/provider concentration, claims controls, regulatory/privacy exposure and unit economics."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. Headline funding and market need are attractive, but a transaction thesis requires proof of ARR durability, payer economics, claim-denial performance, provider retention, compliance controls, patient outcomes and cap-table terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Headway as a $1B U.S. healthcare and life-sciences unicorn that joined the list on 2023-10-05.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company and independent sources corroborate a $100M Series D at a $2.3B valuation.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-003
      summary: Headway publicly positions the product around finding insured mental-health care and booking therapists or psychiatrists.
      evidence_claim_ids:
        - EC-005
    - founder_claim_id: FC-007
      summary: Headway publicly announced nationwide integrated-care referrals with 50,000 insurance-accepting providers and 10,000+ referrals.
      evidence_claim_ids:
        - EC-026
  biggest_risks:
    - risk_id: R-001
      summary: Revenue, margin, cash, retention and burn metrics are not public.
    - risk_id: R-005
      summary: HIPAA, state privacy, Medicare Advantage/Medicaid and claims-processing exposure create material regulatory and operational-control risk.
    - risk_id: R-004
      summary: Payer concentration, reimbursement terms, network adequacy and claims economics are not public.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, gross margin, claim economics, cash, debt, burn, forecast and valuation bridge
    - Top payer/customer revenue concentration, contract terms, renewal schedule, reimbursement rates and claim-denial/appeal metrics
    - Provider activation, credentialing quality, provider churn, geographic supply density and patient appointment outcomes
    - Security/privacy/HIPAA artifacts, incident logs, SOC reports, state privacy analysis and regulatory correspondence
    - Cap table, investor rights, option pool, debt, liquidation waterfall and board approvals
    - Integrated-care referral conversion, appointment completion, partner contracts, outcomes and referral-channel economics.
  recommended_next_steps:
    - Run financial quality-of-revenue diligence before underwriting the $2.3B valuation.
    - Run payer-contract, provider-network and claims-control diligence with health-care counsel.
    - Conduct independent patient, provider and payer references; test booking availability in target geographies.
    - Review security/privacy artifacts and HIPAA/state-health-data compliance evidence.
    - Benchmark Headway against Alma, Grow Therapy, Rula, Talkspace, BetterHelp and marketplace alternatives using win/loss data.
    - Validate integrated-care referral cohorts and payer/referral partner economics against private operating data.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Headway's unicorn status and recent financings, but core operating financials, cash flow, debt, retention, valuation bridge and cap-table economics are not public.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-006
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-017
      - EC-020
      - EC-027
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information
        checklist_question_ids:
          - I.A
        summary: No audited financial statements, revenue, ARR, margin, cash, debt, burn, cohort retention or budget-to-actuals were found in public materials.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources disclose financing and scale claims rather than operating financial statements.
            evidence_claim_ids:
              - EC-017
            risk_ids:
              - R-001
        hidden_risks:
          - High valuation may mask low gross margin, payer reimbursement friction, provider churn or cash burn.
        evidence_gaps:
          - Audited financials, monthly management accounts, ARR/bookings, gross margin, cash/debt, burn and cohort retention.
        follow_up_questions:
          - Provide audited financials, KPI pack, cash/debt schedule, burn analysis and financial model.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-017
      - section_id: I.B
        title: Financial projections and valuation support
        checklist_question_ids:
          - I.B
        summary: CB Insights and funding coverage support public valuation anchors, but projections and valuation support are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: CB Insights lists a $1B unicorn row; 2024 funding sources report a $2.3B valuation after a $100M Series D.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-003
            risk_ids:
              - R-002
        hidden_risks:
          - Series D valuation step-up may depend on preferences, structured terms or aggressive public-program expansion assumptions.
        evidence_gaps:
          - Board plan, valuation bridge, downside case, revenue-quality proof and round terms.
        follow_up_questions:
          - Provide operating plan, valuation bridge, Series C/D financing documents and use-of-proceeds tracking.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-027
      - section_id: I.C
        title: Capital structure
        checklist_question_ids:
          - I.C
        summary: Investor names and funding rounds are public; ownership, preferences, debt, option pool and liquidation waterfall are not.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Public sources identify Accel, Thrive, Andreessen Horowitz/a16z, Spark, Forerunner, GV and HCSC among investors, but not terms.
            evidence_claim_ids:
              - EC-001
              - EC-002
              - EC-004
            risk_ids:
              - R-002
        hidden_risks:
          - Investor preference stack, option-pool refreshes or debt could materially change common-equity economics.
        evidence_gaps:
          - Fully diluted cap table, preferred-stock terms, side letters, debt and board approvals.
        follow_up_questions:
          - Provide cap table, financing documents, investor consents and liquidation waterfall.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-004
          - EC-020
  - chapter_id: II
    title: Products
    chapter_summary: Headway publicly advertises an insurance-covered mental-health marketplace and provider back-office workflow. Product-market evidence is meaningful, but module economics, claims accuracy, quality controls and outcomes require private validation.
    founder_claim_ids:
      - FC-003
      - FC-004
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-012
      - EC-014
    risk_ids:
      - R-003
      - R-007
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A
        summary: Public materials describe patient search/booking, provider credentialing/billing/claims support and payer access workflows.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Headway's public product positioning centers on insured therapist/psychiatrist discovery and provider insurance administration.
            evidence_claim_ids:
              - EC-005
              - EC-006
              - EC-012
            risk_ids:
              - R-003
              - R-007
        hidden_risks:
          - Public product copy does not prove appointment supply, clinical quality, claims accuracy or reimbursement yield.
        evidence_gaps:
          - Module adoption, active users, provider retention, patient outcomes, claim-denial rates and product-level ARR.
        follow_up_questions:
          - Provide product analytics, appointment-availability cohorts, claim-denial data and provider/patient satisfaction metrics.
        table_ids:
          - T-004
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-012
      - section_id: II.B
        title: Pricing and product economics
        checklist_question_ids:
          - II.B
        summary: Patient affordability and a provider-friendly platform are public themes, but exact payer reimbursement economics and product margins are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.B-F1
            finding: MedCity reported that Headway is free for patients and providers and operates by taking a small percentage from health-plan premiums.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-001
              - R-004
        hidden_risks:
          - Business-model economics are sensitive to payer rates, claims leakage, provider compensation, denial rates and service costs.
        evidence_gaps:
          - Rate cards, take rate, claims yield, gross margin, provider payment timing and payer-by-payer economics.
        follow_up_questions:
          - Provide payer contract excerpts, reimbursement waterfall, provider payout policy and gross-margin bridge.
        table_ids:
          - T-005
        figure_ids: []
        evidence_claim_ids:
          - EC-017
          - EC-023
  - chapter_id: III
    title: Customer Information
    chapter_summary: Headway serves a three-sided network of patients, providers and payers. Public materials support broad constituency claims, but customer concentration, revenue by payer, churn and contract status remain non-public.
    founder_claim_ids:
      - FC-003
      - FC-004
      - FC-007
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-008
      - EC-012
      - EC-018
      - EC-025
      - EC-026
      - EC-027
    risk_ids:
      - R-003
      - R-004
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public sources identify patient, provider and payer constituencies rather than disclosing top customers by revenue or application.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: The platform is publicly described as connecting patients, in-network therapists, private-practice providers and insurance companies.
            evidence_claim_ids:
              - EC-005
              - EC-012
            risk_ids:
              - R-004
          - finding_id: III.A-F2
            finding: Headway's 2025 integrated-care announcement cites 50,000 insurance-accepting providers, 15,000+ referring clinicians and 10,000+ referrals.
            evidence_claim_ids:
              - EC-026
            risk_ids:
              - R-003
              - R-004
        hidden_risks:
          - Reported network breadth may not translate into payer revenue diversification or durable patient utilization.
        evidence_gaps:
          - Top payer/customer schedule, revenue by product, state and plan, utilization, contract terms and references.
        follow_up_questions:
          - Provide top 20 payer/customer revenue, contract status, renewal schedule and independent references.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-005
          - EC-012
          - EC-018
          - EC-026
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public materials reference commercial health plans, Medicare Advantage/Medicaid expansion and named investors, but not relationship economics.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: PRNewswire reported Headway was in-network with more than 40 commercial health plans across 50 states and the District of Columbia as of the Series D announcement.
            evidence_claim_ids:
              - EC-008
              - EC-024
            risk_ids:
              - R-004
          - finding_id: III.B-F2
            finding: Public payer examples and secondary plan-partnership counts reinforce payer concentration/reimbursement diligence needs.
            evidence_claim_ids:
              - EC-025
              - EC-027
            risk_ids:
              - R-004
        hidden_risks:
          - Payer contracts may include rate, service-level, audit, compliance, data-use or termination provisions not visible publicly.
        evidence_gaps:
          - Payer contract economics, renewal status, sourced ARR, service obligations, denial rates and compliance obligations.
        follow_up_questions:
          - Provide payer-contract inventory, reimbursement schedule, network adequacy obligations and payer concentration.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-024
          - EC-025
          - EC-026
          - EC-027
      - section_id: III.C
        title: Revenue by customer and relationship durability
        checklist_question_ids:
          - III.C
          - III.D
          - III.E
        summary: No public revenue-by-customer, churn, supplier-dependency or severed-relationship schedule was found.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Public network and financing claims do not disclose customer concentration, revenue retention or supplier dependencies.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-004
        hidden_risks:
          - Concentrated payer revenue, adverse rate resets, provider churn or claims-processing dependency could impair growth.
        evidence_gaps:
          - Customer concentration, churn, NRR/GRR, supplier list, severed relationships and renewal/termination history.
        follow_up_questions:
          - Provide customer/supplier schedules, churn analysis and any relationships severed in the last two years.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-018
          - EC-025
          - EC-026
          - EC-027
  - chapter_id: IV
    title: Competition
    chapter_summary: Headway competes in a crowded mental-health access, provider enablement and virtual-care landscape. Its insurance-native workflow and network scale are plausible differentiators but require win/loss, pricing and buyer-reference validation.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-006
      - EC-009
      - EC-010
      - EC-011
      - EC-025
      - EC-026
      - EC-027
    risk_ids:
      - R-006
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A
        summary: Official competitor pages show overlapping insured-therapy, provider-network, virtual-therapy and marketplace positioning.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Alma, Grow Therapy, Rula, Talkspace and BetterHelp all present public mental-health access propositions adjacent to Headway.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-006
        hidden_risks:
          - Competitors may pressure provider acquisition cost, payer rates, patient acquisition, brand and product differentiation.
        evidence_gaps:
          - Market share, win/loss, pricing benchmarks, payer overlap, provider overlap and patient outcome comparisons.
        follow_up_questions:
          - Provide competitive win/loss, pricing comparisons and payer/provider overlap analysis.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
          - F-006
        evidence_claim_ids:
          - EC-011
          - EC-027
      - section_id: IV.B
        title: Basis of competition and market demand
        checklist_question_ids:
          - IV.B
        summary: Public-health sources support strong need for mental-health access, and HHS OIG highlights Medicare/Medicaid access shortages.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: IV.B-F1
            finding: NIMH estimated 59.3 million U.S. adults with any mental illness in 2022; HHS OIG reported few behavioral-health providers actively serving selected Medicare and Medicaid enrollees.
            evidence_claim_ids:
              - EC-009
              - EC-010
            risk_ids:
              - R-006
        hidden_risks:
          - High demand does not ensure profitable access if reimbursement, provider supply or regulatory burden constrain conversion.
        evidence_gaps:
          - Addressable market by plan/state, provider supply density, payer willingness to pay and Headway's share.
        follow_up_questions:
          - Provide TAM/SAM/SOM model, state-by-state network density and payer pipeline evidence.
        table_ids:
          - T-011
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-010
