report_metadata:
  report_title: Headway Startup Diligence Report
  target_company: Headway
  website: https://headway.co/
  known_aliases:
    - Therapymatch, Inc. d/b/a Headway
    - Headway Health
    - Headway
  sector: Healthcare & Life Sciences / insurance-native mental-health provider network and care navigation
  geography: United States / New York, New York
  company_stage: Private unicorn / growth-stage digital health platform
  research_date: 2026-05-19
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth, relying on public web sources, direct CB Insights/PRNewswire checks, and user-provided excerpts from prior public-source research where pages were blocked.
    - Verified private unicorn eligibility using CB Insights plus company/funding and independent health-tech sources.
    - Treated company-published scale, product, provider and legal claims as verified only for the existence of the public statement unless independently corroborated.
    - Stopped short of financial, legal, security, customer and HR conclusions that require data-room materials, management interviews, customer references or counsel-led searches.
  included_jurisdictions:
    - United States
    - New York
    - U.S. state health-care privacy, insurance and provider-network operating contexts referenced by public materials
  excluded_topics:
    - Non-public financial statements, board materials, cap table, financing documents, debt schedules and option ledgers
    - Customer contracts, payer contracts, provider agreements, pricing schedules, claim-denial data and reimbursement economics
    - SOC reports, penetration tests, incident logs, model-control evidence, HIPAA risk assessments and full legal dockets
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request to create Headway diligence report
      type: workflow_request
      date_received: 2026-05-18
      notes: No pitch deck, financial model, data room, founder response or customer reference materials were provided.
    - material_id: UPM-002
      title: Headway prior public-source excerpts supplied in task prompt
      type: public_source_excerpt_packet
      date_received: 2026-05-19
      notes: Included CB Insights row, MedCity News, Behavioral Health Business, PRNewswire 2025 integrated-care release and Sacra secondary-database facts; used only as public-source evidence pointers.
