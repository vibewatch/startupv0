risk_register:
  - risk_id: R-001
    risk_title: Financial statements and unit economics unavailable
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public sources provide funding and scale proxies but not audited income statements, cash flows, gross margin, ARR bridge, cohort retention or unit economics.
    impacted_chapter_ids:
      - I
      - II
    impacted_section_ids:
      - I.A
      - I.B
      - II.A
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited/management financials, revenue recognition memo, ARR bridge, gross margin by product, cohort churn and working-capital schedules.
  - risk_id: R-002
    risk_title: Stale 2021 $3B valuation may not reflect current market clearing value
    risk_category: financing
    severity: high
    likelihood: medium
    description: The $3B valuation is publicly corroborated for the 2021 Series F, but current valuation and secondary activity are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request recent 409A, secondary/tender terms, investor marks, board-approved forecasts and financing process materials.
  - risk_id: R-003
    risk_title: Customer concentration, churn and ROI not public
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Named customer evidence is vendor/database sourced and lacks revenue share, contract status, churn, NRR or customer-validated ROI.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request top customer ARR, renewal schedule, churn bridge, NRR cohorts, customer references and raw before/after fraud/approval metrics.
  - risk_id: R-004
    risk_title: Model performance and data-network defensibility unverified
    risk_category: technical
    severity: medium
    likelihood: medium
