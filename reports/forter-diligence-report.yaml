executive_summary:
  overall_assessment: "Forter passes the public eligibility screen as an apparently active private unicorn: independent 2021 reporting corroborates a $300M Series F at $3B, CB Insights marks the company Series F | Alive, Salesforce Ventures marks Status Private, and current public pages/job postings show operations. The report should be treated as a public-source diligence screen rather than an investment decision because financials, cap table, customer concentration, security reports, legal matters and model performance are not public."
  investment_or_diligence_thesis: Forter appears to occupy a valuable ecommerce trust/fraud/payment decisioning niche with named enterprise customers, partner/integration signals, public API surface and AI/identity-network positioning. The key diligence question is whether current ARR, retention, model performance, unit economics and regulatory/security controls justify the stale 2021 $3B valuation in a competitive market.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources corroborate Forter as a private active Series F company with a 2021 $3B Series F valuation.
      evidence_claim_ids:
        - EC-001
        - EC-003
        - EC-029
    - founder_claim_id: FC-002
      summary: Forter publicly offers fraud, payment optimization, account protection, dispute management and API decisioning modules.
      evidence_claim_ids:
        - EC-007
        - EC-008
        - EC-009
        - EC-010
        - EC-011
        - EC-015
    - founder_claim_id: FC-003
      summary: Forter has named public customer and partner evidence, including Nordstrom, Priceline and partner ecosystem signals.
      evidence_claim_ids:
        - EC-012
        - EC-013
        - EC-014
  biggest_risks:
    - risk_id: R-001
      summary: No audited financials, ARR bridge, unit economics or current forecasts are public.
    - risk_id: R-003
      summary: Public customer logos do not reveal concentration, churn, NRR or current contract status.
    - risk_id: R-006
      summary: Privacy/regulatory exposure is material because Forter processes identity/commerce data for fraud and trust decisions.
  key_evidence_gaps:
    - Current ARR/revenue, gross margin, burn, CAC/payback and forecasts.
    - Fully diluted cap table, preference stack, debt and current valuation support.
    - Customer concentration, NRR/GRR, churn, renewal calendar and customer references.
    - Model performance, false-positive/chargeback outcomes, data rights and AI governance.
    - SOC/ISO/PCI reports, DPA/subprocessors, litigation/regulatory schedule and insurance/contracts.
  recommended_next_steps:
    - Open a financial/cap-table data room review before relying on the 2021 $3B valuation.
    - Run customer calls and request raw fraud, approval, chargeback and authorization-rate cohort data.
    - Review security/privacy artifacts, data maps, model governance and regulatory correspondence with counsel.
    - Conduct legal docket/regulatory searches across U.S. federal/state, Israeli and privacy regulators.
    - Benchmark Forter win/loss, pricing and guarantees against Riskified, Signifyd, Sift and Kount/Equifax.
