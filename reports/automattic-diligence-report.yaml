report_metadata:
  report_title: Automattic Diligence Research Report
  target_company: Automattic
  website: https://automattic.com/
  known_aliases:
    - Automattic Inc.
    - WordPress.com owner Automattic
    - A8C
    - Woo / WooCommerce
    - WordPress VIP
  sector: Media & Entertainment / web publishing, ecommerce, enterprise content and messaging software
  geography: United States; San Francisco, California headquarters with globally distributed workforce
  company_stage: Private unicorn / later-stage growth company
  research_date: 2026-06-07
  analyst: GitHub Copilot CLI using startup-diligence-research skill
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source review of Automattic company pages, press fact sheet, product pages, legal/privacy/trademark pages,
      recruiting pages and timeline.
    - Public market-database review of CB Insights unicorn tracker and company financial profile for valuation/funding
      signals.
    - Independent news review of TechCrunch and 404 Media for funding, acquisitions, workforce, WP Engine litigation,
      AI/privacy and R&D developments.
    - Public technical-source review of GitHub API metadata and W3Techs market-share pages.
    - No private systems, paywall bypassing, management interviews, customer calls, employee calls, legal opinions or
      data-room documents were used.
  included_jurisdictions:
    - United States
    - Global distributed operations referenced by Automattic public pages
    - Selected public web/technology markets
  excluded_topics:
    - No private financial statements or cap table
    - No paid legal/regulatory databases or PACER downloads
    - No private customer/supplier/employee records
    - No non-public source material from other workstreams
    - No legal, tax, accounting or investment advice
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided selection evidence from CB Insights unicorn tracker
      type: prompt context
      date_received: 2026-06-07
      notes: Used only to scope Automattic; public CB Insights tracker was independently fetched for the report source list.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Automattic is a private, independent unicorn-scale company with a public valuation anchor of $7.50B.
    claim_source: CB Insights unicorn tracker and Automattic press fact sheet
    claim_date: null
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
    contradiction_summary: null
    diligence_follow_up:
      - Request current cap table, preference stack, voting rights, 409A/fair value, tender/secondary history and any
        debt instruments.
  - founder_claim_id: FC-002
    claim_text: Automattic is the company behind WordPress.com, WooCommerce, Tumblr, Jetpack, WordPress VIP and related
      open-web products.
    claim_source: Automattic company pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - IV
    mapped_section_ids:
      - II.A
      - IV.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
    contradiction_summary: null
    diligence_follow_up:
      - Request product-level revenue, gross margin, MAU/sites/merchants, churn, incidents and roadmap.
  - founder_claim_id: FC-003
    claim_text: Automattic has annual revenue around half a billion dollars and is break-even or better.
    claim_source: Automattic about page and CEO remarks reported by TechCrunch
    claim_date: 2024-10-30
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-005
    contradiction_summary: CB Insights reports a higher 2021 revenue estimate of $1.3B; period/definition differences must be reconciled.
    diligence_follow_up:
      - Provide audited revenue, ARR/GMV definitions, product P&L, EBITDA/cash-flow bridge and revenue recognition memo.
  - founder_claim_id: FC-004
    claim_text: Automattic is open-source-driven and globally distributed.
    claim_source: Automattic about/work pages and GitHub public API
    claim_date: null
    mapped_chapter_ids:
      - VI
      - VII
    mapped_section_ids:
      - VI.A
      - VII.B
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-016
      - EC-019
    contradiction_summary: Official country/headcount counts differ across pages and dates because workforce changed.
    diligence_follow_up:
      - Request current employee/contractor roster, country-specific compliance review, open-source contribution policy
        and critical-maintainer map.
  - founder_claim_id: FC-005
    claim_text: Automattic has commercial rights to use WordPress marks and can protect the brand.
    claim_source: TechCrunch CEO remarks, Automattic and WordPress Foundation trademark policies
    claim_date: 2024-10-30
    mapped_chapter_ids:
      - VII
      - VIII
    mapped_section_ids:
      - VII.A
      - VIII.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-018
      - EC-023
      - EC-029
    contradiction_summary: WordPress Foundation owns/oversees key marks while Automattic asserts commercial license rights;
      full license terms are not public and are central to WP Engine dispute.
    diligence_follow_up:
      - Request WordPress Foundation/Automattic license agreements, related-party approvals, trademark enforcement
        history and board conflict procedures.
  - founder_claim_id: FC-006
    claim_text: Automattic can manage WP Engine and related community/legal disputes without material impairment.
    claim_source: Public legal response and CEO/public comments
    claim_date: 2024-10-31
    mapped_chapter_ids:
      - VIII
      - VI
      - VII
    mapped_section_ids:
      - VIII.A
      - VIII.B
      - VI.A
      - VII.F
    verification_status: inconclusive
    confidence: medium
    evidence_claim_ids:
      - EC-021
      - EC-022
      - EC-023
    contradiction_summary: Public injunction and workforce/community reactions show material risk remains unresolved.
    diligence_follow_up:
      - Request counsel memo, reserves, insurance coverage, customer/community impact analysis and
        remediation/settlement plan.
executive_summary:
  overall_assessment: "Eligible for report: Automattic is publicly represented as privately held and independent, active,
    and listed by CB Insights as a $7.50B U.S. Media & Entertainment unicorn. Proceed only with high-intensity
    confirmatory diligence because the public record verifies scale, product breadth and ecosystem reach but leaves core
    financials, customer concentration, cap table, legal exposure and workforce impacts unresolved."
  investment_or_diligence_thesis: Automattic is a late-stage open-web platform company whose value depends on converting
    WordPress ecosystem dominance into durable revenue across hosted publishing, commerce, enterprise content,
    security/identity and messaging while managing legal/community governance, workforce and privacy/IP risks.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Official press materials state Automattic is privately held and independent; CB Insights lists a $7.50B
        valuation anchor.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Automattic primary sources verify the major product portfolio and W3Techs verifies WordPress web/CMS dominance.
      evidence_claim_ids:
        - EC-006
        - EC-007
    - founder_claim_id: FC-004
      summary: Automattic public pages and GitHub metadata verify open-source orientation and a distributed global workforce.
      evidence_claim_ids:
        - EC-016
        - EC-019
  biggest_risks:
    - risk_id: R-001
      summary: WP Engine litigation and WordPress ecosystem governance conflict are high-likelihood/high-severity public risks.
    - risk_id: R-002
      summary: Financial quality, valuation support, cap table and profitability are not publicly verifiable.
    - risk_id: R-003
      summary: Workforce restructuring, employee exits and CEO voting control create execution and governance risk.
  key_evidence_gaps:
    - Audited financials, management accounts, product P&L, cap table, debt, option pool and tax positions.
    - Customer concentration, revenue by customer, churn/retention, backlog and AR aging.
    - Full WP Engine litigation docket/counsel memo, insurance/reserves and trademark/foundation license agreements.
    - Current org chart, board/governance documents, succession plan and function-level workforce impact.
    - Supplier, cloud, payment processor, AI-data and material contract schedules.
  recommended_next_steps:
    - Run confirmatory finance/cap-table diligence before relying on the $7.50B valuation anchor.
    - Have counsel review WP Engine docket, trademark/foundation license, insurance and privacy/AI data matters.
    - Obtain product/customer/supplier schedules and interview top customers, critical partners and key technical
      leaders.
    - Assess workforce reductions by function and roadmap/security impact.
    - Refresh dynamic pricing, headcount and market-share pages before final investment committee materials.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Automattic is confirmed as a private, active U.S. unicorn with a CB Insights $7.50B valuation anchor
      and public funding milestones through 2021, but audited financial statements, cap table, debt, projections,
      backlog, AR aging, tax and product-level margins are not public.
    founder_claim_ids:
      - FC-001
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-011
      - EC-028
    risk_ids:
      - R-002
      - R-007
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: "Public sources provide only scale signals: CB Insights 2021 revenue estimate and company/CEO half-billion
          annual revenue statements. Full income statements, balance sheets, cash flows, backlog and AR aging are not
          publicly verifiable."
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: Public revenue signals confirm material scale but are inconsistent in amount and period.
            evidence_claim_ids:
              - EC-004
              - EC-005
            risk_ids:
              - R-002
          - finding_id: I.A-F2
            finding: Audited financial statements and customer/backlog schedules are unavailable publicly.
            evidence_claim_ids:
              - EC-028
            risk_ids:
              - R-002
              - R-007
        hidden_risks:
          - Revenue may be concentrated in products or enterprise customers not visible in public sources.
          - Revenue-recognition and payments economics could materially differ by product.
        evidence_gaps:
          - Audited financial statements, management accounts, product P&L, AR aging, deferred revenue, backlog and
            revenue recognition policies were not public.
        follow_up_questions:
          - Provide audited financials and quarterly management accounts for FY2023-FY2026 YTD.
          - Provide revenue, gross margin, churn and backlog by product/channel/geography.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-005
          - EC-028
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public projections were found. Growth drivers are inferable from product breadth, WordPress ecosystem scale,
          WooCommerce, VIP, agencies, AI tooling and acquisitions, but quantitative plans and scenarios require
          management materials.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Public sources support multiple growth vectors but no forecast model.
            evidence_claim_ids:
              - EC-006
              - EC-008
              - EC-015
              - EC-017
            risk_ids:
              - R-002
              - R-004
        hidden_risks:
          - Forecast risk is high because AI site builders, hosted commerce competition and legal/community disputes may
            alter growth and investment needs.
        evidence_gaps:
          - Three-year projections, scenario assumptions, capex, working capital and financing assumptions are not
            public.
        follow_up_questions:
          - Provide board-approved FY2026-FY2028 plan, model assumptions, downside cases and capital plan.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-008
          - EC-015
          - EC-017
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Official and third-party sources verify private status and investor names, but current shares outstanding,
          option pool, debt, preference stack and founder voting/control documents are not public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Automattic remains privately held and independent according to official press materials.
            evidence_claim_ids:
              - EC-001
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: CB Insights supports the $7.50B unicorn valuation anchor used for selection.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-002
        hidden_risks:
          - High CEO voting control may affect minority-investor protections and exit paths.
          - Current valuation may differ materially from the public 2021/CB anchor.
        evidence_gaps:
          - Cap table, option/warrant schedule, debt, preferred terms, board rights and 409A were not public.
        follow_up_questions:
          - Provide fully diluted cap table, option/warrant/debt schedule, 409A, valuation reports and investor-rights
            agreements.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-004
          - EC-018
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public sources show funding and M&A history but not tax positions, accounting policies, debt instruments,
          warrant terms, acquisition earnouts or impairments.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Funding milestones and acquisitions are publicly documented at a high level.
            evidence_claim_ids:
              - EC-003
              - EC-011
            risk_ids:
              - R-002
              - R-005
        hidden_risks:
          - Acquisition integration and impairment risk are not visible from public materials.
          - Global distributed operations can create tax and permanent-establishment exposure.
        evidence_gaps:
          - Tax positions, accounting policies, acquisition purchase agreements and debt terms are not public.
        follow_up_questions:
          - Provide tax memos, acquisition agreements, impairment tests, accounting-policy memo and financing documents.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-003
          - EC-011
  - chapter_id: II
    title: Products
    chapter_summary: Automattic has a broad WordPress-centered portfolio spanning publishing, commerce, enterprise content,
      security, identity, analytics and messaging. Public evidence verifies product existence and broad commercial
      models, while product-level economics, roadmaps, incident history and profitability are not public.
    founder_claim_ids:
      - FC-002
      - FC-004
    evidence_claim_ids:
      - EC-006
      - EC-008
      - EC-011
      - EC-017
    risk_ids:
      - R-004
      - R-005
      - R-006
      - R-008
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public pages verify a diversified portfolio anchored by WordPress.com, WooCommerce, WordPress VIP, Jetpack,
          Tumblr, Akismet, Gravatar, Pocket Casts, Day One, Beeper and related services. Product-level growth, market
          share, cost structure and profitability are not publicly verifiable.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: The product portfolio is verified across Automattic primary sources.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-005
          - finding_id: II.A-F2
            finding: Monetization appears diversified across self-serve plans, enterprise VIP, ecommerce extensions/payments,
              subscriptions and partner channels.
            evidence_claim_ids:
              - EC-008
              - EC-015
            risk_ids:
              - R-004
              - R-007
          - finding_id: II.A-F3
            finding: M&A expanded commerce, creative publishing, analytics and messaging exposure.
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-005
        hidden_risks:
          - Product breadth increases integration complexity and support/security burden.
          - AI-data and content licensing choices can affect consumer product trust.
        evidence_gaps:
          - Revenue, gross margin, active users, churn, incident history and roadmap by product are not public.
        follow_up_questions:
          - Provide product P&L, MAU/merchant/site metrics, attach rates, incidents, roadmap, security backlog and
            sunset plans.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-006
          - EC-008
          - EC-011
          - EC-017
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public customer evidence consists mainly of selected WordPress VIP examples and agency/partner program
      materials. Top customers, revenue by customer, concentration above 5%, churn, severed relationships and supplier
      purchase amounts are not publicly verifiable.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-012
      - EC-013
    risk_ids:
      - R-007
      - R-008
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: WordPress VIP publicly references News Corp and enterprise positioning, but a top-15 customer list by
          application is not public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: At least one enterprise customer example is publicly referenced by WordPress VIP.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-007
        hidden_risks:
          - Logo examples can overstate current revenue or renewal status.
          - Enterprise VIP may depend on a small number of large accounts, but this cannot be measured publicly.
        evidence_gaps:
          - Top-15 customer schedule, application/use case, purchase timing and current paid status are not public.
        follow_up_questions:
          - Provide top-15 customers by revenue for FY2024-FY2026 YTD with product, application, ARR, renewal date and
            reference contact.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-009
          - EC-012
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Automattic has a public agency partner program and broad ecosystem relationships, but partner-generated revenue
          and marketing agreements are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Automattic for Agencies publicly verifies a partner program with tier benefits and revenue-share/discount
              language.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-007
        hidden_risks:
          - Channel conflict may exist between WordPress.com, VIP, agencies and managed-hosting partners.
          - Partner economics are not visible.
        evidence_gaps:
          - Partner list, tier criteria, revenue contribution, MDF/marketing commitments and termination rights are not
            public.
        follow_up_questions:
          - Provide partner contracts, revenue by partner/channel, tier rules and pipeline sourced by partners.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-010
          - EC-015
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by customer and any customer above 5% of revenue are not publicly verifiable.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: No public source disclosed customer concentration or revenue by account.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-007
        hidden_risks:
          - A single VIP, payments, hosting or enterprise customer could materially affect revenue quality.
          - No AR-aging data is public.
        evidence_gaps:
          - Customer revenue, ARR, churn, gross retention, net retention and AR aging are missing.
        follow_up_questions:
          - Provide revenue-by-customer schedule, top-20 account concentration, renewal/cohort metrics and AR aging.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-012
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No comprehensive public schedule of severed customers, partners or suppliers was found. Public WP Engine
          dispute may involve ecosystem relationships but is primarily legal/community, not a disclosed
          customer-severance schedule.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Public legal conflict with WP Engine should be assessed for ecosystem relationship impacts.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-001
              - R-009
        hidden_risks:
          - Public disputes can trigger churn or partner concern not visible in public data.
        evidence_gaps:
          - Lost-customer, lost-partner and lost-supplier schedules are not public.
        follow_up_questions:
          - Provide severed relationship list for FY2024-FY2026 YTD with revenue impact and reasons.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-021
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Top suppliers, cloud/infrastructure spend, payment processors and support/SaaS dependencies are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.E-F1
            finding: Automattic legal terms show broad hosted and payment-related services but do not identify suppliers or
              concentration.
            evidence_claim_ids:
              - EC-013
              - EC-025
            risk_ids:
              - R-008
        hidden_risks:
          - Supplier concentration could affect uptime, margins, compliance and exit options.
          - Payment and cloud vendor termination rights may be material.
        evidence_gaps:
          - Supplier spend, contracts, SLAs, subprocessor list and vendor concentration were not public.
        follow_up_questions:
          - Provide top suppliers by spend, cloud architecture, processor/sponsor bank agreements, SLAs, subprocessors
            and contingency plans.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-013
          - EC-025
  - chapter_id: IV
    title: Competition
    chapter_summary: WordPress retains dominant CMS share, but Automattic monetizes in markets with intense competition from
      SaaS site builders, ecommerce platforms, enterprise CMS vendors, managed WordPress hosts and open-source
      alternatives.
    founder_claim_ids:
      - FC-002
    evidence_claim_ids:
      - EC-007
      - EC-014
    risk_ids:
      - R-004
      - R-009
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: W3Techs verifies WordPress market leadership, while Wix and other site builders/ecommerce platforms represent
          visible alternatives. Basis of competition includes ease of use, price, performance, service, commerce
          functionality, ecosystem trust, AI tooling and distribution.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: IV.A-F1
            finding: WordPress has very high public CMS share, creating a large ecosystem advantage.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-004
          - finding_id: IV.A-F2
            finding: Public competitor share and product categories show credible alternatives in site building, commerce and
              hosting.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-004
        hidden_risks:
          - WordPress share may mask share loss in high-value commerce or enterprise segments.
          - Legal/community conflict can weaken ecosystem trust versus closed SaaS competitors.
        evidence_gaps:
          - Segment-specific market share, win/loss, pricing, churn and competitor displacement data are not public.
        follow_up_questions:
          - Provide segment-level win/loss, competitive displacement, pricing studies and churn reasons.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-007
          - EC-014
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Automattic distributes through free/open-source adoption, WordPress.com self-serve upgrades,
      WooCommerce marketplace/payments, WordPress VIP enterprise sales, agency partners, product-led support and
      acquisitions. Public sources do not disclose CAC, conversion, pipeline, quota, channel productivity or marketing
      budgets.
    founder_claim_ids: []
    evidence_claim_ids:
      - EC-015
      - EC-027
    risk_ids:
      - R-004
      - R-007
      - R-003
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: Public materials support a diversified GTM across self-serve, open-source ecosystem, enterprise VIP and
          agencies.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: V.A-F1
            finding: Self-serve, premium-service, enterprise and partner channels are publicly visible.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-004
              - R-007
