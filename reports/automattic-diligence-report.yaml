risk_register:
  - risk_id: R-001
    risk_title: WP Engine litigation and community escalation
    risk_category: legal
    severity: high
    likelihood: high
    description: Ongoing litigation, preliminary injunction and community actions could create damages, injunction,
      settlement, insurance, customer trust and ecosystem-contribution risks.
    impacted_chapter_ids:
      - VIII
      - VI
      - VII
      - V
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VI.A
      - VII.F
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Obtain full docket, pleadings, correspondence, insurance notices, reserves, settlement
      strategy, trademark licenses and board minutes.
  - risk_id: R-002
    risk_title: Financial quality and valuation support not public
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public valuation and revenue signals are not a substitute for audited statements; CB revenue estimate and
      company half-billion statements require reconciliation.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request audited financials, management accounts, KPIs by product, cash/debt, cap table,
      409A, waterfall, board materials and revenue recognition memos.
  - risk_id: R-003
    risk_title: Workforce restructuring, key-person and distributed-execution risk
    risk_category: team
    severity: high
    likelihood: medium
    description: Public reports show 159-person exit offer, 16% layoffs and concentrated CEO voting control after rapid
      growth to 2,000 staff.
    impacted_chapter_ids:
      - VII
      - VI
      - V
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.F
      - VII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request current org chart, regretted attrition, critical-role coverage, retention
      plans, engagement surveys and succession/board governance documents.
  - risk_id: R-004
    risk_title: Competitive pressure from SaaS builders, commerce platforms and managed hosts
    risk_category: market
    severity: medium
    likelihood: high
    description: WordPress has high web share, but Automattic monetization competes with Shopify, Wix, Squarespace, Webflow,
      Adobe Commerce, managed WordPress hosts and open-source alternatives.
    impacted_chapter_ids:
      - IV
      - V
      - II
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
      - II.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request segment-level ARR, win/loss, pricing realization, churn, CAC, cohort retention
      and roadmap response to AI site builders.
  - risk_id: R-005
    risk_title: Open-source product governance and security trust risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Open-source footprint is strategically valuable but governance disputes, plugin control actions and
      security responsibilities can affect developer trust.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
      - VIII.D
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request security incident history, vulnerability SLAs, maintainer policies,
      contribution governance, plugin ownership analyses and open-source compliance review.
  - risk_id: R-006
    risk_title: Privacy, AI-data and content-licensing exposure
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: AI crawler/data partnership choices for WordPress.com and Tumblr public content create data-protection,
      copyright, opt-out and user-trust diligence needs.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.G
      - VIII.F
      - II.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Request DPIAs, AI-data contracts, opt-out logs, privacy complaints, regulator
      correspondence and data-retention/deletion procedures.
  - risk_id: R-007
    risk_title: Customer concentration and revenue durability unavailable publicly
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Public customer examples do not reveal top customers, concentration, renewals, churn, AR aging, support
      SLAs or product-level revenue durability.
    impacted_chapter_ids:
      - III
      - V
      - I
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - I.A
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request top-customer schedule, renewal/churn cohorts, NPS/support escalations, customer
      references, backlog and AR aging.
  - risk_id: R-008
    risk_title: Supplier, infrastructure and payment partner dependency not disclosed
    risk_category: operational
    severity: medium
    likelihood: unknown
    description: Hosted WordPress, Woo payments, enterprise VIP, messaging and support operations likely depend on cloud,
      payment and SaaS vendors whose concentration and termination rights are not public.
    impacted_chapter_ids:
      - III
      - VIII
      - II
    impacted_section_ids:
      - III.E
      - VIII.F
      - II.A
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request top supplier spend, cloud architecture, payment processor/sponsor contracts,
      SLAs, DPA/subprocessor lists and exit plans.
  - risk_id: R-009
    risk_title: WordPress brand and foundation-license governance dependency
    risk_category: reputational
    severity: high
    likelihood: medium
    description: Automattic commercial strategy relies on WordPress ecosystem and brand rights while WordPress Foundation
      owns key marks and public disputes highlight boundary risk.
    impacted_chapter_ids:
      - VIII
      - VII
      - VI
      - IV
    impacted_section_ids:
      - VIII.D
      - VII.A
      - VI.A
      - IV.A
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Review WordPress Foundation/Automattic license agreements, related-party governance,
      board consents, brand-enforcement policy and conflict-of-interest procedures.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, management accounts, product P&L, AR aging, backlog and deferred revenue.
    why_it_matters: Needed to validate revenue quality, profitability, working capital and valuation.
    suggested_source_or_request: Company finance data room and auditor/accountant workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, voting rights, option pool, debt, preference stack and 409A.
    why_it_matters: Determines ownership, governance, dilution, liquidation economics and current fair value.
    suggested_source_or_request: Cap table export, charter, investor rights, SAFEs/notes and 409A reports.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level revenue, gross margin, active users/sites/merchants, incidents and roadmap.
    why_it_matters: Portfolio breadth may hide underperforming or high-risk products.
    suggested_source_or_request: Product KPI pack, incident logs and roadmap review.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, top accounts, churn/retention and customer references.
    why_it_matters: Customer concentration and revenue durability cannot be assessed publicly.
    suggested_source_or_request: CRM/billing exports, customer contracts and reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top supplier spend, cloud/payment processor contracts and SLAs.
    why_it_matters: Vendor concentration and termination rights can affect uptime, margins and compliance.
    suggested_source_or_request: Procurement ledger, vendor contracts, subprocessor list and architecture review.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Segment win/loss, churn by competitor, pricing realization and market-share by monetized segment.
    why_it_matters: WordPress web share does not equal Automattic revenue share.
    suggested_source_or_request: Sales/CS analytics, competitive studies and market model.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quotas, pipeline coverage, conversion and CAC/payback.
    why_it_matters: Cannot assess sales productivity or GTM scalability.
    suggested_source_or_request: Sales ops dashboards and compensation plans.
    priority: medium
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Engineering org chart, security program, open-source governance and critical maintainer map.
    why_it_matters: Open-source dependencies and disputes create technical/reputation risk.
    suggested_source_or_request: R&D org review, security audit and maintainer/contributor policy.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D budget, AI roadmap, model/vendor dependencies and launch readiness criteria.
    why_it_matters: AI/tooling pipeline maturity and costs are uncertain.
    suggested_source_or_request: Product roadmap, budget and AI governance materials.
    priority: medium
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.A
    missing_information: Board roster, governance documents and succession plan.
    why_it_matters: CEO voting control and legal disputes heighten governance risk.
    suggested_source_or_request: Board minutes, bylaws, investor rights and succession materials.
    priority: high
  - gap_id: G-011
    chapter_id: VII
    section_id: VII.G
    missing_information: Turnover by function/location, regretted attrition, employee-relations matters and retention plans.
    why_it_matters: Public workforce reductions may affect execution capacity.
    suggested_source_or_request: HRIS export, employee surveys, exit analysis and retention plans.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Full WP Engine docket, pleadings, discovery status, damages exposure, reserves and insurance.
    why_it_matters: Legal exposure is one of the highest public risks.
    suggested_source_or_request: Counsel memo, docket export, insurance notices and settlement analysis.
    priority: high
  - gap_id: G-013
    chapter_id: VIII
    section_id: VIII.D
    missing_information: WordPress Foundation license, product trademark registrations, contributor agreements and IP schedule.
    why_it_matters: Brand/IP rights support monetization and disputes.
    suggested_source_or_request: IP schedule, trademark docket and license agreements.
    priority: high
  - gap_id: G-014
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Privacy, AI data-sharing, opt-out, regulator correspondence and DPIA records.
    why_it_matters: AI/content/data practices can trigger regulatory and reputational exposure.
    suggested_source_or_request: Privacy counsel review, AI contracts, DSR logs and DPIAs.
    priority: high
  - gap_id: G-015
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, limits, exclusions and claims history.
    why_it_matters: Determines coverage for litigation, cyber, privacy, D&O and employment risks.
    suggested_source_or_request: Insurance schedule, policies and broker letters.
    priority: medium
  - gap_id: G-016
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Enterprise MSAs, DPAs, SLAs, acquisition agreements and material supplier contracts.
    why_it_matters: Hidden obligations and termination rights can affect valuation and operations.
    suggested_source_or_request: Material contract schedule and contract data room.
    priority: high
