  - figure_id: F-010
    title: Kry public-source risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of principal public-source diligence risks.
    purpose: Prioritize financial, regulatory, customer, product, data, competition and team follow-ups.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial statements, unit economics, and runway are not public
          severity: high
          likelihood: high
          rationale: Public evidence verifies funding and usage scale but not audited statements, revenue quality,
            margins, cash, debt, backlog, or AR aging.
          evidence_claim_ids: &a1
            - EC-002
            - EC-013
          source_ids:
            - SRC-002
            - SRC-002
            - SRC-003
            - SRC-004
            - SRC-005
        - risk_id: R-002
          label: Healthcare reimbursement and regulatory dependence across jurisdictions
          severity: high
          likelihood: medium
          rationale: Kry/Livi operates clinical care across public and private channels and is subject to healthcare
            regulators, reimbursement policies, CQC expectations, and country-specific telehealth rules.
          evidence_claim_ids: &a2
            - EC-009
            - EC-010
            - EC-014
            - EC-015
          source_ids:
            - SRC-004
            - SRC-005
            - SRC-003
            - SRC-002
        - risk_id: R-003
          label: Public-payer, NHS, insurer, and employer channel concentration is opaque
          severity: medium
          likelihood: high
          rationale: Livi positions NHS services, private insurers, employers, and regional public healthcare systems as
            key channels, but revenue mix and customer concentration are not public.
          evidence_claim_ids: &a3
            - EC-008
            - EC-009
            - EC-010
          source_ids:
            - SRC-004
            - SRC-004
            - SRC-005
        - risk_id: R-004
          label: Stale valuation and financing terms
          severity: medium
          likelihood: high
          rationale: The $2B unicorn valuation dates to April 2021 and CB Insights reports $730.99M raised, but current
            investor marks, preferences, debt, and dilution are not public.
          evidence_claim_ids: &a4
            - EC-001
            - EC-002
            - EC-012
            - EC-017
          source_ids:
            - SRC-001
            - SRC-002
            - SRC-002
            - SRC-007
        - risk_id: R-005
          label: Clinical quality, safety, and professional-workforce execution
          severity: high
          likelihood: medium
          rationale: Digital consultations, prescriptions, clinics, and clinician productivity expose the company to
            quality, safety, staffing, and reputational risks.
          evidence_claim_ids: &a5
            - EC-003
            - EC-004
            - EC-005
            - EC-015
          source_ids:
            - SRC-002
            - SRC-003
            - SRC-003
            - SRC-002
        - risk_id: R-006
          label: Sensitive health, identity, and privacy data handling
          severity: high
          likelihood: medium
          rationale: BankID login, app-based consultations, prescriptions, and health records imply sensitive identity
            and health-data processing.
          evidence_claim_ids: &a6
            - EC-005
            - EC-010
          source_ids:
