executive_summary:
  overall_assessment: Kry is a credible late-stage private digital-health unicorn candidate with strong public
    evidence of care-delivery scale, venture backing and European healthcare-system positioning, but the
    public record leaves financial quality, current valuation, healthcare regulatory exposure, customer
    concentration and clinical/data controls unresolved.
  investment_or_diligence_thesis: Proceed only with focused financial, regulatory, customer-contract,
    clinical-quality, data-privacy and cap-table diligence; public evidence supports the category and
    operating footprint but not an investment-grade view of revenue quality or risk-adjusted valuation.
  strongest_verified_claims:
    - summary: CB Insights lists Kry on its unicorn list at a $2B valuation with Sweden/Stockholm healthcare
        classification.
      evidence_claim_ids:
        - EC-001
    - summary: CB Insights profile lists Kry founded in 2015, alive, Stockholm-based and with $730.99M total raised.
      evidence_claim_ids:
        - EC-002
    - summary: Kry/Livi public pages describe app, video, clinic, prescription, professional and partner-channel
        care surfaces.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-005
        - EC-009
        - EC-010
    - summary: Livi About discloses 14M appointments, 5,000 healthcare professionals, 54 clinics and a 4.9 app
        rating, subject to company-authored metric limitations.
      evidence_claim_ids:
        - EC-006
  biggest_risks:
    - summary: Audited financials, unit economics, runway, debt and revenue concentration are not public.
      risk_ids:
        - R-001
      evidence_claim_ids:
        - EC-013
    - summary: Healthcare reimbursement, CQC/Swedish/EU regulation and care-quality controls require counsel-led
        diligence.
      risk_ids:
        - R-002
        - R-005
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-015
    - summary: Customer and channel economics behind NHS, insurer, employer and regional-payer positioning are opaque.
      risk_ids:
        - R-003
      evidence_claim_ids:
        - EC-009
        - EC-010
    - summary: The $2B valuation is a stale 2021 public database anchor and financing preferences are unknown.
      risk_ids:
        - R-004
      evidence_claim_ids:
        - EC-001
        - EC-002
  key_evidence_gaps:
    - Audited financial statements, management accounts, revenue by product/channel/geography, gross margin,
      cash, burn, debt, backlog and AR aging.
    - Current capitalization table, financing documents, investor marks, preferences, warrants, notes and
      secondary trading history.
    - Top-customer and partner revenue schedule, NHS/insurer/employer contracts, renewal history, churn,
      NRR/GRR and pipeline.
    - Clinical governance, quality metrics, complaints, adverse events, prescribing controls, credentialing
      and regulator correspondence.
    - Security/privacy evidence including data-flow maps, DPIAs, subprocessors, breach history, SOC/ISO
      reports and penetration tests.
    - Current org chart, board composition, compensation, stock plans, headcount, attrition and
      employee-relations matters.
  recommended_next_steps:
    - Run a management data-room request focused on financials, cap table, debt, cash runway, tax and
      accounting policies.
    - Commission Sweden/UK healthcare regulatory counsel review, including CQC documentation, reimbursement
      exposure and Swedish online-doctor scrutiny leads.
    - Conduct customer/partner diligence on NHS, insurer, employer and regional-payer contracts, including
      concentration and renewal risk.
    - Review clinical governance, prescribing, complaint, incident, professional-credentialing and
      patient-safety evidence.
    - Complete privacy/security diligence covering BankID, health data, app/video workflows, subprocessors and
      breach history.
    - Reconcile public operating metrics, including 34 vs 54 clinic counts, appointment definitions and
      country/product splits.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Kry as a private unicorn candidate with a $2B 2021 valuation and
      $730.99M total raised, but audited financials, cash, debt, revenue quality, cap table and current
      valuation are not public.
    founder_claim_ids:
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-013
      - EC-004
      - EC-006
      - EC-009
      - EC-010
      - EC-014
      - EC-002
      - EC-012
      - EC-001
      - EC-017
    risk_ids:
      - R-001
      - R-002
      - R-004
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No public audited statements, management accounts, product/channel/geography revenue splits, backlog
          or AR aging were found; public evidence supports funding and operating-scale signals only.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public appointment and clinic metrics need reconciliation to audited revenue, margin and cash flow.
            evidence_claim_ids:
              - EC-004
              - EC-006
              - EC-013
            risk_ids:
              - R-001
        hidden_risks:
          - Usage scale may not translate into profitable recurring revenue.
        evidence_gaps:
          - Income statements, balance sheets, cash flows, footnotes, backlog and AR aging are private.
        follow_up_questions:
          - Provide audited statements, quarterly management packs, revenue waterfall, gross margin, cash,
            debt, backlog and AR aging.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-013
          - EC-004
          - EC-006
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Growth drivers include digital appointments, physical clinics and public/private partner channels,
          but forecasts, assumptions and capital expenditure plans are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: Region-based pricing and public-payer channels make projections sensitive to reimbursement and policy
              assumptions.
            evidence_claim_ids:
              - EC-009
              - EC-010
              - EC-014
            risk_ids:
              - R-002
        hidden_risks:
          - Foreign operations and healthcare policy changes can change margins quickly.
        evidence_gaps:
          - Three-year projections, pricing assumptions, capital expenditure and external financing
            assumptions are private.
        follow_up_questions:
          - Provide management forecast, sensitivity cases, region-level reimbursement assumptions and planned
            capex.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-006
          - EC-009
          - EC-010
          - EC-014
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify major investors and total raised but not ownership, options, warrants, notes,
          debt, off-balance-sheet obligations or security preferences.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights names investors and total raised, but the fully diluted cap table is not public.
            evidence_claim_ids:
              - EC-002
              - EC-012
            risk_ids:
              - R-004
        hidden_risks:
          - Preference stack could materially affect common-equity value.
        evidence_gaps:
          - Cap table, option pool, warrants, notes, debt and consent rights.
        follow_up_questions:
          - Provide full capitalization table, financing ledger, debt instruments and investor-rights summary.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-002
          - EC-012
          - EC-013
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: CB Insights provides a $2B 2021 valuation anchor and $730.99M total raised, while tax,
          revenue-recognition policy, current marks and financing terms remain private.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: The $2B valuation is a stale public database anchor, not a current investor mark.
            evidence_claim_ids:
              - EC-001
            risk_ids:
