report_metadata:
  report_title: Kry Public-Source Startup Diligence Report
  target_company: Kry
  website: https://www.kry.se/en/
  known_aliases:
    - Kry
    - KRY International AB
    - Livi
    - Kry Livi
    - Livi UK
  sector: Digital-first healthcare, telehealth, virtual primary care, and clinic-enabled care delivery
  geography: Headquartered in Stockholm, Sweden; public materials reference Sweden, Norway, France, and the
    United Kingdom
  company_stage: Late-stage private unicorn candidate; CB Insights Incubator/Accelerator | Alive profile and $2B
    unicorn-list valuation
  research_date: 2026-05-18
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from CB Insights unicorn-list selection evidence and excluded already-covered report slugs.
    - Used CB Insights profile evidence for founding year, alive status, total raised, headquarters,
      investors, product summary and competitors.
    - Used Kry and Livi company-owned pages for product, operating-scale, partner-channel,
      regulatory-positioning and management signals.
    - Treated company-authored metrics as partially verified until supported by audited financials, customer
      records, regulator files or independent references.
    - Recorded inaccessible or non-evidentiary sources as limitations rather than fabricating financing or
      legal conclusions.
  included_jurisdictions:
    - Sweden
    - United Kingdom
    - Norway and France public references only
  excluded_topics:
    - No paid databases, private registries, company interviews, customer calls, counsel letters or data-room
      records were available.
    - No definitive litigation, regulatory, patent/trademark, tax, sanctions or corporate-registry clearance
      was completed.
    - No attempt was made to bypass paywalls, authentication, bot challenges or access controls.
  user_provided_materials:
    - material_id: M-001
      title: User prompt and random unicorn target selection
      type: prompt_argument
      date_received: 2026-05-17
      notes: Specified selecting three uncovered private unicorns and producing reports; Kry was randomly selected
        from CB Insights current unicorn candidates.
