executive_summary:
  overall_assessment: Krutrim is publicly supportable as an active Bengaluru-based
    AI/cloud unicorn with a verified January 2024 US$50M round at about US$1B valuation,
    public AI-cloud/GPU/model pages, and limited public customer/partner traction.
    Public evidence is weakest on audited financial quality, customer concentration,
    GPU economics, compliance proof, IP/data provenance and team/culture risk.
  investment_or_diligence_thesis: The core question is whether India-native AI cloud
    and Indic-model positioning can convert into durable third-party recurring revenue
    with sustainable GPU margins and manageable roadmap/governance risk.
