  key_evidence_gaps:
  - Audited financials and runway
  - Current cap table and debt
  - Top customers, ARR, usage, churn and contracts
  - GPU inventory, utilization and cloud margins
  - SOC/ISO reports and security incident history
  - IP, data provenance and OSS schedules
  - HR attrition, departures, employee-relations records
  recommended_next_steps:
  - Open finance/cap-table data room.
  - Separate Ola-related workloads from third-party ARR.
  - Run independent model/security/uptime evaluations.
  - Have counsel conduct legal, labor, IP and regulatory searches.
  - Review HR attrition and employee-relations records.
