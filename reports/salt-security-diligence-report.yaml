report_metadata:
  report_title: Salt Security Public-Source Startup Diligence Report
  target_company: Salt Security
  website: https://salt.security/
  known_aliases:
    - Salt Security, Inc.
    - Salt
    - Secful
  sector: API security, application security, and cloud security software
  geography: United States headquartered with Israel-linked founding and R&D footprint
  company_stage: Late-stage private cybersecurity unicorn
  research_date: 2026-05-16
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized company-owned press releases, product pages, customer pages, privacy documentation, and subprocessor disclosures.
    - Cross-checked financing and unicorn status against independent news and market-database sources where available.
    - Used public patent records to test founder and IP provenance, and negative public-search results only as a low-confidence absence-of-evidence signal.
    - Treated all revenue, customer-growth, employee-growth, customer-logo, and product-efficacy statements as unaudited management or marketing claims unless independently corroborated.
  included_jurisdictions:
    - United States
    - Israel
    - European Union / EEA privacy context
    - United Kingdom privacy and customer context
  excluded_topics:
    - Private audited financial statements, ARR schedules, gross margin, burn, cash, debt, option ledgers, investor rights agreements, and board materials were unavailable.
    - No customer reference calls, supplier diligence calls, code review, penetration-test review, SOC 2 report review, or paid database research was performed.
    - Litigation checks were limited to public web-searchable records; no PACER, state-court docket, or regulator-portal exhaustive search was completed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-16
      notes: User requested a standard-depth public-source diligence report for Salt Security saved as reports/salt-security-diligence-report.yaml.

founder_claims:
  - founder_claim_id: FC-001
    claim_text: Salt Security is an API security company whose platform covers API discovery, posture/governance, and behavioral threat protection.
    claim_source: Salt Security product and platform pages
    claim_date: null
    mapped_chapter_ids: [II, IV, VI]
    mapped_section_ids: [II.A, IV.A, VI.B]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-008, EC-009, EC-010]
    contradiction_summary: null
    diligence_follow_up:
      - Request product telemetry, deployment architecture, false-positive/false-negative history, and third-party validation for claimed protection coverage.
  - founder_claim_id: FC-002
    claim_text: Salt Security became a unicorn at a $1.4 billion valuation after a $140 million Series D led by CapitalG.
    claim_source: Salt Security / PRNewswire Series D announcement and CB Insights unicorn tracker
    claim_date: 2022-02-10
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.C]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001, EC-002]
    contradiction_summary: null
    diligence_follow_up:
      - Request the Series D financing documents, liquidation preferences, option-pool refresh, and current post-money valuation bridge.
  - founder_claim_id: FC-003
    claim_text: Salt Security reported 500% revenue growth, 300% customer growth, 250% employee growth, and 900% Fortune/Global 500 signed-customer growth around the Series D.
    claim_source: Salt Security / PRNewswire Series D announcement
    claim_date: 2022-02-10
    mapped_chapter_ids: [I, III, V, VII]
    mapped_section_ids: [I.A, III.A, V.D, VII.B]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-006, EC-024]
    contradiction_summary: Growth percentages are publicly stated, but public sources do not disclose baseline values, period definitions, audited revenue, net retention, customer count, or headcount detail.
    diligence_follow_up:
      - Request ARR cohort tables, customer-count definitions, employee roster history, and reconciliation from public percentages to audited operating metrics.
  - founder_claim_id: FC-004
    claim_text: Salt Security's customer base includes large enterprises such as Ally Bank, Finastra, Equinix, Armis, Carrefour, City National Bank, Payoneer, and TripActions.
    claim_source: Salt Security customer pages and case studies
    claim_date: null
    mapped_chapter_ids: [III, V]
    mapped_section_ids: [III.A, V.B]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-011, EC-012]
    contradiction_summary: Logos and case studies are public marketing evidence, but revenue contribution, renewal status, current deployment scope, and reference willingness are not public.
    diligence_follow_up:
      - Conduct customer reference calls and request current signed-order forms, renewal history, NRR/GRR, support tickets, and churn/downsells by logo.
  - founder_claim_id: FC-005
    claim_text: Salt Security applies behavioral analytics, machine learning, and newer agentic-security positioning to detect API threats.
    claim_source: Salt Security product pages and agentic-security announcement
    claim_date: null
    mapped_chapter_ids: [II, VI]
    mapped_section_ids: [II.A, VI.B]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-009, EC-022]
    contradiction_summary: Public materials describe the technical approach, but model design, training data, performance benchmarks, and production incident data are not independently verifiable from public sources.
    diligence_follow_up:
      - Review detection benchmark methodology, model governance, incident postmortems, red-team results, and customer-measured outcomes.
  - founder_claim_id: FC-006
    claim_text: Public company materials and older public sources consistently identify the company's founding history and founders.
    claim_source: Salt Security about page, older financing announcements, Crunchbase snippets, and patent records
    claim_date: null
    mapped_chapter_ids: [VII, VIII]
    mapped_section_ids: [VII.C, VIII.D]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-015, EC-016, EC-017]
    contradiction_summary: Current Salt materials reviewed in-session cite Roey Eliyahu and Michael Nicosia with a 2018 founding narrative, while older financing materials and market-database snippets reference a 2016 origin and/or Omer Sadika; patent records tie Roey Eliyahu and Omer Sadika to Secful IP.
    diligence_follow_up:
      - Request incorporation records, founder IP assignment agreements, founder separation documents, option/vesting treatment, and representations on any unresolved founder claims.
  - founder_claim_id: FC-007
    claim_text: Salt Security publishes privacy, GDPR/CCPA, cross-border-transfer, and subprocessor disclosures for its customer-data processing.
    claim_source: Salt Security privacy policy and subprocessor page
    claim_date: null
    mapped_chapter_ids: [III, VIII]
    mapped_section_ids: [III.E, VIII.G]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-013, EC-014, EC-026]
    contradiction_summary: null
    diligence_follow_up:
      - Request the current DPA, SCC modules, SOC 2 report, ISO certificates, vendor-risk assessments, and data-retention implementation evidence.

executive_summary:
  overall_assessment: >-
    Salt Security is a credible late-stage API security vendor with verified unicorn financing, recognizable enterprise logos, and a public product narrative aligned to API discovery, posture, and threat protection. The diligence case is nevertheless materially incomplete because audited financials, current ARR, current valuation, customer concentration, product-efficacy evidence, cap table economics, and founder/IP provenance documents are not public.
  investment_or_diligence_thesis: >-
    Track for follow-on diligence rather than underwrite from public sources alone: the company occupies an important security category and has strong historical financing validation, but the 2022 valuation and growth claims must be re-underwritten against current ARR quality, renewal data, competitive displacement, and technical efficacy.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: CB Insights and the Series D announcement support Salt's $1.4 billion unicorn valuation and $140 million Series D financing.
      evidence_claim_ids: [EC-001, EC-002]
    - founder_claim_id: FC-001
      summary: Company product materials consistently position Salt around API discovery, posture/governance, and runtime threat protection.
      evidence_claim_ids: [EC-008, EC-009]
    - founder_claim_id: FC-007
      summary: Salt publishes privacy and subprocessor disclosures naming key infrastructure, AI, database, analytics, and affiliated processing vendors.
      evidence_claim_ids: [EC-013, EC-014]
  biggest_risks:
    - risk_id: R-001
      summary: Financial opacity and the age of the $1.4 billion valuation make current enterprise value hard to underwrite.
    - risk_id: R-002
      summary: Inconsistent public founding narratives and Secful-linked patent history require direct founder/IP document diligence.
    - risk_id: R-003
      summary: API security is strategically attractive but competitive against standalone vendors and larger application-security/platform suites.
    - risk_id: R-005
      summary: Privacy, AI, cloud, database, and analytics subprocessors create operational and regulatory diligence dependencies.
  key_evidence_gaps:
    - Audited financial statements, ARR/MRR bridge, gross margin, cash runway, debt, and burn were not public.
    - Current cap table, preference stack, option pool, SAFE/convertible instruments, and valuation marks were not public.
    - Current customer list, revenue concentration, churn, NRR/GRR, deployment scope, and referenceability were not public.
    - Product-efficacy metrics, independent benchmarks, incident history, and SOC 2 / ISO evidence were not public.
    - Founder IP assignment and any founder separation or dispute documents were not public.
  recommended_next_steps:
    - Obtain financial statements, ARR waterfall, bookings pipeline, cohort retention, margin, burn, cash, debt, and board KPI packs.
    - Review Series A-D financing documents, current cap table, investor rights, liquidation preferences, and valuation marks.
    - Conduct five to eight customer references across named logos and recent wins/losses; reconcile references to live revenue and renewal records.
    - Perform technical diligence on API discovery coverage, runtime detection efficacy, deployment friction, data flows, AI usage, and incident history.
    - Commission legal review of incorporation history, founder/IP assignments, Secful patent assets, privacy obligations, subprocessors, and material contracts.

chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: >-
      Public financing evidence is strong through the 2022 Series D, but operating financials are not public. The central diligence issue is whether Salt's current ARR quality, growth durability, and cash profile support or reset the historical $1.4 billion valuation.
    founder_claim_ids: [FC-002, FC-003]
    evidence_claim_ids: [EC-001, EC-002, EC-003, EC-004, EC-005, EC-006, EC-007]
    risk_ids: [R-001, R-007]
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids: [I.A.1, I.A.2, I.A.3, I.A.4, I.A.5, I.A.6]
        summary: >-
          No audited financial statements, quarterly P&L, revenue by product, gross margin, deferred revenue, burn, cash, or debt schedule were located in public sources. The most concrete operating datapoints are unaudited growth percentages reported in the 2022 Series D announcement.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.A-KF-001
            finding: Public sources support historical financing and growth claims but not absolute ARR or profitability.
            evidence_claim_ids: [EC-006, EC-007]
            risk_ids: [R-001]
          - finding_id: I.A-KF-002
            finding: The absence of current public financials means valuation must be re-underwritten directly from management data.
            evidence_claim_ids: [EC-007]
            risk_ids: [R-001, R-007]
        hidden_risks:
          - Public percentage-growth claims can mask small baselines, one-time enterprise wins, or weaker net retention after the funding cycle.
          - Cybersecurity budget cycles and consolidation into larger suites may pressure standalone ARR growth and pricing.
        evidence_gaps:
          - Audited financials, current ARR, revenue by product/customer/region, gross margin, burn, cash, debt, and bookings pipeline.
        follow_up_questions:
          - What were ARR, net dollar retention, gross retention, CAC payback, gross margin, burn multiple, cash balance, and runway at each quarter since 2021?
        table_ids: [T-001, T-002, T-003]
        figure_ids: [F-001, F-002]
        evidence_claim_ids: [EC-001, EC-002, EC-006, EC-007]
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids: [I.B.1, I.B.2, I.B.3, I.B.4, I.B.5, I.B.6, I.B.7, I.B.8]
        summary: >-
          Public sources did not provide management forecasts, pipeline conversion, budget, or hiring-plan projections. Any underwriting case requires direct access to the plan and variance history.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-KF-001
            finding: The Series D release describes rapid growth and customer expansion, but no forecast methodology or current plan was public.
            evidence_claim_ids: [EC-006, EC-007]
            risk_ids: [R-007]
        hidden_risks:
          - Forecasts may depend on continued enterprise-security budget expansion, channel performance, and displacement of broader application-security platforms.
        evidence_gaps:
          - Board-approved plan, pipeline coverage, sales capacity model, quota attainment, churn scenarios, and sensitivity cases.
        follow_up_questions:
          - How does management bridge current ARR to the next 24 months by new logos, expansion, price increases, churn, and channel contribution?
        table_ids: [T-002, T-003]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-006, EC-007]
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids: [I.C.1, I.C.2, I.C.3, I.C.4, I.C.5]
        summary: >-
          Public announcements identify Seed/Series A-D milestones and the 2022 $1.4 billion valuation, but cap table economics, preference stack, option pool, debt, and secondary activity are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.C-KF-001
            finding: Series D was $140 million led by CapitalG, bringing total disclosed funding to $271 million at a $1.4 billion valuation.
            evidence_claim_ids: [EC-001, EC-002]
            risk_ids: [R-001]
          - finding_id: I.C-KF-002
            finding: Earlier rounds include Series A, B, and C financing events led or joined by recognized venture investors.
            evidence_claim_ids: [EC-003, EC-004, EC-005]
            risk_ids: [R-001]
        hidden_risks:
          - A high 2022 valuation may imply complex liquidation preferences or reset risk if current growth has decelerated.
          - Public funding totals do not reveal liquidation preference, participating preferred rights, redemption rights, debt, or option-pool dilution.
        evidence_gaps:
          - Fully diluted cap table, investor-rights agreements, option grants, secondary transactions, debt documents, and valuation marks.
        follow_up_questions:
          - What is the current fully diluted ownership, preference stack, liquidation waterfall, and most recent 409A / third-party valuation?
        table_ids: [T-001]
        figure_ids: [F-001, F-002]
        evidence_claim_ids: [EC-001, EC-002, EC-003, EC-004, EC-005]
      - section_id: I.D
        title: Other financial information
        checklist_question_ids: [I.D.1, I.D.2, I.D.3]
        summary: >-
          Tax, debt, off-balance-sheet liabilities, significant contracts, credit facilities, and insurance schedules were not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.D-KF-001
            finding: No public source reviewed disclosed debt, liens, cash balance, or material non-equity financing.
            evidence_claim_ids: [EC-007]
            risk_ids: [R-001]
        hidden_risks:
          - Enterprise SaaS contracts may include service-credit, indemnity, privacy, and breach-notification obligations not visible in marketing materials.
        evidence_gaps:
          - Debt schedule, liens, tax exposures, customer indemnities, data breach insurance, and material-contract liabilities.
        follow_up_questions:
          - Provide all debt, liens, guarantees, material off-balance-sheet obligations, service-credit exposure, and insurance claims history.
        table_ids: [T-002]
        figure_ids: []
        evidence_claim_ids: [EC-007]
  - chapter_id: II
    title: Products
    chapter_summary: >-
      Salt's public product architecture centers on API discovery, posture/governance, runtime threat protection, and security-program integrations. The key diligence question is whether runtime efficacy and deployment coverage are independently validated across live enterprise environments.
    founder_claim_ids: [FC-001, FC-005]
    evidence_claim_ids: [EC-008, EC-009, EC-010, EC-022]
    risk_ids: [R-003, R-006, R-005]
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids: [II.A.1, II.A.2, II.A.3, II.A.4, II.A.5, II.A.6]
        summary: >-
          Public product pages describe a platform for API discovery, inventory/context, posture and compliance, threat detection, testing/remediation, and integrations into development, cloud, and security workflows. Public materials also highlight newer agentic-security positioning.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-KF-001
            finding: Product modules are clearly described in public Salt materials, but performance claims remain management assertions.
            evidence_claim_ids: [EC-008, EC-009]
            risk_ids: [R-006]
          - finding_id: II.A-KF-002
            finding: Public integration signals include GitHub Connect and Databricks/Netlify-related connectors or partner content.
            evidence_claim_ids: [EC-010]
            risk_ids: [R-003]
          - finding_id: II.A-KF-003
            finding: AI/agentic-security messaging creates incremental product opportunity and incremental data-governance questions.
            evidence_claim_ids: [EC-009, EC-022, EC-026]
            risk_ids: [R-005, R-006]
        hidden_risks:
          - API discovery gaps can undermine downstream posture and threat-detection claims if traffic coverage is incomplete.
          - Runtime detection quality may vary by deployment mode, data sources, baseline period, and customer API complexity.
          - AI-enabled security positioning may create customer questions about data processing, explainability, and model/vendor dependencies.
        evidence_gaps:
          - Architecture diagrams, deployment modes, supported gateways, API coverage metrics, detection precision/recall, model governance, and customer incident outcomes.
        follow_up_questions:
          - What percentage of APIs are discovered in production within 30/60/90 days, and how is coverage measured against customer source-of-truth inventories?
          - What independent benchmark or red-team evidence supports Salt's threat-detection claims?
        table_ids: [T-004, T-005, T-006]
        figure_ids: [F-003, F-004]
        evidence_claim_ids: [EC-008, EC-009, EC-010, EC-022, EC-026]
  - chapter_id: III
    title: Customer Information
    chapter_summary: >-
      Salt publicly names credible enterprise customers and publishes case-study/logos, but revenue concentration, renewal status, deployment breadth, customer satisfaction, and churn are not public.
    founder_claim_ids: [FC-003, FC-004, FC-007]
    evidence_claim_ids: [EC-011, EC-012, EC-013, EC-014, EC-025]
    risk_ids: [R-004, R-005]
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids: [III.A]
        summary: >-
          Public Salt materials list enterprise customers across financial services, technology, retail, travel, and infrastructure. Public sources do not rank customers by revenue or deployment size.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-KF-001
            finding: Salt's named logos include multiple large enterprises, but the revenue contribution and current contract status of each logo are not public.
            evidence_claim_ids: [EC-011, EC-012]
            risk_ids: [R-004]
        hidden_risks:
          - Customer logos may include pilots, expired deployments, limited-scope contracts, or low-revenue reference use.
          - Large financial-services customers can create demanding uptime, privacy, audit, and indemnity obligations.
        evidence_gaps:
          - Top-20 customer list by ARR, contract start/end dates, deployment scope, renewal status, NRR/GRR, support tickets, and churn/downsells.
        follow_up_questions:
          - Which public customer logos remain active paid customers today, what ARR do they represent, and are they willing to provide references?
        table_ids: [T-007, T-008]
        figure_ids: [F-005]
        evidence_claim_ids: [EC-011, EC-012]
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids: [III.B]
        summary: >-
          Public materials indicate integrations and ecosystem relationships with developer, data, and deployment platforms, but channel economics and contractual commitments are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-KF-001
            finding: GitHub Connect and Databricks/Netlify references support a strategy of embedding API security into existing developer and data workflows.
            evidence_claim_ids: [EC-010]
            risk_ids: [R-003]
        hidden_risks:
          - Integration partners may not drive material revenue unless supported by joint selling, marketplace motions, and technical stickiness.
        evidence_gaps:
          - Partner agreements, marketplace revenue, referral fees, integration usage, and co-sell pipeline.
        follow_up_questions:
          - What portion of pipeline and ARR comes through partner or marketplace motions, and what contractual commitments exist?
        table_ids: [T-005, T-013]
        figure_ids: [F-007]
        evidence_claim_ids: [EC-010, EC-020]
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids: [III.C]
        summary: >-
          Revenue by customer is not public. Public logos and growth percentages are insufficient to assess concentration, expansion, churn, or cohort quality.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-KF-001
            finding: Salt's customer-growth percentage is public, but the underlying denominator and revenue distribution are not.
            evidence_claim_ids: [EC-006, EC-012]
            risk_ids: [R-004]
        hidden_risks:
          - Enterprise cybersecurity ARR can be concentrated in a small number of large accounts or renewals.
        evidence_gaps:
          - Customer ARR distribution, renewal schedule, cohort retention, upsell/downsell, and customer health scores.
        follow_up_questions:
          - Provide top customers by ARR and renewal month, including gross retention and net retention by cohort.
        table_ids: [T-008]
        figure_ids: []
        evidence_claim_ids: [EC-006, EC-012]
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids: [III.D]
        summary: >-
          Public sources reviewed did not identify significant severed customer relationships, but absence of public evidence is not conclusive.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: III.D-KF-001
            finding: No public churn or severed-strategic-relationship disclosures were located.
            evidence_claim_ids: [EC-012]
            risk_ids: [R-004]
        hidden_risks:
          - Churn, product replacement, security incidents, or procurement disputes may remain confidential.
        evidence_gaps:
          - Churn log, lost-deal reports, customer escalations, legal demand letters, and non-renewal reasons.
        follow_up_questions:
          - List every top-50 customer churn, non-renewal, or material downsell in the last 24 months and the stated reason.
        table_ids: [T-008]
        figure_ids: []
        evidence_claim_ids: [EC-012]
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids: [III.E]
        summary: >-
          Salt's public subprocessor disclosure identifies major infrastructure, AI, database, analytics, and affiliated-service providers, including AWS, Microsoft Azure OpenAI, MongoDB Atlas, SingleStore, Sisense, Sec4U, Salt Canada, and Salt Ltd.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: III.E-KF-001
            finding: Public subprocessor disclosures provide supplier-risk leads for security, privacy, continuity, and AI/data-processing diligence.
            evidence_claim_ids: [EC-013, EC-025, EC-026]
            risk_ids: [R-005]
        hidden_risks:
          - Cloud, database, analytics, and AI subprocessors can create concentration, cross-border transfer, retention, and regulatory-control dependencies.
        evidence_gaps:
          - Supplier contracts, DPAs, incident SLAs, data residency controls, audit reports, and business-continuity plans.
        follow_up_questions:
          - Which subprocessors process production customer traffic, API payloads, model inputs, security findings, logs, or metadata?
        table_ids: [T-009, T-020]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-013, EC-014, EC-025, EC-026]
  - chapter_id: IV
    title: Competition
    chapter_summary: >-
      API security is a meaningful security subcategory, but Salt competes with standalone API-security vendors and broader application-security, cloud-security, gateway, and security-platform vendors. Public differentiation claims require customer win/loss and technical evidence.
    founder_claim_ids: [FC-001, FC-005]
    evidence_claim_ids: [EC-008, EC-009, EC-019, EC-020]
    risk_ids: [R-003, R-006]
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids: [IV.A.1, IV.A.2]
        summary: >-
          Salt's public positioning emphasizes dedicated API security, behavioral runtime protection, posture, and discovery. Competitive pressure comes from other API-security specialists and larger security platforms that can bundle API protection into existing customer footprints.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-KF-001
            finding: Salt has clear category positioning, but public sources do not prove win rates versus standalone competitors or platform vendors.
            evidence_claim_ids: [EC-008, EC-019]
            risk_ids: [R-003]
          - finding_id: IV.A-KF-002
            finding: Integration and agentic-security messaging could help maintain relevance but may also invite competition from platform vendors.
            evidence_claim_ids: [EC-010, EC-022]
            risk_ids: [R-003, R-006]
        hidden_risks:
          - Incumbent security platforms may undercut pricing or bundle API functionality.
          - Customer security teams may prefer consolidated CNAPP/WAF/API gateway/application-security platforms over standalone tools.
        evidence_gaps:
          - Win/loss reports, displacement data, renewal loss reasons, competitive battlecards, feature benchmark results, and pricing comparisons.
        follow_up_questions:
          - Against which vendors does Salt most often win or lose, and what is the pattern by customer segment, deployment mode, and geography?
        table_ids: [T-010, T-011, T-012]
        figure_ids: [F-006]
        evidence_claim_ids: [EC-008, EC-009, EC-010, EC-019, EC-022]
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: >-
      Public materials indicate an enterprise-led go-to-market motion supported by customer logos, case studies, product integrations, and security thought leadership. Sales productivity, pipeline conversion, partner economics, and budget efficiency are not public.
    founder_claim_ids: [FC-003, FC-004]
    evidence_claim_ids: [EC-006, EC-011, EC-020]
    risk_ids: [R-004, R-007, R-003]
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids: [V.A.1, V.A.2, V.A.3, V.A.4]
        summary: >-
