risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and stale unicorn valuation
    risk_category: financial
    severity: high
    likelihood: medium
    description: Salt's $1.4B valuation is verified historically, but current ARR, growth, margin, burn, cash, debt, customer concentration, and valuation marks are not public.
    impacted_chapter_ids: [I, V, VII]
    impacted_section_ids: [I.A, I.B, I.C, V.D, VII.E]
    evidence_claim_ids: [EC-001, EC-002, EC-006, EC-007]
    mitigation_or_diligence_request: Request audited financials, ARR bridge, retention cohorts, cash/burn/debt, cap table, preference stack, and latest valuation materials.
  - risk_id: R-002
    risk_title: Founder and IP provenance inconsistency
    risk_category: legal
    severity: high
    likelihood: medium
    description: Public founder/founding narratives and Secful patent records require direct reconciliation through incorporation, founder, invention-assignment, and separation documents.
    impacted_chapter_ids: [VI, VII, VIII]
    impacted_section_ids: [VI.A, VII.C, VIII.D]
    evidence_claim_ids: [EC-015, EC-016, EC-023]
    mitigation_or_diligence_request: Obtain formation records, founder agreements, IP assignments, Secful asset-transfer documents, release agreements, and full patent/trademark/open-source schedules.
  - risk_id: R-003
    risk_title: Competitive compression from specialist and platform vendors
    risk_category: market
    severity: high
    likelihood: medium
    description: API security is important but crowded; broader security platforms can bundle API features, potentially pressuring standalone pricing and renewal priority.
    impacted_chapter_ids: [II, IV, V]
    impacted_section_ids: [II.A, IV.A, V.C]
    evidence_claim_ids: [EC-008, EC-009, EC-019, EC-020, EC-022]
    mitigation_or_diligence_request: Review win/loss, competitive pricing, displacement data, customer budget owner interviews, and product benchmark results.
  - risk_id: R-004
    risk_title: Customer-logo evidence does not prove revenue quality
    risk_category: customer
    severity: medium
    likelihood: medium
    description: Public customer logos and case studies support credibility but do not disclose ARR, renewal status, deployment breadth, churn, concentration, or referenceability.
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, III.C, III.D, V.B]
    evidence_claim_ids: [EC-011, EC-012]
    mitigation_or_diligence_request: Conduct customer references and reconcile to signed contracts, renewal schedules, deployment telemetry, NRR/GRR, and support records.
  - risk_id: R-005
    risk_title: Privacy, AI, cloud, and subprocessor dependency risk
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Salt lists cloud, AI, database, analytics, services, and affiliate subprocessors; API-security data flows can trigger stringent customer, privacy, transfer, and AI governance obligations.
    impacted_chapter_ids: [II, III, VIII]
    impacted_section_ids: [II.A, III.E, VIII.F, VIII.G]
    evidence_claim_ids: [EC-013, EC-014, EC-025, EC-026]
    mitigation_or_diligence_request: Review DPA/SCCs, SOC 2/ISO, DPIAs, vendor contracts, AI-service terms, data-flow diagrams, retention controls, and incident history.
  - risk_id: R-006
    risk_title: Product efficacy and deployment coverage not independently proven
    risk_category: product
    severity: medium
    likelihood: medium
