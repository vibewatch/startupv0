  - table_id: T-018
    title: Founder and leadership narrative reconciliation
    chapter_id: VII
    section_id: VII.C
    purpose: Flag public inconsistencies that require direct document review.
    columns:
      - name: source_cluster
        description: Public source group.
      - name: observed_narrative
        description: Narrative captured in public research.
      - name: reconciliation_needed
        description: Document needed.
    rows:
      - row_id: T-018-R1
        values:
          source_cluster: Current Salt about / leadership pages
          observed_narrative: Current materials reviewed in-session cite Roey Eliyahu and Michael Nicosia with a 2018 founding narrative.
          reconciliation_needed: Incorporation records, board consents, role history, and company-approved founder list.
        evidence_claim_ids: [EC-016, EC-017]
        source_ids: [SRC-006, SRC-019]
      - row_id: T-018-R2
        values:
          source_cluster: Older financing and market-database sources
          observed_narrative: Older materials and snippets reference 2016 origin and/or Omer Sadika.
          reconciliation_needed: Founder agreements, separation agreements, equity treatment, and public correction history.
        evidence_claim_ids: [EC-016]
        source_ids: [SRC-002, SRC-025]
      - row_id: T-018-R3
        values:
          source_cluster: Patent records
          observed_narrative: Secful patent records name Roey Eliyahu and Omer Sadika as inventors.
          reconciliation_needed: Invention assignment and asset-transfer chain from Secful-era work to Salt.
        evidence_claim_ids: [EC-015, EC-023]
        source_ids: [SRC-017, SRC-018]
