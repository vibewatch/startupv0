  - table_id: T-017
    title: Patent and IP provenance evidence
    chapter_id: VI
    section_id: VI.A
    purpose: Connect public patent records to founder/IP diligence.
    columns:
      - name: item
        description: Public IP fact.
      - name: evidence
        description: Source-backed detail.
      - name: diligence_implication
        description: Why it matters.
    rows:
