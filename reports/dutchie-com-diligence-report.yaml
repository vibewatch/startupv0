report_metadata:
  report_title: Dutchie.com Startup Diligence Report
  target_company: Dutchie.com
  website: https://dutchie.com/
  known_aliases:
    - Dutchie
    - dutchie.com
  sector: Cannabis retail technology, point of sale, ecommerce, payments and compliance
  geography: United States and Canada / North America cannabis retail
  company_stage: Private unicorn / cannabis retail technology platform
  research_date: 2026-05-23
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the target list from public unicorn-list sources and excluded reports already present in the repository.
    - Collected company-owned sources, reputable news or market-database sources, and public product/legal/regulatory
      signals where accessible.
    - Treated company-published claims as verified only for the existence of the public statement unless independently
      corroborated.
    - Used not_publicly_verifiable for financial statements, cap table, customer contracts, HR materials, legal dockets
      and security reports that require private diligence.
  included_jurisdictions:
    - United States
    - Canada
    - State-level cannabis markets referenced by public sources
  excluded_topics:
    - Private data-room materials, management interviews, customer calls, complete legal docket searches, security
      reports, tax records and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-23
      notes: No pitch deck, financial model, founder responses, customer references or data-room exports were provided.
