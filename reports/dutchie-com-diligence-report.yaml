executive_summary:
  overall_assessment: Dutchie.com appears to be an active private cannabis retail technology unicorn with strong public
    funding, acquisition, product-suite and dispensary-scale evidence. The key diligence issues are current valuation
    support, revenue quality, customer concentration/retention, cannabis regulatory exposure, payments economics and
    whether official transaction-volume claims translate into durable software revenue.
  investment_or_diligence_thesis: Proceed to confirmatory diligence focused on regulated-market durability. A positive
    thesis requires proving high-retention dispensary software revenue, compliant payments and traceability operations,
    resilient gross margins, manageable customer concentration and financing terms that still support the public unicorn
    valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CNBC reports a $200M Series C at a $1.7B valuation.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: CB Insights and Dutchie official pages describe a broad cannabis retail technology platform.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-004
      summary: Public sources report dispensary footprint and official transaction-volume claims.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality is not publicly verifiable
    - risk_id: R-002
      summary: Headline valuation may be stale or hard to reconcile
    - risk_id: R-003
      summary: Customer concentration, retention and revenue conversion are opaque
    - risk_id: R-004
      summary: Cannabis, payments and state traceability compliance are existential operating dependencies
  key_evidence_gaps:
    - Audited financial statements, ARR/revenue by product and geography, gross margin, cash, debt and forecast model.
    - Current cap table, liquidation preferences, option pool, warrants, debt instruments and valuation support.
    - Top-customer revenue, contract terms, renewal status, churn, NRR/cohort metrics and receivables concentration.
    - Sales pipeline, CAC, payback, quota attainment, channel economics and budget-to-actuals.
    - Technical architecture review, security reports, incident history, IP assignments and product roadmap.
    - Legal docket search, regulatory correspondence, material contracts, insurance, employment agreements and HRIS
      export.
  recommended_next_steps:
    - Run confirmatory financial and cap-table diligence before relying on headline unicorn valuation.
    - Request customer cohorts, top-account contracts and independent customer references.
    - Have counsel and specialists review regulatory, privacy, IP, security and material-contract records.
    - Benchmark pricing, win/loss, retention and product quality against direct competitors.
