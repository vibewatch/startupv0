report_metadata:
  report_title: Tipalti Startup Diligence Report
  target_company: Tipalti
  website: https://tipalti.com/
  known_aliases:
    - Tipalti, Inc.
    - Tipalti Solutions Ltd.
    - Approve.com (acquired product lineage)
    - Statement (treasury product lineage)
  sector: Fintech / finance automation / global payables automation
  geography: United States headquarters; global operations including Israel, UK, EU, Canada and other offices referenced publicly
  company_stage: Private unicorn / late-stage growth company
  research_date: 2026-05-31
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard depth with public company pages, independent news, CB Insights, LinkedIn, customer stories and competitor product pages.
    - Treated company-published scale, product, regulatory, security and customer claims as verified only for the existence of the public statement unless independently corroborated.
    - Excluded non-public data-room diligence; financial statements, cap table, contracts, SOC reports, insurance, regulatory exams and legal docket searches require company/counsel access.
  included_jurisdictions:
    - United States
    - United Kingdom
    - European Union
    - Canada
    - Israel
    - Cross-border payments and tax-compliance jurisdictions referenced publicly
  excluded_topics:
    - Non-public audited financial statements, board decks, forecasts, debt agreements, option ledgers and investor rights documents
    - Customer contracts, bank/supplier agreements, pricing schedules, customer-level revenue, churn cohorts and implementation SOWs
    - SOC reports, penetration tests, incident logs, regulatory examination correspondence, legal dockets and insurance policies
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request to create Tipalti diligence report
      type: workflow_request
      date_received: 2026-05-31
      notes: No pitch deck, financial model, data room, founder response or customer reference materials were provided.
founder_claims:
