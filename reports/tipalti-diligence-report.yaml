risk_register:
  - risk_id: R-001
    risk_title: Stale headline valuation and opaque financial quality
    risk_category: financial
    severity: high
    likelihood: high
    description: The $8.3B valuation was set in late 2021; audited revenue, gross margin, cash, burn, payment economics and current valuation marks are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-004
      - EC-018
    mitigation_or_diligence_request: Request audited financials, ARR cohorts, payment gross margin, cash/burn, valuation bridge, 409A and investor marks.
  - risk_id: R-002
    risk_title: Customer concentration, retention and implementation opacity
    risk_category: customer
    severity: high
    likelihood: high
    description: Public sources show customer logos and scale but not revenue concentration, retention, pricing, implementation backlog, customer health or module attach rates.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - V.D
    evidence_claim_ids:
      - EC-006
      - EC-012
      - EC-013
      - EC-023
    mitigation_or_diligence_request: Request top-customer revenue, renewal schedule, NRR/GRR, implementation cycle time, support tickets and references.
  - risk_id: R-003
    risk_title: Regulated payments, AML/sanctions and tax-compliance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Cross-border funds movement creates licensing, AML, OFAC, tax-reporting and reserve obligations.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.F
      - VIII.G
      - II.A
    evidence_claim_ids:
      - EC-008
      - EC-010
      - EC-025
    mitigation_or_diligence_request: Payments counsel should review license matrix, exams, AML/sanctions testing, bank contracts, reserves and complaint history.
  - risk_id: R-004
    risk_title: Crowded AP/spend-management competition
    risk_category: market
    severity: high
    likelihood: medium
    description: BILL, Coupa, Ramp and ERP-native workflows publicly market overlapping AP, payments, expense, procurement, AI and ERP-integration capabilities.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-014
      - EC-015
      - EC-016
    mitigation_or_diligence_request: Request win/loss, pricing, sales-cycle, churn-by-competitor and pipeline conversion data.
  - risk_id: R-005
    risk_title: Platform breadth can create product and implementation complexity
    risk_category: product
    severity: medium
    likelihood: high
    description: A connected suite across AP, payouts, procurement, expenses, cards, treasury and AI can increase implementation scope, data migration and support burden.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-019
    mitigation_or_diligence_request: Review implementation backlog, time-to-value, module attach, support SLAs, professional-services margin and defect trends.
  - risk_id: R-006
    risk_title: Security, privacy and funds-flow incident risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Tipalti handles sensitive supplier, tax, bank and payments data; public controls need corroboration by SOC reports, tests and incident history.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids:
      - EC-011
      - EC-022
    mitigation_or_diligence_request: Review SOC 1/2, pen tests, incident register, BCP/DR tests, data-flow maps, DPA templates and subprocessors.
  - risk_id: R-007
    risk_title: Customer ROI and operational claims may be selection-biased
    risk_category: reputational
    severity: medium
    likelihood: medium
    description: Customer-story metrics are selected marketing evidence and may not represent median customer outcomes.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.B
    evidence_claim_ids:
      - EC-013
    mitigation_or_diligence_request: Request independent customer references, survey results, cohort-level ROI and support/implementation data.
  - risk_id: R-008
    risk_title: Payments volume and FX economics sensitivity
    risk_category: financial
    severity: medium
    likelihood: medium
    description: Large payment volume can amplify FX, interest-rate, bank-partner, fraud-loss and macro exposure if economics or controls degrade.
    impacted_chapter_ids:
      - I
      - VIII
    impacted_section_ids:
      - I.D
      - VIII.G
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-008
    mitigation_or_diligence_request: Analyze revenue by fee type, FX spread, bank costs, fraud losses, returns and sensitivity to payment volume.
  - risk_id: R-009
    risk_title: Debt/growth financing terms unknown
    risk_category: financing
    severity: medium
    likelihood: medium
    description: The 2023 JPMorgan/Hercules financing could include covenants, collateral, warrants or liquidity constraints not visible publicly.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-004
    mitigation_or_diligence_request: Review credit agreements, warrant coverage, covenants, repayment schedule, collateral and board consents.
  - risk_id: R-010
    risk_title: Leadership transition and retention risk
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public pages show a scaled team and leadership changes since 2023; compensation, retention and succession plans are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.C
      - VII.D
      - VII.E
    evidence_claim_ids:
      - EC-020
      - EC-021
    mitigation_or_diligence_request: Request executive agreements, option grants, attrition data, compensation benchmarks and succession plans.
  - risk_id: R-011
    risk_title: AI product claims need governance and accuracy evidence
    risk_category: technical
    severity: medium
    likelihood: medium
    description: AI assistant/agent claims in finance workflows require evidence of model accuracy, auditability, data leakage controls and human-review mechanisms.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids:
      - EC-007
      - EC-009
      - EC-019
    mitigation_or_diligence_request: Review AI governance, validation datasets, audit logs, customer terms and human-in-the-loop design.
  - risk_id: R-012
    risk_title: Legal, IP and insurance gaps are not public
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public sources did not provide definitive litigation docket, trademark/patent portfolio, insurance coverage or material-contract schedules.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
      - VIII.F
    evidence_claim_ids:
      - EC-024
    mitigation_or_diligence_request: Ask counsel for litigation searches, IP schedules, insurance certificates, material contract list and indemnity exposure.
  - risk_id: R-013
    risk_title: International tax-reporting localization and regulatory-change burden
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Tax, DAC7/VAT/W-8/W-9 and payment-method requirements evolve by jurisdiction and could require continued compliance investment.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids:
      - EC-008
      - EC-010
    mitigation_or_diligence_request: Review tax engine coverage, jurisdictional roadmap, compliance staffing, regulatory-change management and error/remediation history.
  - risk_id: R-014
    risk_title: Acquisition/product-integration execution risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Procurement, expense, card and treasury expansion broadens the platform; acquired or new modules may carry integration and retention risk.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids:
      - EC-009
      - EC-019
    mitigation_or_diligence_request: Review integration milestones, architecture, migration status, retention and cross-sell performance.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR/bookings, gross margin, payment economics, cash, burn and debt schedule.
    why_it_matters: These determine whether the 2021 valuation remains supportable.
    suggested_source_or_request: Company CFO data room; audited financials; monthly management KPI pack.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, liquidation preferences, debt terms, covenants, warrants and valuation marks.
    why_it_matters: Structured terms or debt could materially change common-equity value.
    suggested_source_or_request: Financing documents, credit agreements, board approvals and 409A/secondary data.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer revenue concentration, NRR/GRR, churn, product attach and implementation backlog.
    why_it_matters: Public logos do not prove durable revenue quality.
    suggested_source_or_request: Customer cohort tables, top-customer contracts and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.G
    missing_information: License matrix, AML/sanctions testing, regulator correspondence, tax-reporting controls and bank-contract terms.
    why_it_matters: Payments compliance failures can produce fines, license loss, bank termination or reputational damage.
    suggested_source_or_request: Payments counsel review, compliance data room and regulator/license records.
    priority: high
  - gap_id: G-005
    chapter_id: II
    section_id: II.A
    missing_information: Module-level ARR, attach rates, implementation cycle times, defect rates and AI governance.
    why_it_matters: Suite breadth may mask uneven adoption and execution risk.
    suggested_source_or_request: Product analytics, roadmap, support metrics and AI model governance pack.
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC reports, penetration tests, incident history, uptime records and disaster-recovery tests.
    why_it_matters: Tipalti handles sensitive payment, tax and bank data.
    suggested_source_or_request: Security data room under NDA.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, attrition, compensation, option pool and executive retention.
    why_it_matters: Execution depends on talent retention and scalable operating model.
    suggested_source_or_request: HR data room and management interviews.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation docket, IP schedule, insurance coverage and material contract list.
    why_it_matters: Legal liabilities, IP defects or insurance gaps can impair transaction value.
    suggested_source_or_request: Counsel-led diligence and company legal schedule.
    priority: medium
