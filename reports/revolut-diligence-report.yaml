  "overall_assessment": "Revolut Group Holdings Ltd. passed a public-source eligibility screen as an uncovered unicorn target and has real public evidence for valuation/status and product existence. The diligence posture remains evidence-gap heavy because private financial, customer, cap-table, legal and personnel records are not public."
