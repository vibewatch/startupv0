        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-022
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public source reviewed disclosed significant severed customer, supplier, or partner relationships in the last two years.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.D.F1
