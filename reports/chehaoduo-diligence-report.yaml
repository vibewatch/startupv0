        evidence_gaps:
          - Top suppliers by spend/volume, logistics/payment/financing partners, inspection staffing model, and cloud/app dependencies are missing.
        follow_up_questions:
          - Provide supplier spend by vendor, supply-channel volume, service-level agreements, and concentration analysis.
        table_ids:
          - T-008
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-023
  - chapter_id: IV
    title: Competition
    chapter_summary: Independent public-company filings confirm a highly competitive China online automobile transaction market. Chehaoduo competes on brand, supply, inspection trust, user reach, pricing, and service execution.
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-014
      - EC-015
      - EC-016
    risk_ids:
      - R-003
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Competitors include Uxin, Autohome/Che168/TTP, Renrenche, Souche/Yixin/dealers, and large internet platforms. Public filings emphasize user reach, supplier relationships, brand, and service as competitive axes.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: IV.A.F1
            finding: Autohome explicitly names Guazi, Uxin, Renrenche, Meituan, and JD.com as online automobile transaction competitors.
            evidence_claim_ids:
              - EC-015
            risk_ids:
              - R-003
          - finding_id: IV.A.F2
            finding: Uxin provides a comparable inventory-owning used-car retailer model with online and offline operations.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-003
        hidden_risks:
          - Guazi may face margin pressure from inventory-owning competitors, dealer channels, new-energy residual-value volatility, and platform CAC inflation.
        evidence_gaps:
          - Chehaoduo current market share, active listings, sold units, CAC, inventory turns, and gross margin versus competitors are missing.
        follow_up_questions:
          - Provide competitive win/loss, market-share data, pricing benchmark, CAC by channel, and unit economics versus Uxin, Autohome/Che168, Renrenche, Souche, and dealers.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-014
          - EC-015
          - EC-016
