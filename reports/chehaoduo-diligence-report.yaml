    chapter_summary: GTM appears to combine app-store distribution, official web traffic, auctions, national buyer network claims, historical 58.com traffic support, and offline inspection/service operations. Sales productivity and budget sufficiency remain private.
    founder_claim_ids:
      - FC-002
      - FC-004
    evidence_claim_ids:
      - EC-002
      - EC-008
      - EC-009
      - EC-010
      - EC-018
      - EC-026
    risk_ids:
      - R-002
      - R-003
      - R-004
      - R-005
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: Public GTM claims emphasize direct-source pricing, auctions, official inspection, platform protections, national buyer reach, app distribution, and 58.com traffic resources.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A.F1
