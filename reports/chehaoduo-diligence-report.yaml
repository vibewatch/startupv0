executive_summary:
  overall_assessment: Chehaoduo appears eligible as a private unicorn based on CB Insights and live Guazi app listings, with strong public evidence for a large China used-car marketplace history. Diligence should remain cautious because financials, cap table, customer economics, legal status, and operating KPIs are not public.
  investment_or_diligence_thesis: The investable question is whether Chehaoduo converted large funding, brand reach, inspection infrastructure, and marketplace liquidity into durable, compliant, positive-unit-economics used-car transactions despite intense competition and historical marketing/legal risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Guazi/Chehaoduo publicly operates a used-car trading platform linking buyers and sellers.
      evidence_claim_ids:
        - EC-002
        - EC-008
        - EC-011
    - founder_claim_id: FC-003
      summary: CB Insights lists Chehaoduo as a US$10B China Consumer & Retail unicorn, and app listings remain live.
      evidence_claim_ids:
        - EC-001
        - EC-025
    - founder_claim_id: FC-006
      summary: Public history supports the Guazi/Maodou integration into Chehaoduo lineage.
      evidence_claim_ids:
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements and unit economics are private.
    - risk_id: R-003
      summary: Competition from Uxin, Autohome/Che168, Renrenche, large platforms, and dealers can pressure CAC and margins.
    - risk_id: R-004
      summary: Historical advertising/regulatory and litigation snippets require official legal confirmation.
    - risk_id: R-007
      summary: Large financing rounds imply cap-table and preference-stack complexity not visible publicly.
  key_evidence_gaps:
    - Audited financials, cap table, and preference stack.
    - Transaction-level GMV, take rate, margin, CAC, retention, and warranty data.
    - Current litigation/regulatory certificates and official penalty records.
    - Current org chart, headcount, turnover, compensation, and key employment agreements.
    - Material contracts, insurance, IP registry extracts, and supplier concentration.
  recommended_next_steps:
    - Condition any investment work on a full data-room request covering financials, cap table, transactions, legal, HR, IP, insurance, and material contracts.
    - Run PRC counsel docket/regulator/IP registry searches for all Chehaoduo/Guazi/Maodou entities.
    - Benchmark unit economics and market share against Uxin, Autohome/Che168/TTP, Renrenche, Souche/Yixin, and dealer channels.
    - Perform transaction sampling to test inspection accuracy, warranty claims, title-transfer compliance, and buyer/seller satisfaction.
    - Re-fetch blocked official/company sources or use licensed databases before relying on snippet-based claims.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Chehaoduo as a late-stage private unicorn with multiple large financings, but core financial statements, revenue quality, cash runway, debt, and ownership economics are not public.
    founder_claim_ids:
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-020
      - EC-021
      - EC-025
    risk_ids:
      - R-001
      - R-007
      - R-008
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or management financial statements were public. The only quantitative public signals are financing history, app ratings, valuation markers, and broad market statistics.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A.F1
            finding: Audited income statements, balance sheets, cash flows, product/channel/geography revenue, backlog, and AR aging were not available from public sources.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-001
        hidden_risks:
          - Revenue quality, gross margin, cash burn, credit losses, warranty reserves, and AR collection risk could be materially different from public valuation signals.
        evidence_gaps:
          - Three-year audited financials, monthly management accounts, product/channel/geographic revenue, backlog, AR aging, cash and debt schedule are missing.
        follow_up_questions:
          - Provide audited financials and monthly management reports for 2023-2026 YTD, including revenue recognition and warranty-reserve accounting.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-020
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No board-approved projections were public. Market-volume snippets suggest category growth, but Chehaoduo-specific growth drivers and assumptions cannot be tested publicly.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B.F1
            finding: Public market statistics indicate used-vehicle transaction growth, but Chehaoduo share, take rate, CAC, price assumptions, capex, and financing assumptions are not disclosed.
            evidence_claim_ids:
              - EC-016
              - EC-020
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Category growth could mask share loss, subsidy-driven growth, or working-capital strain.
        evidence_gaps:
          - Quarterly three-year projections, scenario assumptions, growth-driver bridge, FX/China macro sensitivity, capex plan, and external financing assumptions are missing.
        follow_up_questions:
          - Provide base/upside/downside model with unit economics by channel and vehicle type.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-016
          - EC-020
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify major historical investors and founder/58 Ganji ownership history, but not shares outstanding, preferences, options, debt, or current ownership.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C.F1
            finding: CB Insights lists Chehaoduo at US$10 billion and 36Kr reports historical founder/58 Ganji ownership, but current cap table terms are not public.
            evidence_claim_ids:
              - EC-001
              - EC-013
              - EC-021
              - EC-025
            risk_ids:
              - R-006
              - R-007
        hidden_risks:
          - Large late-stage rounds may include liquidation preferences, ratchets, investor vetoes, secondary transactions, or debt that materially affect common-equity value.
        evidence_gaps:
          - Current shareholder register, fully diluted capitalization, option/warrant/debt instruments, investor rights, side letters, and off-balance-sheet liabilities are missing.
        follow_up_questions:
          - Provide current cap table, preference stack, option ledger, debt schedule, investor rights, board consents, and Chinese registry extracts.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-013
          - EC-021
          - EC-025
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is the strongest public financial evidence. Tax positions, accounting policies, revenue recognition, and debt terms remain non-public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D.F1
            finding: Public financing timeline includes 2016, 2018, 2019, 2020, and 2021 rounds, but accounting/tax policies are not public.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-004
              - EC-005
              - EC-006
              - EC-007
            risk_ids:
              - R-001
              - R-007
        hidden_risks:
          - Financing proceeds could have supported subsidies or loss-making operations; tax and accounting treatment of finance/warranty revenue could be complex.
        evidence_gaps:
          - Tax positions, NOLs, revenue-recognition memos, warranty accounting, financing-commission treatment, and round documents are missing.
        follow_up_questions:
          - Provide tax memos, revenue-recognition policies, board financing approvals, proceeds use, and investor materials for each round.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-005
          - EC-006
          - EC-007
  - chapter_id: II
    title: Products
    chapter_summary: Public product evidence shows a used-car buying/selling marketplace with official inspection, direct-source supply, auctions, after-sales protection, and new-energy used-car features; product economics and quality outcomes are not public.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-017
      - EC-024
      - EC-026
    risk_ids:
      - R-001
      - R-003
      - R-005
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Guazi public listings describe used-car purchase, sale, auction, inspection, warranty, title-transfer, logistics, and finance-related services. Maodou New Cars appears in historical sources, but current contribution is not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A.F1
            finding: App listings verify active Guazi buy/sell and seller workflows with inspection and after-sales claims.
            evidence_claim_ids:
              - EC-008
              - EC-009
            risk_ids:
              - R-005
          - finding_id: II.A.F2
            finding: Public sources do not disclose pricing, take rates, margins, unit economics, or product-level growth rates.
            evidence_claim_ids:
              - EC-026
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Inspection/warranty failures could damage trust; monetization may depend on finance/insurance or service fees not visible in marketing pages.
        evidence_gaps:
          - Product-level revenue, growth, profitability, warranty loss ratios, customer complaints, finance attach, and Maodou current status are missing.
        follow_up_questions:
          - Provide current product catalog, fee schedule, product P&Ls, warranty reserve data, inspection accuracy metrics, and Maodou status.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-017
          - EC-024
          - EC-026
  - chapter_id: III
    title: Customer Information
    chapter_summary: Chehaoduo is consumer/marketplace oriented, so public sources identify customer segments rather than named enterprise accounts. Customer-level revenue, top-customer concentration, churn, and severed relationships are not public.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-004
    evidence_claim_ids:
      - EC-008
      - EC-009
      - EC-010
      - EC-022
      - EC-023
    risk_ids:
      - R-002
      - R-005
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public sources identify applications for buyers, sellers, 4S stores, wholesalers, and auction buyers, but not top 15 customers or transaction volume by customer.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A.F1
            finding: The main app describes buyer, seller, direct-source, inspection, warranty, and auction use cases with visible App Store ratings.
            evidence_claim_ids:
              - EC-008
              - EC-010
            risk_ids:
              - R-002
              - R-005
        hidden_risks:
          - Marketplace liquidity could depend on a small number of wholesale buyers, finance partners, or geographic hubs that are not visible publicly.
        evidence_gaps:
          - Top customer lists, customer revenue by year, transaction frequency, seller/buyer cohorts, and customer complaints are missing.
        follow_up_questions:
          - Provide top 15 buyer/seller/partner cohorts by GMV and contribution margin for 2024-2026 YTD.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-008
          - EC-010
          - EC-022
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public sources show historical 58.com support, vehicle-source relationships, app-store distribution, and investor relationships, but no revenue contribution by partnership.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B.F1
            finding: 58.com traffic/support and investor participation are public; 4S store and dealer supply relationships are claimed in app listings.
            evidence_claim_ids:
              - EC-002
              - EC-008
              - EC-023
            risk_ids:
              - R-002
              - R-005
        hidden_risks:
          - Partner terms could include exclusivity, minimums, subsidies, or termination rights not public.
        evidence_gaps:
          - Marketing agreements, partner revenue contribution, finance/insurance partner terms, and severed strategic relationships are missing.
        follow_up_questions:
          - Provide partner contracts, revenue and volume by strategic partner, and any terminated partner list since 2024.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-002
          - EC-008
          - EC-023
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No revenue by customer or concentration threshold data is public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C.F1
            finding: The public record does not disclose any customer contributing 5% or more of revenue, nor does it prove the absence of such concentration.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-002
        hidden_risks:
          - Consumer marketplace scale can still hide concentration in finance partners, warranty providers, wholesalers, or traffic channels.
        evidence_gaps:
          - Revenue by customer, cohort, channel, geography, finance/insurance partner, and wholesale buyer is missing.
        follow_up_questions:
