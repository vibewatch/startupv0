report_metadata:
  report_title: Chehaoduo Public-Source Startup Diligence Report
  target_company: Chehaoduo
  website: https://www.guazi.com/
  known_aliases:
    - Guazi.com
    - Guazi Used Car
    - Che Hao Duo Used Automobile Agency (Beijing) Co., Ltd.
    - Maodou New Cars
    - Chehaoduo Group
  sector: Consumer & Retail; automotive e-commerce; used-car marketplace and services
  geography: China, headquartered in Beijing with public claims of nationwide city coverage
  company_stage: Late-stage private unicorn
  research_date: 2026-06-08
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless noted; CNY used for China regulatory penalties
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized CB Insights for unicorn eligibility and valuation metadata supplied by the user.
    - Used primary/company-controlled sources where available, including 58.com/PR Newswire and Apple App Store listings controlled by Che Hao Duo entities.
    - Used independent public-company filings from Uxin and Autohome to benchmark competition.
    - Used 36Kr Global for founder and corporate-history context.
    - Used search-result snippets only where original Chinese news, registry, or company pages were blocked; those claims are marked lower confidence or partially verified.
    - Did not bypass paywalls, anti-bot controls, private databases, or access restrictions.
  included_jurisdictions:
    - China
    - Cayman Islands where relevant to public-company comparables
    - United States SEC filings for competitors
  excluded_topics:
    - No company data room, customer interviews, supplier calls, investor confirmations, counsel letters, or auditor workpapers were available.
    - No full PRC corporate registry, CNIPA trademark/patent, court docket, tax, insurance, or EHS registry extraction was completed.
    - No private personal contact details were collected or included.
  user_provided_materials:
    - material_id: M-001
      title: User prompt with CB Insights candidate metadata
      type: prompt_argument
      date_received: 2026-06-08
      notes: Selected target Chehaoduo; requested public-source standard diligence YAML at reports/chehaoduo-diligence-report.yaml.
