        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E.F1
            finding: App listings identify 4S stores, individual sellers, wholesalers, inspection workforce, and buyer network as operational dependencies.
            evidence_claim_ids:
              - EC-008
              - EC-009
              - EC-023
            risk_ids:
