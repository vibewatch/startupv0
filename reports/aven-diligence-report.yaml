report_metadata:
  report_title: Aven Startup Diligence Report
  target_company: Aven
  website: https://www.aven.com/
  known_aliases:
    - Aven
    - Aven Financial
    - AvenCard
  sector: Consumer finance, home-equity credit and credit cards
  geography: United States consumer finance
  company_stage: Private unicorn / growth-stage consumer finance company
  research_date: 2026-05-19
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Selected company from current public unicorn-list sources after excluding report slugs already present in the repository.
    - Prioritized company-owned pages, reputable news/market databases, technical repositories and third-party review/profile sources.
    - Treated company-published metrics as verification that the public claim exists, not independent audit of underlying performance.
    - Did not bypass paywalls, bot protections, access controls or rate limits; inaccessible records are disclosed as limitations.
  included_jurisdictions:
    - United States
    - Global markets referenced by public materials
  excluded_topics:
    - Private financial statements, cap table, contracts, customer calls, security reports, regulatory correspondence, counsel letters and non-public HR records were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-19
      notes: No pitch deck, financial model, data room, founder responses or customer references were provided.
