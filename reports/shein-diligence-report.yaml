executive_summary:
  overall_assessment: SHEIN appears to be an active private unicorn based on current public unicorn-list evidence and company-owned operating materials. Public evidence supports category presence, product activity and selected scale or partner signals, but investment-grade diligence remains unresolved because financial statements, customer economics, cap table, material contracts, legal docket details and retention data are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A diligence thesis for SHEIN requires proving that the public valuation is supported by durable revenue quality, defensible product adoption, compliant operations, manageable legal/regulatory exposure and financing terms that preserve investor economics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: SHEIN is listed as a unicorn at $66B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: SHEIN publicly describes a global online fashion and lifestyle retail and marketplace model with on-demand production.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-005
      summary: SHEIN public materials show an active global operating footprint, supplier programs and European logistics expansion.
      evidence_claim_ids:
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-006
      summary: Supply-chain, customs, labor, product-safety and IP scrutiny is material
    - risk_id: R-001
      summary: Public valuation is not backed by audited financials or current IPO valuation bridge
    - risk_id: R-007
      summary: Supplier and logistics dependencies are central but concentration and contract terms are private
  key_evidence_gaps:
    - Audited financial statements, cash/debt, revenue by product/channel/geography, gross margin, retention, CAC/payback and forecast model.
    - Cap table, preference stack, option pool, debt instruments, warrants, secondary transactions and current valuation bridge.
    - Top-customer or top-account schedule, contracts, renewal/cohort data, churn/NRR, supplier spend and severed-relationship schedule.
    - Product roadmap, reliability/security evidence, technical debt, R&D budget and defensibility artifacts.
    - Complete legal docket, regulatory correspondence, IP assignments, privacy/security reports, employment agreements and material contracts.
  recommended_next_steps:
    - Run quality-of-revenue and valuation bridge diligence before relying on the headline unicorn valuation.
    - Request customer/supplier contracts, cohorts and independent references to test concentration and retention.
    - Have counsel and compliance specialists review regulatory, IP, privacy, security, employment and jurisdiction-specific risks.
    - Benchmark product differentiation, pricing power and go-to-market efficiency against direct competitors using win/loss and buyer-reference evidence.
