report_metadata:
  report_title: SHEIN Startup Diligence Report
  target_company: SHEIN
  website: https://www.sheingroup.com/
  known_aliases:
    - SHEIN
    - Shein Group
    - Roadget Business Pte. Ltd.
  sector: Global online fashion, lifestyle retail and marketplace
  geography: Singapore / China-origin global operations
  company_stage: Private unicorn / growth-stage company
  research_date: 2026-05-26
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from reports/*-diligence-report.yaml before target selection.
    - Fetched public unicorn-list sources from CB Insights and Wikipedia and selected this uncovered target via shuf.
    - Prioritized company-owned sources, public funding/list sources, governance/legal pages and reputable public evidence available without paywall bypass.
    - Treated company-published claims as verified only for the existence of the public statement unless corroborated independently.
    - No private data room, management interview, customer call, legal docket export, security report, cap table or financial model was available.
  included_jurisdictions:
    - Singapore
    - China supply chain
    - United States
    - European Union
    - United Kingdom
    - Poland logistics operations
  excluded_topics:
    - Private financial statements, cap table, material contracts, customer calls, board materials, security reports, legal docket exports and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-26
      notes: No pitch deck, financial model, data room or founder responses were provided.
