executive_summary:
  overall_assessment: Juniper Square appears eligible for this run as an uncovered active private unicorn based on the CB Insights current unicorn list and active public company sources. Public evidence supports a real operating business and product footprint, but investability remains dominated by private financial quality, customer/revenue concentration, controls, legal/regulatory posture, cap-table economics and execution proof.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The public unicorn valuation ($1.02 billion) and product/customer/regulatory signals justify further review, but no transaction should rely on the public record without audited financials, customer references, cap table, control artifacts and counsel-led searches.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Juniper Square as a $1.02 billion unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company-owned sources verify the public product positioning and product family.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-003
      summary: Public customer, partner, security or regulatory proof points support commercial activity, subject to private validation.
      evidence_claim_ids:
        - EC-003
        - EC-005
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Revenue quality, software-versus-services gross margin, valuation bridge, cash runway, and cap-table terms are not public.
    - risk_id: R-002
      summary: Customer/revenue concentration and contract durability are unknown despite large company-stated platform scale.
    - risk_id: R-003
      summary: Private-market data, fund-administration, AI, SOC/security, GDPR/CCPA, and operational-control exposure require audit artifacts.
  key_evidence_gaps:
    - Audited financial statements, ARR/bookings, gross margin, cash, burn, debt and working capital schedules
    - Cap table, investor rights, option pool, notes/warrants, liquidation waterfall and board approvals
    - Top customer/client revenue, retention, churn, NPS, cohort and concentration data
    - Sales funnel, CAC, payback, quota, pipeline, marketing spend and channel mix
    - Roadmap, engineering velocity, incidents, uptime/SLA and product-margin data
    - Employee census, org chart, attrition, compensation, hiring plan and key-person agreements
  recommended_next_steps:
    - Request audited financials, cap table and valuation bridge before underwriting valuation.
    - Run customer/client references and top-customer concentration diligence.
    - Review security, privacy, legal, regulatory and insurance materials with counsel and technical specialists.
    - Validate product usage, roadmap, uptime/SLA, unit economics and GTM efficiency with primary operating data.
