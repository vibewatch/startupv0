risk_register:
  - risk_id: R-001
    risk_title: Valuation and financial quality not underwritten publicly
    risk_category: financial
    severity: high
    likelihood: high
    description: The $2.7B valuation and growth metrics are public, but audited
      financials, revenue quality, gross margin, burn, runway and EBITDA
      adjustments are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Perform QoE, runway, revenue-cohort and working-capital diligence.
  - risk_id: R-002
    risk_title: Capital structure and preference stack opaque
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Multiple growth rounds and equity M&A can create preference,
      governance, debt and dilution complexity not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Request cap table, financing documents, side
      letters, debt and option schedules.
  - risk_id: R-003
    risk_title: Customer concentration and retention unknown
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named logos do not reveal revenue concentration, churn, NRR,
      contract terms or receivables quality.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Request customer revenue waterfall, NRR/GRR cohorts and references.
  - risk_id: R-004
    risk_title: AmTrav and Yokoy integration execution risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Recent acquisitions expand product/geography but add integration,
      customer migration, systems and culture risk.
    impacted_chapter_ids:
      - III
      - VI
      - VII
      - VIII
    impacted_section_ids:
      - III.B
      - VI.B
      - VII.A
      - VIII.F
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Review integration plan, acquired retention,
      systems migration and purchase agreements.
  - risk_id: R-005
    risk_title: Competitive pricing and product pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: TravelPerk competes with Navan, SAP Concur and managed TMCs across
      travel, expense and service.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Benchmark win/loss, pricing, discounts and margin by plan.
  - risk_id: R-006
    risk_title: Privacy, security and certification claims need verification
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Travel and spend workflows process sensitive employee, travel,
      payment and invoice data; public claims do not replace audits.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Obtain ISO/SOC evidence, DPAs, subprocessors,
      pen tests and incident history.
  - risk_id: R-007
    risk_title: Travel inventory, payments and integration dependency
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Platform depends on travel inventory, payment rails, cloud/security
      vendors and integrations with private contract terms.
    impacted_chapter_ids:
      - II
      - III
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - VI.B
      - VIII.F
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Request supplier agreements, SLAs, continuity
      plans and vendor concentration.
  - risk_id: R-008
    risk_title: Hiring scale, retention and compensation unknown
    risk_category: team
    severity: medium
    likelihood: medium
    description: Open roles and public executives do not reveal actual headcount,
      attrition, compensation or equity liabilities.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
      - VII.D
      - VII.G
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Request HRIS, attrition, compensation, equity
      and employee-relations records.
  - risk_id: R-009
    risk_title: Legal, IP and regulatory searches incomplete
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public screens are limited; full registry, docket, IP, insurance
      and regulatory schedules require counsel.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.G
    evidence_claim_ids: *a42
    mitigation_or_diligence_request: Commission counsel searches and export official IP/corporate records.
  - risk_id: R-010
    risk_title: Business travel cyclicality and macro sensitivity
    risk_category: market
    severity: medium
    likelihood: medium
    description: Business travel is large but sensitive to recession, travel shocks,
      supplier pricing and corporate policy shifts.
    impacted_chapter_ids:
      - I
      - IV
      - V
    impacted_section_ids:
      - I.B
      - IV.A
      - V.A
    evidence_claim_ids: *a43
    mitigation_or_diligence_request: Stress-test forecasts and regional/supplier exposure.
