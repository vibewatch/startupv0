report_metadata:
  report_title: TravelPerk Startup Diligence Report
  target_company: TravelPerk
  website: https://www.travelperk.com/
  known_aliases:
    - Perk
    - TravelPerk S.L.
    - PERK UK LTD
    - TRAVELPERK UK IRL LIMITED
    - AmTrav
    - Yokoy
  sector: Enterprise Tech / business travel and spend management SaaS
  geography: Barcelona, Spain with Europe, UK and U.S. public footprint
  company_stage: Private unicorn / growth-stage business travel and spend platform
  research_date: 2026-06-13
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used public evidence only: CB Insights, company
      product/pricing/press/security/legal pages, Companies House, public
      legal/search surfaces, independent news, competitor websites and market
      sources."
    - Treated company-owned pages as evidence of public representations, not
      independent proof of audited financial, customer, security or legal
      outcomes.
    - Marked private financials, cap table, contracts, customer concentration,
      supplier spend, HR, litigation, security audits and IP exports as
      not_publicly_verifiable.
  included_jurisdictions:
    - Spain
    - United Kingdom
    - United States
    - European Union / GDPR-relevant jurisdictions
    - Global business travel markets
  excluded_topics:
    - Private data room, customer calls, management interviews, paid court
      dockets, paid Spanish Mercantile Registry extracts, non-public regulator
      correspondence, SOC reports, penetration tests and insurance certificates.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for TravelPerk unicorn diligence report
      type: workflow_request
      date_received: 2026-06-13
      notes: No pitch deck, data room, financial model, customer references or
        management responses were provided.
    - material_id: UPM-002
      title: Selected candidate metadata from current unicorn list
      type: user_provided_public_metadata
      date_received: 2026-06-13
      notes: TravelPerk; slug travelperk; CB Insights valuation $2.7B; date joined
        1/12/2022; country Spain; city Barcelona; industry Enterprise Tech;
        investors LocalGlobe, Kinnevik, Felix Capital.
