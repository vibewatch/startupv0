executive_summary:
  overall_assessment: "TravelPerk/Perk appears eligible for a public unicorn
    diligence report: public sources support active private unicorn status, a
    January 2025 $200M Series E at a $2.7B valuation, current operations, hiring
    and public UK active entity evidence. No public IPO, acquisition as target
    or shutdown was found in the reviewed sources. Investment-grade reliance
    remains blocked by missing private financial, cap-table, customer, supplier,
    legal, IP, security and HR records."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The
    investability case depends on proving that TravelPerk converts a large
    business-travel/spend platform and recent Yokoy/AmTrav acquisitions into
    durable, compliant, profitable revenue while managing valuation,
    integration, supplier, privacy/security and competitive-pricing risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and financing evidence support active private unicorn
        status at a $2.7B public valuation marker.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-006
        - EC-025
    - founder_claim_id: FC-003
      summary: Public pages verify a broad travel and spend platform with integrations
        and add-ons.
      evidence_claim_ids:
        - EC-008
        - EC-010
    - founder_claim_id: FC-004
      summary: Public pricing verifies Starter, Premium and Pro travel tiers.
      evidence_claim_ids:
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Headline valuation and metrics cannot be underwritten without audited
        financials and QoE.
    - risk_id: R-002
      summary: Capital structure/preference stack opaque.
    - risk_id: R-003
      summary: Customer concentration and retention private.
    - risk_id: R-004
      summary: AmTrav/Yokoy integration risk.
    - risk_id: R-006
      summary: Privacy/security/compliance claims require private audit evidence.
  key_evidence_gaps:
    - Audited financials, revenue quality, bookings bridge, gross margin,
      cash/runway and tax/accounting policies.
    - Cap table, financing documents, preference stack, debt, options/warrants
      and legal entity chart.
    - Top customers, retention, supplier spend, contracts, SLAs and partner
      economics.
    - AmTrav/Yokoy integration, product architecture, AI governance, roadmap
      costs and IP/data rights.
    - Litigation/regulatory searches, IP records, SOC/ISO evidence, insurance,
      material contracts, HRIS, compensation, equity and turnover.
  recommended_next_steps:
    - Run financial QoE, cap-table and legal entity diligence before relying on
      the $2.7B valuation.
    - Request customer/supplier/partner data and perform reference calls.
    - Have counsel review privacy/security, payment, travel, data-transfer, IP,
      litigation, insurance and material contracts.
    - Benchmark pricing and win/loss against Navan, SAP Concur and managed TMCs.
    - Obtain HRIS, management, compensation, equity and post-M&A integration
      materials under NDA.
