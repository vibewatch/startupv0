executive_summary:
  overall_assessment: Abridge is a credible active private unicorn based on CB Insights and active public company materials. Public evidence supports product/category presence, customer or usage claims and ecosystem signals, but financial quality, retention, customer concentration, control effectiveness, legal exposure and cap-table economics remain private-data-room issues.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. Public evidence supports a real company with meaningful market traction signals, but any investment or transaction thesis depends on private proof of ARR durability, margin, retention, customer contracts, security/legal controls, product quality and financing terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Abridge at US$2.75B as a private unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Abridge publicly advertises its core product platform and workflows.
      evidence_claim_ids:
        - EC-002
        - EC-005
    - founder_claim_id: FC-004
      summary: Abridge has public integration or ecosystem signals.
      evidence_claim_ids:
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR and retention are not public.
    - risk_id: R-004
      summary: Customer count/logos/outcomes do not disclose ARR concentration or churn.
    - risk_id: R-007
      summary: Security, privacy, legal and regulatory exposure requires artifact review.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, retention/churn, gross margin, cash/debt and forecast model.
    - Cap table, investor rights, debt, option pool and valuation bridge.
    - Top customer ARR, contracts, deployment depth, churn/NRR and independent references.
    - Security/privacy/legal artifacts, incident register, regulatory correspondence and IP/data-rights evidence.
    - Sales productivity, CAC/payback, partner economics, implementation capacity and product adoption by module.
  recommended_next_steps:
    - Run revenue-quality and financial diligence before relying on headline valuation.
    - Request customer cohort, top-account contracts and independent references.
    - Have counsel and security specialists review legal, privacy, security, regulatory and IP artifacts.
    - Benchmark against direct competitors using win/loss, pricing, retention and buyer references.
