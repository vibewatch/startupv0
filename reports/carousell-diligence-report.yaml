risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and valuation durability
    risk_category: financial
    severity: high
    likelihood: high
    description: Carousell has a verified unicorn valuation anchor, but audited financials, cash conversion, revenue quality, cap table economics and current valuation are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-018
      - EC-020
    mitigation_or_diligence_request: Request audited statements, monthly management accounts, KPI pack, cap table, financing documents, current valuation support and runway analysis.
  - risk_id: R-002
    risk_title: Recommerce operating complexity and margin uncertainty
    risk_category: operational
    severity: high
    likelihood: medium
    description: Managed recommerce, certified goods, delivery, payments and sell-to-platform flows can improve trust but add inventory, inspection, refunds and vendor-cost exposure.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - V.A
      - VIII.F
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-010
      - EC-011
      - EC-023
      - EC-029
    mitigation_or_diligence_request: Obtain segment P&L, item-level margin, refund/return rates, vendor contracts and authentication accuracy.
  - risk_id: R-003
    risk_title: Trust, privacy, fraud and scam exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: The marketplace relies on user trust; company scam metrics are positive, but public reporting of a data-breach fine and ongoing scam tactics create regulatory and reputational risk.
    impacted_chapter_ids:
