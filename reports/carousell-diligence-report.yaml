diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, cash-flow history and revenue by product/channel/geography.
    why_it_matters: Required to underwrite revenue quality, gross margin, cash burn and working capital.
    suggested_source_or_request: Company CFO / audited financial statements / monthly KPI pack.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preferences, debt, notes, warrants, option pool and investor rights.
    why_it_matters: Determines proceeds waterfall, dilution and governance constraints.
    suggested_source_or_request: Company legal counsel and financing documents.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product/category P&L, take rate, refund/return rates, authentication accuracy and roadmap costs.
    why_it_matters: Managed recommerce may carry materially different margins and risk than classifieds.
    suggested_source_or_request: Product analytics, finance and operations exports.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top customers/sellers/dealers/partners by GMV and net revenue plus churn and cohort retention.
    why_it_matters: Public user scale does not reveal monetization concentration or revenue durability.
    suggested_source_or_request: Revenue data warehouse and CRM exports.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, channel mix, sales quota, sales cycle and marketing budget ROI.
    why_it_matters: Competitive pressure can make public traffic scale uneconomic.
    suggested_source_or_request: FP&A, marketing analytics and sales operations reports.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: AI model governance, security architecture, vendor list, model performance and data-rights documentation.
    why_it_matters: AI/search/moderation is core to trust and product velocity while raising privacy and vendor risk.
    suggested_source_or_request: CTO/security/data governance documentation.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS export by function/location, attrition, compensation, incentive-stock plans and succession plan.
    why_it_matters: Multi-market execution depends on retention and adequate staffing.
    suggested_source_or_request: HRIS, compensation committee and legal documents.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Official PDPC decision/remediation file, security audits, breach logs and cyber insurance.
    why_it_matters: Privacy and trust-safety exposure could be material to user trust and regulatory risk.
    suggested_source_or_request: Company counsel, DPO, insurer and PDPC record retrieval.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Trademark registrations, source-code assignments, open-source audit and data/IP rights schedule.
    why_it_matters: IP ownership underpins brand, product, AI and acquisition value.
    suggested_source_or_request: IP counsel and engineering legal records.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.F
    missing_information: Material contracts, SLAs, indemnities, payment/delivery/authentication vendor terms and insurance policies.
    why_it_matters: Contractual exposure and risk transfer are not visible from public product pages.
    suggested_source_or_request: Contracts register, vendor spend report and insurance broker summary.
    priority: high
