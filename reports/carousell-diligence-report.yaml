executive_summary:
  overall_assessment: Carousell appears to remain an active private Singapore unicorn with a verified US$1.1B 2021 valuation and broad Greater Southeast Asia classifieds/recommerce footprint. The diligence stance is cautious because financial quality, current valuation, cap table, customer economics, legal schedules, privacy remediation, vendor contracts and HR data are not publicly underwritable.
  investment_or_diligence_thesis: Proceed only with data-room-backed underwriting that proves Carousell can convert mobile classifieds scale and recommerce trust features into durable cash generation while controlling fraud/privacy, multi-market execution and competitive CAC pressure.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights row and Carousell’s STIC-led funding release support the US$1.1B unicorn valuation.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Company about/fact pages verify multi-category, multi-brand Greater Southeast Asia scope.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-004
      summary: App-store listings verify mobile distribution signals including 10M+ Google Play downloads and app monetization surfaces.
      evidence_claim_ids:
        - EC-006
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: "Financial opacity and valuation durability: audited financials, cap table and current valuation are private."
    - risk_id: R-003
      summary: "Trust, privacy and scam exposure: safety is central to the marketplace and public reporting indicates prior privacy enforcement risk."
    - risk_id: R-005
      summary: "Competitive pressure and CAC/payback: large regional and global platforms compete for sellers, buyers and attention."
  key_evidence_gaps:
    - Audited financials, monthly KPI pack, cash runway, segment P&L and revenue by product/channel/geography.
    - Fully diluted cap table, financing terms, investor rights, debt/warrants/options and current valuation support.
    - Top customers/sellers/dealers/partners by GMV and net revenue, cohort retention, churn and CAC/payback.
    - Official privacy enforcement/remediation materials, security audits, legal schedules, insurance and material contracts.
  recommended_next_steps:
    - Run financial/cap-table diligence before relying on the US$1.1B valuation anchor.
    - Conduct privacy, cybersecurity, trust-safety and consumer-protection legal diligence across major operating markets.
    - Validate product/category unit economics, managed-recommerce operations, vendor concentration and seller/dealer contract terms.
    - Review HR, leadership succession, compensation/equity incentives and multi-market operating structure.
chapters:
  - chapter_id: I
