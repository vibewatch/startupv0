report_metadata:
  report_title: Carousell Startup Diligence Report
  target_company: Carousell
  website: https://www.carousell.com/
  known_aliases:
    - Carousell Group
    - Carousell Pte. Ltd.
    - Carousell
    - Cho Tot
    - Mudah.my
    - Laku6
    - REFASH
    - LuxLexicon
    - OneShift
    - Revo Financial
  sector: Consumer & Retail / multi-category classifieds and recommerce marketplace
  geography: Singapore headquartered; Greater Southeast Asia presence including Singapore, Hong Kong, Malaysia, Indonesia, Philippines, Taiwan and Vietnam
  company_stage: Private unicorn / growth-stage marketplace group
  research_date: 2026-06-06
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Asia/Singapore
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the workflow-supplied CB Insights unicorn-list row as the requested unicorn-status source and corroborated valuation with Carousell’s 2021 primary funding announcement.
    - Prioritized company-owned pages, app-store listings, brand sites, competitor pages, and reputable public news/regulatory references where accessible.
    - Independently checked for active operations through current 2026 company releases and found no definitive public evidence of IPO, group acquisition or shutdown.
    - Marked audited financials, cap table, customer concentration, legal schedules, insurance, contracts, HR and tax matters as not_publicly_verifiable where public records were insufficient.
  included_jurisdictions:
    - Singapore
    - Hong Kong
    - Malaysia
    - Indonesia
    - Philippines
    - Taiwan
    - Vietnam
    - United States only for reported listing consideration context
  excluded_topics:
    - Private financial statements, cap table, board minutes, investor side letters, contracts, customer exports, HRIS data, security reports, source code, non-public regulator correspondence, paid legal/market databases and private personal contact details.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request with CB Insights unicorn-list row for Carousell
      type: workflow_request
      date_received: 2026-06-06
      notes: Included target company, normalized slug, output path, research date, initial CB Insights row, required schema/workflow and safety constraints.
