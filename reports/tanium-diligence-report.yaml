executive_summary:
  overall_assessment: Eligible uncovered private unicorn with strong public evidence for product
    category, private status, leadership, enterprise customer base and historical financing. Core
    diligence gaps are current financial performance, net retention, security incident history,
    legal exposure, sales efficiency, cloud transition economics and current valuation support.
  investment_or_diligence_thesis: Tanium is a mature, high-value endpoint management and security
    platform with large-enterprise adoption, strategic partnerships and long operating history; the
    investability question is whether current ARR quality, growth, profitability and valuation still
    support a US$9B private-market mark after the 2020 funding environment.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and CNBC support a US$9B private valuation; CNBC also reports total funding
        around US$900M after Salesforce invested.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Company and third-party sources consistently describe Tanium as a private endpoint/security
        management vendor serving large enterprises, including Fortune 100 customers.
      evidence_claim_ids:
        - EC-006
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: The US$9B valuation is supported by 2020 CNBC and CB Insights, but current ARR, growth,
        margin and multiples are not public.
    - risk_id: R-002
      summary: Public funding totals do not reveal liquidation preferences, secondary sales, debt or
        investor rights.
    - risk_id: R-003
      summary: Company product claims and technical metrics are not independently benchmarked in public
        sources.
    - risk_id: R-004
      summary: Public logos support large-enterprise adoption but not ARR concentration, retention or
        deployment depth.
    - risk_id: R-005
      summary: Salesforce, Microsoft and ServiceNow relationships are visible, but revenue dependence and
        contractual obligations are not.
  key_evidence_gaps:
    - Current audited or management financials, ARR bridge, runway and valuation support.
    - Product performance, roadmap and technical validation evidence.
    - Customer schedule, contracts, concentration and retention metrics.
    - Sales funnel, CAC, pricing and channel economics.
    - Current org chart, headcount, attrition and compensation plan.
  recommended_next_steps:
    - Provide audited financial statements or management P&L, ARR bridge, cash runway, financing
      documents, cap table and current valuation support.
    - Provide product roadmap, demo access, technical benchmark evidence, reliability metrics and
      major open technical risks.
    - Provide customer/revenue schedule, top-customer contracts, references, NRR/GRR and
      concentration analysis.
    - Provide GTM funnel, pipeline, CAC payback, pricing/discounting and partner-channel economics.
    - Provide current organization chart, hiring plan, attrition data, executive scorecards and
      board composition.
