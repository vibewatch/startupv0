report_metadata:
  report_title: MindTickle Startup Diligence Research Report
  target_company: MindTickle
  website: https://www.mindtickle.com/
  known_aliases:
    - Mindtickle
    - MindTickle Inc.
    - Mindtickle Interactive Media Private Limited
  sector: Enterprise technology / revenue enablement and sales readiness software
  geography: United States / San Francisco with India operating entity signals
  company_stage: Private venture-backed unicorn / late-stage SaaS
  research_date: 2026-06-15
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from existing reports and selected MindTickle via shuf -n 3 from the CB Insights unicorn list.
    - Used CB Insights, PRNewswire, Tracxn, Latka and reader-backed search result excerpts; company website pages were CloudFront-blocked during this run and are treated as a source limitation.
    - Marked audited revenue, customer concentration, pricing, cap table, contracts, compensation and legal schedules as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - India
    - California
    - Maharashtra public legal-entity signals
  excluded_topics:
    - No paywall bypasses, private systems, data-room access, customer calls, management interviews or counsel-led docket pulls.
    - No private personal contact details included.
    - Public web evidence only; inaccessible sources are recorded as limitations.
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn diligence workflow request and CB Insights target row
      type: workflow_request
      date_received: 2026-06-15
      notes: Selected by shuf -n 3 from CB Insights current unicorn-list candidates after excluding existing report slugs; target slug mindtickle.
