executive_summary:
  overall_assessment: MindTickle is an eligible uncovered private unicorn with public evidence supporting its $1.2B valuation/status and active product operations. The public record is sufficient for a standard outside-in screen but not for investment-grade financial, customer, legal or governance clearance.
  investment_or_diligence_thesis: The diligence thesis is to validate whether MindTickle's public category position and financing history translate into durable revenue, efficient growth, customer retention and defensible operations at the public valuation level.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: MindTickle is an eligible private unicorn valued at approximately $1.2B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: MindTickle provides sales readiness/revenue enablement software with content, coaching, analytics and conversation intelligence.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: MindTickle serves enterprise customers including Johnson & Johnson, Splunk and Wipro.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Stale valuation and unaudited financial quality
    - risk_id: R-002
      summary: Customer concentration and retention are not public
    - risk_id: R-003
      summary: Crowded revenue enablement market
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, cash runway and cap table.
    - Customer-level ARR, churn, renewal, concentration and reference evidence.
    - Legal, regulatory, IP, insurance, security and material contract schedules.
  recommended_next_steps:
    - Request a management data-room package covering financials, customers, product metrics, HR and legal schedules.
    - Run customer, partner/supplier and counsel-led public-record diligence before relying on public valuation.
    - Reconcile all public tracker/database claims against signed company records.
