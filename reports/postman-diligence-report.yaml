risk_register:
  - risk_id: R-001
    risk_title: Financial transparency gap
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources reveal funding and product breadth but not audited revenue, margin, burn, cash runway, debt, or segment economics.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-005
      - EC-035
    mitigation_or_diligence_request: Request three years of audited financials, current cash, burn, debt, ARR, NRR, and by-product gross margin.
  - risk_id: R-002
    risk_title: Valuation staleness risk
    risk_category: financing
    severity: medium
    likelihood: high
    description: The latest visible public valuation anchor remains the August 2021 Series D / current unicorn-list context, which may be stale relative to 2026 market conditions.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-005
    mitigation_or_diligence_request: Request the latest board-approved 409A / internal valuation memo, recent secondary pricing, and investor-mark history.
  - risk_id: R-003
    risk_title: Customer-concentration and monetization opacity
    risk_category: customer
    severity: high
    likelihood: medium
    description: Named customers and ecosystem scale are public, but customer concentration, contract values, expansion rates, and retention quality are not.
    impacted_chapter_ids:
      - I
      - III
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-006
      - EC-008
      - EC-035
    mitigation_or_diligence_request: Request the top-15 customer list, >5% concentration schedule, renewal cohorts, expansion/contraction, and pipeline coverage.
  - risk_id: R-004
    risk_title: Competitive pressure across platform, client, and marketplace layers
    risk_category: market
    severity: high
    likelihood: high
    description: Postman competes simultaneously with lifecycle platforms (SwaggerHub), API clients (Insomnia, Bruno), and API hubs/marketplaces (RapidAPI).
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids:
      - EC-040
      - EC-041
      - EC-042
      - EC-043
    mitigation_or_diligence_request: Run win/loss analysis, pricing comparisons, and workflow benchmarks against top competitors in the buyer’s environment.
  - risk_id: R-005
    risk_title: Execution complexity from product sprawl
    risk_category: product
    severity: medium
    likelihood: medium
    description: The product surface spans client, specs, mocks, flows, AI, CLI, Native Git, and enterprise governance, which can deepen moat or diffuse focus.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-012
      - EC-013
      - EC-023
      - EC-024
      - EC-031
      - EC-032
      - EC-033
    mitigation_or_diligence_request: Request product-line usage, roadmap prioritization, support burden, and attach-rate data by module.
  - risk_id: R-006
    risk_title: Security and compliance features are partly gated and partly bounded
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Important enterprise controls exist, but several are gated to Enterprise or add-ons, and BYOK coverage explicitly excludes some synced data types.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.F
      - VIII.G
    evidence_claim_ids:
      - EC-014
      - EC-015
      - EC-025
      - EC-026
      - EC-027
      - EC-028
    mitigation_or_diligence_request: Request current control matrices, audit reports, add-on uptake, and control gaps for regulated workloads.
  - risk_id: R-007
    risk_title: Operational and third-party dependency risk
    risk_category: operational
    severity: medium
    likelihood: medium
