    title: Products
    chapter_summary: "Accessible official docs support a broad product story: Postman is no longer just an API client. The public surface spans requests, collections, tests, Vault, Spec Hub, mock servers, workspaces, API Network, Flows, AI/Agent Mode, CLI, Native Git, and enterprise controls like API Catalog and Private API Network. Pricing-page dollars were blocked, but plan structure and feature gating are still visible in docs."
