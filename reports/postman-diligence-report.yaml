diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Three years of audited financial statements plus AR aging and backlog.
    why_it_matters: Financial quality cannot be evaluated from public sources alone.
    suggested_source_or_request: Request audited statements, backlog schedules, and AR aging from finance or accountants.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, option pool, SAFEs/notes, and debt instruments.
    why_it_matters: Ownership, dilution, and downside economics remain opaque.
    suggested_source_or_request: Request cap-table exports, charter docs, debt agreements, and warrant schedules.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.B
    missing_information: Current ARR, burn, gross margin, and three-year forecast model.
    why_it_matters: A valuation view without internal operating forecasts is incomplete.
    suggested_source_or_request: Request board or investor forecast package and unit-economic model.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top-15 customers, >5% concentration schedule, and renewal cohorts.
    why_it_matters: Customer concentration and predictability are central diligence questions.
    suggested_source_or_request: Request customer concentration, GRR/NRR, and cohort retention by segment.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top suppliers by spend and full sub-processor list.
    why_it_matters: Operational concentration and privacy-processing risk remain only partially visible.
    suggested_source_or_request: Request top-supplier schedule, cloud commitments, and sub-processor change log.
    priority: high
  - gap_id: G-006
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quotas, cycle length, and pipeline coverage.
    why_it_matters: Public GTM surfaces do not prove efficient enterprise selling.
    suggested_source_or_request: Request sales productivity dashboards and hiring-ramp assumptions.
    priority: medium
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D budget, roadmap prioritization, and cost of AI/automation features.
    why_it_matters: Product breadth may hide underfunded or low-ROI initiatives.
    suggested_source_or_request: Request roadmap scoring, R&D spend, and AI cost model.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount by function/location and two-year attrition.
    why_it_matters: Team capacity and turnover risk cannot be judged from the current public record.
    suggested_source_or_request: Request org chart, headcount, attrition, and key-hire/departure history.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Full litigation inventory, counsel memos, and reserve analysis.
    why_it_matters: One public patent case was visible, but broader legal exposure is unknown.
    suggested_source_or_request: Request litigation schedule, outside-counsel summaries, and reserve policy.
    priority: medium
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Independent security/compliance audit evidence and regulator correspondence.
    why_it_matters: Public control descriptions are not the same as independently tested controls.
    suggested_source_or_request: Request SOC/ISO summaries, pen-test results, privacy complaints, and regulator correspondence.
    priority: medium
