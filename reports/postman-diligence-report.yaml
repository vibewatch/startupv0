      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Public sources show workflow-critical relationships—GitHub integration, Native Git, service accounts for automation, and AWS KMS for BYOK—but not the underlying commercial contracts, SLAs, or termination rights.
        verification_status: partially_verified
        confidence: medium
        key_findings:
