  - chapter_id: III
    title: Customer Information
    chapter_summary: "Public sources show real customer and ecosystem traction, but not customer economics. Named enterprise customers include Salesforce, Stripe, Kroger, Cisco, and PayPal, and the API Network post adds Stripe, Microsoft, Twilio, Twitter, and Cisco DevNet as publisher references. What is missing is the classic diligence core: top-15 customer list, concentration, renewal, and supplier spend exposure."
    founder_claim_ids:
      - FC-005
      - FC-006
      - FC-008
    evidence_claim_ids:
      - EC-006
      - EC-008
      - EC-020
      - EC-021
      - EC-022
      - EC-028
      - EC-029
      - EC-035
    risk_ids:
      - R-003
      - R-007
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public sources do name enterprise customers and ecosystem publishers, but mostly as proof points rather than as a structured top-customer schedule with timing, spend, or use-case depth.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: The strongest public customer references are the Series D customer list and the Stripe API Network quote.
            evidence_claim_ids:
              - EC-006
              - EC-008
            risk_ids:
              - R-003
        hidden_risks:
          - Logo-heavy evidence can overstate monetization quality if contracts are small, dormant, or pilot-stage.
          - Publisher relationships on the API Network are not necessarily the same thing as paying enterprise accounts.
        evidence_gaps:
          - No top-15 customer schedule, purchase timing, or product-level customer mix was public.
          - Most named customers lacked quantified case-study outcomes in the accessible source set.
        follow_up_questions:
          - Which of the named accounts are top-10 ARR contributors?
          - What use cases and contract sizes correspond to each named enterprise account?
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-006
          - EC-008
          - EC-035
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public docs make the integration and ecosystem layer visible—especially GitHub, Slack, Microsoft Teams, and public API publishers—but do not reveal partner economics, exclusivity, or sourced revenue.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: III.B-F1
            finding: GitHub and collaboration integrations are clearly part of Postman’s public workflow strategy.
            evidence_claim_ids:
              - EC-020
              - EC-021
              - EC-022
            risk_ids:
              - R-007
        hidden_risks:
          - Heavy workflow dependence on partner tools can raise both stickiness and platform dependency.
          - Public publisher relationships may not convert into meaningful direct revenue.
        evidence_gaps:
          - No partner-sourced pipeline or revenue contribution data was public.
          - No contract-rights or termination-rights summary was public.
        follow_up_questions:
          - Which integrations drive the most activation or enterprise expansion?
          - What revenue or usage concentration exists across partner channels?
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-020
          - EC-021
          - EC-022
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Customer-revenue concentration remains a public blind spot. The company’s public sources demonstrate adoption and logos, but not any account-level revenue schedule.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings: []
        hidden_risks:
          - Concentration risk cannot be cleared from logo lists alone.
        evidence_gaps:
          - No public >5% revenue customer disclosure was verified.
          - No renewal, expansion, or churn schedule by account was public.
        follow_up_questions:
          - How many customers account for 25%, 50%, and 75% of ARR?
          - What is the renewal profile of the largest 20 accounts?
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-035
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No severed customer, partner, or supplier relationship was verified in the accessible source set. Because the search was not exhaustive across news, courts, and contract disclosures, this remains inconclusive rather than clean.
        verification_status: inconclusive
        confidence: low
        key_findings: []
        hidden_risks:
          - A lack of public severance evidence is not proof of relationship stability.
        evidence_gaps:
          - Broader news and contract review was not completed.
          - Public customer references do not show whether logos remained active after the cited posts.
