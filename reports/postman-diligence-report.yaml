report_metadata:
  report_title: Postman Public-Source Startup Diligence Report
  target_company: Postman
  website: https://www.postman.com/
  known_aliases:
    - Postman API Platform
  sector: API platform, developer tooling, enterprise API governance, and workflow automation
  geography: United States headquartered with India roots, additional Tokyo footprint, and global developer / enterprise reach
  company_stage: Late-stage private enterprise software and developer-infrastructure company
  research_date: 2026-06-18
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized official Postman docs, help, blog, and status surfaces because several main marketing and legal pages were blocked by network controls.
    - Used CB Insights and Wikipedia to corroborate private/unicorn status and public valuation context.
    - Used GitHub public repository metadata and READMEs to assess technical footprint and open-source stewardship.
    - Used CourtListener and Justia for accessible public legal and trademark signals.
    - Used competitor-owned homepages only to compare market positioning, not to validate Postman commercial claims.
  included_jurisdictions:
    - United States
    - India
    - Japan
    - Delaware (federal court)
  excluded_topics:
    - No private financial statements, board materials, cap-table exports, or customer contracts were available.
    - No customer, employee, investor, or counsel interviews were conducted.
    - No exhaustive PACER, state-court, or global patent/trademark registry sweep was completed.
    - Several postman.com pages and some third-party pages were blocked by proxy or bot protection; accessible mirror/docs routes were used where possible.
  user_provided_materials:
    - material_id: M-001
      title: User prompt with target details and valuation context
      type: prompt_argument
      date_received: 2026-06-18
      notes: The user specified Postman, the website, aliases, and the target valuation context of $5.60B from the current CB Insights unicorn list and asked for a standard-depth, evidence-backed report.
