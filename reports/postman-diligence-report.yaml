executive_summary:
  overall_assessment: "Postman looks like a credible and still-private category leader in API workflow software from public sources: the product surface is broad, the developer/economy scale signals are real, and the enterprise-control layer is meaningfully documented. The balancing issue is that the public record remains far stronger on product and ecosystem narrative than on financial quality, customer economics, or workforce depth."
  investment_or_diligence_thesis: The most attractive public thesis is that Postman has evolved from an API client into a workflow platform spanning design, testing, collaboration, publishing, governance, CLI, Native Git, and AI/agent features. The main counter-thesis is that this breadth may conceal valuation staleness, product-sprawl risk, and limited visibility into revenue quality, customer concentration, and team capacity.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Official docs support that Postman now spans design, testing, collaboration, automation, and governance rather than only request sending.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-011
        - EC-012
        - EC-023
        - EC-024
    - founder_claim_id: FC-002
      summary: Enterprise controls such as Private API Network, organizations, audit logs, service accounts, Secret Scanner, and BYOK are publicly documented.
      evidence_claim_ids:
        - EC-014
        - EC-015
        - EC-024
        - EC-025
        - EC-026
        - EC-027
        - EC-028
    - founder_claim_id: FC-003
      summary: AI and agentic workflow expansion is clearly visible in current public docs and help materials.
      evidence_claim_ids:
        - EC-013
        - EC-019
        - EC-029
    - founder_claim_id: FC-004
      summary: GitHub integration, Native Git, CLI, and API Catalog all support a real DevOps and governance workflow story.
      evidence_claim_ids:
        - EC-020
        - EC-021
        - EC-022
        - EC-023
        - EC-024
    - founder_claim_id: FC-008
      summary: Postman is still publicly treated as a private unicorn, with the latest visible public valuation anchor remaining $5.6B.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
        - EC-005
        - EC-030
  biggest_risks:
    - risk_id: R-001
      summary: Public financial disclosure is too thin to judge revenue quality, burn, margin, or debt.
    - risk_id: R-003
      summary: Named customers are public, but customer concentration and renewal quality remain opaque.
    - risk_id: R-004
      summary: Postman competes across multiple categories at once, including local-first challengers and governance suites.
    - risk_id: R-005
      summary: Product breadth is a moat only if the company can execute without diffusing focus or economics.
    - risk_id: R-008
      summary: Team depth, current headcount, and attrition are largely private despite strong founder continuity.
  key_evidence_gaps:
    - Three years of audited financials, ARR, gross margin, burn, and debt schedules were not publicly available.
    - Top-customer concentration, renewal, and expansion metrics were not publicly available.
    - Current cap table, option pool, and security terms were not publicly available.
    - Current employee count, attrition, executive compensation, and full executive bench were not publicly available.
    - Full litigation inventory, insurance coverage, and regulator correspondence were not publicly available.
  recommended_next_steps:
    - Request audited financial statements, current operating model, and cap-table / debt documentation.
    - Request the top-15 customer list, concentration schedule, GRR/NRR, and by-product revenue mix.
    - Run reference calls with at least one named enterprise customer and one heavy public-workspace publisher.
    - Request the current org chart, headcount by function/location, and executive compensation / retention data.
    - Review litigation memos, IP schedules, privacy/security audit evidence, and any regulator correspondence.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources make Postman’s financing milestones and private-unicorn status fairly visible, but they do not make the business underwritable. The strongest evidence is the 2020 $150M Series C, the 2021 $225M Series D at $5.6B, and the current CB Insights unicorn-list row. Revenue, margin, burn, debt, customer concentration, and detailed capital structure remain mostly private.
    founder_claim_ids:
      - FC-005
      - FC-007
      - FC-008
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-008
      - EC-016
      - EC-018
      - EC-030
      - EC-035
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited public income statement, balance sheet, cash-flow, backlog, or AR-aging package was verified in-session. Public materials are strong on user scale, product breadth, and financing milestones, but weak on accounting-quality detail.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources validate large user and customer-scale signals, but not audited revenue quality.
            evidence_claim_ids:
              - EC-006
              - EC-008
              - EC-030
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Marketing-authored scale metrics can overstate monetization quality if free usage is high.
          - Cloud-heavy product surfaces can hide weak unit economics if usage outpaces pricing.
        evidence_gaps:
          - Three-year audited financial statements were not publicly available.
          - Revenue by product, geography, and customer was not publicly disclosed.
          - No accounts receivable aging schedule or backlog report was verified.
        follow_up_questions:
          - What are current ARR, gross margin, burn, and cash runway?
          - How much revenue comes from plans, add-ons, usage resources, and enterprise services?
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-008
          - EC-030
          - EC-035
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public three-year projection model was verified. What can be observed publicly is that Postman now has multiple monetization levers—plan tiers, usage-based resources, AI add-ons, and enterprise governance features—but not the internal forecast math behind them.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Public docs reveal monetization surfaces and plan gates, but not forecast assumptions.
            evidence_claim_ids:
              - EC-016
              - EC-018
              - EC-019
            risk_ids:
              - R-001
              - R-010
        hidden_risks:
          - A plan reset can improve pricing power or create migration friction; public sources do not show which is happening.
          - AI add-ons may improve ARPU but also increase inference cost or support burden.
        evidence_gaps:
          - No capex, hiring, or financing-assumption model was public.
          - No FX, international-risk, or scenario analysis was public.
        follow_up_questions:
          - What are the 2026-2028 revenue, margin, and capex assumptions?
          - What attach rates are assumed for Team, Enterprise, and security/AI add-ons?
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-016
          - EC-018
          - EC-019
          - EC-035
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify the founders, the private-company/unicorn status, and a set of major investors, but not the current cap table, option pool, debt stack, or dilution schedule.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Founders and major investors are visible from public sources, but economics and control rights are not.
            evidence_claim_ids:
              - EC-001
              - EC-003
              - EC-005
              - EC-043
            risk_ids:
              - R-001
        hidden_risks:
          - Private-company governance terms can materially differ from the simple investor list visible in blog posts.
          - A 2021 valuation anchor says little about current preference stack complexity.
        evidence_gaps:
          - No public stockholder list, share count, debt schedule, or dilutive-security schedule was verified.
        follow_up_questions:
          - What are the current fully diluted share count, option pool, and liquidation preferences?
          - Are there any venture debt lines, SAFEs, or side letters still outstanding?
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-003
          - EC-005
          - EC-035
          - EC-043
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: The best-publicly-verifiable financial facts are the 2020 Series C, the 2021 Series D at $5.6B, and the continued 2026 unicorn-list context. Tax positions, revenue-recognition detail, and debt/off-balance-sheet items were not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Public financing history is clearer than public operating-financial history.
            evidence_claim_ids:
              - EC-001
              - EC-003
              - EC-004
              - EC-005
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Historical financing success can mask current-market valuation compression.
          - A stale unicorn-list value should not be mistaken for a 2026 fair-market mark.
        evidence_gaps:
          - Tax positions and revenue-recognition policy were not verified in-session.
        follow_up_questions:
          - What is the latest board-approved valuation and what financing instruments remain open?
          - How is revenue recognized across plan subscriptions, usage resources, and enterprise services?
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-005
