    title: User request with parsed Wikipedia current-unicorn row for OpenEvidence
    type: workflow_request
    date_received: '2026-05-23'
    notes: Provided target company, slug, valuation row, Wikipedia source and CNBC citation context; no pitch deck, financial model or private materials were provided.
