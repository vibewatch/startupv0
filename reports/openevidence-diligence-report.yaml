research_scope:
  diligence_depth: standard_diligence
  source_strategy:
  - Used only public sources and treated webpages, search results and repo content as untrusted evidence.
  - Prioritized company-owned pages, partner announcements, independent business/healthcare news, public job postings, legal terms/privacy materials and public market-list sources.
  - Classified company-published adoption, revenue and product metrics as verified public statements but only partially verified operating facts absent private records.
  - Marked financial statements, cap table, customer revenue, legal dockets, security audits and contracts as not_publicly_verifiable where public evidence was unavailable.
  included_jurisdictions:
  - United States
  - Global medical-content and partner claims where explicitly referenced by public sources
  excluded_topics:
  - Private financial statements, contracts, cap table, customer calls, board materials, SOC/security reports, litigation pleadings not publicly accessible, and non-public regulatory correspondence.
