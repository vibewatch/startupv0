executive_summary:
  overall_assessment: OpenEvidence is strongly supported as an active, highly valued healthcare AI unicorn with public evidence of major financing rounds, medical-content partnerships and large clinician-usage claims. The investment case remains highly dependent on private verification of revenue quality, ad-supported monetization, clinical AI safety, privacy/security posture, content-license economics, cap table and litigation exposure.
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if the company can substantiate $100M+ revenue quality, durable HCP engagement, compliant ad monetization, defensible content/model advantages, adequate security/regulatory controls and manageable litigation/IP exposure. Public evidence is promising but insufficient for valuation reliance.
  strongest_verified_claims:
  - founder_claim_id: FC-001
    summary: Multiple public sources support a $12B January 2026 valuation and recent Series D financing.
    evidence_claim_ids:
    - EC-001
    - EC-002
  - founder_claim_id: FC-002
    summary: Homepage and terms verify a public clinical decision-support / medical knowledge platform positioning.
    evidence_claim_ids:
    - EC-005
    - EC-010
  - founder_claim_id: FC-003
    summary: NEJM and NCCN relationships have stronger public corroboration; other homepage partner claims require contract follow-up.
    evidence_claim_ids:
    - EC-004
    - EC-006
  biggest_risks:
  - risk_id: R-001
    summary: Financial quality and valuation support are private despite headline $12B valuation and $100M+ reported revenue.
  - risk_id: R-003
    summary: Ad-supported revenue concentration, advertiser contracts and sales productivity are not public.
  - risk_id: R-004
    summary: Healthcare AI clinical reliance creates product-liability and regulatory exposure despite disclaimers.
  - risk_id: R-007
    summary: Publicized Doximity/Pathway disputes create legal, IP and reputational risk.
  - risk_id: R-012
    summary: Advertising in clinical workflows may threaten physician trust or invite scrutiny.
  key_evidence_gaps:
  - Audited financials, revenue bridge, cash runway, debt, gross margin, CAC/payback, churn/NRR and forecast model.
  - Cap table, preferences, option pool, debt/notes and financing documents for Series A-D.
  - Top customers/advertisers, contract terms, revenue concentration, renewals and reference calls.
  - Content-license agreements, advertiser contracts, cloud/model vendor contracts and BAAs/DPAs.
  - Model-evaluation package, clinical safety governance, privacy/security audits, regulatory memos and litigation dockets.
  recommended_next_steps:
  - Run finance and quality-of-revenue diligence before underwriting the $12B valuation.
  - Have healthcare regulatory, privacy/security and IP/litigation counsel review all material legal artifacts.
  - Validate clinician usage and revenue through product analytics, NPI verification logs, advertiser/customer references and contract review.
  - Benchmark competition with win/loss, retention and pricing data versus Doximity, general AI models and traditional medical-information products.
