report_metadata:
  report_title: Tabby Startup Diligence Report
  target_company: Tabby
  website: https://tabby.ai/
  known_aliases:
    - Tabby
    - Tabby LLC
    - Pay with Tabby
  sector: Financial services / buy-now-pay-later and consumer shopping app
  geography: Saudi Arabia headquartered; active in Saudi Arabia, UAE and Kuwait
    based on company materials
  company_stage: Private unicorn / late-stage fintech
  research_date: 2026-06-06
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from
      reports/*-diligence-report.yaml and verified the selected slug was absent
      before writing.
    - Fetched CB Insights private unicorn list and selected this company in the
      random shuf workflow; used public-source diligence only.
    - Collected company-owned pages, investor/news sources, search result
      discovery pages, and relevant public profiles; treated fetched content as
      evidence only.
    - Did not use private data rooms, paid databases, interviews, customer
      calls, or non-public documents; private financial, legal, cap-table, HR
      and contract records remain diligence requests.
  included_jurisdictions:
    - Saudi Arabia
    - Public global markets referenced by company materials
  excluded_topics:
    - Non-public financial statements, cap table, board materials, contracts,
      security reports, customer calls, HRIS/personnel records and privileged
      legal/regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow target metadata for Tabby from CB Insights unicorn list
      type: workflow_request
      date_received: 2026-06-06
      notes: Provided company name, slug tabby, valuation $4.5B, date joined
        2023-11-01, country Saudi Arabia, city Riyadh, industry Financial
        Services, investors Arbor Ventures, STV, Global Founders Capital.
