        summary: NRC FAQ establishes commercial fusion regulation and industry status; Helion public sources describe local Orion approvals and construction but do not provide final operating/regulatory clearance.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: No U.S. fusion machine commercially provides grid electricity, and commercial fusion machines remain regulated.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-006
          - finding_id: VIII.G-F2
            finding: Orion site progress is public but not equivalent to final regulatory approval or plant operability.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-002
              - R-006
        hidden_risks:
          - Unresolved regulatory agency questions may delay first plant or force design/site changes.
          - Permits may include conditions or appeal risk not obvious from company summaries.
        evidence_gaps:
          - Regulatory correspondence, license/permit matrix, agency meeting notes, open issues, SEPA/CUP conditions, interconnection and grid approvals.
        follow_up_questions:
          - Regulatory counsel should map every agency approval needed for Orion and subsequent plants, with status, risks, and critical path.
        table_ids:
          - T-015
          - T-016
        figure_ids:
          - F-008
          - F-011
        evidence_claim_ids:
          - EC-007
          - EC-012
