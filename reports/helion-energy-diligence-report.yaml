diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts, burn, runway, debt, capex, revenue/backlog, and unit economics.
    why_it_matters: Public funding headlines do not prove solvency, margin, or project finance viability.
    suggested_source_or_request: "CFO data room: audited financials, monthly management accounts, board KPI packs, plant unit-economic model."
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preference stack, investor rights, option plan, debt/SAFE/note/warrant ledger.
    why_it_matters: The $5.43B valuation anchor may not reflect current fully diluted value or downside ownership economics.
    suggested_source_or_request: Financing documents, investor rights, 409A, board consents, and liquidation waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: VI
    section_id: VI.B
    missing_information: Polaris/Orion test data, independent technical validation, energy accounting, fuel-cycle mass balance, and reliability model.
    why_it_matters: Technical proof is the central determinant of company value and 2028 delivery.
    suggested_source_or_request: Technical data room and independent plasma/power-electronics expert review.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Microsoft/Nucor contract economics, price, deposits, termination, LDs, acceptance criteria, and revenue recognition.
    why_it_matters: Public customer announcements may not equal binding profitable backlog.
    suggested_source_or_request: Executed PPAs/collaboration agreements, customer references, accounting memo.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Complete regulatory, permitting, interconnection, environmental, tritium/materials, and site critical path.
    why_it_matters: Regulatory/site delay could break customer schedule and increase burn.
    suggested_source_or_request: Regulatory counsel memo, permit matrix, agency correspondence, SEPA/CUP files, interconnection studies.
    priority: high
  - gap_id: G-006
    chapter_id: III
    section_id: III.E
    missing_information: Critical supplier contracts, manufacturing yield, BOM, alternates, long-lead inventory, and quality system.
    why_it_matters: Plant delivery depends on manufacturable pulsed-power and fusion hardware at cost.
    suggested_source_or_request: Operations data room with supplier contracts, QA audits, yield/failure reports, factory plan.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount history, hiring plan, attrition, compensation, equity incentives, employee relations, and safety culture.
    why_it_matters: First-of-a-kind hardware execution depends on specialized teams and safe operations.
    suggested_source_or_request: HR data room, org chart, compensation/equity plan, OSHA/safety logs, employee relations schedule.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Full IP schedule, assignments, licenses, FTO, trade secrets, export controls, litigation, and insurance policies.
    why_it_matters: IP or liability gaps can impair commercialization, financing, and exit.
    suggested_source_or_request: Outside counsel IP/legal memo, insurance broker report, litigation/threatened-claims schedule.
    priority: medium
