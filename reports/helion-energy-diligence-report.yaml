      - EC-003
      - EC-004
      - EC-017
    mitigation_or_diligence_request: Obtain audited statements, management accounts, cash/debt schedule, capex budget, unit economics, cap table, and financing documents.
  - risk_id: R-004
    risk_title: Manufacturing scale-up and capex overrun risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Series F proceeds are meant to scale U.S. manufacturing of capacitors, magnets, and semiconductors, but yield/cost/supplier readiness are private.
    impacted_chapter_ids:
      - I
      - III
      - VI
    impacted_section_ids:
      - I.B
      - III.E
      - VI.A
      - VI.B
    evidence_claim_ids:
      - EC-004
      - EC-022
    mitigation_or_diligence_request: Review factory capex, supplier contracts, quality system, BOM, yield/failure data, inventory, and alternates.
  - risk_id: R-005
    risk_title: Customer concentration and material-contract terms risk
    risk_category: customer
    severity: high
    likelihood: medium
    description: Microsoft and Nucor are valuable public signals, but contract economics, enforceability, cancellation, penalties, and acceptance criteria are not public.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
      - V.B
      - VIII.F
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-018
      - EC-020
    mitigation_or_diligence_request: Review executed contracts, amendments, pricing, deposits, credit support, termination rights, liquidated damages, and customer references.
  - risk_id: R-006
    risk_title: Fusion regulatory and site permitting risk
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: NRC indicates commercial fusion is regulated and no U.S. fusion machine commercially provides grid power; Helion still must navigate applicable plant/site approvals.
