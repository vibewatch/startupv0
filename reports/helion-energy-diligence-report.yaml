  - risk_id: R-001
    risk_title: Net-electricity and plant-level technical proof risk
    risk_category: technical
    severity: critical
    likelihood: high
    description: Helion has public technical milestones, but no public evidence of commercial plant-level net electricity, and the Polaris page reframes earlier “net electricity” language.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Independent technical review of test data, energy accounting, diagnostics, reliability, fuel-cycle model, and plant commissioning plan.
  - risk_id: R-002
    risk_title: 2028 Microsoft/Orion delivery schedule risk
    risk_category: operational
    severity: high
    likelihood: high
    description: The first plant target requires successful machine scale-up, site construction, permitting, interconnection, customer acceptance, and operations by a public deadline.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.A
      - V.A
      - VIII.C
      - VIII.G
    evidence_claim_ids:
      - EC-005
      - EC-007
      - EC-012
      - EC-020
    mitigation_or_diligence_request: Review integrated master schedule, permit matrix, interconnection studies, EPC plan, critical path, contingency budget, and Microsoft contract remedies.
  - risk_id: R-003
    risk_title: Private financials and valuation opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Public funding and valuation anchors do not reveal audited financials, runway, burn, debt, unit economics, or current capitalization.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
