report_metadata:
  report_title: Helion Energy Startup Diligence Report
  target_company: Helion Energy
  website: https://www.helionenergy.com/
  known_aliases:
    - Helion
    - Helion Energy, Inc.
    - Orion
    - Polaris
  sector: Energy Technology / fusion power generation
  geography: United States
  company_stage: Private unicorn / growth-stage fusion hardware and power project developer
  research_date: 2026-05-24
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public sources only, prioritizing Helion-owned announcements/pages, SEC EDGAR records, regulator sources, public market databases, patents, and independent news corroboration.
    - Treated company statements as verified for existence of the statement, and only partially verified for underlying technical, commercial, financial, or legal performance unless corroborated by independent/regulatory evidence.
    - Marked audited financials, cap table, executed customer contracts, supplier contracts, regulatory correspondence, technical datasets, HR records, litigation schedules, insurance, and legal opinions as not publicly verifiable where appropriate.
  included_jurisdictions:
    - United States
    - Washington
    - Delaware corporate/SEC filing context
  excluded_topics:
    - Non-public physics datasets, confidential customer contracts, export-controlled technical details, classified or sensitive nuclear/materials controls, private employee data, and non-public investor documents.
  user_provided_materials:
    - material_id: UPM-001
      title: User request to generate Helion Energy diligence report
      type: workflow_request
      date_received: 2026-05-24
      notes: No pitch deck, model, data room, or private documents were provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Helion Energy is a U.S. private unicorn with a public valuation anchor around $5.43B.
    claim_source: CB Insights unicorn list and public funding announcements
    claim_date: 2021-11-05
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-021
    contradiction_summary: Valuation/listing and funding headlines are public, but current fully diluted cap table and financing terms are private.
    diligence_follow_up:
      - Request financing documents, cap table, liquidation preference stack, debt, SAFEs/notes, warrants, strategic rights, and latest 409A.
  - founder_claim_id: FC-002
    claim_text: Helion has raised major private financing, including $500M in 2021 and $425M Series F in 2025.
    claim_source: Helion funding announcements and independent news
    claim_date: 2025-01-28
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-021
    contradiction_summary: Amounts and investor names are public; proceeds, cash balance, and milestone-tranche status are not public.
    diligence_follow_up:
      - Reconcile announced funding to cash received, remaining runway, capex budget, investor rights, and milestone financing conditions.
  - founder_claim_id: FC-003
    claim_text: Helion’s product architecture uses pulsed FRC fusion, D-He-3 fuel, and direct electricity recovery.
    claim_source: Helion technology page and technical blogs
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.B
    verification_status: verified
    confidence: medium
    evidence_claim_ids:
      - EC-008
      - EC-010
    contradiction_summary: Verified as public architecture claim; commercial energy balance and fuel-cycle proof are not public.
    diligence_follow_up:
      - Commission independent plasma physics and power electronics review of test data, diagnostics, energy accounting, and fuel-cycle model.
  - founder_claim_id: FC-004
    claim_text: Polaris is Helion’s seventh prototype and is intended to demonstrate electricity production from fusion.
    claim_source: Helion Polaris page and 2021 funding announcement
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-003
      - EC-009
      - EC-011
    contradiction_summary: Helion later clarified that “net electricity” was not the preferred framing and now emphasizes demonstrating electricity from fusion on capacitor banks.
    diligence_follow_up:
      - Request Polaris test plan, actual pulse data, third-party validation, diagnostic calibration, energy recovery accounting, and milestone schedule.
  - founder_claim_id: FC-005
    claim_text: Helion has commercial demand signals from Microsoft and Nucor.
    claim_source: Helion Microsoft PPA and Nucor collaboration announcements
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
      - VIII
    mapped_section_ids:
      - III.A
      - III.B
      - V.B
      - VIII.F
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-018
    contradiction_summary: Public relationship announcements do not reveal enforceable contract economics, conditions, penalties, or customer concentration exposure.
    diligence_follow_up:
      - Obtain executed PPAs/collaboration agreements, pricing, deposits, milestones, interconnection obligations, termination rights, and customer references.
  - founder_claim_id: FC-006
    claim_text: Helion’s first plant, Orion, is planned for Malaga/Chelan County, Washington and targeted for initial operations around 2028.
    claim_source: Helion Orion/site pages and PPA announcement
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
      - VIII
    mapped_section_ids:
      - III.A
      - V.A
      - VIII.C
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-005
      - EC-007
      - EC-012
    contradiction_summary: Site progress is public, but final regulatory clearance, grid interconnection, construction completion, and operability are not proven.
    diligence_follow_up:
      - Review land lease, permits, SEPA/CUP documents, interconnection queue, construction EPC contracts, regulator correspondence, and Microsoft delivery obligations.
  - founder_claim_id: FC-007
    claim_text: Helion has an experienced technical leadership team and is actively hiring.
    claim_source: Helion about and careers pages
    claim_date: null
    mapped_chapter_ids:
      - VII
    mapped_section_ids:
      - VII.A
      - VII.B
      - VII.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-013
      - EC-014
    contradiction_summary: Leadership names and hiring are public; headcount, turnover, compensation, retention, safety culture, and employee-relations history are private.
    diligence_follow_up:
      - Request org chart, headcount by function/site, attrition, offer/compensation data, safety records, employment agreements, and succession plan.
  - founder_claim_id: FC-008
    claim_text: Helion can scale U.S. manufacturing of capacitors, magnets, semiconductors, and fusion plant hardware fast enough for commercial deployment.
    claim_source: Series F use-of-proceeds announcement
    claim_date: 2025-01-28
    mapped_chapter_ids:
      - III
      - V
      - VI
    mapped_section_ids:
      - III.E
      - V.E
      - VI.B
    verification_status: not_publicly_verifiable
    confidence: low
    evidence_claim_ids:
      - EC-004
      - EC-022
    contradiction_summary: Capital raise supports scale-up intent, but manufacturing yield, supplier quality, throughput, and cost are not public.
    diligence_follow_up:
      - Review BOM, supplier contracts, capacity model, quality system, factory capex plan, inventory strategy, and failure-rate data.
executive_summary:
  overall_assessment: Helion Energy is a credible public-source fusion unicorn candidate with a $5.43B CB Insights valuation anchor, large disclosed financings, high-profile investors, a Microsoft first-plant PPA target, a Nucor strategic collaboration, and substantive public technical materials. The company remains extremely high risk because public sources do not prove commercial net electricity, plant reliability, 2028 delivery, D-He-3 fuel-cycle economics, contract economics, audited financials, or regulatory completion.
  investment_or_diligence_thesis: Proceed only to deep confirmatory diligence. A positive thesis requires proving plant-level energy balance, repeatability, regulatory/site readiness, customer contract economics, manufacturing scalability, fuel-cycle feasibility, adequate runway, and legal/IP/insurance sufficiency under expert review.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Helion as a $5.43B U.S. unicorn in Everett, Washington, joined on 2021-11-05.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Helion publicly announced $500M in 2021 and $425M Series F in 2025 with named investors.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-021
    - founder_claim_id: FC-005
      summary: Helion publicly announced Microsoft and Nucor strategic customer/partner relationships with 50 MW+ and 500 MWe capacity targets, respectively.
      evidence_claim_ids:
        - EC-005
        - EC-006
    - founder_claim_id: FC-003
      summary: Helion consistently describes a pulsed FRC, D-He-3, direct-electricity-recovery architecture.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: "Technical/net-electricity risk is critical: public sources do not prove commercial plant-level net electricity or reliable grid operations."
    - risk_id: R-002
      summary: The 2028 Microsoft/Orion target concentrates technology, construction, permitting, interconnection, and customer-acceptance risk into a narrow schedule.
    - risk_id: R-003
      summary: No public audited financials, cap table, runway, unit economics, or project finance model are available.
  key_evidence_gaps:
    - Audited financials, management accounts, burn, runway, debt, capex, revenue/backlog, and unit economics.
    - Current cap table, preference stack, investor rights, option plan, debt/SAFE/note/warrant ledger.
    - Polaris/Orion test data, independent technical validation, energy accounting, fuel-cycle mass balance, and reliability model.
    - Microsoft/Nucor contract economics, price, deposits, termination, LDs, acceptance criteria, and revenue recognition.
    - Complete regulatory, permitting, interconnection, environmental, tritium/materials, and site critical path.
    - Critical supplier contracts, manufacturing yield, BOM, alternates, long-lead inventory, and quality system.
  recommended_next_steps:
    - Run independent technical diligence on Polaris/Orion data, diagnostics, energy accounting, fuel cycle, reliability, and plant acceptance criteria.
    - Review executed Microsoft/Nucor/Constellation, land, supplier, financing, and interconnection contracts with counsel.
    - Obtain audited financials, cap table, runway, capex, unit economics, and financing plan.
    - Complete regulatory, environmental, safety, insurance, IP/FTO, and litigation diligence before underwriting valuation.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports major financing and a $5.43B CB Insights valuation anchor, but audited financials, revenue, backlog economics, burn, debt, runway, cap table, and unit economics are not public.
    founder_claim_ids:
      - FC-001
      - FC-002
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-017
      - EC-021
    risk_ids:
      - R-003
      - R-004
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No public audited financial statements, management accounts, revenue, gross margin, cash flow, cash balance, debt, backlog, AR aging, or budget-to-actuals were found.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public materials disclose financing headlines but not operating financial statements or financial KPIs.
            evidence_claim_ids:
              - EC-017
            risk_ids:
              - R-003
        hidden_risks:
          - High burn and first-of-a-kind capex may require more capital than public rounds imply.
          - Customer deposits or project costs could create liabilities not visible in announcements.
        evidence_gaps:
          - Audited financials, monthly management accounts, cash runway, budget-to-actuals, debt, revenue/backlog schedule, AR/AP aging, gross-margin model.
        follow_up_questions:
          - Provide FY2023-FY2026 monthly financials, cash runway, debt schedule, budget-to-actuals, and plant unit-economic model.
        table_ids:
          - T-002
        figure_ids:
          - F-009
        evidence_claim_ids:
          - EC-017
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: "Public projections are milestone-based: Polaris demonstration, Orion construction, Microsoft 2028 target, and manufacturing scale-up; no financial forecast is public."
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Company announcements describe intended use of funds and deployment targets but not revenue, capex, EBITDA, or cash-flow forecasts.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-005
              - EC-007
            risk_ids:
              - R-002
              - R-003
              - R-004
        hidden_risks:
          - Schedule slip could turn milestones into prolonged negative cash flow.
          - Plant capex, interconnection, insurance, and fuel-cycle assumptions may dominate forecasts.
        evidence_gaps:
          - Three-statement model, milestone-linked capex budget, downside schedule cases, financing plan, project finance assumptions, PPA pricing.
        follow_up_questions:
          - Provide integrated forecast tying technical gates, site construction, customer acceptance, capex, working capital, revenue recognition, and financing needs.
        table_ids:
          - T-002
        figure_ids:
          - F-001
          - F-009
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-005
          - EC-007
          - EC-017
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Investor names and financing amounts are public, but ownership, liquidation preferences, option pool, notes, warrants, debt, and side letters are not.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights lists a $5.43B valuation while Helion publicly announced $500M and $425M rounds; terms remain private.
            evidence_claim_ids:
              - EC-001
              - EC-003
              - EC-004
            risk_ids:
              - R-003
        hidden_risks:
          - Strategic investor rights, tranched funding, debt, or preferences could materially change equity value.
          - Option-pool and retention needs may create significant dilution.
        evidence_gaps:
          - Current fully diluted cap table, financing docs, preference stack, investor rights, debt/SAFE/note/warrant ledger, option plan, 409A.
        follow_up_questions:
          - Reconcile the public $5.43B valuation to post-money ownership, cash received, liquidation waterfall, and strategic rights.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-009
        evidence_claim_ids:
          - EC-001
          - EC-003
          - EC-004
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: SEC Form D and public articles provide financing context; accounting policies, tax, grant/deposit treatment, project accounting, and revenue recognition are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Public Form D and news/company financing sources establish historical financing activity and major funding headlines.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-004
              - EC-021
            risk_ids:
              - R-003
        hidden_risks:
          - Customer deposits, project costs, grants, and milestone contracts may have complex accounting and refundability.
          - Tax credits, R&D capitalization, and inventory policies could be material.
        evidence_gaps:
          - Revenue-recognition memo, tax positions, grant/deposit accounting, project cost capitalization, warranties, asset impairment, and contingencies.
        follow_up_questions:
          - Provide accounting memos for PPAs/collaborations, deposits, grants/tax credits, R&D capitalization, inventory, and project liabilities.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-002
          - EC-003
          - EC-004
          - EC-021
  - chapter_id: II
    title: Products
    chapter_summary: Helion publicly describes a pulsed FRC fusion generator using D-He-3 fuel and direct energy recovery, with Polaris as the electricity-demonstration machine and Orion as first plant; product performance, reliability, and economics require non-public technical validation.
    founder_claim_ids:
      - FC-003
      - FC-004
      - FC-006
    evidence_claim_ids:
      - EC-005
      - EC-008
      - EC-009
      - EC-010
      - EC-011
    risk_ids:
      - R-001
      - R-002
      - R-007
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: "The public product is a fusion power plant/generator architecture, not a shipped commercial SKU: Polaris is a prototype/demonstrator, and Orion is the first plant target linked to Microsoft."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Helion’s public architecture claims are consistent across technology, pulsed approach, fuel, and Polaris pages.
            evidence_claim_ids:
              - EC-008
              - EC-009
              - EC-010
            risk_ids:
              - R-001
              - R-007
          - finding_id: II.A-F2
            finding: "The product is not commercially proven: NRC states no U.S. fusion machine commercially supplies grid electricity."
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-001
        hidden_risks:
          - A technically successful subsystem may still fail at full-system net electricity, uptime, maintainability, cost, or regulatory acceptance.
          - Fuel-cycle, power electronics, shielding, and component lifetime may be more difficult than public descriptions imply.
        evidence_gaps:
          - Detailed product requirements, test results, FMEA, plant design, availability model, commissioning plan, warranty/maintenance terms, and energy accounting.
        follow_up_questions:
          - Provide product spec, technical readiness assessment, Polaris/Orion test data, plant acceptance criteria, reliability model, and independent expert reports.
        table_ids:
          - T-003
          - T-004
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-008
          - EC-009
          - EC-010
          - EC-011
          - EC-012
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public evidence identifies Microsoft, Constellation, Nucor, and site/community stakeholders, but revenue by customer, contract terms, customer concentration, supplier terms, and severed relationships are not public.
    founder_claim_ids:
      - FC-005
      - FC-006
      - FC-008
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-018
      - EC-022
    risk_ids:
      - R-002
      - R-005
      - R-007
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Microsoft is the only publicly named first-plant power purchaser; Nucor is a strategic industrial collaboration for a larger 500 MWe concept.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Microsoft and Nucor are meaningful public demand signals but not enough to infer revenue or backlog.
            evidence_claim_ids:
              - EC-005
              - EC-006
              - EC-018
            risk_ids:
              - R-005
        hidden_risks:
          - Customer concentration in one first plant could make missed acceptance criteria existential.
          - Industrial customers may require performance guarantees beyond public sources.
        evidence_gaps:
          - Top customer schedule, revenue/backlog by customer, contract values, deposits, cancellation terms, customer references, acceptance criteria.
        follow_up_questions:
          - Provide full customer contract packet for Microsoft, Constellation, Nucor, and any other material accounts.
        table_ids:
          - T-005
          - T-006
        figure_ids:
          - F-003
          - F-010
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-018
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Strategic relationships include investors and partners such as Sam Altman, Mithril, Capricorn, Good Ventures, Nucor, Microsoft/Constellation, Lightspeed, and SoftBank Vision Fund 2.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Helion has high-profile strategic/customer/investor relationships, but rights and obligations are private.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-005
              - EC-006
            risk_ids:
              - R-003
              - R-005
        hidden_risks:
          - Strategic rights, exclusivity, board control, or change-of-control restrictions may limit flexibility.
          - Partner reliance may mask weak repeatable pipeline.
        evidence_gaps:
          - Investor rights, strategic side letters, partner agreements, exclusivity clauses, board consents, change-of-control provisions.
        follow_up_questions:
          - Provide a related-party/strategic-rights schedule and all material partnership agreements.
        table_ids:
          - T-005
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-005
          - EC-006
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: No public revenue by customer, recognized revenue, ARR, backlog, deferred revenue, deposits, or PPA price information was found.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: III.C-F1
            finding: Public relationship announcements do not disclose price, contract value, or revenue recognition.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-005
              - R-003
        hidden_risks:
          - Announced relationships may generate no near-term revenue or may be contingent on future milestones.
          - Refundable deposits or penalties could create liabilities rather than revenue.
        evidence_gaps:
          - Revenue by customer, backlog/deferred revenue, deposit schedule, price, performance obligations, termination/LD clauses, revenue recognition memo.
        follow_up_questions:
          - Provide customer revenue and backlog schedule with signed-contract references and accounting treatment.
        table_ids:
          - T-006
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-017
          - EC-018
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: No public evidence of significant severed customer, partner, or supplier relationships was found in reviewed sources.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.D-F1
            finding: Public-source review did not identify relationship terminations, but this is not a complete legal/customer reference check.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-005
        hidden_risks:
          - Undisclosed failed pilots, lost suppliers, or terminated customer talks could reveal performance or trust issues.
          - Customer reference checks may surface concerns not present online.
        evidence_gaps:
          - Lost-customer list, terminated LOIs/MOUs, supplier cancellations, disputes, win/loss, churn/withdrawal reasons.
        follow_up_questions:
          - Provide all severed or materially amended customer/partner/supplier relationships over the last 24 months.
        table_ids:
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-019
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Public sources identify manufacturing categories—capacitors, magnets, semiconductors—but not supplier names, contract terms, lead times, qualification status, or alternates.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: Manufacturing scale-up depends on specialized hardware supply chains not visible in public sources.
            evidence_claim_ids:
              - EC-004
              - EC-022
            risk_ids:
              - R-004
              - R-007
        hidden_risks:
          - Supplier concentration or long lead components could block first plant even if machine design works.
          - Quality failures in pulsed high-energy systems may create costly rework.
        evidence_gaps:
          - Top supplier list, purchase commitments, specs, QA audits, alternates, long-lead inventory, export-control reviews, supplier financial health.
        follow_up_questions:
          - Provide critical BOM, supplier contracts, quality metrics, alternates, lead-time and inventory plan.
        table_ids:
          - T-006
          - T-012
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-004
          - EC-022
  - chapter_id: IV
    title: Competition
    chapter_summary: Helion competes in a crowded private fusion market against tokamak, Z-pinch, FRC, inertial, and other approaches; public differentiation is strong but not yet commercially proven.
    founder_claim_ids:
      - FC-003
      - FC-008
    evidence_claim_ids:
      - EC-008
      - EC-016
    risk_ids:
      - R-001
      - R-010
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Helion is differentiated by direct electricity recovery and D-He-3/FRC positioning, while CFS, Zap, and TAE publicly pursue alternative fusion architectures.
        verification_status: partially_verified
        confidence: medium
