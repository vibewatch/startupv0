    - EC-026
    - EC-019
    - EC-020
    - EC-007
  - section_id: VIII.G
    title: Regulatory agency problems
    checklist_question_ids:
    - VIII.G
    summary: Public materials show privacy/GDPR posture, subprocessors, security certifications
      and status transparency. They do not disclose regulatory correspondence, complaints,
      investigations or enforcement matters.
    verification_status: partially_verified
    confidence: medium
    key_findings:
