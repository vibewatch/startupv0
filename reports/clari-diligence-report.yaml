      open-source and acquired-asset assignments require review.
    verification_status: partially_verified
    confidence: medium
    key_findings:
    - finding_id: VIII.D-F1
      finding: Google Patents returned 31 Clari-assigned patent results.
      evidence_claim_ids:
      - EC-021
      risk_ids:
      - R-008
    - finding_id: VIII.D-F2
      finding: Trademark mirror lists multiple Clari marks, but official USPTO verification
        is required.
      evidence_claim_ids:
      - EC-022
      risk_ids:
      - R-008
    - finding_id: VIII.D-F3
      finding: Wingman, Groove and Salesloft IP transfer and licenses are private.
      evidence_claim_ids:
      - EC-019
      - EC-020
      - EC-007
      risk_ids:
      - R-009
    hidden_risks:
    - IP defects, open-source noncompliance, assignment gaps or settlement licenses
      could impair defensibility.
    evidence_gaps:
    - Complete patent/trademark/copyright/domain schedule, open-source inventory,
      assignments, encumbrances, licenses and acquired-asset IP schedules.
    follow_up_questions:
    - Provide IP schedule, official USPTO/TSDR exports, patent maintenance, OSS scan,
      invention assignments and acquisition IP exhibits.
    table_ids:
    - T-022
    figure_ids: []
    evidence_claim_ids:
    - EC-021
    - EC-022
    - EC-019
    - EC-020
    - EC-007
  - section_id: VIII.E
    title: Insurance coverage and material exposures
    checklist_question_ids:
    - VIII.E
    summary: Insurance policy limits, carriers, retentions, exclusions and claims
      history are not public. Cyber/E&O coverage is particularly important given data
      and AI processing.
    verification_status: not_publicly_verifiable
    confidence: high
    key_findings:
    - finding_id: VIII.E-F1
      finding: Insurance cannot be assessed from public sources.
      evidence_claim_ids:
      - EC-015
      - EC-025
      risk_ids:
      - R-005
      - R-008
    - finding_id: VIII.E-F2
      finding: Privacy, AI, IP and M&A exposures should be mapped to coverage.
      evidence_claim_ids:
      - EC-014
      - EC-023
      - EC-007
      risk_ids:
      - R-005
      - R-008
      - R-009
    hidden_risks:
    - Coverage exclusions, insufficient limits or claims-made timing could leave material
      liabilities uninsured.
    evidence_gaps:
    - D&O, E&O/cyber, EPLI, CGL, crime, fiduciary and workers compensation policies
      plus claims runs.
    follow_up_questions:
    - Provide insurance certificates, policies, retentions/exclusions, notices and
      claims runs.
    table_ids:
    - T-024
    figure_ids: []
    evidence_claim_ids:
    - EC-014
    - EC-015
    - EC-023
    - EC-007
    - EC-025
  - section_id: VIII.F
    title: Material contracts
    checklist_question_ids:
    - VIII.F
    summary: Material customer, vendor, AI/cloud, partner and M&A agreements are not
      public. Public pages identify contract categories but not terms.
    verification_status: not_publicly_verifiable
    confidence: high
    key_findings:
    - finding_id: VIII.F-F1
      finding: Customer contracts and vendor agreements are private but central to
        revenue, privacy and margin diligence.
      evidence_claim_ids:
      - EC-012
      - EC-016
      - EC-026
      risk_ids:
      - R-003
      - R-005
      - R-012
    - finding_id: VIII.F-F2
      finding: M&A agreements for Wingman, Groove and Salesloft are needed to assess
        liabilities and integration obligations.
      evidence_claim_ids:
      - EC-019
      - EC-020
      - EC-007
      risk_ids:
      - R-009
    hidden_risks:
    - MFNs, SLAs, data-use restrictions, termination rights, indemnities, change-of-control
      clauses and AI vendor terms may be material.
    evidence_gaps:
    - Top customer contracts, vendor/cloud/AI agreements, partner agreements, M&A
      documents, leases and standard form deviations.
    follow_up_questions:
    - Provide material contract schedule, top customer agreements, vendor contracts,
      DPAs, partner agreements, merger/acquisition contracts and change-of-control
      analysis.
    table_ids: []
    figure_ids: []
    evidence_claim_ids:
    - EC-012
