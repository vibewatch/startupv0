  missing_information: Audited financial statements, management accounts, ARR/revenue,
    cash, burn, runway, debt, backlog and AR aging.
  why_it_matters: Core to valuation, revenue quality and liquidity.
  suggested_source_or_request: CFO data room package and board materials.
  priority: high
- gap_id: G-002
  chapter_id: I
  section_id: I.C
  missing_information: Post-merger cap table, investor rights, stock ledger, option
    pool, debt and valuation support.
  why_it_matters: Determines economic ownership and downside protection.
  suggested_source_or_request: Company counsel and CFO cap-table export.
  priority: high
- gap_id: G-003
  chapter_id: III
  section_id: III.C
  missing_information: Revenue by customer, churn, NRR/GRR, top customers, renewals
