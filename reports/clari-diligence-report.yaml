executive_summary:
  overall_assessment: Proceed with diligence, but underwrite Clari as a post-merger
    Clari + Salesloft private enterprise software company rather than a clean standalone
    2022 unicorn. Public evidence supports private-unicorn eligibility, active operations,
    a $225M Series F at more than $2.6B, broad revenue-AI product surface and named
    enterprise customers. The largest gaps are current financials, pro forma valuation,
    cap table, customer concentration, retention, product economics, AI/privacy controls,
    litigation/IP schedules and merger integration.
  investment_or_diligence_thesis: Clari's value depends on whether its revenue orchestration,
    Salesloft/Groove/Wingman assets, enterprise customer base and Revenue AI dataset
    can produce durable ARR growth and retention at attractive margins while surviving
    intense suite-vendor competition, privacy/AI scrutiny and post-merger integration
    risk.
  strongest_verified_claims:
  - founder_claim_id: FC-002
    summary: Series F amount and valuation are directly supported by Clari's January
      2022 release.
    evidence_claim_ids:
    - EC-006
  - founder_claim_id: FC-003
    summary: Product breadth is supported by current Clari product pages and acquisition/merger
      announcements.
    evidence_claim_ids:
    - EC-009
    - EC-019
    - EC-020
    - EC-027
  - founder_claim_id: FC-006
    summary: The Clari and Salesloft merger and Steve Cox CEO appointment are supported
      by Clari's completion release and about page.
    evidence_claim_ids:
    - EC-007
    - EC-018
  biggest_risks:
  - risk_id: R-001
    summary: Current financials and valuation are not public; 2022 valuation is stale.
  - risk_id: R-002
    summary: Salesloft merger makes ownership, preference stack and pro forma economics
      opaque.
  - risk_id: R-003
    summary: Revenue quality, churn, NRR, customer concentration and pipeline are
      not public.
  - risk_id: R-005
    summary: AI, CRM, email/calendar and conversation data processing creates privacy/security
      exposure.
  - risk_id: R-006
    summary: Gong, Salesforce, HubSpot, Outreach and Terret/BoostUp create pricing
      and product pressure.
  - risk_id: R-009
    summary: Salesloft, Groove and Wingman integration could affect roadmap, customers
      and employees.
  key_evidence_gaps:
  - Audited consolidated and pro forma financials, current ARR, burn, runway and debt.
  - Post-merger cap table, ownership split, preference stack, option pool, investor
    rights and valuation support.
  - Top-customer schedule, customer concentration, churn, NRR, cohort retention, pipeline
    and customer references.
  - Product-level ARR/gross margin, cloud/AI COGS, uptime/SLA, incident history and
    roadmap.
  - Security assurance reports, AI governance, data-processing terms, breach/DSAR
    logs and subprocessors notices.
  - Litigation/IP schedules, People.ai disposition, patent/trademark assignments,
    OSS inventory and acquired-asset obligations.
  - HRIS, org chart, executive agreements, turnover, compensation, stock plans, employee
    relations and integration plan.
  recommended_next_steps:
  - Run a focused management request for pro forma financials, cap table and Salesloft
    merger documents before underwriting valuation.
  - Conduct customer diligence on top accounts and overlapping Clari/Salesloft/Groove
    customers.
