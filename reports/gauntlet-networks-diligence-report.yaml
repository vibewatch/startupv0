  - founder_claim_id: FC-005
    claim_text: Gauntlet Networks's public valuation and product traction imply investability, but private evidence is required before underwriting.
    claim_source: Analyst synthesis of public sources
    claim_date: 2026-06-05
    mapped_chapter_ids:
      - I
