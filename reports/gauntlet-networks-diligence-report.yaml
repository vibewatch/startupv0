diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR/bookings, gross margin, cash, debt, tax and forecast model.
    why_it_matters: Determines revenue quality, runway and valuation support.
    suggested_source_or_request: Company CFO / finance data room
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, investor rights, liquidation preferences, options, warrants, notes and debt.
    why_it_matters: Impacts ownership, dilution and downside economics.
    suggested_source_or_request: Company counsel / cap-table administrator
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.A
    missing_information: Top-customer schedule, contracts, renewal dates, churn/NRR and concentration.
    why_it_matters: Tests revenue durability and customer risk.
    suggested_source_or_request: Sales operations / customer success
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, pipeline conversion, quota attainment and channel ROI.
    why_it_matters: Determines scalable growth efficiency.
    suggested_source_or_request: CRO / finance / CRM export
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, R&D budget, technical debt, security audits and incident history.
    why_it_matters: Tests product durability and execution risk.
    suggested_source_or_request: CTO / security / product leaders
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS export, org chart, compensation, retention and turnover.
    why_it_matters: Tests key-person and execution risk.
    suggested_source_or_request: HR / payroll / legal
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Legal docket search, regulatory correspondence, privacy/security policies, insurance and material contracts.
    why_it_matters: Identifies liabilities, compliance gaps and deal blockers.
    suggested_source_or_request: Outside counsel / compliance / security
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP assignment, patent/trademark schedules, open-source inventory and license review.
    why_it_matters: Confirms ownership and infringement risk.
    suggested_source_or_request: IP counsel / engineering
    priority: medium
