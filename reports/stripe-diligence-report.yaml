risk_register:
  - risk_id: R-001
    risk_title: Valuation and financial opacity
    risk_category: financial
    severity: high
    likelihood: high
    description: Stripe has exceptional public scale and a $159B valuation anchor, but audited revenue,
      margins, take rate, cash, debt and preferences are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids: *a17
    mitigation_or_diligence_request: Request audited financials, KPI bridge, cap table, debt schedule and financing documents.
  - risk_id: R-002
    risk_title: Regulatory and privacy exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Money movement, transaction data, financial partners and global availability create
      regulatory, privacy and operational compliance risk.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
    evidence_claim_ids: *a18
    mitigation_or_diligence_request: Request license matrix, exam history, privacy/security reports,
      incident log and counsel letters.
  - risk_id: R-003
    risk_title: Customer and volume concentration opacity
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public volume and customer stories do not reveal the largest merchants, take rate,
      renewal terms or churn.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
    evidence_claim_ids: *a19
    mitigation_or_diligence_request: Request top-merchant schedule, processor share, churn, NRR and reference permissions.
  - risk_id: R-004
    risk_title: Competitive pricing pressure
    risk_category: market
    severity: medium
    likelihood: high
    description: Competitors overlap across enterprise acquiring, SMB commerce, wallets and platform
      payments, pressuring fees and switching economics.
    impacted_chapter_ids:
      - IV
      - II
    impacted_section_ids:
      - IV.A
      - II.B
    evidence_claim_ids: *a20
    mitigation_or_diligence_request: Benchmark win/loss, pricing concessions, network costs, gross retention and feature gaps.
  - risk_id: R-005
    risk_title: Platform reliability and security expectations
    risk_category: technical
    severity: high
    likelihood: medium
    description: High transaction volume and financial infrastructure breadth make uptime, fraud,
      security and incident management material.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.A
      - VIII.A
    evidence_claim_ids: *a21
    mitigation_or_diligence_request: Review architecture, SOC reports, penetration tests, incident register and resilience metrics.
  - risk_id: R-006
    risk_title: Global execution complexity
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Global products depend on financial partners, local compliance and country-specific
      economics that are only partially visible publicly.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.B
      - V.A
      - VIII.A
    evidence_claim_ids: *a22
    mitigation_or_diligence_request: Request market-level P&L, partner contracts, operational KPIs and regulatory correspondence.
  - risk_id: R-007
    risk_title: Product breadth and integration burden
    risk_category: technical
    severity: medium
    likelihood: medium
    description: A broad product suite can deepen customer lock-in but increases roadmap, support and
      integration obligations.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
    evidence_claim_ids: *a23
    mitigation_or_diligence_request: Review product P&Ls, roadmap, support burden, incident backlog and integration quality.
  - risk_id: R-008
    risk_title: Management and succession opacity
    risk_category: team
    severity: medium
    likelihood: low
    description: Public leadership roster is strong, but board dynamics, executive retention, succession
      and compensation are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
    evidence_claim_ids: *a24
    mitigation_or_diligence_request: Request board materials, org chart, HRIS, attrition and executive compensation details.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, KPI pack, cap table and financing terms
    why_it_matters: The public valuation requires financial-quality support.
    suggested_source_or_request: Request from company management, investors and auditors.
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.A
    missing_information: Top-customer schedule, churn and merchant concentration
    why_it_matters: Processing volume may be concentrated or lower-margin than headline scale implies.
    suggested_source_or_request: Request customer schedule and reference calls.
    priority: high
  - gap_id: G-003
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Regulatory exams, privacy/security artifacts and counsel letters
    why_it_matters: Regulated money movement and transaction data create high-severity legal risk.
    suggested_source_or_request: Request from counsel and compliance leadership.
    priority: high
