executive_summary:
  overall_assessment: Stripe is one of the strongest public-signal private fintechs, with massive
    processing volume, product breadth and customer proof, but its $159B private valuation cannot be
    underwritten without private financial, customer, regulatory and cap-table records.
  investment_or_diligence_thesis: The bull case is that Stripe remains a default
    financial-infrastructure layer for internet commerce. The diligence burden is proving durable
    net revenue, margins, compliance scalability and concentration resilience behind the public
    volume metrics.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Stripe at a $159B valuation.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Stripe publicly discloses broad products and standard card pricing.
      evidence_claim_ids:
        - EC-004
        - EC-009
    - founder_claim_id: FC-005
      summary: Stripe publishes license-authority and privacy disclosures.
      evidence_claim_ids:
        - EC-006
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Valuation and financial opacity
    - risk_id: R-002
      summary: Regulatory and privacy exposure
    - risk_id: R-003
      summary: Customer and volume concentration opacity
    - risk_id: R-004
      summary: Competitive pricing pressure
    - risk_id: R-005
      summary: Platform reliability and security expectations
  key_evidence_gaps:
    - Audited financial statements, cash, debt, margins, take rate and product P&Ls.
    - Current cap table, liquidation preferences, financing documents and secondary pricing.
    - Top merchant concentration, churn, net revenue retention and contract economics.
    - Regulatory exams, privacy/security incidents, license status and counsel letters.
    - Technical architecture, product-quality metrics, IP schedule and open-source review.
  recommended_next_steps:
    - Start with audited financials, cap table and top-customer schedule before underwriting
      valuation.
    - Run legal/regulatory diligence across licenses, privacy, money movement and financial partners.
    - Benchmark enterprise pricing, authorization rates, fraud losses and competitor win/loss.
    - Review product-level P&Ls, roadmap, incident history and security reports.
    - Conduct customer and partner references across enterprise, platform and SMB cohorts.
