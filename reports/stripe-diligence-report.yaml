evidence_claims:
  - evidence_claim_id: EC-001
    claim: CB Insights lists Stripe as a United States financial-services unicorn in San Francisco with
      a $159B valuation and selected investors including Khosla Ventures, Lowercase Capital and
      CapitalG.
    evidence_summary: The CB Insights unicorn table provides the latest public valuation anchor used in this report.
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-001
    limitations: CB Insights is a market database; round terms, fully diluted ownership and secondary
      activity are not disclosed.
  - evidence_claim_id: EC-002
    claim: Stripe says businesses on Stripe generated $1.9T in 2025, equivalent to 1.6% of global GDP.
    evidence_summary: Stripe annual-letter page publishes the processing-volume claim.
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-002
    limitations: Company-published volume is not reconciled to audited revenue, net take rate or margins.
  - evidence_claim_id: EC-003
    claim: Stripe publishes platform scale anchors including 135+ currencies and payment methods, $1.9T
      processed in 2025, 99.999% historical uptime and 200M+ active subscriptions managed on Stripe
      Billing.
    evidence_summary: Stripe about page includes these operating metrics.
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-003
    limitations: Underlying calculations and audit support were not public.
  - evidence_claim_id: EC-004
    claim: Stripe lists standard US domestic card pricing at 2.9% plus $0.30 per successful transaction
      and offers custom pricing for large volume or unique business models.
    evidence_summary: Stripe pricing page discloses standard and custom pricing constructs.
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-004
    limitations: Discount schedules, cost of acceptance, fraud losses and enterprise contract terms are private.
  - evidence_claim_id: EC-005
    claim: Stripe describes itself as the payments platform behind millions of businesses and publishes
      customer examples and outcomes.
    evidence_summary: Stripe customer page states the platform supports millions of businesses and lists
      public customer stories.
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-005
    limitations: Customer ARR, processing share and concentration are not disclosed.
  - evidence_claim_id: EC-006
    claim: Stripe Payments Company publishes a broad state and territory license-authority table for
      money-transmission services.
    evidence_summary: The public license page lists authorities across US states and territories.
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-006
    limitations: License status, exam findings and remediation history require legal diligence.
  - evidence_claim_id: EC-007
    claim: Stripe privacy disclosures define personal data, transaction data, end customers,
      representatives, visitors and financial partners.
    evidence_summary: The privacy policy describes data categories and service-provider relationships.
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-007
    limitations: Security incidents, DPIAs, retention schedules and customer obligations were not public.
  - evidence_claim_id: EC-008
    claim: Stripe newsroom information states Stripe builds economic infrastructure for the internet,
      has dual headquarters in San Francisco and Dublin, and operates offices around the world.
    evidence_summary: The newsroom information page provides mission, headquarters and fast facts.
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-008
    limitations: Employee count, attrition and org-level productivity were not public.
  - evidence_claim_id: EC-009
    claim: Stripe publicly lists a deep product suite spanning payments, billing, invoicing, tax,
      treasury, payouts, capital, crypto, Connect and developer resources.
    evidence_summary: Stripe product navigation and about page show breadth across payments and money movement.
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-003
      - SRC-008
    limitations: Product-level revenue, attach rates and contribution margin are not disclosed.
  - evidence_claim_id: EC-010
    claim: Public sources did not disclose audited financial statements, detailed revenue, gross margin,
      cash, debt, cap table or liquidation preferences for Stripe.
    evidence_summary: The reviewed public sources provide scale and valuation claims but no
      private-company financial statements or security terms.
    verification_status: not_publicly_verifiable
    confidence: high
    source_ids:
      - SRC-001
      - SRC-002
      - SRC-003
    limitations: Requires company data room, financing documents and auditor materials.
  - evidence_claim_id: EC-011
    claim: Public competitor sources show Stripe operates in a crowded payments and
      financial-infrastructure market with global acquirers, wallet networks and merchant platforms.
    evidence_summary: Adyen, PayPal/Braintree, Square and Checkout.com public sites show overlapping
      payments capabilities.
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-009
      - SRC-010
      - SRC-011
      - SRC-012
    limitations: Relative win rates, pricing concessions and merchant churn require private data.
  - evidence_claim_id: EC-012
    claim: Stripe leadership is publicly identified with Patrick Collison as Cofounder and CEO, John
      Collison as Cofounder and President, and named executives across technology, revenue, legal,
      marketing, finance and people.
    evidence_summary: Stripe newsroom information page lists leadership roles.
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-008
    limitations: Board dynamics, succession plan and executive retention are private.
  - evidence_claim_id: EC-013
    claim: Stripe availability and operating footprint are global, but public sources do not provide
      country-level profitability, licensing constraints or regulatory exam outcomes.
    evidence_summary: Company materials identify 50+ countries available to businesses and many
      financial partners, while legal outcomes are not fully disclosed.
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-006
      - SRC-007
      - SRC-008
    limitations: Requires legal matrix, regulatory correspondence and market-by-market P&L.
  - evidence_claim_id: EC-014
    claim: Public customer stories and platform claims do not disclose the largest merchants, processing
      concentration, renewal terms, churn or net revenue retention.
    evidence_summary: Customer pages provide logos and narratives but not concentration or contract economics.
    verification_status: not_publicly_verifiable
    confidence: high
    source_ids:
      - SRC-005
    limitations: Requires top-customer schedule, contracts and reference calls.
  - evidence_claim_id: EC-015
    claim: Public materials show direct sales, self-serve signup, customer stories, annual letters and
      partner programs as GTM signals.
    evidence_summary: Company pages include get-started flows, contact-sales flows, customer stories and
      partner calls to action.
    verification_status: verified
    confidence: medium
    source_ids:
      - SRC-002
      - SRC-003
      - SRC-005
      - SRC-008
    limitations: CAC, channel mix, quota attainment and sales-cycle data are private.
  - evidence_claim_id: EC-016
    claim: Public sources do not disclose a complete IP schedule, source-code escrow, open-source
      exposure or product-quality incident log.
    evidence_summary: Reviewed public sources describe product capabilities and uptime but not private
      technical diligence artifacts.
    verification_status: not_publicly_verifiable
    confidence: high
    source_ids:
      - SRC-003
      - SRC-008
    limitations: Requires engineering architecture, patent/trademark schedule, security reports and
      incident history.
