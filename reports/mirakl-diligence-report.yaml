schema_version: "1.1"
report_metadata:
  report_title: Mirakl Standard-Depth Public-Source Startup Diligence Report
  target_company: Mirakl
  website: https://www.mirakl.com/
  known_aliases:
    - Mirakl SAS
  sector: Enterprise marketplace software / commerce infrastructure
  geography: France-headquartered, global enterprise customer footprint
  company_stage: Late-stage private company
  research_date: 2026-05-31
  analyst: GitHub Copilot startup-diligence-research skill
  report_version: "1.1"
  currency: USD and EUR as source-reported
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source research using company pages, product pages, press releases, customer stories, legal/security pages, corporate registry excerpts, analyst pages, media reports, competitor pages, and public web-search screens.
    - No management interviews, customer calls, paid data rooms, non-public documents, or jurisdiction-specific docket searches were available.
  included_jurisdictions:
    - France
    - United States
    - United Kingdom
    - European Union
    - Global enterprise commerce markets
  excluded_topics:
    - Audited financial statement review
    - Formal legal opinion
    - Formal valuation opinion
    - Full court/regulatory/tax/lien/IP search
    - Customer reference interviews
    - Code/security audit
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Mirakl standard-depth public-source diligence YAML
      type: prompt
      date_received: 2026-05-31
      notes: No private company materials provided.
