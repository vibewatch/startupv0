executive_summary:
  overall_assessment: Proceed to management/data-room diligence. Public evidence supports Mirakl as a real, scaled, well-funded enterprise marketplace-platform vendor with recognizable customers and a broad product suite, but does not independently verify the financial, contractual, customer-retention, security, governance, or legal facts needed for investment underwriting.
  investment_or_diligence_thesis: Mirakl may have durable enterprise marketplace infrastructure value if public GMV/customer indicators convert into recurring ARR, strong retention, profitable implementation, and defensible module expansion. The diligence bottleneck is valuation support and revenue quality, not basic existence or category relevance.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: The $555M Series E and >$3.5B valuation are supported by company and TechCrunch sources.
      evidence_claim_ids:
        - EC-004
    - founder_claim_id: FC-005
      summary: Product breadth is supported by multiple Mirakl product pages and acquisition announcements.
      evidence_claim_ids:
        - EC-002
        - EC-007
        - EC-008
        - EC-009
    - founder_claim_id: FC-004
      summary: Customer logo and case-study evidence supports enterprise adoption, though revenue details are private.
      evidence_claim_ids:
        - EC-010
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: No public audited financial statements, ARR bridge, profitability, or cash/debt data.
    - risk_id: R-006
      summary: Customer concentration, churn, NRR, and renewals are not publicly verifiable.
    - risk_id: R-008
      summary: Payments, marketplace, privacy, security, and ads compliance require counsel/technical review.
    - risk_id: R-002
      summary: 2021 valuation and late-stage financing may include preference-stack and incentive complications.
  key_evidence_gaps:
    - Audited financials and ARR bridge
    - Cap table and investor rights
    - Top-customer contracts and retention cohorts
    - Security/control reports and architecture
    - Legal/regulatory/tax/insurance schedules
  recommended_next_steps:
    - Open a financial and legal data room
    - Run customer calls and retention analysis
    - Conduct technical/security diligence
    - Commission legal/regulatory/tax searches
    - Stress-test valuation against current SaaS/commercial metrics
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public sources verify financing headlines and company-published scale metrics, but not audited financials, ARR quality, profitability, cash runway, debt, tax, or cap table economics.
    founder_claim_ids:
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-005
      - EC-006
    risk_ids:
      - R-001
      - R-002
      - R-003
    sections:
      - section_id: I.A
        title: Historical financial statements and operating metrics
        checklist_question_ids:
          - I.A.1
          - I.A.2
        summary: Mirakl reports 2024 GMV, recurring software revenue mix, and revenue growth, but these are company-published summary metrics rather than audited statements.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: 2024 GMV >$8.6B and >95% recurring software revenue are useful scale signals requiring reconciliation.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Audited P&L, balance sheet, cash flow, gross margin, and ARR bridge are not public.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-001
        hidden_risks:
          - GMV may not map cleanly to monetized software revenue or customer-level ARR.
        evidence_gaps:
          - Audited statements, ARR bridge, revenue-recognition policy, cash/debt/tax schedules.
        follow_up_questions:
          - Provide financial data room and QoR materials.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-005
          - EC-006
      - section_id: I.B
        title: Projections and operating plan
        checklist_question_ids:
          - I.B.1
          - I.B.2
        summary: Public materials show growth initiatives in Ads, Payout, Connect, and AI, but no board-approved plan, pipeline, CAC, or profitability path.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: Forward plan cannot be underwritten from public sources.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-001
              - R-003
          - finding_id: I.B-F2
            finding: Product expansion may support growth but could increase implementation and compliance cost.
            evidence_claim_ids:
              - EC-007
              - EC-008
              - EC-025
            risk_ids:
              - R-003
              - R-004
              - R-008
        hidden_risks:
          - Growth may require higher implementation, support, security, and regulatory spend.
        evidence_gaps:
          - Board plan, plan-vs-actual, pipeline coverage, CAC payback, hiring plan.
        follow_up_questions:
          - Provide projections and operating KPI package.
        table_ids:
          - T-001
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-025
      - section_id: I.C
        title: Capitalization and ownership
        checklist_question_ids:
          - I.C.1
          - I.C.2
        summary: The $300M Series D and $555M Series E are public, but ownership, preferences, debt, option overhang, and consents are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: The 2021 Series E valuation above $3.5B is a key valuation anchor but not current fair value.
