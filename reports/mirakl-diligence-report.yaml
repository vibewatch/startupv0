risk_register:
  - risk_id: R-001
    risk_title: Financial statements and revenue quality are not publicly verifiable
    risk_category: financial
    severity: critical
    likelihood: high
    description: Public sources disclose summary metrics but not audited statements, ARR bridge, profitability, cash, debt, or accounting policies.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
    evidence_claim_ids:
      - EC-005
      - EC-006
    mitigation_or_diligence_request: Require audited financials, monthly ARR waterfall, GMV reconciliation, QoR, revenue recognition memo, cash/debt schedule, and board-approved plan.
  - risk_id: R-002
    risk_title: Preference stack and capitalization economics unknown
    risk_category: financing
    severity: critical
    likelihood: high
    description: Late-stage financing headlines do not reveal ownership, liquidation preferences, option overhang, debt, or investor consent rights.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.C
      - V.A
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-016
    mitigation_or_diligence_request: Review fully diluted cap table, financing documents, investor rights, debt, warrants, option plan, and transaction consent requirements.
  - risk_id: R-003
    risk_title: Growth plan, CAC, and sales efficiency unverified
    risk_category: market
    severity: high
    likelihood: high
    description: Public materials do not disclose bookings, pipeline conversion, quota attainment, CAC payback, sales-cycle length, or partner attribution.
    impacted_chapter_ids:
      - I
      - III
      - IV
    impacted_section_ids:
      - I.B
      - III.B
      - IV.B
    evidence_claim_ids:
      - EC-006
      - EC-012
      - EC-013
    mitigation_or_diligence_request: Request plan-vs-actual, pipeline, win/loss, sales productivity, partner-sourced revenue, and implementation capacity analysis.
  - risk_id: R-004
    risk_title: Implementation and integration complexity may constrain margins
    risk_category: operational
    severity: high
    likelihood: medium
    description: Enterprise marketplaces require integrations, catalog management, seller onboarding, support, and partner coordination that may limit scalability.
    impacted_chapter_ids:
      - II
      - III
      - V
      - VI
    impacted_section_ids:
      - II.A
      - II.A
      - III.B
      - V.B
      - VI.A
    evidence_claim_ids:
      - EC-002
      - EC-007
      - EC-015
    mitigation_or_diligence_request: Review implementation backlog, services margin, partner quality, technical debt, support tickets, and customer escalations.
  - risk_id: R-005
    risk_title: AI and data-rights governance is not public
    risk_category: technical
    severity: high
    likelihood: medium
    description: AI-powered marketplace tooling and personalization require model governance, data-rights, privacy, and IP controls.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.B
      - VI.B
    evidence_claim_ids:
      - EC-008
      - EC-020
    mitigation_or_diligence_request: Review AI model/vendor inventory, training data rights, human review, model evaluation, privacy basis, and customer AI terms.
  - risk_id: R-006
    risk_title: Customer concentration, churn, and renewal risk unknown
    risk_category: customer
    severity: critical
    likelihood: high
    description: Named logos exist, but ARR concentration, churn, renewal schedule, NRR, and current customer health are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.B
      - V.A
    evidence_claim_ids:
      - EC-010
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Obtain top-customer schedule, retention cohorts, renewal calendar, support health, contract terms, and reference calls.
  - risk_id: R-007
    risk_title: Competition from marketplace vendors, commerce suites, and in-house builds
    risk_category: market
    severity: high
    likelihood: medium
    description: Public competitor pages show several alternatives and enterprise buyers may build marketplace infrastructure internally.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
      - IV.B
    evidence_claim_ids:
      - EC-013
      - EC-014
    mitigation_or_diligence_request: Analyze win/loss logs, replacement deals, competitive pricing, product benchmarks, and switching costs.
  - risk_id: R-008
    risk_title: Payments, privacy, security, marketplace, and ads compliance complexity
    risk_category: regulatory
    severity: critical
    likelihood: medium
    description: Payouts, seller onboarding, marketplace data, advertising, and global customers create regulatory and security/control exposure.
    impacted_chapter_ids:
      - V
      - VI
      - VIII
    impacted_section_ids:
      - V.B
      - VI.B
      - VIII.B
    evidence_claim_ids:
      - EC-015
      - EC-017
      - EC-018
      - EC-025
    mitigation_or_diligence_request: Review PSP contracts, funds flow, KYC/AML/sanctions allocation, SOC/ISO reports, DPAs, incident logs, and regulatory roles.
  - risk_id: R-009
    risk_title: Talent retention and governance incentives may be misaligned
    risk_category: team
    severity: high
    likelihood: medium
    description: Board composition, retention incentives, compensation, attrition, and option economics are not public; a post-2021 valuation reset could affect incentives.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
    evidence_claim_ids:
      - EC-019
      - EC-021
    mitigation_or_diligence_request: Review org chart, board minutes, executive agreements, option plan, 409A/common valuation, attrition, and retention packages.
  - risk_id: R-010
    risk_title: Corporate-registry and legal/regulatory matters require counsel review
    risk_category: legal
    severity: high
    likelihood: medium
    description: Pappers excerpts reference ORIAS and historical corporate-action labels; litigation, tax, and insurance are not publicly verified.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.B
    evidence_claim_ids:
      - EC-022
      - EC-023
      - EC-024
      - EC-026
    mitigation_or_diligence_request: Obtain original filings, counsel memos, good-standing certificates, legal searches, tax returns, insurance policies, and claims schedule.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR bridge, GMV reconciliation, profitability, cash, debt, and tax data.
    why_it_matters: Required to validate scale, revenue quality, runway, and valuation support.
    suggested_source_or_request: Request audited statements, management accounts, ARR waterfall, GMV-to-revenue reconciliation, revenue-recognition memo, cash/debt/tax schedules.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preferences, investor rights, option plan, debt, warrants, and secondary history.
    why_it_matters: Determines investment economics, dilution, incentive alignment, and transaction consent requirements.
    suggested_source_or_request: Request cap table and all financing/shareholder/debt/option documents.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, adoption, gross margin, pricing, discounting, implementation costs, and support KPIs.
    why_it_matters: Product breadth only matters if modules drive durable, profitable adoption.
    suggested_source_or_request: Request product revenue cube, price book, implementation SOWs, module penetration, support SLA/ticket metrics.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.B
    missing_information: AI model inventory, data rights, roadmap proof, and AI governance controls.
    why_it_matters: AI features may add differentiation but introduce legal, privacy, and product-quality risk.
    suggested_source_or_request: Request AI governance memo, vendor/model list, training-data rights, evaluation logs, customer AI terms.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.B
    missing_information: Customer concentration, churn, NRR, renewal schedule, contract status, and current reference health.
    why_it_matters: Named logos cannot underwrite revenue durability without active-contract evidence.
    suggested_source_or_request: Request top 25 customer ARR/GMV schedule, cohorts, renewals, support health, and references.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.B
    missing_information: Pipeline, win/loss, sales productivity, CAC payback, partner attribution, and market share.
    why_it_matters: Forward plan and growth efficiency cannot be validated from public materials.
    suggested_source_or_request: Request pipeline and sales-efficiency package with historical conversion and plan-vs-actual.
    priority: high
  - gap_id: G-007
    chapter_id: V
    section_id: V.A
    missing_information: Top customer contracts, partner agreements, PSP/banking agreements, SLAs, DPAs, and investor-rights documents.
    why_it_matters: Material terms can affect revenue, liability, regulated roles, and transaction feasibility.
    suggested_source_or_request: Request full material-contract package and clause summary.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture diagrams, SOC/ISO reports, pen tests, incident logs, subprocessor list, RTO/RPO, and DR tests.
    why_it_matters: Public security pages do not validate technical control effectiveness.
    suggested_source_or_request: Request CISO/CTO diligence package and customer security questionnaire history.
    priority: high
  - gap_id: G-009
    chapter_id: VI
    section_id: VI.B
