# Generated public-source standard diligence report for Wonderful. Do not treat as legal, tax, accounting or investment advice.
report_metadata:
  report_title: Wonderful Public-Source Startup Diligence Report
  target_company: Wonderful
  website: https://www.wonderful.ai/
  known_aliases: [Wonderful.ai, Wonderful AI, Wonderful Inc., Wonderful CX]
  sector: Enterprise AI agent platform / customer-service and workflow automation
  geography: Israel / Tel Aviv origin with global local-market expansion across Europe, Middle East, Asia-Pacific and Latin America
  company_stage: Active private unicorn / late-stage venture-backed AI startup
  research_date: "2026-06-04"
  analyst: GitHub Copilot CLI using startup-diligence-research skill
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Reviewed Wonderful-owned website, product, about, careers, press, customer-story, legal, privacy and trust pages.
    - Used CB Insights unicorn-list row for public unicorn eligibility and TechCrunch/PRNewswire/company announcements for funding corroboration.
    - Searched public web for IPO, acquisition and shutdown signals; no disqualifying public exit/shutdown evidence found.
    - Reviewed competitor public sites for market context; no paid databases, private records, customer calls or management interviews used.
    - Classified private financial, customer, legal, IP, HR and contract items as not_publicly_verifiable when public sources did not support them.
  included_jurisdictions: [Israel, United States, European Union / GDPR, United Kingdom, Selected public global markets]
  excluded_topics:
    - No private financial statements, bank records, customer contracts, cap table, HRIS, board materials or source code.
    - No formal court, patent/trademark, sanctions, bankruptcy, regulator or paid market database searches.
    - No paywall bypassing and no non-public personal data.
  user_provided_materials:
    - material_id: M-001
      title: User prompt with CB Insights seed row for Wonderful
      type: prompt_argument
      date_received: "2026-06-04"
      notes: Included company, slug, CB valuation/date/country/city/industry and source URL; no private diligence materials.
