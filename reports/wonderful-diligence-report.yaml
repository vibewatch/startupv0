executive_summary:
  overall_assessment: Wonderful passes public eligibility for a standard public-source diligence report; public evidence supports active private unicorn status, a March 2026 $150M Series B at a $2B valuation, current website/careers/press activity, and no public IPO/acquisition/shutdown signal found. Proceed only with heavy confirmatory diligence because financials, customer concentration, cap table, legal schedules and technical proof are mostly private.
  investment_or_diligence_thesis: Wonderful may be a fast-scaling enterprise AI-agent platform with strong market timing, funding momentum, local deployment model and named regulated-customer proof. Underwriting depends on validating revenue quality, implementation scalability, model/cloud dependence, regulated-workflow controls and competitive differentiation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support Wonderful as a $2B private unicorn after the March 2026 Series B.
      evidence_claim_ids: [EC-001, EC-002, EC-003, EC-005]
    - founder_claim_id: FC-002
      summary: Product pages verify a broad enterprise AI-agent platform narrative.
      evidence_claim_ids: [EC-006, EC-007, EC-008]
    - founder_claim_id: FC-004
      summary: Banco Caja Social is a detailed named customer proof point, subject to customer-reference validation.
      evidence_claim_ids: [EC-010]
    - founder_claim_id: FC-005
      summary: Wonderful publishes privacy, trust and legal-template materials.
      evidence_claim_ids: [EC-015, EC-016, EC-017]
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR, margins, burn and unit economics are not public.
    - risk_id: R-002
      summary: Valuation stepped up quickly and financing terms are unknown.
    - risk_id: R-003
      summary: Customer concentration, churn and NRR are not public.
    - risk_id: R-005
      summary: Model/cloud dependencies and eval/self-healing claims need technical proof.
    - risk_id: R-006
      summary: Forward-deployed local-team model may limit scalability and gross margin.
  key_evidence_gaps:
    - Audited financials, ARR, margin, burn, CAC and retention.
    - Cap table, financing documents, preferences, debt and stock plan.
    - Top-customer ARR, contracts, renewal/churn and references.
    - Architecture, eval benchmarks, incident/SLA history, security reports and vendor terms.
    - Legal schedule, insurance, IP searches, regulatory correspondence and HRIS.
  recommended_next_steps:
    - Run financial/cap-table/legal data-room request.
    - Conduct customer references including Banco Caja Social and churned/lost accounts.
    - Run technical diligence on architecture, evals, model routing, security and incident response.
    - Validate GTM and services economics through CRM, quota and utilization data.
    - Commission counsel-led IP, litigation, regulatory, privacy and employment reviews.
