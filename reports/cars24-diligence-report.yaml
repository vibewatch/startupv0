        title: Lawsuits, regulatory matters and IP
        checklist_question_ids:
          - VIII.A
          - VIII.B
          - VIII.C
        summary: Public sources do not provide a full legal docket, IP schedule, consumer complaint history or IPO DRHP.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.A-F1
            finding: IPO readiness and regulated services require counsel-led verification beyond public sources.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-004
              - R-008
        hidden_risks:
          - Undisclosed consumer, finance or data claims could impair IPO readiness.
        evidence_gaps:
          - Litigation search, complaint history, IP assignments, DRHP drafts, audit controls and regulatory filings.
        follow_up_questions:
          - Have counsel review litigation, complaints, IP, DRHP, audits and regulatory filings.
        table_ids:
          - T-015
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-012
          - EC-018
      - section_id: VIII.B
        title: Contracts, compliance and insurance diligence
        checklist_question_ids:
          - VIII.D
          - VIII.E
          - VIII.F
          - VIII.G
        summary: NBFC, insurance, challan/FASTag/RTO data, warranty and buyback services create regulatory and contractual diligence needs.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.B-F1
            finding: The official site shows regulated or government-adjacent services, but underlying compliance records are private.
            evidence_claim_ids:
              - EC-002
              - EC-003
            risk_ids:
              - R-008
        hidden_risks:
          - Consumer-finance and vehicle-compliance workflows can trigger regulatory penalties or brand damage if controls fail.
        evidence_gaps:
          - NBFC filings, insurance partnerships, government-data access, consumer terms, privacy compliance, warranty reserves and insurance policies.
        follow_up_questions:
          - Request compliance audits, contracts, data licenses, privacy assessments, insurance and warranty reserve analysis.
        table_ids:
          - T-016
        figure_ids:
          - F-008
        evidence_claim_ids:
          - EC-002
