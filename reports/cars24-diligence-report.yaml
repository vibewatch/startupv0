    section_id: I.A
    missing_information: Audited financial statements, cash flow, inventory aging, vehicle gross margin and adjusted EBITDA reconciliation.
    why_it_matters: Public revenue and adjusted EBITDA do not prove cash generation or vehicle-level profitability.
    suggested_source_or_request: Company CFO, auditors and board packs.
    priority: critical
  - gap_id: G-002
    chapter_id: I
    section_id: I.B
    missing_information: Cap table, parent funding terms, debt/facilities, related-party agreements and IPO plan.
    why_it_matters: Recent parent funding and IPO posture require ownership, runway and governance validation.
    suggested_source_or_request: Company counsel, investors and finance leadership.
    priority: critical
  - gap_id: G-003
    chapter_id: VIII
    section_id: VIII.B
    missing_information: NBFC filings, loan book, credit quality, KYC/AML, insurance, data and RTO/FASTag compliance evidence.
    why_it_matters: Regulated and government-adjacent workflows are material risk drivers.
    suggested_source_or_request: Compliance/legal, NBFC management and outside counsel.
    priority: critical
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Consumer funnel, MAU, CAC/payback, retention, NPS/complaints, warranty claims and support SLA.
    why_it_matters: Consumer trust and unit economics drive marketplace durability.
    suggested_source_or_request: Growth, customer success and operations teams.
    priority: high
  - gap_id: G-005
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/geography, layoffs/restructuring costs, attrition, comp and ESOP plan.
    why_it_matters: Restructuring and IPO preparation increase execution and employee-relations risk.
    suggested_source_or_request: HR leadership and board materials.
    priority: high
