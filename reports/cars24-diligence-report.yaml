executive_summary:
  overall_assessment: Cars24 has credible public evidence of unicorn status, large revenue scale, broad auto-commerce product breadth and IPO-bound private status. The diligence posture is high-risk because net losses, working-capital needs, NBFC/credit exposure, inventory economics, restructuring and regulatory/consumer-compliance obligations are not publicly underwritable.
  investment_or_diligence_thesis: Track as an IPO-readiness and operational-improvement case rather than a clean growth-underwriting case. The core diligence question is whether Cars24 can convert scale and product breadth into durable cash generation without excessive inventory, finance, consumer-trust or compliance risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights supports historical US$3.30B unicorn valuation and IPO Central reports recent parent funding.
      evidence_claim_ids:
        - EC-001
        - EC-004
        - EC-005
    - founder_claim_id: FC-002
      summary: Cars24 official site and Inc42 verify broad marketplace, finance, ownership-services and vehicle-data product surface.
      evidence_claim_ids:
        - EC-002
        - EC-012
    - founder_claim_id: FC-006
      summary: IPO Central reports FY24 revenue, net loss and adjusted EBITDA metrics.
      evidence_claim_ids:
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Profitability and financial quality remain unresolved despite scale and adjusted EBITDA.
    - risk_id: R-002
      summary: Working-capital, inventory and residual-value exposure are central to the model.
    - risk_id: R-003
      summary: NBFC/credit and consumer-finance compliance require detailed loan-book and regulatory review.
  key_evidence_gaps:
    - Audited financials, cash flow, inventory aging, vehicle gross margin and adjusted EBITDA reconciliation.
    - NBFC loan book, NPA/provisioning, funding lines, KYC/AML and RBI compliance evidence.
    - Customer funnel, MAU, CAC/payback, retention, NPS/complaints, warranty claims and RC-transfer SLA.
    - IPO readiness, DRHP, legal docket, IP assignments, consumer contracts, data licenses and insurance.
  recommended_next_steps:
    - Run IPO-readiness financial diligence with audited statements, segment P&L and working-capital model.
    - Perform NBFC/credit, consumer-compliance and data-privacy legal diligence.
    - Validate vehicle-level unit economics, inventory turns, warranty/return exposure and CAC/payback.
    - Review restructuring, leadership transition, headcount capacity and product shutdown obligations.
