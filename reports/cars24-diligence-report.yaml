report_metadata:
  report_title: Cars24 Startup Diligence Report
  target_company: Cars24
  website: https://www.cars24.com/
  known_aliases:
    - Cars24
    - CARS24
    - Cars24 Services Private Limited
    - Global Car Group
  sector: Auto-commerce, used-car marketplace, vehicle finance and ownership services
  geography: India / Gurgaon with reported international operations
  company_stage: Private auto-tech unicorn / IPO-bound growth company
  research_date: 2026-05-18
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: INR and USD as reported by sources
  time_zone: Asia/Kolkata
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public-source standard diligence only; no data room, management interview, customer reference, legal docket export or internal financial model was available.
    - Prioritized company-owned pages for product claims, reputable business press for financing and operating signals, and CB Insights for unicorn-status screening.
    - Classified unsupported operating, financial, customer, legal and technical claims as not_publicly_verifiable rather than inferring private facts.
  included_jurisdictions:
    - India
    - Singapore parent-company financing context
    - Australia, UAE, Southeast Asia and Middle East referenced by public sources
  excluded_topics:
    - Private financial statements, cap table, customer contracts, employee data, source code, board packs, legal opinions and regulator correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for Cars24 diligence report
      type: workflow_request
      date_received: 2026-05-18
      notes: No pitch deck, data room, founder responses or private artifacts were provided.
