  - figure_id: F-008
    title: Key risk heatmap
    chapter_id: VIII
    section_id: VIII.A
    figure_type: risk_heatmap
    description: Heatmap of diligence risks identified from public sources and gaps.
    purpose: Prioritize follow-up diligence before any investment decision.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial statements, venue P&L, and unit economics are not public
          severity: high
          likelihood: high
          rationale: Public sources validate funding and valuation but not revenue, margins, burn, runway, venue-level payback, or cash conversion.
          evidence_claim_ids:
            - EC-001
            - EC-003
            - EC-019
          source_ids:
            - SRC-001
            - SRC-003
            - SRC-002
        - risk_id: R-002
          label: Capital intensity and rollout financing risk
          severity: high
          likelihood: medium
          rationale: Large 65,000-square-foot venues with dome/display infrastructure likely require substantial capex, leases, maintenance, and launch spend.
          evidence_claim_ids:
            - EC-003
            - EC-012
          source_ids:
            - SRC-003
        - risk_id: R-003
          label: Content rights dependence and renewal economics
          severity: high
          likelihood: medium
          rationale: Sports and entertainment rights appear central to demand; adverse contract terms or lost renewals could impair utilization.
          evidence_claim_ids:
            - EC-006
            - EC-014
            - EC-015
          source_ids:
            - SRC-006
            - SRC-003
            - SRC-015
        - risk_id: R-004
          label: Venue launch, safety, and operating execution risk
          severity: high
          likelihood: medium
          rationale: Physical venues add permitting, crowd safety, F&B, staffing, maintenance, insurance, and customer-experience risks beyond software/media operations.
          evidence_claim_ids:
            - EC-012
            - EC-020
          source_ids:
            - SRC-003
            - SRC-004
            - SRC-006
            - SRC-012
        - risk_id: R-005
          label: Demand, seasonality, and utilization risk
          severity: medium
          likelihood: high
          rationale: Sold-out public events are encouraging but do not establish steady-state utilization, repeat demand, off-peak performance, or pricing durability.
          evidence_claim_ids:
            - EC-007
            - EC-013
            - EC-021
          source_ids:
            - SRC-007
            - SRC-008
            - SRC-009
            - SRC-010
            - SRC-003
        - risk_id: R-006
          label: Technology reliability and integration risk
          severity: high
          likelihood: medium
          rationale: The full-stack LED dome, software, production, and content pipeline must perform reliably in live paid venues.
          evidence_claim_ids:
            - EC-004
            - EC-005
            - EC-020
          source_ids:
            - SRC-004
            - SRC-012
            - SRC-003
            - SRC-006
        - risk_id: R-007
          label: Competition and substitutes across live entertainment, premium cinemas, streaming, VR, and destination venues
          severity: medium
          likelihood: high
          rationale: Cosm competes for consumers discretionary spend and partner attention against stadiums, arenas, premium theaters, streaming at home, headset experiences, and other immersive venues.
          evidence_claim_ids:
            - EC-020
          source_ids:
            - SRC-003
            - SRC-004
            - SRC-006
            - SRC-012
        - risk_id: R-008
          label: IP, contracts, litigation, and insurance not cleared from public sources
          severity: medium
          likelihood: unknown
          rationale: Public patent and no-result court searches are not enough to underwrite IP chain, rights contracts, venue leases, employment claims, insurance, or regulatory exposure.
          evidence_claim_ids:
            - EC-009
            - EC-011
            - EC-022
          source_ids:
            - SRC-013
            - SRC-014
            - SRC-016
        - risk_id: R-009
          label: Management integration and retention risk
          severity: medium
          likelihood: medium
          rationale: Cosm appears assembled from multiple predecessor/acquired capabilities, creating potential integration and key-person retention risk.
          evidence_claim_ids:
            - EC-008
            - EC-016
            - EC-018
          source_ids:
            - SRC-011
            - SRC-004
            - SRC-003
            - SRC-013
            - SRC-017
        - risk_id: R-010
          label: Public-source diligence has material coverage limits
          severity: medium
          likelihood: unknown
          rationale: Several public pages are dynamic, blocked, or promotional; no interviews, data-room materials, paid court searches, or private customer checks were performed.
          evidence_claim_ids:
