risk_register:
  - risk_id: R-001
    risk_title: Financial statements, venue P&L, and unit economics are not public
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources validate funding and valuation but not revenue, margins, burn, runway, venue-level payback, or cash conversion.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-019
    mitigation_or_diligence_request: Require audited financials, monthly financials, ARR/revenue bridge, venue P&L, gross margin, cash runway, cap table, and debt schedule before underwriting.
  - risk_id: R-002
    risk_title: Capital intensity and rollout financing risk
    risk_category: financing
    severity: high
    likelihood: medium
    description: Large 65,000-square-foot venues with dome/display infrastructure likely require substantial capex, leases, maintenance, and launch spend.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.B
      - I.D
      - V.E
    evidence_claim_ids:
      - EC-003
      - EC-012
    mitigation_or_diligence_request: Review venue capex budgets, leases, construction contracts, debt facilities, maintenance obligations, payback periods, and expansion gating criteria.
  - risk_id: R-003
    risk_title: Content rights dependence and renewal economics
    risk_category: customer
    severity: high
    likelihood: medium
    description: Sports and entertainment rights appear central to demand; adverse contract terms or lost renewals could impair utilization.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.B
      - V.C
      - VIII.F
    evidence_claim_ids:
      - EC-006
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Review all rights-holder agreements, revenue shares, minimum guarantees, exclusivity, production cost allocation, and renewal/termination provisions.
  - risk_id: R-004
    risk_title: Venue launch, safety, and operating execution risk
    risk_category: operational
    severity: high
    likelihood: medium
    description: Physical venues add permitting, crowd safety, F&B, staffing, maintenance, insurance, and customer-experience risks beyond software/media operations.
