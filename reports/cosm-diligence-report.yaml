report_metadata:
  report_title: Cosm Public-Source Startup Diligence Report
  target_company: Cosm
  website: https://www.cosm.com/
  known_aliases:
    - Cosm Inc.
    - Cosm Venues
    - Cosm Shared Reality
    - Cosm Tech
    - Cosm Media
    - Cosm Immersive
    - Evans & Sutherland
    - Spitz
    - C360
  sector: Immersive entertainment venues; media and entertainment; sports viewing; LED dome technology; experiential media
  geography: United States with public venue presence/signals in Los Angeles, Dallas, and Atlanta; technology/media operations serving global immersive markets
  company_stage: Late-stage private unicorn
  research_date: 2026-05-22
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prepared exactly one public-evidence diligence report for Cosm using the startup diligence schema and I-VIII checklist structure.
    - Prioritized public primary sources from Cosm company, careers, team, technology, partnerships, news, and event pages.
    - Used independent/news and market-database sources to corroborate valuation, funding, venue footprint, ticket pricing, investor, patent, and expansion claims.
    - Used patent and legal-record searches only as public signals; marked legal, IP, contracts, insurance, and litigation clearance as inconclusive without private counsel review.
    - Treated absence of public financial, cap-table, contract, HR, and insurance data as diligence gaps rather than negative conclusions.
  included_jurisdictions:
    - United States
    - California
    - Texas
    - Georgia
    - Federal patent and litigation sources
    - Global sports and entertainment rights markets
  excluded_topics:
    - No private financial statements, cap table, financing documents, debt schedules, leases, partner contracts, customer data, HR records, or board materials were available.
    - No management interviews, customer calls, partner calls, site visits, permit searches, insurance verification, or technical/code/security review were performed.
    - No paid database access or full federal/state litigation search was conducted.
  user_provided_materials:
    - material_id: M-001
      title: User prompt requesting Cosm diligence report
      type: prompt_argument
      date_received: 2026-05-22
      notes: User requested a Cosm startup diligence report; no private company materials were provided.
founder_claims:
