      - I.D
      - V.E
      - VIII.C
      - VIII.E
    evidence_claim_ids:
      - EC-012
      - EC-020
    mitigation_or_diligence_request: Request operating manuals, incident logs, permits, fire/life-safety approvals, food-service compliance, maintenance records, and insurance policies.
  - risk_id: R-005
    risk_title: Demand, seasonality, and utilization risk
    risk_category: market
    severity: medium
    likelihood: high
    description: Sold-out public events are encouraging but do not establish steady-state utilization, repeat demand, off-peak performance, or pricing durability.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.A
      - V.D
    evidence_claim_ids:
