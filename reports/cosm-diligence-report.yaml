executive_summary:
  overall_assessment: Track with high-priority private diligence before any investment decision. Public evidence supports Cosm as an active late-stage private immersive entertainment/technology unicorn with notable financing, venue rollout, major content partnerships, public leadership, and patent assets. The investability question remains unresolved because financial statements, venue unit economics, cap table, contracts, customer metrics, safety/legal records, and technology reliability evidence are not public.
  investment_or_diligence_thesis: "Cosm’s upside case is a differentiated, vertically integrated Shared Reality platform: proprietary or hard-to-replicate dome/display technology plus immersive production, tier-one sports/entertainment rights, and premium social venues. If venue utilization, partner economics, technology reliability, and rollout capex prove attractive, Cosm could own a new out-of-home live-event category. The downside case is equally concrete: large fixed-cost venues, rights dependence, execution complexity, seasonality, and opaque financing terms can erode returns despite headline demand and valuation."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and Los Angeles Business Journal support the $1B unicorn valuation signal.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-003
      summary: Independent and company sources support a real venue rollout with LA scale data and active LA/Dallas/Atlanta event signals.
      evidence_claim_ids:
        - EC-007
        - EC-012
        - EC-014
        - EC-015
    - founder_claim_id: FC-004
      summary: Company sources consistently describe a full-stack immersive technology/media/venue product.
      evidence_claim_ids:
        - EC-004
        - EC-005
    - founder_claim_id: FC-005
      summary: Public partnership pages list major sports, entertainment, and broadcast relationships.
      evidence_claim_ids:
        - EC-006
        - EC-014
        - EC-015
    - founder_claim_id: FC-007
      summary: The official team page verifies senior leadership roles.
      evidence_claim_ids:
        - EC-008
    - founder_claim_id: FC-008
      summary: Patent records and CB Insights corroborate public IP assets relevant to immersive video.
      evidence_claim_ids:
        - EC-009
        - EC-010
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, venue P&L, unit economics, cash runway, and cap table are not public.
    - risk_id: R-002
      summary: Venue rollout may be capital intensive and sensitive to lease, construction, labor, and maintenance costs.
    - risk_id: R-003
      summary: Content-rights economics, exclusivity, and renewals are central and private.
    - risk_id: R-005
      summary: Public sold-out/event-page signals do not prove durable utilization, repeat demand, or profitable paid attendance.
    - risk_id: R-006
      summary: Full-stack live venue technology must meet high reliability standards but public uptime/incident data is unavailable.
    - risk_id: R-008
      summary: Legal, IP, contracts, insurance, permits, and litigation cannot be cleared from public records reviewed.
  key_evidence_gaps:
    - "G-001: Audited financial statements, monthly management accounts, cash balance, burn, runway, and revenue recognition policy."
    - "G-002: Venue-level P&L, capex, leases, maintenance, labor, F&B, and payback by LA/Dallas/Atlanta."
    - "G-003: Cap table, preference stack, debt, warrants, side letters, option pool, and liquidation waterfall."
    - "G-004: Material rights/partner contract terms, economics, renewal dates, exclusivity, and minimum guarantees."
    - "G-005: Paid attendance, capacity released, sell-through, no-shows, refunds, repeat rate, NPS, and cohort retention."
    - "G-007: Architecture, uptime, incident history, supplier redundancy, R&D roadmap, and technical debt."
    - "G-009: Full IP schedule, invention assignments, patent families, trademarks, copyrights, licenses, open-source compliance, and FTO."
    - "G-010: Litigation register, demand letters, settlement agreements, and full federal/state searches for all entities and predecessors."
    - "G-011: Venue permits, inspections, safety incidents, ADA/accessibility, food/beverage permits, OSHA records, and emergency plans."
  recommended_next_steps:
    - Condition further work on a financial data room covering audited/monthly financials, cash runway, venue P&L, cap table, debt/leases, and financing documents.
    - "Run venue unit-economics diligence by market: attendance, utilization, gross-to-net ticket revenue, F&B, labor, rent, maintenance, capex, and payback."
    - Review all material content-rights, broadcast, creator, venue lease, construction, supplier, financing, and insurance contracts.
    - Conduct technical diligence on LED dome architecture, software/display stack, production pipeline, uptime, supplier redundancy, cyber/security, and hardware refresh.
    - Conduct customer/market diligence with ticketing cohorts, group-sales pipeline, partner references, consumer surveys, and competitor/substitute benchmarking.
    - Have counsel perform full litigation, IP, regulatory, employment, safety, privacy, and insurance diligence across Cosm and predecessor/acquired entities.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: "Public sources support a $1B valuation and $250M financing signal, but the core financial diligence package remains private: audited financials, quarterly financials, venue P&L, cash runway, cap table, debt, preference stack, and venue payback data were not publicly available."
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-012
      - EC-019
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No public audited statements, quarterly P&L, cash-flow statement, gross margin waterfall, or venue-level financials were located; only funding, valuation, ticket-price, and venue-size signals are public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Cosm has public $250M financing and $1B valuation signals from CB Insights and LA Business Journal.
            evidence_claim_ids:
              - EC-001
              - EC-003
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: The public record does not disclose ARR/revenue, EBITDA, cash burn, cash balance, or venue-level contribution margin.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-001
        hidden_risks:
          - Valuation may embed aggressive venue rollout assumptions that cannot be tested without financials.
          - Ticket-price and venue-size proxies may overstate realized revenue if comps, discounts, refunds, no-shows, or revenue shares are material.
        evidence_gaps:
          - Audited financial statements, monthly financial package, venue P&L, bookings/billings, revenue-recognition policy, and cash runway.
        follow_up_questions:
          - Provide audited statements for FY2023-FY2025, monthly FY2026 financials, and venue-level P&L by market.
          - Reconcile gross ticket sales to net revenue after fees, taxes, refunds, partner shares, F&B, and comps.
        table_ids:
          - T-001
          - T-003
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-003
          - EC-019
      - section_id: I.B
        title: Financial projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources show expansion to additional venues and active event pages, but no management forecast, venue ramp curves, utilization assumptions, capex plan, or sensitivity case was public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Dallas and Atlanta expansion signals imply material growth assumptions.
            evidence_claim_ids:
              - EC-014
              - EC-015
            risk_ids:
              - R-002
          - finding_id: I.B-F2
            finding: Venue-level payback and mature utilization are not publicly disclosed.
            evidence_claim_ids:
              - EC-012
              - EC-019
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Expansion financing could outpace proven payback if construction, rights, or labor costs exceed plan.
          - Event calendars may depend on rights windows and seasonal sports schedules.
        evidence_gaps:
          - Board-approved model, market-by-market venue ramp, scenario analysis, capex and lease schedules, and content-rights economics.
        follow_up_questions:
          - Provide base/upside/downside projections by venue with utilization, average net ticket price, F&B, rights fees, labor, rent, maintenance, and capex.
        table_ids:
          - T-002
          - T-003
        figure_ids:
          - F-001
          - F-009
        evidence_claim_ids:
          - EC-003
          - EC-012
          - EC-014
          - EC-019
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: CB Insights and LA Business Journal identify high-level valuation, round type, amount raised, and selected investors, but public sources do not disclose security type, liquidation preferences, debt, warrants, option pool, or founder/investor ownership.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights lists Cosm as a $1B unicorn and latest funding as Private Equity.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-001
              - R-002
          - finding_id: I.C-F2
            finding: Reported investors include Baillie Gifford, Mirasol Capital, Dan Gilbert, Avenue Capital Group, and Bolt Ventures.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-001
        hidden_risks:
          - Preference stack or debt could materially alter common-equity value despite headline valuation.
          - Venue-specific project financing or leases could create off-balance-sheet obligations.
        evidence_gaps:
          - Current fully diluted cap table, financing documents, debt/lease obligations, side letters, option grants, secondaries, and liquidation waterfall.
        follow_up_questions:
          - Provide pro forma cap table and liquidation waterfall at current valuation and downside scenarios.
        table_ids:
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: The public venue footprint creates diligence questions around leases, construction commitments, F&B, maintenance, production labor, insurance, and partner revenue shares; none were publicly quantified.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: The first LA venue was reported as 65,000 square feet, 80-foot dome, and 1,700 capacity.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-002
              - R-004
          - finding_id: I.D-F2
            finding: Ticket prices reportedly ranged from $17 to $600, indicating large potential price dispersion.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-005
        hidden_risks:
          - Large fixed-cost venues can exhibit high operating leverage in both directions.
          - Hidden obligations may sit in leases, rights minimum guarantees, construction contracts, and vendor maintenance agreements.
        evidence_gaps:
          - Lease abstracts, construction budgets, F&B economics, insurance premiums, maintenance schedules, and rights minimum guarantees.
        follow_up_questions:
          - Provide venue by venue unit economics and all material commitments above a defined threshold.
        table_ids:
          - T-003
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-012
          - EC-013
          - EC-020
  - chapter_id: II
    title: Products
    chapter_summary: Cosm publicly positions Shared Reality as an integrated stack combining LED dome environments, physical design, engineering/manufacturing, software, display engine, production services, media/content, and consumer venues. The product thesis is differentiated but complex and requires technical, cost, reliability, and supplier validation.
    founder_claim_ids:
      - FC-004
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-020
    risk_ids:
      - R-006
      - R-007
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: "Public evidence supports a three-layer product portfolio: Cosm Tech, Cosm Media, and Cosm Venues. The core experience is a large LED-dome Shared Reality venue for live sports, entertainment, science/education, and attractions."
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: Cosm describes a full-stack immersive solution including physical design, engineering/manufacturing, software, display engine, and content.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-006
          - finding_id: II.A-F2
            finding: Cosm Tech states it designs and delivers LED dome environments, software, and high-fidelity content as an integrated system.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-006
        hidden_risks:
          - Vertical integration can create differentiation but may also hide low-margin hardware/service work.
          - Venue product quality depends on content rights, production, hardware reliability, and local operations all working together.
        evidence_gaps:
          - Technical architecture, BOM, software components, supplier concentration, service margins, uptime logs, customer NPS, product telemetry, and release history.
        follow_up_questions:
          - Demonstrate architecture, unit costs, uptime, incident history, supplier redundancy, content pipeline, and venue customer satisfaction.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-004
          - EC-005
      - section_id: II.B
        title: Product quality, roadmap, and differentiation
        checklist_question_ids:
          - II.B.1
          - II.B.2
          - II.B.3
        summary: The moat claim rests on technology plus content and venue operations. Public pages are not enough to determine whether the platform is lower cost, higher quality, or more scalable than alternatives.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.B-F1
            finding: Public partnership and event evidence suggests content breadth supports product differentiation.
            evidence_claim_ids:
              - EC-006
              - EC-007
            risk_ids:
              - R-003
              - R-005
          - finding_id: II.B-F2
            finding: Patent and acquisition signals suggest proprietary production/display workflows, but legal/technical quality is not independently validated.
            evidence_claim_ids:
              - EC-009
              - EC-010
              - EC-018
            risk_ids:
              - R-006
              - R-008
        hidden_risks:
          - Competitors or rights holders could replicate parts of the experience if Cosm lacks enforceable exclusivity or cost advantage.
          - Hardware refresh and LED maintenance cycles could compress margins.
        evidence_gaps:
          - Product roadmap, patent claim charts, technical benchmarks, content-production economics, hardware refresh plan, and customer experience KPIs.
        follow_up_questions:
          - Provide roadmap with engineering capacity, supplier cost trends, warranty obligations, uptime SLA, and customer satisfaction by venue/event type.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-009
          - EC-010
  - chapter_id: III
    title: Customer Information
    chapter_summary: "Cosm has two customer constructs: consumer venue attendees and enterprise/media/content partners. Public pages identify notable partners and active events, but customer-level revenue, retention, concentration, partner economics, and direct customer satisfaction remain private."
    founder_claim_ids:
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-014
      - EC-015
      - EC-021
    risk_ids:
      - R-003
      - R-005
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public event pages show venue attendees can buy tickets for sports and entertainment experiences; however, no customer concentration or account-level data is public because consumers are transactional and partners are contractual.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: LA, Dallas, and Atlanta event pages show NBA, UFC, FIFA World Cup and sold-out/find-ticket signals.
            evidence_claim_ids:
              - EC-007
              - EC-021
            risk_ids:
              - R-005
          - finding_id: III.A-F2
            finding: Independent reporting places the LA venue at 1,700 capacity, making occupancy/utilization a central metric.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-005
        hidden_risks:
          - Sold-out events may reflect limited released inventory or marquee one-offs rather than sustained demand.
          - Demand may be concentrated in sports seasons and premium events.
        evidence_gaps:
          - Paid attendance by event, capacity released, no-show/refund data, repeat customers, cohort retention, NPS, customer acquisition channel, and refunds/chargebacks.
        follow_up_questions:
          - Provide top event categories by revenue, paid attendance, repeat rate, and gross-to-net ticket reconciliation for each venue.
        table_ids:
          - T-007
        figure_ids:
          - F-003
          - F-005
        evidence_claim_ids:
          - EC-007
          - EC-012
          - EC-021
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Cosm publicly lists relationships with FOX Sports, Cirque du Soleil, UFC, NBA, ESPN, NBC Sports, TNT Sports, and creators. These are strategic assets but the economic and legal terms are not public.
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: III.B-F1
            finding: Cosm’s partnerships page names multiple tier-one content and broadcast partners.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-003
          - finding_id: III.B-F2
            finding: LA Business Journal independently reports media-rights contracts with several major partners.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-003
        hidden_risks:
          - Rights may be non-exclusive, costly, short-term, or subject to performance obligations.
          - Partner concentration could create renewal and bargaining-power risk.
        evidence_gaps:
          - Executed contracts, renewal schedule, minimum guarantees, exclusivity, termination rights, revenue share, content production obligations, and partner satisfaction.
        follow_up_questions:
          - Prepare a partner contract matrix showing economics, exclusivity, term, territories, content scope, and renewal obligations.
        table_ids:
          - T-006
          - T-008
        figure_ids:
          - F-003
        evidence_claim_ids:
