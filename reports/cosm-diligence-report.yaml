diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, cash balance, burn, runway, and revenue recognition policy.
    why_it_matters: Cannot underwrite valuation, solvency, growth quality, or downside without financials.
    suggested_source_or_request: Financial data room and CFO walkthrough.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.D
    missing_information: Venue-level P&L, capex, leases, maintenance, labor, F&B, and payback by LA/Dallas/Atlanta.
    why_it_matters: Cosm’s model likely depends on venue unit economics and rollout returns.
    suggested_source_or_request: Venue financial pack by market and opening cohort.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, preference stack, debt, warrants, side letters, option pool, and liquidation waterfall.
    why_it_matters: Headline $1B valuation may not reflect common-equity economics or financing risk.
    suggested_source_or_request: Closing binder, pro forma cap table, and legal finance schedule.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.B
    missing_information: Material rights/partner contract terms, economics, renewal dates, exclusivity, and minimum guarantees.
    why_it_matters: Content rights are central to demand and can create margin or renewal risk.
    suggested_source_or_request: Material contracts room and partner-reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.A
    missing_information: Paid attendance, capacity released, sell-through, no-shows, refunds, repeat rate, NPS, and cohort retention.
    why_it_matters: Sold-out labels and ticket pages do not prove durable profitable demand.
    suggested_source_or_request: Venue ticketing/funnel export and customer cohort analysis.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, competitor pricing, consumer survey, and market share by use case.
    why_it_matters: Cosm’s substitutes span multiple categories and public TAM is not obvious.
    suggested_source_or_request: Market research, survey, and competitor benchmarking.
    priority: medium
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture, uptime, incident history, supplier redundancy, R&D roadmap, and technical debt.
    why_it_matters: Live paid experiences require reliable integrated technology.
    suggested_source_or_request: CTO deep dive, architecture review, incident logs, and supplier contracts.
    priority: high
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, attrition, compensation, equity grants, employee relations, and hiring plan.
    why_it_matters: Expansion depends on operational staffing and retention across tech, media, and venues.
    suggested_source_or_request: HR data room, employment counsel memo, and management references.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Full IP schedule, invention assignments, patent families, trademarks, copyrights, licenses, open-source compliance, and FTO.
    why_it_matters: Public patent records do not prove enforceability, ownership chain, or freedom to operate.
    suggested_source_or_request: IP counsel review and chain-of-title binder.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation register, demand letters, settlement agreements, and full federal/state searches for all entities and predecessors.
    why_it_matters: Narrow CourtListener no-result search is not legal clearance.
    suggested_source_or_request: Counsel litigation memo and docket searches.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.C
    missing_information: Venue permits, inspections, safety incidents, ADA/accessibility, food/beverage permits, OSHA records, and emergency plans.
    why_it_matters: Venue operations carry crowd, employee, regulatory, and reputational exposure.
    suggested_source_or_request: Operations/legal safety compliance binder by venue.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, limits, exclusions, premiums, and loss runs.
    why_it_matters: Coverage gaps could be material given live venue operations and high-value equipment.
    suggested_source_or_request: Broker memo, policy copies, and claims/loss history.
    priority: medium
