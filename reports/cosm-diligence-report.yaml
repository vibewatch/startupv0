  - risk_id: R-006
    risk_title: Technology reliability and integration risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: The full-stack LED dome, software, production, and content pipeline must perform reliably in live paid venues.
    impacted_chapter_ids:
