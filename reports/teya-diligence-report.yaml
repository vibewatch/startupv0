report_metadata:
  report_title: "Teya Startup Diligence Report"
  target_company: "Teya"
  website: "https://www.teya.com/"
  known_aliases:
    - "Teya"
    - "SaltPay"
    - "Salt Pay"
    - "Salt Pay Services Ltd."
    - "Teya Services Ltd."
    - "Teya Solutions Ltd."
    - "Teya Europe Ltd."
  sector: "Fintech, merchant acquiring, payment terminals, e-money business accounts, SME financial services"
  geography: "United Kingdom headquarters and Europe-focused SMB merchant footprint"
  company_stage: "Active private unicorn / regulated electronic-money and merchant-services group"
  research_date: "2026-05-31"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "GBP, EUR and USD as cited by public sources"
  time_zone: "UTC"
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Verified eligibility first using CB Insights unicorn list plus active UK Companies House records for Teya/SaltPay legal entities."
    - "Prioritized public primary sources: Teya product/legal/careers pages, Companies House, Financial Ombudsman Service and regulatory/financial reference records."
    - "Used independent press and specialist payment-sector commentary only where primary filings did not disclose group-level history or financing."
    - "Marked all non-public financial statements, cap table, customer lists, contracts, forecasts, supplier agreements and internal operating metrics as evidence gaps."
  included_jurisdictions:
    - "United Kingdom"
    - "Portugal"
    - "Iceland and other European references where public sources describe SaltPay/Teya expansion"
  excluded_topics:
    - "No private management accounts, investor materials, board packs, cap table, regulatory correspondence, customer references, data-room contracts, employee records, security audits or counsel work product were available."
    - "No paid databases, non-public litigation databases, leaked documents or private interviews were used."
  user_provided_materials:
    - material_id: UPM-001
      title: "Workflow request for public-source Teya diligence report"
      type: "workflow_request"
      date_received: "2026-05-31"
      notes: "No company materials were provided; public sources only."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: "Teya is eligible for unicorn diligence as an active private company valued at $1B+ on CB Insights' unicorn list."
    claim_source: "CB Insights unicorn list"
    claim_date: "2021-04-09"
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.C]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-001, EC-002]
    contradiction_summary: "CB Insights reports a $1B valuation marker, while BrazilJournal/Sifted-cited reporting reported $5.3B in 2021; public data does not reconcile current valuation."
    diligence_follow_up:
      - "Request current cap table, latest financing documents, secondary transactions and valuation support."
  - founder_claim_id: FC-002
    claim_text: "SaltPay/Teya raised substantial private capital in 2021 from Tiger Global, Hedosophia and others."
    claim_source: "BrazilJournal citing Sifted and sources close to the company; CB Insights list"
    claim_date: "2021-05-11"
    mapped_chapter_ids: [I]
    mapped_section_ids: [I.C, I.D]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-001, EC-004]
    contradiction_summary: "Round size and valuation are press-reported and not supported by public financing documents."
    diligence_follow_up:
      - "Obtain executed financing agreements, investor list, liquidation preferences, debt instruments and option plan."
  - founder_claim_id: FC-003
    claim_text: "Teya's UK companies are active private limited companies and include renamed SaltPay entities."
    claim_source: "Companies House"
    claim_date: null
    mapped_chapter_ids: [I, VIII]
    mapped_section_ids: [I.C, I.D, VIII.G]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-002, EC-003]
    contradiction_summary: null
    diligence_follow_up:
      - "Map the full group structure, subsidiaries, minority investments and intercompany obligations."
  - founder_claim_id: FC-004
    claim_text: "Teya offers an SMB product suite spanning card machines, payment acceptance, a Business Account, settlement, funding and integrations."
    claim_source: "Teya website"
    claim_date: null
    mapped_chapter_ids: [II, V, VI]
    mapped_section_ids: [II.A, V.A, V.C, VI.B]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-006, EC-007, EC-008, EC-009, EC-010]
    contradiction_summary: "Product availability, pricing and partner dependencies may vary by market and customer contract; public pages do not disclose economics."
    diligence_follow_up:
      - "Request product-by-product revenue, margin, adoption, churn, uptime, complaints and roadmap evidence."
  - founder_claim_id: FC-005
    claim_text: "Teya serves a large SMB merchant base, publicly claiming 70k to 75k supported businesses."
    claim_source: "Teya home and pricing pages; historical SaltPay press/commentary"
    claim_date: null
    mapped_chapter_ids: [III, V]
    mapped_section_ids: [III.A, V.B]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-006, EC-013]
    contradiction_summary: "Public sources use inconsistent merchant/customer counts and definitions; no active-customer bridge or retention data is public."
    diligence_follow_up:
      - "Request merchant count bridge, active definitions, cohorts, churn, GPV, ARPA and revenue concentration."
  - founder_claim_id: FC-006
    claim_text: "Teya Solutions Ltd. is FCA-authorised as an electronic money institution and Teya is not a bank."
    claim_source: "TheBanks.eu profile and Teya Business Account page"
    claim_date: null
    mapped_chapter_ids: [VIII]
    mapped_section_ids: [VIII.G, VIII.C]
    verification_status: verified
    confidence: high
    evidence_claim_ids: [EC-009, EC-012]
    contradiction_summary: null
    diligence_follow_up:
      - "Request FCA permissions extract, safeguarding audit, complaints, AML/KYC policies, capital, liquidity and operational resilience testing."
  - founder_claim_id: FC-007
    claim_text: "Teya is a European company with global presence and 15+ offices."
    claim_source: "Teya careers page"
    claim_date: null
    mapped_chapter_ids: [VII]
    mapped_section_ids: [VII.B, VII.C]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-011]
    contradiction_summary: "Careers page does not provide a full legal-entity headcount, functional org chart or employee turnover trend."
    diligence_follow_up:
      - "Request headcount by entity, country, function, contractor mix and two-year turnover."
  - founder_claim_id: FC-008
    claim_text: "SaltPay/Teya pursued acquisition-led expansion and must integrate payments, software and lending capabilities."
    claim_source: "Business of Payments and public acquisition/divestiture reporting"
    claim_date: null
    mapped_chapter_ids: [I, II, VI]
    mapped_section_ids: [I.B, II.A, VI.A]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: [EC-014, EC-015]
    contradiction_summary: "The public record shows both acquisition activity and at least one divestiture, but current integration status is non-public."
    diligence_follow_up:
      - "Request acquisition integration scorecard, impairment testing, synergy realization, retained liabilities and divestiture rationale."
executive_summary:
  overall_assessment: "Teya passes private-unicorn eligibility on public evidence: CB Insights lists Teya/SaltPay as a London financial-services unicorn and Companies House shows multiple active private limited Teya entities. The diligence posture is high-attention rather than clean-pass because group financials, current valuation, cap table, customer economics, integration status, safeguarding controls and contract quality remain largely non-public."
  investment_or_diligence_thesis: "Proceed only to confirmatory diligence. A positive thesis requires proving that the SMB merchant product bundle converts into durable, regulated, unit-profitable revenue after acquisition-integration costs, funding-partner risk, safeguarding obligations and competitive pricing pressure."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: "CB Insights lists Teya with a $1B unicorn valuation marker, 9 April 2021 unicorn date, London location and Tiger Global/Hedosophia investors."
      evidence_claim_ids: [EC-001]
    - founder_claim_id: FC-003
      summary: "Companies House shows Teya Services, Teya Solutions and Teya Europe active and private limited, with SaltPay predecessor names."
      evidence_claim_ids: [EC-002, EC-003]
    - founder_claim_id: FC-004
      summary: "Teya's own pages show live products: card machines, business account, settlement, funding and integrations."
      evidence_claim_ids: [EC-006, EC-007, EC-008, EC-009, EC-010]
    - founder_claim_id: FC-006
      summary: "Public regulatory references identify Teya Solutions as FCA-authorised EMI FRN 978181 and Teya's own page discloses non-bank/safeguarding treatment."
      evidence_claim_ids: [EC-009, EC-012]
  biggest_risks:
    - risk_id: R-001
      summary: "Financial transparency is limited; public specialist analysis of 2021 accounts highlighted rapid revenue growth but material losses, and 2024 EMI-subsidiary net income was negative."
    - risk_id: R-002
      summary: "Current valuation, cap table, debt, liquidation preferences and option dilution are not public despite unicorn eligibility."
    - risk_id: R-003
      summary: "Acquisition-led expansion creates integration, impairment, platform consistency and divestiture risks."
    - risk_id: R-004
      summary: "E-money safeguarding, non-FSCS customer funds, AML/KYC and merchant account closures create regulated conduct exposure."
    - risk_id: R-008
      summary: "UK SMB payment acceptance is highly competitive on settlement speed, pricing, support, integrations and bundled banking/funding."
  key_evidence_gaps:
    - "Audited consolidated group financial statements, management accounts and 2022-2025 KPI bridge."
    - "Current cap table, financing history, preference stack, debt, warrants, option pool and valuation support."
    - "Merchant GPV, active merchants, churn, net revenue retention, take rate, ARPA, CAC and payback by country/channel."
    - "Safeguarding accounts, FCA correspondence, complaints, AML/KYC testing, operational resilience and incident history."
    - "Material customer, supplier, POS-integration, lender, bank, card-scheme, acquirer and technology contracts."
  recommended_next_steps:
    - "Open data-room diligence focused on consolidated financials, cap table, debt and subsidiary structure."
    - "Commission regulatory/safeguarding diligence for FCA EMI obligations, complaints, AML/KYC and customer-fund segregation."
    - "Run customer cohort diligence on merchant activation, retention, GPV, take rate and concentration."
    - "Review product economics for card machines, business account, funding referrals/partners and POS integrations."
    - "Request acquisition integration and divestiture materials, impairment testing and platform roadmap."
chapters:
  - chapter_id: I
    title: "Financial Information"
    chapter_summary: "Public evidence verifies private-unicorn status and active UK entities, but consolidated financials and current capitalization are not public. Available financial signals show a fast-growing but historically loss-making acquisition-led business and a 2024 UK EMI subsidiary with positive asset growth but negative net income."
    founder_claim_ids: [FC-001, FC-002, FC-003, FC-008]
    evidence_claim_ids: [EC-001, EC-002, EC-003, EC-004, EC-012, EC-013, EC-014]
    risk_ids: [R-001, R-002, R-003]
    sections:
      - section_id: I.A
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: [I.A.1, I.A.2, I.A.3, I.A.4, I.A.5, I.A.6]
        summary: "No consolidated 2023-2025 group accounts were located in this public-source pass. Public information is limited to UK company accounts filing status, specialist commentary on 2021 SaltPay accounts and TheBanks.eu financial highlights for Teya Solutions Ltd."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: "TheBanks.eu reports Teya Solutions Ltd 2024 total assets of £27.52m, net income of -£1.23m and 48 average employees."
            evidence_claim_ids: [EC-012]
            risk_ids: [R-001]
          - finding_id: I.A-F2
            finding: "Business of Payments reported SaltPay 2021 revenue of €74m, gross profit of €42m, operating loss of €78m and pre-tax loss of €97m."
            evidence_claim_ids: [EC-013]
            risk_ids: [R-001, R-003]
        hidden_risks:
          - "Consolidated revenue quality, gross margin, losses, cash burn, customer acquisition cost, working capital and runway cannot be verified from public data."
          - "Public subsidiary accounts may not represent group economics or acquisition liabilities."
        evidence_gaps:
          - "Audited consolidated financial statements for FY2023-FY2025."
          - "Quarterly management accounts, budget versus actuals, backlog and accounts receivable aging."
        follow_up_questions:
          - "Provide consolidated P&L, balance sheet, cash flow, monthly cash burn and auditor reports for the last three fiscal years."
          - "Bridge public subsidiary accounts to consolidated group revenue, cash and debt."
        table_ids: [T-001]
        figure_ids: [F-001]
        evidence_claim_ids: [EC-012, EC-013]
      - section_id: I.B
        title: "Financial Projections"
        checklist_question_ids: [I.B.1, I.B.2, I.B.3, I.B.4, I.B.5, I.B.6, I.B.7, I.B.8]
        summary: "No public three-year projections were found. Growth drivers are inferable from Teya's product bundle, SMB merchant count, funding products and acquisition integration, but forecast assumptions are non-public."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: "Teya publicly positions growth around payments, business account, funding and integrations, while historical commentary flags integration complexity."
            evidence_claim_ids: [EC-006, EC-010, EC-014]
            risk_ids: [R-001, R-003]
        hidden_risks:
          - "Forecasts may depend on cross-selling acquired products, reducing losses and sustaining merchant retention in competitive markets."
        evidence_gaps:
          - "Quarterly projections, assumptions, unit economics, price sensitivity, capital expenditures and financing plan."
        follow_up_questions:
          - "Provide base/downside/upside forecasts by country, product, channel and customer cohort."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-006, EC-010, EC-014]
      - section_id: I.C
        title: "Capital Structure"
        checklist_question_ids: [I.C.1, I.C.2, I.C.3, I.C.4, I.C.5]
        summary: "CB Insights verifies a $1B unicorn marker and Companies House verifies private entities and PSC voting-rights disclosures for Teya Europe, but shares outstanding, options, warrants, debt and liquidation preferences are not public."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: "CB Insights lists Teya as a London financial-services unicorn with Tiger Global Management and Hedosophia as investors."
            evidence_claim_ids: [EC-001]
            risk_ids: [R-002]
          - finding_id: I.C-F2
            finding: "Teya Europe PSC records show Eduardo de Pontes and Andre Street each with more than 25% but not more than 50% voting rights."
            evidence_claim_ids: [EC-003]
            risk_ids: [R-002]
        hidden_risks:
          - "Preference stack, structured financing, founder control, intercompany debt and dilution may materially affect common-equity value."
        evidence_gaps:
          - "Full cap table, shareholder agreements, option plans, warrants, debt, bank lines and off-balance-sheet liabilities."
        follow_up_questions:
          - "Provide current fully diluted cap table and financing documents from inception through latest round."
        table_ids: [T-002]
        figure_ids: []
        evidence_claim_ids: [EC-001, EC-003, EC-004]
      - section_id: I.D
        title: "Other financial information"
        checklist_question_ids: [I.D.1, I.D.2, I.D.3]
        summary: "Tax positions, revenue recognition policies and detailed financing history are not public. Public financing headlines are inconsistent and should not be used as valuation support without documents."
        verification_status: partially_verified
        confidence: low
        key_findings:
          - finding_id: I.D-F1
            finding: "BrazilJournal reported a 2021 $500m raise at a $5.3bn valuation, while CB Insights' public unicorn table shows a $1bn marker."
            evidence_claim_ids: [EC-001, EC-004]
            risk_ids: [R-002]
        hidden_risks:
          - "Cross-border tax, acquisition accounting, goodwill impairment and revenue recognition may be complex given acquisition-led history."
        evidence_gaps:
          - "Tax memoranda, accounting policies, goodwill impairment analysis, debt covenants and round-by-round financing records."
        follow_up_questions:
          - "Reconcile CB Insights, press valuation and internal fair-value marks to financing documents."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-001, EC-004, EC-013]
  - chapter_id: II
    title: "Products"
    chapter_summary: "Teya publicly sells an integrated SMB merchant toolkit: card machines/payment acceptance, business account, settlement, funding and POS/accounting integrations. The product surface is verified, but product-level profitability, reliability, roadmap and partner economics are not public."
    founder_claim_ids: [FC-004, FC-008]
    evidence_claim_ids: [EC-006, EC-007, EC-008, EC-009, EC-010, EC-014]
    risk_ids: [R-003, R-004, R-006, R-010]
    sections:
      - section_id: II.A
        title: "Description of each product"
        checklist_question_ids: [II.A.1, II.A.2, II.A.3, II.A.4, II.A.5, II.A.6]
        summary: "Public pages verify active products and feature claims, including card machines, 50+ POS integrations, free Business Account, Visa cards, cashback, instant/next-day settlement and partner-led funding products."
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: II.A-F1
            finding: "Teya's homepage describes an integrated payments, funding and Business Account solution for local businesses."
            evidence_claim_ids: [EC-006]
            risk_ids: [R-006]
          - finding_id: II.A-F2
            finding: "Teya's card-machine page claims 50+ POS integrations, flexible settlement options and support for major card/digital-wallet payment methods."
            evidence_claim_ids: [EC-008]
            risk_ids: [R-010]
          - finding_id: II.A-F3
            finding: "Teya's Business Account is an e-money account, not a bank account, with safeguarding rather than FSCS protection."
            evidence_claim_ids: [EC-009]
            risk_ids: [R-004]
          - finding_id: II.A-F4
            finding: "Teya's funding page offers merchant cash advance and Flexi Loan products via partners, with funding within 24 hours of approval."
            evidence_claim_ids: [EC-010]
            risk_ids: [R-006]
        hidden_risks:
          - "Funding products may expose Teya to partner, conduct, affordability and customer-confusion risk even if credit is provided by partners."
          - "POS/accounting integrations create uptime, data-security and third-party dependency risks."
        evidence_gaps:
          - "Product-level revenue, margin, adoption, uptime, support tickets, incidents and customer complaints."
          - "Partner agreements, service-level commitments and regulatory responsibility split."
        follow_up_questions:
          - "Provide product P&Ls, attach rates, churn, incident history and product roadmap with dates/costs."
          - "List all named funding, POS, bank, processor, card-scheme and accounting integration partners and contracts."
        table_ids: [T-003, T-004]
        figure_ids: [F-002]
        evidence_claim_ids: [EC-006, EC-007, EC-008, EC-009, EC-010]
  - chapter_id: III
    title: "Customer Information"
    chapter_summary: "Teya targets local SMB merchants and publicly claims tens of thousands of supported businesses. Public sources do not disclose top customers, revenue concentration, cohort retention, chargeback rates or supplier agreements."
    founder_claim_ids: [FC-005]
    evidence_claim_ids: [EC-006, EC-013, EC-015, EC-019]
    risk_ids: [R-005, R-006]
    sections:
      - section_id: III.A
        title: "Top customers by application"
        checklist_question_ids: [III.A]
        summary: "No top-15 customer list is public. Public evidence supports only broad SMB segment targeting and aggregate merchant/customer count claims."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: "Teya homepage says it is trusted by 70k customers, while its pricing page says card machines support 75,000+ businesses."
            evidence_claim_ids: [EC-006]
            risk_ids: [R-005]
          - finding_id: III.A-F2
            finding: "Historical reporting cited 60k+ merchants and later c.100k merchants, indicating inconsistent definitions or time/market coverage."
            evidence_claim_ids: [EC-004, EC-013]
            risk_ids: [R-005]
        hidden_risks:
          - "Customer counts may include inactive merchants, acquired portfolios, different geographies or low-revenue accounts."
        evidence_gaps:
          - "Top customers by GPV/revenue, active definitions, product ownership and purchase timing."
        follow_up_questions:
          - "Provide top-15 merchant/customer list by revenue and GPV for FY2024, FY2025 and current YTD."
        table_ids: [T-005]
        figure_ids: [F-003]
        evidence_claim_ids: [EC-004, EC-006, EC-013]
      - section_id: III.B
        title: "Strategic relationships"
        checklist_question_ids: [III.B]
        summary: "Teya discloses categories of strategic relationships, including POS integrations, accounting integrations and funding partners, but named contracts and revenue contribution are not public."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: "Public pages cite 50+ POS integrations, Xero/QuickBooks accounting sync and lender partners, without full contract terms."
            evidence_claim_ids: [EC-008, EC-009, EC-010]
            risk_ids: [R-006, R-010]
        hidden_risks:
          - "Unfavorable partner economics or terminable integration agreements could impair the bundle."
        evidence_gaps:
          - "Strategic partner list, revenue contribution, exclusivity, termination rights and SLAs."
        follow_up_questions:
          - "Provide all strategic partnership agreements and partner-by-partner revenue contribution."
        table_ids: [T-006]
        figure_ids: []
        evidence_claim_ids: [EC-008, EC-009, EC-010]
      - section_id: III.C
        title: "Revenue by customer"
        checklist_question_ids: [III.C]
        summary: "Revenue by customer and 5%+ customer concentration are not public. Given the SMB focus, concentration may be low, but acquired portfolios, ISO relationships or enterprise merchants could create hidden concentration."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: "No public source reviewed disclosed revenue by merchant/customer or concentration."
            evidence_claim_ids: [EC-019]
            risk_ids: [R-005]
        hidden_risks:
          - "Merchant portfolios, acquirers, referral partners or marketplaces may represent hidden concentration despite SMB branding."
        evidence_gaps:
          - "Revenue by customer, GPV by customer, chargebacks, refunds and churn."
        follow_up_questions:
          - "Identify all customers or partners contributing 5%+ of revenue or GPV."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-019]
      - section_id: III.D
        title: "Significant relationships severed within the last two years"
        checklist_question_ids: [III.D]
        summary: "Public reporting shows divestiture of Pagaqui by Teya/SaltPay; customer/partner severance lists are otherwise not public."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.D-F1
            finding: "Essential Business reported that Portuguese payments fintech Pagaqui, which belonged to UK fintech Teya/SaltPay, was bought by Eupago in 2024."
            evidence_claim_ids: [EC-015]
            risk_ids: [R-003]
        hidden_risks:
          - "Divestitures may indicate portfolio pruning, market exit, integration underperformance or regulatory/local-market pressure."
        evidence_gaps:
          - "Severed customer, supplier, partner, lender and acquirer relationships for the last two years."
        follow_up_questions:
          - "Provide schedule of relationship terminations, divestitures, notices of breach and lost strategic partners."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-015]
      - section_id: III.E
        title: "Top suppliers"
        checklist_question_ids: [III.E]
        summary: "Top suppliers and purchase amounts are not public. Public pages imply dependencies on card schemes, terminal providers, POS/accounting integrations, banks, safeguarding institutions and funding partners."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.E-F1
            finding: "Teya publicly names categories of dependencies but not supplier spend or contract terms."
            evidence_claim_ids: [EC-008, EC-009, EC-010]
            risk_ids: [R-006, R-010]
        hidden_risks:
          - "Processor/acquirer, terminal, bank or lender concentration could affect margins and service continuity."
        evidence_gaps:
          - "Supplier list, purchase amounts, SLAs, termination rights, service credits and concentration."
        follow_up_questions:
          - "Provide top suppliers by spend and criticality for FY2024, FY2025 and current YTD."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: [EC-008, EC-009, EC-010]
  - chapter_id: IV
    title: "Competition"
    chapter_summary: "Teya competes in SMB merchant services against payments specialists, card-terminal providers, bank acquirers and integrated commerce platforms. Differentiation claims center on next-day/instant settlement, UK support, bundled Business Account, cashback, funding and integrations."
    founder_claim_ids: [FC-004, FC-005]
    evidence_claim_ids: [EC-006, EC-007, EC-008, EC-020]
    risk_ids: [R-008]
    sections:
      - section_id: IV.A
        title: "Competitive landscape by market segment"
        checklist_question_ids: [IV.A.1, IV.A.2]
        summary: "Teya's public pricing page explicitly benchmarks against SumUp and cites competitor sources including Dojo, SumUp and Barclaycard. Public competitor economics are not fully reconciled, but the basis of competition is clear: price, settlement speed, support, hardware, integrations, banking and funding."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: "Teya markets next-day by 9am including weekends, 24/7 UK-based support, included Business Account and 0.5% cashback as differentiators."
            evidence_claim_ids: [EC-007, EC-020]
            risk_ids: [R-008]
          - finding_id: IV.A-F2
            finding: "Competitors can respond on pricing, hardware, online payments, banking bundles, support and distribution, limiting pricing power."
            evidence_claim_ids: [EC-020]
            risk_ids: [R-008]
        hidden_risks:
