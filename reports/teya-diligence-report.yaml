executive_summary:
  overall_assessment: "Teya appears eligible for public-source diligence as an uncovered private unicorn: CB Insights lists a $1B valuation and public materials show active operations. The investment case remains unresolved because financial statements, retention, concentration, cap table, contracts and legal/compliance records are not public."
  investment_or_diligence_thesis: Proceed only if Teya can prove durable merchant growth, payments margin, credit/funding risk controls, regulatory compliance and post-SaltPay integration quality beyond the public $1B unicorn-list anchor.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Teya as a private unicorn at $1B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company-owned materials describe an active merchant payments, card machines, business account and SMB funding offering.
      evidence_claim_ids:
        - EC-002
        - EC-003
    - founder_claim_id: FC-005
      summary: Public materials and active pages support ongoing operations, subject to management confirmation.
      evidence_claim_ids:
        - EC-005
        - EC-009
  biggest_risks:
    - risk_id: R-001
      summary: Financial scale, margin, cash runway and retention are not public
    - risk_id: R-002
      summary: Headline valuation may not reflect current financing terms
    - risk_id: R-007
      summary: Payments, e-money and merchant-funding activities create regulatory and safeguarding exposure
  key_evidence_gaps:
    - Audited financial statements, KPI pack, cash/debt/runway and forecast model.
    - Current cap table, preferences, option pool, SAFEs/notes and financing documents.
    - Top customer/merchant/seller concentration, contracts, retention/churn and reference calls.
    - CAC/payback, sales productivity, pricing waterfall and channel economics.
    - Counsel-led litigation, IP, regulatory, privacy/security, insurance and material-contract review.
  recommended_next_steps:
    - Do not rely on headline valuation until primary financing and financial-quality diligence are complete.
    - Request top-account, merchant or seller cohort data and independent references.
    - Run legal/regulatory, privacy/security, IP and contract review in parallel with financial diligence.
    - Benchmark pricing, differentiation and win/loss evidence against direct competitors.
