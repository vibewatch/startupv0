risk_register:
  - risk_id: R-001
    risk_title: "Limited financial transparency and historical losses"
    risk_category: financial
    severity: high
    likelihood: medium
    description: "Consolidated group financials are not public; available public signals include historical SaltPay losses and negative 2024 net income at Teya Solutions."
    impacted_chapter_ids: [I, V]
    impacted_section_ids: [I.A, I.B, V.E]
    evidence_claim_ids: [EC-012, EC-013]
    mitigation_or_diligence_request: "Obtain audited consolidated financials, management accounts, cash runway, burn, unit economics and auditor letters."
  - risk_id: R-002
    risk_title: "Valuation, capitalization and preference-stack opacity"
    risk_category: financing
    severity: high
    likelihood: medium
    description: "Unicorn eligibility is verified, but current valuation, shares, options, debt and investor rights are not public."
    impacted_chapter_ids: [I, VII]
    impacted_section_ids: [I.C, I.D, VII.E]
    evidence_claim_ids: [EC-001, EC-003, EC-004]
    mitigation_or_diligence_request: "Request fully diluted cap table, financing documents, debt schedule, option plan and valuation support."
  - risk_id: R-003
    risk_title: "Acquisition integration and portfolio pruning risk"
    risk_category: operational
    severity: high
    likelihood: medium
    description: "Public analysis described many acquisitions and integration complexity; Pagaqui divestiture shows portfolio changes."
    impacted_chapter_ids: [I, III, VI]
    impacted_section_ids: [I.B, III.D, VI.A]
    evidence_claim_ids: [EC-014, EC-015]
    mitigation_or_diligence_request: "Review acquisition integration plan, synergies, impairment tests, divestitures and retained liabilities."
  - risk_id: R-004
    risk_title: "E-money safeguarding and regulatory conduct exposure"
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: "Teya Business Account is not a bank account and relies on safeguarding; EMI controls, AML/KYC and disclosures need validation."
    impacted_chapter_ids: [II, VIII]
    impacted_section_ids: [II.A, VIII.C, VIII.G]
    evidence_claim_ids: [EC-009, EC-012, EC-017]
    mitigation_or_diligence_request: "Obtain FCA permissions, safeguarding audits, regulatory correspondence, AML/KYC testing and incident reports."
  - risk_id: R-005
    risk_title: "Customer scale, retention and concentration opacity"
    risk_category: customer
    severity: medium
    likelihood: high
    description: "Public customer/merchant counts are inconsistent and top-customer/revenue concentration data is not public."
    impacted_chapter_ids: [III, V]
    impacted_section_ids: [III.A, III.C, V.B]
    evidence_claim_ids: [EC-004, EC-006, EC-013, EC-019]
    mitigation_or_diligence_request: "Request active merchant bridge, cohorts, churn, GPV, take rate, ARPA and top-customer concentration."
  - risk_id: R-006
    risk_title: "Funding-product partner and conduct risk"
    risk_category: product
    severity: medium
    likelihood: medium
    description: "Partner-led cash advances and loans can create customer suitability, disclosure, complaints and partner-dependency risks."
    impacted_chapter_ids: [II, V, VIII]
    impacted_section_ids: [II.A, V.C, VIII.F]
    evidence_claim_ids: [EC-010, EC-016]
    mitigation_or_diligence_request: "Review funding partner contracts, customer disclosures, complaint metrics, revenue share and underwriting responsibilities."
  - risk_id: R-007
    risk_title: "Governance and personnel visibility gaps"
    risk_category: team
    severity: medium
    likelihood: medium
    description: "Companies House provides legal-director data but not operating leadership, compensation, turnover or retention plans."
    impacted_chapter_ids: [VII]
    impacted_section_ids: [VII.A, VII.B, VII.C, VII.D, VII.E, VII.G]
    evidence_claim_ids: [EC-003, EC-011, EC-018, EC-019]
    mitigation_or_diligence_request: "Request org chart, executive bios, compensation, stock plans, turnover and succession plans."
  - risk_id: R-008
    risk_title: "Competitive pricing and differentiation pressure"
    risk_category: market
    severity: medium
    likelihood: high
    description: "Teya competes with terminal specialists, bank acquirers and integrated commerce platforms on transparent customer-facing terms."
    impacted_chapter_ids: [IV, V]
    impacted_section_ids: [IV.A, V.A, V.E]
    evidence_claim_ids: [EC-007, EC-020]
    mitigation_or_diligence_request: "Request win/loss, churn reasons, price realization, market share and competitor benchmarking."
  - risk_id: R-009
    risk_title: "Merchant complaint and account-closure process risk"
    risk_category: legal
    severity: medium
    likelihood: medium
    description: "FOS decision found unfair immediate account closure without sufficient demonstration of immediate risk."
    impacted_chapter_ids: [VIII]
    impacted_section_ids: [VIII.A, VIII.G]
    evidence_claim_ids: [EC-016]
    mitigation_or_diligence_request: "Review complaints register, account-closure policy, funds-hold policy, remediation and legal reserves."
  - risk_id: R-010
    risk_title: "Technology, data-security and IP opacity"
    risk_category: technical
    severity: medium
    likelihood: unknown
    description: "Product integrations and encryption claims are public, but architecture, audits, incident history, software ownership and open-source compliance are not."
    impacted_chapter_ids: [II, VI, VIII]
    impacted_section_ids: [II.A, VI.A, VIII.C, VIII.D]
    evidence_claim_ids: [EC-008, EC-009, EC-019, EC-021]
    mitigation_or_diligence_request: "Request architecture, SOC/PCI reports, vulnerability management, incident logs, IP assignments and open-source scans."
