report_metadata:
  report_title: Teya Startup Diligence Report
  target_company: Teya
  website: https://www.teya.com/
  known_aliases:
    - Teya
    - SaltPay
    - Salt Pay Services Ltd.
    - Teya Services Ltd.
  sector: Financial services / merchant payments and SMB financial operating tools
  geography: United Kingdom / Europe
  company_stage: Private unicorn / growth-stage private company
  research_date: 2026-05-28
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the existing-report exclusion list from reports/*-diligence-report.yaml and selected uncovered CB Insights unicorn-list candidates with shuf -n 3.
    - Used current public unicorn-list evidence from CB Insights and cross-checked active operating signals from company-owned pages and public registries where accessible.
    - Prioritized company-owned product, pricing, about, careers, legal/trust and public registry pages; treated marketing claims as evidence of public statements, not as verified financial performance.
    - No private data room, management interview, customer calls, counsel memo, cap table or audited financials were available.
  included_jurisdictions:
    - United Kingdom
    - Europe
  excluded_topics:
    - Private financial statements, cap table, debt instruments, tax records, contracts, security reports, employee records, customer reference calls and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-28
      notes: No pitch deck, financial model, customer list or data-room exports were provided.
