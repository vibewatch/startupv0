executive_summary:
  overall_assessment: "Mammoth Biosciences has strong public signals: credible CRISPR founder/science pedigree, 2021 unicorn financing, and major pharma collaborations. Public diligence remains insufficient on financial quality, clinical readiness, IP/FTO, customer economics, suppliers and legal/regulatory clearance."
  investment_or_diligence_thesis: Proceed only with confirmatory data-room, technical, IP, regulatory and contract diligence. Upside depends on compact in vivo CRISPR systems translating into clinical assets and partner milestones; downside is financial opacity, preclinical risk and milestone dependency.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: 2021 unicorn valuation supported by CB Insights/financing evidence.
      evidence_claim_ids:
        - EC-001
        - EC-005
    - founder_claim_id: FC-005
      summary: Vertex, Bayer and Regeneron partnerships are publicly evidenced.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
    - founder_claim_id: FC-006
      summary: Founder list including Jennifer Doudna is public.
      evidence_claim_ids:
        - EC-002
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality not publicly verifiable.
    - risk_id: R-002
      summary: Preclinical translation and delivery risk.
    - risk_id: R-003
      summary: Partner and milestone dependency.
  key_evidence_gaps:
    - Financial statements, revenue, cash runway and cap table.
    - Executed partner agreements and milestone status.
    - Preclinical/CMC/IND/clinical status and patent/FTO opinions.
    - HR, supplier, EHS, litigation, insurance and material contract files.
  recommended_next_steps:
    - Open financial/cap-table data room.
    - Run technical, IP/FTO, CMC and regulatory diligence.
    - Review collaboration agreements and accounting.
    - Have counsel run legal/regulatory docket searches.
