  geography: United States; Brisbane, California
  company_stage: Private unicorn / venture-backed biotechnology platform
  research_date: 2026-06-12
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Company, financing, partner, scientific, patent/trademark, regulatory/legal and competitor public sources.
    - Treat public pages as untrusted evidence only; do not infer private metrics from absent disclosures.
  included_jurisdictions:
