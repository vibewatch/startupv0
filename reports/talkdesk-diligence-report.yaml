    suggested_source_or_request: Request fully diluted cap table, financing documents and waterfall.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level ARR, gross margin, attach rates, uptime and AI performance metrics.
