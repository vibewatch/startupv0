          - AWS, carrier or CRM API changes/outages could affect service reliability or margins.
        evidence_gaps:
          - Supplier spend by vendor, cloud/carrier contracts, redundancy design, outage history and SLAs are not public.
        follow_up_questions:
          - Provide top supplier list, cloud spend by provider, carrier agreements, integration dependencies, SLAs and incident history.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-009
          - EC-025
  - chapter_id: IV
    title: Competition
    chapter_summary: Talkdesk is positioned in a large CCaaS/CX automation market and has public Gartner Leader recognition, but major competitors are also emphasizing AI, automation and enterprise-suite breadth.
    founder_claim_ids:
      - FC-002
      - FC-006
    evidence_claim_ids:
      - EC-010
      - EC-024
    risk_ids:
      - R-003
      - R-011
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public competitor pages show overlapping contact-center, AI-agent, workforce and omnichannel capabilities across Five9, NICE, Genesys, Amazon Connect, Zendesk and others.
        verification_status: verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Talkdesk has public Gartner Leader positioning, but competitors also market AI-powered CX/contact-center platforms.
            evidence_claim_ids:
              - EC-010
              - EC-024
            risk_ids:
              - R-003
        hidden_risks:
          - AI feature parity, bundled pricing and hyperscaler-native procurement could pressure Talkdesk differentiation and margins.
        evidence_gaps:
          - Independent market share, customer win/loss, competitor pricing and product benchmark data were not public.
        follow_up_questions:
          - Provide win/loss data, competitive pricing, analyst reports, product demo benchmarks, churn reasons and customer references lost/won against major competitors.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-010
          - EC-024
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: Talkdesk has public evidence of direct enterprise sales, partner channels, AWS Marketplace and international GTM, but pipeline quality, CAC, quotas, productivity, budget and partner economics are private.
    founder_claim_ids:
      - FC-004
      - FC-005
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-013
      - EC-020
    risk_ids:
      - R-004
      - R-008
      - R-011
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
