risk_register:
  - risk_id: R-001
    risk_title: Valuation and financial-quality opacity
    risk_category: financial
    severity: high
    likelihood: unknown
    description: The $10B valuation is well-supported for 2021, but current ARR, gross margin, burn, cash, debt, retention and updated valuation are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-019
      - EC-026
    mitigation_or_diligence_request: Obtain audited financials, monthly KPI pack, ARR/NRR/GRR cohorts, cash/debt schedule, current valuation marks and board plan.
  - risk_id: R-002
    risk_title: Post-growth restructuring and morale risk
    risk_category: team
    severity: high
    likelihood: medium
    description: TechCrunch reported multiple layoff rounds after rapid growth; current headcount and morale are not public.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.B
      - VII.F
      - VII.G
    evidence_claim_ids:
      - EC-014
      - EC-023
    mitigation_or_diligence_request: Request employee census, attrition/layoff history, engagement survey results, open-role budget approvals and critical-team retention plans.
  - risk_id: R-003
    risk_title: Crowded CCaaS and AI automation competition
