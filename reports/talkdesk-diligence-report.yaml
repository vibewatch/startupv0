    suggested_source_or_request: Request product KPI pack, architecture review and customer cohorts.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Customer ARR by account, top-20 concentration, churn and renewals.
    why_it_matters: Customer concentration and retention drive revenue quality.
    suggested_source_or_request: Request ARR roster, NRR/GRR cohorts and renewal schedule.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
