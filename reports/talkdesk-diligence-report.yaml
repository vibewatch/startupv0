diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, ARR, gross margin, cash, debt and burn.
    why_it_matters: Core underwriting cannot rely on 2021 valuation and funding alone.
    suggested_source_or_request: Request audited financials, KPI pack and bank/debt schedules.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, investor rights, option ledger and liquidation preferences.
