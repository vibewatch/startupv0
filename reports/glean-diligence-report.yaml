executive_summary:
  overall_assessment: Glean is suitable for confirmatory diligence, not underwriting, based on public evidence. Public sources support its unicorn-list valuation screen, product positioning and selected customer/partner/team signals, but core financial, cap-table, customer-concentration, legal, HR and contract evidence is private.
  investment_or_diligence_thesis: Proceed only if management can substantiate Glean's $4.6B valuation with audited financials, durable revenue cohorts, defensible product differentiation, compliant operations and clean legal/cap-table records.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Glean at $4.6B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-003
      summary: Glean's public product/platform positioning is supported by company-owned sources.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-002
      summary: Public sources identify founders or senior leaders.
      evidence_claim_ids:
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality, ARR and retention are private
    - risk_id: R-002
      summary: Valuation depends on AI-growth assumptions
    - risk_id: R-003
      summary: Enterprise customer concentration and renewal risk
  key_evidence_gaps:
    - Audited financials, revenue quality, cash/debt, burn and unit economics.
    - Current cap table, preferences, option pool, debt and investor rights.
    - Customer/merchant/partner revenue concentration, churn, contract terms and references.
    - Legal/regulatory/IP/privacy/security schedules and insurance.
    - HRIS headcount, compensation, equity, attrition and key-person retention.
  recommended_next_steps:
    - Run finance and cap-table diligence before relying on headline valuation.
    - Conduct customer/partner/supplier references and contract review.
    - Commission product, security and data/privacy diligence.
    - Have counsel review litigation, regulatory, IP, employment and material-contract schedules.
