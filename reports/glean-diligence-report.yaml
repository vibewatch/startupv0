report_metadata:
  report_title: Glean Startup Diligence Report
  target_company: Glean
  website: https://www.glean.com/
  known_aliases:
    - Glean Technologies
    - Glean Work AI
    - Glean Assistant
    - Glean Search
  sector: Enterprise Tech / work AI, enterprise search and agent platform
  geography: United States; Palo Alto, California headquarters; enterprise customers globally
  company_stage: Private unicorn / late-stage enterprise AI platform
  research_date: 2026-06-09
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and selected this uncovered unicorn from a CB Insights current unicorn list sample.
    - Used company-owned sources, CB Insights, public profiles, search snippets and accessible public web sources; inaccessible or navigation-heavy sources are disclosed as limitations.
    - Treated public pages as screening evidence only and marked private finance, cap table, customer, legal, HR, security and contract records as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - Palo Alto, California headquarters
    - enterprise customers globally
  excluded_topics:
    - Private data-room materials, paywalled databases, non-public legal records, non-public customer calls, confidential employee records and unaudited management data were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-09
      notes: No pitch deck, financial model, customer references or founder responses were provided.
