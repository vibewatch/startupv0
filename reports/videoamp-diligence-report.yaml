    documentation.
  - Complete legal, insurance, material-contract, IP/trademark/license and open-source
    schedules.
  recommended_next_steps:
  - Run financial/cap-table/debt diligence before relying on public valuation anchors.
  - Conduct customer/partner reference calls and contract review for Paramount, WBD,
    dentsu/Horizon and data-provider dependencies.
