executive_summary:
  overall_assessment: Eligible private-unicorn diligence target with strong public
    financing, product and partnership evidence, but investment-quality diligence
    remains gated by private financials, debt/cap-table documents, customer concentration,
    standards/privacy validation and post-2024 workforce stability.
  investment_or_diligence_thesis: VideoAmp is positioned in the shift from legacy
    TV measurement to cross-platform media currency. Public evidence supports late-stage
    financing, active operations, recognizable publisher/agency relationships and
    technical/IP assets; underwriting should proceed only after financial, customer,
    regulatory and team-risk validation.
  strongest_verified_claims:
