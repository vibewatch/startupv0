      and GM/Carat/Paramount.
    evidence_claim_ids:
    - EC-013
    - EC-014
    - EC-015
    - EC-016
  biggest_risks:
  - risk_id: R-001
    summary: 'Financial transparency/debt/runway risk: current financials, debt terms,
      burn and cap-table economics are private while 2024 reporting cited layoffs
      and debt-paydown context.'
  - risk_id: R-002
    summary: Measurement-currency adoption and competition risk versus Nielsen, Comscore,
      iSpot and internal tools; MRC audit completion/adoption not verified.
  - risk_id: R-003
