report_metadata:
  report_title: Unico Startup Diligence Report
  target_company: Unico
  website: https://www.unico.io/
  known_aliases:
    - Acesso Digital
    - Unico IDCloud
    - unico | check
  sector: Enterprise Tech / AI identity verification, biometrics, fraud prevention and digital identity infrastructure
  geography: Brazil / Sao Paulo with public Latin America and global operating claims
  company_stage: Active private unicorn / Series D according to CB Insights
  research_date: 2026-05-21
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public internet research only and prioritized CB Insights for unicorn eligibility, financing, company-stage and competitor data plus Unico-owned pages for product, usage, certification and customer/case-study claims.
    - Treated company-owned usage, performance, conversion and certification statements as public claims requiring private validation rather than audited facts.
    - Recorded blocked or unavailable security, terms, privacy and independent-news pages as evidence limitations rather than bypassing access controls.
    - Marked audited financials, cap table, customer concentration, churn, NRR, supplier spend, model performance, legal dockets, contracts, insurance, HR and regulatory artifacts as not_publicly_verifiable where absent from reviewed public sources.
  included_jurisdictions:
    - Brazil
    - Latin America markets referenced by public materials
    - Global identity, privacy and data-protection context referenced by company claims
  excluded_topics:
    - Private financial statements, cap table, customer contracts, supplier agreements, SOC reports, DPIAs, customer references, HR files, board materials, legal dockets and regulator correspondence were not available.
  user_provided_materials:
    - material_id: UPM-001
      title: User request for random uncovered unicorn diligence report
      type: workflow_request
      date_received: 2026-05-21
      notes: No pitch deck, founder answers, financial model, data room or customer references were provided.
