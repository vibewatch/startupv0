executive_summary:
  overall_assessment: Unico is a public-evidence-supported private unicorn candidate in digital identity and biometric fraud prevention, with credible CB Insights financing/status anchors and strong company-reported scale. The diligence posture is cautious because operating financials, customer concentration, privacy/security artifacts, product performance, cap table and legal/regulatory evidence are not public.
  investment_or_diligence_thesis: Proceed only with data-room diligence focused on validating whether Unico can convert its large identity/fraud signal network and LATAM positioning into durable, compliant, profitable enterprise revenue under intense competition and biometric/privacy regulatory scrutiny.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Unico as a US$2.60B Brazil Enterprise Tech unicorn and active Series D company with US$335.94M total raised.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public sources verify Unico markets digital identity, IDCloud, biometric/fraud detection and unico | check capabilities.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-008
    - founder_claim_id: FC-003
      summary: Unico publicly reports 1.2B+ annual authentications, 170M+ unique user faces, 150M+ monthly transactions and US$7B+ fraud prevented, but these are company-authored metrics requiring audit.
      evidence_claim_ids:
        - EC-005
  biggest_risks:
    - risk_id: R-004
      summary: Biometric/privacy regulatory exposure is high because the product handles face, document, device, location, IP and risk-signal data.
    - risk_id: R-001
      summary: Customer concentration, churn, NRR and revenue by customer are not public despite large aggregate usage claims.
    - risk_id: R-003
      summary: Deepfake/fraud/biometric performance claims require independent technical validation.
    - risk_id: R-005
      summary: Security, terms and privacy artifacts were not accessible through reviewed public pages.
  key_evidence_gaps:
    - Audited financial statements, ARR, gross margin, burn, cash, AR aging and backlog
    - Current cap table, financing terms, liquidation preferences, debt and option pool
    - Customer concentration, churn, NRR, renewal calendar and customer-level usage/revenue
    - Product pricing, SKU economics, accuracy, false-positive/false-negative rates and model bias testing
    - Privacy, security, SOC/PAD/NIST certificates, DPIAs, subprocessors, incidents and regulator correspondence
    - Full IP and license schedule with patent relevance and assignments
  recommended_next_steps:
    - Request a full financial/cap-table data room before valuation reliance.
    - Prioritize privacy, biometric, SOC/PAD/NIST, incident and regulator diligence.
    - Validate customer concentration, retention, ROI and product performance with logs, references and independent tests.
    - Refresh independent source collection for financing/news/legal evidence with direct browser access and local Brazilian legal/regulatory searches.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Unico has credible public financing and unicorn-status anchors from CB Insights, but nearly all operating-financial quality questions require private financial statements, KPI definitions, and cap-table documents.
    founder_claim_ids:
      - FC-001
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-019
      - EC-022
    risk_ids:
      - R-006
      - R-009
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources disclose valuation, funding and usage metrics, but not audited financial statements, ARR, gross margin, cash flow, backlog, AR aging, or product-level revenue.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: FND-I-A-001
            finding: No audited financial statements or management reports were found in reviewed public sources; this is a high-priority data-room request.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-006
              - R-009
        hidden_risks:
          - Financing terms, cap table, and runway not public
          - Public evidence base has blocked and inaccessible third-party sources
        evidence_gaps:
          - Audited statements, management accounts, revenue by product/customer/channel/geography, backlog, AR aging, cash balance, burn, and unit economics.
        follow_up_questions:
          - Provide audited financial statements, monthly management accounts, ARR and revenue waterfall, gross-margin analysis, AR aging, backlog, and cash/burn/runway bridge.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-022
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No projections or operating plan were public; self-reported scale signals do not establish forecast reliability.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: FND-I-B-001
