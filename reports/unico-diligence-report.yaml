executive_summary:
  overall_assessment: >-
    Unico is eligible for private-unicorn diligence based on public evidence: CB Insights lists it as Series D | Alive, financing releases place it above $1B in 2021 and $2.6B in 2022, and product/customer sources show an active biometric identity and fraud-prevention platform. The diligence posture should be advance to data-room diligence, not investment-ready from public evidence alone, because financial statements, cap table, customer economics, security attestations, biometric/privacy compliance, and HR/governance materials are not public.
  investment_or_diligence_thesis: >-
    The positive thesis is a scaled Brazil-origin digital-identity platform with enterprise adoption, bank references, high authentication volume, institutional investors, and a broadened product suite via OwnID/passkey authentication. The underwriting question is whether Unico can convert self-reported scale and fraud-prevention value into durable, compliant, high-margin recurring revenue while managing LGPD-sensitive biometric data, cloud/model risks, acquisition integration, and LatAm expansion.
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "Unico is publicly identified as active, private, Series D | Alive, founded in 2007, and headquartered in São Paulo."
      evidence_claim_ids: ["EC-001"]
    - founder_claim_id: "FC-002"
      summary: "Unico’s $100M Series D at a $2.6B valuation in 2022 is supported by a legal-advisor announcement and CB Insights financials."
      evidence_claim_ids: ["EC-002", "EC-003"]
    - founder_claim_id: "FC-005"
      summary: "Public sources support a sophisticated biometric identity and authentication product suite, including Google Cloud vector-search architecture and OwnID passkey acquisition."
      evidence_claim_ids: ["EC-006", "EC-014", "EC-015", "EC-016"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Financial performance and unit economics are private and cannot support valuation independently."
    - risk_id: "R-003"
      summary: "Core products process biometric sensitive data under rising LGPD/ANPD scrutiny."
    - risk_id: "R-004"
      summary: "Customer concentration, retention, contract terms, and bank dependency are not public."
  key_evidence_gaps:
    - "Audited financials, ARR, gross margin, burn, cash, runway, and retention."
    - "Cap table, preference stack, debt, option pool, investor rights, and valuation marks."
    - "Top-customer revenue, contract terms, churn, NRR/GRR, customer references, and support SLAs."
    - "Security certifications, incident history, model accuracy/bias testing, privacy artifacts, and ANPD/LGPD documentation."
    - "Board composition, founder equity/vesting, management incentives, HRIS, attrition, and integration metrics."
  recommended_next_steps:
    - "Proceed only to second-stage diligence with a full data-room request; do not rely on public evidence for investment approval."
    - "Make financial, cap-table, privacy/security, and customer-contract packages gating items before valuation work."
    - "Conduct independent customer calls with banks, retailers, churned customers, acquired OwnID references, and strategic vendors."
    - "Run technical and privacy diligence focused on biometric consent, retention, accuracy, bias, cloud resilience, and model governance."
    - "Reconcile founder/governance records and acquisition integration risks with corporate counsel."

