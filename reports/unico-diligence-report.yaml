diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR, gross margin, burn, cash, AR aging and backlog
    why_it_matters: Financial quality, runway and valuation support cannot be assessed from valuation and usage claims alone.
    suggested_source_or_request: Request audited financials, management accounts, KPI dictionary and monthly operating model.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, financing terms, liquidation preferences, debt and option pool
    why_it_matters: Investor economics and dilution may materially change risk/return.
    suggested_source_or_request: Request cap table, financing documents, debt schedule and investor-rights summary.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Customer concentration, churn, NRR, renewal calendar and customer-level usage/revenue
    why_it_matters: Aggregate scale can mask customer concentration or low monetization.
    suggested_source_or_request: Request top-customer schedule, cohort files, references and revenue/usage reconciliation.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product pricing, SKU economics, accuracy, false-positive/false-negative rates and model bias testing
    why_it_matters: Product performance and unit economics drive defensibility and regulatory risk.
    suggested_source_or_request: Request pricing, SKU gross margin, test reports, model cards and independent certifications.
    priority: high
  - gap_id: G-005
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Privacy, security, SOC/PAD/NIST certificates, DPIAs, subprocessors, incidents and regulator correspondence
    why_it_matters: Biometric identity processing creates material LGPD/GDPR, breach and customer-trust exposure.
    suggested_source_or_request: Request SOC 2, PAD/NIST certificates, DPIAs, privacy notices, incident logs and subprocessor list.
    priority: high
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Full IP and license schedule with patent relevance and assignments
    why_it_matters: Visible patent evidence is inconclusive and may not support an identity-tech moat.
    suggested_source_or_request: Request patent/trademark schedule, assignments, license audit, open-source SBOM and counsel opinion.
    priority: medium
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.A
    missing_information: Full organization chart, management biographies, headcount, compensation, option plan and turnover
    why_it_matters: Execution risk cannot be evaluated from one LATAM leadership excerpt.
    suggested_source_or_request: Request HR data pack, org chart, executive bios, compensation, option grants and turnover.
    priority: medium
  - gap_id: G-008
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, channel mix, pipeline, CAC payback and quota attainment
    why_it_matters: GTM efficiency and budget sufficiency are not public.
    suggested_source_or_request: Request CRM export, funnel attribution, sales compensation and pipeline forecast.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Comprehensive legal/regulatory docket and claims search
    why_it_matters: No public lawsuits were found in reviewed sources, but source coverage was limited.
    suggested_source_or_request: Request counsel letters, litigation/regulatory schedule and jurisdictional searches.
    priority: medium
