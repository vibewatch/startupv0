risk_register:
  - risk_id: R-001
    risk_title: Customer concentration and retention not public
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Company-reported scale does not reveal customer concentration, churn, NRR, contract duration, or sector revenue mix.
    impacted_chapter_ids:
      - III
      - V
      - I
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - I.A
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request top-customer schedules, cohort retention, NRR, churn bridge, contract terms, and customer calls.
  - risk_id: R-002
    risk_title: Crowded global identity-verification market
    risk_category: market
    severity: high
    likelihood: medium
    description: CB Insights lists multiple comparable vendors across identity verification, fraud prevention, KYC, AML, and biometric onboarding.
    impacted_chapter_ids:
      - IV
      - V
      - II
    impacted_section_ids:
      - IV.A
      - V.A
      - II.A
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request win/loss analysis, pricing benchmarks, differentiation proof, renewal reasons, and market-share support.
  - risk_id: R-003
    risk_title: Product and model-performance claims require technical validation
    risk_category: technical
    severity: high
    likelihood: medium
    description: Deepfake, biometric, liveness, fraud-radar, and conversion claims are material but company-authored; accuracy, bias, resilience, and false-positive economics need testing.
    impacted_chapter_ids:
      - II
      - VI
      - IV
    impacted_section_ids:
      - II.A
      - VI.B
      - IV.A
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request independent test results, model cards, PAD certificates, false-accept/false-reject rates, bias testing, architecture review, and red-team outputs.
  - risk_id: R-004
    risk_title: Biometric and privacy regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Unico processes biometric identity, document, device, location, IP, and risk-signal data; LGPD, GDPR, consent, retention, cross-border transfer, and fairness issues are central diligence risks.
    impacted_chapter_ids:
      - VIII
      - VI
      - II
    impacted_section_ids:
      - VIII.G
      - VIII.C
      - VI.B
      - II.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request DPIAs, privacy notices, consent flows, retention schedules, data-transfer agreements, subprocessors, regulator correspondence, and incident logs.
  - risk_id: R-005
    risk_title: Security and legal artifacts unavailable from public pages
    risk_category: legal
    severity: high
    likelihood: unknown
    description: Security and terms pages were blocked and the privacy URL did not provide reviewable policy text through the captured path.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request customer terms, DPA, SLA, SOC report, certificates, insurance, breach history, and counsel memo.
  - risk_id: R-006
    risk_title: Financing terms, cap table, and runway not public
    risk_category: financing
    severity: medium
    likelihood: unknown
