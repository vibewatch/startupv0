risk_register:
  - risk_id: "R-001"
    risk_title: "Unavailable audited financials and unit economics"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Public evidence validates funding and scale signals but not revenue, gross margin, retention, burn, runway, working capital, debt, or profitability."
    impacted_chapter_ids: ["I", "VIII"]
    impacted_section_ids: ["I.A", "I.B", "I.D", "VIII.G"]
    evidence_claim_ids: ["EC-002", "EC-025", "EC-026", "EC-029"]
    mitigation_or_diligence_request: "Require audited statements, monthly management accounts, cohort revenue, gross margin, NRR/GRR, cash, debt, burn, and board-approved forecast model before valuation work."
  - risk_id: "R-002"
    risk_title: "Headline $2.6B valuation may not reflect current fair value or preference stack"
    risk_category: "financing"
    severity: "high"
    likelihood: "medium"
    description: "Series D valuation is public, but round terms, preference seniority, investor marks, secondaries, and current market repricing are not public."
    impacted_chapter_ids: ["I", "VIII"]
    impacted_section_ids: ["I.C", "I.D", "VIII.F"]
    evidence_claim_ids: ["EC-002", "EC-003", "EC-004", "EC-025", "EC-029"]
    mitigation_or_diligence_request: "Request fully diluted cap table, articles, SHA, investor rights, liquidation preference waterfall, option ledger, warrants, debt, and latest 409A/fair-value support."
  - risk_id: "R-003"
    risk_title: "Biometric and sensitive-data regulatory exposure"
    risk_category: "regulatory"
    severity: "critical"
    likelihood: "medium"
    description: "Core biometric identity products process sensitive personal data under LGPD and analogous regimes, with enforcement and litigation precedents in other markets."
    impacted_chapter_ids: ["V", "VIII"]
    impacted_section_ids: ["V.A", "V.C", "VIII.C", "VIII.E", "VIII.G"]
    evidence_claim_ids: ["EC-006", "EC-017", "EC-018", "EC-020", "EC-021", "EC-028", "EC-029"]
    mitigation_or_diligence_request: "Request DPIAs/LIA records, consent/legal-basis mapping, retention policies, model-training data lineage, subprocessors, ANPD correspondence, and country-by-country privacy counsel memo."
  - risk_id: "R-004"
    risk_title: "Customer concentration hidden by aggregate adoption claims"
    risk_category: "customer"
    severity: "high"
    likelihood: "unknown"
    description: "Public sources cite 800+ companies and major bank adoption, but do not disclose revenue concentration, churn, pricing, renewals, or customer satisfaction."
    impacted_chapter_ids: ["III", "V"]
    impacted_section_ids: ["III.A", "III.C", "III.D", "V.B"]
    evidence_claim_ids: ["EC-007", "EC-008", "EC-029"]
    mitigation_or_diligence_request: "Request top-customer schedule by ARR/revenue, renewal status, churn/losses, NPS/support metrics, contract terms, change-of-control clauses, and permission for customer calls."
  - risk_id: "R-005"
    risk_title: "Technology and vendor dependency"
    risk_category: "technical"
    severity: "medium"
    likelihood: "medium"
    description: "Google Cloud case study and FaceTec partnership signals point to important third-party and cloud dependencies that are not contractually analyzed in public."
    impacted_chapter_ids: ["III", "VI"]
    impacted_section_ids: ["III.B", "III.E", "VI.A", "VI.B"]
    evidence_claim_ids: ["EC-006", "EC-010", "EC-016"]
    mitigation_or_diligence_request: "Review cloud architecture, vendor contracts, SLAs, escrow/exit options, resiliency tests, incident history, model ownership, and concentration of critical suppliers."
  - risk_id: "R-006"
    risk_title: "Competitive pressure from local and global identity-verification vendors"
    risk_category: "market"
    severity: "medium"
    likelihood: "high"
    description: "Competitor lists include Brazilian identity/fraud vendors and global identity-verification platforms competing on accuracy, cost, compliance, integrations, and coverage."
    impacted_chapter_ids: ["IV", "V"]
    impacted_section_ids: ["IV.A", "V.A", "V.C"]
    evidence_claim_ids: ["EC-011", "EC-027"]
    mitigation_or_diligence_request: "Build customer-validated win/loss analysis, pricing benchmark, product accuracy benchmark, implementation-cycle comparison, and region/product market-share estimate."
  - risk_id: "R-007"
    risk_title: "Acquisition integration and acquired-IP risk"
    risk_category: "operational"
    severity: "medium"
    likelihood: "medium"
