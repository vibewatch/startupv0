report_metadata:
  report_title: "Unico Startup Diligence Report"
  target_company: "Unico"
  website: "https://www.unico.io/"
  known_aliases:
    - "Acesso Digital"
    - "Unico IDTech"
  sector: "Digital identity verification, biometric authentication, fraud prevention, and identity-access technology"
  geography: "Brazil headquartered; public signals for Latin America expansion including Brazil, Mexico, Argentina, and company-claimed activity in 21+ countries"
  company_stage: "Private unicorn / Series D | Alive"
  research_date: "2026-05-21"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted; BRL where sourced"
  time_zone: "America/Sao_Paulo"

research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Created exactly one public-evidence-backed diligence report for Unico using company pages, financing announcements, investor and industry releases, market databases, vendor case studies, legal analysis, and trade press."
    - "Prioritized evidence that corroborates eligibility, financing, product, customers, technology, management, and legal/regulatory risk."
    - "Marked unavailable finance, customer, cap-table, legal, HR, and security facts as not_publicly_verifiable rather than inferring them."
  included_jurisdictions:
    - "Brazil"
    - "Latin America where public sources reference expansion"
    - "United States only for OwnID acquisition context"
  excluded_topics:
    - "Private data-room financials, customer contracts, security reports, cap table, board packs, HRIS, litigation schedules, insurance policies, and proprietary model data were not accessed."
    - "No paid database exports, regulator docket pulls, patent-office ownership searches, customer calls, or management interviews were performed."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "User task request"
      type: "workflow_request"
      date_received: "2026-05-21"
      notes: "User requested exactly one standard-depth public-evidence diligence YAML report for Unico at reports/unico-diligence-report.yaml."

