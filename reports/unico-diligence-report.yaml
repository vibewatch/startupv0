diligence_gaps:
  - gap_id: "G-001"
    chapter_id: "I"
    section_id: "I.A"
    missing_information: "Audited financial statements, quarterly management accounts, revenue bridge, gross margin, expenses, cash, burn, debt, and runway."
    why_it_matters: "Funding and customer-count evidence cannot underwrite valuation without financial performance and liquidity."
    suggested_source_or_request: "CFO data room; external accountant; board financial package."
    priority: "high"
  - gap_id: "G-002"
    chapter_id: "I"
    section_id: "I.B"
    missing_information: "Board-approved forecast by product, geography, customer segment, pricing, hiring, capex, FX, and financing assumptions."
    why_it_matters: "Growth plausibility and capital needs depend on detailed assumptions, not public scale claims."
    suggested_source_or_request: "CFO model with variance analysis and scenario cases."
    priority: "high"
  - gap_id: "G-003"
    chapter_id: "I"
    section_id: "I.C"
    missing_information: "Fully diluted cap table, shareholder register, option pool, SAFEs/notes, warrants, debt, preferences, and investor rights."
    why_it_matters: "Headline valuation may be economically misleading without the security stack and dilution."
    suggested_source_or_request: "Corporate counsel, cap-table platform export, financing documents."
    priority: "high"
  - gap_id: "G-004"
    chapter_id: "III"
    section_id: "III.C"
    missing_information: "Top customer revenue, concentration, churn, renewal status, pricing, usage, and satisfaction data."
    why_it_matters: "Aggregate 800+ customer and large-bank claims do not identify revenue durability or concentration risk."
    suggested_source_or_request: "CRM, billing system, renewal schedule, customer success exports, permissioned customer calls."
    priority: "high"
  - gap_id: "G-005"
    chapter_id: "III"
    section_id: "III.E"
    missing_information: "Critical supplier schedule for cloud, biometric/liveness vendors, data providers, support tools, and subcontractors with contract terms."
    why_it_matters: "Identity platforms can have hard dependencies on cloud, model, and biometric-verification partners."
    suggested_source_or_request: "Procurement and legal contract repository; vendor-risk management files."
    priority: "medium"
  - gap_id: "G-006"
    chapter_id: "V"
    section_id: "V.D"
    missing_information: "Sales-force productivity, quotas, ramp, cycle length, CAC, payback, pipeline conversion, and sales compensation."
    why_it_matters: "Public growth narratives need go-to-market efficiency evidence."
    suggested_source_or_request: "CRO operating dashboard, CRM funnel export, compensation plans."
    priority: "medium"
  - gap_id: "G-007"
    chapter_id: "VI"
    section_id: "VI.A"
    missing_information: "Architecture diagrams, SDLC controls, security certifications, uptime, model performance, false-positive/false-negative rates, and R&D spend."
    why_it_matters: "Technical moat and reliability cannot be assessed from marketing and vendor case-study claims alone."
    suggested_source_or_request: "CTO data room, security reports, model-validation documentation, uptime dashboards."
    priority: "high"
  - gap_id: "G-008"
    chapter_id: "VI"
    section_id: "VI.B"
    missing_information: "Product roadmap, OwnID/acquired-product integration plan, development cost, milestones, dependencies, and technical risks."
    why_it_matters: "Acquisition-led product expansion can add integration, IP, retention, and execution risk."
    suggested_source_or_request: "Product roadmap, acquisition integration plan, engineering OKRs, board product materials."
    priority: "medium"
  - gap_id: "G-009"
    chapter_id: "VII"
    section_id: "VII.A"
    missing_information: "Current organization chart, board composition, decision rights, executive retention, and founder operating roles."
    why_it_matters: "Leadership transition and founder-record ambiguity need reconciliation before investment."
    suggested_source_or_request: "Board secretary, HRIS, executive employment agreements, governance documents."
    priority: "medium"
  - gap_id: "G-010"
    chapter_id: "VII"
    section_id: "VII.G"
    missing_information: "Two-year employee attrition, regretted turnover, hiring plan, compensation benchmarking, option grants, and employee-relations issues."
    why_it_matters: "Public trade press suggests leadership churn, but workforce stability is not public."
    suggested_source_or_request: "HRIS export, exit interview summaries, compensation committee materials."
    priority: "medium"
  - gap_id: "G-011"
    chapter_id: "VIII"
    section_id: "VIII.C"
    missing_information: "Privacy, biometric, AI/model, cybersecurity, consumer-protection, employment, tax, anti-corruption, and cross-border legal compliance matrix."
    why_it_matters: "Biometric identity products face high-severity regulatory and reputational exposure."
    suggested_source_or_request: "General counsel, external Brazilian/LATAM/US privacy counsel, compliance policies."
    priority: "high"
  - gap_id: "G-012"
    chapter_id: "VIII"
    section_id: "VIII.A"
    missing_information: "Litigation, regulatory inquiries, threatened claims, settlements, incident notices, insurance claims, and counsel assessment."
    why_it_matters: "No public legal docket review was performed, and privacy/security matters may be non-public."
    suggested_source_or_request: "Legal schedule, external counsel letters, insurance broker, regulator correspondence."
    priority: "high"

