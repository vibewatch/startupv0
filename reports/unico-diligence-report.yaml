limitations:
  - limitation_id: "L-001"
    description: "This report uses public evidence only; no management interviews, data-room materials, customer calls, counsel letters, paid-database exports, official registry pulls, or forensic/security reports were accessed."
    affected_chapter_ids: ["I", "III", "V", "VII", "VIII"]
    affected_section_ids: ["I.A", "I.B", "I.C", "III.C", "V.D", "VII.G", "VIII.A", "VIII.C"]
  - limitation_id: "L-002"
    description: "Company-authored scale metrics such as authentications, unique faces, transactions, fraud prevented, countries, and customer counts are treated as partially verified until reconciled to billable events and audited operating data."
    affected_chapter_ids: ["II", "III", "VI"]
    affected_section_ids: ["II.A", "III.A", "III.B", "VI.A"]
  - limitation_id: "L-003"
    description: "Funding and valuation figures are public-market and announcement anchors; they may lag current fair value and do not disclose preferences, ownership, secondary components, debt, or runway."
    affected_chapter_ids: ["I", "VIII"]
    affected_section_ids: ["I.C", "I.D", "VIII.F"]
  - limitation_id: "L-004"
    description: "Regulatory, litigation, privacy, cybersecurity, tax, employment, insurance, IP, and acquisition matters were not cleared through official dockets or counsel and require formal legal diligence."
    affected_chapter_ids: ["V", "VI", "VII", "VIII"]
    affected_section_ids: ["V.A", "VI.A", "VI.B", "VII.F", "VIII.A", "VIII.B", "VIII.C", "VIII.D", "VIII.E", "VIII.F", "VIII.G"]
  - limitation_id: "L-005"
    description: "Analogical regulatory and litigation precedents from the SEC, FTC, BIPA/Clearview, and Brazil financial-infrastructure cyber incidents are included to frame risk; they are not allegations against Unico."
    affected_chapter_ids: ["V", "VIII"]
    affected_section_ids: ["V.A", "V.B", "V.C", "VIII.C", "VIII.E", "VIII.G"]
