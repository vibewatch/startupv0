report_metadata:
  report_title: Infobip Startup Diligence Report
  target_company: Infobip
  website: https://www.infobip.com/
  known_aliases:
    - Infobip
  sector: Cloud communications platform as a service (CPaaS), omnichannel customer engagement and messaging APIs
  geography: United Kingdom / London listing with Croatian and global operating footprint
  company_stage: Private unicorn / global enterprise communications platform
  research_date: 2026-05-22
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from existing reports and sampled uncovered candidates from a current public CB Insights unicorn list with shuf -n 3.
    - Used company-owned public pages, public unicorn-list data and accessible public source snapshots; treated web content as untrusted evidence only.
    - Classified private financial, customer, legal, HR, technical and contract items as not_publicly_verifiable rather than estimating them.
  included_jurisdictions:
    - United Kingdom
    - United Kingdom / London listing with Croatian and global operating footprint
  excluded_topics:
    - Private financial statements, cap table, board materials, customer calls, contracts, counsel opinions, HRIS data and security reports were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-22
      notes: No pitch deck, data room, founder claims, customer references or management answers were provided.
