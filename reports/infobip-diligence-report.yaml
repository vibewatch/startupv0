executive_summary:
  overall_assessment: Infobip is an eligible uncovered private-unicorn target based on the CB Insights public unicorn list and an active public web presence. Public evidence supports category/product existence and selected traction signals, but investment-grade diligence remains incomplete because financials, customer concentration, contracts, cap table, legal posture, HR and technical artifacts are private.
  investment_or_diligence_thesis: Proceed only as a confirmatory diligence screen. The investability of Infobip depends on validating durable revenue quality, current valuation support, customer/cohort economics, defensible product adoption, compliance/legal posture and runway from primary documents.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Infobip as a private unicorn at $1.00B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Infobip has active public product/category materials.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Infobip has public customer/user/traction signals, though revenue quality is not verified.
      evidence_claim_ids:
        - EC-003
  biggest_risks:
    - risk_id: R-001
      summary: CPaaS pricing pressure and carrier/channel cost exposure can compress margins.
    - risk_id: R-002
      summary: Global privacy, telecom and anti-spam compliance remains material.
    - risk_id: R-003
      summary: Customer, traffic and gross-margin concentration are not public.
  key_evidence_gaps:
    - Audited annual/quarterly financial statements, management accounts and KPI pack
    - Fully diluted cap table, preferences, debt, warrants and option pool
    - Top-customer revenue, churn, retention and cohort data
    - CAC, payback, quota attainment, pipeline conversion and channel spend
    - Architecture, security, reliability, roadmap and R&D budget
    - Org chart, HRIS export, compensation, equity plans and turnover
  recommended_next_steps:
    - Request complete financial, cap-table and financing data room before relying on public valuation.
    - Validate customer concentration, retention, cohort economics and customer references.
    - Have counsel and specialists review legal, regulatory, privacy/security, IP, contracts and insurance.
    - Benchmark product, pricing, GTM efficiency and competitive position with private metrics and market interviews.
