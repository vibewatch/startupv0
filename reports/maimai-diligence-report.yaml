report_metadata:
  report_title: Maimai Startup Diligence Report
  target_company: Maimai
  website: https://maimai.cn/
  known_aliases:
    - Maimai
    - Maimai.cn
    - 脉脉
  sector: Professional networking, recruitment data and China HR technology
  geography: China
  company_stage: Private unicorn / Series D HR technology and professional social network
  research_date: 2026-06-05
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted; RMB references are from China Daily
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from reports/*-diligence-report.yaml and selected this uncovered unicorn through shuf from a CB Insights-derived candidate list.
    - Used CB Insights unicorn-list and company profiles for eligibility/status screening; used company-owned sources and independent/public news where accessible for product, customer, team and risk evidence.
    - Treated company-published claims as evidence of public statements, not as independently audited performance proof.
    - Marked private financial, legal, customer, HR, security and contract records as not_publicly_verifiable rather than inferring them.
  included_jurisdictions:
    - China
    - Public international private-market databases
  excluded_topics:
    - Private financial statements, bank records, tax filings, board minutes, contracts, customer calls, source code, non-public security reports, payroll/HRIS exports and full legal/regulatory docket searches were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-05
      notes: No pitch deck, data room, founder claims or private documents were provided.
