executive_summary:
  overall_assessment: Maimai appears eligible as an uncovered private unicorn based on CB Insights and public status/product evidence. The public record supports company/category existence and selected traction signals, but investment underwriting cannot rely on public sources alone because financial quality, retention, customer concentration, cap table, legal/security posture and current valuation support remain private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The core thesis for Maimai depends on proving durable revenue, defensible product adoption, compliant operations, reliable customer economics and financing terms beyond the headline $1B unicorn-list anchor.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Maimai as a $1B private unicorn.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Public sources verify Maimai's product/category positioning.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-003
      summary: Public customer, user or partner signals exist but do not prove revenue quality.
      evidence_claim_ids:
        - EC-005
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Stale public valuation and private financials
    - risk_id: R-002
      summary: China platform and data-regulatory exposure
    - risk_id: R-003
      summary: Network-effect and competition pressure
  key_evidence_gaps:
    - Audited financials, ARR/bookings, gross margin, cash, debt and forecast model.
    - Current cap table, financing terms, option pool, investor rights and valuation support.
    - Top-customer revenue, contracts, churn/NRR, renewal status and independent references.
    - Security/privacy/compliance artifacts, incident history, legal docket and regulatory correspondence.
    - HRIS/org chart, compensation, retention, turnover and key-person agreements.
  recommended_next_steps:
    - Open finance/cap-table data room before relying on valuation.
    - Run customer, product, security, legal and regulatory diligence in parallel.
    - Benchmark pricing and retention against direct competitors using buyer references and CRM/cohort data.
    - Have counsel verify legal, IP, contracts, privacy, employment and regulatory exposure.
