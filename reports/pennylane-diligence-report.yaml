report_metadata:
  report_title: Pennylane Startup Diligence Report
  target_company: Pennylane
  website: https://www.pennylane.com/fr
  known_aliases:
    - Pennylane SAS
  sector: Accounting, finance management and e-invoicing software for French businesses and accounting firms
  geography: France, headquartered/publicly listed by CB Insights in Paris
  company_stage: Private unicorn / growth-stage SaaS fintech
  research_date: 2026-06-08
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD for valuation; EUR for public European funding references
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and excluded already-covered slugs/aliases before selecting random candidates.
    - Fetched CB Insights and Wikipedia unicorn-list sources; selected three uncovered active private unicorn candidates and replaced Chargebee because Chargebee Technologies was already covered.
    - Used public-source diligence only, including company-owned pages, public unicorn lists, accessible news/profile snippets and visible product/legal/support surfaces.
    - Classified public assertions separately from non-public financial, customer, legal, HR, security and cap-table records that require data-room diligence.
  included_jurisdictions:
    - France
    - United States public web sources where referenced
    - Global public markets referenced by company materials
  excluded_topics:
    - Non-public financial statements, cap table, board materials, customer calls, contracts, security reports, HRIS/personnel records and privileged legal/regulatory correspondence.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-08
      notes: No pitch deck, financial model, founder responses or private data room were provided.
