diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, KPI pack, cash/debt schedule and revenue cohort data
    why_it_matters: Public valuation and product pages do not prove revenue quality, margin, burn or runway
    suggested_source_or_request: Audited financial statements, management accounts, bank/debt schedules and KPI exports
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preferences, investor rights and current valuation support
    why_it_matters: Unicorn-list valuation may hide liquidation preferences, debt, secondary pricing or down-round risk
    suggested_source_or_request: Cap table, financing documents, option/warrant/debt schedules and board approvals
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top customers/users/partners by revenue, concentration, retention and churn
    why_it_matters: Public demand signals do not prove durable revenue or low concentration
    suggested_source_or_request: Customer cohort, contract, renewal, churn and reference package
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, sales productivity and channel economics
    why_it_matters: Public GTM surfaces do not show economic scalability
    suggested_source_or_request: CRM export, channel attribution, sales comp, quota and conversion reports
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.A
    missing_information: Architecture, roadmap, security/quality controls and incident history
    why_it_matters: Product claims require technical and operational validation
    suggested_source_or_request: Roadmap, architecture diagrams, security reports, QA/incident logs and staffing plan
    priority: medium
  - gap_id: G-006
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Legal, regulatory, IP, contract and insurance registers
    why_it_matters: Public pages do not provide a complete counsel-level risk view
    suggested_source_or_request: Counsel memo, dockets, regulatory correspondence, IP assignments, material contracts and insurance schedules
    priority: high
