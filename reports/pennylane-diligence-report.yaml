executive_summary:
  overall_assessment: Pennylane appears to be an active uncovered private unicorn candidate based on the fetched CB Insights list and active public product/service evidence. Public evidence supports status screening, product presence and selected demand/channel signals; investment-grade diligence remains unresolved because core financial, customer, cap-table, personnel, legal and contract records are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A credible thesis for Pennylane depends on proving durable revenue quality, retention, margin, defensible product value, regulatory/legal readiness, leadership depth and financing terms beyond public-list valuation evidence.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Pennylane at $4.08B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Pennylane publicly markets an active product/service platform.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-004
      summary: Pennylane has public demand, customer, inventory, partner or channel signals.
      evidence_claim_ids:
        - EC-004
        - EC-005
  biggest_risks:
    - risk_id: R-001
      summary: Private financial quality and valuation support
    - risk_id: R-002
      summary: French accounting/e-invoicing compliance and security exposure
    - risk_id: R-003
      summary: Crowded SME/accounting software competition
  key_evidence_gaps:
    - Audited financials, KPI pack, cash/debt schedule and revenue cohort data
    - Fully diluted cap table, preferences, investor rights and current valuation support
    - Top customers/users/partners by revenue, concentration, retention and churn
    - CAC, payback, sales productivity and channel economics
    - Architecture, roadmap, security/quality controls and incident history
  recommended_next_steps:
    - Do not rely on public valuation without financing documents, cap table and quality-of-revenue analysis.
    - Run customer/user cohort, reference, supplier/partner and contract diligence before underwriting retention or concentration.
    - Have technical, security/privacy, regulatory/legal, HR and IP specialists review source records before investment reliance.
