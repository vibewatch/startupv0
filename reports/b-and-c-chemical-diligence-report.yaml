diligence_gaps:
  - gap_id: "G-001"
    chapter_id: "I"
    section_id: "I.A"
    missing_information: "Audited financial statements, management accounts, cash/debt, backlog, gross-margin bridge and AR aging are private."
    why_it_matters: "This information is required to close checklist section I.A and avoid relying on public marketing/database signals alone."
    suggested_source_or_request: "Provide audited financials, monthly KPI pack, cash/debt schedule, backlog, AR aging and product/channel/geography revenue split."
    priority: "high"
  - gap_id: "G-002"
    chapter_id: "I"
    section_id: "I.B"
    missing_information: "Board-approved forecast model, forecast-versus-actual history, pricing assumptions and capital-expenditure plan are not public."
    why_it_matters: "This information is required to close checklist section I.B and avoid relying on public marketing/database signals alone."
    suggested_source_or_request: "Provide the three-year forecast model, actual-vs-plan history, price/cost sensitivity cases, capex plan and foreign-operations assumptions."
    priority: "high"
  - gap_id: "G-003"
    chapter_id: "I"
    section_id: "I.C"
    missing_information: "Shareholder register, options/warrants, debt lines, investor rights and legal entity chart are not public."
    why_it_matters: "This information is required to close checklist section I.C and avoid relying on public marketing/database signals alone."
    suggested_source_or_request: "Provide current cap table, shareholder register, option/warrant/debt schedules, investor-rights agreements and entity/domain reconciliation."
    priority: "high"
  - gap_id: "G-004"
    chapter_id: "I"
    section_id: "I.D"
    missing_information: "Tax positions, accounting policies, revenue recognition and original financing documents are not public."
    why_it_matters: "This information is required to close checklist section I.D and avoid relying on public marketing/database signals alone."
    suggested_source_or_request: "Provide financing history, tax filings/positions, accounting policies, revenue-recognition memo and debt/warrant schedules."
    priority: "high"
  - gap_id: "G-005"
    chapter_id: "II"
