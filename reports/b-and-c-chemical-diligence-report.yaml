executive_summary:
  overall_assessment: "Proceed with diligence report: public evidence supports B&C Chemical as a CB-listed private unicorn in Pizhou focused on semiconductor photoresists, and no reviewed public source contradicted ongoing private/unicorn eligibility. Investment reliance should remain conditional on private financial, cap-table, customer, technical, EHS, legal and IP diligence."
  investment_or_diligence_thesis: "B&C Chemical may be strategically relevant as a China semiconductor-materials localization platform with publicly claimed full-chain photoresist capability, significant R&D scale and named customer leads. The diligence case turns on whether private evidence confirms revenue quality, customer qualification, margins, scale-up economics, EHS compliance, IP defensibility and cap-table terms."
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "CB Insights unicorn-list row verifies the US$1.02B valuation, 2023-04-19 date joined, China/Pizhou location, Industrials sector and listed investors."
      evidence_claim_ids:
        - "EC-001"
    - founder_claim_id: "FC-003"
      summary: "Company and SEMICON pages support the focus on medium-to-high-end photoresists, related raw materials and full-chain monomer/resin/PAG/photoresist positioning."
      evidence_claim_ids:
        - "EC-004"
        - "EC-007"
        - "EC-008"
        - "EC-009"
    - founder_claim_id: "FC-005"
      summary: "Company-owned sources and SEMICON provide public scale anchors for R&D facilities, technical staff, patents, production footprint and customer-base claims."
      evidence_claim_ids:
        - "EC-005"
        - "EC-006"
        - "EC-007"
  biggest_risks:
    - risk_id: "R-001"
      summary: "Financial quality, revenue, margins, cash, debt, backlog, AR aging and forecast accuracy are private."
    - risk_id: "R-003"
      summary: "Customer revenue concentration and current qualification/purchase status are not independently verified."
    - risk_id: "R-005"
      summary: "Chemical manufacturing creates environmental, safety and regulatory exposure requiring specialist review."
    - risk_id: "R-002"
      summary: "Unicorn valuation is public, but cap table, investor rights and preference stack are not."
  key_evidence_gaps:
    - "Audited financial statements, monthly management accounts, revenue by product/customer/channel, gross margins, cash/debt, backlog and AR aging."
    - "Cap table, shareholder register, financing documents, investor rights, debt instruments, valuation bridge and entity/domain registry records."
    - "Customer contracts, qualification letters, revenue concentration, churn/retention, export sales ledger and customer references."
    - "Technical validation: product qualification data, production yields, roadmap, product margins, IP schedule and FTO opinions."
    - "Legal/EHS: PRC registry status, litigation/agency searches, permits, LDAR/hazardous-waste records, insurance, material contracts and export-control screening."
  recommended_next_steps:
    - "Request a data room before relying on valuation or operating-scale claims."
    - "Have PRC counsel verify registry status, shareholders, litigation, administrative penalties, permits, IP assignments, contracts and exchange/listing status."
    - "Run technical and customer diligence with fabs/customers to verify product qualification, switching costs, batch orders and revenue durability."
    - "Commission EHS review of production sites, hazardous-waste practices, bromine/emergency-response controls, monitoring data and insurance coverage."
