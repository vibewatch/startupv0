report_metadata:
  report_title: MinIO Public-Source Startup Diligence Report
  target_company: MinIO, Inc.
  website: https://www.min.io/
  known_aliases:
    - MinIO
    - Minio
    - AIStor
    - MinIO AIStor
    - MemKV
  sector: Enterprise Tech; AI data infrastructure; object storage; open-source data platform
  geography: United States; Redwood City / Palo Alto, California public signals; globally distributed software operations
  company_stage: Late-stage private unicorn; Series B / Alive in CB Insights profile
  research_date: 2026-05-20
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prepared exactly one public-source standard diligence report for MinIO, Inc. using CB Insights public pages, MinIO
      company/product/docs/pricing/legal/careers pages, GitHub public API, CourtListener, SEC EDGAR public search, and
      independent technology-news coverage.
    - Prioritized primary company and technical repository evidence for product, pricing, management, compliance, and
      R&D claims; treated company-controlled statements as requiring private validation.
    - Mapped the analysis to the eight-chapter startup diligence checklist with public findings, hidden risks, evidence
      gaps, and follow-up requests for every section.
    - Did not infer audited financials, revenue, ARR, customer concentration, contracts, cap table, HR records, legal
      clearance, or security audit outcomes from absence of public information.
  included_jurisdictions:
    - United States
    - Global enterprise software and AI infrastructure markets
    - Public web sources accessible on research date
  excluded_topics:
    - No private data room, management interview, customer/supplier calls, paid database export, legal opinion, tax
      review, cyber test, source-code audit, or investment recommendation was performed.
    - No use of non-public documents or confidential materials.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-05-20
      notes: User requested one public-source startup diligence YAML report for MinIO at reports/minio-diligence-report.yaml,
        with schema/checklist coverage and local validation.
