        evidence_claim_ids:
          - EC-019
          - EC-024
      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids:
          - VIII.D
        summary: The public MinIO repo is AGPLv3, and customer terms include AIStor Enterprise IP indemnity language;
          patent/trademark portfolio, assignments, and OSS compliance were not fully verified.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.D-1
            finding: GitHub API identifies AGPLv3 licensing for the public object-store repository.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-002
              - R-006
          - finding_id: VIII.D-2
            finding: Customer agreement includes IP indemnity provisions for AIStor Enterprise purchases.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-006
        hidden_risks:
          - AGPL/community transition and proprietary AIStor licensing require careful OSS compliance and
            customer-license review.
        evidence_gaps:
          - Patent/trademark schedule, copyright assignments, OSS dependency scans, contributor agreements, third-party
            licenses, indemnity claims history.
        follow_up_questions:
          - Provide IP schedule, assignments, OSS/SBOM scan, contributor agreements, trademark registrations, patent
            portfolio, and indemnity claims history.
        table_ids:
          - T-022
        figure_ids: []
        evidence_claim_ids:
          - EC-008
          - EC-023
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: Insurance policies, coverage limits, deductibles, exclusions, and claims history are not public.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: VIII.E-1
            finding: No public insurance schedule or claims history was found.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-006
        hidden_risks:
          - Enterprise software exposures may include cyber, E&O, D&O, EPLI, privacy, IP, and contractual indemnity risk.
        evidence_gaps:
          - Insurance policies, claims history, broker summaries, exclusions, indemnity exposure, coverage adequacy
            analysis.
        follow_up_questions:
          - Provide insurance schedule, policies, claims/loss runs, exclusions, cyber/E&O/D&O/EPLI coverage, and broker
            adequacy assessment.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-024
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Public standard customer agreement and pricing tiers are available, but signed customer, supplier, partner,
          reseller, cloud marketplace, financing, and employment contracts are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.F-1
            finding: Customer agreement includes audit, privacy/security, export, indemnity, warranty, and liability terms.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-006
              - R-009
          - finding_id: VIII.F-2
            finding: Pricing tiers establish commercial packages but not signed order terms or negotiated exceptions.
            evidence_claim_ids:
              - EC-007
            risk_ids:
              - R-010
        hidden_risks:
          - Negotiated side letters, uncapped liabilities, service credits, MFNs, termination rights, or partner
            obligations may materially change risk.
        evidence_gaps:
          - Material customer contracts, order forms, DPAs, SLAs, partner/reseller agreements, supplier contracts,
            employment agreements, financing documents.
        follow_up_questions:
          - Provide material contracts list and copies including customer MSAs/order forms, partner/supplier agreements,
            DPAs, SLAs, side letters, and financing/employment agreements.
        table_ids:
          - T-024
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-023
          - EC-024
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No relevant MinIO EDGAR operating-company filing was identified; customer terms include data privacy/security
          and export compliance language, but no full regulatory review was performed.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G-1
            finding: SEC EDGAR search did not identify a relevant MinIO operating-company filing in checked query.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-006
          - finding_id: VIII.G-2
            finding: Customer agreement includes privacy/security and export compliance sections, plus SOC/ISO certification claims.
            evidence_claim_ids:
              - EC-012
              - EC-023
            risk_ids:
              - R-006
              - R-009
        hidden_risks:
          - AI/data infrastructure can implicate export controls, sanctions, government procurement, privacy, and
            security compliance.
        evidence_gaps:
          - Regulatory correspondence, export-control analysis, sanctions screening, DPAs, subprocessors, privacy
            incidents, government contract compliance.
        follow_up_questions:
          - Provide regulatory correspondence, export/privacy/security memos, government-customer compliance
            obligations, sanctions procedures, and incident history.
        table_ids: []
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-012
          - EC-014
          - EC-023
