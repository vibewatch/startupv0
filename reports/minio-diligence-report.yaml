diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, ARR bridge, revenue by product/customer, gross margin, burn, cash, debt, and runway.
    why_it_matters: Needed to underwrite valuation, solvency, growth quality, and capital needs.
    suggested_source_or_request: Company CFO/data room; audited statements and monthly management accounts.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, financing documents, liquidation preferences, investor rights, options, SAFEs/notes/warrants.
    why_it_matters: Headline $1B valuation may not represent common-equity economics.
    suggested_source_or_request: Corporate counsel and finance team.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Independent AIStor performance/security evidence, support-ticket history, product-level ARR, and
      OSS transition policy.
    why_it_matters: Product quality and trust drive enterprise renewal/conversion.
    suggested_source_or_request: Engineering, support, security teams; customer references; SOC reports.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top customers by ARR, contract terms, renewal dates, churn, NRR/GRR, and customer satisfaction.
    why_it_matters: Customer concentration and retention are central to enterprise software value.
    suggested_source_or_request: Revenue operations and customer success schedules.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.B
    missing_information: Partner agreements/certifications and joint pipeline for NVIDIA and Databricks-related initiatives.
    why_it_matters: Public integrations may not translate into revenue without partner commitments.
    suggested_source_or_request: Business development, partner contracts, joint account plans.
    priority: medium
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss analysis, pricing benchmarks, displacement data, and market share.
    why_it_matters: Competitive intensity could pressure growth and margins.
    suggested_source_or_request: Sales ops, product marketing, third-party customer calls.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC/payback, quota attainment, pipeline coverage, and conversion from free/community users.
    why_it_matters: GTM efficiency determines whether public adoption converts into durable ARR.
    suggested_source_or_request: Revenue operations and CRM exports.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Current R&D organization, private repository activity, security patch process, vulnerability
      backlog, and release quality.
    why_it_matters: Archived public repo makes current engineering velocity harder to verify.
    suggested_source_or_request: Engineering leadership, private repo analytics, security program artifacts.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount history/forecast, attrition, compensation bands, equity plan, and key-person retention.
    why_it_matters: Team capacity and retention affect roadmap and support execution.
    suggested_source_or_request: People team and board compensation materials.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP assignments, patent/trademark portfolio, OSS compliance/SBOM, contributor agreements, indemnity claims.
    why_it_matters: AGPL/proprietary product separation and enterprise indemnity are material legal risks.
    suggested_source_or_request: Company counsel, outside IP counsel, OSS scan reports.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.G
    missing_information: SOC 2/ISO reports, privacy/export-control memos, incident history, and regulatory correspondence.
    why_it_matters: Security/compliance claims require artifact verification for enterprise customers.
    suggested_source_or_request: Security/compliance team and counsel.
    priority: high
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.E
    missing_information: Insurance policies, loss runs, exclusions, cyber/E&O/D&O/EPLI coverage.
    why_it_matters: Standardized terms and indemnity commitments create insurable exposure.
    suggested_source_or_request: Insurance broker and legal team.
    priority: medium
