        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: Mural is a direct online whiteboard/facilitation competitor.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-003
          - finding_id: IV.A-F2
            finding: FigJam/Figma competes in product/design team workflows and bundles FigJam with Figma seats.
            evidence_claim_ids:
              - EC-015
