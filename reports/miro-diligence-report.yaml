report_metadata:
  report_title: Miro Startup Diligence Report
  target_company: Miro
  website: https://miro.com/
  known_aliases:
    - Miro
    - RealtimeBoard
    - RealtimeBoard, Inc.
    - RealtimeBoard Inc. dba Miro
    - MiroHQ
  sector: Enterprise collaboration, visual workspace, online whiteboard and AI innovation workspace software
  geography: United States / San Francisco and Amsterdam co-headquarters; global enterprise SaaS markets
  company_stage: Private unicorn / late-stage growth SaaS
  research_date: 2026-06-04
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used the startup-diligence-research workflow at standard diligence depth.
    - Prioritized public company sources, CB Insights unicorn evidence, public customer pages, pricing/product/security pages, competitor primary pages, trademark/legal/regulatory records and public search results.
    - Treated company-published metrics as evidence that Miro makes the claim, not as independent proof of underlying revenue, usage, security effectiveness or customer status.
    - Marked financials, cap table, customer revenue, contracts, personnel and legal schedules as not_publicly_verifiable when they require company/counsel data-room materials.
  included_jurisdictions:
    - United States
    - European Union / United Kingdom / Switzerland data-transfer frameworks
    - Global enterprise SaaS markets referenced by public Miro materials
  excluded_topics:
    - Non-public financial statements, cap table, board materials, customer contracts, SOC 2 report, security questionnaires, HRIS, compensation plans, legal counsel letters, paid dockets and management/customer interviews were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights unicorn-list row for Miro
      type: market_database_row
      date_received: 2026-06-04
      notes: "User provided row: Miro, United States/San Francisco, Enterprise Tech, $17.50B valuation, date joined 2022-01-05, select investors Accel, AltaIR Capital, Technology Crossover Ventures."
