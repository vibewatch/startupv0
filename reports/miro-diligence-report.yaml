executive_summary:
  overall_assessment: "Miro remains eligible for a public-source private-unicorn diligence report: CB Insights and Miro’s 2022 Series C announcement support the $17.5B valuation anchor, and public Miro pages show a scaled enterprise collaboration platform with 100M+ user / 250,000 organization claims, broad integrations, security/trust posture and active AI/product expansion. The diligence case is materially incomplete without private financial, customer, cap-table, contract, HR and legal data."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The thesis depends on proving that Miro converted pandemic-era visual-collaboration adoption into durable, profitable ARR with strong enterprise retention and defensible AI/workflow expansion despite bundled-suite competition from Microsoft, Atlassian, Figma and others.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and Miro public financing evidence support the requested $17.5B unicorn valuation anchor.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-004
      summary: Miro publicly markets a broad AI Innovation Workspace product suite with integrations, product acceleration and enterprise controls.
      evidence_claim_ids:
        - EC-005
        - EC-007
        - EC-013
    - founder_claim_id: FC-006
      summary: Miro publishes mature security/privacy signals through Trust Center certifications, subprocessors and DPF participation.
      evidence_claim_ids:
        - EC-010
        - EC-018
        - EC-021
  biggest_risks:
    - risk_id: R-001
      summary: Revenue quality and current valuation support are not public.
    - risk_id: R-002
      summary: Customer revenue concentration, churn and retention are unknown despite strong logos.
    - risk_id: R-003
      summary: Bundled-suite competition could pressure pricing, adoption and renewal expansion.
  key_evidence_gaps:
    - Audited financials, ARR bridge, cash/debt, cap table, financing terms and current valuation support.
    - Top-customer ARR, concentration, NRR/GRR, churn, renewal calendar and customer-reference calls.
    - SKU-level adoption, AI/product economics, cloud/AI vendor spend, security reports and architecture review.
    - Contracts, DPAs, vendor agreements, insurance policies, legal/IP schedule, litigation docket and regulatory correspondence.
    - Current org chart, HRIS/headcount, compensation/equity, attrition and management references.
  recommended_next_steps:
    - Open data room with financial/cap-table/customer schedules before relying on the 2022 valuation.
    - Run customer, product/security, AI governance and competitive win/loss diligence in parallel.
    - Have counsel verify litigation/IP, privacy/DPF, contract and subprocessor exposures.
    - Validate GTM efficiency and sales productivity with funnel, CAC/payback, quota/ramp and discount data.
    - Re-run eligibility/private-status check immediately before any investment committee decision.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies the $400M Series C, $17.5B valuation, $476M total funding and some 2022 traction/profitability claims. Core financial statements, ARR, margins, cash/debt, cap table and customer revenue quality remain private and are the highest-priority diligence gap.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-006
      - EC-022
    risk_ids:
      - R-001
      - R-008
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: "No audited or management financial statements were found publicly. Public company claims provide only point-in-time traction indicators: profitability in early 2022, 130,000 paying customers and 20 enterprise customers above $1M/year."
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Public sources do not disclose income statements, balance sheets, cash flows, AR aging or revenue by product/channel/geography.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: The 2022 Series C announcement includes profitability and enterprise-customer count claims but not underlying revenue quality.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - A valuation anchored in 2022 may be stale without current ARR/growth/margin and cash-burn evidence.
          - Reported user/customer counts may not translate into durable paid ARR.
        evidence_gaps:
          - Audited financial statements, management reports, monthly ARR bridge, revenue by product/channel/geography, backlog and AR aging are not public.
        follow_up_questions:
          - Provide audited and management financials for FY2023-FY2026 YTD, ARR cohort waterfall, revenue by product/channel/geo, backlog and AR aging.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-022
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: "Miro’s public projections are limited to qualitative growth drivers: enterprise adoption, AI workflows, integrations and product-led growth. Three-year forecasts, pricing assumptions and external-financing assumptions require data-room review."
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.B-F1
            finding: Free/self-serve/enterprise packaging is public, but conversion, discounting, expansion and add-on attach are private.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-010
          - finding_id: I.B-F2
            finding: AI/product expansion could be a growth driver but adoption and margin impact are not public.
            evidence_claim_ids:
              - EC-007
              - EC-013
            risk_ids:
              - R-005
        hidden_risks:
          - Forward-looking AI and enterprise expansion may require high R&D and GTM spend before monetization is proven.
          - Foreign operations and data-residency offerings may add cost and complexity.
        evidence_gaps:
          - Quarterly forecast, scenario assumptions, capex, cloud costs, hiring plan and financing assumptions are not public.
        follow_up_questions:
          - Provide board-approved operating plan, forecast model, pricing and packaging assumptions, capex/cloud cost plan, hiring plan and financing assumptions.
        table_ids:
          - T-003
          - T-005
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-013
          - EC-022
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources name major investors and valuation but do not provide shares outstanding, option pool, warrants, debt, liquidation preferences or off-balance-sheet liabilities.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: CB Insights and Miro public sources identify valuation and select/round investors.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-001
          - finding_id: I.C-F2
            finding: Ownership percentages, rights and preferences are not public.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-001
        hidden_risks:
          - Late-stage terms, secondary components or structured preferences could materially affect common-equity value.
        evidence_gaps:
          - Cap table, investor rights, option/warrant schedule, debt schedule and off-balance-sheet liabilities are not public.
        follow_up_questions:
          - Provide fully diluted cap table, charter, investor rights, option/warrant schedule, SAFEs/notes/debt and off-balance-sheet obligations.
        table_ids:
          - T-002
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-022
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: The public financing history is well supported for the 2020 Series B and 2022 Series C signals in the Series C release, but tax positions, revenue-recognition policies and detailed round terms remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Series C public source discloses $400M Series C, $476M total funding and 2020 Series B reference.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-001
          - finding_id: I.D-F2
            finding: Tax, revenue recognition and current-basis information are not public.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-001
        hidden_risks:
          - Revenue recognition for enterprise, add-ons, services and marketplace integrations could affect quality of revenue.
        evidence_gaps:
          - Tax positions, revenue-recognition memo, financing history with percentages and current basis are not public.
        follow_up_questions:
          - Provide financing-history schedule, revenue-recognition policy, tax/NOL schedule and current valuation/409A support.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-022
  - chapter_id: II
    title: Products
    chapter_summary: Miro publicly markets a broad AI Innovation Workspace spanning collaborative canvas, whiteboarding, product acceleration, AI workflows, enterprise guard, integrations and developer APIs. Product breadth is credible publicly, but adoption, technical defensibility, SKU economics and roadmap execution remain private.
    founder_claim_ids:
      - FC-004
      - FC-005
      - FC-006
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-007
      - EC-010
      - EC-013
      - EC-021
    risk_ids:
      - R-004
      - R-005
      - R-010
    sections:
