        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public product materials describe Miro as a collaborative canvas/AI workspace with templates, integrations, AI workflows, product acceleration modules, enterprise security and add-on governance. Exact product-level revenue, growth, market share and cost structure are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: Miro has a publicly documented suite of collaborative canvas, AI, prototype, roadmap, insights, integrations and enterprise guard products.
            evidence_claim_ids:
              - EC-005
              - EC-007
              - EC-013
            risk_ids:
              - R-005
          - finding_id: II.A-F2
            finding: Plan packaging and enterprise feature gates are public, but SKU economics are private.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-010
          - finding_id: II.A-F3
            finding: Security/compliance features are visible through Trust Center and Enterprise Guard.
            evidence_claim_ids:
              - EC-010
              - EC-021
            risk_ids:
              - R-004
        hidden_risks:
          - Rapid expansion into AI and product-management workflows may create complexity and implementation burden.
          - Enterprise Guard/AI features create privacy, eDiscovery and model-governance obligations.
        evidence_gaps:
          - Product-level ARR/growth/gross margin, active usage, feature attach rates, roadmap dates and benchmark evidence are not public.
        follow_up_questions:
          - Provide SKU revenue/gross margin, roadmap, technical architecture, model/vendor diagrams, usage cohorts, release-quality metrics and customer product references.
        table_ids:
          - T-004
          - T-005
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-007
          - EC-010
          - EC-013
          - EC-021
  - chapter_id: III
    title: Customer Information
    chapter_summary: Miro shows strong public customer proof through 100M+ user / 250,000 organization claims, Fortune 100 adoption, case studies and named logos. However, top-customer ARR, concentration, churn, severed relationships and supplier contract economics are not public.
    founder_claim_ids:
      - FC-003
      - FC-006
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-008
      - EC-009
      - EC-010
      - EC-023
      - EC-024
    risk_ids:
      - R-002
      - R-007
      - R-009
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Miro publishes customer stories and logos across enterprise, product, agile, innovation and AI use cases, but not a top-15 customer list by application or purchase timing.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Public customer evidence includes PepsiCo, HP, Guidewire, GitHub and named logos from About/Trust/customer pages.
            evidence_claim_ids:
              - EC-004
              - EC-009
            risk_ids:
              - R-002
          - finding_id: III.A-F2
            finding: The 2022 financing announcement claims 20 enterprise customers paying more than $1M per year.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-002
        hidden_risks:
          - Public case studies may overrepresent successful deployments and omit churned or low-adoption customers.
        evidence_gaps:
          - Top 15 customers, purchase dates, product ownership and current paid status are not public.
        follow_up_questions:
          - Provide top-25 customers by ARR/application with purchase date, product mix, renewal date, health score and reference availability.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-009
          - EC-023
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public integrations and partner pages verify a broad ecosystem with Microsoft 365, Google Workspace, Atlassian/Jira, Slack, ServiceNow, Zoom, developer APIs, solution partners and partner directory.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: III.B-F1
            finding: Marketplace and integrations pages identify 250+ apps/tools and major workflow ecosystems.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-003
          - finding_id: III.B-F2
            finding: Solution-partner and directory pages support services/implementation partner motion.
            evidence_claim_ids:
              - EC-011
            risk_ids: []
        hidden_risks:
          - Platform partners can become competitors or change API/commercial terms.
        evidence_gaps:
          - Partner revenue contribution, co-sell agreements, marketplace economics and termination rights are not public.
        follow_up_questions:
          - Provide strategic-partner contracts, marketplace revenue, co-sell pipeline, integration maintenance costs and termination/change-of-control terms.
        table_ids:
          - T-008
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-008
          - EC-011
