risk_register:
  - risk_id: R-001
    risk_title: Revenue quality and $17.5B valuation support are not public
    risk_category: financial
    severity: high
    likelihood: medium
    description: Miro has public valuation, funding, user and paying-customer signals, but no audited financials, ARR bridge, retention, profitability, cash balance or current 409A/secondary-market valuation is public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited/management financials, ARR cohort waterfall, cash/debt schedule, board-approved forecast, 409A and all financing documents before relying on valuation.
  - risk_id: R-002
    risk_title: Customer revenue concentration and retention are undisclosed
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Public logos, customer stories and 20 enterprise accounts above $1M ARR in 2022 support enterprise traction, but top-customer revenue, renewal status, churn and concentration are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request top-25 ARR schedule, NRR/GRR cohorts, renewal calendar, churned accounts, customer concentration and reference calls.
  - risk_id: R-003
    risk_title: Bundled-suite and direct visual-collaboration competition pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Miro competes with direct specialists and bundled tools from Figma, Microsoft, Atlassian, Lucid and Mural that can use distribution, existing licenses or adjacent workflows to pressure pricing and adoption.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Request win/loss, churn by competitor, discounting by segment, competitive battlecards and renewal-price realization.
  - risk_id: R-004
    risk_title: AI, privacy and cross-border data-transfer exposure
    risk_category: regulatory
    severity: medium
    likelihood: high
    description: Miro markets AI workflows and uses AI/data subprocessors; enterprise customers will scrutinize model training restrictions, data residency, auditability and privacy transfer mechanisms.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Review AI data-flow diagrams, model/provider contracts, DPA, SCC/DPF materials, DPIAs, red-team results and customer opt-out controls.
  - risk_id: R-005
    risk_title: Roadmap complexity may dilute product focus
    risk_category: product
    severity: medium
    likelihood: medium
    description: Miro is expanding from whiteboarding into AI workflows, prototypes, portfolios, enterprise guard, MCP and product/business acceleration; adoption, attach rate and margin contribution are not public.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Request product adoption cohorts, add-on attach rates, roadmap burn, gross margin by SKU and customer interviews on must-have use cases.
  - risk_id: R-006
    risk_title: Software patent/IP clearance risk persists despite one dismissed suit
    risk_category: legal
    severity: medium
    likelihood: medium
    description: A 2023 Delaware patent infringement case against RealtimeBoard d/b/a Miro was dismissed with prejudice in 2024, but terms were not public and broader freedom-to-operate evidence was not available.
    impacted_chapter_ids:
      - VIII
      - VI
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - VI.B
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Counsel should pull docket, settlement/license terms if any, patent assignment searches, open-source scans and FTO opinions for collaboration/AI features.
  - risk_id: R-007
    risk_title: Global operations and data-residency execution risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Miro operates across global hubs and offers EU/US/AU data-residency options through subprocessors; implementation quality and contractual SLAs require non-public review.
    impacted_chapter_ids:
      - III
      - VII
      - VIII
    impacted_section_ids:
      - III.E
      - VII.B
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review entity map, employment/compliance controls, data-residency architecture, subprocessor DPAs, SLAs and incident history.
  - risk_id: R-008
    risk_title: Post-hypergrowth organization and retention risk
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Miro doubled headcount to more than 1,200 by early 2022 and has limited visible hiring on the research date; attrition, leadership stability and compensation costs are not public.
    impacted_chapter_ids:
      - VII
      - I
    impacted_section_ids:
      - VII.B
      - VII.G
      - I.A
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request HRIS export, attrition by function/location, compensation bands, option refresh policy, open reqs and management references.
  - risk_id: R-009
    risk_title: Cloud and AI subprocessor concentration risk
    risk_category: technical
    severity: medium
    likelihood: unknown
    description: Trust-center disclosures show AWS as infrastructure provider and Anthropic/Google as listed subprocessors for AI/security functions; contract terms, spend concentration and fallback plans are private.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.F
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request vendor contracts, spend by vendor, availability architecture, exit plans, security reviews and AI-provider data-retention terms.
  - risk_id: R-010
    risk_title: Pricing/packaging and seat-expansion economics are not transparent
    risk_category: financial
    severity: medium
    likelihood: high
    description: Public pricing indicates free/self-serve/enterprise plans and add-ons, but realized ACV, discounting, conversion rates and add-on attach are non-public.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.B
      - II.A
      - V.D
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request funnel metrics, free-to-paid conversion, self-serve vs sales-led ARR, discount waterfall, seat expansion cohorts and add-on attach rates.
