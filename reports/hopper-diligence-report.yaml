report_metadata:
  report_title: Hopper Startup Diligence Report
  target_company: Hopper
  website: https://www.hopper.com/
  known_aliases:
    - Hopper App
    - Hopper Cloud
    - Hopper Homes
    - Hopper Hotels
  sector: Travel marketplace / consumer app / travel fintech
  geography: Canada primary; global consumer travel marketplace
  company_stage: Private unicorn
  research_date: 2026-05-18
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Toronto
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from public unicorn databases and company-owned product, customer, legal, security, and footer pages that
      were accessible during the run.
    - Prioritized sources that verify private-unicorn status, product breadth, customer/user traction, partner
      dependencies, compliance claims, and hidden diligence gaps.
    - Used public evidence only; no private data room, customer records, contracts, financial statements, or non-public
      regulator correspondence were accessed.
    - Treated company-published customer, scale, rating, security, and product metrics as public claims requiring direct
      confirmatory diligence.
  included_jurisdictions:
    - Canada
    - Global investor and market-database context
  excluded_topics:
    - Non-public financial statements and tax filings
    - Private cap table, financing documents, board materials, and option plans
    - Customer-level records, supplier contracts, employee records, legal dockets, and insurance policies not visible in
      public sources
    - Private security reports, penetration tests, incident logs, model-risk reviews, and regulator correspondence
  user_provided_materials:
    - material_id: UPM-001
      title: Autonomous diligence request for Hopper
      type: workflow_request
      date_received: 2026-05-18
      notes: User requested a public-source unicorn diligence report at reports/hopper-diligence-report.yaml; no founder deck
        or private materials were provided.
