executive_summary:
  overall_assessment: Continue to confirmatory diligence. Public evidence supports private unicorn status, broad
    travel-product surface, app distribution, and 120 million traveler claim; private data is required for unit
    economics, guarantee reserve adequacy, supplier contracts, cohort retention, take rate, fraud/refunds, and
    regulatory treatment.
  investment_or_diligence_thesis: Hopper has credible public evidence of a large consumer travel app, a $5B CB Insights
    unicorn valuation, and product expansion from booking into travel-fintech protections. The key underwriting question
    is whether travel demand cyclicality, supplier economics, insurance-like consumer protections, and app-store
    acquisition costs allow durable profitable growth.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Hopper at a $5B valuation, joined 3/24/2021, Canada/Montreal consumer and retail, with
        Capital One Growth Ventures, Citi Ventures, and OMERS Ventures as investors.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Wikipedia active-unicorn list independently shows Hopper at a $5B valuation in August 2021 in travel, Canada,
        citing TechCrunch.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Hopper-owned site states 120 million travelers and lists flights, hotels, rental cars, homes, price prediction,
        change/cancel/leave for any reason, and premium disruption assistance.
      evidence_claim_ids:
        - EC-003
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: "Travel demand cyclicality and supplier dependency: Hopper depends on travel demand and supplier inventory from
        airlines, hotels, homes, and rental-car partners; contract terms and take rates are not public."
    - risk_id: R-002
      summary: "Unit economics of travel-fintech protections not public: Cancel/change/leave for any reason and disruption
        assistance can create reserve, refund, fraud, regulatory, and customer-service exposures that are not visible
        publicly."
    - risk_id: R-003
      summary: "Valuation reset risk since 2021: The $5B valuation anchors date to 2021; travel-tech multiples, interest
        rates, and growth assumptions may have changed materially."
    - risk_id: R-004
      summary: "App-store and paid-acquisition dependence: The public product is app-first; customer acquisition costs,
        retention, and organic-vs-paid mix are not public."
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, cash runway, revenue recognition, gross margin, and
      unit economics are not public.
    - Current cap table, investor rights, liquidation preferences, debt, warrants, option pool, and secondary
      transactions are not public.
    - Customer/user cohorts, revenue concentration, churn, NRR, supplier/partner economics, and references require
      private evidence.
    - Product pricing, adoption, attach rate, roadmap, reliability, and service obligations need management support.
    - Management, board, compensation, equity plans, employee relations, hiring, and attrition are not publicly
      verifiable.
    - Litigation, IP ownership, open-source compliance, insurance, material contracts, and regulatory correspondence
      require counsel-led review.
  recommended_next_steps:
    - Provide audited financial statements for the last three fiscal years, current-year monthly management accounts,
      cash runway, debt schedule, revenue bridge, gross margin, and board-approved forecast.
    - Provide current fully diluted cap table, financing documents, investor rights, liquidation preferences, option
      plan, board consents, and current valuation marks.
    - Provide top customer/user cohort analysis, revenue concentration, churn/NRR, reference-call list, customer
      contracts, and supplier/partner economics.
    - Provide SKU-level adoption, price book, product roadmap, engineering headcount, uptime/incident history, security
      reports, privacy assessments, and technical-debt review.
  preliminary_recommendation: Proceed to confirmatory diligence; do not rely on public sources alone for investment underwriting.
