    priority: P1
    request: Provide current fully diluted cap table, financing documents, investor rights, liquidation preferences, option
      plan, board consents, and current valuation marks.
    related_gap_ids:
      - GAP-002
    related_chapter_ids:
      - I
  - request_id: FUP-003
    owner: Revenue / customer success leadership
    priority: P1
    request: Provide top customer/user cohort analysis, revenue concentration, churn/NRR, reference-call list, customer
      contracts, and supplier/partner economics.
