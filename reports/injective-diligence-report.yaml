risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and stale valuation support
    risk_category: financial
    severity: high
    likelihood: high
    description: Historical unicorn/funding signals are public, but current revenue, margins, burn, runway, cap table, token
      treasury and valuation bridge are not.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-005
      - EC-023
    mitigation_or_diligence_request: Request financials, forecast, cap table, token ledger, financing docs and valuation bridge.
  - risk_id: R-002
    risk_title: Token, DeFi and derivatives regulatory exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: INJ token sale history, DeFi exchange/orderbook functionality, INJ futures, terms restrictions and global
      access require multi-jurisdiction counsel review.
    impacted_chapter_ids:
      - I
      - V
      - VIII
    impacted_section_ids:
      - I.C
      - V.A
      - VIII.G
    evidence_claim_ids:
      - EC-004
      - EC-012
      - EC-019
    mitigation_or_diligence_request: Request token/exchange/derivatives/sanctions counsel memos and compliance-control evidence.
  - risk_id: R-003
    risk_title: Adoption and liquidity volatility relative to valuation
    risk_category: market
    severity: high
    likelihood: medium
    description: DeFiLlama/CoinGecko proxies are point-in-time and volatile, and appear modest relative to historical $1B valuation.
    impacted_chapter_ids:
      - I
      - III
      - IV
      - V
    impacted_section_ids:
      - I.A
      - III.A
      - IV.A
      - V.C
    evidence_claim_ids:
      - EC-010
      - EC-011
    mitigation_or_diligence_request: Request historical metrics, liquidity depth, fee capture, active users and sensitivity to token/market cycles.
  - risk_id: R-004
    risk_title: Protocol security and technical dependency risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Exchange/orderbook, oracle, IBC/bridges, EVM/WASM, SDKs and open-source components create critical failure modes.
    impacted_chapter_ids:
      - II
      - III
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - VI.A
      - VI.B
      - VIII.D
    evidence_claim_ids:
      - EC-007
      - EC-008
      - EC-009
      - EC-013
      - EC-024
    mitigation_or_diligence_request: Request audits, incident history, dependency inventory, bug bounty records and maintainer map.
  - risk_id: R-005
    risk_title: Entity and economic-capture opacity
    risk_category: operational
    severity: medium
    likelihood: high
    description: Economics among Injective Labs, Foundation, protocol fees, token treasury, validators and ecosystem apps
      are not publicly mapped.
    impacted_chapter_ids:
      - I
      - II
      - III
      - VI
    impacted_section_ids:
      - I.A
      - II.A
      - III.A
      - VI.A
    evidence_claim_ids:
      - EC-021
      - EC-023
      - EC-025
    mitigation_or_diligence_request: Request entity chart, intercompany agreements, app ownership, revenue-recognition memo and protocol fee split.
  - risk_id: R-006
    risk_title: Customer and partner concentration unknown
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Public announcements identify relationships but not customer concentration, economics, market-maker
      dependence or termination rights.
    impacted_chapter_ids:
      - III
      - V
      - VIII
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
      - V.B
      - VIII.F
    evidence_claim_ids:
      - EC-012
      - EC-014
      - EC-015
      - EC-023
    mitigation_or_diligence_request: Request top customer/partner schedules, contracts, revenue contribution and churn/termination records.
  - risk_id: R-007
    risk_title: Management, staffing and key-person opacity
    risk_category: team
