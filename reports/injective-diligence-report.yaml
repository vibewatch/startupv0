report_metadata:
  report_title: Injective Public-Source Startup Diligence Report
  target_company: Injective / Injective Labs
  website: https://injective.com/
  known_aliases:
    - Injective
    - Injective Labs
    - Injective Protocol
    - Injective Foundation
    - INJ
  sector: Financial Services / DeFi Layer 1 blockchain and crypto finance infrastructure
  geography: United States / New York per CB Insights; global protocol ecosystem
  company_stage: Private unicorn-class crypto/protocol ecosystem
  research_date: 2026-05-19
  analyst: GitHub Copilot CLI diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source only; no private company materials or interviews.
    - Verified private/unicorn/activity status using CB Insights, The Block, LinkedIn, SEC ticker screen and active
      official sources.
    - Separated protocol/token metrics from entity-level company revenue.
    - Treated company-authored product and partnership claims as requiring independent confirmation.
    - Used DeFiLlama and CoinGecko as point-in-time public proxies only.
  included_jurisdictions:
    - United States
    - New York per CB Insights metadata
    - Global blockchain/protocol ecosystem
    - CFTC-regulated U.S. futures context through Bitnomial public disclosures
  excluded_topics:
    - Private financial statements, forecasts, cap table, token ledger, contracts, tax, HRIS, insurance and counsel memos
    - Paid corporate-registry, M&A, sanctions, litigation, patent/trademark and blockchain-forensics searches
    - Management, customer, partner, regulator, employee or counsel interviews
    - Investment, legal, tax, accounting or technical security advice
  user_provided_materials:
    - material_id: UPM-001
      title: User request for Injective diligence report
      type: prompt_instruction
      date_received: 2026-05-19
      notes: User requested exactly one standard-depth public-source YAML report at reports/injective-diligence-report.yaml
        with validation.
