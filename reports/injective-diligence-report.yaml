executive_summary:
  overall_assessment: "Injective is public-source supportable as an active, private, unicorn-class crypto finance
    infrastructure company/protocol ecosystem: CB Insights lists a $1B unicorn row, The Block reported a $1B+ token-sale
    valuation, LinkedIn lists Injective Labs as privately held, active official 2026 sources exist, and public
    repositories show current technical activity. Public evidence is insufficient for investment underwriting without
    private financial, capitalization, token, contract, legal and security materials."
  investment_or_diligence_thesis: Proceed only to confirmatory diligence if underwriting a differentiated finance-focused
    L1 with exchange/orderbook, EVM/CosmWasm, USDC/CCTP, regulated-futures adjacency and active developer tooling.
    Gating questions are whether current adoption/economics support historical unicorn valuation and whether
    regulatory/security/entity risks are controlled.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and The Block support $1B/$1B+ unicorn-class valuation evidence.
      evidence_claim_ids:
        - EC-001
        - EC-004
    - founder_claim_id: FC-003
      summary: At least $50M of major publicized funding is corroborated by 2021 and 2022 sources.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-005
    - founder_claim_id: FC-004
      summary: Official sources substantiate finance-L1 product breadth and orderbook/oracle/EVM/interoperability claims.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
        - EC-013
    - founder_claim_id: FC-007
      summary: GitHub metadata supports active public developer tooling and core repository activity.
      evidence_claim_ids:
        - EC-009
        - EC-024
    - founder_claim_id: FC-008
      summary: Terms and Bitnomial sources show active legal/regulatory posture around prohibited persons and regulated futures.
      evidence_claim_ids:
        - EC-012
        - EC-019
  biggest_risks:
    - risk_id: R-001
      summary: Financials, cap table and token ledger are not public, making valuation support unproven.
    - risk_id: R-002
      summary: Token, DeFi, derivatives, staking/ETF and restricted-jurisdiction issues require counsel review.
    - risk_id: R-003
      summary: Public adoption/liquidity proxies are volatile and modest relative to unicorn valuation.
    - risk_id: R-004
      summary: Oracle, bridge, EVM/WASM, core-chain and open-source dependencies create high-impact technical risk.
    - risk_id: R-008
      summary: Competition from dYdX, Hyperliquid, Sei, Solana and Ethereum/L2 ecosystems is intense.
  key_evidence_gaps:
    - Audited/unaudited financial statements, revenue, burn, runway and forecast
    - Cap table, token allocation ledger, treasury wallets, investor rights and unlocks
    - Entity chart and economics among Labs, Foundation, protocol, validators, apps and token treasury
    - Customer/app/partner revenue, concentration, retention and contracts
    - Security audits, incident history, dependency inventory and performance benchmarks
    - Regulatory memos, litigation schedule, material contracts, IP schedule and insurance policies
    - Full org chart, board, management biographies, compensation, incentives and turnover
  recommended_next_steps:
    - Request private financial/cap-table/token data room before valuation reliance.
    - Run counsel-led regulatory review covering INJ, exchange/orderbook, derivatives/futures, staking/ETF,
      sanctions/geofencing and RWA partnerships.
    - Commission technical/security diligence on oracle, bridges, EVM/WASM, core chain, repositories, audits and
      incidents.
    - Reconcile DeFiLlama/CoinGecko metrics to entity-level revenue, fees, treasury economics and customer/app cohorts.
    - Perform customer/partner/supplier calls and contract review for Bitnomial, Circle/USDC/CCTP, ecosystem apps,
      market makers and validators.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies unicorn and funding signals, but company financials, forecasts, cap table,
      token ledger, debt and tax/accounting records are not public.
    founder_claim_ids:
      - FC-001
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
      - EC-010
      - EC-011
      - EC-023
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-005
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited or management financial statements, revenue breakdown, backlog or A/R aging were public; protocol
          metrics are only proxies.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Protocol metrics cannot substitute for company revenue, burn, cash flow or working capital.
            evidence_claim_ids:
              - EC-010
              - EC-023
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Protocol metrics may be misread as company revenue.
        evidence_gaps:
          - Financial statements, budget-vs-actuals, revenue by product/channel/geography, backlog, A/R aging.
        follow_up_questions:
          - Provide FY2023-FY2026 YTD financial statements and management reports.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-010
          - EC-023
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No board-approved forecast or sensitivity model was public; growth drivers are inferred from product/partner
          announcements.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: Public product milestones support possible drivers but no revenue, opex, capex, runway or financing assumptions
              are public.
            evidence_claim_ids:
              - EC-012
              - EC-013
              - EC-014
              - EC-023
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Forecast risk is high given token-market and regulatory volatility.
        evidence_gaps:
          - Three-year model, scenario cases, runway, capex/working-capital assumptions.
        follow_up_questions:
          - Provide base/upside/downside forecast and key driver sensitivities.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-012
          - EC-013
          - EC-014
          - EC-023
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: LinkedIn/SEC screen supports private status and CoinGecko supports token-market visibility, but shares,
          holders, options, warrants, debt, token treasury and off-balance-sheet items are not public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Public private-status and token-market signals do not reveal fully diluted ownership.
            evidence_claim_ids:
              - EC-002
              - EC-011
              - EC-023
            risk_ids:
              - R-001
              - R-002
        hidden_risks:
          - Token/equity split and unlocks may materially change economics.
        evidence_gaps:
          - Fully diluted cap table, option/warrant/debt schedules, token ledger and treasury wallets.
        follow_up_questions:
          - Provide equity and token capitalization, investor rights, lockups and debt/off-balance-sheet obligations.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-002
          - EC-011
          - EC-023
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public financing history includes CB Insights $1B row, 2021 $10M token placement at $1B+ valuation, 2022 $40M
          raise and $59.8M aggregate estimate. Tax and accounting policies are not public.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: I.D-F1
            finding: At least $50M of major publicized funding and unicorn valuation signals are verified by public sources.
            evidence_claim_ids:
              - EC-001
              - EC-003
              - EC-004
              - EC-005
            risk_ids:
              - R-001
        hidden_risks:
          - Financing appears to mix token and possibly equity economics.
        evidence_gaps:
          - Tax positions, revenue recognition, financing documents and valuation support.
        follow_up_questions:
