diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, monthly management accounts, revenue/margin by product/customer/geography, AR aging, backlog and budget-vs-actuals.
    why_it_matters: Determines revenue quality, profitability, cash burn, forecast accuracy and valuation support.
    suggested_source_or_request: Company CFO, auditor/accountant workpapers, board packages.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, financing terms, liquidation preferences, debt, option pool, warrants and off-balance-sheet obligations.
    why_it_matters: Late-stage deal terms can materially alter economic upside and downside.
    suggested_source_or_request: Stock ledger, charter, investor rights, financing and debt documents.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue concentration, top customer contracts, renewal rates, churn, ACV, gross margin and SLA credits.
