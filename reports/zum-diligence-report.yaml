executive_summary:
  overall_assessment: Zum appears to remain an active private, pre-IPO growth-stage unicorn as of 2026-05-21, with strong public evidence of recent TPG financing, $1.7B valuation, a scaled school-district footprint, named customers, and a substantive CMX product narrative. The key diligence concern is not eligibility, but the depth of non-public financial, contract, safety, privacy, labor, and technical evidence still required before investment reliance.
  investment_or_diligence_thesis: "Proceed only as a data-room diligence candidate: public evidence supports a credible venture-scale student mobility platform, but investment underwriting should be gated on audited financials, customer contract economics, safety/insurance claims history, security/privacy controls, EV capex economics, and cohort-level KPI validation."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: "Zum has public late-stage financing evidence: $100M TPG investment, $430M total funding, and $1.7B valuation in April 2026."
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-002
      summary: Zum publicly claims active operations across more than 4,500 schools in 17 states with named large districts.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: CMX product positioning is consistently described across Zum and investor materials as an integrated routing/dispatch/workforce/safety/communication operating system.
      evidence_claim_ids:
        - EC-004
        - EC-006
    - founder_claim_id: FC-008
      summary: Leadership and board roster is publicly visible and includes experienced executives and major investor representation.
      evidence_claim_ids:
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements and unit economics are not publicly available.
    - risk_id: R-003
      summary: Customer concentration, contract durability, renewal rates, and profitability by district are not public.
    - risk_id: R-005
      summary: Transporting minors creates high-severity safety, insurance, and regulatory exposure.
    - risk_id: R-009
      summary: Student data, app privacy, DPAs, and cybersecurity evidence are incomplete publicly.
    - risk_id: R-008
      summary: EV/V2G infrastructure may add capital intensity and execution complexity.
  key_evidence_gaps:
    - Audited financials, management reporting, unit economics, revenue by customer/product/geography, backlog and AR aging.
    - Cap table, security terms, debt, option pool, investor rights and off-balance-sheet obligations.
    - Customer contracts, revenue concentration, renewal/churn data, SLA credits and direct customer references.
    - Safety incident history, driver files, vehicle inspections, insurance loss runs and regulatory correspondence.
    - App privacy statements, DPAs, FERPA/COPPA/state student-data compliance, SOC/pen-test evidence and breach history.
    - EV asset ownership, grants, utility/V2G agreements, capex and emissions methodology.
  recommended_next_steps:
    - Open a data-room request focused on financials, cap table, contracts, safety/insurance, privacy/security, HR/labor, and EV asset economics.
    - Run customer references with at least three large districts and one recent launch customer, plus any lost/non-renewed customers.
    - Conduct product/technical diligence including CMX architecture, AI routing methodology, data quality, uptime, security and app privacy controls.
    - Have counsel run litigation, regulatory, student-data, insurance, IP, employment, and material-contract diligence.
    - Rebuild the financial model from contract-level revenue, route-level cost, fleet/driver economics, capex and working-capital requirements.
