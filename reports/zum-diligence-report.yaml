report_metadata:
  report_title: Zūm Startup Diligence Research Report
  target_company: Zūm Services, Inc.
  website: https://www.ridezum.com/
  known_aliases:
    - Zum
    - Zūm
    - RideZum
    - Zum Services, Inc.
  sector: Student transportation, mobility technology, and electric school bus operations
  geography: United States; headquartered in Redwood City, California
  company_stage: Private unicorn / growth-stage, pre-IPO
  research_date: 2026-05-21
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source review of official Zum pages, investor release, customer/case-study pages, privacy and terms disclosures.
    - Use user-provided CB Insights unicorn snapshot only as a market-database screening source.
    - Flag any financial, legal, technical or customer item not public as a diligence gap rather than inferring it.
  included_jurisdictions:
    - United States
    - California
    - public school-district customer markets referenced in public sources
  excluded_topics:
    - Non-public data room materials
    - Paid market databases beyond user-provided CB Insights snapshot
    - Paid court docket searches
    - Management interviews
    - Customer reference calls
    - Technical penetration testing
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights unicorn snapshot row for Zum
      type: market_database_snapshot
      date_received: 2026-05-21
      notes: Used for unicorn-screening status; valuation and join-date should be refreshed from CB Insights before final reliance.
