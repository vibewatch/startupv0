report_metadata:
  report_title: Red Ventures Startup Diligence Report
  target_company: Red Ventures
  website: https://www.redventures.com/
  known_aliases:
    - RV
  sector: Digital media, consumer marketplaces, financial services lead generation and portfolio operations
  geography: Fort Mill, South Carolina / United States; global portfolio operations
  company_stage: Private unicorn / mature portfolio operating company
  research_date: 2026-05-19
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and selected only uncovered slugs.
    - Used CB Insights Global Unicorn Club as the primary market database for current private-unicorn status and latest known valuation.
    - Reviewed public company-owned pages and independent third-party reporting available for Red Ventures.
    - Marked audited financials, contracts, cap table, customer concentration, security reports, HRIS, legal docket detail and board materials as not_publicly_verifiable where not public.
  included_jurisdictions:
    - United States
    - United Kingdom
    - Singapore
    - Global markets referenced by public materials
  excluded_topics:
    - No private data room, founder interview, customer calls, confidential security reports or paid databases were available.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for three random uncovered unicorn diligence reports
      type: workflow_request
      date_received: 2026-05-19
      notes: No founder deck or private materials were provided.
