report_metadata:
  report_title: "Mambu Startup Diligence Report"
  target_company: "Mambu"
  website: "https://mambu.com/"
  known_aliases:
    - "Mambu B.V."
    - "Mambu Cloud Banking Platform"
    - "Mambu Payments"
  sector: "Financial services infrastructure; SaaS cloud banking, core banking, lending, deposits, payments, and banking platform software"
  geography: "Netherlands / Amsterdam with global customers across 65+ countries"
  company_stage: "Private unicorn; public sources reviewed did not show IPO, acquisition, or shutdown"
  research_date: "2026-06-14"
  analyst: "GitHub Copilot"
  report_version: "1.0"
  currency: "USD and EUR as publicly reported; Thai Baht where cited"
  time_zone: "Europe/Amsterdam"

research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Started from the user-provided CB Insights unicorn row and independently checked active official pages, 2026 company press, security/legal pages, customer stories, competitors, and regulatory sources."
    - "Used reputable public sources only: Mambu-owned pages, customer/partner pages, independent news/source titles where accessible, CB Insights, EU/EBA legal sources, and public IP/legal search endpoints."
    - "Did not bypass authentication, paywalls, CAPTCHA, or private systems; private-record checklist items are marked not_publicly_verifiable."
  included_jurisdictions:
    - "Netherlands"
    - "European Union"
    - "Germany"
    - "United Kingdom"
    - "United States public-market/legal searches"
    - "Global public customer and partner evidence"
  excluded_topics:
    - "Private data-room financial statements, bank statements, revenue by customer, pipeline, contracts, pricing, cap table, debt, tax schedules, and board minutes."
    - "Non-public customer references, SOC/ISO reports, penetration-test reports, cloud architecture, regulator correspondence, counsel letters, employee records, and insurance policies."
    - "Paid registry, legal, market-share, and analyst databases."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "User-provided Mambu selection and CB Insights unicorn context"
      type: "workflow_request"
      date_received: "2026-06-14"
      notes: "User stated Mambu was randomly selected after excluding existing reports and that CB Insights lists Mambu as a private unicorn with $5.5B valuation, joined 1/6/2021, Netherlands/Amsterdam, Financial Services."

founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Mambu is a private unicorn with a $5.5B valuation, joined the CB Insights unicorn list on 1/6/2021, and is based in Amsterdam, Netherlands in Financial Services."
    claim_source: "User-provided CB Insights context and live CB Insights page excerpt"
    claim_date: "2021-01-06"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.C", "I.D"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-001", "EC-003"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request current capitalization, current fair value, financing documents, preferences, and confirmation of no completed IPO/M&A transaction."
  - founder_claim_id: "FC-002"
    claim_text: "Mambu remains operating and eligible for private-company diligence rather than being IPO'd, acquired, or shut down."
    claim_source: "Eligibility check from active official pages, 2026 press, CB Insights, and limited public-market search"
    claim_date: "2026-06-14"
    mapped_chapter_ids: ["I", "VIII"]
    mapped_section_ids: ["I.C", "VIII.G"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-002"]
    contradiction_summary: "No contrary public evidence was found, but negative public search is not legal proof of private status."
    diligence_follow_up:
      - "Obtain Dutch KvK extract, corporate structure chart, board confirmation, and any M&A/IPO transaction history."
  - founder_claim_id: "FC-003"
    claim_text: "Mambu offers composable SaaS cloud banking products across core banking, lending, deposits, payments, Islamic banking, APIs, and configuration tooling."
    claim_source: "Mambu official product and documentation pages"
    claim_date: "2026-06-14"
    mapped_chapter_ids: ["II", "VI"]
    mapped_section_ids: ["II.A", "VI.A", "VI.B"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-006", "EC-007", "EC-008", "EC-016", "EC-023"]
    contradiction_summary: null
    diligence_follow_up:
      - "Validate product module adoption, roadmap commitments, defects, security controls, API uptime, and SKU-level P&L."
  - founder_claim_id: "FC-004"
    claim_text: "Mambu serves more than 260 customers in more than 65 countries and has public regulated-bank/fintech customer examples."
    claim_source: "Mambu 2026 payments press release and customer stories"
    claim_date: "2026-02-25"
    mapped_chapter_ids: ["III", "V"]
    mapped_section_ids: ["III.A", "III.C", "V.B"]
    verification_status: "partially_verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-010", "EC-011", "EC-012", "EC-022"]
    contradiction_summary: "Customer count and logos are company-provided and do not disclose production status, ARR, or concentration."
    diligence_follow_up:
      - "Request top-customer ARR, live-vs-pilot status, churn, renewal schedule, and permissioned reference calls."
  - founder_claim_id: "FC-005"
    claim_text: "Mambu maintains security/compliance programs including ISO 27001, SOC I/SOC II, penetration testing, AWS processing, and privacy/GDPR materials."
    claim_source: "Mambu security and privacy pages"
    claim_date: "2026-06-14"
    mapped_chapter_ids: ["VIII", "II"]
    mapped_section_ids: ["VIII.G", "VIII.F", "II.A"]
    verification_status: "verified"
    confidence: "medium"
    evidence_claim_ids: ["EC-014", "EC-015", "EC-020"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request current SOC reports, ISO certificates, pen-test summary, BCP/DR results, DPA, subprocessor list, and incident history."
  - founder_claim_id: "FC-006"
    claim_text: "Mambu has a public leadership team led by CEO Fernando Zandona with CFO, CRO, customer success, people, board/advisor, and co-founder/former CEO roles listed."
    claim_source: "Mambu leadership page"
    claim_date: "2026-06-14"
    mapped_chapter_ids: ["VII"]
    mapped_section_ids: ["VII.A", "VII.C"]
    verification_status: "verified"
    confidence: "high"
    evidence_claim_ids: ["EC-017"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request full org chart, executive agreements, board rights, compensation, option plan, and succession plan."

executive_summary:
  overall_assessment: "Mambu passes the public-source eligibility check as an apparently active private unicorn in financial-services infrastructure, with strong public evidence for product breadth, global customer claims, regulated-bank case studies, leadership, documentation, security posture, and a $5.5B public unicorn valuation. Investment diligence remains data-room dependent because financial quality, cap table, pricing, customer concentration, churn, contracts, and legal schedules are not public."
  investment_or_diligence_thesis: "The central diligence question is whether Mambu can convert composable core-banking and payments platform breadth into durable, high-margin recurring revenue while managing regulated customer implementations, cloud/security obligations, DORA/GDPR outsourcing demands, and strong competition from incumbents and cloud-native challengers."
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "CB Insights and funding news support Mambu's public $5.5B unicorn valuation anchor."
      evidence_claim_ids: ["EC-001", "EC-003"]
    - founder_claim_id: "FC-003"
      summary: "Official product/docs pages support the existence of core banking, lending, deposits, payments, Islamic banking, APIs/webhooks, and Configuration as Code."
      evidence_claim_ids: ["EC-006", "EC-007", "EC-008", "EC-016", "EC-023"]
    - founder_claim_id: "FC-005"
      summary: "Official security/privacy pages substantiate public ISO/SOC, penetration testing, AWS processing, and processor/controller privacy posture claims."
      evidence_claim_ids: ["EC-014", "EC-015"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Financial statements, ARR, margins, cash, burn, runway, backlog, and AR aging are not public."
    - risk_id: "R-003"
      summary: "Customer concentration, churn, live-vs-pilot status, implementation economics, and top-account dependence are not public."
    - risk_id: "R-006"
      summary: "Regulated-customer SaaS creates DORA, EBA outsourcing, GDPR, security, audit/access, exit, and subprocessor obligations."
  key_evidence_gaps:
    - "Audited/reviewed financials, ARR bridge, revenue by product/geography/channel/customer, gross margin, cash, burn, runway, backlog, AR aging, and tax schedules."
    - "Current capitalization, option pool, securities, liquidation preferences, debt, investor rights, board rights, and secondary transactions."
    - "Top-customer ARR, concentration, churn/NRR/GRR, production status, renewal dates, implementation backlog, SLA credits, and reference calls."
    - "MSAs, DPAs, SLAs, cloud/partner contracts, data residency, subprocessor chain, cyber/E&O/D&O insurance, litigation schedule, and IP ownership records."
  recommended_next_steps:
    - "Run data-room diligence on financial quality, cap table, unit economics, pricing, customer concentration, and runway before relying on the $5.5B valuation."
    - "Interview live regulated customers, recent implementations, churned/lost prospects, implementation partners, and cloud/security owners."
    - "Request SOC/ISO reports, DORA/EBA outsourcing package, DPA/subprocessor list, BCP/DR tests, incident history, and cloud architecture."
    - "Benchmark Mambu against Thought Machine, Temenos, 10x Banking, Backbase, and other core/engagement banking vendors with win/loss and pricing data."

chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: "Public sources verify Mambu's unicorn valuation and financing anchors but do not verify audited financials, ARR, margin, cash, burn, runway, cap table, debt, backlog, AR aging, or tax positions."
    founder_claim_ids: ["FC-001", "FC-002"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-003", "EC-004", "EC-005"]
    risk_ids: ["R-001", "R-002", "R-008"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3", "I.A.4", "I.A.5", "I.A.6"]
        summary: "No audited statements or management accounts were public. Public materials disclose customer counts, named logos, and payments-processing growth but not revenue, gross margin, cash, burn, backlog, or AR aging."
        verification_status: "not_publicly_verifiable"
        confidence: "high"
        key_findings:
          - finding_id: "I.A-F1"
            finding: "Public traction metrics are not substitutes for GAAP/IFRS financial statements or SaaS revenue quality."
            evidence_claim_ids: ["EC-005", "EC-010"]
            risk_ids: ["R-001", "R-008"]
        hidden_risks:
          - "Reported customer and payments growth could mask revenue concentration, implementation services losses, discounts, or lower-margin payments volume."
        evidence_gaps:
          - "Audited financials, management accounts, revenue by product/channel/geography, backlog, AR aging, deferred revenue, cash, burn, and runway."
        follow_up_questions:
          - "Provide 2023-2026 monthly P&L, balance sheet, cash flow, ARR bridge, bookings, backlog, AR aging, and revenue-recognition memo."
        table_ids: ["T-003"]
        figure_ids: ["F-002"]
        evidence_claim_ids: ["EC-005", "EC-010"]
      - section_id: "I.B"
        title: "Financial Projections"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3", "I.B.4", "I.B.5", "I.B.6", "I.B.7", "I.B.8"]
        summary: "No public three-year financial model or forecast assumptions were found. Growth drivers are inferable from cloud-core modernization, payments expansion, global partners, and customer case studies, but predictability is private."
        verification_status: "not_publicly_verifiable"
        confidence: "medium"
        key_findings:
          - finding_id: "I.B-F1"
            finding: "Public product/customer evidence supports plausible growth drivers but not forecast reliability, margin, capex, working capital, or external financing assumptions."
            evidence_claim_ids: ["EC-005", "EC-010", "EC-009", "EC-023"]
            risk_ids: ["R-001", "R-002", "R-008"]
        hidden_risks:
          - "Enterprise banking implementations may have long sales cycles, professional-services costs, and go-live delays that public growth claims do not reveal."
        evidence_gaps:
          - "Three-year model, pipeline conversion, NRR/GRR, implementation backlog, capex/cloud spend, financing plan, and scenario sensitivities."
        follow_up_questions:
          - "Provide board-approved plan, bridge from pipeline to ARR, and downside scenarios for pricing pressure, delayed go-lives, churn, and payments expansion."
        table_ids: ["T-004"]
        figure_ids: ["F-002"]
        evidence_claim_ids: ["EC-005", "EC-009", "EC-010", "EC-023"]
      - section_id: "I.C"
        title: "Capital Structure"
        checklist_question_ids: ["I.C.1", "I.C.2", "I.C.3", "I.C.4", "I.C.5"]
        summary: "Public sources identify investors and valuation anchors, but shares outstanding, option pool, preferences, debt, warrants, notes, and off-balance-sheet liabilities are not public."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.C-F1"
            finding: "CB Insights and funding reports show investor/valuation signals, but no public cap table or security terms."
            evidence_claim_ids: ["EC-001", "EC-002", "EC-003"]
            risk_ids: ["R-002"]
        hidden_risks:
          - "Private unicorn financing can include preference stacks and protective provisions that materially change common-equity economics."
        evidence_gaps:
          - "Current cap table, stock ledger, options/warrants, SAFE/notes, debt, investor-rights agreements, liquidation preferences, and board consents."
        follow_up_questions:
          - "Provide fully diluted capitalization and all financing, debt, secondary, and investor-rights documents."
        table_ids: ["T-002"]
        figure_ids: []
        evidence_claim_ids: ["EC-001", "EC-002", "EC-003", "EC-005"]
      - section_id: "I.D"
        title: "Other financial information"
        checklist_question_ids: ["I.D.1", "I.D.2", "I.D.3"]
        summary: "Financing history is partially public; tax positions, accounting policies, warrants/debt terms, and current basis for each investor are private."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "I.D-F1"
            finding: "Public funding reports support a 2019 round, January 2021 Series D, and late-2021 Series E / unicorn valuation trajectory."
            evidence_claim_ids: ["EC-001", "EC-003", "EC-004"]
            risk_ids: ["R-002"]
        hidden_risks:
          - "A sharp valuation step-up in 2021 may be exposed to private-market reset risk if growth or margin underperforms."
        evidence_gaps:
          - "Tax positions, accounting policies, debt/warrants, investor basis, current fair value, and financing documents."
        follow_up_questions:
          - "Provide tax memos, accounting policy memos, financing schedule, and valuation materials used for fair value or investor reporting."
        table_ids: ["T-001"]
        figure_ids: ["F-001", "F-002"]
        evidence_claim_ids: ["EC-001", "EC-003", "EC-004"]
  - chapter_id: "II"
    title: "Products"
    chapter_summary: "Mambu publicly markets a composable SaaS cloud banking platform spanning core banking, lending, deposits, payments, Islamic banking, APIs, Configuration as Code, and partner ecosystem capabilities."
    founder_claim_ids: ["FC-003", "FC-005"]
    evidence_claim_ids: ["EC-006", "EC-007", "EC-008", "EC-009", "EC-014", "EC-016", "EC-023"]
    risk_ids: ["R-004", "R-006", "R-007", "R-008"]
    sections:
      - section_id: "II.A"
        title: "Description of each product"
        checklist_question_ids: ["II.A.1", "II.A.2", "II.A.3", "II.A.4", "II.A.5", "II.A.6"]
        summary: "Product evidence is strong for public SKU existence and platform positioning. Major customers and applications are partially public, while SKU revenue, profitability, adoption, defect rates, market share, and cost structure are not public."
        verification_status: "partially_verified"
        confidence: "high"
        key_findings:
          - finding_id: "II.A-F1"
            finding: "Mambu's public product surface includes cloud core banking, lending, deposits, payments, Islamic banking, APIs/webhooks, partner integrations, and Configuration as Code."
            evidence_claim_ids: ["EC-006", "EC-007", "EC-008", "EC-016", "EC-023"]
            risk_ids: ["R-004", "R-007"]
          - finding_id: "II.A-F2"
            finding: "Public contact-sales evidence and absent price card mean product packaging, usage units, and gross margin are not verifiable."
            evidence_claim_ids: ["EC-009"]
            risk_ids: ["R-008"]
        hidden_risks:
          - "Expanding from core into payments and AI-ready messaging can increase product complexity and operational-regulatory scope."
          - "Composable partner architectures can create support-boundary ambiguity when third-party integrations fail."
        evidence_gaps:
          - "SKU-level ARR/margin, attach rates, implementation times, support tickets, uptime, roadmap commitments, customer-specific regulatory certifications, and pricing history."
        follow_up_questions:
          - "Provide product P&L by module, API uptime/SLA history, defect backlog, roadmap, deprecation policy, sandbox access, and implementation reference calls."
        table_ids: ["T-005", "T-006"]
        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-006", "EC-007", "EC-008", "EC-009", "EC-014", "EC-016", "EC-023"]
  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: "Mambu discloses more than 260 customers in 65+ countries and several named regulated/customer stories, but revenue concentration, churn, top-customer lists, severed relationships, and supplier spend are private."
    founder_claim_ids: ["FC-004"]
    evidence_claim_ids: ["EC-010", "EC-011", "EC-012", "EC-013", "EC-022"]
    risk_ids: ["R-001", "R-003", "R-007"]
    sections:
      - section_id: "III.A"
        title: "Top customers by application"
        checklist_question_ids: ["III.A"]
        summary: "Public customer evidence includes named logos and case studies such as Good Money, Allica Bank, Akbank AG, Western Union, Commonwealth Bank of Australia, N26, BancoEstado, Raiffeisen Bank, ABN AMRO, and Bank Islam, but not top-15 revenue rankings."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.A-F1"
            finding: "Company materials claim more than 260 customers in more than 65 countries and identify multiple named financial institutions."
            evidence_claim_ids: ["EC-010", "EC-011", "EC-012"]
            risk_ids: ["R-003"]
        hidden_risks:
          - "Customer logos may include pilots, legacy customers, or small deployments; public sources do not reveal ARR concentration or production depth."
        evidence_gaps:
          - "Top-15 customers by ARR/GMV/payment volume, implementation stage, renewal dates, NPS, support burden, and contract terms."
        follow_up_questions:
          - "Provide customer ARR schedule, production-vs-pilot status, renewal/churn history, and permissioned reference calls."
        table_ids: ["T-007"]
        figure_ids: ["F-004"]
        evidence_claim_ids: ["EC-010", "EC-011", "EC-012", "EC-022"]
      - section_id: "III.B"
        title: "Strategic relationships"
        checklist_question_ids: ["III.B"]
        summary: "Mambu publicly describes a global partner ecosystem with system integrators, consultants, technology partners, cloud providers, and named Akbank/Innovance and Good Money/GCP examples."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.B-F1"
            finding: "Partners appear central to implementation and ecosystem strategy, but revenue contribution and marketing agreements are not public."
            evidence_claim_ids: ["EC-013", "EC-011", "EC-012"]
            risk_ids: ["R-003", "R-007"]
        hidden_risks:
          - "Partner-led implementations can create delivery quality, accountability, and margin risks."
        evidence_gaps:
          - "Partner tiers, certifications, marketing agreements, referral economics, support obligations, and partner-related customer satisfaction."
        follow_up_questions:
          - "Provide partner contracts, certification criteria, deal registration data, and partner-sourced ARR by region."
        table_ids: ["T-008"]
        figure_ids: ["F-006"]
        evidence_claim_ids: ["EC-011", "EC-012", "EC-013"]
      - section_id: "III.C"
        title: "Revenue by customer"
        checklist_question_ids: ["III.C"]
        summary: "Revenue by customer and any customer accounting for 5% or more of revenue are not publicly verifiable."
        verification_status: "not_publicly_verifiable"
        confidence: "high"
        key_findings:
          - finding_id: "III.C-F1"
            finding: "The public record supports named customers and scale, not revenue concentration."
            evidence_claim_ids: ["EC-010", "EC-022"]
            risk_ids: ["R-001", "R-003"]
        hidden_risks:
          - "A small number of regulated-bank customers or payments accounts could dominate ARR or margin."
        evidence_gaps:
          - "Revenue by customer, customer concentration, contract duration, renewal dates, payment volume by customer, and margin by customer."
        follow_up_questions:
          - "Provide top-20 customer ARR and gross margin, renewal schedules, concentration thresholds, and customer health scores."
        table_ids: []
        figure_ids: ["F-004"]
        evidence_claim_ids: ["EC-010", "EC-022"]
      - section_id: "III.D"
        title: "Significant relationships severed within the last two years"
        checklist_question_ids: ["III.D"]
        summary: "No public list of severed customers, partners, or suppliers was found."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "III.D-F1"
            finding: "Customer churn and severed relationship history require company disclosure."
            evidence_claim_ids: ["EC-022"]
            risk_ids: ["R-003"]
        hidden_risks:
          - "Churned regulated-bank implementations may indicate product gaps or support shortcomings hidden by public logo pages."
        evidence_gaps:
          - "Churned customers, failed proofs of concept, terminated partners, customer disputes, and SLA-credit history."
        follow_up_questions:
          - "Provide churned/lost customer schedule, reason codes, exit interviews, and any material disputes or SLA credits."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-022"]
      - section_id: "III.E"
        title: "Top suppliers"
        checklist_question_ids: ["III.E"]
        summary: "Public evidence identifies AWS for customer-data processing, GCP in a customer implementation, and cloud providers as ecosystem participants, but supplier spend and concentration are private."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "III.E-F1"
            finding: "Cloud and implementation partners are strategically material, but supplier concentration and contractual protections are not public."
            evidence_claim_ids: ["EC-013", "EC-014"]
            risk_ids: ["R-007"]
        hidden_risks:
          - "Cloud concentration, subprocessor chain changes, region availability, and support-boundary failures can affect regulated customers."
        evidence_gaps:
          - "Supplier spend, cloud commitments, cloud regions, failover design, subcontractor list, support SLAs, and exit/portability plans."
        follow_up_questions:
          - "Provide top suppliers for FY2024-FY2026 YTD, cloud contracts, subprocessor notices, BCP/DR tests, and exit plans."
        table_ids: ["T-009"]
        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-013", "EC-014"]
  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: "Mambu competes in a crowded cloud core banking and bank transformation market against cloud-native challengers and incumbents, with competition based on implementation speed, configurability, API depth, regulatory credibility, partner ecosystem, and price."
    founder_claim_ids: []
    evidence_claim_ids: ["EC-019"]
    risk_ids: ["R-005"]
    sections:
      - section_id: "IV.A"
        title: "Competitive landscape by market segment"
        checklist_question_ids: ["IV.A.1", "IV.A.2"]
        summary: "Public competitor pages confirm direct or adjacent overlap with Thought Machine, Temenos, 10x Banking, and Backbase. Mambu's position cannot be ranked from public sources without win/loss data and analyst reports."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "IV.A-F1"
            finding: "Competitors advertise similar themes: cloud-native core, modern core, product engines, engagement/orchestration, and bank transformation."
            evidence_claim_ids: ["EC-019"]
            risk_ids: ["R-005"]
        hidden_risks:
          - "Incumbents may bundle aggressively; challengers may win with developer-centric architectures; banks can delay core replacement due to migration risk."
        evidence_gaps:
          - "Win/loss data, pricing benchmarks, market share, analyst quadrant reports, proof-of-concept conversion, and churn reasons."
        follow_up_questions:
          - "Provide competitive pipeline, lost deals, replacement reasons, technical bake-off results, and analyst/customer reference materials."
        table_ids: ["T-010", "T-011"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-019"]
  - chapter_id: "V"
    title: "Marketing, Sales, and Distribution"
    chapter_summary: "Mambu's public GTM appears enterprise, demo-led, partner-supported, and content/customer-story driven. Budgets, sales productivity, quota, pipeline, CAC, payback, and channel revenue are not public."
    founder_claim_ids: []
    evidence_claim_ids: ["EC-009", "EC-010", "EC-013", "EC-023"]
    risk_ids: ["R-003", "R-005", "R-008"]
    sections:
      - section_id: "V.A"
        title: "Strategy and implementation"
        checklist_question_ids: ["V.A.1", "V.A.2", "V.A.3", "V.A.4"]
        summary: "Public materials show positioning around composable cloud banking, customer stories, product updates, and a partner ecosystem. There is no public sales budget or conversion data."
        verification_status: "partially_verified"
        confidence: "medium"
        key_findings:
          - finding_id: "V.A-F1"
