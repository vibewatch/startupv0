risk_register:
  - risk_id: "R-001"
    risk_title: "Financial quality and runway are not public"
    risk_category: "financial"
    severity: "high"
    likelihood: "unknown"
    description: "No audited statements, net revenue, ARR, gross margin, cash, burn, runway, AR aging, backlog, or tax schedules were publicly verifiable."
    impacted_chapter_ids: ["I", "III"]
    impacted_section_ids: ["I.A", "I.B", "III.C"]
    evidence_claim_ids: ["EC-005", "EC-022"]
    mitigation_or_diligence_request: "Request audited/reviewed financials, monthly management accounts, revenue-recognition memo, cohort gross retention/net retention, cash, debt, and 36-month runway plan."
  - risk_id: "R-002"
    risk_title: "Valuation and preference-stack risk"
    risk_category: "financing"
    severity: "high"
    likelihood: "medium"
    description: "Public $5.5B valuation is stale from private funding; current common-equity value depends on preferences, dilution, secondary pricing, and market conditions."
    impacted_chapter_ids: ["I"]
    impacted_section_ids: ["I.C", "I.D"]
    evidence_claim_ids: ["EC-001", "EC-003", "EC-004"]
    mitigation_or_diligence_request: "Request full cap table, financing documents, liquidation preferences, option pool, debt/SAFE/warrant schedules, and recent secondary transactions."
  - risk_id: "R-003"
    risk_title: "Customer concentration and implementation dependency risk"
    risk_category: "customer"
    severity: "high"
    likelihood: "medium"
    description: "Named customer stories are positive, but top-customer revenue concentration, churn, implementation failures, and customer support economics are not public."
    impacted_chapter_ids: ["III", "V"]
    impacted_section_ids: ["III.A", "III.C", "V.B"]
    evidence_claim_ids: ["EC-010", "EC-011", "EC-012", "EC-022"]
    mitigation_or_diligence_request: "Request top-20 ARR, NRR/GRR, churn/cohort tables, implementation backlog, SLA credits, and reference calls."
  - risk_id: "R-004"
    risk_title: "Product roadmap and payments expansion execution risk"
    risk_category: "product"
    severity: "medium"
    likelihood: "medium"
    description: "Mambu is expanding beyond core into payments and AI-ready messaging; new modules can increase complexity, support burden, and compliance scope."
    impacted_chapter_ids: ["II", "VI"]
    impacted_section_ids: ["II.A", "VI.B"]
    evidence_claim_ids: ["EC-006", "EC-010", "EC-016", "EC-023"]
    mitigation_or_diligence_request: "Review roadmap commitments, release notes, defect backlog, product-margin by module, payments scheme certifications, and adoption by module."
  - risk_id: "R-005"
    risk_title: "Intense competition in cloud core banking and bank transformation"
    risk_category: "market"
    severity: "high"
    likelihood: "high"
    description: "Mambu competes with incumbents and cloud-native challengers that also market modern core banking, engagement, and orchestration capabilities."
    impacted_chapter_ids: ["IV", "V"]
    impacted_section_ids: ["IV.A", "V.A"]
    evidence_claim_ids: ["EC-019"]
    mitigation_or_diligence_request: "Request win/loss analysis, pricing benchmarks, proof-of-concept conversion rates, replacement cycles, and analyst reports."
  - risk_id: "R-006"
    risk_title: "Regulatory outsourcing, DORA, GDPR, and operational-resilience burden"
    risk_category: "regulatory"
    severity: "high"
    likelihood: "medium"
    description: "As a critical SaaS vendor to financial institutions, Mambu must satisfy customer audit/access, incident, exit, subcontracting, data-protection, and resilience expectations."
    impacted_chapter_ids: ["VIII", "II", "III"]
    impacted_section_ids: ["VIII.G", "VIII.F", "II.A"]
    evidence_claim_ids: ["EC-014", "EC-015", "EC-020"]
    mitigation_or_diligence_request: "Request DORA readiness package, EBA outsourcing questionnaire, DPA/SCCs, subprocessor notices, audit reports, BCP/DR tests, and incident history."
  - risk_id: "R-007"
    risk_title: "Cloud, security, and third-party concentration risk"
    risk_category: "technical"
    severity: "high"
    likelihood: "medium"
    description: "Public evidence shows AWS data-centre processing and partner/cloud ecosystem dependencies; detailed region, failover, support, and concentration data are private."
    impacted_chapter_ids: ["II", "III", "VIII"]
    impacted_section_ids: ["II.A", "III.E", "VIII.G"]
    evidence_claim_ids: ["EC-013", "EC-014"]
    mitigation_or_diligence_request: "Review cloud architecture, availability history, cloud provider commitments, penetration tests, SOC/ISO scopes, subprocessor list, and disaster-recovery tests."
  - risk_id: "R-008"
    risk_title: "Pricing, margin, and commercial-contract opacity"
    risk_category: "financial"
    severity: "medium"
    likelihood: "high"
    description: "Public contact-sales motion gives no visibility into pricing units, minimum commitments, services margins, discounts, SLA credits, or liability caps."
    impacted_chapter_ids: ["I", "V", "VIII"]
    impacted_section_ids: ["I.A", "V.A", "VIII.F"]
    evidence_claim_ids: ["EC-005", "EC-009"]
    mitigation_or_diligence_request: "Request standard and top-customer MSAs/order forms, pricing history, discounting, services mix, implementation margin, renewal uplift, and SLA-credit history."
  - risk_id: "R-009"
    risk_title: "Management transition, compensation, and retention opacity"
    risk_category: "team"
    severity: "medium"
    likelihood: "medium"
    description: "Public leadership roster is available, but founder involvement, vesting, employment agreements, compensation, option plan, turnover, and succession are not public."
    impacted_chapter_ids: ["VII"]
    impacted_section_ids: ["VII.A", "VII.C", "VII.D", "VII.E", "VII.G"]
    evidence_claim_ids: ["EC-017", "EC-018", "EC-024"]
    mitigation_or_diligence_request: "Request org chart, executive agreements, founder vesting, compensation plans, option plan, attrition data, engagement surveys, and succession plan."
  - risk_id: "R-010"
    risk_title: "Legal, IP, litigation, and insurance incompleteness"
    risk_category: "legal"
    severity: "medium"
    likelihood: "unknown"
    description: "Public searches did not establish a complete litigation, IP, regulatory, contract, or insurance schedule."
    impacted_chapter_ids: ["VIII"]
    impacted_section_ids: ["VIII.A", "VIII.B", "VIII.D", "VIII.E", "VIII.F"]
    evidence_claim_ids: ["EC-021"]
    mitigation_or_diligence_request: "Counsel should run registry/litigation/IP searches and request legal schedule, IP assignments, open-source scans, insurance policies, claims history, and material contracts."

