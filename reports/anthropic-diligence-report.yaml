evidence_claims:
  - evidence_claim_id: EC-001
    claim: Anthropic publicly identifies itself as an AI safety and research company building reliable, interpretable, and steerable systems.
    evidence_summary: The company page describes Anthropic's mission, purpose, and operating model as a safety-oriented frontier AI lab with research, product, policy, and operations functions.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-001
    quoted_evidence:
      - source_id: SRC-001
        quote: Anthropic is an AI safety and research company. We build reliable, interpretable, and steerable AI systems.
        location: Company page
      - source_id: SRC-001
        quote: Anthropic is dedicated to building systems that people can rely on and generating research about the opportunities and risks of AI.
        location: Our Purpose
    analyst_interpretation: This is strong evidence about target identity and stated strategy, though it does not by itself establish commercial or technical superiority.
    limitations: Mission statements are company-authored and should be tested against private operating data and incident history.
    associations:
