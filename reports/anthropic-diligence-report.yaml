  - evidence_claim_id: EC-002
    claim: Anthropic is a Public Benefit Corporation with a Long-Term Benefit Trust whose Class T stock can elect a majority of the board within four years of the Series C round.
    evidence_summary: The LTBT announcement and company governance page disclose the PBC structure, current board and trustee names, and phased board-election rights for the Trust.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-002
      - SRC-001
    quoted_evidence:
      - source_id: SRC-002
        quote: The Class T stock grants the Trust the authority to elect and remove a number of Anthropic's board members that will phase in according to time- and funding-based milestones; in any event, the Trust will elect a majority of the board within 4 years.
        location: LTBT announcement
      - source_id: SRC-001
        quote: Anthropic is a Public Benefit Corporation, whose purpose is the responsible development and maintenance of advanced AI for the long-term benefit of humanity.
        location: Governance
    analyst_interpretation: This is unusually strong public evidence for a private-company governance mechanism and materially affects control-rights analysis.
    limitations: Public materials do not disclose all charter provisions, board committee rights, or investor-side protections.
