report_metadata:
  report_title: Anthropic Public-Source Startup Diligence Report
  target_company: Anthropic
  website: https://www.anthropic.com/
  known_aliases:
    - Anthropic PBC
    - Claude
    - Claude Code
    - The Anthropic Institute
  sector: Frontier AI models, developer tooling, enterprise AI software, and AI infrastructure partnerships
  geography: United States headquartered with global commercial, research, and cloud-platform footprint
  company_stage: Late-stage private public benefit corporation
  research_date: 2026-05-13
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized Anthropic-owned product, pricing, governance, legal, research, careers, and fundraising pages.
    - Supplemented with official partner and regulator sources from AWS, FTC, CMA, the White House, the U.S. Copyright Office, and SEC EDGAR.
    - Used public case studies and legal commentary only where direct docket or registry access was limited in-session.
    - Treated all self-reported run-rate, customer-count, and benchmark metrics as management claims rather than audited facts.
  included_jurisdictions:
    - United States
    - United Kingdom
    - European Union / EEA context where relevant to cloud and policy footprint
  excluded_topics:
    - Private audited financial statements, full cap table ledgers, debt schedules, and board materials were unavailable.
    - Direct PACER refreshes and official trademark-registry verification were not completed in-session.
    - No customer or supplier interviews, reference calls, or paid database research were performed.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-13
      notes: The user asked for startup research on Anthropic and a diligence report, without providing specific founder claims or private materials.
