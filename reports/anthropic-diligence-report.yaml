        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Anthropic publicly markets a full ladder from consumer to enterprise plus a developer platform, coding product, and gated cybersecurity model. The public record strongly verifies product breadth, pricing surfaces, and trust features, but not market share, product-level profitability, or roadmap commitments.
        verification_status: partially_verified
        confidence: high
        key_findings:
