risk_register:
  - risk_id: R-001
    risk_title: Financial statements and revenue quality remain largely opaque
    risk_category: financial
    severity: critical
    likelihood: high
    description: Anthropic discloses impressive run-rate and customer-scale metrics publicly, but audited financials, product-level margins, backlog, deferred revenue, AR aging, and customer concentration are not public.
    impacted_chapter_ids:
      - I
      - III
    impacted_section_ids:
      - I.A
      - I.B
      - III.C
    evidence_claim_ids:
      - EC-019
      - EC-020
      - EC-025
    mitigation_or_diligence_request: Request audited statements, monthly revenue bridge, revenue-recognition policies, product/customer mix, and concentration schedules.
  - risk_id: R-002
    risk_title: LTBT governance and control rights may limit investor optionality
    risk_category: team
    severity: high
    likelihood: medium
    description: Anthropic's LTBT and Class T governance structure are unusual for a late-stage private company and may constrain acquisitions, recapitalizations, or investor control under stress scenarios.
    impacted_chapter_ids:
      - I
      - VII
      - VIII
    impacted_section_ids:
      - I.C
      - VII.A
      - VIII.F
    evidence_claim_ids:
      - EC-002
      - EC-021
    mitigation_or_diligence_request: Request charter documents, LTBT trust deed, board committee rights, veto lists, and conflict-resolution mechanics.
  - risk_id: R-003
    risk_title: Strategic cloud and chip dependencies are concentrated and intertwined with investors
    risk_category: operational
    severity: high
    likelihood: high
    description: AWS remains the primary training partner while Google, Microsoft, NVIDIA, Broadcom, and SpaceX also provide critical capacity and, in some cases, equity capital or distribution channels.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.D
      - III.B
      - III.E
      - VIII.F
    evidence_claim_ids:
      - EC-016
      - EC-017
      - EC-018
      - EC-027
    mitigation_or_diligence_request: Review all cloud, chip, and data-center contracts for minimum commitments, exclusivity, step-down rights, pricing resets, and failure remedies.
  - risk_id: R-004
    risk_title: Training-data and output-copyright exposure remains material
    risk_category: legal
    severity: high
    likelihood: high
    description: Public litigation and policy developments show ongoing exposure around copyrighted training data, lyric reproduction, and data-licensing assumptions for generative AI systems.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - VIII.E
    evidence_claim_ids:
      - EC-022
      - EC-029
    mitigation_or_diligence_request: Obtain full litigation schedule, counsel assessments, insurance positions, and training-data license inventory.
  - risk_id: R-005
    risk_title: Public policy commitments and AI-safety governance could constrain launches or create scrutiny
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Anthropic has made unusually explicit public commitments through the RSP, White House safety commitments, and external-review mechanisms that can increase both trust and regulatory/accountability pressure.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.C
      - VIII.D
    evidence_claim_ids:
      - EC-007
      - EC-021
      - EC-024
    mitigation_or_diligence_request: Review internal RSP compliance logs, incident reporting, government correspondence, and launch-governance records.
  - risk_id: R-006
    risk_title: Customer concentration, churn, and channel dependence are not publicly quantified
    risk_category: customer
    severity: high
    likelihood: medium
    description: Anthropic publishes strong customer references and self-reported counts of large accounts, but not cohort retention, churn, or revenue exposure by customer, reseller, or cloud channel.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
      - V.C
    evidence_claim_ids:
      - EC-009
      - EC-020
      - EC-025
    mitigation_or_diligence_request: Request top-customer schedule, NRR/GRR, renewal cohorts, reseller/channel mix, and churned-customer interviews.
  - risk_id: R-007
    risk_title: Frontier-model pricing and benchmark competition could pressure monetization
    risk_category: market
    severity: medium
    likelihood: high
    description: Anthropic competes in a fast-moving market where benchmark leadership, token pricing, and cloud-platform distribution can shift quickly as peers update models.
    impacted_chapter_ids:
      - II
      - IV
      - V
    impacted_section_ids:
      - II.A
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-003
      - EC-006
      - EC-028
    mitigation_or_diligence_request: Refresh competitive pricing/benchmark analyses regularly and compare to actual win/loss and gross-margin data.
  - risk_id: R-008
    risk_title: Retention of frontier researchers and go-to-market leaders is hard to assess publicly
    risk_category: team
    severity: medium
    likelihood: medium
    description: Anthropic's public materials show ambitious expansion and strong culture, but not attrition, succession depth, or equity refresh practices for critical talent.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VI.B
      - VII.B
      - VII.G
    evidence_claim_ids:
      - EC-011
      - EC-012
      - EC-025
    mitigation_or_diligence_request: Request headcount history, regretted attrition, succession plans, equity refresh policy, and key-person dependency map.
  - risk_id: R-009
    risk_title: Rapid release cadence and self-reported benchmark claims create continuity and trust risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Claude 4, Claude Code, and Project Glasswing show product momentum, but enterprise continuity depends on Anthropic meeting reliability and safety promises while updating models quickly.
    impacted_chapter_ids:
      - II
      - IV
      - VIII
    impacted_section_ids:
      - II.A
      - IV.A
      - VIII.C
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-009
    mitigation_or_diligence_request: Request SLA history, incident log, deprecation policy, benchmark methodology, and rollback/playbook documentation.
  - risk_id: R-010
    risk_title: Large multi-year compute commitments may act like off-balance-sheet leverage
    risk_category: financing
    severity: high
    likelihood: medium
    description: AWS, Azure, TPU, data-center, and related commitments appear extremely large relative to a private-company disclosure set and may lock Anthropic into long-term spend before margin durability is proven.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.B
      - I.D
      - III.E
      - VIII.F
    evidence_claim_ids:
      - EC-016
      - EC-017
      - EC-018
      - EC-027
    mitigation_or_diligence_request: Obtain all minimum-commitment schedules, usage ramps, take-or-pay terms, and downside-case renegotiation rights.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited annual and quarterly financial statements, management accounts, and AR/backlog schedules.
    why_it_matters: Without audited statements, Anthropic's self-reported scale cannot be translated into revenue quality or cash conversion.
    suggested_source_or_request: Request a financial data room with audited statements, board packs, and working-capital schedules.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, LTBT trust deed, charter, warrants, debt, and investor rights.
    why_it_matters: The LTBT structure materially affects control analysis, but the public record is too thin to model rights and dilution.
    suggested_source_or_request: Request charter, trust documents, stock ledger, and all rights agreements.
    priority: high
  - gap_id: G-003
    chapter_id: I
    section_id: I.D
    missing_information: Intermediate 2024 round terms and verified valuation path between Series C and Series G.
    why_it_matters: The jump from early institutional financing to a $380B post-money valuation cannot be fully explained from accessible primary sources.
    suggested_source_or_request: Request full financing history, term sheets, and cap-table snapshots by round.
    priority: medium
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, direct vs. channel mix, NRR/GRR, and churn.
    why_it_matters: Public case studies do not reveal concentration or durability of revenue.
    suggested_source_or_request: Request top-customer schedules, cohort retention data, and cloud-channel revenue reports.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Supplier spend, take-or-pay commitments, service credits, and failover plans.
    why_it_matters: Large compute obligations could materially shape margin and downside resilience.
    suggested_source_or_request: Request all material supplier contracts and operational continuity plans.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Independent win/loss, market-share, and benchmark methodology data.
    why_it_matters: The competition chapter is otherwise anchored too heavily on public positioning and company-authored claims.
    suggested_source_or_request: Request independent benchmark results, win/loss reports, and market studies.
    priority: medium
  - gap_id: G-007
    chapter_id: V
