executive_summary:
  overall_assessment: Eligible for this run based on CB Insights, investor financing evidence and active public product/job-board presence. Public evidence supports the Series C valuation and product scope, but financial quality, concentration and compliance outcomes require private diligence.
  investment_or_diligence_thesis: IntelyCare is a healthcare workforce technology unicorn whose attractiveness depends on validating post-2022 revenue durability, labor-compliance controls, facility retention and the economics of its evolving Credenza/job-board product surface.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn-list and financing evidence support IntelyCare eligibility, subject to primary-document reconciliation.
      evidence_claim_ids:
        - EC-001
        - EC-003
    - founder_claim_id: FC-003
      summary: Company-owned public materials support the core product-positioning claim.
      evidence_claim_ids:
        - EC-002
        - EC-004
        - EC-006
    - founder_claim_id: FC-005
      summary: Public customer, partner or market signals exist but are incomplete for concentration and revenue quality.
      evidence_claim_ids:
        - EC-005
        - EC-007
        - EC-011
  biggest_risks:
    - risk_id: R-001
      summary: Stale valuation versus current unit economics
    - risk_id: R-002
      summary: Cap-table and investor-rights opacity
    - risk_id: R-003
      summary: Facility concentration, churn and demand cyclicality
  key_evidence_gaps:
    - Audited financial statements, management reports, revenue bridge, gross margin, cash burn and runway
    - Fully diluted cap table, debt instruments, warrants, options, investor side letters and board rights
    - Top customer revenue, churn, retention, contracts, pipeline and customer references
    - Sales productivity, CAC, quota capacity, conversion and channel-mix economics
    - Legal/regulatory/IP/insurance/material-contract review by counsel
  recommended_next_steps:
    - Open financial, cap-table and board-material data room and reconcile public valuation to primary documents.
    - Run customer and revenue-quality diligence on top accounts, churn/retention cohorts and pipeline conversion.
    - Conduct counsel-led legal, regulatory, privacy/IP, insurance and material-contract review.
    - Run product/technical diligence covering roadmap, architecture, security, vendors, quality and incident history.
