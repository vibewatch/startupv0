executive_summary:
  overall_assessment: "IntelyCare passes the public eligibility screen: public evidence supports an active private unicorn profile, a $1.1B 2022 valuation, active operations, 2024 CEO transition and 2026 acquisition of CareRev by IntelyCare. Core diligence remains unresolved because financials, cap table, customer concentration, retention, legal status, security controls, contracts and HR records are not public."
  investment_or_diligence_thesis: IntelyCare may be a scaled healthcare workforce platform with W2/compliance, credentialing, UKG integration, Credenza identity tooling and CareRev acute-care expansion. Diligence should test whether public scale claims translate into predictable, high-margin revenue amid intense competition and regulatory/labor/privacy complexity.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB context and WSJ summary support $1.1B valuation.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company/app-store sources verify active products.
      evidence_claim_ids:
        - EC-004
        - EC-005
        - EC-006
    - founder_claim_id: FC-005
      summary: Public sources verify CEO transition, UKG partnership and CareRev acquisition.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation support remain private.
    - risk_id: R-002
      summary: Revenue predictability, concentration, churn and NRR are not public.
    - risk_id: R-004
      summary: Competition may pressure price, CAC and supply.
    - risk_id: R-006
      summary: Sensitive workforce/geolocation data creates privacy/security risk.
    - risk_id: R-008
      summary: Public dockets and incomplete searches require counsel review.
  key_evidence_gaps:
    - Audited financials, revenue quality, cash/debt, burn, AR aging, backlog and forecast model.
    - Cap table, preferences, options, debt and financing/acquisition documents.
    - Top customer revenue, concentration, churn/retention, NRR, contracts and references.
    - Sales productivity, CAC/payback, channel mix, pipeline and pricing.
    - Security/privacy controls, vendor contracts, insurance, regulatory/legal schedules and HRIS data.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on headline valuation.
    - Request cap table and financing/acquisition documents.
    - Validate demand through references, cohorts, contracts and raw shift/fill/cancel data.
    - Have counsel review litigation, labor/staffing regulation, OSHA, privacy/security, IP, insurance and contracts.
    - Benchmark product/pricing against competitors with buyer references.
