    impacted_section_ids:
      - I.A
      - I.D
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-009
    mitigation_or_diligence_request: Obtain audited financials, KPI bridge, burn/runway, gross margin by service line and current valuation documents.
  - risk_id: R-002
