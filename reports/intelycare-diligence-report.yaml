evidence_claims:
  - evidence_claim_id: EC-001
    claim: CB Insights lists IntelyCare as a private unicorn valued at $1.10B, with a 2022-04-06 unicorn date, Quincy location, healthcare industry classification, and named select investors.
    evidence_summary: The CB Insights unicorn table includes the IntelyCare row with valuation, date joined, country, city, industry, and investors.
    evidence_type: market_database
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-001
    quoted_evidence:
      - source_id: SRC-001
        quote: "| [IntelyCare](https://www.cbinsights.com/company/intelycare) | $1.10 | 4/6/2022 | United States | Quincy | Healthcare & Life Sciences | Kaiser Permanente Ventures, Endeavour Vision, LRVHealth |"
        location: CB Insights unicorn table
    analyst_interpretation: The valuation is a public database signal rather than audited capitalization data; it is enough for unicorn eligibility but not for price discovery.
    limitations: Public-source review only; private documents, customer references, legal dockets, and paid databases were not available.
    associations:
      chapter_id: I
      section_id: I.D
      founder_claim_ids: []
      table_ids: []
      figure_ids: []
      risk_ids: []
  - evidence_claim_id: EC-002
    claim: IntelyCare describes itself as a comprehensive healthcare talent platform serving care settings and nurses seeking better-fit opportunities.
    evidence_summary: The About page states that IntelyCare is a comprehensive healthcare talent platform.
    evidence_type: primary_company_source
    verification_status: verified
    confidence: high
    source_ids:
      - SRC-002
    quoted_evidence:
      - source_id: SRC-002
        quote: IntelyCare is the most comprehensive healthcare talent platform where care settings of every kind can promote their unique value and every type of work need to the largest community of quality nurses looking for opportunities that better fit their lives.
        location: About page
    analyst_interpretation: This verifies the company positioning, not market share or revenue scale.
    limitations: Public-source review only; private documents, customer references, legal dockets, and paid databases were not available.
    associations:
      chapter_id: II
