        quote: "Bolster your workforce with our IntelyPro team: ranked #1 in quality, with 99% of shifts earning a 5/5 facility rating."
        location: Facilities page
    analyst_interpretation: The solution set is directly visible; the rating metric is company-authored and requires cohort, denominator, and time-period validation.
