risk_register:
  - risk_id: R-001
    risk_title: Stale valuation versus current unit economics
    risk_category: financial
    severity: high
    likelihood: medium
    description: The $1.1B valuation is from 2022; current revenue, burn, take rate, gross margin and working capital are not public.
    impacted_chapter_ids:
