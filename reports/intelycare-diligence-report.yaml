executive_summary:
  overall_assessment: IntelyCare is eligible for this run as an uncovered private unicorn based on CB Insights and active public-source evidence, but public diligence is gap-heavy because financial, customer, legal, and personnel records are private.
  investment_or_diligence_thesis: The diligence case depends on whether IntelyCare can convert public product/market credibility in Healthcare workforce technology, clinician staffing, and verified nursing identity into durable revenue, defensible economics, and compliant operations at or above the $1.10B public valuation signal.
  strongest_verified_claims:
    - CB Insights lists IntelyCare as a private unicorn valued at $1.10B, with a 2022-04-06 unicorn date, Quincy location, healthcare industry classification, and named select investors.
    - IntelyCare describes itself as a comprehensive healthcare talent platform serving care settings and nurses seeking better-fit opportunities.
    - Credenza is positioned as IntelyCare-operated verified nursing identity and employer hiring technology with credential, specialty, experience, and setting-preference data captured before employer review.
    - IntelyCare privacy disclosures show the business handles professional, employment, license, background-screening, payment, account, and precise geolocation data in U.S.-only services.
  biggest_risks:
    - Financial opacity and stale valuation signal
    - Healthcare staffing compliance and credentialing exposure
    - Sensitive workforce data, background-screening, and geolocation privacy risk
  key_evidence_gaps:
    - Audited financial statements, monthly management accounts, revenue bridge, gross margin, cash runway, debt, tax, and AR aging are not public.
    - Fully diluted cap table, liquidation preferences, investor rights, options, warrants, and notes are not public.
    - Named customers, contract values, churn, NRR/GRR, revenue concentration, and referenceability require private schedules.
    - Current headcount, org chart, turnover, compensation, and incentive-equity details are not sufficiently public.
    - Legal, regulatory, IP, privacy, security, insurance, and material-contract schedules need counsel and management confirmation.
  recommended_next_steps:
    - Provide audited financial statements, monthly financial model, ARR/GMV/revenue bridge, gross margin, cash runway, debt, and tax schedules.
    - Provide cap table, financing documents, investor rights, option/warrant/note schedules, litigation schedule, regulatory correspondence, material contracts, and IP assignment records.
    - Provide top customers, contract terms, churn, renewal rates, pipeline, sales productivity, customer references, and partner/supplier concentration.
    - Provide current org chart, headcount by function/location, compensation philosophy, incentive plans, turnover, employee-relations matters, and key-person retention plans.
    - Provide product roadmap, architecture, security audits, privacy assessments, compliance policies, incident history, and product-level P&L.
