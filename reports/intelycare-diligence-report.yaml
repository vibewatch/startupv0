report_metadata:
  report_title: IntelyCare Startup Diligence Report
  target_company: IntelyCare
  website: https://www.intelycare.com/
  known_aliases:
    - IntelyCare
    - IntelyCare, Inc.
    - IntelyPro
    - IntelyEdu
    - Credenza
    - CareRev (acquired/continued brand)
  sector: Healthcare & Life Sciences / healthcare workforce technology and staffing marketplace
  geography: United States; Quincy, Massachusetts headquarters public signal
  company_stage: Private unicorn / growth-stage healthcare staffing and workforce technology platform
  research_date: 2026-06-12
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified public eligibility first using CB Insights context, company financing summary, active website/newsroom/privacy pages and CareRev acquisition announcement.
    - Collected public evidence from company pages, app stores, LinkedIn, regulatory/legal/IP searches and competitor pages via curl/Jina Reader where accessible.
    - Company-owned and social-profile claims are evidence of public statements; private finance/customer/HR/legal/contract data is marked not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - Massachusetts
    - Federal U.S. public docket/regulatory/IP sources searched where accessible
  excluded_topics:
    - Private data room, management interviews, customer calls, paywalled databases, full PACER/state-court pulls and official USPTO API pulls requiring keys.
  user_provided_materials:
    - material_id: UPM-001
      title: Target-selection context for IntelyCare unicorn diligence
      type: workflow_request
      date_received: 2026-06-12
      notes: Included parsed CB Insights row and instruction to create exactly one final YAML report.
