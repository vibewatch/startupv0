report_metadata:
  report_title: IntelyCare Public-Source Startup Diligence Report
  target_company: IntelyCare
  website: https://www.intelycare.com/
  known_aliases:
    - IntelyCare, Inc.
    - Credenza
  sector: Healthcare workforce technology, clinician staffing, and verified nursing identity
  geography: United States; CB Insights lists Quincy, Massachusetts
  company_stage: Late-stage private unicorn
  research_date: 2026-06-12
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from reports/*-diligence-report.yaml and confirmed the selected slug was not present.
    - Used CB Insights current unicorn list fetched through Jina reader as the unicorn-status and valuation source.
    - Fetched company-owned public pages covering product, services, terms, privacy, leadership, and/or news where available.
    - Used only public evidence; private data-room records, customer calls, counsel letters, paid databases, and authenticated government/database searches were not available.
  included_jurisdictions:
    - United States
    - United States public-source context where applicable
  excluded_topics:
    - No private financial statements, cap table, board materials, customer contracts, or employee records were available.
    - No paid database research, customer interviews, supplier interviews, or counsel confirmations were performed.
    - Search engine access was limited by bot challenges; direct public URLs and Jina reader fetches were used instead.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-06-12
      notes: The user requested three random private-unicorn diligence reports and provided no company-private materials.
