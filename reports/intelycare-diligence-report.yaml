  - figure_id: F-011
    title: Risk register heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Full risk-register heatmap for IntelyCare.
    purpose: Show relative severity and likelihood across diligence risks.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Stale valuation versus current unit economics
          severity: high
          likelihood: medium
          rationale: The $1.1B valuation is from 2022; current revenue, burn, take rate, gross margin and working capital are not public.
          evidence_claim_ids:
            - EC-001
            - EC-003
            - EC-009
          source_ids:
            - SRC-001
        - risk_id: R-002
          label: Cap-table and investor-rights opacity
          severity: medium
          likelihood: medium
          rationale: Series C investors are public, but fully diluted ownership, preferences, debt and side letters are not.
          evidence_claim_ids:
            - EC-003
          source_ids:
            - SRC-001
        - risk_id: R-003
          label: Facility concentration, churn and demand cyclicality
          severity: high
          likelihood: medium
          rationale: Public testimonials and job listings do not disclose revenue concentration, retention or margin by facility/customer.
          evidence_claim_ids:
            - EC-005
            - EC-007
            - EC-009
            - EC-011
          source_ids:
            - SRC-001
        - risk_id: R-004
          label: Healthcare workforce supply and wage inflation
          severity: high
          likelihood: medium
          rationale: IntelyCare depends on clinician supply, credentialing, wages and shift-fill rates; public sources do not disclose supply elasticity.
          evidence_claim_ids:
            - EC-004
            - EC-010
          source_ids:
            - SRC-001
        - risk_id: R-005
          label: Product transition and pricing clarity
          severity: medium
