  - risk_id: R-002
    risk_title: Clinical quality and patient-safety allegations
    risk_category: operational
    severity: high
    likelihood: medium
    description: Bloomberg summarized allegations of clinical mistakes, staffing crises and financial pressures.
    impacted_chapter_ids:
      - VIII
