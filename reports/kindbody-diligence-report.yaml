  - risk_id: R-001
    risk_title: Financial runway and valuation support may be impaired
    risk_category: financial
    severity: high
    likelihood: high
    description: Public reporting suggests financing pressure and potential valuation compression; financial statements and cash runway are private.
    impacted_chapter_ids:
