    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a23
    mitigation_or_diligence_request: Request top-customer ARR, utilization, NRR, churn and contract terms.
  - risk_id: R-004
    risk_title: Leadership and execution continuity risk
    risk_category: team
    severity: high
    likelihood: medium
    description: Public reporting described a temporary Office of the CEO and executive churn while the company pursues a new platform.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.B
      - VII.C
    evidence_claim_ids: *a24
    mitigation_or_diligence_request: Interview management, review org chart, hiring plan, attrition and roadmap accountability.
  - risk_id: R-005
    risk_title: Reputational and regulatory scrutiny in fertility services
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Fertility care is sensitive; independent allegations and complex patient-data/HIPAA operations require counsel review.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.C
      - VIII.G
    evidence_claim_ids: *a25
    mitigation_or_diligence_request: Request litigation/regulatory schedule, HIPAA/security audits, insurance and patient complaint/adverse-event logs.
