report_metadata:
  report_title: Kindbody Startup Diligence Report
  target_company: Kindbody
  website: https://kindbody.com/
  known_aliases:
    - Kindbody
    - Kindbody Inc.
  sector: Fertility, family-building benefits and women's health services
  geography: United States / national clinic and virtual-care network
  company_stage: Private unicorn / growth-stage company
  research_date: 2026-06-13
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built the existing-report exclusion list from reports/*-diligence-report.yaml before target selection.
    - Selected this target at random from the fetched CB Insights unicorn list after excluding existing report slugs.
    - Reviewed company-owned pages, the fetched CB Insights unicorn-list row, reputable public articles where accessible, Wikipedia pages with cited references where direct pages were blocked, and legal/regulatory references available on the public web.
    - Treated company claims as evidence that the claim is public, not as independent proof of operating performance; marked private records as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - United States healthcare and privacy sources
  excluded_topics:
    - No private data room, customer calls, management interviews, paid databases, non-public litigation dockets, security reports, HRIS exports or cap-table records were available.
  user_provided_materials:
    - material_id: UPM-001
      title: Fetched CB Insights unicorn-list row
      type: market_database_row
      date_received: 2026-06-13
      notes: CB Insights row listed Kindbody, valuation $1.80B, joined 2023-03-02, United States/New York, Healthcare & Life Sciences, investors RRE Ventures, Google Ventures, Bramalea Partners.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Kindbody is an uncovered private unicorn at approximately $1.80B.
    claim_source: CB Insights unicorn tracker
    claim_date: 2023-03-02
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: partially_verified
    confidence: high
    evidence_claim_ids: &a1
      - EC-001
      - EC-005
    contradiction_summary: Current valuation support is uncertain because later public reporting suggests possible valuation compression.
    diligence_follow_up:
      - Request latest financing terms, 409A, cap table, cash/debt schedule and board valuation materials.
  - founder_claim_id: FC-002
    claim_text: Kindbody offers fertility, IVF, egg freezing, wellness and family-building care.
    claim_source: Company-owned pages
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.B
    verification_status: verified
    confidence: high
    evidence_claim_ids: &a2
      - EC-002
      - EC-009
    contradiction_summary: null
    diligence_follow_up:
      - Run service-line margin, outcomes, patient experience and clinical operations review.
  - founder_claim_id: FC-003
    claim_text: Kindbody serves employer and health-plan channels as well as individuals.
    claim_source: Company platform release
    claim_date: 2026-02-12
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.B
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: &a3
      - EC-003
      - EC-004
    contradiction_summary: Covered lives do not equal revenue or utilization.
    diligence_follow_up:
      - Request top employer clients, covered lives by customer, utilization, renewals, NRR and concentration.
  - founder_claim_id: FC-004
    claim_text: Kindbody is pursuing AI-enabled fertility platform improvements.
    claim_source: Company platform release
    claim_date: 2026-02-12
    mapped_chapter_ids:
      - VI
      - V
    mapped_section_ids:
      - VI.B
      - V.A
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-004
      - EC-009
    contradiction_summary: Broad availability is projected for 2027; outcomes and savings guarantees need pilot proof.
    diligence_follow_up:
      - Request pilot metrics, AI governance, clinical validation, security reviews and employer ROI model.
executive_summary:
  overall_assessment: Kindbody remains eligible for this run based on CB Insights unicorn-list inclusion and active company-owned sources, but public evidence flags unusually high confirmatory diligence needs around valuation, cash runway, clinic operations, clinical quality, leadership continuity and reputational exposure.
  investment_or_diligence_thesis: Proceed only if private diligence confirms clinic-level economics, cash runway, outcome quality, employer retention and credible remediation of independent allegations.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Kindbody is an uncovered private unicorn at approximately $1.80B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Kindbody offers fertility, IVF, egg freezing, wellness and family-building care.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: Kindbody serves employer and health-plan channels as well as individuals.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Financial runway and valuation support may be impaired
    - risk_id: R-002
      summary: Clinical quality and patient-safety allegations
    - risk_id: R-003
      summary: Customer concentration and utilization are not public
  key_evidence_gaps:
    - Audited/management financials, current runway, debt and cap table.
    - Clinic-level P&Ls, patient outcomes, adverse-event logs and quality controls.
    - Top employer/customer ARR, utilization, renewals and concentration.
    - Leadership/org chart, attrition, compensation and roadmap ownership.
    - Litigation/regulatory, HIPAA/security, insurance and material-contract schedules.
  recommended_next_steps:
    - Request full data-room package before relying on valuation.
    - Run clinical-quality and patient-safety review with specialist counsel.
    - Call employer customers and validate covered-lives utilization and savings claims.
    - Review leadership succession, clinic consolidation plan and cash needs.
