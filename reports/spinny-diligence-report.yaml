report_metadata:
  report_title: Spinny Startup Diligence Report
  target_company: Spinny
  website: https://www.spinny.com/
  known_aliases:
    - Spinny
    - Valuedrive Technologies Private Limited
  sector: Full-stack used-car retail and marketplace
  geography: India
  company_stage: Private unicorn / growth-stage used-car platform
  research_date: 2026-06-13
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: INR and USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list from reports/*-diligence-report.yaml and selected uncovered private-unicorn targets from a fetched public unicorn list using shuf.
    - Used public web sources through r.jina.ai and DuckDuckGo HTML search-result pages; treated company-owned sources as evidence of claims, not independent proof of performance.
    - For Spinny, public research prioritized the current unicorn list, Series E funding coverage, company product/assurance pages and public financial-search snippets.
    - No private data room, management interview, customer call, counsel schedule, audit report, security report or cap table was available.
  included_jurisdictions:
    - India
    - United States public-source coverage where relevant
  excluded_topics:
    - Private financial statements, customer contracts, cap table, board materials, security reports, counsel schedules, HRIS exports and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-13
      notes: No pitch deck, financial model, data room or founder responses were provided.
