executive_summary:
  overall_assessment: Track with high-priority private diligence before relying on Spinny's headline US$1.75B to US$1.8B valuation. Public sources verify meaningful product and financing signals, but critical financial, customer, legal and operating records are not public.
  investment_or_diligence_thesis: Spinny has credible public unicorn and product-market signals in Full-stack used-car retail and marketplace; the diligence thesis depends on validating revenue quality, concentration, margins, controls, current financing terms and management depth.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Headline private-unicorn status and valuation context are supported by the current unicorn list and public financing sources.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Active product/service offering is visible in company-owned and public sources.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-003
      summary: Public customer, partner or channel signals exist but do not prove revenue quality.
      evidence_claim_ids:
        - EC-004
  biggest_risks:
    - risk_id: R-001
      summary: Inventory financing, warranty reserves and losses require private financial diligence
    - risk_id: R-002
      summary: Used-car quality control and return/warranty execution could pressure margins
    - risk_id: R-003
      summary: Intense competition and cyclicality in auto finance and used-car demand
  key_evidence_gaps:
    - Audited financial statements, monthly KPI pack, cash/debt schedule and forecast model.
    - Current cap table, financing documents, option pool, liquidation preferences and secondary pricing support.
    - Customer concentration, contracts, retention/churn, support/refund metrics and reference calls.
    - Legal, regulatory, IP, insurance, material-contract, security/quality and HR schedules.
  recommended_next_steps:
    - Request a data-room package covering financials, cap table, customer cohorts, contracts, legal/IP, quality/security and HR materials.
    - Conduct management, customer-reference, counsel, technical/quality and market diligence before investment committee.
    - Refresh unicorn-list, corporate-status and news checks immediately before publication or investment decision.
