report_metadata:
  report_title: LetsGetChecked Startup Diligence Report
  target_company: LetsGetChecked
  website: https://www.letsgetchecked.com/
  known_aliases:
    - LetsGetChecked
    - Fuze Services
    - Fuze Health
  sector: At-home diagnostics, virtual care and healthcare services
  geography: Ireland / United States
  company_stage: Private unicorn / growth-stage healthcare platform
  research_date: 2026-06-04
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: Europe/Dublin / America/New_York
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public unicorn lists to select and verify uncovered private-unicorn status.
    - Fetched company-owned pages and reputable public third-party sources using curl/Jina reader where available.
    - Treated company-owned statements as evidence that the statement exists, not as independent proof of financial performance.
    - No private data room, management interview, customer reference, legal docket package or security artifact was available.
  included_jurisdictions:
    - Ireland / United States
    - Public source jurisdictions relevant to company operations
  excluded_topics:
    - Private financial statements, contracts, cap table, customer calls, security reports, legal dockets and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-04
      notes: No pitch deck, financial model, data room or founder responses were provided.
