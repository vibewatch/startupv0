executive_summary:
  overall_assessment: LetsGetChecked is a credible active private-unicorn diligence target based on public unicorn-list evidence and active company materials. Public evidence supports product/category presence and selected traction or operating-scale signals, but financial quality, customer concentration, retention, margin, cap-table economics and legal/control evidence remain private diligence items.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The public record supports continued research into LetsGetChecked, but no investment or transaction conclusion should rely on the headline valuation without private proof of revenue durability, margins, customer retention, legal/regulatory controls and financing terms.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public unicorn lists include LetsGetChecked with valuation evidence.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company-owned materials describe the product/platform and operating model.
      evidence_claim_ids:
        - EC-002
    - founder_claim_id: FC-003
      summary: Public materials include customer, usage or operating-scale signals.
      evidence_claim_ids:
        - EC-004
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation support are not public.
    - risk_id: R-002
      summary: Customer concentration, retention and contract quality are not public.
    - risk_id: R-007
      summary: Legal, regulatory, privacy/IP and material-contract exposure requires counsel review.
  key_evidence_gaps:
    - Audited financials, ARR/bookings, gross margin, cash/debt, retention/churn and board forecast.
    - Cap table, preferences, investor rights, debt, option pool and valuation bridge.
    - Top customer revenue, contracts, churn/NRR, backlog, reference checks and concentration.
    - Security/privacy/legal/regulatory artifacts, insurance, IP assignments and material contracts.
    - Sales productivity, CAC/payback, channel economics, roadmap cost and team retention.
  recommended_next_steps:
    - Request a full data room before relying on headline valuation.
    - Run revenue-quality and customer-reference diligence.
    - Have counsel review legal, privacy, regulatory, IP and material-contract packages.
    - Benchmark against direct competitors using win/loss, pricing, retention and buyer references.
