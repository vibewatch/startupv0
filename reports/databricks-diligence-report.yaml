    claim: Reviewed public GTM materials do not disclose sales compensation, average quota, sales-cycle duration, or marketing-budget productivity.
    evidence_summary: Databricks’ public pricing and marketing materials indicate enterprise sales and committed-use deals, but not sales productivity mechanics.
    evidence_type: other
    verification_status: not_publicly_verifiable
    confidence: medium
    source_ids:
      - SRC-027
      - SRC-028
      - SRC-025
      - SRC-026
    quoted_evidence:
      - source_id: SRC-028
        quote: Pay as you go with a 14-day free trial or contact us for committed-use discounts or custom requirements
        location: Databricks SQL pricing page
    analyst_interpretation: The existence of enterprise sales is clear; the unit economics and productivity of that motion are not.
    limitations: This is an evidence-gap claim inferred from the scope of reviewed public materials.
    associations:
      chapter_id: V
      section_id: V.D
      founder_claim_ids: []
      table_ids:
        - T-012
      figure_ids:
        - F-006
      risk_ids:
        - R-002
        - R-004
  - evidence_claim_id: EC-048
    claim: Reviewed public people materials do not disclose executive compensation schedules, stock-plan mechanics, or two-year attrition data.
    evidence_summary: Public pages provide role, culture, and headcount signals without compensation or attrition details.
    evidence_type: other
    verification_status: not_publicly_verifiable
    confidence: medium
    source_ids:
      - SRC-008
      - SRC-010
      - SRC-011
    quoted_evidence:
      - source_id: SRC-008
        quote: Benefits, perks and hybrid work
        location: Careers page
    analyst_interpretation: The public people story is enough for a roster but not for real personnel diligence.
    limitations: This claim is based on omission in the reviewed public set, not on a statement from Databricks that such information will never be disclosed.
    associations:
      chapter_id: VII
