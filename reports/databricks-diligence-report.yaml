  - evidence_claim_id: EC-049
    claim: The public founders and leadership pages show Andy Konwinski remains listed as a founder but is absent from the current executive-team page.
    evidence_summary: Comparing the two public pages reveals a founder-role ambiguity worth direct diligence.
    evidence_type: primary_company_source
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-010
      - SRC-011
    quoted_evidence:
