    notes: This table should not be read as clearance from regulators; it only reflects what was visible in the reviewed source set.
  - table_id: T-023
    title: Material contracts and strategic transactions visible from public sources
    chapter_id: VIII
    section_id: VIII.F
    purpose: Track the public contracts, partnerships, and transactions most likely to matter in legal and commercial diligence.
    columns:
      - name: counterparty
        description: Counterparty or transaction target.
      - name: contract_or_transaction
        description: Type of agreement or transaction.
      - name: public_terms
        description: What the source discloses.
      - name: strategic_importance
        description: Why it matters.
      - name: diligence_gap
        description: What remains private.
    rows:
      - row_id: T-023-R1
        values:
          counterparty: Microsoft
          contract_or_transaction: Azure Databricks first-party service and strategic investment
          public_terms: Azure billing and support flow through Microsoft; Microsoft joined Series E.
          strategic_importance: Major distribution and infrastructure dependency with direct competitive overlap from Fabric.
          diligence_gap: Need revenue sharing, termination rights, and change-of-control protections.
        evidence_claim_ids:
          - EC-014
          - EC-023
        source_ids:
          - SRC-013
          - SRC-020
      - row_id: T-023-R2
        values:
          counterparty: Anthropic
          contract_or_transaction: Five-year strategic partnership
          public_terms: Claude models offered natively through Databricks on AWS, Azure, and GCP.
          strategic_importance: Expands AI-agent offering and deepens third-party model dependence.
          diligence_gap: No public committed spend, minimums, or exclusivity terms were found.
        evidence_claim_ids:
          - EC-022
        source_ids:
          - SRC-019
      - row_id: T-023-R3
        values:
          counterparty: SAP
          contract_or_transaction: SAP BDC delta-sharing pricing relationship
          public_terms: Normal 1.25x DBU uplift; temporary 1.0x promotional rate through 2026-08-31.
          strategic_importance: Signals a real commercial integration path into large SAP data estates.
          diligence_gap: Need the full OEM, resale, or referral economics and renewal structure.
        evidence_claim_ids:
          - EC-033
        source_ids:
          - SRC-030
      - row_id: T-023-R4
        values:
          counterparty: MosaicML
          contract_or_transaction: Acquisition
          public_terms: Approx. $1.3B inclusive of retention packages
          strategic_importance: Defines Databricks’ GenAI positioning and current litigation exposure.
          diligence_gap: Need reps and warranties, indemnities, and post-close integration economics.
        evidence_claim_ids:
          - EC-024
        source_ids:
          - SRC-021
      - row_id: T-023-R5
        values:
          counterparty: Tabular / Neon / Arcion
          contract_or_transaction: Acquisitions and acquisition intent
          public_terms: Databricks disclosed strategic rationale but not all prices or post-close economics.
          strategic_importance: Extends interoperability, ingestion, and operational database scope.
