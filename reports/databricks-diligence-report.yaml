report_metadata:
  report_title: Databricks Public-Source Startup Diligence Report
  target_company: Databricks
  website: https://www.databricks.com/
  known_aliases:
    - Databricks Data Intelligence Platform
    - Databricks Lakehouse Platform
    - Azure Databricks
    - Mosaic AI
    - Lakeflow
    - Lakebase
    - Unity Catalog
  sector: Enterprise data infrastructure, analytics, AI platform, and lakehouse software
  geography: United States headquartered with global enterprise operations across North America, EMEA, and APJ
  company_stage: Late-stage private pre-IPO data and AI platform company
  research_date: 2026-05-14
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Prioritized official Databricks press releases, product pages, pricing pages, customer stories, careers pages, research pages, trust pages, and leadership pages.
    - Used Wayback Machine for blocked or historical TechCrunch and Forbes coverage tied to Azure Databricks and Series G / Series H financing history.
    - Used Jina AI Reader fallback for dynamic or unreliable Databricks pricing, trust, and leadership pages and for blocked CourtListener docket pages, as requested by the user.
    - Treated customer outcomes, growth rates, customer counts, and regional investment pledges as management disclosures unless independently corroborated.
    - Did not bypass paywalls, private registries, or access controls; where key data stayed inaccessible, the report marks it as not publicly verifiable.
  included_jurisdictions:
    - United States
    - United Kingdom
    - Australia
    - New Zealand
    - European Union
  excluded_topics:
    - No private financial statements, board decks, cap-table exports, or commercial contracts were reviewed.
    - No direct customer, partner, employee, or counsel interviews were performed.
    - No full PACER, USPTO, TTAB, or paid market-database sweep was completed in-session.
    - Some dynamic pages and paywalled articles were only partially accessible through Jina AI Reader or Wayback Machine fallback.
  user_provided_materials:
    - material_id: M-001
      title: User prompt
      type: prompt_argument
      date_received: 2026-05-14
      notes: The user requested startup diligence research on Databricks and explicitly asked for Wayback or Jina AI fallback when URL fetches failed.
