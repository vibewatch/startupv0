  - figure_id: F-011
    title: Databricks diligence risk heatmap
    chapter_id: VIII
    section_id: VIII.C
    figure_type: risk_heatmap
    description: Heatmap of the report’s major risks by severity and likelihood.
    purpose: Condense the cross-report risk register into one view for prioritizing deeper diligence.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Series J structure and cap-table economics remain opaque
          severity: high
          likelihood: medium
          rationale: The unusual non-dilutive wording and employee-liquidity use leave open structural questions that only private documents can resolve.
          evidence_claim_ids:
            - EC-017
          source_ids:
            - SRC-015
        - risk_id: R-002
          label: Revenue quality and unit economics are not independently verified
          severity: high
          likelihood: medium
          rationale: Public scale signals exist, but Databricks still has no public audited financial package.
          evidence_claim_ids:
            - EC-018
            - EC-021
            - EC-046
          source_ids:
            - SRC-015
            - SRC-018
            - SRC-013
        - risk_id: R-003
          label: Microsoft and hyperscaler channel dependence creates coopetition risk
          severity: high
          likelihood: high
          rationale: Azure Databricks is a first-party Microsoft service while Fabric competes in the same buyer workflow.
          evidence_claim_ids:
            - EC-014
            - EC-023
          source_ids:
            - SRC-013
            - SRC-020
        - risk_id: R-004
          label: Competition and pricing pressure span the whole data-plus-AI stack
          severity: high
          likelihood: high
          rationale: Public rival materials show strong overlap across warehouse, AI, governance, and app-development workloads.
          evidence_claim_ids:
            - EC-040
            - EC-041
            - EC-042
            - EC-043
            - EC-044
          source_ids:
            - SRC-037
            - SRC-038
            - SRC-039
            - SRC-040
            - SRC-041
        - risk_id: R-005
          label: Customer concentration and retention quality are hidden
          severity: high
          likelihood: medium
          rationale: Databricks discloses breadth and high-value customer counts, but not top-account revenue concentration or churn.
          evidence_claim_ids:
            - EC-018
            - EC-045
          source_ids:
            - SRC-015
            - SRC-002
        - risk_id: R-006
          label: Product-sprawl and model-dependency execution risk is rising
          severity: medium
          likelihood: high
          rationale: Multiple acquisitions, partner models, and newly launched products are being integrated simultaneously.
          evidence_claim_ids:
            - EC-022
            - EC-024
            - EC-025
            - EC-026
            - EC-027
          source_ids:
            - SRC-019
            - SRC-021
            - SRC-022
