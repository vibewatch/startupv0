  - table_id: T-022
    title: Regulatory certifications and public agency-action signal
    chapter_id: VIII
    section_id: VIII.G
    purpose: Separate what is clearly visible in the trust center from what remains unknown about actual agency actions or enforcement.
    columns:
      - name: regime_or_action
        description: Certification, law, or public-action category.
      - name: public_status
        description: What the reviewed public evidence supports.
      - name: source
        description: Reviewed source.
      - name: diligence_note
        description: What still needs confirmation.
    rows:
      - row_id: T-022-R1
        values:
          regime_or_action: FedRAMP and DoD IL5
          public_status: Visible in Databricks Trust & Compliance as supported programs
          source: Trust & Compliance page
          diligence_note: Request actual authorization packages, scope boundaries, and current ATO status by deployment.
        evidence_claim_ids:
          - EC-034
        source_ids:
          - SRC-031
      - row_id: T-022-R2
        values:
          regime_or_action: ISO, SOC, HIPAA, HITRUST, PCI-DSS, GDPR, CCPA, IRAP, ISMAP, K-FSI, and related programs
          public_status: Visible in Databricks Trust & Compliance
          source: Trust & Compliance page
          diligence_note: Request latest reports, exceptions, and remediation trackers rather than relying on logo-level certification references.
        evidence_claim_ids:
          - EC-034
        source_ids:
          - SRC-031
      - row_id: T-022-R3
        values:
          regime_or_action: Due-diligence package and SOC 2 availability
          public_status: Databricks says customers can download a due-diligence package and request SOC 2 Type II reports
          source: Trust & Compliance page
          diligence_note: Need the actual package contents and report dates.
        evidence_claim_ids:
          - EC-034
        source_ids:
          - SRC-031
      - row_id: T-022-R4
        values:
          regime_or_action: Public adverse agency actions or sanctions
          public_status: inconclusive
          source: Reviewed public evidence emphasized certifications rather than agency actions
          diligence_note: Absence of a found public action is not proof of absence; request regulator correspondence and enforcement logs.
        evidence_claim_ids:
          - EC-050
        source_ids:
          - SRC-031
    evidence_claim_ids:
      - EC-034
      - EC-050
    source_ids:
