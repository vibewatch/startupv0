          - EC-050
      - section_id: VIII.C
        title: Environmental and employee safety issues and liabilities
        checklist_question_ids:
          - VIII.C.1
          - VIII.C.2
        summary: For a software platform like Databricks, the most relevant public safety and exposure signals are security, privacy, and regulated-workload obligations rather than classic environmental liabilities. The public record is strongest on certifications, weakest on operating evidence and regulator interaction.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.C-F1
            finding: Databricks publicly maintains a broad compliance and trust surface, including government and sector-specific programs.
            evidence_claim_ids:
              - EC-034
            risk_ids:
              - R-010
          - finding_id: VIII.C-F2
            finding: The reviewed source set produced certifications rather than a documented adverse-action history, which is reassuring but not dispositive.
            evidence_claim_ids:
              - EC-050
            risk_ids:
              - R-010
        hidden_risks:
          - Operating a platform for sensitive enterprise and public-sector data creates privacy and safety exposure even when enforcement is not yet public.
        evidence_gaps:
          - No direct regulator correspondence, penetration-test exceptions, or audit findings were reviewed.
        follow_up_questions:
          - What privacy, security, or AI-governance remediation items are open today across major regulated programs?
