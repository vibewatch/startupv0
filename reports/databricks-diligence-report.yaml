        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-035
          - EC-036
          - EC-038
          - EC-039
      - section_id: VIII.B
        title: Pending lawsuits initiated by Company
        checklist_question_ids:
          - VIII.B
        summary: The clearest publicly verified company-initiated dispute is Databricks v. Weisfield. Beyond that, the offensive or threatened-litigation picture remains largely private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.B-F1
            finding: Databricks is willing to litigate against former employees and affiliated IP entities when it believes core IP is at issue.
            evidence_claim_ids:
              - EC-037
            risk_ids:
              - R-008
          - finding_id: VIII.B-F2
            finding: The reviewed public set does not support a complete inventory of any other offensive or threatened matters.
            evidence_claim_ids:
              - EC-050
            risk_ids:
              - R-008
        hidden_risks:
          - Confidential threatened disputes or settlements can sit outside the visible docket set.
        evidence_gaps:
          - No public counsel schedule of company-initiated and threatened disputes was available.
        follow_up_questions:
          - What offensive IP, contract, or employment claims is Databricks currently pursuing or threatening outside public dockets?
        table_ids:
          - T-020
        figure_ids: []
        evidence_claim_ids:
