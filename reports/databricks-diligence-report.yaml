        summary: Publicly visible contracts and transactions show Databricks is strategically intertwined with Microsoft, Anthropic, SAP, and recent acquisition targets. These relationships are central to the diligence case, but their economics remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
