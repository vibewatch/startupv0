risk_register:
  - risk_id: R-001
    risk_title: Series J structure and cap-table economics remain opaque
    risk_category: financing
    severity: high
    likelihood: medium
    description: The official Series J announcement uses unusual non-dilutive language while also funding employee liquidity and taxes, leaving open questions on primary cash, secondary flow, structured financing, and preference overhang.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - I.D
      - VII.E
    evidence_claim_ids:
      - EC-017
    mitigation_or_diligence_request: Obtain the Series J term sheet, cap table, liquidation preferences, and primary-versus-secondary allocation.
  - risk_id: R-002
    risk_title: Revenue quality and unit economics are not independently verified
    risk_category: financial
