diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited historical income statements, balance sheets, cash-flow statements, AR aging, backlog, and debt schedules.
    why_it_matters: Public scale markers do not reveal revenue quality, working-capital efficiency, or leverage.
    suggested_source_or_request: Request the last three fiscal years of audited financial statements plus monthly management reporting packs.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, preferred rights, option-pool detail, and Series J primary-versus-secondary allocation.
    why_it_matters: Late-stage valuation and employee-liquidity signals are not enough to price true equity risk.
    suggested_source_or_request: Request cap table exports, stock-plan schedules, and the full Series J legal package.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top-customer revenue concentration, gross and net retention, pipeline quality, and logo churn.
    why_it_matters: Logo breadth can hide heavy dependence on a small number of platform-scale accounts.
    suggested_source_or_request: Request customer concentration tables, cohort retention, and top-account expansion history.
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation structure, average quota, ramp, payback, and cycle length.
    why_it_matters: Without GTM productivity data, public growth claims cannot be translated into efficient scaling.
    suggested_source_or_request: Request board metrics, sales planning assumptions, and region-level quota attainment.
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Product-line ARR, gross margin, and attach rates for Mosaic AI, Lakebase, and interoperability products.
    why_it_matters: Public launch volume does not prove that recent products are commercially durable.
    suggested_source_or_request: Request product P&Ls and acquisition integration scorecards.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.G
    missing_information: Two-year attrition data, regretted attrition, employee-relations investigations, and current founder role agreements.
    why_it_matters: At Databricks’ scale, hidden people risk can become a major execution issue before it shows up in public materials.
    suggested_source_or_request: Request HR dashboards, founder employment agreements, and management succession plans.
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation reserve analysis, insurance recovery outlook, and the full factual record behind the Makkai claims.
    why_it_matters: The public copyright case may be large enough to alter valuation or indemnity expectations.
    suggested_source_or_request: Request outside-counsel memos, reserve workpapers, and insurance coverage schedules.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Full patent, trademark, license, and open-source obligation schedule from counsel.
    why_it_matters: Public OSS positioning and current litigation are not enough to assess proprietary IP quality or exposure.
    suggested_source_or_request: Request patent and trademark dockets, open-source compliance audits, and inbound/outbound license schedules.
    priority: medium
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulator correspondence, privacy assessments, and evidence of EU AI Act readiness beyond high-level certification pages.
    why_it_matters: Certification logos do not prove day-to-day compliance execution in regulated workloads.
    suggested_source_or_request: Request recent audits, regulator inquiries, and remediation plans by jurisdiction.
    priority: medium
