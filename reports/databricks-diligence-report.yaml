          - EC-050
      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids:
          - VIII.D
        summary: Databricks’ public IP story is strongest on open-source lineage and current litigation, and weakest on the proprietary patent and trademark portfolio itself. That asymmetry is common for private software companies but still important in diligence.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.D-F1
            finding: Databricks’ open-source lineage is real and strategically important across Spark, Delta Lake, MLflow, Unity Catalog, and Iceberg interoperability.
