    claim: Databricks’ customer page says more than 20,000 customers across the globe and more than 60% of the Fortune 500 use Databricks.
    evidence_summary: The customers page provides the broadest public customer-count claim and a lower Fortune 500 penetration figure than newer press releases.
    evidence_type: primary_company_source
    verification_status: partially_verified
    confidence: medium
    source_ids:
      - SRC-002
    quoted_evidence:
