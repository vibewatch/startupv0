        quote: Over 20,000 customers across the globe
        location: Customers page
      - source_id: SRC-002
        quote: More than 60% of the Fortune 500 use Databricks
        location: Customers page
    analyst_interpretation: The page supports very large adoption, but it also highlights inconsistent Fortune 500 copy versus newer 70% claims.
    limitations: The page does not distinguish paying customers, active customers, or concentration.
    associations:
      chapter_id: III
      section_id: III.A
      founder_claim_ids:
        - FC-002
