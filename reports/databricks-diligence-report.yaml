  - evidence_claim_id: EC-050
    claim: The regulatory evidence reviewed in-session primarily shows certifications, standards, and due-diligence materials rather than a public record of adverse agency actions or sanctions against Databricks.
    evidence_summary: The trust center is rich on certifications, but the reviewed set did not produce a directly verified adverse regulatory action.
