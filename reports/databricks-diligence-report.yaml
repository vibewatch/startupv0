        quote: Meet our team
        location: Leadership page roster did not include Andy Konwinski
    analyst_interpretation: This is not a negative signal by itself, but it is a real discrepancy between founder affiliation and current operating leadership.
    limitations: Public pages do not explain the reason for the role distinction.
    associations:
