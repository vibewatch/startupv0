report_metadata:
  report_title: Bending Spoons Startup Diligence Report
  target_company: Bending Spoons
  website: https://bendingspoons.com/
  known_aliases:
    - Bending Spoons S.p.A.
    - Bending Spoons Operations S.p.A.
    - BSP
  sector: Consumer software / app portfolio and digital-business acquirer
  geography: Italy (Milan) with global product portfolio
  company_stage: Private unicorn with pending US IPO registration statement
  research_date: 2026-06-16
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list and selected targets from public unicorn lists before research.
    - Used public web evidence only, including unicorn databases, company pages, news/search snippets and regulatory
      filings where available.
    - Treated public and company-owned sources as screening evidence; marked private checklist items
      not_publicly_verifiable rather than speculating.
    - No private data room, customer calls, paid database exports, management interviews or privileged documents were
      used.
  included_jurisdictions:
    - Italy (Milan)
    - Public global markets referenced by sources
  excluded_topics:
    - Private financial statements, cap table, board materials, customer contracts, supplier contracts, HRIS exports,
      privileged legal records and non-public security documents.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow target metadata for Bending Spoons
      type: workflow_request
      date_received: 2026-06-16
      notes: Selected as one of three uncovered private unicorn targets; slug bending-spoons; public valuation $11.0B-$11.71B
        October 2025; IPO filing targets higher public valuation.
