executive_summary:
  overall_assessment: Public evidence verifies an active private company with pending IPO, significant revenue, many
    acquisitions and a large software portfolio. The risk profile is high because growth depends on continuous
    acquisitions, leverage, integration and reputation-sensitive restructurings.
  investment_or_diligence_thesis: Bending Spoons has unusually rich public financial evidence because of its pending IPO
    filing, but diligence should focus on acquisition integration, debt, dual-class control, workforce restructuring and
    sustainability of subscription revenue growth.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources support unicorn/status screening for Bending Spoons.
      evidence_claim_ids:
        - EC-001
        - EC-005
    - founder_claim_id: FC-002
      summary: Public sources support active product/platform presence.
      evidence_claim_ids:
        - EC-002
        - EC-008
    - founder_claim_id: FC-003
      summary: Public sources provide user/customer/partner or distribution signals, but not concentration economics.
      evidence_claim_ids:
        - EC-004
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Acquisition integration and execution risk at large scale
    - risk_id: R-007
      summary: High financing/debt and public-market readiness risk
    - risk_id: R-008
      summary: Reputational and personnel risk from aggressive post-acquisition restructurings
  key_evidence_gaps:
    - Audited financials, KPI pack, cash/debt schedule and financing documents
    - Fully diluted cap table, preferences, option plan and investor rights
    - Top customer/supplier contracts, revenue concentration, churn/retention and reference calls
    - Technical architecture, security, roadmap, incident history and IP assignment records
    - Legal/regulatory/insurance schedules and HRIS/personnel/turnover data
  recommended_next_steps:
    - Do not rely on public-list valuation without financing documents and current financials.
    - Run customer, supplier, legal/regulatory, technical/security and HR diligence before investment reliance.
    - Ask management to reconcile public valuation/status evidence with current operating metrics and post-research-date
      events.
