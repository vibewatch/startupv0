risk_register:
  - risk_id: R-001
    risk_title: Regulatory business-model reset after Double Reduction
    risk_category: regulatory
    severity: critical
    likelihood: high
    description: The 2021 Chinese policy framework severely restricted for-profit K-12 tutoring, forcing legal-entity, product-mix, and capital-market changes across the sector.
    impacted_chapter_ids:
      - I
      - V
      - VIII
    impacted_section_ids:
      - I.B
      - V.A
      - VIII.G
    evidence_claim_ids:
      - EC-011
      - EC-012
    mitigation_or_diligence_request: Review every current business line against current Chinese education regulations, entity structure, licenses, and revenue dependence on any restricted activities.
  - risk_id: R-002
    risk_title: Financial opacity and stale valuation anchors
    risk_category: financial
    severity: high
    likelihood: high
    description: The best public valuation evidence is from 2020; post-2021 financial statements, margins, burn, debt, and current fair value are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.C
      - I.D
    evidence_claim_ids:
      - EC-003
      - EC-005
      - EC-006
      - EC-007
      - EC-018
    mitigation_or_diligence_request: Obtain audited statements, cap table, debt schedule, tax positions, and any post-2020 priced financing or secondary data before underwriting the equity story.
  - risk_id: R-003
    risk_title: Revenue and product-mix transition risk
    risk_category: product
    severity: high
    likelihood: medium
    description: Historic revenue depended heavily on live courses, while the current public portfolio emphasizes non-subject and AI-enabled products after the crackdown.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.A
      - II.A
      - V.C
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-011
      - EC-018
    mitigation_or_diligence_request: Request revenue and gross margin by product, cohort retention, refunds, and evidence that replacement products can offset the loss of restricted K-12 tutoring economics.
  - risk_id: R-004
    risk_title: AI quality, safety, privacy, and educational-outcome risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: Yuanfudao heavily markets AI personalization and automation, but public evidence does not provide model-governance detail, child-data controls, or outcome-validation methods.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VIII.D
    evidence_claim_ids:
      - EC-002
      - EC-007
      - EC-010
      - EC-013
    mitigation_or_diligence_request: Review model training, human-review loops, privacy controls, explainability, hallucination testing, and customer redress processes for minors.
  - risk_id: R-005
    risk_title: Consumer-cohort concentration and retention opacity
    risk_category: customer
    severity: medium
    likelihood: high
    description: The business publishes large user counts and app ratings but no current paying-user concentration, retention, refund, or cohort economics.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.C
      - V.B
    evidence_claim_ids:
      - EC-003
      - EC-005
      - EC-014
      - EC-015
      - EC-016
      - EC-018
    mitigation_or_diligence_request: Request cohort retention, refund rates, CAC, payback, top product concentrations, and revenue by region and user segment.
  - risk_id: R-006
    risk_title: Intense competitive pressure in Chinese edtech and AI learning tools
    risk_category: market
    severity: medium
    likelihood: high
    description: Yuanfudao competes with large, well-capitalized rivals and with broad free/low-cost education tools in a post-crackdown market that is structurally different from 2020.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-004
      - EC-005
      - EC-007
      - EC-019
    mitigation_or_diligence_request: Benchmark learning outcomes, user acquisition, pricing, teacher quality, and AI functionality against Zuoyebang, VIPKid, Yiqizuoye, and adjacent AI-study products.
  - risk_id: R-007
    risk_title: Advertising and compliance enforcement risk
    risk_category: legal
    severity: medium
    likelihood: medium
    description: The public record shows app-filing obligations and false-advertising / deceptive-pricing penalties, indicating ongoing regulatory sensitivity.
    impacted_chapter_ids:
      - V
      - VIII
    impacted_section_ids:
      - V.A
      - VIII.G
    evidence_claim_ids:
      - EC-009
      - EC-012
    mitigation_or_diligence_request: Review current advertising claims, price-promotion controls, app-compliance filings, and any open regulator correspondence or remediation plans.
  - risk_id: R-008
    risk_title: Organizational-complexity and workforce-transition risk
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Public sources describe a 30,000-employee footprint in 2020 and teaching centers across China; the post-2021 workforce reset is not public.
    impacted_chapter_ids:
      - VI
      - VII
    impacted_section_ids:
      - VI.A
      - VII.B
      - VII.G
    evidence_claim_ids:
      - EC-007
      - EC-010
      - EC-012
    mitigation_or_diligence_request: Obtain current headcount, attrition, teaching-center utilization, severance obligations, and organizational redesign materials after the crackdown.
  - risk_id: R-009
    risk_title: Child-data, app-governance, and trust risk
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Education apps for minors create elevated privacy, content-governance, and trust obligations that are not fully visible from public sources.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.E
      - VIII.G
    evidence_claim_ids:
      - EC-001
      - EC-009
      - EC-013
      - EC-014
      - EC-015
    mitigation_or_diligence_request: Review privacy policies, child-data retention, parental controls, app-store complaint trends, moderation controls, and incident history.
  - risk_id: R-010
    risk_title: Capital-structure and employee-incentive uncertainty
    risk_category: financing
    severity: medium
    likelihood: unknown
    description: Current shareholders, preferences, debt, and employee-equity incentives remain opaque despite large historical financing rounds.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - VII.E
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-018
    mitigation_or_diligence_request: Request the fully diluted cap table, preference stack, employee-option pool, any secondary programs, and all debt and guarantee schedules.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited income statements, cash flows, and current balance sheet
    why_it_matters: Needed to judge whether the post-crackdown business is profitable and solvent.
    suggested_source_or_request: Request audited annuals, YTD management accounts, and debt schedule from company finance team.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table and post-2020 financing history
    why_it_matters: Needed to assess dilution, liquidation preferences, and current equity value.
    suggested_source_or_request: Request the fully diluted cap table and all financing documents executed after 2020.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level pricing, retention, and learning outcomes
    why_it_matters: Needed to evaluate whether the current AI/non-subject portfolio is economically and educationally durable.
    suggested_source_or_request: Request product P&Ls, learning-outcome studies, and product cohort dashboards.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Current paid-user concentration, churn, refunds, and cohort economics
    why_it_matters: Large user counts are not enough to underwrite consumer quality or predictability.
    suggested_source_or_request: Request retention and refund data by product and cohort.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.A
    missing_information: Channel-level CAC, payback, and marketing controls
    why_it_matters: Needed to understand how Yuanfudao grows under stricter ad and tutoring rules.
    suggested_source_or_request: Request GTM dashboards, attribution data, and marketing review policies.
    priority: medium
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.A
    missing_information: Model governance, training-data provenance, and AI risk controls
    why_it_matters: AI is central to the thesis and to child-data / educational-trust risk.
    suggested_source_or_request: Request model inventory, data lineage, evaluation standards, and incident logs.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount, severance, and restructuring history
    why_it_matters: The best public workforce anchor is stale and may overstate the current scale.
    suggested_source_or_request: Request current org charts, headcount by function, and all restructuring records since 2021.
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Current regulator correspondence and remediation status
    why_it_matters: Past regulatory actions imply ongoing compliance sensitivity.
    suggested_source_or_request: Request all regulatory notices, remediation trackers, and product classification memos.
    priority: high
