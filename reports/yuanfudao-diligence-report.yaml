limitations:
  - limitation_id: L-001
    description: The report relies heavily on 2018-2020 public sources for financing, revenue, and headcount because post-2021 private-company disclosures are sparse.
    affected_chapter_ids:
      - I
      - VII
    affected_section_ids:
      - I.A
      - I.D
      - VII.B
  - limitation_id: L-002
    description: Several important sources were available only in Chinese and were translated conservatively; nuance may be lost compared with native-language legal or accounting review.
    affected_chapter_ids:
      - II
      - VI
      - VIII
    affected_section_ids:
      - II.A
      - VI.A
      - VIII.G
  - limitation_id: L-003
    description: No counsel-grade litigation or IP registry review was performed, so negative statements on lawsuits or IP schedules should be treated as provisional.
    affected_chapter_ids:
      - VIII
    affected_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
  - limitation_id: L-004
    description: App-store ratings and counts are dynamic and should be treated as current trust / distribution proxies rather than audited customer metrics.
    affected_chapter_ids:
      - III
      - V
    affected_section_ids:
      - III.A
      - V.A
