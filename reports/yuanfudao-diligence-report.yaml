executive_summary:
  overall_assessment: Yuanfudao was one of the world's most highly valued edtech unicorns at the 2020 peak, with clear public evidence of massive user scale, aggressive funding, a broad AI education product stack, and a large workforce. The current business remains active, but its post-2021 earnings quality and value are obscured by China's tutoring crackdown and by the company's private status.
  investment_or_diligence_thesis: The core diligence question is whether Yuanfudao successfully transformed a historically high-growth, live-course-heavy K-12 tutoring business into a compliant, durable, AI-led learning platform with defendable economics. Public evidence supports the transformation narrative but not its financial success.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Current public sources support an active AI-centric product suite spanning courses, Xiaoyuan AI, Zebra AI Study, programming, and related digital-learning products.
      evidence_claim_ids:
        - EC-001
        - EC-014
        - EC-015
        - EC-016
    - founder_claim_id: FC-003
      summary: Independent 2018-2020 reporting supports hundreds of millions of users and more than 1 million paid or full-price users at peak scale.
      evidence_claim_ids:
        - EC-003
        - EC-005
        - EC-006
        - EC-007
    - founder_claim_id: FC-004
      summary: Public evidence strongly supports Yuanfudao's long-standing claim that AI research and personalization are central to the product story.
      evidence_claim_ids:
        - EC-002
        - EC-007
        - EC-010
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: China's Double Reduction policy structurally undermined the historical tutoring model.
    - risk_id: R-002
      summary: The best public valuation anchor is still 2020, leaving current value and financial quality opaque.
    - risk_id: R-004
      summary: AI-driven education claims are material to the thesis but lack public evidence on model governance, child-data controls, and learning outcomes.
  key_evidence_gaps:
    - Current revenue, gross margin, cash, debt, refunds, and audited profitability by product line are not public.
    - Current cap table, employee-equity programs, debt, and any post-2020 priced financing or secondary transactions are not public.
    - Customer cohort quality, retention, refund behavior, and product-level revenue concentration are not public.
    - Current headcount, severance, and post-crackdown organizational redesign are not public.
    - Litigation, insurance, and contract schedules require counsel-led diligence.
  recommended_next_steps:
    - Obtain audited historicals and a post-2021 revenue bridge by product, channel, and legal entity before relying on the 2020 valuation story.
    - Run focused regulatory diligence covering product classification, non-profit / for-profit entity boundaries, and all correspondence with Chinese education regulators.
    - Review AI governance, child-data protection, model training, content rights, and learning-outcome validation for the current product suite.
    - Verify current headcount, teaching-center footprint, and restructuring costs after the 2021 sector reset.
    - Rebuild the financing story from the cap table forward, including preferences, debt, and any employee or investor liquidity since 2020.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public financing disclosures show an aggressive 2018-2020 scaling story culminating in a US$15.5B valuation, but the post-2021 financial model, current valuation, cap table, debt, and profitability are not publicly verifiable.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-008
      - EC-011
      - EC-018
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-010
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources provide historical user, revenue, and paid-user anchors, but no audited financial statements, AR aging, backlog, or management accounts.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A.1
            finding: 36Kr reported 2018 recognized revenue of RMB 1.5B, more than 1M paid users, and 70%-80% renewal, while 2020 reports highlighted 1M+ full-price users and 3.7M combined users across two flagship products.
            evidence_claim_ids:
              - EC-003
              - EC-005
              - EC-006
            risk_ids:
              - R-002
              - R-003
        hidden_risks:
          - Historical public revenue signals predate the 2021 regulatory reset and may not resemble the current earnings mix.
          - A large private-company operating footprint can hide deferred-revenue, refund, or teacher-cost volatility.
        evidence_gaps:
          - Audited income statements, balance sheets, cash flows, tax workpapers, refund reserves, and cohort gross-margin data were not public.
          - No public source reviewed disclosed accounts receivable aging, backlog, or current cash and debt balances.
        follow_up_questions:
          - Provide audited annual and quarterly financials for the last three years plus year-to-date management accounts and refund reserve schedules.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-005
          - EC-006
          - EC-018
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public forecast package was reviewed, and the 2021 regulatory reset materially weakens the predictive value of pre-crackdown operating metrics.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B.1
            finding: "The most important public forward-looking signal is negative: the Double Reduction policy removed key historical growth levers for for-profit K-12 tutoring providers."
            evidence_claim_ids:
              - EC-011
            risk_ids:
              - R-001
              - R-003
        hidden_risks:
          - Forecasts may be highly sensitive to product-mix shifts from subject tutoring toward AI and non-subject content.
          - Current growth assumptions could depend on regulatory interpretations that are not visible in public sources.
        evidence_gaps:
          - Three-year product, channel, and geography forecasts were not public.
          - No source disclosed board-approved capital-expenditure, hiring, or financing assumptions.
        follow_up_questions:
          - Provide the post-2021 board plan, sensitivity cases, and management assumptions by product line and entity.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-011
          - EC-018
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Historical investors are public, but shares outstanding, current ownership, employee equity, debt, and off-balance-sheet liabilities are not.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C.1
            finding: Public sources identify major historical investors such as Tencent, Hillhouse, DST Global, and other late-stage funds, but not the current fully diluted capitalization.
            evidence_claim_ids:
              - EC-005
              - EC-006
              - EC-007
            risk_ids:
              - R-002
              - R-010
        hidden_risks:
          - Late-stage financing terms, preferences, and any post-2020 secondaries could materially change common-equity value.
          - Entity conversion and regulatory restructuring after 2021 may have changed ownership architecture.
        evidence_gaps:
          - No reviewed public source disclosed the current cap table, option pool, debt, or guarantees.
          - No public source reviewed disclosed current shareholder percentages or liquidation preferences.
        follow_up_questions:
          - Provide the current cap table, debt schedule, shareholder register, and every financing instrument executed since 2020.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-007
          - EC-017
          - EC-018
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: "The public financing path is clear through 2020: valuation increased from above US$3B in 2018 to US$7.8B in April 2020 and US$15.5B in October 2020, after which current valuation became opaque."
        verification_status: verified
        confidence: high
        key_findings:
          - finding_id: I.D.1
            finding: Independent sources consistently reported the 2018 US$300M round, the 2020 US$1B Series G1 at US$7.8B, and the October 2020 G2 that brought total Series G funding to US$2.2B at a US$15.5B valuation.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-005
              - EC-006
              - EC-007
              - EC-008
            risk_ids:
              - R-002
              - R-010
        hidden_risks:
          - The valuation story is stale and may no longer reflect the economics of a post-crackdown education business.
          - Current debt, tax, and accounting policies were not publicly disclosed.
        evidence_gaps:
          - Tax positions, revenue-recognition policy, and post-2020 financing details were not public.
          - No reviewed source reconciled valuation, entity changes, and the current product mix after 2021.
        follow_up_questions:
          - Reconcile all historical funding rounds to current capitalization, tax structure, and present-day revenue composition.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-005
          - EC-006
          - EC-007
          - EC-008
          - EC-018
