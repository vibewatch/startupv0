report_metadata:
  report_title: Yuanfudao Startup Diligence Report
  target_company: Yuanfudao
  website: https://www.yuanfudao.com/
  known_aliases:
    - Yuanfudao
    - Yuanfudao Group
    - Beijing Yuanfudao Online Education Organisation
    - Beijing Yuanli Science and Technology Co., Ltd.
  sector: Online education, learning apps, and AI-enabled educational content
  geography: China
  company_stage: Private late-stage unicorn under post-2021 regulatory transformation
  research_date: 2026-06-10
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source diligence using Yuanfudao-owned product pages, public app-store metadata, independent venture and China-tech reporting, state-media interviews, and official Chinese policy texts.
    - No private data room, management interview, audited financial package, customer reference call, cap table, debt agreement, legal opinion, or insurance schedule was available.
    - Chinese-language materials were translated and interpreted conservatively; the report distinguishes observed facts from analyst judgment and highlights every important evidence gap.
    - Because the company operates in a regulated China edtech market, regulatory and product-mix questions are treated as first-order diligence issues rather than peripheral legal items.
  included_jurisdictions:
    - China
    - China app-distribution channels
    - Global private-capital market context
  excluded_topics:
    - Non-public audited statements, tax workpapers, debt covenants, shareholder registers, and employee-equity ledgers
    - Private customer cohorts, refund data, learning-outcome studies, and internal compliance memos
    - Counsel-grade litigation searches, registry-grade IP reviews, and insurance-policy analysis
  user_provided_materials:
    - material_id: UPM-001
      title: Assignment brief for a standard-depth public diligence memo on Yuanfudao
      type: workflow_request
      date_received: 2026-06-10
      notes: Target company specified as Yuanfudao, Chinese private edtech company, public evidence only.
    - material_id: UPM-002
      title: Candidate-selection seed from current uncovered unicorn pool
      type: workflow_request
      date_received: 2026-06-10
      notes: Yuanfudao was selected from an uncovered private-unicorn pool built from current public unicorn lists.
