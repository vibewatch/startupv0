report_metadata:
  report_title: The Boring Company Startup Diligence Report
  target_company: The Boring Company
  website: https://www.boringcompany.com/
  known_aliases:
    - TBC
    - The Boring Co.
    - The Boring Company, Inc.
  sector: Tunnel infrastructure, transportation systems, and tunneling equipment
  geography: United States; public project focus in Nevada, Texas, and California
  company_stage: Private unicorn / growth-stage infrastructure hardware company
  research_date: 2026-06-08
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: America/Los_Angeles
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an exclusion list from reports/*-diligence-report.yaml and selected this uncovered private-unicorn candidate
      from the fetched Wikipedia current-unicorn table using shuf -n 3.
    - Used public sources only, prioritizing the current unicorn list, company-owned pages, public reference pages,
      SEC/official records where reachable, and public-source search logs.
    - Treated company-owned statements as evidence of public claims, not independent proof of financial performance,
      customer satisfaction, safety, reliability, or legal compliance.
    - Marked audited financials, cap table, customer contracts, supplier contracts, detailed HR records, litigation
      schedules, insurance, and technical validation as not_publicly_verifiable where absent.
  included_jurisdictions:
    - United States
    - Nevada
    - Texas
    - California
  excluded_topics:
    - Private financial statements, cap table, debt instruments, customer contracts, supplier contracts, board
      materials, security reports, employee records, privileged legal analysis, and non-public regulatory
      correspondence.
    - Paywalled, blocked, or inaccessible sources were not bypassed; limitations are recorded where source access failed.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-08
      notes: No pitch deck, data room, financial model, founder response, customer reference, or private records were
        provided.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: The Boring Company is an uncovered private unicorn with a latest public valuation anchor of about US$5.7B
      from its April 2022 Series C round.
    claim_source: Fetched current unicorn-list source and public reference/company source where available
    claim_date: null
    mapped_chapter_ids:
