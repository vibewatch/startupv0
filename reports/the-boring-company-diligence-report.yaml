executive_summary:
  overall_assessment: The Boring Company is an eligible uncovered private-unicorn target based on the fetched current
    unicorn list and public materials reviewed. Public evidence supports a credible screening profile around US$5.7B and
    active product/channel signals, but the diligence posture is high-risk because the core financial, contract,
    customer-concentration, legal, HR, technical-validation, and current capitalization records are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. A positive thesis requires proving that The
    Boring Company's public product and market claims translate into durable revenue quality, defensible margins,
    enforceable contracts, resilient operations, clean IP/legal posture, and financing terms consistent with the public
    valuation anchor.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public sources provide a current unicorn / valuation screening anchor of US$5.7B.
      evidence_claim_ids:
        - EC-001
        - EC-004
    - founder_claim_id: FC-002
      summary: Company-owned sources verify the existence of public product and platform claims.
      evidence_claim_ids:
        - EC-002
        - EC-008
    - founder_claim_id: FC-003
      summary: Public materials identify customer, partner, user, or channel signals relevant to go-to-market diligence.
      evidence_claim_ids:
        - EC-003
        - EC-007
  biggest_risks:
    - risk_id: R-001
      summary: Vegas Loop economics depend on permits, station build-out, safety performance, and ridership that public
        sources do not independently audit.
    - risk_id: R-002
      summary: The model requires specialized equipment, construction execution, local approvals, and substantial capital
        before cash flows are proven.
    - risk_id: R-003
      summary: No audited financial statements, backlog, margin, debt, burn, or cap table were publicly available in this
        workflow.
  key_evidence_gaps:
    - Audited financial statements, revenue/GMV/ARR by product-channel-geography, gross margin, unit economics, cash
      runway, debt, tax, and planned-vs-actual results.
    - Current cap table, option pool, liquidation preferences, investor rights, secondary transactions, debt, and
      valuation bridge from the public unicorn anchor.
    - Top customer/partner/supplier contracts, revenue concentration, renewal/churn data, service levels, pricing,
      exclusivity, and independent references.
    - Technical validation, roadmap milestones, IP assignments, licenses, security/safety evidence, and product
      reliability data.
    - Legal docket search, regulatory correspondence, insurance policies/loss runs, material contracts, HRIS headcount,
      compensation, turnover, and employee-relations records.
  recommended_next_steps:
    - Refresh eligibility and valuation with primary financing records before relying on the public unicorn-list anchor.
    - Run financial quality-of-revenue and unit-economics diligence with accountant support.
    - Have counsel review legal, regulatory, IP, data/privacy, insurance, customer, supplier, financing, and employment
      schedules.
    - Interview top customers/partners/suppliers and validate product performance against private operating data.
  valuation_view: The US$5.7B valuation is a public screening anchor, not an underwriting conclusion. It must be
    reconciled to current financing terms, cash, debt, growth, margins, dilution, and risk.
  recommendation: High-risk confirmatory diligence only; do not underwrite from public sources alone.
