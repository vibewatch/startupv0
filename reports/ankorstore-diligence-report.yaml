diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited annual/quarterly financial statements, GMV/revenue, gross margin, burn, cash runway and credit-loss data.
    why_it_matters: Required to validate valuation, profitability path and financing needs.
    suggested_source_or_request: Audited accounts, monthly management pack, KPI dictionary, bank/debt schedules and credit-risk reports.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current fully diluted cap table, preferences, options, debt and post-2022 valuation marks.
    why_it_matters: Determines economics, dilution, preference overhang and down-round risk.
    suggested_source_or_request: Cap table, financing docs, investor-rights agreements, option plan and 409A/fair-value materials.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level usage, active SKU/brand counts, support metrics, roadmap and margin by product.
    why_it_matters: Public product claims do not prove adoption, monetization or quality.
    suggested_source_or_request: Product analytics, SKU activity, roadmap, support SLA/ticket reports and product P&Ls.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Customer revenue/GMV concentration, active-account definitions, retention and receivables aging.
    why_it_matters: Aggregate account counts may mask concentration, churn and credit losses.
    suggested_source_or_request: Customer-level export by GMV/revenue/margin/aging and cohort retention dashboards.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Payment partner, fulfilment/logistics vendors, cloud/technical vendors and supplier concentration.
    why_it_matters: Operational and financing counterparties could be critical single points of failure.
    suggested_source_or_request: Material vendor schedule, payment/fulfilment contracts, SLAs and contingency plans.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Competitive win/loss, market share, account overlap and pricing/take-rate benchmarks.
    why_it_matters: Public positioning does not establish durable moat versus Faire, Orderchamp, Creoate or offline channels.
    suggested_source_or_request: Win/loss data, cohort retention vs competitors, buyer/brand overlap study and pricing benchmark.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.D
    missing_information: Sales productivity, CAC/payback, channel mix, quota attainment and marketing budget ability.
    why_it_matters: Growth quality and ability to execute plan depend on efficient acquisition and sales coverage.
    suggested_source_or_request: Sales productivity dashboard, CAC/payback by channel, pipeline conversion and marketing budget plan.
    priority: high
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.A
    missing_information: Engineering org, architecture, security certifications, incident history, fraud/credit systems and data map.
    why_it_matters: Marketplace, payment, data and integration risks cannot be evaluated from public artifacts.
    suggested_source_or_request: Architecture docs, SOC/ISO reports, pen tests, incident log, engineering metrics and data/privacy documentation.
    priority: high
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Historical/projected headcount by function/location/entity, attrition and restructuring detail.
    why_it_matters: Public headcount signals indicate potential contraction and execution risk.
    suggested_source_or_request: HRIS export, monthly headcount, attrition, RIF documents, hiring plan and engagement surveys.
    priority: high
  - gap_id: G-010
    chapter_id: VII
    section_id: VII.E
    missing_information: Option plan, grant ledger, exercise prices, retention grants and compensation arrangements.
    why_it_matters: Retention and dilution risk may be acute after valuation reset or layoffs.
    suggested_source_or_request: Equity plan, grant ledger, compensation bands, executive contracts and retention/severance agreements.
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Complete IP portfolio, software ownership assignments, open-source scan and official trademark status.
    why_it_matters: Defensible moat and infringement/license risk cannot be concluded from one trademark signal.
    suggested_source_or_request: IP schedule, EUIPO/TMview records, invention assignments, open-source scan and license agreements.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation, regulatory correspondence, insurance policies and material contract schedules.
    why_it_matters: Legal exposure may be material and is not resolved by public-source review.
    suggested_source_or_request: Counsel letters, docket searches, insurance policies/claims, regulatory correspondence and material-contract schedule.
    priority: high
