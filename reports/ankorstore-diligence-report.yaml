report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: Ankorstore"
  target_company: Ankorstore
  website: https://www.ankorstore.com/
  known_aliases:
    - ANKORSTORE
    - Ankorstore SAS
    - Ankorstore Limited
    - Ankorlogistics
  sector: B2B wholesale marketplace / Consumer & Retail technology
  geography: France headquartered; European operations
  company_stage: Private unicorn / Series C
  research_date: 2026-05-22
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: EUR unless otherwise stated; CB Insights valuation reported in USD
  time_zone: Europe/Paris
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only
    - Prioritized primary company pages, official registries, investor announcements, reputable news/trade publications and competitor public pages
    - Facts not available in public sources are explicitly marked not_publicly_verifiable or unverified
    - All sources accessed_date set to 2026-05-22
  included_jurisdictions:
    - France
    - United Kingdom
    - European Union / Europe-wide public materials
  excluded_topics:
    - Non-public data room materials
    - Customer calls and supplier calls
    - Paid database exports
    - Personal data beyond public professional/company profiles
    - Legal advice or counsel-grade docket searches
  user_provided_materials: []
