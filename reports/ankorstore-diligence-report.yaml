          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No public financial projections, plan assumptions or budget-vs-actual performance were identified.
        verification_status: not_publicly_verifiable
        confidence: high
