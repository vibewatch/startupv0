        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources do not disclose audited annual or quarterly financial statements for the past three years. Evidence is limited to financing announcements, high-level growth metrics and public legal status.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: No audited income statement, balance sheet, cash-flow statement, GMV, revenue, gross margin, burn, cash or credit-loss data was publicly verified.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-001
        hidden_risks:
          - Headline GMV or account growth may not translate into revenue quality, gross margin, cash runway or low credit losses.
        evidence_gaps:
          - Audited financial statements; monthly management accounts; KPI dictionary; cash runway; credit-loss history.
        follow_up_questions:
          - Provide annual audited financials for 2023-2025, quarterly 2025/2026 management accounts, GMV-to-revenue bridge, cash runway and credit-loss reports.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-019
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
