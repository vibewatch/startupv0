          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Unicorn status and funding history are well supported by public sources, but current cap table, ownership, preferences and post-2022 valuation are not public.
        verification_status: partially_verified
        confidence: high
