risk_register:
  - risk_id: R-001
    risk_title: Core financial statements and unit economics unavailable
    risk_category: financial
    severity: high
    likelihood: high
    description: Public sources show financing and scale, but not revenue, GMV, gross margin, burn, cash, working-capital usage, credit losses or forecasts.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids:
      - EC-019
      - EC-020
    mitigation_or_diligence_request: Request audited statements, management accounts, KPI definitions, cash runway model, budget-vs-actuals and credit-loss/cohort reports.
  - risk_id: R-002
    risk_title: Deferred-payment and receivables financing exposure
    risk_category: financial
    severity: high
    likelihood: medium
    description: Retailer payment deferrals, brands paid on delivery, and assignment of receivables imply credit, funding, recourse and accounting complexity.
    impacted_chapter_ids:
      - I
      - II
      - VIII
    impacted_section_ids:
      - I.D
      - II.A
      - VIII.F
    evidence_claim_ids:
      - EC-005
      - EC-013
      - EC-027
    mitigation_or_diligence_request: Obtain payment-partner agreements, credit policy, receivables aging, default/loss history, insurance/guarantee arrangements and accounting memos.
  - risk_id: R-003
    risk_title: 2022 unicorn valuation may not reflect current fundamentals
    risk_category: financing
    severity: high
    likelihood: medium
    description: The public valuation anchors are from 2022 amid rapid-growth fundraising; current revenue, profitability, down-round risk and secondary-market pricing are not public.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - VII.B
    evidence_claim_ids:
      - EC-001
      - EC-004
      - EC-018
      - EC-020
    mitigation_or_diligence_request: Request latest cap table, 409A/fair-value work, financing docs, investor updates, secondary trades and board-approved plan.
  - risk_id: R-004
    risk_title: Intense wholesale marketplace competition
    risk_category: market
    severity: high
    likelihood: high
    description: Faire, Orderchamp, Creoate and offline wholesale channels offer similar assortment, buyer financing or risk-reduction propositions.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids:
      - EC-015
    mitigation_or_diligence_request: Benchmark take rate, CAC, retention, buyer overlap, SKU exclusivity, NPS and contribution margin against direct competitors.
  - risk_id: R-005
    risk_title: Customer and supplier concentration/churn not visible
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Aggregate brand/retailer counts do not show active cohorts, revenue concentration, strategic-account dependence, churn or severed relationships.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - III.E
      - V.B
    evidence_claim_ids:
      - EC-021
      - EC-022
    mitigation_or_diligence_request: Request top-customer/supplier schedules, active account definitions, cohort retention, churned strategic accounts and revenue by geography/category.
  - risk_id: R-006
    risk_title: Buyer-friendly pricing may pressure contribution margins
    risk_category: financial
    severity: high
    likelihood: medium
    description: No brand commission, price matching, low order minimums and deferred payment terms may require subsidies, financing costs or alternative monetization.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.D
      - II.A
      - V.E
    evidence_claim_ids:
      - EC-002
      - EC-005
      - EC-019
      - EC-028
    mitigation_or_diligence_request: Request unit-economics waterfall, take-rate by product, gross margin by cohort, subsidy/discount policy, payment costs and CAC/payback.
  - risk_id: R-007
    risk_title: Cross-border marketplace, data and payments compliance complexity
    risk_category: regulatory
