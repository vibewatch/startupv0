executive_summary:
  overall_assessment: Ankorstore is publicly supportable as an active French-founded private unicorn in B2B wholesale marketplaces, with strong evidence for its 2022 Series C, investor syndicate, European marketplace scale and active product/legal web presence. The key diligence posture is high public proof of financing narrative but low public proof of current financial quality, customer concentration, unit economics, credit risk, headcount health and legal exposure.
  investment_or_diligence_thesis: The investment case depends on whether Ankorstore converted its 2020-2022 hypergrowth and buyer-friendly terms into durable, profitable marketplace liquidity. Public evidence supports scale and brand/retailer value proposition; non-public diligence must validate active cohorts, margins, credit losses, current valuation and post-2022 organizational capacity.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Unicorn status and 2022 valuation are supported by CB Insights, Index Ventures, Alven and Retail Systems.
      evidence_claim_ids:
        - EC-001
        - EC-004
        - EC-006
        - EC-026
    - founder_claim_id: FC-002
      summary: Ankorstore operates a European wholesale marketplace with substantial public brand/retailer scale claims and current 30,000-brand homepage positioning.
      evidence_claim_ids:
        - EC-002
        - EC-004
        - EC-005
        - EC-008
        - EC-009
    - founder_claim_id: FC-005
      summary: French SAS and UK subsidiary active status are supported by official registry sources.
      evidence_claim_ids:
        - EC-010
        - EC-017
  biggest_risks:
    - risk_id: R-001
      summary: No public financial statements, unit economics, cash runway or credit-loss data.
    - risk_id: R-002
      summary: Deferred-payment and receivables-assignment model may create financing, credit and accounting exposure.
    - risk_id: R-003
      summary: 2022 unicorn valuation may not reflect current post-market-reset fundamentals.
    - risk_id: R-004
      summary: Competitive wholesale marketplace terms are replicable and rivalry appears intense.
    - risk_id: R-008
      summary: Public headcount signals suggest possible contraction and execution capacity risk.
  key_evidence_gaps:
    - Audited/management financials and forecast model
    - Current cap table, investor rights, debt/credit facilities and valuation marks
    - Customer/brand active-account, concentration, retention and receivables data
    - Payment-partner, fulfilment and material contract schedules
    - Engineering/security architecture and product roadmap
    - HRIS headcount/attrition/compensation/equity plan
    - Litigation/regulatory/insurance/counsel materials
  recommended_next_steps:
    - Open finance/cap-table data room first because public valuation evidence is stale to 2022.
    - Run focused credit/receivables diligence on deferred payments and payment-partner recourse.
    - Reconcile public account counts to active cohorts, GMV, revenue, gross margin and retention.
    - Perform people diligence on headcount contraction, attrition, leadership continuity and stock-option retention.
    - Have counsel review marketplace terms, payment/fulfilment contracts, privacy/data-processing artifacts, litigation, insurance and regulatory correspondence.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence strongly verifies Ankorstore's funding path and unicorn valuation but does not disclose the financial statements, forecasts, cap table details, cash runway, unit economics or credit-loss data needed for investment-grade financial diligence.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-007
    evidence_claim_ids:
      - EC-019
      - EC-001
      - EC-004
      - EC-006
      - EC-007
      - EC-008
      - EC-009
      - EC-020
      - EC-026
      - EC-027
      - EC-028
    risk_ids:
      - R-001
      - R-002
      - R-003
      - R-006
      - R-012
    sections:
