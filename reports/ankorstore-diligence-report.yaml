          - I.D.2
          - I.D.3
        summary: Other financial diligence focuses on receivables, working capital, payment-partner exposure and unit economics because public terms emphasize deferred payments and brand-friendly pricing.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Deferred retailer payments, brands paid on delivery and receivables assignment create credit and funding questions.
            evidence_claim_ids:
