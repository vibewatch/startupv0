    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Financial quality and revenue durability are not public
          severity: high
          likelihood: unknown
          rationale: Audited financials, ARR bridge, gross margin, burn, cash, debt, backlog, collections, revenue recognition, and cohort retention are private.
          evidence_claim_ids: &a1
            - EC-005
            - EC-024
          source_ids:
            - SRC-007
            - SRC-003
            - SRC-004
            - SRC-024
            - SRC-032
        - risk_id: R-002
          label: Rapid valuation step-up increases execution sensitivity
          severity: high
          likelihood: medium
          rationale: Public valuation reportedly moved from $1B in May 2025 to $3B in January 2026, creating high sensitivity to growth, margin, AI-cost, retention, and financing-term assumptions.
          evidence_claim_ids: &a2
            - EC-003
            - EC-004
          source_ids:
            - SRC-003
            - SRC-004
            - SRC-005
            - SRC-006
        - risk_id: R-003
          label: Company-published ARR and NRR require independent verification
          severity: high
          likelihood: unknown
          rationale: $50M ARR and 150% NRR are public company claims without public audit support.
          evidence_claim_ids: &a3
            - EC-005
          source_ids:
            - SRC-007
        - risk_id: R-004
          label: Customer concentration and renewal risk are opaque
          severity: high
          likelihood: unknown
          rationale: Named enterprise deployments are credible public signals, but revenue by customer, renewal schedule, customer concentration, and live paid status are not public.
          evidence_claim_ids: &a4
            - EC-010
            - EC-011
            - EC-012
            - EC-013
            - EC-014
            - EC-015
            - EC-024
          source_ids:
            - SRC-005
            - SRC-010
            - SRC-016
            - SRC-025
            - SRC-017
            - SRC-018
        - risk_id: R-005
          label: Crowded AI customer-experience market
          severity: medium
          likelihood: high
          rationale: Parloa competes with well-funded AI-agent and voice-AI vendors including Sierra, PolyAI, Cognigy, Decagon, Ada-like platforms, contact-center incumbents, and in-house enterprise builds.
          evidence_claim_ids: &a5
            - EC-020
          source_ids:
            - SRC-005
            - SRC-027
            - SRC-028
            - SRC-029
            - SRC-030
        - risk_id: R-006
          label: AI-agent reliability, hallucination, latency, and voice quality
          severity: high
          likelihood: medium
          rationale: Customer-facing voice/digital agents must operate under high-volume, real-time, regulated conditions; public pages claim simulation, guardrails, and testing but private telemetry is required.
          evidence_claim_ids: &a6
            - EC-007
            - EC-009
            - EC-012
          source_ids:
            - SRC-002
            - SRC-012
            - SRC-013
            - SRC-018
        - risk_id: R-007
          label: Privacy, security, and AI-governance exposure
          severity: high
          likelihood: medium
          rationale: Parloa processes customer-service data and uses providers including Microsoft Azure OpenAI and Salesforce per the privacy policy; regulated-industry deployments heighten GDPR, AI Act, HIPAA/PCI, and customer-contract exposure.
          evidence_claim_ids: &a7
            - EC-009
            - EC-021
          source_ids:
            - SRC-012
            - SRC-013
            - SRC-014
            - SRC-015
        - risk_id: R-008
          label: Third-party platform and model dependencies
          severity: medium
          likelihood: high
          rationale: Public integrations include major contact-center/CRM/ERP vendors, and the privacy policy names external processors; dependency, margin, and outage exposure are not public.
          evidence_claim_ids: &a8
            - EC-008
            - EC-021
          source_ids:
            - SRC-011
            - SRC-014
            - SRC-015
        - risk_id: R-009
          label: Execution load from fast hiring and U.S./Europe expansion
          severity: medium
          likelihood: medium
          rationale: The company reports more than 400 employees and lists approximately 60 roles across multiple geographies; rapid expansion can stress culture, controls, sales productivity, and management systems.
          evidence_claim_ids: &a9
            - EC-002
            - EC-018
          source_ids:
            - SRC-010
            - SRC-024
        - risk_id: R-010
          label: Legal/IP record remains thin in public diligence
          severity: medium
          likelihood: unknown
          rationale: Public research found trust/privacy/imprint and one WIPO-derived AMP trademark source, but no exhaustive litigation, patent, regulatory, insurance, or material-contract review was possible.
          evidence_claim_ids: &a10
            - EC-021
