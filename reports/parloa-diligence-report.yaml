executive_summary:
  overall_assessment: "Parloa appears eligible for this private-unicorn public diligence stream: public evidence shows it crossed $1B valuation in May 2025, later announced a $350M Series D at a $3B valuation in January 2026, operates an active AI Agent Management Platform, maintains public customer stories/trust/careers pages, and shows no public IPO/acquisition/shutdown signal. Investment reliance still requires private financial, customer, security, legal and cap-table diligence."
  investment_or_diligence_thesis: Proceed to confirmatory diligence only. The positive thesis is a fast-scaling, Berlin-rooted enterprise AI-agent platform with major customer and partner proof points in a large CX automation market. The underwriting question is whether ARR durability, gross margin after AI/model/telephony costs, customer concentration, product reliability, privacy/security controls and financing terms support the post-Series D valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Parloa publicly announced a $120M Series C at $1B and later a $350M Series D at $3B, corroborated by TechCrunch and press releases.
      evidence_claim_ids:
        - EC-003
        - EC-004
    - founder_claim_id: FC-002
      summary: Parloa publicly markets an AI Agent Management Platform for enterprise contact-center/customer-service workflows.
      evidence_claim_ids:
        - EC-001
        - EC-007
    - founder_claim_id: FC-003
      summary: Parloa identifies Malte Kosub and Stefan Ostwald as founders and reports more than 400 employees across New York, Berlin and Munich offices.
      evidence_claim_ids:
        - EC-002
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, revenue quality, margin, burn and cash runway are not public.
    - risk_id: R-002
      summary: Valuation reportedly rose from $1B to $3B in eight months, increasing execution and financing-term sensitivity.
    - risk_id: R-004
      summary: Public customer logos and stories do not disclose top-account concentration, renewals, churn or independent satisfaction.
    - risk_id: R-007
      summary: Privacy/security/AI-governance exposure is material for customer-service AI handling sensitive enterprise data.
    - risk_id: R-005
      summary: Competitive market is crowded with AI-agent, voice-AI and incumbent CX automation vendors.
  key_evidence_gaps:
    - Audited financials, ARR bridge, retention/churn, gross margin, cash/debt, AR aging and forecast model.
    - Cap table, financing documents, investor rights, preference stack, option plan and debt/off-balance-sheet obligations.
    - Customer ARR by account, top-20 concentration, contracts, renewal calendar, usage logs, SLA credits and independent references.
    - SOC/ISO report contents, security exceptions, penetration tests, incident logs, subprocessors, DPAs, DPIAs and AI governance.
    - Product telemetry, model/cloud/telephony COGS, uptime/latency, eval results, roadmap and implementation economics.
    - HRIS headcount, attrition, compensation, option grants, employment-law matters and complete management roster.
    - Counsel-reviewed litigation/regulatory searches, official IP records, insurance policies and material-contract schedule.
  recommended_next_steps:
    - Run financial/revenue-quality diligence before relying on ARR, NRR or valuation claims.
    - Perform customer diligence with top-account contracts, usage logs and independent reference calls.
    - Have security/privacy/AI-governance specialists review trust artifacts, DPAs, subprocessors and incident history.
    - Benchmark Parloa against Sierra, PolyAI, Cognigy, Decagon and incumbents using buyer interviews and win/loss data.
    - Have counsel review financing terms, cap table, IP assignments, contracts, litigation/regulatory matters and insurance.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies Parloa crossed the unicorn threshold with a $120M Series C at a $1B valuation in May 2025 and later announced a $350M Series D at a $3B valuation in January 2026. Revenue quality, profitability, cash, debt, cap table, working capital, and forecasts remain private.
    founder_claim_ids:
      - FC-001
      - FC-005
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-024
    risk_ids:
      - R-001
      - R-002
      - R-003
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: No audited financial statements or management accounts are public. Public company claims include $50M ARR and 150% NRR, but revenue recognition, gross margin, burn, cash, backlog, and AR aging are not publicly verifiable.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: Company-published ARR/NRR is a positive scale signal but cannot be underwritten without source financial records.
            evidence_claim_ids:
              - EC-005
            risk_ids:
              - R-001
              - R-003
          - finding_id: I.A-F2
            finding: Core checklist records—income statement, balance sheet, cash flow, footnotes, backlog and AR aging—are private.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-001
        hidden_risks:
          - ARR may include usage, platform, professional-services, or committed-contract components that public sources do not define.
          - AI inference and implementation costs could pressure gross margin despite strong ARR growth.
        evidence_gaps:
          - Audited financial statements for FY2023-FY2025 and YTD 2026.
          - ARR bridge, cohort retention, churn, revenue-recognition memo, gross-margin detail, cash/debt and AR aging.
        follow_up_questions:
          - Provide audited and management financials, ARR/NRR definitions, revenue by product/channel/geography, backlog, AR aging and cash runway.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-005
          - EC-024
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources show strong financing and growth momentum, but projections, pricing assumptions, capital expenditure, working capital, and external financing assumptions are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: The valuation step-up from $1B to $3B within roughly eight months creates a high bar for future growth and retention.
            evidence_claim_ids:
              - EC-003
              - EC-004
            risk_ids:
              - R-002
          - finding_id: I.B-F2
            finding: Market tailwinds for enterprise GenAI support applications are favorable but do not validate Parloa forecasts.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-005
        hidden_risks:
          - Forecasts may depend on continued U.S. expansion, partner execution, and AI-cost improvements.
          - Foreign exchange, regulatory and data-sovereignty assumptions are undisclosed.
        evidence_gaps:
          - Three-year quarterly model, scenario cases, pricing assumptions, AI model/cloud cost assumptions, hiring plan and financing plan.
        follow_up_questions:
          - Provide board-approved forecast model with ARR, bookings, churn, gross margin, AI-cost, capex, cash and financing scenarios.
        table_ids:
          - T-001
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-019
          - EC-024
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public funding announcements identify round sizes and investors, but shares outstanding, preferred terms, liquidation preferences, warrants, options, notes, debt and off-balance-sheet liabilities are private.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Publicly named investors include Durable Capital, General Catalyst, Altimeter, EQT Ventures, Newion, Senovo, Mosaic Ventures, La Famiglia Growth, Bessemer, Accel and NVentures depending on round.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-006
            risk_ids:
              - R-002
          - finding_id: I.C-F2
            finding: The current cap table and financing terms cannot be inferred from press releases.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-002
        hidden_risks:
          - Headline valuation may mask senior preferences, secondary shares, option-pool refreshes, pay-to-play or other structured terms.
          - Debt and off-balance-sheet obligations are not publicly visible.
        evidence_gaps:
          - Fully diluted cap table, option/warrant/note schedule, debt instruments, SAFEs/convertibles, investor rights and board approvals.
        follow_up_questions:
          - Provide cap table, financing documents, preference stack, debt/off-balance-sheet schedule, option plan and board consents.
        table_ids:
          - T-002
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-006
          - EC-024
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is publicly reconstructable at a high level; tax positions, revenue recognition, accounting policies and current basis for each round are not public.
        verification_status: not_publicly_verifiable
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: "Public financing sequence is consistent with a venture-backed private software company: Series A 2023, Series B 2024, Series C 2025, Series D 2026."
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-006
            risk_ids:
              - R-002
          - finding_id: I.D-F2
            finding: Tax, NOL, transfer-pricing, VAT/GST, and accounting policies are diligence gaps.
            evidence_claim_ids:
              - EC-024
            risk_ids:
              - R-001
        hidden_risks:
          - Multi-jurisdiction operations may create tax, transfer-pricing and VAT exposure.
          - Customer contracts across regulated industries may affect revenue-recognition policies.
        evidence_gaps:
          - Tax returns/positions, NOL schedule, revenue recognition policy, audit letters, financing-basis schedule.
        follow_up_questions:
          - Provide tax and accounting memos, revenue recognition by contract type, audit adjustments and financing basis per round.
        table_ids:
          - T-001
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-024
