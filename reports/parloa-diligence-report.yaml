risk_register:
  - risk_id: R-001
    risk_title: Financial quality and revenue durability are not public
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Audited financials, ARR bridge, gross margin, burn, cash, debt, backlog, collections, revenue recognition, and cohort retention are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request audited financial statements, management accounts, ARR waterfall, revenue-recognition memo, cohort/NRR/churn files, cash/debt schedule, and AR aging.
  - risk_id: R-002
    risk_title: Rapid valuation step-up increases execution sensitivity
    risk_category: financing
    severity: high
    likelihood: medium
    description: Public valuation reportedly moved from $1B in May 2025 to $3B in January 2026, creating high sensitivity to growth, margin, AI-cost, retention, and financing-term assumptions.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.C
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Review valuation bridge, investor preferences, option pool expansion, liquidation stack, ratchets, secondary components, and downside case.
  - risk_id: R-003
    risk_title: Company-published ARR and NRR require independent verification
    risk_category: financial
    severity: high
    likelihood: unknown
    description: $50M ARR and 150% NRR are public company claims without public audit support.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - V.D
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Tie ARR/NRR to invoices, contracts, usage, collections, churn definitions, and board reporting.
  - risk_id: R-004
    risk_title: Customer concentration and renewal risk are opaque
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Named enterprise deployments are credible public signals, but revenue by customer, renewal schedule, customer concentration, and live paid status are not public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request top-20 customer ARR, contract terms, renewals, usage logs, SLA credits, churn/downsells, and independent references.
  - risk_id: R-005
    risk_title: Crowded AI customer-experience market
    risk_category: market
    severity: medium
    likelihood: high
    description: Parloa competes with well-funded AI-agent and voice-AI vendors including Sierra, PolyAI, Cognigy, Decagon, Ada-like platforms, contact-center incumbents, and in-house enterprise builds.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Run buyer interviews, win/loss analysis, competitive pricing benchmarks, and renewal cohort analysis.
  - risk_id: R-006
    risk_title: AI-agent reliability, hallucination, latency, and voice quality
    risk_category: product
    severity: high
    likelihood: medium
    description: Customer-facing voice/digital agents must operate under high-volume, real-time, regulated conditions; public pages claim simulation, guardrails, and testing but private telemetry is required.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Review reliability metrics, latency distributions, eval suites, red-team results, incident logs, fallback processes, and model monitoring.
  - risk_id: R-007
    risk_title: Privacy, security, and AI-governance exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
