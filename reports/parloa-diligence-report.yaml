            evidence_claim_ids:
              - EC-009
              - EC-021
              - EC-024
            risk_ids:
              - R-007
              - R-010
        hidden_risks:
          - Coverage gaps could be material for AI output errors, data incidents, regulatory investigations or customer SLA claims.
          - Fast expansion may require multi-jurisdiction policy endorsements.
        evidence_gaps:
          - Insurance policies, limits, exclusions, claims history, customer-required coverage and broker letters.
        follow_up_questions:
          - Provide cyber/E&O/D&O/EPLI policies, claims history, exclusions, customer insurance requirements and broker summary.
        table_ids:
          - T-021
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-021
          - EC-024
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material customer, partner, supplier, financing and employment contracts are private. Public pages identify categories but not terms.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.F-F1
            finding: Public materials show customers, partners, integrations and financing but not contractual obligations.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-008
              - EC-016
              - EC-017
              - EC-024
            risk_ids:
              - R-002
              - R-004
              - R-008
              - R-010
        hidden_risks:
          - Customer contracts may contain stringent SLAs, data-processing, indemnity, termination, performance or regulated-industry obligations.
          - Supplier/model contracts may constrain pricing, data usage and failover.
        evidence_gaps:
          - Top customer contracts, SOWs, partner agreements, supplier/model/cloud contracts, financing docs, employment contracts and lease agreements.
        follow_up_questions:
          - Provide material-contract schedule, top customer/partner/supplier agreements, financing docs, SLA/indemnity summary and change-of-control restrictions.
        table_ids:
          - T-021
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-008
          - EC-016
          - EC-017
          - EC-024
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: No public regulatory-enforcement action was identified in targeted searches. Trust/privacy pages show GDPR/security posture but not regulatory correspondence or AI Act compliance mapping.
        verification_status: inconclusive
        confidence: medium
        key_findings:
          - finding_id: VIII.G-F1
            finding: Trust center and privacy policy support public compliance posture.
            evidence_claim_ids:
              - EC-009
              - EC-021
            risk_ids:
              - R-007
          - finding_id: VIII.G-F2
            finding: Absence of public enforcement results is not proof of clean regulatory history.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-010
        hidden_risks:
          - AI customer-service tools may be subject to GDPR, EU AI Act, telecom recording/consent, sector-specific obligations, HIPAA/PCI and customer data-processing requirements.
          - Regulatory correspondence may be confidential.
        evidence_gaps:
          - Regulatory correspondence, DPIAs, AI governance framework, EU AI Act classification, incident notifications, customer audits and security exceptions.
        follow_up_questions:
          - Have privacy/AI counsel review regulatory correspondence, DPIAs, AI Act mapping, incident logs, subprocessors and customer audit reports.
        table_ids:
          - T-021
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-009
          - EC-021
          - EC-023
          - EC-024
