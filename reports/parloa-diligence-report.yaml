report_metadata:
  report_title: Parloa Startup Diligence Report
  target_company: Parloa
  website: https://www.parloa.com/
  known_aliases:
    - Parloa GmbH
    - Parloa Inc.
    - Parloa AMP
    - AI Agent Management Platform
  sector: Enterprise AI agents, contact-center automation, customer-experience software
  geography: Germany / Berlin with public offices in New York, Berlin and Munich; global enterprise customers
  company_stage: Private venture-backed AI unicorn / growth-stage enterprise software company
  research_date: 2026-05-22
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Europe/Berlin
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public evidence only: company website, product/security/privacy/trust pages, customer stories, funding announcements, independent news, investor commentary, competitor pages, and targeted public legal/IP searches."
    - Validated private/unicorn/operating eligibility by checking public funding, active operating pages and hiring; no IPO, acquisition or shutdown signal was found.
    - Treated company-published revenue, customer and security statements as public claims requiring private verification before investment reliance.
    - Marked financial statements, cap table, contracts, customer concentration, legal dockets, insurance, HRIS and security-report contents as not_publicly_verifiable where not public.
  included_jurisdictions:
    - Germany
    - United States
    - European Union
    - United Kingdom and global customer-service jurisdictions implicated by public customers
  excluded_topics:
    - Private financial statements, cap table, contracts, customer references, security reports, board materials, employee records, paid databases, and non-public legal/regulatory records.
  user_provided_materials:
    - material_id: UPM-001
      title: CB Insights Complete List of Unicorn Companies extract for Parloa
      type: user_provided_public_list_extract
      date_received: 2026-05-22
      notes: User stated CB Insights list fetched 2026-05-22 listed Parloa at $1B, date joined 2025-05-06, Germany/Berlin, Enterprise Tech, investor Altimeter Capital.
