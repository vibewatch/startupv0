risk_register:
  - risk_id: R-001
    risk_title: Financial quality behind $1.9B valuation is private
    risk_category: financial
    severity: high
    likelihood: high
    description: ARR, growth, retention, gross margin, burn, cash runway, backlog,
      AR aging and plan-vs-actuals are not public; stale CB revenue makes
      valuation underwriting impossible without data-room records.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
      - V.D
      - V.E
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited/reviewed financials, monthly
      SaaS metrics, ARR bridge, cohort retention, margin/burn/runway model and
      board plan before investment decision.
  - risk_id: R-002
    risk_title: Customer concentration and retention are unknown
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Named enterprise customers are public, but revenue contribution,
      renewal status, churn, NRR and severed relationships are not publicly
      verifiable.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request top-customer ARR, contracts, renewal
      calendar, churn/NRR cohorts, customer-health scores and independent
      reference calls.
  - risk_id: R-003
    risk_title: AI model and product-performance claims require technical validation
    risk_category: technical
    severity: high
    likelihood: medium
    description: Palmyra, Knowledge Graph, agent autonomy and governance claims are
      central to differentiation but cannot be validated from marketing pages
      alone.
    impacted_chapter_ids:
      - II
      - VI
      - VIII
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Run architecture/model review, benchmark
      reproduction, red-team/security review, product demos, incident review and
      customer use-case validation.
  - risk_id: R-004
    risk_title: Crowded enterprise AI competition and commoditization pressure
    risk_category: market
    severity: high
    likelihood: high
    description: Writer competes with well-capitalized horizontal copilots,
      work-search AI platforms and marketing/writing AI platforms.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
      - V.C
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request win/loss, pricing/discounting,
      differentiation evidence, buyer references and competitive displacement
      analysis.
  - risk_id: R-005
    risk_title: Security, privacy and agentic-action risk
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Agentic workflows, connectors, data access and AI outputs increase
      enterprise security, privacy, auditability and regulatory exposure.
    impacted_chapter_ids:
      - III
      - VI
      - VIII
    impacted_section_ids:
      - III.E
      - VI.A
      - VIII.E
      - VIII.G
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review SOC/ISO artifacts, DPA/subprocessors,
      pen tests, incident history, access controls, audit logs and AI governance
      procedures.
  - risk_id: R-006
    risk_title: Legal, IP and contract schedules are incomplete publicly
    risk_category: legal
    severity: medium
    likelihood: medium
    description: Public records show some trademarks and terminated dockets, but
      pending matters, IP assignments, material contracts, insurance and
      negotiated liabilities are not public.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
      - VIII.E
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Counsel should obtain
      litigation/IP/regulatory/insurance schedules, run docket/IP searches, and
      review executed contracts.
  - risk_id: R-007
    risk_title: Enterprise GTM and implementation economics are not public
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Visible GTM channels include demo/trial, customer stories and
      partner programs, but CAC, sales cycle, quota productivity, service burden
      and partner revenue are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - V.A
      - V.C
      - V.D
      - V.E
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request CAC/payback, pipeline conversion, sales
      capacity, quota attainment, services margin and partner-sourced ARR.
  - risk_id: R-008
    risk_title: Team scaling, attrition and equity-retention gaps
    risk_category: team
    severity: medium
    likelihood: medium
    description: Leadership and offices are public, but total headcount, turnover,
      compensation and stock-plan details are not publicly verifiable.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.E
      - VII.F
      - VII.G
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request HRIS, attrition, comp/equity plans, org
      chart, retention grants, employee-relations schedule and key-person
      references.
  - risk_id: R-009
    risk_title: Cap-table preferences and financing waterfall unknown
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Public financing amounts do not disclose liquidation preferences,
      participating preferred, option pool, debt, warrants, secondary sales or
      side letters.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request full cap table, charter, financing
      docs, investor rights, side letters, debt/warrant/note schedule and
      current 409A.
  - risk_id: R-010
    risk_title: Company-authored customer ROI claims may overstate realized value
    risk_category: reputational
    severity: medium
    likelihood: high
    description: Customer outcome claims are useful but primarily company-published;
      buyer adoption, measurement methods and renewal impact require independent
      corroboration.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - V.B
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Validate ROI through customer calls, usage
      logs, before/after baselines and renewal/expansion outcomes.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited/reviewed financial statements, monthly management
      accounts, ARR/bookings/backlog, gross margin, burn, cash/debt and AR
      aging.
    why_it_matters: These are required to underwrite financial quality behind the
      $1.9B valuation.
    suggested_source_or_request: CFO/accountant data room and board reporting package.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, option plan, liquidation preferences,
      debt/warrants/notes, side letters and 409A history.
    why_it_matters: Financing economics may materially change investor returns and
      employee retention.
    suggested_source_or_request: Corporate counsel financing and capitalization binder.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, top-customer concentration, churn/NRR
      and renewal calendar.
    why_it_matters: Public logos do not establish durable or diversified revenue.
    suggested_source_or_request: Revenue operations export and customer contracts.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product architecture, reliability, model evaluation,
      benchmark reproducibility, incident history and SKU margins.
    why_it_matters: Product defensibility and cost structure are central to the thesis.
    suggested_source_or_request: CTO/product/security data room and live product demos.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: CAC, sales cycle, quota attainment, rep ramp, pipeline
      conversion and partner-sourced ARR.
    why_it_matters: GTM efficiency determines scalability and burn/runway.
    suggested_source_or_request: Sales operations dashboards and board GTM materials.
    priority: high
  - gap_id: G-006
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D roadmap, model costs, IP assignments, development
      budget and critical dependencies.
    why_it_matters: Agentic AI roadmap may require heavy compute/talent investment
      and clear IP ownership.
    suggested_source_or_request: R&D roadmap, model cards, IP schedule and engineering budget.
    priority: high
  - gap_id: G-007
    chapter_id: VII
    section_id: VII.B
    missing_information: HRIS, headcount by function/location, attrition,
      compensation and equity-grant data.
    why_it_matters: Execution and retention risk cannot be assessed from public
      leadership pages.
    suggested_source_or_request: People/HR data room and comp/equity schedules.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Complete litigation schedule and docket documents for
      identified and any non-public matters.
    why_it_matters: Public CourtListener metadata is limited and does not establish
      pending/no pending matters.
    suggested_source_or_request: Outside counsel litigation memo, PACER/state
      searches and disclosure schedule.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Full IP schedule, patent landscape, trademark assignment
      chain, OSS/model/data licenses.
    why_it_matters: Defensibility and infringement risk are core to enterprise AI value.
    suggested_source_or_request: IP counsel memo and engineering OSS/model-license audit.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.E
    missing_information: SOC reports, ISO certificates, pen tests, subprocessor
      list, incident log and insurance policies.
    why_it_matters: Security/privacy and insurance are critical for enterprise AI deployment.
    suggested_source_or_request: Security/legal data room and broker certificates.
    priority: high
