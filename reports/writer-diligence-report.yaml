        checklist_question_ids:
          - VIII.C.1
          - VIII.C.2
        summary: Writer appears to be a software company; public sources do not disclose
          environmental/safety issues, but workplace and AI-safety obligations
          still require review.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VIII.C-F1
            finding: Public offices/hybrid work are visible, but OSHA/workplace safety
              issues are not public.
            evidence_claim_ids:
              - EC-021
              - EC-026
            risk_ids:
              - R-006
          - finding_id: VIII.C-F2
            finding: AI safety/governance commitments are publicly described but
              implementation evidence is private.
            evidence_claim_ids:
              - EC-030
            risk_ids:
              - R-005
        hidden_risks:
          - Office/workplace claims or AI-safety regulatory changes could create
            liabilities.
        evidence_gaps:
          - Workplace safety records, policies, AI governance policies and
            regulatory correspondence.
        follow_up_questions:
          - Provide OSHA/workplace claims, workplace policies, AI governance
            policy and regulatory monitoring memo.
        table_ids:
          - T-020
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-021
          - EC-026
          - EC-030
      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        checklist_question_ids:
          - VIII.D
        summary: USPTO records support visible WRITER and PALMYRA trademark assets;
          broader patent/copyright/license/IP ownership remains private.
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: VIII.D-F1
            finding: USPTO records show registered WRITER and PALMYRA marks owned by Writer,
              Inc.
            evidence_claim_ids:
              - EC-025
            risk_ids:
              - R-006
          - finding_id: VIII.D-F2
            finding: Patents, copyrights, open-source/model licenses and assignment chains
              require legal review.
            evidence_claim_ids:
              - EC-025
              - EC-027
            risk_ids:
              - R-006
        hidden_risks:
          - Weak IP assignment or license conflicts could undermine
            defensibility.
        evidence_gaps:
          - IP schedule, assignments, patents, copyrights, model/data licenses
            and OSS audit.
        follow_up_questions:
          - Provide full IP schedule, invention assignments, patent landscape,
            trademark watch, OSS/model-license audit and infringement analysis.
        table_ids:
          - T-019
        figure_ids: []
        evidence_claim_ids:
          - EC-025
          - EC-027
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: Insurance coverage is not public; public trust/security claims imply
          cyber/E&O/D&O needs.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.E-F1
            finding: Public trust page asserts security/compliance controls but does not
              disclose insurance coverage.
            evidence_claim_ids:
              - EC-018
              - EC-027
            risk_ids:
              - R-005
              - R-006
        hidden_risks:
          - Cyber, AI errors, IP and D&O exposures may be underinsured.
        evidence_gaps:
          - Cyber, E&O, D&O, EPLI, CGL coverage, limits and claims history.
        follow_up_questions:
          - Provide insurance certificates, policies, exclusions, claims history
            and coverage opinions.
        table_ids:
          - T-020
        figure_ids: []
        evidence_claim_ids:
          - EC-018
          - EC-027
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Public template terms are available, but executed
          customer/supplier/material contracts and negotiated exceptions are
          private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.F-F1
            finding: Public platform services agreement addresses IP, restrictions, HIPAA,
              indemnity and liability.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-006
          - finding_id: VIII.F-F2
            finding: Order forms and customer/supplier-specific terms can override public
              templates and are not public.
            evidence_claim_ids:
              - EC-027
            risk_ids:
              - R-006
        hidden_risks:
          - Negotiated indemnity, data, SLA or termination terms could create
            hidden liabilities.
        evidence_gaps:
          - Executed MSAs/order forms/BAAs/vendor contracts, SLAs, indemnities,
            MFNs and termination rights.
        follow_up_questions:
          - Provide material contract list, top customer/supplier agreements,
            DPAs/BAAs, SLAs, change-of-control and termination provisions.
        table_ids:
          - T-020
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-019
          - EC-027
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: SEC Form D, privacy/DPA/trust materials and AI-governance claims are
          public; no comprehensive agency-enforcement review was completed.
        verification_status: inconclusive
        confidence: low
        key_findings:
          - finding_id: VIII.G-F1
            finding: SEC Form D is visible; privacy/security/public AI governance terms are
              visible.
            evidence_claim_ids:
              - EC-005
              - EC-018
              - EC-019
              - EC-026
              - EC-030
            risk_ids:
              - R-005
              - R-006
          - finding_id: VIII.G-F2
            finding: Agency enforcement, sanctions, privacy and labor regulatory checks
              require counsel tools and private disclosures.
            evidence_claim_ids:
              - EC-026
              - EC-027
            risk_ids:
              - R-006
        hidden_risks:
          - Privacy, AI, export-control, sanctions, labor or sector-specific
            issues may not be visible publicly.
        evidence_gaps:
          - Regulatory correspondence, enforcement, sanctions/export, privacy
            and AI compliance schedules.
        follow_up_questions:
          - Counsel should run FTC/state AG/privacy, sanctions/export, labor,
            AI-regulatory and sector-specific checks.
        table_ids:
          - T-020
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-005
          - EC-018
          - EC-019
          - EC-026
          - EC-027
          - EC-030
