executive_summary:
  overall_assessment: Writer passes the public eligibility screen for a
    private-unicorn diligence report. Public sources support an active
    enterprise AI company with a November 2024 $200M Series C at a $1.9B
    valuation, visible product suite, named enterprise customers, leadership
    team, trust/compliance posture and trademark assets. The diligence stance
    should remain confirmatory because financial quality, customer
    concentration, retention, contracts, security reports, cap table, HR data
    and comprehensive legal/regulatory schedules are not public.
  investment_or_diligence_thesis: A credible investment thesis would depend on
    proving that Writer can convert its visible enterprise AI platform and
    customer logos into durable ARR growth, high retention, efficient enterprise
    GTM, defensible model/RAG/agent capabilities, robust security/privacy
    controls and clean financing/legal/IP terms at the $1.9B valuation.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public CB Insights, WRITER and SEC sources support private-unicorn
        eligibility and active operations.
      evidence_claim_ids:
        - EC-001
        - EC-003
        - EC-005
    - founder_claim_id: FC-002
      summary: Series C amount is corroborated by company announcement and SEC Form D
        amount sold.
      evidence_claim_ids:
        - EC-003
        - EC-005
    - founder_claim_id: FC-003
      summary: Product suite existence and public positioning are well documented
        across WRITER product pages.
      evidence_claim_ids:
        - EC-008
        - EC-009
        - EC-023
    - founder_claim_id: FC-006
      summary: Founders, leadership and office footprint are publicly visible.
      evidence_claim_ids:
        - EC-020
        - EC-021
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, ARR, retention, gross margin, burn and runway are
        private.
    - risk_id: R-002
      summary: Public customer logos do not disclose revenue concentration, churn or
        NRR.
    - risk_id: R-003
      summary: Product/model/RAG/agentic performance claims need technical and
        customer validation.
    - risk_id: R-004
      summary: Enterprise AI competition is intense and includes larger platform
        vendors.
    - risk_id: R-009
      summary: Cap-table preferences and financing waterfall are unknown.
  key_evidence_gaps:
    - Audited/reviewed financials, ARR/NRR/churn, gross margin, cash/debt, burn,
      backlog and board plan.
    - Cap table, financing documents, preferences, side letters,
      debt/warrants/notes, option plan and 409A.
    - Top-customer ARR, contracts, renewal calendar, customer references,
      implementation costs and customer profitability.
    - Product architecture, model cards, benchmark data, security reports,
      incident history, subprocessor list and SOC/ISO artifacts.
    - Executed customer/supplier contracts, insurance, litigation/regulatory/IP
      schedules, HRIS, compensation and attrition data.
  recommended_next_steps:
    - Open confirmatory financial and cap-table diligence before relying on the
      $1.9B valuation.
    - Run customer diligence on top accounts, retention, deployment depth, ROI
      methodology and competitive displacement.
    - Conduct technical/security diligence on Palmyra, Knowledge Graph, agent
      workflows, connectors, governance and data controls.
    - Have counsel review litigation, IP, privacy/AI regulation, contracts,
      insurance and corporate records.
    - Validate GTM efficiency, sales productivity, partner economics,
      implementation margins and hiring/retention plan.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence supports Writer private-unicorn eligibility
      through CB Insights, company financing announcement and SEC Form D
      records; financial statements, ARR, margins, cash, debt, projections and
      capitalization terms remain the primary private diligence gaps.
    founder_claim_ids:
      - FC-001
      - FC-002
    evidence_claim_ids:
      - EC-001
      - EC-003
      - EC-004
      - EC-005
      - EC-006
      - EC-007
      - EC-028
    risk_ids:
      - R-001
      - R-009
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Only stale public revenue and company-authored ROI signals were
          located; annual/quarterly statements and management reports are not
          public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A-F1
            finding: CB Insights exposes a 2022 revenue datapoint of $2M but no current
              audited financials or ARR bridge.
            evidence_claim_ids:
              - EC-004
              - EC-007
            risk_ids:
              - R-001
          - finding_id: I.A-F2
            finding: Writer customer ROI and hours-saved claims are useful but do not
              replace revenue-quality records.
            evidence_claim_ids:
              - EC-003
              - EC-029
            risk_ids:
              - R-001
              - R-010
        hidden_risks:
          - Valuation may be disconnected from current revenue quality if
            growth, margins or retention disappoint.
        evidence_gaps:
          - Audited/reviewed financial statements, monthly management reports,
            ARR/bookings/backlog, gross margin, cash/debt, AR aging and
            plan-vs-actuals are private.
        follow_up_questions:
          - Provide monthly financials for 2023-2026 YTD, ARR waterfall, cohort
            retention, gross margin by product, cash/debt and AR aging.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-004
          - EC-007
          - EC-028
          - EC-029
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public sources disclose growth intent from Series C proceeds but not
          quarterly projections, economic assumptions, capital expenditures or
          financing assumptions.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: Series C proceeds are publicly intended to fuel agentic AI development
              and application expansion.
            evidence_claim_ids:
              - EC-028
            risk_ids:
              - R-001
              - R-009
          - finding_id: I.B-F2
            finding: Forecast assumptions, budgets and downside cases are absent from public
              sources.
            evidence_claim_ids:
              - EC-028
            risk_ids:
              - R-001
        hidden_risks:
          - Aggressive hiring/product investment could shorten runway if
            enterprise conversion lags.
        evidence_gaps:
          - Quarterly model, board plan, hiring budget, capex, working-capital
            and downside scenarios.
        follow_up_questions:
          - Provide board-approved three-year model, sensitivity cases, hiring
            and cloud/inference cost plan, and runway assumptions.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-028
          - EC-007
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify investors, Form D offering amount and related
          persons but not shares, preferences, options, debt or warrants.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C-F1
            finding: Public sources corroborate the November 2024 financing but not investor
              rights or ownership percentages.
            evidence_claim_ids:
              - EC-001
              - EC-003
              - EC-005
              - EC-006
            risk_ids:
              - R-009
          - finding_id: I.C-F2
