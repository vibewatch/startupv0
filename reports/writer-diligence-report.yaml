report_metadata:
  report_title: Writer Startup Diligence Report
  target_company: Writer
  website: https://writer.com/
  known_aliases:
    - WRITER
    - Writer, Inc.
    - Qordoba
  sector: Enterprise AI platform, generative AI, agentic workflow automation,
    enterprise software
  geography: United States; headquartered in San Francisco with public office
    footprint in San Francisco, New York and London
  company_stage: Private unicorn / growth-stage enterprise AI company
  research_date: 2026-06-09
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Performed eligibility screen before completing report: public CB
      Insights, WRITER, SEC and active-company sources support private unicorn
      status; no public IPO/acquisition/shutdown signal identified in standard
      public-source review."
    - "Collected public company-owned sources: homepage, funding announcement,
      product pages, customer pages, trust/security, pricing/plans, legal
      policies, leadership, careers/contact and partner pages."
    - "Collected third-party/public records: CB Insights unicorn/financial
      profiles, SEC EDGAR/Form D, CourtListener API metadata, USPTO trademark
      search/TSDR and competitor product pages."
    - Treated company-authored product, customer, ROI, trust and benchmark
      statements as public claims requiring confirmatory diligence, not
      independent proof of operational metrics.
    - Mapped findings to checklist chapters I-VIII and created tables/figures
      even where data-room records are required.
  included_jurisdictions:
    - United States
    - Delaware corporate / SEC federal securities records
    - California / San Francisco operating presence
    - United Kingdom public office footprint
    - Public competitor context across global enterprise AI software
  excluded_topics:
    - No private data room, management interview, customer reference call,
      accountant workpapers, counsel memo, SOC report, insurance certificates,
      cap table, HRIS export or executed contracts were available.
    - No paywalled/private databases beyond publicly visible CB Insights pages
      were used.
    - No non-public personal contact details or home addresses were included.
  user_provided_materials:
    - material_id: UPM-001
      title: User-provided CB Insights selected row and report instructions
      type: workflow_request
      date_received: 2026-06-09
      notes: Specified target company Writer, slug writer, CB Insights valuation
        $1.90B, date joined 11/12/2024, country United States, city San
        Francisco, industry Enterprise Tech and select investors.
