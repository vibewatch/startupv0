              option/debt schedules.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-009
        hidden_risks:
          - Liquidation preferences or side letters could materially alter
            common-equity economics.
        evidence_gaps:
          - Shares outstanding, stockholder list, options/warrants/notes, debt
            terms, side letters and waterfall.
        follow_up_questions:
          - Provide full cap table, option pool, financing documents, investor
            rights agreement, debt/warrant/note schedule and 409A.
        table_ids:
          - T-002
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-003
          - EC-005
          - EC-006
      - section_id: I.D
