            evidence_claim_ids:
              - EC-006
              - EC-007
            risk_ids:
              - R-001
        hidden_risks:
          - Tax/revenue-recognition or debt/off-balance-sheet obligations could
            be missed in public diligence.
        evidence_gaps:
          - Tax schedules, revenue-recognition policy, equity/warrant/debt
            financing history and investor basis.
        follow_up_questions:
