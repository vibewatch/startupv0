report_metadata:
  report_title: DFINITY Foundation Startup Diligence Report
  target_company: DFINITY Foundation
  website: https://dfinity.org/
  known_aliases:
    - Dfinity
    - DFINITY
    - DFINITY Stiftung
    - Dfinity Foundation
    - Internet Computer
    - ICP
    - DFINITY USA Research LLC
  sector: Cloud computing / blockchain infrastructure / sovereign cloud and AI application platform
  geography: Switzerland; United States affiliates; global Internet Computer ecosystem
  company_stage: Private unicorn-listed Swiss not-for-profit R&D foundation / growth-stage protocol ecosystem
  research_date: 2026-06-06
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Used only public sources accessed 2026-06-06: company/product pages, dashboard, GitHub, market databases, news, docket mirrors and patent search."
    - Treated company statements as evidence that claims are made, not independent proof of financial performance, customer revenue or technical superiority.
    - "Eligibility screen: no existing DFINITY report in reports/, CB Insights lists the company alive, current pages show activity, and no public IPO/acquisition/shutdown evidence was found in reviewed sources."
    - Marked financials, cap table, customer economics, contracts, legal schedules, HR records, insurance and tax details as not_publicly_verifiable where private records are required.
  included_jurisdictions:
    - Switzerland
    - United States
    - Pakistan partnership signal
    - Global Internet Computer network
  excluded_topics:
    - No private financial model, data room, customer calls, counsel letters, cap table, token wallet records, HRIS, tax files, insurance policies or signed contracts were available. No paywalls or private systems were bypassed.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow assignment for DFINITY Foundation diligence
      type: workflow_request
      date_received: 2026-06-06
      notes: "Provided initial metadata: slug dfinity; US$1.9B Wikipedia unicorn valuation; August 2018; cloud computing; Switzerland."
