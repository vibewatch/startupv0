  geography: "London-headquartered with Polish roots and global hubs including New York, Warsaw, San Francisco, Dublin, Tokyo, Seoul, Singapore, Bengaluru, Sydney, Sao Paulo, Berlin, Paris, and Mexico City"
  company_stage: "Private growth-stage decacorn"
  research_date: "2026-05-20"
  analyst: "GitHub Copilot CLI"
  report_version: "1.0"
  currency: "USD"
  time_zone: "UTC"
research_scope:
  diligence_depth: "deep_diligence"
  source_strategy:
    - "Public internet evidence only: company pages, funding announcements, docs, pricing, safety, legal dockets, news, competitor pages and market lists."
    - "Treat company ARR/customer/headcount claims as partially verified unless independently corroborated."
    - "Mark financial, cap table, contracts, security, IP, insurance and full litigation matters as gaps when not public."
  included_jurisdictions:
    - "United States"
    - "United Kingdom"
    - "Poland"
    - "European Union"
    - "Delaware"
    - "Illinois"
  excluded_topics:
    - "Non-public financials"
    - "Private cap table"
    - "Customer contracts"
    - "Source code/model weights"
    - "Paid databases"
    - "Full PACER/state/international docket search"
    - "Security audit files"
    - "Employee records"
  user_provided_materials:
    -
      material_id: "UM-001"
      title: "Orchestrator-provided unicorn list extract for ElevenLabs"
      type: "public market-list extract"
      date_received: "2026-05-20"
      notes: "Wikipedia List of unicorn startup companies via r.jina.ai reportedly listed ElevenLabs at $11B in February 2026, AI Audio technologies, country Poland."
