executive_summary:
  overall_assessment: "ElevenLabs is a fast-growing private AI audio decacorn with public evidence of an $11B Series D valuation, >$500M company-reported ARR, broad AI voice products, major investors, and marquee customer logos. Investment attractiveness is offset by high diligence risk around unaudited ARR quality, margins, customer concentration, legal/biometric exposure, training-data provenance, safety controls, security evidence and hypergrowth governance."
  investment_or_diligence_thesis: "Proceed only with data-room diligence focused on ARR quality, gross margin, consent/training-data legality, safety controls, customer contract durability, supplier economics and governance maturity."
  strongest_verified_claims:
    -
      founder_claim_id: "FC-001"
      summary: "Series D valuation/fundraise corroborated by company and CNBC sources."
      evidence_claim_ids:
        - "EC-006"
        - "EC-007"
        - "EC-019"
        - "EC-024"
    -
      founder_claim_id: "FC-003"
      summary: "Product breadth is directly visible on public product, docs and pricing pages."
      evidence_claim_ids:
        - "EC-001"
        - "EC-002"
        - "EC-009"
        - "EC-010"
        - "EC-027"
    -
      founder_claim_id: "FC-005"
      summary: "Public sources consistently show rapid global headcount expansion."
      evidence_claim_ids:
        - "EC-003"
        - "EC-004"
        - "EC-005"
        - "EC-008"
        - "EC-012"
        - "EC-013"
  biggest_risks:
    -
      risk_id: "R-002"
      summary: "Voice IP, likeness and biometric litigation exposure."
    -
      risk_id: "R-001"
      summary: "High valuation against unaudited private ARR and unknown margins/concentration."
    -
      risk_id: "R-003"
      summary: "Deepfake/misuse risk intrinsic to voice cloning and agents."
  key_evidence_gaps:
    - "Audited financials, ARR bridge, gross margin, burn, retention and customer concentration."
    - "Cap table, investor rights, tender terms and board governance."
    - "Training data provenance, voice consent, IP licenses, takedowns and legal reserves."
    - "Security/compliance attestations, incident logs, safety metrics and insurance."
    - "Customer contracts, supplier/GPU/cloud commitments and full litigation docket status."
  recommended_next_steps:
    - "Open financial/legal/security data room and reconcile public ARR to contracts/billing/GAAP revenue."
    - "Commission counsel-led IP, BIPA, privacy, DSA/AI Act and litigation review."
    - "Run independent technical benchmarks for quality, latency, cost, safety bypass and uptime."
    - "Conduct customer references and win/loss calls across enterprise, API and creator cohorts."
    - "Review HRIS, org chart, board materials, employment classification, attrition, compensation and equity."
