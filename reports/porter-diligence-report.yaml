      - ["City-density economics", "EY reports operations in 22 cities and large customer/driver-partner scale", "Review active-city P&Ls, order density, driver online hours, and contribution margin"]
      - ["Secondary liquidity signal", "Inc42 reports US$120M-US$150M secondary proceeds", "Review selling-holder rationale, employee liquidity, investor rights, and cap-table incentives"]
  - table_id: T-019
    title: Runway and capital-structure request list
    chapter_id: VI
    section_id: VI.B
    evidence_claim_ids: [EC-002, EC-003, EC-004]
    source_ids: [S-002]
    columns: [document_or_metric, public_reason_for_request, diligence_use]
    rows:
      - ["Signed Series F transaction documents", "Public financing report does not disclose preferences or investor rights", "Confirm liquidation stack, anti-dilution, veto rights, board rights, and protective provisions"]
      - ["Cap table and option-pool schedule", "Public valuation and investor names do not show ownership or dilution", "Assess founder/investor incentives, ESOP sufficiency, and secondary-sale impact"]
      - ["Bank statements and proceeds-flow schedule", "Primary proceeds may be materially below headline round size", "Verify cash runway, working-capital coverage, and use of proceeds"]
      - ["Debt and contingent-liability schedule", "Public reports do not disclose debt, liens, guarantees, or tax exposures", "Assess downside liquidity and covenant risk"]
      - ["Board-approved operating plan", "FY24 revenue/loss figures are not enough to assess runway", "Connect burn, hiring, incentives, capex, and city expansion to available capital"]
