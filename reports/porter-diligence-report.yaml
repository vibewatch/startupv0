risk_register:
  - risk_id: R-001
    title: Audited financial and unit-economic opacity
    category: financial
    severity: high
    likelihood: high
    status: open
    description: Public revenue/loss figures exist but audited statements, contribution margin, cash/debt, working capital, and city/product economics are not public.
    evidence_claim_ids: [EC-004]
    mitigation: Obtain audited accounts, management pack, bank statements, GMV/revenue bridge, and cohort/unit-economic model.
  - risk_id: R-002
    title: Public KPI inconsistency
    category: market
    severity: medium
    likelihood: high
    status: open
    description: Customer and city-count claims differ across public sources and may use different definitions.
    evidence_claim_ids: [EC-009, EC-016]
    mitigation: Request KPI data dictionary, raw cohorts, active-user definitions, and active-city list.
  - risk_id: R-003
    title: Secondary-heavy financing and cap-table uncertainty
    category: financing
    severity: high
    likelihood: medium
    status: open
    description: Inc42 reports secondary proceeds of US$120M-US$150M versus US$50M-US$80M primary in the Series F.
    evidence_claim_ids: [EC-003]
    mitigation: Review SPA/SHA, cap table, proceeds flow, investor rights, and use-of-proceeds plan.
  - risk_id: R-004
    title: Marketplace supply retention and driver welfare uncertainty
    category: operations
    severity: high
    likelihood: medium
    status: open
    description: Driver scale and welfare claims are public, but active supply, churn, earnings, grievances, and classification exposure are not verified.
    evidence_claim_ids: [EC-010, EC-012, EC-016, EC-017]
    mitigation: Request driver cohorts, earnings distribution, churn, grievances, contracts, and welfare utilization data.
  - risk_id: R-005
    title: Competitive pressure across multiple segments
    category: competition
    severity: medium
    likelihood: high
    status: open
    description: BlackBuck, Delhivery, Shiprocket, Shadowfax, and offline players overlap with different Porter use cases.
    evidence_claim_ids: [EC-018, EC-019, EC-020, EC-021]
    mitigation: Run price/SLA/win-loss benchmarking by segment and city.
  - risk_id: R-006
    title: Privacy, cybersecurity, and sensitive-data exposure
    category: legal_regulatory
    severity: high
    likelihood: medium
    status: open
    description: Public policy discloses sensitive location, KYC, background, bank, vehicle, and device data categories.
    evidence_claim_ids: [EC-011, EC-012, EC-013]
    mitigation: Conduct privacy/security audit, review consent flows, retention, encryption, vendor DPAs, breach logs, and incident response.
  - risk_id: R-007
    title: Legal, regulatory, claims, and insurance uncertainty
    category: legal_regulatory
    severity: high
    likelihood: medium
    status: open
    description: Transport, labor, consumer, tax, insurance, and litigation status are not publicly verifiable.
    evidence_claim_ids: []
    mitigation: Counsel-led review of corporate records, litigation searches, permits, tax, insurance, claims, and contracts.
  - risk_id: R-008
    title: Governance and key-person opacity
    category: governance
    severity: medium
    likelihood: medium
    status: open
    description: Founders are public, but board, controls, ownership, leadership depth, and succession are not.
    evidence_claim_ids: [EC-014]
    mitigation: Review org chart, board roster, employment agreements, equity schedules, and succession plan.
