limitations:
  - limitation_id: L-001
    description: This report uses public evidence only and does not include management interviews, data-room access, customer/driver references, paid databases, or counsel-verified searches.
    impact: Findings are suitable for screening and diligence planning, not a final investment decision.
  - limitation_id: L-002
    description: App-store metrics, company/profile sources, and media reports may change over time and may use inconsistent definitions.
    impact: Public customer, driver, city, and review counts should be treated as directional until reconciled with company data.
  - limitation_id: L-003
    description: Financing, valuation, and financial-statement claims are media/database reported and not verified against transaction documents or audited accounts.
    impact: Valuation, runway, liquidity, and economics require confirmatory diligence.
  - limitation_id: L-004
    description: Some potentially relevant public sources were inaccessible or blocked during research, including certain company, news, search, and profile pages.
    impact: Source coverage may omit public facts that were not accessible through reviewed channels.
  - limitation_id: L-005
    description: No legal opinion, technical audit, privacy audit, tax review, insurance review, or background check was performed.
    impact: Legal, regulatory, security, tax, claims, and integrity risk assessments remain preliminary.
