executive_summary:
  overall_assessment: Kiteworks appears eligible for this run as an active private unicorn based on the CB Insights $1B row and current company operating pages. Public evidence supports product breadth, regulated-market positioning, named customers/logos, private-equity investors, management and compliance assurance signals, but investment-grade diligence still requires private financials, cap table, retention, security packages, legal/IP schedules and customer references.
  investment_or_diligence_thesis: Kiteworks has credible public signals for a regulated-enterprise secure data exchange platform, with FedRAMP/trust artifacts and broad product coverage. The key diligence question is whether the $1B valuation is supported by durable ARR growth, retention, gross margin, channel efficiency and defensible security/compliance differentiation against MFT, collaboration-suite and data-security competitors.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists Kiteworks as a $1B unicorn row.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Company pages verify an active Private Data Network product suite.
      evidence_claim_ids:
        - EC-002
        - EC-003
        - EC-015
    - founder_claim_id: FC-005
      summary: Management, careers and newsroom pages support active operating/team signals.
      evidence_claim_ids:
        - EC-009
        - EC-010
        - EC-013
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and valuation support are private.
    - risk_id: R-003
      summary: Customer concentration, churn and NRR are not public.
    - risk_id: R-006
      summary: Security/compliance claims create high-stakes warranty, regulatory and reputational exposure.
  key_evidence_gaps:
    - Audited financials, ARR/bookings bridge, gross margin, cash, debt, burn and forecast model.
    - Cap table, preferences, option pool, warrants/notes/debt and financing documents.
    - Top customer ARR, churn, NRR, contracts, support metrics and reference calls.
    - SOC/FedRAMP/security package scope, incident history, pen-test remediation and DPAs.
    - Litigation, IP/open-source, insurance and material-contract schedules.
  recommended_next_steps:
    - Run finance and revenue-quality diligence before relying on the headline valuation.
    - Request cap table and financing documents to model downside preference stack and dilution.
    - Validate customer quality through cohorts, contracts, references and support metrics.
    - Have counsel and security specialists review FedRAMP/SOC/privacy, IP, incident, insurance and material-contract materials.
    - Benchmark product/pricing against MFT, secure collaboration and data-security competitors using buyer references and win/loss data.
