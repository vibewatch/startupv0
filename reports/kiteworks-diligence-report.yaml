    affected_chapter_ids:
      - I
      - III
      - V
      - VII
      - VIII
    affected_section_ids:
      - I.A
      - I.C
      - III.C
      - V.C
      - VII.B
      - VIII.A
      - VIII.D
      - VIII.G
  - limitation_id: L-002
    description: Company-owned pages are evidence of public claims, not independent proof of revenue, customer economics, security effectiveness or legal status.
    affected_chapter_ids:
      - I
      - II
      - III
      - VIII
    affected_section_ids:
      - I.A
      - II.A
      - III.A
      - VIII.G
