report_metadata:
  report_title: Kiteworks Startup Diligence Report
  target_company: Kiteworks
  website: https://www.kiteworks.com/
  known_aliases:
    - Kiteworks
    - Kiteworks, Inc.
    - Accellion
    - Accellion Kiteworks
    - Private Data Network
  sector: Enterprise technology / secure content communications, managed file transfer, data governance and compliance software
  geography: United States; Palo Alto/San Mateo, California with global regulated-enterprise and public-sector positioning
  company_stage: Private unicorn / growth-stage enterprise software company
  research_date: 2026-06-12
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built an existing-report exclusion list and selected Kiteworks as a randomized replacement after SITECH DEV eligibility became inconclusive.
    - Used public CB Insights, Kiteworks company, product, pricing, customer, investor, management, careers, trust, FedRAMP, partner and newsroom pages.
    - Treated company-owned claims as public statements unless corroborated; marked financials, cap table, customer economics, HR, legal, IP, insurance and contract schedules as not_publicly_verifiable.
  included_jurisdictions:
    - United States
    - Global privacy/security and regulated-industry contexts referenced by public materials
    - US federal cloud/FedRAMP context
  excluded_topics:
    - Private data room
    - Management interviews
    - Customer/supplier calls
    - Full PACER/state docket pulls
    - Paywalled databases
    - Non-public regulator correspondence
  user_provided_materials:
    - material_id: UPM-001
      title: Random unicorn diligence workflow selection context
      type: workflow_request
      date_received: 2026-06-12
      notes: "Replacement target row from CB Insights parse: Kiteworks, slug kiteworks, $1B valuation, date joined 2024-08-14, United States/Palo Alto/Enterprise Tech."
