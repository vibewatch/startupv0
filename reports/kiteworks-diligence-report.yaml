risk_register:
  - risk_id: R-001
    risk_title: Financial quality and valuation support
    risk_category: financial
    severity: high
    likelihood: unknown
    description: Public evidence verifies a $1B CB valuation row but not audited revenue, ARR bridge, margins, cash runway or debt.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a75
    mitigation_or_diligence_request: Request audited financials, KPI pack, ARR/bookings bridge, customer cohort metrics, cash/debt and board-approved forecasts.
  - risk_id: R-002
    risk_title: Cap-table and financing stack opacity
    risk_category: financing
    severity: high
    likelihood: unknown
    description: Investor names are public, but ownership, preferences, debt, warrants, secondary terms and option pool are private.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
    evidence_claim_ids: *a76
    mitigation_or_diligence_request: Request cap table, financing documents, liquidation preference schedule, debt/warrant/SAFE schedule and option ledger.
  - risk_id: R-003
    risk_title: Customer concentration and retention opacity
    risk_category: customer
    severity: high
    likelihood: unknown
    description: Customer logos and ratings do not disclose revenue concentration, churn, NRR, renewal terms or support escalations.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - V.B
    evidence_claim_ids: *a77
    mitigation_or_diligence_request: Request top-customer ARR, contracts, renewal cohorts, churn/NRR and reference calls.
  - risk_id: R-004
    risk_title: Go-to-market efficiency and channel dependence
    risk_category: market
    severity: medium
    likelihood: unknown
    description: Partner ecosystem and quote-based enterprise GTM are public, but channel mix, pipeline conversion and CAC/payback are private.
    impacted_chapter_ids:
      - V
      - III
    impacted_section_ids:
      - V.A
      - V.C
      - III.B
    evidence_claim_ids: *a78
    mitigation_or_diligence_request: Request pipeline, bookings by channel, partner concentration, CAC/payback and win/loss data.
  - risk_id: R-005
    risk_title: Product complexity and roadmap execution
    risk_category: product
    severity: medium
    likelihood: medium
    description: Broad PDN, MFT, email, forms, DRM and Compliant AI scope may create integration, support and delivery complexity.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.B
    evidence_claim_ids: *a79
    mitigation_or_diligence_request: Review product usage by SKU, roadmap commitments, support tickets, SRE metrics and security architecture.
  - risk_id: R-006
    risk_title: Security/compliance warranty exposure
    risk_category: regulatory
    severity: high
    likelihood: medium
    description: Kiteworks sells into regulated security workflows; any control failure can create customer, regulatory and reputational exposure.
    impacted_chapter_ids:
      - VIII
      - II
    impacted_section_ids:
      - VIII.G
      - II.A
    evidence_claim_ids: *a80
    mitigation_or_diligence_request: Counsel and security specialists should review SOC/FedRAMP packages, pen tests, incident history, DPAs and contractual liability caps.
  - risk_id: R-007
    risk_title: Legal and IP schedule not public
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public sources do not provide comprehensive litigation, IP ownership, open-source, license or insurance schedules.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.D
      - VIII.E
      - VIII.F
    evidence_claim_ids: *a81
    mitigation_or_diligence_request: Request counsel-prepared litigation, IP, open-source, insurance and material-contract schedules.
  - risk_id: R-008
    risk_title: Leadership and hiring scalability
    risk_category: team
    severity: medium
    likelihood: unknown
    description: Management roster and careers page are public, but org chart, attrition, compensation and succession depth are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.G
    evidence_claim_ids: *a82
    mitigation_or_diligence_request: Request HRIS export, org chart, attrition/engagement data, compensation bands and succession plan.
  - risk_id: R-009
    risk_title: Competitive pressure from MFT, file-share and DSPM incumbents
    risk_category: market
    severity: medium
    likelihood: high
    description: Kiteworks competes with MFT, enterprise content, cloud collaboration and data-security vendors with larger distribution.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a83
    mitigation_or_diligence_request: Run win/loss interviews against Fortra, Progress, Box, Microsoft, Egnyte, ShareFile and data-security governance vendors.
  - risk_id: R-010
    risk_title: Government and regulated-market compliance burden
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: FedRAMP and CMMC-oriented selling can lengthen procurement and require continuous controls maintenance.
    impacted_chapter_ids:
      - VIII
      - V
    impacted_section_ids:
      - VIII.G
      - V.A
    evidence_claim_ids: *a84
    mitigation_or_diligence_request: Review ATO/FedRAMP monitoring, government pipeline, compliance staffing and renewal requirements.
  - risk_id: R-011
    risk_title: Partner/distributor dependency
    risk_category: operational
    severity: medium
    likelihood: unknown
    description: Channel First and technology partners are important public GTM signals, but partner concentration and economics are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - V.C
    evidence_claim_ids: *a85
    mitigation_or_diligence_request: Request partner contracts, reseller margins, co-sell pipeline, renewal control and termination rights.
  - risk_id: R-012
    risk_title: Review-site evidence may not represent enterprise buyer reality
    risk_category: reputational
    severity: low
    likelihood: medium
    description: Embedded review ratings are positive but may be curated and do not substitute for independent buyer references.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
    evidence_claim_ids: *a86
    mitigation_or_diligence_request: Conduct independent customer and lost-deal calls.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR/bookings bridge, gross margin, cash/debt/burn
    why_it_matters: Needed to support valuation and runway
    suggested_source_or_request: Request finance data-room package from company
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Cap table, preferences, warrants/notes, option ledger and investor rights
    why_it_matters: Needed to model ownership and downside stack
    suggested_source_or_request: Request financing and corporate records
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Top customer ARR, churn, NRR, renewal and support metrics
    why_it_matters: Needed to assess concentration and revenue durability
    suggested_source_or_request: Request customer ledger and references
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.C
    missing_information: Pipeline, CAC/payback, quota attainment and channel mix
    why_it_matters: Needed to assess GTM efficiency
    suggested_source_or_request: Request sales/marketing KPI pack
    priority: medium
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Roadmap cost, adoption by SKU, uptime/SRE and security engineering metrics
    why_it_matters: Needed to validate product execution
    suggested_source_or_request: Request product/engineering KPI pack
    priority: medium
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Org chart, HRIS, attrition, compensation and equity plans
    why_it_matters: Needed to assess team scalability and retention
    suggested_source_or_request: Request HR data-room package
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.G
    missing_information: FedRAMP/SOC/ISO reports, POA&Ms, pen tests, incident history and DPAs
    why_it_matters: Needed to validate compliance claims and liability exposure
    suggested_source_or_request: Request security/legal review package
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Patent, trademark, copyright, open-source and assignment schedules
    why_it_matters: Needed to confirm IP ownership and license risk
    suggested_source_or_request: Request counsel-prepared IP schedule
    priority: medium
