report_metadata:
  report_title: "Plaid Startup Diligence Report"
  target_company: "Plaid"
  website: "https://plaid.com/"
  known_aliases:
    - "Plaid Inc."
    - "Plaid"
  sector: "Financial technology / open banking data infrastructure"
  geography: "United States / global"
  company_stage: "Private late-stage unicorn"
  research_date: "2026-05-23"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "UTC"

research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - "Public-source diligence using company-owned pages, public financial/news references, public legal/regulatory records, competitor pages, and public patent/search mirrors."
    - "No private data room, management interview, customer reference call, audited financial statement, cap table, board deck, security report, or counsel letter was available."
    - "Company-published metrics are treated as management/public claims, not audited operating results."
  included_jurisdictions:
    - "United States"
    - "Publicly disclosed global operating footprint"
    - "Open-banking regulatory context where publicly relevant"
  excluded_topics:
    - "Non-public financial statements and management accounts"
    - "Private customer contracts, churn cohorts, and reference calls"
    - "Private cap table, debt, SAFE/note, option, and liquidation-preference schedules"
    - "Non-public employee records, compensation, incident history, and board materials"
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Selected unicorn-list seed evidence for Plaid"
      type: "workflow_request"
      date_received: "2026-05-23"
      notes: "Seed listed Plaid, slug plaid, US$13.4B valuation in April 2021, financial technology, United States, from Wikipedia list of unicorn startup companies."

founder_claims:
  - founder_claim_id: "FC-001"
    claim_text: "Plaid appears on a public unicorn list at a US$13.4B valuation dated April 2021."
    claim_source: "User-provided unicorn-list seed evidence"
    claim_date: "2021-04"
    mapped_chapter_ids: ["I"]
    mapped_section_ids: ["I.D"]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: ["EC-001", "EC-005"]
    contradiction_summary: "The April 2021 valuation is verified as a public list anchor; current fair value and more recent secondary pricing require separate diligence."
    diligence_follow_up:
      - "Request current capitalization table, financing documents, and secondary transaction support."
  - founder_claim_id: "FC-002"
    claim_text: "Plaid is eligible for private-company unicorn diligence because it is private, not IPO'd, not acquired, and not shut down based on public evidence reviewed."
    claim_source: "Eligibility screen from public sources"
    claim_date: "2026-05-23"
    mapped_chapter_ids: ["I", "VIII"]
    mapped_section_ids: ["I.C", "VIII.F"]
    verification_status: verified
    confidence: medium
    evidence_claim_ids: ["EC-001", "EC-002", "EC-003", "EC-004"]
    contradiction_summary: null
    diligence_follow_up:
      - "Confirm corporate standing, subsidiaries, and current ownership directly with company counsel."
  - founder_claim_id: "FC-003"
    claim_text: "Plaid offers a broad API product suite for financial data, verification, payments, identity, and related use cases."
    claim_source: "Plaid product and developer pages"
    claim_date: null
    mapped_chapter_ids: ["II", "VI"]
    mapped_section_ids: ["II.A", "VI.B"]
    verification_status: verified
    confidence: high
    evidence_claim_ids: ["EC-008", "EC-009", "EC-025"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request product-level revenue, margin, usage, roadmap, uptime, and support metrics."
  - founder_claim_id: "FC-004"
    claim_text: "Plaid works with over 7,000 fintech partners and has visible customer proof."
    claim_source: "Plaid company and customer pages"
    claim_date: null
    mapped_chapter_ids: ["III", "V"]
    mapped_section_ids: ["III.A", "V.B"]
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids: ["EC-007", "EC-013", "EC-021"]
    contradiction_summary: "Public pages support logo/customer proof but do not disclose top-customer revenue, concentration, churn, or contract quality."
    diligence_follow_up:
      - "Request top-customer schedule, cohort retention, churn, NRR, and reference permissions."
  - founder_claim_id: "FC-005"
    claim_text: "Plaid operates in a privacy-sensitive, regulated open-banking environment."
    claim_source: "Public legal, privacy, settlement, and Federal Register sources"
    claim_date: null
    mapped_chapter_ids: ["VIII"]
    mapped_section_ids: ["VIII.G"]
    verification_status: verified
    confidence: high
    evidence_claim_ids: ["EC-014", "EC-016", "EC-017", "EC-019"]
    contradiction_summary: null
    diligence_follow_up:
      - "Request regulatory exams, privacy/security audits, consent-flow testing, complaints, and counsel letters."

executive_summary:
  overall_assessment: "Plaid is publicly eligible for private unicorn diligence: public sources show a private US fintech with an April 2021 US$13.4B unicorn valuation anchor and a terminated Visa acquisition, while official pages show active products, customers, hiring, and status pages."
  investment_or_diligence_thesis: "Plaid's diligence case rests on whether a large open-banking network can convert broad API/customer adoption into durable, compliant, profitable revenue despite valuation reset risk, regulatory scrutiny, bank/network dependencies, and intense competition."
  strongest_verified_claims:
    - founder_claim_id: "FC-001"
      summary: "Wikipedia's unicorn list and Plaid Inc. page support the US$13.4B April 2021 valuation anchor."
      evidence_claim_ids: ["EC-001", "EC-005"]
    - founder_claim_id: "FC-002"
      summary: "Public evidence reviewed supports private-company eligibility and shows the Visa acquisition was abandoned."
      evidence_claim_ids: ["EC-002", "EC-003", "EC-004"]
    - founder_claim_id: "FC-003"
      summary: "Plaid's own product and docs pages show a broad API suite."
      evidence_claim_ids: ["EC-008", "EC-009"]
  biggest_risks:
    - risk_id: "R-001"
      summary: "Financial quality and valuation opacity"
    - risk_id: "R-007"
      summary: "Regulatory, privacy, and legal exposure"
    - risk_id: "R-003"
      summary: "Customer concentration, churn, and revenue predictability opacity"
  key_evidence_gaps:
    - "Audited financials, monthly KPI pack, cash, debt, revenue recognition, gross margin, product P&L, and cash runway."
    - "Current cap table, preference stack, financing documents, secondary pricing, warrants, options, SAFEs, notes, and debt."
    - "Top-customer revenue, churn, NRR, contract terms, bank/partner dependencies, and supplier concentration."
    - "Regulatory exams, privacy/security incident history, consent-flow audits, pending litigation schedules, and counsel letters."
    - "Technical architecture, uptime/incident history, roadmap, IP ownership schedule, and open-source/license review."
  recommended_next_steps:
    - "Verify current capitalization, valuation support, and runway before underwriting the April 2021 valuation anchor."
    - "Run regulatory/privacy/security legal diligence across consent flows, data retention, CFPB 1033 impacts, and settlement compliance."
    - "Obtain customer concentration, churn, cohort retention, and customer-reference evidence before relying on public logo proof."
    - "Benchmark Plaid's pricing, coverage, reliability, and win/loss against Yodlee, MX, Tink, Stripe Financial Connections, and bank-owned rails."
    - "Review product-level P&Ls, partner agreements, status/incident logs, security reports, patent assignments, and employment/IP agreements."

chapters:
  - chapter_id: "I"
    title: "Financial Information"
    chapter_summary: "Public sources verify major valuation and financing anchors, but audited financial quality, runway, cap table, debt, and projections are not publicly verifiable."
    founder_claim_ids: ["FC-001", "FC-002"]
    evidence_claim_ids: ["EC-001", "EC-002", "EC-005", "EC-006", "EC-022", "EC-023"]
    risk_ids: ["R-001", "R-002", "R-010"]
    sections:
      - section_id: "I.A"
        title: "Annual and quarterly financial information for the past three years"
        checklist_question_ids: ["I.A.1", "I.A.2", "I.A.3", "I.A.4", "I.A.5", "I.A.6"]
        summary: "Plaid is private; public sources do not provide audited income statements, balance sheets, cash flows, backlog, AR aging, or management reports."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.A.1"
            finding: "A stale public revenue anchor appears on Plaid's Wikipedia page, but audited financial statements and the last three years of financials were not publicly available."
            evidence_claim_ids: ["EC-006", "EC-022"]
            risk_ids: ["R-001"]
        hidden_risks:
          - "Financial quality, revenue recognition, cash burn, gross margin, AR aging, backlog, and product profitability cannot be underwritten from public sources."
        evidence_gaps:
          - "Audited financial statements, monthly management accounts, revenue by product/channel/geography, backlog, AR aging, and tax schedules."
        follow_up_questions:
          - "Provide audited annual financials and monthly management accounts for the last three fiscal years and YTD."
        table_ids: ["T-002"]
        figure_ids: []
        evidence_claim_ids: ["EC-006", "EC-022"]
      - section_id: "I.B"
        title: "Financial Projections"
        checklist_question_ids: ["I.B.1", "I.B.2", "I.B.3", "I.B.4", "I.B.5", "I.B.6", "I.B.7", "I.B.8"]
        summary: "Public product, pricing, and customer signals support a growth narrative, but forecasts, unit economics, financing assumptions, and predictability are private."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.B.1"
            finding: "Plaid publishes pricing tiers and customer scale signals, but public evidence does not disclose forecasted revenue, margin, cash burn, or capital expenditure assumptions."
            evidence_claim_ids: ["EC-007", "EC-010", "EC-023"]
            risk_ids: ["R-001", "R-002"]
        hidden_risks:
          - "Forecasts may be sensitive to bank-access rules, pricing compression, contract renewals, enterprise discounts, and compliance spend."
        evidence_gaps:
          - "Board-approved three-year plan, scenario cases, CAC/payback, gross-margin bridge, product-level forecasts, and financing assumptions."
        follow_up_questions:
          - "Provide the current board plan with sensitivity cases for pricing, bank-connectivity costs, customer churn, and CFPB 1033 implementation."
        table_ids: ["T-004"]
        figure_ids: []
        evidence_claim_ids: ["EC-007", "EC-010", "EC-023"]
      - section_id: "I.C"
        title: "Capital Structure"
        checklist_question_ids: ["I.C.1", "I.C.2", "I.C.3", "I.C.4", "I.C.5"]
        summary: "Public records support private-company status and funding events, but shares outstanding, option pool, debt, preferences, warrants, and off-balance-sheet liabilities are not public."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "I.C.1"
            finding: "Public evidence reviewed indicates Plaid remains private, but the detailed ownership stack is not publicly verifiable."
            evidence_claim_ids: ["EC-002", "EC-003", "EC-004", "EC-022"]
            risk_ids: ["R-010"]
        hidden_risks:
          - "Multiple late-stage rounds, strategic investors, employee share sales, and potential preferences can create cap-table complexity."
        evidence_gaps:
          - "Current fully diluted capitalization, option/warrant/SAFE/note schedules, debt agreements, liquidation preferences, ROFR/co-sale rights, and secondary transactions."
        follow_up_questions:
          - "Provide the current cap table, investor rights agreements, debt schedule, and all financing/secondary transaction documents."
        table_ids: ["T-003"]
        figure_ids: []
        evidence_claim_ids: ["EC-002", "EC-003", "EC-004", "EC-022"]
      - section_id: "I.D"
        title: "Other financial information"
        checklist_question_ids: ["I.D.1", "I.D.2", "I.D.3"]
        summary: "Financing-history anchors are public, including the April 2021 Series D valuation, but accounting policies and tax positions are private."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "I.D.1"
            finding: "Public sources list Plaid's April 2021 Series D at US$425M and US$13.4B valuation; later public valuation signals should be reconciled with company records."
            evidence_claim_ids: ["EC-001", "EC-005"]
            risk_ids: ["R-001", "R-010"]
        hidden_risks:
          - "A seed valuation list can lag current private-market pricing and does not evidence liquidation preference, participation rights, debt, or runway."
        evidence_gaps:
          - "Tax positions, revenue-recognition policies, debt covenants, and current valuation support."
        follow_up_questions:
          - "Reconcile the April 2021 valuation anchor to current 409A, secondary, and primary financing records."
        table_ids: ["T-001"]
        figure_ids: ["F-001", "F-002"]
        evidence_claim_ids: ["EC-001", "EC-005"]

  - chapter_id: "II"
    title: "Products"
    chapter_summary: "Plaid's public product and developer materials show a broad financial-data API platform, but product-level economics, roadmap certainty, quality metrics, and profitability are private."
    founder_claim_ids: ["FC-003"]
    evidence_claim_ids: ["EC-008", "EC-009", "EC-010", "EC-011", "EC-012", "EC-025", "EC-028"]
    risk_ids: ["R-004", "R-005", "R-006"]
    sections:
      - section_id: "II.A"
        title: "Description of each product"
        checklist_question_ids: ["II.A.1", "II.A.2", "II.A.3", "II.A.4", "II.A.5", "II.A.6"]
        summary: "Public pages show products such as Auth, Transactions, Identity, Balance, Transfer, Investments, Liabilities, Assets, Income, Signal, Layer, Link, and Consumer Report."
        verification_status: partially_verified
        confidence: high
        key_findings:
          - finding_id: "II.A.1"
            finding: "Plaid's public product catalog and docs evidence product breadth across account verification, financial data, payments, identity, credit, fraud, and consumer-permission workflows."
            evidence_claim_ids: ["EC-008", "EC-009", "EC-025"]
            risk_ids: ["R-005", "R-006"]
          - finding_id: "II.A.2"
            finding: "Pricing tiers are public at a packaging level, but product-level cost structure, margins, discounts, and profitability are not publicly verifiable."
            evidence_claim_ids: ["EC-010", "EC-023"]
            risk_ids: ["R-004"]
        hidden_risks:
          - "Breadth may mask uneven product maturity, implementation complexity, bank-coverage gaps, or support burden."
          - "Open-banking standards and bank APIs could commoditize parts of the data-access layer."
        evidence_gaps:
          - "Product P&Ls, attach rates, retention by product, uptime by API, bank-coverage quality, roadmap, and support-ticket metrics."
        follow_up_questions:
          - "Provide product-level revenue, gross margin, usage, uptime, incident, roadmap, and competitive win/loss data."
        table_ids: ["T-005", "T-006"]
        figure_ids: ["F-003"]
        evidence_claim_ids: ["EC-008", "EC-009", "EC-010", "EC-025", "EC-028"]

  - chapter_id: "III"
    title: "Customer Information"
    chapter_summary: "Public customer pages and a company claim of over 7,000 fintech partners evidence market adoption, but top-customer revenue, churn, NRR, and partner concentration are not public."
    founder_claim_ids: ["FC-004"]
    evidence_claim_ids: ["EC-007", "EC-013", "EC-020", "EC-021", "EC-024"]
    risk_ids: ["R-002", "R-003", "R-011"]
    sections:
      - section_id: "III.A"
        title: "Top customers by application"
        checklist_question_ids: ["III.A"]
        summary: "Plaid publishes selected customer stories and logo proof, but not a top-15 customer schedule by revenue or application."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "III.A.1"
            finding: "Plaid publicly claims over 7,000 fintech partners and shows selected customer proof including Chime and brands featured in its customer-story page."
            evidence_claim_ids: ["EC-007", "EC-013", "EC-021"]
            risk_ids: ["R-003"]
        hidden_risks:
          - "Revenue could be concentrated in a small number of enterprise fintechs, lenders, banks, or platform accounts despite broad logo count."
        evidence_gaps:
          - "Top 15 customers by revenue/volume/application for the last two fiscal years and YTD."
        follow_up_questions:
          - "Provide top-customer schedule, product ownership, purchase timing, revenue, gross margin, and reference contacts."
        table_ids: ["T-007"]
        figure_ids: []
        evidence_claim_ids: ["EC-007", "EC-013", "EC-021"]
      - section_id: "III.B"
        title: "Strategic relationships"
        checklist_question_ids: ["III.B"]
        summary: "Public sources identify customer, bank/connectivity, and historical strategic-investor/acquisition relationships, but economics and obligations are private."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "III.B.1"
            finding: "Visa announced a planned US$5.3B acquisition in 2020 and CNBC reported the deal was abandoned in 2021 after DOJ concerns, evidencing strategic importance and antitrust sensitivity."
            evidence_claim_ids: ["EC-003", "EC-004", "EC-024"]
            risk_ids: ["R-007", "R-011"]
        hidden_risks:
          - "Bank, data-provider, payment-network, and API-standard relationships may create dependency, pricing, and access risks."
        evidence_gaps:
          - "Partner contracts, revenue share, data-access SLAs, termination rights, bank-coverage commitments, and marketing agreements."
        follow_up_questions:
          - "Provide strategic partnership agreements and economics for banks, networks, processors, and ecosystem partners."
        table_ids: ["T-008"]
        figure_ids: []
        evidence_claim_ids: ["EC-003", "EC-004", "EC-024"]
      - section_id: "III.C"
        title: "Revenue by customer"
        checklist_question_ids: ["III.C"]
        summary: "No public source reviewed discloses customer revenue concentration or any customer accounting for 5% or more of revenue."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "III.C.1"
            finding: "Public customer evidence supports adoption but not revenue-by-customer or concentration."
            evidence_claim_ids: ["EC-007", "EC-013", "EC-021"]
            risk_ids: ["R-002", "R-003"]
        hidden_risks:
          - "A few high-volume fintech, lending, or payment customers could drive a disproportionate share of revenue and gross profit."
        evidence_gaps:
          - "Revenue by customer, volume by customer, churn, NRR, renewal dates, and contract minimums."
        follow_up_questions:
          - "Identify any customer or partner above 5% of revenue and provide contract terms, renewal risk, and margin."
        table_ids: ["T-010"]
        figure_ids: ["F-004"]
        evidence_claim_ids: ["EC-007", "EC-013", "EC-021"]
      - section_id: "III.D"
        title: "Significant relationships severed within the last two years"
        checklist_question_ids: ["III.D"]
        summary: "Public sources reviewed did not provide a reliable list of severed customer, partner, or supplier relationships within the last two years."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "III.D.1"
            finding: "Plaid publishes customer and status pages, but severed relationships and lost accounts are not publicly disclosed."
            evidence_claim_ids: ["EC-013", "EC-020", "EC-021"]
            risk_ids: ["R-002", "R-011"]
        hidden_risks:
          - "Lost bank connections, customer churn, or partner disputes could materially impair revenue and reliability without appearing in public pages."
        evidence_gaps:
          - "Lost-customer schedule, severed partner/supplier list, win/loss analysis, and churn bridge."
        follow_up_questions:
          - "Provide all material customer, partner, and supplier terminations or non-renewals for the past 24 months."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-013", "EC-020", "EC-021"]
      - section_id: "III.E"
        title: "Top suppliers"
        checklist_question_ids: ["III.E"]
        summary: "Public sources show reliance on bank/data connections and public API infrastructure, but top suppliers, cloud vendors, processors, and purchase amounts are not public."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "III.E.1"
            finding: "Plaid's status and docs pages show an API-centric service model, but supplier concentration and purchase commitments are not public."
            evidence_claim_ids: ["EC-009", "EC-020", "EC-028"]
            risk_ids: ["R-011"]
        hidden_risks:
          - "Cloud, data-provider, bank-connectivity, monitoring, and compliance-vendor dependencies may create concentration and outage risk."
        evidence_gaps:
          - "Top suppliers by spend, cloud/provider contracts, bank-connection SLAs, incident dependencies, and business continuity plans."
        follow_up_questions:
          - "Provide top suppliers, annual spend, SLAs, termination rights, redundancy plans, and supplier-security reviews."
        table_ids: ["T-009"]
        figure_ids: []
        evidence_claim_ids: ["EC-009", "EC-020", "EC-028"]

  - chapter_id: "IV"
    title: "Competition"
    chapter_summary: "Plaid competes in open banking and financial-data connectivity against data aggregators, bank/network-backed platforms, and embedded fintech/payments players."
    founder_claim_ids: ["FC-003"]
    evidence_claim_ids: ["EC-008", "EC-010", "EC-014", "EC-016", "EC-029"]
    risk_ids: ["R-004", "R-006", "R-007"]
    sections:
      - section_id: "IV.A"
        title: "Competitive landscape by market segment"
        checklist_question_ids: ["IV.A.1", "IV.A.2"]
        summary: "Public competitor pages show multiple alternatives in secure financial-data connectivity and open banking; private win/loss, coverage, reliability, and price benchmarks are required."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "IV.A.1"
            finding: "Yodlee, MX, Tink, and Stripe Financial Connections publicly position around connected financial data, open finance, or open banking, overlapping with parts of Plaid's product suite."
            evidence_claim_ids: ["EC-014", "EC-029"]
            risk_ids: ["R-004"]
          - finding_id: "IV.A.2"
            finding: "The Federal Register final rule on personal financial data rights may increase standardization, which can be an opportunity and a pricing/commoditization risk."
            evidence_claim_ids: ["EC-016", "EC-029"]
            risk_ids: ["R-004", "R-007"]
        hidden_risks:
          - "Bank-owned rails, network-backed platforms, and standardized open-banking APIs could reduce Plaid's technical differentiation or pricing power."
        evidence_gaps:
          - "Win/loss data, competitive pricing, coverage by institution, authorization success rates, uptime comparisons, and customer switching costs."
        follow_up_questions:
          - "Provide competitor displacement analysis, price benchmarks, coverage/latency comparisons, and renewal-loss reasons."
        table_ids: ["T-011", "T-012"]
        figure_ids: ["F-005"]
        evidence_claim_ids: ["EC-014", "EC-016", "EC-029"]

  - chapter_id: "V"
    title: "Marketing, Sales, and Distribution"
    chapter_summary: "Public pages evidence self-serve developer onboarding, enterprise sales, customer stories, and industry/use-case segmentation, but channel economics and sales productivity are private."
    founder_claim_ids: ["FC-004"]
    evidence_claim_ids: ["EC-006", "EC-007", "EC-010", "EC-013", "EC-015", "EC-030"]
    risk_ids: ["R-002", "R-003", "R-004"]
    sections:
      - section_id: "V.A"
        title: "Strategy and implementation"
        checklist_question_ids: ["V.A.1", "V.A.2", "V.A.3", "V.A.4"]
        summary: "Plaid publicly presents a GTM mix of developer resources, pricing/contact-sales flows, use-case pages, industry pages, and customer stories."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "V.A.1"
            finding: "Public pages evidence a combination of self-serve developer entry, pay-as-you-go pricing, sales contact paths, use cases, and customer proof."
            evidence_claim_ids: ["EC-007", "EC-010", "EC-013", "EC-030"]
            risk_ids: ["R-004"]
        hidden_risks:
          - "Enterprise sales cycles, discounts, implementation load, and compliance reviews may make growth less efficient than public funnel signals imply."
        evidence_gaps:
          - "CAC by channel, payback, win rate, sales cycle, quota attainment, funnel conversion, and marketing budget."
        follow_up_questions:
          - "Provide GTM dashboard, CAC/payback, sales productivity, pipeline, and marketing plan performance."
        table_ids: ["T-013"]
        figure_ids: ["F-006"]
        evidence_claim_ids: ["EC-007", "EC-010", "EC-013", "EC-030"]
      - section_id: "V.B"
        title: "Major Customers"
        checklist_question_ids: ["V.B.1", "V.B.2", "V.B.3"]
        summary: "Major-customer status and pipeline are not public beyond selected logos and public customer stories."
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: "V.B.1"
            finding: "Customer stories provide qualitative proof, but not relationship status, growth plan, pipeline, or renewal risk."
            evidence_claim_ids: ["EC-013", "EC-021"]
            risk_ids: ["R-002", "R-003"]
        hidden_risks:
          - "Logo visibility can overstate revenue durability if major accounts are usage-based, price-sensitive, or multi-home with competitors."
        evidence_gaps:
          - "Major-customer health scores, pipeline, renewal calendar, expansion plan, and reference-call notes."
        follow_up_questions:
          - "Provide top-account plans, pipeline by stage, expansion/churn bridge, and reference access."
        table_ids: []
        figure_ids: []
        evidence_claim_ids: ["EC-013", "EC-021"]
      - section_id: "V.C"
        title: "Principal avenues for generating new business"
        checklist_question_ids: ["V.C"]
        summary: "Public evidence indicates developer documentation, API keys, pricing pages, industry/use-case content, and enterprise contact forms as acquisition avenues."
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: "V.C.1"
            finding: "Plaid's docs page offers developer resources and API-key signup, while pricing and customer pages support self-serve and sales-led entry."
            evidence_claim_ids: ["EC-009", "EC-010", "EC-013", "EC-030"]
            risk_ids: ["R-004"]
        hidden_risks:
