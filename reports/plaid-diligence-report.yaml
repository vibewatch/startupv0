risk_register:
  - risk_id: "R-001"
    risk_title: "Financial quality opacity"
    risk_category: "financial"
    severity: "high"
    likelihood: "high"
    description: "Audited financials, cash, debt, margins, revenue recognition, backlog, AR aging, product P&Ls, and runway are not public."
    impacted_chapter_ids: ["I", "V"]
    impacted_section_ids: ["I.A", "I.B", "V.E"]
    evidence_claim_ids: ["EC-006", "EC-022", "EC-023"]
    mitigation_or_diligence_request: "Request audited financials, monthly KPI pack, product P&Ls, cash/debt/runway, tax/accounting memos, and board plan."
  - risk_id: "R-002"
    risk_title: "Revenue predictability and churn opacity"
    risk_category: "financial"
    severity: "high"
    likelihood: "unknown"
    description: "Public partner count and customer stories do not disclose churn, NRR, renewal calendar, contract minimums, or usage volatility."
    impacted_chapter_ids: ["I", "III", "V"]
    impacted_section_ids: ["I.B", "III.C", "V.B"]
    evidence_claim_ids: ["EC-007", "EC-013", "EC-021", "EC-023"]
    mitigation_or_diligence_request: "Request cohort revenue, NRR/GRR, churn bridge, renewal calendar, minimum commitments, and API-volume volatility."
  - risk_id: "R-003"
    risk_title: "Customer concentration opacity"
    risk_category: "customer"
    severity: "high"
    likelihood: "unknown"
    description: "Customer logos and 7,000 partner claim do not rule out revenue or gross-profit concentration."
    impacted_chapter_ids: ["III", "V"]
    impacted_section_ids: ["III.A", "III.C", "V.B"]
    evidence_claim_ids: ["EC-007", "EC-013", "EC-021"]
    mitigation_or_diligence_request: "Request top-customer revenue/gross margin, use case, product, region, and contract terms."
  - risk_id: "R-004"
    risk_title: "Market competition and pricing pressure"
    risk_category: "market"
    severity: "high"
    likelihood: "medium"
    description: "Yodlee, MX, Tink, Stripe Financial Connections, and open-banking standardization create competitive and commoditization pressure."
    impacted_chapter_ids: ["II", "IV", "V"]
    impacted_section_ids: ["II.A", "IV.A", "V.A"]
    evidence_claim_ids: ["EC-010", "EC-014", "EC-016", "EC-029", "EC-030"]
    mitigation_or_diligence_request: "Benchmark win/loss, net pricing, coverage, reliability, authorization rates, and customer switching."
  - risk_id: "R-005"
    risk_title: "Product maturity and reliability"
    risk_category: "product"
    severity: "medium"
    likelihood: "medium"
    description: "Public product breadth and status page do not disclose product maturity, uptime history, incident root causes, or support burden."
    impacted_chapter_ids: ["II", "VI"]
    impacted_section_ids: ["II.A", "VI.A", "VI.B"]
    evidence_claim_ids: ["EC-008", "EC-009", "EC-020", "EC-025", "EC-028"]
    mitigation_or_diligence_request: "Request product maturity scorecards, uptime/incident logs, support metrics, roadmap, and customer escalations."
  - risk_id: "R-006"
    risk_title: "Technical defensibility and IP durability"
    risk_category: "technical"
    severity: "medium"
    likelihood: "medium"
    description: "Public patents and product breadth suggest IP activity, but defensibility, freedom-to-operate, and open-source exposure are not verified."
    impacted_chapter_ids: ["II", "IV", "VI", "VIII"]
