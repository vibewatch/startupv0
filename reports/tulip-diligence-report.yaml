executive_summary:
  overall_assessment: Tulip has credible public unicorn evidence, a clearly articulated industrial software platform, and high-value strategic partners, but core financial quality, implementation economics, and concentration risk remain private-data-room questions.
  investment_or_diligence_thesis: "Proceed only as a data-room diligence candidate: public sources support product and valuation relevance, while valuation underwriting should hinge on ARR growth, gross margin, deployment scalability, partner economics, retention, and compliance evidence."
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Tulip is a frontline operations platform for manufacturers.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: Tulip reached unicorn status via a $120M Series D at a $1.3B valuation.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-004
      summary: Mitsubishi Electric is a strategic investor and alliance partner.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: "Valuation quality depends on undisclosed revenue and burn: The $1.3B valuation is public, but revenue scale, gross margin, burn, runway, liquidation preferences, and debt are not public."
    - risk_id: R-002
      summary: "Complex industrial deployments may constrain scalability: Manufacturing environments require integrations, validation, change management, and regulated workflow support, which can slow implementation and increase services load."
    - risk_id: R-003
      summary: "Strategic partner dependency and channel conflict: Mitsubishi and technology partners are valuable but may create dependency, exclusivity, or channel-conflict risks if material to pipeline."
    - risk_id: R-004
      summary: "Competitive pressure from industrial incumbents: Incumbent MES/automation vendors can bundle software with equipment, services, and long customer relationships."
  key_evidence_gaps:
    - Tulip audited financial statements, revenue by product, gross margin, burn, runway, debt, and full cap table are not public.
    - Tulip product usage, retention by module, pricing realization, roadmap, and SLA performance are not public.
    - Tulip customer list, top-account concentration, ARR by customer, renewal rates, NRR, and reference calls are not public.
    - Tulip win/loss data and competitive displacement evidence are not public.
    - Tulip CAC, sales cycle, channel economics, partner-sourced pipeline, and marketing attribution are not public.
    - Tulip R&D budget, model or platform benchmarks, security test results, and roadmap dependencies are not public.
  recommended_next_steps:
    - Request audited financials, board pack, cap table, financing documents, debt schedules, and monthly operating model.
    - Request product analytics, packaging/pricing history, churn cohorts, roadmap, uptime/SLA reports, and support metrics.
    - Request anonymized customer ARR schedule, top-20 account contracts, churn log, and reference-call access.
    - Request CRM win/loss exports, competitive battlecards, pipeline conversion by competitor, and gross retention by segment.
    - Request CAC payback, sales cycle, pipeline source, channel margin, partner agreements, and quota attainment.
    - Request R&D roadmap, architecture review, model/platform benchmarks, vuln management evidence, and engineering productivity data.
