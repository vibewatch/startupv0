  "executive_summary": {
    "overall_assessment": "Visier has comparatively strong public evidence for unicorn status, enterprise traction, product category, partnerships, and leadership. The main diligence gaps are private SaaS metrics, current valuation, customer/partner concentration, and privacy/security assurance evidence.",
    "investment_or_diligence_thesis": "Track with standard SaaS diligence: public sources support a credible workforce-AI platform and enterprise customer base, but investment confidence depends on current ARR growth, retention, embedded-channel economics, security posture, and competition against HCM suites.",
    "strongest_verified_claims": [
      {
        "founder_claim_id": "FC-001",
        "summary": "Visier announced a $125M Series E led by Goldman at valuation exceeding $1B and CB Insights lists Visier at $1B.",
        "evidence_claim_ids": [
          "EC-001"
        ]
      },
      {
        "founder_claim_id": "FC-002",
        "summary": "Visier publicly describes Workforce AI and a people-data platform with AI, benchmarks, connectors, and access controls.",
        "evidence_claim_ids": [
          "EC-002",
          "EC-007"
        ]
      }
    ],
    "biggest_risks": [
      {
        "risk_id": "R-001",
        "summary": "The $1B+ valuation is supported by 2021 evidence and CB Insights, but current ARR, growth, profitability, burn, and valuation marks are not public."
      },
      {
        "risk_id": "R-002",
        "summary": "Visier sells into a category contested by large HCM suites, analytics platforms, and specialist workforce-intelligence vendors with distribution advantages."
      },
      {
        "risk_id": "R-003",
        "summary": "Visier processes sensitive people/work data; privacy and security failures could create legal, customer, and reputational exposure."
      },
      {
        "risk_id": "R-004",
        "summary": "Embedded partnerships increase reach but may create dependence on partner distribution and obscure direct customer economics."
      }
    ],
    "key_evidence_gaps": [
      "Current ARR, growth, gross margin, burn, cash runway, and valuation marks.",
      "NRR/churn by direct vs embedded channel and top-customer concentration.",
      "Partner economics, renewal/termination rights, and channel conflict.",
      "SOC 2 report, subprocessor list, incident history, AI governance, and data residency controls.",
      "Headcount, attrition, compensation, and hiring plan."
    ],
    "recommended_next_steps": [
      "Request SaaS metrics pack: ARR bridge, cohort retention, logo churn, gross margin, CAC/payback, and sales productivity.",
      "Review partner agreements and split direct vs embedded ARR, churn, and pipeline.",
      "Review SOC 2, pen-test, DPA, subprocessor, privacy, AI governance, and cyber-insurance evidence.",
      "Conduct customer references across direct and embedded accounts.",
      "Review current cap table, financing documents, and option pool."
    ]
