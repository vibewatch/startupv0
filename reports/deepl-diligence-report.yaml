report_metadata:
  report_title: DeepL Startup Diligence Report
  target_company: DeepL
  website: https://www.deepl.com/
  known_aliases:
    - DeepL SE
    - DeepL Translator
    - DeepL Write
  sector: Language AI, machine translation and enterprise productivity software
  geography: Germany / Cologne with global business and U.S. expansion
  company_stage: Private unicorn / late-stage venture-backed
  research_date: 2026-05-24
  analyst: GitHub Copilot CLI
  report_version: "1.0"
  currency: USD
  time_zone: Europe/Berlin
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Existing-report exclusion list was built from reports/*-diligence-report.yaml before candidate selection.
    - Candidate unicorn status was checked against CB Insights and public company/third-party sources.
    - Company-owned product, funding, customer, pricing/security and investor/news sources were used where accessible.
    - Private financial statements, contracts, cap table, customer references, employee records and legal schedules remain outside public verification.
  included_jurisdictions:
    - Germany
    - European Union
    - United States
  excluded_topics:
    - No private data room, paid database, credentialed system, employee contact outreach or non-public legal docket access was used.
  user_provided_materials:
    - material_id: UP-001
      title: User instruction to generate random uncovered unicorn diligence reports
      type: workflow_instruction
      date_received: 2026-05-24
      notes: No founder-supplied deck or data room was provided.
