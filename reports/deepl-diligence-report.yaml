diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.B
    missing_information: ARR by product, gross margin, burn, retention, CAC and API usage revenue.
    why_it_matters: Required to support valuation and product-mix underwriting.
    suggested_source_or_request: Request audited/reviewed financials and KPI pack by product/channel/region.
    priority: high
  - gap_id: G-002
    chapter_id: III
    section_id: III.A
    missing_information: Customer-count definitions, paid/active status and top-customer concentration.
    why_it_matters: Public customer figures use different definitions and do not indicate revenue quality.
    suggested_source_or_request: Request customer schedule, cohort retention and reference calls.
    priority: high
  - gap_id: G-003
    chapter_id: VI
    section_id: VI.C
    missing_information: Model benchmarks, training-data rights, IP assignments and open-source inventory.
    why_it_matters: Technical moat and legal defensibility depend on model/data provenance and quality.
    suggested_source_or_request: Request technical diligence pack and counsel-reviewed IP/data-rights schedule.
    priority: high
  - gap_id: G-004
    chapter_id: VIII
    section_id: VIII.D
    missing_information: SOC/ISO evidence, DPAs, subprocessors, incident history and no-training contract terms.
    why_it_matters: Enterprise buyers rely on data-security commitments for sensitive content.
    suggested_source_or_request: Request audit reports, DPAs, privacy-impact assessments and customer security questionnaire responses.
    priority: high
