executive_summary:
  overall_assessment: DeepL has strong public evidence for its $2B financing round, product suite, broad adoption claims, global market presence and enterprise packaging. Confirmatory diligence must focus on revenue quality, customer-count definitions, model defensibility, data/security obligations and competitive pressure from translation incumbents and general-purpose AI platforms.
  investment_or_diligence_thesis: DeepL can sustain premium enterprise demand if specialized language AI quality, data protection and workflow integration remain superior to bundled AI/translation alternatives; public evidence is insufficient to underwrite revenue quality or long-term defensibility without private KPI and technical proof.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: The $300M round at $2B valuation is supported by DeepL and investor materials.
      evidence_claim_ids:
        - EC-001
        - EC-002
    - founder_claim_id: FC-002
      summary: Public pages and press materials support a suite spanning Translator, Write, documents and API.
      evidence_claim_ids:
        - EC-005
        - EC-011
    - founder_claim_id: FC-006
      summary: Pricing/security pages publicly describe enterprise controls and no data training.
      evidence_claim_ids:
        - EC-007
        - EC-012
  biggest_risks:
    - risk_id: R-001
      summary: "Financial quality and valuation support are not public: DeepL has a $2B valuation but no public ARR, margin, burn, NRR, CAC payback or audited statements."
    - risk_id: R-002
      summary: "Customer-count definitions and revenue concentration are unclear: Public sources reference 100,000+ organizations and 200,000+ businesses/governments without paid/active definitions or ARR concentration."
    - risk_id: R-003
      summary: "Product defensibility depends on model quality and data rights: Specialized language AI claims require independent benchmarks against LLMs and translation incumbents plus training-data rights review."
    - risk_id: R-004
      summary: "Competition and pricing pressure from platform incumbents: Google, Microsoft, LLM assistants and language-service providers can bundle or subsidize translation/writing features."
  key_evidence_gaps:
    - ARR by product, API usage revenue, gross margin, burn and retention metrics.
    - Customer-count reconciliation and paid/active/customer-definition details.
    - Model benchmark, training-data rights, security audit and data-processing evidence.
    - Cap table, financing preferences, legal-matter schedule and regional compliance posture.
  recommended_next_steps:
    - Reconcile customer counts and request ARR/customer schedules.
    - Benchmark translation/writing quality and latency against AI and translation incumbents.
    - Review SOC/ISO evidence, DPAs, subprocessors and no-training contractual language.
    - Underwrite U.S. and enterprise GTM productivity with CAC/payback and win/loss data.
