diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, ARR bridge, gross margin, burn, runway and tax details
    why_it_matters: Cannot underwrite valuation or runway from public list metadata.
    suggested_source_or_request: CFO / accountant data room
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, preference stack, debt and option ledger
    why_it_matters: Ownership, dilution and liquidation preferences determine return profile.
    suggested_source_or_request: Company counsel / finance
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, retention, backlog and renewal pipeline
    why_it_matters: Public logos do not reveal concentration or recurring revenue quality.
    suggested_source_or_request: Sales operations / customer success
    priority: high
  - gap_id: G-004
    chapter_id: V
    section_id: V.D
    missing_information: CAC, payback, quota productivity and partner-channel economics
    why_it_matters: GTM efficiency is private and may drive burn/runway risk.
    suggested_source_or_request: Revenue operations
    priority: high
  - gap_id: G-005
    chapter_id: VI
    section_id: VI.B
    missing_information: Product roadmap, adoption metrics, incident/support load and R&D spend
    why_it_matters: Roadmap claims must tie to adoption and cost.
    suggested_source_or_request: Product / engineering
    priority: medium
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount, attrition, compensation, equity and employee-relations files
    why_it_matters: Team stability and retention risk are not public.
    suggested_source_or_request: People team
    priority: medium
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Litigation docket search, threatened claims and settlement schedule
    why_it_matters: Legal clearance cannot be inferred from source sweep.
    suggested_source_or_request: Outside counsel
    priority: high
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP assignments, trademark/patent records, source-code ownership and OSS scan
    why_it_matters: Product defensibility and infringement risk require counsel review.
    suggested_source_or_request: IP counsel / engineering
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory correspondence, security reports, DPAs and incident logs
    why_it_matters: Trust pages are not enough to validate compliance posture.
    suggested_source_or_request: Security / compliance
    priority: high
