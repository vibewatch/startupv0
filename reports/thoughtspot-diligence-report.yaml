report_metadata:
  report_title: ThoughtSpot Startup Diligence Report
  target_company: ThoughtSpot
  website: https://www.thoughtspot.com/
  known_aliases:
    - ThoughtSpot Agentic Analytics Platform
    - Spotter
    - ThoughtSpot Everywhere
  sector: Agentic analytics, business intelligence and embedded analytics SaaS
  geography: United States / global enterprise analytics markets
  company_stage: Private unicorn / growth-stage enterprise analytics platform
  research_date: 2026-06-14
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built exclusion list from reports/*-diligence-report.yaml and used CB Insights as public unicorn-status source.
    - Prioritized public company product, customer, partner, security, team and careers pages.
    - Treated company-authored claims as evidence of the statement made, not independent proof of audited performance.
    - Marked private financials, cap table, customer concentration, contracts, HR, insurance, litigation and regulatory files as not_publicly_verifiable.
  included_jurisdictions:
    - United States / global enterprise analytics markets
    - United States public web sources where applicable
    - EU/UK/privacy and other operating jurisdictions as follow-up scope
  excluded_topics:
    - Private data room, management interviews, customer calls, full docket searches, private SOC reports, non-public regulatory correspondence and employee records were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for three random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-14
      notes: No pitch deck, financial model, data room, management responses or customer references were provided.
    - material_id: UPM-002
      title: Candidate metadata from CB Insights unicorn list
      type: public_unicorn_list_metadata
      date_received: 2026-06-14
      notes: Slug thoughtspot; valuation $4.20B; date joined 2018-05-08; source URL CB Insights unicorn list.
