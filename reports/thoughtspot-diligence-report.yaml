executive_summary:
  overall_assessment: ThoughtSpot appears to be an active private unicorn from CB Insights and current public company pages. Public evidence supports product, customer/partner and trust/team screening, but investment-grade diligence remains unresolved because financial statements, cap table, customer concentration, contract economics, legal files and HR records are private.
  investment_or_diligence_thesis: Proceed only to confirmatory diligence. The case depends on proving that ThoughtSpot can convert its public product and ecosystem signals into durable revenue while managing Financial opacity and ARR/retention unknowns, Crowded BI and AI analytics competition, AI accuracy, trust and data-governance execution risk.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights lists ThoughtSpot at $4.20B.
      evidence_claim_ids:
        - EC-001
    - founder_claim_id: FC-002
      summary: Public pages support Agentic analytics, business intelligence and embedded analytics SaaS positioning.
      evidence_claim_ids:
        - EC-003
    - founder_claim_id: FC-004
      summary: Public trust/security pages provide screening-level control evidence.
      evidence_claim_ids:
        - EC-006
  biggest_risks:
    - risk_id: R-001
      summary: Financial quality and runway opacity
    - risk_id: R-002
      summary: Customer concentration and retention unknowns
    - risk_id: R-003
      summary: Crowded BI and AI analytics competition
    - risk_id: R-004
      summary: AI accuracy, trust and data-governance execution risk
    - risk_id: R-005
      summary: Security, privacy and compliance validation gap
  key_evidence_gaps:
    - Audited financial statements, ARR bridge, gross margin, burn, runway and tax details
    - Fully diluted cap table, preference stack, debt and option ledger
    - Revenue by customer, retention, backlog and renewal pipeline
    - CAC, payback, quota productivity and partner-channel economics
    - Product roadmap, adoption metrics, incident/support load and R&D spend
  recommended_next_steps:
    - Request core finance and cap-table data room before relying on valuation.
    - Run customer/partner reference checks and revenue-concentration analysis.
    - Have counsel review IP, litigation, regulatory, privacy, security and material contracts.
    - Interview management on roadmap, GTM productivity, hiring and retention.
