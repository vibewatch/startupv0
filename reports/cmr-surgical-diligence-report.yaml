executive_summary:
  overall_assessment: CMR Surgical is publicly supportable as an active UK private surgical-robotics unicorn with strong evidence for its 2021 USD 600M Series D at a USD 3B valuation, active Companies House status, Versius product positioning and FDA-clearance/adoption milestones. Diligence risk is high because medical-device commercialization, regulatory expansion, product safety, service economics, hospital utilization and current valuation are largely private.
  investment_or_diligence_thesis: The investment case depends on whether Versius can translate global procedure adoption and U.S. market entry into capital-efficient, safe and repeatable hospital revenue against entrenched robotic-surgery alternatives.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CMR Surgical is a still-private startup unicorn and eligible target for this report.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: CMR Surgical has a publicly evidenced core product/platform narrative.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: CMR Surgical has public customer, adoption or partner traction signals.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Regulatory expansion and post-market obligations
    - risk_id: R-002
      summary: Capital-intensive hardware commercialization
    - risk_id: R-004
      summary: Hospital adoption and capital-budget friction
    - risk_id: R-001
      summary: Regulatory expansion and post-market obligations
    - risk_id: R-006
      summary: Product safety, reliability and clinical-evidence burden
  key_evidence_gaps:
    - Audited/management financials, KPI definitions and cash runway
    - Current cap table, preferences, debt, investor rights and valuation marks
    - Customer concentration, usage, retention/churn and contract economics
    - Supplier/infrastructure/manufacturing dependencies and cost commitments
    - Product roadmap, technical/clinical evidence, quality/security and legal/IP schedules
  recommended_next_steps:
    - Open finance and cap-table data rooms before relying on public valuation.
    - Reconcile public customer/adoption claims to revenue, usage, margin and retention data.
    - Review product roadmap, quality/security controls and key technical or regulatory risks.
    - Run customer/reference and win/loss diligence in the most material market segments.
    - Have counsel review litigation, regulatory, IP, insurance and material contracts.
