report_metadata:
  report_title: "Startup Unicorn Diligence Research Report: CMR Surgical"
  target_company: CMR Surgical
  website: https://cmrsurgical.com/
  known_aliases:
    - CMR Surgical Limited
    - Cambridge Medical Robotics Limited
    - Versius
  sector: Medical devices / surgical robotics
  geography: United Kingdom headquartered; global hospital markets
  company_stage: Private unicorn / late-stage medical technology
  research_date: 2026-05-22
  analyst: GitHub Copilot CLI public-source diligence agent
  report_version: "1.0"
  currency: USD unless otherwise stated; UK statutory filings in GBP
  time_zone: Europe/London
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public web research only
    - Prioritized public unicorn lists, primary company pages, official registry or regulator sources and reputable news/trade publications
    - Facts not available in public sources are explicitly marked not_publicly_verifiable or unverified
    - All sources accessed_date set to 2026-05-22
  included_jurisdictions:
    - United Kingdom
    - United States
    - European Union / EEA
    - Australia
    - India
    - Middle East and other disclosed commercial regions
  excluded_topics:
    - Non-public data room materials
    - Customer calls and supplier calls
    - Paid database exports
    - Personal data beyond public professional/company profiles
    - Legal advice or counsel-grade docket searches
  user_provided_materials: []
