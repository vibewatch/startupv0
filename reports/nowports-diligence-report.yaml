risk_register:
  - risk_id: R-001
    risk_title: Financial opacity and unit-economics quality
    risk_category: financial
    severity: high
    likelihood: high
    description: Funding and valuation are public, but audited financials, ARR/revenue, gross margin, cash, debt, backlog, AR aging, CAC/payback and finance-product loss rates are not public.
    impacted_chapter_ids:
      - I
      - V
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
      - V.D
    evidence_claim_ids: *a33
    mitigation_or_diligence_request: Require audited financials, management KPI pack, revenue/margin by service, cash/debt schedule, backlog, AR aging, CAC/payback and finance receivables/loss data.
  - risk_id: R-002
    risk_title: Valuation, cap table and financing-term opacity
    risk_category: financing
    severity: high
    likelihood: high
    description: Headline $1.10B valuation and Series C are public, but current valuation, liquidation preferences, option pool, warrants, debt and investor rights are not disclosed.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a34
    mitigation_or_diligence_request: Review cap table, financing documents, investor side letters, SAFEs/notes, debt instruments and updated valuation marks.
  - risk_id: R-003
    risk_title: Customer concentration, churn and revenue proof gap
    risk_category: customer
    severity: high
    likelihood: high
    description: Only one named customer signal was publicly visible, and no top-customer revenue, churn, NRR, satisfaction or pipeline evidence was public.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids: *a35
    mitigation_or_diligence_request: Request top-15 customer schedule, contracts, gross profit by customer, churn/NRR cohorts, customer health scores and permissioned reference calls.
  - risk_id: R-004
    risk_title: Competition from logistics-tech and traditional forwarders
    risk_category: market
    severity: medium
    likelihood: high
    description: CB Insights lists regional digital/logistics competitors, while broader freight forwarding is also served by large incumbents and marketplaces.
    impacted_chapter_ids:
      - IV
      - V
    impacted_section_ids:
      - IV.A
      - V.A
    evidence_claim_ids: *a36
    mitigation_or_diligence_request: Run win/loss analysis, price/service benchmarking, lane-level differentiation review and customer switching-cost diligence.
  - risk_id: R-005
    risk_title: Product and technology execution risk after simplification reset
    risk_category: product
    severity: medium
    likelihood: medium
    description: Nowports markets automation/tracking/documentation, but public sources also describe pulling back from broad technology spend toward a simpler customer-focused roadmap.
    impacted_chapter_ids:
      - II
      - VI
    impacted_section_ids:
      - II.A
      - VI.A
      - VI.B
    evidence_claim_ids: *a37
    mitigation_or_diligence_request: Review product roadmap, architecture, automation KPIs, uptime/incidents, engineering capacity, technical debt and customer ROI data.
  - risk_id: R-006
    risk_title: Legal, regulatory, IP and security diligence gap
    risk_category: legal
    severity: high
    likelihood: unknown
    description: Public terms/privacy/security pages exist, but lawsuits, customs/regulatory matters, insurance coverage, IP ownership, DPAs, SOC/ISO evidence and customer MSAs are not public.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.C
      - VIII.D
      - VIII.E
      - VIII.F
      - VIII.G
    evidence_claim_ids: *a38
    mitigation_or_diligence_request: Counsel should run docket/regulatory/IP searches and review MSAs, insurance, privacy/security reports, DPAs, permits, licenses and compliance correspondence.
  - risk_id: R-007
    risk_title: Management transition, layoffs and retention risk
    risk_category: team
    severity: high
    likelihood: medium
    description: Public reporting indicates a 2025 CEO transition and personnel cuts that affected morale; hiring and headcount data are not public.
    impacted_chapter_ids:
      - VII
      - VI
      - V
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.F
      - VII.G
      - VI.A
      - V.A
    evidence_claim_ids: *a39
    mitigation_or_diligence_request: Review HRIS, org chart, retention/attrition, severance, compensation/incentive plans, management contracts and post-transition operating KPIs.
  - risk_id: R-008
    risk_title: Operational dependency on carriers, agents, insurers, lenders and trade lanes
    risk_category: operational
    severity: high
    likelihood: medium
    description: Nowports coordinates freight, insurance, financing and partner networks rather than owning all logistics assets; service levels depend on counterparties and trade-lane conditions.
    impacted_chapter_ids:
      - II
      - III
      - I
    impacted_section_ids:
      - II.A
      - III.B
      - III.E
      - I.B
    evidence_claim_ids: *a40
    mitigation_or_diligence_request: Request supplier/agent concentration, SLAs, carrier contracts, claims history, lender/insurer facilities, lane profitability and contingency plans.
  - risk_id: R-009
    risk_title: Cross-border trade-policy and macro volatility
    risk_category: market
    severity: medium
    likelihood: medium
    description: International-trade exposure makes Nowports sensitive to tariffs, customs policy, exchange rates, trade-lane disruptions and customer import/export cycles.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.B
      - III.E
      - VIII.G
    evidence_claim_ids: *a41
    mitigation_or_diligence_request: Model revenue and margin sensitivity by trade lane, currency, tariff/regulatory scenario and customer industry.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financial statements, YTD management accounts, revenue/gross margin by service, backlog and AR aging.
    why_it_matters: Core quality-of-revenue and solvency diligence cannot be completed publicly.
    suggested_source_or_request: Finance data room and CFO walkthrough.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, liquidation preferences, option pool, notes, debt and side letters.
    why_it_matters: Headline unicorn valuation may not reflect common-equity value or current financing risk.
    suggested_source_or_request: Cap table and financing-document review by counsel/accountants.
    priority: high
  - gap_id: G-003
    chapter_id: III
    section_id: III.C
    missing_information: Revenue by customer, churn, NRR and top-customer concentration.
    why_it_matters: Public customer proof is thin and customer risk could dominate valuation.
    suggested_source_or_request: Top-customer schedule, contracts and reference calls.
    priority: high
  - gap_id: G-004
    chapter_id: II
    section_id: II.A
    missing_information: Product usage, automation rates, platform uptime, roadmap and customer ROI.
    why_it_matters: Digital-forwarder differentiation depends on platform performance beyond marketing claims.
    suggested_source_or_request: Product analytics, incident reports, roadmap and customer ROI case studies.
    priority: high
  - gap_id: G-005
    chapter_id: V
    section_id: V.D
    missing_information: Sales compensation, quota, sales cycle, CAC/payback, conversion and pipeline.
    why_it_matters: Sales-led GTM economics are not underwritable from public CTAs.
    suggested_source_or_request: CRM export, sales comp plans and marketing spend analysis.
    priority: high
  - gap_id: G-006
    chapter_id: VII
    section_id: VII.B
    missing_information: Headcount by function/location, layoffs, attrition and retention plan.
    why_it_matters: Management reset and staff cuts create execution risk.
    suggested_source_or_request: HRIS export, severance records, employee survey and retention analysis.
    priority: high
  - gap_id: G-007
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Trademark/patent registrations, IP assignments and material licenses.
    why_it_matters: Brand/platform ownership and use rights are core legal assets.
    suggested_source_or_request: Counsel IP register extracts and assignment chain.
    priority: medium
  - gap_id: G-008
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulatory, customs, privacy/security, insurance and litigation schedules.
    why_it_matters: Logistics/financing business has multi-jurisdictional compliance exposure.
    suggested_source_or_request: Counsel docket/regulatory searches, policies, SOC/ISO/pen-test and insurance schedules.
    priority: high
  - gap_id: G-009
    chapter_id: III
    section_id: III.E
    missing_information: Carrier/agent/supplier contracts, service-level history and counterparty concentration.
    why_it_matters: Service reliability and margin depend on external counterparties.
    suggested_source_or_request: Top supplier contracts, claims history and lane-level performance data.
    priority: high
  - gap_id: G-010
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D budget, engineering staffing, technical debt and planned releases.
    why_it_matters: Product execution after simplification must be separated from underinvestment.
    suggested_source_or_request: Engineering roadmap, budget and architecture review.
    priority: medium
