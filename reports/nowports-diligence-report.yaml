report_metadata:
  report_title: Nowports Startup Diligence Report
  target_company: Nowports
  website: https://nowports.com/
  known_aliases:
    - Nowports
    - Nowports Capital
  sector: Digital freight forwarding, logistics, supply chain and trade finance
  geography: Mexico / Latin America, with public focus on Mexico and Chile and partner networks globally
  company_stage: Private unicorn / Series C growth-stage company
  research_date: 2026-05-25
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility first using CB Insights unicorn/company pages, current company website and independent EL CEO reporting.
    - Prioritized company-owned pages, CB Insights market database pages, Y Combinator profile and independent Mexican business press.
    - Treated company-published claims as evidence of public positioning unless independently corroborated.
    - Marked financial, customer, legal, HR, security and cap-table items as not_publicly_verifiable where public sources were insufficient.
  included_jurisdictions:
    - Mexico
    - United States / Delaware
    - Chile
    - Latin America markets referenced by public materials
  excluded_topics:
    - Private financial statements, cap table, customer contracts, supplier agreements, HR records, full court/regulatory searches, SOC/security reports and tax records were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow-provided random-unicorn candidate context
      type: workflow_request
      date_received: 2026-05-25
      notes: "Candidate from CB Insights Global Unicorn Club: Nowports, slug nowports, valuation $1.10B, country Mexico, industry Industrials."
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Nowports is a private Mexico-based unicorn valued at approximately $1.10B and remains eligible for private-company diligence.
    claim_source: CB Insights unicorn list and workflow candidate context
    claim_date: 2026-05-25
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.C
      - I.D
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-005
    contradiction_summary: null
    diligence_follow_up:
      - Request primary financing documents, board approvals, current cap table, valuation support, option/debt/preference schedules and any M&A/IPO board materials.
  - founder_claim_id: FC-002
    claim_text: Nowports operates a digital freight/logistics platform for Latin American importers/exporters across freight modes, documentation, tracking and related services.
    claim_source: Company website, CB Insights profile and Y Combinator profile
    claim_date: null
    mapped_chapter_ids:
      - II
      - VI
    mapped_section_ids:
      - II.A
      - VI.A
      - VI.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-006
      - EC-007
      - EC-008
      - EC-011
      - EC-032
    contradiction_summary: Public sources verify product positioning but not platform usage, automation claims, reliability, roadmap or customer ROI.
    diligence_follow_up:
      - Request product usage metrics, shipment volumes, automation rates, platform uptime, incident history, roadmap and customer ROI evidence.
  - founder_claim_id: FC-003
    claim_text: Nowports has monetization and GTM signals through freight services, financing products and sales-led quote/demo funnels.
    claim_source: Company product, financing and demo pages
    claim_date: null
    mapped_chapter_ids:
