      - V.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-026
      - EC-032
    contradiction_summary: Pricing, gross margin, CAC, loan economics and sales productivity are not public.
    diligence_follow_up:
      - Request price books, shipment margin bridge, freight/finance revenue mix, CAC/payback, quota attainment, pipeline conversion and credit-loss metrics.
  - founder_claim_id: FC-004
    claim_text: Nowports has public customer, partner and network signals in Latin American logistics.
    claim_source: CB Insights customer page, company credential/network pages and EL CEO article
    claim_date: null
    mapped_chapter_ids:
      - III
      - V
    mapped_section_ids:
      - III.A
      - III.B
      - III.C
      - III.E
      - V.B
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-008
      - EC-013
      - EC-014
      - EC-024
      - EC-025
    contradiction_summary: Named-customer evidence is thin and does not verify revenue concentration, retention or customer satisfaction.
    diligence_follow_up:
      - Request top-customer list, ARR/gross profit by customer, retention/churn cohorts, shipment-volume cohorts, contracts and permissioned reference calls.
  - founder_claim_id: FC-005
    claim_text: Nowports shows public team and operating-company signals, including founders, a leadership transition, careers surface and operating reset.
    claim_source: YC profile, CB Insights people page, company careers/culture pages and EL CEO article
    claim_date: null
    mapped_chapter_ids:
      - VI
      - VII
    mapped_section_ids:
      - VI.A
      - VII.A
      - VII.B
      - VII.C
      - VII.F
      - VII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-012
      - EC-016
      - EC-020
      - EC-021
      - EC-022
      - EC-031
    contradiction_summary: Public evidence also shows staff cuts and strategic simplification, so retention, morale and execution risk remain open.
    diligence_follow_up:
      - Request org chart, HRIS headcount history, regretted attrition, severance/layoff records, compensation plans, management contracts and board minutes for CEO transition.
executive_summary:
  overall_assessment: "Nowports appears eligible for diligence as an active private unicorn: CB Insights lists the company as alive/Series C and a $1.10B Mexico unicorn, and public company pages remain active. Investment underwriting remains highly dependent on private financial, customer, cap-table, operational, legal and HR records."
  investment_or_diligence_thesis: Proceed to confirmatory diligence only if Nowports can substantiate durable gross-profit growth, customer retention, lane economics, finance-product risk controls, differentiated platform adoption, clean cap table/legal posture and successful execution after its operating simplification reset.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CB Insights and EL CEO support Nowports unicorn status and $1.10B/$1.1B valuation anchor.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
        - EC-004
    - founder_claim_id: FC-002
      summary: Company and CB sources verify public positioning across freight, financing, protection and digital logistics platform services.
      evidence_claim_ids:
        - EC-006
        - EC-007
        - EC-008
        - EC-009
        - EC-032
    - founder_claim_id: FC-005
      summary: Public sources identify founders, a 2025 leadership transition and active operating reset.
      evidence_claim_ids:
        - EC-012
        - EC-021
        - EC-022
        - EC-031
  biggest_risks:
    - risk_id: R-001
      summary: Financial and unit-economic opacity blocks valuation underwriting.
    - risk_id: R-003
      summary: Customer concentration, churn and revenue proof are not public.
    - risk_id: R-007
      summary: Leadership transition and staff cuts create execution/retention risk.
  key_evidence_gaps:
    - Audited financials, revenue/gross margin by service, cash/debt, backlog and AR aging.
    - Cap table, investor rights, option/debt/preference schedules and current valuation support.
    - Top-customer revenue, churn/NRR, contracts, reference calls and customer concentration.
    - Product usage, automation rates, platform reliability, roadmap and R&D spend.
    - Legal/regulatory/IP/security/insurance schedules and HRIS headcount/turnover records.
  recommended_next_steps:
    - Run finance/cap-table diligence before relying on headline unicorn valuation.
    - Validate customer quality with contracts, cohorts and independent reference calls.
    - "Review operating reset metrics: country P&Ls, layoffs, retention, hiring and roadmap execution."
    - Have counsel perform litigation, regulatory, privacy/security, IP and material-contract diligence.
