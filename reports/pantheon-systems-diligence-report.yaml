              should be tested against market growth.
            evidence_claim_ids:
              - EC-030
            risk_ids:
              - R-004
              - R-010
        hidden_risks:
          - Competitors may bundle platform services, undercut pricing, or capture modern frontend
            demand.
        evidence_gaps:
          - Market share, win/loss, pricing benchmarks, churn-to-competitor and buyer-perception
            data are not public.
        follow_up_questions:
          - Provide win/loss, competitor pricing benchmarks, market-share estimates,
            churn-to-competitor and roadmap differentiation analysis.
        table_ids:
          - T-010
          - T-011
