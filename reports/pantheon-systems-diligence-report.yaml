        evidence_gaps:
          - Module-level ARR, attach rates, gross margins, roadmap, support tickets, uptime and
            product telemetry are not public.
        follow_up_questions:
          - Provide product ARR by SKU, site count by workload, attach, usage telemetry, gross
            margin, SLA history, roadmap and churn by product.
        table_ids:
          - T-004
          - T-005
          - T-006
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-007
          - EC-008
          - EC-009
          - EC-010
          - EC-017
