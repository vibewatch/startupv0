      - EC-011
      - EC-012
      - EC-013
      - EC-019
      - EC-026
      - EC-030
    risk_ids:
      - R-003
      - R-005
      - R-007
      - R-009
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Vendor-published logos and 89 case-study results support public customer breadth,
          especially education/tech/non-profit/media/government references, but not a top-15 revenue
          list.
        verification_status: partially_verified
        confidence: medium
        key_findings:
