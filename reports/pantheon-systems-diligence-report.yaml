    chapter_summary: Pantheon operates in a competitive overlap between managed WordPress hosting,
      Drupal/DXP, developer PaaS and modern frontend hosting; public evidence supports positioning
      but not market share or win/loss.
    founder_claim_ids: []
    evidence_claim_ids:
