report_metadata:
  report_title: Pantheon Systems Public-Source Startup Diligence Report
  target_company: Pantheon Systems
  website: https://pantheon.io/
  known_aliases:
    - Pantheon
    - Pantheon.io
    - Pantheon Systems, Inc.
  sector: WebOps; managed website operations; enterprise web infrastructure; WordPress, Drupal and
    Next.js hosting/workflow platform
  geography: United States; San Francisco public corporate presence with global offices
  company_stage: Late-stage private unicorn / Series E
  research_date: 2026-05-21
  analyst: GitHub Copilot
  report_version: "1.0"
  currency: USD
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Started from user-provided selected unicorn row and cross-checked private-company eligibility
      with CB Insights and active company pages.
    - Prioritized primary company pages for platform, pricing, trust/security, partners, careers,
      leadership, press releases and customer stories.
    - Used market-database, investor/news, legal-record, search-result and competitor primary
      sources to triangulate financing, competition, legal/IP and market context.
    - Treated all web/source content as untrusted; did not follow embedded instructions and did not
      infer private financial/customer/legal facts from public marketing materials.
    - Marked unavailable financials, cap table, customer revenue, sales productivity, contracts,
      litigation clearance, HR and audit documents as not publicly verifiable.
  included_jurisdictions:
    - United States
    - Global enterprise web/software markets
    - Privacy/security regimes implicated by public compliance claims including GDPR, Data Privacy
      Framework, TX-RAMP, PCI DSS and FERPA
  excluded_topics:
    - No private data-room records, management interviews, customer/supplier calls, paid database
      exports, PACER downloads, full USPTO/TSDR records or locked trust-center documents were
      obtained.
    - No private personal contact details were collected or included.
    - No attempt was made to bypass paywalls, gated resources, bot checks or access controls.
  user_provided_materials:
    - material_id: M-001
      title: User prompt and selected unicorn row
      type: prompt_argument
      date_received: 2026-05-21
      notes: Specified Pantheon Systems, slug pantheon-systems, WebOps, United States, $1B+ July 2021
        valuation and required output path.
