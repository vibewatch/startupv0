        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Visible competitors include WP Engine, Kinsta, Acquia and Platform.sh/Upsun, with Pantheon
          differentiating around multi-CMS WebOps workflow, portfolio governance and Google
          Cloud-backed infrastructure.
        verification_status: partially_verified
        confidence: medium
        key_findings:
