    why_it_matters: Public searches show legal signals but not materiality or status.
    suggested_source_or_request: General counsel and outside counsel.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Official patent/trademark records, assignments, OSS SBOM and invention assignments.
    why_it_matters: Defensibility and IP ownership cannot be proven from search snippets.
    suggested_source_or_request: IP counsel and USPTO/TSDR/PTO assignment records.
    priority: medium
  - gap_id: G-011
    chapter_id: VIII
