      - VII
    mapped_section_ids:
      - VII.A
      - VII.B
      - VII.C
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-014
      - EC-015
      - EC-016
    contradiction_summary: Public roster and headcount claims do not verify payroll, attrition, open
      requisitions, compensation or retention risk.
    diligence_follow_up:
      - Request HRIS census, attrition by function/geography, open roles, compensation bands, equity
        plan, offer letters and employee-relations log.
executive_summary:
  overall_assessment: "Pantheon Systems remains eligible for a private-unicorn public-source diligence
    report: CB Insights lists Stage Series E | Alive, public sources corroborate a July 2021 $100M
    SoftBank-led Series E at a $1B+ valuation, and company pages show active 2024-2026 product,
    leadership and careers activity. Investment diligence should proceed only with high-priority
    private financial, customer, cap-table, security and legal workstreams."
  investment_or_diligence_thesis: Pantheon occupies a defensible but competitive WebOps niche at the
    intersection of managed WordPress/Drupal hosting, enterprise website governance, agency
    workflows and modern Next.js frontends. Upside depends on durable enterprise retention,
    effective partner/direct GTM, margin control over cloud/CDN dependencies, and credible product
    expansion beyond open-source CMS hosting.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Public evidence supports Pantheon as a private Series E unicorn with a July 2021 $100M
        round at a $1B+ valuation.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
        - EC-029
    - founder_claim_id: FC-002
      summary: Pantheon publicly offers a broad WebOps platform for WordPress, Drupal and Next.js workloads.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-008
    - founder_claim_id: FC-004
      summary: Pantheon publishes a self-service-to-enterprise pricing ladder.
      evidence_claim_ids:
        - EC-007
    - founder_claim_id: FC-006
      summary: Pantheon has a visible current leadership roster and public 400+ global workforce claim.
      evidence_claim_ids:
        - EC-014
        - EC-015
        - EC-016
  biggest_risks:
    - risk_id: R-001
      summary: Financial statements, ARR, retention, gross margins, CAC, burn and runway are not public.
    - risk_id: R-002
      summary: Post-unicorn cap table, preferences, debt and waterfall are opaque.
    - risk_id: R-003
      summary: Customer concentration, current paid logo status, renewal quality and churn are not
        publicly verifiable.
    - risk_id: R-005
      summary: Platform depends on cloud/CDN/subprocessor ecosystem and must execute
        Next.js/security/performance roadmap.
    - risk_id: R-006
      summary: Litigation/IP signals require full docket, counsel and official IP-record review.
  key_evidence_gaps:
    - Audited financials, ARR/retention, gross margin, CAC/payback, burn and runway.
    - Current cap table, financing terms, option pool, debt/warrants/notes and liquidation waterfall.
    - Top-customer ARR, renewal calendar, churned customers, customer references and
      support/escalation history.
    - Roadmap, uptime/SLA history, product telemetry, cloud costs, incident history and security
      audit artifacts.
    - Litigation register, counsel letter, IP assignments, official patent/trademark records,
      contracts, insurance and regulatory correspondence.
  recommended_next_steps:
    - Condition further diligence on a complete financial and cap-table data room before relying on
      the 2021 valuation.
    - Run customer diligence with top accounts and churned/lost customers to verify concentration,
      renewal risk and product value.
    - Conduct technical/security diligence on architecture, cloud/CDN dependencies, incident
      history, SOC/PCI/TX-RAMP evidence and Next.js roadmap execution.
    - Run legal diligence on litigation, IP ownership, OSS licensing, privacy/BAA/DPA obligations,
      material contracts, SLAs and insurance.
    - Benchmark competition and GTM productivity using win/loss, quota attainment, CAC/payback and
      channel attribution data.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Pantheon has verified public financing and private-unicorn evidence, but
      essentially all diligence-grade financial, projection, cap-table, tax and working-capital
      materials remain private.
    founder_claim_ids:
      - FC-001
      - FC-004
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-007
      - EC-025
      - EC-027
      - EC-029
    risk_ids:
      - R-001
      - R-002
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Public sources provide funding, pricing and operating-scale signals but no audited
          statements, quarterly financials, budget-vs-actuals, product/channel/geography revenue,
          backlog or AR aging.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.A-F1
            finding: Pantheon publicly claims scale metrics and pricing tiers, but these do not substitute for
              ARR, revenue or profitability evidence.
            evidence_claim_ids:
              - EC-005
              - EC-007
              - EC-025
            risk_ids:
              - R-001
        hidden_risks:
          - Revenue quality, collections, gross margin and cash runway could materially diverge from
            public scale signals.
        evidence_gaps:
          - Audited financial statements, management accounts, board reporting, AR aging, backlog,
            deferred revenue and tax positions are not public.
        follow_up_questions:
          - Provide audited annual financials and monthly/quarterly management financials for
            FY2023-FY2026 YTD.
          - Provide ARR bridge by product/channel/geography, cohort retention, AR aging, backlog and
            deferred revenue.
        table_ids:
          - T-003
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-005
          - EC-007
          - EC-025
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public evidence supports growth vectors such as enterprise tiers, partners and Next.js
          expansion, but projections, assumptions, capex, working capital and financing needs are
          private.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.B-F1
            finding: The pricing ladder and product expansion create plausible growth drivers, but forecast
              predictability cannot be underwritten from public sources.
            evidence_claim_ids:
              - EC-007
              - EC-008
              - EC-013
              - EC-025
            risk_ids:
              - R-001
              - R-010
        hidden_risks:
          - Custom enterprise pricing and partner channels may create forecast variability not
            visible publicly.
        evidence_gaps:
          - Three-year forecast, scenario assumptions, pipeline conversion, pricing plan,
            capex/cloud-cost assumptions and financing plan are not public.
        follow_up_questions:
          - Provide board-approved FY2026-FY2028 forecast with ARR by product, channel and customer
            segment.
          - Provide sensitivity cases for price, churn, cloud-cost inflation and sales productivity.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-007
          - EC-008
          - EC-013
          - EC-025
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public records identify investors and rounds but not shares outstanding, ownership
          percentages, option/warrant/note schedules, debt, bank lines or off-balance-sheet
          liabilities.
        verification_status: not_publicly_verifiable
        confidence: high
        key_findings:
          - finding_id: I.C-F1
            finding: Late-stage financing details and investor rights are materially opaque.
            evidence_claim_ids:
              - EC-002
              - EC-004
              - EC-027
            risk_ids:
              - R-002
        hidden_risks:
          - Preference stack or debt could change economic value materially under exit scenarios.
        evidence_gaps:
          - Current fully diluted cap table, preference stack, option pool, debt/warrants/notes and
            off-balance-sheet liabilities are not public.
        follow_up_questions:
          - Provide current and historical cap tables, financing documents, debt schedules, option
            ledger and waterfall model.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-002
          - EC-004
          - EC-027
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Funding history is partially verified through public sources; tax positions,
          revenue-recognition policies and full financing history remain private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: Series D and Series E financings are publicly supported, and CB Insights lists Stage Series
              E | Alive.
            evidence_claim_ids:
              - EC-002
              - EC-003
              - EC-004
              - EC-029
            risk_ids:
              - R-002
        hidden_risks:
          - Company PR total raised and CB Insights total raised differ slightly and require
            reconciliation.
        evidence_gaps:
          - Tax positions, revenue recognition, financing ledger, investor basis and post-2021
            financing/secondary activity are not public.
        follow_up_questions:
          - Reconcile total raised, all rounds, tax positions, revenue recognition policies and any
            post-Series E financing or secondary transactions.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-029
  - chapter_id: II
    title: Products
    chapter_summary: Pantheon publicly describes a broad WebOps platform for WordPress, Drupal and
      Next.js with infrastructure, workflow, governance, security and pricing detail; diligence
      should test adoption, roadmap execution, uptime, margins and differentiation.
    founder_claim_ids:
