risk_register:
  - risk_id: R-001
    risk_title: Opaque financial quality and SaaS unit economics
    risk_category: financial
    severity: high
    likelihood: high
    description: Pantheon is a scaled late-stage private SaaS company, but audited statements, ARR
      bridge, NRR/GRR, churn, gross margin, CAC, burn, AR aging and cash runway are not public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Require audited financials, monthly ARR/retention cohorts,
      bookings/billings, gross-margin waterfall, CAC/payback, AR aging, cash runway and tax
      positions before valuation work.
  - risk_id: R-002
    risk_title: Financing and preference-stack opacity after unicorn round
    risk_category: financing
    severity: high
    likelihood: high
    description: Public announcements disclose funding amounts and investors but not shares,
      preferences, debt, warrants, secondaries, option pool, ROFR/co-sale rights or liquidation
      waterfall.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request charter, investor-rights agreements, cap table, option
      ledger, debt/warrant schedule, board consents and waterfall under downside scenarios.
  - risk_id: R-003
    risk_title: Customer concentration, renewal and churn are hidden behind public logo evidence
    risk_category: customer
    severity: high
    likelihood: medium
    description: Public stories/logos show market traction but not current ARR concentration, active
      usage, renewal quality, churn causes, support burden or customer satisfaction.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.A
      - III.C
      - III.D
      - V.B
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Conduct customer calls and request top-customer ARR, renewal
      calendar, NRR/GRR, churned accounts, pipeline coverage and support/escalation history.
  - risk_id: R-004
    risk_title: Competitive pressure from managed WordPress, Drupal/DXP and PaaS providers
    risk_category: market
    severity: medium
    likelihood: high
    description: Pantheon competes against WP Engine, Acquia, Platform.sh/Upsun, Kinsta and broader
      cloud/modern-frontend alternatives, creating price, feature and channel pressure.
    impacted_chapter_ids:
      - IV
      - II
      - V
    impacted_section_ids:
      - IV.A
      - II.A
      - V.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request win/loss data, pricing benchmarks, churn-to-competitor
      analysis, market share, roadmap differentiation and partner/channel conflict analysis.
  - risk_id: R-005
    risk_title: Product/technical dependency on cloud, CDN/WAF, CMS ecosystems and roadmap execution
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Pantheon depends on Google Cloud and multiple subprocessors while extending into
      Next.js and security/performance/personalization features; outages, platform costs, or roadmap
      delays could affect margins and customer trust.
    impacted_chapter_ids:
      - II
      - III
      - VI
    impacted_section_ids:
      - II.A
      - III.E
      - VI.B
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review architecture, cloud contracts, SLA/incident history,
      RTO/RPO, unit costs, roadmap milestones, security backlog, dependency register and product
      telemetry.
  - risk_id: R-006
    risk_title: Litigation and IP diligence incomplete
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public searches found a prior patent suit and possible 2025/legal matters; IP searches
      show patent/trademark signals but direct docket and USPTO records were incomplete.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Obtain litigation register, demand letters, settlements/licenses,
      counsel letters, PACER/state docket pulls, IP assignments, patent/trademark prosecution files
      and open-source/IP compliance audit.
  - risk_id: R-007
    risk_title: Privacy, compliance and regulated-customer exposure require audit access
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Public pages show SOC/PCI/GDPR/TX-RAMP/BAA signals and subprocessors, but detailed
      reports, exceptions, incidents and privacy-control evidence are locked or private.
    impacted_chapter_ids:
      - VIII
      - III
    impacted_section_ids:
      - VIII.C
      - VIII.G
      - III.E
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request full SOC/PCI/TX-RAMP reports, DPAs/BAAs, data maps,
      subprocessors contracts, incident/breach logs, privacy assessments, pen tests and cyber
      insurance.
  - risk_id: R-008
    risk_title: Management transition, retention and HR data gaps
    risk_category: team
    severity: medium
    likelihood: medium
    description: CEO transition in late 2024 and 400+ public headcount require diligence on leadership
      stability, attrition, sales/product hiring and retention incentives.
    impacted_chapter_ids:
      - VII
      - VI
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.G
      - VI.A
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Review org chart, HRIS census, attrition, compensation, equity
      refreshes, executive agreements, succession plan and employee-relations matters.
  - risk_id: R-009
    risk_title: Operational uptime and support commitments are mission-critical but not publicly tested
    risk_category: operational
    severity: high
    likelihood: medium
    description: Pantheon sells enterprise website infrastructure with uptime/SLA and security claims;
      outages, support underperformance or cloud/CDN dependency failures could materially impact
      customers.
    impacted_chapter_ids:
      - II
      - III
      - VIII
    impacted_section_ids:
      - II.A
      - III.E
      - VIII.F
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request SLA credits, incident postmortems, status history, support
      metrics, vendor contracts, DR tests, customer escalations and insurance/indemnity analysis.
  - risk_id: R-010
    risk_title: Sales and channel productivity not public
    risk_category: operational
    severity: medium
    likelihood: medium
    description: Public evidence shows self-service pricing, enterprise custom sales, agency partners,
      Google Cloud Marketplace and Carahsoft, but CAC, quota productivity, sales cycle, pipeline and
      channel attribution are private.
    impacted_chapter_ids:
      - V
    impacted_section_ids:
      - V.A
      - V.C
      - V.D
      - V.E
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Request funnel metrics, pipeline by channel, quota attainment, rep
      ramp, CAC/payback, partner-sourced ARR, marketplace revenue and marketing ROI.
