          - Public references may be stale, non-material, or not representative of ARR.
        evidence_gaps:
          - Top-15 customer list for past two fiscal years and YTD is not public.
        follow_up_questions:
          - Provide top-15 customer list by ARR and application, active status, renewal dates,
            contract terms and direct references.
        table_ids:
          - T-007
        figure_ids:
          - F-004
        evidence_claim_ids:
