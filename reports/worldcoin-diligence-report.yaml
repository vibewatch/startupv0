executive_summary:
  overall_assessment: Worldcoin is eligible only when framed as the private operator/ecosystem behind World/Tools for Humanity rather than the token alone. Public evidence supports active product, team and adoption claims, but the diligence profile is dominated by biometric privacy, token, governance and global regulatory risk.
  investment_or_diligence_thesis: Proceed only with specialist crypto, privacy, biometrics and international regulatory diligence; the opportunity is large if proof-of-human becomes infrastructure, but unresolved regulatory and trust risk could be existential.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: Worldcoin is an uncovered private unicorn at approximately $1B.
      evidence_claim_ids: *a1
    - founder_claim_id: FC-002
      summary: World provides proof-of-human products via World ID, Orb, World App and Worldcoin.
      evidence_claim_ids: *a2
    - founder_claim_id: FC-003
      summary: World has public adoption and partner signals.
      evidence_claim_ids: *a3
  biggest_risks:
    - risk_id: R-001
      summary: Entity, token and valuation support complexity
    - risk_id: R-002
      summary: Biometric privacy and technical trust risk
    - risk_id: R-003
      summary: Partner/adoption claims may not translate to revenue
  key_evidence_gaps:
    - Entity chart, cap table, token allocation, treasury and revenue model.
    - Regulator correspondence, DPIAs, consent flows, deletion proofs and remediation status by country.
    - Partner contracts, active usage and revenue contribution.
    - Independent cryptographic, hardware, privacy and security audits.
    - Governance rights across Tools for Humanity, World Foundation and token ecosystem.
  recommended_next_steps:
    - Commission counsel-led jurisdictional regulatory review before any investment reliance.
    - Review token/equity economics, treasury, vesting and related-party arrangements.
    - Obtain independent security/privacy assessment of Orb, World ID and app data flows.
    - Confirm partner integrations and paying customer economics directly with counterparties.
