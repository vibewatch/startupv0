report_metadata:
  report_title: Matrixport Startup Diligence Report
  target_company: Matrixport
  website: https://www.matrixport.com/
  known_aliases:
    - BIT (formerly Matrixport)
    - Matrixport Group
  sector: Crypto financial services, digital-asset wealth management, trading and structured products
  geography: Singapore / global digital asset markets
  company_stage: Private unicorn / digital-asset financial-services platform
  research_date: 2026-06-05
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: Asia/Singapore
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Built existing-report exclusion list from reports/*-diligence-report.yaml and selected this uncovered target from
      current public unicorn-list data.
    - Used CB Insights and Wikipedia unicorn-list snapshots for public unicorn status and valuation anchors.
    - Used accessible company-owned pages and reputable public pages for product, customer, leadership, funding and risk
      signals.
    - Treated company-authored claims as evidence of public statements, not audited performance; marked private-data
      gaps as not_publicly_verifiable.
  included_jurisdictions:
    - Singapore
    - United States where public sources or customers indicate exposure
    - Global markets referenced by public product materials
  excluded_topics:
    - Private financial statements, contracts, cap table, customer calls, board materials, security reports, docket
      searches and non-public regulatory correspondence were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow request for random unicorn diligence reports
      type: workflow_request
      date_received: 2026-06-05
      notes: No pitch deck, financial model, data room or founder responses were provided.
