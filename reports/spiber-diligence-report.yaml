report_metadata:
  report_title: "Spiber Startup Diligence Report"
  target_company: "Spiber"
  website: "https://spiber.inc/"
  known_aliases:
    - "Spiber Inc."
    - "Spiber K.K."
    - "Spiber株式会社"
    - "Spiber (Thailand) Ltd."
    - "New Spiber"
    - "Brewed Protein"
  sector: "Precision-fermented structural protein materials and bio-based textiles"
  geography: "Japan-headquartered with manufacturing in Japan and Thailand and business development in Europe"
  company_stage: "Private unicorn"
  research_date: "2026-05-16"
  analyst: "GitHub Copilot diligence agent"
  report_version: "1.0"
  currency: "USD unless otherwise noted"
  time_zone: "Asia/Tokyo"

research_scope:
  diligence_depth: "standard_diligence"
  source_strategy:
    - "Selected Spiber at random from a parsed current unicorn list after excluding slugs already present in reports."
    - "Prioritized Spiber-owned company, product, sustainability, innovation, creations, academic-paper, news, privacy, and press-release materials."
    - "Supplemented with CB Insights market-database evidence and the public Wikipedia unicorn list for private-unicorn status, funding, sector, and valuation anchors."
    - "Treated inaccessible PDFs, stale pages, blocked pages, and paywalled third-party articles as limitations rather than evidence."
  included_jurisdictions:
    - "Japan"
    - "Thailand"
    - "France and European Union business-development/privacy contexts"
    - "United States only for public patent references and former U.S. operation carve-out noted by Spiber"
  excluded_topics:
    - "Private data-room financial statements, management accounts, bank statements, tax filings, cap table, debt instruments, board minutes, supplier contracts, customer contracts, insurance policies, and employee records were not available."
    - "Authenticated legal-docket, lien, patent-family analytics, regulatory, paid market-data, and private litigation searches were not accessed."
    - "No direct management interviews, customer reference calls, supplier calls, or plant visits were performed."
  user_provided_materials:
    - material_id: "UPM-001"
      title: "Autonomous random-unicorn diligence request"
      type: "workflow_request"
      date_received: "2026-05-16"
      notes: "No founder deck, private data room, financial model, customer references, or management responses were provided."

