  - founder_claim_id: "FC-002"
    claim_text: "Spiber develops structural protein biomaterials using precision fermentation, with Brewed Protein fiber positioned for apparel and broader material applications."
    claim_source: "Spiber product and innovation pages"
    claim_date: null
