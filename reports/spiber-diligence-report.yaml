risk_register:
  - risk_id: "R-001"
    risk_title: "Financial viability and restructuring economics"
    risk_category: "financial"
    severity: "critical"
    likelihood: "high"
    description: "Revenue, margin, burn, cash, debt, runway, and restructuring economics are not public, and recent releases emphasize commercialization reset, early monetization, and profitability."
    impacted_chapter_ids: ["I", "V", "VII", "VIII"]
    impacted_section_ids: ["I.A", "I.B", "I.C", "I.D", "V.E", "VII.E", "VIII.F"]
    evidence_claim_ids: ["EC-009", "EC-010", "EC-013"]
    mitigation_or_diligence_request: "Require audited statements, monthly management accounts, cash/debt/runway, financing and succession documents, and a board-approved forecast before underwriting."
  - risk_id: "R-002"
    risk_title: "Manufacturing scale and unit-cost risk"
    risk_category: "operational"
    severity: "high"
    likelihood: "high"
    description: "Spiber has disclosed mass-production infrastructure and product forms, but public sources do not reveal capacity, utilization, yield, cost per kilogram, quality, capex, or uptime."
    impacted_chapter_ids: ["I", "II", "III", "VI"]
    impacted_section_ids: ["I.A", "II.A", "III.E", "VI.B"]
    evidence_claim_ids: ["EC-003", "EC-004", "EC-009", "EC-013", "EC-015"]
    mitigation_or_diligence_request: "Run plant diligence on capacity, yield, cost, uptime, quality, capex, feedstock, utilities, and partner-manufacturer SLAs."
  - risk_id: "R-003"
    risk_title: "Customer traction and concentration economics"
    risk_category: "customer"
    severity: "high"
    likelihood: "medium"
    description: "Public collaborations are numerous, but top customer revenue, repeat purchases, sell-through, contract commitments, and concentration are not public."
    impacted_chapter_ids: ["I", "III", "V"]
    impacted_section_ids: ["I.A", "III.A", "III.B", "III.C", "V.A", "V.B", "V.C", "V.D"]
    evidence_claim_ids: ["EC-006", "EC-014", "EC-015"]
    mitigation_or_diligence_request: "Request top-customer revenue, reference calls, contracts, purchase orders, reorder history, margins, and pipeline by account."
  - risk_id: "R-004"
    risk_title: "Competitive substitutes and pricing pressure"
    risk_category: "market"
    severity: "medium"
    likelihood: "high"
    description: "Spiber competes with bio-based materials peers and incumbent fibers that may offer lower price, existing supply chains, or adequate sustainability narratives."
    impacted_chapter_ids: ["II", "IV", "V"]
    impacted_section_ids: ["II.A", "IV.A", "V.A"]
    evidence_claim_ids: ["EC-004", "EC-005", "EC-016"]
    mitigation_or_diligence_request: "Benchmark price, performance, sustainability claims, supply assurance, brand willingness to pay, and win/loss data against substitutes."
  - risk_id: "R-005"
    risk_title: "Supply-chain, feedstock, and cross-border operating dependency"
    risk_category: "operational"
    severity: "medium"
    likelihood: "medium"
    description: "Feedstock sourcing, Thailand operations, partner textile conversion, renewable-electricity claims, and cross-border logistics may affect continuity and margins."
    impacted_chapter_ids: ["I", "III", "VIII"]
    impacted_section_ids: ["I.D", "III.E", "VIII.C", "VIII.F"]
    evidence_claim_ids: ["EC-003", "EC-004", "EC-005"]
    mitigation_or_diligence_request: "Review supplier agreements, qualified alternatives, input price exposure, plant permits, tax/customs, logistics, and business continuity plans."
  - risk_id: "R-006"
    risk_title: "Technical bottlenecks and R&D execution"
    risk_category: "technical"
    severity: "high"
    likelihood: "medium"
    description: "Spiber's 2026 release explicitly assigns founders to resolve technical challenges and accelerate commercialization, implying key technical work remains."
    impacted_chapter_ids: ["II", "VI", "VII"]
    impacted_section_ids: ["II.A", "VI.A", "VI.B", "VII.C", "VII.G"]
    evidence_claim_ids: ["EC-007", "EC-008", "EC-009", "EC-011"]
    mitigation_or_diligence_request: "Request technical risk register, R&D roadmap, stage gates, founder retention terms, failure-mode analysis, and customer qualification data."
  - risk_id: "R-007"
    risk_title: "Leadership transition and business succession risk"
    risk_category: "team"
    severity: "high"
    likelihood: "medium"
    description: "New Spiber launched with a new CEO and succession from Former Spiber except certain operations; this may affect assets, liabilities, people, contracts, governance, and IP."
    impacted_chapter_ids: ["I", "III", "V", "VI", "VII", "VIII"]
    impacted_section_ids: ["I.B", "I.C", "III.D", "V.E", "VI.A", "VII.A", "VII.C", "VII.G", "VIII.F"]
    evidence_claim_ids: ["EC-009", "EC-010", "EC-017"]
    mitigation_or_diligence_request: "Review succession documents, excluded assets, consents, retention, governance, board minutes, and 100-day execution KPIs."
  - risk_id: "R-008"
    risk_title: "Legal, IP, regulatory, insurance, and contract gaps"
    risk_category: "legal"
    severity: "high"
    likelihood: "unknown"
    description: "Material legal records, docket searches, IP assignments, insurance schedules, material contracts, and regulatory correspondence are not publicly verifiable."
    impacted_chapter_ids: ["I", "VI", "VIII"]
    impacted_section_ids: ["I.C", "VI.B", "VIII.A", "VIII.B", "VIII.D", "VIII.E", "VIII.F", "VIII.G"]
    evidence_claim_ids: ["EC-009", "EC-011", "EC-012", "EC-018"]
    mitigation_or_diligence_request: "Obtain counsel letters, docket searches, IP schedules, assignments, FTO opinions, insurance schedules, material contracts, and regulator correspondence."
  - risk_id: "R-009"
    risk_title: "Sustainability and LCA claim substantiation"
    risk_category: "regulatory"
    severity: "medium"
    likelihood: "medium"
    description: "Spiber's sustainability claims are important to GTM but disclosed LCA data are pre-production/future-looking and assumption-based."
    impacted_chapter_ids: ["II", "IV", "VIII"]
    impacted_section_ids: ["II.A", "IV.A", "VIII.C", "VIII.G"]
    evidence_claim_ids: ["EC-005"]
    mitigation_or_diligence_request: "Request full LCA, third-party assurance, production-run environmental data, marketing-claim legal review, and customer claim-use controls."

