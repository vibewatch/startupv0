        figure_ids: []
        evidence_claim_ids: ["EC-011"]
      - section_id: "VIII.E"
        title: "Insurance coverage and material exposures"
        checklist_question_ids: ["VIII.E"]
        summary: "Insurance coverage, deductibles, exclusions, claims history, product liability coverage, D&O coverage, cyber coverage, and environmental coverage were not publicly verifiable."
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
          - finding_id: "VIII.E-F1"
            finding: "No public insurance schedule or claims history was found."
            evidence_claim_ids: ["EC-018"]
            risk_ids: ["R-008"]
        hidden_risks:
          - "Product liability, environmental, D&O, cyber, and recall coverage may be material for global biomaterials manufacturing."
        evidence_gaps:
          - "Insurance policies, broker summaries, claims history, coverage exclusions, and indemnity obligations."
        follow_up_questions:
          - "Provide all insurance policies, claims history, loss runs, broker letters, and coverage gaps."
        table_ids: ["T-018"]
        figure_ids: []
        evidence_claim_ids: ["EC-018"]
      - section_id: "VIII.F"
        title: "Material contracts"
        checklist_question_ids: ["VIII.F"]
        summary: >-
          Material contracts are not public. Public evidence references business support with Maya Kawana, strategic partner continuity, brand collaborations, supplier and manufacturing partners, but not executed terms, minimums, IP ownership, exclusivity, termination rights, or transfer consents.
        verification_status: "not_publicly_verifiable"
        confidence: "low"
        key_findings:
