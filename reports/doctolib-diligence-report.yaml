report_metadata:
  report_title: Doctolib Public-Source Startup Diligence Report
  target_company: Doctolib
  website: https://www.doctolib.fr/
  known_aliases: [Doctolib SAS, DOCTOLIB, Doctolib GmbH, Siilo]
  sector: Healthcare & Life Sciences; digital health; patient access; practice management
  geography: France headquarters with operations in France, Germany, Italy and the Netherlands
  company_stage: Late-stage private unicorn
  research_date: 2026-05-16
  analyst: GitHub Copilot
  report_version: '1.0'
  currency: EUR unless otherwise stated
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Used public company pages, Pappers registry/financial data, CB Insights unicorn data, Tech.eu financing coverage, and French competition-authority materials.
    - Treated company-published scale/security claims as directional until verified by data-room evidence.
    - Covered every checklist chapter and section with evidence-linked findings, exhibits, risks, gaps, and follow-up requests.
  included_jurisdictions: [France, Germany, Italy, Netherlands, European Union]
  excluded_topics:
    - No management interviews, customer calls, contracts, cap table, bank statements, board materials, security audit reports, incident logs, or source-code review.
    - No paid databases or non-public records; blocked or unavailable pages were not used as affirmative evidence.
  user_provided_materials:
    - material_id: M-001
      title: User request
      type: prompt_argument
      date_received: 2026-05-16
      notes: Create one standard-depth public-source diligence YAML report for Doctolib.
