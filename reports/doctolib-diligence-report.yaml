limitations:
  - This report uses public sources only and is not financial, legal, tax, regulatory, medical, or investment advice.
  - Company-published scale, security, and product claims were not independently audited.
  - Public financial data may be entity-level, lag current performance, and differ from consolidated group reporting.
  - Historical valuation anchors do not establish current fair value, liquidation preference economics, or secondary-market pricing.
  - Contracts, customer ARR, cap table, debt terms, incident history, employee data, and board materials are not publicly verifiable.
  - The competition-law matter summary is based on public materials and should be reviewed by qualified counsel.
  - AI, health-data, and cybersecurity risks are described at diligence level only; technical control testing was not performed.
