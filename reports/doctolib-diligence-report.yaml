risk_register:
  - risk_id: R-001
    title: Profitability, burn, and runway risk
    category: financial
    severity: high
    likelihood: medium
    description: Public 2024 filings show meaningful EBITDA and net losses with cash materially below reported financial debt.
    evidence_claim_ids: [EC-007]
    source_ids: [SRC-003]
    mitigation_or_diligence: Obtain audited consolidated statements, monthly cash, debt schedule, covenants, and 2025/2026 forecast.
  - risk_id: R-002
    title: Competition-law and remedy risk
    category: legal_regulatory
    severity: high
    likelihood: medium
    description: Public French competition authority penalty and appeal posture create legal, reputational, and conduct-remedy uncertainty.
    evidence_claim_ids: [EC-013]
    source_ids: [SRC-013]
    mitigation_or_diligence: Review decision, legal opinion, appeal strategy, reserves, and required conduct changes.
  - risk_id: R-003
    title: Health-data security and privacy incident risk
    category: security_privacy
    severity: high
    likelihood: low
    description: Large health-data workflow platform creates high impact if availability, confidentiality, or integrity fails.
    evidence_claim_ids: [EC-009, EC-010]
    source_ids: [SRC-008, SRC-009, SRC-010]
    mitigation_or_diligence: Review certifications, audit reports, incident history, penetration tests, and cyber insurance.
  - risk_id: R-004
    title: Unverified retention and revenue quality
    category: commercial
    severity: high
    likelihood: medium
    description: Public scale does not disclose paying seats, ARR quality, churn, NRR, or customer concentration.
    evidence_claim_ids: [EC-004, EC-015, EC-017]
    source_ids: [SRC-005]
    mitigation_or_diligence: Obtain cohort retention, NRR, GRR, ARPA, logo churn, and top-customer data.
  - risk_id: R-005
    title: AI and regulated workflow compliance risk
    category: product_regulatory
    severity: medium
    likelihood: medium
    description: AI-enabled healthcare workflow tools require strong governance, validation, monitoring, and user controls.
    evidence_claim_ids: [EC-014]
    source_ids: [SRC-014]
    mitigation_or_diligence: Review AI inventory, model cards, risk assessments, clinical-safety review, and EU AI Act readiness.
  - risk_id: R-006
    title: Multi-country execution complexity
    category: operations
    severity: medium
    likelihood: medium
    description: Operations across several countries and healthcare systems increase localization, support, and compliance burden.
    evidence_claim_ids: [EC-004, EC-008]
    source_ids: [SRC-005, SRC-006]
    mitigation_or_diligence: Review country P&Ls, org structure, support SLAs, and compliance ownership.
  - risk_id: R-007
    title: Competitive and pricing pressure
    category: market
    severity: medium
    likelihood: medium
    description: Regional appointment platforms, EHR vendors, and public-sector initiatives can pressure supply acquisition and pricing.
    evidence_claim_ids: [EC-016]
    source_ids: [SRC-013, SRC-015]
    mitigation_or_diligence: Conduct win/loss calls, pricing benchmark, and share analysis by country.
  - risk_id: R-008
    title: Financing terms and preference-stack opacity
    category: financing
    severity: medium
    likelihood: unknown
    description: Public valuation does not reveal liquidation preferences, debt terms, warrants, covenants, or investor rights.
    evidence_claim_ids: [EC-001, EC-002]
    source_ids: [SRC-001, SRC-002]
    mitigation_or_diligence: Review cap table, financing documents, debt agreements, and option pool.
  - risk_id: R-009
    title: Third-party dependency concentration
    category: technology_supply_chain
    severity: medium
    likelihood: low
    description: Public references to cloud and processors imply dependency and contract risk for critical health-data workflows.
    evidence_claim_ids: [EC-010]
    source_ids: [SRC-010]
    mitigation_or_diligence: Review vendor risk, DPAs, SLAs, exit plans, and data localization controls.
  - risk_id: R-010
    title: Talent, governance, and succession opacity
    category: governance_people
    severity: medium
    likelihood: unknown
    description: Founder leadership is public, but board control, succession, attrition, and incentive alignment are not.
    evidence_claim_ids: [EC-008, EC-012]
    source_ids: [SRC-006, SRC-012]
    mitigation_or_diligence: Review board materials, executive retention, equity incentives, and key-person plans.
