evidence_claims:
  - evidence_claim_id: EC-001
    claim: CB Insights lists Doctolib as a France-based Healthcare & Life Sciences unicorn valued at $6.40B with unicorn entry date 2019-03-19.
    evidence_type: market_database
    source_ids: [SRC-001]
    verification_status: verified
    confidence: high
    notes: Public unicorn tracker anchor; financing documents not reviewed.
  - evidence_claim_id: EC-002
    claim: Tech.eu reported Doctolib raised EUR 500M in equity/debt in 2022 at a EUR 5.8B valuation and cited a EUR 129/month SaaS reference.
    evidence_type: independent_news
    source_ids: [SRC-002]
    verification_status: verified
    confidence: high
    notes: Historical financing context, not current valuation.
  - evidence_claim_id: EC-003
    claim: Pappers identifies Doctolib as an active French SAS with SIREN 794 598 813 and share capital of EUR 201,304.25.
    evidence_type: regulatory_filing
    source_ids: [SRC-003]
    verification_status: verified
    confidence: high
    notes: Registry evidence for legal identity.
  - evidence_claim_id: EC-004
    claim: Doctolib public pages describe about 90M patients, 500k to 520k healthcare professionals, roughly 3,000 employees, and more than 30 cities.
    evidence_type: primary_company_source
    source_ids: [SRC-005, SRC-006]
    verification_status: partially_verified
    confidence: medium
    notes: Company-published scale; active/paying definitions unavailable.
  - evidence_claim_id: EC-005
    claim: Doctolib public pages cite about 22M appointments per month, about 15M online appointments per month, 35M video consultations, and 14M documents per month.
    evidence_type: primary_company_source
    source_ids: [SRC-005, SRC-006]
    verification_status: partially_verified
    confidence: medium
    notes: Requires usage logs and revenue linkage.
  - evidence_claim_id: EC-006
    claim: Public product pages show scheduling, telehealth, patient messaging, document sharing, payments, practice-management, and related workflow modules.
    evidence_type: primary_company_source
    source_ids: [SRC-005]
    verification_status: verified
    confidence: medium
    notes: Product presence is visible; adoption by module is not public.
  - evidence_claim_id: EC-007
    claim: Pappers public financials show revenue of EUR 164M, EUR 189M, EUR 216M, and EUR 253M for 2021-2024, plus 2024 EBITDA about negative EUR 62.9M, net income about negative EUR 122M, cash about EUR 28.6M, and financial debt about EUR 104M.
    evidence_type: regulatory_filing
    source_ids: [SRC-003]
    verification_status: verified
    confidence: high
    notes: Public financial anchors should be reconciled to consolidated accounts.
  - evidence_claim_id: EC-008
    claim: Doctolib careers/about materials indicate a large organization of roughly 3,000 employees across more than 30 cities.
    evidence_type: primary_company_source
    source_ids: [SRC-006]
    verification_status: partially_verified
    confidence: medium
    notes: HR files and attrition not public.
  - evidence_claim_id: EC-009
    claim: Doctolib security/privacy pages cite HDS hosting, ISO 27001, ISO 27701, C5 Germany, ACN Italy, EU hosting, and encryption controls.
    evidence_type: primary_company_source
    source_ids: [SRC-008, SRC-009]
    verification_status: partially_verified
    confidence: medium
    notes: Certificate scopes and audit findings were not public.
  - evidence_claim_id: EC-010
    claim: Doctolib public supplier/privacy references identify cloud or processor dependencies including AWS, Devoteam G Cloud, and Cloudinary.
    evidence_type: primary_company_source
    source_ids: [SRC-010]
    verification_status: partially_verified
    confidence: medium
    notes: Requires full subprocessor and contract review.
  - evidence_claim_id: EC-011
    claim: Secondary public sources corroborate a 2013 founding date and valuation in the $6B range.
    evidence_type: analyst_estimate
    source_ids: [SRC-011, SRC-016]
    verification_status: partially_verified
    confidence: medium
    notes: Secondary evidence only.
  - evidence_claim_id: EC-012
    claim: Public people sources identify Stanislas Niox-Chateau as co-founder/CEO and list a broader executive roster with limited board detail.
    evidence_type: social_or_professional_profile
    source_ids: [SRC-012]
    verification_status: partially_verified
    confidence: medium
    notes: Governance documents not public.
  - evidence_claim_id: EC-013
    claim: French competition authority materials report a EUR 4.665M penalty and Doctolib's public disagreement/appeal posture.
    evidence_type: legal_record
    source_ids: [SRC-013]
    verification_status: verified
    confidence: high
    notes: Outcome, remedies, and appeal impact require legal review.
  - evidence_claim_id: EC-014
    claim: Doctolib public product materials reference AI-enabled or automated workflow tools, but detailed AI governance evidence is not public.
    evidence_type: primary_company_source
    source_ids: [SRC-014]
    verification_status: partially_verified
    confidence: low
    notes: EU AI Act and healthcare safety diligence required.
  - evidence_claim_id: EC-015
    claim: Public sources do not disclose customer concentration, retention cohorts, active paid practitioners, NRR, or NPS.
    evidence_type: other
    source_ids: [SRC-005]
    verification_status: not_publicly_verifiable
    confidence: high
    notes: Absence of public data is a diligence gap.
  - evidence_claim_id: EC-016
    claim: The competitive set includes appointment platforms, practice-management/EHR vendors, telehealth tools, public portals, and adjacent healthcare software.
    evidence_type: analyst_estimate
    source_ids: [SRC-013, SRC-014, SRC-015]
    verification_status: partially_verified
    confidence: medium
    notes: Competitive intensity requires customer and market interviews.
  - evidence_claim_id: EC-017
    claim: Public evidence does not disclose ARR, gross margin, CAC payback, NRR, churn, contract terms, country profitability, or module-level economics.
    evidence_type: other
    source_ids: [SRC-002, SRC-003, SRC-005]
    verification_status: not_publicly_verifiable
    confidence: high
    notes: Core private data-room requirement.
  - evidence_claim_id: EC-018
    claim: Public evidence supports strategic relevance but is insufficient to prove a durable, profitable healthcare operating-system thesis.
    evidence_type: analyst_estimate
    source_ids: [SRC-001, SRC-003, SRC-005, SRC-013]
    verification_status: inconclusive
    confidence: medium
    notes: Synthesis claim based on public positives and unresolved risks.
