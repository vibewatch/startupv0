  - figure_id: F-011
    title: Risk heatmap
    chapter_id: VIII
    section_id: VIII.G
    figure_type: risk_heatmap
    description: Heatmap of the full risk register by severity and likelihood.
    purpose: Provide diligence priority view across all checklist chapters.
    spec_schema_ref: figure_spec_shapes.risk_heatmap
    spec:
      x_axis:
        label: likelihood
        scale:
          - low
          - medium
          - high
          - unknown
      y_axis:
        label: severity
        scale:
          - informational
          - low
          - medium
          - high
          - critical
      risk_points:
        - risk_id: R-001
          label: Stale and conflicting valuation anchors
          severity: high
          likelihood: high
          rationale: CB unicorn row shows $1.50B while CB company profile shows a $1.0B April 2016 datapoint and latest round valuation is masked.
          evidence_claim_ids: &a1
            - EC-001
            - EC-002
          source_ids:
            - SRC-001
            - SRC-002
        - risk_id: R-002
          label: Profitability volatility and lease-spread exposure
          severity: high
          likelihood: medium
          rationale: Revenue scaled to RMB1.71B in 2022 but net income swung from losses to profit and back to losses; revenue remains dominated by leased-and-operated apartments.
          evidence_claim_ids: &a2
            - EC-006
            - EC-008
            - EC-023
          source_ids:
            - SRC-003
            - SRC-004
        - risk_id: R-003
          label: Store closures and tenant disruption
          severity: high
          likelihood: medium
          rationale: 2025 media reports describe early terminations, project exits and a Hangzhou arrears allegation while the company says operations are normal.
          evidence_claim_ids: &a3
            - EC-012
            - EC-013
          source_ids:
            - SRC-006
        - risk_id: R-004
          label: Customer retention and occupancy sensitivity
          severity: medium
          likelihood: medium
          rationale: Public renewal rates in 2020-2022 were around 41%-46% and 2022 resident count declined from 2021.
          evidence_claim_ids: &a4
            - EC-009
            - EC-023
          source_ids:
            - SRC-003
        - risk_id: R-005
          label: Landlord and property lease dependency
          severity: high
          likelihood: medium
          rationale: Landlords grew to 267 in 2022 and long-term leases with owners/sublessors are core to the model; public reports allege lease-renewal and arrears frictions.
          evidence_claim_ids: &a5
            - EC-010
            - EC-013
          source_ids:
            - SRC-003
            - SRC-006
        - risk_id: R-006
          label: Competition from scaled and capital-backed operators
          severity: medium
          likelihood: high
          rationale: Mofang competes with Ziroom, Vanke Port Apartment, Longfor Guanyu and others; media comparisons report higher occupancy at some competitors.
          evidence_claim_ids: &a6
            - EC-014
            - EC-019
            - EC-021
          source_ids:
            - SRC-006
            - SRC-009
            - SRC-008
            - SRC-004
        - risk_id: R-007
          label: IPO execution and regulatory-timing risk
          severity: medium
          likelihood: high
          rationale: The company refiled after a lapsed application; CSRC filing required updates if not completed within 12 months; 2025 media said no clear IPO timetable.
          evidence_claim_ids: &a7
            - EC-003
            - EC-004
            - EC-011
            - EC-012
          source_ids:
            - SRC-003
            - SRC-004
            - SRC-005
            - SRC-006
        - risk_id: R-008
          label: PE control and founder-management incentive alignment
          severity: medium
          likelihood: medium
          rationale: Secondary sources report Warburg/华平 held about 51.6% and founder-team ownership had diluted materially.
          evidence_claim_ids: &a8
            - EC-018
          source_ids:
            - SRC-007
            - SRC-008
        - risk_id: R-009
          label: Digital-system defensibility not publicly proven
          severity: medium
          likelihood: medium
          rationale: Mofang cites OMS, IoT and big-data systems, but no code, security audit, patent portfolio or product moat evidence was public.
          evidence_claim_ids: &a9
            - EC-016
            - EC-017
            - EC-020
          source_ids:
            - SRC-007
            - SRC-001
            - SRC-002
            - SRC-003
            - SRC-006
        - risk_id: R-010
          label: Legal and reputational exposure from tenant and landlord disputes
          severity: high
          likelihood: medium
          rationale: Tenant-disruption and rent-arrears reports could lead to claims, local regulatory attention or brand damage even absent verified court cases.
          evidence_claim_ids: &a10
            - EC-012
            - EC-013
          source_ids:
            - SRC-006
        - risk_id: R-011
          label: Data-room gaps prevent investment-grade quality-of-earnings diligence
          severity: critical
          likelihood: high
          rationale: Current audited statements, debt, cap table, lease schedule, customer/supplier concentration and legal records were not public.
          evidence_claim_ids: &a11
            - EC-020
          source_ids:
            - SRC-001
            - SRC-002
            - SRC-003
            - SRC-006
        - risk_id: R-012
          label: China rental housing policy and rent-cycle sensitivity
          severity: medium
          likelihood: medium
          rationale: Policy supports rental housing, but market rent declines, state-backed supply and local implementation can pressure private operators.
          evidence_claim_ids: &a12
            - EC-021
            - EC-013
          source_ids:
            - SRC-004
            - SRC-006
    rendering_guidance:
      preferred_format: chart_spec
      display_notes: Prioritize critical/high severity with high/medium likelihood.
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-006
      - EC-008
      - EC-012
