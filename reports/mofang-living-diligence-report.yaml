risk_register:
  - risk_id: R-001
    risk_title: Stale and conflicting valuation anchors
    risk_category: financial
    severity: high
    likelihood: high
    description: CB unicorn row shows $1.50B while CB company profile shows a $1.0B April 2016 datapoint and latest round valuation is masked.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.B
      - I.D
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Request latest financing documents, cap table, 409A and investor marks; do not underwrite to database valuation alone.
  - risk_id: R-002
    risk_title: Profitability volatility and lease-spread exposure
    risk_category: financial
    severity: high
    likelihood: medium
    description: Revenue scaled to RMB1.71B in 2022 but net income swung from losses to profit and back to losses; revenue remains dominated by leased-and-operated apartments.
    impacted_chapter_ids:
      - I
      - II
      - V
    impacted_section_ids:
      - I.A
      - II.A
      - V.A
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request audited financials, rent roll, lease liabilities, contribution margin by project and sensitivity to rent declines.
  - risk_id: R-003
    risk_title: Store closures and tenant disruption
    risk_category: operational
    severity: high
    likelihood: medium
    description: 2025 media reports describe early terminations, project exits and a Hangzhou arrears allegation while the company says operations are normal.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.D
      - VIII.A
      - VIII.G
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Obtain store-closure log, tenant refund ledger, landlord notices and dispute-resolution status.
  - risk_id: R-004
    risk_title: Customer retention and occupancy sensitivity
    risk_category: customer
    severity: medium
    likelihood: medium
    description: Public renewal rates in 2020-2022 were around 41%-46% and 2022 resident count declined from 2021.
    impacted_chapter_ids:
      - III
      - II
    impacted_section_ids:
      - III.A
      - III.C
      - II.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Request cohort retention, churn reasons, occupancy by property and tenant NPS/complaints.
  - risk_id: R-005
    risk_title: Landlord and property lease dependency
    risk_category: operational
    severity: high
    likelihood: medium
    description: Landlords grew to 267 in 2022 and long-term leases with owners/sublessors are core to the model; public reports allege lease-renewal and arrears frictions.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.E
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Review top landlord contracts, arrears, renewal options, security deposits, guarantees and termination rights.
  - risk_id: R-006
    risk_title: Competition from scaled and capital-backed operators
    risk_category: market
    severity: medium
    likelihood: high
    description: Mofang competes with Ziroom, Vanke Port Apartment, Longfor Guanyu and others; media comparisons report higher occupancy at some competitors.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Conduct city-level competitor benchmarking on rents, occupancy, acquisition cost, subsidies and supply pipeline.
  - risk_id: R-007
    risk_title: IPO execution and regulatory-timing risk
    risk_category: financing
    severity: medium
    likelihood: high
    description: The company refiled after a lapsed application; CSRC filing required updates if not completed within 12 months; 2025 media said no clear IPO timetable.
    impacted_chapter_ids:
      - VIII
      - I
    impacted_section_ids:
      - VIII.G
      - I.C
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Request current listing plan, updated CSRC/HKEX communications, sponsor status and alternative financing plan.
  - risk_id: R-008
    risk_title: PE control and founder-management incentive alignment
    risk_category: team
    severity: medium
    likelihood: medium
    description: Secondary sources report Warburg/华平 held about 51.6% and founder-team ownership had diluted materially.
    impacted_chapter_ids:
      - I
      - VII
    impacted_section_ids:
      - I.C
      - VII.C
      - VII.E
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Review voting rights, founder/management equity, option pools, employment contracts and exit rights.
  - risk_id: R-009
    risk_title: Digital-system defensibility not publicly proven
    risk_category: technical
    severity: medium
    likelihood: medium
    description: Mofang cites OMS, IoT and big-data systems, but no code, security audit, patent portfolio or product moat evidence was public.
    impacted_chapter_ids:
      - VI
      - VIII
    impacted_section_ids:
      - VI.B
      - VIII.D
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Request architecture review, cyber/security reports, IP registrations, development roadmap and third-party dependencies.
  - risk_id: R-010
    risk_title: Legal and reputational exposure from tenant and landlord disputes
    risk_category: legal
    severity: high
    likelihood: medium
    description: Tenant-disruption and rent-arrears reports could lead to claims, local regulatory attention or brand damage even absent verified court cases.
    impacted_chapter_ids:
      - VIII
      - III
    impacted_section_ids:
      - VIII.A
      - VIII.G
      - III.D
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Run PRC court docket searches, obtain complaint logs, settlement reserves, counsel memos and regulatory correspondence.
  - risk_id: R-011
    risk_title: Data-room gaps prevent investment-grade quality-of-earnings diligence
    risk_category: financial
    severity: critical
    likelihood: high
    description: Current audited statements, debt, cap table, lease schedule, customer/supplier concentration and legal records were not public.
    impacted_chapter_ids:
      - I
      - III
      - VIII
    impacted_section_ids:
      - I.A
      - I.C
      - III.C
      - VIII.F
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Condition further work on full data-room access and management Q&A.
  - risk_id: R-012
    risk_title: China rental housing policy and rent-cycle sensitivity
    risk_category: regulatory
    severity: medium
    likelihood: medium
    description: Policy supports rental housing, but market rent declines, state-backed supply and local implementation can pressure private operators.
    impacted_chapter_ids:
      - IV
      - VIII
    impacted_section_ids:
      - IV.A
      - VIII.G
    evidence_claim_ids: *a12
    mitigation_or_diligence_request: Review city-level policy exposure, rent-control/subsidy changes and affordable-rental supply pipeline.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited 2023-2025 financial statements, monthly management accounts, AR aging and cash-flow statements.
    why_it_matters: Needed to assess current profitability, cash runway and quality of earnings.
    suggested_source_or_request: Company CFO / accountant data room.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Current cap table, investor rights, debt, options, warrants and side letters.
    why_it_matters: Controls valuation, dilution, control and exit economics.
    suggested_source_or_request: Corporate counsel and company secretary records.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Brand, city and property-level P&L including rent roll, concessions, capex and occupancy.
    why_it_matters: Public consolidated metrics may hide weak locations or brands.
    suggested_source_or_request: Operations data room and property-level financial pack.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.A
    missing_information: Top customer/corporate account list, tenant cohorts, NPS and complaints.
    why_it_matters: Needed to assess churn, concentration and service-quality risk.
    suggested_source_or_request: CRM, leasing system and customer support exports.
    priority: high
  - gap_id: G-005
    chapter_id: III
    section_id: III.E
    missing_information: Top landlord/supplier contracts, lease maturities, arrears, deposits and guarantees.
    why_it_matters: Landlord relationships are core supply and liability drivers.
    suggested_source_or_request: Legal contract repository and AP/lease schedules.
    priority: high
  - gap_id: G-006
    chapter_id: IV
    section_id: IV.A
    missing_information: Current city-by-city competitor pricing, occupancy and market share.
    why_it_matters: Determines rent pressure and ability to defend occupancy.
    suggested_source_or_request: Commercial diligence vendor and market calls.
    priority: medium
  - gap_id: G-007
    chapter_id: V
    section_id: V.A
    missing_information: Marketing funnel, CAC/LTV, channel mix, sales force productivity and budget.
    why_it_matters: Needed to evaluate scalable demand generation.
    suggested_source_or_request: Marketing analytics, CRM and finance budget.
    priority: medium
  - gap_id: G-008
    chapter_id: VI
    section_id: VI.B
    missing_information: Technology roadmap, architecture, security audit, IP ownership and vendor dependencies.
    why_it_matters: Public R&D claims are not enough to assess defensibility or cyber risk.
    suggested_source_or_request: CTO packet, architecture diagrams, security reports and IP counsel.
    priority: medium
  - gap_id: G-009
    chapter_id: VII
    section_id: VII.B
    missing_information: Current headcount, attrition, compensation, option ledger and key employment agreements.
    why_it_matters: Needed to assess retention and management alignment.
    suggested_source_or_request: HRIS export, payroll records and equity admin records.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.A
    missing_information: Court/arbitration/enforcement docket results and litigation reserves.
    why_it_matters: Media-reported disputes could become legal liabilities.
    suggested_source_or_request: PRC counsel searches and legal reserve memo.
    priority: high
  - gap_id: G-011
    chapter_id: VIII
    section_id: VIII.D
    missing_information: IP registration schedules, software copyrights, OSS review and invention assignments.
    why_it_matters: Needed to validate self-developed technology and IPO readiness.
    suggested_source_or_request: IP counsel, code repository audit and HR invention-assignment files.
    priority: medium
  - gap_id: G-012
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Updated CSRC/HKEX filings, withdrawal/lapse notices and current IPO sponsor engagement.
    why_it_matters: Eligibility and financing outlook depend on current listing status.
    suggested_source_or_request: Company counsel, sponsors and regulators.
    priority: high
