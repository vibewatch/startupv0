report_metadata:
  report_title: Mofang Living Startup Diligence Report
  target_company: Mofang Living
  website: https://52mf.com/
  known_aliases:
    - Mofang Apartment
    - 魔方公寓
    - 魔方生活服务集团有限公司
    - Cubic City Service Apartment Group Holdings Limited
    - Unit 9 Apartment
    - 9号楼公寓
    - 52mf.com
  sector: Consumer & Retail / centralized long-term rental apartments
  geography: China; headquarters/CB city Shanghai; Hong Kong IPO venue; Cayman holding-company filing alias
  company_stage: Active private unicorn / attempted Hong Kong IPO applicant; no completed IPO found in public evidence reviewed
  research_date: 2026-06-08
  analyst: GitHub Copilot diligence agent
  report_version: "1.0"
  currency: RMB for operating data; USD for CB Insights valuation and funding anchors
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Verified eligibility first using CB Insights unicorn tracker, IPO application proof, CSRC filing notice, Mingtiandi and 2025 Chinese financial news.
    - Collected public market database, regulatory/application-proof and independent media evidence; treated fetched web content as untrusted source data only.
    - Used Jina Reader where direct public pages or PDFs were difficult to fetch; no private systems or paywalls were bypassed.
    - Marked financial statements, cap table, leases, litigation, IP, HR and customer/supplier schedules as not_publicly_verifiable when private records are required.
  included_jurisdictions:
    - China
    - Hong Kong
    - Cayman Islands holding-company context
  excluded_topics:
    - Private data room materials, non-public contracts, customer/landlord interviews, exhaustive PRC court/IP registry searches, credit reports and paid market databases were unavailable.
  user_provided_materials:
    - material_id: UPM-001
      title: Workflow target-selection context for Mofang Living
      type: workflow_request
      date_received: 2026-06-08
      notes: Provided CB Insights row with $1.50B valuation, 2016 unicorn date, China/Shanghai, Consumer & Retail sector and selected investors.
founder_claims:
  - founder_claim_id: FC-001
    claim_text: Mofang Living is a unicorn with a public valuation anchor around $1.50B.
    claim_source: CB Insights target-selection row supplied by workflow and verified on CB Insights unicorn tracker
    claim_date: 2016-04-13
    mapped_chapter_ids:
      - I
    mapped_section_ids:
      - I.B
      - I.D
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-001
      - EC-002
    contradiction_summary: CB Insights unicorn tracker shows $1.50B, while the CB Insights company financials page shows an April 2016 valuation datapoint of $1.0B and masks current valuation.
    diligence_follow_up:
      - Request latest 409A/fair-value analysis, financing-round documents and cap table.
  - founder_claim_id: FC-002
    claim_text: Mofang Living operates long-term rental apartments in China under Mofang/Cubic City brands.
    claim_source: Public application proof and Mingtiandi article
    claim_date: null
    mapped_chapter_ids:
      - II
      - III
      - IV
    mapped_section_ids:
      - II.A
      - III.A
      - IV.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-005
      - EC-007
      - EC-022
    contradiction_summary: null
    diligence_follow_up:
      - Request current store list, brand-level unit economics and city-by-city occupancy.
  - founder_claim_id: FC-003
    claim_text: Warburg Pincus and Aviation Industry Corporation of China / AVIC Trust are publicly associated investors.
    claim_source: CB Insights target-selection row and CB Insights financial profile
    claim_date: null
    mapped_chapter_ids:
      - I
      - VII
    mapped_section_ids:
      - I.C
      - VII.C
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-018
    contradiction_summary: Public sources differ in naming AVIC as Aviation Industry Corporation of China versus AVIC Trust; legal entity and holdings require cap-table confirmation.
    diligence_follow_up:
      - Request investor register, side letters and voting/control agreements.
  - founder_claim_id: FC-004
    claim_text: Mofang remains an active private company and has not completed an IPO, acquisition or shutdown based on public evidence reviewed.
    claim_source: IPO application proof, CSRC notice, Mingtiandi and 2025 Sina/Time Finance coverage
    claim_date: null
    mapped_chapter_ids:
      - VIII
    mapped_section_ids:
      - VIII.G
    verification_status: partially_verified
    confidence: medium
    evidence_claim_ids:
      - EC-003
      - EC-004
      - EC-011
      - EC-012
    contradiction_summary: Public evidence supports ongoing operations and no completed IPO, but official registries and private transaction records were not exhaustively searched.
    diligence_follow_up:
      - Request company confirmation of legal status, beneficial ownership, any M&A process and updated IPO filings.
  - founder_claim_id: FC-005
    claim_text: Public sources are sufficient for standard diligence depth but not for investment-grade financial, legal, cap-table or customer diligence.
    claim_source: Research scope assessment
    claim_date: 2026-06-08
    mapped_chapter_ids:
      - I
      - III
      - VIII
    mapped_section_ids:
      - I.A
      - III.C
      - VIII.A
    verification_status: verified
    confidence: high
    evidence_claim_ids:
      - EC-020
    contradiction_summary: null
    diligence_follow_up:
      - Open a data room with audited financials, leases, litigation, IP, HR and customer/supplier schedules.
executive_summary:
  overall_assessment: "Eligible for a public-source diligence report: public evidence supports Mofang Living as an active private Chinese rental-apartment unicorn with attempted but not completed Hong Kong IPO activity. Investment-grade underwriting is blocked by stale public financials, valuation conflicts, private lease/cap-table data and recent operating-dispute signals."
  investment_or_diligence_thesis: Mofang has scaled centralized apartment operations and recognized investor backing in a policy-supported rental housing market, but the diligence thesis hinges on proving current property-level profitability, landlord stability, liquidity, legal exposure and management incentives after delayed IPO plans.
  strongest_verified_claims:
    - founder_claim_id: FC-002
      summary: Mofang operated 76,245 apartments across 388 locations in 25 cities as of 2022-12-31.
      evidence_claim_ids:
        - EC-005
        - EC-007
    - founder_claim_id: FC-003
      summary: Warburg Pincus and AVIC-related investors are publicly associated with Mofang.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-018
    - founder_claim_id: FC-004
      summary: Public sources show IPO attempts but no completed listing, and 2025 media quotes Mofang saying operations remain normal.
      evidence_claim_ids:
        - EC-003
        - EC-004
        - EC-011
        - EC-012
  biggest_risks:
    - risk_id: R-011
      summary: Data-room gaps prevent investment-grade quality-of-earnings, cap-table, legal and lease diligence.
    - risk_id: R-002
      summary: Profitability volatility and asset-heavy leased-and-operated revenue exposure.
    - risk_id: R-003
      summary: Recent media-reported store closures, tenant disruption and rent-arrears allegations.
  key_evidence_gaps:
    - Current audited financials and cash runway
    - Current cap table and investor/control rights
    - Top leases/landlords, arrears and closure/refund logs
    - PRC court/regulatory/IP searches
    - Current IPO/regulatory filing status
  recommended_next_steps:
    - Do not underwrite to stale CB valuation; request cap table and latest fair-value support.
    - Run legal/regulatory searches and verify tenant/landlord dispute status.
    - Perform property-level QoE and lease-liability diligence.
    - Confirm current IPO or alternative financing plan.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence confirms historical 2020-2022 revenue scale, public funding anchors and investor names, but current financial statements, cap table, debt, lease obligations and valuation are not publicly verifiable.
    founder_claim_ids:
      - FC-001
      - FC-003
      - FC-005
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-006
      - EC-018
      - EC-020
    risk_ids:
      - R-001
      - R-002
      - R-008
      - R-011
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: Only prospectus-period 2020-2022 revenue/profit and operating metrics were publicly available; full current statements, AR aging and management reports require a data room.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.A-F1
            finding: Revenue reached RMB1.71B in 2022, but profitability swung from a 2020 loss to 2021 profit and 2022 loss.
            evidence_claim_ids:
              - EC-006
            risk_ids:
              - R-002
          - finding_id: I.A-F2
            finding: Detailed quarterly financials, current backlog, AR aging and audited post-2022 statements were not public.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-011
        hidden_risks:
          - Stale 2022 financials may obscure current rent pressure, lease liabilities and cash runway.
        evidence_gaps:
          - Current audited financial statements, management accounts, AR aging and lease liability schedule were not public.
        follow_up_questions:
          - Provide audited 2023-2025 financials, monthly management accounts, AR aging and project-level P&L.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-006
          - EC-020
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: No current management projections were public; public market-growth claims and stale unicorn valuation anchors require independent validation.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B-F1
            finding: The public unicorn valuation anchor is inconsistent across CB Insights pages and is not a current forecast.
            evidence_claim_ids:
              - EC-001
              - EC-002
            risk_ids:
              - R-001
          - finding_id: I.B-F2
            finding: Market growth tailwinds exist, but policy and rent-cycle sensitivity make projections highly diligence-dependent.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-012
        hidden_risks:
          - Forecasts may embed rent-growth and occupancy assumptions that are inconsistent with recent store-closure and rent-pressure reports.
        evidence_gaps:
          - Three-year model, scenario cases, capex, external financing assumptions and board-approved budget were not public.
        follow_up_questions:
          - Provide monthly three-year financial model with rent, occupancy, churn, lease-renewal, capex and financing assumptions.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-021
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public sources identify key investors and Warburg control signals, but shares, debt instruments, options, warrants and side letters are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.C-F1
            finding: Warburg/华平 is reported as the largest shareholder at roughly 51.6% pre-IPO; full current ownership is private.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-008
              - R-011
          - finding_id: I.C-F2
            finding: CB Insights lists La Caisse, Warburg Pincus, AVIC Trust and DT Capital Partners as investors, but detailed round terms are masked.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-001
              - R-011
        hidden_risks:
          - Investor control and exit rights may shape financing strategy and management incentives.
        evidence_gaps:
          - Current shareholder register, option pool, debt schedule, SAFE/note terms and off-balance-sheet liabilities were not public.
        follow_up_questions:
          - Provide current cap table, investor-rights agreements, option ledger, debt instruments and off-balance-sheet obligation schedule.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-002
          - EC-018
          - EC-020
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Public funding history and financing events can be summarized, but tax positions and accounting policies require private records.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D-F1
            finding: CB Insights discloses $710M total raised over five rounds and a $150M Series D in March 2019.
            evidence_claim_ids:
              - EC-002
            risk_ids:
              - R-001
          - finding_id: I.D-F2
            finding: IPO filing activity provides a financing timeline but no completed public-market financing.
            evidence_claim_ids:
              - EC-003
              - EC-004
              - EC-011
            risk_ids:
              - R-007
        hidden_risks:
          - If IPO proceeds were part of the expansion plan, delayed listing may increase reliance on private capital or asset sales.
        evidence_gaps:
          - Tax filings, revenue-recognition policies, debt basis and warrant/option financing history were not public.
        follow_up_questions:
          - Provide tax position memo, revenue recognition policy, full financing history and external financing plan.
        table_ids:
          - T-001
        figure_ids:
          - F-001
          - F-002
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
          - EC-011
  - chapter_id: II
    title: Products
    chapter_summary: Mofang provides centralized long-term rental apartments and dormitory-style housing across multiple brands, with public rent/occupancy metrics through 2022 but no current brand-level profitability.
    founder_claim_ids:
      - FC-002
      - FC-005
    evidence_claim_ids:
      - EC-005
      - EC-007
      - EC-022
      - EC-023
    risk_ids:
      - R-002
      - R-004
      - R-005
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: Public filings describe Mofang Apartment for white-collar renters, Unit 9 for blue-collar dormitory-style housing and additional brands; product-level economics are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A-F1
            finding: The public product matrix includes Mofang Apartment, Unit 9 Apartment, MORE, WE, Hui House and Chummy Space.
            evidence_claim_ids:
              - EC-022
            risk_ids:
              - R-004
          - finding_id: II.A-F2
            finding: Average rent per apartment was around RMB3.1K per month in 2020-2022 and occupancy ranged from 80.2% to 86.5%.
            evidence_claim_ids:
              - EC-023
            risk_ids:
              - R-002
              - R-004
          - finding_id: II.A-F3
            finding: The operating model splits leased-and-operated units from manachised/third-party managed apartments.
            evidence_claim_ids:
              - EC-007
              - EC-008
            risk_ids:
              - R-005
        hidden_risks:
          - Brand-level margin and rent discounting could be materially different from consolidated averages.
        evidence_gaps:
          - Current product roadmaps, brand-level revenue, room mix, capex per refurbishment and unit economics were not public.
        follow_up_questions:
          - Provide brand-level P&L, city-level occupancy/rent trends, product roadmap and capex/refurbishment lifecycle data.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-007
          - EC-008
          - EC-022
          - EC-023
  - chapter_id: III
    title: Customer Information
    chapter_summary: Resident counts, renewal rates and landlord counts were disclosed for 2020-2022, but top customers, customer revenue concentration and supplier contracts are not publicly verifiable.
    founder_claim_ids:
      - FC-002
      - FC-005
    evidence_claim_ids:
      - EC-009
      - EC-010
      - EC-012
      - EC-013
      - EC-020
    risk_ids:
      - R-003
      - R-004
      - R-005
      - R-010
      - R-011
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Mofang’s customers are primarily many individual residents rather than a small set of enterprise accounts, but top-customer and corporate-account schedules are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.A-F1
            finding: Public resident counts were 45,614 in 2020, 63,746 in 2021 and 60,073 in 2022.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-004
          - finding_id: III.A-F2
            finding: No list of top 15 customers or corporate dormitory customers was public.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-011
        hidden_risks:
          - Individual renter scale may mask local concentration in specific buildings, employers or cities.
        evidence_gaps:
          - Top 15 customer list, enterprise customer contracts and use-case-level revenue were not public.
        follow_up_questions:
          - Provide top customer schedule by revenue/application, enterprise account contracts and tenant cohort analysis.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-009
          - EC-020
      - section_id: III.B
        title: Strategic relationships
        checklist_question_ids:
          - III.B
        summary: Public relationships include investors, landlords/property owners, franchisees/entrusting parties and IPO sponsors; commercial terms are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.B-F1
            finding: Strategic relationships include Warburg backing, property owners/sublessors and manachise/third-party management counterparties.
            evidence_claim_ids:
              - EC-004
              - EC-008
              - EC-010
            risk_ids:
              - R-005
          - finding_id: III.B-F2
            finding: IPO-related banking and regulatory relationships were public in 2023, but the current listing process is unclear.
            evidence_claim_ids:
              - EC-011
              - EC-012
            risk_ids:
              - R-007
        hidden_risks:
          - A relationship breakdown with landlords or franchisees can directly remove supply from the platform.
        evidence_gaps:
          - Revenue contribution, exclusivity, termination rights and marketing agreements for strategic relationships were not public.
        follow_up_questions:
          - Provide strategic-partner list, landlord/franchisee contracts, sponsor engagement letters and current status.
        table_ids:
          - T-007
        figure_ids: []
        evidence_claim_ids:
          - EC-004
          - EC-008
          - EC-010
          - EC-011
          - EC-012
      - section_id: III.C
        title: Revenue by customer
        checklist_question_ids:
          - III.C
        summary: Revenue by resident, employer, channel or city is not public; only aggregate resident and renewal metrics are available.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.C-F1
            finding: Public sources disclose resident counts and renewal rates but not revenue by customer or accounts over 5% of revenue.
            evidence_claim_ids:
              - EC-009
              - EC-020
            risk_ids:
              - R-004
              - R-011
        hidden_risks:
          - Unseen concentration could exist in corporate dormitory accounts or in a small number of properties/cities.
        evidence_gaps:
          - Revenue by customer, corporate account, project and city was not public.
        follow_up_questions:
          - Provide revenue by customer/account/project/city, top accounts above 5%, and churn by cohort.
        table_ids:
          - T-006
        figure_ids: []
        evidence_claim_ids:
          - EC-009
          - EC-020
      - section_id: III.D
        title: Significant relationships severed within the last two years
        checklist_question_ids:
          - III.D
        summary: Public reporting in 2025 described store closures, operating-entity changes and tenant disruptions; company framed them as limited project optimization.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.D-F1
            finding: Sina/Time Finance reported tenant disruption at multiple stores and a Hangzhou rent-arrears allegation.
            evidence_claim_ids:
              - EC-013
            risk_ids:
              - R-003
              - R-010
          - finding_id: III.D-F2
            finding: Mofang publicly responded that operations were normal and affected closures involved a small number of early projects.
            evidence_claim_ids:
              - EC-012
            risk_ids:
              - R-003
        hidden_risks:
          - Lease exits may trigger refunds, disputes, brand damage and regulatory complaints.
        evidence_gaps:
          - Comprehensive closure list, terminated supplier/landlord relationships and complaint logs were not public.
        follow_up_questions:
          - Provide last-24-month closure and termination schedule, refund ledger, complaint status and legal reserve analysis.
        table_ids:
          - T-008
        figure_ids: []
        evidence_claim_ids:
          - EC-012
          - EC-013
      - section_id: III.E
        title: Top suppliers
        checklist_question_ids:
          - III.E
        summary: Landlords/property owners are the critical supply base; public sources disclose landlord counts but not top suppliers or contract terms.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: III.E-F1
            finding: The company disclosed 267 landlords in 2022 and a leased-and-operated model based on leases with property owners/sublessors.
            evidence_claim_ids:
              - EC-010
            risk_ids:
              - R-005
          - finding_id: III.E-F2
            finding: Top suppliers, payment terms and arrears schedules require private records.
            evidence_claim_ids:
              - EC-020
            risk_ids:
              - R-011
        hidden_risks:
          - Supplier concentration, landlord disputes or non-renewals could force rapid relocations.
        evidence_gaps:
          - Top supplier list, landlord contract economics, rent arrears and security deposit exposure were not public.
        follow_up_questions:
          - Provide top landlord/supplier schedule, leases, arrears, deposits, guarantees and renewal pipeline.
        table_ids:
          - T-008
        figure_ids:
          - F-004
        evidence_claim_ids:
          - EC-010
          - EC-020
  - chapter_id: IV
    title: Competition
    chapter_summary: Mofang is a scaled centralized-rental operator in a policy-supported but competitive market that includes Ziroom, Vanke Port Apartment, Longfor Guanyu and other lodging/rental platforms.
    founder_claim_ids:
      - FC-002
    evidence_claim_ids:
      - EC-014
      - EC-019
      - EC-021
    risk_ids:
      - R-006
      - R-012
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        checklist_question_ids:
          - IV.A.1
          - IV.A.2
        summary: Public sources support a broad competitive set across independent centralized operators, developer-backed platforms, dispersed rental platforms and lodging marketplaces.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: IV.A-F1
            finding: CB Insights lists alternatives such as Anxin Apartment, XiaoZhu, Ziroom, Sweetome and XChange/Qingke.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-006
          - finding_id: IV.A-F2
            finding: 2025 media cited Mofang opened-room scale below Vanke Port Apartment, Longfor Guanyu and Ziroom.
            evidence_claim_ids:
              - EC-014
            risk_ids:
              - R-006
          - finding_id: IV.A-F3
            finding: Market growth forecasts are attractive but require validation because state-backed supply and rent pressure can alter economics.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-012
        hidden_risks:
          - Public rankings may be shaped by definitions that exclude large non-independent or dispersed rental operators.
        evidence_gaps:
          - City-by-city market share, competitor pricing, subsidies and occupancy were not public.
        follow_up_questions:
          - Run competitor calls and collect current rent/occupancy/channel data by city and product type.
        table_ids:
          - T-009
          - T-010
        figure_ids:
          - F-005
        evidence_claim_ids:
          - EC-014
          - EC-019
          - EC-021
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    chapter_summary: The go-to-market motion appears to combine direct consumer renting, offline stores, corporate/dormitory demand, acquisitions and managed/franchise relationships; detailed CAC and funnel data are not public.
    founder_claim_ids:
      - FC-005
    evidence_claim_ids:
      - EC-008
      - EC-012
      - EC-024
    risk_ids:
      - R-002
      - R-005
      - R-007
      - R-011
    sections:
      - section_id: V.A
        title: Strategy and implementation
        checklist_question_ids:
          - V.A.1
          - V.A.2
          - V.A.3
          - V.A.4
        summary: Public materials emphasize apartment-network growth, leased-and-operated dominance and planned spending on sales/marketing, but no channel metrics are public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: V.A-F1
            finding: Leased-and-operated apartments generated about 95% of revenue in 2022, despite managed/franchise unit count.
            evidence_claim_ids:
              - EC-008
            risk_ids:
              - R-002
              - R-005
