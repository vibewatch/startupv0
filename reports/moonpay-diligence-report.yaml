            licenses, and disputes.
        table_ids:
          - T-020
        figure_ids: []
        evidence_claim_ids:
          - EC-022
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        checklist_question_ids:
          - VIII.E
        summary: Cyber, E&O, D&O, crime, money-transmission, professional liability, and litigation insurance are not public.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.E.1
            finding: No insurance policy schedule or coverage limits were public in reviewed sources.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-004
              - R-007
        hidden_risks:
          - Insurance exclusions for crypto, sanctions, fraud, consumer loss, custody, cyber, or regulatory actions
            could leave uninsured exposure.
        evidence_gaps:
          - Insurance policies, limits, exclusions, claims history, broker reports, cyber/D&O/E&O/crime coverage, and
            regulator-required bonds.
        follow_up_questions:
          - Provide insurance schedule, policy copies, claims history, and crypto/sanctions/fraud exclusions.
        table_ids: []
        figure_ids: []
        evidence_claim_ids:
          - EC-021
      - section_id: VIII.F
        title: Material contracts
        checklist_question_ids:
          - VIII.F
        summary: Material customer, partner, bank, processor, app-store, wallet, cloud, KYC/fraud, and supplier contracts are
          private; public evidence supports active private status and dependencies but not terms.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: VIII.F.1
            finding: No public evidence reviewed showed an IPO, acquisition, or stopped operations; public evidence instead supports
              active private operations.
            evidence_claim_ids:
              - EC-023
            risk_ids: []
          - finding_id: VIII.F.2
            finding: Payment rail and partner dependencies are visible publicly, but material contract terms are private.
            evidence_claim_ids:
              - EC-019
            risk_ids:
              - R-003
        hidden_risks:
          - Termination rights, reserves, exclusivity, pricing, SLAs, regulatory covenants, audit rights, and
            change-of-control consent could be material.
        evidence_gaps:
          - Material contracts, customer/partner agreements, bank/processor/wallet/app-store terms, cloud/KYC/fraud
            vendor agreements, leases, acquisition agreements, and change-of-control consents.
        follow_up_questions:
          - Provide material-contract schedule and copies, including payment rails, sponsor banks, processors, KYC/fraud
            vendors, wallets, app stores, cloud, and major customers.
        table_ids: []
        figure_ids:
          - F-010
        evidence_claim_ids:
          - EC-019
          - EC-023
      - section_id: VIII.G
        title: Regulatory agency problems
        checklist_question_ids:
          - VIII.G
        summary: Public licensing and security/compliance claims are extensive, but regulator exams, findings, consent orders,
          complaints, SAR/AML history, and sanctions-screening evidence are not public.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: VIII.G.1
            finding: MoonPay publicly lists multiple registrations/licenses, including U.S. state money transmitter and New York
              virtual currency authority, and describes KYC/fraud/compliance handling.
            evidence_claim_ids:
              - EC-006
              - EC-007
              - EC-008
            risk_ids:
              - R-001
          - finding_id: VIII.G.2
            finding: Public security claims exist but independent reports and regulator correspondence were not reviewed.
            evidence_claim_ids:
              - EC-009
            risk_ids:
              - R-007
        hidden_risks:
          - Unpublicized exams, remediation plans, license conditions, SAR deficiencies, sanctions-screening gaps,
            blocked-jurisdiction issues, or enforcement inquiries could materially affect operations.
        evidence_gaps:
          - Regulator correspondence, exam reports, consent orders, enforcement inquiries, complaints, AML/sanctions/KYC
            audits, SAR metrics, license conditions, and compliance monitoring reports.
        follow_up_questions:
          - Provide complete regulatory correspondence, license inventory, exams/findings, AML/sanctions/KYC audits, SAR
            metrics, and remediation plans.
        table_ids:
          - T-021
        figure_ids:
          - F-011
        evidence_claim_ids:
          - EC-006
          - EC-007
          - EC-008
          - EC-009
