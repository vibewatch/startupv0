executive_summary:
  overall_assessment: "MoonPay is eligible for private-unicorn diligence: public sources support the November 2021 US$3.4B
    valuation anchor, SEC records show private Form D activity rather than public-company reporting, and current company
    pages/jobs indicate active operations. Underwriting remains constrained by crypto-regulatory exposure, payment-rail
    dependency, consumer fraud/reputation risk, token-market cyclicality, and private financial opacity."
  investment_or_diligence_thesis: The diligence case rests on whether MoonPay can convert a large consumer/partner
    footprint in crypto payment infrastructure into durable, compliant, diversified gross profit while maintaining
    licensing, AML/sanctions controls, payment partner access, fraud/security performance, and valuation support through
    crypto cycles.
  strongest_verified_claims:
    - founder_claim_id: FC-001
      summary: CNBC and the unicorn-table seed support the US$3.4B November 2021 valuation anchor; SEC filings support
        private-company financing activity.
      evidence_claim_ids:
        - EC-001
        - EC-002
        - EC-003
        - EC-004
        - EC-026
    - founder_claim_id: FC-002
      summary: Company pages and developer docs verify a visible product suite spanning buy, sell, send/receive, ramps,
        commerce, trade, stablecoins, hosted widget, and APIs.
      evidence_claim_ids:
        - EC-005
        - EC-006
        - EC-007
        - EC-015
    - founder_claim_id: FC-004
      summary: Company legal pages disclose FinCEN, FCA, FINTRAC, AUSTRAC, AFM, Jersey, U.S. state money transmitter, and New
        York virtual currency licensing references.
      evidence_claim_ids:
        - EC-008
  biggest_risks:
    - risk_id: R-001
      summary: Crypto regulatory, AML/KYC, sanctions, and multi-jurisdiction licensing exposure
    - risk_id: R-002
      summary: Private financial opacity and stale 2021 valuation anchor
    - risk_id: R-003
      summary: Dependence on payment rails, banking partners, wallets, app stores, and crypto-market activity
  key_evidence_gaps:
    - Audited financials, ARR/revenue bridge, gross margin, take rate, payment-method mix, fraud losses, chargebacks,
      reserves, cash, debt, burn, and runway.
    - Current cap table, preference stack, SAFE/note/warrant/option schedules, secondary transactions, and
      board-approved valuation support.
    - Top customers/partners, revenue concentration, churn, NRR, partner contracts, payment processor/bank terms,
      settlement SLAs, and supplier concentration.
    - AML/KYC/sanctions policies, regulator correspondence, license conditions, SAR/chargeback metrics, fraud model
      validation, security reports, and incident history.
    - IP assignment/trademark/patent schedules, litigation docket review, insurance policies, compensation arrangements,
      org chart, turnover, and employee relations records.
  recommended_next_steps:
    - Reconcile the US$3.4B valuation to current revenue, gross margin, payment volume, fraud losses, compliance cost,
      burn, cash, preference stack, and comparable fintech/crypto multiples.
    - Run targeted regulatory and payments diligence on money-transmission, virtual-currency, AML/sanctions,
      bank-partner, card-network, app-store, PayPal/Venmo, and local-payment-method dependencies.
    - Conduct customer/partner diligence on named wallets, ecosystem partners, enterprise/institutional accounts,
      retention, active usage, contractual rights, and concentration.
    - Commission technical/security diligence covering KYC/fraud systems, sanctions screening, API security, incident
      history, SOC/ISO/PCI evidence, disaster recovery, and change management.
    - Review litigation, complaint, IP, employment, insurance, tax, and material-contract schedules with counsel before
      relying on public profile claims.
chapters:
  - chapter_id: I
    title: Financial Information
    chapter_summary: Public evidence verifies a 2021 US$3.4B valuation anchor, private Form D financing notices, and company
      scale claims, but audited financial statements, projections, cash, debt, unit economics, cap table, and current
      valuation support are not publicly verifiable.
    founder_claim_ids:
      - FC-001
      - FC-003
    evidence_claim_ids:
      - EC-001
      - EC-002
      - EC-003
      - EC-004
      - EC-021
      - EC-023
    risk_ids:
      - R-002
      - R-005
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        checklist_question_ids:
          - I.A.1
          - I.A.2
          - I.A.3
          - I.A.4
          - I.A.5
          - I.A.6
        summary: MoonPay is private; public sources disclose financing notices and platform scale claims but not audited income
          statements, balance sheets, cash flows, backlog, AR aging, product/geography gross profit, or management
          accounts.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.A.1
            finding: SEC Form D filings decline to disclose revenue, and no audited financial statements or management accounts were
              public in reviewed sources.
            evidence_claim_ids:
              - EC-003
              - EC-021
            risk_ids:
              - R-002
          - finding_id: I.A.2
            finding: Company pages claim 10B+ volume and 35M+ verified accounts, but those metrics are not reconciled to revenue or
              gross margin publicly.
            evidence_claim_ids:
              - EC-006
              - EC-021
            risk_ids:
              - R-002
              - R-005
        hidden_risks:
          - Revenue recognition, fraud losses, chargebacks, reserves, payment-method costs, working capital, and
            crypto-cycle sensitivity are hidden without financial schedules.
        evidence_gaps:
          - Audited financials, monthly management accounts, revenue by product/channel/geography, gross margin, take
            rate, chargebacks, fraud losses, reserves, cash, debt, tax, backlog, and AR aging.
        follow_up_questions:
          - Provide audited annual financials and monthly management accounts for FY2023-FY2025 and current YTD,
            including product/channel/geography revenue and gross profit.
        table_ids:
          - T-003
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-006
          - EC-021
      - section_id: I.B
        title: Financial Projections
        checklist_question_ids:
          - I.B.1
          - I.B.2
          - I.B.3
          - I.B.4
          - I.B.5
          - I.B.6
          - I.B.7
          - I.B.8
        summary: Public product and market sources identify growth vectors in ramps, commerce, trade, stablecoins, institutional
          products, and global payment methods; forecasts, pricing assumptions, CAC, payback, and capital plans are
          private.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.B.1
            finding: Crypto market and regulatory cycles create forecast sensitivity; public-company crypto risk factors describe
              market sentiment and regulatory scrutiny applicable to on/off-ramp demand.
            evidence_claim_ids:
              - EC-011
              - EC-017
            risk_ids:
              - R-005
          - finding_id: I.B.2
            finding: No board-approved projections, scenario cases, or capital-expenditure plans were public.
            evidence_claim_ids:
              - EC-021
            risk_ids:
              - R-002
        hidden_risks:
          - Forecasts may overstate take rate, payment-method availability, authorization rates, partner volume, and
            regulatory availability through token-market cycles.
        evidence_gaps:
          - Board-approved three-year plan, scenario sensitivities, CAC/payback, NRR, churn, volume/take-rate bridge,
            payment-method cost model, fraud-loss plan, hiring plan, and capital requirements.
        follow_up_questions:
          - Provide the board-approved three-year operating plan with bull/base/bear crypto-market and regulatory
            scenarios.
        table_ids: []
        figure_ids:
          - F-002
        evidence_claim_ids:
          - EC-011
          - EC-017
          - EC-021
      - section_id: I.C
        title: Capital Structure
        checklist_question_ids:
          - I.C.1
          - I.C.2
          - I.C.3
          - I.C.4
          - I.C.5
        summary: Public Form D filings support private equity issuance history and related-person disclosures but not current
          shares, fully diluted ownership, preference stack, debt, warrants, options, or off-balance-sheet liabilities.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: I.C.1
            finding: MoonPay filed private Form D notices through 2025, but public filings do not disclose the current cap table or
              preference stack.
            evidence_claim_ids:
              - EC-004
              - EC-021
            risk_ids:
              - R-002
          - finding_id: I.C.2
            finding: The 2021 Form D notes that part of proceeds were satisfied through SAFE conversion, requiring cap-table and
              preference-stack review.
            evidence_claim_ids:
              - EC-003
            risk_ids:
              - R-002
        hidden_risks:
          - Investor rights, SAFEs/notes, liquidation preferences, option pool, secondary sales, debt, warrants, and
            off-balance-sheet obligations are hidden.
        evidence_gaps:
          - Current stockholder ledger, option/warrant/SAFE/note schedules, preference stack, debt instruments, bank
            lines, secondary transactions, 409A, and off-balance-sheet liabilities.
        follow_up_questions:
          - Provide the fully diluted cap table, financing documents, investor-rights agreements, option ledger, debt
            schedule, and latest 409A/valuation materials.
        table_ids:
          - T-002
        figure_ids: []
        evidence_claim_ids:
          - EC-003
          - EC-004
          - EC-021
      - section_id: I.D
        title: Other financial information
        checklist_question_ids:
          - I.D.1
          - I.D.2
          - I.D.3
        summary: Financing history is partially public through CNBC and SEC Form D filings; tax positions, accounting policies,
          revenue recognition, and current basis for each round are private.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: I.D.1
            finding: CNBC reported a US$555M financing at a US$3.4B valuation, while the SEC Form D notice for 2021 disclosed
              US$405.1M offered and US$385.1M sold, creating a reconciliation item.
            evidence_claim_ids:
              - EC-002
              - EC-003
            risk_ids:
              - R-002
          - finding_id: I.D.2
            finding: Additional 2023 and 2025 Form D notices suggest continued private equity activity after the unicorn valuation
              date.
            evidence_claim_ids:
              - EC-004
            risk_ids:
              - R-002
        hidden_risks:
          - Headline financing, Form D amounts, primary/secondary composition, SAFE conversion, and current valuation
            may differ materially.
        evidence_gaps:
          - Financing history by round, primary versus secondary proceeds, investor list, share price, ownership
            percentages, option pool, tax positions, and revenue-recognition policies.
        follow_up_questions:
          - Reconcile all public and private financing amounts to the cap table, board approvals, and accounting records.
        table_ids:
          - T-001
        figure_ids:
          - F-001
        evidence_claim_ids:
          - EC-001
          - EC-002
          - EC-003
          - EC-004
  - chapter_id: II
    title: Products
    chapter_summary: Public sources verify a broad consumer and B2B product surface across buy/sell/swap/send, ramps,
      commerce, trade, stablecoins, hosted widgets, APIs, and app features; product economics, margins, uptime, roadmap
      performance, and liability allocation are private.
