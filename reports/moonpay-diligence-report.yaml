            evidence_claim_ids:
              - EC-006
              - EC-007
            risk_ids:
              - R-001
              - R-003
              - R-007
        hidden_risks:
          - Product scope expands regulatory, fraud, settlement, data-protection, chain-support, wallet-integration, and
            partner-liability exposure.
        evidence_gaps:
          - Product P&L by SKU, margin by payment method, uptime/SLA, incident history, fraud/chargeback loss by
            product, compliance cost by jurisdiction, roadmap KPIs, and technical architecture/security reports.
        follow_up_questions:
          - Provide product-level revenue, gross margin, transaction volume, conversion, fraud loss, chargebacks,
            uptime, roadmap milestones, and partner-liability allocation.
        table_ids:
          - T-004
          - T-005
        figure_ids:
          - F-003
        evidence_claim_ids:
          - EC-005
          - EC-006
          - EC-007
          - EC-015
          - EC-019
  - chapter_id: III
    title: Customer Information
    chapter_summary: Public sources show large consumer and partner-scale claims and wallet/payment ecosystem references,
      but customer concentration, active usage, contract terms, churn, NRR, severed relationships, and supplier spend
      are not publicly verifiable.
    founder_claim_ids:
      - FC-002
      - FC-003
    evidence_claim_ids:
      - EC-005
      - EC-006
      - EC-010
      - EC-015
      - EC-018
      - EC-019
      - EC-020
    risk_ids:
      - R-003
      - R-004
      - R-008
    sections:
      - section_id: III.A
        title: Top customers by application
        checklist_question_ids:
          - III.A
        summary: Public sources disclose consumer scale and review surfaces rather than a list of top 15 customers by
          application; customer definitions and active usage remain private.
        verification_status: not_publicly_verifiable
        confidence: low
        key_findings:
          - finding_id: III.A.1
            finding: MoonPay claims 35M+ verified accounts and 180+ countries on the homepage, while the about page claims nearly
              30M customers; definitions need reconciliation.
            evidence_claim_ids:
              - EC-005
              - EC-010
            risk_ids:
              - R-008
          - finding_id: III.A.2
            finding: Consumer reputation should be diligence-tested because public review volume is high and litigation/search
              surfaces exist.
            evidence_claim_ids:
              - EC-018
            risk_ids:
              - R-004
        hidden_risks:
          - Review volume can hide concentrated support, scam, chargeback, fraud, and blocked-account issues.
        evidence_gaps:
          - Top 15 customers/partners by application and revenue for FY2024-FY2026 YTD, active users by partner,
            support/complaint cohorts, and customer reference calls.
        follow_up_questions:
          - Provide top customers/partners by revenue and application, active-user definitions, support metrics, and
            complaint/fraud cohort analysis.
        table_ids:
          - T-006
        figure_ids:
          - F-004
        evidence_claim_ids:
