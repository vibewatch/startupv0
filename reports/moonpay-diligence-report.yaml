risk_register:
  - risk_id: R-001
    risk_title: Crypto regulatory, AML/KYC, sanctions, and licensing exposure
    risk_category: regulatory
    severity: high
    likelihood: high
    description: MoonPay operates across regulated money transmission, virtual currency, KYC, fraud, sanctions, and
      cross-border payment domains; public licenses and docs support a compliance footprint but not control
      effectiveness.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids: *a1
    mitigation_or_diligence_request: Review license register confirmations, exam findings, regulator correspondence,
      AML/sanctions/KYC policies, SAR/CTR statistics, vendor screening, blocked jurisdictions, compliance staffing, and
      independent audits.
  - risk_id: R-002
    risk_title: Private financial opacity and stale valuation anchor
    risk_category: financial
    severity: high
    likelihood: high
    description: The latest public valuation anchor is from 2021; SEC filings decline revenue disclosure and no audited
      financials, cash, debt, burn, or unit economics are public.
    impacted_chapter_ids:
      - I
    impacted_section_ids:
      - I.A
      - I.B
      - I.C
      - I.D
    evidence_claim_ids: *a2
    mitigation_or_diligence_request: Request audited financials, management accounts, ARR/revenue bridge, volume/take-rate
      economics, gross margin, reserves, fraud losses, cash/debt, burn, runway, cap table, and board valuation support.
  - risk_id: R-003
    risk_title: Payment rail, wallet, bank, app-store, and local-method dependency
    risk_category: operational
    severity: high
    likelihood: medium
    description: MoonPay’s value proposition relies on external cards, Apple Pay, Google Pay, PayPal, Venmo, banks, local
      rails, app stores, wallets, and partner integrations, but contracts and concentration are private.
    impacted_chapter_ids:
      - III
      - V
    impacted_section_ids:
      - III.B
      - III.E
      - V.A
      - V.C
    evidence_claim_ids: *a3
    mitigation_or_diligence_request: Review partner contracts, sponsor-bank/payment-processor terms, card-network and wallet
      agreements, SLAs, termination rights, concentration, reserves, fallback routing, and incident history.
  - risk_id: R-004
    risk_title: Consumer complaint, fraud, scam, litigation, and reputation exposure
    risk_category: reputational
    severity: medium
    likelihood: high
    description: High-volume consumer crypto payment flows create fraud/scam and support-pressure risks; public review and
      litigation surfaces require sampling and root-cause analysis.
    impacted_chapter_ids:
      - III
      - VIII
    impacted_section_ids:
      - III.A
      - VIII.A
    evidence_claim_ids: *a4
    mitigation_or_diligence_request: Sample complaints and tickets, review fraud/scam typologies, reimbursement policies,
      chargebacks, litigation reserves, BBB/Trustpilot/app-store trends, support SLAs, and enforcement matters.
  - risk_id: R-005
    risk_title: Token/NFT/DeFi and crypto market cyclicality
    risk_category: market
    severity: high
    likelihood: high
    description: MoonPay transaction volume, consumer demand, and partner monetization are likely sensitive to crypto asset
      prices, market sentiment, regulatory cycles, and speculative token/NFT activity.
    impacted_chapter_ids:
      - I
      - IV
      - V
    impacted_section_ids:
      - I.B
      - IV.A
      - V.A
    evidence_claim_ids: *a5
    mitigation_or_diligence_request: Stress-test revenue, take rate, fraud losses, support costs, and valuation across
      bull/base/bear crypto-market and regulatory scenarios.
  - risk_id: R-006
    risk_title: Competitive pressure from scaled payments, exchange, and crypto-native onramp providers
    risk_category: market
    severity: medium
    likelihood: high
    description: Stripe, Coinbase, Transak, Ramp Network, exchanges, wallets, and internal partner builds compete for the
      same fiat-to-crypto/payment integration layer.
    impacted_chapter_ids:
      - IV
    impacted_section_ids:
      - IV.A
    evidence_claim_ids: *a6
    mitigation_or_diligence_request: Benchmark win/loss, pricing, authorization rates, geographic/payment coverage, fraud
      liability, compliance coverage, partner switching costs, and attach rates against competitors.
  - risk_id: R-007
    risk_title: Security, API, fraud model, and data protection risk
    risk_category: technical
    severity: high
    likelihood: medium
    description: MoonPay handles sensitive identity, payment, wallet, and transaction flows; public controls are described
      but independent security evidence is not public.
    impacted_chapter_ids:
      - II
      - VIII
    impacted_section_ids:
      - II.A
      - VIII.G
    evidence_claim_ids: *a7
    mitigation_or_diligence_request: Review SOC/ISO/PCI reports, pen tests, bug-bounty history, incidents, fraud-model
      validation, KYC vendor performance, data retention, encryption/key management, and business continuity.
  - risk_id: R-008
    risk_title: Customer and partner concentration opacity
    risk_category: customer
    severity: medium
    likelihood: unknown
    description: Public pages claim hundreds of ecosystem partners but do not disclose top-customer revenue, partner
      concentration, churn, NRR, active usage, or material contract terms.
    impacted_chapter_ids:
      - III
    impacted_section_ids:
      - III.A
      - III.B
      - III.C
    evidence_claim_ids: *a8
    mitigation_or_diligence_request: Request top-customer and partner revenue schedules, contracts, churn/NRR, active users
      by partner, channel mix, pipeline, and reference calls.
  - risk_id: R-009
    risk_title: Product expansion and acquisition integration risk
    risk_category: product
    severity: medium
    likelihood: medium
    description: Public newsroom/changelog suggests rapid product and acquisition activity, increasing execution, compliance
      scope, integration, and focus risk.
    impacted_chapter_ids:
      - VI
    impacted_section_ids:
      - VI.A
      - VI.B
    evidence_claim_ids: *a9
    mitigation_or_diligence_request: Review product roadmap, R&D spend, acquisition purchase agreements, integration plans,
      KPI adoption, architecture/security reviews, and post-merger retention.
  - risk_id: R-010
    risk_title: IP ownership, formal trademarks, open-source, and legal schedule gaps
    risk_category: legal
    severity: medium
    likelihood: unknown
    description: Public brand/product use is visible, but complete patent/trademark/copyright/open-source/IP assignment
      schedules and legal exposures are not public.
    impacted_chapter_ids:
      - VIII
    impacted_section_ids:
      - VIII.A
      - VIII.B
      - VIII.D
    evidence_claim_ids: *a10
    mitigation_or_diligence_request: Obtain IP schedule, USPTO/WIPO/EUIPO searches, employee invention assignments, OSS
      scans, third-party license review, trademark oppositions, and full litigation schedule.
  - risk_id: R-011
    risk_title: Team, governance, hiring, compensation, and turnover opacity
    risk_category: team
    severity: medium
    likelihood: medium
    description: Public leadership and hiring signals exist, but full org chart, officer roles, compensation, turnover,
      succession, and employee-relations issues are private.
    impacted_chapter_ids:
      - VII
    impacted_section_ids:
      - VII.A
      - VII.B
      - VII.C
      - VII.D
      - VII.G
    evidence_claim_ids: *a11
    mitigation_or_diligence_request: Request org chart, board/committee materials, senior bios, employment agreements,
      compensation plans, equity grants, retention/turnover data, and employee-relations claims.
diligence_gaps:
  - gap_id: G-001
    chapter_id: I
    section_id: I.A
    missing_information: Audited financials, management accounts, revenue by product/channel/geography, gross margin, take
      rate, chargebacks, fraud losses, reserves, cash, debt, burn, runway, tax, backlog, and AR aging.
    why_it_matters: These determine revenue quality, valuation support, runway, and payment-risk economics.
    suggested_source_or_request: Company CFO/accountants data room and auditor workpapers.
    priority: high
  - gap_id: G-002
    chapter_id: I
    section_id: I.C
    missing_information: Fully diluted cap table, option pool, preference stack, SAFE/note/warrant schedules, debt, investor
      rights, secondary transactions, and 409A.
    why_it_matters: Determines dilution, control, liquidation preferences, and stale valuation support.
    suggested_source_or_request: Corporate counsel, Carta/share ledger, financing documents, board approvals.
    priority: high
  - gap_id: G-003
    chapter_id: II
    section_id: II.A
    missing_information: Product-level P&L, conversion, uptime, authorization rates, fraud losses, chargebacks,
      payment-method margins, and roadmap adoption.
    why_it_matters: Public product breadth does not prove profitable or reliable adoption.
    suggested_source_or_request: Product, finance, risk, and engineering dashboards.
    priority: high
  - gap_id: G-004
    chapter_id: III
    section_id: III.C
    missing_information: Top customer/partner revenue concentration, churn, NRR, active-user definitions, partner contract
      terms, severed relationships, and supplier spend.
    why_it_matters: Customer/partner concentration and termination risk could drive revenue volatility.
    suggested_source_or_request: Sales/CS data, contracts, invoices, partner dashboards, reference calls.
    priority: high
  - gap_id: G-005
    chapter_id: IV
    section_id: IV.A
    missing_information: Win/loss, pricing realization, competitor benchmarks, authorization rates, and partner switching-cost evidence.
    why_it_matters: Competition from Stripe, Coinbase, Transak, Ramp Network, and internal builds may compress fees.
    suggested_source_or_request: GTM leader, pricing committee, RFPs, lost-deal analysis.
    priority: medium
  - gap_id: G-006
    chapter_id: V
    section_id: V.A
    missing_information: CAC/payback, channel mix, paid/organic acquisition, marketing budget, sales productivity, pipeline,
      quota attainment, and campaign ROI.
    why_it_matters: Distribution scale claims need unit economics and repeatability.
    suggested_source_or_request: Marketing, sales, analytics, and board plan materials.
    priority: medium
  - gap_id: G-007
    chapter_id: VI
    section_id: VI.B
    missing_information: R&D budget, roadmap milestones, acquisition integration plans, technical architecture, security
      review, and product adoption KPIs.
    why_it_matters: Rapid product expansion can consume capital and expand regulatory/security scope.
    suggested_source_or_request: Product/engineering roadmap, architecture review, M&A integration documents.
    priority: medium
  - gap_id: G-008
    chapter_id: VII
    section_id: VII.A
    missing_information: Current org chart, board roster, executive titles, reporting lines, compensation, equity grants,
      retention, turnover, and employee relations.
    why_it_matters: Execution and regulated-control adequacy depend on leadership, staffing, and incentives.
    suggested_source_or_request: HRIS, board materials, compensation committee materials, legal/HR schedules.
    priority: high
  - gap_id: G-009
    chapter_id: VIII
    section_id: VIII.G
    missing_information: Regulator correspondence, license conditions, exams, AML/KYC/sanctions audits, SAR data, fraud
      model validation, security reports, incidents, and insurance.
    why_it_matters: Regulatory, sanctions, cyber, and fraud failures could impair operations or enterprise value.
    suggested_source_or_request: Compliance, legal, security, risk, and insurance data room.
    priority: high
  - gap_id: G-010
    chapter_id: VIII
    section_id: VIII.D
    missing_information: Complete patent/trademark/copyright/domain/open-source/IP assignment schedule and chain-of-title for acquisitions.
    why_it_matters: IP defects, OSS obligations, or brand disputes can impair product and M&A value.
    suggested_source_or_request: IP counsel schedule, USPTO/WIPO/EUIPO searches, OSS scan, acquisition documents.
    priority: medium
