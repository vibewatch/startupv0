      - EC-006
      - EC-007
      - EC-015
      - EC-019
    risk_ids:
      - R-001
      - R-003
      - R-007
      - R-009
    sections:
      - section_id: II.A
        title: Description of each product
        checklist_question_ids:
          - II.A.1
          - II.A.2
          - II.A.3
          - II.A.4
          - II.A.5
          - II.A.6
        summary: MoonPay publicly offers consumer crypto access and business infrastructure products, but public pages do not
          disclose product-level revenue, cost structure, profitability, uptime, fraud loss, or roadmap delivery
          metrics.
        verification_status: partially_verified
        confidence: medium
        key_findings:
          - finding_id: II.A.1
            finding: Company and app-store pages verify consumer buy/sell/swap/send functions, MoonPay Balance, 170+ coins, and
              2,000+ crypto-pair swap claims.
            evidence_claim_ids:
              - EC-005
              - EC-015
            risk_ids:
              - R-003
              - R-004
          - finding_id: II.A.2
            finding: Business and developer pages verify Ramps, Commerce, Trade, Stablecoins, hosted widget, platform API, and
