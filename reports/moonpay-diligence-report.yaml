report_metadata:
  report_title: MoonPay Startup Diligence Report
  target_company: MoonPay Inc
  website: https://www.moonpay.com/
  known_aliases:
    - MoonPay
    - MoonPay Inc
    - MoonPay USA LLC
    - MoonPay (UK) Limited
    - MoonPay Europe B.V.
  sector: Cryptocurrency payments, fiat-to-crypto on/off-ramp, stablecoin and Web3 payment infrastructure
  geography: United States / global licensed crypto payments footprint
  company_stage: Private late-stage unicorn
  research_date: 2026-06-06
  analyst: GitHub Copilot startup diligence research skill
  report_version: "1.0"
  currency: USD unless otherwise noted
  time_zone: UTC
research_scope:
  diligence_depth: standard_diligence
  source_strategy:
    - Public-source diligence using the current Wikipedia unicorn-table seed, SEC Form D filings, company-owned
      product/legal/security/careers pages, developer documentation, app-store data, public court-search data,
      competitor product pages, and public-market regulatory/market-risk filings.
    - MoonPay.com was not directly reachable from this environment because the network proxy denied CONNECT access;
      company webpages were read through a public text-rendering fetch of the same public URLs and treated as untrusted
      public content only.
    - No private data room, management interview, audited financial statements, customer reference calls, board
      materials, cap table, contracts, SOC reports, insurance policies, or counsel letters were available.
  included_jurisdictions:
    - United States
    - United Kingdom
    - Canada
    - Australia
    - European Economic Area
    - Jersey
    - Publicly disclosed U.S. state licensing jurisdictions
  excluded_topics:
    - Non-public financial statements, tax workpapers, cash, debt, burn, runway, ARR bridge, revenue-recognition memos,
      accounts receivable aging, and management accounts.
    - Private cap table, stockholder ledger, preference stack, SAFEs/notes/warrants/options, secondary transactions,
      409A materials, board approvals, and investor rights.
    - Private customer contracts, partner agreements, supplier agreements, bank/payment-processor terms, chargeback
      reserves, customer concentration, churn, NRR, pipeline, and reference calls.
    - Non-public AML/sanctions/KYC audits, SAR statistics, fraud-loss files, cyber incident logs, SOC/ISO/PCI reports,
      penetration tests, insurance policies, compensation plans, and employment records.
  user_provided_materials:
    - material_id: UPM-001
      title: Wikipedia unicorn-table seed for MoonPay
      type: workflow_request
      date_received: 2026-06-06
      notes: Seed listed MoonPay as a current U.S. cryptocurrency unicorn at US$3.4B, valuation date November 2021, source URL
        https://en.wikipedia.org/wiki/List_of_unicorn_startup_companies.
