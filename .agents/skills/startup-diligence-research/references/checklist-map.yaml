checklist_name: startup_diligence_checklist
source_file: Checklist.txt
chapters:
  - chapter_id: I
    title: Financial Information
    sections:
      - section_id: I.A
        title: Annual and quarterly financial information for the past three years
        questions:
          - question_id: I.A.1
            text: Income statements, balance sheets, cash flows, and footnotes
          - question_id: I.A.2
            text: Planned versus actual results
          - question_id: I.A.3
            text: Management financial reports
          - question_id: I.A.4
            text: Breakdown of sales and gross profits by product type, channel, and geography
          - question_id: I.A.5
            text: Current backlog by customer, if any
          - question_id: I.A.6
            text: Accounts receivable aging schedule
      - section_id: I.B
        title: Financial Projections
        questions:
          - question_id: I.B.1
            text: Quarterly financial projections for the next three fiscal years, including revenue by product type, customers, and channel plus full income statements, balance sheets, and cash flows
          - question_id: I.B.2
            text: Major growth drivers and prospects
          - question_id: I.B.3
            text: Predictability of business
          - question_id: I.B.4
            text: Risks attendant to foreign operations, including exchange rate fluctuation and government instability
          - question_id: I.B.5
            text: Industry and company pricing policies
          - question_id: I.B.6
            text: Economic assumptions underlying projections, including scenarios based on price and market fluctuations
          - question_id: I.B.7
            text: Explanation of projected capital expenditures, depreciation, and working capital arrangements
          - question_id: I.B.8
            text: External financing arrangement assumptions
      - section_id: I.C
        title: Capital Structure
        questions:
          - question_id: I.C.1
            text: Current shares outstanding
          - question_id: I.C.2
            text: List of all stockholders with shareholdings, options, warrants, or notes
          - question_id: I.C.3
            text: Schedule of options, warrants, rights, and other potentially dilutive securities with exercise prices and vesting provisions
          - question_id: I.C.4
            text: Summary of all debt instruments and bank lines with key terms and conditions
          - question_id: I.C.5
            text: Off-balance-sheet liabilities
      - section_id: I.D
        title: Other financial information
        questions:
          - question_id: I.D.1
            text: Summary of current central, state, and foreign tax positions, including net operating loss carry forwards
          - question_id: I.D.2
            text: General accounting policies, including revenue recognition
          - question_id: I.D.3
            text: Financing history for equity, warrants, and debt, including date, investors, investment amount, percentage ownership, implied valuation, and current basis for each round
  - chapter_id: II
    title: Products
    sections:
      - section_id: II.A
        title: Description of each product
        questions:
          - question_id: II.A.1
            text: Major customers and applications
          - question_id: II.A.2
            text: Historical and projected growth rates
          - question_id: II.A.3
            text: Market share
          - question_id: II.A.4
            text: Speed and nature of technological change
          - question_id: II.A.5
            text: Timing of new products and product enhancements
          - question_id: II.A.6
            text: Cost structure and profitability
  - chapter_id: III
    title: Customer Information
    sections:
      - section_id: III.A
        title: Top customers by application
        questions:
          - question_id: III.A
            text: List of top 15 customers for the past two fiscal years and current year-to-date by application, including product ownership and timing of purchases where available
      - section_id: III.B
        title: Strategic relationships
        questions:
          - question_id: III.B
            text: List of strategic relationships, including revenue contribution and marketing agreements where available
      - section_id: III.C
        title: Revenue by customer
        questions:
          - question_id: III.C
            text: Revenue by customer, especially any customer accounting for 5 percent or more of revenue
      - section_id: III.D
        title: Significant relationships severed within the last two years
        questions:
          - question_id: III.D
            text: Significant customer, partner, or supplier relationships severed within the last two years
      - section_id: III.E
        title: Top suppliers
        questions:
          - question_id: III.E
            text: Top suppliers for the past two fiscal years and current year-to-date, including purchase amounts and supplier agreements where available
  - chapter_id: IV
    title: Competition
    sections:
      - section_id: IV.A
        title: Competitive landscape by market segment
        questions:
          - question_id: IV.A.1
            text: Market position and related strengths and weaknesses as perceived in the marketplace
          - question_id: IV.A.2
            text: Basis of competition, such as price, service, technology, or distribution
  - chapter_id: V
    title: Marketing, Sales, and Distribution
    sections:
      - section_id: V.A
        title: Strategy and implementation
        questions:
          - question_id: V.A.1
            text: Domestic and international distribution channels
          - question_id: V.A.2
            text: Positioning of the company and its products
          - question_id: V.A.3
            text: Marketing opportunities and marketing risks
          - question_id: V.A.4
            text: Marketing programs and recent marketing, product, public relations, or media information
      - section_id: V.B
        title: Major Customers
        questions:
          - question_id: V.B.1
            text: Status and trends of major customer relationships
          - question_id: V.B.2
            text: Prospects for future growth and development with major customers
          - question_id: V.B.3
            text: Pipeline analysis
      - section_id: V.C
        title: Principal avenues for generating new business
        questions:
          - question_id: V.C
            text: Principal avenues for generating new business
      - section_id: V.D
        title: Sales force productivity model
        questions:
          - question_id: V.D.1
            text: Sales compensation
          - question_id: V.D.2
            text: Average quota
          - question_id: V.D.3
            text: Sales cycle
          - question_id: V.D.4
            text: Plan for new hires
      - section_id: V.E
        title: Ability to implement marketing plan with current and projected budgets
        questions:
          - question_id: V.E
            text: Ability to implement marketing plan with current and projected budgets
  - chapter_id: VI
    title: Research and Development
    sections:
      - section_id: VI.A
        title: Description of R&D organization
        questions:
          - question_id: VI.A.1
            text: R&D strategy
          - question_id: VI.A.2
            text: Key R&D personnel
          - question_id: VI.A.3
            text: Major R&D activities
      - section_id: VI.B
        title: New Product Pipeline
        questions:
          - question_id: VI.B.1
            text: New product status and timing
          - question_id: VI.B.2
            text: Cost of development
          - question_id: VI.B.3
            text: Critical technology necessary for implementation
          - question_id: VI.B.4
            text: New product risks
  - chapter_id: VII
    title: Management and Personnel
    sections:
      - section_id: VII.A
        title: Organization Chart
        questions:
          - question_id: VII.A
            text: Organization chart
      - section_id: VII.B
        title: Historical and projected headcount by function and location
        questions:
          - question_id: VII.B
            text: Historical and projected headcount by function and location
      - section_id: VII.C
        title: Senior management biographies
        questions:
          - question_id: VII.C
            text: Summary biographies of senior management, including employment history, age where appropriate and public, service with the company, and years in current position
      - section_id: VII.D
        title: Compensation arrangements
        questions:
          - question_id: VII.D.1
            text: Key employment agreements or summaries where available
          - question_id: VII.D.2
            text: Benefit plans
      - section_id: VII.E
        title: Incentive stock plans
        questions:
          - question_id: VII.E
            text: Incentive stock plans
      - section_id: VII.F
        title: Significant employee relations problems, past or present
        questions:
          - question_id: VII.F
            text: Significant employee relations problems, past or present
      - section_id: VII.G
        title: Personnel Turnover
        questions:
          - question_id: VII.G.1
            text: Personnel turnover data for the last two years
          - question_id: VII.G.2
            text: Benefit plans related to retention and turnover
  - chapter_id: VIII
    title: Legal and Related Matters
    sections:
      - section_id: VIII.A
        title: Pending lawsuits against the Company
        questions:
          - question_id: VIII.A
            text: Pending lawsuits against the company, including claimant, claimed damages, history, status, anticipated outcome, and counsel where publicly available
      - section_id: VIII.B
        title: Pending lawsuits initiated by Company
        questions:
          - question_id: VIII.B
            text: Pending lawsuits initiated by the company, including defendant, claimed damages, history, status, anticipated outcome, and counsel where publicly available
      - section_id: VIII.C
        title: Environmental and employee safety issues and liabilities
        questions:
          - question_id: VIII.C.1
            text: Safety precautions
          - question_id: VIII.C.2
            text: New regulations and their consequences
      - section_id: VIII.D
        title: Material patents, copyrights, licenses, and trademarks
        questions:
          - question_id: VIII.D
            text: Material patents, copyrights, licenses, and trademarks, issued and pending
      - section_id: VIII.E
        title: Insurance coverage and material exposures
        questions:
          - question_id: VIII.E
            text: Insurance coverage and material exposures
      - section_id: VIII.F
        title: Material contracts
        questions:
          - question_id: VIII.F
            text: Material contracts
      - section_id: VIII.G
        title: Regulatory agency problems
        questions:
          - question_id: VIII.G
            text: History of regulatory agency problems, if any
