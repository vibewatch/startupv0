name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'reports/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Astro report site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout report and website sources
        uses: actions/checkout@v6
      - name: Set up Node.js for website build
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Restore incremental build caches
        uses: actions/cache@v5
        with:
          path: |
            .astro
          key: startup-lt-incremental-${{ runner.os }}-node22-${{ hashFiles('src/**', 'package-lock.json') }}-${{ hashFiles('reports/**/*.yaml') }}
          restore-keys: |
            startup-lt-incremental-${{ runner.os }}-node22-${{ hashFiles('src/**', 'package-lock.json') }}-
            startup-lt-incremental-${{ runner.os }}-node22-
      - name: Install website dependencies
        run: npm ci
      - name: Build static report website
        run: npm run build
      - name: Configure GitHub Pages publishing
        uses: actions/configure-pages@v6
      - name: Upload built site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Publish site to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy uploaded site artifact
        id: deployment
        uses: actions/deploy-pages@v5
